<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Websites - InfiniteWeb</title>
  <meta name="description" content="Search and explore AI-generated websites by InfiniteWeb.">
  <link rel="icon" href="static/images/logo.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/search-app.css">
</head>
<body>
  <!-- HOME VIEW -->
  <div id="home-view" class="view">
    <div class="home-container">
      <div class="home-logo">
        <span class="logo-s">I</span><span class="logo-i">n</span><span class="logo-m">f</span><span class="logo-u">i</span><span class="logo-l">n</span><span class="logo-a">i</span><span class="logo-t">t</span><span class="logo-e">e</span><span class="logo-d">W</span><span class="logo-space"></span><span class="logo-w">e</span><span class="logo-e2">b</span>
      </div>
      <div class="search-box-container">
        <div id="home-search-box" class="search-box">
          <div class="search-box-inner">
            <svg class="search-box-icon" focusable="false" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#9aa0a6"/></svg>
            <input type="text" id="home-search-input" class="search-box-input" autocomplete="off" autofocus title="Search" aria-label="Search" placeholder='Try "restaurant", "portfolio", "e-commerce"...'>
            <button id="home-clear-btn" class="clear-btn" type="button" hidden aria-label="Clear">
              <svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="#70757a"/></svg>
            </button>
          </div>
          <div id="home-suggestions" class="suggestions-dropdown" hidden></div>
        </div>
        <div class="home-buttons">
          <button id="home-search-btn" class="home-btn" type="button">Search Websites</button>
        </div>
      </div>
      <div class="home-footer">
        <span id="home-stats-text"></span>
        <br>
        <a href="index.html" style="color:#70757a;font-size:13px;text-decoration:none;margin-top:8px;display:inline-block;">&#8592; Back to InfiniteWeb</a>
      </div>
    </div>
  </div>

  <!-- RESULTS VIEW -->
  <div id="results-view" class="view" hidden>
    <header class="results-header">
      <div class="results-header-inner">
        <a href="#" id="logo-link" class="results-logo-link">
          <span class="rlogo-s">I</span><span class="rlogo-i">n</span><span class="rlogo-m">f</span><span class="rlogo-u">i</span><span class="rlogo-l">n</span><span class="rlogo-a">i</span><span class="rlogo-t">t</span><span class="rlogo-e">e</span><span class="rlogo-d">W</span><span class="rlogo-space"></span><span class="rlogo-w">e</span><span class="rlogo-e2">b</span>
        </a>
        <div class="results-search-box-wrap">
          <div id="results-search-box" class="search-box search-box--results">
            <div class="search-box-inner">
              <svg class="search-box-icon" focusable="false" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#9aa0a6"/></svg>
              <input type="text" id="results-search-input" class="search-box-input" autocomplete="off" title="Search" aria-label="Search">
              <button id="results-clear-btn" class="clear-btn" type="button" hidden aria-label="Clear">
                <svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="#70757a"/></svg>
              </button>
              <span class="search-box-divider"></span>
              <button id="results-search-btn" class="search-box-search-btn" type="button" aria-label="Search">
                <svg focusable="false" viewBox="0 0 24 24" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#4285f4"/></svg>
              </button>
            </div>
            <div id="results-suggestions" class="suggestions-dropdown" hidden></div>
          </div>
        </div>
      </div>
      <div class="results-header-border"></div>
    </header>

    <div class="results-body">
      <main class="results-main">
        <div class="results-info" id="results-info"></div>
        <div id="results-list" class="results-list"></div>
        <nav id="pagination" class="pagination" aria-label="Search results pages"></nav>
      </main>
    </div>
  </div>

  <!-- LOADING OVERLAY -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-dots">
      <span class="dot dot1"></span>
      <span class="dot dot2"></span>
      <span class="dot dot3"></span>
      <span class="dot dot4"></span>
    </div>
    <p>Loading search index...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/minisearch@7.1.1/dist/umd/index.min.js"></script>
  <script src="static/js/search-app.js"></script>
</body>
</html>
