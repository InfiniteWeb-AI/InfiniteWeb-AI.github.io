    <title>FutureTech Media - Search Results</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&amp;family=Merriweather:wght@400;700&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap" rel="stylesheet">

    <!-- Site stylesheet (framework) -->
    
    <!-- Page-specific stylesheet -->
    <link rel="stylesheet" href="search.css">
</head>
<body>
    <div class="site-shell">
        <header class="site-header" role="banner">
            <div class="header-top">
                <div class="container header-inner">
                    <a href="index.html" class="brand" title="Homepage with personalized technology and space news feed">
                        <span class="brand-mark" aria-hidden="true">FT</span>
                        <span class="brand-text">
                            <span class="brand-title">FutureTech</span>
                            <span class="brand-tagline">Technology &amp; Space News</span>
                        </span>
                    </a>

                    <nav class="primary-nav" aria-label="Primary navigation">
                        <ul class="nav-list">
                            <li class="nav-item">
                                <a href="index.html" class="nav-link" title="Homepage with personalized technology and space news feed">Home</a>
                            </li>
                            <li class="nav-item">
                                <a href="search.html?categoryId=technology" class="nav-link" title="Browse general technology news and features">Technology</a>
                            </li>
                            <li class="nav-item">
                                <a href="search.html?categoryId=space" class="nav-link" title="Browse space exploration and astronomy news">Space</a>
                            </li>
                            <li class="nav-item">
                                <a href="search.html?categoryId=consumer_tech_reviews" class="nav-link" title="Browse consumer tech review articles, including smartphone reviews">Reviews</a>
                            </li>
                            <li class="nav-item">
                                <a href="events.html" class="nav-link" title="View the launch calendar and other upcoming tech and space events">Events</a>
                            </li>
                            <li class="nav-item">
                                <a href="saved.html" class="nav-link" title="Access bookmarks, reading lists, and reading queues">Saved</a>
                            </li>
                        </ul>
                    </nav>

                    <div class="header-actions">
                        <div class="profile-menu">
                            <a href="account.html" class="avatar" aria-haspopup="true" aria-expanded="false" title="View or update your account">
                                <span class="avatar-initials" aria-hidden="true">U</span>
                                <span class="visually-hidden">User menu</span>
                            </a>
                            <div class="profile-dropdown" aria-label="User menu">
                                <ul class="profile-dropdown-list">
                                    <li class="profile-dropdown-item">
                                        <a href="account.html" class="profile-link" title="View or update your single-user account profile">Account</a>
                                    </li>
                                    <li class="profile-dropdown-item">
                                        <a href="settings.html" class="profile-link" title="Customize your technology feed and push notification preferences">Settings</a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="header-separator" aria-hidden="true"></div>
        </header>

        <main id="content" class="site-main" role="main">
            <div class="container layout-two-column">
                <section class="content-column" aria-label="Main content area">
                    <!-- Search query form -->
                    <section class="search-query-section">
                        <form id="searchQueryForm" class="search-form" data-component="search-query-form" data-action="submit-search" role="search" aria-label="Search articles">
                            <label class="visually-hidden" for="searchQueryInput">Search technology and space articles</label>
                            <div class="search-input-group">
                                <input type="search" id="searchQueryInput" name="query" class="form-control search-input" placeholder="Search technology and space articles" autocomplete="off">
                                <button type="submit" class="btn btn-primary search-submit">Search</button>
                            </div>
                        </form>
                    </section>

                    <!-- Results header + sort/page-size controls -->
                    <section class="results-utility-bar">
                        <div class="results-header" data-component="results-header" data-populate="results-header">
                            <!-- Populated via JS: total results, query, page info -->
                        </div>
                        <div class="sort-and-page-size" data-component="sort-and-page-size-control" data-populate="sort-controls">
                            <!-- Populated via JS: sort options and page size -->
                        </div>
                    </section>

                    <!-- Active filters summary -->
                    <section class="active-filters-summary" data-component="active-filters-summary" data-populate="active-filters-summary" aria-label="Active filters">
                        <!-- Populated via JS: filter chips and clear controls -->
                    </section>

                    <!-- Results / empty state -->
                    <section class="results-section">
                        <section id="articleResultsSection" class="article-results-list" data-component="article-results-list" data-populate="article-results-list" aria-label="Search results">
                            <!-- Populated via JS: list of article cards -->
                        </section>

                        <section id="emptyResultsSection" class="empty-results-state" data-component="empty-results-state" data-populate="empty-results-state" aria-label="No results" hidden>
                            <!-- Populated via JS when there are zero results -->
                        </section>

                        <nav class="pagination-controls" data-component="pagination-controls" data-populate="pagination-controls" aria-label="Pagination">
                            <!-- Populated via JS: pagination buttons -->
                        </nav>
                    </section>
                </section>

                <aside id="sidebar" class="sidebar-column" aria-label="Sidebar widgets">
                    <!-- Filter sidebar -->
                    <section class="filter-sidebar" data-component="filter-sidebar" data-populate="filter-sidebar">
                        <!-- Populated via JS: categories, content types, topics, date, reading time filters -->
                    </section>
                </aside>
            </div>
        </main>

        <footer class="site-footer" role="contentinfo">
            <div class="container footer-inner">
                <div class="footer-branding">
                    <span class="brand-mark brand-mark-small" aria-hidden="true">FT</span>
                    <span class="footer-meta">&copy; 2025 FutureTech Media</span>
                </div>
                <nav class="footer-nav" aria-label="Footer navigation">
                    <ul class="footer-nav-list">
                        <li class="footer-nav-item">
                            <a href="about.html" class="footer-link" title="Learn more about the site and its mission">About</a>
                        </li>
                        <li class="footer-nav-item">
                            <a href="contact.html" class="footer-link" title="Contact the editorial team or site administrators">Contact</a>
                        </li>
                        <li class="footer-nav-item">
                            <a href="newsletters.html" class="footer-link" title="Manage email newsletter subscriptions and delivery times">Newsletters</a>
                        </li>
                        <li class="footer-nav-item">
                            <a href="account.html" class="footer-link" title="View or update your single-user account profile">Account</a>
                        </li>
                        <li class="footer-nav-item">
                            <a href="settings.html" class="footer-link" title="Customize your technology feed and push notification preferences">Settings</a>
                        </li>
                        <li class="footer-nav-item">
                            <a href="planner.html" class="footer-link" title="View the events you have added to your personal planner">My Planner</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </footer>
    </div>

    <!-- SDK / business logic -->
    <script src="business_logic.js"></script>

    <!-- Page UI logic -->
    <script>
    'use strict';

    document.addEventListener('DOMContentLoaded', function() {
        var searchForm = document.getElementById('searchQueryForm');
        var searchInput = document.getElementById('searchQueryInput');

        var resultsHeaderContainer = document.querySelector('[data-populate="results-header"]');
        var sortControlsContainer = document.querySelector('[data-populate="sort-controls"]');
        var activeFiltersContainer = document.querySelector('[data-populate="active-filters-summary"]');
        var resultsListContainer = document.querySelector('[data-populate="article-results-list"]');
        var emptyResultsContainer = document.querySelector('[data-populate="empty-results-state"]');
        var paginationContainer = document.querySelector('[data-populate="pagination-controls"]');
        var filterSidebarContainer = document.querySelector('[data-populate="filter-sidebar"]');

        var filterOptions = null;
        var readingTimeBucketsMap = {};

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseUrlState() {
            var params = new URLSearchParams(window.location.search);
            var state = {
                query: params.get('query') || undefined,
                categoryId: params.get('categoryId') || undefined,
                content_types: params.get('content_types') || undefined,
                topics: params.get('topics') || undefined,
                date_from: params.get('date_from') || undefined,
                date_to: params.get('date_to') || undefined,
                date_preset: params.get('date_preset') || undefined,
                min_reading_time_minutes: undefined,
                max_reading_time_minutes: undefined,
                reading_time_bucket: params.get('reading_time_bucket') || undefined,
                sort_by: params.get('sort_by') || undefined,
                page: undefined,
                page_size: undefined
            };

            var minReading = params.get('min_reading_time_minutes');
            if (minReading !== null && minReading !== '') {
                var minNum = Number(minReading);
                if (!isNaN(minNum)) {
                    state.min_reading_time_minutes = minNum;
                }
            }

            var maxReading = params.get('max_reading_time_minutes');
            if (maxReading !== null && maxReading !== '') {
                var maxNum = Number(maxReading);
                if (!isNaN(maxNum)) {
                    state.max_reading_time_minutes = maxNum;
                }
            }

            var page = params.get('page');
            if (page !== null && page !== '') {
                var pageNum = Number(page);
                if (!isNaN(pageNum) && pageNum > 0) {
                    state.page = pageNum;
                }
            }

            var pageSize = params.get('page_size');
            if (pageSize !== null && pageSize !== '') {
                var sizeNum = Number(pageSize);
                if (!isNaN(sizeNum) && sizeNum > 0) {
                    state.page_size = sizeNum;
                }
            }

            return state;
        }

        function buildSearchParamsFromState(state) {
            var params = new URLSearchParams();

            function setParam(key, value) {
                if (value === undefined || value === null || value === '') {
                    return;
                }
                params.set(key, String(value));
            }

            setParam('query', state.query);
            setParam('categoryId', state.categoryId);
            setParam('content_types', state.content_types);
            setParam('topics', state.topics);
            setParam('date_from', state.date_from);
            setParam('date_to', state.date_to);
            setParam('date_preset', state.date_preset);
            if (typeof state.min_reading_time_minutes === 'number') {
                setParam('min_reading_time_minutes', state.min_reading_time_minutes);
            }
            if (typeof state.max_reading_time_minutes === 'number') {
                setParam('max_reading_time_minutes', state.max_reading_time_minutes);
            }
            setParam('reading_time_bucket', state.reading_time_bucket);
            setParam('sort_by', state.sort_by);
            if (typeof state.page === 'number') {
                setParam('page', state.page);
            }
            if (typeof state.page_size === 'number') {
                setParam('page_size', state.page_size);
            }

            return params;
        }

        function updateUrlState(partialUpdates, options) {
            var opts = options || {};
            var current = parseUrlState();
            var key;

            for (key in partialUpdates) {
                if (Object.prototype.hasOwnProperty.call(partialUpdates, key)) {
                    var value = partialUpdates[key];
                    if (value === null) {
                        delete current[key];
                    } else {
                        current[key] = value;
                    }
                }
            }

            var params = buildSearchParamsFromState(current);
            var newSearch = params.toString();
            var newUrl = window.location.pathname + (newSearch ? ('?' + newSearch) : '');

            window.history.pushState(current, '', newUrl);

            if (opts.triggerSearch !== false) {
                runSearchFlow();
            }
        }

        function ensureFilterOptionsLoaded() {
            if (filterOptions) {
                return;
            }
            try {
                filterOptions = WebsiteSDK.getArticleSearchFilterOptions();
                readingTimeBucketsMap = {};
                if (filterOptions && Array.isArray(filterOptions.reading_time_buckets)) {
                    filterOptions.reading_time_buckets.forEach(function(bucket) {
                        if (bucket && bucket.key) {
                            readingTimeBucketsMap[bucket.key] = bucket;
                        }
                    });
                }
            } catch (err) {
                console.error('Failed to load filter options', err);
                filterOptions = { categories: [], content_types: [], reading_time_buckets: [], date_presets: [], sort_options: [] };
            }
        }

        function renderFilterSidebar(container, options, state) {
            if (!container || !options) {
                return;
            }

            var categories = Array.isArray(options.categories) ? options.categories : [];
            var contentTypes = Array.isArray(options.content_types) ? options.content_types : [];
            var readingBuckets = Array.isArray(options.reading_time_buckets) ? options.reading_time_buckets : [];
            var datePresets = Array.isArray(options.date_presets) ? options.date_presets : [];

            var selectedCategory = state.categoryId || '';
            var selectedContentTypesSet = new Set();
            if (state.content_types) {
                state.content_types.split(',').forEach(function(ct) {
                    var trimmed = ct.trim();
                    if (trimmed) {
                        selectedContentTypesSet.add(trimmed);
                    }
                });
            }

            var selectedTopics = state.topics || '';
            var selectedPreset = state.date_preset || '';
            var dateFrom = state.date_from || '';
            var dateTo = state.date_to || '';
            var datesDisabled = !!selectedPreset;

            var selectedBucket = state.reading_time_bucket || '';
            var minReading = state.min_reading_time_minutes;
            var maxReading = state.max_reading_time_minutes;
            var alignedMin = '';
            var alignedMax = '';

            if (typeof minReading === 'number') {
                alignedMin = String(minReading);
            }
            if (typeof maxReading === 'number') {
                alignedMax = String(maxReading);
            }
            if (selectedBucket && (!alignedMin && !alignedMax)) {
                var bucketMeta = readingTimeBucketsMap[selectedBucket];
                if (bucketMeta) {
                    if (typeof bucketMeta.min_minutes === 'number') {
                        alignedMin = String(bucketMeta.min_minutes);
                    }
                    if (typeof bucketMeta.max_minutes === 'number') {
                        alignedMax = String(bucketMeta.max_minutes);
                    }
                }
            }

            var categoryOptionsHtml = categories.map(function(cat) {
                var selectedAttr = cat.key === selectedCategory ? ' selected' : '';
                return '<option value="' + escapeHtml(cat.key) + '"' + selectedAttr + '>' + escapeHtml(cat.label || cat.key) + '</option>';
            }).join('');

            var contentTypeHtml = contentTypes.map(function(ct) {
                var checkedAttr = selectedContentTypesSet.has(ct.key) ? ' checked' : '';
                return '<div class="filter-option">' +
                    '<label>' +
                    '<input type="checkbox" class="filter-checkbox" value="' + escapeHtml(ct.key) + '" data-action="change-content-type"' + checkedAttr + '> ' +
                    '<span class="filter-label-text">' + escapeHtml(ct.label || ct.key) + '</span>' +
                    '</label>' +
                    '</div>';
            }).join('');

            var datePresetOptionsHtml = ['<option value="">Any time</option>'].concat(datePresets.map(function(preset) {
                var selectedAttr = preset.key === selectedPreset ? ' selected' : '';
                return '<option value="' + escapeHtml(preset.key) + '"' + selectedAttr + '>' + escapeHtml(preset.label || preset.key) + '</option>';
            })).join('');

            var readingBucketHtml = readingBuckets.map(function(bucket) {
                var checkedAttr = bucket.key === selectedBucket ? ' checked' : '';
                return '<div class="filter-option">' +
                    '<label>' +
                    '<input type="radio" name="reading_time_bucket" class="filter-radio" value="' + escapeHtml(bucket.key) + '" data-action="change-reading-time-bucket"' + checkedAttr + '> ' +
                    '<span class="filter-label-text">' + escapeHtml(bucket.label || bucket.key) + '</span>' +
                    '</label>' +
                    '</div>';
            }).join('');

            var disabledAttrFrom = datesDisabled ? ' disabled' : '';
            var disabledAttrTo = datesDisabled ? ' disabled' : '';

            container.innerHTML = '\n                <div class="filter-panel">\n                    <h2 class="filter-panel-title">Filter articles</h2>\n                </div>\n\n                <div class="filter-panel">\n                    <h3 class="filter-panel-subtitle">Category</h3>\n                    <div class="filter-panel-body">\n                        <label class="visually-hidden" for="categoryFilterSelect">Filter by category</label>\n                        <select id="categoryFilterSelect" class="form-control" data-action="change-category">\n                            <option value="">All categories</option>\n                            ' + categoryOptionsHtml + '\n                        </select>\n                    </div>\n                </div>\n\n                <div class="filter-panel">\n                    <h3 class="filter-panel-subtitle">Content type</h3>\n                    <div class="filter-panel-body">\n                        ' + (contentTypeHtml || '<p class="filter-empty">No content types available.</p>') + '\n                    </div>\n                </div>\n\n                <div class="filter-panel">\n                    <h3 class="filter-panel-subtitle">Topics</h3>\n                    <div class="filter-panel-body">\n                        <label for="topicsInput" class="filter-label">Topic tags (comma-separated)</label>\n                        <input type="text" id="topicsInput" class="form-control" placeholder="e.g., ai_ethics, spacex" value="' + escapeHtml(selectedTopics || '') + '" data-action="change-topics">\n                    </div>\n                </div>\n\n                <div class="filter-panel">\n                    <h3 class="filter-panel-subtitle">Publish date</h3>\n                    <div class="filter-panel-body">\n                        <label for="datePresetSelect" class="filter-label">Preset</label>\n                        <select id="datePresetSelect" class="form-control" data-action="change-date-preset">\n                            ' + datePresetOptionsHtml + '\n                        </select>\n                        <div class="filter-inline-group">\n                            <div class="filter-inline-item">\n                                <label for="dateFromInput" class="filter-label">From</label>\n                                <input type="date" id="dateFromInput" class="form-control" value="' + escapeHtml(dateFrom) + '" data-action="change-custom-date"' + disabledAttrFrom + '>\n                            </div>\n                            <div class="filter-inline-item">\n                                <label for="dateToInput" class="filter-label">To</label>\n                                <input type="date" id="dateToInput" class="form-control" value="' + escapeHtml(dateTo) + '" data-action="change-custom-date"' + disabledAttrTo + '>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n\n                <div class="filter-panel">\n                    <h3 class="filter-panel-subtitle">Reading time</h3>\n                    <div class="filter-panel-body">\n                        <div class="filter-group">\n                            ' + (readingBucketHtml || '<p class="filter-empty">No reading time buckets available.</p>') + '\n                        </div>\n                        <div class="filter-inline-group">\n                            <div class="filter-inline-item">\n                                <label for="readingTimeMinInput" class="filter-label">Min (minutes)</label>\n                                <input type="number" id="readingTimeMinInput" class="form-control" min="0" value="' + escapeHtml(alignedMin) + '" data-action="change-reading-time-range">\n                            </div>\n                            <div class="filter-inline-item">\n                                <label for="readingTimeMaxInput" class="filter-label">Max (minutes)</label>\n                                <input type="number" id="readingTimeMaxInput" class="form-control" min="0" value="' + escapeHtml(alignedMax) + '" data-action="change-reading-time-range">\n                            </div>\n                        </div>\n                    </div>\n                </div>\n\n                <div class="filter-panel filter-panel-actions">\n                    <div class="filter-panel-body filter-actions">\n                        <button type="button" class="btn btn-secondary btn-reset-filters" data-action="reset-filters">Reset all filters</button>\n                    </div>\n                </div>\n            ';
        }

        function renderSortControls(container, options, state) {
            if (!container || !options) {
                return;
            }
            var sortOptions = Array.isArray(options.sort_options) ? options.sort_options : [];
            var sortBy = state.sort_by || 'newest_first';
            var pageSize = state.page_size || 20;

            var sortOptionsHtml = sortOptions.map(function(opt) {
                var selectedAttr = opt.key === sortBy ? ' selected' : '';
                return '<option value="' + escapeHtml(opt.key) + '"' + selectedAttr + '>' + escapeHtml(opt.label || opt.key) + '</option>';
            }).join('');

            var pageSizeOptions = [10, 20, 50];
            var pageSizeHtml = pageSizeOptions.map(function(size) {
                var selectedAttr = size === pageSize ? ' selected' : '';
                return '<option value="' + size + '"' + selectedAttr + '>' + size + ' per page</option>';
            }).join('');

            container.innerHTML = '\n                <div class="sort-controls-inner">\n                    <div class="sort-select-group">\n                        <label for="sortBySelect" class="sort-label">Sort by</label>\n                        <select id="sortBySelect" class="form-control sort-select" data-action="change-sort">\n                            ' + sortOptionsHtml + '\n                        </select>\n                    </div>\n                    <div class="page-size-select-group">\n                        <label for="pageSizeSelect" class="sort-label">Results per page</label>\n                        <select id="pageSizeSelect" class="form-control page-size-select" data-action="change-page-size">\n                            ' + pageSizeHtml + '\n                        </select>\n                    </div>\n                </div>\n            ';
        }

        function renderActiveFiltersSummary(container, options, state) {
            if (!container) {
                return;
            }

            var chips = [];

            if (state.categoryId) {
                var categoryLabel = state.categoryId;
                if (options && Array.isArray(options.categories)) {
                    options.categories.forEach(function(cat) {
                        if (cat.key === state.categoryId) {
                            categoryLabel = cat.label || cat.key;
                        }
                    });
                }
                chips.push('<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-type="categoryId">' +
                    '<span class="filter-chip-label">Category: ' + escapeHtml(categoryLabel) + '</span>' +
                    '<span class="filter-chip-remove" aria-hidden="true">&times;</span>' +
                    '<span class="visually-hidden">Remove category filter</span>' +
                    '</button>');
            }

            if (state.content_types) {
                var ctKeys = state.content_types.split(',').map(function(ct) { return ct.trim(); }).filter(function(ct) { return ct; });
                ctKeys.forEach(function(key) {
                    var label = key;
                    if (options && Array.isArray(options.content_types)) {
                        options.content_types.forEach(function(ct) {
                            if (ct.key === key) {
                                label = ct.label || ct.key;
                            }
                        });
                    }
                    chips.push('<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-type="content_type" data-filter-key="' + escapeHtml(key) + '">' +
                        '<span class="filter-chip-label">Type: ' + escapeHtml(label) + '</span>' +
                        '<span class="filter-chip-remove" aria-hidden="true">&times;</span>' +
                        '<span class="visually-hidden">Remove content type filter ' + escapeHtml(label) + '</span>' +
                        '</button>');
                });
            }

            if (state.topics) {
                var topics = state.topics.split(',').map(function(tp) { return tp.trim(); }).filter(function(tp) { return tp; });
                topics.forEach(function(topic) {
                    chips.push('<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-type="topic" data-filter-key="' + escapeHtml(topic) + '">' +
                        '<span class="filter-chip-label">Topic: ' + escapeHtml(topic) + '</span>' +
                        '<span class="filter-chip-remove" aria-hidden="true">&times;</span>' +
                        '<span class="visually-hidden">Remove topic filter ' + escapeHtml(topic) + '</span>' +
                        '</button>');
                });
            }

            if (state.date_preset) {
                var presetLabel = state.date_preset;
                if (options && Array.isArray(options.date_presets)) {
                    options.date_presets.forEach(function(preset) {
                        if (preset.key === state.date_preset) {
                            presetLabel = preset.label || preset.key;
                        }
                    });
                }
                chips.push('<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-type="date_preset">' +
                    '<span class="filter-chip-label">Date: ' + escapeHtml(presetLabel) + '</span>' +
                    '<span class="filter-chip-remove" aria-hidden="true">&times;</span>' +
                    '<span class="visually-hidden">Remove date preset filter</span>' +
                    '</button>');
            } else if (state.date_from || state.date_to) {
                var rangeLabel = '';
                if (state.date_from && state.date_to) {
                    rangeLabel = state.date_from + ' to ' + state.date_to;
                } else if (state.date_from) {
                    rangeLabel = 'From ' + state.date_from;
                } else if (state.date_to) {
                    rangeLabel = 'Up to ' + state.date_to;
                }
                if (rangeLabel) {
                    chips.push('<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-type="date_range">' +
                        '<span class="filter-chip-label">Date: ' + escapeHtml(rangeLabel) + '</span>' +
                        '<span class="filter-chip-remove" aria-hidden="true">&times;</span>' +
                        '<span class="visually-hidden">Remove custom date range filter</span>' +
                        '</button>');
                }
            }

            if (state.reading_time_bucket) {
                var bucketLabel = state.reading_time_bucket;
                if (filterOptions && Array.isArray(filterOptions.reading_time_buckets)) {
                    filterOptions.reading_time_buckets.forEach(function(bucket) {
                        if (bucket.key === state.reading_time_bucket) {
                            bucketLabel = bucket.label || bucket.key;
                        }
                    });
                }
                chips.push('<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-type="reading_time_bucket">' +
                    '<span class="filter-chip-label">Reading time: ' + escapeHtml(bucketLabel) + '</span>' +
                    '<span class="filter-chip-remove" aria-hidden="true">&times;</span>' +
                    '<span class="visually-hidden">Remove reading time bucket filter</span>' +
                    '</button>');
            } else if (typeof state.min_reading_time_minutes === 'number' || typeof state.max_reading_time_minutes === 'number') {
                var rtLabel = '';
                if (typeof state.min_reading_time_minutes === 'number' && typeof state.max_reading_time_minutes === 'number') {
                    rtLabel = state.min_reading_time_minutes + '–' + state.max_reading_time_minutes + ' min';
                } else if (typeof state.min_reading_time_minutes === 'number') {
                    rtLabel = state.min_reading_time_minutes + '+ min';
                } else if (typeof state.max_reading_time_minutes === 'number') {
                    rtLabel = 'Up to ' + state.max_reading_time_minutes + ' min';
                }
                if (rtLabel) {
                    chips.push('<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-type="reading_time_range">' +
                        '<span class="filter-chip-label">Reading time: ' + escapeHtml(rtLabel) + '</span>' +
                        '<span class="filter-chip-remove" aria-hidden="true">&times;</span>' +
                        '<span class="visually-hidden">Remove reading time filter</span>' +
                        '</button>');
                }
            }

            if (!chips.length) {
                container.innerHTML = '';
                return;
            }

            var chipsHtml = chips.join('');
            container.innerHTML = '\n                <div class="active-filters-inner">\n                    <div class="active-filters-chips">' + chipsHtml + '</div>\n                    <div class="active-filters-actions">\n                        <button type="button" class="btn-link clear-filters-link" data-action="clear-all-filters">Clear all filters</button>\n                    </div>\n                </div>\n            ';
        }

        function renderResultsHeader(container, searchResponse, state, options) {
            if (!container || !searchResponse) {
                return;
            }

            var total = typeof searchResponse.total_results === 'number' ? searchResponse.total_results : 0;
            var page = typeof searchResponse.page === 'number' ? searchResponse.page : 1;
            var pageSize = typeof searchResponse.page_size === 'number' ? searchResponse.page_size : 20;
            var totalPages = pageSize > 0 ? Math.max(1, Math.ceil(total / pageSize)) : 1;

            var titleParts = [];
            titleParts.push(total + (total === 1 ? ' article' : ' articles'));

            var queryText = searchResponse.query || state.query;
            if (queryText) {
                titleParts.push('for \"' + escapeHtml(queryText) + '\"');
            }

            if (state.categoryId) {
                var categoryLabel = state.categoryId;
                if (options && Array.isArray(options.categories)) {
                    options.categories.forEach(function(cat) {
                        if (cat.key === state.categoryId) {
                            categoryLabel = cat.label || cat.key;
                        }
                    });
                }
                titleParts.push('in ' + escapeHtml(categoryLabel));
            }

            var title = titleParts.join(' ');

            container.innerHTML = '\n                <div class="results-header-inner">\n                    <div class="results-header-main">\n                        <h1 class="results-title">' + title + '</h1>\n                    </div>\n                    <div class="results-header-meta">Page ' + page + ' of ' + totalPages + '</div>\n                </div>\n            ';
        }

        function renderArticleResultsList(container, results) {
            if (!container) {
                return;
            }
            if (!Array.isArray(results) || !results.length) {
                container.innerHTML = '';
                return;
            }

            var cardsHtml = results.map(function(article) {
                var metaParts = [];

                if (article.publish_date) {
                    var dateLabel = '';
                    try {
                        var d = new Date(article.publish_date);
                        if (!isNaN(d.getTime())) {
                            dateLabel = d.toLocaleDateString();
                        }
                    } catch (e) {
                        dateLabel = '';
                    }
                    if (dateLabel) {
                        metaParts.push(dateLabel);
                    }
                }

                if (article.primary_author_name) {
                    metaParts.push('By ' + escapeHtml(article.primary_author_name));
                }

                if (typeof article.reading_time_minutes === 'number') {
                    metaParts.push(article.reading_time_minutes + ' min read');
                }

                var metaLine = metaParts.join(' b7 ');

                var contextParts = [];
                if (article.category_name || article.category) {
                    contextParts.push(escapeHtml(article.category_name || article.category));
                }
                if (article.content_type_name || article.content_type) {
                    contextParts.push(escapeHtml(article.content_type_name || article.content_type));
                }

                var contextLine = contextParts.join(' b7 ');

                var topicsLine = '';
                if (Array.isArray(article.topics) && article.topics.length) {
                    topicsLine = article.topics.join(', ');
                }

                var ratingLine = '';
                if (typeof article.rating_average === 'number' && typeof article.rating_scale === 'number') {
                    var avg = article.rating_average.toFixed(1);
                    var scale = article.rating_scale;
                    ratingLine = avg + ' / ' + scale;
                    if (typeof article.rating_count === 'number') {
                        ratingLine += ' (' + article.rating_count + ' ratings)';
                    }
                }

                var editorsPickBadge = article.is_editors_pick ? '<span class="badge badge-editors-pick">Editor\'s pick</span>' : '';

                var imageHtml = '';
                if (article.image_url) {
                    imageHtml = '<div class="article-card-media">' +
                        '<img src="' + escapeHtml(article.image_url) + '" alt="" class="article-card-image">' +
                        '</div>';
                }

                return '\n                    <article class="article-card" data-action="result-click" data-article-id="' + escapeHtml(article.article_id || article.id || '') + '">\n                        ' + imageHtml + '\n                        <div class="article-card-body">\n                            <header class="article-card-header">\n                                <h2 class="article-card-title">\n                                    <a href="javascript:void(0)" class="article-card-link" data-action="result-click" data-article-id="' + escapeHtml(article.article_id || article.id || '') + '">' + escapeHtml(article.title || '') + '</a>\n                                </h2>\n                                <div class="article-card-meta">' + escapeHtml(metaLine) + '</div>\n                            </header>\n                            <div class="article-card-summary">' + escapeHtml(article.summary || '') + '</div>\n                            <footer class="article-card-footer">\n                                <div class="article-card-context">' + (contextLine ? escapeHtml(contextLine) : '') + '</div>\n                                <div class="article-card-tags">' + (topicsLine ? 'Topics: ' + escapeHtml(topicsLine) : '') + '</div>\n                                <div class="article-card-rating">' + escapeHtml(ratingLine) + '</div>\n                                <div class="article-card-flags">' + editorsPickBadge + '</div>\n                            </footer>\n                        </div>\n                    </article>\n                ';
            }).join('');

            container.innerHTML = cardsHtml;
        }

        function renderPaginationControls(container, totalResults, page, pageSize) {
            if (!container) {
                return;
            }
            var total = typeof totalResults === 'number' ? totalResults : 0;
            var currentPage = typeof page === 'number' ? page : 1;
            var size = typeof pageSize === 'number' ? pageSize : 20;
            var totalPages = size > 0 ? Math.max(1, Math.ceil(total / size)) : 1;

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            var prevDisabled = currentPage <= 1 ? ' disabled' : '';
            var nextDisabled = currentPage >= totalPages ? ' disabled' : '';

            var pagesHtml = '';
            var maxButtons = 7;
            var startPage = Math.max(1, currentPage - 3);
            var endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            var p;
            for (p = startPage; p <= endPage; p += 1) {
                var activeClass = p === currentPage ? ' is-active' : '';
                pagesHtml += '<button type="button" class="page-link" data-action="pagination-go" data-page="' + p + '">' +
                    '<span class="page-number' + activeClass + '">' + p + '</span>' +
                    '</button>';
            }

            container.innerHTML = '\n                <div class="pagination-inner">\n                    <button type="button" class="page-link page-prev" data-action="pagination-go" data-page="prev"' + prevDisabled + '>Previous</button>\n                    <div class="pagination-pages">' + pagesHtml + '</div>\n                    <button type="button" class="page-link page-next" data-action="pagination-go" data-page="next"' + nextDisabled + '>Next</button>\n                </div>\n            ';
        }

        function renderEmptyResultsState(container, state) {
            if (!container) {
                return;
            }

            var queryText = state.query ? ' for \"' + escapeHtml(state.query) + '\"' : '';

            container.innerHTML = '\n                <div class="empty-results-card">\n                    <div class="empty-results-body">\n                        <h2 class="empty-results-title">No articles matched your current search' + queryText + '.</h2>\n                        <p class="empty-results-text">Try adjusting or clearing some of the filters to see more technology and space articles.</p>\n                        <div class="empty-results-actions">\n                            <button type="button" class="btn btn-primary" data-action="clear-all-filters">Clear all filters</button>\n                        </div>\n                    </div>\n                </div>\n            ';
        }

        function runSearchFlow() {
            ensureFilterOptionsLoaded();
            var state = parseUrlState();

            if (searchInput) {
                searchInput.value = state.query || '';
            }

            if (filterSidebarContainer) {
                renderFilterSidebar(filterSidebarContainer, filterOptions, state);
            }
            if (sortControlsContainer) {
                renderSortControls(sortControlsContainer, filterOptions, state);
            }
            if (activeFiltersContainer) {
                renderActiveFiltersSummary(activeFiltersContainer, filterOptions, state);
            }

            var contentTypesArray;
            if (state.content_types) {
                contentTypesArray = state.content_types.split(',').map(function(ct) { return ct.trim(); }).filter(function(ct) { return ct; });
                if (!contentTypesArray.length) {
                    contentTypesArray = undefined;
                }
            }

            var topicsArray;
            if (state.topics) {
                topicsArray = state.topics.split(',').map(function(tp) { return tp.trim(); }).filter(function(tp) { return tp; });
                if (!topicsArray.length) {
                    topicsArray = undefined;
                }
            }

            var response;
            try {
                response = WebsiteSDK.searchArticles(
                    state.query || undefined,
                    state.categoryId || undefined,
                    contentTypesArray,
                    topicsArray,
                    state.date_from || undefined,
                    state.date_to || undefined,
                    state.date_preset || undefined,
                    typeof state.min_reading_time_minutes === 'number' ? state.min_reading_time_minutes : undefined,
                    typeof state.max_reading_time_minutes === 'number' ? state.max_reading_time_minutes : undefined,
                    state.reading_time_bucket || undefined,
                    state.sort_by || undefined,
                    typeof state.page === 'number' ? state.page : undefined,
                    typeof state.page_size === 'number' ? state.page_size : undefined
                );
            } catch (err) {
                console.error('Failed to search articles', err);
                if (resultsListContainer) {
                    resultsListContainer.innerHTML = '';
                }
                if (paginationContainer) {
                    paginationContainer.innerHTML = '';
                }
                if (emptyResultsContainer) {
                    emptyResultsContainer.hidden = false;
                    emptyResultsContainer.innerHTML = '<div class="empty-results-card"><div class="empty-results-body"><h2 class="empty-results-title">Unable to load articles.</h2><p class="empty-results-text">Please try again in a moment.</p></div></div>';
                }
                bindActionHandlers();
                return;
            }

            if (resultsHeaderContainer) {
                renderResultsHeader(resultsHeaderContainer, response, state, filterOptions);
            }

            var total = typeof response.total_results === 'number' ? response.total_results : 0;
            if (total > 0 && Array.isArray(response.results) && response.results.length) {
                if (resultsListContainer) {
                    resultsListContainer.hidden = false;
                    renderArticleResultsList(resultsListContainer, response.results);
                }
                if (emptyResultsContainer) {
                    emptyResultsContainer.hidden = true;
                    emptyResultsContainer.innerHTML = '';
                }
                if (paginationContainer) {
                    renderPaginationControls(paginationContainer, response.total_results, response.page, response.page_size);
                }
            } else {
                if (resultsListContainer) {
                    resultsListContainer.hidden = true;
                    resultsListContainer.innerHTML = '';
                }
                if (paginationContainer) {
                    paginationContainer.innerHTML = '';
                }
                if (emptyResultsContainer) {
                    emptyResultsContainer.hidden = false;
                    renderEmptyResultsState(emptyResultsContainer, state);
                }
            }

            bindActionHandlers();
        }

        function handleSearchSubmit(event) {
            event.preventDefault();
            var value = '';
            if (searchInput) {
                value = searchInput.value.trim();
            }
            updateUrlState({ query: value || null, page: 1 });
        }

        function handleSortChange(event) {
            var value = event.target.value || '';
            updateUrlState({ sort_by: value || null, page: 1 });
        }

        function handlePageSizeChange(event) {
            var raw = event.target.value || '';
            var size = Number(raw);
            var newSize = !isNaN(size) && size > 0 ? size : null;
            updateUrlState({ page_size: newSize, page: 1 });
        }

        function handleCategoryChange(event) {
            var value = event.target.value || '';
            updateUrlState({ categoryId: value || null, page: 1 });
        }

        function handleContentTypesChange() {
            var checkboxes = document.querySelectorAll('[data-action="change-content-type"]');
            var selected = [];
            checkboxes.forEach(function(cb) {
                if (cb.checked && cb.value) {
                    selected.push(cb.value);
                }
            });
            var value = selected.length ? selected.join(',') : null;
            updateUrlState({ content_types: value, page: 1 });
        }

        function handleTopicsChange(event) {
            var raw = event.target.value || '';
            var tokens = raw.split(',').map(function(tp) { return tp.trim(); }).filter(function(tp) { return tp; });
            var value = tokens.length ? tokens.join(',') : null;
            updateUrlState({ topics: value, page: 1 });
        }

        function handleDatePresetChange(event) {
            var value = event.target.value || '';
            var updates = { date_preset: value || null, page: 1 };
            if (value) {
                updates.date_from = null;
                updates.date_to = null;
            }
            updateUrlState(updates);
        }

        function handleCustomDateChange() {
            var fromInput = document.getElementById('dateFromInput');
            var toInput = document.getElementById('dateToInput');
            var fromValue = fromInput ? (fromInput.value || '').trim() : '';
            var toValue = toInput ? (toInput.value || '').trim() : '';

            var updates = { page: 1 };
            if (fromValue) {
                updates.date_from = fromValue;
            } else {
                updates.date_from = null;
            }
            if (toValue) {
                updates.date_to = toValue;
            } else {
                updates.date_to = null;
            }
            updates.date_preset = null;

            updateUrlState(updates);
        }

        function handleReadingTimeBucketChange(event) {
            var bucketKey = event.target.value || '';
            if (!bucketKey) {
                updateUrlState({ reading_time_bucket: null, page: 1 });
                return;
            }

            var bucketMeta = readingTimeBucketsMap[bucketKey];
            if (bucketMeta) {
                var minInput = document.getElementById('readingTimeMinInput');
                var maxInput = document.getElementById('readingTimeMaxInput');
                if (minInput) {
                    minInput.value = typeof bucketMeta.min_minutes === 'number' ? String(bucketMeta.min_minutes) : '';
                }
                if (maxInput) {
                    maxInput.value = typeof bucketMeta.max_minutes === 'number' ? String(bucketMeta.max_minutes) : '';
                }
            }

            updateUrlState({ reading_time_bucket: bucketKey, min_reading_time_minutes: null, max_reading_time_minutes: null, page: 1 });
        }

        function handleReadingTimeRangeChange() {
            var minInput = document.getElementById('readingTimeMinInput');
            var maxInput = document.getElementById('readingTimeMaxInput');
            var minRaw = minInput ? minInput.value : '';
            var maxRaw = maxInput ? maxInput.value : '';

            var updates = { page: 1, reading_time_bucket: null };

            if (minRaw !== '') {
                var minVal = Number(minRaw);
                if (!isNaN(minVal) && minVal >= 0) {
                    updates.min_reading_time_minutes = minVal;
                } else {
                    updates.min_reading_time_minutes = null;
                }
            } else {
                updates.min_reading_time_minutes = null;
            }

            if (maxRaw !== '') {
                var maxVal = Number(maxRaw);
                if (!isNaN(maxVal) && maxVal >= 0) {
                    updates.max_reading_time_minutes = maxVal;
                } else {
                    updates.max_reading_time_minutes = null;
                }
            } else {
                updates.max_reading_time_minutes = null;
            }

            updateUrlState(updates);
        }

        function handlePaginationClick(event) {
            event.preventDefault();
            var target = event.currentTarget;
            var pageAttr = target.getAttribute('data-page');
            var state = parseUrlState();
            var currentPage = typeof state.page === 'number' ? state.page : 1;
            var newPage = currentPage;

            if (pageAttr === 'prev') {
                newPage = currentPage - 1;
            } else if (pageAttr === 'next') {
                newPage = currentPage + 1;
            } else {
                var num = Number(pageAttr);
                if (!isNaN(num) && num > 0) {
                    newPage = num;
                }
            }

            if (newPage < 1) {
                newPage = 1;
            }
            if (newPage === currentPage) {
                return;
            }

            updateUrlState({ page: newPage });
        }

        function handleResultClick(event) {
            event.preventDefault();
            var target = event.currentTarget;
            var articleId = target.getAttribute('data-article-id');
            if (!articleId) {
                return;
            }
            window.location.href = 'article.html?id=' + encodeURIComponent(articleId);
        }

        function handleClearAllFilters() {
            updateUrlState({
                categoryId: null,
                content_types: null,
                topics: null,
                date_from: null,
                date_to: null,
                date_preset: null,
                min_reading_time_minutes: null,
                max_reading_time_minutes: null,
                reading_time_bucket: null,
                page: 1
            });
        }

        function handleResetFilters() {
            handleClearAllFilters();
        }

        function handleRemoveFilterChip(event) {
            var target = event.currentTarget;
            var type = target.getAttribute('data-filter-type');
            var key = target.getAttribute('data-filter-key');
            var state = parseUrlState();

            var updates = { page: 1 };

            if (type === 'categoryId') {
                updates.categoryId = null;
            } else if (type === 'content_type') {
                if (state.content_types) {
                    var list = state.content_types.split(',').map(function(ct) { return ct.trim(); }).filter(function(ct) { return ct; });
                    var filtered = list.filter(function(ct) { return ct !== key; });
                    updates.content_types = filtered.length ? filtered.join(',') : null;
                }
            } else if (type === 'topic') {
                if (state.topics) {
                    var topics = state.topics.split(',').map(function(tp) { return tp.trim(); }).filter(function(tp) { return tp; });
                    var remaining = topics.filter(function(tp) { return tp !== key; });
                    updates.topics = remaining.length ? remaining.join(',') : null;
                }
            } else if (type === 'date_preset') {
                updates.date_preset = null;
            } else if (type === 'date_range') {
                updates.date_from = null;
                updates.date_to = null;
            } else if (type === 'reading_time_bucket') {
                updates.reading_time_bucket = null;
            } else if (type === 'reading_time_range') {
                updates.min_reading_time_minutes = null;
                updates.max_reading_time_minutes = null;
            }

            updateUrlState(updates);
        }

        function bindActionHandlers() {
            var actionElements = document.querySelectorAll('[data-action]');
            actionElements.forEach(function(el) {
                if (el.dataset.bound === 'true') {
                    return;
                }
                var action = el.getAttribute('data-action');
                if (!action) {
                    return;
                }

                if (action === 'submit-search') {
                    el.addEventListener('submit', handleSearchSubmit);
                } else if (action === 'change-sort') {
                    el.addEventListener('change', handleSortChange);
                } else if (action === 'change-page-size') {
                    el.addEventListener('change', handlePageSizeChange);
                } else if (action === 'change-category') {
                    el.addEventListener('change', handleCategoryChange);
                } else if (action === 'change-content-type') {
                    el.addEventListener('change', handleContentTypesChange);
                } else if (action === 'change-topics') {
                    el.addEventListener('change', handleTopicsChange);
                    el.addEventListener('blur', handleTopicsChange);
                } else if (action === 'change-date-preset') {
                    el.addEventListener('change', handleDatePresetChange);
                } else if (action === 'change-custom-date') {
                    el.addEventListener('change', handleCustomDateChange);
                } else if (action === 'change-reading-time-bucket') {
                    el.addEventListener('change', handleReadingTimeBucketChange);
                } else if (action === 'change-reading-time-range') {
                    el.addEventListener('change', handleReadingTimeRangeChange);
                } else if (action === 'pagination-go') {
                    el.addEventListener('click', handlePaginationClick);
                } else if (action === 'result-click') {
                    el.addEventListener('click', handleResultClick);
                } else if (action === 'clear-all-filters') {
                    el.addEventListener('click', handleClearAllFilters);
                } else if (action === 'reset-filters') {
                    el.addEventListener('click', handleResetFilters);
                } else if (action === 'remove-filter-chip') {
                    el.addEventListener('click', handleRemoveFilterChip);
                }

                el.dataset.bound = 'true';
            });
        }

        if (searchForm) {
            searchForm.dataset.bound = 'false';
        }

        runSearchFlow();
        window.addEventListener('popstate', function() {
            runSearchFlow();
        });
    });
    </script>
</body>
</html>
