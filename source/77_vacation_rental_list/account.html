<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account &amp; Profile - VacayStay</title>

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap" rel="stylesheet">

  <!-- Framework Stylesheet -->
  
  <link rel="stylesheet" href="account.css">
</head>
<body class="layout">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="Vacation rentals home">
        <span class="brand-mark">V</span>
        <span class="brand-text">
          <span class="brand-name">VacayStay</span>
          <span class="brand-tagline">Vacation rentals &amp; stays</span>
        </span>
      </a>

      <nav class="main-nav" aria-label="Primary">
        <ul class="main-nav-list">
          <li class="main-nav-item">
            <a href="index.html" class="main-nav-link">Home</a>
          </li>
          <li class="main-nav-item">
            <a href="favorites.html" class="main-nav-link">Favorites</a>
          </li>
          <li class="main-nav-item">
            <a href="trips.html" class="main-nav-link">Trips</a>
          </li>
          <li class="main-nav-item">
            <a href="saved_searches.html" class="main-nav-link">Saved Searches</a>
          </li>
          <li class="main-nav-item">
            <a href="messages.html" class="main-nav-link">Messages<span class="nav-pill nav-pill-count is-hidden" data-populate="unread-messages-count" aria-label="Unread messages"></span></a>
          </li>
          <li class="main-nav-item">
            <a href="account.html" class="main-nav-link is-active">Account</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="content" class="page-content" role="main">
    <div class="account-page container">
      <section class="account-section-router-band" data-component="account-section-router">
        <div class="section-router-pill-group" role="tablist" aria-label="Account sections">
          <button type="button" class="section-router-pill is-active" data-action="change-section" data-section-target="overview" aria-pressed="true">Overview</button>
          <button type="button" class="section-router-pill" data-action="change-section" data-section-target="profile" aria-pressed="false">Profile &amp; preferences</button>
          <button type="button" class="section-router-pill" data-action="change-section" data-section-target="signup" aria-pressed="false">Sign up</button>
        </div>
      </section>

      <nav class="account-header-tabs" data-component="account-header-tabs" aria-label="Account views">
        <button type="button" class="account-tab is-active" data-action="change-section" data-section-target="overview" aria-current="page">Overview</button>
        <button type="button" class="account-tab" data-action="change-section" data-section-target="profile">Profile &amp; preferences</button>
      </nav>

      <div class="account-grid">
        <div class="account-grid-left">
          <article class="card account-overview-card" data-component="account-overview-panel" data-populate="account-overview">
            <!-- Overview content populated via JavaScript -->
          </article>

          <article class="card profile-summary-card" data-component="profile-summary-inline" data-populate="profile-summary">
            <!-- Profile summary populated via JavaScript -->
          </article>

          <article class="card quick-links-card" data-component="account-overview-quick-links" data-populate="quick-links">
            <!-- Quick links populated via JavaScript -->
          </article>
        </div>

        <div class="account-grid-right">
          <section class="card profile-form-card" data-component="profile-preferences-form" data-populate="profile-form">
            <!-- Profile form populated via JavaScript -->
          </section>

          <section class="card signup-form-card" data-component="signup-form" data-populate="signup-form">
            <!-- Signup form populated via JavaScript -->
          </section>
        </div>
      </div>

      <aside class="card api-status-card" data-component="api-status-feedback" data-populate="api-status" aria-live="polite">
        <!-- API status feedback populated via JavaScript -->
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-top">
        <div class="footer-brand">
          <div class="footer-brand-mark">V</div>
          <div class="footer-brand-text">
            <div class="footer-brand-name">VacayStay</div>
            <p class="footer-brand-copy">Discover and book handpicked vacation rentals worldwide.</p>
          </div>
        </div>

        <nav class="footer-nav" aria-label="Footer">
          <ul class="footer-nav-list">
            <li class="footer-nav-item"><a href="about.html" class="footer-nav-link">About</a></li>
            <li class="footer-nav-item"><a href="contact.html" class="footer-nav-link">Contact</a></li>
            <li class="footer-nav-item"><a href="help.html" class="footer-nav-link">Help &amp; FAQ</a></li>
            <li class="footer-nav-item"><a href="terms.html" class="footer-nav-link">Terms</a></li>
            <li class="footer-nav-item"><a href="privacy.html" class="footer-nav-link">Privacy</a></li>
          </ul>
        </nav>
      </div>

      <div class="footer-bottom">
        <p class="footer-meta">&copy; <span class="footer-year">2026</span> VacayStay. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      const state = {
        section: 'overview',
        accountProfile: null,
        overview: null,
        hasOverviewLoaded: false,
        hasProfileLoaded: false,
        noAccount: false,
        profileDirty: false,
        isSubmittingProfile: false,
        isSubmittingSignup: false,
        statusType: 'idle',
        statusMessage: 'Ready',
        statusDetail: ''
      };

      const dom = {
        sectionRouter: document.querySelector('[data-component="account-section-router"]'),
        headerTabs: document.querySelector('[data-component="account-header-tabs"]'),
        overviewPanel: document.querySelector('[data-component="account-overview-panel"]'),
        profileSummary: document.querySelector('[data-component="profile-summary-inline"]'),
        quickLinksPanel: document.querySelector('[data-component="account-overview-quick-links"]'),
        profileFormCard: document.querySelector('[data-component="profile-preferences-form"]'),
        signupFormCard: document.querySelector('[data-component="signup-form"]'),
        apiStatusCard: document.querySelector('[data-component="api-status-feedback"]'),
        messagesNavBadge: document.querySelector('.main-nav-link[href="messages.html"] .nav-pill-count')
      };

      function getSectionFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const sectionParam = (params.get('section') || '').toLowerCase();
        if (sectionParam === 'signup' || sectionParam === 'profile' || sectionParam === 'overview') {
          return sectionParam;
        }
        return 'overview';
      }

      function updateUrlSection(nextSection, replace) {
        const url = new URL(window.location.href);
        url.searchParams.set('section', nextSection);
        if (replace) {
          window.history.replaceState({ section: nextSection }, '', url.toString());
        } else {
          window.history.pushState({ section: nextSection }, '', url.toString());
        }
      }

      function setStatus(type, message, detail) {
        state.statusType = type;
        state.statusMessage = message || '';
        state.statusDetail = detail || '';
        renderApiStatus(dom.apiStatusCard);
      }

      function renderApiStatus(container) {
        if (!container) return;
        const type = state.statusType || 'idle';
        const message = state.statusMessage || '';
        const detail = state.statusDetail || '';
        let label = '';
        if (type === 'loading') {
          label = 'Loading';
        } else if (type === 'success') {
          label = 'Success';
        } else if (type === 'error') {
          label = 'Error';
        } else {
          label = 'Status';
        }
        container.innerHTML = `
          <div class="api-status-inner api-status-${type}">
            <div class="api-status-header">
              <span class="api-status-indicator"></span>
              <span class="api-status-label">${label}</span>
            </div>
            <div class="api-status-body">
              <p class="api-status-message">${message}</p>
              ${detail ? `<p class="api-status-detail">${detail}</p>` : ''}
            </div>
          </div>
        `;
      }

      function markActiveSectionControls() {
        const current = state.section;
        if (dom.sectionRouter) {
          const pills = dom.sectionRouter.querySelectorAll('[data-action="change-section"]');
          pills.forEach(function(pill) {
            if (pill.dataset.sectionTarget === current) {
              pill.classList.add('is-active');
              pill.setAttribute('aria-pressed', 'true');
            } else {
              pill.classList.remove('is-active');
              pill.setAttribute('aria-pressed', 'false');
            }
          });
        }
        if (dom.headerTabs) {
          const tabs = dom.headerTabs.querySelectorAll('[data-action="change-section"]');
          tabs.forEach(function(tab) {
            if (tab.dataset.sectionTarget === current) {
              tab.classList.add('is-active');
              tab.setAttribute('aria-current', 'page');
            } else {
              tab.classList.remove('is-active');
              tab.removeAttribute('aria-current');
            }
          });
          if (current === 'signup') {
            dom.headerTabs.classList.add('is-hidden');
          } else {
            dom.headerTabs.classList.remove('is-hidden');
          }
        }
      }

      function applySectionVisibility() {
        const section = state.section;
        if (dom.overviewPanel) {
          if (section === 'overview') {
            dom.overviewPanel.classList.remove('is-hidden');
          } else {
            dom.overviewPanel.classList.add('is-hidden');
          }
        }
        if (dom.profileSummary) {
          if (section === 'overview' || section === 'profile') {
            dom.profileSummary.classList.remove('is-hidden');
          } else {
            dom.profileSummary.classList.add('is-hidden');
          }
        }
        if (dom.quickLinksPanel) {
          if (section === 'overview') {
            dom.quickLinksPanel.classList.remove('is-hidden');
          } else {
            dom.quickLinksPanel.classList.add('is-hidden');
          }
        }
        if (dom.profileFormCard) {
          if (section === 'profile') {
            dom.profileFormCard.classList.remove('is-hidden');
          } else {
            dom.profileFormCard.classList.add('is-hidden');
          }
        }
        if (dom.signupFormCard) {
          if (section === 'signup') {
            dom.signupFormCard.classList.remove('is-hidden');
          } else {
            dom.signupFormCard.classList.add('is-hidden');
          }
        }
      }

      function redirectToSignup(reason) {
        state.noAccount = true;
        state.section = 'signup';
        updateUrlSection('signup', true);
        applySectionVisibility();
        markActiveSectionControls();
        if (reason) {
          setStatus('info', reason, '');
        }
        renderSignupForm(dom.signupFormCard);
      }

      function renderOverviewPanel(container) {
        if (!container) return;
        const overview = state.overview;
        if (!overview || !overview.profile_summary) {
          container.innerHTML = `
            <div class="card-body empty-state">
              <h2 class="card-title">Account overview</h2>
              <p class="card-text">Create an account to see your favorites, trips, and messages here.</p>
              <button type="button" class="btn-primary" data-action="change-section" data-section-target="signup">Create account</button>
            </div>
          `;
          return;
        }
        const summary = overview.profile_summary || {};
        const counts = overview.counts || {};
        const displayName = summary.display_name || (state.accountProfile && (state.accountProfile.display_name || state.accountProfile.full_name)) || 'Guest';
        const email = summary.email || (state.accountProfile && state.accountProfile.email) || '';
        const homeCity = summary.home_city || (state.accountProfile && state.accountProfile.home_city) || '';
        const initials = displayName.trim().charAt(0).toUpperCase() || 'G';

        container.innerHTML = `
          <div class="card-visual-band">
            <div class="profile-avatar">
              <span class="profile-avatar-initials">${initials}</span>
            </div>
            <span class="badge-pill badge-status">Active</span>
          </div>
          <div class="card-body">
            <div class="overview-header-row">
              <div class="overview-location">
                ${homeCity ? `<span class="icon icon-location"></span><span class="text">${homeCity}</span>` : ''}
              </div>
              <button type="button" class="icon-button" data-action="change-section" data-section-target="profile" aria-label="Edit profile">
                <span class="icon icon-edit"></span>
              </button>
            </div>
            <h2 class="card-title">${displayName}</h2>
            ${email ? `<p class="card-subtitle">${email}</p>` : ''}
            <div class="overview-stats-row">
              <div class="overview-stat">
                <span class="icon icon-heart"></span>
                <span class="label">Favorites</span>
                <span class="value">${counts.favorites_count != null ? counts.favorites_count : 0}</span>
              </div>
              <div class="overview-stat">
                <span class="icon icon-trip"></span>
                <span class="label">Trips</span>
                <span class="value">${counts.trips_count != null ? counts.trips_count : 0}</span>
              </div>
            </div>
            <div class="overview-stats-row">
              <div class="overview-stat">
                <span class="icon icon-search"></span>
                <span class="label">Saved searches</span>
                <span class="value">${counts.saved_searches_count != null ? counts.saved_searches_count : 0}</span>
              </div>
              <div class="overview-stat">
                <span class="icon icon-calendar"></span>
                <span class="label">Upcoming</span>
                <span class="value">${counts.upcoming_bookings_count != null ? counts.upcoming_bookings_count : 0}</span>
              </div>
            </div>
            <div class="overview-footer-row">
              <div class="overview-messages">
                <span class="icon icon-mail"></span>
                <span class="label">Unread messages</span>
                <span class="value">${counts.unread_messages_count != null ? counts.unread_messages_count : 0}</span>
              </div>
              <button type="button" class="link-button" data-action="quick-link" data-quick-link-key="messages">Open inbox</button>
            </div>
          </div>
        `;
      }

      function renderQuickLinks(container) {
        if (!container) return;
        const overview = state.overview;
        const quickLinks = (overview && overview.quick_links) || [];
        if (!quickLinks.length) {
          container.innerHTML = `
            <div class="card-body">
              <div class="card-header-row">
                <h2 class="card-title">Quick access</h2>
              </div>
              <p class="card-text">You do not have any shortcuts yet.</p>
            </div>
          `;
          return;
        }

        const itemsHtml = quickLinks.map(function(link) {
          const key = link.key || '';
          const label = link.label || '';
          return `
            <li class="quick-link-item">
              <button type="button" class="quick-link-button" data-action="quick-link" data-quick-link-key="${key}">
                <span class="quick-link-main">
                  <span class="quick-link-icon"></span>
                  <span class="quick-link-label">${label}</span>
                </span>
                <span class="quick-link-chevron">&rsaquo;</span>
              </button>
            </li>
          `;
        }).join('');

        container.innerHTML = `
          <div class="card-body">
            <div class="card-header-row">
              <h2 class="card-title">Quick access</h2>
            </div>
            <ul class="quick-links-list">
              ${itemsHtml}
            </ul>
          </div>
        `;
      }

      function renderProfileSummary(container) {
        if (!container) return;
        const overview = state.overview;
        const summary = (overview && overview.profile_summary) || {};
        const profile = state.accountProfile || {};
        const displayName = summary.display_name || profile.display_name || profile.full_name || 'Guest';
        const email = summary.email || profile.email || '';
        const homeCity = summary.home_city || profile.home_city || '';
        const currency = profile.default_currency || '';
        const initials = displayName.trim().charAt(0).toUpperCase() || 'G';

        if (state.section === 'signup' && !profile.email && !summary.email) {
          container.innerHTML = '';
          container.classList.add('is-hidden');
          return;
        }
        container.classList.remove('is-hidden');

        container.innerHTML = `
          <div class="card-visual-band small">
            <div class="profile-avatar small">
              <span class="profile-avatar-initials">${initials}</span>
            </div>
            <span class="badge-pill badge-progress">Profile</span>
            <button type="button" class="icon-button" data-action="change-section" data-section-target="profile" aria-label="Edit profile">
              <span class="icon icon-edit"></span>
            </button>
          </div>
          <div class="card-body">
            <h2 class="card-title">${displayName}</h2>
            ${email ? `<p class="card-subtitle">${email}</p>` : ''}
            <div class="profile-summary-row">
              ${homeCity ? `<span class="profile-summary-item"><span class="icon icon-location"></span>${homeCity}</span>` : ''}
              ${currency ? `<span class="profile-summary-item"><span class="icon icon-currency"></span>${currency}</span>` : ''}
            </div>
            <div class="card-footer-row">
              <button type="button" class="link-button" data-action="change-section" data-section-target="profile">View full profile</button>
            </div>
          </div>
        `;
      }

      function renderProfileForm(container) {
        if (!container) return;
        const profile = state.accountProfile || {};
        const fullName = profile.full_name || '';
        const displayName = profile.display_name || '';
        const homeCity = profile.home_city || '';
        const defaultCurrency = profile.default_currency || '';
        const wantsEmail = !!profile.wants_email_notifications;
        const email = profile.email || '';

        container.innerHTML = `
          <div class="card-body">
            <header class="form-header">
              <span class="badge-pill">Profile &amp; preferences</span>
              <h2 class="card-title">Account details</h2>
              <p class="card-text">Update how your name, home city, and notifications appear across VacayStay.</p>
            </header>
            <form class="profile-form" data-action="submit-profile-form">
              <div class="form-section">
                <h3 class="form-section-title">Basic info</h3>
                <div class="form-field">
                  <label for="profile-full-name">Full name</label>
                  <input id="profile-full-name" name="fullName" type="text" autocomplete="name" value="${fullName}">
                </div>
                <div class="form-field">
                  <label for="profile-display-name">Display name</label>
                  <input id="profile-display-name" name="displayName" type="text" value="${displayName}">
                </div>
                <div class="form-field">
                  <label for="profile-email">Email</label>
                  <input id="profile-email" name="email" type="email" value="${email}" disabled>
                  <p class="field-help">Email updates are not editable on this page.</p>
                </div>
              </div>

              <div class="form-section">
                <h3 class="form-section-title">Location &amp; currency</h3>
                <div class="form-field">
                  <label for="profile-home-city">Home city</label>
                  <input id="profile-home-city" name="homeCity" type="text" value="${homeCity}">
                </div>
                <div class="form-field">
                  <label for="profile-default-currency">Default currency</label>
                  <select id="profile-default-currency" name="defaultCurrency">
                    <option value="">Select currency</option>
                    <option value="USD"${defaultCurrency === 'USD' ? ' selected' : ''}>USD</option>
                    <option value="EUR"${defaultCurrency === 'EUR' ? ' selected' : ''}>EUR</option>
                    <option value="GBP"${defaultCurrency === 'GBP' ? ' selected' : ''}>GBP</option>
                    <option value="CAD"${defaultCurrency === 'CAD' ? ' selected' : ''}>CAD</option>
                    <option value="AUD"${defaultCurrency === 'AUD' ? ' selected' : ''}>AUD</option>
                  </select>
                </div>
              </div>

              <div class="form-section">
                <h3 class="form-section-title">Notifications</h3>
                <div class="form-field checkbox-field">
                  <label>
                    <input type="checkbox" name="wantsEmailNotifications"${wantsEmail ? ' checked' : ''}>
                    Email me about booking updates, messages, and offers
                  </label>
                </div>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn-primary">Save changes</button>
                <button type="button" class="btn-ghost" data-action="reset-profile-form">Discard changes</button>
              </div>
            </form>
          </div>
        `;
      }

      function renderSignupForm(container) {
        if (!container) return;
        container.innerHTML = `
          <div class="card-body">
            <header class="form-header">
              <span class="badge-pill badge-accent">New here?</span>
              <h2 class="card-title">Create your VacayStay account</h2>
              <p class="card-text">Save favorites, track trips, and receive booking updates in one place.</p>
            </header>
            <form class="signup-form" data-action="submit-signup-form">
              <div class="form-section compact">
                <div class="form-field">
                  <label for="signup-full-name">Full name</label>
                  <input id="signup-full-name" name="fullName" type="text" autocomplete="name" required>
                </div>
                <div class="form-field">
                  <label for="signup-email">Email</label>
                  <input id="signup-email" name="email" type="email" autocomplete="email" required>
                </div>
                <div class="form-field">
                  <label for="signup-password">Password</label>
                  <input id="signup-password" name="password" type="password" autocomplete="new-password" required>
                </div>
              </div>
              <div class="form-actions">
                <button type="submit" class="btn-primary">Sign up</button>
              </div>
            </form>
          </div>
        `;
      }

      function updateMessagesNavBadge() {
        if (!dom.messagesNavBadge) return;
        const counts = state.overview && state.overview.counts;
        const count = counts && typeof counts.unread_messages_count === 'number' ? counts.unread_messages_count : 0;
        if (count > 0) {
          dom.messagesNavBadge.textContent = String(count);
          dom.messagesNavBadge.classList.remove('is-hidden');
        } else {
          dom.messagesNavBadge.textContent = '';
          dom.messagesNavBadge.classList.add('is-hidden');
        }
      }

      function loadOverview(force) {
        if (state.section === 'signup') {
          return;
        }
        if (state.hasOverviewLoaded && !force) {
          renderOverviewPanel(dom.overviewPanel);
          renderQuickLinks(dom.quickLinksPanel);
          renderProfileSummary(dom.profileSummary);
          updateMessagesNavBadge();
          return;
        }
        try {
          setStatus('loading', 'Loading account overview...', '');
          const result = WebsiteSDK.getAccountOverview();
          if (!result || !result.profile_summary) {
            redirectToSignup('Account setup is required before viewing overview.');
            return;
          }
          state.overview = result;
          state.hasOverviewLoaded = true;
          setStatus('success', 'Account overview updated.', '');
          renderOverviewPanel(dom.overviewPanel);
          renderQuickLinks(dom.quickLinksPanel);
          renderProfileSummary(dom.profileSummary);
          updateMessagesNavBadge();
        } catch (error) {
          state.overview = null;
          state.hasOverviewLoaded = false;
          setStatus('error', 'Unable to load account overview.', String(error && error.message ? error.message : ''));
          redirectToSignup('We could not find an existing account. Please create one to continue.');
        }
      }

      function loadProfile(force) {
        if (state.section === 'signup') {
          return;
        }
        if (state.hasProfileLoaded && !force) {
          renderProfileForm(dom.profileFormCard);
          renderProfileSummary(dom.profileSummary);
          return;
        }
        try {
          setStatus('loading', 'Loading profile...', '');
          const profile = WebsiteSDK.getAccountProfile();
          if (!profile || !profile.id) {
            redirectToSignup('Create an account to manage your profile.');
            return;
          }
          state.accountProfile = profile;
          state.hasProfileLoaded = true;
          setStatus('success', 'Profile loaded.', '');
          renderProfileForm(dom.profileFormCard);
          renderProfileSummary(dom.profileSummary);
        } catch (error) {
          state.accountProfile = null;
          state.hasProfileLoaded = false;
          setStatus('error', 'Unable to load profile.', String(error && error.message ? error.message : ''));
          redirectToSignup('We could not find an existing account. Please create one to continue.');
        }
      }

      function changeSection(targetSection, fromHistory) {
        if (!targetSection) return;
        const next = targetSection;
        if (state.section === next) {
          return;
        }
        if (state.section === 'profile' && state.profileDirty && next !== 'profile') {
          const confirmLeave = window.confirm('You have unsaved changes. Leave this page?');
          if (!confirmLeave) {
            return;
          }
        }
        state.section = next;
        if (!fromHistory) {
          updateUrlSection(next, false);
        }
        markActiveSectionControls();
        applySectionVisibility();

        if (next === 'overview') {
          loadOverview(false);
        } else if (next === 'profile') {
          if (!state.hasProfileLoaded) {
            loadProfile(false);
          } else {
            renderProfileForm(dom.profileFormCard);
            renderProfileSummary(dom.profileSummary);
          }
        } else if (next === 'signup') {
          renderSignupForm(dom.signupFormCard);
          setStatus('info', 'Create an account to start saving trips and favorites.', '');
        }
      }

      window.addEventListener('popstate', function() {
        const sectionFromUrl = getSectionFromUrl();
        state.section = sectionFromUrl;
        markActiveSectionControls();
        applySectionVisibility();
        if (sectionFromUrl === 'overview') {
          loadOverview(false);
        } else if (sectionFromUrl === 'profile') {
          loadProfile(false);
        } else if (sectionFromUrl === 'signup') {
          renderSignupForm(dom.signupFormCard);
        }
      });

      function handleQuickLinkNavigation(key) {
        if (!key) return;
        const map = {
          favorites: 'favorites.html',
          trips: 'trips.html',
          saved_searches: 'saved_searches.html',
          messages: 'messages.html'
        };
        const target = map[key];
        if (target) {
          window.location.href = target;
        }
      }

      function handleProfileFormSubmit(form) {
        if (!form || state.isSubmittingProfile) return;
        const formData = new window.FormData(form);
        const fullName = (formData.get('fullName') || '').toString().trim();
        const displayName = (formData.get('displayName') || '').toString().trim();
        const homeCity = (formData.get('homeCity') || '').toString().trim();
        const defaultCurrency = (formData.get('defaultCurrency') || '').toString();
        const wantsEmailNotifications = formData.get('wantsEmailNotifications') !== null;

        try {
          state.isSubmittingProfile = true;
          setStatus('loading', 'Saving profile...', '');
          const response = WebsiteSDK.updateAccountProfile(
            displayName,
            homeCity,
            defaultCurrency,
            wantsEmailNotifications,
            fullName
          );
          if (!response || !response.success) {
            const msg = response && response.message ? response.message : 'Changes could not be saved.';
            setStatus('error', msg, '');
            state.isSubmittingProfile = false;
            return;
          }
          state.accountProfile = response.profile || state.accountProfile;
          state.hasProfileLoaded = true;
          state.profileDirty = false;
          setStatus('success', response.message || 'Profile updated.', '');
          renderProfileForm(dom.profileFormCard);
          renderProfileSummary(dom.profileSummary);
          if (state.hasOverviewLoaded) {
            loadOverview(true);
          }
        } catch (error) {
          setStatus('error', 'An error occurred while updating your profile.', String(error && error.message ? error.message : ''));
        } finally {
          state.isSubmittingProfile = false;
        }
      }

      function handleSignupFormSubmit(form) {
        if (!form || state.isSubmittingSignup) return;
        const formData = new window.FormData(form);
        const fullName = (formData.get('fullName') || '').toString().trim();
        const email = (formData.get('email') || '').toString().trim();
        const password = (formData.get('password') || '').toString();

        if (!fullName || !email || !password) {
          setStatus('error', 'Please complete all required fields.', '');
          return;
        }

        try {
          state.isSubmittingSignup = true;
          setStatus('loading', 'Creating your account...', '');
          const response = WebsiteSDK.signUpAccount(fullName, email, password);
          if (!response || !response.success) {
            const msg = response && response.message ? response.message : 'Sign-up could not be completed.';
            setStatus('error', msg, '');
            state.isSubmittingSignup = false;
            return;
          }
          state.accountProfile = response.profile || null;
          state.hasProfileLoaded = !!response.profile;
          state.noAccount = false;
          setStatus('success', response.message || 'Account created.', '');
          state.section = 'overview';
          updateUrlSection('overview', true);
          markActiveSectionControls();
          applySectionVisibility();
          if (state.hasProfileLoaded) {
            renderProfileForm(dom.profileFormCard);
            renderProfileSummary(dom.profileSummary);
          }
          loadOverview(true);
        } catch (error) {
          setStatus('error', 'An error occurred while creating your account.', String(error && error.message ? error.message : ''));
        } finally {
          state.isSubmittingSignup = false;
        }
      }

      document.addEventListener('click', function(event) {
        const actionElement = event.target.closest('[data-action]');
        if (!actionElement) return;
        const action = actionElement.dataset.action;
        if (action === 'change-section') {
          event.preventDefault();
          const targetSection = actionElement.dataset.sectionTarget;
          changeSection(targetSection, false);
        } else if (action === 'quick-link') {
          event.preventDefault();
          const key = actionElement.dataset.quickLinkKey;
          handleQuickLinkNavigation(key);
        } else if (action === 'reset-profile-form') {
          event.preventDefault();
          state.profileDirty = false;
          if (state.hasProfileLoaded) {
            renderProfileForm(dom.profileFormCard);
          }
        }
      });

      document.addEventListener('input', function(event) {
        const form = event.target.closest('.profile-form');
        if (!form) return;
        state.profileDirty = true;
      });

      document.addEventListener('submit', function(event) {
        const form = event.target;
        const action = form.getAttribute('data-action');
        if (!action) return;
        if (action === 'submit-profile-form') {
          event.preventDefault();
          handleProfileFormSubmit(form);
        } else if (action === 'submit-signup-form') {
          event.preventDefault();
          handleSignupFormSubmit(form);
        }
      });

      state.section = getSectionFromUrl();
      markActiveSectionControls();
      applySectionVisibility();
      renderApiStatus(dom.apiStatusCard);

      if (state.section === 'signup') {
        renderSignupForm(dom.signupFormCard);
        setStatus('info', 'Create an account to start saving trips and favorites.', '');
      } else if (state.section === 'profile') {
        loadProfile(false);
        loadOverview(false);
      } else {
        loadOverview(false);
      }
    });
  </script>
</body>
</html>
