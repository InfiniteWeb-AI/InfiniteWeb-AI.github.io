<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Help Center Framework</title>

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

  <!-- Framework styles -->
  <link rel="stylesheet" href="framework.css" />
  <!-- Page styles -->
  <link rel="stylesheet" href="category.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <a href="index.html" class="brand" aria-label="Help Center home">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-text">
          <span class="brand-name">Your Company</span>
          <span class="brand-context">Help Center</span>
        </div>
      </a>

      <nav class="primary-nav" aria-label="Primary">
        <ul class="nav-list">
          <li class="nav-item is-active">
            <a href="index.html" class="nav-link">Help Center</a>
          </li>
          <li class="nav-item">
            <a href="faq.html" class="nav-link">FAQ</a>
          </li>
          <li class="nav-item">
            <a href="community.html" class="nav-link">Community</a>
          </li>
          <li class="nav-item">
            <a href="returns.html" class="nav-link">Returns &amp; Exchanges</a>
          </li>
          <li class="nav-item">
            <a href="contact.html" class="nav-link">Contact Us</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="content" class="site-main">
    <div class="container">
      <div class="category-page" data-component="category-page-controller">
        <!-- Breadcrumb strip -->
        <section class="breadcrumb-strip" data-component="category-breadcrumb" data-populate="breadcrumb"></section>

        <!-- Category hero / header -->
        <section class="category-hero-wrapper">
          <div class="category-hero" data-component="category-header" data-populate="category-header"></div>
        </section>

        <!-- Main category content: filters, articles, pagination -->
        <section class="category-main">
          <div class="category-card">
            <div class="category-card-toolbar">
              <div class="filter-bar" data-component="category-filter-bar" data-populate="category-filters"></div>
              <div class="sort-control" data-component="category-sort-control" data-populate="category-sort"></div>
            </div>

            <div class="article-list" data-component="article-list" data-populate="article-list" aria-live="polite"></div>
          </div>

          <div class="pagination-wrapper" data-component="pagination-controls" data-populate="pagination"></div>
        </section>
      </div>
    </div>

    <!-- Chat launcher (fixed, bottom-right) -->
    <button class="chat-launch-button" type="button" data-component="chat-launch-button" data-action="open-chat" aria-label="Open support chat">
      <span class="chat-launch-icon" aria-hidden="true"></span>
      <span class="chat-launch-text">Chat</span>
    </button>

    <!-- Chat widget panel (overlay) -->
    <section class="chat-widget-panel is-hidden" data-component="chat-widget-panel" aria-label="Support chat" aria-hidden="true">
      <header class="chat-widget-header">
        <div class="chat-widget-title-group">
          <h2 class="chat-widget-title">Need help?</h2>
          <p class="chat-widget-subtitle">Ask a question and we'll suggest articles.</p>
        </div>
        <div class="chat-widget-header-actions">
          <button type="button" class="chat-widget-btn" data-action="minimize-chat" aria-label="Minimize chat">&minus;</button>
          <button type="button" class="chat-widget-btn" data-action="close-chat" aria-label="Close chat">&times;</button>
        </div>
      </header>
      <div class="chat-widget-body">
        <div class="chat-topic-row">
          <label for="chatTopicSelect">Topic</label>
          <select id="chatTopicSelect" data-action="chat-topic-change"></select>
        </div>
        <div class="chat-suggestions" data-populate="chat-suggestions"></div>
      </div>
      <footer class="chat-widget-footer">
        <label class="visually-hidden" for="chatInput">Describe your issue</label>
        <textarea id="chatInput" rows="2" placeholder="Type your question..." data-action="chat-input-change"></textarea>
        <button type="button" class="chat-suggestions-button" data-action="chat-request-suggestions">Get suggestions</button>
      </footer>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <nav class="footer-nav" aria-label="Footer">
        <ul class="footer-links">
          <li><a href="index.html">Help Center Home</a></li>
          <li><a href="faq.html">FAQ</a></li>
          <li><a href="community.html">Community</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="privacy.html">Privacy Policy</a></li>
          <li><a href="terms.html">Terms of Use</a></li>
        </ul>
      </nav>
      <p class="footer-meta">&copy; <span data-year></span> Your Company. All rights reserved.</p>
    </div>
  </footer>

  <script>
    (function () {
      var yearSpan = document.querySelector('[data-year]');
      if (yearSpan) {
        yearSpan.textContent = new Date().getFullYear();
      }
    })();
  </script>

  <!-- SDK / business logic -->
  <script src="business_logic.js"></script>

  <!-- Page controller and UI wiring -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var state = {
        appSettings: null,
        categoryKey: null,
        topic: null,
        viewMode: 'standard',
        sortBy: 'relevance',
        page: 1,
        contentTypes: [],
        listing: null,
        filterOptions: null,
        chatSession: null,
        chatTopics: [],
        chatSuggestions: []
      };

      function escapeHtml(str) {
        if (typeof str !== 'string') {
          return '';
        }
        return str.replace(/[&<>"']/g, function (c) {
          switch (c) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            case "'": return '&#39;';
            default: return c;
          }
        });
      }

      function parseUrlParams() {
        var params = new URLSearchParams(window.location.search);
        state.categoryKey = params.get('category_key');
        state.topic = params.get('topic');

        var viewModeParam = params.get('view_mode');
        if (viewModeParam) {
          state.viewMode = viewModeParam;
        }

        var sortByParam = params.get('sort_by');
        if (sortByParam) {
          state.sortBy = sortByParam;
        }

        var pageParam = params.get('page');
        var pageNum = parseInt(pageParam || '1', 10);
        if (!(pageNum >= 1)) {
          pageNum = 1;
        }
        state.page = pageNum;

        state.contentTypes = params.getAll('content_type');
      }

      function buildFilters() {
        var filters = {};
        if (state.topic) {
          filters.topics = [state.topic];
        }
        if (state.contentTypes && state.contentTypes.length > 0) {
          filters.content_types = state.contentTypes.slice();
        }
        filters.page = state.page;
        return filters;
      }

      function updateUrl(updated) {
        var params = new URLSearchParams(window.location.search);
        var keys = Object.keys(updated);
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          var value = updated[key];

          if (Array.isArray(value)) {
            params.delete(key);
            if (value.length) {
              for (var j = 0; j < value.length; j++) {
                params.append(key, value[j]);
              }
            }
          } else if (value === null || value === undefined || value === '') {
            params.delete(key);
          } else {
            params.set(key, value);
          }
        }

        if (state.categoryKey) {
          params.set('category_key', state.categoryKey);
        }

        var newQuery = params.toString();
        var newUrl = window.location.pathname + (newQuery ? ('?' + newQuery) : '');
        window.location.href = newUrl;
      }

      function renderBreadcrumb(container, category, viewMode) {
        if (!state.categoryKey || !category) {
          container.innerHTML = `
            <nav class="breadcrumb-nav" aria-label="Breadcrumb">
              <ol class="breadcrumb-list">
                <li class="breadcrumb-item"><a href="index.html">Help Center</a></li>
                <li class="breadcrumb-item is-current" aria-current="page">Browse categories</li>
              </ol>
            </nav>
          `;
          return;
        }

        var faqPart = '';
        if (viewMode === 'faq') {
          faqPart = `
            <li class="breadcrumb-item">
              <a href="javascript:void(0)" data-action="faq-home-click">FAQ</a>
            </li>
          `;
        }

        container.innerHTML = `
          <nav class="breadcrumb-nav" aria-label="Breadcrumb">
            <ol class="breadcrumb-list">
              <li class="breadcrumb-item"><a href="index.html">Help Center</a></li>
              ${faqPart}
              <li class="breadcrumb-item is-current" aria-current="page">${escapeHtml(category.name || '')}</li>
            </ol>
          </nav>
        `;
      }

      function renderCategoryHeader(container, category, viewMode, appSettings) {
        var language = appSettings && appSettings.language ? appSettings.language : 'en';

        if (!state.categoryKey || !category) {
          container.innerHTML = `
            <div class="category-hero-inner">
              <div class="category-hero-main">
                <div class="category-icon" aria-hidden="true"></div>
                <div class="category-hero-text">
                  <h1 class="category-title">Help Center</h1>
                  <p class="category-description">Select a help category from the home page to view articles.</p>
                </div>
              </div>
              <div class="category-hero-side">
                <label for="languageSelect" class="language-switcher-label">Language</label>
                <select id="languageSelect" class="language-switcher-select" data-component="language-switcher" data-action="change-language">
                  <option value="en"${language === 'en' ? ' selected' : ''}>English</option>
                  <option value="es"${language === 'es' ? ' selected' : ''}>Español</option>
                </select>
              </div>
            </div>
          `;
          return;
        }

        var faqBadge = viewMode === 'faq'
          ? '<span class="category-view-mode-badge">FAQ view</span>'
          : '';

        container.innerHTML = `
          <div class="category-hero-inner">
            <div class="category-hero-main">
              <div class="category-icon" aria-hidden="true"></div>
              <div class="category-hero-text">
                <h1 class="category-title">
                  ${escapeHtml(category.name || '')}
                  ${faqBadge}
                </h1>
                ${category.description ? `<p class="category-description">${escapeHtml(category.description)}</p>` : ''}
              </div>
            </div>
            <div class="category-hero-side">
              <label for="languageSelect" class="language-switcher-label">Language</label>
              <select id="languageSelect" class="language-switcher-select" data-component="language-switcher" data-action="change-language">
                <option value="en"${language === 'en' ? ' selected' : ''}>English</option>
                <option value="es"${language === 'es' ? ' selected' : ''}>Español</option>
              </select>
            </div>
          </div>
        `;
      }

      function renderFilterBar(container, filterOptions) {
        if (!state.categoryKey || !filterOptions) {
          container.innerHTML = `
            <div class="filter-bar-inner">
              <div class="filter-group">
                <label class="filter-label" for="topicFilter">Topic</label>
                <select id="topicFilter" class="filter-select" data-action="change-topic-filter" disabled>
                  <option value="">All topics</option>
                </select>
              </div>
            </div>
          `;
          return;
        }

        var topicsOptions = '<option value="">All topics</option>';
        var topics = filterOptions.topics || [];
        for (var i = 0; i < topics.length; i++) {
          var t = topics[i];
          var selectedAttr = state.topic && state.topic === t ? ' selected' : '';
          topicsOptions += `<option value="${escapeHtml(t)}"${selectedAttr}>${escapeHtml(t)}</option>`;
        }

        var contentTypes = filterOptions.content_types || [];
        var contentChips = '';
        for (var j = 0; j < contentTypes.length; j++) {
          var ct = contentTypes[j];
          var value = ct.value || '';
          var label = ct.label || value;
          var checked = state.contentTypes.indexOf(value) !== -1;
          contentChips += `
            <label class="filter-chip">
              <input type="checkbox"
                     class="filter-chip-input"
                     name="content_type_filter"
                     value="${escapeHtml(value)}"
                     ${checked ? 'checked' : ''}
                     data-action="change-content-type-filter" />
              <span class="filter-chip-label">${escapeHtml(label)}</span>
            </label>
          `;
        }

        container.innerHTML = `
          <div class="filter-bar-inner">
            <div class="filter-group">
              <label class="filter-label" for="topicFilter">Topic</label>
              <select id="topicFilter" class="filter-select" data-action="change-topic-filter">
                ${topicsOptions}
              </select>
            </div>
            <div class="filter-group filter-group--content-types">
              <span class="filter-label">Content type</span>
              <div class="filter-chips">
                ${contentChips || '<span class="filter-empty">No content type filters</span>'}
              </div>
            </div>
            <button type="button" class="link-button clear-filters" data-action="clear-filters">Clear filters</button>
          </div>
        `;
      }

      function renderSortControl(container) {
        var sortBy = state.sortBy || 'relevance';
        container.innerHTML = `
          <div class="sort-control-inner">
            <label class="sort-label" for="sortBySelect">Sort by</label>
            <select id="sortBySelect" class="sort-select" data-action="change-sort">
              <option value="relevance"${sortBy === 'relevance' ? ' selected' : ''}>Relevance</option>
              <option value="last_updated_desc"${sortBy === 'last_updated_desc' ? ' selected' : ''}>Last updated</option>
              <option value="popularity"${sortBy === 'popularity' ? ' selected' : ''}>Popularity</option>
            </select>
          </div>
        `;
      }

      function renderArticleList(container, listing, viewMode) {
        if (!state.categoryKey) {
          container.innerHTML = `
            <div class="empty-state">
              <p>Select a help category from the home page to see its articles.</p>
            </div>
          `;
          return;
        }

        if (!listing || !listing.articles) {
          container.innerHTML = `
            <div class="empty-state">
              <p>We couldn't load this category right now. Please try again later.</p>
            </div>
          `;
          return;
        }

        var articles = listing.articles;
        if (!articles.length) {
          container.innerHTML = `
            <div class="empty-state">
              <p>No articles match your filters.</p>
            </div>
          `;
          return;
        }

        var rows = '';
        for (var i = 0; i < articles.length; i++) {
          var article = articles[i];
          var isFaq = viewMode === 'faq' && article.is_faq_style;
          var faqBadge = isFaq ? '<span class="article-faq-badge">FAQ</span>' : '';
          var topicsText = (article.topics && article.topics.length)
            ? escapeHtml(article.topics.join(', '))
            : '';
          var metaParts = [];
          if (article.last_updated) {
            metaParts.push('Updated ' + escapeHtml(article.last_updated));
          }
          if (topicsText) {
            metaParts.push(topicsText);
          }
          var metaText = metaParts.join(' • ');

          rows += `
            <a href="javascript:void(0)"
               class="article-row${isFaq ? ' article-row--faq' : ''}"
               data-action="open-article"
               data-article-id="${escapeHtml(article.articleId)}">
              <div class="article-row-left">
                <span class="article-icon" aria-hidden="true"></span>
                <div class="article-row-text">
                  <div class="article-row-title">
                    ${faqBadge}
                    <span>${escapeHtml(article.title)}</span>
                  </div>
                  ${metaText ? `<div class="article-row-meta">${metaText}</div>` : ''}
                </div>
              </div>
            </a>
          `;
        }

        container.innerHTML = rows;
      }

      function renderPagination(container, listing) {
        if (!state.categoryKey || !listing || !listing.articles || !listing.articles.length) {
          container.innerHTML = '';
          return;
        }
        var page = state.page || 1;
        var prevDisabled = page <= 1 ? ' disabled' : '';
        container.innerHTML = `
          <nav class="pagination" aria-label="Category pages">
            <button type="button" class="pagination-btn pagination-prev" data-action="page-prev"${prevDisabled}>Previous</button>
            <span class="pagination-page">Page ${page}</span>
            <button type="button" class="pagination-btn pagination-next" data-action="page-next">Next</button>
          </nav>
        `;
      }

      function renderChatSuggestions(container, suggestions) {
        if (!suggestions || !suggestions.length) {
          container.innerHTML = `
            <div class="chat-suggestions-empty">
              <p>Suggestions will appear here as you describe your issue.</p>
            </div>
          `;
          return;
        }

        var items = '';
        for (var i = 0; i < suggestions.length; i++) {
          var s = suggestions[i];
          var badge = s.matches_topic ? '<span class="chat-suggestion-badge">Related</span>' : '';
          items += `
            <button type="button"
                    class="chat-suggestion"
                    data-action="chat-suggestion-click"
                    data-suggestion-id="${escapeHtml(s.suggestionId)}">
              <div class="chat-suggestion-header">
                <span class="chat-suggestion-title">${escapeHtml(s.title)}</span>
                ${badge}
              </div>
              <div class="chat-suggestion-meta">
                ${escapeHtml(s.category_name || '')}
              </div>
              <div class="chat-suggestion-snippet">
                ${escapeHtml(s.snippet || '')}
              </div>
            </button>
          `;
        }

        container.innerHTML = items;
      }

      function applyChatVisibility() {
        var panel = document.querySelector('[data-component="chat-widget-panel"]');
        var launcher = document.querySelector('[data-component="chat-launch-button"]');
        if (!panel || !launcher) {
          return;
        }
        var isOpen = state.chatSession && state.chatSession.status === 'open';
        var isMinimized = state.chatSession && state.chatSession.is_minimized;

        if (isOpen && !isMinimized) {
          panel.classList.remove('is-hidden');
          panel.setAttribute('aria-hidden', 'false');
          launcher.classList.add('is-hidden');
        } else {
          panel.classList.add('is-hidden');
          panel.setAttribute('aria-hidden', 'true');
          launcher.classList.remove('is-hidden');
        }
      }

      function initializeChatUI(availableTopics) {
        var topicSelect = document.getElementById('chatTopicSelect');
        if (!topicSelect) {
          return;
        }
        var topics = availableTopics || state.chatTopics || [];
        var optionsHtml = '';
        for (var i = 0; i < topics.length; i++) {
          var opt = topics[i];
          var topicValue = opt.topic || '';
          var label = opt.label || topicValue;
          var selected = state.chatSession && state.chatSession.topic === topicValue ? ' selected' : '';
          optionsHtml += `<option value="${escapeHtml(topicValue)}"${selected}>${escapeHtml(label)}</option>`;
        }
        if (!optionsHtml) {
          optionsHtml = '<option value="">General</option>';
        }
        topicSelect.innerHTML = optionsHtml;
        applyChatVisibility();
      }

      function initializePage() {
        parseUrlParams();

        try {
          var settingsResult = WebsiteSDK.getAppSettings();
          state.appSettings = settingsResult && settingsResult.settings ? settingsResult.settings : null;
        } catch (e) {
          console.error('Error loading app settings', e);
        }

        var breadcrumbEl = document.querySelector('[data-component="category-breadcrumb"]');
        var headerEl = document.querySelector('[data-component="category-header"]');
        var filterEl = document.querySelector('[data-component="category-filter-bar"]');
        var sortEl = document.querySelector('[data-component="category-sort-control"]');
        var listEl = document.querySelector('[data-component="article-list"]');
        var paginationEl = document.querySelector('[data-component="pagination-controls"]');

        if (!state.categoryKey) {
          if (breadcrumbEl) {
            renderBreadcrumb(breadcrumbEl, null, state.viewMode);
          }
          if (headerEl) {
            renderCategoryHeader(headerEl, null, state.viewMode, state.appSettings);
          }
          if (filterEl) {
            renderFilterBar(filterEl, null);
          }
          if (sortEl) {
            renderSortControl(sortEl);
          }
          if (listEl) {
            renderArticleList(listEl, null, state.viewMode);
          }
          if (paginationEl) {
            renderPagination(paginationEl, null);
          }
          return;
        }

        var filterOptions = null;
        try {
          filterOptions = WebsiteSDK.getCategoryFilterOptions(state.categoryKey);
          state.filterOptions = filterOptions;
        } catch (e2) {
          console.error('Error loading filter options', e2);
        }

        var listing = null;
        try {
          var filters = buildFilters();
          listing = WebsiteSDK.getCategoryListingView(state.categoryKey, filters, state.sortBy, state.viewMode);
          state.listing = listing;
          if (listing && listing.category && listing.category.name) {
            document.title = escapeHtml(listing.category.name) + ' - Help Center';
          }
        } catch (e3) {
          console.error('Error loading category listing', e3);
        }

        if (breadcrumbEl) {
          renderBreadcrumb(breadcrumbEl, listing ? listing.category : null, state.viewMode);
        }
        if (headerEl) {
          renderCategoryHeader(headerEl, listing ? listing.category : null, state.viewMode, state.appSettings);
        }
        if (filterEl) {
          renderFilterBar(filterEl, filterOptions);
        }
        if (sortEl) {
          renderSortControl(sortEl);
        }
        if (listEl) {
          renderArticleList(listEl, listing, state.viewMode);
        }
        if (paginationEl) {
          renderPagination(paginationEl, listing);
        }
      }

      function mapCategoryToChatTopic() {
        if (!state.categoryKey) {
          return null;
        }
        if (state.categoryKey === 'orders_returns') {
          if (state.topic && state.topic.toLowerCase().indexOf('delivery') !== -1) {
            return 'delivery_tracking';
          }
          return 'orders_returns';
        }
        if (state.categoryKey === 'billing_payments') {
          return 'billing_payments';
        }
        if (state.categoryKey === 'account_security' || state.categoryKey === 'general') {
          return 'account_issues';
        }
        if (state.categoryKey === 'returns_exchanges') {
          return 'returns_exchanges';
        }
        return null;
      }

      function openChat() {
        try {
          var result = WebsiteSDK.openChatWidget();
          state.chatSession = result.chat_session;
          state.chatTopics = result.available_topics || [];

          var suggestedTopic = mapCategoryToChatTopic();
          if (suggestedTopic) {
            try {
              var setTopicResult = WebsiteSDK.setChatTopic(suggestedTopic);
              if (setTopicResult && setTopicResult.chat_session) {
                state.chatSession = setTopicResult.chat_session;
              }
            } catch (e2) {
              console.error('Error setting chat topic', e2);
            }
          }

          initializeChatUI(result.available_topics);
        } catch (e) {
          console.error('Error opening chat widget', e);
        }
      }

      var chatSuggestionsDebounceId = null;
      function debounceChatSuggestions() {
        if (chatSuggestionsDebounceId) {
          clearTimeout(chatSuggestionsDebounceId);
        }
        chatSuggestionsDebounceId = setTimeout(function () {
          fetchChatSuggestions();
        }, 600);
      }

      function fetchChatSuggestions() {
        if (!state.chatSession || state.chatSession.status !== 'open') {
          return;
        }
        var container = document.querySelector('[data-populate="chat-suggestions"]');
        if (!container) {
          return;
        }
        try {
          var result = WebsiteSDK.getChatArticleSuggestions();
          state.chatSuggestions = result.suggestions || [];
          renderChatSuggestions(container, state.chatSuggestions);
        } catch (e) {
          console.error('Error fetching chat suggestions', e);
        }
      }

      function handleLanguageChange(value) {
        var language = value || 'en';
        try {
          var result = WebsiteSDK.updateLanguage(language);
          state.appSettings = result && result.settings ? result.settings : state.appSettings;
        } catch (e) {
          console.error('Error updating language', e);
        }
        window.location.reload();
      }

      function handleTopicFilterChange(value) {
        var updated = { topic: value || null, page: 1 };
        updateUrl(updated);
      }

      function handleContentTypeFilterChange() {
        var checked = document.querySelectorAll('input[name="content_type_filter"]:checked');
        var values = [];
        for (var i = 0; i < checked.length; i++) {
          values.push(checked[i].value);
        }
        var updated = { content_type: values, page: 1 };
        updateUrl(updated);
      }

      function handleClearFilters() {
        var updated = { topic: null, content_type: [], page: 1 };
        updateUrl(updated);
      }

      function handleSortChange(value) {
        var updated = { sort_by: value || null, page: 1 };
        updateUrl(updated);
      }

      function handlePageChange(direction) {
        var current = state.page || 1;
        var nextPage = current;
        if (direction === 'prev') {
          nextPage = current > 1 ? current - 1 : 1;
        } else if (direction === 'next') {
          nextPage = current + 1;
        }
        if (nextPage === current && direction === 'prev') {
          return;
        }
        var updated = { page: nextPage };
        updateUrl(updated);
      }

      function navigateToArticle(articleId) {
        if (!articleId) {
          return;
        }
        var url = 'article.html?articleId=' + encodeURIComponent(articleId);
        window.location.href = url;
      }

      function navigateToFaqHome() {
        window.location.href = 'faq.html';
      }

      document.addEventListener('click', function (event) {
        var target = event.target;
        var actionEl = target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.getAttribute('data-action');
        if (!action) {
          return;
        }

        switch (action) {
          case 'faq-home-click':
            event.preventDefault();
            navigateToFaqHome();
            break;
          case 'clear-filters':
            event.preventDefault();
            handleClearFilters();
            break;
          case 'page-prev':
            event.preventDefault();
            handlePageChange('prev');
            break;
          case 'page-next':
            event.preventDefault();
            handlePageChange('next');
            break;
          case 'open-article':
            event.preventDefault();
            var articleId = actionEl.getAttribute('data-article-id');
            navigateToArticle(articleId);
            break;
          case 'open-chat':
            event.preventDefault();
            openChat();
            break;
          case 'minimize-chat':
            event.preventDefault();
            try {
              var minResult = WebsiteSDK.minimizeChatWidget();
              state.chatSession = minResult.chat_session;
              state.appSettings = minResult.app_settings || state.appSettings;
              applyChatVisibility();
            } catch (e) {
              console.error('Error minimizing chat', e);
            }
            break;
          case 'close-chat':
            event.preventDefault();
            try {
              var closeResult = WebsiteSDK.closeChatWidget();
              state.chatSession = closeResult.chat_session;
              applyChatVisibility();
            } catch (e2) {
              console.error('Error closing chat', e2);
            }
            break;
          case 'chat-request-suggestions':
            event.preventDefault();
            fetchChatSuggestions();
            break;
          case 'chat-suggestion-click':
            event.preventDefault();
            var suggestionId = actionEl.getAttribute('data-suggestion-id');
            if (!suggestionId) {
              return;
            }
            try {
              var selResult = WebsiteSDK.selectChatArticleSuggestion(suggestionId);
              if (selResult && selResult.article_preview && selResult.article_preview.articleId) {
                navigateToArticle(selResult.article_preview.articleId);
              }
            } catch (e3) {
              console.error('Error selecting chat suggestion', e3);
            }
            break;
          default:
            break;
        }
      });

      document.addEventListener('change', function (event) {
        var target = event.target;
        var action = target.getAttribute('data-action');
        if (!action) {
          return;
        }

        switch (action) {
          case 'change-language':
            handleLanguageChange(target.value);
            break;
          case 'change-topic-filter':
            handleTopicFilterChange(target.value);
            break;
          case 'change-content-type-filter':
            handleContentTypeFilterChange();
            break;
          case 'change-sort':
            handleSortChange(target.value);
            break;
          case 'chat-topic-change':
            if (!state.chatSession) {
              return;
            }
            try {
              var res = WebsiteSDK.setChatTopic(target.value);
              if (res && res.chat_session) {
                state.chatSession = res.chat_session;
              }
              debounceChatSuggestions();
            } catch (e) {
              console.error('Error changing chat topic', e);
            }
            break;
          default:
            break;
        }
      });

      document.addEventListener('input', function (event) {
        var target = event.target;
        var action = target.getAttribute('data-action');
        if (action === 'chat-input-change') {
          if (!state.chatSession || state.chatSession.status !== 'open') {
            return;
          }
          try {
            var res = WebsiteSDK.updateChatInputDraft(target.value || '');
            if (res && res.chat_session) {
              state.chatSession = res.chat_session;
            }
          } catch (e) {
            console.error('Error updating chat input draft', e);
          }
          debounceChatSuggestions();
        }
      });

      initializePage();
      applyChatVisibility();
    });
  </script>
</body>
</html>
