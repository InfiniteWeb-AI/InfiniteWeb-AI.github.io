<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Help Center Framework</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet' />

  <!-- Framework styles -->
  <link rel='stylesheet' href='framework.css' />
  <!-- Page styles -->
  <link rel='stylesheet' href='thread.css' />
</head>
<body>
  <header class='site-header'>
    <div class='header-inner container'>
      <a href='index.html' class='brand' aria-label='Help Center home'>
        <div class='brand-mark' aria-hidden='true'></div>
        <div class='brand-text'>
          <span class='brand-name'>Your Company</span>
          <span class='brand-context'>Help Center</span>
        </div>
      </a>

      <nav class='primary-nav' aria-label='Primary'>
        <ul class='nav-list'>
          <li class='nav-item is-active'>
            <a href='index.html' class='nav-link'>Help Center</a>
          </li>
          <li class='nav-item'>
            <a href='faq.html' class='nav-link'>FAQ</a>
          </li>
          <li class='nav-item'>
            <a href='community.html' class='nav-link'>Community</a>
          </li>
          <li class='nav-item'>
            <a href='returns.html' class='nav-link'>Returns &amp; Exchanges</a>
          </li>
          <li class='nav-item'>
            <a href='contact.html' class='nav-link'>Contact Us</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-main'>
    <div class='container'>
      <div class='thread-page' data-component='thread-detail-container'>
        <!-- Back navigation / breadcrumb -->
        <div class='thread-back-nav-wrapper' data-component='thread-back-navigation' data-populate='back-navigation'></div>

        <!-- Thread header hero band -->
        <section class='thread-header-shell'>
          <section class='thread-header-band' data-component='thread-header' data-populate='thread-header'>
            <!-- Populated by JS -->
          </section>
        </section>

        <!-- Main thread card -->
        <section class='thread-main-wrapper'>
          <section class='thread-card'>
            <div class='thread-card-inner'>
              <!-- Original post -->
              <section class='thread-original-post-section' data-component='thread-original-post' data-populate='original-post'>
                <!-- Populated by JS -->
              </section>

              <!-- Accepted answer (optional) -->
              <section class='accepted-answer-section' data-component='accepted-answer-panel' data-populate='accepted-answer'>
                <!-- Populated by JS -->
              </section>

              <!-- Replies header -->
              <header class='reply-list-header'>
                <h2 class='reply-list-title' data-populate='reply-count'></h2>
              </header>

              <!-- Reply list -->
              <section class='reply-list-section' data-component='reply-list' data-populate='reply-list'>
                <!-- Populated by JS -->
              </section>

              <!-- Reply form -->
              <section class='reply-form-section'>
                <h2 class='reply-form-title' data-i18n-key='reply_form_title'>Post a reply</h2>
                <form class='reply-form' data-component='reply-form' data-action='submit-reply' novalidate>
                  <div class='form-row'>
                    <label class='sr-only' for='replyBodyInput'>Reply</label>
                    <textarea id='replyBodyInput' name='body' rows='4' required></textarea>
                  </div>
                  <div class='form-actions'>
                    <button type='submit' class='btn btn-primary'>
                      <span data-i18n-key='reply_submit'>Post reply</span>
                    </button>
                  </div>
                  <p class='form-error' data-role='reply-error' aria-live='polite'></p>
                </form>
              </section>
            </div>
          </section>
        </section>
      </div>
    </div>

    <!-- App settings loader overlay -->
    <div class='app-settings-loader-overlay' data-component='app-settings-loader' aria-hidden='true'>
      <div class='app-settings-loader-backdrop'></div>
      <div class='app-settings-loader-inner'>
        <div class='loader-spinner' aria-hidden='true'></div>
        <p class='loader-text'>Loading your experience...</p>
      </div>
    </div>

    <!-- Chat launcher button -->
    <button type='button' class='chat-launcher' data-component='chat-launcher' data-action='open-chat' aria-expanded='false' aria-controls='chatWidget'>
      <span class='chat-launcher-icon' aria-hidden='true'>💬</span>
      <span class='chat-launcher-label' data-i18n-key='chat_launcher_label'>Chat with support</span>
    </button>

    <!-- Chat widget panel -->
    <aside id='chatWidget' class='chat-widget is-hidden' data-component='chat-widget' data-populate='chat-widget' aria-hidden='true' aria-label='Support chat'>
      <!-- Populated by JS -->
    </aside>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-links'>
          <li><a href='index.html'>Help Center Home</a></li>
          <li><a href='faq.html'>FAQ</a></li>
          <li><a href='community.html'>Community</a></li>
          <li><a href='contact.html'>Contact</a></li>
          <li><a href='about.html'>About</a></li>
          <li><a href='privacy.html'>Privacy Policy</a></li>
          <li><a href='terms.html'>Terms of Use</a></li>
        </ul>
      </nav>
      <p class='footer-meta'>&copy; <span data-year></span> Your Company. All rights reserved.</p>
    </div>
  </footer>

  <script>
    (function () {
      var yearSpan = document.querySelector('[data-year]');
      if (yearSpan) {
        yearSpan.textContent = new Date().getFullYear();
      }
    })();
  </script>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page UI logic -->
  <script>
    (function () {
      'use strict';

      var pageState = {
        appSettings: null,
        threadId: null,
        threadDetail: null,
        threadError: null,
        chatSession: null,
        chatTopics: [],
        chatSuggestions: []
      };

      var translations = {
        en: {
          back_to_community: 'Back to Community',
          community_label: 'Community',
          followed_threads: 'Followed threads',
          category_generic: 'General',
          thread_placeholder: 'Thread',
          status_open: 'Open',
          status_answered: 'Answered',
          status_closed: 'Closed',
          replies_label: 'Replies',
          reply_singular: 'reply',
          reply_plural: 'replies',
          follow_thread: 'Follow thread',
          following_thread: 'Following',
          language_label: 'Language',
          reply_form_title: 'Post a reply',
          reply_submit: 'Post reply',
          accepted_answer_label: 'Accepted answer',
          no_replies_yet: 'No replies yet. Be the first to reply.',
          loading_thread: 'Loading thread...',
          missing_thread: 'No thread selected.',
          invalid_thread: 'We could not load this thread.',
          chat_launcher_label: 'Chat with support',
          chat_widget_title: 'Support chat',
          chat_topic_label: 'Topic',
          chat_topic_default: 'Choose a topic',
          chat_input_placeholder: 'Type your question here...',
          chat_suggestions_heading: 'Suggested articles',
          chat_minimize_label: 'Minimize',
          chat_close_label: 'Close',
          chat_open_label: 'Open chat'
        },
        es: {
          back_to_community: 'Volver a la comunidad',
          community_label: 'Comunidad',
          followed_threads: 'Hilos seguidos',
          category_generic: 'General',
          thread_placeholder: 'Hilo',
          status_open: 'Abierto',
          status_answered: 'Respondido',
          status_closed: 'Cerrado',
          replies_label: 'Respuestas',
          reply_singular: 'respuesta',
          reply_plural: 'respuestas',
          follow_thread: 'Seguir hilo',
          following_thread: 'Siguiendo',
          language_label: 'Idioma',
          reply_form_title: 'Publicar una respuesta',
          reply_submit: 'Publicar respuesta',
          accepted_answer_label: 'Respuesta aceptada',
          no_replies_yet: 'Aún no hay respuestas. Sé el primero en responder.',
          loading_thread: 'Cargando hilo...',
          missing_thread: 'Ningún hilo seleccionado.',
          invalid_thread: 'No pudimos cargar este hilo.',
          chat_launcher_label: 'Chat con soporte',
          chat_widget_title: 'Chat de soporte',
          chat_topic_label: 'Tema',
          chat_topic_default: 'Elige un tema',
          chat_input_placeholder: 'Escribe tu pregunta aquí...',
          chat_suggestions_heading: 'Artículos sugeridos',
          chat_minimize_label: 'Minimizar',
          chat_close_label: 'Cerrar',
          chat_open_label: 'Abrir chat'
        }
      };

      function getCurrentLanguage() {
        if (pageState.appSettings && pageState.appSettings.language) {
          return pageState.appSettings.language;
        }
        return 'en';
      }

      function getT() {
        var lang = getCurrentLanguage();
        return translations[lang] || translations.en;
      }

      function escapeHtml(str) {
        if (str == null) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatDateTime(value) {
        if (!value) return '';
        try {
          var lang = getCurrentLanguage() === 'es' ? 'es-ES' : 'en-US';
          var d = new Date(value);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleString(lang, {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
        } catch (e) {
          return '';
        }
      }

      function formatThreadStatus(status) {
        var t = getT();
        if (status === 'answered') return t.status_answered;
        if (status === 'closed') return t.status_closed;
        return t.status_open;
      }

      function formatReplyCount(count) {
        var t = getT();
        var c = typeof count === 'number' ? count : 0;
        if (c === 1) {
          return '1 ' + t.reply_singular;
        }
        return String(c) + ' ' + t.reply_plural;
      }

      function showLoader(isLoading) {
        var overlay = document.querySelector('[data-component="app-settings-loader"]');
        if (!overlay) return;
        if (isLoading) {
          overlay.classList.add('is-active');
          overlay.setAttribute('aria-hidden', 'false');
        } else {
          overlay.classList.remove('is-active');
          overlay.setAttribute('aria-hidden', 'true');
        }
      }

      // Renderers (must use container directly)
      function renderBackNavigation(container) {
        var t = getT();
        var hasThread = !!(pageState.threadDetail && pageState.threadDetail.thread);
        var categoryName = hasThread && pageState.threadDetail.category ? pageState.threadDetail.category.name : t.category_generic;
        var threadTitle = hasThread ? escapeHtml(pageState.threadDetail.thread.title) : t.thread_placeholder;

        container.innerHTML = '\n          <nav class="thread-back-nav" aria-label="Breadcrumb">\n            <div class="thread-back-nav-inner">\n              <a href="javascript:void(0)" class="back-link" data-action="back-to-community">\n                <span class="back-icon" aria-hidden="true">\u2190</span>\n                <span>' + escapeHtml(t.back_to_community) + '</span>\n              </a>\n              <div class="breadcrumb">\n                <a href="javascript:void(0)" class="breadcrumb-link" data-action="back-to-community">' + escapeHtml(t.community_label) + '</a>\n                <span class="breadcrumb-separator">&#8250;</span>\n                <span class="breadcrumb-current-category">' + escapeHtml(categoryName) + '</span>' + (hasThread ? '\n                <span class="breadcrumb-separator">&#8250;</span>\n                <span class="breadcrumb-current-thread">' + threadTitle + '</span>' : '') + '\n              </div>\n              <a href="javascript:void(0)" class="followed-threads-link" data-action="go-followed-threads">' + escapeHtml(t.followed_threads) + '</a>\n            </div>\n          </nav>\n        ';
      }

      function renderThreadHeader(container) {
        var t = getT();
        var thread = pageState.threadDetail && pageState.threadDetail.thread;

        if (!thread) {
          container.innerHTML = '\n            <div class="thread-header-inner is-empty">\n              <div class="thread-header-left">\n                <h1 class="thread-title">' + escapeHtml(t.missing_thread) + '</h1>\n              </div>\n            </div>\n          ';
          return;
        }

        var statusClass = 'status-open';
        if (thread.status === 'answered') statusClass = 'status-answered';
        else if (thread.status === 'closed') statusClass = 'status-closed';

        var isFollowing = !!(pageState.threadDetail.user_state && pageState.threadDetail.user_state.is_following);
        var followLabel = isFollowing ? t.following_thread : t.follow_thread;
        var followClass = isFollowing ? 'btn-secondary is-active' : 'btn-secondary';

        var tags = Array.isArray(thread.tags) ? thread.tags : [];
        var tagsHtml = '';
        if (tags.length) {
          tagsHtml = '<ul class="thread-tags">' + tags.map(function (tag) {
            return '<li class="thread-tag">' + escapeHtml(tag) + '</li>';
          }).join('') + '</ul>';
        }

        var categoryName = pageState.threadDetail && pageState.threadDetail.category ? pageState.threadDetail.category.name : t.category_generic;

        container.innerHTML = '\n          <div class="thread-header-inner">\n            <div class="thread-header-left">\n              <div class="thread-category">' + escapeHtml(categoryName) + '</div>\n              <h1 class="thread-title">' + escapeHtml(thread.title) + '</h1>\n              <div class="thread-meta-row">\n                <span class="thread-status-pill ' + statusClass + '">' + escapeHtml(formatThreadStatus(thread.status)) + '</span>\n                <span class="thread-meta">' + escapeHtml(formatReplyCount(thread.reply_count)) + '</span>\n                <span class="thread-meta">' + escapeHtml(formatDateTime(thread.created_at)) + '</span>' + (thread.updated_at ? '<span class="thread-meta">Updated ' + escapeHtml(formatDateTime(thread.updated_at)) + '</span>' : '') + '\n              </div>' + tagsHtml + '\n            </div>\n            <div class="thread-header-right">\n              <div class="thread-header-actions">\n                <button type="button" class="btn ' + followClass + '" data-action="toggle-follow-thread" aria-pressed="' + (isFollowing ? 'true' : 'false') + '">\n                  ' + escapeHtml(followLabel) + '\n                </button>\n                <div class="language-switcher">\n                  <label for="languageSelect" class="language-label">' + escapeHtml(t.language_label) + '</label>\n                  <select id="languageSelect" class="language-select" data-action="change-language">\n                    <option value="en"' + (getCurrentLanguage() === 'en' ? ' selected' : '') + '>English</option>\n                    <option value="es"' + (getCurrentLanguage() === 'es' ? ' selected' : '') + '>Espa\u00f1ol</option>\n                  </select>\n                </div>\n              </div>\n            </div>\n          </div>\n        ';
      }

      function renderOriginalPost(container) {
        var t = getT();
        var thread = pageState.threadDetail && pageState.threadDetail.thread;

        if (!thread) {
          var message = pageState.threadError ? t.invalid_thread : t.missing_thread;
          container.innerHTML = '\n            <div class="thread-original-post is-empty">\n              <p>' + escapeHtml(message) + '</p>\n            </div>\n          ';
          return;
        }

        var body = thread.body || '';

        container.innerHTML = '\n          <article class="thread-original-post">\n            <div class="post-avatar" aria-hidden="true">\n              <div class="avatar-circle">OP</div>\n            </div>\n            <div class="post-content">\n              <div class="post-meta-row">\n                <span class="post-author">Original post</span>\n                <span class="post-meta">' + escapeHtml(formatDateTime(thread.created_at)) + '</span>\n              </div>\n              <div class="post-body">' + (body ? escapeHtml(body).replace(/\n/g, '<br>') : '') + '</div>\n            </div>\n          </article>\n        ';
      }

      function renderAcceptedAnswer(container) {
        var t = getT();
        var accepted = pageState.threadDetail && pageState.threadDetail.accepted_answer;

        if (!accepted) {
          container.innerHTML = '';
          return;
        }

        container.innerHTML = '\n          <article class="accepted-answer-panel">\n            <div class="accepted-avatar" aria-hidden="true">\n              <div class="avatar-circle is-accepted">✓</div>\n            </div>\n            <div class="accepted-content">\n              <div class="accepted-header-row">\n                <span class="accepted-label">' + escapeHtml(t.accepted_answer_label) + '</span>\n                <span class="accepted-meta">' + escapeHtml(formatDateTime(accepted.created_at)) + '</span>\n              </div>\n              <div class="accepted-body">' + escapeHtml(accepted.body).replace(/\n/g, '<br>') + '</div>\n            </div>\n          </article>\n        ';
      }

      function renderReplyCount(container) {
        var t = getT();
        var thread = pageState.threadDetail && pageState.threadDetail.thread;
        if (!thread) {
          container.textContent = t.replies_label;
          return;
        }
        container.textContent = formatReplyCount(thread.reply_count);
      }

      function renderReplyList(container) {
        var t = getT();
        var detail = pageState.threadDetail;
        if (!detail || !detail.thread) {
          container.innerHTML = '';
          return;
        }

        var replies = Array.isArray(detail.replies) ? detail.replies.slice() : [];
        var accepted = detail.accepted_answer;
        if (accepted) {
          replies = replies.filter(function (r) { return r.id !== accepted.id; });
        }

        if (!replies.length) {
          container.innerHTML = '\n            <p class="no-replies">' + escapeHtml(t.no_replies_yet) + '</p>\n          ';
          return;
        }

        replies.sort(function (a, b) {
          var da = new Date(a.created_at).getTime();
          var db = new Date(b.created_at).getTime();
          return da - db;
        });

        var html = replies.map(function (reply) {
          var isAccepted = !!reply.is_accepted_answer;
          return '\n            <article class="reply-item' + (isAccepted ? ' is-accepted' : '') + '">\n              <div class="reply-avatar" aria-hidden="true">\n                <div class="avatar-circle">R</div>\n              </div>\n              <div class="reply-content">\n                <div class="reply-meta-row">\n                  <span class="reply-author">Community reply</span>\n                  <span class="reply-meta">' + escapeHtml(formatDateTime(reply.created_at)) + '</span>' + (isAccepted ? '<span class="reply-accepted-flag">' + escapeHtml(t.accepted_answer_label) + '</span>' : '') + '\n                </div>\n                <div class="reply-body">' + escapeHtml(reply.body).replace(/\n/g, '<br>') + '</div>\n              </div>\n            </article>\n          ';
        }).join('');

        container.innerHTML = html;
      }

      function renderChatWidget(container) {
        var t = getT();
        var session = pageState.chatSession;

        if (!session || session.status === 'closed') {
          container.innerHTML = '';
          container.classList.add('is-hidden');
          container.setAttribute('aria-hidden', 'true');
          var launcher = document.querySelector('[data-component="chat-launcher"]');
          if (launcher) launcher.setAttribute('aria-expanded', 'false');
          return;
        }

        var isMin = !!session.is_minimized;
        if (isMin) {
          container.classList.add('is-minimized');
        } else {
          container.classList.remove('is-minimized');
        }

        var topics = Array.isArray(pageState.chatTopics) ? pageState.chatTopics : [];
        var topicOptions = '\n          <option value="">' + escapeHtml(t.chat_topic_default) + '</option>' + topics.map(function (topic) {
          var selected = session.topic && session.topic === topic.topic ? ' selected' : '';
          return '<option value="' + escapeHtml(topic.topic) + '"' + selected + '>' + escapeHtml(topic.label || topic.topic) + '</option>';
        }).join('');

        var suggestions = Array.isArray(pageState.chatSuggestions) ? pageState.chatSuggestions : [];
        var suggestionsHtml = suggestions.map(function (s) {
          var classes = 'chat-suggestion-item';
          if (s.matches_topic) classes += ' matches-topic';
          if (s.selected) classes += ' is-selected';
          return '\n            <button type="button" class="' + classes + '" data-suggestion-id="' + escapeHtml(s.suggestionId || s.id || '') + '">\n              <div class="suggestion-title">' + escapeHtml(s.title) + '</div>\n              <div class="suggestion-snippet">' + escapeHtml(s.snippet || '') + '</div>\n              <div class="suggestion-meta">' + escapeHtml(s.category_name || '') + '</div>\n            </button>\n          ';
        }).join('');

        container.innerHTML = '\n          <div class="chat-widget-inner">\n            <header class="chat-header">\n              <div class="chat-header-title">' + escapeHtml(t.chat_widget_title) + '</div>\n              <div class="chat-header-actions">\n                <button type="button" class="chat-header-btn" data-action="chat-minimize">' + escapeHtml(t.chat_minimize_label) + '</button>\n                <button type="button" class="chat-header-btn" data-action="chat-close">' + escapeHtml(t.chat_close_label) + '</button>\n              </div>\n            </header>\n            <div class="chat-body">\n              <div class="chat-topic-row">\n                <label for="chatTopicSelect" class="chat-topic-label">' + escapeHtml(t.chat_topic_label) + '</label>\n                <select id="chatTopicSelect" class="chat-topic-select" data-action="chat-select-topic">' + topicOptions + '</select>\n              </div>\n              <div class="chat-messages">\n                <!-- Conversation messages could appear here -->\n              </div>\n              <div class="chat-suggestions">\n                <div class="chat-suggestions-header">\n                  <span class="chat-suggestions-title">' + escapeHtml(t.chat_suggestions_heading) + '</span>\n                  <button type="button" class="chat-suggestions-refresh" data-action="chat-request-suggestions">&#8635;</button>\n                </div>\n                <div class="chat-suggestions-list" data-action="chat-suggestions-container">' + (suggestionsHtml || '') + '</div>\n              </div>\n            </div>\n            <div class="chat-input-row">\n              <label class="sr-only" for="chatInput">Chat input</label>\n              <textarea id="chatInput" class="chat-input" rows="2" data-action="chat-draft-input">' + escapeHtml(session.input_draft || '') + '</textarea>\n            </div>\n          </div>\n        ';

        container.classList.remove('is-hidden');
        container.setAttribute('aria-hidden', isMin ? 'true' : 'false');
        var launcher = document.querySelector('[data-component="chat-launcher"]');
        if (launcher) launcher.setAttribute('aria-expanded', isMin ? 'false' : 'true');

        // Update placeholder after render
        var input = container.querySelector('#chatInput');
        if (input) {
          input.setAttribute('placeholder', t.chat_input_placeholder);
        }
      }

      function renderAll() {
        var populateEls = document.querySelectorAll('[data-populate]');
        populateEls.forEach(function (el) {
          var type = el.getAttribute('data-populate');
          if (type === 'back-navigation') {
            renderBackNavigation(el);
          } else if (type === 'thread-header') {
            renderThreadHeader(el);
          } else if (type === 'original-post') {
            renderOriginalPost(el);
          } else if (type === 'accepted-answer') {
            renderAcceptedAnswer(el);
          } else if (type === 'reply-list') {
            renderReplyList(el);
          } else if (type === 'reply-count') {
            renderReplyCount(el);
          } else if (type === 'chat-widget') {
            renderChatWidget(el);
          }
        });

        updateI18nStrings();
      }

      function updateI18nStrings() {
        var t = getT();
        var nodes = document.querySelectorAll('[data-i18n-key]');
        nodes.forEach(function (node) {
          var key = node.getAttribute('data-i18n-key');
          if (t[key]) {
            node.textContent = t[key];
          }
        });

        var replyBody = document.getElementById('replyBodyInput');
        if (replyBody) {
          replyBody.setAttribute('placeholder', '');
        }

        var chatInput = document.getElementById('chatInput');
        if (chatInput) {
          chatInput.setAttribute('placeholder', t.chat_input_placeholder);
        }
      }

      // Event handlers (delegated)
      function onBackToCommunity() {
        window.location.href = 'community.html';
      }

      function onGoFollowedThreads() {
        window.location.href = 'followed_threads.html';
      }

      function onToggleFollowThread() {
        var detail = pageState.threadDetail;
        if (!detail || !detail.thread) return;
        var threadId = detail.thread.id;
        var isFollowing = !!(detail.user_state && detail.user_state.is_following);

        try {
          if (!isFollowing) {
            var res = WebsiteSDK.followCommunityThread(threadId);
            if (res && res.followed_thread) {
              if (!detail.user_state) detail.user_state = {};
              detail.user_state.is_following = true;
            }
          } else {
            var res2 = WebsiteSDK.unfollowCommunityThread(threadId);
            if (res2 && res2.success) {
              if (!detail.user_state) detail.user_state = {};
              detail.user_state.is_following = false;
            }
          }
        } catch (e) {
          console.error('Follow/unfollow failed', e);
        }

        renderAll();
      }

      function onChangeLanguage(event) {
        var select = event.target;
        var lang = select.value || 'en';
        try {
          var res = WebsiteSDK.updateLanguage(lang);
          if (res && res.settings) {
            pageState.appSettings = res.settings;
          } else {
            if (!pageState.appSettings) pageState.appSettings = { language: lang, chat_minimized: true };
            else pageState.appSettings.language = lang;
          }
        } catch (e) {
          console.error('updateLanguage failed', e);
          if (!pageState.appSettings) pageState.appSettings = { language: lang, chat_minimized: true };
          else pageState.appSettings.language = lang;
        }

        renderAll();
      }

      function onSubmitReply(event) {
        event.preventDefault();
        var form = event.target;
        var detail = pageState.threadDetail;
        if (!detail || !detail.thread) return;

        var bodyInput = form.querySelector('textarea[name="body"]');
        var errorEl = form.querySelector('[data-role="reply-error"]');
        if (!bodyInput) return;
        var body = bodyInput.value.trim();
        if (!body) {
          if (errorEl) errorEl.textContent = 'Reply cannot be empty.';
          return;
        }
        if (errorEl) errorEl.textContent = '';

        try {
          var res = WebsiteSDK.addCommunityReply(detail.thread.id, body);
          if (res && res.reply) {
            if (!Array.isArray(detail.replies)) detail.replies = [];
            detail.replies.push(res.reply);
            if (res.reply.is_accepted_answer) {
              detail.accepted_answer = res.reply;
            }
            if (detail.thread) {
              detail.thread.reply_count = (detail.thread.reply_count || 0) + 1;
            }
            bodyInput.value = '';
            bodyInput.blur();
            renderAll();
          }
        } catch (e) {
          console.error('addCommunityReply failed', e);
          if (errorEl) errorEl.textContent = 'There was a problem submitting your reply. Please try again.';
        }
      }

      function onOpenChat() {
        try {
          var res = WebsiteSDK.openChatWidget();
          if (res) {
            pageState.chatSession = res.chat_session;
            pageState.chatTopics = Array.isArray(res.available_topics) ? res.available_topics : [];
            pageState.chatSuggestions = [];
          }
        } catch (e) {
          console.error('openChatWidget failed', e);
          return;
        }

        var appSettings = pageState.appSettings;
        if (appSettings) appSettings.chat_minimized = false;

        var container = document.querySelector('[data-populate="chat-widget"]');
        if (container) renderChatWidget(container);
      }

      function onChatSelectTopic(event) {
        var select = event.target;
        var topic = select.value;
        if (!pageState.chatSession) return;
        try {
          var res = WebsiteSDK.setChatTopic(topic);
          if (res && res.chat_session) {
            pageState.chatSession = res.chat_session;
          }
        } catch (e) {
          console.error('setChatTopic failed', e);
        }
      }

      function onChatDraftInput(event) {
        var value = event.target.value || '';
        if (!pageState.chatSession) return;
        try {
          var res = WebsiteSDK.updateChatInputDraft(value);
          if (res && res.chat_session) {
            pageState.chatSession = res.chat_session;
          }
        } catch (e) {
          console.error('updateChatInputDraft failed', e);
        }
      }

      function onChatRequestSuggestions() {
        if (!pageState.chatSession) return;
        try {
          var res = WebsiteSDK.getChatArticleSuggestions();
          if (res && Array.isArray(res.suggestions)) {
            pageState.chatSuggestions = res.suggestions;
          }
        } catch (e) {
          console.error('getChatArticleSuggestions failed', e);
        }

        var container = document.querySelector('[data-populate="chat-widget"]');
        if (container) renderChatWidget(container);
      }

      function onChatSuggestionClick(event, container) {
        if (!pageState.chatSession) return;
        var target = event.target.closest('[data-suggestion-id]');
        if (!target) return;
        var id = target.getAttribute('data-suggestion-id');
        if (!id) return;

        try {
          var res = WebsiteSDK.selectChatArticleSuggestion(id);
          if (res && res.selected_suggestion) {
            var selId = res.selected_suggestion.id || res.selected_suggestion.suggestionId;
            pageState.chatSuggestions = pageState.chatSuggestions.map(function (s) {
              var sid = s.id || s.suggestionId;
              s.selected = (sid === selId);
              return s;
            });
          }
        } catch (e) {
          console.error('selectChatArticleSuggestion failed', e);
        }

        renderChatWidget(container);
      }

      function onChatMinimize() {
        if (!pageState.chatSession) return;
        try {
          var res = WebsiteSDK.minimizeChatWidget();
          if (res) {
            if (res.chat_session) pageState.chatSession = res.chat_session;
            if (res.app_settings) pageState.appSettings = res.app_settings;
          }
        } catch (e) {
          console.error('minimizeChatWidget failed', e);
        }

        var container = document.querySelector('[data-populate="chat-widget"]');
        if (container) renderChatWidget(container);
      }

      function onChatClose() {
        if (!pageState.chatSession) return;
        try {
          var res = WebsiteSDK.closeChatWidget();
          if (res && res.chat_session) {
            pageState.chatSession = res.chat_session;
          }
        } catch (e) {
          console.error('closeChatWidget failed', e);
        }

        var container = document.querySelector('[data-populate="chat-widget"]');
        if (container) renderChatWidget(container);
      }

      function setupEventDelegation() {
        document.addEventListener('click', function (event) {
          var actionEl = event.target.closest('[data-action]');
          if (!actionEl) return;
          var action = actionEl.getAttribute('data-action');
          if (action === 'back-to-community') {
            event.preventDefault();
            onBackToCommunity();
          } else if (action === 'go-followed-threads') {
            event.preventDefault();
            onGoFollowedThreads();
          } else if (action === 'toggle-follow-thread') {
            event.preventDefault();
            onToggleFollowThread();
          } else if (action === 'open-chat') {
            event.preventDefault();
            onOpenChat();
          } else if (action === 'chat-request-suggestions') {
            event.preventDefault();
            onChatRequestSuggestions();
          } else if (action === 'chat-minimize') {
            event.preventDefault();
            onChatMinimize();
          } else if (action === 'chat-close') {
            event.preventDefault();
            onChatClose();
          } else if (action === 'chat-suggestions-container') {
            event.preventDefault();
            var container = actionEl;
            onChatSuggestionClick(event, container);
          }
        });

        document.addEventListener('change', function (event) {
          var el = event.target;
          var action = el.getAttribute('data-action');
          if (action === 'change-language') {
            onChangeLanguage(event);
          } else if (action === 'chat-select-topic') {
            onChatSelectTopic(event);
          }
        });

        document.addEventListener('submit', function (event) {
          var form = event.target;
          var action = form.getAttribute('data-action');
          if (action === 'submit-reply') {
            onSubmitReply(event);
          }
        });

        document.addEventListener('input', function (event) {
          var el = event.target;
          var action = el.getAttribute('data-action');
          if (action === 'chat-draft-input') {
            onChatDraftInput(event);
          }
        });
      }

      function init() {
        var params = new URLSearchParams(window.location.search);
        var threadId = params.get('threadId');
        pageState.threadId = threadId;

        showLoader(true);

        try {
          var settingsRes = WebsiteSDK.getAppSettings();
          if (settingsRes && settingsRes.settings) {
            pageState.appSettings = settingsRes.settings;
          }
        } catch (e) {
          console.error('getAppSettings failed', e);
        }

        if (threadId) {
          try {
            var detailRes = WebsiteSDK.getCommunityThreadDetail(threadId);
            if (detailRes) {
              pageState.threadDetail = detailRes;
            }
          } catch (e2) {
            console.error('getCommunityThreadDetail failed', e2);
            pageState.threadError = 'load_failed';
          }
        } else {
          pageState.threadError = 'missing_thread_id';
        }

        showLoader(false);

        renderAll();
        setupEventDelegation();
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
