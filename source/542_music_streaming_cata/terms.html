<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rizophera Streaming - Terms of Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap" rel="stylesheet" />

  <!-- Framework Styles -->
  <link rel="stylesheet" href="framework.css" />
  <!-- Page Styles -->
  <link rel="stylesheet" href="terms.css" />
</head>
<body class="app-shell">
  <div class="app-layout">
    <!-- Sidebar Navigation (persistent, site-wide) -->
    <aside class="sidebar" aria-label="Primary">
      <div class="sidebar__brand">
        <div class="brand-mark">R</div>
        <div class="brand-text">
          <span class="brand-title">Rizophera</span>
          <span class="brand-subtitle">streaming</span>
        </div>
      </div>

      <nav class="sidebar__nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li class="nav-item nav-item--active">
            <a href="index.html" title="Homepage with global search and featured content">Home</a>
          </li>
          <li class="nav-item">
            <a href="catalog.html?categoryId=all_music" title="Browse all music by genre, type, and other filters">Browse</a>
          </li>
          <li class="nav-item">
            <a href="discover.html" title="Discovery hub with New Releases, Top Charts, and recommendations">Discover</a>
          </li>
          <li class="nav-item">
            <a href="catalog.html?categoryId=concerts" title="Browse rock and other concert videos available to rent or buy">Videos</a>
          </li>
          <li class="nav-item">
            <a href="store.html" title="Storefront hub for album bundles and other purchasable items">Store</a>
          </li>
          <li class="nav-item">
            <a href="plans.html" title="Subscription plans, including family plans with offline downloads">Plans</a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main Application Shell -->
    <div class="shell-main">
      <!-- Header -->
      <header class="app-header">
        <div class="app-header__inner">
          <div class="app-header__title">
            <span class="app-header__eyebrow">Music catalog</span>
            <h1 class="app-header__heading">CATALOG</h1>
          </div>

          <div class="app-header__search">
            <label class="search-field">
              <span class="search-field__icon" aria-hidden="true">&#128269;</span>
              <input
                class="search-field__input"
                type="search"
                placeholder="Search music, artists, albums"
                aria-label="Search music catalog"
              />
            </label>
          </div>
        </div>
      </header>

      <!-- Page-specific content container -->
      <main id="content" class="app-content" role="main">
        <section class="terms-page" data-component="terms-page terms-url-state-sync terms-print-mode-controller">
          <article class="terms-card">
            <!-- Loader / data-loader component -->
            <div class="terms-card__loader-overlay" data-component="terms-page-init" aria-hidden="true">
              <div class="terms-card__loader-spinner" role="status" aria-label="Loading Terms of Service"></div>
            </div>

            <!-- Header -->
            <header class="terms-card__header" data-component="terms-header">
              <div class="terms-card__title-group">
                <p class="terms-card__eyebrow">Legal</p>
                <h2 class="terms-card__title" data-populate="static-title"></h2>
              </div>
              <div class="terms-card__actions">
                <button
                  type="button"
                  class="btn btn-ghost terms-card__print-btn"
                  data-action="toggle-print-mode"
                  aria-pressed="false"
                >
                  <span
                    class="btn-label"
                    data-print-label-normal="Print layout"
                    data-print-label-active="Exit print layout"
                  >Print layout</span>
                </button>
              </div>
            </header>

            <!-- Main two-column body -->
            <div class="terms-card__body">
              <!-- Table of contents / navigation-list component -->
              <aside
                class="terms-toc"
                data-component="terms-section-toc"
                aria-label="Terms of Service sections"
              >
                <h3 class="terms-toc__heading">Sections</h3>
                <nav class="terms-toc__nav">
                  <ul class="terms-toc__list" data-populate="sections-toc"></ul>
                </nav>
              </aside>

              <!-- Section content / content-viewer component -->
              <section
                class="terms-content"
                data-component="terms-section-content"
                aria-label="Terms of Service content"
              >
                <div class="terms-content__meta">
                  <p class="terms-content__summary" data-populate="terms-summary"></p>
                </div>
                <div class="terms-content__divider" role="separator" aria-hidden="true"></div>
                <div class="terms-content__sections" data-populate="sections-content"></div>
              </section>
            </div>
          </article>
        </section>
      </main>

      <!-- Footer -->
      <footer class="app-footer">
        <div class="app-footer__inner">
          <nav class="footer-nav" aria-label="Footer navigation">
            <ul class="footer-nav__list">
              <li class="footer-nav__item">
                <a href="about.html" title="About the music streaming catalog and store">About</a>
              </li>
              <li class="footer-nav__item">
                <a href="help.html" title="FAQs and support resources">Help &amp; Support</a>
              </li>
              <li class="footer-nav__item">
                <a href="contact.html" title="Contact options for customer support">Contact</a>
              </li>
              <li class="footer-nav__item">
                <a href="terms.html" title="Legal terms governing use of the service">Terms of Service</a>
              </li>
              <li class="footer-nav__item">
                <a href="privacy.html" title="Information on how user data is collected and used">Privacy Policy</a>
              </li>
            </ul>
          </nav>

          <div class="app-footer__meta">
            <span class="app-footer__brand">Rizophera Streaming</span>
            <span class="app-footer__divider">&#8226;</span>
            <span class="app-footer__copyright">&copy; 2024 Rizophera Media. All rights reserved.</span>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <!-- SDK / business logic -->
  <script src="business_logic.js"></script>
  <!-- Page UI logic -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var termsState = {
        data: null,
        sectionElements: {},
        tocItemElements: {},
        activeSectionId: null,
        isPrintMode: false
      };

      function getUrlState() {
        var params = new URLSearchParams(window.location.search || '');
        var sectionId = params.get('sectionId');
        var printModeParam = params.get('printMode');
        var isPrintMode = false;
        if (printModeParam !== null) {
          var value = String(printModeParam).toLowerCase();
          isPrintMode = value === '1' || value === 'true' || value === 'yes';
        }
        return {
          sectionId: sectionId || null,
          isPrintMode: isPrintMode
        };
      }

      function updateUrl(newState, useReplace) {
        if (useReplace === void 0) {
          useReplace = true;
        }
        var current = getUrlState();
        var next = {
          sectionId: current.sectionId,
          isPrintMode: current.isPrintMode
        };
        if (newState && typeof newState === 'object') {
          if (Object.prototype.hasOwnProperty.call(newState, 'sectionId')) {
            next.sectionId = newState.sectionId;
          }
          if (Object.prototype.hasOwnProperty.call(newState, 'isPrintMode')) {
            next.isPrintMode = !!newState.isPrintMode;
          }
        }

        var params = new URLSearchParams(window.location.search || '');
        if (next.sectionId) {
          params.set('sectionId', next.sectionId);
        } else {
          params.delete('sectionId');
        }
        if (next.isPrintMode) {
          params.set('printMode', '1');
        } else {
          params.delete('printMode');
        }

        var query = params.toString();
        var newUrl = window.location.pathname + (query ? '?' + query : '') + window.location.hash;
        if (useReplace) {
          window.history.replaceState(null, '', newUrl);
        } else {
          window.history.pushState(null, '', newUrl);
        }
      }

      function applyPrintMode(isPrintMode) {
        termsState.isPrintMode = !!isPrintMode;

        var page = document.querySelector('.terms-page');
        if (page) {
          if (termsState.isPrintMode) {
            page.classList.add('terms-page--print');
          } else {
            page.classList.remove('terms-page--print');
          }
        }

        var toc = document.querySelector('[data-component="terms-section-toc"]');
        if (toc) {
          if (termsState.isPrintMode) {
            toc.classList.add('terms-toc--hidden');
            toc.setAttribute('aria-hidden', 'true');
          } else {
            toc.classList.remove('terms-toc--hidden');
            toc.removeAttribute('aria-hidden');
          }
        }

        var printButton = document.querySelector('.terms-card__print-btn');
        if (printButton) {
          printButton.setAttribute('aria-pressed', termsState.isPrintMode ? 'true' : 'false');
          var labelSpan = printButton.querySelector('.btn-label');
          if (labelSpan) {
            var normalLabel = labelSpan.getAttribute('data-print-label-normal') || 'Print layout';
            var activeLabel = labelSpan.getAttribute('data-print-label-active') || 'Exit print layout';
            labelSpan.textContent = termsState.isPrintMode ? activeLabel : normalLabel;
          }
        }
      }

      function createSectionId(heading, index) {
        var base = '';
        if (typeof heading === 'string') {
          base = heading.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
        }
        if (!base) {
          base = 'section-' + (index + 1);
        }
        return base;
      }

      function renderTitle(container, data) {
        if (!container) {
          return;
        }
        var title = data && typeof data.title === 'string' && data.title.trim() ? data.title : 'Terms of Service';
        container.textContent = title;
      }

      function renderSectionsToc(container, sections) {
        if (!container) {
          return;
        }
        termsState.tocItemElements = {};
        container.innerHTML = '';

        if (!Array.isArray(sections) || !sections.length) {
          var emptyItem = document.createElement('li');
          emptyItem.className = 'terms-toc__empty';
          emptyItem.textContent = 'No sections are available.';
          container.appendChild(emptyItem);
          return;
        }

        sections.forEach(function (section, index) {
          var heading = section && section.heading ? section.heading : '';
          var sectionId = createSectionId(heading, index);

          var li = document.createElement('li');
          li.className = 'terms-toc__item';
          li.setAttribute('data-section-id', sectionId);

          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'terms-toc__link';
          button.setAttribute('data-action', 'navigate-section');
          button.setAttribute('data-section-id', sectionId);
          button.textContent = heading && heading.trim() ? heading : 'Section ' + (index + 1);

          li.appendChild(button);
          container.appendChild(li);
          termsState.tocItemElements[sectionId] = li;
        });
      }

      function renderTermsSummary(container, sections) {
        if (!container) {
          return;
        }
        var count = Array.isArray(sections) ? sections.length : 0;
        if (!count) {
          container.textContent = '';
          container.setAttribute('aria-hidden', 'true');
        } else {
          container.removeAttribute('aria-hidden');
          var label = 'This document contains ' + count + ' section';
          if (count !== 1) {
            label += 's';
          }
          label += '.';
          container.textContent = label;
        }
      }

      function renderSectionsContent(container, sections) {
        if (!container) {
          return;
        }
        termsState.sectionElements = {};
        container.innerHTML = '';

        if (!Array.isArray(sections) || !sections.length) {
          var emptyMessage = document.createElement('p');
          emptyMessage.className = 'terms-content__empty';
          emptyMessage.textContent = 'No Terms of Service content is available at this time.';
          container.appendChild(emptyMessage);
          return;
        }

        sections.forEach(function (section, index) {
          var heading = section && section.heading ? section.heading : '';
          var bodyHtml = section && typeof section.body_html === 'string' ? section.body_html : '';
          var sectionId = createSectionId(heading, index);

          var article = document.createElement('article');
          article.className = 'terms-section';
          article.setAttribute('data-section-id', sectionId);
          article.id = 'terms-section-' + sectionId;

          var h3 = document.createElement('h3');
          h3.className = 'terms-section__heading';
          h3.textContent = heading && heading.trim() ? heading : 'Section ' + (index + 1);

          var body = document.createElement('div');
          body.className = 'terms-section__body';
          if (bodyHtml) {
            body.innerHTML = bodyHtml;
          }

          article.appendChild(h3);
          article.appendChild(body);
          container.appendChild(article);

          termsState.sectionElements[sectionId] = article;
        });
      }

      function setActiveSection(sectionId) {
        termsState.activeSectionId = sectionId || null;

        Object.keys(termsState.tocItemElements).forEach(function (id) {
          var item = termsState.tocItemElements[id];
          if (!item) {
            return;
          }
          if (id === sectionId) {
            item.classList.add('terms-toc__item--active');
          } else {
            item.classList.remove('terms-toc__item--active');
          }
        });

        Object.keys(termsState.sectionElements).forEach(function (id) {
          var el = termsState.sectionElements[id];
          if (!el) {
            return;
          }
          if (id === sectionId) {
            el.classList.add('terms-section--active');
          } else {
            el.classList.remove('terms-section--active');
          }
        });
      }

      function scrollToSection(sectionId, useSmooth) {
        if (!sectionId) {
          return;
        }
        var section = termsState.sectionElements[sectionId];
        if (!section) {
          return;
        }
        var rect = section.getBoundingClientRect();
        var currentScroll = window.pageYOffset || document.documentElement.scrollTop || 0;
        var headerOffset = 80;
        var targetTop = currentScroll + rect.top - headerOffset;
        var behavior = useSmooth ? 'smooth' : 'auto';
        try {
          window.scrollTo({ top: targetTop, behavior: behavior });
        } catch (e) {
          window.scrollTo(0, targetTop);
        }
      }

      var scrollTicking = false;
      function handleScroll() {
        if (termsState.isPrintMode) {
          return;
        }
        if (!termsState.sectionElements || !Object.keys(termsState.sectionElements).length) {
          return;
        }
        if (scrollTicking) {
          return;
        }
        scrollTicking = true;
        window.requestAnimationFrame(function () {
          scrollTicking = false;
          var viewportTop = 80;
          var closestId = null;
          var closestDistance = Infinity;

          Object.keys(termsState.sectionElements).forEach(function (id) {
            var el = termsState.sectionElements[id];
            if (!el) {
              return;
            }
            var rect = el.getBoundingClientRect();
            var distance = Math.abs(rect.top - viewportTop);
            if (distance < closestDistance) {
              closestDistance = distance;
              closestId = id;
            }
          });

          if (closestId && closestId !== termsState.activeSectionId) {
            setActiveSection(closestId);
            updateUrl({ sectionId: closestId }, true);
          }
        });
      }

      function handlePopState() {
        var urlState = getUrlState();
        applyPrintMode(urlState.isPrintMode);
        if (urlState.sectionId && termsState.sectionElements[urlState.sectionId]) {
          setActiveSection(urlState.sectionId);
          scrollToSection(urlState.sectionId, false);
        } else {
          setActiveSection(null);
        }
      }

      function handleActionClick(event) {
        var target = event.target;
        if (!target) {
          return;
        }
        var actionElement = target.closest('[data-action]');
        if (!actionElement) {
          return;
        }
        var action = actionElement.getAttribute('data-action');
        if (!action) {
          return;
        }

        if (action === 'navigate-section') {
          if (termsState.isPrintMode) {
            return;
          }
          var sectionId = actionElement.getAttribute('data-section-id');
          if (!sectionId) {
            return;
          }
          scrollToSection(sectionId, true);
          setActiveSection(sectionId);
          updateUrl({ sectionId: sectionId }, false);
        } else if (action === 'toggle-print-mode') {
          var nextMode = !termsState.isPrintMode;
          applyPrintMode(nextMode);
          updateUrl({ isPrintMode: nextMode }, false);
        }
      }

      function initPage() {
        var urlState = getUrlState();
        termsState.isPrintMode = urlState.isPrintMode;

        var loader = document.querySelector('[data-component="terms-page-init"]');
        if (loader) {
          loader.classList.add('terms-card__loader-overlay--active');
          loader.setAttribute('aria-hidden', 'false');
        }

        var content;
        try {
          content = WebsiteSDK.getStaticPageContent('terms_of_service');
        } catch (error) {
          console.error('Failed to load Terms of Service content:', error);
          var sectionsContainer = document.querySelector('[data-populate="sections-content"]');
          if (sectionsContainer) {
            sectionsContainer.textContent = 'Unable to load Terms of Service content. Please try again later.';
          }
          if (loader) {
            loader.classList.remove('terms-card__loader-overlay--active');
            loader.setAttribute('aria-hidden', 'true');
          }
          applyPrintMode(termsState.isPrintMode);
          return;
        }

        termsState.data = content || {};
        var sections = Array.isArray(termsState.data.sections) ? termsState.data.sections : [];

        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function (element) {
          var dataType = element.getAttribute('data-populate');
          if (dataType === 'static-title') {
            renderTitle(element, termsState.data);
          } else if (dataType === 'sections-toc') {
            renderSectionsToc(element, sections);
          } else if (dataType === 'sections-content') {
            renderSectionsContent(element, sections);
          } else if (dataType === 'terms-summary') {
            renderTermsSummary(element, sections);
          }
        });

        if (loader) {
          loader.classList.remove('terms-card__loader-overlay--active');
          loader.setAttribute('aria-hidden', 'true');
        }

        applyPrintMode(termsState.isPrintMode);

        if (urlState.sectionId && termsState.sectionElements[urlState.sectionId]) {
          setActiveSection(urlState.sectionId);
          scrollToSection(urlState.sectionId, false);
        } else {
          setActiveSection(null);
        }

        window.addEventListener('scroll', handleScroll, { passive: true });
        window.addEventListener('popstate', handlePopState);
        document.addEventListener('click', handleActionClick);
      }

      initPage();
    });
  </script>
</body>
</html>
