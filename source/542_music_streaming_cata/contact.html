<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rizophera Streaming - Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap" rel="stylesheet" />

  <!-- Framework Styles -->
  <link rel="stylesheet" href="framework.css" />
  <!-- Contact Page Styles -->
  <link rel="stylesheet" href="contact.css" />
</head>
<body class="app-shell">
  <div class="app-layout">
    <!-- Sidebar Navigation (persistent, site-wide) -->
    <aside class="sidebar" aria-label="Primary">
      <div class="sidebar__brand">
        <div class="brand-mark">R</div>
        <div class="brand-text">
          <span class="brand-title">Rizophera</span>
          <span class="brand-subtitle">streaming</span>
        </div>
      </div>

      <nav class="sidebar__nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li class="nav-item nav-item--active">
            <a href="index.html" title="Homepage with global search and featured content">Home</a>
          </li>
          <li class="nav-item">
            <a href="catalog.html?categoryId=all_music" title="Browse all music by genre, type, and other filters">Browse</a>
          </li>
          <li class="nav-item">
            <a href="discover.html" title="Discovery hub with New Releases, Top Charts, and recommendations">Discover</a>
          </li>
          <li class="nav-item">
            <a href="catalog.html?categoryId=concerts" title="Browse rock and other concert videos available to rent or buy">Videos</a>
          </li>
          <li class="nav-item">
            <a href="store.html" title="Storefront hub for album bundles and other purchasable items">Store</a>
          </li>
          <li class="nav-item">
            <a href="plans.html" title="Subscription plans, including family plans with offline downloads">Plans</a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main Application Shell -->
    <div class="shell-main">
      <!-- Header -->
      <header class="app-header">
        <div class="app-header__inner">
          <div class="app-header__title">
            <span class="app-header__eyebrow">Music catalog</span>
            <h1 class="app-header__heading">CATALOG</h1>
          </div>

          <div class="app-header__search">
            <label class="search-field">
              <span class="search-field__icon" aria-hidden="true">&#128269;</span>
              <input
                class="search-field__input"
                type="search"
                placeholder="Search music, artists, albums"
                aria-label="Search music catalog"
              />
            </label>
          </div>
        </div>
      </header>

      <!-- Page-specific content container -->
      <main id="content" class="app-content" role="main">
        <div class="contact-page">
          <section class="contact-card" aria-labelledby="contact-page-title">
            <header class="contact-card__header">
              <span class="contact-card__label">CONTACT</span>
              <h2
                class="contact-card__title"
                id="contact-page-title"
                data-component="contact-info-sections"
                data-populate="static_title"
              ></h2>
            </header>

            <div class="contact-card__body">
              <!-- Left column: static contact info sections -->
              <div
                class="contact-card__column contact-card__column--info"
                data-component="contact-info-sections"
              >
                <div class="contact-info" data-populate="contact_sections"></div>
              </div>

              <!-- Right column: contact form -->
              <div
                class="contact-card__column contact-card__column--form"
                data-component="contact-form"
              >
                <section class="contact-form" aria-label="Contact support form">
                  <div class="contact-form__intro" data-populate="contact_form_instructions"></div>

                  <form
                    id="contactForm"
                    class="contact-form__form"
                    novalidate
                    data-action="submit_contact_form"
                    data-component="contact-form"
                  >
                    <div class="form-row">
                      <div class="form-group" data-field-group="name">
                        <label for="contactName">Name <span aria-hidden="true">*</span></label>
                        <input
                          id="contactName"
                          name="name"
                          type="text"
                          autocomplete="name"
                          required
                          data-field="name"
                        />
                        <p
                          class="form-field-error"
                          data-error-for="name"
                          aria-live="polite"
                        ></p>
                      </div>

                      <div class="form-group" data-field-group="email">
                        <label for="contactEmail">Email <span aria-hidden="true">*</span></label>
                        <input
                          id="contactEmail"
                          name="email"
                          type="email"
                          autocomplete="email"
                          required
                          data-field="email"
                        />
                        <p
                          class="form-field-error"
                          data-error-for="email"
                          aria-live="polite"
                        ></p>
                      </div>
                    </div>

                    <div class="form-group" data-field-group="subject">
                      <label for="contactSubject">Subject <span aria-hidden="true">*</span></label>
                      <input
                        id="contactSubject"
                        name="subject"
                        type="text"
                        required
                        data-field="subject"
                      />
                      <p
                        class="form-field-error"
                        data-error-for="subject"
                        aria-live="polite"
                      ></p>
                    </div>

                    <div class="form-row">
                      <div class="form-group" data-field-group="message_type">
                        <label for="contactMessageType">Topic <span aria-hidden="true">*</span></label>
                        <select
                          id="contactMessageType"
                          name="message_type"
                          required
                          data-field="message_type"
                        >
                          <option value="">Select a topic</option>
                          <option value="billing">Billing</option>
                          <option value="technical_issue">Technical issue</option>
                          <option value="feedback">Feedback</option>
                          <option value="other">Other</option>
                        </select>
                        <p
                          class="form-field-error"
                          data-error-for="message_type"
                          aria-live="polite"
                        ></p>
                      </div>
                    </div>

                    <div class="form-group" data-field-group="message">
                      <label for="contactMessage">Message <span aria-hidden="true">*</span></label>
                      <textarea
                        id="contactMessage"
                        name="message"
                        rows="5"
                        required
                        data-field="message"
                      ></textarea>
                      <p
                        class="form-field-error"
                        data-error-for="message"
                        aria-live="polite"
                      ></p>
                    </div>

                    <div class="contact-form__actions">
                      <button
                        type="submit"
                        class="btn btn-primary contact-form__submit"
                      >
                        <span
                          class="btn-label"
                          data-state-default="Send message"
                          data-state-submitting="Sending..."
                        >
                          Send message
                        </span>
                      </button>
                    </div>
                  </form>
                </section>
              </div>
            </div>

            <!-- Submission result notice -->
            <div class="contact-card__footer">
              <div
                class="submission-result"
                data-component="submission-result-notice"
                data-populate="submission_result"
                aria-live="polite"
              ></div>
            </div>

            <!-- Static page loader overlay -->
            <div
              class="static-page-loader"
              data-component="static-page-loader"
              hidden
              aria-hidden="true"
            >
              <div class="static-page-loader__backdrop"></div>
              <div class="static-page-loader__spinner" role="status" aria-live="polite">
                <span class="static-page-loader__label">Loading contact information...</span>
              </div>
            </div>
          </section>

          <!-- URL state sync (non-visual) -->
          <div data-component="url-state-sync" aria-hidden="true"></div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="app-footer">
        <div class="app-footer__inner">
          <nav class="footer-nav" aria-label="Footer navigation">
            <ul class="footer-nav__list">
              <li class="footer-nav__item">
                <a href="about.html" title="About the music streaming catalog and store">About</a>
              </li>
              <li class="footer-nav__item">
                <a href="help.html" title="FAQs and support resources">Help &amp; Support</a>
              </li>
              <li class="footer-nav__item">
                <a href="contact.html" title="Contact options for customer support">Contact</a>
              </li>
              <li class="footer-nav__item">
                <a href="terms.html" title="Legal terms governing use of the service">Terms of Service</a>
              </li>
              <li class="footer-nav__item">
                <a href="privacy.html" title="Information on how user data is collected and used">Privacy Policy</a>
              </li>
            </ul>
          </nav>

          <div class="app-footer__meta">
            <span class="app-footer__brand">Rizophera Streaming</span>
            <span class="app-footer__divider">&#8226;</span>
            <span class="app-footer__copyright">&copy; 2024 Rizophera Media. All rights reserved.</span>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <!-- SDK / business logic -->
  <script src="business_logic.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // URL state sync
      const url = new URL(window.location.href);
      const urlParams = url.searchParams;

      const allowedMessageTypes = ['billing', 'technical_issue', 'feedback', 'other'];

      const initialTopicRaw = urlParams.get('topic') || urlParams.get('message_type') || '';
      const initialTopic = allowedMessageTypes.includes(initialTopicRaw) ? initialTopicRaw : '';
      const initialSubject = urlParams.get('subject') || '';
      const initialEmail = urlParams.get('email') || '';
      const initialStatus = urlParams.get('status');
      const initialTicketId = urlParams.get('ticket_id') || null;

      const formState = {
        name: '',
        email: initialEmail,
        subject: initialSubject,
        message_type: initialTopic,
        message: ''
      };

      const touchedFields = {
        name: false,
        email: false,
        subject: false,
        message_type: false,
        message: false
      };

      let staticContent = null;

      const submissionState = {
        status: null,
        ticket_id: null,
        message: null
      };

      if (initialStatus === 'success' && initialTicketId) {
        submissionState.status = 'success';
        submissionState.ticket_id = initialTicketId;
        submissionState.message = 'Your previous request was submitted successfully.';
      } else if (initialStatus === 'error') {
        submissionState.status = 'error';
        submissionState.message = 'We were unable to submit your last request. You can update the form and try again.';
      }

      function setLoaderVisible(isVisible) {
        const loader = document.querySelector('[data-component="static-page-loader"]');
        if (!loader) return;
        loader.hidden = !isVisible;
        loader.setAttribute('aria-hidden', isVisible ? 'false' : 'true');
      }

      function updateUrlParams(patch) {
        const currentUrl = new URL(window.location.href);
        const params = currentUrl.searchParams;
        Object.keys(patch).forEach(function(key) {
          const value = patch[key];
          if (value === null || value === undefined || value === '') {
            params.delete(key);
          } else {
            params.set(key, String(value));
          }
        });
        const newQuery = params.toString();
        const newUrl = currentUrl.pathname + (newQuery ? '?' + newQuery : '') + currentUrl.hash;
        window.history.replaceState(null, '', newUrl);
      }

      // ----- Rendering helpers -----

      function renderStaticTitle(container, content) {
        const title = content && content.title ? content.title : 'Contact';
        container.textContent = title;
      }

      function renderContactSections(container, content) {
        container.innerHTML = '';
        if (!content || !Array.isArray(content.sections) || content.sections.length === 0) {
          const fallback = document.createElement('p');
          fallback.textContent = 'Contact details are currently unavailable. You can still use the form to reach us.';
          container.appendChild(fallback);
          return;
        }

        content.sections.forEach(function(section) {
          const sectionEl = document.createElement('section');
          sectionEl.className = 'contact-info-section';

          if (section.heading) {
            const headingEl = document.createElement('h3');
            headingEl.className = 'contact-info-section__heading';
            headingEl.textContent = section.heading;
            sectionEl.appendChild(headingEl);
          }

          if (section.body_html) {
            const bodyEl = document.createElement('div');
            bodyEl.className = 'contact-info-section__body';
            bodyEl.innerHTML = section.body_html;
            sectionEl.appendChild(bodyEl);
          }

          container.appendChild(sectionEl);
        });
      }

      function renderContactFormInstructions(container, content) {
        container.innerHTML = '';
        if (!content || !Array.isArray(content.sections) || content.sections.length === 0) {
          return;
        }

        // Try to find a section whose heading suggests form instructions
        let chosen = null;
        for (let i = 0; i < content.sections.length; i += 1) {
          const sec = content.sections[i];
          const heading = (sec.heading || '').toLowerCase();
          if (heading.indexOf('contact form') !== -1 || heading.indexOf('support request') !== -1 || heading.indexOf('get in touch') !== -1) {
            chosen = sec;
            break;
          }
        }

        if (!chosen) {
          // If no specific section found, do not show a duplicate block here
          return;
        }

        if (chosen.body_html) {
          const wrapper = document.createElement('div');
          wrapper.className = 'contact-form__instructions';
          wrapper.innerHTML = chosen.body_html;
          container.appendChild(wrapper);
        }
      }

      function buildSubmissionMessageText(state) {
        if (!state || !state.status) return '';
        const base = state.message || (state.status === 'success'
          ? 'Your request has been submitted.'
          : 'There was a problem submitting your request.');
        const ticketPart = state.ticket_id ? ' Ticket ID: ' + state.ticket_id + '.' : '';
        return base + ticketPart;
      }

      function renderSubmissionResult(container, state) {
        container.innerHTML = '';
        if (!state || !state.status) {
          container.hidden = true;
          return;
        }

        container.hidden = false;
        container.classList.remove('submission-result--success', 'submission-result--error');
        container.classList.add(state.status === 'success' ? 'submission-result--success' : 'submission-result--error');

        const inner = document.createElement('div');
        inner.className = 'submission-result__inner';

        const msgEl = document.createElement('p');
        msgEl.className = 'submission-result__message';
        msgEl.textContent = buildSubmissionMessageText(state);

        const dismissBtn = document.createElement('button');
        dismissBtn.type = 'button';
        dismissBtn.className = 'submission-result__dismiss';
        dismissBtn.setAttribute('data-action', 'dismiss_submission_notice');
        dismissBtn.textContent = 'Dismiss';

        inner.appendChild(msgEl);
        inner.appendChild(dismissBtn);
        container.appendChild(inner);
      }

      function renderPopulateElement(element) {
        const type = element.getAttribute('data-populate');
        if (type === 'static_title') {
          renderStaticTitle(element, staticContent);
        } else if (type === 'contact_sections') {
          renderContactSections(element, staticContent);
        } else if (type === 'contact_form_instructions') {
          renderContactFormInstructions(element, staticContent);
        } else if (type === 'submission_result') {
          renderSubmissionResult(element, submissionState);
        }
      }

      function renderAllPopulateElements() {
        const populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(el) {
          renderPopulateElement(el);
        });
      }

      // ----- Validation -----

      function validateField(name, rawValue) {
        const value = typeof rawValue === 'string' ? rawValue.trim() : rawValue;
        if (name === 'name') {
          if (!value) return 'Name is required.';
          return '';
        }
        if (name === 'email') {
          if (!value) return 'Email is required.';
          const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailPattern.test(value)) return 'Enter a valid email address.';
          return '';
        }
        if (name === 'subject') {
          if (!value) return 'Subject is required.';
          return '';
        }
        if (name === 'message_type') {
          if (!value) return 'Please select a topic.';
          if (allowedMessageTypes.indexOf(value) === -1) return 'Please select a valid topic.';
          return '';
        }
        if (name === 'message') {
          if (!value) return 'Message is required.';
          return '';
        }
        return '';
      }

      function showFieldError(fieldName, message) {
        const errorEls = document.querySelectorAll('[data-error-for="' + fieldName + '"]');
        errorEls.forEach(function(errEl) {
          errEl.textContent = message;
          errEl.hidden = !message;
        });

        const fieldEl = document.querySelector('[data-field="' + fieldName + '"]');
        if (fieldEl) {
          if (message) {
            fieldEl.setAttribute('aria-invalid', 'true');
          } else {
            fieldEl.removeAttribute('aria-invalid');
          }
        }
      }

      function validateAndShowField(fieldName) {
        const value = formState[fieldName] || '';
        const error = validateField(fieldName, value);
        showFieldError(fieldName, error);
        return !error;
      }

      function validateForm() {
        const fieldNames = ['name', 'email', 'subject', 'message_type', 'message'];
        let allValid = true;
        fieldNames.forEach(function(fieldName) {
          touchedFields[fieldName] = true;
          const valid = validateAndShowField(fieldName);
          if (!valid) {
            allValid = false;
          }
        });
        return allValid;
      }

      // ----- Form interactions -----

      function initFormFromState() {
        const fieldEls = document.querySelectorAll('[data-field]');
        fieldEls.forEach(function(fieldEl) {
          const name = fieldEl.getAttribute('data-field');
          if (!Object.prototype.hasOwnProperty.call(formState, name)) return;
          if (fieldEl.tagName === 'SELECT' || fieldEl.tagName === 'TEXTAREA' || fieldEl.tagName === 'INPUT') {
            fieldEl.value = formState[name] || '';
          }
        });
      }

      function handleFieldInput(event) {
        const target = event.target;
        const name = target.getAttribute('data-field');
        if (!name || !Object.prototype.hasOwnProperty.call(formState, name)) return;
        formState[name] = target.value;
        if (touchedFields[name]) {
          validateAndShowField(name);
        }
      }

      function handleFieldBlur(event) {
        const target = event.target;
        const name = target.getAttribute('data-field');
        if (!name || !Object.prototype.hasOwnProperty.call(formState, name)) return;
        touchedFields[name] = true;
        validateAndShowField(name);
      }

      function resetFormStateAndFields() {
        formState.name = '';
        formState.email = initialEmail;
        formState.subject = '';
        formState.message_type = initialTopic;
        formState.message = '';

        Object.keys(touchedFields).forEach(function(key) {
          touchedFields[key] = false;
        });

        initFormFromState();
        const errorContainers = document.querySelectorAll('.form-field-error');
        errorContainers.forEach(function(el) {
          el.textContent = '';
          el.hidden = true;
        });
        const fieldEls = document.querySelectorAll('[data-field]');
        fieldEls.forEach(function(fieldEl) {
          fieldEl.removeAttribute('aria-invalid');
        });
      }

      function handleFormSubmit(event) {
        event.preventDefault();
        const formEl = event.target;
        if (!formEl || formEl.id !== 'contactForm') return;

        const isValid = validateForm();
        if (!isValid) {
          const firstInvalid = formEl.querySelector('[aria-invalid="true"]');
          if (firstInvalid && typeof firstInvalid.focus === 'function') {
            firstInvalid.focus();
          }
          return;
        }

        const submitButton = formEl.querySelector('.contact-form__submit');
        const labelSpan = submitButton ? submitButton.querySelector('.btn-label') : null;
        const defaultLabel = labelSpan ? (labelSpan.getAttribute('data-state-default') || 'Send message') : 'Send message';
        const submittingLabel = labelSpan ? (labelSpan.getAttribute('data-state-submitting') || 'Sending...') : 'Sending...';

        if (submitButton) {
          submitButton.disabled = true;
        }
        if (labelSpan) {
          labelSpan.textContent = submittingLabel;
        }

        let response;
        try {
          response = WebsiteSDK.submitContactForm(
            formState.name,
            formState.email,
            formState.subject,
            formState.message_type,
            formState.message
          );
        } catch (err) {
          response = {
            success: false,
            ticket_id: null,
            message: 'Unexpected error while submitting. Please try again.'
          };
        }

        if (submitButton) {
          submitButton.disabled = false;
        }
        if (labelSpan) {
          labelSpan.textContent = defaultLabel;
        }

        if (response && response.success) {
          submissionState.status = 'success';
          submissionState.ticket_id = response.ticket_id || null;
          submissionState.message = response.message || 'Your request has been submitted.';

          // Update URL status and ticket_id, preserve other params
          updateUrlParams({ status: 'success', ticket_id: submissionState.ticket_id });

          const resultContainers = document.querySelectorAll('[data-populate="submission_result"]');
          resultContainers.forEach(function(container) {
            renderSubmissionResult(container, submissionState);
          });

          resetFormStateAndFields();
        } else {
          submissionState.status = 'error';
          submissionState.ticket_id = response && response.ticket_id ? response.ticket_id : null;
          submissionState.message = (response && response.message) || 'We were unable to submit your request. Please try again.';

          updateUrlParams({ status: 'error', ticket_id: null });

          const resultContainers = document.querySelectorAll('[data-populate="submission_result"]');
          resultContainers.forEach(function(container) {
            renderSubmissionResult(container, submissionState);
          });
        }
      }

      // ----- Static content load -----

      function loadStaticContent() {
        setLoaderVisible(true);
        try {
          staticContent = WebsiteSDK.getStaticPageContent('contact');
        } catch (err) {
          staticContent = {
            title: 'Contact',
            sections: []
          };
        }
        setLoaderVisible(false);
        renderAllPopulateElements();
      }

      // ----- Event delegation for data-action -----

      document.addEventListener('submit', function(event) {
        const target = event.target;
        if (!target || !target.matches('[data-action="submit_contact_form"]')) return;
        handleFormSubmit(event);
      });

      document.addEventListener('click', function(event) {
        const actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        const action = actionEl.getAttribute('data-action');
        if (action === 'dismiss_submission_notice') {
          submissionState.status = null;
          submissionState.message = null;
          submissionState.ticket_id = submissionState.ticket_id; // keep value in memory if needed
          updateUrlParams({ status: null, ticket_id: null });
          const resultContainers = document.querySelectorAll('[data-populate="submission_result"]');
          resultContainers.forEach(function(container) {
            renderSubmissionResult(container, submissionState);
          });
        }
      });

      // ----- Initialize field listeners -----

      function initFieldListeners() {
        const fieldEls = document.querySelectorAll('[data-field]');
        fieldEls.forEach(function(fieldEl) {
          fieldEl.addEventListener('input', handleFieldInput);
          fieldEl.addEventListener('change', handleFieldInput);
          fieldEl.addEventListener('blur', handleFieldBlur);
        });
      }

      // ----- Initialisation -----

      initFormFromState();
      initFieldListeners();

      // Render any submission state derived from URL before loading static content
      const initialResultContainers = document.querySelectorAll('[data-populate="submission_result"]');
      initialResultContainers.forEach(function(container) {
        renderSubmissionResult(container, submissionState);
      });

      loadStaticContent();
    });
  </script>
</body>
</html>
