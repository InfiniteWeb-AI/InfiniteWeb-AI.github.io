<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contemporary Art Museum News</title>

    <!-- Typography: classic editorial serif pairing -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Lora:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

    <!-- Site stylesheet -->
    
    <!-- Events page stylesheet -->
    <link rel="stylesheet" href="events.css">
</head>
<body>

<header class="site-header">
    <div class="header-inner container">
        <div class="site-branding">
            <a href="index.html" class="site-title" aria-label="Museum journal home">
                <span class="site-title-primary">museum</span>
                <span class="site-title-secondary">journal</span>
            </a>
        </div>

        <nav class="primary-nav" aria-label="Primary navigation">
            <ul class="primary-nav-list">
                <li class="primary-nav-item"><a href="index.html" class="primary-nav-link">Home</a></li>
                <li class="primary-nav-item"><a href="search_results.html?categoryId=news" class="primary-nav-link">News</a></li>
                <li class="primary-nav-item"><a href="exhibitions.html?status=current" class="primary-nav-link">Exhibitions</a></li>
                <li class="primary-nav-item"><a href="events.html?view=list" class="primary-nav-link">Events</a></li>
                <li class="primary-nav-item"><a href="reviews.html" class="primary-nav-link">Reviews</a></li>
                <li class="primary-nav-item"><a href="opinion.html" class="primary-nav-link">Opinion</a></li>
                <li class="primary-nav-item"><a href="archive.html" class="primary-nav-link">Archive</a></li>
                <li class="primary-nav-item"><a href="my_library.html" class="primary-nav-link">My Library</a></li>
                <li class="primary-nav-item"><a href="signup_preferences.html" class="primary-nav-link">Sign up</a></li>
            </ul>
        </nav>
    </div>
</header>

<main id="content" class="site-main container" role="main">
    <section class="events-page" aria-label="Museum events">
        <!-- Page controller band: title, date range, price filters, sort, view toggle -->
        <section class="events-controller" data-component="events-page-controller">
            <div class="events-controller-inner">
                <div class="events-controller-left">
                    <h1 class="events-page-title">Events</h1>
                    <div class="events-date-range" data-component="events-date-range-picker">
                        <label for="events-start-date" class="filter-label">Date</label>
                        <div class="events-date-range-fields">
                            <input type="date" id="events-start-date" name="start_date">
                            <span class="events-date-range-separator">&ndash;</span>
                            <input type="date" id="events-end-date" name="end_date">
                            <button type="button" class="events-date-apply-link" data-action="apply-date-range">Apply</button>
                        </div>
                    </div>
                </div>

                <div class="events-controller-center">
                    <form class="events-price-filter" data-component="events-price-filter-form">
                        <fieldset class="events-price-filter-fieldset">
                            <legend class="filter-label">Price</legend>
                            <div class="price-filter-row">
                                <label class="filter-checkbox">
                                    <input type="checkbox" name="free_only" data-action="toggle-free-only">
                                    <span>Free only</span>
                                </label>
                                <div class="price-range-fields">
                                    <label for="min_price_input" class="visually-hidden">Minimum price</label>
                                    <input type="number" id="min_price_input" name="min_price" placeholder="Min" min="0" step="1" data-action="change-min-price">
                                    <span class="price-range-separator">&ndash;</span>
                                    <label for="max_price_input" class="visually-hidden">Maximum price</label>
                                    <input type="number" id="max_price_input" name="max_price" placeholder="Max" min="0" step="1" data-action="change-max-price">
                                    <button type="button" class="price-filter-reset-link" data-action="reset-price-filters">Clear</button>
                                </div>
                            </div>
                        </fieldset>
                    </form>
                </div>

                <div class="events-controller-right">
                    <div class="events-sort-control" data-component="events-sort-control">
                        <label for="events-sort-select" class="filter-label">Sort by</label>
                        <select id="events-sort-select" name="sort" data-action="change-sort">
                            <option value="date_ascending">Soonest first</option>
                            <option value="date_descending">Latest first</option>
                        </select>
                    </div>

                    <div class="events-view-toggle" data-component="events-view-toggle" role="tablist" aria-label="Events view">
                        <button type="button" class="view-toggle-button" data-action="set-view" data-view-mode="list" role="tab" aria-selected="true">List</button>
                        <button type="button" class="view-toggle-button" data-action="set-view" data-view-mode="calendar" role="tab" aria-selected="false">Calendar</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Main content region: switches between list view and calendar view -->
        <section class="events-main" data-component="events-main-region">
            <!-- Calendar view -->
            <section class="events-calendar-view" data-component="events-calendar-view" aria-label="Events calendar" hidden>
                <header class="calendar-header" data-component="calendar-month-navigation">
                    <button type="button" class="calendar-nav-link" data-action="previous-month">&larr; Previous</button>
                    <p class="calendar-current-month" data-populate="calendar-month-label"></p>
                    <button type="button" class="calendar-nav-link" data-action="next-month">Next &rarr;</button>
                </header>
                <div class="calendar-grid" role="grid" aria-readonly="true" data-populate="events-calendar-grid"></div>
            </section>

            <!-- List view -->
            <section class="events-list-view" data-component="events-list-view" data-populate="events-list" aria-label="Events list">
                <!-- Event cards will be injected here -->
            </section>

            <!-- Pagination (list view only) -->
            <nav class="events-pagination" data-component="events-pagination" data-populate="events-pagination" aria-label="Events pagination">
                <!-- Pagination controls injected here -->
            </nav>

            <!-- Empty state (when no events match filters) -->
            <section class="events-empty-state" data-component="events-empty-state" data-populate="events-empty-state" hidden>
                <!-- Empty state content injected here -->
            </section>
        </section>
    </section>
</main>

<footer class="site-footer">
    <div class="footer-inner container">
        <div class="footer-meta">
            <p class="footer-title">
                <span class="footer-title-primary">museum</span>
                <span class="footer-title-secondary">journal</span>
            </p>
            <p class="footer-copy">&copy; <span id="footer-year">2026</span> Contemporary Art Museum. All rights reserved.</p>
        </div>

        <nav class="footer-nav" aria-label="Footer navigation">
            <ul class="footer-nav-list">
                <li class="footer-nav-item"><a href="about.html" class="footer-nav-link">About</a></li>
                <li class="footer-nav-item"><a href="contact.html" class="footer-nav-link">Contact</a></li>
                <li class="footer-nav-item"><a href="policies.html" class="footer-nav-link">Policies</a></li>
                <li class="footer-nav-item"><a href="archive.html" class="footer-nav-link">Archive</a></li>
                <li class="footer-nav-item"><a href="signup_preferences.html" class="footer-nav-link">Sign up &amp; preferences</a></li>
            </ul>
        </nav>
    </div>
</footer>

<!-- SDK with WebsiteSDK.* interfaces -->
<script src="business_logic.js"></script>

<script>
(function() {
    'use strict';

    document.addEventListener('DOMContentLoaded', function() {
        // Map data-populate keys to DOM elements
        const populateElements = document.querySelectorAll('[data-populate]');
        const populateTargets = {};
        populateElements.forEach(function(el) {
            const key = el.dataset.populate;
            if (key) {
                populateTargets[key] = el;
            }
        });

        const listViewSection = document.querySelector('[data-component="events-list-view"]');
        const calendarViewSection = document.querySelector('[data-component="events-calendar-view"]');
        const paginationSection = document.querySelector('[data-component="events-pagination"]');
        const emptyStateSection = document.querySelector('[data-component="events-empty-state"]');
        const dateRangePicker = document.querySelector('[data-component="events-date-range-picker"]');
        const sortControl = document.querySelector('[data-component="events-sort-control"]');
        const viewToggle = document.querySelector('[data-component="events-view-toggle"]');
        const priceFilterForm = document.querySelector('[data-component="events-price-filter-form"]');

        let eventFilterOptions = null;

        function isValidISODate(value) {
            if (!value) return false;
            if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
            const date = new Date(value);
            return !Number.isNaN(date.getTime());
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return year + '-' + month + '-' + day;
        }

        function formatEventDate(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            if (Number.isNaN(date.getTime())) return '';
            try {
                return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).format(date);
            } catch (e) {
                return isoString;
            }
        }

        function formatEventTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            if (Number.isNaN(date.getTime())) return '';
            try {
                return new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit' }).format(date);
            } catch (e) {
                return '';
            }
        }

        function formatEventPrice(event) {
            if (!event) return '';
            if (event.is_free || event.price === 0) return 'Free';
            if (typeof event.price !== 'number') return '';
            const currency = event.currency || 'USD';
            try {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency }).format(event.price);
            } catch (e) {
                return '$' + event.price.toFixed(0);
            }
        }

        function getNormalizedStateFromUrl() {
            const url = new URL(window.location.href);
            const params = url.searchParams;
            let changed = false;

            let view = params.get('view');
            if (view !== 'list' && view !== 'calendar') {
                view = 'list';
                params.set('view', 'list');
                changed = true;
            }

            const today = new Date();
            let startDate = params.get('start_date');
            let endDate = params.get('end_date');

            if (view === 'list') {
                if (!isValidISODate(startDate) || !isValidISODate(endDate) || new Date(startDate) > new Date(endDate)) {
                    const startDefaultDate = new Date(today.getTime());
                    const endDefaultDate = new Date(today.getTime());
                    endDefaultDate.setDate(endDefaultDate.getDate() + 30);
                    startDate = formatDate(startDefaultDate);
                    endDate = formatDate(endDefaultDate);
                    params.set('start_date', startDate);
                    params.set('end_date', endDate);
                    changed = true;
                }
            }

            let sort = params.get('sort');
            if (sort !== 'date_ascending' && sort !== 'date_descending') {
                sort = 'date_ascending';
                params.set('sort', sort);
                changed = true;
            }

            let pageParam = params.get('page');
            let page = parseInt(pageParam || '1', 10);
            if (!page || page < 1) {
                page = 1;
                params.set('page', '1');
                changed = true;
            }

            let yearParam = params.get('year');
            let monthParam = params.get('month');
            let year = yearParam ? parseInt(yearParam, 10) : today.getFullYear();
            let month = monthParam ? parseInt(monthParam, 10) : (today.getMonth() + 1);

            if (view === 'calendar') {
                if (!year || !month || Number.isNaN(year) || Number.isNaN(month) || month < 1 || month > 12) {
                    let baseDate;
                    if (isValidISODate(startDate)) {
                        baseDate = new Date(startDate);
                    } else {
                        baseDate = today;
                    }
                    year = baseDate.getFullYear();
                    month = baseDate.getMonth() + 1;
                    params.set('year', String(year));
                    params.set('month', String(month));
                    changed = true;
                }
            }

            const freeOnly = params.get('free_only') === 'true';
            const minPriceValue = params.get('min_price');
            const maxPriceValue = params.get('max_price');
            const minPrice = minPriceValue !== null && minPriceValue !== '' ? Number(minPriceValue) : null;
            const maxPrice = maxPriceValue !== null && maxPriceValue !== '' ? Number(maxPriceValue) : null;

            if (changed) {
                const newUrl = url.pathname + '?' + params.toString();
                window.history.replaceState(null, '', newUrl);
            }

            return {
                view: view,
                start_date: startDate,
                end_date: endDate,
                sort: sort,
                page: page,
                year: year,
                month: month,
                free_only: freeOnly,
                min_price: minPrice,
                max_price: maxPrice
            };
        }

        function updateViewToggleUI(view) {
            if (!viewToggle) return;
            const buttons = viewToggle.querySelectorAll('.view-toggle-button');
            buttons.forEach(function(btn) {
                const mode = btn.dataset.viewMode;
                const isActive = mode === view;
                btn.classList.toggle('is-active', isActive);
                btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
            });
        }

        function updateControllerVisibility(view) {
            if (dateRangePicker) {
                dateRangePicker.hidden = view !== 'list';
            }
            if (sortControl) {
                sortControl.hidden = view !== 'list';
            }
        }

        function updateDateRangeInputs(state) {
            if (!dateRangePicker) return;
            const startInput = document.getElementById('events-start-date');
            const endInput = document.getElementById('events-end-date');
            if (!startInput || !endInput) return;
            startInput.value = state.start_date || '';
            endInput.value = state.end_date || '';
        }

        function applyFilterOptionsToUI(options, state) {
            if (!priceFilterForm) return;
            const freeOnlyCheckbox = priceFilterForm.querySelector('input[name="free_only"]');
            const minInput = document.getElementById('min_price_input');
            const maxInput = document.getElementById('max_price_input');

            if (options && options.price_filters) {
                const pf = options.price_filters;
                if (minInput && typeof pf.min_price === 'number') {
                    minInput.min = String(pf.min_price);
                }
                if (maxInput && typeof pf.max_price === 'number') {
                    maxInput.max = String(pf.max_price);
                }
                if (freeOnlyCheckbox && pf.supports_free_only === false) {
                    freeOnlyCheckbox.disabled = true;
                }
            }

            if (freeOnlyCheckbox) {
                freeOnlyCheckbox.checked = !!state.free_only;
            }
            if (minInput) {
                minInput.value = state.min_price !== null && !Number.isNaN(state.min_price) ? String(state.min_price) : '';
            }
            if (maxInput) {
                maxInput.value = state.max_price !== null && !Number.isNaN(state.max_price) ? String(state.max_price) : '';
            }
        }

        function updateSortControl(state) {
            const select = document.getElementById('events-sort-select');
            if (!select) return;
            select.value = state.sort || 'date_ascending';
        }

        function initializeFilterOptions(state) {
            if (!eventFilterOptions) {
                try {
                    eventFilterOptions = WebsiteSDK.getEventFilterOptions();
                } catch (e) {
                    console.error('Error loading event filter options', e);
                    eventFilterOptions = null;
                }
            }
            applyFilterOptionsToUI(eventFilterOptions, state);
        }

        function buildFiltersFromState(state) {
            const filters = {};
            if (state.free_only) {
                filters.free_only = true;
            }
            if (state.min_price !== null && !Number.isNaN(state.min_price)) {
                filters.price_min = state.min_price;
            }
            if (state.max_price !== null && !Number.isNaN(state.max_price)) {
                filters.price_max = state.max_price;
            }
            return filters;
        }

        function renderEventsList(container, events, state) {
            if (!container) return;
            container.innerHTML = '';

            const grid = document.createElement('div');
            grid.className = 'events-grid';

            events.forEach(function(ev) {
                const card = document.createElement('article');
                card.className = 'event-card';
                card.setAttribute('data-event-id', ev.id);

                const media = document.createElement('div');
                media.className = 'event-card-media-placeholder';
                card.appendChild(media);

                const dateText = formatEventDate(ev.start_datetime);
                if (dateText) {
                    const timeEl = document.createElement('time');
                    timeEl.className = 'event-card-date';
                    timeEl.dateTime = ev.start_datetime || '';
                    timeEl.textContent = dateText;
                    card.appendChild(timeEl);
                }

                const title = document.createElement('h2');
                title.className = 'event-card-title';
                title.textContent = ev.title || '';
                card.appendChild(title);

                const metaLineParts = [];
                const timeStr = formatEventTime(ev.start_datetime);
                const priceStr = formatEventPrice(ev);
                if (ev.location) {
                    metaLineParts.push(ev.location);
                }
                if (timeStr) {
                    metaLineParts.push(timeStr);
                }
                if (priceStr) {
                    metaLineParts.push(priceStr);
                }
                if (metaLineParts.length > 0) {
                    const meta = document.createElement('p');
                    meta.className = 'event-card-meta';
                    meta.textContent = metaLineParts.join(' · ');
                    card.appendChild(meta);
                }

                if (ev.description) {
                    const excerpt = document.createElement('p');
                    excerpt.className = 'event-card-excerpt';
                    const maxLength = 200;
                    const text = ev.description.length > maxLength ? ev.description.slice(0, maxLength) + '…' : ev.description;
                    excerpt.textContent = text;
                    card.appendChild(excerpt);
                }

                const linkRow = document.createElement('p');
                linkRow.className = 'event-card-link-row';
                const viewButton = document.createElement('button');
                viewButton.type = 'button';
                viewButton.className = 'event-card-link';
                viewButton.dataset.action = 'open-event';
                viewButton.dataset.eventId = ev.id;
                viewButton.textContent = 'View details…';
                linkRow.appendChild(viewButton);
                card.appendChild(linkRow);

                grid.appendChild(card);
            });

            container.appendChild(grid);
        }

        function renderCalendarView(gridContainer, monthLabelContainer, eventsByDate, state) {
            if (!gridContainer || !monthLabelContainer) return;

            // Month label
            const monthDate = new Date(state.year, state.month - 1, 1);
            try {
                const label = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(monthDate);
                monthLabelContainer.textContent = label;
            } catch (e) {
                monthLabelContainer.textContent = state.month + '/' + state.year;
            }

            // Map dates to events
            const eventsMap = {};
            eventsByDate.forEach(function(group) {
                if (!group || !group.date) return;
                const key = group.date;
                eventsMap[key] = Array.isArray(group.events) ? group.events : [];
            });

            gridContainer.innerHTML = '';

            const weekdayRow = document.createElement('div');
            weekdayRow.className = 'calendar-weekday-row';
            const weekdayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdayNames.forEach(function(name) {
                const cell = document.createElement('div');
                cell.className = 'calendar-weekday-cell';
                cell.textContent = name;
                weekdayRow.appendChild(cell);
            });
            gridContainer.appendChild(weekdayRow);

            const firstDayIndex = new Date(state.year, state.month - 1, 1).getDay();
            const daysInMonth = new Date(state.year, state.month, 0).getDate();

            let currentDay = 1;
            while (currentDay <= daysInMonth) {
                const weekRow = document.createElement('div');
                weekRow.className = 'calendar-week-row';

                for (let i = 0; i < 7; i += 1) {
                    const cell = document.createElement('div');
                    cell.className = 'calendar-day-cell';

                    if ((weekRow === gridContainer.children[1] && i < firstDayIndex) || currentDay > daysInMonth) {
                        cell.classList.add('calendar-day-cell--empty');
                    } else {
                        const dateObj = new Date(state.year, state.month - 1, currentDay);
                        const dateKey = formatDate(dateObj);

                        const numberEl = document.createElement('div');
                        numberEl.className = 'calendar-day-number';
                        numberEl.textContent = String(currentDay);
                        cell.appendChild(numberEl);

                        const dayEvents = eventsMap[dateKey] || [];
                        if (dayEvents.length > 0) {
                            const listEl = document.createElement('ul');
                            listEl.className = 'calendar-events-list';

                            dayEvents.forEach(function(ev) {
                                const item = document.createElement('li');
                                item.className = 'calendar-event-item';
                                const btn = document.createElement('button');
                                btn.type = 'button';
                                btn.className = 'calendar-event-link';
                                btn.dataset.action = 'open-event';
                                btn.dataset.eventId = ev.id;
                                btn.textContent = ev.title || '';
                                item.appendChild(btn);
                                listEl.appendChild(item);
                            });

                            cell.appendChild(listEl);
                        }

                        currentDay += 1;
                    }

                    weekRow.appendChild(cell);
                }

                gridContainer.appendChild(weekRow);
            }
        }

        function renderPagination(container, listResponse, state) {
            if (!container) return;
            container.innerHTML = '';

            const totalPages = listResponse.total_pages || 1;
            const currentPage = listResponse.page || state.page || 1;

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'pagination-inner';

            const prevButton = document.createElement('button');
            prevButton.type = 'button';
            prevButton.className = 'pagination-link pagination-prev';
            prevButton.textContent = 'Previous';
            prevButton.dataset.action = 'change-page';
            prevButton.dataset.page = String(Math.max(1, currentPage - 1));
            if (currentPage === 1) {
                prevButton.disabled = true;
            }
            wrapper.appendChild(prevButton);

            for (let p = 1; p <= totalPages; p += 1) {
                const pageButton = document.createElement('button');
                pageButton.type = 'button';
                pageButton.className = 'pagination-link pagination-page';
                if (p === currentPage) {
                    pageButton.classList.add('is-active');
                }
                pageButton.textContent = String(p);
                pageButton.dataset.action = 'change-page';
                pageButton.dataset.page = String(p);
                wrapper.appendChild(pageButton);
            }

            const nextButton = document.createElement('button');
            nextButton.type = 'button';
            nextButton.className = 'pagination-link pagination-next';
            nextButton.textContent = 'Next';
            nextButton.dataset.action = 'change-page';
            nextButton.dataset.page = String(Math.min(totalPages, currentPage + 1));
            if (currentPage === totalPages) {
                nextButton.disabled = true;
            }
            wrapper.appendChild(nextButton);

            container.appendChild(wrapper);
        }

        function renderEmptyState(container, state, view) {
            if (!container) return;
            container.innerHTML = '';

            const heading = document.createElement('h2');
            heading.className = 'empty-state-heading';
            heading.textContent = 'No events found';
            container.appendChild(heading);

            const message = document.createElement('p');
            message.className = 'empty-state-message';
            if (view === 'list') {
                message.textContent = 'Try adjusting the date range or clearing the price filters to see more events.';
            } else {
                message.textContent = 'No events are scheduled for this month with the current filters. You can clear filters or explore a different month.';
            }
            container.appendChild(message);

            const actions = document.createElement('p');
            actions.className = 'empty-state-actions';

            const clearFiltersBtn = document.createElement('button');
            clearFiltersBtn.type = 'button';
            clearFiltersBtn.className = 'empty-state-link';
            clearFiltersBtn.dataset.action = 'clear-filters';
            clearFiltersBtn.textContent = 'Clear filters';
            actions.appendChild(clearFiltersBtn);

            if (view === 'list') {
                const resetDatesBtn = document.createElement('button');
                resetDatesBtn.type = 'button';
                resetDatesBtn.className = 'empty-state-link';
                resetDatesBtn.dataset.action = 'reset-dates';
                resetDatesBtn.textContent = 'Reset dates';
                actions.appendChild(resetDatesBtn);
            }

            container.appendChild(actions);
        }

        function handleDataError(error) {
            console.error('Error loading events data', error);
            const mainRegion = document.querySelector('[data-component="events-main-region"]');
            if (!mainRegion) return;
            mainRegion.innerHTML = '';
            const p = document.createElement('p');
            p.className = 'events-error-message';
            p.textContent = 'We were unable to load events at this time. Please refresh the page or try again shortly.';
            mainRegion.appendChild(p);
        }

        function renderPageFromUrl() {
            const state = getNormalizedStateFromUrl();

            initializeFilterOptions(state);
            updateViewToggleUI(state.view);
            updateControllerVisibility(state.view);
            updateDateRangeInputs(state);
            updateSortControl(state);

            const listContainer = populateTargets['events-list'];
            const calendarGridContainer = populateTargets['events-calendar-grid'];
            const monthLabelContainer = populateTargets['calendar-month-label'];
            const paginationContainer = populateTargets['events-pagination'];
            const emptyContainer = populateTargets['events-empty-state'];

            if (!listViewSection || !calendarViewSection || !paginationSection || !emptyStateSection) {
                return;
            }

            if (state.view === 'list') {
                calendarViewSection.hidden = true;
                listViewSection.hidden = false;

                let response;
                try {
                    const filters = buildFiltersFromState(state);
                    response = WebsiteSDK.getEventsList(
                        state.start_date,
                        state.end_date,
                        filters,
                        state.sort,
                        state.page,
                        9
                    );
                } catch (e) {
                    handleDataError(e);
                    return;
                }

                const eventsArray = response && Array.isArray(response.events) ? response.events : [];

                if (eventsArray.length > 0) {
                    emptyStateSection.hidden = true;
                    listViewSection.hidden = false;
                    renderEventsList(listContainer, eventsArray, state);

                    if (response.total_pages && response.total_pages > 1) {
                        paginationSection.hidden = false;
                        renderPagination(paginationContainer, response, state);
                    } else {
                        paginationSection.hidden = true;
                        if (paginationContainer) {
                            paginationContainer.innerHTML = '';
                        }
                    }
                } else {
                    listViewSection.hidden = true;
                    paginationSection.hidden = true;
                    renderEmptyState(emptyContainer, state, 'list');
                    emptyStateSection.hidden = false;
                }
            } else {
                listViewSection.hidden = true;
                paginationSection.hidden = true;

                let response;
                try {
                    const filters = buildFiltersFromState(state);
                    response = WebsiteSDK.getEventsCalendarMonth(
                        state.year,
                        state.month,
                        filters
                    );
                } catch (e) {
                    handleDataError(e);
                    return;
                }

                const eventsByDate = response && Array.isArray(response.events_by_date) ? response.events_by_date : [];
                const hasEvents = eventsByDate.some(function(group) {
                    return group && Array.isArray(group.events) && group.events.length > 0;
                });

                if (hasEvents) {
                    emptyStateSection.hidden = true;
                    calendarViewSection.hidden = false;
                    renderCalendarView(calendarGridContainer, monthLabelContainer, eventsByDate, state);
                } else {
                    calendarViewSection.hidden = true;
                    renderEmptyState(emptyContainer, state, 'calendar');
                    emptyStateSection.hidden = false;
                }
            }
        }

        function updateUrlParams(changes, options) {
            const url = new URL(window.location.href);
            const params = url.searchParams;

            Object.keys(changes).forEach(function(key) {
                const value = changes[key];
                if (value === null || typeof value === 'undefined' || value === '') {
                    params.delete(key);
                } else {
                    params.set(key, String(value));
                }
            });

            const newUrl = url.pathname + '?' + params.toString();
            const useReplace = options && options.replace === true;
            if (useReplace) {
                window.history.replaceState(null, '', newUrl);
            } else {
                window.history.pushState(null, '', newUrl);
            }
            renderPageFromUrl();
        }

        function handleSetView(mode) {
            const state = getNormalizedStateFromUrl();
            const changes = { view: mode };

            if (mode === 'calendar') {
                let year = state.year;
                let month = state.month;
                if (!year || !month || Number.isNaN(year) || Number.isNaN(month)) {
                    let baseDate;
                    if (isValidISODate(state.start_date)) {
                        baseDate = new Date(state.start_date);
                    } else {
                        baseDate = new Date();
                    }
                    year = baseDate.getFullYear();
                    month = baseDate.getMonth() + 1;
                }
                changes.year = year;
                changes.month = month;
            } else if (mode === 'list') {
                let start = state.start_date;
                let end = state.end_date;
                if (!isValidISODate(start) || !isValidISODate(end)) {
                    let baseDate;
                    if (state.year && state.month) {
                        baseDate = new Date(state.year, state.month - 1, 1);
                    } else {
                        baseDate = new Date();
                    }
                    const startDate = new Date(baseDate.getTime());
                    const endDate = new Date(baseDate.getTime());
                    endDate.setDate(endDate.getDate() + 30);
                    start = formatDate(startDate);
                    end = formatDate(endDate);
                }
                changes.start_date = start;
                changes.end_date = end;
                changes.page = 1;
            }

            updateUrlParams(changes, { replace: false });
        }

        function handleApplyDateRange() {
            const startInput = document.getElementById('events-start-date');
            const endInput = document.getElementById('events-end-date');
            if (!startInput || !endInput) return;
            const startValue = startInput.value;
            const endValue = endInput.value;

            if (!isValidISODate(startValue) || !isValidISODate(endValue)) {
                return;
            }
            if (new Date(startValue) > new Date(endValue)) {
                return;
            }

            updateUrlParams({ start_date: startValue, end_date: endValue, page: 1 }, { replace: false });
        }

        function handleToggleFreeOnly(checked) {
            const state = getNormalizedStateFromUrl();
            const changes = {
                free_only: checked ? 'true' : null
            };
            if (state.view === 'list') {
                changes.page = 1;
            }
            updateUrlParams(changes, { replace: false });
        }

        function handlePriceInputsChange() {
            const state = getNormalizedStateFromUrl();
            const minInput = document.getElementById('min_price_input');
            const maxInput = document.getElementById('max_price_input');
            let minVal = null;
            let maxVal = null;
            if (minInput && minInput.value !== '') {
                const parsed = Number(minInput.value);
                if (!Number.isNaN(parsed)) {
                    minVal = parsed;
                }
            }
            if (maxInput && maxInput.value !== '') {
                const parsedMax = Number(maxInput.value);
                if (!Number.isNaN(parsedMax)) {
                    maxVal = parsedMax;
                }
            }

            const changes = {
                min_price: minVal !== null ? minVal : null,
                max_price: maxVal !== null ? maxVal : null
            };
            if (state.view === 'list') {
                changes.page = 1;
            }
            updateUrlParams(changes, { replace: false });
        }

        function handleResetPriceFilters() {
            const state = getNormalizedStateFromUrl();
            const changes = {
                free_only: null,
                min_price: null,
                max_price: null
            };
            if (state.view === 'list') {
                changes.page = 1;
            }
            updateUrlParams(changes, { replace: false });
        }

        function handleChangeSort(sortValue) {
            const changes = {
                sort: sortValue,
                page: 1
            };
            updateUrlParams(changes, { replace: false });
        }

        function handleChangePage(page) {
            if (!page || page < 1) return;
            updateUrlParams({ page: page }, { replace: false });
        }

        function handleChangeMonth(offset) {
            const state = getNormalizedStateFromUrl();
            let year = state.year;
            let month = state.month + offset;

            if (month < 1) {
                month = 12;
                year -= 1;
            } else if (month > 12) {
                month = 1;
                year += 1;
            }

            updateUrlParams({ view: 'calendar', year: year, month: month }, { replace: false });
        }

        function handleClearFilters() {
            const state = getNormalizedStateFromUrl();
            const changes = {
                free_only: null,
                min_price: null,
                max_price: null
            };
            if (state.view === 'list') {
                changes.page = 1;
            }
            updateUrlParams(changes, { replace: false });
        }

        function handleResetDates() {
            const today = new Date();
            const startDate = new Date(today.getTime());
            const endDate = new Date(today.getTime());
            endDate.setDate(endDate.getDate() + 30);
            const start = formatDate(startDate);
            const end = formatDate(endDate);
            updateUrlParams({ start_date: start, end_date: end, page: 1 }, { replace: false });
        }

        function navigateToEventDetail(eventId) {
            if (!eventId) return;
            const currentUrl = new URL(window.location.href);
            const params = new URLSearchParams(currentUrl.search);
            params.set('eventId', eventId);
            const detailUrl = 'event_detail.html?' + params.toString();
            window.location.href = detailUrl;
        }

        document.addEventListener('click', function(event) {
            const target = event.target.closest('[data-action]');
            if (!target) return;
            const action = target.dataset.action;

            if (action === 'set-view') {
                const mode = target.dataset.viewMode;
                if (mode === 'list' || mode === 'calendar') {
                    event.preventDefault();
                    handleSetView(mode);
                }
            } else if (action === 'apply-date-range') {
                event.preventDefault();
                handleApplyDateRange();
            } else if (action === 'reset-price-filters') {
                event.preventDefault();
                handleResetPriceFilters();
            } else if (action === 'change-page') {
                event.preventDefault();
                const pageVal = parseInt(target.dataset.page || '1', 10);
                handleChangePage(pageVal);
            } else if (action === 'previous-month') {
                event.preventDefault();
                handleChangeMonth(-1);
            } else if (action === 'next-month') {
                event.preventDefault();
                handleChangeMonth(1);
            } else if (action === 'clear-filters') {
                event.preventDefault();
                handleClearFilters();
            } else if (action === 'reset-dates') {
                event.preventDefault();
                handleResetDates();
            } else if (action === 'open-event') {
                event.preventDefault();
                const eventId = target.dataset.eventId;
                navigateToEventDetail(eventId);
            }
        });

        document.addEventListener('change', function(event) {
            const target = event.target.closest('[data-action]');
            if (!target) return;
            const action = target.dataset.action;

            if (action === 'change-sort') {
                const select = target;
                handleChangeSort(select.value);
            } else if (action === 'toggle-free-only') {
                const checkbox = target;
                handleToggleFreeOnly(!!checkbox.checked);
            } else if (action === 'change-min-price' || action === 'change-max-price') {
                handlePriceInputsChange();
            }
        });

        window.addEventListener('popstate', function() {
            renderPageFromUrl();
        });

        renderPageFromUrl();
    });
})();
</script>

</body>
</html>
