<!DOCTYPE html>
<link rel="stylesheet" href="article.css" />

<div class="article-page" data-component="article-detail-controller">
  <section class="article-hero-band">
    <div class="article-hero-inner">
      <nav class="article-breadcrumbs" data-component="article-breadcrumbs" aria-label="Breadcrumb">
        <ol class="breadcrumbs-list">
          <li class="breadcrumbs-item">
            <a href="javascript:void(0)" class="breadcrumbs-link" data-action="back-to-resources">Resources</a>
          </li>
          <li class="breadcrumbs-item breadcrumbs-item-current" aria-current="page">
            <span class="breadcrumbs-current-title" data-populate="article_title"></span>
          </li>
        </ol>
      </nav>

      <header class="article-header">
        <h1 class="article-title" data-populate="article_title"></h1>
        <p class="article-summary" data-populate="article_summary"></p>
      </header>

      <div class="article-section-nav-wrapper">
        <nav class="article-section-nav" data-component="article-section-nav" aria-label="Article sections">
          <ul class="section-nav-list" data-populate="important_sections">
            <!-- Section links injected by JS -->
          </ul>
        </nav>
      </div>
    </div>
  </section>

  <section class="article-main-band">
    <div class="article-main-inner">
      <div class="article-main-left">
        <div class="article-error" data-component="article-error" hidden>
          <p class="article-error-message" data-populate="error_message"></p>
          <button type="button" class="btn btn-pill btn-primary" data-action="go-to-resources">Go to Resources</button>
        </div>

        <article class="article-body" data-component="article-content-viewer">
          <div class="article-content" data-populate="article_content"></div>
        </article>
      </div>

      <aside class="article-main-right" data-component="packing-tools-panel" hidden>
        <div class="packing-panel-card">
          <h2 class="packing-panel-title">Packing helpers</h2>
          <p class="packing-panel-intro">
            Use this guide side-by-side with your own checklist to get your camper ready.
          </p>
          <p class="packing-panel-article-ref">
            Current article: <span class="packing-panel-article-title"></span>
          </p>
          <button type="button" class="btn btn-pill btn-primary packing-panel-cta" data-action="open-my-tools">
            Open Packing Checklist / My Tools
          </button>
          <p class="packing-panel-hint">
            You can copy any list from this article and paste it into a checklist on the My Tools page.
          </p>
        </div>
      </aside>
    </div>
  </section>

  <section class="related-articles-band" aria-label="Related resources">
    <div class="related-inner" data-component="related-articles-list">
      <h2 class="related-heading">Related resources you might like</h2>
      <div class="related-list" data-populate="related_articles">
        <!-- Related article cards injected by JS -->
      </div>
    </div>
  </section>
</div>

<script src="business_logic.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const state = {
      article: null,
      relatedArticles: [],
      importantSections: [],
      error: null
    };

    function getArticleIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('articleId');
    }

    function enhanceListsInContainer(container) {
      const lists = container.querySelectorAll('ul, ol');
      lists.forEach(function(list) {
        if (
          list.previousElementSibling &&
          list.previousElementSibling.dataset &&
          list.previousElementSibling.dataset.component === 'list-tools-toolbar'
        ) {
          return;
        }

        const toolbar = document.createElement('div');
        toolbar.className = 'list-tools-toolbar';
        toolbar.dataset.component = 'list-tools-toolbar';

        const selectBtn = document.createElement('button');
        selectBtn.type = 'button';
        selectBtn.className = 'btn btn-pill list-tool-btn';
        selectBtn.textContent = 'Select list';
        selectBtn.dataset.action = 'select-list';

        const copyBtn = document.createElement('button');
        copyBtn.type = 'button';
        copyBtn.className = 'btn btn-pill list-tool-btn';
        copyBtn.textContent = 'Copy list';
        copyBtn.dataset.action = 'copy-list';

        toolbar.appendChild(selectBtn);
        toolbar.appendChild(copyBtn);

        list.parentNode.insertBefore(toolbar, list);
      });
    }

    function renderArticleContent(container) {
      container.innerHTML = '';
      if (!state.article || !state.article.content) {
        return;
      }
      container.innerHTML = state.article.content;
      enhanceListsInContainer(container);
    }

    function renderRelatedArticles(container) {
      container.innerHTML = '';
      if (!state.relatedArticles || !state.relatedArticles.length) {
        const empty = document.createElement('p');
        empty.className = 'related-empty';
        empty.textContent = 'More resources will appear here as we add them.';
        container.appendChild(empty);
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'related-card-grid';

      state.relatedArticles.forEach(function(article) {
        const card = document.createElement('article');
        card.className = 'related-card';

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'related-card-inner';
        btn.dataset.action = 'open-related-article';
        btn.dataset.articleId = article.id || '';

        const title = document.createElement('h3');
        title.className = 'related-card-title';
        title.textContent = article.title || 'Resource';

        const summary = document.createElement('p');
        summary.className = 'related-card-summary';
        summary.textContent = article.summary || '';

        const meta = document.createElement('p');
        meta.className = 'related-card-meta';
        if (article.topic) {
          meta.textContent = 'Topic: ' + article.topic.replace(/_/g, ' ');
        } else {
          meta.textContent = '';
        }

        btn.appendChild(title);
        if (summary.textContent) {
          btn.appendChild(summary);
        }
        if (meta.textContent) {
          btn.appendChild(meta);
        }

        card.appendChild(btn);
        grid.appendChild(card);
      });

      container.appendChild(grid);
    }

    function renderImportantSections(container) {
      container.innerHTML = '';
      const nav = container.closest('[data-component="article-section-nav"]');
      if (!state.importantSections || !state.importantSections.length) {
        if (nav) {
          nav.hidden = true;
        }
        return;
      }
      if (nav) {
        nav.hidden = false;
      }

      state.importantSections.forEach(function(section) {
        const li = document.createElement('li');
        li.className = 'section-nav-item';

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'section-nav-link';
        btn.dataset.action = 'scroll-to-section';
        btn.dataset.anchor = section.anchor || '';
        btn.textContent = section.label || '';

        li.appendChild(btn);
        container.appendChild(li);
      });
    }

    function setupPackingToolsPanel() {
      const panel = document.querySelector('[data-component="packing-tools-panel"]');
      if (!panel) {
        return;
      }
      if (state.article && state.article.topic === 'packing') {
        panel.hidden = false;
        const titleEl = panel.querySelector('.packing-panel-article-title');
        if (titleEl) {
          titleEl.textContent = state.article.title || '';
        }
      } else {
        panel.hidden = true;
      }
    }

    function renderAll() {
      const populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        const key = element.dataset.populate;
        if (key === 'article_title') {
          element.textContent = state.article && state.article.title ? state.article.title : '';
        } else if (key === 'article_summary') {
          if (state.article && state.article.summary) {
            element.textContent = state.article.summary;
            element.style.display = '';
          } else {
            element.textContent = '';
            element.style.display = 'none';
          }
        } else if (key === 'article_content') {
          renderArticleContent(element);
        } else if (key === 'related_articles') {
          renderRelatedArticles(element);
        } else if (key === 'important_sections') {
          renderImportantSections(element);
        } else if (key === 'error_message') {
          if (state.error) {
            element.textContent = state.error;
          }
        }
      });

      setupPackingToolsPanel();
    }

    function showError(message) {
      state.error = message;
      const errorContainer = document.querySelector('[data-component="article-error"]');
      if (errorContainer) {
        errorContainer.hidden = false;
      }
      renderAll();
    }

    function handleHashChange() {
      const rawHash = window.location.hash;
      const hash = rawHash ? rawHash.substring(1) : '';
      if (!hash) {
        return;
      }

      if (state.importantSections && state.importantSections.length) {
        var valid = state.importantSections.some(function(section) {
          return section.anchor === hash;
        });
        if (!valid) {
          return;
        }
      }

      const target = document.getElementById(hash);
      if (!target) {
        return;
      }

      const nav = document.querySelector('.article-section-nav');
      var offset = 0;
      if (nav) {
        const styles = window.getComputedStyle(nav);
        if (styles.position === 'sticky' || styles.position === 'fixed') {
          offset = nav.getBoundingClientRect().height + 16;
        }
      }

      const top = target.getBoundingClientRect().top + window.pageYOffset - offset;
      window.scrollTo({ top: top, behavior: 'smooth' });
    }

    function loadArticle(articleId) {
      if (!articleId) {
        showError('We could not find an article to show. Try starting from the Resources page.');
        return;
      }
      try {
        const result = WebsiteSDK.getArticleDetail(articleId);
        state.article = result && result.article ? result.article : null;
        state.relatedArticles = result && result.related_articles ? result.related_articles : [];
        state.importantSections = result && result.important_sections ? result.important_sections : [];
        renderAll();
        handleHashChange();
      } catch (e) {
        console.error('Error loading article detail', e);
        showError('Something went wrong while loading this article. Please try again in a moment.');
      }
    }

    document.addEventListener('click', function(event) {
      const target = event.target.closest('[data-action]');
      if (!target) {
        return;
      }
      const action = target.dataset.action;

      if (action === 'back-to-resources' || action === 'go-to-resources') {
        event.preventDefault();
        var topic = state.article && state.article.topic ? state.article.topic : '';
        var url = 'resources.html';
        if (topic) {
          url += '?topic=' + encodeURIComponent(topic);
        }
        window.location.href = url;
      } else if (action === 'open-my-tools') {
        event.preventDefault();
        window.location.href = 'my_tools.html';
      } else if (action === 'open-related-article') {
        event.preventDefault();
        const articleId = target.dataset.articleId;
        if (!articleId) {
          return;
        }
        const url = 'article.html?articleId=' + encodeURIComponent(articleId);
        window.location.href = url;
      } else if (action === 'scroll-to-section') {
        event.preventDefault();
        const anchor = target.dataset.anchor;
        if (!anchor) {
          return;
        }
        if (window.location.hash.substring(1) === anchor) {
          handleHashChange();
        } else {
          window.location.hash = anchor;
        }
      } else if (action === 'select-list' || action === 'copy-list') {
        event.preventDefault();
        const toolbar = target.closest('[data-component="list-tools-toolbar"]');
        if (!toolbar) {
          return;
        }
        const list = toolbar.nextElementSibling;
        if (!list) {
          return;
        }

        if (action === 'select-list') {
          const range = document.createRange();
          range.selectNodeContents(list);
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);
        } else if (action === 'copy-list') {
          const items = list.querySelectorAll('li');
          const lines = [];
          items.forEach(function(item) {
            const text = item.textContent.trim();
            if (text) {
              lines.push(text);
            }
          });
          const textToCopy = lines.join('\n');
          if (!textToCopy) {
            return;
          }

          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(textToCopy).catch(function(err) {
              console.error('Clipboard copy failed', err);
              alert('Unable to copy that list. You can still select it and copy manually.');
            });
          } else {
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
              document.execCommand('copy');
            } catch (err) {
              console.error('execCommand copy failed', err);
              alert('Unable to copy that list. You can still select it and copy manually.');
            }
            document.body.removeChild(textarea);
          }
        }
      }
    });

    window.addEventListener('hashchange', function() {
      handleHashChange();
    });

    const articleId = getArticleIdFromUrl();
    loadArticle(articleId);
  });
</script>
