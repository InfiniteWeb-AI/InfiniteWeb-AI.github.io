<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-Lyfe Fantasy Sports - About</title>
    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="about.css">
</head>
<body>
    <header class="site-header">
        <!-- Global top bar -->
        <div class="top-bar">
            <div class="top-bar-inner container">
                <a href="index.html" class="brand-mini" aria-label="No-Lyfe Fantasy Sports home">
                    <span class="brand-mini-mark">NL</span>
                    <span class="brand-mini-text">No-Lyfe Fantasy</span>
                </a>
                <div class="top-bar-spacer" aria-hidden="true"></div>
                <!-- Intentionally no extra interactive items here to respect link constraints -->
            </div>
        </div>

        <!-- Large emblem-style logo band -->
        <div class="logo-band">
            <div class="container logo-band-inner">
                <!-- Replace the text-based logo with an <img> if a graphic is available -->
                <a href="index.html" class="site-logo">
                    <span class="site-logo-main">NO-LYFE</span>
                    <span class="site-logo-sub">FANTASY SPORTS</span>
                </a>
            </div>
        </div>

        <!-- Primary site navigation -->
        <nav class="primary-nav" aria-label="Primary">
            <div class="container">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="create_league.html" class="nav-link">Create League</a>
                    </li>
                    <li class="nav-item">
                        <a href="join_league.html?tab=public_leagues" class="nav-link">Join League</a>
                    </li>
                    <li class="nav-item">
                        <a href="my_team.html" class="nav-link">My Team</a>
                    </li>
                    <li class="nav-item">
                        <a href="players.html?tab=free_agents" class="nav-link">Players</a>
                    </li>
                    <li class="nav-item">
                        <a href="leagues.html" class="nav-link">Leagues</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="content" class="site-content" role="main">
        <div id="about-page-root" class="about-page-root container" data-component="about-page-root">
            <!-- Heading section -->
            <section id="about-heading-section" class="about-heading-section" data-component="about-heading-section">
                <h1 class="about-heading" data-populate="about-heading"></h1>
            </section>

            <!-- Local section anchor controller -->
            <nav class="about-section-nav" aria-label="About sections" data-component="about-section-anchor-controller">
                <ul class="about-section-nav-list">
                    <li class="about-section-nav-item">
                        <button type="button" class="about-section-nav-link" data-action="section-nav" data-section-target="mission">Mission</button>
                    </li>
                    <li class="about-section-nav-item">
                        <button type="button" class="about-section-nav-link" data-action="section-nav" data-section-target="features">Features</button>
                    </li>
                    <li class="about-section-nav-item">
                        <button type="button" class="about-section-nav-link" data-action="section-nav" data-section-target="organization">Organization</button>
                    </li>
                </ul>
            </nav>

            <!-- Two-column band: mission (left) + features (right) -->
            <section class="about-main-band">
                <!-- Mission / intro -->
                <section id="about-mission-section" class="about-mission-section" data-component="about-mission-section" data-section-id="mission">
                    <div class="card about-mission-card">
                        <div class="about-mission-body" data-populate="about-mission"></div>
                        <div class="about-mission-cta-row">
                            <button type="button" class="btn btn-primary about-cta-button" data-action="get-started-mission">Get Started</button>
                        </div>
                    </div>
                </section>

                <!-- Features list -->
                <aside id="about-features-section" class="about-features-section" data-component="about-features-list" data-section-id="features" aria-label="Platform Features">
                    <div class="card about-features-card">
                        <header class="card-header">
                            <h2 class="card-title">Platform Features</h2>
                        </header>
                        <div class="card-body about-features-body">
                            <ul class="about-features-list" data-populate="about-features"></ul>
                        </div>
                        <div class="about-features-cta-row">
                            <button type="button" class="btn btn-primary about-cta-button" data-action="get-started-features">Get Started</button>
                        </div>
                    </div>
                </aside>
            </section>

            <!-- Organization information -->
            <section id="about-organization-section" class="about-organization-section" data-component="about-organization-section" data-section-id="organization">
                <div class="card about-organization-card">
                    <header class="about-organization-header">
                        <h2 class="section-title">Who We Are</h2>
                    </header>
                    <div class="about-organization-body" data-populate="about-organization"></div>
                </div>
            </section>

            <!-- Bottom CTA group -->
            <section class="about-cta-group" data-component="about-cta-group">
                <div class="about-cta-inner">
                    <button type="button" class="btn btn-primary about-cta-button" data-action="get-started-global">Create a League</button>
                    <button type="button" class="btn btn-secondary about-cta-button" data-action="view-rules">View Rules &amp; Scoring</button>
                </div>
            </section>

            <!-- Status / error region -->
            <div class="about-status" aria-live="polite"></div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner container">
            <div class="footer-left">
                <span class="store-badge-mock" aria-hidden="true">Get it on Google Play</span>
            </div>
            <div class="footer-center">
                <span class="footer-copy">&copy; 2014 No-Lyfe Fantasy Sports</span>
            </div>
            <div class="footer-right" aria-label="Footer">
                <a href="about.html" class="footer-link">About</a>
                <a href="rules.html" class="footer-link">Rules &amp; Scoring</a>
                <a href="help.html" class="footer-link">Help / FAQ</a>
                <a href="contact.html" class="footer-link">Contact</a>
                <a href="privacy.html" class="footer-link">Privacy Policy</a>
                <a href="terms.html" class="footer-link">Terms of Service</a>
            </div>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParamsInitial = new URLSearchParams(window.location.search);
        const aboutStatusEl = document.querySelector('.about-status');

        const state = {
            aboutData: null,
            featureIdByIndex: [],
            featureIndexById: new Map()
        };

        function setStatusMessage(message) {
            if (!aboutStatusEl) return;
            aboutStatusEl.textContent = message || '';
        }

        function slugifyFeatureTitle(title) {
            if (!title) return 'feature';
            return title.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'feature';
        }

        function renderFeatures(container, features) {
            container.innerHTML = '';
            state.featureIdByIndex = [];
            state.featureIndexById = new Map();

            if (!features || !features.length) {
                const li = document.createElement('li');
                li.className = 'about-feature-item about-feature-item-empty';
                li.textContent = 'Feature details will be available soon.';
                container.appendChild(li);
                return;
            }

            features.forEach(function(feature, index) {
                const featureId = slugifyFeatureTitle(feature.title || '') + '-' + index;
                state.featureIdByIndex[index] = featureId;
                state.featureIndexById.set(featureId, index);

                const li = document.createElement('li');
                li.className = 'about-feature-item';
                li.dataset.component = 'about-feature-item';
                li.dataset.featureIndex = String(index);
                li.dataset.featureId = featureId;

                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'about-feature-header-btn';
                button.dataset.action = 'feature-select';
                button.dataset.featureIndex = String(index);
                button.dataset.featureId = featureId;
                button.textContent = feature.title || 'Feature';

                const desc = document.createElement('div');
                desc.className = 'about-feature-description';
                desc.textContent = feature.description || '';
                desc.hidden = true;

                li.appendChild(button);
                li.appendChild(desc);
                container.appendChild(li);
            });
        }

        function renderAboutContent(aboutData) {
            state.aboutData = aboutData;

            const populateElements = document.querySelectorAll('[data-populate]');
            populateElements.forEach(function(element) {
                const dataType = element.dataset.populate;
                if (dataType === 'about-heading') {
                    element.textContent = aboutData.heading || 'About';
                } else if (dataType === 'about-mission') {
                    element.innerHTML = aboutData.mission_html || '';
                } else if (dataType === 'about-features') {
                    renderFeatures(element, aboutData.features || []);
                } else if (dataType === 'about-organization') {
                    element.innerHTML = aboutData.organization_html || '';
                }
            });
        }

        function setActiveSection(section, options) {
            const opts = options || {};
            if (!section) return;
            const validSections = ['mission', 'features', 'organization'];
            if (validSections.indexOf(section) === -1) return;

            const navLinks = document.querySelectorAll('[data-component="about-section-anchor-controller"] .about-section-nav-link');
            navLinks.forEach(function(link) {
                const target = link.dataset.sectionTarget;
                if (target === section) {
                    link.classList.add('is-active');
                    link.setAttribute('aria-current', 'true');
                } else {
                    link.classList.remove('is-active');
                    link.removeAttribute('aria-current');
                }
            });

            const sections = document.querySelectorAll('[data-section-id]');
            let targetSectionElement = null;
            sections.forEach(function(sec) {
                const secId = sec.dataset.sectionId;
                const isActive = secId === section;
                sec.classList.toggle('is-active', isActive);
                if (isActive) {
                    targetSectionElement = sec;
                }
            });

            if (opts && opts.scroll && targetSectionElement) {
                try {
                    targetSectionElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } catch (e) {
                    targetSectionElement.scrollIntoView(true);
                }
            }

            if (opts && opts.updateUrl) {
                const params = new URLSearchParams(window.location.search);
                params.set('section', section);
                const newUrl = 'about.html' + (params.toString() ? '?' + params.toString() : '');
                history.pushState({ section: section }, '', newUrl);
            }
        }

        function setActiveFeature(featureIndex, featureId, options) {
            const opts = options || {};
            let index = featureIndex;

            if (index == null && featureId) {
                if (state.featureIndexById && state.featureIndexById.has(featureId)) {
                    index = state.featureIndexById.get(featureId);
                }
            }

            if (index == null) return;
            if (!state.aboutData || !state.aboutData.features || !state.aboutData.features.length) return;
            if (index < 0 || index >= state.aboutData.features.length) return;

            const featureListItems = document.querySelectorAll('.about-feature-item');
            featureListItems.forEach(function(item) {
                const itemIndex = parseInt(item.dataset.featureIndex || '-1', 10);
                const desc = item.querySelector('.about-feature-description');
                const isActive = itemIndex === index;
                item.classList.toggle('is-active', isActive);
                if (desc) {
                    desc.hidden = !isActive;
                }
            });

            if (opts && opts.scroll) {
                const activeItem = document.querySelector('.about-feature-item.is-active');
                if (activeItem) {
                    try {
                        activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    } catch (e) {
                        activeItem.scrollIntoView(true);
                    }
                }
            }

            if (opts && opts.updateUrl) {
                const params = new URLSearchParams(window.location.search);
                params.set('featureIndex', String(index));
                const effectiveFeatureId = featureId || state.featureIdByIndex[index];
                if (effectiveFeatureId) {
                    params.set('featureId', effectiveFeatureId);
                }
                const newUrl = 'about.html' + (params.toString() ? '?' + params.toString() : '');
                history.pushState({ featureIndex: index, featureId: effectiveFeatureId }, '', newUrl);
            }
        }

        function applySectionFromParams(params, options) {
            const section = params.get('section');
            if (!section) return;
            setActiveSection(section, options || {});
        }

        function applyActiveFeatureFromParams(params, options) {
            let featureId = params.get('featureId');
            const featureIndexParam = params.get('featureIndex');
            let featureIndex = null;
            if (featureIndexParam != null) {
                const parsed = parseInt(featureIndexParam, 10);
                if (!Number.isNaN(parsed)) {
                    featureIndex = parsed;
                }
            }

            if (!featureId && featureIndex != null && state.featureIdByIndex[featureIndex]) {
                featureId = state.featureIdByIndex[featureIndex];
            }

            if (featureId || featureIndex != null) {
                setActiveFeature(featureIndex, featureId, options || {});
            }
        }

        function navigateToCreateLeague(contextToken) {
            const current = new URLSearchParams(window.location.search);
            const params = new URLSearchParams();
            params.set('from', 'about');
            if (contextToken) {
                params.set('context', contextToken);
            }
            const featureId = current.get('featureId');
            if (featureId) {
                params.set('featureId', featureId);
            }
            const featureIndex = current.get('featureIndex');
            if (featureIndex) {
                params.set('featureIndex', featureIndex);
            }
            const target = 'create_league.html' + (params.toString() ? '?' + params.toString() : '');
            window.location.href = target;
        }

        function navigateToRules(rulesSectionToken, fromSection) {
            const params = new URLSearchParams();
            params.set('from', 'about');
            if (rulesSectionToken) {
                params.set('section', rulesSectionToken);
            }
            if (fromSection) {
                params.set('from_section', fromSection);
            }
            const target = 'rules.html' + (params.toString() ? '?' + params.toString() : '');
            window.location.href = target;
        }

        function handleClick(event) {
            const actionEl = event.target.closest('[data-action]');
            if (!actionEl) return;

            const action = actionEl.dataset.action;

            if (action === 'section-nav') {
                const targetSection = actionEl.dataset.sectionTarget;
                setActiveSection(targetSection, { updateUrl: true, scroll: true });
            } else if (action === 'get-started-mission') {
                navigateToCreateLeague('mission_cta');
            } else if (action === 'get-started-features') {
                navigateToCreateLeague('features_cta');
            } else if (action === 'get-started-global') {
                navigateToCreateLeague('global_cta');
            } else if (action === 'view-rules') {
                const activeSectionEl = document.querySelector('[data-section-id].is-active');
                const fromSection = activeSectionEl ? activeSectionEl.dataset.sectionId : null;
                navigateToRules('scoring', fromSection || 'general');
            } else if (action === 'feature-select') {
                const featureIndexParam = actionEl.dataset.featureIndex;
                const featureId = actionEl.dataset.featureId;
                if (featureIndexParam == null && !featureId) return;
                let featureIndex = null;
                if (featureIndexParam != null) {
                    const parsed = parseInt(featureIndexParam, 10);
                    if (!Number.isNaN(parsed)) {
                        featureIndex = parsed;
                    }
                }
                setActiveSection('features', { updateUrl: true, scroll: false });
                setActiveFeature(featureIndex, featureId, { updateUrl: true, scroll: false });
            }
        }

        function handleUrlChange() {
            const params = new URLSearchParams(window.location.search);
            applySectionFromParams(params, { scroll: false });
            applyActiveFeatureFromParams(params, { scroll: false });
        }

        document.addEventListener('click', handleClick);
        window.addEventListener('popstate', handleUrlChange);

        try {
            setStatusMessage('');
            const aboutData = WebsiteSDK.getAboutPageContent();
            renderAboutContent(aboutData);

            applySectionFromParams(urlParamsInitial, { scroll: true });
            applyActiveFeatureFromParams(urlParamsInitial, { scroll: true });

            const sectionFromParams = urlParamsInitial.get('section');
            if (!sectionFromParams) {
                setActiveSection('mission', { updateUrl: false, scroll: false });
            }
        } catch (error) {
            console.error('Failed to load About page content:', error);
            setStatusMessage('Unable to load About content right now. Please try again later.');
        }
    });
    </script>
</body>
</html>
