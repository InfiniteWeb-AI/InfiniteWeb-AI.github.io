<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-Lyfe Fantasy Sports</title>
    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="help.css">
</head>
<body>
    <header class="site-header">
        <!-- Global top bar -->
        <div class="top-bar">
            <div class="top-bar-inner container">
                <a href="index.html" class="brand-mini" aria-label="No-Lyfe Fantasy Sports home">
                    <span class="brand-mini-mark">NL</span>
                    <span class="brand-mini-text">No-Lyfe Fantasy</span>
                </a>
                <div class="top-bar-spacer" aria-hidden="true"></div>
                <!-- Intentionally no extra interactive items here to respect link constraints -->
            </div>
        </div>

        <!-- Large emblem-style logo band -->
        <div class="logo-band">
            <div class="container logo-band-inner">
                <!-- Replace the text-based logo with an <img> if a graphic is available -->
                <a href="index.html" class="site-logo">
                    <span class="site-logo-main">NO-LYFE</span>
                    <span class="site-logo-sub">FANTASY SPORTS</span>
                </a>
            </div>
        </div>

        <!-- Primary site navigation -->
        <nav class="primary-nav" aria-label="Primary">
            <div class="container">
                <ul class="nav-list">
                    <li class="nav-item nav-item-active">
                        <a href="index.html" class="nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="create_league.html" class="nav-link">Create League</a>
                    </li>
                    <li class="nav-item">
                        <a href="join_league.html?tab=public_leagues" class="nav-link">Join League</a>
                    </li>
                    <li class="nav-item">
                        <a href="my_team.html" class="nav-link">My Team</a>
                    </li>
                    <li class="nav-item">
                        <a href="players.html?tab=free_agents" class="nav-link">Players</a>
                    </li>
                    <li class="nav-item">
                        <a href="leagues.html" class="nav-link">Leagues</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="content" class="site-content" role="main">
        <section class="help-center" data-component="help-faq-page-controller" data-populate="help_faq_content">
            <!-- Content will be built by JavaScript based on getHelpFaqContent -->
            <noscript>
                <div class="container help-center-inner">
                    <header class="help-header">
                        <h1 class="help-title">Help Center / FAQ</h1>
                        <p class="help-intro">JavaScript is required to view help topics. Please enable JavaScript in your browser.</p>
                    </header>
                </div>
            </noscript>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner container">
            <div class="footer-left">
                <span class="store-badge-mock" aria-hidden="true">Get it on Google Play</span>
            </div>
            <div class="footer-center">
                <span class="footer-copy">&copy; 2014 No-Lyfe Fantasy Sports</span>
            </div>
            <div class="footer-right" aria-label="Footer">
                <a href="about.html" class="footer-link">About</a>
                <a href="rules.html" class="footer-link">Rules &amp; Scoring</a>
                <a href="help.html" class="footer-link">Help / FAQ</a>
                <a href="contact.html" class="footer-link">Contact</a>
                <a href="privacy.html" class="footer-link">Privacy Policy</a>
                <a href="terms.html" class="footer-link">Terms of Service</a>
            </div>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const populateElements = document.querySelectorAll('[data-populate]');

        populateElements.forEach(function(element) {
            const dataType = element.dataset.populate;
            if (dataType === 'help_faq_content') {
                initHelpFaqPage(element);
            }
        });

        function initHelpFaqPage(pageContainer) {
            let data;
            try {
                data = WebsiteSDK.getHelpFaqContent();
            } catch (error) {
                pageContainer.innerHTML = '<div class="container help-center-inner"><div class="help-error">Unable to load help content right now. Please refresh the page or try again later.</div></div>';
                return;
            }

            const categories = Array.isArray(data && data.categories) ? data.categories : [];
            const categoryById = new Map();
            const faqIndex = new Map(); // faqId -> { categoryId, faq }

            categories.forEach(function(cat) {
                if (!cat || !cat.id) return;
                categoryById.set(cat.id, cat);
                const faqs = Array.isArray(cat.faqs) ? cat.faqs : [];
                faqs.forEach(function(faq) {
                    if (faq && faq.id) {
                        faqIndex.set(faq.id, { categoryId: cat.id, faq: faq });
                    }
                });
            });

            let selectedCategoryId = null;
            let activeFaqId = null;
            let searchQuery = '';

            function normalizeString(str) {
                return (str || '').toLowerCase();
            }

            function initializeStateFromUrl() {
                const params = new URLSearchParams(window.location.search);
                const catIdParam = params.get('categoryId');
                const faqIdParam = params.get('faqId');

                let newSelectedCategoryId = null;
                let newActiveFaqId = null;

                if (faqIdParam && faqIndex.has(faqIdParam)) {
                    const entry = faqIndex.get(faqIdParam);
                    newSelectedCategoryId = entry.categoryId;
                    newActiveFaqId = faqIdParam;

                    if (!catIdParam || catIdParam !== entry.categoryId) {
                        params.set('categoryId', entry.categoryId);
                        params.set('faqId', faqIdParam);
                        const newUrl = window.location.pathname + '?' + params.toString();
                        window.history.replaceState({}, '', newUrl);
                    }
                } else if (catIdParam && categoryById.has(catIdParam)) {
                    newSelectedCategoryId = catIdParam;
                    newActiveFaqId = faqIdParam && faqIndex.has(faqIdParam) ? faqIdParam : null;

                    if (faqIdParam && !faqIndex.has(faqIdParam)) {
                        params.delete('faqId');
                        const newUrl = window.location.pathname + '?' + params.toString();
                        window.history.replaceState({}, '', newUrl);
                    }
                } else {
                    const firstCat = categories[0];
                    if (firstCat) {
                        newSelectedCategoryId = firstCat.id;
                        const newParams = new URLSearchParams(window.location.search);
                        newParams.set('categoryId', firstCat.id);
                        newParams.delete('faqId');
                        const newUrl = window.location.pathname + '?' + newParams.toString();
                        window.history.replaceState({}, '', newUrl);
                    }
                }

                selectedCategoryId = newSelectedCategoryId;
                activeFaqId = newActiveFaqId;
            }

            function buildLayout(container) {
                container.innerHTML = `
<section class="help-center-inner-wrapper">
  <div class="container help-center-inner">
    <header class="help-header">
      <h1 class="help-title">Help Center / FAQ</h1>
      <p class="help-intro">Search help topics, browse common questions, and jump directly into the parts of the app you need.</p>
    </header>

    <section class="help-search" data-component="faq-search-form">
      <form class="help-search-form" data-action="faq-search-form">
        <label class="visually-hidden" for="helpSearchInput">Search help topics</label>
        <div class="help-search-input-wrapper">
          <span class="help-search-icon" aria-hidden="true">?</span>
          <input id="helpSearchInput" type="search" name="q" autocomplete="off"
                 placeholder="Search for topics like &quot;draft&quot;, &quot;waivers&quot;, or &quot;trades&quot;"
                 data-action="faq-search-input">
          <button type="submit" class="btn-primary help-search-submit" data-action="faq-search-submit">Search</button>
          <button type="button" class="btn-secondary help-search-clear" data-action="faq-search-clear">Clear</button>
        </div>
        <p class="help-search-hint">Results update instantly as you type. Open a question to see full details.</p>
      </form>
    </section>

    <section class="help-layout">
      <div class="help-layout-main" data-component="faq-category-panel">
        <header class="help-category-header">
          <h2 class="help-category-title" data-role="active-category-title"></h2>
          <p class="help-category-count" data-role="active-category-count"></p>
        </header>
        <div class="help-no-results" data-role="no-results-message" hidden>
          <p>No help topics match your search. Try a different keyword, or review the full rules and contact support if you are stuck.</p>
        </div>
        <div class="faq-items" data-role="faq-items-container"></div>
      </div>

      <aside class="help-layout-sidebar">
        <section class="help-sidebar-card" data-component="faq-category-sidebar" aria-label="Help categories">
          <h2 class="help-sidebar-title">Browse Categories</h2>
          <ul class="help-category-list" data-role="category-list"></ul>
        </section>

        <section class="help-sidebar-card" data-component="faq-related-links">
          <h2 class="help-sidebar-title">Quick Actions</h2>
          <p class="help-sidebar-subtitle" data-role="related-links-desc">
            Open a question to see shortcuts to pages related to that topic.
          </p>
          <ul class="help-related-links-list" data-role="related-links-list"></ul>
          <p class="help-related-links-empty" data-role="related-links-empty">
            No specific actions for this topic. Use the navigation above or the support options below.
          </p>
        </section>

        <section class="help-sidebar-card help-support-cta" data-component="faq-unresolved-help">
          <h2 class="help-sidebar-title">Still need help?</h2>
          <p class="help-support-text">
            If these answers don&apos;t solve your issue, review the full league rules or reach out to our support team.
          </p>
          <div class="help-support-actions">
            <button type="button" class="btn-secondary" data-action="navigate-rules">Rules &amp; Scoring</button>
            <button type="button" class="btn-primary" data-action="navigate-contact">Contact Support</button>
          </div>
        </section>
      </aside>
    </section>
  </div>
</section>
                `;
            }

            function getFilteredCategories() {
                if (!searchQuery) {
                    return categories;
                }
                const q = normalizeString(searchQuery);
                const filtered = [];
                categories.forEach(function(cat) {
                    const faqs = Array.isArray(cat.faqs) ? cat.faqs : [];
                    const matchingFaqs = faqs.filter(function(faq) {
                        const questionText = normalizeString(faq.question);
                        const answerText = normalizeString(faq.answer_html);
                        return questionText.includes(q) || answerText.includes(q);
                    });
                    if (matchingFaqs.length > 0) {
                        filtered.push({
                            id: cat.id,
                            title: cat.title,
                            faqs: matchingFaqs
                        });
                    }
                });
                return filtered;
            }

            function renderCategoriesSidebar(rootContainer) {
                const sidebar = rootContainer.querySelector('[data-component="faq-category-sidebar"]');
                if (!sidebar) return;
                const list = sidebar.querySelector('[data-role="category-list"]');
                if (!list) {
                    return;
                }
                list.innerHTML = '';
                categories.forEach(function(cat) {
                    const li = document.createElement('li');
                    li.className = 'help-category-list-item';

                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'help-category-list-button';
                    btn.textContent = cat.title || '';
                    btn.dataset.action = 'select-category';
                    btn.dataset.categoryId = cat.id;
                    if (cat.id === selectedCategoryId) {
                        btn.classList.add('is-active');
                    }

                    li.appendChild(btn);
                    list.appendChild(li);
                });
            }

            function renderFaqList(rootContainer, scrollToActive) {
                const panel = rootContainer.querySelector('[data-component="faq-category-panel"]');
                if (!panel) return;

                const activeCategoryTitleEl = panel.querySelector('[data-role="active-category-title"]');
                const activeCategoryCountEl = panel.querySelector('[data-role="active-category-count"]');
                const faqItemsContainer = panel.querySelector('[data-role="faq-items-container"]');
                const noResultsMessage = panel.querySelector('[data-role="no-results-message"]');

                if (!faqItemsContainer || !activeCategoryTitleEl || !activeCategoryCountEl || !noResultsMessage) {
                    return;
                }

                const effectiveCategories = getFilteredCategories();
                faqItemsContainer.innerHTML = '';

                if (effectiveCategories.length === 0) {
                    activeCategoryTitleEl.textContent = searchQuery ? 'No matching topics' : 'Help topics';
                    activeCategoryCountEl.textContent = '';
                    noResultsMessage.hidden = false;
                    return;
                }

                noResultsMessage.hidden = true;

                let primaryCategory;
                if (searchQuery) {
                    primaryCategory = effectiveCategories.find(function(cat) { return cat.id === selectedCategoryId; }) || effectiveCategories[0];
                } else {
                    primaryCategory = categories.find(function(cat) { return cat.id === selectedCategoryId; }) || effectiveCategories[0];
                }
                if (!primaryCategory) {
                    primaryCategory = effectiveCategories[0];
                }
                selectedCategoryId = primaryCategory.id;

                activeCategoryTitleEl.textContent = primaryCategory.title || '';
                const faqCount = Array.isArray(primaryCategory.faqs) ? primaryCategory.faqs.length : 0;
                activeCategoryCountEl.textContent = faqCount === 1 ? '1 question' : faqCount + ' questions';

                const faqsToRender = Array.isArray(primaryCategory.faqs) ? primaryCategory.faqs : [];

                faqsToRender.forEach(function(faq) {
                    const item = document.createElement('article');
                    item.className = 'faq-item';
                    item.dataset.component = 'faq-item-accordion';
                    item.dataset.faqId = faq.id;
                    item.dataset.categoryId = primaryCategory.id;

                    const isExpanded = activeFaqId === faq.id;

                    const questionButton = document.createElement('button');
                    questionButton.type = 'button';
                    questionButton.className = 'faq-question';
                    questionButton.dataset.action = 'faq-toggle';
                    questionButton.dataset.faqId = faq.id;
                    questionButton.dataset.categoryId = primaryCategory.id;
                    questionButton.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');

                    const questionTextSpan = document.createElement('span');
                    questionTextSpan.className = 'faq-question-text';
                    questionTextSpan.textContent = faq.question || '';

                    const toggleIconSpan = document.createElement('span');
                    toggleIconSpan.className = 'faq-toggle-icon';
                    toggleIconSpan.setAttribute('aria-hidden', 'true');
                    toggleIconSpan.textContent = isExpanded ? '−' : '+';

                    questionButton.appendChild(questionTextSpan);
                    questionButton.appendChild(toggleIconSpan);

                    const answerContainer = document.createElement('div');
                    answerContainer.className = 'faq-answer';
                    answerContainer.dataset.role = 'faq-answer';
                    if (!isExpanded) {
                        answerContainer.hidden = true;
                    }

                    const answerBody = document.createElement('div');
                    answerBody.className = 'faq-answer-body';
                    answerBody.innerHTML = faq.answer_html || '';

                    answerContainer.appendChild(answerBody);

                    item.appendChild(questionButton);
                    item.appendChild(answerContainer);

                    faqItemsContainer.appendChild(item);
                });

                if (scrollToActive && activeFaqId) {
                    const activeEl = faqItemsContainer.querySelector('[data-faq-id="' + activeFaqId + '"]');
                    if (activeEl && typeof activeEl.scrollIntoView === 'function') {
                        activeEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            }

            function buildRelatedLinksFromRelatedPage(relatedPage) {
                const links = [];
                if (!relatedPage) return links;

                switch (relatedPage) {
                    case 'create_league':
                        links.push({
                            label: 'Go to league creation',
                            href: 'create_league.html',
                            action: 'navigate-create-league'
                        });
                        break;
                    case 'join_league':
                        links.push({
                            label: 'Browse public leagues',
                            href: 'join_league.html?tab=public_leagues',
                            action: 'navigate-join-league'
                        });
                        break;
                    case 'my_team':
                        links.push({
                            label: 'Open My Team',
                            href: 'my_team.html',
                            action: 'navigate-my-team'
                        });
                        break;
                    case 'players':
                        links.push({
                            label: 'View free agents & waivers',
                            href: 'players.html?tab=free_agents',
                            action: 'navigate-players-free-agents'
                        });
                        break;
                    case 'trade_center':
                        links.push({
                            label: 'Go to Trade Center',
                            href: 'trade.html',
                            action: 'navigate-trade-center'
                        });
                        break;
                    case 'rules':
                        links.push({
                            label: 'View full rules & scoring',
                            href: 'rules.html',
                            action: 'navigate-rules'
                        });
                        break;
                    case 'contact':
                        links.push({
                            label: 'Contact Support',
                            href: 'contact.html',
                            action: 'navigate-contact'
                        });
                        break;
                    default:
                        break;
                }

                return links;
            }

            function renderRelatedLinksSidebar(rootContainer) {
                const sidebar = rootContainer.querySelector('[data-component="faq-related-links"]');
                if (!sidebar) return;

                const list = sidebar.querySelector('[data-role="related-links-list"]');
                const emptyMsg = sidebar.querySelector('[data-role="related-links-empty"]');
                const desc = sidebar.querySelector('[data-role="related-links-desc"]');
                if (!list || !emptyMsg || !desc) return;

                list.innerHTML = '';

                if (!activeFaqId || !faqIndex.has(activeFaqId)) {
                    emptyMsg.style.display = 'block';
                    desc.textContent = 'Open a question to see shortcuts to pages related to that topic.';
                    return;
                }

                const entry = faqIndex.get(activeFaqId);
                const faq = entry.faq;
                const links = buildRelatedLinksFromRelatedPage(faq.related_page);

                if (links.length === 0) {
                    emptyMsg.style.display = 'block';
                    desc.textContent = 'This topic has no direct shortcuts. Use the navigation above or the support options below.';
                    return;
                }

                emptyMsg.style.display = 'none';
                desc.textContent = 'Jump directly into features related to this help topic:';

                links.forEach(function(linkInfo) {
                    const li = document.createElement('li');
                    li.className = 'help-related-links-item';

                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'help-related-link-button';
                    btn.dataset.action = linkInfo.action;
                    btn.textContent = linkInfo.label;

                    li.appendChild(btn);
                    list.appendChild(li);
                });
            }

            function updateUrl(categoryId, faqId, usePushState) {
                const params = new URLSearchParams(window.location.search);
                if (categoryId) {
                    params.set('categoryId', categoryId);
                } else {
                    params.delete('categoryId');
                }
                if (faqId) {
                    params.set('faqId', faqId);
                } else {
                    params.delete('faqId');
                }
                const newUrl = window.location.pathname + '?' + params.toString();
                if (usePushState) {
                    window.history.pushState({}, '', newUrl);
                } else {
                    window.history.replaceState({}, '', newUrl);
                }
            }

            function handleCategorySelect(categoryId) {
                if (!categoryId || categoryId === selectedCategoryId) return;
                selectedCategoryId = categoryId;
                activeFaqId = null;
                updateUrl(selectedCategoryId, null, true);
                renderCategoriesSidebar(pageContainer);
                renderFaqList(pageContainer, false);
                renderRelatedLinksSidebar(pageContainer);
                const mainPanel = pageContainer.querySelector('.help-layout-main');
                if (mainPanel && typeof mainPanel.scrollIntoView === 'function') {
                    mainPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }

            function handleFaqToggle(categoryId, faqId) {
                if (!faqId) return;

                if (activeFaqId === faqId) {
                    activeFaqId = null;
                    updateUrl(selectedCategoryId, null, true);
                } else {
                    activeFaqId = faqId;
                    if (categoryId && categoryId !== selectedCategoryId) {
                        selectedCategoryId = categoryId;
                    }
                    updateUrl(selectedCategoryId, activeFaqId, true);
                }

                renderCategoriesSidebar(pageContainer);
                renderFaqList(pageContainer, true);
                renderRelatedLinksSidebar(pageContainer);
            }

            function navigateTo(targetHref) {
                if (!targetHref) return;
                window.location.href = targetHref;
            }

            function bindEventHandlers(rootContainer) {
                const searchForm = rootContainer.querySelector('[data-action="faq-search-form"]');
                const searchInput = rootContainer.querySelector('[data-action="faq-search-input"]');
                const searchClearButton = rootContainer.querySelector('[data-action="faq-search-clear"]');

                if (searchInput) {
                    searchInput.addEventListener('input', function(event) {
                        searchQuery = event.target.value || '';
                        renderFaqList(pageContainer, false);
                        renderCategoriesSidebar(pageContainer);
                        renderRelatedLinksSidebar(pageContainer);
                    });
                }

                if (searchForm) {
                    searchForm.addEventListener('submit', function(event) {
                        event.preventDefault();
                        searchQuery = searchInput ? (searchInput.value || '') : '';
                        renderFaqList(pageContainer, false);
                        renderCategoriesSidebar(pageContainer);
                        renderRelatedLinksSidebar(pageContainer);
                    });
                }

                if (searchClearButton) {
                    searchClearButton.addEventListener('click', function() {
                        if (searchInput) {
                            searchInput.value = '';
                        }
                        searchQuery = '';
                        renderFaqList(pageContainer, false);
                        renderCategoriesSidebar(pageContainer);
                        renderRelatedLinksSidebar(pageContainer);
                    });
                }

                rootContainer.addEventListener('click', function(event) {
                    const target = event.target;
                    if (!target || !(target instanceof HTMLElement)) return;
                    const action = target.dataset.action;
                    if (!action) return;

                    switch (action) {
                        case 'select-category':
                            event.preventDefault();
                            handleCategorySelect(target.dataset.categoryId || null);
                            break;
                        case 'faq-toggle':
                            event.preventDefault();
                            handleFaqToggle(target.dataset.categoryId || selectedCategoryId, target.dataset.faqId || null);
                            break;
                        case 'navigate-create-league':
                            event.preventDefault();
                            navigateTo('create_league.html');
                            break;
                        case 'navigate-join-league':
                            event.preventDefault();
                            navigateTo('join_league.html?tab=public_leagues');
                            break;
                        case 'navigate-my-team':
                            event.preventDefault();
                            navigateTo('my_team.html');
                            break;
                        case 'navigate-players-free-agents':
                            event.preventDefault();
                            navigateTo('players.html?tab=free_agents');
                            break;
                        case 'navigate-trade-center':
                            event.preventDefault();
                            navigateTo('trade.html');
                            break;
                        case 'navigate-rules':
                            event.preventDefault();
                            navigateTo('rules.html');
                            break;
                        case 'navigate-contact':
                            event.preventDefault();
                            navigateTo('contact.html');
                            break;
                        default:
                            break;
                    }
                });
            }

            function handlePopState() {
                initializeStateFromUrl();
                renderCategoriesSidebar(pageContainer);
                renderFaqList(pageContainer, !!activeFaqId);
                renderRelatedLinksSidebar(pageContainer);
            }

            buildLayout(pageContainer);
            initializeStateFromUrl();
            renderCategoriesSidebar(pageContainer);
            renderFaqList(pageContainer, !!activeFaqId);
            renderRelatedLinksSidebar(pageContainer);
            bindEventHandlers(pageContainer);

            window.addEventListener('popstate', handlePopState);
        }
    });
    </script>
</body>
</html>
