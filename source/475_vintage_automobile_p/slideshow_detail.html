<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Vintage Automobile Photo Gallery</title>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='slideshow_detail.css'>
</head>
<body>
  <header class='site-header' role='banner'>
    <h1 class='site-title'>Vintage Automobile Photo Gallery</h1>
    <nav class='site-nav' aria-label='Main navigation'>
      <p class='nav-links'>
        <a href='index.html' title='Return to the homepage'>Home</a> |
        <a href='gallery.html' title='Browse and search all vintage automobile photos'>Browse Gallery</a> |
        <a href='prints.html' title='Shop postcards, posters, and other print products'>Prints &amp; Products</a> |
        <a href='collections.html' title='View and manage saved photo collections'>My Collections</a> |
        <a href='slideshows.html' title='Create and edit photo slideshows'>Slideshows</a> |
        <a href='favorites.html' title='View all photos you have favorited'>Favorites</a> |
        <a href='cart.html' title='View items in your cart and choose shipping options'>Cart</a> |
        <a href='settings.html' title='Adjust display and viewing preferences'>Settings</a>
      </p>
    </nav>
    <hr class='section-divider'>
  </header>

  <main id='content' class='site-content' role='main'>
    <div class='slideshow-detail-page' data-component='slideshow-detail-page'>
      <div class='slideshow-detail-column'>
        <nav class='slideshow-breadcrumb' aria-label='Breadcrumb' data-component='slideshow-breadcrumb-nav'>
          <p>
            <a href='javascript:void(0)' data-action='back-to-slideshows'>Back to Slideshows</a>
            <span> &gt; </span>
            <span data-populate='breadcrumb-slideshow-name'>Slideshow</span>
          </p>
        </nav>

        <div id='slideshow-error' class='slideshow-error' data-component='slideshow-status-messages' aria-live='polite'></div>

        <section class='slideshow-metadata' data-component='slideshow-metadata-form' aria-labelledby='slideshow-metadata-heading'>
          <h2 id='slideshow-metadata-heading' class='visually-hidden'>Slideshow metadata</h2>
          <form id='slideshow-metadata-form'>
            <div class='form-field'>
              <label for='slideshow-name-input'><strong>Slideshow title</strong></label><br>
              <input id='slideshow-name-input' name='name' type='text' required>
            </div>
            <div class='form-field'>
              <label for='slideshow-description-input'><strong>Description</strong></label><br>
              <textarea id='slideshow-description-input' name='description' rows='3'></textarea>
            </div>
            <div class='form-field'>
              <label><strong>Playback settings</strong></label><br>
              <label>
                <input id='slideshow-autoplay-input' name='auto_play' type='checkbox'>
                Auto-play
              </label><br>
              <label>
                <input id='slideshow-loop-input' name='loop' type='checkbox'>
                Loop playback
              </label><br>
              <label for='slideshow-transition-input'>Transition duration (seconds):</label>
              <input id='slideshow-transition-input' name='transition_duration_sec' type='number' min='1' step='1'>
            </div>
            <div class='form-actions'>
              <button type='button' data-action='save-slideshow-settings'>Save Slideshow Settings</button>
              <span class='form-status' data-populate='metadata-status'></span>
            </div>
          </form>
        </section>

        <hr class='section-divider'>

        <section class='slideshow-toolbar' data-component='slideshow-toolbar'>
          <p>
            <button type='button' data-action='add-photos'>Add Photos</button>
            <span class='toolbar-separator'>|</span>
            <button type='button' data-action='order-by-decade'>Order by Decade</button>
            <button type='button' data-action='order-by-year'>Order by Year</button>
            <button type='button' data-action='reset-order'>Reset to Original Order</button>
            <span class='toolbar-info'>
              <span data-populate='slide-count'></span>
            </span>
          </p>
        </section>

        <section class='slideshow-status' data-component='slideshow-status-messages' aria-live='polite'>
          <p data-populate='global-status'></p>
        </section>

        <section class='slideshow-items' data-component='slideshow-items-list' aria-label='Slides in this slideshow'>
          <div data-populate='slideshow-items-container'>
            <!-- Slides will be rendered here by JavaScript. -->
          </div>
        </section>

        <hr class='section-divider'>

        <section class='slideshow-order-save' data-component='slideshow-order-save-bar'>
          <p>
            <button type='button' data-action='save-sequence' disabled>Save Sequence</button>
            <span class='order-status' data-populate='order-status-text'>No unsaved sequence changes.</span>
          </p>
        </section>
      </div>
    </div>
  </main>

  <footer class='site-footer' role='contentinfo'>
    <hr class='section-divider'>
    <p class='footer-links'>
      <a href='about.html' title='Learn more about this vintage automobile photo gallery'>About</a> |
      <a href='help.html' title='Get help with using the site and its features'>Help / FAQ</a> |
      <a href='contact.html' title='Contact the site owner or support'>Contact</a>
    </p>
    <p class='footer-meta'>&copy; <span class='footer-year'>2026</span> Vintage Automobile Photo Gallery</p>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var slideshowId = urlParams.get('id');
      var addedPhotoIdsParam = urlParams.get('addedPhotoIds');
      var addFromUrlProcessed = false;

      var state = {
        slideshowId: slideshowId,
        slideshow: null,
        items: [],
        originalItemIds: [],
        orderDirty: false,
        metadataDirty: false
      };

      var breadcrumbNameEl = document.querySelector('[data-populate="breadcrumb-slideshow-name"]');
      var metadataStatusEl = document.querySelector('[data-populate="metadata-status"]');
      var slideCountEl = document.querySelector('[data-populate="slide-count"]');
      var globalStatusEl = document.querySelector('[data-populate="global-status"]');
      var itemsContainerEl = document.querySelector('[data-populate="slideshow-items-container"]');
      var orderStatusEl = document.querySelector('[data-populate="order-status-text"]');
      var errorEl = document.getElementById('slideshow-error');
      var saveSequenceBtn = document.querySelector('[data-action="save-sequence"]');
      var backLink = document.querySelector('[data-action="back-to-slideshows"]');
      var addPhotosBtn = document.querySelector('[data-action="add-photos"]');
      var orderByDecadeBtn = document.querySelector('[data-action="order-by-decade"]');
      var orderByYearBtn = document.querySelector('[data-action="order-by-year"]');
      var resetOrderBtn = document.querySelector('[data-action="reset-order"]');
      var saveSettingsBtn = document.querySelector('[data-action="save-slideshow-settings"]');

      var nameInput = document.getElementById('slideshow-name-input');
      var descriptionInput = document.getElementById('slideshow-description-input');
      var autoPlayInput = document.getElementById('slideshow-autoplay-input');
      var loopInput = document.getElementById('slideshow-loop-input');
      var transitionInput = document.getElementById('slideshow-transition-input');

      var dragIndex = null;

      var populateElements = document.querySelectorAll('[data-populate]');
      // Population on this page is coordinated via getSlideshowDetail and renderAll().

      function hasUnsavedChanges() {
        return !!(state.orderDirty || state.metadataDirty);
      }

      function setGlobalStatus(message, isError) {
        if (!globalStatusEl) {
          return;
        }
        globalStatusEl.textContent = message || '';
        if (isError) {
          globalStatusEl.style.fontWeight = 'bold';
        } else {
          globalStatusEl.style.fontWeight = 'normal';
        }
      }

      function showError(message) {
        if (errorEl) {
          errorEl.textContent = message || '';
        }
      }

      function clearError() {
        if (errorEl) {
          errorEl.textContent = '';
        }
      }

      function markOrderDirty(dirty) {
        state.orderDirty = !!dirty;
        if (saveSequenceBtn) {
          saveSequenceBtn.disabled = !state.orderDirty;
        }
        if (orderStatusEl) {
          orderStatusEl.textContent = state.orderDirty ? 'Sequence has unsaved changes.' : 'No unsaved sequence changes.';
        }
      }

      function markMetadataDirty() {
        state.metadataDirty = true;
        if (metadataStatusEl) {
          metadataStatusEl.textContent = 'Unsaved changes.';
        }
      }

      function renderBreadcrumbName(container, slideshow) {
        if (!container) {
          return;
        }
        container.textContent = slideshow && slideshow.name ? slideshow.name : 'Slideshow';
      }

      function renderMetadataForm(slideshow) {
        if (!slideshow || !nameInput || !descriptionInput || !autoPlayInput || !loopInput || !transitionInput) {
          return;
        }
        if (!state.metadataDirty) {
          nameInput.value = slideshow.name || '';
          descriptionInput.value = slideshow.description || '';
          autoPlayInput.checked = !!slideshow.auto_play;
          loopInput.checked = !!slideshow.loop;
          if (slideshow.transition_duration_sec !== undefined && slideshow.transition_duration_sec !== null) {
            transitionInput.value = slideshow.transition_duration_sec;
          } else {
            transitionInput.value = '';
          }
        }
      }

      function renderSlideCount(container, slideshow, items) {
        if (!container) {
          return;
        }
        if (!slideshow && (!items || !items.length)) {
          container.textContent = '';
          return;
        }
        var count = typeof slideshow.slide_count === 'number' ? slideshow.slide_count : (items ? items.length : 0);
        container.textContent = count + (count === 1 ? ' slide' : ' slides');
      }

      function renderItems(container, items) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!items || !items.length) {
          var emptyP = document.createElement('p');
          emptyP.textContent = 'No photos have been added to this slideshow yet.';
          container.appendChild(emptyP);
          return;
        }
        items.forEach(function(entry, index) {
          var item = entry.slideshow_item;
          var photo = entry.photo;
          var row = document.createElement('article');
          row.className = 'slideshow-item-row';
          row.setAttribute('data-component', 'slideshow-item-row');
          row.setAttribute('draggable', 'true');
          row.dataset.slideshowItemId = item.id;
          row.dataset.index = String(index);

          var inner = document.createElement('div');
          inner.className = 'slideshow-item-inner';

          var positionP = document.createElement('p');
          positionP.className = 'slideshow-item-position';
          positionP.textContent = 'Slide ' + (index + 1);
          inner.appendChild(positionP);

          if (photo && photo.thumbnail_url) {
            var thumbLink = document.createElement('a');
            thumbLink.href = 'javascript:void(0)';
            thumbLink.dataset.action = 'open-photo';
            thumbLink.dataset.photoId = photo.id;
            thumbLink.dataset.slideshowItemId = item.id;

            var img = document.createElement('img');
            img.src = photo.thumbnail_url;
            img.alt = photo.title || 'Slideshow photo';
            img.dataset.action = 'open-photo';
            img.dataset.photoId = photo.id;
            img.dataset.slideshowItemId = item.id;

            thumbLink.appendChild(img);
            inner.appendChild(thumbLink);
          }

          var captionP = document.createElement('p');
          captionP.className = 'slideshow-item-caption';
          var captionLink = document.createElement('a');
          captionLink.href = 'javascript:void(0)';
          captionLink.dataset.action = 'open-photo';
          captionLink.dataset.photoId = photo ? photo.id : '';
          captionLink.dataset.slideshowItemId = item.id;
          var captionStrong = document.createElement('strong');
          captionStrong.textContent = photo && photo.title ? photo.title : 'Untitled photo';
          captionLink.appendChild(captionStrong);
          captionP.appendChild(captionLink);
          inner.appendChild(captionP);

          var metaP = document.createElement('p');
          metaP.className = 'slideshow-item-meta';
          var metaParts = [];
          if (photo && photo.year) {
            metaParts.push('Year: ' + photo.year);
          }
          if (photo && photo.decade_label) {
            metaParts.push('Decade: ' + photo.decade_label);
          }
          if (photo && photo.make) {
            metaParts.push('Make: ' + photo.make);
          }
          if (photo && photo.model) {
            metaParts.push('Model: ' + photo.model);
          }
          metaP.textContent = metaParts.join(' | ');
          inner.appendChild(metaP);

          var controlsP = document.createElement('p');
          controlsP.className = 'slideshow-item-controls';

          var moveUpBtn = document.createElement('button');
          moveUpBtn.type = 'button';
          moveUpBtn.textContent = 'Move up';
          moveUpBtn.dataset.action = 'move-slide-up';
          moveUpBtn.dataset.slideshowItemId = item.id;
          controlsP.appendChild(moveUpBtn);

          var moveDownBtn = document.createElement('button');
          moveDownBtn.type = 'button';
          moveDownBtn.textContent = 'Move down';
          moveDownBtn.dataset.action = 'move-slide-down';
          moveDownBtn.dataset.slideshowItemId = item.id;
          controlsP.appendChild(moveDownBtn);

          var removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.textContent = 'Remove';
          removeBtn.dataset.action = 'remove-slide';
          removeBtn.dataset.slideshowItemId = item.id;
          controlsP.appendChild(removeBtn);

          inner.appendChild(controlsP);

          row.appendChild(inner);
          container.appendChild(row);
        });
      }

      function renderAll() {
        if (!state.slideshow) {
          return;
        }
        renderBreadcrumbName(breadcrumbNameEl, state.slideshow);
        renderMetadataForm(state.slideshow);
        renderSlideCount(slideCountEl, state.slideshow, state.items);
        renderItems(itemsContainerEl, state.items);
        markOrderDirty(state.orderDirty);
      }

      function parseDecadeStart(label) {
        if (!label) {
          return 0;
        }
        var parts = String(label).split('-');
        var year = parseInt(parts[0], 10);
        if (!isFinite(year)) {
          return 0;
        }
        return year;
      }

      function loadSlideshow() {
        if (!state.slideshowId) {
          return;
        }
        try {
          clearError();
          setGlobalStatus('Loading slideshow...', false);
          var detail = WebsiteSDK.getSlideshowDetail(state.slideshowId);
          if (!detail || !detail.slideshow) {
            showError('Slideshow not found.');
            setGlobalStatus('', false);
            return;
          }
          state.slideshow = detail.slideshow;
          state.items = Array.isArray(detail.items) ? detail.items.slice() : [];
          state.originalItemIds = state.items.map(function(entry) {
            return entry.slideshow_item.id;
          });
          state.orderDirty = false;
          state.metadataDirty = false;
          if (metadataStatusEl) {
            metadataStatusEl.textContent = '';
          }
          renderAll();
          setGlobalStatus('', false);
          if (addedPhotoIdsParam && !addFromUrlProcessed) {
            processAddFromUrl();
          }
        } catch (err) {
          showError('Unable to load slideshow.');
          setGlobalStatus('', false);
        }
      }

      function removeAddedPhotoIdsParam() {
        urlParams.delete('addedPhotoIds');
        var newQuery = urlParams.toString();
        var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
        try {
          window.history.replaceState(null, '', newUrl);
        } catch (e) {
          // Ignore history errors.
        }
        addedPhotoIdsParam = null;
      }

      function processAddFromUrl() {
        var raw = addedPhotoIdsParam || '';
        var ids = raw.split(',').map(function(id) {
          return id.trim();
        }).filter(function(id) {
          return !!id;
        });
        if (!ids.length) {
          removeAddedPhotoIdsParam();
          addFromUrlProcessed = true;
          return;
        }
        try {
          setGlobalStatus('Adding photos to slideshow...', false);
          var result = WebsiteSDK.addPhotosToSlideshow(state.slideshowId, ids);
          if (result && result.slideshow) {
            state.slideshow = result.slideshow;
          }
          var detail = WebsiteSDK.getSlideshowDetail(state.slideshowId);
          if (detail && detail.slideshow) {
            state.slideshow = detail.slideshow;
            state.items = Array.isArray(detail.items) ? detail.items.slice() : [];
            state.originalItemIds = state.items.map(function(entry) {
              return entry.slideshow_item.id;
            });
            state.orderDirty = false;
            renderAll();
          }
          setGlobalStatus('Added ' + ids.length + ' photo(s) to this slideshow.', false);
        } catch (err) {
          setGlobalStatus('Unable to add photos from gallery.', true);
        }
        removeAddedPhotoIdsParam();
        addFromUrlProcessed = true;
      }

      function handleSaveSlideshowSettings() {
        if (!state.slideshowId) {
          return;
        }
        if (!nameInput) {
          return;
        }
        var name = (nameInput.value || '').trim();
        if (!name) {
          if (metadataStatusEl) {
            metadataStatusEl.textContent = 'Name is required.';
          }
          return;
        }
        var description = (descriptionInput && descriptionInput.value ? descriptionInput.value : '').trim();
        var autoPlay = !!(autoPlayInput && autoPlayInput.checked);
        var loop = !!(loopInput && loopInput.checked);
        var transitionRaw = transitionInput && transitionInput.value !== undefined ? transitionInput.value : '';
        var transition = transitionRaw !== '' ? Number(transitionRaw) : undefined;
        try {
          if (metadataStatusEl) {
            metadataStatusEl.textContent = 'Saving...';
          }
          var result = WebsiteSDK.updateSlideshow(state.slideshowId, name, description, autoPlay, transition, loop);
          if (result && result.slideshow) {
            state.slideshow = result.slideshow;
          } else if (state.slideshow) {
            state.slideshow.name = name;
            state.slideshow.description = description;
            state.slideshow.auto_play = autoPlay;
            state.slideshow.loop = loop;
            if (transition !== undefined) {
              state.slideshow.transition_duration_sec = transition;
            } else {
              state.slideshow.transition_duration_sec = undefined;
            }
          }
          state.metadataDirty = false;
          if (metadataStatusEl) {
            metadataStatusEl.textContent = 'Slideshow settings saved.';
          }
        } catch (err) {
          if (metadataStatusEl) {
            metadataStatusEl.textContent = 'Error saving slideshow settings.';
          }
        }
      }

      function handleAddPhotosClick() {
        if (!state.slideshowId) {
          return;
        }
        var targetUrl = 'gallery.html?mode=slideshow_picker&slideshowId=' + encodeURIComponent(state.slideshowId);
        window.location.href = targetUrl;
      }

      function handleBackClick(event) {
        event.preventDefault();
        if (hasUnsavedChanges()) {
          var leave = window.confirm('You have unsaved changes. Leave this page and discard them?');
          if (!leave) {
            return;
          }
        }
        window.location.href = 'slideshows.html';
      }

      function handleOrderByDecade() {
        if (!state.items || !state.items.length) {
          return;
        }
        state.items.sort(function(a, b) {
          var pa = a.photo || {};
          var pb = b.photo || {};
          var da = parseDecadeStart(pa.decade_label);
          var db = parseDecadeStart(pb.decade_label);
          if (da !== db) {
            return da - db;
          }
          var ya = pa.year || 0;
          var yb = pb.year || 0;
          if (ya !== yb) {
            return ya - yb;
          }
          var ta = pa.title || '';
          var tb = pb.title || '';
          if (ta < tb) {
            return -1;
          }
          if (ta > tb) {
            return 1;
          }
          return 0;
        });
        markOrderDirty(true);
        renderItems(itemsContainerEl, state.items);
      }

      function handleOrderByYear() {
        if (!state.items || !state.items.length) {
          return;
        }
        state.items.sort(function(a, b) {
          var pa = a.photo || {};
          var pb = b.photo || {};
          var ya = pa.year || 0;
          var yb = pb.year || 0;
          if (ya !== yb) {
            return ya - yb;
          }
          var ta = pa.title || '';
          var tb = pb.title || '';
          if (ta < tb) {
            return -1;
          }
          if (ta > tb) {
            return 1;
          }
          return 0;
        });
        markOrderDirty(true);
        renderItems(itemsContainerEl, state.items);
      }

      function handleResetOrder() {
        if (!state.originalItemIds || !state.originalItemIds.length || !state.items || !state.items.length) {
          return;
        }
        var map = new Map();
        state.items.forEach(function(entry) {
          map.set(entry.slideshow_item.id, entry);
        });
        var reordered = [];
        state.originalItemIds.forEach(function(id) {
          var entry = map.get(id);
          if (entry) {
            reordered.push(entry);
          }
        });
        map.forEach(function(entry, id) {
          if (state.originalItemIds.indexOf(id) === -1) {
            reordered.push(entry);
          }
        });
        state.items = reordered;
        markOrderDirty(false);
        renderItems(itemsContainerEl, state.items);
      }

      function handleSaveSequence() {
        if (!state.slideshowId || !state.items || !state.items.length) {
          return;
        }
        if (!state.orderDirty) {
          return;
        }
        var orderedIds = state.items.map(function(entry) {
          return entry.slideshow_item.id;
        });
        try {
          setGlobalStatus('Saving slide sequence...', false);
          var result = WebsiteSDK.reorderSlideshowItems(state.slideshowId, orderedIds);
          if (result && result.slideshow) {
            state.slideshow = result.slideshow;
          }
          state.originalItemIds = orderedIds.slice();
          markOrderDirty(false);
          renderSlideCount(slideCountEl, state.slideshow, state.items);
          setGlobalStatus('Slide sequence saved.', false);
        } catch (err) {
          setGlobalStatus('Unable to save slide sequence.', true);
        }
      }

      function handleOpenPhoto(photoId) {
        if (!photoId) {
          return;
        }
        var targetUrl = 'photo.html?id=' + encodeURIComponent(photoId) + '&ref=slideshow';
        window.location.href = targetUrl;
      }

      function handleMoveSlide(slideshowItemId, delta) {
        if (!state.items || !state.items.length) {
          return;
        }
        var index = -1;
        for (var i = 0; i < state.items.length; i += 1) {
          if (state.items[i].slideshow_item.id === slideshowItemId) {
            index = i;
            break;
          }
        }
        if (index === -1) {
          return;
        }
        var newIndex = index + delta;
        if (newIndex < 0 || newIndex >= state.items.length) {
          return;
        }
        var temp = state.items[index];
        state.items[index] = state.items[newIndex];
        state.items[newIndex] = temp;
        markOrderDirty(true);
        renderItems(itemsContainerEl, state.items);
      }

      function handleRemoveSlide(slideshowItemId) {
        if (!slideshowItemId) {
          return;
        }
        var confirmRemove = window.confirm('Remove this photo from the slideshow?');
        if (!confirmRemove) {
          return;
        }
        try {
          var response = WebsiteSDK.removePhotoFromSlideshow(slideshowItemId);
          if (!response || !response.success) {
            var message = response && response.message ? response.message : 'Unable to remove slide from slideshow.';
            showError(message);
            return;
          }
          var index = -1;
          for (var i = 0; i < state.items.length; i += 1) {
            if (state.items[i].slideshow_item.id === slideshowItemId) {
              index = i;
              break;
            }
          }
          if (index !== -1) {
            state.items.splice(index, 1);
          }
          if (state.slideshow && typeof state.slideshow.slide_count === 'number') {
            state.slideshow.slide_count = Math.max(0, state.slideshow.slide_count - 1);
          }
          state.originalItemIds = state.items.map(function(entry) {
            return entry.slideshow_item.id;
          });
          renderItems(itemsContainerEl, state.items);
          renderSlideCount(slideCountEl, state.slideshow, state.items);
          setGlobalStatus('Slide removed from slideshow.', false);
        } catch (err) {
          showError('Unable to remove slide from slideshow.');
        }
      }

      function disableInteractiveUiForMissingId() {
        var buttons = document.querySelectorAll('button[data-action]');
        buttons.forEach(function(btn) {
          btn.disabled = true;
        });
        if (nameInput) {
          nameInput.disabled = true;
        }
        if (descriptionInput) {
          descriptionInput.disabled = true;
        }
        if (autoPlayInput) {
          autoPlayInput.disabled = true;
        }
        if (loopInput) {
          loopInput.disabled = true;
        }
        if (transitionInput) {
          transitionInput.disabled = true;
        }
      }

      if (nameInput) {
        nameInput.addEventListener('input', markMetadataDirty);
      }
      if (descriptionInput) {
        descriptionInput.addEventListener('input', markMetadataDirty);
      }
      if (autoPlayInput) {
        autoPlayInput.addEventListener('change', markMetadataDirty);
      }
      if (loopInput) {
        loopInput.addEventListener('change', markMetadataDirty);
      }
      if (transitionInput) {
        transitionInput.addEventListener('input', markMetadataDirty);
      }

      if (saveSettingsBtn) {
        saveSettingsBtn.addEventListener('click', handleSaveSlideshowSettings);
      }
      if (addPhotosBtn) {
        addPhotosBtn.addEventListener('click', handleAddPhotosClick);
      }
      if (backLink) {
        backLink.addEventListener('click', handleBackClick);
      }
      if (orderByDecadeBtn) {
        orderByDecadeBtn.addEventListener('click', handleOrderByDecade);
      }
      if (orderByYearBtn) {
        orderByYearBtn.addEventListener('click', handleOrderByYear);
      }
      if (resetOrderBtn) {
        resetOrderBtn.addEventListener('click', handleResetOrder);
      }
      if (saveSequenceBtn) {
        saveSequenceBtn.addEventListener('click', handleSaveSequence);
      }

      if (itemsContainerEl) {
        itemsContainerEl.addEventListener('click', function(event) {
          var actionEl = event.target.closest('[data-action]');
          if (!actionEl) {
            return;
          }
          var action = actionEl.dataset.action;
          var slideshowItemId = actionEl.dataset.slideshowItemId;
          var photoId = actionEl.dataset.photoId;
          if (action === 'open-photo') {
            handleOpenPhoto(photoId);
          } else if (action === 'move-slide-up') {
            handleMoveSlide(slideshowItemId, -1);
          } else if (action === 'move-slide-down') {
            handleMoveSlide(slideshowItemId, 1);
          } else if (action === 'remove-slide') {
            handleRemoveSlide(slideshowItemId);
          }
        });

        itemsContainerEl.addEventListener('dragstart', function(event) {
          var row = event.target.closest('.slideshow-item-row');
          if (!row) {
            return;
          }
          dragIndex = parseInt(row.dataset.index, 10);
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = 'move';
          }
        });

        itemsContainerEl.addEventListener('dragover', function(event) {
          if (dragIndex === null) {
            return;
          }
          event.preventDefault();
          if (event.dataTransfer) {
            event.dataTransfer.dropEffect = 'move';
          }
        });

        itemsContainerEl.addEventListener('drop', function(event) {
          if (dragIndex === null) {
            return;
          }
          event.preventDefault();
          var row = event.target.closest('.slideshow-item-row');
          if (!row) {
            dragIndex = null;
            return;
          }
          var toIndex = parseInt(row.dataset.index, 10);
          if (!isFinite(toIndex) || toIndex === dragIndex) {
            dragIndex = null;
            return;
          }
          if (!state.items || !state.items.length) {
            dragIndex = null;
            return;
          }
          if (dragIndex < 0 || dragIndex >= state.items.length) {
            dragIndex = null;
            return;
          }
          var moved = state.items.splice(dragIndex, 1)[0];
          if (toIndex < 0) {
            toIndex = 0;
          }
          if (toIndex > state.items.length) {
            toIndex = state.items.length;
          }
          state.items.splice(toIndex, 0, moved);
          dragIndex = null;
          markOrderDirty(true);
          renderItems(itemsContainerEl, state.items);
        });

        itemsContainerEl.addEventListener('dragend', function() {
          dragIndex = null;
        });
      }

      window.addEventListener('beforeunload', function(event) {
        if (!hasUnsavedChanges()) {
          return;
        }
        event.preventDefault();
        event.returnValue = '';
      });

      if (!slideshowId) {
        showError('No slideshow specified. Please return to Slideshows and choose one to edit.');
        disableInteractiveUiForMissingId();
        return;
      }

      loadSlideshow();
    });
  </script>
</body>
</html>
