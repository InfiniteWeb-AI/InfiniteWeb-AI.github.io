<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Vintage Automobile Photo Gallery</title>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='cart.css'>
</head>
<body>
  <header class='site-header' role='banner'>
    <h1 class='site-title'>Vintage Automobile Photo Gallery</h1>
    <nav class='site-nav' aria-label='Main navigation'>
      <p class='nav-links'>
        <a href='index.html' title='Return to the homepage'>Home</a> |
        <a href='gallery.html' title='Browse and search all vintage automobile photos'>Browse Gallery</a> |
        <a href='prints.html' title='Shop postcards, posters, and other print products'>Prints &amp; Products</a> |
        <a href='collections.html' title='View and manage saved photo collections'>My Collections</a> |
        <a href='slideshows.html' title='Create and edit photo slideshows'>Slideshows</a> |
        <a href='favorites.html' title='View all photos you have favorited'>Favorites</a> |
        <a href='cart.html' title='View items in your cart and choose shipping options'>Cart</a> |
        <a href='settings.html' title='Adjust display and viewing preferences'>Settings</a>
      </p>
    </nav>
    <hr class='section-divider'>
  </header>

  <main id='content' class='site-content' role='main'>
    <section class='cart-page' data-component='cart-page-init'>
      <div class='cart-page-header'>
        <h2 class='cart-title'>Cart</h2>
        <p class='cart-return-link'>
          <a href='javascript:void(0)' data-action='continue-gallery-top'>Return to gallery / more photos</a>
        </p>
      </div>
      <hr class='section-divider cart-header-divider'>

      <div class='cart-main-column'>
        <section aria-label='Cart items' data-component='cart-items-list' data-populate='cart-items'>
          <!-- Cart items will be rendered here -->
        </section>

        <section aria-label='Empty cart message' data-component='cart-empty-state' data-populate='cart-empty-state' hidden>
          <!-- Empty state will be rendered here when there are no items -->
        </section>

        <section aria-label='Shipping method' data-component='shipping-method-selector' data-populate='shipping-methods'>
          <!-- Shipping options will be rendered here -->
        </section>

        <section aria-label='Cart summary' data-component='cart-summary-panel' data-populate='cart-summary'>
          <!-- Cart summary will be rendered here -->
        </section>

        <div class='cart-checkout-section' data-component='proceed-to-checkout-button'>
          <p class='cart-checkout-error' data-populate='checkout-error' aria-live='polite'></p>
          <p class='cart-checkout-button-wrapper'>
            <button type='button' data-action='proceed-to-checkout'>Proceed to Checkout</button>
          </p>
        </div>

        <nav class='cart-navigation' data-component='cart-navigation-bar' aria-label='Cart navigation'>
          <p>
            <a href='javascript:void(0)' data-action='continue-prints'>Continue shopping prints</a>
            |
            <a href='javascript:void(0)' data-action='continue-gallery-bottom'>Continue browsing gallery</a>
          </p>
        </nav>
      </div>
    </section>
  </main>

  <footer class='site-footer' role='contentinfo'>
    <hr class='section-divider'>
    <p class='footer-links'>
      <a href='about.html' title='Learn more about this vintage automobile photo gallery'>About</a> |
      <a href='help.html' title='Get help with using the site and its features'>Help / FAQ</a> |
      <a href='contact.html' title='Contact the site owner or support'>Contact</a>
    </p>
    <p class='footer-meta'>&copy; <span class='footer-year'>2026</span> Vintage Automobile Photo Gallery</p>
  </footer>

  <script src='business_logic.js'></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const shippingParam = urlParams.get('shipping');
    const fromParam = urlParams.get('from');
    const addedItemIdParam = urlParams.get('addedItemId');

    let currentCart = null;
    let availableShippingMethods = [];

    function formatCurrency(value) {
      if (typeof value !== 'number' || isNaN(value)) {
        return '\u2014';
      }
      return '$' + value.toFixed(2);
    }

    function renderCartItems(itemsContainer, emptyStateContainer, cart, addedItemId, fromValue) {
      itemsContainer.innerHTML = '';
      const hasItems = cart && Array.isArray(cart.items) && cart.items.length > 0;

      if (!hasItems) {
        itemsContainer.hidden = true;
        if (emptyStateContainer) {
          emptyStateContainer.hidden = false;
          emptyStateContainer.innerHTML = '';

          const msg = document.createElement('p');
          msg.innerHTML = '<strong>Your cart is empty.</strong>';
          emptyStateContainer.appendChild(msg);

          const links = document.createElement('p');
          const galleryLink = document.createElement('a');
          galleryLink.href = 'javascript:void(0)';
          galleryLink.dataset.action = 'continue-gallery-bottom';
          galleryLink.textContent = 'Browse the gallery';

          const text = document.createTextNode(' or ');

          const printsLink = document.createElement('a');
          printsLink.href = 'javascript:void(0)';
          printsLink.dataset.action = 'continue-prints';
          printsLink.textContent = 'shop prints';

          links.appendChild(galleryLink);
          links.appendChild(text);
          links.appendChild(printsLink);
          emptyStateContainer.appendChild(links);
        }
        return;
      }

      itemsContainer.hidden = false;
      if (emptyStateContainer) {
        emptyStateContainer.hidden = true;
        emptyStateContainer.innerHTML = '';
      }

      cart.items.forEach(function(entry) {
        const cartItem = entry.cart_item;
        const product = entry.product || {};
        const photo = entry.photo || {};

        const itemArticle = document.createElement('article');
        itemArticle.className = 'cart-item';
        itemArticle.dataset.component = 'cart-item-row';
        itemArticle.dataset.cartItemId = cartItem.id;

        if (addedItemId && cartItem.id === addedItemId) {
          itemArticle.classList.add('cart-item-highlight');
        }

        const imageWrapper = document.createElement('div');
        imageWrapper.className = 'cart-item-image-wrapper';

        const img = document.createElement('img');
        img.src = photo.thumbnail_url || photo.image_url || '';
        img.alt = photo.title ? ('Thumbnail of ' + photo.title) : 'Cart item photo';
        imageWrapper.appendChild(img);
        itemArticle.appendChild(imageWrapper);

        const titleP = document.createElement('p');
        titleP.className = 'cart-item-title';
        const titleStrong = document.createElement('strong');
        titleStrong.textContent = photo.title || 'Vintage automobile photo';
        titleP.appendChild(titleStrong);
        itemArticle.appendChild(titleP);

        const detailsP = document.createElement('p');
        detailsP.className = 'cart-item-details';
        const typeLabel = (cartItem.product_type_snapshot || product.product_type || '').replace(/_/g, ' ');
        const sizeLabel = product.size_label || '';
        const typeParts = [];
        if (typeLabel) {
          typeParts.push(typeLabel);
        }
        if (sizeLabel) {
          typeParts.push(sizeLabel);
        }
        detailsP.textContent = typeParts.join(' b7 ');
        itemArticle.appendChild(detailsP);

        if (addedItemId && cartItem.id === addedItemId) {
          const addedNote = document.createElement('p');
          addedNote.className = 'cart-item-added-note';
          addedNote.textContent = 'Recently added to your cart.';
          itemArticle.appendChild(addedNote);
        }

        const pricingP = document.createElement('p');
        pricingP.className = 'cart-item-pricing';
        const unitSpan = document.createElement('span');
        unitSpan.textContent = 'Unit price: ' + formatCurrency(cartItem.unit_price);
        const br = document.createElement('br');
        const lineSpan = document.createElement('span');
        const lineTotal = typeof cartItem.line_total === 'number'
          ? cartItem.line_total
          : (cartItem.unit_price || 0) * (cartItem.quantity || 1);
        lineSpan.textContent = 'Line total: ' + formatCurrency(lineTotal);
        pricingP.appendChild(unitSpan);
        pricingP.appendChild(br);
        pricingP.appendChild(lineSpan);
        itemArticle.appendChild(pricingP);

        const quantityDiv = document.createElement('div');
        quantityDiv.className = 'cart-item-quantity';
        quantityDiv.dataset.component = 'quantity-editor';

        const quantityLabel = document.createElement('label');
        quantityLabel.textContent = 'Quantity: ';

        const decreaseBtn = document.createElement('button');
        decreaseBtn.type = 'button';
        decreaseBtn.textContent = '-';
        decreaseBtn.dataset.action = 'decrease-quantity';
        decreaseBtn.dataset.cartItemId = cartItem.id;

        const quantityInput = document.createElement('input');
        quantityInput.type = 'number';
        quantityInput.min = '1';
        quantityInput.step = '1';
        quantityInput.value = String(cartItem.quantity || 1);
        quantityInput.dataset.action = 'quantity-input';
        quantityInput.dataset.cartItemId = cartItem.id;

        const increaseBtn = document.createElement('button');
        increaseBtn.type = 'button';
        increaseBtn.textContent = '+';
        increaseBtn.dataset.action = 'increase-quantity';
        increaseBtn.dataset.cartItemId = cartItem.id;

        quantityLabel.appendChild(decreaseBtn);
        quantityLabel.appendChild(quantityInput);
        quantityLabel.appendChild(increaseBtn);
        quantityDiv.appendChild(quantityLabel);

        const quantityError = document.createElement('p');
        quantityError.className = 'cart-item-error';
        quantityError.dataset.role = 'quantity-error';
        quantityDiv.appendChild(quantityError);

        itemArticle.appendChild(quantityDiv);

        const removeP = document.createElement('p');
        removeP.className = 'cart-item-remove';
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.dataset.action = 'remove-item';
        removeBtn.dataset.cartItemId = cartItem.id;
        removeBtn.textContent = 'Remove from cart';
        removeP.appendChild(removeBtn);
        itemArticle.appendChild(removeP);

        itemsContainer.appendChild(itemArticle);
      });
    }

    function renderShippingMethods(container, cart, methods) {
      container.innerHTML = '';

      const title = document.createElement('h3');
      title.textContent = 'Shipping method';
      container.appendChild(title);

      const hasItems = cart && Array.isArray(cart.items) && cart.items.length > 0;
      if (!hasItems) {
        const note = document.createElement('p');
        note.textContent = 'Add items to your cart to choose a shipping method.';
        container.appendChild(note);

        const errorP = document.createElement('p');
        errorP.className = 'cart-shipping-error';
        errorP.dataset.role = 'shipping-error';
        container.appendChild(errorP);
        return;
      }

      if (!methods || !methods.length) {
        const noMethods = document.createElement('p');
        noMethods.textContent = 'No shipping methods are currently available.';
        container.appendChild(noMethods);

        const errorP = document.createElement('p');
        errorP.className = 'cart-shipping-error';
        errorP.dataset.role = 'shipping-error';
        container.appendChild(errorP);
        return;
      }

      const list = document.createElement('div');
      list.className = 'cart-shipping-options';

      methods.forEach(function(method) {
        const optionWrapper = document.createElement('p');

        const idValue = 'shipping-' + method.method;
        const label = document.createElement('label');

        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'shipping_method';
        radio.id = idValue;
        radio.value = method.method;
        radio.dataset.action = 'select-shipping';
        radio.dataset.shippingMethod = method.method;
        if (cart && cart.shipping_method === method.method) {
          radio.checked = true;
        }

        const textSpan = document.createElement('span');
        const costText = formatCurrency(method.cost);
        const daysText = (typeof method.estimated_days === 'number' && !isNaN(method.estimated_days))
          ? (' b7 ' + method.estimated_days + ' day' + (method.estimated_days === 1 ? '' : 's') + ' est.')
          : '';
        textSpan.textContent = method.label + ' (' + costText + ')' + daysText;

        label.appendChild(radio);
        label.appendChild(document.createTextNode(' '));
        label.appendChild(textSpan);

        optionWrapper.appendChild(label);
        list.appendChild(optionWrapper);
      });

      container.appendChild(list);

      const errorP = document.createElement('p');
      errorP.className = 'cart-shipping-error';
      errorP.dataset.role = 'shipping-error';
      container.appendChild(errorP);
    }

    function renderCartSummary(container, cart) {
      container.innerHTML = '';

      const title = document.createElement('h3');
      title.textContent = 'Order summary';
      container.appendChild(title);

      const hasItems = cart && Array.isArray(cart.items) && cart.items.length > 0;

      const subtotalP = document.createElement('p');
      subtotalP.textContent = 'Items subtotal: ' + (hasItems ? formatCurrency(cart.subtotal || 0) : '$0.00');
      container.appendChild(subtotalP);

      const shippingP = document.createElement('p');
      let shippingText;
      if (!hasItems) {
        shippingText = '$0.00';
      } else if (typeof cart.shipping_cost === 'number') {
        shippingText = formatCurrency(cart.shipping_cost);
      } else {
        shippingText = 'To be calculated';
      }
      shippingP.textContent = 'Shipping: ' + shippingText;
      container.appendChild(shippingP);

      const totalP = document.createElement('p');
      totalP.innerHTML = '<strong>Order total: ' + (hasItems ? formatCurrency(cart.total || 0) : '$0.00') + '</strong>';
      container.appendChild(totalP);
    }

    function renderCheckoutError(container, message) {
      container.textContent = message || '';
    }

    function updateNavigationEmphasis(fromValue) {
      if (!fromValue) {
        return;
      }
      if (fromValue === 'gallery') {
        const galleryLinks = document.querySelectorAll('[data-action="continue-gallery-top"], [data-action="continue-gallery-bottom"]');
        galleryLinks.forEach(function(link) {
          link.style.fontWeight = 'bold';
        });
      } else if (fromValue === 'prints') {
        const printsLink = document.querySelector('[data-action="continue-prints"]');
        if (printsLink) {
          printsLink.style.fontWeight = 'bold';
        }
      }
    }

    function reRenderAll(highlightAddedItemId) {
      const itemsContainer = document.querySelector('[data-populate="cart-items"]');
      const emptyContainer = document.querySelector('[data-populate="cart-empty-state"]');
      const shippingContainer = document.querySelector('[data-populate="shipping-methods"]');
      const summaryContainer = document.querySelector('[data-populate="cart-summary"]');
      const checkoutErrorContainer = document.querySelector('[data-populate="checkout-error"]');

      if (itemsContainer && emptyContainer) {
        renderCartItems(itemsContainer, emptyContainer, currentCart, highlightAddedItemId || null, fromParam);
      }
      if (shippingContainer) {
        renderShippingMethods(shippingContainer, currentCart, availableShippingMethods);
      }
      if (summaryContainer) {
        renderCartSummary(summaryContainer, currentCart);
      }
      if (checkoutErrorContainer) {
        renderCheckoutError(checkoutErrorContainer, '');
      }

      bindActionHandlers();
    }

    function handleIncreaseQuantityClick(event) {
      const button = event.currentTarget;
      const cartItemId = button.dataset.cartItemId;
      if (!cartItemId || !currentCart || !Array.isArray(currentCart.items)) {
        return;
      }
      const entry = currentCart.items.find(function(it) { return it.cart_item && it.cart_item.id === cartItemId; });
      if (!entry) {
        return;
      }
      const newQuantity = (entry.cart_item.quantity || 1) + 1;
      updateQuantity(cartItemId, newQuantity);
    }

    function handleDecreaseQuantityClick(event) {
      const button = event.currentTarget;
      const cartItemId = button.dataset.cartItemId;
      if (!cartItemId || !currentCart || !Array.isArray(currentCart.items)) {
        return;
      }
      const entry = currentCart.items.find(function(it) { return it.cart_item && it.cart_item.id === cartItemId; });
      if (!entry) {
        return;
      }
      const currentQuantity = entry.cart_item.quantity || 1;
      const newQuantity = currentQuantity - 1;
      if (newQuantity < 1) {
        return;
      }
      updateQuantity(cartItemId, newQuantity);
    }

    function handleQuantityInputBlur(event) {
      const input = event.currentTarget;
      const cartItemId = input.dataset.cartItemId;
      if (!cartItemId || !currentCart || !Array.isArray(currentCart.items)) {
        return;
      }
      const entry = currentCart.items.find(function(it) { return it.cart_item && it.cart_item.id === cartItemId; });
      if (!entry) {
        return;
      }
      const previousQuantity = entry.cart_item.quantity || 1;
      const raw = input.value;
      const parsed = parseInt(raw, 10);
      if (!Number.isInteger(parsed) || parsed <= 0) {
        const row = input.closest('[data-component="cart-item-row"]');
        if (row) {
          const errorElem = row.querySelector('[data-role="quantity-error"]');
          if (errorElem) {
            errorElem.textContent = 'Please enter a quantity of at least 1.';
          }
        }
        input.value = String(previousQuantity);
        return;
      }
      if (parsed === previousQuantity) {
        return;
      }
      updateQuantity(cartItemId, parsed);
    }

    function updateQuantity(cartItemId, newQuantity) {
      if (!currentCart || !Array.isArray(currentCart.items)) {
        return;
      }
      const entry = currentCart.items.find(function(it) { return it.cart_item && it.cart_item.id === cartItemId; });
      if (!entry) {
        return;
      }
      const previousQuantity = entry.cart_item.quantity || 1;
      const row = document.querySelector('[data-component="cart-item-row"][data-cart-item-id="' + cartItemId + '"]');
      let errorElem = null;
      if (row) {
        errorElem = row.querySelector('[data-role="quantity-error"]');
        if (errorElem) {
          errorElem.textContent = '';
        }
      }

      if (!Number.isInteger(newQuantity) || newQuantity <= 0) {
        if (errorElem) {
          errorElem.textContent = 'Quantity must be at least 1.';
        }
        reRenderAll(null);
        return;
      }

      try {
        const response = WebsiteSDK.updateCartItemQuantity(cartItemId, newQuantity);
        if (!response || response.success === false) {
          if (errorElem) {
            const msg = response && response.message ? response.message : 'Could not update quantity.';
            errorElem.textContent = msg;
          }
          entry.cart_item.quantity = previousQuantity;
          entry.cart_item.line_total = (entry.cart_item.unit_price || 0) * previousQuantity;
          reRenderAll(null);
          return;
        }

        entry.cart_item.quantity = newQuantity;
        entry.cart_item.line_total = (entry.cart_item.unit_price || 0) * newQuantity;

        if (response.cart) {
          if (typeof response.cart.subtotal === 'number') {
            currentCart.subtotal = response.cart.subtotal;
          }
          if (typeof response.cart.total === 'number') {
            currentCart.total = response.cart.total;
          }
        }

        reRenderAll(null);
      } catch (e) {
        if (errorElem) {
          errorElem.textContent = 'An error occurred while updating quantity.';
        }
        entry.cart_item.quantity = previousQuantity;
        entry.cart_item.line_total = (entry.cart_item.unit_price || 0) * previousQuantity;
        reRenderAll(null);
      }
    }

    function handleRemoveItemClick(event) {
      const button = event.currentTarget;
      const cartItemId = button.dataset.cartItemId;
      if (!cartItemId || !currentCart || !Array.isArray(currentCart.items)) {
        return;
      }
      const confirmed = window.confirm('Remove this item from your cart?');
      if (!confirmed) {
        return;
      }

      let row = button.closest('[data-component="cart-item-row"]');
      let errorElem = null;
      if (row) {
        errorElem = row.querySelector('[data-role="quantity-error"]');
      }

      try {
        const response = WebsiteSDK.removeCartItem(cartItemId);
        if (!response || response.success === false) {
          const msg = response && response.message ? response.message : 'Could not remove item.';
          if (errorElem) {
            errorElem.textContent = msg;
          } else {
            window.alert(msg);
          }
          return;
        }

        currentCart.items = currentCart.items.filter(function(it) {
          return !(it.cart_item && it.cart_item.id === cartItemId);
        });

        if (typeof response.subtotal === 'number') {
          currentCart.subtotal = response.subtotal;
        }
        if (typeof response.total === 'number') {
          currentCart.total = response.total;
        }

        reRenderAll(null);
      } catch (e) {
        const msg = 'An error occurred while removing the item.';
        if (errorElem) {
          errorElem.textContent = msg;
        } else {
          window.alert(msg);
        }
      }
    }

    function handleShippingChange(event) {
      const input = event.currentTarget;
      const method = input.dataset.shippingMethod || input.value;
      if (!method || !currentCart) {
        return;
      }
      const previousMethod = currentCart.shipping_method || null;
      if (method === previousMethod) {
        return;
      }

      const shippingContainer = document.querySelector('[data-populate="shipping-methods"]');
      let errorElem = null;
      if (shippingContainer) {
        errorElem = shippingContainer.querySelector('[data-role="shipping-error"]');
        if (errorElem) {
          errorElem.textContent = '';
        }
      }

      try {
        const response = WebsiteSDK.setCartShippingMethod(method);
        if (!response || response.success === false) {
          if (errorElem) {
            const msg = response && response.message ? response.message : 'Could not update shipping method.';
            errorElem.textContent = msg;
          } else {
            window.alert('Could not update shipping method.');
          }

          currentCart.shipping_method = previousMethod;
          reRenderAll(null);
          return;
        }

        if (response.cart) {
          currentCart.shipping_method = response.cart.shipping_method;
          currentCart.shipping_cost = response.cart.shipping_cost;
          if (typeof response.cart.subtotal === 'number') {
            currentCart.subtotal = response.cart.subtotal;
          }
          if (typeof response.cart.total === 'number') {
            currentCart.total = response.cart.total;
          }
        }

        reRenderAll(null);
      } catch (e) {
        if (errorElem) {
          errorElem.textContent = 'An error occurred while updating shipping.';
        } else {
          window.alert('An error occurred while updating shipping.');
        }
        currentCart.shipping_method = previousMethod;
        reRenderAll(null);
      }
    }

    function handleProceedToCheckoutClick() {
      const checkoutErrorContainer = document.querySelector('[data-populate="checkout-error"]');
      if (checkoutErrorContainer) {
        checkoutErrorContainer.textContent = '';
      }

      if (!currentCart || !Array.isArray(currentCart.items) || currentCart.items.length === 0) {
        const message = 'Your cart is empty. Please add items before proceeding to checkout.';
        if (checkoutErrorContainer) {
          checkoutErrorContainer.textContent = message;
        } else {
          window.alert(message);
        }
        return;
      }

      const hasPhysicalItems = currentCart.items.some(function(entry) {
        const typeValue = (entry.cart_item && entry.cart_item.product_type_snapshot) || (entry.product && entry.product.product_type) || '';
        return typeValue === 'standard_print' || typeValue === 'postcard' || typeValue === 'poster';
      });

      if (hasPhysicalItems && !currentCart.shipping_method) {
        const message = 'Please choose a shipping method before proceeding to checkout.';
        if (checkoutErrorContainer) {
          checkoutErrorContainer.textContent = message;
        } else {
          window.alert(message);
        }
        return;
      }

      const params = new URLSearchParams();
      params.set('from', 'cart');
      if (currentCart.shipping_method) {
        params.set('shipping', currentCart.shipping_method);
      }
      window.location.href = 'checkout.html?' + params.toString();
    }

    function handleContinuePrintsClick() {
      const params = new URLSearchParams();
      params.set('from', 'cart');
      window.location.href = 'prints.html?' + params.toString();
    }

    function handleContinueGalleryClick() {
      const params = new URLSearchParams();
      params.set('from', 'cart');
      window.location.href = 'gallery.html?' + params.toString();
    }

    function bindActionHandlers() {
      const actionElements = document.querySelectorAll('[data-action]');
      actionElements.forEach(function(element) {
        if (element.dataset.bound === 'true') {
          return;
        }
        const action = element.dataset.action;
        if (action === 'increase-quantity') {
          element.addEventListener('click', handleIncreaseQuantityClick);
        } else if (action === 'decrease-quantity') {
          element.addEventListener('click', handleDecreaseQuantityClick);
        } else if (action === 'quantity-input') {
          element.addEventListener('blur', handleQuantityInputBlur);
        } else if (action === 'remove-item') {
          element.addEventListener('click', handleRemoveItemClick);
        } else if (action === 'select-shipping') {
          element.addEventListener('change', handleShippingChange);
        } else if (action === 'proceed-to-checkout') {
          element.addEventListener('click', handleProceedToCheckoutClick);
        } else if (action === 'continue-prints') {
          element.addEventListener('click', handleContinuePrintsClick);
        } else if (action === 'continue-gallery-bottom' || action === 'continue-gallery-top') {
          element.addEventListener('click', handleContinueGalleryClick);
        }
        element.dataset.bound = 'true';
      });
    }

    function initCartPage() {
      try {
        const result = WebsiteSDK.getCart();
        currentCart = result && result.cart ? result.cart : { items: [] };
        if (!Array.isArray(currentCart.items)) {
          currentCart.items = [];
        }
        availableShippingMethods = result && Array.isArray(result.available_shipping_methods)
          ? result.available_shipping_methods
          : [];
      } catch (e) {
        console.error('Error loading cart:', e);
        currentCart = { items: [] };
        availableShippingMethods = [];
      }

      if (shippingParam && availableShippingMethods && availableShippingMethods.length && currentCart) {
        const isAvailable = availableShippingMethods.some(function(method) { return method.method === shippingParam; });
        if (isAvailable && currentCart.shipping_method !== shippingParam) {
          try {
            const response = WebsiteSDK.setCartShippingMethod(shippingParam);
            if (response && response.success !== false && response.cart) {
              currentCart.shipping_method = response.cart.shipping_method;
              currentCart.shipping_cost = response.cart.shipping_cost;
              if (typeof response.cart.subtotal === 'number') {
                currentCart.subtotal = response.cart.subtotal;
              }
              if (typeof response.cart.total === 'number') {
                currentCart.total = response.cart.total;
              }
            }
          } catch (e) {
            console.warn('Unable to apply shipping parameter from URL:', e);
          }
        }
      }

      const populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        const dataType = element.dataset.populate;
        if (dataType === 'cart-items' || dataType === 'cart-empty-state') {
          return;
        } else if (dataType === 'shipping-methods') {
          renderShippingMethods(element, currentCart, availableShippingMethods);
        } else if (dataType === 'cart-summary') {
          renderCartSummary(element, currentCart);
        } else if (dataType === 'checkout-error') {
          renderCheckoutError(element, '');
        }
      });

      const itemsContainer = document.querySelector('[data-populate="cart-items"]');
      const emptyContainer = document.querySelector('[data-populate="cart-empty-state"]');
      if (itemsContainer && emptyContainer) {
        renderCartItems(itemsContainer, emptyContainer, currentCart, addedItemIdParam, fromParam);
      }

      updateNavigationEmphasis(fromParam);
      bindActionHandlers();
    }

    initCartPage();
  });
  </script>
</body>
</html>
