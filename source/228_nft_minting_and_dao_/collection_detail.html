<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MemeMint DAO - Collection Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&amp;family=Karla:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="collection_detail.css">
</head>
<body>
  <header class="site-header">
    <div class="header-gradient" aria-hidden="true"></div>
    <div class="header-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">
          <span class="brand-title">MemeMint</span>
          <span class="brand-subtitle">NFTs &amp; DAO</span>
        </span>
      </a>
      <nav class="main-nav" aria-label="Primary navigation">
        <ul class="nav-list">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="collections.html">Collections</a></li>
          <li class="nav-item"><a class="nav-link" href="dao.html">DAO</a></li>
          <li class="nav-item"><a class="nav-link" href="forum.html">Community</a></li>
          <li class="nav-item"><a class="nav-link" href="my_nfts.html">My NFTs</a></li>
        </ul>
      </nav>
      <div class="header-search" data-component="global-search-handler">
        <button type="button" class="header-search-trigger" data-action="open-search">Search</button>
        <form class="header-search-form" data-action="global-search" hidden>
          <label class="visually-hidden" for="globalSearchInput">Search</label>
          <input id="globalSearchInput" type="search" name="query" placeholder="Search collections, NFTs, DAO...">
        </form>
      </div>
    </div>
  </header>

  <main id="content" class="site-main">
    <div class="content-inner">
      <section class="collection-detail-page" data-component="collection-detail-page-controller">
        <div class="collection-detail-shell">
          <div class="collection-detail-panel">
            <section class="collection-header" data-component="collection-header">
              <div class="collection-header-top">
                <button type="button" class="breadcrumb-back" data-action="back-to-collections">&larr; Back to Collections</button>
              </div>
              <div class="collection-header-main" data-populate="collectionDetail">
                <!-- Populated via getCollectionDetail -->
              </div>
            </section>

            <nav class="collection-tabs" data-component="collection-tab-switcher" aria-label="Collection sections">
              <button type="button" class="tab-link is-active" data-action="change-tab" data-tab="mint">Mint</button>
              <button type="button" class="tab-link" data-action="change-tab" data-tab="marketplace">Marketplace</button>
            </nav>

            <section class="tab-panel mint-tab" data-component="mint-tab-container" data-tab-panel="mint" aria-label="Mint NFTs">
              <form class="mint-form" data-component="mint-trait-form" data-action="mint-form">
                <div class="mint-form-inner" data-populate="collectionMintOptions">
                  <!-- Trait groups & mint summary rendered here -->
                </div>

                <div class="mint-quantity-group">
                  <label for="mintQuantity">Quantity</label>
                  <input id="mintQuantity" name="quantity" type="number" min="1" step="1" value="1" data-action="quantity-change">
                </div>

                <div class="mint-total" aria-live="polite" data-populate="mintTotal">
                  <!-- Total cost rendered here -->
                </div>

                <div class="mint-actions">
                  <button type="submit" class="btn btn-primary" data-action="mint-submit">Mint Now</button>
                </div>

                <div class="mint-error" role="alert" aria-live="assertive" data-populate="mintError"></div>
              </form>

              <aside class="mint-status" data-component="mint-transaction-status" aria-live="polite">
                <div data-populate="mintStatus"></div>
              </aside>
            </section>

            <section class="tab-panel marketplace-tab" data-component="marketplace-tab-container" data-tab-panel="marketplace" aria-label="Marketplace" hidden>
              <div class="marketplace-filter-bar" data-component="marketplace-filter-bar">
                <div class="filter-group">
                  <label for="maxPriceInput">Max price (ETH)</label>
                  <input id="maxPriceInput" type="number" min="0" step="0.01" data-action="filter-change" data-filter-key="maxPriceEth">
                </div>
                <div class="filter-group">
                  <label for="minRatingSelect">Min rating</label>
                  <select id="minRatingSelect" data-action="filter-change" data-filter-key="minRating">
                    <option value="">Any</option>
                    <option value="5">52a</option>
                    <option value="4">42a &amp; up</option>
                    <option value="3">32a &amp; up</option>
                  </select>
                </div>
                <button type="button" class="btn btn-tertiary" data-action="clear-filters">Clear filters</button>
              </div>

              <div class="marketplace-sort-bar" data-component="marketplace-sort-control">
                <label for="sortBySelect">Sort by</label>
                <select id="sortBySelect" data-action="sort-change">
                  <option value="price_low_to_high">Price: Low to High</option>
                  <option value="price_high_to_low">Price: High to Low</option>
                  <option value="rating_high_to_low">Rating: High to Low</option>
                </select>
              </div>

              <div class="marketplace-grid" data-component="marketplace-grid" data-populate="collectionMarketplaceListings" aria-live="polite">
                <!-- Marketplace cards rendered here -->
              </div>

              <nav class="marketplace-pagination" data-component="marketplace-pagination" aria-label="Marketplace pagination">
                <div class="pagination-inner" data-populate="marketplacePagination"></div>
              </nav>
            </section>

            <div class="collection-error" data-populate="collectionError" role="alert" aria-live="assertive"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-gradient" aria-hidden="true"></div>
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="footer-title">MemeMint</div>
        <p class="footer-tagline">A playful NFT minting &amp; DAO community for on-chain mischief.</p>
      </div>
      <nav class="footer-nav" aria-label="Footer navigation">
        <ul class="footer-links">
          <li class="footer-item"><a href="about.html">About</a></li>
          <li class="footer-item"><a href="help.html">Help &amp; FAQ</a></li>
          <li class="footer-item"><a href="legal.html">Terms &amp; Privacy</a></li>
        </ul>
      </nav>
    </div>
    <div class="footer-meta">
      <small class="footer-copy">&copy; 2024 MemeMint DAO. All rights reserved.</small>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const pageState = {
      collectionId: null,
      activeTab: 'mint',
      collectionDetail: null,
      mint: {
        traitOptions: null,
        selectedTraits: {},
        quantity: 1,
        status: 'idle',
        errorMessage: '',
        mintedNft: null,
        purchase: null
      },
      marketplace: {
        filters: {
          maxPriceEth: null,
          minRating: null,
          onlyListed: true
        },
        sortBy: 'price_low_to_high',
        page: 1,
        pageSize: 20,
        totalCount: 0,
        items: []
      },
      containers: {}
    };

    function cachePopulateContainers() {
      const nodes = document.querySelectorAll('[data-populate]');
      nodes.forEach(function(el) {
        const key = el.getAttribute('data-populate');
        if (key) {
          pageState.containers[key] = el;
        }
      });
    }

    function readUrlParamsIntoState() {
      const params = new URLSearchParams(window.location.search);
      const collectionId = params.get('collectionId');
      pageState.collectionId = collectionId;
      const tab = params.get('tab');
      pageState.activeTab = (tab === 'marketplace') ? 'marketplace' : 'mint';

      const maxPrice = params.get('maxPrice');
      pageState.marketplace.filters.maxPriceEth = maxPrice ? parseFloat(maxPrice) : null;
      const minRating = params.get('minRating');
      pageState.marketplace.filters.minRating = minRating ? parseFloat(minRating) : null;
      const sortBy = params.get('sortBy');
      if (sortBy) {
        pageState.marketplace.sortBy = sortBy;
      }
      const page = params.get('page');
      pageState.marketplace.page = page ? (parseInt(page, 10) || 1) : 1;
      const pageSize = params.get('pageSize');
      pageState.marketplace.pageSize = pageSize ? (parseInt(pageSize, 10) || 20) : 20;
    }

    function updateUrlFromState(options) {
      const params = new URLSearchParams(window.location.search);
      if (pageState.collectionId) {
        params.set('collectionId', pageState.collectionId);
      }
      params.set('tab', pageState.activeTab);

      if (pageState.marketplace.filters.maxPriceEth != null) {
        params.set('maxPrice', String(pageState.marketplace.filters.maxPriceEth));
      } else {
        params.delete('maxPrice');
      }
      if (pageState.marketplace.filters.minRating != null) {
        params.set('minRating', String(pageState.marketplace.filters.minRating));
      } else {
        params.delete('minRating');
      }
      if (pageState.marketplace.sortBy) {
        params.set('sortBy', pageState.marketplace.sortBy);
      } else {
        params.delete('sortBy');
      }
      if (pageState.marketplace.page && pageState.marketplace.page !== 1) {
        params.set('page', String(pageState.marketplace.page));
      } else {
        params.delete('page');
      }
      if (pageState.marketplace.pageSize && pageState.marketplace.pageSize !== 20) {
        params.set('pageSize', String(pageState.marketplace.pageSize));
      } else {
        params.delete('pageSize');
      }

      const newUrl = window.location.pathname + '?' + params.toString();
      if (!options || options.replace) {
        window.history.replaceState({}, '', newUrl);
      } else {
        window.history.pushState({}, '', newUrl);
      }
    }

    function renderCollectionHeader(container, detail) {
      container.innerHTML = '';
      if (!detail || !detail.collection) {
        const p = document.createElement('p');
        p.textContent = 'Collection details could not be loaded.';
        container.appendChild(p);
        return;
      }
      const collection = detail.collection;
      const mintSummary = detail.mintSummary || {};
      const marketplaceSummary = detail.marketplaceSummary || {};

      const wrapper = document.createElement('div');
      wrapper.className = 'collection-summary';

      const media = document.createElement('div');
      media.className = 'collection-summary-media';
      const img = document.createElement('img');
      img.className = 'collection-summary-image';
      img.src = collection.imageUrl || 'placeholder_collection.png';
      img.alt = collection.name ? collection.name + ' cover art' : 'Collection cover art';
      media.appendChild(img);

      const meta = document.createElement('div');
      meta.className = 'collection-summary-meta';

      const titleRow = document.createElement('div');
      titleRow.className = 'collection-summary-title-row';

      const h1 = document.createElement('h1');
      h1.className = 'collection-title';
      h1.textContent = collection.name || 'Untitled collection';

      const typeBadge = document.createElement('span');
      typeBadge.className = 'collection-type-pill';
      typeBadge.textContent = collection.type || 'other';

      titleRow.appendChild(h1);
      titleRow.appendChild(typeBadge);

      const desc = document.createElement('p');
      desc.className = 'collection-description';
      desc.textContent = collection.description || '';

      const statsRow = document.createElement('div');
      statsRow.className = 'collection-stats-row';

      function makeStat(label, value) {
        const stat = document.createElement('div');
        stat.className = 'collection-stat';
        const statLabel = document.createElement('div');
        statLabel.className = 'collection-stat-label';
        statLabel.textContent = label;
        const statValue = document.createElement('div');
        statValue.className = 'collection-stat-value';
        statValue.textContent = value;
        stat.appendChild(statLabel);
        stat.appendChild(statValue);
        return stat;
      }

      const supplyText = (mintSummary.mintedSupply != null && mintSummary.totalSupply != null)
        ? mintSummary.mintedSupply + ' / ' + mintSummary.totalSupply
        : (collection.mintedSupply != null && collection.totalSupply != null)
          ? collection.mintedSupply + ' / ' + collection.totalSupply
          : 'Unknown';

      const mintPriceText = (mintSummary.mintPriceEth != null)
        ? mintSummary.mintPriceEth + ' ETH'
        : (collection.mintPriceEth != null)
          ? collection.mintPriceEth + ' ETH'
          : '--';

      const floorPriceText = (marketplaceSummary.floorPriceEth != null)
        ? marketplaceSummary.floorPriceEth + ' ETH'
        : (collection.floorPriceEth != null)
          ? collection.floorPriceEth + ' ETH'
          : '--';

      const ratingText = (marketplaceSummary.ratingAverage != null)
        ? marketplaceSummary.ratingAverage.toFixed(1) + '2a'
        : (collection.ratingAverage != null)
          ? collection.ratingAverage.toFixed(1) + '2a'
          : 'No rating';

      statsRow.appendChild(makeStat('Supply', supplyText));
      statsRow.appendChild(makeStat('Mint price', mintPriceText));
      statsRow.appendChild(makeStat('Floor', floorPriceText));
      statsRow.appendChild(makeStat('Rating', ratingText));

      const mintStatus = document.createElement('div');
      mintStatus.className = 'collection-mint-status';
      mintStatus.textContent = (mintSummary.isMintingOpen === false || collection.isMintingOpen === false)
        ? 'Minting is closed'
        : 'Minting is open';

      meta.appendChild(titleRow);
      if (collection.description) {
        meta.appendChild(desc);
      }
      meta.appendChild(statsRow);
      meta.appendChild(mintStatus);

      wrapper.appendChild(media);
      wrapper.appendChild(meta);
      container.appendChild(wrapper);
    }

    function renderMintOptions(container, traitOptions, detail) {
      container.innerHTML = '';
      const wrapper = document.createElement('div');
      wrapper.className = 'mint-form-fields';

      if (!traitOptions || !traitOptions.length) {
        const p = document.createElement('p');
        p.textContent = 'No configurable traits for this collection. You can still mint using default traits.';
        wrapper.appendChild(p);
      } else {
        const orderedTraitTypes = [
          'background',
          'body',
          'clothing',
          'eyes',
          'mouth',
          'headgear',
          'accessory',
          'other'
        ];
        const grouped = {};
        traitOptions.forEach(function(option) {
          const key = option.traitType || 'other';
          if (!grouped[key]) {
            grouped[key] = [];
          }
          grouped[key].push(option);
        });
        orderedTraitTypes.forEach(function(traitType) {
          const optionsForType = grouped[traitType];
          if (!optionsForType || !optionsForType.length) {
            return;
          }
          optionsForType.sort(function(a, b) {
            const orderA = a.order != null ? a.order : 0;
            const orderB = b.order != null ? b.order : 0;
            return orderA - orderB;
          });
          const fieldset = document.createElement('fieldset');
          fieldset.className = 'mint-trait-group';
          const legend = document.createElement('legend');
          legend.className = 'mint-trait-legend';
          const labelText = traitType.charAt(0).toUpperCase() + traitType.slice(1).replace('_', ' ');
          legend.textContent = labelText;
          fieldset.appendChild(legend);

          const select = document.createElement('select');
          select.className = 'mint-trait-select';
          select.name = 'trait_' + traitType;
          select.setAttribute('data-action', 'trait-change');
          select.setAttribute('data-trait-type', traitType);

          const emptyOption = document.createElement('option');
          emptyOption.value = '';
          emptyOption.textContent = 'Random ' + labelText.toLowerCase();
          select.appendChild(emptyOption);

          let defaultValue = '';
          const storedSelection = pageState.mint.selectedTraits[traitType];
          if (storedSelection) {
            defaultValue = storedSelection;
          } else {
            const defaultOption = optionsForType.find(function(opt) { return opt.isDefault; });
            if (defaultOption) {
              defaultValue = defaultOption.value;
            }
          }

          optionsForType.forEach(function(opt) {
            const optionEl = document.createElement('option');
            optionEl.value = opt.value;
            let optionLabel = opt.label;
            if (opt.rarityScore != null) {
              optionLabel += ' (Rarity ' + opt.rarityScore + ')';
            }
            optionEl.textContent = optionLabel;
            if (defaultValue && opt.value === defaultValue) {
              optionEl.selected = true;
            }
            select.appendChild(optionEl);
          });

          if (defaultValue) {
            pageState.mint.selectedTraits[traitType] = defaultValue;
          }

          fieldset.appendChild(select);
          wrapper.appendChild(fieldset);
        });
      }

      let mintSummary = null;
      if (detail && detail.mintSummary) {
        mintSummary = detail.mintSummary;
      } else if (detail && detail.collection) {
        mintSummary = {
          totalSupply: detail.collection.totalSupply,
          mintedSupply: detail.collection.mintedSupply,
          mintPriceEth: detail.collection.mintPriceEth,
          isMintingOpen: detail.collection.isMintingOpen
        };
      }

      if (mintSummary) {
        const summary = document.createElement('div');
        summary.className = 'mint-summary';
        const summaryTitle = document.createElement('h2');
        summaryTitle.className = 'mint-summary-title';
        summaryTitle.textContent = 'Mint summary';
        const summaryList = document.createElement('ul');
        summaryList.className = 'mint-summary-list';

        function addItem(label, value) {
          const li = document.createElement('li');
          const strong = document.createElement('strong');
          strong.textContent = label + ': ';
          const span = document.createElement('span');
          span.textContent = value;
          li.appendChild(strong);
          li.appendChild(span);
          summaryList.appendChild(li);
        }

        addItem('Price per NFT', mintSummary.mintPriceEth != null ? mintSummary.mintPriceEth + ' ETH' : '--');
        addItem('Supply', mintSummary.mintedSupply + ' / ' + mintSummary.totalSupply);
        addItem('Minting status', mintSummary.isMintingOpen === false ? 'Closed' : 'Open');

        summary.appendChild(summaryTitle);
        summary.appendChild(summaryList);
        wrapper.appendChild(summary);
      }

      container.appendChild(wrapper);
    }

    function renderMintTotal(container) {
      container.innerHTML = '';
      const detail = pageState.collectionDetail;
      let mintSummary = null;
      if (detail && detail.mintSummary) {
        mintSummary = detail.mintSummary;
      } else if (detail && detail.collection) {
        mintSummary = { mintPriceEth: detail.collection.mintPriceEth };
      }
      const pricePer = mintSummary && mintSummary.mintPriceEth != null ? mintSummary.mintPriceEth : null;
      const quantity = pageState.mint.quantity || 1;

      const label = document.createElement('div');
      label.className = 'mint-total-label';
      label.textContent = 'Total';

      const value = document.createElement('div');
      value.className = 'mint-total-value';
      if (pricePer != null) {
        const total = pricePer * quantity;
        value.textContent = total + ' ETH for ' + quantity + (quantity === 1 ? ' NFT' : ' NFTs');
      } else {
        value.textContent = '2d';
      }

      container.appendChild(label);
      container.appendChild(value);
    }

    function renderMintError(container) {
      container.innerHTML = '';
      if (pageState.mint.status !== 'error' || !pageState.mint.errorMessage) {
        return;
      }
      const p = document.createElement('p');
      p.textContent = pageState.mint.errorMessage;
      container.appendChild(p);
    }

    function renderMintStatus(container) {
      container.innerHTML = '';
      const status = pageState.mint.status;
      if (status === 'idle') {
        const p = document.createElement('p');
        p.textContent = 'No mint transaction yet. Your most recent mint will appear here.';
        container.appendChild(p);
        return;
      }
      if (status === 'pending') {
        const p = document.createElement('p');
        p.textContent = 'Minting in progress... please confirm in your wallet if prompted.';
        container.appendChild(p);
        return;
      }
      if (status === 'error') {
        const p = document.createElement('p');
        p.textContent = 'Mint failed.';
        container.appendChild(p);
        return;
      }
      if (status === 'success') {
        const mintedNft = pageState.mint.mintedNft;
        const purchase = pageState.mint.purchase;

        const title = document.createElement('h2');
        title.className = 'mint-status-title';
        title.textContent = 'Mint successful';
        container.appendChild(title);

        if (mintedNft) {
          const nftSummary = document.createElement('div');
          nftSummary.className = 'mint-status-nft';

          if (mintedNft.imageUrl) {
            const img = document.createElement('img');
            img.className = 'mint-status-image';
            img.src = mintedNft.imageUrl;
            img.alt = mintedNft.name || 'Minted NFT';
            nftSummary.appendChild(img);
          }

          const name = document.createElement('div');
          name.className = 'mint-status-nft-name';
          name.textContent = mintedNft.name || 'Newly minted NFT';
          nftSummary.appendChild(name);

          container.appendChild(nftSummary);
        }

        if (purchase) {
          const purchaseInfo = document.createElement('div');
          purchaseInfo.className = 'mint-status-purchase';
          const price = purchase.price != null ? purchase.price + ' ' + (purchase.currency || 'ETH') : '';
          const qty = purchase.quantity != null ? purchase.quantity : pageState.mint.quantity;
          const text = document.createElement('p');
          text.textContent = 'You paid ' + price + ' for ' + qty + (qty === 1 ? ' NFT.' : ' NFTs.');
          purchaseInfo.appendChild(text);
          container.appendChild(purchaseInfo);
        }

        const actions = document.createElement('div');
        actions.className = 'mint-status-actions';

        const viewBtn = document.createElement('button');
        viewBtn.type = 'button';
        viewBtn.className = 'btn btn-primary';
        viewBtn.setAttribute('data-action', 'view-minted-nft');
        viewBtn.textContent = 'View NFT';

        const resetBtn = document.createElement('button');
        resetBtn.type = 'button';
        resetBtn.className = 'btn btn-secondary';
        resetBtn.setAttribute('data-action', 'reset-mint-form');
        resetBtn.textContent = 'Mint another';

        actions.appendChild(viewBtn);
        actions.appendChild(resetBtn);
        container.appendChild(actions);
      }
    }

    function renderMarketplaceGrid(container, result) {
      container.innerHTML = '';
      if (!result || !result.items || !result.items.length) {
        const p = document.createElement('p');
        p.textContent = 'No NFTs match your filters yet.';
        container.appendChild(p);
        return;
      }
      result.items.forEach(function(item) {
        const nft = item.nft;
        const listing = item.listing;

        const card = document.createElement('article');
        card.className = 'nft-card';
        card.setAttribute('data-action', 'open-nft');
        card.setAttribute('data-nft-id', nft.id);

        const img = document.createElement('img');
        img.className = 'nft-card-image';
        img.src = nft.imageUrl || 'placeholder_nft.png';
        img.alt = nft.name || 'NFT image';

        const body = document.createElement('div');
        body.className = 'nft-card-body';

        const title = document.createElement('h3');
        title.className = 'nft-card-title';
        title.textContent = nft.name || ('#' + nft.tokenId);

        const metaRow = document.createElement('div');
        metaRow.className = 'nft-card-meta-row';

        const priceSpan = document.createElement('span');
        priceSpan.className = 'nft-card-price';
        if (listing && listing.priceEth != null) {
          priceSpan.textContent = listing.priceEth + ' ETH';
        } else {
          priceSpan.textContent = 'Not listed';
        }

        const ratingSpan = document.createElement('span');
        ratingSpan.className = 'nft-card-rating';
        if (nft.rating != null) {
          ratingSpan.textContent = nft.rating.toFixed(1) + '2a';
        } else {
          ratingSpan.textContent = 'Unrated';
        }

        metaRow.appendChild(priceSpan);
        metaRow.appendChild(ratingSpan);

        body.appendChild(title);
        body.appendChild(metaRow);

        card.appendChild(img);
        card.appendChild(body);

        container.appendChild(card);
      });
    }

    function renderMarketplacePagination(container, result) {
      container.innerHTML = '';
      if (!result) {
        return;
      }
      const totalCount = result.totalCount || 0;
      const page = result.page || 1;
      const pageSize = result.pageSize || 20;
      const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));

      const wrapper = document.createElement('div');
      wrapper.className = 'pagination';

      const info = document.createElement('span');
      info.className = 'pagination-info';
      info.textContent = 'Page ' + page + ' of ' + totalPages;
      wrapper.appendChild(info);

      const controls = document.createElement('div');
      controls.className = 'pagination-controls';

      const prevBtn = document.createElement('button');
      prevBtn.type = 'button';
      prevBtn.className = 'btn btn-secondary pagination-prev';
      prevBtn.textContent = 'Previous';
      prevBtn.disabled = page <= 1;
      prevBtn.setAttribute('data-action', 'page-change');
      prevBtn.setAttribute('data-page', String(page - 1));

      const nextBtn = document.createElement('button');
      nextBtn.type = 'button';
      nextBtn.className = 'btn btn-secondary pagination-next';
      nextBtn.textContent = 'Next';
      nextBtn.disabled = page >= totalPages;
      nextBtn.setAttribute('data-action', 'page-change');
      nextBtn.setAttribute('data-page', String(page + 1));

      controls.appendChild(prevBtn);
      controls.appendChild(nextBtn);

      wrapper.appendChild(controls);
      container.appendChild(wrapper);
    }

    function renderCollectionError(container, message) {
      container.innerHTML = '';
      if (!message) {
        container.style.display = 'none';
        return;
      }
      container.style.display = '';
      const p = document.createElement('p');
      p.textContent = message;
      container.appendChild(p);
    }

    function syncMarketplaceFilterInputs() {
      const maxPriceInput = document.querySelector('[data-filter-key="maxPriceEth"]');
      if (maxPriceInput) {
        maxPriceInput.value = pageState.marketplace.filters.maxPriceEth != null
          ? String(pageState.marketplace.filters.maxPriceEth)
          : '';
      }
      const minRatingSelect = document.querySelector('[data-filter-key="minRating"]');
      if (minRatingSelect) {
        minRatingSelect.value = pageState.marketplace.filters.minRating != null
          ? String(pageState.marketplace.filters.minRating)
          : '';
      }
      const sortSelect = document.getElementById('sortBySelect');
      if (sortSelect) {
        sortSelect.value = pageState.marketplace.sortBy || 'price_low_to_high';
      }
    }

    function setActiveTabInDom() {
      const tabButtons = document.querySelectorAll('[data-action="change-tab"]');
      tabButtons.forEach(function(btn) {
        const tab = btn.getAttribute('data-tab');
        if (tab === pageState.activeTab) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
      });
      const panels = document.querySelectorAll('[data-tab-panel]');
      panels.forEach(function(panel) {
        const tab = panel.getAttribute('data-tab-panel');
        const shouldShow = tab === pageState.activeTab;
        panel.hidden = !shouldShow;
      });
    }

    function loadCollectionDetailAndRender() {
      const headerContainer = pageState.containers.collectionDetail;
      const errorContainer = pageState.containers.collectionError;
      try {
        const detail = WebsiteSDK.getCollectionDetail(pageState.collectionId);
        pageState.collectionDetail = detail;
        if (headerContainer) {
          renderCollectionHeader(headerContainer, detail);
        }
        if (errorContainer) {
          renderCollectionError(errorContainer, '');
        }
      } catch (e) {
        if (errorContainer) {
          renderCollectionError(errorContainer, 'Failed to load collection details.');
        }
      }
    }

    function loadMintDataAndRender() {
      const traitContainer = pageState.containers.collectionMintOptions;
      if (!traitContainer || !pageState.collectionId) {
        return;
      }
      try {
        const result = WebsiteSDK.getCollectionMintOptions(pageState.collectionId);
        pageState.mint.traitOptions = result.traitOptions || [];
        renderMintOptions(traitContainer, pageState.mint.traitOptions, pageState.collectionDetail || result);
        const totalContainer = pageState.containers.mintTotal;
        if (totalContainer) {
          renderMintTotal(totalContainer);
        }
        const statusContainer = pageState.containers.mintStatus;
        if (statusContainer) {
          renderMintStatus(statusContainer);
        }
        const errorContainer = pageState.containers.mintError;
        if (errorContainer) {
          renderMintError(errorContainer);
        }
        const quantityInput = document.getElementById('mintQuantity');
        if (quantityInput) {
          quantityInput.value = String(pageState.mint.quantity);
        }
      } catch (e) {
        const errorContainer = pageState.containers.mintError;
        if (errorContainer) {
          pageState.mint.status = 'error';
          pageState.mint.errorMessage = 'Failed to load mint options.';
          renderMintError(errorContainer);
        }
      }
    }

    function loadMarketplaceDataAndRender() {
      const gridContainer = pageState.containers.collectionMarketplaceListings;
      const paginationContainer = pageState.containers.marketplacePagination;
      if (!gridContainer || !pageState.collectionId) {
        return;
      }
      const filters = { onlyListed: true };
      if (pageState.marketplace.filters.maxPriceEth != null) {
        filters.maxPriceEth = pageState.marketplace.filters.maxPriceEth;
      }
      if (pageState.marketplace.filters.minRating != null) {
        filters.minRating = pageState.marketplace.filters.minRating;
      }
      try {
        const result = WebsiteSDK.getCollectionMarketplaceListings(
          pageState.collectionId,
          filters,
          pageState.marketplace.sortBy,
          pageState.marketplace.page,
          pageState.marketplace.pageSize
        );
        pageState.marketplace.items = result.items || [];
        pageState.marketplace.totalCount = result.totalCount || 0;
        if (gridContainer) {
          renderMarketplaceGrid(gridContainer, result);
        }
        if (paginationContainer) {
          renderMarketplacePagination(paginationContainer, result);
        }
        syncMarketplaceFilterInputs();
      } catch (e) {
        gridContainer.innerHTML = '';
        const p = document.createElement('p');
        p.textContent = 'Failed to load marketplace listings.';
        gridContainer.appendChild(p);
        if (paginationContainer) {
          paginationContainer.innerHTML = '';
        }
      }
    }

    function initPage() {
      cachePopulateContainers();
      readUrlParamsIntoState();

      const errorContainer = pageState.containers.collectionError;
      if (!pageState.collectionId) {
        if (errorContainer) {
          renderCollectionError(errorContainer, 'No collection selected. Go back to Collections to pick one.');
        }
        return;
      }

      loadCollectionDetailAndRender();
      setActiveTabInDom();

      if (pageState.activeTab === 'mint') {
        loadMintDataAndRender();
      } else if (pageState.activeTab === 'marketplace') {
        loadMarketplaceDataAndRender();
      }
    }

    document.addEventListener('click', function(event) {
      const target = event.target.closest('[data-action]');
      if (!target) {
        return;
      }
      const action = target.getAttribute('data-action');

      if (action === 'back-to-collections') {
        event.preventDefault();
        window.location.href = 'collections.html';
      }

      if (action === 'change-tab') {
        event.preventDefault();
        const tab = target.getAttribute('data-tab') || 'mint';
        if (pageState.activeTab === tab) {
          return;
        }
        pageState.activeTab = tab;
        updateUrlFromState({ replace: true });
        setActiveTabInDom();
        if (tab === 'mint') {
          if (!pageState.mint.traitOptions) {
            loadMintDataAndRender();
          }
        } else if (tab === 'marketplace') {
          loadMarketplaceDataAndRender();
        }
      }

      if (action === 'mint-submit') {
        event.preventDefault();
        if (!pageState.collectionId) {
          return;
        }
        const detail = pageState.collectionDetail;
        const mintSummary = detail && detail.mintSummary ? detail.mintSummary : null;
        if (mintSummary && mintSummary.isMintingOpen === false) {
          pageState.mint.status = 'error';
          pageState.mint.errorMessage = 'Minting is closed for this collection.';
          if (pageState.containers.mintError) {
            renderMintError(pageState.containers.mintError);
          }
          if (pageState.containers.mintStatus) {
            renderMintStatus(pageState.containers.mintStatus);
          }
          return;
        }
        const quantity = pageState.mint.quantity || 1;
        if (quantity < 1) {
          pageState.mint.status = 'error';
          pageState.mint.errorMessage = 'Quantity must be at least 1.';
          if (pageState.containers.mintError) {
            renderMintError(pageState.containers.mintError);
          }
          if (pageState.containers.mintStatus) {
            renderMintStatus(pageState.containers.mintStatus);
          }
          return;
        }
        pageState.mint.status = 'pending';
        pageState.mint.errorMessage = '';
        if (pageState.containers.mintError) {
          renderMintError(pageState.containers.mintError);
        }
        if (pageState.containers.mintStatus) {
          renderMintStatus(pageState.containers.mintStatus);
        }
        try {
          const response = WebsiteSDK.mintNft(
            pageState.collectionId,
            pageState.mint.selectedTraits,
            quantity
          );
          if (response && response.success) {
            pageState.mint.status = 'success';
            pageState.mint.mintedNft = response.nft || null;
            pageState.mint.purchase = response.purchase || null;
          } else {
            pageState.mint.status = 'error';
            pageState.mint.errorMessage = response && response.message
              ? response.message
              : 'Mint failed for an unknown reason.';
          }
        } catch (e) {
          pageState.mint.status = 'error';
          pageState.mint.errorMessage = 'Mint threw an unexpected error.';
        }
        if (pageState.containers.mintError) {
          renderMintError(pageState.containers.mintError);
        }
        if (pageState.containers.mintStatus) {
          renderMintStatus(pageState.containers.mintStatus);
        }
      }

      if (action === 'view-minted-nft') {
        event.preventDefault();
        const nft = pageState.mint.mintedNft;
        if (!nft || !nft.id) {
          return;
        }
        const nftId = nft.id;
        window.location.href = 'nft_detail.html?nftId=' + encodeURIComponent(nftId);
      }

      if (action === 'reset-mint-form') {
        event.preventDefault();
        pageState.mint.selectedTraits = {};
        pageState.mint.quantity = 1;
        pageState.mint.status = 'idle';
        pageState.mint.errorMessage = '';
        const quantityInput = document.getElementById('mintQuantity');
        if (quantityInput) {
          quantityInput.value = '1';
        }
        if (pageState.containers.collectionMintOptions) {
          loadMintDataAndRender();
        }
      }

      if (action === 'clear-filters') {
        event.preventDefault();
        pageState.marketplace.filters.maxPriceEth = null;
        pageState.marketplace.filters.minRating = null;
        pageState.marketplace.page = 1;
        syncMarketplaceFilterInputs();
        updateUrlFromState({ replace: true });
        loadMarketplaceDataAndRender();
      }

      if (action === 'page-change') {
        event.preventDefault();
        const pageValue = target.getAttribute('data-page');
        if (!pageValue) {
          return;
        }
        const newPage = parseInt(pageValue, 10);
        if (!newPage || newPage === pageState.marketplace.page) {
          return;
        }
        pageState.marketplace.page = newPage;
        updateUrlFromState({ replace: true });
        loadMarketplaceDataAndRender();
      }

      if (action === 'open-nft') {
        event.preventDefault();
        const nftId = target.getAttribute('data-nft-id');
        if (!nftId) {
          return;
        }
        window.location.href = 'nft_detail.html?nftId=' + encodeURIComponent(nftId);
      }

      if (action === 'open-search') {
        event.preventDefault();
        const form = document.querySelector('.header-search-form');
        if (form) {
          form.hidden = !form.hidden;
          const input = form.querySelector('input[name="query"]');
          if (!form.hidden && input) {
            input.focus();
          }
        }
      }
    });

    document.addEventListener('change', function(event) {
      const target = event.target.closest('[data-action]');
      if (!target) {
        return;
      }
      const action = target.getAttribute('data-action');

      if (action === 'trait-change') {
        const traitType = target.getAttribute('data-trait-type');
        const value = target.value || '';
        if (traitType) {
          if (value) {
            pageState.mint.selectedTraits[traitType] = value;
          } else {
            delete pageState.mint.selectedTraits[traitType];
          }
        }
      }

      if (action === 'quantity-change') {
        let value = parseInt(target.value, 10);
        if (!value || value < 1) {
          value = 1;
        }
        pageState.mint.quantity = value;
        target.value = String(value);
        if (pageState.containers.mintTotal) {
          renderMintTotal(pageState.containers.mintTotal);
        }
      }

      if (action === 'filter-change') {
        const key = target.getAttribute('data-filter-key');
        if (!key) {
          return;
        }
        let value = target.value;
        if (value === '') {
          if (key === 'maxPriceEth') {
            pageState.marketplace.filters.maxPriceEth = null;
          }
          if (key === 'minRating') {
            pageState.marketplace.filters.minRating = null;
          }
        } else {
          if (key === 'maxPriceEth') {
            pageState.marketplace.filters.maxPriceEth = parseFloat(value);
          }
          if (key === 'minRating') {
            pageState.marketplace.filters.minRating = parseFloat(value);
          }
        }
        pageState.marketplace.page = 1;
        updateUrlFromState({ replace: true });
        loadMarketplaceDataAndRender();
      }

      if (action === 'sort-change') {
        const value = target.value || 'price_low_to_high';
        pageState.marketplace.sortBy = value;
        pageState.marketplace.page = 1;
        updateUrlFromState({ replace: true });
        loadMarketplaceDataAndRender();
      }
    });

    document.addEventListener('submit', function(event) {
      const form = event.target.closest('form');
      if (!form) {
        return;
      }
      const action = form.getAttribute('data-action');
      if (action === 'mint-form') {
        event.preventDefault();
        const submitButton = form.querySelector('[data-action="mint-submit"]');
        if (submitButton) {
          submitButton.click();
        }
      }
      if (action === 'global-search') {
        event.preventDefault();
        const input = form.querySelector('input[name="query"]');
        const value = input && input.value ? input.value.trim() : '';
        if (!value) {
          return;
        }
        window.location.href = 'search.html?query=' + encodeURIComponent(value);
      }
    });

    initPage();
  });
  </script>
</body>
</html>
