<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bridges & Tales Publishing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&amp;family=Source+Sans+3:wght@400;500;600&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="product.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header" role="banner">
      <div class="header-inner">
        <a href="index.html" class="brand" aria-label="Bridges and Tales Publishing Home">
          <img src="assets/logo-bridges-tales.svg" alt="Bridges & Tales Publishing" class="brand-logo" />
        </a>
        <nav class="main-nav" aria-label="Primary navigation">
          <ul class="main-nav-list">
            <li class="main-nav-item">
              <a href="index.html" class="main-nav-link">Home</a>
            </li>
            <li class="main-nav-item">
              <a href="books.html" class="main-nav-link">Books</a>
            </li>
            <li class="main-nav-item">
              <a href="series_list.html" class="main-nav-link">Series</a>
            </li>
            <li class="main-nav-item">
              <a href="teachers.html" class="main-nav-link">Teachers &amp; Schools</a>
            </li>
            <li class="main-nav-item">
              <a href="events.html" class="main-nav-link">Events</a>
            </li>
            <li class="main-nav-item">
              <a href="wishlist.html" class="main-nav-link">Wishlist</a>
            </li>
            <li class="main-nav-item">
              <a href="account.html" class="main-nav-link">My Account</a>
            </li>
            <li class="main-nav-item">
              <a href="signup.html" class="main-nav-link">Sign Up</a>
            </li>
            <li class="main-nav-item">
              <a href="cart.html" class="main-nav-link">Cart</a>
            </li>
          </ul>
        </nav>
      </div>
      <div class="header-divider" aria-hidden="true"></div>
    </header>

    <main id="content" class="site-main" role="main" tabindex="-1">
      <section class="product-page" aria-labelledby="product-page-title">
        <div class="product-page-inner">
          <!-- Operation feedback banner -->
          <div class="product-feedback" data-component="operation-feedback-banner" data-populate="operation-feedback" role="status" aria-live="polite" hidden></div>

          <!-- Loader overlay -->
          <div class="product-loader-overlay" data-component="product-detail-loader" data-populate="loader" aria-hidden="true" hidden></div>

          <!-- Product summary header -->
          <section class="product-summary" data-component="product-summary-header" data-populate="product-summary">
            <div class="product-summary-inner">
              <h1 id="product-page-title" class="product-title">Loading story&hellip;</h1>
            </div>
          </section>

          <!-- Edition selector (books only) -->
          <section class="edition-selector-section" data-component="edition-selector" data-populate="edition-selector" hidden></section>

          <!-- Purchase panel -->
          <section class="purchase-panel" data-component="product-purchase-panel" data-populate="purchase-panel"></section>

          <!-- Wishlist control (books only) -->
          <section class="wishlist-section" data-component="wishlist-control" data-populate="wishlist-control"></section>

          <!-- Description panel -->
          <section class="product-description-section" data-component="product-description-panel" data-populate="product-description"></section>

          <!-- Included books (classroom packs only) -->
          <section class="included-books-section" data-component="included-books-list" data-populate="included-books"></section>

          <!-- Review entry panel (books, when reviewable) -->
          <section class="review-entry-section" id="review-section" data-component="review-entry-panel" data-populate="review-form"></section>
        </div>
      </section>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="footer-divider" aria-hidden="true"></div>
      <div class="footer-inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-links">
            <li class="footer-link-item">
              <a href="about.html" class="footer-link">About</a>
            </li>
            <li class="footer-link-item">
              <a href="teachers.html" class="footer-link">Teachers &amp; Schools</a>
            </li>
            <li class="footer-link-item">
              <a href="classroom_packs.html?grade=all_grades" class="footer-link">Classroom Packs</a>
            </li>
            <li class="footer-link-item">
              <a href="resources.html?resource_type=reading_guides" class="footer-link">Free Resources</a>
            </li>
            <li class="footer-link-item">
              <a href="events.html" class="footer-link">Events</a>
            </li>
            <li class="footer-link-item">
              <a href="newsletter.html" class="footer-link">Newsletter Signup</a>
            </li>
          </ul>
        </nav>
        <p class="footer-meta">&copy; <span class="footer-year">2026</span> Bridges &amp; Tales Publishing. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    (function() {
      'use strict';

      const pageState = {
        productType: 'book',
        productId: null,
        initialEditionIdParam: null,
        bookData: null,
        classroomPackData: null,
        selectedEditionId: null,
        quantity: 1,
        lastOperation: null, // { type: 'cart'|'wishlist'|'review'|'load', result: {...} }
        reviewForm: {
          rating: 0,
          text: '',
          isSubmitted: false
        },
        isLoading: false,
        autoFocusReview: false
      };

      const AGE_RANGE_LABELS = {
        ages_0_2: 'Ages 0-2',
        ages_3_5: 'Ages 3-5',
        ages_6_8: 'Ages 6-8',
        ages_8_10: 'Ages 8-10',
        ages_9_12: 'Ages 9-12',
        ages_13_18: 'Ages 13-18'
      };

      const BOOK_CATEGORY_LABELS = {
        picture_books: 'Picture books',
        chapter_books: 'Chapter books',
        middle_grade: 'Middle grade',
        young_adult: 'Young adult',
        non_fiction: 'Non-fiction',
        comics_graphic_novels: 'Comics & graphic novels',
        activity_books: 'Activity books',
        other: 'Other'
      };

      const GENRE_LABELS = {
        fantasy: 'Fantasy',
        realistic_fiction: 'Realistic fiction',
        science_fiction: 'Science fiction',
        mystery: 'Mystery',
        bedtime_stories: 'Bedtime stories',
        picture_books: 'Picture books',
        historical_fiction: 'Historical fiction',
        non_fiction: 'Non-fiction',
        poetry: 'Poetry',
        other: 'Other'
      };

      const CLASSROOM_GRADE_LABELS = {
        kindergarten: 'Kindergarten',
        grade_1: 'Grade 1',
        grade_2: 'Grade 2',
        grade_3: 'Grade 3',
        grade_4: 'Grade 4',
        grade_5: 'Grade 5',
        grade_6: 'Grade 6',
        all_grades: 'All grades'
      };

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        const str = String(value);
        return str.replace(/[&<>"']/g, function(char) {
          switch (char) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            case '\'': return '&#39;';
            default: return char;
          }
        });
      }

      function getAgeLabelFromBook(book) {
        if (!book) return '';
        if (book.minAge !== null && book.minAge !== undefined && book.maxAge !== null && book.maxAge !== undefined) {
          return 'Ages ' + book.minAge + ' - ' + book.maxAge;
        }
        if (book.ageRange && AGE_RANGE_LABELS[book.ageRange]) {
          return AGE_RANGE_LABELS[book.ageRange];
        }
        return '';
      }

      function getAgeLabelFromEnum(ageRange) {
        if (ageRange && AGE_RANGE_LABELS[ageRange]) {
          return AGE_RANGE_LABELS[ageRange];
        }
        return '';
      }

      function getCategoryLabel(category) {
        if (category && BOOK_CATEGORY_LABELS[category]) {
          return BOOK_CATEGORY_LABELS[category];
        }
        return '';
      }

      function getGenreLabel(genre) {
        if (genre && GENRE_LABELS[genre]) {
          return GENRE_LABELS[genre];
        }
        return '';
      }

      function getGradeLabelForPack(classroomPack, gradeLevelLabelFromApi) {
        if (gradeLevelLabelFromApi) {
          return gradeLevelLabelFromApi;
        }
        if (!classroomPack) return '';
        const key = classroomPack.gradeLevel;
        if (key && CLASSROOM_GRADE_LABELS[key]) {
          return CLASSROOM_GRADE_LABELS[key];
        }
        return '';
      }

      function getSelectedEditionWrapper() {
        if (!pageState.bookData || !pageState.bookData.editions || !pageState.bookData.editions.length) {
          return null;
        }
        if (!pageState.selectedEditionId) {
          return pageState.bookData.editions[0];
        }
        for (let i = 0; i < pageState.bookData.editions.length; i += 1) {
          const wrapper = pageState.bookData.editions[i];
          if (wrapper && wrapper.edition && wrapper.edition.id === pageState.selectedEditionId) {
            return wrapper;
          }
        }
        return pageState.bookData.editions[0];
      }

      function renderLoader(container) {
        if (pageState.isLoading) {
          container.hidden = false;
          container.innerHTML = `
            <div class="product-loader-overlay-inner">
              <div class="product-loader-backdrop"></div>
              <div class="product-loader-spinner" role="status" aria-live="polite" aria-label="Loading product"></div>
            </div>
          `;
        } else {
          container.hidden = true;
          container.innerHTML = '';
        }
      }

      function renderFeedbackBanner(container) {
        const op = pageState.lastOperation;
        if (!op || !op.result || !op.result.message) {
          container.hidden = true;
          container.innerHTML = '';
          return;
        }
        const isSuccess = !!op.result.success;
        const typeLabel = op.type === 'cart' ? 'Cart' : op.type === 'wishlist' ? 'Wishlist' : op.type === 'review' ? 'Review' : '';
        const prefix = typeLabel ? typeLabel + ': ' : '';
        container.hidden = false;
        container.innerHTML = `
          <div class="feedback-banner-inner feedback-banner--${isSuccess ? 'success' : 'error'}">
            <p class="feedback-message">${escapeHtml(prefix + op.result.message)}</p>
            <button type="button" class="feedback-dismiss" aria-label="Dismiss message" data-action="dismiss-feedback">&times;</button>
          </div>
        `;
      }

      function renderProductSummary(container) {
        if (!pageState.productId) {
          container.innerHTML = `
            <div class="product-summary-inner">
              <h1 id="product-page-title" class="product-title">Choose a story to see its details</h1>
              <p class="product-subtitle">Use the Books or Classroom Packs pages to pick a title.</p>
            </div>
          `;
          return;
        }

        if (pageState.productType === 'classroom_pack' && pageState.classroomPackData && pageState.classroomPackData.classroomPack) {
          const pack = pageState.classroomPackData.classroomPack;
          const gradeLabel = getGradeLabelForPack(pack, pageState.classroomPackData.gradeLevelLabel);
          const totalPriceDisplay = pageState.classroomPackData.totalPriceDisplay || (pack.totalPrice !== null && pack.totalPrice !== undefined ? '$' + pack.totalPrice : '');
          const imageSrc = pack.image ? escapeHtml(pack.image) : '';
          const copyCount = pack.copyCount !== null && pack.copyCount !== undefined ? pack.copyCount : '';

          container.innerHTML = `
            <div class="product-summary-inner product-summary-inner--pack">
              ${imageSrc ? `
                <div class="product-summary-cover">
                  <img src="${imageSrc}" alt="Classroom pack: ${escapeHtml(pack.name)}" class="product-cover-image" />
                </div>
              ` : ''}
              <h1 id="product-page-title" class="product-title">${escapeHtml(pack.name)}</h1>
              <p class="product-meta">
                ${gradeLabel ? `<span class="product-meta-item">${escapeHtml(gradeLabel)}</span>` : ''}
                ${copyCount ? `<span class="product-meta-item">${escapeHtml(copyCount)} copies</span>` : ''}
              </p>
              <p class="product-price-highlight">${escapeHtml(totalPriceDisplay)}</p>
            </div>
          `;
          return;
        }

        if (pageState.productType === 'book' && pageState.bookData && pageState.bookData.book) {
          const book = pageState.bookData.book;
          const ageLabel = getAgeLabelFromBook(book);
          const categoryLabel = getCategoryLabel(book.category);
          const genreLabel = getGenreLabel(book.genre);
          const yearLabel = book.publicationYear ? 'Published ' + book.publicationYear : '';
          const imageSrc = book.coverImage ? escapeHtml(book.coverImage) : '';
          const selectedEditionWrapper = getSelectedEditionWrapper();
          const ratingDisplay = selectedEditionWrapper && selectedEditionWrapper.ratingDisplay ? selectedEditionWrapper.ratingDisplay : '';
          const series = pageState.bookData.series;
          const seriesInfo = series && book.seriesId ? {
            title: series.title,
            id: book.seriesId,
            order: book.seriesOrder
          } : null;

          container.innerHTML = `
            <div class="product-summary-inner product-summary-inner--book">
              ${imageSrc ? `
                <div class="product-summary-cover">
                  <img src="${imageSrc}" alt="Cover of ${escapeHtml(book.title)}" class="product-cover-image" />
                </div>
              ` : ''}
              <h1 id="product-page-title" class="product-title">${escapeHtml(book.title)}</h1>
              ${book.subtitle ? `<p class="product-subtitle">${escapeHtml(book.subtitle)}</p>` : ''}
              <p class="product-meta">
                ${ageLabel ? `<span class="product-meta-item">${escapeHtml(ageLabel)}</span>` : ''}
                ${categoryLabel ? `<span class="product-meta-item">${escapeHtml(categoryLabel)}</span>` : ''}
                ${genreLabel ? `<span class="product-meta-item">${escapeHtml(genreLabel)}</span>` : ''}
                ${yearLabel ? `<span class="product-meta-item">${escapeHtml(yearLabel)}</span>` : ''}
              </p>
              ${ratingDisplay ? `<p class="product-rating-display">${escapeHtml(ratingDisplay)}</p>` : ''}
              ${seriesInfo ? `
                <div class="product-series">
                  <button type="button" class="series-badge" data-action="view-series" data-series-id="${escapeHtml(seriesInfo.id)}">
                    ${seriesInfo.order !== null && seriesInfo.order !== undefined ? `Book ${seriesInfo.order} in ` : ''}${escapeHtml(seriesInfo.title)} series
                  </button>
                </div>
              ` : ''}
            </div>
          `;
          return;
        }

        container.innerHTML = `
          <div class="product-summary-inner">
            <h1 id="product-page-title" class="product-title">Loading story&hellip;</h1>
          </div>
        `;
      }

      function renderEditionSelector(container) {
        if (pageState.productType !== 'book' || !pageState.bookData || !pageState.bookData.editions || !pageState.bookData.editions.length) {
          container.hidden = true;
          container.innerHTML = '';
          return;
        }

        const editions = pageState.bookData.editions;
        const selectedWrapper = getSelectedEditionWrapper();
        container.hidden = false;

        let optionsHtml = '';
        for (let i = 0; i < editions.length; i += 1) {
          const wrapper = editions[i];
          if (!wrapper || !wrapper.edition) continue;
          const edition = wrapper.edition;
          const isSelected = selectedWrapper && selectedWrapper.edition && selectedWrapper.edition.id === edition.id;
          const available = !!edition.isAvailable;
          const availabilityLabel = available ? 'In stock' : 'Out of stock';
          const disabledAttr = available ? '' : ' disabled aria-disabled="true"';
          const selectedAttr = isSelected ? ' aria-pressed="true"' : ' aria-pressed="false"';

          optionsHtml += `
            <button
              type="button"
              class="edition-option${isSelected ? ' edition-option--selected' : ''}${available ? '' : ' edition-option--unavailable'}"
              role="radio"
              data-action="select-edition"
              data-edition-id="${escapeHtml(edition.id)}"
              ${disabledAttr}${selectedAttr}
            >
              <span class="edition-format">${escapeHtml(wrapper.formatLabel || '')}</span>
              ${wrapper.priceDisplay ? `<span class="edition-price">${escapeHtml(wrapper.priceDisplay)}</span>` : ''}
              <span class="edition-availability">${escapeHtml(availabilityLabel)}</span>
              ${wrapper.ratingDisplay ? `<span class="edition-rating">${escapeHtml(wrapper.ratingDisplay)}</span>` : ''}
            </button>
          `;
        }

        container.innerHTML = `
          <div class="edition-selector-inner">
            <h2 class="section-title">Choose an edition</h2>
            <div class="edition-options" role="radiogroup" aria-label="Book format">
              ${optionsHtml}
            </div>
          </div>
        `;
      }

      function renderPurchasePanel(container) {
        if (!pageState.productId) {
          container.innerHTML = '';
          return;
        }

        if (pageState.productType === 'classroom_pack' && pageState.classroomPackData && pageState.classroomPackData.classroomPack) {
          const pack = pageState.classroomPackData.classroomPack;
          const totalPriceDisplay = pageState.classroomPackData.totalPriceDisplay || (pack.totalPrice !== null && pack.totalPrice !== undefined ? '$' + pack.totalPrice : '');
          const copyCount = pack.copyCount !== null && pack.copyCount !== undefined ? pack.copyCount : '';

          const canViewCart = pageState.lastOperation && pageState.lastOperation.type === 'cart' && pageState.lastOperation.result && pageState.lastOperation.result.success;

          container.innerHTML = `
            <div class="purchase-panel-inner card">
              <h2 class="section-title">Add pack to cart</h2>
              <div class="purchase-price-line">
                <span class="purchase-price-label">Pack price</span>
                <span class="purchase-price-value">${escapeHtml(totalPriceDisplay)}</span>
              </div>
              ${copyCount ? `<p class="purchase-note">Includes ${escapeHtml(copyCount)} copies for your classroom.</p>` : ''}
              <div class="purchase-quantity">
                <label for="purchase-quantity-input" class="purchase-quantity-label">Quantity of packs</label>
                <input
                  id="purchase-quantity-input"
                  class="purchase-quantity-input"
                  type="number"
                  min="1"
                  step="1"
                  value="${pageState.quantity}"
                  inputmode="numeric"
                  data-action="change-quantity"
                />
              </div>
              <div class="purchase-actions">
                <button type="button" class="btn btn-primary" data-action="add-to-cart">Add to cart</button>
                ${canViewCart ? `<button type="button" class="btn btn-secondary" data-action="view-cart">View cart</button>` : ''}
              </div>
            </div>
          `;
          return;
        }

        if (pageState.productType === 'book' && pageState.bookData && pageState.bookData.book) {
          const selectedWrapper = getSelectedEditionWrapper();
          let bodyHtml = '';

          if (!selectedWrapper || !selectedWrapper.edition) {
            bodyHtml = `
              <p class="purchase-message">Choose an edition above to see price and availability.</p>
            `;
          } else {
            const edition = selectedWrapper.edition;
            const priceDisplay = selectedWrapper.priceDisplay || (edition.price !== null && edition.price !== undefined ? '$' + edition.price : '');
            const available = !!edition.isAvailable;
            const availabilityLabel = available ? 'In stock' : 'Out of stock';
            const ratingDisplay = selectedWrapper.ratingDisplay || '';
            const canViewCart = pageState.lastOperation && pageState.lastOperation.type === 'cart' && pageState.lastOperation.result && pageState.lastOperation.result.success;

            bodyHtml = `
              <div class="purchase-price-line">
                <span class="purchase-price-label">Price</span>
                <span class="purchase-price-value">${escapeHtml(priceDisplay)}</span>
              </div>
              <p class="purchase-availability">${escapeHtml(availabilityLabel)}</p>
              ${ratingDisplay ? `<p class="purchase-rating">${escapeHtml(ratingDisplay)}</p>` : ''}
              <div class="purchase-quantity">
                <label for="purchase-quantity-input" class="purchase-quantity-label">Quantity</label>
                <input
                  id="purchase-quantity-input"
                  class="purchase-quantity-input"
                  type="number"
                  min="1"
                  step="1"
                  value="${pageState.quantity}"
                  inputmode="numeric"
                  data-action="change-quantity"
                />
              </div>
              <div class="purchase-actions">
                <button type="button" class="btn btn-primary" data-action="add-to-cart"${available ? '' : ' disabled aria-disabled="true"'}>Add to cart</button>
                ${canViewCart ? `<button type="button" class="btn btn-secondary" data-action="view-cart">View cart</button>` : ''}
              </div>
            `;
          }

          container.innerHTML = `
            <div class="purchase-panel-inner card">
              <h2 class="section-title">Add this book to cart</h2>
              ${bodyHtml}
            </div>
          `;
          return;
        }

        container.innerHTML = '';
      }

      function renderWishlistControl(container) {
        if (pageState.productType !== 'book' || !pageState.bookData || !pageState.bookData.book) {
          container.innerHTML = '';
          return;
        }

        const selectedWrapper = getSelectedEditionWrapper();
        const hasEdition = !!(selectedWrapper && selectedWrapper.edition);
        const lastIsWishlist = pageState.lastOperation && pageState.lastOperation.type === 'wishlist';
        const lastResult = lastIsWishlist ? pageState.lastOperation.result : null;
        const hasSuccess = lastResult && lastResult.success;
        const wishlistCount = lastResult && lastResult.wishlistItemCount !== null && lastResult.wishlistItemCount !== undefined ? lastResult.wishlistItemCount : null;

        container.innerHTML = `
          <div class="wishlist-inner">
            <button type="button" class="btn btn-ghost" data-action="add-to-wishlist"${hasEdition ? '' : ' disabled aria-disabled="true"'}>
              Add to wishlist
            </button>
            ${hasSuccess ? `
              <p class="wishlist-message">${escapeHtml(lastResult.message)}${wishlistCount !== null ? ' (' + wishlistCount + ' item' + (wishlistCount === 1 ? '' : 's') + ' in wishlist)' : ''}</p>
              <button type="button" class="btn btn-link" data-action="go-to-wishlist">Go to wishlist</button>
            ` : (lastResult && !lastResult.success ? `<p class="wishlist-message wishlist-message--error">${escapeHtml(lastResult.message)}</p>` : '')}
          </div>
        `;
      }

      function renderDescriptionPanel(container) {
        if (!pageState.productId) {
          container.innerHTML = '';
          return;
        }

        if (pageState.productType === 'classroom_pack' && pageState.classroomPackData && pageState.classroomPackData.classroomPack) {
          const pack = pageState.classroomPackData.classroomPack;
          const gradeLabel = getGradeLabelForPack(pack, pageState.classroomPackData.gradeLevelLabel);
          const copyCount = pack.copyCount !== null && pack.copyCount !== undefined ? pack.copyCount : '';
          const description = pack.description || '';

          container.innerHTML = `
            <div class="product-description-inner">
              <h2 class="section-title">About this classroom pack</h2>
              ${description ? `<p class="product-description-text">${escapeHtml(description)}</p>` : ''}
              <ul class="product-facts-list">
                ${gradeLabel ? `<li class="product-fact-item"><strong>Grade level:</strong> ${escapeHtml(gradeLabel)}</li>` : ''}
                ${copyCount ? `<li class="product-fact-item"><strong>Total copies:</strong> ${escapeHtml(copyCount)}</li>` : ''}
              </ul>
            </div>
          `;
          return;
        }

        if (pageState.productType === 'book' && pageState.bookData && pageState.bookData.book) {
          const book = pageState.bookData.book;
          const description = book.description || '';
          const ageLabel = getAgeLabelFromBook(book);
          const categoryLabel = getCategoryLabel(book.category);
          const genreLabel = getGenreLabel(book.genre);

          container.innerHTML = `
            <div class="product-description-inner">
              <h2 class="section-title">About this book</h2>
              ${description ? `<p class="product-description-text">${escapeHtml(description)}</p>` : ''}
              <ul class="product-facts-list">
                ${ageLabel ? `<li class="product-fact-item"><strong>Recommended ages:</strong> ${escapeHtml(ageLabel)}</li>` : ''}
                ${categoryLabel ? `<li class="product-fact-item"><strong>Category:</strong> ${escapeHtml(categoryLabel)}</li>` : ''}
                ${genreLabel ? `<li class="product-fact-item"><strong>Genre:</strong> ${escapeHtml(genreLabel)}</li>` : ''}
                ${book.publicationYear ? `<li class="product-fact-item"><strong>Publication year:</strong> ${escapeHtml(book.publicationYear)}</li>` : ''}
              </ul>
            </div>
          `;
          return;
        }

        container.innerHTML = '';
      }

      function renderIncludedBooks(container) {
        if (pageState.productType !== 'classroom_pack' || !pageState.classroomPackData || !pageState.classroomPackData.includedBooks || !pageState.classroomPackData.includedBooks.length) {
          container.innerHTML = '';
          return;
        }

        const books = pageState.classroomPackData.includedBooks;
        let itemsHtml = '';
        for (let i = 0; i < books.length; i += 1) {
          const book = books[i];
          if (!book) continue;
          const ageLabel = getAgeLabelFromBook(book) || getAgeLabelFromEnum(book.ageRange);
          const genreLabel = getGenreLabel(book.genre);
          itemsHtml += `
            <li class="included-book-item">
              <div class="included-book-title">${escapeHtml(book.title)}</div>
              <div class="included-book-meta">
                ${ageLabel ? `<span class="included-book-meta-item">${escapeHtml(ageLabel)}</span>` : ''}
                ${genreLabel ? `<span class="included-book-meta-item">${escapeHtml(genreLabel)}</span>` : ''}
              </div>
            </li>
          `;
        }

        container.innerHTML = `
          <div class="included-books-inner">
            <h2 class="section-title">What's included</h2>
            <ul class="included-books-list">
              ${itemsHtml}
            </ul>
          </div>
        `;
      }

      function renderReviewPanel(container) {
        if (pageState.productType !== 'book' || !pageState.bookData || !pageState.bookData.book || !pageState.bookData.isReviewable) {
          container.innerHTML = '';
          return;
        }

        const disabled = !!pageState.reviewForm.isSubmitted;
        const rating = pageState.reviewForm.rating || 0;
        const text = pageState.reviewForm.text || '';
        const lastIsReview = pageState.lastOperation && pageState.lastOperation.type === 'review';
        const lastResult = lastIsReview ? pageState.lastOperation.result : null;

        let starsHtml = '';
        for (let i = 1; i <= 5; i += 1) {
          const isActive = i <= rating;
          starsHtml += `
            <button
              type="button"
              class="review-star${isActive ? ' review-star--active' : ''}"
              data-action="set-review-rating"
              data-rating="${i}"
              aria-label="${i} star${i === 1 ? '' : 's'}"
              ${disabled ? ' disabled aria-disabled="true"' : ''}
            >
              &#9733;
            </button>
          `;
        }

        container.innerHTML = `
          <div class="review-panel-inner card">
            <h2 class="section-title">Write a review</h2>
            <p class="review-intro">Tell other families what you thought about this edition.</p>
            <div class="review-rating-group" aria-label="Star rating">
              ${starsHtml}
            </div>
            <div class="review-text-group">
              <label for="review-text-input" class="review-text-label">Your review</label>
              <textarea
                id="review-text-input"
                class="review-text-input"
                rows="6"
                minlength="30"
                ${disabled ? ' readonly aria-readonly="true"' : ''}
                data-action="review-text"
              >${escapeHtml(text)}</textarea>
              <p class="review-hint">Please share at least a few sentences (30+ characters).</p>
            </div>
            <div class="review-actions">
              <button type="button" class="btn btn-primary" data-action="submit-review"${disabled ? ' disabled aria-disabled="true"' : ''}>Submit review</button>
            </div>
            ${lastResult ? `<p class="review-message${lastResult.success ? ' review-message--success' : ' review-message--error'}">${escapeHtml(lastResult.message)}</p>` : ''}
          </div>
        `;
      }

      function renderAllComponents() {
        const populateElements = document.querySelectorAll('[data-populate]');
        for (let i = 0; i < populateElements.length; i += 1) {
          const el = populateElements[i];
          const type = el.dataset.populate;
          if (type === 'loader') {
            renderLoader(el);
          } else if (type === 'operation-feedback') {
            renderFeedbackBanner(el);
          } else if (type === 'product-summary') {
            renderProductSummary(el);
          } else if (type === 'edition-selector') {
            renderEditionSelector(el);
          } else if (type === 'purchase-panel') {
            renderPurchasePanel(el);
          } else if (type === 'wishlist-control') {
            renderWishlistControl(el);
          } else if (type === 'product-description') {
            renderDescriptionPanel(el);
          } else if (type === 'included-books') {
            renderIncludedBooks(el);
          } else if (type === 'review-form') {
            renderReviewPanel(el);
          }
        }
      }

      function updateUrlEditionParam() {
        const url = new URL(window.location.href);
        const params = url.searchParams;
        if (pageState.selectedEditionId) {
          params.set('editionId', pageState.selectedEditionId);
        } else {
          params.delete('editionId');
        }
        const newUrl = url.pathname + '?' + params.toString();
        window.history.replaceState(null, '', newUrl);
      }

      function handleSelectEdition(editionId) {
        if (!editionId) return;
        pageState.selectedEditionId = editionId;
        pageState.quantity = 1;
        pageState.lastOperation = null;
        pageState.reviewForm.rating = 0;
        pageState.reviewForm.text = '';
        pageState.reviewForm.isSubmitted = false;
        updateUrlEditionParam();
        renderAllComponents();
      }

      function handleChangeQuantity(inputEl) {
        if (!inputEl) return;
        const raw = inputEl.value;
        let value = parseInt(raw, 10);
        if (isNaN(value) || value < 1) {
          value = 1;
        }
        inputEl.value = String(value);
        pageState.quantity = value;
      }

      function handleAddToCart() {
        if (!pageState.productId) {
          pageState.lastOperation = {
            type: 'cart',
            result: { success: false, message: 'No product selected.' }
          };
          renderAllComponents();
          return;
        }

        const quantity = pageState.quantity && pageState.quantity > 0 ? pageState.quantity : 1;
        let result = null;

        try {
          if (pageState.productType === 'classroom_pack') {
            if (!pageState.classroomPackData || !pageState.classroomPackData.classroomPack) {
              pageState.lastOperation = {
                type: 'cart',
                result: { success: false, message: 'Classroom pack details not available.' }
              };
              renderAllComponents();
              return;
            }
            result = WebsiteSDK.addClassroomPackToCart(pageState.classroomPackData.classroomPack.id, quantity);
          } else {
            if (!pageState.bookData || !pageState.bookData.book) {
              pageState.lastOperation = {
                type: 'cart',
                result: { success: false, message: 'Book details not available.' }
              };
              renderAllComponents();
              return;
            }
            const selectedWrapper = getSelectedEditionWrapper();
            if (!selectedWrapper || !selectedWrapper.edition) {
              pageState.lastOperation = {
                type: 'cart',
                result: { success: false, message: 'Please choose an edition first.' }
              };
              renderAllComponents();
              return;
            }
            if (!selectedWrapper.edition.isAvailable) {
              pageState.lastOperation = {
                type: 'cart',
                result: { success: false, message: 'This edition is currently unavailable.' }
              };
              renderAllComponents();
              return;
            }
            result = WebsiteSDK.addBookEditionToCart(selectedWrapper.edition.id, quantity);
          }
        } catch (e) {
          result = { success: false, message: 'We could not add this item to your cart. Please try again.' };
        }

        pageState.lastOperation = {
          type: 'cart',
          result: result
        };
        renderAllComponents();
      }

      function handleAddToWishlist() {
        if (pageState.productType !== 'book') {
          return;
        }
        if (!pageState.bookData || !pageState.bookData.book) {
          pageState.lastOperation = {
            type: 'wishlist',
            result: { success: false, message: 'Book details not available.' }
          };
          renderAllComponents();
          return;
        }
        const selectedWrapper = getSelectedEditionWrapper();
        if (!selectedWrapper || !selectedWrapper.edition) {
          pageState.lastOperation = {
            type: 'wishlist',
            result: { success: false, message: 'Please choose an edition to add to your wishlist.' }
          };
          renderAllComponents();
          return;
        }
        let result;
        try {
          result = WebsiteSDK.addBookEditionToWishlist(selectedWrapper.edition.id);
        } catch (e) {
          result = { success: false, message: 'We could not add this book to your wishlist. Please try again.' };
        }
        pageState.lastOperation = {
          type: 'wishlist',
          result: result
        };
        renderAllComponents();
      }

      function handleSubmitReview() {
        if (pageState.productType !== 'book' || !pageState.bookData || !pageState.bookData.isReviewable) {
          return;
        }
        const selectedWrapper = getSelectedEditionWrapper();
        if (!selectedWrapper || !selectedWrapper.edition) {
          pageState.lastOperation = {
            type: 'review',
            result: { success: false, message: 'Please choose an edition to review.' }
          };
          renderAllComponents();
          return;
        }

        const rating = pageState.reviewForm.rating || 0;
        const text = pageState.reviewForm.text ? pageState.reviewForm.text.trim() : '';
        if (rating < 1 || rating > 5) {
          pageState.lastOperation = {
            type: 'review',
            result: { success: false, message: 'Please choose a star rating for your review.' }
          };
          renderAllComponents();
          return;
        }
        if (!text || text.length < 30) {
          pageState.lastOperation = {
            type: 'review',
            result: { success: false, message: 'Please write at least a few sentences (30+ characters).' }
          };
          renderAllComponents();
          return;
        }

        let result;
        try {
          result = WebsiteSDK.submitReview(selectedWrapper.edition.id, rating, text);
        } catch (e) {
          result = { success: false, message: 'We could not submit your review. Please try again.' };
        }

        pageState.lastOperation = {
          type: 'review',
          result: result
        };
        if (result && result.success) {
          pageState.reviewForm.isSubmitted = true;
        }
        renderAllComponents();
      }

      function focusReviewSectionIfRequested() {
        if (!pageState.autoFocusReview) return;
        if (pageState.productType !== 'book' || !pageState.bookData || !pageState.bookData.isReviewable) return;
        const reviewSection = document.getElementById('review-section');
        if (!reviewSection) return;
        try {
          reviewSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (e) {
          // fallback: do nothing
        }
        const star = reviewSection.querySelector('[data-action="set-review-rating"]');
        if (star && typeof star.focus === 'function') {
          star.focus();
        }
      }

      function loadProductDetails() {
        if (!pageState.productId) {
          renderAllComponents();
          return;
        }

        pageState.isLoading = true;
        renderAllComponents();

        try {
          if (pageState.productType === 'classroom_pack') {
            const detail = WebsiteSDK.getClassroomPackDetail(pageState.productId);
            pageState.classroomPackData = detail || null;
            pageState.quantity = 1;
          } else {
            const detail = WebsiteSDK.getBookProductDetail(pageState.productId);
            pageState.bookData = detail || null;

            if (pageState.bookData && pageState.bookData.editions && pageState.bookData.editions.length) {
              let selectedId = null;
              const editions = pageState.bookData.editions;
              if (pageState.initialEditionIdParam) {
                for (let i = 0; i < editions.length; i += 1) {
                  const wrapper = editions[i];
                  if (wrapper && wrapper.edition && wrapper.edition.id === pageState.initialEditionIdParam) {
                    selectedId = wrapper.edition.id;
                    break;
                  }
                }
              }
              if (!selectedId) {
                for (let i = 0; i < editions.length; i += 1) {
                  const wrapper = editions[i];
                  if (wrapper && wrapper.isDefault) {
                    selectedId = wrapper.edition.id;
                    break;
                  }
                }
              }
              if (!selectedId) {
                selectedId = editions[0].edition.id;
              }
              pageState.selectedEditionId = selectedId;

              if (pageState.initialEditionIdParam) {
                try {
                  const editionDetail = WebsiteSDK.getBookEditionDetail(pageState.initialEditionIdParam);
                  if (editionDetail && editionDetail.edition && editionDetail.edition.id) {
                    for (let i = 0; i < editions.length; i += 1) {
                      const wrapper = editions[i];
                      if (wrapper && wrapper.edition && wrapper.edition.id === editionDetail.edition.id) {
                        if (editionDetail.priceDisplay) {
                          wrapper.priceDisplay = editionDetail.priceDisplay;
                        }
                        if (editionDetail.ratingDisplay) {
                          wrapper.ratingDisplay = editionDetail.ratingDisplay;
                        }
                        break;
                      }
                    }
                  }
                } catch (e) {
                  // If enrichment fails, continue with base data
                }
              }
            }

            pageState.quantity = 1;
            updateUrlEditionParam();
          }
        } catch (e) {
          pageState.lastOperation = {
            type: 'load',
            result: { success: false, message: 'We had trouble loading this page. Please refresh or try again later.' }
          };
        }

        pageState.isLoading = false;
        renderAllComponents();
        focusReviewSectionIfRequested();
      }

      let handlersAttached = false;
      function attachGlobalHandlers() {
        if (handlersAttached) return;
        handlersAttached = true;

        const main = document.getElementById('content');
        if (!main) return;

        main.addEventListener('click', function(event) {
          const target = event.target.closest('[data-action]');
          if (!target) return;

          const action = target.dataset.action;
          if (!action) return;

          if (action === 'select-edition') {
            event.preventDefault();
            const editionId = target.dataset.editionId;
            handleSelectEdition(editionId);
          } else if (action === 'add-to-cart') {
            event.preventDefault();
            handleAddToCart();
          } else if (action === 'view-cart') {
            event.preventDefault();
            if (pageState.lastOperation && pageState.lastOperation.type === 'cart' && pageState.lastOperation.result && pageState.lastOperation.result.success) {
              window.location.href = 'cart.html';
            }
          } else if (action === 'add-to-wishlist') {
            event.preventDefault();
            handleAddToWishlist();
          } else if (action === 'go-to-wishlist') {
            event.preventDefault();
            window.location.href = 'wishlist.html';
          } else if (action === 'view-series') {
            event.preventDefault();
            const seriesId = target.dataset.seriesId;
            if (seriesId) {
              window.location.href = 'series_detail.html?id=' + encodeURIComponent(seriesId);
            }
          } else if (action === 'set-review-rating') {
            event.preventDefault();
            const ratingValue = parseInt(target.dataset.rating, 10);
            if (!isNaN(ratingValue)) {
              pageState.reviewForm.rating = ratingValue;
              pageState.lastOperation = pageState.lastOperation && pageState.lastOperation.type === 'review' && pageState.lastOperation.result && pageState.lastOperation.result.success ? pageState.lastOperation : null;
              renderAllComponents();
            }
          } else if (action === 'submit-review') {
            event.preventDefault();
            handleSubmitReview();
          } else if (action === 'dismiss-feedback') {
            event.preventDefault();
            pageState.lastOperation = null;
            renderAllComponents();
          }
        });

        main.addEventListener('input', function(event) {
          const target = event.target;
          if (!target || !target.dataset) return;
          const action = target.dataset.action;
          if (action === 'change-quantity') {
            handleChangeQuantity(target);
          } else if (action === 'review-text') {
            const value = target.value || '';
            pageState.reviewForm.text = value;
          }
        });
      }

      document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const typeParam = urlParams.get('type');
        const idParam = urlParams.get('id');
        const editionIdParam = urlParams.get('editionId');

        pageState.productType = typeParam === 'classroom_pack' ? 'classroom_pack' : 'book';
        pageState.productId = idParam;
        pageState.initialEditionIdParam = editionIdParam;
        pageState.autoFocusReview = !!editionIdParam;

        attachGlobalHandlers();
        loadProductDetails();
      });
    })();
  </script>
</body>
</html>
