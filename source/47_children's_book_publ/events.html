  <script src='business_logic.js'></script>
  <script type='text/javascript'>
    'use strict';

    document.addEventListener('DOMContentLoaded', function () {
      if (typeof WebsiteSDK === 'undefined') {
        console.error('WebsiteSDK is not available.');
        return;
      }

      var state = {
        filterOptions: { ageRanges: [], eventTypes: [], costTypes: [] },
        filters: {},
        events: []
      };

      try {
        state.filterOptions = WebsiteSDK.getEventFilterOptions() || { ageRanges: [], eventTypes: [], costTypes: [] };
      } catch (e) {
        console.error('Error calling getEventFilterOptions:', e);
      }

      state.filters = parseFiltersFromUrl(state.filterOptions);
      updateUrlFromFilters(state.filters, true);
      renderAndLoad();

      window.addEventListener('popstate', function () {
        state.filters = parseFiltersFromUrl(state.filterOptions);
        renderAndLoad();
      });

      function parseFiltersFromUrl(filterOptions) {
        var filters = {};
        var url = new URL(window.location.href);
        var params = url.searchParams;

        var ageParam = params.get('ageRange');
        var eventTypeParam = params.get('eventType');
        var costTypeParam = params.get('costType');
        var startDateParam = params.get('startDate');
        var endDateParam = params.get('endDate');

        if (ageParam && Array.isArray(filterOptions.ageRanges) && filterOptions.ageRanges.some(function (o) { return o.value === ageParam; })) {
          filters.ageRange = ageParam;
        }
        if (eventTypeParam && Array.isArray(filterOptions.eventTypes) && filterOptions.eventTypes.some(function (o) { return o.value === eventTypeParam; })) {
          filters.eventType = eventTypeParam;
        }
        if (costTypeParam && Array.isArray(filterOptions.costTypes) && filterOptions.costTypes.some(function (o) { return o.value === costTypeParam; })) {
          filters.costType = costTypeParam;
        }
        if (startDateParam && isValidDateParam(startDateParam)) {
          filters.startDate = startDateParam;
        }
        if (endDateParam && isValidDateParam(endDateParam)) {
          filters.endDate = endDateParam;
        }
        return filters;
      }

      function isValidDateParam(value) {
        return /^\d{4}-\d{2}-\d{2}$/.test(value);
      }

      function buildFiltersForSDK(filters) {
        var out = {};
        if (filters.ageRange) {
          out.ageRange = filters.ageRange;
        }
        if (filters.eventType) {
          out.eventType = filters.eventType;
        }
        if (filters.costType) {
          out.costType = filters.costType;
        }
        if (filters.startDate) {
          out.startDate = filters.startDate;
        }
        if (filters.endDate) {
          out.endDate = filters.endDate;
        }
        return out;
      }

      function updateUrlFromFilters(filters, replace) {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        ['ageRange', 'eventType', 'costType', 'startDate', 'endDate'].forEach(function (key) {
          params.delete(key);
        });
        Object.keys(filters).forEach(function (key) {
          var value = filters[key];
          if (value) {
            params.set(key, value);
          }
        });
        var newUrl = url.pathname + (params.toString() ? '?' + params.toString() : '') + url.hash;
        if (replace) {
          window.history.replaceState(null, '', newUrl);
        } else {
          window.history.pushState(null, '', newUrl);
        }
      }

      function escapeHtml(str) {
        if (str === null || str === undefined) {
          return '';
        }
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function optionArrayToMap(array) {
        var map = {};
        if (Array.isArray(array)) {
          array.forEach(function (opt) {
            if (opt && typeof opt.value === 'string') {
              map[opt.value] = opt.label || opt.value;
            }
          });
        }
        return map;
      }

      function formatEventDateTime(isoString) {
        if (!isoString) {
          return '';
        }
        try {
          var date = new Date(isoString);
          if (isNaN(date.getTime())) {
            return isoString;
          }
          return date.toLocaleString(undefined, {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: 'numeric',
            minute: '2-digit'
          });
        } catch (e) {
          return isoString;
        }
      }

      function formatDateForSummary(isoString) {
        if (!isoString) {
          return '';
        }
        try {
          var date = new Date(isoString);
          if (isNaN(date.getTime())) {
            return isoString;
          }
          return date.toLocaleDateString(undefined, {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          });
        } catch (e) {
          return isoString;
        }
      }

      function describeFilters(filters, filterOptions) {
        var parts = [];
        var ageMap = optionArrayToMap(filterOptions.ageRanges);
        var typeMap = optionArrayToMap(filterOptions.eventTypes);
        var costMap = optionArrayToMap(filterOptions.costTypes);

        if (filters.ageRange && ageMap[filters.ageRange]) {
          parts.push(ageMap[filters.ageRange]);
        }
        if (filters.eventType && typeMap[filters.eventType]) {
          parts.push(typeMap[filters.eventType]);
        }
        if (filters.costType && costMap[filters.costType]) {
          parts.push(costMap[filters.costType]);
        }
        if (filters.startDate || filters.endDate) {
          var rangeText = '';
          if (filters.startDate && filters.endDate) {
            rangeText = formatDateForSummary(filters.startDate) + ' bbb ' + formatDateForSummary(filters.endDate);
          } else if (filters.startDate) {
            rangeText = 'From ' + formatDateForSummary(filters.startDate);
          } else if (filters.endDate) {
            rangeText = 'Until ' + formatDateForSummary(filters.endDate);
          }
          if (rangeText) {
            parts.push(rangeText);
          }
        }
        if (!parts.length) {
          return 'All upcoming events';
        }
        return 'Filtered by ' + parts.join(' bbb ');
      }

      function renderSummaryHeader(container, events, filters, filterOptions) {
        var total = Array.isArray(events) ? events.length : 0;
        var summaryText = describeFilters(filters, filterOptions);
        var countLabel = total === 1 ? '1 event' : total + ' events';
        container.innerHTML = '';
        container.innerHTML = `
          <div class='events-summary card-surface'>
            <h2 class='events-summary-title'>Upcoming events</h2>
            <p class='events-summary-count'>${escapeHtml(countLabel)}</p>
            <p class='events-summary-filters'>${escapeHtml(summaryText)}</p>
          </div>
        `;
      }

      function renderFilterBar(container, filterOptions, filters) {
        var ageOptions = "<option value=''>All ages</option>";
        if (Array.isArray(filterOptions.ageRanges)) {
          filterOptions.ageRanges.forEach(function (opt) {
            if (!opt || typeof opt.value !== 'string') {
              return;
            }
            var selected = filters.ageRange === opt.value ? ' selected' : '';
            ageOptions += "<option value='" + escapeHtml(opt.value) + "'" + selected + ">" + escapeHtml(opt.label || opt.value) + "</option>";
          });
        }

        var typeOptions = "<option value=''>All types</option>";
        if (Array.isArray(filterOptions.eventTypes)) {
          filterOptions.eventTypes.forEach(function (opt) {
            if (!opt || typeof opt.value !== 'string') {
              return;
            }
            var selected = filters.eventType === opt.value ? ' selected' : '';
            typeOptions += "<option value='" + escapeHtml(opt.value) + "'" + selected + ">" + escapeHtml(opt.label || opt.value) + "</option>";
          });
        }

        var costOptions = "<option value=''>All costs</option>";
        if (Array.isArray(filterOptions.costTypes)) {
          filterOptions.costTypes.forEach(function (opt) {
            if (!opt || typeof opt.value !== 'string') {
              return;
            }
            var selected = filters.costType === opt.value ? ' selected' : '';
            costOptions += "<option value='" + escapeHtml(opt.value) + "'" + selected + ">" + escapeHtml(opt.label || opt.value) + "</option>";
          });
        }

        var startDateValue = filters.startDate ? escapeHtml(filters.startDate) : '';
        var endDateValue = filters.endDate ? escapeHtml(filters.endDate) : '';

        container.innerHTML = '';
        container.innerHTML = `
          <form class='events-filter-bar card-surface' data-action='filters-form' novalidate>
            <div class='events-filter-group'>
              <label for='filter-ageRange' class='events-filter-label'>Age range</label>
              <select id='filter-ageRange' name='ageRange' class='events-filter-control' data-action='filter-ageRange'>
                ${ageOptions}
              </select>
            </div>
            <div class='events-filter-group'>
              <label for='filter-eventType' class='events-filter-label'>Event type</label>
              <select id='filter-eventType' name='eventType' class='events-filter-control' data-action='filter-eventType'>
                ${typeOptions}
              </select>
            </div>
            <div class='events-filter-group'>
              <label for='filter-costType' class='events-filter-label'>Cost</label>
              <select id='filter-costType' name='costType' class='events-filter-control' data-action='filter-costType'>
                ${costOptions}
              </select>
            </div>
            <div class='events-filter-group events-filter-group--dates'>
              <span class='events-filter-label'>Date range</span>
              <div class='events-filter-dates-row'>
                <div class='events-filter-date-field'>
                  <label for='filter-startDate' class='visually-hidden'>Start date</label>
                  <input id='filter-startDate' name='startDate' type='date' class='events-filter-control' data-action='filter-startDate' value='${startDateValue}' />
                </div>
                <span class='events-filter-date-separator'>to</span>
                <div class='events-filter-date-field'>
                  <label for='filter-endDate' class='visually-hidden'>End date</label>
                  <input id='filter-endDate' name='endDate' type='date' class='events-filter-control' data-action='filter-endDate' value='${endDateValue}' />
                </div>
              </div>
            </div>
            <div class='events-filter-actions'>
              <button type='button' class='btn-secondary' data-action='filters-reset'>Clear filters</button>
            </div>
          </form>
        `;
      }

      function renderEventsList(container, events, filterOptions) {
        container.innerHTML = '';
        if (!Array.isArray(events) || !events.length) {
          return;
        }

        var ageMap = optionArrayToMap(filterOptions.ageRanges);
        var typeMap = optionArrayToMap(filterOptions.eventTypes);
        var costMap = optionArrayToMap(filterOptions.costTypes);

        var itemsHtml = '';
        events.forEach(function (event) {
          if (!event || typeof event.id !== 'string') {
            return;
          }
          var dateText = formatEventDateTime(event.startDate);
          var ageLabel = ageMap[event.ageRange] || event.ageRange || '';
          var typeLabel = typeMap[event.eventType] || event.eventType || '';
          var location = event.location || (event.eventType === 'virtual' ? 'Online' : 'TBA');

          var costLabel = '';
          if (event.costType === 'free' || event.price === 0) {
            costLabel = 'Free';
          } else if (typeof event.price === 'number') {
            costLabel = '$' + event.price.toFixed(2);
          } else if (costMap[event.costType]) {
            costLabel = costMap[event.costType];
          }

          var registrationText = event.registrationRequired ? 'Registration required' : 'Drop-in welcome';

          itemsHtml += `
            <article class='event-card' data-action='view-event-detail' data-event-id='${escapeHtml(event.id)}' role='button' tabindex='0'>
              <header class='event-card-header'>
                <h3 class='event-card-title'>${escapeHtml(event.title || '')}</h3>
              </header>
              <div class='event-card-body'>
                <p class='event-card-meta'><span class='event-card-meta-label'>When:</span> ${escapeHtml(dateText)}</p>
                <p class='event-card-meta'><span class='event-card-meta-label'>Ages:</span> ${escapeHtml(ageLabel)}</p>
                <p class='event-card-meta'><span class='event-card-meta-label'>Location:</span> ${escapeHtml(location)}</p>
                <p class='event-card-meta'><span class='event-card-meta-label'>Cost:</span> ${escapeHtml(costLabel)}</p>
                <p class='event-card-meta event-card-meta--registration'>${escapeHtml(registrationText)}</p>
              </div>
              <footer class='event-card-footer'>
                <button type='button' class='btn-primary event-card-btn' data-action='quick-view-event' data-event-id='${escapeHtml(event.id)}'>Quick view</button>
                <button type='button' class='btn-ghost event-card-link' data-action='view-event-detail' data-event-id='${escapeHtml(event.id)}'>View details</button>
              </footer>
            </article>
          `;
        });

        container.innerHTML = `
          <div class='events-list' role='list'>
            ${itemsHtml}
          </div>
        `;
      }

      function renderEmptyState(container, events, filters) {
        container.innerHTML = '';
        var hasEvents = Array.isArray(events) && events.length > 0;
        if (hasEvents) {
          return;
        }
        var summaryText = describeFilters(filters, state.filterOptions);
        container.innerHTML = `
          <div class='events-empty card-surface'>
            <div class='events-empty-illustration' aria-hidden='true'></div>
            <h2 class='events-empty-title'>No events match these filters</h2>
            <p class='events-empty-text'>We couldn't find any upcoming events for this combination. Try adjusting your filters or clearing them to see all events.</p>
            <p class='events-empty-summary'>Current view: ${escapeHtml(summaryText)}</p>
            <div class='events-empty-actions'>
              <button type='button' class='btn-primary' data-action='filters-reset'>Clear all filters</button>
            </div>
          </div>
        `;
      }

      function renderPreviewPanel(container, eventDetail) {
        if (!eventDetail) {
          container.innerHTML = '';
          container.setAttribute('aria-hidden', 'true');
          container.setAttribute('hidden', '');
          return;
        }

        var ageMap = optionArrayToMap(state.filterOptions.ageRanges);
        var typeMap = optionArrayToMap(state.filterOptions.eventTypes);
        var costMap = optionArrayToMap(state.filterOptions.costTypes);

        var dateText = formatEventDateTime(eventDetail.startDate);
        var endDateText = eventDetail.endDate ? formatEventDateTime(eventDetail.endDate) : '';
        var ageLabel = ageMap[eventDetail.ageRange] || eventDetail.ageRange || '';
        var typeLabel = typeMap[eventDetail.eventType] || eventDetail.eventType || '';
        var location = eventDetail.location || (eventDetail.eventType === 'virtual' ? 'Online' : 'TBA');

        var costLabel = '';
        if (eventDetail.costType === 'free' || eventDetail.price === 0) {
          costLabel = 'Free';
        } else if (typeof eventDetail.price === 'number') {
          costLabel = '$' + eventDetail.price.toFixed(2);
        } else if (costMap[eventDetail.costType]) {
          costLabel = costMap[eventDetail.costType];
        }

        var registrationText = eventDetail.registrationRequired ? 'Registration required' : 'Drop-in welcome';

        var description = eventDetail.description || '';

        container.innerHTML = '';
        container.innerHTML = `
          <div class='event-preview-overlay' data-action='close-preview'></div>
          <div class='event-preview-dialog card-surface' role='document'>
            <button type='button' class='event-preview-close' aria-label='Close event preview' data-action='close-preview'>&times;</button>
            <h2 class='event-preview-title'>${escapeHtml(eventDetail.title || '')}</h2>
            <div class='event-preview-meta'>
              <p><span class='event-card-meta-label'>When:</span> ${escapeHtml(dateText)}${endDateText ? ' bbb ' + escapeHtml(endDateText) : ''}</p>
              <p><span class='event-card-meta-label'>Ages:</span> ${escapeHtml(ageLabel)}</p>
              <p><span class='event-card-meta-label'>Type:</span> ${escapeHtml(typeLabel)}</p>
              <p><span class='event-card-meta-label'>Location:</span> ${escapeHtml(location)}</p>
              <p><span class='event-card-meta-label'>Cost:</span> ${escapeHtml(costLabel)}</p>
              <p class='event-card-meta--registration'>${escapeHtml(registrationText)}</p>
            </div>
            ${description ? `<div class='event-preview-description'><p>${escapeHtml(description)}</p></div>` : ''}
            <div class='event-preview-actions'>
              <button type='button' class='btn-primary' data-action='view-event-detail' data-event-id='${escapeHtml(eventDetail.id)}'>Go to event page</button>
              <button type='button' class='btn-ghost' data-action='close-preview'>Close</button>
            </div>
          </div>
        `;

        container.removeAttribute('hidden');
        container.setAttribute('aria-hidden', 'false');
      }

      function closePreviewPanel() {
        var container = document.querySelector('[data-component="event-preview-panel"]');
        if (!container) {
          return;
        }
        container.innerHTML = '';
        container.setAttribute('aria-hidden', 'true');
        container.setAttribute('hidden', '');
      }

      function renderAndLoad() {
        var filtersForSDK = buildFiltersForSDK(state.filters);
        var events = [];
        try {
          events = WebsiteSDK.listEvents(filtersForSDK) || [];
        } catch (e) {
          console.error('Error calling listEvents:', e);
          events = [];
        }
        state.events = events;

        var summaryContainer = document.querySelector('[data-populate="events-summary-header"]');
        if (summaryContainer) {
          renderSummaryHeader(summaryContainer, state.events, state.filters, state.filterOptions);
        }

        var filterBarContainer = document.querySelector('[data-populate="events-filter-bar"]');
        if (filterBarContainer) {
          renderFilterBar(filterBarContainer, state.filterOptions, state.filters);
        }

        var listContainer = document.querySelector('[data-populate="events-list"]');
        var emptyStateContainer = document.querySelector('[data-populate="events-empty-state"]');

        var hasEvents = Array.isArray(state.events) && state.events.length > 0;

        if (listContainer) {
          listContainer.hidden = !hasEvents;
          if (hasEvents) {
            renderEventsList(listContainer, state.events, state.filterOptions);
          } else {
            listContainer.innerHTML = '';
          }
        }

        if (emptyStateContainer) {
          emptyStateContainer.hidden = hasEvents;
          if (!hasEvents) {
            renderEmptyState(emptyStateContainer, state.events, state.filters);
          } else {
            emptyStateContainer.innerHTML = '';
          }
        }

        bindActions(document);
      }

      function bindActions(root) {
        var elements = root.querySelectorAll('[data-action]');
        elements.forEach(function (el) {
          var action = el.getAttribute('data-action');
          if (!action) {
            return;
          }

          if (action === 'filter-ageRange' && !el._eventsBound) {
            el.addEventListener('change', function () {
              var value = el.value || '';
              if (value) {
                state.filters.ageRange = value;
              } else {
                delete state.filters.ageRange;
              }
              updateUrlFromFilters(state.filters, false);
              renderAndLoad();
            });
            el._eventsBound = true;
          }

          if (action === 'filter-eventType' && !el._eventsBound) {
            el.addEventListener('change', function () {
              var value = el.value || '';
              if (value) {
                state.filters.eventType = value;
              } else {
                delete state.filters.eventType;
              }
              updateUrlFromFilters(state.filters, false);
              renderAndLoad();
            });
            el._eventsBound = true;
          }

          if (action === 'filter-costType' && !el._eventsBound) {
            el.addEventListener('change', function () {
              var value = el.value || '';
              if (value) {
                state.filters.costType = value;
              } else {
                delete state.filters.costType;
              }
              updateUrlFromFilters(state.filters, false);
              renderAndLoad();
            });
            el._eventsBound = true;
          }

          if (action === 'filter-startDate' && !el._eventsBound) {
            el.addEventListener('change', function () {
              var value = el.value || '';
              if (value && isValidDateParam(value)) {
                state.filters.startDate = value;
              } else {
                delete state.filters.startDate;
              }
              updateUrlFromFilters(state.filters, false);
              renderAndLoad();
            });
            el._eventsBound = true;
          }

          if (action === 'filter-endDate' && !el._eventsBound) {
            el.addEventListener('change', function () {
              var value = el.value || '';
              if (value && isValidDateParam(value)) {
                state.filters.endDate = value;
              } else {
                delete state.filters.endDate;
              }
              updateUrlFromFilters(state.filters, false);
              renderAndLoad();
            });
            el._eventsBound = true;
          }

          if (action === 'filters-reset' && !el._eventsBound) {
            el.addEventListener('click', function (evt) {
              evt.preventDefault();
              state.filters = {};
              updateUrlFromFilters(state.filters, false);
              renderAndLoad();
            });
            el._eventsBound = true;
          }

          if (action === 'view-event-detail' && !el._eventsBound) {
            el.addEventListener('click', function (evt) {
              evt.stopPropagation();
              var eventId = el.getAttribute('data-event-id');
              if (!eventId) {
                return;
              }
              window.location.href = 'event_detail.html?id=' + encodeURIComponent(eventId);
            });
            el._eventsBound = true;
          }

          if (action === 'quick-view-event' && !el._eventsBound) {
            el.addEventListener('click', function (evt) {
              evt.stopPropagation();
              var eventId = el.getAttribute('data-event-id');
              if (!eventId) {
                return;
              }
              openPreview(eventId);
            });
            el._eventsBound = true;
          }

          if (action === 'close-preview' && !el._eventsBound) {
            el.addEventListener('click', function (evt) {
              evt.preventDefault();
              closePreviewPanel();
            });
            el._eventsBound = true;
          }
        });
      }

      function openPreview(eventId) {
        var container = document.querySelector('[data-component="event-preview-panel"]');
        if (!container) {
          return;
        }
        var detail = null;
        try {
          detail = WebsiteSDK.getEventDetail(eventId);
        } catch (e) {
          console.error('Error calling getEventDetail:', e);
          detail = null;
        }
        if (!detail) {
          container.innerHTML = '';
          container.setAttribute('aria-hidden', 'true');
          container.setAttribute('hidden', '');
          return;
        }
        renderPreviewPanel(container, detail);
        bindActions(container);
      }
    });
  </script>
</body>
</html>
