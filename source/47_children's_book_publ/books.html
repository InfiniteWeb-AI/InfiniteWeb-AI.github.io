<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bridges & Tales Publishing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&amp;family=Source+Sans+3:wght@400;500;600&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="books.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header" role="banner">
      <div class="header-inner">
        <a href="index.html" class="brand" aria-label="Bridges and Tales Publishing Home">
          <img src="assets/logo-bridges-tales.svg" alt="Bridges & Tales Publishing" class="brand-logo" />
        </a>
        <nav class="main-nav" aria-label="Primary navigation">
          <ul class="main-nav-list">
            <li class="main-nav-item">
              <a href="index.html" class="main-nav-link">Home</a>
            </li>
            <li class="main-nav-item">
              <a href="books.html" class="main-nav-link">Books</a>
            </li>
            <li class="main-nav-item">
              <a href="series_list.html" class="main-nav-link">Series</a>
            </li>
            <li class="main-nav-item">
              <a href="teachers.html" class="main-nav-link">Teachers &amp; Schools</a>
            </li>
            <li class="main-nav-item">
              <a href="events.html" class="main-nav-link">Events</a>
            </li>
            <li class="main-nav-item">
              <a href="wishlist.html" class="main-nav-link">Wishlist</a>
            </li>
            <li class="main-nav-item">
              <a href="account.html" class="main-nav-link">My Account</a>
            </li>
            <li class="main-nav-item">
              <a href="signup.html" class="main-nav-link">Sign Up</a>
            </li>
            <li class="main-nav-item">
              <a href="cart.html" class="main-nav-link">Cart</a>
            </li>
          </ul>
        </nav>
      </div>
      <div class="header-divider" aria-hidden="true"></div>
    </header>

    <main id="content" class="site-main" role="main" tabindex="-1">
      <section class="books-page" data-component="books-page-controller">
        <header class="books-page-header">
          <h1 class="books-page-title">Books</h1>
        </header>

        <section class="books-search-header" data-component="search-header-form">
          <form class="books-search-form" data-action="search-submit">
            <label for="booksSearchInput" class="visually-hidden">Search books</label>
            <div class="books-search-input-wrapper">
              <input
                id="booksSearchInput"
                name="query"
                type="search"
                class="books-search-input"
                placeholder="Search for bedtime stories, dragons, space adventures..."
                autocomplete="off"
                data-action="search-input"
              />
              <button
                type="button"
                class="books-search-clear"
                data-action="search-clear"
                aria-label="Clear search"
                hidden
              >
                &times;
              </button>
              <button type="submit" class="btn btn-primary books-search-button">Search</button>
            </div>
          </form>
        </section>

        <section class="books-filter-panel" data-component="filter-sidebar">
          <button
            type="button"
            class="filter-panel-toggle"
            data-action="toggle-filters"
            aria-expanded="true"
            aria-controls="booksFilterContent"
          >
            Filter books
            <span class="filter-panel-toggle-icon" aria-hidden="true"></span>
          </button>
          <div
            id="booksFilterContent"
            class="filter-panel-content"
            data-populate="filter-options"
          ></div>
        </section>

        <section class="books-applied-filters" data-component="applied-filters-bar">
          <div class="applied-filters-inner" data-populate="applied-filters"></div>
        </section>

        <section class="books-sort-summary-row">
          <div
            class="results-summary"
            data-component="results-summary"
            data-populate="results-summary"
          ></div>
          <div
            class="sort-controls"
            data-component="sort-controls"
            data-populate="sort-options"
          ></div>
        </section>

        <section class="books-results-area">
          <section
            class="books-empty-state"
            data-component="empty-state-message"
            data-populate="empty-state"
            hidden
          ></section>

          <section
            class="books-results-grid"
            data-component="book-results-grid"
            data-populate="results-grid"
            aria-live="polite"
          ></section>
        </section>

        <nav
          class="books-pagination"
          aria-label="Books pagination"
          data-component="pagination-controls"
          data-populate="pagination"
        ></nav>
      </section>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="footer-divider" aria-hidden="true"></div>
      <div class="footer-inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-links">
            <li class="footer-link-item">
              <a href="about.html" class="footer-link">About</a>
            </li>
            <li class="footer-link-item">
              <a href="teachers.html" class="footer-link">Teachers &amp; Schools</a>
            </li>
            <li class="footer-link-item">
              <a href="classroom_packs.html?grade=all_grades" class="footer-link">Classroom Packs</a>
            </li>
            <li class="footer-link-item">
              <a href="resources.html?resource_type=reading_guides" class="footer-link">Free Resources</a>
            </li>
            <li class="footer-link-item">
              <a href="events.html" class="footer-link">Events</a>
            </li>
            <li class="footer-link-item">
              <a href="newsletter.html" class="footer-link">Newsletter Signup</a>
            </li>
          </ul>
        </nav>
        <p class="footer-meta">&copy; <span class="footer-year">2026</span> Bridges &amp; Tales Publishing. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      var DEFAULT_PAGE_SIZE = 20;
      var filterOptions = null;
      var lastSearchResult = null;

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function parseNumberParam(params, key) {
        var raw = params.get(key);
        if (!raw) {
          return undefined;
        }
        var num = Number(raw);
        if (Number.isNaN(num)) {
          return undefined;
        }
        return num;
      }

      function parseStateFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return {
          query: params.get('query') || '',
          category: params.get('category') || '',
          ageRange: params.get('ageRange') || '',
          format: params.get('format') || '',
          genre: params.get('genre') || '',
          priceMax: parseNumberParam(params, 'priceMax'),
          ratingMin: parseNumberParam(params, 'ratingMin'),
          sort: params.get('sort') || '',
          page: parseNumberParam(params, 'page') || 1
        };
      }

      function buildFiltersFromState(state) {
        var filters = {};
        if (state.ageRange) {
          filters.ageRanges = [state.ageRange];
        }
        if (state.category) {
          filters.category = state.category;
        }
        if (state.genre) {
          filters.genre = state.genre;
        }
        if (state.format) {
          filters.format = state.format;
        }
        if (typeof state.ratingMin === 'number' && !Number.isNaN(state.ratingMin)) {
          filters.minRating = state.ratingMin;
        }
        if (typeof state.priceMax === 'number' && !Number.isNaN(state.priceMax)) {
          filters.maxPrice = state.priceMax;
        }
        if (Object.keys(filters).length === 0) {
          return undefined;
        }
        return filters;
      }

      function getLabelForValue(list, value, valueKey) {
        if (!list || !value) {
          return '';
        }
        var key = valueKey || 'value';
        for (var i = 0; i < list.length; i += 1) {
          if (String(list[i][key]) === String(value)) {
            return list[i].label || '';
          }
        }
        return '';
      }

      function updateUrlParams(changes, options) {
        var opts = options || {};
        var url = new URL(window.location.href);
        var params = url.searchParams;
        var keys = Object.keys(changes || {});
        for (var i = 0; i < keys.length; i += 1) {
          var key = keys[i];
          var value = changes[key];
          if (value === null || value === undefined || value === '' || (typeof value === 'number' && Number.isNaN(value))) {
            params.delete(key);
          } else {
            params.set(key, String(value));
          }
        }
        if (opts.resetPage) {
          params.set('page', '1');
        }
        var newQuery = params.toString();
        var newUrl = url.pathname + (newQuery ? '?' + newQuery : '');
        window.history.pushState({}, '', newUrl);
        handleStateChangeFromUrl();
      }

      function syncSearchInput(state) {
        var input = document.getElementById('booksSearchInput');
        if (input) {
          input.value = state.query || '';
        }
        var clearBtn = document.querySelector('[data-action="search-clear"]');
        if (clearBtn) {
          if (state.query && state.query.trim() !== '') {
            clearBtn.hidden = false;
          } else {
            clearBtn.hidden = true;
          }
        }
      }

      function renderFilterSidebar(container, options, state) {
        var ageRanges = options && options.ageRanges ? options.ageRanges : [];
        var categories = options && options.categories ? options.categories : [];
        var formats = options && options.formats ? options.formats : [];
        var genres = options && options.genres ? options.genres : [];
        var ratingBuckets = options && options.ratingBuckets ? options.ratingBuckets : [];
        var pricePresets = options && options.pricePresets ? options.pricePresets : [];

        var ageHtml = ageRanges.map(function(opt) {
          var selected = state.ageRange && state.ageRange === opt.value;
          return (
            '<button type="button" class="filter-pill' + (selected ? ' is-selected' : '') + '"' +
            ' data-action="filter-change" data-filter-key="ageRange" data-filter-value="' + escapeHtml(opt.value) + '"' +
            ' aria-pressed="' + (selected ? 'true' : 'false') + '">' +
            escapeHtml(opt.label) +
            '</button>'
          );
        }).join('');

        var categoryHtml = categories.map(function(opt) {
          var selected = state.category && state.category === opt.value;
          return (
            '<button type="button" class="filter-pill' + (selected ? ' is-selected' : '') + '"' +
            ' data-action="filter-change" data-filter-key="category" data-filter-value="' + escapeHtml(opt.value) + '"' +
            ' aria-pressed="' + (selected ? 'true' : 'false') + '">' +
            escapeHtml(opt.label) +
            '</button>'
          );
        }).join('');

        var formatHtml = formats.map(function(opt) {
          var selected = state.format && state.format === opt.value;
          return (
            '<button type="button" class="filter-pill' + (selected ? ' is-selected' : '') + '"' +
            ' data-action="filter-change" data-filter-key="format" data-filter-value="' + escapeHtml(opt.value) + '"' +
            ' aria-pressed="' + (selected ? 'true' : 'false') + '">' +
            escapeHtml(opt.label) +
            '</button>'
          );
        }).join('');

        var genreHtml = genres.map(function(opt) {
          var selected = state.genre && state.genre === opt.value;
          return (
            '<button type="button" class="filter-pill' + (selected ? ' is-selected' : '') + '"' +
            ' data-action="filter-change" data-filter-key="genre" data-filter-value="' + escapeHtml(opt.value) + '"' +
            ' aria-pressed="' + (selected ? 'true' : 'false') + '">' +
            escapeHtml(opt.label) +
            '</button>'
          );
        }).join('');

        var ratingHtml = ratingBuckets.map(function(bucket) {
          var valueStr = String(bucket.minRating);
          var selected = typeof state.ratingMin === 'number' && String(state.ratingMin) === valueStr;
          return (
            '<button type="button" class="filter-pill' + (selected ? ' is-selected' : '') + '"' +
            ' data-action="filter-change" data-filter-key="ratingMin" data-filter-value="' + escapeHtml(valueStr) + '"' +
            ' aria-pressed="' + (selected ? 'true' : 'false') + '">' +
            escapeHtml(bucket.label) +
            '</button>'
          );
        }).join('');

        var pricePresetHtml = pricePresets.map(function(preset) {
          var valueStr = String(preset.maxPrice);
          var selected = typeof state.priceMax === 'number' && String(state.priceMax) === valueStr;
          return (
            '<button type="button" class="filter-pill' + (selected ? ' is-selected' : '') + '"' +
            ' data-action="filter-change" data-filter-key="priceMax" data-filter-value="' + escapeHtml(valueStr) + '"' +
            ' aria-pressed="' + (selected ? 'true' : 'false') + '">' +
            escapeHtml(preset.label) +
            '</button>'
          );
        }).join('');

        var customPriceVal = (typeof state.priceMax === 'number' && !Number.isNaN(state.priceMax)) ? String(state.priceMax) : '';

        container.innerHTML = (
          '<div class="filter-group filter-group-age">' +
            '<h2 class="filter-group-title">Age range</h2>' +
            '<div class="filter-pills-row">' + ageHtml + '</div>' +
          '</div>' +
          '<div class="filter-group filter-group-category">' +
            '<h2 class="filter-group-title">Category</h2>' +
            '<div class="filter-pills-row">' + categoryHtml + '</div>' +
          '</div>' +
          '<div class="filter-group filter-group-format">' +
            '<h2 class="filter-group-title">Format</h2>' +
            '<div class="filter-pills-row">' + formatHtml + '</div>' +
          '</div>' +
          '<div class="filter-group filter-group-genre">' +
            '<h2 class="filter-group-title">Genre</h2>' +
            '<div class="filter-pills-row">' + genreHtml + '</div>' +
          '</div>' +
          '<div class="filter-group filter-group-rating">' +
            '<h2 class="filter-group-title">Rating</h2>' +
            '<div class="filter-pills-row">' + ratingHtml + '</div>' +
          '</div>' +
          '<div class="filter-group filter-group-price">' +
            '<h2 class="filter-group-title">Price</h2>' +
            '<div class="filter-pills-row">' + pricePresetHtml + '</div>' +
            '<div class="filter-price-custom">' +
              '<label class="filter-price-label" for="customPriceMaxInput">Or choose your own max price</label>' +
              '<div class="filter-price-input-wrapper">' +
                '<span class="filter-price-prefix">$</span>' +
                '<input type="number" min="0" step="0.01" id="customPriceMaxInput"' +
                  ' class="filter-price-input" data-action="custom-price-change"' +
                  ' value="' + escapeHtml(customPriceVal) + '" />' +
              '</div>' +
            '</div>' +
          '</div>'
        );
      }

      function renderAppliedFilters(container, options, state) {
        var chips = [];
        if (state.query && state.query.trim() !== '') {
          chips.push(
            '<li class="applied-filter-chip">' +
              '<button type="button" class="applied-filter-button" data-action="clear-filter" data-filter-param="query">' +
                '<span class="applied-filter-label">Search: "' + escapeHtml(state.query) + '"</span>' +
                '<span class="applied-filter-remove" aria-hidden="true">&times;</span>' +
                '<span class="visually-hidden">Remove search filter</span>' +
              '</button>' +
            '</li>'
          );
        }

        if (state.ageRange) {
          var ageLabel = getLabelForValue(options.ageRanges || [], state.ageRange, 'value') || state.ageRange;
          chips.push(
            '<li class="applied-filter-chip">' +
              '<button type="button" class="applied-filter-button" data-action="clear-filter" data-filter-param="ageRange">' +
                '<span class="applied-filter-label">' + escapeHtml(ageLabel) + '</span>' +
                '<span class="applied-filter-remove" aria-hidden="true">&times;</span>' +
                '<span class="visually-hidden">Remove age filter</span>' +
              '</button>' +
            '</li>'
          );
        }

        if (state.category) {
          var catLabel = getLabelForValue(options.categories || [], state.category, 'value') || state.category;
          chips.push(
            '<li class="applied-filter-chip">' +
              '<button type="button" class="applied-filter-button" data-action="clear-filter" data-filter-param="category">' +
                '<span class="applied-filter-label">' + escapeHtml(catLabel) + '</span>' +
                '<span class="applied-filter-remove" aria-hidden="true">&times;</span>' +
                '<span class="visually-hidden">Remove category filter</span>' +
              '</button>' +
            '</li>'
          );
        }

        if (state.format) {
          var fmtLabel = getLabelForValue(options.formats || [], state.format, 'value') || state.format;
          chips.push(
            '<li class="applied-filter-chip">' +
              '<button type="button" class="applied-filter-button" data-action="clear-filter" data-filter-param="format">' +
                '<span class="applied-filter-label">' + escapeHtml(fmtLabel) + '</span>' +
                '<span class="applied-filter-remove" aria-hidden="true">&times;</span>' +
                '<span class="visually-hidden">Remove format filter</span>' +
              '</button>' +
            '</li>'
          );
        }

        if (state.genre) {
          var genreLabel = getLabelForValue(options.genres || [], state.genre, 'value') || state.genre;
          chips.push(
            '<li class="applied-filter-chip">' +
              '<button type="button" class="applied-filter-button" data-action="clear-filter" data-filter-param="genre">' +
                '<span class="applied-filter-label">' + escapeHtml(genreLabel) + '</span>' +
                '<span class="applied-filter-remove" aria-hidden="true">&times;</span>' +
                '<span class="visually-hidden">Remove genre filter</span>' +
              '</button>' +
            '</li>'
          );
        }

        if (typeof state.ratingMin === 'number' && !Number.isNaN(state.ratingMin)) {
          var ratingLabel = '';
          var ratingBuckets = options.ratingBuckets || [];
          for (var i = 0; i < ratingBuckets.length; i += 1) {
            if (Number(ratingBuckets[i].minRating) === Number(state.ratingMin)) {
              ratingLabel = ratingBuckets[i].label || '';
              break;
            }
          }
          if (!ratingLabel) {
            ratingLabel = 'Rating ' + state.ratingMin + '+ stars';
          }
          chips.push(
            '<li class="applied-filter-chip">' +
              '<button type="button" class="applied-filter-button" data-action="clear-filter" data-filter-param="ratingMin">' +
                '<span class="applied-filter-label">' + escapeHtml(ratingLabel) + '</span>' +
                '<span class="applied-filter-remove" aria-hidden="true">&times;</span>' +
                '<span class="visually-hidden">Remove rating filter</span>' +
              '</button>' +
            '</li>'
          );
        }

        if (typeof state.priceMax === 'number' && !Number.isNaN(state.priceMax)) {
          var priceLabel = '';
          var pricePresets = options.pricePresets || [];
          for (var j = 0; j < pricePresets.length; j += 1) {
            if (Number(pricePresets[j].maxPrice) === Number(state.priceMax)) {
              priceLabel = pricePresets[j].label || '';
              break;
            }
          }
          if (!priceLabel) {
            priceLabel = 'Up to $' + state.priceMax;
          }
          chips.push(
            '<li class="applied-filter-chip">' +
              '<button type="button" class="applied-filter-button" data-action="clear-filter" data-filter-param="priceMax">' +
                '<span class="applied-filter-label">' + escapeHtml(priceLabel) + '</span>' +
                '<span class="applied-filter-remove" aria-hidden="true">&times;</span>' +
                '<span class="visually-hidden">Remove price filter</span>' +
              '</button>' +
            '</li>'
          );
        }

        if (chips.length === 0) {
          container.innerHTML = '<p class="applied-filters-empty">No filters applied yet.</p>';
          return;
        }

        var clearAllHtml = (
          '<button type="button" class="applied-filters-clear-all" data-action="clear-all-filters">' +
            'Clear all' +
          '</button>'
        );

        container.innerHTML = (
          '<div class="applied-filters-bar" data-has-filters="true">' +
            '<ul class="applied-filters-list">' + chips.join('') + '</ul>' +
            clearAllHtml +
          '</div>'
        );
      }

      function renderResultsSummary(container, result, state) {
        if (!result || typeof result.totalResults !== 'number') {
          container.innerHTML = '';
          return;
        }
        var total = result.totalResults;
        var page = result.page || state.page || 1;
        var pageSize = result.pageSize || DEFAULT_PAGE_SIZE;
        var hasResults = total > 0;

        if (!hasResults) {
          var noText = 'No books found';
          if (state.query && state.query.trim() !== '') {
            noText += ' for "' + escapeHtml(state.query) + '"';
          }
          container.innerHTML = '<p class="results-summary-text">' + noText + '</p>';
          return;
        }

        var startIndex = (page - 1) * pageSize + 1;
        var endIndex = startIndex + (result.results ? result.results.length : 0) - 1;
        if (endIndex < startIndex) {
          endIndex = startIndex;
        }
        if (endIndex > total) {
          endIndex = total;
        }

        var summaryText = 'Showing ' + startIndex + '–' + endIndex + ' of ' + total + ' books';
        if (state.query && state.query.trim() !== '') {
          summaryText += ' for "' + escapeHtml(state.query) + '"';
        }

        container.innerHTML = '<p class="results-summary-text">' + summaryText + '</p>';
      }

      function renderSortControls(container, options, state) {
        var sortOptions = options && options.sortOptions ? options.sortOptions : [];
        if (!sortOptions.length) {
          container.innerHTML = '';
          return;
        }
        var currentSort = state.sort || '';
        if (!currentSort && sortOptions.length > 0) {
          currentSort = sortOptions[0].value || '';
        }

        var optsHtml = sortOptions.map(function(opt) {
          var value = opt.value || '';
          var selected = currentSort === value;
          return '<option value="' + escapeHtml(value) + '"' + (selected ? ' selected' : '') + '>' + escapeHtml(opt.label || '') + '</option>';
        }).join('');

        container.innerHTML = (
          '<label class="sort-label">' +
            '<span class="sort-label-text">Sort by</span>' +
            '<select class="sort-select" data-action="sort-change">' +
              optsHtml +
            '</select>' +
          '</label>'
        );
      }

      function renderResultsGrid(container, result) {
        if (!result || !result.results || !result.results.length) {
          container.innerHTML = '';
          return;
        }

        var cardsHtml = result.results.map(function(item) {
          var book = item.book || {};
          var edition = item.primaryEdition || {};
          var title = book.title || 'Untitled book';
          var subtitle = book.subtitle || '';
          var ageDisplay = item.displayAgeRange || '';
          var categoryDisplay = item.displayCategory || '';
          var genreDisplay = item.displayGenre || '';
          var priceDisplay = item.priceDisplay || '';
          var ratingDisplay = item.ratingDisplay || '';
          var coverImage = book.coverImage || 'assets/placeholder-book-cover.png';
          var bookId = book.id || '';
          var productUrl = 'product.html?type=book&id=' + encodeURIComponent(bookId);

          var metaParts = [];
          if (ageDisplay) {
            metaParts.push(escapeHtml(ageDisplay));
          }
          if (categoryDisplay) {
            metaParts.push(escapeHtml(categoryDisplay));
          }
          if (genreDisplay) {
            metaParts.push(escapeHtml(genreDisplay));
          }
          var metaText = metaParts.join(' · ');

          return (
            '<article class="book-card" data-book-id="' + escapeHtml(bookId) + '">' +
              '<a class="book-card-link" href="' + escapeHtml(productUrl) + '" data-action="book-card-link" data-book-id="' + escapeHtml(bookId) + '">' +
                '<div class="book-card-image-wrapper">' +
                  '<img class="book-card-image" src="' + escapeHtml(coverImage) + '" alt="' + escapeHtml(title) + '" loading="lazy" />' +
                '</div>' +
                '<div class="book-card-body">' +
                  '<h2 class="book-card-title">' + escapeHtml(title) + '</h2>' +
                  (subtitle ? '<p class="book-card-subtitle">' + escapeHtml(subtitle) + '</p>' : '') +
                  (metaText ? '<p class="book-card-meta">' + metaText + '</p>' : '') +
                  (priceDisplay ? '<p class="book-card-price">' + escapeHtml(priceDisplay) + '</p>' : '') +
                  (ratingDisplay ? '<p class="book-card-rating">' + escapeHtml(ratingDisplay) + '</p>' : '') +
                '</div>' +
              '</a>' +
            '</article>'
          );
        }).join('');

        container.innerHTML = '<div class="book-cards-grid">' + cardsHtml + '</div>';
      }

      function renderPagination(container, result, state) {
        if (!result || typeof result.totalResults !== 'number') {
          container.innerHTML = '';
          return;
        }
        var total = result.totalResults;
        var page = result.page || state.page || 1;
        var pageSize = result.pageSize || DEFAULT_PAGE_SIZE;
        var totalPages = total > 0 ? Math.ceil(total / pageSize) : 1;

        if (totalPages <= 1) {
          container.innerHTML = '';
          return;
        }

        var buttons = [];

        if (page > 1) {
          buttons.push(
            '<button type="button" class="pagination-button pagination-prev" data-action="page-prev">Previous</button>'
          );
        } else {
          buttons.push(
            '<button type="button" class="pagination-button pagination-prev" disabled>Previous</button>'
          );
        }

        for (var p = 1; p <= totalPages; p += 1) {
          var isCurrent = p === page;
          buttons.push(
            '<button type="button" class="pagination-button pagination-page' + (isCurrent ? ' is-current' : '') + '"' +
              ' data-action="page-change" data-page="' + p + '"' +
              (isCurrent ? ' aria-current="page"' : '') +
            '>' + p + '</button>'
          );
        }

        if (page < totalPages) {
          buttons.push(
            '<button type="button" class="pagination-button pagination-next" data-action="page-next">Next</button>'
          );
        } else {
          buttons.push(
            '<button type="button" class="pagination-button pagination-next" disabled>Next</button>'
          );
        }

        container.innerHTML = '<div class="pagination-inner">' + buttons.join('') + '</div>';
      }

      function renderEmptyState(container, result, state) {
        var hasResults = result && result.totalResults && result.totalResults > 0;
        if (hasResults) {
          container.innerHTML = '';
          return;
        }

        var hasQuery = state.query && state.query.trim() !== '';
        var hasAnyFilter = !!(state.category || state.ageRange || state.format || state.genre || (typeof state.ratingMin === 'number' && !Number.isNaN(state.ratingMin)) || (typeof state.priceMax === 'number' && !Number.isNaN(state.priceMax)));

        var titleText = 'No books match your search yet';
        if (!hasQuery && hasAnyFilter) {
          titleText = 'No books match these filters';
        } else if (!hasQuery && !hasAnyFilter) {
          titleText = 'No books to show right now';
        }

        var description = 'Try clearing some filters or using different search words.';
        if (!hasQuery && !hasAnyFilter) {
          description = 'Try adjusting filters above or check back soon for new books.';
        }

        var actionsHtml = '';
        if (hasAnyFilter) {
          actionsHtml += '<button type="button" class="empty-state-button" data-action="clear-all-filters">Clear all filters</button>';
        }
        if (hasQuery) {
          actionsHtml += '<button type="button" class="empty-state-secondary-button" data-action="clear-filter" data-filter-param="query">Clear search</button>';
        }

        container.innerHTML = (
          '<div class="empty-state-inner">' +
            '<h2 class="empty-state-title">' + escapeHtml(titleText) + '</h2>' +
            '<p class="empty-state-description">' + escapeHtml(description) + '</p>' +
            (actionsHtml ? '<div class="empty-state-actions">' + actionsHtml + '</div>' : '') +
          '</div>'
        );
      }

      function bindActionHandlers() {
        var actionElements = document.querySelectorAll('[data-action]');
        for (var i = 0; i < actionElements.length; i += 1) {
          var el = actionElements[i];
          if (el.dataset.bound === 'true') {
            continue;
          }
          var action = el.dataset.action;

          if (action === 'search-submit') {
            el.addEventListener('submit', function(event) {
              handleSearchSubmit(event);
            });
          } else if (action === 'search-clear') {
            el.addEventListener('click', function(event) {
              handleSearchClear(event);
            });
          } else if (action === 'search-input') {
            el.addEventListener('input', function(event) {
              handleSearchInput(event);
            });
          } else if (action === 'sort-change') {
            el.addEventListener('change', function(event) {
              handleSortChange(event.target);
            });
          } else if (action === 'filter-change') {
            el.addEventListener('click', function(event) {
              event.preventDefault();
              handleFilterChange(event.currentTarget);
            });
          } else if (action === 'custom-price-change') {
            el.addEventListener('change', function(event) {
              handleCustomPriceChange(event.target);
            });
          } else if (action === 'clear-filter') {
            el.addEventListener('click', function(event) {
              event.preventDefault();
              handleClearFilter(event.currentTarget);
            });
          } else if (action === 'clear-all-filters') {
            el.addEventListener('click', function(event) {
              event.preventDefault();
              handleClearAllFilters();
            });
          } else if (action === 'page-change' || action === 'page-next' || action === 'page-prev') {
            el.addEventListener('click', function(event) {
              event.preventDefault();
              var state = parseStateFromUrl();
              handlePaginationAction(event.currentTarget, state);
            });
          } else if (action === 'toggle-filters') {
            el.addEventListener('click', function(event) {
              var btn = event.currentTarget;
              var content = document.getElementById('booksFilterContent');
              var isExpanded = btn.getAttribute('aria-expanded') === 'true';
              btn.setAttribute('aria-expanded', isExpanded ? 'false' : 'true');
              if (content) {
                if (isExpanded) {
                  content.classList.add('is-collapsed');
                } else {
                  content.classList.remove('is-collapsed');
                }
              }
            });
          }

          el.dataset.bound = 'true';
        }
      }

      function handleSearchSubmit(event) {
        event.preventDefault();
        var form = event.target;
        var input = form.querySelector('#booksSearchInput');
        var value = input ? input.value.trim() : '';
        if (value) {
          updateUrlParams({ query: value }, { resetPage: true });
        } else {
          updateUrlParams({ query: '' }, { resetPage: true });
        }
      }

      function handleSearchClear(event) {
        event.preventDefault();
        var input = document.getElementById('booksSearchInput');
        if (input) {
          input.value = '';
        }
        updateUrlParams({ query: '' }, { resetPage: true });
      }

      function handleSearchInput(event) {
        var value = event.target.value || '';
        var clearBtn = document.querySelector('[data-action="search-clear"]');
        if (clearBtn) {
          clearBtn.hidden = !(value && value.trim() !== '');
        }
      }

      function handleSortChange(select) {
        var value = select.value || '';
        updateUrlParams({ sort: value }, { resetPage: true });
      }

      function handleFilterChange(element) {
        var key = element.dataset.filterKey;
        var value = element.dataset.filterValue;
        var state = parseStateFromUrl();
        if (!key) {
          return;
        }

        if (key === 'ageRange' || key === 'category' || key === 'format' || key === 'genre') {
          var current = state[key] || '';
          var newValue = current === value ? '' : value;
          var changes = {};
          changes[key] = newValue;
          updateUrlParams(changes, { resetPage: true });
        } else if (key === 'ratingMin') {
          var currentRating = (typeof state.ratingMin === 'number' && !Number.isNaN(state.ratingMin)) ? String(state.ratingMin) : '';
          var newRating = currentRating === value ? '' : value;
          updateUrlParams({ ratingMin: newRating }, { resetPage: true });
        } else if (key === 'priceMax') {
          var currentPrice = (typeof state.priceMax === 'number' && !Number.isNaN(state.priceMax)) ? String(state.priceMax) : '';
          var newPrice = currentPrice === value ? '' : value;
          updateUrlParams({ priceMax: newPrice }, { resetPage: true });
        }
      }

      function handleCustomPriceChange(input) {
        var raw = input.value;
        if (!raw) {
          updateUrlParams({ priceMax: '' }, { resetPage: true });
          return;
        }
        var num = Number(raw);
        if (Number.isNaN(num) || num < 0) {
          return;
        }
        updateUrlParams({ priceMax: num }, { resetPage: true });
      }

      function handleClearFilter(element) {
        var param = element.dataset.filterParam;
        if (!param) {
          return;
        }
        var changes = {};
        changes[param] = '';
        if (param === 'query') {
          var input = document.getElementById('booksSearchInput');
          if (input) {
            input.value = '';
          }
        }
        updateUrlParams(changes, { resetPage: true });
      }

      function handleClearAllFilters() {
        var changes = {
          query: '',
          category: '',
          ageRange: '',
          format: '',
          genre: '',
          ratingMin: '',
          priceMax: ''
        };
        updateUrlParams(changes, { resetPage: true });
      }

      function handlePaginationAction(element, state) {
        var action = element.dataset.action;
        var currentPage = state.page || 1;
        var total = lastSearchResult && typeof lastSearchResult.totalResults === 'number' ? lastSearchResult.totalResults : 0;
        var pageSize = lastSearchResult && lastSearchResult.pageSize ? lastSearchResult.pageSize : DEFAULT_PAGE_SIZE;
        var totalPages = total > 0 ? Math.ceil(total / pageSize) : 1;

        if (action === 'page-change') {
          var target = Number(element.dataset.page);
          if (!Number.isNaN(target) && target >= 1 && target <= totalPages) {
            updateUrlParams({ page: target }, { resetPage: false });
          }
        } else if (action === 'page-next') {
          if (currentPage < totalPages) {
            updateUrlParams({ page: currentPage + 1 }, { resetPage: false });
          }
        } else if (action === 'page-prev') {
          if (currentPage > 1) {
            updateUrlParams({ page: currentPage - 1 }, { resetPage: false });
          }
        }
      }

      function renderAll(state) {
        syncSearchInput(state);

        var filterContainer = document.querySelector('[data-populate="filter-options"]');
        if (filterContainer && filterOptions) {
          renderFilterSidebar(filterContainer, filterOptions, state);
        }

        var appliedFiltersContainer = document.querySelector('[data-populate="applied-filters"]');
        if (appliedFiltersContainer && filterOptions) {
          renderAppliedFilters(appliedFiltersContainer, filterOptions, state);
        }

        var summaryContainer = document.querySelector('[data-populate="results-summary"]');
        if (summaryContainer) {
          renderResultsSummary(summaryContainer, lastSearchResult, state);
        }

        var sortContainer = document.querySelector('[data-populate="sort-options"]');
        if (sortContainer && filterOptions) {
          renderSortControls(sortContainer, filterOptions, state);
        }

        var gridContainer = document.querySelector('[data-populate="results-grid"]');
        if (gridContainer) {
          renderResultsGrid(gridContainer, lastSearchResult);
        }

        var paginationContainer = document.querySelector('[data-populate="pagination"]');
        if (paginationContainer) {
          renderPagination(paginationContainer, lastSearchResult, state);
        }

        var emptyContainer = document.querySelector('[data-populate="empty-state"]');
        var hasResults = lastSearchResult && lastSearchResult.totalResults && lastSearchResult.totalResults > 0;
        if (emptyContainer) {
          renderEmptyState(emptyContainer, lastSearchResult, state);
        }

        if (gridContainer && paginationContainer && emptyContainer) {
          if (hasResults) {
            gridContainer.removeAttribute('hidden');
            paginationContainer.removeAttribute('hidden');
            emptyContainer.setAttribute('hidden', 'hidden');
          } else {
            gridContainer.setAttribute('hidden', 'hidden');
            paginationContainer.setAttribute('hidden', 'hidden');
            emptyContainer.removeAttribute('hidden');
          }
        }

        bindActionHandlers();
      }

      function handleStateChangeFromUrl() {
        var state = parseStateFromUrl();
        var filters = buildFiltersFromState(state);

        var sort = state.sort || '';
        if (!sort && filterOptions && filterOptions.sortOptions && filterOptions.sortOptions.length > 0) {
          sort = filterOptions.sortOptions[0].value || '';
        }

        var page = state.page || 1;
        var result;
        try {
          result = WebsiteSDK.searchBooks(state.query || '', filters, sort || undefined, page, DEFAULT_PAGE_SIZE);
        } catch (error) {
          console.error('Failed to search books', error);
          result = {
            results: [],
            totalResults: 0,
            page: page,
            pageSize: DEFAULT_PAGE_SIZE
          };
        }
        lastSearchResult = result;
        renderAll(state);
      }

      try {
        filterOptions = WebsiteSDK.getBookFilterOptions();
      } catch (error) {
        console.error('Failed to load book filter options', error);
        filterOptions = {
          ageRanges: [],
          formats: [],
          categories: [],
          genres: [],
          ratingBuckets: [],
          pricePresets: [],
          sortOptions: []
        };
      }

      handleStateChangeFromUrl();

      window.addEventListener('popstate', function() {
        handleStateChangeFromUrl();
      });
    });
  </script>
</body>
</html>
