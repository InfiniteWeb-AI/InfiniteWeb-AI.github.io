<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Bridges & Tales Publishing</title>
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&amp;family=Source+Sans+3:wght@400;500;600&amp;display=swap' rel='stylesheet' />
  <link rel='stylesheet' href='styles.css' />
  <link rel='stylesheet' href='checkout.css' />
</head>
<body>
  <div class='page-shell'>
    <header class='site-header' role='banner'>
      <div class='header-inner'>
        <a href='index.html' class='brand' aria-label='Bridges and Tales Publishing Home'>
          <img src='assets/logo-bridges-tales.svg' alt='Bridges & Tales Publishing' class='brand-logo' />
        </a>
        <nav class='main-nav' aria-label='Primary navigation'>
          <ul class='main-nav-list'>
            <li class='main-nav-item'>
              <a href='index.html' class='main-nav-link'>Home</a>
            </li>
            <li class='main-nav-item'>
              <a href='books.html' class='main-nav-link'>Books</a>
            </li>
            <li class='main-nav-item'>
              <a href='series_list.html' class='main-nav-link'>Series</a>
            </li>
            <li class='main-nav-item'>
              <a href='teachers.html' class='main-nav-link'>Teachers &amp; Schools</a>
            </li>
            <li class='main-nav-item'>
              <a href='events.html' class='main-nav-link'>Events</a>
            </li>
            <li class='main-nav-item'>
              <a href='wishlist.html' class='main-nav-link'>Wishlist</a>
            </li>
            <li class='main-nav-item'>
              <a href='account.html' class='main-nav-link'>My Account</a>
            </li>
            <li class='main-nav-item'>
              <a href='signup.html' class='main-nav-link'>Sign Up</a>
            </li>
            <li class='main-nav-item'>
              <a href='cart.html' class='main-nav-link'>Cart</a>
            </li>
          </ul>
        </nav>
      </div>
      <div class='header-divider' aria-hidden='true'></div>
    </header>

    <main id='content' class='site-main' role='main' tabindex='-1'>
      <div class='checkout-page' data-component='checkout-url-state-manager checkout-data-loader'>
        <h1 class='checkout-title'>Checkout</h1>

        <div id='checkoutGlobalError' class='checkout-global-error' aria-live='polite'></div>

        <section class='checkout-header-row'>
          <div class='checkout-mini-cart-wrapper' data-component='checkout-header-cart-summary'>
            <div data-populate='cart-summary'></div>
          </div>
        </section>

        <section class='checkout-section checkout-order-summary-section' data-component='checkout-order-summary'>
          <div data-populate='order-summary'></div>
        </section>

        <section class='checkout-section checkout-form-section' data-component='checkout-submit-controller'>
          <div data-populate='checkout-form'></div>
        </section>

        <section class='checkout-section checkout-confirmation-section' data-component='checkout-confirmation-section' hidden>
          <div data-populate='checkout-confirmation'></div>
        </section>
      </div>
    </main>

    <footer class='site-footer' role='contentinfo'>
      <div class='footer-divider' aria-hidden='true'></div>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <ul class='footer-links'>
            <li class='footer-link-item'>
              <a href='about.html' class='footer-link'>About</a>
            </li>
            <li class='footer-link-item'>
              <a href='teachers.html' class='footer-link'>Teachers &amp; Schools</a>
            </li>
            <li class='footer-link-item'>
              <a href='classroom_packs.html?grade=all_grades' class='footer-link'>Classroom Packs</a>
            </li>
            <li class='footer-link-item'>
              <a href='resources.html?resource_type=reading_guides' class='footer-link'>Free Resources</a>
            </li>
            <li class='footer-link-item'>
              <a href='events.html' class='footer-link'>Events</a>
            </li>
            <li class='footer-link-item'>
              <a href='newsletter.html' class='footer-link'>Newsletter Signup</a>
            </li>
          </ul>
        </nav>
        <p class='footer-meta'>&copy; <span class='footer-year'>2026</span> Bridges &amp; Tales Publishing. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var checkoutState = {
        urlParams: urlParams,
        checkoutSummary: null,
        cartSummary: null,
        order: null,
        shippingAddress: null,
        selectedShippingMethod: null
      };

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function showGlobalError(message) {
        var container = document.getElementById('checkoutGlobalError');
        if (container) {
          if (message) {
            container.textContent = message;
            container.style.display = '';
          } else {
            container.textContent = '';
            container.style.display = 'none';
          }
        }
      }

      function loadCheckoutSummary() {
        if (!checkoutState.checkoutSummary) {
          checkoutState.checkoutSummary = WebsiteSDK.getCheckoutSummary();
          checkoutState.shippingAddress = checkoutState.checkoutSummary.shippingAddress || null;
          checkoutState.selectedShippingMethod = checkoutState.checkoutSummary.selectedShippingMethod || null;
        }
        return checkoutState.checkoutSummary;
      }

      function loadCartSummary() {
        if (!checkoutState.cartSummary) {
          checkoutState.cartSummary = WebsiteSDK.getCartSummary();
        }
        return checkoutState.cartSummary;
      }

      function renderCartSummary(container, cartSummary) {
        if (!container) {
          return;
        }
        if (!cartSummary || !cartSummary.itemCount) {
          container.innerHTML = '<div class=\'checkout-mini-cart checkout-mini-cart--empty\'>Your cart is empty.</div>';
          return;
        }
        var count = cartSummary.itemCount;
        var labelText = count === 1 ? '1 item' : count + ' items';
        var totalDisplay = cartSummary.estimatedTotalDisplay ? escapeHtml(cartSummary.estimatedTotalDisplay) : '';
        container.innerHTML = `
          <div class='checkout-mini-cart'>
            <span class='checkout-mini-cart-label'>Cart</span>
            <span class='checkout-mini-cart-count'>${labelText}</span>
            <span class='checkout-mini-cart-total'>${totalDisplay}</span>
          </div>
        `;
      }

      function renderOrderSummary(container, checkoutSummary) {
        if (!container) {
          return;
        }
        if (!checkoutSummary || !checkoutSummary.items || checkoutSummary.items.length === 0) {
          container.innerHTML = `
            <section class='checkout-section-card'>
              <header class='section-header'>
                <h2 class='section-title'>Order summary</h2>
              </header>
              <p>Your cart is empty. Add some books from the cart page before checking out.</p>
              <a href='cart.html' class='link-back-to-cart' data-action='back-to-cart'>Back to Cart</a>
            </section>
          `;
          return;
        }

        var itemsHtml = checkoutSummary.items.map(function(itemWrapper) {
          var cartItem = itemWrapper.cartItem || {};
          var title = escapeHtml(itemWrapper.title || 'Untitled item');
          var itemTypeLabel = escapeHtml(itemWrapper.itemTypeLabel || '');
          var formatLabel = escapeHtml(itemWrapper.formatLabel || '');
          var gradeLevelLabel = escapeHtml(itemWrapper.gradeLevelLabel || '');
          var quantity = cartItem.quantity || 0;
          var unitPriceDisplay = escapeHtml(itemWrapper.unitPriceDisplay || '');
          var lineTotalDisplay = escapeHtml(itemWrapper.lineTotalDisplay || '');

          var metaParts = [];
          if (itemTypeLabel) {
            metaParts.push(itemTypeLabel);
          }
          if (formatLabel) {
            metaParts.push(formatLabel);
          }
          if (!formatLabel && gradeLevelLabel) {
            metaParts.push(gradeLevelLabel);
          }
          var metaText = metaParts.join(' • ');

          return `
            <li class='order-item'>
              <div class='order-item-main'>
                <div class='order-item-text'>
                  <p class='order-item-title'>${title}</p>
                  ${metaText ? `<p class='order-item-meta'>${metaText}</p>` : ''}
                </div>
                <div class='order-item-quantity'>
                  <span class='order-item-label'>Qty</span>
                  <span>${quantity}</span>
                </div>
                <div class='order-item-price'>
                  <span class='order-item-label'>Price</span>
                  <span>${unitPriceDisplay}</span>
                </div>
                <div class='order-item-total'>
                  <span class='order-item-label'>Total</span>
                  <span>${lineTotalDisplay}</span>
                </div>
              </div>
            </li>
          `;
        }).join('');

        var itemsSubtotalDisplay = escapeHtml(checkoutSummary.itemsSubtotalDisplay || '');
        var shippingCostDisplay = checkoutSummary.shippingCostDisplay ? escapeHtml(checkoutSummary.shippingCostDisplay) : 'Calculated at next step';
        var orderTotalDisplay = escapeHtml(checkoutSummary.orderTotalDisplay || checkoutSummary.itemsSubtotalDisplay || '');

        container.innerHTML = `
          <section class='checkout-section-card'>
            <header class='section-header'>
              <h2 class='section-title'>Order summary</h2>
            </header>
            <ul class='order-items-list'>
              ${itemsHtml}
            </ul>
            <div class='order-totals'>
              <div class='order-totals-row'>
                <span>Items subtotal</span>
                <span>${itemsSubtotalDisplay}</span>
              </div>
              <div class='order-totals-row'>
                <span>Shipping</span>
                <span data-role='shipping-cost-display'>${shippingCostDisplay}</span>
              </div>
              <div class='order-totals-row order-totals-row--emphasis'>
                <span>Order total</span>
                <span data-role='order-total-display'>${orderTotalDisplay}</span>
              </div>
            </div>
            <a href='cart.html' class='link-back-to-cart' data-action='back-to-cart'>Back to Cart</a>
          </section>
        `;
      }

      function renderCheckoutForm(container, checkoutSummary) {
        if (!container) {
          return;
        }
        if (!checkoutSummary || !checkoutSummary.items || checkoutSummary.items.length === 0) {
          container.innerHTML = '';
          return;
        }

        var addr = checkoutSummary.shippingAddress || {};
        var shippingOptions = checkoutSummary.shippingOptions || [];
        var selectedMethod = checkoutSummary.selectedShippingMethod || '';

        if (!selectedMethod && shippingOptions.length) {
          var standardOption = shippingOptions.find(function(opt) { return opt.method === 'standard'; });
          if (standardOption) {
            selectedMethod = standardOption.method;
          } else {
            selectedMethod = shippingOptions[0].method || '';
          }
        }
        checkoutState.selectedShippingMethod = selectedMethod || null;

        var optionsHtml = '';
        if (shippingOptions.length) {
          optionsHtml = shippingOptions.map(function(option) {
            var method = option.method || '';
            var label = escapeHtml(option.label || method);
            var costDisplay = escapeHtml(option.costDisplay || '');
            var id = 'shippingMethod_' + method;
            var checkedAttr = method === selectedMethod ? ' checked' : '';
            return `
              <label class='shipping-method-option'>
                <input type='radio' name='shippingMethod' value='${escapeHtml(method)}' id='${escapeHtml(id)}'${checkedAttr} data-action='select-shipping-method'>
                <span class='shipping-method-text'>
                  <span class='shipping-method-label'>${label}</span>
                  <span class='shipping-method-cost'>${costDisplay}</span>
                </span>
              </label>
            `;
          }).join('');
        } else {
          optionsHtml = '<p class=\'shipping-method-empty\'>No shipping options are currently available.</p>';
        }

        container.innerHTML = `
          <form id='checkoutForm' class='checkout-form' novalidate>
            <section class='checkout-section-card' data-component='checkout-shipping-address-form'>
              <header class='section-header'>
                <h2 class='section-title'>Shipping address</h2>
                <p class='section-subtitle'>Tell us where to send your books.</p>
              </header>
              <div class='form-general-error' aria-live='polite'></div>
              <div class='form-fields'>
                <div class='form-field'>
                  <label for='shippingName'>Name or school<span class='required-indicator'>*</span></label>
                  <input id='shippingName' name='name' type='text' autocomplete='name' required value='${escapeHtml(addr.name || '')}'>
                  <p class='form-field-error' data-error-for='name'></p>
                </div>
                <div class='form-field'>
                  <label for='shippingAddressLine1'>Street address<span class='required-indicator'>*</span></label>
                  <input id='shippingAddressLine1' name='addressLine1' type='text' autocomplete='address-line1' required value='${escapeHtml(addr.addressLine1 || '')}'>
                  <p class='form-field-error' data-error-for='addressLine1'></p>
                </div>
                <div class='form-field'>
                  <label for='shippingAddressLine2'>Apartment, suite, etc. (optional)</label>
                  <input id='shippingAddressLine2' name='addressLine2' type='text' autocomplete='address-line2' value='${escapeHtml(addr.addressLine2 || '')}'>
                  <p class='form-field-error' data-error-for='addressLine2'></p>
                </div>
                <div class='form-field'>
                  <label for='shippingCity'>City<span class='required-indicator'>*</span></label>
                  <input id='shippingCity' name='city' type='text' autocomplete='address-level2' required value='${escapeHtml(addr.city || '')}'>
                  <p class='form-field-error' data-error-for='city'></p>
                </div>
                <div class='form-field'>
                  <label for='shippingState'>State / Province<span class='required-indicator'>*</span></label>
                  <input id='shippingState' name='state' type='text' autocomplete='address-level1' required value='${escapeHtml(addr.state || '')}'>
                  <p class='form-field-error' data-error-for='state'></p>
                </div>
                <div class='form-field'>
                  <label for='shippingPostalCode'>Postal code<span class='required-indicator'>*</span></label>
                  <input id='shippingPostalCode' name='postalCode' type='text' autocomplete='postal-code' required value='${escapeHtml(addr.postalCode || '')}'>
                  <p class='form-field-error' data-error-for='postalCode'></p>
                </div>
                <div class='form-field'>
                  <label for='shippingCountry'>Country<span class='required-indicator'>*</span></label>
                  <input id='shippingCountry' name='country' type='text' autocomplete='country' required value='${escapeHtml(addr.country || '')}'>
                  <p class='form-field-error' data-error-for='country'></p>
                </div>
              </div>
            </section>

            <section class='checkout-section-card' data-component='checkout-shipping-method-selector'>
              <header class='section-header'>
                <h2 class='section-title'>Shipping method</h2>
                <p class='section-subtitle'>Choose how quickly your order should arrive.</p>
              </header>
              <div class='shipping-method-list'>
                ${optionsHtml}
                <p class='form-field-error' data-error-for='shippingMethod'></p>
              </div>
            </section>

            <div class='checkout-actions' data-component='checkout-submit-controller'>
              <button type='button' class='btn btn-primary checkout-submit-button' data-action='submit-shipping'>
                Continue
              </button>
              <p class='checkout-helper-text'>You will see your final total, including shipping, on the next step.</p>
            </div>

            <div class='checkout-secondary-nav' data-component='checkout-navigation-links'>
              <a href='cart.html' class='link-back-to-cart' data-action='back-to-cart'>Back to Cart</a>
            </div>
          </form>
        `;
      }

      function renderConfirmation(container, state) {
        if (!container) {
          return;
        }
        var order = state.order;
        if (!order) {
          container.innerHTML = '';
          return;
        }
        var shippingAddress = state.shippingAddress || {};
        var summary = state.checkoutSummary || {};

        var orderNumber = escapeHtml(order.orderNumber || '');
        var orderTotalDisplay = escapeHtml(summary.orderTotalDisplay || '');
        var shippingCostDisplay = escapeHtml(summary.shippingCostDisplay || '');

        var orderMethod = order.shippingMethod || '';
        var shippingMethodDisplay = orderMethod;
        var options = summary.shippingOptions || [];
        if (options && options.length) {
          var match = options.find(function(opt) { return opt.method === orderMethod; });
          if (match && match.label) {
            shippingMethodDisplay = match.label;
          }
        }
        var shippingMethodLabel = escapeHtml(shippingMethodDisplay || orderMethod || '');

        var name = escapeHtml(shippingAddress.name || '');
        var line1 = escapeHtml(shippingAddress.addressLine1 || '');
        var line2 = escapeHtml(shippingAddress.addressLine2 || '');
        var city = escapeHtml(shippingAddress.city || '');
        var stateText = escapeHtml(shippingAddress.state || '');
        var postal = escapeHtml(shippingAddress.postalCode || '');
        var country = escapeHtml(shippingAddress.country || '');

        var addressSecondLineParts = [];
        if (city) {
          addressSecondLineParts.push(city);
        }
        if (stateText) {
          addressSecondLineParts.push(stateText);
        }
        if (postal) {
          addressSecondLineParts.push(postal);
        }
        var addressSecondLine = addressSecondLineParts.join(', ');

        container.innerHTML = `
          <section class='checkout-section-card checkout-confirmation-panel'>
            <header class='section-header'>
              <h2 class='section-title'>Shipping details saved</h2>
              <p class='section-subtitle'>Your order is almost ready to go.</p>
            </header>
            <div class='confirmation-body'>
              <div class='confirmation-summary'>
                <p class='confirmation-order-number'>Order number: <strong>${orderNumber}</strong></p>
                <p class='confirmation-order-total'>Order total: <strong>${orderTotalDisplay}</strong></p>
              </div>
              <div class='confirmation-shipping'>
                <h3 class='confirmation-subheading'>Shipping to</h3>
                <p class='confirmation-address-line'>${name}</p>
                <p class='confirmation-address-line'>${line1}</p>
                ${line2 ? `<p class='confirmation-address-line'>${line2}</p>` : ''}
                <p class='confirmation-address-line'>${addressSecondLine}</p>
                <p class='confirmation-address-line'>${country}</p>
              </div>
              <div class='confirmation-method'>
                <h3 class='confirmation-subheading'>Shipping method</h3>
                <p class='confirmation-method-line'>${shippingMethodLabel}</p>
                <p class='confirmation-method-line'>Shipping cost: ${shippingCostDisplay}</p>
              </div>
              <div class='confirmation-actions'>
                <a href='javascript:void(0)' class='btn btn-outline' data-action='view-order-details'>View Order Details</a>
              </div>
            </div>
          </section>
        `;
      }

      function clearFormErrors(form) {
        var errorEls = form.querySelectorAll('.form-field-error');
        errorEls.forEach(function(el) {
          el.textContent = '';
        });
        var generalErrorEl = form.querySelector('.form-general-error');
        if (generalErrorEl) {
          generalErrorEl.textContent = '';
        }
        var erroredInputs = form.querySelectorAll('.input-error');
        erroredInputs.forEach(function(input) {
          input.classList.remove('input-error');
        });
      }

      function showFormGeneralError(form, message) {
        var generalErrorEl = form.querySelector('.form-general-error');
        if (generalErrorEl) {
          generalErrorEl.textContent = message || '';
        }
      }

      function validateCheckoutForm(form) {
        var errors = {};
        var requiredFields = ['name', 'addressLine1', 'city', 'state', 'postalCode', 'country'];

        requiredFields.forEach(function(fieldName) {
          var field = form.elements[fieldName];
          if (field && !field.value.trim()) {
            errors[fieldName] = 'This field is required.';
          }
        });

        var selectedMethod = checkoutState.selectedShippingMethod;
        if (!selectedMethod) {
          var selectedInput = form.querySelector('input[name="shippingMethod"]:checked');
          if (!selectedInput) {
            errors.shippingMethod = 'Please choose a shipping method.';
          }
        }

        return {
          valid: Object.keys(errors).length === 0,
          errors: errors
        };
      }

      function applyValidationErrors(form, result) {
        if (!result || !result.errors) {
          return;
        }

        Object.keys(result.errors).forEach(function(fieldName) {
          var message = result.errors[fieldName];
          if (fieldName === 'shippingMethod') {
            var errorEl = form.querySelector('[data-error-for="shippingMethod"]');
            if (errorEl) {
              errorEl.textContent = message;
            }
          } else {
            var field = form.elements[fieldName];
            if (field) {
              field.classList.add('input-error');
              var errEl = form.querySelector('[data-error-for="' + fieldName + '"]');
              if (errEl) {
                errEl.textContent = message;
              }
            }
          }
        });

        showFormGeneralError(form, 'Please correct the highlighted fields.');
      }

      function showConfirmationSection() {
        var confirmationSection = document.querySelector('.checkout-confirmation-section');
        if (confirmationSection) {
          confirmationSection.hidden = false;
        }
        var formSection = document.querySelector('.checkout-form-section');
        if (formSection) {
          formSection.classList.add('checkout-form-section--completed');
        }
        if (confirmationSection && typeof confirmationSection.scrollIntoView === 'function') {
          confirmationSection.scrollIntoView({ behavior: 'smooth' });
        }
      }

      function updateUrlForConfirmation(orderId) {
        var params = new URLSearchParams(window.location.search);
        params.set('step', 'confirmation');
        if (orderId) {
          params.set('orderId', orderId);
        }
        var newUrl = window.location.pathname + '?' + params.toString();
        window.history.replaceState({}, '', newUrl);
        checkoutState.urlParams = new URLSearchParams(params.toString());
      }

      function initializeViewState() {
        var step = checkoutState.urlParams.get('step') || 'shipping';
        if (step === 'confirmation') {
          if (checkoutState.order && checkoutState.order.id) {
            showConfirmationSection();
          } else {
            var orderIdParam = checkoutState.urlParams.get('orderId');
            if (orderIdParam) {
              window.location.href = 'account.html?section=orders&orderId=' + encodeURIComponent(orderIdParam);
            } else {
              var params = new URLSearchParams(checkoutState.urlParams.toString());
              params.set('step', 'shipping');
              params.delete('orderId');
              window.history.replaceState({}, '', window.location.pathname + '?' + params.toString());
            }
          }
        } else {
          var confirmationSection = document.querySelector('.checkout-confirmation-section');
          if (confirmationSection) {
            confirmationSection.hidden = true;
          }
        }
      }

      function onSelectShippingMethod(event) {
        var input = event.target;
        if (input && input.name === 'shippingMethod') {
          checkoutState.selectedShippingMethod = input.value;
          var form = document.getElementById('checkoutForm');
          if (form) {
            var errorEl = form.querySelector('[data-error-for="shippingMethod"]');
            if (errorEl) {
              errorEl.textContent = '';
            }
          }
        }
      }

      function onSubmitShipping() {
        var form = document.getElementById('checkoutForm');
        if (!form) {
          return;
        }

        clearFormErrors(form);
        var validationResult = validateCheckoutForm(form);
        if (!validationResult.valid) {
          applyValidationErrors(form, validationResult);
          return;
        }

        var shippingAddress = {
          name: form.elements['name'].value.trim(),
          addressLine1: form.elements['addressLine1'].value.trim(),
          addressLine2: form.elements['addressLine2'] ? form.elements['addressLine2'].value.trim() : '',
          city: form.elements['city'].value.trim(),
          state: form.elements['state'].value.trim(),
          postalCode: form.elements['postalCode'].value.trim(),
          country: form.elements['country'].value.trim()
        };

        var selectedMethod = checkoutState.selectedShippingMethod;
        if (!selectedMethod) {
          var selectedInput = form.querySelector('input[name="shippingMethod"]:checked');
          if (selectedInput) {
            selectedMethod = selectedInput.value;
            checkoutState.selectedShippingMethod = selectedMethod;
          }
        }

        var submitButton = form.querySelector('[data-action="submit-shipping"]');
        var originalButtonText = submitButton ? submitButton.textContent : '';
        if (submitButton) {
          submitButton.disabled = true;
          submitButton.textContent = 'Saving...';
        }

        try {
          var response = WebsiteSDK.submitShippingDetails(shippingAddress, selectedMethod);
          if (!response || !response.success) {
            var message = response && response.message ? response.message : 'We could not save your shipping details. Please check your information and try again.';
            showFormGeneralError(form, message);
          } else {
            checkoutState.order = response.order || null;
            checkoutState.shippingAddress = response.shippingAddress || shippingAddress;

            var summaryToUpdate = loadCheckoutSummary();
            summaryToUpdate.shippingCostDisplay = response.shippingCostDisplay || summaryToUpdate.shippingCostDisplay;
            summaryToUpdate.orderTotalDisplay = response.orderTotalDisplay || summaryToUpdate.orderTotalDisplay;
            checkoutState.checkoutSummary = summaryToUpdate;

            var orderSummaryContainer = document.querySelector('[data-populate="order-summary"]');
            if (orderSummaryContainer) {
              renderOrderSummary(orderSummaryContainer, summaryToUpdate);
            }

            var confirmationContainer = document.querySelector('[data-populate="checkout-confirmation"]');
            if (confirmationContainer) {
              renderConfirmation(confirmationContainer, checkoutState);
              showConfirmationSection();
            }

            if (checkoutState.order && checkoutState.order.id) {
              updateUrlForConfirmation(checkoutState.order.id);
            }
          }
        } catch (err) {
          console.error(err);
          showFormGeneralError(form, 'Something went wrong while saving your shipping details. Please try again.');
        } finally {
          if (submitButton) {
            submitButton.disabled = false;
            submitButton.textContent = originalButtonText || 'Continue';
          }
        }
      }

      try {
        var summary = loadCheckoutSummary();
        var cartSummary = loadCartSummary();

        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          var type = element.dataset.populate;
          if (type === 'cart-summary') {
            renderCartSummary(element, cartSummary);
          } else if (type === 'order-summary') {
            renderOrderSummary(element, summary);
          } else if (type === 'checkout-form') {
            renderCheckoutForm(element, summary);
          } else if (type === 'checkout-confirmation') {
            if (checkoutState.order) {
              renderConfirmation(element, checkoutState);
            } else {
              element.innerHTML = '';
            }
          }
        });

        initializeViewState();
      } catch (e) {
        console.error(e);
        showGlobalError('We had trouble loading your checkout. Please refresh the page or try again.');
      }

      document.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.dataset.action;
        if (action === 'submit-shipping') {
          event.preventDefault();
          onSubmitShipping();
        } else if (action === 'view-order-details') {
          event.preventDefault();
          if (checkoutState.order && checkoutState.order.id) {
            window.location.href = 'account.html?section=orders&orderId=' + encodeURIComponent(checkoutState.order.id);
          }
        } else if (action === 'back-to-cart') {
          // let the browser handle navigation to cart.html
        }
      });

      document.addEventListener('change', function(event) {
        var target = event.target;
        if (target && target.dataset && target.dataset.action === 'select-shipping-method') {
          onSelectShippingMethod(event);
        }
      });
    });
  </script>
</body>
</html>
