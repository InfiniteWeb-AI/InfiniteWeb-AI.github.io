<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Water Born - Web Series</title>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Source+Sans+3:wght@300;400;600;700&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='framework.css'>
  <link rel='stylesheet' href='store.css'>
</head>
<body class='site'>
  <div class='site-inner'>
    <header class='site-header'>
      <div class='header-inner'>
        <a href='index.html' class='brand' aria-label='Water Born home'>
          <span class='brand-mark'>~</span>
          <span class='brand-text'>water born</span>
          <span class='brand-trademark'>™</span>
        </a>

        <nav class='primary-nav' aria-label='Main navigation'>
          <span class='menu-label'>Menu</span>
          <ul>
            <li><a href='index.html' title='Homepage with highlights and navigation to all sections'>Home</a></li>
            <li><a href='episodes.html' title='Browse and filter all episodes of the series'>Episodes</a></li>
            <li><a href='characters.html' title='View the character gallery and open character profiles'>Characters</a></li>
            <li><a href='events.html' title='See live and upcoming events including online Q&amp;As'>Events</a></li>
            <li><a href='store.html' title='Shop official series merchandise like posters and apparel'>Store</a></li>
            <li><a href='videos.html' title='Watch behind-the-scenes and bonus videos'>Videos</a></li>
            <li><a href='schedule.html' title='Check upcoming episode times and plan weekend binges'>Schedule</a></li>
            <li><a href='community.html' title='Access polls and episode discussion threads'>Community</a></li>
            <li><a href='cart.html' title='View and manage items added to your shopping cart'>Cart</a></li>
          </ul>
        </nav>
      </div>
      <div class='header-divider pattern-strip' aria-hidden='true'></div>
    </header>

    <main id='content' class='site-content' role='main'>
      <section class='store-band store-header-band'>
        <div class='store-band-inner'>
          <header class='store-section-header'>
            <h1 class='store-title'>Store</h1>
          </header>
          <div class='store-quick-access-wrapper'>
            <div class='store-quick-access' data-component='header-quick-access-summary' data-populate='quick-access-summary' aria-label='Quick access summary'></div>
          </div>
        </div>
      </section>

      <div class='pattern-strip band-divider' aria-hidden='true'></div>

      <section class='store-band store-controller-band' data-component='store-page-controller'>
        <div class='store-band-inner'>
          <div class='store-controller-controls'>
            <div class='items-per-page-control'>
              <label for='itemsPerPageSelect'>Items per page</label>
              <select id='itemsPerPageSelect' name='itemsPerPage' data-action='set-items-per-page'>
                <option value='20'>20</option>
                <option value='40'>40</option>
                <option value='60'>60</option>
              </select>
            </div>
            <button type='button' class='link-button reset-view-button' data-action='reset-view'>Reset view</button>
          </div>
        </div>
      </section>

      <section class='store-band store-filter-band'>
        <div class='store-band-inner'>
          <div class='store-filter-toolbar-inner' data-component='store-filter-toolbar' data-populate='store-filter-toolbar' aria-label='Filter products'></div>
        </div>
      </section>

      <section class='store-band store-sort-band'>
        <div class='store-band-inner'>
          <div class='store-sort-selector-inner' data-component='store-sort-selector' data-populate='store-sort-selector'></div>
          <div class='store-result-count' data-component='store-result-count'></div>
        </div>
      </section>

      <section class='store-band store-active-filters-band'>
        <div class='store-band-inner'>
          <div class='active-filter-chips' data-component='active-filter-chips' aria-label='Active filters'></div>
        </div>
      </section>

      <div class='pattern-strip band-divider' aria-hidden='true'></div>

      <section class='store-band store-products-band'>
        <div class='store-band-inner'>
          <div class='store-product-grid-wrapper'>
            <div class='product-grid' data-component='store-product-grid'></div>
            <div class='store-empty-state' data-component='store-empty-state-handler' hidden></div>
            <div class='store-loading-overlay' data-component='store-loading-indicator' aria-hidden='true' hidden>
              <div class='loading-indicator'>Loading products…</div>
            </div>
          </div>
        </div>
      </section>

      <div class='pattern-strip band-divider' aria-hidden='true'></div>

      <section class='store-band store-pagination-band'>
        <div class='store-band-inner'>
          <nav class='pagination-controls' data-component='store-pagination-controls' aria-label='Product pages'></nav>
        </div>
      </section>
    </main>

    <footer class='site-footer'>
      <div class='footer-divider pattern-strip' aria-hidden='true'></div>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <ul>
            <li><a href='about.html' title='Learn more about the series and this site'>About</a></li>
            <li><a href='help.html' title='Get help using features like watchlists, playlists, and reminders'>Help &amp; Support</a></li>
            <li><a href='newsletter.html' title='Subscribe to the series newsletter for updates and behind-the-scenes content'>Newsletter</a></li>
            <li><a href='policies.html' title='Read privacy policy, terms of use, and community guidelines'>Policies</a></li>
          </ul>
        </nav>
        <p class='footer-meta'>
          <span class='footer-title'>Water Born Web Series</span>
          <span class='footer-copy'>&copy; 2024 Water Born. All rights reserved.</span>
        </p>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var quickAccessContainers = document.querySelectorAll('[data-populate="quick-access-summary"]');
      var filterToolbarContainer = document.querySelector('[data-component="store-filter-toolbar"]');
      var sortSelectorContainer = document.querySelector('[data-component="store-sort-selector"]');
      var activeChipsContainer = document.querySelector('[data-component="active-filter-chips"]');
      var productGridContainer = document.querySelector('[data-component="store-product-grid"]');
      var emptyStateContainer = document.querySelector('[data-component="store-empty-state-handler"]');
      var loadingOverlay = document.querySelector('[data-component="store-loading-indicator"]');
      var paginationContainer = document.querySelector('[data-component="store-pagination-controls"]');
      var resultCountContainer = document.querySelector('[data-component="store-result-count"]');
      var itemsPerPageSelect = document.getElementById('itemsPerPageSelect');

      var storeState = {
        filterOptions: null,
        urlState: null,
        productsResult: null
      };

      function setLoading(isLoading) {
        if (!loadingOverlay) {
          return;
        }
        if (isLoading) {
          loadingOverlay.hidden = false;
          loadingOverlay.setAttribute('aria-hidden', 'false');
        } else {
          loadingOverlay.hidden = true;
          loadingOverlay.setAttribute('aria-hidden', 'true');
        }
      }

      function parseUrlState(filterOptions) {
        var params = new URLSearchParams(window.location.search);
        var rawCategory = params.get('category') || '';
        var rawMaxPrice = params.get('maxPrice') || '';
        var rawMinRating = params.get('minRating') || '';
        var rawShipping = params.get('shipping') || '';
        var rawSort = params.get('sort') || '';
        var rawPage = params.get('page') || '';
        var rawPageSize = params.get('pageSize') || '';

        var categories = filterOptions && filterOptions.categories ? filterOptions.categories : [];
        var validCategoryValues = categories.map(function(c) { return c.value; });
        var category = rawCategory && validCategoryValues.indexOf(rawCategory) !== -1 ? rawCategory : null;

        var priceRanges = filterOptions && filterOptions.price_ranges ? filterOptions.price_ranges : [];
        var validMaxPrices = priceRanges.map(function(p) { return p.max_price; });
        var maxPrice = null;
        if (rawMaxPrice) {
          var parsedMax = parseFloat(rawMaxPrice);
          if (!isNaN(parsedMax) && validMaxPrices.indexOf(parsedMax) !== -1) {
            maxPrice = parsedMax;
          }
        }

        var ratingThresholds = filterOptions && filterOptions.rating_thresholds ? filterOptions.rating_thresholds : [];
        var validRatings = ratingThresholds.map(function(r) { return r.min_rating; });
        var minRating = null;
        if (rawMinRating) {
          var parsedRating = parseFloat(rawMinRating);
          if (!isNaN(parsedRating) && validRatings.indexOf(parsedRating) !== -1) {
            minRating = parsedRating;
          }
        }

        var shippingOptions = filterOptions && filterOptions.shipping_options ? filterOptions.shipping_options : [];
        var validShippingValues = shippingOptions.map(function(s) { return s.value; });
        var shipping = rawShipping && validShippingValues.indexOf(rawShipping) !== -1 ? rawShipping : null;

        var sortOptions = filterOptions && filterOptions.sort_options ? filterOptions.sort_options : [];
        var validSortValues = sortOptions.map(function(s) { return s.value; });
        var sort = rawSort && validSortValues.indexOf(rawSort) !== -1 ? rawSort : null;
        if (!sort && sortOptions.length > 0) {
          sort = sortOptions[0].value;
        }

        var page = parseInt(rawPage, 10);
        if (isNaN(page) || page < 1) {
          page = 1;
        }

        var pageSize = parseInt(rawPageSize, 10);
        if (isNaN(pageSize) || pageSize <= 0) {
          pageSize = 20;
        }

        return {
          category: category,
          maxPrice: maxPrice,
          minRating: minRating,
          shipping: shipping,
          sort: sort,
          page: page,
          pageSize: pageSize
        };
      }

      function buildListParams(filterOptions) {
        var urlState = parseUrlState(filterOptions);

        var filters = {};
        if (urlState.category) {
          filters.category = urlState.category;
        }
        if (typeof urlState.maxPrice === 'number') {
          filters.max_price = urlState.maxPrice;
        }
        if (typeof urlState.minRating === 'number') {
          filters.min_average_rating = urlState.minRating;
        }
        if (urlState.shipping === 'free_shipping') {
          filters.free_shipping_only = true;
        }

        var sort = urlState.sort ? { value: urlState.sort } : {};

        var pagination = {
          page: urlState.page,
          page_size: urlState.pageSize
        };

        return {
          filters: filters,
          sort: sort,
          pagination: pagination,
          urlState: urlState
        };
      }

      function updateUrlParams(patch, options) {
        var params = new URLSearchParams(window.location.search);
        Object.keys(patch).forEach(function(key) {
          var value = patch[key];
          if (value === null || value === undefined || value === '') {
            params.delete(key);
          } else {
            params.set(key, String(value));
          }
        });
        var newQuery = params.toString();
        var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
        var useReplace = options && options.replace;
        if (useReplace) {
          window.history.replaceState({}, '', newUrl);
        } else {
          window.history.pushState({}, '', newUrl);
        }
      }

      function renderQuickAccessSummary(container, summary) {
        if (!container) {
          return;
        }
        var watchlistCount = summary && typeof summary.watchlist_count === 'number' ? summary.watchlist_count : 0;
        var playlistCount = summary && typeof summary.playlist_count === 'number' ? summary.playlist_count : 0;
        var favoritesCount = summary && typeof summary.favorite_videos_count === 'number' ? summary.favorite_videos_count : 0;
        var remindersCount = summary && typeof summary.active_reminders_count === 'number' ? summary.active_reminders_count : 0;
        var cartItemCount = summary && typeof summary.cart_item_count === 'number' ? summary.cart_item_count : 0;

        container.innerHTML = `
          <ul class='quick-access-list'>
            <li>
              <button type='button' class='quick-access-link' data-action='open-watchlist'>
                <span class='quick-access-label'>Watchlist</span>
                <span class='quick-access-count'>${watchlistCount}</span>
              </button>
            </li>
            <li>
              <button type='button' class='quick-access-link' data-action='open-playlists'>
                <span class='quick-access-label'>Playlists</span>
                <span class='quick-access-count'>${playlistCount}</span>
              </button>
            </li>
            <li>
              <button type='button' class='quick-access-link' data-action='open-favorites'>
                <span class='quick-access-label'>Favorites</span>
                <span class='quick-access-count'>${favoritesCount}</span>
              </button>
            </li>
            <li>
              <button type='button' class='quick-access-link' data-action='open-reminders'>
                <span class='quick-access-label'>Reminders</span>
                <span class='quick-access-count'>${remindersCount}</span>
              </button>
            </li>
            <li>
              <button type='button' class='quick-access-link' data-action='open-cart'>
                <span class='quick-access-label'>Cart</span>
                <span class='quick-access-count'>${cartItemCount}</span>
              </button>
            </li>
          </ul>
        `;
      }

      function renderFilterToolbar(container, filterOptions, urlState) {
        if (!container) {
          return;
        }
        var categoryHtml = '';
        var priceHtml = '';
        var ratingHtml = '';
        var shippingHtml = '';

        var categories = filterOptions && filterOptions.categories ? filterOptions.categories : [];
        if (categories.length > 0) {
          var categoryOptionsHtml = categories.map(function(opt) {
            var checked = urlState.category === opt.value ? ' checked' : '';
            return `
              <label class='filter-option'>
                <input type='radio' name='category' value='${opt.value}' data-action='set-filter' data-filter-key='category'${checked}>
                <span>${opt.label}</span>
              </label>
            `;
          }).join('');
          var allChecked = !urlState.category ? ' checked' : '';
          categoryHtml = `
            <fieldset class='filter-group filter-group-category'>
              <legend class='filter-group-label'>Category</legend>
              <div class='filter-options'>
                <label class='filter-option'>
                  <input type='radio' name='category' value='' data-action='set-filter' data-filter-key='category'${allChecked}>
                  <span>All</span>
                </label>
                ${categoryOptionsHtml}
              </div>
            </fieldset>
          `;
        }

        var priceRanges = filterOptions && filterOptions.price_ranges ? filterOptions.price_ranges : [];
        if (priceRanges.length > 0) {
          var priceOptionsHtml = priceRanges.map(function(opt) {
            var checked = typeof urlState.maxPrice === 'number' && urlState.maxPrice === opt.max_price ? ' checked' : '';
            return `
              <label class='filter-option'>
                <input type='radio' name='price' value='${opt.max_price}' data-action='set-filter' data-filter-key='price'${checked}>
                <span>${opt.label}</span>
              </label>
            `;
          }).join('');
          var anyPriceChecked = typeof urlState.maxPrice !== 'number' ? ' checked' : '';
          priceHtml = `
            <fieldset class='filter-group filter-group-price'>
              <legend class='filter-group-label'>Price</legend>
              <div class='filter-options'>
                <label class='filter-option'>
                  <input type='radio' name='price' value='' data-action='set-filter' data-filter-key='price'${anyPriceChecked}>
                  <span>Any price</span>
                </label>
                ${priceOptionsHtml}
              </div>
            </fieldset>
          `;
        }

        var ratingThresholds = filterOptions && filterOptions.rating_thresholds ? filterOptions.rating_thresholds : [];
        if (ratingThresholds.length > 0) {
          var ratingOptionsHtml = ratingThresholds.map(function(opt) {
            var checked = typeof urlState.minRating === 'number' && urlState.minRating === opt.min_rating ? ' checked' : '';
            return `
              <label class='filter-option'>
                <input type='radio' name='rating' value='${opt.min_rating}' data-action='set-filter' data-filter-key='rating'${checked}>
                <span>${opt.label}</span>
              </label>
            `;
          }).join('');
          var anyRatingChecked = typeof urlState.minRating !== 'number' ? ' checked' : '';
          ratingHtml = `
            <fieldset class='filter-group filter-group-rating'>
              <legend class='filter-group-label'>Rating</legend>
              <div class='filter-options'>
                <label class='filter-option'>
                  <input type='radio' name='rating' value='' data-action='set-filter' data-filter-key='rating'${anyRatingChecked}>
                  <span>Any rating</span>
                </label>
                ${ratingOptionsHtml}
              </div>
            </fieldset>
          `;
        }

        var shippingOptions = filterOptions && filterOptions.shipping_options ? filterOptions.shipping_options : [];
        if (shippingOptions.length > 0) {
          var shippingOptionsHtml = shippingOptions.map(function(opt) {
            var checked = urlState.shipping === opt.value ? ' checked' : '';
            return `
              <label class='filter-option'>
                <input type='radio' name='shipping' value='${opt.value}' data-action='set-filter' data-filter-key='shipping'${checked}>
                <span>${opt.label}</span>
              </label>
            `;
          }).join('');
          var anyShippingChecked = !urlState.shipping ? ' checked' : '';
          shippingHtml = `
            <fieldset class='filter-group filter-group-shipping'>
              <legend class='filter-group-label'>Shipping</legend>
              <div class='filter-options'>
                <label class='filter-option'>
                  <input type='radio' name='shipping' value='' data-action='set-filter' data-filter-key='shipping'${anyShippingChecked}>
                  <span>Any shipping</span>
                </label>
                ${shippingOptionsHtml}
              </div>
            </fieldset>
          `;
        }

        container.innerHTML = `
          ${categoryHtml}
          ${priceHtml}
          ${ratingHtml}
          ${shippingHtml}
          <button type='button' class='link-button clear-filters-button' data-action='clear-all-filters'>Clear all filters</button>
        `;
      }

      function renderSortSelector(container, sortOptions, sortValue) {
        if (!container) {
          return;
        }
        var options = sortOptions && sortOptions.length ? sortOptions : [];
        if (!options.length) {
          container.innerHTML = '';
          return;
        }
        var optionsHtml = options.map(function(opt) {
          var selected = sortValue === opt.value ? ' selected' : '';
          return `<option value='${opt.value}'${selected}>${opt.label}</option>`;
        }).join('');
        container.innerHTML = `
          <label class='sort-label' for='sortSelect'>Sort by</label>
          <select id='sortSelect' name='sort' data-action='set-sort'>
            ${optionsHtml}
          </select>
        `;
      }

      function buildActiveFilterDescriptions(filterOptions, urlState) {
        var chips = [];
        if (!filterOptions || !urlState) {
          return chips;
        }

        if (urlState.category) {
          var categories = filterOptions.categories || [];
          var catLabel = null;
          for (var i = 0; i < categories.length; i += 1) {
            if (categories[i].value === urlState.category) {
              catLabel = categories[i].label;
              break;
            }
          }
          chips.push({ key: 'category', label: 'Category: ' + (catLabel || urlState.category) });
        }

        if (typeof urlState.maxPrice === 'number') {
          var priceRanges = filterOptions.price_ranges || [];
          var priceLabel = null;
          for (var j = 0; j < priceRanges.length; j += 1) {
            if (priceRanges[j].max_price === urlState.maxPrice) {
              priceLabel = priceRanges[j].label;
              break;
            }
          }
          chips.push({ key: 'maxPrice', label: 'Price: ' + (priceLabel || ('Up to ' + urlState.maxPrice)) });
        }

        if (typeof urlState.minRating === 'number') {
          var ratingThresholds = filterOptions.rating_thresholds || [];
          var ratingLabel = null;
          for (var k = 0; k < ratingThresholds.length; k += 1) {
            if (ratingThresholds[k].min_rating === urlState.minRating) {
              ratingLabel = ratingThresholds[k].label;
              break;
            }
          }
          chips.push({ key: 'minRating', label: 'Rating: ' + (ratingLabel || (urlState.minRating + '+')) });
        }

        if (urlState.shipping) {
          var shippingOptions = filterOptions.shipping_options || [];
          var shipLabel = null;
          for (var m = 0; m < shippingOptions.length; m += 1) {
            if (shippingOptions[m].value === urlState.shipping) {
              shipLabel = shippingOptions[m].label;
              break;
            }
          }
          chips.push({ key: 'shipping', label: 'Shipping: ' + (shipLabel || urlState.shipping) });
        }

        return chips;
      }

      function renderActiveFilterChips(container, filterOptions, urlState) {
        if (!container) {
          return;
        }
        var chips = buildActiveFilterDescriptions(filterOptions, urlState);
        if (!chips.length) {
          container.innerHTML = `<p class='no-active-filters'>No filters applied.</p>`;
          return;
        }
        var chipsHtml = chips.map(function(chip) {
          return `
            <button type='button' class='filter-chip' data-action='remove-filter-chip' data-filter-key='${chip.key}'>
              <span class='chip-label'>${chip.label}</span>
              <span class='chip-remove' aria-hidden='true'>×</span>
            </button>
          `;
        }).join('');
        container.innerHTML = `
          <div class='filter-chips-row'>
            ${chipsHtml}
            <button type='button' class='filter-chip filter-chip-clear-all' data-action='clear-all-filters'>Clear all</button>
          </div>
        `;
      }

      function renderProductGrid(container, products) {
        if (!container) {
          return;
        }
        if (!products || !products.length) {
          container.innerHTML = '';
          return;
        }
        var cardsHtml = products.map(function(p) {
          var ratingHtml = '';
          if (typeof p.average_rating === 'number') {
            var ratingValue = Math.round(p.average_rating * 10) / 10;
            ratingHtml = `<span class='product-rating'>${ratingValue}★</span>`;
          }
          var shippingHtml = '';
          if (p.is_free_shipping) {
            var label = p.free_shipping_label || 'Free shipping';
            shippingHtml = `<span class='product-shipping'>${label}</span>`;
          }
          var stockHtml = '';
          if (p.in_stock === false) {
            stockHtml = `<span class='product-stock product-stock-out'>Out of stock</span>`;
          } else if (p.in_stock === true) {
            stockHtml = `<span class='product-stock product-stock-in'>In stock</span>`;
          }
          var priceLabel = '';
          if (p.price_label) {
            priceLabel = p.price_label;
          } else if (typeof p.price === 'number') {
            priceLabel = p.price.toFixed(2) + (p.currency ? ' ' + p.currency.toUpperCase() : '');
          }
          var imageHtml = '';
          if (p.image) {
            imageHtml = `<img src='${p.image}' alt='${p.name}' loading='lazy'>`;
          } else {
            imageHtml = `<div class='product-image-placeholder'>No image</div>`;
          }
          return `
            <article class='product-card' data-product-id='${p.product_id}'>
              <button type='button' class='product-image-link' data-action='open-product' data-product-id='${p.product_id}'>
                ${imageHtml}
              </button>
              <div class='product-card-body'>
                <button type='button' class='product-name-link' data-action='open-product' data-product-id='${p.product_id}'>
                  ${p.name}
                </button>
                <p class='product-meta'>
                  <span class='product-price'>${priceLabel}</span>
                  ${ratingHtml}
                  ${shippingHtml}
                  ${stockHtml}
                </p>
              </div>
            </article>
          `;
        }).join('');

        container.innerHTML = `
          <div class='product-grid-inner'>
            ${cardsHtml}
          </div>
        `;
      }

      function renderEmptyState(container, hasFilters) {
        if (!container) {
          return;
        }
        var message = hasFilters ? 'No products match your current filters.' : 'No products are available right now.';
        var actionsHtml = '';
        if (hasFilters) {
          actionsHtml = `
            <button type='button' class='link-button' data-action='adjust-filters'>Adjust filters</button>
            <button type='button' class='link-button' data-action='clear-all-filters'>Clear all filters</button>
          `;
        }
        container.innerHTML = `
          <div class='empty-state'>
            <h2 class='empty-state-title'>Nothing to show here yet</h2>
            <p class='empty-state-message'>${message}</p>
            <div class='empty-state-actions'>
              ${actionsHtml}
            </div>
          </div>
        `;
      }

      function renderPagination(container, totalCount, page, pageSize) {
        if (!container) {
          return;
        }
        var totalPages = 1;
        if (typeof totalCount === 'number' && typeof pageSize === 'number' && pageSize > 0) {
          totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
        }
        if (totalPages <= 1) {
          container.innerHTML = '';
          container.setAttribute('aria-hidden', 'true');
          return;
        }
        var pagesHtml = '';
        for (var i = 1; i <= totalPages; i += 1) {
          var currentClass = i === page ? ' is-current' : '';
          pagesHtml += `<button type='button' class='pagination-page${currentClass}' data-action='paginate' data-page='${i}'>${i}</button>`;
        }
        var prevDisabled = page <= 1 ? ' disabled' : '';
        var nextDisabled = page >= totalPages ? ' disabled' : '';
        var prevPage = page > 1 ? page - 1 : 1;
        var nextPage = page < totalPages ? page + 1 : totalPages;

        container.innerHTML = `
          <div class='pagination-inner'>
            <button type='button' class='pagination-prev' data-action='paginate-prev' data-page='${prevPage}'${prevDisabled}>Previous</button>
            <div class='pagination-pages'>
              ${pagesHtml}
            </div>
            <button type='button' class='pagination-next' data-action='paginate-next' data-page='${nextPage}'${nextDisabled}>Next</button>
          </div>
        `;
        container.removeAttribute('aria-hidden');
      }

      function renderResultCount(container, totalCount, page, pageSize, pageItemCount) {
        if (!container) {
          return;
        }
        if (typeof totalCount !== 'number' || totalCount === 0) {
          container.textContent = '';
          return;
        }
        var startIndex = (page - 1) * pageSize + 1;
        var endIndex = startIndex + pageItemCount - 1;
        if (endIndex > totalCount) {
          endIndex = totalCount;
        }
        container.textContent = 'Showing ' + startIndex + '–' + endIndex + ' of ' + totalCount + ' items';
      }

      function handleUrlStateChange() {
        if (!storeState.filterOptions) {
          return;
        }
        setLoading(true);

        var paramsBundle = buildListParams(storeState.filterOptions);
        var filters = paramsBundle.filters;
        var sort = paramsBundle.sort;
        var pagination = paramsBundle.pagination;
        var urlState = paramsBundle.urlState;
        storeState.urlState = urlState;

        if (itemsPerPageSelect) {
          itemsPerPageSelect.value = String(urlState.pageSize);
        }

        var productsResult;
        try {
          productsResult = WebsiteSDK.listProducts(filters, sort, pagination);
        } catch (err) {
          if (productGridContainer) {
            productGridContainer.innerHTML = `<p class='store-error'>Unable to load products right now.</p>`;
          }
          if (paginationContainer) {
            paginationContainer.innerHTML = '';
          }
          if (emptyStateContainer) {
            emptyStateContainer.hidden = true;
          }
          setLoading(false);
          return;
        }

        storeState.productsResult = productsResult;

        if (filterToolbarContainer) {
          renderFilterToolbar(filterToolbarContainer, storeState.filterOptions, urlState);
        }
        if (sortSelectorContainer && storeState.filterOptions && storeState.filterOptions.sort_options) {
          renderSortSelector(sortSelectorContainer, storeState.filterOptions.sort_options, urlState.sort);
        }
        if (activeChipsContainer) {
          renderActiveFilterChips(activeChipsContainer, storeState.filterOptions, urlState);
        }

        var totalCount = productsResult && typeof productsResult.total_count === 'number' ? productsResult.total_count : 0;
        var productsArray = productsResult && Array.isArray(productsResult.products) ? productsResult.products : [];

        if (totalCount > 0 && productsArray.length > 0) {
          if (productGridContainer) {
            renderProductGrid(productGridContainer, productsArray);
          }
          if (emptyStateContainer) {
            emptyStateContainer.hidden = true;
            emptyStateContainer.innerHTML = '';
          }
          if (paginationContainer) {
            renderPagination(paginationContainer, totalCount, urlState.page, urlState.pageSize);
          }
        } else {
          if (productGridContainer) {
            productGridContainer.innerHTML = '';
          }
          if (emptyStateContainer) {
            var hasFilters = !!(urlState.category || typeof urlState.maxPrice === 'number' || typeof urlState.minRating === 'number' || urlState.shipping);
            renderEmptyState(emptyStateContainer, hasFilters);
            emptyStateContainer.hidden = false;
          }
          if (paginationContainer) {
            paginationContainer.innerHTML = '';
            paginationContainer.setAttribute('aria-hidden', 'true');
          }
        }

        if (resultCountContainer) {
          renderResultCount(resultCountContainer, totalCount, urlState.page, urlState.pageSize, productsArray.length);
        }

        setLoading(false);
      }

      function handleFilterChange(filterKey, value) {
        var patch = { page: 1 };
        if (filterKey === 'category') {
          patch.category = value || null;
        } else if (filterKey === 'price') {
          patch.maxPrice = value || null;
        } else if (filterKey === 'rating') {
          patch.minRating = value || null;
        } else if (filterKey === 'shipping') {
          patch.shipping = value || null;
        }
        updateUrlParams(patch);
        handleUrlStateChange();
      }

      function clearSingleFilter(filterKey) {
        var patch = { page: 1 };
        if (filterKey === 'category') {
          patch.category = null;
        } else if (filterKey === 'maxPrice') {
          patch.maxPrice = null;
        } else if (filterKey === 'minRating') {
          patch.minRating = null;
        } else if (filterKey === 'shipping') {
          patch.shipping = null;
        }
        updateUrlParams(patch);
        handleUrlStateChange();
      }

      function clearAllFilters(keepSort) {
        var patch = {
          category: null,
          maxPrice: null,
          minRating: null,
          shipping: null,
          page: 1
        };
        if (!keepSort) {
          patch.sort = null;
        }
        updateUrlParams(patch);
        handleUrlStateChange();
      }

      function handleItemsPerPageChange(value) {
        var newSize = parseInt(value, 10);
        if (isNaN(newSize) || newSize <= 0) {
          return;
        }
        var patch = {
          pageSize: newSize,
          page: 1
        };
        updateUrlParams(patch);
        handleUrlStateChange();
      }

      function handlePagination(newPage) {
        var pageNumber = parseInt(newPage, 10);
        if (isNaN(pageNumber) || pageNumber < 1) {
          return;
        }
        updateUrlParams({ page: pageNumber });
        handleUrlStateChange();
      }

      function navigateToProduct(productId) {
        if (!productId) {
          return;
        }
        var currentParams = new URLSearchParams(window.location.search);
        var forwardParams = new URLSearchParams();
        forwardParams.set('id', productId);
        var keysToKeep = ['category', 'maxPrice', 'minRating', 'shipping', 'sort', 'page', 'pageSize'];
        keysToKeep.forEach(function(key) {
          var value = currentParams.get(key);
          if (value !== null && value !== '') {
            forwardParams.set(key, value);
          }
        });
        var targetUrl = 'product.html?' + forwardParams.toString();
        window.location.href = targetUrl;
      }

      try {
        if (quickAccessContainers.length) {
          var summary = WebsiteSDK.getUserQuickAccessSummary();
          quickAccessContainers.forEach(function(container) {
            renderQuickAccessSummary(container, summary);
          });
        }
      } catch (errSummary) {
        console.error('Failed to load quick access summary', errSummary);
      }

      try {
        storeState.filterOptions = WebsiteSDK.getStoreFilterOptions();
      } catch (errFilters) {
        console.error('Failed to load store filter options', errFilters);
        if (productGridContainer) {
          productGridContainer.innerHTML = `<p class='store-error'>Unable to load store filters right now.</p>`;
        }
        return;
      }

      handleUrlStateChange();

      window.addEventListener('popstate', function() {
        handleUrlStateChange();
      });

      document.addEventListener('change', function(evt) {
        var target = evt.target;
        if (!target || !target.dataset) {
          return;
        }
        var action = target.dataset.action;
        if (!action) {
          return;
        }
        if (action === 'set-filter') {
          var filterKey = target.dataset.filterKey;
          var value = target.value;
          handleFilterChange(filterKey, value);
        } else if (action === 'set-sort') {
          var sortValue = target.value;
          var patch = { sort: sortValue || null, page: 1 };
          updateUrlParams(patch);
          handleUrlStateChange();
        } else if (action === 'set-items-per-page') {
          handleItemsPerPageChange(target.value);
        }
      });

      document.addEventListener('click', function(evt) {
        var target = evt.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.dataset.action;

        if (action === 'clear-all-filters') {
          clearAllFilters(true);
        } else if (action === 'remove-filter-chip') {
          var key = target.dataset.filterKey;
          clearSingleFilter(key);
        } else if (action === 'paginate') {
          var pageValue = target.dataset.page;
          handlePagination(pageValue);
        } else if (action === 'paginate-prev' || action === 'paginate-next') {
          var navPageValue = target.dataset.page;
          handlePagination(navPageValue);
        } else if (action === 'reset-view') {
          clearAllFilters(false);
          if (itemsPerPageSelect) {
            itemsPerPageSelect.value = '20';
          }
          updateUrlParams({ pageSize: null, page: 1 }, { replace: true });
          handleUrlStateChange();
        } else if (action === 'open-product') {
          var productId = target.dataset.productId;
          navigateToProduct(productId);
        } else if (action === 'adjust-filters') {
          var filterBand = document.querySelector('.store-filter-band');
          if (filterBand && filterBand.scrollIntoView) {
            filterBand.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        } else if (action === 'open-watchlist' || action === 'open-playlists' || action === 'open-favorites' || action === 'open-reminders' || action === 'open-cart') {
          // Placeholder: navigation destinations defined elsewhere
          evt.preventDefault();
        }
      });
    });
  </script>
</body>
</html>
