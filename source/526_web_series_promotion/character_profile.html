<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Water Born - Web Series</title>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Source+Sans+3:wght@300;400;600;700&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='framework.css'>
  <link rel='stylesheet' href='character_profile.css'>
</head>
<body class='site'>
  <div class='site-inner'>
    <header class='site-header'>
      <div class='header-inner'>
        <a href='index.html' class='brand' aria-label='Water Born home'>
          <span class='brand-mark'>~</span>
          <span class='brand-text'>water born</span>
          <span class='brand-trademark'>™</span>
        </a>

        <nav class='primary-nav' aria-label='Main navigation'>
          <span class='menu-label'>Menu</span>
          <ul>
            <li><a href='index.html' title='Homepage with highlights and navigation to all sections'>Home</a></li>
            <li><a href='episodes.html' title='Browse and filter all episodes of the series'>Episodes</a></li>
            <li><a href='characters.html' title='View the character gallery and open character profiles'>Characters</a></li>
            <li><a href='events.html' title='See live and upcoming events including online Q&amp;As'>Events</a></li>
            <li><a href='store.html' title='Shop official series merchandise like posters and apparel'>Store</a></li>
            <li><a href='videos.html' title='Watch behind-the-scenes and bonus videos'>Videos</a></li>
            <li><a href='schedule.html' title='Check upcoming episode times and plan weekend binges'>Schedule</a></li>
            <li><a href='community.html' title='Access polls and episode discussion threads'>Community</a></li>
            <li><a href='cart.html' title='View and manage items added to your shopping cart'>Cart</a></li>
          </ul>
        </nav>
      </div>
      <div class='header-divider pattern-strip' aria-hidden='true'></div>
    </header>

    <main id='content' class='site-content' role='main'>
      <section class='quick-access-band' data-component='header-quick-access-bar' data-populate='quick_access_summary' aria-label='Quick access summary'>
        <!-- Quick access header bar will be rendered here -->
      </section>

      <div class='pattern-strip pattern-strip--between' aria-hidden='true'></div>

      <section class='character-profile-root' data-component='character-profile-layout' data-populate='character_profile' aria-live='polite'>
        <!-- Character profile layout (loading, error, or content) will be rendered here -->
      </section>
    </main>

    <footer class='site-footer'>
      <div class='footer-divider pattern-strip' aria-hidden='true'></div>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <ul>
            <li><a href='about.html' title='Learn more about the series and this site'>About</a></li>
            <li><a href='help.html' title='Get help using features like watchlists, playlists, and reminders'>Help &amp; Support</a></li>
            <li><a href='newsletter.html' title='Subscribe to the series newsletter for updates and behind-the-scenes content'>Newsletter</a></li>
            <li><a href='policies.html' title='Read privacy policy, terms of use, and community guidelines'>Policies</a></li>
          </ul>
        </nav>
        <p class='footer-meta'>
          <span class='footer-title'>Water Born Web Series</span>
          <span class='footer-copy'>&copy; 2024 Water Born. All rights reserved.</span>
        </p>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var BIO_THRESHOLD = 600;
      var MOMENT_THRESHOLD = 280;

      var pageState = {
        currentCharacterId: null,
        characterProfile: null,
        loading: false,
        errorCode: null,
        errorMessage: null,
        bioExpanded: false,
        momentExpanded: {}
      };

      var characterProfileContainer = null;
      var quickAccessContainer = null;

      function getUrlCharacterId() {
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        if (!id) return null;
        id = id.trim();
        return id === '' ? null : id;
      }

      function escapeHtml(value) {
        if (value == null) return '';
        return String(value).replace(/[&<>"']/g, function(ch) {
          switch (ch) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            case '\'': return '&#39;';
            default: return ch;
          }
        });
      }

      function formatParagraphs(text) {
        if (!text) return '';
        var escaped = escapeHtml(text);
        var parts = escaped.split(/\n{2,}/);
        var html = parts.map(function(block) {
          var withBreaks = block.replace(/\n/g, '<br>');
          return '<p>' + withBreaks + '</p>';
        }).join('');
        return html;
      }

      function setError(code, message) {
        pageState.errorCode = code;
        pageState.errorMessage = message;
      }

      function clearError() {
        pageState.errorCode = null;
        pageState.errorMessage = null;
      }

      function renderQuickAccess(container) {
        quickAccessContainer = container;
        var summary = null;
        try {
          if (typeof WebsiteSDK !== 'undefined' && WebsiteSDK && typeof WebsiteSDK.getUserQuickAccessSummary === 'function') {
            summary = WebsiteSDK.getUserQuickAccessSummary();
          }
        } catch (err) {
          summary = null;
        }

        var watchlistCount = summary && typeof summary.watchlist_count === 'number' ? summary.watchlist_count : 0;
        var playlistCount = summary && typeof summary.playlist_count === 'number' ? summary.playlist_count : 0;
        var favoriteCount = summary && typeof summary.favorite_videos_count === 'number' ? summary.favorite_videos_count : 0;
        var reminderCount = summary && typeof summary.active_reminders_count === 'number' ? summary.active_reminders_count : 0;
        var cartCount = summary && typeof summary.cart_item_count === 'number' ? summary.cart_item_count : 0;

        container.innerHTML = `
          <div class="quick-access-inner content-column">
            <h2 class="quick-access-title">Quick access</h2>
            <ul class="quick-access-list">
              <li class="quick-access-item">
                <button type="button" class="quick-access-link" data-action="open-watchlist">
                  <span class="quick-access-label">Watchlist</span>
                  <span class="quick-access-count" aria-label="${watchlistCount} items in watchlist">${watchlistCount}</span>
                </button>
              </li>
              <li class="quick-access-item">
                <button type="button" class="quick-access-link" data-action="open-playlists">
                  <span class="quick-access-label">Playlists</span>
                  <span class="quick-access-count" aria-label="${playlistCount} playlists">${playlistCount}</span>
                </button>
              </li>
              <li class="quick-access-item">
                <button type="button" class="quick-access-link" data-action="open-favorites">
                  <span class="quick-access-label">Favorite videos</span>
                  <span class="quick-access-count" aria-label="${favoriteCount} favorite videos">${favoriteCount}</span>
                </button>
              </li>
              <li class="quick-access-item">
                <button type="button" class="quick-access-link" data-action="open-reminders">
                  <span class="quick-access-label">Reminders</span>
                  <span class="quick-access-count" aria-label="${reminderCount} active reminders">${reminderCount}</span>
                </button>
              </li>
              <li class="quick-access-item">
                <button type="button" class="quick-access-link" data-action="open-cart">
                  <span class="quick-access-label">Cart</span>
                  <span class="quick-access-count" aria-label="${cartCount} items in cart">${cartCount}</span>
                </button>
              </li>
            </ul>
          </div>
        `;
      }

      function renderCharacterProfile(container) {
        characterProfileContainer = container;
        if (!container) return;

        if (pageState.loading) {
          container.innerHTML = `
            <section class="profile-loading-band" data-component="profile-loading-state">
              <div class="content-column">
                <p class="loading-label">Loading profile…</p>
              </div>
            </section>
          `;
          return;
        }

        if (pageState.errorCode || !pageState.currentCharacterId) {
          var heading = 'Character not available';
          var message = pageState.errorMessage || 'We could not load this character right now.';
          var showRetry = pageState.errorCode && pageState.errorCode !== 'missing_id';

          if (pageState.errorCode === 'missing_id') {
            heading = 'No character selected';
            message = 'This page needs a character id in the URL, like ?id=char_1.';
          } else if (pageState.errorCode === 'not_found') {
            heading = 'Character not found';
            message = 'We could not find a character matching this link.';
          }

          container.innerHTML = `
            <section class="profile-error-band" data-component="profile-error-state">
              <div class="content-column">
                <h1 class="error-heading">${escapeHtml(heading)}</h1>
                <p class="error-message">${escapeHtml(message)}</p>
                ${showRetry ? '<button type="button" class="error-retry" data-action="retry-profile-load">Retry loading character</button>' : ''}
              </div>
            </section>
          `;
          return;
        }

        var profile = pageState.characterProfile;
        if (!profile || !profile.character_id) {
          setError('not_found', 'We could not find a character matching this link.');
          renderCharacterProfile(container);
          return;
        }

        var name = escapeHtml(profile.name || 'Unknown character');
        var shortDescription = escapeHtml(profile.short_description || '');
        var biography = profile.biography || '';
        var hasBiography = biography && biography.trim() !== '';

        var bioTextForDisplay = biography;
        var isTruncated = false;
        if (!pageState.bioExpanded && biography && biography.length > BIO_THRESHOLD) {
          bioTextForDisplay = biography.slice(0, BIO_THRESHOLD).trim() + '…';
          isTruncated = true;
        }
        var bioHtml = hasBiography ? formatParagraphs(bioTextForDisplay) : '<p>Biography coming soon.</p>';

        var heroStyle = '';
        if (profile.profile_image) {
          try {
            var url = String(profile.profile_image);
            heroStyle = ' style=\'background-image: url(' + JSON.stringify(url).slice(1, -1) + ');\'';
          } catch (e) {
            heroStyle = '';
          }
        }

        var keyMoments = Array.isArray(profile.key_moments) ? profile.key_moments : [];
        var hasKeyMoments = keyMoments.length > 0;

        var momentsHtml = '';
        if (hasKeyMoments) {
          momentsHtml = '<ol class=\'key-moments-list\'>\n';
          for (var i = 0; i < keyMoments.length; i++) {
            var m = keyMoments[i] || {};
            var mTitle = escapeHtml(m.episode_title || 'Untitled episode');
            var mLabel = escapeHtml(m.season_episode_label || '');
            var mDescRaw = m.description || '';
            var momentExpanded = !!pageState.momentExpanded[i];
            var momentTruncated = false;
            var mTextForDisplay = mDescRaw;
            if (!momentExpanded && mDescRaw && mDescRaw.length > MOMENT_THRESHOLD) {
              mTextForDisplay = mDescRaw.slice(0, MOMENT_THRESHOLD).trim() + '…';
              momentTruncated = true;
            }
            var mDescHtml = mTextForDisplay ? formatParagraphs(mTextForDisplay) : '<p>No description available.</p>';
            var toggleLabel = momentExpanded ? 'Show less' : 'Show more';
            var showToggle = mDescRaw && mDescRaw.length > MOMENT_THRESHOLD;

            momentsHtml += `
              <li class="key-moment-item" data-moment-index="${i}">
                <div class="key-moment-header">
                  <h3 class="key-moment-title">${mTitle}</h3>
                  ${mLabel ? `<p class="key-moment-meta">${mLabel}</p>` : ''}
                </div>
                <div class="key-moment-body">
                  <div class="key-moment-description">${mDescHtml}</div>
                  ${showToggle ? `<button type="button" class="key-moment-toggle" data-action="toggle-moment" data-moment-index="${i}">${toggleLabel}</button>` : ''}
                </div>
              </li>`;
          }
          momentsHtml += '</ol>';
        } else {
          momentsHtml = '<p class=\'key-moments-empty\'>No key moments have been highlighted for this character yet.</p>';
        }

        var bioToggleHtml = '';
        if (hasBiography && biography.length > BIO_THRESHOLD) {
          var bioToggleLabel = pageState.bioExpanded ? 'Show less' : 'Show more';
          bioToggleHtml = '<button type=\'button\' class=\'bio-toggle\' data-action=\'toggle-biography\'>' + bioToggleLabel + '</button>';
        }

        var heroSummaryHtml = '';
        if (shortDescription) {
          heroSummaryHtml = '<p class=\'character-tagline\'>' + shortDescription + '</p>';
        }

        var viewEpisodesLabel = 'View episodes featuring ' + name;

        var profileHtml = '
          <div class=\'character-profile-stack\'>
            <section class=\'character-hero-band\' data-component=\'character-header-section\'' + heroStyle + '>
              <div class=\'content-column character-hero-inner\'>
                <div class=\'character-hero-text\'>
                  <h1 class=\'character-name\'>' + name + '</h1>
                  ' + heroSummaryHtml + '
                  <button type=\'button\' class=\'hero-cta-link\' data-component=\'view-episodes-button\' data-action=\'view-episodes\' aria-label=\'' + escapeHtml(viewEpisodesLabel) + '\'>' + escapeHtml(viewEpisodesLabel) + '</button>
                </div>
              </div>
            </section>

            <div class=\'pattern-strip pattern-strip--between\' aria-hidden=\'true\'></div>

            <section class=\'character-bio-band\' data-component=\'character-biography-section\'>
              <div class=\'content-column\'>
                <h2 class=\'section-heading\'>Biography</h2>
                <div class=\'character-biography\'>' + bioHtml + '</div>
                ' + bioToggleHtml + '
              </div>
            </section>

            <div class=\'pattern-strip pattern-strip--between\' aria-hidden=\'true\'></div>

            <section class=\'character-moments-band\' data-component=\'character-key-moments-list\'>
              <div class=\'content-column\'>
                <h2 class=\'section-heading\'>Key moments</h2>
                ' + momentsHtml + '
              </div>
            </section>
          </div>
        ';

        container.innerHTML = profileHtml;
      }

      function loadCharacterProfileById(id) {
        pageState.currentCharacterId = id;
        pageState.characterProfile = null;
        pageState.bioExpanded = false;
        pageState.momentExpanded = {};
        clearError();

        if (!id) {
          pageState.loading = false;
          setError('missing_id', 'No character id was provided in the URL.');
          if (characterProfileContainer) {
            renderCharacterProfile(characterProfileContainer);
          }
          return;
        }

        pageState.loading = true;
        if (characterProfileContainer) {
          renderCharacterProfile(characterProfileContainer);
        }

        try {
          if (typeof WebsiteSDK === 'undefined' || !WebsiteSDK || typeof WebsiteSDK.getCharacterProfile !== 'function') {
            setError('load_failed', 'Character service is not available.');
          } else {
            var profile = WebsiteSDK.getCharacterProfile(id);
            if (!profile || !profile.character_id) {
              setError('not_found', 'We could not find a character matching this link.');
            } else {
              pageState.characterProfile = profile;
            }
          }
        } catch (err) {
          setError('load_failed', 'Something went wrong while loading this character.');
        }

        pageState.loading = false;
        if (characterProfileContainer) {
          renderCharacterProfile(characterProfileContainer);
        }
      }

      function handleUrlChange() {
        var id = getUrlCharacterId();
        if (id !== pageState.currentCharacterId) {
          loadCharacterProfileById(id);
        }
      }

      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(el) {
        var type = el.getAttribute('data-populate');
        if (type === 'quick_access_summary') {
          renderQuickAccess(el);
        } else if (type === 'character_profile') {
          characterProfileContainer = el;
        }
      });

      handleUrlChange();
      window.addEventListener('popstate', function() {
        handleUrlChange();
      });

      document.addEventListener('click', function(evt) {
        var target = evt.target;
        if (!target) return;
        var actionEl = target.closest('[data-action]');
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');

        if (action === 'view-episodes') {
          if (pageState.characterProfile && pageState.characterProfile.character_id) {
            var cid = pageState.characterProfile.character_id;
            var url = 'episodes.html?characterId=' + encodeURIComponent(cid) + '&sort=release_date_desc';
            window.location.href = url;
          }
          return;
        }

        if (action === 'toggle-biography') {
          pageState.bioExpanded = !pageState.bioExpanded;
          if (characterProfileContainer) {
            renderCharacterProfile(characterProfileContainer);
          }
          return;
        }

        if (action === 'toggle-moment') {
          var indexAttr = actionEl.getAttribute('data-moment-index');
          var idx = indexAttr != null ? parseInt(indexAttr, 10) : NaN;
          if (!isNaN(idx)) {
            var current = !!pageState.momentExpanded[idx];
            pageState.momentExpanded[idx] = !current;
            if (characterProfileContainer) {
              renderCharacterProfile(characterProfileContainer);
            }
          }
          return;
        }

        if (action === 'retry-profile-load') {
          if (pageState.currentCharacterId) {
            loadCharacterProfileById(pageState.currentCharacterId);
          } else {
            handleUrlChange();
          }
          return;
        }

        if (action === 'open-watchlist' || action === 'open-playlists' || action === 'open-favorites' || action === 'open-reminders' || action === 'open-cart') {
          return;
        }
      });
    });
  </script>
</body>
</html>
