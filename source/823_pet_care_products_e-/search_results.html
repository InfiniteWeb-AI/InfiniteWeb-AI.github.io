<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pet Care Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="search_results.css" />
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="brand" aria-label="Pet care home">
          <span class="brand-mark">●</span>
          <span class="brand-text">pet<span class="brand-text-accent">care</span></span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <ul class="nav-list">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
              <a href="category.html?categoryId=dogs" class="nav-link">Dogs</a>
            </li>
            <li class="nav-item">
              <a href="category.html?categoryId=cats" class="nav-link">Cats</a>
            </li>
            <li class="nav-item">
              <a href="category.html?categoryId=grooming" class="nav-link">Grooming</a>
            </li>
            <li class="nav-item">
              <a href="wishlist.html" class="nav-link">Wishlist</a>
            </li>
            <li class="nav-item">
              <a href="cart.html" class="nav-link">Cart</a>
            </li>
          </ul>
        </nav>
        <div class="header-spacer" aria-hidden="true"></div>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <section class="search-summary-band" data-component="search-query-summary" data-populate="search-query-summary" aria-label="Search summary"></section>

      <section class="search-results-layout" aria-label="Search results">
        <div class="container search-results-inner">
          <aside class="filters-column" data-component="filter-sidebar" aria-label="Filter products">
            <div class="filters-sticky">
              <div class="filters-header">
                <h2 class="filters-title">Filters</h2>
                <button type="button" class="filters-clear-link" data-action="clear-all-filters">Clear all</button>
              </div>
              <div class="category-refinements" data-component="category-refinement-links" data-populate="category-refinement-links"></div>
              <div class="filters-body" data-populate="filter-sidebar"></div>
            </div>
          </aside>

          <div class="results-column">
            <div class="results-tools">
              <div class="applied-filters-bar" data-component="applied-filters-bar" data-populate="applied-filters" aria-label="Applied filters"></div>
              <div class="sort-page-size-bar" data-component="sort-and-page-size-bar" data-populate="sort-and-page-size"></div>
            </div>

            <div class="results-main">
              <div class="results-status" data-component="empty-or-error-state" data-populate="empty-or-error-state"></div>
              <div class="product-grid" data-component="product-grid" data-populate="product-grid" aria-live="polite"></div>
            </div>

            <nav class="pagination-controls" data-component="pagination-controls" data-populate="pagination-controls" aria-label="Search results pagination"></nav>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-brand">
          <a href="index.html" class="brand brand--footer" aria-label="Pet care home">
            <span class="brand-mark">●</span>
            <span class="brand-text">pet<span class="brand-text-accent">care</span></span>
          </a>
          <p class="footer-tagline">Modern pet care products for happy, healthy companions.</p>
        </div>
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-links">
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="help.html">Help / FAQ</a></li>
            <li><a href="shipping_returns.html">Shipping &amp; Returns</a></li>
            <li><a href="privacy.html">Privacy Policy</a></li>
            <li><a href="terms.html">Terms &amp; Conditions</a></li>
          </ul>
        </nav>
      </div>
      <div class="footer-bottom">
        <div class="container footer-bottom-inner">
          <p class="footer-copy">&copy; <span data-year>2026</span> PetCare. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    (function() {
      'use strict';

      var searchState = {
        query: '',
        filters: {},
        sortBy: 'relevance',
        page: 1,
        pageSize: 20,
        filterOptions: null,
        searchResponse: null,
        lastError: null,
        wishlistProductIds: {}
      };

      var FILTER_PARAM_NAMES = [
        'petType',
        'petWeightRange',
        'ratingMin',
        'priceMin',
        'priceMax',
        'freeShippingOnly',
        'brandId',
        'doseCountMin',
        'bagCountMin'
      ];

      var MULTI_VALUE_PARAMS = ['petType', 'brandId'];

      document.addEventListener('DOMContentLoaded', function() {
        attachGlobalEventHandlers();
        parseUrlAndFetch();
        window.addEventListener('popstate', function() {
          parseUrlAndFetch(true);
        });
      });

      function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value).replace(/[&<>"']/g, function(ch) {
          switch (ch) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            case '\'': return '&#39;';
            default: return ch;
          }
        });
      }

      function toTitleCase(value) {
        if (!value) return '';
        var str = String(value).replace(/_/g, ' ');
        return str.replace(/\b\w/g, function(ch) { return ch.toUpperCase(); });
      }

      function formatPrice(value) {
        if (typeof value !== 'number' || isNaN(value)) return '';
        return '$' + value.toFixed(2);
      }

      function getArrayParam(params, name) {
        var all = params.getAll(name);
        if (!all || all.length === 0) return null;
        if (all.length === 1 && all[0].indexOf(',') !== -1) {
          var parts = all[0].split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
          return parts.length ? parts : null;
        }
        return all;
      }

      function parseUrlAndFetch(fromPopstate) {
        var url = new URL(window.location.href);
        var params = url.searchParams;

        var query = (params.get('query') || '').trim();
        searchState.query = query;
        searchState.lastError = null;

        var filters = {};

        var petTypes = getArrayParam(params, 'petType');
        if (petTypes && petTypes.length) {
          filters.pet_types = petTypes;
        }

        var petWeightRange = params.get('petWeightRange');
        if (petWeightRange) {
          filters.pet_weight_range = petWeightRange;
        }

        var ratingMinRaw = params.get('ratingMin');
        if (ratingMinRaw !== null && ratingMinRaw !== '') {
          var ratingMin = parseFloat(ratingMinRaw);
          if (!isNaN(ratingMin)) {
            filters.rating_min = ratingMin;
          }
        }

        var priceMinRaw = params.get('priceMin');
        if (priceMinRaw !== null && priceMinRaw !== '') {
          var priceMin = parseFloat(priceMinRaw);
          if (!isNaN(priceMin)) {
            filters.price_min = priceMin;
          }
        }

        var priceMaxRaw = params.get('priceMax');
        if (priceMaxRaw !== null && priceMaxRaw !== '') {
          var priceMax = parseFloat(priceMaxRaw);
          if (!isNaN(priceMax)) {
            filters.price_max = priceMax;
          }
        }

        var freeShippingOnlyParam = params.get('freeShippingOnly');
        if (freeShippingOnlyParam !== null && freeShippingOnlyParam !== 'false') {
          filters.free_shipping_only = true;
        }

        var brandIds = getArrayParam(params, 'brandId');
        if (brandIds && brandIds.length) {
          filters.brand_ids = brandIds;
        }

        var doseCountMinRaw = params.get('doseCountMin');
        if (doseCountMinRaw !== null && doseCountMinRaw !== '') {
          var doseCountMin = parseInt(doseCountMinRaw, 10);
          if (!isNaN(doseCountMin)) {
            filters.dose_count_min = doseCountMin;
          }
        }

        var bagCountMinRaw = params.get('bagCountMin');
        if (bagCountMinRaw !== null && bagCountMinRaw !== '') {
          var bagCountMin = parseInt(bagCountMinRaw, 10);
          if (!isNaN(bagCountMin)) {
            filters.bag_count_min = bagCountMin;
          }
        }

        searchState.filters = filters;

        var sortBy = params.get('sortBy') || 'relevance';
        searchState.sortBy = sortBy;

        var pageRaw = params.get('page');
        var page = parseInt(pageRaw || '1', 10);
        if (isNaN(page) || page < 1) page = 1;
        searchState.page = page;

        var pageSizeRaw = params.get('pageSize');
        var pageSize = parseInt(pageSizeRaw || '20', 10);
        if (isNaN(pageSize) || pageSize <= 0) pageSize = 20;
        searchState.pageSize = pageSize;

        if (!query) {
          searchState.filterOptions = null;
          searchState.searchResponse = null;
          renderAll();
          return;
        }

        try {
          searchState.filterOptions = WebsiteSDK.getSearchFilterOptions(query);
        } catch (e) {
          console.error('Error fetching filter options', e);
          searchState.filterOptions = null;
          searchState.lastError = 'filterOptions';
        }

        try {
          var filtersArg = Object.keys(filters).length ? filters : undefined;
          searchState.searchResponse = WebsiteSDK.searchProducts(query, filtersArg, sortBy, page, pageSize);
        } catch (e2) {
          console.error('Error searching products', e2);
          searchState.searchResponse = null;
          searchState.lastError = 'search';
        }

        renderAll();
      }

      function renderAll() {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(el) {
          var type = el.getAttribute('data-populate');
          if (type === 'search-query-summary') {
            renderSearchQuerySummary(el);
          } else if (type === 'filter-sidebar') {
            renderFilterSidebar(el);
          } else if (type === 'category-refinement-links') {
            renderCategoryRefinements(el);
          } else if (type === 'applied-filters') {
            renderAppliedFilters(el);
          } else if (type === 'sort-and-page-size') {
            renderSortAndPageSize(el);
          } else if (type === 'product-grid') {
            renderProductGrid(el);
          } else if (type === 'pagination-controls') {
            renderPagination(el);
          } else if (type === 'empty-or-error-state') {
            renderEmptyOrError(el);
          }
        });
      }

      function renderSearchQuerySummary(container) {
        var query = searchState.query;
        var response = searchState.searchResponse;
        var total = 0;
        if (response && response.pagination && typeof response.pagination.total_items === 'number') {
          total = response.pagination.total_items;
        }

        if (!query) {
          container.innerHTML = "" +
            "<div class='search-summary-inner container'>" +
              "<div class='search-summary-text'>" +
                "<p class='search-summary-label'>Search</p>" +
                "<h1 class='search-summary-title'>Search our pet care products</h1>" +
                "<p class='search-summary-subtitle'>Use the search bar in the header to find food, treatments, toys, and more for your pet.</p>" +
              "</div>" +
            "</div>";
          return;
        }

        var countLabel;
        if (!response || !response.pagination) {
          countLabel = 'Loading results...';
        } else if (total === 1) {
          countLabel = '1 product found';
        } else {
          countLabel = total + ' products found';
        }

        container.innerHTML = "" +
          "<div class='search-summary-inner container'>" +
            "<div class='search-summary-text'>" +
              "<p class='search-summary-label'>Search</p>" +
              "<h1 class='search-summary-title'>Results for “" + escapeHtml(query) + "”</h1>" +
              "<p class='search-summary-subtitle'>" + escapeHtml(countLabel) + "</p>" +
            "</div>" +
            "<div class='search-summary-actions'>" +
              "<button type='button' class='btn-link' data-action='clear-all-filters'>Clear all filters</button>" +
            "</div>" +
          "</div>";
      }

      function renderCategoryRefinements(container) {
        var response = searchState.searchResponse;
        if (!searchState.query || !response || !response.products || !response.products.length) {
          container.innerHTML = '';
          return;
        }

        var products = response.products;
        var categoriesMap = {};
        products.forEach(function(p) {
          if (!p || !p.category_slug) return;
          if (!categoriesMap[p.category_slug]) {
            categoriesMap[p.category_slug] = p.category_name || p.category_slug;
          }
        });

        var categoryKeys = Object.keys(categoriesMap);
        if (!categoryKeys.length) {
          container.innerHTML = '';
          return;
        }

        var html = "" +
          "<section class='filter-section filter-section--categories'>" +
            "<h3 class='filter-section-title'>Narrow by category</h3>" +
            "<div class='category-refinement-list'>";

        categoryKeys.forEach(function(slug) {
          html += "<button type='button' class='chip chip--category' data-action='category-refinement' data-category-id='" + escapeHtml(slug) + "'>" + escapeHtml(categoriesMap[slug]) + "</button>";
        });

        html += "</div></section>";
        container.innerHTML = html;
      }

      function renderFilterSidebar(container) {
        if (!searchState.query || !searchState.filterOptions || !searchState.searchResponse) {
          container.innerHTML = '';
          return;
        }

        var filters = searchState.filterOptions;
        var applied = searchState.searchResponse.applied_filters || {};

        var selectedPetTypes = applied.pet_types || [];
        var selectedWeight = applied.pet_weight_range || '';
        var ratingMin = (typeof applied.rating_min === 'number') ? applied.rating_min : null;
        var priceMin = (typeof applied.price_min === 'number') ? applied.price_min : null;
        var priceMax = (typeof applied.price_max === 'number') ? applied.price_max : null;
        var freeShipping = !!applied.free_shipping_only;
        var selectedBrandIds = applied.brand_ids || [];
        var doseCountMin = (typeof applied.dose_count_min === 'number') ? applied.dose_count_min : null;
        var bagCountMin = (typeof applied.bag_count_min === 'number') ? applied.bag_count_min : null;

        var petTypesHtml = '';
        if (filters.pet_type_options && filters.pet_type_options.length) {
          petTypesHtml = "<section class='filter-section'>" +
            "<h3 class='filter-section-title'>Pet type</h3>" +
            "<div class='filter-options'>";
          filters.pet_type_options.forEach(function(opt) {
            var checked = selectedPetTypes.indexOf(opt) !== -1 ? ' checked' : '';
            petTypesHtml += "<label class='filter-option'>" +
              "<input type='checkbox' data-action='filter-change' data-filter-param='petType' value='" + escapeHtml(opt) + "'" + checked + " />" +
              "<span>" + escapeHtml(toTitleCase(opt)) + "</span>" +
            "</label>";
          });
          petTypesHtml += "</div></section>";
        }

        var weightHtml = '';
        if (filters.pet_weight_range_options && filters.pet_weight_range_options.length) {
          weightHtml = "<section class='filter-section'>" +
            "<h3 class='filter-section-title'>Pet weight</h3>" +
            "<div class='filter-options filter-options--stacked'>";
          filters.pet_weight_range_options.forEach(function(opt) {
            var checked = (selectedWeight === opt) ? ' checked' : '';
            weightHtml += "<label class='filter-option'>" +
              "<input type='radio' name='petWeightRange' data-action='filter-change' data-filter-param='petWeightRange' value='" + escapeHtml(opt) + "'" + checked + " />" +
              "<span>" + escapeHtml(opt.replace(/_/g, ' ').replace(/lb/gi, ' lb')) + "</span>" +
            "</label>";
          });
          weightHtml += "</div></section>";
        }

        var ratingHtml = '';
        if (filters.rating_thresholds && filters.rating_thresholds.length) {
          ratingHtml = "<section class='filter-section'>" +
            "<h3 class='filter-section-title'>Minimum rating</h3>" +
            "<div class='filter-options filter-options--stacked'>";
          filters.rating_thresholds.forEach(function(th) {
            var checked = (ratingMin !== null && ratingMin === th) ? ' checked' : '';
            ratingHtml += "<label class='filter-option'>" +
              "<input type='radio' name='ratingMin' data-action='filter-change' data-filter-param='ratingMin' value='" + escapeHtml(th) + "'" + checked + " />" +
              "<span>" + escapeHtml(th + '+ stars') + "</span>" +
            "</label>";
          });
          ratingHtml += "</div></section>";
        }

        var priceMinValue = (priceMin !== null && !isNaN(priceMin)) ? String(priceMin) : '';
        var priceMaxValue = (priceMax !== null && !isNaN(priceMax)) ? String(priceMax) : '';

        var priceRangesHtml = '';
        if (filters.price_ranges && filters.price_ranges.length) {
          priceRangesHtml = "<div class='filter-subsection'>" +
            "<p class='filter-subsection-title'>Suggested ranges</p>" +
            "<div class='filter-options filter-options--stacked'>";
          filters.price_ranges.forEach(function(range, index) {
            var isSelected = false;
            if (priceMin !== null && priceMax !== null &&
                typeof range.min_price === 'number' && typeof range.max_price === 'number') {
              if (range.min_price === priceMin && range.max_price === priceMax) {
                isSelected = true;
              }
            }
            var checked = isSelected ? ' checked' : '';
            var inputId = 'priceRange_' + index;
            priceRangesHtml += "<label class='filter-option' for='" + escapeHtml(inputId) + "'>" +
              "<input id='" + escapeHtml(inputId) + "' type='radio' name='priceRange' data-action='price-range-select' data-min-price='" + escapeHtml(range.min_price) + "' data-max-price='" + escapeHtml(range.max_price) + "'" + checked + " />" +
              "<span>" + escapeHtml(range.label || (formatPrice(range.min_price) + ' - ' + formatPrice(range.max_price))) + "</span>" +
            "</label>";
          });
          priceRangesHtml += "</div></div>";
        }

        var priceCustomHtml = "" +
          "<div class='filter-subsection filter-subsection--custom-price'>" +
            "<p class='filter-subsection-title'>Custom price</p>" +
            "<div class='price-inputs'>" +
              "<label class='price-input'>" +
                "<span>Min</span>" +
                "<input type='number' id='priceMinInput' data-action='price-min-input' min='0' step='1' value='" + escapeHtml(priceMinValue) + "' />" +
              "</label>" +
              "<span class='price-separator'>–</span>" +
              "<label class='price-input'>" +
                "<span>Max</span>" +
                "<input type='number' id='priceMaxInput' data-action='price-max-input' min='0' step='1' value='" + escapeHtml(priceMaxValue) + "' />" +
              "</label>" +
            "</div>" +
            "<button type='button' class='btn-secondary btn-apply-price' data-action='apply-price-range'>Apply</button>" +
          "</div>";

        var priceHtml = "<section class='filter-section'>" +
          "<h3 class='filter-section-title'>Price</h3>" +
          priceRangesHtml +
          priceCustomHtml +
        "</section>";

        var shippingHtml = '';
        if (searchState.filterOptions && searchState.filterOptions.free_shipping_available) {
          var checkedShipping = freeShipping ? ' checked' : '';
          shippingHtml = "<section class='filter-section'>" +
            "<h3 class='filter-section-title'>Shipping</h3>" +
            "<div class='filter-options'>" +
              "<label class='filter-option'>" +
                "<input type='checkbox' data-action='filter-change' data-filter-param='freeShippingOnly'" + checkedShipping + " />" +
                "<span>Free shipping only</span>" +
              "</label>" +
            "</div>" +
          "</section>";
        }

        var brandOptionsMap = {};
        var brandsHtml = '';
        if (filters.brand_options && filters.brand_options.length) {
          brandsHtml = "<section class='filter-section'>" +
            "<h3 class='filter-section-title'>Brand</h3>" +
            "<div class='filter-options filter-options--stacked'>";
          filters.brand_options.forEach(function(opt) {
            brandOptionsMap[opt.brand_id] = opt.brand_name;
            var checked = selectedBrandIds.indexOf(opt.brand_id) !== -1 ? ' checked' : '';
            brandsHtml += "<label class='filter-option'>" +
              "<input type='checkbox' data-action='filter-change' data-filter-param='brandId' value='" + escapeHtml(opt.brand_id) + "'" + checked + " />" +
              "<span>" + escapeHtml(opt.brand_name) + "</span>" +
            "</label>";
          });
          brandsHtml += "</div></section>";
        }

        var dosesHtml = '';
        if (filters.pack_size_or_doses_options && filters.pack_size_or_doses_options.length) {
          dosesHtml = "<section class='filter-section'>" +
            "<h3 class='filter-section-title'>Dose count</h3>" +
            "<div class='filter-options filter-options--stacked'>";
          filters.pack_size_or_doses_options.forEach(function(opt, index) {
            var checked = (doseCountMin !== null && doseCountMin === opt.min_dose_count) ? ' checked' : '';
            var id = 'doseCount_' + index;
            dosesHtml += "<label class='filter-option' for='" + escapeHtml(id) + "'>" +
              "<input id='" + escapeHtml(id) + "' type='radio' name='doseCountMin' data-action='filter-change' data-filter-param='doseCountMin' value='" + escapeHtml(opt.min_dose_count) + "'" + checked + " />" +
              "<span>" + escapeHtml(opt.label || (opt.min_dose_count + '+ doses')) + "</span>" +
            "</label>";
          });
          dosesHtml += "</div></section>";
        }

        var bagsHtml = '';
        if (filters.bag_count_options && filters.bag_count_options.length) {
          bagsHtml = "<section class='filter-section'>" +
            "<h3 class='filter-section-title'>Bag count</h3>" +
            "<div class='filter-options filter-options--stacked'>";
          filters.bag_count_options.forEach(function(opt, index) {
            var checked = (bagCountMin !== null && bagCountMin === opt.min_bag_count) ? ' checked' : '';
            var id = 'bagCount_' + index;
            bagsHtml += "<label class='filter-option' for='" + escapeHtml(id) + "'>" +
              "<input id='" + escapeHtml(id) + "' type='radio' name='bagCountMin' data-action='filter-change' data-filter-param='bagCountMin' value='" + escapeHtml(opt.min_bag_count) + "'" + checked + " />" +
              "<span>" + escapeHtml(opt.label || (opt.min_bag_count + '+ bags')) + "</span>" +
            "</label>";
          });
          bagsHtml += "</div></section>";
        }

        var footerHtml = "<div class='filters-footer'>" +
          "<button type='button' class='btn-secondary' data-action='clear-all-filters'>Clear all filters</button>" +
        "</div>";

        container.innerHTML = petTypesHtml + weightHtml + ratingHtml + priceHtml + shippingHtml + brandsHtml + dosesHtml + bagsHtml + footerHtml;
      }

      function renderAppliedFilters(container) {
        var response = searchState.searchResponse;
        if (!searchState.query || !response || !response.applied_filters) {
          container.innerHTML = '';
          return;
        }

        var applied = response.applied_filters;
        var filterOptions = searchState.filterOptions || {};
        var brandOptionsMap = {};
        if (filterOptions.brand_options && filterOptions.brand_options.length) {
          filterOptions.brand_options.forEach(function(opt) {
            brandOptionsMap[opt.brand_id] = opt.brand_name;
          });
        }

        var chips = [];

        if (applied.pet_types && applied.pet_types.length) {
          applied.pet_types.forEach(function(pt) {
            chips.push(
              "<button type='button' class='filter-chip' data-action='remove-filter-chip' data-filter-param='petType' data-filter-value='" + escapeHtml(pt) + "'>" +
                "<span class='filter-chip-label'>Pet: " + escapeHtml(toTitleCase(pt)) + "</span>" +
                "<span class='filter-chip-remove' aria-hidden='true'>×</span>" +
                "<span class='sr-only'>Remove filter</span>" +
              "</button>"
            );
          });
        }

        if (applied.pet_weight_range) {
          chips.push(
            "<button type='button' class='filter-chip' data-action='remove-filter-chip' data-filter-param='petWeightRange'>" +
              "<span class='filter-chip-label'>Weight: " + escapeHtml(applied.pet_weight_range.replace(/_/g, ' ').replace(/lb/gi, ' lb')) + "</span>" +
              "<span class='filter-chip-remove' aria-hidden='true'>×</span>" +
              "<span class='sr-only'>Remove filter</span>" +
            "</button>"
          );
        }

        if (typeof applied.rating_min === 'number') {
          chips.push(
            "<button type='button' class='filter-chip' data-action='remove-filter-chip' data-filter-param='ratingMin'>" +
              "<span class='filter-chip-label'>Rating: " + escapeHtml(applied.rating_min + '+ stars') + "</span>" +
              "<span class='filter-chip-remove' aria-hidden='true'>×</span>" +
              "<span class='sr-only'>Remove filter</span>" +
            "</button>"
          );
        }

        if (typeof applied.price_min === 'number') {
          chips.push(
            "<button type='button' class='filter-chip' data-action='remove-filter-chip' data-filter-param='priceMin'>" +
              "<span class='filter-chip-label'>Min price: " + escapeHtml(formatPrice(applied.price_min)) + "</span>" +
              "<span class='filter-chip-remove' aria-hidden='true'>×</span>" +
              "<span class='sr-only'>Remove filter</span>" +
            "</button>"
          );
        }

        if (typeof applied.price_max === 'number') {
          chips.push(
            "<button type='button' class='filter-chip' data-action='remove-filter-chip' data-filter-param='priceMax'>" +
              "<span class='filter-chip-label'>Max price: " + escapeHtml(formatPrice(applied.price_max)) + "</span>" +
              "<span class='filter-chip-remove' aria-hidden='true'>×</span>" +
              "<span class='sr-only'>Remove filter</span>" +
            "</button>"
          );
        }

        if (applied.free_shipping_only) {
          chips.push(
            "<button type='button' class='filter-chip' data-action='remove-filter-chip' data-filter-param='freeShippingOnly'>" +
              "<span class='filter-chip-label'>Free shipping</span>" +
              "<span class='filter-chip-remove' aria-hidden='true'>×</span>" +
              "<span class='sr-only'>Remove filter</span>" +
            "</button>"
          );
        }

        if (applied.brand_ids && applied.brand_ids.length) {
          applied.brand_ids.forEach(function(id) {
            var label = brandOptionsMap[id] || id;
            chips.push(
              "<button type='button' class='filter-chip' data-action='remove-filter-chip' data-filter-param='brandId' data-filter-value='" + escapeHtml(id) + "'>" +
                "<span class='filter-chip-label'>Brand: " + escapeHtml(label) + "</span>" +
                "<span class='filter-chip-remove' aria-hidden='true'>×</span>" +
                "<span class='sr-only'>Remove filter</span>" +
              "</button>"
            );
          });
        }

        if (typeof applied.dose_count_min === 'number') {
          chips.push(
            "<button type='button' class='filter-chip' data-action='remove-filter-chip' data-filter-param='doseCountMin'>" +
              "<span class='filter-chip-label'>Min doses: " + escapeHtml(applied.dose_count_min) + "</span>" +
              "<span class='filter-chip-remove' aria-hidden='true'>×</span>" +
              "<span class='sr-only'>Remove filter</span>" +
            "</button>"
          );
        }

        if (typeof applied.bag_count_min === 'number') {
          chips.push(
            "<button type='button' class='filter-chip' data-action='remove-filter-chip' data-filter-param='bagCountMin'>" +
              "<span class='filter-chip-label'>Min bags: " + escapeHtml(applied.bag_count_min) + "</span>" +
              "<span class='filter-chip-remove' aria-hidden='true'>×</span>" +
              "<span class='sr-only'>Remove filter</span>" +
            "</button>"
          );
        }

        if (!chips.length) {
          container.innerHTML = '';
          return;
        }

        container.innerHTML = "" +
          "<div class='applied-filters-inner'>" +
            "<div class='applied-filters-chips'>" + chips.join('') + "</div>" +
            "<button type='button' class='applied-filters-clear' data-action='clear-all-filters'>Clear all</button>" +
          "</div>";
      }

      function renderSortAndPageSize(container) {
        var response = searchState.searchResponse;
        if (!searchState.query || !response || !response.pagination) {
          container.innerHTML = '';
          return;
        }

        var pagination = response.pagination;
        var total = typeof pagination.total_items === 'number' ? pagination.total_items : 0;
        var page = searchState.page;
        var pageSize = searchState.pageSize;
        var startIndex = total === 0 ? 0 : ((page - 1) * pageSize) + 1;
        var endIndex = Math.min(total, page * pageSize);

        var availableSorts = response.available_sort_options && response.available_sort_options.length
          ? response.available_sort_options
          : ['relevance', 'price_low_to_high', 'price_high_to_low', 'rating_high_to_low'];

        var sortLabels = {
          relevance: 'Relevance',
          price_low_to_high: 'Price: Low to High',
          price_high_to_low: 'Price: High to Low',
          rating_high_to_low: 'Rating: High to Low'
        };

        var sortOptionsHtml = '';
        availableSorts.forEach(function(opt) {
          var label = sortLabels[opt] || toTitleCase(opt);
          var selected = (searchState.sortBy === opt) ? ' selected' : '';
          sortOptionsHtml += "<option value='" + escapeHtml(opt) + "'" + selected + ">" + escapeHtml(label) + "</option>";
        });

        var pageSizeOptions = [12, 24, 48];
        if (pageSizeOptions.indexOf(pageSize) === -1) {
          pageSizeOptions.push(pageSize);
        }
        pageSizeOptions.sort(function(a, b) { return a - b; });

        var pageSizeHtml = '';
        pageSizeOptions.forEach(function(size) {
          var selected = (size === pageSize) ? ' selected' : '';
          pageSizeHtml += "<option value='" + escapeHtml(size) + "'" + selected + ">" + escapeHtml(size) + "</option>";
        });

        container.innerHTML = "" +
          "<div class='sort-bar-inner'>" +
            "<div class='sort-bar-count'>" +
              (total ? ("Showing " + escapeHtml(startIndex) + "–" + escapeHtml(endIndex) + " of " + escapeHtml(total) + " products") : 'No products to display') +
            "</div>" +
            "<div class='sort-bar-controls'>" +
              "<label class='sort-control'>" +
                "<span>Sort by</span>" +
                "<select data-action='change-sort'>" + sortOptionsHtml + "</select>" +
              "</label>" +
              "<label class='sort-control'>" +
                "<span>Items per page</span>" +
                "<select data-action='change-page-size'>" + pageSizeHtml + "</select>" +
              "</label>" +
            "</div>" +
          "</div>";
      }

      function renderProductGrid(container) {
        var response = searchState.searchResponse;
        if (!searchState.query || !response || !response.products) {
          container.innerHTML = '';
          return;
        }

        var products = response.products;
        if (!products.length) {
          container.innerHTML = '';
          return;
        }

        var cardsHtml = '';
        products.forEach(function(p) {
          var priceText;
          if (typeof p.min_price === 'number' && typeof p.max_price === 'number') {
            if (p.min_price === p.max_price) {
              priceText = formatPrice(p.min_price);
            } else {
              priceText = formatPrice(p.min_price) + ' – ' + formatPrice(p.max_price);
            }
          } else if (typeof p.min_price === 'number') {
            priceText = formatPrice(p.min_price);
          } else {
            priceText = '';
          }

          var ratingText = '';
          if (typeof p.average_rating === 'number' && typeof p.rating_count === 'number') {
            ratingText = "<div class='product-rating'>" +
              "<span class='rating-stars'>★ " + escapeHtml(p.average_rating.toFixed(1)) + "</span>" +
              "<span class='rating-count'>(" + escapeHtml(p.rating_count) + ")</span>" +
            "</div>";
          }

          var badgesHtml = '';
          if (p.badges && p.badges.length) {
            badgesHtml = "<div class='product-badges'>" +
              p.badges.map(function(b) {
                return "<span class='badge'>" + escapeHtml(b) + "</span>";
              }).join('') +
            "</div>";
          }

          var petTypesText = '';
          if (p.pet_types && p.pet_types.length) {
            petTypesText = "<div class='product-pet-types'>For: " + escapeHtml(p.pet_types.map(toTitleCase).join(', ')) + "</div>";
          }

          var shippingText = '';
          if (p.free_shipping_eligible) {
            shippingText = "<div class='product-shipping'>Free shipping eligible</div>";
          }

          var subscriptionText = '';
          if (p.subscription_eligible) {
            subscriptionText = "<div class='product-subscription'>Subscription available</div>";
          }

          var wishlistActiveClass = searchState.wishlistProductIds[p.product_id] ? ' wishlist-toggle--active' : '';

          cardsHtml += "" +
            "<article class='product-card' data-component='product-card' data-product-id='" + escapeHtml(p.product_id) + "'>" +
              "<button type='button' class='wishlist-toggle" + wishlistActiveClass + "' data-action='toggle-wishlist' data-product-id='" + escapeHtml(p.product_id) + "' aria-pressed='" + (wishlistActiveClass ? 'true' : 'false') + "'>" +
                "<span class='wishlist-icon' aria-hidden='true'>♡</span>" +
                "<span class='sr-only'>Toggle wishlist</span>" +
              "</button>" +
              "<button type='button' class='product-card-main' data-action='view-product' data-product-id='" + escapeHtml(p.product_id) + "'>" +
                "<div class='product-image-wrapper'>" +
                  (p.main_image_url ? ("<img src='" + escapeHtml(p.main_image_url) + "' alt='" + escapeHtml(p.name) + "' class='product-image' />") : "<div class='product-image product-image--placeholder'></div>") +
                "</div>" +
                "<div class='product-info'>" +
                  badgesHtml +
                  "<h3 class='product-title'>" + escapeHtml(p.name) + "</h3>" +
                  (p.brand_name ? ("<div class='product-brand'>" + escapeHtml(p.brand_name) + "</div>") : '') +
                  ratingText +
                  petTypesText +
                  "<div class='product-price'>" + escapeHtml(priceText) + "</div>" +
                  shippingText +
                  subscriptionText +
                "</div>" +
              "</button>" +
              "<form class='inline-add-to-cart-form' data-component='inline-add-to-cart-form' data-action='quick-add-to-cart' data-product-id='" + escapeHtml(p.product_id) + "'>" +
                "<div class='add-to-cart-inner'>" +
                  "<label class='qty-label'>" +
                    "<span class='sr-only'>Quantity</span>" +
                    "<input type='number' name='quantity' min='1' value='1' class='qty-input' />" +
                  "</label>" +
                  "<button type='submit' class='btn-primary add-to-cart-button'>Add to cart</button>" +
                "</div>" +
                "<div class='add-to-cart-message' aria-live='polite'></div>" +
              "</form>" +
            "</article>";
        });

        container.innerHTML = cardsHtml;
      }

      function renderPagination(container) {
        var response = searchState.searchResponse;
        if (!searchState.query || !response || !response.pagination) {
          container.innerHTML = '';
          return;
        }

        var pagination = response.pagination;
        var totalPages = typeof pagination.total_pages === 'number' ? pagination.total_pages : 1;
        var page = searchState.page;

        if (!totalPages || totalPages <= 1) {
          container.innerHTML = '';
          return;
        }

        if (page > totalPages) {
          page = totalPages;
          searchState.page = page;
        }

        var html = "<ul class='pagination-list'>";

        if (page > 1) {
          html += "<li><button type='button' class='pagination-btn pagination-prev' data-action='prev-page' data-page='" + escapeHtml(page - 1) + "'>Previous</button></li>";
        } else {
          html += "<li><button type='button' class='pagination-btn pagination-prev pagination-btn--disabled' disabled>Previous</button></li>";
        }

        var start = 1;
        var end = totalPages;
        if (totalPages > 7) {
          start = Math.max(1, page - 2);
          end = Math.min(totalPages, page + 2);
        }

        if (start > 1) {
          html += "<li><button type='button' class='pagination-btn' data-action='go-to-page' data-page='1'>1</button></li>";
          if (start > 2) {
            html += "<li><span class='pagination-ellipsis'>…</span></li>";
          }
        }

        for (var i = start; i <= end; i++) {
          if (i === page) {
            html += "<li><button type='button' class='pagination-btn pagination-btn--current' aria-current='page'>" + escapeHtml(i) + "</button></li>";
          } else {
            html += "<li><button type='button' class='pagination-btn' data-action='go-to-page' data-page='" + escapeHtml(i) + "'>" + escapeHtml(i) + "</button></li>";
          }
        }

        if (end < totalPages) {
          if (end < totalPages - 1) {
            html += "<li><span class='pagination-ellipsis'>…</span></li>";
          }
          html += "<li><button type='button' class='pagination-btn' data-action='go-to-page' data-page='" + escapeHtml(totalPages) + "'>" + escapeHtml(totalPages) + "</button></li>";
        }

        if (page < totalPages) {
          html += "<li><button type='button' class='pagination-btn pagination-next' data-action='next-page' data-page='" + escapeHtml(page + 1) + "'>Next</button></li>";
        } else {
          html += "<li><button type='button' class='pagination-btn pagination-next pagination-btn--disabled' disabled>Next</button></li>";
        }

        html += "</ul>";
        container.innerHTML = html;
      }

      function renderEmptyOrError(container) {
        var query = searchState.query;
        var response = searchState.searchResponse;
        var lastError = searchState.lastError;

        if (!query) {
          container.innerHTML = "" +
            "<div class='empty-state-panel'>" +
              "<h2 class='empty-state-title'>Start searching for pet care products</h2>" +
              "<p class='empty-state-body'>Use the search bar at the top of the page to look for food, flea &amp; tick treatments, toys, litter, and more for your pet.</p>" +
            "</div>";
          return;
        }

        if (lastError) {
          container.innerHTML = "" +
            "<div class='empty-state-panel empty-state-panel--error'>" +
              "<h2 class='empty-state-title'>We couldn't load these results</h2>" +
              "<p class='empty-state-body'>Please check your connection and try again.</p>" +
              "<button type='button' class='btn-primary' data-action='retry-search'>Retry</button>" +
            "</div>";
          return;
        }

        if (!response || !response.pagination || !response.products) {
          container.innerHTML = '';
          return;
        }

        if (response.pagination.total_items === 0) {
          container.innerHTML = "" +
            "<div class='empty-state-panel'>" +
              "<h2 class='empty-state-title'>No products match your filters</h2>" +
              "<p class='empty-state-body'>Try removing one or more filters, or adjust your search terms.</p>" +
              "<div class='empty-state-actions'>" +
                "<button type='button' class='btn-primary' data-action='clear-all-filters'>Clear all filters</button>" +
              "</div>" +
            "</div>";
          return;
        }

        container.innerHTML = '';
      }

      function attachGlobalEventHandlers() {
        document.body.addEventListener('change', function(event) {
          var target = event.target;
          var action = target.getAttribute('data-action');
          if (!action) return;

          if (action === 'filter-change') {
            handleFilterChange(target);
          } else if (action === 'price-range-select') {
            handlePriceRangeSelect(target);
          } else if (action === 'change-sort') {
            handleSortChange(target);
          } else if (action === 'change-page-size') {
            handlePageSizeChange(target);
          }
        });

        document.body.addEventListener('click', function(event) {
          var target = event.target.closest('[data-action]');
          if (!target) return;
          var action = target.getAttribute('data-action');

          if (action === 'clear-all-filters') {
            event.preventDefault();
            clearAllFilters();
          } else if (action === 'remove-filter-chip') {
            event.preventDefault();
            handleRemoveFilterChip(target);
          } else if (action === 'apply-price-range') {
            event.preventDefault();
            handleApplyCustomPrice();
          } else if (action === 'go-to-page') {
            event.preventDefault();
            handleGoToPage(target);
          } else if (action === 'next-page') {
            event.preventDefault();
            handleNextPage(target);
          } else if (action === 'prev-page') {
            event.preventDefault();
            handlePrevPage(target);
          } else if (action === 'view-product') {
            event.preventDefault();
            handleViewProduct(target);
          } else if (action === 'quick-add-to-cart') {
            event.preventDefault();
          } else if (action === 'toggle-wishlist') {
            event.preventDefault();
            handleWishlistToggle(target);
          } else if (action === 'retry-search') {
            event.preventDefault();
            parseUrlAndFetch();
          } else if (action === 'category-refinement') {
            event.preventDefault();
            handleCategoryRefinement(target);
          }
        });

        document.body.addEventListener('submit', function(event) {
          var form = event.target;
          if (form.getAttribute('data-action') === 'quick-add-to-cart') {
            event.preventDefault();
            handleQuickAddToCart(form);
          }
        });
      }

      function updateUrl(paramsUpdater, options) {
        var opts = options || {};
        var resetPage = (typeof opts.resetPage === 'boolean') ? opts.resetPage : true;

        var url = new URL(window.location.href);
        var params = url.searchParams;

        if (typeof paramsUpdater === 'function') {
          paramsUpdater(params);
        }

        if (resetPage) {
          params.set('page', '1');
        }

        url.search = params.toString();
        window.history.pushState({}, '', url.toString());
        parseUrlAndFetch();
      }

      function clearAllFilters() {
        updateUrl(function(params) {
          FILTER_PARAM_NAMES.forEach(function(name) {
            params.delete(name);
          });
        }, { resetPage: true });
      }

      function handleFilterChange(target) {
        var param = target.getAttribute('data-filter-param');
        if (!param) return;

        if (param === 'freeShippingOnly') {
          updateUrl(function(params) {
            if (target.checked) {
              params.set('freeShippingOnly', 'true');
            } else {
              params.delete('freeShippingOnly');
            }
          }, { resetPage: true });
          return;
        }

        if (MULTI_VALUE_PARAMS.indexOf(param) !== -1) {
          var selector = "input[type='checkbox'][data-filter-param='" + param + "']:checked";
          var inputs = document.querySelectorAll(selector);
          var values = [];
          inputs.forEach(function(input) {
            if (input.value) values.push(input.value);
          });
          updateUrl(function(params) {
            params.delete(param);
            values.forEach(function(v) {
              params.append(param, v);
            });
          }, { resetPage: true });
          return;
        }

        if (param === 'petWeightRange' || param === 'ratingMin' || param === 'doseCountMin' || param === 'bagCountMin') {
          var value = target.value;
          updateUrl(function(params) {
            if (value === '' || value === null) {
              params.delete(param);
            } else {
              params.set(param, value);
            }
          }, { resetPage: true });
          return;
        }
      }

      function handlePriceRangeSelect(target) {
        var min = target.getAttribute('data-min-price');
        var max = target.getAttribute('data-max-price');
        updateUrl(function(params) {
          if (min !== null && min !== '') {
            params.set('priceMin', String(min));
          } else {
            params.delete('priceMin');
          }
          if (max !== null && max !== '') {
            params.set('priceMax', String(max));
          } else {
            params.delete('priceMax');
          }
        }, { resetPage: true });
      }

      function handleApplyCustomPrice() {
        var minInput = document.getElementById('priceMinInput');
        var maxInput = document.getElementById('priceMaxInput');
        if (!minInput || !maxInput) return;
        var minVal = minInput.value;
        var maxVal = maxInput.value;
        updateUrl(function(params) {
          if (minVal !== '') {
            params.set('priceMin', minVal);
          } else {
            params.delete('priceMin');
          }
          if (maxVal !== '') {
            params.set('priceMax', maxVal);
          } else {
            params.delete('priceMax');
          }
        }, { resetPage: true });
      }

      function handleRemoveFilterChip(target) {
        var param = target.getAttribute('data-filter-param');
        var value = target.getAttribute('data-filter-value');
        if (!param) return;

        if (MULTI_VALUE_PARAMS.indexOf(param) !== -1 && value !== null) {
          updateUrl(function(params) {
            var current = getArrayParam(params, param) || [];
            var next = current.filter(function(v) { return v !== value; });
            params.delete(param);
            next.forEach(function(v) { params.append(param, v); });
          }, { resetPage: true });
        } else {
          updateUrl(function(params) {
            params.delete(param);
          }, { resetPage: true });
        }
      }

      function handleSortChange(select) {
        var value = select.value;
        updateUrl(function(params) {
          if (value) {
            params.set('sortBy', value);
          } else {
            params.delete('sortBy');
          }
        }, { resetPage: true });
      }

      function handlePageSizeChange(select) {
        var value = select.value;
        updateUrl(function(params) {
          if (value) {
            params.set('pageSize', value);
          } else {
            params.delete('pageSize');
          }
        }, { resetPage: true });
      }

      function handleGoToPage(target) {
        var pageStr = target.getAttribute('data-page');
        var page = parseInt(pageStr || '1', 10);
        if (isNaN(page) || page < 1) return;
        updateUrl(function(params) {
          params.set('page', String(page));
        }, { resetPage: false });
      }

      function handleNextPage(target) {
        var pageStr = target.getAttribute('data-page');
        var page = parseInt(pageStr || '1', 10);
        if (isNaN(page) || page < 1) return;
        updateUrl(function(params) {
          params.set('page', String(page));
        }, { resetPage: false });
      }

      function handlePrevPage(target) {
        var pageStr = target.getAttribute('data-page');
        var page = parseInt(pageStr || '1', 10);
        if (isNaN(page) || page < 1) return;
        updateUrl(function(params) {
          params.set('page', String(page));
        }, { resetPage: false });
      }

      function handleViewProduct(target) {
        var productId = target.getAttribute('data-product-id');
        if (!productId) return;
        var query = searchState.query || '';
        var url = 'product.html?id=' + encodeURIComponent(productId);
        if (query) {
          url += '&fromSearchQuery=' + encodeURIComponent(query);
        }
        window.location.href = url;
      }

      function showInlineMessage(contextElement, message, type) {
        var container = contextElement.querySelector ? contextElement.querySelector('.add-to-cart-message') : null;
        if (!container) return;
        var typeClass = type === 'success' ? 'message--success' : 'message--error';
        container.innerHTML = "<span class='message " + typeClass + "'>" + escapeHtml(message) + "</span>";
        setTimeout(function() {
          if (container) {
            container.innerHTML = '';
          }
        }, 4000);
      }

      function handleQuickAddToCart(form) {
        var productId = form.getAttribute('data-product-id');
        if (!productId) return;
        var qtyInput = form.querySelector("input[name='quantity']");
        var qty = 1;
        if (qtyInput) {
          var raw = parseInt(qtyInput.value || '1', 10);
          qty = isNaN(raw) || raw < 1 ? 1 : raw;
        }
        try {
          var resp = WebsiteSDK.addToCart(productId, null, qty);
          if (resp && resp.success) {
            showInlineMessage(form, 'Added to cart. View your cart to checkout.', 'success');
          } else {
            var msg = (resp && resp.message) ? resp.message : 'Could not add to cart. View product details to configure options.';
            showInlineMessage(form, msg, 'error');
          }
        } catch (e) {
          console.error('addToCart failed', e);
          showInlineMessage(form, 'Something went wrong while adding to cart.', 'error');
        }
      }

      function handleWishlistToggle(button) {
        var productId = button.getAttribute('data-product-id');
        if (!productId) return;
        try {
          var resp = WebsiteSDK.addToWishlist(productId);
          if (resp && resp.success) {
            searchState.wishlistProductIds[productId] = true;
            button.classList.add('wishlist-toggle--active');
            button.setAttribute('aria-pressed', 'true');
          } else {
            var msg = (resp && resp.message) ? resp.message : 'Could not update wishlist.';
            var card = button.closest('.product-card') || button;
            showInlineMessage(card, msg, 'error');
          }
        } catch (e) {
          console.error('addToWishlist failed', e);
          var card2 = button.closest('.product-card') || button;
          showInlineMessage(card2, 'Something went wrong while saving to wishlist.', 'error');
        }
      }

      function handleCategoryRefinement(button) {
        var categoryId = button.getAttribute('data-category-id');
        if (!categoryId || categoryId === 'all') return;
        var url = 'category.html?categoryId=' + encodeURIComponent(categoryId);
        window.location.href = url;
      }

    })();
  </script>
</body>
