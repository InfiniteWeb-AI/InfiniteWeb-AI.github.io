<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Community Forum</title>
  <!--
    Design analysis summary
    - Very minimal, content-first forum layout.
    - Full-width black header bar with left-aligned navigation.
    - Off‑white page background (#F6F5F1) with white cards on a light gray border.
    - Clean sans-serif typography with clear hierarchy.
    - Large vertical whitespace between header, content sections, and cards.
    - Subtle, flat footer expected with small, low‑contrast links.
  -->

  <!-- Recommended fonts matching the design's grotesk / utilitarian feel -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Global stylesheet -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific stylesheet -->
  <link rel='stylesheet' href='discussion.css'>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>
</head>
<body>
  <div class='site'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='header-left'>
          <nav class='primary-nav' aria-label='Primary'>
            <ul class='primary-nav-list'>
              <li class='primary-nav-item'>
                <a href='index.html' class='primary-nav-link' title='Forum homepage with trending, popular, and recent discussions'>Home</a>
              </li>
              <li class='primary-nav-item'>
                <a href='categories.html' class='primary-nav-link' title='Browse all discussion categories such as Web Development and Product Feedback'>Categories</a>
              </li>
              <li class='primary-nav-item'>
                <a href='topics.html' class='primary-nav-link' title='Explore, search, and follow discussion topics and tags'>Topics</a>
              </li>
              <li class='primary-nav-item'>
                <a href='bookmarks.html' class='primary-nav-link' title='View and open your bookmarked or saved discussions'>Bookmarks</a>
              </li>
              <li class='primary-nav-item'>
                <a href='help.html' class='primary-nav-link' title='Read help articles and FAQs about using the forum'>Help</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class='header-right'>
          <!-- Static search icon to match the visual design (non-interactive per requirements) -->
          <span class='nav-icon nav-icon-search' aria-hidden='true'></span>

          <!-- User avatar with dropdown for special access pages -->
          <div class='user-menu'>
            <button class='user-avatar' type='button' aria-haspopup='true' aria-expanded='false'>
              <span class='visually-hidden'>Open user menu</span>
              <span class='user-avatar-initials'>U</span>
            </button>
            <ul class='user-menu-dropdown' aria-label='User menu'>
              <li class='user-menu-item'>
                <a href='messages.html' class='user-menu-link' title='Accessible via a Messages item in the signed-in user&#39;s menu'>Messages</a>
              </li>
              <li class='user-menu-item'>
                <a href='settings.html' class='user-menu-link' title='Accessible via a Settings option in the signed-in user&#39;s menu'>User Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='content-shell discussion-shell'>
        <!-- Thread content (hidden when no discussionId or on load error) -->
        <section class='thread-content' data-component='thread-content'>
          <!-- Off-white header band with breadcrumbs, title, search, and thread-level toggles -->
          <section class='thread-header-band' data-component='thread-breadcrumbs' data-populate='thread-header'>
            <!-- Filled by JS -->
          </section>

          <!-- Main thread column: original post, poll, replies, main reply editor -->
          <section class='thread-main'>
            <!-- Original post card -->
            <article class='post-card original-post-card' data-component='original-post-panel' data-populate='original-post'>
              <!-- Filled by JS -->
            </article>

            <!-- Poll panel (if any) -->
            <section class='poll-panel-wrapper'>
              <div class='poll-card' data-component='poll-panel' data-populate='poll-panel'>
                <!-- Filled by JS when discussion.hasPoll -->
              </div>
            </section>

            <!-- Replies section -->
            <section class='replies-section'>
              <header class='replies-header' data-component='reply-list-header' data-populate='reply-header'>
                <!-- Filled by JS (reply count + view mode toggle) -->
              </header>

              <div class='reply-list' data-component='reply-list' data-populate='reply-list'>
                <!-- Reply cards rendered by JS -->
              </div>
            </section>

            <!-- Main reply editor card at the bottom -->
            <section class='post-card reply-editor-card' data-component='main-reply-editor' data-populate='main-reply-editor'>
              <!-- Filled by JS -->
            </section>
          </section>
        </section>

        <!-- Loader overlay for thread-loader -->
        <div class='thread-loader-overlay' data-component='thread-loader' hidden>
          <div class='thread-loader-inner'>
            <span class='loader-spinner' aria-hidden='true'></span>
            <span class='loader-text'>Loading discussion…</span>
          </div>
        </div>

        <!-- Report modal -->
        <div class='modal-backdrop' data-component='report-modal' hidden>
          <div class='modal' role='dialog' aria-modal='true' aria-labelledby='reportModalTitle'>
            <header class='modal-header'>
              <h2 id='reportModalTitle'>Report post</h2>
            </header>
            <form class='modal-body' data-action='submit-report'>
              <input type='hidden' name='postId' data-populate='report-post-id'>
              <div class='form-field'>
                <label for='reportReason'>Reason</label>
                <select id='reportReason' name='reason' required>
                  <option value=''>Select a reason</option>
                  <option value='spam'>Spam</option>
                  <option value='harassment'>Harassment</option>
                  <option value='offensive'>Offensive</option>
                  <option value='off_topic'>Off topic</option>
                  <option value='other'>Other</option>
                </select>
              </div>
              <div class='form-field'>
                <label for='reportNote'>Additional details (optional)</label>
                <textarea id='reportNote' name='note' rows='4' placeholder='Provide any extra context…'></textarea>
              </div>
              <footer class='modal-footer'>
                <button type='button' class='secondary-btn' data-action='close-report-modal'>Cancel</button>
                <button type='submit' class='primary-btn'>Submit report</button>
                <span class='form-status' aria-live='polite'></span>
              </footer>
            </form>
          </div>
        </div>

        <!-- Back-to-top floating control (thread-top-link) -->
        <button type='button' class='thread-top-floating' data-component='thread-top-link' data-action='scroll-to-top' aria-label='Back to top' hidden>
          ↑ Top
        </button>

        <!-- Empty state for missing discussionId or load errors -->
        <section class='empty-state' data-component='thread-empty-state' hidden>
          <div class='empty-state-inner'>
            <h1 class='empty-state-title'>Discussion not found</h1>
            <p class='empty-state-body'>We could not load this discussion. It may have been moved or the link may be incorrect.</p>
            <a href='index.html' class='text-link'>Return to home</a>
          </div>
        </section>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-nav-link' title='Learn more about this community and platform'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-nav-link' title='Get help and support for using the forum'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-nav-link' title='Read the terms of service for using the site'>Terms</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-nav-link' title='Review the privacy policy and data practices'>Privacy</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </div>

  <script>
  (function() {
    'use strict';

    // ---------- Utilities ----------
    function escapeHtml(value) {
      if (value === null || value === undefined) {
        return '';
      }
      var str = String(value);
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(isoString) {
      if (!isoString) {
        return '';
      }
      var date = new Date(isoString);
      if (isNaN(date.getTime())) {
        return '';
      }
      return date.toLocaleString(undefined, {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatShortDate(isoString) {
      if (!isoString) {
        return '';
      }
      var date = new Date(isoString);
      if (isNaN(date.getTime())) {
        return '';
      }
      return date.toLocaleDateString(undefined, {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function formatPostBody(body) {
      if (!body) {
        return '';
      }
      var escaped = escapeHtml(body);
      var paragraphs = escaped.split(/\n{2,}/);
      var htmlParts = [];
      for (var i = 0; i < paragraphs.length; i++) {
        var part = paragraphs[i];
        var withBreaks = part.replace(/\n/g, '<br>');
        htmlParts.push('<p>' + withBreaks + '</p>');
      }
      return htmlParts.join('');
    }

    function buildThreadedTree(posts) {
      var index = {};
      var roots = [];
      var i;

      for (i = 0; i < posts.length; i++) {
        var p = posts[i];
        index[p.id] = {
          post: p,
          children: []
        };
      }

      for (i = 0; i < posts.length; i++) {
        var node = index[posts[i].id];
        var parentId = posts[i].parentPostId;
        if (parentId && index[parentId]) {
          index[parentId].children.push(node);
        } else {
          roots.push(node);
        }
      }

      // Sort roots and children chronologically
      function sortNodes(list) {
        list.sort(function(a, b) {
          var aTime = new Date(a.post.createdAt).getTime();
          var bTime = new Date(b.post.createdAt).getTime();
          return aTime - bTime;
        });
        for (var j = 0; j < list.length; j++) {
          if (list[j].children && list[j].children.length > 0) {
            sortNodes(list[j].children);
          }
        }
      }

      sortNodes(roots);
      return roots;
    }

    function coerceNumber(value, fallback) {
      if (typeof value === 'number' && !isNaN(value)) {
        return value;
      }
      var num = Number(value);
      if (!isNaN(num)) {
        return num;
      }
      return fallback || 0;
    }

    // ---------- Page state ----------
    var pageState = {
      discussionId: null,
      discussion: null,
      category: null,
      tags: [],
      originalPost: null,
      replies: [],
      poll: null,
      pollOptions: [],
      pollResponse: null,
      pollResponseOptionIds: [],
      viewMode: 'threaded',
      postReactions: {}, // { [postId]: { userHasUpvoted, userHasLiked } }
      lastCreatedPostId: null
    };

    // ---------- Cached DOM references ----------
    var threadContentEl;
    var threadHeaderEl;
    var originalPostEl;
    var pollPanelEl;
    var repliesHeaderEl;
    var repliesListEl;
    var mainReplyEditorEl;
    var loaderEl;
    var emptyStateEl;
    var reportModalEl;
    var floatingTopEl;

    document.addEventListener('DOMContentLoaded', function() {
      threadContentEl = document.querySelector('[data-component="thread-content"]');
      threadHeaderEl = document.querySelector('[data-component="thread-breadcrumbs"]');
      originalPostEl = document.querySelector('[data-component="original-post-panel"]');
      pollPanelEl = document.querySelector('[data-component="poll-panel"]');
      repliesHeaderEl = document.querySelector('[data-component="reply-list-header"]');
      repliesListEl = document.querySelector('[data-component="reply-list"]');
      mainReplyEditorEl = document.querySelector('[data-component="main-reply-editor"]');
      loaderEl = document.querySelector('[data-component="thread-loader"]');
      emptyStateEl = document.querySelector('[data-component="thread-empty-state"]');
      reportModalEl = document.querySelector('[data-component="report-modal"]');
      floatingTopEl = document.querySelector('[data-component="thread-top-link"]');

      var urlParams = new URLSearchParams(window.location.search);
      var discussionId = urlParams.get('discussionId');
      var initialViewMode = urlParams.get('viewMode');

      pageState.viewMode = initialViewMode === 'chronological' ? 'chronological' : 'threaded';
      pageState.discussionId = discussionId;

      if (!discussionId) {
        if (threadContentEl) {
          threadContentEl.hidden = true;
        }
        if (floatingTopEl) {
          floatingTopEl.hidden = true;
        }
        if (emptyStateEl) {
          emptyStateEl.hidden = false;
          var titleEl = emptyStateEl.querySelector('.empty-state-title');
          var bodyEl = emptyStateEl.querySelector('.empty-state-body');
          if (titleEl) {
            titleEl.textContent = 'No discussion selected';
          }
          if (bodyEl) {
            bodyEl.textContent = 'Open a discussion from Home, Categories, Topics, or Search to view it here.';
          }
        }
        return;
      }

      loadThread(discussionId);
      window.addEventListener('scroll', handleScrollForTopLink);
    });

    // ---------- Loader handling ----------
    function showLoader() {
      if (loaderEl) {
        loaderEl.hidden = false;
      }
    }

    function hideLoader() {
      if (loaderEl) {
        loaderEl.hidden = true;
      }
    }

    // ---------- Data load ----------
    function loadThread(discussionId) {
      if (!threadContentEl) {
        return;
      }
      try {
        showLoader();
        var result = WebsiteSDK.getDiscussionThread(discussionId);
        pageState.discussion = result.discussion;
        pageState.category = result.category || null;
        pageState.tags = result.tags || [];
        pageState.originalPost = result.originalPost;
        pageState.replies = result.replies || [];
        pageState.poll = result.poll || null;
        pageState.pollOptions = result.pollOptions || [];
        pageState.pollResponse = result.pollResponse || null;
        pageState.pollResponseOptionIds = [];
        if (pageState.pollResponse && pageState.pollResponse.optionId) {
          pageState.pollResponseOptionIds.push(pageState.pollResponse.optionId);
        }
        pageState.postReactions = {};
        pageState.lastCreatedPostId = null;

        if (emptyStateEl) {
          emptyStateEl.hidden = true;
        }
        threadContentEl.hidden = false;

        renderThread();
        hideLoader();
      } catch (err) {
        hideLoader();
        threadContentEl.hidden = true;
        if (floatingTopEl) {
          floatingTopEl.hidden = true;
        }
        if (emptyStateEl) {
          emptyStateEl.hidden = false;
          var titleEl = emptyStateEl.querySelector('.empty-state-title');
          var bodyEl = emptyStateEl.querySelector('.empty-state-body');
          if (titleEl) {
            titleEl.textContent = 'Discussion not found';
          }
          if (bodyEl) {
            bodyEl.textContent = 'We could not load this discussion. It may have been moved or the link may be incorrect.';
          }
        }
      }
    }

    // ---------- Rendering ----------
    function renderThread() {
      if (!pageState.discussion) {
        return;
      }
      if (threadHeaderEl) {
        renderThreadHeader(threadHeaderEl);
      }
      if (originalPostEl) {
        renderOriginalPost(originalPostEl);
      }
      if (pollPanelEl) {
        renderPollPanel(pollPanelEl);
      }
      if (repliesHeaderEl) {
        renderRepliesHeader(repliesHeaderEl);
      }
      if (repliesListEl) {
        renderRepliesList(repliesListEl);
      }
      if (mainReplyEditorEl) {
        renderMainReplyEditor(mainReplyEditorEl);
      }

      if (floatingTopEl) {
        floatingTopEl.hidden = true; // will be toggled by scroll handler
      }

      bindActions(document);
    }

    function renderThreadHeader(container) {
      var discussion = pageState.discussion;
      var category = pageState.category;
      var title = discussion ? discussion.title : '';
      var replyCount = typeof discussion.replyCount === 'number' ? discussion.replyCount : (pageState.replies ? pageState.replies.length : 0);
      var viewCount = typeof discussion.viewCount === 'number' ? discussion.viewCount : null;
      var subscribed = !!discussion.isSubscribed;
      var bookmarked = !!discussion.isBookmarked;

      var categoryName = category ? escapeHtml(category.name) : 'Discussion';

      var metaParts = [];
      metaParts.push(replyCount + ' repl' + (replyCount === 1 ? 'y' : 'ies'));
      if (viewCount !== null) {
        metaParts.push(viewCount + ' view' + (viewCount === 1 ? '' : 's'));
      }
      if (discussion.createdAt) {
        metaParts.push('Started ' + formatShortDate(discussion.createdAt));
      }

      container.innerHTML = `
        <div class="thread-header-inner">
          <div class="thread-header-left">
            <nav class="breadcrumb-nav" aria-label="Breadcrumb">
              <ol class="breadcrumb-list">
                <li class="breadcrumb-item"><a href="index.html">All discussions</a></li>
                <li class="breadcrumb-item"><span>${categoryName}</span></li>
              </ol>
            </nav>
            <button type="button" class="thread-title-button" data-action="scroll-to-top">
              <h1 class="thread-title">${escapeHtml(title)}</h1>
            </button>
            <div class="thread-meta-row">${escapeHtml(metaParts.join(' b7 '))}</div>
          </div>
          <div class="thread-header-right">
            <form class="header-search-form" data-action="submit-search">
              <label class="visually-hidden" for="threadSearchInput">Search discussions</label>
              <input id="threadSearchInput" name="query" type="search" placeholder="Search…" autocomplete="off">
              <button type="submit" class="icon-button search-submit">Go</button>
            </form>
            <div class="thread-header-toggles">
              <button type="button" class="toggle-btn subscribe-toggle ${subscribed ? 'is-active' : ''}" data-action="toggle-subscription">
                ${subscribed ? 'Subscribed' : 'Subscribe'}
              </button>
              <button type="button" class="toggle-btn bookmark-toggle ${bookmarked ? 'is-active' : ''}" data-action="toggle-bookmark">
                ${bookmarked ? 'Bookmarked' : 'Bookmark'}
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderOriginalPost(container) {
      var discussion = pageState.discussion;
      var category = pageState.category;
      var op = pageState.originalPost;
      if (!discussion || !op) {
        container.innerHTML = '';
        return;
      }

      container.setAttribute('data-post-id', op.id || '');

      var categoryName = category ? escapeHtml(category.name) : '';
      var createdAt = formatDate(op.createdAt);

      var upvoteCount = 0;
      if (typeof op.upvoteCount === 'number') {
        upvoteCount = op.upvoteCount;
      } else if (typeof discussion.score === 'number') {
        upvoteCount = discussion.score;
      }
      var likeCount = typeof op.likeCount === 'number' ? op.likeCount : 0;

      var reaction = pageState.postReactions[op.id] || { userHasUpvoted: false, userHasLiked: false };

      var tagsHtml = '';
      if (pageState.tags && pageState.tags.length > 0) {
        var tagParts = [];
        for (var i = 0; i < pageState.tags.length; i++) {
          var tag = pageState.tags[i];
          tagParts.push(
            '<button type="button" class="tag-pill" data-action="view-tag" data-tag-id="' + escapeHtml(tag.id) + '">' +
              escapeHtml(tag.name) +
            '</button>'
          );
        }
        tagsHtml = '<div class="tag-list">' + tagParts.join('') + '</div>';
      }

      var bodyHtml = formatPostBody(discussion.body || op.body || '');

      var subscribed = !!discussion.isSubscribed;
      var bookmarked = !!discussion.isBookmarked;

      container.innerHTML = `
        <header class="post-card-header">
          <div class="post-header-left">
            <button type="button" class="avatar avatar-placeholder" data-action="view-author" data-profile-id="${escapeHtml(op.authorProfileId || '')}" aria-label="View author profile">
              <span class="avatar-initials">${op.authorDisplayName ? escapeHtml(op.authorDisplayName.charAt(0).toUpperCase()) : ''}</span>
            </button>
            <div class="post-meta-block">
              <button type="button" class="author-link" data-action="view-author" data-profile-id="${escapeHtml(op.authorProfileId || '')}">${escapeHtml(op.authorDisplayName)}</button>
              <div class="post-meta-line">
                <time datetime="${escapeHtml(op.createdAt || '')}">${createdAt}</time>
                ${categoryName ? `<span class="meta-separator">b7</span><span class="meta-category">${categoryName}</span>` : ''}
              </div>
              ${tagsHtml}
            </div>
          </div>
          <div class="post-header-right">
            <button type="button" class="icon-button more-button" aria-label="More actions">&#8942;</button>
          </div>
        </header>
        <div class="post-body">
          <h2 class="post-title">${escapeHtml(discussion.title)}</h2>
          <div class="post-content">${bodyHtml}</div>
        </div>
        <footer class="post-footer">
          <div class="reaction-controls" data-component="reaction-controls">
            <button type="button" class="reaction-btn upvote-btn ${reaction.userHasUpvoted ? 'is-active' : ''}" data-action="upvote-post" data-post-id="${escapeHtml(op.id)}">
              <span aria-hidden="true">&#9650;</span>
              <span class="reaction-label">Upvote</span>
              <span class="reaction-count">${upvoteCount}</span>
            </button>
            <button type="button" class="reaction-btn like-btn ${reaction.userHasLiked ? 'is-active' : ''}" data-action="like-post" data-post-id="${escapeHtml(op.id)}">
              <span aria-hidden="true">a9</span>
              <span class="reaction-label">Like</span>
              <span class="reaction-count">${likeCount}</span>
            </button>
            <button type="button" class="reaction-btn reply-btn" data-action="open-inline-reply" data-post-id="${escapeHtml(op.id)}" data-author-name="${escapeHtml(op.authorDisplayName || '')}">
              Reply
            </button>
            <button type="button" class="reaction-btn report-btn" data-action="open-report-modal" data-post-id="${escapeHtml(op.id)}">
              Report
            </button>
          </div>
          <div class="thread-toggles-inline">
            <button type="button" class="toggle-btn subscribe-toggle ${subscribed ? 'is-active' : ''}" data-action="toggle-subscription">
              ${subscribed ? 'Subscribed' : 'Subscribe'}
            </button>
            <button type="button" class="toggle-btn bookmark-toggle ${bookmarked ? 'is-active' : ''}" data-action="toggle-bookmark">
              ${bookmarked ? 'Bookmarked' : 'Bookmark'}
            </button>
          </div>
          <div class="inline-reply-anchor" data-inline-reply-anchor-for="${escapeHtml(op.id)}"></div>
        </footer>
      `;
    }

    function renderPollPanel(container) {
      var poll = pageState.poll;
      var discussion = pageState.discussion;
      if (!discussion || !discussion.hasPoll || !poll) {
        container.innerHTML = '';
        container.hidden = true;
        return;
      }

      var now = new Date();
      var startAt = new Date(poll.startAt);
      var endAt = new Date(poll.endAt);
      var isClosed = !!poll.isClosed || now < startAt || now > endAt;

      var options = pageState.pollOptions || [];
      var totalVotes = 0;
      var i;
      for (i = 0; i < options.length; i++) {
        totalVotes += coerceNumber(options[i].voteCount, 0);
      }

      var optionHtmlParts = [];
      var multiple = !!poll.multipleChoiceAllowed;

      for (i = 0; i < options.length; i++) {
        var opt = options[i];
        var count = coerceNumber(opt.voteCount, 0);
        var percent = totalVotes > 0 ? Math.round((count / totalVotes) * 100) : 0;
        var checked = pageState.pollResponseOptionIds.indexOf(opt.id) !== -1;
        var inputType = multiple ? 'checkbox' : 'radio';
        var inputName = multiple ? 'options' : 'optionId';

        optionHtmlParts.push(
          '<label class="poll-option">' +
            '<input type="' + inputType + '" name="' + inputName + '" value="' + escapeHtml(opt.id) + '" ' + (checked ? 'checked' : '') + (isClosed ? ' disabled' : '') + '>' +
            '<span class="poll-option-text">' + escapeHtml(opt.optionText) + '</span>' +
            '<span class="poll-option-stats">' +
              '<span class="poll-option-bar" style="--percent:' + percent + '%"></span>' +
              '<span class="poll-option-count">' + count + (totalVotes > 0 ? ' · ' + percent + '%' : '') + '</span>' +
            '</span>' +
          '</label>'
        );
      }

      var statusLabel;
      if (isClosed) {
        statusLabel = 'Closed';
      } else if (now < startAt) {
        statusLabel = 'Opens ' + formatShortDate(poll.startAt);
      } else {
        statusLabel = 'Open · Closes ' + formatShortDate(poll.endAt);
      }

      var summary = totalVotes + ' vote' + (totalVotes === 1 ? '' : 's');

      container.hidden = false;
      container.innerHTML = `
        <article class="post-card poll-card-inner">
          <header class="poll-header">
            <div class="poll-question">${escapeHtml(poll.question)}</div>
            <div class="poll-status">${escapeHtml(statusLabel)}</div>
          </header>
          <form class="poll-form" data-action="submit-poll-vote" data-poll-id="${escapeHtml(poll.id)}">
            <div class="poll-options">
              ${optionHtmlParts.join('')}
            </div>
            ${isClosed ? '' : '<div class="form-actions"><button type="submit" class="primary-btn">Submit vote</button></div>'}
            <div class="poll-summary">${escapeHtml(summary)}</div>
            <span class="form-status" aria-live="polite"></span>
          </form>
        </article>
      `;
    }

    function renderRepliesHeader(container) {
      var discussion = pageState.discussion;
      var replyCount = discussion && typeof discussion.replyCount === 'number'
        ? discussion.replyCount
        : (pageState.replies ? pageState.replies.length : 0);

      container.innerHTML = `
        <div class="replies-header-inner">
          <h2 class="section-title">${replyCount} repl${replyCount === 1 ? 'y' : 'ies'}</h2>
          <div class="reply-view-toggle" data-component="reply-list-controls">
            <button type="button" class="view-toggle-btn ${pageState.viewMode === 'threaded' ? 'is-active' : ''}" data-action="set-view-mode" data-view-mode="threaded">Threaded</button>
            <button type="button" class="view-toggle-btn ${pageState.viewMode === 'chronological' ? 'is-active' : ''}" data-action="set-view-mode" data-view-mode="chronological">Chronological</button>
          </div>
        </div>
      `;
    }

    function renderRepliesList(container) {
      var replies = pageState.replies || [];
      if (!replies.length) {
        container.innerHTML = '<p class="empty-replies">No replies yet. Be the first to reply below.</p>';
        return;
      }

      var html = '';

      if (pageState.viewMode === 'chronological') {
        var sorted = replies.slice();
        sorted.sort(function(a, b) {
          var aTime = new Date(a.createdAt).getTime();
          var bTime = new Date(b.createdAt).getTime();
          return aTime - bTime;
        });
        for (var i = 0; i < sorted.length; i++) {
          html += renderReplyItemHtml(sorted[i], 0);
        }
      } else {
        var roots = buildThreadedTree(replies);
        html = renderReplyTreeHtml(roots, 0);
      }

      container.innerHTML = html;
    }

    function renderReplyTreeHtml(nodes, depth) {
      var html = '';
      for (var i = 0; i < nodes.length; i++) {
        var node = nodes[i];
        html += renderReplyItemHtml(node.post, depth);
        if (node.children && node.children.length > 0) {
          html += renderReplyTreeHtml(node.children, depth + 1);
        }
      }
      return html;
    }

    function renderReplyItemHtml(post, depth) {
      var author = post.authorDisplayName || '';
      var createdAt = formatDate(post.createdAt);
      var upvoteCount = typeof post.upvoteCount === 'number' ? post.upvoteCount : 0;
      var likeCount = typeof post.likeCount === 'number' ? post.likeCount : 0;
      var reaction = pageState.postReactions[post.id] || { userHasUpvoted: false, userHasLiked: false };
      var replyCount = typeof post.replyCount === 'number' ? post.replyCount : 0;

      var bodyHtml = formatPostBody(post.body || '');

      var depthClass = 'depth-' + (depth > 4 ? 4 : depth);

      return `
        <article class="post-card reply-card ${depthClass}" data-post-id="${escapeHtml(post.id)}">
          <header class="post-card-header">
            <div class="post-header-left">
              <button type="button" class="avatar avatar-small" data-action="view-author" data-profile-id="${escapeHtml(post.authorProfileId || '')}" aria-label="View author profile">
                <span class="avatar-initials">${author ? escapeHtml(author.charAt(0).toUpperCase()) : ''}</span>
              </button>
              <div class="post-meta-block">
                <button type="button" class="author-link" data-action="view-author" data-profile-id="${escapeHtml(post.authorProfileId || '')}">${escapeHtml(author)}</button>
                <div class="post-meta-line">
                  <time datetime="${escapeHtml(post.createdAt || '')}">${createdAt}</time>
                  ${replyCount > 0 ? `<span class="meta-separator">b7</span><span class="meta-replies">${replyCount} repl${replyCount === 1 ? 'y' : 'ies'}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="post-header-right">
              <button type="button" class="icon-button more-button" aria-label="More actions">&#8942;</button>
            </div>
          </header>
          <div class="post-body">
            <div class="post-content">${bodyHtml}</div>
          </div>
          <footer class="post-footer">
            <div class="reaction-controls" data-component="reaction-controls">
              <button type="button" class="reaction-btn upvote-btn ${reaction.userHasUpvoted ? 'is-active' : ''}" data-action="upvote-post" data-post-id="${escapeHtml(post.id)}">
                <span aria-hidden="true">&#9650;</span>
                <span class="reaction-label">Upvote</span>
                <span class="reaction-count">${upvoteCount}</span>
              </button>
              <button type="button" class="reaction-btn like-btn ${reaction.userHasLiked ? 'is-active' : ''}" data-action="like-post" data-post-id="${escapeHtml(post.id)}">
                <span aria-hidden="true">a9</span>
                <span class="reaction-label">Like</span>
                <span class="reaction-count">${likeCount}</span>
              </button>
              <button type="button" class="reaction-btn reply-btn" data-action="open-inline-reply" data-post-id="${escapeHtml(post.id)}" data-author-name="${escapeHtml(author)}">
                Reply
              </button>
              <button type="button" class="reaction-btn report-btn" data-action="open-report-modal" data-post-id="${escapeHtml(post.id)}">
                Report
              </button>
            </div>
            <div class="inline-reply-anchor" data-inline-reply-anchor-for="${escapeHtml(post.id)}"></div>
          </footer>
        </article>
      `;
    }

    function renderMainReplyEditor(container) {
      container.innerHTML = `
        <header class="reply-editor-header">
          <h2 class="section-title">Write a reply</h2>
        </header>
        <form class="reply-editor-form" data-action="submit-main-reply">
          <div class="form-field">
            <label class="visually-hidden" for="mainReplyBody">Reply</label>
            <textarea id="mainReplyBody" name="body" rows="6" placeholder="Add to the conversation…" required></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="primary-btn">Post reply</button>
            <span class="form-status" aria-live="polite"></span>
          </div>
        </form>
      `;
    }

    // ---------- Action binding ----------
    function bindActions(root) {
      var actionElements = root.querySelectorAll('[data-action]');
      for (var i = 0; i < actionElements.length; i++) {
        var el = actionElements[i];
        if (el.dataset.bound === 'true') {
          continue;
        }
        var tag = el.tagName.toLowerCase();
        if (tag === 'form') {
          el.addEventListener('submit', handleActionEvent);
        } else {
          el.addEventListener('click', handleActionEvent);
        }
        el.dataset.bound = 'true';
      }
    }

    function handleActionEvent(event) {
      var target = event.currentTarget;
      var action = target.dataset.action;
      if (!action) {
        return;
      }

      switch (action) {
        case 'submit-search':
          event.preventDefault();
          handleSearchSubmit(target);
          break;
        case 'toggle-subscription':
          event.preventDefault();
          handleToggleSubscription();
          break;
        case 'toggle-bookmark':
          event.preventDefault();
          handleToggleBookmark();
          break;
        case 'upvote-post':
          event.preventDefault();
          handleUpvoteClick(target);
          break;
        case 'like-post':
          event.preventDefault();
          handleLikeClick(target);
          break;
        case 'open-inline-reply':
          event.preventDefault();
          handleOpenInlineReply(target);
          break;
        case 'submit-main-reply':
          event.preventDefault();
          handleMainReplySubmit(target);
          break;
        case 'submit-inline-reply':
          event.preventDefault();
          handleInlineReplySubmit(target);
          break;
        case 'close-inline-editor':
          event.preventDefault();
          handleCloseInlineEditor(target);
          break;
        case 'open-report-modal':
          event.preventDefault();
          handleOpenReportModal(target);
          break;
        case 'close-report-modal':
          event.preventDefault();
          handleCloseReportModal();
          break;
        case 'submit-report':
          event.preventDefault();
          handleSubmitReport(target);
          break;
        case 'scroll-to-top':
          event.preventDefault();
          handleScrollToTop();
          break;
        case 'set-view-mode':
          event.preventDefault();
          handleSetViewMode(target);
          break;
        case 'submit-poll-vote':
          event.preventDefault();
          handleSubmitPollVote(target);
          break;
        case 'view-author':
          event.preventDefault();
          handleViewAuthor(target);
          break;
        case 'view-tag':
          event.preventDefault();
          handleViewTag(target);
          break;
        default:
          break;
      }
    }

    // ---------- Event handlers ----------
    function handleSearchSubmit(formEl) {
      var input = formEl.querySelector('input[name="query"]');
      var query = input ? input.value.trim() : '';
      if (!query) {
        return;
      }
      window.location.href = 'search_results.html?query=' + encodeURIComponent(query);
    }

    function handleToggleSubscription() {
      if (!pageState.discussion) {
        return;
      }
      var desired = !pageState.discussion.isSubscribed;
      try {
        var result = WebsiteSDK.setDiscussionSubscription(pageState.discussionId, desired);
        if (result && result.discussion) {
          pageState.discussion = result.discussion;
          renderThread();
        }
      } catch (err) {
        // Optional: could show a toast or inline error
      }
    }

    function handleToggleBookmark() {
      if (!pageState.discussion) {
        return;
      }
      var desired = !pageState.discussion.isBookmarked;
      try {
        var result = WebsiteSDK.setDiscussionBookmark(pageState.discussionId, desired);
        if (result && result.discussion) {
          pageState.discussion = result.discussion;
          renderThread();
        }
      } catch (err) {
        // Optional: could show a toast or inline error
      }
    }

    function updatePostCounts(postId, newUpvoteCount, newLikeCount, userHasUpvoted, userHasLiked) {
      var op = pageState.originalPost;
      if (op && op.id === postId) {
        if (typeof newUpvoteCount === 'number') {
          op.upvoteCount = newUpvoteCount;
        }
        if (typeof newLikeCount === 'number') {
          op.likeCount = newLikeCount;
        }
      }
      var replies = pageState.replies || [];
      for (var i = 0; i < replies.length; i++) {
        if (replies[i].id === postId) {
          if (typeof newUpvoteCount === 'number') {
            replies[i].upvoteCount = newUpvoteCount;
          }
          if (typeof newLikeCount === 'number') {
            replies[i].likeCount = newLikeCount;
          }
          break;
        }
      }
      var existing = pageState.postReactions[postId] || { userHasUpvoted: false, userHasLiked: false };
      if (typeof userHasUpvoted === 'boolean') {
        existing.userHasUpvoted = userHasUpvoted;
      }
      if (typeof userHasLiked === 'boolean') {
        existing.userHasLiked = userHasLiked;
      }
      pageState.postReactions[postId] = existing;
    }

    function handleUpvoteClick(buttonEl) {
      var postId = buttonEl.dataset.postId;
      if (!postId) {
        return;
      }
      var current = pageState.postReactions[postId] || { userHasUpvoted: false, userHasLiked: false };
      var desired = !current.userHasUpvoted;
      try {
        var result = WebsiteSDK.upvotePost(postId, desired);
        if (result && result.success) {
          updatePostCounts(postId, result.newUpvoteCount, null, result.userHasUpvoted, null);
          renderThread();
        }
      } catch (err) {
        // Optional error handling
      }
    }

    function handleLikeClick(buttonEl) {
      var postId = buttonEl.dataset.postId;
      if (!postId) {
        return;
      }
      var current = pageState.postReactions[postId] || { userHasUpvoted: false, userHasLiked: false };
      var desired = !current.userHasLiked;
      try {
        var result = WebsiteSDK.likePost(postId, desired);
        if (result && result.success) {
          updatePostCounts(postId, null, result.newLikeCount, null, result.userHasLiked);
          renderThread();
        }
      } catch (err) {
        // Optional error handling
      }
    }

    function closeAllInlineEditors() {
      var editors = document.querySelectorAll('.inline-reply-editor');
      for (var i = 0; i < editors.length; i++) {
        var form = editors[i];
        if (form.parentNode) {
          form.parentNode.removeChild(form);
        }
      }
    }

    function handleOpenInlineReply(buttonEl) {
      var postId = buttonEl.dataset.postId;
      var authorName = buttonEl.dataset.authorName || '';
      if (!postId) {
        return;
      }

      closeAllInlineEditors();

      var anchor = document.querySelector('[data-inline-reply-anchor-for="' + postId.replace(/"/g, '\\"') + '"]');
      if (!anchor) {
        return;
      }

      var mention = authorName ? '@' + authorName + ' ' : '';

      var wrapper = document.createElement('div');
      wrapper.innerHTML = `
        <form class="inline-reply-editor" data-action="submit-inline-reply" data-parent-post-id="${escapeHtml(postId)}">
          <div class="form-field">
            <label class="visually-hidden">Reply</label>
            <textarea name="body" rows="4" required>${escapeHtml(mention)}</textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="primary-btn">Reply</button>
            <button type="button" class="secondary-btn" data-action="close-inline-editor">Cancel</button>
            <span class="form-status" aria-live="polite"></span>
          </div>
        </form>
      `;

      var formEl = wrapper.firstElementChild;
      anchor.appendChild(formEl);
      bindActions(formEl);

      var textarea = formEl.querySelector('textarea');
      if (textarea) {
        textarea.focus();
        textarea.setSelectionRange(textarea.value.length, textarea.value.length);
      }
    }

    function handleCloseInlineEditor(buttonEl) {
      var form = buttonEl.closest('.inline-reply-editor');
      if (form && form.parentNode) {
        form.parentNode.removeChild(form);
      }
    }

    function handleMainReplySubmit(formEl) {
      if (!pageState.discussionId) {
        return;
      }
      var textarea = formEl.querySelector('textarea[name="body"]');
      var statusEl = formEl.querySelector('.form-status');
      var body = textarea ? textarea.value.trim() : '';
      if (!body) {
        if (statusEl) {
          statusEl.textContent = 'Reply cannot be empty.';
        }
        return;
      }
      try {
        var result = WebsiteSDK.replyToDiscussion(pageState.discussionId, body);
        if (result && result.newPost) {
          pageState.replies.push(result.newPost);
          if (pageState.discussion && typeof result.updatedReplyCount === 'number') {
            pageState.discussion.replyCount = result.updatedReplyCount;
          }
          pageState.lastCreatedPostId = result.newPost.id;
          if (textarea) {
            textarea.value = '';
          }
          if (statusEl) {
            statusEl.textContent = result.message || 'Reply posted.';
          }
          renderThread();
        }
      } catch (err) {
        if (statusEl) {
          statusEl.textContent = 'Unable to post reply. Please try again.';
        }
      }
    }

    function handleInlineReplySubmit(formEl) {
      var parentPostId = formEl.dataset.parentPostId;
      if (!parentPostId) {
        return;
      }
      var textarea = formEl.querySelector('textarea[name="body"]');
      var statusEl = formEl.querySelector('.form-status');
      var body = textarea ? textarea.value.trim() : '';
      if (!body) {
        if (statusEl) {
          statusEl.textContent = 'Reply cannot be empty.';
        }
        return;
      }
      try {
        var result = WebsiteSDK.replyToPost(parentPostId, body);
        if (result && result.newPost) {
          pageState.replies.push(result.newPost);
          var replies = pageState.replies;
          for (var i = 0; i < replies.length; i++) {
            if (replies[i].id === parentPostId) {
              if (typeof result.updatedParentReplyCount === 'number') {
                replies[i].replyCount = result.updatedParentReplyCount;
              }
              break;
            }
          }
          pageState.lastCreatedPostId = result.newPost.id;
          if (statusEl) {
            statusEl.textContent = result.message || 'Reply posted.';
          }
          closeAllInlineEditors();
          renderThread();
        }
      } catch (err) {
        if (statusEl) {
          statusEl.textContent = 'Unable to post reply. Please try again.';
        }
      }
    }

    function handleOpenReportModal(buttonEl) {
      var postId = buttonEl.dataset.postId;
      if (!postId || !reportModalEl) {
        return;
      }
      reportModalEl.hidden = false;
      var postIdInput = reportModalEl.querySelector('input[name="postId"]');
      var reasonSelect = reportModalEl.querySelector('select[name="reason"]');
      var noteInput = reportModalEl.querySelector('textarea[name="note"]');
      var statusEl = reportModalEl.querySelector('.form-status');
      if (postIdInput) {
        postIdInput.value = postId;
      }
      if (reasonSelect) {
        reasonSelect.value = '';
      }
      if (noteInput) {
        noteInput.value = '';
      }
      if (statusEl) {
        statusEl.textContent = '';
      }
    }

    function handleCloseReportModal() {
      if (reportModalEl) {
        reportModalEl.hidden = true;
      }
    }

    function handleSubmitReport(formEl) {
      var postIdInput = formEl.querySelector('input[name="postId"]');
      var reasonSelect = formEl.querySelector('select[name="reason"]');
      var noteInput = formEl.querySelector('textarea[name="note"]');
      var statusEl = formEl.querySelector('.form-status');

      var postId = postIdInput ? postIdInput.value : '';
      var reason = reasonSelect ? reasonSelect.value : '';
      var note = noteInput ? noteInput.value.trim() : '';

      if (!postId || !reason) {
        if (statusEl) {
          statusEl.textContent = 'Please select a reason.';
        }
        return;
      }

      try {
        var result = WebsiteSDK.reportPost(postId, reason, note || undefined);
        if (statusEl) {
          statusEl.textContent = result && result.message ? result.message : 'Report submitted. Thank you.';
        }
        setTimeout(function() {
          handleCloseReportModal();
        }, 800);
      } catch (err) {
        if (statusEl) {
          statusEl.textContent = 'Unable to submit report. Please try again.';
        }
      }
    }

    function handleScrollToTop() {
      var target = originalPostEl || threadContentEl;
      if (target && target.scrollIntoView) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function handleSetViewMode(buttonEl) {
      var mode = buttonEl.dataset.viewMode;
      if (!mode || (mode !== 'threaded' && mode !== 'chronological')) {
        return;
      }
      if (pageState.viewMode === mode) {
        return;
      }
      pageState.viewMode = mode;

      // Update URL parameter without reloading
      try {
        var url = new URL(window.location.href);
        url.searchParams.set('viewMode', mode);
        window.history.replaceState({}, '', url.toString());
      } catch (err) {
        // ignore if URL API not available
      }

      if (repliesHeaderEl) {
        renderRepliesHeader(repliesHeaderEl);
      }
      if (repliesListEl) {
        renderRepliesList(repliesListEl);
      }
      bindActions(document);
    }

    function handleSubmitPollVote(formEl) {
      if (!pageState.poll || !pageState.poll.id) {
        return;
      }
      var pollId = formEl.dataset.pollId;
      if (!pollId) {
        return;
      }
      var multiple = !!pageState.poll.multipleChoiceAllowed;
      var selector = multiple ? 'input[name="options"]:checked' : 'input[name="optionId"]:checked';
      var selectedInputs = formEl.querySelectorAll(selector);
      var statusEl = formEl.querySelector('.form-status');

      if (!selectedInputs || selectedInputs.length === 0) {
        if (statusEl) {
          statusEl.textContent = 'Select at least one option.';
        }
        return;
      }

      var newSelectedOptionIds = [];

      try {
        for (var i = 0; i < selectedInputs.length; i++) {
          var optId = selectedInputs[i].value;
          if (!optId) {
            continue;
          }
          var result = WebsiteSDK.voteInPoll(pollId, optId);
          if (result) {
            if (result.options) {
              pageState.pollOptions = result.options;
            }
            if (result.pollResponse && result.pollResponse.optionId) {
              newSelectedOptionIds.push(result.pollResponse.optionId);
            }
          }
        }
        if (newSelectedOptionIds.length > 0) {
          pageState.pollResponseOptionIds = newSelectedOptionIds;
        }
        if (statusEl) {
          statusEl.textContent = 'Vote submitted.';
        }
        if (pollPanelEl) {
          renderPollPanel(pollPanelEl);
        }
        bindActions(document);
      } catch (err) {
        if (statusEl) {
          statusEl.textContent = 'Unable to submit vote. Please try again.';
        }
      }
    }

    function handleViewAuthor(el) {
      var profileId = el.dataset.profileId;
      if (!profileId) {
        return;
      }
      window.location.href = 'user_profile.html?memberProfileId=' + encodeURIComponent(profileId);
    }

    function handleViewTag(el) {
      var tagId = el.dataset.tagId;
      if (!tagId) {
        return;
      }
      window.location.href = 'topic.html?tagId=' + encodeURIComponent(tagId);
    }

    function handleScrollForTopLink() {
      if (!floatingTopEl) {
        return;
      }
      var threshold = 400;
      if (window.scrollY > threshold) {
        floatingTopEl.hidden = false;
      } else {
        floatingTopEl.hidden = true;
      }
    }

  })();
  </script>
</body>
</html>
