<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Community Forum</title>
  <!--
    Design analysis summary
    - Very minimal, content-first forum layout.
    - Full-width black header bar with left-aligned navigation.
    - Off‑white page background (#F6F5F1) with white cards on a light gray border.
    - Clean sans-serif typography with clear hierarchy.
    - Large vertical whitespace between header, content sections, and cards.
    - Subtle, flat footer expected with small, low‑contrast links.
  -->

  <!-- Recommended fonts matching the design's grotesk / utilitarian feel -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Global stylesheet -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific stylesheet -->
  <link rel='stylesheet' href='bookmarks.css'>
</head>
<body>
  <div class='site'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='header-left'>
          <nav class='primary-nav' aria-label='Primary'>
            <ul class='primary-nav-list'>
              <li class='primary-nav-item'>
                <a href='index.html' class='primary-nav-link' title='Forum homepage with trending, popular, and recent discussions'>Home</a>
              </li>
              <li class='primary-nav-item'>
                <a href='categories.html' class='primary-nav-link' title='Browse all discussion categories such as Web Development and Product Feedback'>Categories</a>
              </li>
              <li class='primary-nav-item'>
                <a href='topics.html' class='primary-nav-link' title='Explore, search, and follow discussion topics and tags'>Topics</a>
              </li>
              <li class='primary-nav-item'>
                <a href='bookmarks.html' class='primary-nav-link' title='View and open your bookmarked or saved discussions'>Bookmarks</a>
              </li>
              <li class='primary-nav-item'>
                <a href='help.html' class='primary-nav-link' title='Read help articles and FAQs about using the forum'>Help</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class='header-right'>
          <!-- Static search icon to match the visual design (non-interactive per requirements) -->
          <span class='nav-icon nav-icon-search' aria-hidden='true'></span>

          <!-- User avatar with dropdown for special access pages -->
          <div class='user-menu'>
            <button class='user-avatar' type='button' aria-haspopup='true' aria-expanded='false'>
              <span class='visually-hidden'>Open user menu</span>
              <span class='user-avatar-initials'>U</span>
            </button>
            <ul class='user-menu-dropdown' aria-label='User menu'>
              <li class='user-menu-item'>
                <a href='messages.html' class='user-menu-link' title='Accessible via a Messages item in the signed-in user&#39;s menu'>Messages</a>
              </li>
              <li class='user-menu-item'>
                <a href='settings.html' class='user-menu-link' title='Accessible via a Settings option in the signed-in user&#39;s menu'>User Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <!-- Bookmarks page header band with global search -->
      <section class='page-header-band'>
        <div class='content-shell header-band-inner'>
          <div class='header-band-row'>
            <h1 class='page-title'>Bookmarks</h1>
            <form class='header-search-form' role='search' data-component='header-search-form' data-action='header-search-submit'>
              <label class='visually-hidden' for='globalSearchInput'>Search all discussions</label>
              <div class='header-search-input-wrapper'>
                <input id='globalSearchInput' name='query' type='search' placeholder='Search all discussions' autocomplete='off'>
                <button type='submit' class='icon-button header-search-submit'>Search</button>
              </div>
            </form>
          </div>
        </div>
      </section>

      <div class='content-shell'>
        <section class='bookmarks-main' aria-label='Bookmarked discussions'>
          <!-- Toolbar: in-page filter and sort controls -->
          <div class='bookmarks-toolbar' data-component='bookmarks-toolbar'>
            <form class='bookmarks-toolbar-form' data-action='bookmarks-toolbar-submit'>
              <div class='toolbar-row'>
                <div class='toolbar-group toolbar-group-filter'>
                  <label for='bookmarksFilterInput' class='toolbar-label'>Filter within bookmarks</label>
                  <input id='bookmarksFilterInput' name='q' type='search' class='toolbar-input' placeholder='Search by title, category, or tag'>
                </div>
                <div class='toolbar-group toolbar-group-sort'>
                  <label for='bookmarksSortField' class='toolbar-label'>Sort by</label>
                  <select id='bookmarksSortField' name='sort' class='toolbar-select'>
                    <option value='lastReplyAt'>Last activity</option>
                    <option value='createdAt'>Created date</option>
                    <option value='title'>Title</option>
                  </select>
                  <select id='bookmarksSortOrder' name='order' class='toolbar-select'>
                    <option value='desc'>Descending</option>
                    <option value='asc'>Ascending</option>
                  </select>
                </div>
                <div class='toolbar-group toolbar-group-secondary'>
                  <button type='button' class='toolbar-link' data-action='clear-bookmarks-filters'>Clear filters</button>
                </div>
              </div>
            </form>
            <div class='bookmarks-removed-banner' data-component='bookmarks-removed-banner' hidden>
              <p class='meta-text'>A bookmark was removed from this view. Server-side bookmark status may differ.</p>
            </div>
          </div>

          <!-- Data fetcher wrapper: loading, list, empty state, pagination -->
          <section class='bookmarks-section' data-component='bookmarks-data-fetcher' data-populate='bookmarked-discussions'>
            <div class='bookmarks-loading' data-component='bookmarks-loading' aria-live='polite'>
              Loading your bookmarks
            </div>

            <div class='bookmarks-empty' data-component='bookmarks-empty' hidden>
              <p>No bookmarked discussions match your current filters.</p>
            </div>

            <div class='post-list bookmarks-list' data-component='bookmarks-list' aria-live='polite'>
              <!-- Bookmark cards rendered here by JavaScript -->
            </div>

            <nav class='pagination bookmarks-pagination' aria-label='Bookmarks pages' data-component='bookmarks-pagination'>
              <!-- Pagination controls rendered here by JavaScript -->
            </nav>
          </section>
        </section>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-nav-link' title='Learn more about this community and platform'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-nav-link' title='Get help and support for using the forum'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-nav-link' title='Read the terms of service for using the site'>Terms</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-nav-link' title='Review the privacy policy and data practices'>Privacy</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page UI logic -->
  <script>
    (function() {
      'use strict';

      var fullBookmarks = [];

      function readStateFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var sort = params.get('sort') || 'lastReplyAt';
        var order = params.get('order');
        if (order !== 'asc' && order !== 'desc') {
          order = 'desc';
        }
        var q = params.get('q') || '';
        var page = parseInt(params.get('page') || '1', 10);
        if (isNaN(page) || page < 1) {
          page = 1;
        }
        var perPage = parseInt(params.get('perPage') || '10', 10);
        if (isNaN(perPage) || perPage < 1) {
          perPage = 10;
        }
        var removedId = params.get('removedId');
        return {
          sort: sort,
          order: order,
          q: q,
          page: page,
          perPage: perPage,
          removedId: removedId
        };
      }

      function writeStateToUrl(state, options) {
        var params = new URLSearchParams();
        if (state.sort) params.set('sort', state.sort);
        if (state.order) params.set('order', state.order);
        if (state.q && state.q.trim() !== '') params.set('q', state.q.trim());
        if (state.page && state.page !== 1) params.set('page', String(state.page));
        if (state.perPage && state.perPage !== 10) params.set('perPage', String(state.perPage));
        if (state.removedId) params.set('removedId', state.removedId);
        var newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        var method = options && options.replace ? 'replaceState' : 'pushState';
        window.history[method]({}, '', newUrl);
      }

      function escapeHtml(str) {
        if (str == null) return '';
        return String(str).replace(/[&<>\'\"]/g, function(ch) {
          if (ch === '&') return '&amp;';
          if (ch === '<') return '&lt;';
          if (ch === '>') return '&gt;';
          if (ch === '\'') return '&#39;';
          if (ch === '"') return '&quot;';
          return ch;
        });
      }

      function formatDate(iso) {
        if (!iso) return '14';
        var d = new Date(iso);
        if (isNaN(d.getTime())) return '14';
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      }

      function sortBookmarks(list, state) {
        var field = state.sort;
        var orderMultiplier = state.order === 'asc' ? 1 : -1;
        var safe = list.slice();
        safe.sort(function(a, b) {
          var da = a.discussion;
          var db = b.discussion;
          var va;
          var vb;
          if (field === 'title') {
            va = (da.title || '').toLowerCase();
            vb = (db.title || '').toLowerCase();
            if (va < vb) return -1 * orderMultiplier;
            if (va > vb) return 1 * orderMultiplier;
            return 0;
          }
          if (field === 'createdAt') {
            va = da.createdAt;
            vb = db.createdAt;
          } else {
            va = da.lastReplyAt || da.updatedAt || da.createdAt;
            vb = db.lastReplyAt || db.updatedAt || db.createdAt;
          }
          var ta = va ? new Date(va).getTime() : 0;
          var tb = vb ? new Date(vb).getTime() : 0;
          if (ta < tb) return -1 * orderMultiplier;
          if (ta > tb) return 1 * orderMultiplier;
          return 0;
        });
        return safe;
      }

      function filterBookmarks(list, state) {
        var q = state.q ? state.q.trim().toLowerCase() : '';
        if (!q) return list.slice();
        return list.filter(function(item) {
          var d = item.discussion;
          var inTitle = (d.title || '').toLowerCase().indexOf(q) !== -1;
          var inCategory = (item.categoryName || '').toLowerCase().indexOf(q) !== -1;
          var tagsJoined = (item.tagNames || []).join(' ').toLowerCase();
          var inTags = tagsJoined.indexOf(q) !== -1;
          return inTitle || inCategory || inTags;
        });
      }

      function paginate(list, state) {
        var total = list.length;
        var perPage = state.perPage;
        var totalPages = Math.max(1, Math.ceil(total / perPage));
        var page = state.page;
        if (page > totalPages) page = totalPages;
        var start = (page - 1) * perPage;
        var end = start + perPage;
        var slice = list.slice(start, end);
        return {
          items: slice,
          totalItems: total,
          totalPages: totalPages,
          page: page,
          perPage: perPage
        };
      }

      function renderBookmarksList(container, items, state) {
        container.innerHTML = '';
        if (!items || !items.length) return;
        items.forEach(function(item) {
          var d = item.discussion;
          var article = document.createElement('article');
          article.className = 'post-card bookmark-card';
          article.setAttribute('data-component', 'bookmark-item');
          article.setAttribute('data-discussion-id', d.id);

          var replyCount = typeof d.replyCount === 'number' ? d.replyCount : 0;
          var viewCount = typeof d.viewCount === 'number' ? d.viewCount : 0;
          var score = typeof d.score === 'number' ? d.score : 0;
          var createdLabel = formatDate(d.createdAt);
          var lastActivityLabel = formatDate(d.lastReplyAt || d.updatedAt || d.createdAt);

          var tags = item.tagNames && item.tagNames.length ? item.tagNames.map(function(t) {
            return '<span class="tag-pill">' + escapeHtml(t) + '</span>';
          }).join(' ') : '';
          var tagsBlock = tags ? '<span class="post-meta-separator">b7</span><span class="post-tags">' + tags + '</span>' : '';

          article.innerHTML = `
<header class='post-card-header'>
  <div class='post-card-header-main'>
    <div class='avatar avatar-placeholder' aria-hidden='true'></div>
    <div class='post-meta'>
      <button type='button' class='post-title-link' data-action='open-discussion'>
        ${escapeHtml(d.title)}
      </button>
      <div class='post-meta-secondary'>
        <span class='post-category'>${escapeHtml(item.categoryName || 'Uncategorized')}</span>
        ${tagsBlock}
      </div>
    </div>
  </div>
  <div class='post-card-header-actions'>
    <button type='button' class='icon-button icon-button-small' data-action='remove-bookmark' aria-label='Remove from bookmarks'>
      Remove
    </button>
  </div>
</header>
<footer class='post-card-footer'>
  <ul class='post-stats'>
    <li class='post-stat-item'><span class='post-stat-label'>Replies</span> <span class='post-stat-value'>${replyCount}</span></li>
    <li class='post-stat-item'><span class='post-stat-label'>Views</span> <span class='post-stat-value'>${viewCount}</span></li>
    <li class='post-stat-item'><span class='post-stat-label'>Score</span> <span class='post-stat-value'>${score}</span></li>
    <li class='post-stat-item'><span class='post-stat-label'>Created</span> <span class='post-stat-value'>${createdLabel}</span></li>
    <li class='post-stat-item'><span class='post-stat-label'>Last activity</span> <span class='post-stat-value'>${lastActivityLabel}</span></li>
  </ul>
</footer>
`; 
          container.appendChild(article);
        });
      }

      function renderPagination(container, totalItems, state) {
        container.innerHTML = '';
        var perPage = state.perPage;
        var totalPages = Math.max(1, Math.ceil(totalItems / perPage));
        if (totalPages <= 1) {
          container.setAttribute('aria-hidden', 'true');
          return;
        }
        container.removeAttribute('aria-hidden');

        var navList = document.createElement('ul');
        navList.className = 'pagination-list';
        var currentPage = state.page;

        var prevItem = document.createElement('li');
        prevItem.className = 'pagination-item';
        var prevButton = document.createElement('button');
        prevButton.type = 'button';
        prevButton.className = 'pagination-link';
        prevButton.setAttribute('data-action', 'page-change');
        prevButton.setAttribute('data-page', String(Math.max(1, currentPage - 1)));
        prevButton.textContent = 'Previous';
        if (currentPage === 1) {
          prevButton.disabled = true;
        }
        prevItem.appendChild(prevButton);
        navList.appendChild(prevItem);

        for (var p = 1; p <= totalPages; p += 1) {
          var li = document.createElement('li');
          li.className = 'pagination-item';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'pagination-link';
          if (p === currentPage) {
            btn.className += ' is-current';
            btn.disabled = true;
          }
          btn.setAttribute('data-action', 'page-change');
          btn.setAttribute('data-page', String(p));
          btn.textContent = String(p);
          li.appendChild(btn);
          navList.appendChild(li);
        }

        var nextItem = document.createElement('li');
        nextItem.className = 'pagination-item';
        var nextButton = document.createElement('button');
        nextButton.type = 'button';
        nextButton.className = 'pagination-link';
        nextButton.setAttribute('data-action', 'page-change');
        nextButton.setAttribute('data-page', String(Math.min(totalPages, currentPage + 1)));
        nextButton.textContent = 'Next';
        if (currentPage === totalPages) {
          nextButton.disabled = true;
        }
        nextItem.appendChild(nextButton);
        navList.appendChild(nextItem);

        container.appendChild(navList);
      }

      function syncToolbarToState(state, toolbarForm) {
        if (!toolbarForm) return;
        var qInput = toolbarForm.querySelector('input[name=q]');
        var sortSelect = toolbarForm.querySelector('select[name=sort]');
        var orderSelect = toolbarForm.querySelector('select[name=order]');
        if (qInput) qInput.value = state.q || '';
        if (sortSelect) sortSelect.value = state.sort;
        if (orderSelect) orderSelect.value = state.order;

        var removedBanner = document.querySelector('[data-component=bookmarks-removed-banner]');
        if (removedBanner) {
          if (state.removedId) {
            removedBanner.removeAttribute('hidden');
          } else {
            removedBanner.setAttribute('hidden', 'hidden');
          }
        }
      }

      function deriveAndRender() {
        var listContainer = document.querySelector('[data-component=bookmarks-list]');
        var paginationContainer = document.querySelector('[data-component=bookmarks-pagination]');
        var emptyState = document.querySelector('[data-component=bookmarks-empty]');
        var loadingState = document.querySelector('[data-component=bookmarks-loading]');
        var toolbarForm = document.querySelector('[data-action=bookmarks-toolbar-submit]');
        if (!listContainer || !paginationContainer) return;

        var state = readStateFromUrl();
        syncToolbarToState(state, toolbarForm);

        if (loadingState) {
          loadingState.setAttribute('hidden', 'hidden');
        }

        var filtered = filterBookmarks(fullBookmarks, state);
        var sorted = sortBookmarks(filtered, state);
        var pagination = paginate(sorted, state);

        var effectiveState = {
          sort: state.sort,
          order: state.order,
          q: state.q,
          page: pagination.page,
          perPage: pagination.perPage,
          removedId: state.removedId
        };

        if (pagination.totalItems === 0) {
          if (emptyState) emptyState.removeAttribute('hidden');
          renderBookmarksList(listContainer, [], effectiveState);
          renderPagination(paginationContainer, 0, effectiveState);
        } else {
          if (emptyState) emptyState.setAttribute('hidden', 'hidden');
          renderBookmarksList(listContainer, pagination.items, effectiveState);
          renderPagination(paginationContainer, pagination.totalItems, effectiveState);
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        var bookmarksContainer = document.querySelector('[data-populate=bookmarked-discussions]');
        var loadingState = document.querySelector('[data-component=bookmarks-loading]');
        var emptyState = document.querySelector('[data-component=bookmarks-empty]');
        var toolbarForm = document.querySelector('[data-action=bookmarks-toolbar-submit]');
        var paginationContainer = document.querySelector('[data-component=bookmarks-pagination]');
        var listContainer = document.querySelector('[data-component=bookmarks-list]');
        var headerSearchForm = document.querySelector('[data-component=header-search-form]');

        if (loadingState) {
          loadingState.removeAttribute('hidden');
        }

        try {
          if (bookmarksContainer) {
            fullBookmarks = WebsiteSDK.getBookmarkedDiscussions() || [];
          }
        } catch (err) {
          if (loadingState) loadingState.setAttribute('hidden', 'hidden');
          if (emptyState) {
            emptyState.removeAttribute('hidden');
            emptyState.textContent = 'Unable to load your bookmarks right now.';
          }
          return;
        }

        deriveAndRender();

        // Toolbar: filter and sort
        if (toolbarForm) {
          toolbarForm.addEventListener('submit', function(evt) {
            evt.preventDefault();
            var current = readStateFromUrl();
            var qInput = toolbarForm.querySelector('input[name=q]');
            var sortSelect = toolbarForm.querySelector('select[name=sort]');
            var orderSelect = toolbarForm.querySelector('select[name=order]');
            var next = {
              sort: sortSelect ? (sortSelect.value || current.sort) : current.sort,
              order: orderSelect ? (orderSelect.value || current.order) : current.order,
              q: qInput ? (qInput.value || '') : current.q,
              page: 1,
              perPage: current.perPage,
              removedId: current.removedId
            };
            writeStateToUrl(next, { replace: false });
            deriveAndRender();
          });

          var clearButton = toolbarForm.querySelector('[data-action=clear-bookmarks-filters]');
          if (clearButton) {
            clearButton.addEventListener('click', function() {
              var current = readStateFromUrl();
              var next = {
                sort: 'lastReplyAt',
                order: 'desc',
                q: '',
                page: 1,
                perPage: current.perPage,
                removedId: current.removedId
              };
              writeStateToUrl(next, { replace: false });
              deriveAndRender();
            });
          }
        }

        // Pagination controls
        if (paginationContainer) {
          paginationContainer.addEventListener('click', function(evt) {
            var target = evt.target;
            if (!target) return;
            var actionEl = target.closest('[data-action=page-change]');
            if (!actionEl) return;
            var pageStr = actionEl.getAttribute('data-page');
            var newPage = parseInt(pageStr || '1', 10);
            if (isNaN(newPage)) return;
            var current = readStateFromUrl();
            if (newPage === current.page) return;
            var next = {
              sort: current.sort,
              order: current.order,
              q: current.q,
              page: newPage,
              perPage: current.perPage,
              removedId: current.removedId
            };
            writeStateToUrl(next, { replace: false });
            deriveAndRender();
          });
        }

        // Bookmarks list actions: open discussion, remove bookmark
        if (listContainer) {
          listContainer.addEventListener('click', function(evt) {
            var target = evt.target;
            if (!target) return;

            var openButton = target.closest('[data-action=open-discussion]');
            if (openButton) {
              var card = openButton.closest('[data-discussion-id]');
              if (!card) return;
              var discussionId = card.getAttribute('data-discussion-id');
              if (!discussionId) return;
              window.location.href = 'discussion.html?discussionId=' + encodeURIComponent(discussionId);
              return;
            }

            var removeButton = target.closest('[data-action=remove-bookmark]');
            if (removeButton) {
              var cardToRemove = removeButton.closest('[data-discussion-id]');
              if (!cardToRemove) return;
              var removeId = cardToRemove.getAttribute('data-discussion-id');
              if (!removeId) return;

              fullBookmarks = fullBookmarks.filter(function(item) {
                return item.discussion && item.discussion.id !== removeId;
              });

              var currentState = readStateFromUrl();
              var nextState = {
                sort: currentState.sort,
                order: currentState.order,
                q: currentState.q,
                page: 1,
                perPage: currentState.perPage,
                removedId: removeId
              };
              writeStateToUrl(nextState, { replace: false });
              deriveAndRender();
            }
          });
        }

        // Header global search
        if (headerSearchForm) {
          headerSearchForm.addEventListener('submit', function(evt) {
            evt.preventDefault();
            var input = headerSearchForm.querySelector('input[name=query]');
            var value = input && input.value ? input.value.trim() : '';
            if (!value) return;
            window.location.href = 'search_results.html?query=' + encodeURIComponent(value);
          });
        }

        // Handle back/forward navigation syncing
        window.addEventListener('popstate', function() {
          deriveAndRender();
        });
      });
    })();
  </script>
</body>
</html>
