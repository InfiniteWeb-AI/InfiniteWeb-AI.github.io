06-03T13:40:00Z\",\"hasPoll\":false},{\"id\":\"disc_react_state_management_2026\",\"categoryId\":\"web-development\",\"title\":\"State management in React in 2026: Redux, Zustand, or signals?\",\"body\":\"With so many options for managing state in React apps, it\\u0018s tough to know what to standardize on. Are you still using Redux, have you moved to Zustand or Jotai, or are you experimenting with signals-based approaches? I\\u0018m especially curious how teams are balancing DX, performance, and long-term maintainability.\",\"createdAt\":\"2026-01-22T15:25:00Z\",\"updatedAt\":\"2026-02-05T11:50:00Z\",\"viewCount\":2110,\"score\":61,\"trendingScore\":77,\"tagIds\":[],\"replyCount\":0,\"lastReplyAt\":\"2026-01-22T15:25:00Z\",\"hasPoll\":false},{\"id\":\"disc_career_switch_to_ux\",\"categoryId\":\"career\",\"title\":\"Switching from frontend development to UX design: what should I prepare?\",\"body\":\"I\\u0018ve spent a few years as a frontend developer and I\\u0018m increasingly drawn to UX design and research. For those who\\u0018ve made a similar transition, which skills and artifacts mattered most when applying for UX roles? I\\u0018m especially interested in how to position my existing projects and what to prioritize in a portfolio.\",\"createdAt\":\"2025-04-11T09:55:00Z\",\"updatedAt\":\"2025-05-03T12:40:00Z\",\"viewCount\":1420,\"score\":36,\"trendingScore\":46,\"tagIds\":[],\"replyCount\":0,\"lastReplyAt\":\"2025-04-11T09:55:00Z\",\"hasPoll\":false},{\"id\":\"disc_async_team_updates\",\"categoryId\":\"general-discussion\",\"title\":\"Async standups and team updates: tools and formats that actually work\",\"body\":\"Daily standups can be noisy and unproductive, especially across time zones. For teams that have switched to async updates, which tools and message formats have worked best? Share templates, examples, and pitfalls so other teams can make the shift without losing alignment.\",\"createdAt\":\"2024-09-19T08:20:00Z\",\"updatedAt\":\"2024-10-02T10:05:00Z\",\"viewCount\":760,\"score\":27,\"trendingScore\":33,\"tagIds\":[],\"replyCount\":0,\"lastReplyAt\":\"2024-09-19T08:20:00Z\",\"hasPoll\":false},{\"id\":\"disc_accessibility_checklist_frontend\",\"categoryId\":\"design\",\"title\":\"Your go-to accessibility checklist before shipping a feature\",\"body\":\"Before you ship a new feature, what\\u0018s on your accessibility checklist? I\\u0018m looking for practical steps around keyboard navigation, screen reader announcements, color contrast, and motion sensitivity. If you have a template or a short list that your team uses, please share it so others can adapt it to their workflow.\",\"createdAt\":\"2025-07-07T11:10:00Z\",\"updatedAt\":\"2025-07-21T09:00:00Z\",\"viewCount\":980,\"score\":42,\"trendingScore\":49,\"tagIds\":[],\"replyCount\":0,\"lastReplyAt\":\"2025-07-07T11:10:00Z\",\"hasPoll\":false},{\"id\":\"disc_nodejs_scaling_apis\",\"categoryId\":\"web-development\",\"title\":\"Scaling Node.js APIs: handling spikes and long-running requests\",\"body\":\"Our Node.js API is starting to experience traffic spikes during certain hours, and a few endpoints involve long-running operations. How are you handling connection limits, backpressure, and timeouts in production? I\\u0018d love to hear about patterns with queues, workers, or serverless functions that helped you scale reliably.\",\"createdAt\":\"2024-11-28T17:30:00Z\",\"updatedAt\":\"2024-12-15T13:25:00Z\",\"viewCount\":1195,\"score\":34,\"trendingScore\":44,\"tagIds\":[],\"replyCount\":0,\"lastReplyAt\":\"2024-11-28T17:30:00Z\",\"hasPoll\":false}]");
            localStorage.setItem("posts", "[{\"id\":\"post_disc_js_arrays_helpers_op\",\"discussionId\":\"disc_js_arrays_helpers\",\"parentPostId\":null,\"isOriginalPost\":true,\"authorDisplayName\":\"Array Ninja\",\"authorProfileId\":\"array_ninja\",\"body\":\"I’m working with JavaScript arrays that can easily reach tens of thousands of items, and some of my current approaches feel sluggish. I’m relying heavily on map, filter, and reduce, but I’m not sure if I’m structuring my data the best way. What patterns, libraries, or native methods do you use to keep JavaScript arrays performant and readable at scale?\",\"createdAt\":\"2025-12-05T10:10:00Z\",\"updatedAt\":\"2025-12-05T10:10:00Z\",\"containsLink\":false,\"links\":[],\"upvoteCount\":1,\"likeCount\":0,\"replyCount\":9},{\"id\":\"post_disc_js_arrays_helpers_reply_1\",\"discussionId\":\"disc_js_arrays_helpers\",\"parentPostId\":\"post_disc_js_arrays_helpers_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"JS Guru\",\"authorProfileId\":\"js_guru\",\"body\":\"For really large arrays I try to avoid creating too many intermediate copies. Chaining map and filter is convenient, but sometimes I replace it with a single for-of loop that handles all conditions at once. It is less elegant, but dramatically reduces allocations in hot paths.\",\"createdAt\":\"2025-12-05T11:00:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_js_arrays_helpers_reply_2\",\"discussionId\":\"disc_js_arrays_helpers\",\"parentPostId\":\"post_disc_js_arrays_helpers_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"Dev Dan\",\"authorProfileId\":\"dev_dan\",\"body\":\"One trick is to normalize your data up front. If you can shape the array into a predictable schema when it first arrives, later operations can stay really simple. I also batch expensive transformations so they run once on ingestion instead of on every render.\",\"createdAt\":\"2025-12-05T11:20:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_js_arrays_helpers_reply_3\",\"discussionId\":\"disc_js_arrays_helpers\",\"parentPostId\":\"post_disc_js_arrays_helpers_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"Backend Ben\",\"authorProfileId\":\"backend_ben\",\"body\":\"If you are repeatedly scanning the same large array, consider building an index object keyed by IDs or frequently queried fields. Then most lookups become O(1) instead of O(n). The array can remain your canonical ordered list, but the index handles performance-sensitive queries.\",\"createdAt\":\"2025-12-05T11:45:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_js_arrays_helpers_reply_4\",\"discussionId\":\"disc_js_arrays_helpers\",\"parentPostId\":\"post_disc_js_arrays_helpers_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"React Rob\",\"authorProfileId\":\"react_rob\",\"body\":\"From a UI perspective, you usually do not want to render tens of thousands of items at once anyway. Virtualized lists with windowing are essential. That way your array can stay huge, but React only reconciles a tiny subset of rows at any moment.\",\"createdAt\":\"2025-12-05T12:10:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_js_arrays_helpers_reply_5\",\"discussionId\":\"disc_js_arrays_helpers\",\"parentPostId\":\"post_disc_js_arrays_helpers_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"Newbie Coder\",\"authorProfileId\":\"newbie_coder\",\"body\":\"I recently learned that sort in JavaScript mutates the array in place. That caught me off guard because I was expecting new arrays all the time. Now I clone with slice before sorting when I need immutability, and it simplified a lot of weird bugs for me.\",\"createdAt\":\"2025-12-05T12:40:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_js_arrays_helpers_reply_6\",\"discussionId\":\"disc_js_arrays_helpers\",\"parentPostId\":\"post_disc_js_arrays_helpers_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"Accessibility Ava\",\"authorProfileId\":\"accessibility_ava\",\"body\":\"Also consider accessibility when you chunk large arrays for UI. Infinite scrolling with huge arrays can be painful for screen reader users. Sometimes paginated lists with clear landmarks are better than rendering a huge continuous feed.\",\"createdAt\":\"2025-12-05T13:05:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_js_arrays_helpers_reply_7\",\"discussionId\":\"disc_js_arrays_helpers\",\"parentPostId\":\"post_disc_js_arrays_helpers_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"DataViz Kim\",\"authorProfileId\":\"data_viz_kim\",\"body\":\"When arrays back charts, I pre-aggregate the data into bins or time buckets. That way the chart only receives digestible arrays of a few hundred points instead of the raw stream of events, and both rendering and interactions stay smooth.\",\"createdAt\":\"2025-12-05T13:30:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_js_arrays_helpers_reply_8\",\"discussionId\":\"disc_js_arrays_helpers\",\"parentPostId\":\"post_disc_js_arrays_helpers_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"CSS Mentor\",\"authorProfileId\":\"css_mentor\",\"body\":\"Not directly performance-related, but I strongly recommend creating small utility functions for common filters and sorts. It keeps your array logic readable, which makes it easier to optimize later when you profile and find hotspots.\",\"createdAt\":\"2025-12-05T13:55:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_js_arrays_helpers_reply_9\",\"discussionId\":\"disc_js_arrays_helpers\",\"parentPostId\":\"post_disc_js_arrays_helpers_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"Career Coach Mia\",\"authorProfileId\":\"career_coach_mia\",\"body\":\"From a career perspective, being able to explain tradeoffs in array-heavy code during an interview is valuable. If you can talk about memory versus readability and show a profile trace, that really stands out.\",\"createdAt\":\"2025-12-05T14:20:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_trending_react_ux_patterns_op\",\"discussionId\":\"disc_trending_react_ux_patterns\",\"parentPostId\":null,\"isOriginalPost\":true,\"authorDisplayName\":\"React Rob\",\"authorProfileId\":\"react_rob\",\"body\":\"I’m collecting real-world examples of React patterns for complex UX flows: multi-step onboarding, contextual help, and permission-driven UIs. How are you structuring components, state, and routing so that UX stays smooth while the codebase remains maintainable? Screenshots, code snippets, and pattern names are all welcome.\",\"createdAt\":\"2026-02-18T09:00:00Z\",\"updatedAt\":\"2026-02-18T09:00:00Z\",\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":3},{\"id\":\"post_trending_react_reply_1\",\"discussionId\":\"disc_trending_react_ux_patterns\",\"parentPostId\":\"post_disc_trending_react_ux_patterns_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"Dev Dan\",\"authorProfileId\":\"dev_dan\",\"body\":\"For multi-step onboarding we treat each step as a route segment and keep progress in a dedicated context. That keeps the wizard composable and lets us track analytics for each step separately without wiring props through every component.\",\"createdAt\":\"2026-02-18T10:15:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":1,\"replyCount\":1},{\"id\":\"post_trending_react_reply_2\",\"discussionId\":\"disc_trending_react_ux_patterns\",\"parentPostId\":\"post_disc_trending_react_ux_patterns_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"Sara K.\",\"authorProfileId\":\"ux_lead_sara\",\"body\":\"We model complex flows as state machines and keep the machine definition close to the UI. Using a statechart library forces us to think through edge cases like cancellations or permission changes, which makes the experience feel much more polished.\",\"createdAt\":\"2026-02-18T10:45:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":1,\"replyCount\":1},{\"id\":\"post_trending_react_reply_3\",\"discussionId\":\"disc_trending_react_ux_patterns\",\"parentPostId\":\"post_disc_trending_react_ux_patterns_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"Accessibility Ava\",\"authorProfileId\":\"accessibility_ava\",\"body\":\"Don’t forget focus management in complex flows. We centralize announcements and focus changes in a small accessibility utility, so every step just calls helpers instead of reinventing focus logic. It keeps keyboard and screen reader behavior consistent.\",\"createdAt\":\"2026-02-18T11:10:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":1,\"replyCount\":0},{\"id\":\"post_trending_react_reply_from_sample_user_1\",\"discussionId\":\"disc_trending_react_ux_patterns\",\"parentPostId\":\"post_trending_react_reply_1\",\"isOriginalPost\":false,\"authorDisplayName\":\"sample_user\",\"authorProfileId\":\"sample_user\",\"body\":\"That route-per-step approach makes a lot of sense. I like that it keeps URLs meaningful while still letting the flow feel like a single experience. I might experiment with this on our onboarding wizard to simplify how we track drop-off.\",\"createdAt\":\"2026-02-18T12:00:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_trending_react_reply_from_sample_user_2\",\"discussionId\":\"disc_trending_react_ux_patterns\",\"parentPostId\":\"post_trending_react_reply_2\",\"isOriginalPost\":false,\"authorDisplayName\":\"sample_user\",\"authorProfileId\":\"sample_user\",\"body\":\"@Sara K. the state machine idea is really helpful. I’ve been struggling to reason about all the edge cases in one of our flows, and a statechart might give the team a shared mental model to discuss and refine.\",\"createdAt\":\"2026-02-18T12:20:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_portfolio_review_critiques_op\",\"discussionId\":\"disc_portfolio_review_critiques\",\"parentPostId\":null,\"isOriginalPost\":true,\"authorDisplayName\":\"Mia the Career Coach\",\"authorProfileId\":\"career_coach_mia\",\"body\":\"This thread is for detailed portfolio reviews focused on UX and frontend case studies. If you’d like feedback, share a short overview of your background and describe one to three key projects you want critique on. Reviewers, please be constructive and specific so people can turn your feedback into concrete improvements.\",\"createdAt\":\"2025-10-10T14:20:00Z\",\"updatedAt\":\"2025-10-10T14:20:00Z\",\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":1},{\"id\":\"post_portfolio_helpful_reply\",\"discussionId\":\"disc_portfolio_review_critiques\",\"parentPostId\":\"post_disc_portfolio_review_critiques_op\",\"isOriginalPost\":false,\"authorDisplayName\":\"Lee P.\",\"authorProfileId\":\"portfolio_pro_lee\",\"body\":\"Your case studies will be much stronger if you focus each one on a single clear story. Start with the problem, then show a few key artifacts that demonstrate your process and decision-making. Close with measurable outcomes or what you would do differently next time. Even two well-developed projects are better than six shallow ones.\",\"createdAt\":\"2025-10-11T09:35:00Z\",\"updatedAt\":null,\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":1,\"replyCount\":0},{\"id\":\"post_spammy_promo_reply\",\"discussionId\":\"disc_how_to_handle_spam_bots\",\"parentPostId\":null,\"isOriginalPost\":true,\"authorDisplayName\":\"BestDealsNow\",\"authorProfileId\":\"spammy_linker\",\"body\":\"You don’t need complicated filters, just visit our site for the BEST marketing automation tools: https://super-discount-marketing.example.com and boost your traffic overnight!!!\",\"createdAt\":\"2025-09-06T07:15:00Z\",\"updatedAt\":null,\"containsLink\":true,\"links\":[\"https://super-discount-marketing.example.com\"],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0},{\"id\":\"post_disc_which_feature_prioritize_op\",\"discussionId\":\"disc_which_feature_prioritize\",\"parentPostId\":null,\"isOriginalPost\":true,\"authorDisplayName\":\"Ana PM\",\"authorProfileId\":\"product_manager_ana\",\"body\":\"We’re planning the next development cycle and want your input on which feature would have the biggest impact on your experience here. Please vote in the poll below and add a short reply explaining how your preferred feature would improve your daily workflow on the forum.\",\"createdAt\":\"2025-12-18T12:10:00Z\",\"updatedAt\":\"2025-12-18T12:10:00Z\",\"containsLink\":false,\"links\":[],\"upvoteCount\":0,\"likeCount\":0,\"replyCount\":0}]");

        latestList: document.querySelector('[data-component="latest-section-list"]'),
        status: document.querySelector('[data-component="home-feed-status"]'),
        searchForm: document.querySelector('[data-component="header-search-form"]'),
        populateContainers: document.querySelectorAll('[data-populate]')
      };

      // ----- URL / state helpers -----
      function parseLimitParam(params, name) {
        const raw = params.get(name);
        if (!raw) return undefined;
        const num = parseInt(raw, 10);
        if (!Number.isFinite(num) || num <= 0) return undefined;
        return num;
      }

      function readUrlStateFromLocation() {
        const url = new URL(window.location.href);
        const params = url.searchParams;

        let section = params.get('section');
        if (section !== 'trending' && section !== 'popular' && section !== 'latest') {
          section = 'trending';
        }

        const trendingLimit = parseLimitParam(params, 'trendingLimit');
        const popularLimit = parseLimitParam(params, 'popularLimit');
        const latestLimit = parseLimitParam(params, 'latestLimit');

        return {
          section: section,
          limits: {
            trendingLimit: trendingLimit,
            popularLimit: popularLimit,
            latestLimit: latestLimit
          }
        };
      }

      function limitsAreDifferent(a, b) {
        if (!a || !b) return true;
        return (
          a.trendingLimit !== b.trendingLimit ||
          a.popularLimit !== b.popularLimit ||
          a.latestLimit !== b.latestLimit
        );
      }

      function updateUrlSection(section, push) {
        const url = new URL(window.location.href);
        url.searchParams.set('section', section);
        if (push) {
          window.history.pushState({}, '', url.toString());
        } else {
          window.history.replaceState({}, '', url.toString());
        }
      }

      // ----- UI state helpers -----
      function setStatusMessage(message, type) {
        if (!ui.status) return;
        ui.status.textContent = '';
        ui.status.className = 'home-feed-status';
        if (!message) return;
        if (type) {
          ui.status.classList.add('status-' + type);
        }
        ui.status.textContent = message;
      }

      function setLoading(isLoading) {
        if (isLoading) {
          setStatusMessage('Loading discussionsa0b7a0please waita0e280a6', 'loading');
        } else {
          setStatusMessage('', null);
        }
      }

      function applyActiveSectionUI() {
        // Tabs
        ui.sectionTabs.forEach(function(tab) {
          const section = tab.getAttribute('data-section');
          const isActive = section === homeState.activeSection;
          if (isActive) {
            tab.classList.add('is-active');
          } else {
            tab.classList.remove('is-active');
          }
          tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
          tab.setAttribute('tabindex', isActive ? '0' : '-1');
        });

        // Sections
        const sectionNames = ['trending', 'popular', 'latest'];
        sectionNames.forEach(function(sectionName) {
          const sectionEl = document.querySelector('.discussion-section[data-section="' + sectionName + '"]');
          if (!sectionEl) return;
          const active = sectionName === homeState.activeSection;
          if (active) {
            sectionEl.classList.add('is-active');
            sectionEl.classList.remove('is-hidden');
            sectionEl.hidden = false;
          } else {
            sectionEl.classList.remove('is-active');
            sectionEl.classList.add('is-hidden');
            sectionEl.hidden = true;
          }
        });
      }

      // ----- Rendering helpers -----
      function createAvatarElement(authorName) {
        const avatar = document.createElement('div');
        avatar.className = 'avatar avatar-placeholder';
        avatar.setAttribute('aria-hidden', 'true');
        const initials = document.createElement('span');
        initials.className = 'avatar-initials';
        const trimmed = (authorName || '').trim();
        let letter = '?';
        if (trimmed) {
          letter = trimmed.charAt(0).toUpperCase();
        }
        initials.textContent = letter;
        avatar.appendChild(initials);
        return avatar;
      }

      function formatDateTime(value) {
        if (!value) return '';
        try {
          const date = new Date(value);
          if (isNaN(date.getTime())) return '';
          return date.toLocaleString(undefined, {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          });
        } catch (e) {
          return '';
        }
      }

      function createExcerpt(text, maxLength) {
        const limit = maxLength || 200;
        if (!text) return '';
        if (text.length <= limit) return text;
        const truncated = text.slice(0, limit);
        const lastSpace = truncated.lastIndexOf(' ');
        if (lastSpace > 40) {
          return truncated.slice(0, lastSpace) + 'e280a6';
        }
        return truncated + 'e280a6';
      }

      function slugifyCategoryName(name) {
        if (!name) return '';
        return name
          .toString()
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9\s]+/g, '')
          .replace(/\s+/g, '_');
      }

      function renderSectionList(container, items, sectionName) {
        if (!container) return;
        container.innerHTML = '';

        if (!items || items.length === 0) {
          // Empty state
          const empty = document.createElement('div');
          empty.className = 'home-feed-empty-state';
          const label = sectionName.charAt(0).toUpperCase() + sectionName.slice(1);
          empty.textContent = 'No ' + label.toLowerCase() + ' discussions to show yet.';
          container.appendChild(empty);
          return;
        }

        const fragment = document.createDocumentFragment();

        items.forEach(function(item) {
          const discussion = item && item.discussion ? item.discussion : null;
          if (!discussion) return;

          const article = document.createElement('article');
          article.className = 'post-card discussion-list-item';
          article.setAttribute('data-component', 'discussion-list-item');
          article.setAttribute('data-discussion-id', discussion.id || '');

          // Header
          const header = document.createElement('header');
          header.className = 'post-card-header';

          const headerLeft = document.createElement('div');
          headerLeft.className = 'post-card-header-left';

          const avatar = createAvatarElement(item.originalAuthorDisplayName || '');
          headerLeft.appendChild(avatar);

          const metaContainer = document.createElement('div');
          metaContainer.className = 'post-card-meta';

          const authorRow = document.createElement('div');
          authorRow.className = 'post-card-author-row';
          const authorSpan = document.createElement('span');
          authorSpan.className = 'author-name';
          authorSpan.textContent = item.originalAuthorDisplayName || 'Unknown author';
          authorRow.appendChild(authorSpan);
          metaContainer.appendChild(authorRow);

          const metaRow = document.createElement('div');
          metaRow.className = 'post-card-meta-row';

          const createdLabel = document.createElement('span');
          createdLabel.className = 'meta-item meta-timestamp';
          const createdFormatted = formatDateTime(discussion.createdAt);
          createdLabel.textContent = createdFormatted ? 'Started ' + createdFormatted : '';
          if (createdLabel.textContent) {
            metaRow.appendChild(createdLabel);
          }

          if (item.categoryName) {
            if (metaRow.childNodes.length > 0) {
              const sep1 = document.createElement('span');
              sep1.className = 'meta-separator';
              sep1.textContent = 'b7';
              metaRow.appendChild(sep1);
            }
            const categoryButton = document.createElement('button');
            categoryButton.type = 'button';
            categoryButton.className = 'meta-item meta-category';
            categoryButton.setAttribute('data-action', 'open-category');
            const slug = slugifyCategoryName(item.categoryName);
            categoryButton.setAttribute('data-category-slug', slug);
            categoryButton.textContent = item.categoryName;
            metaRow.appendChild(categoryButton);
          }

          const lastReplyFormatted = formatDateTime(item.lastReplyAt || discussion.lastReplyAt);
          if (lastReplyFormatted) {
            if (metaRow.childNodes.length > 0) {
              const sep2 = document.createElement('span');
              sep2.className = 'meta-separator';
              sep2.textContent = 'b7';
              metaRow.appendChild(sep2);
            }
            const updatedSpan = document.createElement('span');
            updatedSpan.className = 'meta-item meta-updated';
            updatedSpan.textContent = 'Last reply ' + lastReplyFormatted;
            metaRow.appendChild(updatedSpan);
          }

          metaContainer.appendChild(metaRow);
          headerLeft.appendChild(metaContainer);

          const headerRight = document.createElement('div');
          headerRight.className = 'post-card-header-right';
          const overflowButton = document.createElement('button');
          overflowButton.type = 'button';
          overflowButton.className = 'icon-button icon-overflow';
          overflowButton.setAttribute('aria-label', 'Post options');
          const overflowIcon = document.createElement('span');
          overflowIcon.setAttribute('aria-hidden', 'true');
          overflowIcon.textContent = 'e28bae';
          overflowButton.appendChild(overflowIcon);
          headerRight.appendChild(overflowButton);

          header.appendChild(headerLeft);
          header.appendChild(headerRight);

          // Body
          const body = document.createElement('div');
          body.className = 'post-card-body';

          const titleButton = document.createElement('button');
          titleButton.type = 'button';
          titleButton.className = 'discussion-title';
          titleButton.setAttribute('data-action', 'open-discussion');
          titleButton.setAttribute('data-discussion-id', discussion.id || '');
          titleButton.textContent = discussion.title || 'Untitled discussion';
          body.appendChild(titleButton);

          if (discussion.body) {
            const excerpt = document.createElement('p');
            excerpt.className = 'post-card-excerpt';
            excerpt.textContent = createExcerpt(discussion.body, 220);
            body.appendChild(excerpt);
          }

          const footer = document.createElement('div');
          footer.className = 'post-card-footer';

          const tagsContainer = document.createElement('div');
          tagsContainer.className = 'post-card-tags';
          if (Array.isArray(item.tagNames) && item.tagNames.length > 0) {
            item.tagNames.forEach(function(tagName) {
              const tagButton = document.createElement('button');
              tagButton.type = 'button';
              tagButton.className = 'tag-pill';
              tagButton.setAttribute('data-action', 'click-tag');
              tagButton.setAttribute('data-tag-name', tagName);
              tagButton.textContent = '#' + tagName;
              tagsContainer.appendChild(tagButton);
            });
          }
          footer.appendChild(tagsContainer);

          const statsContainer = document.createElement('div');
          statsContainer.className = 'post-card-stats';

          const replies = document.createElement('span');
          replies.className = 'stat stat-replies';
          const replyCount = typeof discussion.replyCount === 'number' ? discussion.replyCount : 0;
          replies.textContent = replyCount + ' repl' + (replyCount === 1 ? 'y' : 'ies');
          statsContainer.appendChild(replies);

          const views = document.createElement('span');
          views.className = 'stat stat-views';
          const viewCount = typeof discussion.viewCount === 'number' ? discussion.viewCount : 0;
          views.textContent = viewCount + ' view' + (viewCount === 1 ? '' : 's');
          statsContainer.appendChild(views);

          if (typeof discussion.score === 'number') {
            const score = document.createElement('span');
            score.className = 'stat stat-score';
            score.textContent = 'Score ' + discussion.score;
            statsContainer.appendChild(score);
          }

          if (discussion.hasPoll) {
            const poll = document.createElement('span');
            poll.className = 'stat stat-pill stat-poll';
            poll.textContent = 'Poll';
            statsContainer.appendChild(poll);
          }

          if (discussion.isBookmarked) {
            const bookmarked = document.createElement('span');
            bookmarked.className = 'stat stat-pill stat-bookmarked';
            bookmarked.textContent = 'Bookmarked';
            statsContainer.appendChild(bookmarked);
          }

          if (discussion.isSubscribed) {
            const subscribed = document.createElement('span');
            subscribed.className = 'stat stat-pill stat-subscribed';
            subscribed.textContent = 'Subscribed';
            statsContainer.appendChild(subscribed);
          }

          footer.appendChild(statsContainer);
          body.appendChild(footer);

          article.appendChild(header);
          article.appendChild(body);

          fragment.appendChild(article);
        });

        container.appendChild(fragment);
      }

      function renderAllSections() {
        renderSectionList(ui.trendingList, homeState.feed.trending, 'trending');
        renderSectionList(ui.popularList, homeState.feed.popular, 'popular');
        renderSectionList(ui.latestList, homeState.feed.latest, 'latest');
      }

      // ----- Data loading (home-feed-controller + home-url-state-sync) -----
      function loadHomeFeed() {
        setLoading(true);
        try {
          const result = WebsiteSDK.getHomeFeed(
            homeState.limits.trendingLimit,
            homeState.limits.popularLimit,
            homeState.limits.latestLimit
          );

          homeState.feed.trending = Array.isArray(result.trending) ? result.trending : [];
          homeState.feed.popular = Array.isArray(result.popular) ? result.popular : [];
          homeState.feed.latest = Array.isArray(result.latest) ? result.latest : [];

          renderAllSections();
          applyActiveSectionUI();
          setLoading(false);
        } catch (error) {
          console.error('Error loading home feed:', error);
          setStatusMessage('Unable to load discussions right now. Please refresh the page to try again.', 'error');
        }
      }

      // ----- Interaction handlers -----
      function handleSelectSection(section, pushToHistory) {
        if (section !== 'trending' && section !== 'popular' && section !== 'latest') return;
        if (homeState.activeSection === section && !pushToHistory) return;
        homeState.activeSection = section;
        applyActiveSectionUI();
        updateUrlSection(section, !!pushToHistory);
      }

      function handleOpenDiscussion(discussionId) {
        if (!discussionId) return;
        window.location.href = 'discussion.html?discussionId=' + encodeURIComponent(String(discussionId));
      }

      function handleOpenCategory(categorySlug) {
        if (!categorySlug) return;
        window.location.href = 'category.html?categorySlug=' + encodeURIComponent(String(categorySlug));
      }

      function handleTagClick(tagName) {
        // Expose tag click for global routing; no direct navigation from this page
        const event = new CustomEvent('home:tagClick', {
          detail: { tagName: tagName },
          bubbles: true
        });
        document.dispatchEvent(event);
      }

      function handleSearchSubmit(event) {
        event.preventDefault();
        if (!ui.searchForm) return;
        const input = ui.searchForm.querySelector('input[name="query"]');
        const value = input && input.value ? input.value.trim() : '';
        if (!value) {
          return;
        }
        const targetUrl = 'search_results.html?query=' + encodeURIComponent(value);
        window.location.href = targetUrl;
      }

      // Delegate click events for dynamic elements
      document.addEventListener('click', function(event) {
        const target = event.target;
        if (!target) return;
        const actionEl = target.closest('[data-action]');
        if (!actionEl) return;
        const action = actionEl.getAttribute('data-action');

        switch (action) {
          case 'select-section': {
            const section = actionEl.getAttribute('data-section');
            handleSelectSection(section, true);
            break;
          }
          case 'open-discussion': {
            const discussionId = actionEl.getAttribute('data-discussion-id');
            handleOpenDiscussion(discussionId);
            break;
          }
          case 'open-category': {
            const slug = actionEl.getAttribute('data-category-slug');
            handleOpenCategory(slug);
            break;
          }
          case 'click-tag': {
            const tagName = actionEl.getAttribute('data-tag-name');
            handleTagClick(tagName);
            break;
          }
          default:
            break;
        }
      });

      // Bind search form submit
      if (ui.searchForm) {
        ui.searchForm.addEventListener('submit', handleSearchSubmit);
      }

      // Listen for popstate (browser back/forward) to sync URL state
      window.addEventListener('popstate', function() {
        const prevLimits = {
          trendingLimit: homeState.limits.trendingLimit,
          popularLimit: homeState.limits.popularLimit,
          latestLimit: homeState.limits.latestLimit
        };
        const parsed = readUrlStateFromLocation();
        const sectionChanged = parsed.section !== homeState.activeSection;
        const limitsChanged = limitsAreDifferent(parsed.limits, prevLimits);

        homeState.activeSection = parsed.section;
        homeState.limits = parsed.limits;

        if (sectionChanged) {
          applyActiveSectionUI();
        }
        if (limitsChanged) {
          loadHomeFeed();
        }
      });

      // ----- Initialization -----
      (function init() {
        // Initial URL-driven state
        const initial = readUrlStateFromLocation();
        homeState.activeSection = initial.section;
        homeState.limits = initial.limits;
        applyActiveSectionUI();

        // Trigger data loading for elements that require population
        ui.populateContainers.forEach(function(container) {
          const type = container.getAttribute('data-populate');
          if (type === 'home-feed') {
            loadHomeFeed();
          }
        });
      })();
    });
  </script>
</body>
</html>
