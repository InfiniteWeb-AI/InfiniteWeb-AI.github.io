<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Community Forum</title>
  <!--
    Design analysis summary
    - Very minimal, content-first forum layout.
    - Full-width black header bar with left-aligned navigation.
    - Off‑white page background (#F6F5F1) with white cards on a light gray border.
    - Clean sans-serif typography with clear hierarchy.
    - Large vertical whitespace between header, content sections, and cards.
    - Subtle, flat footer expected with small, low‑contrast links.
  -->

  <!-- Recommended fonts matching the design's grotesk / utilitarian feel -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Global stylesheet -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific stylesheet -->
  <link rel='stylesheet' href='about.css'>
</head>
<body>
  <div class='site'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='header-left'>
          <nav class='primary-nav' aria-label='Primary'>
            <ul class='primary-nav-list'>
              <li class='primary-nav-item'>
                <a href='index.html' class='primary-nav-link' title='Forum homepage with trending, popular, and recent discussions'>Home</a>
              </li>
              <li class='primary-nav-item'>
                <a href='categories.html' class='primary-nav-link' title='Browse all discussion categories such as Web Development and Product Feedback'>Categories</a>
              </li>
              <li class='primary-nav-item'>
                <a href='topics.html' class='primary-nav-link' title='Explore, search, and follow discussion topics and tags'>Topics</a>
              </li>
              <li class='primary-nav-item'>
                <a href='bookmarks.html' class='primary-nav-link' title='View and open your bookmarked or saved discussions'>Bookmarks</a>
              </li>
              <li class='primary-nav-item'>
                <a href='help.html' class='primary-nav-link' title='Read help articles and FAQs about using the forum'>Help</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class='header-right'>
          <!-- Static search icon to match the visual design (non-interactive per requirements) -->
          <span class='nav-icon nav-icon-search' aria-hidden='true'></span>

          <!-- User avatar with dropdown for special access pages -->
          <div class='user-menu'>
            <button class='user-avatar' type='button' aria-haspopup='true' aria-expanded='false'>
              <span class='visually-hidden'>Open user menu</span>
              <span class='user-avatar-initials'>U</span>
            </button>
            <ul class='user-menu-dropdown' aria-label='User menu'>
              <li class='user-menu-item'>
                <a href='messages.html' class='user-menu-link' title='Accessible via a Messages item in the signed-in user&#39;s menu'>Messages</a>
              </li>
              <li class='user-menu-item'>
                <a href='settings.html' class='user-menu-link' title='Accessible via a Settings option in the signed-in user&#39;s menu'>User Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <!-- About page controller -->
      <div class='page-shell about-page' data-component='about-page-controller'>
        <!-- Off-white header band with page title and global header search -->
        <section class='page-header-band'>
          <div class='content-shell'>
            <div class='page-header-row'>
              <h1 class='page-title' data-populate='static-page-title'>About</h1>

              <div class='header-search' data-component='global-header-search-form'>
                <form class='header-search-form' role='search' aria-label='Search discussions' data-action='header-search-submit'>
                  <button
                    type='button'
                    class='header-search-toggle'
                    aria-label='Open search'
                    data-action='header-search-toggle'
                  >
                    <span class='nav-icon nav-icon-search' aria-hidden='true'></span>
                  </button>
                  <div class='header-search-field-wrapper'>
                    <label class='visually-hidden' for='headerSearchInput'>Search the community</label>
                    <input
                      id='headerSearchInput'
                      name='query'
                      type='search'
                      class='header-search-input'
                      placeholder='Search'
                      autocomplete='off'
                    >
                  </div>
                </form>
              </div>
            </div>
          </div>
        </section>

        <!-- Main About content card -->
        <section class='page-body'>
          <div class='content-shell'>
            <article class='post-card about-card' data-component='about-content-view'>
              <header class='post-card-header'>
                <div class='post-card-header-left'>
                  <div class='post-card-avatar about-avatar' aria-hidden='true'></div>
                  <div class='post-card-meta'>
                    <div class='post-card-meta-primary'>
                      <span class='post-card-label'>About</span>
                    </div>
                    <div class='post-card-meta-secondary'>
                      <span class='post-card-meta-text' data-populate='static-page-meta'>Informational page</span>
                    </div>
                  </div>
                </div>
                <div class='post-card-header-right'>
                  <button class='icon-button more-button' type='button' aria-label='More options'>
                    <span class='icon-more-vertical' aria-hidden='true'></span>
                  </button>
                </div>
              </header>

              <div class='post-card-body'>
                <div class='loading-state' data-state='loading'>Loading page…</div>
                <div class='error-state' data-state='error' hidden>Something went wrong while loading this page. Please try again.</div>

                <div class='about-content' hidden>
                  <h2 class='about-dynamic-title' data-populate='static-page-title'></h2>
                  <div
                    class='about-body content-body'
                    data-populate='static-page-body'
                    data-action='about-body-link-delegate'
                  ></div>
                </div>
              </div>
            </article>
          </div>
        </section>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-nav-link' title='Learn more about this community and platform'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-nav-link' title='Get help and support for using the forum'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-nav-link' title='Read the terms of service for using the site'>Terms</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-nav-link' title='Review the privacy policy and data practices'>Privacy</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // --- URL & routing helpers ---
      function derivePageSlugFromParams(searchParams) {
        var paramSlug = searchParams.get('pageSlug');
        if (paramSlug) {
          return paramSlug;
        }
        // Derive from filename (about.html -> 'about')
        var path = window.location.pathname || '';
        var filename = path.split('/').pop() || '';
        var baseName = filename.split('.').slice(0, -1).join('.') || 'about';
        var allowed = ['about', 'help_support', 'terms_of_service', 'privacy_policy'];
        if (allowed.indexOf(baseName) !== -1) {
          return baseName;
        }
        return 'about';
      }

      function getRoutingFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return {
          pageSlug: derivePageSlugFromParams(params),
          sectionId: params.get('section'),
          params: params
        };
      }

      function escapeSectionIdForSelector(id) {
        if (!id) {
          return '';
        }
        if (window.CSS && window.CSS.escape) {
          return window.CSS.escape(id);
        }
        return id.replace(/[^a-zA-Z0-9_-]/g, '\\$&');
      }

      // --- DOM references ---
      var controllerEl = document.querySelector('[data-component="about-page-controller"]');
      if (!controllerEl) {
        return;
      }

      var contentViewEl = controllerEl.querySelector('[data-component="about-content-view"]');
      var loadingEl = contentViewEl ? contentViewEl.querySelector('.loading-state') : null;
      var errorEl = contentViewEl ? contentViewEl.querySelector('.error-state') : null;
      var aboutContentWrapper = contentViewEl ? contentViewEl.querySelector('.about-content') : null;
      var bodyContainer = controllerEl.querySelector('[data-populate="static-page-body"]');

      var routing = getRoutingFromUrl();
      var currentPageSlug = routing.pageSlug;
      var currentSectionId = routing.sectionId;
      var isLoading = false;
      var currentError = null;

      // --- UI state helpers ---
      function showLoadingState() {
        if (loadingEl) {
          loadingEl.hidden = false;
        }
        if (errorEl) {
          errorEl.hidden = true;
        }
        if (aboutContentWrapper) {
          aboutContentWrapper.hidden = true;
        }
      }

      function showErrorState() {
        if (loadingEl) {
          loadingEl.hidden = true;
        }
        if (errorEl) {
          errorEl.hidden = false;
        }
        if (aboutContentWrapper) {
          aboutContentWrapper.hidden = true;
        }
      }

      function showContentState() {
        if (loadingEl) {
          loadingEl.hidden = true;
        }
        if (errorEl) {
          errorEl.hidden = true;
        }
        if (aboutContentWrapper) {
          aboutContentWrapper.hidden = false;
        }
      }

      // --- Render functions (use container parameter directly) ---
      function renderStaticPageTitle(container, content) {
        var title = content && typeof content.title === 'string' ? content.title : '';
        container.textContent = title;
      }

      function renderStaticPageBody(container, content) {
        var body = content && typeof content.body === 'string' ? content.body : '';
        container.innerHTML = body;
      }

      function renderStaticPageMeta(container, content) {
        // No specific meta data from SDK; keep generic and non About-specific
        container.textContent = 'Static page';
      }

      function handleSectionFocus(sectionId) {
        if (!sectionId || !bodyContainer) {
          return;
        }
        var escapedId = escapeSectionIdForSelector(sectionId);
        var target = bodyContainer.querySelector('#' + escapedId);
        if (!target) {
          target = bodyContainer.querySelector('[data-section-id="' + sectionId + '"]');
        }
        if (target) {
          try {
            target.scrollIntoView({ block: 'start', behavior: 'smooth' });
          } catch (e) {
            target.scrollIntoView(true);
          }
          if (target.focus) {
            target.setAttribute('tabindex', '-1');
            try {
              target.focus({ preventScroll: true });
            } catch (e2) {
              target.focus();
            }
          }
        }
      }

      function applyStaticPageContent(content) {
        var populateElements = controllerEl.querySelectorAll('[data-populate]');
        populateElements.forEach(function (element) {
          var type = element.getAttribute('data-populate');
          if (type === 'static-page-title') {
            renderStaticPageTitle(element, content);
          } else if (type === 'static-page-body') {
            renderStaticPageBody(element, content);
          } else if (type === 'static-page-meta') {
            renderStaticPageMeta(element, content);
          }
        });

        if (content && typeof content.title === 'string' && content.title.length > 0) {
          document.title = content.title + ' · Community Forum';
        }

        if (currentSectionId) {
          handleSectionFocus(currentSectionId);
        }
      }

      function fetchStaticPageContent() {
        isLoading = true;
        currentError = null;
        showLoadingState();

        var content;
        try {
          if (!window.WebsiteSDK || !WebsiteSDK.getStaticPageContent) {
            throw new Error('Content service unavailable');
          }
          content = WebsiteSDK.getStaticPageContent(currentPageSlug);
        } catch (err) {
          isLoading = false;
          currentError = err;
          showErrorState();
          return;
        }

        isLoading = false;
        currentError = null;
        applyStaticPageContent(content || {});
        showContentState();
      }

      // --- Header search component ---
      var headerSearchForm = controllerEl.querySelector('[data-component="global-header-search-form"] .header-search-form');
      var headerSearchInput = controllerEl.querySelector('#headerSearchInput');

      function initHeaderSearch() {
        if (headerSearchInput) {
          headerSearchInput.value = '';
        }
      }

      function onHeaderSearchToggle(event) {
        event.preventDefault();
        var button = event.currentTarget;
        var form = button.closest('.header-search-form');
        var wrapper = form ? form.closest('.header-search') : null;
        if (wrapper) {
          if (wrapper.classList.contains('is-open')) {
            wrapper.classList.remove('is-open');
          } else {
            wrapper.classList.add('is-open');
          }
        }
        if (headerSearchInput) {
          headerSearchInput.focus();
        }
      }

      function onHeaderSearchSubmit(event) {
        event.preventDefault();
        var form = event.currentTarget;
        var input = form.querySelector('input[name="query"]');
        var term = input && input.value ? input.value.trim() : '';
        if (!term) {
          if (input) {
            input.focus();
          }
          return;
        }
        var encoded = encodeURIComponent(term);
        window.location.href = 'search_results.html?query=' + encoded;
      }

      // --- About content internal link handling ---
      function findNearestSectionIdFromNode(node) {
        var el = node;
        while (el && el !== bodyContainer) {
          if (el.id) {
            return el.id;
          }
          if (el.hasAttribute && el.hasAttribute('data-section-id')) {
            return el.getAttribute('data-section-id');
          }
          el = el.parentNode;
        }
        return currentSectionId || null;
      }

      function onAboutBodyClick(event) {
        var anchor = event.target.closest ? event.target.closest('a') : null;
        if (!anchor) {
          return;
        }

        var href = anchor.getAttribute('href') || '';
        var role = anchor.getAttribute('data-role') || '';

        // Help / support links
        var isHelpLink = role === 'help-link' || href.indexOf('help.html') !== -1;
        if (isHelpLink) {
          event.preventDefault();
          var sectionForHelp = findNearestSectionIdFromNode(anchor);
          var params = new URLSearchParams();
          params.set('from', 'about');
          if (sectionForHelp) {
            params.set('section', sectionForHelp);
          }
          var query = params.toString();
          var targetUrl = 'help.html';
          if (query) {
            targetUrl += '?' + query;
          }
          window.location.href = targetUrl;
          return;
        }

        // Section navigation links (?section=... or data-section-target or hash links)
        var sectionTarget = anchor.getAttribute('data-section-target') || '';
        if (!sectionTarget) {
          try {
            var linkUrl = new URL(href, window.location.href);
            sectionTarget = linkUrl.searchParams.get('section') || '';
          } catch (e) {
            sectionTarget = '';
          }
        }

        if (!sectionTarget && href.charAt(0) === '#') {
          sectionTarget = href.slice(1);
        }

        if (sectionTarget) {
          event.preventDefault();
          currentSectionId = sectionTarget;

          // Update URL without full reload
          var currentUrl = new URL(window.location.href);
          currentUrl.searchParams.set('section', sectionTarget);
          window.history.pushState({ section: sectionTarget }, '', currentUrl.toString());

          handleSectionFocus(sectionTarget);
        }
      }

      // --- Bind data-action handlers ---
      var actionElements = document.querySelectorAll('[data-action]');
      actionElements.forEach(function (element) {
        var action = element.getAttribute('data-action');
        if (action === 'header-search-toggle') {
          element.addEventListener('click', onHeaderSearchToggle);
        } else if (action === 'header-search-submit') {
          element.addEventListener('submit', onHeaderSearchSubmit);
        } else if (action === 'about-body-link-delegate') {
          element.addEventListener('click', onAboutBodyClick);
        }
      });

      // --- Handle URL changes (back/forward, optional section/pageSlug updates) ---
      window.addEventListener('popstate', function () {
        var updated = getRoutingFromUrl();
        var newSlug = updated.pageSlug;
        var newSection = updated.sectionId;
        var slugChanged = newSlug !== currentPageSlug;
        var sectionChanged = newSection !== currentSectionId;

        currentPageSlug = newSlug;
        currentSectionId = newSection;

        if (slugChanged) {
          fetchStaticPageContent();
        } else if (sectionChanged) {
          handleSectionFocus(currentSectionId);
        }
      });

      // --- Initialize components and fetch content ---
      initHeaderSearch();
      fetchStaticPageContent();
    });
  </script>
</body>
</html>
