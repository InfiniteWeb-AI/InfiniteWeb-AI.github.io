<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Driving School Booking</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&amp;family=Source+Sans+3:wght@400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>

  <!-- Framework styles -->
  <link rel='stylesheet' href='framework.css'>
  <!-- Page-specific styles -->
  <link rel='stylesheet' href='instructors.css'>
</head>
<body>
  <div class='site'>
    <!-- Global Header -->
    <header class='site-header'>
      <div class='site-header-inner'>
        <nav class='site-nav' aria-label='Main navigation'>
          <ul class='site-nav-list'>
            <li class='site-nav-item'>
              <a href='index.html' class='site-nav-link is-active' title='Homepage with quick access to booking and packages'>Home</a>
            </li>
            <li class='site-nav-item'>
              <a href='booking.html?view=single_lessons' class='site-nav-link' title='Search and book individual lessons and mock tests'>Book a Lesson</a>
            </li>
            <li class='site-nav-item'>
              <a href='packages.html' class='site-nav-link' title='Browse and filter multi-lesson packages'>Lesson Packages</a>
            </li>
            <li class='site-nav-item'>
              <a href='instructors.html' class='site-nav-link' title='Search and compare driving instructors'>Find Instructors</a>
            </li>
            <li class='site-nav-item'>
              <a href='my_bookings.html' class='site-nav-link' title='View, reschedule, or cancel your bookings'>My Bookings</a>
            </li>
            <li class='site-nav-item'>
              <a href='profile.html' class='site-nav-link' title='Manage your learner profile and preferences'>Profile</a>
            </li>
            <li class='site-nav-item'>
              <a href='help.html' class='site-nav-link' title='Help center and FAQs'>Help</a>
            </li>
            <li class='site-nav-item'>
              <a href='cart.html' class='site-nav-link' title='View lessons and packages ready to purchase or book'>Cart</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Page content wrapper -->
    <main id='content' class='site-main' role='main'>
      <section class='instructors-page' data-component='instructors-page-controller'>
        <!-- Hero-like controller zone with filter bar -->
        <section class='instructors-hero'>
          <div class='instructors-hero-inner'>
            <header class='instructors-hero-header'>
              <h1 class='instructors-title'>Instructors</h1>
              <p class='instructors-subtitle'>Search, filter, sort, and compare driving instructors, then open a detailed profile.</p>
            </header>

            <section class='instructors-filter-bar-container'
                     data-component='instructor-filter-bar'
                     data-populate='instructor-filters'
                     aria-label='Filter instructors'>
              <!-- Filter bar is rendered dynamically via JavaScript -->
            </section>
          </div>
        </section>

        <!-- Results area -->
        <section class='instructors-results'>
          <div class='instructors-results-inner'>
            <!-- Active filters summary -->
            <section class='active-filters-bar'
                     data-component='active-filters-summary'
                     aria-label='Active filters'>
              <!-- Active filter chips rendered via JS -->
            </section>

            <!-- Meta & sort row -->
            <section class='results-toolbar'>
              <div class='results-meta-bar'
                   data-component='instructor-results-meta-bar'
                   data-populate='instructor-results-meta'>
                <!-- Results metadata rendered via JS -->
              </div>
              <div class='results-sort-control'
                   data-component='instructor-sort-control'
                   data-populate='instructor-sort-options'>
                <!-- Sort options rendered via JS -->
              </div>
            </section>

            <!-- Results list -->
            <section class='instructors-results-list'
                     data-component='instructor-results-list'
                     data-populate='instructor-results-list'
                     aria-label='Instructor search results'>
              <!-- Instructor cards rendered via JS -->
            </section>

            <!-- Load more control -->
            <div class='results-load-more'
                 data-component='results-load-more-control'>
              <button type='button'
                      class='btn btn-secondary results-load-more-button'
                      data-action='load-more'>
                Load more instructors
              </button>
            </div>

            <!-- Invisible URL state sync marker -->
            <div data-component='url-state-sync' aria-hidden='true'></div>
          </div>
        </section>
      </section>
    </main>

    <!-- Global Footer -->
    <footer class='site-footer'>
      <div class='site-footer-inner'>
        <div class='site-footer-links' aria-label='Footer navigation'>
          <a href='about.html' class='site-footer-link' title='About the driving school'>About</a>
          <a href='contact.html' class='site-footer-link' title='Contact information and enquiry form'>Contact</a>
          <a href='help.html' class='site-footer-link' title='Common questions and support'>Help &amp; FAQs</a>
          <a href='policies.html' class='site-footer-link' title='Terms, cancellation, and privacy policies'>Policies</a>
        </div>
        <div class='site-footer-meta'>
          <p class='site-footer-copy'>&copy; 2026 Driving School Booking. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic (provides WebsiteSDK) -->
  <script src='business_logic.js'></script>

  <!-- Page controller & UI wiring -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const DEFAULT_LIMIT = 10;

      let filterOptions = null;
      let sortLabelByCode = {};
      let transmissionLabelByCode = {};
      let languageLabelByCode = {};
      let currentInstructors = [];
      let hasMoreResults = false;
      let isInitialised = false;

      const filterBarEl = document.querySelector("[data-component='instructor-filter-bar']");
      const activeFiltersEl = document.querySelector("[data-component='active-filters-summary']");
      const sortControlEl = document.querySelector("[data-component='instructor-sort-control']");
      const resultsMetaEl = document.querySelector("[data-component='instructor-results-meta-bar']");
      const resultsListEl = document.querySelector("[data-component='instructor-results-list']");
      const loadMoreEl = document.querySelector("[data-component='results-load-more-control']");

      function safeParseNumber(value) {
        if (value === null || value === undefined || value === '') return null;
        const n = Number(value);
        return Number.isFinite(n) ? n : null;
      }

      function buildOptionMaps() {
        sortLabelByCode = {};
        (filterOptions.sort_options || []).forEach(opt => {
          sortLabelByCode[opt.code] = opt.label;
        });

        transmissionLabelByCode = {};
        (filterOptions.transmission_types || []).forEach(opt => {
          transmissionLabelByCode[opt.code] = opt.label;
        });

        languageLabelByCode = {};
        (filterOptions.languages || []).forEach(opt => {
          languageLabelByCode[opt.code] = opt.label;
        });
      }

      function parseAndSanitizeUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const state = {
          filters: {
            transmission_type: null,
            language: null,
            max_hourly_rate: null,
            rating_min: null,
            zip_code: null,
            distance_km: null
          },
          sortCode: null,
          limit: DEFAULT_LIMIT,
          offset: 0,
          _needsUrlUpdate: false
        };

        const t = params.get('transmission_type');
        if (t) {
          const has = (filterOptions.transmission_types || []).some(opt => opt.code === t);
          if (has) {
            state.filters.transmission_type = t;
          } else {
            state._needsUrlUpdate = true;
          }
        }

        const lang = params.get('language');
        if (lang) {
          const hasLang = (filterOptions.languages || []).some(opt => opt.code === lang);
          if (hasLang) {
            state.filters.language = lang;
          } else {
            state._needsUrlUpdate = true;
          }
        }

        const maxRateParam = params.get('max_hourly_rate');
        if (maxRateParam !== null) {
          const val = safeParseNumber(maxRateParam);
          if (val !== null) {
            state.filters.max_hourly_rate = val;
          } else {
            state._needsUrlUpdate = true;
          }
        }

        const ratingParam = params.get('rating_min');
        if (ratingParam !== null) {
          const val = safeParseNumber(ratingParam);
          if (val !== null && (filterOptions.rating_thresholds || []).includes(val)) {
            state.filters.rating_min = val;
          } else if (ratingParam !== '') {
            state._needsUrlUpdate = true;
          }
        }

        const zipParam = params.get('zip_code');
        if (zipParam) {
          state.filters.zip_code = zipParam;
        }

        const distanceParam = params.get('distance_km');
        if (distanceParam !== null) {
          const val = safeParseNumber(distanceParam);
          if (val !== null) {
            state.filters.distance_km = val;
          } else {
            state._needsUrlUpdate = true;
          }
        }

        const limitParam = params.get('limit');
        if (limitParam !== null) {
          const val = safeParseNumber(limitParam);
          if (val !== null && val > 0) {
            state.limit = val;
          } else {
            state._needsUrlUpdate = true;
          }
        }

        const offsetParam = params.get('offset');
        if (offsetParam !== null) {
          const val = safeParseNumber(offsetParam);
          if (val !== null && val >= 0) {
            state.offset = val;
          } else {
            state._needsUrlUpdate = true;
          }
        }

        const sortParam = params.get('sort');
        let sortValid = false;
        if (sortParam) {
          sortValid = (filterOptions.sort_options || []).some(opt => opt.code === sortParam);
        }
        if (sortParam && sortValid) {
          state.sortCode = sortParam;
        } else {
          state.sortCode = (filterOptions.sort_options && filterOptions.sort_options[0]) ? filterOptions.sort_options[0].code : null;
          if (sortParam !== state.sortCode) {
            state._needsUrlUpdate = true;
          }
        }

        return state;
      }

      function writeStateToUrl(state, options) {
        const params = new URLSearchParams();

        if (state.filters.transmission_type) {
          params.set('transmission_type', state.filters.transmission_type);
        }
        if (state.filters.language) {
          params.set('language', state.filters.language);
        }
        if (state.filters.max_hourly_rate !== null) {
          params.set('max_hourly_rate', String(state.filters.max_hourly_rate));
        }
        if (state.filters.rating_min !== null) {
          params.set('rating_min', String(state.filters.rating_min));
        }
        if (state.filters.zip_code) {
          params.set('zip_code', state.filters.zip_code);
        }
        if (state.filters.distance_km !== null) {
          params.set('distance_km', String(state.filters.distance_km));
        }

        if (state.sortCode) {
          params.set('sort', state.sortCode);
        }
        if (state.limit && state.limit !== DEFAULT_LIMIT) {
          params.set('limit', String(state.limit));
        }
        if (state.offset && state.offset > 0) {
          params.set('offset', String(state.offset));
        }

        const query = params.toString();
        const newUrl = `${window.location.pathname}${query ? '?' + query : ''}`;
        if (options && options.replace) {
          window.history.replaceState(null, '', newUrl);
        } else {
          window.history.pushState(null, '', newUrl);
        }
      }

      function buildSearchFilters(state) {
        const f = {};
        if (state.filters.transmission_type) {
          f.transmission_type = state.filters.transmission_type;
        }
        if (state.filters.language) {
          f.language = state.filters.language;
        }
        if (state.filters.max_hourly_rate !== null) {
          f.max_hourly_rate = state.filters.max_hourly_rate;
        }
        if (state.filters.rating_min !== null) {
          f.min_rating = state.filters.rating_min;
        }
        if (state.filters.zip_code) {
          f.zip_code = state.filters.zip_code;
        }
        if (state.filters.distance_km !== null) {
          f.distance_km = state.filters.distance_km;
        }
        return f;
      }

      function sortCodeToParams(code) {
        if (!code) {
          return { sort_by: undefined, sort_order: undefined };
        }
        const idx = code.lastIndexOf('_');
        if (idx === -1) {
          return { sort_by: code, sort_order: undefined };
        }
        return {
          sort_by: code.slice(0, idx),
          sort_order: code.slice(idx + 1)
        };
      }

      // Render functions for data-populate containers

      function renderFilterBar(container, state) {
        const rateRange = filterOptions.hourly_rate_range || {};
        const minRate = rateRange.min_rate !== undefined && rateRange.min_rate !== null ? rateRange.min_rate : 0;
        const maxRate = rateRange.max_rate !== undefined && rateRange.max_rate !== null ? rateRange.max_rate : 0;
        const currency = rateRange.currency || '';

        const thresholds = (filterOptions.rating_thresholds || []).slice().sort((a, b) => a - b);
        const ratingOptionsHtml = thresholds.map(threshold => {
          const label = threshold === 0 ? 'Any rating' : `${threshold.toFixed(1)}+ stars`;
          const selected = state.filters.rating_min !== null && state.filters.rating_min === threshold ? ' selected' : '';
          return `<option value="${threshold}"${selected}>${label}</option>`;
        }).join('');

        const currentMaxRate = state.filters.max_hourly_rate !== null ? state.filters.max_hourly_rate : maxRate;

        const transmissionOptionsHtml = [''].concat((filterOptions.transmission_types || []).map(o => o.code)).map(code => {
          if (!code) {
            return '<option value="">Any transmission</option>';
          }
          const selected = state.filters.transmission_type === code ? ' selected' : '';
          const label = transmissionLabelByCode[code] || code;
          return `<option value="${code}"${selected}>${label}</option>`;
        }).join('');

        const languageOptionsHtml = [''].concat((filterOptions.languages || []).map(o => o.code)).map(code => {
          if (!code) {
            return '<option value="">Any language</option>';
          }
          const selected = state.filters.language === code ? ' selected' : '';
          const label = languageLabelByCode[code] || code;
          return `<option value="${code}"${selected}>${label}</option>`;
        }).join('');

        const zipValue = state.filters.zip_code ? state.filters.zip_code : '';
        const distanceValue = state.filters.distance_km !== null ? state.filters.distance_km : '';

        container.innerHTML = `
          <form class="instructor-filter-bar" role="search" aria-label="Filter instructors">
            <div class="filter-row">
              <div class="filter-group">
                <label class="filter-label" for="filter-transmission">Transmission</label>
                <select id="filter-transmission" name="transmission_type" data-filter-field="transmission_type">
                  ${transmissionOptionsHtml}
                </select>
              </div>
              <div class="filter-group">
                <label class="filter-label" for="filter-language">Language</label>
                <select id="filter-language" name="language" data-filter-field="language">
                  ${languageOptionsHtml}
                </select>
              </div>
              <div class="filter-group filter-group-rate">
                <label class="filter-label" for="filter-max-rate">Max hourly rate (${currency})</label>
                <div class="filter-rate-control">
                  <input type="range"
                         id="filter-max-rate"
                         name="max_hourly_rate"
                         data-filter-field="max_hourly_rate"
                         min="${minRate}"
                         max="${maxRate}"
                         step="1"
                         value="${currentMaxRate}">
                  <div class="filter-rate-value" data-rate-display>${currency} ${currentMaxRate}</div>
                </div>
              </div>
            </div>
            <div class="filter-row">
              <div class="filter-group">
                <label class="filter-label" for="filter-rating-min">Minimum rating</label>
                <select id="filter-rating-min" name="rating_min" data-filter-field="rating_min">
                  <option value="">Any rating</option>
                  ${ratingOptionsHtml}
                </select>
              </div>
              <div class="filter-group filter-group-zip">
                <label class="filter-label" for="filter-zip">ZIP code (optional)</label>
                <input type="text"
                       id="filter-zip"
                       name="zip_code"
                       data-filter-field="zip_code"
                       inputmode="numeric"
                       pattern="[0-9A-Za-z\\-\\s]*"
                       placeholder="e.g. 94110"
                       value="${zipValue}">
              </div>
              <div class="filter-group filter-group-distance">
                <label class="filter-label" for="filter-distance">Within (km)</label>
                <input type="number"
                       id="filter-distance"
                       name="distance_km"
                       data-filter-field="distance_km"
                       min="1"
                       step="1"
                       placeholder="Any"
                       value="${distanceValue}">
              </div>
              <div class="filter-actions">
                <button type="button" class="btn btn-primary filter-apply" data-action="apply-filters">Apply filters</button>
                <button type="button" class="btn btn-ghost filter-reset" data-action="reset-filters">Clear</button>
              </div>
            </div>
          </form>
        `;
      }

      function renderSortControl(container, state) {
        const optionsHtml = (filterOptions.sort_options || []).map(opt => {
          const selected = state.sortCode === opt.code ? ' selected' : '';
          return `<option value="${opt.code}"${selected}>${opt.label}</option>`;
        }).join('');

        container.innerHTML = `
          <label class="sort-label" for="sort-select">Sort by</label>
          <select id="sort-select" class="sort-select" data-action="change-sort">
            ${optionsHtml}
          </select>
        `;
      }

      function renderResultsMeta(container, state) {
        const count = currentInstructors.length;
        const sortLabel = state.sortCode && sortLabelByCode[state.sortCode] ? sortLabelByCode[state.sortCode] : 'default';
        container.innerHTML = `
          <div class="results-meta-text">
            <span data-populate="results-count">${count}</span> instructor${count === 1 ? '' : 's'} shown
            <span class="results-meta-sort"> &middot; Sorted by ${sortLabel}</span>
          </div>
        `;
      }

      function renderActiveFilters(container, state) {
        const chips = [];

        if (state.filters.transmission_type) {
          const label = transmissionLabelByCode[state.filters.transmission_type] || state.filters.transmission_type;
          chips.push({ key: 'transmission_type', label });
        }
        if (state.filters.language) {
          const label = languageLabelByCode[state.filters.language] || state.filters.language;
          chips.push({ key: 'language', label });
        }
        if (state.filters.max_hourly_rate !== null) {
          const currency = (filterOptions.hourly_rate_range && filterOptions.hourly_rate_range.currency) || '';
          chips.push({ key: 'max_hourly_rate', label: `Up to ${currency} ${state.filters.max_hourly_rate}` });
        }
        if (state.filters.rating_min !== null) {
          chips.push({ key: 'rating_min', label: `${state.filters.rating_min.toFixed(1)}+ stars` });
        }
        if (state.filters.zip_code) {
          const label = state.filters.distance_km !== null
            ? `${state.filters.distance_km}km from ${state.filters.zip_code}`
            : `ZIP ${state.filters.zip_code}`;
          chips.push({ key: 'zip_code', label });
        }

        if (!chips.length) {
          container.innerHTML = '';
          container.classList.add('is-empty');
          container.setAttribute('aria-hidden', 'true');
          return;
        }

        const chipsHtml = chips.map(chip => {
          return `
            <button type="button"
                    class="active-filter-chip"
                    data-action="remove-filter"
                    data-filter-key="${chip.key}">
              <span class="chip-label">${chip.label}</span>
              <span class="chip-remove" aria-hidden="true">&times;</span>
              <span class="visually-hidden">Remove filter ${chip.label}</span>
            </button>
          `;
        }).join('');

        container.classList.remove('is-empty');
        container.removeAttribute('aria-hidden');
        container.innerHTML = `
          <div class="active-filters-inner">
            <span class="active-filters-label">Active filters:</span>
            <div class="active-filters-chips">
              ${chipsHtml}
            </div>
            <button type="button" class="active-filters-clear" data-action="clear-all-filters">
              Clear all
            </button>
          </div>
        `;
      }

      function renderResultsList(container, state) {
        if (!currentInstructors.length) {
          container.innerHTML = `
            <div class="results-empty">
              <p>No instructors match your filters yet.</p>
              <p class="results-empty-hint">Try clearing some filters or widening your hourly rate or distance range.</p>
            </div>
          `;
          return;
        }

        const currency = (filterOptions.hourly_rate_range && filterOptions.hourly_rate_range.currency) || '';

        const itemsHtml = currentInstructors.map(inst => {
          const ratingText = `${inst.rating.toFixed(1)} / 5`;
          const reviewsText = inst.review_count === 1 ? '1 review' : `${inst.review_count} reviews`;
          const passRateText = inst.pass_rate_percent !== undefined && inst.pass_rate_percent !== null
            ? `${inst.pass_rate_percent}% pass rate`
            : '';
          const transmissionText = (inst.transmission_types || [])
            .map(code => transmissionLabelByCode[code] || code)
            .join(', ');
          const languageText = (inst.languages || [])
            .map(code => languageLabelByCode[code] || code)
            .join(', ');
          const homePickupText = inst.home_pickup_available ? 'Home pickup available' : 'No home pickup';
          const hourlyRateText = `${currency} ${inst.hourly_rate.toFixed(2)} / hr`;

          const initials = inst.name
            ? inst.name.split(' ').map(part => part[0]).join('').slice(0, 2).toUpperCase()
            : '';

          const avatarHtml = inst.profile_photo_url
            ? `<img src="${inst.profile_photo_url}" alt="Photo of ${inst.name}" class="instructor-card-avatar-image">`
            : `<div class="instructor-card-avatar-placeholder" aria-hidden="true">${initials}</div>`;

          return `
            <article class="instructor-card" data-component="instructor-card" data-instructor-id="${inst.id}">
              <button type="button" class="instructor-card-inner" data-action="select-instructor">
                <div class="instructor-card-main">
                  <div class="instructor-card-avatar">
                    ${avatarHtml}
                  </div>
                  <div class="instructor-card-content">
                    <header class="instructor-card-header">
                      <h2 class="instructor-card-name">${inst.name}</h2>
                      <div class="instructor-card-rating">
                        <span class="rating-score">${ratingText}</span>
                        <span class="rating-reviews">(${reviewsText})</span>
                      </div>
                    </header>
                    <div class="instructor-card-meta">
                      <span class="instructor-card-rate">${hourlyRateText}</span>
                      ${passRateText ? `<span class="instructor-card-pass">${passRateText}</span>` : ''}
                    </div>
                    <div class="instructor-card-tags">
                      <span class="tag tag-transmission">${transmissionText}</span>
                      <span class="tag tag-language">${languageText}</span>
                      <span class="tag tag-home-pickup">${homePickupText}</span>
                    </div>
                  </div>
                </div>
                <div class="instructor-card-cta">
                  <span class="instructor-card-cta-label">View profile</span>
                </div>
              </button>
            </article>
          `;
        }).join('');

        container.innerHTML = itemsHtml;
      }

      function updateLoadMoreUI(state, lastBatchLength) {
        if (!loadMoreEl) return;
        const button = loadMoreEl.querySelector('[data-action="load-more"]');
        if (!button) return;

        hasMoreResults = lastBatchLength !== null && lastBatchLength !== undefined && state && lastBatchLength >= state.limit;

        if (!currentInstructors.length || !hasMoreResults) {
          loadMoreEl.classList.add('is-hidden');
          button.disabled = true;
        } else {
          loadMoreEl.classList.remove('is-hidden');
          button.disabled = false;
        }
      }

      function runSearchForState(state, options) {
        try {
          const filtersObj = buildSearchFilters(state);
          const sortParams = sortCodeToParams(state.sortCode);
          const instructors = WebsiteSDK.searchInstructors(
            filtersObj,
            sortParams.sort_by,
            sortParams.sort_order,
            state.limit,
            state.offset
          );

          const isAppend = options && options.append;

          let lastBatchLength = 0;
          if (Array.isArray(instructors)) {
            lastBatchLength = instructors.length;
            if (isAppend && currentInstructors.length && state.offset > 0) {
              currentInstructors = currentInstructors.concat(instructors);
            } else {
              currentInstructors = instructors;
            }
          } else {
            currentInstructors = [];
          }

          renderResultsList(resultsListEl, state);
          renderResultsMeta(resultsMetaEl, state);
          renderActiveFilters(activeFiltersEl, state);
          updateLoadMoreUI(state, lastBatchLength);
        } catch (err) {
          console.error('Error while searching instructors', err);
          currentInstructors = [];
          if (resultsListEl) {
            resultsListEl.innerHTML = `
              <div class="results-error">
                <p>We could not load instructors right now. Please try again in a moment.</p>
              </div>
            `;
          }
          if (resultsMetaEl) {
            resultsMetaEl.innerHTML = '';
          }
          updateLoadMoreUI(state, 0);
        }
      }

      function applyStateFromUrl(options) {
        if (!filterOptions) return;
        const state = parseAndSanitizeUrlParams();
        if (options && options.replace && state._needsUrlUpdate) {
          state._needsUrlUpdate = false;
          writeStateToUrl(state, { replace: true });
        }

        currentInstructors = [];
        renderFilterBar(filterBarEl, state);
        renderSortControl(sortControlEl, state);
        renderActiveFilters(activeFiltersEl, state);
        runSearchForState(state, { append: false });
        isInitialised = true;
      }

      function collectFiltersFromUI() {
        if (!filterBarEl) return null;
        const form = filterBarEl.querySelector('form');
        if (!form) return null;
        const formData = new FormData(form);
        const filters = {
          transmission_type: formData.get('transmission_type') || null,
          language: formData.get('language') || null,
          max_hourly_rate: null,
          rating_min: null,
          zip_code: null,
          distance_km: null
        };

        const maxRateRaw = formData.get('max_hourly_rate');
        const ratingRaw = formData.get('rating_min');
        const zipRaw = formData.get('zip_code');
        const distanceRaw = formData.get('distance_km');

        const maxRate = safeParseNumber(maxRateRaw);
        if (maxRate !== null) {
          filters.max_hourly_rate = maxRate;
        }

        const ratingVal = safeParseNumber(ratingRaw);
        if (ratingVal !== null) {
          filters.rating_min = ratingVal;
        }

        if (zipRaw) {
          const trimmed = String(zipRaw).trim();
          if (trimmed) {
            filters.zip_code = trimmed;
          }
        }

        const distanceVal = safeParseNumber(distanceRaw);
        if (distanceVal !== null) {
          filters.distance_km = distanceVal;
        }

        return filters;
      }

      function buildStateFromUI(currentState) {
        const uiFilters = collectFiltersFromUI();
        if (!uiFilters) return currentState;

        return {
          filters: uiFilters,
          sortCode: currentState.sortCode,
          limit: currentState.limit,
          offset: 0,
          _needsUrlUpdate: false
        };
      }

      function clearAllFilters(currentState) {
        return {
          filters: {
            transmission_type: null,
            language: null,
            max_hourly_rate: null,
            rating_min: null,
            zip_code: null,
            distance_km: null
          },
          sortCode: currentState.sortCode,
          limit: currentState.limit,
          offset: 0,
          _needsUrlUpdate: false
        };
      }

      function removeSingleFilter(currentState, key) {
        const newFilters = Object.assign({}, currentState.filters);
        if (Object.prototype.hasOwnProperty.call(newFilters, key)) {
          newFilters[key] = null;
          if (key === 'zip_code') {
            newFilters.distance_km = null;
          }
        }
        return {
          filters: newFilters,
          sortCode: currentState.sortCode,
          limit: currentState.limit,
          offset: 0,
          _needsUrlUpdate: false
        };
      }

      function handleFilterBarEvents(event) {
        const target = event.target;
        if (!target) return;

        if (target.matches('[data-filter-field="max_hourly_rate"]')) {
          const display = filterBarEl ? filterBarEl.querySelector('[data-rate-display]') : null;
          if (display) {
            const currency = (filterOptions.hourly_rate_range && filterOptions.hourly_rate_range.currency) || '';
            display.textContent = `${currency} ${target.value}`;
          }
        }

        const action = target.dataset ? target.dataset.action : null;

        if (action === 'apply-filters') {
          event.preventDefault();
          const currentStateFromUrl = parseAndSanitizeUrlParams();
          const newState = buildStateFromUI(currentStateFromUrl);
          writeStateToUrl(newState, { replace: false });
          const parsedState = parseAndSanitizeUrlParams();
          currentInstructors = [];
          renderFilterBar(filterBarEl, parsedState);
          renderSortControl(sortControlEl, parsedState);
          renderActiveFilters(activeFiltersEl, parsedState);
          runSearchForState(parsedState, { append: false });
          return;
        }

        if (action === 'reset-filters') {
          event.preventDefault();
          const currentStateFromUrl = parseAndSanitizeUrlParams();
          const newState = clearAllFilters(currentStateFromUrl);
          writeStateToUrl(newState, { replace: false });
          const parsedState = parseAndSanitizeUrlParams();
          currentInstructors = [];
          renderFilterBar(filterBarEl, parsedState);
          renderSortControl(sortControlEl, parsedState);
          renderActiveFilters(activeFiltersEl, parsedState);
          runSearchForState(parsedState, { append: false });
          return;
        }
      }

      function handleActiveFiltersEvents(event) {
        const target = event.target;
        if (!target || !target.dataset) return;

        if (target.dataset.action === 'remove-filter' || target.closest('[data-action="remove-filter"]')) {
          const chip = target.closest('[data-action="remove-filter"]');
          if (!chip) return;
          const key = chip.dataset.filterKey;
          if (!key) return;
          const currentStateFromUrl = parseAndSanitizeUrlParams();
          const newState = removeSingleFilter(currentStateFromUrl, key);
          writeStateToUrl(newState, { replace: false });
          const parsedState = parseAndSanitizeUrlParams();
          currentInstructors = [];
          renderFilterBar(filterBarEl, parsedState);
          renderSortControl(sortControlEl, parsedState);
          renderActiveFilters(activeFiltersEl, parsedState);
          runSearchForState(parsedState, { append: false });
          return;
        }

        if (target.dataset.action === 'clear-all-filters') {
          const currentStateFromUrl = parseAndSanitizeUrlParams();
          const newState = clearAllFilters(currentStateFromUrl);
          writeStateToUrl(newState, { replace: false });
          const parsedState = parseAndSanitizeUrlParams();
          currentInstructors = [];
          renderFilterBar(filterBarEl, parsedState);
          renderSortControl(sortControlEl, parsedState);
          renderActiveFilters(activeFiltersEl, parsedState);
          runSearchForState(parsedState, { append: false });
        }
      }

      function handleSortChange(event) {
        const target = event.target;
        if (!target || target.dataset.action !== 'change-sort') return;
        const value = target.value;
        const currentStateFromUrl = parseAndSanitizeUrlParams();
        const newState = {
          filters: currentStateFromUrl.filters,
          sortCode: value,
          limit: currentStateFromUrl.limit,
          offset: 0,
          _needsUrlUpdate: false
        };
        writeStateToUrl(newState, { replace: false });
        const parsedState = parseAndSanitizeUrlParams();
        currentInstructors = [];
        renderSortControl(sortControlEl, parsedState);
        renderActiveFilters(activeFiltersEl, parsedState);
        runSearchForState(parsedState, { append: false });
      }

      function handleResultsListClick(event) {
        const target = event.target;
        const button = target.closest('[data-action="select-instructor"]');
        if (!button) return;
        const card = button.closest('[data-component="instructor-card"]');
        if (!card) return;
        const instructorId = card.getAttribute('data-instructor-id');
        if (!instructorId) return;
        window.location.href = `instructor.html?instructor_id=${encodeURIComponent(instructorId)}`;
      }

      function handleLoadMoreClick(event) {
        const target = event.target;
        if (!target || target.dataset.action !== 'load-more') return;
        if (!hasMoreResults) return;
        const currentStateFromUrl = parseAndSanitizeUrlParams();
        const newState = Object.assign({}, currentStateFromUrl, {
          offset: currentStateFromUrl.offset + currentStateFromUrl.limit,
          _needsUrlUpdate: false
        });
        writeStateToUrl(newState, { replace: false });
        const parsedState = parseAndSanitizeUrlParams();
        runSearchForState(parsedState, { append: true });
        renderResultsMeta(resultsMetaEl, parsedState);
        renderActiveFilters(activeFiltersEl, parsedState);
      }

      function handlePopState() {
        if (!isInitialised || !filterOptions) return;
        const state = parseAndSanitizeUrlParams();
        currentInstructors = [];
        renderFilterBar(filterBarEl, state);
        renderSortControl(sortControlEl, state);
        renderActiveFilters(activeFiltersEl, state);
        runSearchForState(state, { append: false });
      }

      try {
        filterOptions = WebsiteSDK.getInstructorFilterOptions();
        if (!filterOptions || !filterOptions.sort_options) {
          throw new Error('Missing instructor filter options');
        }
        buildOptionMaps();

        if (filterBarEl) {
          filterBarEl.addEventListener('input', handleFilterBarEvents);
          filterBarEl.addEventListener('click', handleFilterBarEvents);
        }
        if (activeFiltersEl) {
          activeFiltersEl.addEventListener('click', handleActiveFiltersEvents);
        }
        if (sortControlEl) {
          sortControlEl.addEventListener('change', handleSortChange);
        }
        if (resultsListEl) {
          resultsListEl.addEventListener('click', handleResultsListClick);
        }
        if (loadMoreEl) {
          loadMoreEl.addEventListener('click', handleLoadMoreClick);
        }
        window.addEventListener('popstate', handlePopState);

        applyStateFromUrl({ replace: true });
      } catch (err) {
        console.error('Failed to initialize instructors page', err);
        if (resultsListEl) {
          resultsListEl.innerHTML = `
            <div class="results-error">
              <p>We could not load instructor filters or results. Please refresh the page.</p>
            </div>
          `;
        }
      }
    });
  </script>
</body>
</html>
