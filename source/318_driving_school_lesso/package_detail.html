<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Driving School Booking</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&amp;family=Source+Sans+3:wght@400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>

  <!-- Framework styles -->
  <link rel='stylesheet' href='framework.css'>
  <!-- Page styles -->
  <link rel='stylesheet' href='package_detail.css'>
</head>
<body>
  <div class='site'>
    <!-- Global Header -->
    <header class='site-header'>
      <div class='site-header-inner'>
        <nav class='site-nav' aria-label='Main navigation'>
          <ul class='site-nav-list'>
            <li class='site-nav-item'>
              <a href='index.html' class='site-nav-link is-active' title='Homepage with quick access to booking and packages'>Home</a>
            </li>
            <li class='site-nav-item'>
              <a href='booking.html?view=single_lessons' class='site-nav-link' title='Search and book individual lessons and mock tests'>Book a Lesson</a>
            </li>
            <li class='site-nav-item'>
              <a href='packages.html' class='site-nav-link' title='Browse and filter multi-lesson packages'>Lesson Packages</a>
            </li>
            <li class='site-nav-item'>
              <a href='instructors.html' class='site-nav-link' title='Search and compare driving instructors'>Find Instructors</a>
            </li>
            <li class='site-nav-item'>
              <a href='my_bookings.html' class='site-nav-link' title='View, reschedule, or cancel your bookings'>My Bookings</a>
            </li>
            <li class='site-nav-item'>
              <a href='profile.html' class='site-nav-link' title='Manage your learner profile and preferences'>Profile</a>
            </li>
            <li class='site-nav-item'>
              <a href='help.html' class='site-nav-link' title='Help center and FAQs'>Help</a>
            </li>
            <li class='site-nav-item'>
              <a href='cart.html' class='site-nav-link' title='View lessons and packages ready to purchase or book'>Cart</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Page content wrapper -->
    <main id='content' class='site-main' role='main'>
      <div class='package-detail-page' aria-labelledby='package-detail-heading'>
        <!-- Hero / package core info -->
        <section class='package-detail-hero' aria-label='Lesson package details'>
          <div class='package-detail-hero-inner'>
            <!-- Status and error panel -->
            <section class='package-status-panel' data-component='package-status-and-error-panel' data-populate='status-panel' aria-live='polite'>
              <!-- Content rendered by JS -->
            </section>

            <!-- Package summary -->
            <section class='package-summary-panel' data-component='package-summary-panel' data-populate='package-summary'>
              <!-- Content rendered by JS -->
            </section>

            <!-- Pricing breakdown -->
            <section class='pricing-breakdown-panel' data-component='pricing-breakdown-panel' data-populate='pricing-breakdown' aria-label='Pricing breakdown'>
              <!-- Content rendered by JS -->
            </section>

            <!-- Promo eligibility -->
            <section class='promo-eligibility-panel' data-component='promo-eligibility-panel' data-populate='promo-eligibility' aria-label='Promo and discount eligibility'>
              <!-- Content rendered by JS -->
            </section>

            <!-- Package actions -->
            <section class='package-actions-panel' data-component='package-actions-panel' data-populate='package-actions' aria-label='Purchase actions'>
              <!-- Content rendered by JS -->
            </section>
          </div>
        </section>

        <!-- Instructor association section -->
        <section class='instructor-association-section' data-component='instructor-association-panel' data-populate='instructor-association' aria-label='Associated instructor'>
          <!-- Content rendered by JS -->
        </section>

        <!-- Add-to-cart / purchase feedback toast -->
        <div class='add-to-cart-toast-shell' data-component='add-to-cart-feedback-toast' data-populate='add-to-cart-toast' role='status' aria-live='polite' hidden>
          <!-- Content rendered by JS -->
        </div>

        <!-- Full-page loading overlay -->
        <div class='package-detail-loading-overlay' data-component='package-detail-page-init' aria-hidden='true' hidden>
          <div class='package-detail-loading-overlay__scrim'></div>
          <div class='package-detail-loading-overlay__content'>
            <div class='package-detail-loading-overlay__spinner' aria-hidden='true'></div>
            <p class='package-detail-loading-overlay__text'>Loading package details</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Global Footer -->
    <footer class='site-footer'>
      <div class='site-footer-inner'>
        <div class='site-footer-links' aria-label='Footer navigation'>
          <a href='about.html' class='site-footer-link' title='About the driving school'>About</a>
          <a href='contact.html' class='site-footer-link' title='Contact information and enquiry form'>Contact</a>
          <a href='help.html' class='site-footer-link' title='Common questions and support'>Help &amp; FAQs</a>
          <a href='policies.html' class='site-footer-link' title='Terms, cancellation, and privacy policies'>Policies</a>
        </div>
        <div class='site-footer-meta'>
          <p class='site-footer-copy'>&copy; 2026 Driving School Booking. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>
  <!-- Page UI logic -->
  <script>
    (function() {
      'use strict';

      var pageState = {
        packageId: null,
        packageData: null,
        associatedInstructor: null,
        pricingBreakdown: null,
        promoInformation: null,
        loading: false,
        loadError: null, // 'missing_id' | 'not_found' | 'network_or_server_error' | null
        addToCartInProgress: false,
        lastAddToCartError: null,
        toastVisible: false,
        toastType: null, // 'success' | 'error' | 'info'
        toastMessage: '',
        toastTimerId: null
      };

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatCurrency(amount, currency) {
        if (typeof amount !== 'number' || isNaN(amount)) {
          return '';
        }
        var code = currency || '';
        return code + ' ' + amount.toFixed(2);
      }

      function formatLevel(level) {
        if (!level) {
          return '';
        }
        var lower = String(level);
        return lower.charAt(0).toUpperCase() + lower.slice(1);
      }

      function formatTransmission(value) {
        if (!value) {
          return '';
        }
        if (value === 'both') {
          return 'Automatic & manual';
        }
        var lower = String(value);
        return lower.charAt(0).toUpperCase() + lower.slice(1);
      }

      function isPackagePurchasable() {
        return !!(pageState.packageId && pageState.packageData && pageState.packageData.status === 'active' && !pageState.loading && !pageState.loadError);
      }

      function setLoading(isLoading) {
        pageState.loading = !!isLoading;
        var overlay = document.querySelector('[data-component="package-detail-page-init"]');
        if (!overlay) {
          return;
        }
        if (pageState.loading) {
          overlay.removeAttribute('hidden');
          overlay.setAttribute('aria-hidden', 'false');
        } else {
          overlay.setAttribute('hidden', 'hidden');
          overlay.setAttribute('aria-hidden', 'true');
        }
      }

      function showToast(type, message) {
        pageState.toastType = type;
        pageState.toastMessage = message || '';
        pageState.toastVisible = true;

        if (pageState.toastTimerId) {
          window.clearTimeout(pageState.toastTimerId);
          pageState.toastTimerId = null;
        }

        renderPopulateKey('add-to-cart-toast');

        pageState.toastTimerId = window.setTimeout(function() {
          hideToast();
        }, 4000);
      }

      function hideToast() {
        pageState.toastVisible = false;
        if (pageState.toastTimerId) {
          window.clearTimeout(pageState.toastTimerId);
          pageState.toastTimerId = null;
        }
        renderPopulateKey('add-to-cart-toast');
      }

      function loadPackageDetails() {
        if (!pageState.packageId) {
          pageState.loadError = 'missing_id';
          pageState.packageData = null;
          pageState.associatedInstructor = null;
          pageState.pricingBreakdown = null;
          pageState.promoInformation = null;
          setLoading(false);
          renderAll();
          return;
        }

        setLoading(true);
        pageState.loadError = null;
        pageState.packageData = null;
        pageState.associatedInstructor = null;
        pageState.pricingBreakdown = null;
        pageState.promoInformation = null;

        try {
          var result = WebsiteSDK.getPackageDetails(pageState.packageId);
          if (!result || !result.package) {
            pageState.loadError = 'not_found';
          } else {
            pageState.packageData = result.package;
            pageState.associatedInstructor = result.associated_instructor || null;
            pageState.pricingBreakdown = result.pricing_breakdown || null;
            pageState.promoInformation = result.promo_information || null;
          }
        } catch (error) {
          console.error('Error loading package details', error);
          pageState.loadError = 'network_or_server_error';
        }

        setLoading(false);
        renderAll();
      }

      function renderStatusPanel(container) {
        if (!container) {
          return;
        }

        var pkg = pageState.packageData;
        var message = '';
        var statusType = '';
        var showRetry = false;

        if (!pageState.packageId) {
          statusType = 'error';
          message = 'No lesson package was specified in the link. Please return to Lesson Packages and choose a package.';
        } else if (pageState.loadError === 'network_or_server_error') {
          statusType = 'error';
          message = 'We were unable to load this lesson package. Please check your connection and try again.';
          showRetry = true;
        } else if (pageState.loadError === 'not_found') {
          statusType = 'error';
          message = 'This lesson package could not be found. It may have been removed or is temporarily unavailable.';
        } else if (pageState.loading) {
          statusType = 'info';
          message = 'Loading package details';
        } else if (pkg && pkg.status !== 'active') {
          statusType = 'warning';
          message = 'This lesson package is currently not available to purchase.';
        } else {
          container.innerHTML = '';
          container.style.display = 'none';
          return;
        }

        var retryHtml = showRetry ? '<button type="button" class="status-bar__retry" data-action="retry-load">Retry</button>' : '';

        container.innerHTML = (
          '<div class="status-bar status-bar--' + escapeHtml(statusType) + '">' +
            '<p class="status-bar__text">' + escapeHtml(message) + '</p>' +
            retryHtml +
          '</div>'
        );
        container.style.display = 'block';
      }

      function renderPackageSummary(container) {
        if (!container) {
          return;
        }

        var pkg = pageState.packageData;
        if (!pkg) {
          container.innerHTML = '';
          return;
        }

        var levelLabel = formatLevel(pkg.level);
        var lessonsLabel = typeof pkg.number_of_lessons === 'number' ? pkg.number_of_lessons + ' lesson' + (pkg.number_of_lessons === 1 ? '' : 's') : '';
        var durationLabel = typeof pkg.lesson_duration_minutes === 'number' ? pkg.lesson_duration_minutes + ' minutes per lesson' : '';
        var transmissionLabel = formatTransmission(pkg.transmission_type);

        var coverageLabel = '';
        if (pkg.location_center_zip && typeof pkg.location_radius_km === 'number') {
          coverageLabel = 'Around ' + pkg.location_center_zip + ' within ' + pkg.location_radius_km + ' km';
        } else if (pkg.location_center_zip) {
          coverageLabel = 'Based around ' + pkg.location_center_zip;
        }

        var homePickupLabel = pkg.home_pickup_included ? 'Home pickup included' : 'Home pickup not included';
        var mockTestLabel = pkg.mock_test_included ? 'Mock driving test included' : 'Mock driving test not included';

        var statusLabel = pkg.status === 'active' ? 'Available' : 'Not available';

        container.innerHTML = (
          '<header class="package-summary" id="package-detail-heading">' +
            '<p class="package-summary__status">' + escapeHtml(statusLabel) + '</p>' +
            '<h1 class="package-summary__title">' + escapeHtml(pkg.name) + '</h1>' +
            (pkg.description ? '<p class="package-summary__description">' + escapeHtml(pkg.description) + '</p>' : '') +
            '<ul class="package-summary__meta" aria-label="Key package details">' +
              (levelLabel ? '<li class="package-summary__meta-item"><span class="package-summary__meta-label">Level</span><span class="package-summary__meta-value">' + escapeHtml(levelLabel) + '</span></li>' : '') +
              (lessonsLabel ? '<li class="package-summary__meta-item"><span class="package-summary__meta-label">Lessons</span><span class="package-summary__meta-value">' + escapeHtml(lessonsLabel) + '</span></li>' : '') +
              (durationLabel ? '<li class="package-summary__meta-item"><span class="package-summary__meta-label">Duration</span><span class="package-summary__meta-value">' + escapeHtml(durationLabel) + '</span></li>' : '') +
              (transmissionLabel ? '<li class="package-summary__meta-item"><span class="package-summary__meta-label">Transmission</span><span class="package-summary__meta-value">' + escapeHtml(transmissionLabel) + '</span></li>' : '') +
              (coverageLabel ? '<li class="package-summary__meta-item"><span class="package-summary__meta-label">Coverage</span><span class="package-summary__meta-value">' + escapeHtml(coverageLabel) + '</span></li>' : '') +
              '<li class="package-summary__meta-item"><span class="package-summary__meta-label">Home pickup</span><span class="package-summary__meta-value">' + escapeHtml(homePickupLabel) + '</span></li>' +
              '<li class="package-summary__meta-item"><span class="package-summary__meta-label">Mock test</span><span class="package-summary__meta-value">' + escapeHtml(mockTestLabel) + '</span></li>' +
            '</ul>' +
          '</header>'
        );
      }

      function renderPricingBreakdown(container) {
        if (!container) {
          return;
        }

        var pkg = pageState.packageData;
        if (!pkg) {
          container.innerHTML = '';
          return;
        }

        var breakdown = pageState.pricingBreakdown || {};
        var pricePerLesson = typeof breakdown.price_per_lesson === 'number' ? breakdown.price_per_lesson : null;
        var regularTotal = typeof breakdown.regular_price_total === 'number' ? breakdown.regular_price_total : null;
        var discountAmount = typeof breakdown.discount_amount === 'number' ? breakdown.discount_amount : null;
        var currency = breakdown.currency || pkg.currency || '';

        var finalPriceLabel = formatCurrency(pkg.price_total, currency);
        var perLessonLabel = pricePerLesson !== null ? formatCurrency(pricePerLesson, currency) + ' per lesson' : '';
        var regularTotalLabel = regularTotal !== null ? formatCurrency(regularTotal, currency) : '';
        var discountLabel = discountAmount !== null && discountAmount > 0 ? formatCurrency(discountAmount, currency) : '';

        container.innerHTML = (
          '<article class="pricing-card">' +
            '<h2 class="pricing-card__title">Package price</h2>' +
            '<p class="pricing-card__headline-price">' + escapeHtml(finalPriceLabel) + '</p>' +
            '<div class="pricing-card__rows" aria-label="Price breakdown">' +
              (perLessonLabel ? '<p class="pricing-card__row">' + escapeHtml(perLessonLabel) + '</p>' : '') +
              (regularTotalLabel ? '<p class="pricing-card__row pricing-card__row--regular">Regular price: <span class="pricing-card__value">' + escapeHtml(regularTotalLabel) + '</span></p>' : '') +
              (discountLabel ? '<p class="pricing-card__row pricing-card__row--discount">You save: <span class="pricing-card__value">' + escapeHtml(discountLabel) + '</span></p>' : '') +
              '<p class="pricing-card__row pricing-card__row--final">You pay: <span class="pricing-card__value">' + escapeHtml(finalPriceLabel) + '</span></p>' +
            '</div>' +
          '</article>'
        );
      }

      function renderPromoEligibility(container) {
        if (!container) {
          return;
        }

        var pkg = pageState.packageData;
        if (!pkg) {
          container.innerHTML = '';
          return;
        }

        var promoInfo = pageState.promoInformation || {};
        var promoEligibleFlag = typeof promoInfo.promo_eligible === 'boolean' ? promoInfo.promo_eligible : !!pkg.promo_eligible;
        var codes = promoInfo.eligible_promo_codes || [];

        var summaryText = '';
        if (promoEligibleFlag) {
          summaryText = 'Promo codes can be applied to this package at cart or checkout.';
        } else {
          summaryText = 'This package is not eligible for promo codes.';
        }

        var codesHtml = '';
        if (promoEligibleFlag && codes && codes.length > 0) {
          var listItems = '';
          for (var i = 0; i < codes.length; i++) {
            var code = codes[i];
            var codeText = code && code.code ? code.code : '';
            var descText = code && code.description ? code.description : '';
            if (!codeText) {
              continue;
            }
            listItems += '<li class="promo-panel__code-item"><span class="promo-panel__code">' + escapeHtml(codeText) + '</span>' + (descText ? '<span class="promo-panel__code-description">' + escapeHtml(descText) + '</span>' : '') + '</li>';
          }
          if (listItems) {
            codesHtml = '<ul class="promo-panel__code-list" aria-label="Promo codes that can apply">' + listItems + '</ul>';
          }
        }

        container.innerHTML = (
          '<article class="promo-panel promo-panel--' + (promoEligibleFlag ? 'eligible' : 'ineligible') + '">' +
            '<div class="promo-panel__content">' +
              '<p class="promo-panel__summary">' + escapeHtml(summaryText) + '</p>' +
              codesHtml +
              '<p class="promo-panel__note">Any promo discount is calculated later in your cart or at checkout, not on this page.</p>' +
            '</div>' +
          '</article>'
        );
      }

      function renderPackageActions(container) {
        if (!container) {
          return;
        }

        var pkg = pageState.packageData;
        var disabled = !isPackagePurchasable() || pageState.addToCartInProgress;

        var helperMessage = '';
        if (!pageState.packageId) {
          helperMessage = 'Select a lesson package from the packages page to purchase.';
        } else if (pageState.loadError) {
          helperMessage = 'Purchase actions are unavailable until the package loads successfully.';
        } else if (!pkg) {
          helperMessage = '';
        } else if (pkg.status !== 'active') {
          helperMessage = 'This package cannot be purchased right now.';
        } else if (pageState.addToCartInProgress) {
          helperMessage = 'Adding package to your cart';
        } else {
          helperMessage = 'You can add this package to your cart or buy it now.';
        }

        container.innerHTML = (
          '<div class="package-actions" role="group" aria-label="Package purchase options">' +
            '<button type="button" class="btn btn-primary" data-action="add-package-to-cart"' + (disabled ? ' disabled' : '') + '>Add Package to Cart</button>' +
            '<button type="button" class="btn btn-secondary" data-action="buy-package-now"' + (disabled ? ' disabled' : '') + '>Buy Now</button>' +
            (helperMessage ? '<p class="package-actions__helper">' + escapeHtml(helperMessage) + '</p>' : '') +
          '</div>'
        );
      }

      function renderInstructorAssociation(container) {
        if (!container) {
          return;
        }

        var instructor = pageState.associatedInstructor;
        var pkg = pageState.packageData;

        if (!pkg || !instructor) {
          container.innerHTML = '';
          container.style.display = 'none';
          return;
        }

        var ratingText = typeof instructor.rating === 'number' ? instructor.rating.toFixed(1) + ' / 5.0' : '';
        var reviewsText = typeof instructor.review_count === 'number' ? instructor.review_count + ' review' + (instructor.review_count === 1 ? '' : 's') : '';
        var languages = instructor.languages || [];
        var languagesText = languages && languages.length > 0 ? languages.join(', ') : '';
        var transmissionTypes = instructor.transmission_types || [];
        var transmissionText = transmissionTypes && transmissionTypes.length > 0 ? transmissionTypes.join(', ') : '';
        var homePickupText = instructor.home_pickup_available ? 'Home pickup available' : 'Home pickup not available';

        var serviceAreaText = '';
        if (instructor.service_area_zip_codes && instructor.service_area_zip_codes.length > 0) {
          var firstZip = instructor.service_area_zip_codes[0];
          var extraCount = instructor.service_area_zip_codes.length - 1;
          if (extraCount > 0) {
            serviceAreaText = 'Serves ' + firstZip + ' and ' + extraCount + ' more area' + (extraCount === 1 ? '' : 's');
          } else {
            serviceAreaText = 'Serves ' + firstZip + ' area';
          }
        }

        container.style.display = 'block';
        container.innerHTML = (
          '<article class="instructor-panel">' +
            '<div class="instructor-panel__content">' +
              (instructor.profile_photo_url ? '<div class="instructor-panel__avatar-wrapper"><img src="' + escapeHtml(instructor.profile_photo_url) + '" alt="' + escapeHtml(instructor.name) + '" class="instructor-panel__avatar"></div>' : '') +
              '<div class="instructor-panel__text">' +
                '<h2 class="instructor-panel__name">' + escapeHtml(instructor.name) + '</h2>' +
                (ratingText || reviewsText ? '<p class="instructor-panel__rating">' + (ratingText ? '<span class="instructor-panel__rating-score">' + escapeHtml(ratingText) + '</span>' : '') + (reviewsText ? '<span class="instructor-panel__rating-reviews">' + escapeHtml(reviewsText) + '</span>' : '') + '</p>' : '') +
                (languagesText ? '<p class="instructor-panel__line"><span class="instructor-panel__label">Languages</span><span class="instructor-panel__value">' + escapeHtml(languagesText) + '</span></p>' : '') +
                (transmissionText ? '<p class="instructor-panel__line"><span class="instructor-panel__label">Transmission</span><span class="instructor-panel__value">' + escapeHtml(transmissionText) + '</span></p>' : '') +
                '<p class="instructor-panel__line"><span class="instructor-panel__label">Pickup</span><span class="instructor-panel__value">' + escapeHtml(homePickupText) + '</span></p>' +
                (serviceAreaText ? '<p class="instructor-panel__line"><span class="instructor-panel__label">Service area</span><span class="instructor-panel__value">' + escapeHtml(serviceAreaText) + '</span></p>' : '') +
                '<div class="instructor-panel__actions">' +
                  '<button type="button" class="btn btn-tertiary" data-action="book-single-lesson" data-component="instructor-navigation-link">Book a Single Lesson with this Instructor</button>' +
                '</div>' +
              '</div>' +
            '</div>' +
          '</article>'
        );
      }

      function renderToast(container) {
        if (!container) {
          return;
        }

        if (!pageState.toastVisible || !pageState.toastMessage) {
          container.innerHTML = '';
          container.setAttribute('hidden', 'hidden');
          return;
        }

        var type = pageState.toastType || 'info';

        container.innerHTML = (
          '<div class="toast toast--' + escapeHtml(type) + '">' +
            '<div class="toast__content">' +
              '<p class="toast__message">' + escapeHtml(pageState.toastMessage) + '</p>' +
              '<button type="button" class="toast__close" data-action="dismiss-toast" aria-label="Dismiss notification">&times;</button>' +
            '</div>' +
          '</div>'
        );
        container.removeAttribute('hidden');
      }

      var populateRenderers = {
        'status-panel': renderStatusPanel,
        'package-summary': renderPackageSummary,
        'pricing-breakdown': renderPricingBreakdown,
        'promo-eligibility': renderPromoEligibility,
        'package-actions': renderPackageActions,
        'instructor-association': renderInstructorAssociation,
        'add-to-cart-toast': renderToast
      };

      function renderPopulateKey(key) {
        var selector = '[data-populate="' + key + '"]';
        var elements = document.querySelectorAll(selector);
        if (!elements || elements.length === 0) {
          return;
        }
        var renderer = populateRenderers[key];
        if (!renderer) {
          return;
        }
        for (var i = 0; i < elements.length; i++) {
          renderer(elements[i]);
        }
      }

      function renderAll() {
        for (var key in populateRenderers) {
          if (Object.prototype.hasOwnProperty.call(populateRenderers, key)) {
            renderPopulateKey(key);
          }
        }
      }

      function handleRetryLoad() {
        if (!pageState.packageId) {
          return;
        }
        loadPackageDetails();
      }

      function handleAddPackageToCart(navigationTarget) {
        if (!pageState.packageId || !isPackagePurchasable()) {
          showToast('error', 'This package cannot be purchased right now.');
          return;
        }

        if (pageState.addToCartInProgress) {
          return;
        }

        pageState.addToCartInProgress = true;
        pageState.lastAddToCartError = null;
        renderPopulateKey('package-actions');

        var result = null;
        try {
          result = WebsiteSDK.addPackageToCart(pageState.packageId);
        } catch (error) {
          console.error('Error adding package to cart', error);
          pageState.addToCartInProgress = false;
          pageState.lastAddToCartError = 'We could not add this package to your cart. Please try again.';
          renderPopulateKey('package-actions');
          showToast('error', pageState.lastAddToCartError);
          return;
        }

        pageState.addToCartInProgress = false;
        renderPopulateKey('package-actions');

        if (!result || !result.success) {
          var errorMessage = (result && result.message) ? result.message : 'We could not add this package to your cart. Please try again.';
          pageState.lastAddToCartError = errorMessage;
          showToast('error', errorMessage);
          return;
        }

        var successMessage = result.message || 'Package added to your cart.';
        showToast('success', successMessage);

        if (navigationTarget === 'cart') {
          window.location.href = 'cart.html';
        } else if (navigationTarget === 'checkout') {
          window.location.href = 'checkout.html?source=package_buy_now';
        }
      }

      function handleBookSingleLesson() {
        var instructor = pageState.associatedInstructor;
        if (!instructor || !instructor.id) {
          showToast('error', 'This package is not currently tied to a specific instructor.');
          return;
        }
        var targetUrl = 'booking.html?view=single_lessons&instructor_id=' + encodeURIComponent(instructor.id);
        window.location.href = targetUrl;
      }

      function attachGlobalEventHandlers() {
        document.addEventListener('click', function(event) {
          var target = event.target;
          if (!target) {
            return;
          }
          var actionElement = target.closest('[data-action]');
          if (!actionElement) {
            return;
          }
          var action = actionElement.getAttribute('data-action');
          if (!action) {
            return;
          }

          if (action === 'retry-load') {
            event.preventDefault();
            handleRetryLoad();
          } else if (action === 'add-package-to-cart') {
            event.preventDefault();
            handleAddPackageToCart('cart');
          } else if (action === 'buy-package-now') {
            event.preventDefault();
            handleAddPackageToCart('checkout');
          } else if (action === 'book-single-lesson') {
            event.preventDefault();
            handleBookSingleLesson();
          } else if (action === 'dismiss-toast') {
            event.preventDefault();
            hideToast();
          }
        });

        window.addEventListener('popstate', function() {
          var params = new URLSearchParams(window.location.search);
          var newPackageId = params.get('package_id');
          if (newPackageId !== pageState.packageId) {
            pageState.packageId = newPackageId;
            loadPackageDetails();
          }
        });
      }

      function initializePage() {
        var params = new URLSearchParams(window.location.search);
        var packageId = params.get('package_id');
        pageState.packageId = packageId;

        if (!packageId) {
          pageState.loadError = 'missing_id';
          renderAll();
          return;
        }

        loadPackageDetails();
      }

      document.addEventListener('DOMContentLoaded', function() {
        attachGlobalEventHandlers();
        initializePage();
      });
    })();
  </script>
</body>
</html>
