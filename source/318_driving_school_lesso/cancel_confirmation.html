<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Driving School Booking</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&amp;family=Source+Sans+3:wght@400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>

  <!-- Framework styles -->
  <link rel='stylesheet' href='framework.css'>
  <!-- Page-specific styles -->
  <link rel='stylesheet' href='cancel_confirmation.css'>
</head>
<body>
  <div class='site'>
    <!-- Global Header -->
    <header class='site-header'>
      <div class='site-header-inner'>
        <nav class='site-nav' aria-label='Main navigation'>
          <ul class='site-nav-list'>
            <li class='site-nav-item'>
              <a href='index.html' class='site-nav-link is-active' title='Homepage with quick access to booking and packages'>Home</a>
            </li>
            <li class='site-nav-item'>
              <a href='booking.html?view=single_lessons' class='site-nav-link' title='Search and book individual lessons and mock tests'>Book a Lesson</a>
            </li>
            <li class='site-nav-item'>
              <a href='packages.html' class='site-nav-link' title='Browse and filter multi-lesson packages'>Lesson Packages</a>
            </li>
            <li class='site-nav-item'>
              <a href='instructors.html' class='site-nav-link' title='Search and compare driving instructors'>Find Instructors</a>
            </li>
            <li class='site-nav-item'>
              <a href='my_bookings.html' class='site-nav-link' title='View, reschedule, or cancel your bookings'>My Bookings</a>
            </li>
            <li class='site-nav-item'>
              <a href='profile.html' class='site-nav-link' title='Manage your learner profile and preferences'>Profile</a>
            </li>
            <li class='site-nav-item'>
              <a href='help.html' class='site-nav-link' title='Help center and FAQs'>Help</a>
            </li>
            <li class='site-nav-item'>
              <a href='cart.html' class='site-nav-link' title='View lessons and packages ready to purchase or book'>Cart</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Page content wrapper -->
    <main id='content' class='site-main' role='main'>
      <!-- Page init full-screen loader -->
      <div class='page-init-overlay is-hidden' data-component='page-init-loader' aria-hidden='true'>
        <div class='page-init-loader-content'>
          <div class='page-init-spinner' aria-hidden='true'></div>
          <p class='page-init-loader-text'>Loading your cancellation&hellip;</p>
        </div>
      </div>

      <!-- Red hero confirmation area -->
      <section class='cancel-hero' aria-labelledby='cancel-confirmation-heading'>
        <div class='cancel-hero-inner'>
          <!-- Cancellation status banner -->
          <section
            class='cancel-status-banner'
            data-component='cancellation-status-banner'
            data-populate='cancellation-status-banner'
          >
            <!-- Populated by JS -->
          </section>

          <!-- Cancelled lesson summary card -->
          <section
            class='card lesson-summary-card'
            data-component='cancelled-lesson-summary'
            data-populate='cancelled-lesson-summary'
          >
            <!-- Populated by JS -->
          </section>

          <!-- Refund / credit info panel -->
          <section
            class='card refund-credit-card'
            data-component='refund-credit-info-panel'
            data-populate='refund-credit-info-panel'
          >
            <!-- Populated by JS -->
          </section>

          <!-- Error / status message block (inline within hero) -->
          <div
            class='alert-block is-hidden'
            role='alert'
            aria-live='polite'
            data-component='error-message-block'
            data-populate='error-message-block'
          >
            <!-- Populated by JS -->
          </div>

          <!-- Primary and secondary actions -->
          <div class='cancel-hero-actions'>
            <button
              type='button'
              class='btn btn-primary hero-cta-btn'
              data-component='rebook-with-same-instructor-cta'
              data-action='rebook-same-instructor'
              disabled
              aria-disabled='true'
            >
              <span class='hero-cta-label'>Book another lesson with this instructor</span>
              <span
                class='btn-inline-spinner'
                data-component='loading-indicator'
                aria-hidden='true'
                hidden
              ></span>
            </button>

            <a
              href='javascript:void(0)'
              class='link-secondary hero-secondary-link'
              data-component='return-to-my-bookings-link'
              data-action='return-to-my-bookings'
            >
              Return to My Bookings
            </a>
          </div>
        </div>
      </section>

      <!-- Secondary section: cancellation reason -->
      <section class='cancel-reason-section-wrapper'>
        <div
          class='card cancel-reason-card'
          data-component='cancellation-reason-section'
          data-populate='cancellation-reason-section'
        >
          <!-- Populated by JS -->
        </div>
      </section>
    </main>

    <!-- Global Footer -->
    <footer class='site-footer'>
      <div class='site-footer-inner'>
        <div class='site-footer-links' aria-label='Footer navigation'>
          <a href='about.html' class='site-footer-link' title='About the driving school'>About</a>
          <a href='contact.html' class='site-footer-link' title='Contact information and enquiry form'>Contact</a>
          <a href='help.html' class='site-footer-link' title='Common questions and support'>Help &amp; FAQs</a>
          <a href='policies.html' class='site-footer-link' title='Terms, cancellation, and privacy policies'>Policies</a>
        </div>
        <div class='site-footer-meta'>
          <p class='site-footer-copy'>&copy; 2026 Driving School Booking. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>
  <!-- Page UI logic -->
  <script>
    (function() {
      'use strict';

      function escapeHTML(value) {
        var str = String(value == null ? '' : value);
        return str.replace(/[&<>"']/g, function(ch) {
          switch (ch) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            case '\'': return '&#39;';
            default: return ch;
          }
        });
      }

      function formatDateTimeRange(startStr, endStr) {
        if (!startStr) {
          return {
            dateLabel: 'Date to be confirmed',
            timeLabel: ''
          };
        }
        var startDate = new Date(startStr);
        var endDate = endStr ? new Date(endStr) : null;
        if (isNaN(startDate.getTime())) {
          return {
            dateLabel: 'Date to be confirmed',
            timeLabel: ''
          };
        }
        var dateLabel = startDate.toLocaleDateString(undefined, {
          weekday: 'short',
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
        var timeLabel = startDate.toLocaleTimeString(undefined, {
          hour: 'numeric',
          minute: '2-digit'
        });
        if (endDate && !isNaN(endDate.getTime())) {
          var endTimeLabel = endDate.toLocaleTimeString(undefined, {
            hour: 'numeric',
            minute: '2-digit'
          });
          timeLabel = timeLabel + '  ' + endTimeLabel;
        }
        return {
          dateLabel: dateLabel,
          timeLabel: timeLabel
        };
      }

      function formatShortDateTime(dateStr) {
        if (!dateStr) {
          return '';
        }
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) {
          return '';
        }
        var datePart = d.toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
        var timePart = d.toLocaleTimeString(undefined, {
          hour: 'numeric',
          minute: '2-digit'
        });
        return datePart + ' at ' + timePart;
      }

      function mapLessonType(value) {
        if (value === 'mock_driving_test') return 'Mock driving test';
        if (value === 'standard_lesson') return 'Standard lesson';
        return 'Driving lesson';
      }

      function mapTransmissionType(value) {
        if (value === 'automatic') return 'Automatic transmission';
        if (value === 'manual') return 'Manual transmission';
        return 'Transmission not specified';
      }

      function mapTimeOfDay(value) {
        if (value === 'morning') return 'Morning';
        if (value === 'afternoon') return 'Afternoon';
        if (value === 'evening') return 'Evening';
        return '';
      }

      function mapLocationType(value) {
        if (value === 'test_center') return 'Test center';
        if (value === 'home_pickup') return 'Home pickup';
        if (value === 'other') return 'Other location';
        return 'Location';
      }

      function mapPaymentMethod(value) {
        if (value === 'credit_card') return 'Credit card';
        if (value === 'debit_card') return 'Debit card';
        if (value === 'cash') return 'Cash';
        if (value === 'gift_card') return 'Gift card';
        if (value === 'other') return 'Other payment method';
        return 'Payment method';
      }

      function mapCancellationReason(value) {
        if (value === 'schedule_conflict') return 'Schedule conflict';
        if (value === 'illness') return 'Illness';
        if (value === 'weather') return 'Weather conditions';
        if (value === 'instructor_unavailable') return 'Instructor unavailable';
        if (value === 'other') return 'Other';
        return '';
      }

      document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var bookingId = urlParams.get('booking_id');
        var cancelledFlag = urlParams.get('cancelled');

        var hasValidParams = !!(bookingId && bookingId.trim() !== '');
        var isPostCancellationView = cancelledFlag === '1';

        var bookingDetail = null;
        var loadError = null;
        var isLoading = false;
        var isRebookInProgress = false;

        var overlayEl = document.querySelector('[data-component="page-init-loader"]');
        var rebookButtonEl = document.querySelector('[data-component="rebook-with-same-instructor-cta"]');
        var inlineSpinnerEl = document.querySelector('[data-component="loading-indicator"]');

        function setPageInitLoading(active) {
          if (!overlayEl) return;
          if (active) {
            overlayEl.classList.remove('is-hidden');
            overlayEl.classList.add('is-active');
            overlayEl.setAttribute('aria-hidden', 'false');
          } else {
            overlayEl.classList.remove('is-active');
            overlayEl.classList.add('is-hidden');
            overlayEl.setAttribute('aria-hidden', 'true');
          }
        }

        function computeCanRebookWithInstructor() {
          if (!bookingDetail || !bookingDetail.booking || !bookingDetail.instructor) return false;
          if (!hasValidParams || loadError) return false;
          var instructor = bookingDetail.instructor;
          if (!bookingDetail.booking.instructor_id) return false;
          if (!instructor || instructor.status !== 'active') return false;
          return true;
        }

        function updateRebookCTA() {
          if (!rebookButtonEl) return;
          var canRebook = computeCanRebookWithInstructor();
          if (!canRebook) {
            rebookButtonEl.disabled = true;
            rebookButtonEl.setAttribute('aria-disabled', 'true');
            rebookButtonEl.classList.add('btn-disabled');
          } else {
            rebookButtonEl.disabled = false;
            rebookButtonEl.removeAttribute('aria-disabled');
            rebookButtonEl.classList.remove('btn-disabled');
          }
          if (inlineSpinnerEl) {
            if (isRebookInProgress) {
              inlineSpinnerEl.hidden = false;
            } else {
              inlineSpinnerEl.hidden = true;
            }
          }
        }

        function renderStatusBanner(container) {
          if (!container) return;

          var title = '';
          var subtitle = '';
          var statusClass = '';

          if (!hasValidParams) {
            title = 'Cancellation cannot be confirmed';
            subtitle = 'This page is only available immediately after cancelling a lesson. Please return to My Bookings to review your lessons.';
            statusClass = 'is-error';
          } else if (loadError) {
            title = 'We could not load this booking';
            subtitle = 'There was a problem retrieving your cancellation details. You can try again or return to My Bookings.';
            statusClass = 'is-error';
          } else if (!bookingDetail || !bookingDetail.booking) {
            title = 'Booking details unavailable';
            subtitle = 'We could not find details for this booking. Please return to My Bookings.';
            statusClass = 'is-warning';
          } else {
            var booking = bookingDetail.booking;
            var status = booking.status;
            var bookingRef = booking.id ? 'Booking ID: ' + booking.id : '';
            if (status === 'cancelled') {
              if (isPostCancellationView) {
                title = 'Your lesson has been cancelled';
                var cancelledAtLabel = formatShortDateTime(booking.cancelled_at);
                if (cancelledAtLabel) {
                  subtitle = 'Cancelled on ' + cancelledAtLabel + '. ' + bookingRef;
                } else {
                  subtitle = 'This lesson is now cancelled. ' + bookingRef;
                }
                statusClass = 'is-success';
              } else {
                title = 'This lesson is currently cancelled';
                subtitle = 'We could not verify that it was just cancelled, but its current status is Cancelled. ' + bookingRef;
                statusClass = 'is-warning';
              }
            } else if (status === 'upcoming') {
              if (isPostCancellationView) {
                title = 'We could not confirm your cancellation';
                subtitle = 'This booking still appears as upcoming. Please refresh, check My Bookings, or contact support if this seems incorrect. ' + bookingRef;
                statusClass = 'is-warning';
              } else {
                title = 'This lesson is still booked';
                subtitle = 'The booking is currently upcoming and has not been cancelled. ' + bookingRef;
                statusClass = 'is-warning';
              }
            } else if (status === 'completed') {
              title = 'This lesson has already been completed';
              subtitle = 'Completed lessons cannot be cancelled. If you believe this is an error, please contact support. ' + bookingRef;
              statusClass = 'is-warning';
            } else {
              title = 'Booking status unavailable';
              subtitle = 'We were unable to determine the current status of this booking.';
              statusClass = 'is-warning';
            }
          }

          container.innerHTML = '' +
            '<div class="cancel-status-banner-inner ' + statusClass + '">' +
              '<div class="status-icon" aria-hidden="true"></div>' +
              '<div class="status-text-group">' +
                '<h1 id="cancel-confirmation-heading" class="status-title">' + escapeHTML(title) + '</h1>' +
                (subtitle ? '<p class="status-subtitle">' + escapeHTML(subtitle) + '</p>' : '') +
              '</div>' +
            '</div>';
        }

        function renderLessonSummary(container) {
          if (!container) return;

          if (!bookingDetail || !bookingDetail.booking || loadError || !hasValidParams) {
            container.innerHTML = '' +
              '<article class="lesson-summary-empty">' +
                '<h2 class="card-title">Lesson details not available</h2>' +
                '<p class="card-text">We were unable to show the details of this lesson. Please return to My Bookings to review your lessons.</p>' +
              '</article>';
            return;
          }

          var booking = bookingDetail.booking;
          var instructor = bookingDetail.instructor;
          var testCenter = bookingDetail.test_center;

          var lessonTypeLabel = mapLessonType(booking.lesson_type);
          var transmissionLabel = mapTransmissionType(booking.transmission_type);
          var durationLabel = booking.duration_minutes ? (booking.duration_minutes + ' minutes') : 'Duration not specified';
          var timeOfDayLabel = mapTimeOfDay(booking.time_of_day);

          var dt = formatDateTimeRange(booking.start_datetime, booking.end_datetime);
          var dateLabel = dt.dateLabel;
          var timeLabel = dt.timeLabel;

          var instructorName = instructor && instructor.name ? instructor.name : 'Instructor to be confirmed';

          var locationTypeLabel = mapLocationType(booking.location_type);
          var locationDetail = '';

          if (booking.location_type === 'test_center' && testCenter) {
            var parts = [];
            if (testCenter.name) parts.push(testCenter.name);
            if (testCenter.address_line1) parts.push(testCenter.address_line1);
            var cityParts = [];
            if (testCenter.city) cityParts.push(testCenter.city);
            if (testCenter.state) cityParts.push(testCenter.state);
            if (cityParts.length) parts.push(cityParts.join(', '));
            if (testCenter.zip_code) parts.push(testCenter.zip_code);
            locationDetail = parts.join(', ');
          } else if (booking.location_type === 'home_pickup' && booking.pickup_address) {
            locationDetail = booking.pickup_address;
          } else if (booking.meeting_address) {
            locationDetail = booking.meeting_address;
          } else {
            locationDetail = 'Location details will be confirmed with your instructor.';
          }

          container.innerHTML = '' +
            '<article class="lesson-summary">' +
              '<header class="lesson-summary-header">' +
                '<h2 class="card-title">' + escapeHTML(lessonTypeLabel) + '</h2>' +
                '<p class="card-subtitle">' + escapeHTML(transmissionLabel) + ' b7 ' + escapeHTML(durationLabel) + '</p>' +
              '</header>' +
              '<div class="lesson-summary-body">' +
                '<dl class="lesson-summary-list">' +
                  '<div class="lesson-summary-row">' +
                    '<dt>Date &amp; time</dt>' +
                    '<dd>' +
                      escapeHTML(dateLabel) + (timeLabel ? '<br><span class="muted">' + escapeHTML(timeLabel) + (timeOfDayLabel ? ' (' + escapeHTML(timeOfDayLabel) + ')' : '') + '</span>' : '') +
                    '</dd>' +
                  '</div>' +
                  '<div class="lesson-summary-row">' +
                    '<dt>Instructor</dt>' +
                    '<dd>' + escapeHTML(instructorName) + '</dd>' +
                  '</div>' +
                  '<div class="lesson-summary-row">' +
                    '<dt>Location</dt>' +
                    '<dd>' +
                      '<span class="badge badge-soft">' + escapeHTML(locationTypeLabel) + '</span>' +
                      '<div class="location-detail">' + escapeHTML(locationDetail) + '</div>' +
                    '</dd>' +
                  '</div>' +
                '</dl>' +
              '</div>' +
            '</article>';
        }

        function renderRefundCreditInfo(container) {
          if (!container) return;

          if (!bookingDetail || !bookingDetail.booking || loadError || !hasValidParams) {
            container.innerHTML = '' +
              '<div class="refund-credit-empty">' +
                '<h2 class="card-title">Payment and credits</h2>' +
                '<p class="card-text">We could not retrieve payment details for this booking. Any applicable refunds or credits will still be processed according to our cancellation policy.</p>' +
              '</div>';
            return;
          }

          var booking = bookingDetail.booking;
          var packagePurchase = bookingDetail.package_purchase;

          var bookingSourceLabel = '';
          if (booking.source === 'package_credit' || booking.package_purchase_id) {
            bookingSourceLabel = 'Package credit';
          } else if (booking.source === 'single_lesson') {
            bookingSourceLabel = 'Single lesson booking';
          } else if (booking.source === 'mock_test') {
            bookingSourceLabel = 'Mock driving test booking';
          } else {
            bookingSourceLabel = 'Booking';
          }

          var priceLine = '';
          if (typeof booking.price === 'number' && booking.currency) {
            priceLine = booking.price.toFixed(2) + ' ' + booking.currency;
          } else if (typeof booking.price === 'number') {
            priceLine = booking.price.toFixed(2);
          }

          var paymentMethodLabel = mapPaymentMethod(booking.payment_method);

          var promoLine = '';
          if (booking.promo_code_id && typeof booking.promo_discount_amount === 'number') {
            promoLine = 'Promo code applied: saving of ' + booking.promo_discount_amount.toFixed(2) + ' ' + (booking.currency || '').trim();
          } else if (booking.promo_code_id) {
            promoLine = 'Promo code applied to this booking.';
          }

          var giftCardLine = '';
          if (booking.gift_card_id && typeof booking.gift_card_amount_used === 'number') {
            giftCardLine = 'Gift card used: ' + booking.gift_card_amount_used.toFixed(2) + ' ' + (booking.currency || '').trim();
          } else if (booking.gift_card_id) {
            giftCardLine = 'Part of this booking was paid with a gift card.';
          }

          var packageSection = '';
          if (packagePurchase) {
            var lessonsIncluded = typeof packagePurchase.lessons_included === 'number' ? packagePurchase.lessons_included : null;
            var lessonsRedeemed = typeof packagePurchase.lessons_redeemed === 'number' ? packagePurchase.lessons_redeemed : null;
            var lessonsRemaining = typeof packagePurchase.lessons_remaining === 'number' ? packagePurchase.lessons_remaining : null;

            packageSection = '' +
              '<div class="refund-credit-group">' +
                '<h3 class="group-title">Package credits</h3>' +
                '<p class="group-text">This lesson was booked using a package credit.</p>' +
                '<ul class="key-value-list">' +
                  (lessonsIncluded != null ? '<li><span class="kv-label">Lessons in package</span><span class="kv-value">' + lessonsIncluded + '</span></li>' : '') +
                  (lessonsRedeemed != null ? '<li><span class="kv-label">Lessons used so far</span><span class="kv-value">' + lessonsRedeemed + '</span></li>' : '') +
                  (lessonsRemaining != null ? '<li><span class="kv-label">Lessons remaining</span><span class="kv-value">' + lessonsRemaining + '</span></li>' : '') +
                  '<li><span class="kv-label">Package status</span><span class="kv-value">' + escapeHTML(packagePurchase.status || 'active') + '</span></li>' +
                '</ul>' +
              '</div>';
          }

          container.innerHTML = '' +
            '<div class="refund-credit">' +
              '<h2 class="card-title">Payment and credits</h2>' +
              '<div class="refund-credit-body">' +
                '<div class="refund-credit-group">' +
                  '<h3 class="group-title">How this lesson was paid</h3>' +
                  '<ul class="key-value-list">' +
                    '<li><span class="kv-label">Booking type</span><span class="kv-value">' + escapeHTML(bookingSourceLabel) + '</span></li>' +
                    (priceLine ? '<li><span class="kv-label">Lesson price</span><span class="kv-value">' + escapeHTML(priceLine) + '</span></li>' : '') +
                    '<li><span class="kv-label">Payment method</span><span class="kv-value">' + escapeHTML(paymentMethodLabel) + '</span></li>' +
                  '</ul>' +
                  (promoLine ? '<p class="fine-print">' + escapeHTML(promoLine) + '</p>' : '') +
                  (giftCardLine ? '<p class="fine-print">' + escapeHTML(giftCardLine) + '</p>' : '') +
                '</div>' +
                packageSection +
                '<p class="fine-print muted">Any refunds or lesson credits for this cancellation are handled automatically according to our cancellation policy. If you have questions about your refund or credits, please check My Bookings or contact support.</p>' +
              '</div>' +
            '</div>';
        }

        function renderCancellationReason(container) {
          if (!container) return;

          if (!bookingDetail || !bookingDetail.booking || loadError || !hasValidParams) {
            container.innerHTML = '' +
              '<h2 class="card-title">Why this lesson was cancelled</h2>' +
              '<p class="card-text">We could not retrieve the recorded cancellation reason for this booking.</p>';
            return;
          }

          var booking = bookingDetail.booking;
          var reasonValue = booking.cancellation_reason;
          var reasonLabel = mapCancellationReason(reasonValue);

          var bodyText = '';
          if (!reasonValue) {
            bodyText = 'No specific reason was recorded for this cancellation.';
          } else if (reasonValue === 'other') {
            bodyText = 'This lesson was cancelled for a reason not listed in the standard options.';
          } else {
            bodyText = 'This lesson was cancelled due to: ' + reasonLabel + '.';
          }

          container.innerHTML = '' +
            '<h2 class="card-title">Why this lesson was cancelled</h2>' +
            '<p class="card-text"><strong>' + escapeHTML(reasonLabel || 'Reason not specified') + '</strong></p>' +
            '<p class="card-text">' + escapeHTML(bodyText) + '</p>';
        }

        function renderErrorBlock(container) {
          if (!container) return;

          var html = '';
          var show = false;

          if (!hasValidParams) {
            show = true;
            html = '' +
              '<div class="alert alert-error">' +
                '<div class="alert-icon" aria-hidden="true"></div>' +
                '<div class="alert-content">' +
                  '<p class="alert-title">We could not confirm a cancellation.</p>' +
                  '<p class="alert-text">This page must be opened directly after cancelling a lesson. Please go back to My Bookings to view or manage your lessons.</p>' +
                '</div>' +
              '</div>';
          } else if (loadError) {
            show = true;
            html = '' +
              '<div class="alert alert-error">' +
                '<div class="alert-icon" aria-hidden="true"></div>' +
                '<div class="alert-content">' +
                  '<p class="alert-title">There was a problem loading your booking.</p>' +
                  '<p class="alert-text">We could not retrieve your cancellation details. You can try again or return to My Bookings.</p>' +
                  '<div class="alert-actions">' +
                    '<button type="button" class="btn btn-ghost" data-action="retry-load-booking">Retry</button>' +
                  '</div>' +
                '</div>' +
              '</div>';
          }

          if (show) {
            container.classList.remove('is-hidden');
            container.innerHTML = html;
          } else {
            container.classList.add('is-hidden');
            container.innerHTML = '';
          }
        }

        function populateElement(container) {
          if (!container) return;
          var type = container.getAttribute('data-populate');
          if (!type) return;
          if (type === 'cancellation-status-banner') {
            renderStatusBanner(container);
          } else if (type === 'cancelled-lesson-summary') {
            renderLessonSummary(container);
          } else if (type === 'refund-credit-info-panel') {
            renderRefundCreditInfo(container);
          } else if (type === 'cancellation-reason-section') {
            renderCancellationReason(container);
          } else if (type === 'error-message-block') {
            renderErrorBlock(container);
          }
        }

        function renderAll() {
          var populateNodes = document.querySelectorAll('[data-populate]');
          for (var i = 0; i < populateNodes.length; i++) {
            populateElement(populateNodes[i]);
          }
          updateRebookCTA();
        }

        function loadBookingFromUrl() {
          if (!hasValidParams) {
            bookingDetail = null;
            loadError = null;
            isLoading = false;
            setPageInitLoading(false);
            renderAll();
            return;
          }

          isLoading = true;
          setPageInitLoading(true);
          bookingDetail = null;
          loadError = null;

          try {
            var detail = WebsiteSDK.getBookingDetail(bookingId);
            bookingDetail = detail || null;
            loadError = null;
          } catch (e) {
            bookingDetail = null;
            loadError = { type: 'api_error', message: 'Failed to load booking detail' };
          }

          isLoading = false;
          setPageInitLoading(false);
          renderAll();
        }

        // Global click handler for data-action elements
        document.addEventListener('click', function(event) {
          var actionEl = event.target.closest('[data-action]');
          if (!actionEl) return;
          var action = actionEl.getAttribute('data-action');
          if (!action) return;

          if (action === 'rebook-same-instructor') {
            event.preventDefault();
            if (!computeCanRebookWithInstructor()) {
              // Show inline error if rebooking is not possible
              var errorContainer = document.querySelector('[data-component="error-message-block"]');
              if (errorContainer) {
                loadError = { type: 'rebook_unavailable', message: 'Rebooking is not available for this instructor or booking.' };
                renderErrorBlock(errorContainer);
              }
              updateRebookCTA();
              return;
            }
            if (!bookingDetail || !bookingDetail.booking) {
              return;
            }
            var booking = bookingDetail.booking;
            var instructorId = booking.instructor_id;
            if (!instructorId) {
              return;
            }
            isRebookInProgress = true;
            updateRebookCTA();
            var targetUrl = 'booking.html' +
              '?view=single_lessons' +
              '&instructor_id=' + encodeURIComponent(instructorId) +
              '&time_of_day=evening' +
              '&date_from=next_7_days_start' +
              '&date_to=next_7_days_end' +
              '&rebook_from_booking_id=' + encodeURIComponent(bookingId || '') +
              '&source=rebook_after_cancellation';
            window.location.href = targetUrl;
          } else if (action === 'return-to-my-bookings') {
            event.preventDefault();
            window.location.href = 'my_bookings.html?status=upcoming_30';
          } else if (action === 'retry-load-booking') {
            event.preventDefault();
            loadBookingFromUrl();
          }
        });

        // Initial load
        loadBookingFromUrl();
      });
    })();
  </script>
</body>
</html>
