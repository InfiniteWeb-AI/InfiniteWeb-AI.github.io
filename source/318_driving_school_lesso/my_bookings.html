<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>My Bookings - Driving School Booking</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&amp;family=Source+Sans+3:wght@400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>

  <!-- Framework styles -->
  <link rel='stylesheet' href='framework.css'>
  <!-- Page styles -->
  <link rel='stylesheet' href='my_bookings.css'>
</head>
<body>
  <div class='site'>
    <!-- Global Header -->
    <header class='site-header'>
      <div class='site-header-inner'>
        <nav class='site-nav' aria-label='Main navigation'>
          <ul class='site-nav-list'>
            <li class='site-nav-item'>
              <a href='index.html' class='site-nav-link' title='Homepage with quick access to booking and packages'>Home</a>
            </li>
            <li class='site-nav-item'>
              <a href='booking.html?view=single_lessons' class='site-nav-link' title='Search and book individual lessons and mock tests'>Book a Lesson</a>
            </li>
            <li class='site-nav-item'>
              <a href='packages.html' class='site-nav-link' title='Browse and filter multi-lesson packages'>Lesson Packages</a>
            </li>
            <li class='site-nav-item'>
              <a href='instructors.html' class='site-nav-link' title='Search and compare driving instructors'>Find Instructors</a>
            </li>
            <li class='site-nav-item'>
              <a href='my_bookings.html' class='site-nav-link is-active' title='View, reschedule, or cancel your bookings'>My Bookings</a>
            </li>
            <li class='site-nav-item'>
              <a href='profile.html' class='site-nav-link' title='Manage your learner profile and preferences'>Profile</a>
            </li>
            <li class='site-nav-item'>
              <a href='help.html' class='site-nav-link' title='Help center and FAQs'>Help</a>
            </li>
            <li class='site-nav-item'>
              <a href='cart.html' class='site-nav-link' title='View lessons and packages ready to purchase or book'>Cart</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Page content wrapper -->
    <main id='content' class='site-main' role='main'>
      <section class='my-bookings-page' data-component='page-controller-my-bookings'>
        <header class='my-bookings-header'>
          <div class='my-bookings-header-inner'>
            <h1 class='my-bookings-title'>My bookings</h1>
            <p class='my-bookings-subtitle'>View, filter, and manage your driving lesson bookings.</p>
          </div>
        </header>

        <section class='my-bookings-next-upcoming' aria-labelledby='next-upcoming-heading'>
          <div class='my-bookings-next-upcoming-inner'>
            <h2 id='next-upcoming-heading' class='visually-hidden'>Next upcoming booking</h2>
            <div class='upcoming-booking-card' data-component='next-upcoming-booking-summary' data-populate='next-upcoming-booking-summary' aria-live='polite'>
              <!-- Next upcoming booking summary populated via JavaScript -->
            </div>
          </div>
        </section>

        <section class='my-bookings-controls' aria-label='Bookings filters and sorting'>
          <div class='my-bookings-controls-inner'>
            <nav class='status-filter-tabs' data-component='status-filter-tabs' aria-label='Filter bookings by status'>
              <button type='button' class='status-tab' data-action='change-status' data-status='upcoming_30'>Upcoming (next 30 days)</button>
              <button type='button' class='status-tab' data-action='change-status' data-status='past'>Past</button>
              <button type='button' class='status-tab' data-action='change-status' data-status='cancellable'>Cancellable</button>
            </nav>

            <div class='my-bookings-filters-row'>
              <form class='date-range-filter' data-component='date-range-filter' novalidate>
                <div class='form-group'>
                  <label for='date_from'>From</label>
                  <input type='date' id='date_from' name='date_from' data-action='date-from-change'>
                </div>
                <div class='form-group'>
                  <label for='date_to'>To</label>
                  <input type='date' id='date_to' name='date_to' data-action='date-to-change'>
                </div>
                <button type='button' class='link-button' data-action='clear-date-range'>Clear date range</button>
              </form>

              <div class='bookings-sort-controls' data-component='bookings-sort-controls'>
                <label for='sort_by' class='sort-label'>Sort by</label>
                <select id='sort_by' name='sort_by' data-action='sort-field-change'>
                  <option value='start_datetime'>Lesson date</option>
                  <option value='created_at'>Date booked</option>
                </select>
                <button type='button' class='sort-direction-toggle' data-action='sort-direction-toggle' aria-label='Toggle sort direction'>
                  <span data-role='sort-direction-icon'>↑</span>
                </button>
              </div>
            </div>
          </div>
        </section>

        <section class='my-bookings-list-section'>
          <div class='my-bookings-list-inner'>
            <div class='bookings-list' data-component='bookings-list' data-populate='bookings-list' aria-live='polite'>
              <!-- Bookings list populated via JavaScript -->
            </div>

            <nav class='pagination-controls' data-component='pagination-controls' aria-label='Bookings pages'>
              <button type='button' class='pagination-button pagination-prev' data-action='page-prev' disabled>Previous</button>
              <span class='pagination-status' data-role='pagination-status'>Page 1</span>
              <button type='button' class='pagination-button pagination-next' data-action='page-next' disabled>Next</button>
            </nav>
          </div>
        </section>
      </section>
    </main>

    <!-- Global Footer -->
    <footer class='site-footer'>
      <div class='site-footer-inner'>
        <div class='site-footer-links' aria-label='Footer navigation'>
          <a href='about.html' class='site-footer-link' title='About the driving school'>About</a>
          <a href='contact.html' class='site-footer-link' title='Contact information and enquiry form'>Contact</a>
          <a href='help.html' class='site-footer-link' title='Common questions and support'>Help &amp; FAQs</a>
          <a href='policies.html' class='site-footer-link' title='Terms, cancellation, and privacy policies'>Policies</a>
        </div>
        <div class='site-footer-meta'>
          <p class='site-footer-copy'>&copy; 2026 Driving School Booking. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page controller and UI logic -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof WebsiteSDK === 'undefined') {
      console.error('WebsiteSDK is not available.');
      return;
    }

    var pageController = document.querySelector('[data-component="page-controller-my-bookings"]');
    if (!pageController) {
      return;
    }

    var DEFAULT_STATUS = 'upcoming_30';

    function parseUrlState() {
      var url = new URL(window.location.href);
      var params = url.searchParams;
      var rawPage = params.get('page');
      var page = rawPage ? parseInt(rawPage, 10) || 1 : 1;
      return {
        status: params.get('status'),
        showRecent: params.get('show_recent'),
        highlightBookingId: params.get('highlight_booking_id'),
        dateFrom: params.get('date_from'),
        dateTo: params.get('date_to'),
        sortBy: params.get('sort_by'),
        sortOrder: params.get('sort_order'),
        page: page
      };
    }

    function toDateInputValue(date) {
      var year = date.getFullYear();
      var month = String(date.getMonth() + 1).padStart(2, '0');
      var day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function deriveEffectiveParams(urlState) {
      var effective = {
        statusParam: urlState.status || DEFAULT_STATUS,
        statusFilterForApi: undefined,
        dateFrom: urlState.dateFrom || null,
        dateTo: urlState.dateTo || null,
        sortBy: urlState.sortBy || null,
        sortOrder: urlState.sortOrder || null,
        showRecent: urlState.showRecent === '1',
        highlightBookingId: urlState.highlightBookingId || null,
        page: urlState.page || 1
      };

      var status = effective.statusParam;
      if (status === 'upcoming_30') {
        effective.statusFilterForApi = 'upcoming_next_30_days';
        if (!effective.sortBy) effective.sortBy = 'start_datetime';
        if (!effective.sortOrder) effective.sortOrder = 'asc';
        if (!effective.dateFrom && !effective.dateTo) {
          var today = new Date();
          var from = new Date(today.getFullYear(), today.getMonth(), today.getDate());
          var to = new Date(from.getTime());
          to.setDate(to.getDate() + 30);
          effective.dateFrom = toDateInputValue(from);
          effective.dateTo = toDateInputValue(to);
        }
      } else if (status === 'past') {
        effective.statusFilterForApi = 'past';
        if (!effective.sortBy) effective.sortBy = 'start_datetime';
        if (!effective.sortOrder) effective.sortOrder = 'desc';
      } else if (status === 'cancellable') {
        effective.statusFilterForApi = 'cancellable';
        if (!effective.sortBy) effective.sortBy = 'start_datetime';
        if (!effective.sortOrder) effective.sortOrder = 'asc';
      } else {
        effective.statusFilterForApi = status;
      }

      if (effective.showRecent) {
        effective.sortBy = 'created_at';
        effective.sortOrder = 'desc';
      }

      return effective;
    }

    function updateUrl(changes, options) {
      var url = new URL(window.location.href);
      var params = url.searchParams;
      Object.keys(changes).forEach(function(key) {
        var value = changes[key];
        if (value === null || value === undefined || value === '') {
          params.delete(key);
        } else {
          params.set(key, String(value));
        }
      });
      var newUrl = url.pathname + '?' + params.toString();
      if (options && options.replace) {
        window.history.replaceState({}, '', newUrl);
      } else {
        window.history.pushState({}, '', newUrl);
      }
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return '';
      return String(value).replace(/[&<>]/g, function(ch) {
        if (ch === '&') return '&amp;';
        if (ch === '<') return '&lt;';
        if (ch === '>') return '&gt;';
        return ch;
      });
    }

    function escapeAttr(value) {
      if (value === null || value === undefined) return '';
      return String(value).replace(/[&'<>\"']/g, function(ch) {
        if (ch === '&') return '&amp;';
        if (ch === '<') return '&lt;';
        if (ch === '>') return '&gt;';
        if (ch === '\"') return '&quot;';
        if (ch === '\'') return '&#39;';
        return ch;
      });
    }

    function formatDateRange(startStr, endStr) {
      if (!startStr || !endStr) {
        return { date: '', time: '' };
      }
      var start = new Date(startStr);
      var end = new Date(endStr);
      if (isNaN(start.getTime()) || isNaN(end.getTime())) {
        return { date: '', time: '' };
      }
      var dateFormatter = new Intl.DateTimeFormat(undefined, {
        weekday: 'short',
        day: 'numeric',
        month: 'short',
        year: 'numeric'
      });
      var timeFormatter = new Intl.DateTimeFormat(undefined, {
        hour: 'numeric',
        minute: '2-digit'
      });
      var date = dateFormatter.format(start);
      var time = timeFormatter.format(start) + '  ' + timeFormatter.format(end);
      return { date: date, time: time };
    }

    function formatLessonType(type) {
      if (!type) return '';
      if (type === 'standard_lesson') return 'Standard lesson';
      if (type === 'mock_driving_test') return 'Mock driving test';
      return type;
    }

    function formatTransmission(type) {
      if (!type) return '';
      if (type === 'automatic') return 'Automatic';
      if (type === 'manual') return 'Manual';
      return type;
    }

    function formatBookingStatus(status) {
      if (!status) return '';
      if (status === 'upcoming') return 'Upcoming';
      if (status === 'completed') return 'Completed';
      if (status === 'cancelled') return 'Cancelled';
      return status;
    }

    function renderNextUpcomingBookingSummary(container, summary) {
      if (!container) return;
      if (!summary || !summary.has_booking || !summary.booking) {
        container.style.display = 'none';
        container.innerHTML = '';
        container.removeAttribute('data-booking-id');
        return;
      }

      var b = summary.booking;
      var range = formatDateRange(b.start_datetime, b.end_datetime);
      container.style.display = '';
      if (b.id) {
        container.setAttribute('data-booking-id', b.id);
      }

      var cancellableBadge = b.is_cancellable ? "<span class='badge badge--cancellable'>Cancellable</span>" : '';
      var rescheduleButton = b.is_reschedulable ? "<button type='button' class='btn btn-secondary' data-action='upcoming-reschedule' data-booking-id='" + escapeAttr(b.id) + "'>Reschedule</button>" : '';

      container.innerHTML = "" +
        "<div class='upcoming-card-header'>" +
          "<div class='upcoming-card-label'>Next lesson in the next 30 days</div>" +
          cancellableBadge +
        "</div>" +
        "<div class='upcoming-card-main'>" +
          "<div class='upcoming-card-when'>" +
            "<div class='upcoming-card-date'>" + escapeHtml(range.date) + "</div>" +
            "<div class='upcoming-card-time'>" + escapeHtml(range.time) + "</div>" +
          "</div>" +
          "<div class='upcoming-card-details'>" +
            "<div class='upcoming-card-lesson'>" + escapeHtml(formatLessonType(b.lesson_type)) + " b7 " + escapeHtml(formatTransmission(b.transmission_type)) + " b7 " + escapeHtml(b.time_of_day || '') + "</div>" +
            "<div class='upcoming-card-meta'>" + escapeHtml(b.instructor_name || '') + " b7 " + escapeHtml(b.location_label || '') + "</div>" +
          "</div>" +
          "<div class='upcoming-card-actions'>" +
            rescheduleButton +
            "<div class='upcoming-card-hint'>Click anywhere to view details</div>" +
          "</div>" +
        "</div>";
    }

    function renderBookingsEmptyState(container, options) {
      if (!container) return;
      container.innerHTML = '';
      var wrapper = document.createElement('div');
      wrapper.setAttribute('data-component', 'bookings-empty-state');
      wrapper.className = 'bookings-empty-state';

      var statusParam = options && options.statusParam ? options.statusParam : DEFAULT_STATUS;
      var title = 'No bookings found';
      var description = 'Try adjusting your filters or book a new lesson.';
      if (statusParam === 'upcoming_30') {
        title = 'No upcoming lessons in the next 30 days';
        description = 'Book a new lesson or adjust your filters to see more.';
      } else if (statusParam === 'past') {
        title = 'No past lessons';
        description = 'Once you have completed lessons, they will appear here.';
      } else if (statusParam === 'cancellable') {
        title = 'No lessons available to cancel';
        description = 'Only lessons within your school\'s cancellation window appear here.';
      }

      wrapper.innerHTML = "" +
        "<div class='bookings-empty-state-inner'>" +
          "<h2 class='bookings-empty-state-title'>" + escapeHtml(title) + "</h2>" +
          "<p class='bookings-empty-state-description'>" + escapeHtml(description) + "</p>" +
          "<button type='button' class='btn btn-link' data-action='reset-filters'>Reset filters</button>" +
        "</div>";

      container.appendChild(wrapper);
    }

    function renderBookingsList(container, items, options) {
      if (!container) return;
      container.innerHTML = '';

      if (!Array.isArray(items) || items.length === 0) {
        renderBookingsEmptyState(container, options || {});
        return;
      }

      var listWrapper = document.createElement('div');
      listWrapper.className = 'bookings-list-inner';

      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var booking = item.booking || {};
        var range = formatDateRange(booking.start_datetime, booking.end_datetime);

        var article = document.createElement('article');
        article.className = 'booking-card';
        article.setAttribute('data-component', 'bookings-list-item');
        if (booking.id) {
          article.setAttribute('data-booking-id', booking.id);
        }

        if (options && options.highlightBookingId && booking.id === options.highlightBookingId) {
          article.classList.add('is-highlighted');
        }
        if (options && options.showRecent && i < 3) {
          article.classList.add('is-recent');
        }

        var statusLabel = formatBookingStatus(booking.status);
        var statusClass = booking.status || 'unknown';
        var cancellableBadge = item.is_cancellable ? "<span class='badge badge--cancellable'>Cancellable</span>" : '';
        var reschedButton = item.is_reschedulable ? "<button type='button' class='btn btn-secondary' data-action='booking-reschedule' data-booking-id='" + escapeAttr(booking.id) + "'>Reschedule</button>" : '';

        article.innerHTML = "" +
          "<header class='booking-card-header'>" +
            "<div class='booking-card-when'>" +
              "<div class='booking-card-date'>" + escapeHtml(range.date) + "</div>" +
              "<div class='booking-card-time'>" + escapeHtml(range.time) + "</div>" +
            "</div>" +
            "<div class='booking-card-status'>" +
              "<span class='badge badge--status badge--status-" + escapeAttr(statusClass) + "'>" + escapeHtml(statusLabel) + "</span>" +
              cancellableBadge +
            "</div>" +
          "</header>" +
          "<div class='booking-card-body'>" +
            "<div class='booking-card-main-info'>" +
              "<div class='booking-card-lesson'>" + escapeHtml(formatLessonType(booking.lesson_type)) + " b7 " + escapeHtml(formatTransmission(booking.transmission_type)) + " b7 " + escapeHtml(booking.time_of_day || '') + "</div>" +
              "<div class='booking-card-meta'>" + escapeHtml(item.instructor_name || '') + " b7 " + escapeHtml(item.location_label || '') + "</div>" +
            "</div>" +
            "<div class='booking-card-actions'>" +
              reschedButton +
            "</div>" +
          "</div>";

        listWrapper.appendChild(article);
      }

      container.appendChild(listWrapper);

      if (options && options.highlightBookingId) {
        var selectorId = options.highlightBookingId;
        var highlightEl = null;
        try {
          if (window.CSS && window.CSS.escape) {
            highlightEl = container.querySelector("[data-booking-id='" + window.CSS.escape(selectorId) + "']");
          } else {
            highlightEl = container.querySelector("[data-booking-id='" + selectorId.replace(/'/g, "\\'") + "']");
          }
        } catch (e) {
          highlightEl = null;
        }
        if (highlightEl && typeof highlightEl.scrollIntoView === 'function') {
          highlightEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          updateUrl({ highlight_booking_id: null }, { replace: true });
        }
      }
    }

    function syncControls(urlState, effective) {
      var tabsRoot = pageController.querySelector('[data-component="status-filter-tabs"]');
      if (tabsRoot) {
        var tabs = tabsRoot.querySelectorAll('[data-action="change-status"]');
        for (var i = 0; i < tabs.length; i++) {
          var tab = tabs[i];
          var tabStatus = tab.getAttribute('data-status');
          if (tabStatus === effective.statusParam) {
            tab.classList.add('is-active');
            tab.setAttribute('aria-current', 'page');
          } else {
            tab.classList.remove('is-active');
            tab.removeAttribute('aria-current');
          }
        }
      }

      var dateFromInput = pageController.querySelector('[data-action="date-from-change"]');
      var dateToInput = pageController.querySelector('[data-action="date-to-change"]');
      if (dateFromInput) {
        dateFromInput.value = urlState.dateFrom || '';
      }
      if (dateToInput) {
        dateToInput.value = urlState.dateTo || '';
      }

      var sortField = pageController.querySelector('[data-action="sort-field-change"]');
      var sortToggle = pageController.querySelector('[data-action="sort-direction-toggle"]');
      if (sortField) {
        sortField.value = effective.sortBy || 'start_datetime';
      }
      if (sortToggle) {
        var order = (effective.sortOrder || 'asc').toLowerCase() === 'desc' ? 'desc' : 'asc';
        sortToggle.dataset.sortOrder = order;
        var icon = sortToggle.querySelector('[data-role="sort-direction-icon"]');
        if (icon) {
          icon.textContent = order === 'asc' ? '↑' : '↓';
        }
        sortToggle.setAttribute('aria-label', order === 'asc' ? 'Sort ascending' : 'Sort descending');
      }

      var pagination = pageController.querySelector('[data-component="pagination-controls"]');
      if (pagination) {
        var statusEl = pagination.querySelector('[data-role="pagination-status"]');
        if (statusEl) {
          statusEl.textContent = 'Page ' + (effective.page || 1);
        }
        var prevBtn = pagination.querySelector('[data-action="page-prev"]');
        var nextBtn = pagination.querySelector('[data-action="page-next"]');
        if (prevBtn) {
          prevBtn.disabled = !effective.page || effective.page <= 1;
        }
        if (nextBtn) {
          nextBtn.disabled = true;
        }
      }
    }

    function loadData() {
      var urlState = parseUrlState();
      var effective = deriveEffectiveParams(urlState);

      var upcomingContainer = pageController.querySelector('[data-populate="next-upcoming-booking-summary"]');
      if (upcomingContainer) {
        try {
          var summary = WebsiteSDK.getNextUpcomingBookingSummary();
          renderNextUpcomingBookingSummary(upcomingContainer, summary);
        } catch (err) {
          console.error('Error loading next upcoming booking:', err);
          upcomingContainer.style.display = '';
          upcomingContainer.innerHTML = "<p class='error-message'>Unable to load your next booking right now.</p>";
        }
      }

      var bookingsContainer = pageController.querySelector('[data-populate="bookings-list"]');
      if (bookingsContainer) {
        try {
          var items = WebsiteSDK.getBookings(
            effective.statusFilterForApi,
            effective.dateFrom || undefined,
            effective.dateTo || undefined,
            effective.sortBy || undefined,
            effective.sortOrder || undefined
          ) || [];
          renderBookingsList(bookingsContainer, items, {
            showRecent: effective.showRecent,
            highlightBookingId: effective.highlightBookingId,
            statusParam: effective.statusParam,
            dateFrom: effective.dateFrom,
            dateTo: effective.dateTo
          });
        } catch (err2) {
          console.error('Error loading bookings:', err2);
          bookingsContainer.innerHTML = "<p class='error-message'>Unable to load your bookings right now. Please try again.</p>";
        }
      }

      syncControls(urlState, effective);
    }

    var tabsRoot = pageController.querySelector('[data-component="status-filter-tabs"]');
    if (tabsRoot) {
      tabsRoot.addEventListener('click', function(event) {
        var btn = event.target.closest('[data-action="change-status"]');
        if (!btn) return;
        var status = btn.getAttribute('data-status') || DEFAULT_STATUS;
        updateUrl({ status: status, show_recent: null, page: 1 }, {});
        loadData();
      });
    }

    var dateRangeRoot = pageController.querySelector('[data-component="date-range-filter"]');
    if (dateRangeRoot) {
      dateRangeRoot.addEventListener('change', function(event) {
        var target = event.target;
        if (!target) return;
        if (target.matches('[data-action="date-from-change"]')) {
          updateUrl({ date_from: target.value || null, show_recent: null, page: 1 }, {});
          loadData();
        } else if (target.matches('[data-action="date-to-change"]')) {
          updateUrl({ date_to: target.value || null, show_recent: null, page: 1 }, {});
          loadData();
        }
      });
      dateRangeRoot.addEventListener('click', function(event) {
        var clearBtn = event.target.closest('[data-action="clear-date-range"]');
        if (!clearBtn) return;
        var fromInput = dateRangeRoot.querySelector('[data-action="date-from-change"]');
        var toInput = dateRangeRoot.querySelector('[data-action="date-to-change"]');
        if (fromInput) fromInput.value = '';
        if (toInput) toInput.value = '';
        updateUrl({ date_from: null, date_to: null, show_recent: null, page: 1 }, {});
        loadData();
      });
    }

    var sortRoot = pageController.querySelector('[data-component="bookings-sort-controls"]');
    if (sortRoot) {
      sortRoot.addEventListener('change', function(event) {
        var target = event.target;
        if (!target) return;
        if (target.matches('[data-action="sort-field-change"]')) {
          updateUrl({ sort_by: target.value || null, show_recent: null, page: 1 }, {});
          loadData();
        }
      });
      sortRoot.addEventListener('click', function(event) {
        var toggle = event.target.closest('[data-action="sort-direction-toggle"]');
        if (!toggle) return;
        var currentOrder = (toggle.dataset.sortOrder || 'asc').toLowerCase();
        var nextOrder = currentOrder === 'asc' ? 'desc' : 'asc';
        updateUrl({ sort_order: nextOrder, show_recent: null, page: 1 }, {});
        loadData();
      });
    }

    var bookingsListRoot = pageController.querySelector('[data-component="bookings-list"]');
    if (bookingsListRoot) {
      bookingsListRoot.addEventListener('click', function(event) {
        var resetBtn = event.target.closest('[data-action="reset-filters"]');
        if (resetBtn) {
          updateUrl({
            status: DEFAULT_STATUS,
            show_recent: null,
            date_from: null,
            date_to: null,
            sort_by: null,
            sort_order: null,
            page: 1
          }, {});
          loadData();
          return;
        }

        var rescheduleBtn = event.target.closest('[data-action="booking-reschedule"]');
        if (rescheduleBtn) {
          var bookingId = rescheduleBtn.getAttribute('data-booking-id');
          if (bookingId) {
            window.location.href = 'booking_reschedule.html?booking_id=' + encodeURIComponent(bookingId);
          }
          return;
        }

        var item = event.target.closest('[data-component="bookings-list-item"]');
        if (item && bookingsListRoot.contains(item)) {
          var id = item.getAttribute('data-booking-id');
          if (id) {
            window.location.href = 'booking_detail.html?booking_id=' + encodeURIComponent(id);
          }
        }
      });
    }

    var paginationRoot = pageController.querySelector('[data-component="pagination-controls"]');
    if (paginationRoot) {
      paginationRoot.addEventListener('click', function(event) {
        var prevBtn = event.target.closest('[data-action="page-prev"]');
        var nextBtn = event.target.closest('[data-action="page-next"]');
        if (!prevBtn && !nextBtn) return;
        var urlState = parseUrlState();
        var page = urlState.page || 1;
        if (prevBtn && page > 1) {
          page = page - 1;
        } else if (nextBtn) {
          page = page + 1;
        } else {
          return;
        }
        updateUrl({ page: page, show_recent: null }, {});
        loadData();
      });
    }

    var upcomingRoot = pageController.querySelector('[data-component="next-upcoming-booking-summary"]');
    if (upcomingRoot) {
      upcomingRoot.addEventListener('click', function(event) {
        var rescheduleBtn = event.target.closest('[data-action="upcoming-reschedule"]');
        if (rescheduleBtn) {
          var bookingId = rescheduleBtn.getAttribute('data-booking-id');
          if (bookingId) {
            window.location.href = 'booking_reschedule.html?booking_id=' + encodeURIComponent(bookingId);
          }
          return;
        }
        var container = event.currentTarget;
        var id = container.getAttribute('data-booking-id');
        if (id) {
          window.location.href = 'booking_detail.html?booking_id=' + encodeURIComponent(id);
        }
      });
    }

    window.addEventListener('popstate', function() {
      loadData();
    });

    loadData();
  });
  </script>
</body>
</html>
