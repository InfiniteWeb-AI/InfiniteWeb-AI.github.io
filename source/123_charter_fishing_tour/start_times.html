<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start Times | Wet Line Charters</title>
    <meta name="description" content="Page where the user selects a departure/start time for their current charter fishing booking, based on the selected trip and date." />

    <!-- Typography: decorative logo font + classic serif headings/body -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Lora:wght@400;700&amp;display=swap" rel="stylesheet" />

    <!-- Global stylesheet for the framework -->
    <link rel="stylesheet" href="styles.css" />
    <!-- Page-specific stylesheet -->
    <link rel="stylesheet" href="start_times.css" />
</head>
<body>
    <div class="page">
        <header class="site-header">
            <div class="branding">
                <a href="index.html" class="logo-link">
                    <div class="logo-wordmark">Wet Line Charters</div>
                    <div class="logo-location">Carolina Coast, USA</div>
                </a>
                <p class="header-contact">Call for reservations: 1-800-555-0123</p>
            </div>

            <nav class="main-nav" aria-label="Primary navigation">
                <ul class="main-nav-list">
                    <li class="main-nav-item">
                        <a href="index.html" class="main-nav-link">Home</a>
                    </li>
                    <li class="main-nav-item">
                        <a href="search_results.html" class="main-nav-link">Browse Trips</a>
                    </li>
                    <li class="main-nav-item">
                        <a href="favorites.html" class="main-nav-link">Saved</a>
                    </li>
                    <li class="main-nav-item">
                        <a href="help_faq.html" class="main-nav-link">Help</a>
                    </li>
                    <li class="main-nav-item">
                        <a href="account.html" class="main-nav-link">Account</a>
                    </li>
                </ul>
            </nav>
        </header>

        <main id="content" class="site-content" role="main">
            <div class="start-times-page">
                <!-- Start Times header context band -->
                <section class="start-times-header-band" data-component="site-header-context-bar" data-populate="header-context"></section>

                <!-- Booking summary panel -->
                <section class="booking-summary-wrapper" data-component="booking-summary-panel" data-populate="booking-summary"></section>

                <!-- Main interaction area: loading / list / validation / actions -->
                <section class="start-times-main">
                    <!-- Loading indicators occupy the list region while data loads -->
                    <div class="start-times-loading" data-component="start-times-loading-indicators" data-populate="loading-indicators"></div>

                    <!-- Empty or error state replacing the list when needed -->
                    <div class="start-times-fallback" data-component="start-times-empty-or-error-state" data-populate="fallback-state"></div>

                    <!-- Start time selection list -->
                    <div class="start-times-list-wrapper" data-component="start-time-selection-list" data-populate="time-options"></div>

                    <!-- Inline validation and API error messages -->
                    <div class="start-times-validation" data-component="start-time-validation-message" data-populate="validation-message"></div>

                    <!-- Navigation actions: Continue / Back to trip details / Cancel booking -->
                    <div class="start-times-actions" data-component="start-times-navigation-actions">
                        <div class="primary-cta">
                            <button type="button" class="btn-primary-cta" data-action="continue">Continue</button>
                        </div>
                        <div class="secondary-actions">
                            <a href="javascript:void(0)" class="link-back-trip" data-action="back-to-trip-details">Back to trip details</a>
                            <span class="secondary-separator">|</span>
                            <a href="javascript:void(0)" class="link-cancel-booking" data-action="cancel-booking">Cancel booking</a>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <footer class="site-footer">
            <div class="footer-inner">
                <nav class="footer-nav" aria-label="Footer navigation">
                    <ul class="footer-nav-list">
                        <li class="footer-nav-item">
                            <a href="about.html" class="footer-nav-link">About</a>
                        </li>
                        <li class="footer-nav-item">
                            <a href="contact.html" class="footer-nav-link">Contact</a>
                        </li>
                        <li class="footer-nav-item">
                            <a href="help_faq.html" class="footer-nav-link">Help &amp; FAQ</a>
                        </li>
                        <li class="footer-nav-item">
                            <a href="terms.html" class="footer-nav-link">Terms &amp; Conditions</a>
                        </li>
                        <li class="footer-nav-item">
                            <a href="privacy.html" class="footer-nav-link">Privacy Policy</a>
                        </li>
                    </ul>
                </nav>

                <p class="footer-copy">&copy; 2024 Wet Line Charters. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <!-- SDK / business logic functions -->
    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var bookingIdParam = urlParams.get('bookingId') || '';

        var pageState = {
            bookingIdFromUrl: bookingIdParam,
            siteHeaderContext: null,
            hasBooking: false,
            bookingValid: false,
            booking: null,
            timeOptions: [],
            defaultStartTimeId: null,
            selectedStartTimeId: null,
            loadingBooking: false,
            loadingTimeOptions: false,
            noTimeOptions: false,
            validationMessage: '',
            bookingErrorMessage: '',
            apiErrorMessage: '',
            tripIdForCancel: null
        };

        var containersByKey = {};
        var populateElements = document.querySelectorAll('[data-populate]');
        for (var i = 0; i < populateElements.length; i++) {
            var el = populateElements[i];
            var key = el.getAttribute('data-populate');
            containersByKey[key] = el;
        }

        var continueButton = document.querySelector('[data-action="continue"]');
        var backLink = document.querySelector('[data-action="back-to-trip-details"]');
        var cancelLink = document.querySelector('[data-action="cancel-booking"]');

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatDate(dateString) {
            if (!dateString) {
                return '';
            }
            var date = new Date(dateString);
            if (isNaN(date.getTime())) {
                return escapeHtml(dateString);
            }
            var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString(undefined, options);
        }

        function formatCurrency(amount, currency) {
            var value = typeof amount === 'number' ? amount : parseFloat(amount);
            if (isNaN(value)) {
                return '';
            }
            var cur = currency || 'usd';
            var symbol = '$';
            if (cur.toLowerCase() !== 'usd') {
                symbol = '';
            }
            var formatted = value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            return symbol + formatted;
        }

        function formatTimeOfDay(timeOfDay) {
            if (!timeOfDay) {
                return '';
            }
            if (timeOfDay === 'morning') return 'Morning';
            if (timeOfDay === 'afternoon') return 'Afternoon';
            if (timeOfDay === 'evening') return 'Evening';
            if (timeOfDay === 'full_day') return 'Full day';
            return timeOfDay;
        }

        function renderHeaderContext(container) {
            if (!container) {
                return;
            }
            var booking = pageState.booking;
            var tripTitle = booking && booking.trip && booking.trip.title ? booking.trip.title : '';
            var destination = booking && booking.trip && booking.trip.destinationName ? booking.trip.destinationName : '';
            var dateLabel = booking && booking.selectedDate ? formatDate(booking.selectedDate) : '';
            var subtitle = '';
            if (tripTitle && dateLabel) {
                subtitle = tripTitle + ' — ' + dateLabel;
            } else if (tripTitle) {
                subtitle = tripTitle;
            } else if (dateLabel) {
                subtitle = dateLabel;
            } else {
                subtitle = 'Select a start time for your trip';
            }

            var ctx = pageState.siteHeaderContext;
            var metaHtml = '';
            if (ctx) {
                var parts = [];
                if (ctx.hasAccount && ctx.accountName) {
                    parts.push('Signed in as ' + escapeHtml(ctx.accountName));
                } else if (ctx.hasAccount) {
                    parts.push('Signed in');
                }
                if (typeof ctx.savedTripsCount === 'number') {
                    parts.push('Saved trips: ' + ctx.savedTripsCount);
                }
                if (ctx.hasInProgressBooking) {
                    parts.push('Booking in progress');
                }
                if (parts.length > 0) {
                    metaHtml = '<p class="header-context-meta">' + parts.join(' · ') + '</p>';
                }
            }

            container.innerHTML = '\n                <div class="start-times-header-inner">\n                    <h1 class="start-times-title">Choose Your Start Time</h1>\n                    <p class="start-times-subtitle">' + escapeHtml(subtitle) + '</p>' + metaHtml + '\n                </div>\n            ';
        }

        function renderBookingSummary(container) {
            if (!container) {
                return;
            }
            if (!pageState.bookingValid || !pageState.booking) {
                container.innerHTML = '';
                return;
            }
            var booking = pageState.booking;
            var trip = booking.trip || {};
            var priceSummary = booking.priceSummary || {};
            var numAdults = typeof booking.numAdults === 'number' ? booking.numAdults : 0;
            var numChildren = typeof booking.numChildren === 'number' ? booking.numChildren : 0;
            var partyPieces = [];
            partyPieces.push(numAdults + ' adult' + (numAdults === 1 ? '' : 's'));
            if (numChildren > 0) {
                partyPieces.push(numChildren + ' child' + (numChildren === 1 ? '' : 'ren'));
            }
            var partyLabel = partyPieces.join(', ');

            var marina = trip.departureMarinaName ? escapeHtml(trip.departureMarinaName) : '';
            var destination = trip.destinationName ? escapeHtml(trip.destinationName) : '';
            var locationLine = '';
            if (marina && destination) {
                locationLine = marina + ' — ' + destination;
            } else if (marina) {
                locationLine = marina;
            } else if (destination) {
                locationLine = destination;
            }

            var promo = booking.promoCode || {};
            var promoHtml = '';
            if (promo.code) {
                promoHtml = '\n                    <tr class="summary-row promo-row">\n                        <th scope="row">Promo</th>\n                        <td>' + escapeHtml(promo.code) + (promo.description ? ' — ' + escapeHtml(promo.description) : '') + '</td>\n                    </tr>\n                ';
            }

            var currency = priceSummary.currency || booking.currency || 'usd';

            container.innerHTML = '\n                <div class="booking-summary-card">\n                    <h2 class="booking-summary-title">Trip summary</h2>\n                    <div class="booking-summary-body">\n                        <div class="booking-summary-main">\n                            <p class="booking-trip-title">' + escapeHtml(trip.title || 'Your charter') + '</p>\n                            ' + (locationLine ? '<p class="booking-trip-location">' + locationLine + '</p>' : '') + '\n                            <p class="booking-trip-meta">' + escapeHtml(trip.durationLabel || '') + (trip.tripTypeLabel ? ' · ' + escapeHtml(trip.tripTypeLabel) : '') + '</p>\n                        </div>\n                        <div class="booking-summary-details">\n                            <table class="summary-table" role="presentation">\n                                <tbody>\n                                    <tr class="summary-row">\n                                        <th scope="row">Date</th>\n                                        <td>' + escapeHtml(formatDate(booking.selectedDate)) + '</td>\n                                    </tr>\n                                    <tr class="summary-row">\n                                        <th scope="row">Party</th>\n                                        <td>' + escapeHtml(partyLabel) + '</td>\n                                    </tr>\n                                    ' + promoHtml + '\n                                    <tr class="summary-row">\n                                        <th scope="row">Trip price</th>\n                                        <td>' + escapeHtml(formatCurrency(priceSummary.basePriceTotal || 0, currency)) + '</td>\n                                    </tr>\n                                    <tr class="summary-row">\n                                        <th scope="row">Add-ons</th>\n                                        <td>' + escapeHtml(formatCurrency(priceSummary.addOnsTotal || 0, currency)) + '</td>\n                                    </tr>\n                                    <tr class="summary-row">\n                                        <th scope="row">Discounts</th>\n                                        <td>- ' + escapeHtml(formatCurrency(priceSummary.discountTotal || 0, currency)) + '</td>\n                                    </tr>\n                                    <tr class="summary-row total-row">\n                                        <th scope="row">Total</th>\n                                        <td>' + escapeHtml(formatCurrency(priceSummary.grandTotal || 0, currency)) + '</td>\n                                    </tr>\n                                </tbody>\n                            </table>\n                        </div>\n                    </div>\n                </div>\n            ';
        }

        function renderLoadingIndicators(container) {
            if (!container) {
                return;
            }
            if (pageState.loadingBooking || pageState.loadingTimeOptions) {
                var message = 'Loading your booking details...';
                if (!pageState.loadingBooking && pageState.loadingTimeOptions) {
                    message = 'Loading available start times...';
                }
                container.innerHTML = '\n                    <div class="loading-indicator-inner">\n                        <div class="loading-spinner" aria-hidden="true"></div>\n                        <p class="loading-message">' + escapeHtml(message) + '</p>\n                    </div>\n                ';
            } else {
                container.innerHTML = '';
            }
        }

        function renderFallbackState(container) {
            if (!container) {
                return;
            }
            var html = '';
            if (!pageState.bookingValid) {
                var message = pageState.bookingErrorMessage || 'No active booking is available for this page. You cannot select a start time right now.';
                html = '\n                    <div class="fallback-panel fallback-error">\n                        <h2 class="fallback-title">No booking found</h2>\n                        <p class="fallback-text">' + escapeHtml(message) + '</p>\n                        <p class="fallback-text">Use the navigation at the top of the page to browse trips and start a new booking.</p>\n                    </div>\n                ';
            } else if (pageState.noTimeOptions) {
                var dateLabel = pageState.booking && pageState.booking.selectedDate ? formatDate(pageState.booking.selectedDate) : '';
                var text = 'There are no start times available for the selected date.';
                if (dateLabel) {
                    text = 'There are no start times available for ' + dateLabel + '. Please choose a different date from the trip details page.';
                }
                html = '\n                    <div class="fallback-panel fallback-empty">\n                        <h2 class="fallback-title">No start times available</h2>\n                        <p class="fallback-text">' + escapeHtml(text) + '</p>\n                    </div>\n                ';
            }
            container.innerHTML = html;
        }

        function renderTimeOptions(container) {
            if (!container) {
                return;
            }
            if (!pageState.bookingValid || pageState.loadingTimeOptions || pageState.noTimeOptions) {
                container.innerHTML = '';
                return;
            }
            var options = pageState.timeOptions || [];
            if (!options.length) {
                container.innerHTML = '';
                return;
            }
            var html = '\n                <fieldset class="start-times-fieldset">\n                    <legend class="start-times-legend">Available start times</legend>\n                    <div class="start-times-list" role="radiogroup" aria-label="Available start times">\n            ';
            for (var i = 0; i < options.length; i++) {
                var opt = options[i];
                var startTimeId = opt.startTimeId || '';
                var isSelected = !!(pageState.selectedStartTimeId && startTimeId === pageState.selectedStartTimeId);
                var isRecommended = !!(pageState.defaultStartTimeId && startTimeId === pageState.defaultStartTimeId);
                var timeLabel = opt.label || opt.startTimeLocal || '';
                var timeOfDayLabel = formatTimeOfDay(opt.timeOfDay);
                var rangeLabel = '';
                if (opt.startTimeLocal && opt.endTimeLocal) {
                    rangeLabel = opt.startTimeLocal + ' – ' + opt.endTimeLocal;
                } else if (opt.startTimeLocal) {
                    rangeLabel = opt.startTimeLocal;
                }
                html += '\n                        <label class="start-time-option' + (isSelected ? ' is-selected' : '') + '" data-start-time-id="' + escapeHtml(startTimeId) + '">\n                            <span class="start-time-radio-wrap">\n                                <input type="radio" class="start-time-radio" name="startTimeOption" value="' + escapeHtml(startTimeId) + '"' + (isSelected ? ' checked' : '') + ' />\n                            </span>\n                            <span class="start-time-text">\n                                <span class="start-time-label-main">' + escapeHtml(timeLabel) + '</span>\n                                <span class="start-time-label-meta">' + (rangeLabel ? escapeHtml(rangeLabel) : '') + (timeOfDayLabel ? (rangeLabel ? ' · ' : '') + escapeHtml(timeOfDayLabel) : '') + '</span>\n                            </span>' + (isRecommended ? '\n                            <span class="start-time-badge">Recommended</span>' : '') + '\n                        </label>\n                ';
            }
            html += '\n                    </div>\n                </fieldset>\n            ';
            container.innerHTML = html;
        }

        function renderValidationMessage(container) {
            if (!container) {
                return;
            }
            var message = '';
            if (pageState.validationMessage) {
                message = pageState.validationMessage;
            } else if (pageState.apiErrorMessage) {
                message = pageState.apiErrorMessage;
            }
            if (!message) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = '\n                <p class="validation-message" role="alert">' + escapeHtml(message) + '</p>\n            ';
        }

        function updateActionsState() {
            if (continueButton) {
                var disable = false;
                if (!pageState.bookingValid) {
                    disable = true;
                }
                if (pageState.loadingBooking || pageState.loadingTimeOptions) {
                    disable = true;
                }
                if (pageState.noTimeOptions) {
                    disable = true;
                }
                continueButton.disabled = disable;
                if (disable) {
                    continueButton.classList.add('is-disabled');
                } else {
                    continueButton.classList.remove('is-disabled');
                }
            }
        }

        function renderAll() {
            if (containersByKey['header-context']) {
                renderHeaderContext(containersByKey['header-context']);
            }
            if (containersByKey['booking-summary']) {
                renderBookingSummary(containersByKey['booking-summary']);
            }
            if (containersByKey['loading-indicators']) {
                renderLoadingIndicators(containersByKey['loading-indicators']);
            }
            if (containersByKey['fallback-state']) {
                renderFallbackState(containersByKey['fallback-state']);
            }
            if (containersByKey['time-options']) {
                renderTimeOptions(containersByKey['time-options']);
            }
            if (containersByKey['validation-message']) {
                renderValidationMessage(containersByKey['validation-message']);
            }
            updateActionsState();
        }

        function initHeaderContext() {
            try {
                var ctx = WebsiteSDK.getSiteHeaderContext();
                pageState.siteHeaderContext = ctx || null;
            } catch (e) {
                pageState.siteHeaderContext = null;
            }
            if (containersByKey['header-context']) {
                renderHeaderContext(containersByKey['header-context']);
            }
        }

        function initializeBookingContext() {
            pageState.loadingBooking = true;
            pageState.bookingErrorMessage = '';
            if (containersByKey['loading-indicators']) {
                renderLoadingIndicators(containersByKey['loading-indicators']);
            }
            try {
                var resp = WebsiteSDK.getCurrentBooking();
                pageState.hasBooking = !!(resp && resp.hasBooking);
                if (!pageState.hasBooking || !resp.booking || !resp.booking.bookingId) {
                    pageState.bookingValid = false;
                    pageState.booking = null;
                    pageState.loadingBooking = false;
                    pageState.loadingTimeOptions = false;
                    pageState.noTimeOptions = false;
                    pageState.bookingErrorMessage = 'No active booking was found. Please start a new booking from the trip details page.';
                    renderAll();
                    return;
                }
                var bookingIdFromApi = resp.booking.bookingId;
                if (pageState.bookingIdFromUrl && bookingIdFromApi !== pageState.bookingIdFromUrl) {
                    pageState.bookingValid = false;
                    pageState.booking = null;
                    pageState.loadingBooking = false;
                    pageState.loadingTimeOptions = false;
                    pageState.noTimeOptions = false;
                    pageState.bookingErrorMessage = 'The requested booking could not be found or has expired.';
                    renderAll();
                    return;
                }
                pageState.bookingValid = true;
                pageState.booking = resp.booking;
                pageState.tripIdForCancel = resp.booking.trip && resp.booking.trip.tripId ? resp.booking.trip.tripId : null;
                pageState.loadingBooking = false;
                if (containersByKey['booking-summary']) {
                    renderBookingSummary(containersByKey['booking-summary']);
                }
                loadTimeOptions();
            } catch (e) {
                pageState.bookingValid = false;
                pageState.booking = null;
                pageState.loadingBooking = false;
                pageState.loadingTimeOptions = false;
                pageState.noTimeOptions = false;
                pageState.bookingErrorMessage = 'We were unable to load your booking details. Please refresh the page and try again.';
                renderAll();
            }
        }

        function loadTimeOptions() {
            pageState.loadingTimeOptions = true;
            pageState.noTimeOptions = false;
            pageState.timeOptions = [];
            pageState.defaultStartTimeId = null;
            pageState.selectedStartTimeId = null;
            if (containersByKey['loading-indicators']) {
                renderLoadingIndicators(containersByKey['loading-indicators']);
            }
            try {
                var resp = WebsiteSDK.getAvailableStartTimesForCurrentBooking();
                var options = resp && resp.timeOptions ? resp.timeOptions : [];
                pageState.timeOptions = options;

                if (pageState.booking && resp && resp.bookingId && pageState.booking.bookingId && resp.bookingId !== pageState.booking.bookingId) {
                    pageState.bookingValid = false;
                    pageState.bookingErrorMessage = 'The current booking could not be matched to available start times.';
                }

                if (options.length > 0) {
                    var defaultOption = null;
                    for (var i = 0; i < options.length; i++) {
                        if (options[i].isDefault) {
                            defaultOption = options[i];
                            break;
                        }
                    }
                    if (!defaultOption) {
                        var sorted = options.slice().sort(function(a, b) {
                            var aTime = a.startTimeLocal || '';
                            var bTime = b.startTimeLocal || '';
                            return aTime.localeCompare(bTime);
                        });
                        defaultOption = sorted[0];
                    }
                    pageState.defaultStartTimeId = defaultOption && defaultOption.startTimeId ? defaultOption.startTimeId : null;

                    var bookingSelectedId = null;
                    if (pageState.booking && pageState.booking.selectedStartTime && pageState.booking.selectedStartTime.startTimeId) {
                        bookingSelectedId = pageState.booking.selectedStartTime.startTimeId;
                    }
                    if (bookingSelectedId) {
                        pageState.selectedStartTimeId = bookingSelectedId;
                    } else {
                        pageState.selectedStartTimeId = pageState.defaultStartTimeId;
                    }
                } else {
                    pageState.noTimeOptions = pageState.bookingValid;
                }
                pageState.loadingTimeOptions = false;
                renderAll();
            } catch (e) {
                pageState.loadingTimeOptions = false;
                pageState.noTimeOptions = pageState.bookingValid;
                pageState.timeOptions = [];
                pageState.defaultStartTimeId = null;
                pageState.selectedStartTimeId = null;
                pageState.bookingErrorMessage = 'We were unable to load available start times. Please refresh the page and try again.';
                renderAll();
            }
        }

        function handleStartTimeClick(event) {
            var container = containersByKey['time-options'];
            if (!container) {
                return;
            }
            var target = event.target;
            if (!target || !target.closest) {
                return;
            }
            var optionEl = target.closest('.start-time-option');
            if (!optionEl) {
                return;
            }
            if (!pageState.bookingValid || pageState.noTimeOptions || pageState.loadingTimeOptions) {
                return;
            }
            var startTimeId = optionEl.getAttribute('data-start-time-id');
            if (!startTimeId) {
                return;
            }
            if (pageState.selectedStartTimeId === startTimeId) {
                return;
            }
            pageState.selectedStartTimeId = startTimeId;
            pageState.validationMessage = '';
            if (containersByKey['time-options']) {
                renderTimeOptions(containersByKey['time-options']);
            }
            if (containersByKey['validation-message']) {
                renderValidationMessage(containersByKey['validation-message']);
            }
            updateActionsState();
        }

        function handleContinueClick(event) {
            event.preventDefault();
            if (!pageState.bookingValid || !pageState.booking) {
                return;
            }
            if (pageState.loadingBooking || pageState.loadingTimeOptions) {
                return;
            }
            if (pageState.noTimeOptions) {
                return;
            }
            var resolvedStartTimeId = pageState.selectedStartTimeId;
            if (!resolvedStartTimeId && pageState.booking && pageState.booking.selectedStartTime && pageState.booking.selectedStartTime.startTimeId) {
                resolvedStartTimeId = pageState.booking.selectedStartTime.startTimeId;
                pageState.selectedStartTimeId = resolvedStartTimeId;
            }
            if (!resolvedStartTimeId) {
                pageState.validationMessage = 'Please choose a start time before continuing.';
                if (containersByKey['validation-message']) {
                    renderValidationMessage(containersByKey['validation-message']);
                }
                updateActionsState();
                return;
            }
            try {
                var response = WebsiteSDK.setCurrentBookingStartTime(resolvedStartTimeId);
                if (!response || !response.success) {
                    var msg = response && response.message ? response.message : 'We could not save your selected start time. Please try again.';
                    pageState.validationMessage = msg;
                    if (containersByKey['validation-message']) {
                        renderValidationMessage(containersByKey['validation-message']);
                    }
                    updateActionsState();
                    return;
                }
                if (response.booking) {
                    pageState.booking = response.booking;
                    pageState.bookingValid = true;
                    pageState.bookingErrorMessage = '';
                    pageState.apiErrorMessage = '';
                    pageState.validationMessage = '';
                    if (response.booking.selectedStartTime && response.booking.selectedStartTime.startTimeId) {
                        pageState.selectedStartTimeId = response.booking.selectedStartTime.startTimeId;
                    }
                    if (containersByKey['booking-summary']) {
                        renderBookingSummary(containersByKey['booking-summary']);
                    }
                    if (containersByKey['time-options']) {
                        renderTimeOptions(containersByKey['time-options']);
                    }
                    if (containersByKey['validation-message']) {
                        renderValidationMessage(containersByKey['validation-message']);
                    }
                    updateActionsState();
                }
                var nextStep = response.booking && response.booking.nextStep ? response.booking.nextStep : '';
                var bookingId = response.booking && response.booking.bookingId ? response.booking.bookingId : '';
                if (nextStep && bookingId) {
                    if (nextStep === 'passenger_details' || nextStep === 'add_ons' || nextStep === 'checkout') {
                        window.location.href = nextStep + '.html?bookingId=' + encodeURIComponent(bookingId);
                    }
                }
            } catch (e) {
                pageState.validationMessage = 'We could not save your selected start time. Please try again.';
                if (containersByKey['validation-message']) {
                    renderValidationMessage(containersByKey['validation-message']);
                }
                updateActionsState();
            }
        }

        function handleBackToTripDetailsClick(event) {
            event.preventDefault();
            if (!pageState.bookingValid || !pageState.booking || !pageState.booking.trip || !pageState.booking.trip.tripId) {
                return;
            }
            var tripId = pageState.booking.trip.tripId;
            window.location.href = 'tour_detail.html?tripId=' + encodeURIComponent(tripId);
        }

        function handleCancelBookingClick(event) {
            event.preventDefault();
            if (!pageState.booking || !pageState.booking.trip || !pageState.booking.trip.tripId) {
                pageState.validationMessage = 'Booking information is missing. Please use the navigation above to return to your trip.';
                if (containersByKey['validation-message']) {
                    renderValidationMessage(containersByKey['validation-message']);
                }
                return;
            }
            pageState.tripIdForCancel = pageState.booking.trip.tripId;
            try {
                var resp = WebsiteSDK.clearCurrentBooking();
                if (resp && resp.success) {
                    window.location.href = 'tour_detail.html?tripId=' + encodeURIComponent(pageState.tripIdForCancel);
                } else {
                    pageState.validationMessage = 'We could not cancel your booking. Please try again.';
                    if (containersByKey['validation-message']) {
                        renderValidationMessage(containersByKey['validation-message']);
                    }
                }
            } catch (e) {
                pageState.validationMessage = 'We could not cancel your booking. Please try again.';
                if (containersByKey['validation-message']) {
                    renderValidationMessage(containersByKey['validation-message']);
                }
            }
        }

        function wireEventHandlers() {
            var timeOptionsContainer = containersByKey['time-options'];
            if (timeOptionsContainer) {
                timeOptionsContainer.addEventListener('click', handleStartTimeClick);
            }
            if (continueButton) {
                continueButton.addEventListener('click', handleContinueClick);
            }
            if (backLink) {
                backLink.addEventListener('click', handleBackToTripDetailsClick);
            }
            if (cancelLink) {
                cancelLink.addEventListener('click', handleCancelBookingClick);
            }
        }

        initHeaderContext();
        wireEventHandlers();
        initializeBookingContext();
        renderAll();
    });
    </script>
</body>
</html>
