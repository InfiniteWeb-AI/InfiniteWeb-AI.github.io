<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8' />
    <meta http-equiv='X-UA-Compatible' content='IE=edge' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>Charter Fishing Tours</title>

    <!-- Typography: decorative logo font + classic serif headings/body -->
    <link rel='preconnect' href='https://fonts.googleapis.com' />
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
    <link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Lora:wght@400;700&amp;display=swap' rel='stylesheet' />

    <!-- Global stylesheet for the framework -->
    <link rel='stylesheet' href='styles.css' />
    <!-- Page-specific stylesheet -->
    <link rel='stylesheet' href='tour_detail.css' />
</head>
<body>
    <div class='page'>
        <header class='site-header'>
            <div class='branding'>
                <a href='index.html' class='logo-link'>
                    <div class='logo-wordmark'>Wet Line Charters</div>
                    <div class='logo-location'>Carolina Coast, USA</div>
                </a>
                <p class='header-contact'>Call for reservations: 1-800-555-0123</p>
            </div>

            <nav class='main-nav' aria-label='Primary navigation'>
                <ul class='main-nav-list'>
                    <li class='main-nav-item'>
                        <a href='index.html' class='main-nav-link'>Home</a>
                    </li>
                    <li class='main-nav-item'>
                        <a href='search_results.html' class='main-nav-link'>Browse Trips</a>
                    </li>
                    <li class='main-nav-item'>
                        <a href='favorites.html' class='main-nav-link' data-component='header-saved-link'>Saved</a>
                    </li>
                    <li class='main-nav-item'>
                        <a href='help_faq.html' class='main-nav-link'>Help</a>
                    </li>
                    <li class='main-nav-item'>
                        <a href='account.html' class='main-nav-link' data-component='header-account-link'>Account</a>
                    </li>
                </ul>
            </nav>
            <div class='header-context' data-component='site-header-context-loader' data-populate='site-header-context' aria-live='polite'></div>
        </header>

        <main id='content' class='site-content' role='main'>
            <div class='tour-detail-container' data-component='trip-details-loader'>
                <section class='status-messages' data-component='error-and-loading-state-handler' aria-live='polite'></section>

                <div class='trip-content'>
                    <section class='trip-summary-header' data-component='trip-summary-header' data-populate='trip-summary-header'></section>

                    <div class='trip-meta-row'>
                        <div class='trip-rating-summary' data-component='trip-rating-summary' data-populate='trip-rating-summary'></div>
                        <div class='trip-favorites' data-component='favorites-toggle' data-populate='favorites-toggle'></div>
                    </div>

                    <div class='inactive-trip-notice' data-component='inactive-trip-notice' data-populate='inactive-trip-notice' hidden></div>

                    <section class='trip-image-gallery-section' data-component='trip-image-gallery' data-populate='trip-image-gallery'></section>

                    <div class='primary-cta-section'>
                        <button type='button' class='btn-primary-cta' data-component='primary-booking-cta' data-action='start-booking'>Book Online Now</button>
                        <button type='button' class='btn-secondary-cta' data-component='contact-captain-button' data-action='contact-captain'>Contact the Captain</button>
                    </div>

                    <section class='booking-panel-card' data-component='booking-panel' data-populate='booking-panel'></section>

                    <section class='trip-pricing-capacity' data-component='trip-pricing-capacity-section' data-populate='trip-pricing-capacity-section'></section>

                    <section class='trip-included-section' data-component='trip-included-not-included' data-populate='trip-included-not-included'></section>
                </div>
            </div>
        </main>

        <footer class='site-footer'>
            <div class='footer-inner'>
                <nav class='footer-nav' aria-label='Footer navigation'>
                    <ul class='footer-nav-list'>
                        <li class='footer-nav-item'>
                            <a href='about.html' class='footer-nav-link'>About</a>
                        </li>
                        <li class='footer-nav-item'>
                            <a href='contact.html' class='footer-nav-link'>Contact</a>
                        </li>
                        <li class='footer-nav-item'>
                            <a href='help_faq.html' class='footer-nav-link'>Help &amp; FAQ</a>
                        </li>
                        <li class='footer-nav-item'>
                            <a href='terms.html' class='footer-nav-link'>Terms &amp; Conditions</a>
                        </li>
                        <li class='footer-nav-item'>
                            <a href='privacy.html' class='footer-nav-link'>Privacy Policy</a>
                        </li>
                    </ul>
                </nav>

                <p class='footer-copy'>&copy; 2024 Wet Line Charters. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var tripId = urlParams.get('tripId');
        var fromParam = urlParams.get('from') || '';
        var dateParam = urlParams.get('date') || '';
        var numAdultsParam = urlParams.get('numAdults');
        var numChildrenParam = urlParams.get('numChildren');

        var headerContext = null;
        var tripDetails = null;
        var trip = null;
        var initialBookingConfig = null;
        var isSaved = false;
        var favoriteNote = '';
        var galleryState = {
            images: [],
            currentIndex: 0
        };
        var bookingState = {
            selectedDate: '',
            numAdults: 0,
            numChildren: 0
        };
        var tripIsActive = false;

        var statusContainer = document.querySelector('[data-component=error-and-loading-state-handler]');
        var tripContent = document.querySelector('.trip-content');

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value).replace(/[&<>'"]/g, function(c) {
                switch (c) {
                    case '&': return '&amp;';
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case "'": return '&#39;';
                    case '"': return '&quot;';
                    default: return c;
                }
            });
        }

        function showLoading(message) {
            if (!statusContainer) {
                return;
            }
            if (tripContent) {
                tripContent.style.display = 'none';
            }
            statusContainer.innerHTML = '<div class=\'loading-message\'>' + escapeHtml(message || 'Loading trip details…') + '</div>';
        }

        function showError(message) {
            if (!statusContainer) {
                return;
            }
            if (tripContent) {
                tripContent.style.display = 'none';
            }
            statusContainer.innerHTML = '<div class=\'error-message\'>' + escapeHtml(message || 'We could not load this trip. Please try again later.') + '</div>';
        }

        function clearStatus() {
            if (!statusContainer) {
                return;
            }
            statusContainer.innerHTML = '';
            if (tripContent) {
                tripContent.style.display = '';
            }
        }

        function initHeaderContext() {
            var headerContextEl = document.querySelector('[data-populate=site-header-context]');
            if (!headerContextEl) {
                return;
            }
            try {
                headerContext = WebsiteSDK.getSiteHeaderContext();
            } catch (e) {
                console.error('Error loading site header context', e);
                return;
            }
            renderSiteHeaderContext(headerContextEl, headerContext);
            updateHeaderFromContext(headerContext);
        }

        function renderSiteHeaderContext(container, context) {
            if (!context) {
                container.textContent = '';
                return;
            }
            if (context.hasAccount && context.accountName) {
                container.textContent = 'Signed in as ' + context.accountName;
            } else {
                container.textContent = 'Browsing as guest';
            }
        }

        function updateHeaderFromContext(context) {
            if (!context) {
                return;
            }
            var savedLink = document.querySelector('[data-component=header-saved-link]');
            if (savedLink) {
                var count = typeof context.savedTripsCount === 'number' ? context.savedTripsCount : 0;
                savedLink.textContent = count > 0 ? 'Saved (' + count + ')' : 'Saved';
            }
            var accountLink = document.querySelector('[data-component=header-account-link]');
            if (accountLink && context.hasAccount && context.accountName) {
                accountLink.textContent = 'Account (' + context.accountName + ')';
            }
        }

        function parsePositiveInt(value) {
            if (value === null || value === undefined || value === '') {
                return null;
            }
            var n = parseInt(value, 10);
            if (isNaN(n) || n < 0) {
                return null;
            }
            return n;
        }

        function isValidDateString(value) {
            if (!value || typeof value !== 'string') {
                return false;
            }
            if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) {
                return false;
            }
            var d = new Date(value + 'T00:00:00');
            if (isNaN(d.getTime())) {
                return false;
            }
            return true;
        }

        function compareDateStrings(a, b) {
            if (!isValidDateString(a) || !isValidDateString(b)) {
                return 0;
            }
            if (a < b) {
                return -1;
            }
            if (a > b) {
                return 1;
            }
            return 0;
        }

        function initTripDetails() {
            if (!tripId) {
                showError('No trip was specified in this link.');
                return false;
            }
            showLoading('Loading trip details…');
            try {
                tripDetails = WebsiteSDK.getTripDetails(tripId);
            } catch (e) {
                console.error('Error loading trip details', e);
                showError('We could not load this trip. Please try again later.');
                return false;
            }
            if (!tripDetails || !tripDetails.trip) {
                showError('We could not find a trip with that identifier.');
                return false;
            }
            trip = tripDetails.trip;
            initialBookingConfig = tripDetails.initialBookingConfig || {};
            isSaved = !!tripDetails.isSaved;
            tripIsActive = trip.status === 'active';
            initBookingStateFromParams();
            clearStatus();
            return true;
        }

        function initBookingStateFromParams() {
            var earliest = initialBookingConfig && initialBookingConfig.earliestBookableDate ? initialBookingConfig.earliestBookableDate : '';
            var defaultAdults = typeof initialBookingConfig.defaultNumAdults === 'number' ? initialBookingConfig.defaultNumAdults : 1;
            var defaultChildren = typeof initialBookingConfig.defaultNumChildren === 'number' ? initialBookingConfig.defaultNumChildren : 0;

            var urlAdults = parsePositiveInt(numAdultsParam);
            var urlChildren = parsePositiveInt(numChildrenParam);

            var useUrlCounts = urlAdults !== null || urlChildren !== null;
            var adultsCandidate = useUrlCounts && urlAdults !== null ? urlAdults : defaultAdults;
            var childrenCandidate = useUrlCounts && urlChildren !== null ? urlChildren : defaultChildren;

            if (!isCountsWithinCapacity(adultsCandidate, childrenCandidate)) {
                adultsCandidate = defaultAdults;
                childrenCandidate = defaultChildren;
                if (!isCountsWithinCapacity(adultsCandidate, childrenCandidate)) {
                    adultsCandidate = 1;
                    childrenCandidate = 0;
                }
            }

            bookingState.numAdults = adultsCandidate;
            bookingState.numChildren = childrenCandidate;

            var selectedDate = '';
            if (dateParam && isValidDateString(dateParam) && (!earliest || compareDateStrings(dateParam, earliest) >= 0)) {
                selectedDate = dateParam;
            } else if (earliest && isValidDateString(earliest)) {
                selectedDate = earliest;
            }
            bookingState.selectedDate = selectedDate;
            syncBookingStateToUrl();
        }

        function isCountsWithinCapacity(numAdults, numChildren) {
            if (!trip) {
                return true;
            }
            if (numAdults < 0 || numChildren < 0) {
                return false;
            }
            var total = numAdults + numChildren;
            if (typeof trip.maxPassengers === 'number' && total > trip.maxPassengers) {
                return false;
            }
            if (typeof trip.maxAdults === 'number' && numAdults > trip.maxAdults) {
                return false;
            }
            if (typeof trip.maxChildren === 'number' && numChildren > trip.maxChildren) {
                return false;
            }
            return true;
        }

        function syncBookingStateToUrl() {
            var params = new URLSearchParams(window.location.search);
            if (bookingState.selectedDate) {
                params.set('date', bookingState.selectedDate);
            } else {
                params.delete('date');
            }
            params.set('numAdults', String(bookingState.numAdults));
            params.set('numChildren', String(bookingState.numChildren));
            if (fromParam) {
                params.set('from', fromParam);
            }
            var newRelativePathQuery = window.location.pathname + '?' + params.toString();
            window.history.replaceState(null, '', newRelativePathQuery);
        }

        function renderTripSummaryHeader(container) {
            if (!trip) {
                container.innerHTML = '';
                return;
            }
            var badges = [];
            if (trip.tripTypeLabel) {
                badges.push(escapeHtml(trip.tripTypeLabel));
            }
            if (trip.durationLabel) {
                badges.push(escapeHtml(trip.durationLabel));
            }
            if (trip.timeOfDayOptions && trip.timeOfDayOptions.length) {
                badges.push(escapeHtml(trip.timeOfDayOptions.join(', ')));
            }
            var flags = [];
            if (trip.isFamilyFriendly) {
                flags.push('Family-friendly');
            }
            if (trip.goodForKids) {
                flags.push('Good for kids');
            }
            if (trip.wheelchairAccessible) {
                flags.push('Wheelchair accessible');
            }
            var captainLineParts = [];
            if (trip.captainName) {
                captainLineParts.push('Captain ' + escapeHtml(trip.captainName));
            }
            if (trip.operatorName) {
                captainLineParts.push(escapeHtml(trip.operatorName));
            }
            var captainLine = captainLineParts.join(' • ');
            var destinationLineParts = [];
            if (trip.destinationName) {
                destinationLineParts.push(escapeHtml(trip.destinationName));
            }
            if (trip.departureMarinaName) {
                destinationLineParts.push('Departs from ' + escapeHtml(trip.departureMarinaName));
            }
            var destinationLine = destinationLineParts.join(' • ');

            var fromText = '';
            if (fromParam === 'favorites') {
                fromText = 'You opened this trip from your saved list.';
            } else if (fromParam === 'search_results') {
                fromText = 'You opened this trip from search results.';
            }

            container.innerHTML = (
                '<h1 class=\'trip-title\'>' + escapeHtml(trip.title || 'Fishing charter') + '</h1>' +
                (trip.shortDescription ? '<p class=\'trip-short-description\'>' + escapeHtml(trip.shortDescription) + '</p>' : '') +
                (destinationLine ? '<p class=\'trip-meta-line\'>' + destinationLine + '</p>' : '') +
                (badges.length ? '<p class=\'trip-badge-line\'>' + badges.join(' • ') + '</p>' : '') +
                (captainLine ? '<p class=\'trip-captain-line\'>' + captainLine + '</p>' : '') +
                (flags.length ? '<p class=\'trip-flags-line\'>' + flags.join(' • ') + '</p>' : '') +
                (fromText ? '<p class=\'trip-from-context\'>' + escapeHtml(fromText) + '</p>' : '')
            );
        }

        function renderTripRatingSummary(container) {
            if (!trip) {
                container.innerHTML = '';
                return;
            }
            var rating = typeof trip.ratingAverage === 'number' ? trip.ratingAverage : 0;
            var reviewCount = typeof trip.reviewCount === 'number' ? trip.reviewCount : 0;
            var maxStars = 5;
            var filledStars = Math.round(rating);
            if (filledStars < 0) {
                filledStars = 0;
            }
            if (filledStars > maxStars) {
                filledStars = maxStars;
            }
            var stars = '';
            for (var i = 0; i < maxStars; i++) {
                stars += i < filledStars ? '★' : '☆';
            }
            var reviewText = reviewCount === 1 ? '1 review' : reviewCount + ' reviews';
            container.innerHTML = (
                '<div class=\'rating-display\' title=\'Average rating based on guest reviews\'>' +
                    '<span class=\'rating-stars\' aria-hidden=\'true\'>' + stars + '</span>' +
                    '<span class=\'rating-number\'>' + rating.toFixed(1) + '</span>' +
                    '<span class=\'rating-reviews\'>(' + reviewText + ')</span>' +
                '</div>'
            );
        }

        function renderInactiveNotice(container) {
            if (!trip || trip.status === 'active') {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }
            container.removeAttribute('hidden');
            container.innerHTML = (
                '<div class=\'inactive-banner\' role=\'status\'>' +
                    '<strong>This trip is not currently bookable online.</strong>' +
                    '<p>You can still save this trip or contact the captain with questions, but online booking is temporarily unavailable.</p>' +
                '</div>'
            );
        }

        function renderTripImageGallery(container) {
            if (!trip) {
                container.innerHTML = '';
                return;
            }
            var images = [];
            if (trip.imageUrls && trip.imageUrls.length) {
                images = trip.imageUrls.slice();
            } else if (trip.thumbnailUrl) {
                images = [trip.thumbnailUrl];
            }
            if (!images.length) {
                container.innerHTML = '<div class=\'gallery-placeholder\'>No photos available for this trip.</div>';
                galleryState.images = [];
                galleryState.currentIndex = 0;
                return;
            }
            galleryState.images = images;
            if (galleryState.currentIndex < 0 || galleryState.currentIndex >= images.length) {
                galleryState.currentIndex = 0;
            }
            var mainSrc = images[galleryState.currentIndex];
            var thumbsHtml = '';
            if (images.length > 1) {
                for (var i = 0; i < images.length; i++) {
                    thumbsHtml += (
                        '<button type=\'button\' class=\'gallery-thumb-button' + (i === galleryState.currentIndex ? ' is-active' : '') + '\' data-action=\'select-image\' data-index=\'' + i + '\'>' +
                            '<img src=\'' + escapeHtml(images[i]) + '\' alt=\'Trip photo ' + (i + 1) + '\' />' +
                        '</button>'
                    );
                }
            }
            var controlsHtml = '';
            if (images.length > 1) {
                controlsHtml = (
                    '<div class=\'gallery-controls\'>' +
                        '<button type=\'button\' class=\'gallery-nav-button\' data-action=\'prev-image\'>Previous</button>' +
                        '<button type=\'button\' class=\'gallery-nav-button\' data-action=\'next-image\'>Next</button>' +
                    '</div>'
                );
            }
            container.innerHTML = (
                '<div class=\'trip-image-gallery-main\'>' +
                    '<img src=\'' + escapeHtml(mainSrc) + '\' alt=\'Photo of this fishing charter trip\' data-role=\'gallery-main-image\' />' +
                '</div>' +
                (thumbsHtml ? '<div class=\'trip-image-gallery-thumbs\'>' + thumbsHtml + '</div>' : '') +
                controlsHtml
            );
        }

        function renderFavoritesToggle(container) {
            if (!trip) {
                container.innerHTML = '';
                return;
            }
            var buttonLabel = isSaved ? 'Saved' : 'Save trip';
            var notePlaceholder = 'Add a personal note (optional)';
            var viewLinkStyle = isSaved ? '' : ' style=\'display:none\'';
            container.innerHTML = (
                '<button type=\'button\' class=\'favorites-toggle-button' + (isSaved ? ' is-saved' : '') + '\' data-action=\'toggle-favorite\'>' +
                    buttonLabel +
                '</button>' +
                '<div class=\'favorites-note-row\'>' +
                    '<label class=\'favorites-note-label\'>Note:' +
                        '<input type=\'text\' class=\'favorites-note-input\' data-action=\'favorite-note-change\' placeholder=\'' + escapeHtml(notePlaceholder) + '\' />' +
                    '</label>' +
                '</div>' +
                '<div class=\'favorites-feedback\' data-role=\'favorites-feedback\'></div>' +
                '<a href=\'favorites.html\' class=\'view-saved-trips-link\' data-component=\'view-saved-trips-link\' data-action=\'view-saved-trips\'' + viewLinkStyle + '>View all saved trips</a>'
            );
        }

        function renderBookingPanel(container) {
            if (!trip) {
                container.innerHTML = '';
                return;
            }
            var earliest = initialBookingConfig && initialBookingConfig.earliestBookableDate ? initialBookingConfig.earliestBookableDate : '';
            var capacityLine = 'Up to ' + trip.maxPassengers + ' passengers';
            if (typeof trip.maxAdults === 'number') {
                capacityLine += ' (' + trip.maxAdults + ' adults';
                if (typeof trip.maxChildren === 'number') {
                    capacityLine += ', ' + trip.maxChildren + ' children';
                }
                capacityLine += ')';
            }
            var ageLine = '';
            if (typeof trip.minimumAge === 'number') {
                ageLine = 'Minimum age ' + trip.minimumAge + ' years';
                if (typeof trip.childAgeMax === 'number') {
                    ageLine += '; children are ' + trip.childAgeMax + ' and under.';
                }
            } else if (typeof trip.childAgeMax === 'number') {
                ageLine = 'Children are ' + trip.childAgeMax + ' and under.';
            }
            var dateValue = bookingState.selectedDate || '';
            var disabledAttr = tripIsActive ? '' : ' disabled=\'disabled\'';
            container.innerHTML = (
                '<form class=\'booking-form\' novalidate>' +
                    '<fieldset class=\'booking-fieldset\'' + (tripIsActive ? '' : ' aria-disabled=\'true\'') + '>' +
                        '<legend class=\'booking-legend\'>Plan your trip</legend>' +
                        '<div class=\'booking-field\'>' +
                            '<label for=\'booking-date-input\'>Fishing date</label>' +
                            '<input type=\'date\' id=\'booking-date-input\' name=\'date\' data-action=\'select-date\' value=\'' + escapeHtml(dateValue) + '\'' + (earliest ? ' min=\'' + escapeHtml(earliest) + '\'' : '') + disabledAttr + ' />' +
                            (earliest ? '<div class=\'field-hint\'>Earliest available date: ' + escapeHtml(earliest) + '</div>' : '') +
                        '</div>' +
                        '<div class=\'booking-field\'>' +
                            '<div class=\'party-size-group\'>' +
                                '<div class=\'party-row\'>' +
                                    '<span class=\'party-label\'>Adults</span>' +
                                    '<button type=\'button\' class=\'party-button\' data-action=\'decrement-adults\'' + disabledAttr + '>-</button>' +
                                    '<input type=\'number\' class=\'party-input\' data-role=\'num-adults\' value=\'' + bookingState.numAdults + '\' min=\'0\'' + disabledAttr + ' />' +
                                    '<button type=\'button\' class=\'party-button\' data-action=\'increment-adults\'' + disabledAttr + '>+</button>' +
                                '</div>' +
                                '<div class=\'party-row\'>' +
                                    '<span class=\'party-label\'>Children</span>' +
                                    '<button type=\'button\' class=\'party-button\' data-action=\'decrement-children\'' + disabledAttr + '>-</button>' +
                                    '<input type=\'number\' class=\'party-input\' data-role=\'num-children\' value=\'' + bookingState.numChildren + '\' min=\'0\'' + disabledAttr + ' />' +
                                    '<button type=\'button\' class=\'party-button\' data-action=\'increment-children\'' + disabledAttr + '>+</button>' +
                                '</div>' +
                            '</div>' +
                            '<div class=\'field-hint\'>' + escapeHtml(capacityLine) + '</div>' +
                            (ageLine ? '<div class=\'field-hint\'>' + escapeHtml(ageLine) + '</div>' : '') +
                        '</div>' +
                        '<div class=\'booking-errors\' data-role=\'booking-errors\'></div>' +
                    '</fieldset>' +
                '</form>'
            );
        }

        function renderPricingCapacity(container) {
            if (!trip) {
                container.innerHTML = '';
                return;
            }
            var heading = 'Pricing & Capacity';
            var pricingLines = [];
            if (trip.priceDisplay) {
                pricingLines.push(trip.priceDisplay);
            } else if (typeof trip.basePrice === 'number') {
                var base = trip.basePrice.toFixed(2);
                if (trip.pricingModel === 'per_trip') {
                    pricingLines.push('From $' + base + ' per trip.');
                } else if (trip.pricingModel === 'per_person') {
                    pricingLines.push('From $' + base + ' per person.');
                }
            }
            if (trip.pricingModel === 'per_trip') {
                pricingLines.push('Price is for the entire boat regardless of the number of passengers (within capacity).');
            } else if (trip.pricingModel === 'per_person') {
                pricingLines.push('Price is charged per passenger.');
            }
            if (typeof trip.minimumTotalPrice === 'number') {
                pricingLines.push('Minimum total charge: $' + trip.minimumTotalPrice.toFixed(2) + '.');
            }

            var capacityLines = [];
            if (typeof trip.maxPassengers === 'number') {
                capacityLines.push('Maximum passengers: ' + trip.maxPassengers + '.');
            }
            if (typeof trip.maxAdults === 'number') {
                capacityLines.push('Maximum adults: ' + trip.maxAdults + '.');
            }
            if (typeof trip.maxChildren === 'number') {
                capacityLines.push('Maximum children: ' + trip.maxChildren + '.');
            }
            if (typeof trip.minimumAge === 'number') {
                var line = 'Minimum age: ' + trip.minimumAge + ' years';
                if (typeof trip.childAgeMax === 'number') {
                    line += ' (children are ' + trip.childAgeMax + ' and under).';
                } else {
                    line += '.';
                }
                capacityLines.push(line);
            } else if (typeof trip.childAgeMax === 'number') {
                capacityLines.push('Children are ' + trip.childAgeMax + ' and under.');
            }

            var pricingHtml = '';
            for (var i = 0; i < pricingLines.length; i++) {
                pricingHtml += '<p>' + escapeHtml(pricingLines[i]) + '</p>';
            }
            var capacityHtml = '';
            for (var j = 0; j < capacityLines.length; j++) {
                capacityHtml += '<p>' + escapeHtml(capacityLines[j]) + '</p>';
            }

            container.innerHTML = (
                '<h2 class=\'section-heading\'>' + heading + '</h2>' +
                (pricingHtml ? '<div class=\'pricing-copy\'>' + pricingHtml + '</div>' : '') +
                (capacityHtml ? '<div class=\'capacity-copy\'>' + capacityHtml + '</div>' : '')
            );
        }

        function renderIncludedNotIncluded(container) {
            if (!trip) {
                container.innerHTML = '';
                return;
            }
            var included = trip.includedItems || [];
            var notIncluded = trip.notIncludedItems || [];
            var includedHtml = '';
            if (included.length) {
                includedHtml += '<p><strong>Included:</strong></p>';
                for (var i = 0; i < included.length; i++) {
                    includedHtml += '<p class=\'detail-line\'>- ' + escapeHtml(included[i]) + '</p>';
                }
            }
            var notIncludedHtml = '';
            if (notIncluded.length) {
                notIncludedHtml += '<p><strong>Not included:</strong></p>';
                for (var j = 0; j < notIncluded.length; j++) {
                    notIncludedHtml += '<p class=\'detail-line\'>- ' + escapeHtml(notIncluded[j]) + '</p>';
                }
            } else {
                notIncludedHtml += '<p><strong>Not included:</strong> No notable exclusions have been specified.</p>';
            }
            var descriptionHtml = '';
            if (trip.fullDescription) {
                descriptionHtml = '<p class=\'full-description\'>' + escapeHtml(trip.fullDescription) + '</p>';
            }
            container.innerHTML = (
                '<h2 class=\'section-heading\'>Trip details</h2>' +
                descriptionHtml +
                includedHtml +
                notIncludedHtml
            );
        }

        function validateBookingState() {
            var errors = [];
            var earliest = initialBookingConfig && initialBookingConfig.earliestBookableDate ? initialBookingConfig.earliestBookableDate : '';
            if (!bookingState.selectedDate) {
                errors.push('Please select a fishing date.');
            } else if (!isValidDateString(bookingState.selectedDate)) {
                errors.push('Please choose a valid date.');
            } else if (earliest && isValidDateString(earliest) && compareDateStrings(bookingState.selectedDate, earliest) < 0) {
                errors.push('Please choose a date on or after ' + earliest + '.');
            }
            if (bookingState.numAdults < 0 || bookingState.numChildren < 0) {
                errors.push('Guest counts cannot be negative.');
            }
            if (!isCountsWithinCapacity(bookingState.numAdults, bookingState.numChildren)) {
                errors.push('Guest counts exceed this trip’s capacity. Please adjust the number of adults and children.');
            }
            return errors;
        }

        function updateBookingErrorsDisplay() {
            var errorsContainer = document.querySelector('[data-component=booking-panel] [data-role=booking-errors]');
            if (!errorsContainer) {
                return;
            }
            var errors = validateBookingState();
            if (!errors.length) {
                errorsContainer.innerHTML = '';
                return;
            }
            var html = '';
            for (var i = 0; i < errors.length; i++) {
                html += '<p class=\'error-line\'>' + escapeHtml(errors[i]) + '</p>';
            }
            errorsContainer.innerHTML = html;
        }

        function updatePrimaryCtaDisabledState() {
            var button = document.querySelector('[data-component=primary-booking-cta]');
            if (!button) {
                return;
            }
            if (!tripIsActive) {
                button.disabled = true;
                button.setAttribute('aria-disabled', 'true');
            } else {
                button.disabled = false;
                button.removeAttribute('aria-disabled');
            }
        }

        function handleFavoriteToggle(target) {
            if (!trip) {
                return;
            }
            var feedbackEl = document.querySelector('[data-component=favorites-toggle] [data-role=favorites-feedback]');
            if (feedbackEl) {
                feedbackEl.textContent = '';
            }
            target.disabled = true;
            var savedCountAfter = null;
            try {
                if (!isSaved) {
                    var saveResponse = WebsiteSDK.saveTripToFavorites(trip.id, favoriteNote || '');
                    if (!saveResponse || !saveResponse.success) {
                        if (feedbackEl) {
                            feedbackEl.textContent = saveResponse && saveResponse.message ? saveResponse.message : 'Could not save this trip.';
                        }
                        target.disabled = false;
                        return;
                    }
                    isSaved = true;
                    savedCountAfter = typeof saveResponse.totalSavedCount === 'number' ? saveResponse.totalSavedCount : null;
                    if (feedbackEl) {
                        feedbackEl.textContent = saveResponse.message || 'Trip saved to your favorites.';
                    }
                } else {
                    var removeResponse = WebsiteSDK.removeTripFromFavorites(trip.id);
                    if (!removeResponse || !removeResponse.success) {
                        if (feedbackEl) {
                            feedbackEl.textContent = removeResponse && removeResponse.message ? removeResponse.message : 'Could not remove this trip from favorites.';
                        }
                        target.disabled = false;
                        return;
                    }
                    isSaved = false;
                    savedCountAfter = typeof removeResponse.totalSavedCount === 'number' ? removeResponse.totalSavedCount : null;
                    if (feedbackEl) {
                        feedbackEl.textContent = removeResponse.message || 'Trip removed from your favorites.';
                    }
                }
            } catch (e) {
                console.error('Error updating favorites', e);
                if (feedbackEl) {
                    feedbackEl.textContent = 'Something went wrong. Please try again.';
                }
                target.disabled = false;
                return;
            }
            target.disabled = false;
            var favoritesContainer = document.querySelector('[data-component=favorites-toggle]');
            if (favoritesContainer) {
                renderFavoritesToggle(favoritesContainer);
            }
            if (headerContext && savedCountAfter !== null) {
                headerContext.savedTripsCount = savedCountAfter;
                updateHeaderFromContext(headerContext);
            }
        }

        function handleGallerySelection(index) {
            if (!galleryState.images || !galleryState.images.length) {
                return;
            }
            if (index < 0 || index >= galleryState.images.length) {
                return;
            }
            galleryState.currentIndex = index;
            var galleryContainer = document.querySelector('[data-component=trip-image-gallery]');
            if (galleryContainer) {
                renderTripImageGallery(galleryContainer);
            }
        }

        function changeGalleryBy(delta) {
            if (!galleryState.images || !galleryState.images.length) {
                return;
            }
            var index = galleryState.currentIndex + delta;
            if (index < 0) {
                index = galleryState.images.length - 1;
            } else if (index >= galleryState.images.length) {
                index = 0;
            }
            handleGallerySelection(index);
        }

        function handlePartyChange(type, delta) {
            var newAdults = bookingState.numAdults;
            var newChildren = bookingState.numChildren;
            if (type === 'adults') {
                newAdults += delta;
            } else if (type === 'children') {
                newChildren += delta;
            }
            if (newAdults < 0 || newChildren < 0) {
                return;
            }
            if (!isCountsWithinCapacity(newAdults, newChildren)) {
                updateBookingErrorsDisplay();
                return;
            }
            bookingState.numAdults = newAdults;
            bookingState.numChildren = newChildren;
            var adultsInput = document.querySelector('[data-component=booking-panel] [data-role=num-adults]');
            var childrenInput = document.querySelector('[data-component=booking-panel] [data-role=num-children]');
            if (adultsInput) {
                adultsInput.value = String(bookingState.numAdults);
            }
            if (childrenInput) {
                childrenInput.value = String(bookingState.numChildren);
            }
            syncBookingStateToUrl();
            updateBookingErrorsDisplay();
        }

        function handlePartyInputChange(type, value) {
            var n = parsePositiveInt(value);
            if (n === null) {
                n = 0;
            }
            var newAdults = bookingState.numAdults;
            var newChildren = bookingState.numChildren;
            if (type === 'adults') {
                newAdults = n;
            } else if (type === 'children') {
                newChildren = n;
            }
            if (!isCountsWithinCapacity(newAdults, newChildren)) {
                updateBookingErrorsDisplay();
                var adultsInput = document.querySelector('[data-component=booking-panel] [data-role=num-adults]');
                var childrenInput = document.querySelector('[data-component=booking-panel] [data-role=num-children]');
                if (adultsInput) {
                    adultsInput.value = String(bookingState.numAdults);
                }
                if (childrenInput) {
                    childrenInput.value = String(bookingState.numChildren);
                }
                return;
            }
            bookingState.numAdults = newAdults;
            bookingState.numChildren = newChildren;
            syncBookingStateToUrl();
            updateBookingErrorsDisplay();
        }

        function handleDateSelection(value) {
            bookingState.selectedDate = value || '';
            syncBookingStateToUrl();
            updateBookingErrorsDisplay();
        }

        function handleStartBooking(button) {
            if (!tripIsActive) {
                return;
            }
            var errors = validateBookingState();
            updateBookingErrorsDisplay();
            if (errors.length) {
                return;
            }
            button.disabled = true;
            var originalLabel = button.textContent;
            button.textContent = 'Starting your booking…';
            var feedbackEl = document.querySelector('[data-component=booking-panel] [data-role=booking-errors]');
            if (feedbackEl) {
                feedbackEl.innerHTML = '';
            }
            try {
                var response = WebsiteSDK.startBookingForTrip(trip.id, bookingState.selectedDate, bookingState.numAdults, bookingState.numChildren);
                if (!response || !response.success) {
                    if (feedbackEl) {
                        feedbackEl.innerHTML = '<p class=\'error-line\'>' + escapeHtml(response && response.message ? response.message : 'We could not start your booking. Please try again.') + '</p>';
                    }
                    button.disabled = false;
                    button.textContent = originalLabel;
                    return;
                }
                var bookingId = response.bookingId;
                var nextStep = response.nextStep || (initialBookingConfig && initialBookingConfig.nextStep) || 'checkout';
                var targetPage = 'checkout.html';
                if (nextStep === 'start_times') {
                    targetPage = 'start_times.html';
                } else if (nextStep === 'passenger_details') {
                    targetPage = 'passenger_details.html';
                } else if (nextStep === 'add_ons') {
                    targetPage = 'add_ons.html';
                } else if (nextStep === 'checkout') {
                    targetPage = 'checkout.html';
                }
                window.location.href = targetPage + '?bookingId=' + encodeURIComponent(bookingId);
            } catch (e) {
                console.error('Error starting booking', e);
                if (feedbackEl) {
                    feedbackEl.innerHTML = '<p class=\'error-line\'>Something went wrong while starting your booking. Please try again.</p>';
                }
                button.disabled = false;
                button.textContent = originalLabel;
            }
        }

        function handleContactCaptain() {
            if (!trip) {
                return;
            }
            var url = 'message_captain.html?tripId=' + encodeURIComponent(trip.id);
            window.location.href = url;
        }

        function handleViewSavedTrips() {
            window.location.href = 'favorites.html';
        }

        function bindGlobalActionHandlers() {
            document.addEventListener('click', function(event) {
                var target = event.target.closest('[data-action]');
                if (!target) {
                    return;
                }
                var action = target.getAttribute('data-action');
                if (!action) {
                    return;
                }
                if (action === 'toggle-favorite') {
                    event.preventDefault();
                    handleFavoriteToggle(target);
                } else if (action === 'view-saved-trips') {
                    event.preventDefault();
                    handleViewSavedTrips();
                } else if (action === 'start-booking') {
                    event.preventDefault();
                    handleStartBooking(target);
                } else if (action === 'contact-captain') {
                    event.preventDefault();
                    handleContactCaptain();
                } else if (action === 'select-image') {
                    event.preventDefault();
                    var indexAttr = target.getAttribute('data-index');
                    var index = parseInt(indexAttr, 10);
                    if (!isNaN(index)) {
                        handleGallerySelection(index);
                    }
                } else if (action === 'prev-image') {
                    event.preventDefault();
                    changeGalleryBy(-1);
                } else if (action === 'next-image') {
                    event.preventDefault();
                    changeGalleryBy(1);
                } else if (action === 'increment-adults') {
                    event.preventDefault();
                    handlePartyChange('adults', 1);
                } else if (action === 'decrement-adults') {
                    event.preventDefault();
                    handlePartyChange('adults', -1);
                } else if (action === 'increment-children') {
                    event.preventDefault();
                    handlePartyChange('children', 1);
                } else if (action === 'decrement-children') {
                    event.preventDefault();
                    handlePartyChange('children', -1);
                }
            });

            document.addEventListener('input', function(event) {
                var target = event.target;
                var action = target.getAttribute('data-action');
                if (action === 'favorite-note-change') {
                    favoriteNote = target.value || '';
                }
            });

            document.addEventListener('change', function(event) {
                var target = event.target;
                var action = target.getAttribute('data-action');
                if (action === 'select-date') {
                    handleDateSelection(target.value);
                }
                var role = target.getAttribute('data-role');
                if (role === 'num-adults') {
                    handlePartyInputChange('adults', target.value);
                } else if (role === 'num-children') {
                    handlePartyInputChange('children', target.value);
                }
            });
        }

        initHeaderContext();

        var tripInitOk = initTripDetails();
        if (!tripInitOk) {
            return;
        }

        var summaryContainer = document.querySelector('[data-populate=trip-summary-header]');
        if (summaryContainer) {
            renderTripSummaryHeader(summaryContainer);
        }
        var ratingContainer = document.querySelector('[data-populate=trip-rating-summary]');
        if (ratingContainer) {
            renderTripRatingSummary(ratingContainer);
        }
        var favoritesContainer = document.querySelector('[data-populate=favorites-toggle]');
        if (favoritesContainer) {
            renderFavoritesToggle(favoritesContainer);
        }
        var inactiveContainer = document.querySelector('[data-populate=inactive-trip-notice]');
        if (inactiveContainer) {
            renderInactiveNotice(inactiveContainer);
        }
        var galleryContainer = document.querySelector('[data-populate=trip-image-gallery]');
        if (galleryContainer) {
            renderTripImageGallery(galleryContainer);
        }
        var bookingPanelContainer = document.querySelector('[data-populate=booking-panel]');
        if (bookingPanelContainer) {
            renderBookingPanel(bookingPanelContainer);
        }
        var pricingContainer = document.querySelector('[data-populate=trip-pricing-capacity-section]');
        if (pricingContainer) {
            renderPricingCapacity(pricingContainer);
        }
        var includedContainer = document.querySelector('[data-populate=trip-included-not-included]');
        if (includedContainer) {
            renderIncludedNotIncluded(includedContainer);
        }

        updatePrimaryCtaDisabledState();
        updateBookingErrorsDisplay();
        bindGlobalActionHandlers();
    });
    </script>
</body>
</html>
