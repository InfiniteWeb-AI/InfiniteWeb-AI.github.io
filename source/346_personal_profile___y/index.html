  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Extract URL parameters (none required for this page, but kept for extensibility)
      var urlParams = new URLSearchParams(window.location.search);

      function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function renderHomeError(container) {
        container.innerHTML = (
          '<div class="home-error" role="alert">' +
            '<p class="error-message">Unable to load home information.</p>' +
            '<button type="button" class="btn btn-secondary" data-action="retry-home-page-info">' +
              '<span class="btn-label">Retry</span>' +
            '</button>' +
          '</div>'
        );

        var retryBtn = container.querySelector('[data-action="retry-home-page-info"]');
        if (retryBtn) {
          retryBtn.addEventListener('click', function(event) {
            event.preventDefault();
            loadHomePage(container);
          });
        }
      }

      function renderHomePage(container, data) {
        var headline = (data && typeof data.headline === 'string' && data.headline.trim()) ? data.headline : 'Home';
        var subheadline = (data && typeof data.subheadline === 'string' && data.subheadline.trim()) ? data.subheadline : '';
        var featureHighlights = (data && Array.isArray(data.feature_highlights)) ? data.feature_highlights : [];
        var profileSummary = (data && data.profile_summary) ? data.profile_summary : {};
        var primaryCtas = (data && data.primary_ctas) ? data.primary_ctas : {};

        var dashboardLabel = (primaryCtas.dashboard_label && primaryCtas.dashboard_label.trim())
          ? primaryCtas.dashboard_label
          : 'Go to dashboard';
        var startProfileLabel = (primaryCtas.start_profile_label && primaryCtas.start_profile_label.trim())
          ? primaryCtas.start_profile_label
          : 'Create profile';

        var featuresHtml = '';
        if (featureHighlights.length > 0) {
          var featureItems = featureHighlights.map(function(item) {
            var title = escapeHtml(item && item.title ? item.title : '');
            var description = escapeHtml(item && item.description ? item.description : '');
            return (
              '<div class="feature-item">' +
                '<h3 class="feature-title">' + title + '</h3>' +
                '<p class="feature-description">' + description + '</p>' +
              '</div>'
            );
          }).join('');

          featuresHtml = (
            '<section class="home-section feature-section" data-component="feature-highlights">' +
              '<h2 class="section-title">Highlights</h2>' +
              '<div class="feature-list">' + featureItems + '</div>' +
            '</section>'
          );
        }

        var totalProfiles = (typeof profileSummary.total_profiles === 'number')
          ? profileSummary.total_profiles
          : null;
        var publishedProfiles = (typeof profileSummary.published_profiles === 'number')
          ? profileSummary.published_profiles
          : null;
        var exampleProfiles = Array.isArray(profileSummary.example_profiles)
          ? profileSummary.example_profiles
          : [];

        var countsHtml = '';
        if (totalProfiles !== null || publishedProfiles !== null) {
          countsHtml = '<div class="profile-counts">';
          if (totalProfiles !== null) {
            countsHtml += (
              '<p class="profile-count-line">' +
                'Total profiles: <span class="count-value">' + totalProfiles + '</span>' +
              '</p>'
            );
          }
          if (publishedProfiles !== null) {
            countsHtml += (
              '<p class="profile-count-line">' +
                'Published: <span class="count-value">' + publishedProfiles + '</span>' +
              '</p>'
            );
          }
          countsHtml += '</div>';
        }

        var examplesHtml = '';
        if (exampleProfiles.length > 0) {
          var exampleItems = exampleProfiles.map(function(profile) {
            var name = escapeHtml(profile && profile.name ? profile.name : '');
            var username = escapeHtml(profile && profile.username ? profile.username : '');
            var status = escapeHtml(profile && profile.status ? profile.status : '');
            var statusClass = profile && profile.status ? 'profile-status--' + escapeHtml(profile.status) : 'profile-status--unknown';
            return (
              '<li class="profile-list-item">' +
                '<div class="profile-meta-line">' +
                  '<span class="profile-name">' + name + '</span>' +
                  '<span class="profile-username">@' + username + '</span>' +
                  '<span class="profile-status ' + statusClass + '">' + status + '</span>' +
                '</div>' +
              '</li>'
            );
          }).join('');

          examplesHtml = (
            '<div class="profile-example-list">' +
              '<ul class="profile-list">' + exampleItems + '</ul>' +
            '</div>'
          );
        }

        var summarySectionHtml = '';
        if (countsHtml || examplesHtml) {
          summarySectionHtml = (
            '<section class="home-section profile-summary-section" data-component="profile-summary">' +
              '<h2 class="section-title">Existing profiles</h2>' +
              countsHtml +
              examplesHtml +
            '</section>'
          );
        }

        var subheadlineHtml = subheadline
          ? '<p class="page-subtitle">' + escapeHtml(subheadline) + '</p>'
          : '';

        container.innerHTML = (
          '<div class="home-content-column">' +
            '<header class="home-header-block">' +
              '<div class="home-title-row">' +
                '<h1 class="page-title gradient-text">' + escapeHtml(headline) + '</h1>' +
                '<button type="button" class="btn btn-secondary home-dashboard-btn" data-action="go-dashboard">' +
                  '<span class="btn-label">' + escapeHtml(dashboardLabel) + '</span>' +
                '</button>' +
              '</div>' +
              subheadlineHtml +
            '</header>' +
            featuresHtml +
            summarySectionHtml +
            '<section class="home-section create-profile-section" data-component="create-profile">' +
              '<h2 class="section-title">Start a new profile</h2>' +
              '<p class="section-intro">Create a draft profile and jump straight into adding links.</p>' +
              '<form class="create-profile-form" data-action="create-profile-form" novalidate>' +
                '<div class="form-fields">' +
                  '<div class="form-group" data-field-group="name">' +
                    '<label for="profileNameInput" class="field-label">Profile name</label>' +
                    '<input id="profileNameInput" name="name" type="text" class="text-input" autocomplete="off" required aria-required="true" />' +
                  '</div>' +
                  '<div class="form-group" data-field-group="username">' +
                    '<label for="profileUsernameInput" class="field-label">Username / URL</label>' +
                    '<input id="profileUsernameInput" name="username" type="text" class="text-input" autocomplete="off" required aria-required="true" />' +
                  '</div>' +
                  '<div class="form-group" data-field-group="bio">' +
                    '<label for="profileBioInput" class="field-label">Bio (optional)</label>' +
                    '<textarea id="profileBioInput" name="bio" class="text-area" rows="3"></textarea>' +
                  '</div>' +
                '</div>' +
                '<div class="form-footer">' +
                  '<button type="submit" class="btn btn-primary" data-role="submit-create-profile">' +
                    '<span class="btn-label">' + escapeHtml(startProfileLabel) + '</span>' +
                  '</button>' +
                  '<p class="form-error" data-role="create-profile-error" aria-live="polite"></p>' +
                '</div>' +
              '</form>' +
            '</section>' +
          '</div>'
        );

        // Bind dashboard navigation
        var dashboardBtn = container.querySelector('[data-action="go-dashboard"]');
        if (dashboardBtn) {
          dashboardBtn.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'dashboard.html';
          });
        }

        // Bind create profile form
        var form = container.querySelector('[data-action="create-profile-form"]');
        if (form) {
          var submitBtn = form.querySelector('[data-role="submit-create-profile"]');
          var errorEl = form.querySelector('[data-role="create-profile-error"]');
          var nameGroup = form.querySelector('[data-field-group="name"]');
          var usernameGroup = form.querySelector('[data-field-group="username"]');
          var nameInput = form.querySelector('#profileNameInput');
          var usernameInput = form.querySelector('#profileUsernameInput');
          var bioInput = form.querySelector('#profileBioInput');

          function setFieldError(group, input, hasError) {
            if (!group || !input) return;
            if (hasError) {
              group.classList.add('field-error');
              input.setAttribute('aria-invalid', 'true');
            } else {
              group.classList.remove('field-error');
              input.removeAttribute('aria-invalid');
            }
          }

          form.addEventListener('submit', function(event) {
            event.preventDefault();

            if (errorEl) {
              errorEl.textContent = '';
            }

            var nameVal = nameInput ? nameInput.value.trim() : '';
            var usernameVal = usernameInput ? usernameInput.value.trim() : '';
            var bioVal = bioInput ? bioInput.value.trim() : '';

            var hasError = false;
            if (!nameVal) {
              hasError = true;
              setFieldError(nameGroup, nameInput, true);
            } else {
              setFieldError(nameGroup, nameInput, false);
            }

            if (!usernameVal) {
              hasError = true;
              setFieldError(usernameGroup, usernameInput, true);
            } else {
              setFieldError(usernameGroup, usernameInput, false);
            }

            if (hasError) {
              return;
            }

            if (submitBtn) {
              submitBtn.disabled = true;
              submitBtn.classList.add('is-loading');
            }

            try {
              var response = WebsiteSDK.createProfileDraft(nameVal, usernameVal, bioVal);

              if (response && response.success && response.profile && response.profile.id) {
                var newId = response.profile.id;
                var url = new URL('profile_editor.html', window.location.origin);
                url.searchParams.set('profileId', newId);
                url.searchParams.set('tab', 'links');
                window.location.href = url.pathname + url.search;
                return;
              }

              if (errorEl) {
                var message = (response && typeof response.message === 'string' && response.message.trim())
                  ? response.message
                  : 'Unable to create profile.';
                errorEl.textContent = message;
              }
            } catch (e) {
              if (errorEl) {
                errorEl.textContent = 'Unable to create profile.';
              }
            } finally {
              if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('is-loading');
              }
            }
          });

          var inputsToWatch = [nameInput, usernameInput];
          inputsToWatch.forEach(function(input) {
            if (!input) return;
            input.addEventListener('input', function() {
              if (input === nameInput) {
                if (input.value.trim()) {
                  setFieldError(nameGroup, nameInput, false);
                }
              }
              if (input === usernameInput) {
                if (input.value.trim()) {
                  setFieldError(usernameGroup, usernameInput, false);
                }
              }
            });
          });
        }
      }

      function loadHomePage(container) {
        if (!container) return;
        container.innerHTML = '<div class="home-loading">Loading…</div>';
        try {
          var data = WebsiteSDK.getHomePageInfo();
          renderHomePage(container, data || {});
        } catch (e) {
          renderHomeError(container);
        }
      }

      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        var type = element.getAttribute('data-populate');
        if (type === 'homePageInfo') {
          loadHomePage(element);
        }
      });
    });
  </script>
</body>
</html>
