<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Profile Link Hub</title>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='about.css'>
</head>
<body class='page'>
  <header class='site-header'>
    <div class='header-inner'>
      <a href='index.html' class='brand' aria-label='Home'>
        <span class='brand-mark'>doi.bio</span>
      </a>
      <nav class='primary-nav' aria-label='Primary navigation'>
        <ul class='nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='dashboard.html' class='nav-link'>Dashboard</a>
          </li>
          <li class='nav-item'>
            <a href='help.html' class='nav-link'>Help</a>
          </li>
          <li class='nav-item'>
            <a href='about.html' class='nav-link'>About</a>
          </li>
        </ul>
      </nav>
    </div>
    <div class='header-divider'></div>
  </header>

  <div class='page-body'>
    <main id='content' class='main-content' role='main'>
      <div class='content-column about-page' data-component='about-page-controller'>
        <div class='about-loading' data-component='about-loading' aria-live='polite'>
          Loading About information...
        </div>

        <section id='about-description' class='about-section about-description' data-component='about-description-section'>
          <h1 class='section-title'>About</h1>
          <p class='section-body' data-populate='about-description'></p>
        </section>

        <section id='about-supported-profile-types' class='about-section about-supported-profile-types' data-component='about-supported-profile-types'>
          <h2 class='section-subtitle'>Supported profile types</h2>
          <ul class='profile-type-list' data-populate='about-supported_profile_types'></ul>
        </section>

        <section id='about-credits' class='about-section about-credits' data-component='about-credits-section'>
          <h2 class='section-subtitle'>Credits</h2>
          <p class='section-body' data-populate='about-credits'></p>
        </section>

        <section id='about-contact' class='about-section about-contact' data-component='about-contact-section'>
          <h2 class='section-subtitle'>Contact</h2>
          <div class='contact-field'>
            <span class='contact-label'>Email</span>
            <a href='javascript:void(0)' class='contact-link' data-populate='about-contact-email' data-action='click-email'></a>
          </div>
          <div class='contact-field'>
            <span class='contact-label'>Website</span>
            <a href='javascript:void(0)' class='contact-link' data-populate='about-contact-website' data-action='click-website' rel='noopener'></a>
          </div>
        </section>

        <div class='about-help-nav' data-component='about-help-navigation'>
          <a href='javascript:void(0)' class='help-link' data-populate='about-help-link-label' data-action='navigate-help'></a>
        </div>
      </div>
    </main>
    <div class='layout-rail' aria-hidden='true'></div>
  </div>

  <footer class='site-footer'>
    <div class='footer-inner'>
      <div class='footer-branding'>
        <span class='footer-brand'>doi.bio</span>
        <span class='footer-meta'>Personal profile &amp; YouTube link hub</span>
      </div>
      <nav class='footer-nav' aria-label='Footer navigation'>
        <a href='about.html' class='footer-link'>About</a>
        <a href='help.html' class='footer-link'>Help &amp; Guide</a>
        <a href='dashboard.html' class='footer-link'>Dashboard</a>
      </nav>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var initialSectionRaw = urlParams.get('section');
      var currentSectionKey = normalizeSectionKey(initialSectionRaw);
      if (!currentSectionKey) {
        currentSectionKey = 'description';
      }

      var controller = document.querySelector('[data-component="about-page-controller"]');
      var loadingEl = controller ? controller.querySelector('[data-component="about-loading"]') : null;
      var aboutInfo = null;

      try {
        if (typeof WebsiteSDK !== 'undefined' && WebsiteSDK && typeof WebsiteSDK.getAboutPageInfo === 'function') {
          aboutInfo = WebsiteSDK.getAboutPageInfo();
        } else {
          throw new Error('WebsiteSDK.getAboutPageInfo is not available');
        }
      } catch (error) {
        if (loadingEl) {
          loadingEl.textContent = 'Unable to load About information right now.';
        }
        console.error(error);
        return;
      }

      if (loadingEl) {
        loadingEl.textContent = '';
        loadingEl.classList.add('is-hidden');
      }

      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        renderPopulate(element, aboutInfo);
      });

      setupActions(aboutInfo);
      scrollToSection(currentSectionKey);

      window.addEventListener('popstate', function() {
        var params = new URLSearchParams(window.location.search);
        var sectionRaw = params.get('section');
        var newSectionKey = normalizeSectionKey(sectionRaw);
        if (!newSectionKey) {
          newSectionKey = 'description';
        }
        currentSectionKey = newSectionKey;
        scrollToSection(currentSectionKey);
      });

      function normalizeSectionKey(raw) {
        if (!raw) {
          return null;
        }
        var allowed = ['description', 'supported-profile-types', 'credits', 'contact'];
        if (allowed.indexOf(raw) !== -1) {
          return raw;
        }
        return null;
      }

      function scrollToSection(sectionKey) {
        var targetId = 'about-description';
        if (sectionKey === 'supported-profile-types') {
          targetId = 'about-supported-profile-types';
        } else if (sectionKey === 'credits') {
          targetId = 'about-credits';
        } else if (sectionKey === 'contact') {
          targetId = 'about-contact';
        }

        var section = document.getElementById(targetId);
        if (!section) {
          return;
        }

        try {
          section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (e) {
          section.scrollIntoView();
        }

        section.setAttribute('tabindex', '-1');
        try {
          section.focus({ preventScroll: true });
        } catch (e) {
          section.focus();
        }
      }

      function renderPopulate(container, info) {
        var dataType = container.dataset.populate;
        if (!dataType) {
          return;
        }

        if (dataType === 'about-description') {
          container.textContent = info && typeof info.description === 'string' ? info.description : '';
        } else if (dataType === 'about-supported_profile_types') {
          container.innerHTML = '';
          if (info && Array.isArray(info.supported_profile_types) && info.supported_profile_types.length > 0) {
            info.supported_profile_types.forEach(function(typeValue) {
              var li = document.createElement('li');
              li.className = 'profile-type-item';
              li.textContent = typeValue;
              container.appendChild(li);
            });
          } else {
            var liEmpty = document.createElement('li');
            liEmpty.className = 'profile-type-item profile-type-item--empty';
            liEmpty.textContent = 'No specific profile types are listed.';
            container.appendChild(liEmpty);
          }
        } else if (dataType === 'about-credits') {
          container.textContent = info && typeof info.credits === 'string' ? info.credits : '';
        } else if (dataType === 'about-contact-email') {
          var email = info && info.contact_info && typeof info.contact_info.email === 'string' ? info.contact_info.email : '';
          if (email) {
            container.textContent = email;
          } else {
            container.textContent = '';
          }
        } else if (dataType === 'about-contact-website') {
          var website = info && info.contact_info && typeof info.contact_info.website === 'string' ? info.contact_info.website : '';
          if (website) {
            container.textContent = website;
          } else {
            container.textContent = '';
          }
        } else if (dataType === 'about-help-link-label') {
          var label = info && typeof info.help_link_label === 'string' ? info.help_link_label : '';
          container.textContent = label && label.trim() ? label : 'View Help & Guide';
        }
      }

      function setupActions(info) {
        var actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(element) {
          var action = element.dataset.action;
          if (!action) {
            return;
          }

          if (action === 'click-email') {
            element.addEventListener('click', function(event) {
              event.preventDefault();
              if (info && info.contact_info && typeof info.contact_info.email === 'string' && info.contact_info.email) {
                var mailtoUrl = 'mailto:' + encodeURIComponent(info.contact_info.email);
                window.location.href = mailtoUrl;
              }
            });
          } else if (action === 'click-website') {
            element.addEventListener('click', function(event) {
              event.preventDefault();
              if (info && info.contact_info && typeof info.contact_info.website === 'string' && info.contact_info.website) {
                window.location.href = info.contact_info.website;
              }
            });
          } else if (action === 'navigate-help') {
            element.addEventListener('click', function(event) {
              event.preventDefault();
              var sectionParam = currentSectionKey || 'description';
              var helpUrl = 'help.html?ref=about&section=' + encodeURIComponent(sectionParam);
              window.location.href = helpUrl;
            });
          }
        });
      }
    });
  </script>
</body>
</html>
