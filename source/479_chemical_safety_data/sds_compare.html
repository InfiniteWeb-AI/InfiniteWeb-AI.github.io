<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SDS Revision Comparison - Chemical Safety Data Sheet Management Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="sds_compare.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="app-sidebar" aria-label="Primary navigation">
      <div class="sidebar-header">
        <div class="sidebar-logo-mark" aria-hidden="true"></div>
        <div class="sidebar-logo-text">
          <span class="sidebar-logo-title">ChemSafe</span>
          <span class="sidebar-logo-subtitle">SDS &amp; Chemical Management</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <ul>
          <li>
            <a href="index.html" class="nav-link">
              <span class="nav-link-label">Dashboard</span>
            </a>
          </li>
          <li>
            <a href="sds_library.html" class="nav-link">
              <span class="nav-link-label">SDS Library</span>
            </a>
          </li>
          <li>
            <a href="inventory.html" class="nav-link">
              <span class="nav-link-label">Inventory</span>
            </a>
          </li>
          <li>
            <a href="collections.html" class="nav-link">
              <span class="nav-link-label">Collections</span>
            </a>
          </li>
          <li>
            <a href="admin_products.html" class="nav-link">
              <span class="nav-link-label">Products Admin</span>
            </a>
          </li>
          <li>
            <a href="help.html" class="nav-link">
              <span class="nav-link-label">Help</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-divider" aria-hidden="true"></div>

      <div class="sidebar-footer-text">
        INFO CENTER
      </div>
    </aside>

    <div class="app-main">
      <header class="app-header">
        <div class="header-breadcrumb">
          <span class="breadcrumb-icon" aria-hidden="true"></span>
          <span class="breadcrumb-text">Chemical Safety Data Sheet Management Portal</span>
        </div>
      </header>

      <main id="content" class="app-content" role="main">
        <section class="comparison-page" data-component="sds-revision-comparison">
          <!-- Page-specific header (breadcrumb + tabs inside comparison context) -->
          <header class="comparison-page-header" data-component="comparison-page-header" data-populate="comparison-page-header">
            <!-- Populated via JS -->
          </header>

          <!-- Comparison metadata bar -->
          <section class="comparison-metadata-bar" data-component="comparison-metadata-bar" data-populate="comparison-metadata-bar" aria-label="SDS comparison metadata">
            <!-- Populated via JS -->
          </section>

          <!-- Error banner for high-level issues (e.g., missing comparisonId) -->
          <div class="comparison-error-banner" data-populate="comparison-error" role="alert" hidden></div>

          <!-- Main three-column comparison workspace -->
          <section class="comparison-workspace">
            <!-- Left: section navigation sidebar -->
            <aside class="section-navigation-sidebar" data-component="section-navigation-sidebar">
              <div class="section-nav-header">
                <h2 class="section-nav-title">Sections</h2>
              </div>
              <nav class="section-nav" aria-label="SDS sections">
                <ul class="section-nav-list" data-populate="sections-nav">
                  <!-- Populated via JS -->
                </ul>
              </nav>
            </aside>

            <!-- Center: side-by-side section comparison card -->
            <section class="comparison-main-column">
              <section class="card comparison-card" data-component="side-by-side-section-comparison" data-populate="comparison-card" aria-label="Side-by-side SDS revision comparison">
                <!-- Populated via JS -->
              </section>
            </section>

            <!-- Right: notes column -->
            <aside class="notes-column" data-component="notes-column">
              <section class="card notes-list-panel" data-component="notes-list-panel" data-populate="notes-list" aria-label="Comparison notes">
                <!-- Populated via JS -->
              </section>

              <section class="card section-note-entry" data-component="section-note-entry" data-populate="note-entry" aria-label="Add or edit comparison note">
                <!-- Populated via JS -->
              </section>
            </aside>
          </section>

          <!-- Loading overlay for comparison-state-loader -->
          <div class="comparison-loader-overlay" data-component="comparison-state-loader" aria-hidden="true">
            <div class="comparison-loader-content" role="status" aria-live="polite">
              <div class="spinner" aria-hidden="true"></div>
              <div class="comparison-loader-text">Loading SDS comparisonhellip;</div>
            </div>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <div class="footer-left">
          <span class="footer-app-name">ChemSafe Portal</span>
          <span class="footer-meta">Internal use only</span>
        </div>
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="about.html">About</a>
          <span class="footer-separator" aria-hidden="true">|</span>
          <a href="help.html">Help &amp; Guides</a>
        </nav>
      </footer>
    </div>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var comparisonId = urlParams.get('comparisonId');
      var sdsId = urlParams.get('sdsId');

      var comparisonView = null;
      var unifiedSections = [];
      var syncScrollEnabled = true;
      var currentSectionRef = null;
      var isSyncingScroll = false;
      var noteFormState = {
        mode: 'create',
        noteId: null,
        sectionReference: '',
        noteText: ''
      };

      var loaderOverlay = document.querySelector('[data-component="comparison-state-loader"]');
      var errorBanner = document.querySelector('[data-populate="comparison-error"]');

      function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function showLoader(show) {
        if (!loaderOverlay) return;
        if (show) {
          loaderOverlay.classList.add('is-visible');
          loaderOverlay.setAttribute('aria-hidden', 'false');
        } else {
          loaderOverlay.classList.remove('is-visible');
          loaderOverlay.setAttribute('aria-hidden', 'true');
        }
      }

      function showError(message) {
        if (!errorBanner) return;
        errorBanner.textContent = message;
        errorBanner.hidden = false;
      }

      function clearError() {
        if (!errorBanner) return;
        errorBanner.textContent = '';
        errorBanner.hidden = true;
      }

      function initUrlState() {
        var params = new URLSearchParams(window.location.search);
        currentSectionRef = params.get('section');
        var syncParam = params.get('syncScroll');
        if (syncParam === null) {
          syncScrollEnabled = true;
        } else if (syncParam === '0' || syncParam === 'false') {
          syncScrollEnabled = false;
        } else {
          syncScrollEnabled = true;
        }
      }

      function updateUrlParams(updates, options) {
        var opts = options || {};
        var url = new URL(window.location.href);
        var search = url.searchParams;
        for (var key in updates) {
          if (Object.prototype.hasOwnProperty.call(updates, key)) {
            var value = updates[key];
            if (value === null || value === undefined || value === '') {
              search.delete(key);
            } else {
              search.set(key, value);
            }
          }
        }
        url.search = search.toString();
        if (opts.replace) {
          window.history.replaceState({}, '', url.toString());
        } else {
          window.history.pushState({}, '', url.toString());
        }
      }

      function buildUnifiedSectionsFromView() {
        unifiedSections = [];
        if (!comparisonView) return;

        var map = {};

        var revA = comparisonView.revisionA && Array.isArray(comparisonView.revisionA.sections)
          ? comparisonView.revisionA.sections
          : [];
        var revB = comparisonView.revisionB && Array.isArray(comparisonView.revisionB.sections)
          ? comparisonView.revisionB.sections
          : [];

        revA.forEach(function(sec) {
          if (!sec || !sec.sectionReference) return;
          if (!map[sec.sectionReference]) {
            map[sec.sectionReference] = {
              sectionReference: sec.sectionReference,
              titleA: sec.title || '',
              titleB: '',
              contentHtmlA: sec.contentHtml || '',
              contentHtmlB: ''
            };
            unifiedSections.push(map[sec.sectionReference]);
          } else {
            map[sec.sectionReference].titleA = sec.title || map[sec.sectionReference].titleA;
            map[sec.sectionReference].contentHtmlA = sec.contentHtml || map[sec.sectionReference].contentHtmlA;
          }
        });

        revB.forEach(function(sec) {
          if (!sec || !sec.sectionReference) return;
          if (!map[sec.sectionReference]) {
            map[sec.sectionReference] = {
              sectionReference: sec.sectionReference,
              titleA: '',
              titleB: sec.title || '',
              contentHtmlA: '',
              contentHtmlB: sec.contentHtml || ''
            };
            unifiedSections.push(map[sec.sectionReference]);
          } else {
            map[sec.sectionReference].titleB = sec.title || map[sec.sectionReference].titleB;
            map[sec.sectionReference].contentHtmlB = sec.contentHtml || map[sec.sectionReference].contentHtmlB;
          }
        });

        unifiedSections.forEach(function(sec) {
          var hasA = !!sec.contentHtmlA;
          var hasB = !!sec.contentHtmlB;
          if (hasA && hasB) {
            if (sec.contentHtmlA === sec.contentHtmlB) {
              sec.diffStatus = 'same';
            } else {
              sec.diffStatus = 'modified';
            }
          } else if (hasA && !hasB) {
            sec.diffStatus = 'removed';
          } else if (!hasA && hasB) {
            sec.diffStatus = 'added';
          } else {
            sec.diffStatus = 'same';
          }
        });
      }

      function buildNoteCounts() {
        var counts = {
          overall: 0,
          bySection: {}
        };
        if (!comparisonView || !Array.isArray(comparisonView.notes)) {
          return counts;
        }
        comparisonView.notes.forEach(function(note) {
          if (note.sectionReference) {
            if (!counts.bySection[note.sectionReference]) {
              counts.bySection[note.sectionReference] = 0;
            }
            counts.bySection[note.sectionReference] += 1;
          } else {
            counts.overall += 1;
          }
        });
        return counts;
      }

      function findSectionTitle(sectionReference) {
        if (!sectionReference) return '';
        for (var i = 0; i < unifiedSections.length; i++) {
          var sec = unifiedSections[i];
          if (sec.sectionReference === sectionReference) {
            return sec.titleB || sec.titleA || sectionReference;
          }
        }
        return sectionReference;
      }

      function renderPageHeader(container) {
        container.innerHTML = '';
        var wrapper = document.createElement('div');
        wrapper.className = 'comparison-page-header-inner';

        var topRow = document.createElement('div');
        topRow.className = 'comparison-header-top-row';

        var breadcrumbNav = document.createElement('nav');
        breadcrumbNav.setAttribute('aria-label', 'SDS comparison breadcrumb');
        breadcrumbNav.className = 'comparison-breadcrumb-nav';

        var ol = document.createElement('ol');
        ol.className = 'breadcrumb-list';

        var liRoot = document.createElement('li');
        liRoot.className = 'breadcrumb-item';
        liRoot.textContent = 'SDS Library';
        ol.appendChild(liRoot);

        var liCurrent = document.createElement('li');
        liCurrent.className = 'breadcrumb-item breadcrumb-item-current';
        liCurrent.textContent = 'SDS Revision Comparison';
        ol.appendChild(liCurrent);

        breadcrumbNav.appendChild(ol);
        topRow.appendChild(breadcrumbNav);

        var backBtn = document.createElement('button');
        backBtn.type = 'button';
        backBtn.className = 'btn btn-link back-to-sds-button';
        backBtn.textContent = 'Back to SDS';
        backBtn.dataset.action = 'back-to-sds';
        if (!sdsId) {
          backBtn.disabled = true;
        }
        topRow.appendChild(backBtn);

        var bottomRow = document.createElement('div');
        bottomRow.className = 'comparison-header-bottom-row';

        var tabsNav = document.createElement('nav');
        tabsNav.className = 'tabs';
        tabsNav.setAttribute('aria-label', 'SDS detail tabs');

        var tabsList = document.createElement('ul');
        tabsList.className = 'tabs-list';

        var tabOverview = document.createElement('li');
        tabOverview.className = 'tab';
        var tabOverviewBtn = document.createElement('button');
        tabOverviewBtn.type = 'button';
        tabOverviewBtn.className = 'tab-button';
        tabOverviewBtn.textContent = 'Overview';
        tabOverviewBtn.disabled = true;
        tabOverview.appendChild(tabOverviewBtn);
        tabsList.appendChild(tabOverview);

        var tabHistory = document.createElement('li');
        tabHistory.className = 'tab';
        var tabHistoryBtn = document.createElement('button');
        tabHistoryBtn.type = 'button';
        tabHistoryBtn.className = 'tab-button';
        tabHistoryBtn.textContent = 'Revision History';
        tabHistoryBtn.disabled = true;
        tabHistory.appendChild(tabHistoryBtn);
        tabsList.appendChild(tabHistory);

        var tabCompare = document.createElement('li');
        tabCompare.className = 'tab tab-active';
        var tabCompareBtn = document.createElement('button');
        tabCompareBtn.type = 'button';
        tabCompareBtn.className = 'tab-button';
        tabCompareBtn.textContent = 'Revision Comparison';
        tabCompareBtn.setAttribute('aria-current', 'page');
        tabCompare.appendChild(tabCompareBtn);
        tabsList.appendChild(tabCompare);

        tabsNav.appendChild(tabsList);
        bottomRow.appendChild(tabsNav);

        wrapper.appendChild(topRow);
        wrapper.appendChild(bottomRow);
        container.appendChild(wrapper);
      }

      function renderMetadataBar(container) {
        container.innerHTML = '';
        if (!comparisonView) {
          var placeholder = document.createElement('div');
          placeholder.className = 'comparison-meta-placeholder';
          placeholder.textContent = 'Comparison details will appear here once loaded.';
          container.appendChild(placeholder);
          return;
        }

        var inner = document.createElement('div');
        inner.className = 'comparison-metadata-inner';

        var left = document.createElement('div');
        left.className = 'comparison-metadata-left';

        var titleEl = document.createElement('div');
        titleEl.className = 'comparison-meta-title';
        titleEl.textContent = comparisonView.sdsTitle ? comparisonView.sdsTitle : 'SDS comparison';
        left.appendChild(titleEl);

        var revisionsEl = document.createElement('div');
        revisionsEl.className = 'comparison-meta-revisions';

        var revA = comparisonView.revisionA || {};
        var revB = comparisonView.revisionB || {};

        var revAText = 'Revision ' + (revA.revisionNumber || '?') + ' (' + (revA.revisionDate || 'n/a') + ')';
        var revBText = 'Revision ' + (revB.revisionNumber || '?') + ' (' + (revB.revisionDate || 'n/a') + ')';

        var revASpan = document.createElement('span');
        revASpan.className = 'comparison-meta-chip comparison-meta-chip-left';
        revASpan.textContent = revAText;

        var vsSpan = document.createElement('span');
        vsSpan.className = 'comparison-meta-vs';
        vsSpan.textContent = 'vs';

        var revBSpan = document.createElement('span');
        revBSpan.className = 'comparison-meta-chip comparison-meta-chip-right';
        revBSpan.textContent = revBText;

        revisionsEl.appendChild(revASpan);
        revisionsEl.appendChild(vsSpan);
        revisionsEl.appendChild(revBSpan);
        left.appendChild(revisionsEl);

        var right = document.createElement('div');
        right.className = 'comparison-metadata-right';

        var primaryBtn = document.createElement('button');
        primaryBtn.type = 'button';
        primaryBtn.className = 'btn btn-secondary';
        primaryBtn.textContent = 'Download comparison';
        primaryBtn.dataset.action = 'download-comparison';
        right.appendChild(primaryBtn);

        inner.appendChild(left);
        inner.appendChild(right);
        container.appendChild(inner);
      }

      function renderSectionsNav(container) {
        container.innerHTML = '';
        if (!comparisonView || unifiedSections.length === 0) {
          var liEmpty = document.createElement('li');
          liEmpty.className = 'section-nav-empty';
          liEmpty.textContent = 'No sections available.';
          container.appendChild(liEmpty);
          return;
        }

        var noteCounts = buildNoteCounts();

        unifiedSections.forEach(function(sec) {
          var li = document.createElement('li');
          li.className = 'section-nav-item';

          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'section-nav-button';
          btn.dataset.action = 'navigate-section';
          btn.dataset.sectionRef = sec.sectionReference;
          btn.textContent = sec.titleB || sec.titleA || sec.sectionReference;
          li.appendChild(btn);

          var meta = document.createElement('div');
          meta.className = 'section-nav-meta';

          var count = noteCounts.bySection[sec.sectionReference] || 0;
          if (count > 0) {
            var countSpan = document.createElement('span');
            countSpan.className = 'section-nav-note-count';
            countSpan.textContent = count + ' note' + (count > 1 ? 's' : '');
            meta.appendChild(countSpan);
          }

          var addBtn = document.createElement('button');
          addBtn.type = 'button';
          addBtn.className = 'section-nav-add-note';
          addBtn.dataset.action = 'open-note-for-section';
          addBtn.dataset.sectionRef = sec.sectionReference;
          addBtn.textContent = '+ Note';
          meta.appendChild(addBtn);

          li.appendChild(meta);
          container.appendChild(li);
        });

        updateSectionNavActive(currentSectionRef);
      }

      function buildSectionHtml(side, sec) {
        var hasContent = side === 'A' ? !!sec.contentHtmlA : !!sec.contentHtmlB;
        var title = side === 'A'
          ? (sec.titleA || sec.titleB || sec.sectionReference)
          : (sec.titleB || sec.titleA || sec.sectionReference);
        var contentHtml = side === 'A' ? (sec.contentHtmlA || '') : (sec.contentHtmlB || '');

        var diffClass = '';
        var diffBadge = '';
        if (sec.diffStatus === 'modified' && hasContent) {
          diffClass = ' diff-modified';
          diffBadge = '<span class="diff-badge diff-badge-modified">Modified</span>';
        } else if (sec.diffStatus === 'added' && side === 'B' && hasContent) {
          diffClass = ' diff-added';
          diffBadge = '<span class="diff-badge diff-badge-added">Added</span>';
        } else if (sec.diffStatus === 'removed' && side === 'A' && hasContent) {
          diffClass = ' diff-removed';
          diffBadge = '<span class="diff-badge diff-badge-removed">Removed</span>';
        }

        var missingText = '<div class="section-missing">Not present in this revision.</div>';

        return '\n        <section class="comparison-section' + diffClass + '" data-section-ref="' + escapeHtml(sec.sectionReference) + '">\n          <header class="comparison-section-header">\n            <h3 class="comparison-section-title">' + escapeHtml(title) + '</h3>\n            ' + diffBadge + '\n          </header>\n          <div class="comparison-section-body">' + (hasContent ? contentHtml : missingText) + '</div>\n        </section>\n      ';
      }

      function renderComparisonCard(container) {
        container.innerHTML = '';
        if (!comparisonView || unifiedSections.length === 0) {
          var emptyState = document.createElement('div');
          emptyState.className = 'comparison-card-empty';
          emptyState.textContent = 'No comparison data available for this SDS.';
          container.appendChild(emptyState);
          return;
        }

        var headerHtml = (function() {
          var revA = comparisonView.revisionA || {};
          var revB = comparisonView.revisionB || {};
          var syncChecked = syncScrollEnabled ? 'checked' : '';
          return '\n          <header class="card-header comparison-card-header">\n            <div class="card-header-left">\n              <h2 class="card-title">Section comparison</h2>\n            </div>\n            <div class="card-header-right">\n              <div class="sync-scroll-toggle">\n                <label class="toggle-label">\n                  <input type="checkbox" class="sync-scroll-checkbox" data-action="toggle-sync-scroll" ' + syncChecked + ' />\n                  <span>Sync scroll</span>\n                </label>\n              </div>\n              <div class="comparison-revision-labels">\n                <span class="revision-pill revision-pill-left">Revision ' + escapeHtml(revA.revisionNumber || '?') + ' \u2013 ' + escapeHtml(revA.revisionDate || 'n/a') + '</span>\n                <span class="revision-pill revision-pill-right">Revision ' + escapeHtml(revB.revisionNumber || '?') + ' \u2013 ' + escapeHtml(revB.revisionDate || 'n/a') + '</span>\n              </div>\n            </div>\n          </header>\n        ';
        })();

        var leftSectionsHtml = '';
        var rightSectionsHtml = '';
        unifiedSections.forEach(function(sec) {
          leftSectionsHtml += buildSectionHtml('A', sec);
          rightSectionsHtml += buildSectionHtml('B', sec);
        });

        var panesHtml = '\n          <div class="comparison-panes">\n            <div class="comparison-pane comparison-pane-left" aria-label="Previous revision">' + leftSectionsHtml + '\n            </div>\n            <div class="comparison-pane comparison-pane-right" aria-label="Newer revision">' + rightSectionsHtml + '\n            </div>\n          </div>\n        ';

        container.innerHTML = headerHtml + panesHtml;

        var leftPane = container.querySelector('.comparison-pane-left');
        var rightPane = container.querySelector('.comparison-pane-right');
        if (leftPane && rightPane) {
          leftPane.addEventListener('scroll', handlePaneScroll);
          rightPane.addEventListener('scroll', handlePaneScroll);
        }

        applySyncScrollToggleUI();

        if (currentSectionRef) {
          scrollToSection(currentSectionRef, false);
        }
      }

      function renderNotesList(container) {
        container.innerHTML = '';

        var header = document.createElement('div');
        header.className = 'notes-panel-header';

        var h2 = document.createElement('h2');
        h2.className = 'notes-panel-title';
        h2.textContent = 'Notes';
        header.appendChild(h2);

        var context = document.createElement('div');
        context.className = 'notes-panel-context';
        if (currentSectionRef) {
          context.textContent = 'Context: ' + findSectionTitle(currentSectionRef);
        } else {
          context.textContent = 'Context: Overall comparison';
        }
        header.appendChild(context);

        var addOverallBtn = document.createElement('button');
        addOverallBtn.type = 'button';
        addOverallBtn.className = 'btn btn-ghost notes-add-overall-btn';
        addOverallBtn.dataset.action = 'add-overall-note';
        addOverallBtn.textContent = 'Add overall note';
        header.appendChild(addOverallBtn);

        container.appendChild(header);

        var notesListWrapper = document.createElement('div');
        notesListWrapper.className = 'notes-list-wrapper';

        var notes = (comparisonView && Array.isArray(comparisonView.notes)) ? comparisonView.notes.slice() : [];
        notes.sort(function(a, b) {
          var da = a.createdAt ? new Date(a.createdAt).getTime() : 0;
          var db = b.createdAt ? new Date(b.createdAt).getTime() : 0;
          return da - db;
        });

        if (notes.length === 0) {
          var empty = document.createElement('div');
          empty.className = 'notes-empty';
          empty.textContent = 'No notes have been added for this comparison yet.';
          notesListWrapper.appendChild(empty);
        } else {
          notes.forEach(function(note) {
            var card = document.createElement('article');
            card.className = 'note-card';
            if (currentSectionRef && note.sectionReference === currentSectionRef) {
              card.classList.add('note-card-active');
            }

            var headerRow = document.createElement('div');
            headerRow.className = 'note-card-header';

            var scope = document.createElement('div');
            scope.className = 'note-card-scope';
            if (note.sectionReference) {
              var scopeLabel = document.createElement('span');
              scopeLabel.className = 'note-card-tag note-card-tag-section';
              scopeLabel.textContent = 'Section';
              scope.appendChild(scopeLabel);

              var scopeText = document.createElement('button');
              scopeText.type = 'button';
              scopeText.className = 'note-card-section-link';
              scopeText.dataset.action = 'focus-section-from-note';
              scopeText.dataset.sectionRef = note.sectionReference;
              scopeText.textContent = findSectionTitle(note.sectionReference);
              scope.appendChild(scopeText);
            } else {
              var overallTag = document.createElement('span');
              overallTag.className = 'note-card-tag note-card-tag-overall';
              overallTag.textContent = 'Overall';
              scope.appendChild(overallTag);
            }
            headerRow.appendChild(scope);

            var meta = document.createElement('div');
            meta.className = 'note-card-meta';
            if (note.createdAt) {
              var dateSpan = document.createElement('span');
              dateSpan.className = 'note-card-date';
              dateSpan.textContent = note.createdAt;
              meta.appendChild(dateSpan);
            }
            headerRow.appendChild(meta);

            card.appendChild(headerRow);

            var body = document.createElement('div');
            body.className = 'note-card-body';
            var textP = document.createElement('p');
            textP.className = 'note-card-text';
            textP.textContent = note.noteText || '';
            body.appendChild(textP);
            card.appendChild(body);

            var actions = document.createElement('div');
            actions.className = 'note-card-actions';

            var editBtn = document.createElement('button');
            editBtn.type = 'button';
            editBtn.className = 'btn btn-ghost note-edit-btn';
            editBtn.dataset.action = 'edit-note';
            editBtn.dataset.noteId = note.noteId;
            editBtn.textContent = 'Edit';
            actions.appendChild(editBtn);

            var deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'btn btn-ghost note-delete-btn';
            deleteBtn.dataset.action = 'delete-note';
            deleteBtn.dataset.noteId = note.noteId;
            deleteBtn.textContent = 'Delete';
            actions.appendChild(deleteBtn);

            card.appendChild(actions);
            notesListWrapper.appendChild(card);
          });
        }

        container.appendChild(notesListWrapper);
      }

      function renderNoteEntry(container) {
        container.innerHTML = '';

        var form = document.createElement('form');
        form.setAttribute('data-role', 'note-form');
        form.noValidate = true;

        var header = document.createElement('div');
        header.className = 'note-entry-header';
        var h3 = document.createElement('h3');
        h3.id = 'noteFormContextLabel';
        h3.textContent = noteFormState.mode === 'edit' ? 'Edit note' : 'Add note';
        header.appendChild(h3);
        form.appendChild(header);

        var group1 = document.createElement('div');
        group1.className = 'form-group';
        var label1 = document.createElement('label');
        label1.setAttribute('for', 'noteSectionSelect');
        label1.textContent = 'Applies to';
        group1.appendChild(label1);

        var select = document.createElement('select');
        select.id = 'noteSectionSelect';
        select.name = 'sectionReference';

        var optOverall = document.createElement('option');
        optOverall.value = '';
        optOverall.textContent = 'Overall comparison';
        select.appendChild(optOverall);

        unifiedSections.forEach(function(sec) {
          var opt = document.createElement('option');
          opt.value = sec.sectionReference;
          opt.textContent = sec.titleB || sec.titleA || sec.sectionReference;
          select.appendChild(opt);
        });

        if (noteFormState.sectionReference) {
          select.value = noteFormState.sectionReference;
        } else if (currentSectionRef) {
          select.value = currentSectionRef;
        }

        group1.appendChild(select);
        form.appendChild(group1);

        var group2 = document.createElement('div');
        group2.className = 'form-group';
        var label2 = document.createElement('label');
        label2.setAttribute('for', 'noteTextInput');
        label2.textContent = 'Note';
        group2.appendChild(label2);

        var textarea = document.createElement('textarea');
        textarea.id = 'noteTextInput';
        textarea.name = 'noteText';
        textarea.rows = 3;
        textarea.required = true;
        textarea.value = noteFormState.noteText || '';
        group2.appendChild(textarea);

        var errorDiv = document.createElement('div');
        errorDiv.className = 'form-error-message';
        errorDiv.setAttribute('data-populate', 'note-error');
        errorDiv.hidden = true;
        group2.appendChild(errorDiv);

        form.appendChild(group2);

        var actions = document.createElement('div');
        actions.className = 'form-actions note-entry-actions';

        var saveBtn = document.createElement('button');
        saveBtn.type = 'submit';
        saveBtn.className = 'btn btn-primary';
        saveBtn.dataset.action = 'submit-note';
        saveBtn.textContent = 'Save note';
        actions.appendChild(saveBtn);

        var cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.className = 'btn btn-tertiary';
        cancelBtn.dataset.action = 'cancel-note';
        cancelBtn.textContent = 'Cancel';
        actions.appendChild(cancelBtn);

        form.appendChild(actions);

        var modeInput = document.createElement('input');
        modeInput.type = 'hidden';
        modeInput.id = 'noteMode';
        modeInput.value = noteFormState.mode;
        form.appendChild(modeInput);

        var noteIdInput = document.createElement('input');
        noteIdInput.type = 'hidden';
        noteIdInput.id = 'noteIdInput';
        noteIdInput.value = noteFormState.noteId || '';
        form.appendChild(noteIdInput);

        container.appendChild(form);
      }

      function updateSectionNavActive(sectionRef) {
        var buttons = document.querySelectorAll('.section-nav-button');
        buttons.forEach(function(btn) {
          if (sectionRef && btn.dataset.sectionRef === sectionRef) {
            btn.classList.add('section-nav-button-active');
          } else {
            btn.classList.remove('section-nav-button-active');
          }
        });
      }

      function scrollToSection(sectionRef, smooth) {
        if (!sectionRef) return;
        var comparisonCard = document.querySelector('[data-populate="comparison-card"]');
        if (!comparisonCard) return;
        var leftPane = comparisonCard.querySelector('.comparison-pane-left');
        var rightPane = comparisonCard.querySelector('.comparison-pane-right');
        if (!leftPane || !rightPane) return;

        var behavior = smooth ? 'smooth' : 'auto';

        var leftSection = leftPane.querySelector('[data-section-ref="' + CSS.escape(sectionRef) + '"]');
        var rightSection = rightPane.querySelector('[data-section-ref="' + CSS.escape(sectionRef) + '"]');

        if (leftSection) {
          var topLeft = leftSection.offsetTop;
          leftPane.scrollTo({ top: topLeft, behavior: behavior });
        }
        if (rightSection) {
          var topRight = rightSection.offsetTop;
          rightPane.scrollTo({ top: topRight, behavior: behavior });
        }
      }

      function applySyncScrollToggleUI() {
        var checkbox = document.querySelector('.sync-scroll-checkbox');
        if (checkbox) {
          checkbox.checked = !!syncScrollEnabled;
        }
      }

      function findMostVisibleSection(pane) {
        var sections = pane.querySelectorAll('.comparison-section');
        if (!sections.length) return null;
        var scrollTop = pane.scrollTop;
        var viewportHeight = pane.clientHeight;
        var bestSection = null;
        var bestDistance = Infinity;
        sections.forEach(function(section) {
          var offset = section.offsetTop;
          var distance = Math.abs(offset - scrollTop);
          if (offset >= scrollTop - viewportHeight * 0.25 && offset <= scrollTop + viewportHeight * 0.75) {
            if (distance < bestDistance) {
              bestDistance = distance;
              bestSection = section;
            }
          }
        });
        if (!bestSection) {
          bestSection = sections[0];
        }
        return bestSection;
      }

      function handlePaneScroll(event) {
        var pane = event.target;
        var comparisonCard = pane.closest('[data-populate="comparison-card"]');
        if (!comparisonCard) return;
        var leftPane = comparisonCard.querySelector('.comparison-pane-left');
        var rightPane = comparisonCard.querySelector('.comparison-pane-right');
        if (!leftPane || !rightPane) return;

        if (syncScrollEnabled && !isSyncingScroll) {
          var other = pane === leftPane ? rightPane : leftPane;
          var maxScrollSource = pane.scrollHeight - pane.clientHeight;
          var ratio = maxScrollSource > 0 ? pane.scrollTop / maxScrollSource : 0;
          var maxScrollOther = other.scrollHeight - other.clientHeight;
          isSyncingScroll = true;
          other.scrollTop = ratio * maxScrollOther;
          isSyncingScroll = false;
        }

        var visibleSection = findMostVisibleSection(pane);
        if (visibleSection) {
          var sectionRef = visibleSection.getAttribute('data-section-ref');
          if (sectionRef && sectionRef !== currentSectionRef) {
            currentSectionRef = sectionRef;
            updateUrlParams({ section: sectionRef }, { replace: true });
            updateSectionNavActive(sectionRef);
            var notesContainer = document.querySelector('[data-populate="notes-list"]');
            if (notesContainer) {
              renderNotesList(notesContainer);
            }
          }
        }
      }

      function handleUrlChange() {
        initUrlState();
        applySyncScrollToggleUI();
        updateSectionNavActive(currentSectionRef);
        if (currentSectionRef) {
          scrollToSection(currentSectionRef, false);
        }
        var notesContainer = document.querySelector('[data-populate="notes-list"]');
        if (notesContainer) {
          renderNotesList(notesContainer);
        }
      }

      function openNoteFormForSection(sectionRef) {
        noteFormState.mode = 'create';
        noteFormState.noteId = null;
        noteFormState.sectionReference = sectionRef || '';
        noteFormState.noteText = '';
        var entryContainer = document.querySelector('[data-populate="note-entry"]');
        if (entryContainer) {
          renderNoteEntry(entryContainer);
          entryContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        var textarea = document.getElementById('noteTextInput');
        if (textarea) {
          textarea.focus();
        }
      }

      function openNoteFormForEdit(note) {
        noteFormState.mode = 'edit';
        noteFormState.noteId = note.noteId;
        noteFormState.sectionReference = note.sectionReference || '';
        noteFormState.noteText = note.noteText || '';
        var entryContainer = document.querySelector('[data-populate="note-entry"]');
        if (entryContainer) {
          renderNoteEntry(entryContainer);
          entryContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        var textarea = document.getElementById('noteTextInput');
        if (textarea) {
          textarea.focus();
        }
      }

      function resetNoteFormState() {
        noteFormState = {
          mode: 'create',
          noteId: null,
          sectionReference: currentSectionRef || '',
          noteText: ''
        };
      }

      function handleNoteFormSubmit(form) {
        if (!comparisonView) return;
        var textArea = form.querySelector('#noteTextInput');
        var select = form.querySelector('#noteSectionSelect');
        var errorBox = form.querySelector('.form-error-message');
        if (errorBox) {
          errorBox.textContent = '';
          errorBox.hidden = true;
        }

        var noteText = textArea.value.trim();
        var sectionReference = select.value || null;

        if (!noteText) {
          if (errorBox) {
            errorBox.textContent = 'Note text is required.';
            errorBox.hidden = false;
          }
          textArea.focus();
          return;
        }

        try {
          if (noteFormState.mode === 'edit' && noteFormState.noteId) {
            var updateResult = WebsiteSDK.updateSdsComparisonNote(noteFormState.noteId, noteText);
            if (!updateResult || updateResult.success === false) {
              throw new Error('Unable to update note.');
            }
            if (Array.isArray(comparisonView.notes)) {
              comparisonView.notes.forEach(function(n) {
                if (n.noteId === noteFormState.noteId) {
                  n.noteText = noteText;
                }
              });
            }
          } else {
            var addResult = WebsiteSDK.addSdsComparisonNote(comparisonId, sectionReference, noteText);
            if (!addResult || !addResult.success || !addResult.note) {
              throw new Error('Unable to add note.');
            }
            if (!Array.isArray(comparisonView.notes)) {
              comparisonView.notes = [];
            }
            comparisonView.notes.push(addResult.note);
          }

          resetNoteFormState();
          var notesContainer = document.querySelector('[data-populate="notes-list"]');
          if (notesContainer) {
            renderNotesList(notesContainer);
          }
          var navContainer = document.querySelector('[data-populate="sections-nav"]');
          if (navContainer) {
            renderSectionsNav(navContainer);
          }
          var entryContainer = document.querySelector('[data-populate="note-entry"]');
          if (entryContainer) {
            renderNoteEntry(entryContainer);
          }
        } catch (err) {
          if (errorBox) {
            errorBox.textContent = err && err.message ? err.message : 'Unexpected error saving note.';
            errorBox.hidden = false;
          }
        }
      }

      function handleDeleteNote(noteId) {
        if (!comparisonView) return;
        var confirmed = window.confirm('Delete this note? This action cannot be undone.');
        if (!confirmed) return;
        try {
          var result = WebsiteSDK.deleteSdsComparisonNote(noteId);
          if (!result || result.success === false) {
            throw new Error('Unable to delete note.');
          }
          if (Array.isArray(comparisonView.notes)) {
            comparisonView.notes = comparisonView.notes.filter(function(n) { return n.noteId !== noteId; });
          }
          if (noteFormState.mode === 'edit' && noteFormState.noteId === noteId) {
            resetNoteFormState();
            var entryContainer = document.querySelector('[data-populate="note-entry"]');
            if (entryContainer) {
              renderNoteEntry(entryContainer);
            }
          }
          var notesContainer = document.querySelector('[data-populate="notes-list"]');
          if (notesContainer) {
            renderNotesList(notesContainer);
          }
          var navContainer = document.querySelector('[data-populate="sections-nav"]');
          if (navContainer) {
            renderSectionsNav(navContainer);
          }
        } catch (err) {
          window.alert(err && err.message ? err.message : 'Error deleting note.');
        }
      }

      function renderAllPopulated() {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(el) {
          var type = el.getAttribute('data-populate');
          if (type === 'comparison-page-header') {
            renderPageHeader(el);
          } else if (type === 'comparison-metadata-bar') {
            renderMetadataBar(el);
          } else if (type === 'sections-nav') {
            renderSectionsNav(el);
          } else if (type === 'comparison-card') {
            renderComparisonCard(el);
          } else if (type === 'notes-list') {
            renderNotesList(el);
          } else if (type === 'note-entry') {
            renderNoteEntry(el);
          } else if (type === 'comparison-error') {
            // handled separately
          }
        });
      }

      function initializeComparison() {
        if (!comparisonId) {
          showLoader(false);
          showError('No comparisonId specified in the URL.');
          var headerEl = document.querySelector('[data-populate="comparison-page-header"]');
          if (headerEl) {
            renderPageHeader(headerEl);
          }
          var metaEl = document.querySelector('[data-populate="comparison-metadata-bar"]');
          if (metaEl) {
            renderMetadataBar(metaEl);
          }
          return;
        }

        if (typeof WebsiteSDK === 'undefined' || !WebsiteSDK.getSdsComparisonView) {
          showLoader(false);
          showError('Data services are not available. Please ensure business_logic.js is loaded.');
          return;
        }

        try {
          showLoader(true);
          clearError();
          comparisonView = WebsiteSDK.getSdsComparisonView(comparisonId);
          if (!comparisonView) {
            throw new Error('Comparison data could not be loaded.');
          }
          buildUnifiedSectionsFromView();
          renderAllPopulated();
          showLoader(false);
        } catch (err) {
          showLoader(false);
          showError(err && err.message ? err.message : 'An error occurred while loading the comparison.');
        }
      }

      document.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) return;
        var action = target.getAttribute('data-action');

        if (action === 'back-to-sds') {
          if (sdsId) {
            window.location.href = 'sds_detail.html?id=' + encodeURIComponent(sdsId);
          }
        } else if (action === 'navigate-section') {
          var sectionRef = target.getAttribute('data-section-ref');
          if (sectionRef) {
            currentSectionRef = sectionRef;
            scrollToSection(sectionRef, true);
            updateUrlParams({ section: sectionRef }, { replace: false });
            updateSectionNavActive(sectionRef);
            var notesContainer = document.querySelector('[data-populate="notes-list"]');
            if (notesContainer) {
              renderNotesList(notesContainer);
            }
          }
        } else if (action === 'open-note-for-section') {
          var sectionForNote = target.getAttribute('data-section-ref');
          openNoteFormForSection(sectionForNote);
        } else if (action === 'add-overall-note') {
          openNoteFormForSection('');
        } else if (action === 'edit-note') {
          var noteId = target.getAttribute('data-note-id');
          if (noteId && comparisonView && Array.isArray(comparisonView.notes)) {
            var note = null;
            comparisonView.notes.forEach(function(n) {
              if (n.noteId === noteId) {
                note = n;
              }
            });
            if (note) {
              openNoteFormForEdit(note);
            }
          }
        } else if (action === 'delete-note') {
          var deleteNoteId = target.getAttribute('data-note-id');
          if (deleteNoteId) {
            handleDeleteNote(deleteNoteId);
          }
        } else if (action === 'focus-section-from-note') {
          var sectionFromNote = target.getAttribute('data-section-ref');
          if (sectionFromNote) {
            currentSectionRef = sectionFromNote;
            scrollToSection(sectionFromNote, true);
            updateUrlParams({ section: sectionFromNote }, { replace: false });
            updateSectionNavActive(sectionFromNote);
            var notesContainer2 = document.querySelector('[data-populate="notes-list"]');
            if (notesContainer2) {
              renderNotesList(notesContainer2);
            }
          }
        } else if (action === 'toggle-sync-scroll') {
          syncScrollEnabled = !syncScrollEnabled;
          applySyncScrollToggleUI();
          updateUrlParams({ syncScroll: syncScrollEnabled ? '1' : '0' }, { replace: true });
        } else if (action === 'cancel-note') {
          resetNoteFormState();
          var entryContainer = document.querySelector('[data-populate="note-entry"]');
          if (entryContainer) {
            renderNoteEntry(entryContainer);
          }
        } else if (action === 'download-comparison') {
          window.alert('Download/export for this comparison is not implemented in this prototype.');
        }
      });

      document.addEventListener('submit', function(event) {
        var form = event.target;
        if (form && form.getAttribute('data-role') === 'note-form') {
          event.preventDefault();
          handleNoteFormSubmit(form);
        }
      });

      window.addEventListener('popstate', function() {
        handleUrlChange();
      });

      initUrlState();

      var headerContainer = document.querySelector('[data-populate="comparison-page-header"]');
      if (headerContainer) {
        renderPageHeader(headerContainer);
      }
      var metaContainer = document.querySelector('[data-populate="comparison-metadata-bar"]');
      if (metaContainer) {
        renderMetadataBar(metaContainer);
      }

      initializeComparison();
    });
  </script>
</body>
</html>
