  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var homeState = {
        ref: null,
        overview: null,
        actions: null
      };

      function getRefFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var refValue = params.get('ref');
        return refValue || null;
      }

      function arrangeBenefitHighlights(benefits, ref) {
        if (!Array.isArray(benefits)) {
          return [];
        }
        if (!ref) {
          return benefits.slice();
        }
        var refLower = String(ref).toLowerCase();
        return benefits.slice().sort(function(a, b) {
          var aScore = scoreHighlightByRef(a, refLower);
          var bScore = scoreHighlightByRef(b, refLower);
          if (aScore === bScore) {
            return 0;
          }
          return aScore < bScore ? -1 : 1;
        });
      }

      function scoreHighlightByRef(highlight, refLower) {
        if (!refLower) {
          return 0;
        }
        var combined = ((highlight && highlight.title) ? String(highlight.title) : '') + ' ' + ((highlight && highlight.description) ? String(highlight.description) : '');
        var text = combined.toLowerCase();
        var index = text.indexOf(refLower);
        if (index === -1) {
          return 1;
        }
        return 0;
      }

      function arrangeDeviceTypes(types, ref) {
        if (!Array.isArray(types)) {
          return [];
        }
        if (!ref) {
          return types.slice();
        }
        return types.slice().sort(function(a, b) {
          var aStr = String(a).toLowerCase();
          var bStr = String(b).toLowerCase();
          if (aStr < bStr) {
            return -1;
          }
          if (aStr > bStr) {
            return 1;
          }
          return 0;
        });
      }

      function renderOverviewField(container, field, overview, ref) {
        if (!container) {
          return;
        }
        if (field === 'heroTitle') {
          container.textContent = overview && overview.heroTitle ? overview.heroTitle : '';
        } else if (field === 'heroSubtitle') {
          container.textContent = overview && overview.heroSubtitle ? overview.heroSubtitle : '';
        } else if (field === 'benefitHighlights') {
          var highlights = overview && Array.isArray(overview.benefitHighlights) ? overview.benefitHighlights : [];
          var arranged = arrangeBenefitHighlights(highlights, ref);
          container.innerHTML = '';
          arranged.forEach(function(item) {
            var li = document.createElement('li');
            li.className = 'benefit-item';
            var titleSpan = document.createElement('span');
            titleSpan.className = 'benefit-title';
            titleSpan.textContent = item && item.title ? item.title : '';
            li.appendChild(titleSpan);
            if (item && item.description) {
              var descSpan = document.createElement('span');
              descSpan.className = 'benefit-description';
              descSpan.textContent = item.description;
              li.appendChild(descSpan);
            }
            container.appendChild(li);
          });
        } else if (field === 'supportedDeviceTypes') {
          var types = overview && Array.isArray(overview.supportedDeviceTypes) ? overview.supportedDeviceTypes : [];
          var arrangedTypes = arrangeDeviceTypes(types, ref);
          container.innerHTML = '';
          arrangedTypes.forEach(function(type) {
            var chip = document.createElement('span');
            chip.className = 'device-chip';
            chip.textContent = type;
            container.appendChild(chip);
          });
        }
      }

      function renderActionsField(container, field, actions) {
        if (!container) {
          return;
        }
        if (field === 'primaryCtaLabel') {
          container.textContent = actions && actions.primaryCtaLabel ? actions.primaryCtaLabel : '';
        } else if (field === 'secondaryCtaLabel') {
          container.textContent = actions && actions.secondaryCtaLabel ? actions.secondaryCtaLabel : '';
        }
      }

      function handlePrimaryCtaNavigation() {
        if (homeState.actions && homeState.actions.primaryCtaType) {
          console.debug('Primary CTA type:', homeState.actions.primaryCtaType);
        }
        window.location.href = 'signup_account.html?from=home_hero';
      }

      function handlePricingNavigation() {
        window.location.href = 'plan_selection.html?billingPeriod=monthly&sortBy=price_asc&from=home_pricing';
      }

      function navigateToAboutFromHome() {
        window.location.href = 'about.html?from=home_learn_more';
      }

      function navigateToHomePreservingRef() {
        var ref = homeState.ref;
        if (ref) {
          window.location.href = 'index.html?ref=' + encodeURIComponent(ref);
        } else {
          window.location.href = 'index.html';
        }
      }

      function setupActions() {
        var primaryBtn = document.querySelector('[data-action="primary-cta-click"]');
        if (primaryBtn) {
          primaryBtn.addEventListener('click', function(event) {
            event.preventDefault();
            handlePrimaryCtaNavigation();
          });
        }

        var secondaryBtn = document.querySelector('[data-action="secondary-cta-click"]');
        if (secondaryBtn) {
          secondaryBtn.addEventListener('click', function(event) {
            event.preventDefault();
            handlePricingNavigation();
          });
        }

        var learnMoreBtn = document.querySelector('[data-action="learn-more-click"]');
        if (learnMoreBtn) {
          learnMoreBtn.addEventListener('click', function(event) {
            event.preventDefault();
            navigateToAboutFromHome();
          });
        }

        var cardLogoButton = document.querySelector('[data-action="home-logo-click"]');
        if (cardLogoButton) {
          cardLogoButton.addEventListener('click', function(event) {
            event.preventDefault();
            navigateToHomePreservingRef();
          });
        }
      }

      function setupFooterNavigation() {
        var footer = document.querySelector('footer.site-footer');
        if (!footer) {
          return;
        }

        var helpLink = footer.querySelector('a[href="help.html"]');
        if (helpLink) {
          helpLink.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'help.html?from=home_footer';
          });
        }

        var aboutLink = footer.querySelector('a[href="about.html"]');
        if (aboutLink) {
          aboutLink.addEventListener('click', function(event) {
            event.preventDefault();
            navigateToAboutFromHome();
          });
        }
      }

      function initialize() {
        var loaderComponent = document.querySelector('[data-component="primary-cta-panel-component"]');
        var loadingState = loaderComponent ? loaderComponent.querySelector('[data-state="loading"]') : null;
        var cardBody = loaderComponent ? loaderComponent.querySelector('.card-body') : null;
        var errorBox = loaderComponent ? loaderComponent.querySelector('[data-role="load-error"]') : null;

        homeState.ref = getRefFromUrl();

        if (loadingState) {
          loadingState.hidden = false;
        }
        if (cardBody) {
          cardBody.hidden = true;
        }
        if (errorBox) {
          errorBox.hidden = true;
          errorBox.textContent = '';
        }

        var overview = null;
        var actions = null;

        try {
          overview = WebsiteSDK.getHomeOverviewContent();
          actions = WebsiteSDK.getHomePrimaryActions();
        } catch (err) {
          console.error('Error loading home content', err);
          if (loadingState) {
            loadingState.hidden = true;
          }
          if (errorBox) {
            errorBox.hidden = false;
            errorBox.textContent = 'Unable to load homepage content. Please refresh and try again.';
          }
          return;
        }

        homeState.overview = overview;
        homeState.actions = actions;

        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          var field = element.dataset.populate;
          if (!field) {
            return;
          }
          if (field === 'heroTitle' || field === 'heroSubtitle' || field === 'benefitHighlights' || field === 'supportedDeviceTypes') {
            renderOverviewField(element, field, overview, homeState.ref);
          } else if (field === 'primaryCtaLabel' || field === 'secondaryCtaLabel') {
            renderActionsField(element, field, actions);
          }
        });

        var freeTrialBadge = document.querySelector('[data-role="free-trial-badge"]');
        if (freeTrialBadge) {
          var showBadge = actions && actions.showFreeTrial;
          freeTrialBadge.hidden = !showBadge;
        }

        if (loadingState) {
          loadingState.hidden = true;
        }
        if (cardBody) {
          cardBody.hidden = false;
        }

        setupActions();
        setupFooterNavigation();
      }

      initialize();
    });
  </script>
</body>
</html>
