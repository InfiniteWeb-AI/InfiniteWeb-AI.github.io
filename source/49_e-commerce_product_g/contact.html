<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Rug Gallery Framework</title>

    <!-- Typography: Space Grotesk (headings) & IBM Plex Sans (body) -->
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap' rel='stylesheet'>

    <!-- Framework stylesheet -->
    <link rel='stylesheet' href='styles.css'>
    <!-- Page-specific stylesheet -->
    <link rel='stylesheet' href='contact.css'>
</head>
<body class='site'>
    <header class='site-header' role='banner'>
        <div class='header-inner'>
            <div class='site-brand' aria-label='Rug Gallery - Home rugs'>
                <span class='brand-title'>Rug Gallery</span>
                <span class='brand-tagline'>Home Rugs</span>
            </div>

            <nav class='primary-nav' aria-label='Primary navigation'>
                <ul class='nav-list'>
                    <li class='nav-item'>
                        <a href='index.html' title='Homepage with featured rugs, promotions, and search'>Home</a>
                    </li>
                    <li class='nav-item'>
                        <a href='products.html?categoryId=rugs' title='All rugs with access to subcategories and filters'>Rugs</a>
                    </li>
                    <li class='nav-item'>
                        <a href='products.html?categoryId=living_room_rugs' title='Living room rugs including 5&#39; x 7&#39; and 9&#39; x 12&#39; sizes'>Living Room</a>
                    </li>
                    <li class='nav-item'>
                        <a href='products.html?categoryId=kitchen_rugs' title='Kitchen rugs and runners including 2&#39; x 8&#39; non-slip options'>Kitchen</a>
                    </li>
                    <li class='nav-item'>
                        <a href='products.html?categoryId=kids_rugs' title='Kids&#39; room rugs in round, rectangular, and runner shapes'>Kids&#39; Rugs</a>
                    </li>
                    <li class='nav-item'>
                        <a href='products.html?categoryId=outdoor_rugs' title='Outdoor rugs including navy 5&#39; x 7&#39; options'>Outdoor</a>
                    </li>
                    <li class='nav-item nav-item--sale'>
                        <a href='products.html?categoryId=sale_rugs' title='Sale and clearance rugs for budget-friendly purchases'>Sale</a>
                    </li>
                    <li class='nav-item nav-item--utility'>
                        <a href='wishlist.html' title='View and manage saved rugs and favorites'>Wishlist</a>
                    </li>
                    <li class='nav-item nav-item--utility'>
                        <a href='cart.html' title='Shopping cart with selected rugs and totals'>Cart</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id='content' class='site-main' role='main'>
        <!-- Contact & Help page content -->
        <div class='contact-page' data-component='contact-page-controller'>
            <div class='contact-page-inner'>
                <section class='contact-hero-column' aria-label='Contact and support'>
                    <h1 class='visually-hidden'>Contact &amp; Help</h1>

                    <!-- Status banner -->
                    <div class='contact-status' data-component='contact-form-status' aria-live='polite'></div>

                    <!-- Contact info panel -->
                    <section class='contact-info-panel' data-component='contact-info-panel' data-populate='contact-info'>
                        <!-- Populated by JavaScript via getContactInfo -->
                    </section>

                    <!-- Contact form -->
                    <section class='contact-form-section' data-component='contact-form' aria-label='Contact form'>
                        <form id='contactForm' novalidate data-action='submit-contact-form'>
                            <div class='form-field'>
                                <label for='contactName'>Name<span aria-hidden='true'>*</span></label>
                                <input id='contactName' name='name' type='text' autocomplete='name' required data-field='name'>
                                <p class='field-error' data-error-for='name'></p>
                            </div>

                            <div class='form-field'>
                                <label for='contactEmail'>Email<span aria-hidden='true'>*</span></label>
                                <input id='contactEmail' name='email' type='email' autocomplete='email' required data-field='email'>
                                <p class='field-error' data-error-for='email'></p>
                            </div>

                            <div class='form-field'>
                                <label for='contactTopic'>Topic</label>
                                <select id='contactTopic' name='topic' data-field='topic'>
                                    <option value='general_question'>General question</option>
                                    <option value='pre_purchase_question'>Pre-purchase question</option>
                                    <option value='order_issue'>Issue with an order</option>
                                    <option value='product_details'>Product details</option>
                                </select>
                                <p class='field-help'>Choose the option that best matches your question.</p>
                            </div>

                            <div class='form-field'>
                                <label for='contactOrderNumber'>Order number (optional)</label>
                                <input id='contactOrderNumber' name='orderNumber' type='text' autocomplete='off' data-field='orderNumber'>
                                <p class='field-error' data-error-for='orderNumber'></p>
                            </div>

                            <div class='form-field'>
                                <label for='contactMessage'>Message<span aria-hidden='true'>*</span></label>
                                <textarea id='contactMessage' name='message' rows='6' required data-field='message'></textarea>
                                <p class='field-error' data-error-for='message'></p>
                            </div>

                            <div class='form-actions'>
                                <button type='submit' class='btn btn-primary' data-button-role='submit'>
                                    <span class='btn-label'>Send message</span>
                                </button>
                            </div>
                        </form>
                    </section>
                </section>

                <!-- Help topics strip / accordion -->
                <section class='help-strip' aria-label='Help topics'>
                    <div class='help-strip-inner' data-component='help-topics-accordion' data-populate='help-topics'>
                        <!-- Help topics accordion items rendered here -->
                    </div>
                </section>
            </div>

            <!-- Navigation handler is conceptual; no visible UI needed -->
            <div class='navigation-handler' data-component='navigation-handler' aria-hidden='true'></div>
        </div>
    </main>

    <footer class='site-footer' role='contentinfo'>
        <div class='footer-inner'>
            <nav class='footer-nav' aria-label='Footer navigation'>
                <ul class='footer-nav-list'>
                    <li class='footer-nav-item'>
                        <a href='about.html' title='Learn more about our rug brand and mission'>About Us</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='contact.html' title='Customer support and contact information'>Contact &amp; Help</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='shipping_returns.html' title='Details on shipping options, delivery, and return policies'>Shipping &amp; Returns</a>
                    </li>
                </ul>
            </nav>
            <p class='footer-meta'>&copy; <span class='footer-year'>2024</span> Rug Gallery. All rights reserved.</p>
        </div>
    </footer>

    <!-- SDK / business logic script -->
    <script src='business_logic.js'></script>

    <!-- Page UI logic -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        var urlParams = new URLSearchParams(window.location.search);

        function parseInitialState() {
            var rawTopic = urlParams.get('topic') || '';
            var topic = normalizeTopic(rawTopic);
            var state = {
                topic: topic,
                orderNumber: urlParams.get('orderNumber') || '',
                email: urlParams.get('email') || '',
                message: urlParams.get('message') || '',
                status: urlParams.get('status') || '',
                ticketId: urlParams.get('ticketId') || ''
            };
            return state;
        }

        function normalizeTopic(rawTopic) {
            if (!rawTopic) {
                return 'general_question';
            }
            var lower = rawTopic.toLowerCase();
            if (lower === 'order_issue') {
                return 'order_issue';
            }
            if (lower === 'prepurchase' || lower === 'pre_purchase_question') {
                return 'pre_purchase_question';
            }
            if (lower === 'product_details') {
                return 'product_details';
            }
            if (lower === 'general_question') {
                return 'general_question';
            }
            return 'general_question';
        }

        function updateUrl(paramsToSet, paramsToRemove) {
            var url = new URL(window.location.href);
            var search = url.searchParams;
            if (paramsToRemove && paramsToRemove.length) {
                paramsToRemove.forEach(function (key) {
                    search.delete(key);
                });
            }
            if (paramsToSet) {
                Object.keys(paramsToSet).forEach(function (key) {
                    var value = paramsToSet[key];
                    if (value === null || value === undefined || value === '') {
                        search.delete(key);
                    } else {
                        search.set(key, value);
                    }
                });
            }
            url.search = search.toString();
            window.history.replaceState({}, '', url.toString());
        }

        function renderContactInfo(container, contactInfo) {
            var supportEmail = contactInfo && contactInfo.supportEmail ? contactInfo.supportEmail : '';
            var supportPhone = contactInfo && contactInfo.supportPhone ? contactInfo.supportPhone : '';
            var supportHours = contactInfo && contactInfo.supportHours ? contactInfo.supportHours : '';
            var faqSummary = contactInfo && contactInfo.faqSummary ? contactInfo.faqSummary : '';

            container.innerHTML = '' +
                "<div class='contact-info-main'>" +
                    (supportHours ? "<p class='contact-hours'><span>Support hours:</span> " + supportHours + '</p>' : '') +
                    (supportEmail ? "<p class='contact-line'><span>Email:</span> <a href='mailto:" + supportEmail + "' data-action='click-support-email'>" + supportEmail + '</a></p>' : '') +
                    (supportPhone ? "<p class='contact-line'><span>Phone:</span> <a href='tel:" + supportPhone + "' data-action='click-support-phone'>" + supportPhone + '</a></p>' : '') +
                '</div>' +
                "<div class='contact-faq-summary'>" +
                    (faqSummary ? "<p class='faq-summary-text'>" + faqSummary + '</p>' : '') +
                    "<p class='faq-links'>" +
                        "<button type='button' class='link-button' data-action='navigate-shipping-returns'>Shipping &amp; Returns</button>" +
                    '</p>' +
                '</div>';
        }

        function renderHelpTopics(container, helpSections) {
            container.innerHTML = '';
            if (!helpSections || !helpSections.length) {
                container.innerHTML = "<p class='help-empty'>Help topics are currently unavailable. Please use the contact form above.</p>";
                return;
            }

            for (var i = 0; i < helpSections.length; i++) {
                var section = helpSections[i];
                var article = document.createElement('article');
                article.className = 'help-topic';
                article.setAttribute('data-topic-index', String(i));

                var isFirst = i === 0;
                var title = section.title || 'Help topic';
                var content = section.content || '';

                var expandedAttr = isFirst ? 'true' : 'false';
                var hiddenAttr = isFirst ? '' : ' hidden';

                article.innerHTML = '' +
                    "<header class='help-topic-header'>" +
                        "<button type='button' class='help-topic-toggle' data-action='toggle-help-section' data-index='" + i + "' aria-expanded='" + expandedAttr + "'>" +
                            "<span class='help-topic-title'>" + title + '</span>' +
                        '</button>' +
                    '</header>' +
                    "<div class='help-topic-body' data-topic-body='" + i + "'" + hiddenAttr + '>' +
                        "<div class='help-topic-body-inner'>" + content + '</div>' +
                    '</div>';

                container.appendChild(article);
            }
        }

        function renderStatusBanner(container, state) {
            container.innerHTML = '';
            var status = state.status || '';
            var ticketId = state.ticketId || '';
            var message = state.message || '';
            var isSubmitting = !!state.isSubmitting;

            if (isSubmitting) {
                container.innerHTML = "<div class='status-banner status-banner--info' role='status'>" +
                    "<p>Sending your message, please wait...</p>" +
                '</div>';
                return;
            }

            if (!status) {
                return;
            }

            if (status === 'success') {
                var ticketText = ticketId ? 'Ticket ' + ticketId + ' has been created.' : 'Your request has been received.';
                container.innerHTML = "<div class='status-banner status-banner--success' role='status'>" +
                    "<div class='status-banner-main'>" +
                        "<p>Thank you. " + ticketText + '</p>' +
                    '</div>' +
                    "<div class='status-banner-actions'>" +
                        "<button type='button' class='btn btn-ghost' data-action='navigate-back-to-shopping'>Back to shopping</button>" +
                        "<button type='button' class='btn btn-text' data-action='dismiss-status'>Start a new request</button>" +
                    '</div>' +
                '</div>';
                return;
            }

            if (status === 'error') {
                var errorText = message || 'We were unable to submit your request. Please try again.';
                container.innerHTML = "<div class='status-banner status-banner--error' role='status'>" +
                    '<div class="status-banner-main">' +
                        '<p>' + errorText + '</p>' +
                    '</div>' +
                    "<div class='status-banner-actions'>" +
                        "<button type='button' class='btn btn-text' data-action='dismiss-status'>Dismiss</button>" +
                    '</div>' +
                '</div>';
            }
        }

        function initForm(initialState) {
            var form = document.getElementById('contactForm');
            if (!form) {
                return;
            }
            var nameInput = form.querySelector('[data-field="name"]');
            var emailInput = form.querySelector('[data-field="email"]');
            var topicSelect = form.querySelector('[data-field="topic"]');
            var orderInput = form.querySelector('[data-field="orderNumber"]');
            var messageInput = form.querySelector('[data-field="message"]');

            if (emailInput && initialState.email) {
                emailInput.value = initialState.email;
            }
            if (orderInput && initialState.orderNumber) {
                orderInput.value = initialState.orderNumber;
            }
            if (messageInput && initialState.message) {
                messageInput.value = initialState.message;
            }
            if (topicSelect && initialState.topic) {
                var options = topicSelect.options;
                var found = false;
                for (var i = 0; i < options.length; i++) {
                    if (options[i].value === initialState.topic) {
                        topicSelect.value = initialState.topic;
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    topicSelect.value = 'general_question';
                }
            }

            form.addEventListener('input', function (event) {
                var target = event.target;
                var fieldName = target.getAttribute('data-field');
                if (fieldName) {
                    clearFieldError(fieldName, form);
                }
            });
        }

        function clearFieldError(fieldName, form) {
            var field = form.querySelector('[data-field="' + fieldName + '"]');
            var errorEl = form.querySelector('[data-error-for="' + fieldName + '"]');
            if (field) {
                field.removeAttribute('aria-invalid');
            }
            if (errorEl) {
                errorEl.textContent = '';
            }
        }

        function setFieldError(fieldName, message, form) {
            var field = form.querySelector('[data-field="' + fieldName + '"]');
            var errorEl = form.querySelector('[data-error-for="' + fieldName + '"]');
            if (field) {
                field.setAttribute('aria-invalid', 'true');
            }
            if (errorEl) {
                errorEl.textContent = message;
            }
        }

        function validateForm(form) {
            var isValid = true;
            var nameInput = form.querySelector('[data-field="name"]');
            var emailInput = form.querySelector('[data-field="email"]');
            var messageInput = form.querySelector('[data-field="message"]');

            clearFieldError('name', form);
            clearFieldError('email', form);
            clearFieldError('message', form);

            if (nameInput && !nameInput.value.trim()) {
                setFieldError('name', 'Please enter your name.', form);
                isValid = false;
            }

            if (emailInput) {
                var emailVal = emailInput.value.trim();
                if (!emailVal) {
                    setFieldError('email', 'Please enter your email address.', form);
                    isValid = false;
                } else {
                    var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailPattern.test(emailVal)) {
                        setFieldError('email', 'Please enter a valid email address.', form);
                        isValid = false;
                    }
                }
            }

            if (messageInput && !messageInput.value.trim()) {
                setFieldError('message', 'Please include a brief message.', form);
                isValid = false;
            }

            return isValid;
        }

        function setSubmittingState(isSubmitting) {
            var statusContainer = document.querySelector('[data-component="contact-form-status"]');
            var form = document.getElementById('contactForm');
            var submitButton = form ? form.querySelector('[data-button-role="submit"]') : null;

            if (submitButton) {
                submitButton.disabled = isSubmitting;
                var labelSpan = submitButton.querySelector('.btn-label');
                if (labelSpan) {
                    labelSpan.textContent = isSubmitting ? 'Sending1823' : 'Send message';
                }
            }

            if (statusContainer) {
                renderStatusBanner(statusContainer, { status: '', ticketId: '', message: '', isSubmitting: isSubmitting });
            }
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            var form = event.target;
            if (!form || form.id !== 'contactForm') {
                return;
            }

            if (!validateForm(form)) {
                return;
            }

            var nameInput = form.querySelector('[data-field="name"]');
            var emailInput = form.querySelector('[data-field="email"]');
            var topicSelect = form.querySelector('[data-field="topic"]');
            var orderInput = form.querySelector('[data-field="orderNumber"]');
            var messageInput = form.querySelector('[data-field="message"]');

            var name = nameInput ? nameInput.value.trim() : '';
            var email = emailInput ? emailInput.value.trim() : '';
            var topic = topicSelect ? topicSelect.value : 'general_question';
            var orderNumber = orderInput ? orderInput.value.trim() : '';
            var message = messageInput ? messageInput.value.trim() : '';

            setSubmittingState(true);

            var response;
            try {
                response = WebsiteSDK.submitContactForm(name, email, topic, orderNumber, message);
            } catch (error) {
                setSubmittingState(false);
                var statusContainer = document.querySelector('[data-component="contact-form-status"]');
                if (statusContainer) {
                    renderStatusBanner(statusContainer, { status: 'error', ticketId: '', message: 'An unexpected error occurred. Please try again.', isSubmitting: false });
                }
                updateUrl({ status: 'error', message: 'An unexpected error occurred. Please try again.' }, ['ticketId']);
                return;
            }

            setSubmittingState(false);

            var statusContainerAfter = document.querySelector('[data-component="contact-form-status"]');
            if (response && response.success) {
                var ticketId = response.ticketId || '';
                var successMessage = response.message || '';
                if (statusContainerAfter) {
                    renderStatusBanner(statusContainerAfter, { status: 'success', ticketId: ticketId, message: successMessage, isSubmitting: false });
                }
                updateUrl({ status: 'success', ticketId: ticketId }, ['message']);
            } else {
                var errorMessage = (response && response.message) ? response.message : 'We were unable to submit your request. Please try again.';
                if (statusContainerAfter) {
                    renderStatusBanner(statusContainerAfter, { status: 'error', ticketId: '', message: errorMessage, isSubmitting: false });
                }
                updateUrl({ status: 'error', message: errorMessage }, ['ticketId']);
            }
        }

        function navigateToShippingReturns() {
            window.location.href = 'shipping_returns.html';
        }

        function navigateToRugsCategory() {
            window.location.href = 'products.html?categoryId=rugs';
        }

        function dismissStatus() {
            var statusContainer = document.querySelector('[data-component="contact-form-status"]');
            if (statusContainer) {
                statusContainer.innerHTML = '';
            }
            updateUrl({}, ['status', 'ticketId', 'message']);
        }

        function bindActions() {
            var form = document.getElementById('contactForm');
            if (form) {
                form.addEventListener('submit', handleFormSubmit);
            }

            document.body.addEventListener('click', function (event) {
                var target = event.target;
                if (!target) {
                    return;
                }
                if (target.matches('[data-action]') === false) {
                    target = target.closest('[data-action]');
                    if (!target) {
                        return;
                    }
                }
                var action = target.getAttribute('data-action');
                if (!action) {
                    return;
                }

                if (action === 'navigate-shipping-returns') {
                    event.preventDefault();
                    navigateToShippingReturns();
                } else if (action === 'navigate-back-to-shopping') {
                    event.preventDefault();
                    navigateToRugsCategory();
                } else if (action === 'dismiss-status') {
                    event.preventDefault();
                    dismissStatus();
                } else if (action === 'toggle-help-section') {
                    event.preventDefault();
                    var index = target.getAttribute('data-index');
                    toggleHelpSection(index);
                } else if (action === 'click-support-email' || action === 'click-support-phone') {
                    // Allow default behavior; no-op for now.
                }
            });

            var helpAccordion = document.querySelector('[data-component="help-topics-accordion"]');
            if (helpAccordion) {
                helpAccordion.addEventListener('click', function (event) {
                    var anchor = event.target.closest('a');
                    if (!anchor) {
                        return;
                    }
                    var href = anchor.getAttribute('href');
                    if (!href) {
                        return;
                    }
                    if (href.indexOf('shipping_returns.html') !== -1) {
                        event.preventDefault();
                        navigateToShippingReturns();
                    }
                });
            }
        }

        function toggleHelpSection(index) {
            if (index === null || index === undefined) {
                return;
            }
            var container = document.querySelector('[data-component="help-topics-accordion"]');
            if (!container) {
                return;
            }
            var body = container.querySelector('[data-topic-body="' + index + '"]');
            var toggle = container.querySelector('[data-action="toggle-help-section"][data-index="' + index + '"]');
            if (!body || !toggle) {
                return;
            }
            var isHidden = body.hasAttribute('hidden');
            if (isHidden) {
                var allBodies = container.querySelectorAll('[data-topic-body]');
                var allToggles = container.querySelectorAll('[data-action="toggle-help-section"]');
                for (var i = 0; i < allBodies.length; i++) {
                    allBodies[i].setAttribute('hidden', 'hidden');
                }
                for (var j = 0; j < allToggles.length; j++) {
                    allToggles[j].setAttribute('aria-expanded', 'false');
                }
                body.removeAttribute('hidden');
                toggle.setAttribute('aria-expanded', 'true');
            } else {
                body.setAttribute('hidden', 'hidden');
                toggle.setAttribute('aria-expanded', 'false');
            }
        }

        function init() {
            var initialState = parseInitialState();
            var contactInfo;
            try {
                contactInfo = WebsiteSDK.getContactInfo();
            } catch (error) {
                contactInfo = {
                    supportEmail: '',
                    supportPhone: '',
                    supportHours: '',
                    faqSummary: '',
                    helpSections: []
                };
            }

            var populateElements = document.querySelectorAll('[data-populate]');
            populateElements.forEach(function (element) {
                var dataType = element.getAttribute('data-populate');
                if (dataType === 'contact-info') {
                    renderContactInfo(element, contactInfo);
                } else if (dataType === 'help-topics') {
                    renderHelpTopics(element, contactInfo.helpSections || []);
                }
            });

            initForm(initialState);

            var statusContainer = document.querySelector('[data-component="contact-form-status"]');
            if (statusContainer && initialState.status) {
                var bannerState = {
                    status: initialState.status,
                    ticketId: initialState.ticketId,
                    message: urlParams.get('message') || '',
                    isSubmitting: false
                };
                renderStatusBanner(statusContainer, bannerState);
            }

            bindActions();
        }

        init();
    });
    </script>
</body>
</html>
