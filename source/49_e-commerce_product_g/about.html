<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Rug Gallery</title>

    <!-- Typography: Space Grotesk (headings) & IBM Plex Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

    <!-- Framework stylesheet -->
    
    <!-- Page-specific stylesheet -->
    <link rel="stylesheet" href="about.css">
</head>
<body class="site">
    <header class="site-header" role="banner">
        <div class="header-inner">
            <div class="site-brand" aria-label="Rug Gallery - Home rugs">
                <span class="brand-title">Rug Gallery</span>
                <span class="brand-tagline">Home Rugs</span>
            </div>

            <nav class="primary-nav" aria-label="Primary navigation">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" title="Homepage with featured rugs, promotions, and search">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=rugs" title="All rugs with access to subcategories and filters">Rugs</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=living_room_rugs" title="Living room rugs including 5' x 7' and 9' x 12' sizes">Living Room</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=kitchen_rugs" title="Kitchen rugs and runners including 2' x 8' non-slip options">Kitchen</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=kids_rugs" title="Kids' room rugs in round, rectangular, and runner shapes">Kids' Rugs</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=outdoor_rugs" title="Outdoor rugs including navy 5' x 7' options">Outdoor</a>
                    </li>
                    <li class="nav-item nav-item--sale">
                        <a href="products.html?categoryId=sale_rugs" title="Sale and clearance rugs for budget-friendly purchases">Sale</a>
                    </li>
                    <li class="nav-item nav-item--utility">
                        <a href="wishlist.html" title="View and manage saved rugs and favorites">Wishlist</a>
                    </li>
                    <li class="nav-item nav-item--utility">
                        <a href="cart.html" title="Shopping cart with selected rugs and totals">Cart</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-main" role="main">
        <div class="about-page" data-component="about-page-root">
            <!-- Infrastructure components (non-visual) -->
            <div class="about-infra" aria-hidden="true">
                <div data-component="about-content-fetcher" data-populate="getAboutContent"></div>
                <div data-component="about-url-state-manager"></div>
            </div>

            <!-- Central narrative column (hero-like) -->
            <section class="about-main-wrapper">
                <div class="about-main-column">
                    <article class="about-main-content" data-component="about-main-content" aria-labelledby="about-headline">
                        <h1 id="about-headline" class="about-headline"></h1>
                        <div class="about-body"></div>

                        <!-- Inline functional links (wired by about-policy-navigation / about-shop-rugs-cta) -->
                        <div class="about-inline-links" aria-label="Key links">
                            <button type="button" class="link-like" data-action="navigate-shipping" data-component="about-policy-navigation">
                                Shipping &amp; Returns
                            </button>
                            <button type="button" class="link-like" data-action="navigate-contact" data-component="about-policy-navigation">
                                Contact &amp; Help
                            </button>
                            <button type="button" class="btn btn-primary about-inline-cta" data-action="shop-all-rugs" data-component="about-shop-rugs-cta">
                                Shop All Rugs
                            </button>
                        </div>
                    </article>

                    <!-- Accordion sections (quality, sustainability, sourcing, etc.) -->
                    <section class="about-sections" aria-label="More about Rug Gallery">
                        <ul class="accordion-list" data-component="about-sections-accordion"></ul>
                    </section>
                </div>
            </section>

            <!-- Bottom filmstrip-style band: highlights + policy links + CTA -->
            <section class="about-bottom-strip" aria-label="Highlights, policies, and shopping">
                <div class="about-bottom-inner">
                    <div class="about-highlights" data-component="about-highlights-list">
                        <ul class="highlight-strip"></ul>
                    </div>

                    <div class="about-policy-cta-group">
                        <nav class="about-policy-nav" aria-label="Policy navigation" data-component="about-policy-navigation">
                            <ul class="policy-link-list">
                                <li>
                                    <button type="button" class="link-like" data-action="navigate-shipping">
                                        Shipping &amp; Returns
                                    </button>
                                </li>
                                <li>
                                    <button type="button" class="link-like" data-action="navigate-contact">
                                        Contact &amp; Help
                                    </button>
                                </li>
                            </ul>
                        </nav>
                        <div class="about-shop-cta" data-component="about-shop-rugs-cta">
                            <button type="button" class="btn btn-primary" data-action="shop-all-rugs">
                                Shop All Rugs
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="footer-inner">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav-list">
                    <li class="footer-nav-item">
                        <a href="about.html" title="Learn more about our rug brand and mission">About Us</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="contact.html" title="Customer support and contact information">Contact &amp; Help</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="shipping_returns.html" title="Details on shipping options, delivery, and return policies">Shipping &amp; Returns</a>
                    </li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span class="footer-year">2024</span> Rug Gallery. All rights reserved.</p>
        </div>
    </footer>

    <!-- SDK / business logic script -->
    <script src="business_logic.js"></script>

    <!-- Page UI wiring -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);

        function parseIndex(paramName) {
            const value = urlParams.get(paramName);
            if (value === null) return null;
            const n = parseInt(value, 10);
            return Number.isInteger(n) && n >= 0 ? n : null;
        }

        const aboutState = {
            content: null,
            activeSectionIndex: null,
            activeHighlightIndex: null,
            sectionIndexFromUrl: parseIndex('sectionIndex'),
            highlightIndexFromUrl: parseIndex('highlightIndex'),
            sectionElements: [],
            highlightElements: []
        };

        const pageRoot = document.querySelector('[data-component="about-page-root"]');
        const mainContent = pageRoot ? pageRoot.querySelector('[data-component="about-main-content"]') : null;
        const headlineEl = mainContent ? mainContent.querySelector('.about-headline') : null;
        const bodyEl = mainContent ? mainContent.querySelector('.about-body') : null;
        const accordionContainer = pageRoot ? pageRoot.querySelector('[data-component="about-sections-accordion"]') : null;
        const highlightsContainer = pageRoot ? pageRoot.querySelector('[data-component="about-highlights-list"] .highlight-strip') : null;

        function renderHeadline(container, content) {
            if (!container) return;
            container.textContent = content && content.headline ? content.headline : '';
        }

        function renderBody(container, bodyText) {
            if (!container) return;
            container.innerHTML = '';

            if (!bodyText) {
                return;
            }

            const paragraphs = String(bodyText).split(/\n{2,}/);
            paragraphs.forEach(text => {
                const trimmed = text.trim();
                if (!trimmed) return;
                const p = document.createElement('p');
                p.textContent = trimmed;
                container.appendChild(p);
            });
        }

        function renderSections(container, sections) {
            if (!container) return;
            container.innerHTML = '';
            aboutState.sectionElements = [];

            if (!Array.isArray(sections) || sections.length === 0) {
                return;
            }

            sections.forEach((section, index) => {
                const li = document.createElement('li');
                li.className = 'accordion-item';

                const headerId = `about-section-header-${index}`;
                const panelId = `about-section-panel-${index}`;

                const headerButton = document.createElement('button');
                headerButton.type = 'button';
                headerButton.className = 'accordion-header';
                headerButton.dataset.action = 'toggle-section';
                headerButton.dataset.sectionIndex = String(index);
                headerButton.id = headerId;
                headerButton.setAttribute('aria-controls', panelId);
                headerButton.setAttribute('aria-expanded', 'false');
                headerButton.textContent = section && section.title ? section.title : '';

                const panel = document.createElement('div');
                panel.className = 'accordion-panel';
                panel.id = panelId;
                panel.setAttribute('role', 'region');
                panel.setAttribute('aria-labelledby', headerId);
                panel.hidden = true;

                const contentText = section && section.content ? String(section.content) : '';
                if (contentText) {
                    const paragraphs = contentText.split(/\n{2,}/);
                    paragraphs.forEach(text => {
                        const trimmed = text.trim();
                        if (!trimmed) return;
                        const p = document.createElement('p');
                        p.textContent = trimmed;
                        panel.appendChild(p);
                    });
                }

                li.appendChild(headerButton);
                li.appendChild(panel);
                container.appendChild(li);

                aboutState.sectionElements.push(li);
            });

            updateSectionsUI();
        }

        function renderHighlights(container, highlights) {
            if (!container) return;
            container.innerHTML = '';
            aboutState.highlightElements = [];

            if (!Array.isArray(highlights) || highlights.length === 0) {
                return;
            }

            highlights.forEach((text, index) => {
                const li = document.createElement('li');
                li.className = 'highlight-item';

                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'highlight-button';
                button.dataset.action = 'highlight-click';
                button.dataset.highlightIndex = String(index);
                button.textContent = String(text || '');

                li.appendChild(button);
                container.appendChild(li);

                aboutState.highlightElements.push(li);
            });

            updateHighlightsUI();
        }

        function updateSectionsUI() {
            aboutState.sectionElements.forEach((item, index) => {
                const header = item.querySelector('.accordion-header');
                const panel = item.querySelector('.accordion-panel');
                const isActive = aboutState.activeSectionIndex === index;

                if (header) {
                    header.setAttribute('aria-expanded', isActive ? 'true' : 'false');
                }
                if (panel) {
                    panel.hidden = !isActive;
                }
            });
        }

        function updateHighlightsUI() {
            aboutState.highlightElements.forEach((item, index) => {
                const button = item.querySelector('.highlight-button');
                const isActive = aboutState.activeHighlightIndex === index;
                if (button) {
                    if (isActive) {
                        button.classList.add('is-active');
                        button.setAttribute('aria-current', 'true');
                    } else {
                        button.classList.remove('is-active');
                        button.removeAttribute('aria-current');
                    }
                }
            });
        }

        function scrollSectionIntoView(index) {
            const item = aboutState.sectionElements[index];
            if (item) {
                item.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function scrollHighlightIntoView(index) {
            const item = aboutState.highlightElements[index];
            if (item) {
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function updateUrlFromState() {
            const url = new URL(window.location.href);

            if (aboutState.activeSectionIndex !== null && aboutState.activeSectionIndex >= 0) {
                url.searchParams.set('sectionIndex', String(aboutState.activeSectionIndex));
            } else {
                url.searchParams.delete('sectionIndex');
            }

            if (aboutState.activeHighlightIndex !== null && aboutState.activeHighlightIndex >= 0) {
                url.searchParams.set('highlightIndex', String(aboutState.activeHighlightIndex));
            } else {
                url.searchParams.delete('highlightIndex');
            }

            window.history.replaceState({}, '', url.toString());
        }

        function applyInitialUrlState() {
            const sections = Array.isArray(aboutState.content && aboutState.content.sections)
                ? aboutState.content.sections
                : [];
            const highlights = Array.isArray(aboutState.content && aboutState.content.highlights)
                ? aboutState.content.highlights
                : [];

            if (aboutState.sectionIndexFromUrl !== null && aboutState.sectionIndexFromUrl < sections.length) {
                aboutState.activeSectionIndex = aboutState.sectionIndexFromUrl;
                updateSectionsUI();
                scrollSectionIntoView(aboutState.sectionIndexFromUrl);
            }

            if (aboutState.highlightIndexFromUrl !== null && aboutState.highlightIndexFromUrl < highlights.length) {
                aboutState.activeHighlightIndex = aboutState.highlightIndexFromUrl;
                updateHighlightsUI();
                scrollHighlightIntoView(aboutState.highlightIndexFromUrl);
            }
        }

        function renderAll() {
            if (!aboutState.content) return;

            renderHeadline(headlineEl, aboutState.content);
            renderBody(bodyEl, aboutState.content.body || '');

            const sections = Array.isArray(aboutState.content.sections) ? aboutState.content.sections : [];
            const highlights = Array.isArray(aboutState.content.highlights) ? aboutState.content.highlights : [];

            renderSections(accordionContainer, sections);
            renderHighlights(highlightsContainer, highlights);

            applyInitialUrlState();
        }

        function showError(message) {
            if (!mainContent) return;
            const existing = mainContent.querySelector('.about-error');
            if (existing) {
                existing.textContent = message;
                return;
            }
            const errorEl = document.createElement('p');
            errorEl.className = 'about-error';
            errorEl.setAttribute('role', 'alert');
            errorEl.textContent = message;
            mainContent.appendChild(errorEl);
        }

        const populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(element => {
            const dataType = element.dataset.populate;
            if (dataType === 'getAboutContent') {
                try {
                    const content = WebsiteSDK.getAboutContent();
                    aboutState.content = content || { headline: '', body: '', sections: [], highlights: [] };
                    renderAll();
                } catch (err) {
                    showError('We were unable to load our story. Please try again in a moment.');
                }
            }
        });

        document.addEventListener('click', event => {
            const target = event.target.closest('[data-action]');
            if (!target) return;

            const action = target.dataset.action;

            if (action === 'navigate-shipping') {
                event.preventDefault();
                window.location.href = 'shipping_returns.html';
            }

            if (action === 'navigate-contact') {
                event.preventDefault();
                window.location.href = 'contact.html';
            }

            if (action === 'shop-all-rugs') {
                event.preventDefault();
                const url = new URL(window.location.origin + '/products.html');
                url.searchParams.set('categoryId', 'rugs');
                window.location.href = url.pathname + url.search;
            }

            if (action === 'toggle-section') {
                const index = parseInt(target.dataset.sectionIndex || '-1', 10);
                if (!Number.isInteger(index) || index < 0) return;

                if (aboutState.activeSectionIndex === index) {
                    aboutState.activeSectionIndex = null;
                } else {
                    aboutState.activeSectionIndex = index;
                }
                updateSectionsUI();
                updateUrlFromState();
            }

            if (action === 'highlight-click') {
                const index = parseInt(target.dataset.highlightIndex || '-1', 10);
                if (!Number.isInteger(index) || index < 0) return;

                aboutState.activeHighlightIndex = index;
                updateHighlightsUI();

                if (index < aboutState.sectionElements.length) {
                    aboutState.activeSectionIndex = index;
                    updateSectionsUI();
                    scrollSectionIntoView(index);
                }

                updateUrlFromState();
            }
        });
    });
    </script>
</body>
</html>
