<body class="site">
    <header class="site-header" role="banner">
        <div class="header-inner">
            <div class="site-brand" aria-label="Rug Gallery - Home rugs">
                <span class="brand-title">Rug Gallery</span>
                <span class="brand-tagline">Home Rugs</span>
            </div>

            <nav class="primary-nav" aria-label="Primary navigation">
                <ul class="nav-list" data-component="global-header-nav" data-populate="main-navigation">
                    <!-- Navigation items will be populated from getMainNavigationCategories() -->
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-main" role="main">
        <section class="home-search-band" data-component="home-search-bar">
            <form class="home-search-form" data-action="home-search" role="search" aria-label="Search rugs">
                <label class="sr-only" for="homeSearchInput">Search rugs</label>
                <input
                    id="homeSearchInput"
                    name="query"
                    type="search"
                    class="home-search-input"
                    autocomplete="off"
                    placeholder="Search rugs by room, style, or size"
                >
                <button type="submit" class="home-search-submit">Search</button>
            </form>
        </section>

        <section
            class="home-hero-section"
            data-component="hero-category-grid"
            aria-label="Browse rug categories"
        >
            <div class="hero-media" data-populate="hero-media" aria-live="polite" aria-atomic="true">
                <!-- Hero category focus is rendered here -->
            </div>
            <div class="hero-filmstrip-wrapper">
                <ul class="hero-filmstrip" data-populate="hero-categories" role="list">
                    <!-- Hero category tiles populated from getHomeContent().heroCategories -->
                </ul>
            </div>
        </section>

        <section
            class="home-featured-section"
            data-component="featured-collections-section"
            aria-label="Featured rug collections"
        >
            <header class="section-header">
                <h2 class="section-title">Featured Collections</h2>
            </header>
            <div class="featured-collections-strip">
                <ul class="featured-collections-list" data-populate="featured-collections" role="list">
                    <!-- Featured collections populated from getHomeContent().featuredCollections -->
                </ul>
            </div>
        </section>

        <section
            class="home-recently-viewed-section"
            id="recentlyViewedSection"
            data-component="recently-viewed-carousel"
            aria-label="Recently viewed rugs"
        >
            <header class="section-header">
                <h2 class="section-title">Recently Viewed</h2>
                <div class="section-feedback" data-populate="recently-viewed-feedback" aria-live="polite" aria-atomic="true"></div>
            </header>
            <div class="recently-viewed-strip-container">
                <button
                    type="button"
                    class="carousel-control carousel-control--prev"
                    data-action="recently-viewed-prev"
                    aria-label="Scroll recently viewed left"
                >
                    &lt;
                </button>
                <div class="recently-viewed-strip" data-populate="recently-viewed" role="list">
                    <!-- Recently viewed product cards populated from getRecentlyViewedItems() -->
                </div>
                <button
                    type="button"
                    class="carousel-control carousel-control--next"
                    data-action="recently-viewed-next"
                    aria-label="Scroll recently viewed right"
                >
                    &gt;
                </button>
            </div>
        </section>

        <div class="home-loader-overlay" data-component="home-content-loader" hidden aria-hidden="true">
            <div class="home-loader-spinner" role="status" aria-live="polite" aria-atomic="true">
                <span class="sr-only">Loading home content</span>
            </div>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="footer-inner">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav-list">
                    <li class="footer-nav-item">
                        <a href="about.html" title="Learn more about our rug brand and mission">About Us</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="contact.html" title="Customer support and contact information">Contact &amp; Help</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="shipping_returns.html" title="Details on shipping options, delivery, and return policies">Shipping &amp; Returns</a>
                    </li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span class="footer-year">2024</span> Rug Gallery. All rights reserved.</p>
        </div>
    </footer>

    <!-- SDK / business logic -->
    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const focusParam = urlParams.get('focus');
        const sectionParam = urlParams.get('section');
        const feedbackParam = urlParams.get('feedback');
        const feedbackProductId = urlParams.get('productId');

        const loaderOverlay = document.querySelector('[data-component="home-content-loader"]');

        function setLoading(isLoading) {
            if (!loaderOverlay) return;
            if (isLoading) {
                loaderOverlay.hidden = false;
                loaderOverlay.setAttribute('aria-hidden', 'false');
            } else {
                loaderOverlay.hidden = true;
                loaderOverlay.setAttribute('aria-hidden', 'true');
            }
        }

        const homeState = {
            heroCategories: [],
            featuredCollections: [],
            recentlyViewedItems: [],
            selectedHeroCategoryKey: null,
            urlState: {
                focus: focusParam,
                section: sectionParam,
                feedback: feedbackParam,
                feedbackProductId: feedbackProductId
            }
        };

        function renderMainNavigation(container, categories) {
            if (!container) return;
            container.innerHTML = '';

            // Home link
            var homeItem = document.createElement('li');
            homeItem.className = 'nav-item';
            var homeLink = document.createElement('a');
            homeLink.href = 'index.html';
            homeLink.title = 'Homepage with featured rugs, promotions, and search';
            homeLink.textContent = 'Home';
            homeItem.appendChild(homeLink);
            container.appendChild(homeItem);

            if (Array.isArray(categories) && categories.length > 0) {
                categories.slice().sort(function(a, b) {
                    var aOrder = typeof a.displayOrder === 'number' ? a.displayOrder : 0;
                    var bOrder = typeof b.displayOrder === 'number' ? b.displayOrder : 0;
                    return aOrder - bOrder;
                }).forEach(function(cat) {
                    if (!cat || !cat.categoryKey) return;
                    var li = document.createElement('li');
                    li.className = 'nav-item';
                    if (cat.categoryKey === 'sale_rugs') {
                        li.className += ' nav-item--sale';
                    }
                    var link = document.createElement('a');
                    link.href = 'products.html?categoryId=' + encodeURIComponent(cat.categoryKey);
                    link.title = cat.name || 'Browse rugs';
                    link.textContent = cat.name || '';
                    li.appendChild(link);
                    container.appendChild(li);
                });
            }

            // Wishlist & Cart utility items
            var wishlistItem = document.createElement('li');
            wishlistItem.className = 'nav-item nav-item--utility';
            var wishlistLink = document.createElement('a');
            wishlistLink.href = 'wishlist.html';
            wishlistLink.title = 'View and manage saved rugs and favorites';
            wishlistLink.textContent = 'Wishlist';
            wishlistItem.appendChild(wishlistLink);
            container.appendChild(wishlistItem);

            var cartItem = document.createElement('li');
            cartItem.className = 'nav-item nav-item--utility';
            var cartLink = document.createElement('a');
            cartLink.href = 'cart.html';
            cartLink.title = 'Shopping cart with selected rugs and totals';
            cartLink.textContent = 'Cart';
            cartItem.appendChild(cartLink);
            container.appendChild(cartItem);
        }

        function getCurrentHeroCategory(state) {
            if (!state.heroCategories || state.heroCategories.length === 0) return null;
            if (state.selectedHeroCategoryKey) {
                for (var i = 0; i < state.heroCategories.length; i += 1) {
                    var c = state.heroCategories[i];
                    if (c && c.categoryKey === state.selectedHeroCategoryKey) {
                        return c;
                    }
                }
            }
            return state.heroCategories[0] || null;
        }

        function renderHeroMedia(container, state) {
            if (!container) return;
            container.innerHTML = '';
            var current = getCurrentHeroCategory(state);
            var frame = document.createElement('div');
            frame.className = 'hero-media-frame';

            var inner = document.createElement('div');
            inner.className = 'hero-media-inner';

            var label = document.createElement('div');
            label.className = 'hero-media-label';
            if (current) {
                label.textContent = current.name || '';
                label.setAttribute('data-category-key', current.categoryKey || '');
            } else {
                label.textContent = '';
            }

            inner.appendChild(label);
            frame.appendChild(inner);
            container.appendChild(frame);
        }

        function renderHeroCategoryStrip(container, state) {
            if (!container) return;
            container.innerHTML = '';
            if (!Array.isArray(state.heroCategories) || state.heroCategories.length === 0) return;

            state.heroCategories.forEach(function(cat) {
                if (!cat || !cat.categoryKey) return;
                var li = document.createElement('li');
                li.className = 'hero-category-item';
                if (cat.categoryKey === state.selectedHeroCategoryKey) {
                    li.classList.add('is-active');
                }
                if (cat.categoryKey === 'sale_rugs') {
                    li.classList.add('is-sale');
                }

                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'hero-category-button';
                btn.dataset.action = 'hero-category-click';
                btn.dataset.categoryKey = cat.categoryKey;
                btn.textContent = cat.name || '';

                li.appendChild(btn);
                container.appendChild(li);
            });
        }

        function renderFeaturedCollections(container, collections) {
            if (!container) return;
            container.innerHTML = '';
            if (!Array.isArray(collections) || collections.length === 0) return;

            collections.forEach(function(col) {
                if (!col || !col.categoryKey) return;
                var li = document.createElement('li');
                li.className = 'featured-collection-card';
                if (col.categoryKey === 'sale_rugs') {
                    li.classList.add('is-sale');
                }
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'featured-collection-button';
                btn.dataset.action = 'featured-collection-click';
                btn.dataset.categoryKey = col.categoryKey;

                var titleEl = document.createElement('div');
                titleEl.className = 'featured-collection-title';
                titleEl.textContent = col.title || '';
                btn.appendChild(titleEl);

                if (col.highlightText) {
                    var highlightEl = document.createElement('div');
                    highlightEl.className = 'featured-collection-highlight';
                    highlightEl.textContent = col.highlightText;
                    btn.appendChild(highlightEl);
                }

                li.appendChild(btn);
                container.appendChild(li);
            });
        }

        function formatPriceRange(minPrice, maxPrice) {
            var hasMin = typeof minPrice === 'number';
            var hasMax = typeof maxPrice === 'number';
            if (hasMin && hasMax && minPrice !== maxPrice) {
                return '$' + minPrice.toFixed(0) + ' - $' + maxPrice.toFixed(0);
            }
            if (hasMin) {
                return '$' + minPrice.toFixed(0);
            }
            return '';
        }

        function renderRecentlyViewed(container, state) {
            if (!container) return;
            container.innerHTML = '';
            var items = Array.isArray(state.recentlyViewedItems) ? state.recentlyViewedItems : [];

            if (items.length === 0) {
                var empty = document.createElement('p');
                empty.className = 'recently-viewed-empty';
                empty.textContent = 'You have not viewed any rugs yet.';
                container.appendChild(empty);
                return;
            }

            var row = document.createElement('div');
            row.className = 'recently-viewed-items';

            items.forEach(function(item) {
                if (!item || !item.productId) return;

                var card = document.createElement('article');
                card.className = 'recently-viewed-card';
                card.dataset.productId = item.productId;

                var mainBtn = document.createElement('button');
                mainBtn.type = 'button';
                mainBtn.className = 'recently-viewed-main';
                mainBtn.dataset.action = 'recently-viewed-open';
                mainBtn.dataset.productId = item.productId;

                if (item.thumbnailUrl) {
                    var img = document.createElement('img');
                    img.src = item.thumbnailUrl;
                    img.alt = item.name || 'Recently viewed rug';
                    img.loading = 'lazy';
                    img.className = 'recently-viewed-image';
                    mainBtn.appendChild(img);
                }

                var meta = document.createElement('div');
                meta.className = 'recently-viewed-meta';

                var nameEl = document.createElement('div');
                nameEl.className = 'recently-viewed-name';
                nameEl.textContent = item.name || '';
                meta.appendChild(nameEl);

                var priceText = formatPriceRange(item.minPrice, item.maxPrice);
                if (priceText) {
                    var priceEl = document.createElement('div');
                    priceEl.className = 'recently-viewed-price';
                    priceEl.textContent = priceText;
                    meta.appendChild(priceEl);
                }

                mainBtn.appendChild(meta);

                var wishlistBtn = document.createElement('button');
                wishlistBtn.type = 'button';
                wishlistBtn.className = 'recently-viewed-wishlist';
                wishlistBtn.dataset.action = 'recently-viewed-wishlist';
                wishlistBtn.dataset.productId = item.productId;
                wishlistBtn.setAttribute('aria-label', 'Save to wishlist');
                wishlistBtn.innerHTML = 'a';

                var status = document.createElement('div');
                status.className = 'recently-viewed-wishlist-status';
                status.setAttribute('aria-live', 'polite');
                status.setAttribute('aria-atomic', 'true');

                card.appendChild(mainBtn);
                card.appendChild(wishlistBtn);
                card.appendChild(status);

                row.appendChild(card);
            });

            container.appendChild(row);
        }

        function renderRecentlyViewedFeedback(container, state) {
            if (!container) return;
            container.textContent = '';
            var feedback = state.urlState.feedback;
            if (!feedback) return;

            var message = '';
            if (feedback === 'wishlist_added') {
                message = 'Item was added to your wishlist.';
            } else if (feedback === 'wishlist_error') {
                message = 'We could not update your wishlist.';
            }
            if (!message) return;

            var span = document.createElement('span');
            span.textContent = message;
            container.appendChild(span);
        }

        function highlightRecentlyViewedProduct(productId, feedbackStatus) {
            if (!productId) return;
            var cards = document.querySelectorAll('.recently-viewed-card');
            cards.forEach(function(card) {
                if (card.dataset.productId === productId) {
                    card.classList.add('is-highlighted');
                    var statusEl = card.querySelector('.recently-viewed-wishlist-status');
                    if (statusEl) {
                        if (feedbackStatus === 'wishlist_added') {
                            statusEl.textContent = 'Saved to wishlist.';
                        } else if (feedbackStatus === 'wishlist_error') {
                            statusEl.textContent = 'Wishlist could not be updated.';
                        }
                    }
                    window.setTimeout(function() {
                        card.classList.remove('is-highlighted');
                    }, 4000);
                }
            });
        }

        function handleHomeSearchSubmit(event) {
            event.preventDefault();
            var form = event.target;
            var input = form.querySelector('input[name="query"]');
            if (!input) return;
            var term = (input.value || '').trim();
            if (!term) return;
            var targetUrl = 'search.html?query=' + encodeURIComponent(term);
            window.location.href = targetUrl;
        }

        function handleWishlistClick(button) {
            var productId = button.dataset.productId;
            var variantId = button.dataset.variantId || undefined;
            if (!productId) return;

            button.disabled = true;
            try {
                var result = WebsiteSDK.addProductToWishlist(productId, variantId);
                var statusEl = button.parentElement.querySelector('.recently-viewed-wishlist-status');
                if (result && result.success) {
                    button.classList.add('is-saved');
                    button.setAttribute('aria-pressed', 'true');
                    if (statusEl) {
                        statusEl.textContent = 'Saved to wishlist.';
                    }
                } else {
                    button.classList.remove('is-saved');
                    button.setAttribute('aria-pressed', 'false');
                    if (statusEl) {
                        statusEl.textContent = (result && result.message) || 'Could not save to wishlist.';
                    }
                }
            } catch (err) {
                console.error('Error adding product to wishlist', err);
                var status = button.parentElement.querySelector('.recently-viewed-wishlist-status');
                if (status) {
                    status.textContent = 'Could not save to wishlist. Please try again.';
                }
            } finally {
                button.disabled = false;
            }
        }

        function handleRecentlyViewedScroll(action) {
            var strip = document.querySelector('.recently-viewed-strip');
            if (!strip) return;
            var direction = action === 'recently-viewed-next' ? 1 : -1;
            var amount = strip.clientWidth * 0.8;
            strip.scrollBy({ left: direction * amount, behavior: 'smooth' });
        }

        function setupGlobalEventHandlers() {
            document.addEventListener('submit', function(event) {
                var form = event.target;
                if (!(form instanceof HTMLFormElement)) return;
                var action = form.dataset.action;
                if (action === 'home-search') {
                    handleHomeSearchSubmit(event);
                }
            });

            document.addEventListener('click', function(event) {
                var actionEl = event.target.closest('[data-action]');
                if (!actionEl) return;
                var action = actionEl.dataset.action;

                if (action === 'hero-category-click') {
                    var categoryKey = actionEl.dataset.categoryKey;
                    if (!categoryKey) return;
                    window.location.href = 'products.html?categoryId=' + encodeURIComponent(categoryKey);
                } else if (action === 'featured-collection-click') {
                    var colKey = actionEl.dataset.categoryKey;
                    if (!colKey) return;
                    window.location.href = 'products.html?categoryId=' + encodeURIComponent(colKey);
                } else if (action === 'recently-viewed-open') {
                    var productId = actionEl.dataset.productId;
                    if (!productId) return;
                    window.location.href = 'product.html?id=' + encodeURIComponent(productId);
                } else if (action === 'recently-viewed-wishlist') {
                    event.preventDefault();
                    event.stopPropagation();
                    handleWishlistClick(actionEl);
                } else if (action === 'recently-viewed-prev' || action === 'recently-viewed-next') {
                    event.preventDefault();
                    handleRecentlyViewedScroll(action);
                }
            });
        }

        function initializePage() {
            setLoading(true);
            try {
                var navCategories = WebsiteSDK.getMainNavigationCategories();
                var homeContent = WebsiteSDK.getHomeContent();
                var recentlyViewedResult = WebsiteSDK.getRecentlyViewedItems(12);

                homeState.heroCategories = Array.isArray(homeContent && homeContent.heroCategories) ? homeContent.heroCategories : [];
                homeState.featuredCollections = Array.isArray(homeContent && homeContent.featuredCollections) ? homeContent.featuredCollections : [];
                homeState.recentlyViewedItems = recentlyViewedResult && Array.isArray(recentlyViewedResult.items)
                    ? recentlyViewedResult.items
                    : [];

                if (homeState.heroCategories.length > 0) {
                    homeState.selectedHeroCategoryKey = homeState.heroCategories[0].categoryKey || null;
                }

                var populateElements = document.querySelectorAll('[data-populate]');
                populateElements.forEach(function(element) {
                    var type = element.dataset.populate;
                    if (type === 'main-navigation') {
                        renderMainNavigation(element, navCategories);
                    } else if (type === 'hero-media') {
                        renderHeroMedia(element, homeState);
                    } else if (type === 'hero-categories') {
                        renderHeroCategoryStrip(element, homeState);
                    } else if (type === 'featured-collections') {
                        renderFeaturedCollections(element, homeState.featuredCollections);
                    } else if (type === 'recently-viewed') {
                        renderRecentlyViewed(element, homeState);
                    } else if (type === 'recently-viewed-feedback') {
                        renderRecentlyViewedFeedback(element, homeState);
                    }
                });

                if (homeState.urlState.focus === 'search') {
                    var searchInput = document.getElementById('homeSearchInput');
                    if (searchInput) {
                        searchInput.focus();
                    }
                }

                if (homeState.urlState.section === 'recently_viewed') {
                    var rvSection = document.querySelector('[data-component="recently-viewed-carousel"]');
                    if (rvSection) {
                        rvSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }

                if (homeState.urlState.feedback && homeState.urlState.feedbackProductId) {
                    highlightRecentlyViewedProduct(homeState.urlState.feedbackProductId, homeState.urlState.feedback);
                }
            } catch (error) {
                console.error('Error initializing Home page', error);
            } finally {
                setLoading(false);
            }
        }

        setupGlobalEventHandlers();
        initializePage();
    });
    </script>
</body>
</html>
