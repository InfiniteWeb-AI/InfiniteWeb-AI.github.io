<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Details | Rug Gallery</title>
    <meta name="description" content="Collects the shopper’s shipping address as a guest, initializes or resumes a checkout session tied to the current cart, shows a concise order summary, and on successful validation directs the user to the Shipping Options step.">

    <!-- Typography: Space Grotesk (headings) & IBM Plex Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

    <!-- Framework stylesheet -->
    
    <!-- Page-specific stylesheet -->
    <link rel="stylesheet" href="checkout_shipping.css">
</head>
<body class="site">
    <header class="site-header" role="banner">
        <div class="header-inner">
            <div class="site-brand" aria-label="Rug Gallery - Home rugs">
                <span class="brand-title">Rug Gallery</span>
                <span class="brand-tagline">Home Rugs</span>
            </div>

            <nav class="primary-nav" aria-label="Primary navigation">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" title="Homepage with featured rugs, promotions, and search">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=rugs" title="All rugs with access to subcategories and filters">Rugs</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=living_room_rugs" title="Living room rugs including 5' x 7' and 9' x 12' sizes">Living Room</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=kitchen_rugs" title="Kitchen rugs and runners including 2' x 8' non-slip options">Kitchen</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=kids_rugs" title="Kids' room rugs in round, rectangular, and runner shapes">Kids' Rugs</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=outdoor_rugs" title="Outdoor rugs including navy 5' x 7' options">Outdoor</a>
                    </li>
                    <li class="nav-item nav-item--sale">
                        <a href="products.html?categoryId=sale_rugs" title="Sale and clearance rugs for budget-friendly purchases">Sale</a>
                    </li>
                    <li class="nav-item nav-item--utility">
                        <a href="wishlist.html" title="View and manage saved rugs and favorites">Wishlist</a>

                        <a href="cart.html" title="Shopping cart with selected rugs and totals">Cart</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-main" role="main">
        <div class="checkout-shipping" data-component="checkout-shipping-page">
            <!-- Full-viewport session loader overlay -->
            <div class="checkout-shipping-session-loader" data-populate="session-loader" data-component="checkout-shipping-session-loader" aria-live="polite" aria-busy="true"></div>

            <div class="checkout-shipping-layout">
                <!-- Centered vertical shipping address form column -->
                <section class="checkout-shipping-form-area" aria-label="Shipping address">
                    <div class="checkout-shipping-form-column">
                        <!-- Slim inline error bar above the form fields -->
                        <div class="checkout-shipping-error-container" data-populate="error-feedback" data-component="checkout-shipping-error-feedback"></div>

                        <!-- Shipping address form (rendered via JS) -->
                        <div class="checkout-shipping-address-container" data-populate="shipping-address-form" data-component="checkout-shipping-address-form"></div>
                    </div>
                </section>

                <!-- Bottom horizontal band: order summary + navigation controls -->
                <section class="checkout-shipping-bottom-strip" aria-label="Order summary and navigation">
                    <div class="checkout-shipping-bottom-inner">
                        <section class="checkout-shipping-order-summary" data-populate="order-summary" data-component="checkout-shipping-order-summary" aria-label="Order summary"></section>

                        <div class="checkout-shipping-navigation" data-component="checkout-shipping-navigation-controls">
                            <a href="cart.html" class="nav-link nav-link--back" data-action="back-to-cart">Back to Cart</a>
                            <button type="button" class="btn btn-primary nav-btn--continue" data-action="continue-to-shipping" aria-disabled="true" disabled>
                                <span>Continue to Shipping</span>
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">

            <nav class="footer-nav" aria-label="Footer navigation">

                        <a href="about.html" title="Learn more about our rug brand and mission">About Us</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="contact.html" title="Customer support and contact information">Contact &amp; Help</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="shipping_returns.html" title="Details on shipping options, delivery, and return policies">Shipping &amp; Returns</a>
                    </li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span class="footer-year">2024</span> Rug Gallery. All rights reserved.</p>
        </div>
    </footer>

    <!-- SDK / business logic layer -->
    <script src="business_logic.js"></script>

    <!-- Page UI logic -->
    <script>
    (function() {
        'use strict';

        var shippingPageState = {
            checkoutSessionId: null,
            step: null,
            cartSummary: null,
            shippingAddress: {
                fullName: '',
                streetLine1: '',
                streetLine2: '',
                city: '',
                stateRegion: '',
                postalCode: '',
                country: '',
                phone: '',
                email: ''
            },
            clientErrors: {},
            serverErrors: {},
            nonFieldError: '',
            lastSessionError: '',
            canRetrySessionLoad: false,
            isInitializing: false,
            isSubmittingAddress: false
        };

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatCurrency(amount, currencyCode) {
            var value = typeof amount === 'number' ? amount : 0;
            var code = (currencyCode || 'usd').toUpperCase();
            if (code === 'USD') {
                code = 'USD';
            }
            try {
                var formatter = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: code
                });
                return formatter.format(value);
            } catch (e) {
                var prefix = '$';
                return prefix + value.toFixed(2);
            }
        }

        function getFieldError(fieldName) {
            var serverErrors = shippingPageState.serverErrors || {};
            var clientErrors = shippingPageState.clientErrors || {};
            var serverMsg = serverErrors[fieldName];
            var clientMsg = clientErrors[fieldName];
            return serverMsg || clientMsg || '';
        }

        function renderSessionLoader(container) {
            if (!container) {
                return;
            }
            if (shippingPageState.isInitializing) {
                container.style.display = 'block';
                container.innerHTML = '\n                    <div class="checkout-session-loader-overlay">\n                        <div class="loader-spinner" role="status" aria-label="Loading checkout">\n                            <span class="loader-dot"></span>\n                        </div>\n                    </div>\n                ';
            } else {
                container.innerHTML = '';
                container.style.display = 'none';
            }
        }

        function renderErrorFeedback(container) {
            if (!container) {
                return;
            }
            var message = shippingPageState.nonFieldError || shippingPageState.lastSessionError || '';
            if (!message) {
                container.innerHTML = '';
                container.style.display = 'none';
                return;
            }
            var showRetry = !!shippingPageState.lastSessionError && !!shippingPageState.canRetrySessionLoad;
            container.style.display = 'block';
            container.innerHTML = '\n                <div class="checkout-error-bar" role="alert">\n                    <p class="checkout-error-message">' + escapeHtml(message) + '</p>\n                    ' + (showRetry ? '<button type="button" class="btn btn-ghost btn-retry" data-action="retry-session-load">Retry</button>' : '') + '\n                </div>\n            ';
        }

        function renderShippingAddressForm(container) {
            if (!container) {
                return;
            }

            var addr = shippingPageState.shippingAddress || {};
            var countries = ['United States', 'Canada', 'United Kingdom', 'Australia', 'Other'];
            var countryOptionsHtml = '';
            for (var i = 0; i < countries.length; i++) {
                var label = countries[i];
                var selected = addr.country === label ? ' selected' : '';
                countryOptionsHtml += '<option value="' + escapeHtml(label) + '"' + selected + '>' + escapeHtml(label) + '</option>';
            }

            var fullNameError = getFieldError('fullName');
            var street1Error = getFieldError('streetLine1');
            var street2Error = getFieldError('streetLine2');
            var cityError = getFieldError('city');
            var stateError = getFieldError('stateRegion');
            var postalError = getFieldError('postalCode');
            var countryError = getFieldError('country');
            var phoneError = getFieldError('phone');
            var emailError = getFieldError('email');

            function errorBlock(fieldKey, errorMessage) {
                if (!errorMessage) {
                    return '';
                }
                return '<p class="field-error" id="shipping-' + fieldKey + '-error">' + escapeHtml(errorMessage) + '</p>';
            }

            function ariaForField(fieldKey, errorMessage) {
                var attrs = '';
                if (errorMessage) {
                    attrs += ' aria-invalid="true" aria-describedby="shipping-' + fieldKey + '-error"';
                }
                return attrs;
            }

            container.innerHTML = '\n                <form class="shipping-address-form" data-action="submit-shipping-address" novalidate>\n                    <h1 class="checkout-step-title">Shipping details</h1>\n\n                    <div class="form-field">\n                        <label for="shipping-fullName">Full name</label>\n                        <input type="text" id="shipping-fullName" name="fullName" data-field="fullName" autocomplete="name"' + ariaForField('fullName', fullNameError) + '\n                            value="' + escapeHtml(addr.fullName || '') + '" required>\n                        ' + errorBlock('fullName', fullNameError) + '\n                    </div>\n\n                    <div class="form-field">\n                        <label for="shipping-streetLine1">Street address</label>\n                        <input type="text" id="shipping-streetLine1" name="streetLine1" data-field="streetLine1" autocomplete="address-line1"' + ariaForField('streetLine1', street1Error) + '\n                            value="' + escapeHtml(addr.streetLine1 || '') + '" required>\n                        ' + errorBlock('streetLine1', street1Error) + '\n                    </div>\n\n                    <div class="form-field">\n                        <label for="shipping-streetLine2">Apartment, suite, etc. <span class="field-optional">(optional)</span></label>\n                        <input type="text" id="shipping-streetLine2" name="streetLine2" data-field="streetLine2" autocomplete="address-line2"' + ariaForField('streetLine2', street2Error) + '\n                            value="' + escapeHtml(addr.streetLine2 || '') + '">\n                        ' + errorBlock('streetLine2', street2Error) + '\n                    </div>\n\n                    <div class="form-field form-field--row">\n                        <div class="form-field__col">\n                            <label for="shipping-city">City</label>\n                            <input type="text" id="shipping-city" name="city" data-field="city" autocomplete="address-level2"' + ariaForField('city', cityError) + '\n                                value="' + escapeHtml(addr.city || '') + '" required>\n                            ' + errorBlock('city', cityError) + '\n                        </div>\n                        <div class="form-field__col">\n                            <label for="shipping-stateRegion">State / Region</label>\n                            <input type="text" id="shipping-stateRegion" name="stateRegion" data-field="stateRegion" autocomplete="address-level1"' + ariaForField('stateRegion', stateError) + '\n                                value="' + escapeHtml(addr.stateRegion || '') + '" required>\n                            ' + errorBlock('stateRegion', stateError) + '\n                        </div>\n                    </div>\n\n                    <div class="form-field form-field--row">\n                        <div class="form-field__col">\n                            <label for="shipping-postalCode">Postal code</label>\n                            <input type="text" id="shipping-postalCode" name="postalCode" data-field="postalCode" autocomplete="postal-code"' + ariaForField('postalCode', postalError) + '\n                                value="' + escapeHtml(addr.postalCode || '') + '" required>\n                            ' + errorBlock('postalCode', postalError) + '\n                        </div>\n                        <div class="form-field__col">\n                            <label for="shipping-country">Country</label>\n                            <select id="shipping-country" name="country" data-field="country"' + ariaForField('country', countryError) + ' required>\n                                <option value="">Select country</option>\n                                ' + countryOptionsHtml + '\n                            </select>\n                            ' + errorBlock('country', countryError) + '\n                        </div>\n                    </div>\n\n                    <div class="form-field">\n                        <label for="shipping-phone">Phone</label>\n                        <input type="tel" id="shipping-phone" name="phone" data-field="phone" autocomplete="tel"' + ariaForField('phone', phoneError) + '\n                            value="' + escapeHtml(addr.phone || '') + '" required>\n                        ' + errorBlock('phone', phoneError) + '\n                    </div>\n\n                    <div class="form-field">\n                        <label for="shipping-email">Email</label>\n                        <input type="email" id="shipping-email" name="email" data-field="email" autocomplete="email"' + ariaForField('email', emailError) + '\n                            value="' + escapeHtml(addr.email || '') + '" required>\n                        ' + errorBlock('email', emailError) + '\n                    </div>\n                </form>\n            ';
        }

        function renderOrderSummary(container, cartSummary) {
            if (!container) {
                return;
            }

            if (!cartSummary || !cartSummary.items || !cartSummary.items.length) {
                container.innerHTML = '\n                    <div class="order-summary-empty">\n                        <p>Your cart is empty.</p>\n                    </div>\n                ';
                return;
            }

            var items = cartSummary.items || [];
            var itemCount = 0;
            for (var i = 0; i < items.length; i++) {
                var qty = items[i].quantity || 0;
                itemCount += qty;
            }

            var itemsHtml = '';
            for (var j = 0; j < items.length; j++) {
                var item = items[j];
                var parts = [];
                if (item.productName) {
                    parts.push(item.productName);
                }
                if (item.variantSizeLabel) {
                    parts.push(item.variantSizeLabel);
                }
                if (item.variantColor) {
                    parts.push(item.variantColor);
                }
                var label = parts.join(' · ');
                var lineSubtotal = formatCurrency(item.lineSubtotal || 0, cartSummary.currency || 'usd');
                itemsHtml += '\n                    <li class="order-summary-thumb" data-index="' + j + '">\n                        <div class="thumb-frame">\n                            <div class="thumb-placeholder" aria-hidden="true"></div>\n                        </div>\n                        <div class="thumb-meta">\n                            <span class="thumb-label">' + escapeHtml(label) + '</span>\n                            <span class="thumb-qty">×' + escapeHtml(item.quantity || 1) + '</span>\n                            <span class="thumb-price">' + escapeHtml(lineSubtotal) + '</span>\n                        </div>\n                    </li>\n                ';
            }

            var subtotal = formatCurrency(cartSummary.subtotal || 0, cartSummary.currency || 'usd');
            var discountTotal = cartSummary.discountTotal ? formatCurrency(cartSummary.discountTotal, cartSummary.currency || 'usd') : null;
            var shippingTotal = typeof cartSummary.shippingTotal === 'number' ? formatCurrency(cartSummary.shippingTotal, cartSummary.currency || 'usd') : null;
            var taxTotal = typeof cartSummary.taxTotal === 'number' ? formatCurrency(cartSummary.taxTotal, cartSummary.currency || 'usd') : null;
            var total = formatCurrency(cartSummary.total || 0, cartSummary.currency || 'usd');

            container.innerHTML = '\n                <div class="order-summary-header">\n                    <span class="order-summary-label">In your cart</span>\n                    <span class="order-summary-count">' + escapeHtml(itemCount) + ' item' + (itemCount === 1 ? '' : 's') + '</span>\n                </div>\n                <div class="order-summary-body">\n                    <ul class="order-summary-thumbs" aria-label="Rugs in your order">\n                        ' + itemsHtml + '\n                    </ul>\n                    <div class="order-summary-totals">\n                        <dl>\n                            <div class="order-summary-row">\n                                <dt>Subtotal</dt>\n                                <dd>' + escapeHtml(subtotal) + '</dd>\n                            </div>\n                            ' + (discountTotal ? '<div class="order-summary-row order-summary-row--discount"><dt>Discounts</dt><dd>- ' + escapeHtml(discountTotal) + '</dd></div>' : '') + '\n                            ' + (shippingTotal !== null ? '<div class="order-summary-row"><dt>Shipping</dt><dd>' + escapeHtml(shippingTotal) + '</dd></div>' : '') + '\n                            ' + (taxTotal !== null ? '<div class="order-summary-row"><dt>Tax</dt><dd>' + escapeHtml(taxTotal) + '</dd></div>' : '') + '\n                            <div class="order-summary-row order-summary-row--total">\n                                <dt>Total</dt>\n                                <dd>' + escapeHtml(total) + '</dd>\n                            </div>\n                        </dl>\n                    </div>\n                </div>\n            ';
        }

        function updateNavigationControls() {
            var continueBtn = document.querySelector('[data-action="continue-to-shipping"]');
            if (!continueBtn) {
                return;
            }
            var disabled = shippingPageState.isInitializing || shippingPageState.isSubmittingAddress;
            continueBtn.disabled = !!disabled;
            continueBtn.setAttribute('aria-disabled', disabled ? 'true' : 'false');
        }

        function renderAllPopulatedElements() {
            var elements = document.querySelectorAll('[data-populate]');
            for (var i = 0; i < elements.length; i++) {
                var el = elements[i];
                var type = el.getAttribute('data-populate');
                if (type === 'session-loader') {
                    renderSessionLoader(el);
                } else if (type === 'error-feedback') {
                    renderErrorFeedback(el);
                } else if (type === 'shipping-address-form') {
                    renderShippingAddressForm(el);
                } else if (type === 'order-summary') {
                    renderOrderSummary(el, shippingPageState.cartSummary);
                }
            }
            updateNavigationControls();
        }

        function getCheckoutSessionIdFromUrl() {
            var search = window.location.search || '';
            var params = new URLSearchParams(search);
            var id = params.get('checkoutSessionId');
            return id;
        }

        function updateUrlWithSessionId(sessionId) {
            if (!sessionId) {
                return;
            }
            var currentSearch = window.location.search || '';
            var params = new URLSearchParams(currentSearch);
            params.set('checkoutSessionId', sessionId);
            var newUrl = window.location.pathname + '?' + params.toString();
            window.history.replaceState({}, '', newUrl);
        }

        function validateShippingAddress(address) {
            var errors = {};

            function isEmpty(value) {
                return !value || !String(value).trim();
            }

            if (isEmpty(address.fullName)) {
                errors.fullName = 'Full name is required.';
            } else if (String(address.fullName).trim().length < 2) {
                errors.fullName = 'Enter your full name.';
            }

            if (isEmpty(address.streetLine1)) {
                errors.streetLine1 = 'Street address is required.';
            }

            if (isEmpty(address.city)) {
                errors.city = 'City is required.';
            }

            if (isEmpty(address.stateRegion)) {
                errors.stateRegion = 'State or region is required.';
            }

            if (isEmpty(address.postalCode)) {
                errors.postalCode = 'Postal code is required.';
            } else {
                var postal = String(address.postalCode).trim();
                if (!/^[A-Za-z0-9\-\s]{3,10}$/.test(postal)) {
                    errors.postalCode = 'Enter a valid postal code.';
                }
            }

            if (isEmpty(address.country)) {
                errors.country = 'Country is required.';
            }

            if (isEmpty(address.phone)) {
                errors.phone = 'Phone number is required.';
            } else {
                var phone = String(address.phone).trim();
                if (!/^[0-9\s\-+()]{7,}$/.test(phone)) {
                    errors.phone = 'Enter a valid phone number.';
                }
            }

            if (isEmpty(address.email)) {
                errors.email = 'Email is required.';
            } else {
                var email = String(address.email).trim();
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    errors.email = 'Enter a valid email address.';
                }
            }

            return errors;
        }

        function validateSingleField(fieldName, value) {
            var tempAddress = {};
            var currentAddress = shippingPageState.shippingAddress || {};
            tempAddress.fullName = currentAddress.fullName;
            tempAddress.streetLine1 = currentAddress.streetLine1;
            tempAddress.streetLine2 = currentAddress.streetLine2;
            tempAddress.city = currentAddress.city;
            tempAddress.stateRegion = currentAddress.stateRegion;
            tempAddress.postalCode = currentAddress.postalCode;
            tempAddress.country = currentAddress.country;
            tempAddress.phone = currentAddress.phone;
            tempAddress.email = currentAddress.email;
            tempAddress[fieldName] = value;

            var errors = validateShippingAddress(tempAddress);
            var result = {};
            if (errors[fieldName]) {
                result[fieldName] = errors[fieldName];
            }
            return result;
        }

        function handleAddressSubmission() {
            if (!shippingPageState.checkoutSessionId) {
                shippingPageState.nonFieldError = 'Your checkout session is not ready yet. Please wait a moment and try again.';
                renderAllPopulatedElements();
                return;
            }

            if (shippingPageState.isSubmittingAddress) {
                return;
            }

            shippingPageState.nonFieldError = '';
            shippingPageState.serverErrors = {};

            var address = shippingPageState.shippingAddress || {};
            var clientErrors = validateShippingAddress(address);
            shippingPageState.clientErrors = clientErrors;

            var hasErrors = false;
            for (var key in clientErrors) {
                if (Object.prototype.hasOwnProperty.call(clientErrors, key)) {
                    hasErrors = true;
                    break;
                }
            }

            if (hasErrors) {
                renderAllPopulatedElements();
                return;
            }

            shippingPageState.isSubmittingAddress = true;
            renderAllPopulatedElements();

            var result;
            try {
                result = WebsiteSDK.submitShippingAddress(shippingPageState.checkoutSessionId, {
                    fullName: address.fullName || '',
                    streetLine1: address.streetLine1 || '',
                    streetLine2: address.streetLine2 || '',
                    city: address.city || '',
                    stateRegion: address.stateRegion || '',
                    postalCode: address.postalCode || '',
                    country: address.country || '',
                    phone: address.phone || '',
                    email: address.email || ''
                });
            } catch (e) {
                shippingPageState.isSubmittingAddress = false;
                shippingPageState.nonFieldError = 'We could not save your address. Please try again.';
                renderAllPopulatedElements();
                return;
            }

            shippingPageState.isSubmittingAddress = false;

            if (result && result.validationErrors && result.validationErrors.length) {
                var serverErrors = {};
                var nonFieldMessages = [];
                for (var i = 0; i < result.validationErrors.length; i++) {
                    var err = result.validationErrors[i];
                    if (err.field) {
                        serverErrors[err.field] = err.message || 'Please check this field.';
                    } else if (err.message) {
                        nonFieldMessages.push(err.message);
                    }
                }
                shippingPageState.serverErrors = serverErrors;
                if (nonFieldMessages.length) {
                    shippingPageState.nonFieldError = nonFieldMessages.join(' ');
                }
                renderAllPopulatedElements();
                return;
            }

            if (result && result.success) {
                var finalSessionId = result.checkoutSessionId || shippingPageState.checkoutSessionId;
                if (result.step) {
                    shippingPageState.step = result.step;
                }
                var targetId = finalSessionId || shippingPageState.checkoutSessionId;
                if (targetId) {
                    window.location.href = 'checkout_shipping_options.html?checkoutSessionId=' + encodeURIComponent(targetId);
                    return;
                }
            }

            shippingPageState.nonFieldError = 'We could not save your address. Please check your details and try again.';
            renderAllPopulatedElements();
        }

        function initializeSession(options) {
            var opts = options || {};
            if (shippingPageState.isInitializing) {
                return;
            }

            shippingPageState.isInitializing = true;
            shippingPageState.lastSessionError = '';
            shippingPageState.canRetrySessionLoad = false;
            shippingPageState.nonFieldError = '';
            renderAllPopulatedElements();

            var urlSessionId = getCheckoutSessionIdFromUrl();
            var result;

            try {
                if (urlSessionId) {
                    result = WebsiteSDK.getCheckoutSessionDetails(urlSessionId);
                } else {
                    result = WebsiteSDK.startCheckoutSession();
                }

                if (!result || !result.cartSummary) {
                    window.location.href = 'cart.html';
                    return;
                }

                var step = result.step || 'shipping_details';
                var sessionId = result.checkoutSessionId || urlSessionId;

                if (step !== 'shipping_details') {
                    if (step === 'shipping_options' && sessionId) {
                        window.location.href = 'checkout_shipping_options.html?checkoutSessionId=' + encodeURIComponent(sessionId);
                        return;
                    }
                    window.location.href = 'cart.html';
                    return;
                }

                shippingPageState.checkoutSessionId = sessionId;
                shippingPageState.step = step;
                shippingPageState.cartSummary = result.cartSummary || null;

                var incomingAddress = result.shippingAddress || {};
                shippingPageState.shippingAddress = {
                    fullName: incomingAddress.fullName || '',
                    streetLine1: incomingAddress.streetLine1 || '',
                    streetLine2: incomingAddress.streetLine2 || '',
                    city: incomingAddress.city || '',
                    stateRegion: incomingAddress.stateRegion || '',
                    postalCode: incomingAddress.postalCode || '',
                    country: incomingAddress.country || '',
                    phone: incomingAddress.phone || '',
                    email: incomingAddress.email || ''
                };

                shippingPageState.clientErrors = {};
                shippingPageState.serverErrors = {};

                if (!urlSessionId && sessionId) {
                    updateUrlWithSessionId(sessionId);
                }
            } catch (e) {
                shippingPageState.lastSessionError = 'We could not load your checkout. Please try again.';
                shippingPageState.canRetrySessionLoad = true;
            } finally {
                shippingPageState.isInitializing = false;
                renderAllPopulatedElements();
            }
        }

        function setupEventHandlers() {
            document.addEventListener('submit', function(event) {
                var target = event.target;
                if (!target || !target.dataset) {
                    return;
                }
                var action = target.dataset.action;
                if (action === 'submit-shipping-address') {
                    event.preventDefault();
                    handleAddressSubmission();
                }
            });

            document.addEventListener('click', function(event) {
                var actionElement = event.target.closest('[data-action]');
                if (!actionElement) {
                    return;
                }
                var action = actionElement.dataset.action;
                if (action === 'continue-to-shipping') {
                    event.preventDefault();
                    handleAddressSubmission();
                } else if (action === 'retry-session-load') {
                    event.preventDefault();
                    initializeSession({ isRetry: true });
                } else if (action === 'back-to-cart') {
                    // Allow default navigation to cart.html
                }
            });

            document.addEventListener('input', function(event) {
                var target = event.target;
                if (!target || !target.dataset) {
                    return;
                }
                var field = target.dataset.field;
                if (!field) {
                    return;
                }
                var value = target.value;
                if (!shippingPageState.shippingAddress) {
                    shippingPageState.shippingAddress = {};
                }
                shippingPageState.shippingAddress[field] = value;
                if (shippingPageState.serverErrors && shippingPageState.serverErrors[field]) {
                    delete shippingPageState.serverErrors[field];
                }
            });

            document.addEventListener('blur', function(event) {
                var target = event.target;
                if (!target || !target.dataset) {
                    return;
                }
                var field = target.dataset.field;
                if (!field) {
                    return;
                }
                var value = target.value;
                var fieldErrors = validateSingleField(field, value);
                if (!shippingPageState.clientErrors) {
                    shippingPageState.clientErrors = {};
                }
                if (fieldErrors[field]) {
                    shippingPageState.clientErrors[field] = fieldErrors[field];
                } else if (shippingPageState.clientErrors[field]) {
                    delete shippingPageState.clientErrors[field];
                }
                renderAllPopulatedElements();
            }, true);
        }

        document.addEventListener('DOMContentLoaded', function() {
            setupEventHandlers();
            renderAllPopulatedElements();
            initializeSession({ isRetry: false });
        });
    })();
    </script>
</body>
</html>
