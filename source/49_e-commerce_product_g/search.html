<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | Rug Gallery</title>
    <meta name="description" content="Search and browse rug products by keyword with filter, sort, wishlist, and comparison actions.">

    <!-- Typography: Space Grotesk (headings) & IBM Plex Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

    <!-- Framework stylesheet -->
    
    <!-- Page stylesheet -->
    <link rel="stylesheet" href="search.css">
</head>
<body class="site">
    <header class="site-header" role="banner">
        <div class="header-inner">
            <div class="site-brand" aria-label="Rug Gallery - Home rugs">
                <span class="brand-title">Rug Gallery</span>
                <span class="brand-tagline">Home Rugs</span>
            </div>

            <nav class="primary-nav" aria-label="Primary navigation">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" title="Homepage with featured rugs, promotions, and search">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=rugs" title="All rugs with access to subcategories and filters">Rugs</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=living_room_rugs" title="Living room rugs including 5' x 7' and 9' x 12' sizes">Living Room</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=kitchen_rugs" title="Kitchen rugs and runners including 2' x 8' non-slip options">Kitchen</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=kids_rugs" title="Kids' room rugs in round, rectangular, and runner shapes">Kids' Rugs</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=outdoor_rugs" title="Outdoor rugs including navy 5' x 7' options">Outdoor</a>
                    </li>
                    <li class="nav-item nav-item--sale">
                        <a href="products.html?categoryId=sale_rugs" title="Sale and clearance rugs for budget-friendly purchases">Sale</a>
                    </li>
                    <li class="nav-item nav-item--utility">
                        <a href="wishlist.html" title="View and manage saved rugs and favorites">Wishlist</a>
                    </li>
                    <li class="nav-item nav-item--utility">
                        <a href="cart.html" title="Shopping cart with selected rugs and totals">Cart</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-main" role="main">
        <section class="search-page" data-component="search-results-page">
            <!-- Global search bar (page-level, cinematic, centered) -->
            <form class="global-search-form" role="search" aria-label="Search rugs" data-component="global-search-form" data-action="global-search-submit">
                <label class="visually-hidden" for="globalSearchQuery">Search rugs</label>
                <input type="search" id="globalSearchQuery" name="query" class="global-search-form__input" placeholder="Search rugs by keyword" autocomplete="off">
                <button type="submit" class="btn btn-ghost global-search-form__button">
                    <span>Search</span>
                </button>
            </form>

            <!-- Results header: summary + sort + filters trigger -->
            <header class="results-header" data-component="results-header" data-populate="results-header" aria-live="polite"></header>

            <!-- Hero viewing area -->
            <section class="search-hero" data-component="search-hero" data-populate="hero" aria-label="Selected rug preview"></section>

            <!-- Empty state message (used when no query or no results) -->
            <section class="empty-state" data-component="empty-state-message" data-populate="empty-state-message" hidden></section>

            <!-- Bottom filmstrip strip: product grid + pagination -->
            <section class="results-strip" aria-label="Search results" data-component="product-strip-section">
                <div class="results-strip__scroller" data-component="product-grid" data-populate="product-grid"></div>
                <div class="results-strip__pagination" data-component="pagination-controls" data-populate="pagination-controls"></div>
            </section>

            <!-- Comparison toolbar (sticky at bottom when active) -->
            <div class="comparison-toolbar" data-component="comparison-toolbar" data-populate="comparison-toolbar" hidden></div>

            <!-- Off-canvas filter sidebar and backdrop -->
            <div class="filter-backdrop" data-component="filter-backdrop" data-action="close-filters" hidden></div>
            <aside class="filter-sidebar" data-component="filter-sidebar" aria-label="Filter search results" aria-hidden="true">
                <div class="filter-sidebar__header">
                    <h2 class="filter-sidebar__title">Filters</h2>
                    <button type="button" class="filter-sidebar__close" data-action="close-filters" aria-label="Close filters">
                        <span class="filter-sidebar__close-label">Close</span>
                    </button>
                </div>
                <div class="filter-sidebar__body" data-populate="filters"></div>
            </aside>
        </section>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="footer-inner">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav-list">
                    <li class="footer-nav-item">
                        <a href="about.html" title="Learn more about our rug brand and mission">About Us</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="contact.html" title="Customer support and contact information">Contact &amp; Help</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="shipping_returns.html" title="Details on shipping options, delivery, and return policies">Shipping &amp; Returns</a>
                    </li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span class="footer-year">2024</span> Rug Gallery. All rights reserved.</p>
        </div>
    </footer>

    <!-- SDK with WebsiteSDK.* interfaces -->
    <script src="business_logic.js"></script>
    <script>
    (function() {
        'use strict';

        let searchContext = null; // Holds current state, filters, results, hero selection

        function parseCommaParam(value) {
            if (!value) return [];
            return value.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v.length > 0; });
        }

        function parseUrlState() {
            var params = new URLSearchParams(window.location.search);

            var urlState = {
                query: (params.get('query') || '').trim(),
                size: params.get('size') || null,
                priceMin: params.get('priceMin') !== null ? Number(params.get('priceMin')) : null,
                priceMax: params.get('priceMax') !== null ? Number(params.get('priceMax')) : null,
                rating: params.get('rating') !== null ? Number(params.get('rating')) : null,
                colors: parseCommaParam(params.get('colors')),
                styles: parseCommaParam(params.get('styles')),
                rooms: parseCommaParam(params.get('rooms')),
                features: parseCommaParam(params.get('features')),
                productTypes: parseCommaParam(params.get('productTypes')),
                shapes: parseCommaParam(params.get('shapes')),
                maxDeliveryDate: params.get('maxDeliveryDate') || null,
                sort: params.get('sort') || null,
                page: params.get('page') !== null ? Number(params.get('page')) : 1,
                pageSize: params.get('pageSize') !== null ? Number(params.get('pageSize')) : 20
            };

            if (!urlState.page || isNaN(urlState.page) || urlState.page < 1) {
                urlState.page = 1;
            }
            if (!urlState.pageSize || isNaN(urlState.pageSize) || urlState.pageSize < 1) {
                urlState.pageSize = 20;
            }

            return urlState;
        }

        function buildFilters(urlState) {
            var filters = {};

            if (urlState.size) {
                filters.sizeLabels = [urlState.size];
            }
            if (urlState.priceMin !== null && !isNaN(urlState.priceMin)) {
                filters.minPrice = urlState.priceMin;
            }
            if (urlState.priceMax !== null && !isNaN(urlState.priceMax)) {
                filters.maxPrice = urlState.priceMax;
            }
            if (urlState.rating !== null && !isNaN(urlState.rating)) {
                filters.minRating = urlState.rating;
            }
            if (urlState.colors.length) {
                filters.colors = urlState.colors;
            }
            if (urlState.styles.length) {
                filters.styles = urlState.styles;
            }
            if (urlState.rooms.length) {
                filters.rooms = urlState.rooms;
            }
            if (urlState.productTypes.length) {
                filters.productTypes = urlState.productTypes;
            }
            if (urlState.shapes.length) {
                filters.shapes = urlState.shapes;
            }

            if (urlState.features.length) {
                var featureFlags = {};
                urlState.features.forEach(function(flag) {
                    if (flag === 'machine_washable') {
                        featureFlags.isMachineWashable = true;
                    } else if (flag === 'non_slip') {
                        featureFlags.isNonSlip = true;
                    } else if (flag === 'free_shipping') {
                        featureFlags.hasFreeShipping = true;
                    } else if (flag === 'free_returns') {
                        featureFlags.hasFreeReturns = true;
                    } else if (flag === 'sale_only') {
                        featureFlags.isOnSale = true;
                    }
                });
                if (Object.keys(featureFlags).length > 0) {
                    filters.features = featureFlags;
                }
            }

            if (urlState.maxDeliveryDate) {
                filters.maxDeliveryDate = urlState.maxDeliveryDate;
            }

            return filters;
        }

        function updateUrlState(updates, options) {
            options = options || {};
            var params = new URLSearchParams(window.location.search);

            Object.keys(updates).forEach(function(key) {
                var value = updates[key];
                if (value === null || value === undefined || value === '' || (Array.isArray(value) && value.length === 0)) {
                    params.delete(key);
                } else if (Array.isArray(value)) {
                    params.set(key, value.join(','));
                } else {
                    params.set(key, String(value));
                }
            });

            if (options.resetPage) {
                params.delete('page');
            }

            var newQuery = params.toString();
            var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
            window.history.pushState({}, '', newUrl);
            initSearchPage();
        }

        function renderResultsHeader(container, context) {
            container.innerHTML = '';
            var urlState = context.urlState;
            var results = context.searchResults;
            var filterOptions = context.filterOptions;

            var root = document.createElement('div');
            root.className = 'results-header__inner';

            var summary = document.createElement('div');
            summary.className = 'results-header__summary';

            var querySpan = document.createElement('span');
            querySpan.className = 'results-header__query';
            if (urlState.query) {
                querySpan.textContent = 'Results for "' + urlState.query + '"';
            } else {
                querySpan.textContent = 'Search rugs';
            }

            var countSpan = document.createElement('span');
            countSpan.className = 'results-header__count';
            if (results && typeof results.totalCount === 'number') {
                countSpan.textContent = results.totalCount + ' rugs';
            } else if (!urlState.query) {
                countSpan.textContent = '';
            }

            summary.appendChild(querySpan);
            if (countSpan.textContent) {
                summary.appendChild(countSpan);
            }

            var controls = document.createElement('div');
            controls.className = 'results-header__controls';

            var filterButton = document.createElement('button');
            filterButton.type = 'button';
            filterButton.className = 'btn btn-ghost results-header__filter-btn';
            filterButton.setAttribute('data-action', 'toggle-filters');
            filterButton.textContent = 'Filters';

            var sortLabel = document.createElement('label');
            sortLabel.className = 'results-header__sort-label';
            sortLabel.setAttribute('for', 'sortControl');
            sortLabel.textContent = 'Sort';

            var sortSelect = document.createElement('select');
            sortSelect.id = 'sortControl';
            sortSelect.className = 'results-header__sort-select';
            sortSelect.setAttribute('data-action', 'sort-change');

            var defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.textContent = 'Featured';
            sortSelect.appendChild(defaultOption);

            if (filterOptions && Array.isArray(filterOptions.sortOptions)) {
                filterOptions.sortOptions.forEach(function(opt) {
                    var option = document.createElement('option');
                    option.value = opt.value;
                    option.textContent = opt.label;
                    sortSelect.appendChild(option);
                });
            }

            if (urlState.sort) {
                sortSelect.value = urlState.sort;
            }

            controls.appendChild(filterButton);
            controls.appendChild(sortLabel);
            controls.appendChild(sortSelect);

            root.appendChild(summary);
            root.appendChild(controls);
            container.appendChild(root);
        }

        function formatPriceRange(product) {
            var min = product.minPrice;
            var max = product.maxPrice;
            if (min && max && min !== max) {
                return '$' + min.toFixed(0) + ' – $' + max.toFixed(0);
            }
            if (min) {
                return '$' + min.toFixed(0);
            }
            return '';
        }

        function formatRating(product) {
            if (!product.ratingAverage || !product.ratingCount) {
                return '';
            }
            return product.ratingAverage.toFixed(1) + ' (' + product.ratingCount + ')';
        }

        function renderHero(container, context) {
            container.innerHTML = '';
            var results = context.searchResults;
            var urlState = context.urlState;

            if (!urlState.query || !results || !results.products || results.products.length === 0) {
                container.hidden = true;
                return;
            }

            container.hidden = false;

            var heroProduct = null;
            if (context.heroProductId) {
                heroProduct = results.products.find(function(p) { return p.productId === context.heroProductId; }) || null;
            }
            if (!heroProduct) {
                heroProduct = results.products[0];
                context.heroProductId = heroProduct.productId;
            }

            var frame = document.createElement('div');
            frame.className = 'search-hero__frame';

            var media = document.createElement('div');
            media.className = 'search-hero__media';
            var img = document.createElement('img');
            img.className = 'search-hero__image';
            img.src = heroProduct.thumbnailUrl || '';
            img.alt = heroProduct.name || 'Rug';
            media.appendChild(img);

            var meta = document.createElement('div');
            meta.className = 'search-hero__meta';

            var title = document.createElement('div');
            title.className = 'search-hero__title';
            title.textContent = heroProduct.name || '';

            var priceRating = document.createElement('div');
            priceRating.className = 'search-hero__price-rating';

            var priceSpan = document.createElement('span');
            priceSpan.className = 'search-hero__price';
            priceSpan.textContent = formatPriceRange(heroProduct);

            var ratingSpan = document.createElement('span');
            ratingSpan.className = 'search-hero__rating';
            var ratingText = formatRating(heroProduct);
            ratingSpan.textContent = ratingText;

            priceRating.appendChild(priceSpan);
            if (ratingText) {
                priceRating.appendChild(ratingSpan);
            }

            var badgesWrap = document.createElement('div');
            badgesWrap.className = 'search-hero__badges';

            if (heroProduct.isOnSale) {
                var saleBadge = document.createElement('span');
                saleBadge.className = 'badge badge--sale';
                saleBadge.textContent = 'Sale';
                badgesWrap.appendChild(saleBadge);
            }
            if (heroProduct.hasFreeShipping) {
                var shipBadge = document.createElement('span');
                shipBadge.className = 'badge badge--shipping';
                shipBadge.textContent = 'Free Shipping';
                badgesWrap.appendChild(shipBadge);
            }
            if (heroProduct.hasFreeReturns) {
                var retBadge = document.createElement('span');
                retBadge.className = 'badge badge--returns';
                retBadge.textContent = 'Free Returns';
                badgesWrap.appendChild(retBadge);
            }
            if (Array.isArray(heroProduct.badges)) {
                heroProduct.badges.forEach(function(label) {
                    var b = document.createElement('span');
                    b.className = 'badge badge--custom';
                    b.textContent = label;
                    badgesWrap.appendChild(b);
                });
            }

            meta.appendChild(title);
            meta.appendChild(priceRating);
            if (badgesWrap.childNodes.length > 0) {
                meta.appendChild(badgesWrap);
            }

            var actions = document.createElement('div');
            actions.className = 'search-hero__actions';

            var openButton = document.createElement('button');
            openButton.type = 'button';
            openButton.className = 'btn btn-primary search-hero__details-btn';
            openButton.textContent = 'View details';
            openButton.setAttribute('data-action', 'open-product');
            openButton.setAttribute('data-product-id', heroProduct.productId);

            var wishlistButton = document.createElement('button');
            wishlistButton.type = 'button';
            wishlistButton.className = 'icon-button search-hero__wishlist-btn' + (heroProduct.isInWishlist ? ' is-active' : '');
            wishlistButton.setAttribute('data-action', 'toggle-wishlist');
            wishlistButton.setAttribute('data-product-id', heroProduct.productId);
            wishlistButton.setAttribute('aria-pressed', heroProduct.isInWishlist ? 'true' : 'false');
            wishlistButton.setAttribute('aria-label', heroProduct.isInWishlist ? 'Remove from wishlist' : 'Add to wishlist');
            wishlistButton.innerHTML = '<span class="icon-heart" aria-hidden="true"></span>';

            actions.appendChild(openButton);
            actions.appendChild(wishlistButton);

            meta.appendChild(actions);

            frame.appendChild(media);
            frame.appendChild(meta);
            container.appendChild(frame);
        }

        function renderProductGrid(container, context) {
            container.innerHTML = '';
            var results = context.searchResults;
            var urlState = context.urlState;

            if (!urlState.query || !results || !results.products || results.products.length === 0) {
                container.hidden = true;
                return;
            }
            container.hidden = false;

            var list = document.createElement('ul');
            list.className = 'product-strip';
            list.setAttribute('role', 'list');

            var heroId = context.heroProductId;
            if (!heroId && results.products.length > 0) {
                heroId = results.products[0].productId;
                context.heroProductId = heroId;
            }

            results.products.forEach(function(product) {
                var item = document.createElement('li');
                item.className = 'product-card';
                if (product.productId === heroId) {
                    item.className += ' product-card--active';
                    item.setAttribute('aria-current', 'true');
                }
                item.setAttribute('data-component', 'product-card');
                item.setAttribute('data-product-id', product.productId);
                item.setAttribute('role', 'listitem');

                var thumbButton = document.createElement('button');
                thumbButton.type = 'button';
                thumbButton.className = 'product-card__thumb-btn';
                thumbButton.setAttribute('data-action', 'select-hero');
                thumbButton.setAttribute('data-product-id', product.productId);

                var img = document.createElement('img');
                img.className = 'product-card__image';
                img.src = product.thumbnailUrl || '';
                img.alt = product.name || 'Rug thumbnail';
                thumbButton.appendChild(img);

                var info = document.createElement('div');
                info.className = 'product-card__info';

                var titleButton = document.createElement('button');
                titleButton.type = 'button';
                titleButton.className = 'product-card__title';
                titleButton.textContent = product.name || '';
                titleButton.setAttribute('data-action', 'open-product');
                titleButton.setAttribute('data-product-id', product.productId);

                var price = document.createElement('div');
                price.className = 'product-card__price';
                price.textContent = formatPriceRange(product);

                var metaRow = document.createElement('div');
                metaRow.className = 'product-card__meta';
                var ratingText = formatRating(product);
                if (ratingText) {
                    var ratingEl = document.createElement('span');
                    ratingEl.className = 'product-card__rating';
                    ratingEl.textContent = ratingText;
                    metaRow.appendChild(ratingEl);
                }

                var badgesRow = document.createElement('div');
                badgesRow.className = 'product-card__badges';
                if (product.isOnSale) {
                    var saleBadge = document.createElement('span');
                    saleBadge.className = 'badge badge--sale';
                    saleBadge.textContent = 'Sale';
                    badgesRow.appendChild(saleBadge);
                }
                if (product.hasFreeShipping) {
                    var fsBadge = document.createElement('span');
                    fsBadge.className = 'badge badge--shipping';
                    fsBadge.textContent = 'Free Shipping';
                    badgesRow.appendChild(fsBadge);
                }
                if (product.hasFreeReturns) {
                    var frBadge = document.createElement('span');
                    frBadge.className = 'badge badge--returns';
                    frBadge.textContent = 'Free Returns';
                    badgesRow.appendChild(frBadge);
                }

                var actions = document.createElement('div');
                actions.className = 'product-card__actions';

                var wishlistBtn = document.createElement('button');
                wishlistBtn.type = 'button';
                wishlistBtn.className = 'icon-button product-card__wishlist' + (product.isInWishlist ? ' is-active' : '');
                wishlistBtn.setAttribute('data-action', 'toggle-wishlist');
                wishlistBtn.setAttribute('data-product-id', product.productId);
                wishlistBtn.setAttribute('aria-pressed', product.isInWishlist ? 'true' : 'false');
                wishlistBtn.setAttribute('aria-label', product.isInWishlist ? 'Remove from wishlist' : 'Add to wishlist');
                wishlistBtn.innerHTML = '<span class="icon-heart" aria-hidden="true"></span>';

                var compareLabel = document.createElement('label');
                compareLabel.className = 'product-card__compare';
                var compareInput = document.createElement('input');
                compareInput.type = 'checkbox';
                compareInput.className = 'product-card__compare-input';
                compareInput.setAttribute('data-action', 'toggle-compare');
                compareInput.setAttribute('data-product-id', product.productId);
                if (product.isInComparisonList) {
                    compareInput.checked = true;
                }
                var compareSpan = document.createElement('span');
                compareSpan.className = 'product-card__compare-label';
                compareSpan.textContent = 'Compare';

                compareLabel.appendChild(compareInput);
                compareLabel.appendChild(compareSpan);

                actions.appendChild(wishlistBtn);
                actions.appendChild(compareLabel);

                info.appendChild(titleButton);
                info.appendChild(price);
                if (metaRow.childNodes.length) {
                    info.appendChild(metaRow);
                }
                if (badgesRow.childNodes.length) {
                    info.appendChild(badgesRow);
                }
                info.appendChild(actions);

                item.appendChild(thumbButton);
                item.appendChild(info);

                list.appendChild(item);
            });

            container.appendChild(list);
        }

        function renderPagination(container, context) {
            container.innerHTML = '';
            var results = context.searchResults;
            var urlState = context.urlState;

            if (!urlState.query || !results || typeof results.totalCount !== 'number') {
                container.hidden = true;
                return;
            }

            var totalCount = results.totalCount;
            var page = results.page || urlState.page;
            var pageSize = results.pageSize || urlState.pageSize;
            var totalPages = Math.max(1, Math.ceil(totalCount / pageSize));

            if (totalPages <= 1) {
                container.hidden = true;
                return;
            }

            container.hidden = false;

            var wrap = document.createElement('div');
            wrap.className = 'pagination';

            var info = document.createElement('span');
            info.className = 'pagination__info';
            info.textContent = 'Page ' + page + ' of ' + totalPages;
            wrap.appendChild(info);

            var controls = document.createElement('div');
            controls.className = 'pagination__controls';

            var prevBtn = document.createElement('button');
            prevBtn.type = 'button';
            prevBtn.className = 'pagination__button';
            prevBtn.textContent = 'Prev';
            prevBtn.disabled = page <= 1;
            prevBtn.setAttribute('data-action', 'page-change');
            prevBtn.setAttribute('data-page', String(page - 1));
            controls.appendChild(prevBtn);

            var startPage = Math.max(1, page - 2);
            var endPage = Math.min(totalPages, page + 2);

            for (var p = startPage; p <= endPage; p++) {
                var pageBtn = document.createElement('button');
                pageBtn.type = 'button';
                pageBtn.className = 'pagination__button';
                if (p === page) {
                    pageBtn.className += ' is-active';
                }
                pageBtn.textContent = String(p);
                pageBtn.setAttribute('data-action', 'page-change');
                pageBtn.setAttribute('data-page', String(p));
                controls.appendChild(pageBtn);
            }

            var nextBtn = document.createElement('button');
            nextBtn.type = 'button';
            nextBtn.className = 'pagination__button';
            nextBtn.textContent = 'Next';
            nextBtn.disabled = page >= totalPages;
            nextBtn.setAttribute('data-action', 'page-change');
            nextBtn.setAttribute('data-page', String(page + 1));
            controls.appendChild(nextBtn);

            wrap.appendChild(controls);

            var sizeSelect = document.createElement('select');
            sizeSelect.className = 'pagination__size-select';
            sizeSelect.setAttribute('data-action', 'page-size-change');

            var pageSizes = [10, 20, 40];
            pageSizes.forEach(function(size) {
                var opt = document.createElement('option');
                opt.value = String(size);
                opt.textContent = size + ' per page';
                if (size === pageSize) {
                    opt.selected = true;
                }
                sizeSelect.appendChild(opt);
            });

            wrap.appendChild(sizeSelect);

            container.appendChild(wrap);
        }

        function renderFilters(container, context) {
            container.innerHTML = '';
            var filterOptions = context.filterOptions;
            var urlState = context.urlState;

            if (!filterOptions) {
                var emptyMessage = document.createElement('p');
                emptyMessage.className = 'filter-sidebar__empty';
                emptyMessage.textContent = 'Filters will appear after you start a search.';
                container.appendChild(emptyMessage);
                return;
            }

        function renderComparisonToolbar(container, context) {

        function renderEmptyState(container, context) {
            container.innerHTML = '';
            var urlState = context.urlState;
            var results = context.searchResults;

            var show = false;
            var message = '';
            var detail = '';

            if (!urlState.query) {
                show = true;
                message = 'Start searching for rugs';
                detail = 'Use the search bar above to find rugs by style, color, room, or size.';
            } else if (results && results.totalCount === 0) {
                show = true;
                message = 'No rugs match your filters';
                detail = 'Try clearing some filters or adjusting your search term.';
            } else if (context.errorMessage) {
                show = true;
                message = 'Something went wrong';
                detail = context.errorMessage;
            }

            if (!show) {
                container.hidden = true;
                return;
            }

            container.hidden = false;
            var wrap = document.createElement('div');
            wrap.className = 'empty-state__inner';

            var title = document.createElement('h2');
            title.className = 'empty-state__title';
            title.textContent = message;

            var body = document.createElement('p');
            body.className = 'empty-state__body';
            body.textContent = detail;

            wrap.appendChild(title);
            wrap.appendChild(body);

            if (urlState.query && results && results.totalCount === 0) {
                var actions = document.createElement('div');
                actions.className = 'empty-state__actions';

                var clearFiltersBtn = document.createElement('button');
                clearFiltersBtn.type = 'button';
                clearFiltersBtn.className = 'btn btn-primary';
                clearFiltersBtn.textContent = 'Clear all filters';
                clearFiltersBtn.setAttribute('data-action', 'empty-clear-filters');

                var adjustQueryBtn = document.createElement('button');
                adjustQueryBtn.type = 'button';
                adjustQueryBtn.className = 'btn btn-ghost';
                adjustQueryBtn.textContent = 'Adjust search term';
                adjustQueryBtn.setAttribute('data-action', 'empty-adjust-query');

                actions.appendChild(clearFiltersBtn);
                actions.appendChild(adjustQueryBtn);
                wrap.appendChild(actions);
            }

            container.appendChild(wrap);
        }

        function bindActionHandlers(root) {
            var elements = root.querySelectorAll('[data-action]');
            elements.forEach(function(el) {
                if (el.dataset.bound === 'true') return;

                var action = el.dataset.action;
                if (!action) return;

                if (action === 'global-search-submit') {
                    el.addEventListener('submit', onGlobalSearchSubmit);
                } else if (action === 'toggle-filters') {
                    el.addEventListener('click', openFilters);
                } else if (action === 'close-filters') {
                    el.addEventListener('click', closeFilters);
                } else if (action === 'sort-change') {
                    el.addEventListener('change', onSortChange);
                } else if (action === 'filter-change') {
                    var eventType = (el.tagName === 'INPUT' && (el.type === 'number' || el.type === 'text')) ? 'change' : 'change';
                    el.addEventListener(eventType, onFilterChange);
                } else if (action === 'clear-all-filters') {
                    el.addEventListener('click', clearAllFilters);
                } else if (action === 'page-change') {
                    el.addEventListener('click', onPageChange);
                } else if (action === 'page-size-change') {
                    el.addEventListener('change', onPageSizeChange);
                } else if (action === 'open-product') {
                    el.addEventListener('click', onOpenProduct);
                } else if (action === 'toggle-wishlist') {
                    el.addEventListener('click', onToggleWishlist);
                } else if (action === 'toggle-compare') {
                    el.addEventListener('change', onToggleCompare);
                } else if (action === 'select-hero') {
                    el.addEventListener('click', onSelectHero);
                } else if (action === 'go-to-compare') {
                    el.addEventListener('click', onGoToCompare);
                } else if (action === 'clear-comparison') {
                    el.addEventListener('click', onClearComparison);
                } else if (action === 'remove-comparison-item') {
                    el.addEventListener('click', onRemoveComparisonItem);
                } else if (action === 'empty-clear-filters') {
                    el.addEventListener('click', onEmptyClearFilters);
                } else if (action === 'empty-adjust-query') {
                    el.addEventListener('click', onEmptyAdjustQuery);
                }

                el.dataset.bound = 'true';
            });
        }

        function onGlobalSearchSubmit(event) {
            event.preventDefault();
            var form = event.target;
            var input = form.querySelector('input[name="query"]');
            var query = input ? (input.value || '').trim() : '';
            if (!query) {
                return;
            }
            window.location.href = 'search.html?query=' + encodeURIComponent(query);
        }

        function openFilters() {
            var sidebar = document.querySelector('[data-component="filter-sidebar"]');
            var backdrop = document.querySelector('[data-component="filter-backdrop"]');
            if (sidebar) {
                sidebar.classList.add('filter-sidebar--open');
                sidebar.setAttribute('aria-hidden', 'false');
            }
            if (backdrop) {
                backdrop.hidden = false;
            }
        }

        function closeFilters() {
            var sidebar = document.querySelector('[data-component="filter-sidebar"]');
            var backdrop = document.querySelector('[data-component="filter-backdrop"]');
            if (sidebar) {
                sidebar.classList.remove('filter-sidebar--open');
                sidebar.setAttribute('aria-hidden', 'true');
            }
            if (backdrop) {
                backdrop.hidden = true;
            }
        }

        function onSortChange(event) {
            var value = event.target.value || null;
            updateUrlState({ sort: value, page: null }, { resetPage: true });
        }

        function onFilterChange(event) {
            var input = event.target;
            var type = input.dataset.filterType;
            var urlState = parseUrlState();

            if (type === 'size') {
                var val = input.value || null;
                updateUrlState({ size: val || null }, { resetPage: true });
            } else if (type === 'priceMin') {
                var min = input.value ? Number(input.value) : null;
                updateUrlState({ priceMin: min }, { resetPage: true });
            } else if (type === 'priceMax') {
                var max = input.value ? Number(input.value) : null;
                updateUrlState({ priceMax: max }, { resetPage: true });
            } else if (type === 'rating') {
                var rating = input.value ? Number(input.value) : null;
                updateUrlState({ rating: rating }, { resetPage: true });
            } else if (type === 'colors' || type === 'styles' || type === 'rooms' || type === 'productTypes' || type === 'shapes' || type === 'features') {
                var key = type;
                var current = urlState[key] ? urlState[key].slice() : [];
                var val2 = input.value;
                var index = current.indexOf(val2);
                if (input.checked) {
                    if (index === -1) current.push(val2);
                } else if (index !== -1) {
                    current.splice(index, 1);
                }
                var update = {};
                update[key] = current;
                updateUrlState(update, { resetPage: true });
            } else if (type === 'maxDeliveryDate') {
                var dateVal = input.value || null;
                updateUrlState({ maxDeliveryDate: dateVal }, { resetPage: true });
            }
        }

        function clearAllFilters() {
            var urlState = parseUrlState();
            var updates = {
                size: null,
                priceMin: null,
                priceMax: null,
                rating: null,
                colors: [],
                styles: [],
                rooms: [],
                features: [],
                productTypes: [],
                shapes: [],
                maxDeliveryDate: null,
                page: null
            };
            updateUrlState(updates, { resetPage: true });
        }

        function onPageChange(event) {
            var page = Number(event.target.dataset.page || '1');
            if (!page || page < 1) return;
            updateUrlState({ page: page }, {});
        }

        function onPageSizeChange(event) {
            var size = Number(event.target.value || '20');
            if (!size || size < 1) return;
            updateUrlState({ pageSize: size, page: 1 }, { resetPage: true });
        }

        function onOpenProduct(event) {
            var productId = event.target.getAttribute('data-product-id');
            if (!productId) {
                var el = event.target.closest('[data-product-id]');
                if (el) {
                    productId = el.getAttribute('data-product-id');
                }
            }
            if (!productId) return;
            window.location.href = 'product.html?id=' + encodeURIComponent(productId);
        }

        function onToggleWishlist(event) {
            var button = event.currentTarget;
            var productId = button.getAttribute('data-product-id');
            if (!productId) return;

            try {
                var result = WebsiteSDK.addProductToWishlist(productId, undefined);
                if (result && result.success) {
                    button.classList.add('is-active');
                    button.setAttribute('aria-pressed', 'true');
                    button.setAttribute('aria-label', 'Remove from wishlist');
                    if (searchContext && searchContext.searchResults && Array.isArray(searchContext.searchResults.products)) {
                        searchContext.searchResults.products.forEach(function(p) {
                            if (p.productId === productId) {
                                p.isInWishlist = true;
                            }
                        });
                    }
                }
            } catch (e) {
                console.error('Failed to add to wishlist', e);
            }
        }

        function onToggleCompare(event) {
            var input = event.currentTarget;
            var productId = input.getAttribute('data-product-id');
            if (!productId) return;

            var checked = input.checked;
            try {
                if (checked) {
                    var addResult = WebsiteSDK.addProductToComparison(productId);
                    if (addResult && addResult.success) {
                        if (searchContext && searchContext.searchResults && Array.isArray(searchContext.searchResults.products)) {
                            searchContext.searchResults.products.forEach(function(p) {
                                if (p.productId === productId) {
                                    p.isInComparisonList = true;
                                }
                            });
                        }
                    } else {
                        input.checked = false;
                    }
                } else {
                    var remResult = WebsiteSDK.removeProductFromComparison(productId);
                    if (remResult && remResult.success) {
                        if (searchContext && searchContext.searchResults && Array.isArray(searchContext.searchResults.products)) {
                            searchContext.searchResults.products.forEach(function(p) {
                                if (p.productId === productId) {
                                    p.isInComparisonList = false;
                                }
                            });
                        }
                    } else {
                        input.checked = true;
                    }
                }
            } catch (e) {
                console.error('Comparison toggle failed', e);
            }

            var toolbarContainer = document.querySelector('[data-populate="comparison-toolbar"]');
            if (toolbarContainer && searchContext) {
                renderComparisonToolbar(toolbarContainer, searchContext);
                bindActionHandlers(toolbarContainer);
            }
        }

        function onSelectHero(event) {
            var btn = event.currentTarget;
            var productId = btn.getAttribute('data-product-id');
            if (!productId || !searchContext || !searchContext.searchResults) return;
            searchContext.heroProductId = productId;

            var heroContainer = document.querySelector('[data-populate="hero"]');
            if (heroContainer) {
                renderHero(heroContainer, searchContext);
                bindActionHandlers(heroContainer);
            }
            var gridContainer = document.querySelector('[data-populate="product-grid"]');
            if (gridContainer) {
                renderProductGrid(gridContainer, searchContext);
                bindActionHandlers(gridContainer);
            }
        }

        function onGoToCompare() {
            window.location.href = 'compare.html';
        }

        function onClearComparison() {
            if (!searchContext || !searchContext.searchResults || !Array.isArray(searchContext.searchResults.products)) {
                return;
            }
            var selected = searchContext.searchResults.products.filter(function(p) { return !!p.isInComparisonList; });
            selected.forEach(function(p) {
                try {
                    var res = WebsiteSDK.removeProductFromComparison(p.productId);
                    if (res && res.success) {
                        p.isInComparisonList = false;
                    }
                } catch (e) {
                    console.error('Failed to remove from comparison', e);
                }
            });

            var toolbarContainer = document.querySelector('[data-populate="comparison-toolbar"]');
            if (toolbarContainer) {
                renderComparisonToolbar(toolbarContainer, searchContext);
                bindActionHandlers(toolbarContainer);
            }

            var gridContainer = document.querySelector('[data-populate="product-grid"]');
            if (gridContainer) {
                renderProductGrid(gridContainer, searchContext);
                bindActionHandlers(gridContainer);
            }
        }

        function onRemoveComparisonItem(event) {
            var productId = event.currentTarget.getAttribute('data-product-id');
            if (!productId) return;
            try {
                var res = WebsiteSDK.removeProductFromComparison(productId);
                if (res && res.success && searchContext && searchContext.searchResults && Array.isArray(searchContext.searchResults.products)) {
                    searchContext.searchResults.products.forEach(function(p) {
                        if (p.productId === productId) {
                            p.isInComparisonList = false;
                        }
                    });
                }
            } catch (e) {
                console.error('Failed to remove comparison item', e);
            }

            var toolbarContainer = document.querySelector('[data-populate="comparison-toolbar"]');
            if (toolbarContainer) {
                renderComparisonToolbar(toolbarContainer, searchContext);
                bindActionHandlers(toolbarContainer);
            }

            var gridContainer = document.querySelector('[data-populate="product-grid"]');
            if (gridContainer) {
                renderProductGrid(gridContainer, searchContext);
                bindActionHandlers(gridContainer);
            }
        }

        function onEmptyClearFilters() {
            clearAllFilters();
        }

        function onEmptyAdjustQuery() {
            var input = document.getElementById('globalSearchQuery');
            if (input) {
                input.focus();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initSearchPage() {
            var urlState = parseUrlState();

            var queryInput = document.getElementById('globalSearchQuery');
            if (queryInput) {
                queryInput.value = urlState.query || '';
            }

            var filtersObj = null;
            var filterOptions = null;
            var searchResults = null;
            var errorMessage = '';

            try {
                if (urlState.query) {
                    filterOptions = WebsiteSDK.getProductFilterOptions('search_results', undefined, urlState.query);
                    filtersObj = buildFilters(urlState);
                    searchResults = WebsiteSDK.searchProducts(urlState.query, filtersObj, urlState.sort || undefined, urlState.page, urlState.pageSize);
                }
            } catch (e) {
                console.error('Search initialization failed', e);
                errorMessage = 'Please refresh the page or try again later.';
            }

            searchContext = {
                urlState: urlState,
                filters: filtersObj,
                filterOptions: filterOptions,
                searchResults: searchResults,
                heroProductId: searchContext && searchContext.heroProductId ? searchContext.heroProductId : null,
                errorMessage: errorMessage
            };

            if (!searchContext.heroProductId && searchResults && searchResults.products && searchResults.products.length) {
                searchContext.heroProductId = searchResults.products[0].productId;
            }

            var populateMap = {
                'results-header': renderResultsHeader,
                'hero': renderHero,
                'product-grid': renderProductGrid,
                'pagination-controls': renderPagination,
                'filters': renderFilters,
                'comparison-toolbar': renderComparisonToolbar,
                'empty-state-message': renderEmptyState
            };

            var populateElements = document.querySelectorAll('[data-populate]');
            populateElements.forEach(function(el) {
                var key = el.dataset.populate;
                var renderFn = populateMap[key];
                if (typeof renderFn === 'function') {
                    renderFn(el, searchContext);
                }
            });

            var heroContainer = document.querySelector('[data-populate="hero"]');
            var gridContainer = document.querySelector('[data-populate="product-grid"]');
            var emptyContainer = document.querySelector('[data-populate="empty-state-message"]');

            if (!urlState.query || (searchResults && searchResults.totalCount === 0) || searchContext.errorMessage) {
                if (heroContainer) heroContainer.hidden = true;
                if (gridContainer) gridContainer.hidden = true;
                if (emptyContainer) emptyContainer.hidden = false;
            } else {
                if (heroContainer) heroContainer.hidden = false;
                if (gridContainer) gridContainer.hidden = false;
                if (emptyContainer) emptyContainer.hidden = true;
            }

            bindActionHandlers(document);
        }

        document.addEventListener('DOMContentLoaded', function() {
            initSearchPage();
            window.addEventListener('popstate', function() {
                initSearchPage();
            });
        });
    })();
    </script>
</body>
</html>
