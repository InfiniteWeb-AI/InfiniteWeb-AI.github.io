<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rug Gallery Framework</title>

    <!-- Typography: Space Grotesk (headings) & IBM Plex Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

    <!-- Framework stylesheet -->
    
    <!-- Page stylesheet -->
    <link rel="stylesheet" href="checkout_shipping_options.css">
</head>
<body class="site">
    <header class="site-header" role="banner">
        <div class="header-inner">
            <div class="site-brand" aria-label="Rug Gallery - Home rugs">
                <span class="brand-title">Rug Gallery</span>
                <span class="brand-tagline">Home Rugs</span>
            </div>

            <nav class="primary-nav" aria-label="Primary navigation">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" title="Homepage with featured rugs, promotions, and search">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=rugs" title="All rugs with access to subcategories and filters">Rugs</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=living_room_rugs" title="Living room rugs including 5' x 7' and 9' x 12' sizes">Living Room</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=kitchen_rugs" title="Kitchen rugs and runners including 2' x 8' non-slip options">Kitchen</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=kids_rugs" title="Kids' room rugs in round, rectangular, and runner shapes">Kids' Rugs</a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html?categoryId=outdoor_rugs" title="Outdoor rugs including navy 5' x 7' options">Outdoor</a>
                    </li>
                    <li class="nav-item nav-item--sale">
                        <a href="products.html?categoryId=sale_rugs" title="Sale and clearance rugs for budget-friendly purchases">Sale</a>
                    </li>
                    <li class="nav-item nav-item--utility">
                        <a href="wishlist.html" title="View and manage saved rugs and favorites">Wishlist</a>
                    </li>
                    <li class="nav-item nav-item--utility">
                        <a href="cart.html" title="Shopping cart with selected rugs and totals">Cart</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-main" role="main">
        <div class="checkout-shell checkout-shipping-options" data-page="checkout-shipping-options">
            <div class="checkout-central-column">
                <section class="checkout-progress" data-component="checkout-progress-indicator" aria-label="Checkout progress">
                    <ol class="checkout-progress__steps" data-populate="checkout-progress"></ol>
                </section>

                <section class="checkout-session-error" data-component="session-error-notice" role="alert" aria-live="assertive" hidden>
                    <div class="checkout-session-error__inner">
                        <p class="checkout-session-error__message" data-populate="session-error-message"></p>
                        <div class="checkout-session-error__actions">
                            <button type="button" class="btn btn-ghost" data-action="go-to-cart">Return to cart</button>
                            <button type="button" class="btn btn-ghost" data-action="retry-load-shipping-options" hidden>Retry loading options</button>
                        </div>
                    </div>
                </section>

                <section class="shipping-address-card" data-component="shipping-address-summary" aria-label="Shipping address">
                    <header class="shipping-address-card__header">
                        <h1 class="shipping-address-card__title">Shipping options</h1>
                        <button type="button" class="btn btn-link shipping-address-card__back" data-action="back-to-shipping-details">
                            Back to shipping details
                        </button>
                    </header>
                    <div class="shipping-address-card__body" data-populate="shipping-address"></div>
                </section>

                <section class="shipping-options" data-component="shipping-options-list" aria-label="Available shipping methods">
                    <div class="shipping-options__inner" data-populate="shipping-options-list"></div>
                </section>
            </div>

            <section class="checkout-bottom-band" aria-label="Order summary and actions">
                <div class="checkout-bottom-band__inner">
                    <section class="order-summary-panel" data-component="order-summary-panel" aria-label="Order summary">
                        <div class="order-summary-panel__content" data-populate="order-summary"></div>
                    </section>

                    <section class="shipping-selection-actions" data-component="shipping-selection-actions">
                        <p class="shipping-selection-actions__note" data-populate="completion-note"></p>
                        <button type="button" class="btn btn-primary" data-action="confirm-shipping-method" disabled>
                            Confirm shipping method
                        </button>
                    </section>
                </div>
            </section>

            <div class="checkout-loading-overlay" data-component="checkout-shipping-options-initializer" aria-hidden="true" hidden>
                <div class="checkout-loading-overlay__backdrop"></div>
                <div class="checkout-loading-overlay__spinner" role="status" aria-live="polite">
                    Loading your shipping options
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="footer-inner">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav-list">
                    <li class="footer-nav-item">
                        <a href="about.html" title="Learn more about our rug brand and mission">About Us</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="contact.html" title="Customer support and contact information">Contact &amp; Help</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="shipping_returns.html" title="Details on shipping options, delivery, and return policies">Shipping &amp; Returns</a>
                    </li>
                </ul>
            </nav>
            <p class="footer-meta">a9 <span class="footer-year">2024</span> Rug Gallery. All rights reserved.</p>
        </div>
    </footer>

    <!-- SDK / business logic loader -->
    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const checkoutSessionId = urlParams.get('checkoutSessionId');

        const state = {
            checkoutSessionId: checkoutSessionId,
            step: null,
            shippingAddress: null,
            shippingMethods: [],
            selectedShippingMethodId: null,
            selectedShippingMethod: null,
            cartSummary: null,
            isLoading: false,
            isConfirming: false,
            isCompleted: false,
            sessionValid: false,
            canRetryShippingOptions: false
        };

        const overlay = document.querySelector('[data-component="checkout-shipping-options-initializer"]');
        const errorNotice = document.querySelector('[data-component="session-error-notice"]');
        const errorMessageContainer = errorNotice ? errorNotice.querySelector('[data-populate="session-error-message"]') : null;
        const retryButton = errorNotice ? errorNotice.querySelector('[data-action="retry-load-shipping-options"]') : null;

        function setLoading(isLoading) {
            state.isLoading = isLoading;
            if (!overlay) {
                return;
            }
            if (isLoading) {
                overlay.removeAttribute('hidden');
                overlay.setAttribute('aria-hidden', 'false');
            } else {
                overlay.setAttribute('hidden', 'hidden');
                overlay.setAttribute('aria-hidden', 'true');
            }
        }

        function clearError() {
            if (!errorNotice) {
                return;
            }
            errorNotice.setAttribute('hidden', 'hidden');
            if (errorMessageContainer) {
                errorMessageContainer.textContent = '';
            }
            if (retryButton) {
                retryButton.setAttribute('hidden', 'hidden');
            }
        }

        function showError(message, options) {
            if (!errorNotice || !errorMessageContainer) {
                return;
            }
            const opts = options || {};
            errorMessageContainer.textContent = message;
            errorNotice.removeAttribute('hidden');
            if (retryButton) {
                if (opts.allowRetryShippingOptions) {
                    retryButton.removeAttribute('hidden');
                } else {
                    retryButton.setAttribute('hidden', 'hidden');
                }
            }
        }

        function formatCurrency(value) {
            if (typeof value !== 'number' || isNaN(value)) {
                return '';
            }
            return value.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
        }

        function formatDateRange(minDateStr, maxDateStr) {
            if (!minDateStr && !maxDateStr) {
                return '';
            }
            try {
                if (minDateStr && maxDateStr) {
                    const min = new Date(minDateStr);
                    const max = new Date(maxDateStr);
                    const minLabel = min.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    const maxLabel = max.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    if (minLabel === maxLabel) {
                        return 'Arrives ' + minLabel;
                    }
                    return 'Arrives ' + minLabel + ' b7 ' + maxLabel;
                }
                const only = new Date(minDateStr || maxDateStr);
                const onlyLabel = only.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                return 'Arrives ' + onlyLabel;
            } catch (e) {
                return '';
            }
        }

        function renderProgress(container) {
            container.innerHTML = '';
            const steps = [
                { key: 'shipping_details', label: 'Shipping details' },
                { key: 'shipping_options', label: 'Shipping options' },
                { key: 'completed', label: 'Completed' }
            ];
            const currentStep = state.step || 'shipping_options';
            steps.forEach(function(step, index) {
                const li = document.createElement('li');
                li.className = 'checkout-progress__step';
                li.dataset.stepKey = step.key;
                const stepIndex = index + 1;
                const spanLabel = document.createElement('span');
                spanLabel.className = 'checkout-progress__step-label';
                spanLabel.textContent = stepIndex + '. ' + step.label;

                if (currentStep === step.key) {
                    li.classList.add('is-current');
                    li.setAttribute('aria-current', 'step');
                } else {
                    const order = ['shipping_details', 'shipping_options', 'completed'];
                    if (order.indexOf(step.key) < order.indexOf(currentStep)) {
                        li.classList.add('is-complete');
                    }
                }

                li.appendChild(spanLabel);
                container.appendChild(li);
            });
        }

        function renderShippingAddress(container) {
            container.innerHTML = '';
            const address = state.shippingAddress;
            if (!address) {
                const p = document.createElement('p');
                p.className = 'shipping-address-card__empty';
                p.textContent = 'We could not find a shipping address for this checkout.';
                container.appendChild(p);
                return;
            }

            const name = document.createElement('p');
            name.className = 'shipping-address-card__line shipping-address-card__name';
            name.textContent = address.fullName || '';

            const street1 = document.createElement('p');
            street1.className = 'shipping-address-card__line';
            street1.textContent = address.streetLine1 || '';

            if (address.streetLine2) {
                const street2 = document.createElement('p');
                street2.className = 'shipping-address-card__line';
                street2.textContent = address.streetLine2;
                container.appendChild(street2);
            }

            const locality = document.createElement('p');
            locality.className = 'shipping-address-card__line';
            const cityParts = [];
            if (address.city) {
                cityParts.push(address.city);
            }
            if (address.stateRegion) {
                cityParts.push(address.stateRegion);
            }
            if (address.postalCode) {
                cityParts.push(address.postalCode);
            }
            locality.textContent = cityParts.join(', ');

            const country = document.createElement('p');
            country.className = 'shipping-address-card__line';
            country.textContent = address.country || '';

            const contact = document.createElement('p');
            contact.className = 'shipping-address-card__line shipping-address-card__contact';
            const bits = [];
            if (address.phone) {
                bits.push(address.phone);
            }
            if (address.email) {
                bits.push(address.email);
            }
            contact.textContent = bits.join(' b7 ');

            container.appendChild(name);
            container.appendChild(street1);
            container.appendChild(locality);
            container.appendChild(country);
            container.appendChild(contact);
        }

        function renderShippingOptions(container) {
            container.innerHTML = '';

            if (state.isCompleted && !state.shippingMethods.length && state.selectedShippingMethod) {
                const wrapper = document.createElement('div');
                wrapper.className = 'shipping-options__list shipping-options__list--readonly';
                const card = document.createElement('article');
                card.className = 'shipping-option shipping-option--selected shipping-option--readonly';

                const title = document.createElement('h2');
                title.className = 'shipping-option__name';
                title.textContent = state.selectedShippingMethod.name || 'Selected shipping';

                const meta = document.createElement('p');
                meta.className = 'shipping-option__meta';
                const costText = state.selectedShippingMethod.isFreeShipping ? 'Free shipping' : formatCurrency(state.selectedShippingMethod.baseCost || 0);
                const daysText = (typeof state.selectedShippingMethod.typicalMinDays === 'number' && typeof state.selectedShippingMethod.typicalMaxDays === 'number')
                    ? 'Estimated ' + state.selectedShippingMethod.typicalMinDays + 'd7' + state.selectedShippingMethod.typicalMaxDays + ' business days'
                    : '';
                meta.textContent = daysText ? costText + ' b7 ' + daysText : costText;

                const note = document.createElement('p');
                note.className = 'shipping-option__note';
                note.textContent = 'Your shipping method has been confirmed for this order.';

                card.appendChild(title);
                card.appendChild(meta);
                card.appendChild(note);
                wrapper.appendChild(card);
                container.appendChild(wrapper);
                return;
            }

            if (!state.shippingMethods || !state.shippingMethods.length) {
                const p = document.createElement('p');
                p.className = 'shipping-options__empty';
                p.textContent = 'No shipping methods are currently available for this address.';
                container.appendChild(p);
                return;
            }

            const list = document.createElement('ul');
            list.className = 'shipping-options__list';

            state.shippingMethods.forEach(function(method) {
                const li = document.createElement('li');
                li.className = 'shipping-option';
                li.dataset.shippingMethodId = method.shippingMethodId;

                const isSelected = state.selectedShippingMethodId === method.shippingMethodId;
                if (isSelected) {
                    li.classList.add('shipping-option--selected');
                }
                if (state.isCompleted) {
                    li.classList.add('shipping-option--disabled');
                }

                const label = document.createElement('label');
                label.className = 'shipping-option__label';

                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'shippingMethod';
                input.value = method.shippingMethodId;
                input.className = 'shipping-option__radio';
                input.checked = !!isSelected;
                if (state.isCompleted || !state.sessionValid) {
                    input.disabled = true;
                }

                input.addEventListener('change', function() {
                    if (input.disabled) {
                        return;
                    }
                    state.selectedShippingMethodId = method.shippingMethodId;
                    clearError();
                    renderShippingOptions(container);
                    updateConfirmButton();
                });

                const content = document.createElement('div');
                content.className = 'shipping-option__content';

                const name = document.createElement('div');
                name.className = 'shipping-option__name';
                name.textContent = method.name || '';

                const description = document.createElement('div');
                description.className = 'shipping-option__description';
                description.textContent = method.description || '';

                const metaRow = document.createElement('div');
                metaRow.className = 'shipping-option__meta-row';

                const price = document.createElement('div');
                price.className = 'shipping-option__price';
                if (method.isFreeShipping) {
                    price.textContent = 'Free';
                } else {
                    price.textContent = formatCurrency(method.baseCost || 0);
                }

                const eta = document.createElement('div');
                eta.className = 'shipping-option__eta';
                eta.textContent = formatDateRange(method.estimatedMinDate, method.estimatedMaxDate);

                metaRow.appendChild(price);
                metaRow.appendChild(eta);

                content.appendChild(name);
                if (method.description) {
                    content.appendChild(description);
                }
                content.appendChild(metaRow);

                label.appendChild(input);
                label.appendChild(content);

                li.appendChild(label);
                list.appendChild(li);
            });

            container.appendChild(list);
        }

        function renderOrderSummary(container) {
            container.innerHTML = '';
            const summary = state.cartSummary;
            if (!summary) {
                const p = document.createElement('p');
                p.className = 'order-summary-panel__loading';
                p.textContent = 'Loading order summarya0b7a0please wait.';
                container.appendChild(p);
                return;
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'order-summary-panel__stack';

            const rowSubtotal = document.createElement('div');
            rowSubtotal.className = 'order-summary-panel__row';
            const labelSubtotal = document.createElement('span');
            labelSubtotal.className = 'order-summary-panel__label';
            labelSubtotal.textContent = 'Items subtotal';
            const valueSubtotal = document.createElement('span');
            valueSubtotal.className = 'order-summary-panel__value';
            valueSubtotal.textContent = formatCurrency(summary.subtotal || 0);
            rowSubtotal.appendChild(labelSubtotal);
            rowSubtotal.appendChild(valueSubtotal);

            const rowDiscount = document.createElement('div');
            rowDiscount.className = 'order-summary-panel__row';
            const labelDiscount = document.createElement('span');
            labelDiscount.className = 'order-summary-panel__label';
            labelDiscount.textContent = 'Discounts';
            const valueDiscount = document.createElement('span');
            valueDiscount.className = 'order-summary-panel__value order-summary-panel__value--discount';
            const discount = summary.discountTotal || 0;
            valueDiscount.textContent = discount ? '-' + formatCurrency(Math.abs(discount)) : formatCurrency(0);
            rowDiscount.appendChild(labelDiscount);
            rowDiscount.appendChild(valueDiscount);

            const rowShipping = document.createElement('div');
            rowShipping.className = 'order-summary-panel__row';
            const labelShipping = document.createElement('span');
            labelShipping.className = 'order-summary-panel__label';
            labelShipping.textContent = 'Shipping';
            const valueShipping = document.createElement('span');
            valueShipping.className = 'order-summary-panel__value';
            const shipTotal = typeof summary.shippingTotal === 'number' ? summary.shippingTotal : 0;
            valueShipping.textContent = shipTotal === 0 ? 'Calculated at checkout' : formatCurrency(shipTotal);
            rowShipping.appendChild(labelShipping);
            rowShipping.appendChild(valueShipping);

            const rowTax = document.createElement('div');
            rowTax.className = 'order-summary-panel__row';
            const labelTax = document.createElement('span');
            labelTax.className = 'order-summary-panel__label';
            labelTax.textContent = 'Estimated tax';
            const valueTax = document.createElement('span');
            valueTax.className = 'order-summary-panel__value';
            valueTax.textContent = formatCurrency(summary.taxTotal || 0);
            rowTax.appendChild(labelTax);
            rowTax.appendChild(valueTax);

            const rowTotal = document.createElement('div');
            rowTotal.className = 'order-summary-panel__row order-summary-panel__row--total';
            const labelTotal = document.createElement('span');
            labelTotal.className = 'order-summary-panel__label';
            labelTotal.textContent = 'Total';
            const valueTotal = document.createElement('span');
            valueTotal.className = 'order-summary-panel__value order-summary-panel__value--total';
            valueTotal.textContent = formatCurrency(summary.total || 0);
            rowTotal.appendChild(labelTotal);
            rowTotal.appendChild(valueTotal);

            wrapper.appendChild(rowSubtotal);
            wrapper.appendChild(rowDiscount);
            wrapper.appendChild(rowShipping);
            wrapper.appendChild(rowTax);
            wrapper.appendChild(rowTotal);

            container.appendChild(wrapper);
        }

        function renderCompletionNote(container) {
            container.innerHTML = '';
            if (state.isCompleted) {
                const span = document.createElement('span');
                span.textContent = 'Your shipping method is confirmed for this order.';
                container.appendChild(span);
            }
        }

        const populateElements = document.querySelectorAll('[data-populate]');
        const renderers = {
            'checkout-progress': renderProgress,
            'shipping-address': renderShippingAddress,
            'shipping-options-list': renderShippingOptions,
            'order-summary': renderOrderSummary,
            'completion-note': renderCompletionNote
        };

        function renderPopulateElements() {
            populateElements.forEach(function(element) {
                const key = element.dataset.populate;
                const renderer = renderers[key];
                if (typeof renderer === 'function') {
                    renderer(element);
                }
            });
        }

        function updateConfirmButton() {
            const btn = document.querySelector('[data-action="confirm-shipping-method"]');
            if (!btn) {
                return;
            }
            const shouldDisable = !state.sessionValid || state.isLoading || state.isConfirming || !state.selectedShippingMethodId || state.isCompleted;
            if (shouldDisable) {
                btn.setAttribute('disabled', 'disabled');
            } else {
                btn.removeAttribute('disabled');
            }
            if (state.isConfirming) {
                btn.classList.add('is-busy');
                btn.textContent = 'Confirminga0b7a0please wait';
            } else {
                btn.classList.remove('is-busy');
                btn.textContent = 'Confirm shipping method';
            }
        }

        function reloadShippingOptions() {
            if (!state.checkoutSessionId) {
                return;
            }
            setLoading(true);
            clearError();
            try {
                const options = WebsiteSDK.getShippingOptions(state.checkoutSessionId);
                state.step = options.step || state.step;
                state.shippingMethods = options.shippingMethods || [];
                if (options.cartSummary) {
                    state.cartSummary = options.cartSummary;
                }
                if (!state.selectedShippingMethodId && state.shippingMethods.length > 0) {
                    state.selectedShippingMethodId = state.shippingMethods[0].shippingMethodId;
                }
                state.canRetryShippingOptions = false;
            } catch (e) {
                showError('We could not load shipping options for your address. You can try again in a moment or return to your cart.', {
                    allowRetryShippingOptions: true
                });
                state.canRetryShippingOptions = true;
            }
            setLoading(false);
            renderPopulateElements();
            updateConfirmButton();
        }

        function initializePage() {
            if (!state.checkoutSessionId) {
                state.sessionValid = false;
                showError('Your checkout session could not be found. Return to your cart to start checkout again.', {
                    allowRetryShippingOptions: false
                });
                renderPopulateElements();
                updateConfirmButton();
                return;
            }

            setLoading(true);
            clearError();

            try {
                const details = WebsiteSDK.getCheckoutSessionDetails(state.checkoutSessionId);
                if (!details || !details.checkoutSessionId) {
                    throw new Error('Missing checkout session details');
                }
                state.sessionValid = true;
                state.step = details.step || 'shipping_options';
                state.shippingAddress = details.shippingAddress || null;
                state.cartSummary = details.cartSummary || null;
                if (details.selectedShippingMethod && details.selectedShippingMethod.shippingMethodId) {
                    state.selectedShippingMethod = details.selectedShippingMethod;
                    state.selectedShippingMethodId = details.selectedShippingMethod.shippingMethodId;
                }

                if (state.step === 'cancelled') {
                    state.sessionValid = false;
                    showError('This checkout session has been cancelled. Return to your cart to start a new order.', {
                        allowRetryShippingOptions: false
                    });
                } else if (state.step === 'completed') {
                    state.isCompleted = true;
                } else {
                    try {
                        const options = WebsiteSDK.getShippingOptions(state.checkoutSessionId);
                        state.step = options.step || state.step;
                        state.shippingMethods = options.shippingMethods || [];
                        if (options.cartSummary) {
                            state.cartSummary = options.cartSummary;
                        }
                        if (!state.selectedShippingMethodId && state.shippingMethods.length > 0) {
                            state.selectedShippingMethodId = state.shippingMethods[0].shippingMethodId;
                        }
                    } catch (e) {
                        showError('We could not load shipping options for your address. You can try again in a moment or return to your cart.', {
                            allowRetryShippingOptions: true
                        });
                        state.canRetryShippingOptions = true;
                    }
                }
            } catch (e) {
                state.sessionValid = false;
                showError('Your checkout session could not be loaded. Return to your cart to start checkout again.', {
                    allowRetryShippingOptions: false
                });
            }

            setLoading(false);
            renderPopulateElements();
            updateConfirmButton();
        }

        function handleConfirmShippingMethod() {
            if (!state.sessionValid || !state.checkoutSessionId || !state.selectedShippingMethodId || state.isCompleted) {
                return;
            }
            state.isConfirming = true;
            clearError();
            updateConfirmButton();

            try {
                const result = WebsiteSDK.selectShippingMethod(state.checkoutSessionId, state.selectedShippingMethodId);
                if (!result || result.success !== true) {
                    throw new Error('Selection unsuccessful');
                }
                state.step = result.step || state.step;
                if (result.selectedShippingMethod && result.selectedShippingMethod.shippingMethodId) {
                    state.selectedShippingMethod = result.selectedShippingMethod;
                    state.selectedShippingMethodId = result.selectedShippingMethod.shippingMethodId;
                }
                state.isCompleted = state.step === 'completed';

                try {
                    const refreshed = WebsiteSDK.getCheckoutSessionDetails(state.checkoutSessionId);
                    state.step = refreshed.step || state.step;
                    state.shippingAddress = refreshed.shippingAddress || state.shippingAddress;
                    if (refreshed.cartSummary) {
                        state.cartSummary = refreshed.cartSummary;
                    }
                } catch (innerError) {
                    // Ignore refresh errors; keep previous totals.
                }
            } catch (e) {
                showError('We could not save your shipping method. Please try again.', {
                    allowRetryShippingOptions: false
                });
            }

            state.isConfirming = false;
            renderPopulateElements();
            updateConfirmButton();
        }

        function handleBackToShippingDetails() {
            if (state.checkoutSessionId) {
                window.location.href = 'checkout_shipping.html?checkoutSessionId=' + encodeURIComponent(state.checkoutSessionId);
            } else {
                window.location.href = 'checkout_shipping.html';
            }
        }

        function handleGoToCart() {
            window.location.href = 'cart.html';
        }

        function handleRetryLoadShippingOptions() {
            if (!state.sessionValid) {
                return;
            }
            reloadShippingOptions();
        }

        const actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(element) {
            const action = element.dataset.action;
            if (action === 'confirm-shipping-method') {
                element.addEventListener('click', function() {
                    handleConfirmShippingMethod();
                });
            } else if (action === 'back-to-shipping-details') {
                element.addEventListener('click', function() {
                    handleBackToShippingDetails();
                });
            } else if (action === 'go-to-cart') {
                element.addEventListener('click', function() {
                    handleGoToCart();
                });
            } else if (action === 'retry-load-shipping-options') {
                element.addEventListener('click', function() {
                    handleRetryLoadShippingOptions();
                });
            }
        });

        initializePage();
    });
    </script>
</body>
</html>
