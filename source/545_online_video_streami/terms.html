<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Streaming Platform</title>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='terms.css'>
</head>
<body class='app'>
    <header class='site-header'>
        <div class='header-top'>
            <div class='header-left'>
                <button class='icon-button menu-toggle' type='button' aria-label='Toggle navigation'>
                    <span class='icon icon-menu' aria-hidden='true'></span>
                </button>
                <a href='index.html' class='brand' aria-label='Streaming platform home'>
                    <span class='brand-mark' aria-hidden='true'></span>
                    <span class='brand-text'>Streamline</span>
                </a>
            </div>

            <div class='header-center'>
                <form class='search-form' role='search'>
                    <label class='visually-hidden' for='site-search'>Search videos</label>
                    <input id='site-search' class='search-input' type='text' name='q' placeholder='Search' autocomplete='off'>
                    <button class='search-submit' type='submit' aria-label='Search'>
                        <span class='icon icon-search' aria-hidden='true'></span>
                    </button>
                </form>
                <button class='icon-button mic-button' type='button' aria-label='Voice search'>
                    <span class='icon icon-mic' aria-hidden='true'></span>
                </button>
            </div>

            <div class='header-right'>
                <nav class='primary-nav' aria-label='Primary'>
                    <ul class='primary-nav-list'>
                        <li class='primary-nav-item'>
                            <a href='index.html' class='primary-nav-link' title='Homepage with personalized recommendations'>Home</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='browse.html?categoryId=all' class='primary-nav-link' title='Browse all categories, genres, and curated collections'>Browse</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='browse.html?view=live' class='primary-nav-link' title='Browse live streams including gaming and esports'>Live</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='library.html' class='primary-nav-link' title='Access playlists, watchlists, and Watch Later'>Library</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='history.html' class='primary-nav-link' title='View and manage your watch history'>History</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='subscriptions.html' class='primary-nav-link' title='View and change your subscription plans'>Subscriptions</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='settings.html' class='primary-nav-link' title='Manage playback preferences, parental controls, and profiles'>Settings</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main id='content' class='site-main' role='main'>
        <!-- Terms of Service Page Content -->
        <section class='terms-page' aria-labelledby='terms-page-title'>
            <!-- Invisible state manager hook -->
            <div data-component='terms-url-state-sync' hidden></div>

            <!-- Data loader overlay -->
            <div class='terms-loader-overlay' data-component='terms-data-loader' aria-hidden='true'>
                <div class='terms-loader-backdrop'></div>
                <div class='terms-loader-indicator' role='status' aria-live='polite'>
                    <div class='spinner'></div>
                    <p class='terms-loader-text'>Loading Terms of Service…</p>
                </div>
            </div>

            <!-- Optional error message for data loading -->
            <div class='terms-error-banner' data-component='terms-error' role='alert' hidden></div>

            <div class='terms-layout'>
                <!-- Left main content column -->
                <div class='terms-main-column'>
                    <!-- Page header -->
                    <header class='terms-page-header' data-component='terms-page-header' data-populate='terms'>
                        <!-- Filled by JS: title + last updated -->
                    </header>

                    <!-- Search within terms -->
                    <section class='terms-search-section' data-component='terms-search'>
                        <form class='terms-search-form' data-action='submit-search' role='search'>
                            <label class='visually-hidden' for='terms-search-input'>Search within Terms of Service</label>
                            <div class='terms-search-input-wrapper'>
                                <span class='icon icon-search terms-search-icon' aria-hidden='true'></span>
                                <input
                                    id='terms-search-input'
                                    class='terms-search-input'
                                    type='search'
                                    name='query'
                                    placeholder='Search within Terms of Service'
                                    autocomplete='off'
                                    aria-label='Search within Terms of Service'>
                                <button
                                    type='button'
                                    class='terms-search-clear-button'
                                    data-action='clear-search'
                                    aria-label='Clear search'>
                                    <span class='icon icon-close' aria-hidden='true'></span>
                                </button>
                                <button
                                    type='submit'
                                    class='terms-search-submit-button'>
                                    <span class='terms-search-submit-label'>Search</span>
                                </button>
                            </div>
                        </form>
                        <p class='terms-search-hint' aria-live='polite' data-component='terms-search-hint'></p>
                    </section>

                    <!-- Terms sections list -->
                    <section class='terms-section-list' data-component='terms-section-list' data-populate='terms' aria-label='Terms of Service sections'>
                        <!-- Sections rendered by JS -->
                    </section>
                </div>

                <!-- Right sidebar: table of contents -->
                <aside class='terms-toc-sidebar' data-component='terms-toc' data-populate='terms' aria-label='Table of contents'>
                    <!-- TOC items rendered by JS -->
                </aside>
            </div>
        </section>
    </main>

    <footer class='site-footer'>
        <div class='footer-inner'>
            <nav class='footer-nav' aria-label='Footer'>
                <ul class='footer-nav-list'>
                    <li class='footer-nav-item'>
                        <a href='about.html' class='footer-nav-link' title='About the streaming platform'>About</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='help.html' class='footer-nav-link' title='FAQs and support resources'>Help Center</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='contact.html' class='footer-nav-link' title='Contact support and send feedback'>Contact</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='terms.html' class='footer-nav-link' title='Service terms and user agreement'>Terms of Service</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='privacy.html' class='footer-nav-link' title='Privacy and data usage policy'>Privacy Policy</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='subscriptions.html' class='footer-nav-link' title='Overview of subscription options and pricing'>Subscription Plans</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='settings.html' class='footer-nav-link' title='Quick access to user settings'>Settings</a>
                    </li>
                </ul>
            </nav>
            <div class='footer-meta'>
                <span class='footer-logo-mark' aria-hidden='true'></span>
                <span class='footer-text'>&copy; <span data-year='current'>2024</span> Streamline. All rights reserved.</span>
            </div>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    (function() {
        'use strict';

        let termsData = null; // { lastUpdated, sections: [{ sectionId, title, content }] }
        let selectedSectionId = null;
        let currentQuery = '';
        let isInitialRenderComplete = false;

        function getUrlState() {
            const params = new URLSearchParams(window.location.search);
            return {
                sectionId: params.get('sectionId') || null,
                query: params.get('query') || ''
            };
        }

        function setUrlState(state, options) {
            const opts = options || {};
            const url = new URL(window.location.href);
            const params = url.searchParams;

            if (state.sectionId !== undefined) {
                if (state.sectionId === null || state.sectionId === '') {
                    params.delete('sectionId');
                } else {
                    params.set('sectionId', state.sectionId);
                }
            }

            if (state.query !== undefined) {
                if (!state.query) {
                    params.delete('query');
                } else {
                    params.set('query', state.query);
                }
            }

            url.search = params.toString();
            const newUrl = url.pathname + (url.search ? '?' + url.searchParams.toString() : '') + url.hash;

            if (opts.replace) {
                window.history.replaceState(null, '', newUrl);
            } else {
                window.history.pushState(null, '', newUrl);
            }
        }

        function escapeHtml(str) {
            if (typeof str !== 'string') return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function applySearchFilter(sections, query) {
            if (!query) return sections.slice();
            const q = query.toLowerCase();
            return sections.filter(function(section) {
                const title = (section.title || '').toLowerCase();
                const content = (section.content || '').toLowerCase();
                return title.indexOf(q) !== -1 || content.indexOf(q) !== -1;
            });
        }

        function showLoader(show) {
            const loader = document.querySelector('[data-component="terms-data-loader"]');
            if (!loader) return;
            if (show) {
                loader.removeAttribute('aria-hidden');
                loader.style.display = 'block';
            } else {
                loader.setAttribute('aria-hidden', 'true');
                loader.style.display = 'none';
            }
        }

        function showError(message) {
            const errorBanner = document.querySelector('[data-component="terms-error"]');
            if (!errorBanner) return;
            if (message) {
                errorBanner.textContent = message;
                errorBanner.hidden = false;
            } else {
                errorBanner.textContent = '';
                errorBanner.hidden = true;
            }
        }

        // Rendering functions
        function renderPageHeader(container, data) {
            if (!container) return;
            const lastUpdated = data && data.lastUpdated ? escapeHtml(data.lastUpdated) : '';
            container.innerHTML = '';
            const inner = document.createElement('div');
            inner.className = 'terms-page-header-inner';
            inner.innerHTML = `
                <h1 id="terms-page-title" class="terms-title">Terms of Service</h1>
                <p class="terms-meta">${lastUpdated ? 'Last updated: ' + lastUpdated : ''}</p>
            `;
            container.appendChild(inner);
        }

        function renderToc(container, sections, activeSectionId) {
            if (!container) return;
            container.innerHTML = '';

            if (!sections || !sections.length) {
                const empty = document.createElement('p');
                empty.className = 'terms-toc-empty';
                empty.textContent = 'Sections will appear here once loaded.';
                container.appendChild(empty);
                return;
            }

            const heading = document.createElement('h2');
            heading.className = 'terms-toc-heading';
            heading.textContent = 'Contents';
            container.appendChild(heading);

            const list = document.createElement('ul');
            list.className = 'terms-toc-list';

            sections.forEach(function(section) {
                const li = document.createElement('li');
                li.className = 'terms-toc-item';

                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'terms-toc-link';
                if (activeSectionId && section.sectionId === activeSectionId) {
                    button.classList.add('is-active');
                    button.setAttribute('aria-current', 'true');
                }
                button.dataset.action = 'select-section';
                button.dataset.sectionId = section.sectionId || '';
                button.textContent = section.title || '';

                li.appendChild(button);
                list.appendChild(li);
            });

            container.appendChild(list);
        }

        function renderSections(container, allSections, visibleSections, activeSectionId, query) {
            if (!container) return;
            container.innerHTML = '';

            if (!visibleSections || !visibleSections.length) {
                const empty = document.createElement('div');
                empty.className = 'terms-empty-state';
                const message = query ? 'No sections match your search.' : 'No terms sections are available.';
                empty.textContent = message;
                container.appendChild(empty);
                return;
            }

            const queryLower = query ? query.toLowerCase() : '';
            const isFiltering = !!queryLower;

            visibleSections.forEach(function(section) {
                const sectionId = section.sectionId || '';
                const isActive = activeSectionId && sectionId === activeSectionId;

                const sectionEl = document.createElement('article');
                sectionEl.className = 'terms-section';
                sectionEl.dataset.sectionId = sectionId;
                if (isActive) {
                    sectionEl.classList.add('is-selected');
                }

                const headerButton = document.createElement('button');
                headerButton.type = 'button';
                headerButton.className = 'terms-section-header';
                headerButton.dataset.action = 'section-header-click';
                headerButton.dataset.sectionId = sectionId;
                headerButton.innerHTML = `<h2 class="terms-section-title">${escapeHtml(section.title || '')}</h2>`;

                const body = document.createElement('div');
                body.className = 'terms-section-body';
                // Section content may contain HTML (including Privacy Policy links)
                body.innerHTML = section.content || '';

                if (isFiltering && queryLower) {
                    // Lightweight highlighting: wrap plain-text matches in <mark> within text nodes
                    try {
                        highlightQueryInElement(body, queryLower);
                    } catch (e) {
                        // Fail silently if highlight fails; content remains readable
                    }
                }

                sectionEl.appendChild(headerButton);
                sectionEl.appendChild(body);
                container.appendChild(sectionEl);
            });
        }

        function highlightQueryInElement(root, queryLower) {
            if (!root || !queryLower) return;

            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
                acceptNode: function(node) {
                    if (!node.nodeValue) return NodeFilter.FILTER_REJECT;
                    if (!node.parentElement) return NodeFilter.FILTER_REJECT;
                    // Skip script/style
                    const tag = node.parentElement.tagName;
                    if (tag === 'SCRIPT' || tag === 'STYLE') return NodeFilter.FILTER_REJECT;
                    return node.nodeValue.toLowerCase().indexOf(queryLower) !== -1
                        ? NodeFilter.FILTER_ACCEPT
                        : NodeFilter.FILTER_REJECT;
                }
            });

            const textNodes = [];
            let current;
            while ((current = walker.nextNode())) {
                textNodes.push(current);
            }

            textNodes.forEach(function(textNode) {
                const text = textNode.nodeValue;
                const lower = text.toLowerCase();
                const parent = textNode.parentNode;
                let startIndex = 0;

                const frag = document.createDocumentFragment();

                while (true) {
                    const index = lower.indexOf(queryLower, startIndex);
                    if (index === -1) {
                        const tail = text.slice(startIndex);
                        if (tail) {
                            frag.appendChild(document.createTextNode(tail));
                        }
                        break;
                    }
                    const before = text.slice(startIndex, index);
                    if (before) {
                        frag.appendChild(document.createTextNode(before));
                    }
                    const matchText = text.slice(index, index + queryLower.length);
                    const mark = document.createElement('mark');
                    mark.className = 'terms-search-highlight';
                    mark.textContent = matchText;
                    frag.appendChild(mark);
                    startIndex = index + queryLower.length;
                }

                parent.replaceChild(frag, textNode);
            });
        }

        function renderSearchHint(query, totalSections, visibleSectionsCount) {
            const hintEl = document.querySelector('[data-component="terms-search-hint"]');
            if (!hintEl) return;

            if (!query) {
                hintEl.textContent = '';
                return;
            }

            if (!totalSections) {
                hintEl.textContent = '';
                return;
            }

            hintEl.textContent = visibleSectionsCount + ' of ' + totalSections + ' section' + (totalSections === 1 ? '' : 's') + ' match your search.';
        }

        function syncActiveSectionStates(activeSectionId) {
            const sectionEls = document.querySelectorAll('.terms-section');
            sectionEls.forEach(function(el) {
                if (el.dataset.sectionId === activeSectionId) {
                    el.classList.add('is-selected');
                } else {
                    el.classList.remove('is-selected');
                }
            });

            const tocButtons = document.querySelectorAll('.terms-toc-link');
            tocButtons.forEach(function(btn) {
                const isActive = btn.dataset.sectionId === activeSectionId;
                if (isActive) {
                    btn.classList.add('is-active');
                    btn.setAttribute('aria-current', 'true');
                } else {
                    btn.classList.remove('is-active');
                    btn.removeAttribute('aria-current');
                }
            });
        }

        function scrollToSection(sectionId) {
            if (!sectionId) return;
            const sectionEl = document.querySelector('.terms-section[data-section-id="' + CSS.escape(sectionId) + '"]');
            if (!sectionEl) return;
            sectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function applyUrlStateAndRender(fromPopState) {
            if (!termsData) return;
            const state = getUrlState();
            selectedSectionId = state.sectionId;
            currentQuery = state.query || '';

            const searchInput = document.getElementById('terms-search-input');
            if (searchInput) {
                searchInput.value = currentQuery;
            }

            const allSections = termsData.sections || [];
            const filteredSections = applySearchFilter(allSections, currentQuery);

            const headerContainer = document.querySelector('[data-component="terms-page-header"]');
            renderPageHeader(headerContainer, termsData);

            const tocContainer = document.querySelector('[data-component="terms-toc"]');
            renderToc(tocContainer, allSections, selectedSectionId);

            const sectionListContainer = document.querySelector('[data-component="terms-section-list"]');
            renderSections(sectionListContainer, allSections, filteredSections, selectedSectionId, currentQuery);

            renderSearchHint(currentQuery, allSections.length, filteredSections.length);

            if (selectedSectionId && !fromPopState) {
                // Scroll after the DOM has painted to ensure positions
                setTimeout(function() {
                    scrollToSection(selectedSectionId);
                }, 0);
            }

            syncActiveSectionStates(selectedSectionId);
            isInitialRenderComplete = true;
        }

        function initDataLoading() {
            showLoader(true);
            showError('');
            try {
                const data = WebsiteSDK.getTermsOfServiceContent();
                termsData = {
                    lastUpdated: data && data.lastUpdated ? data.lastUpdated : '',
                    sections: Array.isArray(data && data.sections) ? data.sections : []
                };
                showLoader(false);
                const initialState = getUrlState();
                selectedSectionId = initialState.sectionId;
                currentQuery = initialState.query || '';
                applyUrlStateAndRender(false);
            } catch (e) {
                showLoader(false);
                showError('Unable to load Terms of Service at this time. Please try again later.');
                // eslint-disable-next-line no-console
                console.error('Error loading Terms of Service:', e);
            }
        }

        function handleSearchSubmit(event) {
            event.preventDefault();
            const input = document.getElementById('terms-search-input');
            const query = input ? input.value.trim() : '';
            currentQuery = query;
            setUrlState({ query: currentQuery }, { replace: false });
            applyUrlStateAndRender(false);
        }

        function handleClearSearch(event) {
            event.preventDefault();
            const input = document.getElementById('terms-search-input');
            if (input) {
                input.value = '';
            }
            currentQuery = '';
            setUrlState({ query: '' }, { replace: false });
            applyUrlStateAndRender(false);
        }

        function handleSelectSection(sectionId) {
            if (!termsData || !termsData.sections || !termsData.sections.length) return;
            if (!sectionId) return;
            const exists = termsData.sections.some(function(sec) { return sec.sectionId === sectionId; });
            if (!exists) return;
            selectedSectionId = sectionId;
            setUrlState({ sectionId: selectedSectionId }, { replace: false });
            applyUrlStateAndRender(false);
        }

        function handlePopState() {
            if (!termsData) return;
            applyUrlStateAndRender(true);
        }

        function handlePrivacyLinkClick(event) {
            const link = event.target && event.target.closest('a');
            if (!link) return;
            const href = link.getAttribute('href');
            if (!href) return;
            // Handle any privacy.html link or explicitly marked privacy policy links
            const isPrivacyTarget = href.indexOf('privacy.html') !== -1 || link.dataset.privacyLink === 'true';
            if (!isPrivacyTarget) return;
            event.preventDefault();
            window.location.href = 'privacy.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Initialize data loader, URL sync, and components
            initDataLoading();

            // Event: search form submit
            const searchForm = document.querySelector('[data-action="submit-search"]');
            if (searchForm) {
                searchForm.addEventListener('submit', handleSearchSubmit);
            }

            // Event: clear search
            document.addEventListener('click', function(event) {
                const target = event.target.closest('[data-action]');
                if (!target) return;
                const action = target.dataset.action;

                if (action === 'clear-search') {
                    handleClearSearch(event);
                } else if (action === 'select-section') {
                    const sectionId = target.dataset.sectionId || '';
                    handleSelectSection(sectionId);
                } else if (action === 'section-header-click') {
                    const headerSectionId = target.dataset.sectionId || '';
                    handleSelectSection(headerSectionId);
                }
            });

            // Privacy link handler within section content
            const sectionListContainer = document.querySelector('[data-component="terms-section-list"]');
            if (sectionListContainer) {
                sectionListContainer.addEventListener('click', handlePrivacyLinkClick);
            }

            // URL state sync: Back/Forward navigation
            window.addEventListener('popstate', handlePopState);
        });
    })();
    </script>
</body>
</html>
