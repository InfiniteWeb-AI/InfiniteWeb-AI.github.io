<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Browse Videos - Streamline</title>
    <meta name='description' content='Browse and discover videos and live streams by category, with filters and sorting, and open video or channel detail pages.'>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='browse.css'>
</head>
<body class='app'>
    <header class='site-header'>
        <div class='header-top'>
            <div class='header-left'>
                <button class='icon-button menu-toggle' type='button' aria-label='Toggle navigation'>
                    <span class='icon icon-menu' aria-hidden='true'></span>
                </button>
                <a href='index.html' class='brand' aria-label='Streaming platform home'>
                    <span class='brand-mark' aria-hidden='true'></span>
                    <span class='brand-text'>Streamline</span>
                </a>
            </div>

            <div class='header-center'>
                <form class='search-form' role='search'>
                    <label class='visually-hidden' for='site-search'>Search videos</label>
                    <input id='site-search' class='search-input' type='text' name='q' placeholder='Search' autocomplete='off'>
                    <button class='search-submit' type='submit' aria-label='Search'>
                        <span class='icon icon-search' aria-hidden='true'></span>
                    </button>
                </form>
                <button class='icon-button mic-button' type='button' aria-label='Voice search'>
                    <span class='icon icon-mic' aria-hidden='true'></span>
                </button>
            </div>

            <div class='header-right'>
                <nav class='primary-nav' aria-label='Primary'>
                    <ul class='primary-nav-list'>
                        <li class='primary-nav-item'>
                            <a href='index.html' class='primary-nav-link' title='Homepage with personalized recommendations'>Home</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='browse.html?categoryId=all' class='primary-nav-link' title='Browse all categories, genres, and curated collections'>Browse</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='browse.html?view=live' class='primary-nav-link' title='Browse live streams including gaming and esports'>Live</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='library.html' class='primary-nav-link' title='Access playlists, watchlists, and Watch Later'>Library</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='history.html' class='primary-nav-link' title='View and manage your watch history'>History</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='subscriptions.html' class='primary-nav-link' title='View and change your subscription plans'>Subscriptions</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='settings.html' class='primary-nav-link' title='Manage playback preferences, parental controls, and profiles'>Settings</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main id='content' class='site-main' role='main'>
        <section class='browse-page' data-component='browse-page-controller'>
            <div class='browse-page-inner'>
                <section class='browse-category-tabs' aria-label='Browse categories'>
                    <ul class='category-tabs-list' data-component='category-tabs' data-populate='browse-categories'>
                        <!-- Category tabs populated by JS -->
                    </ul>
                </section>

                <div class='browse-layout'>
                    <div class='browse-main-column'>
                        <section class='browse-controls'>
                            <div class='sort-bar' data-component='sort-bar'>
                                <div class='sort-bar-left' data-populate='browse-sort'>
                                    <!-- Sort controls populated by JS -->
                                </div>
                                <div class='sort-bar-right'>
                                    <div class='preferences-sync-indicator' data-component='preferences-sync' data-populate='preferences-sync' aria-live='polite'></div>
                                    <div class='view-mode-toggle' data-component='view-mode-toggle' data-populate='view-mode-toggle' role='radiogroup' aria-label='View mode'>
                                        <!-- View mode toggle populated by JS -->
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section class='browse-results' aria-label='Browse results'>
                            <div class='video-results-grid' data-component='video-results-grid' data-populate='browse-results'>
                                <!-- Video or live stream cards populated by JS -->
                            </div>
                            <div class='pagination-controls' data-component='pagination-controls' data-populate='pagination-controls' aria-label='Pagination'>
                                <!-- Pagination controls populated by JS -->
                            </div>
                        </section>
                    </div>

                    <aside class='browse-filter-sidebar' data-component='filter-panel' aria-label='Filter videos'>
                        <div class='filter-panel-inner' data-populate='browse-filters'>
                            <!-- Filter controls populated by JS -->
                        </div>
                    </aside>
                </div>
            </div>

            <div class='browse-toast-region' aria-live='polite'>
                <div class='toast-message' data-component='not-interested-toast' hidden></div>
            </div>
        </section>
    </main>

    <footer class='site-footer'>
        <div class='footer-inner'>
            <nav class='footer-nav' aria-label='Footer'>
                <ul class='footer-nav-list'>
                    <li class='footer-nav-item'>
                        <a href='about.html' class='footer-nav-link' title='About the streaming platform'>About</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='help.html' class='footer-nav-link' title='FAQs and support resources'>Help Center</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='contact.html' class='footer-nav-link' title='Contact support and send feedback'>Contact</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='terms.html' class='footer-nav-link' title='Service terms and user agreement'>Terms of Service</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='privacy.html' class='footer-nav-link' title='Privacy and data usage policy'>Privacy Policy</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='subscriptions.html' class='footer-nav-link' title='Overview of subscription options and pricing'>Subscription Plans</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='settings.html' class='footer-nav-link' title='Quick access to user settings'>Settings</a>
                    </li>
                </ul>
            </nav>
            <div class='footer-meta'>
                <span class='footer-logo-mark' aria-hidden='true'></span>
                <span class='footer-text'>&copy; <span data-year='current'>2024</span> Streamline. All rights reserved.</span>
            </div>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        'use strict';

        // --------- Utilities ---------
        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value).replace(/[&<>"']/g, function(ch) {
                if (ch === '&') return '&amp;';
                if (ch === '<') return '&lt;';
                if (ch === '>') return '&gt;';
                if (ch === '"') return '&quot;';
                if (ch === '\'') return '&#39;';
                return ch;
            });
        }

        function parseNumberOrNull(value) {
            if (value === null || value === undefined || value === '') {
                return null;
            }
            var n = Number(value);
            return isNaN(n) ? null : n;
        }

        function parseBooleanOrNull(value) {
            if (value === null || value === undefined || value === '') {
                return null;
            }
            if (value === 'true') return true;
            if (value === 'false') return false;
            return null;
        }

        // filters string format: key=value;key2=value2 ... (URL-encoded values)
        function parseFiltersString(str) {
            var filters = {};
            if (!str) return filters;
            str.split(';').forEach(function(pair) {
                var trimmed = pair.trim();
                if (!trimmed) return;
                var parts = trimmed.split('=');
                if (parts.length !== 2) return;
                var key = decodeURIComponent(parts[0]);
                var value = decodeURIComponent(parts[1]);
                if (key === 'releaseYearMin' || key === 'releaseYearMax' ||
                    key === 'durationMinMinutes' || key === 'durationMaxMinutes' ||
                    key === 'ratingMin' || key === 'viewCountMin' ||
                    key === 'liveViewerCountMin') {
                    var num = parseNumberOrNull(value);
                    if (num !== null) {
                        filters[key] = num;
                    }
                } else if (key === 'isLiveOnly') {
                    var boolVal = parseBooleanOrNull(value);
                    if (boolVal !== null) {
                        filters[key] = boolVal;
                    }
                } else if (key === 'genre' || key === 'contentType') {
                    if (value) {
                        filters[key] = value;
                    }
                }
            });
            return filters;
        }

        function serializeFilters(filters) {
            if (!filters) return '';
            var parts = [];
            Object.keys(filters).forEach(function(key) {
                var value = filters[key];
                if (value === null || value === undefined || value === '') return;
                parts.push(encodeURIComponent(key) + '=' + encodeURIComponent(String(value)));
            });
            return parts.join(';');
        }

        function updateUrl(paramsToSet, paramsToRemove) {
            var url = new URL(window.location.href);
            var search = url.searchParams;
            if (paramsToSet) {
                Object.keys(paramsToSet).forEach(function(key) {
                    var value = paramsToSet[key];
                    if (value === null || value === undefined || value === '') {
                        search.delete(key);
                    } else {
                        search.set(key, value);
                    }
                });
            }
            if (paramsToRemove && paramsToRemove.length) {
                paramsToRemove.forEach(function(key) {
                    search.delete(key);
                });
            }
            url.search = search.toString();
            window.history.replaceState(null, '', url.toString());
        }

        // --------- State ---------
        var state = {
            categoryId: null,
            viewMode: null,
            sortOption: null,
            filters: {},
            page: 1,
            pageSize: 24,
            totalResults: 0,
            categories: [],
            filterOptions: null,
            results: [],
            preferences: null
        };

        var containersByPopulate = {};
        document.querySelectorAll('[data-populate]').forEach(function(el) {
            containersByPopulate[el.dataset.populate] = el;
        });

        var preferencesStatusTimeoutId = null;

        function showPreferencesStatus(message, status) {
            var container = containersByPopulate['preferences-sync'];
            if (!container) return;
            container.textContent = message || '';
            container.dataset.status = status || '';
            if (preferencesStatusTimeoutId) {
                window.clearTimeout(preferencesStatusTimeoutId);
                preferencesStatusTimeoutId = null;
            }
            if (message) {
                preferencesStatusTimeoutId = window.setTimeout(function() {
                    container.textContent = '';
                    container.dataset.status = '';
                }, 2000);
            }
        }

        // --------- Initial state resolution ---------
        function readInitialStateFromUrl() {
            var url = new URL(window.location.href);
            var params = url.searchParams;
            var categoryId = params.get('categoryId');
            var viewMode = params.get('view');
            var sortOption = params.get('sort');
            var filtersParam = params.get('filters');
            var filtersObj = filtersParam ? parseFiltersString(filtersParam) : {};

            var preferences = null;
            try {
                preferences = WebsiteSDK.getBrowsePreferences();
            } catch (e) {
                console.error('Error getting browse preferences', e);
            }
            state.preferences = preferences;

            if (!categoryId) {
                if (preferences && preferences.selectedCategoryId) {
                    categoryId = preferences.selectedCategoryId;
                } else {
                    categoryId = 'all';
                }
            }
            if (!viewMode) {
                if (preferences && preferences.viewMode) {
                    viewMode = preferences.viewMode;
                } else {
                    viewMode = 'default';
                }
            }
            if (!sortOption) {
                if (preferences && preferences.sortOption) {
                    sortOption = preferences.sortOption;
                } else {
                    sortOption = viewMode === 'live' ? 'viewer_count_high_to_low' : 'upload_date_newest';
                }
            }

            state.categoryId = categoryId;
            state.viewMode = viewMode;
            state.sortOption = sortOption;
            state.filters = filtersObj || {};
            state.page = 1;
        }

        // --------- Data loading ---------
        function loadCategories() {
            try {
                var cats = WebsiteSDK.getBrowseCategories();
                state.categories = Array.isArray(cats) ? cats : [];
            } catch (e) {
                console.error('Error loading browse categories', e);
                state.categories = [];
            }
        }

        function loadFilterOptions() {
            try {
                var opts = WebsiteSDK.getBrowseFilterOptions(state.categoryId, state.viewMode);
                state.filterOptions = opts || {};
            } catch (e) {
                console.error('Error loading filter options', e);
                state.filterOptions = {};
            }
        }

        function loadResults(options) {
            var append = options && options.append === true;
            try {
                var response = WebsiteSDK.browseVideos(
                    state.categoryId,
                    state.viewMode,
                    state.filters,
                    state.sortOption,
                    state.page,
                    state.pageSize
                );
                if (!response || !Array.isArray(response.results)) {
                    state.results = append ? state.results : [];
                    state.totalResults = 0;
                    return;
                }
                state.totalResults = typeof response.totalResults === 'number' ? response.totalResults : response.results.length;
                state.page = typeof response.page === 'number' ? response.page : state.page;
                state.pageSize = typeof response.pageSize === 'number' ? response.pageSize : state.pageSize;
                if (append) {
                    state.results = state.results.concat(response.results);
                } else {
                    state.results = response.results;
                }
            } catch (e) {
                console.error('Error loading browse results', e);
                if (!append) {
                    state.results = [];
                    state.totalResults = 0;
                }
            }
        }

        // --------- Rendering ---------
        function renderCategoryTabs(container) {
            if (!container) return;
            var html = '';
            state.categories.forEach(function(cat) {
                var isActive = cat.id === state.categoryId;
                html += "<li class='category-tab-item'>" +
                    "<button type='button' class='category-tab-button" + (isActive ? " category-tab-button--active" : '') + "' " +
                    "data-action='change-category' data-category-id='" + escapeHtml(cat.id) + "'" +
                    " aria-pressed='" + (isActive ? 'true' : 'false') + "'>" +
                    "<span class='category-tab-label'>" + escapeHtml(cat.name || cat.id) + "</span>" +
                    "</button>" +
                    "</li>";
            });
            container.innerHTML = html;
        }

        function renderViewModeToggle(container) {
            if (!container) return;
            var isDefault = state.viewMode === 'default';
            var isLive = state.viewMode === 'live';
            var html = "" +
                "<button type='button' class='view-mode-pill" + (isDefault ? " view-mode-pill--active" : '') + "' " +
                "role='radio' aria-checked='" + (isDefault ? 'true' : 'false') + "' " +
                "data-action='change-view-mode' data-view-mode='default'>" +
                "Browse" +
                "</button>" +
                "<button type='button' class='view-mode-pill" + (isLive ? " view-mode-pill--active" : '') + "' " +
                "role='radio' aria-checked='" + (isLive ? 'true' : 'false') + "' " +
                "data-action='change-view-mode' data-view-mode='live'>" +
                "Live" +
                "</button>";
            container.innerHTML = html;
        }

        function renderSortBar(container) {
            if (!container) return;
            var sortOption = state.sortOption || '';
            var isLiveView = state.viewMode === 'live';
            var options = [
                { value: 'upload_date_newest', label: 'Upload date (newest)' },
                { value: 'upload_date_oldest', label: 'Upload date (oldest)' },
                { value: 'views_high_to_low', label: 'Views (high to low)' },
                { value: 'views_low_to_high', label: 'Views (low to high)' },
                { value: 'rating_high_to_low', label: 'Rating (high to low)' },
                { value: 'rating_low_to_high', label: 'Rating (low to high)' }
            ];
            if (isLiveView) {
                options.push({ value: 'viewer_count_high_to_low', label: 'Viewer count (high to low)' });
                options.push({ value: 'viewer_count_low_to_high', label: 'Viewer count (low to high)' });
            }

            var selectHtml = "<label class='sort-label' for='browse-sort-select'>Sort by</label>" +
                "<select id='browse-sort-select' class='sort-select' data-action='change-sort'>";
            options.forEach(function(opt) {
                selectHtml += "<option value='" + opt.value + "'" + (opt.value === sortOption ? ' selected' : '') + ">" + escapeHtml(opt.label) + "</option>";
            });
            selectHtml += "</select>";
            container.innerHTML = selectHtml;
        }

        function renderFilterPanel(container) {
            if (!container) return;
            var opts = state.filterOptions || {};
            var filters = state.filters || {};

            var genres = Array.isArray(opts.genres) ? opts.genres : [];
            var contentTypes = Array.isArray(opts.contentTypes) ? opts.contentTypes : [];
            var releaseYearRange = opts.releaseYearRange || {};
            var durationRange = opts.durationMinutesRange || {};
            var ratingRange = opts.ratingRange || {};
            var liveViewerRange = opts.liveViewerCountRange || {};

            var genreOptionsHtml = "<option value=''>Any genre</option>";
            genres.forEach(function(g) {
                var val = g.value || '';
                var label = g.label || g.value || '';
                genreOptionsHtml += "<option value='" + escapeHtml(val) + "'" + (filters.genre === val ? ' selected' : '') + ">" + escapeHtml(label) + "</option>";
            });

            var contentTypeOptionsHtml = "<option value=''>Any type</option>";
            contentTypes.forEach(function(ct) {
                var val = ct.value || '';
                var label = ct.label || ct.value || '';
                contentTypeOptionsHtml += "<option value='" + escapeHtml(val) + "'" + (filters.contentType === val ? ' selected' : '') + ">" + escapeHtml(label) + "</option>";
            });

            var releaseMinVal = filters.releaseYearMin != null ? String(filters.releaseYearMin) : (releaseYearRange.min != null ? String(releaseYearRange.min) : '');
            var releaseMaxVal = filters.releaseYearMax != null ? String(filters.releaseYearMax) : (releaseYearRange.max != null ? String(releaseYearRange.max) : '');

            var durationMinVal = filters.durationMinMinutes != null ? String(filters.durationMinMinutes) : (durationRange.min != null ? String(durationRange.min) : '');
            var durationMaxVal = filters.durationMaxMinutes != null ? String(filters.durationMaxMinutes) : (durationRange.max != null ? String(durationRange.max) : '');

            var ratingMinVal = filters.ratingMin != null ? String(filters.ratingMin) : (ratingRange.min != null ? String(ratingRange.min) : '');
            var viewCountMinVal = filters.viewCountMin != null ? String(filters.viewCountMin) : '';
            var liveViewerMinVal = filters.liveViewerCountMin != null ? String(filters.liveViewerCountMin) : (liveViewerRange.min != null ? String(liveViewerRange.min) : '');
            var isLiveOnly = !!filters.isLiveOnly;

            var html = "" +
                "<section class='filter-section'>" +
                "  <h2 class='filter-section-title'>Content</h2>" +
                "  <div class='filter-field'>" +
                "    <label class='filter-label' for='filter-genre'>Genre</label>" +
                "    <select id='filter-genre' class='filter-select' data-action='filter-change' data-filter-key='genre'>" +
                genreOptionsHtml +
                "    </select>" +
                "  </div>" +
                "  <div class='filter-field'>" +
                "    <label class='filter-label' for='filter-content-type'>Type</label>" +
                "    <select id='filter-content-type' class='filter-select' data-action='filter-change' data-filter-key='contentType'>" +
                contentTypeOptionsHtml +
                "    </select>" +
                "  </div>" +
                "</section>" +

                "<section class='filter-section'>" +
                "  <h2 class='filter-section-title'>Release year</h2>" +
                "  <div class='filter-range'>" +
                "    <div class='filter-field filter-field--inline'>" +
                "      <label class='filter-label' for='filter-release-min'>From</label>" +
                "      <input id='filter-release-min' class='filter-input' type='number' min='" + escapeHtml(releaseYearRange.min != null ? releaseYearRange.min : '') + "' max='" + escapeHtml(releaseYearRange.max != null ? releaseYearRange.max : '') + "' value='" + escapeHtml(releaseMinVal) + "' data-action='filter-change' data-filter-key='releaseYearMin'>" +
                "    </div>" +
                "    <div class='filter-field filter-field--inline'>" +
                "      <label class='filter-label' for='filter-release-max'>To</label>" +
                "      <input id='filter-release-max' class='filter-input' type='number' min='" + escapeHtml(releaseYearRange.min != null ? releaseYearRange.min : '') + "' max='" + escapeHtml(releaseYearRange.max != null ? releaseYearRange.max : '') + "' value='" + escapeHtml(releaseMaxVal) + "' data-action='filter-change' data-filter-key='releaseYearMax'>" +
                "    </div>" +
                "  </div>" +
                "</section>" +

                "<section class='filter-section'>" +
                "  <h2 class='filter-section-title'>Duration (minutes)</h2>" +
                "  <div class='filter-range'>" +
                "    <div class='filter-field filter-field--inline'>" +
                "      <label class='filter-label' for='filter-duration-min'>Min</label>" +
                "      <input id='filter-duration-min' class='filter-input' type='number' min='" + escapeHtml(durationRange.min != null ? durationRange.min : '') + "' max='" + escapeHtml(durationRange.max != null ? durationRange.max : '') + "' value='" + escapeHtml(durationMinVal) + "' data-action='filter-change' data-filter-key='durationMinMinutes'>" +
                "    </div>" +
                "    <div class='filter-field filter-field--inline'>" +
                "      <label class='filter-label' for='filter-duration-max'>Max</label>" +
                "      <input id='filter-duration-max' class='filter-input' type='number' min='" + escapeHtml(durationRange.min != null ? durationRange.min : '') + "' max='" + escapeHtml(durationRange.max != null ? durationRange.max : '') + "' value='" + escapeHtml(durationMaxVal) + "' data-action='filter-change' data-filter-key='durationMaxMinutes'>" +
                "    </div>" +
                "  </div>" +
                "</section>" +

                "<section class='filter-section'>" +
                "  <h2 class='filter-section-title'>Rating & popularity</h2>" +
                "  <div class='filter-field'>" +
                "    <label class='filter-label' for='filter-rating-min'>Minimum rating</label>" +
                "    <input id='filter-rating-min' class='filter-input' type='number' min='" + escapeHtml(ratingRange.min != null ? ratingRange.min : '0') + "' max='" + escapeHtml(ratingRange.max != null ? ratingRange.max : '5') + "' step='0.1' value='" + escapeHtml(ratingMinVal) + "' data-action='filter-change' data-filter-key='ratingMin'>" +
                "  </div>" +
                "  <div class='filter-field'>" +
                "    <label class='filter-label' for='filter-viewcount-min'>Min views</label>" +
                "    <input id='filter-viewcount-min' class='filter-input' type='number' min='0' value='" + escapeHtml(viewCountMinVal) + "' data-action='filter-change' data-filter-key='viewCountMin'>" +
                "  </div>" +
                "</section>";

            if (state.viewMode === 'live') {
                html += "<section class='filter-section'>" +
                    "  <h2 class='filter-section-title'>Live viewers</h2>" +
                    "  <div class='filter-field'>" +
                    "    <label class='filter-label' for='filter-live-viewers-min'>Min viewers</label>" +
                    "    <input id='filter-live-viewers-min' class='filter-input' type='number' min='" + escapeHtml(liveViewerRange.min != null ? liveViewerRange.min : '0') + "' max='" + escapeHtml(liveViewerRange.max != null ? liveViewerRange.max : '') + "' value='" + escapeHtml(liveViewerMinVal) + "' data-action='filter-change' data-filter-key='liveViewerCountMin'>" +
                    "  </div>" +
                    "  <div class='filter-field filter-field--checkbox'>" +
                    "    <label class='filter-checkbox-label'>" +
                    "      <input type='checkbox' class='filter-checkbox-input' data-action='filter-change' data-filter-key='isLiveOnly'" + (isLiveOnly ? ' checked' : '') + ">" +
                    "      <span>Show live streams only</span>" +
                    "    </label>" +
                    "  </div>" +
                    "</section>";
            }

            html += "<section class='filter-section filter-section--actions'>" +
                "  <button type='button' class='filter-reset-button' data-action='filters-reset'>Reset filters</button>" +
                "</section>";

            container.innerHTML = html;
        }

        function renderResultsGrid(container, options) {
            if (!container) return;
            var append = options && options.append === true;
            if (!append) {
                container.innerHTML = '';
            }
            var results = state.results || [];
            if (!results.length && !append) {
                container.innerHTML = "<p class='results-empty'>No videos found. Try adjusting filters or sorting.</p>";
                return;
            }
            var fragment = document.createDocumentFragment();
            results.forEach(function(item) {
                var card = document.createElement('article');
                card.className = 'video-card';
                card.setAttribute('data-video-id', item.videoId);
                card.setAttribute('data-channel-id', item.channelId || '');

                var thumbWrapper = document.createElement('a');
                thumbWrapper.className = 'video-card-thumb-wrapper';
                thumbWrapper.href = 'javascript:void(0)';
                thumbWrapper.setAttribute('data-action', 'open-video');
                thumbWrapper.setAttribute('data-video-id', item.videoId);

                var img = document.createElement('img');
                img.className = 'video-card-thumb';
                img.src = item.thumbnailUrl || '';
                img.alt = item.title ? item.title : 'Video thumbnail';
                thumbWrapper.appendChild(img);

                if (item.isLive) {
                    var liveBadge = document.createElement('span');
                    liveBadge.className = 'badge-live';
                    liveBadge.textContent = 'LIVE';
                    thumbWrapper.appendChild(liveBadge);
                } else if (item.durationMinutes != null) {
                    var durationBadge = document.createElement('span');
                    durationBadge.className = 'badge-duration';
                    durationBadge.textContent = item.durationMinutes + ' min';
                    thumbWrapper.appendChild(durationBadge);
                }

                var body = document.createElement('div');
                body.className = 'video-card-body';

                var titleLink = document.createElement('a');
                titleLink.className = 'video-card-title';
                titleLink.href = 'javascript:void(0)';
                titleLink.setAttribute('data-action', 'open-video');
                titleLink.setAttribute('data-video-id', item.videoId);
                titleLink.textContent = item.title || '';
                body.appendChild(titleLink);

                var metaRow = document.createElement('div');
                metaRow.className = 'video-card-meta-row';

                var channelLink = document.createElement('a');
                channelLink.className = 'video-card-channel';
                channelLink.href = 'javascript:void(0)';
                channelLink.setAttribute('data-action', 'open-channel');
                channelLink.setAttribute('data-channel-id', item.channelId || '');
                channelLink.textContent = item.channelName || '';
                metaRow.appendChild(channelLink);

                var stats = document.createElement('div');
                stats.className = 'video-card-stats';
                var parts = [];
                if (item.viewCount != null) {
                    parts.push((item.viewCount).toLocaleString() + ' views');
                }
                if (item.ratingAverage != null) {
                    parts.push(item.ratingAverage.toFixed(1) + ' rating');
                }
                if (item.releaseYear != null) {
                    parts.push(String(item.releaseYear));
                }
                if (item.isLive && item.liveViewerCount != null) {
                    parts.push((item.liveViewerCount).toLocaleString() + ' watching');
                }
                stats.textContent = parts.join(' • ');
                metaRow.appendChild(stats);

                body.appendChild(metaRow);

                var chipsRow = document.createElement('div');
                chipsRow.className = 'video-card-chips';
                if (item.contentCategory) {
                    var catChip = document.createElement('span');
                    catChip.className = 'chip chip--meta';
                    catChip.textContent = item.contentCategory;
                    chipsRow.appendChild(catChip);
                }
                if (item.genre) {
                    var genreChip = document.createElement('span');
                    genreChip.className = 'chip chip--meta';
                    genreChip.textContent = item.genre;
                    chipsRow.appendChild(genreChip);
                }
                if (item.contentType) {
                    var typeChip = document.createElement('span');
                    typeChip.className = 'chip chip--meta';
                    typeChip.textContent = item.contentType;
                    chipsRow.appendChild(typeChip);
                }
                body.appendChild(chipsRow);

                var actions = document.createElement('div');
                actions.className = 'video-card-actions';
                var notInterestedBtn = document.createElement('button');
                notInterestedBtn.type = 'button';
                notInterestedBtn.className = 'icon-button video-card-not-interested';
                notInterestedBtn.setAttribute('data-action', 'not-interested');
                notInterestedBtn.setAttribute('data-video-id', item.videoId);
                notInterestedBtn.title = 'Not interested';
                notInterestedBtn.innerHTML = "<span class='icon icon-more-vertical' aria-hidden='true'></span><span class='visually-hidden'>Not interested</span>";
                actions.appendChild(notInterestedBtn);

                card.appendChild(thumbWrapper);
                card.appendChild(body);
                card.appendChild(actions);

                fragment.appendChild(card);
            });
            if (append) {
                container.appendChild(fragment);
            } else {
                container.appendChild(fragment);
            }
        }

        function renderPagination(container) {
            if (!container) return;
            var page = state.page || 1;
            var pageSize = state.pageSize || 1;
            var total = state.totalResults || 0;
            var totalPages = pageSize > 0 ? Math.max(1, Math.ceil(total / pageSize)) : 1;

            var html = "" +
                "<div class='pagination-inner'>" +
                "  <button type='button' class='pagination-button' data-action='page-prev'" + (page <= 1 ? ' disabled' : '') + ">Previous</button>" +
                "  <span class='pagination-status'>Page " + page + " of " + totalPages + "</span>" +
                "  <button type='button' class='pagination-button' data-action='page-next'" + (page >= totalPages ? ' disabled' : '') + ">Next</button>" +
                "  <button type='button' class='pagination-button pagination-button--ghost' data-action='page-load-more'" + (page >= totalPages ? ' disabled' : '') + ">Load more</button>" +
                "</div>";
            container.innerHTML = html;
        }

        function renderAll(options) {
            var append = options && options.append === true;
            if (containersByPopulate['browse-categories']) {
                renderCategoryTabs(containersByPopulate['browse-categories']);
            }
            if (containersByPopulate['view-mode-toggle']) {
                renderViewModeToggle(containersByPopulate['view-mode-toggle']);
            }
            if (containersByPopulate['browse-sort']) {
                renderSortBar(containersByPopulate['browse-sort']);
            }
            if (containersByPopulate['browse-filters']) {
                renderFilterPanel(containersByPopulate['browse-filters']);
            }
            if (containersByPopulate['browse-results']) {
                renderResultsGrid(containersByPopulate['browse-results'], { append: append });
            }
            if (containersByPopulate['pagination-controls']) {
                renderPagination(containersByPopulate['pagination-controls']);
            }
        }

        // --------- Preferences sync ---------
        function saveBrowsePreferences() {
            showPreferencesStatus('Saving preferences…', 'saving');
            try {
                var result = WebsiteSDK.updateBrowsePreferences(state.categoryId, state.viewMode, state.sortOption);
                if (result && result.success && result.preferences) {
                    state.preferences = result.preferences;
                    showPreferencesStatus('Preferences saved', 'saved');
                } else {
                    showPreferencesStatus('Could not save preferences', 'error');
                }
            } catch (e) {
                console.error('Error updating browse preferences', e);
                showPreferencesStatus('Could not save preferences', 'error');
            }
        }

        // --------- Event handlers ---------
        function handleCategoryChange(newCategoryId) {
            if (!newCategoryId || newCategoryId === state.categoryId) return;
            state.categoryId = newCategoryId;
            state.viewMode = 'default';
            state.page = 1;
            state.filters = {};
            updateUrl({ categoryId: newCategoryId, view: 'default', sort: state.sortOption, filters: '' }, []);
            saveBrowsePreferences();
            loadFilterOptions();
            loadResults({ append: false });
            renderAll({ append: false });
        }

        function handleViewModeChange(newViewMode) {
            if (!newViewMode || newViewMode === state.viewMode) return;
            state.viewMode = newViewMode;
            state.page = 1;
            // Keep current sort as per requirements
            updateUrl({ view: newViewMode }, []);
            saveBrowsePreferences();
            loadFilterOptions();
            loadResults({ append: false });
            renderAll({ append: false });
        }

        function handleSortChange(newSort) {
            if (!newSort || newSort === state.sortOption) return;
            state.sortOption = newSort;
            state.page = 1;
            updateUrl({ sort: newSort }, []);
            saveBrowsePreferences();
            loadResults({ append: false });
            renderAll({ append: false });
        }

        function collectFiltersFromControls() {
            var filters = {};
            var container = containersByPopulate['browse-filters'];
            if (!container) return filters;
            container.querySelectorAll('[data-filter-key]').forEach(function(input) {
                var key = input.getAttribute('data-filter-key');
                if (!key) return;
                var type = input.type;
                var value;
                if (type === 'checkbox') {
                    value = input.checked;
                } else {
                    value = input.value;
                }
                if (key === 'genre' || key === 'contentType') {
                    if (value) {
                        filters[key] = value;
                    }
                } else if (key === 'isLiveOnly') {
                    if (value) {
                        filters[key] = true;
                    }
                } else {
                    var num = parseNumberOrNull(value);
                    if (num !== null) {
                        filters[key] = num;
                    }
                }
            });
            return filters;
        }

        function handleFiltersChange() {
            state.filters = collectFiltersFromControls();
            state.page = 1;
            var filtersStr = serializeFilters(state.filters);
            updateUrl({ filters: filtersStr }, []);
            loadResults({ append: false });
            renderAll({ append: false });
        }

        function handleFiltersReset() {
            state.filters = {};
            state.page = 1;
            updateUrl({ filters: '' }, []);
            loadFilterOptions();
            loadResults({ append: false });
            renderAll({ append: false });
        }

        function handlePageChange(delta, options) {
            var append = options && options.append === true;
            var page = state.page || 1;
            var pageSize = state.pageSize || 1;
            var total = state.totalResults || 0;
            var totalPages = pageSize > 0 ? Math.max(1, Math.ceil(total / pageSize)) : 1;
            var newPage = page + delta;
            if (newPage < 1) newPage = 1;
            if (newPage > totalPages) newPage = totalPages;
            if (newPage === state.page && !append) return;
            state.page = newPage;
            loadResults({ append: append });
            renderAll({ append: append });
        }

        function handleLoadMore() {
            var pageSize = state.pageSize || 1;
            var total = state.totalResults || 0;
            var totalPages = pageSize > 0 ? Math.max(1, Math.ceil(total / pageSize)) : 1;
            if (state.page >= totalPages) return;
            state.page = state.page + 1;
            loadResults({ append: true });
            renderAll({ append: true });
        }

        function openVideo(videoId) {
            if (!videoId) return;
            window.location.href = 'video.html?videoId=' + encodeURIComponent(videoId);
        }

        function openChannel(channelId) {
            if (!channelId) return;
            window.location.href = 'channel.html?channelId=' + encodeURIComponent(channelId);
        }

        function showToast(message) {
            var toast = document.querySelector('[data-component="not-interested-toast"]');
            if (!toast) return;
            toast.textContent = message || '';
            if (!message) {
                toast.hidden = true;
                return;
            }
            toast.hidden = false;
            window.setTimeout(function() {
                toast.hidden = true;
            }, 2500);
        }

        function handleNotInterested(videoId, sourceElement) {
            if (!videoId) return;
            try {
                var response = WebsiteSDK.markRecommendationNotInterested(videoId, 'browse');
                if (response && response.success) {
                    // Remove from current results
                    state.results = (state.results || []).filter(function(item) { return item.videoId !== videoId; });
                    if (containersByPopulate['browse-results']) {
                        renderResultsGrid(containersByPopulate['browse-results'], { append: false });
                    }
                    showToast('We will show fewer recommendations like this.');
                } else {
                    showToast('Could not record feedback.');
                }
            } catch (e) {
                console.error('Error recording not interested feedback', e);
                showToast('Could not record feedback.');
            }
        }

        // Global click handler
        document.addEventListener('click', function(event) {
            var actionEl = event.target.closest('[data-action]');
            if (!actionEl) return;
            var action = actionEl.getAttribute('data-action');
            if (!action) return;

            if (action === 'change-category') {
                event.preventDefault();
                var newCategoryId = actionEl.getAttribute('data-category-id');
                handleCategoryChange(newCategoryId);
            } else if (action === 'change-view-mode') {
                event.preventDefault();
                var newView = actionEl.getAttribute('data-view-mode');
                handleViewModeChange(newView);
            } else if (action === 'page-prev') {
                event.preventDefault();
                handlePageChange(-1, { append: false });
            } else if (action === 'page-next') {
                event.preventDefault();
                handlePageChange(1, { append: false });
            } else if (action === 'page-load-more') {
                event.preventDefault();
                handleLoadMore();
            } else if (action === 'open-video') {
                event.preventDefault();
                var vid = actionEl.getAttribute('data-video-id');
                openVideo(vid);
            } else if (action === 'open-channel') {
                event.preventDefault();
                var cid = actionEl.getAttribute('data-channel-id');
                openChannel(cid);
            } else if (action === 'not-interested') {
                event.preventDefault();
                event.stopPropagation();
                var vid2 = actionEl.getAttribute('data-video-id');
                handleNotInterested(vid2, actionEl);
            } else if (action === 'filters-reset') {
                event.preventDefault();
                handleFiltersReset();
            }
        });

        // Global change handler for sort and filters
        document.addEventListener('change', function(event) {
            var actionEl = event.target.closest('[data-action]');
            if (!actionEl) return;
            var action = actionEl.getAttribute('data-action');
            if (!action) return;

            if (action === 'change-sort') {
                var newSort = actionEl.value;
                handleSortChange(newSort);
            } else if (action === 'filter-change') {
                handleFiltersChange();
            }
        });

        // Handle back/forward navigation
        window.addEventListener('popstate', function() {
            readInitialStateFromUrl();
            loadFilterOptions();
            loadResults({ append: false });
            renderAll({ append: false });
        });

        // --------- Initialization ---------
        function init() {
            readInitialStateFromUrl();
            loadCategories();
            loadFilterOptions();
            loadResults({ append: false });
            renderAll({ append: false });
        }

        init();
    });
    </script>
</body>
