<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Streaming Platform</title>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='about.css'>
</head>
<body class='app'>
    <header class='site-header'>
        <div class='header-top'>
            <div class='header-left'>
                <button class='icon-button menu-toggle' type='button' aria-label='Toggle navigation'>
                    <span class='icon icon-menu' aria-hidden='true'></span>
                </button>
                <a href='index.html' class='brand' aria-label='Streaming platform home'>
                    <span class='brand-mark' aria-hidden='true'></span>
                    <span class='brand-text'>Streamline</span>
                </a>
            </div>

            <div class='header-center'>
                <form class='search-form' role='search'>
                    <label class='visually-hidden' for='site-search'>Search videos</label>
                    <input id='site-search' class='search-input' type='text' name='q' placeholder='Search' autocomplete='off'>
                    <button class='search-submit' type='submit' aria-label='Search'>
                        <span class='icon icon-search' aria-hidden='true'></span>
                    </button>
                </form>
                <button class='icon-button mic-button' type='button' aria-label='Voice search'>
                    <span class='icon icon-mic' aria-hidden='true'></span>
                </button>
            </div>

            <div class='header-right'>
                <nav class='primary-nav' aria-label='Primary'>
                    <ul class='primary-nav-list'>
                        <li class='primary-nav-item'>
                            <a href='index.html' class='primary-nav-link' title='Homepage with personalized recommendations'>Home</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='browse.html?categoryId=all' class='primary-nav-link' title='Browse all categories, genres, and curated collections'>Browse</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='browse.html?view=live' class='primary-nav-link' title='Browse live streams including gaming and esports'>Live</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='library.html' class='primary-nav-link' title='Access playlists, watchlists, and Watch Later'>Library</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='history.html' class='primary-nav-link' title='View and manage your watch history'>History</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='subscriptions.html' class='primary-nav-link' title='View and change your subscription plans'>Subscriptions</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='settings.html' class='primary-nav-link' title='Manage playback preferences, parental controls, and profiles'>Settings</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main id='content' class='site-main' role='main'>
        <div class='about-page' data-component='about-page-controller'>
            <div class='about-page-inner'>
                <div class='about-main-column'>
                    <header class='about-headline-block' data-component='about-headline' data-populate='about-headline'>
                        <h1 class='about-title'>About Streamline</h1>
                    </header>

                    <section class='about-highlights-strip' aria-label='Platform highlights' data-component='about-highlights-list' data-populate='about-highlights'>
                        <!-- Highlights rendered by JS -->
                    </section>

                    <section class='about-body-sections' aria-label='About Streamline details' data-component='about-body-sections' data-populate='about-body-sections'>
                        <!-- Body sections rendered by JS -->
                    </section>
                </div>

                <aside class='about-sidebar' aria-label='About page navigation and resources'>
                    <nav class='about-internal-navigation' data-component='about-internal-navigation' data-populate='about-internal-navigation' aria-label='About sections navigation'>
                        <!-- In-page navigation rendered by JS -->
                    </nav>

                    <section class='about-contextual-links' data-component='about-contextual-links' data-populate='about-contextual-links' aria-label='Related resources'>
                        <!-- Contextual links rendered by JS -->
                    </section>
                </aside>
            </div>
        </div>
    </main>

    <footer class='site-footer'>
        <div class='footer-inner'>
            <nav class='footer-nav' aria-label='Footer'>
                <ul class='footer-nav-list'>
                    <li class='footer-nav-item'>
                        <a href='about.html' class='footer-nav-link' title='About the streaming platform'>About</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='help.html' class='footer-nav-link' title='FAQs and support resources'>Help Center</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='contact.html' class='footer-nav-link' title='Contact support and send feedback'>Contact</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='terms.html' class='footer-nav-link' title='Service terms and user agreement'>Terms of Service</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='privacy.html' class='footer-nav-link' title='Privacy and data usage policy'>Privacy Policy</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='subscriptions.html' class='footer-nav-link' title='Overview of subscription options and pricing'>Subscription Plans</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='settings.html' class='footer-nav-link' title='Quick access to user settings'>Settings</a>
                    </li>
                </ul>
            </nav>
            <div class='footer-meta'>
                <span class='footer-logo-mark' aria-hidden='true'></span>
                <span class='footer-text'>&copy; <span data-year='current'>2024</span> Streamline. All rights reserved.</span>
            </div>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var aboutState = {
            rawData: null,
            processedSections: [],
            processedHighlights: [],
            contextualLinks: [],
            activeSectionId: null,
            viewMode: 'sections'
        };

        var headlineContainer = document.querySelector('[data-populate="about-headline"]');
        var highlightsContainer = document.querySelector('[data-populate="about-highlights"]');
        var bodySectionsContainer = document.querySelector('[data-populate="about-body-sections"]');
        var navContainer = document.querySelector('[data-populate="about-internal-navigation"]');
        var contextualLinksContainer = document.querySelector('[data-populate="about-contextual-links"]');

        function getUrlParams() {
            var search = new URLSearchParams(window.location.search);
            return {
                section: search.get('section'),
                view: search.get('view')
            };
        }

        function slugify(title) {
            return (title || '').toString().toLowerCase().trim()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
        }

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/'/g, '&#39;');
        }

        // Replace markers like [[contact]] and [[help_center]] and collect references
        function transformContentText(raw) {
            var references = [];
            var text = escapeHtml(raw || '');

            if (text.indexOf('[[contact]]') !== -1) {
                references.push({ type: 'contact' });
                text = text.replace(/\[\[contact\]\]/g, '<a href="contact.html" class="inline-link" data-action="contact-link">contact us</a>');
            }
            if (text.indexOf('[[help_center]]') !== -1) {
                references.push({ type: 'help' });
                text = text.replace(/\[\[help_center\]\]/g, '<a href="help.html" class="inline-link" data-action="help-link">visit the Help Center</a>');
            }

            var paragraphs = text.split(/\n{2,}/);
            var html = paragraphs.map(function(block) {
                var withBreaks = block.replace(/\n/g, '<br>');
                return '<p>' + withBreaks + '</p>';
            }).join('');

            return { html: html, references: references };
        }

        function buildProcessedData() {
            var sections = aboutState.rawData && aboutState.rawData.bodySections ? aboutState.rawData.bodySections : [];
            var highlights = aboutState.rawData && aboutState.rawData.highlights ? aboutState.rawData.highlights : [];
            var contextual = [];

            aboutState.processedSections = sections.map(function(section) {
                var id = slugify(section.title || 'section');
                var transformed = transformContentText(section.content || '');
                if (transformed.references.length) {
                    transformed.references.forEach(function(ref) {
                        contextual.push({ type: ref.type, source: 'body', sectionId: id });
                    });
                }
                return {
                    id: id,
                    title: section.title || '',
                    html: transformed.html
                };
            });

            aboutState.processedHighlights = highlights.map(function(item, index) {
                var transformed = transformContentText(item.description || '');
                if (transformed.references.length) {
                    transformed.references.forEach(function(ref) {
                        contextual.push({ type: ref.type, source: 'highlight', highlightIndex: index });
                    });
                }
                return {
                    iconKey: item.iconKey || '',
                    title: item.title || '',
                    html: transformed.html
                };
            });

            var hasContact = contextual.some(function(ref) { return ref.type === 'contact'; });
            var hasHelp = contextual.some(function(ref) { return ref.type === 'help'; });

            if (!hasContact) {
                contextual.push({ type: 'contact', source: 'default' });
            }
            if (!hasHelp) {
                contextual.push({ type: 'help', source: 'default' });
            }

            var seen = {};
            aboutState.contextualLinks = contextual.filter(function(ref) {
                if (seen[ref.type]) return false;
                seen[ref.type] = true;
                return true;
            });
        }

        function initStateFromUrl() {
            var params = getUrlParams();
            var sectionIds = {};
            aboutState.processedSections.forEach(function(sec) { sectionIds[sec.id] = true; });

            if (params.section && sectionIds[params.section]) {
                aboutState.activeSectionId = params.section;
            } else {
                aboutState.activeSectionId = null;
            }

            if (params.view) {
                aboutState.viewMode = params.view;
            } else {
                aboutState.viewMode = 'sections';
            }
        }

        function renderHeadline(container) {
            if (!container) return;
            container.innerHTML = '';
            var title = aboutState.rawData && aboutState.rawData.headline ? aboutState.rawData.headline : 'About';
            var h1 = document.createElement('h1');
            h1.className = 'about-title';
            h1.textContent = title;
            container.appendChild(h1);

            if (title) {
                document.title = title;
            }
        }

        function renderHighlights(container) {
            if (!container) return;
            container.innerHTML = '';

            var wrapper = document.createElement('div');
            wrapper.className = 'highlight-list';
            if (aboutState.viewMode === 'highlights') {
                wrapper.classList.add('is-emphasized');
            }

            if (!aboutState.processedHighlights.length) {
                var empty = document.createElement('p');
                empty.className = 'about-empty';
                empty.textContent = 'Key highlights will appear here.';
                wrapper.appendChild(empty);
                container.appendChild(wrapper);
                return;
            }

            aboutState.processedHighlights.forEach(function(item, index) {
                var card = document.createElement('button');
                card.type = 'button';
                card.className = 'highlight-item';
                card.setAttribute('data-action', 'highlight-click');
                card.setAttribute('data-highlight-index', String(index));
                card.setAttribute('data-icon-key', item.iconKey);

                var icon = document.createElement('span');
                icon.className = 'highlight-icon';
                icon.setAttribute('aria-hidden', 'true');
                icon.textContent = item.iconKey ? item.iconKey.charAt(0).toUpperCase() : '•';

                var textWrapper = document.createElement('span');
                textWrapper.className = 'highlight-text';

                var titleEl = document.createElement('span');
                titleEl.className = 'highlight-title';
                titleEl.textContent = item.title;

                var descEl = document.createElement('span');
                descEl.className = 'highlight-description';
                descEl.innerHTML = item.html;

                textWrapper.appendChild(titleEl);
                textWrapper.appendChild(descEl);
                card.appendChild(icon);
                card.appendChild(textWrapper);
                wrapper.appendChild(card);
            });

            container.appendChild(wrapper);
        }

        function renderBodySections(container) {
            if (!container) return;
            container.innerHTML = '';

            if (!aboutState.processedSections.length) {
                var empty = document.createElement('p');
                empty.className = 'about-empty';
                empty.textContent = 'About information is not available right now.';
                container.appendChild(empty);
                return;
            }

            var fragment = document.createDocumentFragment();

            aboutState.processedSections.forEach(function(section) {
                var sectionEl = document.createElement('article');
                sectionEl.className = 'about-section';
                sectionEl.id = section.id;
                sectionEl.setAttribute('data-section-id', section.id);
                if (aboutState.activeSectionId && aboutState.activeSectionId === section.id) {
                    sectionEl.classList.add('is-active');
                }

                var heading = document.createElement('h2');
                heading.className = 'about-section-title';
                heading.textContent = section.title;

                var content = document.createElement('div');
                content.className = 'about-section-content';
                content.innerHTML = section.html;

                sectionEl.appendChild(heading);
                sectionEl.appendChild(content);
                fragment.appendChild(sectionEl);
            });

            container.appendChild(fragment);
        }

        function renderInternalNavigation(container) {
            if (!container) return;
            container.innerHTML = '';

            var viewToggle = document.createElement('div');
            viewToggle.className = 'about-view-toggle';
            viewToggle.setAttribute('role', 'tablist');
            viewToggle.setAttribute('aria-label', 'About page view');

            var sectionsButton = document.createElement('button');
            sectionsButton.type = 'button';
            sectionsButton.className = 'view-toggle-button';
            sectionsButton.setAttribute('data-action', 'toggle-view');
            sectionsButton.setAttribute('data-view', 'sections');
            sectionsButton.setAttribute('role', 'tab');
            sectionsButton.textContent = 'Detailed sections';
            if (aboutState.viewMode === 'sections') {
                sectionsButton.classList.add('is-active');
                sectionsButton.setAttribute('aria-selected', 'true');
            } else {
                sectionsButton.setAttribute('aria-selected', 'false');
            }

            var highlightsButton = document.createElement('button');
            highlightsButton.type = 'button';
            highlightsButton.className = 'view-toggle-button';
            highlightsButton.setAttribute('data-action', 'toggle-view');
            highlightsButton.setAttribute('data-view', 'highlights');
            highlightsButton.setAttribute('role', 'tab');
            highlightsButton.textContent = 'Key highlights';
            if (aboutState.viewMode === 'highlights') {
                highlightsButton.classList.add('is-active');
                highlightsButton.setAttribute('aria-selected', 'true');
            } else {
                highlightsButton.setAttribute('aria-selected', 'false');
            }

            viewToggle.appendChild(sectionsButton);
            viewToggle.appendChild(highlightsButton);

            var navHeader = document.createElement('div');
            navHeader.className = 'about-nav-header';

            var navHeading = document.createElement('h2');
            navHeading.className = 'about-nav-title';
            navHeading.textContent = 'Sections';

            navHeader.appendChild(navHeading);

            var list = document.createElement('ul');
            list.className = 'about-nav-list';

            aboutState.processedSections.forEach(function(section) {
                var item = document.createElement('li');
                item.className = 'about-nav-item';

                var button = document.createElement('button');
                button.type = 'button';
                button.className = 'about-nav-link';
                button.setAttribute('data-action', 'navigate-section');
                button.setAttribute('data-section-id', section.id);
                button.textContent = section.title;
                if (aboutState.activeSectionId && aboutState.activeSectionId === section.id) {
                    button.classList.add('is-active');
                }

                item.appendChild(button);
                list.appendChild(item);
            });

            container.appendChild(viewToggle);
            container.appendChild(navHeader);
            container.appendChild(list);
        }

        function renderContextualLinks(container) {
            if (!container) return;
            container.innerHTML = '';

            var heading = document.createElement('h2');
            heading.className = 'contextual-links-title';
            heading.textContent = 'Resources';

            var list = document.createElement('ul');
            list.className = 'contextual-links-list';

            aboutState.contextualLinks.forEach(function(ref) {
                var item = document.createElement('li');
                item.className = 'contextual-link-item';

                var link = document.createElement('a');
                if (ref.type === 'contact') {
                    link.href = 'contact.html';
                    link.textContent = 'Contact us';
                    link.setAttribute('title', 'Contact support and send feedback');
                    link.setAttribute('data-action', 'contact-link');
                } else if (ref.type === 'help') {
                    link.href = 'help.html';
                    link.textContent = 'Visit Help Center';
                    link.setAttribute('title', 'FAQs and support resources');
                    link.setAttribute('data-action', 'help-link');
                } else {
                    link.href = 'javascript:void(0)';
                    link.textContent = 'Learn more';
                }

                item.appendChild(link);
                list.appendChild(item);
            });

            container.appendChild(heading);
            container.appendChild(list);
        }

        function renderAll() {
            renderHeadline(headlineContainer);
            renderHighlights(highlightsContainer);
            renderBodySections(bodySectionsContainer);
            renderInternalNavigation(navContainer);
            renderContextualLinks(contextualLinksContainer);
        }

        function scrollToActiveSection() {
            if (!aboutState.activeSectionId) return;
            var target = document.getElementById(aboutState.activeSectionId);
            if (!target) return;
            try {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (err) {
                target.scrollIntoView(true);
            }
        }

        function updateHistory(sectionId, viewMode, options) {
            var opts = options || {};
            var url = new URL(window.location.href);
            if (sectionId) {
                url.searchParams.set('section', sectionId);
            } else {
                url.searchParams.delete('section');
            }
            if (viewMode) {
                url.searchParams.set('view', viewMode);
            } else {
                url.searchParams.delete('view');
            }
            if (opts.replace) {
                window.history.replaceState({}, '', url.toString());
            } else {
                window.history.pushState({}, '', url.toString());
            }
        }

        function setActiveSection(sectionId, options) {
            var opts = options || {};
            if (sectionId && sectionId === aboutState.activeSectionId) {
                if (!opts.suppressScroll) {
                    scrollToActiveSection();
                }
                return;
            }

            var validIds = aboutState.processedSections.map(function(sec) { return sec.id; });
            if (sectionId && validIds.indexOf(sectionId) === -1) {
                aboutState.activeSectionId = null;
            } else {
                aboutState.activeSectionId = sectionId || null;
            }

            renderBodySections(bodySectionsContainer);
            renderInternalNavigation(navContainer);

            if (!opts.fromUrl && !opts.skipHistory) {
                updateHistory(aboutState.activeSectionId, aboutState.viewMode, { replace: false });
            }

            if (!opts.suppressScroll && aboutState.activeSectionId) {
                scrollToActiveSection();
            }
        }

        function setViewMode(viewMode, options) {
            var opts = options || {};
            var mode = viewMode || 'sections';
            if (aboutState.viewMode === mode) {
                return;
            }

            aboutState.viewMode = mode;
            renderHighlights(highlightsContainer);
            renderInternalNavigation(navContainer);

            if (!opts.fromUrl && !opts.skipHistory) {
                updateHistory(aboutState.activeSectionId, aboutState.viewMode, { replace: false });
            }
        }

        function onPopState() {
            var params = getUrlParams();
            setViewMode(params.view || 'sections', { fromUrl: true, skipHistory: true });
            setActiveSection(params.section || null, { fromUrl: true, skipHistory: true, suppressScroll: false });
        }

        function initialize() {
            if (!headlineContainer || !highlightsContainer || !bodySectionsContainer || !navContainer || !contextualLinksContainer) {
                return;
            }

            try {
                aboutState.rawData = WebsiteSDK.getAboutPageContent();
            } catch (err) {
                if (headlineContainer) {
                    headlineContainer.innerHTML = '<h1 class="about-title">About</h1>';
                }
                if (bodySectionsContainer) {
                    bodySectionsContainer.innerHTML = '<p class="about-error">Unable to load About information at this time.</p>';
                }
                return;
            }

            buildProcessedData();
            initStateFromUrl();
            updateHistory(aboutState.activeSectionId, aboutState.viewMode, { replace: true });
            renderAll();
            if (aboutState.activeSectionId) {
                scrollToActiveSection();
            }
        }

        initialize();

        document.addEventListener('click', function(event) {
            var actionElement = event.target.closest('[data-action]');
            if (!actionElement) {
                return;
            }
            var action = actionElement.getAttribute('data-action');
            if (!action) {
                return;
            }

            if (action === 'navigate-section') {
                event.preventDefault();
                var sectionId = actionElement.getAttribute('data-section-id');
                setActiveSection(sectionId, { suppressScroll: false });
            } else if (action === 'toggle-view') {
                event.preventDefault();
                var viewMode = actionElement.getAttribute('data-view');
                setViewMode(viewMode, {});
            } else if (action === 'contact-link') {
                // Allow default navigation to contact.html
            } else if (action === 'help-link') {
                // Allow default navigation to help.html
            } else if (action === 'highlight-click') {
                event.preventDefault();
                setViewMode('highlights', {});
            }
        });

        window.addEventListener('popstate', onPopState);
    });
    </script>
</body>
</html>
