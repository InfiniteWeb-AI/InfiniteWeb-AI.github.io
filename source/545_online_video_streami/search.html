<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Search Results - Streamline</title>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='search.css'>
</head>
<body class='app'>
    <header class='site-header'>
        <div class='header-top'>
            <div class='header-left'>
                <button class='icon-button menu-toggle' type='button' aria-label='Toggle navigation'>
                    <span class='icon icon-menu' aria-hidden='true'></span>
                </button>
                <a href='index.html' class='brand' aria-label='Streaming platform home'>
                    <span class='brand-mark' aria-hidden='true'></span>
                    <span class='brand-text'>Streamline</span>
                </a>
            </div>

            <div class='header-center'>
                <form class='search-form' role='search'>
                    <label class='visually-hidden' for='site-search'>Search videos</label>
                    <input id='site-search' class='search-input' type='text' name='q' placeholder='Search' autocomplete='off'>
                    <button class='search-submit' type='submit' aria-label='Search'>
                        <span class='icon icon-search' aria-hidden='true'></span>
                    </button>
                </form>
                <button class='icon-button mic-button' type='button' aria-label='Voice search'>
                    <span class='icon icon-mic' aria-hidden='true'></span>
                </button>
            </div>

            <div class='header-right'>
                <nav class='primary-nav' aria-label='Primary'>
                    <ul class='primary-nav-list'>
                        <li class='primary-nav-item'>
                            <a href='index.html' class='primary-nav-link' title='Homepage with personalized recommendations'>Home</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='browse.html?categoryId=all' class='primary-nav-link' title='Browse all categories, genres, and curated collections'>Browse</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='browse.html?view=live' class='primary-nav-link' title='Browse live streams including gaming and esports'>Live</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='library.html' class='primary-nav-link' title='Access playlists, watchlists, and Watch Later'>Library</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='history.html' class='primary-nav-link' title='View and manage your watch history'>History</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='subscriptions.html' class='primary-nav-link' title='View and change your subscription plans'>Subscriptions</a>
                        </li>
                        <li class='primary-nav-item'>
                            <a href='settings.html' class='primary-nav-link' title='Manage playback preferences, parental controls, and profiles'>Settings</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main id='content' class='site-main' role='main'>
        <div class='page page-search-results' data-component='search-page-controller'>
            <div class='search-page-inner'>
                <section class='search-main-column'>
                    <form class='search-query-form local-search-form' role='search' data-component='search-query-form'>
                        <label class='visually-hidden' for='search-query-input'>Search videos and channels</label>
                        <div class='search-query-input-wrapper'>
                            <span class='icon icon-search' aria-hidden='true'></span>
                            <input id='search-query-input' class='search-query-input' type='text' name='query' placeholder='Search videos and channels' autocomplete='off'>
                        </div>
                    </form>

                    <nav class='results-tabs' data-component='results-tabs-switcher' aria-label='Search result type'>
                        <button type='button' class='tab-button is-active' data-action='switch-tab' data-tab='videos'>Videos</button>
                        <button type='button' class='tab-button' data-action='switch-tab' data-tab='channels'>Channels</button>
                    </nav>

                    <section class='results-summary-row'>
                        <div class='results-summary' data-component='results-summary-bar' data-populate='results-summary'></div>
                        <div class='results-sort'>
                            <label class='results-sort-label' for='sort-select'>Sort by</label>
                            <select id='sort-select' class='results-sort-select' data-component='sort-selector'></select>
                        </div>
                    </section>

                    <section class='results-body'>
                        <div class='results-list-wrapper'>
                            <div class='video-results' data-component='video-results-list' data-populate='video-results'></div>
                            <div class='channel-results' data-component='channel-results-list' data-populate='channel-results' hidden></div>
                            <div class='empty-state' data-component='empty-state-message' data-populate='empty-state' hidden></div>
                        </div>
                    </section>

                    <nav class='pagination' data-component='pagination-controls' data-populate='pagination-controls' aria-label='Search results pagination'></nav>
                </section>

                <aside class='search-sidebar' aria-label='Filters'>
                    <section class='filters-panel video-filters' data-component='video-filters-panel' data-populate='video-filters'>
                        <header class='filters-header'>
                            <h2 class='filters-title'>Video filters</h2>
                            <button type='button' class='filters-clear-button' data-action='clear-video-filters'>Clear all</button>
                        </header>
                        <div class='filters-body'>
                            <!-- Populated via JS from getSearchFilterOptions -->
                        </div>
                    </section>

                    <section class='filters-panel channel-filters' data-component='channel-filters-panel' data-populate='channel-filters' hidden>
                        <header class='filters-header'>
                            <h2 class='filters-title'>Channel filters</h2>
                            <button type='button' class='filters-clear-button' data-action='clear-channel-filters'>Clear all</button>
                        </header>
                        <div class='filters-body'>
                            <!-- Populated via JS from getSearchFilterOptions -->
                        </div>
                    </section>
                </aside>
            </div>
        </div>
    </main>

    <footer class='site-footer'>
        <div class='footer-inner'>
            <nav class='footer-nav' aria-label='Footer'>
                <ul class='footer-nav-list'>
                    <li class='footer-nav-item'>
                        <a href='about.html' class='footer-nav-link' title='About the streaming platform'>About</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='help.html' class='footer-nav-link' title='FAQs and support resources'>Help Center</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='contact.html' class='footer-nav-link' title='Contact support and send feedback'>Contact</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='terms.html' class='footer-nav-link' title='Service terms and user agreement'>Terms of Service</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='privacy.html' class='footer-nav-link' title='Privacy and data usage policy'>Privacy Policy</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='subscriptions.html' class='footer-nav-link' title='Overview of subscription options and pricing'>Subscription Plans</a>
                    </li>
                    <li class='footer-nav-item'>
                        <a href='settings.html' class='footer-nav-link' title='Quick access to user settings'>Settings</a>
                    </li>
                </ul>
            </nav>
            <div class='footer-meta'>
                <span class='footer-logo-mark' aria-hidden='true'></span>
                <span class='footer-text'>&copy; <span data-year='current'>2024</span> Streamline. All rights reserved.</span>
            </div>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    (function() {
        var searchFilterOptions = null;
        var videoFiltersState = {};
        var channelFiltersState = {};
        var activeTab = 'videos';
        var currentQuery = '';
        var currentSort = null;
        var currentPage = 1;
        var currentPageSize = 20;
        var DEFAULT_PAGE_SIZE = 20;

        var localSearchForm;
        var localSearchInput;
        var headerSearchForm;
        var tabsSwitcher;
        var summaryContainer;
        var sortSelect;
        var videoResultsContainer;
        var channelResultsContainer;
        var emptyStateContainer;
        var videoFiltersContainer;
        var channelFiltersContainer;
        var paginationContainer;

        var VIDEO_SORT_OPTIONS = [
            { value: 'rating_high_to_low', label: 'Rating: high to low' },
            { value: 'rating_low_to_high', label: 'Rating: low to high' },
            { value: 'views_high_to_low', label: 'Views: high to low' },
            { value: 'views_low_to_high', label: 'Views: low to high' },
            { value: 'upload_date_newest', label: 'Upload date: newest' },
            { value: 'upload_date_oldest', label: 'Upload date: oldest' }
        ];

        var CHANNEL_SORT_OPTIONS = [
            { value: 'subscriber_count_high_to_low', label: 'Subscribers: high to low' },
            { value: 'subscriber_count_low_to_high', label: 'Subscribers: low to high' },
            { value: 'upload_date_newest', label: 'Recently active' },
            { value: 'upload_date_oldest', label: 'Oldest first' }
        ];

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatNumber(num) {
            if (num === null || num === undefined || isNaN(num)) {
                return '0';
            }
            var n = Number(num);
            if (n >= 1000000) {
                return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            }
            if (n >= 1000) {
                return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            }
            return String(n);
        }

        function formatDate(value) {
            if (!value) {
                return '';
            }
            var d = new Date(value);
            if (isNaN(d.getTime())) {
                return escapeHtml(value);
            }
            return d.toLocaleDateString(undefined, {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function getSortOptionsForTab(tab) {
            return tab === 'channels' ? CHANNEL_SORT_OPTIONS : VIDEO_SORT_OPTIONS;
        }

        function isValidSortForTab(sortKey, tab) {
            if (!sortKey) {
                return false;
            }
            var options = getSortOptionsForTab(tab);
            for (var i = 0; i < options.length; i++) {
                if (options[i].value === sortKey) {
                    return true;
                }
            }
            return false;
        }

        function parseFiltersParam(paramValue) {
            var result = { videos: {}, channels: {} };
            if (!paramValue) {
                return result;
            }
            try {
                var parsed = JSON.parse(paramValue);
                if (parsed && typeof parsed === 'object') {
                    if (parsed.videos && typeof parsed.videos === 'object') {
                        result.videos = parsed.videos;
                    }
                    if (parsed.channels && typeof parsed.channels === 'object') {
                        result.channels = parsed.channels;
                    }
                }
            } catch (err) {
                console.error('Failed to parse filters parameter', err);
            }
            return result;
        }

        function sanitizeVideoFilters(raw, optionsRoot) {
            var sanitized = {};
            if (!raw || typeof raw !== 'object') {
                return sanitized;
            }
            var genres = [];
            var categories = [];
            var types = [];
            if (optionsRoot) {
                if (optionsRoot.genres && Array.isArray(optionsRoot.genres)) {
                    for (var i = 0; i < optionsRoot.genres.length; i++) {
                        genres.push(optionsRoot.genres[i].value);
                    }
                }
                if (optionsRoot.contentCategories && Array.isArray(optionsRoot.contentCategories)) {
                    for (var j = 0; j < optionsRoot.contentCategories.length; j++) {
                        categories.push(optionsRoot.contentCategories[j].value);
                    }
                }
                if (optionsRoot.contentTypes && Array.isArray(optionsRoot.contentTypes)) {
                    for (var k = 0; k < optionsRoot.contentTypes.length; k++) {
                        types.push(optionsRoot.contentTypes[k].value);
                    }
                }
            }

            if (raw.contentCategory && categories.indexOf(raw.contentCategory) !== -1) {
                sanitized.contentCategory = raw.contentCategory;
            }
            if (raw.contentType && types.indexOf(raw.contentType) !== -1) {
                sanitized.contentType = raw.contentType;
            }
            if (raw.genre && genres.indexOf(raw.genre) !== -1) {
                sanitized.genre = raw.genre;
            }

            var numericKeys = ['releaseYearMin', 'releaseYearMax', 'durationMinMinutes', 'durationMaxMinutes', 'ratingMin', 'viewCountMin'];
            for (var n = 0; n < numericKeys.length; n++) {
                var key = numericKeys[n];
                if (raw[key] !== undefined && raw[key] !== null && raw[key] !== '') {
                    var num = Number(raw[key]);
                    if (!isNaN(num)) {
                        sanitized[key] = num;
                    }
                }
            }
            return sanitized;
        }

        function sanitizeChannelFilters(raw, optionsRoot) {
            var sanitized = {};
            if (!raw || typeof raw !== 'object') {
                return sanitized;
            }
            var categories = [];
            if (optionsRoot && optionsRoot.categories && Array.isArray(optionsRoot.categories)) {
                for (var i = 0; i < optionsRoot.categories.length; i++) {
                    categories.push(optionsRoot.categories[i].value);
                }
            }
            if (raw.category && categories.indexOf(raw.category) !== -1) {
                sanitized.category = raw.category;
            }
            if (raw.minSubscriberCount !== undefined && raw.minSubscriberCount !== null && raw.minSubscriberCount !== '') {
                var num = Number(raw.minSubscriberCount);
                if (!isNaN(num)) {
                    sanitized.minSubscriberCount = num;
                }
            }
            return sanitized;
        }

        function readUrlBasicState() {
            var params = new URLSearchParams(window.location.search);
            var q = params.get('query') || '';
            var tabParam = params.get('tab');
            var tab = tabParam === 'channels' ? 'channels' : 'videos';
            var sortParam = params.get('sort');
            var pageParam = params.get('page');
            var pageSizeParam = params.get('pageSize');

            var page = parseInt(pageParam || '1', 10);
            if (isNaN(page) || page < 1) {
                page = 1;
            }
            var pageSize = parseInt(pageSizeParam || String(DEFAULT_PAGE_SIZE), 10);
            if (isNaN(pageSize) || pageSize <= 0) {
                pageSize = DEFAULT_PAGE_SIZE;
            }

            return {
                query: q,
                tab: tab,
                sort: sortParam || null,
                page: page,
                pageSize: pageSize
            };
        }

        function loadStateFromUrlAndFilters() {
            var basic = readUrlBasicState();
            var params = new URLSearchParams(window.location.search);
            var filtersJson = params.get('filters');
            var parsed = parseFiltersParam(filtersJson);
            var videoOptionsRoot = searchFilterOptions && searchFilterOptions.videoFilters ? searchFilterOptions.videoFilters : null;
            var channelOptionsRoot = searchFilterOptions && searchFilterOptions.channelFilters ? searchFilterOptions.channelFilters : null;
            videoFiltersState = sanitizeVideoFilters(parsed.videos, videoOptionsRoot);
            channelFiltersState = sanitizeChannelFilters(parsed.channels, channelOptionsRoot);
            return basic;
        }

        function hasAnyFiltersState() {
            var hasVideos = videoFiltersState && Object.keys(videoFiltersState).length > 0;
            var hasChannels = channelFiltersState && Object.keys(channelFiltersState).length > 0;
            return hasVideos || hasChannels;
        }

        function serializeFiltersStateIfAny() {
            if (!hasAnyFiltersState()) {
                return null;
            }
            var obj = {
                videos: videoFiltersState || {},
                channels: channelFiltersState || {}
            };
            try {
                return JSON.stringify(obj);
            } catch (err) {
                console.error('Failed to serialize filters state', err);
                return null;
            }
        }

        function buildSearchParamsString(state, filtersJson) {
            var params = new URLSearchParams();
            if (state.query) {
                params.set('query', state.query);
            }
            if (state.tab) {
                params.set('tab', state.tab);
            }
            if (state.sort) {
                params.set('sort', state.sort);
            }
            if (filtersJson) {
                params.set('filters', filtersJson);
            }
            if (state.page && state.page > 1) {
                params.set('page', String(state.page));
            }
            if (state.pageSize && state.pageSize !== DEFAULT_PAGE_SIZE) {
                params.set('pageSize', String(state.pageSize));
            }
            return params.toString();
        }

        function updateUrlWithState(newState) {
            var filtersJson = serializeFiltersStateIfAny();
            var searchString = buildSearchParamsString(newState, filtersJson);
            var newUrl = 'search.html' + (searchString ? '?' + searchString : '');
            window.history.pushState({}, '', newUrl);
            handleStateChange(false);
        }

        function renderSortSelector(selectEl, tab, sortValue) {
            if (!selectEl) {
                return;
            }
            var options = getSortOptionsForTab(tab);
            var effectiveSort = '';
            if (sortValue && isValidSortForTab(sortValue, tab)) {
                effectiveSort = sortValue;
            }
            var html = '';
            html += "<option value=''>Best match</option>";
            for (var i = 0; i < options.length; i++) {
                var opt = options[i];
                var selected = opt.value === effectiveSort ? ' selected' : '';
                html += "<option value='" + opt.value + "'" + selected + ">" + escapeHtml(opt.label) + "</option>";
            }
            selectEl.innerHTML = html;
            selectEl.value = effectiveSort;
        }

        function renderVideoFiltersPanel(container, optionsRoot, state) {
            if (!container) {
                return;
            }
            var body = container.querySelector('.filters-body');
            if (!body) {
                return;
            }
            var opts = optionsRoot && optionsRoot.videoFilters ? optionsRoot.videoFilters : optionsRoot;
            if (!opts) {
                body.innerHTML = '';
                return;
            }
            state = state || {};
            var html = '';

            // Genre
            html += "<div class='filter-group'>";
            html += "<label class='filter-label' for='video-filter-genre'>Genre</label>";
            html += "<select id='video-filter-genre' class='filter-select' data-filter-key='genre'>";
            html += "<option value=''>Any</option>";
            if (opts.genres && Array.isArray(opts.genres)) {
                for (var i = 0; i < opts.genres.length; i++) {
                    var g = opts.genres[i];
                    var sel = state.genre === g.value ? ' selected' : '';
                    html += "<option value='" + g.value + "'" + sel + ">" + escapeHtml(g.label) + "</option>";
                }
            }
            html += "</select>";
            html += "</div>";

            // Content category
            html += "<div class='filter-group'>";
            html += "<label class='filter-label' for='video-filter-category'>Content category</label>";
            html += "<select id='video-filter-category' class='filter-select' data-filter-key='contentCategory'>";
            html += "<option value=''>Any</option>";
            if (opts.contentCategories && Array.isArray(opts.contentCategories)) {
                for (var j = 0; j < opts.contentCategories.length; j++) {
                    var c = opts.contentCategories[j];
                    var selCat = state.contentCategory === c.value ? ' selected' : '';
                    html += "<option value='" + c.value + "'" + selCat + ">" + escapeHtml(c.label) + "</option>";
                }
            }
            html += "</select>";
            html += "</div>";

            // Content type
            html += "<div class='filter-group'>";
            html += "<label class='filter-label' for='video-filter-type'>Content type</label>";
            html += "<select id='video-filter-type' class='filter-select' data-filter-key='contentType'>";
            html += "<option value=''>Any</option>";
            if (opts.contentTypes && Array.isArray(opts.contentTypes)) {
                for (var k = 0; k < opts.contentTypes.length; k++) {
                    var t = opts.contentTypes[k];
                    var selType = state.contentType === t.value ? ' selected' : '';
                    html += "<option value='" + t.value + "'" + selType + ">" + escapeHtml(t.label) + "</option>";
                }
            }
            html += "</select>";
            html += "</div>";

            // Release year range
            var ry = opts.releaseYearRange || {};
            var ryMin = state.releaseYearMin !== undefined ? String(state.releaseYearMin) : '';
            var ryMax = state.releaseYearMax !== undefined ? String(state.releaseYearMax) : '';
            html += "<div class='filter-group filter-group-inline'>";
            html += "<span class='filter-label'>Release year</span>";
            html += "<div class='filter-range-row'>";
            html += "<input type='number' class='filter-input' placeholder='Min' data-filter-key='releaseYearMin'";
            if (ry.min !== undefined) {
                html += " min='" + ry.min + "'";
            }
            if (ry.max !== undefined) {
                html += " max='" + ry.max + "'";
            }
            if (ryMin) {
                html += " value='" + escapeHtml(ryMin) + "'";
            }
            html += ">";
            html += "<span class='filter-range-separator'>–</span>";
            html += "<input type='number' class='filter-input' placeholder='Max' data-filter-key='releaseYearMax'";
            if (ry.min !== undefined) {
                html += " min='" + ry.min + "'";
            }
            if (ry.max !== undefined) {
                html += " max='" + ry.max + "'";
            }
            if (ryMax) {
                html += " value='" + escapeHtml(ryMax) + "'";
            }
            html += ">";
            html += "</div>";
            html += "</div>";

            // Duration range
            var dr = opts.durationMinutesRange || {};
            var dMin = state.durationMinMinutes !== undefined ? String(state.durationMinMinutes) : '';
            var dMax = state.durationMaxMinutes !== undefined ? String(state.durationMaxMinutes) : '';
            html += "<div class='filter-group filter-group-inline'>";
            html += "<span class='filter-label'>Duration (minutes)</span>";
            html += "<div class='filter-range-row'>";
            html += "<input type='number' class='filter-input' placeholder='Min' data-filter-key='durationMinMinutes'";
            if (dr.min !== undefined) {
                html += " min='" + dr.min + "'";
            }
            if (dr.max !== undefined) {
                html += " max='" + dr.max + "'";
            }
            if (dMin) {
                html += " value='" + escapeHtml(dMin) + "'";
            }
            html += ">";
            html += "<span class='filter-range-separator'>–</span>";
            html += "<input type='number' class='filter-input' placeholder='Max' data-filter-key='durationMaxMinutes'";
            if (dr.min !== undefined) {
                html += " min='" + dr.min + "'";
            }
            if (dr.max !== undefined) {
                html += " max='" + dr.max + "'";
            }
            if (dMax) {
                html += " value='" + escapeHtml(dMax) + "'";
            }
            html += ">";
            html += "</div>";
            html += "</div>";

            // Rating min
            var rr = opts.ratingRange || {};
            var ratingMin = state.ratingMin !== undefined ? String(state.ratingMin) : '';
            html += "<div class='filter-group'>";
            html += "<label class='filter-label' for='video-filter-rating-min'>Minimum rating</label>";
            html += "<input id='video-filter-rating-min' type='number' step='0.1' class='filter-input' placeholder='e.g. 3.5' data-filter-key='ratingMin'";
            if (rr.min !== undefined) {
                html += " min='" + rr.min + "'";
            }
            if (rr.max !== undefined) {
                html += " max='" + rr.max + "'";
            }
            if (ratingMin) {
                html += " value='" + escapeHtml(ratingMin) + "'";
            }
            html += ">";
            html += "</div>";

            // Minimum views
            var vr = opts.viewCountRange || {};
            var viewMin = state.viewCountMin !== undefined ? String(state.viewCountMin) : '';
            html += "<div class='filter-group'>";
            html += "<label class='filter-label' for='video-filter-views-min'>Minimum views</label>";
            html += "<input id='video-filter-views-min' type='number' class='filter-input' placeholder='e.g. 10000' data-filter-key='viewCountMin'";
            if (vr.min !== undefined) {
                html += " min='" + vr.min + "'";
            }
            if (vr.max !== undefined) {
                html += " max='" + vr.max + "'";
            }
            if (viewMin) {
                html += " value='" + escapeHtml(viewMin) + "'";
            }
            html += ">";
            html += "</div>";

            body.innerHTML = html;
        }

        function renderChannelFiltersPanel(container, optionsRoot, state) {
            if (!container) {
                return;
            }
            var body = container.querySelector('.filters-body');
            if (!body) {
                return;
            }
            var opts = optionsRoot && optionsRoot.channelFilters ? optionsRoot.channelFilters : optionsRoot;
            if (!opts) {
                body.innerHTML = '';
                return;
            }
            state = state || {};
            var html = '';

            // Category
            html += "<div class='filter-group'>";
            html += "<label class='filter-label' for='channel-filter-category'>Channel category</label>";
            html += "<select id='channel-filter-category' class='filter-select' data-filter-key='category'>";
            html += "<option value=''>Any</option>";
            if (opts.categories && Array.isArray(opts.categories)) {
                for (var i = 0; i < opts.categories.length; i++) {
                    var c = opts.categories[i];
                    var sel = state.category === c.value ? ' selected' : '';
                    html += "<option value='" + c.value + "'" + sel + ">" + escapeHtml(c.label) + "</option>";
                }
            }
            html += "</select>";
            html += "</div>";

            // Min subscribers
            var sr = opts.subscriberCountRange || {};
            var minSub = state.minSubscriberCount !== undefined ? String(state.minSubscriberCount) : '';
            html += "<div class='filter-group'>";
            html += "<label class='filter-label' for='channel-filter-subscribers-min'>Minimum subscribers</label>";
            html += "<input id='channel-filter-subscribers-min' type='number' class='filter-input' placeholder='e.g. 10000' data-filter-key='minSubscriberCount'";
            if (sr.min !== undefined) {
                html += " min='" + sr.min + "'";
            }
            if (sr.max !== undefined) {
                html += " max='" + sr.max + "'";
            }
            if (minSub) {
                html += " value='" + escapeHtml(minSub) + "'";
            }
            html += ">";
            html += "</div>";

            body.innerHTML = html;
        }

        function updateTabsUI(tab) {
            if (!tabsSwitcher) {
                return;
            }
            var buttons = tabsSwitcher.querySelectorAll('[data-action="switch-tab"]');
            for (var i = 0; i < buttons.length; i++) {
                var btn = buttons[i];
                var t = btn.dataset.tab === 'channels' ? 'channels' : 'videos';
                if (t === tab) {
                    btn.classList.add('is-active');
                } else {
                    btn.classList.remove('is-active');
                }
            }
        }

        function renderSummary(container, state, response) {
            if (!container) {
                return;
            }
            if (!state.query) {
                container.innerHTML = "<div class='results-summary-text'>Enter a search term to see results.</div>";
                return;
            }
            var total = response && typeof response.totalResults === 'number' ? response.totalResults : 0;
            var label = state.tab === 'channels' ? 'channels' : 'videos';
            var countLabel = total === 1 ? '1 ' + label : formatNumber(total) + ' ' + label;
            var html = "<div class='results-summary-text'>" + countLabel + " for ‘" + escapeHtml(state.query) + "’</div>";
            container.innerHTML = html;
        }

        function renderVideoResults(container, response) {
            if (!container) {
                return;
            }
            container.innerHTML = '';
            if (!response || !response.results || !Array.isArray(response.results) || response.results.length === 0) {
                return;
            }
            var html = '';
            for (var i = 0; i < response.results.length; i++) {
                var v = response.results[i];
                var durationText = '';
                if (v.isLive) {
                    durationText = 'LIVE';
                } else if (v.durationMinutes !== undefined && v.durationMinutes !== null && !isNaN(Number(v.durationMinutes))) {
                    var mins = Math.round(Number(v.durationMinutes));
                    durationText = mins + ' min';
                }
                var statsParts = [];
                if (v.viewCount !== undefined && v.viewCount !== null) {
                    statsParts.push(formatNumber(v.viewCount) + ' views');
                }
                if (v.uploadDate) {
                    statsParts.push(formatDate(v.uploadDate));
                }
                if (v.ratingAverage !== undefined && v.ratingAverage !== null && !isNaN(Number(v.ratingAverage))) {
                    statsParts.push('Rating ' + Number(v.ratingAverage).toFixed(1));
                }
                var statsText = statsParts.join(' • ');
                var channelName = v.channelName || '';
                var channelAvatar = v.channelAvatarUrl || '';
                var description = v.descriptionSnippet || '';
                var title = v.title || '';
                var thumbUrl = v.thumbnailUrl || '';

                html += "<article class='video-result-card'>";
                html += "  <div class='video-result-thumb'>";
                html += "    <button type='button' class='video-thumb-button' data-action='open-video' data-video-id='" + escapeHtml(v.videoId) + "'>";
                html += "      <div class='thumb-image-wrapper'>";
                if (thumbUrl) {
                    html += "        <img class='thumb-image' src='" + escapeHtml(thumbUrl) + "' alt='Thumbnail for " + escapeHtml(title) + "'>";
                } else {
                    html += "        <div class='thumb-image thumb-image-placeholder'></div>";
                }
                if (durationText) {
                    html += "        <span class='thumb-duration-badge'>" + escapeHtml(durationText) + "</span>";
                }
                html += "      </div>";
                html += "    </button>";
                html += "  </div>";

                html += "  <div class='video-result-main'>";
                html += "    <div class='video-result-header'>";
                html += "      <h3 class='video-result-title'>";
                html += "        <button type='button' class='video-title-button' data-action='open-video' data-video-id='" + escapeHtml(v.videoId) + "'>" + escapeHtml(title) + "</button>";
                html += "      </h3>";
                html += "    </div>";

                html += "    <div class='video-result-channel-row'>";
                html += "      <button type='button' class='channel-avatar-button' data-action='open-channel' data-channel-id='" + escapeHtml(v.channelId || '') + "'>";
                if (channelAvatar) {
                    html += "        <img class='channel-avatar' src='" + escapeHtml(channelAvatar) + "' alt='" + escapeHtml(channelName) + "'>";
                } else {
                    html += "        <span class='channel-avatar placeholder-avatar' aria-hidden='true'></span>";
                }
                html += "      </button>";
                html += "      <button type='button' class='channel-name-button' data-action='open-channel' data-channel-id='" + escapeHtml(v.channelId || '') + "'>" + escapeHtml(channelName) + "</button>";
                if (statsText) {
                    html += "      <span class='video-result-stats'>" + escapeHtml(statsText) + "</span>";
                }
                html += "    </div>";

                if (description) {
                    html += "    <p class='video-result-description'>" + escapeHtml(description) + "</p>";
                }

                html += "  </div>";

                html += "  <div class='video-result-actions'>";
                html += "    <button type='button' class='chip-button not-interested-button' data-action='mark-not-interested' data-video-id='" + escapeHtml(v.videoId) + "'>";
                html += "      <span class='icon icon-hide' aria-hidden='true'></span>";
                html += "      <span class='label'>Not interested</span>";
                html += "    </button>";
                html += "  </div>";

                html += "</article>";
            }
            container.innerHTML = html;
        }

        function renderChannelResults(container, response) {
            if (!container) {
                return;
            }
            container.innerHTML = '';
            if (!response || !response.results || !Array.isArray(response.results) || response.results.length === 0) {
                return;
            }
            var html = '';
            for (var i = 0; i < response.results.length; i++) {
                var c = response.results[i];
                var name = c.name || '';
                var description = c.descriptionSnippet || '';
                var avatar = c.avatarUrl || '';
                var subscribers = c.subscriberCount !== undefined && c.subscriberCount !== null ? formatNumber(c.subscriberCount) + ' subscribers' : '';
                var category = c.category ? c.category : '';
                var metaParts = [];
                if (subscribers) {
                    metaParts.push(subscribers);
                }
                if (category) {
                    metaParts.push(category);
                }
                var metaText = metaParts.join(' • ');

                html += "<article class='channel-result-card' data-action='open-channel' data-channel-id='" + escapeHtml(c.channelId) + "'>";
                html += "  <div class='channel-result-avatar'>";
                if (avatar) {
                    html += "    <img class='channel-avatar' src='" + escapeHtml(avatar) + "' alt='" + escapeHtml(name) + "'>";
                } else {
                    html += "    <span class='channel-avatar placeholder-avatar' aria-hidden='true'></span>";
                }
                html += "  </div>";

                html += "  <div class='channel-result-main'>";
                html += "    <h3 class='channel-result-title'>" + escapeHtml(name) + "</h3>";
                if (metaText) {
                    html += "    <div class='channel-result-meta'>" + escapeHtml(metaText) + "</div>";
                }
                if (description) {
                    html += "    <p class='channel-result-description'>" + escapeHtml(description) + "</p>";
                }
                html += "  </div>";

                html += "  <div class='channel-result-actions'>";
                if (c.isFollowed) {
                    html += "    <button type='button' class='chip-button channel-follow-button is-followed' tabindex='-1'>Following</button>";
                } else {
                    html += "    <button type='button' class='chip-button channel-follow-button' tabindex='-1'>Follow</button>";
                }
                html += "  </div>";

                html += "</article>";
            }
            container.innerHTML = html;
        }

        function renderEmptyState(container, state, response) {
            if (!container) {
                return;
            }
            var html = '';
            if (!state.query) {
                html += "<div class='empty-state-inner'>";
                html += "  <div class='empty-state-icon' aria-hidden='true'></div>";
                html += "  <h2 class='empty-state-title'>Search Streamline</h2>";
                html += "  <p class='empty-state-text'>Start by entering what you want to watch or who you want to follow.</p>";
                html += "</div>";
                container.innerHTML = html;
                return;
            }
            var hasResults = response && response.totalResults && response.totalResults > 0;
            if (hasResults) {
                container.innerHTML = '';
                return;
            }
            var label = state.tab === 'channels' ? 'channels' : 'videos';
            html += "<div class='empty-state-inner'>";
            html += "  <div class='empty-state-icon' aria-hidden='true'></div>";
            html += "  <h2 class='empty-state-title'>No " + escapeHtml(label) + " found</h2>";
            html += "  <p class='empty-state-text'>Try a different search term or adjust your filters.</p>";
            html += "  <button type='button' class='chip-button empty-state-reset-button' data-action='reset-filters-from-empty'>Clear filters</button>";
            html += "</div>";
            container.innerHTML = html;
        }

        function renderPagination(container, state, response) {
            if (!container) {
                return;
            }
            container.innerHTML = '';
            if (!state.query || !response || !response.totalResults || !response.pageSize) {
                return;
            }
            var totalPages = Math.ceil(response.totalResults / response.pageSize);
            if (!totalPages || totalPages <= 1) {
                return;
            }
            var page = response.page || 1;
            var html = '';
            var prevPage = page > 1 ? page - 1 : 1;
            var nextPage = page < totalPages ? page + 1 : totalPages;

            html += "<button type='button' class='pagination-button pagination-prev" + (page === 1 ? " is-disabled" : "") + "' data-action='change-page' data-page='" + prevPage + "'" + (page === 1 ? " disabled" : "") + ">Prev</button>";

            var start = page - 2;
            if (start < 1) {
                start = 1;
            }
            var end = start + 4;
            if (end > totalPages) {
                end = totalPages;
            }
            if (end - start < 4) {
                start = end - 4;
                if (start < 1) {
                    start = 1;
                }
            }

            for (var p = start; p <= end; p++) {
                var activeClass = p === page ? ' is-active' : '';
                html += "<button type='button' class='pagination-button pagination-page" + activeClass + "' data-action='change-page' data-page='" + p + "'>" + p + "</button>";
            }

            html += "<button type='button' class='pagination-button pagination-next" + (page === totalPages ? " is-disabled" : "") + "' data-action='change-page' data-page='" + nextPage + "'" + (page === totalPages ? " disabled" : "") + ">Next</button>";

            container.innerHTML = html;
        }

        function handleStateChange(fromPopstate) {
            if (!searchFilterOptions) {
                return;
            }
            var state = loadStateFromUrlAndFilters();
            currentQuery = state.query;
            activeTab = state.tab;
            currentSort = state.sort;
            currentPage = state.page;
            currentPageSize = state.pageSize;

            if (localSearchInput) {
                localSearchInput.value = currentQuery;
            }

            updateTabsUI(activeTab);

            if (videoFiltersContainer) {
                videoFiltersContainer.hidden = activeTab !== 'videos';
            }
            if (channelFiltersContainer) {
                channelFiltersContainer.hidden = activeTab !== 'channels';
            }

            renderVideoFiltersPanel(videoFiltersContainer, searchFilterOptions, videoFiltersState);
            renderChannelFiltersPanel(channelFiltersContainer, searchFilterOptions, channelFiltersState);
            renderSortSelector(sortSelect, activeTab, currentSort);

            if (!currentQuery) {
                if (summaryContainer) {
                    renderSummary(summaryContainer, state, null);
                }
                if (videoResultsContainer) {
                    videoResultsContainer.innerHTML = '';
                }
                if (channelResultsContainer) {
                    channelResultsContainer.innerHTML = '';
                }
                if (emptyStateContainer) {
                    renderEmptyState(emptyStateContainer, state, null);
                    emptyStateContainer.hidden = false;
                }
                if (paginationContainer) {
                    paginationContainer.innerHTML = '';
                }
                if (videoResultsContainer) {
                    videoResultsContainer.hidden = true;
                }
                if (channelResultsContainer) {
                    channelResultsContainer.hidden = true;
                }
                return;
            }

            var response;
            if (activeTab === 'channels') {
                var filtersChan = channelFiltersState && Object.keys(channelFiltersState).length ? channelFiltersState : undefined;
                var sortChan = isValidSortForTab(currentSort, 'channels') ? currentSort : undefined;
                try {
                    response = WebsiteSDK.searchChannels(currentQuery, filtersChan, sortChan, currentPage, currentPageSize);
                } catch (errChan) {
                    console.error('searchChannels failed', errChan);
                    response = { totalResults: 0, results: [], page: currentPage, pageSize: currentPageSize };
                }
                if (summaryContainer) {
                    renderSummary(summaryContainer, state, response);
                }
                var hasChanResults = response && response.totalResults && response.totalResults > 0;
                if (channelResultsContainer) {
                    if (hasChanResults) {
                        renderChannelResults(channelResultsContainer, response);
                        channelResultsContainer.hidden = false;
                    } else {
                        channelResultsContainer.innerHTML = '';
                        channelResultsContainer.hidden = true;
                    }
                }
                if (videoResultsContainer) {
                    videoResultsContainer.innerHTML = '';
                    videoResultsContainer.hidden = true;
                }
                if (emptyStateContainer) {
                    renderEmptyState(emptyStateContainer, state, response);
                    emptyStateContainer.hidden = hasChanResults;
                }
                if (paginationContainer) {
                    renderPagination(paginationContainer, state, response);
                }
            } else {
                var filtersVid = videoFiltersState && Object.keys(videoFiltersState).length ? videoFiltersState : undefined;
                var sortVid = isValidSortForTab(currentSort, 'videos') ? currentSort : undefined;
                try {
                    response = WebsiteSDK.searchVideos(currentQuery, filtersVid, sortVid, currentPage, currentPageSize);
                } catch (errVid) {
                    console.error('searchVideos failed', errVid);
                    response = { totalResults: 0, results: [], page: currentPage, pageSize: currentPageSize };
                }
                if (summaryContainer) {
                    renderSummary(summaryContainer, state, response);
                }
                var hasVidResults = response && response.totalResults && response.totalResults > 0;
                if (videoResultsContainer) {
                    if (hasVidResults) {
                        renderVideoResults(videoResultsContainer, response);
                        videoResultsContainer.hidden = false;
                    } else {
                        videoResultsContainer.innerHTML = '';
                        videoResultsContainer.hidden = true;
                    }
                }
                if (channelResultsContainer) {
                    channelResultsContainer.innerHTML = '';
                    channelResultsContainer.hidden = true;
                }
                if (emptyStateContainer) {
                    renderEmptyState(emptyStateContainer, state, response);
                    emptyStateContainer.hidden = hasVidResults;
                }
                if (paginationContainer) {
                    renderPagination(paginationContainer, state, response);
                }
            }
        }

        function updateFilterStateFromControl(tabKey, filterKey, inputEl) {
            var value = inputEl.value;
            var stateObj = tabKey === 'channels' ? (channelFiltersState || {}) : (videoFiltersState || {});
            if (inputEl.type === 'number' || inputEl.type === 'range') {
                var num = value === '' ? NaN : Number(value);
                if (isNaN(num)) {
                    delete stateObj[filterKey];
                } else {
                    stateObj[filterKey] = num;
                }
            } else if (inputEl.tagName && inputEl.tagName.toLowerCase() === 'select') {
                if (!value) {
                    delete stateObj[filterKey];
                } else {
                    stateObj[filterKey] = value;
                }
            } else {
                if (!value) {
                    delete stateObj[filterKey];
                } else {
                    stateObj[filterKey] = value;
                }
            }
            if (tabKey === 'channels') {
                channelFiltersState = stateObj;
            } else {
                videoFiltersState = stateObj;
            }
            var basic = readUrlBasicState();
            var newState = {
                query: basic.query,
                tab: basic.tab,
                sort: basic.sort,
                page: 1,
                pageSize: basic.pageSize
            };
            updateUrlWithState(newState);
        }

        function clearFiltersForTab(tabKey) {
            if (tabKey === 'channels') {
                channelFiltersState = {};
            } else {
                videoFiltersState = {};
            }
            var basic = readUrlBasicState();
            var newState = {
                query: basic.query,
                tab: tabKey,
                sort: basic.sort,
                page: 1,
                pageSize: basic.pageSize
            };
            updateUrlWithState(newState);
        }

        function setupEventHandlers() {
            if (localSearchForm && localSearchInput) {
                localSearchForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var value = localSearchInput.value ? localSearchInput.value.trim() : '';
                    if (!value) {
                        return;
                    }
                    videoFiltersState = {};
                    channelFiltersState = {};
                    var newState = {
                        query: value,
                        tab: 'videos',
                        sort: null,
                        page: 1,
                        pageSize: DEFAULT_PAGE_SIZE
                    };
                    updateUrlWithState(newState);
                });
            }

            headerSearchForm = document.querySelector('.site-header .search-form');
            if (headerSearchForm) {
                headerSearchForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var input = headerSearchForm.querySelector('input[name="q"]');
                    var value = input && input.value ? input.value.trim() : '';
                    if (!value) {
                        return;
                    }
                    var params = new URLSearchParams();
                    params.set('query', value);
                    params.set('tab', 'videos');
                    window.location.href = 'search.html?' + params.toString();
                });
            }

            if (tabsSwitcher) {
                tabsSwitcher.addEventListener('click', function(e) {
                    var btn = e.target.closest('[data-action="switch-tab"]');
                    if (!btn) {
                        return;
                    }
                    var newTab = btn.dataset.tab === 'channels' ? 'channels' : 'videos';
                    if (newTab === activeTab) {
                        return;
                    }
                    var basic = readUrlBasicState();
                    var sortForTab = basic.sort && isValidSortForTab(basic.sort, newTab) ? basic.sort : null;
                    var newState = {
                        query: basic.query,
                        tab: newTab,
                        sort: sortForTab,
                        page: 1,
                        pageSize: basic.pageSize
                    };
                    updateUrlWithState(newState);
                });
            }

            if (sortSelect) {
                sortSelect.addEventListener('change', function() {
                    var selectedValue = sortSelect.value || null;
                    var basic = readUrlBasicState();
                    var newState = {
                        query: basic.query,
                        tab: basic.tab,
                        sort: selectedValue,
                        page: 1,
                        pageSize: basic.pageSize
                    };
                    updateUrlWithState(newState);
                });
            }

            if (videoFiltersContainer) {
                videoFiltersContainer.addEventListener('change', function(e) {
                    var target = e.target;
                    if (!target || !target.dataset || !target.dataset.filterKey) {
                        return;
                    }
                    updateFilterStateFromControl('videos', target.dataset.filterKey, target);
                });
                videoFiltersContainer.addEventListener('input', function(e) {
                    var target = e.target;
                    if (!target || !target.dataset || !target.dataset.filterKey) {
                        return;
                    }
                    if (target.type === 'number' || target.type === 'range') {
                        updateFilterStateFromControl('videos', target.dataset.filterKey, target);
                    }
                });
                var clearVideoBtn = videoFiltersContainer.querySelector('[data-action="clear-video-filters"]');
                if (clearVideoBtn) {
                    clearVideoBtn.addEventListener('click', function() {
                        clearFiltersForTab('videos');
                    });
                }
            }

            if (channelFiltersContainer) {
                channelFiltersContainer.addEventListener('change', function(e) {
                    var target = e.target;
                    if (!target || !target.dataset || !target.dataset.filterKey) {
                        return;
                    }
                    updateFilterStateFromControl('channels', target.dataset.filterKey, target);
                });
                channelFiltersContainer.addEventListener('input', function(e) {
                    var target = e.target;
                    if (!target || !target.dataset || !target.dataset.filterKey) {
                        return;
                    }
                    if (target.type === 'number' || target.type === 'range') {
                        updateFilterStateFromControl('channels', target.dataset.filterKey, target);
                    }
                });
                var clearChannelBtn = channelFiltersContainer.querySelector('[data-action="clear-channel-filters"]');
                if (clearChannelBtn) {
                    clearChannelBtn.addEventListener('click', function() {
                        clearFiltersForTab('channels');
                    });
                }
            }

            if (paginationContainer) {
                paginationContainer.addEventListener('click', function(e) {
                    var btn = e.target.closest('[data-action="change-page"]');
                    if (!btn) {
                        return;
                    }
                    var pageStr = btn.dataset.page;
                    var newPage = parseInt(pageStr || '1', 10);
                    if (!newPage || newPage === currentPage) {
                        return;
                    }
                    var basic = readUrlBasicState();
                    var newState = {
                        query: basic.query,
                        tab: basic.tab,
                        sort: basic.sort,
                        page: newPage,
                        pageSize: basic.pageSize
                    };
                    updateUrlWithState(newState);
                });
            }

            if (videoResultsContainer) {
                videoResultsContainer.addEventListener('click', function(e) {
                    var openVideoEl = e.target.closest('[data-action="open-video"]');
                    if (openVideoEl) {
                        var vid = openVideoEl.dataset.videoId;
                        if (vid) {
                            window.location.href = 'video.html?videoId=' + encodeURIComponent(vid);
                        }
                        return;
                    }
                    var openChannelEl = e.target.closest('[data-action="open-channel"]');
                    if (openChannelEl) {
                        var cid = openChannelEl.dataset.channelId;
                        if (cid) {
                            window.location.href = 'channel.html?channelId=' + encodeURIComponent(cid);
                        }
                        return;
                    }
                    var notInterestedEl = e.target.closest('[data-action="mark-not-interested"]');
                    if (notInterestedEl) {
                        var videoId = notInterestedEl.dataset.videoId;
                        if (!videoId) {
                            return;
                        }
                        try {
                            var res = WebsiteSDK.markRecommendationNotInterested(videoId, 'search');
                            if (res && res.success) {
                                var card = notInterestedEl.closest('.video-result-card');
                                if (card && card.parentNode) {
                                    card.parentNode.removeChild(card);
                                }
                            }
                        } catch (err) {
                            console.error('Failed to record not interested feedback', err);
                        }
                    }
                });
            }

            if (channelResultsContainer) {
                channelResultsContainer.addEventListener('click', function(e) {
                    var openChannelEl = e.target.closest('[data-action="open-channel"], .channel-result-card');
                    if (!openChannelEl) {
                        return;
                    }
                    var cid = openChannelEl.dataset.channelId;
                    if (!cid) {
                        cid = openChannelEl.getAttribute('data-channel-id');
                    }
                    if (cid) {
                        window.location.href = 'channel.html?channelId=' + encodeURIComponent(cid);
                    }
                });
            }

            if (emptyStateContainer) {
                emptyStateContainer.addEventListener('click', function(e) {
                    var reset = e.target.closest('[data-action="reset-filters-from-empty"]');
                    if (!reset) {
                        return;
                    }
                    clearFiltersForTab(activeTab);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            localSearchForm = document.querySelector('[data-component="search-query-form"]');
            localSearchInput = document.getElementById('search-query-input');
            tabsSwitcher = document.querySelector('[data-component="results-tabs-switcher"]');
            summaryContainer = document.querySelector('[data-populate="results-summary"]');
            sortSelect = document.querySelector('[data-component="sort-selector"]');
            videoResultsContainer = document.querySelector('[data-populate="video-results"]');
            channelResultsContainer = document.querySelector('[data-populate="channel-results"]');
            emptyStateContainer = document.querySelector('[data-populate="empty-state"]');
            videoFiltersContainer = document.querySelector('[data-component="video-filters-panel"]');
            channelFiltersContainer = document.querySelector('[data-component="channel-filters-panel"]');
            paginationContainer = document.querySelector('[data-populate="pagination-controls"]');

            try {
                searchFilterOptions = WebsiteSDK.getSearchFilterOptions();
            } catch (err) {
                console.error('getSearchFilterOptions failed', err);
                searchFilterOptions = null;
            }

            setupEventHandlers();
            handleStateChange(false);

            window.addEventListener('popstate', function() {
                handleStateChange(true);
            });
        });
    })();
    </script>
</body>
</html>
