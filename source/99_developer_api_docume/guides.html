<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Developer API Documentation</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500&amp;display=swap' rel='stylesheet'>

  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='guides.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-inner'>
      <div class='brand'>
        <div class='brand-mark' aria-hidden='true'></div>
        <div class='brand-text'>
          <div class='brand-title'>API Project</div>
          <div class='brand-subtitle'>developer • api</div>
        </div>
      </div>

      <nav class='primary-nav' aria-label='Primary'>
        <ul class='primary-nav-list'>
          <li class='primary-nav-item'>
            <a href='index.html' class='primary-nav-link' title='Documentation homepage'>Home</a>
          </li>
          <li class='primary-nav-item'>
            <a href='api_reference.html' class='primary-nav-link' title='Endpoint reference with Try-It console and code samples'>API Reference</a>
          </li>
          <li class='primary-nav-item is-active'>
            <a href='guides.html' class='primary-nav-link' title='Conceptual guides, including links to Rate Limits and other topics'>Guides</a>
          </li>
          <li class='primary-nav-item'>
            <a href='webhooks.html' class='primary-nav-link' title='Overview of webhook configuration and event categories'>Webhooks</a>
          </li>
          <li class='primary-nav-item'>
            <a href='sdks.html' class='primary-nav-link' title='Overview of available client libraries, including Python'>SDKs</a>
          </li>
          <li class='primary-nav-item'>
            <a href='authentication.html' class='primary-nav-link' title='Authentication methods and examples, including cURL'>Authentication</a>
          </li>
        </ul>
      </nav>

      <div class='header-meta'>
        <span class='meta-label'>Developer API Documentation</span>
        <!-- Optional user menu (for special access pages, if added in the future) -->
        <div class='user-menu' aria-label='User menu'>
          <button class='user-avatar' type='button' aria-haspopup='true' aria-expanded='false'>
            <span class='visually-hidden'>Open user menu</span>
          </button>
          <div class='user-dropdown' role='menu'>
            <!-- Dropdown links intentionally left empty. When special access pages are available,
                 add <a> elements here pointing to those URLs. -->
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class='layout'>
    <aside class='sidebar' aria-label='Section navigation'>
      <div class='sidebar-inner'>
        <h2 class='sidebar-title'>Guides</h2>
        <nav class='sidebar-nav' aria-label='Guide categories'>
          <ul class='sidebar-list' data-component='guide-category-selector-sidebar' data-populate='guide-categories-sidebar'>
            <!-- Guide categories will be populated here -->
          </ul>
        </nav>
      </div>
    </aside>

    <main id='content' class='content' role='main'>
      <div data-component='guides-overview-init' class='visually-hidden' aria-hidden='true'></div>

      <section class='page-header' data-component='guide-intro-section'>
        <h1 class='page-title'>Guides Overview</h1>
        <div class='section-underline'></div>
        <div class='page-intro intro-content' data-populate='guides-intro'></div>
      </section>

      <div id='guidesGlobalError' class='alert alert-error' role='alert' aria-live='polite'></div>

      <section class='guides-search-section' data-component='guides-search-form'>
        <form id='guidesSearchForm' class='search-form' data-action='guides-search-form' role='search' aria-label='Search guides and documentation'>
          <div class='form-group'>
            <label for='guidesSearchInput' class='form-label'>Search guides</label>
            <div class='search-input-wrapper'>
              <input id='guidesSearchInput' name='query' type='search' class='search-input' placeholder='Search by topic, e.g. rate limits or webhooks' autocomplete='off'>
              <button type='submit' class='btn btn-primary search-submit'>
                <span class='btn-label'>Search</span>
              </button>
              <button type='button' class='btn btn-ghost search-clear' data-action='clear-guides-search'>
                <span class='btn-label'>Clear</span>
              </button>
            </div>
            <p id='guidesSearchError' class='form-error' role='status' aria-live='polite'></p>
          </div>
        </form>
      </section>

      <section class='guide-category-section' data-component='guide-category-selector' aria-label='Guide categories'>
        <div class='category-pills' data-populate='guide-categories'></div>
      </section>

      <section class='guide-list-section' data-component='guide-list' aria-label='Guides list'>
        <div class='guide-list' data-populate='guide-list'></div>
      </section>

      <section class='guides-search-results-section' data-component='guides-search-results-list' aria-label='Search results' hidden>
        <div class='search-results-header'>
          <div id='guidesSearchSummary' class='search-summary' data-role='search-summary' aria-live='polite'></div>
        </div>
        <div class='guides-search-results' data-populate='guides-search-results'></div>
      </section>

      <div data-component='guide-scroll-and-highlight-manager' class='visually-hidden' aria-hidden='true'></div>
      <div data-component='guide-navigation-handler' class='visually-hidden' aria-hidden='true'></div>
    </main>
  </div>

  <footer class='site-footer'>
    <div class='footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='about.html' class='footer-nav-link' title='Background information about the API'>About</a>
          </li>
          <li class='footer-nav-item'>
            <a href='api_reference.html' class='footer-nav-link' title='Direct link to the full API reference'>API Reference</a>
          </li>
          <li class='footer-nav-item'>
            <a href='rate_limits.html' class='footer-nav-link' title='Details on global and per-endpoint rate limits'>Rate Limits</a>
          </li>
          <li class='footer-nav-item'>
            <a href='changelog.html' class='footer-nav-link' title='History of API and documentation changes'>Changelog</a>
          </li>
          <li class='footer-nav-item'>
            <a href='support.html' class='footer-nav-link' title='How to get help or report issues'>Support</a>
          </li>
          <li class='footer-nav-item'>
            <a href='faq.html' class='footer-nav-link' title='Frequently asked questions and quick answers'>FAQ</a>
          </li>
        </ul>
      </nav>
      <div class='footer-meta'>
        <span class='footer-copy'>&copy; <span data-year='current'>2024</span> Developer API</span>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      var state = {
        guideData: null,
        selectedCategoryId: null,
        focusedGuidePageId: null,
        search: {
          active: false,
          query: '',
          results: [],
          total: 0
        }
      };

      var dom = {
        intro: document.querySelector('[data-populate="guides-intro"]'),
        categoryPills: document.querySelector('[data-populate="guide-categories"]'),
        guideList: document.querySelector('[data-populate="guide-list"]'),
        sidebarCategories: document.querySelector('[data-populate="guide-categories-sidebar"]'),
        searchResultsList: document.querySelector('[data-populate="guides-search-results"]'),
        guideListSection: document.querySelector('[data-component="guide-list"]'),
        searchResultsSection: document.querySelector('[data-component="guides-search-results-list"]'),
        searchSummary: document.querySelector('[data-role="search-summary"]'),
        searchForm: document.querySelector('[data-action="guides-search-form"]') || document.getElementById('guidesSearchForm'),
        searchInput: document.getElementById('guidesSearchInput'),
        clearSearchButton: document.querySelector('[data-action="clear-guides-search"]'),
        globalError: document.getElementById('guidesGlobalError'),
        searchError: document.getElementById('guidesSearchError')
      };

      function getUrlParams() {
        var params = new URLSearchParams(window.location.search);
        return {
          category: params.get('category'),
          guide: params.get('guide')
        };
      }

      function setUrlParams(nextCategory, nextGuide, usePush) {
        var url = new URL(window.location.href);
        var params = url.searchParams;

        if (nextCategory) {
          params.set('category', nextCategory);
        } else {
          params.delete('category');
        }

        if (nextGuide) {
          params.set('guide', nextGuide);
        } else {
          params.delete('guide');
        }

        url.search = params.toString();
        var stateObj = { category: nextCategory || null, guide: nextGuide || null };
        if (usePush) {
          window.history.pushState(stateObj, '', url.toString());
        } else {
          window.history.replaceState(stateObj, '', url.toString());
        }
      }

      function findGuideByPageId(pageId) {
        if (!state.guideData || !Array.isArray(state.guideData.guideCategories)) {
          return null;
        }
        for (var i = 0; i < state.guideData.guideCategories.length; i += 1) {
          var category = state.guideData.guideCategories[i];
          if (!category || !Array.isArray(category.guides)) {
            continue;
          }
          for (var j = 0; j < category.guides.length; j += 1) {
            var guide = category.guides[j];
            if (guide && guide.pageId === pageId) {
              return { category: category, guide: guide };
            }
          }
        }
        return null;
      }

      function renderIntro(container, introMarkdown) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!introMarkdown) {
          var fallback = document.createElement('p');
          fallback.textContent = 'Browse task-focused guides by category, or search across all documentation to find the guide that fits your current task.';
          container.appendChild(fallback);
          return;
        }
        var paragraph = document.createElement('p');
        paragraph.textContent = introMarkdown;
        container.appendChild(paragraph);
      }

      function renderCategoryPills(container, categories, selectedCategoryId) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!Array.isArray(categories) || !categories.length) {
          var empty = document.createElement('p');
          empty.className = 'empty-state';
          empty.textContent = 'No guide categories are available.';
          container.appendChild(empty);
          return;
        }
        categories.forEach(function(category) {
          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'category-pill';
          if (category.categoryId === selectedCategoryId) {
            button.classList.add('is-active');
          }
          button.textContent = category.categoryName || category.categoryId || 'Category';
          button.dataset.action = 'select-category';
          button.dataset.categoryId = category.categoryId || '';
          container.appendChild(button);
        });
      }

      function renderSidebarCategories(container, categories, selectedCategoryId) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!Array.isArray(categories) || !categories.length) {
          var item = document.createElement('li');
          item.className = 'sidebar-item';
          var span = document.createElement('span');
          span.className = 'sidebar-link is-disabled';
          span.textContent = 'No categories';
          item.appendChild(span);
          container.appendChild(item);
          return;
        }
        categories.forEach(function(category) {
          var li = document.createElement('li');
          li.className = 'sidebar-item';
          if (category.categoryId === selectedCategoryId) {
            li.classList.add('is-active');
          }
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'sidebar-link';
          btn.textContent = category.categoryName || category.categoryId || 'Category';
          btn.dataset.action = 'sidebar-select-category';
          btn.dataset.categoryId = category.categoryId || '';
          li.appendChild(btn);
          container.appendChild(li);
        });
      }

      function renderGuideList(container, categories, selectedCategoryId, focusedGuidePageId) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!Array.isArray(categories) || !categories.length) {
          var none = document.createElement('p');
          none.className = 'empty-state';
          none.textContent = 'No guides are available.';
          container.appendChild(none);
          return;
        }
        var selectedCategory = null;
        for (var i = 0; i < categories.length; i += 1) {
          if (categories[i].categoryId === selectedCategoryId) {
            selectedCategory = categories[i];
            break;
          }
        }
        if (!selectedCategory) {
          selectedCategory = categories[0];
        }
        if (!selectedCategory || !Array.isArray(selectedCategory.guides) || !selectedCategory.guides.length) {
          var empty = document.createElement('p');
          empty.className = 'empty-state';
          empty.textContent = 'No guides are available for this category.';
          container.appendChild(empty);
          return;
        }
        selectedCategory.guides.forEach(function(guide) {
          var card = document.createElement('button');
          card.type = 'button';
          card.className = 'guide-card';
          card.dataset.action = 'open-guide';
          card.dataset.pageId = guide.pageId || '';
          card.dataset.pageType = guide.pageType || '';
          card.dataset.categoryId = selectedCategory.categoryId || '';

          var bar = document.createElement('div');
          bar.className = 'guide-card-bar';
          card.appendChild(bar);

          var content = document.createElement('div');
          content.className = 'guide-card-content';

          var title = document.createElement('div');
          title.className = 'guide-card-title';
          title.textContent = guide.title || guide.pageId || 'Untitled guide';
          content.appendChild(title);

          if (guide.summary) {
            var summary = document.createElement('div');
            summary.className = 'guide-card-summary';
            summary.textContent = guide.summary;
            content.appendChild(summary);
          }

          card.appendChild(content);

          var chevron = document.createElement('span');
          chevron.className = 'guide-card-chevron';
          chevron.setAttribute('aria-hidden', 'true');
          chevron.textContent = '›';
          card.appendChild(chevron);

          if (guide.pageId) {
            card.id = 'guide-' + guide.pageId;
          }

          if (focusedGuidePageId && guide.pageId === focusedGuidePageId) {
            card.classList.add('is-focused');
            card.setAttribute('aria-current', 'true');
          }

          container.appendChild(card);
        });
      }

      function renderSearchResults(container, results, focusedGuidePageId) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!Array.isArray(results) || !results.length) {
          var empty = document.createElement('p');
          empty.className = 'empty-state';
          empty.textContent = 'No results found.';
          container.appendChild(empty);
          return;
        }
        results.forEach(function(result) {
          var card = document.createElement('button');
          card.type = 'button';
          card.className = 'guide-card search-result-card';
          card.dataset.action = 'search-result-click';
          card.dataset.pageId = result.pageId || '';
          card.dataset.pageType = result.pageType || '';
          card.dataset.entityType = result.entityType || '';
          card.dataset.entityId = result.entityId || '';

          var bar = document.createElement('div');
          bar.className = 'guide-card-bar';
          card.appendChild(bar);

          var content = document.createElement('div');
          content.className = 'guide-card-content';

          var title = document.createElement('div');
          title.className = 'guide-card-title';
          title.textContent = result.title || result.pageId || 'Untitled result';
          content.appendChild(title);

          if (result.snippet) {
            var snippet = document.createElement('div');
            snippet.className = 'guide-card-summary';
            snippet.textContent = result.snippet;
            content.appendChild(snippet);
          }

          card.appendChild(content);

          var chevron = document.createElement('span');
          chevron.className = 'guide-card-chevron';
          chevron.setAttribute('aria-hidden', 'true');
          chevron.textContent = '›';
          card.appendChild(chevron);

          if (focusedGuidePageId && result.pageId === focusedGuidePageId) {
            card.classList.add('is-focused');
            card.setAttribute('aria-current', 'true');
          }

          container.appendChild(card);
        });
      }

      function setSearchActive(active) {
        state.search.active = !!active;
        if (dom.guideListSection) {
          if (state.search.active) {
            dom.guideListSection.setAttribute('hidden', 'hidden');
          } else {
            dom.guideListSection.removeAttribute('hidden');
          }
        }
        if (dom.searchResultsSection) {
          if (state.search.active) {
            dom.searchResultsSection.removeAttribute('hidden');
          } else {
            dom.searchResultsSection.setAttribute('hidden', 'hidden');
          }
        }
      }

      function scrollGuideIntoView(pageId) {
        if (!pageId) {
          return;
        }
        var element = document.getElementById('guide-' + pageId);
        if (!element) {
          return;
        }
        try {
          element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } catch (e) {
          element.scrollIntoView();
        }
        element.classList.add('is-focused');
        window.setTimeout(function() {
          element.classList.remove('is-focused');
        }, 2000);
      }

      function navigateToDoc(pageType, pageId) {
        var targetUrl = null;
        if (pageType === 'rate_limits') {
          targetUrl = 'rate_limits.html';
        } else if (pageType === 'webhooks_overview' || pageType === 'webhooks_group') {
          targetUrl = 'webhooks.html';
        } else if (pageType === 'authentication') {
          targetUrl = 'authentication.html';
        } else if (pageType === 'api_reference') {
          targetUrl = 'api_reference.html';
        } else if (pageType === 'home') {
          targetUrl = 'index.html';
        } else if (pageType === 'sdks_overview' || pageType === 'sdk_language') {
          targetUrl = 'sdks.html';
        } else if (pageType === 'about') {
          targetUrl = 'about.html';
        } else if (pageType === 'support') {
          targetUrl = 'support.html';
        } else if (pageType === 'changelog') {
          targetUrl = 'changelog.html';
        } else if (pageType === 'faq') {
          targetUrl = 'faq.html';
        } else if (pageType === 'guides_overview') {
          targetUrl = 'guides.html';
        }
        if (!targetUrl) {
          targetUrl = 'index.html';
        }
        window.location.href = targetUrl;
      }

      function applyUrlStateFromBrowser() {
        if (!state.guideData || !Array.isArray(state.guideData.guideCategories)) {
          return;
        }
        var urlState = getUrlParams();
        var categories = state.guideData.guideCategories;
        var nextSelectedCategoryId = state.selectedCategoryId;
        var nextFocusedGuidePageId = null;

        if (urlState.guide) {
          var found = findGuideByPageId(urlState.guide);
          if (found) {
            nextSelectedCategoryId = found.category.categoryId;
            nextFocusedGuidePageId = found.guide.pageId;
          }
        } else if (urlState.category) {
          for (var i = 0; i < categories.length; i += 1) {
            if (categories[i].categoryId === urlState.category) {
              nextSelectedCategoryId = categories[i].categoryId;
              break;
            }
          }
        } else if (!nextSelectedCategoryId && categories.length) {
          nextSelectedCategoryId = categories[0].categoryId;
        }

        state.selectedCategoryId = nextSelectedCategoryId;
        state.focusedGuidePageId = nextFocusedGuidePageId;
        setSearchActive(false);

        renderCategoryPills(dom.categoryPills, categories, state.selectedCategoryId);
        renderSidebarCategories(dom.sidebarCategories, categories, state.selectedCategoryId);
        renderGuideList(dom.guideList, categories, state.selectedCategoryId, state.focusedGuidePageId);

        if (state.focusedGuidePageId) {
          window.setTimeout(function() {
            scrollGuideIntoView(state.focusedGuidePageId);
          }, 100);
        }
      }

      function handleSearchSubmit(event) {
        if (event) {
          event.preventDefault();
        }
        if (!dom.searchInput) {
          return;
        }
        var query = dom.searchInput.value.trim();
        if (!query) {
          state.search.query = '';
          state.search.results = [];
          state.search.total = 0;
          if (dom.searchError) {
            dom.searchError.textContent = '';
          }
          if (dom.searchSummary) {
            dom.searchSummary.textContent = 'Enter a search term to find guides and related documentation.';
          }
          setSearchActive(false);
          return;
        }
        try {
          if (dom.searchError) {
            dom.searchError.textContent = '';
          }
          var filters = {
            pageTypes: ['guides_overview', 'rate_limits', 'webhooks_overview', 'webhooks_group', 'authentication', 'faq', 'other']
          };
          var result = WebsiteSDK.searchDocumentation(query, filters);
          var results = (result && Array.isArray(result.results)) ? result.results : [];
          var total = result && typeof result.total === 'number' ? result.total : results.length;

          state.search.query = query;
          state.search.results = results;
          state.search.total = total;

          setSearchActive(true);
          renderSearchResults(dom.searchResultsList, state.search.results, state.focusedGuidePageId);

          if (dom.searchSummary) {
            if (!results.length) {
              dom.searchSummary.textContent = 'No results found for "' + query + '".';
            } else {
              var label = 'Showing ' + total + ' result' + (total === 1 ? '' : 's') + ' for "' + query + '".';
              dom.searchSummary.textContent = label;
            }
          }
        } catch (e) {
          console.error('searchDocumentation failed', e);
          if (dom.searchError) {
            dom.searchError.textContent = 'Search is temporarily unavailable. Try again in a moment.';
          }
        }
      }

      function handleClearSearch(event) {
        if (event) {
          event.preventDefault();
        }
        if (dom.searchInput) {
          dom.searchInput.value = '';
        }
        state.search.query = '';
        state.search.results = [];
        state.search.total = 0;
        if (dom.searchError) {
          dom.searchError.textContent = '';
        }
        if (dom.searchSummary) {
          dom.searchSummary.textContent = '';
        }
        setSearchActive(false);
      }

      function handleAction(event, action, target) {
        if (action === 'select-category' || action === 'sidebar-select-category') {
          event.preventDefault();
          var categoryId = target.dataset.categoryId || '';
          if (!categoryId || categoryId === state.selectedCategoryId) {
            return;
          }
          state.selectedCategoryId = categoryId;
          state.focusedGuidePageId = null;
          setSearchActive(false);
          if (state.guideData && Array.isArray(state.guideData.guideCategories)) {
            var categories = state.guideData.guideCategories;
            renderCategoryPills(dom.categoryPills, categories, state.selectedCategoryId);
            renderSidebarCategories(dom.sidebarCategories, categories, state.selectedCategoryId);
            renderGuideList(dom.guideList, categories, state.selectedCategoryId, null);
          }
          setUrlParams(state.selectedCategoryId, null, true);
        } else if (action === 'open-guide') {
          event.preventDefault();
          var pageType = target.dataset.pageType || '';
          var pageId = target.dataset.pageId || '';
          if (!pageType && !pageId) {
            return;
          }
          navigateToDoc(pageType, pageId);
        } else if (action === 'search-result-click') {
          event.preventDefault();
          var resultPageType = target.dataset.pageType || '';
          var resultPageId = target.dataset.pageId || '';
          var guideMatch = resultPageId ? findGuideByPageId(resultPageId) : null;
          if (guideMatch) {
            state.selectedCategoryId = guideMatch.category.categoryId;
            state.focusedGuidePageId = guideMatch.guide.pageId;
            setSearchActive(false);
            if (state.guideData && Array.isArray(state.guideData.guideCategories)) {
              var cats = state.guideData.guideCategories;
              renderCategoryPills(dom.categoryPills, cats, state.selectedCategoryId);
              renderSidebarCategories(dom.sidebarCategories, cats, state.selectedCategoryId);
              renderGuideList(dom.guideList, cats, state.selectedCategoryId, state.focusedGuidePageId);
            }
            setUrlParams(state.selectedCategoryId, state.focusedGuidePageId, true);
            window.setTimeout(function() {
              scrollGuideIntoView(state.focusedGuidePageId);
            }, 100);
          } else {
            navigateToDoc(resultPageType, resultPageId);
          }
        } else if (action === 'clear-guides-search') {
          handleClearSearch(event);
        }
      }

      function initializeGuidesOverview() {
        try {
          var overview = WebsiteSDK.getGuidesOverview();
          if (!overview) {
            throw new Error('getGuidesOverview returned no data');
          }
          state.guideData = overview;

          if (dom.intro) {
            renderIntro(dom.intro, overview.introMarkdown || '');
          }

          var categories = Array.isArray(overview.guideCategories) ? overview.guideCategories : [];
          var urlState = getUrlParams();
          var selectedCategoryId = null;
          var focusedGuidePageId = null;

          if (urlState.guide && categories.length) {
            var found = findGuideByPageId(urlState.guide);
            if (found) {
              selectedCategoryId = found.category.categoryId;
              focusedGuidePageId = found.guide.pageId;
            }
          }

          if (!selectedCategoryId && urlState.category && categories.length) {
            for (var i = 0; i < categories.length; i += 1) {
              if (categories[i].categoryId === urlState.category) {
                selectedCategoryId = categories[i].categoryId;
                break;
              }
            }
          }

          if (!selectedCategoryId && categories.length) {
            selectedCategoryId = categories[0].categoryId;
          }

          state.selectedCategoryId = selectedCategoryId;
          state.focusedGuidePageId = focusedGuidePageId;

          renderCategoryPills(dom.categoryPills, categories, state.selectedCategoryId);
          renderSidebarCategories(dom.sidebarCategories, categories, state.selectedCategoryId);
          renderGuideList(dom.guideList, categories, state.selectedCategoryId, state.focusedGuidePageId);

          if (state.focusedGuidePageId) {
            window.setTimeout(function() {
              scrollGuideIntoView(state.focusedGuidePageId);
            }, 100);
          }
        } catch (e) {
          console.error('getGuidesOverview failed', e);
          if (dom.globalError) {
            dom.globalError.textContent = 'Unable to load guides right now. Please refresh the page or try again later.';
          }
        }
      }

      if (dom.searchForm) {
        dom.searchForm.addEventListener('submit', handleSearchSubmit);
      }

      if (dom.clearSearchButton) {
        dom.clearSearchButton.addEventListener('click', function(event) {
          handleAction(event, 'clear-guides-search', dom.clearSearchButton);
        });
      }

      document.addEventListener('click', function(event) {
        var target = event.target;
        var actionElement = target.closest('[data-action]');
        if (!actionElement) {
          return;
        }
        var action = actionElement.dataset.action;
        if (!action) {
          return;
        }
        if (actionElement.tagName === 'FORM') {
          return;
        }
        handleAction(event, action, actionElement);
      });

      window.addEventListener('popstate', function() {
        applyUrlStateFromBrowser();
      });

      initializeGuidesOverview();
    });
  </script>
</body>
</html>
