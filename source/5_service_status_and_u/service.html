<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Status &amp; Uptime Dashboard</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500&amp;display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="service.css" />
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="brand" aria-label="Service status homepage">
                <div class="brand-mark" aria-hidden="true"></div>
                <div class="brand-text">
                    <span class="brand-title-line1">Service</span>
                    <span class="brand-title-line2">Status</span>
                </div>
            </a>

            <nav class="primary-nav" aria-label="Main navigation">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link is-active" title="Service status homepage and quick overview">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="status_overview.html" class="nav-link" title="Current status and uptime for all services">Status Overview</a>
                    </li>
                    <li class="nav-item">
                        <a href="reliability.html" class="nav-link" title="Historical uptime and reliability by service">Reliability</a>
                    </li>
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link" title="Customizable uptime and performance dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="compare_services.html" class="nav-link" title="Compare reliability and downtime between two services">Compare Services</a>
                    </li>
                    <li class="nav-item">
                        <a href="incidents.html" class="nav-link" title="Incident history, filters, and saved reports">Incidents</a>
                    </li>
                    <li class="nav-item">
                        <a href="maintenance.html" class="nav-link" title="View and schedule maintenance windows">Maintenance</a>
                    </li>
                    <li class="nav-item">
                        <a href="alerts.html" class="nav-link nav-link--button" title="Configure and manage alert rules">Alerts</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-main" tabindex="-1">
        <div class="container service-detail" data-component="service-detail-router">
            <div id="service-error" class="alert alert-error" role="alert" hidden></div>

            <!-- Service header (populated via JS) -->
            <section id="service-header" class="service-header card" data-component="service-header" data-populate="service-header"></section>

            <!-- Tab switcher -->
            <nav class="tabs" aria-label="Service detail tabs" data-component="service-tab-switcher">
                <button type="button" class="tab-link is-active" data-action="tab-overview" data-tab="overview">Overview</button>
                <button type="button" class="tab-link" data-action="tab-performance" data-tab="performance">Performance</button>
            </nav>

            <!-- Overview tab -->
            <section id="tab-overview" class="tab-panel is-active" data-tab-panel="overview">
                <section class="card uptime-summary" data-component="overview-uptime-summary" data-populate="overview-uptime-summary"></section>
                <section class="card tags-panel" data-component="overview-tags-panel" data-populate="overview-tags-panel"></section>
                <section class="card watchlist-panel" data-component="overview-watchlist-membership" data-populate="overview-watchlist-membership"></section>
            </section>

            <!-- Performance tab -->
            <section id="tab-performance" class="tab-panel" data-tab-panel="performance" hidden>
                <section class="filter-bar" data-component="performance-filter-bar" data-populate="performance-filter-bar"></section>
                <section class="date-range-summary" data-component="performance-date-range-summary" data-populate="performance-date-range-summary"></section>
                <section class="card preferred-region-card" data-component="preferred-region-form" data-populate="preferred-region-form"></section>
                <section class="card region-performance-card" data-component="performance-region-table" data-populate="performance-region-table"></section>
            </section>

            <!-- Related navigation links -->
            <section class="service-related-links" data-component="service-related-navigation-links">
                <h2 class="section-title">Related</h2>
                <ul class="link-list">
                    <li>
                        <button type="button" class="link-like" data-action="compare-services">Compare with another service</button>
                    </li>
                    <li>
                        <button type="button" class="link-like" data-action="view-maintenance">View maintenance windows</button>
                    </li>
                    <li>
                        <button type="button" class="link-like" data-action="manage-alerts">Manage alerts</button>
                    </li>
                    <li>
                        <button type="button" class="link-like" data-action="view-incidents">View incidents</button>
                    </li>
                </ul>
            </section>

            <!-- Watchlist creation modal -->
            <div class="modal-backdrop" data-component="watchlist-create-modal" hidden>
                <div class="modal" role="dialog" aria-modal="true" aria-labelledby="watchlist-modal-title">
                    <header class="modal-header">
                        <h2 id="watchlist-modal-title">Add to new watchlist</h2>
                        <button type="button" class="modal-close" aria-label="Close" data-action="close-watchlist-modal">&times;</button>
                    </header>
                    <div class="modal-body">
                        <form id="watchlist-form" novalidate>
                            <div class="form-group">
                                <label for="watchlist-name">Watchlist name</label>
                                <input type="text" id="watchlist-name" name="watchlistName" required />
                            </div>
                            <div class="form-group">
                                <label for="watchlist-description">Description (optional)</label>
                                <textarea id="watchlist-description" name="watchlistDescription" rows="3"></textarea>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btn btn-secondary" data-action="close-watchlist-modal">Cancel</button>
                                <button type="submit" class="btn btn-primary" data-action="submit-watchlist-form">Create &amp; add service</button>
                            </div>
                            <p class="form-status" id="watchlist-form-status" aria-live="polite"></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-links" aria-label="Footer navigation">
                <a href="about.html" class="footer-link" title="About this status and uptime dashboard">About</a>
                <a href="help.html" class="footer-link" title="Help articles and usage documentation">Help &amp; Docs</a>
                <a href="watchlists.html" class="footer-link" title="Manage service watchlists">Watchlists</a>
                <a href="reports.html" class="footer-link" title="View and manage saved incident reports">Saved Reports</a>
                <a href="reliability.html" class="footer-link" title="Full list of services with reliability metrics">All Services (Reliability)</a>
            </div>
            <div class="footer-meta">
                <span class="footer-copy">&copy; <span data-year>2024</span> Status &amp; Uptime Dashboard</span>
            </div>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Update footer year
        var yearEl = document.querySelector('[data-year]');
        if (yearEl) {
            yearEl.textContent = new Date().getFullYear();
        }

        var urlParams = new URLSearchParams(window.location.search);
        var serviceId = urlParams.get('id');

        var routerEl = document.querySelector('[data-component="service-detail-router"]');
        var errorEl = document.getElementById('service-error');
        var tabNavEl = document.querySelector('[data-component="service-tab-switcher"]');
        var overviewTabPanel = document.querySelector('[data-tab-panel="overview"]');
        var performanceTabPanel = document.querySelector('[data-tab-panel="performance"]');
        var relatedLinksSection = document.querySelector('.service-related-links');

        var watchlistModalEl = document.querySelector('[data-component="watchlist-create-modal"]');
        var watchlistFormEl = document.getElementById('watchlist-form');
        var watchlistFormStatusEl = document.getElementById('watchlist-form-status');

        var state = {
            serviceId: serviceId,
            tab: urlParams.get('tab') === 'performance' ? 'performance' : 'overview',
            dateRangePreset: urlParams.get('dateRangePreset') || 'last_30_days',
            customStart: urlParams.get('customStart') || '',
            customEnd: urlParams.get('customEnd') || '',
            sortBy: urlParams.get('sortBy') || 'avg_response_time_ms',
            sortDirection: urlParams.get('sortDirection') || 'asc',
            selectedRegionId: urlParams.get('selectedRegionId') || '',
            preferredRegionMessage: ''
        };

        var overviewData = null;
        var performanceData = null;

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            var str = String(value);
            return str.replace(/[&<>\"]/g, function(ch) {
                switch (ch) {
                    case '&': return '&amp;';
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '"': return '&quot;';
                    default: return ch;
                }
            });
        }

        function showError(message) {
            if (!errorEl) return;
            errorEl.textContent = message;
            errorEl.hidden = false;
        }

        function clearError() {
            if (!errorEl) return;
            errorEl.textContent = '';
            errorEl.hidden = true;
        }

        function updateUrl(newParams) {
            var params = new URLSearchParams(window.location.search);
            Object.keys(newParams).forEach(function(key) {
                var value = newParams[key];
                if (value === undefined || value === null || value === '') {
                    params.delete(key);
                } else {
                    params.set(key, value);
                }
            });
            var newQuery = params.toString();
            var newUrl = window.location.pathname + (newQuery ? ('?' + newQuery) : '');
            window.history.replaceState({}, '', newUrl);
        }

        function formatDateRangePreset(preset) {
            var map = {
                last_24_hours: 'Last 24 hours',
                yesterday: 'Yesterday',
                last_7_days: 'Last 7 days',
                last_30_days: 'Last 30 days',
                last_90_days: 'Last 90 days',
                custom: 'Custom range'
            };
            return map[preset] || preset;
        }

        function describeStatus(status) {
            var map = {
                operational: 'Operational',
                degraded_performance: 'Degraded performance',
                partial_outage: 'Partial outage',
                major_outage: 'Major outage',
                maintenance: 'Under maintenance',
                unknown: 'Status unknown'
            };
            return map[status] || 'Status unknown';
        }

        function describeTagSource(source) {
            var map = {
                manual: 'Added manually by a user or administrator.',
                comparison_tool: 'Generated by the comparison tool based on relative performance.',
                incident: 'Derived from an incident record affecting this service.',
                alert_rule: 'Assigned automatically by an alert rule.',
                maintenance: 'Assigned due to a maintenance window configuration.',
                import: 'Imported from an external system or integration.'
            };
            return map[source] || 'Tag origin unknown.';
        }

        function formatDateTime(value) {
            if (!value) return '';
            var d = new Date(value);
            if (isNaN(d.getTime())) return '';
            return d.toLocaleString();
        }

        function formatDate(value) {
            if (!value) return '';
            var d = new Date(value);
            if (isNaN(d.getTime())) return '';
            return d.toLocaleDateString();
        }

        function switchToTab(tabName, updateUrlFlag) {
            if (!tabNavEl || !overviewTabPanel || !performanceTabPanel) return;

            state.tab = tabName === 'performance' ? 'performance' : 'overview';

            var overviewBtn = tabNavEl.querySelector('[data-tab="overview"]');
            var performanceBtn = tabNavEl.querySelector('[data-tab="performance"]');

            if (state.tab === 'overview') {
                if (overviewBtn) overviewBtn.classList.add('is-active');
                if (performanceBtn) performanceBtn.classList.remove('is-active');
                overviewTabPanel.hidden = false;
                overviewTabPanel.classList.add('is-active');
                performanceTabPanel.hidden = true;
                performanceTabPanel.classList.remove('is-active');
            } else {
                if (performanceBtn) performanceBtn.classList.add('is-active');
                if (overviewBtn) overviewBtn.classList.remove('is-active');
                performanceTabPanel.hidden = false;
                performanceTabPanel.classList.add('is-active');
                overviewTabPanel.hidden = true;
                overviewTabPanel.classList.remove('is-active');
                loadPerformance();
            }

            if (updateUrlFlag) {
                var tabParam = state.tab === 'performance' ? 'performance' : null;
                updateUrl({ tab: tabParam });
            }
        }

        function renderServiceHeader(container, overview) {
            if (!container) return;
            var service = (overview && overview.service) || {};
            var status = service.currentStatus || 'unknown';
            var statusLabel = describeStatus(status);
            var uptime = overview && typeof overview.latestStatusOverviewUptimePercent === 'number'
                ? overview.latestStatusOverviewUptimePercent.toFixed(3) + '%'
                : 'N/A';

            container.innerHTML = `
                <div class="service-header-main">
                    <div class="service-header-left">
                        <div class="service-status-chip status-${escapeHtml(status)}">
                            <span class="status-dot" aria-hidden="true"></span>
                            <span class="status-text">${escapeHtml(statusLabel)}</span>
                        </div>
                        <h1 class="service-title">${escapeHtml(service.name || 'Unnamed service')}</h1>
                        ${service.description ? `<p class="service-description">${escapeHtml(service.description)}</p>` : ''}
                        <div class="service-uptime-inline">
                            <span class="label">Uptime (overview period):</span>
                            <span class="value">${escapeHtml(uptime)}</span>
                        </div>
                    </div>
                    <div class="service-header-right">
                        <button type="button" class="btn btn-secondary" data-action="view-incidents">View incidents</button>
                        <button type="button" class="btn btn-secondary" data-action="view-maintenance">Maintenance windows</button>
                        <button type="button" class="btn btn-secondary" data-action="manage-alerts">Manage alerts</button>
                        <button type="button" class="btn btn-primary" data-action="compare-services">Compare with another service</button>
                    </div>
                </div>
            `;
        }

        function renderOverviewUptime(container, overview) {
            if (!container) return;
            var recentStats = (overview && overview.recentUptimeStats) || [];
            var primaryStat = null;
            for (var i = 0; i < recentStats.length; i++) {
                if (recentStats[i].dateRangePreset === 'last_30_days') {
                    primaryStat = recentStats[i];
                    break;
                }
            }
            if (!primaryStat && recentStats.length > 0) {
                primaryStat = recentStats[0];
            }
            var primaryPercent = primaryStat && typeof primaryStat.uptimePercent === 'number'
                ? primaryStat.uptimePercent.toFixed(3)
                : (overview && typeof overview.latestStatusOverviewUptimePercent === 'number'
                    ? overview.latestStatusOverviewUptimePercent.toFixed(3)
                    : null);

            var status = (overview && overview.service && overview.service.currentStatus) || 'unknown';
            var statusLabel = describeStatus(status);

            var listItems = '';
            if (recentStats.length === 0) {
                listItems = '<li class="uptime-stat-item">No recent uptime statistics available.</li>';
            } else {
                for (var j = 0; j < recentStats.length; j++) {
                    var stat = recentStats[j];
                    var label = formatDateRangePreset(stat.dateRangePreset);
                    var percentText = typeof stat.uptimePercent === 'number' ? stat.uptimePercent.toFixed(3) + '%' : 'N/A';
                    var downtimeText = typeof stat.totalDowntimeMinutes === 'number'
                        ? stat.totalDowntimeMinutes + ' min downtime'
                        : 'Downtime not available';
                    var incidentsText = typeof stat.totalIncidents === 'number'
                        ? stat.totalIncidents + ' incidents'
                        : '';
                    listItems += `
                        <li class="uptime-stat-item">
                            <span class="uptime-stat-label">${escapeHtml(label)}</span>
                            <span class="uptime-stat-value">${escapeHtml(percentText)}</span>
                            <span class="uptime-stat-meta">${escapeHtml(downtimeText)}${incidentsText ? ' · ' + escapeHtml(incidentsText) : ''}</span>
                        </li>
                    `;
                }
            }

            container.innerHTML = `
                <header class="card-header">
                    <h2 class="card-title">Uptime summary</h2>
                </header>
                <div class="card-body">
                    <div class="uptime-summary-main">
                        <div class="uptime-summary-primary">
                            <p class="uptime-label">${escapeHtml(statusLabel)}</p>
                            <p class="uptime-percent">${primaryPercent !== null ? escapeHtml(primaryPercent) + '%' : '--'}</p>
                        </div>
                        <div class="uptime-summary-secondary">
                            <ul class="uptime-stat-list">
                                ${listItems}
                            </ul>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderTagsPanel(container, overview) {
            if (!container) return;
            var tags = (overview && overview.tags) || [];
            var chipsHtml = '';
            if (tags.length === 0) {
                chipsHtml = '<p class="tags-empty">No tags are attached to this service.</p>';
            } else {
                for (var i = 0; i < tags.length; i++) {
                    var tag = tags[i];
                    chipsHtml += `
                        <button type="button" class="tag-chip" data-tag-source="${escapeHtml(tag.source)}" data-tag-label="${escapeHtml(tag.label)}" data-action="show-tag-source">
                            <span class="tag-label">${escapeHtml(tag.label)}</span>
                            <span class="tag-source-pill">${escapeHtml(tag.source)}</span>
                        </button>
                    `;
                }
            }

            container.innerHTML = `
                <header class="card-header">
                    <h2 class="card-title">Tags</h2>
                </header>
                <div class="card-body">
                    <div class="tag-chips-wrapper">
                        ${chipsHtml}
                    </div>
                    <p class="tag-source-explanation" data-populate="tag-source-explanation">Click a tag to see why it was added.</p>
                </div>
            `;
        }

        function renderWatchlistMembership(container, overview) {
            if (!container) return;
            var memberships = (overview && overview.watchlistMemberships) || [];
            var summaryText = '';
            var listHtml = '';

            if (memberships.length === 0) {
                summaryText = 'This service is not currently in any watchlists.';
                listHtml = '';
            } else {
                summaryText = 'This service is included in the following watchlists:';
                for (var i = 0; i < memberships.length; i++) {
                    var m = memberships[i];
                    var name = m.watchlist && m.watchlist.name ? m.watchlist.name : 'Untitled watchlist';
                    var addedAtText = m.addedAt ? formatDate(m.addedAt) : '';
                    listHtml += `
                        <li class="watchlist-item">
                            <span class="watchlist-name">${escapeHtml(name)}</span>
                            ${addedAtText ? `<span class="watchlist-added">Added ${escapeHtml(addedAtText)}</span>` : ''}
                        </li>
                    `;
                }
            }

            container.innerHTML = `
                <header class="card-header">
                    <h2 class="card-title">Watchlists</h2>
                </header>
                <div class="card-body">
                    <p class="watchlist-summary">${escapeHtml(summaryText)}</p>
                    ${listHtml ? `<ul class="watchlist-list">${listHtml}</ul>` : ''}
                    <div class="watchlist-actions">
                        <button type="button" class="btn btn-primary" data-action="open-watchlist-modal">Add to Watchlist</button>
                    </div>
                </div>
            `;
        }

        function renderPerformanceFilterBar(container, currentState) {
            if (!container) return;
            var preset = currentState.dateRangePreset || 'last_30_days';
            var customStart = currentState.customStart || '';
            var customEnd = currentState.customEnd || '';
            var sortBy = currentState.sortBy || 'avg_response_time_ms';
            var sortDirection = currentState.sortDirection || 'asc';

            container.innerHTML = `
                <header class="filter-header">
                    <h2 class="filter-title">Performance filters</h2>
                </header>
                <div class="filter-controls">
                    <div class="form-group">
                        <label for="filter-date-range">Date range</label>
                        <select id="filter-date-range" name="dateRangePreset" data-action="change-date-range-preset">
                            <option value="last_24_hours" ${preset === 'last_24_hours' ? 'selected' : ''}>Last 24 hours</option>
                            <option value="yesterday" ${preset === 'yesterday' ? 'selected' : ''}>Yesterday</option>
                            <option value="last_7_days" ${preset === 'last_7_days' ? 'selected' : ''}>Last 7 days</option>
                            <option value="last_30_days" ${preset === 'last_30_days' ? 'selected' : ''}>Last 30 days</option>
                            <option value="last_90_days" ${preset === 'last_90_days' ? 'selected' : ''}>Last 90 days</option>
                            <option value="custom" ${preset === 'custom' ? 'selected' : ''}>Custom range</option>
                        </select>
                    </div>
                    <div class="form-group custom-date-group" data-custom-range-group ${preset === 'custom' ? '' : 'hidden'}>
                        <label>Custom range</label>
                        <div class="custom-date-inputs">
                            <input type="datetime-local" id="filter-custom-start" name="customStart" value="${escapeHtml(customStart)}" />
                            <span class="range-separator">to</span>
                            <input type="datetime-local" id="filter-custom-end" name="customEnd" value="${escapeHtml(customEnd)}" />
                            <button type="button" class="btn btn-secondary" data-action="apply-custom-range">Apply</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="filter-sort-by">Sort by</label>
                        <select id="filter-sort-by" name="sortBy" data-action="change-sort-by">
                            <option value="avg_response_time_ms" ${sortBy === 'avg_response_time_ms' ? 'selected' : ''}>Average response time</option>
                            <option value="p95_response_time_ms" ${sortBy === 'p95_response_time_ms' ? 'selected' : ''}>p95 response time</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filter-sort-direction">Direction</label>
                        <select id="filter-sort-direction" name="sortDirection" data-action="change-sort-direction">
                            <option value="asc" ${sortDirection === 'asc' ? 'selected' : ''}>Ascending</option>
                            <option value="desc" ${sortDirection === 'desc' ? 'selected' : ''}>Descending</option>
                        </select>
                    </div>
                </div>
            `;
        }

        function renderPerformanceDateRangeSummary(container, perf, preset) {
            if (!container) return;
            var text = '';
            if (!perf || !perf.dateRange) {
                text = 'Showing performance for the selected period.';
            } else {
                var dr = perf.dateRange;
                var label = formatDateRangePreset(dr.dateRangePreset || preset || 'last_30_days');
                var startText = formatDateTime(dr.periodStart);
                var endText = formatDateTime(dr.periodEnd);
                if (startText && endText) {
                    text = 'Showing performance for ' + escapeHtml(label) + ' (' + escapeHtml(startText) + ' to ' + escapeHtml(endText) + ').';
                } else {
                    text = 'Showing performance for ' + escapeHtml(label) + '.';
                }
            }
            container.innerHTML = `<p class="date-range-summary-text">${escapeHtml(text)}</p>`;
        }

        function renderPreferredRegionForm(container, overview, perf, currentState) {
            if (!container) return;
            var currentPreferredRegion = overview && overview.currentPreferredRegion && overview.currentPreferredRegion.region;
            var currentPreferredId = currentPreferredRegion ? currentPreferredRegion.id : '';
            var selectedRegionId = currentState.selectedRegionId || currentPreferredId || '';

            var availableRegions = [];
            // Try regions from localStorage first, then fall back to performance data
            try {
                var stored = JSON.parse(localStorage.getItem('regions') || '[]');
                if (stored && stored.length) {
                    for (var i = 0; i < stored.length; i++) {
                        availableRegions.push(stored[i]);
                    }
                }
            } catch (e) {
                // ignore JSON errors
            }
            if ((!availableRegions || availableRegions.length === 0) && perf && perf.rows) {
                var seen = {};
                for (var j = 0; j < perf.rows.length; j++) {
                    var row = perf.rows[j];
                    if (row && row.region && row.region.id && !seen[row.region.id]) {
                        availableRegions.push(row.region);
                        seen[row.region.id] = true;
                    }
                }
            }

            var optionsHtml = '<option value="">Select region</option>';
            for (var k = 0; k < availableRegions.length; k++) {
                var r = availableRegions[k];
                var isSelected = selectedRegionId && r.id === selectedRegionId;
                optionsHtml += `
                    <option value="${escapeHtml(r.id)}" ${isSelected ? 'selected' : ''}>${escapeHtml(r.name || r.code || r.id)}</option>
                `;
            }

            var descriptionText = '';
            if (currentPreferredRegion) {
                var setAt = overview && overview.currentPreferredRegion && overview.currentPreferredRegion.setAsPreferredAt
                    ? formatDateTime(overview.currentPreferredRegion.setAsPreferredAt)
                    : '';
                descriptionText = 'Current preferred region: ' + escapeHtml(currentPreferredRegion.name || currentPreferredRegion.code || currentPreferredRegion.id) + (setAt ? ' (set ' + escapeHtml(setAt) + ')' : '') + '.';
            } else {
                descriptionText = 'No preferred region is currently set for this service.';
            }

            var btnDisabled = selectedRegionId ? '' : 'disabled';
            var messageHtml = currentState.preferredRegionMessage ? `<p class="preferred-region-status">${escapeHtml(currentState.preferredRegionMessage)}</p>` : '';

            container.innerHTML = `
                <header class="card-header">
                    <h2 class="card-title">Preferred region</h2>
                </header>
                <div class="card-body">
                    <p class="preferred-region-description">${escapeHtml(descriptionText)}</p>
                    <div class="preferred-region-controls">
                        <div class="form-group">
                            <label for="preferred-region-select">Region</label>
                            <select id="preferred-region-select" name="preferredRegionId" data-action="change-preferred-region-select">
                                ${optionsHtml}
                            </select>
                        </div>
                        <button type="button" class="btn btn-primary" data-action="set-preferred-region" ${btnDisabled}>Set as preferred region</button>
                    </div>
                    ${messageHtml}
                </div>
            `;
        }

        function renderPerformanceRegionTable(container, perf, currentState, overview) {
            if (!container) return;

            var rows = (perf && perf.rows) || [];
            var currentPreferredRegion = overview && overview.currentPreferredRegion && overview.currentPreferredRegion.region;
            var preferredId = currentPreferredRegion ? currentPreferredRegion.id : '';
            var selectedId = currentState.selectedRegionId || '';

            var bodyHtml = '';
            if (rows.length === 0) {
                bodyHtml = '<tr><td colspan="5">No region performance data available for this period.</td></tr>';
            } else {
                for (var i = 0; i < rows.length; i++) {
                    var row = rows[i];
                    var region = row.region || {};
                    var perfRow = row.performance || {};
                    var isPreferred = !!row.isPreferred || (preferredId && region.id === preferredId);
                    var isSelected = selectedId && region.id === selectedId;

                    var avg = typeof perfRow.avgResponseTimeMs === 'number' ? perfRow.avgResponseTimeMs.toFixed(1) : 'N/A';
                    var p95 = typeof perfRow.p95ResponseTimeMs === 'number' ? perfRow.p95ResponseTimeMs.toFixed(1) : 'N/A';
                    var req = typeof perfRow.requestCount === 'number' ? perfRow.requestCount.toLocaleString() : 'N/A';

                    bodyHtml += `
                        <tr data-region-id="${escapeHtml(region.id || '')}" class="region-row${isSelected ? ' is-selected' : ''}">
                            <td class="cell-region-name">${escapeHtml(region.name || region.code || region.id || 'Unknown region')}</td>
                            <td class="cell-avg">${escapeHtml(avg)}</td>
                            <td class="cell-p95">${escapeHtml(p95)}</td>
                            <td class="cell-requests">${escapeHtml(req)}</td>
                            <td class="cell-preferred">${isPreferred ? '<span class="preferred-badge">Preferred</span>' : ''}</td>
                        </tr>
                    `;
                }
            }

            var sortBy = currentState.sortBy || 'avg_response_time_ms';
            var sortDir = currentState.sortDirection || 'asc';
            var avgSortIndicator = sortBy === 'avg_response_time_ms' ? (sortDir === 'asc' ? '▲' : '▼') : '';
            var p95SortIndicator = sortBy === 'p95_response_time_ms' ? (sortDir === 'asc' ? '▲' : '▼') : '';

            container.innerHTML = `
                <header class="card-header">
                    <h2 class="card-title">Region performance</h2>
                </header>
                <div class="card-body">
                    <div class="table-wrapper">
                        <table class="table region-performance-table">
                            <thead>
                                <tr>
                                    <th scope="col">Region</th>
                                    <th scope="col" data-action="sort-column" data-sort-field="avg_response_time_ms">
                                        Avg response (ms)
                                        <span class="sort-indicator" data-sort-indicator="avg_response_time_ms">${escapeHtml(avgSortIndicator)}</span>
                                    </th>
                                    <th scope="col" data-action="sort-column" data-sort-field="p95_response_time_ms">
                                        p95 (ms)
                                        <span class="sort-indicator" data-sort-indicator="p95_response_time_ms">${escapeHtml(p95SortIndicator)}</span>
                                    </th>
                                    <th scope="col">Requests</th>
                                    <th scope="col">Preferred</th>
                                </tr>
                            </thead>
                            <tbody id="region-table-body" data-populate="region-rows">
                                ${bodyHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function loadOverview() {
            if (!state.serviceId) return;
            clearError();
            try {
                overviewData = WebsiteSDK.getServiceOverview(state.serviceId);
                var headerContainer = document.querySelector('[data-populate="service-header"]');
                var uptimeContainer = document.querySelector('[data-populate="overview-uptime-summary"]');
                var tagsContainer = document.querySelector('[data-populate="overview-tags-panel"]');
                var watchlistContainer = document.querySelector('[data-populate="overview-watchlist-membership"]');

                renderServiceHeader(headerContainer, overviewData);
                renderOverviewUptime(uptimeContainer, overviewData);
                renderTagsPanel(tagsContainer, overviewData);
                renderWatchlistMembership(watchlistContainer, overviewData);
            } catch (e) {
                console.error(e);
                showError('Unable to load service overview.');
            }
        }

        function loadPerformance() {
            if (!state.serviceId) return;
            clearError();
            try {
                var dateRangePreset = state.dateRangePreset || 'last_30_days';
                var customStart = state.customStart || undefined;
                var customEnd = state.customEnd || undefined;
                var sortBy = state.sortBy || undefined;
                var sortDirection = state.sortDirection || undefined;

                performanceData = WebsiteSDK.getServicePerformanceByRegion(state.serviceId, dateRangePreset, customStart, customEnd, sortBy, sortDirection);

                var filterContainer = document.querySelector('[data-populate="performance-filter-bar"]');
                var summaryContainer = document.querySelector('[data-populate="performance-date-range-summary"]');
                var preferredRegionContainer = document.querySelector('[data-populate="preferred-region-form"]');
                var tableContainer = document.querySelector('[data-populate="performance-region-table"]');

                renderPerformanceFilterBar(filterContainer, state);
                renderPerformanceDateRangeSummary(summaryContainer, performanceData, state.dateRangePreset);
                renderPreferredRegionForm(preferredRegionContainer, overviewData, performanceData, state);
                renderPerformanceRegionTable(tableContainer, performanceData, state, overviewData);
            } catch (e) {
                console.error(e);
                showError('Unable to load performance data for this service.');
            }
        }

        function openWatchlistModal() {
            if (!watchlistModalEl) return;
            watchlistModalEl.hidden = false;
            if (watchlistFormStatusEl) {
                watchlistFormStatusEl.textContent = '';
            }
            var nameInput = document.getElementById('watchlist-name');
            var descInput = document.getElementById('watchlist-description');
            if (nameInput) nameInput.value = '';
            if (descInput) descInput.value = '';
            if (nameInput) {
                nameInput.focus();
            }
        }

        function closeWatchlistModal() {
            if (!watchlistModalEl) return;
            watchlistModalEl.hidden = true;
        }

        function handleWatchlistFormSubmit(event) {
            event.preventDefault();
            if (!state.serviceId) return;
            if (!watchlistFormEl) return;

            var nameInput = document.getElementById('watchlist-name');
            var descInput = document.getElementById('watchlist-description');
            var name = nameInput ? nameInput.value.trim() : '';
            var desc = descInput ? descInput.value.trim() : '';

            if (!name) {
                if (watchlistFormStatusEl) {
                    watchlistFormStatusEl.textContent = 'Please enter a watchlist name.';
                }
                return;
            }

            try {
                var result = WebsiteSDK.addServiceToNewWatchlist(state.serviceId, name, desc);
                if (!result || !result.success) {
                    if (watchlistFormStatusEl) {
                        var msg = result && result.message ? result.message : 'Unable to create watchlist.';
                        watchlistFormStatusEl.textContent = msg;
                    }
                    return;
                }

                overviewData = overviewData || {};
                if (!overviewData.watchlistMemberships) {
                    overviewData.watchlistMemberships = [];
                }
                var newMembership = {
                    watchlist: result.watchlist,
                    addedAt: result.watchlistItem && result.watchlistItem.addedAt ? result.watchlistItem.addedAt : new Date().toISOString()
                };
                overviewData.watchlistMemberships.push(newMembership);

                var watchlistContainer = document.querySelector('[data-populate="overview-watchlist-membership"]');
                renderWatchlistMembership(watchlistContainer, overviewData);

                closeWatchlistModal();
            } catch (e) {
                console.error(e);
                if (watchlistFormStatusEl) {
                    watchlistFormStatusEl.textContent = 'Error creating watchlist. Please try again.';
                }
            }
        }

        function setSelectedRegion(regionId) {
            state.selectedRegionId = regionId || '';
            updateUrl({ selectedRegionId: state.selectedRegionId || null });

            var tableBody = document.getElementById('region-table-body');
            if (tableBody) {
                var rows = tableBody.querySelectorAll('tr[data-region-id]');
                for (var i = 0; i < rows.length; i++) {
                    var row = rows[i];
                    if (row.getAttribute('data-region-id') === state.selectedRegionId) {
                        row.classList.add('is-selected');
                    } else {
                        row.classList.remove('is-selected');
                    }
                }
            }

            var preferredSelect = document.getElementById('preferred-region-select');
            if (preferredSelect) {
                preferredSelect.value = state.selectedRegionId || '';
            }

            var btn = document.querySelector('[data-action="set-preferred-region"]');
            if (btn) {
                btn.disabled = !state.selectedRegionId;
            }
        }

        function handleSetPreferredRegion() {
            if (!state.serviceId || !state.selectedRegionId) return;
            try {
                var result = WebsiteSDK.setServicePreferredRegion(state.serviceId, state.selectedRegionId);
                if (!result || !result.success) {
                    state.preferredRegionMessage = 'Unable to update preferred region.';
                } else {
                    state.preferredRegionMessage = 'Preferred region updated.';
                }
                // Refresh overview and performance to reflect new preference
                loadOverview();
                loadPerformance();
            } catch (e) {
                console.error(e);
                state.preferredRegionMessage = 'Error updating preferred region.';
                loadPerformance();
            }
        }

        function handleSortByField(field) {
            if (!field) return;
            if (state.sortBy === field) {
                state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                state.sortBy = field;
                state.sortDirection = 'asc';
            }
            updateUrl({ sortBy: state.sortBy, sortDirection: state.sortDirection });
            loadPerformance();
        }

        function handleTagSourceClick(target) {
            var source = target.getAttribute('data-tag-source');
            var label = target.getAttribute('data-tag-label') || '';
            var explanation = describeTagSource(source);
            var tagsPanel = document.querySelector('[data-populate="overview-tags-panel"]');
            if (!tagsPanel) return;
            var explanationEl = tagsPanel.querySelector('.tag-source-explanation');
            if (explanationEl) {
                var text = (label ? ('Tag "' + label + '": ') : '') + explanation;
                explanationEl.textContent = text;
            }
        }

        function initGlobalActions() {
            document.body.addEventListener('click', function(event) {
                var actionEl = event.target.closest('[data-action]');
                if (!actionEl) return;
                var action = actionEl.getAttribute('data-action');

                if (action === 'tab-overview') {
                    event.preventDefault();
                    switchToTab('overview', true);
                } else if (action === 'tab-performance') {
                    event.preventDefault();
                    switchToTab('performance', true);
                } else if (action === 'view-incidents') {
                    event.preventDefault();
                    if (!state.serviceId) return;
                    window.location.href = 'incidents.html?serviceId=' + encodeURIComponent(state.serviceId);
                } else if (action === 'view-maintenance') {
                    event.preventDefault();
                    if (!state.serviceId) return;
                    window.location.href = 'maintenance.html?serviceId=' + encodeURIComponent(state.serviceId);
                } else if (action === 'manage-alerts') {
                    event.preventDefault();
                    if (!state.serviceId) return;
                    window.location.href = 'alerts.html?serviceId=' + encodeURIComponent(state.serviceId);
                } else if (action === 'compare-services') {
                    event.preventDefault();
                    if (!state.serviceId) return;
                    window.location.href = 'compare_services.html?primaryServiceId=' + encodeURIComponent(state.serviceId);
                } else if (action === 'open-watchlist-modal') {
                    event.preventDefault();
                    openWatchlistModal();
                } else if (action === 'close-watchlist-modal') {
                    event.preventDefault();
                    closeWatchlistModal();
                } else if (action === 'apply-custom-range') {
                    event.preventDefault();
                    var filterContainer = document.querySelector('[data-populate="performance-filter-bar"]');
                    if (!filterContainer) return;
                    var startInput = filterContainer.querySelector('#filter-custom-start');
                    var endInput = filterContainer.querySelector('#filter-custom-end');
                    var startVal = startInput ? startInput.value : '';
                    var endVal = endInput ? endInput.value : '';
                    if (!startVal || !endVal) {
                        showError('Please select both start and end dates for the custom range.');
                        return;
                    }
                    clearError();
                    state.dateRangePreset = 'custom';
                    state.customStart = startVal;
                    state.customEnd = endVal;
                    updateUrl({ dateRangePreset: state.dateRangePreset, customStart: state.customStart, customEnd: state.customEnd });
                    loadPerformance();
                } else if (action === 'set-preferred-region') {
                    event.preventDefault();
                    handleSetPreferredRegion();
                } else if (action === 'sort-column') {
                    event.preventDefault();
                    var field = actionEl.getAttribute('data-sort-field');
                    handleSortByField(field);
                } else if (action === 'show-tag-source') {
                    event.preventDefault();
                    handleTagSourceClick(actionEl);
                }
            });

            document.body.addEventListener('change', function(event) {
                var target = event.target;
                if (!target || !target.getAttribute) return;
                var action = target.getAttribute('data-action');
                if (!action) return;

                if (action === 'change-date-range-preset') {
                    var value = target.value || 'last_30_days';
                    state.dateRangePreset = value;
                    if (value !== 'custom') {
                        state.customStart = '';
                        state.customEnd = '';
                        updateUrl({ dateRangePreset: state.dateRangePreset, customStart: null, customEnd: null });
                        loadPerformance();
                    } else {
                        updateUrl({ dateRangePreset: state.dateRangePreset });
                        var filterContainer = document.querySelector('[data-populate="performance-filter-bar"]');
                        renderPerformanceFilterBar(filterContainer, state);
                    }
                } else if (action === 'change-sort-by') {
                    state.sortBy = target.value || 'avg_response_time_ms';
                    updateUrl({ sortBy: state.sortBy, sortDirection: state.sortDirection });
                    loadPerformance();
                } else if (action === 'change-sort-direction') {
                    state.sortDirection = target.value || 'asc';
                    updateUrl({ sortBy: state.sortBy, sortDirection: state.sortDirection });
                    loadPerformance();
                } else if (action === 'change-preferred-region-select') {
                    var regionId = target.value || '';
                    setSelectedRegion(regionId);
                }
            });

            if (watchlistFormEl) {
                watchlistFormEl.addEventListener('submit', handleWatchlistFormSubmit);
            }

            if (watchlistModalEl) {
                watchlistModalEl.addEventListener('click', function(event) {
                    if (event.target === watchlistModalEl) {
                        closeWatchlistModal();
                    }
                });
            }

            document.body.addEventListener('click', function(event) {
                var tableBody = document.getElementById('region-table-body');
                if (!tableBody) return;
                if (!tableBody.contains(event.target)) return;
                var row = event.target.closest('tr[data-region-id]');
                if (!row) return;
                var regionId = row.getAttribute('data-region-id');
                if (!regionId) return;
                setSelectedRegion(regionId);
            });
        }

        function initTabs() {
            if (!tabNavEl) return;
            switchToTab(state.tab, false);
        }

        if (!state.serviceId) {
            if (routerEl) {
                var headerContainer = document.querySelector('[data-populate="service-header"]');
                if (headerContainer) {
                    headerContainer.innerHTML = '';
                }
                if (tabNavEl) {
                    tabNavEl.style.display = 'none';
                }
                if (overviewTabPanel) {
                    overviewTabPanel.style.display = 'none';
                }
                if (performanceTabPanel) {
                    performanceTabPanel.style.display = 'none';
                }
                if (relatedLinksSection) {
                    relatedLinksSection.style.display = 'none';
                }
            }
            showError('No service selected. Open this page with ?id=SERVICE_ID in the URL.');
            return;
        }

        initGlobalActions();
        loadOverview();
        initTabs();

        if (state.tab === 'performance') {
            loadPerformance();
        }
    });
    </script>
</body>
</html>
