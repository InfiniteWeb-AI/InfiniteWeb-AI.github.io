<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results | Status &amp; Uptime Dashboard</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500&amp;display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="search.css" />
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="brand" aria-label="Service status homepage">
                <div class="brand-mark" aria-hidden="true"></div>
                <div class="brand-text">
                    <span class="brand-title-line1">Service</span>
                    <span class="brand-title-line2">Status</span>
                </div>
            </a>

            <nav class="primary-nav" aria-label="Main navigation">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link is-active" title="Service status homepage and quick overview">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="status_overview.html" class="nav-link" title="Current status and uptime for all services">Status Overview</a>
                    </li>
                    <li class="nav-item">
                        <a href="reliability.html" class="nav-link" title="Historical uptime and reliability by service">Reliability</a>
                    </li>
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link" title="Customizable uptime and performance dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="compare_services.html" class="nav-link" title="Compare reliability and downtime between two services">Compare Services</a>
                    </li>
                    <li class="nav-item">
                        <a href="incidents.html" class="nav-link" title="Incident history, filters, and saved reports">Incidents</a>
                    </li>
                    <li class="nav-item">
                        <a href="maintenance.html" class="nav-link" title="View and schedule maintenance windows">Maintenance</a>
                    </li>
                    <li class="nav-item">
                        <a href="alerts.html" class="nav-link nav-link--button" title="Configure and manage alert rules">Alerts</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-main" tabindex="-1">
        <div class="container search-page" data-component="search-results-page-controller">
            <!-- Search query form -->
            <section class="search-page-form-section">
                <form id="searchForm" class="search-form" data-component="search-query-form" data-action="search-form" novalidate>
                    <div class="search-form-row">
                        <div class="form-group search-form-query">
                            <label for="searchQueryInput" class="form-label">Search services</label>
                            <input
                                type="search"
                                id="searchQueryInput"
                                name="query"
                                class="form-control"
                                placeholder="Search by service name, category, or keyword"
                                autocomplete="off"
                            />
                        </div>
                        <div class="form-group search-form-category">
                            <label for="searchCategorySelect" class="form-label">Category</label>
                            <select
                                id="searchCategorySelect"
                                name="categoryId"
                                class="form-control"
                                aria-label="Filter results by category"
                            >
                                <option value="">All categories</option>
                                <!-- Options populated from ServiceCategory via localStorage -->
                            </select>
                        </div>
                        <div class="form-group search-form-submit">
                            <label for="searchSubmitButton" class="form-label form-label--invisible">Submit search</label>
                            <button id="searchSubmitButton" type="submit" class="btn btn-primary">
                                Search
                            </button>
                        </div>
                    </div>
                </form>
            </section>

            <!-- Search summary bar -->
            <section
                class="search-summary-section"
                aria-live="polite"
                data-component="search-summary-bar"
            >
                <!-- Populated by JavaScript -->
            </section>

            <!-- Empty / loading / error state -->
            <section
                class="search-state-section"
                data-component="search-empty-or-error-state"
                data-populate="search-empty-or-error-state"
                aria-live="polite"
            >
                <!-- Populated by JavaScript -->
            </section>

            <!-- Results list + pagination (hidden when empty/error/no-query) -->
            <section class="search-results-section">
                <div
                    class="search-results-list"
                    data-component="search-results-list"
                    data-populate="search-results"
                    aria-live="polite"
                >
                    <!-- Service result cards populated by JavaScript -->
                </div>

                <nav
                    class="search-pagination"
                    data-component="search-pagination-controls"
                    data-populate="search-pagination"
                    aria-label="Search results pages"
                >
                    <!-- Pagination controls populated by JavaScript -->
                </nav>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-links" aria-label="Footer navigation">
                <a href="about.html" class="footer-link" title="About this status and uptime dashboard">About</a>
                <a href="help.html" class="footer-link" title="Help articles and usage documentation">Help &amp; Docs</a>
                <a href="watchlists.html" class="footer-link" title="Manage service watchlists">Watchlists</a>
                <a href="reports.html" class="footer-link" title="View and manage saved incident reports">Saved Reports</a>
                <a href="reliability.html" class="footer-link" title="Full list of services with reliability metrics">All Services (Reliability)</a>
            </div>
            <div class="footer-meta">
                <span class="footer-copy">&copy; <span data-year>2024</span> Status &amp; Uptime Dashboard</span>
            </div>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // ----- Page state -----
        const state = {
            currentQuery: '',
            currentCategoryId: '',
            limit: null,
            offset: 0,
            totalCount: 0,
            results: [],
            loading: false,
            error: null,
            categories: [],
            categoryMap: {}
        };

        // ----- Element references -----
        const controllerEl = document.querySelector('[data-component="search-results-page-controller"]');
        const queryFormEl = document.getElementById('searchForm');
        const queryInputEl = document.getElementById('searchQueryInput');
        const categorySelectEl = document.getElementById('searchCategorySelect');
        const summaryBarEl = document.querySelector('[data-component="search-summary-bar"]');
        const resultsListEl = document.querySelector('[data-component="search-results-list"]');
        const paginationEl = document.querySelector('[data-component="search-pagination-controls"]');
        const stateIndicatorEl = document.querySelector('[data-component="search-empty-or-error-state"]');

        // ----- Utility functions -----
        function parseIntegerOrNull(value) {
            if (value === null || value === undefined || value === '') return null;
            const n = parseInt(value, 10);
            return Number.isNaN(n) ? null : n;
        }

        function getUrlSearchParams() {
            return new URLSearchParams(window.location.search);
        }

        function updateUrlSearchParams(updates) {
            const searchParams = getUrlSearchParams();

            if (Object.prototype.hasOwnProperty.call(updates, 'query')) {
                const q = updates.query ? updates.query.trim() : '';
                if (q) {
                    searchParams.set('query', q);
                } else {
                    searchParams.delete('query');
                }
            }

            if (Object.prototype.hasOwnProperty.call(updates, 'categoryId')) {
                const c = updates.categoryId ? String(updates.categoryId) : '';
                if (c) {
                    searchParams.set('categoryId', c);
                } else {
                    searchParams.delete('categoryId');
                }
            }

            if (Object.prototype.hasOwnProperty.call(updates, 'limit')) {
                const lim = updates.limit;
                if (lim !== null && lim !== undefined && lim !== '') {
                    searchParams.set('limit', String(lim));
                } else {
                    searchParams.delete('limit');
                }
            }

            if (Object.prototype.hasOwnProperty.call(updates, 'offset')) {
                const off = updates.offset;
                if (off !== null && off !== undefined && off !== '') {
                    searchParams.set('offset', String(off));
                } else {
                    searchParams.delete('offset');
                }
            }

            const newSearch = searchParams.toString();
            const newUrl = window.location.pathname + (newSearch ? '?' + newSearch : '');
            window.history.pushState({}, '', newUrl);
        }

        function formatStatusLabel(status) {
            switch (status) {
                case 'operational':
                    return 'Operational';
                case 'degraded_performance':
                    return 'Degraded performance';
                case 'partial_outage':
                    return 'Partial outage';
                case 'major_outage':
                    return 'Major outage';
                case 'maintenance':
                    return 'Maintenance';
                case 'unknown':
                    return 'Status unknown';
                default:
                    return 'Status unknown';
            }
        }

        function formatPercent(value) {
            if (value === null || value === undefined || Number.isNaN(value)) return null;
            const n = typeof value === 'number' ? value : Number(value);
            if (Number.isNaN(n)) return null;
            return n.toFixed(2) + '%';
        }

        function getCategoryNameById(id) {
            if (!id) return '';
            if (state.categoryMap && Object.prototype.hasOwnProperty.call(state.categoryMap, id)) {
                return state.categoryMap[id];
            }
            return id;
        }

        // ----- Rendering -----
        function renderSearchSummary(container, currentState) {
            if (!container) return;
            container.innerHTML = '';

            const hasQuery = !!currentState.currentQuery;
            const wrapper = document.createElement('div');
            wrapper.className = 'search-summary-inner';

            const left = document.createElement('div');
            left.className = 'search-summary-left';

            const right = document.createElement('div');
            right.className = 'search-summary-right';

            if (!hasQuery) {
                const title = document.createElement('p');
                title.className = 'search-summary-text';
                title.textContent = 'Start by searching for a service above.';
                left.appendChild(title);
            } else {
                const title = document.createElement('p');
                title.className = 'search-summary-text';

                const count = currentState.totalCount || 0;
                const countSpan = document.createElement('span');
                countSpan.className = 'search-summary-count';
                countSpan.textContent = count + (count === 1 ? ' result' : ' results');

                const forSpan = document.createElement('span');
                forSpan.className = 'search-summary-query';
                forSpan.textContent = ' for "' + currentState.currentQuery + '"';

                title.appendChild(countSpan);
                title.appendChild(document.createTextNode(' '));
                title.appendChild(forSpan);

                const categoryName = getCategoryNameById(currentState.currentCategoryId);
                if (currentState.currentCategoryId && categoryName) {
                    const inSpan = document.createElement('span');
                    inSpan.className = 'search-summary-category';
                    inSpan.textContent = ' in ' + categoryName;
                    title.appendChild(inSpan);
                }

                left.appendChild(title);
            }

            if (currentState.currentCategoryId) {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'filter-chip filter-chip--active';
                chip.setAttribute('data-action', 'clear-category-filter');
                chip.textContent = 'Clear category filter';
                right.appendChild(chip);
            }

            wrapper.appendChild(left);
            wrapper.appendChild(right);
            container.appendChild(wrapper);
        }

        function renderSearchResults(container, currentState) {
            if (!container) return;
            container.innerHTML = '';

            const results = Array.isArray(currentState.results) ? currentState.results : [];
            results.forEach(function(item) {
                if (!item || !item.service) return;
                const service = item.service;

                const article = document.createElement('article');
                article.className = 'card service-result-item';
                article.setAttribute('data-component', 'service-result-item');

                const link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.className = 'service-result-link';
                link.setAttribute('data-action', 'open-service');
                link.setAttribute('data-service-id', service.id);

                const main = document.createElement('div');
                main.className = 'service-result-main';

                const title = document.createElement('h2');
                title.className = 'service-result-title';
                title.textContent = service.name || 'Unnamed service';

                const meta = document.createElement('p');
                meta.className = 'service-result-meta';

                const parts = [];
                const categoryName = item.categoryName || getCategoryNameById(service.categoryId);
                if (categoryName) {
                    parts.push(categoryName);
                }

                if (service.statusOverviewUptimePercent !== null && service.statusOverviewUptimePercent !== undefined) {
                    const pct = formatPercent(service.statusOverviewUptimePercent);
                    if (pct) {
                        parts.push('30-day uptime ' + pct);
                    }
                }

                if (parts.length > 0) {
                    meta.textContent = parts.join(' b7 ');
                }

                main.appendChild(title);
                if (parts.length > 0) {
                    main.appendChild(meta);
                }

                const statusContainer = document.createElement('div');
                statusContainer.className = 'service-result-status';

                const statusPill = document.createElement('span');
                const statusValue = service.currentStatus || 'unknown';
                statusPill.className = 'status-pill status-pill--' + statusValue;
                statusPill.textContent = formatStatusLabel(statusValue);

                statusContainer.appendChild(statusPill);

                if (item.uptimeSummary) {
                    const uptimeTextParts = [];
                    const last7 = formatPercent(item.uptimeSummary.last_7_days);
                    const last30 = formatPercent(item.uptimeSummary.last_30_days);
                    if (last7) {
                        uptimeTextParts.push('7d ' + last7);
                    }
                    if (last30) {
                        uptimeTextParts.push('30d ' + last30);
                    }
                    if (uptimeTextParts.length > 0) {
                        const uptimeSpan = document.createElement('span');
                        uptimeSpan.className = 'service-result-uptime';
                        uptimeSpan.textContent = uptimeTextParts.join(' b7 ');
                        statusContainer.appendChild(uptimeSpan);
                    }
                }

                link.appendChild(main);
                link.appendChild(statusContainer);
                article.appendChild(link);
                container.appendChild(article);
            });
        }

        function renderPagination(container, currentState) {
            if (!container) return;
            container.innerHTML = '';

            const hasQuery = !!currentState.currentQuery;
            const limit = currentState.limit;
            const total = currentState.totalCount || 0;
            const offset = currentState.offset || 0;

            if (!hasQuery || !limit || total <= limit) {
                container.style.display = 'none';
                return;
            }

            const totalPages = Math.max(1, Math.ceil(total / limit));
            const currentPage = Math.min(totalPages, Math.max(1, Math.floor(offset / limit) + 1));

            const wrapper = document.createElement('div');
            wrapper.className = 'pagination-inner';

            const prevBtn = document.createElement('button');
            prevBtn.type = 'button';
            prevBtn.className = 'btn btn-secondary pagination-prev';
            prevBtn.setAttribute('data-action', 'page-prev');
            prevBtn.textContent = 'Previous';
            if (currentPage <= 1) {
                prevBtn.disabled = true;
            }

            const pagesContainer = document.createElement('div');
            pagesContainer.className = 'pagination-pages';

            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);

            for (let p = startPage; p <= endPage; p += 1) {
                const pageBtn = document.createElement('button');
                pageBtn.type = 'button';
                pageBtn.className = 'btn btn-secondary pagination-page';
                if (p === currentPage) {
                    pageBtn.className += ' is-active';
                    pageBtn.setAttribute('aria-current', 'page');
                }
                pageBtn.setAttribute('data-action', 'page-number');
                pageBtn.setAttribute('data-page', String(p));
                pageBtn.textContent = String(p);
                pagesContainer.appendChild(pageBtn);
            }

            const infoSpan = document.createElement('span');
            infoSpan.className = 'pagination-info';
            infoSpan.textContent = 'Page ' + currentPage + ' of ' + totalPages;

            const nextBtn = document.createElement('button');
            nextBtn.type = 'button';
            nextBtn.className = 'btn btn-secondary pagination-next';
            nextBtn.setAttribute('data-action', 'page-next');
            nextBtn.textContent = 'Next';
            if (currentPage >= totalPages) {
                nextBtn.disabled = true;
            }

            wrapper.appendChild(prevBtn);
            wrapper.appendChild(pagesContainer);
            wrapper.appendChild(infoSpan);
            wrapper.appendChild(nextBtn);
            container.appendChild(wrapper);
            container.style.display = '';
        }

        function renderEmptyOrErrorState(container, currentState) {
            if (!container) return;
            container.innerHTML = '';

            const block = document.createElement('div');
            block.className = 'search-state-inner';

            const title = document.createElement('p');
            title.className = 'search-state-title';

            const body = document.createElement('p');
            body.className = 'search-state-body';

            const hasQuery = !!currentState.currentQuery;

            if (currentState.loading) {
                title.textContent = 'Searching services, please wait...';
                body.textContent = '';
            } else if (currentState.error) {
                title.textContent = 'There was a problem running your search.';
                body.textContent = currentState.error;

                const retryBtn = document.createElement('button');
                retryBtn.type = 'button';
                retryBtn.className = 'btn btn-secondary search-state-retry';
                retryBtn.setAttribute('data-action', 'retry-search');
                retryBtn.textContent = 'Retry search';

                block.appendChild(title);
                block.appendChild(body);
                block.appendChild(retryBtn);
                container.appendChild(block);
                return;
            } else if (!hasQuery) {
                title.textContent = 'No search query yet.';
                body.textContent = 'Enter a search term above to find services by name, category, or status.';
            } else if (Array.isArray(currentState.results) && currentState.results.length === 0) {
                title.textContent = 'No services match your search.';
                body.textContent = 'Try adjusting your query or clearing filters to broaden the results.';
            } else {
                container.style.display = 'none';
                return;
            }

            block.appendChild(title);
            block.appendChild(body);
            container.appendChild(block);
            container.style.display = '';
        }

        function renderAll(currentState) {
            const hasQuery = !!currentState.currentQuery;

            renderSearchSummary(summaryBarEl, currentState);

            const showList = hasQuery && !currentState.loading && !currentState.error && Array.isArray(currentState.results) && currentState.results.length > 0;

            if (showList) {
                if (stateIndicatorEl) {
                    stateIndicatorEl.innerHTML = '';
                    stateIndicatorEl.style.display = 'none';
                }
                if (resultsListEl) {
                    resultsListEl.style.display = '';
                }
                renderSearchResults(resultsListEl, currentState);
                renderPagination(paginationEl, currentState);
            } else {
                if (resultsListEl) {
                    resultsListEl.innerHTML = '';
                    resultsListEl.style.display = 'none';
                }
                if (paginationEl) {
                    paginationEl.innerHTML = '';
                    paginationEl.style.display = 'none';
                }
                renderEmptyOrErrorState(stateIndicatorEl, currentState);
            }
        }

        // ----- Data loading -----
        function populateCategorySelectFromLocalStorage() {
            if (!categorySelectEl) return;

            let categories = [];
            try {
                const raw = window.localStorage.getItem('service_categories');
                const parsed = raw ? JSON.parse(raw) : [];
                if (Array.isArray(parsed)) {
                    categories = parsed;
                }
            } catch (e) {
                categories = [];
            }

            state.categories = categories;
            state.categoryMap = {};

            // Clear existing dynamic options (keep first "All categories")
            while (categorySelectEl.options.length > 1) {
                categorySelectEl.remove(1);
            }

            categories.forEach(function(cat) {
                if (!cat || !cat.id) return;
                const name = cat.name || cat.slug || cat.id;
                state.categoryMap[cat.id] = name;

                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = name;
                categorySelectEl.appendChild(option);
            });
        }

        function syncStateFromUrlAndSearch() {
            const params = getUrlSearchParams();

            const queryParam = params.get('query') || '';
            const categoryParam = params.get('categoryId') || '';
            const limitParam = params.get('limit');
            const offsetParam = params.get('offset');

            state.currentQuery = queryParam.trim();
            state.currentCategoryId = categoryParam || '';
            state.limit = parseIntegerOrNull(limitParam);
            state.offset = parseIntegerOrNull(offsetParam) || 0;
            state.error = null;

            if (queryInputEl) {
                queryInputEl.value = state.currentQuery;
            }
            if (categorySelectEl) {
                categorySelectEl.value = state.currentCategoryId;
            }

            syncHeaderSearchInput(state.currentQuery);

            if (!state.currentQuery) {
                state.results = [];
                state.totalCount = 0;
                state.loading = false;
                renderAll(state);
                return;
            }

            runSearch();
        }

        function runSearch() {
            const query = state.currentQuery;
            if (!query) {
                state.results = [];
                state.totalCount = 0;
                state.loading = false;
                renderAll(state);
                return;
            }

            state.loading = true;
            state.error = null;
            renderAll(state);

            try {
                let result;
                const hasCategory = !!state.currentCategoryId;

                if (state.limit !== null && state.limit !== undefined) {
                    const limit = state.limit;
                    const offset = state.offset || 0;
                    if (hasCategory) {
                        result = WebsiteSDK.searchServices(query, { categoryId: state.currentCategoryId }, limit, offset);
                    } else {
                        result = WebsiteSDK.searchServices(query, undefined, limit, offset);
                    }
                } else if (hasCategory) {
                    result = WebsiteSDK.searchServices(query, { categoryId: state.currentCategoryId });
                } else {
                    result = WebsiteSDK.searchServices(query);
                }

                const resultsArray = result && Array.isArray(result.results) ? result.results : [];
                state.results = resultsArray;
                state.totalCount = result && typeof result.totalCount === 'number' ? result.totalCount : resultsArray.length;
                state.error = null;
            } catch (e) {
                const message = e && e.message ? e.message : 'Unexpected error while searching.';
                state.results = [];
                state.totalCount = 0;
                state.error = message;
            }

            state.loading = false;
            renderAll(state);
        }

        // ----- Header search sync (if a global header search exists) -----
        function syncHeaderSearchInput(query) {
            const headerInput = document.querySelector('[data-role="header-search-input"]');
            if (headerInput) {
                headerInput.value = query || '';
            }
        }

        function bindHeaderSearchSubmitListener() {
            const headerForm = document.querySelector('[data-role="header-search-form"]');
            if (!headerForm) return;

            headerForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const headerInput = headerForm.querySelector('[data-role="header-search-input"]');
                const value = headerInput ? headerInput.value.trim() : '';
                const params = new URLSearchParams();
                if (value) {
                    params.set('query', value);
                }
                const newUrl = 'search.html' + (params.toString() ? '?' + params.toString() : '');
                window.location.href = newUrl;
            });
        }

        // ----- Event binding -----
        if (queryFormEl) {
            queryFormEl.addEventListener('submit', function(event) {
                event.preventDefault();
                const newQuery = queryInputEl ? queryInputEl.value.trim() : '';
                const newCategoryId = categorySelectEl ? (categorySelectEl.value || '') : '';

                updateUrlSearchParams({
                    query: newQuery,
                    categoryId: newCategoryId,
                    offset: 0
                });

                syncStateFromUrlAndSearch();
            });
        }

        if (categorySelectEl) {
            categorySelectEl.addEventListener('change', function() {
                const currentQuery = queryInputEl ? queryInputEl.value.trim() : '';
                const newCategoryId = categorySelectEl.value || '';

                updateUrlSearchParams({
                    query: currentQuery,
                    categoryId: newCategoryId,
                    offset: 0
                });

                syncStateFromUrlAndSearch();
            });
        }

        if (controllerEl) {
            controllerEl.addEventListener('click', function(event) {
                const target = event.target.closest('[data-action]');
                if (!target) return;

                const action = target.getAttribute('data-action');

                if (action === 'clear-category-filter') {
                    const currentQuery = queryInputEl ? queryInputEl.value.trim() : '';
                    updateUrlSearchParams({
                        query: currentQuery,
                        categoryId: '',
                        offset: 0
                    });
                    syncStateFromUrlAndSearch();
                } else if (action === 'retry-search') {
                    runSearch();
                } else if (action === 'open-service') {
                    const serviceId = target.getAttribute('data-service-id');
                    if (serviceId) {
                        window.location.href = 'service.html?id=' + encodeURIComponent(serviceId);
                    }
                } else if (action === 'page-prev') {
                    if (!state.limit) return;
                    const newOffset = Math.max(0, (state.offset || 0) - state.limit);
                    updateUrlSearchParams({ offset: newOffset });
                    syncStateFromUrlAndSearch();
                } else if (action === 'page-next') {
                    if (!state.limit) return;
                    const total = state.totalCount || 0;
                    const limit = state.limit;
                    const currentOffset = state.offset || 0;
                    const nextOffset = currentOffset + limit;
                    if (nextOffset >= total) return;
                    updateUrlSearchParams({ offset: nextOffset });
                    syncStateFromUrlAndSearch();
                } else if (action === 'page-number') {
                    if (!state.limit) return;
                    const pageStr = target.getAttribute('data-page');
                    const pageNum = parseIntegerOrNull(pageStr);
                    if (!pageNum || pageNum < 1) return;
                    const newOffset = (pageNum - 1) * state.limit;
                    updateUrlSearchParams({ offset: newOffset });
                    syncStateFromUrlAndSearch();
                }
            });
        }

        window.addEventListener('popstate', function() {
            syncStateFromUrlAndSearch();
        });

        // ----- Initialization -----
        populateCategorySelectFromLocalStorage();
        bindHeaderSearchSubmitListener();
        syncStateFromUrlAndSearch();

        // Footer year
        const yearSpan = document.querySelector('[data-year]');
        if (yearSpan) {
            yearSpan.textContent = String(new Date().getFullYear());
        }
    });
    </script>
</body>
</html>
