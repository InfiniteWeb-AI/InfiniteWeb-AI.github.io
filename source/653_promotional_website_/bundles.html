<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>SANROBEL, INC. &mdash; Anti-Aging Supplements</title>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='bundles.css'>
</head>
<body>
    <header class='site-header'>
        <div class='site-title-wrapper'>
            <h1 class='site-title'>SANROBEL, INC.</h1>
        </div>
        <nav class='primary-nav' aria-label='Primary navigation'>
            <a href='index.html'>Home</a>
            <a href='products.html'>Products</a>
            <a href='bundles.html'>Bundles</a>
            <a href='quiz.html'>Quiz</a>
            <a href='science.html?section=clinical_studies'>Science</a>
            <a href='blog.html?categoryId=anti_aging_tips'>Blog</a>
            <a href='contact.html'>Contact</a>
        </nav>
    </header>

    <main id='content' class='page-content' role='main'>
        <div class='bundles-page-root' data-component='bundles-page-root'>
            <div class='bundles-cart-summary-row'>
                <div class='bundles-cart-summary' data-component='header-cart-summary' data-populate='cart-summary'>
                    <p class='cart-summary-text' style='text-align: right;'>Cart: loading...</p>
                </div>
            </div>

            <section class='bundles-controls'>
                <div class='bundles-filter-bar' data-component='bundles-filter-bar' data-populate='bundle-filter-options' aria-label='Bundle filters'>
                    <!-- Filter controls injected by JavaScript -->
                </div>

                <div class='bundles-sort-control' data-component='bundles-sort-control' aria-label='Bundle sorting'>
                    <!-- Sort controls injected by JavaScript -->
                </div>
            </section>

            <hr class='bundles-grid-divider'>

            <section class='bundles-grid' data-component='bundles-grid' data-populate='bundles-list' aria-live='polite'>
                <p style='text-align: center;'>Loading bundles...</p>
            </section>
        </div>
    </main>

    <footer class='site-footer'>
        <hr class='footer-divider'>
        <nav class='footer-nav' aria-label='Footer navigation'>
            <p class='footer-links'>
                <a href='about.html'>About</a>
                <span class='footer-separator'>|</span>
                <a href='faq.html'>FAQ</a>
                <span class='footer-separator'>|</span>
                <a href='contact.html'>Contact Support</a>
                <span class='footer-separator'>|</span>
                <a href='science.html?section=clinical_studies'>Science  Clinical Studies</a>
                <span class='footer-separator'>|</span>
                <a href='policies.html'>Shipping &amp; Policies</a>
                <span class='footer-separator'>|</span>
                <a href='blog.html?categoryId=anti_aging_tips'>Blog: Anti-aging Tips</a>
                <span class='footer-separator'>|</span>
                <a href='blog.html?categoryId=product_launches'>Blog: Product Launches</a>
            </p>
        </nav>
        <p class='footer-copy'>&copy; <span class='footer-year'>2026</span> SANROBEL, INC. All rights reserved.</p>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      var boundActionElements = new WeakSet();

      var urlStateManager = {
        getStateFromUrl: function() {
          var params = new URLSearchParams(window.location.search);
          var supplyRaw = params.get('supplyMinMonths');
          var discountRaw = params.get('discountMin');
          var state = {
            priceRange: params.get('priceRange') || '',
            supplyMinMonths: supplyRaw ? parseInt(supplyRaw, 10) : null,
            discountMin: discountRaw ? parseInt(discountRaw, 10) : null,
            sort: params.get('sort') || ''
          };
          if (isNaN(state.supplyMinMonths)) {
            state.supplyMinMonths = null;
          }
          if (isNaN(state.discountMin)) {
            state.discountMin = null;
          }
          return state;
        },
        updateUrlWithState: function(partialState, options) {
          var params = new URLSearchParams(window.location.search);

          if (Object.prototype.hasOwnProperty.call(partialState, 'priceRange')) {
            var pr = partialState.priceRange;
            if (pr && String(pr).length > 0) {
              params.set('priceRange', pr);
            } else {
              params.delete('priceRange');
            }
          }

          if (Object.prototype.hasOwnProperty.call(partialState, 'supplyMinMonths')) {
            var sm = partialState.supplyMinMonths;
            if (sm && !isNaN(sm)) {
              params.set('supplyMinMonths', String(sm));
            } else {
              params.delete('supplyMinMonths');
            }
          }

          if (Object.prototype.hasOwnProperty.call(partialState, 'discountMin')) {
            var dm = partialState.discountMin;
            if (dm && !isNaN(dm)) {
              params.set('discountMin', String(dm));
            } else {
              params.delete('discountMin');
            }
          }

          if (Object.prototype.hasOwnProperty.call(partialState, 'sort')) {
            var s = partialState.sort;
            if (s && String(s).length > 0) {
              params.set('sort', s);
            } else {
              params.delete('sort');
            }
          }

          var newQuery = params.toString();
          var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '') + window.location.hash;
          var replace = options && options.replace;
          if (replace) {
            window.history.replaceState({}, '', newUrl);
          } else {
            window.history.pushState({}, '', newUrl);
          }
          pageController.onUrlParamChange();
        }
      };

      function formatCurrency(value) {
        var num = typeof value === 'number' ? value : parseFloat(value);
        if (!isFinite(num)) {
          return '$0.00';
        }
        return '$' + num.toFixed(2);
      }

      function buildPriceRangeIdFromLabel(label, index) {
        var base = (label || '').toLowerCase();
        base = base.replace(/[^a-z0-9]+/g, '_');
        base = base.replace(/^_+|_+$/g, '');
        if (!base) {
          base = 'range_' + index;
        }
        return base;
      }

      function renderCartSummary(container, summary) {
        container.innerHTML = '';
        var wrapper = document.createElement('p');
        wrapper.className = 'cart-summary-text';
        wrapper.style.textAlign = 'right';

        if (!summary) {
          wrapper.textContent = 'Cart: loading...';
          container.appendChild(wrapper);
          return;
        }

        var items = Array.isArray(summary.items_detailed) ? summary.items_detailed : [];
        var itemCount = 0;
        items.forEach(function(item) {
          if (item && item.cart_item && typeof item.cart_item.quantity === 'number') {
            itemCount += item.cart_item.quantity;
          }
        });

        var subtotal = typeof summary.subtotal === 'number' ? summary.subtotal : 0;
        var parts = [];
        parts.push('Cart: ' + itemCount + (itemCount === 1 ? ' item' : ' items'));
        parts.push('Subtotal: ' + formatCurrency(subtotal));

        wrapper.textContent = parts.join(' | ') + ' ';

        var viewLink = document.createElement('a');
        viewLink.href = 'javascript:void(0)';
        viewLink.setAttribute('data-action', 'cart-view-click');
        viewLink.textContent = 'View cart';
        wrapper.appendChild(viewLink);

        container.appendChild(wrapper);
      }

      function renderFilterBar(container, filterOptions, priceRangeOptions, state) {
        container.innerHTML = '';
        if (!filterOptions) {
          return;
        }

        var wrapper = document.createElement('div');
        wrapper.className = 'bundles-filter-bar-inner';

        var heading = document.createElement('p');
        heading.textContent = 'Filter bundles:';
        heading.style.textAlign = 'center';
        wrapper.appendChild(heading);

        var controlsRow = document.createElement('p');
        controlsRow.style.textAlign = 'center';

        // Price filter
        var priceLabel = document.createElement('label');
        priceLabel.textContent = 'Price ';
        var priceSelect = document.createElement('select');
        priceSelect.setAttribute('data-action', 'price-range-change');

        var anyPriceOption = document.createElement('option');
        anyPriceOption.value = '';
        anyPriceOption.textContent = 'Any';
        priceSelect.appendChild(anyPriceOption);

        if (Array.isArray(priceRangeOptions)) {
          priceRangeOptions.forEach(function(option) {
            var opt = document.createElement('option');
            opt.value = option.id;
            opt.textContent = option.range.label || '';
            priceSelect.appendChild(opt);
          });
        }

        if (state && state.priceRange) {
          priceSelect.value = state.priceRange;
        }

        priceLabel.appendChild(priceSelect);
        controlsRow.appendChild(priceLabel);
        controlsRow.appendChild(document.createTextNode(' '));

        // Supply length filter
        var supplyLabel = document.createElement('label');
        supplyLabel.textContent = 'Supply length ';
        var supplySelect = document.createElement('select');
        supplySelect.setAttribute('data-action', 'supply-length-change');

        var anySupply = document.createElement('option');
        anySupply.value = '';
        anySupply.textContent = 'Any';
        supplySelect.appendChild(anySupply);

        if (Array.isArray(filterOptions.supply_length_filters)) {
          filterOptions.supply_length_filters.forEach(function(item) {
            var opt2 = document.createElement('option');
            opt2.value = typeof item.min_months === 'number' ? String(item.min_months) : '';
            opt2.textContent = item.label || '';
            supplySelect.appendChild(opt2);
          });
        }

        if (state && state.supplyMinMonths) {
          supplySelect.value = String(state.supplyMinMonths);
        }

        supplyLabel.appendChild(supplySelect);
        controlsRow.appendChild(supplyLabel);
        controlsRow.appendChild(document.createTextNode(' '));

        // Discount filter
        var discountLabel = document.createElement('label');
        discountLabel.textContent = 'Minimum savings ';
        var discountSelect = document.createElement('select');
        discountSelect.setAttribute('data-action', 'discount-change');

        var anyDiscount = document.createElement('option');
        anyDiscount.value = '';
        anyDiscount.textContent = 'Any';
        discountSelect.appendChild(anyDiscount);

        if (Array.isArray(filterOptions.discount_filters)) {
          filterOptions.discount_filters.forEach(function(item) {
            var opt3 = document.createElement('option');
            opt3.value = typeof item.min_discount_percent === 'number' ? String(item.min_discount_percent) : '';
            opt3.textContent = item.label || '';
            discountSelect.appendChild(opt3);
          });
        }

        if (state && state.discountMin) {
          discountSelect.value = String(state.discountMin);
        }

        discountLabel.appendChild(discountSelect);
        controlsRow.appendChild(discountLabel);

        wrapper.appendChild(controlsRow);

        var clearRow = document.createElement('p');
        clearRow.style.textAlign = 'center';
        var clearLink = document.createElement('a');
        clearLink.href = 'javascript:void(0)';
        clearLink.setAttribute('data-action', 'clear-filters');
        clearLink.textContent = 'Clear all filters';
        clearRow.appendChild(clearLink);
        wrapper.appendChild(clearRow);

        container.appendChild(wrapper);
      }

      function renderSortControl(container, filterOptions, state) {
        container.innerHTML = '';
        if (!filterOptions) {
          return;
        }

        var p = document.createElement('p');
        p.style.textAlign = 'center';

        var label = document.createElement('label');
        label.textContent = 'Sort bundles ';

        var select = document.createElement('select');
        select.setAttribute('data-action', 'sort-change');

        if (Array.isArray(filterOptions.sort_options)) {
          filterOptions.sort_options.forEach(function(option) {
            var opt = document.createElement('option');
            opt.value = option.value || '';
            opt.textContent = option.label || '';
            select.appendChild(opt);
          });
        }

        if (state && state.sort) {
          select.value = state.sort;
        }

        label.appendChild(select);
        p.appendChild(label);
        container.appendChild(p);
      }

      function renderBundlesGrid(container, bundles) {
        container.innerHTML = '';

        if (!Array.isArray(bundles) || bundles.length === 0) {
          var empty = document.createElement('p');
          empty.style.textAlign = 'center';
          empty.textContent = 'No bundles matched your filters. Please adjust the filters above.';
          container.appendChild(empty);
          return;
        }

        bundles.forEach(function(item, index) {
          if (index > 0) {
            var divider = document.createElement('hr');
            container.appendChild(divider);
          }

          var data = item && item.bundle ? item.bundle : null;

          var card = document.createElement('section');
          card.className = 'bundle-card';
          card.setAttribute('data-component', 'bundle-card');
          if (data && data.id) {
            card.setAttribute('data-bundle-id', data.id);
          }
          card.setAttribute('data-action', 'bundle-card-click');
          card.setAttribute('tabindex', '0');
          card.setAttribute('role', 'button');

          var title = document.createElement('h2');
          title.style.textAlign = 'center';
          if (data && data.name) {
            title.textContent = data.name;
          } else {
            title.textContent = 'Bundle';
          }
          card.appendChild(title);

          if (data && data.description) {
            var desc = document.createElement('p');
            desc.style.textAlign = 'center';
            desc.textContent = data.description;
            card.appendChild(desc);
          }

          if (Array.isArray(item.included_products) && item.included_products.length > 0) {
            var includes = document.createElement('p');
            includes.style.textAlign = 'center';
            var parts = [];
            item.included_products.forEach(function(ip) {
              if (ip && ip.product && ip.product.name) {
                var quantity = typeof ip.quantity === 'number' ? ip.quantity : 1;
                parts.push(quantity + ' x ' + ip.product.name);
              }
            });
            if (parts.length > 0) {
              includes.textContent = 'Includes: ' + parts.join(', ');
              card.appendChild(includes);
            }
          }

          if (typeof item.supply_months === 'number' && !isNaN(item.supply_months)) {
            var supply = document.createElement('p');
            supply.style.textAlign = 'center';
            supply.textContent = 'Approximate supply: ' + item.supply_months + ' month' + (item.supply_months === 1 ? '' : 's');
            card.appendChild(supply);
          }

          var pricingLines = [];

          if (typeof item.original_price === 'number' && !isNaN(item.original_price) && item.original_price > 0) {
            pricingLines.push('Regular price: ' + formatCurrency(item.original_price));
          }

          var displayPrice = typeof item.display_price === 'number' && !isNaN(item.display_price)
            ? item.display_price
            : (data && typeof data.discounted_price === 'number' ? data.discounted_price : null);

          if (displayPrice !== null) {
            pricingLines.push('Current price: ' + formatCurrency(displayPrice));
          }

          if (typeof item.discount_percent === 'number' && !isNaN(item.discount_percent) && item.discount_percent > 0) {
            var badge = item.discount_badge_text || ('Save ' + item.discount_percent + '%');
            pricingLines.push(badge);
          }

          pricingLines.forEach(function(text) {
            var p = document.createElement('p');
            p.style.textAlign = 'center';
            p.textContent = text;
            card.appendChild(p);
          });

          var ctaRow = document.createElement('p');
          ctaRow.style.textAlign = 'center';

          var detailsLink = document.createElement('a');
          detailsLink.href = 'javascript:void(0)';
          detailsLink.setAttribute('data-action', 'bundle-view-details');
          if (data && data.id) {
            detailsLink.setAttribute('data-bundle-id', data.id);
          }
          detailsLink.textContent = 'View details';
          ctaRow.appendChild(detailsLink);

          card.appendChild(ctaRow);
          container.appendChild(card);
        });
      }

      function handleFilterChange() {
        var priceSelect = document.querySelector('[data-action="price-range-change"]');
        var supplySelect = document.querySelector('[data-action="supply-length-change"]');
        var discountSelect = document.querySelector('[data-action="discount-change"]');

        var partial = {};
        if (priceSelect) {
          partial.priceRange = priceSelect.value || null;
        }
        if (supplySelect) {
          partial.supplyMinMonths = supplySelect.value ? parseInt(supplySelect.value, 10) : null;
        }
        if (discountSelect) {
          partial.discountMin = discountSelect.value ? parseInt(discountSelect.value, 10) : null;
        }

        urlStateManager.updateUrlWithState(partial);
      }

      function handleSortChange(event) {
        var select = event.target;
        var value = select.value || null;
        urlStateManager.updateUrlWithState({ sort: value });
      }

      function handleClearFilters(event) {
        event.preventDefault();
        urlStateManager.updateUrlWithState({
          priceRange: null,
          supplyMinMonths: null,
          discountMin: null
        });
      }

      function handleBundleCardClick(event) {
        event.preventDefault();
        var target = event.currentTarget;
        var bundleId = target.getAttribute('data-bundle-id');
        if (!bundleId && target.closest) {
          var parent = target.closest('[data-bundle-id]');
          if (parent) {
            bundleId = parent.getAttribute('data-bundle-id');
          }
        }
        if (bundleId) {
          window.location.href = 'bundle.html?id=' + encodeURIComponent(bundleId);
        }
      }

      function bindActionHandlers() {
        var actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(element) {
          if (boundActionElements.has(element)) {
            return;
          }
          var action = element.getAttribute('data-action');
          if (action === 'price-range-change' || action === 'supply-length-change' || action === 'discount-change') {
            element.addEventListener('change', handleFilterChange);
          } else if (action === 'sort-change') {
            element.addEventListener('change', handleSortChange);
          } else if (action === 'clear-filters') {
            element.addEventListener('click', handleClearFilters);
          } else if (action === 'cart-view-click') {
            element.addEventListener('click', function(event) {
              event.preventDefault();
              window.location.href = 'cart.html';
            });
          } else if (action === 'bundle-card-click' || action === 'bundle-view-details') {
            element.addEventListener('click', handleBundleCardClick);
            if (action === 'bundle-card-click') {
              element.addEventListener('keypress', function(event) {
                if (event.key === 'Enter' || event.key === ' ') {
                  event.preventDefault();
                  handleBundleCardClick.call(element, event);
                }
              });
            }
          }
          boundActionElements.add(element);
        });
      }

      var pageController = {
        filterOptions: null,
        priceRangeOptions: [],
        state: null,
        containers: {},
        init: function() {
          this.containers.root = document.querySelector('[data-component="bundles-page-root"]');
          this.containers.cartSummary = document.querySelector('[data-component="header-cart-summary"]');
          this.containers.filterBar = document.querySelector('[data-component="bundles-filter-bar"]');
          this.containers.sortControl = document.querySelector('[data-component="bundles-sort-control"]');
          this.containers.bundlesGrid = document.querySelector('[data-component="bundles-grid"]');

          try {
            this.filterOptions = WebsiteSDK.getBundleFilterOptions();
          } catch (e) {
            this.filterOptions = null;
            if (this.containers.bundlesGrid) {
              this.containers.bundlesGrid.textContent = 'We are unable to load bundles right now. Please try again shortly.';
            }
          }

          if (this.filterOptions) {
            this.buildPriceRangeOptions();
            this.ensureSortParam();
          }

          this.state = urlStateManager.getStateFromUrl();

          if (this.containers.filterBar && this.filterOptions) {
            renderFilterBar(this.containers.filterBar, this.filterOptions, this.priceRangeOptions, this.state);
          }
          if (this.containers.sortControl && this.filterOptions) {
            renderSortControl(this.containers.sortControl, this.filterOptions, this.state);
          }

          bindActionHandlers();

          if (this.containers.cartSummary) {
            this.loadCartSummary();
          }

          if (this.containers.bundlesGrid && this.filterOptions) {
            this.loadBundles();
          }

          window.addEventListener('popstate', function() {
            pageController.onUrlParamChange();
          });
        },
        ensureSortParam: function() {
          if (!this.filterOptions || !Array.isArray(this.filterOptions.sort_options) || this.filterOptions.sort_options.length === 0) {
            return;
          }
          var params = new URLSearchParams(window.location.search);
          if (!params.get('sort')) {
            var defaultSort = this.filterOptions.sort_options[0].value || '';
            if (defaultSort) {
              params.set('sort', defaultSort);
              var newQuery = params.toString();
              var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '') + window.location.hash;
              window.history.replaceState({}, '', newUrl);
            }
          }
        },
        onUrlParamChange: function() {
          this.state = urlStateManager.getStateFromUrl();
          if (this.containers.filterBar && this.filterOptions) {
            renderFilterBar(this.containers.filterBar, this.filterOptions, this.priceRangeOptions, this.state);
          }
          if (this.containers.sortControl && this.filterOptions) {
            renderSortControl(this.containers.sortControl, this.filterOptions, this.state);
          }
          bindActionHandlers();
          if (this.containers.bundlesGrid && this.filterOptions) {
            this.loadBundles();
          }
        },
        buildPriceRangeOptions: function() {
          this.priceRangeOptions = [];
          if (this.filterOptions && Array.isArray(this.filterOptions.price_ranges)) {
            var self = this;
            this.filterOptions.price_ranges.forEach(function(range, index) {
              var id = buildPriceRangeIdFromLabel(range.label, index);
              self.priceRangeOptions.push({ id: id, range: range });
            });
          }
        },
        buildFiltersFromState: function() {
          var filters = { status: 'active' };
          var state = this.state || urlStateManager.getStateFromUrl();

          if (state.priceRange && Array.isArray(this.priceRangeOptions)) {
            var matched = this.priceRangeOptions.find(function(option) {
              return option.id === state.priceRange;
            });
            if (matched && matched.range && typeof matched.range.max_price === 'number' && !isNaN(matched.range.max_price)) {
              filters.max_price = matched.range.max_price;
            }
          }

          if (state.supplyMinMonths && !isNaN(state.supplyMinMonths)) {
            filters.min_supply_months = state.supplyMinMonths;
          }

          if (state.discountMin && !isNaN(state.discountMin)) {
            filters.min_discount_percent = state.discountMin;
          }

          return filters;
        },
        loadCartSummary: function() {
          var summary = null;
          try {
            summary = WebsiteSDK.getCartSummary();
          } catch (e) {
            if (this.containers.cartSummary) {
              this.containers.cartSummary.textContent = 'Cart: unavailable at this time.';
            }
            return;
          }
          if (this.containers.cartSummary) {
            renderCartSummary(this.containers.cartSummary, summary);
            bindActionHandlers();
          }
        },
        loadBundles: function() {
          var filters = this.buildFiltersFromState();
          var sortValue = this.state && this.state.sort ? this.state.sort : undefined;
          var bundles;
          try {
            bundles = WebsiteSDK.getBundles(filters, sortValue);
          } catch (e) {
            if (this.containers.bundlesGrid) {
              this.containers.bundlesGrid.textContent = 'We are unable to load bundles right now. Please try again later.';
            }
            return;
          }
          if (this.containers.bundlesGrid) {
            renderBundlesGrid(this.containers.bundlesGrid, bundles);
            bindActionHandlers();
          }
        }
      };

      pageController.init();
    });
    </script>
</body>
</html>
