    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const regimenId = urlParams.get('id');

        const state = {
            regimenId: regimenId,
            regimenData: null,
            regimenExpanded: false
        };

        const loadingEl = document.querySelector('[data-component="regimen-loading-state"]');
        const errorEl = document.querySelector('[data-component="regimen-error-state"]');
        const detailContainer = document.querySelector('[data-populate="regimen-detail"]');
        const miniCartOverlay = document.querySelector('[data-component="mini-cart-overlay"]');

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showLoading(show) {
            if (!loadingEl) return;
            loadingEl.style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            if (!errorEl) return;
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function clearError() {
            if (!errorEl) return;
            errorEl.textContent = '';
            errorEl.style.display = 'none';
        }

        function initRegimen() {
            if (!detailContainer) {
                return;
            }

            if (!state.regimenId) {
                showLoading(false);
                showError('No regimen was specified. Please use the navigation above to choose a regimen.');
                detailContainer.innerHTML = '';
                return;
            }

            try {
                showLoading(true);
                clearError();

                const data = WebsiteSDK.getRegimenDetail(state.regimenId);
                state.regimenData = data;

                renderRegimenDetail(detailContainer, data);
                showLoading(false);
            } catch (e) {
                showLoading(false);
                showError('We were unable to load this regimen. Please try again later.');
                detailContainer.innerHTML = '';
            }
        }

        function renderRegimenDetail(container, data) {
            container.innerHTML = '';

            if (!data || !data.regimen) {
                showError('Regimen information is not available.');
                return;
            }

            const regimen = data.regimen;
            const items = Array.isArray(data.items) ? data.items.slice() : [];
            const mainGoalLabel = data.main_goal_label || '';
            const ageLabel = data.suitable_age_range_label || '';
            const canAddEntireRegimen = !!data.can_add_entire_regimen_to_cart;

            const wrapper = document.createElement('div');
            wrapper.className = 'regimen-detail-wrapper';
            wrapper.style.textAlign = 'center';

            // Main regimen card header
            const headerDiv = document.createElement('div');
            headerDiv.setAttribute('data-component', 'regimen-main-card');

            const titleEl = document.createElement('h2');
            titleEl.textContent = regimen.name || 'Regimen';
            titleEl.setAttribute('data-action', 'toggle-regimen-details');
            titleEl.style.cursor = 'pointer';
            headerDiv.appendChild(titleEl);

            if (mainGoalLabel) {
                const goalP = document.createElement('p');
                goalP.textContent = 'Primary goal: ' + mainGoalLabel;
                headerDiv.appendChild(goalP);
            }

            if (ageLabel) {
                const ageP = document.createElement('p');
                ageP.textContent = 'Suitable age range: ' + ageLabel;
                headerDiv.appendChild(ageP);
            }

            const introP = document.createElement('p');
            introP.textContent = 'Click the regimen name above to view or hide detailed usage instructions and products.';
            headerDiv.appendChild(introP);

            const topHr = document.createElement('hr');
            headerDiv.appendChild(topHr);

            // Navigation strip with mini-cart trigger
            const navP = document.createElement('p');
            navP.setAttribute('data-component', 'regimen-to-product-navigation');

            const toggleLink = document.createElement('a');
            toggleLink.href = 'javascript:void(0)';
            toggleLink.setAttribute('data-action', 'toggle-regimen-details');
            toggleLink.textContent = 'Show regimen details';
            navP.appendChild(toggleLink);

            const spacerText = document.createTextNode(' \u00a0|\u00a0 ');
            navP.appendChild(spacerText);

            const miniCartLink = document.createElement('a');
            miniCartLink.href = 'javascript:void(0)';
            miniCartLink.setAttribute('data-component', 'mini-cart-trigger');
            miniCartLink.setAttribute('data-action', 'open-mini-cart');
            miniCartLink.textContent = 'Mini Cart';
            navP.appendChild(miniCartLink);

            headerDiv.appendChild(navP);

            const bottomHr = document.createElement('hr');
            headerDiv.appendChild(bottomHr);

            wrapper.appendChild(headerDiv);

            // Add entire regimen to cart form
            if (canAddEntireRegimen) {
                const addAllForm = document.createElement('form');
                addAllForm.setAttribute('data-component', 'regimen-add-all-to-cart-form');
                addAllForm.setAttribute('data-action', 'add-regimen-to-cart');
                addAllForm.setAttribute('data-regimen-id', regimen.id || '');
                addAllForm.style.marginBottom = '16px';

                const purchaseTypeP = document.createElement('p');
                purchaseTypeP.textContent = 'Purchase type: ';

                const oneTimeLabel = document.createElement('label');
                const oneTimeRadio = document.createElement('input');
                oneTimeRadio.type = 'radio';
                oneTimeRadio.name = 'purchaseType';
                oneTimeRadio.value = 'one_time';
                oneTimeRadio.checked = true;
                oneTimeLabel.appendChild(oneTimeRadio);
                oneTimeLabel.appendChild(document.createTextNode(' One-time purchase'));
                purchaseTypeP.appendChild(oneTimeLabel);

                const spaceNode = document.createTextNode(' \u00a0 ');
                purchaseTypeP.appendChild(spaceNode);

                const subLabel = document.createElement('label');
                const subRadio = document.createElement('input');
                subRadio.type = 'radio';
                subRadio.name = 'purchaseType';
                subRadio.value = 'subscription';
                subLabel.appendChild(subRadio);
                subLabel.appendChild(document.createTextNode(' Subscription'));
                purchaseTypeP.appendChild(subLabel);

                addAllForm.appendChild(purchaseTypeP);

                const freqSpan = document.createElement('span');
                freqSpan.setAttribute('data-role', 'subscription-frequency-row');
                freqSpan.style.display = 'none';

                const freqLabelText = document.createTextNode('Delivery every: ');
                freqSpan.appendChild(freqLabelText);

                const freqSelect = document.createElement('select');
                freqSelect.name = 'subscriptionFrequency';

                const opt30 = document.createElement('option');
                opt30.value = 'every_30_days';
                opt30.textContent = '30 days';
                freqSelect.appendChild(opt30);

                const opt60 = document.createElement('option');
                opt60.value = 'every_60_days';
                opt60.textContent = '60 days';
                freqSelect.appendChild(opt60);

                const opt90 = document.createElement('option');
                opt90.value = 'every_90_days';
                opt90.textContent = '90 days';
                freqSelect.appendChild(opt90);

                freqSpan.appendChild(freqSelect);

                const freqP = document.createElement('p');
                freqP.appendChild(freqSpan);
                addAllForm.appendChild(freqP);

                const qtyP = document.createElement('p');
                const qtyLabel = document.createElement('label');
                qtyLabel.textContent = 'Quantity: ';
                const qtyInput = document.createElement('input');
                qtyInput.type = 'number';
                qtyInput.name = 'quantity';
                qtyInput.min = '1';
                qtyInput.value = '1';
                qtyInput.style.width = '60px';
                qtyLabel.appendChild(qtyInput);
                qtyP.appendChild(qtyLabel);
                addAllForm.appendChild(qtyP);

                const submitP = document.createElement('p');
                const submitInput = document.createElement('input');
                submitInput.type = 'submit';
                submitInput.value = 'Add Entire Regimen to Cart';
                submitP.appendChild(submitInput);
                addAllForm.appendChild(submitP);

                wrapper.appendChild(addAllForm);

                const formHr = document.createElement('hr');
                wrapper.appendChild(formHr);
            }

            // Usage and items section (initially hidden)
            const usageDiv = document.createElement('div');
            usageDiv.setAttribute('data-component', 'regimen-usage-and-items');
            usageDiv.style.display = state.regimenExpanded ? 'block' : 'none';

            const usageHeading = document.createElement('h3');
            usageHeading.textContent = 'How to Use This Regimen';
            usageDiv.appendChild(usageHeading);

            const usageIntro = document.createElement('p');
            if (regimen.description) {
                usageIntro.textContent = regimen.description;
            } else {
                usageIntro.textContent = 'Follow the instructions for each product below. Always consult your healthcare provider before starting any new supplement regimen.';
            }
            usageDiv.appendChild(usageIntro);

            const usageHr = document.createElement('hr');
            usageDiv.appendChild(usageHr);

            if (items.length === 0) {
                const noItemsP = document.createElement('p');
                noItemsP.textContent = 'No products are currently associated with this regimen.';
                usageDiv.appendChild(noItemsP);
            } else {
                const timeOrder = ['morning', 'afternoon', 'evening', 'any'];
                const groups = {
                    morning: [],
                    afternoon: [],
                    evening: [],
                    any: []
                };

                items.forEach(function(item) {
                    const regimenItem = item.regimen_item || {};
                    const timeOfDay = regimenItem.time_of_day && Object.prototype.hasOwnProperty.call(groups, regimenItem.time_of_day) ? regimenItem.time_of_day : 'any';
                    groups[timeOfDay].push(item);
                });

                timeOrder.forEach(function(timeKey) {
                    const groupItems = groups[timeKey];
                    if (!groupItems || groupItems.length === 0) {
                        return;
                    }

                    let timeLabel = '';
                    if (timeKey === 'morning') timeLabel = 'Morning';
                    if (timeKey === 'afternoon') timeLabel = 'Afternoon';
                    if (timeKey === 'evening') timeLabel = 'Evening';
                    if (timeKey === 'any') timeLabel = 'Any time of day';

                    const groupHeading = document.createElement('h4');
                    groupHeading.textContent = timeLabel;
                    usageDiv.appendChild(groupHeading);

                    groupItems.sort(function(a, b) {
                        const aOrder = (a.regimen_item && typeof a.regimen_item.sort_order === 'number') ? a.regimen_item.sort_order : 0;
                        const bOrder = (b.regimen_item && typeof b.regimen_item.sort_order === 'number') ? b.regimen_item.sort_order : 0;
                        return aOrder - bOrder;
                    });

                    groupItems.forEach(function(item) {
                        const regimenItem = item.regimen_item || {};
                        const product = item.product || {};
                        const variant = item.product_variant || {};

                        const itemDiv = document.createElement('div');
                        itemDiv.setAttribute('data-component', 'regimen-item-row');
                        itemDiv.style.marginBottom = '12px';

                        const nameP = document.createElement('p');
                        const nameStrong = document.createElement('strong');
                        const productLink = document.createElement('a');
                        productLink.href = 'javascript:void(0)';
                        productLink.setAttribute('data-action', 'go-to-product');
                        if (product.id) {
                            productLink.setAttribute('data-product-id', product.id);
                        }
                        productLink.textContent = product.name || 'Product';
                        nameStrong.appendChild(productLink);
                        nameP.appendChild(nameStrong);
                        itemDiv.appendChild(nameP);

                        if (product.short_description) {
                            const shortDescP = document.createElement('p');
                            shortDescP.textContent = product.short_description;
                            itemDiv.appendChild(shortDescP);
                        }

                        if (regimenItem.instructions) {
                            const instrP = document.createElement('p');
                            instrP.textContent = regimenItem.instructions;
                            itemDiv.appendChild(instrP);
                        }

                        const metaP = document.createElement('p');
                        const parts = [];
                        if (regimenItem.time_of_day) {
                            parts.push('Time of day: ' + regimenItem.time_of_day);
                        }
                        if (typeof regimenItem.quantity_per_day === 'number') {
                            parts.push('Quantity per day: ' + regimenItem.quantity_per_day);
                        }
                        if (parts.length > 0) {
                            metaP.textContent = parts.join(' \u2022 ');
                            itemDiv.appendChild(metaP);
                        }

                        const viewProductP = document.createElement('p');
                        const viewLink = document.createElement('a');
                        viewLink.href = 'javascript:void(0)';
                        viewLink.setAttribute('data-action', 'go-to-product');
                        if (product.id) {
                            viewLink.setAttribute('data-product-id', product.id);
                        }
                        viewLink.textContent = 'View full product details';
                        viewProductP.appendChild(viewLink);
                        itemDiv.appendChild(viewProductP);

                        // Per-product add-to-cart form
                        if (product.id && variant.id) {
                            const itemForm = document.createElement('form');
                            itemForm.setAttribute('data-component', 'regimen-product-add-to-cart-form');
                            itemForm.setAttribute('data-action', 'add-item-to-cart');
                            itemForm.setAttribute('data-product-id', product.id);
                            itemForm.setAttribute('data-product-variant-id', variant.id);

                            const purchaseP = document.createElement('p');
                            const purchaseLabel = document.createElement('label');
                            purchaseLabel.textContent = 'Purchase type: ';
                            const purchaseSelect = document.createElement('select');
                            purchaseSelect.name = 'purchaseType';

                            const itemOneTime = document.createElement('option');
                            itemOneTime.value = 'one_time';
                            itemOneTime.textContent = 'One-time';
                            purchaseSelect.appendChild(itemOneTime);

                            const itemSub = document.createElement('option');
                            itemSub.value = 'subscription';
                            itemSub.textContent = 'Subscription';
                            purchaseSelect.appendChild(itemSub);

                            purchaseLabel.appendChild(purchaseSelect);
                            purchaseP.appendChild(purchaseLabel);
                            itemForm.appendChild(purchaseP);

                            const itemFreqSpan = document.createElement('span');
                            itemFreqSpan.setAttribute('data-role', 'subscription-frequency-row');
                            itemFreqSpan.style.display = 'none';

                            const itemFreqLabelText = document.createTextNode(' Delivery every: ');
                            itemFreqSpan.appendChild(itemFreqLabelText);

                            const itemFreqSelect = document.createElement('select');
                            itemFreqSelect.name = 'subscriptionFrequency';

                            const itemOpt30 = document.createElement('option');
                            itemOpt30.value = 'every_30_days';
                            itemOpt30.textContent = '30 days';
                            itemFreqSelect.appendChild(itemOpt30);

                            const itemOpt60 = document.createElement('option');
                            itemOpt60.value = 'every_60_days';
                            itemOpt60.textContent = '60 days';
                            itemFreqSelect.appendChild(itemOpt60);

                            const itemOpt90 = document.createElement('option');
                            itemOpt90.value = 'every_90_days';
                            itemOpt90.textContent = '90 days';
                            itemFreqSelect.appendChild(itemOpt90);

                            itemFreqSpan.appendChild(itemFreqSelect);

                            const itemFreqP = document.createElement('p');
                            itemFreqP.appendChild(itemFreqSpan);
                            itemForm.appendChild(itemFreqP);

                            const qtyRowP = document.createElement('p');
                            const qtyLabel2 = document.createElement('label');
                            qtyLabel2.textContent = 'Quantity: ';
                            const qtyInput2 = document.createElement('input');
                            qtyInput2.type = 'number';
                            qtyInput2.name = 'quantity';
                            qtyInput2.min = '1';
                            qtyInput2.value = '1';
                            qtyInput2.style.width = '60px';
                            qtyLabel2.appendChild(qtyInput2);
                            qtyRowP.appendChild(qtyLabel2);
                            itemForm.appendChild(qtyRowP);

                            const submitRowP = document.createElement('p');
                            const submitItemInput = document.createElement('input');
                            submitItemInput.type = 'submit';
                            submitItemInput.value = 'Add product to cart';
                            submitRowP.appendChild(submitItemInput);
                            itemForm.appendChild(submitRowP);

                            itemDiv.appendChild(itemForm);
                        }

                        const itemHr = document.createElement('hr');
                        itemDiv.appendChild(itemHr);

                        usageDiv.appendChild(itemDiv);
                    });
                });
            }

            // Optional second add-all form at bottom
            if (canAddEntireRegimen) {
                const bottomAddAllForm = document.createElement('form');
                bottomAddAllForm.setAttribute('data-component', 'regimen-add-all-to-cart-form');
                bottomAddAllForm.setAttribute('data-action', 'add-regimen-to-cart');
                bottomAddAllForm.setAttribute('data-regimen-id', regimen.id || '');
                bottomAddAllForm.style.marginTop = '16px';

                const noteP = document.createElement('p');
                noteP.textContent = 'Ready to begin? Add the entire regimen to your cart:';
                bottomAddAllForm.appendChild(noteP);

                const bottomPurchaseP = document.createElement('p');
                bottomPurchaseP.textContent = 'Purchase type: ';

                const bottomOneTimeLabel = document.createElement('label');
                const bottomOneTimeRadio = document.createElement('input');
                bottomOneTimeRadio.type = 'radio';
                bottomOneTimeRadio.name = 'purchaseType';
                bottomOneTimeRadio.value = 'one_time';
                bottomOneTimeRadio.checked = true;
                bottomOneTimeLabel.appendChild(bottomOneTimeRadio);
                bottomOneTimeLabel.appendChild(document.createTextNode(' One-time purchase'));
                bottomPurchaseP.appendChild(bottomOneTimeLabel);

                const bottomSpaceNode = document.createTextNode(' \u00a0 ');
                bottomPurchaseP.appendChild(bottomSpaceNode);

                const bottomSubLabel = document.createElement('label');
                const bottomSubRadio = document.createElement('input');
                bottomSubRadio.type = 'radio';
                bottomSubRadio.name = 'purchaseType';
                bottomSubRadio.value = 'subscription';
                bottomSubLabel.appendChild(bottomSubRadio);
                bottomSubLabel.appendChild(document.createTextNode(' Subscription'));
                bottomPurchaseP.appendChild(bottomSubLabel);

                bottomAddAllForm.appendChild(bottomPurchaseP);

                const bottomFreqSpan = document.createElement('span');
                bottomFreqSpan.setAttribute('data-role', 'subscription-frequency-row');
                bottomFreqSpan.style.display = 'none';

                const bottomFreqLabelText = document.createTextNode('Delivery every: ');
                bottomFreqSpan.appendChild(bottomFreqLabelText);

                const bottomFreqSelect = document.createElement('select');
                bottomFreqSelect.name = 'subscriptionFrequency';

                const bottomOpt30 = document.createElement('option');
                bottomOpt30.value = 'every_30_days';
                bottomOpt30.textContent = '30 days';
                bottomFreqSelect.appendChild(bottomOpt30);

                const bottomOpt60 = document.createElement('option');
                bottomOpt60.value = 'every_60_days';
                bottomOpt60.textContent = '60 days';
                bottomFreqSelect.appendChild(bottomOpt60);

                const bottomOpt90 = document.createElement('option');
                bottomOpt90.value = 'every_90_days';
                bottomOpt90.textContent = '90 days';
                bottomFreqSelect.appendChild(bottomOpt90);

                bottomFreqSpan.appendChild(bottomFreqSelect);

                const bottomFreqP = document.createElement('p');
                bottomFreqP.appendChild(bottomFreqSpan);
                bottomAddAllForm.appendChild(bottomFreqP);

                const bottomQtyP = document.createElement('p');
                const bottomQtyLabel = document.createElement('label');
                bottomQtyLabel.textContent = 'Quantity: ';
                const bottomQtyInput = document.createElement('input');
                bottomQtyInput.type = 'number';
                bottomQtyInput.name = 'quantity';
                bottomQtyInput.min = '1';
                bottomQtyInput.value = '1';
                bottomQtyInput.style.width = '60px';
                bottomQtyLabel.appendChild(bottomQtyInput);
                bottomQtyP.appendChild(bottomQtyLabel);
                bottomAddAllForm.appendChild(bottomQtyP);

                const bottomSubmitP = document.createElement('p');
                const bottomSubmitInput = document.createElement('input');
                bottomSubmitInput.type = 'submit';
                bottomSubmitInput.value = 'Add Entire Regimen to Cart';
                bottomSubmitP.appendChild(bottomSubmitInput);
                bottomAddAllForm.appendChild(bottomSubmitP);

                usageDiv.appendChild(bottomAddAllForm);
            }

            wrapper.appendChild(usageDiv);
            container.appendChild(wrapper);
        }

        function renderMiniCartOverlay(container, summary) {
            if (!container) return;

            const items = (summary && Array.isArray(summary.items_detailed)) ? summary.items_detailed : [];
            const subtotal = summary && typeof summary.subtotal === 'number' ? summary.subtotal : 0;
            const estimatedDiscounts = summary && typeof summary.estimated_discounts === 'number' ? summary.estimated_discounts : 0;
            const shippingNote = summary && summary.note_about_shipping ? summary.note_about_shipping : '';

            let itemsHtml = '';

            if (items.length === 0) {
                itemsHtml = '<p>Your cart is currently empty.</p>';
            } else {
                itemsHtml += '<ul style="list-style-type:none;padding-left:0;">';
                items.forEach(function(item) {
                    const displayName = item.display_name || '';
                    const purchaseLabel = item.purchase_type_label || '';
                    const subLabel = item.subscription_frequency_label || '';
                    const qty = item.cart_item && typeof item.cart_item.quantity === 'number' ? item.cart_item.quantity : '';
                    const line = escapeHtml(displayName) + (purchaseLabel ? ' \u2013 ' + escapeHtml(purchaseLabel) : '') + (subLabel ? ' (' + escapeHtml(subLabel) + ')' : '') + (qty ? ' \u00d7 ' + escapeHtml(qty) : '');
                    itemsHtml += '<li>' + line + '</li>';
                });
                itemsHtml += '</ul>';
            }

            const totalHtml = `
                <p><strong>Subtotal:</strong> $${subtotal.toFixed(2)}</p>
                <p><strong>Estimated discounts:</strong> $${estimatedDiscounts.toFixed(2)}</p>
                ${shippingNote ? `<p>${escapeHtml(shippingNote)}</p>` : ''}
            `;

            container.innerHTML = `
                <div class="mini-cart-overlay-inner" style="position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);background-color:#ffffff;border:1px solid #000000;padding:16px;max-width:600px;width:80%;z-index:1000;text-align:center;">
                    <h3>Mini Cart</h3>
                    ${itemsHtml}
                    ${totalHtml}
                    <p>
                        <a href="javascript:void(0)" data-action="view-cart">View Cart</a>
                        &nbsp;|&nbsp;
                        <a href="javascript:void(0)" data-action="checkout">Checkout</a>
                        &nbsp;|&nbsp;
                        <a href="javascript:void(0)" data-action="close-mini-cart">Close</a>
                    </p>
                </div>
            `;

            container.style.display = 'block';
        }

        function handleAddRegimenToCart(form) {
            if (!state.regimenId) {
                alert('No regimen is selected.');
                return;
            }

            const purchaseInputs = form.querySelectorAll('input[name="purchaseType"]');
            let purchaseType = 'one_time';
            purchaseInputs.forEach(function(input) {
                if (input.checked) {
                    purchaseType = input.value;
                }
            });

            let subscriptionFrequency = null;
            if (purchaseType === 'subscription') {
                const freqSelect = form.querySelector('select[name="subscriptionFrequency"]');
                if (freqSelect && freqSelect.value) {
                    subscriptionFrequency = freqSelect.value;
                } else {
                    alert('Please choose a subscription delivery frequency.');
                    return;
                }
            }

            const qtyInput = form.querySelector('input[name="quantity"]');
            let quantity = qtyInput && qtyInput.value ? parseInt(qtyInput.value, 10) : 1;
            if (!quantity || quantity < 1) {
                quantity = 1;
            }

            try {
                const result = WebsiteSDK.addRegimenToCart(state.regimenId, purchaseType, subscriptionFrequency, quantity);
                if (!result || result.success === false) {
                    alert('We could not add this regimen to your cart. Please try again.');
                    return;
                }

                const summary = WebsiteSDK.getCartSummary();
                renderMiniCartOverlay(miniCartOverlay, summary);
            } catch (e) {
                alert('An error occurred while adding the regimen to your cart.');
            }
        }

        function handleAddItemToCart(form) {
            const productId = form.getAttribute('data-product-id');
            const variantId = form.getAttribute('data-product-variant-id');

            if (!productId || !variantId) {
                alert('This product is not available to add to cart.');
                return;
            }

            const purchaseSelect = form.querySelector('select[name="purchaseType"]');
            let purchaseType = purchaseSelect && purchaseSelect.value ? purchaseSelect.value : 'one_time';

            let subscriptionFrequency = null;
            if (purchaseType === 'subscription') {
                const freqSelect = form.querySelector('select[name="subscriptionFrequency"]');
                if (freqSelect && freqSelect.value) {
                    subscriptionFrequency = freqSelect.value;
                } else {
                    alert('Please choose a subscription delivery frequency.');
                    return;
                }
            }

            const qtyInput = form.querySelector('input[name="quantity"]');
            let quantity = qtyInput && qtyInput.value ? parseInt(qtyInput.value, 10) : 1;
            if (!quantity || quantity < 1) {
                quantity = 1;
            }

            try {
                const result = WebsiteSDK.addProductToCart(productId, variantId, purchaseType, subscriptionFrequency, quantity);
                if (!result || result.success === false) {
                    const message = result && result.message ? result.message : 'We could not add this product to your cart. Please try again.';
                    alert(message);
                    return;
                }

                const summary = WebsiteSDK.getCartSummary();
                renderMiniCartOverlay(miniCartOverlay, summary);
            } catch (e) {
                alert('An error occurred while adding the product to your cart.');
            }
        }

        function handleOpenMiniCart() {
            try {
                const summary = WebsiteSDK.getCartSummary();
                renderMiniCartOverlay(miniCartOverlay, summary);
            } catch (e) {
                alert('Unable to load the cart at this time.');
            }
        }

        function handleTogglePurchaseType(target) {
            const form = target.closest('form');
            if (!form) return;
            const purchaseType = target.value || (target.selectedOptions && target.selectedOptions[0] && target.selectedOptions[0].value);
            const freqRow = form.querySelector('[data-role="subscription-frequency-row"]');
            if (!freqRow) return;
            if (purchaseType === 'subscription') {
                freqRow.style.display = '';
            } else {
                freqRow.style.display = 'none';
            }
        }

        // Global click handler
        document.addEventListener('click', function(event) {
            const actionEl = event.target.closest('[data-action]');
            if (!actionEl) {
                return;
            }

            const action = actionEl.getAttribute('data-action');

            if (action === 'toggle-regimen-details') {
                event.preventDefault();
                state.regimenExpanded = !state.regimenExpanded;
                const usageDiv = document.querySelector('[data-component="regimen-usage-and-items"]');
                if (usageDiv) {
                    usageDiv.style.display = state.regimenExpanded ? 'block' : 'none';
                }
                const toggleLinks = document.querySelectorAll('[data-action="toggle-regimen-details"]');
                toggleLinks.forEach(function(link) {
                    if (state.regimenExpanded) {
                        link.textContent = 'Hide regimen details';
                    } else {
                        link.textContent = 'Show regimen details';
                    }
                });
            } else if (action === 'open-mini-cart') {
                event.preventDefault();
                handleOpenMiniCart();
            } else if (action === 'close-mini-cart') {
                event.preventDefault();
                if (miniCartOverlay) {
                    miniCartOverlay.style.display = 'none';
                    miniCartOverlay.innerHTML = '';
                }
            } else if (action === 'view-cart') {
                event.preventDefault();
                window.location.href = 'cart.html';
            } else if (action === 'checkout') {
                event.preventDefault();
                window.location.href = 'checkout.html';
            } else if (action === 'go-to-product') {
                event.preventDefault();
                const productId = actionEl.getAttribute('data-product-id');
                if (productId) {
                    window.location.href = 'product.html?id=' + encodeURIComponent(productId);
                }
            }
        });

        // Form submit handler
        document.addEventListener('submit', function(event) {
            const form = event.target;
            const action = form.getAttribute('data-action');
            if (!action) {
                return;
            }
            event.preventDefault();

            if (action === 'add-regimen-to-cart') {
                handleAddRegimenToCart(form);
            } else if (action === 'add-item-to-cart') {
                handleAddItemToCart(form);
            }
        });

        // Purchase type change handler (radio and select)
        document.addEventListener('change', function(event) {
            const target = event.target;
            if (!target.name) return;
            if (target.name === 'purchaseType') {
                handleTogglePurchaseType(target);
            }
        });

        // Initialize
        initRegimen();
    });
    </script>
</body>
</html>
