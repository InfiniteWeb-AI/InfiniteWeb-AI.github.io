  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const url = new URL(window.location.href);
      const urlParams = url.searchParams;
      const initialQuery = urlParams.get('query') || '';
      const initialSection = urlParams.get('section') || 'featured';

      const homeContainer = document.querySelector('[data-component="home-page-init"]');
      if (homeContainer) {
        homeContainer.dataset.queryState = initialQuery;
        homeContainer.dataset.sectionState = initialSection;
      }

      const state = {
        overview: null,
        browseCategories: [],
        selectedSection: initialSection || 'featured'
      };

      function prefillSearchInputs(queryValue) {
        const forms = document.querySelectorAll('form[data-component="header-search-form"], form[data-component="home-main-search-form"]');
        forms.forEach(function(form) {
          const input = form.querySelector('input[type="search"]');
          if (input) {
            input.value = queryValue;
          }
        });
      }

      function setupSearchHandlers() {
        const searchForms = document.querySelectorAll('form[data-action="search-form"]');
        searchForms.forEach(function(form) {
          form.addEventListener('submit', function(event) {
            event.preventDefault();
            const input = form.querySelector('input[type="search"]');
            const value = input && input.value ? input.value.trim() : '';
            const encoded = encodeURIComponent(value);
            const targetUrl = value ? 'search.html?query=' + encoded : 'search.html';
            window.location.href = targetUrl;
          });

          const input = form.querySelector('input[type="search"]');
          if (input) {
            input.addEventListener('keypress', function(e) {
              if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
              }
            });
          }
        });
      }

      function renderCoreCategories(container, coreCategories, browseCategories) {
        container.innerHTML = '';
        const core = Array.isArray(coreCategories) ? coreCategories : [];
        const browse = Array.isArray(browseCategories) ? browseCategories : [];

        const mergedMap = new Map();

        browse.forEach(function(cat) {
          if (cat && cat.category_key) {
            mergedMap.set(cat.category_key, {
              category_key: cat.category_key,
              display_name: cat.display_name,
              description: cat.description || ''
            });
          }
        });

        core.forEach(function(cat) {
          if (!cat || !cat.category_key) {
            return;
          }
          const existing = mergedMap.get(cat.category_key);
          mergedMap.set(cat.category_key, {
            category_key: cat.category_key,
            display_name: cat.display_name || (existing && existing.display_name) || cat.category_key,
            description: cat.description || (existing && existing.description) || ''
          });
        });

        const orderedKeys = [];
        core.forEach(function(cat) {
          if (cat && cat.category_key && orderedKeys.indexOf(cat.category_key) === -1) {
            orderedKeys.push(cat.category_key);
          }
        });
        mergedMap.forEach(function(value, key) {
          if (orderedKeys.indexOf(key) === -1) {
            orderedKeys.push(key);
          }
        });

        if (orderedKeys.length === 0) {
          const li = document.createElement('li');
          li.className = 'core-category-item core-category-empty';
          li.textContent = 'No categories available right now.';
          container.appendChild(li);
          return;
        }

        orderedKeys.forEach(function(key) {
          var cat = mergedMap.get(key);
          var li = document.createElement('li');
          li.className = 'core-category-item';

          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'core-category-pill';
          button.dataset.action = 'select-category';
          button.dataset.categoryKey = cat.category_key;
          button.textContent = cat.display_name;

          li.appendChild(button);
          container.appendChild(li);
        });
      }

      function formatDuration(seconds) {
        if (!seconds || seconds <= 0) {
          return '0:00';
        }
        var total = Math.floor(seconds);
        var mins = Math.floor(total / 60);
        var secs = total % 60;
        var paddedSecs = secs < 10 ? '0' + secs : String(secs);
        return mins + ':' + paddedSecs;
      }

      function renderVideoGrid(container, videos, gridType) {
        container.innerHTML = '';
        var list = Array.isArray(videos) ? videos : [];
        if (list.length === 0) {
          var empty = document.createElement('p');
          empty.className = 'section-empty';
          empty.textContent = 'No videos to display right now.';
          container.appendChild(empty);
          return;
        }

        list.forEach(function(video) {
          if (!video || !video.video_id) {
            return;
          }

          var card = document.createElement('article');
          card.className = 'video-card';
          card.dataset.videoId = video.video_id;
          if (video.category) {
            card.dataset.videoCategory = video.category;
          }
          if (video.age_group) {
            card.dataset.videoAgeGroup = video.age_group;
          }

          var link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.className = 'video-card-link';
          link.dataset.action = 'open-video';
          link.dataset.videoId = video.video_id;

          var thumbWrapper = document.createElement('div');
          thumbWrapper.className = 'video-thumbnail';

          var img = document.createElement('img');
          img.className = 'video-thumbnail-image';
          img.src = video.thumbnail_url || 'placeholder_thumbnail.png';
          img.alt = video.title || 'Video thumbnail';
          img.loading = 'lazy';
          thumbWrapper.appendChild(img);

          if (video.is_trending_this_week || video.is_trending_this_month) {
            var badge = document.createElement('div');
            badge.className = 'video-badge video-badge-trending';
            badge.textContent = video.is_trending_this_week ? 'Trending this week' : 'Trending this month';
            thumbWrapper.appendChild(badge);
          }

          var duration = document.createElement('span');
          duration.className = 'video-duration';
          duration.textContent = formatDuration(video.duration_seconds);
          thumbWrapper.appendChild(duration);

          link.appendChild(thumbWrapper);

          var meta = document.createElement('div');
          meta.className = 'video-meta';

          var titleEl = document.createElement('h3');
          titleEl.className = 'video-title';
          var titleLink = document.createElement('a');
          titleLink.href = 'javascript:void(0)';
          titleLink.dataset.action = 'open-video';
          titleLink.dataset.videoId = video.video_id;
          titleLink.textContent = video.title || '';
          titleEl.appendChild(titleLink);

          var infoRow = document.createElement('div');
          infoRow.className = 'video-info-row';

          if (video.category_label) {
            var catSpan = document.createElement('span');
            catSpan.className = 'video-pill video-pill-category';
            catSpan.textContent = video.category_label;
            infoRow.appendChild(catSpan);
          }

          if (video.age_group_label) {
            var ageSpan = document.createElement('span');
            ageSpan.className = 'video-pill video-pill-age';
            ageSpan.textContent = video.age_group_label;
            infoRow.appendChild(ageSpan);
          }

          if (typeof video.views_count === 'number') {
            var viewsSpan = document.createElement('span');
            viewsSpan.className = 'video-stat video-stat-views';
            viewsSpan.textContent = video.views_count.toLocaleString() + ' views';
            infoRow.appendChild(viewsSpan);
          }

          if (typeof video.average_rating === 'number' && typeof video.rating_count === 'number') {
            var ratingSpan = document.createElement('span');
            ratingSpan.className = 'video-stat video-stat-rating';
            ratingSpan.textContent = video.average_rating.toFixed(1) + ' ★ (' + video.rating_count + ')';
            infoRow.appendChild(ratingSpan);
          }

          if (video.creator_name) {
            var creatorSpan = document.createElement('span');
            creatorSpan.className = 'video-stat video-stat-creator';
            creatorSpan.textContent = video.creator_name;
            infoRow.appendChild(creatorSpan);
          }

          meta.appendChild(titleEl);
          meta.appendChild(infoRow);

          var actions = document.createElement('div');
          actions.className = 'video-card-actions';
          actions.dataset.component = 'video-card-actions';

          var watchLaterBtn = document.createElement('button');
          watchLaterBtn.type = 'button';
          watchLaterBtn.className = 'icon-btn icon-watch-later-btn';
          watchLaterBtn.dataset.action = 'add-watch-later';
          watchLaterBtn.dataset.videoId = video.video_id;
          watchLaterBtn.dataset.inWatchLater = video.is_in_watch_later ? 'true' : 'false';
          watchLaterBtn.setAttribute('aria-pressed', video.is_in_watch_later ? 'true' : 'false');

          var watchIcon = document.createElement('span');
          watchIcon.className = 'icon icon-watch-later';
          var watchLabel = document.createElement('span');
          watchLabel.className = 'icon-btn-label';
          watchLabel.textContent = video.is_in_watch_later ? 'In Watch Later' : 'Watch Later';
          watchLaterBtn.appendChild(watchIcon);
          watchLaterBtn.appendChild(watchLabel);

          var likeBtn = document.createElement('button');
          likeBtn.type = 'button';
          likeBtn.className = 'icon-btn icon-like-btn';
          if (video.is_liked_by_user) {
            likeBtn.classList.add('is-active');
          }
          likeBtn.dataset.action = 'toggle-like';
          likeBtn.dataset.videoId = video.video_id;
          likeBtn.dataset.liked = video.is_liked_by_user ? 'true' : 'false';
          likeBtn.setAttribute('aria-pressed', video.is_liked_by_user ? 'true' : 'false');

          var likeIcon = document.createElement('span');
          likeIcon.className = 'icon icon-like';
          var likeLabel = document.createElement('span');
          likeLabel.className = 'icon-btn-label';
          likeLabel.textContent = 'Like';
          var likesCountSpan = document.createElement('span');
          likesCountSpan.className = 'likes-count';
          likesCountSpan.textContent = typeof video.likes_count === 'number' ? String(video.likes_count) : '0';

          likeBtn.appendChild(likeIcon);
          likeBtn.appendChild(likeLabel);
          likeBtn.appendChild(likesCountSpan);

          actions.appendChild(watchLaterBtn);
          actions.appendChild(likeBtn);

          card.appendChild(link);
          card.appendChild(meta);
          card.appendChild(actions);

          container.appendChild(card);
        });
      }

      function renderSeriesGrid(container, seriesList) {
        container.innerHTML = '';
        var list = Array.isArray(seriesList) ? seriesList : [];
        if (list.length === 0) {
          var empty = document.createElement('p');
          empty.className = 'section-empty';
          empty.textContent = 'No series to display right now.';
          container.appendChild(empty);
          return;
        }

        list.forEach(function(series) {
          if (!series || !series.series_id) {
            return;
          }

          var card = document.createElement('article');
          card.className = 'series-card';
          card.dataset.seriesId = series.series_id;

          var link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.className = 'series-card-link';
          link.dataset.action = 'open-series';
          link.dataset.seriesId = series.series_id;

          var cover = document.createElement('div');
          cover.className = 'series-cover';
          var img = document.createElement('img');
          img.className = 'series-cover-image';
          img.src = series.cover_image_url || 'https://images.ctfassets.net/2tgq3wsc42ke/36j7NFITEyn0Ws9wV9bjRk/0593970854b54a397384eae48e2feb1b/ss_youtube_summer.jpg?q=65';
          img.alt = series.title || 'Series cover';
          img.loading = 'lazy';
          cover.appendChild(img);
          link.appendChild(cover);

          var meta = document.createElement('div');
          meta.className = 'series-meta';

          var titleEl = document.createElement('h3');
          titleEl.className = 'series-title';
          titleEl.textContent = series.title || '';

          var descEl = document.createElement('p');
          descEl.className = 'series-description';
          descEl.textContent = series.description || '';

          var infoRow = document.createElement('div');
          infoRow.className = 'series-info-row';

          if (series.category_label) {
            var catSpan = document.createElement('span');
            catSpan.className = 'series-pill series-pill-category';
            catSpan.textContent = series.category_label;
            infoRow.appendChild(catSpan);
          }

          if (series.age_group_label) {
            var ageSpan = document.createElement('span');
            ageSpan.className = 'series-pill series-pill-age';
            ageSpan.textContent = series.age_group_label;
            infoRow.appendChild(ageSpan);
          }

          if (typeof series.total_episodes === 'number') {
            var epSpan = document.createElement('span');
            epSpan.className = 'series-stat series-stat-episodes';
            epSpan.textContent = series.total_episodes + ' episodes';
            infoRow.appendChild(epSpan);
          }

          meta.appendChild(titleEl);
          if (series.description) {
            meta.appendChild(descEl);
          }
          meta.appendChild(infoRow);

          card.appendChild(link);
          card.appendChild(meta);

          container.appendChild(card);
        });
      }

      function bindUserShortcuts(userShortcuts) {
        var shortcuts = userShortcuts || {};
        var playlistCount = typeof shortcuts.playlist_count === 'number' ? shortcuts.playlist_count : 0;
        var watchLaterCount = typeof shortcuts.watch_later_count === 'number' ? shortcuts.watch_later_count : 0;

        var playlistCountEls = document.querySelectorAll('[data-populate="playlist-count"]');
        playlistCountEls.forEach(function(el) {
          el.textContent = String(playlistCount);
        });

        var watchLaterEls = document.querySelectorAll('[data-populate="watch-later-count"]');
        watchLaterEls.forEach(function(el) {
          el.textContent = String(watchLaterCount);
        });
      }

      function updateWatchLaterCountUI(newCount) {
        var count = typeof newCount === 'number' ? newCount : 0;
        if (state.overview && state.overview.user_shortcuts) {
          state.overview.user_shortcuts.watch_later_count = count;
        }
        var watchLaterEls = document.querySelectorAll('[data-populate="watch-later-count"]');
        watchLaterEls.forEach(function(el) {
          el.textContent = String(count);
        });
      }

      function updateLikeStateInState(videoId, isLiked, likesCount) {
        if (!state.overview) {
          return;
        }
        var lists = [state.overview.featured_videos, state.overview.recommended_videos];
        lists.forEach(function(list) {
          if (!Array.isArray(list)) {
            return;
          }
          list.forEach(function(v) {
            if (v && v.video_id === videoId) {
              v.is_liked_by_user = isLiked;
              if (typeof likesCount === 'number') {
                v.likes_count = likesCount;
              }
            }
          });
        });
      }

      function updateWatchLaterStateInState(videoId, inWatchLater) {
        if (!state.overview) {
          return;
        }
        var lists = [state.overview.featured_videos, state.overview.recommended_videos];
        lists.forEach(function(list) {
          if (!Array.isArray(list)) {
            return;
          }
          list.forEach(function(v) {
            if (v && v.video_id === videoId) {
              v.is_in_watch_later = inWatchLater;
            }
          });
        });
      }

      function updateLikeUI(videoId, isLiked, likesCount) {
        var buttons = document.querySelectorAll('[data-action="toggle-like"]');
        buttons.forEach(function(btn) {
          if (btn.dataset.videoId === videoId) {
            btn.dataset.liked = isLiked ? 'true' : 'false';
            btn.setAttribute('aria-pressed', isLiked ? 'true' : 'false');
            if (isLiked) {
              btn.classList.add('is-active');
            } else {
              btn.classList.remove('is-active');
            }
            var countEl = btn.querySelector('.likes-count');
            if (countEl && typeof likesCount === 'number') {
              countEl.textContent = String(likesCount);
            }
          }
        });
      }

      function updateWatchLaterUI(videoId, inWatchLater) {
        var buttons = document.querySelectorAll('[data-action="add-watch-later"]');
        buttons.forEach(function(btn) {
          if (btn.dataset.videoId === videoId) {
            btn.dataset.inWatchLater = inWatchLater ? 'true' : 'false';
            btn.setAttribute('aria-pressed', inWatchLater ? 'true' : 'false');
            var label = btn.querySelector('.icon-btn-label');
            if (label) {
              label.textContent = inWatchLater ? 'In Watch Later' : 'Watch Later';
            }
          }
        });
      }

      function updateSectionNavUI(selectedSection) {
        var buttons = document.querySelectorAll('[data-component="section-navigation-controls"] [data-action="section-nav"]');
        buttons.forEach(function(btn) {
          var target = btn.dataset.sectionTarget || '';
          if (target === selectedSection) {
            btn.classList.add('is-active');
          } else {
            btn.classList.remove('is-active');
          }
        });
      }

      function scrollToSection(sectionKey) {
        var key = sectionKey || 'featured';
        var target = null;
        if (key === 'featured') {
          target = document.getElementById('section-featured');
        } else if (key === 'recommended') {
          target = document.getElementById('section-recommended');
        } else if (key === 'series') {
          target = document.getElementById('section-series');
        } else if (key === 'shortcuts') {
          target = document.getElementById('section-shortcuts');
        }
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }

      function setSelectedSection(sectionKey, shouldScroll) {
        state.selectedSection = sectionKey || 'featured';
        updateSectionNavUI(state.selectedSection);
        var currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('section', state.selectedSection);
        if (window.history && typeof window.history.replaceState === 'function') {
          window.history.replaceState(null, '', currentUrl.toString());
        } else {
          window.location.search = currentUrl.search;
        }
        if (shouldScroll) {
          scrollToSection(state.selectedSection);
        }
      }

      var overviewData = null;
      var browseCategories = null;

      try {
        overviewData = WebsiteSDK.getHomePageOverview();
        browseCategories = WebsiteSDK.getBrowseCategories();
      } catch (err) {
        console.error('Failed to load home page data', err);
        var errorBanner = document.createElement('div');
        errorBanner.className = 'home-error-banner';
        errorBanner.textContent = 'We could not load videos right now. Please try again later.';
        var mainEl = document.getElementById('content');
        if (mainEl) {
          mainEl.insertBefore(errorBanner, mainEl.firstChild);
        }
        return;
      }

      state.overview = overviewData || {};
      state.browseCategories = Array.isArray(browseCategories) ? browseCategories : [];

      prefillSearchInputs(initialQuery);
      setupSearchHandlers();

      var coreCategoriesContainer = document.querySelector('[data-populate="core-categories"]');
      if (coreCategoriesContainer) {
        renderCoreCategories(coreCategoriesContainer, state.overview.core_categories, state.browseCategories);
      }

      bindUserShortcuts(state.overview.user_shortcuts || {});

      var featuredContainer = document.querySelector('[data-populate="featured-videos"]');
      if (featuredContainer) {
        renderVideoGrid(featuredContainer, state.overview.featured_videos || [], 'featured');
      }

      var recommendedContainer = document.querySelector('[data-populate="recommended-videos"]');
      if (recommendedContainer) {
        renderVideoGrid(recommendedContainer, state.overview.recommended_videos || [], 'recommended');
      }

      var seriesContainer = document.querySelector('[data-populate="featured-series"]');
      if (seriesContainer) {
        renderSeriesGrid(seriesContainer, state.overview.featured_series || []);
      }

      updateSectionNavUI(state.selectedSection);
      if (urlParams.get('section')) {
        scrollToSection(state.selectedSection);
      }

      if (homeContainer) {
        homeContainer.addEventListener('click', function(event) {
          var actionEl = event.target.closest('[data-action]');
          if (!actionEl) {
            return;
          }
          var action = actionEl.dataset.action;

          if (action === 'select-category') {
            event.preventDefault();
            var categoryKey = actionEl.dataset.categoryKey || '';
            if (categoryKey) {
              var navUrl = 'category.html?categoryId=' + encodeURIComponent(categoryKey);
              window.location.href = navUrl;
            }
            return;
          }

          if (action === 'go-trending') {
            event.preventDefault();
            window.location.href = 'trending.html';
            return;
          }

          if (action === 'go-playlists') {
            event.preventDefault();
            window.location.href = 'playlists.html';
            return;
          }

          if (action === 'go-watch-later') {
            event.preventDefault();
            window.location.href = 'watch_later.html';
            return;
          }

          if (action === 'open-video') {
            event.preventDefault();
            var videoId = actionEl.dataset.videoId || '';
            if (videoId) {
              var videoUrl = 'video.html?videoId=' + encodeURIComponent(videoId);
              window.location.href = videoUrl;
            }
            return;
          }

          if (action === 'open-series') {
            event.preventDefault();
            var seriesId = actionEl.dataset.seriesId || '';
            if (seriesId) {
              var seriesUrl = 'playlist_detail.html?type=series&seriesId=' + encodeURIComponent(seriesId);
              window.location.href = seriesUrl;
            }
            return;
          }

          if (action === 'toggle-like') {
            event.preventDefault();
            event.stopPropagation();
            var videoIdLike = actionEl.dataset.videoId || '';
            if (!videoIdLike) {
              return;
            }
            var currentlyLiked = actionEl.dataset.liked === 'true';
            var targetLike = !currentlyLiked;
            try {
              var likeResult = WebsiteSDK.toggleVideoLike(videoIdLike, targetLike);
              if (likeResult && likeResult.video_id) {
                var newIsLiked = !!likeResult.is_liked_by_user;
                var newLikesCount = typeof likeResult.likes_count === 'number' ? likeResult.likes_count : 0;
                updateLikeStateInState(videoIdLike, newIsLiked, newLikesCount);
                updateLikeUI(videoIdLike, newIsLiked, newLikesCount);
              }
            } catch (errLike) {
              console.error('Failed to toggle like', errLike);
            }
            return;
          }

          if (action === 'add-watch-later') {
            event.preventDefault();
            event.stopPropagation();
            var videoIdWL = actionEl.dataset.videoId || '';
            if (!videoIdWL) {
              return;
            }
            try {
              var wlResult = WebsiteSDK.addVideoToWatchLater(videoIdWL);
              if (wlResult && wlResult.video_id) {
                var inWatchLater = !!wlResult.is_in_watch_later;
                var wlCount = typeof wlResult.watch_later_count === 'number' ? wlResult.watch_later_count : 0;
                updateWatchLaterStateInState(videoIdWL, inWatchLater);
                updateWatchLaterUI(videoIdWL, inWatchLater);
                updateWatchLaterCountUI(wlCount);
              }
            } catch (errWl) {
              console.error('Failed to add to Watch Later', errWl);
            }
            return;
          }

          if (action === 'section-nav') {
            event.preventDefault();
            var targetSection = actionEl.dataset.sectionTarget || 'featured';
            setSelectedSection(targetSection, true);
            return;
          }
        });
      }
    });
  </script>
