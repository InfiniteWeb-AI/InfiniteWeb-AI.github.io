<!DOCTYPE html>
<html lang='en' dir='rtl'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Kids Talent Video Platform</title>

  <!-- Typography (matching modern rounded sans-serif aesthetic) -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&amp;family=Space+Grotesk:wght@400;500;700&amp;family=Work+Sans:wght@400;500&amp;display=swap' rel='stylesheet'>

  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='help.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-inner'>
      <div class='header-left'>
        <nav class='primary-nav' aria-label='Primary'>
          <ul class='primary-nav-list'>
            <li class='primary-nav-item'>
              <a href='index.html' class='nav-link is-active' title='Homepage with featured kids talent videos and quick access to search and categories'>Home</a>
            </li>
            <li class='primary-nav-item'>
              <a href='category.html?categoryId=singing' class='nav-link' title='Browse singing videos for kids with age, rating, and duration filters'>Singing</a>
            </li>
            <li class='primary-nav-item'>
              <a href='category.html?categoryId=dance' class='nav-link' title='Browse dance videos for kids, including styles like hip_hop, ballet, and more'>Dance</a>
            </li>
            <li class='primary-nav-item'>
              <a href='category.html?categoryId=comedy' class='nav-link' title='Browse kids comedy videos and discover new creators'>Comedy</a>
            </li>
            <li class='primary-nav-item'>
              <a href='trending.html' class='nav-link' title='View trending kids videos by time range with filters for category and duration'>Trending</a>
            </li>
            <li class='primary-nav-item'>
              <a href='playlists.html' class='nav-link' title='Manage your playlists, including custom collections like Birthday Show or Weekend Marathon'>My Playlists</a>
            </li>
            <li class='primary-nav-item'>
              <a href='settings.html' class='nav-link nav-link-pill' title='Adjust general settings and access parental controls'>Settings</a>
            </li>
          </ul>
        </nav>
      </div>

      <div class='header-right'>
        <div class='brand-mark' aria-label='Kids Talent'>
          <span class='brand-mark-block brand-mark-block-dark'></span>
          <span class='brand-mark-block brand-mark-block-red'></span>
          <span class='brand-mark-block brand-mark-block-dark'></span>
          <span class='brand-text'>Kids Talent</span>
        </div>
      </div>
    </div>
  </header>

  <main id='content' class='site-content' role='main'>
    <div class='help-page' data-component='help-page-controller'>
      <div class='help-page-container'>
        <nav class='help-breadcrumbs' aria-label='Breadcrumb' data-component='help-breadcrumbs'>
          <ol class='breadcrumb-list'>
            <li class='breadcrumb-item'>
              <button type='button' class='breadcrumb-link' data-action='navigate-root' data-populate='breadcrumb-root'></button>
            </li>
            <li class='breadcrumb-separator'>
              <span aria-hidden='true'>›</span>
            </li>
            <li class='breadcrumb-item breadcrumb-item-current'>
              <span class='breadcrumb-current' data-populate='breadcrumb-section'></span>
            </li>
          </ol>
        </nav>

        <header class='help-header'>
          <h1 class='help-title' data-populate='help-title'></h1>
        </header>

        <section class='help-search-hero' data-component='help-search-form'>
          <form class='help-search-form' data-action='help-search-form' role='search' aria-label='Search Help &amp; FAQ'>
            <label class='visually-hidden' for='helpSearchInput'>Search help topics</label>
            <div class='help-search-input-wrapper'>
              <input type='search' id='helpSearchInput' name='q' class='help-search-input' placeholder='Search help topics' autocomplete='off'>
              <button type='submit' class='btn btn-primary help-search-submit' data-action='help-search-submit'>Search</button>
              <button type='button' class='btn btn-secondary help-search-clear' data-action='help-search-clear' aria-label='Clear search'>×</button>
            </div>
          </form>
        </section>

        <nav class='help-section-nav' data-component='help-section-nav' aria-label='Help sections'>
          <ul class='help-section-nav-list' data-populate='help-sections-nav'>
            <!-- Sections navigation populated via JS -->
          </ul>
        </nav>

        <div class='help-main-region'>
          <div class='help-error' data-populate='help-error' role='alert' hidden></div>

          <section class='help-faq' data-component='faq-accordion-list' aria-label='Help content'>
            <div class='help-faq-list' data-populate='help-faq-sections'>
              <!-- FAQ sections populated via JS -->
            </div>
          </section>
        </div>

        <div class='help-loader-overlay' data-component='help-content-loader' aria-hidden='true' hidden>
          <div class='help-loader'>
            <div class='help-loader-spinner'></div>
            <p class='help-loader-text'>Loading help content...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner'>
      <div class='footer-top'>
        <div class='footer-brand'>
          <span class='footer-logo-dot'></span>
          <span class='footer-brand-text'>Kids Talent</span>
        </div>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-link' title='Learn more about this kids talent video platform'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='contact.html' class='footer-link' title='Contact the team for questions or feedback'>Contact</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-link' title='Get help using playlists, Watch Later, parental controls, and other features'>Help &amp; FAQ</a>
            </li>
            <li class='footer-nav-item'>
              <a href='safety.html' class='footer-link' title='Read safety tips and content guidelines for parents and kids'>Safety</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-link' title='Review the terms and conditions for using this website'>Terms of Use</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-link' title='Understand how your data and your child’s data are handled'>Privacy Policy</a>
            </li>
          </ul>
        </nav>
      </div>

      <div class='footer-bottom'>
        <p class='footer-legal'>© 2026 Kids Talent. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var state = {
        content: null,
        sections: [],
        activeSectionSlug: null,
        searchQuery: '',
        isLoading: false
      };

      var pageControllerEl = document.querySelector('[data-component="help-page-controller"]');
      if (!pageControllerEl) {
        return;
      }

      var loaderEl = document.querySelector('[data-component="help-content-loader"]');
      var titleEl = document.querySelector('[data-populate="help-title"]');
      var breadcrumbRootEl = document.querySelector('[data-populate="breadcrumb-root"]');
      var breadcrumbSectionEl = document.querySelector('[data-populate="breadcrumb-section"]');
      var navListEl = document.querySelector('[data-populate="help-sections-nav"]');
      var faqContainerEl = document.querySelector('[data-populate="help-faq-sections"]');
      var errorEl = document.querySelector('[data-populate="help-error"]');
      var searchFormComponent = document.querySelector('[data-component="help-search-form"]');

      function slugifyHeading(heading) {
        if (!heading) return '';
        return heading.toString().trim().toLowerCase()
          .replace(/[^a-z0-9\u0600-\u06FF]+/g, '-')
          .replace(/^-+|-+$/g, '');
      }

      function readUrlState() {
        var url = new URL(window.location.href);
        return {
          section: url.searchParams.get('section'),
          q: url.searchParams.get('q') || ''
        };
      }

      function updateUrlState(newState, options) {
        options = options || {};
        var url = new URL(window.location.href);

        if ('section' in newState) {
          if (newState.section) {
            url.searchParams.set('section', newState.section);
          } else {
            url.searchParams.delete('section');
          }
        }

        if ('q' in newState) {
          if (newState.q && newState.q.trim().length) {
            url.searchParams.set('q', newState.q.trim());
          } else {
            url.searchParams.delete('q');
          }
        }

        var method = options.replace ? 'replaceState' : 'pushState';
        window.history[method]({}, '', url.toString());
      }

      function showLoader(isLoading) {
        state.isLoading = isLoading;
        if (!loaderEl) return;
        if (isLoading) {
          loaderEl.removeAttribute('hidden');
        } else {
          loaderEl.setAttribute('hidden', 'hidden');
        }
      }

      function renderTitle(container, title) {
        if (!container) return;
        container.textContent = title || '';
      }

      function renderBreadcrumbs(rootContainer, sectionContainer) {
        if (rootContainer) {
          rootContainer.textContent = state.content && state.content.title ? state.content.title : '';
        }
        if (sectionContainer) {
          var activeSection = state.sections.find(function(sec) {
            return sec.slug === state.activeSectionSlug;
          });
          if (activeSection) {
            sectionContainer.textContent = activeSection.heading;
            sectionContainer.parentElement.style.display = '';
          } else {
            sectionContainer.textContent = '';
            sectionContainer.parentElement.style.display = 'none';
          }
        }
      }

      function escapeRegExp(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function renderSectionNav(container) {
        if (!container) return;
        container.innerHTML = '';
        state.sections.forEach(function(sec) {
          var li = document.createElement('li');
          li.className = 'help-section-nav-item-wrap';

          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'help-section-nav-item';
          if (sec.slug === state.activeSectionSlug) {
            btn.className += ' is-active';
          }
          btn.textContent = sec.heading;
          btn.setAttribute('data-action', 'nav-section');
          btn.setAttribute('data-section-slug', sec.slug);

          li.appendChild(btn);
          container.appendChild(li);
        });
      }

      function decorateEntryAnchors(container, sectionSlug) {
        if (!container) return;
        var headings = container.querySelectorAll('h2, h3, h4, h5, h6');
        var index = 0;
        headings.forEach(function(h) {
          index += 1;
          if (!h.id) {
            h.id = 'entry-' + sectionSlug + '-' + index;
          }
        });
      }

      function decorateInternalAnchors(container, sectionSlug) {
        if (!container) return;
        var anchors = container.querySelectorAll('a[href]');
        anchors.forEach(function(a) {
          var href = a.getAttribute('href') || '';
          var text = (a.textContent || '').trim().toLowerCase();

          if (text === 'contact support') {
            a.setAttribute('href', 'contact.html?category=safety');
            return;
          }

          if (href.charAt(0) === '#') {
            a.addEventListener('click', function(ev) {
              ev.preventDefault();
              var targetId = href.substring(1);
              if (!targetId) return;
              var url = new URL(window.location.href);
              url.hash = '#' + targetId;
              window.history.pushState({}, '', url.toString());
              scrollToAnchor(targetId);
            });
          }
        });
      }

      function applySearchHighlightToHtml(html, query) {
        if (!query) return html;
        try {
          var pattern = new RegExp('(' + escapeRegExp(query) + ')', 'gi');
          return html.replace(pattern, '<mark>$1</mark>');
        } catch (e) {
          return html;
        }
      }

      function renderFaqSections(container) {
        if (!container) return;
        container.innerHTML = '';

        var query = (state.searchQuery || '').trim();
        var normalizedQuery = query.toLowerCase();

        state.sections.forEach(function(sec) {
          var headingMatches = !normalizedQuery || (sec.heading || '').toLowerCase().indexOf(normalizedQuery) !== -1;
          var bodyMatches = false;
          if (normalizedQuery && sec.body_html) {
            bodyMatches = sec.body_html.toLowerCase().indexOf(normalizedQuery) !== -1;
          }
          var matchesSearch = !normalizedQuery || headingMatches || bodyMatches;
          if (normalizedQuery && !matchesSearch) {
            return;
          }

          var sectionEl = document.createElement('article');
          sectionEl.className = 'faq-section';
          sectionEl.id = 'section-' + sec.slug;
          sectionEl.setAttribute('data-section-slug', sec.slug);

          var headerEl = document.createElement('header');
          headerEl.className = 'faq-section-header';

          var toggleBtn = document.createElement('button');
          toggleBtn.type = 'button';
          toggleBtn.className = 'faq-section-toggle';
          toggleBtn.setAttribute('data-action', 'toggle-section');
          toggleBtn.setAttribute('data-section-slug', sec.slug);

          var isExpanded = false;
          if (normalizedQuery) {
            isExpanded = true;
          } else if (state.activeSectionSlug && state.activeSectionSlug === sec.slug) {
            isExpanded = true;
          }

          toggleBtn.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');

          var titleEl = document.createElement('h2');
          titleEl.className = 'faq-section-title';
          if (normalizedQuery) {
            var safeHeading = sec.heading || '';
            var headingHtml = applySearchHighlightToHtml(safeHeading, query);
            titleEl.innerHTML = headingHtml;
          } else {
            titleEl.textContent = sec.heading;
          }

          var iconEl = document.createElement('span');
          iconEl.className = 'faq-section-icon';
          iconEl.setAttribute('aria-hidden', 'true');

          toggleBtn.appendChild(titleEl);
          toggleBtn.appendChild(iconEl);
          headerEl.appendChild(toggleBtn);

          var bodyEl = document.createElement('div');
          bodyEl.className = 'faq-section-body';
          if (!isExpanded) {
            bodyEl.setAttribute('hidden', 'hidden');
          }

          var rawHtml = sec.body_html || '';
          if (normalizedQuery) {
            rawHtml = applySearchHighlightToHtml(rawHtml, query);
          }
          bodyEl.innerHTML = rawHtml;

          decorateEntryAnchors(bodyEl, sec.slug);
          decorateInternalAnchors(bodyEl, sec.slug);

          sectionEl.appendChild(headerEl);
          sectionEl.appendChild(bodyEl);

          container.appendChild(sectionEl);
        });
      }

      function renderSearchState() {
        if (!searchFormComponent) return;
        var input = searchFormComponent.querySelector('#helpSearchInput');
        var clearBtn = searchFormComponent.querySelector('[data-action="help-search-clear"]');
        if (input) {
          input.value = state.searchQuery || '';
        }
        if (clearBtn) {
          if (state.searchQuery && state.searchQuery.trim().length) {
            clearBtn.removeAttribute('disabled');
          } else {
            clearBtn.setAttribute('disabled', 'disabled');
          }
        }
      }

      function scrollToSection(sectionSlug) {
        if (!sectionSlug) return;
        var el = document.getElementById('section-' + sectionSlug);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }

      function scrollToAnchor(anchorId) {
        if (!anchorId) return;
        var target = document.getElementById(anchorId);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          try {
            target.classList.add('is-anchor-target');
            setTimeout(function() {
              target.classList.remove('is-anchor-target');
            }, 2000);
          } catch (e) {}
        }
      }

      function handleHashChange() {
        var hash = window.location.hash || '';
        if (hash.length > 1) {
          var anchorId = hash.substring(1);
          scrollToAnchor(anchorId);
        }
      }

      function applyStateFromUrl() {
        var urlState = readUrlState();
        var q = urlState.q || '';
        state.searchQuery = q;

        var sectionSlug = urlState.section;
        var validSection = state.sections.some(function(sec) { return sec.slug === sectionSlug; });
        if (sectionSlug && validSection) {
          state.activeSectionSlug = sectionSlug;
        } else if (!state.activeSectionSlug && state.sections.length) {
          state.activeSectionSlug = state.sections[0].slug;
        }

        renderBreadcrumbs(breadcrumbRootEl, breadcrumbSectionEl);
        renderSectionNav(navListEl);
        renderFaqSections(faqContainerEl);
        renderSearchState();
      }

      function initSearchForm() {
        if (!searchFormComponent) return;
        var form = searchFormComponent.querySelector('[data-action="help-search-form"]');
        var clearBtn = searchFormComponent.querySelector('[data-action="help-search-clear"]');

        if (form) {
          form.addEventListener('submit', function(ev) {
            ev.preventDefault();
            var input = form.querySelector('#helpSearchInput');
            var value = input ? input.value : '';
            var normalized = (value || '').trim().replace(/\s+/g, ' ');
            state.searchQuery = normalized;
            updateUrlState({ q: normalized }, { replace: false });
            applyStateFromUrl();
          });
        }

        if (clearBtn) {
          clearBtn.addEventListener('click', function() {
            var input = searchFormComponent.querySelector('#helpSearchInput');
            if (input) {
              input.value = '';
            }
            state.searchQuery = '';
            updateUrlState({ q: '' }, { replace: false });
            applyStateFromUrl();
          });
        }
      }

      function initClickHandlers() {
        pageControllerEl.addEventListener('click', function(ev) {
          var target = ev.target;
          if (!target) return;
          var actionEl = target.closest('[data-action]');
          if (!actionEl || !pageControllerEl.contains(actionEl)) return;
          var action = actionEl.getAttribute('data-action');

          if (action === 'nav-section') {
            var sectionSlug = actionEl.getAttribute('data-section-slug');
            if (!sectionSlug) return;
            state.activeSectionSlug = sectionSlug;
            updateUrlState({ section: sectionSlug }, { replace: false });
            applyStateFromUrl();
            scrollToSection(sectionSlug);
          } else if (action === 'toggle-section') {
            var slug = actionEl.getAttribute('data-section-slug');
            if (!slug) return;
            if (state.activeSectionSlug === slug && state.searchQuery && state.searchQuery.trim().length) {
              state.activeSectionSlug = slug;
            } else if (state.activeSectionSlug === slug) {
              state.activeSectionSlug = slug;
            } else {
              state.activeSectionSlug = slug;
            }
            updateUrlState({ section: slug }, { replace: false });
            applyStateFromUrl();
            scrollToSection(slug);
          } else if (action === 'navigate-root') {
            state.searchQuery = '';
            if (state.sections.length) {
              state.activeSectionSlug = state.sections[0].slug;
            } else {
              state.activeSectionSlug = null;
            }
            updateUrlState({ section: state.activeSectionSlug, q: '' }, { replace: false });
            applyStateFromUrl();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        });
      }

      function loadContent() {
        showLoader(true);
        if (errorEl) {
          errorEl.textContent = '';
          errorEl.setAttribute('hidden', 'hidden');
        }
        try {
          var response = WebsiteSDK.getInformationalPageContent('help_faq');
          state.content = response || { title: '', sections: [] };
          var rawSections = Array.isArray(state.content.sections) ? state.content.sections : [];
          state.sections = rawSections.map(function(sec) {
            return {
              heading: sec.heading || '',
              body_html: sec.body_html || '',
              slug: slugifyHeading(sec.heading || '')
            };
          });

          var urlState = readUrlState();
          var defaultSectionSlug = state.sections.length ? state.sections[0].slug : null;
          var requestedSlug = urlState.section;
          var hasRequested = !!state.sections.find(function(sec) { return sec.slug === requestedSlug; });
          state.activeSectionSlug = hasRequested ? requestedSlug : defaultSectionSlug;
          state.searchQuery = urlState.q || '';

          renderTitle(titleEl, state.content.title);
          renderBreadcrumbs(breadcrumbRootEl, breadcrumbSectionEl);
          renderSectionNav(navListEl);
          renderFaqSections(faqContainerEl);
          renderSearchState();

          if (window.location.hash && window.location.hash.length > 1) {
            scrollToAnchor(window.location.hash.substring(1));
          } else if (state.activeSectionSlug) {
            scrollToSection(state.activeSectionSlug);
          }
        } catch (e) {
          if (errorEl) {
            errorEl.textContent = 'Unable to load help content. Please try again later.';
            errorEl.removeAttribute('hidden');
          }
        } finally {
          showLoader(false);
        }
      }

      initSearchForm();
      initClickHandlers();
      window.addEventListener('popstate', function() {
        applyStateFromUrl();
      });
      window.addEventListener('hashchange', function() {
        handleHashChange();
      });

      loadContent();
    });
  </script>
</body>
</html>
