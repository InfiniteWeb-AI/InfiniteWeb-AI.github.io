<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>Lyrics &amp; Translations</title>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet' />
  <link rel='stylesheet' href='styles.css' />
  <link rel='stylesheet' href='artist.css' />
</head>
<body class='app-body'>
  <div class='app-shell'>
    <!-- Persistent dark sidebar navigation -->
    <aside class='sidebar' aria-label='Primary'>
      <div class='sidebar-brand'>
        <a href='index.html' title='Homepage with featured songs and quick search' class='brand-link'>
          <span class='brand-mark'>LT</span>
        </a>
      </div>

      <nav class='sidebar-nav'>
        <ul class='sidebar-nav-list'>
          <li class='nav-item nav-item-home active'>
            <a href='index.html' title='Homepage with featured songs and quick search'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Home</span>
            </a>
          </li>
          <li class='nav-item nav-item-browse'>
            <a href='search.html' title='Search and filter songs by language, genre, year, difficulty, and more'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Browse Songs</span>
            </a>
          </li>
          <li class='nav-item nav-item-lyrics-search'>
            <a href='lyrics_search.html' title='Find songs by searching for words or phrases in their lyrics'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Lyrics Search</span>
            </a>
          </li>
          <li class='nav-item nav-item-artists'>
            <a href='artists.html' title='Browse and search for artists, then view their albums and songs'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Artists</span>
            </a>
          </li>
          <li class='nav-item nav-item-playlists'>
            <a href='playlists.html' title="View and manage your playlists, including study lists like 'French Study'">
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Playlists</span>
            </a>
          </li>
          <li class='nav-item nav-item-vocabulary'>
            <a href='vocabulary.html' title='Manage your vocabulary lists built from song lyrics'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Vocabulary</span>
            </a>
          </li>
          <li class='nav-item nav-item-saved'>
            <a href='library.html' title='Access bookmarked songs and favorite translations'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Saved</span>
            </a>
          </li>
          <li class='nav-item nav-item-settings'>
            <a href='settings.html' title='Change content preferences, language defaults, and display options'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Settings</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main column: top header, page content, footer -->
    <div class='main-column'>
      <header class='topbar' role='banner'>
        <div class='topbar-left'>
          <form class='topbar-search' action='lyrics_search.html' method='get' role='search'>
            <label class='visually-hidden' for='site-search'>Search lyrics</label>
            <input
              id='site-search'
              name='q'
              type='search'
              placeholder='Search songs, artists, or lyrics...'
              autocomplete='off'
            />
          </form>
        </div>
        <div class='topbar-right'>
          <div class='language-switch' aria-label='Display language'>
            <span class='language language-active'>EN</span>
            <span class='language-divider'>/</span>
            <span class='language'>Other</span>
          </div>
        </div>
      </header>

      <main id='content' class='page-content' role='main'>
        <section class='artist-page' data-component='artist-page-init'>
          <div class='artist-page-status' data-component='artist-error-and-loading-handler' aria-live='polite'>
            <div class='status-message status-loading' data-populate='global-loading' hidden>Loading artist details...</div>
            <div class='status-message status-error' data-populate='global-error' hidden>
              <p class='status-error-text' data-populate='global-error-text'></p>
              <div class='status-actions'>
                <button type='button' class='btn-text' data-action='retry-load-artist'>Retry</button>
                <a href='artists.html' class='btn-link'>Back to artists</a>
              </div>
            </div>
          </div>

          <section class='artist-header-band' data-component='artist-header'>
            <div class='artist-header-inner'>
              <div class='artist-avatar-wrapper'>
                <div class='artist-avatar' data-populate='artist-image' aria-hidden='true'></div>
              </div>
              <div class='artist-header-main'>
                <h1 class='artist-name' data-populate='artist-name'></h1>
                <p class='artist-meta'>
                  <span class='artist-primary-language' data-populate='artist-primary-language'></span>
                  <span class='artist-meta-divider' aria-hidden='true'>•</span>
                  <span class='artist-popularity' data-populate='artist-popularity'></span>
                </p>
                <p class='artist-description' data-populate='artist-description'></p>
              </div>
            </div>
          </section>

          <section class='artist-section artist-albums-section' aria-labelledby='artist-albums-heading'>
            <header class='section-header artist-albums-header' data-component='artist-albums-controls'>
              <div class='section-title-group'>
                <h2 id='artist-albums-heading'>Albums</h2>
                <p class='section-subtitle' data-populate='albums-count'></p>
              </div>
              <div class='section-controls'>
                <div class='control-group'>
                  <label for='album-sort-select'>Sort</label>
                  <select id='album-sort-select' data-action='album-sort-change'>
                    <option value='year_desc'>Release year: Newest first</option>
                    <option value='year_asc'>Release year: Oldest first</option>
                    <option value='title_asc'>Title A–Z</option>
                  </select>
                </div>
                <div class='control-group'>
                  <label for='album-year-input'>Year</label>
                  <input
                    id='album-year-input'
                    type='number'
                    min='1900'
                    max='2100'
                    placeholder='e.g. 2020'
                    inputmode='numeric'
                    data-action='album-year-change'
                  />
                </div>
              </div>
            </header>
            <div class='section-body'>
              <div class='list-state-message' data-populate='albums-state-message' hidden></div>
              <ul class='album-list' data-component='artist-albums-list' data-action='albums-list-click' aria-label='Albums'></ul>
            </div>
          </section>

          <section class='artist-section artist-top-songs-section' aria-labelledby='artist-top-songs-heading'>
            <header class='section-header artist-top-songs-header' data-component='artist-top-songs-controls'>
              <div class='section-title-group'>
                <h2 id='artist-top-songs-heading'>Top Songs</h2>
                <p class='section-subtitle' data-populate='top-songs-count'></p>
              </div>
              <div class='section-controls'>
                <div class='control-group'>
                  <label for='song-sort-select'>Sort</label>
                  <select id='song-sort-select' data-action='song-sort-change'>
                    <option value='popularity_desc'>Popularity: High to Low</option>
                    <option value='year_desc'>Release year: Newest first</option>
                    <option value='year_asc'>Release year: Oldest first</option>
                  </select>
                </div>
              </div>
            </header>
            <div class='section-body'>
              <div class='list-state-message' data-populate='top-songs-state-message' hidden></div>
              <ul class='song-list' data-component='artist-top-songs-list' data-action='top-songs-list-click' aria-label='Top songs'></ul>
            </div>
          </section>
        </section>
      </main>

      <footer class='site-footer'>
        <div class='footer-inner'>
          <nav class='footer-nav' aria-label='Footer'>
            <a href='about.html' title='Learn more about this lyrics and translations site'>About</a>
            <a href='help.html' title='Get help with searching, playlists, vocabulary, and other features'>Help / FAQ</a>
            <a href='contact.html' title='Send feedback, report issues, or ask questions'>Contact</a>
            <a href='legal.html' title='View terms of use and privacy information'>Legal</a>
          </nav>
          <div class='footer-meta'>
            <span class='footer-copy'>&copy; 2026 Lyrics &amp; Translations.</span>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src='business_logic.js'></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var state = {
      artistId: null,
      artist: null,
      albumsBase: [],
      topSongsBase: [],
      albumSort: 'year_desc',
      albumYear: null,
      songSort: 'popularity_desc',
      loading: false,
      error: null
    };

    var dom = {
      artistHeaderSection: document.querySelector('[data-component=artist-header]'),
      artistName: document.querySelector('[data-populate=artist-name]'),
      artistImage: document.querySelector('[data-populate=artist-image]'),
      artistPrimaryLanguage: document.querySelector('[data-populate=artist-primary-language]'),
      artistPopularity: document.querySelector('[data-populate=artist-popularity]'),
      artistDescription: document.querySelector('[data-populate=artist-description]'),
      albumsCount: document.querySelector('[data-populate=albums-count]'),
      topSongsCount: document.querySelector('[data-populate=top-songs-count]'),
      albumsList: document.querySelector('[data-component=artist-albums-list]'),
      albumsStateMessage: document.querySelector('[data-populate=albums-state-message]'),
      topSongsList: document.querySelector('[data-component=artist-top-songs-list]'),
      topSongsStateMessage: document.querySelector('[data-populate=top-songs-state-message]'),
      albumSortSelect: document.querySelector('[data-action=album-sort-change]'),
      albumYearInput: document.querySelector('[data-action=album-year-change]'),
      songSortSelect: document.querySelector('[data-action=song-sort-change]'),
      statusContainer: document.querySelector('[data-component=artist-error-and-loading-handler]'),
      loadingMessage: document.querySelector('[data-populate=global-loading]'),
      errorContainer: document.querySelector('[data-populate=global-error]'),
      errorText: document.querySelector('[data-populate=global-error-text]'),
      retryButton: document.querySelector('[data-action=retry-load-artist]'),
      albumsSection: document.querySelector('.artist-albums-section'),
      topSongsSection: document.querySelector('.artist-top-songs-section')
    };

    function readUrlState() {
      var params = new URLSearchParams(window.location.search);
      return {
        artistId: params.get('artistId'),
        albumSort: params.get('albumSort') || 'year_desc',
        albumYear: params.get('albumYear'),
        songSort: params.get('songSort') || 'popularity_desc'
      };
    }

    function updateUrlParam(key, value) {
      var params = new URLSearchParams(window.location.search);
      if (value === null || value === undefined || value === '') {
        params.delete(key);
      } else {
        params.set(key, value);
      }
      var newQuery = params.toString();
      var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
      window.history.replaceState(null, '', newUrl);
    }

    function setLoading(isLoading) {
      state.loading = isLoading;
      renderStatus();
    }

    function setError(message) {
      state.error = message;
      renderStatus();
    }

    function syncControlsFromState() {
      if (dom.albumSortSelect) {
        dom.albumSortSelect.value = state.albumSort;
      }
      if (dom.albumYearInput) {
        dom.albumYearInput.value = state.albumYear || '';
      }
      if (dom.songSortSelect) {
        dom.songSortSelect.value = state.songSort;
      }
    }

    function fetchArtistDetail() {
      if (!state.artistId) {
        state.artist = null;
        state.albumsBase = [];
        state.topSongsBase = [];
        setLoading(false);
        setError('No artist selected. Use the Artists directory to choose an artist.');
        renderAll();
        return;
      }

      try {
        setLoading(true);
        setError(null);
        var result = WebsiteSDK.getArtistDetail(state.artistId);
        state.artist = result && result.artist ? result.artist : null;
        state.albumsBase = result && result.albums ? result.albums : [];
        state.topSongsBase = result && result.topSongs ? result.topSongs : [];

        if (!state.artist) {
          state.albumsBase = [];
          state.topSongsBase = [];
          setError('Artist not found or unavailable.');
        }
      } catch (e) {
        state.artist = null;
        state.albumsBase = [];
        state.topSongsBase = [];
        setError('Unable to load artist details. Please try again.');
      } finally {
        setLoading(false);
        renderAll();
      }
    }

    function deriveAlbumsView() {
      var view = state.albumsBase.slice(0);
      var yearFilter = null;
      if (state.albumYear) {
        var parsed = parseInt(state.albumYear, 10);
        if (!isNaN(parsed)) {
          yearFilter = parsed;
        }
      }
      if (yearFilter !== null) {
        view = view.filter(function(album) {
          return album && album.releaseYear === yearFilter;
        });
      }
      if (state.albumSort === 'year_asc') {
        view.sort(function(a, b) {
          return a.releaseYear - b.releaseYear;
        });
      } else if (state.albumSort === 'title_asc') {
        view.sort(function(a, b) {
          return String(a.title || '').localeCompare(String(b.title || ''));
        });
      } else {
        view.sort(function(a, b) {
          return b.releaseYear - a.releaseYear;
        });
      }
      return view;
    }

    function deriveTopSongsView() {
      var view = state.topSongsBase.slice(0);
      if (state.songSort === 'year_asc') {
        view.sort(function(a, b) {
          return a.releaseYear - b.releaseYear;
        });
      } else if (state.songSort === 'year_desc') {
        view.sort(function(a, b) {
          return b.releaseYear - a.releaseYear;
        });
      } else {
        view.sort(function(a, b) {
          var aScore = typeof a.popularityScore === 'number' ? a.popularityScore : 0;
          var bScore = typeof b.popularityScore === 'number' ? b.popularityScore : 0;
          return bScore - aScore;
        });
      }
      return view;
    }

    function renderStatus() {
      if (!dom.statusContainer) {
        return;
      }
      if (dom.loadingMessage) {
        dom.loadingMessage.hidden = !state.loading;
      }
      if (dom.errorContainer) {
        var hasError = !!state.error;
        dom.errorContainer.hidden = !hasError;
        if (dom.errorText) {
          dom.errorText.textContent = state.error || '';
        }
      }

      var hideContent = !!state.error || state.loading;
      if (dom.artistHeaderSection) {
        dom.artistHeaderSection.hidden = hideContent && !state.artist;
      }
      if (dom.albumsSection) {
        dom.albumsSection.hidden = hideContent && !state.artist;
      }
      if (dom.topSongsSection) {
        dom.topSongsSection.hidden = hideContent && !state.artist;
      }
    }

    function renderArtistHeader() {
      if (!dom.artistHeaderSection) {
        return;
      }
      if (!state.artist) {
        dom.artistHeaderSection.hidden = true;
        return;
      }
      dom.artistHeaderSection.hidden = false;
      if (dom.artistName) {
        dom.artistName.textContent = state.artist.name || '';
      }
      if (dom.artistPrimaryLanguage) {
        var lang = state.artist.primaryLanguage || '';
        dom.artistPrimaryLanguage.textContent = lang ? 'Primary language: ' + lang : '';
        dom.artistPrimaryLanguage.hidden = !lang;
      }
      if (dom.artistPopularity) {
        var score = state.artist.popularityScore;
        if (typeof score === 'number') {
          dom.artistPopularity.textContent = 'Popularity: ' + score;
          dom.artistPopularity.hidden = false;
        } else {
          dom.artistPopularity.textContent = '';
          dom.artistPopularity.hidden = true;
        }
      }
      if (dom.artistDescription) {
        var desc = state.artist.description || '';
        dom.artistDescription.textContent = desc;
        dom.artistDescription.hidden = !desc;
      }
      if (dom.artistImage) {
        var url = state.artist.imageUrl;
        dom.artistImage.innerHTML = '';
        if (url) {
          var img = document.createElement('img');
          img.src = url;
          img.alt = state.artist.name || 'Artist image';
          img.className = 'artist-avatar-img';
          dom.artistImage.appendChild(img);
        } else {
          var placeholder = document.createElement('div');
          placeholder.className = 'artist-avatar-placeholder';
          placeholder.textContent = (state.artist.name || '?').charAt(0).toUpperCase();
          dom.artistImage.appendChild(placeholder);
        }
      }
    }

    function renderAlbumsSection() {
      var albumsView = deriveAlbumsView();
      if (dom.albumsCount) {
        var count = state.albumsBase.length;
        dom.albumsCount.textContent = count ? count + ' album' + (count === 1 ? '' : 's') : 'No albums';
      }
      if (!dom.albumsList || !dom.albumsStateMessage) {
        return;
      }
      dom.albumsList.innerHTML = '';
      dom.albumsStateMessage.hidden = true;

      if (state.loading) {
        dom.albumsStateMessage.textContent = 'Loading albums...';
        dom.albumsStateMessage.hidden = false;
        return;
      }
      if (state.error) {
        dom.albumsStateMessage.textContent = '';
        dom.albumsStateMessage.hidden = true;
        return;
      }
      if (!state.artist) {
        dom.albumsStateMessage.textContent = '';
        dom.albumsStateMessage.hidden = true;
        return;
      }
      if (!albumsView.length) {
        dom.albumsStateMessage.textContent = 'No albums to show for the selected filters.';
        dom.albumsStateMessage.hidden = false;
        return;
      }

      albumsView.forEach(function(album) {
        var item = document.createElement('li');
        item.className = 'album-item';
        item.dataset.albumId = album.id;

        var left = document.createElement('div');
        left.className = 'album-media';

        var thumb = document.createElement('div');
        thumb.className = 'album-thumb';
        if (album.coverImageUrl) {
          var img = document.createElement('img');
          img.src = album.coverImageUrl;
          img.alt = (album.title || 'Album') + ' cover';
          img.className = 'album-thumb-img';
          thumb.appendChild(img);
        } else {
          var placeholder = document.createElement('div');
          placeholder.className = 'album-thumb-placeholder';
          placeholder.textContent = (album.title || '?').charAt(0).toUpperCase();
          thumb.appendChild(placeholder);
        }
        left.appendChild(thumb);

        var center = document.createElement('div');
        center.className = 'album-meta';
        var titleEl = document.createElement('div');
        titleEl.className = 'album-title';
        titleEl.textContent = album.title || '';
        center.appendChild(titleEl);

        var metaLine = document.createElement('div');
        metaLine.className = 'album-meta-line';
        var yearSpan = document.createElement('span');
        yearSpan.className = 'album-year';
        yearSpan.textContent = album.releaseYear ? String(album.releaseYear) : '';
        metaLine.appendChild(yearSpan);

        if (album.genre) {
          if (album.releaseYear) {
            var dot = document.createElement('span');
            dot.className = 'meta-divider';
            dot.textContent = ' • ';
            metaLine.appendChild(dot);
          }
          var genreSpan = document.createElement('span');
          genreSpan.className = 'album-genre';
          genreSpan.textContent = album.genre;
          metaLine.appendChild(genreSpan);
        }

        center.appendChild(metaLine);

        var right = document.createElement('div');
        right.className = 'album-actions';
        var viewLabel = document.createElement('span');
        viewLabel.className = 'album-view-label';
        viewLabel.textContent = 'View album';
        right.appendChild(viewLabel);

        item.appendChild(left);
        item.appendChild(center);
        item.appendChild(right);

        dom.albumsList.appendChild(item);
      });
    }

    function formatDuration(seconds) {
      if (typeof seconds !== 'number' || isNaN(seconds) || seconds < 0) {
        return '';
      }
      var mins = Math.floor(seconds / 60);
      var secs = Math.round(seconds % 60);
      return mins + ':' + (secs < 10 ? '0' + secs : secs);
    }

    function renderTopSongsSection() {
      var songsView = deriveTopSongsView();
      if (dom.topSongsCount) {
        var count = state.topSongsBase.length;
        dom.topSongsCount.textContent = count ? count + ' song' + (count === 1 ? '' : 's') : 'No top songs';
      }
      if (!dom.topSongsList || !dom.topSongsStateMessage) {
        return;
      }
      dom.topSongsList.innerHTML = '';
      dom.topSongsStateMessage.hidden = true;

      if (state.loading) {
        dom.topSongsStateMessage.textContent = 'Loading top songs...';
        dom.topSongsStateMessage.hidden = false;
        return;
      }
      if (state.error) {
        dom.topSongsStateMessage.textContent = '';
        dom.topSongsStateMessage.hidden = true;
        return;
      }
      if (!state.artist) {
        dom.topSongsStateMessage.textContent = '';
        dom.topSongsStateMessage.hidden = true;
        return;
      }
      if (!songsView.length) {
        dom.topSongsStateMessage.textContent = 'No top songs to show.';
        dom.topSongsStateMessage.hidden = false;
        return;
      }

      songsView.forEach(function(song) {
        var item = document.createElement('li');
        item.className = 'song-item';
        item.dataset.songId = song.id;

        var left = document.createElement('div');
        left.className = 'song-media';

        var thumb = document.createElement('div');
        thumb.className = 'song-thumb';
        var thumbInner = document.createElement('div');
        thumbInner.className = 'song-thumb-placeholder';
        thumbInner.textContent = (song.title || '?').charAt(0).toUpperCase();
        thumb.appendChild(thumbInner);
        left.appendChild(thumb);

        var center = document.createElement('div');
        center.className = 'song-meta';
        var titleEl = document.createElement('div');
        titleEl.className = 'song-title';
        titleEl.textContent = song.title || '';
        center.appendChild(titleEl);

        var metaLine = document.createElement('div');
        metaLine.className = 'song-meta-line';

        if (song.releaseYear) {
          var yearSpan = document.createElement('span');
          yearSpan.className = 'song-year';
          yearSpan.textContent = String(song.releaseYear);
          metaLine.appendChild(yearSpan);
        }

        if (song.isExplicit) {
          if (song.releaseYear) {
            var dot = document.createElement('span');
            dot.className = 'meta-divider';
            dot.textContent = ' • ';
            metaLine.appendChild(dot);
          }
          var explicitSpan = document.createElement('span');
          explicitSpan.className = 'song-explicit';
          explicitSpan.textContent = 'Explicit';
          metaLine.appendChild(explicitSpan);
        }

        if (song.hasTranslations) {
          if (song.releaseYear || song.isExplicit) {
            var dot2 = document.createElement('span');
            dot2.className = 'meta-divider';
            dot2.textContent = ' • ';
            metaLine.appendChild(dot2);
          }
          var translationsSpan = document.createElement('span');
          translationsSpan.className = 'song-has-translations';
          translationsSpan.textContent = 'Translations available';
          metaLine.appendChild(translationsSpan);
        }

        center.appendChild(metaLine);

        var right = document.createElement('div');
        right.className = 'song-actions';

        var durationSpan = document.createElement('span');
        durationSpan.className = 'song-duration';
        durationSpan.textContent = formatDuration(song.durationSeconds);
        right.appendChild(durationSpan);

        if (typeof song.popularityScore === 'number') {
          var popularitySpan = document.createElement('span');
          popularitySpan.className = 'song-popularity';
          popularitySpan.textContent = String(song.popularityScore);
          right.appendChild(popularitySpan);
        }

        item.appendChild(left);
        item.appendChild(center);
        item.appendChild(right);

        dom.topSongsList.appendChild(item);
      });
    }

    function renderAll() {
      renderStatus();
      renderArtistHeader();
      renderAlbumsSection();
      renderTopSongsSection();
    }

    function handleAlbumSortChange(event) {
      state.albumSort = event.target.value || 'year_desc';
      updateUrlParam('albumSort', state.albumSort);
      renderAlbumsSection();
    }

    function handleAlbumYearChange(event) {
      var value = event.target.value.trim();
      state.albumYear = value || null;
      updateUrlParam('albumYear', state.albumYear);
      renderAlbumsSection();
    }

    function handleSongSortChange(event) {
      state.songSort = event.target.value || 'popularity_desc';
      updateUrlParam('songSort', state.songSort);
      renderTopSongsSection();
    }

    function handleAlbumsListClick(event) {
      var item = event.target.closest('.album-item');
      if (!item || !item.dataset.albumId) {
        return;
      }
      var albumId = item.dataset.albumId;
      window.location.href = 'album.html?albumId=' + encodeURIComponent(albumId);
    }

    function handleTopSongsListClick(event) {
      var item = event.target.closest('.song-item');
      if (!item || !item.dataset.songId) {
        return;
      }
      var songId = item.dataset.songId;
      window.location.href = 'song.html?songId=' + encodeURIComponent(songId);
    }

    function handleRetryClick() {
      state.error = null;
      renderStatus();
      fetchArtistDetail();
    }

    function bindEventHandlers() {
      if (dom.albumSortSelect) {
        dom.albumSortSelect.addEventListener('change', handleAlbumSortChange);
      }
      if (dom.albumYearInput) {
        dom.albumYearInput.addEventListener('change', handleAlbumYearChange);
      }
      if (dom.songSortSelect) {
        dom.songSortSelect.addEventListener('change', handleSongSortChange);
      }
      if (dom.albumsList) {
        dom.albumsList.addEventListener('click', handleAlbumsListClick);
      }
      if (dom.topSongsList) {
        dom.topSongsList.addEventListener('click', handleTopSongsListClick);
      }
      if (dom.retryButton) {
        dom.retryButton.addEventListener('click', handleRetryClick);
      }
    }

    function handlePopState() {
      var urlState = readUrlState();
      var previousArtistId = state.artistId;
      state.artistId = urlState.artistId;
      state.albumSort = urlState.albumSort || 'year_desc';
      state.albumYear = urlState.albumYear;
      state.songSort = urlState.songSort || 'popularity_desc';
      syncControlsFromState();
      if (state.artistId !== previousArtistId) {
        fetchArtistDetail();
      } else {
        renderAll();
      }
    }

    function init() {
      var urlState = readUrlState();
      state.artistId = urlState.artistId;
      state.albumSort = urlState.albumSort || 'year_desc';
      state.albumYear = urlState.albumYear;
      state.songSort = urlState.songSort || 'popularity_desc';
      syncControlsFromState();
      bindEventHandlers();
      window.addEventListener('popstate', handlePopState);
      fetchArtistDetail();
    }

    init();
  });
  </script>
</body>
</html>
