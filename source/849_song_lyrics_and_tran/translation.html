<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>Lyrics &amp; Translations</title>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet' />
  <link rel='stylesheet' href='styles.css' />
  <link rel='stylesheet' href='translation.css' />
</head>
<body class='app-body'>
  <div class='app-shell'>
    <!-- Persistent dark sidebar navigation -->
    <aside class='sidebar' aria-label='Primary'>
      <div class='sidebar-brand'>
        <a href='index.html' title='Homepage with featured songs and quick search' class='brand-link'>
          <span class='brand-mark'>LT</span>
        </a>
      </div>

      <nav class='sidebar-nav'>
        <ul class='sidebar-nav-list'>
          <li class='nav-item nav-item-home active'>
            <a href='index.html' title='Homepage with featured songs and quick search'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Home</span>
            </a>
          </li>
          <li class='nav-item nav-item-browse'>
            <a href='search.html' title='Search and filter songs by language, genre, year, difficulty, and more'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Browse Songs</span>
            </a>
          </li>
          <li class='nav-item nav-item-lyrics-search'>
            <a href='lyrics_search.html' title='Find songs by searching for words or phrases in their lyrics'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Lyrics Search</span>
            </a>
          </li>
          <li class='nav-item nav-item-artists'>
            <a href='artists.html' title='Browse and search for artists, then view their albums and songs'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Artists</span>
            </a>
          </li>
          <li class='nav-item nav-item-playlists'>
            <a href='playlists.html' title='View and manage your playlists, including study lists like &quot;French Study&quot;'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Playlists</span>
            </a>
          </li>
          <li class='nav-item nav-item-vocabulary'>
            <a href='vocabulary.html' title='Manage your vocabulary lists built from song lyrics'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Vocabulary</span>
            </a>
          </li>
          <li class='nav-item nav-item-saved'>
            <a href='library.html' title='Access bookmarked songs and favorite translations'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Saved</span>
            </a>
          </li>
          <li class='nav-item nav-item-settings'>
            <a href='settings.html' title='Change content preferences, language defaults, and display options'>
              <span class='nav-indicator' aria-hidden='true'></span>
              <span class='nav-label'>Settings</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main column: top header, page content, footer -->
    <div class='main-column'>
      <header class='topbar' role='banner'>
        <div class='topbar-left'>
          <form class='topbar-search' action='lyrics_search.html' method='get' role='search'>
            <label class='visually-hidden' for='site-search'>Search lyrics</label>
            <input
              id='site-search'
              name='q'
              type='search'
              placeholder='Search songs, artists, or lyrics...'
              autocomplete='off'
            />
          </form>
        </div>
        <div class='topbar-right'>
          <div class='language-switch' aria-label='Display language'>
            <span class='language language-active'>EN</span>
            <span class='language-divider'>/</span>
            <span class='language'>Other</span>
          </div>
        </div>
      </header>

      <main id='content' class='page-content' role='main'>
        <div class='translation-detail-page' data-populate='translation-detail'>
          <!-- Translation header band -->
          <section
            class='translation-header-band'
            data-component='translation-header'
            aria-label='Translation header'
          >
            <div class='translation-header-inner translation-header-empty'>
              <div class='header-left'>
                <h1 class='translation-title'>Translation detail</h1>
                <p class='translation-subtitle'>Loading translation...</p>
              </div>
              <div class='header-right'></div>
            </div>
          </section>

          <!-- Status messages band -->
          <section
            class='translation-status-band'
            data-component='translation-status-messages'
            aria-live='polite'
            aria-atomic='true'
          ></section>

          <!-- Navigation strip (back to song, etc.) -->
          <nav
            class='translation-nav-strip'
            data-component='translation-navigation'
            aria-label='Translation navigation'
          ></nav>

          <!-- Bilingual lyrics alignment view -->
          <section
            class='lyrics-alignment-section'
            data-component='lyrics-alignment-view'
            aria-label='Lyrics translation view'
          ></section>

          <!-- Data loader overlay -->
          <aside
            class='translation-loader-overlay'
            data-component='translation-data-loader'
            aria-hidden='true'
          >
            <div class='loader-inner'>
              <div class='loader-spinner'></div>
              <p class='loader-text'>Loading translation...</p>
            </div>
          </aside>
        </div>
      </main>

      <footer class='site-footer'>
        <div class='footer-inner'>
          <nav class='footer-nav' aria-label='Footer'>
            <a href='about.html' title='Learn more about this lyrics and translations site'>About</a>
            <a href='help.html' title='Get help with searching, playlists, vocabulary, and other features'>Help / FAQ</a>
            <a href='contact.html' title='Send feedback, report issues, or ask questions'>Contact</a>
            <a href='legal.html' title='View terms of use and privacy information'>Legal</a>
          </nav>
          <div class='footer-meta'>
            <span class='footer-copy'>&copy; 2026 Lyrics &amp; Translations.</span>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src='business_logic.js'></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    'use strict';

    const pageState = {
      translationId: null,
      song: null,
      translation: null,
      alignedSections: null,
      isFavorite: false,
      isDefault: false,
      loading: false,
      status: null,
      displayMode: 'bilingual_side_by_side',
      localVoteDelta: 0
    };

    const urlParams = new URLSearchParams(window.location.search);
    const translationId = urlParams.get('translationId');
    pageState.translationId = translationId;

    const pageContainer = document.querySelector('.translation-detail-page');
    if (!pageContainer) {
      return;
    }

    const headerEl = pageContainer.querySelector('[data-component=translation-header]');
    const statusEl = pageContainer.querySelector('[data-component=translation-status-messages]');
    const navEl = pageContainer.querySelector('[data-component=translation-navigation]');
    const lyricsEl = pageContainer.querySelector('[data-component=lyrics-alignment-view]');
    const loaderEl = pageContainer.querySelector('[data-component=translation-data-loader]');

    function escapeHtml(value) {
      if (value === null || value === undefined) {
        return '';
      }
      const text = String(value);
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/'/g, '&#39;');
    }

    function formatLanguage(lang) {
      if (!lang) {
        return '';
      }
      const map = {
        english: 'English',
        japanese: 'Japanese',
        french: 'French',
        spanish: 'Spanish',
        italian: 'Italian',
        korean: 'Korean',
        german: 'German',
        other: 'Other'
      };
      if (Object.prototype.hasOwnProperty.call(map, lang)) {
        return map[lang];
      }
      return lang;
    }

    function formatDate(value) {
      if (!value) {
        return '';
      }
      try {
        const date = new Date(value);
        if (isNaN(date.getTime())) {
          return '';
        }
        return date.toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      } catch (error) {
        return '';
      }
    }

    function renderRatingStars(rating) {
      if (typeof rating !== 'number' || !isFinite(rating) || rating <= 0) {
        return '';
      }
      const rounded = Math.round(rating);
      let stars = '';
      for (let i = 0; i < 5; i += 1) {
        stars += i < rounded ? '★' : '☆';
      }
      return '<span class=\'stars\' aria-hidden=\'true\'>' + stars + '</span>';
    }

    function renderLoader(container, state) {
      if (!container) {
        return;
      }
      if (!state.loading) {
        container.classList.remove('is-active');
        container.setAttribute('aria-hidden', 'true');
        return;
      }
      container.classList.add('is-active');
      container.setAttribute('aria-hidden', 'false');
      container.innerHTML = `
        <div class='loader-inner'>
          <div class='loader-spinner'></div>
          <p class='loader-text'>Loading translation…</p>
        </div>
      `;
    }

    function renderStatus(container, state) {
      if (!container) {
        return;
      }
      if (!state.status) {
        container.innerHTML = '';
        container.classList.remove('has-message');
        container.style.display = 'none';
        return;
      }
      const type = state.status.type || 'info';
      const text = state.status.text || '';
      container.classList.add('has-message');
      container.style.display = '';
      container.innerHTML = `
        <div class='status-message status-${type}'>
          <p class='status-text'>${escapeHtml(text)}</p>
        </div>
      `;
    }

    function renderNavigation(container, state) {
      if (!container) {
        return;
      }
      if (!state.song || !state.song.id) {
        container.innerHTML = `
          <div class='translation-nav-inner'>
            <div class='nav-left'>
              <button type='button' class='text-link back-to-song-link' disabled aria-disabled='true'>Back to song</button>
            </div>
            <div class='nav-right'></div>
          </div>
        `;
        return;
      }
      container.innerHTML = `
        <div class='translation-nav-inner'>
          <div class='nav-left'>
            <button type='button' class='text-link back-to-song-link' data-action='back-to-song'>← Back to song</button>
          </div>
          <div class='nav-right'></div>
        </div>
      `;
    }

    function renderHeader(container, state) {
      if (!container) {
        return;
      }
      const song = state.song;
      const translation = state.translation;
      if (!song || !translation) {
        container.innerHTML = `
          <div class='translation-header-inner translation-header-empty'>
            <div class='header-left'>
              <h1 class='translation-title'>Translation detail</h1>
              <p class='translation-subtitle'>No translation loaded.</p>
            </div>
            <div class='header-right'></div>
          </div>
        `;
        return;
      }

      const isDefault = state.isDefault === true;
      const upvoted = state.localVoteDelta === 1;
      const downvoted = state.localVoteDelta === -1;
      const favoriteClass = state.isFavorite ? 'favorite-toggle is-active' : 'favorite-toggle';
      const favoriteLabel = state.isFavorite ? 'Favorited' : 'Add to favorites';
      const ratingValue = typeof translation.rating === 'number' && isFinite(translation.rating)
        ? translation.rating.toFixed(1)
        : '–';
      const votesLabel = typeof translation.ratingVotes === 'number'
        ? translation.ratingVotes + ' votes'
        : 'No votes';
      const createdLabel = formatDate(translation.createdAt);
      const languagePair = formatLanguage(song.originalLanguage) + ' → ' + formatLanguage(translation.translationLanguage);
      const ratingStarsHtml = renderRatingStars(translation.rating);
      const upvoteCount = typeof translation.upvoteCount === 'number' ? translation.upvoteCount : 0;
      const downvoteCount = typeof translation.downvoteCount === 'number' ? translation.downvoteCount : 0;

      const translatorHtml = translation.translatorName
        ? "<span class='translator-name'> · Translation by " + escapeHtml(translation.translatorName) + '</span>'
        : '';

      const createdHtml = createdLabel
        ? "<span class='translation-created'>Added " + escapeHtml(createdLabel) + '</span>'
        : '';

      let defaultButtonHtml = '';
      if (isDefault) {
        defaultButtonHtml = "<button type='button' class='default-toggle is-current' disabled aria-disabled='true'>Current default</button>";
      } else {
        defaultButtonHtml = "<button type='button' class='default-toggle' data-action='set-default'>Set as default</button>";
      }

      container.innerHTML = `
        <div class='translation-header-inner'>
          <div class='header-left'>
            <div class='song-meta'>
              <button type='button' class='song-title-button' data-action='back-to-song'>
                ${escapeHtml(song.title)}
              </button>
              <div class='song-meta-line'>
                <span class='song-language-pair'>${escapeHtml(languagePair)}</span>
                ${translatorHtml}
              </div>
            </div>
            <div class='translation-meta'>
              ${createdHtml}
            </div>
          </div>
          <div class='header-right'>
            <div class='rating-toggle-cluster'>
              <div class='rating-summary' data-component='rating-summary'>
                <div class='rating-main'>
                  <span class='rating-value'>${ratingValue}</span>
                  ${ratingStarsHtml}
                  <span class='rating-votes'>(${escapeHtml(votesLabel)})</span>
                </div>
                <div class='rating-vote-buttons'>
                  <button
                    type='button'
                    class='icon-button upvote-button${upvoted ? ' is-active' : ''}'
                    data-action='upvote-local'
                    aria-label='Upvote this translation'
                  >
                    <span class='vote-arrow'>▲</span>
                    <span class='vote-count'>${upvoteCount}</span>
                  </button>
                  <button
                    type='button'
                    class='icon-button downvote-button${downvoted ? ' is-active' : ''}'
                    data-action='downvote-local'
                    aria-label='Downvote this translation'
                  >
                    <span class='vote-arrow'>▼</span>
                    <span class='vote-count'>${downvoteCount}</span>
                  </button>
                </div>
              </div>
              <div class='favorite-default-controls'>
                <button
                  type='button'
                  class='${favoriteClass}'
                  data-action='toggle-favorite'
                  aria-pressed='${state.isFavorite ? 'true' : 'false'}'
                >
                  <span class='favorite-icon'>${state.isFavorite ? '♥' : '♡'}</span>
                  <span class='favorite-label'>${favoriteLabel}</span>
                </button>
                ${defaultButtonHtml}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function buildAlignedSectionsHtml(alignedSections, mode) {
      if (!alignedSections || !Array.isArray(alignedSections) || alignedSections.length === 0) {
        return '';
      }
      let html = '';
      const showOriginal = mode !== 'translation_only';
      const showTranslation = mode !== 'original_only';

      alignedSections.forEach(function(section, index) {
        const sectionType = section && section.sectionType ? section.sectionType : '';
        const sectionIndex = section && typeof section.sectionIndex === 'number' ? section.sectionIndex : index + 1;
        const originalLines = section && Array.isArray(section.originalLines) ? section.originalLines : [];
        const translatedLines = section && Array.isArray(section.translatedLines) ? section.translatedLines : [];
        const maxLines = Math.max(originalLines.length, translatedLines.length);

        let sectionLabel = '';
        if (sectionType) {
          sectionLabel = sectionType.charAt(0).toUpperCase() + sectionType.slice(1) + ' ' + sectionIndex;
        }

        html += `
          <section class='lyrics-section'>
            ${sectionLabel ? "<header class='lyrics-section-header'><h3 class='lyrics-section-title'>" + escapeHtml(sectionLabel) + '</h3></header>' : ''}
            <div class='lyrics-section-body'>
        `;

        if (mode === 'bilingual_side_by_side' && showOriginal && showTranslation) {
          html += `
            <div class='lyrics-row lyrics-row-header'>
              <div class='lyrics-cell lyrics-original-heading'>Original</div>
              <div class='lyrics-cell lyrics-translation-heading'>Translation</div>
            </div>
          `;
        }

        for (let i = 0; i < maxLines; i += 1) {
          const originalLine = originalLines[i] || '';
          const translatedLine = translatedLines[i] || '';
          html += "<div class='lyrics-row'>";

          if (mode === 'bilingual_side_by_side') {
            html += "<div class='lyrics-cell lyrics-original'><div class='lyrics-text'>" + escapeHtml(originalLine) + '</div></div>';
            html += "<div class='lyrics-cell lyrics-translation'><div class='lyrics-text'>" + escapeHtml(translatedLine) + '</div></div>';
          } else if (mode === 'original_only' && showOriginal) {
            html += "<div class='lyrics-cell lyrics-original-full'><div class='lyrics-text'>" + escapeHtml(originalLine) + '</div></div>';
          } else if (mode === 'translation_only' && showTranslation) {
            html += "<div class='lyrics-cell lyrics-translation-full'><div class='lyrics-text'>" + escapeHtml(translatedLine) + '</div></div>';
          }

          html += '</div>';
        }

        html += `
            </div>
          </section>
        `;
      });

      return html;
    }

    function renderLyrics(container, state) {
      if (!container) {
        return;
      }
      const song = state.song;
      const translation = state.translation;

      if (!song || !translation) {
        container.innerHTML = `
          <div class='lyrics-alignment-inner lyrics-empty'>
            <header class='lyrics-view-header'>
              <h2 class='lyrics-view-heading'>Lyrics &amp; translation</h2>
            </header>
            <div class='lyrics-view-body'>
              <p class='lyrics-empty-text'>Translation data is not available.</p>
            </div>
          </div>
        `;
        return;
      }

      const mode = state.displayMode || 'bilingual_side_by_side';
      const originalTitle = 'Original lyrics';
      const translationTitle = 'Translation';
      let bodyHtml = '';

      if (state.alignedSections && Array.isArray(state.alignedSections) && state.alignedSections.length > 0) {
        bodyHtml = buildAlignedSectionsHtml(state.alignedSections, mode);
      } else {
        const originalText = song.lyricsPlainText || '';
        const translationText = translation.text || '';

        if (mode === 'bilingual_side_by_side') {
          bodyHtml = `
            <div class='lyrics-fallback-grid'>
              <section class='lyrics-fallback-column'>
                <header class='lyrics-section-header'>
                  <h3 class='lyrics-section-title'>${escapeHtml(originalTitle)}</h3>
                </header>
                <div class='lyrics-text'>${escapeHtml(originalText)}</div>
              </section>
              <section class='lyrics-fallback-column'>
                <header class='lyrics-section-header'>
                  <h3 class='lyrics-section-title'>${escapeHtml(translationTitle)}</h3>
                </header>
                <div class='lyrics-text'>${escapeHtml(translationText)}</div>
              </section>
            </div>
          `;
        } else if (mode === 'original_only') {
          bodyHtml = `
            <section class='lyrics-section'>
              <header class='lyrics-section-header'>
                <h3 class='lyrics-section-title'>${escapeHtml(originalTitle)}</h3>
              </header>
              <div class='lyrics-text'>${escapeHtml(originalText)}</div>
            </section>
          `;
        } else if (mode === 'translation_only') {
          bodyHtml = `
            <section class='lyrics-section'>
              <header class='lyrics-section-header'>
                <h3 class='lyrics-section-title'>${escapeHtml(translationTitle)}</h3>
              </header>
              <div class='lyrics-text'>${escapeHtml(translationText)}</div>
            </section>
          `;
        }
      }

      const modeButtonsHtml = `
        <div class='display-mode-toggle' role='tablist' aria-label='Lyrics display mode'>
          <button
            type='button'
            class='display-mode-button${mode === 'bilingual_side_by_side' ? ' is-active' : ''}'
            data-action='set-display-mode'
            data-mode='bilingual_side_by_side'
          >
            Original &amp; Translation
          </button>
          <button
            type='button'
            class='display-mode-button${mode === 'original_only' ? ' is-active' : ''}'
            data-action='set-display-mode'
            data-mode='original_only'
          >
            Original only
          </button>
          <button
            type='button'
            class='display-mode-button${mode === 'translation_only' ? ' is-active' : ''}'
            data-action='set-display-mode'
            data-mode='translation_only'
          >
            Translation only
          </button>
        </div>
      `;

      container.innerHTML = `
        <div class='lyrics-alignment-inner'>
          <header class='lyrics-view-header'>
            <div class='lyrics-view-title'>
              <h2 class='lyrics-view-heading'>Lyrics &amp; translation</h2>
              <p class='lyrics-view-subtitle'>${escapeHtml(song.title)}</p>
            </div>
            <div class='lyrics-view-controls'>
              ${modeButtonsHtml}
            </div>
          </header>
          <div class='lyrics-view-body'>
            ${bodyHtml}
          </div>
        </div>
      `;
    }

    function updateAndRender() {
      if (headerEl) {
        renderHeader(headerEl, pageState);
      }
      if (statusEl) {
        renderStatus(statusEl, pageState);
      }
      if (navEl) {
        renderNavigation(navEl, pageState);
      }
      if (lyricsEl) {
        renderLyrics(lyricsEl, pageState);
      }
      if (loaderEl) {
        renderLoader(loaderEl, pageState);
      }
      bindActions(pageContainer);
    }

    function setLoading(isLoading) {
      pageState.loading = isLoading;
    }

    function setStatus(type, text) {
      if (type && text) {
        pageState.status = { type: type, text: text };
      } else {
        pageState.status = null;
      }
    }

    function handleBackToSong() {
      if (!pageState.song || !pageState.song.id) {
        setStatus('error', 'Song information is not available for navigation.');
        updateAndRender();
        return;
      }
      const targetUrl = 'song.html?songId=' + encodeURIComponent(pageState.song.id);
      window.location.href = targetUrl;
    }

    function handleSetDisplayMode(mode) {
      if (!mode) {
        return;
      }
      if (mode !== 'original_only' && mode !== 'translation_only' && mode !== 'bilingual_side_by_side') {
        return;
      }
      if (pageState.displayMode === mode) {
        return;
      }
      pageState.displayMode = mode;
      updateAndRender();
    }

    function handleLocalVote(delta) {
      if (delta === 1) {
        pageState.localVoteDelta = pageState.localVoteDelta === 1 ? 0 : 1;
      } else if (delta === -1) {
        pageState.localVoteDelta = pageState.localVoteDelta === -1 ? 0 : -1;
      }
      updateAndRender();
    }

    function handleToggleFavorite() {
      if (!pageState.translation || !pageState.translation.id) {
        setStatus('error', 'Cannot update favorites because translation information is missing.');
        updateAndRender();
        return;
      }

      setLoading(true);
      updateAndRender();

      try {
        if (!pageState.isFavorite) {
          const response = WebsiteSDK.addTranslationToFavorites(pageState.translation.id);
          if (response && response.success) {
            pageState.isFavorite = true;
            setStatus('success', response.message || 'Added to favorites.');
          } else {
            const message = response && response.message ? response.message : 'Could not add to favorites.';
            setStatus('error', message);
          }
        } else {
          const response = WebsiteSDK.removeFavoriteTranslation(pageState.translation.id);
          if (response && response.success) {
            pageState.isFavorite = false;
            setStatus('success', response.message || 'Removed from favorites.');
          } else {
            const message = response && response.message ? response.message : 'Could not remove from favorites.';
            setStatus('error', message);
          }
        }
      } catch (error) {
        console.error(error);
        setStatus('error', 'An unexpected error occurred while updating favorites.');
      }

      setLoading(false);
      updateAndRender();
    }

    function handleSetDefaultTranslation() {
      if (!pageState.translation || !pageState.translation.id) {
        setStatus('error', 'Cannot set default translation because translation information is missing.');
        updateAndRender();
        return;
      }
      if (pageState.isDefault) {
        return;
      }

      setLoading(true);
      updateAndRender();

      try {
        const response = WebsiteSDK.setTranslationAsDefault(pageState.translation.id);
        if (response && response.success && response.song) {
          pageState.song = response.song;
          if (pageState.song && pageState.translation && pageState.song.defaultTranslationId === pageState.translation.id) {
            pageState.isDefault = true;
          } else {
            pageState.isDefault = false;
          }
          setStatus('success', response.message || 'Set as default translation for this song.');
        } else {
          const message = response && response.message ? response.message : 'Could not set this translation as default.';
          setStatus('error', message);
        }
      } catch (error) {
        console.error(error);
        setStatus('error', 'An unexpected error occurred while setting default translation.');
      }

      setLoading(false);
      updateAndRender();
    }

    function bindActions(root) {
      if (!root) {
        return;
      }
      const actionElements = root.querySelectorAll('[data-action]');
      actionElements.forEach(function(el) {
        const action = el.getAttribute('data-action');
        if (!action) {
          return;
        }
        el.onclick = null;
        el.addEventListener('click', function(event) {
          event.preventDefault();
          if (action === 'back-to-song') {
            handleBackToSong();
          } else if (action === 'toggle-favorite') {
            handleToggleFavorite();
          } else if (action === 'set-default') {
            handleSetDefaultTranslation();
          } else if (action === 'upvote-local') {
            handleLocalVote(1);
          } else if (action === 'downvote-local') {
            handleLocalVote(-1);
          } else if (action === 'set-display-mode') {
            const mode = el.getAttribute('data-mode');
            handleSetDisplayMode(mode);
          }
        });
      });
    }

    function loadTranslationDetail(id) {
      if (!id) {
        setStatus('error', 'No translation selected. Open this page from a song or your library.');
        setLoading(false);
        updateAndRender();
        return;
      }

      setLoading(true);
      setStatus('info', 'Loading translation…');
      updateAndRender();

      try {
        const result = WebsiteSDK.getTranslationDetail(id);
        pageState.translation = result && result.translation ? result.translation : null;
        pageState.song = result && result.song ? result.song : null;
        pageState.alignedSections = result && Array.isArray(result.alignedSections) && result.alignedSections.length > 0
          ? result.alignedSections
          : null;
        pageState.isFavorite = false;
        pageState.localVoteDelta = 0;
        pageState.displayMode = 'bilingual_side_by_side';

        if (pageState.song && pageState.translation && pageState.song.defaultTranslationId === pageState.translation.id) {
          pageState.isDefault = true;
        } else {
          pageState.isDefault = false;
        }

        if (!pageState.translation || !pageState.song) {
          setStatus('error', 'Translation could not be loaded.');
        } else {
          setStatus(null, null);
        }
      } catch (error) {
        console.error(error);
        setStatus('error', 'Failed to load translation. Please try again.');
      }

      setLoading(false);
      updateAndRender();
    }

    if (!translationId) {
      setStatus('error', 'No translation selected. Open this page from a song or your library.');
      setLoading(false);
      updateAndRender();
    } else {
      loadTranslationDetail(translationId);
    }
  });
  </script>
</body>
</html>
