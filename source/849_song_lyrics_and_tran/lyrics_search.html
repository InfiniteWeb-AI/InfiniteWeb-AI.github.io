          </li>

            <a href="artists.html" title="Browse and search for artists, then view their albums and songs">
              <span class="nav-indicator" aria-hidden="true"></span>
              <span class="nav-label">Artists</span>
            </a>
          </li>
          <li class="nav-item nav-item-playlists">
            <a href="playlists.html" title="View and manage your playlists, including study lists like 'French Study'">
              <span class="nav-indicator" aria-hidden="true"></span>
              <span class="nav-label">Playlists</span>
            </a>
          </li>
          <li class="nav-item nav-item-vocabulary">
            <a href="vocabulary.html" title="Manage your vocabulary lists built from song lyrics">
              <span class="nav-indicator" aria-hidden="true"></span>
              <span class="nav-label">Vocabulary</span>

          </li>
          <li class="nav-item nav-item-saved">

              <span class="nav-indicator" aria-hidden="true"></span>

    <!-- Main column: top header, page content, footer -->
    <div class="main-column">
      <header class="topbar" role="banner">
        <div class="topbar-left">
          <form class="topbar-search" action="lyrics_search.html" method="get" role="search">
            <label class="visually-hidden" for="site-search">Search lyrics</label>
            <input
              id="site-search"
              name="q"
              type="search"
              placeholder="Search songs, artists, or lyrics..."
              autocomplete="off"
            />
          </form>
        </div>
        <div class="topbar-right">
          <div class="language-switch" aria-label="Display language">
            <span class="language language-active">EN</span>
            <span class="language-divider">/</span>
            <span class="language">Other</span>
          </div>
        </div>
      </header>

      <main id="content" class="page-content" role="main">
        <div class="lyrics-search-page" data-component="lyrics-search-controller">
          <header class="page-header">
            <h1 class="page-title">Lyrics Phrase Search</h1>
          </header>

          <!-- Search form -->
          <section class="lyrics-search-form-section" data-component="lyrics-search-form">
            <form id="lyricsSearchForm" class="lyrics-search-form" role="search" novalidate>
              <div class="lyrics-search-form-row">
                <label class="lyrics-search-label" for="lyricsPhraseInput">Lyrics contain</label>
                <div class="lyrics-search-input-group">
                  <input
                    id="lyricsPhraseInput"
                    name="phrase"
                    type="search"
                    class="lyrics-search-input"
                    placeholder="Type a phrase from the lyrics, e.g. &quot;broken heart&quot;"
                    autocomplete="off"
                    aria-label="Search songs by lyrics phrase"
                  />
                  <button
                    type="submit"
                    class="btn btn-primary lyrics-search-submit"
                    data-action="submit-search"
                  >
                    Search
                  </button>
                </div>
              </div>
            </form>
          </section>

          <!-- Filter + sort band, settings-aware wrapper -->
          <section class="filter-sort-wrapper" data-component="settings-aware-filter-wrapper">
            <div class="filter-bar" data-component="lyrics-filter-bar">
              <div class="filter-control-group">
                <label for="filterOriginalLanguage" class="filter-label">Original language</label>
                <select
                  id="filterOriginalLanguage"
                  name="originalLanguage"
                  class="filter-select"
                  data-populate="original-languages"
                  data-action="change-original-language"
                >
                  <!-- options populated via JS -->
                </select>
              </div>
              <div class="filter-control-group">
                <label for="filterGenre" class="filter-label">Genre</label>
                <select
                  id="filterGenre"
                  name="genre"
                  class="filter-select"
                  data-populate="genres"
                  data-action="change-genre"
                >
                  <!-- options populated via JS -->
                </select>
              </div>
            </div>

            <div class="sort-bar" data-component="lyrics-sort-control">
              <label for="sortSelect" class="sort-label">Sort</label>
              <select
                id="sortSelect"
                name="sort"
                class="sort-select"
                data-populate="sort-options"
                data-action="change-sort"
              >
                <!-- options populated via JS -->
              </select>
            </div>
          </section>

          <!-- Results summary -->
          <section class="results-summary" data-component="lyrics-results-summary">
            <div class="results-summary-text" data-populate="results-summary"></div>
          </section>

          <!-- Results list -->
          <section class="results-section" data-component="lyrics-results-list">
            <ul
              id="lyricsResultsList"
              class="song-list"
              data-populate="lyrics-results-list"
              aria-label="Lyrics search results"
            >
              <!-- Results rendered via JS -->
            </ul>
          </section>

          <!-- Pagination -->
          <nav
            class="pagination-bar"
            data-component="lyrics-results-pagination"
            aria-label="Lyrics search pagination"
          >
            <div class="pagination-inner" data-populate="pagination"></div>
          </nav>
        </div>
      </main>

      <footer class="site-footer">
        <div class="footer-inner">
          <nav class="footer-nav" aria-label="Footer">
            <a href="about.html" title="Learn more about this lyrics and translations site">About</a>
            <a href="help.html" title="Get help with searching, playlists, vocabulary, and other features">Help / FAQ</a>
            <a href="contact.html" title="Send feedback, report issues, or ask questions">Contact</a>
            <a href="legal.html" title="View terms of use and privacy information">Legal</a>
          </nav>
          <div class="footer-meta">
            <span class="footer-copy">&copy; 2026 Lyrics &amp; Translations.</span>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var settings = null;
      var filterOptions = null;
      var lastSearchResponse = null;
      var bookmarkState = {};

      function parseQueryFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var phrase = params.get('phrase') || '';
        var originalLanguage = params.get('originalLanguage') || '';
        var genre = params.get('genre') || '';
        var sort = params.get('sort') || '';
        var pageParam = params.get('page');
        var pageSizeParam = params.get('pageSize');
        var page = pageParam ? parseInt(pageParam, 10) : undefined;
        var pageSize = pageSizeParam ? parseInt(pageSizeParam, 10) : undefined;
        if (page && page < 1) {
          page = 1;
        }
        return {
          phrase: phrase,
          originalLanguage: originalLanguage,
          genre: genre,
          sort: sort,
          page: page,
          pageSize: pageSize
        };
      }

      function updateUrlParams(updater) {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        updater(params);
        var newQuery = params.toString();
        var newUrl = url.pathname + (newQuery ? '?' + newQuery : '');
        history.pushState(null, '', newUrl);
        handleUrlChange();
      }

      function labelFromEnumValue(value) {
        if (!value) {
          return '';
        }
        var spaced = value.replace(/_/g, ' ');
        return spaced.charAt(0).toUpperCase() + spaced.slice(1);
      }

      function formatDuration(seconds) {
        if (!seconds && seconds !== 0) {
          return '';
        }
        var total = Math.round(seconds);
        var mins = Math.floor(total / 60);
        var secs = total % 60;
        var paddedSecs = secs < 10 ? '0' + secs : String(secs);
        return mins + ':' + paddedSecs;
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function highlightPhrase(snippet, phrase) {
        if (!snippet) {
          return '';
        }
        if (!phrase) {
          return escapeHtml(snippet);
        }
        try {
          var escapedPhrase = phrase.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&');
          var regex = new RegExp(escapedPhrase, 'gi');
          var result = '';
          var lastIndex = 0;
          var match;
          while ((match = regex.exec(snippet)) !== null) {
            var before = snippet.slice(lastIndex, match.index);
            var matchText = snippet.slice(match.index, regex.lastIndex);
            result += escapeHtml(before);
            result += '<mark>' + escapeHtml(matchText) + '</mark>';
            lastIndex = regex.lastIndex;
          }
          result += escapeHtml(snippet.slice(lastIndex));
          return result;
        } catch (e) {
          return escapeHtml(snippet);
        }
      }

      function composeFilters(query) {
        var filters = {};
        if (query.originalLanguage) {
          filters.originalLanguage = query.originalLanguage;
        }
        if (query.genre) {
          filters.genre = query.genre;
        }
        if (settings && settings.showExplicitLyrics === false) {
          filters.isExplicit = false;
        }
        var hasAny = false;
        for (var key in filters) {
          if (Object.prototype.hasOwnProperty.call(filters, key)) {
            hasAny = true;
            break;
          }
        }
        return hasAny ? filters : undefined;
      }

      function renderOriginalLanguages(selectElement, languages) {
        if (!selectElement) {
          return;
        }
        selectElement.innerHTML = '';
        var defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = 'All original languages';
        selectElement.appendChild(defaultOption);
        if (!languages || !languages.length) {
          return;
        }
        for (var i = 0; i < languages.length; i++) {
          var value = languages[i];
          var option = document.createElement('option');
          option.value = value;
          option.textContent = labelFromEnumValue(value);
          selectElement.appendChild(option);
        }
      }

      function renderGenres(selectElement, genres) {
        if (!selectElement) {
          return;
        }
        selectElement.innerHTML = '';
        var defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = 'All genres';
        selectElement.appendChild(defaultOption);
        if (!genres || !genres.length) {
          return;
        }
        for (var i = 0; i < genres.length; i++) {
          var value = genres[i];
          var option = document.createElement('option');
          option.value = value;
          option.textContent = labelFromEnumValue(value);
          selectElement.appendChild(option);
        }
      }

      function renderSortOptions(selectElement, sortOptions) {
        if (!selectElement) {
          return;
        }
        selectElement.innerHTML = '';
        if (sortOptions && sortOptions.length) {
          for (var i = 0; i < sortOptions.length; i++) {
            var opt = sortOptions[i];
            var option = document.createElement('option');
            option.value = opt.value;
            option.textContent = opt.label;
            selectElement.appendChild(option);
          }
        } else {
          var option = document.createElement('option');
          option.value = '';
          option.textContent = 'Default order';
          selectElement.appendChild(option);
        }
      }

      function renderResultsSummary(container, query, searchResponse) {
        if (!container) {
          return;
        }
        var phrase = query.phrase || '';
        if (!phrase) {
          container.textContent = 'Enter a lyrics phrase above to search songs.';
          return;
        }
        var totalCount = searchResponse && typeof searchResponse.totalCount === 'number'
          ? searchResponse.totalCount
          : 0;
        var parts = [];
        if (totalCount === 0) {
          parts.push('No songs found');
        } else if (totalCount === 1) {
          parts.push('1 song found');
        } else {
          parts.push(totalCount + ' songs found');
        }
        parts.push('for "' + phrase + '"');
        if (query.originalLanguage) {
          parts.push('in ' + labelFromEnumValue(query.originalLanguage));
        }
        if (query.genre) {
          parts.push('genre ' + labelFromEnumValue(query.genre));
        }
        container.textContent = parts.join(' ');
      }

      function renderResultsList(container, results, query) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!query.phrase) {
          return;
        }
        if (!results || !results.length) {
          var empty = document.createElement('li');
          empty.className = 'song-item song-item-empty';
          empty.textContent = 'No songs match this lyrics phrase. Try adjusting your filters or phrase.';
          container.appendChild(empty);
          return;
        }
        for (var i = 0; i < results.length; i++) {
          var result = results[i];
          var song = result && result.song ? result.song : null;
          if (!song) {
            continue;
          }
          var li = document.createElement('li');
          li.className = 'song-item';

          var songId = song.id || '';
          if (songId) {
            li.dataset.songId = songId;
            li.dataset.action = 'open-song';
          }

          var row = document.createElement('div');
          row.className = 'song-item-inner';

          var thumb = document.createElement('div');
          thumb.className = 'song-thumb';
          var thumbCircle = document.createElement('div');
          thumbCircle.className = 'song-thumb-circle';
          var thumbText = document.createElement('span');
          thumbText.className = 'song-thumb-text';
          var initialSource = song.title || '';
          thumbText.textContent = initialSource ? initialSource.charAt(0).toUpperCase() : '?';
          thumbCircle.appendChild(thumbText);
          thumb.appendChild(thumbCircle);

          var main = document.createElement('div');
          main.className = 'song-main';

          var titleRow = document.createElement('div');
          titleRow.className = 'song-title-row';
          var titleSpan = document.createElement('span');
          titleSpan.className = 'song-title';
          titleSpan.textContent = song.title || 'Untitled song';
          titleRow.appendChild(titleSpan);
          main.appendChild(titleRow);

          var metaRow = document.createElement('div');
          metaRow.className = 'song-meta';
          if (typeof song.releaseYear === 'number') {
            var yearSpan = document.createElement('span');
            yearSpan.className = 'song-meta-item song-year';
            yearSpan.textContent = String(song.releaseYear);
            metaRow.appendChild(yearSpan);
          }
          if (song.originalLanguage) {
            var langSpan = document.createElement('span');
            langSpan.className = 'song-meta-item song-language';
            langSpan.textContent = labelFromEnumValue(song.originalLanguage);
            metaRow.appendChild(langSpan);
          }
          if (song.genre) {
            var genreSpan = document.createElement('span');
            genreSpan.className = 'song-meta-item song-genre';
            genreSpan.textContent = labelFromEnumValue(song.genre);
            metaRow.appendChild(genreSpan);
          }
          if (typeof song.durationSeconds === 'number') {
            var duration = formatDuration(song.durationSeconds);
            if (duration) {
              var durSpan = document.createElement('span');
              durSpan.className = 'song-meta-item song-duration';
              durSpan.textContent = duration;
              metaRow.appendChild(durSpan);
            }
          }
          if (song.isExplicit) {
            var explicitSpan = document.createElement('span');
            explicitSpan.className = 'song-meta-item song-explicit';
            explicitSpan.textContent = 'Explicit';
            metaRow.appendChild(explicitSpan);
          }
          main.appendChild(metaRow);

          var snippetRow = document.createElement('div');
          snippetRow.className = 'song-snippet';
          var snippetHtml = highlightPhrase(result.matchedSnippet || '', query.phrase || '');
          snippetRow.innerHTML = snippetHtml;
          main.appendChild(snippetRow);

          var actions = document.createElement('div');
          actions.className = 'song-actions';
          if (songId) {
            var isBookmarked = !!bookmarkState[songId];
            var bookmarkBtn = document.createElement('button');
            bookmarkBtn.type = 'button';
            bookmarkBtn.className = 'icon-button bookmark-toggle' + (isBookmarked ? ' is-bookmarked' : '');
            bookmarkBtn.dataset.action = 'toggle-bookmark';
            bookmarkBtn.dataset.songId = songId;
            bookmarkBtn.setAttribute('aria-label', isBookmarked ? 'Remove bookmark' : 'Bookmark song');
            bookmarkBtn.setAttribute('aria-pressed', isBookmarked ? 'true' : 'false');
            bookmarkBtn.textContent = isBookmarked ? '★' : '☆';
            actions.appendChild(bookmarkBtn);
          }

          row.appendChild(thumb);
          row.appendChild(main);
          row.appendChild(actions);
          li.appendChild(row);
          container.appendChild(li);
        }
      }

      function renderPagination(container, query, searchResponse) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!query.phrase || !searchResponse) {
          return;
        }
        var totalCount = typeof searchResponse.totalCount === 'number' ? searchResponse.totalCount : 0;
        var page = typeof searchResponse.page === 'number' ? searchResponse.page : 1;
        var pageSize = typeof searchResponse.pageSize === 'number' ? searchResponse.pageSize : query.pageSize;
        if (!pageSize || pageSize <= 0) {
          pageSize = 20;
        }
        if (!totalCount || totalCount <= pageSize) {
          return;
        }
        var totalPages = Math.ceil(totalCount / pageSize);
        if (totalPages <= 1) {
          return;
        }

        var prevBtn = document.createElement('button');
        prevBtn.type = 'button';
        prevBtn.className = 'pagination-btn pagination-prev';
        prevBtn.textContent = 'Previous';
        prevBtn.dataset.action = 'go-to-page';
        prevBtn.dataset.page = String(page - 1);
        if (page <= 1) {
          prevBtn.disabled = true;
        }
        container.appendChild(prevBtn);

        for (var p = 1; p <= totalPages; p++) {
          var pageBtn = document.createElement('button');
          pageBtn.type = 'button';
          pageBtn.className = 'pagination-btn pagination-page';
          if (p === page) {
            pageBtn.className += ' is-active';
            pageBtn.disabled = true;
          }
          pageBtn.textContent = String(p);
          pageBtn.dataset.action = 'go-to-page';
          pageBtn.dataset.page = String(p);
          container.appendChild(pageBtn);
        }

        var nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.className = 'pagination-btn pagination-next';
        nextBtn.textContent = 'Next';
        nextBtn.dataset.action = 'go-to-page';
        nextBtn.dataset.page = String(page + 1);
        if (page >= totalPages) {
          nextBtn.disabled = true;
        }
        container.appendChild(nextBtn);
      }

      function clearSearchResultsUI() {
        var summaryEl = document.querySelector('[data-populate="results-summary"]');
        if (summaryEl) {
          summaryEl.textContent = 'Enter a lyrics phrase above to search songs.';
        }
        var listEl = document.querySelector('[data-populate="lyrics-results-list"]');
        if (listEl) {
          listEl.innerHTML = '';
        }
        var paginationEl = document.querySelector('[data-populate="pagination"]');
        if (paginationEl) {
          paginationEl.innerHTML = '';
        }
      }

      function executeSearch(query) {
        if (!query.phrase) {
          clearSearchResultsUI();
          lastSearchResponse = null;
          return;
        }
        var filters = composeFilters(query);
        var sortValue = query.sort || undefined;
        var pageArg = query.page || undefined;
        var pageSizeArg = query.pageSize || undefined;
        var response = null;
        try {
          response = WebsiteSDK.searchLyricsByPhrase(
            query.phrase,
            filters,
            sortValue,
            pageArg,
            pageSizeArg
          );
        } catch (e) {
          console.error('searchLyricsByPhrase failed', e);
          var summaryEl = document.querySelector('[data-populate="results-summary"]');
          if (summaryEl) {
            summaryEl.textContent = 'There was an error while searching. Please try again.';
          }
          var listEl = document.querySelector('[data-populate="lyrics-results-list"]');
          if (listEl) {
            listEl.innerHTML = '';
          }
          var paginationEl = document.querySelector('[data-populate="pagination"]');
          if (paginationEl) {
            paginationEl.innerHTML = '';
          }
          lastSearchResponse = null;
          return;
        }
        lastSearchResponse = response;
        var summaryContainer = document.querySelector('[data-populate="results-summary"]');
        renderResultsSummary(summaryContainer, query, response);
        var listContainer = document.querySelector('[data-populate="lyrics-results-list"]');
        renderResultsList(listContainer, response.results || [], query);
        var paginationContainer = document.querySelector('[data-populate="pagination"]');
        renderPagination(paginationContainer, query, response);
      }

      function syncControlsToQuery(query) {
        var phraseInput = document.getElementById('lyricsPhraseInput');
        if (phraseInput) {
          phraseInput.value = query.phrase || '';
        }
        var langSelect = document.getElementById('filterOriginalLanguage');
        if (langSelect && query.originalLanguage !== undefined) {
          langSelect.value = query.originalLanguage || '';
        }
        var genreSelect = document.getElementById('filterGenre');
        if (genreSelect && query.genre !== undefined) {
          genreSelect.value = query.genre || '';
        }
        var sortSelect = document.getElementById('sortSelect');
        if (sortSelect && query.sort !== undefined) {
          sortSelect.value = query.sort || '';
        }
      }

      function handleUrlChange() {
        var query = parseQueryFromUrl();
        syncControlsToQuery(query);
        if (!query.phrase) {
          clearSearchResultsUI();
          return;
        }
        executeSearch(query);
      }

      function handleSearchSubmit(event) {
        event.preventDefault();
        var phraseInput = document.getElementById('lyricsPhraseInput');
        var phrase = phraseInput ? phraseInput.value.trim() : '';
        updateUrlParams(function(params) {
          if (phrase) {
            params.set('phrase', phrase);
            params.set('page', '1');
          } else {
            params.delete('phrase');
            params.delete('page');
          }
        });
      }

      function handleFilterChange(event) {
        var target = event.target;
        var action = target.dataset.action;
        if (action === 'change-original-language') {
          var value = target.value || '';
          updateUrlParams(function(params) {
            if (value) {
              params.set('originalLanguage', value);
            } else {
              params.delete('originalLanguage');
            }
            params.set('page', '1');
          });
        } else if (action === 'change-genre') {
          var genreValue = target.value || '';
          updateUrlParams(function(params) {
            if (genreValue) {
              params.set('genre', genreValue);
            } else {
              params.delete('genre');
            }
            params.set('page', '1');
          });
        } else if (action === 'change-sort') {
          var sortValue = target.value || '';
          updateUrlParams(function(params) {
            if (sortValue) {
              params.set('sort', sortValue);
            } else {
              params.delete('sort');
            }
            params.set('page', '1');
          });
        }
      }

      function handlePaginationClick(event) {
        var target = event.target;
        if (!target || !target.dataset || target.dataset.action !== 'go-to-page') {
          return;
        }
        var pageStr = target.dataset.page;
        var page = parseInt(pageStr, 10);
        if (!page || page < 1) {
          return;
        }
        updateUrlParams(function(params) {
          params.set('page', String(page));
        });
      }

      function handleBookmarkToggle(event) {
        var target = event.target;
        if (!target || !target.dataset || target.dataset.action !== 'toggle-bookmark') {
          return;
        }
        event.stopPropagation();
        var songId = target.dataset.songId;
        if (!songId) {
          return;
        }
        var currentlyBookmarked = !!bookmarkState[songId];
        if (currentlyBookmarked) {
          try {
            var res = WebsiteSDK.unbookmarkSong(songId);
            if (res && res.success) {
              bookmarkState[songId] = false;
              target.classList.remove('is-bookmarked');
              target.setAttribute('aria-pressed', 'false');
              target.setAttribute('aria-label', 'Bookmark song');
              target.textContent = '☆';
            }
          } catch (e) {
            console.error('unbookmarkSong failed', e);
            alert('Unable to remove bookmark. Please try again.');
          }
        } else {
          try {
            var bookmarkRes = WebsiteSDK.bookmarkSong(songId);
            if (bookmarkRes && bookmarkRes.success) {
              bookmarkState[songId] = true;
              target.classList.add('is-bookmarked');
              target.setAttribute('aria-pressed', 'true');
              target.setAttribute('aria-label', 'Remove bookmark');
              target.textContent = '★';
            }
          } catch (e2) {
            console.error('bookmarkSong failed', e2);
            alert('Unable to bookmark this song. Please try again.');
          }
        }
      }

      function handleResultsListClick(event) {
        var target = event.target;
        var bookmarkAncestor = target.closest('[data-action="toggle-bookmark"]');
        if (bookmarkAncestor) {
          handleBookmarkToggle(event);
          return;
        }
        var row = target.closest('[data-action="open-song"]');
        if (!row) {
          return;
        }
        var songId = row.dataset.songId;
        if (!songId) {
          return;
        }
        window.location.href = 'song.html?songId=' + encodeURIComponent(songId);
      }

      function initializeFiltersAndSort() {
        var langSelect = document.getElementById('filterOriginalLanguage');
        var genreSelect = document.getElementById('filterGenre');
        var sortSelect = document.getElementById('sortSelect');
        if (filterOptions) {
          renderOriginalLanguages(langSelect, filterOptions.originalLanguages || []);
          renderGenres(genreSelect, filterOptions.genres || []);
          renderSortOptions(sortSelect, filterOptions.sortOptions || []);
        } else {
          renderOriginalLanguages(langSelect, []);
          renderGenres(genreSelect, []);
          renderSortOptions(sortSelect, []);
        }
      }

      function init() {
        try {
          settings = WebsiteSDK.getSettings();
        } catch (e) {
          console.error('getSettings failed', e);
          settings = null;
        }
        try {
          filterOptions = WebsiteSDK.getSongSearchFilterOptions();
        } catch (e2) {
          console.error('getSongSearchFilterOptions failed', e2);
          filterOptions = null;
        }

        initializeFiltersAndSort();

        var form = document.getElementById('lyricsSearchForm');
        if (form) {
          form.addEventListener('submit', handleSearchSubmit);
        }

        var filterBar = document.querySelector('[data-component="lyrics-filter-bar"]');
        var sortBar = document.querySelector('[data-component="lyrics-sort-control"]');
        if (filterBar) {
          filterBar.addEventListener('change', handleFilterChange);
        }
        if (sortBar) {
          sortBar.addEventListener('change', handleFilterChange);
        }

        var paginationComponent = document.querySelector('[data-component="lyrics-results-pagination"]');
        if (paginationComponent) {
          paginationComponent.addEventListener('click', handlePaginationClick);
        }

        var resultsList = document.querySelector('[data-populate="lyrics-results-list"]');
        if (resultsList) {
          resultsList.addEventListener('click', handleResultsListClick);
        }

        window.addEventListener('popstate', function() {
          handleUrlChange();
        });

        handleUrlChange();
      }

      init();
    });
  </script>
</body>
</html>
