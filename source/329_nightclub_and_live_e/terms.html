<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Nightclub & Live Events Venue</title>

    <!-- Typography -->
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Work+Sans:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>

    <!-- Global Styles -->
    <link rel='stylesheet' href='styles.css'>
    <!-- Page Styles -->
    <link rel='stylesheet' href='terms.css'>
</head>
<body class='site'>
    <header class='site-header'>
        <div class='header-inner container'>
            <a href='index.html' class='logo' aria-label='Nightclub home'>
                <span class='logo-mark'>
                    <span class='logo-mark-inner'></span>
                </span>
                <span class='logo-wordmark'>
                    <span class='logo-wordmark-main'>TOKYO</span>
                    <span class='logo-wordmark-sub'>CLUB</span>
                </span>
            </a>

            <nav class='primary-nav' aria-label='Main navigation'>
                <ul class='nav-list'>
                    <li class='nav-item'>
                        <a href='index.html' class='nav-link'>Home</a>
                    </li>
                    <li class='nav-item'>
                        <a href='events.html' class='nav-link'>Events</a>
                    </li>
                    <li class='nav-item'>
                        <a href='vip_reservations.html' class='nav-link'>VIP Tables</a>
                    </li>
                    <li class='nav-item'>
                        <a href='workshops.html' class='nav-link'>Workshops</a>
                    </li>
                    <li class='nav-item'>
                        <a href='about.html' class='nav-link'>About</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id='content' class='site-content' role='main'>
        <div class='terms-page container'>
            <!-- Invisible state-sync helpers -->
            <div data-component='terms-anchor-navigation-handler' aria-hidden='true'></div>
            <div data-component='newsletter-url-state-sync' aria-hidden='true'></div>

            <div class='terms-main-wrapper' data-component='terms-page-error-boundary'>
                <!-- Terms & Conditions content section -->
                <section class='terms-section' data-component='terms-content-section'>
                    <header class='terms-header'>
                        <h1 class='terms-title'>Terms &amp; Conditions</h1>
                    </header>
                    <article class='terms-body-card'>
                        <div class='terms-body-inner' data-populate='terms-content' aria-live='polite'>
                            <p class='terms-loading'>Loading Terms &amp; Conditions&hellip;</p>
                        </div>
                    </article>
                </section>

                <!-- Newsletter signup CTA band -->
                <section class='newsletter-cta-section' data-component='newsletter-signup-section'>
                    <div class='newsletter-cta-inner' data-populate='newsletter-signup' aria-live='polite'>
                        <!-- Newsletter form will be rendered here via JS -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class='site-footer'>
        <div class='footer-inner container'>
            <nav class='footer-nav' aria-label='Footer navigation'>
                <ul class='footer-links'>
                    <li class='footer-item'>
                        <a href='about.html' class='footer-link'>About</a>
                    </li>
                    <li class='footer-item'>
                        <a href='contact.html' class='footer-link'>Contact</a>
                    </li>
                    <li class='footer-item'>
                        <a href='faq.html' class='footer-link'>FAQ</a>
                    </li>
                    <li class='footer-item'>
                        <a href='ticket_policy.html' class='footer-link'>Ticketing &amp; Refund Policy</a>
                    </li>
                    <li class='footer-item'>
                        <a href='privacy.html' class='footer-link'>Privacy Policy</a>
                    </li>
                    <li class='footer-item'>
                        <a href='terms.html' class='footer-link'>Terms &amp; Conditions</a>
                    </li>
                    <li class='footer-item'>
                        <a href='newsletter.html' class='footer-link'>Newsletter</a>
                    </li>
                </ul>
            </nav>
            <div class='footer-meta'>
                <p class='footer-copy'>&copy; <span data-year>2024</span> Nightclub &amp; Live Events Venue. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    'use strict';

    (function() {
        function escapeHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeAttr(value) {
            return escapeHtml(value);
        }

        function isTruthyFlag(value) {
            if (!value) return false;
            var v = String(value).toLowerCase();
            return v === '1' || v === 'true' || v === 'yes' || v === 'open';
        }

        function getUrlState() {
            var params = new URLSearchParams(window.location.search);
            var scrollToTarget = params.get('scrollTo');
            var newsletterFlag = params.get('newsletter');
            var newsletterEmailParam = params.get('newsletterEmail');
            var newsletterSourceParam = params.get('newsletterSource');

            var allowedSources = ['footer', 'newsletter_page'];
            var source = allowedSources.indexOf(newsletterSourceParam) !== -1 ? newsletterSourceParam : 'newsletter_page';

            return {
                scrollToTarget: scrollToTarget,
                newsletter: {
                    openRequested: isTruthyFlag(newsletterFlag),
                    prefillEmail: newsletterEmailParam ? decodeURIComponent(newsletterEmailParam) : '',
                    source: source
                }
            };
        }

        var state = {
            scrollToTarget: null,
            newsletter: {
                openRequested: false,
                prefillEmail: '',
                source: 'newsletter_page'
            },
            loadingTerms: false,
            termsError: null,
            loadingNewsletterOptions: false,
            newsletterOptionsError: null,
            isSubmittingNewsletter: false
        };

        function handleScrollTo() {
            if (!state.scrollToTarget) return;
            var targetId = state.scrollToTarget;
            var targetEl = document.getElementById(targetId);
            if (!targetEl) {
                var selectorValue = targetId;
                if (window.CSS && window.CSS.escape) {
                    selectorValue = window.CSS.escape(targetId);
                }
                var alt = document.querySelector('[data-anchor="' + selectorValue + '"]');
                if (alt) targetEl = alt;
            }
            if (!targetEl) return;

            var header = document.querySelector('.site-header');
            var headerOffset = header ? header.offsetHeight + 16 : 80;
            var rect = targetEl.getBoundingClientRect();
            var absoluteTop = rect.top + window.pageYOffset;
            var scrollTop = absoluteTop - headerOffset;
            if (scrollTop < 0) scrollTop = 0;

            window.scrollTo({ top: scrollTop, behavior: 'smooth' });

            targetEl.classList.add('anchor-focus');
            window.setTimeout(function() {
                targetEl.classList.remove('anchor-focus');
            }, 2000);
        }

        function initTermsContent(container) {
            if (!container) return;
            state.loadingTerms = true;
            state.termsError = null;
            container.innerHTML = '<p class="terms-loading">Loading Terms &amp; Conditions&hellip;</p>';
            try {
                var result = WebsiteSDK.getTermsAndConditionsContent();
                var contentHtml = result && result.contentHtml ? result.contentHtml : '';
                if (!contentHtml) {
                    container.innerHTML = '<p class="terms-empty">No Terms &amp; Conditions are available at this time.</p>';
                } else {
                    container.innerHTML = contentHtml;
                }
                state.loadingTerms = false;
                handleScrollTo();
            } catch (e) {
                state.loadingTerms = false;
                state.termsError = 'Unable to load Terms &amp; Conditions right now.';
                container.innerHTML = (
                    '<div class="terms-error-message" role="alert">' +
                        escapeHtml(state.termsError) +
                    '</div>' +
                    '<button type="button" class="btn btn-secondary terms-retry-btn" data-action="retry-terms">Retry</button>'
                );
            }
        }

        function renderNewsletterForm(container, options) {
            var interestOptions = options && options.interestOptions && options.interestOptions.length ? options.interestOptions : [];
            var frequencyOptions = options && options.frequencyOptions && options.frequencyOptions.length ? options.frequencyOptions : [];
            var cities = options && options.cities && options.cities.length ? options.cities : [];

            var emailValue = state.newsletter.prefillEmail ? ' value="' + escapeAttr(state.newsletter.prefillEmail) + '"' : '';

            var interestsInner = '';
            if (interestOptions.length) {
                var items = '';
                for (var i = 0; i < interestOptions.length; i++) {
                    var opt = interestOptions[i];
                    var key = opt && opt.key ? String(opt.key) : '';
                    var label = opt && opt.label ? String(opt.label) : key;
                    var id = 'newsletter-interest-' + key;
                    items += (
                        '<label class="form-checkbox newsletter-interest-item" for="' + escapeAttr(id) + '">' +
                            '<input type="checkbox" id="' + escapeAttr(id) + '" name="interests" value="' + escapeAttr(key) + '">' +
                            '<span class="checkbox-label-text">' + escapeHtml(label) + '</span>' +
                        '</label>'
                    );
                }
                interestsInner = (
                    '<div class="form-group newsletter-interests-group">' +
                        '<span class="form-label">What are you into?</span>' +
                        '<div class="checkbox-group">' + items + '</div>' +
                        '<p class="field-error" data-field-error="interests" hidden></p>' +
                    '</div>'
                );
            }

            var frequencyInner = '';
            if (frequencyOptions.length) {
                var freqItems = '';
                for (var j = 0; j < frequencyOptions.length; j++) {
                    var f = frequencyOptions[j];
                    var value = f && f.value ? String(f.value) : '';
                    var flabel = f && f.label ? String(f.label) : value;
                    var fid = 'newsletter-frequency-' + value;
                    freqItems += (
                        '<label class="form-radio newsletter-frequency-item" for="' + escapeAttr(fid) + '">' +
                            '<input type="radio" id="' + escapeAttr(fid) + '" name="frequency" value="' + escapeAttr(value) + '">' +
                            '<span class="radio-label-text">' + escapeHtml(flabel) + '</span>' +
                        '</label>'
                    );
                }
                frequencyInner = (
                    '<div class="form-group newsletter-frequency-group">' +
                        '<span class="form-label">How often?</span>' +
                        '<div class="radio-group">' + freqItems + '</div>' +
                        '<p class="field-error" data-field-error="frequency" hidden></p>' +
                    '</div>'
                );
            }

            var cityInner = '';
            if (cities.length) {
                var cityOptionsHtml = '<option value="">Any city</option>';
                for (var k = 0; k < cities.length; k++) {
                    var city = String(cities[k]);
                    cityOptionsHtml += '<option value="' + escapeAttr(city) + '">' + escapeHtml(city) + '</option>';
                }
                cityInner = (
                    '<div class="form-group newsletter-city-group">' +
                        '<label class="form-label" for="newsletter-city">City (optional)</label>' +
                        '<select id="newsletter-city" name="city">' + cityOptionsHtml + '</select>' +
                    '</div>'
                );
            }

            container.innerHTML = (
                '<section class="newsletter-section-inner">' +
                    '<div class="newsletter-copy">' +
                        '<h2 class="newsletter-title">Newsletter</h2>' +
                        '<p class="newsletter-subtitle">Stay informed about schedule changes, policies, and event updates.</p>' +
                    '</div>' +
                    '<form class="newsletter-form" data-role="newsletter-form" novalidate>' +
                        '<div class="form-row newsletter-email-row">' +
                            '<div class="form-group newsletter-email-group">' +
                                '<label class="form-label" for="newsletter-email">Email address</label>' +
                                '<input type="email" id="newsletter-email" name="email" required autocomplete="email"' + emailValue + '>' +
                                '<p class="field-error" data-field-error="email" hidden></p>' +
                            '</div>' +
                        '</div>' +
                        interestsInner +
                        frequencyInner +
                        cityInner +
                        '<div class="form-actions newsletter-actions">' +
                            '<button type="submit" class="btn btn-primary" data-action="newsletter-submit">Subscribe</button>' +
                            '<p class="form-message" data-role="newsletter-status" aria-live="polite"></p>' +
                        '</div>' +
                    '</form>' +
                '</section>'
            );
        }

        function showNewsletterOptionsError(container, message) {
            container.innerHTML = (
                '<div class="newsletter-error" role="alert">' +
                    escapeHtml(message || 'Unable to load newsletter options right now.') +
                '</div>' +
                '<button type="button" class="btn btn-secondary" data-action="retry-newsletter-options">Retry</button>'
            );
        }

        function validateNewsletterForm(form) {
            var isValid = true;
            var emailInput = form.querySelector('input[name="email"]');
            var statusEl = form.querySelector('[data-role="newsletter-status"]');
            if (statusEl) {
                statusEl.textContent = '';
            }

            function setFieldError(fieldName, message) {
                var err = form.querySelector('[data-field-error="' + fieldName + '"]');
                if (err) {
                    if (message) {
                        err.textContent = message;
                        err.hidden = false;
                    } else {
                        err.textContent = '';
                        err.hidden = true;
                    }
                }
            }

            var emailVal = emailInput && emailInput.value ? emailInput.value.trim() : '';
            var emailValid = !!emailVal && /.+@.+\..+/.test(emailVal);
            if (!emailValid) {
                isValid = false;
                setFieldError('email', 'Enter a valid email address.');
            } else {
                setFieldError('email', '');
            }

            var interestsChecked = form.querySelectorAll('input[name="interests"]:checked');
            if (!interestsChecked || interestsChecked.length === 0) {
                isValid = false;
                setFieldError('interests', 'Select at least one interest.');
            } else {
                setFieldError('interests', '');
            }

            var frequencyChecked = form.querySelector('input[name="frequency"]:checked');
            if (!frequencyChecked) {
                isValid = false;
                setFieldError('frequency', 'Select how often you want to hear from us.');
            } else {
                setFieldError('frequency', '');
            }

            return isValid;
        }

        function handleNewsletterSubmit(form) {
            if (!form || state.isSubmittingNewsletter) return;
            if (!validateNewsletterForm(form)) return;

            var emailVal = form.querySelector('input[name="email"]').value.trim();
            var interestInputs = form.querySelectorAll('input[name="interests"]:checked');
            var selectedKeys = [];
            for (var i = 0; i < interestInputs.length; i++) {
                selectedKeys.push(String(interestInputs[i].value));
            }

            var interestDjNights = selectedKeys.indexOf('dj_nights') !== -1;
            var interestLiveBands = selectedKeys.indexOf('live_bands') !== -1;
            var interestWorkshops = selectedKeys.indexOf('workshops') !== -1;

            var frequencyInput = form.querySelector('input[name="frequency"]:checked');
            var frequencyVal = frequencyInput ? String(frequencyInput.value) : '';

            var citySelect = form.querySelector('select[name="city"]');
            var cityVal = citySelect ? citySelect.value : '';
            if (cityVal === '') cityVal = undefined;

            var statusEl = form.querySelector('[data-role="newsletter-status"]');
            if (statusEl) {
                statusEl.textContent = 'Submitting&hellip;';
            }

            state.isSubmittingNewsletter = true;
            try {
                var resp = WebsiteSDK.submitNewsletterSubscription(
                    emailVal,
                    !!interestDjNights,
                    !!interestLiveBands,
                    !!interestWorkshops,
                    frequencyVal,
                    cityVal,
                    state.newsletter.source
                );

                state.isSubmittingNewsletter = false;
                if (resp && resp.success) {
                    var container = document.querySelector('[data-populate="newsletter-signup"]');
                    if (container) {
                        var sub = resp.subscription || {};
                        var summaryEmail = sub.email || emailVal;
                        container.innerHTML = (
                            '<section class="newsletter-section-inner newsletter-confirmation" aria-live="polite">' +
                                '<div class="newsletter-copy">' +
                                    '<h2 class="newsletter-title">Subscription updated</h2>' +
                                    '<p class="newsletter-subtitle">You are subscribed with <span class="newsletter-summary-email">' + escapeHtml(summaryEmail) + '</span>.</p>' +
                                '</div>' +
                            '</section>'
                        );
                    }
                } else {
                    if (statusEl) {
                        statusEl.textContent = 'We could not complete your subscription. Please try again.';
                    }
                }
            } catch (e) {
                state.isSubmittingNewsletter = false;
                if (statusEl) {
                    statusEl.textContent = 'We could not complete your subscription. Please try again.';
                }
            }
        }

        function autoFocusNewsletterIfRequested() {
            if (!state.newsletter.openRequested) return;
            var section = document.querySelector('[data-component="newsletter-signup-section"]');
            if (!section) return;
            section.classList.add('is-open');
            var header = document.querySelector('.site-header');
            var headerOffset = header ? header.offsetHeight + 16 : 80;
            var rect = section.getBoundingClientRect();
            var absoluteTop = rect.top + window.pageYOffset;
            var scrollTop = absoluteTop - headerOffset;
            if (scrollTop < 0) scrollTop = 0;
            window.scrollTo({ top: scrollTop, behavior: 'smooth' });
            var emailInput = section.querySelector('input[name="email"]');
            if (emailInput && emailInput.focus) {
                try {
                    emailInput.focus({ preventScroll: true });
                } catch (e) {
                    emailInput.focus();
                }
            }
        }

        function initNewsletter(container) {
            if (!container) return;
            state.loadingNewsletterOptions = true;
            state.newsletterOptionsError = null;
            container.innerHTML = '<p class="newsletter-loading">Loading newsletter options&hellip;</p>';
            try {
                var options = WebsiteSDK.getNewsletterOptions();
                state.loadingNewsletterOptions = false;
                renderNewsletterForm(container, options || {});
                attachNewsletterEventHandlers();
                autoFocusNewsletterIfRequested();
            } catch (e) {
                state.loadingNewsletterOptions = false;
                state.newsletterOptionsError = 'Unable to load newsletter options right now.';
                showNewsletterOptionsError(container, state.newsletterOptionsError);
            }
        }

        function attachNewsletterEventHandlers() {
            var form = document.querySelector('[data-role="newsletter-form"]');
            if (!form) return;

            form.addEventListener('submit', function(ev) {
                ev.preventDefault();
                handleNewsletterSubmit(form);
            });

            form.addEventListener('input', function(ev) {
                var target = ev.target;
                if (!target || !target.name) return;
                var name = target.name;
                var err = form.querySelector('[data-field-error="' + name + '"]');
                if (err) {
                    err.textContent = '';
                    err.hidden = true;
                }
            });
        }

        function bindGlobalActions() {
            document.addEventListener('click', function(ev) {
                var target = ev.target;
                if (!(target instanceof Element)) return;

                var retryTermsBtn = target.closest('[data-action="retry-terms"]');
                if (retryTermsBtn) {
                    var termsContainer = document.querySelector('[data-populate="terms-content"]');
                    initTermsContent(termsContainer);
                    return;
                }

                var retryNewsletterBtn = target.closest('[data-action="retry-newsletter-options"]');
                if (retryNewsletterBtn) {
                    var newsletterContainer = document.querySelector('[data-populate="newsletter-signup"]');
                    initNewsletter(newsletterContainer);
                    return;
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            var urlState = getUrlState();
            state.scrollToTarget = urlState.scrollToTarget;
            state.newsletter.openRequested = urlState.newsletter.openRequested;
            state.newsletter.prefillEmail = urlState.newsletter.prefillEmail;
            state.newsletter.source = urlState.newsletter.source;

            var populateElements = document.querySelectorAll('[data-populate]');
            for (var i = 0; i < populateElements.length; i++) {
                var el = populateElements[i];
                var type = el.getAttribute('data-populate');
                if (type === 'terms-content') {
                    initTermsContent(el);
                } else if (type === 'newsletter-signup') {
                    initNewsletter(el);
                }
            }

            bindGlobalActions();

            window.addEventListener('popstate', function() {
                var refreshedState = getUrlState();
                state.scrollToTarget = refreshedState.scrollToTarget;
                state.newsletter.openRequested = refreshedState.newsletter.openRequested;
                state.newsletter.prefillEmail = refreshedState.newsletter.prefillEmail;
                state.newsletter.source = refreshedState.newsletter.source;
                handleScrollTo();
                if (state.newsletter.openRequested) {
                    autoFocusNewsletterIfRequested();
                }
            });

            var yearSpan = document.querySelector('[data-year]');
            if (yearSpan) {
                yearSpan.textContent = String(new Date().getFullYear());
            }
        });
    })();
    </script>
</body>
</html>
