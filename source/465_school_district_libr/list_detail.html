<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>District Library Catalog</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="list_detail.css" />
</head>
<body class="site-body">
  <div class="page-wrapper">
    <header class="site-header" role="banner">
      <!-- Top illustrative banner -->
      <div class="header-banner">
        <div class="page-width header-banner-inner">
          <div class="header-brand">
            <div class="brand-mark" aria-hidden="true"></div>
            <div class="brand-text">
              <div class="brand-title">District School Division</div>
              <div class="brand-subtitle">School District Library Catalog</div>
            </div>
          </div>
          <div class="header-context">
            <span class="header-context-label">Library</span>
          </div>
        </div>
      </div>

      <!-- Primary navigation bar -->
      <nav class="main-nav" aria-label="Primary">
        <div class="page-width">
          <ul class="main-nav-list">
            <li class="nav-item nav-home is-active">
              <a href="index.html" title="Go to the catalog homepage with global search.">
                <span class="nav-icon" aria-hidden="true"></span>
                <span class="nav-label">Home</span>
              </a>
            </li>
            <li class="nav-item nav-advanced-search">
              <a href="advanced_search.html" title="Open the advanced search form for detailed filtering.">
                <span class="nav-icon" aria-hidden="true"></span>
                <span class="nav-label">Advanced Search</span>
              </a>
            </li>
            <li class="nav-item nav-browse-subjects">
              <a href="subjects.html" title="Browse the catalog by subject categories such as Animals &amp; Nature.">
                <span class="nav-icon" aria-hidden="true"></span>
                <span class="nav-label">Browse Subjects</span>
              </a>
            </li>
            <li class="nav-item nav-my-account">
              <a href="account.html" title="View checked out items, renewals, and account information.">
                <span class="nav-icon" aria-hidden="true"></span>
                <span class="nav-label">My Account</span>
              </a>
            </li>
            <li class="nav-item nav-my-lists">
              <a href="lists.html" title="Manage reading and research lists.">
                <span class="nav-icon" aria-hidden="true"></span>
                <span class="nav-label">My Lists</span>
              </a>
            </li>
            <li class="nav-item nav-favorites">
              <a href="favorites.html" title="View and manage favorited items.">
                <span class="nav-icon" aria-hidden="true"></span>
                <span class="nav-label">Favorites</span>
              </a>
            </li>
            <li class="nav-item nav-help">
              <a href="help.html" title="Get help and FAQs about using the catalog.">
                <span class="nav-icon" aria-hidden="true"></span>
                <span class="nav-label">Help</span>
              </a>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <main id="content" class="site-main" role="main">
      <!-- Global search / filter band -->
      <section class="global-search-band" aria-label="Catalog search">
        <div class="page-width">
          <form class="global-search-form" action="javascript:void(0)" role="search">
            <div class="form-row">
              <label for="searchLibrarySelect" class="sr-only">Library scope</label>
              <select id="searchLibrarySelect" name="libraryScope" class="form-control">
                <option value="all">All Libraries</option>
                <option value="elementary">Elementary Schools</option>
                <option value="middle">Middle Schools</option>
                <option value="high">High Schools</option>
                <option value="digital">Digital Library</option>
              </select>

              <label for="searchFieldSelect" class="sr-only">Search field</label>
              <select id="searchFieldSelect" name="searchField" class="form-control">
                <option value="keywords">Keywords</option>
                <option value="title">Title</option>
                <option value="author">Author</option>
              </select>

              <label for="searchQueryInput" class="sr-only">Search terms</label>
              <input id="searchQueryInput" name="q" type="text" class="form-control search-input" placeholder="Search the catalog" />

              <button type="submit" class="btn btn-primary">Search</button>

              <a href="javascript:void(0)" class="global-search-advanced-link">Advanced</a>
            </div>
          </form>
        </div>
      </section>

      <!-- List Detail main content -->
      <div class="page-width list-detail-wrapper" data-component="list-detail-page-shell">
        <!-- List header (title, breadcrumb, actions, rename form) -->
        <section class="list-header-section" data-component="list-header" data-populate="list-header"></section>

        <!-- Status messages -->
        <div class="status-region" data-component="status-messages" aria-live="polite" data-populate="status-messages"></div>

        <!-- Items toolbar (item count, reorder hint) -->
        <section class="list-items-toolbar" data-component="list-items-toolbar" data-populate="list-items-toolbar"></section>

        <!-- Items list / empty state -->
        <section class="list-items-section">
          <div class="list-empty-state" data-component="list-empty-state" data-populate="list-empty-state"></div>
          <ul class="list-items-list" data-component="list-items-list" data-populate="list-items-list" aria-label="Reading list items"></ul>
        </section>
      </div>

      <!-- Delete list confirmation dialog -->
      <div class="modal-backdrop" data-component="list-delete-confirm-dialog" data-populate="list-delete-confirm-dialog" data-state="hidden"></div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="page-width footer-inner">
        <nav class="footer-nav" aria-label="Footer">
          <a href="about.html" class="footer-link" title="Learn about the district library catalog.">About</a>
          <a href="branches.html" class="footer-link" title="See a list of school library locations and hours.">Branches &amp; Hours</a>
          <a href="policies.html" class="footer-link" title="Read borrowing, access, and privacy policies.">Policies</a>
          <a href="help.html" class="footer-link" title="View help topics and frequently asked questions.">Help / FAQ</a>
          <a href="contact.html" class="footer-link" title="Contact the library for support or questions.">Contact</a>
        </nav>
        <div class="footer-meta">
          <p class="footer-text">&copy; <span data-current-year></span> District School Division Library Catalog. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    (function() {
      'use strict';

      const pageState = {
        listId: null,
        list: null,
        items: [],
        lastGoodOrder: [],
        isRenaming: false,
        hasLoadError: false,
        itemErrors: {}
      };

      const components = {};

      function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/[&<>"']/g, function(ch) {
          switch (ch) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            case "'": return '&#39;';
            default: return ch;
          }
        });
      }

      function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      }

      function showStatus(message, type) {
        const container = components.statusMessages;
        if (!container) return;
        container.innerHTML = '';
        if (!message) return;
        const kind = type || 'info';
        const div = document.createElement('div');
        div.className = 'status-message status-' + kind;
        div.textContent = message;
        container.appendChild(div);
      }

      function normalizeAndSortItems(rawItems) {
        const items = Array.isArray(rawItems) ? rawItems.slice() : [];
        items.sort(function(a, b) {
          const aHasSort = typeof a.sortOrder === 'number';
          const bHasSort = typeof b.sortOrder === 'number';
          if (aHasSort && bHasSort) {
            if (a.sortOrder < b.sortOrder) return -1;
            if (a.sortOrder > b.sortOrder) return 1;
          } else if (aHasSort && !bHasSort) {
            return -1;
          } else if (!aHasSort && bHasSort) {
            return 1;
          }
          const aAdded = a.addedAt || '';
          const bAdded = b.addedAt || '';
          if (aAdded < bAdded) return -1;
          if (aAdded > bAdded) return 1;
          return 0;
        });
        return items;
      }

      function renderHeader(container) {
        if (!container) return;
        if (!pageState.list) {
          container.innerHTML = '\n' +
            '            <div class="list-header-empty">\n' +
            '  <nav class="breadcrumb" aria-label="Breadcrumb">\n' +
            '    <span class="breadcrumb-current">Reading List</span>\n' +
            '  </nav>\n' +
            '  <h1 class="list-title">Reading List</h1>\n' +
            '</div>\n';
          return;
        }

        const list = pageState.list;
        const created = formatDate(list.created_at);
        const updated = formatDate(list.updated_at);
        const itemCount = pageState.items.length;
        const itemLabel = itemCount === 1 ? '1 item' : itemCount + ' items';

        let mainSectionHtml;
        if (pageState.isRenaming) {
          mainSectionHtml = '\n' +
            '<form class="list-rename-form" data-component="list-rename-form">\n' +
            '  <div class="list-rename-row">\n' +
            '    <label for="renameInput" class="sr-only">List name</label>\n' +
            '    <input id="renameInput" name="listName" type="text" class="form-control" required value="' + escapeHtml(list.name || '') + '" />\n' +
            '    <button type="submit" class="btn btn-primary" data-action="submit-rename">Save</button>\n' +
            '    <button type="button" class="btn btn-secondary" data-action="cancel-rename">Cancel</button>\n' +
            '  </div>\n' +
            '  <div class="form-error" data-role="rename-error" aria-live="polite"></div>\n' +
            '</form>\n';
        } else {
          mainSectionHtml = '\n' +
            '<div class="list-header-main">\n' +
            '  <div class="list-title-block">\n' +
            '    <h1 class="list-title">' + escapeHtml(list.name || 'Untitled list') + '</h1>\n' +
            '    <button type="button" class="btn btn-inline" data-action="open-rename-form">Rename List</button>\n' +
            '  </div>\n' +
            '  <div class="list-meta">\n' +
            '    <p><span class="meta-label">Created:</span> ' + escapeHtml(created) + '</p>\n' +
            '    <p><span class="meta-label">Last updated:</span> ' + escapeHtml(updated) + '</p>\n' +
            '    <p><span class="meta-label">Items:</span> ' + escapeHtml(itemLabel) + '</p>\n' +
            '  </div>\n' +
            '  <div class="list-header-actions">\n' +
            '    <button type="button" class="btn btn-danger" data-action="open-delete-dialog">Delete List</button>\n' +
            '  </div>\n' +
            '</div>\n';
        }

        container.innerHTML = '\n' +
          '<div class="list-header-inner">\n' +
          '  <div class="list-header-top-row">\n' +
          '    <nav class="breadcrumb" aria-label="Breadcrumb">\n' +
          '      <a href="javascript:void(0)" data-action="back-to-lists">My Lists</a>\n' +
          '      <span class="breadcrumb-separator" aria-hidden="true">/</span>\n' +
          '      <span class="breadcrumb-current">' + escapeHtml(list.name || 'Untitled list') + '</span>\n' +
          '    </nav>\n' +
          '    <button type="button" class="btn btn-link" data-action="back-to-lists">Back to My Lists</button>\n' +
          '  </div>\n' +
          mainSectionHtml +
          '</div>\n';
      }

      function renderToolbar(container) {
        if (!container) return;
        if (!pageState.list) {
          container.innerHTML = '';
          return;
        }
        const itemCount = pageState.items.length;
        const itemLabel = itemCount === 1 ? '1 item' : itemCount + ' items';
        const showReorderHint = itemCount > 1;
        container.innerHTML = '\n' +
          '<div class="list-items-toolbar-inner">\n' +
          '  <div class="toolbar-left">\n' +
          '    <span class="item-count-label">' + escapeHtml(itemLabel) + '</span>\n' +
          '  </div>\n' +
          '  <div class="toolbar-right">\n' +
          (showReorderHint
            ? '    <span class="toolbar-hint">Use the arrow buttons to reorder items in this list.</span>\n'
            : '    <span class="toolbar-hint toolbar-hint-disabled">Add more items to enable reordering.</span>\n') +
          '  </div>\n' +
          '</div>\n';
      }

      function buildItemRowHtml(entry, index, total) {
        const listItemId = entry.listItemId;
        const item = entry.item || {};
        const catalogId = item.id || '';
        const title = item.title || 'Untitled item';
        const author = item.author || '';
        const format = item.format || '';
        const audience = item.audience_level || '';
        const year = item.publication_year || '';
        const cover = item.cover_image_url || '';
        const added = formatDate(entry.addedAt);
        const disableUp = index === 0 ? 'disabled' : '';
        const disableDown = index === total - 1 ? 'disabled' : '';
        const errorMsg = pageState.itemErrors[listItemId] || '';

        const formatLabel = format ? format.replace(/_/g, ' ') : '';
        const audienceLabel = audience ? audience.replace(/_/g, ' ') : '';

        const coverHtml = cover
          ? '<img src="' + escapeHtml(cover) + '" alt="Cover for ' + escapeHtml(title) + '" />'
          : '<div class="cover-placeholder" aria-hidden="true"></div>';

        return '\n' +
          '<li class="list-item-row" data-list-item-id="' + escapeHtml(listItemId) + '">\n' +
          '  <div class="list-item-inner">\n' +
          '    <div class="item-reorder-controller">\n' +
          '      <button type="button" class="reorder-btn" data-action="move-item-up" data-list-item-id="' + escapeHtml(listItemId) + '" ' + disableUp + ' title="Move item up">\n' +
          '        &#9650;\n' +
          '      </button>\n' +
          '      <button type="button" class="reorder-btn" data-action="move-item-down" data-list-item-id="' + escapeHtml(listItemId) + '" ' + disableDown + ' title="Move item down">\n' +
          '        &#9660;\n' +
          '      </button>\n' +
          '    </div>\n' +
          '    <div class="item-thumbnail">\n' +
          coverHtml +
          '    </div>\n' +
          '    <div class="item-main">\n' +
          '      <h3 class="item-title">\n' +
          '        <a href="javascript:void(0)" data-action="view-item-detail" data-catalog-item-id="' + escapeHtml(catalogId) + '">' + escapeHtml(title) + '</a>\n' +
          '      </h3>\n' +
          (author ? '      <div class="item-author">by ' + escapeHtml(author) + '</div>\n' : '') +
          '      <div class="item-meta-line">\n' +
          (formatLabel ? '        <span class="item-meta">' + escapeHtml(formatLabel) + '</span>\n' : '') +
          (audienceLabel ? '        <span class="item-meta">Audience: ' + escapeHtml(audienceLabel) + '</span>\n' : '') +
          (year ? '        <span class="item-meta">Year: ' + escapeHtml(year) + '</span>\n' : '') +
          (added ? '        <span class="item-meta">Added: ' + escapeHtml(added) + '</span>\n' : '') +
          '      </div>\n' +
          '    </div>\n' +
          '    <div class="item-actions">\n' +
          '      <button type="button" class="btn btn-secondary btn-remove" data-action="remove-item" data-list-item-id="' + escapeHtml(listItemId) + '">Remove</button>\n' +
          '      <div class="item-error" data-role="item-error">' + escapeHtml(errorMsg) + '</div>\n' +
          '    </div>\n' +
          '  </div>\n' +
          '</li>\n';
      }

      function renderItems() {
        const itemsContainer = components.itemsList;
        const emptyContainer = components.emptyState;
        if (!itemsContainer || !emptyContainer) return;

        if (!pageState.list) {
          itemsContainer.innerHTML = '';
          emptyContainer.innerHTML = '';
          return;
        }

        const items = pageState.items;
        if (!items.length) {
          itemsContainer.innerHTML = '';
          itemsContainer.style.display = 'none';
          emptyContainer.style.display = '';
          emptyContainer.innerHTML = '\n' +
            '<div class="empty-state-inner">\n' +
            '  <h2>This list has no items yet</h2>\n' +
            '  <p>Use the search above to find items, then add them to this list from each item\'s detail page.</p>\n' +
            '</div>\n';
        } else {
          emptyContainer.innerHTML = '';
          emptyContainer.style.display = 'none';
          itemsContainer.style.display = '';
          const rowsHtml = items.map(function(entry, index) {
            return buildItemRowHtml(entry, index, items.length);
          }).join('');
          itemsContainer.innerHTML = rowsHtml;
        }

        renderToolbar(components.toolbar);
      }

      function renderDeleteDialog(container) {
        if (!container) return;
        container.innerHTML = '\n' +
          '<div class="modal dialog-inner" role="dialog" aria-modal="true" aria-labelledby="delete-dialog-title">\n' +
          '  <div class="dialog-content">\n' +
          '    <h2 id="delete-dialog-title">Delete this list?</h2>\n' +
          '    <p>This will remove this list and all of its items from My Lists. The catalog items themselves will remain available in the library catalog.</p>\n' +
          '    <div class="dialog-actions">\n' +
          '      <button type="button" class="btn btn-danger" data-action="confirm-delete-list">Delete List</button>\n' +
          '      <button type="button" class="btn btn-secondary" data-action="cancel-delete-list">Cancel</button>\n' +
          '    </div>\n' +
          '  </div>\n' +
          '</div>\n';
        container.setAttribute('data-state', 'hidden');
        container.style.display = 'none';
      }

      function openDeleteDialog() {
        const container = components.deleteDialog;
        if (!container || !pageState.list) return;
        container.setAttribute('data-state', 'visible');
        container.style.display = 'block';
      }

      function closeDeleteDialog() {
        const container = components.deleteDialog;
        if (!container) return;
        container.setAttribute('data-state', 'hidden');
        container.style.display = 'none';
      }

      function renderMissingListIdState() {
        if (components.header) {
          components.header.innerHTML = '\n' +
            '<div class="list-header-inner">\n' +
            '  <h1 class="list-title">Reading List</h1>\n' +
            '  <p class="list-error-text">No list was specified. Use My Lists to open one of your saved lists.</p>\n' +
            '  <button type="button" class="btn btn-secondary" data-action="back-to-lists">Back to My Lists</button>\n' +
            '</div>\n';
        }
        if (components.toolbar) {
          components.toolbar.innerHTML = '';
        }
        if (components.itemsList) {
          components.itemsList.innerHTML = '';
        }
        if (components.emptyState) {
          components.emptyState.innerHTML = '';
        }
        showStatus('No list was specified in the page address.', 'error');
      }

      function renderLoadErrorState(message) {
        pageState.hasLoadError = true;
        if (components.header) {
          components.header.innerHTML = '\n' +
            '<div class="list-header-inner">\n' +
            '  <h1 class="list-title">Reading List</h1>\n' +
            '  <p class="list-error-text">' + escapeHtml(message || 'Unable to load this list.') + '</p>\n' +
            '  <button type="button" class="btn btn-secondary" data-action="back-to-lists">Back to My Lists</button>\n' +
            '</div>\n';
        }
        if (components.toolbar) {
          components.toolbar.innerHTML = '';
        }
        if (components.itemsList) {
          components.itemsList.innerHTML = '';
        }
        if (components.emptyState) {
          components.emptyState.innerHTML = '';
        }
        showStatus(message || 'Unable to load this list.', 'error');
      }

      function handleRenameSubmit(formEl) {
        if (!pageState.list || !pageState.listId) return;
        const input = formEl.querySelector('input[name="listName"]');
        const errorEl = formEl.querySelector('[data-role="rename-error"]');
        if (errorEl) {
          errorEl.textContent = '';
        }
        const newName = input ? input.value.trim() : '';
        if (!newName) {
          if (errorEl) errorEl.textContent = 'Please enter a list name.';
          return;
        }

        if (input) input.disabled = true;
        const submitBtn = formEl.querySelector('[data-action="submit-rename"]');
        if (submitBtn) submitBtn.disabled = true;

        try {
          const updatedList = WebsiteSDK.renameReadingList(pageState.listId, newName);
          if (updatedList) {
            pageState.list = updatedList;
          } else {
            pageState.list.name = newName;
          }
          pageState.isRenaming = false;
          renderHeader(components.header);
          showStatus('List name updated.', 'success');
        } catch (err) {
          if (errorEl) {
            errorEl.textContent = 'Unable to rename list. Please try again.';
          }
          showStatus('Unable to rename list. Please try again.', 'error');
        } finally {
          if (input) input.disabled = false;
          if (submitBtn) submitBtn.disabled = false;
        }
      }

      function handleRemoveItem(actionEl) {
        if (!pageState.list || !pageState.listId) return;
        const listItemId = actionEl.getAttribute('data-list-item-id');
        if (!listItemId) return;
        const confirmed = window.confirm('Remove this item from the list?');
        if (!confirmed) return;

        actionEl.disabled = true;

        try {
          const result = WebsiteSDK.removeItemFromReadingList(listItemId);
          if (result && result.success) {
            pageState.items = pageState.items.filter(function(entry) {
              return entry.listItemId !== listItemId;
            });
            delete pageState.itemErrors[listItemId];
            pageState.lastGoodOrder = pageState.items.map(function(entry) { return entry.listItemId; });
            renderItems();
            showStatus('Item removed from list.', 'success');
          } else {
            pageState.itemErrors[listItemId] = 'Could not remove this item.';
            renderItems();
            showStatus('Unable to remove item. Please try again.', 'error');
          }
        } catch (err) {
          pageState.itemErrors[listItemId] = 'Could not remove this item.';
          renderItems();
          showStatus('Unable to remove item. Please try again.', 'error');
        }
      }

      function handleMoveItem(actionEl, direction) {
        if (!pageState.list || !pageState.listId) return;
        const listItemId = actionEl.getAttribute('data-list-item-id');
        if (!listItemId) return;
        const currentIndex = pageState.items.findIndex(function(entry) {
          return entry.listItemId === listItemId;
        });
        if (currentIndex === -1) return;
        const newIndex = currentIndex + direction;
        if (newIndex < 0 || newIndex >= pageState.items.length) return;

        const previousItems = pageState.items.slice();
        const previousOrder = pageState.lastGoodOrder.slice();

        const newItems = pageState.items.slice();
        const moved = newItems.splice(currentIndex, 1)[0];
        newItems.splice(newIndex, 0, moved);
        const newOrderIds = newItems.map(function(entry) { return entry.listItemId; });

        pageState.items = newItems;
        renderItems();

        try {
          WebsiteSDK.reorderReadingListItems(pageState.listId, newOrderIds);
          pageState.lastGoodOrder = newOrderIds.slice();
          showStatus('Item order updated.', 'success');
        } catch (err) {
          pageState.items = previousItems;
          pageState.lastGoodOrder = previousOrder;
          renderItems();
          showStatus('Unable to update item order. Please try again.', 'error');
        }
      }

      function handleConfirmDeleteList() {
        if (!pageState.list || !pageState.listId) return;
        try {
          const result = WebsiteSDK.deleteReadingList(pageState.listId);
          if (result && result.success) {
            window.location.href = 'lists.html';
          } else {
            closeDeleteDialog();
            const message = result && result.message ? result.message : 'Unable to delete list.';
            showStatus(message, 'error');
          }
        } catch (err) {
          closeDeleteDialog();
          showStatus('Unable to delete list. Please try again.', 'error');
        }
      }

      function handleNavigateToItemDetail(actionEl) {
        if (!pageState.listId) return;
        const catalogItemId = actionEl.getAttribute('data-catalog-item-id');
        if (!catalogItemId) return;
        const params = new URLSearchParams();
        params.set('id', catalogItemId);
        params.set('from', 'list_detail');
        params.set('listId', pageState.listId);
        window.location.href = 'item_detail.html?' + params.toString();
      }

      function bindGlobalEvents() {
        document.addEventListener('click', function(event) {
          const actionEl = event.target.closest('[data-action]');
          if (!actionEl) return;
          const action = actionEl.getAttribute('data-action');

          switch (action) {
            case 'back-to-lists':
              window.location.href = 'lists.html';
              break;
            case 'open-rename-form':
              if (!pageState.hasLoadError && pageState.list) {
                pageState.isRenaming = true;
                renderHeader(components.header);
              }
              break;
            case 'cancel-rename':
              pageState.isRenaming = false;
              renderHeader(components.header);
              break;
            case 'open-delete-dialog':
              if (!pageState.hasLoadError && pageState.list) {
                openDeleteDialog();
              }
              break;
            case 'cancel-delete-list':
              closeDeleteDialog();
              break;
            case 'confirm-delete-list':
              handleConfirmDeleteList();
              break;
            case 'remove-item':
              handleRemoveItem(actionEl);
              break;
            case 'move-item-up':
              handleMoveItem(actionEl, -1);
              break;
            case 'move-item-down':
              handleMoveItem(actionEl, 1);
              break;
            case 'view-item-detail':
              handleNavigateToItemDetail(actionEl);
              break;
            default:
              break;
          }
        });

        document.addEventListener('submit', function(event) {
          const formEl = event.target;
          if (formEl && formEl.matches('[data-component="list-rename-form"]')) {
            event.preventDefault();
            handleRenameSubmit(formEl);
          }
        });
      }

      function initializeComponents() {
        components.shell = document.querySelector('[data-component="list-detail-page-shell"]');
        components.header = document.querySelector('[data-component="list-header"]');
        components.statusMessages = document.querySelector('[data-component="status-messages"]');
        components.toolbar = document.querySelector('[data-component="list-items-toolbar"]');
        components.itemsList = document.querySelector('[data-component="list-items-list"]');
        components.emptyState = document.querySelector('[data-component="list-empty-state"]');
        components.deleteDialog = document.querySelector('[data-component="list-delete-confirm-dialog"]');
      }

      function loadListDetail() {
        const params = new URLSearchParams(window.location.search);
        const listId = params.get('listId');
        pageState.listId = listId;

        if (!listId) {
          renderMissingListIdState();
          return;
        }

        try {
          showStatus('Loading list…', 'info');
          const detail = WebsiteSDK.getReadingListDetail(listId);
          if (!detail || !detail.list) {
            renderLoadErrorState('The requested list could not be found.');
            return;
          }
          pageState.list = detail.list;
          pageState.items = normalizeAndSortItems(detail.items || []);
          pageState.lastGoodOrder = pageState.items.map(function(entry) { return entry.listItemId; });

          renderHeader(components.header);
          renderToolbar(components.toolbar);
          renderItems();
          showStatus('', 'info');
        } catch (err) {
          renderLoadErrorState('Unable to load this list. Please try again later.');
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        const yearSpan = document.querySelector('[data-current-year]');
        if (yearSpan) {
          yearSpan.textContent = String(new Date().getFullYear());
        }

        initializeComponents();
        if (components.deleteDialog) {
          renderDeleteDialog(components.deleteDialog);
        }
        bindGlobalEvents();
        loadListDetail();
      });
    })();
  </script>
</body>
</html>
