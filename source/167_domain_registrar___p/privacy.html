<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain Registrar Layout</title>

    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet" />

    <!-- Framework styles -->
    <link rel="stylesheet" href="framework.css" />
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="privacy.css" />
</head>
<body class="layout-body">
    <header class="site-header" role="banner">
        <div class="header-inner">
            <div class="brand-lockup" aria-label="Site identity">
                <span class="brand-mark"></span>
                <span class="brand-text">Parked Domains</span>
            </div>
            <nav class="main-nav" aria-label="Primary navigation">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="domain_search.html" class="nav-link">Search Domains</a>
                    </li>
                    <li class="nav-item">
                        <a href="domain_list.html" class="nav-link">My Domains</a>
                    </li>
                    <li class="nav-item">
                        <a href="pricing.html" class="nav-link">Pricing</a>
                    </li>
                    <li class="nav-item">
                        <a href="help.html" class="nav-link">Help</a>
                    </li>
                    <li class="nav-item">
                        <a href="cart.html" class="nav-link">Cart</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-main" role="main">
        <section class="policy-page" aria-label="Privacy policy content">
            <div class="policy-layout">
                <header class="policy-header">
                    <h1 id="policy-page-title" class="policy-title" data-populate="static-title"></h1>
                    <p class="policy-meta" aria-live="polite">
                        <span class="policy-updated-label">Last updated:</span>
                        <time class="policy-updated-value" data-populate="static-last-updated"></time>
                    </p>
                </header>

                <nav class="policy-toc-card" data-component="privacy-toc-navigation" aria-label="Policy sections">
                    <div class="policy-toc-inner">
                        <span class="policy-toc-label">Jump to section:</span>
                        <ul class="policy-toc-list" data-populate="static-toc"></ul>
                    </div>
                </nav>

                <section class="policy-content-card" data-component="privacy-content-loader">
                    <div class="policy-error" data-populate="static-error" role="alert" aria-live="assertive" hidden></div>
                    <article id="privacy-policy-body" class="policy-body" data-populate="static-body"></article>
                </section>

                <div data-component="privacy-url-state-sync" aria-hidden="true"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="footer-inner">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-links">
                    <li class="footer-item"><a href="about.html" class="footer-link">About</a></li>
                    <li class="footer-item"><a href="pricing.html" class="footer-link">Pricing</a></li>
                    <li class="footer-item"><a href="help.html" class="footer-link">Help &amp; Support</a></li>
                    <li class="footer-item"><a href="contact.html" class="footer-link">Contact</a></li>
                    <li class="footer-item"><a href="terms.html" class="footer-link">Terms of Service</a></li>
                    <li class="footer-item"><a href="privacy.html" class="footer-link">Privacy Policy</a></li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span data-year="current-year">2024</span> Parked Domains. All rights reserved.</p>
        </div>
    </footer>

    <!-- SDK / business logic -->
    <script src="business_logic.js"></script>

    <script>
        (function () {
            var yearNode = document.querySelector('[data-year="current-year"]');
            if (yearNode) {
                yearNode.textContent = String(new Date().getFullYear());
            }
        })();
    </script>

    <script>
        (function () {
            'use strict';

            var state = {
                currentSectionId: null,
                lang: null,
                version: null,
                pageCode: 'privacy_policy',
                sections: [],
                interactionsInitialized: false
            };

            function getUrlParams() {
                var url = new URL(window.location.href);
                var params = url.searchParams;
                return {
                    section: params.get('section') || null,
                    lang: params.get('lang') || null,
                    version: params.get('version') || null
                };
            }

            function setDocumentTitle(title) {
                if (title && typeof title === 'string') {
                    document.title = title + ' | Parked Domains';
                }
            }

            function renderError(container, message) {
                if (!container) {
                    return;
                }
                container.textContent = message || 'We\'re unable to load this information right now. Please try again later.';
                container.hidden = false;
            }

            function clearError(container) {
                if (!container) {
                    return;
                }
                container.textContent = '';
                container.hidden = true;
            }

            function slugify(text) {
                if (!text) {
                    return '';
                }
                return text
                    .toLowerCase()
                    .trim()
                    .replace(/[^a-z0-9\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/-+/g, '-');
            }

            function scrollToSection(sectionId, options) {
                if (!sectionId) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                var target = document.getElementById(sectionId);
                if (!target) {
                    return;
                }
                var rect = target.getBoundingClientRect();
                var scrollY = window.scrollY || window.pageYOffset;
                var targetY = scrollY + rect.top;
                var tocBar = document.querySelector('.policy-toc-card');
                var offset = 16;
                if (tocBar) {
                    var styles = window.getComputedStyle(tocBar);
                    var marginBottom = parseFloat(styles.marginBottom || '0');
                    offset += tocBar.offsetHeight + marginBottom;
                }
                var behavior = (!options || options.smooth !== false) ? 'smooth' : 'auto';
                window.scrollTo({ top: targetY - offset, behavior: behavior });

                if (options && options.highlight) {
                    var bodyContainer = document.querySelector('[data-populate="static-body"]');
                    if (bodyContainer) {
                        var previous = bodyContainer.querySelectorAll('.policy-section-active');
                        for (var i = 0; i < previous.length; i++) {
                            previous[i].classList.remove('policy-section-active');
                        }
                    }
                    target.classList.add('policy-section-active');
                }
            }

            function setActiveSection(sectionId) {
                state.currentSectionId = sectionId;

                var tocList = document.querySelector('[data-populate="static-toc"]');
                if (tocList) {
                    var items = tocList.querySelectorAll('.policy-toc-item');
                    for (var i = 0; i < items.length; i++) {
                        items[i].classList.remove('is-active');
                    }
                    if (sectionId) {
                        var activeLink = tocList.querySelector('[data-section-id="' + sectionId + '"]');
                        if (activeLink && activeLink.parentElement) {
                            activeLink.parentElement.classList.add('is-active');
                        }
                    }
                }
            }

            function updateUrlSection(sectionId, push) {
                var url = new URL(window.location.href);
                var params = url.searchParams;

                if (sectionId) {
                    params.set('section', sectionId);
                } else {
                    params.delete('section');
                }

                url.search = params.toString();
                var newUrl = url.toString();

                if (push) {
                    window.history.pushState({}, '', newUrl);
                } else {
                    window.history.replaceState({}, '', newUrl);
                }
            }

            function handleScrollActiveSection() {
                if (!state.sections || state.sections.length === 0) {
                    return;
                }
                var viewportTop = 0;
                var viewportOffsetBand = 180;
                var scrollY = window.scrollY || window.pageYOffset;

                var closestId = null;
                var closestDistance = Infinity;

                for (var i = 0; i < state.sections.length; i++) {
                    var id = state.sections[i].id;
                    var el = document.getElementById(id);
                    if (!el) {
                        continue;
                    }
                    var rect = el.getBoundingClientRect();
                    var distance = Math.abs(rect.top - viewportTop - viewportOffsetBand);
                    if (rect.top <= viewportOffsetBand && distance < closestDistance) {
                        closestDistance = distance;
                        closestId = id;
                    }
                }

                if (closestId && closestId !== state.currentSectionId) {
                    setActiveSection(closestId);
                    updateUrlSection(closestId, false);
                }
            }

            function handlePopState() {
                var params = getUrlParams();
                var previousLang = state.lang;
                var previousVersion = state.version;
                state.lang = params.lang;
                state.version = params.version;

                if (params.lang !== previousLang || params.version !== previousVersion) {
                    loadStaticContent();
                    return;
                }

                if (params.section !== state.currentSectionId) {
                    state.currentSectionId = params.section;
                    if (state.currentSectionId) {
                        scrollToSection(state.currentSectionId, { smooth: false, highlight: true });
                        setActiveSection(state.currentSectionId);
                    } else {
                        window.scrollTo({ top: 0, behavior: 'auto' });
                        setActiveSection(null);
                    }
                }
            }

            function buildTableOfContents(bodyContainer, tocContainer) {
                if (!bodyContainer || !tocContainer) {
                    return;
                }

                tocContainer.innerHTML = '';
                var headings = bodyContainer.querySelectorAll('h2, h3, h4');
                var sections = [];

                for (var i = 0; i < headings.length; i++) {
                    var heading = headings[i];
                    var existingId = heading.getAttribute('id');
                    var text = heading.textContent || heading.innerText || '';
                    var id = existingId || slugify(text) || 'section-' + (i + 1);
                    heading.id = id;

                    sections.push({
                        id: id,
                        text: text || 'Section ' + (i + 1),
                        level: parseInt(heading.tagName.replace('H', ''), 10) || 2
                    });

                    var li = document.createElement('li');
                    li.className = 'policy-toc-item level-' + heading.tagName.toLowerCase();

                    var link = document.createElement('a');
                    link.href = 'javascript:void(0)';
                    link.textContent = text || 'Section ' + (i + 1);
                    link.setAttribute('data-action', 'jump-to-section');
                    link.setAttribute('data-section-id', id);

                    li.appendChild(link);
                    tocContainer.appendChild(li);
                }

                state.sections = sections;
            }

            function initInteractionsOnce() {
                if (state.interactionsInitialized) {
                    return;
                }
                state.interactionsInitialized = true;

                document.addEventListener('click', function (event) {
                    var target = event.target;
                    if (!target) {
                        return;
                    }
                    if (target.dataset && target.dataset.action === 'jump-to-section') {
                        event.preventDefault();
                        var sectionId = target.dataset.sectionId;
                        if (sectionId) {
                            updateUrlSection(sectionId, true);
                            setActiveSection(sectionId);
                            scrollToSection(sectionId, { highlight: true });
                        }
                    }
                });

                window.addEventListener('scroll', function () {
                    window.requestAnimationFrame(handleScrollActiveSection);
                });

                window.addEventListener('popstate', handlePopState);
            }

            function loadStaticContent() {
                var params = getUrlParams();
                state.lang = params.lang;
                state.version = params.version;
                state.currentSectionId = params.section;

                var titleNode = document.querySelector('[data-populate="static-title"]');
                var updatedNode = document.querySelector('[data-populate="static-last-updated"]');
                var bodyNode = document.querySelector('[data-populate="static-body"]');
                var errorNode = document.querySelector('[data-populate="static-error"]');
                var tocNode = document.querySelector('[data-populate="static-toc"]');

                var result = null;
                try {
                    result = WebsiteSDK.getStaticPageContent(state.pageCode);
                } catch (e) {
                    result = null;
                }

                if (!result || typeof result.body !== 'string') {
                    if (titleNode) {
                        titleNode.textContent = '';
                    }
                    if (updatedNode) {
                        updatedNode.textContent = '';
                        updatedNode.removeAttribute('datetime');
                    }
                    if (bodyNode) {
                        bodyNode.innerHTML = '';
                    }
                    if (tocNode) {
                        tocNode.innerHTML = '';
                    }
                    renderError(errorNode, 'We\'re unable to load this information right now. Please try again later.');
                    return;
                }

                clearError(errorNode);

                if (titleNode) {
                    titleNode.textContent = result.title || '';
                }
                setDocumentTitle(result.title || '');

                if (updatedNode) {
                    var updatedValue = result.last_updated || '';
                    if (updatedValue) {
                        updatedNode.textContent = updatedValue;
                        updatedNode.setAttribute('datetime', updatedValue);
                    } else {
                        updatedNode.textContent = '';
                        updatedNode.removeAttribute('datetime');
                    }
                }

                if (bodyNode) {
                    bodyNode.innerHTML = '';
                    var rawBody = result.body || '';
                    if (rawBody.indexOf('<') !== -1) {
                        bodyNode.innerHTML = rawBody;
                    } else {
                        var p = document.createElement('p');
                        p.textContent = rawBody;
                        bodyNode.appendChild(p);
                    }
                }

                if (bodyNode && tocNode) {
                    buildTableOfContents(bodyNode, tocNode);
                }

                initInteractionsOnce();

                if (state.currentSectionId) {
                    scrollToSection(state.currentSectionId, { smooth: false, highlight: true });
                    setActiveSection(state.currentSectionId);
                } else {
                    setActiveSection(null);
                }
            }

            document.addEventListener('DOMContentLoaded', function () {
                loadStaticContent();
            });
        })();
    </script>
</body>
</html>
