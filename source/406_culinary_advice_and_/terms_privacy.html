  <section class="hero" aria-labelledby="page-title">

  <main id="content" class="content">
    <div class="content-inner container layout">
      <div class="layout-main">
        <!-- Legal interface: view switcher + meta -->
        <section class="legal-interface" aria-label="Legal documents">
          <div class="legal-tabs" data-component="terms-privacy-view-switcher" role="tablist" aria-label="Select legal document">
            <button
              type="button"
              id="tab-terms"
              class="legal-tab-button is-active"
              role="tab"
              aria-selected="true"
              aria-controls="terms-section"
              tabindex="0"
              data-action="set-active-view"
              data-view="terms">
              Terms of Use
            </button>
            <button
              type="button"
              id="tab-privacy"
              class="legal-tab-button"
              role="tab"
              aria-selected="false"
              aria-controls="privacy-section"
              tabindex="-1"
              data-action="set-active-view"
              data-view="privacy">
              Privacy Policy
            </button>
          </div>

          <p class="legal-meta" data-component="last-updated-indicator">
            <span class="legal-meta-label">Last updated:</span>
            <time class="legal-meta-value" data-populate="last-updated"></time>
          </p>
        </section>

        <!-- Terms of Use section -->
        <article
          id="terms-section"
          class="legal-section legal-section--terms is-active"
          role="tabpanel"
          aria-labelledby="tab-terms"
          data-component="terms-section"
          data-populate="terms-html">
          <!-- Terms HTML content will be injected here -->
        </article>

        <!-- Privacy Policy section -->
        <article
          id="privacy-section"
          class="legal-section legal-section--privacy"
          role="tabpanel"
          aria-labelledby="tab-privacy"
          hidden
          data-component="privacy-section"
          data-populate="privacy-html">
          <!-- Privacy HTML content will be injected here -->

                    type="button"

                </li>
                <li class="sidebar-link-item">
                  <button
                    type="button"

  <!-- SDK & business logic -->
  <script src="business_logic.js"></script>

  <!-- Page UI logic -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // ---------- State ----------
      const state = {
        activeView: 'terms', // 'terms' | 'privacy'
        legalContent: null,
        hadInitialViewParam: false
      };

      // ---------- URL state manager ----------
      function readViewFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const viewParam = params.get('view');
        if (viewParam === 'terms' || viewParam === 'privacy') {
          state.activeView = viewParam;
          state.hadInitialViewParam = true;
        } else {
          state.activeView = 'terms';
          state.hadInitialViewParam = false;
        }
      }

      function updateUrlForActiveView(options) {
        const opts = options || {};
        const url = new URL(window.location.href);
        url.searchParams.set('view', state.activeView);
        const historyState = { view: state.activeView };
        if (opts.replaceState) {
          window.history.replaceState(historyState, '', url.toString());
        } else {
          window.history.pushState(historyState, '', url.toString());
        }
      }

      function setActiveView(nextView, options) {
        const view = nextView === 'privacy' ? 'privacy' : 'terms';
        const opts = options || {};
        const isSame = state.activeView === view;
        state.activeView = view;

        updateViewSwitcherUI();
        updateSectionVisibility();

        if (opts.updateUrl) {
          updateUrlForActiveView({ replaceState: !!opts.replaceState });
        }

        if (opts.scroll || (!isSame && opts.scroll !== false)) {
          scrollToActiveSection();
        }
      }

      window.addEventListener('popstate', function (event) {
        let viewFromState = event.state && (event.state.view === 'terms' || event.state.view === 'privacy')
          ? event.state.view
          : null;
        if (!viewFromState) {
          const params = new URLSearchParams(window.location.search);
          const paramView = params.get('view');
          viewFromState = paramView === 'privacy' ? 'privacy' : 'terms';
        }
        setActiveView(viewFromState, { updateUrl: false, scroll: true });
      });

      // ---------- Legal content loader ----------
      function loadLegalContent() {
        let data = null;
        try {
          data = WebsiteSDK.getTermsAndPrivacyContent();
        } catch (error) {
          console.error('Failed to load legal content via getTermsAndPrivacyContent:', error);
          data = null;
        }
        if (!data || typeof data !== 'object') {
          state.legalContent = {
            terms_html: '',
            privacy_html: '',
            last_updated: ''
          };
        } else {
          state.legalContent = data;
        }
      }

      // ---------- Rendering helpers for data-populate ----------
      function formatLastUpdated(rawValue) {
        if (!rawValue) {
          return {
            displayText: 'Not available',
            isoDate: ''
          };
        }
        const parsed = new Date(rawValue);
        if (Number.isNaN(parsed.getTime())) {
          // Fall back to raw string if parsing fails
          return {
            displayText: String(rawValue),
            isoDate: ''
          };
        }
        const displayText = parsed.toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });
        const isoDate = parsed.toISOString().split('T')[0];
        return { displayText, isoDate };
      }

      function populateElement(container, type) {
        const content = state.legalContent || { terms_html: '', privacy_html: '', last_updated: '' };

        if (type === 'terms-html') {
          if (content.terms_html) {
            container.innerHTML = content.terms_html;
          } else {
            container.innerHTML = '<p>Terms of Use are currently unavailable. Please try again later.</p>';
          }
        } else if (type === 'privacy-html') {
          if (content.privacy_html) {
            container.innerHTML = content.privacy_html;
          } else {
            container.innerHTML = '<p>Privacy Policy is currently unavailable. Please try again later.</p>';
          }
        } else if (type === 'last-updated') {
          const formatted = formatLastUpdated(content.last_updated);
          container.textContent = formatted.displayText;
          if (container.tagName === 'TIME' && formatted.isoDate) {
            container.setAttribute('datetime', formatted.isoDate);
          }
        }
      }

      function populateAll() {
        const populateNodes = document.querySelectorAll('[data-populate]');
        populateNodes.forEach(function (node) {
          const type = node.getAttribute('data-populate');
          populateElement(node, type);
        });
      }

      // ---------- View switcher & section visibility ----------
      function updateViewSwitcherUI() {
        const switcher = document.querySelector('[data-component="terms-privacy-view-switcher"]');
        if (!switcher) return;
        const tabButtons = switcher.querySelectorAll('[data-action="set-active-view"]');
        tabButtons.forEach(function (button) {
          const view = button.getAttribute('data-view') === 'privacy' ? 'privacy' : 'terms';
          const isActive = view === state.activeView;
          button.classList.toggle('is-active', isActive);
          button.setAttribute('aria-selected', isActive ? 'true' : 'false');
          button.setAttribute('tabindex', isActive ? '0' : '-1');
        });
      }

      function updateSectionVisibility() {
        const termsSection = document.getElementById('terms-section');
        const privacySection = document.getElementById('privacy-section');

        if (termsSection) {
          const termsActive = state.activeView === 'terms';
          termsSection.classList.toggle('is-active', termsActive);
          if (termsActive) {
            termsSection.removeAttribute('hidden');
          } else {
            termsSection.setAttribute('hidden', 'hidden');
          }
        }

        if (privacySection) {
          const privacyActive = state.activeView === 'privacy';
          privacySection.classList.toggle('is-active', privacyActive);
          if (privacyActive) {
            privacySection.removeAttribute('hidden');
          } else {
            privacySection.setAttribute('hidden', 'hidden');
          }
        }
      }

      function scrollToActiveSection() {
        const targetId = state.activeView === 'privacy' ? 'privacy-section' : 'terms-section';
        const target = document.getElementById(targetId);
        if (target && typeof target.scrollIntoView === 'function') {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }

      // ---------- Event wiring ----------
      function bindActions() {
        const actionNodes = document.querySelectorAll('[data-action]');
        actionNodes.forEach(function (node) {
          const action = node.getAttribute('data-action');

          if (action === 'set-active-view' || action === 'jump-to-section') {
            node.addEventListener('click', function () {
              const view = node.getAttribute('data-view') === 'privacy' ? 'privacy' : 'terms';
              setActiveView(view, { updateUrl: true, scroll: true });
            });
          }
        });
      }

      // ---------- Initialization ----------
      readViewFromUrl();
      loadLegalContent();
      populateAll();
      updateViewSwitcherUI();
      updateSectionVisibility();
      bindActions();

      // For deep links (URL includes ?view=...), scroll to the requested section on load
      if (state.hadInitialViewParam) {
        scrollToActiveSection();
      }
    });
  </script>
</body>
