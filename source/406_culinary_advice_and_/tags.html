  <main id="content" class="content">
    <div class="content-inner container layout">
      <section class="page-controller-bar" data-component="tags-page-controller" aria-label="Tag view controls">

          <p class="page-controller-text">

        <section class="tag-validation-summary" data-component="tag-validation-summary" data-populate="tagValidation" aria-live="polite">
          <!-- Filled dynamically -->
        </section>

        <section class="tagged-recipes-toolbar" data-component="tagged-recipes-toolbar">
          <form class="toolbar-form" role="search" aria-label="Filter and sort recipes in this tag">
            <div class="form-group">
              <label for="recipeFilterInput">Search within this tag</label>
              <input id="recipeFilterInput" type="search" name="q" placeholder="Search by recipe or ingredient" data-action="filterRecipes">

            <div class="form-group">
              <label for="recipeSortSelect">Sort recipes</label>

                <option value="title_asc">Title A&ndash;Z</option>
                <option value="title_desc">Title Z&ndash;A</option>
                <option value="total_time_minutes_asc">Total time: short to long</option>
                <option value="total_time_minutes_desc">Total time: long to short</option>
                <option value="popularity_score_desc">Most popular</option>
              </select>
            </div>
          </form>
        </section>

        <section class="recipes-region">
          <section class="empty-state-panel" data-component="empty-state-panel" data-populate="emptyState">
            <!-- Filled dynamically -->
          </section>

          <section class="tagged-recipes-list" data-component="tagged-recipes-list" data-populate="taggedRecipes" aria-label="Recipes for selected tag">
            <!-- Filled dynamically -->
          </section>
        </section>
      </div>

      <aside class="layout-sidebar" aria-label="Sidebar">
        <section class="card sidebar-card" data-component="tag-overview-list">
          <div class="card-accent"></div>
          <div class="card-body" data-populate="tagsOverview">
            <!-- Filled dynamically -->
          </div>

  <!-- SDK / business logic -->
  <script src="business_logic.js"></script>

  <!-- Page UI logic -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      var urlParams = new URLSearchParams(window.location.search);
      var initialTagId = urlParams.get('tagId');

      var state = {
        tagsOverview: [],
        selectedTagId: initialTagId,
        selectedTagMeta: null,      // from getTagsOverview: { tag, recipe_count }
        selectedTagFromList: null,  // from listRecipesByTag: tag
        recipesForTag: [],          // from listRecipesByTag: recipes
        filterQuery: '',
        sortOption: 'relevance',
        hadOverviewError: false,
        hadRecipesError: false
      };

      function getSelectedTagName() {
        if (state.selectedTagMeta && state.selectedTagMeta.tag && state.selectedTagMeta.tag.name) {
          return state.selectedTagMeta.tag.name;
        }
        if (state.selectedTagFromList && state.selectedTagFromList.name) {
          return state.selectedTagFromList.name;
        }
        return '';
      }

      function getExpectedRecipeCount() {
        if (state.selectedTagMeta && typeof state.selectedTagMeta.recipe_count === 'number') {
          return state.selectedTagMeta.recipe_count;
        }
        return null;
      }

      function getLoadedRecipeCount() {
        return Array.isArray(state.recipesForTag) ? state.recipesForTag.length : 0;
      }

      function getFilteredSortedRecipes() {
        var recipes = Array.isArray(state.recipesForTag) ? state.recipesForTag.slice() : [];
        var query = (state.filterQuery || '').toLowerCase();

        if (query) {
          recipes = recipes.filter(function(recipe) {
            if (!recipe) return false;
            var title = (recipe.title || '').toLowerCase();
            var description = (recipe.description || '').toLowerCase();
            var matchesTitle = title.indexOf(query) !== -1;
            var matchesDescription = description.indexOf(query) !== -1;
            var matchesIngredients = false;
            if (Array.isArray(recipe.ingredient_keywords)) {
              for (var i = 0; i < recipe.ingredient_keywords.length; i += 1) {
                var kw = (recipe.ingredient_keywords[i] || '').toLowerCase();
                if (kw.indexOf(query) !== -1) {
                  matchesIngredients = true;
                  break;
                }
              }
            }
            return matchesTitle || matchesDescription || matchesIngredients;
          });
        }

        var sortOption = state.sortOption || 'relevance';

        if (sortOption === 'title_asc') {
          recipes.sort(function(a, b) {
            var ta = (a && a.title) ? a.title : '';
            var tb = (b && b.title) ? b.title : '';
            return ta.localeCompare(tb);
          });
        } else if (sortOption === 'title_desc') {
          recipes.sort(function(a, b) {
            var ta = (a && a.title) ? a.title : '';
            var tb = (b && b.title) ? b.title : '';
            return tb.localeCompare(ta);
          });
        } else if (sortOption === 'total_time_minutes_asc') {
          recipes.sort(function(a, b) {
            var ta = (typeof (a && a.total_time_minutes) === 'number') ? a.total_time_minutes : 0;
            var tb = (typeof (b && b.total_time_minutes) === 'number') ? b.total_time_minutes : 0;
            return ta - tb;
          });
        } else if (sortOption === 'total_time_minutes_desc') {
          recipes.sort(function(a, b) {
            var ta = (typeof (a && a.total_time_minutes) === 'number') ? a.total_time_minutes : 0;
            var tb = (typeof (b && b.total_time_minutes) === 'number') ? b.total_time_minutes : 0;
            return tb - ta;
          });
        } else if (sortOption === 'popularity_score_desc') {
          recipes.sort(function(a, b) {
            var pa = (typeof (a && a.popularity_score) === 'number') ? a.popularity_score : 0;
            var pb = (typeof (b && b.popularity_score) === 'number') ? b.popularity_score : 0;
            if (pb !== pa) return pb - pa;
            var ra = (typeof (a && a.average_rating) === 'number') ? a.average_rating : 0;
            var rb = (typeof (b && b.average_rating) === 'number') ? b.average_rating : 0;
            return rb - ra;
          });
        }

        return recipes;
      }

      function renderTagsOverview(container) {
        container.innerHTML = '';

        var wrapper = document.createElement('div');
        wrapper.className = 'tags-overview-wrapper';

        var figure = document.createElement('figure');
        figure.className = 'sidebar-image';
        var img = document.createElement('img');
        img.src = 'https://www.abbeyskitchen.com/wp-content/uploads/2021/02/HEALTHY-STUFFED-POTATOES-INGREDIENTS.jpg';
        img.alt = 'Assorted ingredients used for tagged recipes';
        figure.appendChild(img);
        wrapper.appendChild(figure);

        var header = document.createElement('header');
        header.className = 'sidebar-header';
        var h2 = document.createElement('h2');
        h2.className = 'sidebar-title';
        h2.textContent = 'Browse by tag';
        var p = document.createElement('p');
        p.className = 'sidebar-subtitle';
        p.textContent = 'Select a tag to see its recipes.';
        header.appendChild(h2);
        header.appendChild(p);
        wrapper.appendChild(header);

        var list = document.createElement('ul');
        list.className = 'tag-list';
        list.setAttribute('aria-label', 'Available tags');

        if (state.hadOverviewError) {
          var liError = document.createElement('li');
          liError.className = 'tag-list-item tag-list-item--message';
          liError.textContent = 'We could not load tags right now. Please try again.';
          list.appendChild(liError);
        } else if (!state.tagsOverview || state.tagsOverview.length === 0) {
          var liEmpty = document.createElement('li');
          liEmpty.className = 'tag-list-item tag-list-item--message';
          liEmpty.textContent = 'No tags have been created yet.';
          list.appendChild(liEmpty);
        } else {
          for (var i = 0; i < state.tagsOverview.length; i += 1) {
            var entry = state.tagsOverview[i];
            if (!entry || !entry.tag) continue;

            var li = document.createElement('li');
            li.className = 'tag-list-item';

            var link = document.createElement('a');
            link.href = 'javascript:void(0)';
            link.className = 'tag-list-link';
            link.setAttribute('data-action', 'selectTag');
            link.setAttribute('data-tag-id', entry.tag.id);
            link.textContent = entry.tag.name + ' (' + (typeof entry.recipe_count === 'number' ? entry.recipe_count : 0) + ')';

            if (state.selectedTagId && entry.tag.id === state.selectedTagId) {
              li.classList.add('is-selected');
              link.setAttribute('aria-current', 'page');
            }

            li.appendChild(link);
            list.appendChild(li);
          }
        }

        wrapper.appendChild(list);
        container.appendChild(wrapper);
      }

      function renderTagDetail(container) {
        container.innerHTML = '';
        container.hidden = false;

        var header = document.createElement('header');
        header.className = 'tag-detail-header-inner';

        var title = document.createElement('h2');
        title.className = 'tag-detail-title';

        var meta = document.createElement('p');
        meta.className = 'tag-detail-meta';

        if (!state.selectedTagId) {
          title.textContent = 'Browse recipes by tag';
          meta.textContent = 'Choose a tag on the right to view its associated recipes and compare counts.';
        } else {
          var name = getSelectedTagName() || 'Selected tag';
          var expected = getExpectedRecipeCount();
          var loaded = getLoadedRecipeCount();

          title.textContent = name;

          var metaParts = [];
          if (expected !== null) {
            metaParts.push('Stored recipes: ' + expected);
          }
          metaParts.push('Loaded recipes: ' + loaded);
          meta.textContent = metaParts.join(' b7 ');
        }

        header.appendChild(title);
        header.appendChild(meta);
        container.appendChild(header);
      }

      function renderTagValidation(container) {
        container.innerHTML = '';

        if (!state.selectedTagId || state.hadOverviewError || !state.selectedTagMeta) {
          container.hidden = true;
          return;
        }

        var expected = getExpectedRecipeCount();
        var loaded = getLoadedRecipeCount();

        if (expected === null) {
          container.hidden = true;
          return;
        }

        container.hidden = false;

        var panel = document.createElement('div');
        var matches = expected === loaded;
        panel.className = 'validation-panel' + (matches ? ' validation-panel--match' : ' validation-panel--mismatch');

        var heading = document.createElement('p');
        heading.className = 'validation-heading';
        heading.textContent = 'Tag recipe association check';
        panel.appendChild(heading);

        var details = document.createElement('p');
        details.className = 'validation-details';
        details.textContent = 'Stored recipe count: ' + expected + ' b7 Loaded recipes: ' + loaded + '.';
        panel.appendChild(details);

        var status = document.createElement('p');
        status.className = 'validation-status';
        if (matches) {
          status.textContent = 'The loaded recipes match the stored recipe count for this tag.';
        } else {
          status.textContent = 'The loaded recipes do not match the stored recipe count. This may indicate that tag associations are out of sync.';
        }
        panel.appendChild(status);

        container.appendChild(panel);
      }

      function renderTaggedRecipes(container) {
        container.innerHTML = '';

        var hasTag = !!state.selectedTagId;
        var filtered = hasTag ? getFilteredSortedRecipes() : [];

        if (!hasTag || !filtered || filtered.length === 0) {
          container.hidden = true;
          return;
        }

        container.hidden = false;

        for (var i = 0; i < filtered.length; i += 1) {
          var recipe = filtered[i];
          if (!recipe) continue;

          var card = document.createElement('article');
          card.className = 'recipe-card';
          card.setAttribute('data-recipe-id', recipe.id);

          var media = document.createElement('div');
          media.className = 'recipe-card-media';
          if (recipe.image_url) {
            var img = document.createElement('img');
            img.src = recipe.image_url;
            img.alt = recipe.title || 'Recipe image';
            media.appendChild(img);
          }
          card.appendChild(media);

          var body = document.createElement('div');
          body.className = 'recipe-card-body';

          var titleEl = document.createElement('h3');
          titleEl.className = 'recipe-card-title';
          var link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.className = 'recipe-card-link';
          link.setAttribute('data-action', 'openRecipe');
          link.setAttribute('data-recipe-id', recipe.id);
          link.textContent = recipe.title || 'Untitled recipe';
          titleEl.appendChild(link);
          body.appendChild(titleEl);

          if (recipe.description) {
            var desc = document.createElement('p');
            desc.className = 'recipe-card-description';
            desc.textContent = recipe.description;
            body.appendChild(desc);
          }

          var meta = document.createElement('p');
          meta.className = 'recipe-card-meta';
          var metaParts = [];

          if (typeof recipe.total_time_minutes === 'number') {
            metaParts.push(recipe.total_time_minutes + ' min total');
          }

          if (recipe.course) {
            metaParts.push(recipe.course.replace(/_/g, ' '));
          }

          if (typeof recipe.average_rating === 'number') {
            var ratingText = recipe.average_rating.toFixed(1);
            if (typeof recipe.review_count === 'number') {
              ratingText += ' b7 ' + recipe.review_count + ' reviews';
            }
            metaParts.push(ratingText);
          }

          if (metaParts.length > 0) {
            meta.textContent = metaParts.join(' b7 ');
            body.appendChild(meta);
          }

          if (Array.isArray(recipe.dietary_labels) && recipe.dietary_labels.length > 0) {
            var chips = document.createElement('ul');
            chips.className = 'recipe-card-dietary-labels';
            for (var j = 0; j < recipe.dietary_labels.length; j += 1) {
              var lbl = recipe.dietary_labels[j];
              if (!lbl) continue;
              var chipLi = document.createElement('li');
              chipLi.className = 'dietary-chip';
              chipLi.textContent = lbl.replace(/_/g, ' ');
              chips.appendChild(chipLi);
            }
            body.appendChild(chips);
          }

          card.appendChild(body);
          container.appendChild(card);
        }
      }

      function renderEmptyState(container) {
        container.innerHTML = '';

        var hasTag = !!state.selectedTagId;

        if (state.hadOverviewError && !hasTag) {
          container.hidden = false;
          var errorWrapper = document.createElement('div');
          errorWrapper.className = 'empty-state empty-state--error';
          errorWrapper.innerHTML = '<h3 class="empty-state-title">We couldn\'t load tags</h3>' +
            '<p class="empty-state-body">Please refresh the page to try again.</p>';
          container.appendChild(errorWrapper);
          return;
        }

        if (!hasTag) {
          container.hidden = false;
          var neutral = document.createElement('div');
          neutral.className = 'empty-state empty-state--neutral';
          neutral.innerHTML = '<h3 class="empty-state-title">Choose a tag to get started</h3>' +
            '<p class="empty-state-body">Use the tag list on the right to explore recipes grouped by your favorite themes.</p>';
          container.appendChild(neutral);
          return;
        }

        if (state.hadRecipesError) {
          container.hidden = false;
          var errorRecipes = document.createElement('div');
          errorRecipes.className = 'empty-state empty-state--error';
          errorRecipes.innerHTML = '<h3 class="empty-state-title">We couldn\'t load recipes</h3>' +
            '<p class="empty-state-body">Please refresh the page or try again later.</p>';
          container.appendChild(errorRecipes);
          return;
        }

        var totalLoaded = getLoadedRecipeCount();
        var filtered = getFilteredSortedRecipes();
        var filteredCount = filtered.length;

        if (totalLoaded === 0) {
          container.hidden = false;
          var name = getSelectedTagName() || 'this tag';
          var none = document.createElement('div');
          none.className = 'empty-state empty-state--tag';
          none.innerHTML = '<h3 class="empty-state-title">No recipes found for this tag</h3>' +
            '<p class="empty-state-body">There are no recipes associated with \' ' + name.replace(/</g, '&lt;').replace(/>/g, '&gt;') + ' \' yet.</p>' +
            '<button type="button" class="btn btn-secondary" data-action="clearTagSelection">Back to all tags</button>';
          container.appendChild(none);
          return;
        }

        if (filteredCount === 0 && totalLoaded > 0) {
          container.hidden = false;
          var noMatch = document.createElement('div');
          noMatch.className = 'empty-state empty-state--filter';
          noMatch.innerHTML = '<h3 class="empty-state-title">No recipes match your search</h3>' +
            '<p class="empty-state-body">Try adjusting or clearing your search terms to see all recipes for this tag.</p>';
          container.appendChild(noMatch);
          return;
        }

        container.hidden = true;
      }

      function renderPageModeText(container) {
        var name = getSelectedTagName();
        if (!state.selectedTagId || !name) {
          container.textContent = 'All tags';
        } else {
          container.textContent = name;
        }
      }

      function updateToolbarEnabled() {
        var filterInput = document.querySelector('[data-action="filterRecipes"]');
        var sortSelect = document.querySelector('[data-action="sortRecipes"]');
        var toolbar = document.querySelector('.tagged-recipes-toolbar');
        var hasTag = !!state.selectedTagId && !state.hadRecipesError;

        if (filterInput) {
          if (!hasTag) {
            filterInput.value = '';
          }
          filterInput.disabled = !hasTag;
        }
        if (sortSelect) {
          if (!hasTag) {
            sortSelect.value = 'relevance';
          }
          sortSelect.disabled = !hasTag;
        }
        if (toolbar) {
          if (hasTag) {
            toolbar.classList.remove('is-disabled');
          } else {
            toolbar.classList.add('is-disabled');
          }
        }
      }

      function updateClearButtonState() {
        var clearBtn = document.querySelector('[data-action="clearTagSelection"]');
        if (!clearBtn) return;
        if (state.selectedTagId) {
          clearBtn.disabled = false;
          clearBtn.classList.remove('is-disabled');
        } else {
          clearBtn.disabled = true;
          clearBtn.classList.add('is-disabled');
        }
      }

      function renderAll() {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          var type = element.getAttribute('data-populate');
          if (type === 'tagsOverview') {
            renderTagsOverview(element);
          } else if (type === 'tagDetail') {
            renderTagDetail(element);
          } else if (type === 'tagValidation') {
            renderTagValidation(element);
          } else if (type === 'taggedRecipes') {
            renderTaggedRecipes(element);
          } else if (type === 'emptyState') {
            renderEmptyState(element);
          } else if (type === 'pageModeText') {
            renderPageModeText(element);
          }
        });
        updateClearButtonState();
      }

      function loadData() {
        state.tagsOverview = [];
        state.selectedTagMeta = null;
        state.selectedTagFromList = null;
        state.recipesForTag = [];
        state.hadOverviewError = false;
        state.hadRecipesError = false;

        try {
          var overview = WebsiteSDK.getTagsOverview();
          if (overview && Array.isArray(overview.tags)) {
            state.tagsOverview = overview.tags;
          }
        } catch (e) {
          console.error('Failed to load tags overview', e);
          state.hadOverviewError = true;
        }

        if (state.selectedTagId) {
          if (state.tagsOverview && state.tagsOverview.length > 0) {
            for (var i = 0; i < state.tagsOverview.length; i += 1) {
              var entry = state.tagsOverview[i];
              if (entry && entry.tag && entry.tag.id === state.selectedTagId) {
                state.selectedTagMeta = entry;
                break;
              }
            }
          }

          try {
            var result = WebsiteSDK.listRecipesByTag(state.selectedTagId);
            if (result) {
              if (result.tag) {
                state.selectedTagFromList = result.tag;
              }
              if (Array.isArray(result.recipes)) {
                state.recipesForTag = result.recipes;
              }
            }
          } catch (e2) {
            console.error('Failed to load recipes for tag', e2);
            state.hadRecipesError = true;
          }
        }

        renderAll();
        updateToolbarEnabled();
      }

      var filterInputEl = document.querySelector('[data-action="filterRecipes"]');
      if (filterInputEl) {
        filterInputEl.addEventListener('input', function(event) {
          state.filterQuery = event.target.value || '';
          renderTaggedRecipes(document.querySelector('[data-populate="taggedRecipes"]'));
          renderEmptyState(document.querySelector('[data-populate="emptyState"]'));
        });
      }

      var sortSelectEl = document.querySelector('[data-action="sortRecipes"]');
      if (sortSelectEl) {
        sortSelectEl.addEventListener('change', function(event) {
          state.sortOption = event.target.value || 'relevance';
          renderTaggedRecipes(document.querySelector('[data-populate="taggedRecipes"]'));
          renderEmptyState(document.querySelector('[data-populate="emptyState"]'));
        });
      }

      var actionElements = document.querySelectorAll('[data-action]');
      if (actionElements && actionElements.length) {
        // Elements are handled via delegated listeners below.
      }

      document.addEventListener('click', function(event) {
        var target = event.target;
        var actionEl = target.closest('[data-action]');
        if (!actionEl) return;

        var action = actionEl.getAttribute('data-action');

        if (action === 'selectTag') {
          var tagId = actionEl.getAttribute('data-tag-id');
          if (tagId) {
            window.location.href = 'tags.html?tagId=' + encodeURIComponent(tagId);
          }
        } else if (action === 'clearTagSelection') {
          event.preventDefault();
          window.location.href = 'tags.html';
        } else if (action === 'openRecipe') {
          var recipeId = actionEl.getAttribute('data-recipe-id');
          if (recipeId) {
            window.location.href = 'recipe.html?id=' + encodeURIComponent(recipeId);
          }
        }
      });

      loadData();
    });
  </script>
</body>
</html>
