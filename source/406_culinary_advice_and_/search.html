<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Culinary Blog &ndash; Layout Framework</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet">

  <!-- Framework styles -->
  
  <link rel="stylesheet" href="search.css">
</head>
<body class="site">

  <header class="site-header">
    <div class="header-inner container">
      <a href="index.html" class="site-logo" aria-label="Culinary home">
        <!-- Replace logo.svg with your actual logo asset -->
        <img src="logo.svg" alt="Culinary Passion logo" class="site-logo-image">
      </a>

      <nav class="site-nav" aria-label="Primary">
        <ul class="nav-list">
          <li class="nav-item"><a href="index.html" class="nav-link is-active">Home</a></li>
          <li class="nav-item"><a href="recipes.html" class="nav-link">Recipes</a></li>
          <li class="nav-item"><a href="seasonal.html" class="nav-link">Seasonal</a></li>
          <li class="nav-item"><a href="techniques.html" class="nav-link">Techniques</a></li>
          <li class="nav-item"><a href="meal_plans.html" class="nav-link">Meal Plans</a></li>
          <li class="nav-item"><a href="meal_plans.html?view=my_plans" class="nav-link">My Plans</a></li>
          <li class="nav-item"><a href="tags.html" class="nav-link">Tags</a></li>
          <li class="nav-item"><a href="saved.html" class="nav-link">Saved</a></li>
          <li class="nav-item"><a href="shopping_list.html" class="nav-link">Shopping List</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="hero" aria-labelledby="page-title">
    <div class="hero-inner container">
      <h1 id="page-title" class="hero-title">Search Results</h1>
    </div>
  </section>

  <main id="content" class="content">
    <div class="content-inner container layout">
      <div class="layout-main">
        <!-- search-query-header -->
        <section class="search-query-header" aria-live="polite" data-component="search-query-header" data-populate="search-header">
          <!-- Populated by JS -->
        </section>

        <!-- content-type-tabs -->
        <nav class="content-type-tabs" aria-label="Content type" data-component="content-type-tabs">
          <button type="button" class="tab-link" data-action="set-content-type" data-content-type="">
            All
          </button>
          <button type="button" class="tab-link" data-action="set-content-type" data-content-type="recipes">
            Recipes
          </button>
          <button type="button" class="tab-link" data-action="set-content-type" data-content-type="articles">
            Articles
          </button>
        </nav>

        <!-- results-toolbar -->
        <section class="results-toolbar" data-component="results-toolbar" data-populate="results-toolbar">
          <!-- Populated by JS -->
        </section>

        <!-- error-state -->
        <section class="results-state results-error" data-component="error-state" data-populate="error-state" hidden>
          <!-- Populated by JS -->
        </section>

        <!-- empty-state -->
        <section class="results-state results-empty" data-component="empty-state" data-populate="empty-state" hidden>
          <!-- Populated by JS -->
        </section>

        <!-- results-list -->
        <section class="results-list" data-component="results-list" data-populate="results-list">
          <!-- Populated by JS -->
        </section>

        <!-- pagination-controls -->
        <nav class="pagination-controls" aria-label="Search results pages" data-component="pagination-controls" data-populate="pagination-controls">
          <!-- Populated by JS -->
        </nav>
      </div>

      <aside class="layout-sidebar" aria-label="Filters">
        <section class="card sidebar-card filter-card" data-component="filter-card">
          <div class="card-accent"></div>
          <div class="card-body">
            <header class="filter-card-header">
              <h2 class="filter-title">Refine your search</h2>
            </header>

            <!-- recipe-filter-panel -->
            <div class="filter-panel filter-panel-recipes" data-component="recipe-filter-panel" data-populate="recipe-filters">
              <!-- Populated by JS with recipe filters -->
            </div>

            <!-- article-filter-panel -->
            <div class="filter-panel filter-panel-articles" data-component="article-filter-panel" data-populate="article-filters">
              <!-- Populated by JS with article filters -->
            </div>
          </div>
        </section>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <nav class="footer-nav" aria-label="Footer">
        <ul class="footer-links">
          <li class="footer-item"><a href="about.html" class="footer-link">About</a></li>
          <li class="footer-item"><a href="contact.html" class="footer-link">Contact</a></li>
          <li class="footer-item"><a href="help.html" class="footer-link">Help &amp; FAQ</a></li>
          <li class="footer-item"><a href="collections.html" class="footer-link">Collections</a></li>
          <li class="footer-item"><a href="meal_plans.html" class="footer-link">Meal Plans</a></li>
          <li class="footer-item"><a href="terms_privacy.html" class="footer-link">Terms &amp; Privacy</a></li>
        </ul>
      </nav>
      <div class="footer-meta">
        <p class="footer-copy">&copy; <span class="footer-year">2026</span> Culinary Passion. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    (function() {
      'use strict';

      var recipeFilterOptions = null;
      var articleFilterOptions = null;
      var filterOptionsErrors = { recipes: null, articles: null };
      var searchError = null;
      var lastSearchResult = null;

      var ARTICLE_CONTENT_TYPES = ['tips_substitutions', 'technique', 'general'];
      var RECIPE_FILTER_PARAM_KEYS = [
        'recipe_course',
        'recipe_dietary_labels',
        'recipe_seasons',
        'recipe_time_range',
        'recipe_servings',
        'recipe_cost_range',
        'recipe_calorie_range'
      ];
      var ARTICLE_FILTER_PARAM_KEYS = [
        'article_category',
        'article_content_type',
        'article_reading_time_range'
      ];

      function deriveViewFromContentType(rawContentType) {
        if (!rawContentType) {
          return 'all';
        }
        if (rawContentType === 'recipes') {
          return 'recipes';
        }
        if (rawContentType === 'articles') {
          return 'articles';
        }
        if (ARTICLE_CONTENT_TYPES.indexOf(rawContentType) !== -1) {
          return 'articles';
        }
        return 'all';
      }

      function deriveStateFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var state = {};
        state.query = (params.get('query') || '').trim();
        state.rawContentType = (params.get('content_type') || '').trim();
        state.view = deriveViewFromContentType(state.rawContentType);
        state.sort = (params.get('sort') || '').trim();

        var page = parseInt(params.get('page'), 10);
        state.page = isNaN(page) || page < 1 ? 1 : page;
        var pageSize = parseInt(params.get('page_size'), 10);
        state.page_size = isNaN(pageSize) || pageSize < 1 ? 10 : pageSize;

        function parseMulti(name) {
          var value = params.get(name);
          if (!value) {
            return [];
          }
          var parts = value.split(',');
          var cleaned = [];
          for (var i = 0; i < parts.length; i++) {
            if (parts[i]) {
              cleaned.push(parts[i]);
            }
          }
          return cleaned;
        }

        state.recipeFilters = {
          course: parseMulti('recipe_course'),
          dietary_labels: parseMulti('recipe_dietary_labels'),
          seasons: parseMulti('recipe_seasons'),
          time_range: params.get('recipe_time_range') || '',
          servings: params.get('recipe_servings') || '',
          cost_range: params.get('recipe_cost_range') || '',
          calorie_range: params.get('recipe_calorie_range') || ''
        };

        var articleContentTypes = parseMulti('article_content_type');
        if (ARTICLE_CONTENT_TYPES.indexOf(state.rawContentType) !== -1 && articleContentTypes.indexOf(state.rawContentType) === -1) {
          articleContentTypes.push(state.rawContentType);
        }

        state.articleFilters = {
          category: parseMulti('article_category'),
          content_type: articleContentTypes,
          reading_time_range: params.get('article_reading_time_range') || ''
        };

        return state;
      }

      function loadFilterOptionsIfNeeded() {
        if (!recipeFilterOptions && !filterOptionsErrors.recipes) {
          try {
            recipeFilterOptions = WebsiteSDK.getRecipeFilterOptions('search_page');
            filterOptionsErrors.recipes = null;
          } catch (err) {
            filterOptionsErrors.recipes = err || new Error('Failed to load recipe filter options');
            recipeFilterOptions = null;
          }
        }
        if (!articleFilterOptions && !filterOptionsErrors.articles) {
          try {
            articleFilterOptions = WebsiteSDK.getArticleFilterOptions();
            filterOptionsErrors.articles = null;
          } catch (err) {
            filterOptionsErrors.articles = err || new Error('Failed to load article filter options');
            articleFilterOptions = null;
          }
        }
      }

      function findRangeByLabel(ranges, label) {
        if (!ranges || !label) {
          return null;
        }
        for (var i = 0; i < ranges.length; i++) {
          if (ranges[i].label === label) {
            return ranges[i];
          }
        }
        return null;
      }

      function buildFiltersObject(state) {
        var includeRecipes = state.view === 'all' || state.view === 'recipes';
        var includeArticles = state.view === 'all' || state.view === 'articles';

        var filters = {
          include_recipes: includeRecipes,
          include_articles: includeArticles,
          sort: state.sort || null,
          recipe: {},
          article: {}
        };

        if (includeRecipes && state.recipeFilters) {
          if (state.recipeFilters.course && state.recipeFilters.course.length) {
            filters.recipe.course = state.recipeFilters.course.slice();
          }
          if (state.recipeFilters.dietary_labels && state.recipeFilters.dietary_labels.length) {
            filters.recipe.dietary_labels = state.recipeFilters.dietary_labels.slice();
          }
          if (state.recipeFilters.seasons && state.recipeFilters.seasons.length) {
            filters.recipe.seasons = state.recipeFilters.seasons.slice();
          }
          if (state.recipeFilters.time_range && recipeFilterOptions && recipeFilterOptions.time_ranges) {
            var timeRange = findRangeByLabel(recipeFilterOptions.time_ranges, state.recipeFilters.time_range);
            if (timeRange) {
              filters.recipe.time_range = timeRange;
            }
          }
          if (state.recipeFilters.servings) {
            filters.recipe.servings = parseInt(state.recipeFilters.servings, 10) || null;
          }
          if (state.recipeFilters.cost_range && recipeFilterOptions && recipeFilterOptions.cost_ranges) {
            var costRange = findRangeByLabel(recipeFilterOptions.cost_ranges, state.recipeFilters.cost_range);
            if (costRange) {
              filters.recipe.cost_range = costRange;
            }
          }
          if (state.recipeFilters.calorie_range && recipeFilterOptions && recipeFilterOptions.calorie_ranges) {
            var calorieRange = findRangeByLabel(recipeFilterOptions.calorie_ranges, state.recipeFilters.calorie_range);
            if (calorieRange) {
              filters.recipe.calorie_range = calorieRange;
            }
          }
        }

        if (includeArticles && state.articleFilters) {
          if (state.articleFilters.category && state.articleFilters.category.length) {
            filters.article.category = state.articleFilters.category.slice();
          }
          if (state.articleFilters.content_type && state.articleFilters.content_type.length) {
            filters.article.content_type = state.articleFilters.content_type.slice();
          }
          if (state.articleFilters.reading_time_range && articleFilterOptions && articleFilterOptions.reading_time_ranges) {
            var readingRange = findRangeByLabel(articleFilterOptions.reading_time_ranges, state.articleFilters.reading_time_range);
            if (readingRange) {
              filters.article.reading_time_range = readingRange;
            }
          }
        }

        return filters;
      }

      function performSearch(state) {
        searchError = null;
        if (!state.query) {
          lastSearchResult = null;
          return;
        }
        try {
          var filters = buildFiltersObject(state);
          var result = WebsiteSDK.searchAllContent(state.query, filters, state.page, state.page_size);
          if (!result || typeof result !== 'object') {
            lastSearchResult = { recipes: [], articles: [] };
          } else {
            lastSearchResult = {
              recipes: Array.isArray(result.recipes) ? result.recipes : [],
              articles: Array.isArray(result.articles) ? result.articles : []
            };
          }
        } catch (err) {
          searchError = err || new Error('Search failed');
          lastSearchResult = null;
        }
      }

      function formatEnumLabel(value) {
        if (!value) {
          return '';
        }
        var parts = String(value).split('_');
        for (var i = 0; i < parts.length; i++) {
          if (parts[i].length) {
            parts[i] = parts[i].charAt(0).toUpperCase() + parts[i].slice(1);
          }
        }
        return parts.join(' ');
      }

      function getResultCounts(state) {
        var recipesCount = 0;
        var articlesCount = 0;
        if (lastSearchResult && !searchError && state.query) {
          recipesCount = lastSearchResult.recipes ? lastSearchResult.recipes.length : 0;
          articlesCount = lastSearchResult.articles ? lastSearchResult.articles.length : 0;
        }
        var totalCount;
        if (state.view === 'recipes') {
          totalCount = recipesCount;
        } else if (state.view === 'articles') {
          totalCount = articlesCount;
        } else {
          totalCount = recipesCount + articlesCount;
        }
        return {
          recipesCount: recipesCount,
          articlesCount: articlesCount,
          totalCount: totalCount
        };
      }

      function clearContainer(container) {
        while (container.firstChild) {
          container.removeChild(container.firstChild);
        }
      }

      function renderSearchHeader(container, state) {
        clearContainer(container);
        var counts = getResultCounts(state);

        var title = document.createElement('h2');
        title.className = 'search-header-title';
        if (state.query) {
          title.textContent = 'Results for "' + state.query + '"';
        } else {
          title.textContent = 'Search recipes & culinary advice';
        }
        container.appendChild(title);

        var subtitle = document.createElement('p');
        subtitle.className = 'search-header-subtitle';
        if (!state.query) {
          subtitle.textContent = 'Use the search box to find recipes, techniques, and kitchen tips.';
        } else if (searchError) {
          subtitle.textContent = 'We ran into a problem loading your results. Please try again.';
        } else if (!lastSearchResult) {
          subtitle.textContent = 'Preparing your results…';
        } else {
          if (counts.totalCount === 1) {
            subtitle.textContent = 'Showing 1 item on page ' + state.page + '.';
          } else {
            subtitle.textContent = 'Showing ' + counts.totalCount + ' items on page ' + state.page + '.';
          }
        }
        container.appendChild(subtitle);

        var form = document.createElement('form');
        form.className = 'search-header-form';
        form.setAttribute('role', 'search');
        form.setAttribute('data-action', 'inline-search');

        var label = document.createElement('label');
        label.className = 'visually-hidden';
        label.setAttribute('for', 'inline-search-input');
        label.textContent = 'Search culinary content';
        form.appendChild(label);

        var input = document.createElement('input');
        input.type = 'search';
        input.id = 'inline-search-input';
        input.name = 'query';
        input.className = 'search-header-input';
        input.placeholder = 'Search recipes, techniques, or ingredients';
        input.value = state.query || '';
        form.appendChild(input);

        var button = document.createElement('button');
        button.type = 'submit';
        button.className = 'btn btn-primary search-header-submit';
        button.textContent = 'Search';
        form.appendChild(button);

        container.appendChild(form);
      }

      function renderResultsToolbar(container, state) {
        clearContainer(container);
        var counts = getResultCounts(state);

        var wrapper = document.createElement('div');
        wrapper.className = 'results-toolbar-inner';

        var left = document.createElement('div');
        left.className = 'results-toolbar-left';
        var summary = document.createElement('span');
        summary.className = 'results-count-label';
        if (!state.query) {
          summary.textContent = 'No search applied yet.';
        } else if (searchError) {
          summary.textContent = 'Unable to load results.';
        } else {
          if (state.view === 'recipes') {
            summary.textContent = counts.recipesCount + ' recipes';
          } else if (state.view === 'articles') {
            summary.textContent = counts.articlesCount + ' articles';
          } else {
            summary.textContent = counts.totalCount + ' items';
          }
        }
        left.appendChild(summary);
        wrapper.appendChild(left);

        var right = document.createElement('div');
        right.className = 'results-toolbar-right';

        var sortLabel = document.createElement('label');
        sortLabel.className = 'sort-label';
        sortLabel.textContent = 'Sort by ';
        var select = document.createElement('select');
        select.className = 'sort-select';
        select.setAttribute('data-action', 'change-sort');

        var options = [
          { value: '', text: 'Relevance' },
          { value: 'rating', text: 'Rating' },
          { value: 'popularity', text: 'Popularity' },
          { value: 'recency', text: 'Most recent' }
        ];
        for (var i = 0; i < options.length; i++) {
          var opt = document.createElement('option');
          opt.value = options[i].value;
          opt.textContent = options[i].text;
          if (state.sort === options[i].value) {
            opt.selected = true;
          }
          select.appendChild(opt);
        }
        sortLabel.appendChild(select);
        right.appendChild(sortLabel);

        var clearButton = document.createElement('button');
        clearButton.type = 'button';
        clearButton.className = 'link-button clear-filters-button';
        clearButton.setAttribute('data-action', 'clear-all-filters');
        clearButton.textContent = 'Clear all filters';
        right.appendChild(clearButton);

        wrapper.appendChild(right);
        container.appendChild(wrapper);
      }

      function renderErrorState(container, state) {
        clearContainer(container);
        if (searchError && state.query) {
          container.hidden = false;
          var heading = document.createElement('h2');
          heading.className = 'error-title';
          heading.textContent = 'We couldn\'t load your search results.';
          container.appendChild(heading);

          var message = document.createElement('p');
          message.className = 'error-message';
          message.textContent = 'Please check your connection and try again. Your query and filters have been preserved.';
          container.appendChild(message);

          var retryButton = document.createElement('button');
          retryButton.type = 'button';
          retryButton.className = 'btn btn-primary';
          retryButton.setAttribute('data-action', 'retry-search');
          retryButton.textContent = 'Retry search';
          container.appendChild(retryButton);
        } else if (filterOptionsErrors.recipes || filterOptionsErrors.articles) {
          container.hidden = false;
          var smallHeading = document.createElement('h2');
          smallHeading.className = 'error-title';
          smallHeading.textContent = 'Some filters are unavailable.';
          container.appendChild(smallHeading);

          var msg = document.createElement('p');
          msg.className = 'error-message';
          msg.textContent = 'Results are still shown, but some filter options failed to load. You can retry below.';
          container.appendChild(msg);

          if (filterOptionsErrors.recipes) {
            var retryRecipes = document.createElement('button');
            retryRecipes.type = 'button';
            retryRecipes.className = 'btn btn-secondary';
            retryRecipes.setAttribute('data-action', 'retry-recipe-filters');
            retryRecipes.textContent = 'Retry recipe filters';
            container.appendChild(retryRecipes);
          }
          if (filterOptionsErrors.articles) {
            var retryArticles = document.createElement('button');
            retryArticles.type = 'button';
            retryArticles.className = 'btn btn-secondary';
            retryArticles.setAttribute('data-action', 'retry-article-filters');
            retryArticles.textContent = 'Retry article filters';
            container.appendChild(retryArticles);
          }
        } else {
          container.hidden = true;
        }
      }

      function renderEmptyState(container, state) {
        clearContainer(container);
        var counts = getResultCounts(state);
        var shouldShow = false;

        if (!state.query && !searchError) {
          shouldShow = true;
        } else if (!searchError && state.query && lastSearchResult && counts.totalCount === 0) {
          shouldShow = true;
        }

        if (!shouldShow) {
          container.hidden = true;
          return;
        }

        container.hidden = false;

        var heading = document.createElement('h2');
        heading.className = 'empty-title';
        if (!state.query) {
          heading.textContent = 'Ready when you are.';
        } else {
          heading.textContent = 'No matches found.';
        }
        container.appendChild(heading);

        var message = document.createElement('p');
        message.className = 'empty-message';
        if (!state.query) {
          message.textContent = 'Try searching for an ingredient (like "salmon"), a dish ("lasagna"), or a technique ("knife skills").';
        } else {
          var text = 'We couldn\'t find any recipes or articles for "' + state.query + '"';
          if (state.view === 'recipes') {
            text = 'We couldn\'t find any recipes for "' + state.query + '"';
          } else if (state.view === 'articles') {
            text = 'We couldn\'t find any articles for "' + state.query + '"';
          }
          message.textContent = text + '. You can adjust your filters or try a different term.';
        }
        container.appendChild(message);

        var actions = document.createElement('div');
        actions.className = 'empty-actions';

        var clearFiltersBtn = document.createElement('button');
        clearFiltersBtn.type = 'button';
        clearFiltersBtn.className = 'btn btn-secondary';
        clearFiltersBtn.setAttribute('data-action', 'empty-clear-filters');
        clearFiltersBtn.textContent = 'Clear all filters';
        actions.appendChild(clearFiltersBtn);

        var editQueryBtn = document.createElement('button');
        editQueryBtn.type = 'button';
        editQueryBtn.className = 'link-button';
        editQueryBtn.setAttribute('data-action', 'empty-edit-query');
        editQueryBtn.textContent = 'Edit search term';
        actions.appendChild(editQueryBtn);

        container.appendChild(actions);
      }

      function renderRecipeFilters(container, state) {
        clearContainer(container);

        var heading = document.createElement('h3');
        heading.className = 'filter-panel-title';
        heading.textContent = 'Recipe filters';
        container.appendChild(heading);

        if (filterOptionsErrors.recipes) {
          var errorMsg = document.createElement('p');
          errorMsg.className = 'filter-error-message';
          errorMsg.textContent = 'Recipe filters failed to load.';
          container.appendChild(errorMsg);

          var retryBtn = document.createElement('button');
          retryBtn.type = 'button';
          retryBtn.className = 'btn btn-secondary';
          retryBtn.setAttribute('data-action', 'retry-recipe-filters');
          retryBtn.textContent = 'Retry';
          container.appendChild(retryBtn);
          return;
        }

        if (!recipeFilterOptions) {
          var loading = document.createElement('p');
          loading.className = 'filter-loading-message';
          loading.textContent = 'Loading recipe filters…';
          container.appendChild(loading);
          return;
        }

        function createCheckboxGroup(title, options, paramName, selectedValues) {
          if (!options || !options.length) {
            return;
          }
          var group = document.createElement('fieldset');
          group.className = 'filter-group';

          var legend = document.createElement('legend');
          legend.className = 'filter-group-title';
          legend.textContent = title;
          group.appendChild(legend);

          for (var i = 0; i < options.length; i++) {
            var opt = options[i];
            var value = opt.value;
            var labelText = opt.label || formatEnumLabel(opt.value);

            var label = document.createElement('label');
            label.className = 'filter-option';

            var checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = value;
            checkbox.setAttribute('data-action', 'toggle-filter');
            checkbox.setAttribute('data-filter-param', paramName);
            if (selectedValues.indexOf(value) !== -1) {
              checkbox.checked = true;
            }

            label.appendChild(checkbox);
            var span = document.createElement('span');
            span.textContent = labelText;
            label.appendChild(span);

            group.appendChild(label);
          }

          container.appendChild(group);
        }

        createCheckboxGroup('Course', recipeFilterOptions.courses || [], 'recipe_course', state.recipeFilters.course || []);
        createCheckboxGroup('Dietary', recipeFilterOptions.dietary_labels || [], 'recipe_dietary_labels', state.recipeFilters.dietary_labels || []);
        createCheckboxGroup('Season', recipeFilterOptions.seasons || [], 'recipe_seasons', state.recipeFilters.seasons || []);

        function createSelectGroup(title, options, paramName, selectedLabel, placeholder) {
          if (!options || !options.length) {
            return;
          }
          var group = document.createElement('div');
          group.className = 'filter-group';

          var label = document.createElement('label');
          label.className = 'filter-group-title';
          label.textContent = title;
          group.appendChild(label);

          var select = document.createElement('select');
          select.className = 'filter-select';
          select.setAttribute('data-action', 'set-filter');
          select.setAttribute('data-filter-param', paramName);

          var optDefault = document.createElement('option');
          optDefault.value = '';
          optDefault.textContent = placeholder;
          select.appendChild(optDefault);

          for (var i = 0; i < options.length; i++) {
            var opt = options[i];
            var optEl = document.createElement('option');
            optEl.value = opt.label;
            optEl.textContent = opt.label;
            if (selectedLabel === opt.label) {
              optEl.selected = true;
            }
            select.appendChild(optEl);
          }

          group.appendChild(select);
          container.appendChild(group);
        }

        createSelectGroup('Total time', recipeFilterOptions.time_ranges || [], 'recipe_time_range', state.recipeFilters.time_range || '', 'Any time');
        createSelectGroup('Servings', recipeFilterOptions.serving_options || [], 'recipe_servings', state.recipeFilters.servings || '', 'Any servings');
        createSelectGroup('Cost per serving', recipeFilterOptions.cost_ranges || [], 'recipe_cost_range', state.recipeFilters.cost_range || '', 'Any cost');
        createSelectGroup('Calories', recipeFilterOptions.calorie_ranges || [], 'recipe_calorie_range', state.recipeFilters.calorie_range || '', 'Any calories');

        var clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.className = 'link-button filter-clear-button';
        clearBtn.setAttribute('data-action', 'clear-recipe-filters');
        clearBtn.textContent = 'Clear recipe filters';
        container.appendChild(clearBtn);
      }

      function renderArticleFilters(container, state) {
        clearContainer(container);

        var heading = document.createElement('h3');
        heading.className = 'filter-panel-title';
        heading.textContent = 'Article filters';
        container.appendChild(heading);

        if (filterOptionsErrors.articles) {
          var errorMsg = document.createElement('p');
          errorMsg.className = 'filter-error-message';
          errorMsg.textContent = 'Article filters failed to load.';
          container.appendChild(errorMsg);

          var retryBtn = document.createElement('button');
          retryBtn.type = 'button';
          retryBtn.className = 'btn btn-secondary';
          retryBtn.setAttribute('data-action', 'retry-article-filters');
          retryBtn.textContent = 'Retry';
          container.appendChild(retryBtn);
          return;
        }

        if (!articleFilterOptions) {
          var loading = document.createElement('p');
          loading.className = 'filter-loading-message';
          loading.textContent = 'Loading article filters…';
          container.appendChild(loading);
          return;
        }

        function createCheckboxGroup(title, options, paramName, selectedValues) {
          if (!options || !options.length) {
            return;
          }
          var group = document.createElement('fieldset');
          group.className = 'filter-group';

          var legend = document.createElement('legend');
          legend.className = 'filter-group-title';
          legend.textContent = title;
          group.appendChild(legend);

          for (var i = 0; i < options.length; i++) {
            var opt = options[i];
            var value = opt.value;
            var labelText = opt.label || formatEnumLabel(opt.value);

            var label = document.createElement('label');
            label.className = 'filter-option';

            var checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = value;
            checkbox.setAttribute('data-action', 'toggle-filter');
            checkbox.setAttribute('data-filter-param', paramName);
            if (selectedValues.indexOf(value) !== -1) {
              checkbox.checked = true;
            }

            label.appendChild(checkbox);
            var span = document.createElement('span');
            span.textContent = labelText;
            label.appendChild(span);

            group.appendChild(label);
          }

          container.appendChild(group);
        }

        createCheckboxGroup('Category', articleFilterOptions.categories || [], 'article_category', state.articleFilters.category || []);
        createCheckboxGroup('Content type', articleFilterOptions.content_types || [], 'article_content_type', state.articleFilters.content_type || []);

        function createSelectGroup(title, options, paramName, selectedLabel, placeholder) {
          if (!options || !options.length) {
            return;
          }
          var group = document.createElement('div');
          group.className = 'filter-group';

          var label = document.createElement('label');
          label.className = 'filter-group-title';
          label.textContent = title;
          group.appendChild(label);

          var select = document.createElement('select');
          select.className = 'filter-select';
          select.setAttribute('data-action', 'set-filter');
          select.setAttribute('data-filter-param', paramName);

          var optDefault = document.createElement('option');
          optDefault.value = '';
          optDefault.textContent = placeholder;
          select.appendChild(optDefault);

          for (var i = 0; i < options.length; i++) {
            var opt = options[i];
            var optEl = document.createElement('option');
            optEl.value = opt.label;
            optEl.textContent = opt.label;
            if (selectedLabel === opt.label) {
              optEl.selected = true;
            }
            select.appendChild(optEl);
          }

          group.appendChild(select);
          container.appendChild(group);
        }

        createSelectGroup('Reading time', articleFilterOptions.reading_time_ranges || [], 'article_reading_time_range', state.articleFilters.reading_time_range || '', 'Any length');

        var clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.className = 'link-button filter-clear-button';
        clearBtn.setAttribute('data-action', 'clear-article-filters');
        clearBtn.textContent = 'Clear article filters';
        container.appendChild(clearBtn);
      }

      function renderResultsList(container, state) {
        clearContainer(container);

        if (!state.query || searchError || !lastSearchResult) {
          container.hidden = true;
          return;
        }

        var counts = getResultCounts(state);
        if (counts.totalCount === 0) {
          container.hidden = true;
          return;
        }

        container.hidden = false;

        function createRecipeCard(recipe) {
          var card = document.createElement('article');
          card.className = 'result-card result-card-recipe';
          card.setAttribute('data-type', 'recipe');
          card.setAttribute('data-id', recipe.id);
          card.setAttribute('data-action', 'open-recipe');

          var title = document.createElement('h3');
          title.className = 'result-title';
          var link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.setAttribute('data-action', 'open-recipe');
          link.setAttribute('data-id', recipe.id);
          link.textContent = recipe.title || 'Untitled recipe';
          title.appendChild(link);
          card.appendChild(title);

          if (recipe.description) {
            var desc = document.createElement('p');
            desc.className = 'result-description';
            desc.textContent = recipe.description;
            card.appendChild(desc);
          }

          var meta = document.createElement('div');
          meta.className = 'result-meta';

          if (recipe.course) {
            var courseSpan = document.createElement('span');
            courseSpan.className = 'meta-item meta-course';
            courseSpan.textContent = formatEnumLabel(recipe.course);
            meta.appendChild(courseSpan);
          }

          if (typeof recipe.total_time_minutes === 'number') {
            var timeSpan = document.createElement('span');
            timeSpan.className = 'meta-item meta-time';
            timeSpan.textContent = recipe.total_time_minutes + ' min';
            meta.appendChild(timeSpan);
          }

          if (typeof recipe.servings === 'number') {
            var servingsSpan = document.createElement('span');
            servingsSpan.className = 'meta-item meta-servings';
            servingsSpan.textContent = recipe.servings + ' servings';
            meta.appendChild(servingsSpan);
          }

          if (typeof recipe.average_rating === 'number') {
            var ratingSpan = document.createElement('span');
            ratingSpan.className = 'meta-item meta-rating';
            ratingSpan.textContent = recipe.average_rating.toFixed(1) + ' b7 rating';
            meta.appendChild(ratingSpan);
          }

          if (recipe.dietary_labels && recipe.dietary_labels.length) {
            var dietSpan = document.createElement('span');
            dietSpan.className = 'meta-item meta-diet';
            dietSpan.textContent = recipe.dietary_labels.join(', ');
            meta.appendChild(dietSpan);
          }

          card.appendChild(meta);
          return card;
        }

        function createArticleCard(article) {
          var card = document.createElement('article');
          card.className = 'result-card result-card-article';
          card.setAttribute('data-type', 'article');
          card.setAttribute('data-id', article.id);
          card.setAttribute('data-action', 'open-article');

          var title = document.createElement('h3');
          title.className = 'result-title';
          var link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.setAttribute('data-action', 'open-article');
          link.setAttribute('data-id', article.id);
          link.textContent = article.title || 'Untitled article';
          title.appendChild(link);
          card.appendChild(title);

          if (article.summary) {
            var summary = document.createElement('p');
            summary.className = 'result-description';
            summary.textContent = article.summary;
            card.appendChild(summary);
          }

          var meta = document.createElement('div');
          meta.className = 'result-meta';

          if (article.category) {
            var catSpan = document.createElement('span');
            catSpan.className = 'meta-item meta-category';
            catSpan.textContent = formatEnumLabel(article.category);
            meta.appendChild(catSpan);
          }

          if (article.content_type) {
            var typeSpan = document.createElement('span');
            typeSpan.className = 'meta-item meta-type';
            typeSpan.textContent = formatEnumLabel(article.content_type);
            meta.appendChild(typeSpan);
          }

          if (typeof article.reading_time_minutes === 'number') {
            var rtSpan = document.createElement('span');
            rtSpan.className = 'meta-item meta-reading-time';
            rtSpan.textContent = article.reading_time_minutes + ' min read';
            meta.appendChild(rtSpan);
          }

          if (typeof article.average_rating === 'number') {
            var ratingSpan = document.createElement('span');
            ratingSpan.className = 'meta-item meta-rating';
            ratingSpan.textContent = article.average_rating.toFixed(1) + ' b7 rating';
            meta.appendChild(ratingSpan);
          }

          card.appendChild(meta);
          return card;
        }

        if (state.view === 'recipes') {
          for (var i = 0; i < lastSearchResult.recipes.length; i++) {
            container.appendChild(createRecipeCard(lastSearchResult.recipes[i]));
          }
        } else if (state.view === 'articles') {
          for (var j = 0; j < lastSearchResult.articles.length; j++) {
            container.appendChild(createArticleCard(lastSearchResult.articles[j]));
          }
        } else {
          if (lastSearchResult.recipes && lastSearchResult.recipes.length) {
            var recipesHeader = document.createElement('h2');
            recipesHeader.className = 'results-group-title';
            recipesHeader.textContent = 'Recipes';
            container.appendChild(recipesHeader);
            for (var r = 0; r < lastSearchResult.recipes.length; r++) {
              container.appendChild(createRecipeCard(lastSearchResult.recipes[r]));
            }
          }
          if (lastSearchResult.articles && lastSearchResult.articles.length) {
            var articlesHeader = document.createElement('h2');
            articlesHeader.className = 'results-group-title';
            articlesHeader.textContent = 'Articles';
            container.appendChild(articlesHeader);
            for (var a = 0; a < lastSearchResult.articles.length; a++) {
              container.appendChild(createArticleCard(lastSearchResult.articles[a]));
            }
          }
        }
      }

      function renderPaginationControls(container, state) {
        clearContainer(container);

        if (!state.query || searchError || !lastSearchResult) {
          container.hidden = true;
          return;
        }

        var counts = getResultCounts(state);
        if (counts.totalCount === 0) {
          container.hidden = true;
          return;
        }

        container.hidden = false;

        var wrapper = document.createElement('div');
        wrapper.className = 'pagination-inner';

        var info = document.createElement('span');
        info.className = 'pagination-info';
        info.textContent = 'Page ' + state.page;
        wrapper.appendChild(info);

        var controls = document.createElement('div');
        controls.className = 'pagination-buttons';

        var prevBtn = document.createElement('button');
        prevBtn.type = 'button';
        prevBtn.className = 'btn pagination-prev';
        prevBtn.textContent = 'Previous';
        prevBtn.setAttribute('data-action', 'change-page');
        prevBtn.setAttribute('data-page', String(state.page - 1));
        if (state.page <= 1) {
          prevBtn.disabled = true;
        }
        controls.appendChild(prevBtn);

        var nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.className = 'btn pagination-next';
        nextBtn.textContent = 'Next';
        nextBtn.setAttribute('data-action', 'change-page');
        nextBtn.setAttribute('data-page', String(state.page + 1));
        controls.appendChild(nextBtn);

        wrapper.appendChild(controls);

        var pageSizeWrapper = document.createElement('div');
        pageSizeWrapper.className = 'pagination-page-size';
        var label = document.createElement('label');
        label.textContent = 'Results per page ';
        var select = document.createElement('select');
        select.className = 'page-size-select';
        select.setAttribute('data-action', 'change-page-size');

        var sizes = [10, 20, 50];
        for (var i = 0; i < sizes.length; i++) {
          var opt = document.createElement('option');
          opt.value = String(sizes[i]);
          opt.textContent = String(sizes[i]);
          if (state.page_size === sizes[i]) {
            opt.selected = true;
          }
          select.appendChild(opt);
        }

        label.appendChild(select);
        pageSizeWrapper.appendChild(label);
        wrapper.appendChild(pageSizeWrapper);

        container.appendChild(wrapper);
      }

      function renderAll(state) {
        var populateElements = document.querySelectorAll('[data-populate]');
        for (var i = 0; i < populateElements.length; i++) {
          var el = populateElements[i];
          var type = el.getAttribute('data-populate');
          if (type === 'search-header') {
            renderSearchHeader(el, state);
          } else if (type === 'results-toolbar') {
            renderResultsToolbar(el, state);
          } else if (type === 'error-state') {
            renderErrorState(el, state);
          } else if (type === 'empty-state') {
            renderEmptyState(el, state);
          } else if (type === 'recipe-filters') {
            renderRecipeFilters(el, state);
          } else if (type === 'article-filters') {
            renderArticleFilters(el, state);
          } else if (type === 'results-list') {
            renderResultsList(el, state);
          } else if (type === 'pagination-controls') {
            renderPaginationControls(el, state);
          }
        }

        var recipePanel = document.querySelector('[data-component="recipe-filter-panel"]');
        var articlePanel = document.querySelector('[data-component="article-filter-panel"]');
        if (recipePanel && articlePanel) {
          if (state.view === 'articles') {
            recipePanel.style.display = 'none';
            articlePanel.style.display = '';
          } else if (state.view === 'recipes') {
            recipePanel.style.display = '';
            articlePanel.style.display = 'none';
          } else {
            recipePanel.style.display = '';
            articlePanel.style.display = '';
          }
        }

        var tabs = document.querySelectorAll('[data-component="content-type-tabs"] .tab-link');
        for (var j = 0; j < tabs.length; j++) {
          var tab = tabs[j];
          var ct = tab.getAttribute('data-content-type') || '';
          var isActive = false;
          if (!ct && state.view === 'all') {
            isActive = true;
          } else if (ct === 'recipes' && state.view === 'recipes') {
            isActive = true;
          } else if (ct === 'articles' && state.view === 'articles') {
            isActive = true;
          }
          if (isActive) {
            tab.classList.add('is-active');
          } else {
            tab.classList.remove('is-active');
          }
        }
      }

      function updateUrl(modifier, replace) {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        modifier(params);
        var newSearch = params.toString();
        var newUrl = url.pathname + (newSearch ? '?' + newSearch : '');
        if (replace) {
          window.history.replaceState(null, '', newUrl);
        } else {
          window.history.pushState(null, '', newUrl);
        }
        applyState();
      }

      function applyState() {
        loadFilterOptionsIfNeeded();
        var state = deriveStateFromUrl();
        performSearch(state);
        renderAll(state);
      }

      function handleInlineSearchSubmit(form, event) {
        event.preventDefault();
        var input = form.querySelector('input[name="query"]');
        var value = input ? input.value.trim() : '';
        updateUrl(function(params) {
          if (value) {
            params.set('query', value);
          } else {
            params.delete('query');
          }
          params.delete('page');
          params.delete('sort');
          params.delete('page_size');
          for (var i = 0; i < RECIPE_FILTER_PARAM_KEYS.length; i++) {
            params.delete(RECIPE_FILTER_PARAM_KEYS[i]);
          }
          for (var j = 0; j < ARTICLE_FILTER_PARAM_KEYS.length; j++) {
            params.delete(ARTICLE_FILTER_PARAM_KEYS[j]);
          }
        }, false);
      }

      function handleClickAction(action, target, event) {
        if (action === 'set-content-type') {
          var ct = target.getAttribute('data-content-type') || '';
          updateUrl(function(params) {
            if (ct) {
              params.set('content_type', ct);
            } else {
              params.delete('content_type');
            }
            params.delete('page');
          }, false);
        } else if (action === 'clear-all-filters') {
          updateUrl(function(params) {
            params.delete('sort');
            params.delete('page');
            params.delete('page_size');
            for (var i = 0; i < RECIPE_FILTER_PARAM_KEYS.length; i++) {
              params.delete(RECIPE_FILTER_PARAM_KEYS[i]);
            }
            for (var j = 0; j < ARTICLE_FILTER_PARAM_KEYS.length; j++) {
              params.delete(ARTICLE_FILTER_PARAM_KEYS[j]);
            }
          }, false);
        } else if (action === 'clear-recipe-filters') {
          updateUrl(function(params) {
            params.delete('page');
            for (var i = 0; i < RECIPE_FILTER_PARAM_KEYS.length; i++) {
              params.delete(RECIPE_FILTER_PARAM_KEYS[i]);
            }
          }, false);
        } else if (action === 'clear-article-filters') {
          updateUrl(function(params) {
            params.delete('page');
            for (var i = 0; i < ARTICLE_FILTER_PARAM_KEYS.length; i++) {
              params.delete(ARTICLE_FILTER_PARAM_KEYS[i]);
            }
          }, false);
        } else if (action === 'change-page') {
          var pageStr = target.getAttribute('data-page');
          var page = parseInt(pageStr, 10);
          if (!isNaN(page) && page > 0) {
            updateUrl(function(params) {
              params.set('page', String(page));
            }, false);
          }
        } else if (action === 'retry-search') {
          applyState();
        } else if (action === 'retry-recipe-filters') {
          filterOptionsErrors.recipes = null;
          recipeFilterOptions = null;
          loadFilterOptionsIfNeeded();
          applyState();
        } else if (action === 'retry-article-filters') {
          filterOptionsErrors.articles = null;
          articleFilterOptions = null;
          loadFilterOptionsIfNeeded();
          applyState();
        } else if (action === 'empty-clear-filters') {
          updateUrl(function(params) {
            params.delete('sort');
            params.delete('page');
            params.delete('page_size');
            for (var i = 0; i < RECIPE_FILTER_PARAM_KEYS.length; i++) {
              params.delete(RECIPE_FILTER_PARAM_KEYS[i]);
            }
            for (var j = 0; j < ARTICLE_FILTER_PARAM_KEYS.length; j++) {
              params.delete(ARTICLE_FILTER_PARAM_KEYS[j]);
            }
          }, false);
        } else if (action === 'empty-edit-query') {
          var inlineInput = document.getElementById('inline-search-input');
          if (inlineInput) {
            inlineInput.focus();
            inlineInput.select();
          }
        } else if (action === 'open-recipe') {
          var recipeId = target.getAttribute('data-id');
          if (!recipeId && target.closest) {
            var card = target.closest('[data-type="recipe"]');
            if (card) {
              recipeId = card.getAttribute('data-id');
            }
          }
          if (recipeId) {
            window.location.href = 'recipe.html?id=' + encodeURIComponent(recipeId);
          }
        } else if (action === 'open-article') {
          var articleId = target.getAttribute('data-id');
          if (!articleId && target.closest) {
            var cardA = target.closest('[data-type="article"]');
            if (cardA) {
              articleId = cardA.getAttribute('data-id');
            }
          }
          if (articleId) {
            window.location.href = 'article.html?id=' + encodeURIComponent(articleId);
          }
        }
      }

      function handleChangeAction(action, target, event) {
        if (action === 'change-sort') {
          var sortValue = target.value || '';
          updateUrl(function(params) {
            if (sortValue) {
              params.set('sort', sortValue);
            } else {
              params.delete('sort');
            }
            params.delete('page');
          }, false);
        } else if (action === 'toggle-filter') {
          var paramName = target.getAttribute('data-filter-param');
          if (!paramName) {
            return;
          }
          var value = target.value;
          updateUrl(function(params) {
            var current = params.get(paramName) || '';
            var values = current ? current.split(',') : [];
            var filtered = [];
            var i;
            for (i = 0; i < values.length; i++) {
              if (values[i]) {
                filtered.push(values[i]);
              }
            }
            var index = filtered.indexOf(value);
            if (target.checked) {
              if (index === -1) {
                filtered.push(value);
              }
            } else if (index !== -1) {
              filtered.splice(index, 1);
            }
            if (filtered.length) {
              params.set(paramName, filtered.join(','));
            } else {
              params.delete(paramName);
            }
            params.delete('page');
          }, false);
        } else if (action === 'set-filter') {
          var pName = target.getAttribute('data-filter-param');
          if (!pName) {
            return;
          }
          var v = target.value || '';
          updateUrl(function(params) {
            if (v) {
              params.set(pName, v);
            } else {
              params.delete(pName);
            }
            params.delete('page');
          }, false);
        } else if (action === 'change-page-size') {
          var sizeStr = target.value;
          var size = parseInt(sizeStr, 10);
          if (!isNaN(size) && size > 0) {
            updateUrl(function(params) {
              params.set('page_size', String(size));
              params.delete('page');
            }, false);
          }
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        applyState();
      });

      document.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var tag = target.tagName.toLowerCase();
        if (tag === 'button' || tag === 'a' || target.getAttribute('data-action') === 'set-content-type' || target.getAttribute('data-action').indexOf('retry-') === 0 || target.getAttribute('data-action').indexOf('open-') === 0 || target.getAttribute('data-action').indexOf('empty-') === 0 || target.getAttribute('data-action').indexOf('clear-') === 0) {
          var action = target.getAttribute('data-action');
          handleClickAction(action, target, event);
        }
      });

      document.addEventListener('change', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');
        handleChangeAction(action, target, event);
      });

      document.addEventListener('submit', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');
        if (action === 'inline-search') {
          handleInlineSearchSubmit(target, event);
        }
      });

      window.addEventListener('popstate', function() {
        applyState();
      });
    })();
  </script>
