<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Saved Items - Culinary Passion</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Framework styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific styles -->
  <link rel='stylesheet' href='saved.css'>
</head>
<body class='site'>

  <header class='site-header'>
    <div class='header-inner container'>
      <a href='index.html' class='site-logo' aria-label='Culinary home'>
        <!-- Replace logo.svg with your actual logo asset -->
        <img src='logo.svg' alt='Culinary Passion logo' class='site-logo-image'>
      </a>

      <nav class='site-nav' aria-label='Primary'>
        <ul class='nav-list'>
            <li class='nav-item'><a href='index.html' class='nav-link'>Home</a></li>
            <li class='nav-item'><a href='recipes.html' class='nav-link'>Recipes</a></li>
            <li class='nav-item'><a href='seasonal.html' class='nav-link'>Seasonal</a></li>
            <li class='nav-item'><a href='techniques.html' class='nav-link'>Techniques</a></li>
            <li class='nav-item'><a href='meal_plans.html' class='nav-link'>Meal Plans</a></li>
            <li class='nav-item'><a href='meal_plans.html?view=my_plans' class='nav-link'>My Plans</a></li>
            <li class='nav-item'><a href='tags.html' class='nav-link'>Tags</a></li>
            <li class='nav-item'><a href='saved.html' class='nav-link is-active'>Saved</a></li>
            <li class='nav-item'><a href='shopping_list.html' class='nav-link'>Shopping List</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class='hero' aria-labelledby='page-title'>
    <div class='hero-inner container'>
      <h1 id='page-title' class='hero-title'>Saved Items</h1>
    </div>
  </section>

  <main id='content' class='content'>
    <div class='content-inner container layout'>
      <div class='layout-main'>
        <!-- Saved Items page controller -->
        <section class='saved-page' data-component='saved-page-controller' aria-label='Saved items'>
          <!-- Filter tabs -->
          <nav class='saved-filter-tabs' data-component='saved-filter-tabs' aria-label='Filter saved items'>
            <ul class='saved-filter-list'>
              <li class='saved-filter-item'>
                <button
                  type='button'
                  class='saved-filter-button is-active'
                  data-action='change-filter'
                  data-filter='all'
                >
                  All
                </button>
              </li>
              <li class='saved-filter-item'>
                <button
                  type='button'
                  class='saved-filter-button'
                  data-action='change-filter'
                  data-filter='recipes'
                >
                  Recipes
                </button>
              </li>
              <li class='saved-filter-item'>
                <button
                  type='button'
                  class='saved-filter-button'
                  data-action='change-filter'
                  data-filter='articles'
                >
                  Articles
                </button>
              </li>
            </ul>
          </nav>

          <!-- Saved items list / loader / empty state root -->
          <section
            class='saved-items-root'
            data-populate='saved-items'
            aria-live='polite'
            aria-busy='false'
          >
            <!-- Content is rendered by JavaScript -->
          </section>
        </section>
      </div>

      <aside class='layout-sidebar' aria-label='Sidebar'>
        <section class='card sidebar-card'>
          <div class='card-accent'></div>
          <div class='card-body'>
            <!-- Optional: sidebar content such as featured recipes or collections -->
          </div>
        </section>
      </aside>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-links'>
          <li class='footer-item'><a href='about.html' class='footer-link'>About</a></li>
          <li class='footer-item'><a href='contact.html' class='footer-link'>Contact</a></li>
          <li class='footer-item'><a href='help.html' class='footer-link'>Help &amp; FAQ</a></li>
          <li class='footer-item'><a href='collections.html' class='footer-link'>Collections</a></li>
          <li class='footer-item'><a href='meal_plans.html' class='footer-link'>Meal Plans</a></li>
          <li class='footer-item'><a href='terms_privacy.html' class='footer-link'>Terms &amp; Privacy</a></li>
        </ul>
      </nav>
      <div class='footer-meta'>
        <p class='footer-copy'>&copy; <span class='footer-year'>2026</span> Culinary Passion. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page UI logic -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var savedPage = {
        container: null,
        state: {
          viewMode: 'all',
          isLoading: false,
          items: [],
          error: null
        },

        init: function() {
          var containers = document.querySelectorAll('[data-populate="saved-items"]');
          if (!containers.length) {
            return;
          }
          this.container = containers[0];

          this.state.viewMode = this.getViewModeFromUrl();
          this.applyFilterTabState();

          this.bindGlobalActions();
          this.loadItems();

          var self = this;
          window.addEventListener('popstate', function() {
            var newViewMode = self.getViewModeFromUrl();
            if (newViewMode !== self.state.viewMode) {
              self.state.viewMode = newViewMode;
              self.applyFilterTabState();
              self.loadItems();
            }
          });
        },

        getViewModeFromUrl: function() {
          var params = new URLSearchParams(window.location.search);
          var type = params.get('type');
          if (type === 'recipes') {
            return 'recipes';
          }
          if (type === 'articles') {
            return 'articles';
          }
          return 'all';
        },

        getFilters: function() {
          var filters = {};
          if (this.state.viewMode === 'recipes') {
            filters.content_type = 'recipe';
          } else if (this.state.viewMode === 'articles') {
            filters.content_type = 'article';
          }
          filters.sort_by = 'most_recent';
          return filters;
        },

        loadItems: function() {
          if (!this.container) {
            return;
          }
          this.state.isLoading = true;
          this.state.error = null;
          this.render();
          this.container.setAttribute('aria-busy', 'true');

          try {
            var filters = this.getFilters();
            var response = WebsiteSDK.getSavedItems(filters);
            var items = response && response.saved_items ? response.saved_items : [];
            if (!Array.isArray(items)) {
              items = [];
            }
            this.state.items = items;
            this.state.isLoading = false;
            this.container.setAttribute('aria-busy', 'false');
            this.render();
          } catch (error) {
            console.error('Failed to load saved items', error);
            this.state.error = 'Unable to load saved items right now.';
            this.state.isLoading = false;
            this.container.setAttribute('aria-busy', 'false');
            this.render();
          }
        },

        render: function() {
          var container = this.container;
          if (!container) {
            return;
          }

          container.innerHTML = '';

          var wrapper = document.createElement('div');
          wrapper.className = 'saved-items-section';
          wrapper.dataset.component = 'saved-items-list';

          if (this.state.isLoading) {
            var loader = document.createElement('div');
            loader.className = 'saved-items-loader';
            loader.dataset.component = 'saved-items-loader';
            loader.innerHTML = "<div class='loader-spinner' aria-hidden='true'></div><p class='loader-text'>Loading your saved items</p>";
            wrapper.appendChild(loader);
            container.appendChild(wrapper);
            this.bindActionHandlers(wrapper);
            return;
          }

          if (this.state.error) {
            var errorBox = document.createElement('div');
            errorBox.className = 'saved-error-state';
            var errorHeading = document.createElement('h2');
            errorHeading.className = 'saved-empty-title';
            errorHeading.textContent = 'Something went wrong';
            var errorBody = document.createElement('p');
            errorBody.className = 'saved-empty-body';
            errorBody.textContent = this.state.error;
            errorBox.appendChild(errorHeading);
            errorBox.appendChild(errorBody);
            wrapper.appendChild(errorBox);
            container.appendChild(wrapper);
            this.bindActionHandlers(wrapper);
            return;
          }

          if (!this.state.items.length) {
            var emptyState = this.createEmptyState();
            wrapper.appendChild(emptyState);
            container.appendChild(wrapper);
            this.bindActionHandlers(wrapper);
            return;
          }

          var list = document.createElement('ul');
          list.className = 'saved-items-list';
          list.setAttribute('role', 'list');

          for (var i = 0; i < this.state.items.length; i++) {
            var entry = this.state.items[i];
            var row = this.createItemRow(entry);
            list.appendChild(row);
          }

          wrapper.appendChild(list);
          container.appendChild(wrapper);
          this.bindActionHandlers(wrapper);
        },

        createEmptyState: function() {
          var section = document.createElement('section');
          section.className = 'saved-empty-state';
          section.dataset.component = 'saved-empty-state';

          var title = document.createElement('h2');
          title.className = 'saved-empty-title';
          var body = document.createElement('p');
          body.className = 'saved-empty-body';

          if (this.state.viewMode === 'recipes') {
            title.textContent = 'No saved recipes yet';
            body.textContent = 'You have not favorited any recipes. Save a recipe to see it here.';
          } else if (this.state.viewMode === 'articles') {
            title.textContent = 'No saved articles yet';
            body.textContent = 'You have not bookmarked any cooking tips or technique articles.';
          } else {
            title.textContent = 'No saved items yet';
            body.textContent = 'When you favorite recipes or bookmark articles, they will appear on this page.';
          }

          section.appendChild(title);
          section.appendChild(body);

          if (this.state.viewMode !== 'all') {
            var actions = document.createElement('div');
            actions.className = 'saved-empty-actions';

            var allButton = document.createElement('button');
            allButton.type = 'button';
            allButton.className = 'btn btn-primary';
            allButton.dataset.action = 'change-filter-empty';
            allButton.dataset.filter = 'all';
            allButton.textContent = 'Show all saved items';

            actions.appendChild(allButton);
            section.appendChild(actions);
          }

          return section;
        },

        createItemRow: function(entry) {
          var savedItem = entry && entry.saved_item ? entry.saved_item : {};
          var recipe = entry && entry.recipe ? entry.recipe : null;
          var article = entry && entry.article ? entry.article : null;

          var li = document.createElement('li');
          li.className = 'saved-item-row card';
          li.dataset.component = 'saved-item-row';
          li.dataset.action = 'open-saved-item';
          li.dataset.contentType = savedItem.content_type || '';
          li.dataset.contentId = savedItem.content_id || '';
          li.setAttribute('role', 'button');
          li.setAttribute('tabindex', '0');

          var cardInner = document.createElement('article');
          cardInner.className = 'saved-item-card';

          var mainRow = document.createElement('div');
          mainRow.className = 'saved-item-main';

          var textCol = document.createElement('div');
          textCol.className = 'saved-item-text';

          var kicker = document.createElement('div');
          kicker.className = 'saved-item-kicker';

          var typeChip = document.createElement('span');
          typeChip.className = 'saved-chip saved-chip-type';
          if (savedItem.content_type === 'recipe') {
            typeChip.textContent = 'Recipe';
          } else if (savedItem.content_type === 'article') {
            typeChip.textContent = 'Article';
          } else {
            typeChip.textContent = 'Saved item';
          }
          kicker.appendChild(typeChip);

          if (savedItem.save_type === 'favorite' || savedItem.save_type === 'bookmark') {
            var saveChip = document.createElement('span');
            saveChip.className = 'saved-chip saved-chip-save';
            if (savedItem.save_type === 'favorite') {
              saveChip.textContent = 'Favorite';
            } else if (savedItem.save_type === 'bookmark') {
              saveChip.textContent = 'Bookmark';
            }
            kicker.appendChild(saveChip);
          }

          textCol.appendChild(kicker);

          var titleEl = document.createElement('h2');
          titleEl.className = 'saved-item-title';

          var descriptionEl = document.createElement('p');
          descriptionEl.className = 'saved-item-description';

          var metaEl = document.createElement('div');
          metaEl.className = 'saved-item-meta';

          var titleText = '';
          var descriptionText = '';

          if (savedItem.content_type === 'recipe' && recipe) {
            titleText = recipe.title || '';
            descriptionText = recipe.description || '';

            if (recipe.total_time_minutes != null) {
              var timeSpan = document.createElement('span');
              timeSpan.className = 'saved-item-meta-pill';
              timeSpan.textContent = 'Ready in ' + this.formatMinutes(recipe.total_time_minutes);
              metaEl.appendChild(timeSpan);
            }

            if (recipe.servings != null) {
              var servingsSpan = document.createElement('span');
              servingsSpan.className = 'saved-item-meta-pill';
              servingsSpan.textContent = String(recipe.servings) + ' servings';
              metaEl.appendChild(servingsSpan);
            }

            if (recipe.average_rating != null) {
              var ratingSpan = document.createElement('span');
              ratingSpan.className = 'saved-item-meta-pill';
              var ratingText = 'Rating ' + recipe.average_rating.toFixed ? recipe.average_rating.toFixed(1) : String(recipe.average_rating);
              if (recipe.review_count != null) {
                ratingText += ' (' + String(recipe.review_count) + ')';
              }
              ratingSpan.textContent = ratingText;
              metaEl.appendChild(ratingSpan);
            }

            if (recipe.course) {
              var courseSpan = document.createElement('span');
              courseSpan.className = 'saved-item-meta-pill';
              courseSpan.textContent = this.formatCourse(recipe.course);
              metaEl.appendChild(courseSpan);
            }
          } else if (savedItem.content_type === 'article' && article) {
            titleText = article.title || '';
            descriptionText = article.summary || '';

            if (article.reading_time_minutes != null) {
              var readSpan = document.createElement('span');
              readSpan.className = 'saved-item-meta-pill';
              readSpan.textContent = String(article.reading_time_minutes) + ' min read';
              metaEl.appendChild(readSpan);
            }

            if (article.category) {
              var categorySpan = document.createElement('span');
              categorySpan.className = 'saved-item-meta-pill';
              categorySpan.textContent = this.formatArticleCategory(article.category);
              metaEl.appendChild(categorySpan);
            }

            if (article.average_rating != null) {
              var ratingSpanArticle = document.createElement('span');
              ratingSpanArticle.className = 'saved-item-meta-pill';
              var ratingTextArticle = 'Rating ' + (article.average_rating.toFixed ? article.average_rating.toFixed(1) : String(article.average_rating));
              ratingSpanArticle.textContent = ratingTextArticle;
              metaEl.appendChild(ratingSpanArticle);
            }
          } else {
            titleText = 'Saved item unavailable';
            descriptionText = 'The original content for this saved item could not be found.';
          }

          if (savedItem.created_at) {
            var savedSpan = document.createElement('span');
            savedSpan.className = 'saved-item-meta-pill saved-item-meta-muted';
            savedSpan.textContent = 'Saved ' + this.formatDate(savedItem.created_at);
            metaEl.appendChild(savedSpan);
          }

          titleEl.textContent = titleText;
          descriptionEl.textContent = descriptionText;

          textCol.appendChild(titleEl);
          if (descriptionText) {
            textCol.appendChild(descriptionEl);
          }
          if (metaEl.childNodes.length > 0) {
            textCol.appendChild(metaEl);
          }

          var mediaCol = document.createElement('div');
          mediaCol.className = 'saved-item-media';

          var accent = document.createElement('div');
          accent.className = 'card-accent';
          mediaCol.appendChild(accent);

          var thumbWrapper = document.createElement('div');
          thumbWrapper.className = 'saved-item-thumbnail-wrapper';

          if (savedItem.content_type === 'recipe' && recipe && recipe.image_url) {
            var img = document.createElement('img');
            img.className = 'saved-item-thumbnail-image';
            img.src = recipe.image_url;
            img.alt = recipe.title ? 'Recipe: ' + recipe.title : 'Recipe image';
            thumbWrapper.appendChild(img);
          } else {
            var placeholder = document.createElement('div');
            placeholder.className = 'saved-item-thumbnail-placeholder';
            if (savedItem.content_type === 'article') {
              placeholder.textContent = 'Cooking notes';
            } else if (savedItem.content_type === 'recipe') {
              placeholder.textContent = 'Recipe';
            } else {
              placeholder.textContent = 'Saved';
            }
            thumbWrapper.appendChild(placeholder);
          }

          mediaCol.appendChild(thumbWrapper);

          mainRow.appendChild(textCol);
          mainRow.appendChild(mediaCol);
          cardInner.appendChild(mainRow);
          li.appendChild(cardInner);

          return li;
        },

        formatMinutes: function(total) {
          if (typeof total !== 'number' || isNaN(total) || total <= 0) {
            return 'n/a';
          }
          if (total < 60) {
            return String(total) + ' min';
          }
          var hours = Math.floor(total / 60);
          var minutes = total % 60;
          var parts = [];
          parts.push(String(hours) + ' hr' + (hours > 1 ? 's' : ''));
          if (minutes > 0) {
            parts.push(String(minutes) + ' min');
          }
          return parts.join(' ');
        },

        formatCourse: function(course) {
          var map = {
            'main_dish': 'Main dish',
            'dessert': 'Dessert',
            'lunch': 'Lunch',
            'breakfast_brunch': 'Breakfast & brunch',
            'appetizer': 'Appetizer',
            'side_dish': 'Side dish',
            'beverage': 'Beverage',
            'snack': 'Snack',
            'other': 'Other'
          };
          return map[course] || course;
        },

        formatArticleCategory: function(category) {
          var map = {
            'knife_skills': 'Knife skills',
            'baking': 'Baking',
            'sauces': 'Sauces',
            'substitutions': 'Substitutions',
            'equipment': 'Equipment',
            'general': 'General'
          };
          return map[category] || category;
        },

        formatDate: function(value) {
          try {
            var date = new Date(value);
            if (isNaN(date.getTime())) {
              return '';
            }
            var options = { year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString(undefined, options);
          } catch (error) {
            return '';
          }
        },

        bindGlobalActions: function() {
          this.bindActionHandlers(document);
        },

        bindActionHandlers: function(root) {
          var self = this;
          var actionable = root.querySelectorAll('[data-action]');
          actionable.forEach(function(element) {
            if (element.dataset.bound === 'true') {
              return;
            }
            var action = element.dataset.action;

            if (action === 'change-filter' || action === 'change-filter-empty') {
              element.addEventListener('click', function() {
                var filter = element.getAttribute('data-filter') || 'all';
                self.onFilterClick(filter);
              });
            } else if (action === 'open-saved-item') {
              element.addEventListener('click', function() {
                var type = element.getAttribute('data-contentType');
                var id = element.getAttribute('data-contentId');
                if (!type || !id) {
                  return;
                }
                if (type === 'recipe') {
                  window.location.href = 'recipe.html?id=' + encodeURIComponent(id);
                } else if (type === 'article') {
                  window.location.href = 'article.html?id=' + encodeURIComponent(id);
                }
              });

              element.addEventListener('keydown', function(event) {
                if (event.key === 'Enter' || event.key === ' ') {
                  event.preventDefault();
                  element.click();
                }
              });
            }

            element.dataset.bound = 'true';
          });
        },

        onFilterClick: function(filter) {
          var newViewMode = 'all';
          if (filter === 'recipes') {
            newViewMode = 'recipes';
          } else if (filter === 'articles') {
            newViewMode = 'articles';
          }

          this.state.viewMode = newViewMode;
          this.updateUrlForViewMode(newViewMode);
          this.applyFilterTabState();
          this.loadItems();
        },

        updateUrlForViewMode: function(viewMode) {
          try {
            if (window.history && window.history.pushState) {
              var url = new URL(window.location.href);
              if (viewMode === 'all') {
                url.searchParams.delete('type');
              } else {
                url.searchParams.set('type', viewMode);
              }
              window.history.pushState({ viewMode: viewMode }, '', url.toString());
            }
          } catch (error) {
            console.warn('Unable to update URL for view mode', error);
          }
        },

        applyFilterTabState: function() {
          var buttons = document.querySelectorAll('[data-action="change-filter"]');
          var viewMode = this.state.viewMode;
          buttons.forEach(function(button) {
            var filter = button.getAttribute('data-filter');
            var isActive = false;
            if (viewMode === 'all' && filter === 'all') {
              isActive = true;
            } else if (viewMode === 'recipes' && filter === 'recipes') {
              isActive = true;
            } else if (viewMode === 'articles' && filter === 'articles') {
              isActive = true;
            }
            if (isActive) {
              button.classList.add('is-active');
              button.setAttribute('aria-current', 'page');
            } else {
              button.classList.remove('is-active');
              button.removeAttribute('aria-current');
            }
          });
        }
      };

      savedPage.init();
    });
  </script>
</body>
</html>
