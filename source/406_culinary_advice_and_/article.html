<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Culinary Blog &ndash; Layout Framework</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Framework styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific styles -->
  <link rel='stylesheet' href='article.css'>
</head>
<body class='site'>

  <header class='site-header'>
    <div class='header-inner container'>
      <a href='index.html' class='site-logo' aria-label='Culinary home'>
        <!-- Replace logo.svg with your actual logo asset -->
        <img src='logo.svg' alt='Culinary Passion logo' class='site-logo-image'>
      </a>

      <nav class='site-nav' aria-label='Primary'>
        <ul class='nav-list'>
          <li class='nav-item'><a href='index.html' class='nav-link is-active'>Home</a></li>
          <li class='nav-item'><a href='recipes.html' class='nav-link'>Recipes</a></li>
          <li class='nav-item'><a href='seasonal.html' class='nav-link'>Seasonal</a></li>
          <li class='nav-item'><a href='techniques.html' class='nav-link'>Techniques</a></li>
          <li class='nav-item'><a href='meal_plans.html' class='nav-link'>Meal Plans</a></li>
          <li class='nav-item'><a href='meal_plans.html?view=my_plans' class='nav-link'>My Plans</a></li>
          <li class='nav-item'><a href='tags.html' class='nav-link'>Tags</a></li>
          <li class='nav-item'><a href='saved.html' class='nav-link'>Saved</a></li>
          <li class='nav-item'><a href='shopping_list.html' class='nav-link'>Shopping List</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class='hero' aria-labelledby='page-title'>
    <div class='hero-inner container'>
      <h1 id='page-title' class='hero-title'>Article</h1>
    </div>
  </section>

  <main id='content' class='content'>
    <div class='content-inner container layout'>
      <div class='layout-main'>
        <!-- Article loader overlay -->
        <div class='article-loader-overlay' data-component='article-loader' aria-hidden='true'>
          <div class='article-loader-backdrop'></div>
          <div class='article-loader-spinner' role='status' aria-label='Loading content'>
            <span class='spinner'></span>
            <span class='loader-text'>Loading</span>
          </div>
        </div>

        <!-- Article detail -->
        <article class='article-detail' data-component='article'>
          <!-- Article header (hero-like within content area) -->
          <section class='article-header-section' data-component='article-header' data-populate='article-header'>
            <!-- Filled by JavaScript -->
          </section>

          <!-- Article body -->
          <section class='article-body-section' data-component='article-body' data-populate='article-body'>
            <!-- Filled by JavaScript -->
          </section>
        </article>

        <!-- Comments section -->
        <section class='comments-section' data-component='comments-section' aria-label='Article comments'>
          <header class='comments-header'>
            <h2 class='comments-title'>Comments</h2>
            <span class='comments-count-badge'>
              <span class='comments-count-number' data-populate='comment-count'>0</span>
            </span>
          </header>

          <!-- Comment list -->
          <div class='comments-list' data-component='comment-list' data-populate='comment-list'>
            <!-- Filled by JavaScript -->
          </div>

          <!-- Pagination controls -->
          <nav class='comments-pagination' data-component='comments-pagination' data-populate='comments-pagination' aria-label='Comments pagination'>
            <!-- Filled by JavaScript -->
          </nav>

          <!-- Comment form -->
          <section class='comment-form-section' aria-label='Add a comment' data-component='comment-form'>
            <form class='comment-form' data-action='submit-comment' novalidate>
              <div class='form-group'>
                <label for='commentAuthor'>Name (optional)</label>
                <input id='commentAuthor' name='author_name' type='text' class='form-control' autocomplete='name'>
              </div>

              <div class='form-group'>
                <label for='commentText'>Comment</label>
                <textarea id='commentText' name='text' class='form-control' rows='4' required></textarea>
                <p class='form-error' data-role='comment-error' aria-live='polite'></p>
              </div>

              <button type='submit' class='btn btn-primary'>Post comment</button>
            </form>
          </section>
        </section>

        <!-- Non-visual state components -->
        <div data-component='article-comment-counter-sync' hidden></div>
        <div data-component='url-state-manager' hidden></div>
      </div>

      <aside class='layout-sidebar' aria-label='Sidebar'>
        <section class='card sidebar-card'>
          <div class='card-accent'></div>
          <div class='card-body'>
            <!-- Sidebar content such as featured recipes or collections goes here -->
          </div>
        </section>
      </aside>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-links'>
          <li class='footer-item'><a href='about.html' class='footer-link'>About</a></li>
          <li class='footer-item'><a href='contact.html' class='footer-link'>Contact</a></li>
          <li class='footer-item'><a href='help.html' class='footer-link'>Help &amp; FAQ</a></li>
          <li class='footer-item'><a href='collections.html' class='footer-link'>Collections</a></li>
          <li class='footer-item'><a href='meal_plans.html' class='footer-link'>Meal Plans</a></li>
          <li class='footer-item'><a href='terms_privacy.html' class='footer-link'>Terms &amp; Privacy</a></li>
        </ul>
      </nav>
      <div class='footer-meta'>
        <p class='footer-copy'>&copy; <span class='footer-year'>2026</span> Culinary Passion. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- SDK / business logic bundle -->
  <script src='business_logic.js'></script>

  <!-- Page UI logic -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      'use strict';

      var urlParams = new URLSearchParams(window.location.search);
      var initialArticleId = urlParams.get('id');
      var pageParamRaw = urlParams.get('page');
      var pageParam = pageParamRaw ? parseInt(pageParamRaw, 10) : NaN;
      var viewParam = urlParams.get('view');

      var initialPage = !isNaN(pageParam) && pageParam > 0 ? pageParam : 1;

      var state = {
        articleId: initialArticleId || null,
        article: null,
        isBookmarked: false,
        comments: [],
        commentsPage: initialPage,
        commentsPageSize: 10,
        commentsTotal: 0,
        contentView: viewParam === 'full' ? 'full' : 'truncated',
        isLoadingArticle: false,
        isLoadingComments: false,
        isLoadingBookmark: false,
        commentsLoaded: false
      };

      // Cache DOM containers
      var articleLoaderEl = document.querySelector('[data-component="article-loader"]');
      var articleHeaderContainer = document.querySelector('[data-populate="article-header"]');
      var articleBodyContainer = document.querySelector('[data-populate="article-body"]');
      var commentsListContainer = document.querySelector('[data-populate="comment-list"]');
      var commentsPaginationContainer = document.querySelector('[data-populate="comments-pagination"]');
      var commentCountContainer = document.querySelector('[data-populate="comment-count"]');
      var commentsSectionEl = document.querySelector('[data-component="comments-section"]');
      var commentFormEl = document.querySelector('[data-action="submit-comment"]');

      function escapeHtml(str) {
        if (typeof str !== 'string') {
          return '';
        }
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function setLoaderVisible(visible) {
        if (!articleLoaderEl) {
          return;
        }
        if (visible) {
          articleLoaderEl.classList.add('is-visible');
          articleLoaderEl.setAttribute('aria-hidden', 'false');
        } else {
          articleLoaderEl.classList.remove('is-visible');
          articleLoaderEl.setAttribute('aria-hidden', 'true');
        }
      }

      function syncCommentCountLabel() {
        if (commentCountContainer) {
          var total = state.commentsTotal || 0;
          commentCountContainer.textContent = String(total);
        }
      }

      function updateUrlParam(name, value) {
        var url = new URL(window.location.href);
        if (value === null || value === undefined || value === '' || value === 1 && name === 'page') {
          url.searchParams.delete(name);
        } else {
          url.searchParams.set(name, String(value));
        }
        window.history.pushState({}, '', url.toString());
      }

      function updatePageParam(page) {
        updateUrlParam('page', page);
      }

      function updateViewParam(view) {
        if (view === 'full') {
          updateUrlParam('view', 'full');
        } else {
          updateUrlParam('view', null);
        }
      }

      function renderNoArticle() {
        setLoaderVisible(false);
        if (articleHeaderContainer) {
          articleHeaderContainer.innerHTML = "" +
            "<header class='article-header article-header-empty'>" +
            "  <div class='article-header-main'>" +
            "    <h1 class='article-title'>No article selected</h1>" +
            "    <p class='article-subtitle'>Open this page from search, techniques, or the home page to view a culinary article.</p>" +
            "  </div>" +
            "</header>";
        }
        if (articleBodyContainer) {
          articleBodyContainer.innerHTML = '';
        }
        if (commentsListContainer) {
          commentsListContainer.innerHTML = "<p class='state state-empty'>Comments will appear here once an article is selected.</p>";
        }
        if (commentsPaginationContainer) {
          commentsPaginationContainer.innerHTML = '';
        }
        if (commentCountContainer) {
          commentCountContainer.textContent = '0';
        }
        if (commentFormEl) {
          var fields = commentFormEl.querySelectorAll('input, textarea, button');
          fields.forEach(function (el) {
            el.disabled = true;
          });
        }
        if (commentsSectionEl) {
          commentsSectionEl.classList.add('is-disabled');
        }
      }

      function formatArticleContent(text) {
        if (!text) {
          return '';
        }
        var normalized = String(text).replace(/\r\n/g, '\n');
        var blocks = normalized.split(/\n{2,}/);
        var htmlParts = [];
        blocks.forEach(function (block) {
          var trimmed = block.trim();
          if (!trimmed) {
            return;
          }
          var escaped = escapeHtml(trimmed).replace(/\n/g, '<br>');
          htmlParts.push('<p>' + escaped + '</p>');
        });
        return htmlParts.join('');
      }

      function getTruncatedText(text, maxChars) {
        if (!text) {
          return '';
        }
        var t = String(text);
        if (t.length <= maxChars) {
          return t;
        }
        var slice = t.slice(0, maxChars);
        var lastSpace = slice.lastIndexOf(' ');
        if (lastSpace > 40) {
          slice = slice.slice(0, lastSpace);
        }
        return slice + '…';
      }

      function renderArticleHeader() {
        if (!articleHeaderContainer) {
          return;
        }
        var article = state.article;
        if (!article) {
          articleHeaderContainer.innerHTML = '';
          return;
        }
        var ratingText = typeof article.average_rating === 'number' ? article.average_rating.toFixed(1) : '–';
        var readingTimeText = article.reading_time_minutes ? article.reading_time_minutes + ' min read' : '';
        var categoryLabel = article.category ? article.category.replace(/_/g, ' ') : 'general';
        var contentTypeLabel = article.content_type ? article.content_type.replace(/_/g, ' ') : 'general';
        var totalComments = state.commentsTotal || article.comment_count || 0;
        var commentLabel = totalComments === 1 ? '1 comment' : totalComments + ' comments';

        var bookmarkClass = state.isBookmarked ? ' is-active' : '';
        var bookmarkPressed = state.isBookmarked ? 'true' : 'false';
        var bookmarkLabel = state.isBookmarked ? 'Saved' : 'Save';
        var bookmarkIcon = state.isBookmarked ? '★' : '☆';

        var printButtonHtml = '';
        if (article.is_print_friendly_available) {
          printButtonHtml = "" +
            "<button type='button' class='btn-utility print-link' data-component='print-link' data-action='print-article'>" +
            "  <span class='print-icon' aria-hidden='true'>🖨</span>" +
            "  <span class='print-label'>Print-friendly</span>" +
            "</button>";
        }

        var summaryHtml = '';
        if (article.summary) {
          summaryHtml = "<p class='article-summary'>" + escapeHtml(article.summary) + "</p>";
        }

        var readingTimeItem = '';
        if (readingTimeText) {
          readingTimeItem = "" +
            "<div class='article-meta-item'>" +
            "  <dt class='article-meta-label'>Reading time</dt>" +
            "  <dd class='article-meta-value'>" + escapeHtml(readingTimeText) + "</dd>" +
            "</div>";
        }

        articleHeaderContainer.innerHTML = "" +
          "<header class='article-header card'>" +
          "  <div class='article-header-utility'>" +
          "    <button type='button' class='btn-utility bookmark-toggle" + bookmarkClass + "' " +
          "            data-component='bookmark-toggle-control' data-action='toggle-bookmark' " +
          "            aria-pressed='" + bookmarkPressed + "' aria-label='" + (state.isBookmarked ? 'Remove bookmark' : 'Save article') + "'>" +
          "      <span class='bookmark-icon' aria-hidden='true'>" + bookmarkIcon + "</span>" +
          "      <span class='bookmark-label'>" + bookmarkLabel + "</span>" +
          "    </button>" +
          printButtonHtml +
          "  </div>" +
          "  <div class='article-header-main'>" +
          "    <p class='article-kicker'>" + escapeHtml(contentTypeLabel) + " · " + escapeHtml(categoryLabel) + "</p>" +
          "    <h1 id='article-title' class='article-title'>" + escapeHtml(article.title || 'Untitled article') + "</h1>" +
               summaryHtml +
          "    <dl class='article-meta'>" +
          "      <div class='article-meta-item'>" +
          "        <dt class='article-meta-label'>Rating</dt>" +
          "        <dd class='article-meta-value'>" + escapeHtml(ratingText) + "</dd>" +
          "      </div>" +
                 readingTimeItem +
          "      <div class='article-meta-item'>" +
          "        <dt class='article-meta-label'>Comments</dt>" +
          "        <dd class='article-meta-value'>" + escapeHtml(commentLabel) + "</dd>" +
          "      </div>" +
          "    </dl>" +
          "  </div>" +
          "</header>";
      }

      function renderArticleBody() {
        if (!articleBodyContainer) {
          return;
        }
        var article = state.article;
        if (!article) {
          articleBodyContainer.innerHTML = '';
          return;
        }

        var introHtml = '';
        if (article.summary) {
          introHtml = "<p class='article-body-summary lead'>" + escapeHtml(article.summary) + "</p>";
        }

        var fullContentHtml = formatArticleContent(article.content || '');
        var bodyContentHtml;

        if (article.is_truncated && state.contentView !== 'full') {
          var truncatedText = getTruncatedText(article.content || '', 800);
          var truncatedHtml = formatArticleContent(truncatedText);
          bodyContentHtml = "" +
            "<div class='article-body-content is-truncated'>" + truncatedHtml + "</div>" +
            "<div class='article-body-overlay'>" +
            "  <button type='button' class='btn btn-primary' data-action='expand-content'>Continue reading</button>" +
            "</div>";
        } else {
          bodyContentHtml = "<div class='article-body-content'>" + fullContentHtml + "</div>";
        }

        articleBodyContainer.innerHTML = introHtml + bodyContentHtml;
      }

      function renderArticle() {
        renderArticleHeader();
        renderArticleBody();
      }

      function loadArticle() {
        if (!state.articleId) {
          return false;
        }
        state.isLoadingArticle = true;
        setLoaderVisible(state.isLoadingArticle || state.isLoadingComments || state.isLoadingBookmark);
        var success = false;
        try {
          var result = WebsiteSDK.getArticleDetails(state.articleId);
          if (!result || !result.article) {
            throw new Error('Article not found');
          }
          state.article = result.article;
          state.isBookmarked = !!result.is_bookmarked;
          if (typeof result.article.comment_count === 'number') {
            state.commentsTotal = result.article.comment_count;
          }
          renderArticle();
          syncCommentCountLabel();
          success = true;
        } catch (err) {
          console.error(err);
          if (articleHeaderContainer) {
            articleHeaderContainer.innerHTML = "<div class='state state-error'>We could not load this article. Please try again later.</div>";
          }
          if (articleBodyContainer) {
            articleBodyContainer.innerHTML = '';
          }
        } finally {
          state.isLoadingArticle = false;
          setLoaderVisible(state.isLoadingArticle || state.isLoadingComments || state.isLoadingBookmark);
        }
        return success;
      }

      function renderCommentList(container, comments) {
        if (!container) {
          return;
        }
        if (state.isLoadingComments && !state.commentsLoaded) {
          container.innerHTML = "<p class='state state-loading'>Loading comments…</p>";
          return;
        }
        if (!comments || !comments.length) {
          container.innerHTML = "<p class='state state-empty'>No comments yet. Be the first to share a tip or question.</p>";
          return;
        }
        var itemsHtml = comments.map(function (comment) {
          var author = comment.author_name ? escapeHtml(comment.author_name) : 'Anonymous cook';
          var dateLabel = '';
          if (comment.created_at) {
            try {
              var d = new Date(comment.created_at);
              if (!isNaN(d.getTime())) {
                dateLabel = d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
              }
            } catch (e) {
              dateLabel = '';
            }
          }
          var headerMeta = author;
          if (dateLabel) {
            headerMeta += ' · ' + dateLabel;
          }
          return "" +
            "<article class='comment'>" +
            "  <header class='comment-header'>" +
            "    <h3 class='comment-author'>" + headerMeta + "</h3>" +
            "  </header>" +
            "  <div class='comment-body'>" +
            "    <p>" + escapeHtml(comment.text) + "</p>" +
            "  </div>" +
            "</article>";
        }).join('');
        container.innerHTML = itemsHtml;
      }

      function renderCommentsPagination(container, currentPage, pageSize, totalResults) {
        if (!container) {
          return;
        }
        var total = totalResults || 0;
        var size = pageSize || 1;
        var totalPages = Math.ceil(total / size);
        if (!totalPages || totalPages <= 1) {
          container.innerHTML = '';
          return;
        }
        var pagesHtml = '';
        var page;
        for (page = 1; page <= totalPages; page += 1) {
          var isCurrent = page === currentPage;
          pagesHtml += "" +
            "<button type='button' class='pagination-page" + (isCurrent ? " is-current" : "") + "' " +
            "        data-action='change-comments-page' data-page='" + page + "'" +
            (isCurrent ? " aria-current='page'" : "") + ">" + page + "</button>";
        }
        var prevDisabled = currentPage <= 1 ? ' disabled' : '';
        var nextDisabled = currentPage >= totalPages ? ' disabled' : '';

        container.innerHTML = "" +
          "<div class='pagination-inner'>" +
          "  <button type='button' class='pagination-prev' data-action='change-comments-page' data-page='" + (currentPage - 1) + "'" + prevDisabled + ">Prev</button>" +
          "  <div class='pagination-pages'>" + pagesHtml + "</div>" +
          "  <button type='button' class='pagination-next' data-action='change-comments-page' data-page='" + (currentPage + 1) + "'" + nextDisabled + ">Next</button>" +
          "</div>";
      }

      function renderComments() {
        renderCommentList(commentsListContainer, state.comments);
        renderCommentsPagination(commentsPaginationContainer, state.commentsPage, state.commentsPageSize, state.commentsTotal);
        syncCommentCountLabel();
        if (commentsSectionEl) {
          if (state.comments && state.comments.length) {
            commentsSectionEl.classList.remove('is-empty');
          } else {
            commentsSectionEl.classList.add('is-empty');
          }
        }
      }

      function loadComments() {
        if (!state.articleId) {
          return;
        }
        state.isLoadingComments = true;
        setLoaderVisible(state.isLoadingArticle || state.isLoadingComments || state.isLoadingBookmark);
        try {
          var res = WebsiteSDK.getArticleComments(state.articleId, state.commentsPage, state.commentsPageSize);
          state.comments = Array.isArray(res.comments) ? res.comments : [];
          if (typeof res.total_results === 'number') {
            state.commentsTotal = res.total_results;
          }
          if (typeof res.page === 'number') {
            state.commentsPage = res.page;
          }
          if (typeof res.page_size === 'number') {
            state.commentsPageSize = res.page_size;
          }
          state.commentsLoaded = true;
          renderComments();
          renderArticleHeader();
        } catch (err) {
          console.error(err);
          if (commentsListContainer) {
            commentsListContainer.innerHTML = "<p class='state state-error'>We could not load comments. Please try again.</p>";
          }
          if (commentsPaginationContainer) {
            commentsPaginationContainer.innerHTML = '';
          }
        } finally {
          state.isLoadingComments = false;
          setLoaderVisible(state.isLoadingArticle || state.isLoadingComments || state.isLoadingBookmark);
        }
      }

      function handleChangeCommentsPage(targetPage) {
        var pageNum = parseInt(targetPage, 10);
        if (!pageNum || pageNum < 1 || pageNum === state.commentsPage) {
          return;
        }
        state.commentsPage = pageNum;
        updatePageParam(pageNum);
        loadComments();
      }

      function handleExpandContent() {
        if (!state.article) {
          return;
        }
        state.contentView = 'full';
        updateViewParam('full');
        renderArticleBody();
      }

      function handlePrintArticle() {
        if (!state.articleId || !state.article || !state.article.is_print_friendly_available) {
          return;
        }
        var url = 'article_print.html?articleId=' + encodeURIComponent(state.articleId);
        window.open(url, '_blank');
      }

      function handleBookmarkToggle() {
        if (!state.articleId || !state.article) {
          return;
        }
        var nextState = !state.isBookmarked;
        state.isLoadingBookmark = true;
        setLoaderVisible(state.isLoadingArticle || state.isLoadingComments || state.isLoadingBookmark);
        try {
          var response = WebsiteSDK.toggleArticleBookmark(state.articleId, nextState);
          if (response && response.success) {
            state.isBookmarked = !!response.is_bookmarked;
          } else {
            window.alert('Unable to update saved state. Please try again.');
          }
          renderArticleHeader();
        } catch (err) {
          console.error(err);
          window.alert('Unable to update saved state. Please try again.');
        } finally {
          state.isLoadingBookmark = false;
          setLoaderVisible(state.isLoadingArticle || state.isLoadingComments || state.isLoadingBookmark);
        }
      }

      function handleCommentSubmit(evt) {
        evt.preventDefault();
        if (!commentFormEl) {
          return;
        }
        if (!state.articleId || !state.article) {
          var errBlock = commentFormEl.querySelector('[data-role="comment-error"]');
          if (errBlock) {
            errBlock.textContent = 'You need an article open before posting a comment.';
          }
          return;
        }
        var authorInput = commentFormEl.querySelector('input[name="author_name"]');
        var textInput = commentFormEl.querySelector('textarea[name="text"]');
        var errorEl = commentFormEl.querySelector('[data-role="comment-error"]');
        if (errorEl) {
          errorEl.textContent = '';
        }
        var textVal = textInput ? textInput.value.trim() : '';
        var authorVal = authorInput ? authorInput.value.trim() : '';
        if (!textVal) {
          if (errorEl) {
            errorEl.textContent = 'Please enter a comment.';
          }
          if (textInput) {
            textInput.focus();
          }
          return;
        }
        try {
          var result = WebsiteSDK.postArticleComment(state.articleId, textVal, authorVal || undefined);
          if (!result || !result.success || !result.comment) {
            if (errorEl) {
              errorEl.textContent = (result && result.message) || 'Unable to post comment. Please try again.';
            }
            return;
          }
          // Insert new comment at the top of the current page
          state.comments = state.comments || [];
          state.comments.unshift(result.comment);
          state.commentsTotal = (state.commentsTotal || 0) + 1;
          if (state.comments.length > state.commentsPageSize) {
            state.comments.pop();
          }
          renderComments();
          renderArticleHeader();
          syncCommentCountLabel();
          if (authorInput) {
            authorInput.value = '';
          }
          if (textInput) {
            textInput.value = '';
          }
          if (commentsListContainer) {
            commentsListContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        } catch (err) {
          console.error(err);
          if (errorEl) {
            errorEl.textContent = 'Unable to post comment. Please try again.';
          }
        }
      }

      // Global click handler for data-action elements
      document.addEventListener('click', function (evt) {
        var actionEl = evt.target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.getAttribute('data-action');
        if (!action) {
          return;
        }
        if (action === 'toggle-bookmark') {
          evt.preventDefault();
          handleBookmarkToggle();
        } else if (action === 'print-article') {
          evt.preventDefault();
          handlePrintArticle();
        } else if (action === 'expand-content') {
          evt.preventDefault();
          handleExpandContent();
        } else if (action === 'change-comments-page') {
          evt.preventDefault();
          var targetPage = actionEl.getAttribute('data-page');
          handleChangeCommentsPage(targetPage);
        }
      });

      if (commentFormEl) {
        commentFormEl.addEventListener('submit', handleCommentSubmit);
      }

      // Respond to browser back/forward for id, page, and view params
      window.addEventListener('popstate', function () {
        var params = new URLSearchParams(window.location.search);
        var newId = params.get('id');
        var pageRaw = params.get('page');
        var newPage = pageRaw ? parseInt(pageRaw, 10) : NaN;
        var newView = params.get('view');

        var idChanged = newId !== state.articleId;

        if (idChanged) {
          state.articleId = newId;
          state.commentsPage = !isNaN(newPage) && newPage > 0 ? newPage : 1;
          state.contentView = newView === 'full' ? 'full' : 'truncated';
          if (!state.articleId) {
            state.article = null;
            renderNoArticle();
            return;
          }
          var ok = loadArticle();
          if (ok) {
            loadComments();
          }
          return;
        }

        var pageChanged = !isNaN(newPage) && newPage > 0 && newPage !== state.commentsPage;
        if (pageChanged) {
          state.commentsPage = newPage;
          loadComments();
        }

        var newContentView = newView === 'full' ? 'full' : 'truncated';
        var viewChanged = newContentView !== state.contentView;
        if (viewChanged) {
          state.contentView = newContentView;
          renderArticleBody();
        }
      });

      // Initial page setup
      if (!state.articleId) {
        renderNoArticle();
      } else {
        var loaded = loadArticle();
        if (loaded) {
          loadComments();
        }
      }
    });
  </script>
</body>
</html>
