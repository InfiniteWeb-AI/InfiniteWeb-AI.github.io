<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Advance the Plot &mdash; Book &amp; Movie Reviews</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Lora:wght@400;500;600&amp;family=Great+Vibes&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='search.css'>
</head>
<body>
  <header class='site-header' role='banner'>
    <div class='site-header-inner'>
      <div class='site-branding'>
        <a href='index.html' class='site-title'>Advance the Plot</a>
      </div>
      <nav class='primary-nav' aria-label='Main navigation'>
        <ul class='primary-nav-list'>
          <li class='primary-nav-item'><a href='index.html' class='nav-link'>Home</a></li>
          <li class='primary-nav-item'><a href='reviews.html?content_type=books' class='nav-link'>Books</a></li>
          <li class='primary-nav-item'><a href='reviews.html?content_type=movies' class='nav-link'>Movies</a></li>
          <li class='primary-nav-item'><a href='reading_lists.html' class='nav-link'>Reading Lists</a></li>
          <li class='primary-nav-item'><a href='account.html' class='nav-link'>Sign Up</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class='site-main'>
    <div class='site-main-inner'>
      <main id='content' class='content-main' role='main'>
        <section class='search-page' data-component='search-state-manager'>
          <header class='search-query-summary' data-component='search-query-summary' data-populate='search-summary'></header>

          <section class='applied-filters-bar' data-component='applied-filters-bar'>
            <div class='applied-filters-inner' data-populate='applied-filters'></div>
          </section>

          <div class='search-controls-row'>
            <div class='page-size-control' data-component='search-page-size-control'>
              <label for='pageSizeSelect' class='control-label'>Results per page</label>
              <select id='pageSizeSelect' class='control-select' data-action='change-page-size'>
                <option value='10'>10</option>
                <option value='20'>20</option>
                <option value='50'>50</option>
              </select>
            </div>
            <div class='sort-control' data-component='search-sort-control'>
              <label for='sortBySelect' class='control-label'>Sort by</label>
              <select id='sortBySelect' class='control-select' data-action='change-sort'>
                <option value='relevance'>Relevance</option>
                <option value='date_newest'>Newest first</option>
                <option value='rating_high_to_low'>Rating: high to low</option>
              </select>
            </div>
          </div>

          <section class='search-results-section' data-component='search-results-list'>
            <div class='search-results-list' data-populate='search-results'></div>
          </section>

          <nav class='search-pagination' data-component='search-pagination-controls' aria-label='Search results pages'>
            <ul class='pagination-list' data-populate='pagination'></ul>
          </nav>
        </section>
      </main>

      <aside id='sidebar' class='content-sidebar' aria-label='Sidebar'>
        <section class='filters-panel' data-component='search-filters-panel'>
          <h2 class='sidebar-heading'>Filter results</h2>

          <div class='filter-group'>
            <h3 class='filter-group-title'>Content type</h3>
            <div class='filter-group-body' data-populate='filters-content-type'></div>
          </div>

          <div class='filter-group'>
            <h3 class='filter-group-title'>Genre</h3>
            <div class='filter-group-body' data-populate='filters-genre'></div>
          </div>

          <div class='filter-group'>
            <h3 class='filter-group-title'>Tags</h3>
            <div class='filter-group-body' data-populate='filters-tags'></div>
          </div>

          <div class='filter-group'>
            <h3 class='filter-group-title'>Rating</h3>
            <div class='filter-group-body' data-populate='filters-rating'></div>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <footer class='site-footer' role='contentinfo'>
    <div class='site-footer-inner'>
      <div class='footer-left'>
        <p class='footer-meta'>&copy; 2024 Advance the Plot. All rights reserved.</p>
      </div>
      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'><a href='about.html'>About</a></li>
          <li class='footer-nav-item'><a href='contact.html'>Contact</a></li>
          <li class='footer-nav-item'><a href='newsletter.html'>Newsletter</a></li>
        </ul>
      </nav>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);

      function parseIntParam(name, defaultValue) {
        var value = urlParams.get(name);
        if (!value) {
          return defaultValue;
        }
        var n = parseInt(value, 10);
        if (isNaN(n)) {
          return defaultValue;
        }
        return n;
      }

      function parseFloatParam(name) {
        var value = urlParams.get(name);
        if (!value) {
          return null;
        }
        var n = parseFloat(value);
        if (isNaN(n)) {
          return null;
        }
        return n;
      }

      var state = {
        query: urlParams.get('query') || '',
        contentType: urlParams.get('content_type') || '',
        genre: urlParams.get('genre') || '',
        tagIds: (urlParams.get('tag_ids') || '').split(',').filter(function(id) { return id; }),
        minRating: parseFloatParam('min_rating'),
        maxRating: parseFloatParam('max_rating'),
        sortBy: urlParams.get('sortBy') || '',
        page: parseIntParam('page', 1),
        pageSize: parseIntParam('pageSize', 20)
      };

      var filterOptions = null;
      var searchResults = null;
      var searchError = null;

      try {
        filterOptions = WebsiteSDK.getReviewFilterOptions('search_results', state.contentType || undefined);
      } catch (err) {
        console.error('Error loading filter options', err);
      }

      if (state.query) {
        var filters = {};
        if (state.contentType) {
          filters.contentType = state.contentType;
        }
        if (state.genre) {
          filters.genre = state.genre;
        }
        if (state.tagIds && state.tagIds.length) {
          filters.tagIds = state.tagIds;
        }
        if (state.minRating !== null) {
          filters.minRating = state.minRating;
        }
        if (state.maxRating !== null) {
          filters.maxRating = state.maxRating;
        }

        try {
          searchResults = WebsiteSDK.searchReviews(
            state.query,
            filters,
            state.sortBy || undefined,
            state.page,
            state.pageSize
          );
        } catch (err2) {
          console.error('Error searching reviews', err2);
          searchError = 'There was a problem loading search results. Please try again.';
        }
      }

      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        var type = element.dataset.populate;
        if (type === 'search-summary') {
          renderSearchSummary(element, state, searchResults, searchError);
        } else if (type === 'applied-filters') {
          renderAppliedFilters(element, state, filterOptions);
        } else if (type === 'filters-content-type') {
          renderContentTypeFilter(element, state);
        } else if (type === 'filters-genre') {
          renderGenreFilter(element, state, filterOptions);
        } else if (type === 'filters-tags') {
          renderTagFilters(element, state, filterOptions);
        } else if (type === 'filters-rating') {
          renderRatingFilters(element, state, filterOptions);
        } else if (type === 'search-results') {
          renderSearchResults(element, state, searchResults, searchError);
        } else if (type === 'pagination') {
          renderPagination(element, state, searchResults);
        }
      });

      setupEventHandlers(state, searchResults);
    });

    function renderSearchSummary(container, state, searchResults, searchError) {
      container.innerHTML = '';
      var heading = document.createElement('h1');
      heading.className = 'search-heading';

      if (state.query) {
        heading.textContent = 'Search results for \u201c' + state.query + '\u201d';
      } else {
        heading.textContent = 'Search reviews';
      }

      container.appendChild(heading);

      var sub = document.createElement('p');
      sub.className = 'search-subtitle';

      if (!state.query) {
        sub.textContent = 'Use the search box in the header to find book and movie reviews.';
        container.appendChild(sub);
        return;
      }

      if (searchError) {
        sub.textContent = searchError;
        container.appendChild(sub);
        return;
      }

      if (!searchResults) {
        sub.textContent = 'Loading results\u2026';
        container.appendChild(sub);
        return;
      }

      var total = typeof searchResults.totalCount === 'number' ? searchResults.totalCount : 0;
      var page = searchResults.page || state.page || 1;
      var pageSize = searchResults.pageSize || state.pageSize || 20;
      var startIndex = total === 0 ? 0 : (page - 1) * pageSize + 1;
      var endIndex = Math.min(total, page * pageSize);

      if (total === 0) {
        sub.textContent = 'No results found. Try adjusting your filters or search term.';
      } else {
        sub.textContent = 'Showing ' + startIndex + '\u2013' + endIndex + ' of ' + total + ' result' + (total === 1 ? '' : 's') + '.';
      }

      container.appendChild(sub);
    }

    function renderAppliedFilters(container, state, filterOptions) {
      container.innerHTML = '';
      var hasAny = false;

      function createChip(labelText, filterType, filterValue) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'filter-chip';
        btn.setAttribute('data-action', 'remove-filter');
        btn.setAttribute('data-filter-type', filterType);
        if (typeof filterValue !== 'undefined' && filterValue !== null) {
          btn.setAttribute('data-filter-value', String(filterValue));
        }

        var labelSpan = document.createElement('span');
        labelSpan.className = 'filter-chip-label';
        labelSpan.textContent = labelText;

        var removeSpan = document.createElement('span');
        removeSpan.className = 'filter-chip-remove';
        removeSpan.textContent = '\u00d7';

        btn.appendChild(labelSpan);
        btn.appendChild(removeSpan);
        return btn;
      }

      if (state.contentType) {
        var label = state.contentType === 'books' ? 'Books' : state.contentType === 'movies' ? 'Movies' : state.contentType;
        container.appendChild(createChip(label, 'content_type', null));
        hasAny = true;
      }

      if (state.genre) {
        container.appendChild(createChip(state.genre, 'genre', null));
        hasAny = true;
      }

      var tagNameById = {};
      if (filterOptions && filterOptions.tags && filterOptions.tags.forEach) {
        filterOptions.tags.forEach(function(tag) {
          tagNameById[tag.id] = tag.name || tag.id;
        });
      }

      if (state.tagIds && state.tagIds.length) {
        state.tagIds.forEach(function(tagId) {
          var name = tagNameById[tagId] || tagId;
          container.appendChild(createChip(name, 'tag', tagId));
        });
        hasAny = true;
      }

      if (state.minRating !== null || state.maxRating !== null) {
        var parts = [];
        if (state.minRating !== null && state.maxRating !== null) {
          parts.push(state.minRating + '\u2013' + state.maxRating + ' stars');
        } else if (state.minRating !== null) {
          parts.push(state.minRating + '+ stars');
        } else if (state.maxRating !== null) {
          parts.push('Up to ' + state.maxRating + ' stars');
        }
        container.appendChild(createChip('Rating: ' + parts.join(' '), 'rating', null));
        hasAny = true;
      }

      if (!hasAny) {
        var span = document.createElement('span');
        span.className = 'no-filters-applied';
        span.textContent = 'No filters applied.';
        container.appendChild(span);
        return;
      }

      var clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.className = 'filters-clear-all';
      clearBtn.setAttribute('data-action', 'clear-all-filters');
      clearBtn.textContent = 'Clear all';
      container.appendChild(clearBtn);
    }

    function renderContentTypeFilter(container, state) {
      container.innerHTML = '';
      var wrapper = document.createElement('div');
      wrapper.className = 'filter-options filter-options-content-type';

      var options = [
        { value: '', label: 'All' },
        { value: 'books', label: 'Books' },
        { value: 'movies', label: 'Movies' }
      ];

      options.forEach(function(opt) {
        var id = 'content-type-' + (opt.value || 'all');
        var label = document.createElement('label');
        label.className = 'filter-option';

        var input = document.createElement('input');
        input.type = 'radio';
        input.name = 'content_type_filter';
        input.value = opt.value;
        input.id = id;
        input.setAttribute('data-action', 'filter-content-type');
        if ((state.contentType || '') === opt.value) {
          input.checked = true;
        } else if (!state.contentType && opt.value === '') {
          input.checked = true;
        }

        var text = document.createElement('span');
        text.textContent = opt.label;

        label.appendChild(input);
        label.appendChild(text);
        wrapper.appendChild(label);
      });

      container.appendChild(wrapper);
    }

    function renderGenreFilter(container, state, filterOptions) {
      container.innerHTML = '';
      var select = document.createElement('select');
      select.className = 'filter-select';
      select.id = 'genreFilter';
      select.setAttribute('data-action', 'filter-genre');

      var defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = 'All genres';
      select.appendChild(defaultOption);

      if (filterOptions && filterOptions.genres && filterOptions.genres.forEach) {
        filterOptions.genres.forEach(function(genre) {
          var opt = document.createElement('option');
          opt.value = genre.name;
          var labelText = genre.name;
          if (typeof genre.count === 'number') {
            labelText += ' (' + genre.count + ')';
          }
          opt.textContent = labelText;
          select.appendChild(opt);
        });
      }

      select.value = state.genre || '';

      container.appendChild(select);
    }

    function renderTagFilters(container, state, filterOptions) {
      container.innerHTML = '';
      var wrapper = document.createElement('div');
      wrapper.className = 'filter-options filter-options-tags';

      if (!filterOptions || !filterOptions.tags || !filterOptions.tags.length) {
        var span = document.createElement('span');
        span.className = 'filter-empty-state';
        span.textContent = 'No tags available.';
        wrapper.appendChild(span);
        container.appendChild(wrapper);
        return;
      }

      var selectedSet = {};
      if (state.tagIds && state.tagIds.length) {
        state.tagIds.forEach(function(id) {
          selectedSet[id] = true;
        });
      }

      filterOptions.tags.forEach(function(tag) {
        var id = 'tag-filter-' + tag.id;
        var label = document.createElement('label');
        label.className = 'filter-option';

        var input = document.createElement('input');
        input.type = 'checkbox';
        input.id = id;
        input.value = tag.id;
        input.setAttribute('data-action', 'filter-tag');
        if (selectedSet[tag.id]) {
          input.checked = true;
        }

        var text = document.createElement('span');
        text.textContent = tag.name;

        label.appendChild(input);
        label.appendChild(text);
        wrapper.appendChild(label);
      });

      container.appendChild(wrapper);
    }

    function renderRatingFilters(container, state, filterOptions) {
      container.innerHTML = '';
      var wrapper = document.createElement('div');
      wrapper.className = 'filter-options filter-options-rating';

      var anyLabel = document.createElement('label');
      anyLabel.className = 'filter-option';

      var anyInput = document.createElement('input');
      anyInput.type = 'radio';
      anyInput.name = 'rating_filter';
      anyInput.value = '';
      anyInput.setAttribute('data-action', 'filter-rating');

      if (state.minRating === null && state.maxRating === null) {
        anyInput.checked = true;
      }

      var anyText = document.createElement('span');
      anyText.textContent = 'Any rating';

      anyLabel.appendChild(anyInput);
      anyLabel.appendChild(anyText);
      wrapper.appendChild(anyLabel);

      if (filterOptions && filterOptions.ratingBuckets && filterOptions.ratingBuckets.forEach) {
        filterOptions.ratingBuckets.forEach(function(bucket, index) {
          var label = document.createElement('label');
          label.className = 'filter-option';

          var input = document.createElement('input');
          input.type = 'radio';
          input.name = 'rating_filter';
          input.value = String(index + 1);
          input.setAttribute('data-action', 'filter-rating');
          if (typeof bucket.minRating === 'number') {
            input.setAttribute('data-min-rating', String(bucket.minRating));
          }
          if (typeof bucket.maxRating === 'number') {
            input.setAttribute('data-max-rating', String(bucket.maxRating));
          }

          if (state.minRating !== null && state.maxRating !== null &&
              bucket.minRating === state.minRating && bucket.maxRating === state.maxRating) {
            input.checked = true;
          }

          var text = document.createElement('span');
          text.textContent = bucket.label || (bucket.minRating + '+ stars');

          label.appendChild(input);
          label.appendChild(text);
          wrapper.appendChild(label);
        });
      }

      container.appendChild(wrapper);
    }

    function renderSearchResults(container, state, searchResults, searchError) {
      container.innerHTML = '';

      if (!state.query) {
        var info = document.createElement('p');
        info.className = 'search-placeholder';
        info.textContent = 'Start by entering a title, author, or keyword in the search box above.';
        container.appendChild(info);
        return;
      }

      if (searchError) {
        var errorP = document.createElement('p');
        errorP.className = 'search-error';
        errorP.textContent = searchError;
        container.appendChild(errorP);
        return;
      }

      if (!searchResults || !searchResults.items || !searchResults.items.length) {
        var emptyP = document.createElement('p');
        emptyP.className = 'search-empty';
        emptyP.textContent = 'No reviews match your query and filters. Try broadening your search.';
        container.appendChild(emptyP);
        return;
      }

      searchResults.items.forEach(function(item) {
        var article = document.createElement('article');
        article.className = 'search-result-item';

        var header = document.createElement('header');
        header.className = 'search-result-header';

        var titleLink = document.createElement('a');
        titleLink.className = 'search-result-title';
        titleLink.textContent = item.title || 'Untitled review';
        titleLink.href = buildReviewDetailUrl(item.reviewId);
        titleLink.setAttribute('data-action', 'open-result');

        header.appendChild(titleLink);

        var meta = document.createElement('p');
        meta.className = 'search-result-meta';

        var metaParts = [];

        if (item.contentType) {
          var ct = item.contentType === 'books' ? 'Book' : item.contentType === 'movies' ? 'Movie' : item.contentType;
          metaParts.push(ct);
        }
        if (item.genre) {
          metaParts.push(item.genre);
        }
        if (typeof item.rating === 'number') {
          metaParts.push('Rating ' + item.rating.toFixed(1) + '\u00a0\u2605');
        }
        if (item.publishedAt) {
          var dateText = formatDate(item.publishedAt);
          if (dateText) {
            metaParts.push(dateText);
          }
        }
        if (item.authorName) {
          metaParts.push('by ' + item.authorName);
        }

        meta.textContent = metaParts.join(' \u00b7 ');
        header.appendChild(meta);
        article.appendChild(header);

        var body = document.createElement('div');
        body.className = 'search-result-body';

        if (item.thumbnailUrl) {
          var thumbWrapper = document.createElement('div');
          thumbWrapper.className = 'search-result-thumbnail';

          var img = document.createElement('img');
          img.src = item.thumbnailUrl;
          img.alt = item.title ? 'Cover for ' + item.title : 'Review thumbnail';

          thumbWrapper.appendChild(img);
          body.appendChild(thumbWrapper);
        }

        var textWrapper = document.createElement('div');
        textWrapper.className = 'search-result-text';

        if (item.snippet) {
          var snippetP = document.createElement('p');
          snippetP.className = 'search-result-snippet';
          snippetP.textContent = item.snippet;
          textWrapper.appendChild(snippetP);
        }

        if (item.tags && item.tags.length) {
          var tagsList = document.createElement('ul');
          tagsList.className = 'search-result-tags';

          item.tags.forEach(function(tag) {
            var li = document.createElement('li');
            li.className = 'search-result-tag';
            li.textContent = tag.name || '';
            tagsList.appendChild(li);
          });

          textWrapper.appendChild(tagsList);
        }

        body.appendChild(textWrapper);
        article.appendChild(body);

        container.appendChild(article);
      });
    }

    function renderPagination(container, state, searchResults) {
      container.innerHTML = '';

      if (!state.query || !searchResults || typeof searchResults.totalCount !== 'number') {
        return;
      }

      var totalCount = searchResults.totalCount;
      var pageSize = searchResults.pageSize || state.pageSize || 20;
      var currentPage = searchResults.page || state.page || 1;

      var totalPages = Math.ceil(totalCount / pageSize);
      if (totalPages <= 1) {
        return;
      }

      var list = container;

      if (currentPage > 1) {
        var prevLi = document.createElement('li');
        var prevBtn = document.createElement('button');
        prevBtn.type = 'button';
        prevBtn.className = 'pagination-prev';
        prevBtn.textContent = 'Previous';
        prevBtn.setAttribute('data-action', 'change-page');
        prevBtn.setAttribute('data-page', String(currentPage - 1));
        prevLi.appendChild(prevBtn);
        list.appendChild(prevLi);
      }

      for (var p = 1; p <= totalPages; p++) {
        var li = document.createElement('li');
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pagination-page';
        btn.textContent = String(p);
        btn.setAttribute('data-action', 'change-page');
        btn.setAttribute('data-page', String(p));
        if (p === currentPage) {
          btn.disabled = true;
          btn.className += ' is-active';
          btn.setAttribute('aria-current', 'page');
        }
        li.appendChild(btn);
        list.appendChild(li);
      }

      if (currentPage < totalPages) {
        var nextLi = document.createElement('li');
        var nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.className = 'pagination-next';
        nextBtn.textContent = 'Next';
        nextBtn.setAttribute('data-action', 'change-page');
        nextBtn.setAttribute('data-page', String(currentPage + 1));
        nextLi.appendChild(nextBtn);
        list.appendChild(nextLi);
      }
    }

    function setupEventHandlers(initialState, searchResults) {
      var sortSelect = document.querySelector('[data-action="change-sort"]');
      if (sortSelect) {
        var effectiveSort = 'relevance';
        if (searchResults && searchResults.sortBy) {
          effectiveSort = searchResults.sortBy;
        } else if (initialState.sortBy) {
          effectiveSort = initialState.sortBy;
        }
        sortSelect.value = effectiveSort;

        sortSelect.addEventListener('change', function(evt) {
          var value = evt.target.value;
          updateUrlParams({ sortBy: value, page: 1 });
        });
      }

      var pageSizeSelect = document.querySelector('[data-action="change-page-size"]');
      if (pageSizeSelect) {
        var effectivePageSize = 20;
        if (searchResults && searchResults.pageSize) {
          effectivePageSize = searchResults.pageSize;
        } else if (initialState.pageSize) {
          effectivePageSize = initialState.pageSize;
        }
        pageSizeSelect.value = String(effectivePageSize);

        pageSizeSelect.addEventListener('change', function(evt) {
          var value = parseInt(evt.target.value, 10);
          if (isNaN(value) || value <= 0) {
            value = 20;
          }
          updateUrlParams({ pageSize: value, page: 1 });
        });
      }

      document.addEventListener('change', function(evt) {
        var target = evt.target;
        var action = target.getAttribute('data-action');
        if (!action) {
          return;
        }

        if (action === 'filter-content-type') {
          var value = target.value || '';
          var changes = { page: 1 };
          if (value) {
            changes.content_type = value;
          } else {
            changes.content_type = null;
          }
          updateUrlParams(changes);
        } else if (action === 'filter-genre') {
          var genreValue = target.value || '';
          var changesGenre = { page: 1 };
          if (genreValue) {
            changesGenre.genre = genreValue;
          } else {
            changesGenre.genre = null;
          }
          updateUrlParams(changesGenre);
        } else if (action === 'filter-tag') {
          var allTagInputs = document.querySelectorAll('input[data-action="filter-tag"]');
          var selectedIds = [];
          allTagInputs.forEach(function(input) {
            if (input.checked) {
              selectedIds.push(input.value);
            }
          });
          var changesTags = { page: 1 };
          if (selectedIds.length) {
            changesTags.tag_ids = selectedIds.join(',');
          } else {
            changesTags.tag_ids = null;
          }
          updateUrlParams(changesTags);
        } else if (action === 'filter-rating') {
          var minAttr = target.getAttribute('data-min-rating');
          var maxAttr = target.getAttribute('data-max-rating');
          var changesRating = { page: 1 };
          if (minAttr === null && maxAttr === null) {
            changesRating.min_rating = null;
            changesRating.max_rating = null;
          } else {
            if (minAttr !== null) {
              changesRating.min_rating = parseFloat(minAttr);
            } else {
              changesRating.min_rating = null;
            }
            if (maxAttr !== null) {
              changesRating.max_rating = parseFloat(maxAttr);
            } else {
              changesRating.max_rating = null;
            }
          }
          updateUrlParams(changesRating);
        }
      });

      document.addEventListener('click', function(evt) {
        var target = evt.target;

        var chipEl = target.closest('[data-action="remove-filter"]');
        if (chipEl) {
          var type = chipEl.getAttribute('data-filter-type');
          var value = chipEl.getAttribute('data-filter-value');
          var changes = { page: 1 };
          if (type === 'content_type') {
            changes.content_type = null;
          } else if (type === 'genre') {
            changes.genre = null;
          } else if (type === 'tag') {
            var params = new URLSearchParams(window.location.search);
            var existing = params.get('tag_ids') || '';
            var ids = existing.split(',').filter(function(id) {
              return id && id !== value;
            });
            if (ids.length) {
              changes.tag_ids = ids.join(',');
            } else {
              changes.tag_ids = null;
            }
          } else if (type === 'rating') {
            changes.min_rating = null;
            changes.max_rating = null;
          }
          updateUrlParams(changes);
          return;
        }

        var clearEl = target.closest('[data-action="clear-all-filters"]');
        if (clearEl) {
          var paramsAll = new URLSearchParams(window.location.search);
          paramsAll.delete('content_type');
          paramsAll.delete('genre');
          paramsAll.delete('tag_ids');
          paramsAll.delete('min_rating');
          paramsAll.delete('max_rating');
          paramsAll.delete('page');
          var newQuery = paramsAll.toString();
          var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
          window.location.href = newUrl;
          return;
        }

        var pageEl = target.closest('[data-action="change-page"]');
        if (pageEl) {
          var pageValue = parseInt(pageEl.getAttribute('data-page'), 10);
          if (!isNaN(pageValue) && pageValue > 0) {
            updateUrlParams({ page: pageValue });
          }
          return;
        }
      });
    }

    function updateUrlParams(changes) {
      var params = new URLSearchParams(window.location.search);
      for (var key in changes) {
        if (!Object.prototype.hasOwnProperty.call(changes, key)) {
          continue;
        }
        var value = changes[key];
        if (value === null || typeof value === 'undefined' || value === '') {
          params.delete(key);
        } else {
          params.set(key, String(value));
        }
      }
      var newQuery = params.toString();
      var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
      window.location.href = newUrl;
    }

    function buildReviewDetailUrl(reviewId) {
      var returnUrl = window.location.pathname + window.location.search;
      var params = new URLSearchParams();
      params.set('id', reviewId);
      params.set('from', 'search');
      params.set('returnUrl', encodeURIComponent(returnUrl));
      return 'review_detail.html?' + params.toString();
    }

    function formatDate(value) {
      try {
        var date = new Date(value);
        if (isNaN(date.getTime())) {
          return '';
        }
        return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      } catch (err) {
        return '';
      }
    }
  </script>
