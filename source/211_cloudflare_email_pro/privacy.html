        var state = {
            uiPreferences: null,
            sitePage: null,
            activeLanguage: 'english',
            activeSection: null
        };

        function resolveLanguage(langParam, uiPreferences) {
            var allowed = ['english', 'espanol'];
            if (langParam && allowed.indexOf(langParam) !== -1) {
                return langParam;
            }
            if (uiPreferences && uiPreferences.language && allowed.indexOf(uiPreferences.language) !== -1) {
                return uiPreferences.language;
            }
            return 'english';
        }

        function applyMetadata(page, lang) {
            try {
                var copy = PRIVACY_COPY[lang] || PRIVACY_COPY.english;
                var title = copy.title;
                if (page && page.name) {
                    if (lang === 'espanol') {
                        title = copy.title || page.name;
                    } else {
                        title = page.name;
                    }
                }
                document.title = title;

                var descriptionText = (page && page.description) ? page.description : copy.subtitle;
                var meta = document.querySelector('meta[name="description"]');
                if (!meta) {
                    meta = document.createElement('meta');
                    meta.setAttribute('name', 'description');
                    document.head.appendChild(meta);
                }
                meta.setAttribute('content', descriptionText);
            } catch (e) {
                console.error('Error applying metadata', e);
            }
        }

        function renderTitle(container, currentState) {
            var lang = currentState.activeLanguage;
            var copy = PRIVACY_COPY[lang] || PRIVACY_COPY.english;
            var titleText = copy.title;
            if (currentState.sitePage && currentState.sitePage.name && lang === 'english') {
                titleText = currentState.sitePage.name;
            }
            container.textContent = titleText;
        }

        function renderSubtitle(container, currentState) {
            var lang = currentState.activeLanguage;
            var copy = PRIVACY_COPY[lang] || PRIVACY_COPY.english;
            var text = copy.subtitle;
            if (currentState.sitePage && currentState.sitePage.description && lang === 'english') {
                text = currentState.sitePage.description;
            }
            container.textContent = text;
        }

        function renderLanguageSwitcher(container, currentState) {
            var lang = currentState.activeLanguage;
            var label = (lang === 'espanol') ? 'Idioma:' : 'Language:';
            container.innerHTML = '';

            var labelSpan = document.createElement('span');
            labelSpan.className = 'language-switcher-label';
            labelSpan.textContent = label + ' ';
            container.appendChild(labelSpan);

            var languages = [
                { code: 'english', name: 'English' },
                { code: 'espanol', name: 'Español' }
            ];

            languages.forEach(function(item, index) {
                if (index > 0) {
                    var sep = document.createTextNode(' / ');
                    container.appendChild(sep);
                }
                if (item.code === lang) {
                    var current = document.createElement('span');
                    current.className = 'language-switcher-current';
                    current.textContent = item.name;
                    container.appendChild(current);
                } else {
                    var link = document.createElement('a');
                    link.href = 'javascript:void(0)';
                    link.textContent = item.name;
                    link.setAttribute('data-action', 'switch-language');
                    link.setAttribute('data-lang', item.code);
                    container.appendChild(link);
                }
            });
        }

        function renderContent(container, currentState) {
            var lang = currentState.activeLanguage;
            var copy = PRIVACY_COPY[lang] || PRIVACY_COPY.english;
            container.innerHTML = '';

            copy.tocItems.forEach(function(item, index) {
                var sectionDef = copy.sections[item.key];
                if (!sectionDef) {
                    return;
                }
                var section = document.createElement('section');
                section.className = 'policy-section';
                section.setAttribute('data-section-key', item.key);
                section.id = 'section-' + item.key;

                var headingLevel = (index === 0) ? 'h2' : 'h2';
                var h = document.createElement(headingLevel);
                h.textContent = sectionDef.heading;
                section.appendChild(h);

                sectionDef.paragraphs.forEach(function(text) {
                    var p = document.createElement('p');
                    p.textContent = text;
                    section.appendChild(p);
                });

                container.appendChild(section);
            });
        }

        function renderTocTitle(container, currentState) {
            var lang = currentState.activeLanguage;
            var copy = PRIVACY_COPY[lang] || PRIVACY_COPY.english;
            container.textContent = copy.tocTitle;
        }

        function renderToc(container, currentState) {
            var lang = currentState.activeLanguage;
            var copy = PRIVACY_COPY[lang] || PRIVACY_COPY.english;
            container.innerHTML = '';

            copy.tocItems.forEach(function(item) {
                var li = document.createElement('li');
                var link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.textContent = item.label;
                link.setAttribute('data-action', 'toc-item');
                link.setAttribute('data-section', item.key);
                li.appendChild(link);
                container.appendChild(li);
            });
        }

        function buildBackLinkHref(currentState) {
            var params = new URLSearchParams();
            params.set('view', 'notice');
            if (currentState.activeLanguage) {
                params.set('lang', currentState.activeLanguage);
            }
            var query = params.toString();
            return 'index.html' + (query ? '?' + query : '');
        }

        function renderBackLink(anchor, currentState) {
            var lang = currentState.activeLanguage;
            var copy = PRIVACY_COPY[lang] || PRIVACY_COPY.english;
            anchor.textContent = copy.backLink;
            anchor.href = buildBackLinkHref(currentState);
        }

        function focusSection(sectionKey, options) {
            options = options || {};
            var scroll = options.scroll !== false;
            if (!sectionKey) {
                return;
            }
            var container = document.querySelector('[data-component="privacy-content-sections"]');
            if (!container) {
                return;
            }
            var sections = container.querySelectorAll('[data-section-key]');
            var target = null;
            Array.prototype.forEach.call(sections, function(sec) {
                if (sec.getAttribute('data-section-key') === sectionKey) {
                    target = sec;
                    sec.classList.add('is-active-section');
                } else {
                    sec.classList.remove('is-active-section');
                }
            });
            if (target && scroll) {
                try {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } catch (e) {
                    target.scrollIntoView(true);
                }
            }
        }

        function setupActions(currentState) {
            var backLink = document.querySelector('[data-action="back-to-notice"]');
            if (backLink) {
                backLink.addEventListener('click', function(event) {
                    event.preventDefault();
                    var href = buildBackLinkHref(currentState);
                    window.location.href = href;
                });
            }

            document.addEventListener('click', function(event) {
                var target = event.target;
                if (!target || !target.getAttribute) {
                    return;
                }
                var action = target.getAttribute('data-action');
                if (!action) {
                    return;
                }

                if (action === 'switch-language') {
                    event.preventDefault();
                    var newLang = target.getAttribute('data-lang');
                    if (!newLang || newLang === currentState.activeLanguage) {
                        return;
                    }
                    var params = new URLSearchParams(window.location.search || '');
                    params.set('lang', newLang);
                    var sectionParam = params.get('section');
                    if (sectionParam) {
                        params.set('section', sectionParam);
                    }
                    var query = params.toString();
                    var url = 'privacy.html' + (query ? '?' + query : '');
                    window.location.href = url;
                    return;
                }

                if (action === 'toc-item') {
                    event.preventDefault();
                    var sectionKey = target.getAttribute('data-section');
                    if (!sectionKey) {
                        return;
                    }
                    currentState.activeSection = sectionKey;
                    var params2 = new URLSearchParams(window.location.search || '');
                    params2.set('section', sectionKey);
                    if (currentState.activeLanguage) {
                        params2.set('lang', currentState.activeLanguage);
                    }
                    var query2 = params2.toString();
                    var newUrl = 'privacy.html' + (query2 ? '?' + query2 : '');
                    try {
                        history.pushState({ section: sectionKey, lang: currentState.activeLanguage }, '', newUrl);
                    } catch (e) {
                        window.location.search = query2;
                        return;
                    }
                    focusSection(sectionKey);
                    return;
                }
            });

            window.addEventListener('popstate', function() {
                var params = new URLSearchParams(window.location.search || '');
                var newSection = params.get('section');
                state.activeSection = newSection;
                focusSection(newSection, { scroll: false });
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            var loader = document.querySelector('[data-component="privacy-page-loader"]');
            if (loader) {
                loader.style.display = 'block';
            }

            try {
                var urlParams = new URLSearchParams(window.location.search || '');
                var langParam = urlParams.get('lang');
                var sectionParam = urlParams.get('section');

                var uiResult = null;
                try {
                    uiResult = WebsiteSDK.getUiPreferences();
                } catch (e) {
                    console.error('Error calling getUiPreferences()', e);
                }
                if (uiResult && uiResult.preferences) {
                    state.uiPreferences = uiResult.preferences;
                }

                var pageResult = null;
                try {
                    pageResult = WebsiteSDK.getSitePageByType('privacy');
                } catch (e2) {
                    console.error('Error calling getSitePageByType("privacy")', e2);
                }
                if (pageResult && pageResult.page) {
                    state.sitePage = pageResult.page;
                }

                state.activeLanguage = resolveLanguage(langParam, state.uiPreferences);
                state.activeSection = sectionParam;

                applyMetadata(state.sitePage, state.activeLanguage);

                var populateElements = document.querySelectorAll('[data-populate]');
                Array.prototype.forEach.call(populateElements, function(element) {
                    var type = element.getAttribute('data-populate');
                    if (type === 'privacy-title') {
                        renderTitle(element, state);
                    } else if (type === 'privacy-subtitle') {
                        renderSubtitle(element, state);
                    } else if (type === 'privacy-language-switcher') {
                        renderLanguageSwitcher(element, state);
                    } else if (type === 'privacy-content') {
                        renderContent(element, state);
                    } else if (type === 'privacy-toc-title') {
                        renderTocTitle(element, state);
                    } else if (type === 'privacy-toc') {
                        renderToc(element, state);
                    }
                });

                var backLinkEl = document.querySelector('[data-component="back-to-notice-link"]');
                if (backLinkEl) {
                    renderBackLink(backLinkEl, state);
                }

                setupActions(state);

                if (state.activeSection) {
                    focusSection(state.activeSection, { scroll: true });
                }
            } catch (err) {
                console.error('Unexpected error during privacy page initialization', err);
                var mainContent = document.querySelector('[data-component="privacy-content-sections"]');
                if (mainContent && !mainContent.textContent) {
                    mainContent.textContent = 'An error occurred while loading the privacy policy. Please try reloading the page.';
                }
            } finally {
                if (loader) {
                    loader.style.display = 'none';
                    loader.setAttribute('aria-busy', 'false');
                }
            }
        });
    })();
    </script>
</body>
