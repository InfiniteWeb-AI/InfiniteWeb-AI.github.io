<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <title>Accessibility</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='accessibility.css'>
</head>
<body>
    <header class='site-header' role='banner'>
        <div class='page-container'>
            <nav class='primary-nav' aria-label='Primary'>
                <ul class='primary-nav-list'>
                    <li class='primary-nav-item'><a href='index.html'>Notice</a></li>
                    <li class='primary-nav-item'><a href='index.html?view=settings'>Settings</a></li>
                    <li class='primary-nav-item'><a href='help_center.html'>Help Center</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id='content' class='site-main' role='main' aria-labelledby='accessibility-page-title'>
        <div class='page-container accessibility-page' data-component='accessibility-section-focus-manager'>
            <nav class='accessibility-skip-nav' aria-label='Skip to accessibility sections'>
                <a href='#accessibility-overview'>Skip to accessibility overview</a>
                <a href='#keyboard'>Skip to keyboard navigation details</a>
                <a href='#assistance'>Skip to assistance instructions</a>
            </nav>

            <header class='page-header accessibility-header' data-component='accessibility-title-header'>
                <h1 id='accessibility-page-title' class='page-title' data-populate='page-title' tabindex='-1'></h1>
                <p id='accessibility-intro' class='page-subtitle' data-populate='accessibility-intro'></p>
            </header>

            <section id='accessibility-overview' class='accessibility-overview' aria-label='Accessibility statement overview' data-component='accessibility-statement-content'>
                <p id='accessibility-description' class='accessibility-description' data-populate='accessibility-description'></p>

                <section id='keyboard' class='accessibility-subsection accessibility-subsection-keyboard' aria-labelledby='keyboard-heading'>
                    <h2 id='keyboard-heading' class='section-heading' data-populate='keyboard-heading'></h2>
                    <p class='section-body' data-populate='keyboard-body'></p>
                </section>

                <section id='language_support' class='accessibility-subsection accessibility-subsection-language' aria-labelledby='language-support-heading'>
                    <h2 id='language-support-heading' class='section-heading' data-populate='language-support-heading'></h2>
                    <p class='section-body' data-populate='language-support-body'></p>
                </section>
            </section>

            <div class='content-layout accessibility-main-row'>
                <section id='assistance' class='content-primary accessibility-assistance-instructions' aria-labelledby='assistance-heading' data-component='accessibility-assistance-instructions'>
                    <h2 id='assistance-heading' class='section-heading' data-populate='assistance-heading'></h2>
                    <p class='section-body' data-populate='assistance-body'></p>
                    <p class='section-body' data-populate='assistance-alt-channels'></p>
                </section>

                <aside class='content-secondary accessibility-nav-links' aria-label='Accessibility related navigation'>
                    <ul class='secondary-list'>
                        <li>
                            <a href='javascript:void(0)' id='back-to-notice-link' data-component='back-to-notice-link' data-action='back-to-notice'></a>
                        </li>
                        <li>
                            <a href='javascript:void(0)' id='accessibility-help-center-link' data-component='accessibility-help-center-link' data-action='accessibility-help-center'></a>
                        </li>
                    </ul>
                </aside>
            </div>

            <hr class='section-divider'>

            <div id='language-context-indicator' class='language-context-indicator' data-component='language-context-indicator' data-populate='language-context-indicator' aria-live='polite'></div>
        </div>

        <div class='accessibility-page-loader' data-component='accessibility-page-loader' role='status' aria-live='polite'>
            <div class='accessibility-page-loader-inner'>
                <span data-populate='loader-label'></span>
            </div>
        </div>
    </main>

    <hr class='footer-divider'>

    <footer class='site-footer'>
        <div class='page-container'>
            <nav class='footer-nav' aria-label='Footer'>
                <span class='footer-item'><a href='about.html'>About</a></span>
                <span class='footer-separator' aria-hidden='true'>&bull;</span>
                <span class='footer-item'><a href='privacy.html'>Privacy</a></span>
                <span class='footer-separator' aria-hidden='true'>&bull;</span>
                <span class='footer-item'><a href='terms.html'>Terms</a></span>
                <span class='footer-separator' aria-hidden='true'>&bull;</span>
                <span class='footer-item'><a href='accessibility.html'>Accessibility</a></span>
                <span class='footer-separator' aria-hidden='true'>&bull;</span>
                <span class='footer-item'><a href='help_center.html'>Help Center</a></span>
            </nav>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var langParam = urlParams.get('lang');
        var sectionParam = urlParams.get('section');
        var hashFragment = window.location.hash ? window.location.hash.substring(1) : null;
        var initialTargetSectionId = sectionParam || hashFragment || null;

        var supportedLanguages = ['english', 'espanol'];
        var uiPreferences = null;
        var accessibilityPage = null;
        var noticePage = null;
        var effectiveLanguage = 'english';
        var langParamWasValid = false;

        var loaderElement = document.querySelector('[data-component="accessibility-page-loader"]');

        function showLoader() {
            if (!loaderElement) return;
            loaderElement.style.display = 'flex';
            loaderElement.setAttribute('aria-hidden', 'false');
        }

        function hideLoader() {
            if (!loaderElement) return;
            loaderElement.style.display = 'none';
            loaderElement.setAttribute('aria-hidden', 'true');
        }

        function safeGetUiPreferences() {
            try {
                if (typeof WebsiteSDK !== 'undefined' && WebsiteSDK && typeof WebsiteSDK.getUiPreferences === 'function') {
                    var result = WebsiteSDK.getUiPreferences();
                    if (result && result.preferences) {
                        return result.preferences;
                    }
                }
            } catch (e) {}
            return { language: 'english', current_view: 'notice' };
        }

        function safeGetSitePageByType(pageType) {
            try {
                if (typeof WebsiteSDK !== 'undefined' && WebsiteSDK && typeof WebsiteSDK.getSitePageByType === 'function') {
                    var result = WebsiteSDK.getSitePageByType(pageType);
                    if (result && result.page) {
                        return result.page;
                    }
                }
            } catch (e) {}
            return null;
        }

        var LOCALIZED_STRINGS = {
            english: {
                pageTitleFallback: 'Accessibility',
                accessibilityIntroFallback: 'This page describes how the email protection notice and related pages are designed to be accessible to as many people as possible.',
                accessibilityDescriptionFallback: 'We strive to ensure that the email protection notice, settings, and help experiences are usable with assistive technologies, keyboard-only navigation, and multiple languages.',
                keyboardHeading: 'Keyboard navigation',
                keyboardBody: 'You can navigate all interactive elements on this site using the keyboard. Use the Tab and Shift+Tab keys to move between links and controls, and Enter or Space to activate them. Skip links at the top of this page let you jump directly to key accessibility sections.',
                languageSupportHeading: 'Language support',
                languageSupportBody: 'Content for the email protection notice and help pages is available in multiple languages. Where possible, we automatically select a language based on your preferences, and you may receive a direct link that forces a specific language for this page only.',
                assistanceHeading: 'Request accessibility assistance or report an issue',
                assistanceBody: 'If you experience difficulty reading, navigating, or understanding the email protection notice or any related content, you can request additional assistance or report an accessibility issue. Include as much detail as possible, such as the page you were on, what you were trying to do, and any assistive technology you use.',
                assistanceAltChannels: 'If you cannot use the standard forms or links, you may contact support through any alternative channel provided by your service or account representative and mention that your request relates to an accessibility issue with the email protection notice.',
                backToNoticeLabel: 'Back to email protection notice',
                backToNoticeAriaLabel: 'Return to the email protection notice page in notice view.',
                helpCenterLabel: 'Read more accessibility help',
                helpCenterAriaLabel: 'Open the Help Center with articles related to accessibility.',
                languageContextIndicator: function(langSource, languageValue) {
                    if (langSource === 'url') {
                        return 'Content is shown in ' + languageValue + ' because the URL requested this language for this page.';
                    }
                    return 'Content is shown in ' + languageValue + ' based on your saved preferences.';
                },
                loaderLabel: 'Loading accessibility information␀a0␀a0␀a0',
                navAriaLabel: 'Accessibility related navigation',
                languageName: function(langCode) {
                    if (langCode === 'espanol') return 'Spanish';
                    return 'English';
                }
            },
            espanol: {
                pageTitleFallback: 'Accesibilidad',
                accessibilityIntroFallback: 'Esta p␀e1gina describe c␀f3mo se ha dise␀f1ado el aviso de protecci␀f3n de correo electr␀f3nico y las p␀e1ginas relacionadas para que sean accesibles para el mayor n␀famero posible de personas.',
                accessibilityDescriptionFallback: 'Nuestro objetivo es que el aviso de protecci␀f3n de correo electr␀f3nico, la configuraci␀f3n y las experiencias de ayuda sean utilizables con tecnolog␀edas de asistencia, navegaci␀f3n solo con teclado y en varios idiomas.',
                keyboardHeading: 'Navegaci␀f3n con teclado',
                keyboardBody: 'Puedes navegar por todos los elementos interactivos de este sitio usando el teclado. Utiliza las teclas Tab y Shift+Tab para moverte entre enlaces y controles, y las teclas Enter o Espacio para activarlos. Los enlaces de salto al inicio de esta p␀e1gina te permiten ir directamente a las secciones principales de accesibilidad.',
                languageSupportHeading: 'Compatibilidad con idiomas',
                languageSupportBody: 'El contenido del aviso de protecci␀f3n de correo electr␀f3nico y las p␀e1ginas de ayuda est␀e1 disponible en varios idiomas. Siempre que sea posible, seleccionamos autom␀e1ticamente un idioma seg␀fan tus preferencias, y tambi␀e9n puedes recibir un enlace directo que fuerce un idioma espec␀edfico solo para esta p␀e1gina.',
                assistanceHeading: 'Solicitar ayuda de accesibilidad o informar de un problema',
                assistanceBody: 'Si tienes dificultades para leer, navegar o comprender el aviso de protecci␀f3n de correo electr␀f3nico o cualquier contenido relacionado, puedes solicitar ayuda adicional o informar de un problema de accesibilidad. Incluye toda la informaci␀f3n posible, como la p␀e1gina en la que estabas, lo que intentabas hacer y cualquier tecnolog␀eda de asistencia que utilices.',
                assistanceAltChannels: 'Si no puedes utilizar los formularios o enlaces est␀e1ndar, puedes ponerte en contacto con soporte a trav␀e9s de cualquier canal alternativo que te proporcione tu servicio o representante de cuenta e indicar que tu solicitud est␀e1 relacionada con un problema de accesibilidad del aviso de protecci␀f3n de correo electr␀f3nico.',
                backToNoticeLabel: 'Volver al aviso de protecci␀f3n de correo electr␀f3nico',
                backToNoticeAriaLabel: 'Volver a la p␀e1gina del aviso de protecci␀f3n de correo electr␀f3nico en la vista de aviso.',
                helpCenterLabel: 'Ver m␀e1s ayuda sobre accesibilidad',
                helpCenterAriaLabel: 'Abrir el Centro de ayuda con art␀edculos relacionados con accesibilidad.',
                languageContextIndicator: function(langSource, languageValue) {
                    if (langSource === 'url') {
                        return 'El contenido se muestra en ' + languageValue + ' porque la URL solicit␀f3 este idioma solo para esta p␀e1gina.';
                    }
                    return 'El contenido se muestra en ' + languageValue + ' seg␀fan tus preferencias guardadas.';
                },
                loaderLabel: 'Cargando informaci␀f3n de accesibilidad␀a0␀a0␀a0',
                navAriaLabel: 'Navegaci␀f3n relacionada con accesibilidad',
                languageName: function(langCode) {
                    if (langCode === 'espanol') return 'espa␀f1ol';
                    return 'ingl␀e9s';
                }
            }
        };

        showLoader();

        uiPreferences = safeGetUiPreferences();

        if (uiPreferences && uiPreferences.language && supportedLanguages.indexOf(uiPreferences.language) !== -1) {
            effectiveLanguage = uiPreferences.language;
        }

        if (langParam && supportedLanguages.indexOf(langParam) !== -1) {
            effectiveLanguage = langParam;
            langParamWasValid = true;
        }

        if (effectiveLanguage === 'espanol') {
            document.documentElement.lang = 'es';
        } else {
            document.documentElement.lang = 'en';
        }

        accessibilityPage = safeGetSitePageByType('accessibility');
        noticePage = safeGetSitePageByType('notice');

        function renderPopulateElement(container) {
            var key = container.dataset.populate;
            var langKey = effectiveLanguage && LOCALIZED_STRINGS[effectiveLanguage] ? effectiveLanguage : 'english';
            var strings = LOCALIZED_STRINGS[langKey];

            if (!key) return;

            if (key === 'page-title') {
                var titleText = strings.pageTitleFallback;
                if (accessibilityPage && accessibilityPage.name) {
                    titleText = accessibilityPage.name;
                }
                container.textContent = titleText;
                try {
                    document.title = titleText;
                } catch (e) {}
                return;
            }

            if (key === 'accessibility-intro') {
                var introText = strings.accessibilityIntroFallback;
                container.textContent = introText;
                return;
            }

            if (key === 'accessibility-description') {
                var descText = strings.accessibilityDescriptionFallback;
                if (accessibilityPage && accessibilityPage.description) {
                    descText = accessibilityPage.description;
                }
                container.textContent = descText;
                return;
            }

            if (key === 'keyboard-heading') {
                container.textContent = strings.keyboardHeading;
                return;
            }

            if (key === 'keyboard-body') {
                container.textContent = strings.keyboardBody;
                return;
            }

            if (key === 'language-support-heading') {
                container.textContent = strings.languageSupportHeading;
                return;
            }

            if (key === 'language-support-body') {
                container.textContent = strings.languageSupportBody;
                return;
            }

            if (key === 'assistance-heading') {
                container.textContent = strings.assistanceHeading;
                return;
            }

            if (key === 'assistance-body') {
                container.textContent = strings.assistanceBody;
                return;
            }

            if (key === 'assistance-alt-channels') {
                container.textContent = strings.assistanceAltChannels;
                return;
            }

            if (key === 'language-context-indicator') {
                var langName = strings.languageName(effectiveLanguage);
                var langSource = langParamWasValid ? 'url' : 'preferences';
                var message = strings.languageContextIndicator(langSource, langName);
                container.textContent = message;
                return;
            }

            if (key === 'loader-label') {
                container.textContent = strings.loaderLabel;
                return;
            }
        }

        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
            renderPopulateElement(element);
        });

        var navAside = document.querySelector('.accessibility-nav-links');
        if (navAside) {
            var langKeyNav = effectiveLanguage && LOCALIZED_STRINGS[effectiveLanguage] ? effectiveLanguage : 'english';
            var navStrings = LOCALIZED_STRINGS[langKeyNav];
            navAside.setAttribute('aria-label', navStrings.navAriaLabel);
        }

        var backLink = document.getElementById('back-to-notice-link');
        if (backLink) {
            var langKeyBack = effectiveLanguage && LOCALIZED_STRINGS[effectiveLanguage] ? effectiveLanguage : 'english';
            var backStrings = LOCALIZED_STRINGS[langKeyBack];
            var backLabel = backStrings.backToNoticeLabel;
            if (noticePage && noticePage.name) {
                backLabel = backStrings.backToNoticeLabel;
            }
            backLink.textContent = backLabel;
            backLink.setAttribute('aria-label', backStrings.backToNoticeAriaLabel);
        }

        var helpLink = document.getElementById('accessibility-help-center-link');
        if (helpLink) {
            var langKeyHelp = effectiveLanguage && LOCALIZED_STRINGS[effectiveLanguage] ? effectiveLanguage : 'english';
            var helpStrings = LOCALIZED_STRINGS[langKeyHelp];
            helpLink.textContent = helpStrings.helpCenterLabel;
            helpLink.setAttribute('aria-label', helpStrings.helpCenterAriaLabel);
        }

        function buildNoticeUrl() {
            var base = 'index.html?view=notice';
            if (langParamWasValid) {
                base = base + '&lang=' + encodeURIComponent(effectiveLanguage);
            }
            return base;
        }

        function buildHelpCenterUrl() {
            var base = 'help_center.html?query=accessibility';
            if (langParamWasValid) {
                base = base + '&lang=' + encodeURIComponent(effectiveLanguage);
            }
            return base;
        }

        function handleBackToNoticeActivation(event) {
            if (event) {
                event.preventDefault();
            }
            var targetUrl = buildNoticeUrl();
            window.location.href = targetUrl;
        }

        function handleHelpCenterActivation(event) {
            if (event) {
                event.preventDefault();
            }
            var targetUrl = buildHelpCenterUrl();
            window.location.href = targetUrl;
        }

        var actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(element) {
            var action = element.dataset.action;
            if (!action) return;

            if (action === 'back-to-notice') {
                element.addEventListener('click', function(event) {
                    handleBackToNoticeActivation(event);
                });
                element.addEventListener('keydown', function(event) {
                    if (event.key === ' ' || event.key === 'Spacebar') {
                        event.preventDefault();
                        handleBackToNoticeActivation(event);
                    }
                });
            } else if (action === 'accessibility-help-center') {
                element.addEventListener('click', function(event) {
                    handleHelpCenterActivation(event);
                });
                element.addEventListener('keydown', function(event) {
                    if (event.key === ' ' || event.key === 'Spacebar') {
                        event.preventDefault();
                        handleHelpCenterActivation(event);
                    }
                });
            }
        });

        function focusSectionById(sectionId) {
            if (!sectionId) return;
            var sectionElement = document.getElementById(sectionId);
            if (!sectionElement) return;

            var heading = sectionElement.querySelector('h1, h2, h3, h4, h5, h6');
            if (heading) {
                if (!heading.hasAttribute('tabindex')) {
                    heading.setAttribute('tabindex', '-1');
                }
                heading.focus();
                heading.scrollIntoView({ block: 'start', behavior: 'smooth' });
            } else {
                if (!sectionElement.hasAttribute('tabindex')) {
                    sectionElement.setAttribute('tabindex', '-1');
                }
                sectionElement.focus();
                sectionElement.scrollIntoView({ block: 'start', behavior: 'smooth' });
            }
        }

        function initialFocusManagement() {
            if (initialTargetSectionId) {
                focusSectionById(initialTargetSectionId);
                return;
            }
            var pageTitleEl = document.getElementById('accessibility-page-title');
            if (pageTitleEl) {
                pageTitleEl.focus();
            }
        }

        function handleUrlChange() {
            var params = new URLSearchParams(window.location.search);
            var sectionFromParams = params.get('section');
            var hashId = window.location.hash ? window.location.hash.substring(1) : null;
            var targetId = sectionFromParams || hashId;
            if (targetId) {
                focusSectionById(targetId);
            }
        }

        window.addEventListener('hashchange', function() {
            handleUrlChange();
        });
        window.addEventListener('popstate', function() {
            handleUrlChange();
        });

        hideLoader();
        initialFocusManagement();
    });
    </script>
</body>
</html>
