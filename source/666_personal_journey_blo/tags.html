<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Electric Car Expedition</title>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='tags.css'>
</head>
<body>
    <div class='page-wrapper'>
        <header class='site-header'>
            <div class='top-nav' role='navigation' aria-label='Primary'>
                <a href='index.html' title='Homepage with featured trips and quick access to main sections'>Home</a>
                <span class='nav-separator'>|</span>
                <a href='trip_log.html' title='Browse and filter multi-day trip entries'>Trip Log</a>
                <span class='nav-separator'>|</span>
                <a href='daily_logs.html' title='Browse and filter individual daily driving logs'>Daily Logs</a>
                <span class='nav-separator'>|</span>
                <a href='charging_map.html' title='Plan routes and find chargers on an interactive map'>Charging Map</a>
                <span class='nav-separator'>|</span>
                <a href='collections.html' title='View and manage itineraries and saved collections'>Collections</a>
                <span class='nav-separator'>|</span>
                <a href='collections.html?action=create_itinerary' title='Open the itinerary creation form to start a new itinerary'>Create Itinerary</a>
                <span class='nav-separator'>|</span>
                <a href='tags.html' title='Browse trips by themes and tags such as Winter Efficiency'>Themes</a>
                <span class='nav-separator'>|</span>
                <a href='search.html' title='Search all trips and logs with advanced filters'>Search</a>
            </div>

            <div class='hero'>
                <a href='index.html' class='hero-link'>
                    <img src='assets/hero-electric-car.jpg' alt='Electric car expedition hero graphic' class='hero-image'>
                </a>
            </div>
        </header>

        <main id='content' class='site-content' role='main'>
            <div class='content-column tags-page' aria-labelledby='tags-page-title'>
                <h1 id='tags-page-title'>Tags</h1>

                <section class='tag-search-section' data-component='tag-search-form'>
                    <form id='tagSearchForm' class='tag-search-form' data-action='tag-search-form' role='search' aria-label='Filter tags by name or description'>
                        <label for='tagSearchInput'>Search tags:</label>
                        <input type='search' id='tagSearchInput' name='search_query'>
                        <button type='submit'>Apply</button>
                        <button type='button' data-action='clear-search' id='clearSearchButton'>Clear</button>
                    </form>
                </section>

                <section class='tag-list-summary-section' data-component='tag-list-summary'>
                    <div id='tagListSummary' data-populate='tag-list-summary' aria-live='polite'></div>
                </section>

                <section class='tag-list-section'>
                    <div id='tagListContainer' data-component='tag-list' data-populate='tag-list'></div>
                    <div id='tagEmptyState' data-component='tag-empty-state' data-populate='tag-empty-state' hidden></div>
                </section>
            </div>
        </main>

        <footer class='site-footer'>
            <nav class='footer-nav' aria-label='Footer'>
                <a href='about.html' title='Learn more about the journey blog and its author'>About</a>
                <span class='nav-separator'>|</span>
                <a href='faq.html' title='Read help articles and frequently asked questions'>Help / FAQ</a>
                <span class='nav-separator'>|</span>
                <a href='tags.html' title='Explore all tags and themed collections of trips'>Themes &amp; Tags</a>
                <span class='nav-separator'>|</span>
                <a href='profile.html' title='Adjust personal preferences, charging network, and vehicle settings'>Profile &amp; Vehicle</a>
                <span class='nav-separator'>|</span>
                <a href='trip_notes.html' title='View and manage notes saved for chargers and routes'>Trip Notes</a>
                <span class='nav-separator'>|</span>
                <a href='reading_lists.html' title='Access and manage saved reading lists for later'>Reading Lists</a>
            </nav>
        </footer>
    </div>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var searchQueryParam = urlParams.get('search_query') || '';
        var state = {
            searchQuery: searchQueryParam,
            tags: [],
            loadError: false
        };

        var searchForm = document.getElementById('tagSearchForm');
        var searchInput = document.getElementById('tagSearchInput');

        if (searchInput) {
            searchInput.value = state.searchQuery;
        }

        var clearButtons = document.querySelectorAll('[data-action=clear-search]');

        function updateClearButtons() {
            var hasSearch = state.searchQuery && state.searchQuery.trim().length > 0;
            clearButtons.forEach(function(button) {
                if (hasSearch) {
                    button.disabled = false;
                    button.style.visibility = '';
                } else {
                    button.disabled = true;
                    button.style.visibility = 'hidden';
                }
            });
        }

        updateClearButtons();

        if (searchForm) {
            searchForm.addEventListener('submit', function(event) {
                event.preventDefault();
                var value = searchInput ? searchInput.value.trim() : '';
                var baseUrl = 'tags.html';
                if (value) {
                    window.location.href = baseUrl + '?search_query=' + encodeURIComponent(value);
                } else {
                    window.location.href = baseUrl;
                }
            });
        }

        clearButtons.forEach(function(button) {
            button.addEventListener('click', function() {
                window.location.href = 'tags.html';
            });
        });

        var result;
        try {
            result = WebsiteSDK.getTagList(state.searchQuery || '');
        } catch (error) {
            console.error('Failed to load tags', error);
            state.loadError = true;
            result = { tags: [] };
        }

        if (result && Array.isArray(result.tags)) {
            state.tags = result.tags;
        } else {
            state.tags = [];
        }

        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
            var dataType = element.dataset.populate;
            if (dataType === 'tag-list') {
                renderTagList(element, state.tags);
            } else if (dataType === 'tag-list-summary') {
                renderTagListSummary(element, state.tags, state.searchQuery);
            } else if (dataType === 'tag-empty-state') {
                renderTagEmptyState(element, state.tags, state.searchQuery, state.loadError);
            }
        });

        var listContainer = document.getElementById('tagListContainer');
        if (listContainer) {
            listContainer.addEventListener('click', function(event) {
                var target = event.target || event.srcElement;
                if (!target) {
                    return;
                }
                var actionElement = target;
                while (actionElement && actionElement !== listContainer) {
                    if (actionElement.dataset && actionElement.dataset.action === 'open-tag') {
                        break;
                    }
                    actionElement = actionElement.parentNode;
                }
                if (!actionElement || actionElement === listContainer) {
                    return;
                }
                var slug = actionElement.getAttribute('data-tag-slug');
                if (slug) {
                    window.location.href = 'tag_detail.html?tagSlug=' + encodeURIComponent(slug);
                }
            });
        }

        function renderTagList(container, tags) {
            if (!container) {
                return;
            }
            if (!Array.isArray(tags) || tags.length === 0) {
                container.innerHTML = '';
                container.hidden = true;
                return;
            }
            container.hidden = false;

            var html = '';
            html += '<table class=tag-table>';
            html += '<thead>';
            html += '<tr>';
            html += '<th scope=col>Tag</th>';
            html += '<th scope=col>Description</th>';
            html += '<th scope=col>Posts</th>';
            html += '</tr>';
            html += '</thead>';
            html += '<tbody>';

            tags.forEach(function(item) {
                if (!item || !item.tag) {
                    return;
                }
                var name = escapeHtml(String(item.tag.name || ''));
                var slug = item.tag.slug ? String(item.tag.slug) : '';
                var description = item.tag.description ? escapeHtml(String(item.tag.description)) : '';
                var count = typeof item.post_count === 'number' ? item.post_count : 0;
                var countText = String(count);
                var slugAttr = slug ? ' data-tag-slug=' + encodeHtmlAttribute(slug) : '';

                html += '<tr class=tag-row data-action=open-tag' + slugAttr + '>';
                html += '<td class=tag-name-cell>';
                html += '<a href=javascript:void(0) data-action=open-tag' + slugAttr + '>' + name + '</a>';
                html += '</td>';
                html += '<td class=tag-description-cell>';
                if (description) {
                    html += description;
                } else {
                    html += '<span class=tag-description-empty>No description</span>';
                }
                html += '</td>';
                html += '<td class=tag-post-count-cell>' + countText + '</td>';
                html += '</tr>';
            });

            html += '</tbody>';
            html += '</table>';

            container.innerHTML = html;
        }

        function renderTagListSummary(container, tags, searchQuery) {
            if (!container) {
                return;
            }
            var total = Array.isArray(tags) ? tags.length : 0;
            var query = searchQuery ? searchQuery.trim() : '';
            var summary = '';
            if (total === 0) {
                summary = 'Showing 0 tags';
            } else if (total === 1) {
                summary = 'Showing 1 tag';
            } else {
                summary = 'Showing ' + total + ' tags';
            }
            if (query) {
                summary += ' matching &quot;' + escapeHtml(query) + '&quot;';
            }
            container.innerHTML = '';
            container.appendChild(document.createTextNode(summary));
        }

        function renderTagEmptyState(container, tags, searchQuery, loadError) {
            if (!container) {
                return;
            }
            var hasTags = Array.isArray(tags) && tags.length > 0;
            if (hasTags) {
                container.innerHTML = '';
                container.hidden = true;
                return;
            }

            container.hidden = false;

            var query = searchQuery ? searchQuery.trim() : '';
            var title = '';
            var bodyText = '';

            if (loadError) {
                title = 'Tags could not be loaded';
                bodyText = 'There was a problem loading tags. Please try reloading the page in a moment.';
            } else if (query) {
                title = 'No tags match your search';
                bodyText = 'No tags match &quot;' + escapeHtml(query) + '&quot;. Try a different keyword or clear the search filter to see all tags.';
            } else {
                title = 'No tags available yet';
                bodyText = 'There are no tags to display yet. Tags will appear here once trips or daily logs have been tagged.';
            }

            var html = '';
            html += '<div class=tag-empty-message>';
            html += '<h2>' + title + '</h2>';
            html += '<p>' + bodyText + '</p>';
            html += '<p><button type=button data-action=clear-search>Clear search filter</button></p>';
            html += '</div>';

            container.innerHTML = html;

            var innerClearButtons = container.querySelectorAll('[data-action=clear-search]');
            innerClearButtons.forEach(function(button) {
                button.addEventListener('click', function() {
                    window.location.href = 'tags.html';
                });
            });
        }

        function escapeHtml(value) {
            if (value == null) {
                return '';
            }
            return String(value).replace(/[&<>']/g, function(ch) {
                switch (ch) {
                    case '&':
                        return '&amp;';
                    case '<':
                        return '&lt;';
                    case '>':
                        return '&gt;';
                    case '\'':
                        return '&#39;';
                    default:
                        return ch;
                }
            });
        }

        function encodeHtmlAttribute(value) {
            return escapeHtml(value);
        }
    });
    </script>
</body>
</html>
