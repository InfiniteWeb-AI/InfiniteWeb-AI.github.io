<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Car Expedition</title>
    
    <link rel="stylesheet" href="charging_map.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="top-nav" role="navigation" aria-label="Primary">
                <a href="index.html" title="Homepage with featured trips and quick access to main sections">Home</a>
                <span class="nav-separator">|</span>
                <a href="trip_log.html" title="Browse and filter multi-day trip entries">Trip Log</a>
                <span class="nav-separator">|</span>
                <a href="daily_logs.html" title="Browse and filter individual daily driving logs">Daily Logs</a>
                <span class="nav-separator">|</span>
                <a href="charging_map.html" title="Plan routes and find chargers on an interactive map">Charging Map</a>
                <span class="nav-separator">|</span>
                <a href="collections.html" title="View and manage itineraries and saved collections">Collections</a>
                <span class="nav-separator">|</span>
                <a href="collections.html?action=create_itinerary" title="Open the itinerary creation form to start a new itinerary">Create Itinerary</a>
                <span class="nav-separator">|</span>
                <a href="tags.html" title="Browse trips by themes and tags such as Winter Efficiency">Themes</a>
                <span class="nav-separator">|</span>
                <a href="search.html" title="Search all trips and logs with advanced filters">Search</a>
            </div>

            <div class="hero">
                <a href="index.html" class="hero-link">
                    <img src="assets/hero-electric-car.jpg" alt="Electric car expedition hero graphic" class="hero-image">
                </a>
            </div>
        </header>

        <main id="content" class="site-content" role="main">
            <div class="charging-map-page">
                <!-- Route Planner Form -->
                <section class="route-planner-section" data-component="route-planner-form">
                    <form id="routePlannerForm" class="route-planner-form" data-action="submit-route-plan">
                        <div class="form-row">
                            <label for="originInput">Origin</label>
                            <input type="text" id="originInput" name="origin_name" required>
                        </div>
                        <div class="form-row">
                            <label for="destinationInput">Destination</label>
                            <input type="text" id="destinationInput" name="destination_name" required>
                        </div>
                        <div class="form-row form-row-actions">
                            <button type="submit" id="planRouteButton">Plan Route</button>
                            <button type="button" id="editRouteButton" data-action="enable-route-edit" style="display:none;">Change Route</button>
                        </div>
                        <p id="routePlannerMessage" class="form-message" aria-live="polite"></p>
                        <p id="routeSummary" class="route-summary" data-populate="route-summary"></p>
                    </form>
                </section>

                <!-- Charger Filter Panel -->
                <section class="charger-filter-panel" data-component="charger-filter-panel">
                    <h2 class="section-title">Charger Filters</h2>
                    <div class="filter-group">
                        <label for="minPowerInput">Minimum power (kW)</label>
                        <input type="number" id="minPowerInput" name="min_power_kw" min="0" step="1">
                    </div>
                    <fieldset class="filter-group">
                        <legend>Charger types</legend>
                        <label>
                            <input type="checkbox" value="ac" data-action="toggle-charger-type"> AC
                        </label>
                        <br>
                        <label>
                            <input type="checkbox" value="dc_fast" data-action="toggle-charger-type"> DC fast
                        </label>
                        <br>
                        <label>
                            <input type="checkbox" value="dc_ultra" data-action="toggle-charger-type"> DC ultra
                        </label>
                        <br>
                        <label>
                            <input type="checkbox" value="destination" data-action="toggle-charger-type"> Destination
                        </label>
                    </fieldset>
                    <div class="filter-actions">
                        <button type="button" data-action="apply-filters">Apply Filters</button>
                        <span id="filterStatus" class="filter-status" aria-live="polite"></span>
                    </div>
                </section>

                <!-- Charging Map Display -->
                <section class="charging-map-display" data-component="charging-map-display">
                    <h2 class="section-title">Charging Map</h2>
                    <div id="mapArea" class="map-area">
                        <div id="mapContainer" class="map-container" data-populate="chargers-map" aria-label="Chargers along the planned route" role="region"></div>
                        <div id="chargerPopup" class="charger-popup" data-component="charger-popup" style="display:none;"></div>
                    </div>
                    <div id="chargerListContainer" class="charger-list-container" data-populate="chargers-list"></div>
                </section>

                <!-- Trip Notes Preview Panel -->
                <section class="trip-notes-preview-panel" data-component="trip-notes-preview-panel">
                    <div class="trip-notes-header">
                        <h2 class="section-title">Trip Notes</h2>
                        <a href="javascript:void(0)" class="open-trip-notes-link" data-component="open-trip-notes-link" data-action="open-trip-notes">Open Trip Notes</a>
                    </div>
                    <div id="tripNotesSummary" class="trip-notes-summary" data-populate="trip-notes-summary"></div>
                </section>
            </div>
        </main>

        <footer class="site-footer">
            <nav class="footer-nav" aria-label="Footer">
                <a href="about.html" title="Learn more about the journey blog and its author">About</a>
                <span class="nav-separator">|</span>
                <a href="faq.html" title="Read help articles and frequently asked questions">Help / FAQ</a>
                <span class="nav-separator">|</span>
                <a href="tags.html" title="Explore all tags and themed collections of trips">Themes &amp; Tags</a>
                <span class="nav-separator">|</span>
                <a href="profile.html" title="Adjust personal preferences, charging network, and vehicle settings">Profile &amp; Vehicle</a>
                <span class="nav-separator">|</span>
                <a href="trip_notes.html" title="View and manage notes saved for chargers and routes">Trip Notes</a>
                <span class="nav-separator">|</span>
                <a href="reading_lists.html" title="Access and manage saved reading lists for later">Reading Lists</a>
            </nav>
        </footer>
    </div>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // ----- State -----
        const pageState = {
            routePlanId: null,
            routePlan: null,
            chargersAlongRoute: [],
            filters: {
                min_power_kw: null,
                charger_types: []
            },
            tripNotesOverview: [],
            selectedChargerId: null,
            routeFormLocked: false
        };

        // ----- DOM References -----
        const routePlannerForm = document.getElementById('routePlannerForm');
        const originInput = document.getElementById('originInput');
        const destinationInput = document.getElementById('destinationInput');
        const planRouteButton = document.getElementById('planRouteButton');
        const editRouteButton = document.getElementById('editRouteButton');
        const routePlannerMessage = document.getElementById('routePlannerMessage');
        const minPowerInput = document.getElementById('minPowerInput');
        const filterStatus = document.getElementById('filterStatus');
        const chargerPopup = document.getElementById('chargerPopup');

        // ----- URL Helpers -----
        function getUrlParams() {
            return new URLSearchParams(window.location.search);
        }

        function updateUrlParams(updates) {
            const params = getUrlParams();
            if ('origin' in updates) {
                if (updates.origin) {
                    params.set('origin', updates.origin);
                } else {
                    params.delete('origin');
                }
            }
            if ('destination' in updates) {
                if (updates.destination) {
                    params.set('destination', updates.destination);
                } else {
                    params.delete('destination');
                }
            }
            if ('routePlanId' in updates) {
                if (updates.routePlanId) {
                    params.set('routePlanId', updates.routePlanId);
                } else {
                    params.delete('routePlanId');
                }
            }
            if ('minPower' in updates) {
                if (updates.minPower != null && updates.minPower !== '') {
                    params.set('minPower', String(updates.minPower));
                } else {
                    params.delete('minPower');
                }
            }
            if ('types' in updates) {
                if (updates.types && updates.types.length) {
                    params.set('types', updates.types.join(','));
                } else {
                    params.delete('types');
                }
            }
            const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
            window.history.replaceState({}, '', newUrl);
        }

        // ----- Rendering Helpers -----
        function getChargersWithNotesSet() {
            const set = new Set();
            const currentId = pageState.routePlanId;
            if (!currentId) return set;
            (pageState.tripNotesOverview || []).forEach(item => {
                if (item && item.trip_note && item.trip_note.route_plan_id === currentId && item.trip_note.charger_id) {
                    set.add(item.trip_note.charger_id);
                }
            });
            return set;
        }

        function renderRouteSummary(container) {
            container.innerHTML = '';
            if (!pageState.routePlan || !pageState.routePlan.origin_name || !pageState.routePlan.destination_name) {
                return;
            }
            const distance = pageState.routePlan.distance_km;
            const timeHours = pageState.routePlan.estimated_time_hours;
            const textParts = [];
            textParts.push(pageState.routePlan.origin_name + ' \u2192 ' + pageState.routePlan.destination_name);
            if (typeof distance === 'number') {
                textParts.push(distance.toFixed(0) + ' km');
            }
            if (typeof timeHours === 'number') {
                textParts.push(timeHours.toFixed(1) + ' h');
            }
            container.textContent = textParts.join(' \u00b7 ');
        }

        function renderMap(container) {
            container.innerHTML = '';
            container.className = 'map-container';

            if (!pageState.routePlanId) {
                const p = document.createElement('p');
                p.textContent = 'Plan a route above to see chargers on the map.';
                container.appendChild(p);
                return;
            }

            if (!pageState.chargersAlongRoute || pageState.chargersAlongRoute.length === 0) {
                const p = document.createElement('p');
                p.textContent = 'No chargers match the current filters along this route.';
                container.appendChild(p);
                return;
            }

            const mapInner = document.createElement('div');
            mapInner.className = 'map-inner';

            const chargers = pageState.chargersAlongRoute;
            let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
            chargers.forEach(item => {
                if (!item || !item.charger) return;
                const c = item.charger;
                if (typeof c.latitude === 'number') {
                    if (c.latitude < minLat) minLat = c.latitude;
                    if (c.latitude > maxLat) maxLat = c.latitude;
                }
                if (typeof c.longitude === 'number') {
                    if (c.longitude < minLon) minLon = c.longitude;
                    if (c.longitude > maxLon) maxLon = c.longitude;
                }
            });
            if (!isFinite(minLat) || !isFinite(maxLat) || !isFinite(minLon) || !isFinite(maxLon)) {
                // Fallback: simple list, no positioning
                const listFallback = document.createElement('p');
                listFallback.textContent = 'Chargers loaded, but positions are not available.';
                container.appendChild(listFallback);
                return;
            }

            const latRange = maxLat - minLat || 1;
            const lonRange = maxLon - minLon || 1;
            const chargersWithNotes = getChargersWithNotesSet();

            chargers.forEach(item => {
                if (!item || !item.charger) return;
                const c = item.charger;
                const marker = document.createElement('button');
                marker.type = 'button';
                marker.className = 'map-marker';
                if (chargersWithNotes.has(c.id)) {
                    marker.className += ' has-note';
                }
                const latNorm = (c.latitude - minLat) / latRange;
                const lonNorm = (c.longitude - minLon) / lonRange;
                const topPercent = 100 - latNorm * 100;
                const leftPercent = lonNorm * 100;
                marker.style.top = topPercent + '%';
                marker.style.left = leftPercent + '%';
                marker.dataset.action = 'select-charger';
                marker.dataset.chargerId = c.id;
                marker.title = (c.name || 'Charger') + (chargersWithNotes.has(c.id) ? ' (has notes)' : '');
                marker.textContent = item.sequence_along_route != null ? String(item.sequence_along_route) : '*';
                mapInner.appendChild(marker);
            });

            container.appendChild(mapInner);

            const legend = document.createElement('p');
            legend.className = 'map-legend';
            legend.textContent = 'Markers are ordered along the route from origin; highlighted markers have notes.';
            container.appendChild(legend);
        }

        function renderChargerList(container) {
            container.innerHTML = '';
            if (!pageState.routePlanId) {
                return;
            }
            const chargers = pageState.chargersAlongRoute || [];
            if (!chargers.length) {
                const p = document.createElement('p');
                p.textContent = 'No chargers to list for this route.';
                container.appendChild(p);
                return;
            }

            const table = document.createElement('table');
            table.className = 'charger-table';
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            ['#', 'Charger', 'Power (kW)', 'Type', 'Distance from origin (km)'].forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            const chargersWithNotes = getChargersWithNotesSet();
            chargers.forEach(item => {
                if (!item || !item.charger) return;
                const c = item.charger;
                const tr = document.createElement('tr');
                if (chargersWithNotes.has(c.id)) {
                    tr.className = 'charger-has-note-row';
                }
                const seqTd = document.createElement('td');
                seqTd.textContent = item.sequence_along_route != null ? String(item.sequence_along_route) : '';
                tr.appendChild(seqTd);

                const nameTd = document.createElement('td');
                const link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.dataset.action = 'select-charger';
                link.dataset.chargerId = c.id;
                link.textContent = c.name || c.address || 'Charger';
                if (chargersWithNotes.has(c.id)) {
                    const noteSpan = document.createElement('span');
                    noteSpan.className = 'has-note-indicator';
                    noteSpan.textContent = ' *';
                    link.appendChild(noteSpan);
                }
                nameTd.appendChild(link);
                tr.appendChild(nameTd);

                const powerTd = document.createElement('td');
                powerTd.textContent = typeof c.max_power_kw === 'number' ? c.max_power_kw.toFixed(0) : '';
                tr.appendChild(powerTd);

                const typeTd = document.createElement('td');
                typeTd.textContent = c.charger_type || '';
                tr.appendChild(typeTd);

                const distTd = document.createElement('td');
                distTd.textContent = typeof item.distance_from_origin_km === 'number' ? item.distance_from_origin_km.toFixed(1) : '';
                tr.appendChild(distTd);

                tbody.appendChild(tr);
            });

            table.appendChild(tbody);
            container.appendChild(table);
        }

        function renderTripNotesSummary(container) {
            container.innerHTML = '';
            if (!pageState.routePlanId) {
                const p = document.createElement('p');
                p.textContent = 'Plan a route to start attaching notes to chargers.';
                container.appendChild(p);
                return;
            }

            const notes = (pageState.tripNotesOverview || []).filter(item => {
                return item && item.trip_note && item.trip_note.route_plan_id === pageState.routePlanId;
            });

            if (!notes.length) {
                const p = document.createElement('p');
                p.textContent = 'No notes for this route yet. Click a charger on the map to add one.';
                container.appendChild(p);
                return;
            }

            const table = document.createElement('table');
            table.className = 'trip-notes-table';
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            ['Charger', 'Note'].forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            notes.forEach(item => {
                const tr = document.createElement('tr');
                tr.dataset.action = 'focus-charger-from-note';
                if (item.charger && item.charger.id) {
                    tr.dataset.chargerId = item.charger.id;
                }

                const chargerTd = document.createElement('td');
                chargerTd.textContent = (item.charger && (item.charger.name || item.charger.address)) || 'Charger';
                tr.appendChild(chargerTd);

                const noteTd = document.createElement('td');
                const noteText = (item.trip_note && item.trip_note.note_text) || '';
                const short = noteText.length > 120 ? noteText.slice(0, 117) + '...' : noteText;
                noteTd.textContent = short;
                tr.appendChild(noteTd);

                tbody.appendChild(tr);
            });

            table.appendChild(tbody);
            container.appendChild(table);
        }

        function renderChargerPopup() {
            if (!chargerPopup) return;
            chargerPopup.innerHTML = '';
            if (!pageState.selectedChargerId) {
                chargerPopup.style.display = 'none';
                return;
            }
            const chargerItem = (pageState.chargersAlongRoute || []).find(item => item && item.charger && item.charger.id === pageState.selectedChargerId);
            if (!chargerItem || !chargerItem.charger) {
                chargerPopup.style.display = 'none';
                return;
            }
            const c = chargerItem.charger;

            const wrapper = document.createElement('div');
            wrapper.className = 'charger-popup-inner';

            const header = document.createElement('div');
            header.className = 'charger-popup-header';
            const title = document.createElement('strong');
            title.textContent = c.name || c.address || 'Charger';
            header.appendChild(title);

            const closeLink = document.createElement('a');
            closeLink.href = 'javascript:void(0)';
            closeLink.textContent = 'Close';
            closeLink.className = 'popup-close-link';
            closeLink.dataset.action = 'close-charger-popup';
            header.appendChild(closeLink);

            wrapper.appendChild(header);

            const details = document.createElement('div');
            details.className = 'charger-popup-details';
            const lines = [];
            if (c.location_description) lines.push(c.location_description);
            if (c.city) lines.push(c.city);
            if (typeof c.max_power_kw === 'number') lines.push('Max ' + c.max_power_kw.toFixed(0) + ' kW');
            if (c.charger_type) lines.push('Type: ' + c.charger_type);
            details.textContent = lines.join(' | ');
            wrapper.appendChild(details);

            const noteForm = document.createElement('form');
            noteForm.className = 'charger-note-form';
            noteForm.dataset.action = 'submit-charger-note';
            noteForm.dataset.chargerId = c.id;

            const noteLabel = document.createElement('label');
            noteLabel.setAttribute('for', 'chargerNoteText');
            noteLabel.textContent = 'Add note for this charger:';
            noteForm.appendChild(noteLabel);

            const textarea = document.createElement('textarea');
            textarea.id = 'chargerNoteText';
            textarea.name = 'note_text';
            textarea.rows = 3;
            noteForm.appendChild(textarea);

            const submitRow = document.createElement('div');
            submitRow.className = 'note-form-actions';

            const submitBtn = document.createElement('button');
            submitBtn.type = 'submit';
            submitBtn.textContent = 'Save Note';
            submitRow.appendChild(submitBtn);

            const statusSpan = document.createElement('span');
            statusSpan.id = 'chargerNoteStatus';
            statusSpan.className = 'note-status';
            statusSpan.setAttribute('aria-live', 'polite');
            submitRow.appendChild(statusSpan);

            noteForm.appendChild(submitRow);
            wrapper.appendChild(noteForm);

            chargerPopup.appendChild(wrapper);
            chargerPopup.style.display = 'block';
        }

        function renderAllPopulate() {
            const elements = document.querySelectorAll('[data-populate]');
            elements.forEach(function(element) {
                const type = element.dataset.populate;
                if (type === 'chargers-map') {
                    renderMap(element);
                } else if (type === 'chargers-list') {
                    renderChargerList(element);
                } else if (type === 'trip-notes-summary') {
                    renderTripNotesSummary(element);
                } else if (type === 'route-summary') {
                    renderRouteSummary(element);
                }
            });
            renderChargerPopup();
        }

        function updateRouteFormLockUI() {
            if (!routePlannerForm) return;
            if (pageState.routeFormLocked) {
                originInput.setAttribute('disabled', 'disabled');
                destinationInput.setAttribute('disabled', 'disabled');
                planRouteButton.setAttribute('disabled', 'disabled');
                editRouteButton.style.display = '';
                routePlannerMessage.textContent = 'Loaded existing route. Click "Change Route" to plan a different one.';
            } else {
                originInput.removeAttribute('disabled');
                destinationInput.removeAttribute('disabled');
                planRouteButton.removeAttribute('disabled');
                editRouteButton.style.display = 'none';
            }
        }

        // ----- Data Loading -----
        function refreshChargers() {
            if (!pageState.routePlanId) {
                pageState.chargersAlongRoute = [];
                renderAllPopulate();
                return;
            }
            try {
                const minPower = pageState.filters.min_power_kw;
                const chargerTypes = pageState.filters.charger_types;
                const result = WebsiteSDK.getChargersAlongRoute(
                    pageState.routePlanId,
                    (typeof minPower === 'number' && !isNaN(minPower)) ? minPower : undefined,
                    (chargerTypes && chargerTypes.length) ? chargerTypes : undefined
                );
                pageState.chargersAlongRoute = Array.isArray(result) ? result : [];
            } catch (e) {
                console.error('Error loading chargers along route', e);
                filterStatus.textContent = 'Failed to load chargers.';
            }
            renderAllPopulate();
        }

        function refreshTripNotesFromServer() {
            if (!pageState.routePlanId) {
                pageState.tripNotesOverview = [];
                renderAllPopulate();
                return;
            }
            try {
                const result = WebsiteSDK.getTripNotesOverview(pageState.routePlanId);
                pageState.tripNotesOverview = (result && Array.isArray(result.trip_notes)) ? result.trip_notes : [];
            } catch (e) {
                console.error('Error loading trip notes overview', e);
            }
            renderAllPopulate();
        }

        function setRoutePlan(route_plan, options) {
            pageState.routePlan = route_plan;
            pageState.routePlanId = route_plan ? route_plan.id : null;
            pageState.selectedChargerId = null;
            pageState.chargersAlongRoute = [];
            pageState.tripNotesOverview = [];

            if (route_plan) {
                originInput.value = route_plan.origin_name || '';
                destinationInput.value = route_plan.destination_name || '';
                updateUrlParams({
                    origin: route_plan.origin_name || '',
                    destination: route_plan.destination_name || '',
                    routePlanId: route_plan.id || ''
                });
            } else {
                originInput.value = '';
                destinationInput.value = '';
                updateUrlParams({ origin: '', destination: '', routePlanId: '' });
            }

            const lock = options && options.lockForm;
            pageState.routeFormLocked = !!lock;
            updateRouteFormLockUI();

            if (route_plan) {
                refreshTripNotesFromServer();
                refreshChargers();
            } else {
                renderAllPopulate();
            }
        }

        function loadExistingRouteFromNotes(routePlanId, initialOrigin, initialDestination) {
            pageState.routePlanId = routePlanId;
            pageState.routeFormLocked = true;
            updateRouteFormLockUI();
            try {
                const result = WebsiteSDK.getTripNotesOverview(routePlanId);
                pageState.tripNotesOverview = (result && Array.isArray(result.trip_notes)) ? result.trip_notes : [];
                let route_plan = null;
                if (pageState.tripNotesOverview.length > 0) {
                    route_plan = pageState.tripNotesOverview[0].route_plan || null;
                }
                if (!route_plan) {
                    route_plan = {
                        id: routePlanId,
                        origin_name: initialOrigin || '',
                        destination_name: initialDestination || ''
                    };
                }
                pageState.routePlan = route_plan;
                originInput.value = route_plan.origin_name || '';
                destinationInput.value = route_plan.destination_name || '';
            } catch (e) {
                console.error('Error loading route from notes', e);
                pageState.routePlan = {
                    id: routePlanId,
                    origin_name: initialOrigin || '',
                    destination_name: initialDestination || ''
                };
                originInput.value = pageState.routePlan.origin_name;
                destinationInput.value = pageState.routePlan.destination_name;
            }
            refreshChargers();
        }

        // ----- Event Handlers -----
        if (routePlannerForm) {
            routePlannerForm.addEventListener('submit', function(event) {
                event.preventDefault();
                if (pageState.routeFormLocked) {
                    return;
                }
                const origin = originInput.value.trim();
                const destination = destinationInput.value.trim();
                if (!origin || !destination) {
                    routePlannerMessage.textContent = 'Please enter both origin and destination.';
                    return;
                }
                try {
                    const result = WebsiteSDK.createRoutePlan(origin, destination);
                    if (result && result.route_plan) {
                        routePlannerMessage.textContent = 'Route planned successfully.';
                        setRoutePlan(result.route_plan, { lockForm: false });
                    } else {
                        routePlannerMessage.textContent = 'Could not create route plan.';
                    }
                } catch (e) {
                    console.error('Error creating route plan', e);
                    routePlannerMessage.textContent = 'Failed to create route plan.';
                }
            });
        }

        if (minPowerInput) {
            minPowerInput.addEventListener('change', function() {
                const value = minPowerInput.value;
                if (value === '') {
                    pageState.filters.min_power_kw = null;
                } else {
                    const num = Number(value);
                    pageState.filters.min_power_kw = isNaN(num) ? null : num;
                }
            });
        }

        document.addEventListener('click', function(event) {
            const target = event.target.closest('[data-action]');
            if (!target) return;
            const action = target.dataset.action;

            if (action === 'toggle-charger-type') {
                const type = target.value;
                if (!type) return;
                const arr = pageState.filters.charger_types;
                const idx = arr.indexOf(type);
                if (target.checked && idx === -1) {
                    arr.push(type);
                } else if (!target.checked && idx !== -1) {
                    arr.splice(idx, 1);
                }
            } else if (action === 'apply-filters') {
                updateUrlParams({
                    minPower: pageState.filters.min_power_kw,
                    types: pageState.filters.charger_types
                });
                filterStatus.textContent = 'Updating chargers...';
                refreshChargers();
                filterStatus.textContent = '';
            } else if (action === 'select-charger') {
                const chargerId = target.dataset.chargerId;
                if (!chargerId) return;
                pageState.selectedChargerId = chargerId;
                renderChargerPopup();
            } else if (action === 'close-charger-popup') {
                pageState.selectedChargerId = null;
                renderChargerPopup();
            } else if (action === 'open-trip-notes') {
                if (!pageState.routePlanId) {
                    alert('Plan a route first to open Trip Notes for it.');
                    return;
                }
                const url = 'trip_notes.html?routePlanId=' + encodeURIComponent(pageState.routePlanId);
                window.location.href = url;
            } else if (action === 'focus-charger-from-note') {
                const chargerId = target.dataset.chargerId;
                if (!chargerId) return;
                pageState.selectedChargerId = chargerId;
                const mapArea = document.getElementById('mapArea');
                if (mapArea && typeof mapArea.scrollIntoView === 'function') {
                    mapArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                renderChargerPopup();
            } else if (action === 'enable-route-edit') {
                pageState.routeFormLocked = false;
                updateRouteFormLockUI();
            }
        });

        document.addEventListener('submit', function(event) {
            const form = event.target;
            if (!form.dataset || form.dataset.action !== 'submit-charger-note') return;
            event.preventDefault();

            const chargerId = form.dataset.chargerId;
            if (!chargerId || !pageState.routePlanId) {
                return;
            }
            const textarea = form.querySelector('textarea[name="note_text"]');
            const statusSpan = form.querySelector('.note-status');
            const text = textarea ? textarea.value.trim() : '';
            if (!text) {
                if (statusSpan) statusSpan.textContent = 'Please enter a note.';
                return;
            }
            if (statusSpan) statusSpan.textContent = 'Saving...';
            try {
                const result = WebsiteSDK.createTripNoteForCharger(chargerId, pageState.routePlanId, text);
                if (result && result.trip_note) {
                    // Integrate into local notes overview
                    const chargerItem = (pageState.chargersAlongRoute || []).find(item => item && item.charger && item.charger.id === chargerId);
                    const charger = chargerItem ? chargerItem.charger : null;
                    const route_plan = pageState.routePlan || { id: pageState.routePlanId };
                    pageState.tripNotesOverview = pageState.tripNotesOverview || [];
                    pageState.tripNotesOverview.push({
                        trip_note: result.trip_note,
                        charger: charger,
                        route_plan: route_plan
                    });
                    if (textarea) textarea.value = '';
                    if (statusSpan) statusSpan.textContent = 'Note saved.';
                    renderAllPopulate();
                } else {
                    if (statusSpan) statusSpan.textContent = 'Failed to save note.';
                }
            } catch (e) {
                console.error('Error saving trip note', e);
                if (statusSpan) statusSpan.textContent = 'Error saving note.';
            }
        });

        // ----- Initial URL-based state -----
        (function initFromUrl() {
            const params = getUrlParams();
            const origin = params.get('origin') || '';
            const destination = params.get('destination') || '';
            const routePlanId = params.get('routePlanId');
            const minPowerParam = params.get('minPower');
            const typesParam = params.get('types');

            if (origin) {
                originInput.value = origin;
            }
            if (destination) {
                destinationInput.value = destination;
            }

            if (minPowerParam != null && minPowerParam !== '') {
                const num = Number(minPowerParam);
                if (!isNaN(num)) {
                    pageState.filters.min_power_kw = num;
                    minPowerInput.value = String(num);
                }
            }

            if (typesParam) {
                const types = typesParam.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t; });
                pageState.filters.charger_types = types;
                const checkboxes = document.querySelectorAll('input[type="checkbox"][data-action="toggle-charger-type"]');
                checkboxes.forEach(function(cb) {
                    cb.checked = types.indexOf(cb.value) !== -1;
                });
            }

            if (routePlanId) {
                pageState.routePlanId = routePlanId;
                pageState.routeFormLocked = true;
                updateRouteFormLockUI();
                loadExistingRouteFromNotes(routePlanId, origin, destination);
            } else if (origin && destination) {
                // Auto-plan route when both are provided but no routePlanId
                try {
                    const result = WebsiteSDK.createRoutePlan(origin, destination);
                    if (result && result.route_plan) {
                        routePlannerMessage.textContent = 'Route planned from URL parameters.';
                        setRoutePlan(result.route_plan, { lockForm: false });
                    } else {
                        routePlannerMessage.textContent = 'Could not create route from URL parameters.';
                        renderAllPopulate();
                    }
                } catch (e) {
                    console.error('Error auto-creating route plan', e);
                    routePlannerMessage.textContent = 'Failed to create route from URL parameters.';
                    renderAllPopulate();
                }
            } else {
                // No initial route; basic render
                renderAllPopulate();
            }
        })();
    });
    </script>
</body>
</html>
