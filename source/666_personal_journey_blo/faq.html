<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Car Expedition</title>
    
    <link rel="stylesheet" href="faq.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="top-nav" role="navigation" aria-label="Primary">
                <a href="index.html" title="Homepage with featured trips and quick access to main sections">Home</a>
                <span class="nav-separator">|</span>
                <a href="trip_log.html" title="Browse and filter multi-day trip entries">Trip Log</a>
                <span class="nav-separator">|</span>
                <a href="daily_logs.html" title="Browse and filter individual daily driving logs">Daily Logs</a>
                <span class="nav-separator">|</span>
                <a href="charging_map.html" title="Plan routes and find chargers on an interactive map">Charging Map</a>
                <span class="nav-separator">|</span>
                <a href="collections.html" title="View and manage itineraries and saved collections">Collections</a>
                <span class="nav-separator">|</span>
                <a href="collections.html?action=create_itinerary" title="Open the itinerary creation form to start a new itinerary">Create Itinerary</a>
                <span class="nav-separator">|</span>
                <a href="tags.html" title="Browse trips by themes and tags such as Winter Efficiency">Themes</a>
                <span class="nav-separator">|</span>
                <a href="search.html" title="Search all trips and logs with advanced filters">Search</a>
            </div>

            <div class="hero">
                <a href="index.html" class="hero-link">
                    <img src="assets/hero-electric-car.jpg" alt="Electric car expedition hero graphic" class="hero-image">
                </a>
            </div>
        </header>

        <main id="content" class="site-content" role="main">
            <div class="faq-content-column">
                <div data-component="faq-state-manager" aria-hidden="true" hidden></div>

                <nav class="faq-breadcrumb" aria-label="Breadcrumb" data-component="faq-breadcrumb">
                    <button type="button" class="breadcrumb-root" data-action="faq-breadcrumb-list">Help / FAQ</button>
                    <span data-populate="faq-breadcrumb-article"></span>
                </nav>

                <div class="faq-error-banner" data-component="faq-error-banner" role="alert" hidden>
                    <span data-populate="faq-error-message"></span>
                    <button type="button" data-action="faq-error-retry">Retry</button>
                </div>

                <form id="faqSearchForm" class="faq-search-form" data-component="faq-search-form">
                    <label for="faqSearchInput">Search FAQ articles:</label>
                    <input type="text" id="faqSearchInput" name="search_query">
                    <button type="submit" data-action="faq-search-submit">Search</button>
                    <button type="button" data-action="faq-search-clear">Clear</button>
                </form>

                <div class="faq-category-filter" data-component="faq-category-filter">
                    <span>Filter by category:</span>
                    <button type="button" data-action="faq-category" data-category="">All</button>
                    <button type="button" data-action="faq-category" data-category="charging">Charging</button>
                    <button type="button" data-action="faq-category" data-category="vehicle_setup">Vehicle setup</button>
                    <button type="button" data-action="faq-category" data-category="pricing">Pricing</button>
                    <button type="button" data-action="faq-category" data-category="other">Other</button>
                    <button type="button" data-action="faq-category-clear">Clear category</button>
                </div>

                <div class="faq-loading" data-component="faq-loading-indicator" aria-live="polite" hidden>
                    Loading FAQ articles...
                </div>

                <section class="faq-list-section">
                    <table class="faq-table" aria-label="FAQ articles list">
                        <thead>
                            <tr>
                                <th scope="col">Question</th>
                                <th scope="col">Category</th>
                                <th scope="col">Topic</th>
                                <th scope="col">Last updated</th>
                            </tr>
                        </thead>
                        <tbody data-component="faq-list" data-populate="faq-list">
                            <!-- FAQ rows populated by JavaScript -->
                        </tbody>
                    </table>
                </section>

                <section class="faq-article-section" data-component="faq-article-viewer" aria-live="polite" hidden>
                    <div class="faq-article-header">
                        <button type="button" data-action="faq-back-to-list">Back to FAQ list</button>
                        <h1 class="faq-article-title" data-populate="faq-article-title"></h1>
                    </div>
                    <div class="faq-spec-highlight" data-component="faq-spec-highlight" data-populate="faq-spec-highlight"></div>
                    <article class="faq-article-content" data-populate="faq-article-content"></article>
                </section>
            </div>
        </main>

        <footer class="site-footer">
            <nav class="footer-nav" aria-label="Footer">
                <a href="about.html" title="Learn more about the journey blog and its author">About</a>
                <span class="nav-separator">|</span>
                <a href="faq.html" title="Read help articles and frequently asked questions">Help / FAQ</a>
                <span class="nav-separator">|</span>
                <a href="tags.html" title="Explore all tags and themed collections of trips">Themes &amp; Tags</a>
                <span class="nav-separator">|</span>
                <a href="profile.html" title="Adjust personal preferences, charging network, and vehicle settings">Profile &amp; Vehicle</a>
                <span class="nav-separator">|</span>
                <a href="trip_notes.html" title="View and manage notes saved for chargers and routes">Trip Notes</a>
                <span class="nav-separator">|</span>
                <a href="reading_lists.html" title="Access and manage saved reading lists for later">Reading Lists</a>
            </nav>
        </footer>
    </div>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const state = {
            viewMode: 'list',
            articleId: null,
            searchQuery: '',
            category: '',
            isLoading: false,
            error: null,
            lastListSource: 'default'
        };

        const breadcrumbArticleEl = document.querySelector('[data-populate="faq-breadcrumb-article"]');
        const breadcrumbRootBtn = document.querySelector('[data-action="faq-breadcrumb-list"]');
        const errorBannerEl = document.querySelector('[data-component="faq-error-banner"]');
        const errorMessageEl = document.querySelector('[data-populate="faq-error-message"]');
        const searchFormEl = document.querySelector('[data-component="faq-search-form"]');
        const searchInputEl = document.getElementById('faqSearchInput');
        const categoryFilterEl = document.querySelector('[data-component="faq-category-filter"]');
        const loadingEl = document.querySelector('[data-component="faq-loading-indicator"]');
        const listContainer = document.querySelector('[data-populate="faq-list"]');
        const listSectionEl = document.querySelector('.faq-list-section');
        const articleSectionEl = document.querySelector('[data-component="faq-article-viewer"]');
        const articleTitleEl = document.querySelector('[data-populate="faq-article-title"]');
        const articleContentEl = document.querySelector('[data-populate="faq-article-content"]');
        const specContainer = document.querySelector('[data-populate="faq-spec-highlight"]');

        function parseUrlState() {
            const params = new URLSearchParams(window.location.search);
            const articleId = params.get('articleId');
            const searchQuery = params.get('search_query') || '';
            state.articleId = articleId;
            state.searchQuery = searchQuery;
            state.viewMode = articleId ? 'article' : 'list';
        }

        function updateUrl(params, options) {
            const opts = options || {};
            const url = new URL(window.location.href);
            if (Object.prototype.hasOwnProperty.call(params, 'articleId')) {
                if (params.articleId) {
                    url.searchParams.set('articleId', params.articleId);
                } else {
                    url.searchParams.delete('articleId');
                }
            }
            if (Object.prototype.hasOwnProperty.call(params, 'search_query')) {
                if (params.search_query) {
                    url.searchParams.set('search_query', params.search_query);
                } else {
                    url.searchParams.delete('search_query');
                }
            }
            const newUrl = url.pathname + (url.search ? url.search : '');
            if (opts.replace) {
                window.history.replaceState({}, '', newUrl);
            } else {
                window.history.pushState({}, '', newUrl);
            }
        }

        function setLoading(isLoading) {
            state.isLoading = isLoading;
            if (loadingEl) {
                loadingEl.hidden = !isLoading;
            }
            if (state.viewMode === 'list') {
                if (listSectionEl) {
                    listSectionEl.hidden = isLoading;
                }
                if (articleSectionEl) {
                    articleSectionEl.hidden = true;
                }
            } else if (state.viewMode === 'article') {
                if (listSectionEl) {
                    listSectionEl.hidden = true;
                }
                if (articleSectionEl) {
                    articleSectionEl.hidden = isLoading;
                }
            }
        }

        function clearError() {
            state.error = null;
            if (errorBannerEl) {
                errorBannerEl.hidden = true;
            }
        }

        function showError(type, message) {
            state.error = { type: type, message: message };
            if (errorBannerEl && errorMessageEl) {
                errorMessageEl.textContent = message || '';
                const retryBtn = errorBannerEl.querySelector('[data-action="faq-error-retry"]');
                if (retryBtn) {
                    retryBtn.hidden = type !== 'api';
                }
                errorBannerEl.hidden = false;
            }
        }

        function renderBreadcrumbListMode() {
            if (breadcrumbArticleEl) {
                breadcrumbArticleEl.textContent = '';
            }
        }

        function renderBreadcrumbArticleMode(article) {
            if (breadcrumbArticleEl) {
                const title = article && article.title ? article.title : '';
                breadcrumbArticleEl.textContent = title ? ' > ' + title : '';
            }
        }

        function makeSummary(text) {
            if (!text) {
                return '';
            }
            const clean = String(text).replace(/\s+/g, ' ').trim();
            if (clean.length <= 160) {
                return clean;
            }
            return clean.slice(0, 157) + '...';
        }

        function formatDate(value) {
            if (!value) {
                return '';
            }
            try {
                const date = new Date(value);
                if (Number.isNaN(date.getTime())) {
                    return '';
                }
                return date.toISOString().slice(0, 10);
            } catch (e) {
                return '';
            }
        }

        function formatKeyTopic(keyTopic) {
            if (!keyTopic) {
                return '';
            }
            if (keyTopic === 'maximum_ac_charging_power') {
                return 'Maximum AC charging power';
            }
            if (keyTopic === 'vehicle_setup') {
                return 'Vehicle setup';
            }
            if (keyTopic === 'pricing') {
                return 'Pricing';
            }
            return 'Other';
        }

        function renderFaqList(container, articles) {
            if (!container) {
                return;
            }
            container.innerHTML = '';
            if (!articles || !articles.length) {
                const row = document.createElement('tr');
                const cell = document.createElement('td');
                cell.colSpan = 4;
                cell.textContent = state.searchQuery ? 'No FAQ articles matched your search.' : 'No FAQ articles are available yet.';
                row.appendChild(cell);
                container.appendChild(row);
                return;
            }
            articles.forEach(function (article) {
                if (!article || article.is_published === false) {
                    return;
                }
                const tr = document.createElement('tr');

                const questionTd = document.createElement('td');
                const titleBtn = document.createElement('button');
                titleBtn.type = 'button';
                titleBtn.className = 'faq-list-link';
                titleBtn.textContent = article.title || '';
                titleBtn.dataset.action = 'faq-open-article';
                titleBtn.dataset.articleId = article.id || '';
                questionTd.appendChild(titleBtn);

                if (article.content) {
                    const summaryDiv = document.createElement('div');
                    summaryDiv.className = 'faq-list-summary';
                    summaryDiv.textContent = makeSummary(article.content);
                    questionTd.appendChild(summaryDiv);
                }

                const categoryTd = document.createElement('td');
                categoryTd.textContent = article.category || '';

                const topicTd = document.createElement('td');
                topicTd.textContent = formatKeyTopic(article.key_topic);

                const updatedTd = document.createElement('td');
                const updated = article.updated_at || article.created_at;
                updatedTd.textContent = formatDate(updated);

                tr.appendChild(questionTd);
                tr.appendChild(categoryTd);
                tr.appendChild(topicTd);
                tr.appendChild(updatedTd);

                container.appendChild(tr);
            });
        }

        function renderSpecHighlight(container, article) {
            if (!container) {
                return;
            }
            container.innerHTML = '';
            const hasAcPower = typeof article.max_ac_charging_power_kw === 'number';
            if (!hasAcPower) {
                container.style.display = 'none';
                return;
            }
            container.style.display = '';

            const wrapper = document.createElement('div');
            const heading = document.createElement('h2');
            heading.textContent = 'Key technical specs';
            wrapper.appendChild(heading);

            const table = document.createElement('table');
            const tbody = document.createElement('tbody');

            const row = document.createElement('tr');
            const labelCell = document.createElement('th');
            labelCell.scope = 'row';
            labelCell.textContent = 'Maximum AC charging power';
            const valueCell = document.createElement('td');
            valueCell.textContent = String(article.max_ac_charging_power_kw) + ' kW';
            row.appendChild(labelCell);
            row.appendChild(valueCell);
            tbody.appendChild(row);

            table.appendChild(tbody);
            wrapper.appendChild(table);

            const linkPara = document.createElement('p');
            const link = document.createElement('a');
            link.href = 'profile.html';
            link.dataset.action = 'faq-spec-profile-link';
            link.textContent = 'Set this in my vehicle profile';
            linkPara.appendChild(link);
            wrapper.appendChild(linkPara);

            container.appendChild(wrapper);
        }

        function renderArticle(article) {
            if (articleTitleEl) {
                articleTitleEl.textContent = article.title || '';
            }
            if (articleContentEl) {
                articleContentEl.innerHTML = '';
                if (article.content) {
                    const parts = String(article.content).split(/\n{2,}/);
                    parts.forEach(function (part) {
                        const trimmed = part.trim();
                        if (!trimmed) {
                            return;
                        }
                        const p = document.createElement('p');
                        p.textContent = trimmed;
                        articleContentEl.appendChild(p);
                    });
                }
            }
            renderSpecHighlight(specContainer, article);
        }

        function renderCategoryFilter() {
            if (!categoryFilterEl) {
                return;
            }
            const buttons = categoryFilterEl.querySelectorAll('[data-action="faq-category"]');
            buttons.forEach(function (btn) {
                const category = btn.getAttribute('data-category') || '';
                if (category === (state.category || '')) {
                    btn.classList.add('active-category');
                } else {
                    btn.classList.remove('active-category');
                }
            });
        }

        function loadArticle(articleId) {
            clearError();
            state.viewMode = 'article';
            setLoading(true);
            try {
                const result = WebsiteSDK.getFaqArticle(articleId);
                const article = result && result.faq_article ? result.faq_article : null;
                if (!article || article.is_published === false) {
                    showError('not_found', 'This FAQ article could not be found. Showing the FAQ list instead.');
                    updateUrl({ articleId: null }, { replace: true });
                    state.articleId = null;
                    state.viewMode = 'list';
                    loadList();
                    return;
                }
                renderBreadcrumbArticleMode(article);
                renderArticle(article);
            } catch (e) {
                showError('api', 'There was a problem loading this FAQ article.');
            } finally {
                setLoading(false);
            }
        }

        function loadList() {
            clearError();
            state.viewMode = 'list';
            setLoading(true);
            try {
                let articles = [];
                if (state.searchQuery) {
                    state.lastListSource = 'search';
                    const result = WebsiteSDK.searchFaqArticles(state.searchQuery);
                    articles = result && result.articles ? result.articles : [];
                    if (!articles.length) {
                        showError('no_results', 'No FAQ articles matched your search. Try another term, such as "AC charging" or "pricing".');
                    }
                } else {
                    state.lastListSource = state.category ? 'category' : 'default';
                    const categoryParam = state.category || null;
                    const result = WebsiteSDK.getFaqArticleList(categoryParam);
                    articles = result && result.articles ? result.articles : [];
                    if (!articles.length) {
                        showError('no_results', 'No FAQ articles are available in this category yet.');
                    }
                }
                renderBreadcrumbListMode();
                renderCategoryFilter();
                renderFaqList(listContainer, articles);
            } catch (e) {
                showError('api', 'There was a problem loading FAQ articles.');
            } finally {
                setLoading(false);
            }
        }

        function applyStateFromUrl() {
            parseUrlState();
            if (searchInputEl) {
                searchInputEl.value = state.searchQuery || '';
            }
            if (state.articleId) {
                loadArticle(state.articleId);
            } else {
                loadList();
            }
        }

        if (searchFormEl) {
            searchFormEl.addEventListener('submit', function (event) {
                event.preventDefault();
                const value = searchInputEl ? searchInputEl.value.trim() : '';
                if (value) {
                    state.searchQuery = value;
                    state.category = '';
                    updateUrl({ search_query: value, articleId: null });
                    applyStateFromUrl();
                } else {
                    state.searchQuery = '';
                    state.category = '';
                    updateUrl({ search_query: null, articleId: null });
                    applyStateFromUrl();
                }
            });
        }

        document.addEventListener('click', function (event) {
            const target = event.target.closest('[data-action]');
            if (!target) {
                return;
            }
            const action = target.getAttribute('data-action');

            if (action === 'faq-search-clear') {
                if (searchInputEl) {
                    searchInputEl.value = '';
                }
                state.searchQuery = '';
                state.category = '';
                updateUrl({ search_query: null, articleId: null });
                applyStateFromUrl();
            } else if (action === 'faq-category') {
                const category = target.getAttribute('data-category') || '';
                state.category = category;
                state.searchQuery = '';
                if (searchInputEl) {
                    searchInputEl.value = '';
                }
                updateUrl({ search_query: null, articleId: null });
                renderCategoryFilter();
                loadList();
            } else if (action === 'faq-category-clear') {
                state.category = '';
                state.searchQuery = '';
                if (searchInputEl) {
                    searchInputEl.value = '';
                }
                updateUrl({ search_query: null, articleId: null });
                renderCategoryFilter();
                loadList();
            } else if (action === 'faq-open-article') {
                const articleId = target.getAttribute('data-article-id');
                if (articleId) {
                    state.articleId = articleId;
                    updateUrl({ articleId: articleId }, {});
                    applyStateFromUrl();
                }
            } else if (action === 'faq-back-to-list' || action === 'faq-breadcrumb-list') {
                state.articleId = null;
                updateUrl({ articleId: null }, {});
                applyStateFromUrl();
            } else if (action === 'faq-error-retry') {
                clearError();
                applyStateFromUrl();
            } else if (action === 'faq-spec-profile-link') {
                // Navigation handled by the link's href (profile.html) as per outgoing connection spec.
            }
        });

        window.addEventListener('popstate', function () {
            applyStateFromUrl();
        });

        if (breadcrumbRootBtn) {
            breadcrumbRootBtn.addEventListener('click', function () {
                const params = new URLSearchParams(window.location.search);
                if (params.get('articleId')) {
                    state.articleId = null;
                    updateUrl({ articleId: null }, {});
                    applyStateFromUrl();
                }
            });
        }

        applyStateFromUrl();
    });
    </script>
</body>
</html>
