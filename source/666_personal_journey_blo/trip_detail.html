<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Car Expedition</title>
    
    <link rel="stylesheet" href="trip_detail.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="top-nav" role="navigation" aria-label="Primary">
                <a href="index.html" title="Homepage with featured trips and quick access to main sections">Home</a>
                <span class="nav-separator">|</span>
                <a href="trip_log.html" title="Browse and filter multi-day trip entries">Trip Log</a>
                <span class="nav-separator">|</span>
                <a href="daily_logs.html" title="Browse and filter individual daily driving logs">Daily Logs</a>
                <span class="nav-separator">|</span>
                <a href="charging_map.html" title="Plan routes and find chargers on an interactive map">Charging Map</a>
                <span class="nav-separator">|</span>
                <a href="collections.html" title="View and manage itineraries and saved collections">Collections</a>
                <span class="nav-separator">|</span>
                <a href="collections.html?action=create_itinerary" title="Open the itinerary creation form to start a new itinerary">Create Itinerary</a>
                <span class="nav-separator">|</span>
                <a href="tags.html" title="Browse trips by themes and tags such as Winter Efficiency">Themes</a>
                <span class="nav-separator">|</span>
                <a href="search.html" title="Search all trips and logs with advanced filters">Search</a>
            </div>

            <div class="hero">
                <a href="index.html" class="hero-link">
                    <img src="assets/hero-electric-car.jpg" alt="Electric car expedition hero graphic" class="hero-image">
                </a>
            </div>
        </header>

        <main id="content" class="site-content" role="main">
            <div class="trip-detail-page" data-component="trip-detail-page-shell">
                <div id="trip-error" class="trip-error-message" aria-live="polite"></div>

                <div class="trip-back-nav" data-component="trip-back-navigation">
                    <a href="javascript:void(0)" data-action="back-to-trip-log">&laquo; Back to Trip Log</a>
                </div>

                <section class="trip-header" data-component="trip-header" aria-labelledby="trip-title-heading">
                    <h1 id="trip-title-heading" class="trip-title" data-populate="trip-title"></h1>
                    <p class="trip-header-subtitle">
                        <span class="trip-dates" data-populate="trip-date-range"></span>
                        <span class="trip-type-badge" data-populate="trip-type"></span>
                        <span class="trip-multi-day-flag" data-populate="trip-multi-day"></span>
                    </p>
                    <p class="trip-header-meta" data-populate="trip-region-country"></p>
                    <p class="trip-header-summary" data-populate="trip-summary"></p>
                </section>

                <section class="trip-meta-stats" data-component="trip-meta-stats" aria-label="Trip overview">
                    <h2 class="section-heading">Trip overview</h2>
                    <table class="stats-table" data-populate="trip-stats">
                        <!-- Populated by JavaScript -->
                    </table>
                </section>

                <section class="trip-map-stops" data-component="trip-map-and-charging-stops" aria-label="Charging stops and route">
                    <h2 class="section-heading">Charging stops</h2>
                    <div class="trip-map-placeholder" data-populate="trip-map">
                        <!-- Simple placeholder for map preview -->
                    </div>
                    <div class="trip-stops-table-wrapper">
                        <table class="trip-stops-table" data-populate="trip-charging-stops">
                            <!-- Populated by JavaScript -->
                        </table>
                    </div>
                </section>

                <section class="trip-tags" data-component="trip-tags-list" aria-label="Trip tags">
                    <h2 class="section-heading">Tags</h2>
                    <div class="tag-list" data-populate="trip-tags">
                        <!-- Populated by JavaScript -->
                    </div>
                </section>

                <section class="trip-favorite-section" data-component="trip-favorite-toggle" aria-label="Favorite status">
                    <button type="button" class="favorite-toggle-button" data-action="toggle-favorite">
                        <span data-populate="favorite-label">Mark as favorite</span>
                    </button>
                    <span class="favorite-status-text" data-populate="favorite-status"></span>
                </section>

                <section class="trip-itinerary-add" data-component="add-trip-to-itinerary-form" aria-label="Add trip to itinerary">
                    <h2 class="section-heading">Add to itinerary</h2>
                    <form data-action="add-to-itinerary">
                        <div class="form-row">
                            <label for="itinerarySelect">Select itinerary:</label><br>
                            <select id="itinerarySelect" name="itineraryId" required data-populate="available-itineraries">
                                <option value="">Choose an itinerary</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <button type="submit">Add Trip</button>
                        </div>
                        <div class="itinerary-feedback" data-populate="itinerary-feedback" aria-live="polite"></div>
                    </form>
                </section>

                <section class="trip-comments" id="comments" data-component="trip-comments-list" aria-label="Trip comments">
                    <h2 class="section-heading">Comments</h2>
                    <div class="comments-container" data-populate="trip-comments">
                        <!-- Populated by JavaScript -->
                    </div>
                    <div class="comments-pagination" data-populate="comments-pagination" aria-label="Comments pagination">
                        <!-- Populated by JavaScript -->
                    </div>
                </section>

                <section class="trip-comment-form" data-component="trip-comment-form" aria-label="Leave a comment">
                    <h2 class="section-heading">Leave a comment</h2>
                    <form data-action="submit-comment">
                        <div class="form-row">
                            <label for="commentAuthor">Name:</label><br>
                            <input type="text" id="commentAuthor" name="author_name" required>
                        </div>
                        <div class="form-row">
                            <label for="commentBody">Comment:</label><br>
                            <textarea id="commentBody" name="body" rows="4" required></textarea>
                        </div>
                        <div class="form-row">
                            <label for="commentRating">Rating (optional):</label><br>
                            <select id="commentRating" name="rating">
                                <option value="">No rating</option>
                                <option value="rating_1">1 - Not helpful</option>
                                <option value="rating_2">2</option>
                                <option value="rating_3">3</option>
                                <option value="rating_4">4</option>
                                <option value="rating_5">5 - Very helpful</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <button type="submit">Post Comment</button>
                        </div>
                        <div class="comment-form-feedback" data-populate="comment-feedback" aria-live="polite"></div>
                    </form>
                </section>
            </div>
        </main>

        <footer class="site-footer">
            <nav class="footer-nav" aria-label="Footer">
                <a href="about.html" title="Learn more about the journey blog and its author">About</a>
                <span class="nav-separator">|</span>
                <a href="faq.html" title="Read help articles and frequently asked questions">Help / FAQ</a>
                <span class="nav-separator">|</span>
                <a href="tags.html" title="Explore all tags and themed collections of trips">Themes &amp; Tags</a>
                <span class="nav-separator">|</span>
                <a href="profile.html" title="Adjust personal preferences, charging network, and vehicle settings">Profile &amp; Vehicle</a>
                <span class="nav-separator">|</span>
                <a href="trip_notes.html" title="View and manage notes saved for chargers and routes">Trip Notes</a>
                <span class="nav-separator">|</span>
                <a href="reading_lists.html" title="Access and manage saved reading lists for later">Reading Lists</a>
            </nav>
        </footer>
    </div>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const tripId = urlParams.get('id');
        const returnUrlParam = urlParams.get('return_url');

        const errorContainer = document.getElementById('trip-error');
        const favoriteLabelEl = document.querySelector('[data-populate="favorite-label"]');
        const favoriteStatusEl = document.querySelector('[data-populate="favorite-status"]');
        const itinerarySelectEl = document.getElementById('itinerarySelect');
        const itineraryFeedbackEl = document.querySelector('[data-populate="itinerary-feedback"]');
        const commentsContainerEl = document.querySelector('[data-populate="trip-comments"]');
        const commentsPaginationEl = document.querySelector('[data-populate="comments-pagination"]');
        const commentFeedbackEl = document.querySelector('[data-populate="comment-feedback"]');

        let tripDetail = null;
        let isFavorited = false;
        let favoritesCount = null;
        const commentsState = {
            totalCount: 0,
            page: 1,
            pageSize: 0
        };

        function showGlobalError(message) {
            if (errorContainer) {
                errorContainer.textContent = message || '';
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (Number.isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString();
        }

        function formatNumber(value, fractionDigits) {
            if (value === null || value === undefined || Number.isNaN(value)) return '';
            const digits = typeof fractionDigits === 'number' ? fractionDigits : 1;
            return Number(value).toFixed(digits);
        }

        function titleCaseEnum(value) {
            if (!value || typeof value !== 'string') return '';
            return value.split('_').join(' ').replace(/\b\w/g, function(ch) { return ch.toUpperCase(); });
        }

        function updateQueryParams(paramsToUpdate) {
            const url = new URL(window.location.href);
            Object.keys(paramsToUpdate).forEach(function(key) {
                const value = paramsToUpdate[key];
                if (value === undefined || value === null || value === '') {
                    url.searchParams.delete(key);
                } else {
                    url.searchParams.set(key, String(value));
                }
            });
            window.location.href = url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : '') + url.hash;
        }

        function renderTripHeader(detail) {
            const trip = detail.trip;
            const titleEl = document.querySelector('[data-populate="trip-title"]');
            if (titleEl && trip.title) {
                titleEl.textContent = trip.title;
            }

            const dateRangeEl = document.querySelector('[data-populate="trip-date-range"]');
            if (dateRangeEl) {
                let dateText = '';
                if (trip.start_date && trip.end_date && trip.start_date !== trip.end_date) {
                    dateText = formatDate(trip.start_date) + '  ' + formatDate(trip.end_date);
                } else if (trip.primary_date) {
                    dateText = formatDate(trip.primary_date);
                } else if (trip.start_date) {
                    dateText = formatDate(trip.start_date);
                }
                dateRangeEl.textContent = dateText;
            }

            const typeEl = document.querySelector('[data-populate="trip-type"]');
            if (typeEl && trip.trip_type) {
                typeEl.textContent = titleCaseEnum(trip.trip_type);
            }

            const multiEl = document.querySelector('[data-populate="trip-multi-day"]');
            if (multiEl) {
                if (trip.is_multi_day === true) {
                    multiEl.textContent = '(Multi-day trip)';
                } else if (trip.is_multi_day === false) {
                    multiEl.textContent = '(Single-day trip)';
                } else {
                    multiEl.textContent = '';
                }
            }

            const regionCountryEl = document.querySelector('[data-populate="trip-region-country"]');
            if (regionCountryEl) {
                const parts = [];
                if (trip.region) {
                    parts.push(trip.region);
                }
                if (trip.primary_country) {
                    parts.push(titleCaseEnum(trip.primary_country));
                }
                regionCountryEl.textContent = parts.join(' ␀b7 ');
            }

            const summaryEl = document.querySelector('[data-populate="trip-summary"]');
            if (summaryEl) {
                summaryEl.textContent = trip.summary || '';
            }
        }

        function renderTripStats(container, trip) {
            if (!container) return;
            container.innerHTML = '';

            const rows = [];
            if (typeof trip.distance_km === 'number') {
                rows.push({ label: 'Distance', value: formatNumber(trip.distance_km, 0) + ' km' });
            }
            if (typeof trip.average_speed_kmh === 'number') {
                rows.push({ label: 'Average speed', value: formatNumber(trip.average_speed_kmh, 1) + ' km/h' });
            }
            if (typeof trip.energy_consumption_kwh_per_100km === 'number') {
                rows.push({ label: 'Energy consumption', value: formatNumber(trip.energy_consumption_kwh_per_100km, 1) + ' kWh/100km' });
            }
            if (typeof trip.total_charging_cost_eur === 'number') {
                rows.push({ label: 'Total charging cost', value: formatNumber(trip.total_charging_cost_eur, 2) + ' ␀80' });
            }
            if (typeof trip.avg_price_per_kwh === 'number') {
                rows.push({ label: 'Average price per kWh', value: formatNumber(trip.avg_price_per_kwh, 3) + ' ␀80/kWh' });
            }
            if (typeof trip.scenic_rating === 'number') {
                rows.push({ label: 'Scenic rating', value: formatNumber(trip.scenic_rating, 1) + ' / 5' });
            }
            if (typeof trip.temperature_min_c === 'number') {
                rows.push({ label: 'Min temperature', value: formatNumber(trip.temperature_min_c, 1) + ' ␀b0C' });
            }
            if (typeof trip.charging_stop_count === 'number') {
                rows.push({ label: 'Charging stops', value: String(trip.charging_stop_count) });
            }

            if (rows.length === 0) {
                const row = document.createElement('tr');
                const cell = document.createElement('td');
                cell.colSpan = 2;
                cell.textContent = 'No stats available for this trip.';
                row.appendChild(cell);
                container.appendChild(row);
                return;
            }

            const headerRow = document.createElement('tr');
            const thMetric = document.createElement('th');
            thMetric.textContent = 'Metric';
            const thValue = document.createElement('th');
            thValue.textContent = 'Value';
            headerRow.appendChild(thMetric);
            headerRow.appendChild(thValue);
            container.appendChild(headerRow);

            rows.forEach(function(r) {
                const tr = document.createElement('tr');
                const tdLabel = document.createElement('td');
                tdLabel.textContent = r.label;
                const tdValue = document.createElement('td');
                tdValue.textContent = r.value;
                tr.appendChild(tdLabel);
                tr.appendChild(tdValue);
                container.appendChild(tr);
            });
        }

        function renderMapPlaceholder(container, detail) {
            if (!container) return;
            container.innerHTML = '';
            const p = document.createElement('p');
            p.textContent = 'Static map preview placeholder for ' + (detail.trip && detail.trip.title ? detail.trip.title : 'trip') + '. Use the Charging Map page for interactive planning.';
            container.appendChild(p);
        }

        function renderChargingStops(container, chargingStops) {
            if (!container) return;
            container.innerHTML = '';

            const headerRow = document.createElement('tr');
            const headers = ['#', 'Location', 'Charger type', 'Network', 'Max power (kW)', 'Energy added (kWh)', 'Cost (␀80)', 'Duration (min)', 'Coordinates'];
            headers.forEach(function(label) {
                const th = document.createElement('th');
                th.textContent = label;
                headerRow.appendChild(th);
            });
            container.appendChild(headerRow);

            if (!chargingStops || chargingStops.length === 0) {
                const row = document.createElement('tr');
                const cell = document.createElement('td');
                cell.colSpan = headers.length;
                cell.textContent = 'No charging stops recorded for this trip.';
                row.appendChild(cell);
                container.appendChild(row);
                return;
            }

            chargingStops.forEach(function(item, index) {
                const tr = document.createElement('tr');
                const stop = item.charging_stop || {};
                const charger = item.charger || {};

                const seqCell = document.createElement('td');
                const seq = typeof stop.sequence === 'number' ? stop.sequence : (index + 1);
                seqCell.textContent = String(seq);
                tr.appendChild(seqCell);

                const locationParts = [];
                if (charger.name) {
                    locationParts.push(charger.name);
                }
                if (charger.city) {
                    locationParts.push(charger.city);
                }
                if (charger.country) {
                    locationParts.push(titleCaseEnum(charger.country));
                }
                const locationCell = document.createElement('td');
                locationCell.textContent = locationParts.join(', ') || 'Unknown location';
                tr.appendChild(locationCell);

                const typeCell = document.createElement('td');
                typeCell.textContent = charger.charger_type ? titleCaseEnum(charger.charger_type) : '';
                tr.appendChild(typeCell);

                const networkCell = document.createElement('td');
                networkCell.textContent = charger.charging_network_code ? titleCaseEnum(charger.charging_network_code) : '';
                tr.appendChild(networkCell);

                const powerCell = document.createElement('td');
                powerCell.textContent = typeof charger.max_power_kw === 'number' ? formatNumber(charger.max_power_kw, 0) : '';
                tr.appendChild(powerCell);

                const energyCell = document.createElement('td');
                energyCell.textContent = typeof stop.energy_added_kwh === 'number' ? formatNumber(stop.energy_added_kwh, 1) : '';
                tr.appendChild(energyCell);

                const costCell = document.createElement('td');
                costCell.textContent = typeof stop.cost_eur === 'number' ? formatNumber(stop.cost_eur, 2) : '';
                tr.appendChild(costCell);

                const durationCell = document.createElement('td');
                durationCell.textContent = typeof stop.duration_minutes === 'number' ? String(stop.duration_minutes) : '';
                tr.appendChild(durationCell);

                const coordCell = document.createElement('td');
                if (typeof charger.latitude === 'number' && typeof charger.longitude === 'number') {
                    coordCell.textContent = formatNumber(charger.latitude, 4) + ', ' + formatNumber(charger.longitude, 4);
                } else {
                    coordCell.textContent = '';
                }
                tr.appendChild(coordCell);

                container.appendChild(tr);
            });
        }

        function renderTags(container, tags) {
            if (!container) return;
            container.innerHTML = '';

            if (!tags || tags.length === 0) {
                const p = document.createElement('p');
                p.textContent = 'No tags for this trip yet.';
                container.appendChild(p);
                return;
            }

            tags.forEach(function(tag, index) {
                const link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.textContent = tag.name;
                link.setAttribute('data-action', 'tag-link');
                link.setAttribute('data-tag-id', tag.id);
                if (tag.slug) {
                    link.setAttribute('data-tag-slug', tag.slug);
                }
                container.appendChild(link);
                if (index < tags.length - 1) {
                    const sep = document.createElement('span');
                    sep.textContent = ', ';
                    container.appendChild(sep);
                }
            });
        }

        function renderFavoriteState() {
            if (favoriteLabelEl) {
                favoriteLabelEl.textContent = isFavorited ? 'Remove from favorites' : 'Mark as favorite';
            }
            if (favoriteStatusEl) {
                let text = isFavorited ? 'This trip is in your favorites.' : 'This trip is not in your favorites.';
                if (typeof favoritesCount === 'number') {
                    text += ' Total favorited trips: ' + favoritesCount + '.';
                }
                favoriteStatusEl.textContent = text;
            }
        }

        function renderAvailableItineraries(selectEl, itineraries) {
            if (!selectEl) return;
            while (selectEl.options.length > 1) {
                selectEl.remove(1);
            }
            if (!itineraries || itineraries.length === 0) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = 'No itineraries available';
                opt.disabled = true;
                selectEl.appendChild(opt);
                selectEl.disabled = true;
                return;
            }
            selectEl.disabled = false;
            itineraries.forEach(function(it) {
                const opt = document.createElement('option');
                opt.value = it.id;
                opt.textContent = it.name;
                selectEl.appendChild(opt);
            });
        }

        function renderComments(container, data) {
            if (!container) return;
            container.innerHTML = '';

            const comments = data && data.comments ? data.comments : [];
            if (comments.length === 0) {
                const p = document.createElement('p');
                p.textContent = 'No comments yet. Be the first to share your experience.';
                container.appendChild(p);
                return;
            }

            comments.forEach(function(comment) {
                const article = document.createElement('article');
                article.className = 'comment-item';

                const header = document.createElement('header');
                header.className = 'comment-header';

                const authorSpan = document.createElement('span');
                authorSpan.className = 'comment-author';
                authorSpan.textContent = comment.author_name || 'Anonymous';
                header.appendChild(authorSpan);

                const dateSpan = document.createElement('span');
                dateSpan.className = 'comment-date';
                dateSpan.textContent = ' ␀b7 ' + (comment.created_at ? formatDate(comment.created_at) : '');
                header.appendChild(dateSpan);

                if (comment.rating) {
                    const ratingSpan = document.createElement('span');
                    ratingSpan.className = 'comment-rating';
                    const parts = String(comment.rating).split('_');
                    const ratingValue = parts.length > 1 ? parseInt(parts[1], 10) : null;
                    if (Number.isFinite(ratingValue)) {
                        ratingSpan.textContent = ' ␀b7 Rating: ' + ratingValue + '/5';
                    }
                    header.appendChild(ratingSpan);
                }

                article.appendChild(header);

                const bodyP = document.createElement('p');
                bodyP.className = 'comment-body';
                bodyP.textContent = comment.body || '';
                article.appendChild(bodyP);

                container.appendChild(article);
            });
        }

        function renderCommentsPagination(container, data) {
            if (!container) return;
            container.innerHTML = '';

            const totalCount = typeof data.total_count === 'number' ? data.total_count : 0;
            const pageSize = typeof data.page_size === 'number' && data.page_size > 0 ? data.page_size : totalCount || 1;
            const currentPage = typeof data.page === 'number' && data.page > 0 ? data.page : 1;
            const totalPages = pageSize > 0 ? Math.ceil(totalCount / pageSize) : 1;

            commentsState.totalCount = totalCount;
            commentsState.page = currentPage;
            commentsState.pageSize = pageSize;

            if (totalPages <= 1) {
                return;
            }

            const infoSpan = document.createElement('span');
            infoSpan.className = 'comments-page-info';
            infoSpan.textContent = 'Page ' + currentPage + ' of ' + totalPages;
            container.appendChild(infoSpan);

            const controlsSpan = document.createElement('span');
            controlsSpan.className = 'comments-page-controls';

            if (currentPage > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.type = 'button';
                prevBtn.textContent = 'Previous';
                prevBtn.setAttribute('data-action', 'comments-page');
                prevBtn.setAttribute('data-page', String(currentPage - 1));
                controlsSpan.appendChild(prevBtn);
            }

            for (let p = 1; p <= totalPages; p += 1) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = String(p);
                btn.setAttribute('data-action', 'comments-page');
                btn.setAttribute('data-page', String(p));
                if (p === currentPage) {
                    btn.disabled = true;
                }
                controlsSpan.appendChild(btn);
            }

            if (currentPage < totalPages) {
                const nextBtn = document.createElement('button');
                nextBtn.type = 'button';
                nextBtn.textContent = 'Next';
                nextBtn.setAttribute('data-action', 'comments-page');
                nextBtn.setAttribute('data-page', String(currentPage + 1));
                controlsSpan.appendChild(nextBtn);
            }

            container.appendChild(controlsSpan);
        }

        function loadTripDetail() {
            if (!tripId) {
                showGlobalError('No trip selected. This page requires an id parameter in the URL.');
                return;
            }
            try {
                const detail = WebsiteSDK.getTripDetail(tripId);
                if (!detail || !detail.trip) {
                    showGlobalError('Trip not found.');
                    return;
                }
                tripDetail = detail;

                renderTripHeader(detail);

                const statsContainer = document.querySelector('[data-populate="trip-stats"]');
                if (statsContainer) {
                    renderTripStats(statsContainer, detail.trip);
                }

                const mapContainer = document.querySelector('[data-populate="trip-map"]');
                if (mapContainer) {
                    renderMapPlaceholder(mapContainer, detail);
                }

                const stopsContainer = document.querySelector('[data-populate="trip-charging-stops"]');
                if (stopsContainer) {
                    renderChargingStops(stopsContainer, detail.charging_stops || []);
                }

                const tagsContainer = document.querySelector('[data-populate="trip-tags"]');
                if (tagsContainer) {
                    renderTags(tagsContainer, detail.tags || []);
                }

                isFavorited = detail.is_favorited === true;
                favoritesCount = null;
                renderFavoriteState();

                if (itinerarySelectEl) {
                    renderAvailableItineraries(itinerarySelectEl, detail.available_itineraries || []);
                }
            } catch (e) {
                console.error('Error loading trip detail:', e);
                showGlobalError('Failed to load trip details. Please try again later.');
            }
        }

        function loadComments() {
            if (!tripId) {
                if (commentsContainerEl) {
                    commentsContainerEl.innerHTML = '';
                }
                if (commentsPaginationEl) {
                    commentsPaginationEl.innerHTML = '';
                }
                return;
            }

            let pageParam = urlParams.get('comments_page');
            let page = pageParam ? parseInt(pageParam, 10) : undefined;
            if (!Number.isFinite(page) || page < 1) {
                page = undefined;
            }

            let pageSizeParam = urlParams.get('comments_page_size');
            let pageSize = pageSizeParam ? parseInt(pageSizeParam, 10) : undefined;
            if (!Number.isFinite(pageSize) || pageSize <= 0) {
                pageSize = undefined;
            }

            try {
                let response;
                if (page !== undefined && pageSize !== undefined) {
                    response = WebsiteSDK.getTripComments(tripId, page, pageSize);
                } else if (page !== undefined) {
                    response = WebsiteSDK.getTripComments(tripId, page);
                } else {
                    response = WebsiteSDK.getTripComments(tripId);
                }
                if (commentsContainerEl) {
                    renderComments(commentsContainerEl, response);
                }
                if (commentsPaginationEl) {
                    renderCommentsPagination(commentsPaginationEl, response);
                }
            } catch (e) {
                console.error('Error loading comments:', e);
                if (commentsContainerEl) {
                    commentsContainerEl.innerHTML = '';
                    const p = document.createElement('p');
                    p.textContent = 'Failed to load comments.';
                    commentsContainerEl.appendChild(p);
                }
                if (commentsPaginationEl) {
                    commentsPaginationEl.innerHTML = '';
                }
            }
        }

        function handleBackClick() {
            if (returnUrlParam) {
                let targetUrl;
                try {
                    targetUrl = decodeURIComponent(returnUrlParam);
                } catch (e) {
                    targetUrl = 'trip_log.html';
                }
                window.location.href = targetUrl;
            } else {
                window.location.href = 'trip_log.html';
            }
        }

        function handleToggleFavorite() {
            if (!tripId) {
                return;
            }
            const desired = !isFavorited;
            try {
                const result = WebsiteSDK.setTripFavorite(tripId, desired);
                if (result && result.success) {
                    isFavorited = result.is_favorited === true;
                    if (typeof result.favorites_count === 'number') {
                        favoritesCount = result.favorites_count;
                    }
                    renderFavoriteState();
                } else {
                    if (favoriteStatusEl) {
                        favoriteStatusEl.textContent = 'Could not update favorite status.';
                    }
                }
            } catch (e) {
                console.error('Error toggling favorite:', e);
                if (favoriteStatusEl) {
                    favoriteStatusEl.textContent = 'Error updating favorite status.';
                }
            }
        }

        function handleAddToItinerarySubmit(event) {
            event.preventDefault();
            if (!tripId || !itinerarySelectEl) {
                return;
            }
            const itineraryId = itinerarySelectEl.value;
            if (!itineraryId) {
                if (itineraryFeedbackEl) {
                    itineraryFeedbackEl.textContent = 'Please select an itinerary first.';
                }
                return;
            }
            try {
                const result = WebsiteSDK.addTripToItinerary(itineraryId, tripId);
                if (result && result.success) {
                    if (itineraryFeedbackEl) {
                        let msg = 'Trip added to itinerary.';
                        if (typeof result.item_count === 'number' && typeof result.updated_total_distance_km === 'number') {
                            msg += ' Itinerary now has ' + result.item_count + ' items totaling ' + formatNumber(result.updated_total_distance_km, 0) + ' km.';
                        }
                        itineraryFeedbackEl.textContent = msg;
                    }
                } else if (itineraryFeedbackEl) {
                    itineraryFeedbackEl.textContent = 'Could not add trip to itinerary.';
                }
            } catch (e) {
                console.error('Error adding trip to itinerary:', e);
                if (itineraryFeedbackEl) {
                    itineraryFeedbackEl.textContent = 'Error adding trip to itinerary.';
                }
            }
        }

        function handleSubmitComment(event) {
            event.preventDefault();
            if (!tripId) {
                if (commentFeedbackEl) {
                    commentFeedbackEl.textContent = 'Cannot post comment: missing trip id.';
                }
                return;
            }
            const authorInput = document.getElementById('commentAuthor');
            const bodyInput = document.getElementById('commentBody');
            const ratingSelect = document.getElementById('commentRating');
            const authorName = authorInput ? authorInput.value.trim() : '';
            const body = bodyInput ? bodyInput.value.trim() : '';
            const rating = ratingSelect ? ratingSelect.value : '';

            if (!authorName || !body) {
                if (commentFeedbackEl) {
                    commentFeedbackEl.textContent = 'Name and comment are required.';
                }
                return;
            }

            try {
                let result;
                if (rating) {
                    result = WebsiteSDK.postTripComment(tripId, authorName, body, rating);
                } else {
                    result = WebsiteSDK.postTripComment(tripId, authorName, body);
                }
                if (result && result.success) {
                    if (authorInput) authorInput.value = '';
                    if (bodyInput) bodyInput.value = '';
                    if (ratingSelect) ratingSelect.value = '';
                    if (commentFeedbackEl) {
                        commentFeedbackEl.textContent = 'Comment posted successfully.';
                    }
                    if (window.location.hash !== '#comments') {
                        window.location.hash = '#comments';
                    }
                    loadComments();
                } else if (commentFeedbackEl) {
                    commentFeedbackEl.textContent = 'Could not post comment.';
                }
            } catch (e) {
                console.error('Error posting comment:', e);
                if (commentFeedbackEl) {
                    commentFeedbackEl.textContent = 'Error posting comment.';
                }
            }
        }

        document.addEventListener('click', function(evt) {
            const target = evt.target;
            if (!target || !target.getAttribute) return;
            const action = target.getAttribute('data-action');
            if (!action) return;

            if (action === 'back-to-trip-log') {
                evt.preventDefault();
                handleBackClick();
            } else if (action === 'toggle-favorite') {
                evt.preventDefault();
                handleToggleFavorite();
            } else if (action === 'comments-page') {
                evt.preventDefault();
                const pageValue = target.getAttribute('data-page');
                const pageNum = pageValue ? parseInt(pageValue, 10) : NaN;
                if (Number.isFinite(pageNum) && pageNum > 0) {
                    updateQueryParams({ comments_page: pageNum });
                }
            } else if (action === 'tag-link') {
                evt.preventDefault();
                const tagId = target.getAttribute('data-tag-id');
                const tagSlug = target.getAttribute('data-tag-slug');
                if (tagId) {
                    let url = 'tag_detail.html?id=' + encodeURIComponent(tagId);
                    if (tagSlug) {
                        url += '&slug=' + encodeURIComponent(tagSlug);
                    }
                    window.location.href = url;
                }
            }
        });

        const addToItineraryForm = document.querySelector('form[data-action="add-to-itinerary"]');
        if (addToItineraryForm) {
            addToItineraryForm.addEventListener('submit', handleAddToItinerarySubmit);
        }

        const commentForm = document.querySelector('form[data-action="submit-comment"]');
        if (commentForm) {
            commentForm.addEventListener('submit', handleSubmitComment);
        }

        loadTripDetail();
        loadComments();
    });
    </script>
</body>
</html>
