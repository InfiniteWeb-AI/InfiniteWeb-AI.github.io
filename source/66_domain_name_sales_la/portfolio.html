<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Domain Landing Framework</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'>

  <!-- Framework styles -->
  <link rel='stylesheet' href='framework.css'>
  <!-- Page-specific styles -->
  <link rel='stylesheet' href='portfolio.css'>
</head>
<body>
  <div class='page'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='brand'>
          <a href='index.html' class='brand-link' aria-label='Go to main domain page'>
            <span class='brand-mark'></span>
            <span class='brand-text'>Domain Landing</span>
          </a>
        </div>

        <nav class='main-nav' aria-label='Main navigation'>
          <ul class='nav-list'>
            <li class='nav-item'>
              <a href='index.html' class='nav-link'>Main Domain</a>
            </li>
            <li class='nav-item'>
              <a href='portfolio.html' class='nav-link'>More Domains</a>
            </li>
            <li class='nav-item'>
              <a href='how_it_works.html' class='nav-link'>How It Works</a>
            </li>
            <li class='nav-item'>
              <a href='index.html#faq' class='nav-link'>FAQ</a>
            </li>
            <li class='nav-item'>
              <a href='index.html#contact_seller' class='nav-link'>Contact</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <!-- Slim header controls bar: currency + cart summary -->
      <section class='portfolio-header-bar' data-component='header-currency-cart-bar'>
        <div class='layout-container'>
          <div class='portfolio-header-bar-inner' data-populate='header-currency-cart'>
            <!-- Populated via JS with currency selector and cart summary -->
          </div>
        </div>
      </section>

      <!-- Seller summary panel / hero-style context -->
      <section class='seller-summary-panel' data-component='seller-summary-panel'>
        <div class='layout-container'>
          <div class='seller-summary-inner' data-populate='seller-summary'>
            <!-- Populated via JS with seller name, description, and stats -->
          </div>
        </div>
      </section>

      <!-- Main two-column portfolio layout -->
      <section class='portfolio-main-section' aria-label='Seller domain portfolio'>
        <div class='layout-container portfolio-grid'>
          <!-- Left column: filters and applied filter summary -->
          <aside class='portfolio-column portfolio-column-left'>
            <div class='card filter-card' data-component='portfolio-filter-bar'>
              <div class='card-body' data-populate='portfolio-filters'>
                <!-- Filter controls populated via JS -->
              </div>
            </div>

            <div class='applied-filter-summary card-light' data-component='applied-filter-summary'>
              <div class='applied-filter-summary-inner' data-populate='applied-filter-summary'>
                <!-- Applied filter chips and total count populated via JS -->
              </div>
            </div>
          </aside>

          <!-- Right column: sort controls and domain list -->
          <section class='portfolio-column portfolio-column-right'>
            <div class='portfolio-sort-bar' data-component='portfolio-sort-control'>
              <div class='portfolio-sort-inner' data-populate='portfolio-sort'>
                <!-- Sort controls populated via JS -->
              </div>
            </div>

            <div class='portfolio-domain-list' data-component='portfolio-domain-list'>
              <div class='portfolio-domain-list-inner' data-populate='portfolio-domains'>
                <!-- Domain rows populated via JS -->
              </div>
            </div>
          </section>
        </div>
      </section>

      <!-- Floating cart summary widget -->
      <aside class='cart-summary-floating' data-component='cart-summary-refresher'>
        <div class='cart-summary-floating-inner' data-populate='cart-summary-floating'>
          <!-- Floating cart summary populated via JS -->
        </div>
      </aside>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <ul class='footer-links'>
            <li class='footer-item'>
              <a href='about.html' class='footer-link'>About</a>
            </li>
            <li class='footer-item'>
              <a href='how_it_works.html' class='footer-link'>How It Works</a>
            </li>
            <li class='footer-item'>
              <a href='index.html#faq' class='footer-link'>FAQ</a>
            </li>
            <li class='footer-item'>
              <a href='index.html#support' class='footer-link'>Contact Support</a>
            </li>
            <li class='footer-item'>
              <a href='privacy.html' class='footer-link'>Privacy Policy</a>
            </li>
            <li class='footer-item'>
              <a href='terms.html' class='footer-link'>Terms &amp; Conditions</a>
            </li>
            <li class='footer-item'>
              <a href='cookies.html' class='footer-link'>Cookie Policy</a>
            </li>
          </ul>
        </nav>

        <p class='footer-meta'>
          <span class='footer-meta-primary'>&copy; <span data-year></span> Domain Landing.</span>
          <span class='footer-meta-secondary'>All rights reserved.</span>
        </p>
      </div>
    </footer>
  </div>

  <script>
    (function () {
      var yearSpan = document.querySelector('[data-year]');
      if (yearSpan) {
        yearSpan.textContent = new Date().getFullYear();
      }
    })();
  </script>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page-specific UI logic -->
  <script>
    (function () {
      'use strict';

      var pageData = {
        sitePreferences: null,
        supportedCurrencies: null,
        cartSummary: null,
        sellerInfo: null,
        filterOptions: null,
        portfolioResponse: null
      };

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getUrlParams() {
        return new URLSearchParams(window.location.search);
      }

      function parseFilterStateFromUrl() {
        var params = getUrlParams();
        return {
          seller: params.get('seller') || '',
          extension: params.get('extension') || '',
          maxPrice: params.get('maxPrice') || '',
          minNameLength: params.get('minNameLength') || '',
          maxNameLength: params.get('maxNameLength') || ''
        };
      }

      function parseSortStateFromUrl() {
        var params = getUrlParams();
        return {
          sort: params.get('sort') || '',
          dir: params.get('dir') || ''
        };
      }

      function computeSortByAndDirection(sortParam, dirParam) {
        var sortBy;
        var sortDirection;

        if (sortParam && (sortParam.slice(-4) === '_asc' || sortParam.slice(-5) === '_desc')) {
          if (sortParam.slice(-4) === '_asc') {
            sortBy = sortParam.slice(0, -4);
            sortDirection = 'asc';
          } else {
            sortBy = sortParam.slice(0, -5);
            sortDirection = 'desc';
          }
        } else {
          sortBy = sortParam || undefined;
          sortDirection = dirParam || undefined;
        }

        return {
          sortBy: sortBy,
          sortDirection: sortDirection
        };
      }

      function fetchPortfolioDomainsFromUrl() {
        var params = getUrlParams();
        var extensionParam = params.get('extension') || '';
        var maxPriceParam = params.get('maxPrice');
        var minNameLengthParam = params.get('minNameLength');
        var maxNameLengthParam = params.get('maxNameLength');
        var sortState = parseSortStateFromUrl();
        var sortMapping = computeSortByAndDirection(sortState.sort, sortState.dir);

        var extensionFilter = extensionParam || undefined;
        var maxPrice = maxPriceParam ? Number(maxPriceParam) : undefined;
        var minNameLength = minNameLengthParam ? Number(minNameLengthParam) : undefined;
        var maxNameLength = maxNameLengthParam ? Number(maxNameLengthParam) : undefined;
        var sortBy = sortMapping.sortBy;
        var sortDirection = sortMapping.sortDirection;

        var response;
        try {
          response = WebsiteSDK.getSellerPortfolioDomains(
            extensionFilter,
            maxPrice,
            minNameLength,
            maxNameLength,
            sortBy,
            sortDirection
          );
        } catch (e) {
          console.error('Error calling getSellerPortfolioDomains', e);
          response = null;
        }

        if (!response) {
          response = {
            domains: [],
            appliedFilters: {},
            appliedSort: {},
            totalCount: 0
          };
        }
        if (!response.domains) {
          response.domains = [];
        }
        if (!response.appliedFilters) {
          response.appliedFilters = {};
        }
        if (!response.appliedSort) {
          response.appliedSort = {};
        }
        if (typeof response.totalCount !== 'number') {
          response.totalCount = response.domains.length;
        }

        return response;
      }

      function updateUrlParamsAndRefresh(changes, useReplace) {
        var params = getUrlParams();
        var keys = Object.keys(changes);
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          var value = changes[key];
          if (value === null || value === undefined || value === '') {
            params.delete(key);
          } else {
            params.set(key, String(value));
          }
        }

        var newQuery = params.toString();
        var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
        if (useReplace) {
          window.history.replaceState({}, '', newUrl);
        } else {
          window.history.pushState({}, '', newUrl);
        }

        pageData.portfolioResponse = fetchPortfolioDomainsFromUrl();
        reRenderPortfolioSection();
      }

      function renderHeaderCurrencyCart(container) {
        var sitePrefs = pageData.sitePreferences || {};
        var supported = pageData.supportedCurrencies || {};
        var currencies = supported.currencies || [];
        var cartSummary = pageData.cartSummary || {};

        var selectedCurrency = sitePrefs.selectedCurrency || '';
        if (!selectedCurrency && currencies.length > 0) {
          for (var i = 0; i < currencies.length; i++) {
            if (currencies[i].isSelected) {
              selectedCurrency = currencies[i].code;
              break;
            }
          }
          if (!selectedCurrency && currencies[0] && currencies[0].code) {
            selectedCurrency = currencies[0].code;
          }
        }
        if (!selectedCurrency) {
          selectedCurrency = 'usd';
        }

        var optionsHtml = '';
        for (var j = 0; j < currencies.length; j++) {
          var cur = currencies[j];
          var isSelected = !!cur.isSelected || cur.code === selectedCurrency;
          optionsHtml += "<option value='" + escapeHtml(cur.code) + "'" + (isSelected ? ' selected' : '') + ">" + escapeHtml(cur.code.toUpperCase()) + '</option>';
        }

        var itemCount = typeof cartSummary.itemCount === 'number' ? cartSummary.itemCount : 0;
        var totalAmount = typeof cartSummary.totalAmount === 'number' ? cartSummary.totalAmount : null;
        var cartCurrency = cartSummary.currency || selectedCurrency;
        var totalDisplay = 'Cart';
        if (totalAmount !== null) {
          var amountFixed;
          try {
            amountFixed = totalAmount.toFixed(2);
          } catch (e) {
            amountFixed = String(totalAmount);
          }
          totalDisplay = cartCurrency.toUpperCase() + ' ' + amountFixed;
        }

        container.innerHTML = "" +
          "<div class='header-controls-inner'>" +
          "  <div class='header-controls-left'>" +
          "    <span class='seller-context-label'>Seller portfolio</span>" +
          "  </div>" +
          "  <div class='header-controls-right'>" +
          "    <label class='field-label' for='portfolioCurrencySelect'>Currency</label>" +
          "    <select id='portfolioCurrencySelect' class='field-select' data-action='change-currency'>" +
                 optionsHtml +
          "    </select>" +
          "    <button type='button' class='cart-icon-button' data-action='open-cart' aria-label='View cart'>" +
          "      <span class='cart-icon-symbol' aria-hidden='true'></span>" +
          "      <span class='cart-icon-badge' data-role='cart-count'>" + escapeHtml(itemCount) + "</span>" +
          "      <span class='cart-icon-total' data-role='cart-total'>" + escapeHtml(totalDisplay) + "</span>" +
          "    </button>" +
          "  </div>" +
          "</div>";
      }

      function renderSellerSummary(container) {
        var sellerInfo = pageData.sellerInfo || {};
        var seller = sellerInfo.seller || {};
        var stats = sellerInfo.portfolioStats || {};
        var response = pageData.portfolioResponse || {};

        var sellerName = seller.name || 'Seller portfolio';
        var sellerDescription = seller.description || '';
        if (!sellerDescription) {
          sellerDescription = 'Browse all domains currently offered by this seller.';
        }

        var totalDomains = typeof stats.totalDomains === 'number' ? stats.totalDomains : (typeof response.totalCount === 'number' ? response.totalCount : 0);
        var featuredDomains = typeof stats.featuredDomains === 'number' ? stats.featuredDomains : null;

        var statsParts = [];
        statsParts.push(totalDomains + ' domains');
        if (featuredDomains && featuredDomains > 0) {
          statsParts.push(featuredDomains + ' featured');
        }
        var statsLine = statsParts.join(' b7 ');

        container.innerHTML = "" +
          "<div class='seller-summary-text'>" +
          "  <h1 class='seller-title'>" + escapeHtml(sellerName) + "</h1>" +
          "  <p class='seller-description'>" + escapeHtml(sellerDescription) + "</p>" +
          "  <div class='seller-stats-line'>" + escapeHtml(statsLine) + "</div>" +
          "</div>";
      }

      function renderPortfolioFilters(container) {
        var filterOptions = pageData.filterOptions || {};
        var extensionOptions = filterOptions.extensionOptions || [];
        var nameLengthRanges = filterOptions.nameLengthRanges || [];
        var maxPriceDefault = filterOptions.maxPriceDefault;
        var filters = parseFilterStateFromUrl();

        var extensionSelectOptions = "<option value=''>All extensions</option>";
        for (var i = 0; i < extensionOptions.length; i++) {
          var opt = extensionOptions[i] || {};
          var value = opt.value || '';
          var label = opt.label || value || '';
          var selected = filters.extension && filters.extension === value;
          extensionSelectOptions += "<option value='" + escapeHtml(value) + "'" + (selected ? ' selected' : '') + ">" + escapeHtml(label) + '</option>';
        }

        var selectedRangeIndex = '';
        var minLen = filters.minNameLength ? Number(filters.minNameLength) : null;
        var maxLen = filters.maxNameLength ? Number(filters.maxNameLength) : null;
        for (var j = 0; j < nameLengthRanges.length; j++) {
          var range = nameLengthRanges[j] || {};
          var rMin = typeof range.min === 'number' ? range.min : null;
          var rMax = typeof range.max === 'number' ? range.max : null;
          if (minLen !== null && maxLen !== null && rMin === minLen && rMax === maxLen) {
            selectedRangeIndex = String(j);
            break;
          }
        }

        var nameLengthOptions = "<option value=''>Any length</option>";
        for (var k = 0; k < nameLengthRanges.length; k++) {
          var r = nameLengthRanges[k] || {};
          var labelText = r.label || '';
          var optionValue = String(k);
          var isSelected = selectedRangeIndex === optionValue;
          var minAttr = typeof r.min === 'number' ? String(r.min) : '';
          var maxAttr = typeof r.max === 'number' ? String(r.max) : '';
          nameLengthOptions += "<option value='" + escapeHtml(optionValue) + "' data-min='" + escapeHtml(minAttr) + "' data-max='" + escapeHtml(maxAttr) + "'" + (isSelected ? ' selected' : '') + ">" + escapeHtml(labelText) + '</option>';
        }

        var maxPriceValue = filters.maxPrice || '';
        var maxPricePlaceholder = '';
        if (typeof maxPriceDefault === 'number' && !maxPriceValue) {
          maxPricePlaceholder = 'Up to ' + maxPriceDefault;
        }

        container.innerHTML = "" +
          "<header class='card-header'>" +
          "  <h2 class='card-title'>Filter domains</h2>" +
          "</header>" +
          "<form class='filter-form' novalidate>" +
          "  <div class='form-group'>" +
          "    <label class='field-label' for='filterExtensionSelect'>Extension</label>" +
          "    <select id='filterExtensionSelect' class='field-select' data-action='change-extension-filter'>" +
                 extensionSelectOptions +
          "    </select>" +
          "  </div>" +
          "  <div class='form-group'>" +
          "    <label class='field-label' for='filterMaxPriceInput'>Maximum price</label>" +
          "    <input id='filterMaxPriceInput' class='field-input' type='number' min='0' step='1' " +
          (maxPriceValue ? "value='" + escapeHtml(maxPriceValue) + "'" : '') +
          (maxPricePlaceholder ? " placeholder='" + escapeHtml(maxPricePlaceholder) + "'" : '') +
          " data-action='change-max-price'>" +
          "  </div>" +
          "  <div class='form-group'>" +
          "    <label class='field-label' for='filterNameLengthSelect'>Name length</label>" +
          "    <select id='filterNameLengthSelect' class='field-select' data-action='change-name-length'>" +
                 nameLengthOptions +
          "    </select>" +
          "  </div>" +
          "  <div class='form-actions'>" +
          "    <button type='button' class='btn-secondary btn-small' data-action='reset-filters'>Reset filters</button>" +
          "  </div>" +
          "</form>";
      }

      function renderPortfolioSort(container) {
        var filterOptions = pageData.filterOptions || {};
        var sortOptions = filterOptions.sortOptions || [];
        var sortState = parseSortStateFromUrl();
        var currentSort = sortState.sort || (sortOptions[0] && sortOptions[0].code ? sortOptions[0].code : '');
        var currentDir = sortState.dir || '';

        if (!currentDir && currentSort) {
          if (currentSort.slice(-4) === '_asc') {
            currentDir = 'asc';
          } else if (currentSort.slice(-5) === '_desc') {
            currentDir = 'desc';
          } else {
            currentDir = 'asc';
          }
        }
        if (!currentDir) {
          currentDir = 'asc';
        }

        var sortOptionsHtml = '';
        for (var i = 0; i < sortOptions.length; i++) {
          var opt = sortOptions[i] || {};
          var code = opt.code || '';
          var label = opt.label || code || '';
          var selected = currentSort === code;
          sortOptionsHtml += "<option value='" + escapeHtml(code) + "'" + (selected ? ' selected' : '') + ">" + escapeHtml(label) + '</option>';
        }

        var dirLabel = currentDir === 'desc' ? 'Descending' : 'Ascending';

        container.innerHTML = "" +
          "<div class='sort-bar-inner'>" +
          "  <div class='sort-bar-label'>Sort</div>" +
          "  <div class='sort-bar-controls'>" +
          "    <select class='field-select sort-select' data-action='change-sort-option'>" +
                 sortOptionsHtml +
          "    </select>" +
          "    <button type='button' class='btn-ghost btn-icon' data-action='toggle-sort-direction' aria-label='Toggle sort direction'>" +
          "      <span class='sort-direction-label'>" + escapeHtml(dirLabel) + "</span>" +
          "    </button>" +
          "  </div>" +
          "</div>";
      }

      function renderPortfolioDomains(container) {
        var response = pageData.portfolioResponse || {};
        var domains = response.domains || [];
        var totalCount = typeof response.totalCount === 'number' ? response.totalCount : domains.length;

        if (!domains.length) {
          container.innerHTML = "" +
            "<div class='domain-list-empty card-light'>" +
            "  <p class='empty-title'>No domains match these filters.</p>" +
            "  <p class='empty-body'>Try adjusting or clearing your filters to see more domains from this seller.</p>" +
            "  <button type='button' class='btn-primary btn-small' data-action='clear-all-filters'>Clear all filters</button>" +
            "</div>";
          return;
        }

        var rowsHtml = '';
        for (var i = 0; i < domains.length; i++) {
          var d = domains[i] || {};
          var status = d.status || 'available';
          var priceDisplay = '';
          if (d.formattedPriceDisplay) {
            priceDisplay = d.formattedPriceDisplay;
          } else if (typeof d.buyNowPrice === 'number') {
            try {
              priceDisplay = d.buyNowPrice.toLocaleString();
            } catch (e) {
              priceDisplay = String(d.buyNowPrice);
            }
          }

          var actionsHtml = '';
          if (status === 'available') {
            actionsHtml = "" +
              "<button type='button' class='btn-secondary btn-xs' data-action='add-to-cart' data-domain-id='" + escapeHtml(d.id) + "'>Add to cart</button>" +
              "<button type='button' class='btn-primary btn-xs' data-action='buy-now' data-domain-id='" + escapeHtml(d.id) + "'>Buy now</button>";
          } else {
            actionsHtml = "<span class='domain-status-label status-" + escapeHtml(status) + "'>" + escapeHtml(status.replace(/_/g, ' ')) + '</span>';
          }

          var lengthInfo = '';
          if (typeof d.nameLength === 'number') {
            lengthInfo = d.nameLength + ' characters';
          }

          var categoryInfo = d.category ? d.category : '';

          rowsHtml += "" +
            "<article class='domain-row' data-action='domain-row-click' data-domain-id='" + escapeHtml(d.id) + "'>" +
            "  <div class='domain-row-main'>" +
            "    <h3 class='domain-name'>" + escapeHtml(d.name || '') + "</h3>" +
            "    <div class='domain-meta'>" +
            (lengthInfo ? "<span class='domain-meta-item'>" + escapeHtml(lengthInfo) + '</span>' : '') +
            (d.tld ? "<span class='domain-meta-item'>" + escapeHtml(d.tld) + '</span>' : '') +
            (categoryInfo ? "<span class='domain-meta-item'>" + escapeHtml(categoryInfo) + '</span>' : '') +
            "    </div>" +
            "  </div>" +
            "  <div class='domain-row-aside'>" +
            (priceDisplay ? "<div class='domain-price'>" + escapeHtml(priceDisplay) + '</div>' : "<div class='domain-price domain-price-missing'>Price on request</div>") +
            "    <div class='domain-row-actions'>" +
                   actionsHtml +
            "    </div>" +
            "  </div>" +
            "</article>";
        }

        container.innerHTML = "" +
          "<header class='domain-list-header'>" +
          "  <div class='domain-count'>" + escapeHtml(totalCount) + " domains</div>" +
          "</header>" +
          "<div class='domain-list-body'>" +
             rowsHtml +
          "</div>";
      }

      function renderAppliedFilterSummary(container) {
        var response = pageData.portfolioResponse || {};
        var applied = response.appliedFilters || {};
        var sort = response.appliedSort || {};
        var totalCount = typeof response.totalCount === 'number' ? response.totalCount : (response.domains || []).length;

        var filterChips = [];
        if (applied.extensionFilter) {
          filterChips.push({ key: 'extension', label: 'Extension: ' + applied.extensionFilter });
        }
        if (typeof applied.maxPrice === 'number') {
          filterChips.push({ key: 'maxPrice', label: 'Max price: ' + applied.maxPrice });
        }
        if ((typeof applied.minNameLength === 'number' && applied.minNameLength) || (typeof applied.maxNameLength === 'number' && applied.maxNameLength)) {
          var rangeLabel = 'Name length';
          if (typeof applied.minNameLength === 'number' && applied.minNameLength && typeof applied.maxNameLength === 'number' && applied.maxNameLength) {
            rangeLabel += ': ' + applied.minNameLength + 'a0b7a0' + applied.maxNameLength;
          } else if (typeof applied.minNameLength === 'number' && applied.minNameLength) {
            rangeLabel += ': b3 ' + applied.minNameLength;
          } else if (typeof applied.maxNameLength === 'number' && applied.maxNameLength) {
            rangeLabel += ': b1 ' + applied.maxNameLength;
          }
          filterChips.push({ key: 'nameLength', label: rangeLabel });
        }

        var chipsHtml = '';
        for (var i = 0; i < filterChips.length; i++) {
          var chip = filterChips[i];
          chipsHtml += "" +
            "<button type='button' class='filter-chip' data-action='remove-filter' data-filter-key='" + escapeHtml(chip.key) + "'>" +
            "  <span class='filter-chip-label'>" + escapeHtml(chip.label) + "</span>" +
            "  <span class='filter-chip-remove' aria-hidden='true'>&times;</span>" +
            "</button>";
        }

        var sortLabel = '';
        if (sort.sortBy) {
          var sortField = sort.sortBy.replace(/_/g, ' ');
          var dir = sort.sortDirection === 'desc' ? 'descending' : 'ascending';
          sortLabel = 'Sorted by ' + sortField + ' (' + dir + ')';
        }

        container.innerHTML = "" +
          "<div class='applied-summary-header'>" +
          "  <span class='applied-summary-title'>Active filters</span>" +
          "  <span class='applied-summary-count'>" + escapeHtml(totalCount) + " results</span>" +
          "</div>" +
          "<div class='applied-summary-body'>" +
          (chipsHtml ? chipsHtml : "<span class='applied-summary-empty'>No filters applied.</span>") +
          "</div>" +
          (sortLabel ? "<div class='applied-summary-sort'>" + escapeHtml(sortLabel) + '</div>' : '') +
          (chipsHtml ? "<div class='applied-summary-footer'><button type='button' class='btn-link btn-xs' data-action='clear-all-filters'>Clear all</button></div>" : '');
      }

      function renderFloatingCartSummary(container) {
        var cartSummary = pageData.cartSummary || {};
        var itemCount = typeof cartSummary.itemCount === 'number' ? cartSummary.itemCount : 0;
        var totalAmount = typeof cartSummary.totalAmount === 'number' ? cartSummary.totalAmount : null;
        var currency = cartSummary.currency || (pageData.sitePreferences && pageData.sitePreferences.selectedCurrency) || 'usd';

        var title = 'Cart';
        var body = 'No domains in cart yet.';
        if (itemCount > 0 && totalAmount !== null) {
          var amountFixed;
          try {
            amountFixed = totalAmount.toFixed(2);
          } catch (e) {
            amountFixed = String(totalAmount);
          }
          body = itemCount + (itemCount === 1 ? ' domain' : ' domains') + ' b7 ' + currency.toUpperCase() + ' ' + amountFixed;
        } else if (itemCount > 0) {
          body = itemCount + (itemCount === 1 ? ' domain' : ' domains') + ' in cart';
        }

        container.innerHTML = "" +
          "<div class='cart-summary-panel'>" +
          "  <div class='cart-summary-header'>" + escapeHtml(title) + "</div>" +
          "  <div class='cart-summary-body'>" + escapeHtml(body) + "</div>" +
          "  <div class='cart-summary-actions'>" +
          "    <button type='button' class='btn-primary btn-xs' data-action='open-cart'>View cart</button>" +
          "  </div>" +
          "</div>";
      }

      function renderAll() {
        var populateElements = document.querySelectorAll('[data-populate]');
        for (var i = 0; i < populateElements.length; i++) {
          var el = populateElements[i];
          var type = el.getAttribute('data-populate');
          if (type === 'header-currency-cart') {
            renderHeaderCurrencyCart(el);
          } else if (type === 'seller-summary') {
            renderSellerSummary(el);
          } else if (type === 'portfolio-filters') {
            renderPortfolioFilters(el);
          } else if (type === 'portfolio-sort') {
            renderPortfolioSort(el);
          } else if (type === 'portfolio-domains') {
            renderPortfolioDomains(el);
          } else if (type === 'applied-filter-summary') {
            renderAppliedFilterSummary(el);
          } else if (type === 'cart-summary-floating') {
            renderFloatingCartSummary(el);
          }
        }
      }

      function reRenderPortfolioSection() {
        var filtersEls = document.querySelectorAll("[data-populate='portfolio-filters']");
        for (var i = 0; i < filtersEls.length; i++) {
          renderPortfolioFilters(filtersEls[i]);
        }
        var sortEls = document.querySelectorAll("[data-populate='portfolio-sort']");
        for (var j = 0; j < sortEls.length; j++) {
          renderPortfolioSort(sortEls[j]);
        }
        var domainsEls = document.querySelectorAll("[data-populate='portfolio-domains']");
        for (var k = 0; k < domainsEls.length; k++) {
          renderPortfolioDomains(domainsEls[k]);
        }
        var summaryEls = document.querySelectorAll("[data-populate='applied-filter-summary']");
        for (var m = 0; m < summaryEls.length; m++) {
          renderAppliedFilterSummary(summaryEls[m]);
        }
      }

      function refreshCartSummaryAndRender() {
        try {
          pageData.cartSummary = WebsiteSDK.getCartIconSummary();
        } catch (e) {
          console.error('Error calling getCartIconSummary', e);
          pageData.cartSummary = {};
        }
        var headerEls = document.querySelectorAll("[data-populate='header-currency-cart']");
        for (var i = 0; i < headerEls.length; i++) {
          renderHeaderCurrencyCart(headerEls[i]);
        }
        var floatEls = document.querySelectorAll("[data-populate='cart-summary-floating']");
        for (var j = 0; j < floatEls.length; j++) {
          renderFloatingCartSummary(floatEls[j]);
        }
      }

      function handleCurrencyChange(selectEl) {
        var newCurrency = selectEl.value;
        if (!newCurrency) {
          return;
        }
        var result;
        try {
          result = WebsiteSDK.setSelectedCurrency(newCurrency);
        } catch (e) {
          console.error('Error calling setSelectedCurrency', e);
          return;
        }
        if (!result || result.success === false) {
          console.warn('setSelectedCurrency did not succeed');
        }
        try {
          pageData.sitePreferences = WebsiteSDK.getSitePreferences();
        } catch (e2) {
          console.error('Error refreshing site preferences', e2);
        }
        try {
          pageData.supportedCurrencies = WebsiteSDK.getSupportedCurrencies();
        } catch (e3) {
          console.error('Error refreshing supported currencies', e3);
        }
        pageData.portfolioResponse = fetchPortfolioDomainsFromUrl();
        refreshCartSummaryAndRender();
        reRenderPortfolioSection();
      }

      function navigateToCart() {
        var params = getUrlParams();
        var seller = params.get('seller');
        var url = 'cart.html';
        if (seller) {
          url += '?seller=' + encodeURIComponent(seller);
        }
        window.location.href = url;
      }

      function handleAddToCart(buttonEl) {
        var domainId = buttonEl.getAttribute('data-domain-id');
        if (!domainId) {
          var row = buttonEl.closest('.domain-row');
          if (row) {
            domainId = row.getAttribute('data-domain-id');
          }
        }
        if (!domainId) {
          return;
        }
        var result;
        try {
          result = WebsiteSDK.addDomainToCart(domainId, 'one_time', undefined, 1);
        } catch (e) {
          console.error('Error calling addDomainToCart', e);
          return;
        }
        if (!result || result.success === false) {
          console.warn('addDomainToCart did not succeed');
        }
        buttonEl.disabled = true;
        var originalText = buttonEl.textContent;
        buttonEl.textContent = 'Added';
        setTimeout(function () {
          buttonEl.disabled = false;
          buttonEl.textContent = originalText;
        }, 1200);
        refreshCartSummaryAndRender();
      }

      function handleBuyNow(buttonEl) {
        var domainId = buttonEl.getAttribute('data-domain-id');
        if (!domainId) {
          var row = buttonEl.closest('.domain-row');
          if (row) {
            domainId = row.getAttribute('data-domain-id');
          }
        }
        if (!domainId) {
          return;
        }
        var result;
        try {
          result = WebsiteSDK.startOneTimeCheckoutForDomain(domainId);
        } catch (e) {
          console.error('Error calling startOneTimeCheckoutForDomain', e);
          return;
        }
        if (!result || !result.checkoutDraftId) {
          console.warn('startOneTimeCheckoutForDomain did not return a checkoutDraftId');
          return;
        }
        var draftId = result.checkoutDraftId;
        var url = 'checkout.html?mode=one_time&source=buy_now_from_portfolio&checkoutDraftId=' + encodeURIComponent(draftId);
        window.location.href = url;
      }

      function handleDomainRowClick(rowEl) {
        var domainId = rowEl.getAttribute('data-domain-id');
        if (!domainId) {
          return;
        }
        var url = 'domain.html?id=' + encodeURIComponent(domainId);
        window.location.href = url;
      }

      function handleRemoveFilter(filterKey) {
        var changes = {};
        if (filterKey === 'extension') {
          changes.extension = null;
        } else if (filterKey === 'maxPrice') {
          changes.maxPrice = null;
        } else if (filterKey === 'nameLength') {
          changes.minNameLength = null;
          changes.maxNameLength = null;
        }
        updateUrlParamsAndRefresh(changes, false);
      }

      function clearAllFilters() {
        var changes = {
          extension: null,
          maxPrice: null,
          minNameLength: null,
          maxNameLength: null
        };
        updateUrlParamsAndRefresh(changes, false);
      }

      function resetFilters() {
        clearAllFilters();
      }

      function handleSortOptionChange(selectEl) {
        var code = selectEl.value || '';
        var sortState = parseSortStateFromUrl();
        var currentDir = sortState.dir || 'asc';
        var changes = {};
        if (!code) {
          changes.sort = null;
          changes.dir = null;
        } else if (code.slice(-4) === '_asc' || code.slice(-5) === '_desc') {
          changes.sort = code;
          changes.dir = null;
        } else {
          changes.sort = code;
          changes.dir = currentDir || 'asc';
        }
        updateUrlParamsAndRefresh(changes, false);
      }

      function handleSortDirectionToggle() {
        var sortState = parseSortStateFromUrl();
        var currentDir = sortState.dir || '';
        if (!currentDir && sortState.sort) {
          if (sortState.sort.slice(-4) === '_asc') {
            currentDir = 'asc';
          } else if (sortState.sort.slice(-5) === '_desc') {
            currentDir = 'desc';
          }
        }
        if (!currentDir) {
          currentDir = 'asc';
        }
        var newDir = currentDir === 'desc' ? 'asc' : 'desc';
        var changes = {
          dir: newDir
        };
        updateUrlParamsAndRefresh(changes, false);
      }

      function setupEventHandlers() {
        document.addEventListener('click', function (event) {
          var actionEl = event.target.closest('[data-action]');
          if (!actionEl) {
            return;
          }
          var action = actionEl.getAttribute('data-action');
          if (action === 'open-cart') {
            event.preventDefault();
            navigateToCart();
          } else if (action === 'add-to-cart') {
            event.preventDefault();
            event.stopPropagation();
            handleAddToCart(actionEl);
          } else if (action === 'buy-now') {
            event.preventDefault();
            event.stopPropagation();
            handleBuyNow(actionEl);
          } else if (action === 'domain-row-click') {
            event.preventDefault();
            handleDomainRowClick(actionEl);
          } else if (action === 'reset-filters') {
            event.preventDefault();
            resetFilters();
          } else if (action === 'clear-all-filters') {
            event.preventDefault();
            clearAllFilters();
          } else if (action === 'remove-filter') {
            event.preventDefault();
            var key = actionEl.getAttribute('data-filter-key');
            if (key) {
              handleRemoveFilter(key);
            }
          } else if (action === 'toggle-sort-direction') {
            event.preventDefault();
            handleSortDirectionToggle();
          }
        });

        document.addEventListener('change', function (event) {
          var actionEl = event.target.closest('[data-action]');
          if (!actionEl) {
            return;
          }
          var action = actionEl.getAttribute('data-action');
          if (action === 'change-currency') {
            handleCurrencyChange(actionEl);
          } else if (action === 'change-extension-filter') {
            var value = actionEl.value || '';
            updateUrlParamsAndRefresh({ extension: value || null }, false);
          } else if (action === 'change-max-price') {
            var v = actionEl.value;
            var num = v ? Number(v) : null;
            if (num !== null && !isFinite(num)) {
              num = null;
            }
            updateUrlParamsAndRefresh({ maxPrice: num }, false);
          } else if (action === 'change-name-length') {
            var selectedIndex = actionEl.selectedIndex;
            var opt = selectedIndex >= 0 ? actionEl.options[selectedIndex] : null;
            var minAttr = opt && opt.getAttribute('data-min');
            var maxAttr = opt && opt.getAttribute('data-max');
            var minVal = minAttr ? Number(minAttr) : null;
            var maxVal = maxAttr ? Number(maxAttr) : null;
            var changes = {
              minNameLength: minVal,
              maxNameLength: maxVal
            };
            if (minVal === null) {
              changes.minNameLength = null;
            }
            if (maxVal === null) {
              changes.maxNameLength = null;
            }
            updateUrlParamsAndRefresh(changes, false);
          } else if (action === 'change-sort-option') {
            handleSortOptionChange(actionEl);
          }
        });

        window.addEventListener('popstate', function () {
          pageData.portfolioResponse = fetchPortfolioDomainsFromUrl();
          reRenderPortfolioSection();
        });
      }

      function initializePage() {
        try {
          pageData.sitePreferences = WebsiteSDK.getSitePreferences();
        } catch (e1) {
          console.error('Error calling getSitePreferences', e1);
          pageData.sitePreferences = { selectedCurrency: 'usd' };
        }

        try {
          pageData.supportedCurrencies = WebsiteSDK.getSupportedCurrencies();
        } catch (e2) {
          console.error('Error calling getSupportedCurrencies', e2);
          pageData.supportedCurrencies = { currencies: [] };
        }

        try {
          pageData.cartSummary = WebsiteSDK.getCartIconSummary();
        } catch (e3) {
          console.error('Error calling getCartIconSummary', e3);
          pageData.cartSummary = {};
        }

        try {
          pageData.sellerInfo = WebsiteSDK.getSellerInfoForCurrentContext();
        } catch (e4) {
          console.error('Error calling getSellerInfoForCurrentContext', e4);
          pageData.sellerInfo = {};
        }

        try {
          pageData.filterOptions = WebsiteSDK.getPortfolioFilterOptions();
        } catch (e5) {
          console.error('Error calling getPortfolioFilterOptions', e5);
          pageData.filterOptions = {};
        }

        pageData.portfolioResponse = fetchPortfolioDomainsFromUrl();

        renderAll();
        setupEventHandlers();
      }

      document.addEventListener('DOMContentLoaded', initializePage);
    })();
  </script>
</body>
</html>
