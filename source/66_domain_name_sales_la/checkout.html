<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Checkout - Domain Landing</title>
  <meta name='description' content='Secure checkout for your domain purchase. Review your domains, enter buyer details, choose payment, and continue to secure payment processing.'>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'>

  <!-- Framework styles -->
  <link rel='stylesheet' href='framework.css'>
  <!-- Checkout page styles -->
  <link rel='stylesheet' href='checkout.css'>
</head>
<body>
  <div class='page'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='brand'>
          <a href='index.html' class='brand-link' aria-label='Go to main domain page'>
            <span class='brand-mark'></span>
            <span class='brand-text'>Domain Landing</span>
          </a>
        </div>

        <nav class='main-nav' aria-label='Main navigation'>
          <ul class='nav-list'>
            <li class='nav-item'>
              <a href='index.html' class='nav-link'>Main Domain</a>
            </li>
            <li class='nav-item'>
              <a href='portfolio.html' class='nav-link'>More Domains</a>
            </li>
            <li class='nav-item'>
              <a href='how_it_works.html' class='nav-link'>How It Works</a>
            </li>
            <li class='nav-item'>
              <a href='index.html#faq' class='nav-link'>FAQ</a>
            </li>
            <li class='nav-item'>
              <a href='index.html#contact_seller' class='nav-link'>Contact</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <article class='checkout-page' data-component='checkout-page-controller'>
        <!-- Slim checkout header bar within main content -->
        <section class='checkout-header-bar' data-component='checkout-header' aria-label='Checkout header'>
          <div class='checkout-header-inner'>
            <div class='checkout-header-title'>
              <h1 class='checkout-title'>Checkout</h1>
              <p class='checkout-subtitle' data-populate='checkout-mode-label'></p>
            </div>
            <div class='checkout-header-controls'>
              <div class='checkout-header-control' data-component='currency-selector' data-populate='currency-selector' aria-label='Currency selector'></div>
              <button type='button' class='checkout-header-control cart-icon-summary-button' data-component='cart-icon-summary' data-populate='cart-icon-summary' data-action='click-cart' aria-label='View cart summary'></button>
            </div>
          </div>
        </section>

        <!-- Cinematic but minimal hero focused on the domains being purchased -->
        <section class='checkout-hero' data-populate='checkout-hero' aria-label='Order context'>
          <!-- Content populated via JS based on checkout items -->
        </section>

        <!-- Main two-column checkout section -->
        <section class='checkout-main-section' aria-label='Checkout details'>
          <div class='checkout-main-inner'>
            <div class='checkout-layout'>
              <!-- Left column: Order summary + payment methods -->
              <div class='checkout-column checkout-column--left'>
                <section class='card checkout-card checkout-order-summary-card' data-component='checkout-order-summary' data-populate='checkout-order-summary' aria-label='Order summary'>
                  <!-- Order summary populated via JS -->
                </section>

                <section class='card checkout-card checkout-payment-methods-card' data-component='payment-method-selector' data-populate='payment-method-selector' aria-label='Payment options'>
                  <!-- Payment methods populated via JS -->
                </section>
              </div>

              <!-- Right column: Buyer info form + submit controls -->
              <div class='checkout-column checkout-column--right'>
                <form class='card checkout-card checkout-form-card' data-component='checkout-form' novalidate>
                  <div data-component='buyer-info-form' data-populate='buyer-info-form'>
                    <!-- Buyer info fields populated via JS -->
                  </div>

                  <div class='checkout-form-divider' aria-hidden='true'></div>

                  <div class='checkout-form-footer' data-populate='checkout-form-footer'>
                    <!-- Submit button and small total summary populated via JS -->
                  </div>

                  <div class='checkout-form-status'>
                    <p class='checkout-status-message' data-populate='checkout-status-message' role='status' aria-live='polite'></p>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </section>
      </article>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <ul class='footer-links'>
            <li class='footer-item'>
              <a href='about.html' class='footer-link'>About</a>
            </li>
            <li class='footer-item'>
              <a href='how_it_works.html' class='footer-link'>How It Works</a>
            </li>
            <li class='footer-item'>
              <a href='index.html#faq' class='footer-link'>FAQ</a>
            </li>
            <li class='footer-item'>
              <a href='index.html#support' class='footer-link'>Contact Support</a>
            </li>
            <li class='footer-item'>
              <a href='privacy.html' class='footer-link'>Privacy Policy</a>
            </li>
            <li class='footer-item'>
              <a href='terms.html' class='footer-link'>Terms &amp; Conditions</a>
            </li>
            <li class='footer-item'>
              <a href='cookies.html' class='footer-link'>Cookie Policy</a>
            </li>
          </ul>
        </nav>

        <p class='footer-meta'>
          <span class='footer-meta-primary'>&copy; <span data-year></span> Domain Landing.</span>
          <span class='footer-meta-secondary'>All rights reserved.</span>
        </p>
      </div>
    </footer>
  </div>

  <script>
    (function () {
      var yearSpan = document.querySelector('[data-year]');
      if (yearSpan) {
        yearSpan.textContent = new Date().getFullYear();
      }
    })();
  </script>

  <!-- SDK / business logic for WebsiteSDK -->
  <script src='business_logic.js'></script>

  <!-- Checkout page controller & UI logic -->
  <script>
    (function () {
      'use strict';

      var checkoutState = {
        urlMode: null,
        urlSource: null,
        sitePreferences: null,
        supportedCurrencies: null,
        cartIconSummary: null,
        checkoutPageData: null,
        selectedPaymentMethod: null,
        selectedPaymentSchedule: null,
        buyerFullName: '',
        buyerEmail: '',
        billingCountry: '',
        billingAddress: '',
        isSubmitting: false,
        dataLoadError: '',
        submitMessage: '',
        submitError: ''
      };

      function getUrlParams() {
        var params = new URLSearchParams(window.location.search);
        return {
          mode: params.get('mode'),
          source: params.get('source')
        };
      }

      function initializeStateFromCheckoutData(preserveExistingBuyerInfo) {
        var data = checkoutState.checkoutPageData;
        if (!data) {
          return;
        }

        var buyerDefaults = data.buyerInfoDefaults || {};
        if (!preserveExistingBuyerInfo) {
          checkoutState.buyerFullName = buyerDefaults.fullName || '';
          checkoutState.buyerEmail = buyerDefaults.email || '';
          checkoutState.billingCountry = buyerDefaults.billingCountry || '';
          checkoutState.billingAddress = '';
        } else {
          if (!checkoutState.buyerFullName) {
            checkoutState.buyerFullName = buyerDefaults.fullName || '';
          }
          if (!checkoutState.buyerEmail) {
            checkoutState.buyerEmail = buyerDefaults.email || '';
          }
          if (!checkoutState.billingCountry) {
            checkoutState.billingCountry = buyerDefaults.billingCountry || '';
          }
        }

        var methods = data.availablePaymentMethods || [];
        var existingMethod = checkoutState.selectedPaymentMethod;
        var methodCodes = methods.map(function (m) { return m.code; });
        var defaultMethod = null;
        for (var i = 0; i < methods.length; i++) {
          if (methods[i].isDefault) {
            defaultMethod = methods[i];
            break;
          }
        }
        if (!defaultMethod && methods.length > 0) {
          defaultMethod = methods[0];
        }
        if (existingMethod && methodCodes.indexOf(existingMethod) !== -1) {
          checkoutState.selectedPaymentMethod = existingMethod;
        } else {
          checkoutState.selectedPaymentMethod = defaultMethod ? defaultMethod.code : null;
        }

        var schedules = data.availablePaymentSchedules || [];
        var existingSchedule = checkoutState.selectedPaymentSchedule;
        var scheduleCodes = schedules.map(function (s) { return s.code; });
        var defaultSchedule = null;
        for (var j = 0; j < schedules.length; j++) {
          if (schedules[j].isDefault) {
            defaultSchedule = schedules[j];
            break;
          }
        }
        if (!defaultSchedule && schedules.length > 0) {
          defaultSchedule = schedules[0];
        }
        if (existingSchedule && scheduleCodes.indexOf(existingSchedule) !== -1) {
          checkoutState.selectedPaymentSchedule = existingSchedule;
        } else {
          checkoutState.selectedPaymentSchedule = defaultSchedule ? defaultSchedule.code : null;
        }

        var countryOptions = data.billingCountryOptions || [];
        if (!checkoutState.billingCountry && countryOptions.length > 0) {
          checkoutState.billingCountry = countryOptions[0].code || countryOptions[0].name || '';
        }
      }

      function renderCurrencySelector(container) {
        container.innerHTML = '';
        var data = checkoutState.supportedCurrencies;
        if (!data || !data.currencies || !data.currencies.length) {
          container.textContent = '';
          return;
        }
        var select = document.createElement('select');
        select.className = 'currency-select';
        select.setAttribute('aria-label', 'Display currency');
        select.dataset.action = 'change-currency';

        for (var i = 0; i < data.currencies.length; i++) {
          var curr = data.currencies[i];
          var option = document.createElement('option');
          option.value = curr.code;
          option.textContent = curr.code.toUpperCase();
          if (curr.isSelected) {
            option.selected = true;
          }
          select.appendChild(option);
        }

        container.appendChild(select);
      }

      function formatCurrencyAmount(amount, currencyCode) {
        if (typeof amount !== 'number' || isNaN(amount)) {
          return '';
        }
        var code = (currencyCode || '').toUpperCase();
        return amount.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + (code ? ' ' + code : '');
      }

      function renderCartIconSummary(container) {
        container.innerHTML = '';
        var summary = checkoutState.cartIconSummary;
        var label = 'Cart';
        var details = '';
        if (summary) {
          var count = summary.itemCount || 0;
          var amountText = formatCurrencyAmount(summary.totalAmount || 0, summary.currency || '');
          label = count + (count === 1 ? ' item' : ' items');
          details = amountText ? ' · ' + amountText : '';
        }
        var html = "" +
          "<span class='cart-icon' aria-hidden='true'></span>" +
          "<span class='cart-label'>" + label + details + "</span>";
        container.innerHTML = html;
      }

      function renderCheckoutHero(container) {
        container.innerHTML = '';
        if (checkoutState.dataLoadError) {
          container.innerHTML = '<div class="checkout-hero-inner"><h2 class="hero-title">Checkout unavailable</h2><p class="hero-text">' + checkoutState.dataLoadError + '</p></div>';
          return;
        }
        var data = checkoutState.checkoutPageData;
        if (!data) {
          container.innerHTML = '<div class="checkout-hero-inner"><h2 class="hero-title">Loading your checkout...</h2></div>';
          return;
        }
        var items = data.items || [];
        var domainNames = [];
        for (var i = 0; i < items.length; i++) {
          if (items[i].name) {
            domainNames.push(items[i].name);
          }
        }
        var domainsText = domainNames.length ? domainNames.join(', ') : 'Selected domains';
        var modeLabel = '';
        if (data.mode === 'lease') {
          modeLabel = 'Lease-to-own checkout';
        } else {
          modeLabel = 'One-time purchase checkout';
        }
        var reassurance = data.mode === 'lease'
          ? 'Secure lease-to-own payments with full domain transfer after completion.'
          : 'Secure payment with fast domain transfer after purchase is completed.';

        var heroHtml = "" +
          "<div class='checkout-hero-inner'>" +
          "  <p class='hero-kicker'>" + modeLabel + "</p>" +
          "  <h2 class='hero-title'>Complete your purchase</h2>" +
          "  <p class='hero-domains'>" + domainsText + "</p>" +
          "  <p class='hero-text'>" + reassurance + "</p>" +
          "</div>";
        container.innerHTML = heroHtml;
      }

      function renderCheckoutModeLabel(container) {
        container.textContent = '';
        var data = checkoutState.checkoutPageData;
        if (!data) {
          return;
        }
        var pieces = [];
        if (data.mode === 'lease') {
          pieces.push('Lease checkout');
        } else {
          pieces.push('One-time checkout');
        }
        if (data.source === 'cart') {
          pieces.push('from cart');
        } else if (data.source === 'buy_now_button') {
          pieces.push('from Buy Now');
        } else if (data.source === 'lease_plans') {
          pieces.push('from lease plans');
        }
        container.textContent = pieces.join(' · ');
      }

      function renderCheckoutOrderSummary(container) {
        container.innerHTML = '';
        if (checkoutState.dataLoadError) {
          container.innerHTML = '<h2 class="card-title">Order summary</h2><p class="card-text">' + checkoutState.dataLoadError + '</p>';
          return;
        }
        var data = checkoutState.checkoutPageData;
        if (!data) {
          container.innerHTML = '<h2 class="card-title">Order summary</h2><p class="card-text">Loading order details...</p>';
          return;
        }
        var items = data.items || [];
        var totalText = formatCurrencyAmount(data.totalAmount || 0, data.currency || '');

        var itemsHtml = '';
        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          var typeLabel = item.type === 'lease' ? 'Lease' : 'One-time';
          var priceDisplay = item.formattedPriceDisplay || '';
          itemsHtml += "<div class='order-item'>" +
            "<div class='order-item-main'>" +
            "  <span class='order-item-name'>" + (item.name || '') + "</span>" +
            "  <span class='order-item-type'>" + typeLabel + "</span>" +
            "</div>" +
            "<div class='order-item-price'>" + priceDisplay + "</div>" +
            "</div>";
        }
        if (!itemsHtml) {
          itemsHtml = "<p class='card-text'>Your checkout is currently empty.</p>";
        }

        var leaseHtml = '';
        var leasePlan = data.leasePlan;
        if (leasePlan && data.mode === 'lease') {
          var duration = leasePlan.durationMonths || '';
          var monthly = typeof leasePlan.monthlyPrice === 'number' ? formatCurrencyAmount(leasePlan.monthlyPrice, leasePlan.currency) : '';
          var totalLease = typeof leasePlan.totalPrice === 'number' ? formatCurrencyAmount(leasePlan.totalPrice, leasePlan.currency) : '';
          leaseHtml = "" +
            "<div class='lease-summary'>" +
            "  <h3 class='lease-title'>Lease plan</h3>" +
            "  <p class='lease-name'>" + (leasePlan.name || '') + "</p>" +
            "  <p class='lease-details'>" + (duration ? duration + ' months' : '') + (monthly ? ' · ' + monthly + ' / month' : '') + "</p>" +
            (totalLease ? "  <p class='lease-total'>Total over term: " + totalLease + "</p>" : '') +
            "</div>";
        }

        var editCartHtml = "" +
          "<button type='button' class='link-button edit-cart-link' data-action='back-to-cart'>Edit cart</button>";

        var cardHtml = "" +
          "<div class='card-header-row'>" +
          "  <h2 class='card-title'>Order summary</h2>" +
          "  <div class='card-header-side'>" + editCartHtml + "</div>" +
          "</div>" +
          "<div class='order-items'>" + itemsHtml + "</div>" +
          (leaseHtml ? "<div class='order-lease'>" + leaseHtml + "</div>" : '') +
          "<div class='order-total-row'>" +
          "  <span class='order-total-label'>Total due now</span>" +
          "  <span class='order-total-value'>" + totalText + "</span>" +
          "</div>";

        container.innerHTML = cardHtml;
      }

      function renderPaymentMethodSelector(container) {
        container.innerHTML = '';
        if (checkoutState.dataLoadError) {
          container.innerHTML = '<h2 class="card-title">Payment method</h2><p class="card-text">' + checkoutState.dataLoadError + '</p>';
          return;
        }
        var data = checkoutState.checkoutPageData;
        if (!data) {
          container.innerHTML = '<h2 class="card-title">Payment method</h2><p class="card-text">Loading payment options...</p>';
          return;
        }
        var methods = data.availablePaymentMethods || [];
        var schedules = data.availablePaymentSchedules || [];

        var methodsHtml = '';
        if (!methods.length) {
          methodsHtml = "<p class='card-text'>No payment methods are currently available.</p>";
        } else {
          for (var i = 0; i < methods.length; i++) {
            var method = methods[i];
            var checked = checkoutState.selectedPaymentMethod === method.code;
            methodsHtml += "" +
              "<label class='option-row'>" +
              "  <span class='option-control'>" +
              "    <input type='radio' name='paymentMethod' value='" + method.code + "' " + (checked ? 'checked' : '') + " data-action='payment-method-change'>" +
              "    <span class='option-indicator'></span>" +
              "  </span>" +
              "  <span class='option-label'>" + (method.label || method.code) + "</span>" +
              "</label>";
          }
        }

        var scheduleHtml = '';
        if (schedules.length) {
          var scheduleOptionsHtml = '';
          for (var j = 0; j < schedules.length; j++) {
            var schedule = schedules[j];
            var scheduleChecked = checkoutState.selectedPaymentSchedule === schedule.code;
            scheduleOptionsHtml += "" +
              "<label class='option-row option-row--sub'>" +
              "  <span class='option-control'>" +
              "    <input type='radio' name='paymentSchedule' value='" + schedule.code + "' " + (scheduleChecked ? 'checked' : '') + " data-action='payment-schedule-change'>" +
              "    <span class='option-indicator'></span>" +
              "  </span>" +
              "  <span class='option-label'>" + (schedule.label || schedule.code) + "</span>" +
              "</label>";
          }
          scheduleHtml = "" +
            "<div class='payment-schedule-group'>" +
            "  <h3 class='card-subtitle'>Payment schedule</h3>" +
            scheduleOptionsHtml +
            "</div>";
        }

        var cardHtml = "" +
          "<h2 class='card-title'>Payment</h2>" +
          "<div class='payment-method-group'>" + methodsHtml + "</div>" +
          scheduleHtml;

        container.innerHTML = cardHtml;
      }

      function renderBuyerInfoForm(container) {
        container.innerHTML = '';
        if (checkoutState.dataLoadError) {
          container.innerHTML = '<h2 class="card-title">Buyer details</h2><p class="card-text">' + checkoutState.dataLoadError + '</p>';
          return;
        }
        var data = checkoutState.checkoutPageData;
        var countryOptions = [];
        if (data && data.billingCountryOptions) {
          countryOptions = data.billingCountryOptions;
        }

        var optionsHtml = "<option value=''>Select billing country</option>";
        for (var i = 0; i < countryOptions.length; i++) {
          var opt = countryOptions[i];
          var value = opt.code || opt.name || '';
          var selected = checkoutState.billingCountry === value;
          optionsHtml += "<option value='" + value + "'" + (selected ? ' selected' : '') + ">" + (opt.name || opt.code || '') + "</option>";
        }

        var fullName = checkoutState.buyerFullName || '';
        var email = checkoutState.buyerEmail || '';
        var address = checkoutState.billingAddress || '';

        var html = "" +
          "<h2 class='card-title'>Buyer details</h2>" +
          "<div class='form-group'>" +
          "  <label for='buyerFullName'>Full name</label>" +
          "  <input id='buyerFullName' name='buyerFullName' type='text' class='text-input' autocomplete='name' placeholder='Enter your full name' value='" + fullName.replace(/"/g, '&quot;') + "' required data-action='buyer-full-name-change'>" +
          "</div>" +
          "<div class='form-group'>" +
          "  <label for='buyerEmail'>Email address</label>" +
          "  <input id='buyerEmail' name='buyerEmail' type='email' class='text-input' autocomplete='email' placeholder='you@example.com' value='" + email.replace(/"/g, '&quot;') + "' required data-action='buyer-email-change'>" +
          "</div>" +
          "<div class='form-group'>" +
          "  <label for='billingCountry'>Billing country</label>" +
          "  <select id='billingCountry' name='billingCountry' class='select-input' required data-action='billing-country-change'>" + optionsHtml + "</select>" +
          "</div>" +
          "<div class='form-group'>" +
          "  <label for='billingAddress'>Billing address (optional)</label>" +
          "  <input id='billingAddress' name='billingAddress' type='text' class='text-input' autocomplete='address-line1' placeholder='Street, city, ZIP' value='" + address.replace(/"/g, '&quot;') + "' data-action='billing-address-change'>" +
          "</div>";

        container.innerHTML = html;
      }

      function renderCheckoutFormFooter(container) {
        container.innerHTML = '';
        if (checkoutState.dataLoadError) {
          container.innerHTML = '<p class="card-text">' + checkoutState.dataLoadError + '</p>';
          return;
        }
        var data = checkoutState.checkoutPageData;
        if (!data) {
          container.innerHTML = '<p class="card-text">Loading checkout details...</p>';
          return;
        }
        var totalText = formatCurrencyAmount(data.totalAmount || 0, data.currency || '');
        var mode = data.mode === 'lease' ? 'lease' : 'one_time';
        var note = '';
        if (mode === 'lease') {
          note = 'First payment due now. Future payments will follow the schedule you selected.';
        } else {
          note = 'You will review and complete your payment on our secure payment provider.';
        }

        var buttonLabel = checkoutState.isSubmitting ? 'Processing…' : 'Continue to Secure Checkout';
        var disabledAttr = checkoutState.isSubmitting ? ' disabled' : '';

        var html = "" +
          "<div class='checkout-total-line'>" +
          "  <div class='checkout-total-text'>" +
          "    <span class='checkout-total-label'>Amount due now</span>" +
          "    <span class='checkout-total-value'>" + totalText + "</span>" +
          "  </div>" +
          "</div>" +
          "<p class='checkout-note'>" + note + "</p>" +
          "<div class='checkout-submit-row'>" +
          "  <button type='button' class='btn btn-primary checkout-submit-button' data-action='submit-checkout'" + disabledAttr + ">" + buttonLabel + "</button>" +
          "</div>" +
          "<p class='terms-text'>By continuing, you agree to the terms and conditions of this domain transaction.</p>";

        container.innerHTML = html;
      }

      function renderCheckoutStatusMessage(container) {
        var message = checkoutState.submitError || checkoutState.submitMessage || '';
        if (!message) {
          container.textContent = '';
          container.classList.remove('status-error');
          container.classList.remove('status-success');
          return;
        }
        container.textContent = message;
        if (checkoutState.submitError) {
          container.classList.add('status-error');
          container.classList.remove('status-success');
        } else {
          container.classList.remove('status-error');
          container.classList.add('status-success');
        }
      }

      function renderAll() {
        var populateElements = document.querySelectorAll('[data-populate]');
        for (var i = 0; i < populateElements.length; i++) {
          var el = populateElements[i];
          var type = el.getAttribute('data-populate');
          if (type === 'currency-selector') {
            renderCurrencySelector(el);
          } else if (type === 'cart-icon-summary') {
            renderCartIconSummary(el);
          } else if (type === 'checkout-hero') {
            renderCheckoutHero(el);
          } else if (type === 'checkout-mode-label') {
            renderCheckoutModeLabel(el);
          } else if (type === 'checkout-order-summary') {
            renderCheckoutOrderSummary(el);
          } else if (type === 'payment-method-selector') {
            renderPaymentMethodSelector(el);
          } else if (type === 'buyer-info-form') {
            renderBuyerInfoForm(el);
          } else if (type === 'checkout-form-footer') {
            renderCheckoutFormFooter(el);
          } else if (type === 'checkout-status-message') {
            renderCheckoutStatusMessage(el);
          }
        }
        attachEventHandlers();
      }

      function handleBuyerInfoChange(event) {
        var target = event.target;
        var action = target.getAttribute('data-action');
        var value = target.value;
        if (action === 'buyer-full-name-change') {
          checkoutState.buyerFullName = value;
        } else if (action === 'buyer-email-change') {
          checkoutState.buyerEmail = value;
        } else if (action === 'billing-country-change') {
          checkoutState.billingCountry = value;
        } else if (action === 'billing-address-change') {
          checkoutState.billingAddress = value;
        }
      }

      function handlePaymentMethodChange(event) {
        var target = event.target;
        if (target.name === 'paymentMethod') {
          checkoutState.selectedPaymentMethod = target.value;
        }
      }

      function handlePaymentScheduleChange(event) {
        var target = event.target;
        if (target.name === 'paymentSchedule') {
          checkoutState.selectedPaymentSchedule = target.value;
        }
      }

      function handleCurrencyChange(event) {
        var target = event.target;
        var newCode = target.value;
        if (!newCode) {
          return;
        }
        try {
          var result = WebsiteSDK.setSelectedCurrency(newCode);
          if (result && result.success) {
            try {
              checkoutState.supportedCurrencies = WebsiteSDK.getSupportedCurrencies();
            } catch (e1) {
              console.error('Error reloading currencies', e1);
            }
            try {
              checkoutState.cartIconSummary = WebsiteSDK.getCartIconSummary();
            } catch (e2) {
              console.error('Error reloading cart summary', e2);
            }
            try {
              checkoutState.checkoutPageData = WebsiteSDK.getCheckoutPageData();
              initializeStateFromCheckoutData(true);
              checkoutState.dataLoadError = '';
            } catch (e3) {
              console.error('Error reloading checkout data', e3);
              checkoutState.dataLoadError = 'Unable to reload checkout details for the selected currency. Please refresh the page.';
            }
          } else {
            checkoutState.submitError = (result && result.message) ? result.message : 'Unable to change currency at this time.';
          }
        } catch (err) {
          console.error('Currency change failed', err);
          checkoutState.submitError = 'Unable to change currency at this time.';
        }
        renderAll();
      }

      function handleClickCart() {
        window.location.href = 'cart.html';
      }

      function handleBackToCart() {
        window.location.href = 'cart.html';
      }

      function validateCheckoutInput() {
        var errors = [];
        if (!checkoutState.buyerFullName || !checkoutState.buyerFullName.replace(/\s+/g, '')) {
          errors.push('Full name is required.');
        }
        var email = checkoutState.buyerEmail || '';
        var emailPattern = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
        if (!emailPattern.test(email)) {
          errors.push('A valid email address is required.');
        }
        if (!checkoutState.billingCountry) {
          errors.push('Billing country is required.');
        }
        if (!checkoutState.selectedPaymentMethod) {
          errors.push('Please choose a payment method.');
        }
        return errors;
      }

      function handleCheckoutSubmit(event) {
        if (event) {
          event.preventDefault();
        }
        if (checkoutState.isSubmitting) {
          return;
        }
        checkoutState.submitError = '';
        checkoutState.submitMessage = '';

        var errors = validateCheckoutInput();
        if (errors.length) {
          checkoutState.submitError = errors.join(' ');
          renderAll();
          return;
        }

        checkoutState.isSubmitting = true;
        renderAll();

        try {
          var scheduleToSend = checkoutState.selectedPaymentSchedule || '';
          var response = WebsiteSDK.submitCheckoutPaymentDetails(
            checkoutState.selectedPaymentMethod,
            checkoutState.buyerFullName || '',
            checkoutState.buyerEmail || '',
            checkoutState.billingCountry || '',
            checkoutState.billingAddress || '',
            scheduleToSend
          );
          if (response) {
            var successStatuses = ['initiated', 'redirected_to_processor', 'completed'];
            if (successStatuses.indexOf(response.status) !== -1) {
              checkoutState.submitMessage = response.message || 'Proceeding to secure payment in a new window.';
              checkoutState.submitError = '';
              // In a real integration, redirect to the secure payment processor here
              // using response.checkoutSessionId and response.paymentMethod.
            } else {
              checkoutState.submitError = response.message || 'Unable to start checkout. Please review your details and try again.';
            }
          } else {
            checkoutState.submitError = 'Unexpected response from payment service.';
          }
        } catch (err) {
          console.error('Checkout submission failed', err);
          checkoutState.submitError = 'There was a problem submitting your details. Please try again.';
        }

        checkoutState.isSubmitting = false;
        renderAll();
      }

      function attachEventHandlers() {
        var actionElements = document.querySelectorAll('[data-action]');
        for (var i = 0; i < actionElements.length; i++) {
          var el = actionElements[i];
          if (el.dataset.bound === 'true') {
            continue;
          }
          var action = el.getAttribute('data-action');
          if (action === 'change-currency') {
            el.addEventListener('change', handleCurrencyChange);
          } else if (action === 'click-cart') {
            el.addEventListener('click', function (e) {
              e.preventDefault();
              handleClickCart();
            });
          } else if (action === 'back-to-cart') {
            el.addEventListener('click', function (e) {
              e.preventDefault();
              handleBackToCart();
            });
          } else if (action === 'payment-method-change') {
            el.addEventListener('change', handlePaymentMethodChange);
          } else if (action === 'payment-schedule-change') {
            el.addEventListener('change', handlePaymentScheduleChange);
          } else if (action === 'buyer-full-name-change' || action === 'buyer-email-change' || action === 'billing-country-change' || action === 'billing-address-change') {
            var eventName = action === 'billing-country-change' ? 'change' : 'input';
            el.addEventListener(eventName, handleBuyerInfoChange);
          } else if (action === 'submit-checkout') {
            el.addEventListener('click', handleCheckoutSubmit);
          }
          el.dataset.bound = 'true';
        }
      }

      function loadInitialData() {
        var params = getUrlParams();
        checkoutState.urlMode = params.mode;
        checkoutState.urlSource = params.source;

        try {
          checkoutState.sitePreferences = WebsiteSDK.getSitePreferences();
        } catch (e1) {
          console.error('Error loading site preferences', e1);
        }
        try {
          checkoutState.supportedCurrencies = WebsiteSDK.getSupportedCurrencies();
        } catch (e2) {
          console.error('Error loading supported currencies', e2);
        }
        try {
          checkoutState.cartIconSummary = WebsiteSDK.getCartIconSummary();
        } catch (e3) {
          console.error('Error loading cart summary', e3);
        }
        try {
          checkoutState.checkoutPageData = WebsiteSDK.getCheckoutPageData();
          checkoutState.dataLoadError = '';
          initializeStateFromCheckoutData(false);
        } catch (e4) {
          console.error('Error loading checkout page data', e4);
          checkoutState.checkoutPageData = null;
          checkoutState.dataLoadError = 'Unable to load your checkout details. Please refresh the page or try again later.';
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        loadInitialData();
        renderAll();
      });
    })();
  </script>
</body>
</html>
