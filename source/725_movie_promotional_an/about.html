<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movie Promo Framework</title>
  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <!-- Site Styles -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Page Styles -->
  <link rel="stylesheet" href="about.css" />
</head>
<body class="site-body">
  <!-- Cinematic full-bleed background image -->
  <div class="site-background" aria-hidden="true"></div>

  <div class="site-layout">
    <header class="site-header">
      <div class="site-header__overlay">
        <div class="site-header__inner">
          <nav class="primary-nav" aria-label="Main">
            <ul class="primary-nav__list">
              <li class="primary-nav__item">
                <a href="index.html" class="primary-nav__link">Home</a>
              </li>
              <li class="primary-nav__item">
                <a href="now_showing.html" class="primary-nav__link">Now Showing</a>
              </li>
              <li class="primary-nav__item">
                <a href="upcoming.html" class="primary-nav__link">Upcoming</a>
              </li>
              <li class="primary-nav__item">
                <a href="watchlist.html" class="primary-nav__link">Watchlist</a>
              </li>
              <li class="primary-nav__item">
                <a href="profile.html" class="primary-nav__link">Profile</a>
              </li>
              <li class="primary-nav__item">
                <a href="help.html" class="primary-nav__link">Help</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <section class="about-hero" aria-labelledby="about-page-title">
        <div class="about-panel card card-overlay" data-component="about-main-content">
          <header class="about-panel__header">
            <h1 id="about-page-title" class="about-panel__title" data-populate="informational-title">About Forever Cinema</h1>
            <div class="about-metadata" data-component="about-metadata-bar">
              <span class="about-metadata__label">Last updated</span>
              <time class="about-metadata__value" data-populate="informational-last-updated" datetime="">—</time>
            </div>
          </header>

          <div class="about-panel__body" data-populate="informational-body">
            <p class="about-panel__placeholder">Loading information…</p>
          </div>

          <nav class="about-section-nav" data-component="about-section-navigator" aria-label="About sections">
            <ul class="about-section-nav__list">
              <li class="about-section-nav__item">
                <button type="button" class="about-section-nav__link about-section-nav__link--active" data-action="about-section-link" data-section-target="">
                  Overview
                </button>
              </li>
              <li class="about-section-nav__item">
                <button type="button" class="about-section-nav__link" data-action="about-section-link" data-section-target="service">
                  Service
                </button>
              </li>
              <li class="about-section-nav__item">
                <button type="button" class="about-section-nav__link" data-action="about-section-link" data-section-target="cinemas">
                  Cinemas
                </button>
              </li>
              <li class="about-section-nav__item">
                <a href="help.html" class="about-section-nav__link">
                  Help &amp; FAQ
                </a>
              </li>
              <li class="about-section-nav__item">
                <a href="contact.html" class="about-section-nav__link">
                  Contact Us
                </a>
              </li>
            </ul>
          </nav>
        </div>

        <div class="about-loader" data-component="about-page-loader" hidden>
          <div class="about-loader__backdrop" aria-hidden="true"></div>
          <div class="about-loader__spinner" role="status" aria-live="polite" aria-label="Loading About information"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__overlay">
        <div class="site-footer__inner">
          <nav class="footer-nav" aria-label="Footer">
            <ul class="footer-nav__list">
              <li class="footer-nav__item">
                <a href="about.html" class="footer-nav__link">About</a>
              </li>
              <li class="footer-nav__item">
                <a href="contact.html" class="footer-nav__link">Contact</a>
              </li>
              <li class="footer-nav__item">
                <a href="newsletter.html" class="footer-nav__link">Newsletter</a>
              </li>
              <li class="footer-nav__item">
                <a href="terms.html" class="footer-nav__link">Terms of Use</a>
              </li>
              <li class="footer-nav__item">
                <a href="privacy.html" class="footer-nav__link">Privacy Policy</a>
              </li>
            </ul>
          </nav>
          <p class="site-footer__meta">&copy; <span class="site-footer__year">2026</span> Forever Cinema. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const state = {
        pageKey: null,
        section: null
      };

      const allowedPageKeys = ['about', 'terms_of_use', 'privacy_policy'];

      const loaderEl = document.querySelector('[data-component="about-page-loader"]');
      const populateElements = document.querySelectorAll('[data-populate]');
      const bodyContainer = document.querySelector('[data-populate="informational-body"]');
      const sectionNav = document.querySelector('[data-component="about-section-navigator"]');

      function parseUrlState() {
        const params = new URLSearchParams(window.location.search);
        let pageKey = params.get('pageKey') || 'about';
        if (!allowedPageKeys.includes(pageKey)) {
          pageKey = 'about';
        }
        const section = params.get('section') || null;
        return { pageKey, section };
      }

      function showLoader() {
        if (loaderEl) {
          loaderEl.hidden = false;
        }
      }

      function hideLoader() {
        if (loaderEl) {
          loaderEl.hidden = true;
        }
      }

      function renderTitle(container, title) {
        if (!container) return;
        container.textContent = title || 'About Forever Cinema';
      }

      function renderBody(container, bodyHtml) {
        if (!container) return;
        if (bodyHtml && typeof bodyHtml === 'string') {
          container.innerHTML = bodyHtml;
        } else {
          container.innerHTML = '<p class="about-panel__placeholder">Information will be available soon.</p>';
        }
      }

      function renderLastUpdated(container, dateStr) {
        if (!container) return;
        if (!dateStr) {
          container.textContent = '—';
          container.removeAttribute('datetime');
          return;
        }
        const iso = dateStr.includes('T') ? dateStr : dateStr + 'T00:00:00';
        const date = new Date(iso);
        if (!isNaN(date.getTime())) {
          container.textContent = date.toLocaleDateString(undefined, {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          });
          container.setAttribute('datetime', dateStr);
        } else {
          container.textContent = dateStr;
          container.setAttribute('datetime', dateStr);
        }
      }

      function renderAllContent(payload) {
        populateElements.forEach(function (el) {
          const type = el.dataset.populate;
          if (type === 'informational-title') {
            renderTitle(el, payload.title);
          } else if (type === 'informational-body') {
            renderBody(el, payload.bodyHtml);
          } else if (type === 'informational-last-updated') {
            renderLastUpdated(el, payload.lastUpdatedDate);
          }
        });

        if (payload && payload.title) {
          document.title = payload.title + ' | Forever Cinema';
        } else {
          document.title = 'About | Forever Cinema';
        }
      }

      function setActiveSectionNav(sectionId) {
        if (!sectionNav) return;
        const items = sectionNav.querySelectorAll('[data-action="about-section-link"]');
        const current = sectionId || '';
        items.forEach(function (item) {
          const target = item.dataset.sectionTarget || '';
          if (target === current) {
            item.classList.add('about-section-nav__link--active');
          } else {
            item.classList.remove('about-section-nav__link--active');
          }
        });
      }

      function scrollToSection(sectionId) {
        if (!sectionId) {
          const panel = document.querySelector('.about-panel');
          if (panel && typeof panel.scrollIntoView === 'function') {
            panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
          } else {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
          return;
        }
        let target = document.getElementById(sectionId);
        if (!target) {
          target = document.querySelector('[name="' + sectionId + '"]');
        }
        if (target && typeof target.scrollIntoView === 'function') {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }

      function buildUrlWithState(newPageKey, newSection, basePath) {
        const params = new URLSearchParams(window.location.search);
        const pageKey = newPageKey || params.get('pageKey') || 'about';
        params.set('pageKey', pageKey);
        if (newSection) {
          params.set('section', newSection);
        } else {
          params.delete('section');
        }
        const query = params.toString();
        const path = basePath || window.location.pathname;
        return query ? path + '?' + query : path;
      }

      function updateUrlState(newPageKey, newSection, replace) {
        const newUrl = buildUrlWithState(newPageKey, newSection);
        const stateObj = {
          pageKey: newPageKey || state.pageKey || 'about',
          section: newSection || null
        };
        if (replace) {
          window.history.replaceState(stateObj, '', newUrl);
        } else {
          window.history.pushState(stateObj, '', newUrl);
        }
      }

      function loadContent(pageKey, section) {
        const effectivePageKey = allowedPageKeys.includes(pageKey) ? pageKey : 'about';
        showLoader();
        let payload = null;
        try {
          payload = WebsiteSDK.getInformationalPageContent(effectivePageKey);
        } catch (err) {
          console.error('Error loading informational content:', err);
          if (bodyContainer) {
            bodyContainer.innerHTML = '<p class="about-panel__error">Sorry, we could not load this information right now. Please try again later.</p>';
          }
          hideLoader();
          return;
        }
        hideLoader();
        state.pageKey = effectivePageKey;
        state.section = section || null;
        renderAllContent(payload);
        if (section) {
          scrollToSection(section);
        }
        setActiveSectionNav(section || '');
      }

      if (bodyContainer) {
        bodyContainer.addEventListener('click', function (event) {
          const link = event.target.closest('a');
          if (!link) return;

          const href = link.getAttribute('href');
          if (!href || href === 'javascript:void(0)') {
            return;
          }

          if (href.charAt(0) === '#') {
            event.preventDefault();
            const sectionId = href.slice(1);
            state.section = sectionId || null;
            updateUrlState(state.pageKey, sectionId || null, false);
            setActiveSectionNav(sectionId || '');
            scrollToSection(sectionId);
            return;
          }

          let url;
          try {
            url = new URL(link.href, window.location.origin);
          } catch (e) {
            return;
          }

          const pathName = url.pathname.split('/').pop();

          if (pathName === 'about.html') {
            event.preventDefault();
            let targetPageKey = url.searchParams.get('pageKey') || 'about';
            if (!allowedPageKeys.includes(targetPageKey)) {
              targetPageKey = 'about';
            }
            const sectionFromQuery = url.searchParams.get('section');
            const sectionFromHash = url.hash ? url.hash.replace('#', '') : null;
            const targetSection = sectionFromQuery || sectionFromHash || null;

            const pageKeyChanged = targetPageKey !== state.pageKey;
            updateUrlState(targetPageKey, targetSection, false);
            if (pageKeyChanged) {
              loadContent(targetPageKey, targetSection);
            } else {
              if (targetSection) {
                scrollToSection(targetSection);
              }
              setActiveSectionNav(targetSection || '');
            }
            return;
          }

          if (pathName === 'contact.html' || pathName === 'help.html') {
            return;
          }

          if (pathName && pathName.endsWith('.html')) {
            event.preventDefault();
          }
        });
      }

      if (sectionNav) {
        sectionNav.addEventListener('click', function (event) {
          const actionEl = event.target.closest('[data-action]');
          if (!actionEl) return;

          const action = actionEl.dataset.action;
          if (action === 'about-section-link') {
            event.preventDefault();
            const sectionTarget = actionEl.dataset.sectionTarget || '';
            const sectionId = sectionTarget || null;
            state.section = sectionId;
            updateUrlState(state.pageKey || 'about', sectionId, false);
            setActiveSectionNav(sectionId || '');
            scrollToSection(sectionId);
          }
        });
      }

      window.addEventListener('popstate', function () {
        const urlState = parseUrlState();
        const newPageKey = urlState.pageKey;
        const newSection = urlState.section;
        const pageKeyChanged = newPageKey !== state.pageKey;

        state.pageKey = newPageKey;
        state.section = newSection;

        if (pageKeyChanged) {
          loadContent(newPageKey, newSection);
        } else {
          if (newSection) {
            scrollToSection(newSection);
          }
          setActiveSectionNav(newSection || '');
        }
      });

      const initialState = parseUrlState();
      state.pageKey = initialState.pageKey;
      state.section = initialState.section;
      updateUrlState(state.pageKey, state.section, true);
      loadContent(state.pageKey, state.section);
    });
  </script>
</body>
</html>
