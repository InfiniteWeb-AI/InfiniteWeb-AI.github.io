<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Showtimes & Formats | Forever Cinema</title>
  <meta name='description' content='Select a showtime for your movie by date, format, accessibility, time of day, and price before choosing tickets.' />
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet' />
  <!-- Site Styles -->
  <link rel='stylesheet' href='styles.css' />
  <!-- Page Styles -->
  <link rel='stylesheet' href='showtimes.css' />
</head>
<body class='site-body'>
  <!-- Cinematic full-bleed background image -->
  <div class='site-background' aria-hidden='true'></div>

  <div class='site-layout'>
    <header class='site-header'>
      <div class='site-header__overlay'>
        <div class='site-header__inner'>
          <nav class='primary-nav' aria-label='Main'>
            <ul class='primary-nav__list'>
              <li class='primary-nav__item'>
                <a href='index.html' class='primary-nav__link primary-nav__link--active'>Home</a>
              </li>
              <li class='primary-nav__item'>
                <a href='now_showing.html' class='primary-nav__link'>Now Showing</a>
              </li>
              <li class='primary-nav__item'>
                <a href='upcoming.html' class='primary-nav__link'>Upcoming</a>
              </li>
              <li class='primary-nav__item'>
                <a href='watchlist.html' class='primary-nav__link'>Watchlist</a>
              </li>
              <li class='primary-nav__item'>
                <a href='profile.html' class='primary-nav__link'>Profile</a>
              </li>
              <li class='primary-nav__item'>
                <a href='help.html' class='primary-nav__link'>Help</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <article class='showtimes-hero' aria-label='Showtimes and formats'>
        <section
          class='showtimes-panel card card-overlay'
          data-component='showtimes-page-controller'
          data-populate='showtimes-for-movie'
        >
          <div class='showtimes-panel__inner'>
            <!-- Movie context header -->
            <header class='showtimes-header' data-component='movie-context-header'>
              <!-- Populated via JS -->
            </header>

            <!-- Controls: date, format/accessibility, time range, sort -->
            <section class='showtimes-controls'>
              <div
                class='showtimes-controls__row showtimes-controls__row--dates'
                data-component='date-selector'
              >
                <!-- Date selector rendered via JS -->
              </div>

              <div
                class='showtimes-controls__row showtimes-controls__row--filters'
                data-component='format-accessibility-filter-bar'
              >
                <!-- Format and accessibility filters rendered via JS -->
              </div>

              <div class='showtimes-controls__row showtimes-controls__row--time-sort'>
                <div
                  class='showtimes-controls__time'
                  data-component='time-range-filter'
                >
                  <!-- Time-range filter rendered via JS -->
                </div>
                <div
                  class='showtimes-controls__sort'
                  data-component='sort-selector'
                >
                  <!-- Sort selector rendered via JS -->
                </div>
              </div>
            </section>

            <!-- Showtime list and states -->
            <section class='showtimes-body'>
              <div
                class='showtimes-status'
                data-component='loading-and-error-state'
                aria-live='polite'
              ></div>

              <div
                class='showtimes-groups'
                data-component='showtime-groups-list'
              >
                <!-- Showtime groups rendered via JS -->
              </div>
            </section>
          </div>
        </section>
      </article>
    </main>

    <footer class='site-footer'>
      <div class='site-footer__overlay'>
        <div class='site-footer__inner'>
          <nav class='footer-nav' aria-label='Footer'>
            <ul class='footer-nav__list'>
              <li class='footer-nav__item'>
                <a href='about.html' class='footer-nav__link'>About</a>
              </li>
              <li class='footer-nav__item'>
                <a href='contact.html' class='footer-nav__link'>Contact</a>
              </li>
              <li class='footer-nav__item'>
                <a href='newsletter.html' class='footer-nav__link'>Newsletter</a>
              </li>
              <li class='footer-nav__item'>
                <a href='terms.html' class='footer-nav__link'>Terms of Use</a>
              </li>
              <li class='footer-nav__item'>
                <a href='privacy.html' class='footer-nav__link'>Privacy Policy</a>
              </li>
            </ul>
          </nav>
          <p class='site-footer__meta'>&copy; <span class='site-footer__year'>2026</span> Forever Cinema. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page controller and UI wiring -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var rootContainers = document.querySelectorAll('[data-populate]');

      rootContainers.forEach(function (container) {
        var type = container.dataset.populate;
        if (type === 'showtimes-for-movie') {
          initializeShowtimesPage(container);
        }
      });

      window.addEventListener('popstate', function () {
        var container = document.querySelector('[data-populate=\'showtimes-for-movie\']');
        if (container && container.__showtimesController) {
          container.__showtimesController.refreshFromUrl();
        }
      });
    });

    function initializeShowtimesPage(root) {
      var headerEl = root.querySelector('[data-component=\'movie-context-header\']');
      var dateSelectorEl = root.querySelector('[data-component=\'date-selector\']');
      var filterBarEl = root.querySelector('[data-component=\'format-accessibility-filter-bar\']');
      var timeFilterEl = root.querySelector('[data-component=\'time-range-filter\']');
      var sortSelectorEl = root.querySelector('[data-component=\'sort-selector\']');
      var statusEl = root.querySelector('[data-component=\'loading-and-error-state\']');
      var groupsEl = root.querySelector('[data-component=\'showtime-groups-list\']');

      var state = {
        movieId: '',
        date: '',
        formats: [],
        accessibility: [],
        timeStart: '',
        timeEnd: '',
        sortBy: 'time_asc',
        movie: null,
        showtimeGroups: [],
        isLoading: false,
        lastError: null
      };

      var urlStateSync = {
        read: function () {
          var params = new URLSearchParams(window.location.search);
          var movieId = params.get('movieId') || '';
          var date = params.get('date') || '';
          if (!date) {
            date = formatDateYMD(new Date());
          }
          var formatParam = params.get('format') || '';
          var formats = formatParam ? formatParam.split(',').filter(Boolean) : [];
          var accessibilityParam = params.get('accessibility') || '';
          var accessibility = accessibilityParam ? accessibilityParam.split(',').filter(Boolean) : [];
          var timeStart = params.get('timeStart') || '';
          var timeEnd = params.get('timeEnd') || '';
          var sortBy = params.get('sortBy') || 'time_asc';

          state.movieId = movieId;
          state.date = date;
          state.formats = formats;
          state.accessibility = accessibility;
          state.timeStart = timeStart;
          state.timeEnd = timeEnd;
          state.sortBy = sortBy === 'price_asc' ? 'price_asc' : 'time_asc';
        },
        update: function (updates, options) {
          var params = new URLSearchParams(window.location.search);
          Object.keys(updates).forEach(function (key) {
            var value = updates[key];
            if (value === null || value === undefined || value === '') {
              params.delete(key);
            } else {
              params.set(key, value);
            }
          });
          var newQuery = params.toString();
          var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
          var method = options && options.replace ? 'replaceState' : 'pushState';
          window.history[method](null, '', newUrl);
          this.read();
        }
      };

      function setStatus(mode, message) {
        if (!statusEl) return;
        if (mode === 'loading') {
          statusEl.innerHTML = '';
          var div = document.createElement('div');
          div.className = 'status status--loading';
          div.textContent = 'Loading showtimes...';
          statusEl.appendChild(div);
        } else if (mode === 'error') {
          statusEl.innerHTML = '';
          var err = document.createElement('div');
          err.className = 'status status--error';
          var p = document.createElement('p');
          p.textContent = message || 'Unable to load showtimes right now.';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'btn btn-secondary status__retry';
          btn.dataset.action = 'retry-load';
          btn.textContent = 'Retry';
          err.appendChild(p);
          err.appendChild(btn);
          statusEl.appendChild(err);
        } else if (mode === 'empty') {
          statusEl.innerHTML = '';
          var empty = document.createElement('div');
          empty.className = 'status status--empty';
          var text = document.createElement('p');
          text.textContent = 'No showtimes match your date or filters. Try a different time, format, or adjusting accessibility options.';
          empty.appendChild(text);
          statusEl.appendChild(empty);
        } else {
          statusEl.innerHTML = '';
        }
      }

      function renderHeader() {
        if (!headerEl) return;
        headerEl.innerHTML = '';

        var topRow = document.createElement('div');
        topRow.className = 'showtimes-header__top';

        var backLink = document.createElement('button');
        backLink.type = 'button';
        backLink.className = 'link-back';
        backLink.dataset.action = 'back-to-movie-details';
        backLink.textContent = 'Back to movie details';
        topRow.appendChild(backLink);

        var mainRow = document.createElement('div');
        mainRow.className = 'showtimes-header__main';

        var titleEl = document.createElement('h1');
        titleEl.className = 'showtimes-header__title';

        var metaEl = document.createElement('p');
        metaEl.className = 'showtimes-header__meta';

        var dateSummaryEl = document.createElement('p');
        dateSummaryEl.className = 'showtimes-header__date-summary';

        if (!state.movieId) {
          titleEl.textContent = 'Choose a movie to see showtimes';
          metaEl.textContent = 'This page expects a movieId in the URL, for example: showtimes.html?movieId=mv_123';
          dateSummaryEl.textContent = '';
        } else if (!state.movie) {
          titleEl.textContent = 'Loading movie details...';
          metaEl.textContent = '';
          dateSummaryEl.textContent = formatDisplayDate(state.date);
        } else {
          titleEl.textContent = state.movie.title || 'Showtimes';
          var metaBits = [];
          if (typeof state.movie.runtimeMinutes === 'number') {
            metaBits.push(formatRuntime(state.movie.runtimeMinutes));
          }
          if (state.movie.primaryLanguage) {
            metaBits.push(capitalizeLanguage(state.movie.primaryLanguage));
          }
          metaEl.textContent = metaBits.join(' b7 ');
          dateSummaryEl.textContent = 'Showtimes for ' + formatDisplayDate(state.date);
        }

        mainRow.appendChild(titleEl);
        if (metaEl.textContent) {
          mainRow.appendChild(metaEl);
        }
        if (dateSummaryEl.textContent) {
          mainRow.appendChild(dateSummaryEl);
        }

        headerEl.appendChild(topRow);
        headerEl.appendChild(mainRow);
      }

      function renderDateSelector() {
        if (!dateSelectorEl) return;
        var centerDate = parseYMD(state.date) || new Date();
        var days = [];
        for (var offset = -2; offset <= 4; offset++) {
          var d = new Date(centerDate.getTime());
          d.setDate(d.getDate() + offset);
          days.push(d);
        }

        var html = '';
        html += "<div class='date-selector'>";
        html += "  <div class='date-selector__label'>Date</div>";
        html += "  <div class='date-selector__pills'>";
        days.forEach(function (d) {
          var ymd = formatDateYMD(d);
          var weekday = d.toLocaleDateString(undefined, { weekday: 'short' });
          var dayNum = d.getDate();
          var isActive = ymd === state.date;
          html += "    <button type='button' class='date-pill" + (isActive ? ' date-pill--active' : '') + "' data-action='select-date' data-date='" + ymd + "'>";
          html += "      <span class='date-pill__weekday'>" + escapeHtml(weekday) + "</span>";
          html += "      <span class='date-pill__day'>" + String(dayNum) + "</span>";
          html += "    </button>";
        });
        html += "  </div>";
        html += "</div>";

        dateSelectorEl.innerHTML = html;
      }

      function renderFilterBar() {
        if (!filterBarEl) return;
        var formats = [
          { id: 'two_d', label: '2D' },
          { id: 'three_d', label: '3D' },
          { id: 'imax', label: 'IMAX' }
        ];
        var accessibilityOptions = [
          { id: 'closed_captions', label: 'Closed Captions' },
          { id: 'wheelchair_accessible', label: 'Wheelchair Accessible' }
        ];

        var html = '';
        html += "<div class='filter-bar'>";
        html += "  <div class='filter-bar__group filter-bar__group--formats'>";
        html += "    <span class='filter-bar__label'>Format</span>";
        formats.forEach(function (fmt) {
          var active = state.formats.indexOf(fmt.id) !== -1;
          html += "    <button type='button' class='filter-pill" + (active ? ' filter-pill--active' : '') + "' data-action='toggle-format' data-format='" + fmt.id + "' aria-pressed='" + (active ? 'true' : 'false') + "'>" + fmt.label + "</button>";
        });
        html += "  </div>";

        html += "  <div class='filter-bar__group filter-bar__group--accessibility'>";
        html += "    <span class='filter-bar__label'>Accessibility</span>";
        accessibilityOptions.forEach(function (opt) {
          var active = state.accessibility.indexOf(opt.id) !== -1;
          html += "    <button type='button' class='filter-pill" + (active ? ' filter-pill--active' : '') + "' data-action='toggle-accessibility' data-flag='" + opt.id + "' aria-pressed='" + (active ? 'true' : 'false') + "'>" + opt.label + "</button>";
        });
        html += "    <button type='button' class='filter-bar__clear' data-action='clear-filters'>Clear filters</button>";
        html += "  </div>";
        html += "</div>";

        filterBarEl.innerHTML = html;
      }

      function renderTimeAndSort() {
        if (timeFilterEl) {
          var preset = detectTimePreset(state.timeStart, state.timeEnd);
          var html = '';
          html += "<div class='time-filter'>";
          html += "  <div class='time-filter__label'>Time of day</div>";
          html += "  <div class='time-filter__presets'>";
          [
            { id: 'any', label: 'Any time' },
            { id: 'morning', label: 'Morning' },
            { id: 'afternoon', label: 'Afternoon' },
            { id: 'evening', label: 'Evening' },
            { id: 'late', label: 'Late' }
          ].forEach(function (p) {
            var active = preset === p.id;
            html += "    <button type='button' class='time-pill" + (active ? ' time-pill--active' : '') + "' data-action='time-preset' data-preset='" + p.id + "' aria-pressed='" + (active ? 'true' : 'false') + "'>" + p.label + "</button>";
          });
          html += "  </div>";
          html += "  <div class='time-filter__inputs'>";
          html += "    <label class='time-filter__field'>From";
          html += "      <input type='time' class='time-filter__input' data-action='time-start-input' value='" + (state.timeStart || '') + "' />";
          html += "    </label>";
          html += "    <label class='time-filter__field'>To";
          html += "      <input type='time' class='time-filter__input' data-action='time-end-input' value='" + (state.timeEnd || '') + "' />";
          html += "    </label>";
          html += "  </div>";
          html += "</div>";
          timeFilterEl.innerHTML = html;
        }

        if (sortSelectorEl) {
          var htmlSort = '';
          htmlSort += "<div class='sort-control'>";
          htmlSort += "  <label class='sort-control__label'>Sort by";
          htmlSort += "    <select class='sort-control__select' data-action='change-sort'>";
          htmlSort += "      <option value='time_asc'" + (state.sortBy === 'time_asc' ? ' selected' : '') + ">Earliest time</option>";
          htmlSort += "      <option value='price_asc'" + (state.sortBy === 'price_asc' ? ' selected' : '') + ">Lowest price</option>";
          htmlSort += "    </select>";
          htmlSort += "  </label>";
          htmlSort += "</div>";
          sortSelectorEl.innerHTML = htmlSort;
        }
      }

      function renderShowtimeGroups() {
        if (!groupsEl) return;
        groupsEl.innerHTML = '';

        if (!state.showtimeGroups || !state.showtimeGroups.length) {
          return;
        }

        state.showtimeGroups.forEach(function (group) {
          var groupEl = document.createElement('section');
          groupEl.className = 'showtime-group';

          var header = document.createElement('header');
          header.className = 'showtime-group__header';

          var title = document.createElement('h2');
          title.className = 'showtime-group__title';
          title.textContent = formatFormatLabel(group.format) + ' b7 ' + (group.screen && group.screen.name ? group.screen.name : 'Screen');

          header.appendChild(title);

          if (group.screen && group.screen.description) {
            var sub = document.createElement('p');
            sub.className = 'showtime-group__subtitle';
            sub.textContent = group.screen.description;
            header.appendChild(sub);
          }

          groupEl.appendChild(header);

          var list = document.createElement('div');
          list.className = 'showtime-group__showtimes';

          (group.showtimes || []).forEach(function (st) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'showtime-chip';
            btn.dataset.action = 'select-showtime';
            btn.dataset.showtimeId = st.id;

            var times = document.createElement('div');
            times.className = 'showtime-chip__times';
            var labelTime = formatTimeRange(st.startTime, st.endTime);
            times.textContent = labelTime;
            btn.appendChild(times);

            var metaRow = document.createElement('div');
            metaRow.className = 'showtime-chip__meta-row';

            var price = document.createElement('span');
            price.className = 'showtime-chip__price';
            if (typeof st.baseAdultPrice === 'number') {
              price.textContent = 'From ' + formatPrice(st.baseAdultPrice);
            }
            metaRow.appendChild(price);

            var tags = document.createElement('div');
            tags.className = 'showtime-chip__tags';

            if (st.hasClosedCaptions) {
              var cc = document.createElement('span');
              cc.className = 'tag tag--cc';
              cc.textContent = 'CC';
              tags.appendChild(cc);
            }
            if (st.isWheelchairAccessible) {
              var wc = document.createElement('span');
              wc.className = 'tag tag--wheelchair';
              wc.textContent = 'Wheelchair';
              tags.appendChild(wc);
            }
            if (st.isMatinee) {
              var mt = document.createElement('span');
              mt.className = 'tag tag--matinee';
              mt.textContent = 'Matinee';
              tags.appendChild(mt);
            }

            if (st.audioLanguage || st.subtitleLanguage) {
              var lang = document.createElement('span');
              lang.className = 'tag tag--language';
              var audio = st.audioLanguage ? capitalizeLanguage(st.audioLanguage) : '';
              var subs = st.subtitleLanguage ? capitalizeLanguage(st.subtitleLanguage) : '';
              if (audio && subs) {
                lang.textContent = audio + ' audio / ' + subs + ' subs';
              } else if (audio) {
                lang.textContent = audio + ' audio';
              } else if (subs) {
                lang.textContent = subs + ' subs';
              }
              if (lang.textContent) {
                tags.appendChild(lang);
              }
            }

            if (typeof st.remainingSeatsCount === 'number') {
              var seats = document.createElement('span');
              seats.className = 'tag tag--seats';
              if (st.remainingSeatsCount <= 5) {
                seats.textContent = 'Few seats left';
              } else {
                seats.textContent = st.remainingSeatsCount + ' seats left';
              }
              tags.appendChild(seats);
            }

            if (tags.children.length) {
              metaRow.appendChild(tags);
            }

            btn.appendChild(metaRow);
            list.appendChild(btn);
          });

          groupEl.appendChild(list);
          groupsEl.appendChild(groupEl);
        });
      }

      function buildFiltersObject() {
        var filters = {};
        if (state.formats && state.formats.length) {
          filters.formats = state.formats.slice();
        }
        if (state.timeStart) {
          filters.minStartTime = state.timeStart;
        }
        if (state.timeEnd) {
          filters.maxStartTime = state.timeEnd;
        }
        if (state.accessibility.indexOf('closed_captions') !== -1) {
          filters.requireClosedCaptions = true;
        }
        if (state.accessibility.indexOf('wheelchair_accessible') !== -1) {
          filters.requireWheelchairAccessible = true;
        }
        return filters;
      }

      function loadShowtimes() {
        if (!state.movieId) {
          state.movie = null;
          state.showtimeGroups = [];
          setStatus('none');
          renderHeader();
          renderShowtimeGroups();
          return;
        }

        state.isLoading = true;
        state.lastError = null;
        setStatus('loading');

        try {
          var filtersObj = buildFiltersObject();
          var result = WebsiteSDK.getShowtimesForMovie(state.movieId, state.date, filtersObj, state.sortBy);
          state.movie = result && result.movie ? result.movie : null;
          state.showtimeGroups = result && result.showtimeGroups ? result.showtimeGroups : [];
          state.isLoading = false;

          renderHeader();
          renderShowtimeGroups();

          if (!state.showtimeGroups.length) {
            setStatus('empty');
          } else {
            setStatus('none');
          }
        } catch (err) {
          state.isLoading = false;
          state.lastError = err;
          renderHeader();
          renderShowtimeGroups();
          setStatus('error', 'We could not load showtimes. Please check your connection and try again.');
        }
      }

      function refreshAll() {
        urlStateSync.read();
        renderHeader();
        renderDateSelector();
        renderFilterBar();
        renderTimeAndSort();
        loadShowtimes();
      }

      function onDateSelect(newDate) {
        if (!newDate || newDate === state.date) return;
        urlStateSync.update({ date: newDate }, { replace: false });
        refreshAll();
      }

      function onToggleFormat(formatId) {
        if (!formatId) return;
        var idx = state.formats.indexOf(formatId);
        if (idx === -1) {
          state.formats.push(formatId);
        } else {
          state.formats.splice(idx, 1);
        }
        var val = state.formats.length ? state.formats.join(',') : '';
        urlStateSync.update({ format: val }, { replace: false });
        refreshAll();
      }

      function onToggleAccessibility(flag) {
        if (!flag) return;
        var idx = state.accessibility.indexOf(flag);
        if (idx === -1) {
          state.accessibility.push(flag);
        } else {
          state.accessibility.splice(idx, 1);
        }
        var val = state.accessibility.length ? state.accessibility.join(',') : '';
        urlStateSync.update({ accessibility: val }, { replace: false });
        refreshAll();
      }

      function onClearFilters() {
        state.formats = [];
        state.accessibility = [];
        urlStateSync.update({ format: '', accessibility: '' }, { replace: false });
        refreshAll();
      }

      function onTimePreset(presetId) {
        var times = presetToTimes(presetId);
        var updates = {};
        updates.timeStart = times[0] || '';
        updates.timeEnd = times[1] || '';
        urlStateSync.update(updates, { replace: false });
        refreshAll();
      }

      function onTimeInputChange(which, value) {
        var updates = {};
        if (which === 'start') {
          updates.timeStart = value || '';
        } else {
          updates.timeEnd = value || '';
        }
        urlStateSync.update(updates, { replace: false });
        refreshAll();
      }

      function onSortChange(sortValue) {
        if (sortValue !== 'time_asc' && sortValue !== 'price_asc') {
          sortValue = 'time_asc';
        }
        urlStateSync.update({ sortBy: sortValue }, { replace: false });
        refreshAll();
      }

      function onRetryLoad() {
        loadShowtimes();
      }

      function onSelectShowtime(showtimeId) {
        if (!showtimeId) return;
        var targetUrl = 'tickets.html?showtimeId=' + encodeURIComponent(showtimeId);
        window.location.href = targetUrl;
      }

      function onBackToMovieDetails() {
        if (!state.movieId) return;
        var url = 'movie_detail.html?movieId=' + encodeURIComponent(state.movieId);
        window.location.href = url;
      }

      root.addEventListener('click', function (event) {
        var el = event.target.closest('[data-action]');
        if (!el) return;
        var action = el.dataset.action;

        if (action === 'back-to-movie-details') {
          event.preventDefault();
          onBackToMovieDetails();
        } else if (action === 'select-date') {
          var date = el.getAttribute('data-date');
          onDateSelect(date);
        } else if (action === 'toggle-format') {
          var fmt = el.getAttribute('data-format');
          onToggleFormat(fmt);
        } else if (action === 'toggle-accessibility') {
          var flag = el.getAttribute('data-flag');
          onToggleAccessibility(flag);
        } else if (action === 'clear-filters') {
          onClearFilters();
        } else if (action === 'time-preset') {
          var presetId = el.getAttribute('data-preset');
          onTimePreset(presetId);
        } else if (action === 'retry-load') {
          onRetryLoad();
        } else if (action === 'select-showtime') {
          var stId = el.getAttribute('data-showtime-id');
          onSelectShowtime(stId);
        }
      });

      root.addEventListener('change', function (event) {
        var el = event.target.closest('[data-action]');
        if (!el) return;
        var action = el.dataset.action;

        if (action === 'time-start-input') {
          onTimeInputChange('start', event.target.value || '');
        } else if (action === 'time-end-input') {
          onTimeInputChange('end', event.target.value || '');
        } else if (action === 'change-sort') {
          onSortChange(event.target.value || 'time_asc');
        }
      });

      root.__showtimesController = {
        refreshFromUrl: function () {
          refreshAll();
        }
      };

      urlStateSync.read();
      renderHeader();
      renderDateSelector();
      renderFilterBar();
      renderTimeAndSort();
      loadShowtimes();
    }

    function formatDateYMD(d) {
      var year = d.getFullYear();
      var month = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function parseYMD(ymd) {
      if (!ymd || typeof ymd !== 'string') return null;
      var parts = ymd.split('-');
      if (parts.length !== 3) return null;
      var year = parseInt(parts[0], 10);
      var month = parseInt(parts[1], 10) - 1;
      var day = parseInt(parts[2], 10);
      if (isNaN(year) || isNaN(month) || isNaN(day)) return null;
      return new Date(year, month, day);
    }

    function formatDisplayDate(ymd) {
      var d = parseYMD(ymd);
      if (!d) return ymd || '';
      return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function formatRuntime(minutes) {
      if (!minutes && minutes !== 0) return '';
      var hrs = Math.floor(minutes / 60);
      var mins = minutes % 60;
      if (hrs && mins) return hrs + 'h ' + mins + 'm';
      if (hrs) return hrs + 'h';
      return mins + 'm';
    }

    function capitalizeLanguage(lang) {
      if (!lang) return '';
      var map = {
        english: 'English',
        spanish: 'Spanish',
        french: 'French',
        german: 'German',
        chinese: 'Chinese',
        japanese: 'Japanese',
        korean: 'Korean',
        hindi: 'Hindi',
        other: 'Other'
      };
      return map[lang] || (lang.charAt(0).toUpperCase() + lang.slice(1));
    }

    function formatFormatLabel(fmt) {
      if (fmt === 'two_d') return '2D';
      if (fmt === 'three_d') return '3D';
      if (fmt === 'imax') return 'IMAX';
      return 'Format';
    }

    function formatTimeRange(startIso, endIso) {
      if (!startIso) return '';
      var start = new Date(startIso);
      var opts = { hour: 'numeric', minute: '2-digit' };
      var startLabel = start.toLocaleTimeString(undefined, opts);
      if (!endIso) return startLabel;
      var end = new Date(endIso);
      var endLabel = end.toLocaleTimeString(undefined, opts);
      return startLabel + ' b7 ' + endLabel;
    }

    function formatPrice(value) {
      try {
        return new Intl.NumberFormat(undefined, { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(value);
      } catch (e) {
        return '$' + value.toFixed(2);
      }
    }

    function presetToTimes(presetId) {
      if (presetId === 'morning') {
        return ['06:00', '11:59'];
      }
      if (presetId === 'afternoon') {
        return ['12:00', '17:00'];
      }
      if (presetId === 'evening') {
        return ['17:01', '21:59'];
      }
      if (presetId === 'late') {
        return ['22:00', '23:59'];
      }
      return ['', ''];
    }

    function detectTimePreset(timeStart, timeEnd) {
      if (!timeStart && !timeEnd) return 'any';
      if (timeStart === '06:00' && timeEnd === '11:59') return 'morning';
      if (timeStart === '12:00' && timeEnd === '17:00') return 'afternoon';
      if (timeStart === '17:01' && timeEnd === '21:59') return 'evening';
      if (timeStart === '22:00' && timeEnd === '23:59') return 'late';
      return '';
    }

    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
