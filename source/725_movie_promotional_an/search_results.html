<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search Results | Forever Cinema</title>
  <meta name="description" content="Displays and refines search results for movies and people based on a query, with filters for content type, status, and sorting." />
  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <!-- Site Styles -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="search_results.css" />
</head>
<body class="site-body">
  <!-- Cinematic full-bleed background image -->
  <div class="site-background" aria-hidden="true"></div>

  <div class="site-layout">
    <header class="site-header">
      <div class="site-header__overlay">
        <div class="site-header__inner">
          <nav class="primary-nav" aria-label="Main">
            <ul class="primary-nav__list">
              <li class="primary-nav__item">
                <a href="index.html" class="primary-nav__link primary-nav__link--active">Home</a>
              </li>
              <li class="primary-nav__item">
                <a href="now_showing.html" class="primary-nav__link">Now Showing</a>
              </li>
              <li class="primary-nav__item">
                <a href="upcoming.html" class="primary-nav__link">Upcoming</a>
              </li>
              <li class="primary-nav__item">
                <a href="watchlist.html" class="primary-nav__link">Watchlist</a>
              </li>
              <li class="primary-nav__item">
                <a href="profile.html" class="primary-nav__link">Profile</a>
              </li>
              <li class="primary-nav__item">
                <a href="help.html" class="primary-nav__link">Help</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <!-- Search-context hero card on the right, aligned with cinematic background -->
      <section class="search-hero" data-component="search-hero">
        <div class="search-hero__inner">
          <section class="card card-overlay search-hero__card" data-component="search-results-summary">
            <header class="search-summary">
              <p class="search-summary__eyebrow">Search results</p>
              <h1 class="search-summary__title" data-populate="summary-title"></h1>
              <p class="search-summary__meta" data-populate="summary-meta"></p>
              <p class="search-summary__filters" data-populate="summary-filters"></p>
            </header>

            <!-- Global search form for refining the query -->
            <form class="global-search-form" data-component="global-search-form" data-action="submit-global-search">
              <div class="form-group">
                <label class="global-search-form__label" for="globalSearchInput">Search movies or people</label>
                <div class="global-search-form__field">
                  <input
                    type="search"
                    id="globalSearchInput"
                    name="query"
                    class="global-search-form__input"
                    placeholder="Type a title, actor, or director"
                    autocomplete="off"
                  />
                  <button type="submit" class="btn btn-primary global-search-form__submit">
                    <span>Search</span>
                  </button>
                </div>
              </div>
            </form>
          </section>
        </div>
      </section>

      <!-- Sticky controller bar: content type toggle + filters -->
      <section class="search-controller" data-component="search-results-controller">
        <div class="search-controller__inner">
          <!-- Content type toggle (All / Movies / People) -->
          <div class="content-type-toggle" data-component="content-type-toggle" aria-label="Content type" role="tablist" data-populate="content-types">
            <!-- Options populated via getSearchOptions -->
          </div>

          <!-- Filters: movie status + sort order -->
          <div class="search-filters-bar" data-component="search-filters-bar">
            <div class="search-filters-bar__group">
              <label class="search-filters-bar__label" for="statusFilter">Status</label>
              <select id="statusFilter" class="search-filters-bar__select" data-action="change-status" aria-label="Filter by movie status">
                <!-- Options populated via getSearchOptions.movieStatuses -->
              </select>
            </div>

            <div class="search-filters-bar__group">
              <label class="search-filters-bar__label" for="sortByFilter">Sort</label>
              <select id="sortByFilter" class="search-filters-bar__select" data-action="change-sort-by" aria-label="Sort movie results">
                <!-- Options populated via getSearchOptions.sortOptions -->
              </select>
            </div>

            <button type="button" class="search-filters-bar__clear" data-action="clear-filters">
              Clear filters
            </button>
          </div>
        </div>
      </section>

      <!-- Main results column aligned with the hero card -->
      <section class="search-results" data-component="search-results">
        <div class="search-results__inner">
          <!-- Loading overlay for options + search -->
          <div class="search-loading" data-component="search-options-loader" data-populate="search-loading" hidden>
            <div class="search-loading__backdrop"></div>
            <div class="search-loading__content" role="status" aria-live="polite">
              <span class="search-loading__spinner"></span>
              <span class="search-loading__text">Loading results…</span>
            </div>
          </div>

          <!-- Error region -->
          <div class="search-error" data-component="search-error" role="alert" hidden></div>

          <!-- Movie results list -->
          <section class="results-section results-section--movies" data-component="movie-results-list">
            <header class="results-section__header">
              <h2 class="results-section__title">Movies</h2>
              <p class="results-section__count" data-populate="movie-results-count"></p>
            </header>
            <ul class="results-list results-list--movies" data-populate="movie-results" aria-label="Movie search results">
              <!-- Movie result cards rendered here -->
            </ul>
          </section>

          <!-- People results list -->
          <section class="results-section results-section--people" data-component="people-results-list">
            <header class="results-section__header">
              <h2 class="results-section__title">People</h2>
              <p class="results-section__count" data-populate="people-results-count"></p>
            </header>
            <ul class="results-list results-list--people" data-populate="people-results" aria-label="People search results">
              <!-- People result cards rendered here -->
            </ul>
          </section>

          <!-- Contextual helper links at the bottom of the results column -->
          <nav class="results-helper-links" data-component="results-helper-links" aria-label="Additional result options">
            <ul class="results-helper-links__list" data-populate="helper-links">
              <!-- Helper links (now showing / upcoming) rendered here -->
            </ul>
          </nav>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__overlay">
        <div class="site-footer__inner">
          <nav class="footer-nav" aria-label="Footer">
            <ul class="footer-nav__list">
              <li class="footer-nav__item">
                <a href="about.html" class="footer-nav__link">About</a>
              </li>
              <li class="footer-nav__item">
                <a href="contact.html" class="footer-nav__link">Contact</a>
              </li>
              <li class="footer-nav__item">
                <a href="newsletter.html" class="footer-nav__link">Newsletter</a>
              </li>
              <li class="footer-nav__item">
                <a href="terms.html" class="footer-nav__link">Terms of Use</a>
              </li>
              <li class="footer-nav__item">
                <a href="privacy.html" class="footer-nav__link">Privacy Policy</a>
              </li>
            </ul>
          </nav>
          <p class="site-footer__meta">&copy; <span class="site-footer__year">2026</span> Forever Cinema. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const state = {
        options: null,
        params: {
          query: '',
          contentType: null,
          status: null,
          sortBy: null
        },
        defaults: {
          contentType: null,
          status: null,
          sortBy: null
        },
        searchResponse: {
          movies: [],
          people: []
        },
        isLoading: false,
        error: null
      };

      // Cache DOM references
      const globalSearchForm = document.querySelector('[data-component="global-search-form"]');
      const globalSearchInput = document.getElementById('globalSearchInput');

      const contentTypeToggleContainer = document.querySelector('[data-component="content-type-toggle"]');

      const statusSelect = document.getElementById('statusFilter');
      const sortBySelect = document.getElementById('sortByFilter');
      const clearFiltersButton = document.querySelector('[data-action="clear-filters"]');

      const loadingOverlay = document.querySelector('[data-component="search-options-loader"]');
      const errorContainer = document.querySelector('[data-component="search-error"]');

      const movieResultsSection = document.querySelector('[data-component="movie-results-list"]');
      const peopleResultsSection = document.querySelector('[data-component="people-results-list"]');

      const movieResultsList = document.querySelector('[data-populate="movie-results"]');
      const peopleResultsList = document.querySelector('[data-populate="people-results"]');

      const movieResultsCountEl = document.querySelector('[data-populate="movie-results-count"]');
      const peopleResultsCountEl = document.querySelector('[data-populate="people-results-count"]');

      const summaryTitleEl = document.querySelector('[data-populate="summary-title"]');
      const summaryMetaEl = document.querySelector('[data-populate="summary-meta"]');
      const summaryFiltersEl = document.querySelector('[data-populate="summary-filters"]');

      const helperLinksList = document.querySelector('[data-populate="helper-links"]');

      function escapeHtml(value) {
        return String(value == null ? '' : value).replace(/[&<>"']/g, function(char) {
          switch (char) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            case "'": return '&#39;';
            default: return char;
          }
        });
      }

      function getUrlParams() {
        const sp = new URLSearchParams(window.location.search);
        return {
          query: sp.get('query') || '',
          contentType: sp.get('contentType'),
          status: sp.get('status'),
          sortBy: sp.get('sortBy')
        };
      }

      function updateUrl(params, options) {
        const opts = options || {};
        const sp = new URLSearchParams();
        const queryValue = params.query != null ? String(params.query) : '';
        // Preserve empty query explicitly so state is shareable
        sp.set('query', queryValue);
        if (params.contentType) {
          sp.set('contentType', params.contentType);
        }
        if (params.status) {
          sp.set('status', params.status);
        }
        if (params.sortBy) {
          sp.set('sortBy', params.sortBy);
        }
        const newUrl = window.location.pathname + '?' + sp.toString();
        if (opts.replace) {
          window.history.replaceState({}, '', newUrl);
        } else {
          window.history.pushState({}, '', newUrl);
        }
      }

      function normalizeParams(raw, options) {
        const contentTypes = Array.isArray(options && options.contentTypes) ? options.contentTypes : [];
        const movieStatuses = Array.isArray(options && options.movieStatuses) ? options.movieStatuses : [];
        const sortOptions = Array.isArray(options && options.sortOptions) ? options.sortOptions : [];

        const defaultContentType = contentTypes.length > 0 ? contentTypes[0].value : 'all';
        const defaultStatus = movieStatuses.length > 0 ? movieStatuses[0].value : 'any';
        const defaultSortBy = sortOptions.length > 0 ? sortOptions[0].value : 'relevance';

        let urlNeedsUpdate = false;

        let normalizedContentType = raw.contentType;
        if (!contentTypes.some(function(ct) { return ct.value === normalizedContentType; })) {
          normalizedContentType = defaultContentType;
          if (raw.contentType != null) {
            urlNeedsUpdate = true;
          }
        }

        let normalizedStatus = raw.status;
        if (!movieStatuses.some(function(st) { return st.value === normalizedStatus; })) {
          normalizedStatus = defaultStatus;
          if (raw.status != null) {
            urlNeedsUpdate = true;
          }
        }

        let normalizedSortBy = raw.sortBy;
        if (!sortOptions.some(function(so) { return so.value === normalizedSortBy; })) {
          normalizedSortBy = defaultSortBy;
          if (raw.sortBy != null) {
            urlNeedsUpdate = true;
          }
        }

        return {
          params: {
            query: typeof raw.query === 'string' ? raw.query : '',
            contentType: normalizedContentType,
            status: normalizedStatus,
            sortBy: normalizedSortBy
          },
          defaults: {
            contentType: defaultContentType,
            status: defaultStatus,
            sortBy: defaultSortBy
          },
          urlNeedsUpdate: urlNeedsUpdate
        };
      }

      function setLoading(isLoading) {
        state.isLoading = isLoading;
        if (loadingOverlay) {
          loadingOverlay.hidden = !isLoading;
        }
      }

      function clearError() {
        state.error = null;
        if (errorContainer) {
          errorContainer.textContent = '';
          errorContainer.hidden = true;
        }
      }

      function showError(message) {
        state.error = message;
        if (errorContainer) {
          errorContainer.textContent = message;
          errorContainer.hidden = false;
        }
      }

      function renderContentTypeToggle() {
        if (!contentTypeToggleContainer || !state.options) {
          return;
        }
        const contentTypes = Array.isArray(state.options.contentTypes) ? state.options.contentTypes : [];
        contentTypeToggleContainer.innerHTML = '';

        contentTypes.forEach(function(ct) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'content-type-toggle__pill';
          if (ct.value === state.params.contentType) {
            btn.className += ' content-type-toggle__pill--active';
            btn.setAttribute('aria-selected', 'true');
          } else {
            btn.setAttribute('aria-selected', 'false');
          }
          btn.setAttribute('role', 'tab');
          btn.dataset.action = 'set-content-type';
          btn.dataset.contentType = ct.value;
          btn.textContent = ct.label || ct.value;
          contentTypeToggleContainer.appendChild(btn);
        });
      }

      function renderFiltersUI() {
        if (statusSelect && state.options) {
          const movieStatuses = Array.isArray(state.options.movieStatuses) ? state.options.movieStatuses : [];
          const currentStatus = state.params.status;
          statusSelect.innerHTML = '';
          movieStatuses.forEach(function(st) {
            const opt = document.createElement('option');
            opt.value = st.value;
            opt.textContent = st.label || st.value;
            if (st.value === currentStatus) {
              opt.selected = true;
            }
            statusSelect.appendChild(opt);
          });
        }

        if (sortBySelect && state.options) {
          const sortOptions = Array.isArray(state.options.sortOptions) ? state.options.sortOptions : [];
          const currentSortBy = state.params.sortBy;
          sortBySelect.innerHTML = '';
          sortOptions.forEach(function(so) {
            const opt = document.createElement('option');
            opt.value = so.value;
            opt.textContent = so.label || so.value;
            if (so.value === currentSortBy) {
              opt.selected = true;
            }
            sortBySelect.appendChild(opt);
          });
        }

        renderContentTypeToggle();
      }

      function formatStatusLabel(status) {
        if (!status) return '';
        var map = {
          'now_showing': 'Now Showing',
          'upcoming': 'Upcoming',
          'archived': 'Archived',
          'any': 'Any status'
        };
        return map[status] || status;
      }

      function formatLanguageLabel(lang) {
        if (!lang) return '';
        var map = {
          'english': 'English',
          'spanish': 'Spanish',
          'french': 'French',
          'german': 'German',
          'chinese': 'Chinese',
          'japanese': 'Japanese',
          'korean': 'Korean',
          'hindi': 'Hindi',
          'other': 'Other'
        };
        return map[lang] || lang;
      }

      function formatReleaseDate(value) {
        if (!value) return '';
        try {
          var d = new Date(value);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        } catch (e) {
          return '';
        }
      }

      function renderSummary() {
        if (!summaryTitleEl || !summaryMetaEl || !summaryFiltersEl) {
          return;
        }

        var query = state.params.query || '';
        var movieCount = Array.isArray(state.searchResponse.movies) ? state.searchResponse.movies.length : 0;
        var peopleCount = Array.isArray(state.searchResponse.people) ? state.searchResponse.people.length : 0;

        if (query.trim().length > 0) {
          summaryTitleEl.textContent = 'Results for "' + query.trim() + '"';
        } else {
          summaryTitleEl.textContent = 'Browse all movies and people';
        }

        var contentType = state.params.contentType || '';
        var metaText = '';
        if (contentType === 'movies') {
          metaText = movieCount + ' movie' + (movieCount === 1 ? '' : 's');
        } else if (contentType === 'people') {
          metaText = peopleCount + ' person' + (peopleCount === 1 ? '' : 's');
        } else {
          metaText = movieCount + ' movie' + (movieCount === 1 ? '' : 's') + ' · ' +
            peopleCount + ' person' + (peopleCount === 1 ? '' : 's');
        }
        summaryMetaEl.textContent = metaText;

        var filterParts = [];
        if (state.options) {
          var contentTypes = Array.isArray(state.options.contentTypes) ? state.options.contentTypes : [];
          var ct = contentTypes.find(function(item) { return item.value === state.params.contentType; });
          if (ct && ct.label) {
            filterParts.push('Showing: ' + ct.label);
          }

          var movieStatuses = Array.isArray(state.options.movieStatuses) ? state.options.movieStatuses : [];
          var st = movieStatuses.find(function(item) { return item.value === state.params.status; });
          if (st && st.label) {
            filterParts.push('Status: ' + st.label);
          }

          var sortOptions = Array.isArray(state.options.sortOptions) ? state.options.sortOptions : [];
          var so = sortOptions.find(function(item) { return item.value === state.params.sortBy; });
          if (so && so.label) {
            filterParts.push('Sorted by: ' + so.label);
          }
        }

        summaryFiltersEl.textContent = filterParts.join(' · ');
      }

      function renderMovieResults(container, items) {
        if (!container) return;
        container.innerHTML = '';

        if (!items || items.length === 0) {
          var emptyItem = document.createElement('li');
          emptyItem.className = 'results-list__empty';
          emptyItem.textContent = 'No movies match these filters.';
          container.appendChild(emptyItem);
          return;
        }

        items.forEach(function(entry) {
          var movie = entry && entry.movie ? entry.movie : null;
          if (!movie) return;

          var li = document.createElement('li');
          li.className = 'results-list__item movie-card';

          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'movie-card__body';
          button.dataset.action = 'open-movie';
          button.dataset.movieId = movie.id;

          var releaseDateText = formatReleaseDate(movie.releaseDate);
          var statusLabel = formatStatusLabel(movie.status);
          var languageLabel = formatLanguageLabel(movie.primaryLanguage);
          var runtimeText = movie.runtimeMinutes ? (movie.runtimeMinutes + ' min') : '';

          var metaParts = [];
          if (statusLabel) metaParts.push(statusLabel);
          if (releaseDateText) metaParts.push(releaseDateText);
          if (runtimeText) metaParts.push(runtimeText);
          if (languageLabel) metaParts.push(languageLabel);

          var ratingText = '';
          if (typeof movie.audienceRating === 'number') {
            var rating = movie.audienceRating.toFixed(1);
            if (movie.ratingCount != null) {
              ratingText = '\u2605 ' + rating + ' (' + movie.ratingCount + ')';
            } else {
              ratingText = '\u2605 ' + rating;
            }
          }

          var matchedCastLabel = '';
          if (Array.isArray(entry.matchedCastNames) && entry.matchedCastNames.length > 0) {
            matchedCastLabel = 'Matches cast: ' + entry.matchedCastNames.join(', ');
          }

          var posterHtml = '';
          if (movie.posterImageUrl) {
            posterHtml = '<img class="movie-card__poster" src="' + escapeHtml(movie.posterImageUrl) + '" alt="Poster for ' + escapeHtml(movie.title) + '">';
          } else {
            posterHtml = '<div class="movie-card__poster movie-card__poster--placeholder" aria-hidden="true"></div>';
          }

          var familyBadgeHtml = '';
          if (movie.isFamilyFriendly) {
            familyBadgeHtml = '<span class="movie-card__badge movie-card__badge--family">Family</span>';
          }

          var matchedCastHtml = '';
          if (matchedCastLabel) {
            matchedCastHtml = '<p class="movie-card__cast-match">' + escapeHtml(matchedCastLabel) + '</p>';
          }

          var ratingHtml = '';
          if (ratingText) {
            ratingHtml = '<p class="movie-card__rating">' + escapeHtml(ratingText) + '</p>';
          }

          button.innerHTML = `
            <div class="movie-card__media">
              ${posterHtml}
            </div>
            <div class="movie-card__content">
              <div class="movie-card__header-line">
                <h3 class="movie-card__title">${escapeHtml(movie.title)}</h3>
                ${familyBadgeHtml}
              </div>
              <p class="movie-card__meta">${escapeHtml(metaParts.join(' \u00b7 '))}</p>
              ${ratingHtml}
              ${matchedCastHtml}
            </div>
          `;

          li.appendChild(button);
          container.appendChild(li);
        });
      }

      function renderPeopleResults(container, items) {
        if (!container) return;
        container.innerHTML = '';

        if (!items || items.length === 0) {
          var emptyItem = document.createElement('li');
          emptyItem.className = 'results-list__empty';
          emptyItem.textContent = 'No people match these filters.';
          container.appendChild(emptyItem);
          return;
        }

        items.forEach(function(entry) {
          var person = entry && entry.person ? entry.person : null;
          if (!person) return;

          var li = document.createElement('li');
          li.className = 'results-list__item person-card';

          var card = document.createElement('article');
          card.className = 'person-card__body';

          var avatarHtml = '';
          if (person.profileImageUrl) {
            avatarHtml = '<img class="person-card__avatar" src="' + escapeHtml(person.profileImageUrl) + '" alt="' + escapeHtml(person.name) + '">';
          } else {
            avatarHtml = '<div class="person-card__avatar person-card__avatar--placeholder" aria-hidden="true"></div>';
          }

          var knownFor = Array.isArray(entry.knownForMovies) ? entry.knownForMovies : [];
          var knownForItemsHtml = '';
          if (knownFor.length > 0) {
            var itemsHtml = knownFor.slice(0, 3).map(function(movie) {
              return '<li class="person-card__known-for-item">\n                  <button type="button" class="person-card__known-for-button" data-action="open-known-for-movie" data-movie-id="' + escapeHtml(movie.id) + '">' + escapeHtml(movie.title) + '</button>\n                </li>';
            }).join('');
            knownForItemsHtml = '<ul class="person-card__known-for-list">' + itemsHtml + '</ul>';
          }

          var bioSnippet = '';
          if (person.bio) {
            var trimmed = String(person.bio).trim();
            if (trimmed.length > 160) {
              trimmed = trimmed.slice(0, 157) + '…';
            }
            bioSnippet = '<p class="person-card__bio">' + escapeHtml(trimmed) + '</p>';
          }

          var buttonLabel = 'Search movies with this person';

          card.innerHTML = `
            <div class="person-card__media">
              ${avatarHtml}
            </div>
            <div class="person-card__content">
              <h3 class="person-card__name">${escapeHtml(person.name)}</h3>
              ${bioSnippet}
              <div class="person-card__known-for">
                ${knownFor.length > 0 ? '<p class="person-card__known-for-label">Known for</p>' : ''}
                ${knownForItemsHtml}
              </div>
              <div class="person-card__actions">
                <button type="button" class="btn person-card__action" data-action="refine-to-person" data-person-name="${escapeHtml(person.name)}">${escapeHtml(buttonLabel)}</button>
              </div>
            </div>
          `;

          li.appendChild(card);
          container.appendChild(li);
        });
      }

      function renderResultsCounts() {
        var movieCount = Array.isArray(state.searchResponse.movies) ? state.searchResponse.movies.length : 0;
        var peopleCount = Array.isArray(state.searchResponse.people) ? state.searchResponse.people.length : 0;

        if (movieResultsCountEl) {
          movieResultsCountEl.textContent = movieCount > 0 ? (movieCount + ' result' + (movieCount === 1 ? '' : 's')) : 'No results';
        }
        if (peopleResultsCountEl) {
          peopleResultsCountEl.textContent = peopleCount > 0 ? (peopleCount + ' result' + (peopleCount === 1 ? '' : 's')) : 'No results';
        }
      }

      function renderResultsVisibility() {
        if (!movieResultsSection || !peopleResultsSection) return;
        var ct = state.params.contentType || '';
        if (ct === 'movies') {
          movieResultsSection.hidden = false;
          peopleResultsSection.hidden = true;
        } else if (ct === 'people') {
          movieResultsSection.hidden = true;
          peopleResultsSection.hidden = false;
        } else {
          movieResultsSection.hidden = false;
          peopleResultsSection.hidden = false;
        }
      }

      function renderHelperLinks(container) {
        if (!container) return;
        container.innerHTML = '';

        var entries = Array.isArray(state.searchResponse.movies) ? state.searchResponse.movies : [];
        var movies = entries.map(function(entry) { return entry.movie; }).filter(function(movie) { return !!movie; });

        if (movies.length === 0) {
          return;
        }

        var nowShowingCount = movies.filter(function(m) { return m.status === 'now_showing'; }).length;
        var upcomingCount = movies.filter(function(m) { return m.status === 'upcoming'; }).length;
        var familyCount = movies.filter(function(m) { return !!m.isFamilyFriendly; }).length;

        if (nowShowingCount > 0 || state.params.status === 'now_showing') {
          var genreParam = familyCount > 0 ? 'family' : 'all';
          var liNow = document.createElement('li');
          liNow.className = 'results-helper-links__item';
          var aNow = document.createElement('a');
          aNow.href = 'javascript:void(0)';
          aNow.className = 'results-helper-links__link';
          aNow.dataset.action = 'see-all-now-showing';
          aNow.dataset.genres = genreParam;
          aNow.textContent = familyCount > 0 ? 'See all now showing family movies' : 'See all now showing movies';
          liNow.appendChild(aNow);
          container.appendChild(liNow);
        }

        if (upcomingCount > 0 || state.params.status === 'upcoming') {
          var liUpcoming = document.createElement('li');
          liUpcoming.className = 'results-helper-links__item';
          var aUpcoming = document.createElement('a');
          aUpcoming.href = 'javascript:void(0)';
          aUpcoming.className = 'results-helper-links__link';
          aUpcoming.dataset.action = 'browse-upcoming';
          aUpcoming.textContent = 'Browse all upcoming titles in the next two months';
          liUpcoming.appendChild(aUpcoming);
          container.appendChild(liUpcoming);
        }
      }

      function renderAll() {
        renderSummary();
        renderResultsCounts();
        renderResultsVisibility();
        renderMovieResults(movieResultsList, state.searchResponse.movies);
        renderPeopleResults(peopleResultsList, state.searchResponse.people);
        renderHelperLinks(helperLinksList);
      }

      function runSearch() {
        setLoading(true);
        clearError();

        var queryValue = state.params.query != null ? String(state.params.query) : '';
        var filters = {
          contentType: state.params.contentType,
          movieStatus: state.params.status
        };
        var sortBy = state.params.sortBy;

        var response;
        try {
          response = WebsiteSDK.searchCatalog(queryValue, filters, sortBy);
        } catch (err) {
          showError('We could not load search results. Please try again.');
          setLoading(false);
          return;
        }

        state.searchResponse.movies = Array.isArray(response && response.movies) ? response.movies : [];
        state.searchResponse.people = Array.isArray(response && response.people) ? response.people : [];

        renderAll();
        setLoading(false);
      }

      function handleStatusChange(event) {
        var value = event.target.value || state.defaults.status;
        if (value === state.params.status) return;
        state.params.status = value;
        updateUrl(state.params, { replace: false });
        renderFiltersUI();
        runSearch();
      }

      function handleSortByChange(event) {
        var value = event.target.value || state.defaults.sortBy;
        if (value === state.params.sortBy) return;
        state.params.sortBy = value;
        updateUrl(state.params, { replace: false });
        renderFiltersUI();
        runSearch();
      }

      function handleClearFilters() {
        state.params.contentType = state.defaults.contentType;
        state.params.status = state.defaults.status;
        state.params.sortBy = state.defaults.sortBy;
        updateUrl(state.params, { replace: false });
        renderFiltersUI();
        runSearch();
      }

      function handleGlobalSearchSubmit(event) {
        event.preventDefault();
        if (!globalSearchInput) return;
        var value = globalSearchInput.value != null ? globalSearchInput.value.trim() : '';
        state.params.query = value;
        // Preserve existing filters
        updateUrl(state.params, { replace: false });
        runSearch();
      }

      function handleContentTypeClick(event) {
        var target = event.target.closest('[data-action="set-content-type"]');
        if (!target) return;
        var newType = target.dataset.contentType;
        if (!newType || newType === state.params.contentType) return;
        state.params.contentType = newType;
        updateUrl(state.params, { replace: false });
        renderFiltersUI();
        renderResultsVisibility();
        runSearch();
      }

      function handleMovieResultsClick(event) {
        var target = event.target.closest('[data-action="open-movie"]');
        if (!target) return;
        var movieId = target.dataset.movieId;
        if (!movieId) return;
        window.location.href = 'movie_detail.html?movieId=' + encodeURIComponent(movieId);
      }

      function handlePeopleResultsClick(event) {
        var refineTarget = event.target.closest('[data-action="refine-to-person"]');
        if (refineTarget) {
          var personName = refineTarget.dataset.personName || '';
          state.params.query = personName;
          if (globalSearchInput) {
            globalSearchInput.value = personName;
          }
          // Set contentType to the movies-specific option if available
          if (state.options && Array.isArray(state.options.contentTypes)) {
            var moviesOption = state.options.contentTypes.find(function(ct) { return ct.value === 'movies'; });
            if (moviesOption) {
              state.params.contentType = moviesOption.value;
            }
          }
          updateUrl(state.params, { replace: false });
          renderFiltersUI();
          renderResultsVisibility();
          runSearch();
          return;
        }

        var knownForTarget = event.target.closest('[data-action="open-known-for-movie"]');
        if (knownForTarget) {
          var movieId = knownForTarget.dataset.movieId;
          if (!movieId) return;
          window.location.href = 'movie_detail.html?movieId=' + encodeURIComponent(movieId);
        }
      }

      function handleHelperLinksClick(event) {
        var nowTarget = event.target.closest('[data-action="see-all-now-showing"]');
        if (nowTarget) {
          var genres = nowTarget.dataset.genres || 'all';
          var url = 'now_showing.html?date=today&genres=' + encodeURIComponent(genres);
          window.location.href = url;
          return;
        }
        var upcomingTarget = event.target.closest('[data-action="browse-upcoming"]');
        if (upcomingTarget) {
          var urlUpcoming = 'upcoming.html?releasePresetId=next_two_months';
          window.location.href = urlUpcoming;
        }
      }

      function setupEventHandlers() {
        if (globalSearchForm) {
          globalSearchForm.addEventListener('submit', handleGlobalSearchSubmit);
        }
        if (contentTypeToggleContainer) {
          contentTypeToggleContainer.addEventListener('click', handleContentTypeClick);
        }
        if (statusSelect) {
          statusSelect.addEventListener('change', handleStatusChange);
        }
        if (sortBySelect) {
          sortBySelect.addEventListener('change', handleSortByChange);
        }
        if (clearFiltersButton) {
          clearFiltersButton.addEventListener('click', handleClearFilters);
        }
        if (movieResultsList) {
          movieResultsList.addEventListener('click', handleMovieResultsClick);
        }
        if (peopleResultsList) {
          peopleResultsList.addEventListener('click', handlePeopleResultsClick);
        }
        if (helperLinksList) {
          helperLinksList.addEventListener('click', handleHelperLinksClick);
        }

        window.addEventListener('popstate', function() {
          if (!state.options) return;
          var raw = getUrlParams();
          var normalized = normalizeParams(raw, state.options);
          state.params = normalized.params;
          if (globalSearchInput) {
            globalSearchInput.value = state.params.query || '';
          }
          renderFiltersUI();
          runSearch();
        });
      }

      function initialize() {
        setLoading(true);
        clearError();

        var options;
        try {
          options = WebsiteSDK.getSearchOptions();
        } catch (err) {
          showError('We could not load search filters. Please refresh the page.');
          setLoading(false);
          return;
        }

        state.options = options || { contentTypes: [], movieStatuses: [], sortOptions: [] };

        var rawParams = getUrlParams();
        var normalized = normalizeParams(rawParams, state.options);
        state.params = normalized.params;
        state.defaults = normalized.defaults;

        if (normalized.urlNeedsUpdate) {
          updateUrl(state.params, { replace: true });
        }

        if (globalSearchInput) {
          globalSearchInput.value = state.params.query || '';
        }

        renderFiltersUI();
        setupEventHandlers();
        runSearch();
      }

      initialize();
    });
  </script>
</body>
</html>
