<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Supermarket Grocery Retail - Search Results</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="search.css" />
</head>
<body class="site-body">
  <header class="site-header">
    <div class="top-bar">
      <div class="top-bar-inner container">
        <div class="top-bar-left">
          <a href="index.html" class="brand" aria-label="SuperMarket home">
            <span class="brand-mark">SM</span>
            <span class="brand-text">
              <span class="brand-name">SuperMarket</span>
              <span class="brand-tagline">Fresh groceries, every day</span>
            </span>
          </a>
        </div>
        <div class="top-bar-right">
          <a href="help.html" class="top-link" title="Access help articles and FAQs">Help</a>
          <a href="store_locator.html" class="top-link" title="Choose or change your preferred pickup store by ZIP">Change Store</a>
        </div>
      </div>
    </div>

    <div class="main-header">
      <div class="main-header-inner container">
        <div class="main-header-left" aria-hidden="true"></div>
        <div class="main-header-center">
          <form class="header-search" action="search.html" method="get" role="search" data-action="header-search-submit" data-component="search-query-form">
            <label class="visually-hidden" for="header-search-input">Search products</label>
            <input
              id="header-search-input"
              type="search"
              name="query"
              placeholder="Search products, recipes, and more"
              autocomplete="off"
            />
            <button type="submit" class="search-button">
              <span class="search-button-label">Search</span>
            </button>
          </form>
        </div>
        <div class="main-header-right">
          <div class="cart-status-container" data-populate="cart-status-indicator" data-component="cart-status-indicator"></div>
        </div>
      </div>

      <nav class="primary-nav" aria-label="Primary navigation">
        <div class="primary-nav-inner container">
          <ul class="nav-list" data-populate="top-level-categories" data-component="global-header"></ul>
        </div>
      </nav>
    </div>
  </header>

  <main id="content" class="site-main container" role="main">
    <section class="search-page" data-component="search-results-page">
      <header class="search-page-header">
        <h1 class="visually-hidden">Search results</h1>
        <form class="search-inline-form" action="search.html" method="get" role="search" data-action="results-search-submit">
          <label class="visually-hidden" for="results-search-input">Search products</label>
          <input
            id="results-search-input"
            type="search"
            name="query"
            class="search-inline-input"
            placeholder="Search for groceries"
            autocomplete="off"
          />
          <button type="submit" class="btn btn-primary search-inline-button">
            <span class="search-button-label">Search</span>
          </button>
        </form>
      </header>

      <div class="search-layout">
        <aside class="filter-sidebar" data-component="filter-sidebar" data-populate="search-filters">
          <!-- Filter sidebar content rendered via JavaScript -->
        </aside>

        <section class="results-main">
          <div class="results-header-row">
            <div class="results-summary" data-component="results-summary" data-populate="results-summary">
              <!-- Results summary rendered via JavaScript -->
            </div>
            <div class="sort-controls" data-component="sort-controls">
              <label for="sortSelect" class="sort-label">Sort by:</label>
              <select id="sortSelect" class="sort-select" data-action="sort-change">
                <option value="relevance">Relevance</option>
                <option value="price_low_to_high">Price: Low to High</option>
                <option value="price_high_to_low">Price: High to Low</option>
                <option value="customer_rating_high_to_low">Customer Rating</option>
              </select>
            </div>
          </div>

          <div class="active-filters-bar" data-component="active-filters-bar" data-populate="active-filters">
            <!-- Active filter chips rendered via JavaScript -->
          </div>

          <div class="product-grid" data-component="product-grid" data-populate="search-results">
            <!-- Product cards rendered via JavaScript -->
          </div>

          <nav class="pagination-controls" data-component="pagination-controls" data-populate="pagination-controls" aria-label="Search results pages">
            <!-- Pagination rendered via JavaScript -->
          </nav>
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-top">
      <div class="footer-inner container">
        <div class="footer-brand">
          <span class="brand-mark brand-mark-footer">SM</span>
          <span class="brand-name-footer">SuperMarket</span>
        </div>
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-links">
            <li>
              <a href="about.html" title="Learn more about the supermarket and its services">About Us</a>
            </li>
            <li>
              <a href="contact.html" title="Customer service contact information and support">Contact Us</a>
            </li>
            <li>
              <a href="help.html" title="Help center and frequently asked questions">Help &amp; FAQs</a>
            </li>
            <li>
              <a href="fulfillment.html" title="Details about delivery areas, pickup, and fulfillment options">Delivery &amp; Pickup Info</a>
            </li>
            <li>
              <a href="promotions.html" title="Current promotions, deals, and coupon information">Promotions</a>
            </li>
            <li>
              <a href="privacy.html" title="Information about data collection and privacy practices">Privacy Policy</a>
            </li>
            <li>
              <a href="terms.html" title="Website, order, and promotion terms and conditions">Terms &amp; Conditions</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
    <div class="footer-bottom">
      <div class="footer-bottom-inner container">
        <p class="footer-copy">&copy; 2024 SuperMarket. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // ---------- URL & state ----------
      const urlParams = new URLSearchParams(window.location.search);
      const searchState = {
        query: (urlParams.get('query') || '').trim(),
        selectedCategoryId: urlParams.get('selectedCategoryId') || '',
        priceMin: urlParams.get('priceMin') || '',
        priceMax: urlParams.get('priceMax') || '',
        ratingMin: urlParams.get('ratingMin') || '',
        size: urlParams.get('size') || '',
        dietary: urlParams.get('dietary') || '',
        sort: urlParams.get('sort') || '',
        page: parseInt(urlParams.get('page') || '1', 10)
      };
      if (!Number.isFinite(searchState.page) || searchState.page < 1) {
        searchState.page = 1;
      }

      const hasQuery = !!searchState.query;
      let filterOptions = null;
      let searchResult = null;
      let categoryMapById = {};

      // Sync search inputs (header + inline)
      const headerSearchInput = document.getElementById('header-search-input');
      if (headerSearchInput) {
        headerSearchInput.value = searchState.query;
      }
      const resultsSearchInput = document.getElementById('results-search-input');
      if (resultsSearchInput) {
        resultsSearchInput.value = searchState.query;
      }

      // ---------- Helper functions ----------
      function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatCurrency(amount) {
        if (typeof amount !== 'number' || !Number.isFinite(amount)) return '';
        return '$' + amount.toFixed(2);
      }

      function formatDietaryTag(tag) {
        if (!tag) return '';
        return tag
          .split('_')
          .map(function(part) { return part.charAt(0).toUpperCase() + part.slice(1); })
          .join(' ');
      }

      function buildFiltersFromState(state) {
        const filters = {};
        if (state.priceMin) {
          const n = Number(state.priceMin);
          if (Number.isFinite(n)) {
            filters.minPrice = n;
          }
        }
        if (state.priceMax) {
          const n = Number(state.priceMax);
          if (Number.isFinite(n)) {
            filters.maxPrice = n;
          }
        }
        if (state.ratingMin) {
          const n = Number(state.ratingMin);
          if (Number.isFinite(n)) {
            filters.minRating = n;
          }
        }
        if (state.size) {
          filters.sizeVolume = state.size;
        }
        if (state.dietary) {
          filters.dietaryTags = [state.dietary];
        }
        return filters;
      }

      function computeMeasurementUnit(product) {
        if (!product) return 'unit';
        if (product.soldBy === 'weight') {
          if (product.weightUnit) return product.weightUnit;
          if (product.volumeUnit) return product.volumeUnit;
        }
        // Map unitOfMeasure to logical measurementUnit values
        if (product.unitOfMeasure === 'per_lb') return 'lb';
        if (product.unitOfMeasure === 'per_kg') return 'kg';
        if (product.unitOfMeasure === 'per_oz') return 'oz';
        if (product.unitOfMeasure === 'per_g') return 'g';
        if (product.unitOfMeasure === 'per_liter') return 'l';
        if (product.unitOfMeasure === 'per_ml') return 'ml';
        if (product.unitOfMeasure === 'per_fl_oz') return 'fl_oz';
        if (product.unitOfMeasure === 'per_box') return 'box';
        if (product.unitOfMeasure === 'per_bottle') return 'bottle';
        if (product.unitOfMeasure === 'per_can') return 'can';
        if (product.unitOfMeasure === 'per_pack') return 'pack';
        return 'unit';
      }

      function computeTotalItemsInCart(items) {
        if (!Array.isArray(items)) return 0;
        return items.reduce(function(sum, entry) {
          const cartItem = entry && entry.cartItem;
          const qty = cartItem && typeof cartItem.quantity === 'number' ? cartItem.quantity : 0;
          return sum + qty;
        }, 0);
      }

      function findCartQuantityForProduct(cartItems, productId) {
        if (!Array.isArray(cartItems)) return 0;
        for (var i = 0; i < cartItems.length; i++) {
          var entry = cartItems[i];
          if (entry && entry.cartItem && entry.cartItem.productId === productId) {
            return typeof entry.cartItem.quantity === 'number' ? entry.cartItem.quantity : 0;
          }
        }
        return 0;
      }

      function navigateWithState(overrides, options) {
        const opts = options || {};
        const resetPage = opts.resetPage !== false; // default true
        const clearFilters = !!opts.clearFilters;
        var next = {
          query: searchState.query,
          selectedCategoryId: searchState.selectedCategoryId,
          priceMin: searchState.priceMin,
          priceMax: searchState.priceMax,
          ratingMin: searchState.ratingMin,
          size: searchState.size,
          dietary: searchState.dietary,
          sort: searchState.sort,
          page: searchState.page
        };

        if (clearFilters) {
          next.selectedCategoryId = '';
          next.priceMin = '';
          next.priceMax = '';
          next.ratingMin = '';
          next.size = '';
          next.dietary = '';
          next.sort = '';
        }

        if (overrides) {
          Object.keys(overrides).forEach(function(key) {
            next[key] = overrides[key];
          });
        }

        if (resetPage) {
          next.page = 1;
        }

        const params = new URLSearchParams();
        if (next.query && next.query.trim() !== '') {
          params.set('query', next.query.trim());
        }
        if (next.selectedCategoryId) {
          params.set('selectedCategoryId', next.selectedCategoryId);
        }
        if (next.priceMin) {
          params.set('priceMin', next.priceMin);
        }
        if (next.priceMax) {
          params.set('priceMax', next.priceMax);
        }
        if (next.ratingMin) {
          params.set('ratingMin', next.ratingMin);
        }
        if (next.size) {
          params.set('size', next.size);
        }
        if (next.dietary) {
          params.set('dietary', next.dietary);
        }
        if (next.sort) {
          params.set('sort', next.sort);
        }
        if (next.page && Number.isFinite(next.page) && next.page > 1) {
          params.set('page', String(next.page));
        }

        var qs = params.toString();
        var url = 'search.html' + (qs ? '?' + qs : '');
        window.location.href = url;
      }

      // ---------- Render functions (use container directly) ----------
      function renderCartStatus(container, cartData) {
        var cart = cartData && cartData.cart;
        var items = cartData && cartData.items;
        var totalItems = computeTotalItemsInCart(items);
        var subtotal = cart && typeof cart.subtotal === 'number' ? cart.subtotal : 0;
        var subtotalText = subtotal ? formatCurrency(subtotal) : '';

        container.innerHTML = "" +
          '<a href="cart.html" class="cart-status-indicator-link" data-action="cart-icon-click">' +
            '<span class="cart-status-icon" aria-hidden="true"></span>' +
            '<span class="cart-status-text">Cart</span>' +
            '<span class="cart-status-count" aria-label="Items in cart">' + escapeHtml(totalItems) + '</span>' +
            (subtotalText ? '<span class="cart-status-subtotal">' + escapeHtml(subtotalText) + '</span>' : '') +
          '</a>';
      }

      function renderTopLevelCategories(container, categories) {
        container.innerHTML = '';
        if (!Array.isArray(categories) || categories.length === 0) {
          // Fallback static navigation if no data
          container.innerHTML = '' +
            '<li class="nav-item"><a href="index.html" title="Homepage and starting point for shopping">Home</a></li>' +
            '<li class="nav-item"><a href="category.html?categoryId=produce_all" title="Browse all fresh produce, including fruits, vegetables, and herbs">Produce</a></li>' +
            '<li class="nav-item"><a href="category.html?categoryId=pantry_all" title="Browse pantry staples and subcategories such as Pasta &amp; Grains">Pantry</a></li>' +
            '<li class="nav-item"><a href="category.html?categoryId=frozen_all" title="Browse frozen foods, including Vegetarian Meals and Family Meals">Frozen</a></li>' +
            '<li class="nav-item"><a href="category.html?categoryId=snacks_all" title="Browse snack foods, including snack bars and granola bars">Snacks</a></li>' +
            '<li class="nav-item"><a href="category.html?categoryId=bakery_all" title="Browse bakery items available for pickup or delivery">Bakery</a></li>' +
            '<li class="nav-item"><a href="category.html?categoryId=household_all" title="Browse household essentials such as laundry detergent">Household</a></li>' +
            '<li class="nav-item"><a href="fulfillment.html" title="Set delivery or pickup preferences and delivery ZIP">Delivery &amp; Pickup</a></li>' +
            '<li class="nav-item"><a href="promotions.html" title="View current deals, including Buy 2 Get 1 Free offers">Promotions</a></li>';
          return;
        }

        // Sort by sortOrder if available
        var sorted = categories.slice().sort(function(a, b) {
          var ao = typeof a.sortOrder === 'number' ? a.sortOrder : 0;
          var bo = typeof b.sortOrder === 'number' ? b.sortOrder : 0;
          return ao - bo;
        });

        var html = '';
        for (var i = 0; i < sorted.length; i++) {
          var cat = sorted[i];
          var categoryId = cat && cat.id ? cat.id : (cat && cat.urlParam ? cat.urlParam : '');
          if (!categoryId) continue;
          var name = cat && cat.name ? cat.name : categoryId;
          var href = 'category.html?categoryId=' + encodeURIComponent(categoryId);
          html += '<li class="nav-item">' +
                    '<a href="' + href + '">' + escapeHtml(name) + '</a>' +
                  '</li>';
        }
        container.innerHTML = html;
      }

      function renderFilterSidebar(container, options, state, hasQueryFlag) {
        if (!hasQueryFlag) {
          container.innerHTML = '' +
            '<div class="filter-empty">' +
              '<p>Start by searching for products to see available filters.</p>' +
            '</div>';
          return;
        }

        var price = options && options.price ? options.price : null;
        var ratingOptions = options && Array.isArray(options.ratingOptions) ? options.ratingOptions : [];
        var sizeVolumeOptions = options && Array.isArray(options.sizeVolumeOptions) ? options.sizeVolumeOptions : [];
        var dietaryTags = options && Array.isArray(options.dietaryTags) ? options.dietaryTags : [];
        var availableCategories = options && Array.isArray(options.availableCategories) ? options.availableCategories : [];

        // Build category radio list
        var categoryHtml = '';
        categoryHtml += '<div class="filter-group filter-group-category">' +
          '<div class="filter-group-header"><h2 class="filter-title">Category</h2></div>' +
          '<div class="filter-group-body">';
        categoryHtml += '<div class="filter-option">' +
          '<label>' +
          '<input type="radio" name="categoryFilter" value="" ' + (state.selectedCategoryId ? '' : 'checked') + ' data-action="category-filter-change" />' +
          '<span>All categories</span>' +
          '</label>' +
          '</div>';
        for (var i = 0; i < availableCategories.length; i++) {
          var cat = availableCategories[i];
          var cid = cat && cat.id ? cat.id : '';
          if (!cid) continue;
          var checked = cid === state.selectedCategoryId ? 'checked' : '';
          var label = cat && cat.name ? cat.name : cid;
          categoryHtml += '<div class="filter-option">' +
            '<label>' +
            '<input type="radio" name="categoryFilter" value="' + escapeHtml(cid) + '" ' + checked + ' data-action="category-filter-change" />' +
            '<span>' + escapeHtml(label) + '</span>' +
            '</label>' +
            '</div>';
        }
        categoryHtml += '</div></div>';

        // Price range
        var priceMinAllowed = price && typeof price.minAllowed === 'number' ? price.minAllowed : '';
        var priceMaxAllowed = price && typeof price.maxAllowed === 'number' ? price.maxAllowed : '';
        var priceHtml = '' +
          '<div class="filter-group filter-group-price">' +
            '<div class="filter-group-header"><h2 class="filter-title">Price</h2></div>' +
            '<div class="filter-group-body">' +
              '<form class="price-filter-form" data-action="price-filter-submit">' +
                '<div class="price-input-row">' +
                  '<label class="price-label">Min' +
                    '<input type="number" name="priceMin" class="price-input" min="' + escapeHtml(priceMinAllowed) + '" max="' + escapeHtml(priceMaxAllowed) + '" step="0.01" value="' + escapeHtml(state.priceMin) + '" />' +
                  '</label>' +
                  '<label class="price-label">Max' +
                    '<input type="number" name="priceMax" class="price-input" min="' + escapeHtml(priceMinAllowed) + '" max="' + escapeHtml(priceMaxAllowed) + '" step="0.01" value="' + escapeHtml(state.priceMax) + '" />' +
                  '</label>' +
                '</div>' +
                '<div class="filter-actions-row">' +
                  '<button type="submit" class="btn btn-secondary price-apply-button">Apply</button>' +
                '</div>' +
              '</form>' +
            '</div>' +
          '</div>';

        // Rating
        var ratingHtml = '';
        if (ratingOptions.length > 0) {
          ratingHtml += '<div class="filter-group filter-group-rating">' +
            '<div class="filter-group-header"><h2 class="filter-title">Rating</h2></div>' +
            '<div class="filter-group-body">';
          ratingHtml += '<div class="filter-option">' +
            '<label>' +
            '<input type="radio" name="ratingFilter" value="" ' + (state.ratingMin ? '' : 'checked') + ' data-action="rating-filter-change" />' +
            '<span>Any rating</span>' +
            '</label>' +
            '</div>';
          for (var r = 0; r < ratingOptions.length; r++) {
            var ratingVal = ratingOptions[r];
            var checkedRating = String(ratingVal) === String(state.ratingMin) ? 'checked' : '';
            ratingHtml += '<div class="filter-option">' +
              '<label>' +
              '<input type="radio" name="ratingFilter" value="' + escapeHtml(ratingVal) + '" ' + checkedRating + ' data-action="rating-filter-change" />' +
              '<span>' + escapeHtml(ratingVal) + ' stars &amp; up</span>' +
              '</label>' +
              '</div>';
          }
          ratingHtml += '</div></div>';
        }

        // Size / volume
        var sizeHtml = '';
        if (sizeVolumeOptions.length > 0) {
          sizeHtml += '<div class="filter-group filter-group-size">' +
            '<div class="filter-group-header"><h2 class="filter-title">Size / Volume</h2></div>' +
            '<div class="filter-group-body">' +
              '<label class="filter-select-label">' +
                '<span class="visually-hidden">Size or volume</span>' +
                '<select class="filter-select" data-action="size-filter-change">' +
                  '<option value="">All sizes</option>';
          for (var s = 0; s < sizeVolumeOptions.length; s++) {
            var sizeVal = sizeVolumeOptions[s];
            var selectedSize = sizeVal === state.size ? 'selected' : '';
            sizeHtml += '<option value="' + escapeHtml(sizeVal) + '" ' + selectedSize + '>' + escapeHtml(sizeVal) + '</option>';
          }
          sizeHtml += '</select>' +
              '</label>' +
            '</div>' +
          '</div>';
        }

        // Dietary
        var dietaryHtml = '';
        if (dietaryTags.length > 0) {
          dietaryHtml += '<div class="filter-group filter-group-dietary">' +
            '<div class="filter-group-header"><h2 class="filter-title">Dietary</h2></div>' +
            '<div class="filter-group-body">' +
              '<label class="filter-select-label">' +
                '<span class="visually-hidden">Dietary filter</span>' +
                '<select class="filter-select" data-action="dietary-filter-change">' +
                  '<option value="">All options</option>';
          for (var d = 0; d < dietaryTags.length; d++) {
            var tag = dietaryTags[d];
            var selectedDietary = tag === state.dietary ? 'selected' : '';
            dietaryHtml += '<option value="' + escapeHtml(tag) + '" ' + selectedDietary + '>' + escapeHtml(formatDietaryTag(tag)) + '</option>';
          }
          dietaryHtml += '</select>' +
              '</label>' +
            '</div>' +
          '</div>';
        }

        var clearHtml = '' +
          '<div class="filter-group filter-group-clear">' +
            '<div class="filter-group-body">' +
              '<button type="button" class="btn btn-tertiary clear-filters-button" data-action="clear-all-filters">Clear all filters</button>' +
            '</div>' +
          '</div>';

        container.innerHTML = categoryHtml + priceHtml + ratingHtml + sizeHtml + dietaryHtml + clearHtml;
      }

      function renderResultsSummary(container, state, result, hasQueryFlag) {
        if (!hasQueryFlag) {
          container.innerHTML = '<p class="results-summary-text">Search for products using the search box above.</p>';
          return;
        }
        var total = result && typeof result.totalResults === 'number' ? result.totalResults : 0;
        var page = result && typeof result.page === 'number' ? result.page : state.page;
        var pageSize = result && typeof result.pageSize === 'number' ? result.pageSize : 0;
        var startIndex = total === 0 ? 0 : (page - 1) * pageSize + 1;
        var endIndex = total === 0 ? 0 : Math.min(page * pageSize, total);

        var summaryText = '';
        if (total === 0) {
          summaryText = 'No results for \'' + escapeHtml(state.query) + '\'.';
        } else {
          summaryText = escapeHtml(total) + ' result' + (total === 1 ? '' : 's') +
            ' for \'' + escapeHtml(state.query) + '\'';
        }

        container.innerHTML = '' +
          '<p class="results-summary-text">' + summaryText + '</p>' +
          (total > 0 ? '<p class="results-range">Showing ' + escapeHtml(startIndex) + '–' + escapeHtml(endIndex) + '</p>' : '');
      }

      function renderActiveFilters(container, state, options, result) {
        container.innerHTML = '';
        if (!state.query) return;

        var hasAnyFilter = !!(state.selectedCategoryId || state.priceMin || state.priceMax || state.ratingMin || state.size || state.dietary);
        if (!hasAnyFilter) return;

        var chipsHtml = '<div class="filter-chips">';

        // Build category map for label lookup
        var cats = [];
        if (options && Array.isArray(options.availableCategories)) {
          cats = cats.concat(options.availableCategories);
        }
        if (result && Array.isArray(result.availableCategories)) {
          cats = cats.concat(result.availableCategories);
        }
        for (var i = 0; i < cats.length; i++) {
          var cat = cats[i];
          if (cat && cat.id && !categoryMapById[cat.id]) {
            categoryMapById[cat.id] = cat.name || cat.id;
          }
        }

        if (state.selectedCategoryId) {
          var catLabel = categoryMapById[state.selectedCategoryId] || state.selectedCategoryId;
          chipsHtml += '<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-key="selectedCategoryId">' +
            '<span class="chip-label">Category: ' + escapeHtml(catLabel) + '</span>' +
            '<span class="chip-remove" aria-hidden="true">&times;</span>' +
            '<span class="visually-hidden">Remove category filter</span>' +
          '</button>';
        }

        if (state.priceMin || state.priceMax) {
          var priceLabel = 'Price: ' + (state.priceMin ? '$' + escapeHtml(state.priceMin) : '$0') + ' – ' + (state.priceMax ? '$' + escapeHtml(state.priceMax) : 'Any');
          chipsHtml += '<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-key="price">' +
            '<span class="chip-label">' + priceLabel + '</span>' +
            '<span class="chip-remove" aria-hidden="true">&times;</span>' +
            '<span class="visually-hidden">Remove price filter</span>' +
          '</button>';
        }

        if (state.ratingMin) {
          chipsHtml += '<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-key="ratingMin">' +
            '<span class="chip-label">' + escapeHtml(state.ratingMin) + ' stars &amp; up</span>' +
            '<span class="chip-remove" aria-hidden="true">&times;</span>' +
            '<span class="visually-hidden">Remove rating filter</span>' +
          '</button>';
        }

        if (state.size) {
          chipsHtml += '<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-key="size">' +
            '<span class="chip-label">Size: ' + escapeHtml(state.size) + '</span>' +
            '<span class="chip-remove" aria-hidden="true">&times;</span>' +
            '<span class="visually-hidden">Remove size filter</span>' +
          '</button>';
        }

        if (state.dietary) {
          chipsHtml += '<button type="button" class="filter-chip" data-action="remove-filter-chip" data-filter-key="dietary">' +
            '<span class="chip-label">Dietary: ' + escapeHtml(formatDietaryTag(state.dietary)) + '</span>' +
            '<span class="chip-remove" aria-hidden="true">&times;</span>' +
            '<span class="visually-hidden">Remove dietary filter</span>' +
          '</button>';
        }

        chipsHtml += '</div>' +
          '<button type="button" class="filter-clear-link" data-action="clear-all-filters">Clear all</button>';

        container.innerHTML = chipsHtml;
      }

      function renderProductGrid(container, result) {
        container.innerHTML = '';
        if (!searchState.query) {
          container.innerHTML = '';
          return;
        }
        if (!result || !Array.isArray(result.products) || result.products.length === 0) {
          container.innerHTML = '<div class="results-empty"><p>No products matched your search. Try adjusting your filters.</p></div>';
          return;
        }

        var cardsHtml = '';
        for (var i = 0; i < result.products.length; i++) {
          var entry = result.products[i];
          var product = entry && entry.product;
          if (!product) continue;
          var productId = product.id;
          var name = product.name || '';
          var imageUrl = product.imageUrl || '';
          var categoryId = product.categoryId || '';
          var categoryName = entry.categoryName || '';
          var priceText = typeof product.price === 'number' ? formatCurrency(product.price) : '';
          var sizeLabel = product.sizeLabel || '';
          var rating = typeof product.averageRating === 'number' ? product.averageRating : null;
          var ratingCount = typeof product.ratingCount === 'number' ? product.ratingCount : null;
          var isInCart = !!entry.isInCart;
          var currentCartQty = typeof entry.currentCartQuantity === 'number' ? entry.currentCartQuantity : 0;
          var measurementUnit = computeMeasurementUnit(product);
          var defaultQty = typeof product.defaultQuantityIncrement === 'number' && product.defaultQuantityIncrement > 0 ? product.defaultQuantityIncrement : 1;
          var typeOptions = Array.isArray(product.typeOptions) ? product.typeOptions : [];
          var defaultType = product.defaultTypeOption || '';

          var ratingHtml = '';
          if (rating !== null) {
            ratingHtml = '<div class="product-rating">' +
              '<span class="rating-value">' + escapeHtml(rating.toFixed(1)) + '</span>' +
              (ratingCount !== null ? '<span class="rating-count">(' + escapeHtml(ratingCount) + ')</span>' : '') +
            '</div>';
          }

          var typeSelectHtml = '';
          if (typeOptions.length > 0) {
            typeSelectHtml += '<div class="product-option-row">' +
              '<label class="product-option-label">Type' +
                '<select name="optionTypeLabel" class="product-option-select" data-action="option-change">';
            for (var t = 0; t < typeOptions.length; t++) {
              var opt = typeOptions[t];
              var selected = opt === defaultType ? 'selected' : '';
              typeSelectHtml += '<option value="' + escapeHtml(opt) + '" ' + selected + '>' + escapeHtml(formatDietaryTag(opt)) + '</option>';
            }
            typeSelectHtml += '</select>' +
              '</label>' +
            '</div>';
          }

          var inCartHtml = '';
          if (isInCart && currentCartQty > 0) {
            inCartHtml = '<div class="in-cart-status" data-role="in-cart-status">In cart: <span class="in-cart-qty">' + escapeHtml(currentCartQty) + '</span></div>';
          } else {
            inCartHtml = '<div class="in-cart-status" data-role="in-cart-status" hidden></div>';
          }

          var productUrl = 'product.html?id=' + encodeURIComponent(productId) + (categoryId ? '&categoryId=' + encodeURIComponent(categoryId) : '');

          cardsHtml += '' +
            '<article class="product-card" data-component="product-card" data-product-id="' + escapeHtml(productId) + '">' +
              '<a href="' + productUrl + '" class="product-card-image-link">' +
                (imageUrl ? '<img src="' + escapeHtml(imageUrl) + '" alt="' + escapeHtml(name) + '" class="product-card-image" />' : '<div class="product-card-image placeholder"></div>') +
              '</a>' +
              '<div class="product-card-body">' +
                '<a href="' + productUrl + '" class="product-card-title-link">' +
                  '<h3 class="product-card-title">' + escapeHtml(name) + '</h3>' +
                '</a>' +
                (categoryName ? '<p class="product-card-category">' + escapeHtml(categoryName) + '</p>' : '') +
                '<div class="product-card-meta">' +
                  (priceText ? '<div class="product-price">' + priceText + '</div>' : '') +
                  (sizeLabel ? '<div class="product-size">' + escapeHtml(sizeLabel) + '</div>' : '') +
                  ratingHtml +
                '</div>' +
              '</div>' +
              '<div class="product-card-footer">' +
                '<form class="add-to-cart-form" data-component="add-to-cart-form" data-action="add-to-cart-submit"' +
                  ' data-product-id="' + escapeHtml(productId) + '"' +
                  ' data-measurement-unit="' + escapeHtml(measurementUnit) + '"' +
                  ' data-size-label="' + escapeHtml(sizeLabel) + '">' +
                  typeSelectHtml +
                  '<div class="add-to-cart-row">' +
                    '<div class="quantity-control">' +
                      '<button type="button" class="qty-button qty-decrease" data-action="decrease-qty" aria-label="Decrease quantity">-</button>' +
                      '<input type="number" name="quantity" class="qty-input" min="0" step="' + escapeHtml(defaultQty) + '" value="' + escapeHtml(defaultQty) + '" />' +
                      '<button type="button" class="qty-button qty-increase" data-action="increase-qty" aria-label="Increase quantity">+</button>' +
                    '</div>' +
                    '<button type="submit" class="btn btn-primary add-to-cart-button">Add to cart</button>' +
                  '</div>' +
                  inCartHtml +
                '</form>' +
              '</div>' +
            '</article>';
        }

        container.innerHTML = cardsHtml;
      }

      function renderPagination(container, state, result) {
        container.innerHTML = '';
        if (!state.query || !result) return;
        var total = typeof result.totalResults === 'number' ? result.totalResults : 0;
        var pageSize = typeof result.pageSize === 'number' ? result.pageSize : 0;
        if (!total || !pageSize) return;

        var totalPages = Math.ceil(total / pageSize);
        if (totalPages <= 1) return;

        var currentPage = typeof result.page === 'number' ? result.page : state.page;
        var html = '<div class="pagination-inner">';

        var prevDisabled = currentPage <= 1 ? 'disabled' : '';
        html += '<button type="button" class="pagination-button pagination-prev" data-action="page-change" data-page="' + escapeHtml(currentPage - 1) + '" ' + prevDisabled + '>Previous</button>';

        var start = Math.max(1, currentPage - 2);
        var end = Math.min(totalPages, currentPage + 2);
        if (start > 1) {
          html += '<button type="button" class="pagination-button" data-action="page-change" data-page="1">1</button>';
          if (start > 2) {
            html += '<span class="pagination-ellipsis">…</span>';
          }
        }
        for (var p = start; p <= end; p++) {
          var isCurrent = p === currentPage;
          html += '<button type="button" class="pagination-button' + (isCurrent ? ' pagination-button-current' : '') + '" data-action="page-change" data-page="' + escapeHtml(p) + '">' + escapeHtml(p) + '</button>';
        }
        if (end < totalPages) {
          if (end < totalPages - 1) {
            html += '<span class="pagination-ellipsis">…</span>';
          }
          html += '<button type="button" class="pagination-button" data-action="page-change" data-page="' + escapeHtml(totalPages) + '">' + escapeHtml(totalPages) + '</button>';
        }

        var nextDisabled = currentPage >= totalPages ? 'disabled' : '';
        html += '<button type="button" class="pagination-button pagination-next" data-action="page-change" data-page="' + escapeHtml(currentPage + 1) + '" ' + nextDisabled + '>Next</button>';

        html += '</div>';
        container.innerHTML = html;
      }

      // ---------- Fetch data (SDK calls) ----------
      // Global navigation categories
      var topLevelCategories = WebsiteSDK.getTopLevelCategories();

      // Cart for header indicator (initial)
      var initialCartData = WebsiteSDK.getCart();

      // Search-related data
      if (hasQuery) {
        filterOptions = WebsiteSDK.getSearchFilterOptions(searchState.query);
        var filters = buildFiltersFromState(searchState);
        var filtersForCall = Object.keys(filters).length ? filters : undefined;
        var sortValue = searchState.sort || undefined;
        searchResult = WebsiteSDK.searchProducts(
          searchState.query,
          searchState.selectedCategoryId || undefined,
          filtersForCall,
          sortValue,
          searchState.page,
          24
        );
      }

      // ---------- Populate data-populate components ----------
      var populateElements = document.querySelectorAll('[data-populate]');
      for (var i = 0; i < populateElements.length; i++) {
        var el = populateElements[i];
        var type = el.getAttribute('data-populate');
        if (type === 'cart-status-indicator') {
          if (initialCartData) {
            renderCartStatus(el, initialCartData);
          }
        } else if (type === 'top-level-categories') {
          renderTopLevelCategories(el, topLevelCategories);
        } else if (type === 'search-filters') {
          renderFilterSidebar(el, filterOptions, searchState, hasQuery);
        } else if (type === 'results-summary') {
          renderResultsSummary(el, searchState, searchResult, hasQuery);
        } else if (type === 'active-filters') {
          renderActiveFilters(el, searchState, filterOptions, searchResult);
        } else if (type === 'search-results') {
          renderProductGrid(el, searchResult);
        } else if (type === 'pagination-controls') {
          renderPagination(el, searchState, searchResult);
        }
      }

      // Ensure sort select reflects current sort state
      var sortSelect = document.getElementById('sortSelect');
      if (sortSelect) {
        sortSelect.value = searchState.sort || 'relevance';
      }

      // ---------- Event handling (delegated) ----------
      document.addEventListener('submit', function(event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');
        if (action === 'header-search-submit' || action === 'results-search-submit') {
          event.preventDefault();
          var input = actionEl.querySelector('input[name="query"]');
          var value = input && input.value ? input.value.trim() : '';
          navigateWithState({ query: value }, { resetPage: true, clearFilters: true });
        } else if (action === 'price-filter-submit') {
          event.preventDefault();
          var minInput = actionEl.querySelector('input[name="priceMin"]');
          var maxInput = actionEl.querySelector('input[name="priceMax"]');
          var minVal = minInput && minInput.value ? minInput.value : '';
          var maxVal = maxInput && maxInput.value ? maxInput.value : '';
          navigateWithState({ priceMin: minVal, priceMax: maxVal }, { resetPage: true });
        } else if (action === 'add-to-cart-submit') {
          event.preventDefault();
          var formEl = actionEl;
          var productId = formEl.getAttribute('data-product-id');
          var measurementUnit = formEl.getAttribute('data-measurement-unit') || 'unit';
          var sizeLabel = formEl.getAttribute('data-size-label') || undefined;
          var quantityInput = formEl.querySelector('input[name="quantity"]');
          var qtyVal = quantityInput && quantityInput.value ? parseFloat(quantityInput.value) : 0;
          if (!Number.isFinite(qtyVal) || qtyVal <= 0) {
            qtyVal = 1;
          }
          var optionSelect = formEl.querySelector('select[name="optionTypeLabel"]');
          var optionTypeLabel = optionSelect && optionSelect.value ? optionSelect.value : undefined;
          try {
            var addResult = WebsiteSDK.addToCart(productId, qtyVal, measurementUnit, sizeLabel, optionTypeLabel);
            if (addResult && addResult.success) {
              // Update cart indicator
              var cartContainers = document.querySelectorAll('[data-populate="cart-status-indicator"]');
              for (var i = 0; i < cartContainers.length; i++) {
                renderCartStatus(cartContainers[i], addResult);
              }
              // Update in-card quantity
              var newQty = findCartQuantityForProduct(addResult.cartItems, productId);
              var statusEl = formEl.querySelector('[data-role="in-cart-status"]');
              if (statusEl) {
                if (newQty > 0) {
                  statusEl.innerHTML = 'In cart: <span class="in-cart-qty">' + escapeHtml(newQty) + '</span>';
                  statusEl.hidden = false;
                } else {
                  statusEl.hidden = true;
                }
              }
            } else if (addResult && addResult.message) {
              window.alert(addResult.message);
            } else {
              window.alert('Unable to add item to cart. Please try again.');
            }
          } catch (e) {
            window.alert('An error occurred while adding to cart.');
          }
        }
      });

      document.addEventListener('change', function(event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');
        if (action === 'category-filter-change') {
          var cid = actionEl.value || '';
          navigateWithState({ selectedCategoryId: cid }, { resetPage: true });
        } else if (action === 'rating-filter-change') {
          var ratingVal = actionEl.value || '';
          navigateWithState({ ratingMin: ratingVal }, { resetPage: true });
        } else if (action === 'size-filter-change') {
          var sizeVal = actionEl.value || '';
          navigateWithState({ size: sizeVal }, { resetPage: true });
        } else if (action === 'dietary-filter-change') {
          var dietaryVal = actionEl.value || '';
          navigateWithState({ dietary: dietaryVal }, { resetPage: true });
        } else if (action === 'sort-change') {
          var sortVal = actionEl.value || '';
          navigateWithState({ sort: sortVal }, { resetPage: true });
        }
      });

      document.addEventListener('click', function(event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');

        if (action === 'clear-all-filters') {
          event.preventDefault();
          navigateWithState({}, { resetPage: true, clearFilters: true });
        } else if (action === 'remove-filter-chip') {
          event.preventDefault();
          var key = actionEl.getAttribute('data-filter-key');
          if (!key) return;
          if (key === 'price') {
            navigateWithState({ priceMin: '', priceMax: '' }, { resetPage: true });
          } else if (key === 'selectedCategoryId') {
            navigateWithState({ selectedCategoryId: '' }, { resetPage: true });
          } else if (key === 'ratingMin') {
            navigateWithState({ ratingMin: '' }, { resetPage: true });
          } else if (key === 'size') {
            navigateWithState({ size: '' }, { resetPage: true });
          } else if (key === 'dietary') {
            navigateWithState({ dietary: '' }, { resetPage: true });
          }
        } else if (action === 'page-change') {
          event.preventDefault();
          var pageVal = parseInt(actionEl.getAttribute('data-page') || '1', 10);
          if (!Number.isFinite(pageVal) || pageVal < 1) return;
          navigateWithState({ page: pageVal }, { resetPage: false });
        } else if (action === 'cart-icon-click') {
          // Let the anchor's href handle navigation
        } else if (action === 'increase-qty' || action === 'decrease-qty') {
          event.preventDefault();
          var formEl = actionEl.closest('.add-to-cart-form');
          if (!formEl) return;
          var qtyInput = formEl.querySelector('input[name="quantity"]');
          if (!qtyInput) return;
          var step = parseFloat(qtyInput.getAttribute('step') || '1');
          if (!Number.isFinite(step) || step <= 0) step = 1;
          var current = parseFloat(qtyInput.value || '0');
          if (!Number.isFinite(current)) current = step;
          if (action === 'increase-qty') {
            current = current + step;
          } else {
            current = current - step;
            if (current < 0) current = 0;
          }
          qtyInput.value = current;
        }
      });
    });
  </script>
</body>
</html>
