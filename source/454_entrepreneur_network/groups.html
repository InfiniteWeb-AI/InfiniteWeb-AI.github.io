<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrepreneur Network Portal - Groups &amp; Communities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="groups.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <a href="index.html" class="brand-link" aria-label="Entrepreneur networking dashboard">
            <span class="brand-title">GENIUS NETWORK</span>
            <span class="brand-mark">&reg;</span>
          </a>
        </div>
        <nav class="primary-nav" aria-label="Main navigation">
          <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="groups.html">Groups</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="members.html">Members</a></li>
            <li><a href="messages.html">Messages</a></li>
          </ul>
        </nav>
        <div class="user-nav">
          <div class="user-menu">
            <a href="account.html" class="user-trigger">
              <span class="user-avatar" aria-hidden="true">EN</span>
              <span class="user-name">Your Account</span>
            </a>
            <ul class="user-dropdown">
              <li><a href="account.html">Account &amp; Settings</a></li>
              <li><a href="bookmarks.html">Saved Profiles</a></li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <div class="groups-page" data-component="groups-page">
        <section class="groups-header">
          <h1 class="page-title">Groups &amp; Communities</h1>
        </section>

        <section class="groups-card-container">
          <div class="groups-card">
            <section class="groups-search-section" aria-labelledby="groupsSearchLabel">
              <form id="groupsSearchForm" data-component="groups-search-form">
                <div class="form-field">
                  <label id="groupsSearchLabel" for="groupsSearchInput">Search groups</label>
                  <input type="text" id="groupsSearchInput" name="query" autocomplete="off" />
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn-primary" data-action="submit-search">Search</button>
                </div>
              </form>
            </section>

            <section class="groups-filters" data-component="groups-filter-controls" aria-label="Group filters">
              <div class="form-field">
                <label for="tagFilterSelect">Category or tag</label>
                <select id="tagFilterSelect" name="tag">
                  <option value="">All categories</option>
                  <option value="technology">Technology</option>
                  <option value="marketing_growth">Marketing &amp; Growth</option>
                  <option value="fundraising">Fundraising</option>
                  <option value="operations">Operations</option>
                </select>
              </div>
              <div class="form-field">
                <label for="minMembersInput">Minimum members</label>
                <input type="number" id="minMembersInput" name="minMembers" min="0" inputmode="numeric" />
              </div>
              <div class="filter-actions">
                <button type="button" class="btn-secondary" data-action="clear-filters">Clear filters</button>
              </div>
            </section>

            <section class="groups-sort-section" data-component="groups-sort-menu">
              <div class="form-field">
                <label for="sortSelect">Sort by</label>
                <select id="sortSelect" name="sort">
                  <option value="">Default order</option>
                  <option value="relevance">Relevance</option>
                  <option value="members_desc">Member count (high to low)</option>
                  <option value="members_asc">Member count (low to high)</option>
                </select>
              </div>
            </section>

            <section class="groups-results" data-component="groups-results-list" aria-live="polite">
              <div class="results-status" data-populate="results-status"></div>
              <div class="group-list" data-populate="groups-list"></div>
            </section>

            <nav class="groups-pagination" data-component="groups-pagination-controls" aria-label="Groups pagination">
              <button type="button" class="btn-secondary" data-action="prev-page">Previous</button>
              <span class="pagination-info" data-populate="pagination-info"></span>
              <button type="button" class="btn-secondary" data-action="next-page">Next</button>
            </nav>
          </div>
        </section>

        <div class="groups-bottom-strip" aria-hidden="true"></div>

        <div class="modal-overlay" data-component="join-leave-confirmation-modal" hidden>
          <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="membershipModalTitle">
            <h2 id="membershipModalTitle" class="modal-title"></h2>
            <p id="membershipModalMessage" class="modal-message"></p>
            <div class="modal-actions">
              <button type="button" class="btn-primary" data-action="confirm-membership">Confirm</button>
              <button type="button" class="btn-secondary" data-action="cancel-membership">Cancel</button>
            </div>
          </div>
        </div>

        <div data-component="groups-url-state-manager" hidden></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul>
            <li><a href="about.html">About</a></li>
            <li><a href="help.html">Help &amp; FAQ</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="terms.html">Terms of Service</a></li>
            <li><a href="privacy.html">Privacy Policy</a></li>
          </ul>
        </nav>
        <p class="footer-meta">&copy; <span class="footer-year">2024</span> Genius Network. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const state = {
        query: '',
        tag: '',
        minMembers: '',
        sort: '',
        page: 1,
        groups: [],
        memberships: {},
        isLoading: false,
        error: null
      };

      const searchForm = document.getElementById('groupsSearchForm');
      const searchInput = document.getElementById('groupsSearchInput');
      const tagSelect = document.getElementById('tagFilterSelect');
      const minMembersInput = document.getElementById('minMembersInput');
      const sortSelect = document.getElementById('sortSelect');
      const resultsStatusContainer = document.querySelector('[data-populate="results-status"]');
      const groupsListContainer = document.querySelector('[data-populate="groups-list"]');
      const paginationInfoContainer = document.querySelector('[data-populate="pagination-info"]');
      const prevPageBtn = document.querySelector('[data-action="prev-page"]');
      const nextPageBtn = document.querySelector('[data-action="next-page"]');
      const clearFiltersBtn = document.querySelector('[data-action="clear-filters"]');
      const modalOverlay = document.querySelector('[data-component="join-leave-confirmation-modal"]');
      const modalTitle = document.getElementById('membershipModalTitle');
      const modalMessage = document.getElementById('membershipModalMessage');
      const modalConfirmBtn = document.querySelector('[data-action="confirm-membership"]');
      const modalCancelBtn = document.querySelector('[data-action="cancel-membership"]');
      const urlStateManager = document.querySelector('[data-component="groups-url-state-manager"]');

      const pageSizeDisplay = 10; // For pagination text only
      const pendingAction = { type: null, groupId: null };

      function readUrlParams() {
        const params = new URLSearchParams(window.location.search);
        state.query = params.get('query') || '';
        state.tag = params.get('tag') || '';
        const minMembersStr = params.get('minMembers');
        if (minMembersStr !== null && minMembersStr !== '') {
          const parsed = parseInt(minMembersStr, 10);
          state.minMembers = Number.isNaN(parsed) ? '' : parsed;
        } else {
          state.minMembers = '';
        }
        state.sort = params.get('sort') || '';
        const pageStr = params.get('page');
        let page = pageStr ? parseInt(pageStr, 10) : 1;
        if (Number.isNaN(page) || page < 1) {
          page = 1;
        }
        state.page = page;
      }

      function syncUiFromState() {
        if (searchInput) {
          searchInput.value = state.query || '';
        }
        if (tagSelect) {
          tagSelect.value = state.tag || '';
        }
        if (minMembersInput) {
          minMembersInput.value = state.minMembers === '' ? '' : String(state.minMembers);
        }
        if (sortSelect) {
          sortSelect.value = state.sort || '';
        }
        updatePaginationControls();
      }

      function updatePaginationControls() {
        if (prevPageBtn) {
          prevPageBtn.disabled = state.page <= 1 || state.isLoading;
        }
        if (nextPageBtn) {
          // Disable next when loading; otherwise leave enabled. If groups length is 0, there may be no more pages.
          nextPageBtn.disabled = state.isLoading || state.groups.length === 0;
        }
      }

      function renderStatus(container) {
        if (!container) return;
        container.innerHTML = '';
        if (state.isLoading) {
          const loading = document.createElement('div');
          loading.className = 'results-loading';
          loading.textContent = 'Loading groups...';
          container.appendChild(loading);
          return;
        }
        if (state.error) {
          const wrapper = document.createElement('div');
          wrapper.className = 'results-error';
          const text = document.createElement('span');
          text.textContent = state.error;
          wrapper.appendChild(text);
          const retryButton = document.createElement('button');
          retryButton.type = 'button';
          retryButton.className = 'btn-secondary';
          retryButton.dataset.action = 'retry-search';
          retryButton.textContent = 'Retry';
          wrapper.appendChild(retryButton);
          container.appendChild(wrapper);
          return;
        }
        const count = state.groups.length;
        const info = document.createElement('div');
        info.className = 'results-summary';
        info.textContent = count === 0 ? 'No groups found.' : count + ' groups found.';
        container.appendChild(info);
      }

      function applyMembershipStateToButton(button, membership) {
        if (!button) return;
        let status = membership && membership.status ? membership.status : 'left';
        if (status === 'joined') {
          button.disabled = false;
          button.textContent = 'Leave group';
          button.dataset.membershipAction = 'leave';
        } else if (status === 'requested') {
          button.disabled = true;
          button.textContent = 'Request pending';
          button.dataset.membershipAction = 'requested';
        } else {
          button.disabled = false;
          button.textContent = 'Join group';
          button.dataset.membershipAction = 'join';
        }
      }

      function renderGroupsList(container, groups) {
        if (!container) return;
        container.innerHTML = '';
        if (!Array.isArray(groups) || groups.length === 0) {
          return;
        }
        groups.forEach(function(group) {
          const card = document.createElement('article');
          card.className = 'group-card';
          card.dataset.component = 'group-card';
          card.dataset.groupId = group.id;

          const header = document.createElement('header');
          header.className = 'group-card-header';

          const title = document.createElement('h2');
          title.className = 'group-card-title';
          const titleLink = document.createElement('a');
          titleLink.href = 'group_detail.html?groupId=' + encodeURIComponent(group.id);
          titleLink.textContent = group.name || 'Untitled group';
          titleLink.dataset.action = 'view-group';
          title.appendChild(titleLink);
          header.appendChild(title);

          if (group.visibility) {
            const visibility = document.createElement('span');
            visibility.className = 'group-visibility';
            visibility.textContent = group.visibility === 'private' ? 'Private' : 'Public';
            header.appendChild(visibility);
          }

          card.appendChild(header);

          if (group.description) {
            const desc = document.createElement('p');
            desc.className = 'group-description';
            desc.textContent = group.description;
            card.appendChild(desc);
          }

          const meta = document.createElement('div');
          meta.className = 'group-card-meta';

          const memberCount = document.createElement('span');
          memberCount.className = 'group-member-count';
          const countVal = typeof group.member_count === 'number' ? group.member_count : 0;
          memberCount.textContent = countVal + (countVal === 1 ? ' member' : ' members');
          meta.appendChild(memberCount);

          if (Array.isArray(group.tags) && group.tags.length > 0) {
            const tagsList = document.createElement('ul');
            tagsList.className = 'group-tags';
            group.tags.forEach(function(tag) {
              const li = document.createElement('li');
              li.className = 'group-tag';
              li.textContent = String(tag);
              tagsList.appendChild(li);
            });
            meta.appendChild(tagsList);
          }

          card.appendChild(meta);

          const actions = document.createElement('div');
          actions.className = 'group-card-actions';
          actions.dataset.component = 'group-membership-actions';

          const viewLink = document.createElement('a');
          viewLink.href = 'group_detail.html?groupId=' + encodeURIComponent(group.id);
          viewLink.className = 'group-view-link';
          viewLink.dataset.action = 'view-group';
          viewLink.textContent = 'View group';
          actions.appendChild(viewLink);

          const spacer = document.createElement('div');
          spacer.className = 'group-card-actions-spacer';
          actions.appendChild(spacer);

          const primaryBtn = document.createElement('button');
          primaryBtn.type = 'button';
          primaryBtn.className = 'btn-primary';
          primaryBtn.dataset.action = 'membership-primary';
          primaryBtn.dataset.groupId = group.id;

          const membership = state.memberships[group.id];
          applyMembershipStateToButton(primaryBtn, membership);

          actions.appendChild(primaryBtn);
          card.appendChild(actions);

          container.appendChild(card);
        });
      }

      function renderPaginationInfo(container) {
        if (!container) return;
        container.textContent = '';
        const page = state.page || 1;
        const count = state.groups.length;
        if (page < 1) return;
        if (count === 0) {
          container.textContent = 'Page ' + page;
          return;
        }
        const start = (page - 1) * pageSizeDisplay + 1;
        const end = (page - 1) * pageSizeDisplay + count;
        container.textContent = 'Page ' + page + ' · Showing ' + start + '–' + end + ' groups';
      }

      function buildFiltersForSearch() {
        const filters = {};
        if (state.tag) {
          // Map tag URL parameter to category filter for searchGroups
          filters.category = state.tag;
        }
        if (state.minMembers !== '' && !Number.isNaN(Number(state.minMembers))) {
          filters.minMemberCount = Number(state.minMembers);
        }
        if (state.sort) {
          // Not defined in SDK spec but passed through for backend handling
          filters.sort = state.sort;
        }
        if (state.page && state.page > 1) {
          filters.page = state.page;
        }
        return filters;
      }

      function runSearch() {
        state.isLoading = true;
        state.error = null;
        renderStatus(resultsStatusContainer);
        updatePaginationControls();
        try {
          const filters = buildFiltersForSearch();
          const results = WebsiteSDK.searchGroups(state.query || '', filters);
          state.groups = Array.isArray(results) ? results : [];
          state.error = null;
        } catch (err) {
          console.error('searchGroups error', err);
          state.groups = [];
          state.error = 'There was a problem loading groups. Please try again.';
        }
        state.isLoading = false;
        renderStatus(resultsStatusContainer);
        renderGroupsList(groupsListContainer, state.groups);
        renderPaginationInfo(paginationInfoContainer);
        updatePaginationControls();
      }

      function updateUrlFromState(push) {
        const params = new URLSearchParams();
        if (state.query) {
          params.set('query', state.query);
        }
        if (state.tag) {
          params.set('tag', state.tag);
        }
        if (state.minMembers !== '' && !Number.isNaN(Number(state.minMembers))) {
          params.set('minMembers', String(state.minMembers));
        }
        if (state.sort) {
          params.set('sort', state.sort);
        }
        if (state.page && state.page > 1) {
          params.set('page', String(state.page));
        }
        const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        if (push) {
          window.history.pushState({}, '', newUrl);
        } else {
          window.history.replaceState({}, '', newUrl);
        }
        if (urlStateManager) {
          urlStateManager.dispatchEvent(new CustomEvent('searchparamschange', {
            detail: {
              query: state.query,
              tag: state.tag,
              minMembers: state.minMembers,
              sort: state.sort,
              page: state.page
            }
          }));
        }
      }

      function onSearchParamsChange() {
        updateUrlFromState(true);
        runSearch();
      }

      function openMembershipModal(actionType, groupId) {
        const group = state.groups.find(function(g) { return g.id === groupId; });
        pendingAction.type = actionType;
        pendingAction.groupId = groupId;
        if (!modalOverlay || !modalTitle || !modalMessage || !modalConfirmBtn) return;
        const name = group && group.name ? group.name : 'this group';
        if (actionType === 'join') {
          modalTitle.textContent = 'Join group';
          modalMessage.textContent = 'Are you sure you want to join "' + name + '"?';
          modalConfirmBtn.textContent = 'Join group';
        } else {
          modalTitle.textContent = 'Leave group';
          modalMessage.textContent = 'Are you sure you want to leave "' + name + '"?';
          modalConfirmBtn.textContent = 'Leave group';
        }
        modalOverlay.hidden = false;
      }

      function closeMembershipModal() {
        if (modalOverlay) {
          modalOverlay.hidden = true;
        }
        pendingAction.type = null;
        pendingAction.groupId = null;
      }

      function setButtonLoading(button, isLoading, loadingText) {
        if (!button) return;
        if (isLoading) {
          button.disabled = true;
          if (loadingText) {
            button.dataset.previousText = button.textContent;
            button.textContent = loadingText;
          }
        } else {
          button.disabled = false;
          if (button.dataset.previousText) {
            delete button.dataset.previousText;
          }
        }
      }

      // Event bindings
      if (searchForm) {
        searchForm.addEventListener('submit', function(event) {
          event.preventDefault();
          state.query = searchInput ? searchInput.value.trim() : '';
          state.page = 1;
          onSearchParamsChange();
        });
      }

      if (tagSelect) {
        tagSelect.addEventListener('change', function(event) {
          state.tag = event.target.value || '';
          state.page = 1;
          onSearchParamsChange();
        });
      }

      if (minMembersInput) {
        minMembersInput.addEventListener('change', function(event) {
          const value = event.target.value;
          if (value === '') {
            state.minMembers = '';
          } else {
            const parsed = parseInt(value, 10);
            state.minMembers = Number.isNaN(parsed) || parsed < 0 ? '' : parsed;
          }
          if (minMembersInput) {
            minMembersInput.value = state.minMembers === '' ? '' : String(state.minMembers);
          }
          state.page = 1;
          onSearchParamsChange();
        });
      }

      if (sortSelect) {
        sortSelect.addEventListener('change', function(event) {
          state.sort = event.target.value || '';
          state.page = 1;
          onSearchParamsChange();
        });
      }

      if (clearFiltersBtn) {
        clearFiltersBtn.addEventListener('click', function() {
          state.tag = '';
          state.minMembers = '';
          state.sort = '';
          state.page = 1;
          syncUiFromState();
          onSearchParamsChange();
        });
      }

      if (prevPageBtn) {
        prevPageBtn.addEventListener('click', function() {
          if (state.page > 1 && !state.isLoading) {
            state.page -= 1;
            onSearchParamsChange();
          }
        });
      }

      if (nextPageBtn) {
        nextPageBtn.addEventListener('click', function() {
          if (!state.isLoading) {
            state.page += 1;
            onSearchParamsChange();
          }
        });
      }

      if (resultsStatusContainer) {
        resultsStatusContainer.addEventListener('click', function(event) {
          const target = event.target;
          if (target && target.dataset && target.dataset.action === 'retry-search') {
            runSearch();
          }
        });
      }

      if (groupsListContainer) {
        groupsListContainer.addEventListener('click', function(event) {
          const target = event.target;
          if (!target || !target.dataset) return;
          if (target.dataset.action === 'membership-primary') {
            const groupId = target.dataset.groupId;
            const membershipAction = target.dataset.membershipAction;
            if (!groupId || !membershipAction) return;
            if (membershipAction === 'join' || membershipAction === 'leave') {
              openMembershipModal(membershipAction, groupId);
            }
          }
        });
      }

      if (modalCancelBtn && modalOverlay) {
        modalCancelBtn.addEventListener('click', function() {
          closeMembershipModal();
        });
        modalOverlay.addEventListener('click', function(event) {
          if (event.target === modalOverlay) {
            closeMembershipModal();
          }
        });
        document.addEventListener('keydown', function(event) {
          if (event.key === 'Escape' && !modalOverlay.hidden) {
            closeMembershipModal();
          }
        });
      }

      if (modalConfirmBtn) {
        modalConfirmBtn.addEventListener('click', function() {
          if (!pendingAction.type || !pendingAction.groupId) {
            closeMembershipModal();
            return;
          }
          const groupId = pendingAction.groupId;
          const actionType = pendingAction.type;
          const card = groupsListContainer ? groupsListContainer.querySelector('.group-card[data-group-id="' + groupId + '"]') : null;
          const button = card ? card.querySelector('button[data-action="membership-primary"]') : null;
          if (button) {
            const loadingText = actionType === 'join' ? 'Joining...' : 'Leaving...';
            setButtonLoading(button, true, loadingText);
          }
          try {
            let membership;
            if (actionType === 'join') {
              membership = WebsiteSDK.joinGroup(groupId);
            } else {
              membership = WebsiteSDK.leaveGroup(groupId);
            }
            if (membership && membership.group_id) {
              state.memberships[membership.group_id] = membership;
            } else {
              state.memberships[groupId] = membership;
            }
            if (button) {
              const effectiveMembership = state.memberships[groupId] || membership;
              applyMembershipStateToButton(button, effectiveMembership);
            }
          } catch (err) {
            console.error('Membership action error', err);
            if (button) {
              // Fallback text based on action
              button.disabled = false;
              button.textContent = actionType === 'join' ? 'Join group' : 'Leave group';
            }
            alert('There was a problem updating your membership. Please try again.');
          }
          if (button) {
            setButtonLoading(button, false);
          }
          closeMembershipModal();
        });
      }

      window.addEventListener('popstate', function() {
        readUrlParams();
        if (urlStateManager) {
          urlStateManager.dispatchEvent(new CustomEvent('urlchange', {
            detail: {
              query: state.query,
              tag: state.tag,
              minMembers: state.minMembers,
              sort: state.sort,
              page: state.page
            }
          }));
        }
        syncUiFromState();
        runSearch();
      });

      // Initial load
      readUrlParams();
      syncUiFromState();
      updateUrlFromState(false);
      if (urlStateManager) {
        urlStateManager.dispatchEvent(new CustomEvent('pageload', {
          detail: {
            query: state.query,
            tag: state.tag,
            minMembers: state.minMembers,
            sort: state.sort,
            page: state.page
          }
        }));
      }
      runSearch();
    });
  </script>
</body>
</html>
