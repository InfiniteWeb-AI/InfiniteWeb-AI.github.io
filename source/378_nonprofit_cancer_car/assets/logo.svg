<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="60" fill="#ffffff"/>
  <g transform="translate(10,12)">
    <!-- Car body -->
    <rect x="0" y="18" width="40" height="12" rx="3" fill="#2c3e50"/>
    <rect x="8" y="12" width="18" height="8" rx="2" fill="#2c3e50"/>
    <!-- Wheels -->
    <circle cx="10" cy="32" r="3" fill="#e74c3c"/>
    <circle cx="30" cy="32" r="3" fill="#e74c3c"/>
    <!-- Simple cross symbol -->
    <rect x="17.5" y="14" width="3" height="10" fill="#e74c3c"/>
    <rect x="14" y="17.5" width="10" height="3" fill="#e74c3c"/>
  </g>
  <text x="60" y="35" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50">
    NP Cancer Car
  </text>
</svg>