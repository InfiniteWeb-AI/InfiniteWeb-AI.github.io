<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Sitemap Group Detail</title>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='sitemap_group_detail.css'>
    <script src='business_logic.js'></script>
</head>
<body>

<header class='page-header' role='banner'>
    <h1 class='page-title'>Sitemap Management</h1>
    <nav class='primary-nav' aria-label='Primary'>
        <ul class='primary-nav-list'>
            <li class='primary-nav-item'><a href='index.html'>Dashboard</a></li>
            <li class='primary-nav-item'><a href='sitemap_index.html'>Sitemap Index</a></li>
            <li class='primary-nav-item'><a href='url_lists.html'>URL Lists</a></li>
            <li class='primary-nav-item'><a href='sitemap_groups.html'>Groups</a></li>
            <li class='primary-nav-item'><a href='reports.html'>Reports</a></li>
            <li class='primary-nav-item'><a href='help.html'>Help</a></li>
        </ul>
    </nav>
</header>

<main id='content' class='content' role='main'>
    <div class='sitemap-group-detail-page' data-component='sitemap-group-detail-page' data-populate='sitemap-group-details'>
        <p>Loading sitemap group details...</p>
    </div>
</main>

<footer class='page-footer' role='contentinfo'>
    <p class='footer-links'>
        <a href='about.html'>About</a> |
        <a href='contact.html'>Contact</a> |
        <a href='settings.html'>Settings</a> |
        <a href='sitemap_index.html'>Sitemap Index</a>
    </p>
    <p class='footer-meta'>
        This technical interface provides access to sitemap and URL management pages via the links above.
    </p>
</footer>

<script>
(function() {
    function escapeHtml(value) {
        if (value === null || value === undefined) {
            return '';
        }
        var str = String(value);
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function buildGroupDetailPage(container, data, urlParams) {
        var group = data.group || { id: '', name: '(Unnamed group)', description: '' };
        var sitemaps = Array.isArray(data.sitemaps) ? data.sitemaps : [];
        var totalCount = typeof data.totalCount === 'number' ? data.totalCount : sitemaps.length;
        var page = typeof data.page === 'number' ? data.page : 1;
        var pageSize = typeof data.pageSize === 'number' ? data.pageSize : (sitemaps.length > 0 ? sitemaps.length : 25);
        var totalPages = pageSize > 0 ? Math.max(1, Math.ceil(totalCount / pageSize)) : 1;

        var search = urlParams.get('search') || '';
        var typeFilter = urlParams.get('type') || '';
        var statusFilter = urlParams.get('status') || '';
        var minUrlCount = urlParams.get('minUrlCount') || '';
        var maxUrlCount = urlParams.get('maxUrlCount') || '';
        var changeFrequencyFilter = urlParams.get('changeFrequency') || '';
        var sortBy = urlParams.get('sortBy') || 'filename';
        var sortOrder = urlParams.get('sortOrder') || 'asc';

        function sortIndicator(field) {
            if (sortBy !== field) {
                return '';
            }
            return sortOrder === 'desc' ? ' \u25BC' : ' \u25B2';
        }

        var rowsHtml;
        if (!sitemaps.length) {
            rowsHtml = "<tr><td colspan='10'>No sitemaps match the current filters for this group.</td></tr>";
        } else {
            rowsHtml = sitemaps.map(function(sitemap) {
                var name = sitemap.display_name || sitemap.filename || sitemap.url || sitemap.id || '';
                var membershipId = sitemap.membershipId || sitemap.membership_id || '';
                var lastModified = sitemap.last_modified || '';
                var defaultPriority = sitemap.default_priority !== undefined && sitemap.default_priority !== null
                    ? String(sitemap.default_priority)
                    : '';
                return "<tr data-sitemap-id='" + escapeHtml(sitemap.id) + "' data-membership-id='" + escapeHtml(membershipId) + "'>" +
                    "<td><input type='checkbox' data-action='row-select' data-membership-id='" + escapeHtml(membershipId) + "'></td>" +
                    "<td><a href='javascript:void(0)' data-action='open-sitemap-details'>" + escapeHtml(name) + "</a>" +
                        (sitemap.filename ? "<br><span class='sitemap-filename'>" + escapeHtml(sitemap.filename) + "</span>" : '') +
                    "</td>" +
                    "<td>" + escapeHtml(sitemap.type || '') + "</td>" +
                    "<td>" + escapeHtml(sitemap.status || '') + "</td>" +
                    "<td>" + escapeHtml(sitemap.url_count !== undefined && sitemap.url_count !== null ? sitemap.url_count : '') + "</td>" +
                    "<td>" + escapeHtml(sitemap.default_change_frequency || '') + "</td>" +
                    "<td>" + escapeHtml(defaultPriority) + "</td>" +
                    "<td>" + escapeHtml(sitemap.crawl_priority || '') + "</td>" +
                    "<td>" + escapeHtml(lastModified) + "</td>" +
                    "<td><a href='javascript:void(0)' data-action='view-urls'>View URLs</a></td>" +
                "</tr>";
            }).join('');
        }

        var paginationLinksHtml;
        if (totalPages > 1) {
            var parts = [];
            if (page > 1) {
                parts.push("<a href='javascript:void(0)' data-action='page-prev'>Previous</a>");
            }
            for (var p = 1; p <= totalPages; p += 1) {
                if (p === page) {
                    parts.push("<span data-role='current-page'>" + p + "</span>");
                } else {
                    parts.push("<a href='javascript:void(0)' data-action='page-number' data-page='" + p + "'>" + p + "</a>");
                }
            }
            if (page < totalPages) {
                parts.push("<a href='javascript:void(0)' data-action='page-next'>Next</a>");
            }
            paginationLinksHtml = parts.join(' ');
        } else {
            paginationLinksHtml = "<span data-role='current-page'>Page " + page + " of " + totalPages + "</span>";
        }

        var pageSizeOptions = [10, 25, 50, 100];
        var pageSizeOptionsHtml = pageSizeOptions.map(function(size) {
            var selected = size === pageSize ? ' selected' : '';
            return "<option value='" + size + "'" + selected + ">" + size + "</option>";
        }).join('');

        var html = "" +
"<div class='sitemap-group-detail-column'>" +
"  <nav class='breadcrumb-nav' data-component='breadcrumb-nav' aria-label='Breadcrumb'>" +
"    <a href='javascript:void(0)' data-action='back-to-groups'>Groups</a> &gt; " +
"    <span>" + escapeHtml(group.name) + "</span>" +
"  </nav>" +
"  <section class='group-header' data-component='group-header'>" +
"    <h1>Sitemap Group Detail</h1>" +
"    <div class='info-box'>" +
"      <p><strong>Group:</strong> " + escapeHtml(group.name) + "</p>" +
        (group.description ? "<p>" + escapeHtml(group.description) + "</p>" : '') +
"      <p>Sitemaps in this group: " + escapeHtml(totalCount) + "</p>" +
"    </div>" +
"  </section>" +
"  <section class='group-filters' data-component='group-filters'>" +
"    <form id='group-filters-form'>" +
"      <p>" +
"        <label>Search within group:<br>" +
"          <input type='text' name='search' value='" + escapeHtml(search) + "'>" +
"        </label>" +
"      </p>" +
"      <p>" +
"        <label>Sitemap type:<br>" +
"          <select name='type'>" +
"            <option value=''>All types</option>" +
"            <option value='product'" + (typeFilter === 'product' ? ' selected' : '') + ">product</option>" +
"            <option value='blog'" + (typeFilter === 'blog' ? ' selected' : '') + ">blog</option>" +
"            <option value='category'" + (typeFilter === 'category' ? ' selected' : '') + ">category</option>" +
"            <option value='video'" + (typeFilter === 'video' ? ' selected' : '') + ">video</option>" +
"            <option value='marketing'" + (typeFilter === 'marketing' ? ' selected' : '') + ">marketing</option>" +
"          </select>" +
"        </label>" +
"      </p>" +
"      <p>" +
"        <label>Status:<br>" +
"          <select name='status'>" +
"            <option value=''>All statuses</option>" +
"            <option value='active'" + (statusFilter === 'active' ? ' selected' : '') + ">active</option>" +
"            <option value='disabled'" + (statusFilter === 'disabled' ? ' selected' : '') + ">disabled</option>" +
"            <option value='archived'" + (statusFilter === 'archived' ? ' selected' : '') + ">archived</option>" +
"          </select>" +
"        </label>" +
"      </p>" +
"      <p>" +
"        <label>URL count minimum:<br>" +
"          <input type='number' name='minUrlCount' value='" + escapeHtml(minUrlCount) + "'>" +
"        </label>" +
"      </p>" +
"      <p>" +
"        <label>URL count maximum:<br>" +
"          <input type='number' name='maxUrlCount' value='" + escapeHtml(maxUrlCount) + "'>" +
"        </label>" +
"      </p>" +
"      <p>" +
"        <label>Change frequency:<br>" +
"          <select name='changeFrequency'>" +
"            <option value=''>All frequencies</option>" +
"            <option value='hourly'" + (changeFrequencyFilter === 'hourly' ? ' selected' : '') + ">hourly</option>" +
"            <option value='daily'" + (changeFrequencyFilter === 'daily' ? ' selected' : '') + ">daily</option>" +
"            <option value='weekly'" + (changeFrequencyFilter === 'weekly' ? ' selected' : '') + ">weekly</option>" +
"            <option value='monthly'" + (changeFrequencyFilter === 'monthly' ? ' selected' : '') + ">monthly</option>" +
"            <option value='yearly'" + (changeFrequencyFilter === 'yearly' ? ' selected' : '') + ">yearly</option>" +
"            <option value='never'" + (changeFrequencyFilter === 'never' ? ' selected' : '') + ">never</option>" +
"          </select>" +
"        </label>" +
"      </p>" +
"      <p>" +
"        <button type='submit'>Apply filters</button>" +
"        <a href='javascript:void(0)' data-action='clear-filters'>Clear filters</a>" +
"      </p>" +
"    </form>" +
"  </section>" +
"  <section class='add-sitemaps-panel' data-component='add-sitemaps-to-group-panel' style='display:none'>" +
"    <h2>Add sitemaps to this group</h2>" +
"    <p>Provide one or more sitemap identifiers, separated by commas. These will be added to the current group.</p>" +
"    <p>" +
"      <label>Sitemap IDs:<br>" +
"        <textarea name='sitemapIds' rows='3' cols='60'></textarea>" +
"      </label>" +
"    </p>" +
"    <p>" +
"      <a href='javascript:void(0)' data-action='submit-add-sitemaps'>Add to group</a>" +
"      &nbsp;|&nbsp;" +
"      <a href='javascript:void(0)' data-action='close-add-sitemaps'>Cancel</a>" +
"    </p>" +
"    <p data-role='add-feedback' class='feedback-message'></p>" +
"  </section>" +
"  <section class='group-bulk-actions' data-component='group-bulk-actions'>" +
"    <p>" +
"      Selected sitemaps in this group: <span data-role='selected-count'>0</span>" +
"      &nbsp;|&nbsp;" +
"      <a href='javascript:void(0)' data-action='remove-from-group'>Remove from group</a>" +
"      &nbsp;|&nbsp;" +
"      <a href='javascript:void(0)' data-action='open-add-sitemaps'>Add sitemaps</a>" +
"    </p>" +
"  </section>" +
"  <section class='sitemap-group-table-section'>" +
"    <table class='sitemap-group-table' data-component='sitemap-group-table'>" +
"      <thead>" +
"        <tr>" +
"          <th><input type='checkbox' data-action='select-all'></th>" +
"          <th><a href='javascript:void(0)' data-action='sort' data-sort-field='filename'>Sitemap</a>" + sortIndicator('filename') + "</th>" +
"          <th><a href='javascript:void(0)' data-action='sort' data-sort-field='type'>Type</a>" + sortIndicator('type') + "</th>" +
"          <th><a href='javascript:void(0)' data-action='sort' data-sort-field='status'>Status</a>" + sortIndicator('status') + "</th>" +
"          <th><a href='javascript:void(0)' data-action='sort' data-sort-field='url_count'>URL count</a>" + sortIndicator('url_count') + "</th>" +
"          <th><a href='javascript:void(0)' data-action='sort' data-sort-field='default_change_frequency'>Change frequency</a>" + sortIndicator('default_change_frequency') + "</th>" +
"          <th><a href='javascript:void(0)' data-action='sort' data-sort-field='default_priority'>Default priority</a>" + sortIndicator('default_priority') + "</th>" +
"          <th><a href='javascript:void(0)' data-action='sort' data-sort-field='crawl_priority'>Crawl priority</a>" + sortIndicator('crawl_priority') + "</th>" +
"          <th><a href='javascript:void(0)' data-action='sort' data-sort-field='last_modified'>Last modified</a>" + sortIndicator('last_modified') + "</th>" +
"          <th>Actions</th>" +
"        </tr>" +
"      </thead>" +
"      <tbody>" + rowsHtml + "</tbody>" +
"    </table>" +
"  </section>" +
"  <section class='pagination-section' data-component='pagination-controls'>" +
"    <p>Showing " + escapeHtml(sitemaps.length) + " of " + escapeHtml(totalCount) + " sitemaps.</p>" +
"    <p>" + paginationLinksHtml + "</p>" +
"    <p>Page size: " +
"      <select data-action='page-size-change'>" + pageSizeOptionsHtml + "</select>" +
"    </p>" +
"  </section>" +
"  <p class='contextual-help' data-component='contextual-help-link'>" +
"    Need help managing sitemap groups? " +
"    <a href='javascript:void(0)' data-action='open-help'>View help for this page</a>." +
"  </p>" +
"</div>" +
"<div class='modal-overlay' data-component='remove-from-group-dialog' style='display:none'>" +
"  <div class='modal-dialog'>" +
"    <h2>Remove sitemaps from group</h2>" +
"    <p data-role='remove-message'>Are you sure you want to remove the selected sitemaps from this group?</p>" +
"    <p data-role='remove-feedback' class='feedback-message'></p>" +
"    <p class='modal-actions'>" +
"      <a href='javascript:void(0)' data-action='confirm-remove'>Confirm</a>" +
"      &nbsp;|&nbsp;" +
"      <a href='javascript:void(0)' data-action='cancel-remove'>Cancel</a>" +
"    </p>" +
"  </div>" +
"</div>";

        container.innerHTML = html;
        container.setAttribute('data-current-page', String(page));
        container.setAttribute('data-total-pages', String(totalPages));
        container.setAttribute('data-page-size', String(pageSize));
        container.setAttribute('data-group-id', group.id || '');
    }

    function initGroupDetail(container, urlParams) {
        var groupId = urlParams.get('groupId');
        if (!groupId) {
            container.innerHTML = "" +
                "<div class='sitemap-group-detail-column'>" +
                "  <nav class='breadcrumb-nav' data-component='breadcrumb-nav' aria-label='Breadcrumb'>" +
                "    <a href='javascript:void(0)' data-action='back-to-groups'>Groups</a> &gt; " +
                "    <span>Missing group</span>" +
                "  </nav>" +
                "  <section class='group-header' data-component='group-header'>" +
                "    <h1>Sitemap Group Detail</h1>" +
                "    <div class='info-box'>" +
                "      <p>This page requires a sitemap group identifier (groupId) in the URL querystring.</p>" +
                "      <p><a href='javascript:void(0)' data-action='back-to-groups'>Return to sitemap groups</a>.</p>" +
                "    </div>" +
                "  </section>" +
                "</div>";
            attachNavigationHandlers(container);
            return;
        }

        var search = urlParams.get('search');
        var typeFilter = urlParams.get('type');
        var statusFilter = urlParams.get('status');
        var minUrlCountParam = urlParams.get('minUrlCount');
        var maxUrlCountParam = urlParams.get('maxUrlCount');
        var changeFrequencyFilter = urlParams.get('changeFrequency');
        var sortBy = urlParams.get('sortBy');
        var sortOrder = urlParams.get('sortOrder');
        var pageParam = urlParams.get('page');
        var pageSizeParam = urlParams.get('pageSize');

        var minUrlCount = (minUrlCountParam !== null && minUrlCountParam !== '') ? Number(minUrlCountParam) : undefined;
        var maxUrlCount = (maxUrlCountParam !== null && maxUrlCountParam !== '') ? Number(maxUrlCountParam) : undefined;
        var pageNumber = (pageParam !== null && pageParam !== '') ? Number(pageParam) : undefined;
        var pageSizeNumber = (pageSizeParam !== null && pageSizeParam !== '') ? Number(pageSizeParam) : undefined;

        var result;
        try {
            result = WebsiteSDK.getSitemapGroupDetails(
                groupId,
                search || undefined,
                typeFilter || undefined,
                statusFilter || undefined,
                minUrlCount,
                maxUrlCount,
                changeFrequencyFilter || undefined,
                sortBy || undefined,
                sortOrder || undefined,
                pageNumber,
                pageSizeNumber
            );
        } catch (error) {
            container.innerHTML = "<p>Error loading sitemap group details.</p>";
            return;
        }

        var data = {
            group: result && result.group ? result.group : null,
            sitemaps: result && Array.isArray(result.sitemaps) ? result.sitemaps : [],
            totalCount: result && typeof result.totalCount === 'number' ? result.totalCount : 0,
            page: result && typeof result.page === 'number' ? result.page : (pageNumber || 1),
            pageSize: result && typeof result.pageSize === 'number' ? result.pageSize : (pageSizeNumber || 25)
        };

        buildGroupDetailPage(container, data, urlParams);
        attachAllHandlers(container);
    }

    function attachNavigationHandlers(container) {
        container.addEventListener('click', function(event) {
            var target = event.target;
            var actionElement = target.closest ? target.closest('[data-action]') : target;
            if (!actionElement) {
                return;
            }
            var action = actionElement.getAttribute('data-action');
            if (!action) {
                return;
            }
            if (action === 'back-to-groups') {
                window.location.href = 'sitemap_groups.html';
            } else if (action === 'open-help') {
                window.location.href = 'help.html?currentPage=sitemap_group_detail';
            }
        });
    }

    function attachAllHandlers(container) {
        attachNavigationHandlers(container);

        var selectedMembershipIds = new Set();

        function updateSelectionCount() {
            var span = container.querySelector('[data-role="selected-count"]');
            if (span) {
                span.textContent = String(selectedMembershipIds.size);
            }
        }

        function navigateWithUpdatedParams(updater) {
            var params = new URLSearchParams(window.location.search);
            var groupId = container.getAttribute('data-group-id');
            if (groupId) {
                params.set('groupId', groupId);
            }
            updater(params);
            window.location.search = params.toString();
        }

        var filtersForm = container.querySelector('#group-filters-form');
        if (filtersForm) {
            filtersForm.addEventListener('submit', function(event) {
                event.preventDefault();
                var formData = new FormData(filtersForm);
                navigateWithUpdatedParams(function(params) {
                    var search = (formData.get('search') || '').toString().trim();
                    var typeValue = (formData.get('type') || '').toString().trim();
                    var statusValue = (formData.get('status') || '').toString().trim();
                    var minUrlCount = (formData.get('minUrlCount') || '').toString().trim();
                    var maxUrlCount = (formData.get('maxUrlCount') || '').toString().trim();
                    var changeFrequency = (formData.get('changeFrequency') || '').toString().trim();

                    if (search) { params.set('search', search); } else { params.delete('search'); }
                    if (typeValue) { params.set('type', typeValue); } else { params.delete('type'); }
                    if (statusValue) { params.set('status', statusValue); } else { params.delete('status'); }
                    if (minUrlCount) { params.set('minUrlCount', minUrlCount); } else { params.delete('minUrlCount'); }
                    if (maxUrlCount) { params.set('maxUrlCount', maxUrlCount); } else { params.delete('maxUrlCount'); }
                    if (changeFrequency) { params.set('changeFrequency', changeFrequency); } else { params.delete('changeFrequency'); }

                    params.set('page', '1');
                });
            });

            var clearLink = container.querySelector('[data-action="clear-filters"]');
            if (clearLink) {
                clearLink.addEventListener('click', function(event) {
                    event.preventDefault();
                    navigateWithUpdatedParams(function(params) {
                        params.delete('search');
                        params.delete('type');
                        params.delete('status');
                        params.delete('minUrlCount');
                        params.delete('maxUrlCount');
                        params.delete('changeFrequency');
                        params.set('page', '1');
                    });
                });
            }
        }

        container.addEventListener('click', function(event) {
            var target = event.target;
            var actionElement = target.closest ? target.closest('[data-action]') : target;
            if (!actionElement) {
                return;
            }
            var action = actionElement.getAttribute('data-action');
            if (!action) {
                return;
            }

            if (action === 'remove-from-group') {
                event.preventDefault();
                if (!selectedMembershipIds.size) {
                    alert('Select at least one sitemap to remove from the group.');
                    return;
                }
                var dialog = container.querySelector('[data-component="remove-from-group-dialog"]');
                if (dialog) {
                    dialog.style.display = 'block';
                    dialog.setAttribute('data-membership-ids', Array.from(selectedMembershipIds).join(','));
                    var feedback = dialog.querySelector('[data-role="remove-feedback"]');
                    if (feedback) {
                        feedback.textContent = '';
                    }
                }
            } else if (action === 'confirm-remove') {
                event.preventDefault();
                var dialogConfirm = actionElement.closest('[data-component="remove-from-group-dialog"]');
                if (!dialogConfirm) {
                    return;
                }
                var idsAttr = dialogConfirm.getAttribute('data-membership-ids') || '';
                var membershipIds = idsAttr.split(',').map(function(id) { return id.trim(); }).filter(function(id) { return id; });
                if (!membershipIds.length) {
                    dialogConfirm.style.display = 'none';
                    return;
                }
                var response;
                try {
                    response = WebsiteSDK.removeSitemapsFromGroup(membershipIds);
                } catch (error) {
                    var feedbackError = dialogConfirm.querySelector('[data-role="remove-feedback"]');
                    if (feedbackError) {
                        feedbackError.textContent = 'Error removing sitemaps from group.';
                    }
                    return;
                }
                var feedback = dialogConfirm.querySelector('[data-role="remove-feedback"]');
                if (response && response.success) {
                    if (feedback) {
                        var msg = response.message || ('Removed ' + (response.removedCount || membershipIds.length) + ' sitemap(s) from the group.');
                        feedback.textContent = msg;
                    }
                    window.location.href = window.location.href;
                } else {
                    if (feedback) {
                        feedback.textContent = (response && response.message) ? response.message : 'Failed to remove sitemaps from group.';
                    }
                }
            } else if (action === 'cancel-remove') {
                event.preventDefault();
                var dialogCancel = actionElement.closest('[data-component="remove-from-group-dialog"]');
                if (dialogCancel) {
                    dialogCancel.style.display = 'none';
                }
            } else if (action === 'open-add-sitemaps') {
                event.preventDefault();
                var panel = container.querySelector('[data-component="add-sitemaps-to-group-panel"]');
                if (panel) {
                    panel.style.display = 'block';
                    var feedbackAdd = panel.querySelector('[data-role="add-feedback"]');
                    if (feedbackAdd) {
                        feedbackAdd.textContent = '';
                    }
                }
            } else if (action === 'close-add-sitemaps') {
                event.preventDefault();
                var panelClose = container.querySelector('[data-component="add-sitemaps-to-group-panel"]');
                if (panelClose) {
                    panelClose.style.display = 'none';
                }
            } else if (action === 'submit-add-sitemaps') {
                event.preventDefault();
                var panelSubmit = container.querySelector('[data-component="add-sitemaps-to-group-panel"]');
                if (!panelSubmit) {
                    return;
                }
                var textarea = panelSubmit.querySelector('textarea[name="sitemapIds"]');
                if (!textarea) {
                    return;
                }
                var raw = textarea.value || '';
                var sitemapIds = raw.split(',').map(function(id) { return id.trim(); }).filter(function(id) { return id; });
                var feedbackAddPanel = panelSubmit.querySelector('[data-role="add-feedback"]');
                if (!sitemapIds.length) {
                    if (feedbackAddPanel) {
                        feedbackAddPanel.textContent = 'Provide at least one sitemap identifier.';
                    }
                    return;
                }
                var groupId = container.getAttribute('data-group-id') || '';
                var addResponse;
                try {
                    addResponse = WebsiteSDK.addSitemapsToGroup(sitemapIds, groupId);
                } catch (error) {
                    if (feedbackAddPanel) {
                        feedbackAddPanel.textContent = 'Error adding sitemaps to group.';
                    }
                    return;
                }
                if (addResponse && addResponse.success) {
                    if (feedbackAddPanel) {
                        var added = typeof addResponse.addedCount === 'number' ? addResponse.addedCount : sitemapIds.length;
                        var already = typeof addResponse.alreadyMemberCount === 'number' ? addResponse.alreadyMemberCount : 0;
                        var msgAdd = addResponse.message || ('Added ' + added + ' sitemap(s); ' + already + ' already in the group.');
                        feedbackAddPanel.textContent = msgAdd;
                    }
                    window.location.href = window.location.href;
                } else {
                    if (feedbackAddPanel) {
                        feedbackAddPanel.textContent = (addResponse && addResponse.message) ? addResponse.message : 'Failed to add sitemaps to group.';
                    }
                }
            } else if (action === 'sort') {
                event.preventDefault();
                var field = actionElement.getAttribute('data-sort-field') || '';
                if (!field) {
                    return;
                }
                navigateWithUpdatedParams(function(params) {
                    var currentSortBy = params.get('sortBy') || 'filename';
                    var currentSortOrder = params.get('sortOrder') || 'asc';
                    var newOrder = 'asc';
                    if (currentSortBy === field && currentSortOrder === 'asc') {
                        newOrder = 'desc';
                    }
                    params.set('sortBy', field);
                    params.set('sortOrder', newOrder);
                });
            } else if (action === 'open-sitemap-details') {
                event.preventDefault();
                var row = actionElement.closest('tr');
                if (!row) {
                    return;
                }
                var sitemapId = row.getAttribute('data-sitemap-id');
                if (!sitemapId) {
                    return;
                }
                window.location.href = 'sitemap_details.html?sitemapId=' + encodeURIComponent(sitemapId) + '&mode=edit';
            } else if (action === 'view-urls') {
                event.preventDefault();
                var rowUrls = actionElement.closest('tr');
                if (!rowUrls) {
                    return;
                }
                var sitemapIdUrls = rowUrls.getAttribute('data-sitemap-id');
                if (!sitemapIdUrls) {
                    return;
                }
                window.location.href = 'sitemap_urls.html?sitemapId=' + encodeURIComponent(sitemapIdUrls) + '&viewMode=standard';
            } else if (action === 'page-prev') {
                event.preventDefault();
                var currentPagePrev = Number(container.getAttribute('data-current-page') || '1');
                if (currentPagePrev <= 1) {
                    return;
                }
                var newPagePrev = currentPagePrev - 1;
                navigateWithUpdatedParams(function(params) {
                    params.set('page', String(newPagePrev));
                });
            } else if (action === 'page-next') {
                event.preventDefault();
                var currentPageNext = Number(container.getAttribute('data-current-page') || '1');
                var totalPagesNext = Number(container.getAttribute('data-total-pages') || '1');
                if (currentPageNext >= totalPagesNext) {
                    return;
                }
                var newPageNext = currentPageNext + 1;
                navigateWithUpdatedParams(function(params) {
                    params.set('page', String(newPageNext));
                });
            } else if (action === 'page-number') {
                event.preventDefault();
                var pageValue = actionElement.getAttribute('data-page');
                if (!pageValue) {
                    return;
                }
                navigateWithUpdatedParams(function(params) {
                    params.set('page', String(pageValue));
                });
            }
        });

        container.addEventListener('change', function(event) {
            var target = event.target;
            var action = target.getAttribute('data-action');
            if (!action) {
                if (target.name === 'type' || target.name === 'status' || target.name === 'minUrlCount' || target.name === 'maxUrlCount' || target.name === 'changeFrequency') {
                    if (target.form && target.form.id === 'group-filters-form') {
                        target.form.dispatchEvent(new Event('submit'));
                    }
                }
                return;
            }

            if (action === 'row-select') {
                var membershipId = target.getAttribute('data-membership-id');
                if (!membershipId) {
                    return;
                }
                if (target.checked) {
                    selectedMembershipIds.add(membershipId);
                } else {
                    selectedMembershipIds.delete(membershipId);
                    var selectAll = container.querySelector('input[data-action="select-all"]');
                    if (selectAll) {
                        selectAll.checked = false;
                    }
                }
                updateSelectionCount();
            } else if (action === 'select-all') {
                var checked = target.checked;
                var rowCheckboxes = container.querySelectorAll('input[data-action="row-select"]');
                selectedMembershipIds.clear();
                rowCheckboxes.forEach(function(cb) {
                    cb.checked = checked;
                    var membershipIdEach = cb.getAttribute('data-membership-id');
                    if (checked && membershipIdEach) {
                        selectedMembershipIds.add(membershipIdEach);
                    }
                });
                updateSelectionCount();
            } else if (action === 'page-size-change') {
                var newSizeStr = target.value || '';
                if (!newSizeStr) {
                    return;
                }
                var newSize = Number(newSizeStr);
                if (!newSize || newSize <= 0) {
                    return;
                }
                navigateWithUpdatedParams(function(params) {
                    params.set('pageSize', String(newSize));
                    params.set('page', '1');
                });
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
            var dataType = element.getAttribute('data-populate');
            if (dataType === 'sitemap-group-details') {
                initGroupDetail(element, urlParams);
            }
        });
    });
})();
</script>

</body>
</html>
