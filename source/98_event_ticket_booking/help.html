<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Tickets &mdash; Event Ticket Booking</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="help.css">
</head>
<body class="site">
    <header class="site-header" role="banner">
        <div class="header-top">
            <div class="container header-top-inner">
                <a href="index.html" class="site-logo" aria-label="Just Tickets home">
                    <span class="logo-word logo-word-top">JUST</span>
                    <span class="logo-word logo-word-bottom">TICKETS</span>
                </a>
            </div>
        </div>

        <nav class="primary-nav" aria-label="Primary navigation">
            <div class="container primary-nav-inner">
                <ul class="primary-nav-list">
                    <li class="primary-nav-item">
                        <a href="index.html" title="Homepage with featured events, search bar, and quick category access.">Home</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="events.html?categoryId=all" title="Browse all events across categories with full filtering and sorting.">All Events</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="events.html?categoryId=music" title="Browse music events and concerts, including rock shows and artists like Coldplay.">Music</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="events.html?categoryId=sports" title="Browse sports events such as basketball games and other competitions.">Sports</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="events.html?categoryId=theater_shows" title="Browse theater, plays, and family-friendly shows.">Theater &amp; Shows</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="events.html?categoryId=comedy" title="Browse comedy events including stand-up shows.">Comedy</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="profile.html" title="Create or update your profile, home city, and favorite categories.">Profile</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="help.html" title="Get help, FAQs, and guidance on booking, seating, and payments.">Help</a>
                    </li>
                </ul>
                <div class="header-utilities">
                    <div class="header-cart-summary" data-component="header-cart-summary" data-populate="getCartSummary" aria-label="Cart summary">
                        <!-- Cart summary populated by JavaScript -->
                    </div>
                    <div class="header-profile-summary" data-component="header-profile-summary" data-populate="getProfileSummary" aria-label="Profile summary">
                        <!-- Profile summary populated by JavaScript -->
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main id="content" class="site-main" role="main">
        <div class="container">
            <h1 class="page-title">Help &amp; FAQs</h1>

            <div class="help-main-grid">
                <div class="help-left-column">
                    <div class="help-content-loader" data-component="help-content-loader" data-populate="getHelpContent" aria-live="polite">
                        <!-- Loading state / errors rendered by JavaScript -->
                    </div>

                    <div class="help-content-wrapper">
                        <section class="help-content-sections" data-component="help-content-sections" aria-label="Help topics content">
                            <!-- Help topic sections rendered by JavaScript -->
                        </section>
                    </div>
                </div>

                <aside class="help-right-column" aria-label="Help tools">
                    <section class="help-search-section">
                        <form class="help-search-form" data-component="help-search" data-action="help-search-form" role="search" aria-label="Search Help &amp; FAQs">
                            <label for="helpSearchInput" class="help-search-label">Search Help &amp; FAQs</label>
                            <div class="help-search-input-row">
                                <input type="search" id="helpSearchInput" name="q" class="help-search-input" placeholder="Search by topic or keyword">
                                <button type="submit" class="button button-primary help-search-submit">Search</button>
                            </div>
                            <button type="button" class="help-search-clear" data-action="clear-search">Clear</button>
                        </form>

                        <p class="help-search-status" data-component="help-search-results-indicator" aria-live="polite"></p>
                    </section>

                    <nav class="help-topic-nav" data-component="help-topic-navigation" aria-label="Help topics">
                        <!-- Topic navigation tabs rendered by JavaScript -->
                    </nav>

                    <section class="help-support-links-section">
                        <div class="help-support-links" data-component="help-support-links" data-populate="getHelpContent">
                            <!-- Contact support links rendered by JavaScript -->
                        </div>
                    </section>
                </aside>
            </div>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container footer-inner">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav-list">
                    <li class="footer-nav-item">
                        <a href="about.html" title="Learn more about the ticket booking service.">About</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="contact.html" title="Contact customer support or send an inquiry.">Contact</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="help.html" title="Find answers to common questions about using the site.">Help &amp; FAQs</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="terms.html" title="Read the legal terms for using the site and purchasing tickets.">Terms &amp; Conditions</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="privacy.html" title="Understand how your data is collected and used.">Privacy Policy</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="events.html?categoryId=all" title="Browse all available events by category, date, and location.">All Events</a>
                    </li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; 2024 Just Tickets. All rights reserved.</p>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var HELP_TOPICS = [
            { key: 'search_and_filters', label: 'Searching & filters' },
            { key: 'seat_map_and_sections', label: 'Seat map & sections' },
            { key: 'ticket_types_and_pricing', label: 'Ticket types & pricing' },
            { key: 'delivery_methods', label: 'Delivery methods' },
            { key: 'promo_codes', label: 'Promo codes' },
            { key: 'support_instructions', label: 'Contact & support' }
        ];

        var helpPageState = {
            section: null,
            query: '',
            helpContent: null,
            matchCountsByTopic: {}
        };

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function highlightContent(rawHtml, query) {
            if (!query) {
                return rawHtml;
            }
            var safeQuery = String(query);
            var escapedQuery = safeQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            var re = new RegExp('(' + escapedQuery + ')', 'gi');
            return String(rawHtml).replace(re, '<mark>$1</mark>');
        }

        function parseUrlState() {
            var params = new URLSearchParams(window.location.search);
            var sectionParam = params.get('section');
            var qParam = params.get('q') || '';
            var validKeys = HELP_TOPICS.map(function(t) { return t.key; });
            var defaultSection = 'search_and_filters';
            var section = validKeys.indexOf(sectionParam) !== -1 ? sectionParam : defaultSection;
            return {
                section: section,
                query: qParam
            };
        }

        function buildUrlWithParams(params) {
            var queryString = params.toString();
            var basePath = window.location.pathname;
            return queryString ? basePath + '?' + queryString : basePath;
        }

        function updateStateFromUrl() {
            var urlState = parseUrlState();
            helpPageState.section = urlState.section;
            helpPageState.query = urlState.query;
        }

        function computeSearchMatches() {
            var query = (helpPageState.query || '').trim().toLowerCase();
            var matchCounts = {};
            var content = helpPageState.helpContent || {};

            HELP_TOPICS.forEach(function(topic) {
                var raw = String(content[topic.key] == null ? '' : content[topic.key]);
                if (!query) {
                    matchCounts[topic.key] = null;
                    return;
                }
                var lower = raw.toLowerCase();
                if (!lower) {
                    matchCounts[topic.key] = 0;
                    return;
                }
                var count = 0;
                var index = lower.indexOf(query);
                while (index !== -1) {
                    count += 1;
                    index = lower.indexOf(query, index + query.length);
                }
                matchCounts[topic.key] = count;
            });

            helpPageState.matchCountsByTopic = matchCounts;
        }

        function renderHeaderProfileSummary(container, profile) {
            if (!container) {
                return;
            }
            if (!profile) {
                container.innerHTML = '';
                return;
            }
            var isSignedUp = !!profile.is_signed_up;
            if (isSignedUp) {
                var firstName = profile.first_name ? String(profile.first_name) : 'Account';
                var homeCity = profile.home_city_name ? String(profile.home_city_name) : '';
                container.innerHTML = `
                    <button type="button" class="header-profile-summary-button" data-action="open-profile-area">
                        <span class="header-profile-name">${escapeHtml(firstName)}</span>
                        ${homeCity ? `<span class="header-profile-city">${escapeHtml(homeCity)}</span>` : ''}
                    </button>
                `;
            } else {
                container.innerHTML = `
                    <button type="button" class="header-profile-summary-button" data-action="open-profile-area">
                        <span class="header-profile-name">Sign in / Create account</span>
                    </button>
                `;
            }
        }

        function renderHeaderCartSummary(container, cart) {
            if (!container) {
                return;
            }
            if (!cart) {
                container.innerHTML = '';
                return;
            }
            var itemCount = typeof cart.item_count === 'number' ? cart.item_count : 0;
            var total = typeof cart.total === 'number' ? cart.total : 0;
            var currency = cart.currency || 'usd';
            var hasItems = itemCount > 0;
            var symbols = { usd: '$', eur: '\u20ac', gbp: '\u00a3' };
            var symbol = symbols[String(currency).toLowerCase()] || '';
            var totalDisplay = hasItems ? symbol + total.toFixed(2) : '';
            var labelText = hasItems ? (itemCount + (itemCount === 1 ? ' ticket' : ' tickets')) : 'Cart empty';

            container.innerHTML = `
                <button type="button" class="header-cart-summary-button" data-action="open-cart">
                    <span class="header-cart-label">${escapeHtml(labelText)}</span>
                    ${hasItems ? `<span class="header-cart-total">${escapeHtml(totalDisplay)}</span>` : ''}
                </button>
            `;
        }

        function renderLoader(container, isError) {
            if (!container) {
                return;
            }
            if (isError) {
                container.innerHTML = `
                    <div class="help-loader-error">
                        We're having trouble loading Help content right now. Please try again in a moment.
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        }

        function renderTopicNavigation(container) {
            if (!container || !helpPageState.helpContent) {
                return;
            }
            var query = (helpPageState.query || '').trim();
            var matchCounts = helpPageState.matchCountsByTopic || {};
            var navHtml = '<ul class="help-topic-nav-list">';

            HELP_TOPICS.forEach(function(topic) {
                var isActive = topic.key === helpPageState.section;
                var count = matchCounts[topic.key];
                var hasMatches = typeof count === 'number' && count > 0;
                var countBadge = '';
                if (query && typeof count === 'number') {
                    countBadge = `<span class="help-topic-nav-count">${count}</span>`;
                }
                navHtml += `
                    <li class="help-topic-nav-item">
                        <button type="button"
                            class="help-topic-tab${isActive ? ' is-active' : ''}${hasMatches ? ' has-matches' : ''}"
                            data-action="set-topic"
                            data-topic-key="${topic.key}"
                            aria-current="${isActive ? 'page' : 'false'}">
                            <span class="help-topic-tab-label">${escapeHtml(topic.label)}</span>
                            ${countBadge}
                        </button>
                    </li>
                `;
            });

            navHtml += '</ul>';
            container.innerHTML = navHtml;
        }

        function renderContentSections(container) {
            if (!container || !helpPageState.helpContent) {
                return;
            }
            var content = helpPageState.helpContent;
            var query = (helpPageState.query || '').trim();
            var sectionsHtml = '';

            HELP_TOPICS.forEach(function(topic) {
                var raw = String(content[topic.key] == null ? '' : content[topic.key]);
                var highlighted = query ? highlightContent(raw, query) : raw;
                var isActive = topic.key === helpPageState.section;
                var sectionClasses = 'help-topic-section' + (isActive ? ' is-active-topic' : '');

                sectionsHtml += `
                    <section class="${sectionClasses}" id="help-topic-${topic.key}" data-topic-key="${topic.key}">
                        <h2 class="help-topic-heading">${escapeHtml(topic.label)}</h2>
                        <div class="help-topic-body">
                            ${highlighted}
                        </div>
                `;

                if (topic.key === 'support_instructions') {
                    sectionsHtml += `
                        <div class="help-topic-contact-support">
                            <p>
                                If you still need help, you can
                                <a href="contact.html" data-action="contact-support">contact support</a>
                                for additional assistance.
                            </p>
                        </div>
                    `;
                }

                sectionsHtml += '</section>';
            });

            container.innerHTML = sectionsHtml;
        }

        function renderSearchResultsIndicator(container) {
            if (!container || !helpPageState.helpContent) {
                return;
            }
            var query = (helpPageState.query || '').trim();
            var matchCounts = helpPageState.matchCountsByTopic || {};

            if (!query) {
                container.textContent = 'Type a keyword and press Search to find answers across all topics.';
                return;
            }

            var topicsWithMatches = 0;
            var totalMatches = 0;

            HELP_TOPICS.forEach(function(topic) {
                var count = matchCounts[topic.key];
                if (typeof count === 'number' && count > 0) {
                    topicsWithMatches += 1;
                    totalMatches += count;
                }
            });

            if (topicsWithMatches === 0) {
                container.textContent = 'No results for "' + query + '" across Help & FAQs.';
            } else {
                var topicLabel = topicsWithMatches === 1 ? 'topic' : 'topics';
                container.textContent = 'Showing ' + totalMatches + ' result' + (totalMatches === 1 ? '' : 's') +
                    ' across ' + topicsWithMatches + ' ' + topicLabel + ' for "' + query + '".';
            }
        }

        function renderSupportLinks(container) {
            if (!container) {
                return;
            }
            container.innerHTML = `
                <p class="help-support-text">
                    Still need help with your tickets, payments, or account?
                </p>
                <a href="contact.html" class="button button-primary help-support-contact-link" data-action="contact-support">
                    Contact support
                </a>
            `;
        }

        function renderAllHelpComponents() {
            if (!helpPageState.helpContent) {
                return;
            }

            computeSearchMatches();

            var topicNavContainers = document.querySelectorAll('[data-component="help-topic-navigation"]');
            topicNavContainers.forEach(function(container) {
                renderTopicNavigation(container);
            });

            var contentContainers = document.querySelectorAll('[data-component="help-content-sections"]');
            contentContainers.forEach(function(container) {
                renderContentSections(container);
            });

            var searchIndicatorContainers = document.querySelectorAll('[data-component="help-search-results-indicator"]');
            searchIndicatorContainers.forEach(function(container) {
                renderSearchResultsIndicator(container);
            });

            var supportLinksContainers = document.querySelectorAll('[data-component="help-support-links"]');
            supportLinksContainers.forEach(function(container) {
                renderSupportLinks(container);
            });

            var searchForms = document.querySelectorAll('[data-component="help-search"]');
            searchForms.forEach(function(form) {
                var input = form.querySelector('input[name="q"]');
                if (input) {
                    input.value = helpPageState.query || '';
                }
            });
        }

        function scrollToActiveTopicSection() {
            var selector = '.help-topic-section[data-topic-key="' + helpPageState.section + '"]';
            var activeSection = document.querySelector(selector);
            if (activeSection) {
                try {
                    activeSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } catch (e) {
                    activeSection.scrollIntoView(true);
                }
            }
        }

        function setSection(newSection) {
            var valid = HELP_TOPICS.some(function(t) { return t.key === newSection; });
            if (!valid) {
                return;
            }
            if (helpPageState.section === newSection) {
                return;
            }
            var params = new URLSearchParams(window.location.search);
            params.set('section', newSection);
            if (!helpPageState.query || !helpPageState.query.trim()) {
                params.delete('q');
            }
            var newUrl = buildUrlWithParams(params);
            window.history.pushState({ section: newSection, query: helpPageState.query }, '', newUrl);
            helpPageState.section = newSection;
            renderAllHelpComponents();
            scrollToActiveTopicSection();
        }

        function setQuery(newQuery) {
            var trimmed = (newQuery || '').trim();
            var params = new URLSearchParams(window.location.search);
            if (helpPageState.section) {
                params.set('section', helpPageState.section);
            }
            if (trimmed) {
                params.set('q', trimmed);
            } else {
                params.delete('q');
            }
            var newUrl = buildUrlWithParams(params);
            window.history.pushState({ section: helpPageState.section, query: trimmed }, '', newUrl);
            helpPageState.query = trimmed;
            renderAllHelpComponents();
        }

        function initHelpInteractions() {
            var topicNavContainers = document.querySelectorAll('[data-component="help-topic-navigation"]');
            topicNavContainers.forEach(function(nav) {
                nav.addEventListener('click', function(evt) {
                    var target = evt.target.closest('[data-action="set-topic"]');
                    if (!target) {
                        return;
                    }
                    var topicKey = target.getAttribute('data-topic-key');
                    if (!topicKey) {
                        return;
                    }
                    setSection(topicKey);
                });
            });

            var searchForms = document.querySelectorAll('[data-component="help-search"]');
            searchForms.forEach(function(form) {
                form.addEventListener('submit', function(evt) {
                    evt.preventDefault();
                    var input = form.querySelector('input[name="q"]');
                    if (!input) {
                        return;
                    }
                    setQuery(input.value || '');
                });

                var clearButton = form.querySelector('[data-action="clear-search"]');
                if (clearButton) {
                    clearButton.addEventListener('click', function() {
                        var input = form.querySelector('input[name="q"]');
                        if (input) {
                            input.value = '';
                        }
                        setQuery('');
                    });
                }
            });
        }

        // Initialize URL-derived state
        updateStateFromUrl();

        // Populate header profile summary
        var profileContainers = document.querySelectorAll('[data-populate="getProfileSummary"]');
        if (profileContainers.length > 0 && typeof WebsiteSDK !== 'undefined' && typeof WebsiteSDK.getProfileSummary === 'function') {
            try {
                var profileSummary = WebsiteSDK.getProfileSummary();
                profileContainers.forEach(function(container) {
                    renderHeaderProfileSummary(container, profileSummary);
                });
            } catch (e) {
                profileContainers.forEach(function(container) {
                    container.innerHTML = '';
                });
            }
        }

        // Populate header cart summary
        var cartContainers = document.querySelectorAll('[data-populate="getCartSummary"]');
        if (cartContainers.length > 0 && typeof WebsiteSDK !== 'undefined' && typeof WebsiteSDK.getCartSummary === 'function') {
            try {
                var cartSummary = WebsiteSDK.getCartSummary();
                cartContainers.forEach(function(container) {
                    renderHeaderCartSummary(container, cartSummary);
                });
            } catch (e) {
                cartContainers.forEach(function(container) {
                    container.innerHTML = '';
                });
            }
        }

        // Help content loading
        var hasHelpPopulate = document.querySelector('[data-populate="getHelpContent"]') !== null;
        var loaderContainers = document.querySelectorAll('[data-component="help-content-loader"]');

        if (hasHelpPopulate && typeof WebsiteSDK !== 'undefined' && typeof WebsiteSDK.getHelpContent === 'function') {
            loaderContainers.forEach(function(container) {
                container.innerHTML = '<div class="help-loader-placeholder">Loading help content...</div>';
            });
            try {
                var helpContent = WebsiteSDK.getHelpContent();
                helpPageState.helpContent = helpContent;
                loaderContainers.forEach(function(container) {
                    renderLoader(container, false);
                });
                initHelpInteractions();
                renderAllHelpComponents();
            } catch (e) {
                loaderContainers.forEach(function(container) {
                    renderLoader(container, true);
                });
            }
        } else {
            initHelpInteractions();
            if (helpPageState.helpContent) {
                renderAllHelpComponents();
            }
        }

        // Handle browser history navigation (back/forward)
        window.addEventListener('popstate', function() {
            updateStateFromUrl();

            var searchForms = document.querySelectorAll('[data-component="help-search"]');
            searchForms.forEach(function(form) {
                var input = form.querySelector('input[name="q"]');
                if (input) {
                    input.value = helpPageState.query || '';
                }
            });

            if (helpPageState.helpContent) {
                renderAllHelpComponents();
            }

            // Optionally refresh header summaries for freshness
            if (typeof WebsiteSDK !== 'undefined') {
                var profileContainersPop = document.querySelectorAll('[data-populate="getProfileSummary"]');
                if (profileContainersPop.length > 0 && typeof WebsiteSDK.getProfileSummary === 'function') {
                    try {
                        var profileSummaryPop = WebsiteSDK.getProfileSummary();
                        profileContainersPop.forEach(function(container) {
                            renderHeaderProfileSummary(container, profileSummaryPop);
                        });
                    } catch (e) {}
                }

                var cartContainersPop = document.querySelectorAll('[data-populate="getCartSummary"]');
                if (cartContainersPop.length > 0 && typeof WebsiteSDK.getCartSummary === 'function') {
                    try {
                        var cartSummaryPop = WebsiteSDK.getCartSummary();
                        cartContainersPop.forEach(function(container) {
                            renderHeaderCartSummary(container, cartSummaryPop);
                        });
                    } catch (e) {}
                }
            }
        });
    });
    </script>
</body>
</html>
