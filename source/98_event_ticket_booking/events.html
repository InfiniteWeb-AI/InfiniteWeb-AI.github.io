<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Tickets &mdash; Event Ticket Booking</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="events.css">
</head>
<body class="site">
    <header class="site-header" role="banner">
        <div class="header-top">
            <div class="container header-top-inner">
                <a href="index.html" class="site-logo" aria-label="Just Tickets home">
                    <span class="logo-word logo-word-top">JUST</span>
                    <span class="logo-word logo-word-bottom">TICKETS</span>
                </a>
                <div class="header-status" data-component="header-status-bar">
                    <div class="header-profile" data-populate="profile-summary"></div>
                    <div class="header-cart-wrapper" data-populate="cart-summary"></div>
                </div>
            </div>
        </div>

        <nav class="primary-nav" aria-label="Primary navigation">
            <div class="container">
                <ul class="primary-nav-list">
                    <li class="primary-nav-item">
                        <a href="index.html" title="Homepage with featured events, search bar, and quick category access.">Home</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="events.html?categoryId=all" title="Browse all events across categories with full filtering and sorting.">All Events</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="events.html?categoryId=music" title="Browse music events and concerts, including rock shows and artists like Coldplay.">Music</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="events.html?categoryId=sports" title="Browse sports events such as basketball games and other competitions.">Sports</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="events.html?categoryId=theater_shows" title="Browse theater, plays, and family-friendly shows.">Theater &amp; Shows</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="events.html?categoryId=comedy" title="Browse comedy events including stand-up shows.">Comedy</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="profile.html" title="Create or update your profile, home city, and favorite categories.">Profile</a>
                    </li>
                    <li class="primary-nav-item">
                        <a href="help.html" title="Get help, FAQs, and guidance on booking, seating, and payments.">Help</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="content" class="site-main" role="main">
        <div class="container">
            <div class="events-page" data-component="url-state-controller">
                <h1 class="visually-hidden">Events</h1>

                <!-- Search Query Bar -->
                <section class="events-search-section" data-component="search-query-bar">
                    <form class="events-search-form" data-action="submit-search" aria-label="Search events">
                        <label class="visually-hidden" for="eventsSearchInput">Search events by artist, team, or venue</label>
                        <div class="events-search-input-wrap">
                            <input id="eventsSearchInput" name="query" type="search" placeholder="Search by artist, team, event, or venue" autocomplete="off">
                            <button type="submit" class="btn btn-primary">Search</button>
                        </div>
                    </form>
                </section>

                <!-- Main two-column layout -->
                <div class="events-layout">
                    <!-- Filter Sidebar -->
                    <aside class="filter-panel" data-component="filter-panel" aria-label="Filter events">
                        <div class="filter-panel-inner" data-populate="event-filters">
                            <!-- Filter controls rendered by JavaScript -->
                        </div>
                    </aside>

                    <!-- Results Column -->
                    <section class="results-column">
                        <header class="results-toolbar">
                            <div class="results-summary" data-component="results-summary-bar">
                                <!-- Summary rendered by JavaScript -->
                            </div>
                            <div class="sort-page-bar" data-component="sort-and-page-size-bar">
                                <div class="sort-control">
                                    <label for="sortBySelect">Sort by</label>
                                    <select id="sortBySelect" data-action="change-sort" name="sortBy">
                                        <option value="">Relevance</option>
                                        <option value="date_asc">Date (soonest first)</option>
                                        <option value="price_asc">Price (low to high)</option>
                                        <option value="price_desc">Price (high to low)</option>
                                        <option value="popularity">Most popular</option>
                                        <option value="rating_desc">Rating (high to low)</option>
                                    </select>
                                </div>
                                <div class="page-size-control">
                                    <label for="pageSizeSelect">Per page</label>
                                    <select id="pageSizeSelect" data-action="change-page-size" name="pageSize">
                                        <option value="10">10</option>
                                        <option value="20">20</option>
                                        <option value="40">40</option>
                                        <option value="80">80</option>
                                    </select>
                                </div>
                            </div>
                        </header>

                        <!-- Event Results List -->
                        <section class="event-results" aria-live="polite" data-component="event-results-list" data-populate="search-results">
                            <!-- Event cards rendered by JavaScript -->
                        </section>

                        <!-- Pagination Controls -->
                        <nav class="pagination-controls" data-component="pagination-controls" aria-label="Pagination">
                            <!-- Pagination rendered by JavaScript -->
                        </nav>
                    </section>
                </div>

                <!-- Initial Data Loader Overlay -->
                <div class="events-loader-overlay" data-component="initial-data-loader" hidden>
                    <div class="events-loader-inner" role="status" aria-live="polite">
                        <div class="spinner"></div>
                        <p>Loading events...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container footer-inner">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav-list">
                    <li class="footer-nav-item">
                        <a href="about.html" title="Learn more about the ticket booking service.">About</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="contact.html" title="Contact customer support or send an inquiry.">Contact</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="help.html" title="Find answers to common questions about using the site.">Help &amp; FAQs</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="terms.html" title="Read the legal terms for using the site and purchasing tickets.">Terms &amp; Conditions</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="privacy.html" title="Understand how your data is collected and used.">Privacy Policy</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="events.html?categoryId=all" title="Browse all available events by category, date, and location.">All Events</a>
                    </li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; 2024 Just Tickets. All rights reserved.</p>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    (function() {
        const eventsPage = {
            state: {},
            filterOptions: null,
            cities: [],
            searchResults: null
        };

        const CATEGORY_LABELS = {
            all: 'All Events',
            music: 'Music',
            sports: 'Sports',
            theater_shows: 'Theater & Shows',
            comedy: 'Comedy'
        };

        function parseBooleanParam(value) {
            if (value === null || value === undefined) return undefined;
            if (value === 'true' || value === '1') return true;
            if (value === 'false' || value === '0') return false;
            return undefined;
        }

        function parseUrlState() {
            const params = new URLSearchParams(window.location.search);
            const state = {};

            const categoryId = params.get('categoryId');
            state.categoryId = categoryId ? categoryId : 'all';

            const query = params.get('query');
            if (query) {
                state.query = query;
            }

            const cityId = params.get('cityId');
            if (cityId) {
                state.cityId = cityId;
            }

            const dateFrom = params.get('dateFrom');
            if (dateFrom) {
                state.dateFrom = dateFrom;
            }

            const dateTo = params.get('dateTo');
            if (dateTo) {
                state.dateTo = dateTo;
            }

            const timeFrom = params.get('timeFrom');
            if (timeFrom) {
                state.timeFrom = timeFrom;
            }

            const timeTo = params.get('timeTo');
            if (timeTo) {
                state.timeTo = timeTo;
            }

            const minPriceParam = params.get('minPrice');
            if (minPriceParam !== null) {
                const n = Number(minPriceParam);
                if (!Number.isNaN(n)) {
                    state.minPrice = n;
                }
            }

            const maxPriceParam = params.get('maxPrice');
            if (maxPriceParam !== null) {
                const n = Number(maxPriceParam);
                if (!Number.isNaN(n)) {
                    state.maxPrice = n;
                }
            }

            const minRatingParam = params.get('minRating');
            if (minRatingParam !== null) {
                const n = Number(minRatingParam);
                if (!Number.isNaN(n)) {
                    state.minRating = n;
                }
            }

            const genreTagsParam = params.get('genreTags');
            if (genreTagsParam) {
                const tags = genreTagsParam.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t.length > 0; });
                if (tags.length) {
                    state.genreTags = tags;
                }
            }

            const isFamilyFriendlyParam = params.get('isFamilyFriendly');
            const isFamilyFriendly = parseBooleanParam(isFamilyFriendlyParam);
            if (typeof isFamilyFriendly === 'boolean') {
                state.isFamilyFriendly = isFamilyFriendly;
            }

            const sportType = params.get('sportType');
            if (sportType) {
                state.sportType = sportType;
            }

            const isHomeGameParam = params.get('isHomeGame');
            const isHomeGame = parseBooleanParam(isHomeGameParam);
            if (typeof isHomeGame === 'boolean') {
                state.isHomeGame = isHomeGame;
            }

            const sortBy = params.get('sortBy');
            if (sortBy) {
                state.sortBy = sortBy;
            }

            const pageParam = params.get('page');
            let page = parseInt(pageParam, 10);
            if (Number.isNaN(page) || page < 1) {
                page = 1;
            }
            state.page = page;

            const pageSizeParam = params.get('pageSize');
            let pageSize = parseInt(pageSizeParam, 10);
            if (Number.isNaN(pageSize) || pageSize <= 0) {
                pageSize = 20;
            }
            state.pageSize = pageSize;

            return state;
        }

        function buildUrlFromState(state) {
            const params = new URLSearchParams();

            if (state.categoryId) {
                params.set('categoryId', state.categoryId);
            }

            if (state.query) {
                params.set('query', state.query);
            }

            if (state.cityId) {
                params.set('cityId', state.cityId);
            }

            if (state.dateFrom) {
                params.set('dateFrom', state.dateFrom);
            }

            if (state.dateTo) {
                params.set('dateTo', state.dateTo);
            }

            if (state.timeFrom) {
                params.set('timeFrom', state.timeFrom);
            }

            if (state.timeTo) {
                params.set('timeTo', state.timeTo);
            }

            if (typeof state.minPrice === 'number') {
                params.set('minPrice', String(state.minPrice));
            }

            if (typeof state.maxPrice === 'number') {
                params.set('maxPrice', String(state.maxPrice));
            }

            if (typeof state.minRating === 'number') {
                params.set('minRating', String(state.minRating));
            }

            if (Array.isArray(state.genreTags) && state.genreTags.length) {
                params.set('genreTags', state.genreTags.join(','));
            }

            if (typeof state.isFamilyFriendly === 'boolean') {
                params.set('isFamilyFriendly', state.isFamilyFriendly ? 'true' : 'false');
            }

            if (state.sportType) {
                params.set('sportType', state.sportType);
            }

            if (typeof state.isHomeGame === 'boolean') {
                params.set('isHomeGame', state.isHomeGame ? 'true' : 'false');
            }

            if (state.sortBy) {
                params.set('sortBy', state.sortBy);
            }

            if (typeof state.page === 'number' && state.page > 1) {
                params.set('page', String(state.page));
            }

            if (typeof state.pageSize === 'number' && state.pageSize !== 20) {
                params.set('pageSize', String(state.pageSize));
            }

            const queryString = params.toString();
            return queryString ? 'events.html?' + queryString : 'events.html';
        }

        function applyStateChanges(changes, options) {
            const opts = options || {};
            const newState = {};

            Object.keys(eventsPage.state).forEach(function(key) {
                newState[key] = eventsPage.state[key];
            });

            Object.keys(changes).forEach(function(key) {
                const value = changes[key];
                if (value === null || value === undefined) {
                    delete newState[key];
                } else {
                    newState[key] = value;
                }
            });

            if (opts.resetPage) {
                newState.page = 1;
            }

            const newUrl = buildUrlFromState(newState);
            window.location.href = newUrl;
        }

        function formatCurrency(amount, currency) {
            if (typeof amount !== 'number') {
                return '';
            }
            var symbol = '$';
            if (currency === 'eur') {
                symbol = '\u20AC';
            } else if (currency === 'gbp') {
                symbol = '\u00A3';
            }
            return symbol + amount.toFixed(0);
        }

        function safeDateTimeLabel(isoString) {
            if (!isoString) return '';
            var date = new Date(isoString);
            if (Number.isNaN(date.getTime())) {
                return isoString;
            }
            var optionsDate = { year: 'numeric', month: 'short', day: 'numeric' };
            var optionsTime = { hour: 'numeric', minute: '2-digit' };
            return date.toLocaleDateString(undefined, optionsDate) + ' \u00b7 ' + date.toLocaleTimeString(undefined, optionsTime);
        }

        function findCityNameById(cityId) {
            if (!cityId) return '';
            var allCities = [];
            if (Array.isArray(eventsPage.cities)) {
                allCities = allCities.concat(eventsPage.cities);
            }
            if (eventsPage.filterOptions && Array.isArray(eventsPage.filterOptions.cities)) {
                allCities = allCities.concat(eventsPage.filterOptions.cities);
            }
            for (var i = 0; i < allCities.length; i += 1) {
                var c = allCities[i];
                if (c && c.id === cityId) {
                    return c.name || '';
                }
            }
            return '';
        }

        function hasActiveFilters(state) {
            if (state.cityId) return true;
            if (state.dateFrom || state.dateTo) return true;
            if (state.timeFrom || state.timeTo) return true;
            if (typeof state.minPrice === 'number' || typeof state.maxPrice === 'number') return true;
            if (typeof state.minRating === 'number') return true;
            if (Array.isArray(state.genreTags) && state.genreTags.length) return true;
            if (typeof state.isFamilyFriendly === 'boolean') return true;
            if (state.sportType) return true;
            if (typeof state.isHomeGame === 'boolean') return true;
            return false;
        }

        function renderProfileSummary(container, summary) {
            if (!container) return;
            container.innerHTML = '';

            var button = document.createElement('button');
            button.type = 'button';
            button.className = 'header-profile-button';
            button.setAttribute('data-action', 'open-profile');

            if (summary && summary.is_signed_up && summary.first_name) {
                var nameSpan = document.createElement('span');
                nameSpan.className = 'header-profile-name';
                nameSpan.textContent = 'Hi, ' + summary.first_name;
                button.appendChild(nameSpan);

                if (summary.home_city_name) {
                    var citySpan = document.createElement('span');
                    citySpan.className = 'header-profile-city';
                    citySpan.textContent = ' · ' + summary.home_city_name;
                    button.appendChild(citySpan);
                }
            } else {
                button.textContent = 'Sign in / Profile';
            }

            container.appendChild(button);
        }

        function renderCartSummary(container, summary) {
            if (!container) return;
            container.innerHTML = '';

            var button = document.createElement('button');
            button.type = 'button';
            button.className = 'header-cart-button';
            button.setAttribute('data-action', 'open-cart');
            button.setAttribute('aria-label', 'View cart');

            var labelSpan = document.createElement('span');
            labelSpan.className = 'header-cart-label';
            labelSpan.textContent = 'Cart';
            button.appendChild(labelSpan);

            var countSpan = document.createElement('span');
            countSpan.className = 'header-cart-count';
            countSpan.setAttribute('aria-live', 'polite');
            var itemCount = summary && typeof summary.item_count === 'number' ? summary.item_count : 0;
            countSpan.textContent = String(itemCount);
            button.appendChild(countSpan);

            if (summary && typeof summary.total === 'number' && summary.currency) {
                var totalSpan = document.createElement('span');
                totalSpan.className = 'header-cart-total';
                totalSpan.textContent = formatCurrency(summary.total, summary.currency);
                button.appendChild(totalSpan);
            }

            container.appendChild(button);
        }

        function renderFilterPanel(container, state, filterOptions, cities) {
            if (!container) return;
            container.innerHTML = '';

            var fo = filterOptions || {};
            var form = document.createElement('form');
            form.className = 'filter-form';
            form.setAttribute('aria-label', 'Filter events');

            // City filter
            var cityGroup = document.createElement('section');
            cityGroup.className = 'filter-group filter-group-city';
            var cityHeading = document.createElement('h2');
            cityHeading.className = 'filter-group-title';
            cityHeading.textContent = 'City';
            cityGroup.appendChild(cityHeading);

            var cityLabel = document.createElement('label');
            cityLabel.setAttribute('for', 'filterCitySelect');
            cityLabel.textContent = 'Choose a city';
            cityGroup.appendChild(cityLabel);

            var citySelect = document.createElement('select');
            citySelect.id = 'filterCitySelect';
            citySelect.name = 'cityId';
            citySelect.setAttribute('data-action', 'filter-city');

            var cityDefaultOption = document.createElement('option');
            cityDefaultOption.value = '';
            cityDefaultOption.textContent = 'All cities';
            citySelect.appendChild(cityDefaultOption);

            var cityMap = {};
            function addCityList(list) {
                if (!Array.isArray(list)) return;
                list.forEach(function(city) {
                    if (city && city.id && !cityMap[city.id]) {
                        cityMap[city.id] = city;
                    }
                });
            }

            addCityList(fo.cities);
            addCityList(cities);

            var cityIds = Object.keys(cityMap);
            cityIds.sort(function(a, b) {
                var nameA = (cityMap[a].name || '').toLowerCase();
                var nameB = (cityMap[b].name || '').toLowerCase();
                if (nameA < nameB) return -1;
                if (nameA > nameB) return 1;
                return 0;
            });

            cityIds.forEach(function(id) {
                var city = cityMap[id];
                var opt = document.createElement('option');
                opt.value = city.id;
                opt.textContent = city.name || '';
                citySelect.appendChild(opt);
            });

            if (state.cityId) {
                citySelect.value = state.cityId;
            }

            cityGroup.appendChild(citySelect);
            form.appendChild(cityGroup);

            // Date range filter
            var dateGroup = document.createElement('section');
            dateGroup.className = 'filter-group filter-group-date';
            var dateHeading = document.createElement('h2');
            dateHeading.className = 'filter-group-title';
            dateHeading.textContent = 'Date';
            dateGroup.appendChild(dateHeading);

            var dateFromLabel = document.createElement('label');
            dateFromLabel.setAttribute('for', 'filterDateFrom');
            dateFromLabel.textContent = 'From';
            dateGroup.appendChild(dateFromLabel);

            var dateFromInput = document.createElement('input');
            dateFromInput.type = 'date';
            dateFromInput.id = 'filterDateFrom';
            dateFromInput.name = 'dateFrom';
            dateFromInput.setAttribute('data-action', 'filter-date-from');
            if (state.dateFrom) {
                dateFromInput.value = state.dateFrom;
            }
            dateGroup.appendChild(dateFromInput);

            var dateToLabel = document.createElement('label');
            dateToLabel.setAttribute('for', 'filterDateTo');
            dateToLabel.textContent = 'To';
            dateGroup.appendChild(dateToLabel);

            var dateToInput = document.createElement('input');
            dateToInput.type = 'date';
            dateToInput.id = 'filterDateTo';
            dateToInput.name = 'dateTo';
            dateToInput.setAttribute('data-action', 'filter-date-to');
            if (state.dateTo) {
                dateToInput.value = state.dateTo;
            }
            dateGroup.appendChild(dateToInput);

            form.appendChild(dateGroup);

            // Time filter
            var timeGroup = document.createElement('section');
            timeGroup.className = 'filter-group filter-group-time';
            var timeHeading = document.createElement('h2');
            timeHeading.className = 'filter-group-title';
            timeHeading.textContent = 'Time';
            timeGroup.appendChild(timeHeading);

            var presetLabel = document.createElement('label');
            presetLabel.setAttribute('for', 'filterTimePreset');
            presetLabel.textContent = 'Time window';
            timeGroup.appendChild(presetLabel);

            var timePresetSelect = document.createElement('select');
            timePresetSelect.id = 'filterTimePreset';
            timePresetSelect.name = 'timePreset';
            timePresetSelect.setAttribute('data-action', 'filter-time-preset');

            var presetDefault = document.createElement('option');
            presetDefault.value = '';
            presetDefault.textContent = 'Any time';
            timePresetSelect.appendChild(presetDefault);

            if (Array.isArray(fo.time_window_presets)) {
                fo.time_window_presets.forEach(function(preset) {
                    if (!preset || !preset.key) return;
                    var opt = document.createElement('option');
                    opt.value = preset.key;
                    opt.textContent = preset.label || preset.key;
                    timePresetSelect.appendChild(opt);
                });
            }

            timeGroup.appendChild(timePresetSelect);

            var timeFromLabel = document.createElement('label');
            timeFromLabel.setAttribute('for', 'filterTimeFrom');
            timeFromLabel.textContent = 'Start time';
            timeGroup.appendChild(timeFromLabel);

            var timeFromInput = document.createElement('input');
            timeFromInput.type = 'time';
            timeFromInput.id = 'filterTimeFrom';
            timeFromInput.name = 'timeFrom';
            timeFromInput.setAttribute('data-action', 'filter-time-from');
            if (state.timeFrom) {
                timeFromInput.value = state.timeFrom;
            }
            timeGroup.appendChild(timeFromInput);

            var timeToLabel = document.createElement('label');
            timeToLabel.setAttribute('for', 'filterTimeTo');
            timeToLabel.textContent = 'End time';
            timeGroup.appendChild(timeToLabel);

            var timeToInput = document.createElement('input');
            timeToInput.type = 'time';
            timeToInput.id = 'filterTimeTo';
            timeToInput.name = 'timeTo';
            timeToInput.setAttribute('data-action', 'filter-time-to');
            if (state.timeTo) {
                timeToInput.value = state.timeTo;
            }
            timeGroup.appendChild(timeToInput);

            form.appendChild(timeGroup);

            // Price filter
            var priceGroup = document.createElement('section');
            priceGroup.className = 'filter-group filter-group-price';
            var priceHeading = document.createElement('h2');
            priceHeading.className = 'filter-group-title';
            priceHeading.textContent = 'Price range';
            priceGroup.appendChild(priceHeading);

            var priceRange = fo.price_range || {};

            var minPriceLabel = document.createElement('label');
            minPriceLabel.setAttribute('for', 'filterMinPrice');
            minPriceLabel.textContent = 'Min price';
            priceGroup.appendChild(minPriceLabel);

            var minPriceInput = document.createElement('input');
            minPriceInput.type = 'number';
            minPriceInput.id = 'filterMinPrice';
            minPriceInput.name = 'minPrice';
            minPriceInput.setAttribute('data-action', 'filter-price-min');
            if (typeof priceRange.min_price === 'number') {
                minPriceInput.min = String(priceRange.min_price);
                minPriceInput.placeholder = String(priceRange.min_price);
            }
            if (typeof priceRange.max_price === 'number') {
                minPriceInput.max = String(priceRange.max_price);
            }
            if (typeof state.minPrice === 'number') {
                minPriceInput.value = String(state.minPrice);
            }
            priceGroup.appendChild(minPriceInput);

            var maxPriceLabel = document.createElement('label');
            maxPriceLabel.setAttribute('for', 'filterMaxPrice');
            maxPriceLabel.textContent = 'Max price';
            priceGroup.appendChild(maxPriceLabel);

            var maxPriceInput = document.createElement('input');
            maxPriceInput.type = 'number';
            maxPriceInput.id = 'filterMaxPrice';
            maxPriceInput.name = 'maxPrice';
            maxPriceInput.setAttribute('data-action', 'filter-price-max');
            if (typeof priceRange.min_price === 'number') {
                maxPriceInput.min = String(priceRange.min_price);
            }
            if (typeof priceRange.max_price === 'number') {
                maxPriceInput.max = String(priceRange.max_price);
                maxPriceInput.placeholder = String(priceRange.max_price);
            }
            if (typeof state.maxPrice === 'number') {

        function renderResultsSummary(container, searchResponse, state) {

            } else {
                var startIdx = (page - 1) * pageSize + 1;
                var endIdx = startIdx + (Array.isArray(searchResponse.events) ? searchResponse.events.length : 0) - 1;
                if (endIdx < startIdx) endIdx = startIdx;
                var categoryLabel = CATEGORY_LABELS[state.categoryId] || 'Events';

                if (cityName) {

            if (state.dateFrom || state.dateTo) {

                if (state.dateTo) {
                    dateLabel += ' – ' + state.dateTo;
                }
                filtersSummaryParts.push(dateLabel);
            }

            if (state.timeFrom || state.timeTo) {
                var timeLabel = 'Time: ';
                timeLabel += state.timeFrom ? state.timeFrom : '';
                if (state.timeTo) {
                    timeLabel += ' – ' + state.timeTo;
                }
                filtersSummaryParts.push(timeLabel);
            }

            if (typeof state.minPrice === 'number' || typeof state.maxPrice === 'number') {
                var priceLabel = 'Price: ';
                if (typeof state.minPrice === 'number') {
                    priceLabel += 'from ' + state.minPrice;
                }
                if (typeof state.maxPrice === 'number') {
                    priceLabel += (typeof state.minPrice === 'number' ? ' ' : '') + 'up to ' + state.maxPrice;
                }
                filtersSummaryParts.push(priceLabel);
            }

            if (typeof state.minRating === 'number') {
                filtersSummaryParts.push('Rating: ' + state.minRating + '+');
            }

            if (Array.isArray(state.genreTags) && state.genreTags.length) {
                filtersSummaryParts.push('Tags: ' + state.genreTags.join(', '));
            }

            if (state.isFamilyFriendly === true) {
                filtersSummaryParts.push('Family-friendly only');
            }

            if (state.sportType) {
                filtersSummaryParts.push('Sport: ' + state.sportType);
            }

            if (state.isHomeGame === true) {
                filtersSummaryParts.push('Home games only');

        function renderPagination(container, searchResponse, state) {
            if (!container) return;
            container.innerHTML = '';

            if (!searchResponse || searchResponse.error) return;

            var total = typeof searchResponse.total_results === 'number' ? searchResponse.total_results : 0;
            var pageSize = typeof searchResponse.page_size === 'number' ? searchResponse.page_size : state.pageSize;
            var currentPage = typeof searchResponse.page === 'number' ? searchResponse.page : 1;

            if (!total || total <= pageSize) {
                return;
            }

            var totalPages = Math.ceil(total / pageSize);

            var list = document.createElement('div');
            list.className = 'pagination-list';

            if (currentPage > 1) {
                var prevButton = document.createElement('button');
                prevButton.type = 'button';
                prevButton.className = 'pagination-prev';
                prevButton.setAttribute('data-action', 'go-page');
                prevButton.setAttribute('data-page', String(currentPage - 1));
                prevButton.textContent = 'Previous';
                list.appendChild(prevButton);
            }

            var startPage = Math.max(1, currentPage - 2);
            var endPage = Math.min(totalPages, currentPage + 2);
            if (currentPage <= 3) {
                startPage = 1;
                endPage = Math.min(totalPages, 5);
            } else if (currentPage >= totalPages - 2) {
                endPage = totalPages;
                startPage = Math.max(1, totalPages - 4);
            }

            for (var p = startPage; p <= endPage; p += 1) {
                var pageButton = document.createElement('button');
                pageButton.type = 'button';
                pageButton.className = 'pagination-page';
                pageButton.setAttribute('data-action', 'go-page');
                pageButton.setAttribute('data-page', String(p));
                pageButton.textContent = String(p);
                if (p === currentPage) {
                    pageButton.classList.add('is-active');
                    pageButton.setAttribute('aria-current', 'page');
                }
                list.appendChild(pageButton);
            }

            if (currentPage < totalPages) {
                var nextButton = document.createElement('button');
                nextButton.type = 'button';
                nextButton.className = 'pagination-next';
                nextButton.setAttribute('data-action', 'go-page');
                nextButton.setAttribute('data-page', String(currentPage + 1));
                nextButton.textContent = 'Next';
                list.appendChild(nextButton);
            }

            container.appendChild(list);
        }

        function loadFiltersAndResults() {
            var loader = document.querySelector('[data-component="initial-data-loader"]');
            if (loader) {
                loader.hidden = false;
            }

            var filtersContainer = document.querySelector('[data-populate="event-filters"]');
            var resultsContainer = document.querySelector('[data-populate="search-results"]');
            var summaryContainer = document.querySelector('[data-component="results-summary-bar"]');
            var paginationContainer = document.querySelector('[data-component="pagination-controls"]');

            var categoryKey = eventsPage.state.categoryId || 'all';
            var query = eventsPage.state.query || undefined;

            try {
                var filterOptions = WebsiteSDK.getEventFilterOptions(categoryKey, query);
                eventsPage.filterOptions = filterOptions || {};
            } catch (e) {
                eventsPage.filterOptions = {};
            }

            try {
                var cities = WebsiteSDK.getCities();
                eventsPage.cities = Array.isArray(cities) ? cities : [];
            } catch (e2) {
                eventsPage.cities = [];
            }

            renderFilterPanel(filtersContainer, eventsPage.state, eventsPage.filterOptions, eventsPage.cities);

            var s = eventsPage.state;
            var genreTagsArray = Array.isArray(s.genreTags) && s.genreTags.length ? s.genreTags : undefined;

            var searchResponse;
            try {
                searchResponse = WebsiteSDK.searchEvents(
                    s.query || undefined,
                    categoryKey,
                    s.cityId || undefined,
                    s.dateFrom || undefined,
                    s.dateTo || undefined,
                    s.timeFrom || undefined,
                    s.timeTo || undefined,
                    typeof s.minPrice === 'number' ? s.minPrice : undefined,
                    typeof s.maxPrice === 'number' ? s.maxPrice : undefined,
                    typeof s.minRating === 'number' ? s.minRating : undefined,
                    genreTagsArray,
                    typeof s.isFamilyFriendly === 'boolean' ? s.isFamilyFriendly : undefined,
                    s.sportType || undefined,
                    typeof s.isHomeGame === 'boolean' ? s.isHomeGame : undefined,
                    s.sortBy || undefined,
                    typeof s.page === 'number' ? s.page : undefined,
                    typeof s.pageSize === 'number' ? s.pageSize : undefined
                );
            } catch (e3) {
                searchResponse = { total_results: 0, page: 1, page_size: s.pageSize || 20, events: [], error: true };
            }

            eventsPage.searchResults = searchResponse;

            renderEventResults(resultsContainer, searchResponse);
            renderResultsSummary(summaryContainer, searchResponse, eventsPage.state);
            renderPagination(paginationContainer, searchResponse, eventsPage.state);

            if (loader) {
                loader.hidden = true;
            }
        }

        function handleSubmitAction(actionEl, event) {
            var action = actionEl.getAttribute('data-action');
            if (action === 'submit-search') {
                event.preventDefault();
                var form = actionEl;
                var input = form.querySelector('input[name="query"]');
                var value = input ? input.value.trim() : '';
                var changes = { query: value || null };
                applyStateChanges(changes, { resetPage: true });
            }
        }

        function handleChangeAction(actionEl, event) {
            var action = actionEl.getAttribute('data-action');

            if (action === 'filter-city') {
                var cityId = actionEl.value || null;
                applyStateChanges({ cityId: cityId }, { resetPage: true });
                return;
            }

            if (action === 'filter-date-from') {
                var dateFrom = actionEl.value || null;
                var dateToCurrent = eventsPage.state.dateTo || null;
                if (dateFrom && dateToCurrent && dateFrom > dateToCurrent) {
                    dateToCurrent = dateFrom;
                }
                applyStateChanges({ dateFrom: dateFrom, dateTo: dateToCurrent }, { resetPage: true });
                return;
            }

            if (action === 'filter-date-to') {
                var dateTo = actionEl.value || null;
                var dateFromCurrent = eventsPage.state.dateFrom || null;
                if (dateFromCurrent && dateTo && dateTo < dateFromCurrent) {
                    dateFromCurrent = dateTo;
                }
                applyStateChanges({ dateFrom: dateFromCurrent, dateTo: dateTo }, { resetPage: true });
                return;
            }

            if (action === 'filter-time-preset') {
                var key = actionEl.value;
                var timeFrom = null;
                var timeTo = null;
                if (key && eventsPage.filterOptions && Array.isArray(eventsPage.filterOptions.time_window_presets)) {
                    eventsPage.filterOptions.time_window_presets.forEach(function(preset) {
                        if (preset && preset.key === key) {
                            timeFrom = preset.start_time || null;
                            timeTo = preset.end_time || null;
                        }
                    });
                }
                applyStateChanges({ timeFrom: timeFrom, timeTo: timeTo }, { resetPage: true });
                return;
            }

            if (action === 'filter-time-from') {
                var tf = actionEl.value || null;
                applyStateChanges({ timeFrom: tf }, { resetPage: true });
                return;
            }

            if (action === 'filter-time-to') {
                var tt = actionEl.value || null;
                applyStateChanges({ timeTo: tt }, { resetPage: true });
                return;
            }

            if (action === 'filter-price-min') {
                var rawMin = actionEl.value;
                var minVal = null;
                if (rawMin !== '') {
                    var parsedMin = Number(rawMin);
                    if (!Number.isNaN(parsedMin)) {
                        minVal = parsedMin;
                    }
                }
                var priceRange = eventsPage.filterOptions && eventsPage.filterOptions.price_range ? eventsPage.filterOptions.price_range : null;
                if (minVal !== null && priceRange) {
                    if (typeof priceRange.min_price === 'number' && minVal < priceRange.min_price) {
                        minVal = priceRange.min_price;
                    }
                    if (typeof priceRange.max_price === 'number' && minVal > priceRange.max_price) {
                        minVal = priceRange.max_price;
                    }
                }
                applyStateChanges({ minPrice: minVal }, { resetPage: true });
                return;
            }

            if (action === 'filter-price-max') {
                var rawMax = actionEl.value;
                var maxVal = null;
                if (rawMax !== '') {
                    var parsedMax = Number(rawMax);
                    if (!Number.isNaN(parsedMax)) {
                        maxVal = parsedMax;
                    }
                }
                var priceRangeMax = eventsPage.filterOptions && eventsPage.filterOptions.price_range ? eventsPage.filterOptions.price_range : null;
                if (maxVal !== null && priceRangeMax) {
                    if (typeof priceRangeMax.min_price === 'number' && maxVal < priceRangeMax.min_price) {
                        maxVal = priceRangeMax.min_price;
                    }
                    if (typeof priceRangeMax.max_price === 'number' && maxVal > priceRangeMax.max_price) {
                        maxVal = priceRangeMax.max_price;
                    }
                }
                applyStateChanges({ maxPrice: maxVal }, { resetPage: true });
                return;
            }

            if (action === 'filter-min-rating') {
                var ratingVal = actionEl.value;
                var ratingNumber = null;
                if (ratingVal) {
                    var parsedRating = Number(ratingVal);
                    if (!Number.isNaN(parsedRating)) {
                        ratingNumber = parsedRating;
                    }
                }
                applyStateChanges({ minRating: ratingNumber }, { resetPage: true });
                return;
            }

            if (action === 'toggle-genre-tag') {
                var tag = actionEl.getAttribute('data-tag');
                var checked = actionEl.checked;
                var currentTags = Array.isArray(eventsPage.state.genreTags) ? eventsPage.state.genreTags.slice() : [];
                if (checked) {
                    if (currentTags.indexOf(tag) === -1) {
                        currentTags.push(tag);
                    }
                } else {
                    currentTags = currentTags.filter(function(t) { return t !== tag; });
                }
                var newTags = currentTags.length ? currentTags : null;
                applyStateChanges({ genreTags: newTags }, { resetPage: true });
                return;
            }

            if (action === 'toggle-family-friendly') {
                var isChecked = actionEl.checked;
                applyStateChanges({ isFamilyFriendly: isChecked ? true : null }, { resetPage: true });
                return;
            }

            if (action === 'filter-sport-type') {
                var sportVal = actionEl.value || null;
                applyStateChanges({ sportType: sportVal }, { resetPage: true });
                return;
            }

            if (action === 'filter-home-away') {
                var keyVal = actionEl.value || '';
                var isHomeGame = null;
                if (keyVal === 'home_only') {
                    isHomeGame = true;
                } else if (keyVal === 'all_games' || keyVal === '') {
                    isHomeGame = null;
                }
                applyStateChanges({ isHomeGame: isHomeGame }, { resetPage: true });
                return;
            }

            if (action === 'change-sort') {
                var sortVal = actionEl.value || null;
                applyStateChanges({ sortBy: sortVal }, { resetPage: true });
                return;
            }

            if (action === 'change-page-size') {
                var sizeValRaw = actionEl.value;
                var pageSize = null;
                if (sizeValRaw) {
                    var parsedSize = parseInt(sizeValRaw, 10);
                    if (!Number.isNaN(parsedSize) && parsedSize > 0) {
                        pageSize = parsedSize;
                    }
                }
                applyStateChanges({ pageSize: pageSize }, { resetPage: true });
                return;
            }
        }

        function handleClickAction(actionEl, event) {
            var action = actionEl.getAttribute('data-action');

            if (action === 'open-cart') {
                event.preventDefault();
                window.location.href = 'cart.html';
                return;
            }

            if (action === 'open-profile') {
                event.preventDefault();
                window.location.href = 'profile.html';
                return;
            }

            if (action === 'clear-filters') {
                event.preventDefault();
                var cleared = {
                    cityId: null,
                    dateFrom: null,
                    dateTo: null,
                    timeFrom: null,
                    timeTo: null,
                    minPrice: null,
                    maxPrice: null,
                    minRating: null,
                    genreTags: null,
                    isFamilyFriendly: null,
                    sportType: null,
                    isHomeGame: null
                };
                applyStateChanges(cleared, { resetPage: true });
                return;
            }

            if (action === 'go-page') {
                event.preventDefault();
                var pageAttr = actionEl.getAttribute('data-page');
                var targetPage = parseInt(pageAttr, 10);
                if (!Number.isNaN(targetPage) && targetPage > 0) {
                    applyStateChanges({ page: targetPage }, { resetPage: false });
                }
                return;
            }

            if (action === 'open-event' || action === 'open-event-new-tab') {
                event.preventDefault();
                var eventId = actionEl.getAttribute('data-event-id');
                if (!eventId && actionEl.closest('.event-card')) {
                    eventId = actionEl.closest('.event-card').getAttribute('data-event-id');
                }
                if (!eventId) return;
                var url = 'event_detail.html?eventId=' + encodeURIComponent(eventId);
                if (action === 'open-event-new-tab') {
                    window.open(url, '_blank');
                } else {
                    window.location.href = url;
                }
                return;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            eventsPage.state = parseUrlState();

            initHeaderData();
            initSearchBar(eventsPage.state);
            initSortAndPageSize(eventsPage.state);
            loadFiltersAndResults();
        });

        document.addEventListener('submit', function(event) {
            var actionEl = event.target.closest('[data-action]');
            if (!actionEl) return;
            handleSubmitAction(actionEl, event);
        });

        document.addEventListener('change', function(event) {
            var target = event.target;
            if (!target) return;
            var actionEl = target.closest('[data-action]');
            if (!actionEl) return;
            handleChangeAction(actionEl, event);
        });

        document.addEventListener('click', function(event) {
            var target = event.target;
            if (!target) return;
            var actionEl = target.closest('[data-action]');
            if (!actionEl) return;
            handleClickAction(actionEl, event);
        });
    })();
    </script>
</body>
</html>
