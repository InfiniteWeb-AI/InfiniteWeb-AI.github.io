<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Turn Up Talent - Recruitment Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Typography from design: Space Grotesk for headings, Source Sans 3 for body, Source Code Pro for code -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500&amp;display=swap" rel="stylesheet">

  <!-- Main stylesheet -->
  
  <!-- Job detail page-specific stylesheet -->
  <link rel="stylesheet" href="job_detail.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <a href="index.html" class="brand" aria-label="Turn Up Talent home">
        <span class="brand-mark" aria-hidden="true">T</span>
        <span class="brand-text" aria-hidden="true">
          <span class="brand-line brand-line-top">TURN</span>
          <span class="brand-line brand-line-middle">UP</span>
          <span class="brand-line brand-line-bottom">TALENT</span>
        </span>
      </a>

      <nav class="primary-nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="jobs.html" class="nav-link">Find Jobs</a></li>
          <li class="nav-item"><a href="saved_jobs.html" class="nav-link">Saved Jobs</a></li>
          <li class="nav-item"><a href="job_alerts.html" class="nav-link">Job Alerts</a></li>
          <li class="nav-item"><a href="compare_jobs.html" class="nav-link">Compare Jobs</a></li>
          <li class="nav-item"><a href="help.html" class="nav-link">Help</a></li>
        </ul>
      </nav>

      <a href="contact.html" class="header-cta">Connect with us</a>
    </div>
  </header>

  <main id="content" class="page-content" role="main">
    <div class="content-inner container">
      <div class="job-detail-page" data-component="job-page-state-manager">
        <!-- Global status / error messaging -->
        <div id="jobDetailStatus" class="job-detail-global-status" role="status" aria-live="polite"></div>

        <!-- Data loader overlay -->
        <div class="job-detail-loader is-hidden" data-component="job-detail-data-loader" aria-hidden="true">
          <div class="job-detail-loader-backdrop"></div>
          <div class="job-detail-loader-inner" role="status" aria-label="Loading job details">
            <div class="job-detail-spinner" aria-hidden="true"></div>
            <p class="job-detail-loader-text">Loading job details</p>
          </div>
        </div>

        <!-- Breadcrumb / contextual navigation -->
        <nav class="job-breadcrumb-navigation" data-component="job-breadcrumb-navigation" data-populate="breadcrumb" aria-label="Job navigation">
          <!-- Filled by JS -->
        </nav>

        <article class="job-detail" aria-label="Job detail">
          <!-- Job header: title, employer, meta, quick apply CTA -->
          <header class="job-header-section" data-component="job-header" data-populate="job-header">
            <!-- Filled by JS -->
          </header>

          <!-- Save / compare action bar -->
          <section class="job-save-compare-section" data-component="job-save-and-compare-controls" data-populate="job-save-compare-bar">
            <!-- Filled by JS -->
          </section>

          <hr class="job-section-divider" aria-hidden="true">

          <!-- Compensation & benefits -->
          <section class="job-compensation-section" data-component="job-compensation-and-benefits" data-populate="job-compensation">
            <!-- Filled by JS -->
          </section>

          <!-- Description, responsibilities, qualifications -->
          <section class="job-description-section" data-component="job-description-section" data-populate="job-description">
            <!-- Filled by JS -->
          </section>

          <!-- Quick Apply form (when allowed) -->
          <section class="job-quick-apply-section is-collapsed" data-component="job-quick-apply-form" data-populate="job-quick-apply">
            <!-- Filled by JS -->
          </section>

          <!-- Personal note editor -->
          <section class="job-note-section" data-component="job-note-editor" data-populate="job-note">
            <!-- Filled by JS -->
          </section>

          <!-- Email this job / send to a friend -->
          <section class="job-email-share-section" data-component="job-email-share" data-populate="job-email-share">
            <!-- Filled by JS -->
          </section>
        </article>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <nav class="footer-nav" aria-label="Footer navigation">
        <ul class="footer-links">
          <li class="footer-item"><a href="about.html" class="footer-link">About</a></li>
          <li class="footer-item"><a href="contact.html" class="footer-link">Contact</a></li>
          <li class="footer-item"><a href="help.html" class="footer-link">Help / FAQ</a></li>
          <li class="footer-item"><a href="jobs.html" class="footer-link">Browse Jobs</a></li>
          <li class="footer-item"><a href="terms.html" class="footer-link">Terms of Use</a></li>
          <li class="footer-item"><a href="privacy.html" class="footer-link">Privacy Policy</a></li>
          <li class="footer-item"><a href="cookies.html" class="footer-link">Cookie Policy</a></li>
        </ul>
      </nav>
      <div class="footer-meta">
        <p class="copyright">&copy; 2026 Turn Up Talent. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- SDK / business logic interfaces -->
  <script src="business_logic.js"></script>

  <!-- Page UI wiring script -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // Central page state
    const pageState = {
      url: parseUrlParams(),
      job: null,
      employer: null,
      location: null,
      isSaved: false,
      isInCompareSet: false,
      note: null,
      compareSummary: { compare_set_id: null, job_ids: [], count: 0 },
      quickApplication: { lastStatus: null, lastMessage: '' },
      emailShare: { lastStatus: null, lastMessage: '' }
    };

    const globalStatusEl = document.getElementById('jobDetailStatus');

    // ---------- Helpers ----------
    function parseUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || '';
      const from = params.get('from') || '';
      const q = params.get('q') || '';
      const loc = params.get('loc') || '';
      const page = params.get('page') || '';
      return { id, from, q, loc, page };
    }

    function setLoading(isLoading) {
      const loader = document.querySelector('.job-detail-loader');
      if (!loader) return;
      if (isLoading) {
        loader.classList.remove('is-hidden');
        loader.setAttribute('aria-hidden', 'false');
      } else {
        loader.classList.add('is-hidden');
        loader.setAttribute('aria-hidden', 'true');
      }
    }

    function setStatus(message, type) {
      if (!globalStatusEl) return;
      globalStatusEl.textContent = message || '';
      globalStatusEl.className = 'job-detail-global-status';
      if (!message) return;
      if (type) {
        globalStatusEl.classList.add('status-' + type);
      }
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return '';
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatMultilineText(value) {
      if (!value) return '';
      const escaped = escapeHtml(value);
      return escaped.replace(/\r\n|\n\r|\n|\r/g, '<br>');
    }

    function formatCurrencyAmount(amount, currency) {
      if (amount === null || amount === undefined || isNaN(Number(amount))) return '';
      const num = Number(amount);
      if (currency === 'usd' || !currency) {
        return '$' + num.toLocaleString(undefined, { maximumFractionDigits: 0 });
      }
      return num.toLocaleString();
    }

    function formatDate(value) {
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function mapJobType(value) {
      switch (value) {
        case 'full_time': return 'Full-time';
        case 'part_time': return 'Part-time';
        case 'contract': return 'Contract';
        case 'temporary': return 'Temporary';
        case 'internship': return 'Internship';
        case 'other': return 'Other';
        default: return 'Not specified';
      }
    }

    function mapExperience(value) {
      switch (value) {
        case 'entry_level': return 'Entry level';
        case 'mid_level': return 'Mid level';
        case 'senior_level': return 'Senior level';
        case 'management': return 'Management';
        case 'director': return 'Director';
        case 'executive': return 'Executive';
        case 'other': return 'Other';
        default: return 'Not specified';
      }
    }

    function mapIndustry(value) {
      switch (value) {
        case 'technology': return 'Technology';
        case 'marketing': return 'Marketing';
        case 'healthcare': return 'Healthcare';
        case 'customer_support': return 'Customer support';
        case 'finance': return 'Finance';
        case 'operations': return 'Operations';
        case 'project_management': return 'Project management';
        case 'design': return 'Design';
        case 'data_analytics': return 'Data analytics';
        case 'other': return 'Other';
        default: return 'Not specified';
      }
    }

    function mapWorkArrangement(value) {
      switch (value) {
        case 'on_site': return 'On-site';
        case 'remote_only': return 'Remote';
        case 'remote_hybrid': return 'Remote / Hybrid';
        default: return 'Not specified';
      }
    }

    function mapSchedule(value) {
      switch (value) {
        case 'standard': return 'Standard schedule';
        case 'weekends_only': return 'Weekends only';
        case 'weekdays_only': return 'Weekdays only';
        case 'nights': return 'Nights';
        case 'flexible': return 'Flexible schedule';
        case 'shift_work': return 'Shift work';
        case 'other': return 'Other';
        default: return 'Not specified';
      }
    }

    // ---------- Render functions (data-populate driven) ----------
    function renderBreadcrumb(container, state) {
      const from = state.url.from || '';
      let backLabel = 'Back to job search';
      if (from === 'jobs') backLabel = 'Back to search results';
      else if (from === 'saved') backLabel = 'Back to saved jobs';
      else if (from === 'compare') backLabel = 'Back to comparison';

      const count = state.compareSummary && typeof state.compareSummary.count === 'number'
        ? state.compareSummary.count
        : 0;
      const disabledAttr = count > 0 ? '' : 'disabled';

      container.innerHTML = `
        <div class="job-breadcrumb-row">
          <div class="job-breadcrumb-left">
            <button type="button" class="breadcrumb-back-link" data-action="back-to-origin">
              ${escapeHtml(backLabel)}
            </button>
          </div>
          <div class="job-breadcrumb-right">
            <button type="button" class="breadcrumb-secondary-link" data-action="view-saved-jobs">
              Saved jobs
            </button>
            <button type="button" class="breadcrumb-compare-button" data-action="view-comparison" ${disabledAttr}>
              Compare (${count})
            </button>
          </div>
        </div>
      `;
    }

    function renderJobHeader(container, state) {
      const job = state.job;
      if (!job) {
        container.innerHTML = `
          <div class="job-header-inner">
            <h1 class="job-title">Job not found</h1>
            <p class="job-subtitle">We couldn't find the job you're looking for. Try returning to the job search.</p>
          </div>
          <hr class="job-header-divider" aria-hidden="true">
        `;
        return;
      }

      const employerName = state.employer && state.employer.name
        ? state.employer.name
        : 'Confidential employer';
      const locationName = state.location && state.location.display_name
        ? state.location.display_name
        : 'Location not specified';

      const jobTypeLabel = mapJobType(job.job_type);
      const experienceLabel = mapExperience(job.experience_level);
      const industryLabel = mapIndustry(job.industry);
      const workArrangementLabel = mapWorkArrangement(job.work_arrangement);
      const scheduleLabel = mapSchedule(job.schedule);
      const postedDateLabel = job.posted_date ? formatDate(job.posted_date) : '';
      const deadlineLabel = job.application_deadline ? formatDate(job.application_deadline) : '';

      container.dataset.jobId = job.id || '';
      container.dataset.jobType = job.job_type || '';
      container.dataset.industry = job.industry || '';
      container.dataset.experienceLevel = job.experience_level || '';
      container.dataset.workArrangement = job.work_arrangement || '';
      container.dataset.schedule = job.schedule || '';

      const quickApplyCta = job.allow_quick_apply
        ? `<button type="button" class="btn btn-primary job-header-quick-apply" data-action="open-quick-apply">Quick Apply</button>`
        : '';

      const deadlineHtml = deadlineLabel
        ? `<span class="job-meta-item job-meta-deadline">Apply by ${escapeHtml(deadlineLabel)}</span>`
        : '';

      const remoteTagline = job.remote_tagline ? `<span class="job-meta-item job-meta-remote">${escapeHtml(job.remote_tagline)}</span>` : '';

      container.innerHTML = `
        <div class="job-header-inner">
          <div class="job-header-main">
            <h1 class="job-title">${escapeHtml(job.title || 'Untitled role')}</h1>
            <div class="job-meta-row">
              <span class="job-meta-item job-meta-employer">${escapeHtml(employerName)}</span>
              <span class="job-meta-separator" aria-hidden="true">b7</span>
              <span class="job-meta-item job-meta-location">${escapeHtml(locationName)}</span>
              ${remoteTagline}
            </div>
            <div class="job-meta-row job-meta-row-secondary">
              ${postedDateLabel ? `<span class="job-meta-item job-meta-posted">Posted ${escapeHtml(postedDateLabel)}</span>` : ''}
              ${deadlineHtml}
              <span class="job-meta-item job-meta-experience">${escapeHtml(experienceLabel)}</span>
              <span class="job-meta-item job-meta-industry">${escapeHtml(industryLabel)}</span>
              <span class="job-meta-item job-meta-work-arrangement">${escapeHtml(workArrangementLabel)}</span>
              <span class="job-meta-item job-meta-schedule">${escapeHtml(scheduleLabel)}</span>
            </div>
          </div>
          <div class="job-header-side">
            <span class="job-type-pill job-type-${escapeHtml(job.job_type || 'other')}">
              ${escapeHtml(jobTypeLabel)}
            </span>
            ${quickApplyCta}
          </div>
        </div>
        <hr class="job-header-divider" aria-hidden="true">
      `;
    }

    function renderJobSaveCompareBar(container, state) {
      const job = state.job;
      if (!job) {
        container.innerHTML = '';
        return;
      }
      const isSaved = !!state.isSaved;
      const isInCompare = !!state.isInCompareSet;
      const compareCount = state.compareSummary && typeof state.compareSummary.count === 'number'
        ? state.compareSummary.count
        : 0;

      const saveLabel = isSaved ? 'Unsave job' : 'Save job';
      const compareLabel = isInCompare ? 'Remove from comparison' : 'Add to comparison';

      container.innerHTML = `
        <div class="job-action-bar">
          <div class="job-action-main">
            <button type="button" class="btn btn-secondary job-action-save" data-action="toggle-save" aria-pressed="${isSaved}">
              ${escapeHtml(saveLabel)}
            </button>
            <button type="button" class="btn btn-tertiary job-action-compare" data-action="toggle-compare" aria-pressed="${isInCompare}">
              ${escapeHtml(compareLabel)}
            </button>
          </div>
          <div class="job-action-secondary">
            <button type="button" class="link-like-button job-action-view-saved" data-action="view-saved-jobs">
              View all saved jobs
            </button>
            <button type="button" class="link-like-button job-action-view-compare" data-action="view-comparison" ${compareCount > 0 ? '' : 'disabled'}>
              View comparison (${compareCount})
            </button>
          </div>
        </div>
      `;
    }

    function renderJobCompensation(container, state) {
      const job = state.job;
      if (!job) {
        container.innerHTML = '';
        return;
      }

      const payTypeLabel = (function() {
        switch (job.pay_type) {
          case 'annual_salary': return 'per year';
          case 'hourly': return 'per hour';
          case 'daily_rate': return 'per day';
          default: return '';
        }
      })();

      const minText = formatCurrencyAmount(job.compensation_min, job.currency);
      const maxText = formatCurrencyAmount(job.compensation_max, job.currency);
      let compText = '';
      if (minText && maxText) {
        compText = `${minText} b7 ${maxText}`;
      } else if (minText) {
        compText = minText;
      } else if (maxText) {
        compText = maxText;
      }
      if (compText && payTypeLabel) {
        compText += ' ' + payTypeLabel;
      }

      const benefitsSummary = job.benefits_summary ? formatMultilineText(job.benefits_summary) : '';
      const vacationDetails = job.vacation_details || (job.vacation_days ? `${job.vacation_days} days PTO` : '');
      const parkingDetails = job.parking_available
        ? (job.parking_details || 'Parking available')
        : (job.parking_details || 'Parking not specified');

      container.dataset.payType = job.pay_type || '';

      container.innerHTML = `
        <div class="job-section-inner">
          <h2 class="job-section-title">Compensation &amp; Benefits</h2>
          <div class="job-compensation-grid">
            <div class="job-compensation-main">
              <h3 class="job-compensation-label">Compensation</h3>
              <p class="job-compensation-value">
                ${compText ? escapeHtml(compText) : 'Compensation not specified'}
              </p>
            </div>
            <div class="job-compensation-benefits">
              <h3 class="job-compensation-label">Benefits</h3>
              <p class="job-benefits-summary">
                ${benefitsSummary || 'Benefits information not provided.'}
              </p>
              <ul class="job-benefits-list">
                ${vacationDetails ? `<li class="job-benefit-item"><strong>Vacation &amp; PTO:</strong> ${escapeHtml(vacationDetails)}</li>` : ''}
                ${parkingDetails ? `<li class="job-benefit-item"><strong>Parking:</strong> ${escapeHtml(parkingDetails)}</li>` : ''}
              </ul>
            </div>
          </div>
        </div>
      `;
    }

    function renderJobDescription(container, state) {
      const job = state.job;
      if (!job) {
        container.innerHTML = '';
        return;
      }

      const descriptionHtml = formatMultilineText(job.description || 'No description provided.');
      const responsibilitiesHtml = job.responsibilities
        ? formatMultilineText(job.responsibilities)
        : '';
      const qualificationsHtml = job.qualifications
        ? formatMultilineText(job.qualifications)
        : '';

      container.innerHTML = `
        <div class="job-section-inner">
          <h2 class="job-section-title">Job Description</h2>
          <div class="job-section-body">
            <section class="job-subsection job-subsection-description">
              <p>${descriptionHtml}</p>
            </section>
            <section class="job-subsection job-subsection-responsibilities">
              <h3 class="job-subsection-title">Responsibilities</h3>
              <p>${responsibilitiesHtml || 'Responsibilities not specified.'}</p>
            </section>
            <section class="job-subsection job-subsection-qualifications">
              <h3 class="job-subsection-title">Qualifications</h3>
              <p>${qualificationsHtml || 'Qualifications not specified.'}</p>
            </section>
          </div>
        </div>
      `;
    }

    function renderQuickApply(container, state) {
      const job = state.job;
      if (!job || !job.allow_quick_apply) {
        container.innerHTML = '';
        container.classList.add('is-hidden');
        return;
      }
      container.classList.remove('is-hidden');
      container.classList.add('card');

      container.innerHTML = `
        <div class="job-section-inner">
          <div class="job-section-header">
            <h2 class="job-section-title">Quick Apply</h2>
            <p class="job-section-subtitle">Send your details directly to the recruiter in just a few steps.</p>
          </div>
          <form class="quick-apply-form" data-action="submit-quick-apply" novalidate>
            <div class="form-group">
              <label for="qa-name">Full name<span class="field-required">*</span></label>
              <input type="text" id="qa-name" name="applicant_name" autocomplete="name" required>
            </div>
            <div class="form-group">
              <label for="qa-email">Email address<span class="field-required">*</span></label>
              <input type="email" id="qa-email" name="applicant_email" autocomplete="email" required>
            </div>
            <div class="form-group">
              <label for="qa-phone">Phone number<span class="field-required">*</span></label>
              <input type="tel" id="qa-phone" name="applicant_phone" autocomplete="tel" required>
            </div>
            <div class="form-group">
              <label for="qa-message">Cover message (optional)</label>
              <textarea id="qa-message" name="cover_message" rows="4" placeholder="Add a short note highlighting your fit for this role."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Submit application</button>
            </div>
            <p class="form-status" data-role="quick-apply-status" aria-live="polite"></p>
          </form>
        </div>
      `;
    }

    function renderJobNote(container, state) {
      const job = state.job;
      if (!job) {
        container.innerHTML = '';
        return;
      }

      const note = state.note || { content: '', is_pinned: false, updated_at: '' };
      const updatedText = note.updated_at ? `Last updated ${escapeHtml(formatDate(note.updated_at))}` : '';

      container.classList.add('card');
      container.innerHTML = `
        <div class="job-section-inner">
          <div class="job-section-header">
            <h2 class="job-section-title">Your Notes</h2>
            <p class="job-section-subtitle">Keep track of why this role stands out to you.</p>
          </div>
          <div class="note-editor-body">
            <label for="job-note-text" class="note-label">Personal note</label>
            <textarea id="job-note-text" name="job_note" rows="5" class="note-textarea">${escapeHtml(note.content || '')}</textarea>
            <div class="note-footer-row">
              <label class="note-pin">
                <input type="checkbox" id="job-note-pin" ${note.is_pinned ? 'checked' : ''}>
                <span>Pin this note</span>
              </label>
              <div class="note-footer-meta">
                <span class="note-updated">${updatedText}</span>
                <button type="button" class="btn btn-secondary note-save-button" data-action="save-note">Save note</button>
              </div>
            </div>
            <p class="note-status" data-role="note-status" aria-live="polite"></p>
          </div>
        </div>
      `;
    }

    function renderJobEmailShare(container, state) {
      const job = state.job;
      if (!job || !job.allow_email_share) {
        container.innerHTML = '';
        container.classList.add('is-hidden');
        return;
      }
      container.classList.remove('is-hidden');
      container.classList.add('card');

      container.innerHTML = `
        <div class="job-section-inner">
          <div class="job-section-header">
            <h2 class="job-section-title">Email this job</h2>
            <p class="job-section-subtitle">Send this opportunity to a friend or colleague.</p>
          </div>
          <button type="button" class="btn btn-tertiary email-share-toggle" data-action="open-email-share-form">
            Email this job
          </button>
          <form class="email-share-form is-hidden" data-action="submit-email-share" novalidate>
            <div class="form-group">
              <label for="email-share-recipient">Recipient's email<span class="field-required">*</span></label>
              <input type="email" id="email-share-recipient" name="recipient_email" required>
            </div>
            <div class="form-group">
              <label for="email-share-sender">Your name<span class="field-required">*</span></label>
              <input type="text" id="email-share-sender" name="sender_name" required>
            </div>
            <div class="form-group">
              <label for="email-share-message">Personal message (optional)</label>
              <textarea id="email-share-message" name="message" rows="3" placeholder="Add a short note to include in the email."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Send email</button>
            </div>
            <p class="form-status" data-role="email-share-status" aria-live="polite"></p>
          </form>
        </div>
      `;
    }

    function initializeComponents() {
      const populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        const type = element.dataset.populate;
        if (type === 'breadcrumb') {
          renderBreadcrumb(element, pageState);
        } else if (type === 'job-header') {
          renderJobHeader(element, pageState);
        } else if (type === 'job-save-compare-bar') {
          renderJobSaveCompareBar(element, pageState);
        } else if (type === 'job-compensation') {
          renderJobCompensation(element, pageState);
        } else if (type === 'job-description') {
          renderJobDescription(element, pageState);
        } else if (type === 'job-quick-apply') {
          renderQuickApply(element, pageState);
        } else if (type === 'job-note') {
          renderJobNote(element, pageState);
        } else if (type === 'job-email-share') {
          renderJobEmailShare(element, pageState);
        }
      });
    }

    // ---------- Actions & handlers ----------
    function handleBackNavigation() {
      const from = pageState.url.from;
      if (from === 'jobs') {
        const params = new URLSearchParams();
        if (pageState.url.q) params.set('q', pageState.url.q);
        if (pageState.url.loc) params.set('loc', pageState.url.loc);
        if (pageState.url.page) params.set('page', pageState.url.page);
        const query = params.toString();
        window.location.href = 'jobs.html' + (query ? '?' + query : '');
      } else if (from === 'saved') {
        window.location.href = 'saved_jobs.html';
      } else if (from === 'compare') {
        window.location.href = 'compare_jobs.html';
      } else {
        window.location.href = 'jobs.html';
      }
    }

    function handleToggleSave() {
      if (!pageState.job || !pageState.job.id) return;
      try {
        const result = WebsiteSDK.toggleSavedJob(pageState.job.id, 'job_detail');
        pageState.isSaved = !!(result && result.is_saved);
        if (result && result.message) {
          setStatus(result.message, 'info');
        }
        const bar = document.querySelector('[data-populate="job-save-compare-bar"]');
        if (bar) {
          renderJobSaveCompareBar(bar, pageState);
          bindActionHandlers();
        }
      } catch (error) {
        setStatus('Unable to update saved jobs. Please try again.', 'error');
      }
    }

    function handleToggleCompare() {
      if (!pageState.job || !pageState.job.id) return;
      const jobId = pageState.job.id;
      const inSet = !!pageState.isInCompareSet;
      try {
        let response;
        if (!inSet) {
          let sourcePage = 'other';
          if (pageState.url.from === 'jobs') sourcePage = 'job_search_results';
          else if (pageState.url.from === 'saved') sourcePage = 'saved_jobs';
          response = WebsiteSDK.addJobToCompareSet(jobId, sourcePage);
        } else {
          response = WebsiteSDK.removeJobFromCompareSet(jobId);
        }
        if (response) {
          pageState.compareSummary = {
            compare_set_id: response.compare_set_id || null,
            job_ids: Array.isArray(response.job_ids) ? response.job_ids : [],
            count: typeof response.count === 'number' ? response.count : 0
          };
          pageState.isInCompareSet = pageState.compareSummary.job_ids.indexOf(jobId) !== -1;
        }
        const bar = document.querySelector('[data-populate="job-save-compare-bar"]');
        if (bar) {
          renderJobSaveCompareBar(bar, pageState);
        }
        const breadcrumb = document.querySelector('[data-populate="breadcrumb"]');
        if (breadcrumb) {
          renderBreadcrumb(breadcrumb, pageState);
        }
        bindActionHandlers();
      } catch (error) {
        setStatus('Unable to update comparison. Please try again.', 'error');
      }
    }

    function openQuickApplyForm() {
      const section = document.querySelector('[data-component="job-quick-apply-form"]');
      if (!section) return;
      section.classList.remove('is-collapsed');
      const form = section.querySelector('.quick-apply-form');
      if (form) {
        const nameInput = form.querySelector('input[name="applicant_name"]');
        if (nameInput) {
          nameInput.focus();
        }
      }
    }

    function submitQuickApplyForm(formElement) {
      if (!pageState.job || !pageState.job.id) return;
      if (!formElement) return;
      const statusEl = formElement.querySelector('[data-role="quick-apply-status"]');

      const name = formElement.applicant_name ? formElement.applicant_name.value.trim() : '';
      const email = formElement.applicant_email ? formElement.applicant_email.value.trim() : '';
      const phone = formElement.applicant_phone ? formElement.applicant_phone.value.trim() : '';
      const cover = formElement.cover_message ? formElement.cover_message.value.trim() : '';

      const emailPattern = /.+@.+\..+/;
      const errors = [];
      if (!name) errors.push('Name is required.');
      if (!email || !emailPattern.test(email)) errors.push('A valid email address is required.');
      if (!phone) errors.push('Phone number is required.');

      if (statusEl) {
        statusEl.className = 'form-status';
        statusEl.textContent = '';
      }

      if (errors.length > 0) {
        if (statusEl) {
          statusEl.textContent = errors.join(' ');
          statusEl.classList.add('status-error');
        }
        return;
      }

      try {
        const response = WebsiteSDK.submitQuickApplication(
          pageState.job.id,
          name,
          email,
          phone,
          cover
        );
        pageState.quickApplication.lastStatus = response && response.status ? response.status : null;
        pageState.quickApplication.lastMessage = response && response.message ? response.message : '';
        if (statusEl) {
          statusEl.textContent = pageState.quickApplication.lastMessage || 'Application submitted.';
          statusEl.classList.add('status-success');
        }
      } catch (error) {
        if (statusEl) {
          statusEl.textContent = 'We could not submit your application. Please try again.';
          statusEl.classList.add('status-error');
        }
      }
    }

    function saveJobNote(triggerElement) {
      if (!pageState.job || !pageState.job.id) return;
      const noteSection = triggerElement.closest('[data-component="job-note-editor"]');
      if (!noteSection) return;
      const textarea = noteSection.querySelector('#job-note-text');
      const pinCheckbox = noteSection.querySelector('#job-note-pin');
      const statusEl = noteSection.querySelector('[data-role="note-status"]');

      const content = textarea ? textarea.value.trim() : '';
      const isPinned = pinCheckbox ? !!pinCheckbox.checked : false;

      if (statusEl) {
        statusEl.className = 'note-status';
        statusEl.textContent = '';
      }

      if (!content) {
        if (statusEl) {
          statusEl.textContent = 'Note content cannot be empty.';
          statusEl.classList.add('status-error');
        }
        return;
      }

      try {
        const response = WebsiteSDK.addOrUpdateJobNote(pageState.job.id, content, isPinned);
        if (response) {
          pageState.note = {
            id: response.note_id || '',
            content: response.content || content,
            is_pinned: typeof response.is_pinned === 'boolean' ? response.is_pinned : isPinned,
            updated_at: response.updated_at || ''
          };
        }
        const updatedLabel = noteSection.querySelector('.note-updated');
        if (updatedLabel) {
          updatedLabel.textContent = pageState.note.updated_at
            ? 'Last updated ' + formatDate(pageState.note.updated_at)
            : '';
        }
        if (statusEl) {
          statusEl.textContent = 'Note saved.';
          statusEl.classList.add('status-success');
        }
      } catch (error) {
        if (statusEl) {
          statusEl.textContent = 'We could not save your note. Please try again.';
          statusEl.classList.add('status-error');
        }
      }
    }

    function toggleEmailShareForm(triggerElement) {
      const section = triggerElement.closest('[data-component="job-email-share"]');
      if (!section) return;
      const form = section.querySelector('.email-share-form');
      const statusEl = section.querySelector('[data-role="email-share-status"]');
      if (!form) return;

      if (statusEl) {
        statusEl.className = 'form-status';
        statusEl.textContent = '';
      }

      if (form.classList.contains('is-hidden')) {
        form.classList.remove('is-hidden');
        const recipientInput = form.querySelector('input[name="recipient_email"]');
        if (recipientInput) recipientInput.focus();
      } else {
        form.classList.add('is-hidden');
      }
    }

    function submitEmailShareForm(formElement) {
      if (!pageState.job || !pageState.job.id) return;
      if (!formElement) return;

      const recipient = formElement.recipient_email ? formElement.recipient_email.value.trim() : '';
      const sender = formElement.sender_name ? formElement.sender_name.value.trim() : '';
      const message = formElement.message ? formElement.message.value.trim() : '';
      const statusEl = formElement.querySelector('[data-role="email-share-status"]');

      const emailPattern = /.+@.+\..+/;
      const errors = [];
      if (!recipient || !emailPattern.test(recipient)) errors.push('A valid recipient email is required.');
      if (!sender) errors.push('Your name is required.');

      if (statusEl) {
        statusEl.className = 'form-status';
        statusEl.textContent = '';
      }

      if (errors.length > 0) {
        if (statusEl) {
          statusEl.textContent = errors.join(' ');
          statusEl.classList.add('status-error');
        }
        return;
      }

      try {
        const response = WebsiteSDK.sendJobToFriend(
          pageState.job.id,
          recipient,
          sender,
          message
        );
        pageState.emailShare.lastStatus = response && response.status ? response.status : null;
        pageState.emailShare.lastMessage = response && response.message ? response.message : '';
        if (statusEl) {
          statusEl.textContent = pageState.emailShare.lastMessage || 'Email queued to be sent.';
          if (pageState.emailShare.lastStatus === 'failed') {
            statusEl.classList.add('status-error');
          } else {
            statusEl.classList.add('status-success');
          }
        }
        if (response && response.status && response.status !== 'failed') {
          if (formElement.recipient_email) formElement.recipient_email.value = '';
          if (formElement.sender_name) formElement.sender_name.value = '';
          if (formElement.message) formElement.message.value = '';
        }
      } catch (error) {
        if (statusEl) {
          statusEl.textContent = 'We could not send this email. Please try again.';
          statusEl.classList.add('status-error');
        }
      }
    }

    function handleViewComparison() {
      if (pageState.compareSummary && pageState.compareSummary.count > 0) {
        window.location.href = 'compare_jobs.html';
      }
    }

    function bindActionHandlers() {
      const actionElements = document.querySelectorAll('[data-action]');
      actionElements.forEach(function(element) {
        const action = element.dataset.action;
        if (!action) return;
        if (element.dataset.bound === 'true') return;

        if (element.tagName === 'FORM') {
          element.addEventListener('submit', function(evt) {
            evt.preventDefault();
            handleAction(action, element, evt);
          });
        } else {
          element.addEventListener('click', function(evt) {
            handleAction(action, element, evt);
          });
        }

        element.dataset.bound = 'true';
      });
    }

    function handleAction(action, element, event) {
      if (action === 'back-to-origin') {
        handleBackNavigation();
      } else if (action === 'view-saved-jobs') {
        window.location.href = 'saved_jobs.html';
      } else if (action === 'view-comparison') {
        handleViewComparison();
      } else if (action === 'toggle-save') {
        handleToggleSave();
      } else if (action === 'toggle-compare') {
        handleToggleCompare();
      } else if (action === 'open-quick-apply') {
        openQuickApplyForm();
      } else if (action === 'submit-quick-apply') {
        submitQuickApplyForm(element);
      } else if (action === 'save-note') {
        saveJobNote(element);
      } else if (action === 'open-email-share-form') {
        toggleEmailShareForm(element);
      } else if (action === 'submit-email-share') {
        submitEmailShareForm(element);
      }
    }

    // ---------- Data loading & initialization ----------
    function loadJobAndState() {
      if (!pageState.url.id) {
        setStatus('No job was specified. Use the job search to find a role you are interested in.', 'error');
        initializeComponents();
        bindActionHandlers();
        return;
      }

      setLoading(true);
      try {
        const details = WebsiteSDK.getJobDetails(pageState.url.id);
        if (details) {
          pageState.job = details.job || null;
          pageState.employer = details.employer || null;
          pageState.location = details.location || null;
          pageState.isSaved = !!details.is_saved;
          pageState.isInCompareSet = !!details.is_in_compare_set;

          if (details.note && details.note.content) {
            pageState.note = {
              id: details.note.id || '',
              content: details.note.content || '',
              is_pinned: !!details.note.is_pinned,
              updated_at: details.note.updated_at || ''
            };
          }
        }

        try {
          const summary = WebsiteSDK.getActiveCompareSetSummary();
          if (summary) {
            pageState.compareSummary = {
              compare_set_id: summary.compare_set_id || null,
              job_ids: Array.isArray(summary.job_ids) ? summary.job_ids : [],
              count: typeof summary.count === 'number' ? summary.count : 0
            };
            if (pageState.job && pageState.job.id) {
              if (pageState.compareSummary.job_ids.indexOf(pageState.job.id) !== -1) {
                pageState.isInCompareSet = true;
              }
            }
          }
        } catch (e) {
          // Ignore compare summary errors; comparison UI will just show count 0
        }

        if (!pageState.note && pageState.job && pageState.job.id) {
          try {
            const noteRes = WebsiteSDK.getJobNoteForJob(pageState.job.id);
            if (noteRes && noteRes.content) {
              pageState.note = {
                id: noteRes.note_id || '',
                content: noteRes.content || '',
                is_pinned: !!noteRes.is_pinned,
                updated_at: noteRes.updated_at || ''
              };
            }
          } catch (e) {
            // Ignore note errors; note editor will start empty
          }
        }
      } catch (error) {
        setStatus('We were unable to load this job. Please try again later.', 'error');
      } finally {
        setLoading(false);
        initializeComponents();
        bindActionHandlers();
      }
    }

    // Start initialization
    loadJobAndState();
  });
  </script>
</body>
