<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Turn Up Talent - Recruitment Website</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>

  <!-- Typography from design: Space Grotesk for headings, Source Sans 3 for body, Source Code Pro for code -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500&amp;display=swap' rel='stylesheet'>

  <!-- Main stylesheet -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific stylesheet -->
  <link rel='stylesheet' href='compare_jobs.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-inner container'>
      <a href='index.html' class='brand' aria-label='Turn Up Talent home'>
        <span class='brand-mark' aria-hidden='true'>T</span>
        <span class='brand-text' aria-hidden='true'>
          <span class='brand-line brand-line-top'>TURN</span>
          <span class='brand-line brand-line-middle'>UP</span>
          <span class='brand-line brand-line-bottom'>TALENT</span>
        </span>
      </a>

      <nav class='primary-nav' aria-label='Main navigation'>
        <ul class='nav-list'>
          <li class='nav-item'><a href='index.html' class='nav-link'>Home</a></li>
          <li class='nav-item'><a href='jobs.html' class='nav-link'>Find Jobs</a></li>
          <li class='nav-item'><a href='saved_jobs.html' class='nav-link'>Saved Jobs</a></li>
          <li class='nav-item'><a href='job_alerts.html' class='nav-link'>Job Alerts</a></li>
          <li class='nav-item'><a href='compare_jobs.html' class='nav-link'>Compare Jobs</a></li>
          <li class='nav-item'><a href='help.html' class='nav-link'>Help</a></li>
        </ul>
      </nav>

      <!-- Global compare header counter -->
      <button type='button'
              class='header-compare-counter'
              data-component='compare-header-counter'
              data-populate='compare-header-counter'
              aria-label='Current jobs in comparison'
              disabled>
        Compare (0)
      </button>

      <a href='contact.html' class='header-cta'>Connect with us</a>
    </div>
  </header>

  <main id='content' class='page-content' role='main'>
    <div class='content-inner container'>
      <div class='compare-page' data-component='compare-page-root'>
        <!-- Full-page loading overlay for initial data load and major updates -->
        <div class='compare-page-loader' data-component='compare-page-init' aria-hidden='true' hidden>
          <div class='compare-page-loader-backdrop'></div>
          <div class='compare-page-loader-spinner' role='status' aria-live='polite'>
            <span class='visually-hidden'>Loading comparison...</span>
          </div>
        </div>

        <!-- Summary bar -->
        <section class='compare-summary-bar'
                 data-component='compare-summary-bar'
                 data-populate='compare-summary'
                 aria-label='Comparison summary'>
          <!-- Populated by JavaScript -->
        </section>

        <!-- Section focus controller (Overview, Pay, Schedule, Benefits, Dates) -->
        <nav class='compare-section-focus'
             data-component='section-focus-controller'
             data-populate='section-focus'
             aria-label='Comparison sections'>
          <!-- Populated by JavaScript -->
        </nav>

        <!-- Main comparison region -->
        <section class='compare-main-region' aria-label='Job comparison table'>
          <div class='comparison-table-wrapper'
               data-component='comparison-table'
               data-populate='comparison-table'>
            <!-- Populated by JavaScript -->
          </div>

          <section class='empty-compare-state'
                   data-component='empty-compare-state'
                   data-populate='empty-compare'
                   aria-label='No jobs in comparison'>
            <!-- Populated by JavaScript -->
          </section>
        </section>

        <!-- Lightweight toast / notification area for non-blocking messages -->
        <div class='compare-toast'
             data-component='compare-toast'
             aria-live='polite'
             aria-atomic='true'></div>
      </div>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-links'>
          <li class='footer-item'><a href='about.html' class='footer-link'>About</a></li>
          <li class='footer-item'><a href='contact.html' class='footer-link'>Contact</a></li>
          <li class='footer-item'><a href='help.html' class='footer-link'>Help / FAQ</a></li>
          <li class='footer-item'><a href='jobs.html' class='footer-link'>Browse Jobs</a></li>
          <li class='footer-item'><a href='terms.html' class='footer-link'>Terms of Use</a></li>
          <li class='footer-item'><a href='privacy.html' class='footer-link'>Privacy Policy</a></li>
          <li class='footer-item'><a href='cookies.html' class='footer-link'>Cookie Policy</a></li>
        </ul>
      </nav>
      <div class='footer-meta'>
        <p class='copyright'>&copy; 2026 Turn Up Talent. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- SDK / business logic bridge -->
  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var state = {
        view: {
          source: null,
          section: 'overview'
        },
        compareDetails: null,
        compareSummary: null
      };

      function parseUrlParams() {
        var params = new URLSearchParams(window.location.search);
        var source = params.get('source');
        var section = params.get('section');
        if (source) {
          state.view.source = source;
        }
        if (section) {
          state.view.section = section;
        }
      }

      function updateUrlSection(sectionKey) {
        try {
          var url = new URL(window.location.href);
          if (sectionKey) {
            url.searchParams.set('section', sectionKey);
          } else {
            url.searchParams.delete('section');
          }
          window.history.replaceState({}, '', url.toString());
        } catch (e) {
          console.error('Failed to update URL section parameter', e);
        }
      }

      function showLoader(show) {
        var loader = document.querySelector('[data-component=compare-page-init]');
        if (!loader) return;
        if (show) {
          loader.removeAttribute('hidden');
        } else {
          loader.setAttribute('hidden', 'hidden');
        }
      }

      function getJobsArray() {
        if (state.compareDetails && Array.isArray(state.compareDetails.jobs)) {
          return state.compareDetails.jobs;
        }
        return [];
      }

      function sanitizeHTML(value) {
        if (value === null || value === undefined) return '';
        var str = String(value);
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatEnumLabel(value) {
        if (!value) return '';
        var str = String(value);
        return str.split('_').map(function(part) {
          if (!part) return '';
          return part.charAt(0).toUpperCase() + part.slice(1);
        }).join(' ');
      }

      function formatDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return '';
        return d.toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      }

      function formatDateTime(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return '';
        return d.toLocaleString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      }

      function formatDistance(miles) {
        if (miles === null || miles === undefined || isNaN(miles)) return 'Distance not available';
        var num = Number(miles);
        var rounded = Math.round(num * 10) / 10;
        return rounded + ' mi from search location';
      }

      function formatCurrency(amount, currency) {
        if (amount === null || amount === undefined || isNaN(amount)) return '';
        var value = Number(amount);
        if (!currency || currency.toLowerCase() === 'usd') {
          return '$' + value.toLocaleString();
        }
        return value.toLocaleString() + ' ' + currency.toUpperCase();
      }

      function formatCompensation(job) {
        var payType = job.pay_type || '';
        var currency = job.currency || 'usd';
        var min = job.compensation_min;
        var max = job.compensation_max;
        if ((min === null || min === undefined || isNaN(min)) && (max === null || max === undefined || isNaN(max))) {
          return 'Not specified';
        }
        var pieces = [];
        if (min !== null && min !== undefined && !isNaN(min)) {
          pieces.push(formatCurrency(min, currency));
        }
        if (max !== null && max !== undefined && !isNaN(max) && max !== min) {
          pieces.push(formatCurrency(max, currency));
        }
        var range = pieces.join('  ');
        var suffix = '';
        if (payType) {
          var pt = String(payType);
          if (pt === 'annual_salary') suffix = 'per year';
          else if (pt === 'hourly') suffix = 'per hour';
          else if (pt === 'daily_rate') suffix = 'per day';
          else suffix = formatEnumLabel(pt);
        }
        return (range || 'Not specified') + (suffix ? ' ' + suffix : '');
      }

      function showToast(message) {
        var toast = document.querySelector('[data-component=compare-toast]');
        if (!toast || !message) return;
        toast.textContent = message;
        toast.classList.add('is-visible');
        if (toast._hideTimeout) {
          clearTimeout(toast._hideTimeout);
        }
        toast._hideTimeout = setTimeout(function() {
          toast.classList.remove('is-visible');
        }, 3000);
      }

      function fetchCompareData() {
        showLoader(true);
        try {
          var details = WebsiteSDK.getActiveCompareSetDetails();
          state.compareDetails = details || {};
          var summary = WebsiteSDK.getActiveCompareSetSummary();
          state.compareSummary = summary || {};
        } catch (e) {
          console.error('Failed to load comparison data', e);
        }
        showLoader(false);
      }

      function handleCompareSetChanged() {
        showLoader(true);
        try {
          var details = WebsiteSDK.getActiveCompareSetDetails();
          state.compareDetails = details || {};
          var summary = WebsiteSDK.getActiveCompareSetSummary();
          state.compareSummary = summary || {};
        } catch (e) {
          console.error('Failed to refresh comparison data', e);
        }
        showLoader(false);
        renderAll();
      }

      function renderSummaryBar(container) {
        var jobs = getJobsArray();
        var count = jobs.length;
        var createdAt = state.compareDetails && state.compareDetails.created_at ? formatDateTime(state.compareDetails.created_at) : '';
        var hasJobs = count > 0;
        var subtitle;
        if (hasJobs) {
          subtitle = 'Comparing ' + count + ' job' + (count === 1 ? '' : 's');
          if (createdAt) {
            subtitle += '  started ' + sanitizeHTML(createdAt);
          }
        } else {
          subtitle = 'You have not selected any jobs to compare yet.';
        }

        var source = state.view.source;
        var primarySource = source === 'saved_jobs' ? 'saved_jobs' : 'jobs';
        var primaryActionLabel = primarySource === 'saved_jobs' ? 'Add more jobs from Saved Jobs' : 'Add more jobs from search results';
        var primaryActionData = primarySource === 'saved_jobs' ? 'go-saved' : 'go-search';
        var secondaryActionLabel = primarySource === 'saved_jobs' ? 'Add more jobs from search results' : 'Add more jobs from Saved Jobs';
        var secondaryActionData = primarySource === 'saved_jobs' ? 'go-search' : 'go-saved';

        container.innerHTML = '' +
          '<div class="compare-summary-bar-inner">' +
            '<div class="summary-main">' +
              '<h1 class="page-title">Compare Jobs</h1>' +
              '<p class="summary-subtitle">' + sanitizeHTML(subtitle) + '</p>' +
            '</div>' +
            '<div class="summary-actions">' +
              '<button type="button" class="btn btn-secondary btn-small" data-action="' + primaryActionData + '">' + sanitizeHTML(primaryActionLabel) + '</button>' +
              '<button type="button" class="btn-link" data-action="' + secondaryActionData + '">' + sanitizeHTML(secondaryActionLabel) + '</button>' +
              '<button type="button" class="btn-link text-danger" data-action="clear-all" ' + (hasJobs ? '' : 'disabled') + '>Clear all comparisons</button>' +
            '</div>' +
          '</div>';
      }

      function renderHeaderCounter(container) {
        var count = state.compareSummary && typeof state.compareSummary.count === 'number'
          ? state.compareSummary.count
          : (getJobsArray().length || 0);
        container.textContent = 'Compare (' + count + ')';
        if (count > 0) {
          container.removeAttribute('disabled');
        } else {
          container.setAttribute('disabled', 'disabled');
        }
      }

      function renderSectionFocus(container) {
        var sections = [
          { key: 'overview', label: 'Overview' },
          { key: 'pay', label: 'Compensation' },
          { key: 'schedule', label: 'Schedule & work' },
          { key: 'benefits', label: 'Benefits & perks' },
          { key: 'dates', label: 'Dates & deadlines' }
        ];
        var active = state.view.section || 'overview';
        var html = '<div class="section-focus-inner">';
        sections.forEach(function(item) {
          var isActive = item.key === active;
          html += '<button type="button" class="section-focus-pill' + (isActive ? ' is-active' : '') + '" data-action="section-link" data-section="' + item.key + '">' + sanitizeHTML(item.label) + '</button>';
        });
        html += '</div>';
        container.innerHTML = html;
      }

      function renderComparisonTable(container) {
        var jobs = getJobsArray();
        if (!jobs.length) {
          container.innerHTML = '';
          container.style.display = 'none';
          return;
        }
        container.style.display = '';

        var headerCells = jobs.map(function(job) {
          var title = job.title || 'Untitled role';
          var employer = job.employer_name || '';
          var location = job.location_display_name || '';
          var remote = job.remote_tagline || '';
          var isSaved = !!job.is_saved;
          var jobId = job.job_id;
          return '' +
            '<div class="comparison-job-cell comparison-job-header" data-job-id="' + sanitizeHTML(jobId) + '">' +
              '<button type="button" class="job-title-link" data-action="view-details" data-job-id="' + sanitizeHTML(jobId) + '">' + sanitizeHTML(title) + '</button>' +
              '<div class="job-header-meta">' +
                (employer ? '<div class="job-employer">' + sanitizeHTML(employer) + '</div>' : '') +
                (location ? '<div class="job-location">' + sanitizeHTML(location) + '</div>' : '') +
                (remote ? '<div class="job-remote">' + sanitizeHTML(remote) + '</div>' : '') +
              '</div>' +
              '<div class="job-header-actions" data-component="job-column-header-actions">' +
                '<button type="button" class="text-link" data-action="view-details" data-job-id="' + sanitizeHTML(jobId) + '">View details</button>' +
                '<button type="button" class="text-link" data-action="toggle-saved" data-job-id="' + sanitizeHTML(jobId) + '" data-saved="' + (isSaved ? 'true' : 'false') + '">' + (isSaved ? 'Saved' : 'Save job') + '</button>' +
                '<button type="button" class="text-link text-danger" data-action="remove-job" data-job-id="' + sanitizeHTML(jobId) + '">Remove</button>' +
              '</div>' +
            '</div>';
        }).join('');

        var rows = [
          {
            key: 'title',
            label: 'Job title',
            section: 'overview',
            render: function(job) { return sanitizeHTML(job.title || 'Untitled role'); }
          },
          {
            key: 'employer_name',
            label: 'Employer',
            section: 'overview',
            render: function(job) { return sanitizeHTML(job.employer_name || ''); }
          },
          {
            key: 'location_display_name',
            label: 'Location',
            section: 'overview',
            render: function(job) { return sanitizeHTML(job.location_display_name || ''); }
          },
          {
            key: 'distance_miles',
            label: 'Distance',
            section: 'overview',
            render: function(job) {
              if (job.distance_miles === null || job.distance_miles === undefined || isNaN(job.distance_miles)) {
                return 'Not specified';
              }
              return sanitizeHTML(formatDistance(job.distance_miles));
            }
          },
          {
            key: 'job_type',
            label: 'Job type',
            section: 'overview',
            render: function(job) { return sanitizeHTML(formatEnumLabel(job.job_type)); }
          },
          {
            key: 'experience_level',
            label: 'Experience level',
            section: 'overview',
            render: function(job) { return sanitizeHTML(formatEnumLabel(job.experience_level)); }
          },
          {
            key: 'industry',
            label: 'Industry',
            section: 'overview',
            render: function(job) { return sanitizeHTML(formatEnumLabel(job.industry)); }
          },
          {
            key: 'work_arrangement',
            label: 'Work arrangement',
            section: 'schedule',
            render: function(job) { return sanitizeHTML(formatEnumLabel(job.work_arrangement)); }
          },
          {
            key: 'schedule',
            label: 'Schedule',
            section: 'schedule',
            render: function(job) { return sanitizeHTML(formatEnumLabel(job.schedule)); }
          },
          {
            key: 'remote_tagline',
            label: 'Remote',
            section: 'schedule',
            render: function(job) { return sanitizeHTML(job.remote_tagline || ''); }
          },
          {
            key: 'pay',
            label: 'Pay',
            section: 'pay',
            render: function(job) { return sanitizeHTML(formatCompensation(job)); }
          },
          {
            key: 'currency',
            label: 'Currency',
            section: 'pay',
            render: function(job) { return sanitizeHTML((job.currency || '').toUpperCase()); }
          },
          {
            key: 'vacation',
            label: 'Vacation / PTO',
            section: 'benefits',
            render: function(job) {
              if (job.vacation_details) return sanitizeHTML(job.vacation_details);
              if (job.vacation_days !== null && job.vacation_days !== undefined && !isNaN(job.vacation_days)) {
                var days = Number(job.vacation_days);
                return sanitizeHTML(days + ' days');
              }
              return 'Not specified';
            }
          },
          {
            key: 'parking',
            label: 'Parking',
            section: 'benefits',
            render: function(job) {
              var hasParking = job.parking_available === true;
              if (!hasParking && !job.parking_details) return 'Not specified';
              var base = hasParking ? 'Available' : 'Not available';
              if (job.parking_details) {
                base += '  ' + job.parking_details;
              }
              return sanitizeHTML(base);
            }
          },
          {
            key: 'benefits_summary',
            label: 'Benefits summary',
            section: 'benefits',
            render: function(job) { return sanitizeHTML(job.benefits_summary || 'Not specified'); }
          },
          {
            key: 'posted_date',
            label: 'Posted',
            section: 'dates',
            render: function(job) { return sanitizeHTML(formatDate(job.posted_date) || 'Not specified'); }
          },
          {
            key: 'application_deadline',
            label: 'Application deadline',
            section: 'dates',
            render: function(job) { return sanitizeHTML(formatDate(job.application_deadline) || 'Not specified'); }
          }
        ];

        var rowsHtml = rows.map(function(row, index) {
          var cells = jobs.map(function(job) {
            return '<div class="comparison-job-cell">' + row.render(job) + '</div>';
          }).join('');
          var extraClass = index === 0 ? ' comparison-row-section-anchor' : '';
          return '' +
            '<div class="comparison-row' + extraClass + '" data-section-group="' + row.section + '">' +
              '<div class="comparison-attr-cell">' + sanitizeHTML(row.label) + '</div>' +
              cells +
            '</div>';
        }).join('');

        var tableHtml = '' +
          '<div class="comparison-table-scroll" role="table" aria-label="Job comparison">' +
            '<div class="comparison-row comparison-row-header">' +
              '<div class="comparison-attr-cell comparison-attr-cell-header">Job</div>' +
              headerCells +
            '</div>' +
            rowsHtml +
          '</div>';

        container.innerHTML = tableHtml;
      }

      function renderEmptyState(container) {
        var jobs = getJobsArray();
        if (jobs.length > 0) {
          container.innerHTML = '';
          container.style.display = 'none';
          return;
        }
        container.style.display = '';

        var source = state.view.source;
        var primarySource = source === 'saved_jobs' ? 'saved_jobs' : 'jobs';
        var primaryActionLabel = primarySource === 'saved_jobs' ? 'Browse Saved Jobs to compare' : 'Browse jobs to start comparing';
        var primaryActionData = primarySource === 'saved_jobs' ? 'go-saved' : 'go-search';
        var secondaryActionLabel = primarySource === 'saved_jobs' ? 'Or browse all jobs' : 'Or pick from Saved Jobs';
        var secondaryActionData = primarySource === 'saved_jobs' ? 'go-search' : 'go-saved';

        var html = '' +
          '<div class="empty-state-panel">' +
            '<h1 class="empty-state-title">No jobs selected for comparison</h1>' +
            '<p class="empty-state-body">Select two or more roles from job search results or your Saved Jobs list to compare them side by side.</p>' +
            '<div class="empty-state-actions">' +
              '<button type="button" class="btn btn-primary" data-action="' + primaryActionData + '">' + sanitizeHTML(primaryActionLabel) + '</button>' +
              '<button type="button" class="btn-link" data-action="' + secondaryActionData + '">' + sanitizeHTML(secondaryActionLabel) + '</button>' +
            '</div>' +
          '</div>';

        container.innerHTML = html;
      }

      function scrollToSection(sectionKey) {
        if (!sectionKey) return;
        var selector = '[data-section-group=' + sectionKey + ']';
        var target = document.querySelector(selector);
        if (!target) return;
        try {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (e) {
          target.scrollIntoView();
        }
      }

      function renderAll() {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          var type = element.dataset.populate;
          if (type === 'compare-summary') {
            renderSummaryBar(element);
          } else if (type === 'comparison-table') {
            renderComparisonTable(element);
          } else if (type === 'empty-compare') {
            renderEmptyState(element);
          } else if (type === 'section-focus') {
            renderSectionFocus(element);
          } else if (type === 'compare-header-counter') {
            renderHeaderCounter(element);
          }
        });
      }

      document.addEventListener('click', function(event) {
        var actionTarget = event.target.closest('[data-action]');
        if (!actionTarget) return;
        var action = actionTarget.dataset.action;
        if (!action) return;
        event.preventDefault();

        if (action === 'go-search') {
          window.location.href = 'jobs.html';
        } else if (action === 'go-saved') {
          window.location.href = 'saved_jobs.html';
        } else if (action === 'clear-all') {
          var jobs = getJobsArray();
          if (!jobs.length) return;
          try {
            var resp = WebsiteSDK.clearActiveCompareSet();
            if (resp && resp.cleared) {
              showToast('Comparison cleared.');
              handleCompareSetChanged();
            } else {
              showToast('Unable to clear comparison right now.');
            }
          } catch (e) {
            console.error('Failed to clear comparison set', e);
            showToast('Unable to clear comparison right now.');
          }
        } else if (action === 'toggle-saved') {
          var jobIdTs = actionTarget.dataset.jobId;
          if (!jobIdTs) return;
          try {
            var result = WebsiteSDK.toggleSavedJob(jobIdTs, 'compare_jobs');
            var isSaved = result && result.is_saved;
            actionTarget.dataset.saved = isSaved ? 'true' : 'false';
            actionTarget.textContent = isSaved ? 'Saved' : 'Save job';
            if (state.compareDetails && Array.isArray(state.compareDetails.jobs)) {
              state.compareDetails.jobs.forEach(function(job) {
                if (job.job_id === jobIdTs) {
                  job.is_saved = !!isSaved;
                }
              });
            }
            if (result && result.message) {
              showToast(result.message);
            }
          } catch (e) {
            console.error('Failed to toggle saved job', e);
            showToast('Unable to update saved job status.');
          }
        } else if (action === 'remove-job') {
          var jobIdRm = actionTarget.dataset.jobId;
          if (!jobIdRm) return;
          try {
            var removeResp = WebsiteSDK.removeJobFromCompareSet(jobIdRm);
            if (removeResp && typeof removeResp.count === 'number') {
              showToast('Job removed from comparison.');
              handleCompareSetChanged();
            } else {
              showToast('Unable to remove job from comparison.');
            }
          } catch (e) {
            console.error('Failed to remove job from comparison', e);
            showToast('Unable to remove job from comparison.');
          }
        } else if (action === 'view-details') {
          var jobIdView = actionTarget.dataset.jobId;
          if (!jobIdView) return;
          window.location.href = 'job_detail.html?id=' + encodeURIComponent(jobIdView) + '&from=compare';
        } else if (action === 'section-link') {
          var sectionKey = actionTarget.dataset.section || 'overview';
          state.view.section = sectionKey;
          updateUrlSection(sectionKey);
          var controller = document.querySelector('[data-populate=section-focus]');
          if (controller) {
            renderSectionFocus(controller);
          }
          scrollToSection(sectionKey);
        }
      });

      window.addEventListener('popstate', function() {
        var params = new URLSearchParams(window.location.search);
        var newSection = params.get('section') || 'overview';
        state.view.section = newSection;
        var controller = document.querySelector('[data-populate=section-focus]');
        if (controller) {
          renderSectionFocus(controller);
        }
        scrollToSection(newSection);
      });

      parseUrlParams();
      fetchCompareData();
      renderAll();
      if (state.view.section && state.view.section !== 'overview') {
        setTimeout(function() {
          scrollToSection(state.view.section);
        }, 0);
      }
    });
  </script>
</body>
</html>
