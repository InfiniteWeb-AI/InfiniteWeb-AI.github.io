      function getRecentJobSearchesCached() {
        if (recentSearchesCache !== null) {
          return recentSearchesCache;
        }
        try {
          var searches = WebsiteSDK.getRecentJobSearches();
          if (Array.isArray(searches)) {
            recentSearchesCache = searches.slice().sort(function (a, b) {
              var aDate = a && a.executed_at ? new Date(a.executed_at) : new Date(0);
              var bDate = b && b.executed_at ? new Date(b.executed_at) : new Date(0);
              return bDate.getTime() - aDate.getTime();
            });
          } else {
            recentSearchesCache = [];
          }
        } catch (error) {
          console.error('Failed to load recent searches', error);
          recentSearchesCache = [];
        }
        return recentSearchesCache;
      }

      // ----- Render helpers (use container directly) -----

      function renderHomepageHeader(container) {
        var data = getHomePageContentCached();
        container.innerHTML = '';

        var label = document.createElement('p');
        label.className = 'page-label';
        label.textContent = 'Home';

        var title = document.createElement('h1');
        title.className = 'page-title';
        title.textContent = (data && data.headline) ? data.headline : 'Search for your next job';

        var sub = document.createElement('p');
        sub.className = 'page-subtitle';
        sub.textContent = (data && data.subheadline)
          ? data.subheadline
          : 'Start with a quick search by title and location.';

        container.appendChild(label);
        container.appendChild(title);
        container.appendChild(sub);
      }

      function renderQuickLinksStrip(container) {
        // Content does not depend heavily on data, but may in future
        getHomePageContentCached();
        container.innerHTML = '';

        var list = document.createElement('ul');
        list.className = 'quick-links-list';

        function createItem(labelText, action) {
          var li = document.createElement('li');
          li.className = 'quick-links-item';

          var link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.className = 'quick-link-pill';
          link.dataset.action = action;
          link.textContent = labelText;

          li.appendChild(link);
          return li;
        }

        list.appendChild(createItem('Saved jobs', 'navigate-saved-jobs'));
        list.appendChild(createItem('Job alerts', 'navigate-job-alerts'));
        list.appendChild(createItem('Help / how it works', 'navigate-help'));

        container.appendChild(list);
      }

      function renderFeatureHighlights(container) {
        var data = getHomePageContentCached();
        var features = (data && Array.isArray(data.feature_highlights)) ? data.feature_highlights : [];
        container.innerHTML = '';

        var sectionTitle = document.createElement('h2');
        sectionTitle.className = 'section-title';
        sectionTitle.textContent = 'Make the most of Turn Up Talent';
        container.appendChild(sectionTitle);

        if (!features.length) {
          var empty = document.createElement('p');
          empty.className = 'section-empty';
          empty.textContent = 'Learn how saving jobs, job alerts, and quick apply can help you manage your search.';
          container.appendChild(empty);
          return;
        }

        var list = document.createElement('div');
        list.className = 'feature-list';

        features.forEach(function (feature) {
          var item = document.createElement('article');
          item.className = 'feature-item';
          if (feature && feature.feature_key) {
            item.dataset.featureKey = feature.feature_key;
          }

          var title = document.createElement('h3');
          title.className = 'feature-title';
          title.textContent = feature && feature.title ? feature.title : '';

          var description = document.createElement('p');
          description.className = 'feature-description';
          description.textContent = feature && feature.description ? feature.description : '';

          item.appendChild(title);
          item.appendChild(description);

          var actionsContainer = document.createElement('div');
          actionsContainer.className = 'feature-actions';

          var hasAction = false;
          var key = feature && feature.feature_key ? feature.feature_key : '';

          if (key === 'saving_jobs') {
            var savedLink = document.createElement('a');
            savedLink.href = 'javascript:void(0)';
            savedLink.className = 'feature-link';
            savedLink.dataset.action = 'navigate-saved-jobs';
            savedLink.textContent = 'View saved jobs';
            actionsContainer.appendChild(savedLink);
            hasAction = true;
          } else if (key === 'job_alerts') {
            var alertsLink = document.createElement('a');
            alertsLink.href = 'javascript:void(0)';
            alertsLink.className = 'feature-link';
            alertsLink.dataset.action = 'navigate-job-alerts';
            alertsLink.textContent = 'Manage alerts';
            actionsContainer.appendChild(alertsLink);
            hasAction = true;
          } else if (key === 'comparing_jobs' || key === 'quick_apply') {
            var helpLink = document.createElement('a');
            helpLink.href = 'javascript:void(0)';
            helpLink.className = 'feature-link';
            helpLink.dataset.action = 'navigate-help';
            helpLink.textContent = 'How this works';
            actionsContainer.appendChild(helpLink);
            hasAction = true;
          }

          if (hasAction) {
            item.appendChild(actionsContainer);
          }

          list.appendChild(item);
        });

        container.appendChild(list);
      }

      function renderPopularSearches(container) {
        var data = getHomePageContentCached();
        var popular = (data && Array.isArray(data.popular_searches)) ? data.popular_searches : [];
        container.innerHTML = '';

        var heading = document.createElement('h2');
        heading.className = 'section-title';
        heading.textContent = 'Popular searches';
        container.appendChild(heading);

        if (!popular.length) {
          // Hide the section entirely when no data
          container.style.display = 'none';
          return;
        }
        container.style.display = '';

        var list = document.createElement('ul');
        list.className = 'pill-list';

        popular.forEach(function (item) {
          var li = document.createElement('li');
          li.className = 'pill-list-item';

          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'pill';
          btn.dataset.action = 'popular-search';
          if (item && item.title_keywords) {
            btn.dataset.q = item.title_keywords;
          }
          if (item && item.location_text) {
            btn.dataset.loc = item.location_text;
          }
          btn.textContent = (item && item.label) ? item.label : (item && item.title_keywords ? item.title_keywords : 'Search');

          li.appendChild(btn);
          list.appendChild(li);
        });

        container.appendChild(list);
      }

      function formatExecutedAt(isoString) {
        if (!isoString) {
          return '';
        }
        var date = new Date(isoString);
        if (isNaN(date.getTime())) {
          return '';
        }
        try {
          return date.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
        } catch (error) {
          return date.toISOString();
        }
      }

      function renderRecentSearches(container) {
        var recent = getRecentJobSearchesCached();
        container.innerHTML = '';

        var heading = document.createElement('h2');
        heading.className = 'section-title';
        heading.textContent = 'Recent searches';
        container.appendChild(heading);

        if (!recent.length) {
          var empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.dataset.component = 'empty-state-handler';

          var title = document.createElement('h3');
          title.className = 'empty-state-title';
          title.textContent = 'No recent searches yet';

          var body = document.createElement('p');
          body.className = 'empty-state-body';
          body.textContent = 'Your recent job searches will appear here once you start searching from this device.';

          empty.appendChild(title);
          empty.appendChild(body);
          container.appendChild(empty);
          return;
        }

        var list = document.createElement('ul');
        list.className = 'recent-searches-list-inner';

        recent.forEach(function (search) {
          var li = document.createElement('li');
          li.className = 'recent-search-item';

          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'recent-search-button';
          btn.dataset.action = 'recent-search';
          btn.dataset.q = (search && search.title_keywords) ? search.title_keywords : '';
          btn.dataset.loc = (search && search.location_text) ? search.location_text : '';

          var primaryText = document.createElement('span');
          primaryText.className = 'recent-search-main';
          primaryText.textContent = (search && search.title_keywords) ? search.title_keywords : 'Any role';

          var secondaryText = document.createElement('span');
          secondaryText.className = 'recent-search-secondary';
          secondaryText.textContent = (search && search.location_text) ? search.location_text : 'Any location';

          var meta = document.createElement('span');
          meta.className = 'recent-search-meta';
          meta.textContent = formatExecutedAt(search ? search.executed_at : null);

          btn.appendChild(primaryText);
          btn.appendChild(secondaryText);
          btn.appendChild(meta);

          li.appendChild(btn);
          list.appendChild(li);
        });

        container.appendChild(list);
      }

      // ----- Initialize data-populate components -----

      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function (element) {
        var type = element.dataset.populate;
        if (type === 'homepage-header') {
          renderHomepageHeader(element);
        } else if (type === 'quick-links-strip') {
          renderQuickLinksStrip(element);
        } else if (type === 'feature-highlights') {
          renderFeatureHighlights(element);
        } else if (type === 'popular-searches') {
          renderPopularSearches(element);
        } else if (type === 'recent-searches') {
          renderRecentSearches(element);
        }
      });

      // ----- Main search form & location autocomplete -----

      var searchForm = document.querySelector('[data-component="main-search-form"] form');
      var keywordsInput = document.getElementById('search-keywords');
      var locationInput = document.getElementById('search-location');
      var locationSuggestionsContainer = document.getElementById('location-suggestions');

      var searchState = {
        title_keywords: '',
        location_text: ''
      };

      if (keywordsInput) {
        keywordsInput.addEventListener('input', function (event) {
          searchState.title_keywords = event.target.value || '';
        });
      }

      var locationSuggestions = [];
      var highlightedSuggestionIndex = -1;

      function clearLocationSuggestions() {
        if (locationSuggestionsContainer) {
          locationSuggestionsContainer.innerHTML = '';
          locationSuggestionsContainer.hidden = true;
        }
        locationSuggestions = [];
        highlightedSuggestionIndex = -1;
      }

      function renderLocationSuggestions(container, suggestions) {
        container.innerHTML = '';
        locationSuggestions = Array.isArray(suggestions) ? suggestions : [];
        highlightedSuggestionIndex = -1;

        if (!locationSuggestions.length) {
          container.hidden = true;
          return;
        }

        locationSuggestions.forEach(function (loc, index) {
          var item = document.createElement('li');
          item.className = 'autocomplete-item';
          item.setAttribute('role', 'option');
          item.dataset.index = String(index);
          item.dataset.action = 'location-suggestion-click';
          item.textContent = (loc && loc.display_name) ? loc.display_name : '';
          container.appendChild(item);
        });

        container.hidden = false;
      }

      function requestLocationSuggestions(query) {
        if (!locationSuggestionsContainer) {
          return;
        }
        if (!query) {
          clearLocationSuggestions();
          return;
        }
        try {
          var suggestions = WebsiteSDK.getLocationSuggestions(query, 8);
          renderLocationSuggestions(locationSuggestionsContainer, suggestions);
        } catch (error) {
          console.error('Failed to get location suggestions', error);
          clearLocationSuggestions();
        }
      }

      if (locationInput) {
        locationInput.addEventListener('input', function (event) {
          var value = event.target.value || '';
          searchState.location_text = value;
          requestLocationSuggestions(value.trim());
        });

        locationInput.addEventListener('focus', function (event) {
          var value = event.target.value || '';
          if (value && !locationSuggestions.length) {
            requestLocationSuggestions(value.trim());
          }
        });

        locationInput.addEventListener('keydown', function (event) {
          if (!locationSuggestionsContainer || locationSuggestionsContainer.hidden) {
            return;
          }
          if (event.key === 'ArrowDown' || event.key === 'Down') {
            event.preventDefault();
            if (!locationSuggestions.length) {
              return;
            }
            highlightedSuggestionIndex = (highlightedSuggestionIndex + 1) % locationSuggestions.length;
            updateHighlightedSuggestion();
          } else if (event.key === 'ArrowUp' || event.key === 'Up') {
            event.preventDefault();
            if (!locationSuggestions.length) {
              return;
            }
            highlightedSuggestionIndex = highlightedSuggestionIndex <= 0
              ? locationSuggestions.length - 1
              : highlightedSuggestionIndex - 1;
            updateHighlightedSuggestion();
          } else if (event.key === 'Enter') {
            if (highlightedSuggestionIndex >= 0 && highlightedSuggestionIndex < locationSuggestions.length) {
              event.preventDefault();
              applyLocationSuggestion(highlightedSuggestionIndex);
            }
          } else if (event.key === 'Escape' || event.key === 'Esc') {
            clearLocationSuggestions();
          }
        });
      }

      function updateHighlightedSuggestion() {
        if (!locationSuggestionsContainer) {
          return;
        }
        var items = locationSuggestionsContainer.querySelectorAll('.autocomplete-item');
        items.forEach(function (item, index) {
          if (index === highlightedSuggestionIndex) {
            item.classList.add('is-highlighted');
          } else {
            item.classList.remove('is-highlighted');
          }
        });
      }

      function applyLocationSuggestion(index) {
        if (!locationInput) {
          return;
        }
        var suggestion = locationSuggestions[index];
        if (!suggestion) {
          return;
        }
        var displayName = suggestion.display_name || '';
        locationInput.value = displayName;
        searchState.location_text = displayName;
        clearLocationSuggestions();
      }

      if (searchForm) {
        searchForm.addEventListener('submit', function (event) {
          event.preventDefault();
          var qValue = (keywordsInput && keywordsInput.value) ? keywordsInput.value.trim() : '';
          var locValue = (locationInput && locationInput.value) ? locationInput.value.trim() : '';

          var params = new URLSearchParams();
          if (qValue) {
            params.set('q', qValue);
          }
          if (locValue) {
            params.set('loc', locValue);
          }

          var url = params.toString() ? 'jobs.html?' + params.toString() : 'jobs.html';
          window.location.href = url;
        });
      }

      // ----- Global action handler (clicks) -----

      function navigateToJobsWithSearch(q, loc) {
        var params = new URLSearchParams();
        if (q) {
          params.set('q', q);
        }
        if (loc) {
          params.set('loc', loc);
        }
        var url = params.toString() ? 'jobs.html?' + params.toString() : 'jobs.html';
        window.location.href = url;
      }

      document.addEventListener('click', function (event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.dataset.action;

        if (action === 'navigate-saved-jobs') {
          window.location.href = 'saved_jobs.html';
        } else if (action === 'navigate-job-alerts') {
          window.location.href = 'job_alerts.html';
        } else if (action === 'navigate-help') {
          window.location.href = 'help.html';
        } else if (action === 'popular-search') {
          var q = target.dataset.q || '';
          var loc = target.dataset.loc || '';
          navigateToJobsWithSearch(q, loc);
        } else if (action === 'recent-search') {
          var rq = target.dataset.q || '';
          var rloc = target.dataset.loc || '';
          navigateToJobsWithSearch(rq, rloc);
        } else if (action === 'location-suggestion-click') {
          var indexStr = target.dataset.index;
          var index = typeof indexStr === 'string' ? parseInt(indexStr, 10) : -1;
          if (!isNaN(index)) {
            applyLocationSuggestion(index);
          }
        }
      });

      // Close autocomplete when clicking outside
      document.addEventListener('click', function (event) {
        if (!locationSuggestionsContainer || !locationInput) {
          return;
        }
        var isClickInsideInput = locationInput.contains(event.target);
        var isClickInsideSuggestions = locationSuggestionsContainer.contains(event.target);
        if (!isClickInsideInput && !isClickInsideSuggestions) {
          clearLocationSuggestions();
        }
      });
    });
  </script>
</body>
</html>
