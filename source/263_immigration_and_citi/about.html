  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // URL parameters
      var url = new URL(window.location.href);
      var urlParams = url.searchParams;
      var initialSectionParam = urlParams.get('section');

      // Component elements
      var loaderWrapper = document.querySelector('[data-component="static-page-loader"]');
      var aboutTitleEl = document.querySelector('[data-populate="about_title"]');
      var aboutBodyEl = document.querySelector('[data-populate="about_body"]');
      var lastUpdatedEl = document.querySelector('[data-populate="about_last_updated"]');
      var navListEl = document.querySelector('[data-populate="section_navigation"]');
      var sectionLinkButton = document.querySelector('[data-action="copy_section_link"]');
      var sectionLinkStatusEl = document.querySelector('[data-component="section-link-status"]');

      var sectionAnchors = [];
      var activeSectionId = initialSectionParam || null;
      var lastUrlSection = initialSectionParam || null;

      function safeGetStaticPageContent() {
        try {
          return WebsiteSDK.getStaticPageContent('about');
        } catch (err) {
          console.error('Failed to load About static page content', err);
          if (aboutBodyEl) {
            aboutBodyEl.textContent = 'We could not load this information right now. Please try again later.';
          }
          if (aboutTitleEl) {
            aboutTitleEl.textContent = 'About';
          }
          if (lastUpdatedEl) {
            lastUpdatedEl.textContent = '';
          }
          return null;
        }
      }

      function slugify(text) {
        if (!text) return '';
        var slug = text
          .toString()
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9\s\-]/g, '')
          .replace(/\s+/g, '-');
        return slug;
      }

      function buildSectionAnchors(bodyContainer) {
        var headings = bodyContainer.querySelectorAll('h2, h3');
        var anchors = [];
        var usedIds = {};

        headings.forEach(function(h) {
          var baseId = h.id || slugify(h.textContent || '');
          if (!baseId) return;

          var uniqueId = baseId;
          var counter = 2;
          while (Object.prototype.hasOwnProperty.call(usedIds, uniqueId)) {
            uniqueId = baseId + '-' + counter;
            counter += 1;
          }
          usedIds[uniqueId] = true;

          h.id = uniqueId;
          h.setAttribute('data-section-id', uniqueId);
          h.classList.add('about-section-heading');

          // Per-heading lightweight link control
          var headingLinkBtn = document.createElement('button');
          headingLinkBtn.type = 'button';
          headingLinkBtn.className = 'section-heading-link';
          headingLinkBtn.setAttribute('data-action', 'section_heading_link');
          headingLinkBtn.setAttribute('data-section-id', uniqueId);
          headingLinkBtn.setAttribute('aria-label', 'Copy link to this section');
          headingLinkBtn.textContent = '#';
          h.appendChild(headingLinkBtn);

          anchors.push({
            id: uniqueId,
            title: (h.textContent || '').replace('#', '').trim(),
            level: h.tagName.toLowerCase()
          });
        });

        return anchors;
      }

      function renderSectionNavigation(container, anchors) {
        container.innerHTML = '';
        anchors.forEach(function(anchor) {
          var li = document.createElement('li');
          li.className = 'section-nav-item section-nav-item-' + anchor.level;

          var link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.textContent = anchor.title;
          link.setAttribute('data-action', 'section_nav_click');
          link.setAttribute('data-section-id', anchor.id);

          li.appendChild(link);
          container.appendChild(li);
        });
      }

      function findSectionById(sectionId) {
        for (var i = 0; i < sectionAnchors.length; i += 1) {
          if (sectionAnchors[i].id === sectionId) {
            return sectionAnchors[i];
          }
        }
        return null;
      }

      function updateUrlSectionParam(sectionId) {
        if (!sectionId) return;
        if (lastUrlSection === sectionId) return;
        var newUrl = new URL(window.location.href);
        newUrl.searchParams.set('section', sectionId);
        history.replaceState(null, '', newUrl.toString());
        lastUrlSection = sectionId;
      }

      function setActiveSection(sectionId, options) {
        if (!sectionId) return;
        var opts = options || {};
        activeSectionId = sectionId;

        // Highlight in navigation
        if (navListEl) {
          var navItems = navListEl.querySelectorAll('.section-nav-item a[data-section-id]');
          navItems.forEach(function(link) {
            if (link.getAttribute('data-section-id') === sectionId) {
              link.classList.add('is-active');
            } else {
              link.classList.remove('is-active');
            }
          });
        }

        // Scroll into view if requested
        if (opts.scrollIntoView) {
          var targetHeading = document.getElementById(sectionId);
          if (targetHeading) {
            var headerOffset = 96; // approximate height of fixed header
            var rect = targetHeading.getBoundingClientRect();
            var absoluteTop = window.pageYOffset + rect.top;
            window.scrollTo({
              top: absoluteTop - headerOffset,
              behavior: opts.fromClick ? 'smooth' : 'auto'
            });
          }
        }

        if (opts.updateUrl) {
          updateUrlSectionParam(sectionId);
        }
      }

      function handleScrollSync() {
        if (!aboutBodyEl || !sectionAnchors.length) return;
        var headerOffset = 120; // threshold from top to consider section active
        var closestId = null;
        var closestDistance = Infinity;

        sectionAnchors.forEach(function(anchor) {
          var el = document.getElementById(anchor.id);
          if (!el) return;
          var rect = el.getBoundingClientRect();
          var distance = Math.abs(rect.top - headerOffset);
          if (rect.top <= headerOffset + 40 && distance < closestDistance) {
            closestDistance = distance;
            closestId = anchor.id;
          }
        });

        if (closestId && closestId !== activeSectionId) {
          setActiveSection(closestId, { scrollIntoView: false, updateUrl: true });
        }
      }

      // Load static page content
      var staticPageContent = safeGetStaticPageContent();
      if (!staticPageContent) {
        return;
      }

      // Render title
      if (aboutTitleEl) {
        aboutTitleEl.textContent = staticPageContent.title || 'About';
      }

      // Render last updated indicator
      if (lastUpdatedEl) {
        if (staticPageContent.last_updated_at) {
          var date = new Date(staticPageContent.last_updated_at);
          var formatted = '';
          if (!isNaN(date.getTime())) {
            formatted = date.toLocaleDateString(undefined, {
              year: 'numeric',
              month: 'long',
              day: 'numeric'
            });
          } else {
            formatted = staticPageContent.last_updated_at;
          }
          lastUpdatedEl.textContent = 'Last reviewed: ' + formatted;
        } else {
          lastUpdatedEl.textContent = '';
        }
      }

      // Render body content and derive section anchors
      if (aboutBodyEl) {
        aboutBodyEl.innerHTML = staticPageContent.body || '';
        sectionAnchors = buildSectionAnchors(aboutBodyEl);
      }

      // Render in-page navigation
      if (navListEl) {
        renderSectionNavigation(navListEl, sectionAnchors);
      }

      // Initialize active section and deep-linking
      if (sectionAnchors.length) {
        var initialSectionValid = false;
        if (initialSectionParam) {
          initialSectionValid = !!findSectionById(initialSectionParam);
        }
        if (!initialSectionValid) {
          activeSectionId = sectionAnchors[0].id;
        }
        setActiveSection(activeSectionId, { scrollIntoView: !!initialSectionValid, updateUrl: false });
        window.addEventListener('scroll', handleScrollSync);
      }

      // Bind nav click interactions (event delegation within nav list)
      if (navListEl) {
        navListEl.addEventListener('click', function(evt) {
          var target = evt.target;
          var navTrigger = target.closest('[data-action="section_nav_click"]');
          if (!navTrigger) return;
          evt.preventDefault();
          var sectionId = navTrigger.getAttribute('data-section-id');
          if (!sectionId) return;
          setActiveSection(sectionId, { scrollIntoView: true, updateUrl: true, fromClick: true });
        });
      }

      // Bind per-heading link controls (event delegation on body)
      if (aboutBodyEl) {
        aboutBodyEl.addEventListener('click', function(evt) {
          var trigger = evt.target.closest('[data-action="section_heading_link"]');
          if (!trigger) return;
          evt.preventDefault();
          var sectionId = trigger.getAttribute('data-section-id');
          if (!sectionId) return;
          var newUrl = new URL(window.location.href);
          newUrl.searchParams.set('section', sectionId);
          history.replaceState(null, '', newUrl.toString());
          lastUrlSection = sectionId;
          activeSectionId = sectionId;
          if (sectionLinkStatusEl) {
            sectionLinkStatusEl.textContent = 'Link updated. You can copy it from your address bar.';
          }
          setActiveSection(sectionId, { scrollIntoView: false, updateUrl: false });
        });
      }

      // Global section-link-control in the navigation card
      if (sectionLinkButton) {
        sectionLinkButton.addEventListener('click', function() {
          if (!activeSectionId && sectionAnchors.length) {
            activeSectionId = sectionAnchors[0].id;
          }
          if (!activeSectionId) return;
          var newUrl = new URL(window.location.href);
          newUrl.searchParams.set('section', activeSectionId);
          history.replaceState(null, '', newUrl.toString());
          lastUrlSection = activeSectionId;
          if (sectionLinkStatusEl) {
            sectionLinkStatusEl.textContent = 'Link updated. You can copy it from your address bar.';
          }
        });
      }
    });
  </script>
