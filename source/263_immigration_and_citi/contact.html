<!DOCTYPE html>
<link rel="stylesheet" href="contact.css">
<script src="business_logic.js"></script>

<section class="contact-hero-band" aria-labelledby="contact-page-title">
  <div class="contact-hero-inner" data-component="contact-page">
    <!-- Loader / skeleton state -->
    <div class="contact-page-loader" data-component="contact-page-loader" aria-live="polite">
      <div class="contact-loader-card">
        <div class="contact-loader-left">
          <div class="skeleton skeleton-eyebrow"></div>
          <div class="skeleton skeleton-heading"></div>
          <div class="skeleton skeleton-paragraph"></div>
          <div class="skeleton skeleton-paragraph short"></div>
        </div>
        <div class="contact-loader-right">
          <div class="skeleton skeleton-card-heading"></div>
          <div class="skeleton skeleton-input"></div>
          <div class="skeleton skeleton-input"></div>
          <div class="skeleton skeleton-textarea"></div>
          <div class="skeleton skeleton-button"></div>
        </div>
      </div>
    </div>

    <!-- Main two-column layout -->
    <div class="contact-grid contact-grid--hidden" data-component="contact-main">
      <!-- Left: static content from getStaticPageContent('contact') -->
      <section class="contact-static" data-component="contact-static-content" data-populate="contact-static-content">
        <!-- Content rendered via JS -->
      </section>

      <!-- Right: status banner + contact form card -->
      <div class="contact-form-column">
        <!-- Status banner -->
        <div class="contact-status-wrapper">
          <div class="status-banner status-banner--hidden" data-component="contact-status-banner" role="status" aria-live="polite">
            <div class="status-banner-inner">
              <span class="status-banner-icon" aria-hidden="true"></span>
              <p class="status-banner-message"></p>
              <button type="button" class="status-banner-dismiss" data-action="dismiss-status" aria-label="Dismiss message">
                d
              </button>
            </div>
          </div>
        </div>

        <!-- Contact form card -->
        <section class="contact-form-card" aria-labelledby="contact-form-heading">
          <h2 id="contact-form-heading" class="contact-form-title">Send us a message</h2>

          <form data-component="contact-form" data-action="submit-contact-form" novalidate>
            <!-- Name -->
            <div class="form-group">
              <label for="contact-name">Name <span class="field-required" aria-hidden="true">*</span></label>
              <input id="contact-name" name="name" type="text" autocomplete="name" required>
              <p class="field-error" data-field-error="name" aria-live="polite"></p>
            </div>

            <!-- Email -->
            <div class="form-group">
              <label for="contact-email">Email <span class="field-required" aria-hidden="true">*</span></label>
              <input id="contact-email" name="email" type="email" autocomplete="email" required>
              <p class="field-error" data-field-error="email" aria-live="polite"></p>
            </div>

            <!-- Subject (optional, may be prefilled from URL) -->
            <div class="form-group">
              <div class="field-label-row">
                <label for="contact-subject">Subject</label>
                <span class="subject-prefill-indicator" data-component="subject-prefill-indicator" hidden>
                  <span class="subject-prefill-text">Prefilled from another page</span>
                  <button type="button" class="subject-prefill-clear" data-action="clear-subject-prefill">Clear</button>
                </span>
              </div>
              <input id="contact-subject" name="subject" type="text" autocomplete="off">
              <p class="field-help">You can adjust or clear this subject before sending your message.</p>
              <p class="field-error" data-field-error="subject" aria-live="polite"></p>
            </div>

            <!-- Message -->
            <div class="form-group">
              <label for="contact-message">Message <span class="field-required" aria-hidden="true">*</span></label>
              <textarea id="contact-message" name="message" rows="5" required></textarea>
              <p class="field-error" data-field-error="message" aria-live="polite"></p>
            </div>

            <!-- Actions -->
            <div class="form-actions">
              <button type="submit" class="btn btn-primary" data-action="submit-contact-button">
                <span class="btn-label-default">Send message</span>
                <span class="btn-label-loading" aria-hidden="true">Sendinga0b7b7b7</span>
              </button>
              <p class="form-footnote">We canb4t provide legal advice, but we read every message and use it to improve Citizen Now.</p>
            </div>
          </form>
        </section>
      </div>
    </div>
  </div>
</section>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    // --- URL parameters ---
    const urlParams = new URLSearchParams(window.location.search);
    const rawSubjectParam = urlParams.get('subject');
    const initialSubject = rawSubjectParam ? rawSubjectParam.replace(/\+/g, ' ') : '';

    // --- Element references ---
    const loader = document.querySelector('[data-component="contact-page-loader"]');
    const mainGrid = document.querySelector('[data-component="contact-main"]');
    const staticContentContainers = document.querySelectorAll('[data-populate="contact-static-content"]');
    const formEl = document.querySelector('[data-component="contact-form"]');
    const statusBanner = document.querySelector('[data-component="contact-status-banner"]');
    const subjectInput = document.getElementById('contact-subject');
    const subjectIndicator = document.querySelector('[data-component="subject-prefill-indicator"]');
    const submitButton = formEl ? formEl.querySelector('[data-action="submit-contact-button"]') : null;

    let isSubmitting = false;
    let subjectPrefilled = false;

    // --- Helper: loading state ---
    function setLoadingState(isLoading) {
      if (loader) {
        loader.hidden = !isLoading;
      }
      if (mainGrid) {
        if (isLoading) {
          mainGrid.classList.add('contact-grid--hidden');
        } else {
          mainGrid.classList.remove('contact-grid--hidden');
        }
      }
    }

    // --- Helper: render static contact content ---
    function renderStaticContact(container, data) {
      const title = data && data.title ? data.title : 'Contact';
      const body = data && data.body ? data.body : '';
      const lastUpdated = data && data.last_updated_at ? data.last_updated_at : null;

      container.innerHTML = '';

      const eyebrow = document.createElement('p');
      eyebrow.className = 'section-eyebrow';
      eyebrow.textContent = 'Contact';

      const heading = document.createElement('h1');
      heading.className = 'contact-title';
      heading.id = 'contact-page-title';
      heading.textContent = title;

      const bodyEl = document.createElement('div');
      bodyEl.className = 'contact-body';
      if (body) {
        bodyEl.innerHTML = body;
      } else {
        bodyEl.innerHTML = '<p>Use this form for general questions, feedback, or partnership ideas related to immigration and citizenship topics.</p>';
      }

      container.appendChild(eyebrow);
      container.appendChild(heading);
      container.appendChild(bodyEl);

      if (lastUpdated) {
        const updated = document.createElement('p');
        updated.className = 'contact-updated';
        try {
          const date = new Date(lastUpdated);
          const formatted = date.toLocaleDateString(undefined, {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          });
          updated.textContent = 'Last updated ' + formatted;
          container.appendChild(updated);
        } catch (e) {
          // If parsing fails, silently skip last updated label
        }
      }
    }

    // --- Helper: load static content via SDK ---
    function loadStaticContent() {
      let contentData = null;
      try {
        contentData = WebsiteSDK.getStaticPageContent('contact');
      } catch (err) {
        console.error('Error loading static contact page content:', err);
      }

      staticContentContainers.forEach(function(container) {
        if (contentData) {
          renderStaticContact(container, contentData);
        } else {
          // Fallback content if SDK call fails
          renderStaticContact(container, {
            title: 'Contact',
            body: '<p>We\'re currently unable to load additional contact details, but you can still reach us through the form on this page.</p>'
          });
        }
      });
    }

    // --- Helper: status banner ---
    function showStatusBanner(isSuccess, message) {
      if (!statusBanner) return;
      statusBanner.classList.remove('status-banner--hidden', 'status-banner--success', 'status-banner--error');
      statusBanner.classList.add(isSuccess ? 'status-banner--success' : 'status-banner--error');
      const msgEl = statusBanner.querySelector('.status-banner-message');
      if (msgEl) {
        msgEl.textContent = message || (isSuccess ? 'Your message has been sent.' : 'We could not send your message. Please try again.');
      }
    }

    function hideStatusBanner() {
      if (!statusBanner) return;
      statusBanner.classList.add('status-banner--hidden');
    }

    // --- Helper: submission loading state ---
    function setSubmittingState(submitting) {
      isSubmitting = submitting;
      if (!submitButton) return;
      submitButton.disabled = submitting;
      submitButton.classList.toggle('is-loading', submitting);
    }

    // --- Validation ---
    function validateForm() {
      const values = {
        name: formEl && formEl.elements['name'] ? formEl.elements['name'].value.trim() : '',
        email: formEl && formEl.elements['email'] ? formEl.elements['email'].value.trim() : '',
        subject: formEl && formEl.elements['subject'] ? formEl.elements['subject'].value.trim() : '',
        message: formEl && formEl.elements['message'] ? formEl.elements['message'].value.trim() : ''
      };

      const errors = {};

      if (!values.name) {
        errors.name = 'Please enter your name.';
      }

      if (!values.email) {
        errors.email = 'Please enter your email address.';
      } else {
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(values.email)) {
          errors.email = 'Please enter a valid email address.';
        }
      }

      if (!values.message) {
        errors.message = 'Please enter a message.';
      }

      // Reset previous errors
      if (formEl) {
        const errorEls = formEl.querySelectorAll('.field-error');
        errorEls.forEach(function(errEl) {
          errEl.textContent = '';
          errEl.hidden = true;
        });
        ['name', 'email', 'subject', 'message'].forEach(function(fieldName) {
          const input = formEl.elements[fieldName];
          if (input) {
            input.removeAttribute('aria-invalid');
          }
        });
      }

      // Apply errors
      if (formEl) {
        Object.keys(errors).forEach(function(fieldName) {
          const message = errors[fieldName];
          const errEl = formEl.querySelector('[data-field-error="' + fieldName + '"]');
          const input = formEl.elements[fieldName];
          if (errEl) {
            errEl.textContent = message;
            errEl.hidden = false;
          }
          if (input) {
            input.setAttribute('aria-invalid', 'true');
          }
        });
      }

      return {
        isValid: Object.keys(errors).length === 0,
        values: values
      };
    }

    // --- Initialize subject prefill from URL ---
    function initSubjectPrefill() {
      if (!subjectInput) return;
      if (initialSubject) {
        subjectInput.value = initialSubject;
        subjectPrefilled = true;
        if (subjectIndicator) {
          subjectIndicator.hidden = false;
        }
      }
    }

    // --- Submit handler ---
    function handleFormSubmit(event) {
      if (event) {
        event.preventDefault();
      }
      if (!formEl || isSubmitting) return;

      hideStatusBanner();

      const validation = validateForm();
      if (!validation.isValid) {
        // onValidationError: Errors are already displayed inline
        return;
      }

      const values = validation.values;

      setSubmittingState(true);

      let response;
      try {
        response = WebsiteSDK.submitContactMessage(values.name, values.email, values.subject || '', values.message);
      } catch (err) {
        console.error('Error submitting contact message:', err);
        setSubmittingState(false);
        showStatusBanner(false, 'Something went wrong while sending your message. Please try again.');
        return;
      }

      setSubmittingState(false);

      if (response && response.success) {
        // onSubmitSuccess
        showStatusBanner(true, response.message || 'Your message has been sent.');
        if (formEl) {
          formEl.reset();
        }
        subjectPrefilled = false;
        if (subjectIndicator) {
          subjectIndicator.hidden = true;
        }
      } else {
        // onSubmitError
        const msg = response && response.message ? response.message : 'We could not send your message. Please review your details and try again.';
        showStatusBanner(false, msg);
      }
    }

    // --- Field-level change handlers to clear errors when valid ---
    function attachFieldListeners() {
      if (!formEl) return;
      ['name', 'email', 'subject', 'message'].forEach(function(fieldName) {
        const input = formEl.elements[fieldName];
        if (!input) return;
        input.addEventListener('input', function() {
          const errEl = formEl.querySelector('[data-field-error="' + fieldName + '"]');
          if (!errEl) return;

          let isNowValid = true;
          const value = input.value.trim();

          if (fieldName === 'name' || fieldName === 'message') {
            isNowValid = value.length > 0;
          } else if (fieldName === 'email') {
            if (!value) {
              isNowValid = false;
            } else {
              const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
              isNowValid = emailPattern.test(value);
            }
          } else if (fieldName === 'subject') {
            // Optional field: always clear error when user types
            isNowValid = true;
          }

          if (isNowValid) {
            errEl.textContent = '';
            errEl.hidden = true;
            input.removeAttribute('aria-invalid');
          }
        });
      });
    }

    // --- Generic data-action handlers ---
    function bindActionHandlers() {
      const actionElements = document.querySelectorAll('[data-action]');
      actionElements.forEach(function(element) {
        const action = element.dataset.action;

        if (action === 'dismiss-status') {
          element.addEventListener('click', function() {
            hideStatusBanner();
          });
        }

        if (action === 'clear-subject-prefill') {
          element.addEventListener('click', function() {
            if (subjectInput) {
              subjectInput.value = '';
            }
            subjectPrefilled = false;
            if (subjectIndicator) {
              subjectIndicator.hidden = true;
            }
          });
        }

        // The submit button uses the form's submit handler; no extra click logic needed.
      });
    }

    // --- Initialization sequence (page-init component behavior) ---
    setLoadingState(true); // onPageLoad

    initSubjectPrefill(); // onInitFromUrlParam for subject-prefill-indicator

    // Populate static content
    loadStaticContent(); // onStaticContentLoaded / onStaticContentLoadError handled inside

    setLoadingState(false);

    // Form behavior
    if (formEl) {
      formEl.addEventListener('submit', handleFormSubmit);
      attachFieldListeners();
    }

    bindActionHandlers();
  });
</script>
