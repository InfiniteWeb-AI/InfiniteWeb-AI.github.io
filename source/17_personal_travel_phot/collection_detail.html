<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Photo Gallery - Collection Detail</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="collection_detail.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header" role="banner">
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" title="Homepage and dashboard">Home</a>
        <a href="photos.html" title="Browse and filter all photos">All Photos</a>
        <a href="albums.html" title="View and manage photo albums">Albums</a>
        <a href="collections.html" title="Smart and custom photo collections">Collections</a>
        <a href="trips.html" title="Travel stories and trip timelines">Trips</a>
      </nav>
    </header>

    <main id="content" role="main">
      <div class="notification-bar" data-component="notification-bar" role="status" aria-live="polite"></div>

      <div class="collection-detail-layout">
        <!-- Narrow floating filter sidebar (L-shape left leg) -->
        <aside class="filter-sidebar" data-component="collection-filter-sidebar" data-populate="filter-options" aria-label="Photo filters">
          <!-- Populated by JS -->
        </aside>

        <!-- Centered main column -->
        <div class="collection-main-column">
          <!-- Breadcrumb / top text strip -->
          <nav class="collection-breadcrumb" data-component="collection-breadcrumb" data-populate="breadcrumb" aria-label="Breadcrumb">
            <!-- Populated by JS -->
          </nav>

          <!-- Collection header form: name/description + save -->
          <section class="collection-header" data-component="collection-header-form" data-populate="collection-header" aria-label="Collection header">
            <!-- Populated by JS -->
          </section>

          <!-- Slim control row: build mode toggle (left) + actions toolbar (right) -->
          <section class="collection-builder-controls" aria-label="Collection builder controls">
            <div class="builder-mode" data-component="collection-build-mode-toggle" data-populate="build-mode">
              <!-- Populated by JS -->
            </div>
            <div class="builder-actions" data-component="collection-build-actions-toolbar" data-populate="build-actions">
              <!-- Populated by JS -->
            </div>
          </section>

          <!-- Rule definition summary band -->
          <section class="rule-definition-summary" data-component="rule-definition-summary" data-populate="rule-summary" aria-label="Rule summary">
            <!-- Populated by JS -->
          </section>

          <!-- Hero-style collection photo grid -->
          <section class="collection-photo-grid-section" aria-label="Collection photos">
            <header class="section-header">
              <h2 class="section-title">Collection photos</h2>
              <p class="section-subtitle">Drag to reorder, select to remove, or set a cover photo.</p>
            </header>

            <div class="collection-photo-grid-frame">
              <div id="collectionPhotoGrid" class="collection-photo-grid" data-component="collection-photo-grid" data-populate="collection-photos">
                <!-- Populated by JS -->
              </div>
            </div>

            <div class="collection-photo-grid-toolbar">
              <button type="button" class="btn-link" data-action="collection-save-order">Save order</button>
              <button type="button" class="btn-link" data-action="collection-remove-selected">Remove selected</button>
            </div>
          </section>

          <!-- Filtered photo results grid (library search) -->
          <section class="filtered-results-section" aria-label="Library search results">
            <header class="section-header">
              <h2 class="section-title">Library search</h2>
              <p class="section-subtitle">Use filters on the left to find photos to include in this collection.</p>
            </header>

            <div class="rule-limit-row">
              <label for="ruleLimitInput">Rule-based limit (top N results):</label>
              <input id="ruleLimitInput" type="number" min="1" step="1" value="20" data-action="rule-limit-change" />
            </div>

            <div class="filtered-photo-grid-frame">
              <div id="searchResultsGrid" class="filtered-photo-results-grid" data-component="filtered-photo-results-grid" data-populate="search-results">
                <!-- Populated by JS -->
              </div>
            </div>

            <div class="filtered-results-toolbar">
              <div class="selection-actions">
                <button type="button" class="btn-link" data-action="search-select-all-page">Select all in page</button>
                <button type="button" class="btn-link" data-action="search-clear-selection">Clear selection</button>
              </div>
              <div class="pagination-controls">
                <button type="button" class="btn-link" data-action="search-page-prev">&lt; Prev</button>
                <span class="page-info" data-populate="search-page-info"></span>
                <button type="button" class="btn-link" data-action="search-page-next">Next &gt;</button>
                <label class="page-size-label">
                  Page size
                  <select id="searchPageSize" data-action="search-page-size-change">
                    <option value="24">24</option>
                    <option value="60" selected>60</option>
                    <option value="120">120</option>
                  </select>
                </label>
              </div>
            </div>
          </section>

          <!-- Collection settings (name/description shared, map toggle, cover) -->
          <section class="collection-settings-section" data-component="collection-settings-panel" data-populate="collection-settings" aria-label="Collection settings">
            <!-- Populated by JS -->
          </section>

          <!-- Map view panel -->
          <section class="map-view-section" data-component="map-view-panel" data-populate="map-view" aria-label="Map view">
            <!-- Populated by JS -->
          </section>
        </div>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <nav class="footer-nav" aria-label="Footer">
        <a href="about.html" title="About this travel photo gallery">About</a>
        <span class="footer-separator">&middot;</span>
        <a href="help.html" title="Help and usage guide">Help</a>
      </nav>
      <p class="footer-meta">&copy; 2024 Travel Photo Gallery</p>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // --- Global page state ---
      const pageState = {
        mode: 'create', // 'create' or 'edit'
        collectionId: null,
        collection: null, // Collection entity
        collectionType: null, // 'manual' or 'rule_based'
        builderMode: 'manual', // in create mode only
        collectionPhotos: [], // ordered Photo[] in collection
        filterOptions: {
          regions: [],
          countries: [],
          tags: [],
          people: [],
          ratingValues: []
        },
        filters: {
          region: '',
          country: '',
          city: '',
          dateFrom: '',
          dateTo: '',
          favoritesOnly: false,
          minRating: '',
          tagIds: [],
          personIds: []
        },
        sort: 'date_taken_newest',
        searchPage: 1,
        searchPageSize: 60,
        searchTotalCount: 0,
        searchPhotos: [], // current page Photo[]
        searchSelection: new Set(), // photoIds from library search
        collectionSelection: new Set(), // photoIds in collection grid
        ruleLimit: 20,
        dragSourcePhotoId: null
      };

      const notificationBar = document.querySelector('[data-component="notification-bar"]');

      function showNotification(message, type) {
        const tone = type || 'info';
        if (!notificationBar) return;
        notificationBar.innerHTML = '';
        const container = document.createElement('div');
        container.className = 'notification notification-' + tone;
        const textSpan = document.createElement('span');
        textSpan.textContent = message;
        const dismissBtn = document.createElement('button');
        dismissBtn.type = 'button';
        dismissBtn.className = 'notification-dismiss';
        dismissBtn.textContent = '×';
        dismissBtn.setAttribute('data-action', 'notification-dismiss');
        container.appendChild(textSpan);
        container.appendChild(dismissBtn);
        notificationBar.appendChild(container);
      }

      function clearNotification() {
        if (notificationBar) {
          notificationBar.innerHTML = '';
        }
      }

      // --- URL params / page-init-controller logic ---
      const urlParams = new URLSearchParams(window.location.search);
      const idParam = urlParams.get('id');
      const modeParam = urlParams.get('mode');

      if (idParam) {
        pageState.mode = 'edit';
        pageState.collectionId = idParam;
      } else if (modeParam === 'create') {
        pageState.mode = 'create';
      } else {
        pageState.mode = 'create';
      }

      // Initialize base collection object in create mode
      if (pageState.mode === 'create') {
        pageState.collection = {
          id: null,
          name: '',
          description: '',
          coverPhotoId: null,
          createdAt: null,
          updatedAt: null,
          collectionType: 'manual',
          ruleDefinition: '',
          mapEnabled: false
        };
        pageState.collectionType = 'manual';
        pageState.builderMode = 'manual';
      }

      // --- SDK data loading ---
      function loadFilterOptions() {
        try {
          const result = WebsiteSDK.getAllPhotoFilterOptions();
          pageState.filterOptions = {
            regions: Array.isArray(result && result.regions) ? result.regions : [],
            countries: Array.isArray(result && result.countries) ? result.countries : [],
            tags: Array.isArray(result && result.tags) ? result.tags : [],
            people: Array.isArray(result && result.people) ? result.people : [],
            ratingValues: Array.isArray(result && result.ratingValues) ? result.ratingValues : []
          };
        } catch (e) {
          console.error('getAllPhotoFilterOptions failed', e);
          showNotification('Could not load filter options.', 'error');
        }
      }

      function loadCollectionDetailIfNeeded() {
        if (pageState.mode !== 'edit' || !pageState.collectionId) {
          return;
        }
        try {
          const detail = WebsiteSDK.getCollectionDetail(pageState.collectionId);
          if (detail && detail.collection) {
            pageState.collection = detail.collection;
            pageState.collectionId = detail.collection.id;
            pageState.collectionType = detail.collection.collectionType;
            pageState.builderMode = detail.collection.collectionType;
            pageState.collectionPhotos = Array.isArray(detail.photos) ? detail.photos.slice() : [];
            if (detail.collection.ruleDefinition) {
              try {
                const parsed = JSON.parse(detail.collection.ruleDefinition);
                if (parsed && typeof parsed.limit === 'number') {
                  pageState.ruleLimit = parsed.limit;
                }
                if (parsed && parsed.sort) {
                  pageState.sort = parsed.sort;
                }
                if (parsed && parsed.filters) {
                  pageState.filters = Object.assign({}, pageState.filters, parsed.filters);
                }
              } catch (parseErr) {
                // ignore malformed ruleDefinition; keep defaults
              }
            }
          }
        } catch (e) {
          console.error('getCollectionDetail failed', e);
          showNotification('Could not load collection details.', 'error');
        }
      }

      function buildFiltersObjectForSDK() {
        const f = pageState.filters;
        const filters = {};
        if (f.region) filters.region = f.region;
        if (f.country) filters.country = f.country;
        if (f.city) filters.city = f.city;
        if (f.dateFrom) filters.dateFrom = f.dateFrom;
        if (f.dateTo) filters.dateTo = f.dateTo;
        if (f.favoritesOnly) filters.favoritesOnly = true;
        if (f.minRating) {
          const num = Number(f.minRating);
          if (!Number.isNaN(num)) filters.minRating = num;
        }
        if (Array.isArray(f.tagIds) && f.tagIds.length > 0) filters.tagIds = f.tagIds.slice();
        if (Array.isArray(f.personIds) && f.personIds.length > 0) filters.personIds = f.personIds.slice();
        return filters;
      }

      function loadSearchPhotos() {
        try {
          const filters = buildFiltersObjectForSDK();
          const sort = pageState.sort || undefined;
          const page = pageState.searchPage || 1;
          const pageSize = pageState.searchPageSize || 60;
          const result = WebsiteSDK.getAllPhotos(filters, sort, page, pageSize);
          pageState.searchPhotos = Array.isArray(result && result.photos) ? result.photos : [];
          pageState.searchTotalCount = typeof result && typeof result.totalCount === 'number' ? result.totalCount : (result.totalCount || 0);
          refreshSection('search-results');
          refreshSection('search-page-info');
          refreshSection('rule-summary');
        } catch (e) {
          console.error('getAllPhotos failed', e);
          showNotification('Could not load photos from your library.', 'error');
        }
      }

      // --- Rendering helpers (data-populate based) ---
      function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderBreadcrumb(container) {
        const isEdit = pageState.mode === 'edit' && pageState.collection && pageState.collection.id;
        const name = isEdit && pageState.collection.name ? pageState.collection.name : 'New collection';
        container.innerHTML = `
          <a href="javascript:void(0)" class="crumb-link" data-action="nav-collections">Collections</a>
          <span class="crumb-separator">/</span>
          <span class="crumb-current">${escapeHtml(name)}</span>
        `;
      }

      function renderCollectionHeader(container) {
        const col = pageState.collection || {};
        const nameValue = col.name || '';
        const descValue = col.description || '';
        const modeLabel = pageState.mode === 'edit' ? 'Save collection' : 'Create collection';
        container.innerHTML = `
          <form id="collectionHeaderForm" class="collection-header-form" data-action="collection-form">
            <div class="field-group">
              <label for="collectionNameInput">Collection name<span class="required">*</span></label>
              <input id="collectionNameInput" name="name" type="text" required value="${escapeHtml(nameValue)}" data-action="collection-name-change" />
            </div>
            <div class="field-group">
              <label for="collectionDescriptionInput">Description</label>
              <textarea id="collectionDescriptionInput" name="description" rows="2" data-action="collection-description-change">${escapeHtml(descValue)}</textarea>
            </div>
            <div class="field-group field-inline">
              <span class="field-label-static">Type</span>
              <span class="field-value-static">${escapeHtml(pageState.collectionType || pageState.builderMode || 'manual')}</span>
            </div>
            <div class="field-group form-actions">
              <button type="submit" class="btn-primary">${escapeHtml(modeLabel)}</button>
            </div>
          </form>
        `;
      }

      function renderBuildModeToggle(container) {
        const isEdit = pageState.mode === 'edit';
        const currentType = pageState.collectionType || pageState.builderMode || 'manual';
        if (isEdit) {
          const label = currentType === 'rule_based' ? 'Rule-based collection' : 'Manual collection';
          container.innerHTML = `<span class="build-mode-label">${escapeHtml(label)}</span>`;
          return;
        }
        const manualActive = pageState.builderMode === 'manual';
        const ruleActive = pageState.builderMode === 'rule_based';
        container.innerHTML = `
          <div class="build-mode-toggle" role="radiogroup" aria-label="Build mode">
            <button type="button" class="toggle-option ${manualActive ? 'is-active' : ''}" data-action="builder-mode-manual" aria-pressed="${manualActive ? 'true' : 'false'}">Manual</button>
            <button type="button" class="toggle-option ${ruleActive ? 'is-active' : ''}" data-action="builder-mode-rule" aria-pressed="${ruleActive ? 'true' : 'false'}">Rule-based</button>
          </div>
        `;
      }

      function renderBuildActions(container) {
        const isEdit = pageState.mode === 'edit';
        const type = pageState.collectionType || pageState.builderMode || 'manual';
        let html = '';
        if (!isEdit) {
          if (type === 'rule_based') {
            html = `
              <button type="button" class="btn-link" data-action="create-from-rule">Create from filters</button>
            `;
          } else {
            html = `
              <button type="button" class="btn-link" data-action="create-with-selected">Create with selected photos</button>
            `;
          }
        } else {
          // Edit mode actions
          if (type === 'manual') {
            html = `
              <button type="button" class="btn-link" data-action="add-selected-existing">Add selected to collection</button>
            `;
          } else {
            html = `
              <span class="build-actions-note">Rule-based collection. Editing rules is not yet supported.</span>
            `;
          }
        }
        container.innerHTML = html;
      }

      function summarizeFilters() {
        const f = pageState.filters;
        const parts = [];
        if (f.region) {
          parts.push('Region: ' + f.region);
        }
        if (f.country) {
          parts.push('Country: ' + f.country);
        }
        if (f.city) {
          parts.push('City: ' + f.city);
        }
        if (f.dateFrom || f.dateTo) {
          const range = (f.dateFrom || '…') + ' → ' + (f.dateTo || '…');
          parts.push('Dates: ' + range);
        }
        if (f.favoritesOnly) {
          parts.push('Favorites only');
        }
        if (f.minRating) {
          parts.push('Rating ≥ ' + f.minRating);
        }
        if (Array.isArray(f.tagIds) && f.tagIds.length > 0) {
          parts.push('Tags: ' + f.tagIds.length + ' selected');
        }
        if (Array.isArray(f.personIds) && f.personIds.length > 0) {
          parts.push('People: ' + f.personIds.length + ' selected');
        }
        if (parts.length === 0) {
          return 'No filters active. Using your entire library.';
        }
        return parts.join(' · ');
      }

      function renderRuleSummary(container) {
        const type = pageState.collectionType || pageState.builderMode || 'manual';
        if (type !== 'rule_based') {
          container.innerHTML = '<span class="rule-summary-muted">Rule-based mode is inactive. Switch to rule-based to use filters as rules.</span>';
          return;
        }
        const summary = summarizeFilters();
        const limit = pageState.ruleLimit || 0;
        const count = pageState.searchTotalCount || 0;
        container.innerHTML = `
          <div class="rule-summary-row">
            <span class="rule-summary-main">${escapeHtml(summary)}</span>
            <span class="rule-summary-meta">Top ${limit} of ${count} matching photos will be used.</span>
          </div>
        `;
      }

      function renderCollectionPhotos(container) {
        const photos = Array.isArray(pageState.collectionPhotos) ? pageState.collectionPhotos : [];
        if (!pageState.collectionId && pageState.mode === 'create') {
          container.innerHTML = '<div class="empty-state">Collection is not created yet. Use the builder below to create it.</div>';
          return;
        }
        if (photos.length === 0) {
          container.innerHTML = '<div class="empty-state">No photos in this collection yet.</div>';
          return;
        }
        const coverId = pageState.collection && pageState.collection.coverPhotoId ? pageState.collection.coverPhotoId : null;
        const itemsHtml = photos.map(function(photo) {
          const thumb = photo.thumbnailUrl || photo.fileUrl || '';
          const isSelected = pageState.collectionSelection.has(photo.id);
          const isCover = coverId && coverId === photo.id;
          const placeLabel = photo.placeName || photo.city || photo.country || '';
          return `
            <div class="collection-photo-item" draggable="true" data-photo-id="${escapeHtml(photo.id)}">
              <div class="collection-photo-inner">
                <a href="javascript:void(0)" data-action="collection-photo-open" data-photo-id="${escapeHtml(photo.id)}" class="collection-photo-link">
                  <img src="${escapeHtml(thumb)}" alt="${escapeHtml(photo.title || 'Collection photo')}" />
                </a>
                <div class="collection-photo-meta">
                  <label class="collection-photo-select">
                    <input type="checkbox" data-action="collection-photo-select" data-photo-id="${escapeHtml(photo.id)}" ${isSelected ? 'checked' : ''} />
                    <span>Select</span>
                  </label>
                  <button type="button" class="btn-link small" data-action="collection-photo-remove" data-photo-id="${escapeHtml(photo.id)}">Remove</button>
                  <button type="button" class="btn-link small" data-action="collection-set-cover" data-photo-id="${escapeHtml(photo.id)}">${isCover ? 'Cover photo' : 'Set as cover'}</button>
                  ${placeLabel ? `<span class="collection-photo-place">${escapeHtml(placeLabel)}</span>` : ''}
                </div>
                ${isCover ? '<div class="collection-photo-cover-badge">Cover</div>' : ''}
              </div>
            </div>
          `;
        }).join('');
        container.innerHTML = itemsHtml;
      }

      function renderFilterSidebar(container) {
        const opts = pageState.filterOptions;
        const regionsOptions = (opts.regions || []).map(function(r) {
          const selected = pageState.filters.region === r.value ? 'selected' : '';
          return `<option value="${escapeHtml(r.value)}" ${selected}>${escapeHtml(r.label)}</option>`;
        }).join('');
        const countriesOptions = (opts.countries || []).map(function(c) {
          const selected = pageState.filters.country === c ? 'selected' : '';
          return `<option value="${escapeHtml(c)}" ${selected}>${escapeHtml(c)}</option>`;
        }).join('');
        const ratingOptions = (opts.ratingValues || []).map(function(rv) {
          const selected = String(pageState.filters.minRating || '') === String(rv) ? 'selected' : '';
          return `<option value="${String(rv)}" ${selected}>${String(rv)}★ &amp; up</option>`;
        }).join('');
        const tagsOptions = (opts.tags || []).map(function(tag) {
          const active = Array.isArray(pageState.filters.tagIds) && pageState.filters.tagIds.indexOf(tag.id) !== -1 ? 'selected' : '';
          return `<option value="${escapeHtml(tag.id)}" ${active}>${escapeHtml(tag.name)}</option>`;
        }).join('');
        const peopleOptions = (opts.people || []).map(function(person) {
          const label = person.displayName || person.name || '';
          const active = Array.isArray(pageState.filters.personIds) && pageState.filters.personIds.indexOf(person.id) !== -1 ? 'selected' : '';
          return `<option value="${escapeHtml(person.id)}" ${active}>${escapeHtml(label)}</option>`;
        }).join('');
        const favoritesChecked = pageState.filters.favoritesOnly ? 'checked' : '';
        const sort = pageState.sort || 'date_taken_newest';
        container.innerHTML = `
          <form class="filter-form" aria-label="Filter photos">
            <div class="filter-group">
              <label for="regionFilter">Region</label>
              <select id="regionFilter" data-action="filter-change" data-filter-key="region">
                <option value="">All regions</option>
                ${regionsOptions}
              </select>
            </div>
            <div class="filter-group">
              <label for="countryFilter">Country</label>
              <select id="countryFilter" data-action="filter-change" data-filter-key="country">
                <option value="">All countries</option>
                ${countriesOptions}
              </select>
            </div>
            <div class="filter-group">
              <label for="cityFilter">City</label>
              <input id="cityFilter" type="text" value="${escapeHtml(pageState.filters.city || '')}" data-action="filter-change" data-filter-key="city" />
            </div>
            <div class="filter-group">
              <label>Date range</label>
              <input id="dateFromFilter" type="date" value="${escapeHtml(pageState.filters.dateFrom || '')}" data-action="filter-change" data-filter-key="dateFrom" />
              <input id="dateToFilter" type="date" value="${escapeHtml(pageState.filters.dateTo || '')}" data-action="filter-change" data-filter-key="dateTo" />
            </div>
            <div class="filter-group">
              <label for="ratingFilter">Minimum rating</label>
              <select id="ratingFilter" data-action="filter-change" data-filter-key="minRating">
                <option value="">Any rating</option>
                ${ratingOptions}
              </select>
            </div>
            <div class="filter-group">
              <label for="tagsFilter">Tags</label>
              <select id="tagsFilter" multiple size="4" data-action="filter-change" data-filter-key="tagIds">
                ${tagsOptions}
              </select>
            </div>
            <div class="filter-group">
              <label for="peopleFilter">People</label>
              <select id="peopleFilter" multiple size="4" data-action="filter-change" data-filter-key="personIds">
                ${peopleOptions}
              </select>
            </div>
            <div class="filter-group filter-checkbox">
              <label>
                <input id="favoritesFilter" type="checkbox" ${favoritesChecked} data-action="filter-change" data-filter-key="favoritesOnly" />
                Favorites only
              </label>
            </div>
            <div class="filter-group">
              <label for="sortOption">Sort by</label>
              <select id="sortOption" data-action="sort-change">
                <option value="date_taken_newest" ${sort === 'date_taken_newest' ? 'selected' : ''}>Capture date · newest first</option>
                <option value="date_taken_oldest" ${sort === 'date_taken_oldest' ? 'selected' : ''}>Capture date · oldest first</option>
                <option value="likes_high_to_low" ${sort === 'likes_high_to_low' ? 'selected' : ''}>Likes · high to low</option>
                <option value="rating_high_to_low" ${sort === 'rating_high_to_low' ? 'selected' : ''}>Rating · high to low</option>
              </select>
            </div>
            <div class="filter-group">
              <button type="button" class="btn-link" data-action="filters-apply">Apply filters</button>
            </div>
          </form>
        `;
      }

      function renderSearchResults(container) {
        const photos = Array.isArray(pageState.searchPhotos) ? pageState.searchPhotos : [];
        if (photos.length === 0) {
          container.innerHTML = '<div class="empty-state">No photos match the current filters.</div>';
          return;
        }
        const itemsHtml = photos.map(function(photo) {
          const thumb = photo.thumbnailUrl || photo.fileUrl || '';
          const isSelected = pageState.searchSelection.has(photo.id);
          const caption = photo.title || photo.placeName || photo.city || '';
          return `
            <div class="search-photo-item">
              <label class="search-photo-select">
                <input type="checkbox" data-action="search-select" data-photo-id="${escapeHtml(photo.id)}" ${isSelected ? 'checked' : ''} />
                <span></span>
              </label>
              <div class="search-photo-thumb">
                <img src="${escapeHtml(thumb)}" alt="${escapeHtml(photo.title || 'Library photo')}" />
              </div>
              ${caption ? `<div class="search-photo-caption">${escapeHtml(caption)}</div>` : ''}
            </div>
          `;
        }).join('');
        container.innerHTML = itemsHtml;
      }

      function renderSearchPageInfo(container) {
        const total = pageState.searchTotalCount || 0;
        const page = pageState.searchPage || 1;
        const pageSize = pageState.searchPageSize || 60;
        if (total === 0) {
          container.textContent = '0 photos';
          return;
        }
        const start = (page - 1) * pageSize + 1;
        const end = Math.min(total, page * pageSize);
        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        container.textContent = 'Showing ' + start + '–' + end + ' of ' + total + ' · Page ' + page + ' of ' + totalPages;
      }

      function renderSettingsPanel(container) {
        const col = pageState.collection || {};
        const mapEnabled = !!col.mapEnabled;
        const coverId = col.coverPhotoId || null;
        let coverLabel = 'None';
        if (coverId) {
          const found = pageState.collectionPhotos.find(function(p) { return p.id === coverId; });
          if (found) {
            coverLabel = found.title || found.placeName || found.city || 'Selected photo';
          } else {
            coverLabel = 'Selected photo (not currently loaded)';
          }
        }
        const name = col.name || '';
        const desc = col.description || '';
        container.innerHTML = `
          <div class="settings-panel-inner">
            <h2 class="section-title">Collection settings</h2>
            <div class="field-group">
              <label>Name</label>
              <div class="field-readonly">${escapeHtml(name || '(unnamed)')}</div>
            </div>
            <div class="field-group">
              <label>Description</label>
              <div class="field-readonly">${escapeHtml(desc || 'No description')}</div>
            </div>
            <div class="field-group">
              <label>Cover photo</label>
              <div class="field-readonly">${escapeHtml(coverLabel)}</div>
            </div>
            <div class="field-group">
              <label>
                <input id="mapEnabledCheckbox" type="checkbox" ${mapEnabled ? 'checked' : ''} data-action="map-toggle" />
                Enable map view for this collection
              </label>
            </div>
            <div class="field-group form-actions">
              <button type="button" class="btn-link" data-action="collection-save-settings">Save settings</button>
            </div>
          </div>
        `;
      }

      function renderMapView(container) {
        const col = pageState.collection || {};
        if (!col.mapEnabled) {
          container.innerHTML = '<div class="map-view-placeholder">Map view is disabled for this collection.</div>';
          return;
        }
        const photos = Array.isArray(pageState.collectionPhotos) ? pageState.collectionPhotos : [];
        const withCoords = photos.filter(function(p) {
          return typeof p.latitude === 'number' && typeof p.longitude === 'number';
        });
        if (withCoords.length === 0) {
          container.innerHTML = '<div class="map-view-placeholder">No photos in this collection have location data.</div>';
          return;
        }
        const itemsHtml = withCoords.map(function(p) {
          const label = p.placeName || p.city || p.country || 'Photo ' + p.id;
          return `<li>${escapeHtml(label)} · ${escapeHtml(String(p.latitude))}, ${escapeHtml(String(p.longitude))}</li>`;
        }).join('');
        container.innerHTML = `
          <div class="map-view-frame">
            <div class="map-view-header">
              <span>Photo locations</span>
              <button type="button" class="btn-link" data-action="map-visibility-toggle">Toggle map visibility</button>
            </div>
            <div class="map-view-body">
              <ul class="map-location-list">${itemsHtml}</ul>
            </div>
          </div>
        `;
      }

      const populateHandlers = {
        'breadcrumb': renderBreadcrumb,
        'collection-header': renderCollectionHeader,
        'build-mode': renderBuildModeToggle,
        'build-actions': renderBuildActions,
        'rule-summary': renderRuleSummary,
        'collection-photos': renderCollectionPhotos,
        'filter-options': renderFilterSidebar,
        'search-results': renderSearchResults,
        'search-page-info': renderSearchPageInfo,
        'collection-settings': renderSettingsPanel,
        'map-view': renderMapView
      };

      function refreshSection(key) {
        const fn = populateHandlers[key];
        if (!fn) return;
        const nodes = document.querySelectorAll('[data-populate="' + key + '"]');
        nodes.forEach(function(el) { fn(el); });
      }

      function refreshAllPopulate() {
        Object.keys(populateHandlers).forEach(function(key) { refreshSection(key); });
      }

      // --- Collection operations ---
      function getCurrentMapEnabledFromDom() {
        const checkbox = document.getElementById('mapEnabledCheckbox');
        if (checkbox) return !!checkbox.checked;
        return !!(pageState.collection && pageState.collection.mapEnabled);
      }

      function getCurrentNameFromDom() {
        const input = document.getElementById('collectionNameInput');
        if (input) return input.value.trim();
        return pageState.collection && pageState.collection.name ? pageState.collection.name : '';
      }

      function getCurrentDescriptionFromDom() {
        const textarea = document.getElementById('collectionDescriptionInput');
        if (textarea) return textarea.value.trim();
        return pageState.collection && pageState.collection.description ? pageState.collection.description : '';
      }

      function buildRuleDefinitionString() {
        const definition = {
          filters: buildFiltersObjectForSDK(),
          sort: pageState.sort,
          limit: pageState.ruleLimit
        };
        return JSON.stringify(definition);
      }

      function handleCreateManualCollection() {
        const name = getCurrentNameFromDom();
        const description = getCurrentDescriptionFromDom();
        const mapEnabled = getCurrentMapEnabledFromDom();
        if (!name) {
          showNotification('Please enter a name for the collection.', 'error');
          return;
        }
        try {
          const result = WebsiteSDK.createCollection(name, description, 'manual', '', mapEnabled);
          if (!result || !result.success || !result.collection) {
            showNotification('Could not create collection.', 'error');
            return;
          }
          const newCollection = result.collection;
          const selectedIds = Array.from(pageState.searchSelection);
          if (selectedIds.length > 0) {
            try {
              const addResult = WebsiteSDK.bulkAddPhotosToCollection(newCollection.id, selectedIds);
              if (!addResult || !addResult.success) {
                showNotification('Collection created but adding photos failed.', 'error');
              }
            } catch (e) {
              console.error('bulkAddPhotosToCollection failed during create', e);
              showNotification('Collection created but adding photos failed.', 'error');
            }
          }
          window.location.href = 'collection_detail.html?id=' + encodeURIComponent(newCollection.id);
        } catch (e) {
          console.error('createCollection (manual) failed', e);
          showNotification('Could not create collection.', 'error');
        }
      }

      function handleCreateRuleBasedCollection() {
        const name = getCurrentNameFromDom();
        const description = getCurrentDescriptionFromDom();
        const mapEnabled = getCurrentMapEnabledFromDom();
        if (!name) {
          showNotification('Please enter a name for the collection.', 'error');
          return;
        }
        const limit = pageState.ruleLimit || 0;
        if (!limit || limit < 1) {
          showNotification('Please set a positive limit for rule-based collections.', 'error');
          return;
        }
        const ruleDef = buildRuleDefinitionString();
        try {
          const result = WebsiteSDK.createCollection(name, description, 'rule_based', ruleDef, mapEnabled);
          if (!result || !result.success || !result.collection) {
            showNotification('Could not create rule-based collection.', 'error');
            return;
          }
          const newCollection = result.collection;
          const photos = Array.isArray(pageState.searchPhotos) ? pageState.searchPhotos : [];
          const ids = photos.slice(0, limit).map(function(p) { return p.id; });
          if (ids.length > 0) {
            try {
              const addResult = WebsiteSDK.bulkAddPhotosToCollection(newCollection.id, ids);
              if (!addResult || !addResult.success) {
                showNotification('Collection created but adding photos from rules failed.', 'error');
              }
            } catch (e) {
              console.error('bulkAddPhotosToCollection failed during rule create', e);
              showNotification('Collection created but adding photos from rules failed.', 'error');
            }
          }
          window.location.href = 'collection_detail.html?id=' + encodeURIComponent(newCollection.id);
        } catch (e) {
          console.error('createCollection (rule_based) failed', e);
          showNotification('Could not create rule-based collection.', 'error');
        }
      }

      function handleAddSelectedToExistingCollection() {
        if (!pageState.collectionId) {
          showNotification('Collection must be created before adding photos.', 'error');
          return;
        }
        const selectedIds = Array.from(pageState.searchSelection);
        if (selectedIds.length === 0) {
          showNotification('No photos selected.', 'error');
          return;
        }
        try {
          const result = WebsiteSDK.bulkAddPhotosToCollection(pageState.collectionId, selectedIds);
          if (!result || !result.success) {
            showNotification('Could not add photos to collection.', 'error');
            return;
          }
          // Merge newly added photos into current collectionPhotos (append at end)
          const existingIds = new Set(pageState.collectionPhotos.map(function(p) { return p.id; }));
          const toAppend = pageState.searchPhotos.filter(function(p) { return selectedIds.indexOf(p.id) !== -1 && !existingIds.has(p.id); });
          pageState.collectionPhotos = pageState.collectionPhotos.concat(toAppend);
          showNotification('Added ' + selectedIds.length + ' photos to the collection.', 'success');
          refreshSection('collection-photos');
        } catch (e) {
          console.error('bulkAddPhotosToCollection failed', e);
          showNotification('Could not add photos to collection.', 'error');
        }
      }

      function handleSaveOrder() {
        if (!pageState.collectionId) {
          showNotification('Collection must be created before saving order.', 'error');
          return;
        }
        const ids = pageState.collectionPhotos.map(function(p) { return p.id; });
        try {
          const result = WebsiteSDK.reorderCollectionPhotos(pageState.collectionId, ids);
          if (!result || !result.success) {
            showNotification('Could not save photo order.', 'error');
            return;
          }
          showNotification('Photo order saved.', 'success');
        } catch (e) {
          console.error('reorderCollectionPhotos failed', e);
          showNotification('Could not save photo order.', 'error');
        }
      }

      function handleRemovePhotosFromCollection(idsToRemove) {
        if (!pageState.collectionId) {
          showNotification('Collection must be created before removing photos.', 'error');
          return;
        }
        if (!Array.isArray(idsToRemove) || idsToRemove.length === 0) {
          showNotification('No photos selected for removal.', 'error');
          return;
        }
        try {
          const result = WebsiteSDK.removePhotosFromCollection(pageState.collectionId, idsToRemove);
          if (!result || !result.success) {
            showNotification('Could not remove photos from collection.', 'error');
            return;
          }
          const removeSet = new Set(idsToRemove);
          pageState.collectionPhotos = pageState.collectionPhotos.filter(function(p) { return !removeSet.has(p.id); });
          idsToRemove.forEach(function(id) { pageState.collectionSelection.delete(id); });
          if (pageState.collection && pageState.collection.coverPhotoId && removeSet.has(pageState.collection.coverPhotoId)) {
            pageState.collection.coverPhotoId = null;
          }
          showNotification('Removed ' + (result.removedCount || idsToRemove.length) + ' photos from the collection.', 'success');
          refreshSection('collection-photos');
          refreshSection('collection-settings');
        } catch (e) {
          console.error('removePhotosFromCollection failed', e);
          showNotification('Could not remove photos from collection.', 'error');
        }
      }

      function handleUpdateCollectionSettings(showMessage) {
        const col = pageState.collection || {};
        if (!col.id) {
          showNotification('Collection must be created before saving settings.', 'error');
          return;
        }
        const name = getCurrentNameFromDom() || col.name || '';
        const description = getCurrentDescriptionFromDom() || col.description || '';
        const mapEnabled = getCurrentMapEnabledFromDom();
        const coverPhotoId = col.coverPhotoId || null;
        try {
          const result = WebsiteSDK.updateCollectionSettings(col.id, name, description, mapEnabled, coverPhotoId);
          if (!result || !result.success || !result.collection) {
            if (showMessage !== false) {
              showNotification('Could not save collection settings.', 'error');
            }
            return;
          }
          pageState.collection = result.collection;
          if (showMessage !== false) {
            showNotification('Collection settings saved.', 'success');
          }
          refreshSection('breadcrumb');
          refreshSection('collection-header');
          refreshSection('collection-settings');
          refreshSection('map-view');
        } catch (e) {
          console.error('updateCollectionSettings failed', e);
          if (showMessage !== false) {
            showNotification('Could not save collection settings.', 'error');
          }
        }
      }

      // --- Event handling (data-action driven, delegated) ---
      document.addEventListener('click', function(event) {
        const target = event.target.closest('[data-action]');
        if (!target) return;
        const action = target.getAttribute('data-action');
        if (!action) return;

        switch (action) {
          case 'nav-collections':
            event.preventDefault();
            window.location.href = 'collections.html';
            break;

          case 'notification-dismiss':
            event.preventDefault();
            clearNotification();
            break;

          case 'builder-mode-manual':
            event.preventDefault();
            if (pageState.mode === 'create') {
              pageState.builderMode = 'manual';
              refreshSection('build-mode');
              refreshSection('build-actions');
              refreshSection('rule-summary');
            }
            break;

          case 'builder-mode-rule':
            event.preventDefault();
            if (pageState.mode === 'create') {
              pageState.builderMode = 'rule_based';
              refreshSection('build-mode');
              refreshSection('build-actions');
              refreshSection('rule-summary');
            }
            break;

          case 'create-with-selected':
            event.preventDefault();
            handleCreateManualCollection();
            break;

          case 'create-from-rule':
            event.preventDefault();
            handleCreateRuleBasedCollection();
            break;

          case 'add-selected-existing':
            event.preventDefault();
            handleAddSelectedToExistingCollection();
            break;

          case 'search-select-all-page':
            event.preventDefault();
            pageState.searchPhotos.forEach(function(p) { pageState.searchSelection.add(p.id); });
            refreshSection('search-results');
            showNotification('Selected all photos on this page.', 'info');
            break;

          case 'search-clear-selection':
            event.preventDefault();
            pageState.searchSelection.clear();
            refreshSection('search-results');
            showNotification('Cleared selection.', 'info');
            break;

          case 'search-page-prev':
            event.preventDefault();
            if (pageState.searchPage > 1) {
              pageState.searchPage -= 1;
              loadSearchPhotos();
            }
            break;

          case 'search-page-next':
            event.preventDefault();
            {
              const total = pageState.searchTotalCount || 0;
              const pageSize = pageState.searchPageSize || 60;
              const totalPages = Math.max(1, Math.ceil(total / pageSize));
              if (pageState.searchPage < totalPages) {
                pageState.searchPage += 1;
                loadSearchPhotos();
              }
            }
            break;

          case 'collection-save-order':
            event.preventDefault();
            handleSaveOrder();
            break;

          case 'collection-remove-selected':
            event.preventDefault();
            {
              const ids = Array.from(pageState.collectionSelection);
              handleRemovePhotosFromCollection(ids);
            }
            break;

          case 'collection-photo-remove':
            event.preventDefault();
            {
              const photoId = target.getAttribute('data-photo-id');
              if (photoId) {
                handleRemovePhotosFromCollection([photoId]);
              }
            }
            break;

          case 'collection-set-cover':
            event.preventDefault();
            if (!pageState.collection) return;
            {
              const photoId = target.getAttribute('data-photo-id');
              if (!photoId) return;
              pageState.collection.coverPhotoId = photoId;
              refreshSection('collection-photos');
              refreshSection('collection-settings');
            }
            break;

          case 'collection-photo-open':
            event.preventDefault();
            {
              const photoId = target.getAttribute('data-photo-id');
              if (!photoId) return;
              if (pageState.collectionId) {
                const context = 'collection:' + pageState.collectionId;
                window.location.href = 'photo_detail.html?id=' + encodeURIComponent(photoId) + '&context=' + encodeURIComponent(context);
              } else {
                window.location.href = 'photo_detail.html?id=' + encodeURIComponent(photoId);
              }
            }
            break;

          case 'map-visibility-toggle':
            event.preventDefault();
            {
              const col = pageState.collection || {};
              col.mapEnabled = !col.mapEnabled;
              pageState.collection = col;
              refreshSection('collection-settings');
              refreshSection('map-view');
            }
            break;

          case 'collection-save-settings':
            event.preventDefault();
            handleUpdateCollectionSettings(true);
            break;

          default:
            break;
        }
      });

      document.addEventListener('change', function(event) {
        const target = event.target;
        const action = target.getAttribute('data-action');
        if (!action) return;

        if (action === 'filter-change') {
          const key = target.getAttribute('data-filter-key');
          if (!key) return;
          if (key === 'favoritesOnly') {
            pageState.filters.favoritesOnly = !!target.checked;
          } else if (key === 'tagIds') {
            const selected = Array.prototype.slice.call(target.selectedOptions || []).map(function(opt) { return opt.value; });
            pageState.filters.tagIds = selected;
          } else if (key === 'personIds') {
            const selectedPeople = Array.prototype.slice.call(target.selectedOptions || []).map(function(opt) { return opt.value; });
            pageState.filters.personIds = selectedPeople;
          } else if (key === 'minRating') {
            pageState.filters.minRating = target.value || '';
          } else {
            pageState.filters[key] = target.value || '';
          }
          pageState.searchPage = 1;
          loadSearchPhotos();
        } else if (action === 'sort-change') {
          pageState.sort = target.value || 'date_taken_newest';
          pageState.searchPage = 1;
          loadSearchPhotos();
        } else if (action === 'search-select') {
          const photoId = target.getAttribute('data-photo-id');
          if (!photoId) return;
          if (target.checked) {
            pageState.searchSelection.add(photoId);
          } else {
            pageState.searchSelection.delete(photoId);
          }
        } else if (action === 'collection-photo-select') {
          const photoId = target.getAttribute('data-photo-id');
          if (!photoId) return;
          if (target.checked) {
            pageState.collectionSelection.add(photoId);
          } else {
            pageState.collectionSelection.delete(photoId);
          }
        } else if (action === 'map-toggle') {
          if (!pageState.collection) return;
          pageState.collection.mapEnabled = !!target.checked;
          refreshSection('map-view');
          if (pageState.mode === 'edit') {
            handleUpdateCollectionSettings(false);
          }
        } else if (action === 'search-page-size-change') {
          const val = parseInt(target.value, 10);
          if (!Number.isNaN(val) && val > 0) {
            pageState.searchPageSize = val;
            pageState.searchPage = 1;
            loadSearchPhotos();
          }
        }
      });

      document.addEventListener('input', function(event) {
        const target = event.target;
        const action = target.getAttribute('data-action');
        if (!action) return;

        switch (action) {
          case 'collection-name-change':
            if (!pageState.collection) pageState.collection = {};
            pageState.collection.name = target.value;
            refreshSection('breadcrumb');
            break;

          case 'collection-description-change':
            if (!pageState.collection) pageState.collection = {};
            pageState.collection.description = target.value;
            break;

          case 'rule-limit-change':
            {
              const val = parseInt(target.value, 10);
              if (!Number.isNaN(val) && val > 0) {
                pageState.ruleLimit = val;
                refreshSection('rule-summary');
              }
            }
            break;

          default:
            break;
        }
      });

      document.addEventListener('submit', function(event) {
        const form = event.target;
        if (!form || !form.getAttribute) return;
        const action = form.getAttribute('data-action');
        if (!action) return;

        if (action === 'collection-form') {
          event.preventDefault();
          if (pageState.mode === 'create') {
            const type = pageState.builderMode || 'manual';
            if (type === 'rule_based') {
              handleCreateRuleBasedCollection();
            } else {
              handleCreateManualCollection();
            }
          } else {
            handleUpdateCollectionSettings(true);
          }
        }
      });

      // Drag-and-drop reordering for collection photo grid
      document.addEventListener('dragstart', function(event) {
        const item = event.target.closest('.collection-photo-item');
        if (!item) return;
        const photoId = item.getAttribute('data-photo-id');
        if (!photoId) return;
        pageState.dragSourcePhotoId = photoId;
        if (event.dataTransfer) {
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', photoId);
        }
      });

      document.addEventListener('dragover', function(event) {
        const item = event.target.closest('.collection-photo-item');
        if (!item) return;
        event.preventDefault();
        if (event.dataTransfer) {
          event.dataTransfer.dropEffect = 'move';
        }
      });

      document.addEventListener('drop', function(event) {
        const targetItem = event.target.closest('.collection-photo-item');
        if (!targetItem) return;
        event.preventDefault();
        const targetId = targetItem.getAttribute('data-photo-id');
        const sourceId = pageState.dragSourcePhotoId;
        if (!sourceId || !targetId || sourceId === targetId) return;
        const list = pageState.collectionPhotos.slice();
        const fromIndex = list.findIndex(function(p) { return p.id === sourceId; });
        const toIndex = list.findIndex(function(p) { return p.id === targetId; });
        if (fromIndex === -1 || toIndex === -1) return;
        const moved = list.splice(fromIndex, 1)[0];
        list.splice(toIndex, 0, moved);
        pageState.collectionPhotos = list;
        refreshSection('collection-photos');
      });

      // Filters apply button
      document.addEventListener('click', function(event) {
        const target = event.target.closest('[data-action="filters-apply"]');
        if (!target) return;
        event.preventDefault();
        pageState.searchPage = 1;
        loadSearchPhotos();
      });

      // --- Initial load sequence ---
      loadFilterOptions();
      loadCollectionDetailIfNeeded();
      refreshAllPopulate();
      loadSearchPhotos();
    });
  </script>
</body>
</html>
