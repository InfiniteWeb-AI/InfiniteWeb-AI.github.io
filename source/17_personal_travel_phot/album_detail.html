<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Photo Gallery</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="album_detail.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header" role="banner">
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" title="Homepage and dashboard">Home</a>
        <a href="photos.html" title="Browse and filter all photos">All Photos</a>
        <a href="albums.html" title="View and manage photo albums">Albums</a>
        <a href="collections.html" title="Smart and custom photo collections">Collections</a>
        <a href="trips.html" title="Travel stories and trip timelines">Trips</a>
      </nav>
    </header>

    <main id="content" role="main">
      <div class="album-detail-page" data-component="album-detail">
        <!-- Slim top-left album/navigation row -->
        <section class="album-top-row" data-component="album-header">
          <a href="javascript:void(0)" class="album-back-link" data-action="back-to-albums">&lsaquo; Back to Albums</a>
          <span class="album-meta-divider">&middot;</span>
          <span class="album-title" data-field="title">Loading album&hellip;</span>
          <span class="album-meta" data-field="date-range"></span>
          <span class="album-meta" data-field="location"></span>
          <span class="album-meta privacy-pill" data-field="privacy"></span>
          <span class="album-meta" data-field="photo-count"></span>
          <a href="javascript:void(0)" class="album-add-photos-link" data-action="open-add-photos">Add Photos</a>
        </section>

        <!-- Filter/sort row just above the central photo/grid -->
        <section class="album-filters-row" data-component="photo-filters">
          <form class="filter-form" data-action="filters-form">
            <label class="filter-field">
              <span class="filter-label">Date</span>
              <select name="date" data-filter="date">
                <option value="">All dates</option>
              </select>
            </label>

            <label class="filter-field">
              <span class="filter-label">People</span>
              <select name="peopleFilter" data-filter="people">
                <option value="">Anyone</option>
                <option value="untagged">Untagged</option>
              </select>
            </label>

            <label class="filter-field">
              <span class="filter-label">Tags</span>
              <select name="tags" data-filter="tags">
                <option value="">All tags</option>
              </select>
            </label>

            <label class="filter-field filter-field-inline favorites-filter">
              <input type="checkbox" name="favorites" value="1" data-filter="favorites" />
              <span class="filter-label-inline">Favorites only</span>
            </label>

            <label class="filter-field">
              <span class="filter-label">Sort</span>
              <select name="sort" data-filter="sort">
                <!-- Options populated by JS -->
              </select>
            </label>

            <button type="button" class="filter-reset-link" data-action="reset-filters">Reset</button>
          </form>
        </section>

        <!-- Bulk selection toolbar (appears when photos are selected) -->
        <section class="album-bulk-toolbar" data-component="bulk-toolbar" hidden>
          <div class="bulk-summary">
            <span data-field="selected-count">0</span> photos selected
          </div>
          <div class="bulk-actions">
            <button type="button" class="bulk-action-link" data-action="clear-selection">Clear selection</button>
            <button type="button" class="bulk-action-link" data-action="bulk-like">Like</button>
            <button type="button" class="bulk-action-link" data-action="bulk-unlike">Unlike</button>
            <button type="button" class="bulk-action-link" data-action="bulk-mark-print">Mark &lsquo;To Print&rsquo;</button>
            <button type="button" class="bulk-action-link" data-action="bulk-unmark-print">Unmark &lsquo;To Print&rsquo;</button>
            <button type="button" class="bulk-action-link" data-action="bulk-remove">Remove from Album</button>
            <button type="button" class="bulk-action-link" data-action="bulk-add-collection">Add to Collection</button>
            <button type="button" class="bulk-action-link" data-action="bulk-tag-people">Tag People</button>
            <button type="button" class="bulk-action-link" data-action="bulk-create-slideshow">Create Slideshow</button>
          </div>
          <div class="bulk-collection-picker" data-component="collection-picker" hidden>
            <label class="filter-field">
              <span class="filter-label">Add to collection</span>
              <select data-field="collection-select">
                <option value="">Select collection</option>
              </select>
            </label>
            <button type="button" class="bulk-action-link" data-action="confirm-add-collection">Add</button>
            <button type="button" class="bulk-action-link" data-action="cancel-add-collection">Cancel</button>
          </div>
        </section>

        <!-- Central photo grid area within the single-column layout -->
        <section class="album-photo-grid-section" data-component="album-photos">
          <div class="photo-grid-meta">
            <span class="photo-grid-summary" data-field="grid-summary"></span>
            <span class="photo-grid-pagination" data-component="photo-pagination">
              <button type="button" class="pager-link" data-action="photo-prev-page">Previous</button>
              <span class="photo-page-info" data-field="photo-page-info"></span>
              <button type="button" class="pager-link" data-action="photo-next-page">Next</button>
            </span>
          </div>
          <ul class="photo-grid" data-populate="album-photos">
            <!-- Photo thumbnails rendered by JavaScript -->
          </ul>
        </section>

        <!-- Album comments beneath the main image/grid area -->
        <section class="album-comments-section" data-component="album-comments">
          <header class="comments-header">
            <h2 class="comments-title">Comments</h2>
            <span class="comments-count" data-field="comments-count"></span>
          </header>
          <ul class="comments-list" data-populate="album-comments">
            <!-- Comments rendered by JavaScript -->
          </ul>
          <div class="comments-pagination" data-component="comments-pagination">
            <button type="button" class="pager-link" data-action="comments-prev-page">Previous</button>
            <span class="comments-page-info" data-field="comments-page-info"></span>
            <button type="button" class="pager-link" data-action="comments-next-page">Next</button>
          </div>
          <form class="comment-form" data-action="comment-form">
            <label for="new-comment-text">Add a comment</label>
            <textarea id="new-comment-text" name="comment" rows="3"></textarea>
            <button type="submit" class="comment-submit" data-action="post-comment">Post Comment</button>
          </form>
        </section>

        <!-- Add-photos overlay (full-screen style, minimal chrome) -->
        <section class="overlay add-photos-overlay" data-component="add-photos-overlay" data-source-scope-id="library" hidden aria-hidden="true">
          <div class="overlay-content">
            <header class="overlay-header">
              <h2>Add Photos to Album</h2>
              <button type="button" class="overlay-close" data-action="close-add-photos">&times;</button>
            </header>
            <div class="overlay-filters">
              <label class="filter-field">
                <span class="filter-label">Year</span>
                <select data-overlay-filter="year">
                  <option value="">Any year</option>
                </select>
              </label>
              <label class="filter-field">
                <span class="filter-label">Location</span>
                <input type="text" data-overlay-filter="location" placeholder="Country or city" />
              </label>
              <button type="button" class="overlay-link" data-action="overlay-refresh">Refresh</button>
            </div>
            <div class="overlay-grid-meta">
              <span class="overlay-summary" data-field="overlay-summary"></span>
              <span class="overlay-pagination">
                <button type="button" class="pager-link" data-action="overlay-prev-page">Previous</button>
                <span class="overlay-page-info" data-field="overlay-page-info"></span>
                <button type="button" class="pager-link" data-action="overlay-next-page">Next</button>
              </span>
            </div>
            <ul class="overlay-photo-grid" data-populate="overlay-photos">
              <!-- Candidate photos rendered by JavaScript -->
            </ul>
            <div class="overlay-actions">
              <button type="button" class="overlay-primary" data-action="overlay-add-selected">Add to Album</button>
              <button type="button" class="overlay-link" data-action="close-add-photos">Cancel</button>
            </div>
          </div>
        </section>

        <!-- People tagging dialog -->
        <section class="overlay tag-people-overlay" data-component="tag-people-overlay" hidden aria-hidden="true">
          <div class="overlay-content">
            <header class="overlay-header">
              <h2>Tag People on Selected Photos</h2>
              <button type="button" class="overlay-close" data-action="close-tag-people">&times;</button>
            </header>
            <p class="tag-people-summary"><span data-field="tag-selection-count">0</span> photos selected.</p>
            <div class="people-search">
              <label for="people-search-input">Search person</label>
              <input type="text" id="people-search-input" data-action="people-search-input" autocomplete="off" />
              <ul class="people-search-results" data-populate="people-search-results">
                <!-- People search results rendered by JavaScript -->
              </ul>
            </div>
            <div class="overlay-actions">
              <button type="button" class="overlay-primary" data-action="apply-people-tag" disabled>Apply Tag</button>
              <button type="button" class="overlay-link" data-action="close-tag-people">Cancel</button>
            </div>
          </div>
        </section>

        <!-- Message shown when id parameter is missing or album cannot be loaded -->
        <div class="album-missing-message" data-component="album-missing" hidden>
          <p>No album selected. <a href="albums.html">Go back to Albums</a>.</p>
        </div>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <nav class="footer-nav" aria-label="Footer">
        <a href="about.html" title="About this travel photo gallery">About</a>
        <span class="footer-separator">&middot;</span>
        <a href="help.html" title="Help and usage guide">Help</a>
      </nav>
      <p class="footer-meta">&copy; 2024 Travel Photo Gallery</p>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var currentUrl = new URL(window.location.href);
      var urlParams = currentUrl.searchParams;
      var albumIdParam = urlParams.get('id');

      var albumMissingEl = document.querySelector('[data-component="album-missing"]');
      var albumDetailRoot = document.querySelector('.album-detail-page');

      if (!albumIdParam) {
        if (albumMissingEl) {
          albumMissingEl.removeAttribute('hidden');
        }
        if (albumDetailRoot) {
          albumDetailRoot.classList.add('is-missing-album');
        }
        return;
      }

      var albumId = albumIdParam;
      var currentPhotoPage = parseInt(urlParams.get('page') || '1', 10);
      if (isNaN(currentPhotoPage) || currentPhotoPage < 1) currentPhotoPage = 1;
      var currentCommentsPage = parseInt(urlParams.get('commentsPage') || '1', 10);
      if (isNaN(currentCommentsPage) || currentCommentsPage < 1) currentCommentsPage = 1;
      var photoPageSize = 48;
      var commentsPageSize = 20;
      var totalPhotos = 0;
      var totalComments = 0;

      var selectedPhotoIds = new Set();
      var photoStateById = {};

      var currentFilters = buildFiltersFromUrl(urlParams);
      var currentSortUrl = urlParams.get('sort') || 'date_desc';
      var currentSortApi = mapSortUrlToApi(currentSortUrl);
      var peopleFilterOptions = [];
      var tagFilterOptions = [];
      var albumFilterDates = [];

      // Cache DOM elements
      var headerEl = document.querySelector('[data-component="album-header"]');
      var backLinkEl = headerEl ? headerEl.querySelector('[data-action="back-to-albums"]') : null;
      var titleFieldEl = headerEl ? headerEl.querySelector('[data-field="title"]') : null;
      var dateRangeFieldEl = headerEl ? headerEl.querySelector('[data-field="date-range"]') : null;
      var locationFieldEl = headerEl ? headerEl.querySelector('[data-field="location"]') : null;
      var privacyFieldEl = headerEl ? headerEl.querySelector('[data-field="privacy"]') : null;
      var photoCountFieldEl = headerEl ? headerEl.querySelector('[data-field="photo-count"]') : null;
      var addPhotosLinkEl = headerEl ? headerEl.querySelector('[data-action="open-add-photos"]') : null;

      var filtersRowEl = document.querySelector('[data-component="photo-filters"]');
      var dateFilterSelect = filtersRowEl ? filtersRowEl.querySelector('[data-filter="date"]') : null;
      var peopleFilterSelect = filtersRowEl ? filtersRowEl.querySelector('[data-filter="people"]') : null;
      var tagsFilterSelect = filtersRowEl ? filtersRowEl.querySelector('[data-filter="tags"]') : null;
      var favoritesCheckbox = filtersRowEl ? filtersRowEl.querySelector('[data-filter="favorites"]') : null;
      var sortSelect = filtersRowEl ? filtersRowEl.querySelector('[data-filter="sort"]') : null;
      var resetFiltersButton = filtersRowEl ? filtersRowEl.querySelector('[data-action="reset-filters"]') : null;

      var bulkToolbarEl = document.querySelector('[data-component="bulk-toolbar"]');
      var selectedCountFieldEl = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-field="selected-count"]') : null;
      var clearSelectionButton = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-action="clear-selection"]') : null;
      var bulkLikeButton = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-action="bulk-like"]') : null;
      var bulkUnlikeButton = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-action="bulk-unlike"]') : null;
      var bulkMarkPrintButton = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-action="bulk-mark-print"]') : null;
      var bulkUnmarkPrintButton = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-action="bulk-unmark-print"]') : null;
      var bulkRemoveButton = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-action="bulk-remove"]') : null;
      var bulkAddCollectionButton = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-action="bulk-add-collection"]') : null;
      var bulkTagPeopleButton = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-action="bulk-tag-people"]') : null;
      var bulkCreateSlideshowButton = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-action="bulk-create-slideshow"]') : null;
      var collectionPickerEl = bulkToolbarEl ? bulkToolbarEl.querySelector('[data-component="collection-picker"]') : null;
      var collectionSelectEl = collectionPickerEl ? collectionPickerEl.querySelector('[data-field="collection-select"]') : null;
      var collectionConfirmButton = collectionPickerEl ? collectionPickerEl.querySelector('[data-action="confirm-add-collection"]') : null;
      var collectionCancelButton = collectionPickerEl ? collectionPickerEl.querySelector('[data-action="cancel-add-collection"]') : null;

      var photoGridSectionEl = document.querySelector('[data-component="album-photos"]');
      var photoGridSummaryEl = photoGridSectionEl ? photoGridSectionEl.querySelector('[data-field="grid-summary"]') : null;
      var photoPageInfoEl = photoGridSectionEl ? photoGridSectionEl.querySelector('[data-field="photo-page-info"]') : null;
      var photoPrevPageButton = photoGridSectionEl ? photoGridSectionEl.querySelector('[data-action="photo-prev-page"]') : null;
      var photoNextPageButton = photoGridSectionEl ? photoGridSectionEl.querySelector('[data-action="photo-next-page"]') : null;
      var photoGridListEl = document.querySelector('[data-populate="album-photos"]');

      var commentsSectionEl = document.querySelector('[data-component="album-comments"]');
      var commentsCountEl = commentsSectionEl ? commentsSectionEl.querySelector('[data-field="comments-count"]') : null;
      var commentsListEl = document.querySelector('[data-populate="album-comments"]');
      var commentsPageInfoEl = commentsSectionEl ? commentsSectionEl.querySelector('[data-field="comments-page-info"]') : null;
      var commentsPrevButton = commentsSectionEl ? commentsSectionEl.querySelector('[data-action="comments-prev-page"]') : null;
      var commentsNextButton = commentsSectionEl ? commentsSectionEl.querySelector('[data-action="comments-next-page"]') : null;
      var commentFormEl = commentsSectionEl ? commentsSectionEl.querySelector('[data-action="comment-form"]') : null;
      var commentTextareaEl = commentFormEl ? commentFormEl.querySelector('textarea[name="comment"]') : null;

      var addPhotosOverlayEl = document.querySelector('[data-component="add-photos-overlay"]');
      var addPhotosOverlayYearSelect = addPhotosOverlayEl ? addPhotosOverlayEl.querySelector('[data-overlay-filter="year"]') : null;
      var addPhotosOverlayLocationInput = addPhotosOverlayEl ? addPhotosOverlayEl.querySelector('[data-overlay-filter="location"]') : null;
      var addPhotosOverlayRefreshButton = addPhotosOverlayEl ? addPhotosOverlayEl.querySelector('[data-action="overlay-refresh"]') : null;
      var addPhotosOverlaySummaryEl = addPhotosOverlayEl ? addPhotosOverlayEl.querySelector('[data-field="overlay-summary"]') : null;
      var addPhotosOverlayPageInfoEl = addPhotosOverlayEl ? addPhotosOverlayEl.querySelector('[data-field="overlay-page-info"]') : null;
      var addPhotosOverlayPrevButton = addPhotosOverlayEl ? addPhotosOverlayEl.querySelector('[data-action="overlay-prev-page"]') : null;
      var addPhotosOverlayNextButton = addPhotosOverlayEl ? addPhotosOverlayEl.querySelector('[data-action="overlay-next-page"]') : null;
      var addPhotosOverlayCloseButtons = addPhotosOverlayEl ? addPhotosOverlayEl.querySelectorAll('[data-action="close-add-photos"]') : null;
      var addPhotosOverlayAddSelectedButton = addPhotosOverlayEl ? addPhotosOverlayEl.querySelector('[data-action="overlay-add-selected"]') : null;
      var addPhotosOverlayListEl = document.querySelector('[data-populate="overlay-photos"]');

      var tagPeopleOverlayEl = document.querySelector('[data-component="tag-people-overlay"]');
      var tagPeopleSelectionCountEl = tagPeopleOverlayEl ? tagPeopleOverlayEl.querySelector('[data-field="tag-selection-count"]') : null;
      var tagPeopleSearchInput = tagPeopleOverlayEl ? tagPeopleOverlayEl.querySelector('[data-action="people-search-input"]') : null;
      var tagPeopleResultsListEl = document.querySelector('[data-populate="people-search-results"]');
      var tagPeopleApplyButton = tagPeopleOverlayEl ? tagPeopleOverlayEl.querySelector('[data-action="apply-people-tag"]') : null;
      var tagPeopleCloseButtons = tagPeopleOverlayEl ? tagPeopleOverlayEl.querySelectorAll('[data-action="close-tag-people"]') : null;

      var overlayCurrentPage = 1;
      var overlayPageSize = 30;
      var overlayTotalPhotos = 0;
      var overlaySelectedPhotoIds = new Set();
      var peopleSearchTimeoutId = null;
      var selectedPersonIdForTagging = null;

      // Static event handlers
      if (backLinkEl) {
        backLinkEl.addEventListener('click', function(evt) {
          evt.preventDefault();
          window.location.href = 'albums.html';
        });
      }

      if (addPhotosLinkEl && addPhotosOverlayEl) {
        addPhotosLinkEl.addEventListener('click', function(evt) {
          evt.preventDefault();
          openAddPhotosOverlay();
        });
      }

      if (dateFilterSelect) {
        dateFilterSelect.addEventListener('change', handleFilterChangeFromUI);
      }
      if (peopleFilterSelect) {
        peopleFilterSelect.addEventListener('change', handleFilterChangeFromUI);
      }
      if (tagsFilterSelect) {
        tagsFilterSelect.addEventListener('change', handleFilterChangeFromUI);
      }
      if (favoritesCheckbox) {
        favoritesCheckbox.addEventListener('change', handleFilterChangeFromUI);
      }
      if (sortSelect) {
        sortSelect.addEventListener('change', handleFilterChangeFromUI);
      }
      if (resetFiltersButton) {
        resetFiltersButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          resetFilters();
        });
      }

      if (clearSelectionButton) {
        clearSelectionButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          clearSelection();
        });
      }
      if (bulkLikeButton) {
        bulkLikeButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          handleBulkLike(true);
        });
      }
      if (bulkUnlikeButton) {
        bulkUnlikeButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          handleBulkLike(false);
        });
      }
      if (bulkMarkPrintButton) {
        bulkMarkPrintButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          handleBulkMarkToPrint(true);
        });
      }
      if (bulkUnmarkPrintButton) {
        bulkUnmarkPrintButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          handleBulkMarkToPrint(false);
        });
      }
      if (bulkRemoveButton) {
        bulkRemoveButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          handleBulkRemoveFromAlbum();
        });
      }
      if (bulkAddCollectionButton) {
        bulkAddCollectionButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          toggleCollectionPicker(true);
        });
      }
      if (collectionCancelButton) {
        collectionCancelButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          toggleCollectionPicker(false);
        });
      }
      if (collectionConfirmButton) {
        collectionConfirmButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          handleBulkAddToCollection();
        });
      }
      if (bulkTagPeopleButton) {
        bulkTagPeopleButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          openTagPeopleOverlay();
        });
      }
      if (bulkCreateSlideshowButton) {
        bulkCreateSlideshowButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          handleCreateSlideshow();
        });
      }

      if (photoPrevPageButton) {
        photoPrevPageButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          if (currentPhotoPage > 1) {
            currentPhotoPage -= 1;
            syncPhotoPageToUrlAndReload();
          }
        });
      }
      if (photoNextPageButton) {
        photoNextPageButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          var maxPage = Math.max(1, Math.ceil(totalPhotos / photoPageSize));
          if (currentPhotoPage < maxPage) {
            currentPhotoPage += 1;
            syncPhotoPageToUrlAndReload();
          }
        });
      }

      if (photoGridListEl) {
        photoGridListEl.addEventListener('click', handlePhotoGridClick);
      }

      if (commentsPrevButton) {
        commentsPrevButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          if (currentCommentsPage > 1) {
            currentCommentsPage -= 1;
            syncCommentsPageToUrlAndReload();
          }
        });
      }
      if (commentsNextButton) {
        commentsNextButton.addEventListener('click', function(evt) {
          evt.preventDefault();
          var maxCommentsPage = Math.max(1, Math.ceil(totalComments / commentsPageSize));
          if (currentCommentsPage < maxCommentsPage) {
            currentCommentsPage += 1;
            syncCommentsPageToUrlAndReload();
          }
        });
      }
      if (commentFormEl) {
        commentFormEl.addEventListener('submit', function(evt) {
          evt.preventDefault();
          handlePostComment();
        });
      }

      if (addPhotosOverlayEl) {
        if (addPhotosOverlayRefreshButton) {
          addPhotosOverlayRefreshButton.addEventListener('click', function(evt) {
            evt.preventDefault();
            overlayCurrentPage = 1;
            refreshOverlayPhotos();
          });
        }
        if (addPhotosOverlayPrevButton) {
          addPhotosOverlayPrevButton.addEventListener('click', function(evt) {
            evt.preventDefault();
            if (overlayCurrentPage > 1) {
              overlayCurrentPage -= 1;
              refreshOverlayPhotos();
            }
          });
        }
        if (addPhotosOverlayNextButton) {
          addPhotosOverlayNextButton.addEventListener('click', function(evt) {
            evt.preventDefault();
            var maxOverlayPage = Math.max(1, Math.ceil(overlayTotalPhotos / overlayPageSize));
            if (overlayCurrentPage < maxOverlayPage) {
              overlayCurrentPage += 1;
              refreshOverlayPhotos();
            }
          });
        }
        if (addPhotosOverlayAddSelectedButton) {
          addPhotosOverlayAddSelectedButton.addEventListener('click', function(evt) {
            evt.preventDefault();
            handleAddOverlayPhotosToAlbum();
          });
        }
        if (addPhotosOverlayCloseButtons) {
          addPhotosOverlayCloseButtons.forEach(function(btn) {
            btn.addEventListener('click', function(evt) {
              evt.preventDefault();
              closeAddPhotosOverlay();
            });
          });
        }
        if (addPhotosOverlayYearSelect) {
          addPhotosOverlayYearSelect.addEventListener('change', function() {
            overlayCurrentPage = 1;
            refreshOverlayPhotos();
          });
        }
        if (addPhotosOverlayLocationInput) {
          addPhotosOverlayLocationInput.addEventListener('change', function() {
            overlayCurrentPage = 1;
            refreshOverlayPhotos();
          });
        }
        if (addPhotosOverlayListEl) {
          addPhotosOverlayListEl.addEventListener('click', handleOverlayPhotoGridClick);
        }
      }

      if (tagPeopleOverlayEl) {
        if (tagPeopleSearchInput) {
          tagPeopleSearchInput.addEventListener('input', function() {
            schedulePeopleSearch(tagPeopleSearchInput.value || '');
          });
        }
        if (tagPeopleApplyButton) {
          tagPeopleApplyButton.addEventListener('click', function(evt) {
            evt.preventDefault();
            applyPeopleTagging();
          });
        }
        if (tagPeopleCloseButtons) {
          tagPeopleCloseButtons.forEach(function(btn) {
            btn.addEventListener('click', function(evt) {
              evt.preventDefault();
              closeTagPeopleOverlay();
            });
          });
        }
        if (tagPeopleResultsListEl) {
          tagPeopleResultsListEl.addEventListener('click', handlePeopleResultClick);
        }
      }

      window.addEventListener('popstate', function() {
        var updatedUrl = new URL(window.location.href);
        var updatedParams = updatedUrl.searchParams;
        currentPhotoPage = parseInt(updatedParams.get('page') || '1', 10);
        if (isNaN(currentPhotoPage) || currentPhotoPage < 1) currentPhotoPage = 1;
        currentCommentsPage = parseInt(updatedParams.get('commentsPage') || '1', 10);
        if (isNaN(currentCommentsPage) || currentCommentsPage < 1) currentCommentsPage = 1;
        currentFilters = buildFiltersFromUrl(updatedParams);
        currentSortUrl = updatedParams.get('sort') || 'date_desc';
        currentSortApi = mapSortUrlToApi(currentSortUrl);
        syncFilterUIFromState();
        loadAlbumPhotos();
        loadAlbumComments();
      });

      // Initial load
      try {
        loadAlbumDetail();
        loadFilterOptions();
        syncFilterUIFromState();
        loadAlbumPhotos();
        loadCollectionsIntoPicker();
        loadAlbumComments();
      } catch (err) {
        console.error('Error initializing album detail page', err);
        if (albumMissingEl) {
          albumMissingEl.textContent = 'An error occurred while loading this album.';
          albumMissingEl.removeAttribute('hidden');
        }
      }

      // Helper functions
      function buildFiltersFromUrl(searchParams) {
        var filters = {};
        var dateParam = searchParams.get('date');
        if (dateParam) {
          filters.specificDate = dateParam;
        }
        var favoritesParam = searchParams.get('favorites');
        if (favoritesParam === '1') {
          filters.favoritesOnly = true;
        }
        var peopleFilterParam = searchParams.get('peopleFilter');
        if (peopleFilterParam === 'untagged') {
          filters.peopleFilterMode = 'untagged';
          filters.personIds = [];
        } else if (peopleFilterParam) {
          filters.peopleFilterMode = 'any';
          filters.personIds = [peopleFilterParam];
        } else {
          filters.peopleFilterMode = 'any';
          filters.personIds = [];
        }
        var tagsParam = searchParams.get('tags');
        if (tagsParam) {
          filters.tagIds = [tagsParam];
        } else {
          filters.tagIds = [];
        }
        return filters;
      }

      function mapSortUrlToApi(sortUrlValue) {
        if (sortUrlValue === 'date_asc') {
          return 'date_taken_oldest';
        }
        if (sortUrlValue === 'likes_desc') {
          return 'likes_high_to_low';
        }
        return 'date_taken_newest';
      }

      function updateUrlSearchParams(changes, options) {
        var useReplace = !options || options.replace !== false ? true : false;
        var current = new URL(window.location.href);
        var sp = current.searchParams;
        Object.keys(changes).forEach(function(key) {
          var value = changes[key];
          if (value === null || typeof value === 'undefined' || value === '') {
            sp.delete(key);
          } else {
            sp.set(key, String(value));
          }
        });
        var newUrl = current.pathname + '?' + sp.toString();
        if (useReplace) {
          window.history.replaceState({}, '', newUrl);
        } else {
          window.history.pushState({}, '', newUrl);
        }
      }

      function loadAlbumDetail() {
        var detail = WebsiteSDK.getAlbumDetail(albumId);
        if (!detail || !detail.album) {
          if (albumMissingEl) {
            albumMissingEl.textContent = 'Album not found.';
            albumMissingEl.removeAttribute('hidden');
          }
          return;
        }
        var album = detail.album;
        if (titleFieldEl) {
          titleFieldEl.textContent = album.title || 'Untitled album';
        }
        if (dateRangeFieldEl) {
          if (detail.dateRange && (detail.dateRange.startDate || detail.dateRange.endDate)) {
            var start = detail.dateRange.startDate ? detail.dateRange.startDate : '';
            var end = detail.dateRange.endDate ? detail.dateRange.endDate : '';
            if (start && end && start !== end) {
              dateRangeFieldEl.textContent = start + '  ' + end;
            } else {
              dateRangeFieldEl.textContent = start || end;
            }
          } else {
            dateRangeFieldEl.textContent = '';
          }
        }
        if (locationFieldEl) {
          locationFieldEl.textContent = detail.locationSummary || '';
        }
        if (privacyFieldEl) {
          privacyFieldEl.textContent = album.privacy === 'public' ? 'Public' : 'Private';
        }
        if (photoCountFieldEl) {
          if (typeof detail.photoCount === 'number') {
            photoCountFieldEl.textContent = detail.photoCount + ' photos';
          } else {
            photoCountFieldEl.textContent = '';
          }
        }
      }

      function loadFilterOptions() {
        var filterOptions = WebsiteSDK.getAlbumPhotoFilterOptions(albumId);
        albumFilterDates = filterOptions && filterOptions.availableDates ? filterOptions.availableDates : [];
        peopleFilterOptions = filterOptions && filterOptions.people ? filterOptions.people : [];
        tagFilterOptions = filterOptions && filterOptions.tags ? filterOptions.tags : [];
        populateFilterControls();
      }

      function populateFilterControls() {
        if (dateFilterSelect) {
          var previouslySelected = dateFilterSelect.value;
          dateFilterSelect.innerHTML = '';
          var allOption = document.createElement('option');
          allOption.value = '';
          allOption.textContent = 'All dates';
          dateFilterSelect.appendChild(allOption);
          albumFilterDates.forEach(function(item) {
            var opt = document.createElement('option');
            opt.value = item.date;
            var countSuffix = typeof item.photoCount === 'number' ? ' (' + item.photoCount + ')' : '';
            opt.textContent = item.date + countSuffix;
            dateFilterSelect.appendChild(opt);
          });
          var dateFromFilters = currentFilters && currentFilters.specificDate ? currentFilters.specificDate : previouslySelected;
          if (dateFromFilters) {
            dateFilterSelect.value = dateFromFilters;
          }
        }
        if (peopleFilterSelect) {
          var previousPeople = peopleFilterSelect.value;
          peopleFilterSelect.innerHTML = '';
          var anyOpt = document.createElement('option');
          anyOpt.value = '';
          anyOpt.textContent = 'Anyone';
          peopleFilterSelect.appendChild(anyOpt);
          var untaggedOpt = document.createElement('option');
          untaggedOpt.value = 'untagged';
          untaggedOpt.textContent = 'Untagged';
          peopleFilterSelect.appendChild(untaggedOpt);
          peopleFilterOptions.forEach(function(person) {
            var optP = document.createElement('option');
            optP.value = person.id;
            optP.textContent = person.displayName || person.name;
            peopleFilterSelect.appendChild(optP);
          });
          var desiredValue = '';
          if (currentFilters && currentFilters.peopleFilterMode === 'untagged') {
            desiredValue = 'untagged';
          } else if (currentFilters && currentFilters.personIds && currentFilters.personIds.length > 0) {
            desiredValue = currentFilters.personIds[0];
          } else {
            desiredValue = previousPeople || '';
          }
          peopleFilterSelect.value = desiredValue;
        }
        if (tagsFilterSelect) {
          var prevTag = tagsFilterSelect.value;
          tagsFilterSelect.innerHTML = '';
          var allTags = document.createElement('option');
          allTags.value = '';
          allTags.textContent = 'All tags';
          tagsFilterSelect.appendChild(allTags);
          tagFilterOptions.forEach(function(tag) {
            var optT = document.createElement('option');
            optT.value = tag.id;
            optT.textContent = tag.name;
            tagsFilterSelect.appendChild(optT);
          });
          var desiredTag = currentFilters && currentFilters.tagIds && currentFilters.tagIds.length > 0 ? currentFilters.tagIds[0] : prevTag;
          if (desiredTag) {
            tagsFilterSelect.value = desiredTag;
          }
        }
        if (favoritesCheckbox) {
          favoritesCheckbox.checked = !!(currentFilters && currentFilters.favoritesOnly);
        }
        if (sortSelect) {
          sortSelect.innerHTML = '';
          var optionNewest = document.createElement('option');
          optionNewest.value = 'date_desc';
          optionNewest.textContent = 'Date taken – Newest first';
          var optionOldest = document.createElement('option');
          optionOldest.value = 'date_asc';
          optionOldest.textContent = 'Date taken – Oldest first';
          var optionLikes = document.createElement('option');
          optionLikes.value = 'likes_desc';
          optionLikes.textContent = 'Likes – High to low';
          sortSelect.appendChild(optionNewest);
          sortSelect.appendChild(optionOldest);
          sortSelect.appendChild(optionLikes);
          sortSelect.value = currentSortUrl || 'date_desc';
        }
      }

      function syncFilterUIFromState() {
        if (dateFilterSelect) {
          dateFilterSelect.value = currentFilters && currentFilters.specificDate ? currentFilters.specificDate : '';
        }
        if (peopleFilterSelect) {
          if (currentFilters && currentFilters.peopleFilterMode === 'untagged') {
            peopleFilterSelect.value = 'untagged';
          } else if (currentFilters && currentFilters.personIds && currentFilters.personIds.length > 0) {
            peopleFilterSelect.value = currentFilters.personIds[0];
          } else {
            peopleFilterSelect.value = '';
          }
        }
        if (tagsFilterSelect) {
          if (currentFilters && currentFilters.tagIds && currentFilters.tagIds.length > 0) {
            tagsFilterSelect.value = currentFilters.tagIds[0];
          } else {
            tagsFilterSelect.value = '';
          }
        }
        if (favoritesCheckbox) {
          favoritesCheckbox.checked = !!(currentFilters && currentFilters.favoritesOnly);
        }
        if (sortSelect) {
          sortSelect.value = currentSortUrl || 'date_desc';
        }
      }

      function handleFilterChangeFromUI() {
        var newChanges = {};
        if (dateFilterSelect) {
          var val = dateFilterSelect.value || '';
          newChanges.date = val;
        }
        if (peopleFilterSelect) {
          var pVal = peopleFilterSelect.value || '';
          newChanges.peopleFilter = pVal;
        }
        if (tagsFilterSelect) {
          var tVal = tagsFilterSelect.value || '';
          newChanges.tags = tVal;
        }
        if (favoritesCheckbox) {
          newChanges.favorites = favoritesCheckbox.checked ? '1' : '';
        }
        if (sortSelect) {
          newChanges.sort = sortSelect.value || 'date_desc';
        }
        newChanges.page = '1';
        updateUrlSearchParams(newChanges, { replace: false });
        var updatedUrl = new URL(window.location.href);
        var updatedParams = updatedUrl.searchParams;
        currentFilters = buildFiltersFromUrl(updatedParams);
        currentSortUrl = updatedParams.get('sort') || 'date_desc';
        currentSortApi = mapSortUrlToApi(currentSortUrl);
        currentPhotoPage = 1;
        clearSelection();
        loadAlbumPhotos();
      }

      function resetFilters() {
        var changes = {
          date: '',
          peopleFilter: '',
          tags: '',
          favorites: '',
          sort: 'date_desc',
          page: '1'
        };
        updateUrlSearchParams(changes, { replace: false });
        var updatedUrl = new URL(window.location.href);
        var updatedParams = updatedUrl.searchParams;
        currentFilters = buildFiltersFromUrl(updatedParams);
        currentSortUrl = updatedParams.get('sort') || 'date_desc';
        currentSortApi = mapSortUrlToApi(currentSortUrl);
        currentPhotoPage = 1;
        syncFilterUIFromState();
        clearSelection();
        loadAlbumPhotos();
      }

      function loadAlbumPhotos() {
        var filtersForApi = {};
        if (currentFilters.specificDate) {
          filtersForApi.specificDate = currentFilters.specificDate;
        }
        if (currentFilters.favoritesOnly) {
          filtersForApi.favoritesOnly = true;
        }
        if (currentFilters.peopleFilterMode) {
          filtersForApi.peopleFilterMode = currentFilters.peopleFilterMode;
        }
        if (currentFilters.personIds && currentFilters.personIds.length > 0) {
          filtersForApi.personIds = currentFilters.personIds.slice();
        }
        if (currentFilters.tagIds && currentFilters.tagIds.length > 0) {
          filtersForApi.tagIds = currentFilters.tagIds.slice();
        }
        var response = WebsiteSDK.getAlbumPhotos(albumId, filtersForApi, currentSortApi, currentPhotoPage, photoPageSize);
        var photos = response && response.photos ? response.photos : [];
        totalPhotos = response && typeof response.totalCount === 'number' ? response.totalCount : photos.length;
        photoStateById = {};
        photos.forEach(function(photo) {
          photoStateById[photo.id] = {
            isFavorite: !!photo.isFavorite,
            toPrint: !!photo.toPrint
          };
        });
        if (photoGridListEl) {
          renderAlbumPhotos(photoGridListEl, photos);
        }
        updatePhotoGridMeta();
      }

      function renderAlbumPhotos(container, photos) {
        container.innerHTML = '';
        if (!photos || photos.length === 0) {
          var emptyItem = document.createElement('li');
          emptyItem.className = 'photo-grid-empty';
          emptyItem.textContent = 'No photos match the current filters.';
          container.appendChild(emptyItem);
          return;
        }
        photos.forEach(function(photo) {
          var li = document.createElement('li');
          li.className = 'photo-grid-item';
          li.dataset.photoId = photo.id;

          var frame = document.createElement('div');
          frame.className = 'photo-thumb-frame';
          frame.dataset.action = 'open-photo';
          frame.dataset.photoId = photo.id;

          var img = document.createElement('img');
          img.src = photo.thumbnailUrl || photo.fileUrl;
          img.alt = photo.title || '';
          frame.appendChild(img);

          var meta = document.createElement('div');
          meta.className = 'photo-thumb-meta';

          var selectLabel = document.createElement('label');
          selectLabel.className = 'photo-select-label';
          var checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.dataset.action = 'toggle-photo-select';
          checkbox.dataset.photoId = photo.id;
          checkbox.checked = selectedPhotoIds.has(photo.id);
          selectLabel.appendChild(checkbox);
          var selectLabelText = document.createElement('span');
          selectLabelText.textContent = 'Select';
          selectLabel.appendChild(selectLabelText);
          meta.appendChild(selectLabel);

          var likeButton = document.createElement('button');
          likeButton.type = 'button';
          likeButton.className = 'photo-inline-action';
          likeButton.dataset.action = 'thumb-like';
          likeButton.dataset.photoId = photo.id;
          likeButton.textContent = photo.isFavorite ? 'Unlike' : 'Like';
          meta.appendChild(likeButton);

          var printButton = document.createElement('button');
          printButton.type = 'button';
          printButton.className = 'photo-inline-action';
          printButton.dataset.action = 'thumb-print';
          printButton.dataset.photoId = photo.id;
          printButton.textContent = photo.toPrint ? 'Unmark To Print' : 'Mark To Print';
          meta.appendChild(printButton);

          var coverButton = document.createElement('button');
          coverButton.type = 'button';
          coverButton.className = 'photo-inline-action';
          coverButton.dataset.action = 'thumb-set-cover';
          coverButton.dataset.photoId = photo.id;
          coverButton.textContent = 'Set as Album Cover';
          meta.appendChild(coverButton);

          li.appendChild(frame);
          li.appendChild(meta);

          if (selectedPhotoIds.has(photo.id)) {
            li.classList.add('is-selected');
          }

          container.appendChild(li);
        });
      }

      function updatePhotoGridMeta() {
        if (!photoGridSummaryEl || !photoPageInfoEl) {
          return;
        }
        if (totalPhotos === 0) {
          photoGridSummaryEl.textContent = 'No photos';
          photoPageInfoEl.textContent = '';
          return;
        }
        var startIndex = (currentPhotoPage - 1) * photoPageSize + 1;
        var endIndex = Math.min(currentPhotoPage * photoPageSize, totalPhotos);
        photoGridSummaryEl.textContent = 'Showing ' + startIndex + '–' + endIndex + ' of ' + totalPhotos + ' photos';
        var maxPage = Math.max(1, Math.ceil(totalPhotos / photoPageSize));
        photoPageInfoEl.textContent = 'Page ' + currentPhotoPage + ' of ' + maxPage;
      }

      function handlePhotoGridClick(evt) {
        var target = evt.target;
        if (!target) return;
        var action = target.dataset.action;
        if (action === 'toggle-photo-select') {
          evt.stopPropagation();
          var photoId = target.dataset.photoId;
          var checked = target.checked;
          if (checked) {
            selectedPhotoIds.add(photoId);
          } else {
            selectedPhotoIds.delete(photoId);
          }
          updateBulkToolbar();
          var item = target.closest('.photo-grid-item');
          if (item) {
            if (checked) {
              item.classList.add('is-selected');
            } else {
              item.classList.remove('is-selected');
            }
          }
          return;
        }
        if (action === 'thumb-like') {
          evt.preventDefault();
          evt.stopPropagation();
          var photoIdLike = target.dataset.photoId;
          var stateLike = photoStateById[photoIdLike];
          var currentLike = stateLike && stateLike.isFavorite ? true : false;
          var desiredLike = !currentLike;
          WebsiteSDK.bulkLikePhotos([photoIdLike], desiredLike);
          loadAlbumPhotos();
          return;
        }
        if (action === 'thumb-print') {
          evt.preventDefault();
          evt.stopPropagation();
          var photoIdPrint = target.dataset.photoId;
          var statePrint = photoStateById[photoIdPrint];
          var currentToPrint = statePrint && statePrint.toPrint ? true : false;
          var desiredToPrint = !currentToPrint;
          WebsiteSDK.bulkMarkPhotosToPrint([photoIdPrint], desiredToPrint);
          loadAlbumPhotos();
          return;
        }
        if (action === 'thumb-set-cover') {
          evt.preventDefault();
          evt.stopPropagation();
          var photoIdCover = target.dataset.photoId;
          WebsiteSDK.setAlbumCoverPhoto(albumId, photoIdCover);
          loadAlbumDetail();
          return;
        }
        if (action === 'open-photo') {
          evt.preventDefault();
          var photoIdOpen = target.dataset.photoId;
          if (!photoIdOpen) return;
          var contextValue = 'album:' + albumId;
          var dest = 'photo_detail.html?id=' + encodeURIComponent(photoIdOpen) + '&context=' + encodeURIComponent(contextValue);
          window.location.href = dest;
          return;
        }
      }

      function updateBulkToolbar() {
        var count = selectedPhotoIds.size;
        if (!bulkToolbarEl) return;
        if (selectedCountFieldEl) {
          selectedCountFieldEl.textContent = String(count);
        }
        if (count > 0) {
          bulkToolbarEl.hidden = false;
        } else {
          bulkToolbarEl.hidden = true;
          toggleCollectionPicker(false);
        }
      }

      function clearSelection() {
        selectedPhotoIds = new Set();
        updateBulkToolbar();
        if (!photoGridListEl) return;
        var checkboxes = photoGridListEl.querySelectorAll('input[type="checkbox"][data-action="toggle-photo-select"]');
        checkboxes.forEach(function(cb) {
          cb.checked = false;
        });
        var items = photoGridListEl.querySelectorAll('.photo-grid-item');
        items.forEach(function(item) {
          item.classList.remove('is-selected');
        });
      }

      function handleBulkLike(desiredLike) {
        if (selectedPhotoIds.size === 0) return;
        WebsiteSDK.bulkLikePhotos(Array.from(selectedPhotoIds), desiredLike);
        loadAlbumPhotos();
      }

      function handleBulkMarkToPrint(desiredToPrint) {
        if (selectedPhotoIds.size === 0) return;
        WebsiteSDK.bulkMarkPhotosToPrint(Array.from(selectedPhotoIds), desiredToPrint);
        loadAlbumPhotos();
      }

      function handleBulkRemoveFromAlbum() {
        if (selectedPhotoIds.size === 0) return;
        var confirmRemoval = window.confirm('Remove selected photos from this album?');
        if (!confirmRemoval) return;
        WebsiteSDK.bulkRemovePhotosFromAlbum(albumId, Array.from(selectedPhotoIds));
        clearSelection();
        loadAlbumPhotos();
        loadAlbumDetail();
      }

      function loadCollectionsIntoPicker() {
        if (!collectionSelectEl) return;
        collectionSelectEl.innerHTML = '';
        var defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = 'Select collection';
        collectionSelectEl.appendChild(defaultOption);
        try {
          var collectionsJson = window.localStorage ? window.localStorage.getItem('collections') : null;
          var collections = collectionsJson ? JSON.parse(collectionsJson) : [];
          collections.forEach(function(col) {
            var opt = document.createElement('option');
            opt.value = col.id;
            opt.textContent = col.name;
            collectionSelectEl.appendChild(opt);
          });
        } catch (e) {
          console.warn('Could not load collections from localStorage', e);
        }
      }

      function toggleCollectionPicker(show) {
        if (!collectionPickerEl) return;
        if (show) {
          collectionPickerEl.hidden = false;
        } else {
          collectionPickerEl.hidden = true;
          if (collectionSelectEl) {
            collectionSelectEl.value = '';
          }
        }
      }

      function handleBulkAddToCollection() {
        if (!collectionSelectEl) return;
        var collectionId = collectionSelectEl.value;
        if (!collectionId) {
          window.alert('Please choose a collection.');
          return;
        }
        if (selectedPhotoIds.size === 0) {
          window.alert('No photos selected.');
          return;
        }
        WebsiteSDK.bulkAddPhotosToCollection(collectionId, Array.from(selectedPhotoIds));
        window.alert('Photos added to collection.');
        toggleCollectionPicker(false);
      }

      function handleCreateSlideshow() {
        if (selectedPhotoIds.size === 0) return;
        var idsParam = Array.from(selectedPhotoIds).join(',');
        var dest = 'slideshow_edit.html?photoIds=' + encodeURIComponent(idsParam);
        window.location.href = dest;
      }

      function syncPhotoPageToUrlAndReload() {
        updateUrlSearchParams({ page: String(currentPhotoPage) }, { replace: false });
        loadAlbumPhotos();
        clearSelection();
      }

      function loadAlbumComments() {
        if (!commentsListEl) return;
        var response = WebsiteSDK.getAlbumComments(albumId, currentCommentsPage, commentsPageSize);
        var comments = response && response.comments ? response.comments : [];
        totalComments = response && typeof response.totalCount === 'number' ? response.totalCount : comments.length;
        renderCommentsList(commentsListEl, comments);
        updateCommentsMeta();
      }

      function renderCommentsList(container, comments) {
        container.innerHTML = '';
        if (!comments || comments.length === 0) {
          var liEmpty = document.createElement('li');
          liEmpty.className = 'comment-empty';
          liEmpty.textContent = 'No comments yet.';
          container.appendChild(liEmpty);
          return;
        }
        comments.forEach(function(comment) {
          var li = document.createElement('li');
          li.className = 'comment-item';
          var textP = document.createElement('p');
          textP.className = 'comment-text';
          textP.textContent = comment.text;
          li.appendChild(textP);
          if (comment.createdAt) {
            var metaP = document.createElement('p');
            metaP.className = 'comment-meta';
            metaP.textContent = comment.createdAt;
            li.appendChild(metaP);
          }
          container.appendChild(li);
        });
      }

      function updateCommentsMeta() {
        if (commentsCountEl) {
          commentsCountEl.textContent = totalComments ? totalComments + ' comments' : '0 comments';
        }
        if (commentsPageInfoEl) {
          if (!totalComments) {
            commentsPageInfoEl.textContent = '';
          } else {
            var maxPage = Math.max(1, Math.ceil(totalComments / commentsPageSize));
            commentsPageInfoEl.textContent = 'Page ' + currentCommentsPage + ' of ' + maxPage;
          }
        }
      }

      function syncCommentsPageToUrlAndReload() {
        updateUrlSearchParams({ commentsPage: String(currentCommentsPage) }, { replace: false });
        loadAlbumComments();
      }

      function handlePostComment() {
        if (!commentTextareaEl) return;
        var text = commentTextareaEl.value ? commentTextareaEl.value.trim() : '';
        if (!text) {
          return;
        }
        WebsiteSDK.addAlbumComment(albumId, text);
        commentTextareaEl.value = '';
        currentCommentsPage = 1;
        syncCommentsPageToUrlAndReload();
      }

      function openAddPhotosOverlay() {
        if (!addPhotosOverlayEl) return;
        overlayCurrentPage = 1;
        overlaySelectedPhotoIds = new Set();
        if (addPhotosOverlayYearSelect) {
          populateOverlayYears();
        }
        addPhotosOverlayEl.hidden = false;
        addPhotosOverlayEl.setAttribute('aria-hidden', 'false');
        refreshOverlayPhotos();
      }

      function closeAddPhotosOverlay() {
        if (!addPhotosOverlayEl) return;
        addPhotosOverlayEl.hidden = true;
        addPhotosOverlayEl.setAttribute('aria-hidden', 'true');
      }

      function populateOverlayYears() {
        if (!addPhotosOverlayYearSelect) return;
        var previous = addPhotosOverlayYearSelect.value;
        addPhotosOverlayYearSelect.innerHTML = '';
        var anyOpt = document.createElement('option');
        anyOpt.value = '';
        anyOpt.textContent = 'Any year';
        addPhotosOverlayYearSelect.appendChild(anyOpt);
        try {
          var photosJson = window.localStorage ? window.localStorage.getItem('photos') : null;
          var photos = photosJson ? JSON.parse(photosJson) : [];
          var yearsSet = {};
          photos.forEach(function(photo) {
            if (photo.captureDate) {
              var year = String(photo.captureDate).slice(0, 4);
              if (year && !yearsSet[year]) {
                yearsSet[year] = true;
              }
            }
          });
          var years = Object.keys(yearsSet).sort();
          years.forEach(function(year) {
            var opt = document.createElement('option');
            opt.value = year;
            opt.textContent = year;
            addPhotosOverlayYearSelect.appendChild(opt);
          });
          if (previous) {
            addPhotosOverlayYearSelect.value = previous;
          }
        } catch (e) {
          console.warn('Could not populate years for add-photos overlay', e);
        }
      }

      function refreshOverlayPhotos() {
        if (!addPhotosOverlayEl || !addPhotosOverlayListEl) return;
        var sourceScopeId = addPhotosOverlayEl.dataset.sourceScopeId || albumId;
        var filters = {};
        if (addPhotosOverlayYearSelect && addPhotosOverlayYearSelect.value) {
          var year = addPhotosOverlayYearSelect.value;
          filters.dateFrom = year + '-01-01';
          filters.dateTo = year + '-12-31';
        }
        if (addPhotosOverlayLocationInput && addPhotosOverlayLocationInput.value) {
          filters.locationQuery = addPhotosOverlayLocationInput.value;
        }
        var response = WebsiteSDK.getAlbumPhotos(sourceScopeId, filters, 'date_taken_newest', overlayCurrentPage, overlayPageSize);
        var photos = response && response.photos ? response.photos : [];
        overlayTotalPhotos = response && typeof response.totalCount === 'number' ? response.totalCount : photos.length;
        renderOverlayPhotos(addPhotosOverlayListEl, photos);
        updateOverlayMeta();
      }

      function renderOverlayPhotos(container, photos) {
        container.innerHTML = '';
        if (!photos || photos.length === 0) {
          var empty = document.createElement('li');
          empty.className = 'overlay-photo-empty';
          empty.textContent = 'No photos available for the selected filters.';
          container.appendChild(empty);
          return;
        }
        photos.forEach(function(photo) {
          var li = document.createElement('li');
          li.className = 'overlay-photo-item';
          li.dataset.photoId = photo.id;
          var label = document.createElement('label');
          label.className = 'overlay-photo-label';
          var checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.dataset.action = 'overlay-toggle-photo-select';
          checkbox.dataset.photoId = photo.id;
          checkbox.checked = overlaySelectedPhotoIds.has(photo.id);
          label.appendChild(checkbox);
          var img = document.createElement('img');
          img.src = photo.thumbnailUrl || photo.fileUrl;
          img.alt = photo.title || '';
          label.appendChild(img);
          li.appendChild(label);
          container.appendChild(li);
        });
      }

      function updateOverlayMeta() {
        if (!addPhotosOverlaySummaryEl || !addPhotosOverlayPageInfoEl) return;
        if (!overlayTotalPhotos) {
          addPhotosOverlaySummaryEl.textContent = 'No photos';
          addPhotosOverlayPageInfoEl.textContent = '';
          return;
        }
        var startIndex = (overlayCurrentPage - 1) * overlayPageSize + 1;
        var endIndex = Math.min(overlayCurrentPage * overlayPageSize, overlayTotalPhotos);
        addPhotosOverlaySummaryEl.textContent = 'Showing ' + startIndex + '–' + endIndex + ' of ' + overlayTotalPhotos + ' photos';
        var maxPage = Math.max(1, Math.ceil(overlayTotalPhotos / overlayPageSize));
        addPhotosOverlayPageInfoEl.textContent = 'Page ' + overlayCurrentPage + ' of ' + maxPage;
      }

      function handleOverlayPhotoGridClick(evt) {
        var target = evt.target;
        if (!target) return;
        var action = target.dataset.action;
        if (action === 'overlay-toggle-photo-select') {
          var photoId = target.dataset.photoId;
          var checked = target.checked;
          if (checked) {
            overlaySelectedPhotoIds.add(photoId);
          } else {
            overlaySelectedPhotoIds.delete(photoId);
          }
        }
      }

      function handleAddOverlayPhotosToAlbum() {
        if (overlaySelectedPhotoIds.size === 0) {
          window.alert('Select at least one photo to add.');
          return;
        }
        WebsiteSDK.addPhotosToAlbum(albumId, Array.from(overlaySelectedPhotoIds));
        overlaySelectedPhotoIds = new Set();
        closeAddPhotosOverlay();
        loadAlbumPhotos();
        loadAlbumDetail();
      }

      function openTagPeopleOverlay() {
        if (!tagPeopleOverlayEl) return;
        if (selectedPhotoIds.size === 0) {
          window.alert('Select photos to tag.');
          return;
        }
        selectedPersonIdForTagging = null;
        if (tagPeopleSelectionCountEl) {
          tagPeopleSelectionCountEl.textContent = String(selectedPhotoIds.size);
        }
        if (tagPeopleSearchInput) {
          tagPeopleSearchInput.value = '';
        }
        if (tagPeopleResultsListEl) {
          tagPeopleResultsListEl.innerHTML = '';
        }
        if (tagPeopleApplyButton) {
          tagPeopleApplyButton.disabled = true;
        }
        tagPeopleOverlayEl.hidden = false;
        tagPeopleOverlayEl.setAttribute('aria-hidden', 'false');
      }

      function closeTagPeopleOverlay() {
        if (!tagPeopleOverlayEl) return;
        tagPeopleOverlayEl.hidden = true;
        tagPeopleOverlayEl.setAttribute('aria-hidden', 'true');
      }

      function schedulePeopleSearch(query) {
        if (peopleSearchTimeoutId) {
          window.clearTimeout(peopleSearchTimeoutId);
        }
        peopleSearchTimeoutId = window.setTimeout(function() {
          performPeopleSearch(query);
        }, 250);
      }

      function performPeopleSearch(query) {
        var results = WebsiteSDK.getPeopleOptions(query);
        renderPeopleSearchResults(results);
      }

      function renderPeopleSearchResults(people) {
        if (!tagPeopleResultsListEl) return;
        tagPeopleResultsListEl.innerHTML = '';
        if (!people || people.length === 0) {
          var li = document.createElement('li');
          li.className = 'people-result-empty';
          li.textContent = 'No matching people.';
          tagPeopleResultsListEl.appendChild(li);
          return;
        }
        people.forEach(function(person) {
          var liItem = document.createElement('li');
          liItem.className = 'people-result-item';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.dataset.personId = person.id;
          btn.textContent = person.displayName || person.name;
          liItem.appendChild(btn);
          tagPeopleResultsListEl.appendChild(liItem);
        });
      }

      function handlePeopleResultClick(evt) {
        var target = evt.target;
        if (!target || !target.dataset.personId) return;
        selectedPersonIdForTagging = target.dataset.personId;
        if (tagPeopleApplyButton) {
          tagPeopleApplyButton.disabled = false;
        }
        var buttons = tagPeopleResultsListEl.querySelectorAll('button[data-person-id]');
        buttons.forEach(function(btn) {
          if (btn === target) {
            btn.classList.add('is-selected');
          } else {
            btn.classList.remove('is-selected');
          }
        });
      }

      function applyPeopleTagging() {
        if (!selectedPersonIdForTagging) {
          window.alert('Choose a person first.');
          return;
        }
        if (selectedPhotoIds.size === 0) {
          window.alert('No photos selected to tag.');
          return;
        }
        WebsiteSDK.bulkTagPeopleOnPhotos(Array.from(selectedPhotoIds), selectedPersonIdForTagging);
        closeTagPeopleOverlay();
        loadAlbumPhotos();
        loadFilterOptions();
      }
    });
  </script>
</body>
</html>
