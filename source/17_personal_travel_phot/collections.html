<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Photo Gallery - Collections</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="collections.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header" role="banner">
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" title="Homepage and dashboard">Home</a>
        <a href="photos.html" title="Browse and filter all photos">All Photos</a>
        <a href="albums.html" title="View and manage photo albums">Albums</a>
        <a href="collections.html" title="Smart and custom photo collections">Collections</a>
        <a href="trips.html" title="Travel stories and trip timelines">Trips</a>
      </nav>
    </header>

    <main id="content" role="main">
      <div class="collections-page" data-component="collections-page">
        <div class="collections-column">
          <section class="collections-header" data-component="collections-header">
            <h1 class="collections-title">Collections</h1>
            <p class="collections-total" data-populate="collections-count" aria-live="polite"></p>
          </section>

          <section class="collections-toolbar-row" data-component="collections-toolbar">
            <div class="collections-toolbar-left">
              <form class="collections-filters-form" data-component="collections-filters">
                <label class="filter-group">
                  <span class="filter-label">Sort</span>
                  <select id="collectionsSort" name="sort" data-role="sort-select">
                    <option value="created_at_newest">Newest first</option>
                    <option value="created_at_oldest">Oldest first</option>
                    <option value="name_az">Name A–Z</option>
                    <option value="name_za">Name Z–A</option>
                  </select>
                </label>

                <label class="filter-group">
                  <span class="filter-label">Search</span>
                  <input type="search" name="q" placeholder="Collection name" data-role="collections-search" />
                </label>

                <label class="filter-group filter-checkbox">
                  <input type="checkbox" name="mapEnabled" value="1" data-role="collections-map-enabled" />
                  <span class="filter-label-inline">Map-enabled only</span>
                </label>

                <button type="submit" class="filters-submit-button" data-action="apply-filters">
                  Apply
                </button>
              </form>
            </div>

            <div class="collections-toolbar-right">
              <div class="quick-filters" aria-label="Quick filters">
                <button type="button" class="quick-filter-chip" data-action="quick-filter" data-quick-filter-id="all">
                  All
                </button>
                <button type="button" class="quick-filter-chip" data-action="quick-filter" data-quick-filter-id="manual">
                  Manual
                </button>
                <button type="button" class="quick-filter-chip" data-action="quick-filter" data-quick-filter-id="rule_based">
                  Rule-based
                </button>
                <button type="button" class="quick-filter-chip" data-action="quick-filter" data-quick-filter-id="map_enabled">
                  Map collections
                </button>
              </div>

              <a href="javascript:void(0)" class="btn-primary create-collection-button" data-component="create-collection-button" data-action="create-collection">
                Create New Collection
              </a>
            </div>
          </section>

          <section class="collections-main">
            <div class="collections-loading" data-component="collections-loading-state" aria-live="polite" hidden>
              Loading collections…
            </div>

            <div class="collections-error" data-component="collections-error-state" aria-live="polite" hidden>
              <p class="error-title">Unable to load collections</p>
              <p class="error-message" data-populate="collections-error-message"></p>
              <button type="button" class="btn-secondary" data-action="retry-load-collections">
                Retry
              </button>
            </div>

            <div class="collections-empty" data-component="collections-empty-state" aria-live="polite" hidden>
              <p class="empty-title" data-populate="collections-empty-title"></p>
              <p class="empty-description" data-populate="collections-empty-description"></p>
              <div class="empty-actions">
                <button type="button" class="btn-secondary" data-action="clear-filters">
                  Clear filters
                </button>
                <a href="javascript:void(0)" class="btn-primary" data-action="create-collection">
                  Create New Collection
                </a>
              </div>
            </div>

            <div class="collections-grid" data-component="collections-grid" data-populate="collections-grid" aria-live="polite" aria-busy="false">
              <!-- Collection tiles will be injected here -->
            </div>
          </section>

          <nav class="collections-pagination" data-component="collections-pagination" aria-label="Collections pages">
            <button type="button" class="pagination-prev" data-action="prev-page" disabled>
              &lt; Previous
            </button>
            <ul class="pagination-pages" data-populate="pagination-pages">
              <!-- Pagination items will be injected here -->
            </ul>
            <button type="button" class="pagination-next" data-action="next-page" disabled>
              Next &gt;
            </button>
          </nav>
        </div>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <nav class="footer-nav" aria-label="Footer">
        <a href="about.html" title="About this travel photo gallery">About</a>
        <span class="footer-separator">&middot;</span>
        <a href="help.html" title="Help and usage guide">Help</a>
      </nav>
      <p class="footer-meta">&copy; 2024 Travel Photo Gallery</p>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var PAGE_SIZE = 24;

      var state = {
        sort: 'created_at_newest',
        page: 1,
        pageSize: PAGE_SIZE,
        filters: {
          nameQuery: '',
          mapEnabled: null,
          quickAccessType: null
        },
        collections: [],
        totalCount: 0,
        loading: false,
        error: null
      };

      function resetStateToDefaults() {
        state.sort = 'created_at_newest';
        state.page = 1;
        state.pageSize = PAGE_SIZE;
        state.filters = {
          nameQuery: '',
          mapEnabled: null,
          quickAccessType: null
        };
        state.collections = [];
        state.totalCount = 0;
        state.loading = false;
        state.error = null;
      }

      function parseStateFromUrl() {
        resetStateToDefaults();
        var params = new URLSearchParams(window.location.search);
        var sortParam = params.get('sort');
        var pageParam = params.get('page');
        var qParam = params.get('q');
        var mapParam = params.get('map');
        var quickParam = params.get('quick');

        if (sortParam) {
          state.sort = sortParam;
        }

        var pageNum = parseInt(pageParam, 10);
        if (!isNaN(pageNum) && pageNum > 0) {
          state.page = pageNum;
        }

        if (qParam) {
          state.filters.nameQuery = qParam;
        }

        if (mapParam === '1') {
          state.filters.mapEnabled = true;
        }

        if (quickParam) {
          state.filters.quickAccessType = quickParam;
        }
      }

      function serializeStateToUrl(replace) {
        var params = new URLSearchParams(window.location.search);
        if (state.sort) {
          params.set('sort', state.sort);
        } else {
          params.delete('sort');
        }

        params.set('page', String(state.page));

        if (state.filters.nameQuery) {
          params.set('q', state.filters.nameQuery);
        } else {
          params.delete('q');
        }

        if (state.filters.mapEnabled) {
          params.set('map', '1');
        } else {
          params.delete('map');
        }

        if (state.filters.quickAccessType) {
          params.set('quick', state.filters.quickAccessType);
        } else {
          params.delete('quick');
        }

        var newUrl = window.location.pathname + '?' + params.toString();
        if (replace) {
          window.history.replaceState(null, '', newUrl);
        } else {
          window.history.pushState(null, '', newUrl);
        }
      }

      function buildFiltersForSdk() {
        var filters = {};
        if (state.filters.nameQuery) {
          filters.nameQuery = state.filters.nameQuery;
        }
        if (state.filters.mapEnabled) {
          filters.mapEnabled = true;
        }
        if (state.filters.quickAccessType) {
          filters.quickAccessType = state.filters.quickAccessType;
        }
        return filters;
      }

      function getTotalPages() {
        if (!state.totalCount || !state.pageSize) {
          return 1;
        }
        return Math.max(1, Math.ceil(state.totalCount / state.pageSize));
      }

      function showElement(el, shouldShow) {
        if (!el) return;
        if (shouldShow) {
          el.removeAttribute('hidden');
        } else {
          el.setAttribute('hidden', 'hidden');
        }
      }

      function renderHeaderCount(container, totalCount) {
        if (!container) return;
        if (typeof totalCount !== 'number') {
          container.textContent = '';
          return;
        }
        if (totalCount === 0) {
          container.textContent = 'No collections';
        } else if (totalCount === 1) {
          container.textContent = '1 collection';
        } else {
          container.textContent = totalCount + ' collections';
        }
      }

      function renderCollectionsGrid(container, collections) {
        if (!container) return;
        container.innerHTML = '';
        if (!collections || !collections.length) {
          return;
        }

        collections.forEach(function(coll) {
          var tile = document.createElement('article');
          tile.className = 'collection-tile';
          tile.setAttribute('data-component', 'collection-tile');
          if (coll && coll.id) {
            tile.setAttribute('data-collection-id', coll.id);
          }
          tile.tabIndex = 0;

          var frame = document.createElement('figure');
          frame.className = 'collection-tile-frame';

          var img = document.createElement('img');
          var coverUrl = coll && (coll.coverThumbnailUrl || coll.coverPhotoUrl || coll.thumbnailUrl || coll.fileUrl);
          if (coverUrl) {
            img.src = coverUrl;
          } else {
            img.alt = '';
          }
          img.alt = coll && coll.name ? coll.name : 'Collection cover';
          frame.appendChild(img);

          var meta = document.createElement('div');
          meta.className = 'collection-tile-meta';

          var titleEl = document.createElement('h2');
          titleEl.className = 'collection-tile-title';
          titleEl.textContent = coll && coll.name ? coll.name : 'Untitled collection';
          meta.appendChild(titleEl);

          if (coll && coll.description) {
            var descEl = document.createElement('p');
            descEl.className = 'collection-tile-description';
            var text = String(coll.description);
            if (text.length > 120) {
              text = text.slice(0, 117) + '…';
            }
            descEl.textContent = text;
            meta.appendChild(descEl);
          }

          var metaRow = document.createElement('div');
          metaRow.className = 'collection-tile-meta-row';

          var countEl = document.createElement('span');
          countEl.className = 'collection-tile-count';
          var count = coll && typeof coll.photoCount === 'number' ? coll.photoCount : null;
          if (count === null) {
            countEl.textContent = '';
          } else if (count === 1) {
            countEl.textContent = '1 photo';
          } else {
            countEl.textContent = count + ' photos';
          }
          metaRow.appendChild(countEl);

          if (coll && coll.collectionType) {
            var typeEl = document.createElement('span');
            typeEl.className = 'collection-tile-type';
            typeEl.textContent = coll.collectionType === 'rule_based' ? 'Rule-based' : 'Manual';
            metaRow.appendChild(typeEl);
          }

          if (coll && coll.mapEnabled) {
            var mapEl = document.createElement('span');
            mapEl.className = 'collection-tile-map-indicator';
            mapEl.textContent = 'Map';
            mapEl.title = 'Map view enabled';
            mapEl.setAttribute('data-action', 'open-collection');
            metaRow.appendChild(mapEl);
          }

          meta.appendChild(metaRow);
          tile.appendChild(frame);
          tile.appendChild(meta);
          container.appendChild(tile);
        });
      }

      function renderPaginationPages(container, currentPage, totalCount, pageSize) {
        if (!container) return;
        container.innerHTML = '';
        var totalPages = 1;
        if (typeof totalCount === 'number' && pageSize) {
          totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
        }

        var maxPagesToShow = 7;
        var startPage = Math.max(1, currentPage - 3);
        var endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);
        if (endPage - startPage < maxPagesToShow - 1) {
          startPage = Math.max(1, endPage - maxPagesToShow + 1);
        }

        for (var i = startPage; i <= endPage; i++) {
          var li = document.createElement('li');
          li.className = 'pagination-page-item';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'pagination-page-button';
          btn.textContent = String(i);
          btn.setAttribute('data-action', 'goto-page');
          btn.setAttribute('data-page', String(i));
          if (i === currentPage) {
            btn.classList.add('is-active');
            btn.setAttribute('aria-current', 'page');
          }
          li.appendChild(btn);
          container.appendChild(li);
        }

        var prevBtn = document.querySelector('[data-action="prev-page"]');
        var nextBtn = document.querySelector('[data-action="next-page"]');
        if (prevBtn) {
          prevBtn.disabled = currentPage <= 1;
        }
        if (nextBtn) {
          nextBtn.disabled = currentPage >= totalPages;
        }
      }

      function renderEmptyStateText(titleContainer, descContainer, filters, totalCount) {
        if (!titleContainer || !descContainer) return;
        var hasFilters = !!(filters && (filters.nameQuery || filters.mapEnabled || filters.quickAccessType));
        if (!totalCount && !hasFilters) {
          titleContainer.textContent = 'No collections yet';
          descContainer.textContent = 'Create your first collection to group related travel photos.';
        } else if (!totalCount && hasFilters) {
          titleContainer.textContent = 'No collections match your filters';
          descContainer.textContent = 'Try clearing filters or adjusting your search to see more collections.';
        } else {
          titleContainer.textContent = '';
          descContainer.textContent = '';
        }
      }

      function renderErrorState(container, error) {
        if (!container) return;
        var msgEl = container.querySelector('[data-populate="collections-error-message"]');
        if (!msgEl) return;
        if (!error) {
          msgEl.textContent = '';
          return;
        }
        var message = '';
        if (error && error.message) {
          message = error.message;
        } else {
          message = 'Something went wrong. Please try again.';
        }
        msgEl.textContent = message;
      }

      function syncToolbarUiFromState() {
        var sortSelect = document.getElementById('collectionsSort');
        if (sortSelect) {
          sortSelect.value = state.sort;
        }

        var searchInput = document.querySelector('[data-role="collections-search"]');
        if (searchInput) {
          searchInput.value = state.filters.nameQuery || '';
        }

        var mapCheckbox = document.querySelector('[data-role="collections-map-enabled"]');
        if (mapCheckbox) {
          mapCheckbox.checked = !!state.filters.mapEnabled;
        }

        var clearFiltersBtn = document.querySelector('[data-action="clear-filters"]');
        if (clearFiltersBtn) {
          var hasFilter = !!(state.filters.nameQuery || state.filters.mapEnabled || state.filters.quickAccessType);
          clearFiltersBtn.disabled = !hasFilter;
        }

        var quickButtons = document.querySelectorAll('[data-action="quick-filter"]');
        quickButtons.forEach(function(btn) {
          var presetId = btn.getAttribute('data-quick-filter-id');
          var active = false;
          if (presetId === 'all') {
            active = !(state.filters.nameQuery || state.filters.mapEnabled || state.filters.quickAccessType);
          } else if (presetId === 'map_enabled') {
            active = !!state.filters.mapEnabled;
          } else {
            active = state.filters.quickAccessType === presetId;
          }
          if (active) {
            btn.classList.add('is-active');
          } else {
            btn.classList.remove('is-active');
          }
        });
      }

      function renderAll() {
        var headerCountEl = document.querySelector('[data-populate="collections-count"]');
        var gridEl = document.querySelector('[data-populate="collections-grid"]');
        var pagesEl = document.querySelector('[data-populate="pagination-pages"]');
        var loadingEl = document.querySelector('[data-component="collections-loading-state"]');
        var emptyEl = document.querySelector('[data-component="collections-empty-state"]');
        var errorEl = document.querySelector('[data-component="collections-error-state"]');
        var paginationNav = document.querySelector('[data-component="collections-pagination"]');

        renderHeaderCount(headerCountEl, state.totalCount);

        var hasError = !!state.error;
        var isEmpty = !hasError && !state.loading && (!state.collections || state.collections.length === 0);

        showElement(loadingEl, !!state.loading);
        showElement(errorEl, hasError);
        showElement(emptyEl, isEmpty);

        var shouldShowGrid = !state.loading && !hasError && !isEmpty;
        showElement(gridEl, shouldShowGrid);

        var shouldShowPagination = !state.loading && !hasError && state.totalCount > state.pageSize;
        showElement(paginationNav, shouldShowPagination);

        if (gridEl && shouldShowGrid) {
          renderCollectionsGrid(gridEl, state.collections);
        }

        if (pagesEl && shouldShowPagination) {
          renderPaginationPages(pagesEl, state.page, state.totalCount, state.pageSize);
        }

        if (emptyEl) {
          var emptyTitleEl = emptyEl.querySelector('[data-populate="collections-empty-title"]');
          var emptyDescEl = emptyEl.querySelector('[data-populate="collections-empty-description"]');
          renderEmptyStateText(emptyTitleEl, emptyDescEl, state.filters, state.totalCount);
        }

        if (errorEl) {
          renderErrorState(errorEl, state.error);
        }

        syncToolbarUiFromState();
      }

      function loadCollections() {
        state.loading = true;
        state.error = null;
        renderAll();

        try {
          var filters = buildFiltersForSdk();
          var result = WebsiteSDK.getCollections(filters, state.sort, state.page, state.pageSize);
          if (result && Array.isArray(result.collections)) {
            state.collections = result.collections;
          } else {
            state.collections = [];
          }
          if (result && typeof result.totalCount === 'number') {
            state.totalCount = result.totalCount;
          } else {
            state.totalCount = state.collections.length;
          }
        } catch (err) {
          state.error = err || new Error('Failed to load collections');
        }

        state.loading = false;
        renderAll();
      }

      function navigateToCollection(collectionId) {
        if (!collectionId) return;
        window.location.href = 'collection_detail.html?id=' + encodeURIComponent(collectionId);
      }

      function navigateToCreateCollection() {
        window.location.href = 'collection_detail.html?mode=create';
      }

      function applyQuickFilter(presetId) {
        if (!presetId) return;
        if (presetId === 'all') {
          state.filters.nameQuery = '';
          state.filters.mapEnabled = null;
          state.filters.quickAccessType = null;
        } else if (presetId === 'map_enabled') {
          if (state.filters.mapEnabled) {
            state.filters.mapEnabled = null;
            if (state.filters.quickAccessType === 'map_enabled') {
              state.filters.quickAccessType = null;
            }
          } else {
            state.filters.mapEnabled = true;
            state.filters.quickAccessType = 'map_enabled';
          }
        } else {
          if (state.filters.quickAccessType === presetId) {
            state.filters.quickAccessType = null;
          } else {
            state.filters.quickAccessType = presetId;
          }
        }

        state.page = 1;
        serializeStateToUrl(false);
        loadCollections();
      }

      function attachToolbarListeners() {
        var sortSelect = document.getElementById('collectionsSort');
        if (sortSelect) {
          sortSelect.addEventListener('change', function() {
            var newSort = sortSelect.value || 'created_at_newest';
            state.sort = newSort;
            state.page = 1;
            serializeStateToUrl(false);
            loadCollections();
          });
        }

        var filtersForm = document.querySelector('[data-component="collections-filters"]');
        if (filtersForm) {
          filtersForm.addEventListener('submit', function(event) {
            event.preventDefault();
            var searchInput = filtersForm.querySelector('[data-role="collections-search"]');
            var mapCheckbox = filtersForm.querySelector('[data-role="collections-map-enabled"]');
            state.filters.nameQuery = searchInput ? searchInput.value.trim() : '';
            state.filters.mapEnabled = mapCheckbox && mapCheckbox.checked ? true : null;
            state.page = 1;
            serializeStateToUrl(false);
            loadCollections();
          });
        }

        var quickButtons = document.querySelectorAll('[data-action="quick-filter"]');
        quickButtons.forEach(function(btn) {
          btn.addEventListener('click', function() {
            var presetId = btn.getAttribute('data-quick-filter-id');
            applyQuickFilter(presetId);
          });
        });

        var clearFiltersBtn = document.querySelector('[data-action="clear-filters"]');
        if (clearFiltersBtn) {
          clearFiltersBtn.addEventListener('click', function() {
            state.filters.nameQuery = '';
            state.filters.mapEnabled = null;
            state.filters.quickAccessType = null;
            state.page = 1;
            serializeStateToUrl(false);
            loadCollections();
          });
        }

        var createButtons = document.querySelectorAll('[data-action="create-collection"]');
        createButtons.forEach(function(btn) {
          btn.addEventListener('click', function(event) {
            event.preventDefault();
            navigateToCreateCollection();
          });
        });
      }

      function attachGridListeners() {
        var gridEl = document.querySelector('[data-populate="collections-grid"]');
        if (!gridEl) return;

        gridEl.addEventListener('click', function(event) {
          var tile = event.target.closest('[data-component="collection-tile"]');
          if (!tile) return;
          var collectionId = tile.getAttribute('data-collection-id');
          navigateToCollection(collectionId);
        });

        gridEl.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' || event.key === ' ') {
            var tile = event.target.closest('[data-component="collection-tile"]');
            if (!tile) return;
            event.preventDefault();
            var collectionId = tile.getAttribute('data-collection-id');
            navigateToCollection(collectionId);
          }
        });
      }

      function attachPaginationListeners() {
        var prevBtn = document.querySelector('[data-action="prev-page"]');
        var nextBtn = document.querySelector('[data-action="next-page"]');
        var pagesContainer = document.querySelector('[data-populate="pagination-pages"]');

        if (prevBtn) {
          prevBtn.addEventListener('click', function() {
            if (state.page <= 1) return;
            state.page = state.page - 1;
            serializeStateToUrl(false);
            loadCollections();
          });
        }

        if (nextBtn) {
          nextBtn.addEventListener('click', function() {
            var totalPages = getTotalPages();
            if (state.page >= totalPages) return;
            state.page = state.page + 1;
            serializeStateToUrl(false);
            loadCollections();
          });
        }

        if (pagesContainer) {
          pagesContainer.addEventListener('click', function(event) {
            var btn = event.target.closest('[data-action="goto-page"]');
            if (!btn) return;
            var pageStr = btn.getAttribute('data-page');
            var newPage = parseInt(pageStr, 10);
            if (isNaN(newPage) || newPage === state.page) return;
            state.page = newPage;
            serializeStateToUrl(false);
            loadCollections();
          });
        }
      }

      function attachErrorAndRetryListeners() {
        var retryBtn = document.querySelector('[data-action="retry-load-collections"]');
        if (retryBtn) {
          retryBtn.addEventListener('click', function() {
            loadCollections();
          });
        }
      }

      function attachPopStateListener() {
        window.addEventListener('popstate', function() {
          parseStateFromUrl();
          renderAll();
          loadCollections();
        });
      }

      // Initial page setup
      parseStateFromUrl();
      syncToolbarUiFromState();
      renderAll();

      attachToolbarListeners();
      attachGridListeners();
      attachPaginationListeners();
      attachErrorAndRetryListeners();
      attachPopStateListener();

      // Ensure URL reflects initial state (including incoming sort param) without duplicating history
      serializeStateToUrl(true);
      loadCollections();
    });
  </script>
</body>
</html>
