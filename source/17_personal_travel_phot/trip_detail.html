<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Travel Photo Gallery</title>
  <link rel='stylesheet' href='styles.css' />
  <link rel='stylesheet' href='trip_detail.css' />
  <script src='business_logic.js'></script>
</head>
<body>
  <div class='page-shell'>
    <header class='site-header' role='banner'>
      <nav class='site-nav' aria-label='Primary'>
        <a href='index.html' title='Homepage and dashboard'>Home</a>
        <a href='photos.html' title='Browse and filter all photos'>All Photos</a>
        <a href='albums.html' title='View and manage photo albums'>Albums</a>
        <a href='collections.html' title='Smart and custom photo collections'>Collections</a>
        <a href='trips.html' title='Travel stories and trip timelines'>Trips</a>
      </nav>
    </header>

    <main id='content' role='main'>
      <div class='trip-detail-page' data-component='trip-page-root'>
        <!-- Top-left local navigation for this trip -->
        <section class='trip-local-nav' data-component='trip-navigation-bar' aria-label='Trip navigation'>
          <a href='javascript:void(0)' data-action='back-to-trips'>Back to Trips</a>
          <span class='trip-local-nav-separator'>&middot;</span>
          <a href='javascript:void(0)' data-action='go-home'>Home</a>
          <span class='trip-local-nav-title' data-populate='trip-nav-title'></span>
        </section>

        <!-- Loading overlay / router state -->
        <section class='trip-loading-overlay' data-component='trip-page-router' aria-live='polite' hidden>
          <div class='trip-loading-inner'>
            <p>Loading trip&hellip;</p>
          </div>
        </section>

        <!-- Load error state -->
        <section class='trip-error-state' data-component='trip-error' hidden>
          <p class='trip-error-message' data-populate='error-message'>Unable to load trip.</p>
          <button type='button' class='btn-retry-load' data-action='retry-load'>Retry</button>
        </section>

        <!-- Create-mode central panel -->
        <section class='trip-create-panel' data-component='trip-create-form' hidden>
          <form class='trip-create-form' data-action='submit-create-trip' novalidate>
            <div class='form-field'>
              <label for='tripCreateTitle'>Trip title<span aria-hidden='true'>*</span></label>
              <input id='tripCreateTitle' name='title' type='text' required />
            </div>

            <div class='form-field'>
              <label for='tripCreateLocation'>Location overview</label>
              <input id='tripCreateLocation' name='locationOverview' type='text' placeholder='e.g., Patagonia, Chile &amp; Argentina' />
            </div>

            <div class='form-field form-field-inline-dates'>
              <div class='form-field'>
                <label for='tripCreateStartDate'>Start date</label>
                <input id='tripCreateStartDate' name='startDate' type='date' />
              </div>
              <div class='form-field'>
                <label for='tripCreateEndDate'>End date</label>
                <input id='tripCreateEndDate' name='endDate' type='date' />
              </div>
            </div>

            <div class='form-field'>
              <label for='tripCreateSummary'>Trip summary</label>
              <textarea id='tripCreateSummary' name='summary' rows='6' placeholder='Write a short overview of this trip.'></textarea>
            </div>

            <div class='form-field form-field-pin'>
              <label>
                <input id='createPinnedToggle' type='checkbox' />
                Pin this trip to profile after creating
              </label>
            </div>

            <div class='form-actions'>
              <button type='submit' class='btn-primary'>Create Trip</button>
              <span class='form-status' data-populate='create-form-status'></span>
            </div>
          </form>
        </section>

        <!-- Existing-trip editor central panel -->
        <section class='trip-editor-panel' data-component='trip-editor' hidden>
          <header class='trip-header-and-summary' data-component='trip-header-and-summary-editor'>
            <div class='trip-header-row'>
              <div class='trip-header-main'>
                <div class='trip-title-block'>
                  <label for='tripTitle'>Trip title</label>
                  <input id='tripTitle' name='title' type='text' data-populate='trip-title-input' disabled />
                </div>
                <div class='trip-meta-block'>
                  <p class='trip-location' data-populate='trip-location'></p>
                  <p class='trip-dates' data-populate='trip-dates'></p>
                </div>
              </div>
              <div class='trip-pin-toggle' data-component='pin-to-profile-toggle'>
                <label>
                  <input type='checkbox' id='pinnedToggle' data-action='toggle-pinned' />
                  Pin this trip to profile
                </label>
              </div>
            </div>

            <div class='trip-summary-field'>
              <label for='tripSummary'>Trip summary</label>
              <textarea id='tripSummary' rows='8' data-action='edit-summary' placeholder='Describe this trip in a few paragraphs.'></textarea>
            </div>
          </header>

          <section class='trip-timeline' data-component='trip-timeline-editor'>
            <h2 class='visually-hidden'>Trip timeline</h2>
            <ol class='trip-day-list' data-populate='trip-days'></ol>
            <p class='trip-no-days-message' data-populate='no-days-message' hidden>No days have been added to this trip yet.</p>
          </section>
        </section>

        <!-- Sticky save bar near bottom -->
        <section class='story-save-bar' data-component='story-save-bar' aria-live='polite' hidden>
          <div class='story-save-bar-inner'>
            <div class='save-status'>
              <span class='save-message' data-populate='save-message'>All changes saved.</span>
            </div>
            <div class='save-actions'>
              <button type='button' class='btn-primary' data-action='save-story' disabled>Save Story</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer class='site-footer' role='contentinfo'>
      <nav class='footer-nav' aria-label='Footer'>
        <a href='about.html' title='About this travel photo gallery'>About</a>
        <span class='footer-separator'>&middot;</span>
        <a href='help.html' title='Help and usage guide'>Help</a>
      </nav>
      <p class='footer-meta'>&copy; 2024 Travel Photo Gallery</p>
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var pageState = {
        mode: null,
        trip: null,
        days: [], // [{ day: TripDay, photos: Photo[] }]
        dayOrder: [],
        isLoading: false,
        isSaving: false,
        unsaved: {
          summary: false,
          pinned: false,
          dayOrder: false
        },
        loadErrorMessage: '',
        saveMessage: 'All changes saved.',
        lastLoadedTripId: null
      };

      var root = document.querySelector('[data-component="trip-page-root"]');
      if (!root) {
        return;
      }

      var navBar = root.querySelector('[data-component="trip-navigation-bar"]');
      var loadingOverlay = root.querySelector('[data-component="trip-page-router"]');
      var errorSection = root.querySelector('[data-component="trip-error"]');
      var createSection = root.querySelector('[data-component="trip-create-form"]');
      var editorSection = root.querySelector('[data-component="trip-editor"]');
      var saveBar = root.querySelector('[data-component="story-save-bar"]');

      var dayList = editorSection ? editorSection.querySelector('[data-populate="trip-days"]') : null;
      var noDaysMessageEl = editorSection ? editorSection.querySelector('[data-populate="no-days-message"]') : null;
      var navTitleEl = navBar ? navBar.querySelector('[data-populate="trip-nav-title"]') : null;
      var tripTitleInput = document.getElementById('tripTitle');
      var tripLocationEl = editorSection ? editorSection.querySelector('[data-populate="trip-location"]') : null;
      var tripDatesEl = editorSection ? editorSection.querySelector('[data-populate="trip-dates"]') : null;
      var summaryTextarea = document.getElementById('tripSummary');
      var pinnedCheckboxExisting = document.getElementById('pinnedToggle');
      var saveButton = saveBar ? saveBar.querySelector('[data-action="save-story"]') : null;
      var saveMessageEl = saveBar ? saveBar.querySelector('[data-populate="save-message"]') : null;
      var errorMessageEl = errorSection ? errorSection.querySelector('[data-populate="error-message"]') : null;

      var createForm = createSection ? createSection.querySelector('form[data-action="submit-create-trip"]') : null;
      var createTitleInput = document.getElementById('tripCreateTitle');
      var createLocationInput = document.getElementById('tripCreateLocation');
      var createStartDateInput = document.getElementById('tripCreateStartDate');
      var createEndDateInput = document.getElementById('tripCreateEndDate');
      var createSummaryInput = document.getElementById('tripCreateSummary');
      var createPinnedCheckbox = document.getElementById('createPinnedToggle');
      var createStatusEl = createSection ? createSection.querySelector('[data-populate="create-form-status"]') : null;

      function formatDate(value) {
        if (!value) {
          return '';
        }
        var d = new Date(value);
        if (isNaN(d.getTime())) {
          return '';
        }
        try {
          return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        } catch (e) {
          return d.toDateString();
        }
      }

      function formatTripDates(trip) {
        if (!trip) {
          return '';
        }
        var start = trip.startDate ? formatDate(trip.startDate) : '';
        var end = trip.endDate ? formatDate(trip.endDate) : '';
        if (start && end) {
          return start + ' - ' + end;
        }
        return start || end || '';
      }

      function showLoading(isLoading) {
        pageState.isLoading = isLoading;
        if (loadingOverlay) {
          loadingOverlay.hidden = !isLoading;
        }
        if (isLoading) {
          if (editorSection) {
            editorSection.hidden = true;
          }
          if (createSection && pageState.mode === 'existing') {
            createSection.hidden = true;
          }
        }
      }

      function showError(message) {
        pageState.loadErrorMessage = message || 'An error occurred.';
        if (errorSection) {
          errorSection.hidden = false;
        }
        if (errorMessageEl) {
          renderPopulate(errorMessageEl);
        }
      }

      function hideError() {
        if (errorSection) {
          errorSection.hidden = true;
        }
        pageState.loadErrorMessage = '';
      }

      function renderTimeline(container) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!pageState.trip) {
          if (noDaysMessageEl) {
            noDaysMessageEl.hidden = false;
          }
          return;
        }
        var days = pageState.days || [];
        if (!days.length) {
          if (noDaysMessageEl) {
            noDaysMessageEl.hidden = false;
          }
          return;
        }
        if (noDaysMessageEl) {
          noDaysMessageEl.hidden = true;
        }
        days.forEach(function (entry, index) {
          var dayObj = entry.day;
          var photos = entry.photos || [];
          var li = document.createElement('li');
          li.className = 'trip-day-item';
          li.setAttribute('data-day-id', dayObj.id);
          li.setAttribute('draggable', 'true');

          var headerDiv = document.createElement('div');
          headerDiv.className = 'trip-day-header';

          var handle = document.createElement('button');
          handle.type = 'button';
          handle.className = 'trip-day-drag-handle';
          handle.setAttribute('aria-label', 'Drag to reorder day');
          handle.textContent = '≡';
          headerDiv.appendChild(handle);

          var titleDiv = document.createElement('div');
          titleDiv.className = 'trip-day-title-block';

          var h3 = document.createElement('h3');
          h3.textContent = dayObj.title || ('Day ' + (index + 1));
          titleDiv.appendChild(h3);

          if (dayObj.date) {
            var dateP = document.createElement('p');
            dateP.className = 'trip-day-date';
            dateP.textContent = formatDate(dayObj.date);
            titleDiv.appendChild(dateP);
          }

          headerDiv.appendChild(titleDiv);
          li.appendChild(headerDiv);

          if (photos.length) {
            var photosDiv = document.createElement('div');
            photosDiv.className = 'trip-day-photos';
            var ul = document.createElement('ul');
            ul.className = 'trip-day-photo-list';

            photos.forEach(function (photo) {
              var photoLi = document.createElement('li');
              var link = document.createElement('a');
              link.href = 'javascript:void(0)';
              link.setAttribute('data-action', 'open-photo');
              link.setAttribute('data-photo-id', photo.id);

              var img = document.createElement('img');
              var src = photo.thumbnailUrl || photo.fileUrl;
              img.src = src;
              img.alt = photo.title || photo.caption || 'Trip photo';

              link.appendChild(img);
              photoLi.appendChild(link);
              ul.appendChild(photoLi);
            });

            photosDiv.appendChild(ul);
            li.appendChild(photosDiv);
          }

          container.appendChild(li);
        });
      }

      function renderPopulate(container) {
        if (!container || !container.dataset) {
          return;
        }
        var type = container.dataset.populate;
        if (type === 'trip-nav-title') {
          container.textContent = pageState.trip ? (pageState.trip.title || '') : '';
        } else if (type === 'trip-title-input') {
          if (tripTitleInput && pageState.trip) {
            tripTitleInput.value = pageState.trip.title || '';
          }
        } else if (type === 'trip-location') {
          if (pageState.trip) {
            container.textContent = pageState.trip.locationOverview || '';
          } else {
            container.textContent = '';
          }
        } else if (type === 'trip-dates') {
          container.textContent = pageState.trip ? formatTripDates(pageState.trip) : '';
        } else if (type === 'trip-days') {
          renderTimeline(container);
        } else if (type === 'no-days-message') {
          var hasDays = pageState.days && pageState.days.length > 0;
          container.hidden = !!hasDays;
        } else if (type === 'save-message') {
          container.textContent = pageState.saveMessage || '';
        } else if (type === 'error-message') {
          container.textContent = pageState.loadErrorMessage || '';
        } else if (type === 'create-form-status') {
          // handled via createStatusEl directly; leave as-is
        }
      }

      function renderAllPopulated() {
        var elements = document.querySelectorAll('[data-populate]');
        elements.forEach(function (el) {
          renderPopulate(el);
        });
      }

      function renderHeaderAndSummary() {
        if (!pageState.trip || !editorSection) {
          return;
        }
        if (tripTitleInput) {
          tripTitleInput.value = pageState.trip.title || '';
        }
        if (tripLocationEl) {
          tripLocationEl.textContent = pageState.trip.locationOverview || '';
        }
        if (tripDatesEl) {
          tripDatesEl.textContent = formatTripDates(pageState.trip);
        }
        if (summaryTextarea) {
          summaryTextarea.value = pageState.trip.summary || '';
        }
        if (pinnedCheckboxExisting) {
          pinnedCheckboxExisting.checked = !!pageState.trip.pinnedToProfile;
        }
      }

      function updateSaveBarUI() {
        if (!saveBar || !saveButton || !saveMessageEl) {
          return;
        }
        var hasUnsaved = pageState.unsaved.summary || pageState.unsaved.pinned || pageState.unsaved.dayOrder;
        if (pageState.isSaving) {
          saveButton.disabled = true;
          pageState.saveMessage = 'Saving changes&hellip;';
        } else if (hasUnsaved) {
          saveButton.disabled = false;
          pageState.saveMessage = 'You have unsaved changes.';
        } else {
          saveButton.disabled = true;
          pageState.saveMessage = 'All changes saved.';
        }
        renderPopulate(saveMessageEl);
      }

      function resetUnsavedFlags() {
        pageState.unsaved.summary = false;
        pageState.unsaved.pinned = false;
        pageState.unsaved.dayOrder = false;
      }

      function renderEditorFromState() {
        if (!pageState.trip) {
          return;
        }
        if (editorSection) {
          editorSection.hidden = false;
        }
        renderHeaderAndSummary();
        renderAllPopulated();
        updateSaveBarUI();
      }

      function loadTrip(tripId) {
        if (!tripId) {
          return;
        }
        hideError();
        showLoading(true);
        pageState.lastLoadedTripId = tripId;
        try {
          var result = WebsiteSDK.getTripDetail(tripId);
          if (!result || !result.trip) {
            throw new Error('Invalid trip response');
          }
          pageState.trip = result.trip;
          pageState.days = (result.days || []).slice();
          pageState.dayOrder = pageState.days.map(function (entry) {
            return entry.day.id;
          });
          resetUnsavedFlags();
          showLoading(false);
          if (createSection) {
            createSection.hidden = true;
          }
          if (saveBar) {
            saveBar.hidden = false;
          }
          renderEditorFromState();
        } catch (err) {
          pageState.trip = null;
          pageState.days = [];
          pageState.dayOrder = [];
          showLoading(false);
          showError('Unable to load trip. Please try again.');
        }
      }

      function enterCreateMode() {
        pageState.mode = 'create';
        if (editorSection) {
          editorSection.hidden = true;
        }
        if (saveBar) {
          saveBar.hidden = true;
        }
        if (createSection) {
          createSection.hidden = false;
        }
        hideError();
        showLoading(false);
        if (createForm) {
          createForm.reset();
        }
        if (createStatusEl) {
          createStatusEl.textContent = '';
        }
      }

      function enterExistingMode(tripId) {
        pageState.mode = 'existing';
        if (createSection) {
          createSection.hidden = true;
        }
        if (saveBar) {
          saveBar.hidden = true;
        }
        loadTrip(tripId);
      }

      function setCreateFormPending(isPending) {
        if (!createForm) {
          return;
        }
        var submitButton = createForm.querySelector('button[type="submit"]');
        if (submitButton) {
          submitButton.disabled = isPending;
          submitButton.textContent = isPending ? 'Creating…' : 'Create Trip';
        }
      }

      function handleCreateFormSubmit(event) {
        if (event) {
          event.preventDefault();
        }
        if (!createForm) {
          return;
        }
        var title = createTitleInput ? createTitleInput.value.trim() : '';
        var locationOverview = createLocationInput ? createLocationInput.value.trim() : '';
        var startDate = createStartDateInput ? createStartDateInput.value : '';
        var endDate = createEndDateInput ? createEndDateInput.value : '';
        var summary = createSummaryInput ? createSummaryInput.value.trim() : '';
        var pinned = createPinnedCheckbox ? createPinnedCheckbox.checked : false;

        if (!title) {
          if (createStatusEl) {
            createStatusEl.textContent = 'Please enter a trip title.';
          }
          return;
        }

        if (createStatusEl) {
          createStatusEl.textContent = '';
        }
        setCreateFormPending(true);

        var result;
        try {
          result = WebsiteSDK.createTrip(title, summary || undefined, locationOverview || undefined, startDate || undefined, endDate || undefined);
        } catch (err) {
          setCreateFormPending(false);
          if (createStatusEl) {
            createStatusEl.textContent = 'Unable to create trip. Please try again.';
          }
          return;
        }

        if (!result || !result.success || !result.trip) {
          setCreateFormPending(false);
          if (createStatusEl) {
            createStatusEl.textContent = 'Unable to create trip. Please try again.';
          }
          return;
        }

        pageState.trip = result.trip;
        pageState.days = [];
        pageState.dayOrder = [];
        resetUnsavedFlags();

        var newTripId = pageState.trip.id;
        var url = new URL(window.location.href);
        url.searchParams.delete('mode');
        url.searchParams.set('id', newTripId);
        window.history.replaceState({}, '', url.toString());

        if (pinned) {
          try {
            var updateRes = WebsiteSDK.updateTripStory(newTripId, pageState.trip.summary || summary || '', true, []);
            if (updateRes && updateRes.success && updateRes.trip) {
              pageState.trip = updateRes.trip;
              var updatedDays = updateRes.days || [];
              pageState.days = updatedDays.map(function (day) {
                return { day: day, photos: [] };
              });
              pageState.dayOrder = pageState.days.map(function (entry) { return entry.day.id; });
            } else {
              pageState.trip.pinnedToProfile = true;
            }
          } catch (err2) {
            pageState.trip.pinnedToProfile = true;
          }
        }

        setCreateFormPending(false);
        if (createSection) {
          createSection.hidden = true;
        }
        if (saveBar) {
          saveBar.hidden = false;
        }
        pageState.mode = 'existing';
        renderEditorFromState();
      }

      function recalcDayOrderFromDOM() {
        if (!dayList) {
          return;
        }
        var items = dayList.querySelectorAll('.trip-day-item');
        var order = [];
        items.forEach(function (el) {
          var id = el.getAttribute('data-day-id');
          if (id) {
            order.push(id);
          }
        });
        pageState.dayOrder = order;
        if (pageState.trip && order.length) {
          pageState.unsaved.dayOrder = true;
          updateSaveBarUI();
        }
      }

      function setupDragAndDrop() {
        if (!dayList) {
          return;
        }
        var draggedId = null;

        dayList.addEventListener('dragstart', function (event) {
          var target = event.target;
          var item = target && target.closest ? target.closest('.trip-day-item') : null;
          if (!item) {
            return;
          }
          draggedId = item.getAttribute('data-day-id');
          item.classList.add('is-dragging');
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', draggedId || '');
          }
        });

        dayList.addEventListener('dragover', function (event) {
          if (!draggedId) {
            return;
          }
          event.preventDefault();
          var target = event.target;
          var item = target && target.closest ? target.closest('.trip-day-item') : null;
          if (!item || item.getAttribute('data-day-id') === draggedId) {
            return;
          }
          var draggingEl = dayList.querySelector('.trip-day-item.is-dragging');
          if (!draggingEl) {
            return;
          }
          var rect = item.getBoundingClientRect();
          var offset = event.clientY - rect.top;
          var before = offset < rect.height / 2;
          if (before) {
            dayList.insertBefore(draggingEl, item);
          } else {
            dayList.insertBefore(draggingEl, item.nextSibling);
          }
        });

        dayList.addEventListener('drop', function (event) {
          if (!draggedId) {
            return;
          }
          event.preventDefault();
        });

        dayList.addEventListener('dragend', function () {
          var draggingEl = dayList.querySelector('.trip-day-item.is-dragging');
          if (draggingEl) {
            draggingEl.classList.remove('is-dragging');
          }
          draggedId = null;
          recalcDayOrderFromDOM();
        });
      }

      function handleSaveStoryClick(event) {
        if (event) {
          event.preventDefault();
        }
        if (!pageState.trip || pageState.isSaving) {
          return;
        }
        var hasUnsaved = pageState.unsaved.summary || pageState.unsaved.pinned || pageState.unsaved.dayOrder;
        if (!hasUnsaved) {
          return;
        }
        pageState.isSaving = true;
        updateSaveBarUI();

        var tripId = pageState.trip.id;
        var summary = pageState.trip.summary || '';
        var pinnedToProfile = !!pageState.trip.pinnedToProfile;
        var dayOrder = pageState.dayOrder && pageState.dayOrder.length ? pageState.dayOrder.slice() : [];

        var result;
        try {
          result = WebsiteSDK.updateTripStory(tripId, summary, pinnedToProfile, dayOrder);
        } catch (err) {
          pageState.isSaving = false;
          pageState.saveMessage = 'Unable to save changes. Please try again.';
          updateSaveBarUI();
          return;
        }

        if (!result || !result.success || !result.trip) {
          pageState.isSaving = false;
          pageState.saveMessage = 'Unable to save changes. Please try again.';
          updateSaveBarUI();
          return;
        }

        var updatedTrip = result.trip;
        var updatedDays = result.days || [];
        var oldMap = {};
        pageState.days.forEach(function (entry) {
          if (entry.day && entry.day.id) {
            oldMap[entry.day.id] = entry;
          }
        });

        var newDays = updatedDays.map(function (day) {
          var existing = oldMap[day.id];
          return {
            day: day,
            photos: existing ? (existing.photos || []) : []
          };
        });

        pageState.trip = updatedTrip;
        pageState.days = newDays;
        pageState.dayOrder = newDays.map(function (entry) { return entry.day.id; });
        resetUnsavedFlags();
        pageState.isSaving = false;
        pageState.saveMessage = 'All changes saved.';
        renderEditorFromState();
      }

      function handleGlobalClick(event) {
        var target = event.target;
        if (!target || !target.closest) {
          return;
        }
        var actionEl = target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.getAttribute('data-action');
        if (!action) {
          return;
        }
        if (action === 'back-to-trips') {
          event.preventDefault();
          window.location.href = 'trips.html';
        } else if (action === 'go-home') {
          event.preventDefault();
          window.location.href = 'index.html';
        } else if (action === 'open-photo') {
          event.preventDefault();
          var photoId = actionEl.getAttribute('data-photo-id');
          if (photoId && pageState.trip && pageState.trip.id) {
            var href = 'photo_detail.html?id=' + encodeURIComponent(photoId) + '&context=' + encodeURIComponent('trip:' + pageState.trip.id);
            window.location.href = href;
          }
        } else if (action === 'save-story') {
          handleSaveStoryClick(event);
        } else if (action === 'retry-load') {
          event.preventDefault();
          if (pageState.lastLoadedTripId) {
            loadTrip(pageState.lastLoadedTripId);
          } else {
            var params = new URLSearchParams(window.location.search);
            var idParam = params.get('id');
            if (idParam) {
              loadTrip(idParam);
            }
          }
        }
      }

      function bindStaticActionHandlers() {
        var actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function (el) {
          var action = el.getAttribute('data-action');
          if (action === 'save-story') {
            el.addEventListener('click', handleSaveStoryClick);
          }
        });
        document.body.addEventListener('click', handleGlobalClick);
      }

      function bindFormAndToggleHandlers() {
        if (createForm) {
          createForm.addEventListener('submit', handleCreateFormSubmit);
        }
        if (summaryTextarea) {
          summaryTextarea.addEventListener('input', function () {
            if (!pageState.trip) {
              return;
            }
            pageState.trip.summary = summaryTextarea.value;
            pageState.unsaved.summary = true;
            updateSaveBarUI();
          });
        }
        if (pinnedCheckboxExisting) {
          pinnedCheckboxExisting.addEventListener('change', function () {
            if (!pageState.trip) {
              return;
            }
            pageState.trip.pinnedToProfile = !!pinnedCheckboxExisting.checked;
            pageState.unsaved.pinned = true;
            updateSaveBarUI();
          });
        }
      }

      function initRouter() {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        var modeParam = params.get('mode');
        var idParam = params.get('id');

        if (modeParam === 'create') {
          enterCreateMode();
        } else if (idParam) {
          enterExistingMode(idParam);
        } else {
          window.location.href = 'trips.html';
        }
      }

      setupDragAndDrop();
      bindStaticActionHandlers();
      bindFormAndToggleHandlers();
      initRouter();
    });
  </script>
</body>
</html>
