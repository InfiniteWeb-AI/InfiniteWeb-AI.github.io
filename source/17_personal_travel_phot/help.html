<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Photo Gallery - Help</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="help.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header" role="banner">
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" title="Homepage and dashboard">Home</a>
        <a href="photos.html" title="Browse and filter all photos">All Photos</a>
        <a href="albums.html" title="View and manage photo albums">Albums</a>
        <a href="collections.html" title="Smart and custom photo collections">Collections</a>
        <a href="trips.html" title="Travel stories and trip timelines">Trips</a>
      </nav>
    </header>

    <main id="content" role="main">
      <div class="help-page" data-component="help-page">
        <div class="help-local-nav" aria-label="Help navigation">
          <span class="help-breadcrumb">Help</span>
          <span class="help-local-nav-separator" aria-hidden="true">&middot;</span>
          <a href="javascript:void(0)" data-action="scroll-to-top">Top</a>
          <span class="help-local-nav-separator" aria-hidden="true">&middot;</span>
          <a href="javascript:void(0)" data-action="scroll-to-faq">FAQ</a>
        </div>

        <section class="help-frame" aria-label="Help content frame">
          <header class="help-frame-header">
            <h1 class="help-title">Help</h1>
            <nav class="help-toc" aria-label="Help topics">
              <h2 class="visually-hidden">Help topics</h2>
              <ul class="help-toc-list" data-populate="help-toc"></ul>
            </nav>
          </header>

          <div class="help-body">
            <div class="help-sections" data-populate="help-sections" aria-live="polite"></div>

            <section class="help-faq" id="help-faq" aria-label="Frequently asked questions">
              <h2 class="help-faq-title">FAQ</h2>
              <div class="help-faq-list" data-populate="help-faq"></div>
            </section>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <nav class="footer-nav" aria-label="Footer">
        <a href="about.html" title="About this travel photo gallery">About</a>
        <span class="footer-separator">&middot;</span>
        <a href="help.html" title="Help and usage guide">Help</a>
      </nav>
      <p class="footer-meta">&copy; 2024 Travel Photo Gallery</p>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const initialSectionParam = urlParams.get('section');

    let helpData = null;
    let currentSectionId = null;
    let sectionIdsInOrder = [];

    function loadHelpContentOnce() {
      try {
        helpData = WebsiteSDK.getHelpContent();
      } catch (error) {
        displayHelpError('Unable to load help content. Please try reloading the page.');
        return;
      }

      if (!helpData || !Array.isArray(helpData.sections) || helpData.sections.length === 0) {
        displayHelpError('No help content is available yet.');
        return;
      }

      sectionIdsInOrder = helpData.sections.map(function(section) { return section.id; });

      initialiseCurrentSectionId();
      populateHelpAreas();
      setupActionHandlers();
      updateTocActiveState();
      scrollToSection(currentSectionId, { smooth: false });
      setupPopstateHandler();
    }

    function initialiseCurrentSectionId() {
      if (initialSectionParam && sectionIdsInOrder.indexOf(initialSectionParam) !== -1) {
        currentSectionId = initialSectionParam;
      } else {
        currentSectionId = sectionIdsInOrder[0];
        if (currentSectionId) {
          updateUrlSectionParam(currentSectionId, { replace: true });
        }
      }
    }

    function populateHelpAreas() {
      const populateElements = document.querySelectorAll('[data-populate]');

      populateElements.forEach(function(element) {
        const dataType = element.dataset.populate;

        if (dataType === 'help-toc') {
          renderToc(element, helpData.sections);
        } else if (dataType === 'help-sections') {
          renderSections(element, helpData.sections);
        } else if (dataType === 'help-faq') {
          renderFaq(element, Array.isArray(helpData.faq) ? helpData.faq : []);
        }
      });
    }

    function renderToc(container, sections) {
      container.innerHTML = '';

      sections.forEach(function(section) {
        const li = document.createElement('li');
        li.className = 'help-toc-item';

        const link = document.createElement('a');
        link.href = 'javascript:void(0)';
        link.dataset.action = 'toc-item';
        link.dataset.sectionId = section.id;
        link.textContent = section.title || section.id;

        li.appendChild(link);
        container.appendChild(li);
      });
    }

    function renderSections(container, sections) {
      container.innerHTML = '';

      sections.forEach(function(section) {
        const sectionEl = document.createElement('section');
        sectionEl.className = 'help-section';
        sectionEl.setAttribute('data-section-id', section.id);
        sectionEl.id = 'help-section-' + section.id;

        const heading = document.createElement('h2');
        heading.className = 'help-section-title';
        heading.textContent = section.title || section.id;

        const body = document.createElement('div');
        body.className = 'help-section-body';
        body.innerHTML = section.bodyHtml || '';

        sectionEl.appendChild(heading);
        sectionEl.appendChild(body);

        container.appendChild(sectionEl);
      });
    }

    function renderFaq(container, faqEntries) {
      container.innerHTML = '';

      if (!faqEntries.length) {
        const emptyState = document.createElement('p');
        emptyState.className = 'help-faq-empty';
        emptyState.textContent = 'No FAQs are available yet.';
        container.appendChild(emptyState);
        return;
      }

      faqEntries.forEach(function(entry, index) {
        const item = document.createElement('article');
        item.className = 'help-faq-item';

        const questionButton = document.createElement('button');
        questionButton.type = 'button';
        questionButton.className = 'help-faq-question';
        questionButton.dataset.action = 'faq-toggle';
        const answerId = 'faq-answer-' + index;
        questionButton.setAttribute('aria-expanded', 'false');
        questionButton.setAttribute('aria-controls', answerId);
        questionButton.textContent = entry.question || 'Question';

        const answer = document.createElement('div');
        answer.id = answerId;
        answer.className = 'help-faq-answer';
        answer.hidden = true;
        answer.innerHTML = entry.answerHtml || '';

        item.appendChild(questionButton);
        item.appendChild(answer);
        container.appendChild(item);
      });
    }

    function setupActionHandlers() {
      const actionElements = document.querySelectorAll('[data-action]');

      actionElements.forEach(function(element) {
        const action = element.dataset.action;

        if (action === 'toc-item') {
          element.addEventListener('click', onTocItemClick);
        } else if (action === 'faq-toggle') {
          element.addEventListener('click', onFaqToggleClick);
        } else if (action === 'scroll-to-top') {
          element.addEventListener('click', onScrollToTopClick);
        } else if (action === 'scroll-to-faq') {
          element.addEventListener('click', onScrollToFaqClick);
        }
      });
    }

    function onTocItemClick(event) {
      event.preventDefault();
      const sectionId = event.currentTarget.dataset.sectionId;
      if (!sectionId || sectionIdsInOrder.indexOf(sectionId) === -1) {
        return;
      }
      currentSectionId = sectionId;
      updateTocActiveState();
      updateUrlSectionParam(sectionId, { replace: false });
      scrollToSection(sectionId, { smooth: true });
    }

    function onFaqToggleClick(event) {
      event.preventDefault();
      const button = event.currentTarget;
      const answerId = button.getAttribute('aria-controls');
      if (!answerId) {
        return;
      }
      const answer = document.getElementById(answerId);
      if (!answer) {
        return;
      }
      const isExpanded = button.getAttribute('aria-expanded') === 'true';
      const nextExpanded = !isExpanded;
      button.setAttribute('aria-expanded', nextExpanded ? 'true' : 'false');
      answer.hidden = !nextExpanded;
      if (nextExpanded) {
        answer.classList.add('is-open');
      } else {
        answer.classList.remove('is-open');
      }
    }

    function onScrollToTopClick(event) {
      event.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function onScrollToFaqClick(event) {
      event.preventDefault();
      const faqSection = document.getElementById('help-faq');
      if (faqSection) {
        faqSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function updateTocActiveState() {
      const tocLinks = document.querySelectorAll('[data-action="toc-item"]');
      tocLinks.forEach(function(link) {
        const sectionId = link.dataset.sectionId;
        if (sectionId === currentSectionId) {
          link.classList.add('is-active');
          link.setAttribute('aria-current', 'true');
        } else {
          link.classList.remove('is-active');
          link.removeAttribute('aria-current');
        }
      });
    }

    function scrollToSection(sectionId, options) {
      if (!sectionId) {
        return;
      }
      const target = document.querySelector('[data-section-id="' + sectionId + '"]');
      if (!target) {
        return;
      }
      const behavior = options && options.smooth ? 'smooth' : 'auto';
      target.scrollIntoView({ behavior: behavior, block: 'start' });
    }

    function updateUrlSectionParam(sectionId, options) {
      if (!window.history || !window.history.pushState) {
        return;
      }
      const opts = options || {};
      const url = new URL(window.location.href);
      if (sectionId) {
        url.searchParams.set('section', sectionId);
      } else {
        url.searchParams.delete('section');
      }
      const method = opts.replace ? 'replaceState' : 'pushState';
      window.history[method]({}, '', url.toString());
    }

    function setupPopstateHandler() {
      window.addEventListener('popstate', function() {
        if (!helpData || !sectionIdsInOrder.length) {
          return;
        }
        const params = new URLSearchParams(window.location.search);
        const sectionFromUrl = params.get('section');
        if (sectionFromUrl && sectionIdsInOrder.indexOf(sectionFromUrl) !== -1) {
          if (sectionFromUrl !== currentSectionId) {
            currentSectionId = sectionFromUrl;
            updateTocActiveState();
            scrollToSection(currentSectionId, { smooth: false });
          }
        }
      });
    }

    function displayHelpError(message) {
      const frame = document.querySelector('.help-frame');
      if (!frame) {
        return;
      }
      frame.innerHTML = '';
      const errorContainer = document.createElement('div');
      errorContainer.className = 'help-error';

      const heading = document.createElement('h2');
      heading.textContent = 'Help is temporarily unavailable';

      const paragraph = document.createElement('p');
      paragraph.textContent = message || 'Please try again in a moment.';

      errorContainer.appendChild(heading);
      errorContainer.appendChild(paragraph);
      frame.appendChild(errorContainer);
    }

    loadHelpContentOnce();
  });
  </script>
</body>
</html>
