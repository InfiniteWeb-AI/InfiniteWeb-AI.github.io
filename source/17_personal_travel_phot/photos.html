<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Photo Gallery</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="photos.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header" role="banner">
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" title="Homepage and dashboard">Home</a>
        <a href="photos.html" title="Browse and filter all photos">All Photos</a>
        <a href="albums.html" title="View and manage photo albums">Albums</a>
        <a href="collections.html" title="Smart and custom photo collections">Collections</a>
        <a href="trips.html" title="Travel stories and trip timelines">Trips</a>
      </nav>
    </header>

    <main id="content" role="main">
      <div id="all-photos-page" class="photos-page">
        <div class="content-column">
          <div class="context-row" data-component="context-navigation-helper">
            <a href="javascript:void(0)" class="context-link" data-action="goBackToContext">&larr; Back</a>
          </div>

          <header class="page-header" data-component="all-photos-page-controller">
            <h1 class="page-title">All Photos</h1>
          </header>

          <div class="page-messages" data-component="messages" aria-live="polite"></div>

          <section class="controls-row" aria-label="Photo filters and sorting">
            <div class="filters-bar" data-component="filters-bar">
              <form class="filters-form" data-role="filtersForm">
                <div class="filter-group">
                  <label for="filter-region">Region</label>
                  <select id="filter-region" name="region" data-action="changeFilter" data-filter-key="region">
                    <option value="">All regions</option>
                  </select>
                </div>

                <div class="filter-group">
                  <label for="filter-country">Country</label>
                  <select id="filter-country" name="country" data-action="changeFilter" data-filter-key="country">
                    <option value="">All countries</option>
                  </select>
                </div>

                <div class="filter-group filter-group-dates">
                  <label for="filter-date-start">Capture date</label>
                  <div class="filter-dates-inline">
                    <input id="filter-date-start" name="startDate" type="date" data-action="changeFilter" data-filter-key="startDate" />
                    <span class="filter-dates-separator">&ndash;</span>
                    <input id="filter-date-end" name="endDate" type="date" data-action="changeFilter" data-filter-key="endDate" />
                  </div>
                </div>

                <div class="filter-group filter-group-toggle">
                  <label class="filter-checkbox-label">
                    <input id="filter-favorites" name="favoritesOnly" type="checkbox" data-action="changeFilter" data-filter-key="favoritesOnly" />
                    <span>Favorites only</span>
                  </label>
                </div>

                <div class="filter-group">
                  <label for="filter-rating">Minimum rating</label>
                  <select id="filter-rating" name="ratingMin" data-action="changeFilter" data-filter-key="ratingMin">
                    <option value="">Any rating</option>
                  </select>
                </div>

                <div class="filter-group">
                  <label for="filter-tag">Tag</label>
                  <select id="filter-tag" name="tag" data-action="changeFilter" data-filter-key="tag">
                    <option value="">All tags</option>
                  </select>
                </div>

                <div class="filter-group">
                  <label for="filter-person">Person</label>
                  <select id="filter-person" name="personId" data-action="changeFilter" data-filter-key="person">
                    <option value="">Anyone</option>
                  </select>
                </div>

                <div class="filter-group filter-group-clear">
                  <button type="button" class="link-button" data-action="clearFilters">Clear filters</button>
                </div>
              </form>
            </div>

            <div class="sort-control" data-component="sort-control">
              <label for="sort-order">Sort</label>
              <select id="sort-order" name="sort" data-action="changeSort">
                <option value="">Default order</option>
                <option value="date_taken_newest">Date: Newest first</option>
                <option value="date_taken_oldest">Date: Oldest first</option>
                <option value="likes_high_to_low">Likes: High to low</option>
                <option value="rating_high_to_low">Rating: High to low</option>
              </select>
            </div>
          </section>

          <section class="active-filters-summary" data-component="active-filters-summary">
            <div class="active-filters-chips" data-populate="activeFiltersSummary" aria-live="polite"></div>
          </section>

          <section class="selection-toolbar-wrapper">
            <div class="selection-toolbar" data-component="selection-toolbar" data-state="hidden" aria-hidden="true">
              <div class="selection-info">
                <span class="selection-count" data-role="selectionCount">0</span>
                <span class="selection-label">selected</span>
                <button type="button" class="link-button" data-action="selectAllVisible">Select all on page</button>
                <button type="button" class="link-button" data-action="clearSelection">Clear selection</button>
              </div>
              <div class="selection-actions">
                <button type="button" data-action="bulkLike">Like</button>
                <button type="button" data-action="bulkUnlike">Unlike</button>
                <button type="button" data-action="bulkMarkToPrint">Mark To Print</button>
                <button type="button" data-action="bulkUnmarkToPrint">Unmark To Print</button>

                <div class="selection-action-group">
                  <label for="bulk-collection-select" class="visually-hidden">Collection</label>
                  <select id="bulk-collection-select" name="collectionId">
                    <option value="">Choose collection</option>
                  </select>
                  <button type="button" data-action="bulkAddToCollection">Add to Collection</button>
                </div>

                <div class="selection-action-group">
                  <label for="bulk-person-select" class="visually-hidden">Person</label>
                  <select id="bulk-person-select" name="personId">
                    <option value="">Choose person</option>
                  </select>
                  <button type="button" data-action="bulkTagPerson">Tag Person</button>
                </div>

                <button type="button" data-action="createSlideshow">Create Slideshow</button>
              </div>
            </div>
          </section>

          <section class="photo-grid-section">
            <div class="photo-grid" data-component="photo-grid" data-populate="photos" aria-live="polite"></div>
          </section>

          <nav class="pagination" data-component="pagination-controller" aria-label="All photos pagination"></nav>
        </div>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <nav class="footer-nav" aria-label="Footer">
        <a href="about.html" title="About this travel photo gallery">About</a>
        <span class="footer-separator">&middot;</span>
        <a href="help.html" title="Help and usage guide">Help</a>
      </nav>
      <p class="footer-meta">&copy; 2024 Travel Photo Gallery</p>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
  (function() {
    'use strict';

    var PAGE_SIZE = 60;

    var appState = {
      filterOptions: null,
      filters: {},
      sort: null,
      page: 1,
      pageSize: PAGE_SIZE,
      photos: [],
      totalCount: 0,
      selection: new Set(),
      rawTagName: null,
      activeTag: null
    };

    function showMessage(type, text) {
      var container = document.querySelector('[data-component="messages"]');
      if (!container) return;
      var msg = document.createElement('div');
      msg.className = 'message message-' + type;
      msg.textContent = text;
      container.appendChild(msg);
      window.setTimeout(function() {
        if (msg.parentNode === container) {
          container.removeChild(msg);
        }
      }, 4000);
    }

    function loadFilterOptions() {
      try {
        var options = WebsiteSDK.getAllPhotoFilterOptions();
        appState.filterOptions = options || {};
        renderFilterControls(options || {});
        renderBulkPersonSelect(options || {});
      } catch (err) {
        showMessage('error', 'Unable to load filter options.');
        appState.filterOptions = {};
      }
    }

    function renderFilterControls(options) {
      var regions = Array.isArray(options.regions) ? options.regions : [];
      var countries = Array.isArray(options.countries) ? options.countries : [];
      var tags = Array.isArray(options.tags) ? options.tags : [];
      var people = Array.isArray(options.people) ? options.people : [];
      var ratingValues = Array.isArray(options.ratingValues) ? options.ratingValues : [];

      var regionSelect = document.getElementById('filter-region');
      if (regionSelect) {
        regionSelect.innerHTML = '<option value="">All regions<\/option>';
        regions.forEach(function(region) {
          var opt = document.createElement('option');
          opt.value = region.value;
          opt.textContent = region.label || region.value;
          regionSelect.appendChild(opt);
        });
      }

      var countrySelect = document.getElementById('filter-country');
      if (countrySelect) {
        countrySelect.innerHTML = '<option value="">All countries<\/option>';
        countries.forEach(function(country) {
          var optC = document.createElement('option');
          optC.value = country;
          optC.textContent = country;
          countrySelect.appendChild(optC);
        });
      }

      var ratingSelect = document.getElementById('filter-rating');
      if (ratingSelect) {
        ratingSelect.innerHTML = '<option value="">Any rating<\/option>';
        ratingValues.slice().sort(function(a, b) { return a - b; }).forEach(function(r) {
          var optR = document.createElement('option');
          optR.value = String(r);
          optR.textContent = r + ' and up';
          ratingSelect.appendChild(optR);
        });
      }

      var tagSelect = document.getElementById('filter-tag');
      if (tagSelect) {
        tagSelect.innerHTML = '<option value="">All tags<\/option>';
        tags.forEach(function(tag) {
          var optT = document.createElement('option');
          optT.value = tag.id;
          optT.textContent = tag.name;
          tagSelect.appendChild(optT);
        });
      }

      var personSelect = document.getElementById('filter-person');
      if (personSelect) {
        personSelect.innerHTML = '<option value="">Anyone<\/option>';
        people.forEach(function(person) {
          var optP = document.createElement('option');
          optP.value = person.id;
          optP.textContent = person.displayName || person.name;
          personSelect.appendChild(optP);
        });
      }
    }

    function renderBulkPersonSelect(options) {
      var people = Array.isArray(options.people) ? options.people : [];
      var select = document.getElementById('bulk-person-select');
      if (!select) return;
      select.innerHTML = '<option value="">Choose person<\/option>';
      people.forEach(function(person) {
        var opt = document.createElement('option');
        opt.value = person.id;
        opt.textContent = person.displayName || person.name;
        select.appendChild(opt);
      });
    }

    function loadCollectionsForBulkSelect() {
      var select = document.getElementById('bulk-collection-select');
      if (!select) return;
      var collections = [];
      try {
        var raw = window.localStorage.getItem('collections');
        if (raw) {
          var parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) {
            collections = parsed;
          }
        }
      } catch (e) {
        collections = [];
      }
      select.innerHTML = '<option value="">Choose collection<\/option>';
      collections.forEach(function(col) {
        var opt = document.createElement('option');
        opt.value = col.id;
        opt.textContent = col.name || col.id;
        select.appendChild(opt);
      });
    }

    function updateStateFromUrl(params) {
      var filters = {};

      var region = params.get('region');
      if (region) {
        filters.region = region;
      }

      var country = params.get('country');
      if (country) {
        filters.country = country;
      }

      var startDate = params.get('startDate');
      if (startDate) {
        filters.dateFrom = startDate;
      }

      var endDate = params.get('endDate');
      if (endDate) {
        filters.dateTo = endDate;
      }

      var favStr = params.get('favoritesOnly');
      if (favStr === 'true' || favStr === '1') {
        filters.favoritesOnly = true;
      }

      var ratingStr = params.get('ratingMin');
      if (ratingStr !== null && ratingStr !== '') {
        var ratingNum = Number(ratingStr);
        if (!isNaN(ratingNum)) {
          filters.minRating = ratingNum;
        }
      }

      var personId = params.get('personId');
      if (personId) {
        filters.personIds = [personId];
      }

      var tagName = params.get('tag');
      appState.rawTagName = tagName || null;
      appState.activeTag = null;
      if (appState.filterOptions && tagName) {
        var tags = Array.isArray(appState.filterOptions.tags) ? appState.filterOptions.tags : [];
        for (var i = 0; i < tags.length; i++) {
          if (tags[i].name === tagName) {
            filters.tagIds = [tags[i].id];
            appState.activeTag = tags[i];
            break;
          }
        }
      }

      appState.filters = filters;

      var sort = params.get('sort');
      appState.sort = sort || null;

      var pageStr = params.get('page');
      var page = parseInt(pageStr || '1', 10);
      if (!page || page < 1) {
        page = 1;
      }
      appState.page = page;
    }

    function applyStateToFilterControls() {
      var filters = appState.filters || {};

      var regionSelect = document.getElementById('filter-region');
      if (regionSelect) {
        regionSelect.value = filters.region || '';
      }

      var countrySelect = document.getElementById('filter-country');
      if (countrySelect) {
        countrySelect.value = filters.country || '';
      }

      var startInput = document.getElementById('filter-date-start');
      if (startInput) {
        startInput.value = filters.dateFrom || '';
      }

      var endInput = document.getElementById('filter-date-end');
      if (endInput) {
        endInput.value = filters.dateTo || '';
      }

      var favCheckbox = document.getElementById('filter-favorites');
      if (favCheckbox) {
        favCheckbox.checked = !!filters.favoritesOnly;
      }

      var ratingSelect = document.getElementById('filter-rating');
      if (ratingSelect) {
        if (typeof filters.minRating === 'number') {
          ratingSelect.value = String(filters.minRating);
        } else {
          ratingSelect.value = '';
        }
      }

      var tagSelect = document.getElementById('filter-tag');
      if (tagSelect) {
        if (filters.tagIds && filters.tagIds.length) {
          tagSelect.value = filters.tagIds[0];
        } else {
          tagSelect.value = '';
        }
      }

      var personSelect = document.getElementById('filter-person');
      if (personSelect) {
        if (filters.personIds && filters.personIds.length) {
          personSelect.value = filters.personIds[0];
        } else {
          personSelect.value = '';
        }
      }

      var sortSelect = document.getElementById('sort-order');
      if (sortSelect) {
        sortSelect.value = appState.sort || '';
      }
    }

    function renderPhotosGrid(container, photos) {
      container.innerHTML = '';
      if (!photos || !photos.length) {
        container.innerHTML = '<p class="no-photos">No photos match the current filters.<\/p>';
        return;
      }

      var fragment = document.createDocumentFragment();

      photos.forEach(function(photo) {
        var card = document.createElement('article');
        card.className = 'photo-card';
        card.dataset.photoId = photo.id;

        var selectLabel = document.createElement('label');
        selectLabel.className = 'photo-select';
        var checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.dataset.action = 'togglePhotoSelection';
        checkbox.dataset.photoId = photo.id;
        checkbox.checked = appState.selection.has(photo.id);
        var checkText = document.createElement('span');
        checkText.className = 'photo-select-label';
        checkText.textContent = 'Select';
        selectLabel.appendChild(checkbox);
        selectLabel.appendChild(checkText);

        var link = document.createElement('a');
        link.href = 'javascript:void(0)';
        link.className = 'photo-thumb-link';
        link.dataset.action = 'openPhotoDetail';
        link.dataset.photoId = photo.id;

        var figure = document.createElement('figure');
        figure.className = 'photo-frame';
        var img = document.createElement('img');
        img.src = photo.thumbnailUrl || photo.fileUrl;
        img.alt = photo.title || photo.caption || 'Photo';
        img.loading = 'lazy';
        figure.appendChild(img);
        link.appendChild(figure);

        var meta = document.createElement('div');
        meta.className = 'photo-meta';

        if (photo.isFavorite) {
          var favSpan = document.createElement('span');
          favSpan.className = 'meta-flag favorite-flag';
          favSpan.textContent = '\u2605 Favorite';
          meta.appendChild(favSpan);
        }

        if (typeof photo.rating === 'number') {
          var ratingSpan = document.createElement('span');
          ratingSpan.className = 'meta-rating';
          ratingSpan.textContent = 'Rating: ' + photo.rating;
          meta.appendChild(ratingSpan);
        }

        var likesSpan = document.createElement('span');
        likesSpan.className = 'meta-likes';
        likesSpan.textContent = 'Likes: ' + (photo.likesCount != null ? photo.likesCount : 0);
        meta.appendChild(likesSpan);

        if (photo.toPrint) {
          var printSpan = document.createElement('span');
          printSpan.className = 'meta-flag to-print-flag';
          printSpan.textContent = 'To Print';
          meta.appendChild(printSpan);
        }

        card.appendChild(selectLabel);
        card.appendChild(link);
        card.appendChild(meta);

        fragment.appendChild(card);
      });

      container.appendChild(fragment);
    }

    function renderActiveFiltersSummary(container) {
      container.innerHTML = '';
      var filters = appState.filters || {};
      var options = appState.filterOptions || {};
      var chips = [];

      if (filters.region) {
        var regions = Array.isArray(options.regions) ? options.regions : [];
        var regionLabel = filters.region;
        for (var i = 0; i < regions.length; i++) {
          if (regions[i].value === filters.region) {
            regionLabel = regions[i].label || regions[i].value;
            break;
          }
        }
        chips.push({ key: 'region', label: 'Region: ' + regionLabel, paramKeys: ['region'] });
      }

      if (filters.country) {
        chips.push({ key: 'country', label: 'Country: ' + filters.country, paramKeys: ['country'] });
      }

      if (filters.dateFrom || filters.dateTo) {
        var dateLabel = 'Date: ';
        if (filters.dateFrom && filters.dateTo) {
          dateLabel += filters.dateFrom + ' \/ ' + filters.dateTo;
        } else if (filters.dateFrom) {
          dateLabel += 'From ' + filters.dateFrom;
        } else if (filters.dateTo) {
          dateLabel += 'Up to ' + filters.dateTo;
        }
        chips.push({ key: 'dateRange', label: dateLabel, paramKeys: ['startDate', 'endDate'] });
      }

      if (filters.favoritesOnly) {
        chips.push({ key: 'favoritesOnly', label: 'Favorites only', paramKeys: ['favoritesOnly'] });
      }

      if (typeof filters.minRating === 'number') {
        chips.push({ key: 'ratingMin', label: 'Rating \u2265 ' + filters.minRating, paramKeys: ['ratingMin'] });
      }

      if (appState.activeTag) {
        chips.push({ key: 'tag', label: 'Tag: ' + appState.activeTag.name, paramKeys: ['tag'] });
      }

      if (filters.personIds && filters.personIds.length) {
        var people = Array.isArray(options.people) ? options.people : [];
        var personLabel = 'Person';
        for (var j = 0; j < people.length; j++) {
          if (people[j].id === filters.personIds[0]) {
            personLabel = people[j].displayName || people[j].name;
            break;
          }
        }
        chips.push({ key: 'personId', label: 'Person: ' + personLabel, paramKeys: ['personId'] });
      }

      if (!chips.length) {
        container.setAttribute('aria-hidden', 'true');
        return;
      }

      container.removeAttribute('aria-hidden');
      var list = document.createElement('ul');
      list.className = 'filter-chips-list';

      chips.forEach(function(chip) {
        var li = document.createElement('li');
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'filter-chip';
        btn.dataset.action = 'removeFilterChip';
        btn.dataset.filterKey = chip.key;
        btn.dataset.filterParams = chip.paramKeys.join(',');
        btn.textContent = chip.label + ' \u00d7';
        li.appendChild(btn);
        list.appendChild(li);
      });

      container.appendChild(list);
    }

    function renderPagination(container) {
      var total = appState.totalCount || 0;
      var pageSize = appState.pageSize;
      var page = appState.page || 1;
      var totalPages = Math.max(1, Math.ceil(total / pageSize));
      container.innerHTML = '';

      if (totalPages <= 1) {
        return;
      }

      var wrapper = document.createElement('div');
      wrapper.className = 'pagination-inner';

      var prev = document.createElement('button');
      prev.type = 'button';
      prev.textContent = 'Previous';
      prev.dataset.action = 'changePage';
      prev.dataset.page = String(page - 1);
      if (page <= 1) {
        prev.disabled = true;
      }
      wrapper.appendChild(prev);

      for (var p = 1; p <= totalPages; p++) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = String(p);
        btn.dataset.action = 'changePage';
        btn.dataset.page = String(p);
        if (p === page) {
          btn.disabled = true;
          btn.className = 'is-current';
        }
        wrapper.appendChild(btn);
      }

      var next = document.createElement('button');
      next.type = 'button';
      next.textContent = 'Next';
      next.dataset.action = 'changePage';
      next.dataset.page = String(page + 1);
      if (page >= totalPages) {
        next.disabled = true;
      }
      wrapper.appendChild(next);

      container.appendChild(wrapper);
    }

    function clearSelection() {
      appState.selection.clear();
      var toolbar = document.querySelector('[data-component="selection-toolbar"]');
      if (toolbar) {
        toolbar.dataset.state = 'hidden';
        toolbar.setAttribute('aria-hidden', 'true');
        var countEl = toolbar.querySelector('[data-role="selectionCount"]');
        if (countEl) {
          countEl.textContent = '0';
        }
      }
      var checkboxes = document.querySelectorAll('input[data-action="togglePhotoSelection"]');
      checkboxes.forEach(function(cb) {
        cb.checked = false;
      });
    }

    function updateSelectionToolbar() {
      var toolbar = document.querySelector('[data-component="selection-toolbar"]');
      if (!toolbar) return;
      var count = appState.selection.size;
      var countEl = toolbar.querySelector('[data-role="selectionCount"]');
      if (countEl) {
        countEl.textContent = String(count);
      }
      if (count > 0) {
        toolbar.dataset.state = 'visible';
        toolbar.setAttribute('aria-hidden', 'false');
      } else {
        toolbar.dataset.state = 'hidden';
        toolbar.setAttribute('aria-hidden', 'true');
      }
    }

    function loadFromCurrentUrl() {
      var url = new URL(window.location.href);
      var params = url.searchParams;
      updateStateFromUrl(params);

      try {
        var result = WebsiteSDK.getAllPhotos(appState.filters || {}, appState.sort || undefined, appState.page || 1, appState.pageSize);
        appState.photos = (result && result.photos) ? result.photos : [];
        appState.totalCount = (result && typeof result.totalCount === 'number') ? result.totalCount : appState.photos.length;
      } catch (err) {
        showMessage('error', 'Unable to load photos.');
        appState.photos = [];
        appState.totalCount = 0;
      }

      var gridEl = document.querySelector('[data-populate="photos"]');
      if (gridEl) {
        renderPhotosGrid(gridEl, appState.photos);
      }

      var summaryEl = document.querySelector('[data-populate="activeFiltersSummary"]');
      if (summaryEl) {
        renderActiveFiltersSummary(summaryEl);
      }

      var paginationEl = document.querySelector('[data-component="pagination-controller"]');
      if (paginationEl) {
        renderPagination(paginationEl);
      }

      applyStateToFilterControls();
      clearSelection();
    }

    function handleFilterChange(control) {
      var filterKey = control.dataset.filterKey;
      if (!filterKey) return;
      var url = new URL(window.location.href);
      var params = url.searchParams;

      if (filterKey === 'region') {
        var region = control.value;
        if (region) {
          params.set('region', region);
        } else {
          params.delete('region');
        }
      } else if (filterKey === 'country') {
        var country = control.value;
        if (country) {
          params.set('country', country);
        } else {
          params.delete('country');
        }
      } else if (filterKey === 'startDate') {
        var startDate = control.value;
        if (startDate) {
          params.set('startDate', startDate);
        } else {
          params.delete('startDate');
        }
      } else if (filterKey === 'endDate') {
        var endDate = control.value;
        if (endDate) {
          params.set('endDate', endDate);
        } else {
          params.delete('endDate');
        }
      } else if (filterKey === 'favoritesOnly') {
        var checked = control.checked;
        if (checked) {
          params.set('favoritesOnly', 'true');
        } else {
          params.delete('favoritesOnly');
        }
      } else if (filterKey === 'ratingMin') {
        var rating = control.value;
        if (rating) {
          params.set('ratingMin', rating);
        } else {
          params.delete('ratingMin');
        }
      } else if (filterKey === 'tag') {
        var tagId = control.value;
        if (tagId && appState.filterOptions && Array.isArray(appState.filterOptions.tags)) {
          var tags = appState.filterOptions.tags;
          var name = null;
          for (var i = 0; i < tags.length; i++) {
            if (tags[i].id === tagId) {
              name = tags[i].name;
              break;
            }
          }
          if (name) {
            params.set('tag', name);
          } else {
            params.delete('tag');
          }
        } else {
          params.delete('tag');
        }
      } else if (filterKey === 'person') {
        var personId = control.value;
        if (personId) {
          params.set('personId', personId);
        } else {
          params.delete('personId');
        }
      }

      params.set('page', '1');
      url.search = params.toString();
      window.history.pushState({}, '', url.toString());
      loadFromCurrentUrl();
    }

    function handleSortChange(control) {
      var url = new URL(window.location.href);
      var params = url.searchParams;
      var value = control.value;
      if (value) {
        params.set('sort', value);
      } else {
        params.delete('sort');
      }
      params.set('page', '1');
      url.search = params.toString();
      window.history.pushState({}, '', url.toString());
      loadFromCurrentUrl();
    }

    function handleClearFilters() {
      var url = new URL(window.location.href);
      var params = url.searchParams;
      ['region', 'country', 'startDate', 'endDate', 'favoritesOnly', 'ratingMin', 'tag', 'personId'].forEach(function(key) {
        params.delete(key);
      });
      params.set('page', '1');
      url.search = params.toString();
      window.history.pushState({}, '', url.toString());
      loadFromCurrentUrl();
    }

    function handleRemoveFilterChip(target) {
      var keysStr = target.dataset.filterParams || target.dataset.filterKey || '';
      var keys = keysStr.split(',').map(function(k) { return k.trim(); }).filter(function(k) { return k.length > 0; });
      if (!keys.length) return;
      var url = new URL(window.location.href);
      var params = url.searchParams;
      keys.forEach(function(key) {
        params.delete(key);
      });
      params.set('page', '1');
      url.search = params.toString();
      window.history.pushState({}, '', url.toString());
      loadFromCurrentUrl();
    }

    function handleChangePage(pageStr) {
      var page = parseInt(pageStr || '1', 10);
      if (!page || page < 1) return;
      var url = new URL(window.location.href);
      var params = url.searchParams;
      params.set('page', String(page));
      url.search = params.toString();
      window.history.pushState({}, '', url.toString());
      loadFromCurrentUrl();
    }

    function handleTogglePhotoSelection(control) {
      var photoId = control.dataset.photoId;
      if (!photoId) return;
      if (control.checked) {
        appState.selection.add(photoId);
      } else {
        appState.selection.delete(photoId);
      }
      updateSelectionToolbar();
    }

    function handleSelectAllVisible() {
      appState.selection.clear();
      appState.photos.forEach(function(photo) {
        appState.selection.add(photo.id);
      });
      var checkboxes = document.querySelectorAll('input[data-action="togglePhotoSelection"]');
      checkboxes.forEach(function(cb) {
        cb.checked = true;
      });
      updateSelectionToolbar();
    }

    function handleBulkLike(shouldLike) {
      if (!appState.selection.size) {
        showMessage('info', 'Select one or more photos first.');
        return;
      }
      var ids = Array.from(appState.selection);
      try {
        var result = WebsiteSDK.bulkLikePhotos(ids, shouldLike);
        if (result && result.success) {
          var count = typeof result.updatedCount === 'number' ? result.updatedCount : ids.length;
          showMessage('success', (shouldLike ? 'Liked ' : 'Unliked ') + count + ' photos.');
        } else {
          showMessage('error', 'Unable to update likes.');
        }
      } catch (err) {
        showMessage('error', 'Unable to update likes.');
      }
      loadFromCurrentUrl();
    }

    function handleBulkMarkToPrint(toPrint) {
      if (!appState.selection.size) {
        showMessage('info', 'Select one or more photos first.');
        return;
      }
      var ids = Array.from(appState.selection);
      try {
        var result = WebsiteSDK.bulkMarkPhotosToPrint(ids, toPrint);
        if (result && result.success) {
          var count = typeof result.updatedCount === 'number' ? result.updatedCount : ids.length;
          showMessage('success', (toPrint ? 'Marked ' : 'Unmarked ') + count + ' photos.');
        } else {
          showMessage('error', 'Unable to update To Print flags.');
        }
      } catch (err) {
        showMessage('error', 'Unable to update To Print flags.');
      }
      loadFromCurrentUrl();
    }

    function handleBulkAddToCollection() {
      if (!appState.selection.size) {
        showMessage('info', 'Select one or more photos first.');
        return;
      }
      var select = document.getElementById('bulk-collection-select');
      if (!select) {
        showMessage('error', 'Collection selector not available.');
        return;
      }
      var collectionId = select.value;
      if (!collectionId) {
        showMessage('info', 'Choose a collection first.');
        return;
      }
      var ids = Array.from(appState.selection);
      try {
        var result = WebsiteSDK.bulkAddPhotosToCollection(collectionId, ids);
        if (result && result.success) {
          var count = typeof result.addedCount === 'number' ? result.addedCount : ids.length;
          var colName = result.collection && result.collection.name ? result.collection.name : 'collection';
          showMessage('success', 'Added ' + count + ' photos to ' + colName + '.');
        } else {
          showMessage('error', 'Unable to add photos to collection.');
        }
      } catch (err) {
        showMessage('error', 'Unable to add photos to collection.');
      }
    }

    function handleBulkTagPerson() {
      if (!appState.selection.size) {
        showMessage('info', 'Select one or more photos first.');
        return;
      }
      var select = document.getElementById('bulk-person-select');
      if (!select) {
        showMessage('error', 'Person selector not available.');
        return;
      }
      var personId = select.value;
      if (!personId) {
        showMessage('info', 'Choose a person first.');
        return;
      }
      var ids = Array.from(appState.selection);
      try {
        var result = WebsiteSDK.bulkTagPeopleOnPhotos(ids, personId);
        if (result && result.success) {
          var count = typeof result.updatedCount === 'number' ? result.updatedCount : ids.length;
          var personName = result.person && (result.person.displayName || result.person.name) ? (result.person.displayName || result.person.name) : 'person';
          showMessage('success', 'Tagged ' + count + ' photos with ' + personName + '.');
        } else {
          showMessage('error', 'Unable to tag person on photos.');
        }
      } catch (err) {
        showMessage('error', 'Unable to tag person on photos.');
      }
      loadFromCurrentUrl();
    }

    function handleCreateSlideshow() {
      if (!appState.selection.size) {
        showMessage('info', 'Select one or more photos to create a slideshow.');
        return;
      }
      var ids = Array.from(appState.selection);
      var paramValue = ids.join(',');
      var href = 'slideshow_edit.html?photoIds=' + encodeURIComponent(paramValue);
      window.location.href = href;
    }

    function handleOpenPhotoDetail(photoId) {
      if (!photoId) return;
      var context = {
        source: 'all_photos',
        query: window.location.search.replace(/^\?/, ''),
        page: appState.page,
        sort: appState.sort,
        filters: appState.filters,
        selectedPhotoIds: Array.from(appState.selection)
      };
      var contextStr = encodeURIComponent(JSON.stringify(context));
      var href = 'photo_detail.html?id=' + encodeURIComponent(photoId) + '&context=' + contextStr;
      window.location.href = href;
    }

    document.addEventListener('change', function(event) {
      var target = event.target;
      if (!(target instanceof HTMLElement)) return;
      var action = target.dataset.action;
      if (!action) return;

      if (action === 'changeFilter') {
        handleFilterChange(target);
      } else if (action === 'changeSort') {
        handleSortChange(target);
      } else if (action === 'togglePhotoSelection') {
        handleTogglePhotoSelection(target);
      }
    });

    document.addEventListener('click', function(event) {
      var target = event.target instanceof HTMLElement ? event.target.closest('[data-action]') : null;
      if (!target) return;
      var action = target.dataset.action;
      if (!action) return;

      if (action === 'clearFilters') {
        handleClearFilters();
      } else if (action === 'removeFilterChip') {
        handleRemoveFilterChip(target);
      } else if (action === 'changePage') {
        handleChangePage(target.dataset.page);
      } else if (action === 'openPhotoDetail') {
        handleOpenPhotoDetail(target.dataset.photoId);
      } else if (action === 'goBackToContext') {
        window.history.back();
      } else if (action === 'selectAllVisible') {
        handleSelectAllVisible();
      } else if (action === 'clearSelection') {
        clearSelection();
      } else if (action === 'bulkLike') {
        handleBulkLike(true);
      } else if (action === 'bulkUnlike') {
        handleBulkLike(false);
      } else if (action === 'bulkMarkToPrint') {
        handleBulkMarkToPrint(true);
      } else if (action === 'bulkUnmarkToPrint') {
        handleBulkMarkToPrint(false);
      } else if (action === 'bulkAddToCollection') {
        handleBulkAddToCollection();
      } else if (action === 'bulkTagPerson') {
        handleBulkTagPerson();
      } else if (action === 'createSlideshow') {
        handleCreateSlideshow();
      }
    });

    window.addEventListener('popstate', function() {
      loadFromCurrentUrl();
    });

    document.addEventListener('DOMContentLoaded', function() {
      loadFilterOptions();
      loadCollectionsForBulkSelect();
      loadFromCurrentUrl();
    });
  })();
  </script>
</body>
</html>
