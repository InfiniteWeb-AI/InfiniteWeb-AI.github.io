        </li>
        <li class='primary-nav-item'>
          <a href='medical_quote.html?coverage_type=family' title='Open the quote form pre-set for family coverage'>Family Plans</a>
        </li>
        <li class='primary-nav-item'>
          <a href='medical_quote.html?persona=student' title='Open the quote form pre-set for student-friendly individual coverage'>Student Plans</a>
        </li>
        <li class='primary-nav-item'>
          <a href='short_term_quote.html' title='Start a quote for short-term or temporary health insurance'>Short-Term Plans</a>

        <li class='primary-nav-item'>

  <main id='content' class='site-main' role='main'>
    <section class='saved-plans-page' data-component='saved-plans-page-shell'>
      <!-- Header / hero-style card -->
      <section class='card card-hero saved-plans-header-card' data-component='saved-plans-header' data-populate='saved-plans-header'>
        <!-- Filled via JS with title, intro text, and count -->
      </section>

      <!-- Sort controls strip -->
      <section class='saved-plans-sort-controls' data-component='saved-plans-sort-controls'>
        <div class='sort-bar'>
          <label for='savedPlansSort' class='sort-label'>Sort by</label>
          <select id='savedPlansSort' class='sort-select' data-action='change-sort'>
            <option value='premium_low_to_high'>Premium: low to high</option>
            <option value='premium_high_to_low'>Premium: high to low</option>
            <option value='deductible_low_to_high'>Deductible: low to high</option>
            <option value='deductible_high_to_low'>Deductible: high to low</option>
            <option value='oop_max_low_to_high'>Out-of-pocket max: low to high</option>
            <option value='oop_max_high_to_low'>Out-of-pocket max: high to low</option>
            <option value='total_cost_low_to_high'>Estimated total cost: low to high</option>
            <option value='total_cost_high_to_low'>Estimated total cost: high to low</option>
          </select>
        </div>
      </section>

      <!-- Loader / skeleton area -->
      <section class='saved-plans-loader' data-component='saved-plans-loader' data-populate='saved-plans-loader' aria-live='polite'>
        <!-- Initial skeleton content (may be replaced by JS) -->
        <div class='loader-skeleton-card'></div>
        <div class='loader-skeleton-card'></div>
      </section>

      <!-- Error message area -->
      <div class='saved-plans-error' data-component='saved-plans-error' role='alert' aria-live='assertive' hidden></div>

      <!-- Empty state placeholder -->
      <section class='saved-plans-empty-state card' data-component='saved-plans-empty-state' data-populate='saved-plans-empty-state' hidden>
        <!-- JS will render empty state content here -->
      </section>

      <!-- Saved plans list -->
      <section class='saved-plans-list' id='saved-plans-list' data-component='saved-plans-list' data-populate='saved-plans-list' aria-live='polite'>
        <!-- Plan cards rendered here -->
      </section>

      <!-- Pagination controls -->
      <nav class='saved-plans-pagination' data-component='saved-plans-pagination' data-populate='saved-plans-pagination' aria-label='Saved plans pages'>
        <!-- Pagination buttons rendered here -->
      </nav>
    </section>
  </main>

  <script src='business_logic.js'></script>
  <script>
    (function() {
      'use strict';

      var PAGE_SIZE = 5;
      var state = {
        sort: 'premium_low_to_high',
        page: 1,
        highlightPlanId: null,
        quoteId: null,
        highlightHandled: false,
        savedItems: [],
        pageContent: null
      };

      var containers = {
        header: null,
        loader: null,
        list: null,
        empty: null,
        pagination: null,
        error: null,
        sortSelect: null,
        pageShell: null
      };

      function parseUrlState() {
        var params = new URLSearchParams(window.location.search);
        var sort = params.get('sort');
        var pageParam = params.get('page');
        var highlightId = params.get('highlight_plan_id');
        var quoteId = params.get('quote_id');

        if (sort) {
          state.sort = sort;
        }
        var pageNumber = parseInt(pageParam || '1', 10);
        state.page = isNaN(pageNumber) || pageNumber < 1 ? 1 : pageNumber;
        state.highlightPlanId = highlightId || null;
        state.quoteId = quoteId || null;
      }

      function syncUrlState(replace) {
        var params = new URLSearchParams(window.location.search);
        if (state.sort) {
          params.set('sort', state.sort);
        } else {
          params.delete('sort');
        }
        if (state.page && state.page > 1) {
          params.set('page', String(state.page));
        } else {
          params.delete('page');
        }
        if (state.highlightPlanId) {
          params.set('highlight_plan_id', state.highlightPlanId);
        } else {
          params.delete('highlight_plan_id');
        }
        if (state.quoteId) {
          params.set('quote_id', state.quoteId);
        } else {
          params.delete('quote_id');
        }
        var newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        if (replace) {
          window.history.replaceState({}, '', newUrl);
        } else {
          window.history.pushState({}, '', newUrl);
        }
      }

      function collectContainers() {
        containers.header = document.querySelector('[data-populate="saved-plans-header"]');
        containers.loader = document.querySelector('[data-populate="saved-plans-loader"]');
        containers.list = document.querySelector('[data-populate="saved-plans-list"]');
        containers.empty = document.querySelector('[data-populate="saved-plans-empty-state"]');
        containers.pagination = document.querySelector('[data-populate="saved-plans-pagination"]');
        containers.error = document.querySelector('[data-component="saved-plans-error"]');
        containers.sortSelect = document.querySelector('[data-action="change-sort"]');
        containers.pageShell = document.querySelector('[data-component="saved-plans-page-shell"]');
      }

      function setVisibility(element, visible) {
        if (!element) return;
        element.hidden = !visible;
      }

      function clearElement(element) {
        if (!element) return;
        while (element.firstChild) {
          element.removeChild(element.firstChild);
        }
      }

      function renderHeader(container, pageContent, totalCount) {
        if (!container) return;
        clearElement(container);

        var titleText = pageContent && pageContent.title ? pageContent.title : 'Saved Plans';
        var introText = pageContent && pageContent.intro_text ? pageContent.intro_text : 'Review plans you have saved and decide which one to apply for.';

        var heading = document.createElement('h1');
        heading.className = 'card-title';
        heading.textContent = titleText;

        var intro = document.createElement('p');
        intro.className = 'card-intro';
        intro.textContent = introText;

        var ctaWrapper = document.createElement('div');
        ctaWrapper.className = 'card-actions';

        var ctaButton = document.createElement('button');
        ctaButton.type = 'button';
        ctaButton.className = 'btn btn-primary';
        ctaButton.dataset.action = 'scroll-to-list';
        ctaButton.textContent = 'Review saved plans';
        ctaWrapper.appendChild(ctaButton);

        var meta = document.createElement('p');
        meta.className = 'card-meta';
        if (typeof totalCount === 'number') {
          if (totalCount === 0) {
            meta.textContent = 'You do not have any saved plans yet.';
          } else if (totalCount === 1) {
            meta.textContent = 'You have 1 saved plan.';
          } else {
            meta.textContent = 'You have ' + totalCount + ' saved plans.';
          }
        }

        container.appendChild(heading);
        container.appendChild(intro);
        container.appendChild(ctaWrapper);
        container.appendChild(meta);
      }

      function renderLoader(container, isVisible) {
        if (!container) return;
        setVisibility(container, isVisible);
        if (!isVisible) return;
        clearElement(container);
        var skeleton1 = document.createElement('div');
        skeleton1.className = 'loader-skeleton-card';
        var skeleton2 = document.createElement('div');
        skeleton2.className = 'loader-skeleton-card';
        container.appendChild(skeleton1);
        container.appendChild(skeleton2);
      }

      function renderError(container, message) {
        if (!container) return;
        clearElement(container);
        if (!message) {
          setVisibility(container, false);
          return;
        }
        container.textContent = message;
        setVisibility(container, true);
      }

      function formatCurrency(value) {
        if (typeof value !== 'number' || isNaN(value)) {
          return '—';
        }
        return '$' + value.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' / mo';
      }

      function formatAmount(value) {
        if (typeof value !== 'number' || isNaN(value)) {
          return '—';
        }
        return '$' + value.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      }

      function formatMetalLevel(level) {
        if (!level) return '';
        return level.charAt(0).toUpperCase() + level.slice(1).replace('_', ' ');
      }

      function sortSavedItems() {
        var items = state.savedItems;
        if (!items || items.length === 0) return;

        var sortKey = state.sort || 'premium_low_to_high';
        var multiplier = sortKey.indexOf('high_to_low') !== -1 ? -1 : 1;

        function getNumeric(plan, field) {
          var value = plan && typeof plan[field] === 'number' ? plan[field] : Number.NaN;
          return isNaN(value) ? Number.POSITIVE_INFINITY : value;
        }

        items.sort(function(a, b) {
          var planA = a.plan || {};
          var planB = b.plan || {};
          var valA;
          var valB;

          switch (sortKey) {
            case 'premium_low_to_high':
            case 'premium_high_to_low':
              valA = getNumeric(planA, 'monthly_premium_individual');
              valB = getNumeric(planB, 'monthly_premium_individual');
              break;
            case 'deductible_low_to_high':
            case 'deductible_high_to_low':
              valA = getNumeric(planA, 'deductible_individual');
              valB = getNumeric(planB, 'deductible_individual');
              break;
            case 'oop_max_low_to_high':
            case 'oop_max_high_to_low':
              valA = getNumeric(planA, 'oop_max_individual');
              valB = getNumeric(planB, 'oop_max_individual');
              break;
            case 'total_cost_low_to_high':
            case 'total_cost_high_to_low':
              var premiumA = getNumeric(planA, 'monthly_premium_individual');
              var deductibleA = getNumeric(planA, 'deductible_individual');
              var oopA = getNumeric(planA, 'oop_max_individual');
              var premiumB = getNumeric(planB, 'monthly_premium_individual');
              var deductibleB = getNumeric(planB, 'deductible_individual');
              var oopB = getNumeric(planB, 'oop_max_individual');
              valA = premiumA * 12 + deductibleA + oopA * 0.2;
              valB = premiumB * 12 + deductibleB + oopB * 0.2;
              break;
            default:
              valA = getNumeric(planA, 'monthly_premium_individual');
              valB = getNumeric(planB, 'monthly_premium_individual');
          }

          if (valA === valB) return 0;
          if (valA > valB) return 1 * multiplier;
          return -1 * multiplier;
        });
      }

      function getPagedItems() {
        if (!state.savedItems || state.savedItems.length === 0) {
          return [];
        }
        var total = state.savedItems.length;
        var maxPage = Math.max(1, Math.ceil(total / PAGE_SIZE));
        if (state.page > maxPage) {
          state.page = maxPage;
        }
        var startIndex = (state.page - 1) * PAGE_SIZE;
        var endIndex = startIndex + PAGE_SIZE;
        return state.savedItems.slice(startIndex, endIndex);
      }

      function renderEmptyState(container, pageContent) {
        if (!container) return;
        clearElement(container);

        var wrapper = document.createElement('div');
        wrapper.className = 'empty-state-inner';

        var icon = document.createElement('div');
        icon.className = 'empty-state-icon';
        icon.setAttribute('aria-hidden', 'true');

        var heading = document.createElement('h2');
        heading.className = 'empty-state-title';
        heading.textContent = 'No saved plans yet';

        var introText = pageContent && pageContent.intro_text ? pageContent.intro_text : 'You can save plans while you are comparing options, then return here to review your favorites.';
        var message = document.createElement('p');
        message.className = 'empty-state-message';
        message.textContent = introText;

        var help = document.createElement('p');
        help.className = 'empty-state-help';
        help.textContent = 'Browse plan results or plan details and use the save control to add plans to this list.';

        wrapper.appendChild(icon);
        wrapper.appendChild(heading);
        wrapper.appendChild(message);
        wrapper.appendChild(help);
        container.appendChild(wrapper);
      }

      function createBadge(text) {
        var span = document.createElement('span');
        span.className = 'plan-badge';
        span.textContent = text;
        return span;
      }

      function renderList(container, items) {
        if (!container) return;
        clearElement(container);

        if (!items || items.length === 0) {
          return;
        }

        var highlightId = state.highlightPlanId;
        var highlightedElement = null;

        for (var i = 0; i < items.length; i++) {
          var pair = items[i];
          var savedPlan = pair.saved_plan || {};
          var plan = pair.plan || {};

          var card = document.createElement('article');
          card.className = 'card plan-card';
          card.dataset.component = 'saved-plan-list-item';
          if (plan.id) {
            card.dataset.planId = plan.id;
          }

          if (highlightId && plan.id === highlightId) {
            card.classList.add('plan-card-highlight');
            highlightedElement = card;
          }

          var headerRow = document.createElement('header');
          headerRow.className = 'plan-card-header';

          var titleButton = document.createElement('button');
          titleButton.type = 'button';
          titleButton.className = 'plan-card-title';
          titleButton.dataset.action = 'view-details';
          titleButton.textContent = plan.name || 'Saved plan';

          var price = document.createElement('div');
          price.className = 'plan-card-price';
          price.textContent = formatCurrency(plan.monthly_premium_individual);

          headerRow.appendChild(titleButton);
          headerRow.appendChild(price);

          var subRow = document.createElement('div');
          subRow.className = 'plan-card-subheader';

          var insurer = document.createElement('div');
          insurer.className = 'plan-card-insurer';
          insurer.textContent = plan.insurer_name || '';

          var metaTags = document.createElement('div');
          metaTags.className = 'plan-card-meta-tags';
          if (plan.metal_level && plan.metal_level !== 'none') {
            metaTags.appendChild(createBadge(formatMetalLevel(plan.metal_level)));
          }
          if (plan.plan_type) {
            metaTags.appendChild(createBadge(plan.plan_type.toUpperCase()));
          }
          if (plan.plan_category === 'short_term') {
            metaTags.appendChild(createBadge('Short-term'));
          }
          if (plan.is_student_friendly) {
            metaTags.appendChild(createBadge('Student-friendly'));
          }

          subRow.appendChild(insurer);
          subRow.appendChild(metaTags);

          var body = document.createElement('div');
          body.className = 'plan-card-body';

          var detailsList = document.createElement('dl');
          detailsList.className = 'plan-card-details';

          var rows = [
            { label: 'Deductible (individual)', value: formatAmount(plan.deductible_individual) },
            { label: 'Out-of-pocket max (individual)', value: formatAmount(plan.oop_max_individual) },
            { label: 'Family coverage', value: plan.is_family_coverage_available ? 'Available' : 'Not available' },
            { label: 'Network', value: plan.network_coverage ? plan.network_coverage.replace(/_/g, ' ') : 'Not specified' }
          ];

          for (var r = 0; r < rows.length; r++) {
            var row = rows[r];
            var dt = document.createElement('dt');
            dt.textContent = row.label;
            var dd = document.createElement('dd');
            dd.textContent = row.value;
            detailsList.appendChild(dt);
            detailsList.appendChild(dd);
          }

          body.appendChild(detailsList);

          var flags = document.createElement('div');
          flags.className = 'plan-card-flags';

          if (plan.hsa_eligible) {
            flags.appendChild(createBadge('HSA eligible'));
          }
          if (plan.has_maternity_coverage) {
            flags.appendChild(createBadge('Maternity covered'));
          }
          if (plan.is_high_deductible) {
            flags.appendChild(createBadge('High deductible')); // descriptive label
          }

          if (flags.childNodes.length > 0) {
            body.appendChild(flags);
          }

          if (plan.base_benefits_summary) {
            var summary = document.createElement('p');
            summary.className = 'plan-card-summary';
            summary.textContent = plan.base_benefits_summary;
            body.appendChild(summary);
          }

          if (savedPlan.note) {
            var note = document.createElement('p');
            note.className = 'plan-card-note';
            note.textContent = 'Your note: ' + savedPlan.note;
            body.appendChild(note);
          }

          var actions = document.createElement('div');
          actions.className = 'plan-card-actions';

          var leftActions = document.createElement('div');
          leftActions.className = 'plan-card-actions-left';

          var saveToggle = document.createElement('button');
          saveToggle.type = 'button';
          saveToggle.className = 'btn btn-ghost plan-card-toggle-save';
          saveToggle.dataset.action = 'toggle-save';
          saveToggle.textContent = 'Remove from saved';
          leftActions.appendChild(saveToggle);

          var rightActions = document.createElement('div');
          rightActions.className = 'plan-card-actions-right';

          var viewDetails = document.createElement('button');
          viewDetails.type = 'button';
          viewDetails.className = 'btn btn-secondary plan-card-view-details';
          viewDetails.dataset.action = 'view-details';
          viewDetails.textContent = 'View details';

          var selectPlanBtn = document.createElement('button');
          selectPlanBtn.type = 'button';
          selectPlanBtn.className = 'btn btn-primary plan-card-select';
          selectPlanBtn.dataset.action = 'select-plan';
          selectPlanBtn.textContent = 'Start application';

          rightActions.appendChild(viewDetails);
          rightActions.appendChild(selectPlanBtn);

          actions.appendChild(leftActions);
          actions.appendChild(rightActions);

          card.appendChild(headerRow);
          card.appendChild(subRow);
          card.appendChild(body);
          card.appendChild(actions);

          container.appendChild(card);
        }

        if (highlightedElement && !state.highlightHandled) {
          try {
            highlightedElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
          } catch (e) {
            // Ignore scroll errors
          }
          state.highlightHandled = true;
        }
      }

      function renderPagination(container, totalItems) {
        if (!container) return;
        clearElement(container);

        if (!totalItems || totalItems <= PAGE_SIZE) {
          return;
        }

        var totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
        var currentPage = state.page;
        var navList = document.createElement('ul');
        navList.className = 'pagination-list';

        var prevItem = document.createElement('li');
        var prevButton = document.createElement('button');
        prevButton.type = 'button';
        prevButton.className = 'pagination-btn pagination-prev';
        prevButton.textContent = 'Previous';
        prevButton.dataset.action = 'page-change';
        prevButton.dataset.page = String(Math.max(1, currentPage - 1));
        if (currentPage === 1) {
          prevButton.disabled = true;
        }
        prevItem.appendChild(prevButton);
        navList.appendChild(prevItem);

        for (var p = 1; p <= totalPages; p++) {
          var pageItem = document.createElement('li');
          var pageButton = document.createElement('button');
          pageButton.type = 'button';
          pageButton.className = 'pagination-btn pagination-page';
          if (p === currentPage) {
            pageButton.classList.add('is-active');
            pageButton.setAttribute('aria-current', 'page');
          }
          pageButton.textContent = String(p);
          pageButton.dataset.action = 'page-change';
          pageButton.dataset.page = String(p);
          pageItem.appendChild(pageButton);
          navList.appendChild(pageItem);
        }

        var nextItem = document.createElement('li');
        var nextButton = document.createElement('button');
        nextButton.type = 'button';
        nextButton.className = 'pagination-btn pagination-next';
        nextButton.textContent = 'Next';
        nextButton.dataset.action = 'page-change';
        nextButton.dataset.page = String(Math.min(totalPages, currentPage + 1));
        if (currentPage === totalPages) {
          nextButton.disabled = true;
        }
        nextItem.appendChild(nextButton);
        navList.appendChild(nextItem);

        container.appendChild(navList);
      }

      function bindActionHandlers(root) {
        if (!root) return;
        var elements = root.querySelectorAll('[data-action]');
        for (var i = 0; i < elements.length; i++) {
          var el = elements[i];
          if (el._hicBound) continue;
          var action = el.dataset.action;

          if (action === 'change-sort') {
            el.addEventListener('change', onSortChange);
          } else if (action === 'page-change') {
            el.addEventListener('click', onPageChange);
          } else if (action === 'view-details') {
            el.addEventListener('click', onViewDetails);
          } else if (action === 'toggle-save') {
            el.addEventListener('click', onToggleSave);
          } else if (action === 'select-plan') {
            el.addEventListener('click', onSelectPlan);
          } else if (action === 'scroll-to-list') {
            el.addEventListener('click', onScrollToList);
          }

          el._hicBound = true;
        }
      }

      function onScrollToList() {
        if (containers.list) {
          try {
            containers.list.scrollIntoView({ behavior: 'smooth', block: 'start' });
          } catch (e) {
            window.location.hash = '#saved-plans-list';
          }
        }
      }

      function onSortChange(event) {
        var select = event.target;
        var newSort = select.value;
        if (!newSort) return;
        state.sort = newSort;
        state.page = 1;
        sortSavedItems();
        syncUrlState(false);
        renderAll();
      }

      function onPageChange(event) {
        var target = event.currentTarget;
        var pageStr = target.dataset.page;
        var pageNum = parseInt(pageStr || '1', 10);
        if (isNaN(pageNum) || pageNum === state.page) return;
        state.page = pageNum;
        syncUrlState(false);
        renderAll();
      }

      function findPlanIdFromElement(element) {
        var current = element;
        while (current && current !== document.body) {
          if (current.dataset && current.dataset.planId) {
            return current.dataset.planId;
          }
          current = current.parentElement;
        }
        return null;
      }

      function onViewDetails(event) {
        var planId = findPlanIdFromElement(event.currentTarget);
        if (!planId) return;
        var url = 'plan_detail.html?plan_id=' + encodeURIComponent(planId) + '&source_page=saved_plans';
        window.location.href = url;
      }

      function onToggleSave(event) {
        var button = event.currentTarget;
        var planId = findPlanIdFromElement(button);
        if (!planId) return;

        try {
          var response = WebsiteSDK.toggleSavePlan(planId);
          if (!response || !response.success) {
            renderError(containers.error, 'We could not update this saved plan. Please try again.');
            return;
          }

          if (!response.is_saved) {
            state.savedItems = state.savedItems.filter(function(pair) {
              return pair.plan && pair.plan.id !== planId;
            });
          }

          sortSavedItems();
          if (containers.sortSelect && containers.sortSelect.value !== state.sort) {
            containers.sortSelect.value = state.sort;
          }

          renderAll();
        } catch (e) {
          renderError(containers.error, 'We could not update this saved plan. Please try again.');
        }
      }

      function onSelectPlan(event) {
        var button = event.currentTarget;
        var planId = findPlanIdFromElement(button);
        if (!planId) return;

        button.disabled = true;

        try {
          var quoteId = state.quoteId || null;
          var response = WebsiteSDK.selectPlan(planId, 'saved_plans', [], quoteId);
          var selected = response && response.selected_plan;
          if (!selected || !selected.id) {
            renderError(containers.error, 'We could not start the application for this plan. Please try again.');
            button.disabled = false;
            return;
          }
          var url = 'application_start.html?selected_plan_id=' + encodeURIComponent(selected.id);
          window.location.href = url;
        } catch (e) {
          renderError(containers.error, 'We could not start the application for this plan. Please try again.');
          button.disabled = false;
        }
      }

      function renderAll() {
        var totalCount = state.savedItems ? state.savedItems.length : 0;
        if (containers.sortSelect && containers.sortSelect.value !== state.sort) {
          containers.sortSelect.value = state.sort;
        }

        renderHeader(containers.header, state.pageContent, totalCount);

        if (!state.savedItems || state.savedItems.length === 0) {
          setVisibility(containers.list, false);
          setVisibility(containers.pagination, false);
          setVisibility(containers.loader, false);
          setVisibility(containers.empty, true);
          renderEmptyState(containers.empty, state.pageContent);
          bindActionHandlers(containers.header);
          bindActionHandlers(containers.empty);
          return;
        }

        setVisibility(containers.empty, false);
        setVisibility(containers.loader, false);
        setVisibility(containers.list, true);

        var paged = getPagedItems();
        renderList(containers.list, paged);
        renderPagination(containers.pagination, totalCount);

        bindActionHandlers(containers.header);
        bindActionHandlers(containers.list);
        bindActionHandlers(containers.pagination);
      }

      function loadDataAndRender() {
        if (containers.sortSelect) {
          containers.sortSelect.value = state.sort;
        }

        renderLoader(containers.loader, true);
        setVisibility(containers.empty, false);
        setVisibility(containers.list, false);
        renderError(containers.error, '');

        try {
          var content = WebsiteSDK.getSavedPlansPageContent();
          state.pageContent = content || null;
        } catch (e) {
          state.pageContent = null;
        }

        try {
          var result = WebsiteSDK.getSavedPlans();
          var items = result && result.items ? result.items : [];
          state.savedItems = items.slice();
        } catch (e2) {
          renderLoader(containers.loader, false);
          renderError(containers.error, 'We could not load your saved plans. Please refresh the page or try again later.');
          renderHeader(containers.header, state.pageContent, 0);
          bindActionHandlers(containers.header);
          return;
        }

        sortSavedItems();
        renderLoader(containers.loader, false);
        renderAll();
      }

      function onPopState() {
        parseUrlState();
        state.highlightHandled = false;
        sortSavedItems();
        renderAll();
      }

      document.addEventListener('DOMContentLoaded', function() {
        collectContainers();
        parseUrlState();
        syncUrlState(true);

        if (containers.pageShell) {
          bindActionHandlers(containers.pageShell);
        }

        window.addEventListener('popstate', onPopState);

        loadDataAndRender();
      });
    })();
  </script>
</body>
</html>
