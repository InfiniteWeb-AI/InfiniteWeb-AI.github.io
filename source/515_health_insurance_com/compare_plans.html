<html lang='en'>
<head>
  <meta charset='utf-8'>

  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='framework.css'>
  <link rel='stylesheet' href='compare_plans.css'>
</head>
<body>

    <nav class='primary-nav' aria-label='Primary'>

          <a href='index.html' title='Return to the homepage to start or restart any quote journey'>Home</a>
        </li>
        <li class='primary-nav-item'>
          <a href='medical_quote.html' title='Start a general quote to browse all available major medical plans'>Shop Plans</a>
        </li>
        <li class='primary-nav-item'>
          <a href='medical_quote.html?coverage_type=family' title='Open the quote form pre-set for family coverage'>Family Plans</a>
        </li>
        <li class='primary-nav-item'>
          <a href='medical_quote.html?persona=student' title='Open the quote form pre-set for student-friendly individual coverage'>Student Plans</a>

          <a href='favorites.html' title='View and manage your saved or favorite plans'>Saved Plans</a>

        <li class='primary-nav-item'>
          <a href='faq.html' title='Get answers to common questions about coverage and using the site'>FAQ</a>
        </li>
      </ul>
    </nav>
  </header>

  <main id='content' class='site-main' role='main'>
    <section class='compare-page' data-component='compare-page-controller' data-populate='compare-plans'>
      <div class='compare-page-loading card card-hero'>
        <p>Loading your comparison&hellip;</p>
      </div>
    </section>
  </main>

  <footer class='site-footer bottom-nav'>
    <nav aria-label='Footer'>
      <ul class='bottom-nav-list'>
        <li class='bottom-nav-item'>
          <a href='about.html' title='Learn more about the company and service'>
            <span class='footer-nav-icon' aria-hidden='true'></span>
            <span class='footer-nav-label'>About</span>
          </a>
        </li>
        <li class='bottom-nav-item'>
          <a href='how_it_works.html' title='Understand the process for comparing and selecting plans'>
            <span class='footer-nav-icon' aria-hidden='true'></span>
            <span class='footer-nav-label'>How It Works</span>
          </a>
        </li>
        <li class='bottom-nav-item'>
          <a href='faq.html' title='Frequently asked questions about plans and the website'>
            <span class='footer-nav-icon' aria-hidden='true'></span>
            <span class='footer-nav-label'>FAQ</span>
          </a>
        </li>
        <li class='bottom-nav-item'>
          <a href='contact.html' title='Contact details and form for support or inquiries'>
            <span class='footer-nav-icon' aria-hidden='true'></span>

          <a href='privacy.html' title='Read our privacy practices and data usage policies'>
            <span class='footer-nav-icon' aria-hidden='true'></span>
            <span class='footer-nav-label'>Privacy Policy</span>
          </a>
        </li>
        <li class='bottom-nav-item'>
          <a href='terms.html' title='View the terms and conditions for using this website'>
            <span class='footer-nav-icon' aria-hidden='true'></span>
            <span class='footer-nav-label'>Terms of Use</span>
          </a>
        </li>
      </ul>
    </nav>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    (function() {
      'use strict';

      var comparePageState = {
        container: null,
        urlParams: null,
        viewMode: 'all_details',
        compareList: null,
        plans: [],
        medication: null,
        planDrugCoverages: [],
        savedPlanStates: {},
        notification: null,
        loadError: null,
        isLoading: false
      };

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value).replace(/[&<>"']/g, function(ch) {
          switch (ch) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            case '\'': return '&#39;';
            default: return ch;
          }
        });
      }

      function formatCurrency(amount) {
        if (amount === null || amount === undefined || isNaN(amount)) {
          return 'N/A';
        }
        try {
          return '$' + Number(amount).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        } catch (e) {
          return '$' + amount;
        }
      }

      function formatBoolean(value) {
        if (value === null || value === undefined) {
          return 'Not specified';
        }
        return value ? 'Yes' : 'No';
      }

      function formatMetalLevel(level) {
        if (!level) {
          return 'N/A';
        }
        var map = {
          bronze: 'Bronze',
          silver: 'Silver',
          gold: 'Gold',
          platinum: 'Platinum',
          catastrophic: 'Catastrophic',
          none: 'None'
        };
        return map[level] || level;
      }

      function formatPlanType(type) {
        if (!type) {
          return 'N/A';
        }
        var upper = String(type).toUpperCase();
        return upper;
      }

      function formatPlanCategory(category) {
        if (!category) {
          return 'N/A';
        }
        var map = {
          major_medical: 'Major medical',
          short_term: 'Short-term',
          student_friendly: 'Student-friendly'
        };
        return map[category] || category;
      }

      function formatNetworkCoverage(value) {
        if (!value) {
          return 'N/A';
        }
        var map = {
          local: 'Local',
          multi_state: 'Multi-state',
          nationwide: 'Nationwide',
          out_of_state: 'Out-of-state'
        };
        return map[value] || value;
      }

      function formatTier(tier) {
        if (!tier) {
          return 'N/A';
        }
        var map = {
          tier_1: 'Tier 1 (preferred generic)',
          tier_2: 'Tier 2 (generic)',
          tier_3: 'Tier 3 (preferred brand)',
          tier_4: 'Tier 4 (non-preferred)',
          specialty: 'Specialty'
        };
        return map[tier] || tier;
      }

      function syncViewModeToUrl() {
        if (!comparePageState.urlParams) {
          comparePageState.urlParams = new URLSearchParams(window.location.search);
        }
        comparePageState.urlParams.set('view', comparePageState.viewMode);
        var newQuery = comparePageState.urlParams.toString();
        var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
        try {
          history.replaceState(null, '', newUrl);
        } catch (e) {
          // Fallback: ignore if history API is not available
        }
      }

      function buildPlanColumnActionsHtml(state) {
        var plans = (state.plans || []).slice(0, 3);
        var savedMap = state.savedPlanStates || {};

        var columnsHtml = plans.map(function(plan) {
          var saved = !!savedMap[plan.id];
          var saveLabel = saved ? 'Saved' : 'Save';
          var saveButtonClasses = 'btn btn-secondary plan-save-toggle' + (saved ? ' is-saved' : '');
          var metalLabel = formatMetalLevel(plan.metal_level);
          var typeLabel = formatPlanType(plan.plan_type);

          return "\n          <div class='plan-actions-column'>\n            <div class='plan-actions-header'>\n              <div class='plan-insurer'>" + escapeHtml(plan.insurer_name) + "</div>\n              <div class='plan-name'>" + escapeHtml(plan.name) + "</div>\n              <div class='plan-tags'>\n                <span class='tag tag-metal'>" + escapeHtml(metalLabel) + "</span>\n                <span class='tag tag-type'>" + escapeHtml(typeLabel) + "</span>\n              </div>\n            </div>\n            <div class='plan-actions-buttons'>\n              <button type='button' class='btn btn-primary plan-select' data-action='select-plan' data-plan-id='" + escapeHtml(plan.id) + "'>Select plan</button>\n              <button type='button' class='btn btn-tertiary plan-details' data-action='view-details' data-plan-id='" + escapeHtml(plan.id) + "'>View details</button>\n              <button type='button' class='" + saveButtonClasses + "' data-action='toggle-save-plan' data-plan-id='" + escapeHtml(plan.id) + "' aria-pressed='" + (saved ? 'true' : 'false') + "'>" + saveLabel + "</button>\n              <button type='button' class='btn btn-link plan-remove' data-action='remove-plan' data-plan-id='" + escapeHtml(plan.id) + "'>Remove</button>\n            </div>\n          </div>\n          ";
        }).join('');

        return "\n        <section class='plan-column-actions' data-component='plan-column-actions' aria-label='Plan actions'>\n          <div class='plan-column-actions-grid'>" + columnsHtml + "</div>\n        </section>\n        ";
      }

      function buildComparisonTableHtml(state) {
        var plans = (state.plans || []).slice(0, 3);
        var viewMode = state.viewMode || 'all_details';
        if (!plans.length) {
          return '';
        }

        var headerCells = plans.map(function(plan) {
          return "<th scope='col' class='compare-plan-col-header'>" + escapeHtml(plan.insurer_name) + "</th>";
        }).join('');

        var rows = [
          { id: 'monthly_premium_individual', label: 'Monthly premium (individual)', field: 'monthly_premium_individual', type: 'currency', highlightNumeric: true },
          { id: 'deductible_individual', label: 'Deductible (individual)', field: 'deductible_individual', type: 'currency', highlightNumeric: true },
          { id: 'oop_max_individual', label: 'Out-of-pocket max (individual)', field: 'oop_max_individual', type: 'currency', highlightNumeric: true },
          { id: 'hsa_eligible', label: 'HSA eligible', field: 'hsa_eligible', type: 'boolean', highlightNumeric: false },
          { id: 'is_high_deductible', label: 'High-deductible health plan', field: 'is_high_deductible', type: 'boolean', highlightNumeric: false },
          { id: 'plan_category', label: 'Plan category', field: 'plan_category', type: 'enum_plan_category', highlightNumeric: false },
          { id: 'has_maternity_coverage', label: 'Maternity coverage', field: 'has_maternity_coverage', type: 'boolean', highlightNumeric: false },
          { id: 'is_family_coverage_available', label: 'Family coverage available', field: 'is_family_coverage_available', type: 'boolean', highlightNumeric: false },
          { id: 'allows_dental_addon', label: 'Allows dental add-on', field: 'allows_dental_addon', type: 'boolean', highlightNumeric: false },
          { id: 'allows_vision_addon', label: 'Allows vision add-on', field: 'allows_vision_addon', type: 'boolean', highlightNumeric: false },
          { id: 'network_coverage', label: 'Network coverage area', field: 'network_coverage', type: 'enum_network', highlightNumeric: false },
          { id: 'is_student_friendly', label: 'Student-friendly', field: 'is_student_friendly', type: 'boolean', highlightNumeric: false },
          { id: 'is_short_term', label: 'Short-term coverage', field: 'is_short_term', type: 'boolean', highlightNumeric: false },
          { id: 'base_benefits_summary', label: 'Base benefits summary', field: 'base_benefits_summary', type: 'text', highlightNumeric: false }
        ];

        var bodyRowsHtml = '';

        rows.forEach(function(row) {
          var rawValues = plans.map(function(plan) {
            return plan[row.field];
          });

          var displayValues = rawValues.map(function(value) {
            switch (row.type) {
              case 'currency':
                return formatCurrency(value);
              case 'boolean':
                return formatBoolean(value);
              case 'enum_plan_category':
                return formatPlanCategory(value);
              case 'enum_network':
                return formatNetworkCoverage(value);
              case 'text':
                return value ? String(value) : 'Not specified';
              default:
                return value !== null && value !== undefined ? String(value) : 'Not specified';
            }
          });

          var allSame = false;
          if (displayValues.length > 0) {
            var firstVal = displayValues[0];
            allSame = displayValues.every(function(v) { return v === firstVal; });
          }

          if (viewMode === 'differences_only' && allSame) {
            return;
          }

          var numericValues = [];
          if (row.highlightNumeric) {
            numericValues = rawValues.map(function(v) {
              var num = Number(v);
              return isNaN(num) ? null : num;
            });
          }

          var minVal = null;
          var maxVal = null;
          if (row.highlightNumeric && numericValues.length) {
            numericValues.forEach(function(v) {
              if (v === null) {
                return;
              }
              if (minVal === null || v < minVal) {
                minVal = v;
              }
              if (maxVal === null || v > maxVal) {
                maxVal = v;
              }
            });
          }

          var rowClass = 'compare-row';
          if (!allSame) {
            rowClass += ' compare-row-different';
          } else {
            rowClass += ' compare-row-same';
          }

          var cellsHtml = displayValues.map(function(display, index) {
            var classes = ['compare-value'];
            if (row.highlightNumeric) {
              var numericValue = numericValues[index];
              if (numericValue !== null && numericValue === minVal) {
                classes.push('value-lowest');
              }
              if (numericValue !== null && numericValue === maxVal && maxVal !== minVal) {
                classes.push('value-highest');
              }
            }
            return "<td class='" + classes.join(' ') + "'>" + escapeHtml(display) + "</td>";
          }).join('');

          bodyRowsHtml += "\n          <tr class='" + rowClass + "'>\n            <th scope='row' class='compare-attribute-col'>" + escapeHtml(row.label) + "</th>\n            " + cellsHtml + "\n          </tr>\n          ";
        });

        return "\n        <section class='plan-compare-table-wrapper' data-component='plan-compare-table' aria-label='Compare plan details'>\n          <table class='plan-compare-table'>\n            <thead>\n              <tr>\n                <th scope='col' class='compare-attribute-col-header'>Feature</th>\n                " + headerCells + "\n              </tr>\n            </thead>\n            <tbody>\n              " + bodyRowsHtml + "\n            </tbody>\n          </table>\n        </section>\n        ";
      }

      function buildDrugCoverageHtml(state) {
        var medication = state.medication;
        var plans = (state.plans || []).slice(0, 3);
        var coverages = state.planDrugCoverages || [];

        if (!medication || !plans.length) {
          return '';
        }

        var coverageByPlanId = {};
        coverages.forEach(function(cov) {
          if (!cov || !cov.plan_id) {
            return;
          }
          coverageByPlanId[cov.plan_id] = cov;
        });

        var headerCells = plans.map(function(plan) {
          return "<th scope='col' class='drug-plan-col-header'>" + escapeHtml(plan.insurer_name) + "</th>";
        }).join('');

        var bodyRowCells = plans.map(function(plan) {
          var cov = coverageByPlanId[plan.id];
          if (!cov) {
            return "<td class='drug-coverage-cell'>Not listed for this plan</td>";
          }

          var parts = [];
          parts.push('<div class=\'drug-coverage-status\'>' + (cov.is_covered ? 'Covered' : 'Not covered') + '</div>');
          if (cov.tier) {
            parts.push('<div class=\'drug-coverage-tier\'>Tier: ' + escapeHtml(formatTier(cov.tier)) + '</div>');
          }
          if (cov.retail_copay !== null && cov.retail_copay !== undefined) {
            parts.push('<div class=\'drug-coverage-copay\'>Retail copay: ' + escapeHtml(formatCurrency(cov.retail_copay)) + '</div>');
          }
          if (cov.mail_order_copay !== null && cov.mail_order_copay !== undefined) {
            parts.push('<div class=\'drug-coverage-copay\'>Mail-order copay: ' + escapeHtml(formatCurrency(cov.mail_order_copay)) + '</div>');
          }
          if (cov.prior_authorization_required !== null && cov.prior_authorization_required !== undefined) {
            parts.push('<div class=\'drug-coverage-pa\'>Prior authorization: ' + escapeHtml(formatBoolean(cov.prior_authorization_required)) + '</div>');
          }
          if (cov.notes) {
            parts.push('<div class=\'drug-coverage-notes\'>' + escapeHtml(cov.notes) + '</div>');
          }

          return "<td class='drug-coverage-cell'>" + parts.join('') + "</td>";
        }).join('');

        return "\n        <section class='card card-drug-coverage' data-component='drug-coverage-section' aria-label='Drug coverage summary'>\n          <header class='drug-coverage-header'>\n            <h2 class='drug-coverage-title'>Drug coverage summary</h2>\n            <p class='drug-coverage-subtitle'>Coverage for " + escapeHtml(medication.full_label || medication.name || '') + "</p>\n          </header>\n          <div class='drug-coverage-table-wrapper'>\n            <table class='drug-coverage-table'>\n              <thead>\n                <tr>\n                  <th scope='col' class='drug-attribute-col-header'>Plan</th>\n                  " + headerCells + "\n                </tr>\n              </thead>\n              <tbody>\n                <tr>\n                  <th scope='row' class='drug-attribute-col'>Coverage details</th>\n                  " + bodyRowCells + "\n                </tr>\n              </tbody>\n            </table>\n          </div>\n        </section>\n        ";
      }

      function buildNotificationHtml(state) {
        var notification = state.notification;
        if (!notification) {
          return '';
        }
        var typeClass = notification.type === 'error' ? 'notification-error' : 'notification-success';
        return "\n        <div class='global-notification-banner " + typeClass + "' data-component='global-notification-banner' role='status' aria-live='polite'>\n          <div class='notification-content'>" + escapeHtml(notification.message || '') + "</div>\n          <button type='button' class='notification-dismiss' data-action='dismiss-notification' aria-label='Dismiss message'>\n            &times;\n          </button>\n        </div>\n        ";
      }

      function renderComparePage(container, state) {
        if (!container) {
          return;
        }

        if (state.isLoading) {
          container.innerHTML = "\n          <header class='compare-header-bar' data-component='compare-header-bar'>\n            <button type='button' class='compare-back-link' data-action='back-to-results'>Back to results</button>\n            <div class='compare-header-title-group'>\n              <h1 class='compare-title'>Compare Plans</h1>\n            </div>\n          </header>\n          <section class='card card-compare compare-main-card'>\n            <p>Loading your comparison&hellip;</p>\n          </section>\n          ";
          return;
        }

        var notificationHtml = buildNotificationHtml(state);

        if (state.loadError) {
          container.innerHTML = "\n          <header class='compare-header-bar' data-component='compare-header-bar'>\n            <button type='button' class='compare-back-link' data-action='back-to-results'>Back to results</button>\n            <div class='compare-header-title-group'>\n              <h1 class='compare-title'>Compare Plans</h1>\n            </div>\n          </header>\n          " + notificationHtml + "\n          <section class='card card-compare compare-main-card'>\n            <h2>We could not load your comparison</h2>\n            <p>Please check your connection and try again.</p>\n            <div class='card-actions'>\n              <button type='button' class='btn btn-primary' data-action='retry-load'>Retry</button>\n            </div>\n          </section>\n          ";
          return;
        }

        var plans = (state.plans || []).slice(0, 3);
        var planCount = plans.length;

        if (!planCount) {
          container.innerHTML = "\n          <header class='compare-header-bar' data-component='compare-header-bar'>\n            <button type='button' class='compare-back-link' data-action='back-to-results'>Back to results</button>\n            <div class='compare-header-title-group'>\n              <h1 class='compare-title'>Compare Plans</h1>\n              <p class='compare-subtitle'>No plans selected</p>\n            </div>\n          </header>\n          " + notificationHtml + "\n          <section class='card empty-compare-state' data-component='empty-compare-state'>\n            <div class='empty-illustration' aria-hidden='true'></div>\n            <h2>No plans to compare yet</h2>\n            <p>Select up to three plans from the results page to see them side by side.</p>\n            <div class='card-actions'>\n              <button type='button' class='btn btn-primary' data-action='back-to-results-empty'>Browse plans</button>\n            </div>\n          </section>\n          ";
          return;
        }

        var differenceToggleHtml = "\n        <div class='difference-view-toggle' data-component='difference-view-toggle' role='radiogroup' aria-label='Comparison view'>\n          <button type='button' class='toggle-segment " + (state.viewMode === 'differences_only' ? '' : 'is-active') + "' data-action='toggle-view' data-view-mode='all_details' aria-pressed='" + (state.viewMode === 'differences_only' ? 'false' : 'true') + "'>All details</button>\n          <button type='button' class='toggle-segment " + (state.viewMode === 'differences_only' ? 'is-active' : '') + "' data-action='toggle-view' data-view-mode='differences_only' aria-pressed='" + (state.viewMode === 'differences_only' ? 'true' : 'false') + "'>Show differences only</button>\n        </div>\n        ";

        var mainCardInnerHtml = differenceToggleHtml + buildPlanColumnActionsHtml(state) + buildComparisonTableHtml(state);
        var drugCoverageHtml = buildDrugCoverageHtml(state);

        container.innerHTML = "\n        <header class='compare-header-bar' data-component='compare-header-bar'>\n          <button type='button' class='compare-back-link' data-action='back-to-results'>Back to results</button>\n          <div class='compare-header-title-group'>\n            <h1 class='compare-title'>Compare Plans</h1>\n            <p class='compare-subtitle'>Comparing " + planCount + " plan" + (planCount === 1 ? '' : 's') + "</p>\n          </div>\n        </header>\n        " + notificationHtml + "\n        <section class='card card-compare compare-main-card'>\n          " + mainCardInnerHtml + "\n        </section>\n        " + drugCoverageHtml + "\n        ";
      }

      function loadComparePlans() {
        if (!comparePageState.container) {
          return;
        }
        comparePageState.isLoading = true;
        comparePageState.loadError = null;
        renderComparePage(comparePageState.container, comparePageState);

        try {
          var response = WebsiteSDK.getComparePlans();
          comparePageState.compareList = response && response.compare_list ? response.compare_list : null;
          comparePageState.plans = response && response.plans ? response.plans : [];
          comparePageState.medication = response && response.medication ? response.medication : null;
          comparePageState.planDrugCoverages = response && response.plan_drug_coverages ? response.plan_drug_coverages : [];

          var savedMap = {};
          (comparePageState.plans || []).forEach(function(plan) {
            if (plan && plan.is_saved !== undefined) {
              savedMap[plan.id] = !!plan.is_saved;
            }
          });
          comparePageState.savedPlanStates = savedMap;

          comparePageState.isLoading = false;
          comparePageState.loadError = null;
          renderComparePage(comparePageState.container, comparePageState);
        } catch (e) {
          comparePageState.isLoading = false;
          comparePageState.loadError = 'Unable to load comparison';
          comparePageState.notification = { type: 'error', message: 'We could not load your comparison. Please try again.' };
          renderComparePage(comparePageState.container, comparePageState);
        }
      }

      function navigateBackToResults() {
        var params = comparePageState.urlParams;
        var contextId = params ? params.get('plan_search_context_id') : null;
        var target = 'plan_results.html';
        if (contextId) {
          target += '?plan_search_context_id=' + encodeURIComponent(contextId);
        }
        window.location.href = target;
      }

      function navigateToPlanDetails(planId) {
        var params = comparePageState.urlParams;
        var contextId = params ? params.get('plan_search_context_id') : null;
        var target = 'plan_detail.html?plan_id=' + encodeURIComponent(planId) + '&source_page=compare_plans';
        if (contextId) {
          target += '&plan_search_context_id=' + encodeURIComponent(contextId);
        }
        window.location.href = target;
      }

      function handleSelectPlan(planId) {
        try {
          var quoteId = comparePageState.compareList && comparePageState.compareList.quote_id ? comparePageState.compareList.quote_id : null;
          var addonIds = [];
          var result = WebsiteSDK.selectPlan(planId, 'compare_plans', addonIds, quoteId);
          var selectedPlanId = result && result.selected_plan && result.selected_plan.id ? result.selected_plan.id : planId;

          var params = comparePageState.urlParams;
          var contextId = params ? params.get('plan_search_context_id') : null;
          var target = 'application_start.html?selected_plan_id=' + encodeURIComponent(selectedPlanId);
          if (contextId) {
            target += '&plan_search_context_id=' + encodeURIComponent(contextId);
          }
          window.location.href = target;
        } catch (e) {
          comparePageState.notification = { type: 'error', message: 'We could not start your application. Please try again.' };
          renderComparePage(comparePageState.container, comparePageState);
        }
      }

      function handleToggleSavePlan(planId) {
        try {
          var result = WebsiteSDK.toggleSavePlan(planId);
          if (!comparePageState.savedPlanStates) {
            comparePageState.savedPlanStates = {};
          }
          comparePageState.savedPlanStates[planId] = !!(result && result.is_saved);
          comparePageState.notification = {
            type: 'success',
            message: result && result.is_saved ? 'Plan saved to your list.' : 'Plan removed from your saved list.'
          };
          renderComparePage(comparePageState.container, comparePageState);
        } catch (e) {
          comparePageState.notification = { type: 'error', message: 'We could not update your saved plans. Please try again.' };
          renderComparePage(comparePageState.container, comparePageState);
        }
      }

      function handleRemovePlan(planId) {
        try {
          var result = WebsiteSDK.removePlanFromCompare(planId);
          comparePageState.compareList = result && result.compare_list ? result.compare_list : null;
          comparePageState.plans = result && result.plans ? result.plans : [];

          var updatedSaved = {};
          (comparePageState.plans || []).forEach(function(plan) {
            if (comparePageState.savedPlanStates && comparePageState.savedPlanStates[plan.id] !== undefined) {
              updatedSaved[plan.id] = comparePageState.savedPlanStates[plan.id];
            }
          });
          comparePageState.savedPlanStates = updatedSaved;

          comparePageState.notification = { type: 'success', message: 'Plan removed from comparison.' };
          renderComparePage(comparePageState.container, comparePageState);
        } catch (e) {
          comparePageState.notification = { type: 'error', message: 'We could not remove that plan. Please try again.' };
          renderComparePage(comparePageState.container, comparePageState);
        }
      }

      function handleAction(action, target) {
        if (!action) {
          return;
        }
        if (action === 'back-to-results' || action === 'back-to-results-empty') {
          navigateBackToResults();
          return;
        }
        if (action === 'retry-load') {
          loadComparePlans();
          return;
        }
        if (action === 'dismiss-notification') {
          comparePageState.notification = null;
          renderComparePage(comparePageState.container, comparePageState);
          return;
        }
        if (action === 'toggle-view') {
          var mode = target.getAttribute('data-view-mode') === 'differences_only' ? 'differences_only' : 'all_details';
          if (mode !== comparePageState.viewMode) {
            comparePageState.viewMode = mode;
            syncViewModeToUrl();
            renderComparePage(comparePageState.container, comparePageState);
          }
          return;
        }
        if (action === 'view-details') {
          var planIdDetails = target.getAttribute('data-plan-id');
          if (planIdDetails) {
            navigateToPlanDetails(planIdDetails);
          }
          return;
        }
        if (action === 'select-plan') {
          var planIdSelect = target.getAttribute('data-plan-id');
          if (planIdSelect) {
            handleSelectPlan(planIdSelect);
          }
          return;
        }
        if (action === 'toggle-save-plan') {
          var planIdSave = target.getAttribute('data-plan-id');
          if (planIdSave) {
            handleToggleSavePlan(planIdSave);
          }
          return;
        }
        if (action === 'remove-plan') {
          var planIdRemove = target.getAttribute('data-plan-id');
          if (planIdRemove) {
            handleRemovePlan(planIdRemove);
          }
          return;
        }
      }

      function setupEventDelegation() {
        if (!comparePageState.container) {
          return;
        }
        comparePageState.container.addEventListener('click', function(event) {
          var actionElement = event.target.closest('[data-action]');
          if (!actionElement || !comparePageState.container.contains(actionElement)) {
            return;
          }
          var action = actionElement.getAttribute('data-action');
          handleAction(action, actionElement);
        });
      }

      document.addEventListener('DOMContentLoaded', function() {
        var container = document.querySelector('[data-populate="compare-plans"]');
        if (!container) {
          return;
        }
        comparePageState.container = container;
        comparePageState.urlParams = new URLSearchParams(window.location.search);
        var viewParam = comparePageState.urlParams.get('view');
        if (viewParam === 'differences_only') {
          comparePageState.viewMode = 'differences_only';
        } else {
          comparePageState.viewMode = 'all_details';
        }

        setupEventDelegation();
        loadComparePlans();
      });
    })();
  </script>
</body>
</html>
