<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Photography Gallery</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Work+Sans:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='product.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-inner'>
      <nav class='primary-nav' aria-label='Primary'>
        <ul class='primary-nav-list' data-component='header-nav' data-populate='nav-categories'>
          <!-- Categories populated via getNavCategories -->
        </ul>
      </nav>
      <div class='branding'>
        <a href='index.html' class='logo-mark' aria-label='Home'>
          <span class='logo-text'>22</span>
        </a>
      </div>
      <div class='header-utilities' aria-label='Site tools'>
        <button type='button' class='utility-link search-toggle' data-action='toggle-search'>Search</button>
        <a href='favorites.html' class='utility-link'>Favorites</a>
        <a href='cart.html' class='utility-link cart-link' data-component='header-cart' data-populate='cart-summary'>Cart</a>
      </div>
    </div>
  </header>

  <main id='content' class='site-main' role='main'>
    <section class='header-search-band' data-component='header-search' hidden>
      <div class='header-search-inner'>
        <form class='header-search-form' role='search' aria-label='Search photographs'>
          <label class='visually-hidden' for='global-search-input'>Search photographs</label>
          <input id='global-search-input' class='header-search-input' type='search' placeholder='Search city, subject, or keyword' autocomplete='off' data-action='search-input'>
        </form>
        <div class='header-search-suggestions' data-populate='search-suggestions' aria-live='polite'></div>
      </div>
    </section>

    <div class='product-page'>
      <div class='product-page-inner'>
        <div class='product-back-row'>
          <a href='javascript:void(0)' class='back-link' data-component='back-navigation-link' data-action='back-navigation'>&larr; Back to results</a>
        </div>

        <div class='product-loader is-active' data-component='product-detail-loader' aria-hidden='false'>
          <div class='product-loader-inner'>
            <div class='product-loader-spinner' aria-hidden='true'></div>
            <p class='product-loader-text'>Loading photograph&hellip;</p>
          </div>
        </div>

        <section class='product-error' data-component='product-error' hidden>
          <p class='product-error-message' data-populate='product-error-message'>The requested photograph could not be found.</p>
          <a href='catalog.html' class='back-to-shop-link'>Back to shop</a>
        </section>

        <section class='product-hero-section'>
          <figure class='product-image-gallery' data-component='product-image-gallery'>
            <img class='product-main-image' src='' alt='' data-populate='product-main-image'>
            <figcaption class='visually-hidden'>Selected photograph</figcaption>
          </figure>
          <div class='product-thumbnails' data-populate='product-thumbnails' aria-label='Additional views'></div>
          <button type='button' class='gallery-next-arrow' data-action='gallery-next' aria-label='Next image'>
            &rsaquo;
          </button>
        </section>

        <section class='product-main-info-section' data-component='product-main-info'>
          <div class='product-title-row'>
            <div class='product-title-block'>
              <h1 class='product-title' data-populate='product-title'></h1>
              <p class='product-subtitle' data-populate='product-subtitle'></p>
            </div>
            <button type='button' class='favorite-toggle' data-component='favorites-toggle' data-action='toggle-favorite' aria-pressed='false' aria-label='Toggle favorite'>
              <span class='favorite-icon' aria-hidden='true'></span>
              <span class='visually-hidden'>Toggle favorite</span>
            </button>
          </div>
          <div class='product-meta-row'>
            <div class='product-rating' data-populate='product-rating'></div>
            <div class='product-category' data-populate='product-category'></div>
          </div>
          <div class='product-edition-info' data-populate='edition-info'></div>
          <div class='product-description' data-populate='product-description'></div>
        </section>

        <section class='product-config-price-section'>
          <div class='product-configurator-column' data-component='product-configurator'>
            <h2 class='config-section-title'>Configure your print</h2>

            <div class='config-group' data-config-group='size'>
              <label class='config-label' for='config-size'>Size</label>
              <select id='config-size' class='config-select' name='size' data-config-field='size_label'>
                <option value=''>Select size</option>
              </select>
            </div>

            <div class='config-group' data-config-group='product_format'>
              <label class='config-label' for='config-format'>Format</label>
              <select id='config-format' class='config-select' name='product_format' data-config-field='product_format'>
                <option value=''>Select format</option>
              </select>
            </div>

            <div class='config-group' data-config-group='material'>
              <label class='config-label' for='config-material'>Material</label>
              <select id='config-material' class='config-select' name='material' data-config-field='material'>
                <option value=''>Select material</option>
              </select>
            </div>

            <div class='config-group' data-config-group='frame_color'>
              <label class='config-label' for='config-frame-color'>Frame color</label>
              <select id='config-frame-color' class='config-select' name='frame_color' data-config-field='frame_color'>
                <option value=''>No frame</option>
              </select>
            </div>

            <div class='config-group' data-config-group='mat_color'>
              <label class='config-label' for='config-mat-color'>Mat color</label>
              <select id='config-mat-color' class='config-select' name='mat_color' data-config-field='mat_color'>
                <option value=''>No mat</option>
              </select>
            </div>

            <div class='config-group' data-config-group='paper_finish'>
              <label class='config-label' for='config-paper-finish'>Paper finish</label>
              <select id='config-paper-finish' class='config-select' name='paper_finish' data-config-field='paper_finish'>
                <option value=''>Select finish</option>
              </select>
            </div>

            <div class='config-group' data-config-group='license_type'>
              <label class='config-label' for='config-license-type'>License</label>
              <select id='config-license-type' class='config-select' name='license_type' data-config-field='license_type'>
                <option value=''>Select license</option>
              </select>
            </div>
          </div>

          <div class='product-purchase-column'>
            <aside class='price-availability-panel' data-component='price-availability-panel'>
              <div class='price-summary'>
                <div class='price-current' data-populate='price-current'>
                  <!-- Live price -->
                </div>
                <div class='price-range' data-populate='price-range'>
                  <!-- Min-max price -->
                </div>
              </div>
              <div class='availability-summary'>
                <div class='availability-status' data-populate='availability-status'></div>
                <div class='availability-stock' data-populate='availability-stock'></div>
                <div class='availability-shipping' data-populate='availability-shipping'></div>
              </div>
            </aside>

            <section class='add-to-cart-form' data-component='add-to-cart-form'>
              <div class='quantity-row'>
                <label class='quantity-label' for='quantity-input'>Quantity</label>
                <input id='quantity-input' class='quantity-input' type='number' min='1' value='1' data-action='quantity-input'>
              </div>
              <button type='button' class='add-to-cart-button' data-action='add-to-cart' disabled>Add to cart</button>
              <div class='add-to-cart-message' data-populate='add-to-cart-message' aria-live='polite'></div>
            </section>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul>
          <li><a href='about.html'>About</a></li>
          <li><a href='contact.html'>Contact</a></li>
          <li><a href='help.html'>Help / FAQ</a></li>
          <li><a href='shipping_returns.html'>Shipping &amp; Returns</a></li>
          <li><a href='privacy.html'>Privacy Policy</a></li>
          <li><a href='terms.html'>Terms &amp; Conditions</a></li>
        </ul>
      </nav>
      <p class='footer-meta'>&copy; <span class='footer-year'>2026</span> Studio 22. All rights reserved.</p>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    let productId = null;
    let backLinkTarget = 'catalog.html';
    let currentProductDetails = null;
    let currentConfiguration = null;
    let currentVariantData = null;
    let isFavorite = false;
    let galleryImages = [];
    let currentGalleryIndex = 0;
    let searchDebounceTimer = null;

    document.addEventListener('DOMContentLoaded', function () {
      const urlParams = new URLSearchParams(window.location.search);
      productId = urlParams.get('id');
      const returnUrlParam = urlParams.get('returnUrl');
      backLinkTarget = returnUrlParam ? decodeURIComponent(returnUrlParam) : 'catalog.html';

      initPopulateElements();
      initSearch();
      initGlobalClickHandler();
      initConfigChangeHandlers();
      initQuantityHandler();

      if (!productId) {
        hideLoader();
        showProductError('We could not find this photograph. Please return to the collection.');
        return;
      }

      try {
        const loaderEl = document.querySelector('[data-component="product-detail-loader"]');
        if (loaderEl) {
          loaderEl.classList.add('is-active');
          loaderEl.setAttribute('aria-hidden', 'false');
        }

        const details = WebsiteSDK.getProductDetails(productId);
        currentProductDetails = details;
        isFavorite = !!details.favorite_status;

        renderProduct(details);
      } catch (error) {
        console.error('Error loading product details', error);
        showProductError('We were unable to load this photograph. Please try again or return to the shop.');
      } finally {
        hideLoader();
      }
    });

    function initPopulateElements() {
      let categories = [];
      let cartSummary = null;

      try {
        categories = WebsiteSDK.getNavCategories() || [];
      } catch (error) {
        console.error('Error loading navigation categories', error);
      }

      try {
        cartSummary = WebsiteSDK.getCartSummary();
      } catch (error) {
        console.error('Error loading cart summary', error);
      }

      const populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function (element) {
        const dataType = element.dataset.populate;
        if (dataType === 'nav-categories') {
          const visible = categories.filter(function (cat) { return cat.is_nav_visible; }).sort(function (a, b) {
            const aOrder = typeof a.sort_order === 'number' ? a.sort_order : 0;
            const bOrder = typeof b.sort_order === 'number' ? b.sort_order : 0;
            return aOrder - bOrder;
          });
          renderNavCategories(element, visible);
        } else if (dataType === 'cart-summary' && cartSummary) {
          renderCartSummary(element, cartSummary);
        }
      });
    }

    function renderNavCategories(container, categories) {
      if (!container) return;
      container.innerHTML = '';
      categories.forEach(function (cat) {
        const li = document.createElement('li');
        const link = document.createElement('a');
        link.href = 'javascript:void(0)';
        link.textContent = cat.display_name;
        link.dataset.action = 'nav-category';
        link.dataset.categoryId = cat.id;
        li.appendChild(link);
        container.appendChild(li);
      });
    }

    function renderCartSummary(container, summary) {
      if (!container || !summary) return;
      const explicitCount = typeof summary.item_count === 'number' ? summary.item_count : null;
      const cartCount = summary.cart && typeof summary.cart.item_count === 'number' ? summary.cart.item_count : null;
      const itemCount = explicitCount !== null ? explicitCount : (cartCount !== null ? cartCount : 0);
      const label = itemCount > 0 ? 'Cart (' + itemCount + ')' : 'Cart';
      container.textContent = label;
    }

    function updateCartSummaryFromCart(cartSummary) {
      const containers = document.querySelectorAll('[data-populate="cart-summary"]');
      containers.forEach(function (container) {
        renderCartSummary(container, cartSummary);
      });
    }

    function initSearch() {
      const searchToggle = document.querySelector('[data-action="toggle-search"]');
      const searchBand = document.querySelector('[data-component="header-search"]');
      const searchInput = document.querySelector('[data-action="search-input"]');
      const suggestionsContainer = searchBand ? searchBand.querySelector('[data-populate="search-suggestions"]') : null;

      if (searchToggle && searchBand) {
        searchToggle.addEventListener('click', function () {
          const isHidden = searchBand.hasAttribute('hidden');
          if (isHidden) {
            searchBand.removeAttribute('hidden');
            if (searchInput) {
              searchInput.focus();
            }
          } else {
            searchBand.setAttribute('hidden', 'hidden');
            if (suggestionsContainer) {
              suggestionsContainer.innerHTML = '';
            }
          }
        });
      }

      if (searchInput && suggestionsContainer) {
        searchInput.addEventListener('input', function () {
          const query = searchInput.value.trim();
          if (searchDebounceTimer) {
            window.clearTimeout(searchDebounceTimer);
          }

          if (!query) {
            suggestionsContainer.innerHTML = '';
            return;
          }

          searchDebounceTimer = window.setTimeout(function () {
            try {
              const suggestions = WebsiteSDK.getSearchSuggestions(query);
              renderSearchSuggestions(suggestionsContainer, suggestions);
            } catch (error) {
              console.error('Error fetching search suggestions', error);
            }
          }, 250);
        });
      }
    }

    function renderSearchSuggestions(container, suggestions) {
      if (!container) return;
      container.innerHTML = '';
      if (!suggestions) return;

      const hasQueries = Array.isArray(suggestions.suggested_queries) && suggestions.suggested_queries.length > 0;
      const hasTags = Array.isArray(suggestions.matching_subject_tags) && suggestions.matching_subject_tags.length > 0;
      const hasProducts = Array.isArray(suggestions.top_matching_products) && suggestions.top_matching_products.length > 0;

      if (!hasQueries && !hasTags && !hasProducts) {
        return;
      }

      if (hasQueries) {
        const section = document.createElement('div');
        section.className = 'search-section search-section-queries';
        const heading = document.createElement('div');
        heading.className = 'search-section-heading';
        heading.textContent = 'Suggestions';
        section.appendChild(heading);

        suggestions.suggested_queries.forEach(function (q) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'search-suggestion-item';
          button.textContent = q;
          button.dataset.action = 'search-suggestion';
          button.dataset.suggestionType = 'query';
          button.dataset.suggestionValue = q;
          section.appendChild(button);
        });

        container.appendChild(section);
      }

      if (hasTags) {
        const sectionTags = document.createElement('div');
        sectionTags.className = 'search-section search-section-tags';
        const headingTags = document.createElement('div');
        headingTags.className = 'search-section-heading';
        headingTags.textContent = 'Subjects';
        sectionTags.appendChild(headingTags);

        suggestions.matching_subject_tags.forEach(function (tag) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'search-suggestion-item';
          button.textContent = tag;
          button.dataset.action = 'search-suggestion';
          button.dataset.suggestionType = 'subject_tag';
          button.dataset.suggestionValue = tag;
          sectionTags.appendChild(button);
        });

        container.appendChild(sectionTags);
      }

      if (hasProducts) {
        const sectionProducts = document.createElement('div');
        sectionProducts.className = 'search-section search-section-products';
        const headingProducts = document.createElement('div');
        headingProducts.className = 'search-section-heading';
        headingProducts.textContent = 'Photographs';
        sectionProducts.appendChild(headingProducts);

        suggestions.top_matching_products.forEach(function (prod) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'search-suggestion-item search-suggestion-product';
          button.dataset.action = 'search-suggestion';
          button.dataset.suggestionType = 'product';
          button.dataset.productId = prod.product_id;
          button.dataset.suggestionValue = prod.product_id;

          const thumb = document.createElement('span');
          thumb.className = 'search-suggestion-thumb';
          if (prod.thumbnail_image_url) {
            const img = document.createElement('img');
            img.src = prod.thumbnail_image_url;
            img.alt = prod.title || 'Photograph';
            thumb.appendChild(img);
          }

          const title = document.createElement('span');
          title.className = 'search-suggestion-title';
          title.textContent = prod.title || 'View photograph';

          button.appendChild(thumb);
          button.appendChild(title);
          sectionProducts.appendChild(button);
        });

        container.appendChild(sectionProducts);
      }
    }

    function initGlobalClickHandler() {
      document.body.addEventListener('click', function (event) {
        const actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        const action = actionEl.dataset.action;

        if (action === 'back-navigation') {
          event.preventDefault();
          if (backLinkTarget) {
            window.location.href = backLinkTarget;
          }
        } else if (action === 'nav-category') {
          event.preventDefault();
          const categoryId = actionEl.dataset.categoryId;
          if (categoryId) {
            const targetUrl = 'catalog.html?categoryId=' + encodeURIComponent(categoryId);
            window.location.href = targetUrl;
          }
        } else if (action === 'gallery-next') {
          event.preventDefault();
          advanceGalleryImage();
        } else if (action === 'select-thumbnail') {
          event.preventDefault();
          const imageUrl = actionEl.dataset.imageUrl;
          if (imageUrl) {
            setMainGalleryImage(imageUrl);
          }
        } else if (action === 'toggle-favorite') {
          event.preventDefault();
          handleToggleFavorite(actionEl);
        } else if (action === 'add-to-cart') {
          event.preventDefault();
          handleAddToCart();
        } else if (action === 'view-cart') {
          event.preventDefault();
          window.location.href = 'cart.html';
        } else if (action === 'search-suggestion') {
          event.preventDefault();
          handleSearchSuggestionClick(actionEl);
        }
      });
    }

    function handleSearchSuggestionClick(element) {
      const type = element.dataset.suggestionType;
      const value = element.dataset.suggestionValue;
      if (!type || !value) return;

      if (type === 'query') {
        const url = 'catalog.html?search=' + encodeURIComponent(value);
        window.location.href = url;
      } else if (type === 'subject_tag') {
        const url = 'catalog.html?subject=' + encodeURIComponent(value);
        window.location.href = url;
      } else if (type === 'product') {
        const productIdVal = element.dataset.productId || value;
        if (productIdVal) {
          const currentUrl = window.location.href;
          const url = 'product.html?id=' + encodeURIComponent(productIdVal) + '&returnUrl=' + encodeURIComponent(currentUrl);
          window.location.href = url;
        }
      }
    }

    function renderProduct(details) {
      if (!details || !details.product) return;
      const product = details.product;
      const display = details.display || {};
      const configOptions = details.configuration_options || {};
      const pricingSummary = details.pricing_summary || null;

      const errorSection = document.querySelector('[data-component="product-error"]');
      if (errorSection) {
        errorSection.setAttribute('hidden', 'hidden');
      }

      const heroSection = document.querySelector('.product-hero-section');
      const infoSection = document.querySelector('.product-main-info-section');
      const configPriceSection = document.querySelector('.product-config-price-section');
      if (heroSection) heroSection.removeAttribute('hidden');
      if (infoSection) infoSection.removeAttribute('hidden');
      if (configPriceSection) configPriceSection.removeAttribute('hidden');

      renderGallery(display, product);
      renderMainInfo(product, display);
      initFavoritesToggle();
      initConfigurator(configOptions, product);
      renderPricingSummary(pricingSummary);
    }

    function renderGallery(display, product) {
      const galleryContainer = document.querySelector('[data-component="product-image-gallery"]');
      const mainImageEl = galleryContainer ? galleryContainer.querySelector('.product-main-image') : null;
      const thumbnailsContainer = document.querySelector('[data-populate="product-thumbnails"]');

      const primaryUrl = (display && display.main_image_url) || product.main_image_url || (display && display.gallery_image_urls && display.gallery_image_urls[0]) || '';
      galleryImages = [];
      if (primaryUrl) {
        galleryImages.push(primaryUrl);
      }
      if (display && Array.isArray(display.gallery_image_urls)) {
        display.gallery_image_urls.forEach(function (url) {
          if (url && galleryImages.indexOf(url) === -1) {
            galleryImages.push(url);
          }
        });
      }
      currentGalleryIndex = 0;

      if (mainImageEl) {
        if (primaryUrl) {
          mainImageEl.src = primaryUrl;
          mainImageEl.alt = product.title || 'Photograph';
        } else {
          mainImageEl.removeAttribute('src');
          mainImageEl.alt = 'No image available';
        }
      }

      if (thumbnailsContainer) {
        thumbnailsContainer.innerHTML = '';
        if (galleryImages.length > 1) {
          galleryImages.forEach(function (url, index) {
            if (!url) return;
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'thumbnail-button';
            if (index === currentGalleryIndex) {
              button.classList.add('is-active');
            }
            button.dataset.action = 'select-thumbnail';
            button.dataset.imageUrl = url;

            const img = document.createElement('img');
            img.src = url;
            img.alt = 'View alternative angle';
            button.appendChild(img);
            thumbnailsContainer.appendChild(button);
          });
        }
      }
    }

    function advanceGalleryImage() {
      const mainImageEl = document.querySelector('.product-main-image');
      const thumbnailsContainer = document.querySelector('[data-populate="product-thumbnails"]');
      if (!mainImageEl || galleryImages.length === 0) return;
      currentGalleryIndex = (currentGalleryIndex + 1) % galleryImages.length;
      const nextUrl = galleryImages[currentGalleryIndex];
      if (nextUrl) {
        mainImageEl.src = nextUrl;
      }
      if (thumbnailsContainer) {
        const buttons = thumbnailsContainer.querySelectorAll('.thumbnail-button');
        buttons.forEach(function (btn) {
          btn.classList.remove('is-active');
          if (btn.dataset.imageUrl === nextUrl) {
            btn.classList.add('is-active');
          }
        });
      }
    }

    function setMainGalleryImage(imageUrl) {
      const mainImageEl = document.querySelector('.product-main-image');
      const thumbnailsContainer = document.querySelector('[data-populate="product-thumbnails"]');
      if (!mainImageEl || !imageUrl) return;
      mainImageEl.src = imageUrl;
      const index = galleryImages.indexOf(imageUrl);
      if (index >= 0) {
        currentGalleryIndex = index;
      }
      if (thumbnailsContainer) {
        const buttons = thumbnailsContainer.querySelectorAll('.thumbnail-button');
        buttons.forEach(function (btn) {
          btn.classList.remove('is-active');
          if (btn.dataset.imageUrl === imageUrl) {
            btn.classList.add('is-active');
          }
        });
      }
    }

    function renderMainInfo(product, display) {
      const titleEl = document.querySelector('[data-populate="product-title"]');
      const subtitleEl = document.querySelector('[data-populate="product-subtitle"]');
      const ratingEl = document.querySelector('[data-populate="product-rating"]');
      const categoryEl = document.querySelector('[data-populate="product-category"]');
      const descriptionEl = document.querySelector('[data-populate="product-description"]');
      const editionEl = document.querySelector('[data-populate="edition-info"]');

      if (titleEl) {
        titleEl.textContent = product.title || '';
      }

      if (subtitleEl) {
        subtitleEl.textContent = product.subtitle || '';
      }

      if (ratingEl) {
        const ratingVal = typeof display.rating === 'number' ? display.rating : (typeof product.rating === 'number' ? product.rating : null);
        const ratingCountVal = typeof display.rating_count === 'number' ? display.rating_count : (typeof product.rating_count === 'number' ? product.rating_count : null);
        if (ratingVal !== null) {
          const rounded = Math.round(ratingVal * 10) / 10;
          const countText = ratingCountVal ? ' b7 ' + ratingCountVal + ' reviews' : '';
          ratingEl.textContent = rounded + ' / 5' + countText;
        } else {
          ratingEl.textContent = '';
        }
      }

      if (categoryEl) {
        const categoryName = (display && display.primary_category_name) || product.primary_category || '';
        if (categoryName) {
          categoryEl.textContent = categoryName;
        } else {
          categoryEl.textContent = '';
        }
      }

      if (descriptionEl) {
        descriptionEl.textContent = product.description || '';
      }

      if (editionEl) {
        const isLimited = product.is_limited_edition || product.edition_type === 'limited_edition';
        if (isLimited) {
          const sizeVal = typeof product.edition_size === 'number' ? product.edition_size : null;
          const availVal = typeof product.edition_available === 'number' ? product.edition_available : null;
          let text = 'Limited edition';
          if (sizeVal !== null) {
            text += ' of ' + sizeVal;
          }
          if (availVal !== null) {
            text += ' b7 ' + availVal + ' remaining';
          }
          editionEl.textContent = text;
          editionEl.style.display = '';
        } else {
          editionEl.textContent = '';
          editionEl.style.display = 'none';
        }
      }
    }

    function initFavoritesToggle() {
      const toggleButton = document.querySelector('[data-component="favorites-toggle"]');
      if (!toggleButton) return;
      updateFavoriteButtonState(toggleButton, isFavorite);
    }

    function updateFavoriteButtonState(button, favorite) {
      if (!button) return;
      button.setAttribute('aria-pressed', favorite ? 'true' : 'false');
      const icon = button.querySelector('.favorite-icon');
      if (icon) {
        icon.textContent = favorite ? '\u2665' : '\u2661';
      }
    }

    function handleToggleFavorite(button) {
      if (!currentProductDetails || !currentProductDetails.product) return;
      const product = currentProductDetails.product;
      const previousState = isFavorite;
      const nextState = !previousState;
      isFavorite = nextState;
      updateFavoriteButtonState(button, nextState);

      try {
        if (nextState) {
          const response = WebsiteSDK.addProductToFavorites(product.id);
          if (!response || response.success === false) {
            throw new Error('Failed to add favorite');
          }
        } else {
          const response = WebsiteSDK.removeProductFromFavorites(product.id);
          if (!response || response.success === false) {
            throw new Error('Failed to remove favorite');
          }
        }
      } catch (error) {
        console.error('Error toggling favorite', error);
        isFavorite = previousState;
        updateFavoriteButtonState(button, previousState);
      }
    }

    function initConfigurator(configurationOptions, product) {
      const configContainer = document.querySelector('[data-component="product-configurator"]');
      if (!configContainer) return;

      const sizeSelect = configContainer.querySelector('select[data-config-field="size_label"]');
      const formatSelect = configContainer.querySelector('select[data-config-field="product_format"]');
      const materialSelect = configContainer.querySelector('select[data-config-field="material"]');
      const frameSelect = configContainer.querySelector('select[data-config-field="frame_color"]');
      const matSelect = configContainer.querySelector('select[data-config-field="mat_color"]');
      const finishSelect = configContainer.querySelector('select[data-config-field="paper_finish"]');
      const licenseSelect = configContainer.querySelector('select[data-config-field="license_type"]');

      const sizeOptions = (configurationOptions && configurationOptions.size_options) || [];
      const formatOptions = (configurationOptions && configurationOptions.product_format_options) || [];
      const materialOptions = (configurationOptions && configurationOptions.material_options) || [];
      const frameOptions = (configurationOptions && configurationOptions.frame_color_options) || [];
      const matOptions = (configurationOptions && configurationOptions.mat_color_options) || [];
      const finishOptions = (configurationOptions && configurationOptions.paper_finish_options) || [];
      const licenseOptions = (configurationOptions && configurationOptions.license_type_options) || [];

      if (sizeSelect) {
        populateSelect(sizeSelect, sizeOptions, 'size_label', 'size_label');
      }

      let allowedFormats = formatOptions;
      if (product.allowed_product_formats && Array.isArray(product.allowed_product_formats) && product.allowed_product_formats.length > 0) {
        allowedFormats = formatOptions.filter(function (opt) {
          return product.allowed_product_formats.indexOf(opt.value) !== -1;
        });
      }

      if (formatSelect) {
        populateSelect(formatSelect, allowedFormats, 'value', 'label');
      }

      if (materialSelect) {
        populateSelect(materialSelect, materialOptions, 'value', 'label');
      }

      if (frameSelect) {
        populateSelect(frameSelect, frameOptions, 'value', 'label');
      }

      if (matSelect) {
        populateSelect(matSelect, matOptions, 'value', 'label');
      }

      if (finishSelect) {
        populateSelect(finishSelect, finishOptions, 'value', 'label');
      }

      if (licenseSelect) {
        populateSelect(licenseSelect, licenseOptions, 'value', 'label');
      }

      const defaultSize = sizeOptions.length > 0 ? sizeOptions[0] : null;
      const defaultFormat = allowedFormats.length > 0 ? allowedFormats[0] : null;

      if (sizeSelect && defaultSize) {
        sizeSelect.value = defaultSize.size_label;
      }
      if (formatSelect && defaultFormat) {
        formatSelect.value = defaultFormat.value;
      }

      updateConfigVisibility(defaultFormat ? defaultFormat.value : (formatSelect ? formatSelect.value : ''));

      currentConfiguration = buildConfigurationFromUI();
      updateVariantForConfiguration();
    }

    function populateSelect(selectEl, options, valueKey, labelKey) {
      if (!selectEl) return;
      const currentValue = selectEl.value;
      const firstOption = selectEl.querySelector('option');
      const placeholderHTML = firstOption ? firstOption.outerHTML : '';
      selectEl.innerHTML = placeholderHTML;
      options.forEach(function (opt) {
        const optionEl = document.createElement('option');
        optionEl.value = opt[valueKey];
        optionEl.textContent = opt[labelKey];
        selectEl.appendChild(optionEl);
      });
      if (currentValue) {
        selectEl.value = currentValue;
      }
    }

    function updateConfigVisibility(selectedFormat) {
      const materialGroup = document.querySelector('[data-config-group="material"]');
      const frameGroup = document.querySelector('[data-config-group="frame_color"]');
      const matGroup = document.querySelector('[data-config-group="mat_color"]');
      const finishGroup = document.querySelector('[data-config-group="paper_finish"]');
      const licenseGroup = document.querySelector('[data-config-group="license_type"]');

      function showGroup(group) {
        if (!group) return;
        group.style.display = '';
      }

      function hideGroup(group) {
        if (!group) return;
        group.style.display = 'none';
      }

      const format = selectedFormat || '';

      if (format === 'digital_download') {
        hideGroup(materialGroup);
        hideGroup(frameGroup);
        hideGroup(matGroup);
        hideGroup(finishGroup);
        showGroup(licenseGroup);
      } else if (format === 'framed_print') {
        showGroup(materialGroup);
        showGroup(frameGroup);
        showGroup(matGroup);
        showGroup(finishGroup);
        hideGroup(licenseGroup);
      } else if (format === 'print_only') {
        showGroup(materialGroup);
        showGroup(finishGroup);
        hideGroup(frameGroup);
        hideGroup(matGroup);
        hideGroup(licenseGroup);
      } else if (format === 'canvas' || format === 'metal') {
        showGroup(materialGroup);
        hideGroup(frameGroup);
        hideGroup(matGroup);
        hideGroup(finishGroup);
        hideGroup(licenseGroup);
      } else {
        showGroup(materialGroup);
        showGroup(frameGroup);
        showGroup(matGroup);
        showGroup(finishGroup);
        showGroup(licenseGroup);
      }
    }

    function initConfigChangeHandlers() {
      const configContainer = document.querySelector('[data-component="product-configurator"]');
      if (!configContainer) return;

      const selects = configContainer.querySelectorAll('select[data-config-field]');
      selects.forEach(function (selectEl) {
        selectEl.addEventListener('change', function () {
          const field = selectEl.dataset.configField;
          if (field === 'product_format') {
            updateConfigVisibility(selectEl.value);
          }
          currentConfiguration = buildConfigurationFromUI();
          updateVariantForConfiguration();
        });
      });
    }

    function buildConfigurationFromUI() {
      const configContainer = document.querySelector('[data-component="product-configurator"]');
      if (!configContainer) return null;

      const sizeSelect = configContainer.querySelector('select[data-config-field="size_label"]');
      const formatSelect = configContainer.querySelector('select[data-config-field="product_format"]');
      const materialSelect = configContainer.querySelector('select[data-config-field="material"]');
      const frameSelect = configContainer.querySelector('select[data-config-field="frame_color"]');
      const matSelect = configContainer.querySelector('select[data-config-field="mat_color"]');
      const finishSelect = configContainer.querySelector('select[data-config-field="paper_finish"]');
      const licenseSelect = configContainer.querySelector('select[data-config-field="license_type"]');

      const configuration = {};
      if (sizeSelect && sizeSelect.value) {
        configuration.size_label = sizeSelect.value;
      }
      if (formatSelect && formatSelect.value) {
        configuration.product_format = formatSelect.value;
      }
      if (materialSelect && materialSelect.value) {
        configuration.material = materialSelect.value;
      }
      if (frameSelect && frameSelect.value) {
        configuration.frame_color = frameSelect.value;
      }
      if (matSelect && matSelect.value) {
        configuration.mat_color = matSelect.value;
      }
      if (finishSelect && finishSelect.value) {
        configuration.paper_finish = finishSelect.value;
      }
      if (licenseSelect && licenseSelect.value) {
        configuration.license_type = licenseSelect.value;
      }

      if (configuration.product_format === 'digital_download' && !configuration.material) {
        configuration.material = 'digital';
      }

      return configuration;
    }

    function updateVariantForConfiguration() {
      if (!productId || !currentConfiguration) return;
      try {
        const result = WebsiteSDK.getVariantPriceAndAvailability(productId, currentConfiguration);
        currentVariantData = result;
        updatePricePanel(result);
        updateAddToCartState(result);
      } catch (error) {
        console.error('Error fetching variant price and availability', error);
      }
    }

    function renderPricingSummary(pricingSummary) {
      const rangeEl = document.querySelector('[data-populate="price-range"]');
      if (!rangeEl) return;
      if (!pricingSummary || typeof pricingSummary.min_price !== 'number' || typeof pricingSummary.max_price !== 'number') {
        rangeEl.textContent = '';
        return;
      }
      const currency = pricingSummary.currency || 'USD';
      if (pricingSummary.min_price === pricingSummary.max_price) {
        rangeEl.textContent = 'From ' + formatCurrency(pricingSummary.min_price, currency);
      } else {
        rangeEl.textContent = formatCurrency(pricingSummary.min_price, currency) + ' b7 ' + formatCurrency(pricingSummary.max_price, currency);
      }
    }

    function updatePricePanel(variantResult) {
      const currentPriceEl = document.querySelector('[data-populate="price-current"]');
      const availabilityStatusEl = document.querySelector('[data-populate="availability-status"]');
      const availabilityStockEl = document.querySelector('[data-populate="availability-stock"]');
      const availabilityShippingEl = document.querySelector('[data-populate="availability-shipping"]');

      if (!variantResult) {
        if (currentPriceEl) currentPriceEl.textContent = 'Select options to see price';
        if (availabilityStatusEl) availabilityStatusEl.textContent = '';
        if (availabilityStockEl) availabilityStockEl.textContent = '';
        if (availabilityShippingEl) availabilityShippingEl.textContent = '';
        return;
      }

      const price = typeof variantResult.final_price === 'number' ? variantResult.final_price : null;
      const currency = variantResult.currency || 'USD';
      const available = !!variantResult.available;
      const stockQuantity = typeof variantResult.stock_quantity === 'number' ? variantResult.stock_quantity : null;

      if (currentPriceEl) {
        if (price !== null) {
          currentPriceEl.textContent = formatCurrency(price, currency);
        } else {
          currentPriceEl.textContent = 'Price unavailable';
        }
      }

      if (availabilityStatusEl) {
        if (available) {
          availabilityStatusEl.textContent = 'Available';
        } else {
          availabilityStatusEl.textContent = 'Unavailable';
        }
      }

      if (availabilityStockEl) {
        if (available && stockQuantity !== null) {
          if (stockQuantity > 5) {
            availabilityStockEl.textContent = 'In stock (' + stockQuantity + ' available)';
          } else if (stockQuantity > 0) {
            availabilityStockEl.textContent = 'Low stock (' + stockQuantity + ' remaining)';
          } else {
            availabilityStockEl.textContent = '';
          }
        } else {
          availabilityStockEl.textContent = '';
        }
      }

      if (availabilityShippingEl) {
        if (variantResult.requires_shipping === false) {
          availabilityShippingEl.textContent = 'Digital download';
        } else if (variantResult.requires_shipping === true) {
          availabilityShippingEl.textContent = 'Ships as a physical print';
        } else {
          availabilityShippingEl.textContent = '';
        }
      }
    }

    function updateAddToCartState(variantResult) {
      const addButton = document.querySelector('[data-action="add-to-cart"]');
      if (!addButton) return;
      const canAdd = variantResult && variantResult.variant && variantResult.available;
      if (canAdd) {
        addButton.removeAttribute('disabled');
      } else {
        addButton.setAttribute('disabled', 'disabled');
      }
    }

    function initQuantityHandler() {
      const quantityInput = document.querySelector('[data-action="quantity-input"]');
      if (!quantityInput) return;
      quantityInput.addEventListener('input', function () {
        normalizeQuantityInput(quantityInput);
      });
      quantityInput.addEventListener('change', function () {
        normalizeQuantityInput(quantityInput);
      });
    }

    function normalizeQuantityInput(input) {
      let value = parseInt(input.value, 10);
      if (isNaN(value) || value < 1) {
        value = 1;
      }
      input.value = String(value);
    }

    function handleAddToCart() {
      if (!currentProductDetails || !currentProductDetails.product) return;
      if (!currentVariantData || !currentVariantData.variant || !currentVariantData.available) return;

      const quantityInput = document.querySelector('[data-action="quantity-input"]');
      const messageEl = document.querySelector('[data-populate="add-to-cart-message"]');
      let quantity = 1;
      if (quantityInput) {
        normalizeQuantityInput(quantityInput);
        quantity = parseInt(quantityInput.value, 10) || 1;
      }

      try {
        const product = currentProductDetails.product;
        const variant = currentVariantData.variant;
        const response = WebsiteSDK.addItemToCart(product.id, variant.id, quantity);
        if (!response || response.success === false) {
          if (messageEl) {
            messageEl.textContent = (response && response.message) || 'Unable to add to cart.';
          }
          return;
        }

        if (messageEl) {
          const text = response.message || 'Added to cart.';
          const container = document.createElement('span');
          container.textContent = text + ' ';
          const viewCartBtn = document.createElement('button');
          viewCartBtn.type = 'button';
          viewCartBtn.className = 'view-cart-inline';
          viewCartBtn.dataset.action = 'view-cart';
          viewCartBtn.textContent = 'View cart';
          messageEl.innerHTML = '';
          messageEl.appendChild(container);
          messageEl.appendChild(viewCartBtn);
        }

        try {
          const summary = WebsiteSDK.getCartSummary();
          if (summary) {
            updateCartSummaryFromCart(summary);
          } else if (response.cart) {
            const cartSummary = { cart: response.cart, item_count: response.cart.item_count || 0 };
            updateCartSummaryFromCart(cartSummary);
          }
        } catch (summaryError) {
          console.error('Error refreshing cart summary after add-to-cart', summaryError);
        }
      } catch (error) {
        console.error('Error adding item to cart', error);
        if (messageEl) {
          messageEl.textContent = 'Unable to add to cart. Please try again.';
        }
      }
    }

    function showProductError(message) {
      const errorSection = document.querySelector('[data-component="product-error"]');
      const heroSection = document.querySelector('.product-hero-section');
      const infoSection = document.querySelector('.product-main-info-section');
      const configPriceSection = document.querySelector('.product-config-price-section');

      if (errorSection) {
        const msgEl = errorSection.querySelector('[data-populate="product-error-message"]');
        if (msgEl) {
          msgEl.textContent = message;
        }
        errorSection.removeAttribute('hidden');
      }

      if (heroSection) heroSection.setAttribute('hidden', 'hidden');
      if (infoSection) infoSection.setAttribute('hidden', 'hidden');
      if (configPriceSection) configPriceSection.setAttribute('hidden', 'hidden');
    }

    function hideLoader() {
      const loaderEl = document.querySelector('[data-component="product-detail-loader"]');
      if (loaderEl) {
        loaderEl.classList.remove('is-active');
        loaderEl.setAttribute('aria-hidden', 'true');
      }
    }

    function formatCurrency(amount, currency) {
      try {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency || 'USD' }).format(amount);
      } catch (error) {
        console.error('Error formatting currency', error);
        return (currency || 'USD') + ' ' + amount.toFixed(2);
      }
    }
  </script>
</body>
</html>
