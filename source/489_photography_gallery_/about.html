<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Photography Gallery</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Work+Sans:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='about.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-inner'>
      <nav class='primary-nav' aria-label='Primary'>
        <ul data-component='site-header-nav' data-populate='nav-categories'>
          <!-- Populated from getNavCategories -->
        </ul>
      </nav>
      <div class='branding'>
        <a href='index.html' class='logo-mark' aria-label='Home'>
          <span class='logo-text'>22</span>
        </a>
      </div>
      <div class='header-utilities' aria-label='Site tools'>
        <a href='favorites.html' class='utility-link'>Favorites</a>
        <a href='cart.html' class='utility-link'>Cart</a>
      </div>
    </div>
  </header>

  <main id='content' class='site-main' role='main'>
    <section class='search-band' data-component='global-search-form'>
      <div class='search-inner'>
        <form class='global-search-form' role='search' data-action='global-search-form'>
          <label class='visually-hidden' for='global-search-input'>Search prints</label>
          <input id='global-search-input' name='query' type='search' autocomplete='off' placeholder='Search city, subject, or title'>
          <button type='submit' class='search-submit'>Search</button>
        </form>
        <div class='search-suggestions-panel' data-component='search-suggestions' hidden></div>
      </div>
    </section>

    <section class='about-loader-section' data-component='about-artist-loader'>
      <div class='about-main-column'>
        <div class='about-loader' aria-busy='true' aria-live='polite'>
          <div class='skeleton skeleton-image'></div>
          <div class='skeleton skeleton-line'></div>
          <div class='skeleton skeleton-line'></div>
          <div class='skeleton skeleton-line short'></div>
        </div>
        <div class='about-error' role='alert' hidden>
          <p>We couldn't load the artist's story just now. Please try again.</p>
          <button type='button' class='retry-button' data-action='retry-about-content'>Retry</button>
        </div>
      </div>
    </section>

    <section class='about-layout'>
      <div class='about-main-column'>
        <section id='bio' class='about-section about-bio' data-component='about-artist-bio'>
          <div class='about-section-inner' data-populate='about-bio'>
            <!-- Bio content populated from getAboutArtistContent -->
          </div>
        </section>

        <section id='themes' class='about-section about-themes' data-component='about-themes-list'>
          <div class='about-section-inner' data-populate='about-themes'>
            <!-- Themes populated from getAboutArtistContent.themes -->
          </div>
        </section>

        <section id='printing' class='about-section about-printing' data-component='printing-practices-section'>
          <div class='about-section-inner' data-populate='printing-practices'>
            <!-- Printing practices populated from getAboutArtistContent.printing_practices_html -->
          </div>
        </section>

        <div class='about-inline-cta'>
          <button type='button' class='inline-shop-cta' data-component='shop-prints-cta' data-action='shop-prints-cta'>
            <span class='cta-label'>Shop Prints</span>
            <span class='cta-icon' aria-hidden='true'>&rarr;</span>
          </button>
        </div>
      </div>
    </section>

    <button type='button' class='floating-shop-cta' data-component='shop-prints-cta' data-action='shop-prints-cta' aria-label='Shop prints'>
      <span class='cta-label'>Shop Prints</span>
      <span class='cta-icon' aria-hidden='true'>&rarr;</span>
    </button>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul>
          <li><a href='about.html'>About</a></li>
          <li><a href='contact.html'>Contact</a></li>
          <li><a href='help.html'>Help / FAQ</a></li>
          <li><a href='shipping_returns.html'>Shipping &amp; Returns</a></li>
          <li><a href='privacy.html'>Privacy Policy</a></li>
          <li><a href='terms.html'>Terms &amp; Conditions</a></li>
        </ul>
      </nav>
      <p class='footer-meta'>&copy; <span class='footer-year'>2026</span> Studio 22. All rights reserved.</p>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var initialSectionParam = urlParams.get('section');
      var initialThemeParam = urlParams.get('theme');
      var initialQueryParam = urlParams.get('query') || '';

      function debounce(fn, delay) {
        var timeoutId;
        return function() {
          var args = arguments;
          if (timeoutId) {
            clearTimeout(timeoutId);
          }
          timeoutId = setTimeout(function() {
            fn.apply(null, args);
          }, delay);
        };
      }

      function escapeHTML(str) {
        if (!str && str !== 0) {
          return '';
        }
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function updateUrlParams(updates) {
        var params = new URLSearchParams(window.location.search);
        Object.keys(updates).forEach(function(key) {
          var value = updates[key];
          if (value === null || value === undefined || value === '') {
            params.delete(key);
          } else {
            params.set(key, value);
          }
        });
        var query = params.toString();
        var newUrl = query ? (window.location.pathname + '?' + query + window.location.hash) : (window.location.pathname + window.location.hash);
        window.history.replaceState(null, '', newUrl);
      }

      function scrollToSection(sectionKey, updateParam) {
        var idMap = {
          bio: 'bio',
          themes: 'themes',
          printing: 'printing'
        };
        var targetId = idMap[sectionKey];
        if (!targetId) {
          return;
        }
        var el = document.getElementById(targetId);
        if (!el) {
          return;
        }
        try {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (e) {
          el.scrollIntoView(true);
        }
        if (updateParam) {
          updateUrlParams({ section: sectionKey });
        }
      }

      function parseThemeParam(themeParam, themes) {
        if (!themeParam) {
          return null;
        }
        if (!themes || !themes.length) {
          return null;
        }
        var index = parseInt(themeParam, 10);
        if (isNaN(index) || index < 0 || index >= themes.length) {
          return null;
        }
        return index;
      }

      function renderNavCategories(container, categories) {
        container.innerHTML = '';

        var homeLi = document.createElement('li');
        var homeLink = document.createElement('a');
        homeLink.href = 'index.html';
        homeLink.textContent = 'Home';
        homeLi.appendChild(homeLink);
        container.appendChild(homeLi);

        if (!Array.isArray(categories)) {
          return;
        }

        var visible = categories.filter(function(cat) {
          return cat && cat.id && cat.display_name && (cat.is_nav_visible !== false);
        });

        visible.sort(function(a, b) {
          var ao = typeof a.sort_order === 'number' ? a.sort_order : 0;
          var bo = typeof b.sort_order === 'number' ? b.sort_order : 0;
          return ao - bo;
        });

        visible.forEach(function(cat) {
          var li = document.createElement('li');
          var a = document.createElement('a');
          a.href = 'catalog.html?categoryId=' + encodeURIComponent(cat.id);
          a.textContent = cat.display_name;
          li.appendChild(a);
          container.appendChild(li);
        });
      }

      var loaderSection = document.querySelector('[data-component="about-artist-loader"]');
      var loaderElement = loaderSection ? loaderSection.querySelector('.about-loader') : null;
      var loaderError = loaderSection ? loaderSection.querySelector('.about-error') : null;

      function showLoader(show) {
        if (!loaderSection || !loaderElement) {
          return;
        }
        loaderSection.style.display = show ? '' : 'none';
        loaderElement.style.display = show ? '' : 'none';
        if (loaderError) {
          loaderError.hidden = true;
        }
      }

      function showLoaderError() {
        if (!loaderSection || !loaderError) {
          return;
        }
        loaderSection.style.display = '';
        if (loaderElement) {
          loaderElement.style.display = 'none';
        }
        loaderError.hidden = false;
      }

      function renderBio(container, content) {
        container.innerHTML = '';
        if (!content) {
          return;
        }
        var wrapper = document.createElement('div');
        wrapper.className = 'about-bio-inner';

        var heading = document.createElement('h1');
        heading.className = 'about-heading';
        heading.textContent = content.headline || 'About the Artist';
        wrapper.appendChild(heading);

        if (content.profile_image_url) {
          var figure = document.createElement('figure');
          figure.className = 'about-profile';
          var img = document.createElement('img');
          img.src = content.profile_image_url;
          img.alt = 'Portrait of the artist';
          figure.appendChild(img);
          wrapper.appendChild(figure);
        }

        var body = document.createElement('div');
        body.className = 'about-body typography';
        if (content.body_html) {
          body.innerHTML = content.body_html;
        }
        wrapper.appendChild(body);

        container.appendChild(wrapper);
      }

      function renderThemes(container, content, initialThemeIndex) {
        container.innerHTML = '';
        var themes = (content && Array.isArray(content.themes)) ? content.themes : [];

        var wrapper = document.createElement('div');
        wrapper.className = 'themes-inner';

        var heading = document.createElement('h2');
        heading.className = 'about-heading';
        heading.textContent = 'Artistic Themes';
        wrapper.appendChild(heading);

        if (!themes.length) {
          var empty = document.createElement('p');
          empty.className = 'themes-empty';
          empty.textContent = 'Themes will appear here as they become available.';
          wrapper.appendChild(empty);
          container.appendChild(wrapper);
          return;
        }

        var list = document.createElement('ul');
        list.className = 'themes-list';

        themes.forEach(function(theme, index) {
          var li = document.createElement('li');
          li.className = 'theme-item';
          li.dataset.themeIndex = String(index);
          li.dataset.action = 'select-theme';

          if (initialThemeIndex !== null && index === initialThemeIndex) {
            li.classList.add('is-active');
          } else if (initialThemeIndex === null && index === 0) {
            li.classList.add('is-active');
          }

          var title = document.createElement('div');
          title.className = 'theme-title';
          title.textContent = (theme && theme.title) ? theme.title : ('Theme ' + (index + 1));

          var description = document.createElement('div');
          description.className = 'theme-description';
          description.textContent = (theme && theme.description) ? theme.description : '';

          li.appendChild(title);
          li.appendChild(description);
          list.appendChild(li);
        });

        wrapper.appendChild(list);
        container.appendChild(wrapper);
      }

      function renderPrinting(container, content) {
        container.innerHTML = '';
        var wrapper = document.createElement('div');
        wrapper.className = 'printing-inner';

        var heading = document.createElement('h2');
        heading.className = 'about-heading';
        heading.textContent = 'Printing Practices';
        wrapper.appendChild(heading);

        var body = document.createElement('div');
        body.className = 'printing-body typography';
        if (content && content.printing_practices_html) {
          body.innerHTML = content.printing_practices_html;
        }
        wrapper.appendChild(body);

        container.appendChild(wrapper);
      }

      function initAboutContent(initialSection, initialThemeParamLocal) {
        if (typeof WebsiteSDK === 'undefined') {
          showLoaderError();
          return;
        }
        showLoader(true);
        var aboutContent = null;
        try {
          aboutContent = WebsiteSDK.getAboutArtistContent();
        } catch (e) {
          console.error('Failed to load About artist content', e);
          showLoaderError();
          return;
        }

        var themeIndex = parseThemeParam(initialThemeParamLocal, aboutContent && aboutContent.themes);

        var bioContainers = document.querySelectorAll('[data-populate="about-bio"]');
        bioContainers.forEach(function(container) {
          renderBio(container, aboutContent);
        });

        var themesContainers = document.querySelectorAll('[data-populate="about-themes"]');
        themesContainers.forEach(function(container) {
          renderThemes(container, aboutContent, themeIndex);
        });

        var printingContainers = document.querySelectorAll('[data-populate="printing-practices"]');
        printingContainers.forEach(function(container) {
          renderPrinting(container, aboutContent);
        });

        showLoader(false);

        if (initialSection && (initialSection === 'bio' || initialSection === 'themes' || initialSection === 'printing')) {
          scrollToSection(initialSection, false);
        }
      }

      if (typeof WebsiteSDK !== 'undefined') {
        try {
          var navContainers = document.querySelectorAll('[data-populate="nav-categories"]');
          if (navContainers.length) {
            var categories = WebsiteSDK.getNavCategories();
            navContainers.forEach(function(container) {
              renderNavCategories(container, categories);
            });
          }
        } catch (e) {
          console.error('Failed to load navigation categories', e);
        }
      }

      initAboutContent(initialSectionParam, initialThemeParam);

      var searchForm = document.querySelector('[data-action="global-search-form"]');
      var searchInput = document.getElementById('global-search-input');
      var suggestionsPanel = document.querySelector('[data-component="search-suggestions"]');

      if (searchInput) {
        searchInput.value = initialQueryParam;
      }

      function renderSearchSuggestions(container, suggestions, query) {
        if (!container) {
          return;
        }
        if (!suggestions || (
          (!suggestions.suggested_queries || !suggestions.suggested_queries.length) &&
          (!suggestions.matching_subject_tags || !suggestions.matching_subject_tags.length) &&
          (!suggestions.top_matching_products || !suggestions.top_matching_products.length)
        )) {
          container.innerHTML = '';
          container.hidden = true;
          return;
        }

        container.hidden = false;
        container.innerHTML = '';

        var wrapper = document.createElement('div');
        wrapper.className = 'search-suggestions-inner';

        if (Array.isArray(suggestions.suggested_queries) && suggestions.suggested_queries.length) {
          var queriesGroup = document.createElement('div');
          queriesGroup.className = 'suggestions-group suggestions-queries';
          var qHeading = document.createElement('div');
          qHeading.className = 'suggestions-heading';
          qHeading.textContent = 'Suggested searches';
          queriesGroup.appendChild(qHeading);
          var qList = document.createElement('ul');
          suggestions.suggested_queries.forEach(function(sq) {
            var li = document.createElement('li');
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'suggestion-item suggestion-query';
            btn.dataset.action = 'search-suggest-query';
            btn.dataset.query = sq;
            btn.textContent = sq;
            li.appendChild(btn);
            qList.appendChild(li);
          });
          queriesGroup.appendChild(qList);
          wrapper.appendChild(queriesGroup);
        }

        if (Array.isArray(suggestions.matching_subject_tags) && suggestions.matching_subject_tags.length) {
          var tagsGroup = document.createElement('div');
          tagsGroup.className = 'suggestions-group suggestions-tags';
          var tHeading = document.createElement('div');
          tHeading.className = 'suggestions-heading';
          tHeading.textContent = 'Subjects';
          tagsGroup.appendChild(tHeading);
          var tList = document.createElement('ul');
          suggestions.matching_subject_tags.forEach(function(tag) {
            var liTag = document.createElement('li');
            var btnTag = document.createElement('button');
            btnTag.type = 'button';
            btnTag.className = 'suggestion-item suggestion-tag';
            btnTag.dataset.action = 'search-suggest-tag';
            btnTag.dataset.tag = tag;
            btnTag.textContent = tag;
            liTag.appendChild(btnTag);
            tList.appendChild(liTag);
          });
          tagsGroup.appendChild(tList);
          wrapper.appendChild(tagsGroup);
        }

        if (Array.isArray(suggestions.top_matching_products) && suggestions.top_matching_products.length) {
          var productsGroup = document.createElement('div');
          productsGroup.className = 'suggestions-group suggestions-products';
          var pHeading = document.createElement('div');
          pHeading.className = 'suggestions-heading';
          pHeading.textContent = 'Top matches';
          productsGroup.appendChild(pHeading);
          var pList = document.createElement('ul');
          suggestions.top_matching_products.forEach(function(prod) {
            if (!prod || !prod.product_id) {
              return;
            }
            var liProd = document.createElement('li');
            var btnProd = document.createElement('button');
            btnProd.type = 'button';
            btnProd.className = 'suggestion-item suggestion-product';
            btnProd.dataset.action = 'search-suggest-product';
            btnProd.dataset.productId = prod.product_id;

            if (prod.thumbnail_image_url) {
              var thumb = document.createElement('img');
              thumb.className = 'suggestion-thumb';
              thumb.src = prod.thumbnail_image_url;
              thumb.alt = prod.title ? ('Thumbnail of ' + prod.title) : 'Product thumbnail';
              btnProd.appendChild(thumb);
            }

            var titleSpan = document.createElement('span');
            titleSpan.className = 'suggestion-title';
            titleSpan.textContent = prod.title || 'View print';
            btnProd.appendChild(titleSpan);

            liProd.appendChild(btnProd);
            pList.appendChild(liProd);
          });
          productsGroup.appendChild(pList);
          wrapper.appendChild(productsGroup);
        }

        container.appendChild(wrapper);
      }

      if (searchInput && typeof WebsiteSDK !== 'undefined') {
        var debouncedSuggest = debounce(function(query) {
          if (!query) {
            renderSearchSuggestions(suggestionsPanel, null, '');
            return;
          }
          try {
            var suggestions = WebsiteSDK.getSearchSuggestions(query);
            renderSearchSuggestions(suggestionsPanel, suggestions, query);
          } catch (e) {
            console.error('Error getting search suggestions', e);
          }
        }, 200);

        searchInput.addEventListener('input', function(event) {
          var value = (event.target.value || '').trim();
          if (!value) {
            renderSearchSuggestions(suggestionsPanel, null, '');
            return;
          }
          debouncedSuggest(value);
        });

        searchInput.addEventListener('focus', function() {
          var value = (searchInput.value || '').trim();
          if (value) {
            debouncedSuggest(value);
          }
        });
      }

      if (searchForm && searchInput) {
        searchForm.addEventListener('submit', function(event) {
          event.preventDefault();
          var value = (searchInput.value || '').trim();
          if (!value) {
            return;
          }
          var targetUrl = 'catalog.html?query=' + encodeURIComponent(value);
          window.location.href = targetUrl;
        });
      }

      document.getElementById('content').addEventListener('click', function(event) {
        var anchor = event.target.closest('a');
        if (!anchor) {
          return;
        }
        var href = anchor.getAttribute('href');
        if (!href || href.charAt(0) !== '#') {
          return;
        }
        var targetId = href.slice(1);
        if (targetId === 'bio' || targetId === 'themes' || targetId === 'printing') {
          event.preventDefault();
          scrollToSection(targetId, true);
        }
      });

      function handleShopPrintsNavigation() {
        var targetUrl = 'catalog.html?categoryId=' + encodeURIComponent('all_prints');
        window.location.href = targetUrl;
      }

      function handleThemeSelection(target) {
        var item = target.closest('.theme-item');
        if (!item) {
          return;
        }
        var indexStr = item.dataset.themeIndex;
        if (!indexStr) {
          return;
        }
        var list = item.parentElement;
        if (list) {
          Array.prototype.forEach.call(list.children, function(child) {
            child.classList.remove('is-active');
          });
        }
        item.classList.add('is-active');
        updateUrlParams({ section: 'themes', theme: indexStr });
        try {
          item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } catch (e) {
          item.scrollIntoView(true);
        }
      }

      document.addEventListener('click', function(event) {
        var actionTarget = event.target.closest('[data-action]');
        if (!actionTarget) {
          return;
        }
        var action = actionTarget.dataset.action;
        if (!action) {
          return;
        }
        if (action === 'shop-prints-cta') {
          event.preventDefault();
          handleShopPrintsNavigation();
        } else if (action === 'retry-about-content') {
          event.preventDefault();
          if (loaderError) {
            loaderError.hidden = true;
          }
          initAboutContent(initialSectionParam, initialThemeParam);
        } else if (action === 'select-theme') {
          event.preventDefault();
          handleThemeSelection(actionTarget);
        } else if (action === 'search-suggest-query') {
          event.preventDefault();
          var q = actionTarget.dataset.query || '';
          if (!q) {
            return;
          }
          if (searchInput) {
            searchInput.value = q;
          }
          window.location.href = 'catalog.html?query=' + encodeURIComponent(q);
        } else if (action === 'search-suggest-tag') {
          event.preventDefault();
          var tag = actionTarget.dataset.tag || '';
          if (!tag) {
            return;
          }
          if (searchInput) {
            searchInput.value = tag;
          }
          window.location.href = 'catalog.html?query=' + encodeURIComponent(tag);
        } else if (action === 'search-suggest-product') {
          event.preventDefault();
          var productId = actionTarget.dataset.productId || '';
          if (!productId) {
            return;
          }
          window.location.href = 'product.html?id=' + encodeURIComponent(productId);
        }
      });
    });
  </script>
</body>
</html>
