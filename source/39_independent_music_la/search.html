<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Independent Music Label &amp; Store</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="search.css" />
</head>
<body>
  <div class="page">
    <header class="site-header" role="banner">
      <div class="site-header__inner">
        <div class="site-header__brand">
          <a href="index.html" class="site-header__logo" aria-label="Independent music label home">
            INDEPENDENT LABEL
          </a>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
          <ul class="site-nav__list">
            <li class="site-nav__item"><a href="index.html" class="site-nav__link">Home</a></li>
            <li class="site-nav__item"><a href="catalog.html?section=shop" class="site-nav__link">Shop</a></li>
            <li class="site-nav__item"><a href="catalog.html?section=albums" class="site-nav__link">Albums</a></li>
            <li class="site-nav__item"><a href="tracks.html" class="site-nav__link">Tracks</a></li>
            <li class="site-nav__item"><a href="catalog.html?section=preorders" class="site-nav__link">Pre-orders</a></li>
            <li class="site-nav__item"><a href="artists.html" class="site-nav__link">Artists</a></li>
            <li class="site-nav__item"><a href="account.html" class="site-nav__link">Account</a></li>
            <li class="site-nav__item"><a href="cart.html" class="site-nav__link">Cart</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <section class="search-page" data-component="search-page" aria-label="Search results">
        <h1 class="visually-hidden">Search results</h1>

        <section class="search-page__query" data-component="search-query-bar" aria-label="Search catalog">
          <form class="search-query-form" data-action="submit-search">
            <label class="search-query-form__label" for="searchQueryInput">Search</label>
            <input id="searchQueryInput" name="query" type="search" class="search-query-form__input" autocomplete="off" />
            <button type="submit" class="search-query-form__submit">Go</button>
          </form>
        </section>

        <div class="search-layout">
          <section class="search-results-shell">
            <div class="search-results-shell__inner">
              <aside class="search-filters" data-component="catalog-filter-sidebar" data-populate="filters" aria-label="Filter search results">
                <!-- Filters rendered by JavaScript -->
              </aside>

              <section class="search-results" data-component="search-results-grid" data-populate="results" aria-label="Results">
                <p class="search-results__loading">Loading results…</p>
              </section>
            </div>
          </section>

          <section class="search-bottom-bar" data-component="search-bottom-bar" aria-label="Search tools">
            <div class="search-bottom-bar__left">
              <div class="search-meta">
                <div class="search-meta__summary" data-component="active-filters-summary" data-populate="active-filters">
                  <!-- Active filters summary rendered by JavaScript -->
                </div>
              </div>
            </div>
            <div class="search-bottom-bar__right">
              <div class="search-sort" data-component="search-sort-bar" data-populate="sort-bar">
                <!-- Sort controls rendered by JavaScript -->
              </div>
              <nav class="search-pagination" data-component="pagination-controls" data-populate="pagination" aria-label="Pagination">
                <!-- Pagination rendered by JavaScript -->
              </nav>
            </div>
          </section>
        </div>
      </section>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="site-footer__inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="about.html" class="footer-nav__link">About</a>
          <a href="contact.html" class="footer-nav__link">Contact / Demo Submission</a>
          <a href="catalog.html?section=shop" class="footer-nav__link">Shop</a>
          <a href="artists.html" class="footer-nav__link">Artists</a>
        </nav>
        <p class="site-footer__meta">&copy; 2024 Independent Music Label &amp; Store.</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      function getSearchStateFromUrl() {
        var params = new URLSearchParams(window.location.search);

        function getNumber(name) {
          var v = params.get(name);
          if (v === null || v === '') return null;
          var n = Number(v);
          return Number.isFinite(n) ? n : null;
        }

        var state = {
          query: params.get('query') || '',
          format: params.get('format') || '',
          genreId: params.get('genreId') || '',
          releaseYear: getNumber('releaseYear'),
          releaseYearFrom: getNumber('releaseYearFrom'),
          releaseYearTo: getNumber('releaseYearTo'),
          priceMax: getNumber('priceMax'),
          edition: params.get('edition') || '',
          sort: params.get('sort') || '',
          page: getNumber('page'),
          pageSize: getNumber('pageSize')
        };

        if (!state.page || state.page < 1) state.page = 1;
        if (!state.pageSize || state.pageSize < 1) state.pageSize = 24;
        return state;
      }

      function buildFiltersForSearch(state) {
        var filters = {};
        if (state.format) filters.format = state.format;
        if (state.genreId) filters.genreIds = [state.genreId];
        if (state.releaseYear) {
          filters.releaseYearFrom = state.releaseYear;
          filters.releaseYearTo = state.releaseYear;
        } else {
          if (state.releaseYearFrom) filters.releaseYearFrom = state.releaseYearFrom;
          if (state.releaseYearTo) filters.releaseYearTo = state.releaseYearTo;
        }
        if (state.priceMax !== null && state.priceMax !== undefined) {
          filters.maxPrice = state.priceMax;
        }
        if (state.edition) filters.edition = state.edition;
        return filters;
      }

      function navigateWithParams(patch, resetPage) {
        var params = new URLSearchParams(window.location.search);
        Object.keys(patch).forEach(function (key) {
          var value = patch[key];
          if (value === null || value === '' || typeof value === 'undefined' || (typeof value === 'number' && !Number.isFinite(value))) {
            params.delete(key);
          } else {
            params.set(key, String(value));
          }
        });
        if (resetPage) {
          params.delete('page');
        }
        var queryString = params.toString();
        var url = queryString ? 'search.html?' + queryString : 'search.html';
        window.location.href = url;
      }

      var state = getSearchStateFromUrl();

      // Initialize search query bar
      var queryBar = document.querySelector('[data-component="search-query-bar"]');
      if (queryBar) {
        var queryForm = queryBar.querySelector('form');
        var queryInput = queryBar.querySelector('input[name="query"]');
        if (queryInput && state.query) {
          queryInput.value = state.query;
        }
        if (queryForm) {
          queryForm.addEventListener('submit', function (event) {
            event.preventDefault();
            var value = queryInput ? queryInput.value.trim() : '';
            var params = new URLSearchParams(window.location.search);
            if (value) {
              params.set('query', value);
            } else {
              params.delete('query');
            }
            params.delete('page');
            var qs = params.toString();
            var url = qs ? 'search.html?' + qs : 'search.html';
            window.location.href = url;
          });
        }
      }

      // Load filter options
      var filterOptions = null;
      try {
        filterOptions = WebsiteSDK.getCatalogFilterOptions('search');
      } catch (e) {
        console.error('Error loading filter options', e);
      }

      // Run search
      var searchResult = null;
      try {
        var filtersArg = buildFiltersForSearch(state);
        var sortArg = state.sort || undefined;
        var pageArg = state.page || 1;
        var pageSizeArg = state.pageSize || 24;
        searchResult = WebsiteSDK.searchCatalog(state.query || '', filtersArg, sortArg, pageArg, pageSizeArg);
      } catch (e) {
        console.error('Error running search', e);
      }

      function renderFilterSidebar(container, filterOptionsArg, stateArg) {
        container.innerHTML = '';

        var wrapper = document.createElement('form');
        wrapper.setAttribute('class', 'filters-form');
        wrapper.setAttribute('aria-label', 'Filters');
        wrapper.setAttribute('data-action', 'filters-form');

        // Format
        var formatGroup = document.createElement('div');
        formatGroup.setAttribute('class', 'filters-form__group');
        var formatLabel = document.createElement('label');
        formatLabel.setAttribute('class', 'filters-form__label');
        formatLabel.textContent = 'Format';
        var formatSelect = document.createElement('select');
        formatSelect.setAttribute('name', 'format');
        formatSelect.setAttribute('class', 'filters-form__select');
        var formatAnyOption = document.createElement('option');
        formatAnyOption.value = '';
        formatAnyOption.textContent = 'Any';
        formatSelect.appendChild(formatAnyOption);
        if (filterOptionsArg && Array.isArray(filterOptionsArg.formats)) {
          filterOptionsArg.formats.forEach(function (format) {
            var opt = document.createElement('option');
            opt.value = format.value;
            opt.textContent = format.label || format.value;
            formatSelect.appendChild(opt);
          });
        }
        if (stateArg.format) {
          formatSelect.value = stateArg.format;
        }
        formatSelect.addEventListener('change', function () {
          var value = formatSelect.value || null;
          navigateWithParams({ format: value }, true);
        });
        formatGroup.appendChild(formatLabel);
        formatGroup.appendChild(formatSelect);
        wrapper.appendChild(formatGroup);

        // Genre
        var genreGroup = document.createElement('div');
        genreGroup.setAttribute('class', 'filters-form__group');
        var genreLabel = document.createElement('label');
        genreLabel.setAttribute('class', 'filters-form__label');
        genreLabel.textContent = 'Genre';
        var genreSelect = document.createElement('select');
        genreSelect.setAttribute('name', 'genreId');
        genreSelect.setAttribute('class', 'filters-form__select');
        var genreAny = document.createElement('option');
        genreAny.value = '';
        genreAny.textContent = 'Any';
        genreSelect.appendChild(genreAny);
        if (filterOptionsArg && Array.isArray(filterOptionsArg.genres)) {
          filterOptionsArg.genres.forEach(function (genre) {
            var opt = document.createElement('option');
            opt.value = genre.id;
            opt.textContent = genre.name || genre.slug || genre.id;
            genreSelect.appendChild(opt);
          });
        }
        if (stateArg.genreId) {
          genreSelect.value = stateArg.genreId;
        }
        genreSelect.addEventListener('change', function () {
          var value = genreSelect.value || null;
          navigateWithParams({ genreId: value }, true);
        });
        genreGroup.appendChild(genreLabel);
        genreGroup.appendChild(genreSelect);
        wrapper.appendChild(genreGroup);

        // Exact year
        var yearExactGroup = document.createElement('div');
        yearExactGroup.setAttribute('class', 'filters-form__group');
        var yearExactLabel = document.createElement('label');
        yearExactLabel.setAttribute('class', 'filters-form__label');
        yearExactLabel.textContent = 'Year';
        var yearExactSelect = document.createElement('select');
        yearExactSelect.setAttribute('name', 'releaseYear');
        yearExactSelect.setAttribute('class', 'filters-form__select');
        var yearAnyOption = document.createElement('option');
        yearAnyOption.value = '';
        yearAnyOption.textContent = 'Any year';
        yearExactSelect.appendChild(yearAnyOption);
        if (filterOptionsArg && Array.isArray(filterOptionsArg.releaseYears)) {
          filterOptionsArg.releaseYears.forEach(function (yearObj) {
            var opt = document.createElement('option');
            opt.value = String(yearObj.value);
            opt.textContent = yearObj.label || String(yearObj.value);
            yearExactSelect.appendChild(opt);
          });
        }
        if (stateArg.releaseYear) {
          yearExactSelect.value = String(stateArg.releaseYear);
        }
        yearExactSelect.addEventListener('change', function () {
          var value = yearExactSelect.value;
          if (value) {
            navigateWithParams({
              releaseYear: value,
              releaseYearFrom: null,
              releaseYearTo: null
            }, true);
          } else {
            navigateWithParams({
              releaseYear: null
            }, true);
          }
        });
        yearExactGroup.appendChild(yearExactLabel);
        yearExactGroup.appendChild(yearExactSelect);
        wrapper.appendChild(yearExactGroup);

        // Year range
        var yearRangeGroup = document.createElement('div');
        yearRangeGroup.setAttribute('class', 'filters-form__group filters-form__group--inline');
        var yearRangeLabel = document.createElement('span');
        yearRangeLabel.setAttribute('class', 'filters-form__label');
        yearRangeLabel.textContent = 'Year range';
        var yearFromInput = document.createElement('input');
        yearFromInput.setAttribute('type', 'number');
        yearFromInput.setAttribute('name', 'releaseYearFrom');
        yearFromInput.setAttribute('placeholder', 'From');
        yearFromInput.setAttribute('class', 'filters-form__input filters-form__input--small');
        if (stateArg.releaseYearFrom && !stateArg.releaseYear) {
          yearFromInput.value = String(stateArg.releaseYearFrom);
        }
        var yearToInput = document.createElement('input');
        yearToInput.setAttribute('type', 'number');
        yearToInput.setAttribute('name', 'releaseYearTo');
        yearToInput.setAttribute('placeholder', 'To');
        yearToInput.setAttribute('class', 'filters-form__input filters-form__input--small');
        if (stateArg.releaseYearTo && !stateArg.releaseYear) {
          yearToInput.value = String(stateArg.releaseYearTo);
        }

        function handleYearRangeChange() {
          var fromVal = yearFromInput.value.trim();
          var toVal = yearToInput.value.trim();
          var patch = {
            releaseYear: null,
            releaseYearFrom: fromVal ? Number(fromVal) : null,
            releaseYearTo: toVal ? Number(toVal) : null
          };
          navigateWithParams(patch, true);
        }

        yearFromInput.addEventListener('change', handleYearRangeChange);
        yearToInput.addEventListener('change', handleYearRangeChange);

        yearRangeGroup.appendChild(yearRangeLabel);
        yearRangeGroup.appendChild(yearFromInput);
        yearRangeGroup.appendChild(yearToInput);
        wrapper.appendChild(yearRangeGroup);

        // Max price
        var priceGroup = document.createElement('div');
        priceGroup.setAttribute('class', 'filters-form__group');
        var priceLabel = document.createElement('label');
        priceLabel.setAttribute('class', 'filters-form__label');
        var currency = filterOptionsArg && filterOptionsArg.priceRange && filterOptionsArg.priceRange.currency ? filterOptionsArg.priceRange.currency : '';
        priceLabel.textContent = 'Max price' + (currency ? ' (' + currency + ')' : '');
        var priceInput = document.createElement('input');
        priceInput.setAttribute('type', 'number');
        priceInput.setAttribute('name', 'priceMax');
        priceInput.setAttribute('class', 'filters-form__input');
        if (filterOptionsArg && filterOptionsArg.priceRange) {
          if (typeof filterOptionsArg.priceRange.min === 'number') {
            priceInput.setAttribute('min', String(filterOptionsArg.priceRange.min));
          }
          if (typeof filterOptionsArg.priceRange.max === 'number') {
            priceInput.setAttribute('max', String(filterOptionsArg.priceRange.max));
          }
        }
        if (stateArg.priceMax !== null && stateArg.priceMax !== undefined) {
          priceInput.value = String(stateArg.priceMax);
        }
        priceInput.addEventListener('change', function () {
          var valueStr = priceInput.value.trim();
          var valueNum = valueStr ? Number(valueStr) : null;
          navigateWithParams({ priceMax: valueNum }, true);
        });
        priceGroup.appendChild(priceLabel);
        priceGroup.appendChild(priceInput);
        wrapper.appendChild(priceGroup);

        // Edition
        var editionGroup = document.createElement('div');
        editionGroup.setAttribute('class', 'filters-form__group');
        var editionLabel = document.createElement('label');
        editionLabel.setAttribute('class', 'filters-form__label');
        editionLabel.textContent = 'Edition';
        var editionSelect = document.createElement('select');
        editionSelect.setAttribute('name', 'edition');
        editionSelect.setAttribute('class', 'filters-form__select');
        var editionAny = document.createElement('option');
        editionAny.value = '';
        editionAny.textContent = 'Any';
        editionSelect.appendChild(editionAny);
        if (filterOptionsArg && Array.isArray(filterOptionsArg.editions)) {
          filterOptionsArg.editions.forEach(function (edition) {
            var opt = document.createElement('option');
            opt.value = edition.value;
            opt.textContent = edition.label || edition.value;
            editionSelect.appendChild(opt);
          });
        }
        if (stateArg.edition) {
          editionSelect.value = stateArg.edition;
        }
        editionSelect.addEventListener('change', function () {
          var value = editionSelect.value || null;
          navigateWithParams({ edition: value }, true);
        });
        editionGroup.appendChild(editionLabel);
        editionGroup.appendChild(editionSelect);
        wrapper.appendChild(editionGroup);

        // Clear all filters
        var anyFilterActive =
          (stateArg.format && stateArg.format !== '') ||
          (stateArg.genreId && stateArg.genreId !== '') ||
          !!stateArg.releaseYear ||
          !!stateArg.releaseYearFrom ||
          !!stateArg.releaseYearTo ||
          (stateArg.priceMax !== null && stateArg.priceMax !== undefined) ||
          (stateArg.edition && stateArg.edition !== '');

        if (anyFilterActive) {
          var clearAllGroup = document.createElement('div');
          clearAllGroup.setAttribute('class', 'filters-form__group filters-form__group--clear');
          var clearAllButton = document.createElement('button');
          clearAllButton.setAttribute('type', 'button');
          clearAllButton.setAttribute('class', 'filters-form__clear');
          clearAllButton.setAttribute('data-action', 'clear-all-filters');
          clearAllButton.textContent = 'Clear all filters';
          clearAllButton.addEventListener('click', function () {
            var patch = {
              format: null,
              genreId: null,
              releaseYear: null,
              releaseYearFrom: null,
              releaseYearTo: null,
              priceMax: null,
              edition: null
            };
            navigateWithParams(patch, true);
          });
          clearAllGroup.appendChild(clearAllButton);
          wrapper.appendChild(clearAllGroup);
        }

        container.appendChild(wrapper);
      }

      function renderResultsGrid(container, searchResultArg) {
        container.innerHTML = '';

        var items = searchResultArg && Array.isArray(searchResultArg.items) ? searchResultArg.items : [];
        if (!items.length) {
          var empty = document.createElement('p');
          empty.setAttribute('class', 'search-results__empty');
          empty.textContent = 'No results found. Try a different search or adjust your filters.';
          container.appendChild(empty);
          return;
        }

        var grid = document.createElement('div');
        grid.setAttribute('class', 'search-results-grid');

        items.forEach(function (item) {
          var card = document.createElement('article');
          card.setAttribute('class', 'search-result-card');
          card.setAttribute('data-component', 'search-result-item');

          var mainButton = document.createElement('button');
          mainButton.setAttribute('type', 'button');
          mainButton.setAttribute('class', 'search-result-card__main');
          mainButton.setAttribute('data-action', 'open-result');
          mainButton.setAttribute('data-result-type', item.resultType || '');

          if (item.resultType === 'release' && item.releaseId) {
            mainButton.setAttribute('data-release-id', item.releaseId);
          } else if (item.resultType === 'track' && item.trackId) {
            mainButton.setAttribute('data-track-id', item.trackId);
          } else if (item.resultType === 'merch_item' && item.merchItemId) {
            mainButton.setAttribute('data-merch-item-id', item.merchItemId);
          }

          var figure = document.createElement('figure');
          figure.setAttribute('class', 'search-result-card__figure');
          var img = document.createElement('img');
          img.setAttribute('class', 'search-result-card__image');
          if (item.coverImageUrl) {
            img.src = item.coverImageUrl;
          } else {
            img.src = 'placeholder_cover.png';
          }
          var altTitle = item.title || '';
          img.alt = altTitle ? altTitle : 'Cover artwork';
          figure.appendChild(img);

          var figcaption = document.createElement('figcaption');
          figcaption.setAttribute('class', 'search-result-card__caption');

          var typeLabel = document.createElement('div');
          typeLabel.setAttribute('class', 'search-result-card__type');
          typeLabel.textContent = item.resultType ? item.resultType.replace('_', ' ') : '';
          figcaption.appendChild(typeLabel);

          if (item.title) {
            var titleEl = document.createElement('div');
            titleEl.setAttribute('class', 'search-result-card__title');
            titleEl.textContent = item.title;
            figcaption.appendChild(titleEl);
          }

          if (item.artistName) {
            var artistEl = document.createElement('button');
            artistEl.setAttribute('type', 'button');
            artistEl.setAttribute('class', 'search-result-card__artist');
            artistEl.setAttribute('data-action', 'open-artist');
            if (item.primaryArtistId) {
              artistEl.setAttribute('data-artist-id', item.primaryArtistId);
            }
            artistEl.textContent = item.artistName;
            artistEl.addEventListener('click', function (event) {
              event.stopPropagation();
              var artistId = artistEl.getAttribute('data-artist-id');
              if (artistId) {
                window.location.href = 'artist.html?artistId=' + encodeURIComponent(artistId);
              }
            });
            figcaption.appendChild(artistEl);
          } else if (item.subtitle) {
            var subtitleEl = document.createElement('div');
            subtitleEl.setAttribute('class', 'search-result-card__subtitle');
            subtitleEl.textContent = item.subtitle;
            figcaption.appendChild(subtitleEl);
          }

          var priceLine = document.createElement('div');
          priceLine.setAttribute('class', 'search-result-card__price');
          if (typeof item.priceFrom === 'number' && typeof item.priceTo === 'number' && item.priceFrom !== item.priceTo) {
            priceLine.textContent = item.currency ? item.currency + ' ' + item.priceFrom.toFixed(2) + ' - ' + item.priceTo.toFixed(2) : item.priceFrom.toFixed(2) + ' - ' + item.priceTo.toFixed(2);
          } else if (typeof item.priceFrom === 'number') {
            priceLine.textContent = item.currency ? item.currency + ' ' + item.priceFrom.toFixed(2) : String(item.priceFrom.toFixed(2));
          } else {
            priceLine.textContent = '';
          }
          figcaption.appendChild(priceLine);

          figure.appendChild(figcaption);
          mainButton.appendChild(figure);
          card.appendChild(mainButton);

          mainButton.addEventListener('click', function () {
            var resultType = mainButton.getAttribute('data-result-type');
            if (resultType === 'release') {
              var releaseId = mainButton.getAttribute('data-release-id');
              if (releaseId) {
                window.location.href = 'product.html?releaseId=' + encodeURIComponent(releaseId);
              }
            } else if (resultType === 'track') {
              var trackId = mainButton.getAttribute('data-track-id');
              if (trackId) {
                window.location.href = 'product.html?trackId=' + encodeURIComponent(trackId);
              }
            } else if (resultType === 'merch_item') {
              var merchItemId = mainButton.getAttribute('data-merch-item-id');
              if (merchItemId) {
                window.location.href = 'product.html?merchItemId=' + encodeURIComponent(merchItemId);
              }
            }
          });

          var controlsRow = document.createElement('div');
          controlsRow.setAttribute('class', 'search-result-card__controls');

          var statusEl = document.createElement('div');
          statusEl.setAttribute('class', 'search-result-card__status');
          statusEl.setAttribute('aria-live', 'polite');

          if (item.resultType === 'release' && item.albumFormatId) {
            var addButton = document.createElement('button');
            addButton.setAttribute('type', 'button');
            addButton.setAttribute('class', 'search-result-card__action search-result-card__action--add');
            addButton.setAttribute('data-component', 'result-quick-add-to-cart');
            addButton.setAttribute('data-action', 'quick-add-to-cart');
            addButton.textContent = 'Add to cart';
            addButton.addEventListener('click', function (event) {
              event.stopPropagation();
              statusEl.textContent = 'Adding…';
              try {
                var addResult = WebsiteSDK.addAlbumFormatToCart(item.albumFormatId, 1);
                if (addResult && addResult.success) {
                  statusEl.textContent = 'Added to cart';
                  setTimeout(function () {
                    statusEl.textContent = '';
                  }, 2000);
                } else if (addResult && addResult.message) {
                  statusEl.textContent = addResult.message;
                } else {
                  statusEl.textContent = 'Could not add to cart.';
                }
              } catch (error) {
                console.error('Error adding to cart', error);
                statusEl.textContent = 'Error adding to cart.';
              }
            });
            controlsRow.appendChild(addButton);
          }

          var wishlistButton = document.createElement('button');
          wishlistButton.setAttribute('type', 'button');
          wishlistButton.setAttribute('class', 'search-result-card__action search-result-card__action--wishlist');
          wishlistButton.setAttribute('data-component', 'result-wishlist-toggle');
          wishlistButton.setAttribute('data-action', 'toggle-wishlist');
          wishlistButton.textContent = '␀␀';

          wishlistButton.addEventListener('click', function (event) {
            event.stopPropagation();
            statusEl.textContent = 'Saving…';

            try {
              var wishlistResult = null;
              if (item.resultType === 'release' && item.releaseId) {
                wishlistResult = WebsiteSDK.addReleaseToWishlist(item.releaseId);
              } else if (item.resultType === 'track' && item.trackId) {
                wishlistResult = WebsiteSDK.addTrackToWishlist(item.trackId);
              } else if (item.resultType === 'merch_item' && item.merchItemId) {
                wishlistResult = WebsiteSDK.addMerchItemToWishlist(item.merchItemId);
              }

              if (wishlistResult && wishlistResult.success) {
                wishlistButton.classList.add('is-active');
                wishlistButton.textContent = '␀';
                statusEl.textContent = 'Saved to wishlist';
                setTimeout(function () {
                  statusEl.textContent = '';
                }, 2000);
              } else if (wishlistResult && wishlistResult.message) {
                statusEl.textContent = wishlistResult.message;
              } else {
                statusEl.textContent = 'Could not save to wishlist.';
              }
            } catch (error) {
              console.error('Error updating wishlist', error);
              statusEl.textContent = 'Error updating wishlist.';
            }
          });

          controlsRow.appendChild(wishlistButton);
          card.appendChild(controlsRow);
          card.appendChild(statusEl);

          grid.appendChild(card);
        });

        container.appendChild(grid);
      }

      function renderSortBar(container, searchResultArg, stateArg) {
        container.innerHTML = '';

        var bar = document.createElement('div');
        bar.setAttribute('class', 'sort-bar');

        var totalCount = searchResultArg && typeof searchResultArg.totalCount === 'number' ? searchResultArg.totalCount : 0;
        var pageSize = searchResultArg && typeof searchResultArg.pageSize === 'number' ? searchResultArg.pageSize : stateArg.pageSize || 24;
        var page = searchResultArg && typeof searchResultArg.page === 'number' ? searchResultArg.page : stateArg.page || 1;

        var meta = document.createElement('div');
        meta.setAttribute('class', 'sort-bar__meta');
        if (totalCount > 0) {
          var firstIndex = (page - 1) * pageSize + 1;
          var lastIndex = Math.min(totalCount, page * pageSize);
          meta.textContent = totalCount + ' result' + (totalCount === 1 ? '' : 's') + '. Showing ' + firstIndex + ' - ' + lastIndex;
        } else {
          meta.textContent = '0 results';
        }
        bar.appendChild(meta);

        var sortGroup = document.createElement('div');
        sortGroup.setAttribute('class', 'sort-bar__group');

        var sortLabel = document.createElement('label');
        sortLabel.setAttribute('class', 'sort-bar__label');
        sortLabel.textContent = 'Sort by';

        var sortSelect = document.createElement('select');
        sortSelect.setAttribute('class', 'sort-bar__select');
        sortSelect.setAttribute('name', 'sort');
        sortSelect.setAttribute('data-action', 'change-sort');

        function addSortOption(value, label) {
          var opt = document.createElement('option');
          opt.value = value;
          opt.textContent = label;
          sortSelect.appendChild(opt);
        }

        addSortOption('', 'Default');
        addSortOption('relevance', 'Relevance');
        addSortOption('price_low_to_high', 'Price: low to high');
        addSortOption('price_high_to_low', 'Price: high to low');
        addSortOption('rating_high_to_low', 'Rating: high to low');

        if (stateArg.sort) {
          sortSelect.value = stateArg.sort;
        }

        sortSelect.addEventListener('change', function () {
          var value = sortSelect.value || null;
          navigateWithParams({ sort: value }, true);
        });

        sortGroup.appendChild(sortLabel);
        sortGroup.appendChild(sortSelect);
        bar.appendChild(sortGroup);

        var pageSizeGroup = document.createElement('div');
        pageSizeGroup.setAttribute('class', 'sort-bar__group');

        var pageSizeLabel = document.createElement('label');
        pageSizeLabel.setAttribute('class', 'sort-bar__label');
        pageSizeLabel.textContent = 'Per page';

        var pageSizeSelect = document.createElement('select');
        pageSizeSelect.setAttribute('class', 'sort-bar__select');
        pageSizeSelect.setAttribute('name', 'pageSize');
        pageSizeSelect.setAttribute('data-action', 'change-page-size');

        [12, 24, 48].forEach(function (size) {
          var opt = document.createElement('option');
          opt.value = String(size);
          opt.textContent = String(size);
          pageSizeSelect.appendChild(opt);
        });

        var currentSize = stateArg.pageSize || 24;
        pageSizeSelect.value = String(currentSize);

        pageSizeSelect.addEventListener('change', function () {
          var newSize = Number(pageSizeSelect.value);
          if (!Number.isFinite(newSize) || newSize <= 0) return;
          navigateWithParams({ pageSize: newSize }, true);
        });

        pageSizeGroup.appendChild(pageSizeLabel);
        pageSizeGroup.appendChild(pageSizeSelect);
        bar.appendChild(pageSizeGroup);

        if (stateArg.sort) {
          var clearSortBtn = document.createElement('button');
          clearSortBtn.setAttribute('type', 'button');
          clearSortBtn.setAttribute('class', 'sort-bar__clear');
          clearSortBtn.setAttribute('data-action', 'clear-sort');
          clearSortBtn.textContent = 'Clear sort';
          clearSortBtn.addEventListener('click', function () {
            navigateWithParams({ sort: null }, true);
          });
          bar.appendChild(clearSortBtn);
        }

        container.appendChild(bar);
      }

      function renderPagination(container, searchResultArg, stateArg) {
        container.innerHTML = '';

        if (!searchResultArg) {
          return;
        }

        var totalCount = typeof searchResultArg.totalCount === 'number' ? searchResultArg.totalCount : 0;
        var pageSize = typeof searchResultArg.pageSize === 'number' ? searchResultArg.pageSize : stateArg.pageSize || 24;
        if (pageSize <= 0) pageSize = 24;

        var totalPages = totalCount > 0 ? Math.ceil(totalCount / pageSize) : 1;
        var currentPage = typeof searchResultArg.page === 'number' && searchResultArg.page > 0 ? searchResultArg.page : stateArg.page || 1;
        if (currentPage > totalPages) currentPage = totalPages;

        var list = document.createElement('div');
        list.setAttribute('class', 'pagination');

        function createPageButton(label, pageNumber, disabled, isActive, ariaLabel) {
          var btn = document.createElement('button');
          btn.setAttribute('type', 'button');
          btn.setAttribute('class', 'pagination__button');
          if (isActive) {
            btn.classList.add('is-active');
          }
          if (disabled) {
            btn.disabled = true;
          }
          if (ariaLabel) {
            btn.setAttribute('aria-label', ariaLabel);
          }
          btn.textContent = label;
          if (!disabled) {
            btn.addEventListener('click', function () {
              navigateWithParams({ page: pageNumber }, false);
            });
          }
          return btn;
        }

        var prevDisabled = currentPage <= 1;
        list.appendChild(createPageButton('Prev', currentPage - 1, prevDisabled, false, 'Previous page'));

        var maxVisible = 5;
        var start = Math.max(1, currentPage - 2);
        var end = Math.min(totalPages, start + maxVisible - 1);
        if (end - start < maxVisible - 1) {
          start = Math.max(1, end - maxVisible + 1);
        }

        for (var page = start; page <= end; page += 1) {
          var isActive = page === currentPage;
          list.appendChild(createPageButton(String(page), page, false, isActive, 'Page ' + page));
        }

        var nextDisabled = currentPage >= totalPages;
        list.appendChild(createPageButton('Next', currentPage + 1, nextDisabled, false, 'Next page'));

        container.appendChild(list);
      }

      function renderActiveFiltersSummary(container, filterOptionsArg, stateArg, searchResultArg) {
        container.innerHTML = '';

        var totalCount = searchResultArg && typeof searchResultArg.totalCount === 'number' ? searchResultArg.totalCount : 0;

        var wrapper = document.createElement('div');
        wrapper.setAttribute('class', 'active-filters');

        var summaryText = document.createElement('div');
        summaryText.setAttribute('class', 'active-filters__summary');

        var queryPart = stateArg.query ? ' for "' + stateArg.query + '"' : '';
        summaryText.textContent = totalCount + ' result' + (totalCount === 1 ? '' : 's') + queryPart;
        wrapper.appendChild(summaryText);

        var chipsContainer = document.createElement('div');
        chipsContainer.setAttribute('class', 'active-filters__chips');

        function addChip(key, label, clearPatch) {
          var chip = document.createElement('button');
          chip.setAttribute('type', 'button');
          chip.setAttribute('class', 'active-filters__chip');
          chip.setAttribute('data-action', 'clear-single-filter');
          chip.setAttribute('data-filter-key', key);
          chip.textContent = label + ' ×';
          chip.addEventListener('click', function () {
            var patch = clearPatch || {};
            if (!clearPatch) {
              patch[key] = null;
            }
            navigateWithParams(patch, true);
          });
          chipsContainer.appendChild(chip);
        }

        var formatLabel = null;
        if (stateArg.format && filterOptionsArg && Array.isArray(filterOptionsArg.formats)) {
          filterOptionsArg.formats.forEach(function (f) {
            if (f.value === stateArg.format) {
              formatLabel = f.label || f.value;
            }
          });
        }
        if (formatLabel) {
          addChip('format', formatLabel);
        }

        var genreLabel = null;
        if (stateArg.genreId && filterOptionsArg && Array.isArray(filterOptionsArg.genres)) {
          filterOptionsArg.genres.forEach(function (g) {
            if (g.id === stateArg.genreId) {
              genreLabel = g.name || g.slug || g.id;
            }
          });
        }
        if (genreLabel) {
          addChip('genreId', genreLabel);
        }

        if (stateArg.releaseYear) {
          addChip('releaseYear', String(stateArg.releaseYear), {
            releaseYear: null
          });
        } else if (stateArg.releaseYearFrom || stateArg.releaseYearTo) {
          var rangeLabel = (stateArg.releaseYearFrom ? stateArg.releaseYearFrom : 'Any') + ' - ' + (stateArg.releaseYearTo ? stateArg.releaseYearTo : 'Any');
          addChip('releaseYearRange', 'Year ' + rangeLabel, {
            releaseYearFrom: null,
            releaseYearTo: null
          });
        }

        if (stateArg.priceMax !== null && stateArg.priceMax !== undefined) {
          addChip('priceMax', 'Max ' + stateArg.priceMax, {
            priceMax: null
          });
        }

        var editionLabel = null;
        if (stateArg.edition && filterOptionsArg && Array.isArray(filterOptionsArg.editions)) {
          filterOptionsArg.editions.forEach(function (e) {
            if (e.value === stateArg.edition) {
              editionLabel = e.label || e.value;
            }
          });
        }
        if (editionLabel) {
          addChip('edition', editionLabel, {
            edition: null
          });
        }

        wrapper.appendChild(chipsContainer);

        var anyFilterActive =
          (stateArg.format && stateArg.format !== '') ||
          (stateArg.genreId && stateArg.genreId !== '') ||
          !!stateArg.releaseYear ||
          !!stateArg.releaseYearFrom ||
          !!stateArg.releaseYearTo ||
          (stateArg.priceMax !== null && stateArg.priceMax !== undefined) ||
          (stateArg.edition && stateArg.edition !== '');

        if (anyFilterActive) {
          var clearAll = document.createElement('button');
          clearAll.setAttribute('type', 'button');
          clearAll.setAttribute('class', 'active-filters__clear-all');
          clearAll.setAttribute('data-action', 'clear-all-filters');
          clearAll.textContent = 'Clear all';
          clearAll.addEventListener('click', function () {
            var patch = {
              format: null,
              genreId: null,
              releaseYear: null,
              releaseYearFrom: null,
              releaseYearTo: null,
              priceMax: null,
              edition: null
            };
            navigateWithParams(patch, true);
          });
          wrapper.appendChild(clearAll);
        }

        container.appendChild(wrapper);
      }

      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function (element) {
        var type = element.getAttribute('data-populate');
        if (type === 'filters') {
          renderFilterSidebar(element, filterOptions, state);
        } else if (type === 'results') {
          renderResultsGrid(element, searchResult);
        } else if (type === 'sort-bar') {
          renderSortBar(element, searchResult, state);
        } else if (type === 'pagination') {
          renderPagination(element, searchResult, state);
        } else if (type === 'active-filters') {
          renderActiveFiltersSummary(element, filterOptions, state, searchResult);
        }
      });
    });
  </script>
</body>
</html>
