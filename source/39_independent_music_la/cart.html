<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Independent Music Label &amp; Store</title>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css' />
  <link rel='stylesheet' href='cart.css' />
</head>
<body>
  <div class='page'>
    <header class='site-header' role='banner'>
      <div class='site-header__inner'>
        <div class='site-header__brand'>
          <a href='index.html' class='site-header__logo' aria-label='Independent music label home'>
            INDEPENDENT LABEL
          </a>
        </div>
        <nav class='site-nav' aria-label='Primary navigation'>
          <ul class='site-nav__list'>
            <li class='site-nav__item'><a href='index.html' class='site-nav__link'>Home</a></li>
            <li class='site-nav__item'><a href='catalog.html?section=shop' class='site-nav__link'>Shop</a></li>
            <li class='site-nav__item'><a href='catalog.html?section=albums' class='site-nav__link'>Albums</a></li>
            <li class='site-nav__item'><a href='tracks.html' class='site-nav__link'>Tracks</a></li>
            <li class='site-nav__item'><a href='catalog.html?section=preorders' class='site-nav__link'>Pre-orders</a></li>
            <li class='site-nav__item'><a href='artists.html' class='site-nav__link'>Artists</a></li>
            <li class='site-nav__item'><a href='account.html' class='site-nav__link'>Account</a></li>
            <li class='site-nav__item'><a href='cart.html' class='site-nav__link'>Cart</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='cart-page' data-component='cart-page-init'>
        <div class='cart-layout'>
          <section class='cart-panel cart-panel--hero' aria-label='Shopping cart'>
            <div class='cart-panel__inner'>
              <header class='cart-panel__header'>
                <h1 class='visually-hidden'>Cart</h1>
              </header>

              <div class='cart-panel__body'>
                <div class='cart-items' data-component='cart-items-list' data-populate='cart-items' aria-live='polite'>
                  <!-- Cart items injected here -->
                </div>

                <div class='cart-empty' data-component='empty-cart-state' data-populate='empty-cart-state' hidden aria-live='polite'>
                  <p class='cart-empty__title'>Your cart is empty.</p>
                  <p class='cart-empty__meta'>Use the navigation above to find releases, tracks, and merch.</p>
                </div>

                <div class='cart-shipping' data-component='shipping-method-selector'>
                  <div class='cart-shipping__header'>
                    <span class='cart-shipping__label'>Shipping</span>
                  </div>
                  <div class='cart-shipping__controls'>
                    <select id='shippingMethodSelect' name='shippingMethodId' data-action='change-shipping-method' disabled>
                      <option value=''>Select shipping</option>
                    </select>
                    <button type='button' class='cart-shipping__cheapest' data-action='select-cheapest-shipping'>
                      Select cheapest shipping
                    </button>
                  </div>
                  <p class='cart-shipping__message' data-populate='shipping-message' aria-live='polite'></p>
                </div>

                <form class='cart-promo' data-component='promo-code-form'>
                  <div class='cart-promo__field'>
                    <label for='promoCodeInput' class='cart-promo__label'>Promo code</label>
                    <div class='cart-promo__controls'>
                      <input id='promoCodeInput' name='promoCode' type='text' autocomplete='off' data-action='promo-input' />
                      <button type='submit' class='cart-promo__apply' data-action='apply-promo'>Apply</button>
                    </div>
                    <p class='cart-promo__status' data-populate='promo-status'></p>
                    <p class='cart-promo__error' data-populate='promo-error' aria-live='polite'></p>
                  </div>
                </form>
              </div>
            </div>
          </section>

          <section class='cart-summary' data-component='cart-summary-panel' aria-label='Order summary'>
            <div class='cart-summary__inner' data-populate='cart-summary'>
              <!-- Summary lines injected here -->
            </div>
          </section>

          <p class='cart-context' data-component='cart-context-message' data-populate='cart-context'></p>

          <section class='cart-actions-bar' data-component='cart-actions-bar' aria-label='Cart actions'>
            <div class='cart-actions-bar__inner'>
              <div class='cart-actions-bar__left'>
                <span class='cart-actions-bar__items' data-populate='cart-item-count'></span>
                <p class='cart-actions-bar__error' data-populate='cart-global-error' aria-live='polite'></p>
              </div>
              <div class='cart-actions-bar__right'>
                <button type='button' class='cart-actions-bar__clear' data-action='clear-cart'>
                  Clear cart
                </button>
                <button type='button' class='cart-actions-bar__checkout' data-action='proceed-to-checkout' disabled>
                  Proceed to checkout
                </button>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class='site-footer' role='contentinfo'>
      <div class='site-footer__inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <a href='about.html' class='footer-nav__link'>About</a>
          <a href='contact.html' class='footer-nav__link'>Contact / Demo Submission</a>
          <a href='catalog.html?section=shop' class='footer-nav__link'>Shop</a>
          <a href='artists.html' class='footer-nav__link'>Artists</a>
        </nav>
        <p class='site-footer__meta'>&copy; 2024 Independent Music Label &amp; Store.</p>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var fromParam = urlParams.get('from');

      var state = {
        summary: null
      };

      var populateElements = {};
      document.querySelectorAll('[data-populate]').forEach(function(el) {
        populateElements[el.getAttribute('data-populate')] = el;
      });

      var contextEl = populateElements['cart-context'];
      if (contextEl) {
        var contextMessage = '';
        if (fromParam === 'product') {
          contextMessage = 'Review what you just added from the product view.';
        } else if (fromParam === 'catalog') {
          contextMessage = 'Cart updated from the catalog.';
        } else if (fromParam === 'tracks') {
          contextMessage = 'Cart updated from the tracks page.';
        } else if (fromParam === 'artist') {
          contextMessage = 'Cart updated from an artist page.';
        } else if (fromParam === 'search') {
          contextMessage = 'Cart updated after a search.';
        } else {
          contextMessage = '';
        }
        contextEl.textContent = contextMessage;
      }

      function formatMoney(value, currency) {
        if (typeof value !== 'number' || isNaN(value)) {
          return '–';
        }
        var symbol = '';
        if (currency === 'USD' || !currency) {
          symbol = '$';
        }
        return symbol + value.toFixed(2);
      }

      function buildItemDetailMap(itemDetails) {
        var map = {};
        if (Array.isArray(itemDetails)) {
          for (var i = 0; i < itemDetails.length; i++) {
            var d = itemDetails[i];
            if (d && d.cartItemId) {
              map[d.cartItemId] = d;
            }
          }
        }
        return map;
      }

      function renderCartItems(container, summary) {
        container.innerHTML = '';
        var items = summary && summary.items ? summary.items : [];
        if (!items || items.length === 0) {
          return;
        }
        var detailMap = buildItemDetailMap(summary.itemDetails || []);
        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          var detail = detailMap[item.id] || {};
          var article = document.createElement('article');
          article.className = 'cart-item';
          article.setAttribute('data-cart-item-id', item.id);
          article.setAttribute('data-item-type', item.item_type);
          if (item.album_format_id) {
            article.setAttribute('data-album-format-id', item.album_format_id);
          }
          if (item.track_id) {
            article.setAttribute('data-track-id', item.track_id);
          }
          if (item.merch_variant_id) {
            article.setAttribute('data-merch-variant-id', item.merch_variant_id);
          }

          var thumbUrl = detail.thumbnailUrl || '';
          var title = detail.title || '';
          var artistName = detail.artistName || '';
          var formatOrVariant = detail.formatOrVariant || '';

          var mediaDiv = document.createElement('div');
          mediaDiv.className = 'cart-item__media';
          var thumbWrap = document.createElement('div');
          thumbWrap.className = 'cart-item__thumb-wrapper';
          if (thumbUrl) {
            var img = document.createElement('img');
            img.className = 'cart-item__thumb';
            img.src = thumbUrl;
            img.alt = title ? title + ' cover art' : 'Item artwork';
            thumbWrap.appendChild(img);
          }
          mediaDiv.appendChild(thumbWrap);

          var infoDiv = document.createElement('div');
          infoDiv.className = 'cart-item__info';

          var titleButton = document.createElement('button');
          titleButton.type = 'button';
          titleButton.className = 'cart-item__title';
          titleButton.textContent = title || 'Untitled';
          titleButton.setAttribute('data-action', 'open-product');
          titleButton.setAttribute('data-cart-item-id', item.id);
          infoDiv.appendChild(titleButton);

          var metaDiv = document.createElement('div');
          metaDiv.className = 'cart-item__meta';
          if (artistName) {
            var artistSpan = document.createElement('span');
            artistSpan.className = 'cart-item__artist';
            artistSpan.textContent = artistName;
            metaDiv.appendChild(artistSpan);
          }
          if (formatOrVariant) {
            var formatSpan = document.createElement('span');
            formatSpan.className = 'cart-item__format';
            formatSpan.textContent = formatOrVariant;
            metaDiv.appendChild(formatSpan);
          }
          infoDiv.appendChild(metaDiv);

          var pricingDiv = document.createElement('div');
          pricingDiv.className = 'cart-item__pricing';

          var unitPriceSpan = document.createElement('span');
          unitPriceSpan.className = 'cart-item__unit-price';
          unitPriceSpan.textContent = formatMoney(item.unit_price, item.currency);
          pricingDiv.appendChild(unitPriceSpan);

          var qtyDiv = document.createElement('div');
          qtyDiv.className = 'cart-item__quantity';
          qtyDiv.setAttribute('data-component', 'cart-item-quantity-control');

          var decBtn = document.createElement('button');
          decBtn.type = 'button';
          decBtn.className = 'cart-item__qty-btn cart-item__qty-btn--dec';
          decBtn.setAttribute('data-action', 'decrease-qty');
          decBtn.setAttribute('data-cart-item-id', item.id);
          decBtn.setAttribute('aria-label', 'Decrease quantity');
          decBtn.textContent = '-';
          qtyDiv.appendChild(decBtn);

          var qtyInput = document.createElement('input');
          qtyInput.type = 'number';
          qtyInput.min = '1';
          qtyInput.step = '1';
          qtyInput.className = 'cart-item__qty-input';
          qtyInput.value = String(item.quantity);
          qtyInput.setAttribute('data-action', 'change-qty-input');
          qtyInput.setAttribute('data-cart-item-id', item.id);
          qtyDiv.appendChild(qtyInput);

          var incBtn = document.createElement('button');
          incBtn.type = 'button';
          incBtn.className = 'cart-item__qty-btn cart-item__qty-btn--inc';
          incBtn.setAttribute('data-action', 'increase-qty');
          incBtn.setAttribute('data-cart-item-id', item.id);
          incBtn.setAttribute('aria-label', 'Increase quantity');
          incBtn.textContent = '+';
          qtyDiv.appendChild(incBtn);

          pricingDiv.appendChild(qtyDiv);

          var lineTotalSpan = document.createElement('span');
          lineTotalSpan.className = 'cart-item__line-total';
          lineTotalSpan.textContent = formatMoney(item.line_total, item.currency);
          pricingDiv.appendChild(lineTotalSpan);

          var removeDiv = document.createElement('div');
          removeDiv.className = 'cart-item__remove';

          var removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'cart-item-remove';
          removeBtn.setAttribute('data-component', 'cart-item-remove-button');
          removeBtn.setAttribute('data-action', 'remove-item');
          removeBtn.setAttribute('data-cart-item-id', item.id);
          removeBtn.textContent = 'Remove';
          removeDiv.appendChild(removeBtn);

          var errorP = document.createElement('p');
          errorP.className = 'cart-item__error';
          errorP.setAttribute('data-populate', 'cart-item-error');
          removeDiv.appendChild(errorP);

          article.appendChild(mediaDiv);
          article.appendChild(infoDiv);
          article.appendChild(pricingDiv);
          article.appendChild(removeDiv);

          container.appendChild(article);
        }
      }

      function renderEmptyState(container, hasItems) {
        container.hidden = !!hasItems;
      }

      function renderShipping(containerMessageEl, summary) {
        var selectEl = document.getElementById('shippingMethodSelect');
        if (!selectEl) {
          return;
        }
        var cart = summary && summary.cart ? summary.cart : null;
        var methods = summary && summary.availableShippingMethods ? summary.availableShippingMethods : [];

        selectEl.innerHTML = '';
        var placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = methods && methods.length ? 'Select shipping' : 'No shipping options';
        selectEl.appendChild(placeholder);

        if (!methods || methods.length === 0 || !cart || !summary.items || summary.items.length === 0) {
          selectEl.disabled = true;
          if (containerMessageEl) {
            containerMessageEl.textContent = summary.items && summary.items.length === 0 ? '' : 'Shipping is unavailable.';
          }
          return;
        }

        for (var i = 0; i < methods.length; i++) {
          var m = methods[i];
          if (!m || m.is_active === false) {
            continue;
          }
          var opt = document.createElement('option');
          opt.value = m.id;
          var label = m.name || 'Shipping';
          if (typeof m.price === 'number') {
            label += ' – ' + formatMoney(m.price, m.currency);
          }
          if (typeof m.delivery_estimate_days_min === 'number' && typeof m.delivery_estimate_days_max === 'number') {
            label += ' (' + m.delivery_estimate_days_min + '–' + m.delivery_estimate_days_max + ' days)';
          }
          opt.textContent = label;
          if (cart.shipping_method_id && cart.shipping_method_id === m.id) {
            opt.selected = true;
          }
          selectEl.appendChild(opt);
        }

        if (!cart.shipping_method_id && methods && methods.length) {
          var defaultMethodId = null;
          for (var j = 0; j < methods.length; j++) {
            if (methods[j].is_default) {
              defaultMethodId = methods[j].id;
              break;
            }
          }
          if (defaultMethodId) {
            selectEl.value = defaultMethodId;
          }
        }

        selectEl.disabled = false;
        if (containerMessageEl) {
          containerMessageEl.textContent = '';
        }
      }

      function renderPromo(promoStatusEl, promoErrorEl, summary) {
        var cart = summary && summary.cart ? summary.cart : null;
        var appliedPromo = summary && summary.appliedPromoCode ? summary.appliedPromoCode : null;
        if (promoStatusEl) {
          if (cart && cart.promo_code) {
            var codeText = cart.promo_code;
            var label = 'Promo applied: ' + codeText;
            if (appliedPromo && appliedPromo.description) {
              label += ' – ' + appliedPromo.description;
            }
            promoStatusEl.textContent = label;
          } else {
            promoStatusEl.textContent = '';
          }
        }
        if (promoErrorEl) {
          promoErrorEl.textContent = '';
        }
        var promoInput = document.getElementById('promoCodeInput');
        if (promoInput && cart && cart.promo_code) {
          promoInput.value = cart.promo_code;
        }
      }

      function renderSummary(container, summary) {
        container.innerHTML = '';
        var cart = summary && summary.cart ? summary.cart : null;
        var methods = summary && summary.availableShippingMethods ? summary.availableShippingMethods : [];
        if (!cart) {
          var empty = document.createElement('p');
          empty.textContent = 'No items in cart.';
          container.appendChild(empty);
          return;
        }

        var hasItems = summary.items && summary.items.length > 0;
        if (!hasItems) {
          var msg = document.createElement('p');
          msg.textContent = 'No items in cart.';
          container.appendChild(msg);
          return;
        }

        var rows = [
          { key: 'Subtotal', value: cart.subtotal },
          { key: 'Shipping', value: cart.shipping_cost },
          { key: 'Discount', value: cart.discount_total }
        ];

        for (var i = 0; i < rows.length; i++) {
          var row = rows[i];
          if (row.key === 'Discount' && (!row.value || row.value === 0)) {
            continue;
          }
          var rowDiv = document.createElement('div');
          rowDiv.className = 'cart-summary__row';
          var labelSpan = document.createElement('span');
          labelSpan.className = 'cart-summary__label';
          labelSpan.textContent = row.key;
          var valueSpan = document.createElement('span');
          valueSpan.className = 'cart-summary__value';
          valueSpan.textContent = row.key === 'Discount' ? '-' + formatMoney(row.value, cart.currency) : formatMoney(row.value, cart.currency);
          rowDiv.appendChild(labelSpan);
          rowDiv.appendChild(valueSpan);
          container.appendChild(rowDiv);
        }

        var methodName = '';
        if (cart.shipping_method_id && methods && methods.length) {
          for (var j = 0; j < methods.length; j++) {
            if (methods[j].id === cart.shipping_method_id) {
              methodName = methods[j].name || '';
              break;
            }
          }
        }
        if (methodName) {
          var methodRow = document.createElement('div');
          methodRow.className = 'cart-summary__row cart-summary__row--meta';
          var mLabel = document.createElement('span');
          mLabel.className = 'cart-summary__label';
          mLabel.textContent = 'Method';
          var mValue = document.createElement('span');
          mValue.className = 'cart-summary__value';
          mValue.textContent = methodName;
          methodRow.appendChild(mLabel);
          methodRow.appendChild(mValue);
          container.appendChild(methodRow);
        }

        var totalRow = document.createElement('div');
        totalRow.className = 'cart-summary__row cart-summary__row--total';
        var tLabel = document.createElement('span');
        tLabel.className = 'cart-summary__label';
        tLabel.textContent = 'Total';
        var tValue = document.createElement('span');
        tValue.className = 'cart-summary__value';
        tValue.textContent = formatMoney(cart.total, cart.currency);
        totalRow.appendChild(tLabel);
        totalRow.appendChild(tValue);
        container.appendChild(totalRow);
      }

      function renderItemCount(container, summary) {
        if (!container) {
          return;
        }
        var count = summary && summary.items ? summary.items.length : 0;
        container.textContent = count === 1 ? '1 item in cart' : count + ' items in cart';
      }

      function updateCheckoutButton(summary) {
        var btn = document.querySelector('[data-action="proceed-to-checkout"]');
        if (!btn) {
          return;
        }
        var hasItems = summary && summary.items && summary.items.length > 0;
        btn.disabled = !hasItems;
      }

      function updateEmptyVsItems(summary) {
        var itemsContainer = populateElements['cart-items'];
        var emptyContainer = populateElements['empty-cart-state'];
        var hasItems = summary && summary.items && summary.items.length > 0;
        if (itemsContainer) {
          itemsContainer.style.display = hasItems ? '' : 'none';
        }
        if (emptyContainer) {
          renderEmptyState(emptyContainer, hasItems);
        }
      }

      function setGlobalError(message) {
        var globalErrorEl = populateElements['cart-global-error'];
        if (globalErrorEl) {
          globalErrorEl.textContent = message || '';
        }
      }

      function loadCartAndRender() {
        setGlobalError('');
        var summary;
        try {
          summary = WebsiteSDK.getCartSummary();
        } catch (e) {
          setGlobalError('Unable to load cart at the moment.');
          return;
        }
        state.summary = summary;

        var itemsContainer = populateElements['cart-items'];
        if (itemsContainer) {
          renderCartItems(itemsContainer, summary);
        }
        updateEmptyVsItems(summary);

        var shippingMsgEl = populateElements['shipping-message'];
        renderShipping(shippingMsgEl, summary);

        var promoStatusEl = populateElements['promo-status'];
        var promoErrorEl = populateElements['promo-error'];
        renderPromo(promoStatusEl, promoErrorEl, summary);

        var summaryContainer = populateElements['cart-summary'];
        if (summaryContainer) {
          renderSummary(summaryContainer, summary);
        }

        var countEl = populateElements['cart-item-count'];
        renderItemCount(countEl, summary);
        updateCheckoutButton(summary);
      }

      function findCartItemRow(cartItemId) {
        return document.querySelector('.cart-item[data-cart-item-id="' + cartItemId + '"]');
      }

      function setItemError(cartItemId, message) {
        var row = findCartItemRow(cartItemId);
        if (!row) {
          return;
        }
        var err = row.querySelector('.cart-item__error');
        if (err) {
          err.textContent = message || '';
        }
      }

      function handleQuantityUpdate(cartItemId, newQty, inputEl) {
        if (!inputEl) {
          return;
        }
        var prevVal = parseInt(inputEl.value, 10);
        if (!Number.isInteger(newQty) || newQty < 1) {
          inputEl.value = isNaN(prevVal) || prevVal < 1 ? '1' : String(prevVal);
          setItemError(cartItemId, 'Quantity must be at least 1.');
          return;
        }
        setItemError(cartItemId, '');
        var response;
        try {
          response = WebsiteSDK.updateCartItemQuantity(cartItemId, newQty);
        } catch (e) {
          inputEl.value = String(prevVal);
          setItemError(cartItemId, 'Could not update quantity. Please try again.');
          return;
        }
        if (response && response.success) {
          loadCartAndRender();
        } else {
          inputEl.value = String(prevVal);
          setItemError(cartItemId, response && response.message ? response.message : 'Could not update quantity.');
        }
      }

      document.addEventListener('click', function(event) {
        var target = event.target;
        if (!target) {
          return;
        }
        var actionEl = target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.getAttribute('data-action');
        if (!action) {
          return;
        }

        if (action === 'increase-qty' || action === 'decrease-qty') {
          event.preventDefault();
          var cartItemId = actionEl.getAttribute('data-cart-item-id');
          if (!cartItemId) {
            return;
          }
          var row = findCartItemRow(cartItemId);
          if (!row) {
            return;
          }
          var inputEl = row.querySelector('input[data-action="change-qty-input"]');
          if (!inputEl) {
            return;
          }
          var current = parseInt(inputEl.value, 10);
          if (!Number.isInteger(current) || current < 1) {
            current = 1;
          }
          var newQty = action === 'increase-qty' ? current + 1 : current - 1;
          handleQuantityUpdate(cartItemId, newQty, inputEl);
        } else if (action === 'remove-item') {
          event.preventDefault();
          var removeId = actionEl.getAttribute('data-cart-item-id');
          if (!removeId) {
            return;
          }
          var resp;
          try {
            resp = WebsiteSDK.removeCartItem(removeId);
          } catch (e) {
            setItemError(removeId, 'Could not remove item. Please try again.');
            return;
          }
          if (resp && resp.success) {
            loadCartAndRender();
          } else {
            setItemError(removeId, resp && resp.message ? resp.message : 'Could not remove item.');
          }
        } else if (action === 'clear-cart') {
          event.preventDefault();
          var confirmed = window.confirm('Clear all items from your cart?');
          if (!confirmed) {
            return;
          }
          var clearResp;
          try {
            clearResp = WebsiteSDK.clearCart();
          } catch (e) {
            setGlobalError('Could not clear cart. Please try again.');
            return;
          }
          if (clearResp && clearResp.success) {
            loadCartAndRender();
          } else {
            setGlobalError('Could not clear cart.');
          }
        } else if (action === 'proceed-to-checkout') {
          event.preventDefault();
          if (!state.summary || !state.summary.items || state.summary.items.length === 0) {
            return;
          }
          window.location.href = 'checkout.html';
        } else if (action === 'select-cheapest-shipping') {
          event.preventDefault();
          if (!state.summary || !state.summary.availableShippingMethods || !state.summary.availableShippingMethods.length) {
            return;
          }
          var methods = state.summary.availableShippingMethods;
          var cheapest = null;
          for (var i = 0; i < methods.length; i++) {
            var m = methods[i];
            if (!m || m.is_active === false) {
              continue;
            }
            if (!cheapest || (typeof m.price === 'number' && m.price < cheapest.price)) {
              cheapest = m;
            }
          }
          if (!cheapest) {
            return;
          }
          var selectResp;
          try {
            selectResp = WebsiteSDK.selectShippingMethod(cheapest.id);
          } catch (e) {
            var shipMsg = populateElements['shipping-message'];
            if (shipMsg) {
              shipMsg.textContent = 'Could not update shipping. Please try again.';
            }
            return;
          }
          if (selectResp && selectResp.success) {
            loadCartAndRender();
          } else {
            var shipMsg2 = populateElements['shipping-message'];
            if (shipMsg2) {
              shipMsg2.textContent = selectResp && selectResp.message ? selectResp.message : 'Could not update shipping.';
            }
          }
        } else if (action === 'open-product') {
          event.preventDefault();
          var itemId = actionEl.getAttribute('data-cart-item-id');
          if (!itemId) {
            return;
          }
          var rowEl = findCartItemRow(itemId);
          if (!rowEl) {
            return;
          }
          var itemType = rowEl.getAttribute('data-item-type');
          if (!itemType) {
            return;
          }
          if (itemType === 'album_format') {
            var albumFormatId = rowEl.getAttribute('data-album-format-id');
            if (!albumFormatId) {
              return;
            }
            var albumFormats = JSON.parse(localStorage.getItem('album_formats') || '[]');
            var releaseId = null;
            for (var k = 0; k < albumFormats.length; k++) {
              if (albumFormats[k].id === albumFormatId) {
                releaseId = albumFormats[k].release_id;
                break;
              }
            }
            if (releaseId) {
              window.location.href = 'product.html?releaseId=' + encodeURIComponent(releaseId);
            }
          } else if (itemType === 'track') {
            var trackId = rowEl.getAttribute('data-track-id');
            if (!trackId) {
              return;
            }
            window.location.href = 'product.html?trackId=' + encodeURIComponent(trackId);
          } else if (itemType === 'merch_variant') {
            var merchVariantId = rowEl.getAttribute('data-merch-variant-id');
            if (!merchVariantId) {
              return;
            }
            var merchVariants = JSON.parse(localStorage.getItem('merch_variants') || '[]');
            var merchItemId = null;
            for (var mv = 0; mv < merchVariants.length; mv++) {
              if (merchVariants[mv].id === merchVariantId) {
                merchItemId = merchVariants[mv].merch_item_id;
                break;
              }
            }
            if (merchItemId) {
              window.location.href = 'product.html?merchItemId=' + encodeURIComponent(merchItemId);
            }
          }
        }
      });

      document.addEventListener('change', function(event) {
        var target = event.target;
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');
        if (action === 'change-shipping-method') {
          var shippingId = target.value;
          var shipMsg = populateElements['shipping-message'];
          if (!shippingId) {
            if (shipMsg) {
              shipMsg.textContent = '';
            }
            return;
          }
          if (!state.summary || !state.summary.cart) {
            return;
          }
          var previousId = state.summary.cart.shipping_method_id || '';
          var resp;
          try {
            resp = WebsiteSDK.selectShippingMethod(shippingId);
          } catch (e) {
            target.value = previousId || '';
            if (shipMsg) {
              shipMsg.textContent = 'Could not update shipping. Please try again.';
            }
            return;
          }
          if (resp && resp.success) {
            loadCartAndRender();
          } else {
            target.value = previousId || '';
            if (shipMsg) {
              shipMsg.textContent = resp && resp.message ? resp.message : 'Could not update shipping.';
            }
          }
        }
      });

      document.addEventListener('blur', function(event) {
        var target = event.target;
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');
        if (action === 'change-qty-input') {
          var cartItemId = target.getAttribute('data-cart-item-id');
          if (!cartItemId) {
            return;
          }
          var val = parseInt(target.value, 10);
          if (!Number.isInteger(val) || val < 1) {
            val = 1;
          }
          handleQuantityUpdate(cartItemId, val, target);
        }
      }, true);

      var promoFormEl = document.querySelector('[data-component="promo-code-form"]');
      if (promoFormEl) {
        promoFormEl.addEventListener('submit', function(event) {
          event.preventDefault();
          var promoInput = document.getElementById('promoCodeInput');
          var promoErrorEl = populateElements['promo-error'];
          if (promoErrorEl) {
            promoErrorEl.textContent = '';
          }
          var code = promoInput ? promoInput.value.trim() : '';
          if (!code) {
            if (promoErrorEl) {
              promoErrorEl.textContent = 'Enter a promo code.';
            }
            return;
          }
          var resp;
          try {
            resp = WebsiteSDK.applyPromoCode(code);
          } catch (e) {
            if (promoErrorEl) {
              promoErrorEl.textContent = 'Could not apply promo code. Please try again.';
            }
            return;
          }
          if (resp && resp.success) {
            loadCartAndRender();
          } else {
            if (promoErrorEl) {
              promoErrorEl.textContent = resp && resp.message ? resp.message : 'Promo code could not be applied.';
            }
          }
        });
      }

      loadCartAndRender();
    });
  </script>
</body>
</html>
