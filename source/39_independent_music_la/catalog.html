<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalog · Independent Music Label &amp; Store</title>
  <meta name="description" content="Catalog page for browsing all label releases and products with filtering, sorting, pagination, and inline actions." />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="catalog.css" />
</head>
<body>
  <div class="page">
    <header class="site-header" role="banner">
      <div class="site-header__inner">
        <div class="site-header__brand">
          <a href="index.html" class="site-header__logo" aria-label="Independent music label home">
            INDEPENDENT LABEL
          </a>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
          <ul class="site-nav__list">
            <li class="site-nav__item"><a href="index.html" class="site-nav__link">Home</a></li>
            <li class="site-nav__item"><a href="catalog.html?section=shop" class="site-nav__link">Shop</a></li>
            <li class="site-nav__item"><a href="catalog.html?section=albums" class="site-nav__link">Albums</a></li>
            <li class="site-nav__item"><a href="tracks.html" class="site-nav__link">Tracks</a></li>
            <li class="site-nav__item"><a href="catalog.html?section=preorders" class="site-nav__link">Pre-orders</a></li>
            <li class="site-nav__item"><a href="artists.html" class="site-nav__link">Artists</a></li>
            <li class="site-nav__item"><a href="account.html" class="site-nav__link">Account</a></li>
            <li class="site-nav__item"><a href="cart.html" class="site-nav__link">Cart</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <div class="catalog-page" data-component="catalog-page-controller">
        <div class="catalog-page__spacer" aria-hidden="true"></div>

        <div class="catalog-page__cluster">
          <aside class="catalog-filters" data-component="filter-sidebar">
            <div class="catalog-filters__inner" data-populate="filters">
              <!-- Filters rendered via JavaScript -->
            </div>
          </aside>

          <section class="catalog-main">
            <div class="catalog-sort-bar" data-component="sort-bar">
              <div class="catalog-sort-bar__inner" data-populate="sort">
                <!-- Sort control rendered via JavaScript -->
              </div>
            </div>

            <section class="catalog-grid" data-component="catalog-grid" aria-label="Catalog releases">
              <div class="catalog-grid__inner" data-populate="catalog-items">
                <!-- Catalog items rendered via JavaScript -->
              </div>
            </section>
          </section>
        </div>

        <section class="catalog-bottom-bar" data-component="bottom-bar" aria-label="Catalog controls">
          <div class="catalog-bottom-bar__inner">
            <div class="catalog-bottom-bar__meta">
              <p class="catalog-results-summary" data-component="results-summary" data-populate="results-summary">
                <!-- Results summary rendered via JavaScript -->
              </p>
              <a href="javascript:void(0)" class="catalog-preorders-link" data-component="preorders-promo-link" data-action="view-cassette-preorders">
                View all cassette pre-orders
              </a>
            </div>

            <nav class="catalog-section-switcher" data-component="section-switcher" aria-label="Catalog sections">
              <button type="button" class="catalog-section-switcher__tab" data-action="switch-section" data-section="shop">
                Shop
              </button>
              <button type="button" class="catalog-section-switcher__tab" data-action="switch-section" data-section="albums">
                Albums
              </button>
              <button type="button" class="catalog-section-switcher__tab" data-action="switch-section" data-section="preorders">
                Pre-orders
              </button>
            </nav>

            <nav class="catalog-pagination" data-component="pagination-controls" aria-label="Pagination">
              <div class="catalog-pagination__inner" data-populate="pagination">
                <!-- Pagination rendered via JavaScript -->
              </div>
            </nav>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="site-footer__inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="about.html" class="footer-nav__link">About</a>
          <a href="contact.html" class="footer-nav__link">Contact / Demo Submission</a>
          <a href="catalog.html?section=shop" class="footer-nav__link">Shop</a>
          <a href="artists.html" class="footer-nav__link">Artists</a>
        </nav>
        <p class="site-footer__meta">&copy; 2024 Independent Music Label &amp; Store.</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const state = {
        section: 'shop',
        sort: 'popularity',
        urlParams: new URLSearchParams(window.location.search),
        filterOptions: null,
        catalog: {
          items: [],
          totalCount: 0,
          page: 1,
          pageSize: 12
        }
      };

      function ensureDefaultsInUrl() {
        const params = new URLSearchParams(window.location.search);
        let changed = false;
        if (!params.get('section')) {
          params.set('section', 'shop');
          changed = true;
        }
        if (!params.get('sort')) {
          params.set('sort', 'popularity');
          changed = true;
        }
        if (!params.get('page')) {
          params.set('page', '1');
          changed = true;
        }
        if (!params.get('pageSize')) {
          params.set('pageSize', '12');
          changed = true;
        }
        if (changed) {
          const newUrl = window.location.pathname + '?' + params.toString();
          window.history.replaceState(null, '', newUrl);
        }
      }

      function mapSortForSdk(sortParam) {
        switch (sortParam) {
          case 'price_low_to_high':
            return 'price_low_to_high';
          case 'price_high_to_low':
            return 'price_high_to_low';
          case 'rating_high_to_low':
            return 'rating_high_to_low';
          case 'popularity':
          default:
            return 'popularity_high_to_low';
        }
      }

      function buildFiltersFromParams(params, section) {
        const filters = {};
        const format = params.get('format');
        if (format) {
          filters.format = format;
        }
        const edition = params.get('edition');
        if (edition) {
          filters.edition = edition;
        }
        const genreId = params.get('genreId');
        if (genreId) {
          filters.genreIds = [genreId];
        }
        const priceMinValue = params.get('priceMin');
        if (priceMinValue !== null && priceMinValue !== '') {
          const minPrice = parseFloat(priceMinValue);
          if (!Number.isNaN(minPrice)) {
            filters.minPrice = minPrice;
          }
        }
        const priceMaxValue = params.get('priceMax');
        if (priceMaxValue !== null && priceMaxValue !== '') {
          const maxPrice = parseFloat(priceMaxValue);
          if (!Number.isNaN(maxPrice)) {
            filters.maxPrice = maxPrice;
          }
        }
        const releaseYearValue = params.get('releaseYear');
        if (releaseYearValue) {
          const year = parseInt(releaseYearValue, 10);
          if (!Number.isNaN(year)) {
            filters.releaseYearFrom = year;
            filters.releaseYearTo = year;
          }
        }
        const releaseDateRange = params.get('releaseDateRange');
        if (releaseDateRange) {
          filters.releaseDateRange = releaseDateRange;
        }
        const ratingMinValue = params.get('ratingMin');
        if (ratingMinValue !== null && ratingMinValue !== '') {
          const minRating = parseFloat(ratingMinValue);
          if (!Number.isNaN(minRating)) {
            filters.minRating = minRating;
          }
        }
        if (section === 'preorders') {
          filters.onlyPreorders = true;
        }
        return filters;
      }

      function updateUrlFromParams(params) {
        const query = params.toString();
        const newUrl = window.location.pathname + (query ? '?' + query : '');
        window.history.pushState(null, '', newUrl);
        applyStateFromUrl();
      }

      function renderFilters(container, filterOptions, params) {
        const currentFormat = params.get('format') || '';
        const currentEdition = params.get('edition') || '';
        const currentGenreId = params.get('genreId') || '';
        const currentPriceMin = params.get('priceMin') || '';
        const currentPriceMax = params.get('priceMax') || '';
        const currentReleaseYear = params.get('releaseYear') || '';
        const currentReleaseDateRange = params.get('releaseDateRange') || '';
        const currentRatingMin = params.get('ratingMin') || '';

        const formats = (filterOptions && filterOptions.formats) || [];
        const editions = (filterOptions && filterOptions.editions) || [];
        const genres = (filterOptions && filterOptions.genres) || [];
        const priceRange = (filterOptions && filterOptions.priceRange) || null;
        const releaseDateRanges = (filterOptions && filterOptions.releaseDateRanges) || [];
        const releaseYears = (filterOptions && filterOptions.releaseYears) || [];
        const ratingThresholds = (filterOptions && filterOptions.ratingThresholds) || [];

        const formatOptionsHtml = formats.map(opt => {
          const value = opt.value || '';
          const label = opt.label || value;
          const selected = value === currentFormat ? ' selected' : '';
          return `<option value="${value}"${selected}>${label}</option>`;
        }).join('');

        const editionOptionsHtml = editions.map(opt => {
          const value = opt.value || '';
          const label = opt.label || value;
          const selected = value === currentEdition ? ' selected' : '';
          return `<option value="${value}"${selected}>${label}</option>`;
        }).join('');

        const genreOptionsHtml = genres.map(genre => {
          const value = genre.id || '';
          const label = genre.name || value;
          const selected = value === currentGenreId ? ' selected' : '';
          return `<option value="${value}"${selected}>${label}</option>`;
        }).join('');

        const releaseYearOptionsHtml = releaseYears.map(opt => {
          const value = String(opt.value || '');
          const label = opt.label || value;
          const selected = value === currentReleaseYear ? ' selected' : '';
          return `<option value="${value}"${selected}>${label}</option>`;
        }).join('');

        const releaseDateRangeOptionsHtml = releaseDateRanges.map(opt => {
          const value = opt.value || '';
          const label = opt.label || value;
          const selected = value === currentReleaseDateRange ? ' selected' : '';
          return `<option value="${value}"${selected}>${label}</option>`;
        }).join('');

        const ratingOptionsHtml = ratingThresholds.map(th => {
          const value = String(th.minRating);
          const label = th.label || value;
          const checked = value === currentRatingMin ? ' checked' : '';
          return `<label class="filters-radio"><input type="radio" name="ratingMin" value="${value}" data-action="filter-change" data-filter-key="ratingMin"${checked}> <span>${label}</span></label>`;
        }).join('');

        const minAttr = priceRange && typeof priceRange.min === 'number' ? ` min="${priceRange.min}"` : '';
        const maxAttr = priceRange && typeof priceRange.max === 'number' ? ` max="${priceRange.max}"` : '';

        container.innerHTML = `
          <form class="filters-form" aria-label="Catalog filters">
            <div class="filters-group">
              <h2 class="filters-group__title">Format</h2>
              <select class="filters-select" name="format" data-action="filter-change" data-filter-key="format">
                <option value="">Any</option>
                ${formatOptionsHtml}
              </select>
            </div>

            <div class="filters-group">
              <h2 class="filters-group__title">Edition</h2>
              <select class="filters-select" name="edition" data-action="filter-change" data-filter-key="edition">
                <option value="">Any</option>
                ${editionOptionsHtml}
              </select>
            </div>

            <div class="filters-group">
              <h2 class="filters-group__title">Genre</h2>
              <select class="filters-select" name="genreId" data-action="filter-change" data-filter-key="genreId">
                <option value="">Any</option>
                ${genreOptionsHtml}
              </select>
            </div>

            <div class="filters-group">
              <h2 class="filters-group__title">Price</h2>
              <div class="filters-price-range">
                <label class="filters-field">
                  <span class="filters-field__label">Min</span>
                  <input type="number" inputmode="decimal" class="filters-input" name="priceMin" data-action="filter-change" data-filter-key="priceMin" value="${currentPriceMin}"${minAttr}${maxAttr}>
                </label>
                <label class="filters-field">
                  <span class="filters-field__label">Max</span>
                  <input type="number" inputmode="decimal" class="filters-input" name="priceMax" data-action="filter-change" data-filter-key="priceMax" value="${currentPriceMax}"${minAttr}${maxAttr}>
                </label>
              </div>
            </div>

            <div class="filters-group">
              <h2 class="filters-group__title">Release year</h2>
              <select class="filters-select" name="releaseYear" data-action="filter-change" data-filter-key="releaseYear">
                <option value="">Any</option>
                ${releaseYearOptionsHtml}
              </select>
            </div>

            <div class="filters-group">
              <h2 class="filters-group__title">Release date</h2>
              <select class="filters-select" name="releaseDateRange" data-action="filter-change" data-filter-key="releaseDateRange">
                <option value="">Any</option>
                ${releaseDateRangeOptionsHtml}
              </select>
            </div>

            <div class="filters-group">
              <h2 class="filters-group__title">Rating</h2>
              <div class="filters-radio-group">
                <label class="filters-radio">
                  <input type="radio" name="ratingMin" value="" data-action="filter-change" data-filter-key="ratingMin"${currentRatingMin === '' ? ' checked' : ''}> <span>Any rating</span>
                </label>
                ${ratingOptionsHtml}
              </div>
            </div>

            <div class="filters-footer">
              <button type="button" class="filters-reset" data-action="reset-filters">Reset filters</button>
            </div>
          </form>
        `;
      }

      function renderSort(container, params) {
        const currentSort = params.get('sort') || 'popularity';
        container.innerHTML = `
          <div class="sort-control">
            <label class="sort-control__label">
              <span>Sort by</span>
              <select class="sort-control__select" data-action="sort-change">
                <option value="popularity"${currentSort === 'popularity' ? ' selected' : ''}>Popularity</option>
                <option value="price_low_to_high"${currentSort === 'price_low_to_high' ? ' selected' : ''}>Price: Low to High</option>
                <option value="price_high_to_low"${currentSort === 'price_high_to_low' ? ' selected' : ''}>Price: High to Low</option>
                <option value="rating_high_to_low"${currentSort === 'rating_high_to_low' ? ' selected' : ''}>Rating: High to Low</option>
              </select>
            </label>
          </div>
        `;
      }

      function renderCatalogItems(container, catalog, section) {
        const items = catalog.items || [];
        if (!items.length) {
          container.innerHTML = `
            <div class="catalog-empty">
              <p>No items match your current filters.</p>
              <button type="button" class="catalog-empty__reset" data-action="reset-filters">Reset filters</button>
            </div>
          `;
          return;
        }

        const cardsHtml = items.map(item => {
          const releaseId = item.releaseId || '';
          const merchItemId = item.merchItemId || '';
          const idAttr = merchItemId ? `data-merch-item-id="${merchItemId}"` : `data-release-id="${releaseId}"`;
          const artistName = item.artistName || '';
          const title = item.title || '';
          const coverImageUrl = item.coverImageUrl || '';
          const isPreorder = !!item.isPreorder;
          const ratingAverage = typeof item.ratingAverage === 'number' ? item.ratingAverage.toFixed(1) : '';
          const ratingCount = typeof item.ratingCount === 'number' ? item.ratingCount : '';
          const hasRating = ratingAverage !== '' && ratingCount !== '';
          const currency = item.currency || '';
          const minPrice = typeof item.minPrice === 'number' ? item.minPrice : null;
          const maxPrice = typeof item.maxPrice === 'number' ? item.maxPrice : null;
          let priceLabel = '';
          if (minPrice !== null && maxPrice !== null && minPrice !== maxPrice) {
            priceLabel = `${currency} ${minPrice.toFixed(2)}–${maxPrice.toFixed(2)}`;
          } else if (minPrice !== null) {
            priceLabel = `${currency} ${minPrice.toFixed(2)}`;
          }

          const availableFormats = item.availableFormats || [];
          const formatsHtml = availableFormats.map(fmt => {
            const formatCode = fmt.format || '';
            const edition = fmt.edition || '';
            const fromPrice = typeof fmt.fromPrice === 'number' ? fmt.fromPrice.toFixed(2) : '';
            const albumFormatId = fmt.albumFormatId || '';
            let label = formatCode;
            if (edition) {
              label = `${formatCode}, ${edition}`;
            }
            const pricePart = fromPrice ? ` · ${currency} ${fromPrice}` : '';
            return `<button type="button" class="product-card__format-add" data-action="add-to-cart" data-album-format-id="${albumFormatId}">${label}${pricePart}</button>`;
          }).join('');

          const badgeHtml = isPreorder ? '<span class="product-card__badge">Pre-order</span>' : '';
          const ratingHtml = hasRating ? `<span class="product-card__rating">★ ${ratingAverage} <span class="product-card__rating-count">(${ratingCount})</span></span>` : '';

          return `
            <article class="product-card" data-component="product-card">
              <button type="button" class="product-card__wishlist" aria-label="Add to wishlist" data-action="wishlist-toggle" ${idAttr}>♡</button>
              <div class="product-card__main" role="button" tabindex="0" data-action="open-product" ${idAttr}>
                <figure class="product-card__image">
                  ${badgeHtml}
                  <img src="${coverImageUrl}" alt="${title ? title.replace(/"/g, '&quot;') : 'Release cover'}" loading="lazy">
                </figure>
                <div class="product-card__meta">
                  <p class="product-card__artist">${artistName}</p>
                  <h3 class="product-card__title">${title}</h3>
                  <div class="product-card__meta-row">
                    ${priceLabel ? `<span class="product-card__price">${priceLabel}</span>` : ''}
                    ${ratingHtml}
                  </div>
                </div>
              </div>
              <div class="product-card__formats">
                ${formatsHtml}
              </div>
              <div class="product-card__feedback" data-role="feedback"></div>
            </article>
          `;
        }).join('');

        container.innerHTML = cardsHtml;
      }

      function renderResultsSummary(container, catalog) {
        const total = catalog.totalCount || 0;
        const page = catalog.page || 1;
        const pageSize = catalog.pageSize || 12;
        let start = 0;
        let end = 0;
        if (total > 0) {
          start = (page - 1) * pageSize + 1;
          end = Math.min(total, page * pageSize);
        }
        const rangeText = total > 0 ? `${start}–${end}` : '0';
        container.textContent = `Showing ${rangeText} of ${total} items`;
      }

      function renderPagination(container, catalog, params) {
        const total = catalog.totalCount || 0;
        const currentPage = catalog.page || parseInt(params.get('page') || '1', 10) || 1;
        const pageSize = catalog.pageSize || parseInt(params.get('pageSize') || '12', 10) || 12;

        if (!total) {
          container.innerHTML = '';
          return;
        }

        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        let pagesToRender = [];
        if (totalPages <= 7) {
          for (let i = 1; i <= totalPages; i += 1) {
            pagesToRender.push(i);
          }
        } else {
          const start = Math.max(1, currentPage - 2);
          const end = Math.min(totalPages, currentPage + 2);
          if (start > 1) {
            pagesToRender.push(1);
            if (start > 2) {
              pagesToRender.push('…');
            }
          }
          for (let i = start; i <= end; i += 1) {
            pagesToRender.push(i);
          }
          if (end < totalPages) {
            if (end < totalPages - 1) {
              pagesToRender.push('…');
            }
            pagesToRender.push(totalPages);
          }
        }

        const prevDisabled = currentPage <= 1 ? ' disabled' : '';
        const nextDisabled = currentPage >= totalPages ? ' disabled' : '';

        const pagesHtml = pagesToRender.map(p => {
          if (p === '…') {
            return '<span class="catalog-pagination__ellipsis">…</span>';
          }
          const active = p === currentPage ? ' is-active' : '';
          return `<button type="button" class="catalog-pagination__page${active}" data-action="page-goto" data-page="${p}">${p}</button>`;
        }).join('');

        container.innerHTML = `
          <div class="catalog-pagination__controls">
            <button type="button" class="catalog-pagination__prev" data-action="page-prev" data-page="${currentPage - 1}"${prevDisabled}>Prev</button>
            ${pagesHtml}
            <button type="button" class="catalog-pagination__next" data-action="page-next" data-page="${currentPage + 1}"${nextDisabled}>Next</button>
          </div>
          <div class="catalog-pagination__size">
            <label>
              <span>Per page</span>
              <select data-action="page-size-change">
                <option value="12"${pageSize === 12 ? ' selected' : ''}>12</option>
                <option value="24"${pageSize === 24 ? ' selected' : ''}>24</option>
                <option value="48"${pageSize === 48 ? ' selected' : ''}>48</option>
              </select>
            </label>
          </div>
        `;
      }

      function renderAll() {
        const populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(el => {
          const type = el.dataset.populate;
          if (type === 'filters') {
            if (state.filterOptions) {
              renderFilters(el, state.filterOptions, state.urlParams);
            } else {
              el.innerHTML = '';
            }
          } else if (type === 'sort') {
            renderSort(el, state.urlParams);
          } else if (type === 'catalog-items') {
            renderCatalogItems(el, state.catalog, state.section);
          } else if (type === 'results-summary') {
            renderResultsSummary(el, state.catalog);
          } else if (type === 'pagination') {
            renderPagination(el, state.catalog, state.urlParams);
          }
        });
      }

      function updateSectionSwitcherActive() {
        const tabs = document.querySelectorAll('[data-component="section-switcher"] [data-section]');
        tabs.forEach(tab => {
          if (tab.dataset.section === state.section) {
            tab.classList.add('is-active');
            tab.setAttribute('aria-current', 'page');
          } else {
            tab.classList.remove('is-active');
            tab.removeAttribute('aria-current');
          }
        });
      }

      function updatePreordersLinkVisibility() {
        const link = document.querySelector('[data-component="preorders-promo-link"]');
        if (!link) return;
        if (state.section === 'preorders') {
          link.style.display = 'none';
        } else {
          link.style.display = '';
        }
      }

      function applyStateFromUrl() {
        const params = new URLSearchParams(window.location.search);
        state.urlParams = params;
        const section = params.get('section') || 'shop';
        state.section = section;
        const sortParam = params.get('sort') || 'popularity';
        state.sort = sortParam;
        let page = parseInt(params.get('page') || '1', 10);
        let pageSize = parseInt(params.get('pageSize') || '12', 10);
        if (Number.isNaN(page) || page < 1) page = 1;
        if (Number.isNaN(pageSize) || pageSize < 1) pageSize = 12;

        try {
          const filterOptions = WebsiteSDK.getCatalogFilterOptions(section);
          state.filterOptions = filterOptions || null;
        } catch (e) {
          console.error('Failed to load filter options', e);
          state.filterOptions = null;
        }

        const filters = buildFiltersFromParams(params, section);
        let listing = {
          items: [],
          totalCount: 0,
          page,
          pageSize
        };

        try {
          const sdkSort = mapSortForSdk(sortParam);
          listing = WebsiteSDK.listCatalogItems(section, filters, sdkSort, page, pageSize) || listing;
        } catch (e) {
          console.error('Failed to load catalog items', e);
        }

        const total = listing.totalCount || 0;
        const effectivePageSize = listing.pageSize || pageSize;
        const totalPages = effectivePageSize > 0 ? Math.ceil(total / effectivePageSize) : 1;
        if (totalPages > 0 && page > totalPages) {
          const newParams = new URLSearchParams(params.toString());
          newParams.set('page', String(totalPages));
          updateUrlFromParams(newParams);
          return;
        }

        state.catalog.items = listing.items || [];
        state.catalog.totalCount = total;
        state.catalog.page = listing.page || page;
        state.catalog.pageSize = effectivePageSize;

        renderAll();
        updateSectionSwitcherActive();
        updatePreordersLinkVisibility();
      }

      function handleFilterChange(el) {
        const key = el.dataset.filterKey;
        if (!key) return;
        const params = new URLSearchParams(window.location.search);
        let value = el.value != null ? String(el.value).trim() : '';

        if (key === 'priceMin' || key === 'priceMax') {
          if (value !== '') {
            let num = parseFloat(value);
            if (Number.isNaN(num)) {
              return;
            }
            if (state.filterOptions && state.filterOptions.priceRange) {
              const pr = state.filterOptions.priceRange;
              if (typeof pr.min === 'number' && num < pr.min) num = pr.min;
              if (typeof pr.max === 'number' && num > pr.max) num = pr.max;
            }
            value = String(num);
          }
        }

        if (key === 'ratingMin') {
          if (value === '') {
            params.delete('ratingMin');
          } else {
            params.set('ratingMin', value);
          }
        } else {
          if (value) {
            params.set(key, value);
          } else {
            params.delete(key);
          }
        }

        params.set('page', '1');
        updateUrlFromParams(params);
      }

      function handleSortChange(el) {
        const value = el.value || 'popularity';
        const params = new URLSearchParams(window.location.search);
        params.set('sort', value);
        params.set('page', '1');
        updateUrlFromParams(params);
      }

      function handleResetFilters() {
        const params = new URLSearchParams(window.location.search);
        const filterKeys = ['format', 'edition', 'genreId', 'priceMin', 'priceMax', 'releaseYear', 'releaseDateRange', 'ratingMin'];
        filterKeys.forEach(key => params.delete(key));
        params.set('page', '1');
        updateUrlFromParams(params);
      }

      function handleSectionSwitch(el) {
        const newSection = el.dataset.section;
        if (!newSection) return;
        const params = new URLSearchParams(window.location.search);
        const currentSection = params.get('section') || 'shop';
        if (currentSection === newSection) return;
        params.set('section', newSection);
        if (newSection !== 'preorders') {
          params.delete('releaseDateRange');
        }
        params.set('page', '1');
        updateUrlFromParams(params);
      }

      function handleCassettePreordersClick() {
        const currentParams = new URLSearchParams(window.location.search);
        const params = new URLSearchParams();
        params.set('section', 'preorders');
        params.set('format', 'cassette');
        params.set('releaseDateRange', 'next_3_months');
        params.set('page', '1');
        const pageSize = currentParams.get('pageSize');
        if (pageSize) {
          params.set('pageSize', pageSize);
        }
        const sort = currentParams.get('sort');
        if (sort) {
          params.set('sort', sort);
        }
        updateUrlFromParams(params);
      }

      function handlePageChange(newPage) {
        const pageNum = parseInt(String(newPage), 10);
        if (Number.isNaN(pageNum) || pageNum < 1) return;
        const params = new URLSearchParams(window.location.search);
        params.set('page', String(pageNum));
        updateUrlFromParams(params);
      }

      function handlePageSizeChange(el) {
        const value = parseInt(el.value, 10);
        if (Number.isNaN(value) || value < 1) return;
        const params = new URLSearchParams(window.location.search);
        params.set('pageSize', String(value));
        params.set('page', '1');
        updateUrlFromParams(params);
      }

      function showFeedbackForElement(triggerEl, message, isError) {
        const card = triggerEl.closest('.product-card');
        if (!card) return;
        const feedbackEl = card.querySelector('[data-role="feedback"]');
        if (!feedbackEl) return;
        feedbackEl.textContent = message || '';
        if (isError) {
          feedbackEl.classList.add('product-card__feedback--error');
          feedbackEl.classList.remove('product-card__feedback--success');
        } else {
          feedbackEl.classList.add('product-card__feedback--success');
          feedbackEl.classList.remove('product-card__feedback--error');
        }
      }

      function handleAddToCart(el) {
        const albumFormatId = el.dataset.albumFormatId;
        if (!albumFormatId) return;
        try {
          const result = WebsiteSDK.addAlbumFormatToCart(albumFormatId, 1);
          if (result && result.success) {
            showFeedbackForElement(el, result.message || 'Added to cart.', false);
          } else {
            showFeedbackForElement(el, (result && result.message) || 'Could not add to cart.', true);
          }
        } catch (e) {
          console.error('addAlbumFormatToCart failed', e);
          showFeedbackForElement(el, 'Could not add to cart.', true);
        }
      }

      function handleWishlistToggle(el) {
        const merchItemId = el.dataset.merchItemId || '';
        const releaseId = el.dataset.releaseId || '';
        if (!merchItemId && !releaseId) return;
        try {
          let result = null;
          if (merchItemId) {
            result = WebsiteSDK.addMerchItemToWishlist(merchItemId);
          } else if (releaseId) {
            result = WebsiteSDK.addReleaseToWishlist(releaseId);
          }
          if (result && result.success) {
            el.classList.add('is-selected');
            showFeedbackForElement(el, result.message || 'Added to wishlist.', false);
          } else {
            showFeedbackForElement(el, (result && result.message) || 'Could not add to wishlist.', true);
          }
        } catch (e) {
          console.error('Wishlist add failed', e);
          showFeedbackForElement(el, 'Could not add to wishlist.', true);
        }
      }

      function handleOpenProduct(el) {
        const merchItemId = el.dataset.merchItemId || '';
        const releaseId = el.dataset.releaseId || '';
        let url = '';
        if (merchItemId) {
          url = 'product.html?merchItemId=' + encodeURIComponent(merchItemId);
        } else if (releaseId) {
          url = 'product.html?releaseId=' + encodeURIComponent(releaseId);
        } else {
          return;
        }
        window.location.href = url;
      }

      const root = document.querySelector('.catalog-page');
      if (root) {
        root.addEventListener('click', event => {
          const actionEl = event.target.closest('[data-action]');
          if (!actionEl) return;
          const action = actionEl.dataset.action;
          if (action === 'filter-change') {
            // ignore click; handled on change
            return;
          }
          if (action === 'switch-section') {
            event.preventDefault();
            handleSectionSwitch(actionEl);
          } else if (action === 'reset-filters') {
            event.preventDefault();
            handleResetFilters();
          } else if (action === 'view-cassette-preorders') {
            event.preventDefault();
            handleCassettePreordersClick();
          } else if (action === 'add-to-cart') {
            event.preventDefault();
            event.stopPropagation();
            handleAddToCart(actionEl);
          } else if (action === 'wishlist-toggle') {
            event.preventDefault();
            event.stopPropagation();
            handleWishlistToggle(actionEl);
          } else if (action === 'page-prev' || action === 'page-next' || action === 'page-goto') {
            event.preventDefault();
            const pageStr = actionEl.dataset.page;
            handlePageChange(pageStr);
          } else if (action === 'open-product') {
            event.preventDefault();
            handleOpenProduct(actionEl);
          }
        });

        root.addEventListener('change', event => {
          const actionEl = event.target.closest('[data-action]');
          if (!actionEl) return;
          const action = actionEl.dataset.action;
          if (action === 'filter-change') {
            handleFilterChange(actionEl);
          } else if (action === 'sort-change') {
            handleSortChange(actionEl);
          } else if (action === 'page-size-change') {
            handlePageSizeChange(actionEl);
          }
        });

        root.addEventListener('keydown', event => {
          const actionEl = event.target.closest('[data-action="open-product"]');
          if (!actionEl) return;
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            handleOpenProduct(actionEl);
          }
        });
      }

      window.addEventListener('popstate', () => {
        applyStateFromUrl();
      });

      ensureDefaultsInUrl();
      applyStateFromUrl();
    });
  </script>
</body>
</html>
