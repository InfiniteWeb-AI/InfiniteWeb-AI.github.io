<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Independent Music Label &amp; Store</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="tracks.css" />
</head>
<body>
  <div class="page">
    <header class="site-header" role="banner">
      <div class="site-header__inner">
        <div class="site-header__brand">
          <a href="index.html" class="site-header__logo" aria-label="Independent music label home">
            INDEPENDENT LABEL
          </a>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
          <ul class="site-nav__list">
            <li class="site-nav__item"><a href="index.html" class="site-nav__link">Home</a></li>
            <li class="site-nav__item"><a href="catalog.html?section=shop" class="site-nav__link">Shop</a></li>
            <li class="site-nav__item"><a href="catalog.html?section=albums" class="site-nav__link">Albums</a></li>
            <li class="site-nav__item"><a href="tracks.html" class="site-nav__link">Tracks</a></li>
            <li class="site-nav__item"><a href="catalog.html?section=preorders" class="site-nav__link">Pre-orders</a></li>
            <li class="site-nav__item"><a href="artists.html" class="site-nav__link">Artists</a></li>
            <li class="site-nav__item"><a href="account.html" class="site-nav__link">Account</a></li>
            <li class="site-nav__item"><a href="cart.html" class="site-nav__link">Cart</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <section class="tracks-layout" aria-label="Tracks listing">
        <div class="tracks-layout__bottom-cluster">
          <aside class="tracks-filters-panel" data-component="track-filters-panel">
            <form class="tracks-filters-panel__form" data-populate="track-filters" aria-label="Filter tracks">
              <!-- Filter controls populated via JavaScript -->
            </form>
          </aside>

          <section class="tracks-main-block" aria-label="Track results">
            <header class="tracks-main-block__header">
              <h1 class="tracks-main-block__title">Tracks</h1>
            </header>
            <div class="tracks-main-block__body">
              <div class="tracks-list-shell">
                <div class="tracks-list__status" data-role="tracks-status" aria-live="polite"></div>
                <ul class="tracks-list" data-component="tracks-list" data-populate="tracks-list">
                  <!-- Track rows rendered via JavaScript -->
                </ul>
              </div>
            </div>
          </section>
        </div>

        <section class="track-preview-bar" data-component="track-preview-controller" aria-label="Track preview player">
          <div class="track-preview-bar__inner">
            <button type="button" class="track-preview-bar__play-toggle" data-action="preview-toggle-current" aria-label="Play or pause current preview" disabled>Play</button>
            <div class="track-preview-bar__meta">
              <span class="track-preview-bar__title" data-role="preview-title">No track selected</span>
              <span class="track-preview-bar__artist" data-role="preview-artist"></span>
            </div>
            <div class="track-preview-bar__progress">
              <div class="track-preview-bar__progress-track">
                <div class="track-preview-bar__progress-fill" data-role="preview-progress"></div>
              </div>
            </div>
            <span class="track-preview-bar__time" data-role="preview-time">0:00</span>
            <audio data-role="preview-audio" preload="none"></audio>
          </div>
        </section>

        <section class="tracks-bottom-bar" aria-label="Track filters and pagination controls">
          <div class="tracks-bottom-bar__inner">
            <div class="tracks-bottom-bar__left" data-component="active-filters-bar" data-populate="active-filters">
              <!-- Active filters chips rendered via JavaScript -->
            </div>
            <div class="tracks-bottom-bar__right">
              <div class="tracks-bottom-bar__sorting" data-component="sort-and-page-size-bar">
                <label class="tracks-bottom-bar__label" for="tracksSortSelect">Sort</label>
                <select id="tracksSortSelect" class="tracks-bottom-bar__select" data-action="change-sort">
                  <option value="popularity_high_to_low">Popularity: high to low</option>
                  <option value="price_low_to_high">Price: low to high</option>
                  <option value="price_high_to_low">Price: high to low</option>
                  <option value="rating_high_to_low">Rating: high to low</option>
                </select>
                <label class="tracks-bottom-bar__label" for="tracksPageSizeSelect">Per page</label>
                <select id="tracksPageSizeSelect" class="tracks-bottom-bar__select" data-action="change-page-size">
                  <option value="10">10</option>
                  <option value="20" selected>20</option>
                  <option value="50">50</option>
                </select>
              </div>
              <nav class="tracks-bottom-bar__pagination" aria-label="Track pagination" data-component="pagination-controls">
                <div data-populate="pagination-controls">
                  <!-- Pagination controls rendered via JavaScript -->
                </div>
              </nav>
            </div>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="site-footer__inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="about.html" class="footer-nav__link">About</a>
          <a href="contact.html" class="footer-nav__link">Contact / Demo Submission</a>
          <a href="catalog.html?section=shop" class="footer-nav__link">Shop</a>
          <a href="artists.html" class="footer-nav__link">Artists</a>
        </nav>
        <p class="site-footer__meta">&copy; 2024 Independent Music Label &amp; Store.</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const defaultSort = 'popularity_high_to_low';
    const defaultPageSize = 20;

    let filterOptions = null;
    let currentState = null;
    let currentTracksResult = null;
    let trackMetaById = {};
    const wishlistState = {};
    let currentPreviewTrackId = null;

    const tracksListContainer = document.querySelector('[data-populate="tracks-list"]');
    const filtersContainer = document.querySelector('[data-populate="track-filters"]');
    const activeFiltersContainer = document.querySelector('[data-populate="active-filters"]');
    const paginationContainer = document.querySelector('[data-populate="pagination-controls"]');
    const previewControllerElement = document.querySelector('[data-component="track-preview-controller"]');
    const statusElement = document.querySelector('[data-role="tracks-status"]');

    let genreSelect = null;
    let bpmMinInput = null;
    let bpmMaxInput = null;
    let priceMaxInput = null;

    let previewAudio = null;
    let previewTitleEl = null;
    let previewArtistEl = null;
    let previewProgressEl = null;
    let previewTimeEl = null;
    let previewToggleButton = null;

    if (!tracksListContainer || !filtersContainer || !activeFiltersContainer || !paginationContainer || !previewControllerElement) {
      return;
    }

    previewAudio = previewControllerElement.querySelector('audio[data-role="preview-audio"]');
    previewTitleEl = previewControllerElement.querySelector('[data-role="preview-title"]');
    previewArtistEl = previewControllerElement.querySelector('[data-role="preview-artist"]');
    previewProgressEl = previewControllerElement.querySelector('[data-role="preview-progress"]');
    previewTimeEl = previewControllerElement.querySelector('[data-role="preview-time"]');
    previewToggleButton = previewControllerElement.querySelector('[data-action="preview-toggle-current"]');

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function parseNumberParam(params, key) {
      const raw = params.get(key);
      if (raw === null || raw === '') {
        return undefined;
      }
      const num = Number(raw);
      if (Number.isNaN(num)) {
        return undefined;
      }
      return num;
    }

    function getStateFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const state = {
        genreId: params.get('genreId') || '',
        bpmMin: parseNumberParam(params, 'bpmMin'),
        bpmMax: parseNumberParam(params, 'bpmMax'),
        priceMax: parseNumberParam(params, 'priceMax'),
        sort: params.get('sort') || defaultSort,
        page: parseNumberParam(params, 'page') || 1,
        pageSize: parseNumberParam(params, 'pageSize') || defaultPageSize
      };
      if (state.page < 1) {
        state.page = 1;
      }
      if (state.pageSize < 1) {
        state.pageSize = defaultPageSize;
      }
      return state;
    }

    function updateUrlParams(updates, options) {
      const opts = options || {};
      const params = new URLSearchParams(window.location.search);

      if (Object.prototype.hasOwnProperty.call(updates, 'genreId')) {
        const val = updates.genreId;
        if (!val) {
          params.delete('genreId');
        } else {
          params.set('genreId', val);
        }
      }

      if (Object.prototype.hasOwnProperty.call(updates, 'bpmMin')) {
        const val = updates.bpmMin;
        if (val === undefined || val === null || val === '') {
          params.delete('bpmMin');
        } else {
          params.set('bpmMin', String(val));
        }
      }

      if (Object.prototype.hasOwnProperty.call(updates, 'bpmMax')) {
        const val = updates.bpmMax;
        if (val === undefined || val === null || val === '') {
          params.delete('bpmMax');
        } else {
          params.set('bpmMax', String(val));
        }
      }

      if (Object.prototype.hasOwnProperty.call(updates, 'priceMax')) {
        const val = updates.priceMax;
        if (val === undefined || val === null || val === '') {
          params.delete('priceMax');
        } else {
          params.set('priceMax', String(val));
        }
      }

      if (Object.prototype.hasOwnProperty.call(updates, 'sort')) {
        const val = updates.sort;
        if (!val || val === defaultSort) {
          params.delete('sort');
        } else {
          params.set('sort', val);
        }
      }

      if (Object.prototype.hasOwnProperty.call(updates, 'page')) {
        const val = updates.page;
        if (!val || val === 1) {
          params.delete('page');
        } else {
          params.set('page', String(val));
        }
      }

      if (Object.prototype.hasOwnProperty.call(updates, 'pageSize')) {
        const val = updates.pageSize;
        if (!val || val === defaultPageSize) {
          params.delete('pageSize');
        } else {
          params.set('pageSize', String(val));
        }
      }

      const queryString = params.toString();
      const newUrl = window.location.pathname + (queryString ? '?' + queryString : '');
      if (opts.replace) {
        window.history.replaceState({}, '', newUrl);
      } else {
        window.history.pushState({}, '', newUrl);
      }

      currentState = getStateFromUrl();
      updateFilterInputsFromState(currentState);
      syncSortAndPageSizeControls(currentState);
      loadTracksAndRender();
    }

    function renderFiltersPanel(container, options, state) {
      if (!options) {
        container.innerHTML = '<p class="tracks-filters-panel__status">Loading filters␀hellip;</p>';
        return;
      }

      const genres = Array.isArray(options.genres) ? options.genres : [];
      const bpmRange = options.bpmRange || {};
      const priceRange = options.priceRange || {};

      const bpmMinValue = typeof state.bpmMin === 'number' ? String(state.bpmMin) : '';
      const bpmMaxValue = typeof state.bpmMax === 'number' ? String(state.bpmMax) : '';
      const priceMaxValue = typeof state.priceMax === 'number' ? String(state.priceMax) : '';

      let genreOptionsHtml = '<option value="">All genres</option>';
      for (let i = 0; i < genres.length; i += 1) {
        const genre = genres[i];
        const id = escapeHtml(genre.id);
        const name = escapeHtml(genre.name);
        const selectedAttr = state.genreId && state.genreId === genre.id ? ' selected' : '';
        genreOptionsHtml += '<option value="' + id + '"' + selectedAttr + '>' + name + '</option>';
      }

      const bpmMinAttr = typeof bpmRange.min === 'number' ? ' min="' + String(bpmRange.min) + '"' : '';
      const bpmMaxAttr = typeof bpmRange.max === 'number' ? ' max="' + String(bpmRange.max) + '"' : '';
      const priceMinAttr = typeof priceRange.min === 'number' ? ' min="' + String(priceRange.min) + '"' : '';
      const priceMaxAttr = typeof priceRange.max === 'number' ? ' max="' + String(priceRange.max) + '"' : '';

      const currencyLabel = priceRange.currency ? escapeHtml(priceRange.currency) : '';

      container.innerHTML = `
        <fieldset class="tracks-filters-panel__group">
          <legend class="tracks-filters-panel__label">Genre</legend>
          <select class="tracks-filters-panel__select" data-action="change-genre">
            ${genreOptionsHtml}
          </select>
        </fieldset>
        <fieldset class="tracks-filters-panel__group">
          <legend class="tracks-filters-panel__label">BPM</legend>
          <div class="tracks-filters-panel__range">
            <label class="tracks-filters-panel__field-label">Min</label>
            <input type="number" class="tracks-filters-panel__input" data-action="change-bpm-min" placeholder="${bpmRange.min != null ? escapeHtml(String(bpmRange.min)) : ''}"${bpmMinAttr}${bpmMaxAttr} value="${escapeHtml(bpmMinValue)}" />
          </div>
          <div class="tracks-filters-panel__range">
            <label class="tracks-filters-panel__field-label">Max</label>
            <input type="number" class="tracks-filters-panel__input" data-action="change-bpm-max" placeholder="${bpmRange.max != null ? escapeHtml(String(bpmRange.max)) : ''}"${bpmMinAttr}${bpmMaxAttr} value="${escapeHtml(bpmMaxValue)}" />
          </div>
        </fieldset>
        <fieldset class="tracks-filters-panel__group">
          <legend class="tracks-filters-panel__label">Max price ${currencyLabel ? '(' + currencyLabel + ')' : ''}</legend>
          <div class="tracks-filters-panel__range">
            <input type="number" step="0.01" class="tracks-filters-panel__input" data-action="change-price-max" placeholder="${priceRange.max != null ? escapeHtml(String(priceRange.max)) : ''}"${priceMinAttr}${priceMaxAttr} value="${escapeHtml(priceMaxValue)}" />
          </div>
        </fieldset>
        <div class="tracks-filters-panel__actions">
          <button type="button" class="tracks-filters-panel__clear" data-action="clear-all-filters">Clear filters</button>
        </div>
      `;
    }

    function updateFilterInputsFromState(state) {
      if (genreSelect) {
        genreSelect.value = state.genreId || '';
      }
      if (bpmMinInput) {
        bpmMinInput.value = typeof state.bpmMin === 'number' ? String(state.bpmMin) : '';
      }
      if (bpmMaxInput) {
        bpmMaxInput.value = typeof state.bpmMax === 'number' ? String(state.bpmMax) : '';
      }
      if (priceMaxInput) {
        priceMaxInput.value = typeof state.priceMax === 'number' ? String(state.priceMax) : '';
      }
    }

    function syncSortAndPageSizeControls(state) {
      const sortSelect = document.getElementById('tracksSortSelect');
      const pageSizeSelect = document.getElementById('tracksPageSizeSelect');
      if (sortSelect) {
        sortSelect.value = state.sort || defaultSort;
      }
      if (pageSizeSelect) {
        pageSizeSelect.value = String(state.pageSize || defaultPageSize);
      }
    }

    function formatDuration(seconds) {
      const total = Number(seconds || 0);
      const mins = Math.floor(total / 60);
      const secs = Math.floor(total % 60);
      const paddedSecs = secs < 10 ? '0' + String(secs) : String(secs);
      return mins + ':' + paddedSecs;
    }

    function formatPrice(price, currency) {
      if (price === undefined || price === null) {
        return '';
      }
      const num = Number(price);
      if (Number.isNaN(num)) {
        return '';
      }
      const code = currency || (filterOptions && filterOptions.priceRange && filterOptions.priceRange.currency) || '';
      let prefix = '';
      if (code === 'USD') {
        prefix = '$';
      }
      return prefix + num.toFixed(2) + (prefix ? '' : (code ? ' ' + code : ''));
    }

    function renderTracksList(container, items) {
      trackMetaById = {};
      container.innerHTML = '';

      if (!items || items.length === 0) {
        const emptyItem = document.createElement('li');
        emptyItem.className = 'tracks-list__item tracks-list__item--empty';
        const textSpan = document.createElement('span');
        textSpan.textContent = 'No tracks match these filters.';
        emptyItem.appendChild(textSpan);
        const clearButton = document.createElement('button');
        clearButton.type = 'button';
        clearButton.className = 'tracks-list__clear';
        clearButton.dataset.action = 'clear-all-filters';
        clearButton.textContent = 'Clear filters';
        emptyItem.appendChild(clearButton);
        container.appendChild(emptyItem);
        return;
      }

      for (let i = 0; i < items.length; i += 1) {
        const item = items[i];
        const track = item.track;
        const li = document.createElement('li');
        li.className = 'tracks-list__item';
        li.dataset.trackId = track.id;

        trackMetaById[track.id] = {
          title: track.title,
          artistName: item.artistName,
          durationSeconds: track.duration_seconds || 0
        };

        const rowInner = document.createElement('div');
        rowInner.className = 'tracks-list__row';

        const primaryButton = document.createElement('button');
        primaryButton.type = 'button';
        primaryButton.className = 'tracks-list__primary';
        primaryButton.dataset.action = 'open-track-detail';
        primaryButton.dataset.trackId = track.id;

        const numberSpan = document.createElement('span');
        numberSpan.className = 'tracks-list__track-number';
        numberSpan.textContent = String(track.track_number || (item.index || (i + 1)));

        const titleSpan = document.createElement('span');
        titleSpan.className = 'tracks-list__title';
        titleSpan.textContent = track.title;

        primaryButton.appendChild(numberSpan);
        primaryButton.appendChild(titleSpan);

        const metaDiv = document.createElement('div');
        metaDiv.className = 'tracks-list__meta';

        const artistSpan = document.createElement('span');
        artistSpan.className = 'tracks-list__artist';
        artistSpan.textContent = item.artistName || '';

        const releaseSpan = document.createElement('span');
        releaseSpan.className = 'tracks-list__release';
        releaseSpan.textContent = item.releaseTitle || '';

        const bpmSpan = document.createElement('span');
        bpmSpan.className = 'tracks-list__bpm';
        if (track.bpm) {
          bpmSpan.textContent = 'BPM ' + String(track.bpm);
        }

        const durationSpan = document.createElement('span');
        durationSpan.className = 'tracks-list__duration';
        if (track.duration_seconds) {
          durationSpan.textContent = formatDuration(track.duration_seconds);
        }

        metaDiv.appendChild(artistSpan);
        metaDiv.appendChild(releaseSpan);
        if (bpmSpan.textContent) {
          metaDiv.appendChild(bpmSpan);
        }
        if (durationSpan.textContent) {
          metaDiv.appendChild(durationSpan);
        }

        const priceRatingDiv = document.createElement('div');
        priceRatingDiv.className = 'tracks-list__price-rating';

        const priceSpan = document.createElement('span');
        priceSpan.className = 'tracks-list__price';
        priceSpan.textContent = formatPrice(track.price, track.currency);

        const ratingSpan = document.createElement('span');
        ratingSpan.className = 'tracks-list__rating';
        if (track.rating_average != null && track.rating_count != null && track.rating_count > 0) {
          ratingSpan.textContent = '\u2605 ' + track.rating_average.toFixed(1);
        }

        priceRatingDiv.appendChild(priceSpan);
        if (ratingSpan.textContent) {
          priceRatingDiv.appendChild(ratingSpan);
        }

        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'tracks-list__actions';
        actionsDiv.dataset.component = 'track-row-actions';

        const previewButton = document.createElement('button');
        previewButton.type = 'button';
        previewButton.className = 'tracks-list__action tracks-list__action--preview';
        previewButton.dataset.action = 'preview-track';
        previewButton.dataset.trackId = track.id;
        previewButton.dataset.role = 'preview-button';
        previewButton.textContent = 'Play';

        const addButton = document.createElement('button');
        addButton.type = 'button';
        addButton.className = 'tracks-list__action tracks-list__action--cart';
        addButton.dataset.action = 'add-track-to-cart';
        addButton.dataset.trackId = track.id;
        addButton.textContent = 'Add';

        const wishButton = document.createElement('button');
        wishButton.type = 'button';
        wishButton.className = 'tracks-list__action tracks-list__action--wishlist';
        wishButton.dataset.action = 'toggle-wishlist';
        wishButton.dataset.trackId = track.id;
        wishButton.setAttribute('aria-pressed', wishlistState[track.id] ? 'true' : 'false');
        wishButton.textContent = wishlistState[track.id] ? 'Saved' : 'Wish';

        actionsDiv.appendChild(previewButton);
        actionsDiv.appendChild(addButton);
        actionsDiv.appendChild(wishButton);

        rowInner.appendChild(primaryButton);
        rowInner.appendChild(metaDiv);
        rowInner.appendChild(priceRatingDiv);
        rowInner.appendChild(actionsDiv);

        li.appendChild(rowInner);
        container.appendChild(li);
      }

      updatePreviewButtonsState();
    }

    function renderActiveFiltersBar(container, state, options, totalCount) {
      const hasGenre = !!state.genreId;
      const hasBpm = typeof state.bpmMin === 'number' || typeof state.bpmMax === 'number';
      const hasPrice = typeof state.priceMax === 'number';
      const hasAnyFilter = hasGenre || hasBpm || hasPrice;

      let genreLabel = '';
      if (hasGenre && options && Array.isArray(options.genres)) {
        for (let i = 0; i < options.genres.length; i += 1) {
          const g = options.genres[i];
          if (g.id === state.genreId) {
            genreLabel = g.name;
            break;
          }
        }
      }

      if (!hasAnyFilter) {
        const count = totalCount || 0;
        const label = count === 1 ? '1 track' : String(count) + ' tracks';
        container.innerHTML = '<span class="tracks-bottom-bar__summary">' + escapeHtml(label) + '</span>';
        return;
      }

      let html = '';

      if (hasGenre) {
        html += '<button type="button" class="tracks-filter-chip" data-action="remove-genre-filter">Genre: ' + escapeHtml(genreLabel || state.genreId) + ' \u00d7</button>';
      }

      if (hasBpm) {
        let bpmText = '';
        if (typeof state.bpmMin === 'number' && typeof state.bpmMax === 'number') {
          bpmText = state.bpmMin + '-' + state.bpmMax + ' BPM';
        } else if (typeof state.bpmMin === 'number') {
          bpmText = '\u2265 ' + state.bpmMin + ' BPM';
        } else if (typeof state.bpmMax === 'number') {
          bpmText = '\u2264 ' + state.bpmMax + ' BPM';
        }
        html += '<button type="button" class="tracks-filter-chip" data-action="remove-bpm-filter">' + escapeHtml(bpmText) + ' \u00d7</button>';
      }

      if (hasPrice) {
        const priceText = 'Up to ' + formatPrice(state.priceMax, null);
        html += '<button type="button" class="tracks-filter-chip" data-action="remove-price-filter">' + escapeHtml(priceText) + ' \u00d7</button>';
      }

      html += '<button type="button" class="tracks-filter-chip tracks-filter-chip--reset" data-action="clear-all-filters">Clear all</button>';

      container.innerHTML = html;
    }

    function renderPagination(container, page, pageSize, totalCount) {
      container.innerHTML = '';
      const total = totalCount || 0;
      const perPage = pageSize || defaultPageSize;
      const totalPages = total > 0 ? Math.ceil(total / perPage) : 1;
      const current = page || 1;

      const wrapper = document.createElement('div');
      wrapper.className = 'tracks-pagination';

      const prevButton = document.createElement('button');
      prevButton.type = 'button';
      prevButton.className = 'tracks-pagination__button tracks-pagination__button--prev';
      prevButton.dataset.action = 'page-prev';
      prevButton.textContent = 'Prev';
      if (current <= 1) {
        prevButton.disabled = true;
      }

      const infoSpan = document.createElement('span');
      infoSpan.className = 'tracks-pagination__info';
      infoSpan.textContent = 'Page ' + String(current) + ' of ' + String(totalPages);

      const nextButton = document.createElement('button');
      nextButton.type = 'button';
      nextButton.className = 'tracks-pagination__button tracks-pagination__button--next';
      nextButton.dataset.action = 'page-next';
      nextButton.textContent = 'Next';
      if (current >= totalPages) {
        nextButton.disabled = true;
      }

      wrapper.appendChild(prevButton);
      wrapper.appendChild(infoSpan);
      wrapper.appendChild(nextButton);

      container.appendChild(wrapper);
    }

    function loadTracksAndRender() {
      if (statusElement) {
        statusElement.textContent = 'Loading tracks␀hellip;';
      }

      const filters = {};
      if (currentState.genreId) {
        filters.genreIds = [currentState.genreId];
      }
      if (typeof currentState.bpmMin === 'number') {
        filters.minBpm = currentState.bpmMin;
      }
      if (typeof currentState.bpmMax === 'number') {
        filters.maxBpm = currentState.bpmMax;
      }
      if (typeof currentState.priceMax === 'number') {
        filters.maxPrice = currentState.priceMax;
      }

      try {
        const result = WebsiteSDK.listTracks(filters, currentState.sort, currentState.page, currentState.pageSize);
        currentTracksResult = result;
        renderTracksList(tracksListContainer, result.items);
        renderActiveFiltersBar(activeFiltersContainer, currentState, filterOptions, result.totalCount);
        renderPagination(paginationContainer, result.page, result.pageSize, result.totalCount);
        if (statusElement) {
          const count = result.totalCount || 0;
          const label = count === 1 ? '1 track' : String(count) + ' tracks';
          statusElement.textContent = label;
        }
      } catch (error) {
        if (statusElement) {
          statusElement.textContent = 'Unable to load tracks.';
        }
        tracksListContainer.innerHTML = '';
        console.error(error);
      }
    }

    function updatePreviewButtonsState() {
      const buttons = tracksListContainer.querySelectorAll('[data-role="preview-button"]');
      for (let i = 0; i < buttons.length; i += 1) {
        const btn = buttons[i];
        const trackId = btn.dataset.trackId;
        if (currentPreviewTrackId && trackId === currentPreviewTrackId && previewAudio && !previewAudio.paused) {
          btn.textContent = 'Pause';
        } else {
          btn.textContent = 'Play';
        }
      }

      if (previewToggleButton) {
        if (currentPreviewTrackId && previewAudio && !Number.isNaN(previewAudio.duration)) {
          previewToggleButton.disabled = false;
          previewToggleButton.textContent = previewAudio.paused ? 'Play' : 'Pause';
        } else if (currentPreviewTrackId) {
          previewToggleButton.disabled = false;
          previewToggleButton.textContent = 'Pause';
        } else {
          previewToggleButton.disabled = true;
          previewToggleButton.textContent = 'Play';
        }
      }
    }

    function updatePreviewControllerUI(trackId) {
      if (!trackId || !trackMetaById[trackId]) {
        if (previewTitleEl) {
          previewTitleEl.textContent = 'No track selected';
        }
        if (previewArtistEl) {
          previewArtistEl.textContent = '';
        }
        if (previewProgressEl) {
          previewProgressEl.style.width = '0%';
        }
        if (previewTimeEl) {
          previewTimeEl.textContent = '0:00';
        }
        return;
      }
      const meta = trackMetaById[trackId];
      if (previewTitleEl) {
        previewTitleEl.textContent = meta.title || '';
      }
      if (previewArtistEl) {
        previewArtistEl.textContent = meta.artistName || '';
      }
    }

    function handlePreviewForTrack(trackId) {
      if (!trackId || !previewAudio) {
        return;
      }

      if (currentPreviewTrackId && currentPreviewTrackId === trackId && !previewAudio.paused) {
        previewAudio.pause();
        updatePreviewButtonsState();
        return;
      }

      try {
        const result = WebsiteSDK.startTrackPreview(trackId);
        if (!result || !result.success || !result.previewUrl) {
          return;
        }
        currentPreviewTrackId = trackId;
        updatePreviewControllerUI(trackId);
        previewAudio.src = result.previewUrl;
        previewAudio.currentTime = 0;
        const playPromise = previewAudio.play();
        if (playPromise && typeof playPromise.then === 'function') {
          playPromise.then(function() {
            updatePreviewButtonsState();
          }).catch(function() {
            updatePreviewButtonsState();
          });
        } else {
          updatePreviewButtonsState();
        }
      } catch (error) {
        console.error(error);
      }
    }

    function toggleCurrentPreviewPlayback() {
      if (!currentPreviewTrackId || !previewAudio) {
        return;
      }
      if (previewAudio.paused) {
        const playPromise = previewAudio.play();
        if (playPromise && typeof playPromise.then === 'function') {
          playPromise.then(function() {
            updatePreviewButtonsState();
          }).catch(function() {
            updatePreviewButtonsState();
          });
        } else {
          updatePreviewButtonsState();
        }
      } else {
        previewAudio.pause();
        updatePreviewButtonsState();
      }
    }

    function handleAddTrackToCart(trackId, triggerElement) {
      if (!trackId) {
        return;
      }
      try {
        const result = WebsiteSDK.addTrackToCart(trackId, 1);
        if (result && result.success) {
          if (triggerElement) {
            const originalLabel = triggerElement.textContent;
            triggerElement.textContent = 'Added';
            triggerElement.disabled = true;
            window.setTimeout(function() {
              triggerElement.textContent = originalLabel;
              triggerElement.disabled = false;
            }, 1500);
          }
        }
      } catch (error) {
        console.error(error);
      }
    }

    function handleToggleWishlist(trackId, triggerElement) {
      if (!trackId) {
        return;
      }
      try {
        const result = WebsiteSDK.addTrackToWishlist(trackId);
        if (result && result.success && result.wishlistItem) {
          wishlistState[trackId] = result.wishlistItem.id || true;
          if (triggerElement) {
            triggerElement.setAttribute('aria-pressed', 'true');
            triggerElement.textContent = 'Saved';
          }
        }
      } catch (error) {
        console.error(error);
      }
    }

    document.addEventListener('click', function(event) {
      const target = event.target.closest('[data-action]');
      if (!target) {
        return;
      }
      const action = target.dataset.action;

      if (action === 'preview-track') {
        const trackId = target.dataset.trackId;
        handlePreviewForTrack(trackId);
      } else if (action === 'preview-toggle-current') {
        toggleCurrentPreviewPlayback();
      } else if (action === 'add-track-to-cart') {
        const trackId = target.dataset.trackId;
        handleAddTrackToCart(trackId, target);
      } else if (action === 'toggle-wishlist') {
        const trackId = target.dataset.trackId;
        handleToggleWishlist(trackId, target);
      } else if (action === 'open-track-detail') {
        const trackId = target.dataset.trackId;
        if (trackId) {
          window.location.href = 'product.html?trackId=' + encodeURIComponent(trackId);
        }
      } else if (action === 'page-prev') {
        const newPage = (currentState.page || 1) - 1;
        if (newPage >= 1) {
          updateUrlParams({ page: newPage });
        }
      } else if (action === 'page-next') {
        const total = currentTracksResult && currentTracksResult.totalCount ? currentTracksResult.totalCount : 0;
        const perPage = currentState.pageSize || defaultPageSize;
        const totalPages = total > 0 ? Math.ceil(total / perPage) : 1;
        const newPage = (currentState.page || 1) + 1;
        if (newPage <= totalPages) {
          updateUrlParams({ page: newPage });
        }
      } else if (action === 'remove-genre-filter') {
        updateUrlParams({ genreId: '', page: 1 });
      } else if (action === 'remove-bpm-filter') {
        updateUrlParams({ bpmMin: '', bpmMax: '', page: 1 });
      } else if (action === 'remove-price-filter') {
        updateUrlParams({ priceMax: '', page: 1 });
      } else if (action === 'clear-all-filters') {
        updateUrlParams({ genreId: '', bpmMin: '', bpmMax: '', priceMax: '', page: 1 });
      }
    });

    document.addEventListener('change', function(event) {
      const target = event.target;
      if (!target || !target.dataset.action) {
        return;
      }
      const action = target.dataset.action;

      if (action === 'change-genre') {
        const value = target.value || '';
        updateUrlParams({ genreId: value, page: 1 });
      } else if (action === 'change-bpm-min') {
        const raw = target.value;
        const num = raw === '' ? '' : Number(raw);
        if (raw !== '' && Number.isNaN(num)) {
          return;
        }
        updateUrlParams({ bpmMin: raw === '' ? '' : num, page: 1 });
      } else if (action === 'change-bpm-max') {
        const raw = target.value;
        const num = raw === '' ? '' : Number(raw);
        if (raw !== '' && Number.isNaN(num)) {
          return;
        }
        updateUrlParams({ bpmMax: raw === '' ? '' : num, page: 1 });
      } else if (action === 'change-price-max') {
        const raw = target.value;
        const num = raw === '' ? '' : Number(raw);
        if (raw !== '' && Number.isNaN(num)) {
          return;
        }
        updateUrlParams({ priceMax: raw === '' ? '' : num, page: 1 });
      } else if (action === 'change-sort') {
        const value = target.value || defaultSort;
        updateUrlParams({ sort: value, page: 1 });
      } else if (action === 'change-page-size') {
        const raw = target.value;
        const num = Number(raw || defaultPageSize);
        if (!Number.isNaN(num) && num > 0) {
          updateUrlParams({ pageSize: num, page: 1 });
        }
      }
    });

    window.addEventListener('popstate', function() {
      currentState = getStateFromUrl();
      updateFilterInputsFromState(currentState);
      syncSortAndPageSizeControls(currentState);
      loadTracksAndRender();
    });

    if (previewAudio) {
      previewAudio.addEventListener('timeupdate', function() {
        if (!previewAudio || !previewProgressEl || !previewTimeEl) {
          return;
        }
        const duration = previewAudio.duration;
        const current = previewAudio.currentTime;
        if (duration && !Number.isNaN(duration)) {
          const progress = Math.max(0, Math.min(1, current / duration));
          previewProgressEl.style.width = String(progress * 100) + '%';
        }
        previewTimeEl.textContent = formatDuration(current);
      });

      previewAudio.addEventListener('ended', function() {
        previewProgressEl.style.width = '0%';
        updatePreviewButtonsState();
      });

      previewAudio.addEventListener('pause', function() {
        updatePreviewButtonsState();
      });

      previewAudio.addEventListener('play', function() {
        updatePreviewButtonsState();
      });
    }

    try {
      filterOptions = WebsiteSDK.getTrackFilterOptions();
    } catch (error) {
      console.error(error);
    }

    currentState = getStateFromUrl();

    const populateElements = document.querySelectorAll('[data-populate]');
    for (let i = 0; i < populateElements.length; i += 1) {
      const element = populateElements[i];
      const type = element.dataset.populate;
      if (type === 'track-filters') {
        renderFiltersPanel(element, filterOptions, currentState);
      }
    }

    genreSelect = filtersContainer.querySelector('[data-action="change-genre"]');
    bpmMinInput = filtersContainer.querySelector('[data-action="change-bpm-min"]');
    bpmMaxInput = filtersContainer.querySelector('[data-action="change-bpm-max"]');
    priceMaxInput = filtersContainer.querySelector('[data-action="change-price-max"]');

    updateFilterInputsFromState(currentState);
    syncSortAndPageSizeControls(currentState);
    loadTracksAndRender();
  });
  </script>
</body>
</html>
