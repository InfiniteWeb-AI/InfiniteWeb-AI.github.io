<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>IT Security Community Blog</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&amp;family=Source+Serif+4:wght@300;400;600;700&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='author.css'>
</head>
<body>
  <!-- Network / global bar -->
  <div class='network-bar'>
    <div class='network-bar-inner'>
      <div class='network-brand'>StackExchange</div>
      <div class='network-tagline'>IT Security community blog</div>
    </div>
  </div>

  <!-- Site header with badge logo, global search, and primary navigation -->
  <header class='site-header'>
    <div class='site-header-inner'>
      <div class='logo-badge' aria-label='IT Security Community Blog'>
        <span class='logo-icon'></span>
        <span class='logo-text'>IT Security Community Blog</span>
      </div>

      <form class='global-search-form' data-component='global-search-form' data-action='global-search' role='search' aria-label='Search articles and questions'>
        <label class='visually-hidden' for='global-search-input'>Search articles and questions</label>
        <input id='global-search-input'
               type='search'
               name='q'
               placeholder='Search security articles &amp; questions'
               autocomplete='off'
               data-action='search-query-change'>
        <button type='submit' class='btn btn-search'>Search</button>
      </form>

      <nav class='main-nav' aria-label='Primary'>
        <ul>
          <li><a href='index.html' title='Homepage with personalized security content feed and global search'>Home</a></li>
          <li><a href='articles.html' title='Browse and search all blog articles with filters and sorting'>Articles</a></li>
          <li><a href='tags.html' title='Browse all security tags/topics like phishing, ransomware, and malware'>Tags</a></li>
          <li><a href='questions.html' title='View and search security questions and answers'>Q&amp;A</a></li>
          <li><a href='write_post.html' title='Create and publish a new security blog post'>Write a post</a></li>
          <li><a href='reading_lists.html' title='Manage reading lists and collections such as OWASP study lists'>Reading lists</a></li>
          <li><a href='bookmarks.html' title='View and manage all bookmarked articles'>Bookmarks</a></li>
          <li><a href='settings.html' title='Adjust feed preferences including followed and muted tags'>Settings</a></li>
        </ul>
      </nav>
    </div>

    <div class='global-search-results-panel' data-component='global-search-results' hidden></div>
  </header>

  <!-- Main page layout -->
  <div class='page-wrapper'>
    <main id='content' class='content-area' role='main'>
      <div class='author-page' data-component='author-page-controller'>
        <div class='author-card'>
          <div class='author-card-inner'>
            <div class='author-layout'>
              <!-- Left: main author content -->
              <section class='author-main-column'>
                <div class='author-global-state' data-component='author-global-state'></div>

                <!-- Author header (avatar, name, bio, follow) -->
                <section class='author-header-section' data-component='author-header' data-populate='author-header'></section>

                <!-- Slim controller bar under the header -->
                <section class='author-controller-bar' data-component='author-page-controller' data-populate='author-controller'></section>

                <!-- Articles section: header + sort + list + pagination -->
                <section class='author-articles-section'>
                  <div class='author-articles-header-row' data-component='author-articles-sort-control' data-populate='author-articles-header'></div>

                  <div class='author-articles-list' data-component='author-articles-list' data-populate='author-articles-list'></div>

                  <div class='author-articles-pagination' data-component='author-articles-pagination' data-populate='author-articles-pagination'></div>
                </section>
              </section>

              <!-- Right: sidebar with stats, recent articles, topics -->
              <aside class='author-sidebar-column'>
                <section class='author-stats-summary' data-component='author-stats-summary' data-populate='author-stats-summary'></section>

                <section class='author-recent-articles' data-component='author-recent-articles-list' data-populate='author-recent-articles'></section>

                <section class='author-topics' data-component='author-topics-list' data-populate='author-topics'></section>
              </aside>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Optional sidebar container for global or contextual navigation/content -->
    <aside id='sidebar' class='sidebar' aria-label='Sidebar'>
      <!-- Sidebar content (e.g., latest articles, topics) can be injected here. -->
    </aside>
  </div>

  <!-- Site footer -->
  <footer class='site-footer'>
    <div class='site-footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul>
          <li><a href='about.html' title='Learn more about the IT security community blog'>About</a></li>
          <li><a href='contact.html' title='Contact the site maintainers or send feedback'>Contact</a></li>
          <li><a href='guidelines.html' title='Read content and behavior guidelines for the community'>Community Guidelines</a></li>
          <li><a href='legal.html' title='View the privacy policy and terms of use'>Privacy &amp; Terms</a></li>
        </ul>
      </nav>
      <div class='footer-meta'>
        <p>&copy; <span class='footer-year'>2024</span> IT Security Community Blog. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      const state = {
        authorId: null,
        sortBy: 'newest',
        page: 1,
        pageSize: 10,
        authorProfile: null,
        articlesResult: null
      };

      const globalStateContainer = document.querySelector('[data-component="author-global-state"]');
      const authorHeaderContainer = document.querySelector('[data-populate="author-header"]');
      const authorControllerContainer = document.querySelector('[data-populate="author-controller"]');
      const statsContainer = document.querySelector('[data-populate="author-stats-summary"]');
      const recentContainer = document.querySelector('[data-populate="author-recent-articles"]');
      const topicsContainer = document.querySelector('[data-populate="author-topics"]');
      const articlesHeaderContainer = document.querySelector('[data-populate="author-articles-header"]');
      const articlesListContainer = document.querySelector('[data-populate="author-articles-list"]');
      const paginationContainer = document.querySelector('[data-populate="author-articles-pagination"]');
      const globalSearchResultsContainer = document.querySelector('[data-component="global-search-results"]');

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatDate(dateString) {
        if (!dateString) {
          return '';
        }
        const date = new Date(dateString);
        if (isNaN(date.getTime())) {
          return '';
        }
        try {
          return date.toLocaleDateString(undefined, {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          });
        } catch (error) {
          return dateString;
        }
      }

      function showGlobalMessage(message, variant) {
        if (!globalStateContainer) {
          return;
        }
        const safe = escapeHtml(message || '');
        let typeClass = 'alert--info';
        if (variant === 'error') {
          typeClass = 'alert--error';
        } else if (variant === 'warning') {
          typeClass = 'alert--warning';
        }
        globalStateContainer.innerHTML = "<div class='alert " + typeClass + "'>" + safe + "</div>";
      }

      function clearGlobalMessage() {
        if (globalStateContainer) {
          globalStateContainer.innerHTML = '';
        }
      }

      function parseUrlState() {
        const params = new URLSearchParams(window.location.search || '');
        const id = params.get('id');
        const sortByParam = params.get('sortBy');
        const pageParam = params.get('page');

        state.authorId = id || null;
        state.sortBy = sortByParam && sortByParam.trim() ? sortByParam : 'newest';

        const pageNum = parseInt(pageParam, 10);
        state.page = !isNaN(pageNum) && pageNum >= 1 ? pageNum : 1;
      }

      function updateUrl(params) {
        const url = new URL(window.location.href);
        const search = url.searchParams;

        if (params.id !== undefined) {
          if (params.id) {
            search.set('id', params.id);
          } else {
            search.delete('id');
          }
        }

        if (params.sortBy !== undefined) {
          if (params.sortBy) {
            search.set('sortBy', params.sortBy);
          } else {
            search.delete('sortBy');
          }
        }

        if (params.page !== undefined) {
          if (params.page && params.page > 1) {
            search.set('page', String(params.page));
          } else {
            search.delete('page');
          }
        }

        const queryString = search.toString();
        const newUrl = url.pathname + (queryString ? '?' + queryString : '');
        window.history.pushState({}, '', newUrl);
      }

      function renderAuthorHeader(container, profile) {
        if (!container) {
          return;
        }
        if (!profile || !profile.author) {
          container.innerHTML = '';
          return;
        }

        const author = profile.author;
        const name = escapeHtml(author.name || 'Unknown author');
        const bio = escapeHtml(author.bio || '');
        const joinDateText = author.joinDate ? formatDate(author.joinDate) : '';
        const websiteUrl = author.websiteUrl || '';
        const avatarUrl = author.avatarUrl || '';

        const stats = profile.stats || {};
        const followerCount = typeof stats.followerCount === 'number' ? stats.followerCount : (author.followerCount || 0);
        const articleCount = typeof stats.articleCount === 'number' ? stats.articleCount : (author.articleCount || 0);
        const isFollowed = !!profile.isFollowed;

        let websiteHtml = '';
        if (websiteUrl) {
          const safeUrl = escapeHtml(websiteUrl);
          websiteHtml = "<a href='" + safeUrl + "' class='author-website-link' rel='noopener noreferrer' target='_blank'>" + safeUrl + '</a>';
        }

        const metaParts = [];
        if (joinDateText) {
          metaParts.push('Member since ' + joinDateText);
        }
        metaParts.push(articleCount + ' articles');
        metaParts.push(followerCount + ' followers');
        const metaText = metaParts.join(' b7 ');

        container.innerHTML = `
          <div class='author-header'>
            <div class='author-header-main-row'>
              <div class='author-avatar-block'>
                ${avatarUrl
                  ? `<img src='${escapeHtml(avatarUrl)}' alt='Avatar for ${name}' class='author-avatar'>`
                  : "<div class='author-avatar author-avatar--placeholder' aria-hidden='true'></div>"}
              </div>
              <div class='author-header-body'>
                <div class='author-header-topline'>
                  <h1 class='author-name'>${name}</h1>
                  <button type='button'
                          class='btn btn-follow${isFollowed ? ' btn-follow--active' : ''}'
                          data-component='author-follow-toggle'
                          data-action='toggle-follow'>
                    ${isFollowed ? 'Unfollow' : 'Follow'}
                  </button>
                </div>
                ${bio ? `<p class='author-bio'>${bio}</p>` : ''}
                <div class='author-meta'>
                  ${websiteHtml ? `<span class='author-meta-item'>${websiteHtml}</span>` : ''}
                  ${metaText ? `<span class='author-meta-item'>${escapeHtml(metaText)}</span>` : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderAuthorController(container, profile) {
        if (!container) {
          return;
        }
        if (!profile || !profile.author) {
          container.innerHTML = '';
          return;
        }
        const name = escapeHtml(profile.author.name || 'Author');
        container.innerHTML = `
          <div class='author-controller'>
            <div class='author-controller-left'>
              <span class='author-controller-label'>Author profile</span>
              <span class='author-controller-separator'>&raquo;</span>
              <span class='author-controller-name'>${name}</span>
            </div>
            <div class='author-controller-right'>
              <span class='author-controller-view'>Viewing: articles</span>
            </div>
          </div>
        `;
      }

      function renderAuthorStatsSummary(container, profile) {
        if (!container) {
          return;
        }
        if (!profile || !profile.stats) {
          container.innerHTML = '';
          return;
        }
        const stats = profile.stats;
        const totalArticles = typeof stats.articleCount === 'number' ? stats.articleCount : 0;
        const followers = typeof stats.followerCount === 'number' ? stats.followerCount : 0;
        const avgRating = typeof stats.averageArticleRating === 'number' ? stats.averageArticleRating.toFixed(1) : 'N/A';

        container.innerHTML = `
          <div class='author-stats-panel'>
            <h2 class='sidebar-heading'>Author stats</h2>
            <div class='author-stats-grid'>
              <div class='author-stat'>
                <span class='author-stat-label'>Articles</span>
                <span class='author-stat-value'>${totalArticles}</span>
              </div>
              <div class='author-stat'>
                <span class='author-stat-label'>Followers</span>
                <span class='author-stat-value'>${followers}</span>
              </div>
              <div class='author-stat'>
                <span class='author-stat-label'>Avg. rating</span>
                <span class='author-stat-value'>${avgRating}</span>
              </div>
            </div>
          </div>
        `;
      }

      function renderAuthorRecentArticles(container, profile) {
        if (!container) {
          return;
        }
        const recent = profile && Array.isArray(profile.recentArticles) ? profile.recentArticles : [];
        if (!recent.length) {
          container.innerHTML = '';
          return;
        }
        let itemsHtml = '';
        recent.forEach(function(item) {
          if (!item) {
            return;
          }
          const title = escapeHtml(item.title || 'Untitled article');
          const dateText = item.publicationDate ? formatDate(item.publicationDate) : '';
          const rating = typeof item.averageRating === 'number' ? item.averageRating.toFixed(1) : null;
          const articleUrl = item.id ? 'article.html?id=' + encodeURIComponent(item.id) : 'javascript:void(0)';
          itemsHtml += `
            <li class='sidebar-list-item'>
              <a href='${articleUrl}' class='sidebar-link'>${title}</a>
              <div class='sidebar-meta'>
                ${dateText ? `<span class='sidebar-meta-item'>${escapeHtml(dateText)}</span>` : ''}
                ${rating !== null ? `<span class='sidebar-meta-item'>Rating ${rating}</span>` : ''}
              </div>
            </li>
          `;
        });
        container.innerHTML = `
          <div class='sidebar-section'>
            <h2 class='sidebar-heading'>Latest from this author</h2>
            <ul class='sidebar-list'>
              ${itemsHtml}
            </ul>
          </div>
        `;
      }

      function renderAuthorTopics(container, profile) {
        if (!container) {
          return;
        }
        const namesSet = new Set();
        const tags = profile && Array.isArray(profile.topTags) ? profile.topTags : [];
        tags.forEach(function(tag) {
          if (tag && tag.name) {
            namesSet.add(tag.name);
          }
        });
        if (profile && profile.author && Array.isArray(profile.author.topics)) {
          profile.author.topics.forEach(function(topicName) {
            if (topicName) {
              namesSet.add(topicName);
            }
          });
        }
        const topics = Array.from(namesSet);
        if (!topics.length) {
          container.innerHTML = '';
          return;
        }
        let itemsHtml = '';
        topics.forEach(function(name) {
          const safeName = escapeHtml(name);
          itemsHtml += `
            <li class='topic-list-item'>
              <button type='button'
                      class='topic-pill'
                      data-action='topic-click'
                      data-topic='${safeName}'>
                ${safeName}
              </button>
            </li>
          `;
        });
        container.innerHTML = `
          <div class='sidebar-section'>
            <h2 class='sidebar-heading'>Topics</h2>
            <ul class='topic-list'>
              ${itemsHtml}
            </ul>
          </div>
        `;
      }

      function renderAuthorArticlesHeader(container, profile) {
        if (!container) {
          return;
        }
        if (!profile || !profile.author) {
          container.innerHTML = '';
          return;
        }
        const name = escapeHtml(profile.author.name || 'this author');
        const sortBy = state.sortBy || 'newest';
        const options = [
          { value: 'newest', label: 'Newest first' },
          { value: 'rating_high_to_low', label: 'Rating: high to low' },
          { value: 'popularity', label: 'Most popular' }
        ];

        let optionsHtml = '';
        options.forEach(function(opt) {
          const selected = opt.value === sortBy ? ' selected' : '';
          optionsHtml += `<option value='${escapeHtml(opt.value)}'${selected}>${escapeHtml(opt.label)}</option>`;
        });

        container.innerHTML = `
          <div class='author-articles-header'>
            <h2 class='author-articles-title'>All articles by ${name}</h2>
            <div class='author-articles-sort'>
              <label for='author-sort-select' class='author-sort-label'>Sort by:</label>
              <select id='author-sort-select' class='author-sort-select' data-action='change-sort'>
                ${optionsHtml}
              </select>
            </div>
          </div>
        `;
      }

      function renderAuthorArticlesList(container, articlesResult) {
        if (!container) {
          return;
        }
        if (!articlesResult || !Array.isArray(articlesResult.items) || !articlesResult.items.length) {
          container.innerHTML = "<p class='muted'>No articles to display for this author.</p>";
          return;
        }
        let listHtml = '';
        articlesResult.items.forEach(function(item) {
          if (!item || !item.article) {
            return;
          }
          const article = item.article;
          const title = escapeHtml(article.title || 'Untitled article');
          const articleUrl = article.id ? 'article.html?id=' + encodeURIComponent(article.id) : 'javascript:void(0)';
          const dateText = article.publicationDate ? formatDate(article.publicationDate) : '';
          const categoryName = item.categoryName ? escapeHtml(item.categoryName) : '';
          const difficulty = article.difficulty || '';
          const difficultyLabel = difficulty ? difficulty.charAt(0).toUpperCase() + difficulty.slice(1) : '';
          const rating = typeof article.averageRating === 'number' ? article.averageRating.toFixed(1) : null;
          const views = typeof article.viewCount === 'number' ? article.viewCount : null;
          const excerpt = article.excerpt ? escapeHtml(article.excerpt) : '';

          let metaParts = [];
          if (dateText) {
            metaParts.push(dateText);
          }
          if (categoryName) {
            metaParts.push(categoryName);
          }
          if (difficultyLabel) {
            metaParts.push(difficultyLabel);
          }
          if (rating !== null) {
            metaParts.push('Rating ' + rating);
          }
          if (views !== null) {
            metaParts.push(views + ' views');
          }

          const metaHtml = metaParts.map(function(part) {
            return "<span class='article-meta-item'>" + escapeHtml(part) + '</span>';
          }).join("<span class='article-meta-separator'>b7</span>");

          listHtml += `
            <li class='author-article-list-item'>
              <article class='author-article-card'>
                <h3 class='article-title'>
                  <a href='${articleUrl}' class='article-title-link'>${title}</a>
                </h3>
                <div class='article-meta-line'>
                  ${metaHtml}
                </div>
                ${excerpt ? `<p class='article-excerpt'>${excerpt}</p>` : ''}
              </article>
            </li>
          `;
        });

        container.innerHTML = `
          <ul class='author-article-list'>
            ${listHtml}
          </ul>
        `;
      }

      function renderAuthorArticlesPagination(container, totalCount, currentPage, pageSize) {
        if (!container) {
          return;
        }
        const total = typeof totalCount === 'number' ? totalCount : 0;
        const size = pageSize || state.pageSize || 10;
        const totalPages = total > 0 ? Math.ceil(total / size) : 0;
        if (!totalPages || totalPages <= 1) {
          container.innerHTML = '';
          return;
        }
        const current = currentPage || 1;

        let pagesHtml = '';
        const maxButtons = 7;
        let start = Math.max(1, current - Math.floor(maxButtons / 2));
        let end = start + maxButtons - 1;
        if (end > totalPages) {
          end = totalPages;
          start = Math.max(1, end - maxButtons + 1);
        }

        for (let page = start; page <= end; page += 1) {
          const isActive = page === current;
          pagesHtml += `
            <button type='button'
                    class='page-button${isActive ? ' page-button--active' : ''}'
                    data-action='change-page'
                    data-page='${page}'>
              ${page}
            </button>
          `;
        }

        const hasPrev = current > 1;
        const hasNext = current < totalPages;

        container.innerHTML = `
          <nav class='pagination' aria-label='Author articles pagination'>
            <button type='button'
                    class='page-button page-button--prev'
                    data-action='change-page'
                    data-page='${hasPrev ? current - 1 : current}'
                    ${hasPrev ? '' : 'disabled'}>
              ab Previous
            </button>
            ${pagesHtml}
            <button type='button'
                    class='page-button page-button--next'
                    data-action='change-page'
                    data-page='${hasNext ? current + 1 : current}'
                    ${hasNext ? '' : 'disabled'}>
              Next bb
            </button>
          </nav>
        `;
      }

      function renderGlobalSearchResults(container, results, query) {
        if (!container) {
          return;
        }
        const articles = results && Array.isArray(results.articles) ? results.articles : [];
        const questions = results && Array.isArray(results.questions) ? results.questions : [];
        const safeQuery = escapeHtml(query || '');

        if (!articles.length && !questions.length) {
          container.innerHTML = `
            <div class='search-results'>
              <div class='search-results-header'>
                <strong>No matches</strong> for "${safeQuery}"
              </div>
            </div>
          `;
          container.hidden = false;
          return;
        }

        let articlesHtml = '';
        articles.forEach(function(item) {
          if (!item) {
            return;
          }
          const title = escapeHtml(item.title || 'Untitled article');
          const articleUrl = item.id ? 'article.html?id=' + encodeURIComponent(item.id) : 'javascript:void(0)';
          const dateText = item.publicationDate ? formatDate(item.publicationDate) : '';
          const categoryName = item.categoryName ? escapeHtml(item.categoryName) : '';
          articlesHtml += `
            <li class='search-results-item'>
              <a href='${articleUrl}' class='search-results-link'>${title}</a>
              <div class='search-results-meta'>
                ${categoryName ? `<span class='search-results-meta-item'>${categoryName}</span>` : ''}
                ${dateText ? `<span class='search-results-meta-item'>${escapeHtml(dateText)}</span>` : ''}
              </div>
            </li>
          `;
        });

        let questionsHtml = '';
        questions.forEach(function(item) {
          if (!item) {
            return;
          }
          const title = escapeHtml(item.title || 'Untitled question');
          const categoryName = item.categoryName ? escapeHtml(item.categoryName) : '';
          const answerCount = typeof item.answerCount === 'number' ? item.answerCount : null;
          questionsHtml += `
            <li class='search-results-item'>
              <a href='javascript:void(0)' class='search-results-link search-results-link--question'>${title}</a>
              <div class='search-results-meta'>
                ${categoryName ? `<span class='search-results-meta-item'>${categoryName}</span>` : ''}
                ${answerCount !== null ? `<span class='search-results-meta-item'>${answerCount} answers</span>` : ''}
              </div>
            </li>
          `;
        });

        container.innerHTML = `
          <div class='search-results'>
            <div class='search-results-header'>
              <strong>Search results</strong> for "${safeQuery}"
            </div>
            <div class='search-results-columns'>
              <div class='search-results-column'>
                <h3 class='search-results-heading'>Articles</h3>
                <ul class='search-results-list'>
                  ${articlesHtml || "<li class='search-results-empty'>No matching articles</li>"}
                </ul>
              </div>
              <div class='search-results-column'>
                <h3 class='search-results-heading'>Questions</h3>
                <ul class='search-results-list'>
                  ${questionsHtml || "<li class='search-results-empty'>No matching questions</li>"}
                </ul>
              </div>
            </div>
          </div>
        `;
        container.hidden = false;
      }

      function loadAuthorArticles() {
        if (!state.authorId) {
          return;
        }
        if (articlesListContainer) {
          articlesListContainer.innerHTML = "<p class='loading-indicator'>Loading articleshellip;</p>";
        }
        if (paginationContainer) {
          paginationContainer.innerHTML = '';
        }
        try {
          const result = WebsiteSDK.getAuthorArticles(state.authorId, state.sortBy, state.page, state.pageSize);
          state.articlesResult = result;
          renderAuthorArticlesList(articlesListContainer, result);
          renderAuthorArticlesPagination(paginationContainer, result.totalCount, state.page, state.pageSize);
        } catch (error) {
          console.error('Error loading author articles', error);
          if (articlesListContainer) {
            articlesListContainer.innerHTML = "<p class='alert alert--error'>We could not load this author's articles. Please try again later.</p>";
          }
        }
      }

      function loadAuthorProfileAndArticles() {
        if (!state.authorId) {
          return;
        }
        try {
          const profile = WebsiteSDK.getAuthorProfile(state.authorId);
          state.authorProfile = profile;
          renderAuthorHeader(authorHeaderContainer, profile);
          renderAuthorController(authorControllerContainer, profile);
          renderAuthorStatsSummary(statsContainer, profile);
          renderAuthorRecentArticles(recentContainer, profile);
          renderAuthorTopics(topicsContainer, profile);
          renderAuthorArticlesHeader(articlesHeaderContainer, profile);
          clearGlobalMessage();
        } catch (error) {
          console.error('Error loading author profile', error);
          showGlobalMessage('We could not load this author profile at the moment. Please try again later.', 'error');
          return;
        }
        loadAuthorArticles();
      }

      function handleToggleFollow(event, button) {
        if (!state.authorId || !state.authorProfile) {
          return;
        }
        const originalText = button.textContent;
        button.disabled = true;
        button.textContent = 'Savinghellip;';
        try {
          const response = WebsiteSDK.toggleAuthorFollow(state.authorId);
          if (!response || !response.success) {
            showGlobalMessage('We could not update your follow status. Please try again.', 'error');
          } else {
            state.authorProfile.isFollowed = !!response.isFollowed;
            if (!state.authorProfile.stats) {
              state.authorProfile.stats = {};
            }
            state.authorProfile.stats.followerCount = response.followerCount;
            renderAuthorHeader(authorHeaderContainer, state.authorProfile);
            renderAuthorStatsSummary(statsContainer, state.authorProfile);
          }
        } catch (error) {
          console.error('Error toggling follow', error);
          showGlobalMessage('We could not update your follow status. Please try again later.', 'error');
        } finally {
          button.disabled = false;
          button.textContent = originalText;
        }
      }

      function handleChangeSort(event, select) {
        if (!state.authorId) {
          return;
        }
        const newSort = select.value || 'newest';
        if (newSort === state.sortBy) {
          return;
        }
        state.sortBy = newSort;
        state.page = 1;
        updateUrl({ id: state.authorId, sortBy: state.sortBy, page: state.page });
        if (state.authorProfile) {
          renderAuthorArticlesHeader(articlesHeaderContainer, state.authorProfile);
        }
        loadAuthorArticles();
      }

      function handleChangePage(event, button) {
        if (!state.authorId) {
          return;
        }
        const pageAttr = button.getAttribute('data-page');
        const newPage = parseInt(pageAttr, 10);
        if (isNaN(newPage) || newPage < 1 || newPage === state.page) {
          return;
        }
        state.page = newPage;
        updateUrl({ id: state.authorId, sortBy: state.sortBy, page: state.page });
        loadAuthorArticles();
      }

      function handleTopicClick(event, button) {
        const topic = button.getAttribute('data-topic') || '';
        if (!topic) {
          return;
        }
        showGlobalMessage('Topic navigation is not available from this page. Topic: ' + topic, 'info');
      }

      function handleGlobalSearchSubmit(event, form) {
        event.preventDefault();
        const input = form.querySelector('input[name="q"]');
        const query = input && input.value ? input.value.trim() : '';
        if (!query) {
          if (globalSearchResultsContainer) {
            globalSearchResultsContainer.hidden = true;
            globalSearchResultsContainer.innerHTML = '';
          }
          return;
        }
        try {
          const results = WebsiteSDK.searchAllContent(query, 5, 5);
          renderGlobalSearchResults(globalSearchResultsContainer, results, query);
        } catch (error) {
          console.error('Error executing global search', error);
          if (globalSearchResultsContainer) {
            globalSearchResultsContainer.innerHTML = "<div class='search-results-header'>We could not run this search right now.</div>";
            globalSearchResultsContainer.hidden = false;
          }
        }
      }

      function handleSearchQueryChange(event, input) {
        const value = input.value || '';
        if (!value.trim() && globalSearchResultsContainer) {
          globalSearchResultsContainer.hidden = true;
          globalSearchResultsContainer.innerHTML = '';
        }
      }

      function handlePopState() {
        parseUrlState();
        if (!state.authorId) {
          state.authorProfile = null;
          state.articlesResult = null;
          if (authorHeaderContainer) {
            authorHeaderContainer.innerHTML = '';
          }
          if (authorControllerContainer) {
            authorControllerContainer.innerHTML = '';
          }
          if (statsContainer) {
            statsContainer.innerHTML = '';
          }
          if (recentContainer) {
            recentContainer.innerHTML = '';
          }
          if (topicsContainer) {
            topicsContainer.innerHTML = '';
          }
          if (articlesHeaderContainer) {
            articlesHeaderContainer.innerHTML = '';
          }
          if (articlesListContainer) {
            articlesListContainer.innerHTML = '';
          }
          if (paginationContainer) {
            paginationContainer.innerHTML = '';
          }
          showGlobalMessage('No author selected. Visit this page by clicking an author name on an article to view their profile.', 'warning');
          return;
        }
        clearGlobalMessage();
        loadAuthorProfileAndArticles();
      }

      // Event delegation for clicks (follow, pagination, topics) and to hide search results
      document.addEventListener('click', function(event) {
        if (globalSearchResultsContainer && !globalSearchResultsContainer.hidden) {
          const insideSearch = event.target.closest('.global-search-form');
          const insideResults = event.target.closest('[data-component="global-search-results"]');
          if (!insideSearch && !insideResults) {
            globalSearchResultsContainer.hidden = true;
          }
        }

        const actionEl = event.target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        const action = actionEl.getAttribute('data-action');
        if (action === 'toggle-follow') {
          event.preventDefault();
          handleToggleFollow(event, actionEl);
        } else if (action === 'change-page') {
          event.preventDefault();
          handleChangePage(event, actionEl);
        } else if (action === 'topic-click') {
          event.preventDefault();
          handleTopicClick(event, actionEl);
        }
      });

      // Event delegation for change events (sort control)
      document.addEventListener('change', function(event) {
        const actionEl = event.target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        const action = actionEl.getAttribute('data-action');
        if (action === 'change-sort') {
          handleChangeSort(event, actionEl);
        }
      });

      // Event delegation for input changes (search query)
      document.addEventListener('input', function(event) {
        const actionEl = event.target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        const action = actionEl.getAttribute('data-action');
        if (action === 'search-query-change') {
          handleSearchQueryChange(event, actionEl);
        }
      });

      // Global search form submit
      const globalSearchForm = document.querySelector('form[data-action="global-search"]');
      if (globalSearchForm) {
        globalSearchForm.addEventListener('submit', function(event) {
          handleGlobalSearchSubmit(event, globalSearchForm);
        });
      }

      window.addEventListener('popstate', handlePopState);

      // Initial load
      parseUrlState();
      if (!state.authorId) {
        showGlobalMessage('No author selected. Visit this page by clicking an author name on an article to view their profile.', 'warning');
      } else {
        loadAuthorProfileAndArticles();
      }
    });
  </script>
</body>
</html>
