<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kent Storage - Location Search Results</title>

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

  <!-- Site styles -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Page-specific styles -->
  <link rel="stylesheet" href="locations.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="site-branding">
        <a href="index.html" class="site-logo">Kent Storage</a>
      </div>

      <nav class="primary-nav" aria-label="Primary">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="index.html" class="nav-link">Home</a>
          </li>
          <li class="nav-item">
            <a href="units_search.html" class="nav-link">Find Storage</a>
          </li>
          <li class="nav-item">
            <a href="locations.html" class="nav-link nav-link--active">Locations</a>
          </li>
          <li class="nav-item">
            <a href="size_guide.html" class="nav-link">Size Guide</a>
          </li>
          <li class="nav-item">
            <a href="supplies.html" class="nav-link">Moving Supplies</a>
          </li>
          <li class="nav-item">
            <a href="help.html" class="nav-link">Help</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="content" class="site-main">
    <!-- Page-level dark title bar, text is intended to be customized per page -->
    <section class="page-header-bar" aria-label="Page heading">
      <div class="container">
        <h1 class="page-title">Location Search Results</h1>
      </div>
    </section>

    <div class="container main-content">
      <!-- Page-specific content starts here -->
      <div class="locations-page">
        <!-- Preferred location context line -->
        <div class="preferred-location-indicator" data-component="preferred-location-header-indicator" data-populate="preferredLocationSummary" aria-live="polite"></div>

        <!-- Inline search bar -->
        <section class="location-search-bar-section" aria-label="Search locations">
          <div class="location-search-bar" data-component="location-search-bar">
            <form class="location-search-form" data-action="submitSearch">
              <label for="locationSearchInput" class="visually-hidden">Search by city, ZIP, or address</label>
              <input
                id="locationSearchInput"
                name="searchTerm"
                type="text"
                class="location-search-input"
                placeholder="Search by city, ZIP, or address"
                autocomplete="postal-code"
              />
              <button type="submit" class="btn btn-primary location-search-submit">
                Search
              </button>
            </form>
          </div>
        </section>

        <!-- Two-column layout: results on the left, filters on the right -->
        <div class="locations-layout">
          <!-- Left column: size-banner, summary, results -->
          <div class="locations-layout__left">
            <!-- Size-guide mode banner (conditionally rendered) -->
            <section class="size-guide-banner" data-component="size-guide-mode-banner" aria-live="polite"></section>

            <!-- Results summary and sort order control -->
            <div class="locations-results-header">
              <div
                class="locations-results-summary"
                data-component="locations-results-summary"
                data-populate="resultsSummary"
              ></div>

              <div class="sort-order-control" data-component="sort-order-control">
                <label for="sortOrderSelect" class="sort-order-label">Sort by</label>
                <select id="sortOrderSelect" name="sortBy" class="sort-order-select" data-action="changeSort">
                  <option value="distance">Distance</option>
                  <option value="rating_high_to_low">Rating (high to low)</option>
                  <option value="price_estimate">Starting price</option>
                  <option value="price_low_to_high">Price (low to high)</option>
                </select>
              </div>
            </div>

            <!-- Results list -->
            <section class="locations-results-list" data-component="locations-results-list" aria-label="Location search results">
              <div class="locations-results-container" data-populate="locationResults"></div>
            </section>
          </div>

          <!-- Right column: filters & controls -->
          <aside class="locations-layout__right" aria-label="Search filters">
            <section class="filters-card" data-component="filters-card">
              <!-- Loader placeholder for filter options -->
              <div class="filters-loader" data-populate="filterOptionsLoader" aria-hidden="true"></div>

              <!-- Distance filter -->
              <div class="filter-group" data-component="distance-filter-control">
                <label for="distanceSelect" class="filter-label">Distance radius</label>
                <div class="filter-control-row">
                  <select id="distanceSelect" name="maxDistanceMiles" class="filter-select" data-action="changeDistance">
                    <!-- Options populated via JS from getLocationSearchFilterOptions.distance_options_miles -->
                  </select>
                  <span class="filter-unit">miles</span>
                </div>
              </div>

              <!-- Rating and feature filters -->
              <div class="filter-group" data-component="rating-and-feature-filters">
                <div class="filter-group-header">Filter by rating &amp; features</div>

                <div class="filter-field">
                  <label for="minRatingSelect" class="filter-label">Minimum rating</label>
                  <select id="minRatingSelect" name="minRating" class="filter-select" data-action="changeMinRating">
                    <!-- Options populated via JS from getLocationSearchFilterOptions.rating_thresholds -->
                  </select>
                </div>

                <div class="filter-field filter-toggle">
                  <label>
                    <input
                      type="checkbox"
                      id="climateOnlyToggle"
                      class="filter-checkbox"
                      data-action="toggleClimateControl"
                    />
                    Climate controlled only
                  </label>
                </div>

                <div class="filter-field feature-flags" data-populate="featureFlags">
                  <!-- Additional feature flag toggles populated via JS -->
                </div>
              </div>

              <!-- Explicit search execution controller (optional, re-runs search with current URL state) -->
              <div class="filter-actions" data-component="search-execution-controller">
                <button type="button" class="btn btn-secondary" data-action="applyFilters">
                  Update results
                </button>
              </div>
            </section>
          </aside>
        </div>
      </div>
      <!-- Page-specific content ends here -->
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="footer-branding">
        <span class="footer-logo">Kent Storage</span>
      </div>

      <nav class="footer-nav" aria-label="Footer">
        <ul class="footer-nav-list">
          <li class="footer-nav-item">
            <a href="about.html" class="footer-nav-link">About &amp; Policies</a>
          </li>
          <li class="footer-nav-item">
            <a href="contact.html" class="footer-nav-link">Contact us</a>
          </li>
          <li class="footer-nav-item">
            <a href="help.html" class="footer-nav-link">Help &amp; FAQ</a>
          </li>
          <li class="footer-nav-item">
            <a href="size_guide.html" class="footer-nav-link">Size guide</a>
          </li>
          <li class="footer-nav-item">
            <a href="supplies.html" class="footer-nav-link">Moving supplies</a>
          </li>
        </ul>
      </nav>

      <div class="footer-meta">
        <p class="footer-copy">
          &copy; <span class="footer-year">2024</span> Kent Storage. All rights reserved.
        </p>
      </div>
    </div>
  </footer>

  <!-- SDK / business logic -->
  <script src="business_logic.js"></script>
  <!-- Page-specific UI logic -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const distanceSelect = document.getElementById('distanceSelect');
      const minRatingSelect = document.getElementById('minRatingSelect');
      const climateToggle = document.getElementById('climateOnlyToggle');
      const sortSelect = document.getElementById('sortOrderSelect');
      const searchInput = document.getElementById('locationSearchInput');

      const resultsContainer = document.querySelector('[data-populate="locationResults"]');
      const summaryContainer = document.querySelector('[data-populate="resultsSummary"]');
      const preferredContainer = document.querySelector('[data-populate="preferredLocationSummary"]');
      const sizeGuideBannerContainer = document.querySelector('[data-component="size-guide-mode-banner"]');
      const featureFlagsContainer = document.querySelector('[data-populate="featureFlags"]');
      const filterLoaderContainer = document.querySelector('[data-populate="filterOptionsLoader"]');

      let filterOptions = null;
      let lastUnitSizeLabel = '';
      let lastSearchKind = 'nearby';

      function readStateFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const state = {
          searchTerm: (params.get('searchTerm') || '').trim(),
          maxDistanceMiles: params.get('maxDistanceMiles') ? Number(params.get('maxDistanceMiles')) : null,
          sortBy: params.get('sortBy') || 'distance',
          minRating: params.get('minRating') ? Number(params.get('minRating')) : null,
          hasClimateControl: params.get('hasClimateControl') === 'true',
          unitSizeId: params.get('unitSizeId') || '',
          mode: params.get('mode') || '',
          view: params.get('view') || '',
          featureFlags: {}
        };
        params.forEach(function(value, key) {
          if (key.indexOf('feature_') === 0) {
            const featureKey = key.substring('feature_'.length);
            state.featureFlags[featureKey] = value === 'true';
          }
        });
        return state;
      }

      function updateUrlFromState(state, options) {
        const params = new URLSearchParams(window.location.search);

        function setOrDelete(key, value) {
          if (value === null || value === undefined || value === '' || (typeof value === 'number' && isNaN(value))) {
            params["delete"](key);
          } else {
            params.set(key, String(value));
          }
        }

        setOrDelete('searchTerm', state.searchTerm);
        setOrDelete('maxDistanceMiles', state.maxDistanceMiles);
        setOrDelete('sortBy', state.sortBy && state.sortBy !== 'distance' ? state.sortBy : null);
        setOrDelete('minRating', state.minRating);
        setOrDelete('hasClimateControl', state.hasClimateControl ? 'true' : null);
        setOrDelete('unitSizeId', state.unitSizeId);
        setOrDelete('mode', state.mode);
        setOrDelete('view', state.view);

        const keysToRemove = [];
        params.forEach(function(v, k) {
          if (k.indexOf('feature_') === 0) {
            keysToRemove.push(k);
          }
        });
        keysToRemove.forEach(function(k) { params["delete"](k); });

        if (state.featureFlags) {
          Object.keys(state.featureFlags).forEach(function(featureKey) {
            if (state.featureFlags[featureKey]) {
              params.set('feature_' + featureKey, 'true');
            }
          });
        }

        const newRelative = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        const method = options && options.replace ? 'replaceState' : 'pushState';
        window.history[method]({}, '', newRelative);
      }

      function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function renderPreferredLocation(container, summary) {
        if (!container) return;
        container.innerHTML = '';
        if (!summary || !summary.has_preferred_location) {
          return;
        }
        var text = 'Preferred facility: ' + summary.location_name + ' (' + summary.city + ', ' + summary.state + ')';
        var p = document.createElement('p');
        p.className = 'preferred-location-text';
        p.textContent = text;
        container.appendChild(p);
      }

      function renderFilterOptionsLoader(container, isLoading) {
        if (!container) return;
        if (isLoading) {
          container.innerHTML = '<div class="filters-loader__bar"></div>';
          container.style.display = '';
        } else {
          container.innerHTML = '';
          container.style.display = 'none';
        }
      }

      function renderDistanceOptions(selectEl, optionsList, state) {
        if (!selectEl) return;
        selectEl.innerHTML = '';
        var anyOption = document.createElement('option');
        anyOption.value = '';
        anyOption.textContent = 'Any distance';
        selectEl.appendChild(anyOption);

        if (Array.isArray(optionsList)) {
          optionsList.forEach(function(miles) {
            var opt = document.createElement('option');
            opt.value = String(miles);
            opt.textContent = miles + ' miles';
            selectEl.appendChild(opt);
          });
        }

        if (state && state.maxDistanceMiles) {
          selectEl.value = String(state.maxDistanceMiles);
          if (selectEl.value === '') {
            selectEl.value = '';
          }
        } else {
          selectEl.value = '';
        }
      }

      function renderRatingOptions(selectEl, thresholds, state) {
        if (!selectEl) return;
        selectEl.innerHTML = '';
        var anyOpt = document.createElement('option');
        anyOpt.value = '';
        anyOpt.textContent = 'Any rating';
        selectEl.appendChild(anyOpt);

        if (Array.isArray(thresholds)) {
          thresholds.forEach(function(th) {
            var opt = document.createElement('option');
            opt.value = String(th.min_rating);
            opt.textContent = th.label || (th.min_rating + '+');
            selectEl.appendChild(opt);
          });
        }

        if (state && state.minRating) {
          selectEl.value = String(state.minRating);
          if (selectEl.value === '') {
            selectEl.value = '';
          }
        } else {
          selectEl.value = '';
        }
      }

      function renderFeatureFlags(container, featureFlags, state) {
        if (!container) return;
        container.innerHTML = '';
        if (!Array.isArray(featureFlags) || featureFlags.length === 0) {
          return;
        }
        featureFlags.forEach(function(flag) {
          var wrapper = document.createElement('div');
          wrapper.className = 'filter-field filter-toggle';
          var id = 'feature_' + flag.key;
          var checked = state && state.featureFlags && state.featureFlags[flag.key];
          wrapper.innerHTML = '\n            <label>\n              <input type="checkbox"\n                     id="' + escapeHtml(id) + '"\n                     data-action="toggleFeatureFlag"\n                     data-feature-key="' + escapeHtml(flag.key) + '"' + (checked ? ' checked' : '') + ' />\n              ' + escapeHtml(flag.label) + '\n            </label>\n          ';
          container.appendChild(wrapper);
        });
      }

      function applyStateToControls(state) {
        if (searchInput) {
          searchInput.value = state.searchTerm || '';
        }
        if (distanceSelect) {
          if (state.maxDistanceMiles) {
            distanceSelect.value = String(state.maxDistanceMiles);
            if (distanceSelect.value === '') {
              distanceSelect.value = '';
            }
          } else {
            distanceSelect.value = '';
          }
        }
        if (minRatingSelect) {
          if (state.minRating) {
            minRatingSelect.value = String(state.minRating);
            if (minRatingSelect.value === '') {
              minRatingSelect.value = '';
            }
          } else {
            minRatingSelect.value = '';
          }
        }
        if (climateToggle) {
          climateToggle.checked = !!state.hasClimateControl;
        }
        if (sortSelect) {
          sortSelect.value = state.sortBy || 'distance';
          if (!sortSelect.value) {
            sortSelect.value = 'distance';
          }
        }
      }

      function renderSizeGuideBanner(container, state, searchKindLocal) {
        if (!container) return;
        container.innerHTML = '';
        var isSizeGuideActive = state.mode === 'size_guide' && state.unitSizeId && searchKindLocal === 'size_guide';
        if (!isSizeGuideActive) {
          return;
        }
        var sizeLabelText = lastUnitSizeLabel ? (lastUnitSizeLabel + ' units') : 'Selected size';
        var wrapper = document.createElement('div');
        wrapper.className = 'size-guide-banner__inner';
        wrapper.innerHTML = '\n          <div class="size-guide-banner__text">\n            Showing locations with available <strong>' + escapeHtml(sizeLabelText) + '</strong> near\n            <strong>' + escapeHtml(state.searchTerm || '') + '</strong>.\n          </div>\n          <div class="size-guide-banner__actions">\n            <button type="button"\n                    class="btn btn-tertiary"\n                    data-action="exitSizeGuideMode">\n              Show all unit sizes\n            </button>\n          </div>\n        ';
        container.appendChild(wrapper);
      }

      function renderResultsSummary(container, state, data, searchKindLocal) {
        if (!container) return;
        container.innerHTML = '';
        var term = state.searchTerm || '';
        if (!term) {
          var pEmpty = document.createElement('p');
          pEmpty.textContent = 'Enter a city, ZIP, or address to see nearby locations.';
          container.appendChild(pEmpty);
          return;
        }
        var results = data && Array.isArray(data.results) ? data.results : [];
        var count;
        if (searchKindLocal === 'nearby') {
          if (typeof data.total_count === 'number') {
            count = data.total_count;
          } else {
            count = results.length;
          }
        } else {
          count = results.length;
        }

        var parts = [];
        parts.push(count + ' location' + (count === 1 ? '' : 's') + ' found');
        if (state.mode === 'size_guide' && state.unitSizeId && searchKindLocal === 'size_guide') {
          var sizeLabel = lastUnitSizeLabel || 'selected size';
          parts.push('with ' + sizeLabel + ' units');
        }
        parts.push('near "' + term + '"');
        if (state.maxDistanceMiles) {
          parts.push('within ' + state.maxDistanceMiles + ' miles');
        }
        var p = document.createElement('p');
        p.textContent = parts.join(' ');
        container.appendChild(p);
      }

      function renderLocationResults(container, state, data, searchKindLocal) {
        if (!container) return;
        container.innerHTML = '';
        var term = state.searchTerm || '';
        if (!term) {
          var msg = document.createElement('p');
          msg.className = 'locations-results-empty';
          msg.textContent = 'Start by entering a city, ZIP, or address above.';
          container.appendChild(msg);
          return;
        }
        if (!data || !Array.isArray(data.results) || data.results.length === 0) {
          var noMsg = document.createElement('p');
          noMsg.className = 'locations-results-empty';
          noMsg.textContent = 'No locations matched your search and filters. Try expanding your distance or adjusting filters.';
          container.appendChild(noMsg);
          return;
        }

        var listWrapper = document.createElement('div');
        listWrapper.className = 'locations-results-cards';

        data.results.forEach(function(item) {
          var card = document.createElement('article');
          card.className = 'location-card';
          card.setAttribute('data-component', 'location-result-card');

          var locationId = item.location_id || '';
          var distanceMiles = typeof item.distance_miles === 'number' ? item.distance_miles : null;
          var rating = typeof item.rating === 'number' ? item.rating : null;
          var ratingCount = typeof item.rating_count === 'number' ? item.rating_count : null;

          var name;
          if (searchKindLocal === 'size_guide') {
            name = item.location_name || '';
          } else {
            name = item.name || '';
          }

          var priceLine = '';
          var availabilityLine = '';
          if (searchKindLocal === 'size_guide') {
            var price = item.starting_monthly_rate_for_size;
            var countAvail = item.available_units_of_size_count;
            if (price !== null && price !== undefined) {
              var priceStr = '$' + price.toFixed(0) + '/mo';
              var sizeLabelText = lastUnitSizeLabel || 'Selected size';
              priceLine = sizeLabelText + ' from ' + priceStr;
            }
            if (typeof countAvail === 'number') {
              availabilityLine = countAvail + ' unit' + (countAvail === 1 ? '' : 's') + ' available';
            }
          } else {
            if (item.estimated_starting_price !== null && item.estimated_starting_price !== undefined) {
              var estPriceStr = '$' + item.estimated_starting_price.toFixed(0) + '/mo';
              priceLine = 'Units from ' + estPriceStr;
            }
            if (state.unitSizeId && item.has_requested_unit_size) {
              availabilityLine = 'Requested size available';
            } else if (state.unitSizeId && item.has_requested_unit_size === false) {
              availabilityLine = 'Requested size not available  other sizes offered';
            }
          }

          var features = [];
          if (item.has_climate_controlled_units) {
            features.push('Climate controlled');
          }
          if (item.offers_vehicle_storage) {
            features.push('Vehicle storage');
          }
          if (item.offers_24_hour_access) {
            features.push('24-hour access');
          }

          var promoBadge = (item.has_promotions && item.primary_promotions_summary)
            ? '<span class="location-card__promo-badge">' + escapeHtml(item.primary_promotions_summary) + '</span>'
            : '';

          var ratingHtml;
          if (rating !== null && rating !== undefined) {
            ratingHtml = '<span class="location-card__rating-score">' + rating.toFixed(1) + '</span>' + (ratingCount !== null && ratingCount !== undefined ? ' <span class="location-card__rating-count">(' + ratingCount + ')</span>' : '');
          } else {
            ratingHtml = '<span class="location-card__rating-score">No reviews yet</span>';
          }

          var distanceHtml = distanceMiles !== null && distanceMiles !== undefined
            ? distanceMiles.toFixed(1) + ' mi'
            : '';

          var addressParts = [];
          if (item.address_line1) addressParts.push(item.address_line1);
          var cityState = [];
          if (item.city) cityState.push(item.city);
          if (item.state) cityState.push(item.state);
          if (cityState.length) addressParts.push(cityState.join(', '));
          if (item.postal_code) addressParts.push(item.postal_code);

          var phoneLine = item.phone
            ? '<div class="location-card__phone">' + escapeHtml(item.phone) + '</div>'
            : '';

          var featuresHtml = features.length
            ? features.map(function(f) { return '<span class="location-card__feature-chip">' + escapeHtml(f) + '</span>'; }).join('')
            : '';

          card.innerHTML = '\n            <div class="location-card__header">\n              <button type="button"\n                      class="location-card__name-link"\n                      data-action="viewLocationDetails"\n                      data-location-id="' + escapeHtml(locationId) + '">\n                ' + escapeHtml(name) + '\n              </button>\n              <div class="location-card__distance">\n                ' + escapeHtml(distanceHtml) + '\n              </div>\n            </div>\n            <div class="location-card__body">\n              <div class="location-card__address">\n                ' + escapeHtml(addressParts.join(' b7 ')) + '\n              </div>\n              ' + phoneLine + '\n              <div class="location-card__features">\n                ' + featuresHtml + '\n              </div>\n              ' + promoBadge + '\n            </div>\n            <div class="location-card__footer">\n              <div class="location-card__meta">\n                <div class="location-card__rating">\n                  ' + ratingHtml + '\n                </div>\n                <div class="location-card__pricing">\n                  ' + escapeHtml(priceLine) + (availabilityLine ? '<span class="location-card__availability">  ' + escapeHtml(availabilityLine) + '</span>' : '') + '\n                </div>\n              </div>\n              <div class="location-card__actions">\n                <button type="button"\n                        class="btn btn-primary"\n                        data-action="viewLocationUnits"\n                        data-location-id="' + escapeHtml(locationId) + '">\n                  View units\n                </button>\n                <button type="button"\n                        class="btn btn-link"\n                        data-action="viewLocationDetails"\n                        data-location-id="' + escapeHtml(locationId) + '">\n                  View details\n                </button>\n              </div>\n            </div>\n          ';
          listWrapper.appendChild(card);
        });

        container.appendChild(listWrapper);
      }

      function runSearch(state, options) {
        var term = state.searchTerm || '';
        var data = { results: [] };
        var searchKindLocal = 'nearby';
        lastUnitSizeLabel = '';

        if (!term) {
          renderSizeGuideBanner(sizeGuideBannerContainer, state, searchKindLocal);
          renderResultsSummary(summaryContainer, state, data, searchKindLocal);
          renderLocationResults(resultsContainer, state, data, searchKindLocal);
          lastSearchKind = searchKindLocal;
          return;
        }

        var maxDistance = (state.maxDistanceMiles !== null && !isNaN(state.maxDistanceMiles))
          ? state.maxDistanceMiles
          : undefined;

        try {
          if (state.mode === 'size_guide' && state.unitSizeId) {
            searchKindLocal = 'size_guide';
            var sortBySize = state.sortBy || 'distance';
            if (sortBySize !== 'distance' && sortBySize !== 'price_low_to_high') {
              sortBySize = 'distance';
              state.sortBy = sortBySize;
              updateUrlFromState(state, { replace: true });
              if (sortSelect) {
                sortSelect.value = sortBySize;
              }
            }
            data = WebsiteSDK.searchLocationsForUnitSize(term, state.unitSizeId, maxDistance, sortBySize) || { results: [] };
            if (data && typeof data.unit_size_label === 'string') {
              lastUnitSizeLabel = data.unit_size_label;
            }
          } else {
            searchKindLocal = 'nearby';
            var sortByNearby = state.sortBy || 'distance';
            if (sortByNearby === 'price_low_to_high') {
              sortByNearby = 'price_estimate';
            }
            var filters = {};
            if (state.hasClimateControl) {
              filters.hasClimateControlledUnits = true;
            }
            if (state.minRating !== null && !isNaN(state.minRating)) {
              filters.minRating = state.minRating;
            }
            if (state.unitSizeId) {
              filters.unitSizeId = state.unitSizeId;
            }
            if (state.featureFlags) {
              Object.keys(state.featureFlags).forEach(function(key) {
                if (state.featureFlags[key]) {
                  filters[key] = true;
                }
              });
            }
            data = WebsiteSDK.searchLocationsNearby(term, maxDistance, filters, sortByNearby) || { results: [] };
          }
        } catch (err) {
          console.error('Error during location search', err);
          data = { results: [] };
        }

        renderSizeGuideBanner(sizeGuideBannerContainer, state, searchKindLocal);
        renderResultsSummary(summaryContainer, state, data, searchKindLocal);
        renderLocationResults(resultsContainer, state, data, searchKindLocal);
        lastSearchKind = searchKindLocal;
      }

      function runInitialDataLoadAndSearch() {
        var preferredSummary = null;
        try {
          preferredSummary = WebsiteSDK.getPreferredLocationSummary();
        } catch (err) {
          console.error('Error fetching preferred location summary', err);
        }
        if (preferredContainer) {
          renderPreferredLocation(preferredContainer, preferredSummary);
        }

        renderFilterOptionsLoader(filterLoaderContainer, true);
        try {
          filterOptions = WebsiteSDK.getLocationSearchFilterOptions();
        } catch (err) {
          console.error('Error fetching filter options', err);
          filterOptions = null;
        }
        renderFilterOptionsLoader(filterLoaderContainer, false);

        var state = readStateFromUrl();

        if (filterOptions) {
          renderDistanceOptions(distanceSelect, filterOptions.distance_options_miles, state);
          renderRatingOptions(minRatingSelect, filterOptions.rating_thresholds, state);
          if (featureFlagsContainer) {
            renderFeatureFlags(featureFlagsContainer, filterOptions.feature_flags, state);
          }
        }

        applyStateToControls(state);
        runSearch(state, { fromInitialLoad: true });
      }

      function handleSearchSubmit(event) {
        event.preventDefault();
        var form = event.target;
        var input = form.querySelector('input[name="searchTerm"]');
        var value = input ? input.value.trim() : '';
        var state = readStateFromUrl();
        state.searchTerm = value;
        updateUrlFromState(state, { replace: true });
        applyStateToControls(state);
        runSearch(state);
      }

      function handleDistanceChange(event) {
        var value = event.target.value;
        var state = readStateFromUrl();
        state.maxDistanceMiles = value ? Number(value) : null;
        updateUrlFromState(state, { replace: true });
        applyStateToControls(state);
        runSearch(state);
      }

      function handleMinRatingChange(event) {
        var value = event.target.value;
        var state = readStateFromUrl();
        state.minRating = value ? Number(value) : null;
        if (state.mode === 'size_guide') {
          state.mode = '';
        }
        updateUrlFromState(state, { replace: true });
        applyStateToControls(state);
        runSearch(state);
      }

      function handleClimateToggle(event) {
        var checked = event.target.checked;
        var state = readStateFromUrl();
        state.hasClimateControl = !!checked;
        if (state.mode === 'size_guide') {
          state.mode = '';
        }
        updateUrlFromState(state, { replace: true });
        applyStateToControls(state);
        runSearch(state);
      }

      function handleFeatureFlagToggle(event) {
        var featureKey = event.target.getAttribute('data-feature-key');
        if (!featureKey) return;
        var state = readStateFromUrl();
        if (!state.featureFlags) {
          state.featureFlags = {};
        }
        state.featureFlags[featureKey] = event.target.checked;
        if (state.mode === 'size_guide') {
          state.mode = '';
        }
        updateUrlFromState(state, { replace: true });
        applyStateToControls(state);
        runSearch(state);
      }

      function handleSortChange(event) {
        var value = event.target.value || 'distance';
        var state = readStateFromUrl();
        state.sortBy = value;
        updateUrlFromState(state, { replace: true });
        applyStateToControls(state);
        runSearch(state);
      }

      function handleApplyFiltersClick() {
        var state = readStateFromUrl();
        runSearch(state);
      }

      function handleExitSizeGuideMode() {
        var state = readStateFromUrl();
        state.mode = '';
        state.unitSizeId = '';
        updateUrlFromState(state, { replace: true });
        applyStateToControls(state);
        runSearch(state);
      }

      function handleViewLocationDetails(target) {
        var locationId = target.getAttribute('data-location-id');
        if (!locationId) return;
        var state = readStateFromUrl();
        var params = new URLSearchParams();
        params.set('locationId', locationId);
        params.set('source', 'locations');
        if (state.unitSizeId) {
          params.set('unitSizeId', state.unitSizeId);
        }
        window.location.href = 'location_detail.html?' + params.toString();
      }

      function handleViewLocationUnits(target) {
        var locationId = target.getAttribute('data-location-id');
        if (!locationId) return;
        var state = readStateFromUrl();
        var params = new URLSearchParams();
        params.set('locationId', locationId);
        params.set('source', 'locations');
        if (state.unitSizeId) {
          params.set('unitSizeId', state.unitSizeId);
        }
        params.set('view', 'units');
        window.location.href = 'location_detail.html?' + params.toString();
      }

      function setupActionHandlers() {
        var actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(element) {
          var action = element.getAttribute('data-action');
          if (action === 'submitSearch') {
            element.addEventListener('submit', handleSearchSubmit);
          } else if (action === 'changeDistance') {
            element.addEventListener('change', handleDistanceChange);
          } else if (action === 'changeMinRating') {
            element.addEventListener('change', handleMinRatingChange);
          } else if (action === 'toggleClimateControl') {
            element.addEventListener('change', handleClimateToggle);
          } else if (action === 'changeSort') {
            element.addEventListener('change', handleSortChange);
          } else if (action === 'applyFilters') {
            element.addEventListener('click', handleApplyFiltersClick);
          } else if (action === 'exitSizeGuideMode') {
            element.addEventListener('click', handleExitSizeGuideMode);
          } else if (action === 'toggleFeatureFlag') {
            element.addEventListener('change', handleFeatureFlagToggle);
          }
        });

        if (resultsContainer) {
          resultsContainer.addEventListener('click', function(event) {
            var target = event.target.closest('[data-action]');
            if (!target) return;
            var action = target.getAttribute('data-action');
            if (action === 'viewLocationDetails') {
              event.preventDefault();
              handleViewLocationDetails(target);
            } else if (action === 'viewLocationUnits') {
              event.preventDefault();
              handleViewLocationUnits(target);
            }
          });
        }
      }

      // Data-populate elements that depend directly on SDK calls already done
      (function initialisePopulateElements() {
        var populateEls = document.querySelectorAll('[data-populate]');
        var preferredSummaryLocal = null;
        try {
          preferredSummaryLocal = WebsiteSDK.getPreferredLocationSummary();
        } catch (err) {
          preferredSummaryLocal = null;
        }
        var filterOptsLocal = null;
        try {
          filterOptsLocal = WebsiteSDK.getLocationSearchFilterOptions();
        } catch (err) {
          filterOptsLocal = null;
        }
        populateEls.forEach(function(el) {
          var type = el.getAttribute('data-populate');
          if (type === 'preferredLocationSummary') {
            renderPreferredLocation(el, preferredSummaryLocal);
          } else if (type === 'filterOptionsLoader') {
            renderFilterOptionsLoader(el, false);
          } else if (type === 'featureFlags' && filterOptsLocal) {
            var state = readStateFromUrl();
            renderFeatureFlags(el, filterOptsLocal.feature_flags, state);
          }
        });
      })();

      setupActionHandlers();
      runInitialDataLoadAndSearch();
    });
  </script>
</body>
</html>
