<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Domain Registrar Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="domain_detail.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header" role="banner">
      <div class="site-header-inner">
        <a href="index.html" class="brand" aria-label="Domain registrar home">
          <span class="brand-mark">DR</span>
          <span class="brand-text">Domain Registrar</span>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <ul class="nav-list">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="bulk_search.html" class="nav-link">Bulk Search</a></li>
            <li class="nav-item"><a href="domain_deals.html" class="nav-link">Deals &amp; Alerts</a></li>
            <li class="nav-item"><a href="whois.html" class="nav-link">WHOIS Lookup</a></li>
            <li class="nav-item"><a href="support.html" class="nav-link">Support</a></li>
            <li class="nav-item"><a href="cart.html" class="nav-link">Cart</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <div class="domain-detail-page">
        <!-- Slim preferences + mini-cart header bar inside main -->
        <section class="utility-header-bar" aria-label="Site preferences and cart">
          <div class="utility-header-inner">
            <div class="utility-preferences" data-component="site-preferences-controller" data-populate="preferences"></div>
            <button type="button" class="utility-mini-cart" data-component="header-mini-cart-summary" data-populate="mini-cart" data-action="view-cart-from-mini-cart" aria-label="View cart">
              <!-- Mini-cart summary populated by JS -->
            </button>
          </div>
        </section>

        <div class="domain-detail-main-column">
          <nav class="breadcrumbs" data-component="breadcrumbs-nav" data-populate="breadcrumbs" aria-label="Breadcrumb navigation">
            <!-- Breadcrumbs populated by JS -->
          </nav>

          <section class="message-center" data-component="domain-detail-messages" data-populate="messages" aria-live="polite">
            <!-- Messages populated by JS -->
          </section>

          <section class="domain-header-section" data-component="domain-header-info" data-populate="domain-header">
            <!-- Domain header info populated by JS -->
          </section>

          <section class="domain-pricing-section" data-component="domain-pricing-summary" data-populate="domain-pricing">
            <!-- Domain pricing summary populated by JS -->
          </section>

          <section class="purchase-card" aria-label="Domain registration options">
            <div class="purchase-card-inner-wrapper">
              <div class="purchase-card-duration" data-component="registration-duration-selector" data-populate="registration-duration">
                <!-- Registration duration selector populated by JS -->
              </div>
              <div class="purchase-card-actions-wrapper" data-component="add-domain-to-cart-form" data-populate="add-to-cart">
                <!-- Add-to-cart form populated by JS -->
              </div>
            </div>
          </section>

          <section class="addons-card" data-component="add-on-recommendations" data-populate="add-ons" aria-label="Recommended add-ons">
            <!-- Add-on recommendations populated by JS -->
          </section>
        </div>

        <div class="domain-detail-loader-overlay is-hidden" data-component="domain-detail-loader" aria-hidden="true">
          <div class="loader-backdrop"></div>
          <div class="loader-spinner" role="status" aria-live="polite">
            <span class="visually-hidden">Loading</span>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="footer-inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-nav-list">
            <li class="footer-nav-item"><a href="about.html" class="footer-link">About</a></li>
            <li class="footer-nav-item"><a href="domain_deals.html" class="footer-link">Domain Deals &amp; Alerts</a></li>
            <li class="footer-nav-item"><a href="support.html" class="footer-link">Support</a></li>
            <li class="footer-nav-item"><a href="whois.html" class="footer-link">WHOIS &amp; Domain Details</a></li>
            <li class="footer-nav-item"><a href="terms.html" class="footer-link">Terms of Service</a></li>
            <li class="footer-nav-item"><a href="privacy.html" class="footer-link">Privacy Policy</a></li>
          </ul>
        </nav>
        <p class="footer-meta">&copy; <span class="footer-year">2026</span> Domain Registrar. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var urlParams = new URLSearchParams(window.location.search);
      var domainId = urlParams.get('id');
      var originalSearchTerm = urlParams.get('originalSearchTerm') || urlParams.get('query') || '';
      var languageParam = urlParams.get('language');
      var currencyParam = urlParams.get('currency');

      var prefsContainer = document.querySelector('[data-component="site-preferences-controller"]');
      var miniCartContainer = document.querySelector('[data-component="header-mini-cart-summary"]');
      var breadcrumbsContainer = document.querySelector('[data-component="breadcrumbs-nav"]');
      var messagesContainer = document.querySelector('[data-component="domain-detail-messages"]');
      var domainHeaderContainer = document.querySelector('[data-component="domain-header-info"]');
      var pricingContainer = document.querySelector('[data-component="domain-pricing-summary"]');
      var durationContainer = document.querySelector('[data-component="registration-duration-selector"]');
      var addToCartContainer = document.querySelector('[data-component="add-domain-to-cart-form"]');
      var addonsContainer = document.querySelector('[data-component="add-on-recommendations"]');
      var loaderOverlay = document.querySelector('[data-component="domain-detail-loader"]');

      var state = {
        preferences: null,
        domainDetails: null,
        selectedYears: null,
        miniCartSummary: null,
        messages: [],
        lastAddedItem: null,
        lastAddedCurrency: null,
        originalSearchTerm: originalSearchTerm
      };

      var messageIdCounter = 0;

      var LABELS = {
        en: {
          languageLabel: 'Language',
          currencyLabel: 'Currency',
          cartLabelEmpty: 'Cart',
          cartItemsSuffix: 'items',
          viewCart: 'View Cart',
          viewCartAction: 'View Cart',
          registrationDurationLabel: 'Registration duration',
          registrationDurationDescription: 'Choose how many years you want to register this domain.',
          domainUnavailable: 'This domain is not currently available for new registration.',
          addToCart: 'Add to Cart',
          cannotAddReasonFallback: 'This domain cannot be added to the cart at the moment.',
          selectedDurationSummary: '{years} year registration',
          selectedDurationSummaryPlural: '{years} years registration',
          pricesPerYearLabel: 'per year',
          totalLabel: 'Total',
          backToResults: 'Back to results for',
          breadcrumbCurrent: 'Domain details',
          retry: 'Retry',
          successAddedTitle: 'Added to cart',
          availability_available: 'Available',
          availability_registered: 'Registered',
          availability_unavailable: 'Unavailable',
          availability_premium: 'Premium domain',
          addOnsTitle: 'Recommended add-ons',
          addOnsNone: 'No add-ons are recommended for this domain.',
          perYear: 'per year',
          messages_missingId: 'We could not load this domain. The link is missing an id parameter.',
          messages_domainLoadError: 'We could not load details for this domain. Please try again.',
          addToCartSuccessMessage: 'This domain was added to your cart.',
          miniCartEmpty: 'Cart is empty'
        },
        es: {
          languageLabel: 'Idioma',
          currencyLabel: 'Moneda',
          cartLabelEmpty: 'Carrito',
          cartItemsSuffix: 'artículos',
          viewCart: 'Ver carrito',
          viewCartAction: 'Ver carrito',
          registrationDurationLabel: 'Duración del registro',
          registrationDurationDescription: 'Elige por cuántos años quieres registrar este dominio.',
          domainUnavailable: 'Este dominio no está disponible actualmente para un nuevo registro.',
          addToCart: 'Agregar al carrito',
          cannotAddReasonFallback: 'Este dominio no se puede agregar al carrito en este momento.',
          selectedDurationSummary: 'Registro de {years} año',
          selectedDurationSummaryPlural: 'Registro de {years} años',
          pricesPerYearLabel: 'por año',
          totalLabel: 'Total',
          backToResults: 'Volver a los resultados de',
          breadcrumbCurrent: 'Detalles del dominio',
          retry: 'Reintentar',
          successAddedTitle: 'Agregado al carrito',
          availability_available: 'Disponible',
          availability_registered: 'Registrado',
          availability_unavailable: 'No disponible',
          availability_premium: 'Dominio premium',
          addOnsTitle: 'Complementos recomendados',
          addOnsNone: 'No hay complementos recomendados para este dominio.',
          perYear: 'por año',
          messages_missingId: 'No pudimos cargar este dominio. Falta el parámetro id en el enlace.',
          messages_domainLoadError: 'No pudimos cargar los detalles de este dominio. Inténtalo de nuevo.',
          addToCartSuccessMessage: 'Este dominio se agregó a tu carrito.',
          miniCartEmpty: 'El carrito está vacío'
        }
      };

      function t(key) {
        var lang = (state.preferences && state.preferences.language) || 'en';
        var dict = LABELS[lang] || LABELS.en;
        if (dict && Object.prototype.hasOwnProperty.call(dict, key)) {
          return dict[key];
        }
        if (LABELS.en && Object.prototype.hasOwnProperty.call(LABELS.en, key)) {
          return LABELS.en[key];
        }
        return key;
      }

      function formatCurrency(amount, currency) {
        var effectiveCurrency = currency || (state.preferences && state.preferences.currency) || 'usd';
        var langCode = (state.preferences && state.preferences.language) === 'es' ? 'es-ES' : 'en-US';
        var isoCurrency = (effectiveCurrency || 'usd').toUpperCase();
        try {
          return new Intl.NumberFormat(langCode, { style: 'currency', currency: isoCurrency }).format(amount);
        } catch (e) {
          var symbol = '$';
          if (effectiveCurrency === 'eur') {
            symbol = '€';
          }
          var val = typeof amount === 'number' ? amount.toFixed(2) : amount;
          return symbol + val;
        }
      }

      function formatDurationLabel(years) {
        if (years === 1) {
          return t('selectedDurationSummary').replace('{years}', String(years));
        }
        return t('selectedDurationSummaryPlural').replace('{years}', String(years));
      }

      function getDefaultYears(domainDetails) {
        if (domainDetails && domainDetails.pricing && domainDetails.pricing.registrationDurations && domainDetails.pricing.registrationDurations.length) {
          var first = domainDetails.pricing.registrationDurations[0];
          if (first && typeof first.years === 'number') {
            return first.years;
          }
        }
        return 1;
      }

      function setLoaderVisible(isVisible) {
        if (!loaderOverlay) return;
        if (isVisible) {
          loaderOverlay.classList.remove('is-hidden');
          loaderOverlay.setAttribute('aria-hidden', 'false');
        } else {
          loaderOverlay.classList.add('is-hidden');
          loaderOverlay.setAttribute('aria-hidden', 'true');
        }
      }

      function renderPreferences(container, prefs) {
        if (!container) return;
        container.innerHTML = '';
        var wrapper = document.createElement('div');
        wrapper.className = 'preferences-controls';

        var langLabel = document.createElement('label');
        langLabel.className = 'field-label';
        langLabel.textContent = t('languageLabel') + ' ';
        var langSelect = document.createElement('select');
        langSelect.className = 'field-select';
        langSelect.setAttribute('data-action', 'change-language');
        var optEn = document.createElement('option');
        optEn.value = 'en';
        optEn.textContent = 'English';
        var optEs = document.createElement('option');
        optEs.value = 'es';
        optEs.textContent = 'Español';
        langSelect.appendChild(optEn);
        langSelect.appendChild(optEs);
        langSelect.value = (prefs && prefs.language) || 'en';
        langLabel.appendChild(langSelect);
        wrapper.appendChild(langLabel);

        var curLabel = document.createElement('label');
        curLabel.className = 'field-label';
        curLabel.textContent = t('currencyLabel') + ' ';
        var curSelect = document.createElement('select');
        curSelect.className = 'field-select';
        curSelect.setAttribute('data-action', 'change-currency');
        var optUsd = document.createElement('option');
        optUsd.value = 'usd';
        optUsd.textContent = 'USD';
        var optEur = document.createElement('option');
        optEur.value = 'eur';
        optEur.textContent = 'EUR';
        curSelect.appendChild(optUsd);
        curSelect.appendChild(optEur);
        curSelect.value = (prefs && prefs.currency) || 'usd';
        curLabel.appendChild(curSelect);
        wrapper.appendChild(curLabel);

        container.appendChild(wrapper);
      }

      function renderMiniCart(container, summary) {
        if (!container) return;
        container.innerHTML = '';
        var hasSummary = summary && typeof summary.itemCount === 'number';
        var labelSpan = document.createElement('span');
        labelSpan.className = 'mini-cart-label';
        labelSpan.textContent = t('cartLabelEmpty');
        container.appendChild(labelSpan);

        var countSpan = document.createElement('span');
        countSpan.className = 'mini-cart-count';
        if (hasSummary && summary.itemCount > 0) {
          countSpan.textContent = ' (' + summary.itemCount + ' ' + t('cartItemsSuffix') + ')';
        } else {
          countSpan.textContent = '';
        }
        container.appendChild(countSpan);

        if (hasSummary && summary.itemCount > 0 && typeof summary.total === 'number') {
          var totalSpan = document.createElement('span');
          totalSpan.className = 'mini-cart-total';
          totalSpan.textContent = ' · ' + formatCurrency(summary.total, summary.currency);
          container.appendChild(totalSpan);
        } else {
          var emptyHint = document.createElement('span');
          emptyHint.className = 'mini-cart-empty-hint';
          emptyHint.textContent = ' · ' + t('miniCartEmpty');
          container.appendChild(emptyHint);
        }
      }

      function renderBreadcrumbs(container) {
        if (!container) return;
        container.innerHTML = '';
        var inner = document.createElement('div');
        inner.className = 'breadcrumbs-inner';

        if (state.originalSearchTerm) {
          var link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.className = 'breadcrumb-link';
          link.setAttribute('data-action', 'back-to-results');
          link.setAttribute('data-query', state.originalSearchTerm);
          link.textContent = t('backToResults') + ' "' + state.originalSearchTerm + '"';
          inner.appendChild(link);
        } else {
          var current = document.createElement('span');
          current.className = 'breadcrumb-current';
          current.textContent = t('breadcrumbCurrent');
          inner.appendChild(current);
        }

        container.appendChild(inner);
      }

      function renderMessages(container) {
        if (!container) return;
        container.innerHTML = '';
        if (!state.messages.length) {
          return;
        }
        for (var i = 0; i < state.messages.length; i++) {
          var msg = state.messages[i];
          var msgDiv = document.createElement('div');
          var severity = msg.severity || 'info';
          msgDiv.className = 'message message-' + severity;
          msgDiv.setAttribute('data-message-id', msg.id);

          var textP = document.createElement('p');
          textP.className = 'message-text';
          textP.textContent = msg.text;
          msgDiv.appendChild(textP);

          if (msg.canRetry) {
            var retryBtn = document.createElement('button');
            retryBtn.type = 'button';
            retryBtn.className = 'message-action';
            retryBtn.setAttribute('data-action', 'retry-load-domain');
            retryBtn.setAttribute('data-message-id', msg.id);
            retryBtn.textContent = t('retry');
            msgDiv.appendChild(retryBtn);
          }

          var closeBtn = document.createElement('button');
          closeBtn.type = 'button';
          closeBtn.className = 'message-close';
          closeBtn.setAttribute('data-action', 'dismiss-message');
          closeBtn.setAttribute('data-message-id', msg.id);
          closeBtn.textContent = '×';
          msgDiv.appendChild(closeBtn);

          container.appendChild(msgDiv);
        }
      }

      function pushMessage(message) {
        if (!message) return;
        messageIdCounter += 1;
        message.id = 'm' + messageIdCounter;
        state.messages.push(message);
        renderMessages(messagesContainer);
      }

      function removeMessageById(id) {
        var next = [];
        for (var i = 0; i < state.messages.length; i++) {
          if (state.messages[i].id !== id) {
            next.push(state.messages[i]);
          }
        }
        state.messages = next;
        renderMessages(messagesContainer);
      }

      function clearMessages() {
        state.messages = [];
        renderMessages(messagesContainer);
      }

      function renderDomainHeader(container, details) {
        if (!container) return;
        container.innerHTML = '';
        if (!details) return;

        var wrapper = document.createElement('div');
        wrapper.className = 'domain-header-inner';

        var title = document.createElement('h1');
        title.className = 'domain-title';
        title.textContent = details.fullDomain || '';
        wrapper.appendChild(title);

        var metaRow = document.createElement('div');
        metaRow.className = 'domain-meta';

        if (details.tld) {
          var tldSpan = document.createElement('span');
          tldSpan.className = 'domain-tld';
          tldSpan.textContent = details.tld;
          metaRow.appendChild(tldSpan);
        }

        var statusSpan = document.createElement('span');
        statusSpan.className = 'domain-status';
        var statusKey = 'availability_' + (details.availabilityStatus || 'available');
        statusSpan.textContent = t(statusKey);
        statusSpan.className += ' status-' + (details.availabilityStatus || 'available');
        metaRow.appendChild(statusSpan);

        if (details.isPremium) {
          var badge = document.createElement('span');
          badge.className = 'domain-badge badge-premium';
          badge.textContent = t('availability_premium');
          metaRow.appendChild(badge);
        }

        if (details.recommended) {
          var rec = document.createElement('span');
          rec.className = 'domain-badge badge-recommended';
          rec.textContent = (state.preferences && state.preferences.language) === 'es' ? 'Recomendado' : 'Recommended';
          metaRow.appendChild(rec);
        }

        wrapper.appendChild(metaRow);
        container.appendChild(wrapper);
      }

      function renderPricingSummary(container, details, selectedYears) {
        if (!container) return;
        container.innerHTML = '';
        if (!details || !details.pricing) return;

        var wrapper = document.createElement('div');
        wrapper.className = 'pricing-summary-inner';

        var basePrice = details.pricing.yearlyPrice;
        if (typeof basePrice !== 'number' && details.pricing.registrationDurations && details.pricing.registrationDurations.length) {
          var first = details.pricing.registrationDurations[0];
          if (first && typeof first.yearlyPrice === 'number') {
            basePrice = first.yearlyPrice;
          }
        }

        if (typeof basePrice === 'number') {
          var baseP = document.createElement('p');
          baseP.className = 'pricing-base';
          baseP.textContent = formatCurrency(basePrice, details.pricing.currency) + ' ' + t('pricesPerYearLabel');
          wrapper.appendChild(baseP);
        }

        if (selectedYears) {
          var durations = (details.pricing && details.pricing.registrationDurations) || [];
          var selected = null;
          for (var i = 0; i < durations.length; i++) {
            if (durations[i].years === selectedYears) {
              selected = durations[i];
              break;
            }
          }
          var totalAmount = null;
          if (selected && typeof selected.totalPrice === 'number') {
            totalAmount = selected.totalPrice;
          } else if (selected && typeof selected.yearlyPrice === 'number') {
            totalAmount = selected.yearlyPrice * selected.years;
          } else if (typeof basePrice === 'number') {
            totalAmount = basePrice * selectedYears;
          }

          if (typeof totalAmount === 'number') {
            var totalP = document.createElement('p');
            totalP.className = 'pricing-total';
            var labelSpan = document.createElement('span');
            labelSpan.className = 'pricing-total-label';
            labelSpan.textContent = t('totalLabel') + ': ';
            totalP.appendChild(labelSpan);

            var amountSpan = document.createElement('span');
            amountSpan.className = 'pricing-total-amount';
            amountSpan.textContent = formatCurrency(totalAmount, details.pricing.currency);
            totalP.appendChild(amountSpan);

            totalP.appendChild(document.createTextNode(' (' + formatDurationLabel(selectedYears) + ')'));
            wrapper.appendChild(totalP);
          }
        }

        container.appendChild(wrapper);
      }

      function renderDurationSelector(container, details, selectedYears) {
        if (!container) return;
        container.innerHTML = '';

        if (!details || !details.pricing || !details.pricing.registrationDurations || !details.pricing.registrationDurations.length) {
          var noDur = document.createElement('p');
          noDur.className = 'duration-unavailable';
          noDur.textContent = t('domainUnavailable');
          container.appendChild(noDur);
          return;
        }

        var wrapper = document.createElement('div');
        wrapper.className = 'duration-selector-inner';

        var labelEl = document.createElement('label');
        labelEl.className = 'field-label';
        labelEl.textContent = t('registrationDurationLabel') + ' ';

        var select = document.createElement('select');
        select.className = 'duration-select';
        select.setAttribute('data-action', 'change-duration');

        var durations = details.pricing.registrationDurations;
        for (var i = 0; i < durations.length; i++) {
          var d = durations[i];
          if (!d || typeof d.years !== 'number') continue;
          var opt = document.createElement('option');
          opt.value = String(d.years);

          var perYearPrice = typeof d.yearlyPrice === 'number' ? d.yearlyPrice : (details.pricing.yearlyPrice || 0);
          var totalAmount;
          if (typeof d.totalPrice === 'number') {
            totalAmount = d.totalPrice;
          } else {
            totalAmount = perYearPrice * d.years;
          }

          opt.textContent = formatDurationLabel(d.years) + ' – ' + formatCurrency(totalAmount, details.pricing.currency);

          if (selectedYears && d.years === selectedYears) {
            opt.selected = true;
          }
          select.appendChild(opt);
        }

        if (!selectedYears && durations.length) {
          select.value = String(durations[0].years);
        }

        labelEl.appendChild(select);
        wrapper.appendChild(labelEl);

        var desc = document.createElement('p');
        desc.className = 'field-description';
        desc.textContent = t('registrationDurationDescription');
        wrapper.appendChild(desc);

        container.appendChild(wrapper);
      }

      function renderAddToCartCard(container, details, selectedYears, addedItem, addedCurrency) {
        if (!container) return;
        container.innerHTML = '';

        var wrapper = document.createElement('div');
        wrapper.className = 'purchase-card-inner';

        var title = document.createElement('h2');
        title.className = 'purchase-card-title';
        title.textContent = t('addToCart');
        wrapper.appendChild(title);

        var summaryP = document.createElement('p');
        summaryP.className = 'purchase-card-summary';

        if (details && details.fullDomain) {
          var domainSpan = document.createElement('span');
          domainSpan.className = 'purchase-card-domain';
          domainSpan.textContent = details.fullDomain;
          summaryP.appendChild(domainSpan);
        }

        if (selectedYears) {
          if (summaryP.childNodes.length) {
            summaryP.appendChild(document.createTextNode(' · '));
          }
          var durSpan = document.createElement('span');
          durSpan.className = 'purchase-card-duration';
          durSpan.textContent = formatDurationLabel(selectedYears);
          summaryP.appendChild(durSpan);
        }

        var totalAmount = null;
        var currency = details && details.pricing ? details.pricing.currency : null;
        if (details && details.pricing && selectedYears) {
          var durations = details.pricing.registrationDurations || [];
          var selected = null;
          for (var i = 0; i < durations.length; i++) {
            if (durations[i].years === selectedYears) {
              selected = durations[i];
              break;
            }
          }
          if (selected && typeof selected.totalPrice === 'number') {
            totalAmount = selected.totalPrice;
          } else if (selected && typeof selected.yearlyPrice === 'number') {
            totalAmount = selected.yearlyPrice * selected.years;
          } else if (typeof details.pricing.yearlyPrice === 'number') {
            totalAmount = details.pricing.yearlyPrice * selectedYears;
          }
        }

        if (typeof totalAmount === 'number') {
          if (summaryP.childNodes.length) {
            summaryP.appendChild(document.createTextNode(' · '));
          }
          var priceSpan = document.createElement('span');
          priceSpan.className = 'purchase-card-total';
          priceSpan.textContent = formatCurrency(totalAmount, currency);
          summaryP.appendChild(priceSpan);
        }

        wrapper.appendChild(summaryP);

        if (details && details.canBeAddedToCart === false) {
          var disabledMsg = document.createElement('p');
          disabledMsg.className = 'purchase-card-disabled-message';
          disabledMsg.textContent = details.cannotAddReason || t('cannotAddReasonFallback');
          wrapper.appendChild(disabledMsg);
        }

        var actionsRow = document.createElement('div');
        actionsRow.className = 'purchase-card-actions';

        var addButton = document.createElement('button');
        addButton.type = 'button';
        addButton.className = 'primary-button';
        addButton.setAttribute('data-action', 'submit-add-domain');
        addButton.textContent = t('addToCart');
        if (!details || details.canBeAddedToCart === false) {
          addButton.disabled = true;
        }
        actionsRow.appendChild(addButton);

        var viewCartBtn = document.createElement('button');
        viewCartBtn.type = 'button';
        viewCartBtn.className = 'text-button';
        viewCartBtn.setAttribute('data-action', 'view-cart-from-confirmation');
        viewCartBtn.textContent = t('viewCartAction');
        actionsRow.appendChild(viewCartBtn);

        wrapper.appendChild(actionsRow);

        if (addedItem) {
          var confirmation = document.createElement('div');
          confirmation.className = 'purchase-card-confirmation';

          var confirmTitle = document.createElement('div');
          confirmTitle.className = 'purchase-card-confirmation-title';
          confirmTitle.textContent = t('successAddedTitle');
          confirmation.appendChild(confirmTitle);

          var confirmBody = document.createElement('p');
          confirmBody.className = 'purchase-card-confirmation-body';
          var parts = [];
          if (addedItem.fullDomain) {
            parts.push(addedItem.fullDomain);
          }
          if (addedItem.registrationYears) {
            parts.push(formatDurationLabel(addedItem.registrationYears));
          }
          if (typeof addedItem.lineSubtotal === 'number') {
            var itemCurrency = addedCurrency || (state.preferences && state.preferences.currency) || 'usd';
            parts.push(formatCurrency(addedItem.lineSubtotal, itemCurrency));
          }
          confirmBody.textContent = parts.join(' · ');
          confirmation.appendChild(confirmBody);

          wrapper.appendChild(confirmation);
        }

        container.appendChild(wrapper);
      }

      function renderAddOnRecommendations(container, details) {
        if (!container) return;
        container.innerHTML = '';

        var wrapper = document.createElement('div');
        wrapper.className = 'addons-inner';

        var title = document.createElement('h2');
        title.className = 'addons-title';
        title.textContent = t('addOnsTitle');
        wrapper.appendChild(title);

        var listContainer = document.createElement('div');
        listContainer.className = 'addons-list';

        var recs = (details && details.addOnRecommendations) || [];
        if (!recs.length) {
          var none = document.createElement('p');
          none.className = 'addons-empty';
          none.textContent = t('addOnsNone');
          listContainer.appendChild(none);
        } else {
          for (var i = 0; i < recs.length; i++) {
            var rec = recs[i];
            if (!rec) continue;
            var row = document.createElement('article');
            row.className = 'addon-item';
            if (rec.type) {
              row.setAttribute('data-type', rec.type);
            }

            var heading = document.createElement('h3');
            heading.className = 'addon-name';
            heading.textContent = rec.name || '';
            row.appendChild(heading);

            if (rec.type) {
              var typeBadge = document.createElement('span');
              typeBadge.className = 'addon-type';
              typeBadge.textContent = rec.type;
              row.appendChild(typeBadge);
            }

            if (rec.description) {
              var desc = document.createElement('p');
              desc.className = 'addon-description';
              desc.textContent = rec.description;
              row.appendChild(desc);
            }

            if (typeof rec.estimatedPricePerYear === 'number' && details && details.pricing) {
              var priceP = document.createElement('p');
              priceP.className = 'addon-price';
              priceP.textContent = formatCurrency(rec.estimatedPricePerYear, details.pricing.currency) + ' ' + t('perYear');
              row.appendChild(priceP);
            }

            listContainer.appendChild(row);
          }
        }

        wrapper.appendChild(listContainer);
        container.appendChild(wrapper);
      }

      function initializePreferences() {
        var prefs = null;
        try {
          prefs = WebsiteSDK.getSitePreferences();
        } catch (e) {
          prefs = { language: 'en', currency: 'usd' };
        }

        var targetLanguage = languageParam || (prefs && prefs.language) || 'en';
        var targetCurrency = currencyParam || (prefs && prefs.currency) || 'usd';

        if ((targetLanguage && prefs && targetLanguage !== prefs.language) || (targetCurrency && prefs && targetCurrency !== prefs.currency)) {
          try {
            var updated = WebsiteSDK.updateSitePreferences(targetLanguage, targetCurrency);
            if (updated && updated.success === false) {
              pushMessage({ severity: 'error', text: updated.message || 'Unable to update site preferences.' });
            } else if (updated) {
              prefs = { language: updated.language || targetLanguage, currency: updated.currency || targetCurrency };
            }
          } catch (err) {
            pushMessage({ severity: 'error', text: 'Unable to update site preferences.' });
          }
        }

        state.preferences = prefs || { language: 'en', currency: 'usd' };
        renderPreferences(prefsContainer, state.preferences);
      }

      function initializeMiniCart() {
        var summary = null;
        try {
          summary = WebsiteSDK.getMiniCartSummary();
        } catch (e) {
          summary = null;
        }
        if (summary) {
          state.miniCartSummary = summary;
        }
        renderMiniCart(miniCartContainer, state.miniCartSummary);
      }

      function loadDomainDetails(preserveSelection) {
        if (!domainId) return;
        setLoaderVisible(true);
        var details = null;
        try {
          details = WebsiteSDK.getDomainDetails(domainId);
        } catch (e) {
          setLoaderVisible(false);
          pushMessage({ severity: 'error', text: t('messages_domainLoadError'), canRetry: true });
          return;
        }

        if (!details || !details.domainId) {
          setLoaderVisible(false);
          pushMessage({ severity: 'error', text: t('messages_domainLoadError'), canRetry: true });
          return;
        }

        state.domainDetails = details;

        var defaultYears = getDefaultYears(details);
        if (preserveSelection && state.selectedYears) {
          var durations = (details.pricing && details.pricing.registrationDurations) || [];
          var found = false;
          for (var i = 0; i < durations.length; i++) {
            if (durations[i].years === state.selectedYears) {
              found = true;
              break;
            }
          }
          state.selectedYears = found ? state.selectedYears : defaultYears;
        } else {
          state.selectedYears = defaultYears;
        }

        renderDomainHeader(domainHeaderContainer, details);
        renderPricingSummary(pricingContainer, details, state.selectedYears);
        renderDurationSelector(durationContainer, details, state.selectedYears);
        renderAddToCartCard(addToCartContainer, details, state.selectedYears, state.lastAddedItem, state.lastAddedCurrency);
        renderAddOnRecommendations(addonsContainer, details);

        setLoaderVisible(false);
      }

      function handleDurationChange(value) {
        var years = parseInt(value, 10);
        if (!years || !state.domainDetails) return;
        state.selectedYears = years;
        renderPricingSummary(pricingContainer, state.domainDetails, state.selectedYears);
        renderAddToCartCard(addToCartContainer, state.domainDetails, state.selectedYears, state.lastAddedItem, state.lastAddedCurrency);
      }

      function handleLanguageChange(newLang) {
        if (!newLang) return;
        var currentCurrency = (state.preferences && state.preferences.currency) || 'usd';
        try {
          var updated = WebsiteSDK.updateSitePreferences(newLang, currentCurrency);
          if (updated && updated.success === false) {
            pushMessage({ severity: 'error', text: updated.message || 'Unable to update language.' });
            return;
          }
          if (updated) {
            state.preferences = { language: updated.language || newLang, currency: updated.currency || currentCurrency };
          } else {
            state.preferences = { language: newLang, currency: currentCurrency };
          }
        } catch (e) {
          pushMessage({ severity: 'error', text: 'Unable to update language.' });
          return;
        }

        renderPreferences(prefsContainer, state.preferences);
        renderBreadcrumbs(breadcrumbsContainer);
        if (domainId) {
          loadDomainDetails(true);
        }
        initializeMiniCart();
      }

      function handleCurrencyChange(newCurrency) {
        if (!newCurrency) return;
        var currentLanguage = (state.preferences && state.preferences.language) || 'en';
        try {
          var updated = WebsiteSDK.updateSitePreferences(currentLanguage, newCurrency);
          if (updated && updated.success === false) {
            pushMessage({ severity: 'error', text: updated.message || 'Unable to update currency.' });
            return;
          }
          if (updated) {
            state.preferences = { language: updated.language || currentLanguage, currency: updated.currency || newCurrency };
          } else {
            state.preferences = { language: currentLanguage, currency: newCurrency };
          }
        } catch (e) {
          pushMessage({ severity: 'error', text: 'Unable to update currency.' });
          return;
        }

        renderPreferences(prefsContainer, state.preferences);
        renderBreadcrumbs(breadcrumbsContainer);
        if (domainId) {
          loadDomainDetails(true);
        }
        initializeMiniCart();
      }

      function normalizeCartToMiniSummary(cart) {
        if (!cart) return null;
        return {
          hasActiveCart: true,
          itemCount: typeof cart.itemCount === 'number' ? cart.itemCount : 0,
          subtotal: cart.subtotal,
          discountTotal: cart.discountTotal,
          total: cart.total,
          currency: cart.currency
        };
      }

      function handleAddToCart() {
        if (!domainId || !state.domainDetails) return;
        if (state.domainDetails.canBeAddedToCart === false) {
          pushMessage({ severity: 'error', text: state.domainDetails.cannotAddReason || t('cannotAddReasonFallback') });
          return;
        }
        var years = state.selectedYears || getDefaultYears(state.domainDetails);
        try {
          var result = WebsiteSDK.addDomainToCart(domainId, years);
          if (!result || result.success === false) {
            var errMsg = (result && result.message) || 'Unable to add domain to cart.';
            pushMessage({ severity: 'error', text: errMsg });
            return;
          }

          if (result.cart) {
            state.lastAddedItem = result.cart.addedItem || null;
            state.lastAddedCurrency = result.cart.currency || null;
            state.miniCartSummary = normalizeCartToMiniSummary(result.cart);
            renderMiniCart(miniCartContainer, state.miniCartSummary);
          }

          renderAddToCartCard(addToCartContainer, state.domainDetails, years, state.lastAddedItem, state.lastAddedCurrency);

          var successText = t('addToCartSuccessMessage');
          if (state.lastAddedItem && state.lastAddedItem.fullDomain) {
            successText += ' ' + state.lastAddedItem.fullDomain + '.';
          }
          pushMessage({ severity: 'success', text: successText });
        } catch (e) {
          pushMessage({ severity: 'error', text: 'Unable to add domain to cart.' });
        }
      }

      document.addEventListener('click', function (event) {
        var target = event.target || event.srcElement;
        if (!target) return;
        var actionEl = target.closest ? target.closest('[data-action]') : null;
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');
        if (!action) return;

        if (action === 'view-cart' || action === 'view-cart-from-mini-cart' || action === 'view-cart-from-confirmation') {
          window.location.href = 'cart.html';
        } else if (action === 'back-to-results') {
          var q = actionEl.getAttribute('data-query') || state.originalSearchTerm || '';
          var dest = 'search_results.html';
          if (q) {
            dest += '?query=' + encodeURIComponent(q);
          }
          window.location.href = dest;
        } else if (action === 'retry-load-domain') {
          var msgId = actionEl.getAttribute('data-message-id');
          if (msgId) {
            removeMessageById(msgId);
          }
          if (domainId) {
            loadDomainDetails(true);
          }
        } else if (action === 'dismiss-message') {
          var mid = actionEl.getAttribute('data-message-id');
          if (mid) {
            removeMessageById(mid);
          }
        } else if (action === 'submit-add-domain') {
          handleAddToCart();
        }
      });

      document.addEventListener('change', function (event) {
        var target = event.target || event.srcElement;
        if (!target) return;
        var action = target.getAttribute('data-action');
        if (!action) return;

        if (action === 'change-language') {
          handleLanguageChange(target.value);
        } else if (action === 'change-currency') {
          handleCurrencyChange(target.value);
        } else if (action === 'change-duration') {
          handleDurationChange(target.value);
        }
      });

      function initializePage() {
        renderMessages(messagesContainer);
        initializePreferences();
        renderBreadcrumbs(breadcrumbsContainer);
        initializeMiniCart();

        if (domainId) {
          loadDomainDetails(false);
        } else {
          pushMessage({ severity: 'error', text: t('messages_missingId') });
        }
      }

      initializePage();
    });
  </script>
</body>
</html>
