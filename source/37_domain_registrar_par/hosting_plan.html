<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hosting Plan Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="hosting_plan.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header" role="banner">
      <div class="site-header-inner">
        <a href="index.html" class="brand" aria-label="Domain registrar home">
          <span class="brand-mark">DR</span>
          <span class="brand-text">Domain Registrar</span>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <ul class="nav-list">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="bulk_search.html" class="nav-link">Bulk Search</a></li>
            <li class="nav-item"><a href="domain_deals.html" class="nav-link">Deals &amp; Alerts</a></li>
            <li class="nav-item"><a href="whois.html" class="nav-link">WHOIS Lookup</a></li>
            <li class="nav-item"><a href="support.html" class="nav-link">Support</a></li>
            <li class="nav-item"><a href="cart.html" class="nav-link">Cart</a></li>
          </ul>
        </nav>
        <div class="header-tools" data-component="header-bar">
          <div class="header-mini-cart" data-component="mini-cart-summary" data-populate="mini-cart-summary" data-action="mini-cart-summary" aria-label="Mini cart summary"></div>
          <div class="header-preferences" data-component="language-currency-selector" data-populate="site-preferences" data-action="preferences" aria-label="Language and currency selector"></div>
        </div>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <div class="hosting-plan-page">
        <div class="hosting-plan-main">
          <section id="plan-error-state" class="plan-error-state" data-component="plan-error-state" aria-live="polite" hidden></section>

          <article class="hosting-plan-card" data-component="hosting-plan-details-panel" aria-label="Hosting plan details">
            <header class="hosting-plan-card-header" data-populate="hosting-plan-header"></header>

            <section class="hosting-plan-card-section" data-component="hosting-plan-feature-list" data-populate="hosting-plan-features"></section>

            <section class="hosting-plan-card-section" data-component="hosting-plan-pricing-summary" data-populate="hosting-plan-pricing"></section>

            <div class="hosting-plan-actions">
              <button type="button" class="button button-secondary" data-component="back-to-registrar-button" data-action="back-to-registrar">
                Back to registrar
              </button>
              <button type="button" class="button button-primary" data-component="hosting-offer-navigation-control" data-action="view-hosting-offer">
                View hosting offer
              </button>
            </div>
            <p class="hosting-offer-hint" id="hosting-offer-hint" aria-live="polite" hidden></p>
          </article>
        </div>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="footer-inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-nav-list">
            <li class="footer-nav-item"><a href="about.html" class="footer-link">About</a></li>
            <li class="footer-nav-item"><a href="domain_deals.html" class="footer-link">Domain Deals &amp; Alerts</a></li>
            <li class="footer-nav-item"><a href="support.html" class="footer-link">Support</a></li>
            <li class="footer-nav-item"><a href="whois.html" class="footer-link">WHOIS &amp; Domain Details</a></li>
            <li class="footer-nav-item"><a href="terms.html" class="footer-link">Terms of Service</a></li>
            <li class="footer-nav-item"><a href="privacy.html" class="footer-link">Privacy Policy</a></li>
          </ul>
        </nav>
        <p class="footer-meta">&copy; <span class="footer-year">2026</span> Domain Registrar. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    (function() {
      'use strict';

      document.addEventListener('DOMContentLoaded', function() {
        var state = {
          sitePreferences: null,
          miniCart: null,
          hostingPlan: null,
          planId: null,
          planErrorType: null,
          planErrorMessage: ''
        };

        // Parse URL parameters
        var urlParams = new URLSearchParams(window.location.search);
        var planId = urlParams.get('planId');
        state.planId = planId;

        if (!planId) {
          state.planErrorType = 'missing_plan_id';
          state.planErrorMessage = 'No hosting plan was specified. Please return to the registrar to continue.';
        }

        // Load site preferences
        try {
          var prefs = WebsiteSDK.getSitePreferences();
          if (prefs && prefs.language && prefs.currency) {
            state.sitePreferences = prefs;
          } else {
            state.sitePreferences = { language: 'en', currency: 'usd' };
          }
        } catch (e) {
          state.sitePreferences = { language: 'en', currency: 'usd' };
        }

        // Load mini-cart summary
        try {
          state.miniCart = WebsiteSDK.getMiniCartSummary();
        } catch (e) {
          state.miniCart = null;
        }

        // Load hosting plan details when planId is present
        if (planId) {
          try {
            var plan = WebsiteSDK.getHostingPlanDetails(planId);
            if (plan && (plan.hostingPlanId || plan.name)) {
              state.hostingPlan = plan;
              state.planErrorType = null;
              state.planErrorMessage = '';
            } else {
              state.hostingPlan = null;
              state.planErrorType = 'plan_not_found';
              state.planErrorMessage = 'We could not find details for this hosting plan.';
            }
          } catch (e) {
            state.hostingPlan = null;
            state.planErrorType = 'plan_load_error';
            state.planErrorMessage = 'There was a problem loading this hosting plan.';
          }
        }

        renderAll(state);
        setupActionHandlers(state);
      });

      function renderAll(state) {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          var dataType = element.dataset.populate;
          if (dataType === 'site-preferences') {
            renderSitePreferences(element, state.sitePreferences);
          } else if (dataType === 'mini-cart-summary') {
            renderMiniCartSummary(element, state.miniCart, state.sitePreferences);
          } else if (dataType === 'hosting-plan-header') {
            renderHostingPlanHeader(element, state.hostingPlan, state.planId);
          } else if (dataType === 'hosting-plan-features') {
            renderHostingPlanFeatures(element, state.hostingPlan);
          } else if (dataType === 'hosting-plan-pricing') {
            renderHostingPlanPricing(element, state.hostingPlan, state.sitePreferences);
          }
        });

        updateErrorStateUI(state);
        updateActionsAvailability(state);
      }

      // Render site preferences (language / currency)
      function renderSitePreferences(container, prefs) {
        var language = prefs && prefs.language ? prefs.language : 'en';
        var currency = prefs && prefs.currency ? prefs.currency : 'usd';

        container.innerHTML = "\n          <form class=\"preferences-form\">\n            <label class=\"preferences-label\" for=\"pref-language\">Language</label>\n            <select id=\"pref-language\" name=\"language\" class=\"preferences-select\">\n              <option value=\"en\"" + (language === 'en' ? ' selected' : '') + ">English</option>\n              <option value=\"es\"" + (language === 'es' ? ' selected' : '') + ">Español</option>\n            </select>\n            <label class=\"preferences-label\" for=\"pref-currency\">Currency</label>\n            <select id=\"pref-currency\" name=\"currency\" class=\"preferences-select\">\n              <option value=\"usd\"" + (currency === 'usd' ? ' selected' : '') + ">USD</option>\n              <option value=\"eur\"" + (currency === 'eur' ? ' selected' : '') + ">EUR</option>\n            </select>\n            <button type=\"submit\" class=\"button button-ghost preferences-submit\">Apply</button>\n          </form>\n        ";
      }

      // Render mini-cart summary
      function renderMiniCartSummary(container, miniCart, prefs) {
        if (!miniCart || !miniCart.hasActiveCart) {
          container.innerHTML = "\n            <button type=\"button\" class=\"mini-cart-button\" aria-label=\"Cart is empty\">\n              <span class=\"mini-cart-icon\" aria-hidden=\"true\">⧉</span>\n              <span class=\"mini-cart-text\">Cart (0)</span>\n            </button>\n          ";
          return;
        }

        var currency = miniCart.currency || (prefs && prefs.currency) || 'usd';
        var total = typeof miniCart.total === 'number' ? formatCurrency(miniCart.total, currency) : '';
        var itemLabel = miniCart.itemCount === 1 ? 'item' : 'items';

        container.innerHTML = "\n          <button type=\"button\" class=\"mini-cart-button\" aria-label=\"View cart summary\">\n            <span class=\"mini-cart-icon\" aria-hidden=\"true\">⧉</span>\n            <span class=\"mini-cart-text\">" + miniCart.itemCount + " " + itemLabel + "</span>\n            <span class=\"mini-cart-total\">" + total + "</span>\n          </button>\n        ";
      }

      // Render hosting plan header (name, tier, description)
      function renderHostingPlanHeader(container, plan, planId) {
        if (!plan) {
          container.innerHTML = "\n            <div class=\"hosting-plan-header-empty\">\n              <h1 class=\"hosting-plan-title\">Hosting plan details</h1>\n              <p class=\"hosting-plan-subtitle\">Plan information will appear here once a valid plan is selected.</p>\n            </div>\n          ";
          return;
        }

        var tier = plan.planTier ? String(plan.planTier) : '';
        var tierLabel = tier ? tier.charAt(0).toUpperCase() + tier.slice(1) : '';
        var promoBadge = plan.isPromotional ? "<span class=\"plan-badge plan-badge--promo\">Promo</span>" : '';
        var description = plan.description ? plan.description : '';

        var planIdMarkup = planId ? "<p class=\"hosting-plan-id\">Plan ID: <span>" + planId + "</span></p>" : '';
        var tierMarkup = tierLabel ? "<span class=\"plan-tier\">" + tierLabel + " plan</span>" : '';

        container.innerHTML = "\n          <div class=\"hosting-plan-header\">\n            <div class=\"plan-tier-row\">\n              " + tierMarkup + "\n              " + promoBadge + "\n            </div>\n            <h1 class=\"hosting-plan-title\">" + (plan.name || 'Hosting plan') + "</h1>\n            " + (description ? "<p class=\"hosting-plan-description\">" + description + "</p>" : '') + "\n            " + planIdMarkup + "\n          </div>\n        ";
      }

      // Render hosting plan feature list
      function renderHostingPlanFeatures(container, plan) {
        if (!plan || !Array.isArray(plan.features) || plan.features.length === 0) {
          container.innerHTML = "\n            <div class=\"hosting-plan-features\">\n              <h2 class=\"section-title\">What is included</h2>\n              <p class=\"section-empty\">Feature details are not available for this plan.</p>\n            </div>\n          ";
          return;
        }

        var itemsHtml = plan.features.map(function(feature) {
          var safeText = typeof feature === 'string' ? feature : '';
          return "<li class=\"feature-item\">" + safeText + "</li>";
        }).join('');

        container.innerHTML = "\n          <div class=\"hosting-plan-features\">\n            <h2 class=\"section-title\">What is included</h2>\n            <ul class=\"feature-list\">\n              " + itemsHtml + "\n            </ul>\n          </div>\n        ";
      }

      // Render hosting plan pricing summary
      function renderHostingPlanPricing(container, plan, prefs) {
        if (!plan) {
          container.innerHTML = "\n            <div class=\"hosting-plan-pricing\">\n              <h2 class=\"section-title\">Pricing</h2>\n              <p class=\"section-empty\">Pricing information will be shown once a valid plan is loaded.</p>\n            </div>\n          ";
          return;
        }

        var currency = plan.currency || (prefs && prefs.currency) || 'usd';
        var monthlyPrice = typeof plan.monthlyPrice === 'number' ? formatCurrency(plan.monthlyPrice, currency) : '';
        var termMonths = typeof plan.contractTermMonths === 'number' && plan.contractTermMonths > 0 ? plan.contractTermMonths : null;
        var termText = termMonths ? (termMonths === 1 ? '1 month term' : termMonths + ' month term') : 'Flexible term';
        var promoCopy = plan.isPromotional ? "<p class=\"pricing-promo-note\">This is a limited-time promotional plan. Pricing or availability may change.</p>" : '';

        container.innerHTML = "\n          <div class=\"hosting-plan-pricing\">\n            <h2 class=\"section-title\">Pricing</h2>\n            <p class=\"pricing-main\">\n              <span class=\"pricing-amount\">" + monthlyPrice + "</span>\n              <span class=\"pricing-interval\">per month</span>\n            </p>\n            <p class=\"pricing-term\">" + termText + "</p>\n            " + promoCopy + "\n          </div>\n        ";
      }

      // Update error state UI
      function updateErrorStateUI(state) {
        var errorContainer = document.getElementById('plan-error-state');
        if (!errorContainer) {
          return;
        }

        if (!state.planErrorType) {
          errorContainer.hidden = true;
          errorContainer.innerHTML = '';
          return;
        }

        var message = state.planErrorMessage || 'There was a problem loading this hosting plan.';
        var detailsText = '';

        if (state.planErrorType === 'missing_plan_id') {
          detailsText = 'The required "planId" parameter was not found in the page URL.';
        } else if (state.planErrorType === 'plan_not_found') {
          detailsText = 'The specified hosting plan could not be found or may no longer be active.';
        } else if (state.planErrorType === 'plan_load_error') {
          detailsText = 'Please check your connection and try reloading this page.';
        } else if (state.planErrorType === 'hosting_offer_unavailable') {
          detailsText = 'No related hosting offer is available for this plan.';
        }

        errorContainer.hidden = false;
        errorContainer.innerHTML = "\n          <div class=\"error-panel\">\n            <h2 class=\"error-title\">Unable to show hosting plan details</h2>\n            <p class=\"error-message\">" + message + "</p>\n            " + (detailsText ? "<p class=\"error-details\">" + detailsText + "</p>" : '') + "\n          </div>\n        ";
      }

      // Enable/disable hosting offer navigation based on hostingOfferId
      function updateActionsAvailability(state) {
        var offerButton = document.querySelector('[data-action="view-hosting-offer"]');
        var offerHint = document.getElementById('hosting-offer-hint');

        if (offerButton) {
          var hasOffer = !!(state.hostingPlan && state.hostingPlan.hostingOfferId);
          offerButton.disabled = !hasOffer;
          if (!hasOffer) {
            offerButton.setAttribute('aria-disabled', 'true');
          } else {
            offerButton.removeAttribute('aria-disabled');
          }
        }

        if (offerHint) {
          if (state.hostingPlan && state.hostingPlan.hostingOfferId) {
            offerHint.textContent = '';
            offerHint.hidden = true;
          } else {
            offerHint.textContent = 'Hosting offer navigation is not available for this plan.';
            offerHint.hidden = false;
          }
        }
      }

      // Currency formatting helper
      function formatCurrency(value, currency) {
        var amount = typeof value === 'number' ? value : 0;
        var code = (currency || 'usd').toLowerCase();
        var locale = code === 'eur' ? 'de-DE' : 'en-US';
        var symbol = code === 'eur' ? 'EUR' : 'USD';

        try {
          return new Intl.NumberFormat(locale, {
            style: 'currency',
            currency: symbol,
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
          }).format(amount);
        } catch (e) {
          var prefix = code === 'eur' ? '€' : '$';
          return prefix + amount.toFixed(2);
        }
      }

      // Event handlers wiring
      function setupActionHandlers(state) {
        // Language / currency preferences
        var prefsContainer = document.querySelector('[data-action="preferences"]');
        if (prefsContainer) {
          prefsContainer.addEventListener('submit', function(event) {
            var form = event.target;
            if (!form.classList.contains('preferences-form')) {
              return;
            }

            event.preventDefault();

            var languageSelect = form.querySelector('select[name="language"]');
            var currencySelect = form.querySelector('select[name="currency"]');
            if (!languageSelect || !currencySelect) {
              return;
            }

            var language = languageSelect.value || 'en';
            var currency = currencySelect.value || 'usd';

            try {
              var result = WebsiteSDK.updateSitePreferences(language, currency);
              if (result && result.success) {
                state.sitePreferences = {
                  language: result.language || language,
                  currency: result.currency || currency
                };

                // Refresh hosting plan and mini-cart in the new currency
                try {
                  if (state.planId) {
                    state.hostingPlan = WebsiteSDK.getHostingPlanDetails(state.planId);
                    state.planErrorType = null;
                    state.planErrorMessage = '';
                  }
                } catch (e) {
                  state.planErrorType = 'plan_load_error';
                  state.planErrorMessage = 'Preferences were updated, but the hosting plan failed to reload.';
                }

                try {
                  state.miniCart = WebsiteSDK.getMiniCartSummary();
                } catch (e) {
                  // keep previous miniCart if refresh fails
                }

                renderAll(state);
              } else {
                // Failed preference update; keep existing state and show console info only
                console.error('updateSitePreferences did not succeed', result);
              }
            } catch (e) {
              console.error('updateSitePreferences threw an error', e);
            }
          });
        }

        // Back to registrar
        var backButtons = document.querySelectorAll('[data-action="back-to-registrar"]');
        backButtons.forEach(function(button) {
          button.addEventListener('click', function() {
            window.location.href = 'index.html';
          });
        });

        // Hosting offer / provider navigation
        var offerButton = document.querySelector('[data-action="view-hosting-offer"]');
        if (offerButton) {
          offerButton.addEventListener('click', function() {
            if (state.hostingPlan && state.hostingPlan.hostingOfferId) {
              var targetUrl = 'hosting_offer.html?id=' + encodeURIComponent(state.hostingPlan.hostingOfferId);
              window.location.href = targetUrl;
            } else {
              state.planErrorType = state.planErrorType || 'hosting_offer_unavailable';
              state.planErrorMessage = state.planErrorMessage || 'No related hosting offer is available for this plan.';
              updateErrorStateUI(state);
            }
          });
        }
      }
    })();
  </script>
</body>
</html>
