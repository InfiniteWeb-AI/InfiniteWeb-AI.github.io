<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hosting Offer Detail | Domain Registrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="hosting_offer.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header" role="banner">
      <div class="site-header-inner">
        <a href="index.html" class="brand" aria-label="Domain registrar home">
          <span class="brand-mark">DR</span>
          <span class="brand-text">Domain Registrar</span>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <ul class="nav-list">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="bulk_search.html" class="nav-link">Bulk Search</a></li>
            <li class="nav-item"><a href="domain_deals.html" class="nav-link">Deals &amp; Alerts</a></li>
            <li class="nav-item"><a href="whois.html" class="nav-link">WHOIS Lookup</a></li>
            <li class="nav-item"><a href="support.html" class="nav-link">Support</a></li>
            <li class="nav-item"><a href="cart.html" class="nav-link">Cart</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <section class="hosting-offer-page" aria-label="Hosting offer details">
        <div class="hosting-offer-page-inner">
          <article class="hosting-offer-card" data-component="hosting-offer-detail-section">
            <header class="offer-header" data-populate="hosting-offer-detail" aria-live="polite"></header>

            <div class="offer-utility-row">
              <section class="site-preferences-section" aria-label="Site preferences">
                <div data-component="site-preferences-controller" data-populate="site-preferences"></div>
              </section>
              <aside class="mini-cart-section" aria-label="Mini cart summary">
                <div class="mini-cart-indicator" data-component="mini-cart-summary-indicator" data-populate="mini-cart-summary"></div>
              </aside>
            </div>

            <footer class="offer-cta" data-component="hosting-offer-cta-section" data-populate="hosting-offer-cta"></footer>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="footer-inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-nav-list">
            <li class="footer-nav-item"><a href="about.html" class="footer-link">About</a></li>
            <li class="footer-nav-item"><a href="domain_deals.html" class="footer-link">Domain Deals &amp; Alerts</a></li>
            <li class="footer-nav-item"><a href="support.html" class="footer-link">Support</a></li>
            <li class="footer-nav-item"><a href="whois.html" class="footer-link">WHOIS &amp; Domain Details</a></li>
            <li class="footer-nav-item"><a href="terms.html" class="footer-link">Terms of Service</a></li>
            <li class="footer-nav-item"><a href="privacy.html" class="footer-link">Privacy Policy</a></li>
          </ul>
        </nav>
        <p class="footer-meta">&copy; <span class="footer-year">2026</span> Domain Registrar. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // URL parameter reader (id for HostingOffer)
      const urlParams = new URLSearchParams(window.location.search);
      const hostingOfferIdParam = (urlParams.get('id') || '').trim();

      const state = {
        hostingOfferId: hostingOfferIdParam || null,
        preferences: null,
        miniCartSummary: null,
        hostingOffer: null,
        offerLoading: false,
        offerError: null,
        containers: {}
      };

      const messages = {
        en: {
          loading: 'Loading hosting offer...',
          offer_missing: 'No hosting offer was specified. Use the registrar page to choose an offer.',
          offer_not_found: 'We could not find details for this hosting offer.',
          offer_error_generic: 'Something went wrong while loading this hosting offer.',
          offer_detail_title_fallback: 'Hosting offer details',
          sponsored_label: 'Sponsored',
          per_month: 'month',
          provided_by: 'From',
          plan_type_label: 'Plan type',
          apply_preferences: 'Apply',
          preferences_language_label: 'Language',
          preferences_currency_label: 'Currency',
          preferences_heading: 'Site preferences',
          preferences_saved: 'Your preferences have been updated.',
          preferences_error: 'We could not update your preferences.',
          view_plan_details: 'View plan details',
          back_to_registrar: 'Back to registrar landing',
          cart_empty: 'Cart: empty',
          cart_label: 'Cart',
          cart_items_suffix_single: 'item',
          cart_items_suffix_plural: 'items',
          cart_total_label: 'Total',
          offer_cta_disabled_help: 'Return to the registrar landing page to choose a valid hosting offer.'
        },
        es: {
          loading: 'Cargando oferta de alojamiento...',
          offer_missing: 'No se especificF3 ninguna oferta de alojamiento. Usa la pE1gina del registrador para elegir una oferta.',
          offer_not_found: 'No pudimos encontrar los detalles de esta oferta de alojamiento.',
          offer_error_generic: 'Se produjo un error al cargar esta oferta de alojamiento.',
          offer_detail_title_fallback: 'Detalles de la oferta de alojamiento',
          sponsored_label: 'Patrocinado',
          per_month: 'mes',
          provided_by: 'De',
          plan_type_label: 'Tipo de plan',
          apply_preferences: 'Aplicar',
          preferences_language_label: 'Idioma',
          preferences_currency_label: 'Moneda',
          preferences_heading: 'Preferencias del sitio',
          preferences_saved: 'Se actualizaron tus preferencias.',
          preferences_error: 'No pudimos actualizar tus preferencias.',
          view_plan_details: 'Ver detalles del plan',
          back_to_registrar: 'Volver al registrador',
          cart_empty: 'Carrito: vacEDo',
          cart_label: 'Carrito',
          cart_items_suffix_single: 'artEDculo',
          cart_items_suffix_plural: 'artEDculos',
          cart_total_label: 'Total',
          offer_cta_disabled_help: 'Vuelve a la pE1gina del registrador para seleccionar una oferta vE1lida.'
        }
      };

      if (!state.hostingOfferId) {
        state.offerError = 'missingId';
      }

      // Map data-populate containers
      const populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(el) {
        const type = el.dataset.populate;
        if (type === 'hosting-offer-detail') {
          state.containers.offerDetail = el;
        } else if (type === 'site-preferences') {
          state.containers.sitePreferences = el;
        } else if (type === 'mini-cart-summary') {
          state.containers.miniCart = el;
        } else if (type === 'hosting-offer-cta') {
          state.containers.offerCta = el;
        }
      });

      function getCurrentLanguageCode() {
        if (state.preferences && state.preferences.language === 'es') {
          return 'es';
        }
        return 'en';
      }

      function t(key) {
        const lang = getCurrentLanguageCode();
        const dict = messages[lang] || messages.en;
        if (Object.prototype.hasOwnProperty.call(dict, key)) {
          return dict[key];
        }
        if (Object.prototype.hasOwnProperty.call(messages.en, key)) {
          return messages.en[key];
        }
        return key;
      }

      function escapeHtml(value) {
        if (value === undefined || value === null) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      // Data loading functions
      function loadSitePreferences() {
        try {
          const prefs = WebsiteSDK.getSitePreferences();
          state.preferences = prefs;
        } catch (e) {
          state.preferences = state.preferences || { language: 'en', currency: 'usd' };
        }
        if (state.containers.sitePreferences) {
          renderSitePreferences(state.containers.sitePreferences);
          bindActions();
        }
      }

      function loadMiniCartSummary() {
        if (!state.containers.miniCart) return;
        try {
          const summary = WebsiteSDK.getMiniCartSummary();
          state.miniCartSummary = summary;
        } catch (e) {
          state.miniCartSummary = null;
        }
        renderMiniCart(state.containers.miniCart);
      }

      function loadHostingOffer() {
        if (!state.containers.offerDetail) return;
        if (!state.hostingOfferId) {
          state.hostingOffer = null;
          renderOfferDetail(state.containers.offerDetail);
          if (state.containers.offerCta) {
            renderOfferCta(state.containers.offerCta);
            bindActions();
          }
          return;
        }

        state.offerLoading = true;
        state.offerError = null;
        renderOfferDetail(state.containers.offerDetail);

        try {
          const offer = WebsiteSDK.getHostingOfferDetail(state.hostingOfferId);
          if (!offer || !offer.hostingOfferId) {
            state.hostingOffer = null;
            state.offerError = 'notFound';
          } else {
            state.hostingOffer = offer;
            state.offerError = null;
          }
        } catch (e) {
          state.hostingOffer = null;
          state.offerError = 'loadError';
        }

        state.offerLoading = false;
        renderOfferDetail(state.containers.offerDetail);
        if (state.containers.offerCta) {
          renderOfferCta(state.containers.offerCta);
          bindActions();
        }
      }

      // Render functions (use container directly)
      function renderOfferDetail(container) {
        if (state.offerLoading) {
          container.innerHTML = '<p class="offer-loading">' + escapeHtml(t('loading')) + '</p>';
          return;
        }

        if (state.offerError && !state.hostingOffer) {
          let messageKey;
          if (state.offerError === 'missingId') {
            messageKey = 'offer_missing';
          } else if (state.offerError === 'notFound') {
            messageKey = 'offer_not_found';
          } else {
            messageKey = 'offer_error_generic';
          }

          container.innerHTML = `
            <div class="offer-error-state">
              <h1 class="offer-title">${escapeHtml(t('offer_detail_title_fallback'))}</h1>
              <p class="offer-error-message">${escapeHtml(t(messageKey))}</p>
            </div>
          `;
          return;
        }

        if (!state.hostingOffer) {
          container.innerHTML = '';
          return;
        }

        const offer = state.hostingOffer;
        const currencyCode = (offer.currency || '').toLowerCase();
        const currencySymbol = currencyCode === 'eur' ? 'A4'.replace('A4', '€') : '$';
        const priceValue = typeof offer.monthlyPrice === 'number' ? offer.monthlyPrice.toFixed(2) : '';
        const priceDisplay = priceValue ? `${currencySymbol}${priceValue} / ${escapeHtml(t('per_month'))}` : '';
        const sponsoredLabel = offer.isSponsored ? `<span class="offer-pill">${escapeHtml(t('sponsored_label'))}</span>` : '';
        const highlightHtml = offer.highlightText
          ? `<p class="offer-highlight">${escapeHtml(offer.highlightText)}</p>`
          : '';

        container.innerHTML = `
          <div class="offer-hero">
            ${sponsoredLabel}
            <h1 class="offer-title">${escapeHtml(offer.name || t('offer_detail_title_fallback'))}</h1>
            <p class="offer-provider">
              ${offer.providerName ? `${escapeHtml(t('provided_by'))} ${escapeHtml(offer.providerName)}` : ''}
            </p>
            ${highlightHtml}
            <p class="offer-price">${escapeHtml(priceDisplay)}</p>
            <p class="offer-plan-type">${escapeHtml(t('plan_type_label'))}: ${escapeHtml(offer.planType || '')}</p>
            <p class="offer-tagline">${escapeHtml(offer.tagline || '')}</p>
          </div>
        `;
      }

      function renderSitePreferences(container) {
        const prefs = state.preferences || { language: 'en', currency: 'usd' };
        const langValue = prefs.language === 'es' ? 'es' : 'en';
        const currencyValue = prefs.currency === 'eur' ? 'eur' : 'usd';

        container.innerHTML = `
          <form class="site-preferences-form" data-action="update-preferences">
            <div class="site-preferences-heading">${escapeHtml(t('preferences_heading'))}</div>
            <div class="site-preferences-fields">
              <label class="field">
                <span class="field-label">${escapeHtml(t('preferences_language_label'))}</span>
                <select name="language">
                  <option value="en" ${langValue === 'en' ? 'selected' : ''}>English</option>
                  <option value="es" ${langValue === 'es' ? 'selected' : ''}>EspaF1ol</option>
                </select>
              </label>
              <label class="field">
                <span class="field-label">${escapeHtml(t('preferences_currency_label'))}</span>
                <select name="currency">
                  <option value="usd" ${currencyValue === 'usd' ? 'selected' : ''}>USD</option>
                  <option value="eur" ${currencyValue === 'eur' ? 'selected' : ''}>EUR</option>
                </select>
              </label>
              <div class="field field-apply">
                <button type="submit" class="secondary-button">${escapeHtml(t('apply_preferences'))}</button>
              </div>
            </div>
            <p class="site-preferences-feedback" data-role="preferences-feedback"></p>
          </form>
        `;
      }

      function renderMiniCart(container) {
        const summary = state.miniCartSummary;
        if (!summary || !summary.hasActiveCart) {
          container.innerHTML = `<div class="mini-cart-pill mini-cart-empty">${escapeHtml(t('cart_empty'))}</div>`;
          return;
        }

        const currencyCode = (summary.currency || '').toLowerCase();
        const currencySymbol = currencyCode === 'eur' ? 'A4'.replace('A4', '€') : '$';
        const totalFormatted = typeof summary.total === 'number' ? summary.total.toFixed(2) : '0.00';
        const count = summary.itemCount || 0;
        const suffixKey = count === 1 ? 'cart_items_suffix_single' : 'cart_items_suffix_plural';

        container.innerHTML = `
          <div class="mini-cart-pill">
            <span class="mini-cart-label">${escapeHtml(t('cart_label'))}</span>
            <span class="mini-cart-count">${escapeHtml(String(count))} ${escapeHtml(t(suffixKey))}</span>
            <span class="mini-cart-total">${escapeHtml(t('cart_total_label'))}: ${currencySymbol}${escapeHtml(totalFormatted)}</span>
          </div>
        `;
      }

      function renderOfferCta(container) {
        const hasValidOffer = !!(state.hostingOffer && state.hostingOffer.primaryPlanId && !state.offerError);
        const disabledAttr = hasValidOffer ? '' : 'disabled';
        const helpHtml = hasValidOffer || !state.offerError
          ? ''
          : `<p class="offer-cta-help">${escapeHtml(t('offer_cta_disabled_help'))}</p>`;

        container.innerHTML = `
          <button type="button" class="primary-button" data-action="view-plan-details" ${disabledAttr}>${escapeHtml(t('view_plan_details'))}</button>
          ${helpHtml}
          <p class="offer-cta-secondary">
            <a href="javascript:void(0)" class="text-link" data-action="back-to-registrar">${escapeHtml(t('back_to_registrar'))}</a>
          </p>
        `;
      }

      // Interaction handlers
      function showPreferencesMessage(formEl, message, isError) {
        const feedback = formEl.querySelector('[data-role="preferences-feedback"]');
        if (!feedback) return;
        feedback.textContent = message;
        if (isError) {
          feedback.classList.add('is-error');
        } else {
          feedback.classList.remove('is-error');
        }
      }

      function handlePreferencesSubmit(formEl) {
        const formData = new FormData(formEl);
        const language = String(formData.get('language') || 'en');
        const currency = String(formData.get('currency') || 'usd');

        let result;
        try {
          result = WebsiteSDK.updateSitePreferences(language, currency);
        } catch (e) {
          showPreferencesMessage(formEl, t('preferences_error'), true);
          return;
        }

        if (!result || result.success === false) {
          const msg = result && result.message ? result.message : t('preferences_error');
          showPreferencesMessage(formEl, msg, true);
          return;
        }

        showPreferencesMessage(formEl, t('preferences_saved'), false);

        // Refresh preferences and dependent data
        loadSitePreferences();
        loadHostingOffer();
        loadMiniCartSummary();
      }

      function handleViewPlanDetails() {
        if (!state.hostingOffer || !state.hostingOffer.primaryPlanId) {
          return;
        }
        const planId = encodeURIComponent(String(state.hostingOffer.primaryPlanId));
        window.location.href = 'hosting_plan.html?planId=' + planId;
      }

      function handleBackToRegistrar() {
        window.location.href = 'index.html';
      }

      // Generic action binding
      function bindActions() {
        const actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(el) {
          if (el.dataset.bound === 'true') {
            return;
          }
          const action = el.dataset.action;

          if (action === 'update-preferences' && el.tagName === 'FORM') {
            el.addEventListener('submit', function(evt) {
              evt.preventDefault();
              handlePreferencesSubmit(el);
            });
          } else if (action === 'view-plan-details') {
            el.addEventListener('click', function() {
              handleViewPlanDetails();
            });
          } else if (action === 'back-to-registrar') {
            el.addEventListener('click', function(evt) {
              evt.preventDefault();
              handleBackToRegistrar();
            });
          }

          el.dataset.bound = 'true';
        });
      }

      // Initial load sequence
      loadSitePreferences();
      loadHostingOffer();
      loadMiniCartSummary();
    });
  </script>
</body>
</html>
