<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Culture Illustro – Contact</title>
    <meta name='description' content='Page for users to contact the team, access support options, and navigate to self-service help and licensing information.'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='contact.css'>
</head>
<body>
    <div class='site-shell'>
        <header class='site-header'>
            <div class='container site-header__inner'>
                <a href='index.html' class='brand' aria-label='Culture Illustro homepage'>
                    <span class='brand__mark'>CI</span>
                    <span class='brand__text'>Culture Illustro</span>
                </a>

                <nav class='primary-nav' aria-label='Primary navigation'>
                    <ul class='primary-nav__list'>
                        <li class='primary-nav__item'>
                            <a href='index.html' class='primary-nav__link'>Home</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='search.html' class='primary-nav__link'>Browse</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='collections.html' class='primary-nav__link'>Collections</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='projects.html' class='primary-nav__link'>Projects</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='pricing.html' class='primary-nav__link'>Pricing</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='wishlist.html' class='primary-nav__link'>Wishlist</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='help.html' class='primary-nav__link'>Help</a>
                        </li>
                        <li class='primary-nav__item primary-nav__item--accent'>
                            <a href='cart.html' class='primary-nav__link primary-nav__link--accent'>Cart</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>

        <main id='content' role='main' class='site-main'>
            <div class='contact-page' data-page='contact'>
                <!-- Site preferences loader: thin top bar -->
                <div data-component='site-preferences-loader' class='site-preferences-loader' aria-hidden='true'></div>

                <!-- Illustration-led 3-column gallery background -->
                <div class='contact-gallery' aria-hidden='true'>
                    <div class='contact-gallery__column'>
                        <div class='contact-gallery__item contact-gallery__item--1'></div>
                        <div class='contact-gallery__item contact-gallery__item--2'></div>
                        <div class='contact-gallery__item contact-gallery__item--3'></div>
                    </div>
                    <div class='contact-gallery__column'>
                        <div class='contact-gallery__item contact-gallery__item--4'></div>
                        <div class='contact-gallery__item contact-gallery__item--5'></div>
                        <div class='contact-gallery__item contact-gallery__item--6'></div>
                    </div>
                    <div class='contact-gallery__column'>
                        <div class='contact-gallery__item contact-gallery__item--7'></div>
                        <div class='contact-gallery__item contact-gallery__item--8'></div>
                        <div class='contact-gallery__item contact-gallery__item--9'></div>
                    </div>
                </div>

                <!-- Floating utility header for language + cart -->
                <div class='contact-utility-header'>
                    <div class='contact-utility-header__inner'>
                        <div data-component='cart-summary-header' data-populate='cart-summary' class='cart-summary-header' aria-live='polite'></div>

                        <div data-component='language-switcher' class='language-switcher'>
                            <label for='languageSelect' class='visually-hidden'>Site language</label>
                            <select id='languageSelect' data-action='change-language' aria-label='Site language'>
                                <option value='en'>English</option>
                                <option value='es'>Español</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Overlay contact card + loader in lower left -->
                <div class='contact-overlay'>
                    <div data-component='contact-page-loader' class='contact-card contact-card--loading' aria-label='Loading contact information' aria-hidden='false'>
                        <div class='contact-card__skeleton'>
                            <div class='skeleton skeleton--heading'></div>
                            <div class='skeleton skeleton--line'></div>
                            <div class='skeleton skeleton--line'></div>
                            <div class='skeleton skeleton--field'></div>
                            <div class='skeleton skeleton--field'></div>
                            <div class='skeleton skeleton--button'></div>
                        </div>
                    </div>

                    <section data-component='contact-card' data-populate='contact-page-content' class='contact-card contact-card--ready' aria-live='polite' hidden></section>
                </div>
            </div>
        </main>

        <footer class='site-footer'>
            <div class='container site-footer__inner'>
                <div class='site-footer__brand'>
                    <a href='index.html' class='brand brand--footer'>
                        <span class='brand__mark'>CI</span>
                        <span class='brand__text'>Culture Illustro</span>
                    </a>
                    <p class='site-footer__copy'>&copy; <span data-year></span> Culture Illustro. All rights reserved.</p>
                </div>

                <nav class='footer-nav' aria-label='Footer navigation'>
                    <ul class='footer-nav__list'>
                        <li class='footer-nav__item'>
                            <a href='about.html' class='footer-nav__link'>About</a>
                        </li>
                        <li class='footer-nav__item'>
                            <a href='contact.html' class='footer-nav__link'>Contact</a>
                        </li>
                        <li class='footer-nav__item'>
                            <a href='pricing.html' class='footer-nav__link'>Pricing</a>
                        </li>
                        <li class='footer-nav__item'>
                            <a href='help.html' class='footer-nav__link'>Help Center</a>
                        </li>
                        <li class='footer-nav__item'>
                            <a href='licensing.html' class='footer-nav__link'>Licensing</a>
                        </li>
                        <li class='footer-nav__item'>
                            <a href='terms.html' class='footer-nav__link'>Terms of Use</a>
                        </li>
                        <li class='footer-nav__item'>
                            <a href='privacy.html' class='footer-nav__link'>Privacy Policy</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </footer>
    </div>

    <script src='business_logic.js'></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            'use strict';

            var pageState = {
                sitePreference: null,
                contactContent: null,
                initialTopicHint: '',
                lastSubmitResult: null
            };

            function escapeHTML(value) {
                if (value === null || value === undefined) return '';
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function formatMultiline(value) {
                var safe = escapeHTML(value || '');
                return safe.replace(/\n/g, '<br>');
            }

            function formatCurrency(amount, currencyEnum) {
                if (typeof amount !== 'number' || isNaN(amount)) {
                    return '';
                }
                var code = 'USD';
                if (currencyEnum === 'eur') code = 'EUR';
                else if (currencyEnum === 'gbp') code = 'GBP';
                else if (currencyEnum === 'usd') code = 'USD';
                try {
                    return new Intl.NumberFormat(undefined, { style: 'currency', currency: code }).format(amount);
                } catch (e) {
                    return amount.toFixed(2) + ' ' + code;
                }
            }

            var I18N = {
                en: {
                    heading: 'Contact our team',
                    intro: 'Reach out about support, licensing, or partnerships.',
                    supportLabel: 'Support',
                    partnershipLabel: 'Partnerships',
                    addressLabel: 'Mailing address',
                    responseHint: 'We usually respond within one business day.',
                    helpCenterFallback: 'Visit Help Center',
                    licensingFallback: 'Licensing details',
                    nameLabel: 'Name',
                    emailLabel: 'Email',
                    topicLabel: 'Topic',
                    topicPlaceholder: 'Select a topic',
                    messageLabel: 'Message',
                    messagePlaceholder: 'Tell us a bit about what you need.',
                    requiredNote: 'All fields are required.',
                    submitLabel: 'Send message',
                    submitSending: 'Sending…',
                    errorRequired: 'This field is required.',
                    errorEmail: 'Enter a valid email address.'
                },
                es: {
                    heading: 'Contacto',
                    intro: 'Escríbenos sobre soporte, licencias o colaboraciones.',
                    supportLabel: 'Soporte',
                    partnershipLabel: 'Colaboraciones',
                    addressLabel: 'Dirección postal',
                    responseHint: 'Solemos responder en un día laborable.',
                    helpCenterFallback: 'Ir al Centro de ayuda',
                    licensingFallback: 'Detalles de licencias',
                    nameLabel: 'Nombre',
                    emailLabel: 'Correo electrónico',
                    topicLabel: 'Tema',
                    topicPlaceholder: 'Selecciona un tema',
                    messageLabel: 'Mensaje',
                    messagePlaceholder: 'Cuéntanos qué necesitas.',
                    requiredNote: 'Todos los campos son obligatorios.',
                    submitLabel: 'Enviar mensaje',
                    submitSending: 'Enviando…',
                    errorRequired: 'Este campo es obligatorio.',
                    errorEmail: 'Introduce un correo válido.'
                }
            };

            function getCurrentLanguage() {
                if (pageState.sitePreference && pageState.sitePreference.language) {
                    return pageState.sitePreference.language;
                }
                return 'en';
            }

            function getTranslations() {
                var lang = getCurrentLanguage();
                return I18N[lang] || I18N.en;
            }

            function setLoaderBarActive(active) {
                var loader = document.querySelector("[data-component='site-preferences-loader']");
                if (!loader) return;
                if (active) {
                    loader.classList.add('site-preferences-loader--active');
                    loader.setAttribute('aria-hidden', 'false');
                } else {
                    loader.classList.remove('site-preferences-loader--active');
                    loader.setAttribute('aria-hidden', 'true');
                }
            }

            function initSitePreferences() {
                setLoaderBarActive(true);
                var prefs = null;
                try {
                    prefs = WebsiteSDK.getSitePreferences();
                } catch (e) {
                    console.error('Error loading site preferences', e);
                }
                if (!prefs) {
                    prefs = { language: 'en' };
                }
                pageState.sitePreference = prefs;

                var langSelect = document.querySelector("[data-action='change-language']");
                if (langSelect) {
                    langSelect.value = getCurrentLanguage();
                }

                var root = document.querySelector('.contact-page');
                if (root) {
                    root.setAttribute('data-language', getCurrentLanguage());
                }

                setLoaderBarActive(false);
            }

            function renderCartSummary(container, cart) {
                if (!container) return;
                if (!cart) {
                    container.textContent = 'Cart: 0 items';
                    return;
                }
                var items = typeof cart.total_items === 'number' ? cart.total_items : 0;
                var amount = typeof cart.subtotal_amount === 'number' ? cart.subtotal_amount : 0;
                var currency = cart.currency || 'usd';
                var label = 'Cart: ' + items + ' item' + (items === 1 ? '' : 's');
                var money = formatCurrency(amount, currency);
                if (money) {
                    label += ' • ' + money;
                }
                container.textContent = label;
            }

            function populateCartSummary(container) {
                var target = container || document.querySelector("[data-populate='cart-summary']");
                if (!target) return;
                var summary = null;
                try {
                    summary = WebsiteSDK.getCartSummary();
                } catch (e) {
                    console.error('Error loading cart summary', e);
                }
                var cart = summary && summary.cart ? summary.cart : null;
                renderCartSummary(target, cart);
            }

            function renderContactCard(container, content) {
                if (!container) return;
                var t = getTranslations();
                var topics = Array.isArray(content.topics) ? content.topics : [];
                var topicOptionsHtml = '';
                var normalizedHint = (pageState.initialTopicHint || '').toLowerCase();
                var selectedTopic = '';
                if (normalizedHint && topics.length) {
                    for (var i = 0; i < topics.length; i++) {
                        var topicValue = String(topics[i] || '');
                        if (topicValue.toLowerCase() === normalizedHint) {
                            selectedTopic = topicValue;
                            break;
                        }
                    }
                }
                for (var j = 0; j < topics.length; j++) {
                    var value = String(topics[j] || '');
                    var isSelected = selectedTopic && value === selectedTopic;
                    topicOptionsHtml += '`' + '`';
                    topicOptionsHtml += '<option value="' + escapeHTML(value) + '"' + (isSelected ? ' selected' : '') + '>' + escapeHTML(value) + '</option>';
                }

                var supportEmail = content.support_email || '';
                var partnershipEmail = content.partnership_email || '';
                var mailingAddress = content.mailing_address || '';
                var helpLabel = content.help_center_link_label || t.helpCenterFallback;
                var licensingLabel = content.licensing_link_label || t.licensingFallback;

                container.innerHTML = `
                    <div data-component='contact-info-panel' class='contact-card__section contact-info-panel'>
                        <h1 class='contact-card__title'>${escapeHTML(t.heading)}</h1>
                        <p class='contact-card__intro'>${escapeHTML(t.intro)}</p>
                        <dl class='contact-info-panel__list'>
                            ${supportEmail ? `
                            <div class='contact-info-panel__item'>
                                <dt class='contact-info-panel__label'>${escapeHTML(t.supportLabel)}</dt>
                                <dd class='contact-info-panel__value'>
                                    <a href='mailto:${escapeHTML(supportEmail)}' class='contact-info-panel__link'>${escapeHTML(supportEmail)}</a>
                                </dd>
                            </div>` : ''}
                            ${partnershipEmail ? `
                            <div class='contact-info-panel__item'>
                                <dt class='contact-info-panel__label'>${escapeHTML(t.partnershipLabel)}</dt>
                                <dd class='contact-info-panel__value'>
                                    <a href='mailto:${escapeHTML(partnershipEmail)}' class='contact-info-panel__link'>${escapeHTML(partnershipEmail)}</a>
                                </dd>
                            </div>` : ''}
                            ${mailingAddress ? `
                            <div class='contact-info-panel__item'>
                                <dt class='contact-info-panel__label'>${escapeHTML(t.addressLabel)}</dt>
                                <dd class='contact-info-panel__value'>${formatMultiline(mailingAddress)}</dd>
                            </div>` : ''}
                        </dl>
                        ${t.responseHint ? `<p class='contact-info-panel__hint'>${escapeHTML(t.responseHint)}</p>` : ''}
                    </div>

                    <div data-component='help-and-licensing-links' class='contact-card__section help-links'>
                        <div class='help-links__primary'>
                            <button type='button' class='btn btn--outline help-links__btn' data-action='go-help-center'>
                                ${escapeHTML(helpLabel)}
                            </button>
                            <button type='button' class='btn btn--secondary help-links__btn' data-action='go-licensing'>
                                ${escapeHTML(licensingLabel)}
                            </button>
                        </div>
                    </div>

                    <form data-component='contact-form' class='contact-card__section contact-form' novalidate>
                        <div class='form-field'>
                            <label for='contactName' class='form-field__label'>${escapeHTML(t.nameLabel)}</label>
                            <input type='text' id='contactName' name='name' class='form-field__control' autocomplete='name' required>
                            <p class='form-field__error' data-error-for='name' aria-live='polite'></p>
                        </div>

                        <div class='form-field'>
                            <label for='contactEmail' class='form-field__label'>${escapeHTML(t.emailLabel)}</label>
                            <input type='email' id='contactEmail' name='email' class='form-field__control' autocomplete='email' required>
                            <p class='form-field__error' data-error-for='email' aria-live='polite'></p>
                        </div>

                        <div class='form-field'>
                            <label for='contactTopic' class='form-field__label'>${escapeHTML(t.topicLabel)}</label>
                            <select id='contactTopic' name='topic' class='form-field__control' required>
                                <option value=''>${escapeHTML(t.topicPlaceholder)}</option>
                                ${topicOptionsHtml}
                            </select>
                            <p class='form-field__error' data-error-for='topic' aria-live='polite'></p>
                        </div>

                        <div class='form-field'>
                            <label for='contactMessage' class='form-field__label'>${escapeHTML(t.messageLabel)}</label>
                            <textarea id='contactMessage' name='message' class='form-field__control form-field__control--textarea' rows='4' required placeholder='${escapeHTML(t.messagePlaceholder)}'></textarea>
                            <p class='form-field__error' data-error-for='message' aria-live='polite'></p>
                        </div>

                        <p class='contact-form__note'>${escapeHTML(t.requiredNote)}</p>

                        <button type='submit' class='btn btn--primary contact-form__submit' data-action='submit-contact-form'>
                            ${escapeHTML(t.submitLabel)}
                        </button>

                        <div data-component='submission-status-notice' class='submission-status-notice' aria-live='polite'></div>
                    </form>
                `;
            }

            function bindContactCardActions(container) {
                if (!container) return;

                var helpBtn = container.querySelector("[data-action='go-help-center']");
                if (helpBtn) {
                    helpBtn.addEventListener('click', function() {
                        window.location.href = 'help.html';
                    });
                }

                var licensingBtn = container.querySelector("[data-action='go-licensing']");
                if (licensingBtn) {
                    licensingBtn.addEventListener('click', function() {
                        window.location.href = 'licensing.html';
                    });
                }

                var form = container.querySelector("[data-component='contact-form']");
                if (form) {
                    form.addEventListener('submit', function(event) {
                        handleContactFormSubmit(event, container);
                    });
                }
            }

            function handleContactFormSubmit(event, cardContainer) {
                event.preventDefault();
                var form = event.target;
                var t = getTranslations();

                var nameInput = form.querySelector("input[name='name']");
                var emailInput = form.querySelector("input[name='email']");
                var topicSelect = form.querySelector("select[name='topic']");
                var messageInput = form.querySelector("textarea[name='message']");

                var nameError = form.querySelector("[data-error-for='name']");
                var emailError = form.querySelector("[data-error-for='email']");
                var topicError = form.querySelector("[data-error-for='topic']");
                var messageError = form.querySelector("[data-error-for='message']");

                if (nameError) nameError.textContent = '';
                if (emailError) emailError.textContent = '';
                if (topicError) topicError.textContent = '';
                if (messageError) messageError.textContent = '';

                var isValid = true;
                var nameValue = nameInput ? nameInput.value.trim() : '';
                var emailValue = emailInput ? emailInput.value.trim() : '';
                var topicValue = topicSelect ? topicSelect.value.trim() : '';
                var messageValue = messageInput ? messageInput.value.trim() : '';

                if (!nameValue) {
                    isValid = false;
                    if (nameError) nameError.textContent = t.errorRequired;
                }
                if (!emailValue) {
                    isValid = false;
                    if (emailError) emailError.textContent = t.errorRequired;
                } else if (!/.+@.+\..+/.test(emailValue)) {
                    isValid = false;
                    if (emailError) emailError.textContent = t.errorEmail;
                }
                if (!topicValue) {
                    isValid = false;
                    if (topicError) topicError.textContent = t.errorRequired;
                }
                if (!messageValue) {
                    isValid = false;
                    if (messageError) messageError.textContent = t.errorRequired;
                }

                if (!isValid) {
                    return;
                }

                var submitButton = form.querySelector("[data-action='submit-contact-form']");
                if (submitButton) {
                    if (!submitButton.dataset.originalLabel) {
                        submitButton.dataset.originalLabel = submitButton.textContent;
                    }
                    submitButton.disabled = true;
                    submitButton.textContent = t.submitSending;
                }

                var statusNotice = cardContainer.querySelector("[data-component='submission-status-notice']");
                if (statusNotice) {
                    statusNotice.textContent = '';
                    statusNotice.classList.remove('submission-status-notice--success', 'submission-status-notice--error');
                }

                var result = null;
                try {
                    result = WebsiteSDK.submitContactForm(nameValue, emailValue, topicValue, messageValue);
                } catch (e) {
                    console.error('Error submitting contact form', e);
                }

                pageState.lastSubmitResult = result;

                if (result && statusNotice) {
                    statusNotice.textContent = typeof result.message === 'string' ? result.message : '';
                    statusNotice.classList.remove('submission-status-notice--success', 'submission-status-notice--error');
                    statusNotice.classList.add(result.success ? 'submission-status-notice--success' : 'submission-status-notice--error');
                }

                if (result && result.success) {
                    form.reset();
                }

                if (submitButton) {
                    submitButton.disabled = false;
                    submitButton.textContent = submitButton.dataset.originalLabel || t.submitLabel;
                }
            }

            function populateContactContent(container) {
                var target = container || document.querySelector("[data-populate='contact-page-content']");
                if (!target) return;

                var loaderCard = document.querySelector("[data-component='contact-page-loader']");
                if (loaderCard) {
                    loaderCard.removeAttribute('hidden');
                    loaderCard.setAttribute('aria-hidden', 'false');
                }

                var content = null;
                try {
                    content = WebsiteSDK.getContactPageContent();
                } catch (e) {
                    console.error('Error loading contact page content', e);
                }
                pageState.contactContent = content || {};

                renderContactCard(target, pageState.contactContent);

                if (loaderCard) {
                    loaderCard.setAttribute('aria-hidden', 'true');
                    loaderCard.setAttribute('hidden', 'hidden');
                }
                target.removeAttribute('hidden');
                bindContactCardActions(target);
            }

            function handleLanguageChange(event) {
                var newLang = event.target.value;
                if (!newLang) return;
                if (pageState.sitePreference && pageState.sitePreference.language === newLang) {
                    return;
                }

                setLoaderBarActive(true);

                var updatedPrefs = null;
                try {
                    updatedPrefs = WebsiteSDK.setSiteLanguage(newLang);
                } catch (e) {
                    console.error('Error setting site language', e);
                }

                var confirmedPrefs = null;
                try {
                    confirmedPrefs = WebsiteSDK.getSitePreferences();
                } catch (e2) {
                    console.error('Error confirming site preferences after language change', e2);
                }

                pageState.sitePreference = confirmedPrefs || updatedPrefs || { language: newLang };

                var root = document.querySelector('.contact-page');
                if (root) {
                    root.setAttribute('data-language', getCurrentLanguage());
                }

                var contactCardContainer = document.querySelector("[data-populate='contact-page-content']");
                if (contactCardContainer) {
                    populateContactContent(contactCardContainer);
                }

                populateCartSummary();

                setLoaderBarActive(false);
            }

            function bindGlobalActions() {
                var langSelect = document.querySelector("[data-action='change-language']");
                if (langSelect) {
                    langSelect.addEventListener('change', handleLanguageChange);
                }
            }

            var urlParams = new URLSearchParams(window.location.search);
            pageState.initialTopicHint = urlParams.get('topic') || '';

            initSitePreferences();

            var populateElements = document.querySelectorAll('[data-populate]');
            populateElements.forEach(function(element) {
                var dataType = element.dataset.populate;
                if (dataType === 'cart-summary') {
                    populateCartSummary(element);
                } else if (dataType === 'contact-page-content') {
                    populateContactContent(element);
                }
            });

            bindGlobalActions();
        });
    </script>
    <script>
        (function() {
            var yearSpan = document.querySelector('[data-year]');
            if (yearSpan) {
                yearSpan.textContent = new Date().getFullYear();
            }
        })();
    </script>
</body>
</html>
