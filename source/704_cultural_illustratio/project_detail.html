<!DOCTYPE html>
<html lang='en'>

    <link rel='stylesheet' href='project_detail.css'>
</head>
<body>
    <div class='site-shell'>
        <header class='site-header'>
            <div class='container site-header__inner'>
                <a href='index.html' class='brand' aria-label='Culture Illustro homepage'>
                    <span class='brand__mark'>CI</span>
                    <span class='brand__text'>Culture Illustro</span>
                </a>

                <nav class='primary-nav' aria-label='Primary navigation'>
                    <ul class='primary-nav__list'>
                        <li class='primary-nav__item'>
                            <a href='index.html' class='primary-nav__link'>Home</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='search.html' class='primary-nav__link'>Browse</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='collections.html' class='primary-nav__link'>Collections</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='projects.html' class='primary-nav__link'>Projects</a>
                        </li>
                        <li class='primary-nav__item'>

                        </li>
                        <li class='primary-nav__item'>
                            <a href='wishlist.html' class='primary-nav__link'>Wishlist</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='help.html' class='primary-nav__link'>Help</a>
                        </li>
                        <li class='primary-nav__item primary-nav__item--accent'>
                            <a href='cart.html' class='primary-nav__link primary-nav__link--accent'>Cart</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>

        <main id='content' role='main' class='site-main'>
            <div class='project-page' data-component='page-init-controller'>
                <div class='container project-page__inner'>
                    <!-- Slim top bar: language toggle left, cart summary right -->
                    <section class='project-top-bar'>
                        <div class='project-top-bar__language' data-component='site-language-toggle' aria-label='Site language toggle'>
                            <!-- Populated by JS -->
                        </div>
                        <button type='button' class='project-top-bar__cart' data-component='header-cart-summary' data-action='view-cart' aria-label='View cart summary'>
                            <!-- Populated by JS -->
                        </button>
                    </section>

                    <!-- Project header bar -->
                    <section class='project-header-bar' data-component='project-header' aria-label='Project summary'>
                        <!-- Populated by JS -->
                    </section>

                    <!-- View controls: sort, filters, view mode -->
                    <section class='project-toolbar' data-component='project-view-controls' aria-label='Project view controls'>
                        <!-- Populated by JS -->
                    </section>

                    <!-- Main content area: error/empty states and grid -->
                    <section class='project-main'>
                        <div class='project-error-state' data-component='data-error-state' hidden>
                            <!-- Populated by JS -->
                        </div>

                        <div class='project-empty-state' data-component='empty-state-panel' hidden>
                            <!-- Populated by JS -->
                        </div>

                        <section class='project-item-grid' data-component='project-item-grid' aria-label='Project items grid'>
                            <!-- Populated by JS -->
                        </section>
                    </section>

                    <!-- Floating bulk actions card (bottom-left overlay) -->
                    <aside class='project-bulk-actions' data-component='project-bulk-actions-bar' hidden aria-label='Bulk actions for selected project items'>
                        <!-- Populated by JS -->
                    </aside>

                    <!-- Remove item confirm dialog -->
                    <div class='modal-overlay' data-component='remove-item-confirm-dialog' role='dialog' aria-modal='true' hidden>
                        <!-- Populated by JS -->
                    </div>

                    <!-- Notification toasts -->
                    <div class='notification-center' data-component='notification-center' aria-live='polite' aria-atomic='true'>
                        <!-- Toasts injected by JS -->
                    </div>
                </div>
            </div>
        </main>

        <footer class='site-footer'>
            <div class='container site-footer__inner'>
                <div class='site-footer__brand'>
                    <a href='index.html' class='brand brand--footer'>
                        <span class='brand__mark'>CI</span>
                        <span class='brand__text'>Culture Illustro</span>
                    </a>
                    <p class='site-footer__copy'>&copy; <span data-year></span> Culture Illustro. All rights reserved.</p>
                </div>

                <nav class='footer-nav' aria-label='Footer navigation'>
                    <ul class='footer-nav__list'>
                        <li class='footer-nav__item'>

                        </li>
                        <li class='footer-nav__item'>
                            <a href='contact.html' class='footer-nav__link'>Contact</a>
                        </li>
                        <li class='footer-nav__item'>
                            <a href='pricing.html' class='footer-nav__link'>Pricing</a>
                        </li>
                        <li class='footer-nav__item'>
                            <a href='help.html' class='footer-nav__link'>Help Center</a>

        </footer>

    <script src='business_logic.js'></script>

                    'notify.cart_error': 'No se pudo actualizar el carrito.',
                    'notify.project_load_error': 'No se pudo cargar el proyecto.',
                    'notify.language_update_error': 'No se pudo actualizar el idioma.'

            function t(key, vars) {
                var lang = pageState.lang && translations[pageState.lang] ? pageState.lang : 'en';
                var dict = translations[lang] || translations.en;
                var str = dict[key] || translations.en[key] || key;
                if (vars) {
                    Object.keys(vars).forEach(function(k) {
                        var re = new RegExp('\\{' + k + '\\}', 'g');
                        str = str.replace(re, vars[k]);
                    });
                }
                return str;
            }

            function escapeHtml(str) {
                if (str === null || str === undefined) {
                    return '';
                }
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/\x22/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function getCurrencySymbol(currency) {
                if (!currency) return '';
                if (currency === 'usd') return '$';
                if (currency === 'eur') return '€';
                if (currency === 'gbp') return '£';
                return '';
            }

            function parseInitialUrlParams() {
                var params = new URLSearchParams(window.location.search);
                var id = params.get('id');
                if (id) {
                    pageState.projectId = id;
                }
                var sort = params.get('sort');
                if (sort) {
                    pageState.sort = sort;
                }
                var filterPattern = params.get('filterPattern');
                if (filterPattern === 'true') {
                    pageState.filters.pattern = true;
                }
                var filterOrientation = params.get('filterOrientation');
                if (filterOrientation) {
                    pageState.filters.orientation = filterOrientation;
                }
                var filterStyle = params.get('filterStyle');
                if (filterStyle) {
                    pageState.filters.style = filterStyle;
                }
                var filterColor = params.get('filterColorPalette');
                if (filterColor) {
                    pageState.filters.colorPalette = filterColor;
                }
                var view = params.get('view');
                if (view) {
                    pageState.viewMode = view;
                }
                var lang = params.get('lang');
                if (lang === 'en' || lang === 'es') {
                    pageState.lang = lang;
                }
            }

            function syncUrlParams() {
                var params = new URLSearchParams(window.location.search);
                if (pageState.projectId) {
                    params.set('id', pageState.projectId);
                }
                if (pageState.sort) {
                    params.set('sort', pageState.sort);
                } else {
                    params.delete('sort');
                }
                if (pageState.filters.pattern === true) {
                    params.set('filterPattern', 'true');
                } else {
                    params.delete('filterPattern');
                }
                if (pageState.filters.orientation) {
                    params.set('filterOrientation', pageState.filters.orientation);
                } else {
                    params.delete('filterOrientation');
                }
                if (pageState.filters.style) {
                    params.set('filterStyle', pageState.filters.style);
                } else {
                    params.delete('filterStyle');
                }
                if (pageState.filters.colorPalette) {
                    params.set('filterColorPalette', pageState.filters.colorPalette);
                } else {
                    params.delete('filterColorPalette');
                }
                if (pageState.viewMode) {
                    params.set('view', pageState.viewMode);
                } else {
                    params.delete('view');
                }
                if (pageState.lang) {
                    params.set('lang', pageState.lang);
                } else {
                    params.delete('lang');
                }
                var newUrl = window.location.pathname + '?' + params.toString();
                window.history.replaceState({}, '', newUrl);
            }

            var notificationContainer = document.querySelector('[data-component="notification-center"]');

            function showNotification(type, message) {
                if (!notificationContainer) return;
                var toast = document.createElement('div');
                toast.className = 'toast toast--' + type;
                toast.setAttribute('role', 'status');
                toast.innerHTML = '\n                    <div class=\'toast__body\'>\n                        <span class=\'toast__message\'>' + escapeHtml(message) + '</span>\n                        <button type=\'button\' class=\'toast__close\' data-action=\'dismiss-notification\' aria-label=\'Dismiss notification\'>&times;</button>\n                    </div>\n                ';
                notificationContainer.appendChild(toast);
                setTimeout(function() {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 5000);
            }

            function computeVisibleItems() {
                var items = pageState.rawItems.slice();
                if (pageState.filters.pattern) {
                    items = items.filter(function(pair) {
                        var ill = pair.illustration || {};
                        return ill.is_seamless_pattern || ill.is_repeatable_pattern || ill.size_category === 'pattern';
                    });
                }
                if (pageState.filters.orientation) {
                    items = items.filter(function(pair) {
                        var ill = pair.illustration || {};
                        return ill.orientation === pageState.filters.orientation;
                    });
                }
                if (pageState.filters.style) {
                    items = items.filter(function(pair) {
                        var ill = pair.illustration || {};
                        return ill.style === pageState.filters.style;
                    });
                }
                if (pageState.filters.colorPalette) {
                    items = items.filter(function(pair) {
                        var ill = pair.illustration || {};
                        return ill.color_palette === pageState.filters.colorPalette;
                    });
                }
                items.sort(function(a, b) {
                    var ia = a.illustration || {};
                    var ib = b.illustration || {};
                    if (pageState.sort === 'price_standard_asc') {
                        var pa = ia.price_standard || 0;
                        var pb = ib.price_standard || 0;
                        return pa - pb;
                    }
                    if (pageState.sort === 'download_count_desc') {
                        var da = ia.download_count || 0;
                        var db = ib.download_count || 0;
                        return db - da;
                    }
                    var ca = ia.created_at ? new Date(ia.created_at).getTime() : 0;
                    var cb = ib.created_at ? new Date(ib.created_at).getTime() : 0;
                    return cb - ca;
                });
                pageState.visibleItems = items;
            }

            function renderLanguageToggle(container) {
                if (!container) return;
                var currentLang = pageState.lang || 'en';
                container.innerHTML = '\n                    <div class=\'language-toggle\'>\n                        <span class=\'language-toggle__label\'>' + escapeHtml(t('language.label')) + '</span>\n                        <div class=\'language-toggle__buttons\'>\n                            <button type=\'button\' class=\'btn btn--ghost ' + (currentLang === 'en' ? 'btn--active' : '') + '\' data-action=\'change-language\' data-lang=\'en\'>' + escapeHtml(t('language.english')) + '</button>\n                            <button type=\'button\' class=\'btn btn--ghost ' + (currentLang === 'es' ? 'btn--active' : '') + '\' data-action=\'change-language\' data-lang=\'es\'>' + escapeHtml(t('language.spanish')) + '</button>\n                        </div>\n                    </div>\n                ';
            }

            function renderCartSummary(container) {
                if (!container) return;
                var cart = pageState.cart;
                var totalItems = cart && typeof cart.total_items === 'number' ? cart.total_items : 0;
                var subtotal = cart && typeof cart.subtotal_amount === 'number' ? cart.subtotal_amount : 0;
                var currency = cart && cart.currency ? cart.currency : (pageState.sitePreference && pageState.sitePreference.currency ? pageState.sitePreference.currency : 'usd');
                var symbol = getCurrencySymbol(currency);
                var subtotalLabel = symbol + subtotal.toFixed ? subtotal.toFixed(2) : subtotal;
                container.innerHTML = '\n                    <span class=\'cart-summary__label\'>' + escapeHtml(t('cart.label')) + '</span>\n                    <span class=\'cart-summary__count\'>' + escapeHtml(String(totalItems)) + ' ' + escapeHtml(t('cart.items')) + '</span>\n                    <span class=\'cart-summary__subtotal\'>' + escapeHtml(subtotalLabel) + '</span>\n                ';
            }

            function formatDate(dateStr) {
                if (!dateStr) return '';
                var d = new Date(dateStr);
                if (isNaN(d.getTime())) return '';
                return d.toLocaleDateString();
            }

            function renderProjectHeader(container) {
                if (!container) return;
                var project = pageState.project;
                if (!project) {
                    container.innerHTML = '\n                        <div class=\'project-header project-header--empty\'>\n                            <button type=\'button\' class=\'btn btn--ghost\' data-action=\'back-to-projects\'>' + escapeHtml(t('project.back')) + '</button>\n                        </div>\n                    ';
                    return;
                }
                var statusKey = project.status === 'archived' ? 'project.status.archived' : 'project.status.active';
                var statusLabel = t(statusKey);
                var count = typeof project.item_count === 'number' ? project.item_count : pageState.rawItems.length;
                var created = formatDate(project.created_at);
                var updated = formatDate(project.updated_at);
                container.innerHTML = '\n                    <div class=\'project-header\'>\n                        <div class=\'project-header__left\'>\n                            <button type=\'button\' class=\'btn btn--ghost project-header__back\' data-action=\'back-to-projects\'>' + escapeHtml(t('project.back')) + '</button>\n                            <div class=\'project-header__titles\'>\n                                <h1 class=\'project-header__title\' data-populate=\'project-name\'>' + escapeHtml(project.name || '') + '</h1>\n                                ' + (project.description ? '<p class=\'project-header__description\' data-populate=\'project-description\'>' + escapeHtml(project.description) + '</p>' : '') + '\n                            </div>\n                        </div>\n                        <div class=\'project-header__meta\'>\n                            <span class=\'project-header__status project-header__status--' + escapeHtml(project.status) + '\' data-populate=\'project-status\'>' + escapeHtml(statusLabel) + '</span>\n                            <span class=\'project-header__count\' data-populate=\'project-item-count\'>' + escapeHtml(String(count)) + ' ' + escapeHtml(t('project.items_count')) + '</span>\n                            ' + (created ? '<span class=\'project-header__timestamp\'>' + escapeHtml(created) + '</span>' : '') + '\n                            ' + (updated ? '<span class=\'project-header__timestamp\'>' + escapeHtml(updated) + '</span>' : '') + '\n                        </div>\n                    </div>\n                    ' + (project.status === 'archived' ? '\n                    <div class=\'project-header__note project-header__note--archived\'>' + escapeHtml(t('project.archived_note')) + '</div>\n                    ' : '') + '\n                ';
            }

            function renderViewControls(container) {
                if (!container) return;
                var sort = pageState.sort || 'created_at_desc';
                var filters = pageState.filters;
                var viewMode = pageState.viewMode || 'grid';

            function loadSitePreferences() {
                try {
                    var pref = WebsiteSDK.getSitePreferences();
                    pageState.sitePreference = pref;
                    if (!pageState.lang && pref && pref.language) {
                        pageState.lang = pref.language;
                    } else if (pageState.lang && pref && pref.language && pageState.lang !== pref.language) {
                        try {
                            var updated = WebsiteSDK.setSiteLanguage(pageState.lang);
                            pageState.sitePreference = updated;
                        } catch (e2) {
                            pageState.errors.sitePreferences = e2;
                            showNotification('error', t('notify.site_pref_error'));
                        }
                    } else if (pref && pref.language) {
                        pageState.lang = pref.language;
                    }
                    syncUrlParams();
                    renderAll();
                } catch (e) {
                    pageState.errors.sitePreferences = e;
                    renderAll();
                    showNotification('error', t('notify.site_pref_error'));

                renderBulkActionsBar(bulkBar);

            function bulkAddSelectedToCart() {
                var ids = Array.from(pageState.selection);
                if (!ids.length) return;
                var successes = 0;
                var failures = 0;
                var licenseType = pageState.bulkLicenseType || undefined;
                var quantity = pageState.bulkQuantity || 1;
                ids.forEach(function(projectItemId) {
                    var pair = pageState.rawItems.find(function(p) { return p.project_item && p.project_item.id === projectItemId; });
                    if (!pair || !pair.illustration || !pair.illustration.id) {
                        failures++;
                        return;
                    }
                    var illustrationId = pair.illustration.id;
                    try {
                        var res = WebsiteSDK.addIllustrationToCart(illustrationId, licenseType, null, quantity);
                        if (res && res.cart) {
                            pageState.cart = res.cart;
                            var cartSummary = document.querySelector('[data-component="header-cart-summary"]');
                            renderCartSummary(cartSummary);
                        }
                        if (res && res.message) {
                            showNotification('success', res.message);
                        }
                        successes++;
                    } catch (e) {
                        failures++;
                    }
                });
                if (successes > 0) {
                    showNotification('success', t('notify.bulk_add_success', { count: successes }));
                }
                if (failures > 0) {
                    showNotification('error', t('notify.bulk_add_partial'));
                }
            }

            function openRemoveDialog(projectItemId) {
                pageState.pendingRemovalProjectItemId = projectItemId;
                var dialog = document.querySelector('[data-component="remove-item-confirm-dialog"]');
                if (!dialog) return;
                dialog.removeAttribute('hidden');
                renderRemoveDialog(dialog);
            }

            function closeRemoveDialog() {
                var dialog = document.querySelector('[data-component="remove-item-confirm-dialog"]');
                if (!dialog) return;
                dialog.setAttribute('hidden', 'hidden');
                renderRemoveDialog(dialog);
                pageState.pendingRemovalProjectItemId = null;
            }

            function confirmRemoveItem() {
                var projectItemId = pageState.pendingRemovalProjectItemId;
                if (!projectItemId) {
                    closeRemoveDialog();
                    return;
                }
                try {
                    var res = WebsiteSDK.removeIllustrationFromProject(projectItemId);
                    if (res && res.success) {
                        pageState.rawItems = pageState.rawItems.filter(function(p) { return !p.project_item || p.project_item.id !== projectItemId; });
                        if (pageState.project) {
                            pageState.project.item_count = pageState.rawItems.length;
                        }
                        pageState.selection.delete(projectItemId);
                        closeRemoveDialog();
                        renderAll();
                        showNotification('success', t('notify.item_removed'));
                    } else {
                        showNotification('error', t('notify.project_load_error'));
                    }
                } catch (e) {
                    showNotification('error', t('notify.project_load_error'));
                }
            }

            function handleAction(element, action, event) {
                if (action === 'view-cart') {
                    window.location.href = 'cart.html';
                    return;
                }
                if (action === 'back-to-projects') {
                    window.location.href = 'projects.html';
                    return;
                }
                if (action === 'change-language') {
                    var lang = element.getAttribute('data-lang');
                    if (!lang || lang === pageState.lang) return;
                    try {
                        var pref = WebsiteSDK.setSiteLanguage(lang);
                        pageState.sitePreference = pref;
                        pageState.lang = pref && pref.language ? pref.language : lang;
                        syncUrlParams();
                        renderAll();
                        showNotification('success', t('notify.language_updated'));
                    } catch (e) {
                        showNotification('error', t('notify.language_update_error'));
                    }
                    return;
                }
                if (action === 'open-product') {
                    var illId = element.getAttribute('data-illustration-id');
                    if (illId) {
                        window.location.href = 'product.html?id=' + encodeURIComponent(illId);
                    }
                    return;
                }
                if (action === 'toggle-item-selection') {
                    var projectItemId = element.getAttribute('data-project-item-id');
                    if (!projectItemId) return;
                    var checked = element.checked;
                    if (checked) {
                        pageState.selection.add(projectItemId);
                    } else {
                        pageState.selection.delete(projectItemId);
                    }
                    updateSelectionUI();
                    return;
                }
                if (action === 'open-remove-dialog') {
                    var pid = element.getAttribute('data-project-item-id');
                    if (pid) {
                        openRemoveDialog(pid);
                    }
                    return;
                }
                if (action === 'cancel-remove-item') {
                    closeRemoveDialog();
                    return;
                }
                if (action === 'confirm-remove-item') {
                    confirmRemoveItem();
                    return;
                }
                if (action === 'dismiss-notification') {
                    var toast = element.closest('.toast');
                    if (toast && toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                    return;
                }
                if (action === 'change-sort') {
                    var newSort = element.value;
                    pageState.sort = newSort || 'created_at_desc';
                    syncUrlParams();
                    computeVisibleItems();
                    var grid = document.querySelector('[data-component="project-item-grid"]');
                    renderProjectGrid(grid);
                    var emptyPanel = document.querySelector('[data-component="empty-state-panel"]');
                    renderEmptyState(emptyPanel);
                    return;
                }
                if (action === 'filter-pattern') {
                    pageState.filters.pattern = element.checked ? true : null;
                    syncUrlParams();
                    computeVisibleItems();
                    var grid2 = document.querySelector('[data-component="project-item-grid"]');
                    renderProjectGrid(grid2);
                    var emptyPanel2 = document.querySelector('[data-component="empty-state-panel"]');
                    renderEmptyState(emptyPanel2);
                    var bulkBar2 = document.querySelector('[data-component="project-bulk-actions-bar"]');
                    renderBulkActionsBar(bulkBar2);
                    return;
                }
                if (action === 'filter-orientation') {
                    var val = element.value;
                    pageState.filters.orientation = val || null;
                    syncUrlParams();
                    computeVisibleItems();
                    var grid3 = document.querySelector('[data-component="project-item-grid"]');
                    renderProjectGrid(grid3);
                    var emptyPanel3 = document.querySelector('[data-component="empty-state-panel"]');
                    renderEmptyState(emptyPanel3);
                    var bulkBar3 = document.querySelector('[data-component="project-bulk-actions-bar"]');
                    renderBulkActionsBar(bulkBar3);
                    return;
                }
                if (action === 'filter-style') {
                    var val2 = element.value;
                    pageState.filters.style = val2 || null;
                    syncUrlParams();
                    computeVisibleItems();
                    var grid4 = document.querySelector('[data-component="project-item-grid"]');
                    renderProjectGrid(grid4);
                    var emptyPanel4 = document.querySelector('[data-component="empty-state-panel"]');
                    renderEmptyState(emptyPanel4);
                    var bulkBar4 = document.querySelector('[data-component="project-bulk-actions-bar"]');
                    renderBulkActionsBar(bulkBar4);
                    return;
                }
                if (action === 'filter-color-palette') {
                    var val3 = element.value;
                    pageState.filters.colorPalette = val3 || null;
                    syncUrlParams();
                    computeVisibleItems();
                    var grid5 = document.querySelector('[data-component="project-item-grid"]');
                    renderProjectGrid(grid5);
                    var emptyPanel5 = document.querySelector('[data-component="empty-state-panel"]');
                    renderEmptyState(emptyPanel5);
                    var bulkBar5 = document.querySelector('[data-component="project-bulk-actions-bar"]');
                    renderBulkActionsBar(bulkBar5);
                    return;
                }
                if (action === 'change-view-mode') {
                    var view = element.getAttribute('data-view') || 'grid';
                    pageState.viewMode = view;
                    syncUrlParams();
                    var viewControls = document.querySelector('[data-component="project-view-controls"]');
                    renderViewControls(viewControls);
                    var grid6 = document.querySelector('[data-component="project-item-grid"]');
                    renderProjectGrid(grid6);
                    return;
                }
                if (action === 'select-all-visible') {
                    pageState.visibleItems.forEach(function(pair) {
                        if (pair.project_item && pair.project_item.id) {
                            pageState.selection.add(pair.project_item.id);
                        }
                    });
                    updateSelectionUI();
                    return;
                }
                if (action === 'clear-selection') {
                    pageState.selection.clear();
                    updateSelectionUI();
                    return;
                }
                if (action === 'change-license-type') {
                    pageState.bulkLicenseType = element.value || 'standard_commercial';
                    return;
                }
                if (action === 'change-bulk-quantity') {
                    var q = parseInt(element.value, 10);
                    if (!q || q < 1) q = 1;
                    pageState.bulkQuantity = q;
                    element.value = String(q);
                    return;
                }
                if (action === 'bulk-add-to-cart') {
                    bulkAddSelectedToCart();
                    return;
                }
                if (action === 'clear-filters') {
                    clearFilters();
                    return;
                }
                if (action === 'retry-get-project-detail') {
                    pageState.errors.projectDetail = null;
                    loadProjectDetail();
                    return;
                }
                if (action === 'retry-get-cart-summary') {
                    pageState.errors.cartSummary = null;
                    loadCartSummary();
                    return;
                }
                if (action === 'retry-get-site-preferences') {
                    pageState.errors.sitePreferences = null;
                    loadSitePreferences();
                    return;
                }
            }

            document.addEventListener('click', function(event) {
                var target = event.target;
                var el = target.closest('[data-action]');
                if (!el) return;
                var action = el.getAttribute('data-action');
                if (!action) return;
                handleAction(el, action, event);
            });

            document.addEventListener('change', function(event) {
                var target = event.target;
                var el = target.closest('[data-action]');
                if (!el) return;
                var action = el.getAttribute('data-action');
                if (!action) return;
                handleAction(el, action, event);
            });

            window.addEventListener('popstate', function() {
                parseInitialUrlParams();
                computeVisibleItems();
                renderAll();
            });

            parseInitialUrlParams();
            loadSitePreferences();
            loadCartSummary();
            if (pageState.projectId) {
                loadProjectDetail();
            } else {
                pageState.errors.missingProjectId = true;
                renderAll();
            }
        });
    </script>
    <script>
        (function() {
            var yearSpan = document.querySelector('[data-year]');
            if (yearSpan) {
                yearSpan.textContent = new Date().getFullYear();
            }
        })();
    </script>
</body>
</html>
