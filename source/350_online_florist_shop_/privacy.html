<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>520 D Love Florist</title>
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&amp;family=Source+Sans+3:wght@400;500;600&amp;display=swap' rel='stylesheet' />
  <link rel='stylesheet' href='styles.css' />
  <link rel='stylesheet' href='privacy.css' />
</head>
<body>
  <div class='page-wrapper'>
    <header class='site-header'>
      <div class='site-header__bar'>
        <div class='site-header__icon site-header__icon--menu' aria-hidden='true'>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class='site-header__title'>
          <a href='index.html' class='site-header__brand'>520 D Love Florist</a>
        </div>
        <div class='site-header__icon site-header__icon--phone' aria-hidden='true'></div>
        <button class='site-header__cart' type='button' data-component='header-cart-summary' data-populate='CartSummary' data-action='openCart' aria-label='View cart summary'></button>
      </div>

      <nav class='site-header__nav' aria-label='Main navigation'>
        <ul class='site-header__nav-list' data-component='header-navigation' data-populate='NavigationCategories'>
          <!-- Navigation will be populated via JavaScript -->
        </ul>
      </nav>

      <div class='site-header__translate'>
        <p class='site-header__translate-label'>Powered by <span class='site-header__translate-google'>Google <span>Translate</span></span></p>
        <div class='language-select-placeholder'>Select Language</div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='privacy-page'>
        <div class='privacy-page__loader-wrapper'>
          <div class='privacy-loader' data-component='privacy-content-loader' aria-hidden='true'>
            <div class='privacy-loader__line privacy-loader__line--title'></div>
            <div class='privacy-loader__line'></div>
            <div class='privacy-loader__line'></div>
            <div class='privacy-loader__line'></div>
          </div>
        </div>

        <div id='privacy-error-message' class='privacy-page__error' role='alert' aria-live='polite' style='display:none;'></div>

        <section class='privacy-page__header-row'>
          <h1 class='privacy-page__title' data-populate='StaticPageContent' data-field='title'></h1>
        </section>

        <section class='privacy-page__toc' data-component='privacy-section-toc'>
          <div class='privacy-toc__row'>
            <label class='privacy-toc__label' for='privacy-toc-select'>Jump to section</label>
            <select id='privacy-toc-select' class='privacy-toc__select' data-populate='StaticPageContent' data-field='toc' data-action='selectSection'>
              <option value=''>Loading sections...</option>
            </select>
          </div>
        </section>

        <section class='privacy-page__content'>
          <div class='privacy-page__sections' data-component='privacy-content-sections' data-populate='StaticPageContent' data-field='sections'>
            <!-- Privacy policy sections will be rendered here -->
          </div>
        </section>

        <div class='privacy-page__contact-bar-spacer'></div>

        <div class='privacy-contact-bar' data-component='privacy-contact-links'>
          <div class='privacy-contact-bar__inner' data-populate='StaticPageContent' data-field='contact'>
            <!-- Contact links will be rendered here -->
          </div>
        </div>
      </div>
    </main>

    <footer class='site-footer'>
      <nav class='site-footer__nav' aria-label='Footer navigation'>
        <ul class='site-footer__links'>
          <li><a href='about.html'>About Us</a></li>
          <li><a href='contact.html'>Contact</a></li>
          <li><a href='help.html'>Help &amp; FAQ</a></li>
          <li><a href='delivery.html'>Delivery &amp; Shipping</a></li>
          <li><a href='returns.html'>Returns &amp; Refunds</a></li>
          <li><a href='subscriptions.html'>Subscriptions</a></li>
          <li><a href='terms.html'>Terms &amp; Conditions</a></li>
          <li><a href='privacy.html'>Privacy Policy</a></li>
        </ul>
      </nav>
      <p class='site-footer__copy'>&copy; 2024 520 D Love Florist. All rights reserved.</p>
    </footer>

    <a href='contact.html' class='floating-contact' aria-label='Contact us'>
      <span class='floating-contact__inner'>WA</span>
    </a>

    <a href='index.html' class='bottom-cta'>
      <span class='bottom-cta__icon' aria-hidden='true'></span>
      <span class='bottom-cta__label'>Home</span>
    </a>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      var currentUrl = new URL(window.location.href);
      var currentSectionKey = currentUrl.searchParams.get('section') || (currentUrl.hash ? currentUrl.hash.substring(1) : null) || null;
      var currentLang = currentUrl.searchParams.get('lang') || null;

      var loaderElement = document.querySelector('[data-component="privacy-content-loader"]');
      var errorElement = document.getElementById('privacy-error-message');
      var staticPageElements = [];
      var staticPageContent = null;
      var sectionIndexByKey = {};

      function getBasePageKey() {
        var path = window.location.pathname || '';
        var file = path.split('/').pop() || '';
        var parts = file.split('.');
        parts.pop();
        var base = parts.join('.') || 'privacy';
        return base;
      }

      function getPageKeyFromUrl() {
        var base = getBasePageKey();
        return currentLang ? base + '_' + currentLang : base;
      }

      function showLoader(isVisible) {
        if (!loaderElement) return;
        loaderElement.style.display = isVisible ? '' : 'none';
      }

      function showError(message) {
        if (!errorElement) return;
        if (message) {
          errorElement.textContent = message;
          errorElement.style.display = 'block';
        } else {
          errorElement.textContent = '';
          errorElement.style.display = 'none';
        }
      }

      function deriveSectionKey(heading, index) {
        if (!heading) return 'section_' + index;
        var normalised = heading.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
        return normalised || 'section_' + index;
      }

      function renderStaticTitle(container, content) {
        var title = content && content.title ? content.title : '';
        container.textContent = title;
      }

      function renderSections(container, content) {
        container.innerHTML = '';
        sectionIndexByKey = {};
        var sections = Array.isArray(content && content.sections) ? content.sections : [];

        if (!sections.length) {
          var emptyMsg = document.createElement('p');
          emptyMsg.className = 'privacy-page__empty';
          emptyMsg.textContent = 'No privacy policy content is available at the moment.';
          container.appendChild(emptyMsg);
          return;
        }

        sections.forEach(function(sec, index) {
          var heading = sec && sec.heading ? sec.heading : '';
          var bodyHtml = sec && typeof sec.body === 'string' ? sec.body : '';
          var key = deriveSectionKey(heading, index);
          sectionIndexByKey[key] = index;

          var sectionEl = document.createElement('section');
          sectionEl.className = 'privacy-section';
          sectionEl.id = key;
          sectionEl.setAttribute('data-section-key', key);

          if (heading) {
            var h2 = document.createElement('h2');
            h2.className = 'privacy-section__heading';
            h2.textContent = heading;
            sectionEl.appendChild(h2);
          }

          var bodyDiv = document.createElement('div');
          bodyDiv.className = 'privacy-section__body';
          bodyDiv.innerHTML = bodyHtml;
          sectionEl.appendChild(bodyDiv);

          container.appendChild(sectionEl);
        });
      }

      function renderToc(container, content) {
        var sections = Array.isArray(content && content.sections) ? content.sections : [];
        container.innerHTML = '';

        var defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = sections.length ? 'Jump to section...' : 'No sections available';
        container.appendChild(defaultOption);

        sections.forEach(function(sec, index) {
          var heading = sec && sec.heading ? sec.heading : '';
          var key = deriveSectionKey(heading, index);
          var option = document.createElement('option');
          option.value = key;
          option.textContent = heading || ('Section ' + (index + 1));
          container.appendChild(option);
        });

        if (currentSectionKey) {
          container.value = currentSectionKey;
        }
      }

      function renderContactLinks(container, content) {
        container.innerHTML = '';
        var info = content && content.contact_info ? content.contact_info : null;
        var wrapper = document.createElement('div');
        wrapper.className = 'privacy-contact-bar__content';

        if (!info || (!info.email && !info.phone && !info.support_hours)) {
          var text = document.createElement('p');
          text.className = 'privacy-contact-bar__text';
          text.textContent = 'For privacy questions, please use the contact options provided on this page.';
          wrapper.appendChild(text);
          container.appendChild(wrapper);
          return;
        }

        if (info.support_hours) {
          var hours = document.createElement('p');
          hours.className = 'privacy-contact-bar__hours';
          hours.textContent = info.support_hours;
          wrapper.appendChild(hours);
        }

        var linksRow = document.createElement('div');
        linksRow.className = 'privacy-contact-bar__links';

        if (info.email) {
          var emailLink = document.createElement('a');
          emailLink.href = 'javascript:void(0)';
          emailLink.className = 'privacy-contact-bar__link privacy-contact-bar__link--email';
          emailLink.setAttribute('data-action', 'contact-email');
          emailLink.setAttribute('data-contact-email', info.email);
          emailLink.textContent = 'Email privacy team';
          linksRow.appendChild(emailLink);
        }

        if (info.phone) {
          var phoneLink = document.createElement('a');
          phoneLink.href = 'javascript:void(0)';
          phoneLink.className = 'privacy-contact-bar__link privacy-contact-bar__link--phone';
          phoneLink.setAttribute('data-action', 'contact-phone');
          phoneLink.setAttribute('data-contact-phone', info.phone);
          phoneLink.textContent = 'Call us';
          linksRow.appendChild(phoneLink);
        }

        wrapper.appendChild(linksRow);
        container.appendChild(wrapper);
      }

      function renderNavigationCategories(container, categories) {
        container.innerHTML = '';

        var homeLi = document.createElement('li');
        homeLi.className = 'site-header__nav-item';
        var homeLink = document.createElement('a');
        homeLink.href = 'index.html';
        homeLink.textContent = 'Home';
        homeLi.appendChild(homeLink);
        container.appendChild(homeLi);

        if (Array.isArray(categories) && categories.length) {
          categories.forEach(function(cat) {
            var li = document.createElement('li');
            li.className = 'site-header__nav-item';
            var link = document.createElement('a');
            link.href = 'javascript:void(0)';
            link.textContent = (cat && cat.category_name) ? cat.category_name : ((cat && cat.category_id) ? cat.category_id : 'Category');
            link.setAttribute('data-action', 'navigateCategory');
            if (cat && cat.category_id) {
              link.setAttribute('data-category-id', cat.category_id);
            }
            li.appendChild(link);
            container.appendChild(li);
          });
        }

        var staticLinks = [
          { href: 'subscriptions.html', label: 'Subscriptions' },
          { href: 'help.html', label: 'Help' },
          { href: 'contact.html', label: 'Contact' },
          { href: 'delivery.html', label: 'Delivery & Shipping' },
          { href: 'returns.html', label: 'Returns & Refunds' },
          { href: 'terms.html', label: 'Terms & Conditions' },
          { href: 'privacy.html', label: 'Privacy Policy' }
        ];

        staticLinks.forEach(function(item) {
          var li = document.createElement('li');
          li.className = 'site-header__nav-item';
          var link = document.createElement('a');
          link.href = item.href;
          link.textContent = item.label;
          li.appendChild(link);
          container.appendChild(li);
        });
      }

      function renderCartSummary(container, summary) {
        var itemCount = summary && typeof summary.item_count === 'number' ? summary.item_count : 0;
        var subtotal = summary && typeof summary.subtotal === 'number' ? summary.subtotal : 0;
        var hasPromo = summary && !!summary.has_applied_promo;
        var promoText = hasPromo ? 'Promo applied' : 'No promo';

        var plural = itemCount === 1 ? '' : 's';

        container.innerHTML = '';
        container.classList.add('cart-summary');

        var iconSpan = document.createElement('span');
        iconSpan.className = 'cart-summary__icon';
        iconSpan.setAttribute('aria-hidden', 'true');
        container.appendChild(iconSpan);

        var textWrapper = document.createElement('span');
        textWrapper.className = 'cart-summary__text';

        var countSpan = document.createElement('span');
        countSpan.className = 'cart-summary__count';
        countSpan.textContent = itemCount + ' item' + plural;
        textWrapper.appendChild(countSpan);

        var subtotalSpan = document.createElement('span');
        subtotalSpan.className = 'cart-summary__subtotal';
        subtotalSpan.textContent = '$' + subtotal.toFixed(2);
        textWrapper.appendChild(subtotalSpan);

        var promoSpan = document.createElement('span');
        promoSpan.className = 'cart-summary__promo';
        promoSpan.textContent = promoText;
        textWrapper.appendChild(promoSpan);

        container.appendChild(textWrapper);
      }

      function updateSectionInUrl(sectionKey, replace) {
        var url = new URL(window.location.href);
        if (sectionKey) {
          url.searchParams.set('section', sectionKey);
          url.hash = sectionKey;
        } else {
          url.searchParams.delete('section');
          url.hash = '';
        }
        var newUrl = url.pathname + url.search + url.hash;
        if (replace) {
          window.history.replaceState({}, '', newUrl);
        } else {
          window.history.pushState({}, '', newUrl);
        }
      }

      function scrollToSectionKey(sectionKey, replaceUrl) {
        if (!sectionKey) return;
        var selector = '[data-section-key="' + sectionKey + '"]';
        var section = document.querySelector(selector);
        if (!section) return;

        var header = document.querySelector('.site-header');
        var offset = header ? (header.offsetHeight || 0) : 0;
        var rect = section.getBoundingClientRect();
        var targetY = rect.top + window.pageYOffset - offset - 8;
        if (targetY < 0) targetY = 0;

        try {
          window.scrollTo({ top: targetY, behavior: 'smooth' });
        } catch (e) {
          window.scrollTo(0, targetY);
        }

        updateSectionInUrl(sectionKey, !!replaceUrl);

        var tocSelect = document.getElementById('privacy-toc-select');
        if (tocSelect && tocSelect.value !== sectionKey) {
          tocSelect.value = sectionKey;
        }
      }

      function loadAndRenderStaticPageContent() {
        var pageKey = getPageKeyFromUrl();
        showLoader(true);
        showError('');

        var content = null;
        try {
          content = WebsiteSDK.getStaticPageContent(pageKey);
        } catch (e) {
          showLoader(false);
          showError('Unable to load the privacy policy right now. Please try again later.');
          return;
        }

        staticPageContent = content;

        staticPageElements.forEach(function(el) {
          var field = el.dataset.field || '';
          if (field === 'title') {
            renderStaticTitle(el, content);
          } else if (field === 'sections') {
            renderSections(el, content);
          } else if (field === 'toc') {
            renderToc(el, content);
          } else if (field === 'contact') {
            renderContactLinks(el, content);
          }
        });

        showLoader(false);

        if (currentSectionKey) {
          scrollToSectionKey(currentSectionKey, true);
        }
      }

      var populateElements = document.querySelectorAll('[data-populate]');

      populateElements.forEach(function(el) {
        var type = el.dataset.populate;
        if (type === 'NavigationCategories') {
          try {
            var categories = WebsiteSDK.getCategoriesForNavigation();
            renderNavigationCategories(el, categories);
          } catch (e) {
            renderNavigationCategories(el, []);
          }
        } else if (type === 'CartSummary') {
          try {
            var summary = WebsiteSDK.getCartSummary();
            renderCartSummary(el, summary);
          } catch (e) {
            renderCartSummary(el, { item_count: 0, subtotal: 0, has_applied_promo: false });
          }
        } else if (type === 'StaticPageContent') {
          staticPageElements.push(el);
        }
      });

      loadAndRenderStaticPageContent();

      document.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) return;
        var action = target.dataset.action;

        if (action === 'navigateCategory') {
          event.preventDefault();
          var categoryId = target.getAttribute('data-category-id');
          if (!categoryId) return;
          var targetUrl = 'category.html?categoryId=' + encodeURIComponent(categoryId);
          window.location.href = targetUrl;
        } else if (action === 'openCart') {
          event.preventDefault();
          window.location.href = 'cart.html';
        } else if (action === 'contact-email') {
          event.preventDefault();
          var email = target.getAttribute('data-contact-email');
          if (!email) return;
          window.location.href = 'mailto:' + email;
        } else if (action === 'contact-phone') {
          event.preventDefault();
          var phone = target.getAttribute('data-contact-phone');
          if (!phone) return;
          window.location.href = 'tel:' + phone;
        }
      });

      document.addEventListener('change', function(event) {
        var target = event.target;
        if (!target || !target.dataset) return;
        var action = target.dataset.action;
        if (action === 'selectSection') {
          var sectionKey = target.value;
          if (!sectionKey) return;
          currentSectionKey = sectionKey;
          scrollToSectionKey(sectionKey, false);
        }
      });

      function handleLocationSectionChange() {
        var url = new URL(window.location.href);
        var newSection = url.searchParams.get('section') || (url.hash ? url.hash.substring(1) : null);
        if (newSection && newSection !== currentSectionKey) {
          currentSectionKey = newSection;
          scrollToSectionKey(currentSectionKey, true);
        }
      }

      window.addEventListener('hashchange', handleLocationSectionChange);

      window.addEventListener('popstate', function() {
        var url = new URL(window.location.href);
        var newLang = url.searchParams.get('lang') || null;
        var newSection = url.searchParams.get('section') || (url.hash ? url.hash.substring(1) : null);

        if (newLang !== currentLang) {
          currentLang = newLang;
          loadAndRenderStaticPageContent();
        } else if (newSection !== currentSectionKey) {
          currentSectionKey = newSection;
          if (currentSectionKey) {
            scrollToSectionKey(currentSectionKey, true);
          }
        }
      });
    });
  </script>
</body>
</html>
