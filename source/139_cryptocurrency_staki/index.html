    <script>
        // Initialize website data
        if (!localStorage.getItem('dataInitialized')) {
            localStorage.setItem("governance_proposals", "[{\"id\":\"gp_luma_base_apy_adjustment_mar_2026\",\"title\":\"Adjust LUMA Base Staking APY for Short-Term Pools (March 2026)\",\"short_description\":\"Proposal to reduce volatility by narrowing the APY band on 7–30 day LUMA staking pools.\",\"full_text\":\"This proposal adjusts the base APY range for short-term LUMA staking pools (7–30 day lock durations) to improve reward predictability and reduce emission volatility. Specifically, the base APY band will be set to 8–12% for eligible pools, with exact values determined by the on-chain rate model and utilization at epoch boundaries. The change will affect new stakes created after activation; existing stakes will keep their originally committed APY. If approved, implementation will occur within 72 hours of proposal execution and monitored for at least one full quarter. Key parameters: (1) Target utilization: 65%; (2) Max APY for 7-day pools: 10%; (3) Max APY for 30-day pools: 12%; (4) No change to pools with lock durations over 60 days.\",\"status\":\"active\",\"quorum_requirement_percent\":45,\"voting_start_datetime\":\"2026-02-27T12:00:00Z\",\"voting_end_datetime\":\"2026-03-04T16:00:00Z\",\"created_at\":\"2026-02-20T09:30:00Z\"},{\"id\":\"gp_treasury_luma_buyback_q2_2026\",\"title\":\"Authorize Q2 2026 LUMA Treasury Buyback and Burn\",\"short_description\":\"Use a portion of protocol revenue to buy back and burn LUMA during Q2 2026.\",\"full_text\":\"This proposal authorizes the protocol treasury to allocate up to 18% of net staking and swap fee revenues generated in Q2 2026 to a systematic LUMA buyback and burn program. Purchases will be executed via TWAP orders over a 90-day period to minimize market impact and executed exclusively on whitelisted DEX venues with audited smart contracts. Burn events will be performed monthly and announced through the governance portal. The intended outcome is to support long-term LUMA value by returning a portion of protocol cash flows to token holders via supply reduction. Risk considerations, implementation details, and a transparency reporting schedule are outlined in the attached specification.\",\"status\":\"active\",\"quorum_requirement_percent\":50,\"voting_start_datetime\":\"2026-02-25T10:00:00Z\",\"voting_end_datetime\":\"2026-03-07T18:00:00Z\",\"created_at\":\"2026-02-18T14:15:00Z\"},{\"id\":\"gp_add_short_term_luma_pools\",\"title\":\"Introduce New 7 and 15 Day LUMA Staking Pools\",\"short_description\":\"Add high-liquidity LUMA pools with 7 and 15 day lock durations and dynamic APY bands.\",\"full_text\":\"This proposal adds two new short-term LUMA staking pool categories: a 7-day pool and a 15-day pool. Both pools will feature dynamic APY bands linked to protocol utilization and emissions schedules. The 7-day pool targets active traders seeking quick rotation and will have a lower APY ceiling but no early-unstake penalty. The 15-day pool will target users seeking slightly higher yields while maintaining modest lock-up duration and offering optional auto-compounding. Parameters include: (1) 7-day target APY: 7–10%; (2) 15-day target APY: 9–13%; (3) Max per-wallet stake caps to mitigate concentration risk; (4) Integration with the earnings calculator and auto-stake planners.\",\"status\":\"active\",\"quorum_requirement_percent\":40,\"voting_start_datetime\":\"2026-02-28T09:00:00Z\",\"voting_end_datetime\":\"2026-03-10T19:00:00Z\",\"created_at\":\"2026-02-17T11:45:00Z\"},{\"id\":\"gp_platform_fee_restructure_q2_2026\",\"title\":\"Restructure Platform Fees for Flexible and Fixed Pools (Q2 2026)\",\"short_description\":\"Simplify fee tiers, reduce fees on flexible pools, and introduce loyalty discounts for long-term stakers.\",\"full_text\":\"The current fee structure includes multiple overlapping tiers across flexible and fixed-duration pools. This proposal consolidates fee tiers into three clear buckets and reduces platform fees on flexible pools by 0.1–0.3 percentage points, while slightly increasing fees on ultra-high-yield exotic pools to offset revenue impact. Additionally, it introduces a loyalty discount mechanism based on total stake duration rather than just position age, rewarding consistent long-term participation. The proposal defines: (1) New fee tiers by pool risk class; (2) A dynamic loyalty discount between 0.05% and 0.3%; (3) A 30-day migration period for existing pools; and (4) Transparent reporting of fee changes in the analytics dashboard.\",\"status\":\"active\",\"quorum_requirement_percent\":42,\"voting_start_datetime\":\"2026-02-26T08:00:00Z\",\"voting_end_datetime\":\"2026-03-15T20:00:00Z\",\"created_at\":\"2026-02-16T16:20:00Z\"},{\"id\":\"gp_security_audit_budget_2026\",\"title\":\"Allocate 2026 Security Audit and Bug Bounty Budget\",\"short_description\":\"Set aside funds for third-party security audits and expand the bug bounty program.\",\"full_text\":\"To maintain a high security standard as the protocol adds new staking pools and automation features, this proposal allocates a dedicated 2026 security budget. It authorizes funding for at least two tier-1 smart contract audits covering core staking logic, auto-stake planners, and reward distribution contracts, as well as an expanded bug bounty program with tiered rewards up to $250,000 equivalent. The budget will be drawn from protocol revenue and, if necessary, a capped amount from the treasury reserve. The proposal establishes eligibility criteria for audit firms, a bounty severity classification aligned with industry norms, and a requirement for quarterly security reports to be published on the governance portal.\",\"status\":\"active\",\"quorum_requirement_percent\":38,\"voting_start_datetime\":\"2026-02-24T10:00:00Z\",\"voting_end_datetime\":\"2026-03-25T21:00:00Z\",\"created_at\":\"2026-02-14T13:05:00Z\"},{\"id\":\"gp_luma_emissions_schedule_2026\",\"title\":\"Update LUMA Emissions Schedule for 2026\",\"short_description\":\"Retarget annual LUMA emissions to prioritize sustainable yields over aggressive growth.\",\"full_text\":\"This draft proposal updates the LUMA emissions curve for calendar year 2026, reducing total emissions by approximately 18% relative to the current baseline. The goal is to transition from aggressive growth incentives to more sustainable yield levels as core usage stabilizes. The schedule introduces quarterly step-downs, emissions multipliers for newly launched pools, and a cap on emissions allocated to any single token. If passed in its final form, the new schedule will apply beginning with the first full epoch after April 1, 2026. This draft is subject to community feedback before being moved to the active voting stage.\",\"status\":\"draft\",\"quorum_requirement_percent\":55,\"voting_start_datetime\":\"2026-03-20T12:00:00Z\",\"voting_end_datetime\":\"2026-03-27T12:00:00Z\",\"created_at\":\"2026-03-01T09:00:00Z\"},{\"id\":\"gp_stablecoin_risk_framework_update\",\"title\":\"Revise Stablecoin Risk Framework and Collateral Limits\",\"short_description\":\"Tighten collateral and exposure limits for algorithmic and undercollateralized stablecoins.\",\"full_text\":\"This draft proposal revises the platform’s stablecoin risk framework in response to evolving market conditions and regulatory guidance. It proposes stricter collateralization requirements, dynamic exposure caps per stablecoin issuer, and differentiated insurance fund coverage based on transparency and auditability of reserves. The framework will categorize stablecoins into tiers, with USDT and other major fiat-backed assets in Tier 1, algorithmic or experimental designs in Tier 3, and mixed models in Tier 2. Each tier will have specific maximum pool sizes, APY caps, and promotion eligibility rules. The draft seeks feedback prior to formalizing thresholds and moving to a binding vote.\",\"status\":\"draft\",\"quorum_requirement_percent\":48,\"voting_start_datetime\":\"2026-03-25T09:00:00Z\",\"voting_end_datetime\":\"2026-04-01T09:00:00Z\",\"created_at\":\"2026-02-28T15:45:00Z\"},{\"id\":\"gp_quarterly_financial_report_q4_2025\",\"title\":\"Approve Q4 2025 Financial Statements and Auditor Report\",\"short_description\":\"Community ratification of the independently audited Q4 2025 financial statements.\",\"full_text\":\"This proposal presented the Q4 2025 financial statements, including revenue from staking fees, swap fees, and promotions, along with a breakdown of treasury holdings by asset and risk category. An independent auditor reviewed the statements and issued an unqualified opinion. The vote requested community approval to officially adopt the statements, archive them in the governance records, and use them as the reference baseline for 2026 budget proposals. The proposal passed with strong support and met the required quorum.\",\"status\":\"passed\",\"quorum_requirement_percent\":35,\"voting_start_datetime\":\"2026-01-30T10:00:00Z\",\"voting_end_datetime\":\"2026-02-10T18:00:00Z\",\"created_at\":\"2026-01-25T12:00:00Z\"},{\"id\":\"gp_listing_new_tokens_wave_4\",\"title\":\"List Additional Tokens for Staking Pools (Wave 4)\",\"short_description\":\"Add support for four new tokens and their initial staking pool configurations.\",\"full_text\":\"This proposal covered the fourth wave of new token listings on the platform. It authorized adding staking support for four new assets with conservative APY caps, strict oracle requirements, and initial TVL caps per pool. The specification defined each token’s risk tier, maximum leverage for any derivative products, and eligibility for promotions such as boosted APY campaigns. The proposal passed and the new tokens were listed in a phased rollout with continuous monitoring of liquidity and on-chain risk indicators.\",\"status\":\"passed\",\"quorum_requirement_percent\":40,\"voting_start_datetime\":\"2025-12-15T09:00:00Z\",\"voting_end_datetime\":\"2025-12:20T21:00:00Z\",\"created_at\":\"2025-12-10T11:30:00Z\"},{\"id\":\"gp_reverse_dec_2025_fee_increase\",\"title\":\"Reverse December 2025 Platform Fee Increase\",\"short_description\":\"Attempt to roll back a previously approved increase in base platform fees.\",\"full_text\":\"Following user feedback on the December 2025 fee adjustment, this proposal sought to reverse the 0.15 percentage point increase in base platform fees across most pools. The discussion period highlighted trade-offs between near-term user costs and the protocol’s ability to fund development and security. Ultimately, voters rejected the proposal, signaling support for maintaining the higher fee schedule and prioritizing long-term sustainability over immediate fee relief.\",\"status\":\"rejected\",\"quorum_requirement_percent\":37,\"voting_start_datetime\":\"2026-02-01T08:00:00Z\",\"voting_end_datetime\":\"2026-02-15T20:00:00Z\",\"created_at\":\"2026-01-22T17:10:00Z\"},{\"id\":\"gp_luma_liquidity_mining_phase_2\",\"title\":\"Extend LUMA Liquidity Mining Program (Phase 2)\",\"short_description\":\"Proposal to extend the LUMA liquidity mining incentives that did not reach quorum.\",\"full_text\":\"This proposal asked the community to extend the existing LUMA liquidity mining incentives for an additional three months, with a modest reduction in weekly rewards and a reallocation toward high-utility pools. Despite broad support in the forums, on-chain participation was insufficient and the proposal failed to meet the minimum quorum requirement. As a result, the original liquidity mining program expired on schedule and no further emissions were authorized under this proposal.\",\"status\":\"expired\",\"quorum_requirement_percent\":50,\"voting_start_datetime\":\"2025-12-20T09:00:00Z\",\"voting_end_datetime\":\"2026-01-05T09:00:00Z\",\"created_at\":\"2025-12-12T13:40:00Z\"},{\"id\":\"gp_governance_process_upgrade_v2\",\"title\":\"Upgrade Governance Process to Version 2\",\"short_description\":\"Introduce proposal templates, minimum review periods, and improved delegation tools.\",\"full_text\":\"This governance process upgrade introduced standardized proposal templates, mandatory off-chain discussion periods before formal submission, and enhanced delegation tools allowing token holders to delegate voting power by topic area. It also clarified quorum rules for different proposal categories and improved the transparency of proposal statuses. The changes aimed to reduce voter fatigue, improve proposal quality, and make it easier for smaller holders to participate via trusted delegates. The proposal passed with a high level of support and is now in effect.\",\"status\":\"passed\",\"quorum_requirement_percent\":60,\"voting_start_datetime\":\"2025-11-10T10:00:00Z\",\"voting_end_datetime\":\"2025-12-01T10:00:00Z\",\"created_at\":\"2025-11-01T16:25:00Z\"},{\"id\":\"gp_usdt_pool_cap_and_whitelist\",\"title\":\"Set USDT Pool TVL Caps and Whitelist Rules\",\"short_description\":\"Proposal to tighten TVL caps and restrict promotions on USDT pools that did not pass.\",\"full_text\":\"In response to concentration risk concerns, this proposal sought to impose lower total value locked (TVL) caps on USDT pools and restrict boosted APY promotions to whitelisted, lower-risk configurations. While some community members supported the changes as prudent risk management, others argued that the caps were overly conservative and could push volume to competing platforms. The proposal failed to reach the required support threshold and was rejected, leaving existing USDT TVL policies unchanged.\",\"status\":\"rejected\",\"quorum_requirement_percent\":42,\"voting_start_datetime\":\"2026-01-05T12:00:00Z\",\"voting_end_datetime\":\"2026-01-18T12:00:00Z\",\"created_at\":\"2025-12-28T10:50:00Z\"},{\"id\":\"gp_insurance_fund_top_up_jan_2026\",\"title\":\"Top Up Protocol Insurance Fund (January 2026)\",\"short_description\":\"Replenish the insurance fund using a portion of surplus treasury reserves.\",\"full_text\":\"This proposal authorized a one-time transfer from general treasury reserves into the protocol insurance fund to maintain target coverage ratios after a year of growth in total value locked. The transfer was sized to restore the insurance fund to at least 2.5% of average TVL, with safeguards preventing future draws on the fund for non-security-related purposes. The community approved the proposal, and the transfer was executed shortly after the voting period ended.\",\"status\":\"passed\",\"quorum_requirement_percent\":44,\"voting_start_datetime\":\"2026-01-10T09:00:00Z\",\"voting_end_datetime\":\"2026-01-22T21:00:00Z\",\"created_at\":\"2026-01-03T08:45:00Z\"},{\"id\":\"gp_dao_constitution_minor_amendments\",\"title\":\"Adopt Minor Amendments to DAO Constitution\",\"short_description\":\"Clarify language around emergency powers, proposal categories, and conflict-of-interest rules.\",\"full_text\":\"This proposal bundled a series of minor textual updates to the DAO constitution with the goal of clarifying ambiguous sections and aligning the document with the now-implemented Governance Process v2. It clarified the scope and duration of emergency powers, added explicit conflict-of-interest disclosure requirements for core contributors, and refined proposal category definitions. No material changes to token holder rights were introduced. The community approved the amendments with a comfortable margin.\",\"status\":\"passed\",\"quorum_requirement_percent\":36,\"voting_start_datetime\":\"2025-12-05T11:00:00Z\",\"voting_end_datetime\":\"2025-12-16T11:00:00Z\",\"created_at\":\"2025-11-27T14:30:00Z\"},{\"id\":\"gp_auto_stake_and_rewards_ux_improvements\",\"title\":\"Fund Auto-Stake and Rewards UX Improvements\",\"short_description\":\"Dedicate a product budget to improve auto-stake planners, rewards dashboards, and calculators.\",\"full_text\":\"This proposal requested funding from the development budget to improve several key user experience flows: creating and managing auto-stake plans, filtering and saving portfolio views, and using the earnings calculator and rewards dashboards. The work includes redesigned staking and portfolio filter controls, clearer visibility into auto-compounding options, and richer analytics for reward points and promotions. The upgrade is intended to support both novice and advanced users in optimizing their staking strategies across LUMA and stablecoin pools.\",\"status\":\"passed\",\"quorum_requirement_percent\":41,\"voting_start_datetime\":\"2025-10-15T10:00:00Z\",\"voting_end_datetime\":\"2025-10-28T10:00:00Z\",\"created_at\":\"2025-10-08T09:20:00Z\"}]");

true,\"is_governance_token\":false}]");

  <script>
  (function() {
    function escapeHtml(value) {
      if (value === null || value === undefined) {
        return '';
      }
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatCurrency(value) {
      if (typeof value !== 'number' || isNaN(value)) {
        return '—';
      }
      try {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(value);
      } catch (e) {
        return '$' + value.toFixed(2);
      }
    }

    function formatPercent(value) {
      if (typeof value !== 'number' || isNaN(value)) {
        return '—';
      }
      return value.toFixed(2).replace(/\.00$/, '') + '%';
    }

    function formatDate(dateString) {
      if (!dateString) {
        return '';
      }
      var d = new Date(dateString);
      if (isNaN(d.getTime())) {
        return escapeHtml(dateString);
      }
      try {
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch (e) {
        return d.toISOString().slice(0, 10);
      }
    }

    function formatRelativeEnd(endString) {
      if (!endString) {
        return '';
      }
      var end = new Date(endString);
      if (isNaN(end.getTime())) {
        return '';
      }
      var now = new Date();
      var diffMs = end.getTime() - now.getTime();
      var diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));
      if (diffDays > 1) {
        return 'Ends in ' + diffDays + ' days';
      }
      if (diffDays === 1) {
        return 'Ends in 1 day';
      }
      if (diffDays === 0) {
        return 'Ends today';
      }
      return 'Ended';
    }

    function formatVotingWindow(startString, endString) {
      var start = startString ? formatDate(startString) : '';
      var end = endString ? formatDate(endString) : '';
      if (start && end) {
        return start + ' - ' + end;
      }
      return start || end || '';
    }

    function setQueryParam(key, value) {
      var url = new URL(window.location.href);
      if (value === null || value === undefined || value === '') {
        url.searchParams.delete(key);
      } else {
        url.searchParams.set(key, value);
      }
      window.history.replaceState({}, '', url.toString());
    }

    function getSectionTargetId(section) {
      if (!section) {
        return null;
      }
      switch (section) {
        case 'portfolio':
          return 'section-portfolio';
        case 'pools':
          return 'section-pools';
        case 'promotions':
          return 'section-promotions';
        case 'governance':
          return 'section-governance';
        case 'rewards':
          return 'section-rewards';
        case 'tools':
          return 'tools-cta';
        default:
          return null;
      }
    }

    function handleSectionParam(section) {
      var targetId = getSectionTargetId(section);
      if (!targetId) {
        return;
      }
      var el = document.getElementById(targetId);
      if (!el) {
        return;
      }
      try {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (e) {
        el.scrollIntoView();
      }
      el.classList.add('section--focused');
      window.setTimeout(function() {
        el.classList.remove('section--focused');
      }, 2000);
    }

    function renderCurrentUserSummary(container, summary) {
      if (!container) {
        return;
      }
      if (!summary) {
        container.innerHTML = '<div class="header-user-inner header-user--loading"><span class="header-user-label">Loading account...</span></div>';
        return;
      }
      var isAuth = !!summary.is_authenticated;
      if (!isAuth) {
        container.innerHTML = '<div class="header-user-inner header-user--anonymous"><span class="header-user-label">Not signed in</span><button type="button" class="btn btn-ghost header-login-btn" data-action="open-login-modal">Log in</button></div>';
        return;
      }
      var displayName = escapeHtml(summary.display_name || 'Account');
      var totalPortfolio = formatCurrency(summary.total_portfolio_value_usd);
      var totalStaked = formatCurrency(summary.total_staked_value_usd);
      container.innerHTML = '<div class="header-user-inner header-user--authenticated"><div class="header-user-main"><span class="header-user-greeting">Hi, ' + displayName + '</span><div class="header-user-metrics"><span class="chip chip--light">Portfolio: ' + totalPortfolio + '</span><span class="chip chip--light">Staked: ' + totalStaked + '</span></div></div><div class="header-user-actions"><button type="button" class="btn btn-ghost header-logout-btn" data-action="logout">Log out</button></div></div>';
    }

    function renderPortfolioSnapshot(container, homeOverview) {
      if (!container) {
        return;
      }
      var snapshot = homeOverview && homeOverview.portfolio_snapshot ? homeOverview.portfolio_snapshot : {};
      var totalStaked = typeof snapshot.total_staked_value_usd === 'number' ? snapshot.total_staked_value_usd : 0;
      var totalApy = typeof snapshot.total_estimated_apy_percent === 'number' ? snapshot.total_estimated_apy_percent : null;
      var totalDaily = typeof snapshot.total_estimated_daily_rewards_usd === 'number' ? snapshot.total_estimated_daily_rewards_usd : 0;
      var positionCount = typeof snapshot.position_count === 'number' ? snapshot.position_count : 0;
      var hasPositions = positionCount > 0 || totalStaked > 0 || totalDaily > 0;

      var totalStakedDisplay = formatCurrency(totalStaked);
      var totalApyDisplay = formatPercent(totalApy);
      var totalDailyDisplay = formatCurrency(totalDaily);
      var positionLabel = hasPositions ? (positionCount === 1 ? '1 position' : positionCount + ' positions') : 'No positions yet';

      var statusText = hasPositions
        ? 'Review your current staked balance, blended APY, and estimated daily rewards at a glance.'
        : 'You have no active staking positions yet. Explore pools and start earning rewards when you are ready.';

      var html = '' +
        '<div class="hero-card-inner">' +
          '<div class="hero-card-top-row">' +
            '<div class="hero-title-block">' +
              '<div class="hero-title-line">' +
                '<span class="hero-emoji" aria-hidden="true">🔒</span>' +
                '<h1 id="portfolio-hero-title" class="hero-title">Staking overview</h1>' +
              '</div>' +
            '</div>' +
            '<div class="hero-view-toggle" data-component="home-state-controller" aria-hidden="true">' +
              '<span class="hero-view-pill hero-view-pill--active">Overview</span>' +
            '</div>' +
          '</div>' +

          '<button type="button" id="section-rewards" data-component="rewards-link-widget" data-action="view-rewards" class="hero-rewards-strip" aria-label="View unclaimed rewards">' +
            '<span class="hero-rewards-label">Check your latest rewards</span>' +
            '<span class="hero-rewards-cta">View rewards a0bb</span>' +
          '</button>' +

          '<div class="hero-metrics">' +
            '<div class="hero-metric">' +
              '<div class="hero-metric-label">Total staked value</div>' +
              '<div class="hero-metric-value">' + totalStakedDisplay + '</div>' +
            '</div>' +
            '<div class="hero-metric">' +
              '<div class="hero-metric-label">Estimated APY</div>' +
              '<div class="hero-metric-value">' + totalApyDisplay + '</div>' +
            '</div>' +
            '<div class="hero-metric">' +
              '<div class="hero-metric-label">Estimated daily rewards</div>' +
              '<div class="hero-metric-value">' + totalDailyDisplay + '</div>' +
            '</div>' +
            '<div class="hero-metric">' +
              '<div class="hero-metric-label">Positions</div>' +
              '<div class="hero-metric-value">' + escapeHtml(positionLabel) + '</div>' +
            '</div>' +
          '</div>' +

          '<p class="hero-description">' + escapeHtml(statusText) + '</p>' +

          '<div class="hero-actions">' +
            '<button type="button" class="btn btn-secondary" data-action="view-portfolio">View portfolio</button>' +
            '<button type="button" id="tools-cta" class="btn btn-primary hero-tools-btn" data-component="tools-earnings-calculator-cta" data-action="open-earnings-calculator">' +
              'Open earnings calculator' +
            '</button>' +
          '</div>' +
        '</div>';

      container.innerHTML = html;
    }

    function renderRecentEarnings(container, homeOverview) {
      if (!container) {
        return;
      }
      var earnings = homeOverview && Array.isArray(homeOverview.recent_earnings) ? homeOverview.recent_earnings : [];
      if (!earnings.length) {
        container.innerHTML = '<div class="card-inner card-inner--spacious"><header class="card-header"><h2 id="recent-earnings-title" class="card-title">Recent earnings</h2><p class="card-subtitle">No earnings to display yet.</p></header><p class="card-empty">Start staking to see your rewards history here.</p></div>';
        return;
      }

      var rowsHtml = earnings.slice(0, 7).map(function(entry) {
        var dateLabel = formatDate(entry.date);
        var rewardsDisplay = formatCurrency(typeof entry.total_rewards_usd === 'number' ? entry.total_rewards_usd : NaN);
        return '<li class="earnings-row"><div class="earnings-row-main"><span class="earnings-date">' + escapeHtml(dateLabel) + '</span></div><div class="earnings-row-value">' + rewardsDisplay + '</div></li>';
      }).join('');

      container.innerHTML = '<div class="card-inner card-inner--spacious"><header class="card-header"><h2 id="recent-earnings-title" class="card-title">Recent earnings</h2><p class="card-subtitle">Last ' + earnings.length + ' days</p></header><ul class="earnings-list">' + rowsHtml + '</ul></div>';
    }

    function renderTopPositions(container, homeOverview) {
      if (!container) {
        return;
      }
      var positions = homeOverview && Array.isArray(homeOverview.top_positions) ? homeOverview.top_positions : [];
      if (!positions.length) {
        container.innerHTML = '' +
          '<div class="card-inner card-inner--spacious">' +
            '<header class="card-header">' +
              '<h2 id="top-positions-title" class="card-title">Top positions</h2>' +
              '<p class="card-subtitle">Your largest staked assets will appear here.</p>' +
            '</header>' +
            '<p class="card-empty">You do not have active staking positions yet.</p>' +
            '<div class="card-actions">' +
              '<button type="button" class="btn btn-primary" data-action="view-all-pools">Start staking</button>' +
            '</div>' +
          '</div>';
        return;
      }

      var rowsHtml = positions.slice(0, 5).map(function(item) {
        var tokenName = escapeHtml(item.token_name || '');
        var tokenSymbol = escapeHtml(item.token_symbol || '');
        var iconUrl = item.token_icon_url ? escapeHtml(item.token_icon_url) : '';
        var position = item.position || {};
        var stakedAmount = typeof position.staked_amount === 'number' ? position.staked_amount : null;
        var stakedDisplay = stakedAmount !== null ? stakedAmount.toLocaleString('en-US', { maximumFractionDigits: 4 }) : '—';
        var apyDisplay = item.current_apy_display ? escapeHtml(item.current_apy_display) : formatPercent(item.current_apy_percent);
        var lockType = position.lock_type ? String(position.lock_type) : '';
        var lockDurationDays = typeof position.lock_duration_days === 'number' ? position.lock_duration_days : null;
        var lockLabel = '';
        if (lockType === 'flexible') {
          lockLabel = 'Flexible';
        } else if (lockType === 'fixed') {
          lockLabel = lockDurationDays !== null ? ('Fixed ' + lockDurationDays + 'd') : 'Fixed term';
        }
        return '' +
          '<li class="position-row" data-action="open-portfolio-from-position">' +
            '<div class="position-main">' +
              '<div class="position-token">' +
                (iconUrl ? '<span class="token-icon-wrapper"><img src="' + iconUrl + '" alt="' + tokenSymbol + ' icon" class="token-icon"></span>' : '<span class="token-icon-placeholder" aria-hidden="true"></span>') +
                '<div class="token-text">' +
                  '<span class="token-name">' + tokenName + '</span>' +
                  '<span class="token-symbol">' + tokenSymbol + '</span>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="position-meta">' +
              '<div class="position-amount">' +
                '<span class="position-label">Staked</span>' +
                '<span class="position-value">' + stakedDisplay + ' ' + tokenSymbol + '</span>' +

                '<span class="position-value">' + apyDisplay + '</span>' +
              '</div>' +
              (lockLabel ? '<div class="position-lock"><span class="chip chip--subtle">' + escapeHtml(lockLabel) + '</span></div>' : '') +
            '</div>' +
          '</li>';
      }).join('');

      container.innerHTML = '' +
        '<div class="card-inner card-inner--spacious">' +
          '<header class="card-header">' +
            '<h2 id="top-positions-title" class="card-title">Top positions</h2>' +
            '<p class="card-subtitle">Your largest staked assets</p>' +
          '</header>' +
          '<ul class="positions-list">' +
            rowsHtml +
          '</ul>' +
          '<div class="card-actions">' +
            '<button type="button" class="btn btn-secondary" data-action="view-portfolio">View portfolio</button>' +
          '</div>' +
        '</div>';
    }

    function renderFeaturedStakingPools(container, pools) {
      if (!container) {
        return;
      }
      var list = Array.isArray(pools) ? pools : [];
      if (!list.length) {
        container.innerHTML = '<div class="card-inner card-inner--spacious"><header class="card-header"><h2 id="featured-pools-title" class="card-title">Featured staking pools</h2><p class="card-subtitle">Explore available pools to start staking.</p></header><p class="card-empty">No featured pools are available right now.</p><div class="card-actions"><button type="button" class="btn btn-primary" data-action="view-all-pools">View all pools</button></div></div>';
        return;
      }

      var cardsHtml = list.map(function(item) {
        var pool = item.pool || {};
        var poolName = escapeHtml(pool.name || 'Pool');
        var tokenName = escapeHtml(item.token_name || '');
        var tokenSymbol = escapeHtml(pool.token_symbol || '');
        var iconUrl = item.token_icon_url ? escapeHtml(item.token_icon_url) : '';
        var reason = escapeHtml(item.highlight_reason || 'Featured opportunity');
        var apyDisplay = escapeHtml(item.effective_apy_display || formatPercent(pool.apy_percent));
        var lockType = pool.lock_type ? String(pool.lock_type) : '';
        var lockDurationDays = typeof pool.lock_duration_days === 'number' ? pool.lock_duration_days : null;
        var lockSummary = '';
        if (lockType === 'flexible') {
          lockSummary = 'Flexible term';
        } else if (lockType === 'fixed') {
          lockSummary = lockDurationDays !== null ? (lockDurationDays + ' day lock') : 'Fixed term';
        }
        return '<button type="button" class="pool-card" data-action="open-featured-pool" data-token-symbol="' + tokenSymbol + '"><div class="pool-card-header"><div class="pool-token">' + (iconUrl ? '<span class="token-icon-wrapper"><img src="' + iconUrl + '" alt="' + tokenSymbol + ' icon" class="token-icon"></span>' : '<span class="token-icon-placeholder" aria-hidden="true"></span>') + '<div class="token-text"><span class="token-name">' + tokenName + '</span><span class="token-symbol">' + tokenSymbol + '</span></div></div><span class="chip chip--highlight">' + apyDisplay + ' APY</span></div><div class="pool-card-body"><div class="pool-name">' + poolName + '</div><p class="pool-reason">' + reason + '</p></div><div class="pool-card-footer">' + (lockSummary ? '<span class="pool-lock">' + escapeHtml(lockSummary) + '</span>' : '') + '<span class="pool-cta">View details bb</span></div></button>';
      }).join('');

      container.innerHTML = '<div class="card-inner card-inner--spacious"><header class="card-header card-header--with-link"><div><h2 id="featured-pools-title" class="card-title">Featured staking pools</h2><p class="card-subtitle">Curated opportunities selected by the platform team.</p></div><button type="button" class="link-button" data-action="view-all-pools">View all pools</button></header><div class="pool-grid">' + cardsHtml + '</div></div>';
    }

    function renderFeaturedPromotions(container, promotions) {
      if (!container) {
        return;
      }
      var list = Array.isArray(promotions) ? promotions : [];
      if (!list.length) {
        container.innerHTML = '<div class="card-inner card-inner--spacious card-inner--tinted"><header class="card-header card-header--with-link"><div><h2 id="featured-promotions-title" class="card-title">Featured promotions</h2><p class="card-subtitle">Limited-time rewards and boosted offers.</p></div><button type="button" class="link-button" data-action="view-all-promotions">View all promotions</button></header><p class="card-empty">There are no featured promotions at the moment.</p></div>';
        return;
      }

      var cardsHtml = list.slice(0, 4).map(function(promo) {
        var name = escapeHtml(promo.name || 'Promotion');
        var tokenSymbol = escapeHtml(promo.token_symbol || '');
        var typeLabel = '';
        if (promo.promotion_type === 'boosted_apy') {
          typeLabel = 'Boosted APY';
        } else if (promo.promotion_type === 'fee_discount') {
          typeLabel = 'Fee discount';
        } else if (promo.promotion_type === 'bonus_rewards') {
          typeLabel = 'Bonus rewards';
        }
        var statusLabel = '';
        if (promo.status === 'active') {
          statusLabel = 'Active';
        } else if (promo.status === 'upcoming') {
          statusLabel = 'Upcoming';
        } else if (promo.status === 'expired') {
          statusLabel = 'Expired';
        }
        var apyBoost = typeof promo.apy_boost_percent === 'number' ? ('+' + promo.apy_boost_percent + '% APY') : '';
        var timing = formatRelativeEnd(promo.end_datetime || promo.end_date || promo.end_datetime);
        return '<button type="button" class="promo-card" data-action="open-promotion-detail" data-promotion-id="' + escapeHtml(promo.id || '') + '"><div class="promo-card-header"><span class="promo-name">' + name + '</span>' + (statusLabel ? '<span class="chip chip--status">' + escapeHtml(statusLabel) + '</span>' : '') + '</div><div class="promo-card-body"><div class="promo-meta">' + (tokenSymbol ? '<span class="promo-token">' + tokenSymbol + '</span>' : '') + (typeLabel ? '<span class="promo-type">' + escapeHtml(typeLabel) + '</span>' : '') + '</div>' + (apyBoost ? '<div class="promo-apy">' + escapeHtml(apyBoost) + '</div>' : '') + (timing ? '<div class="promo-timing">' + escapeHtml(timing) + '</div>' : '') + '</div></button>';
      }).join('');

      container.innerHTML = '<div class="card-inner card-inner--spacious card-inner--tinted"><header class="card-header card-header--with-link"><div><h2 id="featured-promotions-title" class="card-title">Featured promotions</h2><p class="card-subtitle">Discover boosted APYs and bonus reward programs.</p></div><button type="button" class="link-button" data-action="view-all-promotions">View all promotions</button></header><div class="promo-grid">' + cardsHtml + '</div></div>';
    }

    function renderFeaturedGovernance(container, proposals) {
      if (!container) {
        return;
      }
      var list = Array.isArray(proposals) ? proposals : [];
      if (!list.length) {
        container.innerHTML = '<div class="card-inner card-inner--spacious"><header class="card-header card-header--with-link"><div><h2 id="governance-highlights-title" class="card-title">Governance highlights</h2><p class="card-subtitle">No active proposals right now.</p></div><button type="button" class="link-button" data-action="view-all-proposals">View all proposals</button></header><p class="card-empty">When new governance proposals open for voting, they will appear here.</p></div>';
        return;
      }

      var itemsHtml = list.slice(0, 5).map(function(proposal) {
        var title = escapeHtml(proposal.title || 'Proposal');
        var shortDesc = escapeHtml(proposal.short_description || '');
        var statusLabel = '';
        if (proposal.status === 'active') {
          statusLabel = 'Active';
        } else if (proposal.status === 'draft') {
          statusLabel = 'Draft';
        } else if (proposal.status === 'passed') {
          statusLabel = 'Passed';
        } else if (proposal.status === 'rejected') {
          statusLabel = 'Rejected';
        } else if (proposal.status === 'expired') {
          statusLabel = 'Expired';
        }
        var quorum = typeof proposal.quorum_requirement_percent === 'number'
          ? proposal.quorum_requirement_percent.toFixed(0).replace(/\.0$/, '') + '% quorum'
          : '';
        var votingWindow = formatVotingWindow(proposal.voting_start_datetime, proposal.voting_end_datetime);
        var endsLabel = formatRelativeEnd(proposal.voting_end_datetime);
        return '<li class="gov-row" data-action="open-proposal-detail" data-proposal-id="' + escapeHtml(proposal.id || '') + '"><div class="gov-main"><div class="gov-title-line"><span class="gov-title">' + title + '</span>' + (statusLabel ? '<span class="chip chip--status">' + escapeHtml(statusLabel) + '</span>' : '') + '</div>' + (shortDesc ? '<p class="gov-desc">' + shortDesc + '</p>' : '') + '<div class="gov-meta">' + (quorum ? '<span class="gov-quorum">' + escapeHtml(quorum) + '</span>' : '') + (votingWindow ? '<span class="gov-window">Voting: ' + escapeHtml(votingWindow) + '</span>' : '') + '</div></div>' + (endsLabel ? '<div class="gov-ends">' + escapeHtml(endsLabel) + '</div>' : '') + '</li>';
      }).join('');

      container.innerHTML = '<div class="card-inner card-inner--spacious"><header class="card-header card-header--with-link"><div><h2 id="governance-highlights-title" class="card-title">Governance highlights</h2><p class="card-subtitle">Review and participate in key protocol decisions.</p></div><button type="button" class="link-button" data-action="view-all-proposals">View all proposals</button></header><ul class="gov-list">' + itemsHtml + '</ul></div>';
    }

    document.addEventListener('DOMContentLoaded', function() {
      var state = {
        userSummary: null,
        homeOverview: null,
        featuredPools: null,
        featuredPromotions: null,
        featuredGovernance: null
      };

      var containers = {
        userSummary: document.querySelector('[data-populate="current-user-summary"]'),
        portfolioSnapshot: document.querySelector('[data-populate="portfolio-snapshot"]'),
        recentEarnings: document.querySelector('[data-populate="recent-earnings"]'),
        topPositions: document.querySelector('[data-populate="top-positions"]'),
        featuredPools: document.querySelector('[data-populate="featured-staking-pools"]'),
        featuredPromotions: document.querySelector('[data-populate="featured-promotions"]'),
        featuredGovernance: document.querySelector('[data-populate="featured-governance-proposals"]')
      };

      var loginModal = document.querySelector('[data-component="login-modal"]');

      function openLoginModal(skipUrlUpdate) {
        if (!loginModal) {
          return;
        }
        loginModal.classList.add('is-open');
        loginModal.setAttribute('aria-hidden', 'false');
        document.body.classList.add('modal-open');
        if (!skipUrlUpdate) {
          setQueryParam('login', 'open');
        }
      }

      function closeLoginModal(skipUrlUpdate) {
        if (!loginModal) {
          return;
        }
        loginModal.classList.remove('is-open');
        loginModal.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('modal-open');
        if (!skipUrlUpdate) {
          setQueryParam('login', null);
        }
        var errorEl = loginModal.querySelector('[data-role="login-error"]');
        if (errorEl) {
          errorEl.textContent = '';
        }
        var form = loginModal.querySelector('form[data-action="login-submit"]');
        if (form) {
          form.reset();
        }
      }

      function handleLoginParam(loginParam) {
        if (loginParam === 'open') {
          openLoginModal(true);
        } else {
          closeLoginModal(true);
        }
      }

      function loadUserSummary() {
        if (!containers.userSummary) {
          return;
        }
        try {
          var summary = WebsiteSDK.getCurrentUserSummary();
          state.userSummary = summary;
          renderCurrentUserSummary(containers.userSummary, summary);
        } catch (e) {
          renderCurrentUserSummary(containers.userSummary, null);
        }
      }

      function loadHomeOverview() {
        try {
          var overview = WebsiteSDK.getHomeOverview();
          state.homeOverview = overview;
          if (containers.portfolioSnapshot) {
            renderPortfolioSnapshot(containers.portfolioSnapshot, overview);
          }
          if (containers.recentEarnings) {
            renderRecentEarnings(containers.recentEarnings, overview);
          }
          if (containers.topPositions) {
            renderTopPositions(containers.topPositions, overview);
          }
        } catch (e) {
          if (containers.portfolioSnapshot) {
            renderPortfolioSnapshot(containers.portfolioSnapshot, null);
          }
          if (containers.recentEarnings) {
            renderRecentEarnings(containers.recentEarnings, null);
          }
          if (containers.topPositions) {
            renderTopPositions(containers.topPositions, null);
          }
        }
      }

      function loadFeaturedStakingPools() {
        if (!containers.featuredPools) {
          return;
        }
        try {
          var pools = WebsiteSDK.getFeaturedStakingPools();
          state.featuredPools = pools;
          renderFeaturedStakingPools(containers.featuredPools, pools);
        } catch (e) {
          renderFeaturedStakingPools(containers.featuredPools, []);
        }
      }

      function loadFeaturedPromotions() {
        if (!containers.featuredPromotions) {
          return;
        }
        try {
          var promotions = WebsiteSDK.getFeaturedPromotions();
          state.featuredPromotions = promotions;
          renderFeaturedPromotions(containers.featuredPromotions, promotions);
        } catch (e) {
          renderFeaturedPromotions(containers.featuredPromotions, []);
        }
      }

      function loadFeaturedGovernance() {
        if (!containers.featuredGovernance) {
          return;
        }
        try {
          var proposals = WebsiteSDK.getFeaturedGovernanceProposals();
          state.featuredGovernance = proposals;
          renderFeaturedGovernance(containers.featuredGovernance, proposals);
        } catch (e) {
          renderFeaturedGovernance(containers.featuredGovernance, []);
        }
      }

      function reloadAllData() {
        loadUserSummary();
        loadHomeOverview();
        loadFeaturedStakingPools();
        loadFeaturedPromotions();
        loadFeaturedGovernance();
      }

      function handleLogout() {
        try {
          var result = WebsiteSDK.logout();
          if (result && result.success) {
            state.userSummary = null;
            state.homeOverview = null;
            state.featuredPools = null;
            state.featuredPromotions = null;
            state.featuredGovernance = null;
            reloadAllData();
          } else if (result && result.message) {
            window.alert(result.message);
          } else {
            window.alert('Unable to log out. Please try again.');
          }
        } catch (e) {
          window.alert('Unable to log out. Please try again.');
        }
      }

      function handleLoginFormSubmit(form) {
        var usernameInput = form.querySelector('input[name="username"]');
        var passwordInput = form.querySelector('input[name="password"]');
        var errorEl = form.querySelector('[data-role="login-error"]');
        if (errorEl) {
          errorEl.textContent = '';
        }
        var username = usernameInput ? usernameInput.value.trim() : '';
        var password = passwordInput ? passwordInput.value : '';
        if (!username || !password) {
          if (errorEl) {
            errorEl.textContent = 'Please enter your username and password.';
          }
          return;
        }
        try {
          var response = WebsiteSDK.login(username, password);
          if (response && response.success && response.is_authenticated) {
            closeLoginModal();
            reloadAllData();
          } else if (errorEl) {
            errorEl.textContent = response && response.message ? response.message : 'Login failed. Please check your credentials and try again.';
          }
        } catch (e) {
          if (errorEl) {
            errorEl.textContent = 'Login failed due to a technical issue. Please try again.';
          }
        }
      }

      function handleActionClick(action, target) {
        switch (action) {
          case 'open-login-modal':
            openLoginModal();
            break;
          case 'close-login-modal':
            closeLoginModal();
            break;
          case 'logout':
            handleLogout();
            break;
          case 'view-portfolio':
            window.location.href = 'portfolio.html';
            break;
          case 'view-rewards':
            window.location.href = 'rewards.html?tab=unclaimed';
            break;
          case 'open-earnings-calculator':
            window.location.href = 'earnings_calculator.html';
            break;
          case 'view-all-pools':
            window.location.href = 'staking.html?tab=all_pools';
            break;
          case 'open-featured-pool': {
            var tokenSymbol = target.getAttribute('data-token-symbol') || '';
            var href = 'staking.html?tab=all_pools';
            if (tokenSymbol) {
              href += '&token=' + encodeURIComponent(tokenSymbol);
            }
            window.location.href = href;
            break;
          }
          case 'view-all-promotions':
            window.location.href = 'promotions.html';
            break;
          case 'open-promotion-detail': {
            var promoId = target.getAttribute('data-promotion-id') || '';
            if (promoId) {
              window.location.href = 'promotion_detail.html?promotionId=' + encodeURIComponent(promoId);
            }
            break;
          }
          case 'view-all-proposals':
            window.location.href = 'governance.html';
            break;
          case 'open-proposal-detail': {
            var proposalId = target.getAttribute('data-proposal-id') || '';
            if (proposalId) {
              window.location.href = 'proposal_detail.html?proposalId=' + encodeURIComponent(proposalId);
            }
            break;
          }
          case 'open-portfolio-from-position':
            window.location.href = 'portfolio.html';
            break;
          default:
            break;
        }
      }

      document.addEventListener('click', function(event) {
        var actionTarget = event.target.closest('[data-action]');
        if (!actionTarget) {
          return;
        }
        var action = actionTarget.getAttribute('data-action');
        if (!action) {
          return;
        }
        event.preventDefault();
        handleActionClick(action, actionTarget);
      });

      document.addEventListener('submit', function(event) {
        var form = event.target;
        if (!form || form.getAttribute('data-action') !== 'login-submit') {
          return;
        }
        event.preventDefault();
        handleLoginFormSubmit(form);
      });

      if (loginModal) {
        loginModal.addEventListener('click', function(event) {
          if (event.target === loginModal) {
            closeLoginModal();
          }
        });
      }

      window.addEventListener('popstate', function() {
        var params = new URLSearchParams(window.location.search);
        var section = params.get('section');
        var loginParam = params.get('login');
        handleSectionParam(section);
        handleLoginParam(loginParam);
      });

      var yearEl = document.querySelector('[data-year]');
      if (yearEl) {
        yearEl.textContent = String(new Date().getFullYear());
      }

      reloadAllData();

      var params = new URLSearchParams(window.location.search);
      var initialSection = params.get('section');
      var initialLogin = params.get('login');
      handleSectionParam(initialSection);
      handleLoginParam(initialLogin);
    });
  })();
  </script>
</body>
</html>
