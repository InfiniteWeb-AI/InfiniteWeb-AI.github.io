<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Staking &amp; Rewards Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="promotion_detail.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="header-inner">
        <div class="header-brand">
          <span class="login-label">LOGIN WITH</span>
          <a href="index.html" class="brand-link">
            <span class="brand-logo" aria-hidden="true"></span>
            <span class="brand-name">CONTRIB</span>
          </a>
        </div>
        <nav class="main-nav" aria-label="Primary">
          <ul class="nav-list">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="staking.html?tab=all_pools" class="nav-link">Staking</a></li>
            <li class="nav-item"><a href="portfolio.html" class="nav-link">Portfolio</a></li>
            <li class="nav-item"><a href="rewards.html" class="nav-link">Rewards</a></li>
            <li class="nav-item"><a href="promotions.html" class="nav-link">Promotions</a></li>
            <li class="nav-item"><a href="governance.html" class="nav-link">Governance</a></li>
            <li class="nav-item"><a href="earnings_calculator.html" class="nav-link">Tools</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <div class="promotion-detail-page" data-component="promotion-detail-page-controller">
        <section class="user-summary-header-shell" aria-label="Account summary">
          <div class="user-summary-header" data-component="header-user-summary">
            <div data-populate="user-summary-header"></div>
          </div>
        </section>

        <section class="promotion-main-shell">
          <section class="promotion-hero-card" data-component="promotion-overview-panel">
            <div class="promotion-hero-inner" data-populate="promotion-overview"></div>

            <section class="promotion-status-shell" data-component="promotion-eligibility-status" aria-live="polite">
              <div data-populate="promotion-eligibility-status"></div>
            </section>

            <section class="eligible-positions-toolbar-shell" data-component="eligible-positions-toolbar" aria-label="Eligible positions controls">
              <div data-populate="eligible-positions-toolbar"></div>
            </section>

            <section class="eligible-positions-list-shell" data-component="eligible-positions-list" aria-label="Eligible staking positions">
              <div data-populate="eligible-positions-list"></div>
            </section>

            <footer class="position-selection-footer-shell" data-component="position-selection-footer" aria-label="Selected position summary">
              <div data-populate="position-selection-footer"></div>
            </footer>
          </section>
        </section>

        <div class="promotion-confirmation-overlay" data-component="promotion-application-confirmation" hidden role="dialog" aria-modal="true" aria-label="Promotion application confirmation">
          <div class="promotion-confirmation-inner" data-populate="promotion-application-confirmation"></div>
        </div>

        <div class="notification-center" data-component="notification-center" aria-live="polite" aria-atomic="true"></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="footer-logo-mark" aria-hidden="true"></span>
          <span class="footer-brand-name">Crypto Staking Platform</span>
        </div>
        <nav class="footer-nav" aria-label="Footer">
          <ul class="footer-nav-list">
            <li class="footer-nav-item"><a href="about.html" class="footer-link">About</a></li>
            <li class="footer-nav-item"><a href="help.html" class="footer-link">Help &amp; FAQ</a></li>
            <li class="footer-nav-item"><a href="contact.html" class="footer-link">Contact</a></li>
            <li class="footer-nav-item"><a href="terms.html" class="footer-link">Terms of Use</a></li>
            <li class="footer-nav-item"><a href="privacy.html" class="footer-link">Privacy Policy</a></li>
          </ul>
        </nav>
        <p class="footer-meta">&copy; <span data-year>2026</span> Crypto Staking Platform. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const url = new URL(window.location.href);
      const urlParams = url.searchParams;

      const initialPromotionId = urlParams.get('promotionId');
      const initialSortParam = urlParams.get('sort') || 'staked_amount:desc';
      const initialStep = urlParams.get('step') || 'overview';
      const initialPositionId = urlParams.get('positionId');

      const state = {
        url: {
          promotionId: initialPromotionId,
          sortParam: initialSortParam,
          step: initialStep,
          positionId: initialPositionId || null
        },
        userSummary: null,
        promotion: null,
        eligiblePositions: null,
        clientFilters: {
          minAmountOnly: false
        },
        selectedPositionId: initialPositionId || null,
        appliedPosition: null,
        promotionApplication: null,
        loading: {
          userSummary: false,
          promotion: false,
          eligiblePositions: false,
          apply: false
        },
        errors: {
          promotion: null,
          eligiblePositions: null,
          apply: null
        }
      };

      const populateContainers = {};
      document.querySelectorAll('[data-populate]').forEach(function(el) {
        const key = el.getAttribute('data-populate');
        if (key) {
          populateContainers[key] = el;
        }
      });

      const notificationCenterEl = document.querySelector('[data-component="notification-center"]');
      const confirmationOverlayEl = document.querySelector('[data-component="promotion-application-confirmation"]');

      function escapeHtml(value) {
        if (value === undefined || value === null) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatPercent(num) {
        if (num === undefined || num === null || isNaN(num)) {
          return '-';
        }
        try {
          return num.toLocaleString('en-US', { maximumFractionDigits: 2 }) + '%';
        } catch (e) {
          return num + '%';
        }
      }

      function formatNumber(num) {
        if (num === undefined || num === null || isNaN(num)) {
          return '-';
        }
        try {
          return num.toLocaleString('en-US', { maximumFractionDigits: 2 });
        } catch (e) {
          return String(num);
        }
      }

      function formatUsd(num) {
        if (num === undefined || num === null || isNaN(num)) {
          return '-';
        }
        try {
          return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        } catch (e) {
          return '$' + String(num);
        }
      }

      function formatDate(dateStr) {
        if (!dateStr) {
          return '-';
        }
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) {
          return '-';
        }
        try {
          return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        } catch (e) {
          return d.toISOString().slice(0, 10);
        }
      }

      function parseSortParam(sortParam) {
        if (!sortParam) {
          return { sort_by: 'staked_amount', sort_direction: 'desc' };
        }
        const parts = String(sortParam).split(':');
        const sortBy = parts[0] || 'staked_amount';
        const direction = parts[1] || 'desc';
        return {
          sort_by: sortBy,
          sort_direction: direction
        };
      }

      function buildSortParam(sortBy, sortDirection) {
        return sortBy + ':' + sortDirection;
      }

      function setUrlParam(key, value) {
        const currentUrl = new URL(window.location.href);
        if (value === null || value === undefined || value === '') {
          currentUrl.searchParams.delete(key);
        } else {
          currentUrl.searchParams.set(key, value);
        }
        window.history.replaceState({}, '', currentUrl.toString());
      }

      function showNotification(type, message) {
        if (!notificationCenterEl) {
          return;
        }
        const id = 'toast_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const role = type === 'error' ? 'alert' : 'status';
        const toast = document.createElement('div');
        toast.className = 'notification-toast notification-' + type;
        toast.setAttribute('data-toast-id', id);
        toast.setAttribute('role', role);
        toast.innerHTML = `
          <div class="notification-content">
            <span class="notification-message">${escapeHtml(message)}</span>
            <button type="button" class="notification-close" data-action="dismissNotification" data-toast-id="${escapeHtml(id)}" aria-label="Dismiss notification">&times;</button>
          </div>
        `;
        notificationCenterEl.appendChild(toast);
        window.setTimeout(function() {
          if (toast && toast.parentNode) {
            toast.parentNode.removeChild(toast);
          }
        }, 7000);
      }

      function renderUserSummaryHeader(container, stateObj) {
        container.innerHTML = '';
        const loading = stateObj.loading.userSummary;
        const summary = stateObj.userSummary;
        if (loading) {
          container.innerHTML = `
            <div class="user-summary user-summary--loading">
              <div class="user-summary-skeleton-name"></div>
              <div class="user-summary-skeleton-values"></div>
            </div>
          `;
          return;
        }
        if (!summary) {
          container.innerHTML = `
            <div class="user-summary user-summary--anonymous">
              <div class="user-summary-main">
                <div class="user-summary-avatar" aria-hidden="true"></div>
                <div class="user-summary-text">
                  <div class="user-summary-title">Sign in to see personalized promotion eligibility.</div>
                  <div class="user-summary-subtitle">Connect your account to view staking balances and boosted positions.</div>
                </div>
              </div>
            </div>
          `;
          return;
        }
        const isAuth = !!summary.is_authenticated;
        if (!isAuth) {
          container.innerHTML = `
            <div class="user-summary user-summary--anonymous">
              <div class="user-summary-main">
                <div class="user-summary-avatar" aria-hidden="true"></div>
                <div class="user-summary-text">
                  <div class="user-summary-title">Sign in to join this promotion.</div>
                  <div class="user-summary-subtitle">You\'ll need to be signed in to apply boosts to your staking positions.</div>
                </div>
              </div>
            </div>
          `;
          return;
        }
        const totalPortfolio = formatUsd(summary.total_portfolio_value_usd);
        const totalStaked = formatUsd(summary.total_staked_value_usd);
        const displayName = summary.display_name ? escapeHtml(summary.display_name) : 'Account';
        container.innerHTML = `
          <div class="user-summary user-summary--authenticated">
            <div class="user-summary-main">
              <div class="user-summary-avatar" aria-hidden="true">${displayName.charAt(0).toUpperCase()}</div>
              <div class="user-summary-text">
                <div class="user-summary-title">${displayName}</div>
                <div class="user-summary-subtitle">Portfolio ${totalPortfolio} · Staked ${totalStaked}</div>
              </div>
            </div>
          </div>
        `;
      }

      function renderPromotionOverview(container, stateObj) {
        container.innerHTML = '';
        const promotionId = stateObj.url.promotionId;
        const loading = stateObj.loading.promotion;
        const error = stateObj.errors.promotion;
        const promotion = stateObj.promotion;

        if (!promotionId) {
          container.innerHTML = `
            <div class="promotion-hero-header promotion-hero-header--error">
              <div class="promotion-hero-title">
                <span class="hero-icon" aria-hidden="true">
                  <span class="hero-icon-inner">?</span>
                </span>
                <div class="hero-text">
                  <h1 class="promotion-title" id="promotion-title">Promotion not found</h1>
                  <p class="promotion-subtitle">This page requires a promotionId parameter. Please return to the Promotions page and try again.</p>
                </div>
              </div>
            </div>
          `;
          return;
        }

        if (loading) {
          container.innerHTML = `
            <div class="promotion-hero-header promotion-hero-header--loading">
              <div class="promotion-hero-title">
                <span class="hero-icon hero-icon--skeleton" aria-hidden="true"></span>
                <div class="hero-text">
                  <div class="promotion-title-skeleton"></div>
                  <div class="promotion-subtitle-skeleton"></div>
                </div>
              </div>
              <div class="promotion-meta-skeleton"></div>
            </div>
          `;
          return;
        }

        if (error) {
          container.innerHTML = `
            <div class="promotion-hero-header promotion-hero-header--error">
              <div class="promotion-hero-title">
                <span class="hero-icon" aria-hidden="true">
                  <span class="hero-icon-inner">!</span>
                </span>
                <div class="hero-text">
                  <h1 class="promotion-title" id="promotion-title">Unable to load promotion details</h1>
                  <p class="promotion-subtitle">Something went wrong while loading this promotion. Please try again.</p>
                </div>
              </div>
              <div class="promotion-hero-cta">
                <button type="button" class="btn btn-secondary" data-action="retryLoadPromotion">Retry loading promotion</button>
              </div>
            </div>
          `;
          return;
        }

        if (!promotion) {
          container.innerHTML = '';
          return;
        }

        const name = escapeHtml(promotion.name);
        const tokenSymbol = escapeHtml(promotion.token_symbol || '');
        const type = escapeHtml(promotion.promotion_type || '');
        const boostPercent = promotion.apy_boost_percent !== undefined && promotion.apy_boost_percent !== null ? formatPercent(promotion.apy_boost_percent) : '—';
        const durationDays = promotion.promotion_duration_days !== undefined && promotion.promotion_duration_days !== null ? promotion.promotion_duration_days + ' days' : '—';
        const minStaked = promotion.min_staked_amount !== undefined && promotion.min_staked_amount !== null ? formatNumber(promotion.min_staked_amount) + ' ' + tokenSymbol : 'No minimum specified';
        const dateRange = formatDate(promotion.start_datetime) + ' to ' + formatDate(promotion.end_datetime);
        const isActive = promotion.status === 'active';

        const subtitleParts = [];
        if (tokenSymbol) {
          subtitleParts.push('Applies to ' + tokenSymbol + ' staking positions.');
        }
        if (promotion.description) {
          subtitleParts.push(escapeHtml(promotion.description));
        }
        const subtitle = subtitleParts.join(' ');

        const joinDisabledReason = !isActive ? 'Promotion is not currently active.' : '';
        const joinDisabled = !isActive || !promotionId;

        container.innerHTML = `
          <div class="promotion-hero-header">
            <div class="promotion-hero-top-row">
              <div class="promotion-hero-title">
                <span class="hero-icon" aria-hidden="true">
                  <span class="hero-icon-inner">512</span>
                </span>
                <div class="hero-text">
                  <h1 class="promotion-title" id="promotion-title">${name}</h1>
                  <p class="promotion-subtitle">${subtitle}</p>
                </div>
              </div>
              <div class="promotion-hero-cta">
                <button type="button" class="btn btn-primary-hero" data-action="startJoinFlow" ${joinDisabled ? 'disabled aria-disabled="true"' : ''}>
                  <span class="btn-icon" aria-hidden="true">512</span>
                  <span class="btn-label">Join promotion</span>
                </button>
                <p class="promotion-cta-helper">${escapeHtml(joinDisabledReason)}</p>
              </div>
            </div>
            <div class="promotion-hero-meta">
              <dl class="promotion-meta-list">
                <div class="promotion-meta-item">
                  <dt>Token</dt>
                  <dd>${tokenSymbol || '3b0'}</dd>
                </div>
                <div class="promotion-meta-item">
                  <dt>Type</dt>
                  <dd>${type || '—'}</dd>
                </div>
                <div class="promotion-meta-item">
                  <dt>APY boost</dt>
                  <dd>${boostPercent}</dd>
                </div>
                <div class="promotion-meta-item">
                  <dt>Duration</dt>
                  <dd>${escapeHtml(durationDays)}</dd>
                </div>
                <div class="promotion-meta-item">
                  <dt>Min staked</dt>
                  <dd>${escapeHtml(minStaked)}</dd>
                </div>
                <div class="promotion-meta-item">
                  <dt>Window</dt>
                  <dd>${escapeHtml(dateRange)}</dd>
                </div>
              </dl>
            </div>
          </div>
        `;
      }

      function renderPromotionEligibilityStatus(container, stateObj) {
        container.innerHTML = '';
        const promotionId = stateObj.url.promotionId;
        const loadingPromo = stateObj.loading.promotion;
        const errorPromo = stateObj.errors.promotion;
        const promotion = stateObj.promotion;
        const userSummary = stateObj.userSummary;
        const eligiblePositions = stateObj.eligiblePositions;

        if (!promotionId) {
          container.innerHTML = `
            <div class="status-banner status-banner--error">
              <div class="status-indicator" aria-hidden="true"></div>
              <div class="status-content">
                <div class="status-title">Missing promotion identifier</div>
                <div class="status-body">This page could not determine which promotion to show. Please navigate here from the Promotions list.</div>
              </div>
            </div>
          `;
          return;
        }

        if (loadingPromo) {
          container.innerHTML = `
            <div class="status-banner status-banner--loading">
              <div class="status-indicator" aria-hidden="true"></div>
              <div class="status-content">
                <div class="status-title">Loading promotion details</div>
                <div class="status-body">Checking promotion window and eligibility criteria.</div>
              </div>
            </div>
          `;
          return;
        }

        if (errorPromo) {
          container.innerHTML = `
            <div class="status-banner status-banner--error">
              <div class="status-indicator" aria-hidden="true"></div>
              <div class="status-content">
                <div class="status-title">Unable to load this promotion</div>
                <div class="status-body">We couldn\'t retrieve details for this promotion. Retry above to try again.</div>
              </div>
            </div>
          `;
          return;
        }

        if (!promotion) {
          container.innerHTML = '';
          return;
        }

        const status = promotion.status;
        const isAuthenticated = !!(userSummary && userSummary.is_authenticated);

        let bannerClass = 'status-banner--neutral';
        let title = '';
        let body = '';

        if (status === 'expired') {
          bannerClass = 'status-banner--inactive';
          title = 'This promotion has ended';
          body = 'You can no longer apply this promotion to new positions.';
        } else if (status === 'upcoming') {
          bannerClass = 'status-banner--upcoming';
          title = 'Promotion not yet started';
          body = 'You\'ll be able to join once the promotion window opens.';
        } else if (status === 'active') {
          if (!isAuthenticated) {
            bannerClass = 'status-banner--attention';
            title = 'Sign in to check your eligibility';
            body = 'Connect your account to see which of your staking positions can receive this boost.';
          } else if (!eligiblePositions) {
            bannerClass = 'status-banner--active';
            title = 'Promotion is active';
            body = 'Click "Join promotion" to load your eligible staking positions.';
          } else if (Array.isArray(eligiblePositions) && eligiblePositions.length === 0) {
            bannerClass = 'status-banner--attention';
            title = 'No positions currently qualify';
            body = 'You don\'t have any staking positions that meet this promotion\'s criteria right now.';
          } else {
            bannerClass = 'status-banner--active';
            title = 'You have positions that may qualify';
            body = 'Review the list below and select a position to apply this promotion.';
          }
        } else {
          bannerClass = 'status-banner--neutral';
          title = 'Promotion status';
          body = 'This promotion is currently marked as ' + escapeHtml(String(status)) + '.';
        }

        container.innerHTML = `
          <div class="status-banner ${bannerClass}">
            <div class="status-indicator" aria-hidden="true"></div>
            <div class="status-content">
              <div class="status-title">${escapeHtml(title)}</div>
              <div class="status-body">${escapeHtml(body)}</div>
            </div>
          </div>
        `;
      }

      function renderEligiblePositionsToolbar(container, stateObj) {
        const promotion = stateObj.promotion;
        const sortParam = stateObj.url.sortParam || 'staked_amount:desc';
        const sort = parseSortParam(sortParam);
        const minFilter = !!stateObj.clientFilters.minAmountOnly;
        const disabled = !promotion || promotion.status !== 'active';

        const sortValue = buildSortParam(sort.sort_by, sort.sort_direction);

        container.innerHTML = `
          <div class="positions-toolbar">
            <div class="positions-toolbar-left">
              <label class="toolbar-field">
                <span class="toolbar-label">Sort by</span>
                <select class="toolbar-select" data-action="changeSort" ${disabled ? 'disabled aria-disabled="true"' : ''}>
                  <option value="staked_amount:desc" ${sortValue === 'staked_amount:desc' ? 'selected' : ''}>Staked amount – high to low</option>
                  <option value="staked_amount:asc" ${sortValue === 'staked_amount:asc' ? 'selected' : ''}>Staked amount – low to high</option>
                  <option value="apy_percent:desc" ${sortValue === 'apy_percent:desc' ? 'selected' : ''}>APY – high to low</option>
                  <option value="apy_percent:asc" ${sortValue === 'apy_percent:asc' ? 'selected' : ''}>APY – low to high</option>
                  <option value="lock_duration_days:asc" ${sortValue === 'lock_duration_days:asc' ? 'selected' : ''}>Lock duration – short to long</option>
                  <option value="lock_duration_days:desc" ${sortValue === 'lock_duration_days:desc' ? 'selected' : ''}>Lock duration – long to short</option>
                </select>
              </label>
              <label class="toolbar-toggle">
                <input type="checkbox" class="toolbar-toggle-input" data-action="toggleFilterMinAmount" ${minFilter ? 'checked' : ''} ${disabled ? 'disabled aria-disabled="true"' : ''}>
                <span class="toolbar-toggle-label">Show only positions meeting the minimum amount</span>
              </label>
            </div>
            <div class="positions-toolbar-right">
              <button type="button" class="btn btn-ghost" data-action="refreshEligiblePositions" ${disabled ? 'disabled aria-disabled="true"' : ''}>Refresh positions</button>
            </div>
          </div>
        `;
      }

      function renderEligiblePositionsList(container, stateObj) {
        const step = stateObj.url.step || 'overview';
        const loading = stateObj.loading.eligiblePositions;
        const error = stateObj.errors.eligiblePositions;
        const promotion = stateObj.promotion;
        const userSummary = stateObj.userSummary;
        const eligiblePositions = stateObj.eligiblePositions;
        const minFilter = !!stateObj.clientFilters.minAmountOnly;
        const selectedId = stateObj.selectedPositionId;

        const isActive = promotion && promotion.status === 'active';
        const isAuthenticated = !!(userSummary && userSummary.is_authenticated);

        if (!promotion || !isActive) {
          container.innerHTML = `
            <div class="positions-placeholder positions-placeholder--inactive">
              <p>This promotion is not currently active. Position selection is disabled.</p>
            </div>
          `;
          return;
        }

        if (!isAuthenticated) {
          container.innerHTML = `
            <div class="positions-placeholder positions-placeholder--auth">
              <p>Sign in to load your staking positions and check eligibility for this promotion.</p>
            </div>
          `;
          return;
        }

        if (step === 'overview' && !eligiblePositions) {
          container.innerHTML = `
            <div class="positions-placeholder positions-placeholder--overview">
              <p>Click "Join promotion" above to load your eligible staking positions.</p>
            </div>
          `;
          return;
        }

        if (loading) {
          container.innerHTML = `
            <div class="positions-loading">
              <div class="positions-loading-spinner" aria-hidden="true"></div>
              <p>Loading eligible positions…</p>
            </div>
          `;
          return;
        }

        if (error) {
          container.innerHTML = `
            <div class="positions-error">
              <p>${escapeHtml(error)}</p>
              <button type="button" class="btn btn-secondary" data-action="retryLoadEligiblePositions">Retry loading positions</button>
            </div>
          `;
          return;
        }

        if (!eligiblePositions) {
          container.innerHTML = '';
          return;
        }

        let visiblePositions = Array.isArray(eligiblePositions) ? eligiblePositions.slice() : [];
        if (minFilter) {
          visiblePositions = visiblePositions.filter(function(item) {
            return !!item.meets_min_staked_amount;
          });
        }

        if (visiblePositions.length === 0) {
          container.innerHTML = `
            <div class="positions-empty">
              <p>No positions currently match your filters for this promotion.</p>
            </div>
          `;
          return;
        }

        const rowsHtml = visiblePositions.map(function(item) {
          const position = item.position;
          const pool = item.pool;
          const token = item.token;
          const meetsMin = !!item.meets_min_staked_amount;
          const isSelected = selectedId && position && position.id === selectedId;
          const tokenSymbol = token && token.symbol ? token.symbol : (position && position.token_symbol ? position.token_symbol : '');
          const poolName = pool && pool.name ? pool.name : 'Pool';
          const stakedDisplay = item.staked_amount_display ? item.staked_amount_display : (position && !isNaN(position.staked_amount) ? formatNumber(position.staked_amount) + ' ' + tokenSymbol : '—');
          const apy = position && !isNaN(position.apy_percent) ? formatPercent(position.apy_percent) : '—';
          const baseApy = position && !isNaN(position.base_apy_percent) ? formatPercent(position.base_apy_percent) : '—';
          const lockType = position && position.lock_type ? position.lock_type : 'flexible';
          const lockDuration = position && !isNaN(position.lock_duration_days) ? position.lock_duration_days + ' days' : '—';
          const meetsMinLabel = meetsMin ? 'Meets minimum' : 'Below minimum';

          return `
            <tr class="positions-row ${isSelected ? 'positions-row--selected' : ''}" data-position-id="${escapeHtml(position.id)}">
              <td class="positions-cell positions-cell--select">
                <input type="radio" name="promotionPosition" class="positions-radio" data-action="selectPosition" value="${escapeHtml(position.id)}" ${isSelected ? 'checked' : ''} aria-label="Select position ${escapeHtml(position.id)}">
              </td>
              <td class="positions-cell positions-cell--primary">
                <div class="positions-cell-title">${escapeHtml(poolName)}</div>
                <div class="positions-cell-subtitle">Position ID ${escapeHtml(position.id)}</div>
              </td>
              <td class="positions-cell">
                <div class="positions-cell-title">${escapeHtml(stakedDisplay)}</div>
                <div class="positions-cell-subtitle">${escapeHtml(tokenSymbol)}</div>
              </td>
              <td class="positions-cell">
                <div class="positions-cell-title">${escapeHtml(apy)}</div>
                <div class="positions-cell-subtitle">Base ${escapeHtml(baseApy)}</div>
              </td>
              <td class="positions-cell">
                <div class="positions-cell-title">${escapeHtml(lockType)}</div>
                <div class="positions-cell-subtitle">${escapeHtml(lockDuration)}</div>
              </td>
              <td class="positions-cell positions-cell--badge">
                <span class="positions-pill ${meetsMin ? 'positions-pill--ok' : 'positions-pill--warn'}">${escapeHtml(meetsMinLabel)}</span>
              </td>
            </tr>
          `;
        }).join('');

        container.innerHTML = `
          <div class="positions-table-wrapper">
            <table class="positions-table">
              <thead>
                <tr>
                  <th scope="col" class="positions-header positions-header--select">Select</th>
                  <th scope="col" class="positions-header">Position</th>
                  <th scope="col" class="positions-header">Staked amount</th>
                  <th scope="col" class="positions-header">APY</th>
                  <th scope="col" class="positions-header">Lock</th>
                  <th scope="col" class="positions-header">Eligibility</th>
                </tr>
              </thead>
              <tbody>
                ${rowsHtml}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderPositionSelectionFooter(container, stateObj) {
        const promotion = stateObj.promotion;
        const userSummary = stateObj.userSummary;
        const isAuthenticated = !!(userSummary && userSummary.is_authenticated);
        const selectedId = stateObj.selectedPositionId;
        const eligiblePositions = stateObj.eligiblePositions || [];
        const loadingApply = stateObj.loading.apply;
        const applyError = stateObj.errors.apply;
        const promotionApplication = stateObj.promotionApplication;

        const isPromotionActive = promotion && promotion.status === 'active';

        let selectedItem = null;
        if (selectedId && Array.isArray(eligiblePositions)) {
          selectedItem = eligiblePositions.find(function(item) {
            return item.position && item.position.id === selectedId;
          }) || null;
        }

        let selectedSummary = '';
        let baseApyLabel = '—';
        let boostedApyLabel = '—';
        if (selectedItem && selectedItem.position) {
          const position = selectedItem.position;
          const tokenSymbol = position.token_symbol || (selectedItem.token && selectedItem.token.symbol) || '';
          const stakedDisplay = !isNaN(position.staked_amount) ? formatNumber(position.staked_amount) + ' ' + tokenSymbol : '—';
          baseApyLabel = !isNaN(position.base_apy_percent) ? formatPercent(position.base_apy_percent) : '—';
          boostedApyLabel = !isNaN(position.apy_percent) ? formatPercent(position.apy_percent) : '—';
          selectedSummary = 'Position ' + escapeHtml(position.id) + ' · ' + escapeHtml(stakedDisplay);
        } else {
          selectedSummary = 'No position selected yet.';
        }

        let boostLabel = '—';
        if (promotionApplication && !isNaN(promotionApplication.effective_apy_boost_percent)) {
          boostLabel = formatPercent(promotionApplication.effective_apy_boost_percent);
        } else if (promotion && !isNaN(promotion.apy_boost_percent)) {
          boostLabel = formatPercent(promotion.apy_boost_percent);
        }

        const buttonDisabled = !isPromotionActive || !isAuthenticated || !selectedItem || loadingApply;
        let helperText = '';
        if (!isPromotionActive) {
          helperText = 'Promotion is not active.';
        } else if (!isAuthenticated) {
          helperText = 'Sign in to apply this promotion.';
        } else if (!selectedItem) {
          helperText = 'Select one eligible position from the list above to enable the boost.';
        } else if (loadingApply) {
          helperText = 'Applying promotion to your position…';
        }

        container.innerHTML = `
          <div class="selection-footer">
            <div class="selection-footer-main">
              <div class="selection-summary">
                <div class="selection-summary-label">Selected position</div>
                <div class="selection-summary-value">${escapeHtml(selectedSummary)}</div>
              </div>
              <div class="selection-apy">
                <div class="selection-apy-item">
                  <div class="selection-apy-label">Base APY</div>
                  <div class="selection-apy-value">${escapeHtml(baseApyLabel)}</div>
                </div>
                <div class="selection-apy-item">
                  <div class="selection-apy-label">Boost</div>
                  <div class="selection-apy-value">${escapeHtml(boostLabel)}</div>
                </div>
                <div class="selection-apy-item">
                  <div class="selection-apy-label">Resulting APY</div>
                  <div class="selection-apy-value">${escapeHtml(boostedApyLabel)}</div>
                </div>
              </div>
            </div>
            <div class="selection-footer-actions">
              <div class="selection-footer-helper">${escapeHtml(helperText)}</div>
              ${applyError ? `<div class="selection-footer-error">${escapeHtml(applyError)}</div>` : ''}
              <button type="button" class="btn btn-primary-apply" data-action="applyPromotion" ${buttonDisabled ? 'disabled aria-disabled="true"' : ''}>
                ${loadingApply ? 'Applying boost…' : 'Apply boost'}
              </button>
            </div>
          </div>
        `;
      }

      function renderPromotionConfirmation(container, stateObj) {
        const promotion = stateObj.promotion;
        const application = stateObj.promotionApplication;
        const appliedPosition = stateObj.appliedPosition;
        const step = stateObj.url.step || 'overview';

        if (!promotion || !application || !appliedPosition || step !== 'confirmation') {
          if (confirmationOverlayEl) {
            confirmationOverlayEl.setAttribute('hidden', 'hidden');
          }
          container.innerHTML = '';
          return;
        }

        const promoName = escapeHtml(promotion.name || 'Promotion');
        const tokenSymbol = escapeHtml(promotion.token_symbol || '');
        const positionId = escapeHtml(appliedPosition.id);
        const stakedAmountLabel = !isNaN(appliedPosition.staked_amount) ? formatNumber(appliedPosition.staked_amount) + ' ' + escapeHtml(appliedPosition.token_symbol || '') : '—';
        const resultingApy = !isNaN(appliedPosition.apy_percent) ? formatPercent(appliedPosition.apy_percent) : '—';
        const baseApy = !isNaN(appliedPosition.base_apy_percent) ? formatPercent(appliedPosition.base_apy_percent) : '—';
        const effectiveBoost = !isNaN(application.effective_apy_boost_percent) ? formatPercent(application.effective_apy_boost_percent) : (promotion.apy_boost_percent !== undefined && promotion.apy_boost_percent !== null ? formatPercent(promotion.apy_boost_percent) : '—');

        if (confirmationOverlayEl) {
          confirmationOverlayEl.removeAttribute('hidden');
        }

        container.innerHTML = `
          <div class="confirmation-card">
            <div class="confirmation-header">
              <span class="confirmation-icon" aria-hidden="true">
                <span class="confirmation-icon-inner">512</span>
              </span>
              <h2 class="confirmation-title">Promotion applied</h2>
              <p class="confirmation-subtitle">${promoName} is now linked to your staking position.</p>
            </div>
            <div class="confirmation-body">
              <dl class="confirmation-details">
                <div class="confirmation-detail-item">
                  <dt>Token</dt>
                  <dd>${tokenSymbol || '—'}</dd>
                </div>
                <div class="confirmation-detail-item">
                  <dt>Position</dt>
                  <dd>${positionId}</dd>
                </div>
                <div class="confirmation-detail-item">
                  <dt>Staked amount</dt>
                  <dd>${escapeHtml(stakedAmountLabel)}</dd>
                </div>
                <div class="confirmation-detail-item">
                  <dt>Base APY</dt>
                  <dd>${escapeHtml(baseApy)}</dd>
                </div>
                <div class="confirmation-detail-item">
                  <dt>Effective boost</dt>
                  <dd>${escapeHtml(effectiveBoost)}</dd>
                </div>
                <div class="confirmation-detail-item">
                  <dt>Resulting APY</dt>
                  <dd>${escapeHtml(resultingApy)}</dd>
                </div>
              </dl>
            </div>
            <div class="confirmation-actions">
              <button type="button" class="btn btn-primary" data-action="viewBoostedInPortfolio">View boosted positions in Portfolio</button>
              <button type="button" class="btn btn-ghost" data-action="backToSelection">Back to selection</button>
            </div>
          </div>
        `;
      }

      function renderAll() {
        if (populateContainers['user-summary-header']) {
          renderUserSummaryHeader(populateContainers['user-summary-header'], state);
        }
        if (populateContainers['promotion-overview']) {
          renderPromotionOverview(populateContainers['promotion-overview'], state);
        }
        if (populateContainers['promotion-eligibility-status']) {
          renderPromotionEligibilityStatus(populateContainers['promotion-eligibility-status'], state);
        }
        if (populateContainers['eligible-positions-toolbar']) {
          renderEligiblePositionsToolbar(populateContainers['eligible-positions-toolbar'], state);
        }
        if (populateContainers['eligible-positions-list']) {
          renderEligiblePositionsList(populateContainers['eligible-positions-list'], state);
        }
        if (populateContainers['position-selection-footer']) {
          renderPositionSelectionFooter(populateContainers['position-selection-footer'], state);
        }
        if (populateContainers['promotion-application-confirmation']) {
          renderPromotionConfirmation(populateContainers['promotion-application-confirmation'], state);
        }
      }

      function loadUserSummary() {
        state.loading.userSummary = true;
        renderAll();
        try {
          const summary = WebsiteSDK.getCurrentUserSummary();
          state.userSummary = summary;
        } catch (e) {
          showNotification('error', 'Unable to load your account summary. Some actions may be unavailable.');
        } finally {
          state.loading.userSummary = false;
          renderAll();
        }
      }

      function loadPromotion() {
        if (!state.url.promotionId) {
          renderAll();
          return;
        }
        state.loading.promotion = true;
        state.errors.promotion = null;
        renderAll();
        try {
          const promotion = WebsiteSDK.getPromotionDetail(state.url.promotionId);
          state.promotion = promotion;
        } catch (e) {
          state.errors.promotion = 'Unable to load promotion details.';
          showNotification('error', 'Unable to load promotion details.');
        } finally {
          state.loading.promotion = false;
          renderAll();
        }
      }

      function loadEligiblePositions() {
        if (!state.url.promotionId) {
          return;
        }
        const promotion = state.promotion;
        if (!promotion || promotion.status !== 'active') {
          return;
        }
        state.loading.eligiblePositions = true;
        state.errors.eligiblePositions = null;
        renderAll();
        try {
          const sort = parseSortParam(state.url.sortParam);
          const positions = WebsiteSDK.getPromotionEligiblePositions(state.url.promotionId, sort);
          state.eligiblePositions = Array.isArray(positions) ? positions : [];
          if (state.selectedPositionId && !state.eligiblePositions.find(function(item) { return item.position && item.position.id === state.selectedPositionId; })) {
            state.selectedPositionId = null;
            state.url.positionId = null;
            setUrlParam('positionId', '');
          }
        } catch (e) {
          state.errors.eligiblePositions = 'Unable to load eligible positions.';
          showNotification('error', 'Unable to load eligible positions.');
        } finally {
          state.loading.eligiblePositions = false;
          renderAll();
        }
      }

      function applyPromotion() {
        if (state.loading.apply) {
          return;
        }
        const promotion = state.promotion;
        const userSummary = state.userSummary;
        if (!promotion || promotion.status !== 'active') {
          state.errors.apply = 'This promotion is not active.';
          renderAll();
          return;
        }
        if (!userSummary || !userSummary.is_authenticated) {
          state.errors.apply = 'You must be signed in to apply this promotion.';
          showNotification('error', 'Sign in to apply this promotion.');
          renderAll();
          return;
        }
        if (!state.selectedPositionId) {
          state.errors.apply = 'Select a position first.';
          renderAll();
          return;
        }
        state.loading.apply = true;
        state.errors.apply = null;
        renderAll();
        try {
          const result = WebsiteSDK.applyPromotionToPosition(state.url.promotionId, state.selectedPositionId);
          const application = result.promotion_application;
          const updatedPosition = result.updated_position;
          state.promotionApplication = application;
          state.appliedPosition = updatedPosition;
          if (state.eligiblePositions && updatedPosition) {
            state.eligiblePositions = state.eligiblePositions.map(function(item) {
              if (item.position && item.position.id === updatedPosition.id) {
                return Object.assign({}, item, { position: updatedPosition });
              }
              return item;
            });
          }
          state.url.step = 'confirmation';
          setUrlParam('step', 'confirmation');
          showNotification('success', 'Promotion applied to your staking position.');
        } catch (e) {
          state.errors.apply = 'Unable to apply promotion. Please try again.';
          showNotification('error', 'Unable to apply promotion to your position.');
        } finally {
          state.loading.apply = false;
          renderAll();
        }
      }

      function handleStartJoinFlow() {
        const promotion = state.promotion;
        if (!promotion) {
          showNotification('error', 'Promotion details are not available yet.');
          return;
        }
        if (promotion.status !== 'active') {
          showNotification('error', 'This promotion is not currently active.');
          return;
        }
        const userSummary = state.userSummary;
        if (!userSummary || !userSummary.is_authenticated) {
          showNotification('error', 'Sign in to check which positions are eligible for this promotion.');
          return;
        }
        state.url.step = 'select_position';
        setUrlParam('step', 'select_position');
        loadEligiblePositions();
      }

      function handleSortChange(value) {
        state.url.sortParam = value || 'staked_amount:desc';
        setUrlParam('sort', state.url.sortParam);
        loadEligiblePositions();
      }

      function handleToggleMinFilter(checked) {
        state.clientFilters.minAmountOnly = !!checked;
        renderAll();
      }

      function handleSelectPosition(positionId) {
        if (!positionId) {
          return;
        }
        state.selectedPositionId = positionId;
        state.url.positionId = positionId;
        setUrlParam('positionId', positionId);
        renderAll();
      }

      function handleRetryLoadPromotion() {
        loadPromotion();
      }

      function handleRetryLoadEligiblePositions() {
        loadEligiblePositions();
      }

      function handleRetryApplyPromotion() {
        applyPromotion();
      }

      function handleViewBoostedInPortfolio() {
        const promotion = state.promotion;
        if (!promotion || !promotion.token_symbol) {
          return;
        }
        const tokenSymbol = promotion.token_symbol;
        const targetUrl = 'portfolio.html?token=' + encodeURIComponent(tokenSymbol) + '&promotion_filter=with_active_promotion';
        window.location.href = targetUrl;
      }

      function handleBackToSelection() {
        state.url.step = 'select_position';
        setUrlParam('step', 'select_position');
        renderAll();
      }

      function handleDismissNotification(toastId) {
        if (!toastId) {
          return;
        }
        if (!notificationCenterEl) {
          return;
        }
        const toast = notificationCenterEl.querySelector('[data-toast-id="' + toastId.replace(/"/g, '\\"') + '"]');
        if (toast && toast.parentNode) {
          toast.parentNode.removeChild(toast);
        }
      }

      document.addEventListener('click', function(event) {
        const actionEl = event.target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        const action = actionEl.getAttribute('data-action');
        if (!action) {
          return;
        }
        if (action === 'startJoinFlow') {
          event.preventDefault();
          handleStartJoinFlow();
        } else if (action === 'retryLoadPromotion') {
          event.preventDefault();
          handleRetryLoadPromotion();
        } else if (action === 'refreshEligiblePositions') {
          event.preventDefault();
          loadEligiblePositions();
        } else if (action === 'retryLoadEligiblePositions') {
          event.preventDefault();
          handleRetryLoadEligiblePositions();
        } else if (action === 'applyPromotion') {
          event.preventDefault();
          applyPromotion();
        } else if (action === 'retryApplyPromotion') {
          event.preventDefault();
          handleRetryApplyPromotion();
        } else if (action === 'viewBoostedInPortfolio') {
          event.preventDefault();
          handleViewBoostedInPortfolio();
        } else if (action === 'backToSelection') {
          event.preventDefault();
          handleBackToSelection();
        } else if (action === 'dismissNotification') {
          event.preventDefault();
          const toastId = actionEl.getAttribute('data-toast-id');
          handleDismissNotification(toastId);
        }
      });

      document.addEventListener('change', function(event) {
        const actionEl = event.target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        const action = actionEl.getAttribute('data-action');
        if (!action) {
          return;
        }
        if (action === 'changeSort') {
          handleSortChange(actionEl.value);
        } else if (action === 'toggleFilterMinAmount') {
          handleToggleMinFilter(actionEl.checked);
        } else if (action === 'selectPosition') {
          handleSelectPosition(actionEl.value);
        }
      });

      renderAll();
      loadUserSummary();
      loadPromotion();

      if (state.url.step === 'select_position' || state.url.step === 'confirmation') {
        if (state.url.promotionId) {
          const pollForPromotion = window.setInterval(function() {
            if (!state.loading.promotion) {
              window.clearInterval(pollForPromotion);
              if (state.promotion && state.promotion.status === 'active' && state.userSummary && state.userSummary.is_authenticated) {
                loadEligiblePositions();
              }
            }
          }, 50);
        }
      }
    });
  </script>
</body>
</html>
