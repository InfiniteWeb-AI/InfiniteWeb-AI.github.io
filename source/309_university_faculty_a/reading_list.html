<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Reading List &mdash; Faculty Profiles</title>

    <!-- Typography -->
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&amp;family=Source+Serif+4:wght@400;500;600&amp;display=swap' rel='stylesheet'>

    <!-- Framework Styles -->
    <link rel='stylesheet' href='styles.css'>
    <!-- Page Styles -->
    <link rel='stylesheet' href='reading_list.css'>

    <!-- SDK / Business Logic -->
    <script src='business_logic.js'></script>
</head>
<body>
<div class='site'>
    <header class='site-header'>
        <!-- Navigation toggle (hamburger) -->
        <input type='checkbox' id='nav-toggle' class='nav-toggle' aria-label='Toggle primary navigation'>

        <div class='page-shell header-inner'>
            <label for='nav-toggle' class='hamburger' aria-label='Toggle primary navigation'>
                <span></span>
                <span></span>
                <span></span>
            </label>
        </div>

        <!-- Primary navigation drawer -->
        <nav class='site-nav' aria-label='Primary navigation'>
            <div class='site-nav-inner'>
                <div class='site-nav-title'>Navigation</div>
                <ul class='site-nav-list'>
                    <li><a href='index.html' title='Homepage with global search and quick links'>Home</a></li>
                    <li><a href='faculty_directory.html' title='Browse and search all faculty'>Faculty Directory</a></li>
                    <li><a href='reading_list.html' title='View and manage saved publications'>Reading List</a></li>
                    <li><a href='planned_courses.html' title='View and manage your planned courses'>Planned Courses</a></li>
                    <li><a href='thesis_advisor_shortlist.html' title='View shortlisted thesis advisors'>Thesis Advisor Shortlist</a></li>
                    <li><a href='bookmarked_events.html' title='View bookmarked talks and events'>Bookmarked Events</a></li>
                    <li><a href='my_notes.html' title='Open personal notes workspace'>My Notes</a></li>
                    <li><a href='contacts.html' title='View and edit saved faculty contacts'>Contacts</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main id='content' class='site-main' role='main'>
        <div class='page-shell'>
            <!-- Reading List Page Content -->
            <div class='reading-list-page' data-component='reading-list-page-controller'>
                <header class='reading-list-header'>
                    <a href='javascript:void(0)' class='reading-list-back-link' data-action='goBack'>
                        &larr; Back
                    </a>
                    <h1 class='reading-list-title'>Reading List</h1>
                </header>

                <!-- Control band: filters (left) + sort + summary (right) -->
                <section class='reading-list-controls'>
                    <div class='reading-list-controls-left'>
                        <form id='readingListFiltersForm' class='reading-list-filters' data-component='reading-list-filters-form'>
                            <div class='filter-group'>
                                <label for='readingListSearch'>Search</label>
                                <input type='search' id='readingListSearch' name='search' placeholder='Search by title or venue'>
                            </div>

                            <div class='filter-group'>
                                <label for='filterPublicationType'>Publication type</label>
                                <select id='filterPublicationType' name='filter_type'>
                                    <option value=''>All types</option>
                                    <option value='journal_article'>Journal article</option>
                                    <option value='conference_paper'>Conference paper</option>
                                    <option value='book_chapter'>Book chapter</option>
                                    <option value='book'>Book</option>
                                    <option value='preprint'>Preprint</option>
                                    <option value='other'>Other</option>
                                </select>
                            </div>

                            <div class='filter-group filter-group-inline'>
                                <div class='filter-field'>
                                    <label for='filterYearFrom'>Year from</label>
                                    <input type='number' id='filterYearFrom' name='filter_year_from' min='1900' max='2100' step='1'>
                                </div>
                                <div class='filter-field'>
                                    <label for='filterYearTo'>Year to</label>
                                    <input type='number' id='filterYearTo' name='filter_year_to' min='1900' max='2100' step='1'>
                                </div>
                            </div>

                            <div class='filter-group'>
                                <label for='filterStatus'>Read status</label>
                                <select id='filterStatus' name='filter_status'>
                                    <option value=''>All</option>
                                    <option value='unread'>Unread only</option>
                                    <option value='read'>Read only</option>
                                </select>
                            </div>

                            <div class='filters-actions'>
                                <button type='submit' class='btn-primary'>Apply filters</button>
                                <button type='button' class='btn-secondary' data-action='resetFilters'>Reset</button>
                            </div>
                        </form>
                    </div>

                    <div class='reading-list-controls-right'>
                        <div class='reading-list-sort' data-component='reading-list-sort-control'>
                            <label for='sortSelect'>Sort by</label>
                            <select id='sortSelect' name='sort'>
                                <option value=''>Default order</option>
                                <option value='year_newest_first'>Year &mdash; newest first</option>
                                <option value='year_oldest_first'>Year &mdash; oldest first</option>
                                <option value='title_a_to_z'>Title A to Z</option>
                                <option value='title_z_to_a'>Title Z to A</option>
                            </select>
                        </div>

                        <section class='reading-list-summary' data-component='reading-list-summary-bar' data-populate='reading-list-summary' aria-live='polite'>
                            <!-- Summary content populated by JavaScript -->
                        </section>
                    </div>
                </section>

                <!-- Main list / empty state -->
                <section class='reading-list-content'>
                    <section class='reading-list-empty' data-component='reading-list-empty-state' hidden>
                        <!-- Empty-state content populated by JavaScript -->
                    </section>

                    <section class='reading-list-items' data-component='reading-list-items-list'>
                        <div class='reading-list-items-container' data-populate='reading-list-items' role='list'>
                            <!-- Publication rows populated by JavaScript -->
                        </div>
                    </section>
                </section>

                <!-- Pagination -->
                <nav class='reading-list-pagination' data-component='reading-list-pagination-controls' aria-label='Reading list pages'>
                    <!-- Pagination controls populated by JavaScript -->
                </nav>
            </div>
        </div>
    </main>

    <footer class='site-footer'>
        <div class='page-shell footer-inner'>
            <nav class='footer-nav' aria-label='Footer navigation'>
                <ul>
                    <li><a href='about.html' title='About this faculty profiles site'>About</a></li>
                    <li><a href='help.html' title='Help and FAQs for using the site'>Help</a></li>
                    <li><a href='policies.html' title='Privacy, terms of use, and accessibility policies'>Policies</a></li>
                    <li><a href='faculty_directory.html' title='Browse the full faculty directory'>Faculty Directory</a></li>
                </ul>
            </nav>
            <div class='footer-meta'>
                &copy; 2024 Faculty Profiles
            </div>
        </div>
    </footer>
</div>

<script>
(function() {
    'use strict';

    var readingListState = {
        rawItems: [],       // As returned from getReadingListContents
        items: [],          // After client-side search / status filters
        page: 1,
        pageSize: 10,
        totalCount: 0,
        readCount: 0,
        unreadCount: 0,
        totalSavedCount: null // Optional, from removePublicationFromReadingList
    };

    function getUrlParams() {
        var params = new URLSearchParams(window.location.search);
        return params;
    }

    function setUrlParams(changes) {
        var params = getUrlParams();
        Object.keys(changes).forEach(function(key) {
            var value = changes[key];
            if (value === null || value === undefined || value === '') {
                params.delete(key);
            } else {
                params.set(key, String(value));
            }
        });
        var newQuery = params.toString();
        var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
        window.history.pushState({}, '', newUrl);
    }

    function syncControlsWithUrl(dom) {
        var params = getUrlParams();
        var searchInput = dom.searchInput;
        var typeSelect = dom.typeSelect;
        var yearFromInput = dom.yearFromInput;
        var yearToInput = dom.yearToInput;
        var statusSelect = dom.statusSelect;
        var sortSelect = dom.sortSelect;

        if (searchInput) {
            searchInput.value = params.get('search') || '';
        }
        if (typeSelect) {
            typeSelect.value = params.get('filter_type') || '';
        }
        if (yearFromInput) {
            yearFromInput.value = params.get('filter_year_from') || '';
        }
        if (yearToInput) {
            yearToInput.value = params.get('filter_year_to') || '';
        }
        if (statusSelect) {
            statusSelect.value = params.get('filter_status') || '';
        }
        if (sortSelect) {
            sortSelect.value = params.get('sort') || '';
        }

        var pageParam = params.get('page');
        var pageSizeParam = params.get('page_size');
        var page = parseInt(pageParam, 10);
        var pageSize = parseInt(pageSizeParam, 10);
        readingListState.page = (!isNaN(page) && page > 0) ? page : 1;
        readingListState.pageSize = (!isNaN(pageSize) && pageSize > 0) ? pageSize : 10;
    }

    function buildApiFiltersFromUrl(params) {
        var filters = {};
        var type = params.get('filter_type');
        var yearFromStr = params.get('filter_year_from');
        var yearToStr = params.get('filter_year_to');
        var status = params.get('filter_status');

        if (type) {
            filters.publication_type = type;
        }
        if (yearFromStr) {
            var yf = parseInt(yearFromStr, 10);
            if (!isNaN(yf)) {
                filters.year_from = yf;
            }
        }
        if (yearToStr) {
            var yt = parseInt(yearToStr, 10);
            if (!isNaN(yt)) {
                filters.year_to = yt;
            }
        }
        if (status === 'read') {
            filters.is_marked_read = true;
        } else if (status === 'unread') {
            filters.is_marked_read = false;
        }

        // Optional pagination passthrough (backend may ignore)
        var pageParam = params.get('page');
        var pageSizeParam = params.get('page_size');
        var page = parseInt(pageParam, 10);
        var pageSize = parseInt(pageSizeParam, 10);
        if (!isNaN(page) && page > 0) {
            filters.page = page;
        }
        if (!isNaN(pageSize) && pageSize > 0) {
            filters.page_size = pageSize;
        }

        return filters;
    }

    function applyClientSideFilters(rawItems, params) {
        var search = (params.get('search') || '').trim().toLowerCase();
        var filtered = rawItems.slice();

        if (search) {
            filtered = filtered.filter(function(item) {
                var title = (item.title || '').toLowerCase();
                var venue = (item.journal_or_venue || '').toLowerCase();
                return title.indexOf(search) !== -1 || venue.indexOf(search) !== -1;
            });
        }

        return filtered;
    }

    function computeCounts(items) {
        var read = 0;
        var unread = 0;
        items.forEach(function(item) {
            if (item.is_marked_read) {
                read += 1;
            } else {
                unread += 1;
            }
        });
        return { read: read, unread: unread };
    }

    function renderSummary(container, state) {
        if (!container) return;
        var totalInView = state.totalCount;
        var readCount = state.readCount;
        var unreadCount = state.unreadCount;
        var overall = state.totalSavedCount;

        var overallPart = '';
        if (typeof overall === 'number' && overall >= 0) {
            overallPart = '<div class="summary-overall">Saved overall: <span class="summary-number">' + overall + '</span></div>';
        }

        container.innerHTML = '' +
            '<div class="summary-row">' +
                '<div class="summary-item">In this view: <span class="summary-number">' + totalInView + '</span></div>' +
                '<div class="summary-item">Unread: <span class="summary-number">' + unreadCount + '</span></div>' +
                '<div class="summary-item">Read: <span class="summary-number">' + readCount + '</span></div>' +
            '</div>' +
            overallPart;
    }

    function createItemRow(pub) {
        var article = document.createElement('article');
        article.className = 'reading-list-item-row';
        article.setAttribute('role', 'listitem');
        article.dataset.component = 'reading-list-item-row';
        article.dataset.publicationId = pub.publication_id || '';

        var mainDiv = document.createElement('div');
        mainDiv.className = 'reading-list-item-main';

        var titleHeading = document.createElement('h2');
        titleHeading.className = 'reading-list-item-title';
        var titleLink = document.createElement('a');
        titleLink.href = 'javascript:void(0)';
        titleLink.dataset.action = 'openPublication';
        titleLink.dataset.publicationId = pub.publication_id || '';
        titleLink.textContent = pub.title || 'Untitled publication';
        titleHeading.appendChild(titleLink);

        var metaDiv = document.createElement('div');
        metaDiv.className = 'reading-list-item-meta';
        var yearSpan = document.createElement('span');
        yearSpan.className = 'item-meta-year';
        if (typeof pub.year === 'number') {
            yearSpan.textContent = String(pub.year);
        }
        var typeSpan = document.createElement('span');
        typeSpan.className = 'item-meta-type';
        if (pub.publication_type) {
            typeSpan.textContent = pub.publication_type.replace(/_/g, ' ');
        }
        var venueSpan = document.createElement('span');
        venueSpan.className = 'item-meta-venue';
        if (pub.journal_or_venue) {
            venueSpan.textContent = pub.journal_or_venue;
        }
        if (yearSpan.textContent) metaDiv.appendChild(yearSpan);
        if (typeSpan.textContent) metaDiv.appendChild(typeSpan);
        if (venueSpan.textContent) metaDiv.appendChild(venueSpan);

        var facultyDiv = document.createElement('div');
        facultyDiv.className = 'reading-list-item-faculty';
        if (pub.faculty_name) {
            var facultyLink = document.createElement('a');
            facultyLink.href = 'javascript:void(0)';
            facultyLink.dataset.action = 'viewFacultyProfile';
            facultyLink.dataset.facultyId = pub.faculty_id || '';
            facultyLink.textContent = pub.faculty_name;
            facultyDiv.appendChild(facultyLink);

            var sepSpan = document.createElement('span');
            sepSpan.textContent = ' b7 ';
            facultyDiv.appendChild(sepSpan);

            var viewProfileLink = document.createElement('a');
            viewProfileLink.href = 'javascript:void(0)';
            viewProfileLink.dataset.action = 'viewFacultyProfile';
            viewProfileLink.dataset.facultyId = pub.faculty_id || '';
            viewProfileLink.textContent = 'View on profile';
            facultyDiv.appendChild(viewProfileLink);
        }

        mainDiv.appendChild(titleHeading);
        if (metaDiv.childNodes.length > 0) {
            mainDiv.appendChild(metaDiv);
        }
        if (facultyDiv.childNodes.length > 0) {
            mainDiv.appendChild(facultyDiv);
        }

        var actionsDiv = document.createElement('div');
        actionsDiv.className = 'reading-list-item-actions';

        var statusLabel = document.createElement('label');
        statusLabel.className = 'read-status-toggle';
        var statusCheckbox = document.createElement('input');
        statusCheckbox.type = 'checkbox';
        statusCheckbox.dataset.action = 'toggleReadStatus';
        statusCheckbox.dataset.publicationId = pub.publication_id || '';
        statusCheckbox.checked = !!pub.is_marked_read;
        statusLabel.appendChild(statusCheckbox);
        var statusText = document.createElement('span');
        statusText.textContent = 'Mark as read';
        statusLabel.appendChild(statusText);

        var removeButton = document.createElement('button');
        removeButton.type = 'button';
        removeButton.className = 'btn-link-danger';
        removeButton.dataset.action = 'removeFromReadingList';
        removeButton.dataset.publicationId = pub.publication_id || '';
        removeButton.textContent = 'Remove';

        actionsDiv.appendChild(statusLabel);
        actionsDiv.appendChild(removeButton);

        article.appendChild(mainDiv);
        article.appendChild(actionsDiv);

        return article;
    }

    function renderList(container, items) {
        if (!container) return;
        container.innerHTML = '';
        items.forEach(function(pub) {
            var row = createItemRow(pub);
            container.appendChild(row);
        });
    }

    function renderEmptyState(container, hasItems) {
        if (!container) return;
        if (hasItems) {
            container.hidden = true;
            container.innerHTML = '';
            return;
        }
        container.hidden = false;
        container.innerHTML = '' +
            '<div class="empty-state-body">' +
                '<h2 class="empty-state-title">No publications match your current filters.</h2>' +
                '<p class="empty-state-text">Try adjusting the filters above, clearing the search box, or return to a faculty profile to save publications to your Reading List.</p>' +
            '</div>';
    }

    function renderPagination(container, state) {
        if (!container) return;
        var total = state.totalCount;
        var pageSize = state.pageSize;
        var page = state.page;
        var totalPages = total > 0 ? Math.ceil(total / pageSize) : 0;

        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }

        var html = '';
        html += '<div class="pagination-inner">';
        html += '<div class="pagination-info">Page ' + page + ' of ' + totalPages + '</div>';
        html += '<div class="pagination-controls">';
        html += '<button type="button" class="btn-secondary" data-action="goToPage" data-page="' + (page - 1) + '"' + (page <= 1 ? ' disabled' : '') + '>Previous</button>';
        html += '<button type="button" class="btn-secondary" data-action="goToPage" data-page="' + (page + 1) + '"' + (page >= totalPages ? ' disabled' : '') + '>Next</button>';
        html += '</div>';
        html += '</div>';

        container.innerHTML = html;
    }

    function updateView(dom) {
        var items = readingListState.items;
        var page = readingListState.page;
        var pageSize = readingListState.pageSize;

        var total = items.length;
        readingListState.totalCount = total;
        var counts = computeCounts(items);
        readingListState.readCount = counts.read;
        readingListState.unreadCount = counts.unread;

        var startIndex = (page - 1) * pageSize;
        if (startIndex < 0) startIndex = 0;
        if (startIndex >= total && total > 0) {
            var lastPage = Math.ceil(total / pageSize);
            readingListState.page = lastPage;
            page = lastPage;
            startIndex = (page - 1) * pageSize;
        }
        var endIndex = startIndex + pageSize;
        var pageItems = items.slice(startIndex, endIndex);

        renderSummary(dom.summaryContainer, readingListState);
        renderList(dom.listContainer, pageItems);
        renderEmptyState(dom.emptyContainer, total > 0);
        renderPagination(dom.paginationContainer, readingListState);
    }

    function loadReadingList(dom) {
        if (typeof WebsiteSDK === 'undefined' || !WebsiteSDK.getReadingListContents) {
            // Cannot load data without SDK
            renderEmptyState(dom.emptyContainer, false);
            return;
        }

        var params = getUrlParams();
        var filters = buildApiFiltersFromUrl(params);
        var sortBy = params.get('sort') || undefined;

        var apiResult;
        try {
            apiResult = WebsiteSDK.getReadingListContents(filters, sortBy);
        } catch (e) {
            console.error('Error calling getReadingListContents', e);
            renderEmptyState(dom.emptyContainer, false);
            return;
        }

        if (!Array.isArray(apiResult)) {
            apiResult = [];
        }

        readingListState.rawItems = apiResult;
        readingListState.items = applyClientSideFilters(apiResult, params);

        updateView(dom);
    }

    function handleFilterSubmit(event, dom) {
        event.preventDefault();
        var form = event.target;
        var search = (form.search && form.search.value) ? form.search.value.trim() : '';
        var type = form.filter_type ? form.filter_type.value : '';
        var yearFrom = form.filter_year_from ? form.filter_year_from.value.trim() : '';
        var yearTo = form.filter_year_to ? form.filter_year_to.value.trim() : '';
        var status = form.filter_status ? form.filter_status.value : '';

        setUrlParams({
            search: search || null,
            filter_type: type || null,
            filter_year_from: yearFrom || null,
            filter_year_to: yearTo || null,
            filter_status: status || null,
            page: 1
        });

        syncControlsWithUrl(dom);
        loadReadingList(dom);
    }

    function handleResetFilters(dom) {
        setUrlParams({
            search: null,
            filter_type: null,
            filter_year_from: null,
            filter_year_to: null,
            filter_status: null,
            page: 1
        });
        syncControlsWithUrl(dom);
        loadReadingList(dom);
    }

    function handleSortChange(event, dom) {
        var value = event.target.value || '';
        setUrlParams({ sort: value || null, page: 1 });
        syncControlsWithUrl(dom);
        loadReadingList(dom);
    }

    function handleToggleReadStatus(target, dom) {
        var publicationId = target.dataset.publicationId || '';
        if (!publicationId) return;
        var newValue = !!target.checked;

        if (typeof WebsiteSDK === 'undefined' || !WebsiteSDK.markReadingListPublicationStatus) {
            target.checked = !newValue;
            alert('Unable to update read status at this time.');
            return;
        }

        var response;
        try {
            response = WebsiteSDK.markReadingListPublicationStatus(publicationId, newValue);
        } catch (e) {
            console.error('Error calling markReadingListPublicationStatus', e);
            target.checked = !newValue;
            alert('An error occurred while updating read status.');
            return;
        }

        if (!response || response.success === false) {
            target.checked = !newValue;
            var msg = (response && response.message) ? response.message : 'Unable to update read status.';
            alert(msg);
            return;
        }

        var params = getUrlParams();
        var statusFilter = params.get('filter_status');
        if ((statusFilter === 'read' && !newValue) || (statusFilter === 'unread' && newValue)) {
            loadReadingList(dom);
            return;
        }

        readingListState.items.forEach(function(item) {
            if (item.publication_id === publicationId) {
                item.is_marked_read = newValue;
            }
        });
        readingListState.rawItems.forEach(function(item) {
            if (item.publication_id === publicationId) {
                item.is_marked_read = newValue;
            }
        });
        updateView(dom);
    }

    function handleRemoveFromReadingList(target, dom) {
        var publicationId = target.dataset.publicationId || '';
        if (!publicationId) return;

        var confirmed = window.confirm('Remove this publication from your Reading List?');
        if (!confirmed) return;

        if (typeof WebsiteSDK === 'undefined' || !WebsiteSDK.removePublicationFromReadingList) {
            alert('Unable to remove this publication at this time.');
            return;
        }

        var response;
        try {
            response = WebsiteSDK.removePublicationFromReadingList(publicationId);
        } catch (e) {
            console.error('Error calling removePublicationFromReadingList', e);
            alert('An error occurred while removing the publication.');
            return;
        }

        if (!response || response.success === false) {
            var msg = (response && response.message) ? response.message : 'Unable to remove this publication.';
            alert(msg);
            return;
        }

        if (typeof response.reading_list_count === 'number') {
            readingListState.totalSavedCount = response.reading_list_count;
        }

        readingListState.items = readingListState.items.filter(function(item) {
            return item.publication_id !== publicationId;
        });
        readingListState.rawItems = readingListState.rawItems.filter(function(item) {
            return item.publication_id !== publicationId;
        });

        updateView(dom);
    }

    function handleViewFacultyProfile(target) {
        var facultyId = target.dataset.facultyId || '';
        if (!facultyId) return;
        var url = 'faculty_profile.html?facultyId=' + encodeURIComponent(facultyId) + '&tab=publications';
        window.location.href = url;
    }

    function handleOpenPublication(target) {
        var publicationId = target.dataset.publicationId || '';
        if (!publicationId) return;

        var item = null;
        readingListState.rawItems.some(function(pub) {
            if (pub.publication_id === publicationId) {
                item = pub;
                return true;
            }
            return false;
        });

        if (!item) return;

        var url = item.url || '';
        if (!url && item.doi) {
            url = 'https://doi.org/' + encodeURIComponent(item.doi);
        }
        if (url) {
            window.open(url, '_blank', 'noopener');
        } else {
            alert('No direct external link is available for this publication.');
        }
    }

    function handleGoToPage(target, dom) {
        var pageStr = target.dataset.page;
        var page = parseInt(pageStr, 10);
        if (isNaN(page) || page < 1) return;

        var total = readingListState.totalCount;
        var totalPages = total > 0 ? Math.ceil(total / readingListState.pageSize) : 0;
        if (totalPages && page > totalPages) return;

        setUrlParams({ page: page });
        readingListState.page = page;
        updateView(dom);
    }

    function handleGoBack() {
        if (window.history.length > 1) {
            window.history.back();
        } else {
            window.location.href = 'index.html';
        }
    }

    function init() {
        var pageRoot = document.querySelector('[data-component="reading-list-page-controller"]');
        if (!pageRoot) return;

        var dom = {
            filtersForm: document.getElementById('readingListFiltersForm'),
            searchInput: document.getElementById('readingListSearch'),
            typeSelect: document.getElementById('filterPublicationType'),
            yearFromInput: document.getElementById('filterYearFrom'),
            yearToInput: document.getElementById('filterYearTo'),
            statusSelect: document.getElementById('filterStatus'),
            sortSelect: document.getElementById('sortSelect'),
            summaryContainer: document.querySelector('[data-populate="reading-list-summary"]'),
            listContainer: document.querySelector('[data-populate="reading-list-items"]'),
            emptyContainer: document.querySelector('[data-component="reading-list-empty-state"]'),
            paginationContainer: document.querySelector('[data-component="reading-list-pagination-controls"]')
        };

        syncControlsWithUrl(dom);
        loadReadingList(dom);

        if (dom.filtersForm) {
            dom.filtersForm.addEventListener('submit', function(e) {
                handleFilterSubmit(e, dom);
            });
        }

        if (dom.sortSelect) {
            dom.sortSelect.addEventListener('change', function(e) {
                handleSortChange(e, dom);
            });
        }

        document.addEventListener('click', function(e) {
            var target = e.target;
            if (!target) return;

            var actionEl = target.closest('[data-action]');
            if (!actionEl) return;

            var action = actionEl.dataset.action;
            if (!action) return;

            if (action === 'resetFilters') {
                handleResetFilters(dom);
            } else if (action === 'removeFromReadingList') {
                handleRemoveFromReadingList(actionEl, dom);
            } else if (action === 'viewFacultyProfile') {
                handleViewFacultyProfile(actionEl);
            } else if (action === 'openPublication') {
                handleOpenPublication(actionEl);
            } else if (action === 'goToPage') {
                if (!actionEl.disabled) {
                    handleGoToPage(actionEl, dom);
                }
            } else if (action === 'goBack') {
                handleGoBack();
            }
        });

        document.addEventListener('change', function(e) {
            var target = e.target;
            if (!target) return;
            var action = target.dataset.action;
            if (action === 'toggleReadStatus') {
                handleToggleReadStatus(target, dom);
            }
        });

        window.addEventListener('popstate', function() {
            syncControlsWithUrl(dom);
            loadReadingList(dom);
        });
    }

    document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
