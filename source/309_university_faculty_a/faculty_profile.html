<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Faculty Profile</title>
    <meta name="description" content="Displays a comprehensive academic profile for a faculty member, including overview, courses, publications, office hours, and talks &amp; events.">

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&amp;family=Source+Serif+4:wght@400;500;600&amp;display=swap" rel="stylesheet">

    <!-- Framework Styles -->
    
    <!-- Page-specific Styles -->
    <link rel="stylesheet" href="faculty_profile.css">
</head>
<body>
<div class="site">
    <header class="site-header">
        <!-- Navigation toggle (hamburger) -->
        <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle primary navigation">

        <div class="page-shell header-inner">
            <label for="nav-toggle" class="hamburger" aria-label="Toggle primary navigation">
                <span></span>
                <span></span>
                <span></span>
            </label>
        </div>

        <!-- Primary navigation drawer -->
        <nav class="site-nav" aria-label="Primary navigation">
            <div class="site-nav-inner">
                <div class="site-nav-title">Navigation</div>
                <ul class="site-nav-list">
                    <li><a href="index.html" title="Homepage with global search and quick links">Home</a></li>
                    <li><a href="faculty_directory.html" title="Browse and search all faculty">Faculty Directory</a></li>
                    <li><a href="reading_list.html" title="View and manage saved publications">Reading List</a></li>
                    <li><a href="planned_courses.html" title="View and manage your planned courses">Planned Courses</a></li>
                    <li><a href="thesis_advisor_shortlist.html" title="View shortlisted thesis advisors">Thesis Advisor Shortlist</a></li>
                    <li><a href="bookmarked_events.html" title="View bookmarked talks and events">Bookmarked Events</a></li>
                    <li><a href="my_notes.html" title="Open personal notes workspace">My Notes</a></li>
                    <li><a href="contacts.html" title="View and edit saved faculty contacts">Contacts</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="content" class="site-main" role="main">
        <div class="page-shell">
            <!-- Breadcrumb navigation -->
            <nav class="breadcrumb-nav" data-component="breadcrumb-nav" aria-label="Breadcrumb">
                <a href="javascript:void(0)" class="breadcrumb-link" data-action="breadcrumb-back">Back</a>
            </nav>

            <!-- Hero / overview layout -->
            <section class="profile-layout profile-hero" data-component="faculty-overview" aria-labelledby="faculty-name-heading">
                <div class="profile-main" data-populate="faculty-overview">
                    <!-- Populated via JS: name, title, departments, contact summary, rank, advisor eligibility, contact button -->
                </div>
                <aside class="profile-aside">
                    <div class="profile-photo" aria-hidden="true">
                        <div class="profile-photo-placeholder">Portrait</div>
                    </div>
                </aside>
            </section>

            <!-- Tab switcher -->
            <nav class="tab-switcher" data-component="tab-switcher" aria-label="Faculty profile sections" role="tablist">
                <button type="button" class="tab-switcher-tab is-active" role="tab" aria-selected="true" aria-controls="tab-overview" data-action="switch-tab" data-tab="overview">Overview</button>
                <button type="button" class="tab-switcher-tab" role="tab" aria-selected="false" aria-controls="tab-courses" data-action="switch-tab" data-tab="courses">Courses</button>
                <button type="button" class="tab-switcher-tab" role="tab" aria-selected="false" aria-controls="tab-publications" data-action="switch-tab" data-tab="publications">Publications</button>
                <button type="button" class="tab-switcher-tab" role="tab" aria-selected="false" aria-controls="tab-office-hours" data-action="switch-tab" data-tab="office_hours">Office Hours &amp; Appointments</button>
                <button type="button" class="tab-switcher-tab" role="tab" aria-selected="false" aria-controls="tab-events" data-action="switch-tab" data-tab="events">Talks &amp; Events</button>
            </nav>

            <!-- Overview Tab Content -->
            <section id="tab-overview" class="tab-panel" data-component="overview-tab-content" data-tab-panel="overview" role="tabpanel" aria-labelledby="" aria-live="polite">
                <div class="tab-panel-inner" data-populate="overview-tab-summary">
                    <!-- Populated via JS with teaching status, graduate faculty status, PhD advising status, research keywords -->
                </div>
            </section>

            <!-- Courses Tab Content -->
            <section id="tab-courses" class="tab-panel" data-component="courses-tab-content" data-tab-panel="courses" role="tabpanel" aria-live="polite" hidden>
                <div class="tab-panel-inner">
                    <form class="filter-form" data-component="courses-filter-form">
                        <div class="filter-row">
                            <div class="filter-group">
                                <label for="courses-term">Term</label>
                                <select id="courses-term" name="term">
                                    <option value="">All terms</option>
                                    <option value="fall_2025">Fall 2025</option>
                                    <option value="spring_2026">Spring 2026</option>
                                    <option value="summer_2026">Summer 2026</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label for="courses-level">Level</label>
                                <select id="courses-level" name="level">
                                    <option value="">All levels</option>
                                    <option value="undergraduate">Undergraduate</option>
                                    <option value="graduate">Graduate</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <span class="filter-label">Meeting days</span>
                                <div class="filter-checkbox-group">
                                    <label><input type="checkbox" name="meeting_days" value="monday"> Mon</label>
                                    <label><input type="checkbox" name="meeting_days" value="tuesday"> Tue</label>
                                    <label><input type="checkbox" name="meeting_days" value="wednesday"> Wed</label>
                                    <label><input type="checkbox" name="meeting_days" value="thursday"> Thu</label>
                                    <label><input type="checkbox" name="meeting_days" value="friday"> Fri</label>
                                </div>
                            </div>
                            <div class="filter-group filter-group-time">
                                <label for="courses-start-time-from">Start time from</label>
                                <input type="time" id="courses-start-time-from" name="start_time_from">
                                <label for="courses-end-time-to">End time to</label>
                                <input type="time" id="courses-end-time-to" name="end_time_to">
                            </div>
                        </div>
                        <div class="filter-actions">
                            <button type="submit" class="btn-primary">Apply filters</button>
                            <button type="button" class="btn-secondary" data-action="reset-courses-filters">Reset</button>
                        </div>
                    </form>

                    <div class="results" data-component="courses-list" data-populate="courses-list">
                        <!-- Populated via JS with courses list -->
                    </div>
                </div>
            </section>

            <!-- Publications Tab Content -->
            <section id="tab-publications" class="tab-panel" data-component="publications-tab-content" data-tab-panel="publications" role="tabpanel" aria-live="polite" hidden>
                <div class="tab-panel-inner">
                    <form class="filter-form" data-component="publications-filter-sort-bar">
                        <div class="filter-row">
                            <div class="filter-group">
                                <label for="pub-type">Type</label>
                                <select id="pub-type" name="publication_type">
                                    <option value="">All types</option>
                                    <option value="journal_article">Journal article</option>
                                    <option value="conference_paper">Conference paper</option>
                                    <option value="book_chapter">Book chapter</option>
                                    <option value="book">Book</option>
                                    <option value="preprint">Preprint</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="filter-group filter-group-year-range">
                                <label for="pub-year-from">Year from</label>
                                <input type="number" id="pub-year-from" name="year_from" min="1900" max="2100" step="1">
                                <label for="pub-year-to">to</label>
                                <input type="number" id="pub-year-to" name="year_to" min="1900" max="2100" step="1">
                            </div>
                            <div class="filter-group">
                                <label for="pub-title-keyword">Title keyword</label>
                                <input type="search" id="pub-title-keyword" name="title_keyword" placeholder="Search titles">
                            </div>
                            <div class="filter-group filter-group-sort">
                                <label for="pub-sort-by">Sort by</label>
                                <select id="pub-sort-by" name="sort_by">
                                    <option value="">Default</option>
                                    <option value="year_newest_first">Year: newest first</option>
                                    <option value="year_oldest_first">Year: oldest first</option>
                                    <option value="title_a_to_z">Title: A to Z</option>
                                </select>
                            </div>
                        </div>
                        <div class="filter-actions">
                            <button type="submit" class="btn-primary">Apply filters</button>
                            <button type="button" class="btn-secondary" data-action="reset-publications-filters">Reset</button>
                        </div>
                    </form>

                    <div class="toolbar" data-component="publications-toolbar">
                        <button type="button" class="toolbar-link" data-action="view-export-list">View Export List</button>
                    </div>

                    <div class="results" data-component="publications-list" data-populate="publications-list">
                        <!-- Populated via JS with publications list -->
                    </div>
                </div>
            </section>

            <!-- Office Hours Tab Content -->
            <section id="tab-office-hours" class="tab-panel" data-component="office-hours-tab-content" data-tab-panel="office_hours" role="tabpanel" aria-live="polite" hidden>
                <div class="tab-panel-inner">
                    <form class="filter-form" data-component="office-hours-filter-form">
                        <div class="filter-row">
                            <div class="filter-group">
                                <label for="oh-day-of-week">Day of week</label>
                                <select id="oh-day-of-week" name="day_of_week">
                                    <option value="">All days</option>
                                    <option value="monday">Monday</option>
                                    <option value="tuesday">Tuesday</option>
                                    <option value="wednesday">Wednesday</option>
                                    <option value="thursday">Thursday</option>
                                    <option value="friday">Friday</option>
                                    <option value="saturday">Saturday</option>
                                    <option value="sunday">Sunday</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label for="oh-min-start-time">Earliest start time</label>
                                <input type="time" id="oh-min-start-time" name="min_start_time">
                            </div>
                            <div class="filter-group filter-group-inline">
                                <label class="checkbox-inline">
                                    <input type="checkbox" id="oh-only-available" name="only_available" checked>
                                    <span>Show only available slots</span>
                                </label>
                            </div>
                        </div>
                        <div class="filter-actions">
                            <button type="submit" class="btn-primary">Apply filters</button>
                            <button type="button" class="btn-secondary" data-action="reset-office-hours-filters">Reset</button>
                        </div>
                    </form>

                    <div class="results" data-component="office-hours-list" data-populate="office-hours-list">
                        <!-- Populated via JS with office-hour slots -->
                    </div>
                </div>
            </section>

            <!-- Events Tab Content -->
            <section id="tab-events" class="tab-panel" data-component="events-tab-content" data-tab-panel="events" role="tabpanel" aria-live="polite" hidden>
                <div class="tab-panel-inner">
                    <form class="filter-form" data-component="events-filter-form">
                        <div class="filter-row">
                            <div class="filter-group">
                                <label for="events-audience">Audience</label>
                                <select id="events-audience" name="audience">
                                    <option value="">All audiences</option>
                                    <option value="public">Public</option>
                                    <option value="students_only">Students only</option>
                                    <option value="faculty_only">Faculty only</option>
                                    <option value="campus_only">Campus only</option>
                                    <option value="invite_only">Invite only</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="filter-group filter-group-date-range">
                                <label for="events-date-from">Date from</label>
                                <input type="date" id="events-date-from" name="date_from">
                                <label for="events-date-to">to</label>
                                <input type="date" id="events-date-to" name="date_to">
                            </div>
                        </div>
                        <div class="filter-actions">
                            <button type="submit" class="btn-primary">Apply filters</button>
                            <button type="button" class="btn-secondary" data-action="reset-events-filters">Reset</button>
                        </div>
                    </form>

                    <div class="toolbar" data-component="events-toolbar">
                        <button type="button" class="toolbar-link" data-action="view-bookmarked-events">Bookmarked Events</button>
                    </div>

                    <div class="results" data-component="events-list" data-populate="events-list">
                        <!-- Populated via JS with events list -->
                    </div>
                </div>
            </section>

            <!-- Contact Form Modal -->
            <div class="modal-backdrop" data-component="contact-form-modal" hidden>
                <div class="modal" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title">
                    <div class="modal-header">
                        <h2 id="contact-modal-title">Contact faculty member</h2>
                        <button type="button" class="modal-close" data-action="close-contact-modal" aria-label="Close contact form">&times;</button>
                    </div>
                    <div class="modal-body">
                        <form data-action="submit-contact-form" class="contact-form" novalidate>
                            <div class="form-group">
                                <label for="contact-subject">Subject</label>
                                <input type="text" id="contact-subject" name="subject" required>
                                <div class="form-error" data-role="contact-subject-error"></div>
                            </div>
                            <div class="form-group">
                                <label for="contact-body">Message</label>
                                <textarea id="contact-body" name="body" rows="6" required></textarea>
                                <div class="form-error" data-role="contact-body-error"></div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn-secondary" data-action="close-contact-modal">Cancel</button>
                                <button type="submit" class="btn-primary">Send message</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Notification Toast -->
            <div class="notification-toast" data-component="notification-toast" aria-live="polite" aria-atomic="true" hidden></div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="page-shell footer-inner">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul>
                    <li><a href="about.html" title="About this faculty profiles site">About</a></li>
                    <li><a href="help.html" title="Help and FAQs for using the site">Help</a></li>
                    <li><a href="policies.html" title="Privacy, terms of use, and accessibility policies">Policies</a></li>
                    <li><a href="faculty_directory.html" title="Browse the full faculty directory">Faculty Directory</a></li>
                </ul>
            </nav>
            <div class="footer-meta">
                &copy; 2024 Faculty Profiles
            </div>
        </div>
    </footer>
</div>

<!-- SDK / business logic -->
<script src="business_logic.js"></script>

<!-- Page UI logic -->
<script>
(function() {
    'use strict';

    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var state = {
            facultyId: null,
            activeTab: 'overview',
            overview: null
        };
        var toastTimeoutId = null;

        function renderMissingFacultyError() {
            var shell = document.querySelector('.site-main .page-shell');
            if (!shell) {
                return;
            }
            shell.innerHTML = '' +
                '<div class="page-error">' +
                '  <h1 class="page-error-title">Faculty profile unavailable</h1>' +
                '  <p class="page-error-body">A valid <code>facultyId</code> must be provided in the URL to view a faculty profile.</p>' +
                '  <p><a href="faculty_directory.html">Return to Faculty Directory</a></p>' +
                '</div>';
        }

        function formatTeachingStatus(value) {
            if (value === 'currently_teaching_this_semester') {
                return 'Currently teaching this semester';
            }
            if (value === 'not_currently_teaching') {
                return 'Not currently teaching';
            }
            if (value === 'on_leave') {
                return 'On leave';
            }
            return '';
        }

        function formatRank(value) {
            if (value === 'assistant_professor') {
                return 'Assistant Professor';
            }
            if (value === 'associate_professor') {
                return 'Associate Professor';
            }
            if (value === 'professor') {
                return 'Professor';
            }
            if (value === 'lecturer') {
                return 'Lecturer';
            }
            if (value === 'adjunct') {
                return 'Adjunct';
            }
            if (value === 'emeritus') {
                return 'Emeritus';
            }
            return '';
        }

        function formatDayOfWeek(value) {
            if (!value) {
                return '';
            }
            var lower = String(value).toLowerCase();
            if (lower === 'monday') return 'Monday';
            if (lower === 'tuesday') return 'Tuesday';
            if (lower === 'wednesday') return 'Wednesday';
            if (lower === 'thursday') return 'Thursday';
            if (lower === 'friday') return 'Friday';
            if (lower === 'saturday') return 'Saturday';
            if (lower === 'sunday') return 'Sunday';
            return value;
        }

        function formatAudience(value) {
            if (value === 'public') return 'Public';
            if (value === 'students_only') return 'Students only';
            if (value === 'faculty_only') return 'Faculty only';
            if (value === 'campus_only') return 'Campus only';
            if (value === 'invite_only') return 'Invite only';
            if (value === 'other') return 'Other';
            return '';
        }

        function formatPublicationType(value) {
            if (value === 'journal_article') return 'Journal article';
            if (value === 'conference_paper') return 'Conference paper';
            if (value === 'book_chapter') return 'Book chapter';
            if (value === 'book') return 'Book';
            if (value === 'preprint') return 'Preprint';
            if (value === 'other') return 'Other';
            return '';
        }

        function formatDateTime(dateTimeStr) {
            if (!dateTimeStr) {
                return '';
            }
            var date = new Date(dateTimeStr);
            if (isNaN(date.getTime())) {
                return dateTimeStr;
            }
            return date.toLocaleString();
        }

        function showToast(message, type) {
            var toast = document.querySelector('[data-component="notification-toast"]');
            if (!toast) {
                return;
            }
            toast.textContent = message;
            toast.setAttribute('data-type', type || 'info');
            toast.hidden = false;
            toast.classList.add('is-visible');
            if (toastTimeoutId) {
                window.clearTimeout(toastTimeoutId);
            }
            toastTimeoutId = window.setTimeout(function() {
                hideToast();
            }, 4000);
        }

        function hideToast() {
            var toast = document.querySelector('[data-component="notification-toast"]');
            if (!toast) {
                return;
            }
            toast.classList.remove('is-visible');
            toast.hidden = true;
        }

        function updateUrlParams(partial, options) {
            var params = new URLSearchParams(window.location.search);
            for (var key in partial) {
                if (!Object.prototype.hasOwnProperty.call(partial, key)) continue;
                var value = partial[key];
                if (value === null || value === undefined || value === '') {
                    params.delete(key);
                } else {
                    params.set(key, value);
                }
            }
            var newUrl = window.location.pathname;
            var queryString = params.toString();
            if (queryString) {
                newUrl += '?' + queryString;
            }
            if (options && options.replace) {
                window.history.replaceState({}, '', newUrl);
            } else {
                window.history.pushState({}, '', newUrl);
            }
            urlParams = new URLSearchParams(window.location.search);
            handleUrlChange();
        }

        function getActiveTabFromParams(params) {
            var tabParam = params.get('tab');
            var allowed = ['overview', 'courses', 'publications', 'office_hours', 'events'];
            if (tabParam && allowed.indexOf(tabParam) !== -1) {
                return tabParam;
            }
            return 'overview';
        }

        function syncTabUI() {
            var activeTab = state.activeTab;
            var tabButtons = document.querySelectorAll('.tab-switcher-tab');
            for (var i = 0; i < tabButtons.length; i += 1) {
                var btn = tabButtons[i];
                var tabName = btn.getAttribute('data-tab');
                var isActive = tabName === activeTab;
                if (isActive) {
                    btn.classList.add('is-active');
                    btn.setAttribute('aria-selected', 'true');
                    btn.setAttribute('tabindex', '0');
                } else {
                    btn.classList.remove('is-active');
                    btn.setAttribute('aria-selected', 'false');
                    btn.setAttribute('tabindex', '-1');
                }
            }

            var panels = document.querySelectorAll('.tab-panel');
            for (var j = 0; j < panels.length; j += 1) {
                var panel = panels[j];
                var panelTab = panel.getAttribute('data-tab-panel');
                if (panelTab === activeTab) {
                    panel.hidden = false;
                } else {
                    panel.hidden = true;
                }
            }
        }

        function renderFacultyOverview(container, data) {
            if (!container) {
                return;
            }
            var primaryDept = data.primary_department && data.primary_department.name ? data.primary_department.name : '';
            var secondaryDept = data.secondary_department && data.secondary_department.name ? data.secondary_department.name : '';
            var deptLine = '';
            if (primaryDept && secondaryDept) {
                deptLine = primaryDept + ' / ' + secondaryDept;
            } else if (primaryDept) {
                deptLine = primaryDept;
            } else if (secondaryDept) {
                deptLine = secondaryDept;
            }

            var teachingStatusLabel = formatTeachingStatus(data.teaching_status);
            var rankLabel = formatRank(data.rank);

            var isGraduate = !!data.is_graduate_faculty;
            var acceptingPhd = !!data.accepting_new_phd_students;
            var rankEligible = data.rank === 'assistant_professor' || data.rank === 'associate_professor' || data.rank === 'professor';
            var advisorEligible = isGraduate && acceptingPhd && rankEligible;

            var advisorStatusText = '';
            if (advisorEligible) {
                advisorStatusText = 'Eligible and currently accepting new PhD students.';
            } else if (!isGraduate) {
                advisorStatusText = 'Not listed as Graduate Faculty; not eligible to serve as primary PhD advisor.';
            } else if (!acceptingPhd) {
                advisorStatusText = 'Not currently accepting new PhD students.';
            } else {
                advisorStatusText = 'Advisor eligibility is limited based on current rank or status.';
            }

            var researchKeywords = Array.isArray(data.research_keywords) ? data.research_keywords : [];
            var keywordsHtml = '';
            if (researchKeywords.length > 0) {
                var items = '';
                for (var i = 0; i < researchKeywords.length; i += 1) {
                    var kw = researchKeywords[i];
                    items += '<li>' + kw + '</li>';
                }
                keywordsHtml = '' +
                    '<div class="overview-section">' +
                    '  <h2 class="section-heading">Research keywords</h2>' +
                    '  <ul class="keyword-list">' + items + '</ul>' +
                    '</div>';
            }

            var officeLine = data.office_location ? '<div class="contact-line"><span class="label">Office:</span> ' + data.office_location + '</div>' : '';
            var phoneLine = data.phone_extension ? '<div class="contact-line"><span class="label">Phone:</span> ' + data.phone_extension + '</div>' : '';
            var emailLine = data.email ? '<div class="contact-line"><span class="label">Email:</span> ' + data.email + '</div>' : '';

            container.innerHTML = '' +
                '<header class="faculty-header">' +
                '  <h1 id="faculty-name-heading" class="faculty-name">' + (data.full_name || '') + '</h1>' +
                (data.display_title ? '  <p class="faculty-title">' + data.display_title + (deptLine ? ' &middot; ' + deptLine : '') + '</p>' : (deptLine ? '  <p class="faculty-title">' + deptLine + '</p>' : '')) +
                (teachingStatusLabel ? '  <p class="faculty-teaching-status">' + teachingStatusLabel + '</p>' : '') +
                '</header>' +
                '<section class="faculty-panels">' +
                '  <div class="info-panel rank-promotion-panel">' +
                '    <h2 class="panel-heading">Rank &amp; promotion</h2>' +
                '    <div class="panel-body">' +
                (rankLabel ? '      <div><span class="label">Rank:</span> ' + rankLabel + '</div>' : '') +
                (data.last_promotion_year ? '      <div><span class="label">Last promotion year:</span> ' + data.last_promotion_year + '</div>' : '') +
                '    </div>' +
                '  </div>' +

        function renderCoursesList(container, courses) {
            if (!container) {
                return;
            }
            if (!courses || courses.length === 0) {
                container.innerHTML = '<p class="empty-state">No courses found for the selected filters.</p>';
                return;
            }
            var html = '<div class="result-list">';
            for (var i = 0; i < courses.length; i += 1) {
                var c = courses[i];
                var meetingDays = Array.isArray(c.meeting_days) ? c.meeting_days : [];
                var daysLabel = '';
                if (meetingDays.length > 0) {
                    var dayParts = [];
                    for (var j = 0; j < meetingDays.length; j += 1) {
                        dayParts.push(formatDayOfWeek(meetingDays[j]).substr(0, 3));
                    }
                    daysLabel = dayParts.join(', ');
                }
                var schedule = '';
                if (daysLabel || c.start_time || c.end_time) {
                    var timePart = '';
                    if (c.start_time && c.end_time) {
                        timePart = c.start_time + '–' + c.end_time;
                    } else if (c.start_time) {
                        timePart = c.start_time;
                    }
                    schedule = daysLabel + (daysLabel && timePart ? ' · ' : '') + timePart;
                }
                html += '' +
                    '<article class="result-item course-item">' +
                    '  <button type="button" class="result-item-main" data-action="open-course" data-course-id="' + encodeURIComponent(c.course_id) + '">' +
                    '    <div class="result-item-header">' +
                    '      <div class="course-code">' + (c.code ? c.code : '') + '</div>' +
                    '      <div class="course-title">' + (c.title || '') + '</div>' +
                    '    </div>' +
                    '    <div class="result-item-meta">' +
                    (c.term ? '      <span class="meta-item">' + c.term + '</span>' : '') +
                    (c.level ? '      <span class="meta-item">' + (c.level === 'graduate' ? 'Graduate' : 'Undergraduate') + '</span>' : '') +
                    (schedule ? '      <span class="meta-item">' + schedule + '</span>' : '') +
                    (c.location ? '      <span class="meta-item">' + c.location + '</span>' : '') +
                    (typeof c.credits === 'number' ? '      <span class="meta-item">' + c.credits + ' credits</span>' : '') +
                    '    </div>' +
                    '  </button>' +
                    (c.description ? '  <p class="result-item-description">' + c.description + '</p>' : '') +
                    '</article>';
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function renderPublicationsList(container, publications) {
            if (!container) {
                return;
            }
            if (!publications || publications.length === 0) {
                container.innerHTML = '<p class="empty-state">No publications found for the selected filters.</p>';
                return;
            }
            var html = '<div class="result-list">';
            for (var i = 0; i < publications.length; i += 1) {
                var p = publications[i];
                var metaParts = [];
                if (p.journal_or_venue) {
                    metaParts.push(p.journal_or_venue);
                }
                if (p.year) {
                    metaParts.push(String(p.year));
                }
                if (p.volume) {
                    metaParts.push('Vol. ' + p.volume);
                }
                if (p.issue) {
                    metaParts.push('No. ' + p.issue);
                }
                if (p.pages) {
                    metaParts.push('pp. ' + p.pages);
                }
                var metaLine = metaParts.join(', ');
                var typeLabel = formatPublicationType(p.publication_type);
                html += '' +
                    '<article class="result-item publication-item" data-publication-id="' + encodeURIComponent(p.publication_id) + '">' +
                    '  <div class="result-item-header">' +
                    '    <h3 class="publication-title">' + (p.title || '') + '</h3>' +
                    (typeLabel ? '    <span class="badge publication-type">' + typeLabel + '</span>' : '') +
                    '  </div>' +
                    (metaLine ? '  <div class="result-item-meta">' + metaLine + '</div>' : '') +
                    (p.doi || p.url ? '  <div class="publication-links">' +
                    (p.doi ? '    <span class="meta-item">DOI: ' + p.doi + '</span>' : '') +
                    (p.url ? '    <a href="' + p.url + '" target="_blank" rel="noopener noreferrer" class="meta-link">View online</a>' : '') +
                    '  </div>' : '') +
                    (p.abstract ? '  <details class="publication-abstract"><summary>Abstract</summary><p>' + p.abstract + '</p></details>' : '') +
                    '  <div class="result-item-actions">' +
                    (p.is_in_reading_list ? '<button type="button" class="btn-secondary" disabled>In Reading List</button>' : '<button type="button" class="btn-secondary" data-action="save-to-reading-list" data-publication-id="' + encodeURIComponent(p.publication_id) + '">Save to Reading List</button>') +
                    (p.is_in_export_list ? '<button type="button" class="btn-secondary" disabled>In Export List</button>' : '<button type="button" class="btn-secondary" data-action="add-to-export-list" data-publication-id="' + encodeURIComponent(p.publication_id) + '">Add to Export List</button>') +
                    '  </div>' +
                    '</article>';
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function getCoursesFiltersFromParams(params) {
            var term = params.get('term') || '';
            var level = params.get('level') || '';
            var meetingDaysParam = params.get('meeting_days') || '';
            var meetingDays = [];
            if (meetingDaysParam) {
                var parts = meetingDaysParam.split(',');
                for (var i = 0; i < parts.length; i += 1) {
                    var d = parts[i].trim();
                    if (d) {
                        meetingDays.push(d);
                    }
                }
            }
            var startTimeFrom = params.get('start_time_from') || '';
            var endTimeTo = params.get('end_time_to') || '';
            return {
                term: term,
                level: level,
                meeting_days: meetingDays,
                start_time_from: startTimeFrom,
                end_time_to: endTimeTo
            };
        }

        function applyCoursesFiltersToForm(filters) {
            var form = document.querySelector('[data-component="courses-filter-form"]');
            if (!form) {
                return;
            }
            var termSelect = form.querySelector('#courses-term');
            var levelSelect = form.querySelector('#courses-level');
            var startInput = form.querySelector('#courses-start-time-from');
            var endInput = form.querySelector('#courses-end-time-to');
            if (termSelect) termSelect.value = filters.term || '';
            if (levelSelect) levelSelect.value = filters.level || '';
            if (startInput) startInput.value = filters.start_time_from || '';
            if (endInput) endInput.value = filters.end_time_to || '';

            var dayCheckboxes = form.querySelectorAll('input[name="meeting_days"]');
            for (var i = 0; i < dayCheckboxes.length; i += 1) {
                var cb = dayCheckboxes[i];
                cb.checked = filters.meeting_days.indexOf(cb.value) !== -1;
            }
        }

        function handleUrlChange() {
            var params = new URLSearchParams(window.location.search);
            var activeTab = getActiveTabFromParams(params);
            state.activeTab = activeTab;
            syncTabUI();
            if (!state.facultyId) {
                return;
            }
            if (activeTab === 'overview') {
                if (state.overview) {
                    var overviewTabContainer = document.querySelector('[data-populate="overview-tab-summary"]');
                    renderOverviewTabSummary(overviewTabContainer, state.overview);
                }
            } else if (activeTab === 'courses') {
                loadCoursesTab(params);
            } else if (activeTab === 'publications') {
                loadPublicationsTab(params);
            } else if (activeTab === 'office_hours') {
                loadOfficeHoursTab(params);
            } else if (activeTab === 'events') {
                loadEventsTab(params);
            }
        }

        function handleContactFormSubmit(form) {
            var subjectInput = form.querySelector('#contact-subject');
            var bodyInput = form.querySelector('#contact-body');
            var subjectError = form.querySelector('[data-role="contact-subject-error"]');
            var bodyError = form.querySelector('[data-role="contact-body-error"]');
            if (subjectError) subjectError.textContent = '';
            if (bodyError) bodyError.textContent = '';

            var subject = subjectInput ? subjectInput.value.trim() : '';
            var body = bodyInput ? bodyInput.value.trim() : '';
            var hasError = false;
            if (!subject) {
                hasError = true;
                if (subjectError) {
                    subjectError.textContent = 'Please enter a subject.';
                }
            }
            if (!body) {
                hasError = true;
                if (bodyError) {
                    bodyError.textContent = 'Please enter a message.';
                }
            }
            if (hasError) {
                return;
            }
            try {
                var result = WebsiteSDK.sendFacultyContactMessage(state.facultyId, subject, body);
                if (result && result.success && result.status === 'sent') {
                    showToast('Your message has been sent.', 'success');
                    form.reset();
                    closeContactModal();
                } else {
                    showToast('Message could not be sent. Please try again.', 'error');
                }
            } catch (e) {
                showToast('Message could not be sent. Please try again.', 'error');
            }
        }

        function initFilterFormHandlers() {
            var coursesForm = document.querySelector('[data-component="courses-filter-form"]');
            if (coursesForm) {
                coursesForm.addEventListener('submit', function(event) {
                    event.preventDefault();
                    var filters = {};
                    var term = coursesForm.querySelector('#courses-term');
                    var level = coursesForm.querySelector('#courses-level');
                    var startInput = coursesForm.querySelector('#courses-start-time-from');
                    var endInput = coursesForm.querySelector('#courses-end-time-to');
                    if (term && term.value) filters.term = term.value; else filters.term = null;
                    if (level && level.value) filters.level = level.value; else filters.level = null;
                    var dayCheckboxes = coursesForm.querySelectorAll('input[name="meeting_days"]');
                    var selectedDays = [];
                    for (var i = 0; i < dayCheckboxes.length; i += 1) {
                        var cb = dayCheckboxes[i];
                        if (cb.checked) {
                            selectedDays.push(cb.value);
                        }
                    }
                    if (selectedDays.length > 0) {
                        filters.meeting_days = selectedDays.join(',');
                    } else {
                        filters.meeting_days = null;
                    }
                    if (startInput && startInput.value) filters.start_time_from = startInput.value; else filters.start_time_from = null;
                    if (endInput && endInput.value) filters.end_time_to = endInput.value; else filters.end_time_to = null;
                    updateUrlParams({
                        term: filters.term,
                        level: filters.level,
                        meeting_days: filters.meeting_days,
                        start_time_from: filters.start_time_from,
                        end_time_to: filters.end_time_to
                    });
                });
            }

            var pubsForm = document.querySelector('[data-component="publications-filter-sort-bar"]');
            if (pubsForm) {
                pubsForm.addEventListener('submit', function(event) {
                    event.preventDefault();
                    var typeSelect = pubsForm.querySelector('#pub-type');
                    var yearFromInput = pubsForm.querySelector('#pub-year-from');
                    var yearToInput = pubsForm.querySelector('#pub-year-to');
                    var titleInput = pubsForm.querySelector('#pub-title-keyword');
                    var sortSelect = pubsForm.querySelector('#pub-sort-by');
                    updateUrlParams({
                        publication_type: typeSelect && typeSelect.value ? typeSelect.value : null,
                        year_from: yearFromInput && yearFromInput.value ? yearFromInput.value : null,
                        year_to: yearToInput && yearToInput.value ? yearToInput.value : null,
                        title_keyword: titleInput && titleInput.value ? titleInput.value : null,
                        sort_by: sortSelect && sortSelect.value ? sortSelect.value : null
                    });
                });
            }

            var ohForm = document.querySelector('[data-component="office-hours-filter-form"]');
            if (ohForm) {
                ohForm.addEventListener('submit', function(event) {
                    event.preventDefault();
                    var daySelect = ohForm.querySelector('#oh-day-of-week');
                    var minStartInput = ohForm.querySelector('#oh-min-start-time');
                    var onlyAvailableCheckbox = ohForm.querySelector('#oh-only-available');
                    updateUrlParams({
                        day_of_week: daySelect && daySelect.value ? daySelect.value : null,
                        min_start_time: minStartInput && minStartInput.value ? minStartInput.value : null,
                        only_available: onlyAvailableCheckbox && onlyAvailableCheckbox.checked ? 'true' : 'false'
                    });
                });
            }

            var eventsForm = document.querySelector('[data-component="events-filter-form"]');
            if (eventsForm) {
                eventsForm.addEventListener('submit', function(event) {
                    event.preventDefault();
                    var audienceSelect = eventsForm.querySelector('#events-audience');
                    var dateFromInput = eventsForm.querySelector('#events-date-from');
                    var dateToInput = eventsForm.querySelector('#events-date-to');
                    updateUrlParams({
                        audience: audienceSelect && audienceSelect.value ? audienceSelect.value : null,
                        date_from: dateFromInput && dateFromInput.value ? dateFromInput.value : null,
                        date_to: dateToInput && dateToInput.value ? dateToInput.value : null
                    });
                });
            }
        }

        function initGlobalClickHandlers() {
            document.body.addEventListener('click', function(event) {
                var target = event.target;
                var actionElement = target.closest('[data-action]');
                if (!actionElement) {
                    return;
                }
                var action = actionElement.getAttribute('data-action');
                if (!action) {
                    return;
                }
                if (action === 'breadcrumb-back') {
                    event.preventDefault();
                    var returnUrl = actionElement.getAttribute('data-return-url');
                    if (returnUrl) {
                        window.location.href = returnUrl;
                    }
                } else if (action === 'switch-tab') {
                    event.preventDefault();
                    var newTab = actionElement.getAttribute('data-tab');
                    if (newTab && newTab !== state.activeTab) {
                        updateUrlParams({ tab: newTab });
                    }
                } else if (action === 'open-contact-modal') {
                    event.preventDefault();
                    openContactModal();
                } else if (action === 'close-contact-modal') {
                    event.preventDefault();
                    closeContactModal();
                } else if (action === 'add-to-shortlist') {
                    event.preventDefault();
                    if (!state.facultyId) {
                        return;
                    }
                    try {
                        var result = WebsiteSDK.addFacultyToThesisAdvisorShortlist(state.facultyId);
                        var feedback = document.querySelector('[data-role="shortlist-feedback"]');
                        if (result && result.success) {
                            if (feedback) {
                                feedback.textContent = result.message || 'Added to your thesis advisor shortlist.';
                            }
                            actionElement.disabled = true;
                            showToast(result.message || 'Added to thesis advisor shortlist.', 'success');
                        } else {
                            if (feedback) {
                                feedback.textContent = result && result.message ? result.message : 'Could not update shortlist.';
                            }
                            showToast('Could not update shortlist.', 'error');
                        }
                    } catch (e) {
                        showToast('Could not update shortlist.', 'error');
                    }
                } else if (action === 'retry-load-overview') {
                    event.preventDefault();
                    loadOverview();
                } else if (action === 'reset-courses-filters') {
                    event.preventDefault();
                    updateUrlParams({
                        term: null,
                        level: null,
                        meeting_days: null,
                        start_time_from: null,
                        end_time_to: null
                    });
                } else if (action === 'retry-load-courses') {
                    event.preventDefault();
                    loadCoursesTab(new URLSearchParams(window.location.search));
                } else if (action === 'reset-publications-filters') {
                    event.preventDefault();
                    updateUrlParams({
                        publication_type: null,
                        year_from: null,
                        year_to: null,
                        title_keyword: null,
                        sort_by: null
                    });
                } else if (action === 'retry-load-publications') {
                    event.preventDefault();
                    loadPublicationsTab(new URLSearchParams(window.location.search));
                } else if (action === 'reset-office-hours-filters') {
                    event.preventDefault();
                    updateUrlParams({
                        day_of_week: null,
                        min_start_time: null,
                        only_available: null
                    });
                } else if (action === 'retry-load-office-hours') {
                    event.preventDefault();
                    loadOfficeHoursTab(new URLSearchParams(window.location.search));
                } else if (action === 'reset-events-filters') {
                    event.preventDefault();
                    updateUrlParams({
                        audience: null,
                        date_from: null,
                        date_to: null
                    });
                } else if (action === 'retry-load-events') {
                    event.preventDefault();
                    loadEventsTab(new URLSearchParams(window.location.search));
                } else if (action === 'open-course') {
                    event.preventDefault();
                    var courseId = actionElement.getAttribute('data-course-id');
                    if (courseId) {
                        window.location.href = 'course_detail.html?courseId=' + courseId;
                    }
                } else if (action === 'save-to-reading-list') {
                    event.preventDefault();
                    var pubId = actionElement.getAttribute('data-publication-id');
                    if (!pubId) {
                        return;
                    }
                    try {
                        var saveResult = WebsiteSDK.savePublicationToReadingList(pubId);
                        if (saveResult && saveResult.success) {
                            actionElement.disabled = true;
                            actionElement.textContent = 'In Reading List';
                            showToast(saveResult.message || 'Saved to Reading List.', 'success');
                        } else {
                            showToast(saveResult && saveResult.message ? saveResult.message : 'Could not save to Reading List.', 'error');
                        }
                    } catch (e) {
                        showToast('Could not save to Reading List.', 'error');
                    }
                } else if (action === 'add-to-export-list') {
                    event.preventDefault();
                    var pubIdExport = actionElement.getAttribute('data-publication-id');
                    if (!pubIdExport) {
                        return;
                    }
                    try {
                        var exportResult = WebsiteSDK.addPublicationToExportList(pubIdExport);
                        if (exportResult && exportResult.success) {
                            actionElement.disabled = true;
                            actionElement.textContent = 'In Export List';
                            showToast(exportResult.message || 'Added to Export List.', 'success');
                        } else {
                            showToast(exportResult && exportResult.message ? exportResult.message : 'Could not add to Export List.', 'error');
                        }
                    } catch (e) {
                        showToast('Could not add to Export List.', 'error');
                    }
                } else if (action === 'view-export-list') {
                    event.preventDefault();
                    if (!state.facultyId) {
                        return;
                    }
                    window.location.href = 'publications_export_list.html?returnFacultyId=' + encodeURIComponent(state.facultyId);
                } else if (action === 'book-office-slot') {
                    event.preventDefault();
                    var slotId = actionElement.getAttribute('data-slot-id');
                    if (!slotId) {
                        return;
                    }
                    try {
                        var bookResult = WebsiteSDK.bookOfficeHourSlot(slotId);
                        if (bookResult && bookResult.success) {
                            showToast(bookResult.message || 'Office hour slot booked.', 'success');
                            loadOfficeHoursTab(new URLSearchParams(window.location.search));
                        } else {
                            showToast(bookResult && bookResult.message ? bookResult.message : 'Could not book slot.', 'error');
                        }
                    } catch (e) {
                        showToast('Could not book slot.', 'error');
                    }
                } else if (action === 'bookmark-event') {
                    event.preventDefault();
                    var eventId = actionElement.getAttribute('data-event-id');
                    if (!eventId) {
                        return;
                    }
                    try {
                        var bookmarkResult = WebsiteSDK.bookmarkEvent(eventId);
                        if (bookmarkResult && bookmarkResult.success) {
                            actionElement.disabled = true;
                            actionElement.textContent = 'Bookmarked';
                            showToast(bookmarkResult.message || 'Event bookmarked.', 'success');
                        } else {
                            showToast(bookmarkResult && bookmarkResult.message ? bookmarkResult.message : 'Could not bookmark event.', 'error');
                        }
                    } catch (e) {
                        showToast('Could not bookmark event.', 'error');
                    }
                } else if (action === 'view-bookmarked-events') {
                    event.preventDefault();
                    window.location.href = 'bookmarked_events.html';
                }
            });

            document.body.addEventListener('submit', function(event) {
                var target = event.target;
                if (target && target.getAttribute('data-action') === 'submit-contact-form') {
                    event.preventDefault();
                    handleContactFormSubmit(target);
                }
            });
        }

        function initPopstateHandler() {
            window.addEventListener('popstate', function() {
                urlParams = new URLSearchParams(window.location.search);
                handleUrlChange();
            });
        }

        function init() {
            var facultyId = urlParams.get('facultyId');
            if (!facultyId) {
                renderMissingFacultyError();
                return;
            }
            state.facultyId = facultyId;
            initBreadcrumb();
            initGlobalClickHandlers();
            initFilterFormHandlers();
            initPopstateHandler();
            loadOverview();
            handleUrlChange();
        }

        init();
    });
})();
</script>
</body>
</html>
