<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Kulcs - Hajnal Apartment</title>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
  <!-- Global styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page styles -->
  <link rel='stylesheet' href='help.css'>
</head>
<body class='page page--hero'>
  <div class='site-shell'>
    <header class='site-header'>
      <div class='site-header__inner'>
        <div class='site-brand'>
          <a href='index.html' class='site-brand__link'>Kulcs - Hajnal Apartment</a>
        </div>
        <nav class='site-nav' aria-label='Primary'>
          <ul class='site-nav__list'>
            <li class='site-nav__item'>
              <a href='index.html' class='site-nav__link'>Home</a>
            </li>
            <li class='site-nav__item'>
              <a href='favorites.html' class='site-nav__link'>Favorites</a>
            </li>
            <li class='site-nav__item'>
              <a href='shortlist.html' class='site-nav__link'>Shortlists</a>
            </li>
            <li class='site-nav__item'>
              <a href='alerts.html' class='site-nav__link'>Alerts</a>
            </li>
            <li class='site-nav__item'>
              <a href='help.html' class='site-nav__link site-nav__link--active'>Help</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='site-main__center'>
        <!-- Help & FAQ core content -->
        <section class='help-page' data-component='help-page'>
          <div class='help-page__center-column'>
            <header class='help-page__header' data-component='help-page-header'>
              <h1 class='help-page__title'>Help &amp; FAQ</h1>
              <p class='help-page__subtitle' data-populate='help-selected-topic-subtitle' aria-live='polite'></p>
            </header>

            <section class='help-page__search' data-component='help-search-form' role='search'>
              <form class='help-search-form' data-action='help-search-form'>
                <label for='helpSearchInput' class='visually-hidden'>Search help topics</label>
                <div class='help-search-form__field'>
                  <input
                    id='helpSearchInput'
                    class='help-search-form__input'
                    type='search'
                    name='q'
                    placeholder='Search topics and answers'
                    autocomplete='off'
                  >
                  <button
                    type='button'
                    class='help-search-form__clear'
                    data-action='clear-search'
                    aria-label='Clear help search'
                  >Clear</button>
                </div>
              </form>
            </section>

            <nav class='help-topic-nav' aria-label='Help topics'>
              <ul
                class='help-topic-nav__list'
                data-component='help-topic-navigation'
                data-populate='help-topic-navigation'
              ></ul>
            </nav>

            <section
              id='help-topic-panel'
              class='help-topic-panel'
              data-component='help-topic-panel'
              aria-live='polite'
            >
              <div class='help-topic-panel__loading'>Loading help topics&hellip;</div>

              <div
                class='help-topic-panel__error'
                data-component='help-error-state'
                hidden
              >
                <p class='help-error-state__message' data-role='error-message'>
                  We could not load help topics right now. Please try again.
                </p>
                <button
                  type='button'
                  class='help-error-state__retry'
                  data-action='retry-load-topics'
                >
                  Retry loading
                </button>
              </div>

              <div
                class='help-topic-panel__content'
                data-populate='help-topic-panel'
                hidden
              ></div>
            </section>
          </div>

          <button
            type='button'
            class='help-contact-support-cta'
            data-component='help-contact-support-cta'
            data-action='contact-support'
          >
            Contact support
          </button>
        </section>
      </div>
    </main>

    <footer class='site-footer'>
      <nav class='site-footer__nav' aria-label='Footer'>
        <a href='about.html' class='site-footer__link'>About</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='contact.html' class='site-footer__link'>Contact</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='help.html' class='site-footer__link'>Help &amp; FAQ</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='terms.html' class='site-footer__link'>Terms of Use</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='privacy.html' class='site-footer__link'>Privacy Policy</a>
      </nav>
      <div class='site-footer__meta'>
        <span class='site-footer__copyright'>&copy; Kulcs - Hajnal Apartment <span class='site-footer__year'>2026</span></span>
      </div>
    </footer>

    <!-- Decorative lock indicator matching the maintenance design; non-interactive by design -->
    <div class='lock-indicator' aria-hidden='true'>
      &#128274;
    </div>

    <script src='business_logic.js'></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        var state = {
          topics: [],
          selectedTopicSlug: null,
          searchQuery: '',
          expandedFaqs: {}
        };

        var elements = {
          subtitle: document.querySelector('[data-populate=help-selected-topic-subtitle]'),
          searchForm: document.querySelector('[data-component=help-search-form] form'),
          searchInput: document.getElementById('helpSearchInput'),
          clearSearch: document.querySelector('[data-action=clear-search]'),
          topicNavList: document.querySelector('[data-populate=help-topic-navigation]'),
          topicPanel: document.querySelector('[data-component=help-topic-panel]'),
          topicPanelContent: document.querySelector('[data-populate=help-topic-panel]'),
          topicPanelLoading: document.querySelector('.help-topic-panel__loading'),
          topicPanelError: document.querySelector('[data-component=help-error-state]'),
          contactSupport: document.querySelector('[data-action=contact-support]')
        };

        var urlParams = new URLSearchParams(window.location.search);
        var initialTopicFromUrl = urlParams.get('topic');

        function setLoading(isLoading) {
          if (!elements.topicPanel) {
            return;
          }
          if (isLoading) {
            if (elements.topicPanelLoading) {
              elements.topicPanelLoading.hidden = false;
            }
            if (elements.topicPanelError) {
              elements.topicPanelError.hidden = true;
            }
            if (elements.topicPanelContent) {
              elements.topicPanelContent.hidden = true;
            }
          } else {
            if (elements.topicPanelLoading) {
              elements.topicPanelLoading.hidden = true;
            }
            if (elements.topicPanelContent) {
              elements.topicPanelContent.hidden = false;
            }
          }
        }

        function setError(message) {
          if (!elements.topicPanelError) {
            return;
          }
          var msgEl = elements.topicPanelError.querySelector('[data-role=error-message]');
          if (msgEl) {
            msgEl.textContent = message;
          }
          if (elements.topicPanelLoading) {
            elements.topicPanelLoading.hidden = true;
          }
          if (elements.topicPanelContent) {
            elements.topicPanelContent.hidden = true;
          }
          elements.topicPanelError.hidden = false;
        }

        function updateUrlTopicParam(slug, replace) {
          var url = new URL(window.location.href);
          if (slug) {
            url.searchParams.set('topic', slug);
          } else {
            url.searchParams.delete('topic');
          }
          var method = replace ? 'replaceState' : 'pushState';
          window.history[method]({ topic: slug }, '', url.toString());
        }

        function scrollToTopicPanel() {
          if (!elements.topicPanel) {
            return;
          }
          try {
            elements.topicPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
          } catch (e) {
            elements.topicPanel.scrollIntoView(true);
          }
        }

        function stripHtml(html) {
          var tmp = document.createElement('div');
          tmp.innerHTML = html || '';
          return tmp.textContent || tmp.innerText || '';
        }

        function getSearchMatches() {
          var q = (state.searchQuery || '').trim().toLowerCase();
          var topics = state.topics || [];
          var matchesByTopicSlug = {};
          var filteredTopics = [];

          if (!q) {
            for (var i = 0; i < topics.length; i++) {
              var topic = topics[i];
              var slug = topic.slug;
              var faqIndexes = [];
              if (topic.faqs && topic.faqs.length) {
                for (var j = 0; j < topic.faqs.length; j++) {
                  faqIndexes.push(j);
                }
              }
              matchesByTopicSlug[slug] = {
                topicMatches: true,
                faqIndexes: faqIndexes
              };
              filteredTopics.push(topic);
            }
            return {
              filteredTopics: filteredTopics,
              matchesByTopicSlug: matchesByTopicSlug
            };
          }

          for (var k = 0; k < topics.length; k++) {
            var t = topics[k];
            var tSlug = t.slug;
            var titleMatch = (t.title || '').toLowerCase().indexOf(q) !== -1;
            var faqIdxs = [];
            if (t.faqs && t.faqs.length) {
              for (var m = 0; m < t.faqs.length; m++) {
                var faq = t.faqs[m];
                var text = (faq.question || '') + ' ' + stripHtml(faq.answerHtml || '');
                if (text.toLowerCase().indexOf(q) !== -1) {
                  faqIdxs.push(m);
                }
              }
            }
            if (titleMatch || faqIdxs.length) {
              filteredTopics.push(t);
              matchesByTopicSlug[tSlug] = {
                topicMatches: titleMatch,
                faqIndexes: faqIdxs
              };
            }
          }

          return {
            filteredTopics: filteredTopics,
            matchesByTopicSlug: matchesByTopicSlug
          };
        }

        function renderHeaderSubtitle(container, topics, selectedTopicSlug, searchQuery) {
          if (!container) {
            return;
          }
          var selected = null;
          if (topics && topics.length && selectedTopicSlug) {
            for (var i = 0; i < topics.length; i++) {
              if (topics[i].slug === selectedTopicSlug) {
                selected = topics[i];
                break;
              }
            }
          }
          var q = (searchQuery || '').trim();
          if (q) {
            if (selected) {
              container.textContent = 'Showing matches for ' + q + ' in ' + (selected.title || '') + ' and related topics.';
            } else {
              container.textContent = 'Showing matches for ' + q + '.';
            }
          } else if (selected) {
            container.textContent = 'Topic: ' + (selected.title || '');
          } else {
            container.textContent = 'Browse common questions about searching, booking, and managing your stay.';
          }
        }

        function renderTopicNavigation(container, topics, selectedTopicSlug, matches) {
          if (!container) {
            return;
          }
          container.innerHTML = '';

          if (!topics || !topics.length) {
            var emptyItem = document.createElement('li');
            emptyItem.className = 'help-topic-nav__empty';
            emptyItem.textContent = 'No topics available yet.';
            container.appendChild(emptyItem);
            return;
          }

          var q = (state.searchQuery || '').trim().toLowerCase();
          var visibleSlugs = {};
          if (matches && matches.filteredTopics) {
            for (var i = 0; i < matches.filteredTopics.length; i++) {
              var topic = matches.filteredTopics[i];
              visibleSlugs[topic.slug] = true;
            }
          }

          for (var j = 0; j < topics.length; j++) {
            var t = topics[j];
            if (q && !visibleSlugs[t.slug]) {
              continue;
            }
            var li = document.createElement('li');
            li.className = 'help-topic-nav__item';
            li.setAttribute('data-topic-slug', t.slug);

            var button = document.createElement('button');
            button.type = 'button';
            button.className = 'help-topic-nav__button';
            if (t.slug === selectedTopicSlug) {
              button.classList.add('is-active');
              li.setAttribute('aria-current', 'true');
            }
            button.textContent = t.title || '';
            button.setAttribute('data-action', 'select-topic');
            button.setAttribute('data-topic-slug', t.slug);

            li.appendChild(button);
            container.appendChild(li);
          }

          if (!container.childElementCount) {
            var noneItem = document.createElement('li');
            noneItem.className = 'help-topic-nav__empty';
            noneItem.textContent = 'No topics match your search.';
            container.appendChild(noneItem);
          }
        }

        function renderTopicPanel(container, localState, matches) {
          if (!container) {
            return;
          }
          container.innerHTML = '';

          var topics = localState.topics || [];
          if (!topics.length) {
            var pEmpty = document.createElement('p');
            pEmpty.className = 'help-topic-panel__empty';
            pEmpty.textContent = 'Help content is not available at the moment.';
            container.appendChild(pEmpty);
            return;
          }

          var selected = null;
          if (localState.selectedTopicSlug) {
            for (var i = 0; i < topics.length; i++) {
              if (topics[i].slug === localState.selectedTopicSlug) {
                selected = topics[i];
                break;
              }
            }
          }
          if (!selected) {
            selected = topics[0];
          }
          if (!selected) {
            var pSelect = document.createElement('p');
            pSelect.className = 'help-topic-panel__empty';
            pSelect.textContent = 'Select a topic to see questions.';
            container.appendChild(pSelect);
            return;
          }

          var q = (localState.searchQuery || '').trim().toLowerCase();
          var slug = selected.slug;
          var selectedMatches = matches && matches.matchesByTopicSlug ? matches.matchesByTopicSlug[slug] : null;
          var faqIndexesToShow = {};
          if (!q) {
            if (selected.faqs && selected.faqs.length) {
              for (var j = 0; j < selected.faqs.length; j++) {
                faqIndexesToShow[j] = true;
              }
            }
          } else if (selectedMatches && selectedMatches.faqIndexes) {
            for (var k = 0; k < selectedMatches.faqIndexes.length; k++) {
              faqIndexesToShow[selectedMatches.faqIndexes[k]] = true;
            }
          }

          var titleEl = document.createElement('h2');
          titleEl.className = 'help-topic-panel__title';
          titleEl.textContent = selected.title || '';
          container.appendChild(titleEl);

          if (!selected.faqs || !selected.faqs.length) {
            var pNoFaqs = document.createElement('p');
            pNoFaqs.className = 'help-topic-panel__empty';
            pNoFaqs.textContent = 'No questions are available for this topic yet.';
            container.appendChild(pNoFaqs);
            return;
          }

          var list = document.createElement('div');
          list.className = 'help-faq-list';

          var hasVisibleFaq = false;
          for (var m = 0; m < selected.faqs.length; m++) {
            if (q && !faqIndexesToShow[m]) {
              continue;
            }
            hasVisibleFaq = true;
            var faq = selected.faqs[m];
            var item = document.createElement('article');
            item.className = 'help-faq';
            item.setAttribute('data-faq-index', String(m));

            var questionId = 'faq-' + slug + '-' + m;

            var button = document.createElement('button');
            button.type = 'button';
            button.className = 'help-faq__question';
            button.setAttribute('data-action', 'toggle-faq');
            button.setAttribute('data-topic-slug', slug);
            button.setAttribute('data-faq-index', String(m));
            var isExpanded = localState.expandedFaqs[slug] === m;
            button.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
            button.setAttribute('aria-controls', questionId + '-body');

            var questionText = document.createElement('span');
            questionText.className = 'help-faq__question-text';
            questionText.textContent = faq.question || '';
            button.appendChild(questionText);

            var answer = document.createElement('div');
            answer.className = 'help-faq__answer';
            answer.id = questionId + '-body';
            answer.hidden = !isExpanded;
            answer.innerHTML = faq.answerHtml || '';

            item.appendChild(button);
            item.appendChild(answer);
            list.appendChild(item);
          }

          if (!hasVisibleFaq) {
            var pNoMatches = document.createElement('p');
            pNoMatches.className = 'help-topic-panel__no-results';
            pNoMatches.textContent = 'No questions in this topic match your search.';
            container.appendChild(pNoMatches);
          } else {
            container.appendChild(list);
          }
        }

        function renderAll() {
          var matches = getSearchMatches();
          renderHeaderSubtitle(elements.subtitle, state.topics, state.selectedTopicSlug, state.searchQuery);
          renderTopicNavigation(elements.topicNavList, state.topics, state.selectedTopicSlug, matches);
          renderTopicPanel(elements.topicPanelContent, state, matches);
        }

        function applySearchAutoSwitchSelectedTopic(matches) {
          var q = (state.searchQuery || '').trim();
          if (!q) {
            return;
          }
          if (!matches) {
            matches = getSearchMatches();
          }
          if (!matches.filteredTopics || !matches.filteredTopics.length) {
            return;
          }
          var currentSlug = state.selectedTopicSlug;
          var currentMatches = currentSlug && matches.matchesByTopicSlug ? matches.matchesByTopicSlug[currentSlug] : null;
          if (!currentMatches) {
            var newTopic = matches.filteredTopics[0];
            if (newTopic && newTopic.slug !== currentSlug) {
              state.selectedTopicSlug = newTopic.slug;
              state.expandedFaqs = {};
              updateUrlTopicParam(newTopic.slug, true);
              scrollToTopicPanel();
            }
          }
        }

        function resolveInitialSelectedTopic() {
          var topics = state.topics || [];
          var slug = initialTopicFromUrl;
          var selected = null;

          if (slug) {
            for (var i = 0; i < topics.length; i++) {
              if (topics[i].slug === slug) {
                selected = topics[i];
                break;
              }
            }
          }

          if (!selected && topics.length) {
            selected = topics[0];
            slug = selected.slug || null;
            if (slug) {
              updateUrlTopicParam(slug, true);
            }
          }

          state.selectedTopicSlug = selected ? selected.slug : null;
          initialTopicFromUrl = null;

          if (state.selectedTopicSlug) {
            scrollToTopicPanel();
          }
        }

        function loadTopics() {
          setLoading(true);
          try {
            var result = WebsiteSDK.getHelpTopics();
            var topics = result && Array.isArray(result.topics) ? result.topics : [];
            state.topics = topics || [];
            state.expandedFaqs = {};
            resolveInitialSelectedTopic();
            renderAll();
            setLoading(false);
          } catch (err) {
            console.error('Failed to load help topics', err);
            setError('We could not load help topics right now. Please try again.');
          }
        }

        function onSelectTopic(slug, fromUser) {
          if (!slug || slug === state.selectedTopicSlug) {
            return;
          }
          state.selectedTopicSlug = slug;
          state.expandedFaqs = {};
          updateUrlTopicParam(slug, !fromUser);
          renderAll();
          scrollToTopicPanel();
        }

        function onSearchInputChange() {
          if (!elements.searchInput) {
            return;
          }
          state.searchQuery = elements.searchInput.value || '';
          var matches = getSearchMatches();
          applySearchAutoSwitchSelectedTopic(matches);
          renderAll();
        }

        function clearSearch() {
          if (elements.searchInput) {
            elements.searchInput.value = '';
          }
          state.searchQuery = '';
          renderAll();
        }

        function navigateToContactWithTopic() {
          var slug = state.selectedTopicSlug;
          var url = 'contact.html';
          if (slug) {
            url += '?topic=' + encodeURIComponent(slug);
          }
          window.location.href = url;
        }

        if (elements.searchInput) {
          elements.searchInput.addEventListener('input', function () {
            onSearchInputChange();
          });
        }

        if (elements.searchForm) {
          elements.searchForm.addEventListener('submit', function (event) {
            event.preventDefault();
            onSearchInputChange();
          });
        }

        if (elements.clearSearch) {
          elements.clearSearch.addEventListener('click', function () {
            clearSearch();
          });
        }

        if (elements.topicNavList) {
          elements.topicNavList.addEventListener('click', function (event) {
            var target = event.target;
            if (!target || !target.closest) {
              return;
            }
            var button = target.closest('[data-action=select-topic]');
            if (!button) {
              return;
            }
            var slug = button.getAttribute('data-topic-slug');
            if (slug) {
              onSelectTopic(slug, true);
            }
          });
        }

        if (elements.topicPanelContent) {
          elements.topicPanelContent.addEventListener('click', function (event) {
            var target = event.target;
            if (!target || !target.closest) {
              return;
            }
            var button = target.closest('[data-action=toggle-faq]');
            if (!button) {
              return;
            }
            var slug = button.getAttribute('data-topic-slug');
            var indexStr = button.getAttribute('data-faq-index');
            if (!slug || indexStr === null) {
              return;
            }
            var index = parseInt(indexStr, 10);
            var current = state.expandedFaqs[slug];
            if (current === index) {
              state.expandedFaqs[slug] = null;
            } else {
              state.expandedFaqs[slug] = index;
            }
            var matches = getSearchMatches();
            renderTopicPanel(elements.topicPanelContent, state, matches);
          });
        }

        if (elements.contactSupport) {
          elements.contactSupport.addEventListener('click', function () {
            navigateToContactWithTopic();
          });
        }

        var retryButton = document.querySelector('[data-action=retry-load-topics]');
        if (retryButton) {
          retryButton.addEventListener('click', function () {
            loadTopics();
          });
        }

        window.addEventListener('popstate', function () {
          if (!state.topics || !state.topics.length) {
            return;
          }
          var params = new URLSearchParams(window.location.search);
          var slug = params.get('topic');
          if (slug === state.selectedTopicSlug) {
            return;
          }
          var topics = state.topics;
          var match = null;
          if (slug) {
            for (var i = 0; i < topics.length; i++) {
              if (topics[i].slug === slug) {
                match = topics[i];
                break;
              }
            }
          }
          if (!match && topics.length) {
            match = topics[0];
          }
          state.selectedTopicSlug = match ? match.slug : null;
          state.expandedFaqs = {};
          renderAll();
          scrollToTopicPanel();
        });

        var populateElements = document.querySelectorAll('[data-populate]');
        if (populateElements && populateElements.length) {
          // Actual population is handled by renderAll after topics are loaded.
        }

        loadTopics();
      });
    </script>
  </div>
</body>
</html>
