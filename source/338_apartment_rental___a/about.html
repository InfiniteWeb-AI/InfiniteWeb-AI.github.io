<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Kulcs - Hajnal Apartment</title>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
  <!-- Global styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- About page styles -->
  <link rel='stylesheet' href='about.css'>
</head>
<body class='page page--hero'>
  <div class='site-shell'>
    <header class='site-header'>
      <div class='site-header__inner'>
        <div class='site-brand'>
          <a href='index.html' class='site-brand__link'>Kulcs - Hajnal Apartment</a>
        </div>
        <nav class='site-nav' aria-label='Primary'>
          <ul class='site-nav__list'>
            <li class='site-nav__item'>
              <a href='index.html' class='site-nav__link site-nav__link--active'>Home</a>
            </li>
            <li class='site-nav__item'>
              <a href='favorites.html' class='site-nav__link'>Favorites</a>
            </li>
            <li class='site-nav__item'>
              <a href='shortlist.html' class='site-nav__link'>Shortlists</a>
            </li>
            <li class='site-nav__item'>
              <a href='alerts.html' class='site-nav__link'>Alerts</a>
            </li>
            <li class='site-nav__item'>
              <a href='help.html' class='site-nav__link'>Help</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='site-main__center'>
        <div class='about-page' data-component='about-page'>
          <!-- Loader overlay -->
          <div class='about-page__overlay' data-component='about-page-loader' role='status' aria-live='polite'>
            <div class='about-page__spinner'>
              <span class='about-page__spinner-dot'></span>
              <span class='about-page__spinner-text'>Loading page...</span>
            </div>
          </div>

          <!-- Central about content column -->
          <div class='about-page__column'>
            <article class='about-content' data-component='about-content-renderer' data-populate='site_page'>
              <header class='about-content__header'>
                <h1 class='about-content__title' data-populate='page_title'></h1>
                <p class='about-content__meta'>
                  <span class='about-content__updated-label'>Last updated</span>
                  <time class='about-content__updated-value' datetime='' data-populate='last_updated'></time>
                </p>
              </header>
              <section class='about-content__body' data-populate='page_body' aria-label='About Kulcs - Hajnal Apartment'>
                <!-- Body HTML from getStaticPageContent will be injected here -->
              </section>
            </article>

            <!-- Explicit support links -->
            <nav class='about-support-links' data-component='about-support-links' aria-label='Support links'>
              <button type='button' class='about-support-links__link' data-action='navigate-help'>Help center</button>
              <span class='about-support-links__separator' aria-hidden='true'>·</span>
              <button type='button' class='about-support-links__link' data-action='navigate-contact'>Contact us</button>
            </nav>
          </div>

          <!-- Floating internal navigation rail -->
          <nav class='about-internal-nav' data-component='about-internal-nav' aria-label='About sections'>
            <ul class='about-internal-nav__list' data-populate='about_sections'>
              <!-- Section items injected by JavaScript -->
            </ul>
          </nav>

          <!-- Error state -->
          <section class='about-page__error about-page__error--hidden' data-component='about-error' aria-live='polite'>
            <p class='about-page__error-message' data-populate='error_message'>
              We couldn't load this page right now. Please try again.
            </p>
            <button type='button' class='about-page__retry' data-action='retry-load'>Try again</button>
          </section>
        </div>
      </div>
    </main>

    <footer class='site-footer'>
      <nav class='site-footer__nav' aria-label='Footer'>
        <a href='about.html' class='site-footer__link'>About</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='contact.html' class='site-footer__link'>Contact</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='help.html' class='site-footer__link'>Help &amp; FAQ</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='terms.html' class='site-footer__link'>Terms of Use</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='privacy.html' class='site-footer__link'>Privacy Policy</a>
      </nav>
      <div class='site-footer__meta'>
        <span class='site-footer__copyright'>&copy; Kulcs - Hajnal Apartment <span class='site-footer__year'>2026</span></span>
      </div>
    </footer>

    <!-- Decorative lock indicator matching the maintenance design; non-interactive by design -->
    <div class='lock-indicator' aria-hidden='true'>
      &#128274;
    </div>
  </div>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>
  <!-- About page UI logic -->
  <script>
  (function() {
    document.addEventListener('DOMContentLoaded', function() {
      var pageContainer = document.querySelector('[data-component="about-page"]');
      if (!pageContainer) {
        return;
      }

      var loaderOverlay = pageContainer.querySelector('[data-component="about-page-loader"]');
      var contentRenderer = pageContainer.querySelector('[data-component="about-content-renderer"]');
      var internalNav = pageContainer.querySelector('[data-component="about-internal-nav"]');
      var supportLinks = pageContainer.querySelector('[data-component="about-support-links"]');
      var errorSection = pageContainer.querySelector('[data-component="about-error"]');

      var titleEl = contentRenderer ? contentRenderer.querySelector('[data-populate="page_title"]') : null;
      var bodyEl = contentRenderer ? contentRenderer.querySelector('[data-populate="page_body"]') : null;
      var lastUpdatedEl = contentRenderer ? contentRenderer.querySelector('[data-populate="last_updated"]') : null;
      var sectionsListEl = internalNav ? internalNav.querySelector('[data-populate="about_sections"]') : null;
      var errorMessageEl = errorSection ? errorSection.querySelector('[data-populate="error_message"]') : null;

      var state = {
        currentPageName: null,
        currentSectionId: null,
        pageId: null
      };

      function parsePageNameFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var pageParam = params.get('page');
        var allowed = ['about', 'terms_of_use', 'privacy_policy'];
        if (pageParam && allowed.indexOf(pageParam) !== -1) {
          return pageParam;
        }
        return 'about';
      }

      function parseSectionFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var sectionParam = params.get('section');
        return sectionParam || null;
      }

      function ensurePageParamInUrl(pageName) {
        var params = new URLSearchParams(window.location.search);
        var current = params.get('page');
        if (current === pageName) {
          return;
        }
        params.set('page', pageName);
        var newUrl = window.location.pathname + '?' + params.toString();
        history.replaceState({ pageName: pageName, section: params.get('section') || null }, '', newUrl);
      }

      function showLoader() {
        if (loaderOverlay) {
          loaderOverlay.classList.remove('about-page__overlay--hidden');
          loaderOverlay.setAttribute('aria-hidden', 'false');
        }
        if (contentRenderer) {
          contentRenderer.setAttribute('aria-busy', 'true');
        }
      }

      function hideLoader() {
        if (loaderOverlay) {
          loaderOverlay.classList.add('about-page__overlay--hidden');
          loaderOverlay.setAttribute('aria-hidden', 'true');
        }
        if (contentRenderer) {
          contentRenderer.removeAttribute('aria-busy');
        }
      }

      function showError(message) {
        if (contentRenderer) {
          contentRenderer.classList.add('about-content--hidden');
        }
        if (internalNav) {
          internalNav.classList.add('about-internal-nav--hidden');
        }
        if (supportLinks) {
          supportLinks.classList.add('about-support-links--hidden');
        }
        if (errorSection) {
          if (errorMessageEl && message) {
            errorMessageEl.textContent = message;
          }
          errorSection.classList.remove('about-page__error--hidden');
        }
      }

      function hideError() {
        if (errorSection) {
          errorSection.classList.add('about-page__error--hidden');
        }
        if (contentRenderer) {
          contentRenderer.classList.remove('about-content--hidden');
        }
        if (internalNav) {
          internalNav.classList.remove('about-internal-nav--hidden');
        }
        if (supportLinks) {
          supportLinks.classList.remove('about-support-links--hidden');
        }
      }

      function renderTitle(container, title) {
        if (!container) {
          return;
        }
        container.textContent = title || '';
      }

      function renderBody(container, html) {
        if (!container) {
          return;
        }
        container.innerHTML = html || '';
      }

      function renderLastUpdated(container, isoString) {
        if (!container) {
          return;
        }
        if (!isoString) {
          container.textContent = '';
          container.removeAttribute('datetime');
          return;
        }
        container.setAttribute('datetime', isoString);
        try {
          var date = new Date(isoString);
          container.textContent = date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        } catch (e) {
          container.textContent = isoString;
        }
      }

      function buildInternalNav(container, bodyRoot) {
        if (!container || !internalNav) {
          return;
        }
        container.innerHTML = '';
        if (!bodyRoot) {
          internalNav.classList.add('about-internal-nav--empty');
          return;
        }

        var headings = bodyRoot.querySelectorAll('h2[id], h3[id]');
        if (!headings || headings.length === 0) {
          internalNav.classList.add('about-internal-nav--empty');
          return;
        }
        internalNav.classList.remove('about-internal-nav--empty');

        var maxItems = 6;
        for (var i = 0; i < headings.length && i < maxItems; i++) {
          var h = headings[i];
          var sectionId = h.getAttribute('id');
          if (!sectionId) {
            continue;
          }
          var label = h.textContent || sectionId;

          var li = document.createElement('li');
          li.className = 'about-internal-nav__item';
          li.setAttribute('data-section-id', sectionId);

          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'about-internal-nav__link';
          btn.textContent = label.trim();
          btn.setAttribute('data-action', 'jump-to-section');
          btn.setAttribute('data-section-id', sectionId);

          li.appendChild(btn);
          container.appendChild(li);
        }
      }

      function highlightActiveSection(sectionId) {
        if (!sectionsListEl) {
          return;
        }
        var items = sectionsListEl.querySelectorAll('.about-internal-nav__item');
        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          var itemSectionId = item.getAttribute('data-section-id');
          if (itemSectionId === sectionId && sectionId) {
            item.classList.add('about-internal-nav__item--active');
          } else {
            item.classList.remove('about-internal-nav__item--active');
          }
        }
      }

      function scrollToSection(sectionId, behavior) {
        if (!sectionId) {
          return;
        }
        var idSelector = sectionId;
        if (window.CSS && window.CSS.escape) {
          idSelector = CSS.escape(sectionId);
        }
        var target = null;
        if (bodyEl) {
          target = bodyEl.querySelector('#' + idSelector);
        }
        if (!target) {
          target = document.getElementById(sectionId);
        }
        if (target) {
          var options = { behavior: behavior || 'smooth', block: 'start' };
          try {
            target.scrollIntoView(options);
          } catch (e) {
            target.scrollIntoView(true);
          }
        }
      }

      function navigateToSection(sectionId, updateUrl) {
        if (!sectionId) {
          return;
        }
        state.currentSectionId = sectionId;
        highlightActiveSection(sectionId);
        scrollToSection(sectionId, 'smooth');

        if (updateUrl) {
          var params = new URLSearchParams(window.location.search);
          params.set('section', sectionId);
          if (state.currentPageName) {
            params.set('page', state.currentPageName);
          }
          var newUrl = window.location.pathname + '?' + params.toString();
          history.pushState({ pageName: state.currentPageName, section: sectionId }, '', newUrl);
        }
      }

      function handleSupportNavigation(target) {
        var baseUrl = target === 'help' ? 'help.html' : 'contact.html';
        var params = new URLSearchParams();
        params.set('source', 'about');
        if (state.currentSectionId) {
          params.set('fromSection', state.currentSectionId);
        }
        if (state.pageId) {
          params.set('pageId', state.pageId);
        }
        window.location.href = baseUrl + '?' + params.toString();
      }

      function attachContentLinkHandlers(bodyRoot) {
        if (!bodyRoot) {
          return;
        }
        var links = bodyRoot.querySelectorAll('a[href]');
        for (var i = 0; i < links.length; i++) {
          (function(link) {
            link.addEventListener('click', function(evt) {
              var href = link.getAttribute('href') || '';

              if (href.indexOf('#') === 0) {
                evt.preventDefault();
                var sectionId = href.substring(1);
                navigateToSection(sectionId, true);
                return;
              }

              if (href.indexOf('help.html') === 0 || href.indexOf('help.html') > 0) {
                evt.preventDefault();
                handleSupportNavigation('help');
                return;
              }

              if (href.indexOf('contact.html') === 0 || href.indexOf('contact.html') > 0) {
                evt.preventDefault();
                handleSupportNavigation('contact');
                return;
              }
            });
          })(links[i]);
        }
      }

      function fetchAndRenderPage(pageName) {
        if (!pageName) {
          return;
        }
        showLoader();
        hideError();
        state.currentPageName = pageName;
        try {
          var pageData = WebsiteSDK.getStaticPageContent(pageName);
          if (!pageData || !pageData.bodyHtml) {
            throw new Error('Empty response');
          }

          state.pageId = pageData.pageId || null;

          renderTitle(titleEl, pageData.title || '');
          renderBody(bodyEl, pageData.bodyHtml || '');
          renderLastUpdated(lastUpdatedEl, pageData.lastUpdated || '');

          buildInternalNav(sectionsListEl, bodyEl);
          attachContentLinkHandlers(bodyEl);

          var initialSection = parseSectionFromUrl();
          state.currentSectionId = initialSection;
          if (initialSection) {
            highlightActiveSection(initialSection);
            setTimeout(function() {
              scrollToSection(initialSection, 'auto');
            }, 0);
          } else {
            highlightActiveSection(null);
          }

          hideLoader();
        } catch (err) {
          hideLoader();
          showError('We were unable to load the About information. Please try again.');
        }
      }

      function handleUrlChange() {
        var newPageName = parsePageNameFromUrl();
        var newSection = parseSectionFromUrl();

        if (state.currentPageName !== newPageName) {
          fetchAndRenderPage(newPageName);
        } else if (newSection !== state.currentSectionId) {
          state.currentSectionId = newSection;
          if (newSection) {
            highlightActiveSection(newSection);
            scrollToSection(newSection, 'auto');
          } else {
            highlightActiveSection(null);
          }
        }
      }

      // Delegate click actions inside about page
      pageContainer.addEventListener('click', function(evt) {
        var target = evt.target;
        if (!target) {
          return;
        }
        var actionEl = target.closest ? target.closest('[data-action]') : null;
        if (!actionEl) {
          return;
        }
        var action = actionEl.getAttribute('data-action');
        if (action === 'retry-load') {
          evt.preventDefault();
          fetchAndRenderPage(parsePageNameFromUrl());
        } else if (action === 'jump-to-section') {
          evt.preventDefault();
          var sectionId = actionEl.getAttribute('data-section-id');
          navigateToSection(sectionId, true);
        } else if (action === 'navigate-help') {
          evt.preventDefault();
          handleSupportNavigation('help');
        } else if (action === 'navigate-contact') {
          evt.preventDefault();
          handleSupportNavigation('contact');
        }
      });

      // Initial load
      var initialPageName = parsePageNameFromUrl();
      ensurePageParamInUrl(initialPageName);
      fetchAndRenderPage(initialPageName);

      // Handle browser navigation (back/forward)
      window.addEventListener('popstate', function() {
        handleUrlChange();
      });
    });
  })();
  </script>
</body>
</html>
