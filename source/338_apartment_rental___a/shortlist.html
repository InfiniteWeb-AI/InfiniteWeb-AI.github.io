<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Kulcs - Hajnal Apartment</title>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
  <!-- Global styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Shortlists page styles -->
  <link rel='stylesheet' href='shortlist.css'>
</head>
<body class='page page--hero'>
  <div class='site-shell'>
    <header class='site-header'>
      <div class='site-header__inner'>
        <div class='site-brand'>
          <a href='index.html' class='site-brand__link'>Kulcs - Hajnal Apartment</a>
        </div>
        <nav class='site-nav' aria-label='Primary'>
          <ul class='site-nav__list'>
            <li class='site-nav__item'>
              <a href='index.html' class='site-nav__link'>Home</a>
            </li>
            <li class='site-nav__item'>
              <a href='favorites.html' class='site-nav__link'>Favorites</a>
            </li>
            <li class='site-nav__item'>
              <a href='shortlist.html' class='site-nav__link site-nav__link--active'>Shortlists</a>
            </li>
            <li class='site-nav__item'>
              <a href='alerts.html' class='site-nav__link'>Alerts</a>
            </li>
            <li class='site-nav__item'>
              <a href='help.html' class='site-nav__link'>Help</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='site-main__center'>
        <section class='shortlist-page' data-component='shortlist-page'>
          <div class='shortlist-page__inner'>
            <!-- Shortlist selector -->
            <section class='shortlist-selector' data-component='shortlist-selector' aria-label='Shortlists'>
              <div class='shortlist-selector__row'>
                <div class='shortlist-selector__list' data-populate='shortlists' role='tablist' aria-label='Saved shortlists'>
                  <!-- Shortlist pills rendered here -->
                </div>
                <button type='button' class='shortlist-selector__create-btn' data-action='open-create-shortlist'>
                  Create shortlist
                </button>
              </div>
              <form class='shortlist-selector__form shortlist-selector__form--hidden' data-action='create-shortlist-form' novalidate>
                <div class='shortlist-selector__field'>
                  <label for='shortlistNameInput' class='shortlist-selector__label'>Name</label>
                  <input id='shortlistNameInput' name='name' type='text' required placeholder='e.g. Berlin trip options' class='shortlist-selector__input'>
                </div>
                <div class='shortlist-selector__field'>
                  <label for='shortlistDescriptionInput' class='shortlist-selector__label'>Description (optional)</label>
                  <textarea id='shortlistDescriptionInput' name='description' rows='2' class='shortlist-selector__textarea' placeholder='Add a short note about this shortlist'></textarea>
                </div>
                <div class='shortlist-selector__actions'>
                  <button type='button' class='shortlist-selector__cancel-btn' data-action='cancel-create-shortlist'>Cancel</button>
                  <button type='submit' class='shortlist-selector__submit-btn'>Save shortlist</button>
                </div>
                <p class='shortlist-selector__feedback' data-populate='shortlist-create-feedback' aria-live='polite'></p>
              </form>
            </section>

            <!-- Summary header -->
            <header class='shortlist-summary' data-component='shortlist-summary-header'>
              <h1 class='shortlist-summary__title' data-populate='active-shortlist-name'>
                Loading your shortlists
              </h1>
              <p class='shortlist-summary__description' data-populate='active-shortlist-description'>
                Please wait while we load your saved places.
              </p>
              <p class='shortlist-summary__meta'>
                <span data-populate='active-shortlist-count'>0</span>
                <span class='shortlist-summary__meta-label'>listings in this shortlist</span>
              </p>
              <p class='shortlist-summary__status' data-populate='shortlist-global-status' aria-live='polite'></p>
            </header>

            <!-- Items panel -->
            <section class='shortlist-items' data-component='shortlist-items-panel' aria-label='Shortlist items'>
              <div class='shortlist-items__empty' data-populate='shortlist-empty-state'>
                <!-- Empty state text rendered here -->
              </div>
              <ul class='shortlist-items__list' data-populate='shortlist-items'>
                <!-- Shortlist item cards rendered here -->
              </ul>

              <!-- Add listing to active shortlist -->
              <section class='shortlist-add' data-component='shortlist-add-listing-to-active'>
                <button type='button' class='shortlist-add__toggle' data-action='toggle-add-listing-form'>
                  Add listing to this shortlist
                </button>
                <form class='shortlist-add__form shortlist-add__form--hidden' data-action='add-listing-form' novalidate>
                  <div class='shortlist-add__field'>
                    <label for='addListingIdInput' class='shortlist-add__label'>Listing ID</label>
                    <input id='addListingIdInput' name='listingId' type='text' class='shortlist-add__input' placeholder='Paste a listing ID or deep link reference' required>
                  </div>
                  <div class='shortlist-add__field'>
                    <label for='addListingNoteInput' class='shortlist-add__label'>Note (optional)</label>
                    <textarea id='addListingNoteInput' name='note' rows='2' class='shortlist-add__textarea' placeholder='Why are you adding this place?'></textarea>
                  </div>
                  <div class='shortlist-add__actions'>
                    <button type='button' class='shortlist-add__cancel-btn' data-action='cancel-add-listing'>Cancel</button>
                    <button type='submit' class='shortlist-add__submit-btn'>Add to shortlist</button>
                  </div>
                  <p class='shortlist-add__feedback' data-populate='add-listing-feedback' aria-live='polite'></p>
                </form>
              </section>
            </section>
          </div>

          <!-- Floating page controller on right edge -->
          <div class='shortlist-page-controller' data-component='shortlist-page-controller'>
            <button type='button' class='shortlist-page-controller__button icon-button' data-action='controller-scroll-top' aria-label='Scroll to top'>
              <span class='shortlist-page-controller__icon' aria-hidden='true'>&#128274;</span>
            </button>
          </div>
        </section>
      </div>
    </main>

    <footer class='site-footer'>
      <nav class='site-footer__nav' aria-label='Footer'>
        <a href='about.html' class='site-footer__link'>About</a>
        <span class='site-footer__separator' aria-hidden='true'>b7</span>
        <a href='contact.html' class='site-footer__link'>Contact</a>
        <span class='site-footer__separator' aria-hidden='true'>b7</span>
        <a href='help.html' class='site-footer__link'>Help &amp; FAQ</a>
        <span class='site-footer__separator' aria-hidden='true'>b7</span>
        <a href='terms.html' class='site-footer__link'>Terms of Use</a>
        <span class='site-footer__separator' aria-hidden='true'>b7</span>
        <a href='privacy.html' class='site-footer__link'>Privacy Policy</a>
      </nav>
      <div class='site-footer__meta'>
        <span class='site-footer__copyright'>&copy; Kulcs - Hajnal Apartment <span class='site-footer__year'>2026</span></span>
      </div>
    </footer>

    <!-- Decorative lock indicator matching the maintenance design; non-interactive by design -->
    <div class='lock-indicator' aria-hidden='true'>
      &#128274;
    </div>
  </div>

  <!-- SDK / business logic loader -->
  <script src='business_logic.js'></script>

  <!-- Shortlists page UI logic -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const state = {
        shortlists: [],
        activeShortlistId: null,
        activeShortlistMeta: null,
        items: [],
        lastLoadedFromUrlParam: null
      };

      const urlParams = new URLSearchParams(window.location.search);
      const initialShortlistIdParam = urlParams.get('shortlistId');

      // Map data-populate containers for easy access
      const populateContainers = {};
      document.querySelectorAll('[data-populate]').forEach(function(el) {
        const key = el.getAttribute('data-populate');
        if (key && !(key in populateContainers)) {
          populateContainers[key] = el;
        }
      });

      const shortlistListContainer = populateContainers['shortlists'] || null;
      const summaryNameContainer = populateContainers['active-shortlist-name'] || null;
      const summaryDescriptionContainer = populateContainers['active-shortlist-description'] || null;
      const summaryCountContainer = populateContainers['active-shortlist-count'] || null;
      const globalStatusContainer = populateContainers['shortlist-global-status'] || null;
      const itemsListContainer = populateContainers['shortlist-items'] || null;
      const emptyStateContainer = populateContainers['shortlist-empty-state'] || null;
      const createFeedbackContainer = populateContainers['shortlist-create-feedback'] || null;
      const addListingFeedbackContainer = populateContainers['add-listing-feedback'] || null;

      const selectorForm = document.querySelector('[data-action="create-shortlist-form"]');
      const selectorFormNameInput = document.getElementById('shortlistNameInput');
      const selectorFormDescriptionInput = document.getElementById('shortlistDescriptionInput');
      const addListingForm = document.querySelector('[data-action="add-listing-form"]');
      const addListingIdInput = document.getElementById('addListingIdInput');
      const addListingNoteInput = document.getElementById('addListingNoteInput');

      function setGlobalStatus(message) {
        if (globalStatusContainer) {
          globalStatusContainer.textContent = message || '';
        }
      }

      function formatCurrency(value, currency) {
        if (typeof value !== 'number') return '';
        const symbol = currency === 'eur' ? '€' : '$';
        return symbol + value.toLocaleString(undefined, { maximumFractionDigits: 0 });
      }

      function syncUrlWithActiveShortlist(replace) {
        const currentUrl = new URL(window.location.href);
        if (state.activeShortlistId) {
          currentUrl.searchParams.set('shortlistId', state.activeShortlistId);
        } else {
          currentUrl.searchParams.delete('shortlistId');
        }
        const newUrl = currentUrl.pathname + currentUrl.search + currentUrl.hash;
        if (replace) {
          window.history.replaceState({ shortlistId: state.activeShortlistId }, '', newUrl);
        } else {
          window.history.pushState({ shortlistId: state.activeShortlistId }, '', newUrl);
        }
      }

      function renderShortlists(container, shortlists, activeShortlistId) {
        if (!container) return;
        container.innerHTML = '';
        if (!shortlists || shortlists.length === 0) {
          const span = document.createElement('span');
          span.className = 'shortlist-selector__empty';
          span.textContent = 'No shortlists yet';
          container.appendChild(span);
          return;
        }
        shortlists.forEach(function(sl) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'shortlist-selector__pill' + (sl.id === activeShortlistId ? ' shortlist-selector__pill--active' : '');
          button.setAttribute('data-action', 'select-shortlist');
          button.setAttribute('data-shortlist-id', sl.id);
          button.setAttribute('role', 'tab');
          button.textContent = sl.name || 'Untitled shortlist';
          container.appendChild(button);
        });
      }

      function renderSummaryHeader() {
        if (!summaryNameContainer || !summaryDescriptionContainer || !summaryCountContainer) return;
        if (!state.activeShortlistId) {
          summaryNameContainer.textContent = 'No shortlists yet';
          summaryDescriptionContainer.textContent = 'Create your first shortlist to start collecting apartments you might stay in.';
          summaryCountContainer.textContent = '0';
          return;
        }
        const meta = state.activeShortlistMeta;
        const shortlistFallback = state.shortlists.find(function(sl) { return sl.id === state.activeShortlistId; }) || null;
        const name = (meta && meta.name) || (shortlistFallback && shortlistFallback.name) || 'Untitled shortlist';
        const description = (meta && meta.description) || (shortlistFallback && shortlistFallback.description) || '';
        summaryNameContainer.textContent = name;
        summaryDescriptionContainer.textContent = description || 'Review your saved apartments and refine your choices.';
        summaryCountContainer.textContent = Array.isArray(state.items) ? String(state.items.length) : '0';
      }

      function renderEmptyState(container, hasShortlist, itemsCount) {
        if (!container) return;
        container.innerHTML = '';
        if (!hasShortlist) {
          const p = document.createElement('p');
          p.className = 'shortlist-items__empty-text';
          p.textContent = 'You have no shortlists yet. Use “Create shortlist” above to start a new collection.';
          container.appendChild(p);
          return;
        }
        if (itemsCount === 0) {
          const p = document.createElement('p');
          p.className = 'shortlist-items__empty-text';
          p.textContent = 'This shortlist is empty. Add a listing to get started.';
          container.appendChild(p);
        }
      }

      function renderItems(container, items) {
        if (!container) return;
        container.innerHTML = '';
        if (!items || items.length === 0) return;

        items.forEach(function(item) {
          const li = document.createElement('li');
          li.className = 'shortlist-item-card';
          li.setAttribute('data-component', 'shortlist-item-card');
          li.setAttribute('data-shortlist-item-id', item.shortlistItemId);
          if (item.listing && item.listing.id) {
            li.setAttribute('data-listing-id', item.listing.id);
          }

          const listing = item.listing || {};
          const priceText = listing.monthlyRent != null
            ? formatCurrency(listing.monthlyRent, listing.currency) + ' / month'
            : (listing.nightlyPrice != null ? formatCurrency(listing.nightlyPrice, listing.currency) + ' / night' : '');
          const bedsText = typeof listing.bedrooms === 'number' ? (listing.bedrooms === 0 ? 'Studio' : listing.bedrooms + ' bd') : '';
          const bathsText = typeof listing.bathrooms === 'number' ? listing.bathrooms + ' ba' : '';
          const ratingText = typeof listing.ratingAverage === 'number' ? listing.ratingAverage.toFixed(1) + ' rating' : '';
          const locationParts = [listing.neighborhood, listing.city].filter(function(v) { return !!v; });
          const locationText = locationParts.join(', ');

          const noteText = item.note || '';

          li.innerHTML = `
            <div class="shortlist-item-card__main">
              <div class="shortlist-item-card__details">
                <button type="button" class="shortlist-item-card__title" data-action="view-listing">
                  ${listing.title ? escapeHtml(listing.title) : 'Untitled listing'}
                </button>
                <div class="shortlist-item-card__meta">
                  ${locationText ? `<span class="shortlist-item-card__meta-item">${escapeHtml(locationText)}</span>` : ''}
                  ${bedsText ? `<span class="shortlist-item-card__meta-item">${escapeHtml(bedsText)}</span>` : ''}
                  ${bathsText ? `<span class="shortlist-item-card__meta-item">${escapeHtml(bathsText)}</span>` : ''}
                  ${priceText ? `<span class="shortlist-item-card__meta-item shortlist-item-card__meta-item--price">${escapeHtml(priceText)}</span>` : ''}
                  ${ratingText ? `<span class="shortlist-item-card__meta-item">${escapeHtml(ratingText)}</span>` : ''}
                </div>
              </div>
              <div class="shortlist-item-card__actions" data-component="shortlist-item-actions">
                <button type="button" class="shortlist-item-card__action" data-action="convert-favorite-keep">Save to favorites</button>
                <button type="button" class="shortlist-item-card__action" data-action="convert-favorite-remove">Move to favorites</button>
                <button type="button" class="shortlist-item-card__action shortlist-item-card__action--danger" data-action="remove-shortlist-item">Remove</button>
                <button type="button" class="shortlist-item-card__action shortlist-item-card__action--secondary shortlist-item-card__action--hidden" data-action="view-favorites">View in favorites</button>
              </div>
            </div>
            <div class="shortlist-item-card__note" data-component="shortlist-item-note-editor">
              <label class="shortlist-item-card__note-label" for="note-${item.shortlistItemId}">
                Note
              </label>
              <textarea
                id="note-${item.shortlistItemId}"
                class="shortlist-item-card__note-input"
                rows="2"
                data-action="edit-note-input"
                placeholder="Add a private note about this place"
              >${escapeHtml(noteText)}</textarea>
              <div class="shortlist-item-card__note-footer">
                <button type="button" class="shortlist-item-card__note-save" data-action="save-note">Save note</button>
                <span class="shortlist-item-card__note-status" aria-live="polite"></span>
              </div>
            </div>
          `;

          container.appendChild(li);
        });
      }

      function escapeHtml(str) {
        if (typeof str !== 'string') return '';
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function loadShortlistItems(shortlistId) {
        if (!shortlistId) {
          state.items = [];
          state.activeShortlistMeta = null;
          renderSummaryHeader();
          renderEmptyState(emptyStateContainer, false, 0);
          renderItems(itemsListContainer, []);
          return;
        }
        try {
          const result = WebsiteSDK.getShortlistItems(shortlistId);
          const shortlist = result && result.shortlist ? result.shortlist : null;
          const items = result && Array.isArray(result.items) ? result.items : [];
          state.items = items;
          state.activeShortlistMeta = shortlist;
          renderSummaryHeader();
          renderEmptyState(emptyStateContainer, true, items.length);
          renderItems(itemsListContainer, items);
          setGlobalStatus('');
        } catch (e) {
          console.error('Error loading shortlist items', e);
          setGlobalStatus('We could not load this shortlist right now. Please try again.');
          renderEmptyState(emptyStateContainer, true, 0);
          renderItems(itemsListContainer, []);
        }
      }

      function initializeShortlists() {
        try {
          const result = WebsiteSDK.getShortlists();
          const shortlists = result && Array.isArray(result.shortlists) ? result.shortlists : [];
          state.shortlists = shortlists;

          // Determine active shortlist based on URL param or first available
          let activeId = null;
          if (shortlists.length > 0) {
            if (initialShortlistIdParam) {
              const exists = shortlists.some(function(sl) { return sl.id === initialShortlistIdParam; });
              if (exists) {
                activeId = initialShortlistIdParam;
              } else {
                activeId = shortlists[0].id;
              }
            } else {
              activeId = shortlists[0].id;
            }
          }
          state.activeShortlistId = activeId;
          state.lastLoadedFromUrlParam = activeId;

          renderShortlists(shortlistListContainer, state.shortlists, state.activeShortlistId);
          renderSummaryHeader();
          renderEmptyState(emptyStateContainer, !!state.activeShortlistId, 0);

          if (state.activeShortlistId) {
            syncUrlWithActiveShortlist(true);
            loadShortlistItems(state.activeShortlistId);
          } else {
            syncUrlWithActiveShortlist(true);
            setGlobalStatus('Create your first shortlist to start collecting apartments.');
          }
        } catch (e) {
          console.error('Error loading shortlists', e);
          if (summaryNameContainer) {
            summaryNameContainer.textContent = 'Shortlists are unavailable';
          }
          if (summaryDescriptionContainer) {
            summaryDescriptionContainer.textContent = 'We could not fetch your shortlists. Please refresh the page.';
          }
          if (emptyStateContainer) {
            emptyStateContainer.textContent = '';
          }
          setGlobalStatus('');
        }
      }

      // History navigation: keep URL as source of truth for active shortlist
      window.addEventListener('popstate', function(event) {
        const currentUrl = new URL(window.location.href);
        const idFromUrl = currentUrl.searchParams.get('shortlistId');
        if (idFromUrl === state.activeShortlistId) return;

        // If no id or invalid id, fall back to first shortlist
        let newActiveId = null;
        if (idFromUrl && state.shortlists.some(function(sl) { return sl.id === idFromUrl; })) {
          newActiveId = idFromUrl;
        } else if (state.shortlists.length > 0) {
          newActiveId = state.shortlists[0].id;
        }
        state.activeShortlistId = newActiveId;
        renderShortlists(shortlistListContainer, state.shortlists, state.activeShortlistId);
        renderSummaryHeader();
        if (state.activeShortlistId) {
          loadShortlistItems(state.activeShortlistId);
        } else {
          renderEmptyState(emptyStateContainer, false, 0);
          renderItems(itemsListContainer, []);
        }
      });

      // Generic click handler based on data-action (with delegation)
      document.addEventListener('click', function(event) {
        const target = event.target.closest('[data-action]');
        if (!target) return;
        const action = target.getAttribute('data-action');

        switch (action) {
          case 'open-create-shortlist':
            if (selectorForm) {
              selectorForm.classList.remove('shortlist-selector__form--hidden');
            }
            if (selectorFormNameInput) {
              selectorFormNameInput.focus();
            }
            if (createFeedbackContainer) {
              createFeedbackContainer.textContent = '';
            }
            break;

          case 'cancel-create-shortlist':
            if (selectorForm) {
              selectorForm.classList.add('shortlist-selector__form--hidden');
            }
            if (selectorFormNameInput) {
              selectorFormNameInput.value = '';
            }
            if (selectorFormDescriptionInput) {
              selectorFormDescriptionInput.value = '';
            }
            if (createFeedbackContainer) {
              createFeedbackContainer.textContent = '';
            }
            break;

          case 'select-shortlist': {
            const shortlistId = target.getAttribute('data-shortlist-id');
            if (!shortlistId || shortlistId === state.activeShortlistId) return;
            state.activeShortlistId = shortlistId;
            renderShortlists(shortlistListContainer, state.shortlists, state.activeShortlistId);
            renderSummaryHeader();
            syncUrlWithActiveShortlist(false);
            loadShortlistItems(state.activeShortlistId);
            break;
          }

          case 'toggle-add-listing-form':
            if (addListingForm) {
              addListingForm.classList.toggle('shortlist-add__form--hidden');
              if (!addListingForm.classList.contains('shortlist-add__form--hidden') && addListingIdInput) {
                addListingIdInput.focus();
              }
            }
            if (addListingFeedbackContainer) {
              addListingFeedbackContainer.textContent = '';
            }
            break;

          case 'cancel-add-listing':
            if (addListingForm) {
              addListingForm.classList.add('shortlist-add__form--hidden');
            }
            if (addListingIdInput) {
              addListingIdInput.value = '';
            }
            if (addListingNoteInput) {
              addListingNoteInput.value = '';
            }
            if (addListingFeedbackContainer) {
              addListingFeedbackContainer.textContent = '';
            }
            break;

          case 'controller-scroll-top':
            window.scrollTo({ top: 0, behavior: 'smooth' });
            break;

          case 'view-listing': {
            const card = target.closest('[data-shortlist-item-id]');
            if (!card) return;
            const listingId = card.getAttribute('data-listing-id');
            if (!listingId) return;
            window.location.href = 'listing.html?listingId=' + encodeURIComponent(listingId);
            break;
          }

          case 'remove-shortlist-item': {
            const card = target.closest('[data-shortlist-item-id]');
            if (!card) return;
            const itemId = card.getAttribute('data-shortlist-item-id');
            if (!itemId) return;
            const confirmed = window.confirm('Remove this listing from the shortlist?');
            if (!confirmed) return;
            try {
              const result = WebsiteSDK.removeShortlistItem(itemId);
              if (result && result.success) {
                // Remove from state
                state.items = state.items.filter(function(it) { return it.shortlistItemId !== itemId; });
                // Remove from DOM
                card.parentNode.removeChild(card);
                renderSummaryHeader();
                renderEmptyState(emptyStateContainer, !!state.activeShortlistId, state.items.length);
              } else {
                window.alert('We could not remove this item. Please try again.');
              }
            } catch (e) {
              console.error('Error removing shortlist item', e);
              window.alert('We could not remove this item. Please try again.');
            }
            break;
          }

          case 'convert-favorite-keep':
          case 'convert-favorite-remove': {
            const card = target.closest('[data-shortlist-item-id]');
            if (!card) return;
            const itemId = card.getAttribute('data-shortlist-item-id');
            if (!itemId) return;
            const keepInShortlist = action === 'convert-favorite-keep';
            try {
              const result = WebsiteSDK.convertShortlistItemToFavorite(itemId, keepInShortlist);
              if (result && result.success) {
                const viewFavBtn = card.querySelector('[data-action="view-favorites"]');
                if (viewFavBtn) {
                  viewFavBtn.classList.remove('shortlist-item-card__action--hidden');
                }
                if (!keepInShortlist) {
                  state.items = state.items.filter(function(it) { return it.shortlistItemId !== itemId; });
                  card.parentNode.removeChild(card);
                  renderSummaryHeader();
                  renderEmptyState(emptyStateContainer, !!state.activeShortlistId, state.items.length);
                }
              } else {
                window.alert('We could not save this listing to favorites. Please try again.');
              }
            } catch (e) {
              console.error('Error converting shortlist item to favorite', e);
              window.alert('We could not save this listing to favorites. Please try again.');
            }
            break;
          }

          case 'view-favorites':
            window.location.href = 'favorites.html';
            break;
        }
      });

      // Blur handler for note auto-save
      document.addEventListener('blur', function(event) {
        const target = event.target;
        if (!target || target.getAttribute('data-action') !== 'edit-note-input') return;
        const card = target.closest('[data-shortlist-item-id]');
        if (!card) return;
        const itemId = card.getAttribute('data-shortlist-item-id');
        if (!itemId) return;
        const noteText = target.value || '';
        const statusEl = card.querySelector('.shortlist-item-card__note-status');
        if (statusEl) {
          statusEl.textContent = 'Savinga0a0';
        }
        try {
          const result = WebsiteSDK.updateShortlistItemNote(itemId, noteText);
          if (result && result.success) {
            if (statusEl) {
              statusEl.textContent = 'Saved';
            }
            // Update local state for this item
            state.items = state.items.map(function(it) {
              if (it.shortlistItemId === itemId) {
                return Object.assign({}, it, { note: noteText });
              }
              return it;
            });
          } else if (statusEl) {
            statusEl.textContent = 'Could not save note';
          }
        } catch (e) {
          console.error('Error saving note on blur', e);
          if (statusEl) {
            statusEl.textContent = 'Could not save note';
          }
        }
      }, true);

      // Explicit save-note handler (click)
      document.addEventListener('click', function(event) {
        const target = event.target.closest('[data-action="save-note"]');
        if (!target) return;
        const card = target.closest('[data-shortlist-item-id]');
        if (!card) return;
        const itemId = card.getAttribute('data-shortlist-item-id');
        if (!itemId) return;
        const textarea = card.querySelector('[data-action="edit-note-input"]');
        if (!textarea) return;
        const noteText = textarea.value || '';
        const statusEl = card.querySelector('.shortlist-item-card__note-status');
        if (statusEl) {
          statusEl.textContent = 'Savinga0a0';
        }
        try {
          const result = WebsiteSDK.updateShortlistItemNote(itemId, noteText);
          if (result && result.success) {
            if (statusEl) {
              statusEl.textContent = 'Saved';
            }
            state.items = state.items.map(function(it) {
              if (it.shortlistItemId === itemId) {
                return Object.assign({}, it, { note: noteText });
              }
              return it;
            });
          } else if (statusEl) {
            statusEl.textContent = 'Could not save note';
          }
        } catch (e) {
          console.error('Error saving note', e);
          if (statusEl) {
            statusEl.textContent = 'Could not save note';
          }
        }
      });

      // Create shortlist form submit
      if (selectorForm) {
        selectorForm.addEventListener('submit', function(event) {
          event.preventDefault();
          if (!selectorFormNameInput) return;
          const name = selectorFormNameInput.value.trim();
          const description = selectorFormDescriptionInput ? selectorFormDescriptionInput.value.trim() : '';
          if (!name) {
            if (createFeedbackContainer) {
              createFeedbackContainer.textContent = 'Please enter a name for your shortlist.';
            }
            return;
          }
          try {
            const result = WebsiteSDK.createShortlist(name, description || undefined);
            const shortlist = result && result.shortlist ? result.shortlist : null;
            if (!shortlist || !shortlist.id) {
              if (createFeedbackContainer) {
                createFeedbackContainer.textContent = 'We could not create this shortlist. Please try again.';
              }
              return;
            }
            state.shortlists.push(shortlist);
            state.activeShortlistId = shortlist.id;
            state.activeShortlistMeta = shortlist;
            state.items = [];
            renderShortlists(shortlistListContainer, state.shortlists, state.activeShortlistId);
            renderSummaryHeader();
            renderEmptyState(emptyStateContainer, true, 0);
            renderItems(itemsListContainer, []);
            syncUrlWithActiveShortlist(false);
            if (createFeedbackContainer) {
              createFeedbackContainer.textContent = 'Shortlist created.';
            }
            selectorForm.classList.add('shortlist-selector__form--hidden');
            selectorForm.reset();
          } catch (e) {
            console.error('Error creating shortlist', e);
            if (createFeedbackContainer) {
              createFeedbackContainer.textContent = 'We could not create this shortlist. Please try again.';
            }
          }
        });
      }

      // Add listing to active shortlist form submit
      if (addListingForm) {
        addListingForm.addEventListener('submit', function(event) {
          event.preventDefault();
          if (!state.activeShortlistId) {
            if (addListingFeedbackContainer) {
              addListingFeedbackContainer.textContent = 'Select or create a shortlist first.';
            }
            return;
          }
          const listingId = addListingIdInput ? addListingIdInput.value.trim() : '';
          const note = addListingNoteInput ? addListingNoteInput.value.trim() : '';
          if (!listingId) {
            if (addListingFeedbackContainer) {
              addListingFeedbackContainer.textContent = 'Please enter a listing ID.';
            }
            return;
          }
          try {
            const result = WebsiteSDK.addListingToShortlist(listingId, state.activeShortlistId, note || undefined, false, '');
            if (result && result.success) {
              if (addListingFeedbackContainer) {
                addListingFeedbackContainer.textContent = 'Listing added to shortlist.';
              }
              // Reload items to reflect the new entry
              loadShortlistItems(state.activeShortlistId);
              addListingForm.classList.add('shortlist-add__form--hidden');
              addListingForm.reset();
            } else if (addListingFeedbackContainer) {
              addListingFeedbackContainer.textContent = 'We could not add this listing. Please check the ID and try again.';
            }
          } catch (e) {
            console.error('Error adding listing to shortlist', e);
            if (addListingFeedbackContainer) {
              addListingFeedbackContainer.textContent = 'We could not add this listing. Please try again.';
            }
          }
        });
      }

      // Initialize page controller & data
      initializeShortlists();
    });
  </script>
</body>
</html>
