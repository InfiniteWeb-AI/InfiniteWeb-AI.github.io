<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Kulcs - Hajnal Apartment</title>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
  <!-- Global styles -->
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='search_results.css'>
</head>
<body class='page page--hero'>
  <div class='site-shell'>
    <header class='site-header'>
      <div class='site-header__inner'>
        <div class='site-brand'>
          <a href='index.html' class='site-brand__link'>Kulcs - Hajnal Apartment</a>
        </div>
        <nav class='site-nav' aria-label='Primary'>
          <ul class='site-nav__list'>
            <li class='site-nav__item'>
              <a href='index.html' class='site-nav__link site-nav__link--active'>Home</a>
            </li>
            <li class='site-nav__item'>
              <a href='favorites.html' class='site-nav__link'>Favorites</a>
            </li>
            <li class='site-nav__item'>
              <a href='shortlist.html' class='site-nav__link'>Shortlists</a>
            </li>
            <li class='site-nav__item'>
              <a href='alerts.html' class='site-nav__link'>Alerts</a>
            </li>
            <li class='site-nav__item'>
              <a href='help.html' class='site-nav__link'>Help</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='site-main__center'>
        <div class='search-results-page' data-component='search-results-page'>
          <div class='search-results-page__map-layer' data-component='map-view-panel' data-populate='map-view' aria-hidden='false'></div>

          <div class='search-results-page__column'>
            <section class='search-query-bar' data-component='search-query-bar' aria-label='Search'>
              <form class='search-query-bar__form' data-action='submit-search'>
                <div class='search-query-bar__row'>
                  <label class='search-query-bar__field'>
                    <span class='search-query-bar__label'>Location</span>
                    <input type='text' name='location' placeholder='Where do you want to stay?' autocomplete='off'>
                  </label>
                  <label class='search-query-bar__field search-query-bar__field--date'>
                    <span class='search-query-bar__label'>Check-in</span>
                    <input type='date' name='checkIn'>
                  </label>
                  <label class='search-query-bar__field search-query-bar__field--date'>
                    <span class='search-query-bar__label'>Check-out</span>
                    <input type='date' name='checkOut'>
                  </label>
                  <label class='search-query-bar__field search-query-bar__field--guests'>
                    <span class='search-query-bar__label'>Adults</span>
                    <input type='number' name='adults' min='1' placeholder='1'>
                  </label>
                  <label class='search-query-bar__field search-query-bar__field--guests'>
                    <span class='search-query-bar__label'>Children</span>
                    <input type='number' name='children' min='0' placeholder='0'>
                  </label>
                  <label class='search-query-bar__field search-query-bar__field--guests'>
                    <span class='search-query-bar__label'>Infants</span>
                    <input type='number' name='infants' min='0' placeholder='0'>
                  </label>
                  <label class='search-query-bar__field search-query-bar__field--booking-type'>
                    <span class='search-query-bar__label'>Booking type</span>
                    <select name='bookingType'>
                      <option value=''>Any</option>
                      <option value='short_term_stay'>Short-term stay</option>
                      <option value='long_term_rental'>Long-term rental</option>
                      <option value='both'>Both</option>
                    </select>
                  </label>
                  <div class='search-query-bar__actions'>
                    <button type='submit' class='button button--primary'>Search</button>
                  </div>
                </div>
              </form>
            </section>

            <section class='filter-toolbar' data-component='filter-toolbar' aria-label='Filters'>
              <div class='filter-toolbar__row'>
                <div class='filter-toolbar__group filter-toolbar__group--price'>
                  <span class='filter-toolbar__group-label'>Price / month</span>
                  <input type='number' class='filter-toolbar__input' placeholder='Min' data-action='change-min-price-monthly' data-filter='min-price-monthly'>
                  <input type='number' class='filter-toolbar__input' placeholder='Max' data-action='change-max-price-monthly' data-filter='max-price-monthly'>
                </div>
                <div class='filter-toolbar__group filter-toolbar__group--nightly'>
                  <span class='filter-toolbar__group-label'>Max nightly</span>
                  <input type='number' class='filter-toolbar__input' placeholder='Max' data-action='change-max-price-nightly' data-filter='max-price-nightly'>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__label' for='filter-bedrooms'>Bedrooms</label>
                  <select id='filter-bedrooms' class='filter-toolbar__select' name='bedrooms' data-action='change-bedrooms' data-populate='bedroom-options'></select>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__label' for='filter-rating'>Rating</label>
                  <select id='filter-rating' class='filter-toolbar__select' name='ratingMin' data-action='change-rating-min' data-populate='rating-options'></select>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__checkbox'>
                    <input type='checkbox' data-action='toggle-petFriendly'>
                    <span>Pet friendly</span>
                  </label>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__checkbox'>
                    <input type='checkbox' data-action='toggle-hasParking'>
                    <span>Parking</span>
                  </label>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__checkbox'>
                    <input type='checkbox' data-action='toggle-hasInUnitLaundry'>
                    <span>In-unit laundry</span>
                  </label>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__checkbox'>
                    <input type='checkbox' data-action='toggle-hasGym'>
                    <span>Gym</span>
                  </label>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__checkbox'>
                    <input type='checkbox' data-action='toggle-hasWifi'>
                    <span>Wi-Fi</span>
                  </label>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__checkbox'>
                    <input type='checkbox' data-action='toggle-freeCancellation'>
                    <span>Free cancellation</span>
                  </label>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__checkbox'>
                    <input type='checkbox' data-action='toggle-onlineApplication'>
                    <span>Online application</span>
                  </label>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__label' for='filter-move-in-by'>Move in by</label>
                  <input type='date' id='filter-move-in-by' class='filter-toolbar__input' data-action='change-move-in-by'>
                </div>
              </div>
              <div class='filter-toolbar__row filter-toolbar__row--secondary'>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__label' for='filter-property-types'>Property type</label>
                  <select id='filter-property-types' class='filter-toolbar__select' multiple data-action='change-property-types' data-populate='property-type-options'></select>
                </div>
                <div class='filter-toolbar__group'>
                  <label class='filter-toolbar__label' for='filter-amenities'>Amenities</label>
                  <select id='filter-amenities' class='filter-toolbar__select' multiple data-action='change-amenities' data-populate='amenity-options'></select>
                </div>
                <button type='button' class='filter-toolbar__clear' data-action='clear-filters'>Clear filters</button>
              </div>
            </section>

            <section class='distance-controls' data-component='distance-and-landmark-controls' aria-label='Distance and landmarks'>
              <div class='distance-controls__row'>
                <div class='distance-controls__group'>
                  <label class='distance-controls__label' for='filter-landmark'>Near</label>
                  <select id='filter-landmark' class='distance-controls__select' data-action='change-landmark' data-populate='landmarks'>
                    <option value=''>Any landmark</option>
                  </select>
                </div>
                <div class='distance-controls__group'>
                  <label class='distance-controls__label' for='filter-reference-location'>Reference area</label>
                  <input type='text' id='filter-reference-location' class='distance-controls__input' placeholder='e.g. Downtown' data-action='change-reference-location'>
                </div>
                <div class='distance-controls__group'>
                  <label class='distance-controls__label' for='filter-distance'>Max distance</label>
                  <select id='filter-distance' class='distance-controls__select' data-action='change-distance' data-populate='distance-options'>
                    <option value=''>Any</option>
                  </select>
                </div>
                <button type='button' class='distance-controls__clear' data-action='clear-distance-filter'>Clear distance</button>
              </div>
            </section>

            <section class='results-header' aria-label='Results summary and sorting'>
              <div class='results-header__row'>
                <div class='results-header__summary' data-component='results-summary-bar' data-populate='results-summary'></div>
                <div class='results-header__controls' data-component='sort-and-view-controls'>
                  <label class='results-header__sort-label' for='sort-select'>Sort</label>
                  <select id='sort-select' class='results-header__sort-select' data-action='change-sort' data-populate='sort-options'></select>
                  <div class='results-header__view-toggle'>
                    <button type='button' class='results-header__view-button' data-action='toggle-view-list' aria-pressed='true'>List</button>
                    <button type='button' class='results-header__view-button' data-action='toggle-view-map' aria-pressed='false'>Map</button>
                  </div>
                </div>
              </div>
            </section>

            <section class='listing-results' data-component='listing-results-list' aria-label='Search results'>
              <ul class='listing-list' data-populate='listings'></ul>
            </section>

            <nav class='pagination' data-component='pagination-controls' aria-label='Pagination' data-populate='pagination'></nav>
          </div>

          <div class='map-pin-preview' data-component='map-pin-preview-card' hidden></div>

          <div class='comparison-bar' data-component='comparison-bar' hidden>
            <div class='comparison-bar__inner'>
              <span class='comparison-bar__count' data-populate='compare-count'>0 in comparison</span>
              <button type='button' class='comparison-bar__button' data-action='open-comparison'>Open comparison</button>
              <button type='button' class='comparison-bar__dismiss' data-action='hide-comparison-bar'>Hide</button>
            </div>
          </div>

          <div class='shortlist-modal' data-component='shortlist-modal' hidden aria-hidden='true'>
            <div class='shortlist-modal__backdrop'></div>
            <div class='shortlist-modal__panel' role='dialog' aria-modal='true' aria-labelledby='shortlist-modal-title'>
              <h2 id='shortlist-modal-title' class='shortlist-modal__title'>Add to shortlist</h2>
              <form class='shortlist-modal__form' data-action='submit-shortlist'>
                <div class='shortlist-modal__field'>
                  <label for='shortlist-name'>Shortlist name</label>
                  <input type='text' id='shortlist-name' name='shortlistName' required>
                </div>
                <div class='shortlist-modal__field'>
                  <label for='shortlist-note'>Note (optional)</label>
                  <textarea id='shortlist-note' name='shortlistNote' rows='3'></textarea>
                </div>
                <div class='shortlist-modal__actions'>
                  <button type='submit' class='button button--primary'>Save</button>
                  <button type='button' class='button button--ghost' data-action='cancel-shortlist'>Cancel</button>
                </div>
              </form>
            </div>
          </div>

          <aside class='save-search-toolbar' data-component='save-search-alert-toolbar'>
            <button type='button' class='save-search-toolbar__toggle' data-action='open-save-search-form'>Save search</button>
            <div class='save-search-toolbar__panel' hidden>
              <form class='save-search-toolbar__form' data-action='submit-save-search'>
                <div class='save-search-toolbar__field'>
                  <label for='alert-name'>Alert name</label>
                  <input type='text' id='alert-name' name='alertName' required>
                </div>
                <div class='save-search-toolbar__field'>
                  <label for='alert-email'>Email</label>
                  <input type='email' id='alert-email' name='alertEmail' required>
                </div>
                <div class='save-search-toolbar__field'>
                  <label for='alert-frequency'>Frequency</label>
                  <select id='alert-frequency' name='alertFrequency'>
                    <option value='instant'>Instant</option>
                    <option value='daily'>Daily</option>
                    <option value='weekly'>Weekly</option>
                    <option value='monthly'>Monthly</option>
                  </select>
                </div>
                <div class='save-search-toolbar__field save-search-toolbar__field--toggle'>
                  <label>
                    <input type='checkbox' name='alertEmailEnabled' checked>
                    <span>Email notifications</span>
                  </label>
                </div>
                <div class='save-search-toolbar__actions'>
                  <button type='submit' class='button button--primary'>Create alert</button>
                  <button type='button' class='button button--ghost' data-action='close-save-search-form'>Close</button>
                  <button type='button' class='button button--link' data-action='manage-alerts'>Manage alerts</button>
                </div>
                <div class='save-search-toolbar__status' aria-live='polite'></div>
              </form>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <footer class='site-footer'>
      <nav class='site-footer__nav' aria-label='Footer'>
        <a href='about.html' class='site-footer__link'>About</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='contact.html' class='site-footer__link'>Contact</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='help.html' class='site-footer__link'>Help &amp; FAQ</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='terms.html' class='site-footer__link'>Terms of Use</a>
        <span class='site-footer__separator' aria-hidden='true'>•</span>
        <a href='privacy.html' class='site-footer__link'>Privacy Policy</a>
      </nav>
      <div class='site-footer__meta'>
        <span class='site-footer__copyright'>&copy; Kulcs - Hajnal Apartment <span class='site-footer__year'>2026</span></span>
      </div>
    </footer>

    <!-- Decorative lock indicator matching the maintenance design; non-interactive by design -->
    <div class='lock-indicator' aria-hidden='true'>
      &#128274;
    </div>
  </div>

  <script src='business_logic.js'></script>
  <script>
  (function() {
    'use strict';

    var pageState = {
      urlParams: new URLSearchParams(window.location.search),
      filterOptions: null,
      searchResults: null,
      landmarks: [],
      landmarksCity: null,
      compareListId: null,
      compareItemCount: 0,
      lastAlert: null
    };

    var filterParamNames = [
      'minPriceMonthly',
      'maxPriceMonthly',
      'maxPriceNightly',
      'bedrooms',
      'ratingMin',
      'petFriendly',
      'hasParking',
      'hasInUnitLaundry',
      'hasGym',
      'hasWifi',
      'freeCancellation',
      'onlineApplication',
      'moveInBy',
      'propertyTypes',
      'amenities',
      'referenceLandmarkId',
      'referenceLocationName',
      'maxDistanceMeters'
    ];

    document.addEventListener('DOMContentLoaded', function() {
      setupEventHandlers();
      applyViewFromUrl();
      initializeData();
    });

    window.addEventListener('popstate', function() {
      pageState.urlParams = new URLSearchParams(window.location.search);
      applyViewFromUrl();
      initializeData();
    });

    function setupEventHandlers() {
      document.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');
        if (!action) {
          return;
        }
        if (action === 'submit-search' || action.indexOf('submit-') === 0) {
          return;
        }
        event.preventDefault();
        handleActionClick(target, action, event);
      });

      document.addEventListener('change', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');
        if (!action) {
          return;
        }
        handleActionChange(target, action, event);
      });

      document.addEventListener('submit', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');
        if (!action) {
          return;
        }
        event.preventDefault();
        handleActionSubmit(target, action, event);
      });
    }

    function handleActionClick(target, action) {
      if (action === 'toggle-favorite') {
        handleToggleFavorite(target);
      } else if (action === 'add-to-compare') {
        handleAddToCompare(target);
      } else if (action === 'add-to-shortlist') {
        openShortlistModal(target);
      } else if (action === 'view-details') {
        navigateToListing(target);
      } else if (action === 'change-page') {
        changePageFromElement(target);
      } else if (action === 'open-comparison') {
        window.location.href = 'compare.html';
      } else if (action === 'hide-comparison-bar') {
        hideComparisonBar();
      } else if (action === 'clear-filters') {
        clearAllFilters();
      } else if (action === 'toggle-view-list') {
        toggleViewMode('list');
      } else if (action === 'toggle-view-map') {
        toggleViewMode('map');
      } else if (action === 'open-pin-preview') {
        openPinPreview(target);
      } else if (action === 'close-pin-preview') {
        closePinPreview();
      } else if (action === 'open-save-search-form') {
        openSaveSearchForm();
      } else if (action === 'close-save-search-form') {
        closeSaveSearchForm();
      } else if (action === 'manage-alerts') {
        window.location.href = 'alerts.html';
      } else if (action === 'clear-distance-filter') {
        clearDistanceFilter();
      }
    }

    function handleActionChange(target, action) {
      if (action === 'change-min-price-monthly') {
        var v1 = target.value || '';
        var updates1 = { minPriceMonthly: v1 };
        applyUrlUpdates(updates1, { refresh: true, resetPage: true });
      } else if (action === 'change-max-price-monthly') {
        var v2 = target.value || '';
        var updates2 = { maxPriceMonthly: v2 };
        applyUrlUpdates(updates2, { refresh: true, resetPage: true });
      } else if (action === 'change-max-price-nightly') {
        var vn = target.value || '';
        var updatesN = { maxPriceNightly: vn };
        applyUrlUpdates(updatesN, { refresh: true, resetPage: true });
      } else if (action === 'change-bedrooms') {
        var beds = target.value || '';
        var updates3 = { bedrooms: beds };
        applyUrlUpdates(updates3, { refresh: true, resetPage: true });
      } else if (action === 'change-rating-min') {
        var rating = target.value || '';
        var updates4 = { ratingMin: rating };
        applyUrlUpdates(updates4, { refresh: true, resetPage: true });
      } else if (action === 'change-move-in-by') {
        var moveIn = target.value || '';
        var updates5 = { moveInBy: moveIn };
        applyUrlUpdates(updates5, { refresh: true, resetPage: true });
      } else if (action === 'change-property-types') {
        var types = collectMultiSelectValues(target);
        var updates6 = { propertyTypes: types.join(',') };
        applyUrlUpdates(updates6, { refresh: true, resetPage: true });
      } else if (action === 'change-amenities') {
        var am = collectMultiSelectValues(target);
        var updates7 = { amenities: am.join(',') };
        applyUrlUpdates(updates7, { refresh: true, resetPage: true });
      } else if (action === 'change-landmark') {
        var lid = target.value || '';
        var up = {
          referenceLandmarkId: lid,
          referenceLocationName: ''
        };
        applyUrlUpdates(up, { refresh: true, resetPage: true });
      } else if (action === 'change-reference-location') {
        var refName = target.value || '';
        var up2 = {
          referenceLocationName: refName,
          referenceLandmarkId: ''
        };
        applyUrlUpdates(up2, { refresh: true, resetPage: true });
      } else if (action === 'change-distance') {
        var dist = target.value || '';
        var up3 = { maxDistanceMeters: dist };
        applyUrlUpdates(up3, { refresh: true, resetPage: true });
      } else if (action === 'change-sort') {
        var sortKey = target.value || '';
        var up4 = { sort: sortKey };
        applyUrlUpdates(up4, { refresh: true, resetPage: true });
      } else if (action === 'change-page-size') {
        var size = target.value || '';
        var up5 = { pageSize: size };
        applyUrlUpdates(up5, { refresh: true, resetPage: true });
      } else if (action.indexOf('toggle-') === 0) {
        var param = action.substring('toggle-'.length);
        var checked = target.checked;
        var updates8 = {};
        updates8[param] = checked ? 'true' : '';
        applyUrlUpdates(updates8, { refresh: true, resetPage: true });
      }
    }

    function handleActionSubmit(target, action) {
      if (action === 'submit-search') {
        handleSubmitSearch(target);
      } else if (action === 'submit-shortlist') {
        handleSubmitShortlist(target);
      } else if (action === 'submit-save-search') {
        handleSubmitSaveSearch(target);
      }
    }

    function collectMultiSelectValues(selectEl) {
      var values = [];
      var options = selectEl.options;
      var i;
      for (i = 0; i < options.length; i += 1) {
        if (options[i].selected && options[i].value) {
          values.push(options[i].value);
        }
      }
      return values;
    }

    function applyUrlUpdates(updates, options) {
      var opts = options || {};
      var resetPage = !!opts.resetPage;
      var refresh = opts.refresh !== false;
      var params = new URLSearchParams(window.location.search);
      var keys = Object.keys(updates || {});
      var i;
      for (i = 0; i < keys.length; i += 1) {
        var key = keys[i];
        var value = updates[key];
        if (value === undefined || value === null || value === '') {
          params.delete(key);
        } else {
          params.set(key, String(value));
        }
      }
      if (resetPage) {
        params.delete('page');
      }
      var newQuery = params.toString();
      var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
      window.history.pushState(null, '', newUrl);
      pageState.urlParams = new URLSearchParams(window.location.search);
      if (refresh) {
        applyViewFromUrl();
        initializeData();
      } else {
        applyViewFromUrl();
      }
    }

    function applyViewFromUrl() {
      var params = new URLSearchParams(window.location.search);
      var view = params.get('view') || 'list';
      var pageEl = document.querySelector('.search-results-page');
      if (!pageEl) {
        return;
      }
      pageEl.setAttribute('data-view-mode', view);
      var listBtn = document.querySelector('[data-action="toggle-view-list"]');
      var mapBtn = document.querySelector('[data-action="toggle-view-map"]');
      if (listBtn && mapBtn) {
        if (view === 'map') {
          listBtn.setAttribute('aria-pressed', 'false');
          mapBtn.setAttribute('aria-pressed', 'true');
        } else {
          listBtn.setAttribute('aria-pressed', 'true');
          mapBtn.setAttribute('aria-pressed', 'false');
        }
      }
    }

    function toggleViewMode(mode) {
      var updates = { view: mode };
      applyUrlUpdates(updates, { refresh: false, resetPage: false });
    }

    function initializeData() {
      var params = pageState.urlParams;
      populateSearchQueryBar(params);
      var locationText = params.get('location');
      if (!locationText) {
        renderEmptyState();
        return;
      }
      var bookingType = params.get('bookingType');
      try {
        pageState.filterOptions = WebsiteSDK.getSearchFilterOptions(locationText, bookingType || undefined);
      } catch (e) {
        console.error('getSearchFilterOptions failed', e);
        pageState.filterOptions = null;
      }
      renderFilterControls(pageState.filterOptions, params);
      executeSearch();
    }

    function populateSearchQueryBar(params) {
      var form = document.querySelector('.search-query-bar__form');
      if (!form) {
        return;
      }
      var locationInput = form.querySelector('input[name="location"]');
      var checkInInput = form.querySelector('input[name="checkIn"]');
      var checkOutInput = form.querySelector('input[name="checkOut"]');
      var adultsInput = form.querySelector('input[name="adults"]');
      var childrenInput = form.querySelector('input[name="children"]');

      var summaryEl = document.querySelector('[data-populate="results-summary"]');
      if (summaryEl) {
        summaryEl.innerHTML = '' +

        mapEl.innerHTML = '<div class="map-view-panel__placeholder">Map will appear here after you run a search.</div>';

    function executeSearch() {
      var params = pageState.urlParams;
      var locationText = params.get('location');
      if (!locationText) {
        return;
      }

      var checkIn = params.get('checkIn');
      var checkOut = params.get('checkOut');
      var dateRange;
      if (checkIn && checkOut) {
        dateRange = { checkInDate: checkIn, checkOutDate: checkOut };
      }

      var guests;
      var adults = parseInt(params.get('adults') || '', 10);
      var children = parseInt(params.get('children') || '', 10);
      var infants = parseInt(params.get('infants') || '', 10);
      if (!isNaN(adults) || !isNaN(children) || !isNaN(infants)) {
        guests = {};
        if (!isNaN(adults)) {
          guests.adults = adults;
        }
        if (!isNaN(children)) {
          guests.children = children;
        }
        if (!isNaN(infants)) {
          guests.infants = infants;
        }
      }

      var filters = buildFiltersFromParams(params);
      var sortParam = params.get('sort');
      var bookingType = params.get('bookingType');
      var sort = buildSortObject(sortParam, bookingType);

      var page = parseInt(params.get('page') || '', 10);
      if (isNaN(page)) {
        page = undefined;
      }
      var pageSize = parseInt(params.get('pageSize') || '', 10);
      if (isNaN(pageSize)) {
        pageSize = undefined;
      }

      var response;
      try {
        response = WebsiteSDK.searchListings(locationText, dateRange, guests, filters, sort, page, pageSize);
      } catch (e) {
        console.error('searchListings failed', e);
        response = null;
      }
      if (!response) {
        renderSearchError();
        return;
      }
      pageState.searchResults = response;
      renderSearchResults(response);
      maybeLoadLandmarks(response);
    }

    function renderSearchError() {
      var listEl = document.querySelector('[data-populate="listings"]');
      if (listEl) {
        listEl.innerHTML = '<li class="listing-list__empty">There was a problem loading results. Please try again.</li>';
      }
    }

    function buildFiltersFromParams(params) {
      var filters = {};

      function parseNumberParam(name) {
        var raw = params.get(name);
        if (!raw) {
          return undefined;
        }
        var num = parseFloat(raw);
        if (isNaN(num)) {
          return undefined;
        }
        return num;
      }

      function parseBooleanParam(name) {
        var raw = params.get(name);
        if (!raw) {
          return undefined;
        }
        if (raw === 'true' || raw === '1') {
          return true;
        }
        if (raw === 'false' || raw === '0') {
          return false;
        }
        return undefined;
      }

      var minPriceMonthly = parseNumberParam('minPriceMonthly');
      if (minPriceMonthly !== undefined) {
        filters.minPriceMonthly = minPriceMonthly;
      }
      var maxPriceMonthly = parseNumberParam('maxPriceMonthly');
      if (maxPriceMonthly !== undefined) {
        filters.maxPriceMonthly = maxPriceMonthly;
      }
      var maxPriceNightly = parseNumberParam('maxPriceNightly');
      if (maxPriceNightly !== undefined) {
        filters.maxPriceNightly = maxPriceNightly;
      }

      var bedrooms = parseNumberParam('bedrooms');
      if (bedrooms !== undefined) {
        filters.minBedrooms = bedrooms;
        filters.maxBedrooms = bedrooms;
      }

      var ratingMin = parseNumberParam('ratingMin');
      if (ratingMin !== undefined) {
        filters.ratingMin = ratingMin;
      }

      var petFriendly = parseBooleanParam('petFriendly');
      if (petFriendly !== undefined) {
        filters.petFriendly = petFriendly;
      }
      var hasParking = parseBooleanParam('hasParking');
      if (hasParking !== undefined) {
        filters.hasParking = hasParking;
      }
      var hasInUnitLaundry = parseBooleanParam('hasInUnitLaundry');
      if (hasInUnitLaundry !== undefined) {
        filters.hasInUnitLaundry = hasInUnitLaundry;
      }
      var hasGym = parseBooleanParam('hasGym');
      if (hasGym !== undefined) {
        filters.hasGym = hasGym;
      }
      var hasWifi = parseBooleanParam('hasWifi');
      if (hasWifi !== undefined) {
        filters.hasWifi = hasWifi;
      }
      var freeCancellation = parseBooleanParam('freeCancellation');
      if (freeCancellation !== undefined) {
        filters.freeCancellation = freeCancellation;
      }
      var onlineApp = parseBooleanParam('onlineApplication');
      if (onlineApp !== undefined) {
        filters.onlineApplicationAvailable = onlineApp;
      }

      var moveInBy = params.get('moveInBy');
      if (moveInBy) {
        filters.moveInByDate = moveInBy;
      }

      var bookingType = params.get('bookingType');
      if (bookingType) {
        filters.bookingType = bookingType;
      }

      var refLandmarkId = params.get('referenceLandmarkId');
      var refLocationName = params.get('referenceLocationName');
      if (refLandmarkId) {
        filters.referenceLandmarkId = refLandmarkId;
      } else if (refLocationName) {
        filters.referenceLocationName = refLocationName;
      }

      var maxDistance = parseNumberParam('maxDistanceMeters');
      if (maxDistance !== undefined) {
        filters.maxDistanceMeters = maxDistance;
      }

      var propertyTypesParam = params.get('propertyTypes');
      if (propertyTypesParam) {
        var types = propertyTypesParam.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
        if (types.length) {
          filters.propertyTypes = types;
        }
      }

      var amenitiesParam = params.get('amenities');
      if (amenitiesParam) {
        var am = amenitiesParam.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
        if (am.length) {
          filters.amenities = am;
        }
      }

      if (Object.keys(filters).length === 0) {
        return undefined;
      }
      return filters;
    }

    function buildSortObject(sortKey, bookingType) {
      if (!sortKey) {
        return undefined;
      }
      var sort = {};
      if (sortKey.indexOf('price') !== -1) {
        sort.sortBy = 'price';
        if (sortKey.indexOf('_asc') !== -1) {
          sort.sortOrder = 'asc';
        } else if (sortKey.indexOf('_desc') !== -1) {
          sort.sortOrder = 'desc';
        }
      } else if (sortKey.indexOf('rating') !== -1) {
        sort.sortBy = 'rating';
        if (sortKey.indexOf('_asc') !== -1) {
          sort.sortOrder = 'asc';
        } else if (sortKey.indexOf('_desc') !== -1) {
          sort.sortOrder = 'desc';
        }
      } else if (sortKey === 'relevance') {
        sort.sortBy = 'relevance';
      }
      if (sort.sortBy === 'price') {
        if (bookingType === 'long_term_rental') {
          sort.priceMetric = 'monthly';
        } else {
          sort.priceMetric = 'nightly';
        }
      }
      return sort;
    }

          ? String(filterOptions.priceMonthlyRange.max)
          : 'Max';
        maxPriceInput.value = params.get('maxPriceMonthly') || '';
      }
      var maxNightlyInput = document.querySelector('[data-filter="max-price-nightly"]');

          ? String(filterOptions.priceNightlyRange.max)

      var moveInInput = document.getElementById('filter-move-in-by');
      if (moveInInput) {
        moveInInput.value = params.get('moveInBy') || '';

      setCheckboxFromParam('petFriendly', params, '[data-action="toggle-petFriendly"]');
      setCheckboxFromParam('hasParking', params, '[data-action="toggle-hasParking"]');
      setCheckboxFromParam('hasInUnitLaundry', params, '[data-action="toggle-hasInUnitLaundry"]');
      setCheckboxFromParam('hasGym', params, '[data-action="toggle-hasGym"]');
      setCheckboxFromParam('hasWifi', params, '[data-action="toggle-hasWifi"]');
      setCheckboxFromParam('freeCancellation', params, '[data-action="toggle-freeCancellation"]');
      setCheckboxFromParam('onlineApplication', params, '[data-action="toggle-onlineApplication"]');

      var refLocationInput = document.getElementById('filter-reference-location');
      if (refLocationInput) {
        refLocationInput.value = params.get('referenceLocationName') || '';
      }
    }

    function setCheckboxFromParam(paramName, params, selector) {
      var el = document.querySelector(selector);
      if (!el) {
        return;
      }
      var raw = params.get(paramName);
      el.checked = raw === 'true' || raw === '1';
    }

    function renderBedroomOptions(container, options, params) {

      }
      container.innerHTML = html;
      container.value = params.get('bedrooms') || '';
    }

    function renderRatingOptions(container, options, params) {
      var html = '<option value="">Any</option>';
      var i;
      for (i = 0; i < options.length; i += 1) {
        var opt = options[i];
        html += '<option value="' + opt.value + '">' + opt.label + '</option>';
      }
      container.innerHTML = html;
      container.value = params.get('ratingMin') || '';
    }

    function renderSortOptions(container, options, params) {
      var html = '';

      for (i = 0; i < options.length; i += 1) {
        var opt = options[i];

      }
      container.innerHTML = html;

        container.value = current;

      for (i = 0; i < options.length; i += 1) {

        html += '<option value="' + opt.value + '">' + opt.label + '</option>';
      }
      container.innerHTML = html;
      container.value = params.get('maxDistanceMeters') || '';
    }

    function renderPropertyTypeOptions(container, options, params) {
      var html = '';

      for (i = 0; i < options.length; i += 1) {

        html += '<option value="' + opt.value + '">' + opt.label + '</option>';

    function renderAmenityOptions(container, amenityOptions, params) {
      var html = '';

      for (i = 0; i < amenityOptions.length; i += 1) {
        var a = amenityOptions[i];
        html += '<option value="' + a.code + '">' + a.name + '</option>';
      }

      if (selectedParam) {
        var selectedValues = selectedParam.split(',');
        setMultiSelectValues(container, selectedValues);
      }

    function setMultiSelectValues(selectEl, values) {
      var i;
      var options = selectEl.options;
      for (i = 0; i < options.length; i += 1) {
        options[i].selected = values.indexOf(options[i].value) !== -1;
      }
    }

    function renderSearchResults(searchResults) {
      var summaryEl = document.querySelector('[data-populate="results-summary"]');
      if (summaryEl) {
        renderResultsSummary(summaryEl, searchResults);
      }
      var listEl = document.querySelector('[data-populate="listings"]');
      if (listEl) {
        renderListings(listEl, searchResults.listings || []);
      }
      var paginationEl = document.querySelector('[data-populate="pagination"]');
      if (paginationEl) {
        renderPagination(paginationEl, searchResults);
      }
      var mapEl = document.querySelector('[data-populate="map-view"]');
      if (mapEl) {
        renderMap(mapEl, searchResults);
      }
    }

    function renderResultsSummary(container, searchResults) {
      var params = pageState.urlParams;
      var locationText = params.get('location') || 'Anywhere';
      var total = typeof searchResults.totalResults === 'number' ? searchResults.totalResults : 0;
      var page = searchResults.page || 1;
      var pageSize = searchResults.pageSize || 0;
      var startIndex = 0;
      var endIndex = 0;
      if (total > 0 && pageSize > 0) {
        startIndex = (page - 1) * pageSize + 1;
        endIndex = Math.min(total, page * pageSize);
      }
      var rangeText;
      if (total > 0 && pageSize > 0) {
        rangeText = 'Showing ' + startIndex + '–' + endIndex + ' of ' + total + ' places';
      } else if (total === 0) {
        rangeText = 'No places found for your filters';
      } else {
        rangeText = '';
      }

      var titleText = total + ' stays in ' + locationText;
      if (total === 0) {
        titleText = 'No stays in ' + locationText;
      }

      container.innerHTML = '' +
        '<div class="results-summary-bar__primary">' +
        '<h1 class="results-summary-bar__title">' + titleText + '</h1>' +
        '<button type="button" class="results-summary-bar__clear" data-action="clear-filters">Clear filters</button>' +
        '</div>' +
        '<div class="results-summary-bar__secondary">' +
        '<span class="results-summary-bar__range">' + rangeText + '</span>' +
        '</div>';
    }

    function getCurrencySymbol(code) {
      if (code === 'usd') {
        return '$';
      }
      if (code === 'eur') {
        return '€';
      }
      return '';
    }

    function renderListings(container, listings) {
      if (!listings || listings.length === 0) {
        container.innerHTML = '<li class="listing-list__empty">No listings match your search.</li>';
        return;
      }
      var items = [];
      var i;
      for (i = 0; i < listings.length; i += 1) {
        var listing = listings[i];
        var priceText = '';
        var currency = getCurrencySymbol(listing.currency);
        if (listing.bookingType === 'long_term_rental' || (!listing.nightlyPrice && listing.monthlyRent)) {
          if (typeof listing.monthlyRent === 'number') {
            priceText = currency + listing.monthlyRent + ' / month';
          }
        } else if (typeof listing.nightlyPrice === 'number') {
          priceText = currency + listing.nightlyPrice + ' / night';
        }
        var bedsLabel = typeof listing.bedrooms === 'number' ? (listing.bedrooms === 0 ? 'Studio' : listing.bedrooms + ' bd') : '';
        var bathsLabel = typeof listing.bathrooms === 'number' ? listing.bathrooms + ' ba' : '';
        var sizeLabel = typeof listing.sizeSqMeters === 'number' ? listing.sizeSqMeters + ' m²' : '';
        var metaParts = [];
        if (bedsLabel) {
          metaParts.push(bedsLabel);
        }
        if (bathsLabel) {
          metaParts.push(bathsLabel);
        }
        if (sizeLabel) {
          metaParts.push(sizeLabel);
        }
        var metaText = metaParts.join(' · ');
        var locationParts = [];
        if (listing.neighborhood) {
          locationParts.push(listing.neighborhood);
        }
        if (listing.city) {
          locationParts.push(listing.city);
        }
        var locationText = locationParts.join(', ');
        var ratingText = '';
        if (typeof listing.ratingAverage === 'number' && typeof listing.ratingCount === 'number') {
          ratingText = listing.ratingAverage.toFixed(1) + ' (' + listing.ratingCount + ')';
        }
        var photoUrl = listing.photos && listing.photos.length ? listing.photos[0] : '';

        var badges = [];
        if (listing.petFriendly) {
          badges.push('Pet friendly');
        }
        if (listing.hasParking) {
          badges.push('Parking');
        }
        if (listing.hasInUnitLaundry) {
          badges.push('In-unit laundry');
        }
        if (listing.hasGym) {
          badges.push('Gym');
        }
        if (listing.hasWifi) {
          badges.push('Wi-Fi');
        }
        if (listing.freeCancellation) {
          badges.push('Free cancellation');
        }
        if (listing.onlineApplicationAvailable) {
          badges.push('Online application');
        }
        var badgesHtml = '';
        var j;
        for (j = 0; j < badges.length; j += 1) {
          badgesHtml += '<span class="listing-card__badge">' + badges[j] + '</span>';
        }

        var cardHtml = '' +
          '<li class="listing-card" data-listing-id="' + listing.id + '">' +
          '<article class="listing-card__body">' +
          '<div class="listing-card__media">';
        if (photoUrl) {
          cardHtml += '<img src="' + photoUrl + '" alt="' + listing.title + '" class="listing-card__image">';
        }
        cardHtml += '' +
          '<button type="button" class="listing-card__favorite" aria-pressed="false" aria-label="Toggle favorite" data-action="toggle-favorite" data-listing-id="' + listing.id + '">♥</button>' +
          '</div>' +
          '<div class="listing-card__content">' +
          '<h2 class="listing-card__title">' +
          '<button type="button" class="listing-card__title-link" data-action="view-details" data-listing-id="' + listing.id + '">' + listing.title + '</button>' +
          '</h2>';
        if (metaText) {
          cardHtml += '<p class="listing-card__meta">' + metaText + '</p>';
        }
        if (locationText) {
          cardHtml += '<p class="listing-card__location">' + locationText + '</p>';
        }
        if (priceText) {
          cardHtml += '<p class="listing-card__price">' + priceText + '</p>';
        }
        if (ratingText) {
          cardHtml += '<p class="listing-card__rating">' + ratingText + '</p>';
        }
        if (badgesHtml) {
          cardHtml += '<div class="listing-card__badges">' + badgesHtml + '</div>';
        }
        cardHtml += '' +
          '<div class="listing-card__actions">' +
          '<button type="button" class="button button--ghost" data-action="add-to-compare" data-listing-id="' + listing.id + '">Compare</button>' +
          '<button type="button" class="button button--ghost" data-action="add-to-shortlist" data-listing-id="' + listing.id + '">Add to shortlist</button>' +
          '</div>' +
          '</div>' +
          '</article>' +
          '</li>';

        items.push(cardHtml);
      }
      container.innerHTML = items.join('');
    }

    function renderPagination(container, searchResults) {
      var total = typeof searchResults.totalResults === 'number' ? searchResults.totalResults : 0;
      var page = searchResults.page || 1;
      var pageSize = searchResults.pageSize || 0;
      if (total === 0 || pageSize === 0) {
        container.innerHTML = '';
        return;
      }
      var pageCount = Math.ceil(total / pageSize);
      if (pageCount <= 1) {
        container.innerHTML = '';
        return;
      }
      var html = '<div class="pagination__inner">';
      if (page > 1) {
        html += '<button type="button" class="pagination__prev" data-action="change-page" data-page="' + (page - 1) + '">Previous</button>';
      }
      var p;
      for (p = 1; p <= pageCount; p += 1) {
        html += '<button type="button" class="pagination__page' + (p === page ? ' pagination__page--active' : '') + '" data-action="change-page" data-page="' + p + '">' + p + '</button>';
      }
      if (page < pageCount) {
        html += '<button type="button" class="pagination__next" data-action="change-page" data-page="' + (page + 1) + '">Next</button>';
      }
      html += '<select class="pagination__page-size" data-action="change-page-size">' +
        '<option value="10"' + (pageSize === 10 ? ' selected' : '') + '>10 / page</option>' +
        '<option value="20"' + (pageSize === 20 ? ' selected' : '') + '>20 / page</option>' +
        '<option value="50"' + (pageSize === 50 ? ' selected' : '') + '>50 / page</option>' +
        '</select>';
      html += '</div>';
      container.innerHTML = html;
    }

    function changePageFromElement(target) {
      var page = target.getAttribute('data-page');
      if (!page) {
        return;
      }
      var updates = { page: page };
      applyUrlUpdates(updates, { refresh: true, resetPage: false });
    }

    function renderMap(container, searchResults) {
      var listings = searchResults.listings || [];
      var markersHtml = '';
      var i;
      for (i = 0; i < listings.length; i += 1) {
        var listing = listings[i];
        var currency = getCurrencySymbol(listing.currency);
        var priceText = '';
        if (listing.bookingType === 'long_term_rental' || (!listing.nightlyPrice && listing.monthlyRent)) {
          if (typeof listing.monthlyRent === 'number') {
            priceText = currency + listing.monthlyRent;
          }
        } else if (typeof listing.nightlyPrice === 'number') {
          priceText = currency + listing.nightlyPrice;
        }
        markersHtml += '<button type="button" class="map-marker" data-action="open-pin-preview" data-listing-id="' + listing.id + '">' + priceText + '</button>';
      }
      container.innerHTML = '<div class="map-view-panel__overlay">' + markersHtml + '</div>';
    }

    function openPinPreview(target) {
      var listingId = target.getAttribute('data-listing-id');
      if (!listingId || !pageState.searchResults || !pageState.searchResults.listings) {
        return;
      }
      var listings = pageState.searchResults.listings;
      var i;
      var listing = null;
      for (i = 0; i < listings.length; i += 1) {
        if (listings[i].id === listingId) {
          listing = listings[i];
          break;
        }
      }
      if (!listing) {
        return;
      }
      var container = document.querySelector('[data-component="map-pin-preview-card"]');
      if (!container) {
        return;
      }
      renderMapPinPreview(container, listing);
    }

    function renderMapPinPreview(container, listing) {
      var currency = getCurrencySymbol(listing.currency);
      var priceText = '';
      if (listing.bookingType === 'long_term_rental' || (!listing.nightlyPrice && listing.monthlyRent)) {
        if (typeof listing.monthlyRent === 'number') {
          priceText = currency + listing.monthlyRent + ' / month';
        }
      } else if (typeof listing.nightlyPrice === 'number') {
        priceText = currency + listing.nightlyPrice + ' / night';
      }
      var locationParts = [];
      if (listing.neighborhood) {
        locationParts.push(listing.neighborhood);
      }
      if (listing.city) {
        locationParts.push(listing.city);
      }
      var locationText = locationParts.join(', ');

      container.innerHTML = '' +
        '<div class="map-pin-preview__inner">' +
        '<button type="button" class="map-pin-preview__close" aria-label="Close" data-action="close-pin-preview">×</button>' +
        '<h2 class="map-pin-preview__title">' + listing.title + '</h2>' +
        (locationText ? '<p class="map-pin-preview__location">' + locationText + '</p>' : '') +
        (priceText ? '<p class="map-pin-preview__price">' + priceText + '</p>' : '') +
        '<div class="map-pin-preview__actions">' +
        '<button type="button" class="button button--primary" data-action="view-details" data-listing-id="' + listing.id + '">View details</button>' +
        '<button type="button" class="button button--ghost" data-action="toggle-favorite" data-listing-id="' + listing.id + '">Favorite</button>' +
        '<button type="button" class="button button--ghost" data-action="add-to-compare" data-listing-id="' + listing.id + '">Compare</button>' +
        '<button type="button" class="button button--ghost" data-action="add-to-shortlist" data-listing-id="' + listing.id + '">Shortlist</button>' +
        '</div>' +
        '</div>';
      container.hidden = false;
    }

    function closePinPreview() {
      var container = document.querySelector('[data-component="map-pin-preview-card"]');
      if (!container) {
        return;
      }
      container.hidden = true;
      container.innerHTML = '';
    }

    function handleSubmitSearch(formEl) {
      var formData = new FormData(formEl);
      var locationText = formData.get('location') || '';
      var checkIn = formData.get('checkIn') || '';
      var checkOut = formData.get('checkOut') || '';
      var adults = formData.get('adults') || '';
      var children = formData.get('children') || '';
      var infants = formData.get('infants') || '';
      var bookingType = formData.get('bookingType') || '';

      var updates = {
        location: locationText,
        checkIn: checkIn,
        checkOut: checkOut,
        adults: adults,
        children: children,
        infants: infants,
        bookingType: bookingType
      };
      applyUrlUpdates(updates, { refresh: true, resetPage: true });
    }

    function clearAllFilters() {
      var updates = {};
      var i;
      for (i = 0; i < filterParamNames.length; i += 1) {
        updates[filterParamNames[i]] = '';
      }
      applyUrlUpdates(updates, { refresh: true, resetPage: true });
    }

    function clearDistanceFilter() {
      var updates = {
        referenceLandmarkId: '',
        referenceLocationName: '',
        maxDistanceMeters: ''
      };
      applyUrlUpdates(updates, { refresh: true, resetPage: true });
    }

    function handleToggleFavorite(target) {
      var listingId = target.getAttribute('data-listing-id');
      if (!listingId) {
        return;
      }
      var result;
      try {
        result = WebsiteSDK.toggleFavoriteForListing(listingId, 'search_results');
      } catch (e) {
        console.error('toggleFavoriteForListing failed', e);
        return;
      }
      if (!result || !result.success) {
        return;
      }
      var favorited = !!result.isFavorited;
      var buttons = document.querySelectorAll('[data-action="toggle-favorite"][data-listing-id="' + listingId + '"]');
      var i;
      for (i = 0; i < buttons.length; i += 1) {
        if (favorited) {
          buttons[i].classList.add('is-favorited');
          buttons[i].setAttribute('aria-pressed', 'true');
        } else {
          buttons[i].classList.remove('is-favorited');
          buttons[i].setAttribute('aria-pressed', 'false');
        }
      }
    }

    function handleAddToCompare(target) {
      var listingId = target.getAttribute('data-listing-id');
      if (!listingId) {
        return;
      }
      var result;
      try {
        result = WebsiteSDK.addListingToCompare(listingId);
      } catch (e) {
        console.error('addListingToCompare failed', e);
        return;
      }
      if (!result || !result.success) {
        return;
      }
      if (result.compareListId) {
        pageState.compareListId = result.compareListId;
      }
      if (typeof result.compareItemCount === 'number') {
        pageState.compareItemCount = result.compareItemCount;
      }
      updateComparisonBar();
    }

    function updateComparisonBar() {
      var bar = document.querySelector('[data-component="comparison-bar"]');
      if (!bar) {
        return;
      }
      var countSpan = bar.querySelector('[data-populate="compare-count"]');
      if (pageState.compareItemCount && pageState.compareItemCount > 0) {
        bar.hidden = false;
        if (countSpan) {
          countSpan.textContent = pageState.compareItemCount + ' in comparison';
        }
      } else {
        bar.hidden = true;
      }
    }

    function hideComparisonBar() {
      var bar = document.querySelector('[data-component="comparison-bar"]');
      if (!bar) {
        return;
      }
      bar.hidden = true;
    }

    function openShortlistModal(target) {
      var listingId = target.getAttribute('data-listing-id');
      if (!listingId) {
        return;
      }
      var modal = document.querySelector('[data-component="shortlist-modal"]');
      if (!modal) {
        return;
      }
      modal.hidden = false;
      modal.setAttribute('data-listing-id', listingId);
      modal.setAttribute('aria-hidden', 'false');
      var form = modal.querySelector('form');
      if (form) {
        form.reset();
      }
    }

    function handleSubmitShortlist(formEl) {
      var modal = formEl.closest('[data-component="shortlist-modal"]');
      if (!modal) {
        return;
      }
      var listingId = modal.getAttribute('data-listing-id');
      if (!listingId) {
        return;
      }
      var formData = new FormData(formEl);
      var name = formData.get('shortlistName') || '';
      var note = formData.get('shortlistNote') || '';
      if (!name) {
        return;
      }
      var result;
      try {
        result = WebsiteSDK.addListingToShortlist(listingId, undefined, note || undefined, true, name);
      } catch (e) {
        console.error('addListingToShortlist failed', e);
        return;
      }
      if (!result || !result.success) {
        return;
      }
      modal.hidden = true;
      modal.setAttribute('aria-hidden', 'true');
    }

    document.addEventListener('click', function(event) {
      var target = event.target.closest('[data-action="cancel-shortlist"]');
      if (!target) {
        return;
      }
      event.preventDefault();
      var modal = document.querySelector('[data-component="shortlist-modal"]');
      if (modal) {
        modal.hidden = true;
        modal.setAttribute('aria-hidden', 'true');
      }
    });

    function navigateToListing(target) {
      var listingId = target.getAttribute('data-listing-id');
      if (!listingId) {
        return;
      }
      window.location.href = 'listing.html?listingId=' + encodeURIComponent(listingId);
    }

    function maybeLoadLandmarks(searchResults) {
      var listings = searchResults.listings || [];
      if (!listings.length) {
        renderLandmarksSelect([]);
        return;
      }
      var first = listings[0];
      if (!first || !first.city) {
        return;
      }
      var city = first.city;
      if (pageState.landmarksCity === city && pageState.landmarks && pageState.landmarks.length) {
        renderLandmarksSelect(pageState.landmarks);
        return;
      }
      var landmarks;
      try {
        landmarks = WebsiteSDK.getLandmarksForLocation(city);
      } catch (e) {
        console.error('getLandmarksForLocation failed', e);
        landmarks = [];
      }
      pageState.landmarksCity = city;
      pageState.landmarks = landmarks || [];
      renderLandmarksSelect(pageState.landmarks);
    }

    function renderLandmarksSelect(landmarks) {
      var container = document.querySelector('[data-populate="landmarks"]');
      if (!container) {
        return;
      }
      var html = '<option value="">Any landmark</option>';
      var i;
      for (i = 0; i < landmarks.length; i += 1) {
        var lm = landmarks[i];
        html += '<option value="' + lm.id + '">' + lm.name + '</option>';
      }
      container.innerHTML = html;
      var params = pageState.urlParams;
      container.value = params.get('referenceLandmarkId') || '';
    }

    function openSaveSearchForm() {
      var toolbar = document.querySelector('[data-component="save-search-alert-toolbar"]');
      if (!toolbar) {
        return;
      }
      var panel = toolbar.querySelector('.save-search-toolbar__panel');
      if (!panel) {
        return;
      }
      panel.hidden = false;
      var form = panel.querySelector('form');
      if (!form) {
        return;
      }
      var params = pageState.urlParams;
      var locationText = params.get('location') || 'Anywhere';
      var alertNameInput = form.querySelector('#alert-name');
      var emailInput = form.querySelector('#alert-email');
      var frequencySelect = form.querySelector('#alert-frequency');
      var enabledCheckbox = form.querySelector('input[name="alertEmailEnabled"]');
      if (alertNameInput) {
        alertNameInput.value = 'Search in ' + locationText;
      }
      if (emailInput && !emailInput.value) {
        emailInput.value = '';
      }
      if (frequencySelect) {
        frequencySelect.value = 'daily';
      }
      if (enabledCheckbox) {
        enabledCheckbox.checked = true;
      }
      var statusEl = form.querySelector('.save-search-toolbar__status');
      if (statusEl) {
        statusEl.textContent = '';
      }
    }

    function closeSaveSearchForm() {
      var toolbar = document.querySelector('[data-component="save-search-alert-toolbar"]');
      if (!toolbar) {
        return;
      }
      var panel = toolbar.querySelector('.save-search-toolbar__panel');
      if (!panel) {
        return;
      }
      panel.hidden = true;
    }

    function handleSubmitSaveSearch(formEl) {
      var params = pageState.urlParams;
      var locationText = params.get('location');
      if (!locationText) {
        return;
      }
      var formData = new FormData(formEl);
      var name = formData.get('alertName') || '';
      var email = formData.get('alertEmail') || '';
      var frequency = formData.get('alertFrequency') || 'daily';
      var emailEnabled = formData.get('alertEmailEnabled') !== null;
      if (!name || !email) {
        return;
      }
      var filters = buildSavedSearchFiltersFromParams(params);
      var result;
      try {
        result = WebsiteSDK.createSavedSearchAlert(name, locationText, filters, frequency, email, emailEnabled);
      } catch (e) {
        console.error('createSavedSearchAlert failed', e);
        var statusErr = formEl.querySelector('.save-search-toolbar__status');
        if (statusErr) {
          statusErr.textContent = 'Could not save this search. Please try again.';
        }
        return;
      }
      if (!result || !result.alert) {
        return;
      }
      pageState.lastAlert = result.alert;
      var statusEl = formEl.querySelector('.save-search-toolbar__status');
      if (statusEl) {
        statusEl.textContent = 'Search saved. You can manage alerts from the Alerts page.';
      }
    }

    function buildSavedSearchFiltersFromParams(params) {
      var filters = {};

      function parseNumberParam(name) {
        var raw = params.get(name);
        if (!raw) {
          return undefined;
        }
        var num = parseFloat(raw);
        if (isNaN(num)) {
          return undefined;
        }
        return num;
      }

      function parseBooleanParam(name) {
        var raw = params.get(name);
        if (!raw) {
          return undefined;
        }
        if (raw === 'true' || raw === '1') {
          return true;
        }
        if (raw === 'false' || raw === '0') {
          return false;
        }
        return undefined;
      }

      var minPriceMonthly = parseNumberParam('minPriceMonthly');
      if (minPriceMonthly !== undefined) {
        filters.minPriceMonthly = minPriceMonthly;
      }
      var maxPriceMonthly = parseNumberParam('maxPriceMonthly');
      if (maxPriceMonthly !== undefined) {
        filters.maxPriceMonthly = maxPriceMonthly;
      }
      var maxPriceNightly = parseNumberParam('maxPriceNightly');
      if (maxPriceNightly !== undefined) {
        filters.maxPriceNightly = maxPriceNightly;
      }

      var bedrooms = parseNumberParam('bedrooms');
      if (bedrooms !== undefined) {
        filters.minBedrooms = bedrooms;
        filters.maxBedrooms = bedrooms;
      }

      var ratingMin = parseNumberParam('ratingMin');
      if (ratingMin !== undefined) {
        filters.ratingMin = ratingMin;
      }

      var petFriendly = parseBooleanParam('petFriendly');
      if (petFriendly !== undefined) {
        filters.petFriendly = petFriendly;
      }
      var hasParking = parseBooleanParam('hasParking');
      if (hasParking !== undefined) {
        filters.hasParking = hasParking;
      }
      var hasInUnitLaundry = parseBooleanParam('hasInUnitLaundry');
      if (hasInUnitLaundry !== undefined) {
        filters.hasInUnitLaundry = hasInUnitLaundry;
      }
      var hasGym = parseBooleanParam('hasGym');
      if (hasGym !== undefined) {
        filters.hasGym = hasGym;
      }

      var moveInBy = params.get('moveInBy');
      if (moveInBy) {
        filters.moveInByDate = moveInBy;
      }

      var bookingType = params.get('bookingType');
      if (bookingType) {
        filters.bookingType = bookingType;
      }

      var refLandmarkId = params.get('referenceLandmarkId');
      if (refLandmarkId) {
        filters.referenceLandmarkId = refLandmarkId;
      }
      var refLocationName = params.get('referenceLocationName');
      if (refLocationName) {
        filters.referenceLocationName = refLocationName;
      }
      var maxDistance = parseNumberParam('maxDistanceMeters');
      if (maxDistance !== undefined) {
        filters.maxDistanceMeters = maxDistance;
      }

      var propertyTypesParam = params.get('propertyTypes');
      if (propertyTypesParam) {
        var types = propertyTypesParam.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
        if (types.length) {
          filters.propertyTypes = types;
        }
      }

      var amenitiesParam = params.get('amenities');
      if (amenitiesParam) {
        var am = amenitiesParam.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
        if (am.length) {
          filters.amenities = am;
        }
      }

      if (Object.keys(filters).length === 0) {
        return undefined;
      }
      return filters;
    }

  })();
  </script>
</body>
</html>
