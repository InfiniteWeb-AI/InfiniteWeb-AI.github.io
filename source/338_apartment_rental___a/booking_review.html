<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Kulcs - Hajnal Apartment</title>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
  <!-- Global styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific styles -->
  <link rel='stylesheet' href='booking_review.css'>
</head>
<body class='page page--hero'>
  <div class='site-shell'>
    <header class='site-header'>
      <div class='site-header__inner'>
        <div class='site-brand'>
          <a href='index.html' class='site-brand__link'>Kulcs - Hajnal Apartment</a>
        </div>
        <nav class='site-nav' aria-label='Primary'>
          <ul class='site-nav__list'>
            <li class='site-nav__item'>
              <a href='index.html' class='site-nav__link site-nav__link--active'>Home</a>
            </li>
            <li class='site-nav__item'>
              <a href='favorites.html' class='site-nav__link'>Favorites</a>
            </li>
            <li class='site-nav__item'>
              <a href='shortlist.html' class='site-nav__link'>Shortlists</a>
            </li>
            <li class='site-nav__item'>
              <a href='alerts.html' class='site-nav__link'>Alerts</a>
            </li>
            <li class='site-nav__item'>
              <a href='help.html' class='site-nav__link'>Help</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='site-main__center'>
        <div class='booking-review-root' data-component='booking-review-root'>
          <!-- Central content column -->
          <div class='booking-review-root__center'>
            <div class='booking-review-root__column'>
              <!-- Error banner -->
              <section class='booking-banner booking-banner--error' data-component='booking-error-notification' aria-live='assertive' hidden>
                <div class='booking-banner__body' data-populate='error-banner'></div>
                <div class='booking-banner__actions'>
                  <button type='button' class='booking-banner__button booking-banner__button--primary' data-action='retry-load'>Retry</button>
                  <button type='button' class='booking-banner__button booking-banner__button--ghost' data-action='dismiss-error'>Dismiss</button>
                </div>
              </section>

              <!-- Status banner -->
              <section class='booking-banner booking-banner--status' data-component='booking-status-banner' aria-live='polite' hidden>
                <div class='booking-banner__body' data-populate='status-banner'></div>
                <button type='button' class='booking-banner__dismiss' data-action='dismiss-status' aria-label='Dismiss status message'>
                  &times;
                </button>
              </section>

              <!-- Booking summary panel -->
              <section class='booking-panel booking-panel--summary' data-component='booking-summary-panel' data-populate='booking-summary'>
                <!-- Populated via JavaScript -->
              </section>

              <!-- Guest contact review section -->
              <section class='booking-panel booking-panel--guest' data-component='guest-contact-review-section' data-populate='guest-contact'>
                <!-- Populated via JavaScript -->
              </section>

              <!-- Price breakdown panel -->
              <section class='booking-panel booking-panel--price' data-component='price-breakdown-panel' data-populate='price-breakdown'>
                <!-- Populated via JavaScript -->
              </section>

              <!-- Cancellation policy panel -->
              <section class='booking-panel booking-panel--cancellation' data-component='cancellation-policy-panel' data-populate='cancellation-policy'>
                <!-- Populated via JavaScript -->
              </section>
            </div>
          </div>

          <!-- Floating confirmation actions -->
          <aside class='booking-actions' data-component='booking-confirmation-actions' aria-label='Booking actions'>
            <button type='button' class='booking-actions__primary' data-action='confirm-booking' disabled>
              Confirm booking
            </button>
            <button type='button' class='booking-actions__secondary' data-action='edit-details' disabled>
              Edit details
            </button>
          </aside>

          <!-- Full-screen loader overlay -->
          <div class='booking-review-loader' data-component='booking-review-loader' aria-hidden='true'>
            <div class='booking-review-loader__scrim'></div>
            <div class='booking-review-loader__content' role='status' aria-live='polite'>
              <div class='booking-review-loader__spinner' aria-hidden='true'></div>
              <p class='booking-review-loader__text' data-populate='loader-message'>Loading booking details</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class='site-footer'>
      <nav class='site-footer__nav' aria-label='Footer'>
        <a href='about.html' class='site-footer__link'>About</a>
        <span class='site-footer__separator' aria-hidden='true'>b7</span>
        <a href='contact.html' class='site-footer__link'>Contact</a>
        <span class='site-footer__separator' aria-hidden='true'>b7</span>
        <a href='help.html' class='site-footer__link'>Help &amp; FAQ</a>
        <span class='site-footer__separator' aria-hidden='true'>b7</span>
        <a href='terms.html' class='site-footer__link'>Terms of Use</a>
        <span class='site-footer__separator' aria-hidden='true'>b7</span>
        <a href='privacy.html' class='site-footer__link'>Privacy Policy</a>
      </nav>
      <div class='site-footer__meta'>
        <span class='site-footer__copyright'>&copy; Kulcs - Hajnal Apartment <span class='site-footer__year'>2026</span></span>
      </div>
    </footer>

    <!-- Decorative lock indicator matching the maintenance design; non-interactive by design -->
    <div class='lock-indicator' aria-hidden='true'>
      &#128274;
    </div>
  </div>

  <!-- SDK for page-specific interfaces -->
  <script src='business_logic.js'></script>

  <!-- Page UI logic -->
  <script>
    (function() {
      'use strict';

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatCurrency(amount, currency) {
        if (amount === null || amount === undefined || isNaN(amount)) {
          return '';
        }
        var upper = (currency || '').toString().toUpperCase();
        var symbol = '';
        if (upper === 'USD') {
          symbol = '$';
        } else if (upper === 'EUR') {
          symbol = 'a4';
        }
        var formatted = Number(amount).toFixed(2);
        if (symbol) {
          return symbol + formatted;
        }
        return formatted + (upper ? ' ' + upper : '');
      }

      function formatDate(value) {
        if (!value) {
          return '';
        }
        var date = new Date(value);
        if (isNaN(date.getTime())) {
          return '';
        }
        return date.toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      }

      function formatGuests(booking) {
        if (!booking) {
          return '';
        }
        var parts = [];
        var adults = Number(booking.guestsAdults || 0);
        var children = Number(booking.guestsChildren || 0);
        var infants = Number(booking.guestsInfants || 0);
        if (adults > 0) {
          parts.push(adults + ' adult' + (adults > 1 ? 's' : ''));
        }
        if (children > 0) {
          parts.push(children + ' child' + (children > 1 ? 'ren' : ''));
        }
        if (infants > 0) {
          parts.push(infants + ' infant' + (infants > 1 ? 's' : ''));
        }
        if (!parts.length) {
          return 'No guests selected';
        }
        return parts.join(', ');
      }

      document.addEventListener('DOMContentLoaded', function() {
        if (typeof WebsiteSDK === 'undefined') {
          console.error('WebsiteSDK is not available. business_logic.js may be missing.');
        }

        var state = {
          bookingId: null,
          booking: null,
          listing: null,
          priceBreakdown: null,
          cancellationPolicySummary: '',
          loading: false,
          loadingType: '',
          submitting: false,
          confirmationMessage: '',
          lastErrorMessage: '',
          lastErrorContext: '',
          hideStatusBanner: false
        };

        var loaderEl = document.querySelector('[data-component="booking-review-loader"]');
        var rootEl = document.querySelector('[data-component="booking-review-root"]');
        var errorBannerWrapper = document.querySelector('[data-component="booking-error-notification"]');
        var statusBannerWrapper = document.querySelector('[data-component="booking-status-banner"]');

        function getBookingIdFromUrl() {
          var params = new URLSearchParams(window.location.search);
          return params.get('bookingId');
        }

        function showLoader(type) {
          state.loading = true;
          state.loadingType = type || 'load';
          updateUI();
        }

        function hideLoader() {
          state.loading = false;
          state.loadingType = '';
          updateUI();
        }

        function renderBookingSummary(container) {
          if (!container) {
            return;
          }
          if (!state.bookingId) {
            container.innerHTML = `
              <header class='booking-panel__header'>
                <h1 class='booking-panel__title'>Booking review</h1>
              </header>
              <p class='booking-panel__empty'>No booking selected. Use a booking link from the previous step to review your stay.</p>
            `;
            return;
          }
          if (!state.booking || !state.listing) {
            container.innerHTML = `
              <header class='booking-panel__header'>
                <h1 class='booking-panel__title'>Booking review</h1>
              </header>
              <p class='booking-panel__empty'>Your booking details will appear here once they have loaded.</p>
            `;
            return;
          }

          var b = state.booking;
          var l = state.listing;
          var checkIn = formatDate(b.checkInDate);
          var checkOut = formatDate(b.checkOutDate);
          var guestsText = formatGuests(b);
          var locationParts = [];
          if (l.neighborhood) {
            locationParts.push(l.neighborhood);
          }
          if (l.city) {
            locationParts.push(l.city);
          }
          var location = locationParts.join(', ');
          var hasPhoto = !!(l.photos && l.photos.length && l.photos[0]);
          var photoUrl = hasPhoto ? l.photos[0] : '';

          var photoHtml = '';
          if (photoUrl) {
            photoHtml = `
              <div class='summary-panel__photo'>
                <img src='${escapeHtml(photoUrl)}' alt='${escapeHtml(l.title)}'>
              </div>
            `;
          }

          container.innerHTML = `
            <header class='booking-panel__header'>
              <h1 class='booking-panel__title'>Review your stay</h1>
            </header>
            <div class='summary-panel'>
              ${photoHtml}
              <div class='summary-panel__body'>
                <h2 class='summary-panel__listing-title'>${escapeHtml(l.title)}</h2>
                <p class='summary-panel__location'>${escapeHtml(location)}</p>
                <dl class='summary-panel__meta'>
                  <div class='summary-panel__meta-row'>
                    <dt>Check-in</dt>
                    <dd>${escapeHtml(checkIn)}</dd>
                  </div>
                  <div class='summary-panel__meta-row'>
                    <dt>Check-out</dt>
                    <dd>${escapeHtml(checkOut)}</dd>
                  </div>
                  <div class='summary-panel__meta-row'>
                    <dt>Guests</dt>
                    <dd>${escapeHtml(guestsText)}</dd>
                  </div>
                </dl>
                <p class='summary-panel__hint'>Make sure your dates and guest count look correct.</p>
                <button type='button' class='link-button summary-panel__edit' data-action='edit-details'>Edit details</button>
              </div>
            </div>
          `;
        }

        function renderGuestContact(container) {
          if (!container) {
            return;
          }
          if (!state.booking) {
            container.innerHTML = `
              <header class='booking-panel__header'>
                <h2 class='booking-panel__title'>Guest details</h2>
              </header>
              <p class='booking-panel__empty'>Guest contact details will appear here once your booking is loaded.</p>
            `;
            return;
          }

          var b = state.booking;
          container.innerHTML = `
            <header class='booking-panel__header'>
              <h2 class='booking-panel__title'>Guest details</h2>
            </header>
            <div class='guest-panel'>
              <dl class='guest-panel__list'>
                <div class='guest-panel__row'>
                  <dt>Full name</dt>
                  <dd>${escapeHtml(b.guestFullName)}</dd>
                </div>
                <div class='guest-panel__row'>
                  <dt>Email</dt>
                  <dd>${escapeHtml(b.guestEmail)}</dd>
                </div>
                <div class='guest-panel__row'>
                  <dt>Phone</dt>
                  <dd>${escapeHtml(b.guestPhone)}</dd>
                </div>
              </dl>
              <p class='guest-panel__hint'>If anything looks wrong, go back to the previous step to update your contact details.</p>
              <button type='button' class='link-button guest-panel__edit' data-action='edit-details'>Edit details</button>
            </div>
          `;
        }

        function renderPriceBreakdown(container) {
          if (!container) {
            return;
          }
          if (!state.booking) {
            container.innerHTML = `
              <header class='booking-panel__header'>
                <h2 class='booking-panel__title'>Price breakdown</h2>
              </header>
              <p class='booking-panel__empty'>Pricing details will appear here once your booking is loaded.</p>
            `;
            return;
          }

          var pb = state.priceBreakdown || {};
          var bookingCurrency = (state.booking && state.booking.currency) || pb.currency || '';
          var nights = Number(pb.nights || 0);
          var nightlyPrice = pb.nightlyPrice || state.booking.nightlyPrice || 0;
          var subtotal = pb.subtotal || 0;
          var taxes = pb.taxes || 0;
          var fees = pb.fees || 0;
          var total = pb.total || state.booking.totalPrice || 0;

          var nightsLabel = nights === 1 ? 'night' : 'nights';
          var primaryLine = nights > 0
            ? `${formatCurrency(nightlyPrice, bookingCurrency)} d7 ${nights} ${nightsLabel}`
            : formatCurrency(nightlyPrice, bookingCurrency);

          container.innerHTML = `
            <header class='booking-panel__header'>
              <h2 class='booking-panel__title'>Price breakdown</h2>
            </header>
            <div class='price-panel'>
              <dl class='price-panel__list'>
                <div class='price-panel__row'>
                  <dt>Stay (${escapeHtml(primaryLine)})</dt>
                  <dd>${escapeHtml(formatCurrency(subtotal, bookingCurrency))}</dd>
                </div>
                <div class='price-panel__row'>
                  <dt>Taxes</dt>
                  <dd>${escapeHtml(formatCurrency(taxes, bookingCurrency))}</dd>
                </div>
                <div class='price-panel__row'>
                  <dt>Fees</dt>
                  <dd>${escapeHtml(formatCurrency(fees, bookingCurrency))}</dd>
                </div>
              </dl>
              <div class='price-panel__total-row'>
                <span class='price-panel__total-label'>Total</span>
                <span class='price-panel__total-value'>${escapeHtml(formatCurrency(total, bookingCurrency))}</span>
              </div>
              <p class='price-panel__hint'>This is the total amount you will be charged if your booking is confirmed.</p>
            </div>
          `;
        }

        function renderCancellationPolicy(container) {
          if (!container) {
            return;
          }
          if (!state.booking) {
            container.innerHTML = `
              <header class='booking-panel__header'>
                <h2 class='booking-panel__title'>Cancellation policy</h2>
              </header>
              <p class='booking-panel__empty'>Cancellation details will appear here once your booking is loaded.</p>
            `;
            return;
          }

          var b = state.booking;
          var summary = state.cancellationPolicySummary || b.cancellationPolicySummary || '';
          var hasFreeCancellation = !!b.freeCancellation;

          var freeLine = '';
          if (hasFreeCancellation) {
            freeLine = `<p class='cancellation-panel__highlight'>Free cancellation is available for this stay for a limited time before check-in.</p>`;
          }

          var summaryHtml = summary
            ? `<p class='cancellation-panel__summary'>${escapeHtml(summary)}</p>`
            : `<p class='cancellation-panel__summary'>The host has not provided a detailed cancellation summary. Standard platform cancellation rules apply.</p>`;

          container.innerHTML = `
            <header class='booking-panel__header'>
              <h2 class='booking-panel__title'>Cancellation policy</h2>
            </header>
            <div class='cancellation-panel'>
              ${freeLine}
              ${summaryHtml}
              <p class='cancellation-panel__hint'>Make sure you understand how cancellations and refunds work before confirming your booking.</p>
            </div>
          `;
        }

        function renderStatusBanner(container) {
          if (!container) {
            return;
          }
          if (!state.booking) {
            container.innerHTML = '';
            return;
          }

          var b = state.booking;
          var status = (b.status || '').toLowerCase();
          var message = '';
          var detail = '';

          if (status === 'pending') {
            message = 'One more step to book your stay.';
            detail = 'Review the details below, then confirm your booking when everything looks right.';
          } else if (status === 'confirmed') {
            message = state.confirmationMessage || 'Your booking is confirmed.';
            var createdAt = formatDate(b.createdAt);
            if (createdAt) {
              detail = 'Created on ' + createdAt + '. You will also receive a confirmation email with all the details.';
            } else {
              detail = 'You will also receive a confirmation email with all the details.';
            }
          } else if (status === 'canceled') {
            message = 'This booking has been canceled.';
            detail = 'Canceled bookings cannot be confirmed or edited from this page.';
          } else {
            message = 'Booking status: ' + status;
            detail = '';
          }

          var idLine = b.id ? `<span class='booking-banner__id'>Booking ID: ${escapeHtml(b.id)}</span>` : '';

          container.innerHTML = `
            <p class='booking-banner__title'>${escapeHtml(message)}</p>
            <p class='booking-banner__message'>${escapeHtml(detail)}</p>
            ${idLine}
          `;
        }

        function renderErrorBanner(container) {
          if (!container) {
            return;
          }
          if (!state.lastErrorMessage) {
            container.innerHTML = '';
            return;
          }

          var contextText = '';
          if (state.lastErrorContext === 'load') {
            contextText = 'We could not load your booking. You can retry the request without changing your link.';
          } else if (state.lastErrorContext === 'confirm') {
            contextText = 'There was a problem confirming your booking. You can try again in a moment.';
          }

          container.innerHTML = `
            <p class='booking-banner__title'>Something went wrong</p>
            <p class='booking-banner__message'>${escapeHtml(state.lastErrorMessage)}</p>
            <p class='booking-banner__context'>${escapeHtml(contextText)}</p>
          `;
        }

        function renderLoaderMessage(container) {
          if (!container) {
            return;
          }
          var msg = 'Loading booking details';
          if (state.loadingType === 'confirm') {
            msg = 'Confirming your booking';
          }
          container.textContent = msg;
        }

        function updateUI() {
          if (!rootEl) {
            return;
          }

          if (loaderEl) {
            if (state.loading) {
              loaderEl.classList.add('booking-review-loader--active');
              loaderEl.setAttribute('aria-hidden', 'false');
            } else {
              loaderEl.classList.remove('booking-review-loader--active');
              loaderEl.setAttribute('aria-hidden', 'true');
            }
          }

          var populateElements = document.querySelectorAll('[data-populate]');
          for (var i = 0; i < populateElements.length; i++) {
            var el = populateElements[i];
            var type = el.getAttribute('data-populate');
            if (type === 'booking-summary') {
              renderBookingSummary(el);
            } else if (type === 'guest-contact') {
              renderGuestContact(el);
            } else if (type === 'price-breakdown') {
              renderPriceBreakdown(el);
            } else if (type === 'cancellation-policy') {
              renderCancellationPolicy(el);
            } else if (type === 'status-banner') {
              renderStatusBanner(el);
            } else if (type === 'error-banner') {
              renderErrorBanner(el);
            } else if (type === 'loader-message') {
              renderLoaderMessage(el);
            }
          }

          if (errorBannerWrapper) {
            errorBannerWrapper.hidden = !state.lastErrorMessage;
            var retryBtn = errorBannerWrapper.querySelector('[data-action="retry-load"]');
            if (retryBtn) {
              retryBtn.hidden = state.lastErrorContext !== 'load';
            }
          }

          if (statusBannerWrapper) {
            var shouldShowStatus = !!state.booking && !state.hideStatusBanner;
            statusBannerWrapper.hidden = !shouldShowStatus;
            var dismissStatusBtn = statusBannerWrapper.querySelector('[data-action="dismiss-status"]');
            if (dismissStatusBtn) {
              var statusValue = state.booking && state.booking.status ? String(state.booking.status).toLowerCase() : '';
              if (statusValue === 'pending') {
                dismissStatusBtn.hidden = false;
              } else {
                dismissStatusBtn.hidden = true;
              }
            }
          }

          var confirmButtons = document.querySelectorAll('[data-action="confirm-booking"]');
          var editButtons = document.querySelectorAll('[data-action="edit-details"]');

          var statusStr = state.booking && state.booking.status ? String(state.booking.status).toLowerCase() : '';
          var canConfirm = !!(state.booking && statusStr === 'pending' && !state.loading && !state.submitting);
          var canEdit = !!(state.booking && statusStr === 'pending' && !state.loading && !state.submitting);

          for (var j = 0; j < confirmButtons.length; j++) {
            var cb = confirmButtons[j];
            if (cb instanceof HTMLButtonElement) {
              var label = 'Confirm booking';
              if (state.submitting && state.loadingType === 'confirm') {
                label = 'Confirming';
              } else if (statusStr === 'confirmed') {
                label = 'Booking confirmed';
              } else if (statusStr === 'canceled') {
                label = 'Booking canceled';
              }
              cb.textContent = label;
              cb.disabled = !canConfirm;
            }
          }

          for (var k = 0; k < editButtons.length; k++) {
            var eb = editButtons[k];
            if (eb instanceof HTMLButtonElement) {
              eb.disabled = !canEdit;
            }
          }
        }

        function loadBooking() {
          if (!state.bookingId || typeof WebsiteSDK === 'undefined') {
            updateUI();
            return;
          }

          state.booking = null;
          state.listing = null;
          state.priceBreakdown = null;
          state.cancellationPolicySummary = '';
          state.lastErrorMessage = '';
          state.lastErrorContext = '';
          state.hideStatusBanner = false;

          showLoader('load');

          try {
            var response = WebsiteSDK.getBookingReviewSummary(state.bookingId);
            state.booking = response && response.booking ? response.booking : null;
            state.listing = response && response.listing ? response.listing : null;
            state.priceBreakdown = response && response.priceBreakdown ? response.priceBreakdown : null;
            state.cancellationPolicySummary = response && response.cancellationPolicySummary ? response.cancellationPolicySummary : '';
          } catch (err) {
            state.booking = null;
            state.listing = null;
            state.priceBreakdown = null;
            state.cancellationPolicySummary = '';
            var msg = err && err.message ? err.message : 'Unable to load booking details.';
            state.lastErrorMessage = msg;
            state.lastErrorContext = 'load';
          } finally {
            hideLoader();
          }
        }

        function handleConfirmBooking() {
          if (!state.booking || typeof WebsiteSDK === 'undefined') {
            return;
          }
          var statusStr = state.booking.status ? String(state.booking.status).toLowerCase() : '';
          if (statusStr === 'confirmed' || statusStr === 'canceled') {
            return;
          }
          if (state.submitting || state.loading) {
            return;
          }

          state.lastErrorMessage = '';
          state.lastErrorContext = '';
          state.submitting = true;
          showLoader('confirm');

          try {
            var result = WebsiteSDK.confirmBooking(state.booking.id);
            if (result && result.success) {
              if (result.booking) {
                state.booking = result.booking;
              }
              state.confirmationMessage = result.confirmationMessage || 'Your booking is confirmed.';
              state.hideStatusBanner = false;
            } else {
              state.lastErrorMessage = 'We could not confirm your booking. Please try again.';
              state.lastErrorContext = 'confirm';
            }
          } catch (err) {
            var msg = err && err.message ? err.message : 'We could not confirm your booking. Please try again.';
            state.lastErrorMessage = msg;
            state.lastErrorContext = 'confirm';
          } finally {
            state.submitting = false;
            hideLoader();
          }
        }

        function navigateToBookingDetails() {
          if (!state.booking || !state.booking.id) {
            return;
          }
          var target = 'booking_details.html?bookingId=' + encodeURIComponent(state.booking.id);
          window.location.href = target;
        }

        function handleRetryLoad() {
          if (!state.bookingId) {
            state.lastErrorMessage = 'No booking is associated with this page. Use a link from the booking details step that includes a bookingId parameter.';
            state.lastErrorContext = 'load';
            updateUI();
            return;
          }
          loadBooking();
        }

        function handleDismissError() {
          state.lastErrorMessage = '';
          state.lastErrorContext = '';
          updateUI();
        }

        function handleDismissStatus() {
          state.hideStatusBanner = true;
          updateUI();
        }

        document.addEventListener('click', function(event) {
          var target = event.target;
          if (!target) {
            return;
          }
          var actionEl = target.closest('[data-action]');
          if (!actionEl) {
            return;
          }
          var action = actionEl.getAttribute('data-action');
          if (!action) {
            return;
          }

          if (action === 'confirm-booking') {
            event.preventDefault();
            if (actionEl instanceof HTMLButtonElement && actionEl.disabled) {
              return;
            }
            handleConfirmBooking();
          } else if (action === 'edit-details') {
            event.preventDefault();
            if (actionEl instanceof HTMLButtonElement && actionEl.disabled) {
              return;
            }
            navigateToBookingDetails();
          } else if (action === 'retry-load') {
            event.preventDefault();
            handleRetryLoad();
          } else if (action === 'dismiss-error') {
            event.preventDefault();
            handleDismissError();
          } else if (action === 'dismiss-status') {
            event.preventDefault();
            handleDismissStatus();
          }
        });

        window.addEventListener('popstate', function() {
          var newId = getBookingIdFromUrl();
          if (newId !== state.bookingId) {
            state.bookingId = newId;
            if (!state.bookingId) {
              state.booking = null;
              state.listing = null;
              state.priceBreakdown = null;
              state.cancellationPolicySummary = '';
              state.lastErrorMessage = 'No booking is associated with this page. Use a link from the booking details step that includes a bookingId parameter.';
              state.lastErrorContext = 'load';
              updateUI();
            } else {
              loadBooking();
            }
          }
        });

        state.bookingId = getBookingIdFromUrl();
        if (!state.bookingId) {
          state.lastErrorMessage = 'No booking is associated with this page. Use a link from the booking details step that includes a bookingId parameter.';
          state.lastErrorContext = 'load';
          updateUI();
        } else {
          loadBooking();
        }
      });
    })();
  </script>
</body>
</html>
