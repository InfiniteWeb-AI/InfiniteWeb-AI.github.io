<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8' />
  <title>Secure Research Data Access Portal</title>
  <meta name='viewport' content='width=device-width, initial-scale=1' />

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet' />

  <!-- Icon font (no SVG usage in markup) -->
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css' integrity='sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==' crossorigin='anonymous' referrerpolicy='no-referrer' />

  <!-- Site stylesheet -->
  <link rel='stylesheet' href='styles.css' />
  <!-- About page stylesheet -->
  <link rel='stylesheet' href='about.css' />
</head>
<body>
  <header class='site-header'>
    <div class='header-inner container'>
      <div class='logo'>
        <a href='index.html' class='logo-link' aria-label='Secure research data access portal home'>
          <span class='logo-main'>ARD</span><span class='logo-accent'>i</span>
        </a>
      </div>

      <nav class='main-nav' aria-label='Primary navigation'>
        <ul>
          <li>
            <a href='index.html' title='User dashboard showing pinned datasets and key project activity'>
              <span class='nav-text'>Dashboard</span>
              <span class='nav-icon' aria-hidden='true'><i class='fa-solid fa-gauge-high'></i></span>
            </a>
          </li>
          <li>
            <a href='datasets.html' title='Browse, search, and filter all available datasets'>
              <span class='nav-text'>Datasets</span>
              <span class='nav-icon' aria-hidden='true'><i class='fa-solid fa-database'></i></span>
            </a>
          </li>
          <li>
            <a href='projects.html' title='View and manage research projects'>
              <span class='nav-text'>Projects</span>
              <span class='nav-icon' aria-hidden='true'><i class='fa-solid fa-diagram-project'></i></span>
            </a>
          </li>
          <li>
            <a href='workspaces.html' title='Manage analytical workspaces and cohort queries'>
              <span class='nav-text'>Workspaces</span>
              <span class='nav-icon' aria-hidden='true'><i class='fa-solid fa-flask'></i></span>
            </a>
          </li>
          <li>
            <a href='agreements.html' title='View agreement templates and manage data use agreements'>
              <span class='nav-text'>Agreements &amp; Policies</span>
              <span class='nav-icon' aria-hidden='true'><i class='fa-solid fa-file-signature'></i></span>
            </a>
          </li>
          <li>
            <a href='favorites.html' title='Quick access to favorited datasets'>
              <span class='nav-text'>Favorites</span>
              <span class='nav-icon' aria-hidden='true'><i class='fa-solid fa-star'></i></span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
    <div class='header-divider' aria-hidden='true'></div>
  </header>

  <main id='content' class='site-main'>
    <!-- About Page Controller Wrapper -->
    <section class='page-band page-band-teal' data-component='about-page-controller'>
      <div class='container about-container'>
        <section class='card card-about'>
          <!-- Title / Icon Row -->
          <header class='card-header about-header'>
            <div class='about-header-main'>
              <div class='about-icon-circle' aria-hidden='true'>
                <i class='fa-solid fa-shield-halved'></i>
              </div>
              <div class='about-header-text'>
                <h1 class='card-title about-title' data-populate='about-title'>About</h1>
                <p class='about-subtitle'>Portal mission, scope, governance, security, and contact.</p>
              </div>
            </div>
          </header>

          <div class='card-divider' aria-hidden='true'></div>

          <!-- Section Navigation -->
          <nav class='about-section-nav' aria-label='About sections' data-component='about-section-navigation'>
            <ul class='about-section-nav-list' data-populate='about-section-nav'>
              <!-- Tabs populated via JavaScript based on getAboutContent -->
            </ul>
          </nav>

          <!-- Loading / Error Indicator -->
          <div class='about-status' data-component='about-loading-and-error-indicator' data-populate='about-status'>
            <!-- Status content populated via JavaScript -->
          </div>

          <!-- Two-column Content Zone -->
          <div class='about-main-layout'>
            <!-- Left: Main About Sections -->
            <section class='about-sections' data-component='about-content-sections' data-populate='about-sections'>
              <!-- Mission, scope, governance, security sections rendered here -->
            </section>

            <!-- Right: Contact Panel -->
            <aside class='about-contact-panel card-nested' data-component='about-contact-panel' data-populate='about-contact'>
              <!-- Contact information rendered here -->
            </aside>
          </div>
        </section>
      </div>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <div class='footer-left'>
        <p class='footer-text'>Secure, governed access to research data for approved projects.</p>
        <p class='footer-text footer-meta'>&copy; 2026 Secure Research Data Access Portal.</p>
      </div>
      <nav class='footer-nav' aria-label='Footer navigation'>
        <a href='about.html' title='Information about the portal and its operators'>About</a>
        <a href='help.html' title='User guides, FAQs, and support information'>Help</a>
        <a href='policies.html' title='Privacy policy and terms of use'>Policies</a>
      </nav>
    </div>
  </footer>

  <!-- SDK / Business Logic -->
  <script src='business_logic.js'></script>

  <!-- Page-specific UI Logic -->
  <script>
    (function() {
      'use strict';

      var aboutState = {
        data: null,
        isLoading: false,
        hasError: false,
        activeSection: null,
        initialSectionFromUrl: null
      };

      var dom = {
        titleEl: null,
        navListEl: null,
        statusEl: null,
        sectionsEl: null,
        contactEl: null
      };

      var SECTION_KEYS = ['mission', 'scope', 'governance', 'security', 'contact'];

      function parseSectionFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var raw = params.get('section');
        if (!raw) return null;
        var value = String(raw).toLowerCase();
        if (SECTION_KEYS.indexOf(value) !== -1) {
          return value;
        }
        return null;
      }

      function hasNonEmptyString(value) {
        return typeof value === 'string' && value.trim() !== '';
      }

      function hasAnyContactInfo(contactInfo) {
        if (!contactInfo) return false;
        return ['email', 'phone', 'organization'].some(function(field) {
          return hasNonEmptyString(contactInfo[field]);
        });
      }

      function isSectionAvailable(sectionKey, data) {
        if (!data) return false;
        if (sectionKey === 'mission') return hasNonEmptyString(data.mission);
        if (sectionKey === 'scope') return hasNonEmptyString(data.scope);
        if (sectionKey === 'governance') return hasNonEmptyString(data.governance);
        if (sectionKey === 'security') return hasNonEmptyString(data.securityPrinciples);
        if (sectionKey === 'contact') return hasAnyContactInfo(data.contactInfo || {});
        return false;
      }

      function resolveDefaultSection(data) {
        var order = ['mission', 'scope', 'governance', 'security', 'contact'];
        for (var i = 0; i < order.length; i++) {
          if (isSectionAvailable(order[i], data)) {
            return order[i];
          }
        }
        return null;
      }

      function resolveInitialActiveSection(data) {
        var fromUrl = aboutState.initialSectionFromUrl;
        if (fromUrl && isSectionAvailable(fromUrl, data)) {
          return fromUrl;
        }
        return resolveDefaultSection(data);
      }

      function updateUrlSection(sectionKey, replace) {
        try {
          var url = new URL(window.location.href);
          if (sectionKey) {
            url.searchParams.set('section', sectionKey);
          } else {
            url.searchParams.delete('section');
          }
          if (replace) {
            window.history.replaceState({ section: sectionKey }, '', url.toString());
          } else {
            window.history.pushState({ section: sectionKey }, '', url.toString());
          }
        } catch (e) {
          // If URL/History API not available, silently ignore.
        }
      }

      function appendMultilineText(container, text) {
        if (!hasNonEmptyString(text)) return;
        var normalized = text.replace(/\r\n/g, '\n');
        var parts = normalized.split(/\n{2,}/);
        for (var i = 0; i < parts.length; i++) {
          var segment = parts[i].trim();
          if (!segment) continue;
          var p = document.createElement('p');
          p.textContent = segment;
          container.appendChild(p);
        }
      }

      function renderTitle(container, data) {
        if (!container) return;
        var title = hasNonEmptyString(data && data.title) ? data.title.trim() : 'About';
        container.textContent = title;
      }

      function renderStatus(container, state) {
        if (!container) return;
        if (state.isLoading) {
          container.innerHTML = '';
          var loading = document.createElement('div');
          loading.className = 'about-status-message about-status-loading';
          loading.innerHTML = "<span class='status-icon' aria-hidden='true'><i class='fa-solid fa-circle-notch fa-spin'></i></span>" +
            "<span class='status-text'>Loading About information</span>";
          container.appendChild(loading);
        } else if (state.hasError) {
          container.innerHTML = '';
          var error = document.createElement('div');
          error.className = 'about-status-message about-status-error';
          error.innerHTML = "<span class='status-icon' aria-hidden='true'><i class='fa-solid fa-triangle-exclamation'></i></span>" +
            "<div class='status-body'>" +
            "<p class='status-text'>We could not load the About information right now.</p>" +
            "<button type='button' class='btn btn-secondary status-retry' data-action='retry-about'>" +
            "<span class='btn-icon' aria-hidden='true'><i class='fa-solid fa-rotate-right'></i></span>" +
            "<span class='btn-label'>Retry</span>" +
            "</button>" +
            "</div>";
          container.appendChild(error);
        } else {
          container.innerHTML = '';
        }
      }

      function buildSectionLabel(key) {
        if (key === 'mission') return 'Mission';
        if (key === 'scope') return 'Scope';
        if (key === 'governance') return 'Governance';
        if (key === 'security') return 'Security principles';
        if (key === 'contact') return 'Contact';
        return key;
      }

      function renderNav(container, data, activeSection) {
        if (!container) return;
        container.innerHTML = '';
        if (!data) return;

        var available = [];
        if (isSectionAvailable('mission', data)) available.push('mission');
        if (isSectionAvailable('scope', data)) available.push('scope');
        if (isSectionAvailable('governance', data)) available.push('governance');
        if (isSectionAvailable('security', data)) available.push('security');
        if (isSectionAvailable('contact', data)) available.push('contact');

        for (var i = 0; i < available.length; i++) {
          var key = available[i];
          var li = document.createElement('li');
          li.className = 'about-section-nav-item';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'about-section-tab';
          if (key === activeSection) {
            btn.className += ' is-active';
          }
          btn.setAttribute('data-action', 'select-section');
          btn.setAttribute('data-section', key);
          btn.textContent = buildSectionLabel(key);
          li.appendChild(btn);
          container.appendChild(li);
        }
      }

      function renderSections(container, data, activeSection) {
        if (!container) return;
        container.innerHTML = '';
        if (!data) return;

        var order = ['mission', 'scope', 'governance', 'security'];
        for (var i = 0; i < order.length; i++) {
          var key = order[i];
          if (!isSectionAvailable(key, data)) continue;

          var section = document.createElement('article');
          section.className = 'about-section';
          section.setAttribute('data-section-key', key);
          section.id = 'about-section-' + key;
          if (key === activeSection) {
            section.className += ' is-active';
          }

          var heading = document.createElement('h2');
          heading.className = 'about-section-heading';
          heading.textContent = buildSectionLabel(key);
          section.appendChild(heading);

          var body = document.createElement('div');
          body.className = 'about-section-body';

          var contentText = '';
          if (key === 'mission') contentText = data.mission;
          if (key === 'scope') contentText = data.scope;
          if (key === 'governance') contentText = data.governance;
          if (key === 'security') contentText = data.securityPrinciples;

          appendMultilineText(body, contentText || '');
          section.appendChild(body);
          container.appendChild(section);
        }
      }

      function renderContact(container, contactInfo, activeSection) {
        if (!container) return;
        container.innerHTML = '';

        var hasContact = hasAnyContactInfo(contactInfo);
        container.classList.remove('is-empty', 'is-active');
        if (!hasContact) {
          container.classList.add('is-empty');
          var emptyMsg = document.createElement('p');
          emptyMsg.className = 'about-contact-empty';
          emptyMsg.textContent = 'Contact information is not currently available.';
          container.appendChild(emptyMsg);
          return;
        }

        if (activeSection === 'contact') {
          container.classList.add('is-active');
        }

        var title = document.createElement('h2');
        title.className = 'about-contact-title';
        title.textContent = 'Contact';
        container.appendChild(title);

        if (hasNonEmptyString(contactInfo.organization)) {
          var org = document.createElement('p');
          org.className = 'about-contact-organization';
          org.textContent = contactInfo.organization.trim();
          container.appendChild(org);
        }

        if (hasNonEmptyString(contactInfo.email)) {
          var emailGroup = document.createElement('div');
          emailGroup.className = 'about-contact-field';

          var emailLabel = document.createElement('div');
          emailLabel.className = 'about-contact-label';
          emailLabel.textContent = 'Email';
          emailGroup.appendChild(emailLabel);

          var emailValueRow = document.createElement('div');
          emailValueRow.className = 'about-contact-value-row';

          var emailLink = document.createElement('a');
          emailLink.className = 'about-contact-link';
          emailLink.href = 'mailto:' + contactInfo.email.trim();
          emailLink.textContent = contactInfo.email.trim();
          emailLink.setAttribute('rel', 'noopener noreferrer');
          emailValueRow.appendChild(emailLink);

          var copyBtn = document.createElement('button');
          copyBtn.type = 'button';
          copyBtn.className = 'btn btn-inline btn-ghost about-contact-copy';
          copyBtn.setAttribute('data-action', 'copy-email');
          copyBtn.innerHTML = "<span class='btn-icon' aria-hidden='true'><i class='fa-solid fa-copy'></i></span>" +
            "<span class='btn-label'>Copy</span>";
          emailValueRow.appendChild(copyBtn);

          emailGroup.appendChild(emailValueRow);
          container.appendChild(emailGroup);
        }

        if (hasNonEmptyString(contactInfo.phone)) {
          var phoneGroup = document.createElement('div');
          phoneGroup.className = 'about-contact-field';

          var phoneLabel = document.createElement('div');
          phoneLabel.className = 'about-contact-label';
          phoneLabel.textContent = 'Phone';
          phoneGroup.appendChild(phoneLabel);

          var phoneValueRow = document.createElement('div');
          phoneValueRow.className = 'about-contact-value-row';

          var phoneLink = document.createElement('a');
          phoneLink.className = 'about-contact-link';
          phoneLink.href = 'tel:' + contactInfo.phone.trim();
          phoneLink.textContent = contactInfo.phone.trim();
          phoneValueRow.appendChild(phoneLink);

          phoneGroup.appendChild(phoneValueRow);
          container.appendChild(phoneGroup);
        }
      }

      function scrollToActiveSection() {
        if (!aboutState.activeSection) return;
        var target = null;
        if (aboutState.activeSection === 'contact') {
          target = dom.contactEl;
        } else if (dom.sectionsEl) {
          target = dom.sectionsEl.querySelector('[data-section-key=' + aboutState.activeSection + ']');
        }
        if (target && typeof target.scrollIntoView === 'function') {
          try {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          } catch (e) {
            target.scrollIntoView();
          }
        }
      }

      function applyActiveSection(sectionKey, options) {
        options = options || {};
        var updateUrl = !!options.updateUrl;
        var scroll = options.scroll !== false;

        if (!aboutState.data || !sectionKey) return;
        if (!isSectionAvailable(sectionKey, aboutState.data)) return;

        aboutState.activeSection = sectionKey;

        renderNav(dom.navListEl, aboutState.data, aboutState.activeSection);
        renderSections(dom.sectionsEl, aboutState.data, aboutState.activeSection);
        renderContact(dom.contactEl, (aboutState.data && aboutState.data.contactInfo) || {}, aboutState.activeSection);

        if (updateUrl) {
          updateUrlSection(sectionKey, false);
        }
        if (scroll) {
          scrollToActiveSection();
        }
      }

      function loadAboutContent() {
        if (!dom.statusEl) return;
        aboutState.isLoading = true;
        aboutState.hasError = false;
        aboutState.data = null;

        renderStatus(dom.statusEl, aboutState);
        renderNav(dom.navListEl, null, null);
        renderSections(dom.sectionsEl, null, null);
        renderContact(dom.contactEl, null, null);

        try {
          var data = WebsiteSDK.getAboutContent();
          aboutState.data = data || {};
          aboutState.isLoading = false;
          aboutState.hasError = false;

          var resolvedSection = resolveInitialActiveSection(aboutState.data);
          aboutState.activeSection = resolvedSection;

          renderTitle(dom.titleEl, aboutState.data);
          renderStatus(dom.statusEl, aboutState);
          renderNav(dom.navListEl, aboutState.data, aboutState.activeSection);
          renderSections(dom.sectionsEl, aboutState.data, aboutState.activeSection);
          renderContact(dom.contactEl, aboutState.data.contactInfo || {}, aboutState.activeSection);

          if (aboutState.activeSection) {
            scrollToActiveSection();
          }
        } catch (err) {
          console.error('Failed to load About content', err);
          aboutState.isLoading = false;
          aboutState.hasError = true;
          aboutState.data = null;

          renderStatus(dom.statusEl, aboutState);
          renderNav(dom.navListEl, null, null);
          renderSections(dom.sectionsEl, null, null);
          renderContact(dom.contactEl, null, null);
        }
      }

      function handleRetry() {
        if (aboutState.isLoading) return;
        loadAboutContent();
      }

      function handleCopyEmail() {
        if (!aboutState.data || !aboutState.data.contactInfo || !hasNonEmptyString(aboutState.data.contactInfo.email)) {
          return;
        }
        var email = aboutState.data.contactInfo.email.trim();
        if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
          navigator.clipboard.writeText(email).catch(function(err) {
            console.error('Copy to clipboard failed', err);
          });
        } else {
          var temp = document.createElement('textarea');
          temp.value = email;
          temp.setAttribute('readonly', 'readonly');
          temp.style.position = 'fixed';
          temp.style.opacity = '0';
          document.body.appendChild(temp);
          temp.select();
          try {
            document.execCommand('copy');
          } catch (err) {
            console.error('Copy command failed', err);
          }
          document.body.removeChild(temp);
        }
      }

      function onDocumentClick(event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');
        if (!action) return;

        if (action === 'retry-about') {
          event.preventDefault();
          handleRetry();
        } else if (action === 'select-section') {
          event.preventDefault();
          var sectionKey = actionEl.getAttribute('data-section');
          if (!sectionKey || !aboutState.data) return;
          if (sectionKey === aboutState.activeSection) return;
          applyActiveSection(sectionKey, { updateUrl: true, scroll: true });
        } else if (action === 'copy-email') {
          event.preventDefault();
          handleCopyEmail();
        }
      }

      function onPopState() {
        var sectionFromUrl = parseSectionFromUrl();
        aboutState.initialSectionFromUrl = sectionFromUrl;
        if (!aboutState.data) {
          return;
        }
        var resolved = sectionFromUrl && isSectionAvailable(sectionFromUrl, aboutState.data)
          ? sectionFromUrl
          : aboutState.activeSection;
        if (!resolved) {
          resolved = resolveDefaultSection(aboutState.data);
        }
        if (!resolved) return;
        applyActiveSection(resolved, { updateUrl: false, scroll: true });
      }

      document.addEventListener('DOMContentLoaded', function() {
        dom.titleEl = document.querySelector('[data-populate="about-title"]');
        dom.navListEl = document.querySelector('[data-populate="about-section-nav"]');
        dom.statusEl = document.querySelector('[data-populate="about-status"]');
        dom.sectionsEl = document.querySelector('[data-populate="about-sections"]');
        dom.contactEl = document.querySelector('[data-populate="about-contact"]');

        aboutState.initialSectionFromUrl = parseSectionFromUrl();

        document.addEventListener('click', onDocumentClick);
        window.addEventListener('popstate', onPopState);

        loadAboutContent();
      });
    })();
  </script>
</body>
</html>
