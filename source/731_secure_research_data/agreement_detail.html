<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Agreement Detail - Secure Research Data Access Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="View, create from template, edit, and activate/deactivate a data use agreement, including configuration of key policy fields and linking the agreement to a project." />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap" rel="stylesheet" />

  <!-- Icon font (no SVG usage in markup) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Site stylesheet -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Page stylesheet -->
  <link rel="stylesheet" href="agreement_detail.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <div class="logo">
        <a href="index.html" class="logo-link" aria-label="Secure research data access portal home">
          <span class="logo-main">ARD</span><span class="logo-accent">i</span>
        </a>
      </div>

      <nav class="main-nav" aria-label="Primary navigation">
        <ul>
          <li>
            <a href="index.html" title="User dashboard showing pinned datasets and key project activity">
              <span class="nav-text">Dashboard</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-gauge-high"></i></span>
            </a>
          </li>
          <li>
            <a href="datasets.html" title="Browse, search, and filter all available datasets">
              <span class="nav-text">Datasets</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-database"></i></span>
            </a>
          </li>
          <li>
            <a href="projects.html" title="View and manage research projects">
              <span class="nav-text">Projects</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-diagram-project"></i></span>
            </a>
          </li>
          <li>
            <a href="workspaces.html" title="Manage analytical workspaces and cohort queries">
              <span class="nav-text">Workspaces</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-flask"></i></span>
            </a>
          </li>
          <li>
            <a href="agreements.html" title="View agreement templates and manage data use agreements">
              <span class="nav-text">Agreements &amp; Policies</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-file-signature"></i></span>
            </a>
          </li>
          <li>
            <a href="favorites.html" title="Quick access to favorited datasets">
              <span class="nav-text">Favorites</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-star"></i></span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
    <div class="header-divider" aria-hidden="true"></div>
  </header>

  <main id="content" class="site-main">
    <div class="teal-canvas agreement-detail-page">
      <div class="container agreement-detail-container">
        <section class="card card-elevated card-agreement" aria-labelledby="agreementDetailTitle">
          <div class="card-inner">
            <div class="card-header-row">
              <button type="button" class="link-back inline-back-link" data-component="navigation-links" data-action="back-to-agreements">
                <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-arrow-left"></i></span>
                <span class="nav-text">Back to agreements</span>
              </button>
              <div class="card-header-main">
                <div class="card-header-left" data-component="mode-indicator" data-populate="mode-indicator"></div>
                <div class="card-header-right" data-component="agreement-status-controls" data-populate="agreement-status-controls"></div>
              </div>
            </div>

            <div class="validation-messages-panel" data-component="validation-messages" data-populate="validation-messages" aria-live="polite"></div>

            <form id="agreementForm" class="agreement-form" novalidate>
              <section class="form-section agreement-metadata-section" data-component="agreement-metadata-form" data-populate="agreement-metadata-form"></section>

              <section class="form-section agreement-policy-section" data-component="agreement-policy-settings" data-populate="agreement-policy-settings"></section>

              <section class="form-section linked-project-section" data-component="linked-project-input" data-populate="linked-project-input"></section>
            </form>

            <div class="agreement-save-bar" data-component="agreement-save-bar" data-populate="agreement-save-bar"></div>

            <div class="context-loader-overlay" data-component="agreement-context-loader" aria-hidden="true">
              <div class="context-loader-inner">
                <div class="spinner" aria-hidden="true"></div>
                <p class="loader-text">Loading agreement context</p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <div class="footer-left">
        <p class="footer-text">Secure, governed access to research data for approved projects.</p>
        <p class="footer-text footer-meta">&copy; 2026 Secure Research Data Access Portal.</p>
      </div>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="about.html" title="Information about the portal and its operators">About</a>
        <a href="help.html" title="User guides, FAQs, and support information">Help</a>
        <a href="policies.html" title="Privacy policy and terms of use">Policies</a>
      </nav>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const pageState = {
        mode: 'view',
        agreementId: null,
        templateId: null,
        agreement: null,
        template: null,
        messages: [],
        isLoading: false
      };

      let projectsCache = [];

      function escapeHtml(str) {
        if (str === null || str === undefined) {
          return '';
        }
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatDate(value) {
        if (!value) {
          return '';
        }
        try {
          const date = new Date(value);
          if (isNaN(date.getTime())) {
            return '';
          }
          return date.toLocaleString(undefined, {
            year: 'numeric',
            month: 'short',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
        } catch (e) {
          return '';
        }
      }

      function setLoading(isLoading) {
        pageState.isLoading = isLoading;
        const overlay = document.querySelector('[data-component="agreement-context-loader"]');
        if (overlay) {
          if (isLoading) {
            overlay.classList.add('is-active');
            overlay.removeAttribute('aria-hidden');
          } else {
            overlay.classList.remove('is-active');
            overlay.setAttribute('aria-hidden', 'true');
          }
        }
      }

      function clearMessages() {
        pageState.messages = [];
      }

      function addMessage(type, text) {
        if (!text) {
          return;
        }
        pageState.messages.push({ type: type, text: text });
      }

      function loadProjectsCache() {
        try {
          const raw = localStorage.getItem('projects') || '[]';
          const parsed = JSON.parse(raw);
          projectsCache = Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          projectsCache = [];
        }
      }

      function parseParams() {
        const params = new URLSearchParams(window.location.search);
        const agreementId = params.get('agreementId');
        const templateId = params.get('templateId');
        let mode = params.get('mode') || 'view';

        pageState.agreementId = agreementId;
        pageState.templateId = templateId;
        pageState.mode = mode;

        if (agreementId && mode === 'fromTemplate') {
          pageState.mode = 'edit';
          addMessage('info', 'Existing agreement takes precedence over template; editing agreement instead.');
        }
        if (!agreementId && !templateId) {
          pageState.mode = 'view';
        }
      }

      function renderModeIndicator(container) {
        const mode = pageState.mode || 'view';
        let modeLabel = 'Viewing agreement';
        if (mode === 'edit') {
          modeLabel = 'Editing agreement';
        } else if (mode === 'fromTemplate') {
          modeLabel = 'Create from template';
        }
        const agreementTitle = pageState.agreement && pageState.agreement.title
          ? pageState.agreement.title
          : 'Untitled agreement';

        container.innerHTML = `
          <div class="mode-indicator">
            <span class="mode-indicator-badge mode-${escapeHtml(mode)}">${escapeHtml(modeLabel)}</span>
          </div>
          <div class="card-title-wrapper">
            <h1 id="agreementDetailTitle" class="card-title">${escapeHtml(agreementTitle)}</h1>
          </div>
        `;
      }

      function renderStatusControls(container) {
        const agreement = pageState.agreement;
        const status = agreement && agreement.status ? agreement.status : 'draft';
        const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
        const hasId = !!(agreement && agreement.id);
        const isView = pageState.mode === 'view';
        const canActivate = hasId && !isView && status !== 'active';
        const canDeactivate = hasId && !isView && status === 'active';
        const activatedAt = agreement && agreement.activated_at ? formatDate(agreement.activated_at) : 'Not activated';

        container.innerHTML = `
          <div class="status-controls">
            <div class="status-pill status-${escapeHtml(status)}">
              <span class="status-label">${escapeHtml(statusLabel)}</span>
            </div>
            <div class="status-meta">
              <span class="status-timestamp-label">Activated:</span>
              <span class="status-timestamp-value">${escapeHtml(activatedAt)}</span>
            </div>
            <div class="status-actions">
              <button type="button" class="btn btn-secondary" data-action="activate-agreement"${canActivate ? '' : ' disabled'}>
                <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-play"></i></span>
                <span class="nav-text">Activate</span>
              </button>
              <button type="button" class="btn btn-secondary" data-action="deactivate-agreement"${canDeactivate ? '' : ' disabled'}>
                <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-pause"></i></span>
                <span class="nav-text">Deactivate</span>
              </button>
            </div>
          </div>
        `;
      }

      function renderValidationMessages(container) {
        if (!pageState.messages || pageState.messages.length === 0) {
          container.innerHTML = '';
          container.classList.remove('has-messages');
          return;
        }
        container.classList.add('has-messages');
        const itemsHtml = pageState.messages.map(function(msg, index) {
          const typeClass = msg.type === 'error' ? 'alert-error' : (msg.type === 'success' ? 'alert-success' : 'alert-info');
          const iconClass = msg.type === 'error' ? 'fa-circle-exclamation' : (msg.type === 'success' ? 'fa-circle-check' : 'fa-circle-info');
          return `
            <div class="alert ${typeClass}" data-message-index="${index}">
              <span class="alert-icon" aria-hidden="true">
                <i class="fa-solid ${iconClass}"></i>
              </span>
              <span class="alert-text">${escapeHtml(msg.text)}</span>
              <button type="button" class="alert-dismiss" data-action="dismiss-message" aria-label="Dismiss message">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
          `;
        }).join('');
        container.innerHTML = itemsHtml;
      }

      function renderMetadataForm(container) {
        const agreement = pageState.agreement;
        if (!agreement) {
          container.innerHTML = `
            <p class="muted">
              Agreement details are not available. Check the URL parameters and return to the agreements list if needed.
            </p>
          `;
          return;
        }

        let templateName = '';
        if (agreement.source_template_id && pageState.template && pageState.template.id === agreement.source_template_id) {
          templateName = pageState.template.name || '';
        }

        const createdAt = agreement.created_at ? formatDate(agreement.created_at) : 'Not available';
        const activatedAt = agreement.activated_at ? formatDate(agreement.activated_at) : 'Not activated';
        const description = agreement.description || '';

        container.innerHTML = `
          <div class="form-section-header">
            <h2 class="section-title">Agreement metadata</h2>
            <p id="agreementMetaHelp" class="section-help">Core identifying information for this data use agreement.</p>
          </div>
          <div class="form-grid two-column">
            <div class="form-group full-width">
              <label for="agreementTitleInput" class="form-label">Agreement title <span class="required-indicator">*</span></label>
              <div class="input-group">
                <span class="input-group-addon">
                  <i class="fa-solid fa-file-signature"></i>
                </span>
                <input type="text" id="agreementTitleInput" name="title" class="form-control" autocomplete="off" value="${escapeHtml(agreement.title || '')}" />
              </div>
            </div>
            <div class="form-group full-width">
              <label for="agreementDescriptionInput" class="form-label">Description</label>
              <textarea id="agreementDescriptionInput" name="description" class="form-control" rows="3">${escapeHtml(description)}</textarea>
            </div>
          </div>
          <div class="meta-inline-grid">
            <div class="meta-item">
              <span class="meta-label">Source template</span>
              <span class="meta-value">${templateName ? escapeHtml(templateName) : 'None'}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Created</span>
              <span class="meta-value">${escapeHtml(createdAt)}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Activated</span>
              <span class="meta-value">${escapeHtml(activatedAt)}</span>
            </div>
          </div>
        `;
      }

      function renderPolicySettings(container) {
        const agreement = pageState.agreement;
        if (!agreement) {
          container.innerHTML = '';
          return;
        }
        const retentionRaw = (agreement.data_retention_period_months !== undefined && agreement.data_retention_period_months !== null)
          ? String(agreement.data_retention_period_months)
          : '';

        container.innerHTML = `
          <div class="form-section-header">
            <h2 class="section-title">Policy settings</h2>
            <p class="section-help">Configure key policy values such as data retention.</p>
          </div>
          <div class="form-grid one-column">
            <div class="form-group">
              <label for="dataRetentionInput" class="form-label">Data retention period (months)</label>
              <div class="input-group">
                <span class="input-group-addon"><i class="fa-solid fa-clock"></i></span>
                <input type="number" min="1" step="1" id="dataRetentionInput" name="dataRetentionPeriodMonths" class="form-control" value="${escapeHtml(retentionRaw)}" />
              </div>
              <p class="field-help">Specify how long data may be retained under this agreement.</p>
            </div>
          </div>
        `;
      }

      function renderLinkedProjectSection(container) {
        const agreement = pageState.agreement;
        const linkedId = agreement && agreement.linked_project_id ? String(agreement.linked_project_id) : '';
        const hasLinked = !!linkedId;

        let optionsHtml = '<option value="">Select linked project</option>';
        if (projectsCache && projectsCache.length > 0) {
          projectsCache.forEach(function(project) {
            const isSelected = linkedId && project.id === linkedId;
            optionsHtml += `
              <option value="${escapeHtml(project.id)}"${isSelected ? ' selected' : ''}>${escapeHtml(project.title || project.id)}</option>
            `;
          });
        } else {
          optionsHtml += '<option value="" disabled>(No projects available)</option>';
        }

        let linkedLabel = 'None';
        if (hasLinked) {
          const projectMatch = projectsCache.find(function(p) { return p.id === linkedId; });
          linkedLabel = projectMatch && projectMatch.title ? projectMatch.title : linkedId;
        }

        container.innerHTML = `
          <div class="form-section-header">
            <h2 class="section-title">Linked project</h2>
            <p class="section-help">Associate this agreement with the project it governs.</p>
          </div>
          <div class="form-grid one-column">
            <div class="form-group">
              <label for="linkedProjectSelect" class="form-label">Project</label>
              <select id="linkedProjectSelect" name="linkedProjectId" class="form-control">
                ${optionsHtml}
              </select>
              <p class="field-help">Only listed projects can be governed by this agreement.</p>
            </div>
            <div class="linked-project-summary">
              <span class="meta-label">Current link</span>
              <span class="meta-value">${escapeHtml(linkedLabel)}</span>
              <button type="button" class="btn btn-link" data-action="navigate-linked-project"${hasLinked ? '' : ' disabled'}>
                <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-diagram-project"></i></span>
                <span class="nav-text">Open project detail</span>
              </button>
            </div>
          </div>
        `;
      }

      function renderSaveBar(container) {
        const mode = pageState.mode || 'view';
        const agreementLoaded = !!pageState.agreement;
        const isPersisted = agreementLoaded && !!pageState.agreement.id;
        const isView = mode === 'view';
        let primaryLabel = 'Save changes';
        if (!isPersisted && mode === 'fromTemplate') {
          primaryLabel = 'Save agreement';
        }
        const saveDisabled = isView || !agreementLoaded;

        container.innerHTML = `
          <div class="save-bar-inner">
            <div class="save-bar-left">
              <button type="button" class="btn btn-ghost" data-component="navigation-links" data-action="back-to-agreements">
                <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-arrow-left"></i></span>
                <span class="nav-text">Back to agreements</span>
              </button>
            </div>
            <div class="save-bar-right">
              <button type="button" class="btn btn-primary" data-action="save-agreement"${saveDisabled ? ' disabled' : ''}>
                <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-floppy-disk"></i></span>
                <span class="nav-text">${escapeHtml(primaryLabel)}</span>
              </button>
            </div>
          </div>
        `;
      }

      function renderAll() {
        const populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          const type = element.getAttribute('data-populate');
          if (!type) {
            return;
          }
          if (type === 'mode-indicator') {
            renderModeIndicator(element);
          } else if (type === 'agreement-status-controls') {
            renderStatusControls(element);
          } else if (type === 'validation-messages') {
            renderValidationMessages(element);
          } else if (type === 'agreement-metadata-form') {
            renderMetadataForm(element);
          } else if (type === 'agreement-policy-settings') {
            renderPolicySettings(element);
          } else if (type === 'linked-project-input') {
            renderLinkedProjectSection(element);
          } else if (type === 'agreement-save-bar') {
            renderSaveBar(element);
          }
        });
      }

      function applyModeToFormControls() {
        const isView = pageState.mode === 'view';
        const agreementAvailable = !!pageState.agreement;
        const disable = !agreementAvailable || isView;
        const ids = ['agreementTitleInput', 'agreementDescriptionInput', 'dataRetentionInput', 'linkedProjectSelect'];
        ids.forEach(function(id) {
          const el = document.getElementById(id);
          if (el) {
            if (disable) {
              el.setAttribute('disabled', 'disabled');
            } else {
              el.removeAttribute('disabled');
            }
          }
        });
      }

      function collectFormValuesFromDom() {
        if (!pageState.agreement) {
          return;
        }
        const agreement = pageState.agreement;
        const titleInput = document.getElementById('agreementTitleInput');
        if (titleInput) {
          agreement.title = titleInput.value;
        }
        const descInput = document.getElementById('agreementDescriptionInput');
        if (descInput) {
          agreement.description = descInput.value;
        }
        const retentionInput = document.getElementById('dataRetentionInput');
        if (retentionInput) {
          const v = retentionInput.value;
          agreement.data_retention_period_months = v === '' ? '' : v;
        }
        const linkedSelect = document.getElementById('linkedProjectSelect');
        if (linkedSelect) {
          agreement.linked_project_id = linkedSelect.value || '';
        }
      }

      function validateFormState(isCreate) {
        const errors = [];
        const agreement = pageState.agreement;
        if (!agreement) {
          errors.push('Agreement state is not initialized.');
          return errors;
        }

        const title = agreement.title ? agreement.title.trim() : '';
        if (!title) {
          errors.push('Agreement title is required.');
        }

        const retentionRaw = agreement.data_retention_period_months;
        if (retentionRaw === '' || typeof retentionRaw === 'undefined' || retentionRaw === null) {
          if (isCreate) {
            errors.push('Data retention period (months) is required.');
          }
        }
        if (retentionRaw !== '' && retentionRaw !== null && typeof retentionRaw !== 'undefined') {
          const num = Number(retentionRaw);
          if (!Number.isFinite(num) || num <= 0) {
            errors.push('Data retention period must be a positive number of months.');
          }
        }

        return errors;
      }

      function updateUrlAfterCreate(newId) {
        if (!newId) {
          return;
        }
        try {
          const url = new URL(window.location.href);
          url.searchParams.delete('templateId');
          url.searchParams.set('agreementId', newId);
          url.searchParams.set('mode', 'edit');
          window.history.replaceState({}, '', url.toString());
        } catch (e) {
          window.location.href = 'agreement_detail.html?agreementId=' + encodeURIComponent(newId) + '&mode=edit';
        }
      }

      function handleBackToAgreements(event) {
        event.preventDefault();
        window.location.href = 'agreements.html';
      }

      function handleSaveAgreement(event) {
        event.preventDefault();
        if (!pageState.agreement) {
          return;
        }
        clearMessages();
        collectFormValuesFromDom();

        const isCreate = !pageState.agreement.id && pageState.mode === 'fromTemplate';
        const errors = validateFormState(isCreate);
        if (errors.length > 0) {
          errors.forEach(function(msg) { addMessage('error', msg); });
          renderAll();
          attachEventHandlers();
          return;
        }

        setLoading(true);
        try {
          if (isCreate) {
            if (!pageState.templateId) {
              addMessage('error', 'Template context is missing; cannot create agreement.');
            } else {
              const a = pageState.agreement;
              const retentionNumber = (a.data_retention_period_months === '' || a.data_retention_period_months === null || typeof a.data_retention_period_months === 'undefined')
                ? null
                : Number(a.data_retention_period_months);
              const createdAgreement = WebsiteSDK.createAgreementFromTemplate(
                pageState.templateId,
                a.title || '',
                retentionNumber,
                a.linked_project_id || '',
                a.description || ''
              );
              pageState.agreement = createdAgreement;
              pageState.mode = 'edit';
              pageState.agreementId = createdAgreement && createdAgreement.id ? createdAgreement.id : null;
              addMessage('success', 'Agreement created from template.');
              if (createdAgreement && createdAgreement.id) {
                updateUrlAfterCreate(createdAgreement.id);
              }
            }
          } else {
            const a = pageState.agreement;
            const retentionNumber = (a.data_retention_period_months === '' || a.data_retention_period_months === null || typeof a.data_retention_period_months === 'undefined')
              ? null
              : Number(a.data_retention_period_months);
            const response = WebsiteSDK.updateAgreement(
              pageState.agreementId,
              a.title || '',
              a.description || '',
              retentionNumber,
              a.linked_project_id || ''
            );
            if (response && response.success && response.agreement) {
              pageState.agreement = response.agreement;
              addMessage('success', response.message || 'Agreement updated successfully.');
            } else if (response && !response.success) {
              addMessage('error', response.message || 'Update failed. Please correct any issues and try again.');
            } else {
              addMessage('error', 'Unexpected response while updating agreement.');
            }
          }
        } catch (e) {
          addMessage('error', 'An error occurred while saving the agreement. Please try again.');
        }
        setLoading(false);
        renderAll();
        attachEventHandlers();
      }

      function handleActivateAgreement(event) {
        event.preventDefault();
        if (!pageState.agreement || !pageState.agreement.id) {
          return;
        }
        if (pageState.mode === 'view') {
          return;
        }
        clearMessages();
        setLoading(true);
        try {
          const response = WebsiteSDK.setAgreementStatus(pageState.agreement.id, 'active');
          if (response && response.success && response.agreement) {
            pageState.agreement = response.agreement;
            addMessage('success', response.message || 'Agreement activated.');
          } else if (response && !response.success) {
            addMessage('error', response.message || 'Unable to activate agreement.');
          } else {
            addMessage('error', 'Unexpected response while changing agreement status.');
          }
        } catch (e) {
          addMessage('error', 'An error occurred while setting agreement status.');
        }
        setLoading(false);
        renderAll();
        attachEventHandlers();
      }

      function handleDeactivateAgreement(event) {
        event.preventDefault();
        if (!pageState.agreement || !pageState.agreement.id) {
          return;
        }
        if (pageState.mode === 'view') {
          return;
        }
        clearMessages();
        setLoading(true);
        try {
          const response = WebsiteSDK.setAgreementStatus(pageState.agreement.id, 'inactive');
          if (response && response.success && response.agreement) {
            pageState.agreement = response.agreement;
            addMessage('success', response.message || 'Agreement deactivated.');
          } else if (response && !response.success) {
            addMessage('error', response.message || 'Unable to deactivate agreement.');
          } else {
            addMessage('error', 'Unexpected response while changing agreement status.');
          }
        } catch (e) {
          addMessage('error', 'An error occurred while setting agreement status.');
        }
        setLoading(false);
        renderAll();
        attachEventHandlers();
      }

      function handleNavigateToProject(event) {
        event.preventDefault();
        if (!pageState.agreement || !pageState.agreement.linked_project_id) {
          return;
        }
        const projectId = pageState.agreement.linked_project_id;
        window.location.href = 'project_detail.html?projectId=' + encodeURIComponent(projectId);
      }

      function handleDismissMessages(event) {
        event.preventDefault();
        clearMessages();
        const container = document.querySelector('[data-populate="validation-messages"]');
        if (container) {
          renderValidationMessages(container);
        }
      }

      function attachEventHandlers() {
        const actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(element) {
          const action = element.getAttribute('data-action');
          if (action === 'back-to-agreements') {
            element.addEventListener('click', handleBackToAgreements);
          } else if (action === 'save-agreement') {
            element.addEventListener('click', handleSaveAgreement);
          } else if (action === 'activate-agreement') {
            element.addEventListener('click', handleActivateAgreement);
          } else if (action === 'deactivate-agreement') {
            element.addEventListener('click', handleDeactivateAgreement);
          } else if (action === 'navigate-linked-project') {
            element.addEventListener('click', handleNavigateToProject);
          } else if (action === 'dismiss-message') {
            element.addEventListener('click', handleDismissMessages);
          }
        });

        const titleInput = document.getElementById('agreementTitleInput');
        if (titleInput) {
          titleInput.addEventListener('input', function(event) {
            if (pageState.agreement) {
              pageState.agreement.title = event.target.value;
            }
          });
        }
        const descInput = document.getElementById('agreementDescriptionInput');
        if (descInput) {
          descInput.addEventListener('input', function(event) {
            if (pageState.agreement) {
              pageState.agreement.description = event.target.value;
            }
          });
        }
        const retentionInput = document.getElementById('dataRetentionInput');
        if (retentionInput) {
          retentionInput.addEventListener('input', function(event) {
            if (pageState.agreement) {
              pageState.agreement.data_retention_period_months = event.target.value;
            }
          });
        }
        const linkedSelect = document.getElementById('linkedProjectSelect');
        if (linkedSelect) {
          linkedSelect.addEventListener('change', function(event) {
            if (pageState.agreement) {
              pageState.agreement.linked_project_id = event.target.value || '';
            }
            const linkedContainer = document.querySelector('[data-component="linked-project-input"][data-populate="linked-project-input"]');
            if (linkedContainer) {
              renderLinkedProjectSection(linkedContainer);
              const navigateButton = linkedContainer.querySelector('[data-action="navigate-linked-project"]');
              if (navigateButton) {
                navigateButton.addEventListener('click', handleNavigateToProject);
              }
            }
          });
        }

        applyModeToFormControls();
      }

      function initContext() {
        loadProjectsCache();
        parseParams();

        if (!pageState.agreementId && !pageState.templateId) {
          clearMessages();
          addMessage('error', 'No agreement or template specified. Use the agreements list to open or create an agreement.');
          renderAll();
          attachEventHandlers();
          return;
        }

        setLoading(true);
        try {
          if (pageState.agreementId) {
            const agreement = WebsiteSDK.getAgreementDetails(pageState.agreementId);
            pageState.agreement = agreement;
          } else if (pageState.templateId && pageState.mode === 'fromTemplate') {
            const template = WebsiteSDK.getAgreementTemplateDetails(pageState.templateId);
            pageState.template = template;
            pageState.agreement = {
              id: null,
              title: template && template.name ? template.name : '',
              description: template && template.description ? template.description : '',
              status: 'draft',
              data_retention_period_months: (template && typeof template.default_data_retention_months !== 'undefined' && template.default_data_retention_months !== null)
                ? template.default_data_retention_months
                : '',
              linked_project_id: '',
              source_template_id: template ? template.id : null,
              created_at: null,
              activated_at: null
            };
          } else {
            clearMessages();
            addMessage('error', 'Unsupported parameter combination. Provide either an agreementId or mode=fromTemplate with a templateId.');
          }
        } catch (e) {
          clearMessages();
          addMessage('error', 'Unable to load agreement context. Please try again from the agreements list.');
        }
        setLoading(false);
        renderAll();
        attachEventHandlers();
      }

      initContext();
    });
  </script>
</body>
</html>
