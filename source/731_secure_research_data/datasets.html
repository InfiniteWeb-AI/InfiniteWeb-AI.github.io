<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Secure Research Data Access Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap" rel="stylesheet" />

  <!-- Icon font (no SVG usage in markup) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Site stylesheet -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="datasets.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <div class="logo">
        <a href="index.html" class="logo-link" aria-label="Secure research data access portal home">
          <span class="logo-main">ARD</span><span class="logo-accent">i</span>
        </a>
      </div>

      <nav class="main-nav" aria-label="Primary navigation">
        <ul>
          <li>
            <a href="index.html" title="User dashboard showing pinned datasets and key project activity">
              <span class="nav-text">Dashboard</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-gauge-high"></i></span>
            </a>
          </li>
          <li>
            <a href="datasets.html" title="Browse, search, and filter all available datasets">
              <span class="nav-text">Datasets</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-database"></i></span>
            </a>
          </li>
          <li>
            <a href="projects.html" title="View and manage research projects">
              <span class="nav-text">Projects</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-diagram-project"></i></span>
            </a>
          </li>
          <li>
            <a href="workspaces.html" title="Manage analytical workspaces and cohort queries">
              <span class="nav-text">Workspaces</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-flask"></i></span>
            </a>
          </li>
          <li>
            <a href="agreements.html" title="View agreement templates and manage data use agreements">
              <span class="nav-text">Agreements &amp; Policies</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-file-signature"></i></span>
            </a>
          </li>
          <li>
            <a href="favorites.html" title="Quick access to favorited datasets">
              <span class="nav-text">Favorites</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-star"></i></span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
    <div class="header-divider" aria-hidden="true"></div>
  </header>

  <main id="content" class="site-main">
    <div class="page-band page-band-teal">
      <div class="container">
        <section class="card card-datasets" data-component="datasets-page-controller" aria-label="Datasets catalog">
          <header class="card-header datasets-header">
            <h1 class="card-title">Datasets</h1>
          </header>

          <div class="card-body datasets-card-body">
            <!-- Dataset search form -->
            <section class="dataset-search-section">
              <form id="datasetSearchForm" class="dataset-search-form" data-component="dataset-search-form" data-action="search-form" role="search" aria-label="Search datasets">
                <div class="input-group input-group-search">
                  <span class="input-group-icon" aria-hidden="true">
                    <i class="fa-solid fa-magnifying-glass"></i>
                  </span>
                  <input type="search" id="datasetSearchInput" name="query" class="input-control" placeholder="Search datasets by keyword" autocomplete="off" />
                  <button type="submit" class="btn btn-primary search-btn">
                    <span class="btn-icon" aria-hidden="true"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <span class="btn-label">Search</span>
                  </button>
                  <button type="button" class="btn btn-ghost clear-btn" data-action="search-clear">
                    <span class="btn-label">Clear</span>
                  </button>
                </div>
              </form>
            </section>

            <!-- Active filters summary -->
            <section class="active-filters-section" aria-label="Active filters">
              <div id="activeFiltersSummary" class="filter-chips" data-component="active-filters-summary" data-populate="active-filters">
                <!-- Active filter chips rendered by JavaScript -->
              </div>
            </section>

            <!-- Main 2-column layout: filters sidebar + results column -->
            <section class="datasets-main-layout" aria-label="Dataset filters and results">
              <!-- Filter sidebar -->
              <aside class="filter-sidebar" data-component="dataset-filter-sidebar" aria-label="Dataset filters">
                <form id="datasetFiltersForm" class="filters-form">
                  <div class="filter-group">
                    <label for="filterDomain" class="filter-label">Domain</label>
                    <select id="filterDomain" name="domain" class="filter-select" data-populate="domains">
                      <option value="">All domains</option>
                    </select>
                  </div>

                  <div class="filter-group">
                    <label for="filterAccessType" class="filter-label">Access type</label>
                    <select id="filterAccessType" name="accessType" class="filter-select" data-populate="accessTypes">
                      <option value="">All access types</option>
                    </select>
                  </div>

                  <div class="filter-group">
                    <label for="filterCountry" class="filter-label">Country</label>
                    <select id="filterCountry" name="country" class="filter-select" data-populate="countries">
                      <option value="">All countries</option>
                    </select>
                  </div>

                  <div class="filter-group">
                    <div class="filter-group-header">Sample size</div>
                    <div class="filter-range-row">
                      <div class="filter-range-field">
                        <label for="filterMinSampleSize" class="filter-label">Min</label>
                        <input type="number" id="filterMinSampleSize" name="minSampleSize" class="filter-input" min="0" inputmode="numeric" />
                      </div>
                      <div class="filter-range-field">
                        <label for="filterMaxSampleSize" class="filter-label">Max</label>
                        <input type="number" id="filterMaxSampleSize" name="maxSampleSize" class="filter-input" min="0" inputmode="numeric" />
                      </div>
                    </div>
                  </div>

                  <div class="filter-group">
                    <label for="filterCollectionStartFrom" class="filter-label">Collection start from</label>
                    <input type="date" id="filterCollectionStartFrom" name="collectionStartFrom" class="filter-input" />
                  </div>

                  <div class="filter-group">
                    <label for="filterMinVariableCount" class="filter-label">Minimum variable count</label>
                    <input type="number" id="filterMinVariableCount" name="minVariableCount" class="filter-input" min="0" inputmode="numeric" />
                  </div>

                  <div class="filter-actions">
                    <button type="button" class="btn btn-primary" data-action="filter-apply">
                      <span class="btn-icon" aria-hidden="true"><i class="fa-solid fa-filter"></i></span>
                      <span class="btn-label">Apply filters</span>
                    </button>
                    <button type="button" class="btn btn-ghost" data-action="filter-clear-all">
                      <span class="btn-label">Clear all</span>
                    </button>
                  </div>
                </form>
              </aside>

              <!-- Results column -->
              <section class="results-column" aria-label="Dataset results">
                <!-- Results toolbar with count + sort control -->
                <div class="results-toolbar" data-component="dataset-results-toolbar" data-populate="results-toolbar">
                  <!-- Rendered by JavaScript -->
                </div>

                <!-- Results list -->
                <div id="datasetResultsList" class="results-list" data-component="dataset-results-list" data-populate="dataset-results-list">
                  <!-- Dataset rows rendered by JavaScript -->
                </div>

                <!-- Pagination -->
                <nav id="datasetPagination" class="pagination-container" data-component="dataset-pagination-control" data-populate="dataset-pagination" aria-label="Dataset result pages">
                  <!-- Pagination controls rendered by JavaScript -->
                </nav>
              </section>
            </section>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <div class="footer-left">
        <p class="footer-text">Secure, governed access to research data for approved projects.</p>
        <p class="footer-text footer-meta">&copy; 2026 Secure Research Data Access Portal.</p>
      </div>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="about.html" title="Information about the portal and its operators">About</a>
        <a href="help.html" title="User guides, FAQs, and support information">Help</a>
        <a href="policies.html" title="Privacy policy and terms of use">Policies</a>
      </nav>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    (function() {
      const DEFAULT_PAGE_SIZE = 25;
      let datasetFilterOptions = null;
      let currentSearchResponse = null;

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function loadFilterOptionsIfNeeded() {
        if (!datasetFilterOptions) {
          try {
            datasetFilterOptions = WebsiteSDK.getDatasetFilterOptions();
          } catch (error) {
            console.error('Failed to load dataset filter options', error);
            datasetFilterOptions = { domains: [], accessTypes: [], countries: [], sortOptions: [] };
          }
        }
      }

      function getDomainLabel(domainValue) {
        if (!domainValue) {
          return '';
        }
        if (!datasetFilterOptions || !Array.isArray(datasetFilterOptions.domains)) {
          return domainValue;
        }
        const match = datasetFilterOptions.domains.find(function(d) { return d.value === domainValue; });
        return match && match.label ? match.label : domainValue;
      }

      function getAccessTypeLabel(accessTypeValue) {
        if (!accessTypeValue) {
          return '';
        }
        if (!datasetFilterOptions || !Array.isArray(datasetFilterOptions.accessTypes)) {
          return accessTypeValue;
        }
        const match = datasetFilterOptions.accessTypes.find(function(a) { return a.value === accessTypeValue; });
        return match && match.label ? match.label : accessTypeValue;
      }

      function buildStateFromParams(params) {
        loadFilterOptionsIfNeeded();
        const state = {
          query: params.get('query') || '',
          filters: {},
          sortField: params.get('sortField') || '',
          sortOrder: params.get('sortOrder') || '',
          page: 1,
          pageSize: DEFAULT_PAGE_SIZE
        };

        const domain = params.get('domain');
        if (domain) {
          state.filters.domain = domain;
        }

        const accessType = params.get('accessType');
        if (accessType) {
          state.filters.accessType = accessType;
        }

        const country = params.get('country');
        if (country) {
          state.filters.country = country;
        }

        const minSampleSizeParam = params.get('minSampleSize');
        if (minSampleSizeParam !== null && minSampleSizeParam !== '') {
          const parsedMin = parseInt(minSampleSizeParam, 10);
          if (!isNaN(parsedMin)) {
            state.filters.minSampleSize = parsedMin;
          }
        }

        const maxSampleSizeParam = params.get('maxSampleSize');
        if (maxSampleSizeParam !== null && maxSampleSizeParam !== '') {
          const parsedMax = parseInt(maxSampleSizeParam, 10);
          if (!isNaN(parsedMax)) {
            state.filters.maxSampleSize = parsedMax;
          }
        }

        const collectionStartFrom = params.get('collectionStartFrom');
        if (collectionStartFrom) {
          state.filters.collectionStartDateFrom = collectionStartFrom;
        }

        const minVariableCountParam = params.get('minVariableCount');
        if (minVariableCountParam !== null && minVariableCountParam !== '') {
          const parsedVar = parseInt(minVariableCountParam, 10);
          if (!isNaN(parsedVar)) {
            state.filters.minVariableCount = parsedVar;
          }
        }

        const pageParam = params.get('page');
        if (pageParam !== null && pageParam !== '') {
          const parsedPage = parseInt(pageParam, 10);
          if (!isNaN(parsedPage) && parsedPage > 0) {
            state.page = parsedPage;
          }
        }

        if (!state.sortField || !state.sortOrder) {
          const sortOptions = datasetFilterOptions && Array.isArray(datasetFilterOptions.sortOptions) ? datasetFilterOptions.sortOptions : [];
          if (sortOptions.length > 0) {
            if (!state.sortField) {
              state.sortField = sortOptions[0].field || '';
            }
            if (!state.sortOrder) {
              state.sortOrder = sortOptions[0].defaultOrder || 'ascending';
            }
          } else {
            if (!state.sortOrder) {
              state.sortOrder = 'ascending';
            }
          }
        }

        return state;
      }

      function syncSearchFormAndFiltersFromState(state) {
        const searchInput = document.getElementById('datasetSearchInput');
        if (searchInput) {
          searchInput.value = state.query || '';
        }

        const domainSelect = document.getElementById('filterDomain');
        if (domainSelect) {
          domainSelect.value = state.filters.domain || '';
        }

        const accessTypeSelect = document.getElementById('filterAccessType');
        if (accessTypeSelect) {
          accessTypeSelect.value = state.filters.accessType || '';
        }

        const countrySelect = document.getElementById('filterCountry');
        if (countrySelect) {
          countrySelect.value = state.filters.country || '';
        }

        const minSampleInput = document.getElementById('filterMinSampleSize');
        if (minSampleInput) {
          minSampleInput.value = typeof state.filters.minSampleSize === 'number' && !isNaN(state.filters.minSampleSize) ? String(state.filters.minSampleSize) : '';
        }

        const maxSampleInput = document.getElementById('filterMaxSampleSize');
        if (maxSampleInput) {
          maxSampleInput.value = typeof state.filters.maxSampleSize === 'number' && !isNaN(state.filters.maxSampleSize) ? String(state.filters.maxSampleSize) : '';
        }

        const collectionStartInput = document.getElementById('filterCollectionStartFrom');
        if (collectionStartInput) {
          collectionStartInput.value = state.filters.collectionStartDateFrom || '';
        }

        const minVarInput = document.getElementById('filterMinVariableCount');
        if (minVarInput) {
          minVarInput.value = typeof state.filters.minVariableCount === 'number' && !isNaN(state.filters.minVariableCount) ? String(state.filters.minVariableCount) : '';
        }
      }

      function populateDomains(container, options, selectedValue) {
        container.innerHTML = '';
        const defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = 'All domains';
        container.appendChild(defaultOption);
        if (Array.isArray(options)) {
          options.forEach(function(opt) {
            const optionEl = document.createElement('option');
            optionEl.value = opt.value || '';
            optionEl.textContent = opt.label || opt.value || '';
            if (selectedValue && selectedValue === optionEl.value) {
              optionEl.selected = true;
            }
            container.appendChild(optionEl);
          });
        }
      }

      function populateAccessTypes(container, options, selectedValue) {
        container.innerHTML = '';
        const defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = 'All access types';
        container.appendChild(defaultOption);
        if (Array.isArray(options)) {
          options.forEach(function(opt) {
            const optionEl = document.createElement('option');
            optionEl.value = opt.value || '';
            optionEl.textContent = opt.label || opt.value || '';
            if (selectedValue && selectedValue === optionEl.value) {
              optionEl.selected = true;
            }
            container.appendChild(optionEl);
          });
        }
      }

      function populateCountries(container, options, selectedValue) {
        container.innerHTML = '';
        const defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = 'All countries';
        container.appendChild(defaultOption);
        if (Array.isArray(options)) {
          options.forEach(function(opt) {
            const optionEl = document.createElement('option');
            optionEl.value = opt.name || '';
            optionEl.textContent = opt.name || opt.code || '';
            if (selectedValue && selectedValue === optionEl.value) {
              optionEl.selected = true;
            }
            container.appendChild(optionEl);
          });
        }
      }

      function renderActiveFilters(container, state) {
        container.innerHTML = '';
        const filters = state.filters || {};
        const chips = [];

        if (filters.domain) {
          chips.push({ key: 'domain', label: 'Domain: ' + getDomainLabel(filters.domain) });
        }
        if (filters.accessType) {
          chips.push({ key: 'accessType', label: 'Access: ' + getAccessTypeLabel(filters.accessType) });
        }
        if (filters.country) {
          chips.push({ key: 'country', label: 'Country: ' + filters.country });
        }
        if (typeof filters.minSampleSize === 'number' && !isNaN(filters.minSampleSize)) {
          chips.push({ key: 'minSampleSize', label: 'Sample size ≥ ' + filters.minSampleSize.toLocaleString() });
        }
        if (typeof filters.maxSampleSize === 'number' && !isNaN(filters.maxSampleSize)) {
          chips.push({ key: 'maxSampleSize', label: 'Sample size ≤ ' + filters.maxSampleSize.toLocaleString() });
        }
        if (filters.collectionStartDateFrom) {
          chips.push({ key: 'collectionStartFrom', label: 'Collection start from ' + filters.collectionStartDateFrom });
        }
        if (typeof filters.minVariableCount === 'number' && !isNaN(filters.minVariableCount)) {
          chips.push({ key: 'minVariableCount', label: 'Variables ≥ ' + filters.minVariableCount.toLocaleString() });
        }

        if (chips.length === 0) {
          const noFilters = document.createElement('span');
          noFilters.className = 'filters-empty';
          noFilters.textContent = 'No filters applied.';
          container.appendChild(noFilters);
          return;
        }

        chips.forEach(function(chip) {
          const chipEl = document.createElement('div');
          chipEl.className = 'filter-chip';
          chipEl.dataset.filterKey = chip.key;
          chipEl.innerHTML = "<span class=\"filter-chip-text\">" + escapeHtml(chip.label) + "</span>" +
            "<button type=\"button\" class=\"filter-chip-remove\" data-action=\"filter-remove-chip\" data-filter-key=\"" + escapeHtml(chip.key) + "\" aria-label=\"Remove " + escapeHtml(chip.label) + " filter\">" +
            "<i class=\"fa-solid fa-xmark\" aria-hidden=\"true\"></i>" +
            "</button>";
          container.appendChild(chipEl);
        });

        const clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.className = 'btn btn-ghost filters-clear-all';
        clearBtn.dataset.action = 'filter-clear-all';
        clearBtn.textContent = 'Clear all filters';
        container.appendChild(clearBtn);
      }

      function renderResultsToolbar(container, state, response) {
        container.innerHTML = '';
        const totalCount = response && typeof response.totalCount === 'number' ? response.totalCount : 0;
        const sortOptions = datasetFilterOptions && Array.isArray(datasetFilterOptions.sortOptions) ? datasetFilterOptions.sortOptions : [];
        const sortField = state.sortField || '';
        const sortOrder = state.sortOrder || 'ascending';

        let optionsHtml = '';
        sortOptions.forEach(function(opt) {
          const selectedAttr = opt.field === sortField ? ' selected' : '';
          const label = opt.label || opt.field || '';
          optionsHtml += "<option value=\"" + escapeHtml(opt.field || '') + "\"" + selectedAttr + ">" + escapeHtml(label) + "</option>";
        });

        const orderIconClass = sortOrder === 'descending' ? 'fa-arrow-down-long' : 'fa-arrow-up-long';
        const summaryText = totalCount === 0 ? 'No datasets found' : totalCount === 1 ? '1 dataset found' : totalCount.toLocaleString() + ' datasets found';

        container.innerHTML = `
          <div class="results-toolbar-inner">
            <div class="results-summary">${escapeHtml(summaryText)}</div>
            <div class="results-sort-control" data-component="dataset-sort-control">
              <label for="sortFieldSelect" class="sort-label">Sort by</label>
              <select id="sortFieldSelect" class="sort-select" data-action="sort-field-change">
                ${optionsHtml}
              </select>
              <button type="button" class="btn btn-icon sort-order-toggle" data-action="sort-order-toggle" data-sort-order="${escapeHtml(sortOrder)}" aria-label="Toggle sort order">
                <i class="fa-solid ${orderIconClass}" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        `;
      }

      function renderResultsList(container, state, response) {
        container.innerHTML = '';
        const results = response && Array.isArray(response.results) ? response.results : [];
        if (results.length === 0) {
          const emptyEl = document.createElement('div');
          emptyEl.className = 'results-empty';
          emptyEl.textContent = 'No datasets matched your search. Adjust your keywords or filters and try again.';
          container.appendChild(emptyEl);
          return;
        }

        results.forEach(function(item) {
          const dataset = item.dataset || {};
          const isFavorited = !!item.isFavorited;
          const isPinned = !!item.isPinned;
          const title = dataset.title || 'Untitled dataset';
          const description = dataset.description || '';
          const domainLabel = getDomainLabel(dataset.domain || '');
          const accessLabel = getAccessTypeLabel(dataset.access_type || '');
          const sampleSize = typeof dataset.sample_size === 'number' && !isNaN(dataset.sample_size) ? dataset.sample_size.toLocaleString() : 'Unknown';
          const variableCount = typeof dataset.variable_count === 'number' && !isNaN(dataset.variable_count) ? dataset.variable_count.toLocaleString() : 'Unknown';
          const country = dataset.country || 'Multiple / various';

          const favoritedClass = isFavorited ? 'is-active' : '';
          const pinnedClass = isPinned ? 'is-active' : '';
          const favoriteIcon = isFavorited ? 'fa-star' : 'fa-star';
          const favoriteIconStyle = isFavorited ? 'fa-solid' : 'fa-regular';
          const pinIconStyle = 'fa-solid';
          const favoriteLabel = isFavorited ? 'Remove from favorites' : 'Add to favorites';
          const pinLabel = isPinned ? 'Unpin from dashboard' : 'Pin to dashboard';

          const row = document.createElement('article');
          row.className = 'dataset-row';
          row.dataset.datasetId = dataset.id || '';

          row.innerHTML = `
            <div class="dataset-row-main">
              <h2 class="dataset-title">
                <a href="javascript:void(0)" data-action="open-dataset-detail" data-dataset-id="${escapeHtml(dataset.id || '')}">
                  ${escapeHtml(title)}
                </a>
              </h2>
              <p class="dataset-description">${escapeHtml(description)}</p>
              <dl class="dataset-meta">
                <div class="dataset-meta-item">
                  <dt>Domain</dt>
                  <dd>${escapeHtml(domainLabel)}</dd>
                </div>
                <div class="dataset-meta-item">
                  <dt>Access</dt>
                  <dd>${escapeHtml(accessLabel)}</dd>
                </div>
                <div class="dataset-meta-item">
                  <dt>Country</dt>
                  <dd>${escapeHtml(country)}</dd>
                </div>
                <div class="dataset-meta-item">
                  <dt>Sample size</dt>
                  <dd>${escapeHtml(sampleSize)}</dd>
                </div>
                <div class="dataset-meta-item">
                  <dt>Variable count</dt>
                  <dd>${escapeHtml(variableCount)}</dd>
                </div>
              </dl>
            </div>
            <div class="dataset-row-actions">
              <button type="button" class="icon-button favorite-toggle ${favoritedClass}" data-action="toggle-favorite" data-dataset-id="${escapeHtml(dataset.id || '')}" data-favorited="${isFavorited ? 'true' : 'false'}" aria-pressed="${isFavorited ? 'true' : 'false'}" aria-label="${escapeHtml(favoriteLabel)}">
                <i class="${favoriteIconStyle} ${favoriteIcon}" aria-hidden="true"></i>
              </button>
              <button type="button" class="icon-button pin-toggle ${pinnedClass}" data-action="toggle-pin" data-dataset-id="${escapeHtml(dataset.id || '')}" data-pinned="${isPinned ? 'true' : 'false'}" aria-pressed="${isPinned ? 'true' : 'false'}" aria-label="${escapeHtml(pinLabel)}">
                <i class="${pinIconStyle} fa-thumbtack" aria-hidden="true"></i>
              </button>
            </div>
          `;

          container.appendChild(row);
        });
      }

      function renderPagination(container, state, response) {
        container.innerHTML = '';
        const totalCount = response && typeof response.totalCount === 'number' ? response.totalCount : 0;
        const pageSize = response && typeof response.pageSize === 'number' && !isNaN(response.pageSize) ? response.pageSize : state.pageSize;
        const currentPage = response && typeof response.page === 'number' && !isNaN(response.page) ? response.page : state.page;
        const totalPages = pageSize > 0 ? Math.max(1, Math.ceil(totalCount / pageSize)) : 1;

        if (totalPages <= 1) {
          return;
        }

        const paginationList = document.createElement('ul');
        paginationList.className = 'pagination-list';

        const prevItem = document.createElement('li');
        const prevButton = document.createElement('button');
        prevButton.type = 'button';
        prevButton.className = 'pagination-button pagination-prev';
        prevButton.textContent = 'Previous';
        prevButton.dataset.action = 'page-change';
        prevButton.dataset.page = String(Math.max(1, currentPage - 1));
        if (currentPage === 1) {
          prevButton.disabled = true;
        }
        prevItem.appendChild(prevButton);
        paginationList.appendChild(prevItem);

        for (let page = 1; page <= totalPages; page += 1) {
          const pageItem = document.createElement('li');
          const pageButton = document.createElement('button');
          pageButton.type = 'button';
          pageButton.className = 'pagination-button pagination-page';
          pageButton.textContent = String(page);
          pageButton.dataset.action = 'page-change';
          pageButton.dataset.page = String(page);
          if (page === currentPage) {
            pageButton.disabled = true;
            pageButton.setAttribute('aria-current', 'page');
          }
          pageItem.appendChild(pageButton);
          paginationList.appendChild(pageItem);
        }

        const nextItem = document.createElement('li');
        const nextButton = document.createElement('button');
        nextButton.type = 'button';
        nextButton.className = 'pagination-button pagination-next';
        nextButton.textContent = 'Next';
        nextButton.dataset.action = 'page-change';
        nextButton.dataset.page = String(Math.min(totalPages, currentPage + 1));
        if (currentPage === totalPages) {
          nextButton.disabled = true;
        }
        nextItem.appendChild(nextButton);
        paginationList.appendChild(nextItem);

        container.appendChild(paginationList);
      }

      function setUrlParams(params) {
        const queryString = params.toString();
        const newUrl = window.location.pathname + (queryString ? '?' + queryString : '');
        window.history.replaceState(null, '', newUrl);
      }

      function executeSearchFromCurrentUrl() {
        loadFilterOptionsIfNeeded();
        const params = new URLSearchParams(window.location.search);
        const state = buildStateFromParams(params);
        syncSearchFormAndFiltersFromState(state);

        let response;
        try {
          const filtersToSend = Object.keys(state.filters).length > 0 ? state.filters : undefined;
          response = WebsiteSDK.searchDatasets(
            state.query || undefined,
            filtersToSend,
            state.sortField || undefined,
            state.sortOrder || undefined,
            state.page,
            state.pageSize
          );
        } catch (error) {
          console.error('searchDatasets failed', error);
          response = { results: [], totalCount: 0, page: state.page, pageSize: state.pageSize };
        }

        currentSearchResponse = response;

        const activeFiltersEl = document.querySelector('[data-populate="active-filters"]');
        if (activeFiltersEl) {
          renderActiveFilters(activeFiltersEl, state);
        }

        const toolbarEl = document.querySelector('[data-populate="results-toolbar"]');
        if (toolbarEl) {
          renderResultsToolbar(toolbarEl, state, response);
        }

        const resultsListEl = document.querySelector('[data-populate="dataset-results-list"]');
        if (resultsListEl) {
          renderResultsList(resultsListEl, state, response);
        }

        const paginationEl = document.querySelector('[data-populate="dataset-pagination"]');
        if (paginationEl) {
          renderPagination(paginationEl, state, response);
        }
      }

      function handleSearchSubmit() {
        const searchInput = document.getElementById('datasetSearchInput');
        const value = searchInput ? searchInput.value.trim() : '';
        const params = new URLSearchParams(window.location.search);
        if (value) {
          params.set('query', value);
        } else {
          params.delete('query');
        }
        params.set('page', '1');
        setUrlParams(params);
        executeSearchFromCurrentUrl();
      }

      function handleSearchClear() {
        const searchInput = document.getElementById('datasetSearchInput');
        if (searchInput) {
          searchInput.value = '';
        }
        const params = new URLSearchParams(window.location.search);
        params.delete('query');
        params.set('page', '1');
        setUrlParams(params);
        executeSearchFromCurrentUrl();
      }

      function handleFilterApply() {
        const form = document.getElementById('datasetFiltersForm');
        if (!form) {
          return;
        }
        const params = new URLSearchParams(window.location.search);

        const domainValue = form.elements.domain ? String(form.elements.domain.value).trim() : '';
        if (domainValue) {
          params.set('domain', domainValue);
        } else {
          params.delete('domain');
        }

        const accessTypeValue = form.elements.accessType ? String(form.elements.accessType.value).trim() : '';
        if (accessTypeValue) {
          params.set('accessType', accessTypeValue);
        } else {
          params.delete('accessType');
        }

        const countryValue = form.elements.country ? String(form.elements.country.value).trim() : '';
        if (countryValue) {
          params.set('country', countryValue);
        } else {
          params.delete('country');
        }

        const minSampleValue = form.elements.minSampleSize ? String(form.elements.minSampleSize.value).trim() : '';
        if (minSampleValue) {
          params.set('minSampleSize', minSampleValue);
        } else {
          params.delete('minSampleSize');
        }

        const maxSampleValue = form.elements.maxSampleSize ? String(form.elements.maxSampleSize.value).trim() : '';
        if (maxSampleValue) {
          params.set('maxSampleSize', maxSampleValue);
        } else {
          params.delete('maxSampleSize');
        }

        const collectionStartFromValue = form.elements.collectionStartFrom ? String(form.elements.collectionStartFrom.value).trim() : '';
        if (collectionStartFromValue) {
          params.set('collectionStartFrom', collectionStartFromValue);
        } else {
          params.delete('collectionStartFrom');
        }

        const minVariableCountValue = form.elements.minVariableCount ? String(form.elements.minVariableCount.value).trim() : '';
        if (minVariableCountValue) {
          params.set('minVariableCount', minVariableCountValue);
        } else {
          params.delete('minVariableCount');
        }

        params.set('page', '1');
        setUrlParams(params);
        executeSearchFromCurrentUrl();
      }

      function handleFilterClearAll() {
        const params = new URLSearchParams(window.location.search);
        params.delete('domain');
        params.delete('accessType');
        params.delete('country');
        params.delete('minSampleSize');
        params.delete('maxSampleSize');
        params.delete('collectionStartFrom');
        params.delete('minVariableCount');
        params.set('page', '1');
        setUrlParams(params);
        executeSearchFromCurrentUrl();
      }

      function handleFilterRemoveChip(filterKey) {
        const params = new URLSearchParams(window.location.search);
        if (filterKey === 'domain' || filterKey === 'accessType' || filterKey === 'country' || filterKey === 'minSampleSize' || filterKey === 'maxSampleSize' || filterKey === 'collectionStartFrom' || filterKey === 'minVariableCount') {
          params.delete(filterKey);
        }
        params.set('page', '1');
        setUrlParams(params);
        executeSearchFromCurrentUrl();
      }

      function handleSortFieldChange(selectEl) {
        const newField = selectEl.value;
        const params = new URLSearchParams(window.location.search);
        params.set('sortField', newField);

        let newOrder = params.get('sortOrder') || '';
        const sortOptions = datasetFilterOptions && Array.isArray(datasetFilterOptions.sortOptions) ? datasetFilterOptions.sortOptions : [];
        const match = sortOptions.find(function(opt) { return opt.field === newField; });
        if (match && match.defaultOrder) {
          newOrder = match.defaultOrder;
        }
        if (!newOrder) {
          newOrder = 'ascending';
        }
        params.set('sortOrder', newOrder);
        params.set('page', '1');
        setUrlParams(params);
        executeSearchFromCurrentUrl();
      }

      function handleSortOrderToggle() {
        const params = new URLSearchParams(window.location.search);
        const currentOrder = params.get('sortOrder') || 'ascending';
        const newOrder = currentOrder === 'ascending' ? 'descending' : 'ascending';
        params.set('sortOrder', newOrder);
        params.set('page', '1');
        setUrlParams(params);
        executeSearchFromCurrentUrl();
      }

      function handlePageChange(targetPage) {
        if (!currentSearchResponse) {
          return;
        }
        const pageSize = typeof currentSearchResponse.pageSize === 'number' && !isNaN(currentSearchResponse.pageSize) ? currentSearchResponse.pageSize : DEFAULT_PAGE_SIZE;
        const totalCount = typeof currentSearchResponse.totalCount === 'number' ? currentSearchResponse.totalCount : 0;
        const totalPages = pageSize > 0 ? Math.max(1, Math.ceil(totalCount / pageSize)) : 1;

        if (targetPage < 1 || targetPage > totalPages) {
          return;
        }

        const params = new URLSearchParams(window.location.search);
        params.set('page', String(targetPage));
        setUrlParams(params);
        executeSearchFromCurrentUrl();
      }

      function updateInMemoryFavoriteState(datasetId, isFavorited) {
        if (!currentSearchResponse || !Array.isArray(currentSearchResponse.results)) {
          return;
        }
        currentSearchResponse.results.forEach(function(item) {
          if (item.dataset && item.dataset.id === datasetId) {
            item.isFavorited = isFavorited;
          }
        });
      }

      function updateInMemoryPinState(datasetId, isPinned) {
        if (!currentSearchResponse || !Array.isArray(currentSearchResponse.results)) {
          return;
        }
        currentSearchResponse.results.forEach(function(item) {
          if (item.dataset && item.dataset.id === datasetId) {
            item.isPinned = isPinned;
          }
        });
      }

      function handleToggleFavorite(datasetId, buttonEl) {
        if (!datasetId) {
          return;
        }
        const currentlyFavorited = buttonEl.getAttribute('data-favorited') === 'true';
        try {
          if (!currentlyFavorited) {
            const result = WebsiteSDK.addDatasetToFavorites(datasetId);
            if (result && result.success) {
              buttonEl.setAttribute('data-favorited', 'true');
              buttonEl.setAttribute('aria-pressed', 'true');
              buttonEl.classList.add('is-active');
              updateInMemoryFavoriteState(datasetId, true);
            } else {
              window.alert(result && result.message ? result.message : 'Unable to add dataset to favorites.');
            }
          } else {
            const result = WebsiteSDK.removeDatasetFromFavorites(datasetId);
            if (result && result.success) {
              buttonEl.setAttribute('data-favorited', 'false');
              buttonEl.setAttribute('aria-pressed', 'false');
              buttonEl.classList.remove('is-active');
              updateInMemoryFavoriteState(datasetId, false);
            } else {
              window.alert(result && result.message ? result.message : 'Unable to remove dataset from favorites.');
            }
          }
        } catch (error) {
          console.error('Favorite toggle failed', error);
          window.alert('An error occurred while updating favorites.');
        }
      }

      function handleTogglePin(datasetId, buttonEl) {
        if (!datasetId) {
          return;
        }
        const currentlyPinned = buttonEl.getAttribute('data-pinned') === 'true';
        try {
          if (!currentlyPinned) {
            const result = WebsiteSDK.pinDatasetToDashboard(datasetId);
            if (result && result.success) {
              buttonEl.setAttribute('data-pinned', 'true');
              buttonEl.setAttribute('aria-pressed', 'true');
              buttonEl.classList.add('is-active');
              updateInMemoryPinState(datasetId, true);
            } else {
              window.alert(result && result.message ? result.message : 'Unable to pin dataset to dashboard.');
            }
          } else {
            const result = WebsiteSDK.unpinDatasetFromDashboard(datasetId);
            if (result && result.success) {
              buttonEl.setAttribute('data-pinned', 'false');
              buttonEl.setAttribute('aria-pressed', 'false');
              buttonEl.classList.remove('is-active');
              updateInMemoryPinState(datasetId, false);
            } else {
              window.alert(result && result.message ? result.message : 'Unable to unpin dataset from dashboard.');
            }
          }
        } catch (error) {
          console.error('Pin toggle failed', error);
          window.alert('An error occurred while updating dashboard pins.');
        }
      }

      function handleOpenDatasetDetail(datasetId) {
        if (!datasetId) {
          return;
        }
        const currentUrl = window.location.href;
        const encodedReturnUrl = encodeURIComponent(currentUrl);
        const targetUrl = 'dataset_detail.html?datasetId=' + encodeURIComponent(datasetId) + '&returnUrl=' + encodedReturnUrl;
        window.location.href = targetUrl;
      }

      function initPopulateElements(initialState) {
        loadFilterOptionsIfNeeded();
        const populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          const type = element.dataset.populate;
          if (type === 'domains') {
            const domains = datasetFilterOptions && Array.isArray(datasetFilterOptions.domains) ? datasetFilterOptions.domains : [];
            const selected = initialState.filters && initialState.filters.domain ? initialState.filters.domain : '';
            populateDomains(element, domains, selected);
          } else if (type === 'accessTypes') {
            const accessTypes = datasetFilterOptions && Array.isArray(datasetFilterOptions.accessTypes) ? datasetFilterOptions.accessTypes : [];
            const selected = initialState.filters && initialState.filters.accessType ? initialState.filters.accessType : '';
            populateAccessTypes(element, accessTypes, selected);
          } else if (type === 'countries') {
            const countries = datasetFilterOptions && Array.isArray(datasetFilterOptions.countries) ? datasetFilterOptions.countries : [];
            const selected = initialState.filters && initialState.filters.country ? initialState.filters.country : '';
            populateCountries(element, countries, selected);
          } else if (type === 'active-filters') {
            renderActiveFilters(element, initialState);
          } else if (type === 'dataset-results-list' || type === 'results-toolbar' || type === 'dataset-pagination') {
            element.innerHTML = '';
          }
        });
      }

      document.addEventListener('DOMContentLoaded', function() {
        loadFilterOptionsIfNeeded();
        const urlParams = new URLSearchParams(window.location.search);
        const initialState = buildStateFromParams(urlParams);

        initPopulateElements(initialState);
        syncSearchFormAndFiltersFromState(initialState);
        executeSearchFromCurrentUrl();

        const searchForm = document.querySelector('[data-action="search-form"]');
        if (searchForm) {
          searchForm.addEventListener('submit', function(event) {
            event.preventDefault();
            handleSearchSubmit();
          });
        }

        document.addEventListener('click', function(event) {
          const actionElement = event.target.closest('[data-action]');
          if (!actionElement) {
            return;
          }
          const action = actionElement.getAttribute('data-action');

          if (action === 'search-clear') {
            event.preventDefault();
            handleSearchClear();
          } else if (action === 'filter-apply') {
            event.preventDefault();
            handleFilterApply();
          } else if (action === 'filter-clear-all') {
            event.preventDefault();
            handleFilterClearAll();
          } else if (action === 'filter-remove-chip') {
            event.preventDefault();
            const filterKey = actionElement.getAttribute('data-filter-key') || '';
            handleFilterRemoveChip(filterKey);
          } else if (action === 'sort-order-toggle') {
            event.preventDefault();
            handleSortOrderToggle();
          } else if (action === 'page-change') {
            event.preventDefault();
            const pageAttr = actionElement.getAttribute('data-page') || '';
            const pageNumber = parseInt(pageAttr, 10);
            if (!isNaN(pageNumber)) {
              handlePageChange(pageNumber);
            }
          } else if (action === 'toggle-favorite') {
            event.preventDefault();
            const datasetId = actionElement.getAttribute('data-dataset-id') || '';
            handleToggleFavorite(datasetId, actionElement);
          } else if (action === 'toggle-pin') {
            event.preventDefault();
            const datasetId = actionElement.getAttribute('data-dataset-id') || '';
            handleTogglePin(datasetId, actionElement);
          } else if (action === 'open-dataset-detail') {
            event.preventDefault();
            const datasetId = actionElement.getAttribute('data-dataset-id') || '';
            handleOpenDatasetDetail(datasetId);
          }
        });

        document.addEventListener('change', function(event) {
          const actionElement = event.target.closest('[data-action]');
          if (!actionElement) {
            return;
          }
          const action = actionElement.getAttribute('data-action');
          if (action === 'sort-field-change') {
            handleSortFieldChange(actionElement);
          }
        });

        window.addEventListener('popstate', function() {
          executeSearchFromCurrentUrl();
        });
      });
    })();
  </script>
</body>
</html>
