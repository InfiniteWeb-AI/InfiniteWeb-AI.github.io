<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Secure Research Data Access Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap" rel="stylesheet" />

  <!-- Icon font (no SVG usage in markup) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Site stylesheet -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Workspace Detail page stylesheet -->
  <link rel="stylesheet" href="workspace_detail.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <div class="logo">
        <a href="index.html" class="logo-link" aria-label="Secure research data access portal home">
          <span class="logo-main">ARD</span><span class="logo-accent">i</span>
        </a>
      </div>

      <nav class="main-nav" aria-label="Primary navigation">
        <ul>
          <li>
            <a href="index.html" title="User dashboard showing pinned datasets and key project activity">
              <span class="nav-text">Dashboard</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-gauge-high"></i></span>
            </a>
          </li>
          <li>
            <a href="datasets.html" title="Browse, search, and filter all available datasets">
              <span class="nav-text">Datasets</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-database"></i></span>
            </a>
          </li>
          <li>
            <a href="projects.html" title="View and manage research projects">
              <span class="nav-text">Projects</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-diagram-project"></i></span>
            </a>
          </li>
          <li>
            <a href="workspaces.html" title="Manage analytical workspaces and cohort queries">
              <span class="nav-text">Workspaces</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-flask"></i></span>
            </a>
          </li>
          <li>
            <a href="agreements.html" title="View agreement templates and manage data use agreements">
              <span class="nav-text">Agreements &amp; Policies</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-file-signature"></i></span>
            </a>
          </li>
          <li>
            <a href="favorites.html" title="Quick access to favorited datasets">
              <span class="nav-text">Favorites</span>
              <span class="nav-icon" aria-hidden="true"><i class="fa-solid fa-star"></i></span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
    <div class="header-divider" aria-hidden="true"></div>
  </header>

  <main id="content" class="site-main">
    <div class="workspace-main-bg">
      <div class="container">
        <section class="card card-elevated workspace-card" data-component="workspace-detail-init" aria-label="Workspace detail">
          <!-- Workspace header / summary -->
          <header class="workspace-header" data-component="workspace-header" data-populate="workspace-header">
            <!-- Populated by JavaScript -->
          </header>

          <!-- Error banner (inline within card, below header) -->
          <section id="workspace-error" class="workspace-error" data-component="workspace-error-state" aria-live="polite" hidden>
            <!-- Populated by JavaScript -->
          </section>

          <!-- Main actions + query list region -->
          <section id="workspace-main-region" class="workspace-main-region" aria-label="Workspace queries and actions">
            <!-- Actions toolbar -->
            <div class="workspace-query-actions" data-component="workspace-query-actions">
              <div class="workspace-query-actions-left">
                <button type="button" class="btn btn-primary" data-action="new-query">
                  <span class="btn-icon" aria-hidden="true"><i class="fa-solid fa-plus"></i></span>
                  <span class="btn-label">Create workspace query</span>
                </button>
              </div>
              <div class="workspace-query-actions-right">
                <label for="statusFilterSelect" class="field-label">Status filter</label>
                <div class="select-wrapper">
                  <select id="statusFilterSelect" name="statusFilter" data-action="status-filter">
                    <option value="">All statuses</option>
                    <option value="draft">Draft</option>
                    <option value="saved">Saved</option>
                    <option value="executed">Executed</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Query list -->
            <div class="workspace-query-list" data-component="workspace-query-list" data-populate="workspace-query-list">
              <!-- Populated by JavaScript -->
            </div>
          </section>

          <!-- Loading overlay (over actions + list, header remains visible) -->
          <div id="workspace-loading" class="workspace-loading-overlay" data-component="workspace-loading-state" aria-hidden="true" hidden>
            <div class="loading-indicator">
              <span class="loading-spinner" aria-hidden="true"></span>
              <span class="loading-text">Loading workspace details&hellip;</span>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <div class="footer-left">
        <p class="footer-text">Secure, governed access to research data for approved projects.</p>
        <p class="footer-text footer-meta">&copy; 2026 Secure Research Data Access Portal.</p>
      </div>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="about.html" title="Information about the portal and its operators">About</a>
        <a href="help.html" title="User guides, FAQs, and support information">Help</a>
        <a href="policies.html" title="Privacy policy and terms of use">Policies</a>
      </nav>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    (function() {
      'use strict';

      const state = {
        workspaceId: null,
        workspace: null,
        originalQueries: [],
        hasTriedLoad: false
      };

      function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function formatEnum(value) {
        if (!value) return '26mdash;';
        return value
          .split('_')
          .map(function(part) { return part.charAt(0).toUpperCase() + part.slice(1); })
          .join(' ');
      }

      function formatDate(value) {
        if (!value) return '26mdash;';
        var d = new Date(value);
        if (isNaN(d.getTime())) return '26mdash;';
        return d.toLocaleString(undefined, {
          year: 'numeric',
          month: 'short',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });
      }

      function getUrlViewState() {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        return {
          sortBy: params.get('sortBy') || 'updated_at',
          sortDir: params.get('sortDir') === 'asc' ? 'asc' : 'desc',
          statusFilter: params.get('statusFilter') || '',
          highlightQueryId: params.get('highlightQueryId') || null
        };
      }

      function updateUrlParams(updates) {
        var url = new URL(window.location.href);
        Object.keys(updates).forEach(function(key) {
          var value = updates[key];
          if (value === null || value === undefined || value === '') {
            url.searchParams.delete(key);
          } else {
            url.searchParams.set(key, value);
          }
        });
        window.history.replaceState({}, '', url.toString());
      }

      function deriveSortedFilteredQueries() {
        var view = getUrlViewState();
        var queries = state.originalQueries.slice();

        if (view.statusFilter) {
          queries = queries.filter(function(q) { return q.status === view.statusFilter; });
        }

        var sortBy = view.sortBy;
        var sortDir = view.sortDir === 'asc' ? 1 : -1;

        queries.sort(function(a, b) {
          var av = a[sortBy];
          var bv = b[sortBy];

          if (av === bv) return 0;

          if (sortBy === 'name' || sortBy === 'status') {
            av = av || '';
            bv = bv || '';
            return av.localeCompare(bv) * sortDir;
          }

          var ad = av ? new Date(av).getTime() : 0;
          var bd = bv ? new Date(bv).getTime() : 0;

          if (ad === bd) return 0;
          return ad > bd ? sortDir : -sortDir;
        });

        return { view: view, queries: queries };
      }

      function renderWorkspaceHeader(container) {
        if (!container) return;
        var w = state.workspace;
        var title = w && w.name ? escapeHtml(w.name) : 'Workspace detail';
        var subtitle = w && w.research_area ? formatEnum(w.research_area) : '';
        var created = w && w.created_at ? formatDate(w.created_at) : null;
        var updated = w && w.updated_at ? formatDate(w.updated_at) : null;
        var workspaceIdDisplay = state.workspaceId ? escapeHtml(state.workspaceId) : '&mdash;';

        var projectAction = '';
        if (w && w.associated_project_id) {
          projectAction = `
            <button type="button" class="btn btn-ghost btn-sm" data-action="view-project">
              <span class="btn-icon" aria-hidden="true"><i class="fa-solid fa-diagram-project"></i></span>
              <span class="btn-label">View project</span>
            </button>
          `;
        }

        var metaParts = [];
        if (created) metaParts.push('<span class="meta-label">Created:</span> ' + escapeHtml(created));
        if (updated) metaParts.push('<span class="meta-label">Last updated:</span> ' + escapeHtml(updated));

        var metaRowHtml = '';
        if (metaParts.length) {
          metaRowHtml = `
            <div class="workspace-meta-row meta-row-inline">
              ${metaParts.join(' &bull; ')}
            </div>
          `;
        }

        container.innerHTML = `
          <div class="workspace-header-inner">
            <div class="workspace-header-main">
              <div class="workspace-header-title-group">
                <h1 id="workspace-title" class="workspace-title">${title}</h1>
                <p class="workspace-subtitle">${subtitle || 'Analytical workspace'}</p>
              </div>
              <div class="workspace-header-meta">
                <div class="workspace-meta-row">
                  <span class="meta-label">Workspace ID:</span>
                  <span class="meta-value workspace-id">${workspaceIdDisplay}</span>
                </div>
                ${metaRowHtml}
              </div>
            </div>
            <div class="workspace-header-actions">
              ${projectAction}
            </div>
          </div>
          <div class="workspace-header-divider" aria-hidden="true"></div>
        `;
      }

      function renderErrorBanner(container, message, options) {
        if (!container) return;
        if (!message) {
          container.hidden = true;
          container.innerHTML = '';
          return;
        }
        var showRetry = options && options.showRetry;
        var safeMessage = escapeHtml(message);

        var retryButtonHtml = '';
        if (showRetry) {
          retryButtonHtml = `
            <button type="button" class="btn btn-secondary btn-sm" data-action="retry-load">
              <span class="btn-icon" aria-hidden="true"><i class="fa-solid fa-rotate-right"></i></span>
              <span class="btn-label">Retry</span>
            </button>
          `;
        }

        container.innerHTML = `
          <div class="alert alert-error" role="alert">
            <div class="alert-icon" aria-hidden="true">
              <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <div class="alert-content">
              <p class="alert-message">${safeMessage}</p>
              <div class="alert-actions">
                ${retryButtonHtml}
                <button type="button" class="btn btn-tertiary btn-sm" data-action="back-to-workspaces">
                  <span class="btn-icon" aria-hidden="true"><i class="fa-solid fa-arrow-left"></i></span>
                  <span class="btn-label">Back to workspaces</span>
                </button>
              </div>
            </div>
          </div>
        `;
        container.hidden = false;
      }

      function renderQueryList(container) {
        if (!container) return;
        var derived = deriveSortedFilteredQueries();
        var view = derived.view;
        var queries = derived.queries;

        if (!state.workspace) {
          container.innerHTML = '';
          return;
        }

        if (!queries.length) {
          container.innerHTML =
            '<div class="empty-state">' +
              '<p class="empty-state-title">No queries in this workspace yet.</p>' +
              '<p class="empty-state-body">Use the <strong>Create workspace query</strong> button above to define your first cohort.</p>' +
            '</div>';
          return;
        }

        var headerCells = [
          { key: 'name', label: 'Query name' },
          { key: 'dataset_id', label: 'Dataset reference' },
          { key: 'status', label: 'Status' },
          { key: 'created_at', label: 'Created' },
          { key: 'updated_at', label: 'Last updated' }
        ];

        var theadHtml = '<thead><tr>' + headerCells.map(function(col) {
          var sortable = col.key === 'name' || col.key === 'status' || col.key === 'created_at' || col.key === 'updated_at';
          if (!sortable) {
            return '<th scope="col">' + escapeHtml(col.label) + '</th>';
          }
          var isActive = view.sortBy === col.key;
          var dirIcon = '';
          if (isActive) {
            dirIcon = view.sortDir === 'asc'
              ? '<span class="sort-indicator" aria-hidden="true">\u25B2</span>'
              : '<span class="sort-indicator" aria-hidden="true">\u25BC</span>;'
          }
          var ariaSort = 'none';
          if (isActive) {
            ariaSort = view.sortDir === 'asc' ? 'ascending' : 'descending';
          }
          return '<th scope="col" aria-sort="' + ariaSort + '">' +
                   '<button type="button" class="table-sort-button" data-action="sort" data-sort-by="' + col.key + '">' +
                     '<span class="sort-label">' + escapeHtml(col.label) + '</span>' +
                     dirIcon +
                   '</button>' +
                 '</th>';
        }).join('') + '</tr></thead>';

        var rowsHtml = queries.map(function(q) {
          var highlightClass = view.highlightQueryId && view.highlightQueryId === q.id ? ' query-row-highlight' : '';
          return '<tr class="query-row' + highlightClass + '" data-query-id="' + escapeHtml(q.id) + '">' +
                   '<td class="query-name-cell">' +
                     '<button type="button" class="link-button" data-action="open-query" data-query-id="' + escapeHtml(q.id) + '">' +
                       escapeHtml(q.name || '(Untitled query)') +
                     '</button>' +
                     (q.description ? '<div class="query-description">' + escapeHtml(q.description) + '</div>' : '') +
                   '</td>' +
                   '<td class="query-dataset-cell">' +
                     '<span class="code-mono">' + escapeHtml(q.dataset_id) + '</span>' +
                   '</td>' +
                   '<td class="query-status-cell">' +
                     '<span class="status-pill status-' + escapeHtml(q.status) + '">' + formatEnum(q.status) + '</span>' +
                   '</td>' +
                   '<td class="query-created-cell">' + formatDate(q.created_at) + '</td>' +
                   '<td class="query-updated-cell">' + formatDate(q.updated_at) + '</td>' +
                 '</tr>';
        }).join('');

        container.innerHTML =
          '<div class="table-scroll-wrapper">' +
            '<table class="table workspace-query-table">' +
              theadHtml +
              '<tbody>' +
                rowsHtml +
              '</tbody>' +
            '</table>' +
          '</div>';
      }

      function setLoading(isLoading) {
        var loadingEl = document.getElementById('workspace-loading');
        var mainRegion = document.getElementById('workspace-main-region');
        if (!loadingEl || !mainRegion) return;
        if (isLoading) {
          loadingEl.hidden = false;
          loadingEl.setAttribute('aria-hidden', 'false');
        } else {
          loadingEl.hidden = true;
          loadingEl.setAttribute('aria-hidden', 'true');
        }
      }

      function applyStatusFilterFromUrl() {
        var view = getUrlViewState();
        var select = document.getElementById('statusFilterSelect');
        if (!select) return;
        select.value = view.statusFilter || '';
      }

      function handleLoadError(message) {
        state.workspace = state.workspace || null;
        state.originalQueries = [];
        var errorContainer = document.getElementById('workspace-error');
        var mainRegion = document.getElementById('workspace-main-region');
        if (mainRegion) {
          mainRegion.hidden = true;
        }
        renderWorkspaceHeader(document.querySelector('[data-populate="workspace-header"]'));
        renderErrorBanner(errorContainer, message, { showRetry: !!state.workspaceId });
        setLoading(false);
      }

      function loadWorkspaceDetails() {
        if (!state.workspaceId) {
          handleLoadError('A workspace must be specified in the URL to view details.');
          return;
        }

        setLoading(true);
        var errorContainer = document.getElementById('workspace-error');
        renderErrorBanner(errorContainer, null, {});
        var mainRegion = document.getElementById('workspace-main-region');
        if (mainRegion) {
          mainRegion.hidden = false;
        }

        try {
          state.hasTriedLoad = true;
          var result = WebsiteSDK.getWorkspaceDetails(state.workspaceId);
          if (!result || !result.workspace) {
            handleLoadError('Workspace details could not be loaded. The workspace may not exist or you may not have access.');
            return;
          }
          state.workspace = result.workspace;
          state.originalQueries = Array.isArray(result.queries) ? result.queries : [];

          renderWorkspaceHeader(document.querySelector('[data-populate="workspace-header"]'));
          applyStatusFilterFromUrl();
          renderQueryList(document.querySelector('[data-populate="workspace-query-list"]'));
          setLoading(false);
        } catch (e) {
          handleLoadError('An error occurred while loading workspace details. Please try again.');
        }
      }

      function navigateToQueryBuilderNew() {
        if (!state.workspace || !state.workspace.id) return;
        var target = 'query_builder.html?workspaceId=' + encodeURIComponent(state.workspace.id) + '&mode=new';
        window.location.href = target;
      }

      function navigateToQueryBuilderEdit(queryId) {
        if (!state.workspace || !state.workspace.id || !queryId) return;
        updateUrlParams({ highlightQueryId: queryId });
        var target = 'query_builder.html?workspaceId=' + encodeURIComponent(state.workspace.id) + '&queryId=' + encodeURIComponent(queryId) + '&mode=edit';
        window.location.href = target;
      }

      function navigateToProjectDetail() {
        if (!state.workspace || !state.workspace.associated_project_id) return;
        var target = 'project_detail.html?projectId=' + encodeURIComponent(state.workspace.associated_project_id);
        window.location.href = target;
      }

      function navigateBackToWorkspaces() {
        window.location.href = 'workspaces.html';
      }

      function initEventDelegation() {
        var card = document.querySelector('[data-component="workspace-detail-init"]');
        if (!card) return;

        card.addEventListener('click', function(event) {
          var actionEl = event.target.closest('[data-action]');
          if (!actionEl) return;
          var action = actionEl.getAttribute('data-action');

          if (action === 'new-query') {
            event.preventDefault();
            navigateToQueryBuilderNew();
          } else if (action === 'open-query') {
            event.preventDefault();
            var queryId = actionEl.getAttribute('data-query-id');
            navigateToQueryBuilderEdit(queryId);
          } else if (action === 'view-project') {
            event.preventDefault();
            navigateToProjectDetail();
          } else if (action === 'retry-load') {
            event.preventDefault();
            loadWorkspaceDetails();
          } else if (action === 'back-to-workspaces') {
            event.preventDefault();
            navigateBackToWorkspaces();
          } else if (action === 'sort') {
            event.preventDefault();
            var sortBy = actionEl.getAttribute('data-sort-by');
            var currentView = getUrlViewState();
            var nextDir = 'asc';
            if (currentView.sortBy === sortBy && currentView.sortDir === 'asc') {
              nextDir = 'desc';
            }
            updateUrlParams({ sortBy: sortBy, sortDir: nextDir });
            renderQueryList(document.querySelector('[data-populate="workspace-query-list"]'));
          }
        });

        card.addEventListener('change', function(event) {
          var target = event.target;
          if (!target || !target.matches('[data-action="status-filter"]')) return;
          var value = target.value || '';
          updateUrlParams({ statusFilter: value });
          renderQueryList(document.querySelector('[data-populate="workspace-query-list"]'));
        });
      }

      document.addEventListener('DOMContentLoaded', function() {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        state.workspaceId = params.get('workspaceId');

        initEventDelegation();
        loadWorkspaceDetails();
      });
    })();
  </script>
</body>
</html>
