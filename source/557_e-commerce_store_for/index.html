                }).format(amount);
            } catch (e) {
                return amount.toFixed(2);
            }
        }

        // ---------- Render functions (use container parameter directly) ----------
        function renderHeaderCartStatus(container, status, errorMessage) {
            if (!container) return;
            if (errorMessage) {
                container.textContent = 'Cart unavailable';
                return;
            }
            const itemCount = status && typeof status.cartItemCount === 'number' ? status.cartItemCount : 0;
            const subtotal = status && typeof status.cartSubtotal === 'number' ? status.cartSubtotal : 0;
            const currency = status && status.currency ? status.currency : 'USD';
            const subtotalText = formatCurrency(subtotal, currency);
            container.textContent = '(' + itemCount + ') Total items' + (subtotalText ? ' b7 ' + subtotalText : '');
        }

        function renderHeaderWishlistCount(container, status, errorMessage) {
            if (!container) return;
            if (errorMessage) {
                container.textContent = '';
                return;
            }
            const wishlistCount = status && typeof status.wishlistItemCount === 'number' ? status.wishlistItemCount : 0;
            if (wishlistCount > 0) {
                container.textContent = '(' + wishlistCount + ')';
            } else {
                container.textContent = '';
            }
        }

        function renderMainNavCategories(container, categories, errorMessage) {
            if (!container) return;
            container.innerHTML = '';

            // Always include Home link
            const homeItem = document.createElement('li');
            homeItem.className = 'main-nav__item';
            const homeLink = document.createElement('a');
            homeLink.href = 'index.html';
            homeLink.className = 'main-nav__link';
            homeLink.title = 'Homepage with search and featured categories';
            homeLink.textContent = 'Home';
            homeItem.appendChild(homeLink);
            container.appendChild(homeItem);

            if (errorMessage) {
                const errorItem = document.createElement('li');
                errorItem.className = 'main-nav__item main-nav__item--error';
                const span = document.createElement('span');
                span.className = 'main-nav__link main-nav__link--muted';
                span.textContent = 'Categories unavailable';
                errorItem.appendChild(span);
                container.appendChild(errorItem);
            } else if (Array.isArray(categories) && categories.length > 0) {
                categories.forEach(function (cat) {
                    if (!cat || cat.isActive === false) return;
                    const item = document.createElement('li');
                    item.className = 'main-nav__item';
                    const link = document.createElement('a');
                    link.href = 'javascript:void(0)';
                    link.className = 'main-nav__link';
                    link.title = cat.description || cat.name || '';
                    link.textContent = cat.name || '';
                    link.dataset.action = 'header-category-click';
                    link.dataset.categoryKey = cat.key;
                    item.appendChild(link);
                    container.appendChild(item);
                });
            }

            // Utility links: Wishlist & Cart
            const wishlistItem = document.createElement('li');
            wishlistItem.className = 'main-nav__item main-nav__item--utility';
            const wishlistLink = document.createElement('a');
            wishlistLink.href = 'wishlist.html';
            wishlistLink.className = 'main-nav__link';
            wishlistLink.title = 'View and manage saved products';
            wishlistLink.textContent = 'Wishlist';
            wishlistItem.appendChild(wishlistLink);
            container.appendChild(wishlistItem);

            const cartItem = document.createElement('li');
            cartItem.className = 'main-nav__item main-nav__item--utility';
            const cartLink = document.createElement('a');
            cartLink.href = 'cart.html';
            cartLink.className = 'main-nav__link';
            cartLink.title = 'View cart contents, estimate shipping, apply promo codes, and proceed to checkout';
            cartLink.textContent = 'Cart';
            cartItem.appendChild(cartLink);
            container.appendChild(cartItem);
        }

        function renderFeaturedCategories(container, categories, errorMessage) {
            if (!container) return;
            container.innerHTML = '';

            if (errorMessage) {
                const li = document.createElement('li');
                li.className = 'category-list__item category-list__item--error';
                li.textContent = 'Unable to load categories. Please try again later.';
                container.appendChild(li);
                return;
            }

            if (!Array.isArray(categories) || categories.length === 0) {
                const li = document.createElement('li');
                li.className = 'category-list__item category-list__item--empty';
                li.textContent = 'No featured categories available.';
                container.appendChild(li);
                return;
            }

            categories.forEach(function (cat) {
                if (!cat || cat.isActive === false) return;
                const li = document.createElement('li');
                li.className = 'category-list__item';

                const link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.className = 'category-list__link';
                link.dataset.action = 'featured-category-click';
                link.dataset.categoryKey = cat.key;

                const icon = document.createElement('span');
                icon.className = 'category-list__icon';
                icon.setAttribute('aria-hidden', 'true');

                const label = document.createElement('span');
                label.className = 'category-list__label';
                label.textContent = cat.name || '';

                link.appendChild(icon);
                link.appendChild(label);
                li.appendChild(link);
                container.appendChild(li);
            });
        }

        function renderFeaturedKits(container, featuredKits, errorMessage) {
            if (!container) return;
            container.innerHTML = '';

            if (errorMessage) {
                const p = document.createElement('p');
                p.className = 'home-section__message home-section__message--error';
                p.textContent = 'Unable to load featured kits. Please try again later.';
                container.appendChild(p);
                return;
            }

            if (!Array.isArray(featuredKits) || featuredKits.length === 0) {
                const p = document.createElement('p');
                p.className = 'home-section__message home-section__message--empty';
                p.textContent = 'No featured kits available right now. Try searching above.';
                container.appendChild(p);
                return;
            }

            featuredKits.forEach(function (item) {
                if (!item || !item.product) return;
                const product = item.product;
                const category = item.category;

                const card = document.createElement('article');
                card.className = 'product-card product-card--kit';

                const link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.className = 'product-card__link';
                link.dataset.action = 'featured-kit-click';
                link.dataset.productId = product.id;

                const img = document.createElement('img');
                img.className = 'product-card__image';
                const imgSrc = Array.isArray(product.images) && product.images.length > 0 ? product.images[0] : 'images/placeholder_product.png';
                img.src = imgSrc;
                img.alt = product.name || '';

                const info = document.createElement('div');
                info.className = 'product-card__info';

                const nameEl = document.createElement('h3');
                nameEl.className = 'product-card__name';
                nameEl.textContent = product.name || '';

                const meta = document.createElement('div');
                meta.className = 'product-card__meta';

                const priceEl = document.createElement('span');
                priceEl.className = 'product-card__price';
                priceEl.textContent = formatCurrency(product.price, product.currency || (state.headerStatus && state.headerStatus.currency));

                if (product.isOnSale && typeof product.originalPrice === 'number') {
                    const originalEl = document.createElement('span');
                    originalEl.className = 'product-card__price-original';
                    originalEl.textContent = formatCurrency(product.originalPrice, product.currency || (state.headerStatus && state.headerStatus.currency));
                    meta.appendChild(originalEl);
                }

                meta.appendChild(priceEl);

                if (typeof product.averageRating === 'number' && typeof product.ratingCount === 'number') {
                    const ratingEl = document.createElement('span');
                    ratingEl.className = 'product-card__rating';
                    ratingEl.textContent = product.averageRating.toFixed(1) + ' b7 ' + product.ratingCount + ' reviews';
                    meta.appendChild(ratingEl);
                }

                if (category && category.name) {
                    const categoryEl = document.createElement('span');
                    categoryEl.className = 'product-card__category';
                    categoryEl.textContent = category.name;
                    meta.appendChild(categoryEl);
                }

                info.appendChild(nameEl);
                info.appendChild(meta);

                link.appendChild(img);
                link.appendChild(info);
                card.appendChild(link);
                container.appendChild(card);
            });
        }

        function renderFeaturedThemes(container, themes, errorMessage) {
            if (!container) return;
            container.innerHTML = '';

            if (errorMessage) {
                const p = document.createElement('p');
                p.className = 'home-section__message home-section__message--error';
                p.textContent = 'Unable to load themes. Please try again later.';
                container.appendChild(p);
                return;
            }

            if (!Array.isArray(themes) || themes.length === 0) {
                const p = document.createElement('p');
                p.className = 'home-section__message home-section__message--empty';
                p.textContent = 'No themed recommendations available.';
                container.appendChild(p);
                return;
            }

            themes.forEach(function (theme) {
                if (!theme) return;
                const themeBlock = document.createElement('section');
                themeBlock.className = 'theme-block';

                const header = document.createElement('header');
                header.className = 'theme-block__header';

                const title = document.createElement('h3');
                title.className = 'theme-block__title';
                title.textContent = theme.themeTag || 'Theme';

                header.appendChild(title);
                themeBlock.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'theme-block__grid';

                if (Array.isArray(theme.products)) {
                    theme.products.forEach(function (product) {
                        if (!product) return;
                        const card = document.createElement('article');
                        card.className = 'product-card product-card--theme';

                        const link = document.createElement('a');
                        link.href = 'javascript:void(0)';
                        link.className = 'product-card__link';
                        link.dataset.action = 'theme-product-click';
                        link.dataset.productId = product.id;

                        const img = document.createElement('img');
                        img.className = 'product-card__image';
                        const imgSrc = Array.isArray(product.images) && product.images.length > 0 ? product.images[0] : 'images/placeholder_product.png';
                        img.src = imgSrc;
                        img.alt = product.name || '';

                        const info = document.createElement('div');
                        info.className = 'product-card__info';

                        const nameEl = document.createElement('h4');
                        nameEl.className = 'product-card__name';
                        nameEl.textContent = product.name || '';

                        const meta = document.createElement('div');
                        meta.className = 'product-card__meta';
                        const priceEl = document.createElement('span');
                        priceEl.className = 'product-card__price';
                        priceEl.textContent = formatCurrency(product.price, product.currency || (state.headerStatus && state.headerStatus.currency));
                        meta.appendChild(priceEl);

                        info.appendChild(nameEl);
                        info.appendChild(meta);

                        link.appendChild(img);
                        link.appendChild(info);
                        card.appendChild(link);
                        grid.appendChild(card);
                    });
                }

                themeBlock.appendChild(grid);
                container.appendChild(themeBlock);
            });
        }

        function renderPromotions(container, promotions, errorMessage) {
            if (!container) return;
            container.innerHTML = '';

            if (errorMessage) {
                const p = document.createElement('p');
                p.className = 'home-section__message home-section__message--error';
                p.textContent = 'Unable to load promotions. Please try again later.';
                container.appendChild(p);
                return;
            }

            if (!Array.isArray(promotions) || promotions.length === 0) {
                const p = document.createElement('p');
                p.className = 'home-section__message home-section__message--empty';
                p.textContent = 'No active promotions at the moment.';
                container.appendChild(p);
                return;
            }

            promotions.forEach(function (promo) {
                if (!promo) return;
                const card = document.createElement('article');
                card.className = 'promotion-card';

                const body = document.createElement('button');
                body.type = 'button';
                body.className = 'promotion-card__body';
                body.dataset.action = 'promotion-click';
                body.dataset.promotionTitle = promo.title || '';

                if (promo.badgeText) {
                    const badge = document.createElement('span');
                    badge.className = 'promotion-card__badge';
                    badge.textContent = promo.badgeText;
                    body.appendChild(badge);
                }

                const titleEl = document.createElement('h3');
                titleEl.className = 'promotion-card__title';
                titleEl.textContent = promo.title || '';

                const descEl = document.createElement('p');
                descEl.className = 'promotion-card__description';
                descEl.textContent = promo.description || '';

                body.appendChild(titleEl);
                body.appendChild(descEl);
                card.appendChild(body);
                container.appendChild(card);
            });
        }

        function renderSearchPreview(container, searchResult, query) {
            if (!container) return;
            container.innerHTML = '';

            if (!searchResult || !Array.isArray(searchResult.products) || searchResult.products.length === 0 || !query) {
                container.hidden = true;
                return;
            }

            container.hidden = false;

            const header = document.createElement('div');
            header.className = 'search-preview-panel__header';

            const title = document.createElement('p');
            title.className = 'search-preview-panel__title';
            title.textContent = 'Top results for "' + query + '"';

            const moreBtn = document.createElement('button');
            moreBtn.type = 'button';
            moreBtn.className = 'search-preview-panel__more';
            moreBtn.dataset.action = 'search-preview-more-results';
            moreBtn.textContent = 'View all results';

            header.appendChild(title);
            header.appendChild(moreBtn);
            container.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'search-preview-panel__grid';

            searchResult.products.forEach(function (item) {
                if (!item || !item.product) return;
                const product = item.product;
                const category = item.category;

                const card = document.createElement('article');
                card.className = 'product-card product-card--preview';

                const link = document.createElement('button');
                link.type = 'button';
                link.className = 'product-card__link';
                link.dataset.action = 'search-preview-product-click';
                link.dataset.productId = product.id;

                const img = document.createElement('img');
                img.className = 'product-card__image';
                const imgSrc = Array.isArray(product.images) && product.images.length > 0 ? product.images[0] : 'images/placeholder_product.png';
                img.src = imgSrc;
                img.alt = product.name || '';

                const info = document.createElement('div');
                info.className = 'product-card__info';

                const nameEl = document.createElement('h4');
                nameEl.className = 'product-card__name';
                nameEl.textContent = product.name || '';

                const meta = document.createElement('div');
                meta.className = 'product-card__meta';

                const priceEl = document.createElement('span');
                priceEl.className = 'product-card__price';
                priceEl.textContent = formatCurrency(product.price, product.currency || (state.headerStatus && state.headerStatus.currency));

                meta.appendChild(priceEl);

                if (category && category.name) {
                    const catEl = document.createElement('span');
                    catEl.className = 'product-card__category';
                    catEl.textContent = category.name;
                    meta.appendChild(catEl);
                }

                info.appendChild(nameEl);
                info.appendChild(meta);

                link.appendChild(img);
                link.appendChild(info);
                card.appendChild(link);
                grid.appendChild(card);
            });

            container.appendChild(grid);
        }

        // ---------- Data loading ----------
        function loadInitialData() {
            // Main navigation categories
            try {
                const categories = WebsiteSDK.getMainCategoriesForNav();
                state.navCategories = Array.isArray(categories) ? categories : [];
            } catch (err) {
                console.error('Error loading main nav categories', err);
                state.navCategories = [];
                state.errors.navCategories = 'Unable to load categories.';
            }

            // Header status
            try {
                const status = WebsiteSDK.getHeaderStatus();
                state.headerStatus = status || null;
            } catch (err) {
                console.error('Error loading header status', err);
                state.headerStatus = null;
                state.errors.headerStatus = 'Unable to load header status.';
            }

            // Home featured content
            try {
                const featured = WebsiteSDK.getHomeFeaturedContent();
                state.homeFeaturedContent = featured || null;
            } catch (err) {
                console.error('Error loading home featured content', err);
                state.homeFeaturedContent = null;
                state.errors.homeFeaturedContent = 'Unable to load featured content.';
            }
        }

        function renderAllPopulatedElements() {
            const populateElements = document.querySelectorAll('[data-populate]');
            populateElements.forEach(function (element) {
                const type = element.dataset.populate;
                if (!type) return;

                if (type === 'header-cart-status') {
                    renderHeaderCartStatus(element, state.headerStatus, state.errors.headerStatus);
                } else if (type === 'header-wishlist-count') {
                    renderHeaderWishlistCount(element, state.headerStatus, state.errors.headerStatus);
                } else if (type === 'main-nav-categories') {
                    renderMainNavCategories(element, state.navCategories, state.errors.navCategories);
                } else if (type === 'featured-categories') {
                    const cats = state.homeFeaturedContent && state.homeFeaturedContent.featuredCategories;
                    renderFeaturedCategories(element, cats || [], state.errors.homeFeaturedContent);
                } else if (type === 'featured-kits') {
                    const kits = state.homeFeaturedContent && state.homeFeaturedContent.featuredKits;
                    renderFeaturedKits(element, kits || [], state.errors.homeFeaturedContent);
                } else if (type === 'featured-themes') {
                    const themes = state.homeFeaturedContent && state.homeFeaturedContent.featuredThemes;
                    renderFeaturedThemes(element, themes || [], state.errors.homeFeaturedContent);
                } else if (type === 'promotions') {
                    const promos = state.homeFeaturedContent && state.homeFeaturedContent.promotions;
                    renderPromotions(element, promos || [], state.errors.homeFeaturedContent);
                }
            });
        }

        // ---------- Search interactions ----------
        const searchForm = document.querySelector('.search-form');
        const searchInput = document.getElementById('site-search');
        const searchPreviewPanel = document.getElementById('search-preview-panel');

        function handleSearchSubmit(event) {
            if (event) {
                event.preventDefault();
            }
            if (!searchInput) return;
            const term = searchInput.value ? searchInput.value.trim() : '';
            if (!term) return;
            state.searchTerm = term;
            window.location.href = 'search.html?query=' + encodeURIComponent(term);
        }

        function performSearchPreview(term) {
            if (!term) {
                if (searchPreviewPanel) {
                    searchPreviewPanel.hidden = true;
                    searchPreviewPanel.innerHTML = '';
                }
                return;
            }
            try {
                const result = WebsiteSDK.searchProducts(term, {}, 'relevance', 1, 6);
                state.searchTerm = term;
                if (searchPreviewPanel) {
                    renderSearchPreview(searchPreviewPanel, result, term);
                }
            } catch (err) {
                console.error('Error performing search preview', err);
                if (searchPreviewPanel) {
                    searchPreviewPanel.hidden = true;
                    searchPreviewPanel.innerHTML = '';
                }
            }
        }

        function handleSearchInputChange(event) {
            const value = event && event.target && typeof event.target.value === 'string' ? event.target.value.trim() : '';
            state.searchTerm = value;

            if (state.searchDebounceTimeout) {
                window.clearTimeout(state.searchDebounceTimeout);
                state.searchDebounceTimeout = null;
            }

            if (!value) {
                if (searchPreviewPanel) {
                    searchPreviewPanel.hidden = true;
                    searchPreviewPanel.innerHTML = '';
                }
                return;
            }

            state.searchDebounceTimeout = window.setTimeout(function () {
                performSearchPreview(value);
            }, 300);
        }

        function handleSearchInputFocus() {
            if (searchPreviewPanel && searchPreviewPanel.innerHTML.trim() !== '') {
                searchPreviewPanel.hidden = false;
            }
        }

        function handleSearchInputBlur() {
            // Delay hiding to allow clicks within the preview panel
            window.setTimeout(function () {
                if (!searchPreviewPanel) return;
                const active = document.activeElement;
                if (!searchPreviewPanel.contains(active) && active !== searchInput) {
                    searchPreviewPanel.hidden = true;
                }
            }, 150);
        }

        if (searchForm) {
            searchForm.addEventListener('submit', handleSearchSubmit);
        }
        if (searchInput) {
            searchInput.addEventListener('input', handleSearchInputChange);
            searchInput.addEventListener('focus', handleSearchInputFocus);
            searchInput.addEventListener('blur', handleSearchInputBlur);
        }

        // ---------- Global click handling for data-action elements ----------
        document.addEventListener('click', function (event) {
            const actionElement = event.target.closest('[data-action]');
            if (!actionElement) return;
            const action = actionElement.dataset.action;

            if (action === 'header-category-click' || action === 'featured-category-click') {
                const categoryKey = actionElement.dataset.categoryKey;
                if (categoryKey) {
                    window.location.href = 'category.html?categoryId=' + encodeURIComponent(categoryKey);
                }
            } else if (action === 'featured-kit-click' || action === 'theme-product-click' || action === 'search-preview-product-click') {
                const productId = actionElement.dataset.productId;
                if (productId) {
                    window.location.href = 'product.html?id=' + encodeURIComponent(productId);
                }
            } else if (action === 'promotion-click') {
                const promoTitle = actionElement.dataset.promotionTitle || '';
                const term = promoTitle.trim();
                if (term) {
                    window.location.href = 'search.html?query=' + encodeURIComponent(term);
                }
            } else if (action === 'search-preview-more-results') {
                const term = state.searchTerm || (searchInput && searchInput.value.trim());
                if (term) {
                    window.location.href = 'search.html?query=' + encodeURIComponent(term);
                }
            }
        });

        // ---------- Initialize ----------
        loadInitialData();
        renderAllPopulatedElements();
    });
    </script>
