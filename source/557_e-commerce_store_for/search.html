<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Party Supplies Store - Search Results</title>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Work+Sans:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='search.css'>
</head>
<body class='site'>
    <!-- Top utility bar -->
    <div class='top-bar'>
        <div class='container top-bar__inner'>
            <div class='top-bar__left'>
                <form class='language-switcher' aria-label='Select language'>
                    <label class='sr-only' for='language-select'>Language</label>
                    <select id='language-select' name='language'>
                        <option value='en' selected>English</option>
                    </select>
                </form>
            </div>
            <div class='top-bar__right'>
                <a href='wishlist.html' class='top-bar__link' title='View and manage saved products'>Wishlist <span data-populate='wishlist-count' aria-hidden='true'></span></a>
                <span class='top-bar__divider' aria-hidden='true'>|</span>
                <a href='cart.html' class='top-bar__link' title='View cart contents, estimate shipping, apply promo codes, and proceed to checkout'>Cart</a>
            </div>
        </div>
    </div>

    <!-- Site header -->
    <header class='site-header' role='banner'>
        <div class='container header-main'>
            <div class='header-main__search'>
                <form class='search-form' role='search'>
                    <label class='sr-only' for='site-search'>Search store</label>
                    <input id='site-search' class='search-form__input' type='search' placeholder='Search store'>
                    <button type='submit' class='search-form__button' aria-label='Search'></button>
                </form>
            </div>
            <div class='header-main__logo'>
                <a href='index.html' class='logo' title='Homepage with search and featured categories'>
                    <span class='logo__inner'>
                        <span class='logo__primary'>PARTY MART</span>
                        <span class='logo__secondary'>AU CENTRE DU PARTY</span>
                    </span>
                </a>
            </div>
            <div class='header-main__cart'>
                <a href='cart.html' class='cart-summary' title='View cart contents, estimate shipping, apply promo codes, and proceed to checkout'>
                    <span class='cart-summary__icon' aria-hidden='true'></span>
                    <span class='cart-summary__text'>
                        <span class='cart-summary__label'>Shopping cart</span>
                        <span class='cart-summary__meta'>(0) Total items</span>
                    </span>
                </a>
            </div>
        </div>

        <!-- Primary navigation -->
        <nav class='main-nav' role='navigation' aria-label='Primary'>
            <div class='container'>
                <ul class='main-nav__list' data-component='header-navigation' data-populate='main-categories'>
                    <!-- Will be populated dynamically from getMainCategoriesForNav -->
                </ul>
            </div>
        </nav>
    </header>

    <!-- Main content wrapper -->
    <main id='content' class='site-content' role='main'>
        <div class='container'>
            <div class='search-layout' data-component='search-results-page'>
                <!-- Filter sidebar -->
                <aside class='search-layout__sidebar' aria-label='Filter results'>
                    <div class='filter-sidebar__header'>Categories &amp; Filters</div>
                    <form class='filter-sidebar' data-component='filter-sidebar' data-populate='filter-sidebar'>
                        <!-- Filter groups will be rendered here based on getSearchFilterOptions and applied filters -->
                    </form>
                </aside>

                <!-- Main results column -->
                <section class='search-layout__main' aria-label='Search results'>
                    <header class='search-main__header'>
                        <div class='results-summary' data-component='search-results-summary' data-populate='results-summary'>
                            <!-- Summary will be rendered here -->
                        </div>
                        <div class='active-filters' data-component='active-filter-summary' data-populate='active-filter-summary'>
                            <!-- Active filter chips rendered here -->
                        </div>
                        <div class='sort-bar' data-component='sort-and-page-size-bar'>
                            <div class='sort-bar__left'>
                                <div class='sort-bar__control'>
                                    <label for='sort-select' class='sort-bar__label'>Sort by</label>
                                    <select id='sort-select' class='sort-bar__select' data-action='change-sort'>
                                        <option value='relevance'>Relevance</option>
                                        <option value='price_low_to_high'>Price: Low to High</option>
                                        <option value='price_high_to_low'>Price: High to Low</option>
                                        <option value='rating_high_to_low'>Customer Rating</option>
                                        <option value='newest'>Newest</option>
                                    </select>
                                </div>
                                <div class='sort-bar__control'>
                                    <label for='page-size-select' class='sort-bar__label'>Items per page</label>
                                    <select id='page-size-select' class='sort-bar__select' data-action='change-page-size'>
                                        <option value='12'>12</option>
                                        <option value='24'>24</option>
                                        <option value='48'>48</option>
                                    </select>
                                </div>
                            </div>
                            <div class='sort-bar__right'>
                                <span class='sort-bar__total' data-populate='results-count'></span>
                            </div>
                        </div>
                    </header>

                    <section class='search-main__body'>
                        <div class='no-results' data-component='no-results-message' data-populate='no-results' hidden>
                            <!-- No-results state will be rendered here when needed -->
                        </div>

                        <div class='product-grid' data-component='product-grid' data-populate='product-grid' aria-live='polite'>
                            <!-- Product cards will be rendered here -->
                        </div>

                        <nav class='pagination' data-component='pagination-controls' data-populate='pagination-controls' aria-label='Search results pages'>
                            <!-- Pagination controls will be rendered here -->
                        </nav>
                    </section>
                </section>
            </div>
        </div>
    </main>

    <!-- Site footer -->
    <footer class='site-footer' role='contentinfo'>
        <div class='container footer-main'>
            <nav class='footer-nav' aria-label='Footer'>
                <ul class='footer-nav__list'>
                    <li class='footer-nav__item'>
                        <a href='about.html' class='footer-nav__link' title='Learn more about the store and brand'>About</a>
                    </li>
                    <li class='footer-nav__item'>
                        <a href='contact.html' class='footer-nav__link' title='Contact customer support'>Contact</a>
                    </li>
                    <li class='footer-nav__item'>
                        <a href='help.html' class='footer-nav__link' title='Frequently asked questions and help resources'>Help &amp; FAQ</a>
                    </li>
                    <li class='footer-nav__item'>
                        <a href='shipping_returns.html' class='footer-nav__link' title='Shipping, delivery, and return policies'>Shipping &amp; Returns</a>
                    </li>
                    <li class='footer-nav__item'>
                        <a href='privacy.html' class='footer-nav__link' title='Details on data collection and privacy'>Privacy Policy</a>
                    </li>
                    <li class='footer-nav__item'>
                        <a href='terms.html' class='footer-nav__link' title='Legal terms for using the website'>Terms &amp; Conditions</a>
                    </li>
                </ul>
            </nav>
            <div class='footer-main__meta'>
                <p class='footer-main__copy'>&copy; <span class='footer-main__year'>2024</span> Party Mart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    'use strict';

    function safeCall(fn) {
        try {
            return fn();
        } catch (error) {
            console.error('SDK call failed', error);
            return null;
        }
    }

    function escapeHtml(value) {
        if (value === null || value === undefined) {
            return '';
        }
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function getUrlState() {
        const params = new URLSearchParams(window.location.search);
        const query = params.get('query') || '';

        const filters = {};
        const numberParams = [
            'minPrice',
            'maxPrice',
            'minRating',
            'minPiecesIncluded',
            'minGuestCount',
            'maxGuestCount'
        ];
        numberParams.forEach(function (name) {
            const raw = params.get(name);
            if (raw !== null && raw !== '') {
                const num = Number(raw);
                if (!Number.isNaN(num)) {
                    filters[name] = num;
                }
            }
        });

        const boolParams = ['freeShippingOnly', 'isKit'];
        boolParams.forEach(function (name) {
            const raw = params.get(name);
            if (raw !== null) {
                filters[name] = raw === 'true';
            }
        });

        const stringParams = ['color', 'material', 'kitType', 'balloonType'];
        stringParams.forEach(function (name) {
            const raw = params.get(name);
            if (raw) {
                filters[name] = raw;
            }
        });

        const themeTagsRaw = params.get('themeTags');
        if (themeTagsRaw) {
            filters.themeTags = themeTagsRaw.split(',').filter(function (tag) { return tag; });
        }

        const sort = params.get('sort') || 'relevance';
        const page = Number(params.get('page')) || 1;
        const pageSize = Number(params.get('pageSize')) || 24;

        return { query: query, filters: filters, sort: sort, page: page, pageSize: pageSize, rawParams: params };
    }

    function renderHeaderStatus(status) {
        const cartMeta = document.querySelector('.cart-summary__meta');
        const cartLabel = document.querySelector('.cart-summary__label');
        const itemCount = typeof status.cartItemCount === 'number' ? status.cartItemCount : 0;
        const subtotal = typeof status.cartSubtotal === 'number' ? status.cartSubtotal : 0;
        const currency = status.currency || 'USD';

        if (cartMeta) {
            cartMeta.textContent = '(' + itemCount + ') Total items';
        }
        if (cartLabel) {
            cartLabel.textContent = 'Cart subtotal: ' + currency + ' ' + subtotal.toFixed(2);
        }

        const wishlistEls = document.querySelectorAll('[data-populate="wishlist-count"]');
        wishlistEls.forEach(function (el) {
            const count = typeof status.wishlistItemCount === 'number' ? status.wishlistItemCount : 0;
            el.textContent = '(' + count + ')';
        });
    }

    function renderMainCategories(container, categories) {
        container.innerHTML = '';

        var html = '';
        html += "<li class='main-nav__item'>" +
                "<a href='index.html' class='main-nav__link' title='Homepage with search and featured categories'>Home</a>" +
                '</li>';

        categories.forEach(function (cat) {
            if (!cat || cat.isActive === false) {
                return;
            }
            var key = cat.key || cat.id;
            var name = cat.name || key;
            html += "<li class='main-nav__item'>" +
                    "<a href='category.html?categoryId=" + encodeURIComponent(key) + "' class='main-nav__link'>" + escapeHtml(name) + '</a>' +
                    '</li>';
        });

        html += "<li class='main-nav__item main-nav__item--utility'>" +
                "<a href='wishlist.html' class='main-nav__link' title='View and manage saved products'>Wishlist</a>" +
                '</li>';
        html += "<li class='main-nav__item main-nav__item--utility'>" +
                "<a href='cart.html' class='main-nav__link' title='View cart contents, estimate shipping, apply promo codes, and proceed to checkout'>Cart</a>" +
                '</li>';

        container.innerHTML = html;
    }

    function renderResultsSummary(container, query, total, page, pageSize) {
        var safeQuery = escapeHtml(query);
        var text;
        if (!query) {
            text = 'Type a search term in the box above to see available party supplies.';
        } else if (!total) {
            text = "0 results for '" + safeQuery + "'.";
        } else {
            var start = (page - 1) * pageSize + 1;
            var end = Math.min(total, page * pageSize);
            text = 'Showing ' + start + '–' + end + ' of ' + total + " results for '" + safeQuery + "'.";
        }
        container.textContent = text;
    }

    function renderActiveFilterSummary(container, query, appliedFilters) {
        container.innerHTML = '';
        if (!appliedFilters) {
            return;
        }

        var chips = [];

        function addNumericChip(key, labelPrefix, value, unit) {
            if (value === undefined || value === null) {
                return;
            }
            var label = labelPrefix + ' ' + value + (unit || '');
            chips.push({ key: key, value: null, label: label });
        }

        function addRangeChip(minKey, maxKey, labelPrefix, minVal, maxVal, unit) {
            if (minVal === undefined && maxVal === undefined) {
                return;
            }
            var label;
            if (minVal !== undefined && maxVal !== undefined) {
                label = labelPrefix + ' ' + minVal + '–' + maxVal + (unit || '');
            } else if (minVal !== undefined) {
                label = labelPrefix + ' ≥ ' + minVal + (unit || '');
            } else {
                label = labelPrefix + ' ≤ ' + maxVal + (unit || '');
            }
            chips.push({ key: minKey, value: null, label: label });
        }

        if (appliedFilters.minPrice !== undefined || appliedFilters.maxPrice !== undefined) {
            addRangeChip('minPrice', 'maxPrice', 'Price', appliedFilters.minPrice, appliedFilters.maxPrice, '');
        }

        if (appliedFilters.minRating !== undefined) {
            chips.push({ key: 'minRating', value: null, label: appliedFilters.minRating + ' stars & up' });
        }

        if (appliedFilters.freeShippingOnly) {
            chips.push({ key: 'freeShippingOnly', value: null, label: 'Free Shipping' });
        }

        if (appliedFilters.color) {
            chips.push({ key: 'color', value: null, label: 'Color: ' + appliedFilters.color });
        }

        if (appliedFilters.material) {
            chips.push({ key: 'material', value: null, label: 'Material: ' + appliedFilters.material });
        }

        if (appliedFilters.themeTags && appliedFilters.themeTags.length) {
            appliedFilters.themeTags.forEach(function (tag) {
                chips.push({ key: 'themeTags', value: tag, label: 'Theme: ' + tag });
            });
        }

        if (appliedFilters.minPiecesIncluded !== undefined) {
            addNumericChip('minPiecesIncluded', 'Pieces ≥', appliedFilters.minPiecesIncluded, '');
        }

        if (appliedFilters.minGuestCount !== undefined || appliedFilters.maxGuestCount !== undefined) {
            addRangeChip('minGuestCount', 'maxGuestCount', 'Guests', appliedFilters.minGuestCount, appliedFilters.maxGuestCount, '');
        }

        if (appliedFilters.isKit) {
            chips.push({ key: 'isKit', value: null, label: 'Kits only' });
        }

        if (appliedFilters.kitType) {
            chips.push({ key: 'kitType', value: null, label: 'Kit type: ' + appliedFilters.kitType });
        }

        if (appliedFilters.balloonType) {
            chips.push({ key: 'balloonType', value: null, label: 'Balloon type: ' + appliedFilters.balloonType });
        }

        if (!chips.length) {
            return;
        }

        var html = '';
        chips.forEach(function (chip) {
            html += "<button type='button' class='filter-chip' data-action='remove-filter-chip'" +
                    " data-filter-key='" + escapeHtml(chip.key) + "'";
            if (chip.value !== null && chip.value !== undefined) {
                html += " data-filter-value='" + escapeHtml(chip.value) + "'";
            }
            html += '>' +
                    "<span class='filter-chip__label'>" + escapeHtml(chip.label) + '</span>' +
                    "<span class='filter-chip__remove' aria-hidden='true'>d</span>" +
                    "<span class='sr-only'>Remove filter</span>" +
                    '</button>';
        });

        html += "<button type='button' class='filter-chip filter-chip--clear-all' data-action='clear-filters'>" +
                "Clear all filters" +
                '</button>';

        container.innerHTML = html;
    }

    function renderSortBar(container, sort, pageSize, total) {
        var sortSelect = container.querySelector('#sort-select');
        var pageSizeSelect = container.querySelector('#page-size-select');
        if (sortSelect) {
            sortSelect.value = sort || 'relevance';
        }
        if (pageSizeSelect) {
            pageSizeSelect.value = String(pageSize || 24);
        }
        var totalEl = container.querySelector('[data-populate="results-count"]');
        if (totalEl) {
            totalEl.textContent = (typeof total === 'number' ? total : 0) + ' items';
        }
    }

    function renderNoResults(container, query) {
        var safeQuery = escapeHtml(query || '');
        var html = '';
        html += "<div class='no-results__inner'>";
        html += "<h2 class='no-results__title'>No products found</h2>";
        if (query) {
            html += "<p class='no-results__text'>We couldn't find any matches for '<strong>" + safeQuery + "</strong>'. Try different keywords or remove some filters.</p>";
        } else {
            html += "<p class='no-results__text'>Start by searching for party supplies using the search bar above.</p>";
        }
        html += "<button type='button' class='no-results__clear-btn' data-action='clear-filters'>Clear all filters</button>";
        html += '</div>';
        container.innerHTML = html;
    }

    function renderProductGrid(container, items) {
        container.innerHTML = '';
        if (!items || !items.length) {
            return;
        }

        var html = '';
        items.forEach(function (entry) {
            var product = entry.product;
            if (!product) {
                return;
            }
            var id = product.id;
            var name = product.name || '';
            var price = product.price;
            var originalPrice = product.originalPrice;
            var currency = product.currency || 'USD';
            var rating = product.averageRating;
            var ratingCount = product.ratingCount;
            var freeShipping = !!product.freeShippingEligible;
            var piecesIncluded = product.piecesIncluded;
            var minGuests = product.minGuestCount;
            var maxGuests = product.maxGuestCount;
            var isKit = !!product.isKit;
            var kitType = product.kitType;
            var color = product.color;
            var material = product.material;
            var imageUrl = (product.images && product.images.length) ? product.images[0] : '';

            html += "<article class='product-card' data-product-id='" + escapeHtml(id) + "'>";

            html += "<div class='product-card__media'>" +
                    "<button type='button' class='product-card__image-btn' data-action='view-product' data-product-id='" + escapeHtml(id) + "'>";
            if (imageUrl) {
                html += "<img class='product-card__image' src='" + escapeHtml(imageUrl) + "' alt='" + escapeHtml(name) + "'>";
            } else {
                html += "<div class='product-card__image product-card__image--placeholder'>No image</div>";
            }
            html += '</button>';
            html += "<button type='button' class='product-card__wishlist-btn' data-action='toggle-wishlist' data-product-id='" + escapeHtml(id) + "' aria-label='Save to wishlist'>" +
                    "<span class='product-card__wishlist-icon' aria-hidden='true'>♥</span>" +
                    '</button>';
            html += '</div>';

            html += "<div class='product-card__body'>";
            html += "<button type='button' class='product-card__title' data-action='view-product' data-product-id='" + escapeHtml(id) + "'>" + escapeHtml(name) + '</button>';

            html += "<div class='product-card__price-row'>";
            if (typeof price === 'number') {
                html += "<span class='product-card__price'>" + currency + ' ' + price.toFixed(2) + '</span>';
            }
            if (product.isOnSale && typeof originalPrice === 'number' && originalPrice > price) {
                html += "<span class='product-card__price-original'>" + currency + ' ' + originalPrice.toFixed(2) + '</span>';
            }
            html += '</div>';

            if (typeof rating === 'number' && typeof ratingCount === 'number') {
                html += "<div class='product-card__rating'>" +
                        "<span class='product-card__rating-stars'>" + rating.toFixed(1) + ' 77</span>' +
                        "<span class='product-card__rating-count'>(" + ratingCount + ')</span>' +
                        '</div>';
            }

            html += "<ul class='product-card__meta'>";
            if (freeShipping) {
                html += "<li class='product-card__meta-item product-card__meta-item--shipping'>Free Shipping eligible</li>";
            }
            if (isKit) {
                html += "<li class='product-card__meta-item'>Kit";
                if (kitType) {
                    html += ': ' + escapeHtml(kitType);
                }
                html += '</li>';
            }
            if (piecesIncluded !== undefined && piecesIncluded !== null) {
                html += "<li class='product-card__meta-item'>" + piecesIncluded + ' pieces</li>';
            }
            if (minGuests !== undefined || maxGuests !== undefined) {
                var guestText = 'Guests: ';
                if (minGuests !== undefined && maxGuests !== undefined) {
                    guestText += minGuests + '–' + maxGuests;
                } else if (minGuests !== undefined) {
                    guestText += '≥ ' + minGuests;
                } else if (maxGuests !== undefined) {
                    guestText += '≤ ' + maxGuests;
                }
                html += "<li class='product-card__meta-item'>" + guestText + '</li>';
            }
            if (color) {
                html += "<li class='product-card__meta-item'>Color: " + escapeHtml(color) + '</li>';
            }
            if (material) {
                html += "<li class='product-card__meta-item'>Material: " + escapeHtml(material) + '</li>';
            }
            html += '</ul>';

            html += '</div>';

            html += "<div class='product-card__footer'>";
            html += "<button type='button' class='btn btn--primary product-card__add-to-cart' data-action='add-to-cart' data-product-id='" + escapeHtml(id) + "'>Add to cart</button>";
            html += '</div>';

            html += '</article>';
        });

        container.innerHTML = html;
    }

    function renderPagination(container, total, page, pageSize) {
        container.innerHTML = '';
        if (!total || !pageSize) {
            return;
        }
        var totalPages = Math.ceil(total / pageSize);
        if (totalPages <= 1) {
            return;
        }

        var html = "<ul class='pagination__list'>";

        var prevDisabled = page <= 1;
        html += "<li class='pagination__item'>" +
                "<button type='button' class='pagination__link" + (prevDisabled ? " pagination__link--disabled" : '') + "' data-action='change-page' data-page='" + (page - 1) + "'" + (prevDisabled ? " aria-disabled='true'" : '') + ">Previous</button>" +
                '</li>';

        var maxToShow = 7;
        var start = Math.max(1, page - 3);
        var end = Math.min(totalPages, start + maxToShow - 1);
        if (end - start < maxToShow - 1) {
            start = Math.max(1, end - maxToShow + 1);
        }

        for (var p = start; p <= end; p++) {
            var isCurrent = p === page;
            html += "<li class='pagination__item'>" +
                    "<button type='button' class='pagination__link" + (isCurrent ? " pagination__link--current" : '') + "' data-action='change-page' data-page='" + p + "'" + (isCurrent ? " aria-current='page'" : '') + ">" + p + '</button>' +
                    '</li>';
        }

        var nextDisabled = page >= totalPages;
        html += "<li class='pagination__item'>" +
                "<button type='button' class='pagination__link" + (nextDisabled ? " pagination__link--disabled" : '') + "' data-action='change-page' data-page='" + (page + 1) + "'" + (nextDisabled ? " aria-disabled='true'" : '') + ">Next</button>" +
                '</li>';

        html += '</ul>';
        container.innerHTML = html;
    }

    function renderFilterSidebar(container, filterOptions, appliedFilters, rawParams) {
        var priceRanges = filterOptions && filterOptions.priceRanges ? filterOptions.priceRanges : [];
        var ratingOptions = filterOptions && filterOptions.ratingOptions ? filterOptions.ratingOptions : [];
        var shippingOptions = filterOptions && filterOptions.shippingOptions ? filterOptions.shippingOptions : [];
        var colors = filterOptions && filterOptions.colors ? filterOptions.colors : [];
        var themeTags = filterOptions && filterOptions.themeTags ? filterOptions.themeTags : [];
        var materials = filterOptions && filterOptions.materials ? filterOptions.materials : [];
        var piecesIncludedRanges = filterOptions && filterOptions.piecesIncludedRanges ? filterOptions.piecesIncludedRanges : [];
        var balloonTypes = filterOptions && filterOptions.balloonTypes ? filterOptions.balloonTypes : [];

        var selected = {};
        selected.minPrice = rawParams.get('minPrice') || appliedFilters.minPrice;
        selected.maxPrice = rawParams.get('maxPrice') || appliedFilters.maxPrice;
        selected.minRating = rawParams.get('minRating') || appliedFilters.minRating;
        selected.freeShippingOnly = (rawParams.get('freeShippingOnly') || String(appliedFilters.freeShippingOnly)) === 'true';
        selected.color = rawParams.get('color') || appliedFilters.color || '';
        var themeTagsRaw = rawParams.get('themeTags');
        if (themeTagsRaw) {
            selected.themeTags = themeTagsRaw.split(',').filter(function (t) { return t; });
        } else if (appliedFilters.themeTags) {
            selected.themeTags = appliedFilters.themeTags;
        } else {
            selected.themeTags = [];
        }
        selected.material = rawParams.get('material') || appliedFilters.material || '';
        selected.minPiecesIncluded = rawParams.get('minPiecesIncluded') || appliedFilters.minPiecesIncluded;
        selected.minGuestCount = rawParams.get('minGuestCount') || appliedFilters.minGuestCount;
        selected.maxGuestCount = rawParams.get('maxGuestCount') || appliedFilters.maxGuestCount;
        selected.isKit = (rawParams.get('isKit') || String(appliedFilters.isKit)) === 'true';

    function renderEmptySearchState() {
        var summaryEl = document.querySelector('[data-populate="results-summary"]');
        if (summaryEl) {
            renderResultsSummary(summaryEl, '', 0, 1, 24);
        }
        var activeFiltersEl = document.querySelector('[data-populate="active-filter-summary"]');
        if (activeFiltersEl) {
            activeFiltersEl.innerHTML = '';
        }
        var gridEl = document.querySelector('[data-populate="product-grid"]');
        if (gridEl) {
            gridEl.innerHTML = '';
        }
        var paginationEl = document.querySelector('[data-populate="pagination-controls"]');
        if (paginationEl) {
            paginationEl.innerHTML = '';
        }
        var sortBar = document.querySelector('[data-component="sort-and-page-size-bar"]');
        if (sortBar) {
            renderSortBar(sortBar, 'relevance', 24, 0);
        }
        var noResultsEl = document.querySelector('[data-populate="no-results"]');
        if (noResultsEl) {

    function buildFiltersUrlFromForm() {
        var form = document.querySelector('[data-component="filter-sidebar"]');
        if (!form) {
            return;
        }
        var currentParams = new URLSearchParams(window.location.search);
        var query = currentParams.get('query') || '';
        var sort = currentParams.get('sort');
        var pageSize = currentParams.get('pageSize');

        var newParams = new URLSearchParams();
        if (query) {
            newParams.set('query', query);
        }
        if (sort) {
            newParams.set('sort', sort);
        }
        if (pageSize) {
            newParams.set('pageSize', pageSize);
        }

        var priceRangeInput = form.querySelector('input[name="priceRange"]:checked');
        var minPrice = '';
        var maxPrice = '';
        if (priceRangeInput) {
            if (priceRangeInput.dataset.min) {
                minPrice = priceRangeInput.dataset.min;
            }
            if (priceRangeInput.dataset.max) {
                maxPrice = priceRangeInput.dataset.max;
            }
        }
        var customMinInput = form.querySelector('input[name="minPrice"]');
        var customMaxInput = form.querySelector('input[name="maxPrice"]');
        if (customMinInput && customMinInput.value) {
            minPrice = customMinInput.value;
        }
        if (customMaxInput && customMaxInput.value) {
            maxPrice = customMaxInput.value;
        }
        if (minPrice) {
            newParams.set('minPrice', minPrice);
        }
        if (maxPrice) {
            newParams.set('maxPrice', maxPrice);
        }

        var ratingInput = form.querySelector('input[name="minRating"]:checked');
        if (ratingInput && ratingInput.value) {
            newParams.set('minRating', ratingInput.value);
        }

        var freeShippingInput = form.querySelector('input[name="freeShippingOnly"]');
        if (freeShippingInput && freeShippingInput.checked) {
            newParams.set('freeShippingOnly', 'true');
        }

        var colorSelect = form.querySelector('select[name="color"]');
        if (colorSelect && colorSelect.value) {
            newParams.set('color', colorSelect.value);
        }

        var themeChecks = form.querySelectorAll('input[name="themeTags"]:checked');
        var tags = [];
        themeChecks.forEach(function (input) {
            if (input.value) {
                tags.push(input.value);
            }
        });
        if (tags.length) {
            newParams.set('themeTags', tags.join(','));
        }

        var materialSelect = form.querySelector('select[name="material"]');
        if (materialSelect && materialSelect.value) {
            newParams.set('material', materialSelect.value);
        }

        var piecesRangeInput = form.querySelector('input[name="piecesRange"]:checked');
        var minPieces = '';
        if (piecesRangeInput && piecesRangeInput.dataset.min) {
            minPieces = piecesRangeInput.dataset.min;
        }
        var minPiecesInput = form.querySelector('input[name="minPiecesIncluded"]');
        if (minPiecesInput && minPiecesInput.value) {
            minPieces = minPiecesInput.value;
        }
        if (minPieces) {
            newParams.set('minPiecesIncluded', minPieces);
        }

        var minGuestsInput = form.querySelector('input[name="minGuestCount"]');
        var maxGuestsInput = form.querySelector('input[name="maxGuestCount"]');
        if (minGuestsInput && minGuestsInput.value) {
            newParams.set('minGuestCount', minGuestsInput.value);
        }
        if (maxGuestsInput && maxGuestsInput.value) {
            newParams.set('maxGuestCount', maxGuestsInput.value);
        }

        var isKitInput = form.querySelector('input[name="isKit"]');
        if (isKitInput && isKitInput.checked) {
            newParams.set('isKit', 'true');
        }

        var kitTypeSelect = form.querySelector('select[name="kitType"]');
        if (kitTypeSelect && kitTypeSelect.value) {
            newParams.set('kitType', kitTypeSelect.value);
        }

        var balloonTypeSelect = form.querySelector('select[name="balloonType"]');
        if (balloonTypeSelect && balloonTypeSelect.value) {
            newParams.set('balloonType', balloonTypeSelect.value);
        }

        newParams.set('page', '1');

        var url = 'search.html';
        var qs = newParams.toString();
        if (qs) {
            url += '?' + qs;
        }
        window.location.href = url;
    }

    function handleSortChange(selectEl) {
        var params = new URLSearchParams(window.location.search);
        var newParams = new URLSearchParams();
        params.forEach(function (value, key) {
            if (key === 'sort' || key === 'page') {
                return;
            }
            newParams.set(key, value);
        });
        if (selectEl.value) {
            newParams.set('sort', selectEl.value);
        }
        newParams.set('page', '1');
        var url = 'search.html?' + newParams.toString();
        window.location.href = url;
    }

    function handlePageSizeChange(selectEl) {
        var params = new URLSearchParams(window.location.search);
        params.set('pageSize', selectEl.value || '24');
        params.set('page', '1');
        var url = 'search.html?' + params.toString();
        window.location.href = url;
    }

    function handlePageChange(page) {
        var pageNum = Number(page);
        if (!pageNum || pageNum < 1) {
            return;
        }
        var params = new URLSearchParams(window.location.search);
        params.set('page', String(pageNum));
        var url = 'search.html?' + params.toString();
        window.location.href = url;
    }

    function handleClearFilters() {
        var params = new URLSearchParams(window.location.search);
        var query = params.get('query') || '';
        var sort = params.get('sort');
        var pageSize = params.get('pageSize');
        var newParams = new URLSearchParams();
        if (query) {
            newParams.set('query', query);
        }
        if (sort) {
            newParams.set('sort', sort);
        }
        if (pageSize) {
            newParams.set('pageSize', pageSize);
        }
        newParams.set('page', '1');
        var url = 'search.html';
        var qs = newParams.toString();
        if (qs) {
            url += '?' + qs;
        }
        window.location.href = url;
    }

    function handleRemoveFilterChip(buttonEl) {
        var key = buttonEl.dataset.filterKey;
        var value = buttonEl.dataset.filterValue || null;
        if (!key) {
            return;
        }
        var params = new URLSearchParams(window.location.search);
        if (key === 'themeTags' && value) {
            var raw = params.get('themeTags');
            if (raw) {
                var tags = raw.split(',').filter(function (t) { return t && t !== value; });
                if (tags.length) {
                    params.set('themeTags', tags.join(','));
                } else {
                    params.delete('themeTags');
                }
            }
        } else {
            params.delete(key);
        }
        params.set('page', '1');
        var url = 'search.html?' + params.toString();
        window.location.href = url;
    }

    function handleViewProduct(buttonEl) {
        var productId = buttonEl.dataset.productId;
        if (!productId) {
            return;
        }
        window.location.href = 'product.html?id=' + encodeURIComponent(productId);
    }

    function updateHeaderCartFromSummary(cartSummary) {
        if (!cartSummary) {
            return;
        }
        var cartMeta = document.querySelector('.cart-summary__meta');
        var cartLabel = document.querySelector('.cart-summary__label');
        if (cartMeta) {
            cartMeta.textContent = '(' + (cartSummary.itemCount || 0) + ') Total items';
        }
        if (cartLabel) {
            var currency = cartSummary.currency || 'USD';
            var subtotal = typeof cartSummary.subtotal === 'number' ? cartSummary.subtotal : 0;
            cartLabel.textContent = 'Cart subtotal: ' + currency + ' ' + subtotal.toFixed(2);
        }
    }

    function updateHeaderWishlistCount(count) {
        var wishlistEls = document.querySelectorAll('[data-populate="wishlist-count"]');
        wishlistEls.forEach(function (el) {
            el.textContent = '(' + (count || 0) + ')';
        });
    }

    function handleAddToCart(buttonEl) {
        var productId = buttonEl.dataset.productId;
        if (!productId) {
            return;
        }
        var originalText = buttonEl.textContent;
        buttonEl.disabled = true;
        buttonEl.textContent = 'Adding...';
        var response = null;
        try {
            response = WebsiteSDK.addToCart(productId, 1);
        } catch (error) {
            console.error('addToCart failed', error);
        }
        buttonEl.disabled = false;
        if (response && response.success) {
            if (response.cartSummary) {
                updateHeaderCartFromSummary(response.cartSummary);
            }
            buttonEl.textContent = 'Added';
            setTimeout(function () {
                buttonEl.textContent = originalText;
            }, 1500);
        } else {
            buttonEl.textContent = 'Error';
            setTimeout(function () {
                buttonEl.textContent = originalText;
            }, 1500);
        }
    }

    function handleToggleWishlist(buttonEl) {
        var productId = buttonEl.dataset.productId;
        if (!productId) {
            return;
        }
        var response = null;
        try {
            response = WebsiteSDK.addProductToWishlist(productId);
        } catch (error) {
            console.error('addProductToWishlist failed', error);
        }
        if (response && typeof response.wishlistItemCount === 'number') {
            updateHeaderWishlistCount(response.wishlistItemCount);
        }
        buttonEl.classList.toggle('product-card__wishlist-btn--active');
    }

    function setupHeaderSearchForm() {
        var form = document.querySelector('.search-form');
        if (!form) {
            return;
        }
        form.addEventListener('submit', function (event) {
            event.preventDefault();
            var input = form.querySelector('.search-form__input');
            var value = input && input.value ? input.value.trim() : '';
            var params = new URLSearchParams();
            if (value) {
                params.set('query', value);
            }
            params.set('page', '1');
            var url = 'search.html';
            var qs = params.toString();
            if (qs) {
                url += '?' + qs;
            }
            window.location.href = url;
        });
    }

    function setupGlobalEventDelegation() {
        document.addEventListener('change', function (event) {
            var actionEl = event.target.closest('[data-action]');
            if (!actionEl) {
                return;
            }
            var action = actionEl.dataset.action;
            if (action === 'update-filters') {
                buildFiltersUrlFromForm();
            } else if (action === 'change-sort') {
                handleSortChange(actionEl);
            } else if (action === 'change-page-size') {
                handlePageSizeChange(actionEl);
            }
        });

        document.addEventListener('click', function (event) {
            var actionEl = event.target.closest('[data-action]');
            if (!actionEl) {
                return;
            }
            var action = actionEl.dataset.action;
            if (action === 'change-page') {
                var page = actionEl.dataset.page;
                handlePageChange(page);
            } else if (action === 'clear-filters') {
                handleClearFilters();
            } else if (action === 'remove-filter-chip') {
                handleRemoveFilterChip(actionEl);
            } else if (action === 'view-product') {
                handleViewProduct(actionEl);
            } else if (action === 'add-to-cart') {
                handleAddToCart(actionEl);
            } else if (action === 'toggle-wishlist') {
                handleToggleWishlist(actionEl);
            }
        });
    }

    function initSearchPage() {
        var headerStatus = safeCall(function () { return WebsiteSDK.getHeaderStatus(); });
        if (headerStatus) {
            renderHeaderStatus(headerStatus);
        }

        var navCategories = safeCall(function () { return WebsiteSDK.getMainCategoriesForNav(); });
        var navContainer = document.querySelector('[data-populate="main-categories"]');
        if (navContainer && navCategories) {
            renderMainCategories(navContainer, navCategories);
        }

        setupHeaderSearchForm();
        setupGlobalEventDelegation();

        var state = getUrlState();
        var query = state.query;
        var filters = state.filters;
        var sort = state.sort;
        var page = state.page;
        var pageSize = state.pageSize;
        var rawParams = state.rawParams;

        var headerSearchInput = document.getElementById('site-search');
        if (headerSearchInput) {
            headerSearchInput.value = query;
        }

        if (!query) {
            renderEmptySearchState();
            return;
        }

        var filterOptions = safeCall(function () { return WebsiteSDK.getSearchFilterOptions(query); });
        var searchResult = safeCall(function () { return WebsiteSDK.searchProducts(query, filters, sort, page, pageSize); });

        var appliedFilters = searchResult && searchResult.appliedFilters ? searchResult.appliedFilters : {};

        var sidebarForm = document.querySelector('[data-populate="filter-sidebar"]');
        if (sidebarForm && filterOptions) {
            renderFilterSidebar(sidebarForm, filterOptions, appliedFilters, rawParams);
        }

        var total = searchResult && typeof searchResult.total === 'number' ? searchResult.total : 0;
        var effectivePage = searchResult && typeof searchResult.page === 'number' ? searchResult.page : page;
        var effectivePageSize = searchResult && typeof searchResult.pageSize === 'number' ? searchResult.pageSize : pageSize;

        var summaryEl = document.querySelector('[data-populate="results-summary"]');
        if (summaryEl) {
            renderResultsSummary(summaryEl, query, total, effectivePage, effectivePageSize);
        }

        var activeFiltersEl = document.querySelector('[data-populate="active-filter-summary"]');
        if (activeFiltersEl) {
            renderActiveFilterSummary(activeFiltersEl, query, appliedFilters);
        }

        var sortBar = document.querySelector('[data-component="sort-and-page-size-bar"]');
        if (sortBar) {
            renderSortBar(sortBar, sort, effectivePageSize, total);
        }

        var gridEl = document.querySelector('[data-populate="product-grid"]');
        var noResultsEl = document.querySelector('[data-populate="no-results"]');
        if (!searchResult || !total) {
            if (gridEl) {
                gridEl.innerHTML = '';
            }
            if (noResultsEl) {
                renderNoResults(noResultsEl, query);
                noResultsEl.hidden = false;
            }
        } else {
            if (gridEl) {
                renderProductGrid(gridEl, searchResult.products || []);
            }
            if (noResultsEl) {
                noResultsEl.hidden = true;
                noResultsEl.innerHTML = '';
            }
        }

        var paginationEl = document.querySelector('[data-populate="pagination-controls"]');
        if (paginationEl) {
            if (searchResult && total > effectivePageSize) {
                renderPagination(paginationEl, total, effectivePage, effectivePageSize);
            } else {
                paginationEl.innerHTML = '';
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        initSearchPage();
    });
    </script>
</body>
</html>
