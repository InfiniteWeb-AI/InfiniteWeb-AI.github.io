<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Mind Body Wizard &ndash; Life Coaching & Emotional Wellness</title>
    <!-- Typography -->
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='framework.css'>
    <link rel='stylesheet' href='groups.css'>
    <script src='business_logic.js'></script>
</head>
<body>
    <header class='site-header'>
        <div class='header-inner'>
            <a href='index.html' class='brand'>
                <div class='brand-mark' aria-hidden='true'>
                    <!-- Persistent wizard-style logo placeholder; replace src with real asset -->
                    <img src='logo-placeholder.svg' alt='' class='brand-logo'>
                </div>
                <div class='brand-text'>
                    <span class='brand-title'>Mind Body Wizard</span>
                    <span class='brand-tagline'>Making the magic happen in your emotional wellness.</span>
                </div>
            </a>

            <nav class='primary-nav' aria-label='Main navigation'>
                <ul class='nav-list'>
                    <li class='nav-item'><a href='index.html' class='nav-link'>Home</a></li>
                    <li class='nav-item'><a href='coaches.html' class='nav-link'>Find a Coach</a></li>
                    <li class='nav-item'><a href='courses.html' class='nav-link'>Courses</a></li>
                    <li class='nav-item'><a href='planner.html' class='nav-link'>Planner</a></li>
                    <li class='nav-item'><a href='assessments.html' class='nav-link'>Assessments</a></li>
                    <li class='nav-item'><a href='articles.html' class='nav-link'>Articles</a></li>
                    <li class='nav-item'><a href='groups.html' class='nav-link'>Groups</a></li>
                    <li class='nav-item'><a href='meditations.html' class='nav-link'>Meditations</a></li>
                    <li class='nav-item'><a href='challenges.html' class='nav-link'>Challenges</a></li>
                </ul>
            </nav>

            <!-- Non-interactive visual search icon to mirror the design (no associated page link provided) -->
            <span class='search-icon' aria-hidden='true'>&#128269;</span>
        </div>
    </header>

    <main id='content' class='site-main' role='main'>
        <div class='groups-page'>
            <div class='groups-page-inner'>
                <!-- Non-visual controller components -->
                <div data-component='groups-filters-initializer' hidden></div>
                <div data-component='groups-url-state-manager' hidden></div>
                <div data-component='groups-search-executor' hidden></div>

                <!-- Filter Bar -->
                <section class='groups-filter-bar' data-component='groups-filter-bar' aria-label='Filter support groups'>
                    <form class='groups-filter-form' data-action='filters-form'>
                        <div class='filter-row'>
                            <div class='form-group filter-field'>
                                <label for='focusTagSelect'>Focus</label>
                                <select id='focusTagSelect' name='focus_tag' data-populate='focus-tags'>
                                    <option value=''>Any focus</option>
                                </select>
                            </div>

                            <div class='form-group filter-field'>
                                <label for='languageSelect'>Language</label>
                                <select id='languageSelect' name='language' data-populate='languages'>
                                    <option value=''>Any language</option>
                                </select>
                            </div>

                            <div class='form-group filter-field'>
                                <label for='groupSizeSelect'>Group size</label>
                                <select id='groupSizeSelect' name='group_size_range' data-populate='group-size-ranges'>
                                    <option value=''>Any size</option>
                                </select>
                            </div>
                        </div>

                        <div class='filter-row'>
                            <div class='form-group filter-field'>
                                <label for='meetingDaySelect'>Meeting days</label>
                                <select id='meetingDaySelect' name='meeting_day_pattern'>
                                    <option value=''>Any schedule</option>
                                    <option value='weekdays'>Weekdays</option>
                                    <option value='weekends'>Weekends</option>
                                    <option value='varies'>Varies</option>
                                </select>
                            </div>

                            <div class='form-group filter-field'>
                                <label for='meetingPresetSelect'>Meeting time preset</label>
                                <select id='meetingPresetSelect' name='meeting_time_preset' data-populate='meeting-time-presets'>
                                    <option value=''>Any time</option>
                                </select>
                            </div>

                            <div class='form-group filter-field filter-field--time-range'>
                                <label>Time window</label>
                                <div class='time-range-inputs'>
                                    <input type='time' id='meetingTimeStartInput' name='meeting_time_start'>
                                    <span class='time-range-separator' aria-hidden='true'>&ndash;</span>
                                    <input type='time' id='meetingTimeEndInput' name='meeting_time_end'>
                                </div>
                            </div>

                            <div class='filter-actions'>
                                <button type='button' class='btn btn-outline' data-action='reset-filters'>Reset</button>
                                <button type='button' class='btn btn-primary' data-action='apply-filters'>Apply filters</button>
                            </div>
                        </div>
                    </form>
                </section>

                <!-- Results summary and helpers -->
                <section class='groups-results-header'>
                    <div class='groups-results-header-inner'>
                        <div class='groups-results-summary' data-component='groups-results-summary' aria-live='polite'>
                            <!-- Summary text will be injected -->
                        </div>
                        <div class='groups-filters-toolbar-helpers' data-component='groups-filters-toolbar-helpers'>
                            <div class='active-filters-chips' data-action='active-filters-container'>
                                <!-- Active filter chips will be injected -->
                            </div>
                            <div class='helpers-buttons'>
                                <button type='button' class='btn btn-ghost btn-small' data-action='clear-meeting-time-filters'>Clear time</button>
                                <button type='button' class='btn btn-ghost btn-small' data-action='reset-filters-secondary'>Clear all</button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Results list & async states -->
                <section class='groups-results-section'>
                    <div class='groups-empty-error' data-component='groups-empty-and-error-state' aria-live='polite'>
                        <!-- Loading / empty / error states injected here -->
                    </div>

                    <div class='groups-results-list' data-component='groups-results-list' data-populate='groups-search-results' aria-live='polite'>
                        <!-- Group cards injected here -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class='site-footer'>
        <div class='footer-inner'>
            <div class='footer-links' aria-label='Footer navigation'>
                <a href='about.html#about' class='footer-link'>About</a>
                <a href='about.html#contact' class='footer-link'>Contact</a>
                <a href='about.html#help' class='footer-link'>Help &amp; FAQ</a>
                <a href='about.html#terms' class='footer-link'>Terms of Use</a>
                <a href='about.html#privacy' class='footer-link'>Privacy Policy</a>
            </div>
            <div class='footer-meta'>
                <p class='footer-copy'>&copy; 2024 Mind Body Wizard. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
    (function() {
        let filterOptions = {
            focus_tags: [],
            languages: [],
            group_size_ranges: [],
            meeting_time_presets: []
        };

        let filterState = {
            focus_tag: null,
            language: null,
            min_members: null,
            max_members: null,
            meeting_day_pattern: null,
            meeting_time_start: null,
            meeting_time_end: null
        };

        let lastSearchResult = {
            results: [],
            total_count: 0
        };

        let isLoading = false;
        let lastError = null;

        // DOM references
        let focusTagSelect;
        let languageSelect;
        let groupSizeSelect;
        let meetingDaySelect;
        let meetingPresetSelect;
        let timeStartInput;
        let timeEndInput;
        let resultsListContainer;
        let emptyErrorContainer;
        let summaryContainer;
        let activeFiltersContainer;

        function parseFilterStateFromUrl() {
            const params = new URLSearchParams(window.location.search);

            const state = {
                focus_tag: params.get('focus_tag') || null,
                language: params.get('language') || null,
                min_members: null,
                max_members: null,
                meeting_day_pattern: params.get('meeting_day_pattern') || null,
                meeting_time_start: params.get('meeting_time_start') || null,
                meeting_time_end: params.get('meeting_time_end') || null
            };

            const min = params.get('min_members');
            const max = params.get('max_members');
            const minNum = min !== null && min !== '' ? parseInt(min, 10) : NaN;
            const maxNum = max !== null && max !== '' ? parseInt(max, 10) : NaN;

            state.min_members = isNaN(minNum) ? null : minNum;
            state.max_members = isNaN(maxNum) ? null : maxNum;

            return state;
        }

        function updateUrlFromFilterState() {
            const url = new URL(window.location.href);
            const params = url.searchParams;

            const keys = [
                'focus_tag',
                'language',
                'min_members',
                'max_members',
                'meeting_day_pattern',
                'meeting_time_start',
                'meeting_time_end'
            ];
            keys.forEach(function(key) { params.delete(key); });

            if (filterState.focus_tag) {
                params.set('focus_tag', filterState.focus_tag);
            }
            if (filterState.language) {
                params.set('language', filterState.language);
            }
            if (filterState.min_members !== null && !isNaN(filterState.min_members)) {
                params.set('min_members', String(filterState.min_members));
            }
            if (filterState.max_members !== null && !isNaN(filterState.max_members)) {
                params.set('max_members', String(filterState.max_members));
            }
            if (filterState.meeting_day_pattern) {
                params.set('meeting_day_pattern', filterState.meeting_day_pattern);
            }
            if (filterState.meeting_time_start) {
                params.set('meeting_time_start', filterState.meeting_time_start);
            }
            if (filterState.meeting_time_end) {
                params.set('meeting_time_end', filterState.meeting_time_end);
            }

            const newSearch = params.toString();
            const newUrl = url.pathname + (newSearch ? '?' + newSearch : '') + url.hash;
            window.history.pushState({}, '', newUrl);
        }

        function buildMeetingTimeRangeFromState() {
            if (!filterState.meeting_time_start && !filterState.meeting_time_end) {
                return null;
            }
            return {
                start_time: filterState.meeting_time_start || '',
                end_time: filterState.meeting_time_end || ''
            };
        }

        // Helper label formatters
        function formatTagLabel(value) {
            if (!value) return '';
            const parts = value.split('_');
            for (let i = 0; i < parts.length; i += 1) {
                if (parts[i].length > 0) {
                    parts[i] = parts[i].charAt(0).toUpperCase() + parts[i].slice(1);
                }
            }
            return parts.join(' ');
        }

        function formatLanguageLabel(lang) {
            if (!lang) return '';
            const match = (filterOptions.languages || []).find(function(opt) { return opt.value === lang; });
            if (match && match.label) return match.label;
            return formatTagLabel(lang);
        }

        function formatDayPatternLabel(pattern) {
            if (!pattern) return '';
            if (pattern === 'weekdays') return 'Weekdays';
            if (pattern === 'weekends') return 'Weekends';
            if (pattern === 'varies') return 'Varies';
            return formatTagLabel(pattern);
        }

        function formatTimeRange(start, end) {
            if (!start && !end) return '';
            if (start && end) return start + '–' + end;
            if (start) return 'From ' + start;
            return 'Until ' + end;
        }

        // Renderers that use the passed container directly
        function renderFocusTagsSelect(container, options, selectedValue) {
            container.innerHTML = '';
            const anyOption = document.createElement('option');
            anyOption.value = '';
            anyOption.textContent = 'Any focus';
            container.appendChild(anyOption);

            options.forEach(function(opt) {
                const option = document.createElement('option');
                option.value = opt.value;
                option.textContent = opt.label || formatTagLabel(opt.value);
                container.appendChild(option);
            });

            container.value = selectedValue || '';
        }

        function renderLanguagesSelect(container, options, selectedValue) {
            container.innerHTML = '';
            const anyOption = document.createElement('option');
            anyOption.value = '';
            anyOption.textContent = 'Any language';
            container.appendChild(anyOption);

            options.forEach(function(opt) {
                const option = document.createElement('option');
                option.value = opt.value;
                option.textContent = opt.label || formatTagLabel(opt.value);
                container.appendChild(option);
            });

            container.value = selectedValue || '';
        }

        function renderGroupSizeRangesSelect(container, ranges, state) {
            container.innerHTML = '';
            const anyOption = document.createElement('option');
            anyOption.value = '';
            anyOption.textContent = 'Any size';
            container.appendChild(anyOption);

            let selectedValue = '';

            ranges.forEach(function(range, index) {
                const option = document.createElement('option');
                option.value = String(index);
                option.textContent = range.label || '';
                if (typeof range.min_members === 'number') {
                    option.dataset.minMembers = String(range.min_members);
                }
                if (typeof range.max_members === 'number') {
                    option.dataset.maxMembers = String(range.max_members);
                }

                if (state.min_members !== null && state.max_members !== null &&
                    range.min_members === state.min_members && range.max_members === state.max_members) {
                    selectedValue = option.value;
                }

                container.appendChild(option);
            });

            container.value = selectedValue;
        }

        function renderMeetingTimePresetsSelect(container, presets, state) {
            container.innerHTML = '';
            const anyOption = document.createElement('option');
            anyOption.value = '';
            anyOption.textContent = 'Any time';
            container.appendChild(anyOption);

            let selectedValue = '';

            presets.forEach(function(preset, index) {
                const option = document.createElement('option');
                option.value = String(index);
                option.textContent = preset.label || '';
                option.dataset.dayPattern = preset.day_pattern || '';
                option.dataset.startTime = preset.start_time || '';
                option.dataset.endTime = preset.end_time || '';

                if (state.meeting_day_pattern && state.meeting_time_start && state.meeting_time_end) {
                    if (preset.day_pattern === state.meeting_day_pattern &&
                        preset.start_time === state.meeting_time_start &&
                        preset.end_time === state.meeting_time_end) {
                        selectedValue = option.value;
                    }
                }

                container.appendChild(option);
            });

            container.value = selectedValue;
        }

        function renderResultsList(container, results) {
            container.innerHTML = '';

            results.forEach(function(group) {
                const card = document.createElement('article');
                card.className = 'group-card card';
                card.dataset.component = 'group-card';
                card.dataset.action = 'open-group-detail';
                card.dataset.groupId = group.group_id;
                card.tabIndex = 0;

                const header = document.createElement('div');
                header.className = 'group-card-header';

                const title = document.createElement('h3');
                title.className = 'group-card-title';
                title.textContent = group.name || '';
                header.appendChild(title);

                const status = document.createElement('span');
                status.className = 'group-card-badge ' + (group.is_open ? 'group-card-badge--open' : 'group-card-badge--closed');
                status.textContent = group.is_open ? 'Open to new members' : 'Currently full';
                header.appendChild(status);

                card.appendChild(header);

                if (group.description) {
                    const desc = document.createElement('p');
                    desc.className = 'group-card-description';
                    desc.textContent = group.description;
                    card.appendChild(desc);
                }

                const meta = document.createElement('div');
                meta.className = 'group-card-meta';

                const tagsRow = document.createElement('div');
                tagsRow.className = 'group-card-tags';

                if (Array.isArray(group.focus_tags) && group.focus_tags.length > 0) {
                    group.focus_tags.forEach(function(tag) {
                        const chip = document.createElement('span');
                        chip.className = 'tag-chip';
                        chip.textContent = formatTagLabel(tag);
                        tagsRow.appendChild(chip);
                    });
                }

                const langChip = document.createElement('span');
                langChip.className = 'tag-chip tag-chip--language';
                langChip.textContent = formatLanguageLabel(group.language || '') || 'Language not set';
                tagsRow.appendChild(langChip);

                meta.appendChild(tagsRow);

                const infoRow = document.createElement('div');
                infoRow.className = 'group-card-info-row';

                const sizeInfo = document.createElement('div');
                sizeInfo.className = 'group-card-info';
                sizeInfo.textContent = (typeof group.member_count === 'number' ? group.member_count + ' members' : 'Size not listed');
                infoRow.appendChild(sizeInfo);

                const scheduleInfo = document.createElement('div');
                scheduleInfo.className = 'group-card-info';
                const scheduleParts = [];
                if (group.meeting_day_pattern) {
                    scheduleParts.push(formatDayPatternLabel(group.meeting_day_pattern));
                }
                if (group.meeting_time_start || group.meeting_time_end) {
                    scheduleParts.push(formatTimeRange(group.meeting_time_start || '', group.meeting_time_end || ''));
                }
                scheduleInfo.textContent = scheduleParts.length > 0 ? scheduleParts.join(' b7 ') : 'Schedule varies';
                infoRow.appendChild(scheduleInfo);

                meta.appendChild(infoRow);
                card.appendChild(meta);

                const footer = document.createElement('div');
                footer.className = 'group-card-footer';
                const cta = document.createElement('span');
                cta.className = 'group-card-cta';
                cta.textContent = 'View group details';
                footer.appendChild(cta);
                card.appendChild(footer);

                container.appendChild(card);
            });
        }

        function renderResultsSummary(container, totalCount) {
            const parts = [];
            if (filterState.focus_tag) {
                const match = (filterOptions.focus_tags || []).find(function(opt) { return opt.value === filterState.focus_tag; });
                const label = match && match.label ? match.label : formatTagLabel(filterState.focus_tag);
                parts.push('Focus: ' + label);
            }
            if (filterState.language) {
                parts.push('Language: ' + (formatLanguageLabel(filterState.language) || filterState.language));
            }
            if (filterState.min_members !== null && filterState.max_members !== null) {
                parts.push('Size: ' + filterState.min_members + 'a0–a0' + filterState.max_members + ' members');
            }
            if (filterState.meeting_day_pattern || filterState.meeting_time_start || filterState.meeting_time_end) {
                const schedulePieces = [];
                if (filterState.meeting_day_pattern) {
                    schedulePieces.push(formatDayPatternLabel(filterState.meeting_day_pattern));
                }
                if (filterState.meeting_time_start || filterState.meeting_time_end) {
                    schedulePieces.push(formatTimeRange(filterState.meeting_time_start || '', filterState.meeting_time_end || ''));
                }
                parts.push('Time: ' + schedulePieces.join(' b7 '));
            }

            const base = 'Showing ' + totalCount + ' group' + (totalCount === 1 ? '' : 's');
            const filtersText = parts.length > 0 ? ' b7 ' + parts.join(' b7 ') : '';

            container.textContent = base + filtersText;
        }

        function renderActiveFilterChips(container) {
            container.innerHTML = '';

            if (filterState.focus_tag) {
                const match = (filterOptions.focus_tags || []).find(function(opt) { return opt.value === filterState.focus_tag; });
                const label = match && match.label ? match.label : formatTagLabel(filterState.focus_tag);
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'filter-chip';
                chip.dataset.action = 'clear-single-filter';
                chip.dataset.filterKey = 'focus_tag';
                chip.textContent = label + ' d7';
                container.appendChild(chip);
            }

            if (filterState.language) {
                const label = formatLanguageLabel(filterState.language) || filterState.language;
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'filter-chip';
                chip.dataset.action = 'clear-single-filter';
                chip.dataset.filterKey = 'language';
                chip.textContent = label + ' d7';
                container.appendChild(chip);
            }

            if (filterState.min_members !== null && filterState.max_members !== null) {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'filter-chip';
                chip.dataset.action = 'clear-single-filter';
                chip.dataset.filterKey = 'group_size';
                chip.textContent = 'Size: ' + filterState.min_members + 'a0–a0' + filterState.max_members + ' d7';
                container.appendChild(chip);
            }

            if (filterState.meeting_day_pattern || filterState.meeting_time_start || filterState.meeting_time_end) {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'filter-chip';
                chip.dataset.action = 'clear-single-filter';
                chip.dataset.filterKey = 'meeting_time';
                const pieces = [];
                if (filterState.meeting_day_pattern) {
                    pieces.push(formatDayPatternLabel(filterState.meeting_day_pattern));
                }
                if (filterState.meeting_time_start || filterState.meeting_time_end) {
                    pieces.push(formatTimeRange(filterState.meeting_time_start || '', filterState.meeting_time_end || ''));
                }
                chip.textContent = pieces.join(' ') + ' d7';
                container.appendChild(chip);
            }
        }

        function renderAsyncState(container, totalCount) {
            if (isLoading) {
                container.style.display = 'block';
                container.innerHTML = '';
                const panel = document.createElement('div');
                panel.className = 'state-panel state-panel--loading';
                const text = document.createElement('p');
                text.textContent = 'Searching groups that fit your needshellip;';
                panel.appendChild(text);
                container.appendChild(panel);
                if (resultsListContainer) {
                    resultsListContainer.style.display = 'none';
                }
                return;
            }

            if (lastError) {
                container.style.display = 'block';
                container.innerHTML = '';
                const panel = document.createElement('div');
                panel.className = 'state-panel state-panel--error';
                const heading = document.createElement('h2');
                heading.textContent = 'We could not load groups just now.';
                const message = document.createElement('p');
                message.textContent = 'Please check your connection or try again in a moment.';
                const retry = document.createElement('button');
                retry.type = 'button';
                retry.className = 'btn btn-primary';
                retry.dataset.action = 'retry-search';
                retry.textContent = 'Retry search';
                panel.appendChild(heading);
                panel.appendChild(message);
                panel.appendChild(retry);
                container.appendChild(panel);
                if (resultsListContainer) {
                    resultsListContainer.style.display = 'none';
                }
                return;
            }

            if (typeof totalCount === 'number' && totalCount === 0) {
                container.style.display = 'block';
                container.innerHTML = '';
                const panel = document.createElement('div');
                panel.className = 'state-panel state-panel--empty';
                const heading = document.createElement('h2');
                heading.textContent = 'No groups match these filters yet.';
                const message = document.createElement('p');
                message.textContent = 'Try widening your focus, choosing another language, or clearing the meeting time filters.';
                panel.appendChild(heading);
                panel.appendChild(message);
                container.appendChild(panel);
                if (resultsListContainer) {
                    resultsListContainer.style.display = 'none';
                }
                return;
            }

            container.style.display = 'none';
            container.innerHTML = '';
            if (resultsListContainer) {
                resultsListContainer.style.display = 'block';
            }
        }

        function syncControlsFromState() {
            if (focusTagSelect) {
                focusTagSelect.value = filterState.focus_tag || '';
            }
            if (languageSelect) {
                languageSelect.value = filterState.language || '';
            }
            if (meetingDaySelect) {
                meetingDaySelect.value = filterState.meeting_day_pattern || '';
            }
            if (timeStartInput) {
                timeStartInput.value = filterState.meeting_time_start || '';
            }
            if (timeEndInput) {
                timeEndInput.value = filterState.meeting_time_end || '';
            }

            if (groupSizeSelect) {
                renderGroupSizeRangesSelect(groupSizeSelect, filterOptions.group_size_ranges || [], filterState);
            }
            if (meetingPresetSelect) {
                renderMeetingTimePresetsSelect(meetingPresetSelect, filterOptions.meeting_time_presets || [], filterState);
            }
        }

        function syncStateFromControls() {
            if (focusTagSelect) {
                filterState.focus_tag = focusTagSelect.value || null;
            }
            if (languageSelect) {
                filterState.language = languageSelect.value || null;
            }
            if (meetingDaySelect) {
                filterState.meeting_day_pattern = meetingDaySelect.value || null;
            }
            if (groupSizeSelect) {
                const value = groupSizeSelect.value;
                if (!value) {
                    filterState.min_members = null;
                    filterState.max_members = null;
                } else {
                    const opt = groupSizeSelect.options[groupSizeSelect.selectedIndex];
                    const minStr = opt.dataset.minMembers;
                    const maxStr = opt.dataset.maxMembers;
                    filterState.min_members = typeof minStr === 'string' && minStr !== '' ? parseInt(minStr, 10) : null;
                    filterState.max_members = typeof maxStr === 'string' && maxStr !== '' ? parseInt(maxStr, 10) : null;
                }
            }
            if (timeStartInput) {
                filterState.meeting_time_start = timeStartInput.value || null;
            }
            if (timeEndInput) {
                filterState.meeting_time_end = timeEndInput.value || null;
            }
        }

        function executeSearch() {
            isLoading = true;
            lastError = null;
            if (emptyErrorContainer) {
                renderAsyncState(emptyErrorContainer, 0);
            }

            const meetingRange = buildMeetingTimeRangeFromState();

            try {
                const result = WebsiteSDK.searchGroups(
                    filterState.focus_tag || null,
                    filterState.language || null,
                    filterState.min_members !== null ? filterState.min_members : null,
                    filterState.max_members !== null ? filterState.max_members : null,
                    filterState.meeting_day_pattern || null,
                    meetingRange
                );

                lastSearchResult = {
                    results: Array.isArray(result.results) ? result.results : [],
                    total_count: typeof result.total_count === 'number' ? result.total_count : 0
                };

                isLoading = false;
                lastError = null;

                if (resultsListContainer) {
                    renderResultsList(resultsListContainer, lastSearchResult.results);
                }
                if (summaryContainer) {
                    renderResultsSummary(summaryContainer, lastSearchResult.total_count);
                }
                if (activeFiltersContainer) {
                    renderActiveFilterChips(activeFiltersContainer);
                }
                if (emptyErrorContainer) {
                    renderAsyncState(emptyErrorContainer, lastSearchResult.total_count);
                }
            } catch (e) {
                isLoading = false;
                lastError = e;
                if (emptyErrorContainer) {
                    renderAsyncState(emptyErrorContainer, 0);
                }
                if (window.console && console.error) {
                    console.error('searchGroups failed', e);
                }
            }
        }

        function applyFiltersAndSearch() {
            syncStateFromControls();
            updateUrlFromFilterState();
            executeSearch();
        }

        function resetAllFilters() {
            filterState.focus_tag = null;
            filterState.language = null;
            filterState.min_members = null;
            filterState.max_members = null;
            filterState.meeting_day_pattern = null;
            filterState.meeting_time_start = null;
            filterState.meeting_time_end = null;

            if (focusTagSelect) focusTagSelect.value = '';
            if (languageSelect) languageSelect.value = '';
            if (groupSizeSelect) groupSizeSelect.value = '';
            if (meetingDaySelect) meetingDaySelect.value = '';
            if (meetingPresetSelect) meetingPresetSelect.value = '';
            if (timeStartInput) timeStartInput.value = '';
            if (timeEndInput) timeEndInput.value = '';

            updateUrlFromFilterState();
            executeSearch();
        }

        function clearMeetingTimeFilters() {
            filterState.meeting_day_pattern = null;
            filterState.meeting_time_start = null;
            filterState.meeting_time_end = null;

            if (meetingDaySelect) meetingDaySelect.value = '';
            if (meetingPresetSelect) meetingPresetSelect.value = '';
            if (timeStartInput) timeStartInput.value = '';
            if (timeEndInput) timeEndInput.value = '';

            updateUrlFromFilterState();
            executeSearch();
        }

        function clearSingleFilter(key) {
            if (key === 'focus_tag') {
                filterState.focus_tag = null;
                if (focusTagSelect) focusTagSelect.value = '';
            } else if (key === 'language') {
                filterState.language = null;
                if (languageSelect) languageSelect.value = '';
            } else if (key === 'group_size') {
                filterState.min_members = null;
                filterState.max_members = null;
                if (groupSizeSelect) groupSizeSelect.value = '';
            } else if (key === 'meeting_time') {
                filterState.meeting_day_pattern = null;
                filterState.meeting_time_start = null;
                filterState.meeting_time_end = null;
                if (meetingDaySelect) meetingDaySelect.value = '';
                if (meetingPresetSelect) meetingPresetSelect.value = '';
                if (timeStartInput) timeStartInput.value = '';
                if (timeEndInput) timeEndInput.value = '';
            }

            updateUrlFromFilterState();
            executeSearch();
        }

        function initEventHandlers() {
            if (focusTagSelect) {
                focusTagSelect.addEventListener('change', function() {
                    filterState.focus_tag = focusTagSelect.value || null;
                });
            }
            if (languageSelect) {
                languageSelect.addEventListener('change', function() {
                    filterState.language = languageSelect.value || null;
                });
            }
            if (groupSizeSelect) {
                groupSizeSelect.addEventListener('change', function() {
                    const value = groupSizeSelect.value;
                    if (!value) {
                        filterState.min_members = null;
                        filterState.max_members = null;
                    } else {
                        const opt = groupSizeSelect.options[groupSizeSelect.selectedIndex];
                        const minStr = opt.dataset.minMembers;
                        const maxStr = opt.dataset.maxMembers;
                        filterState.min_members = typeof minStr === 'string' && minStr !== '' ? parseInt(minStr, 10) : null;
                        filterState.max_members = typeof maxStr === 'string' && maxStr !== '' ? parseInt(maxStr, 10) : null;
                    }
                });
            }
            if (meetingDaySelect) {
                meetingDaySelect.addEventListener('change', function() {
                    filterState.meeting_day_pattern = meetingDaySelect.value || null;
                    if (meetingPresetSelect) {
                        meetingPresetSelect.value = '';
                    }
                });
            }
            if (meetingPresetSelect) {
                meetingPresetSelect.addEventListener('change', function() {
                    const value = meetingPresetSelect.value;
                    if (!value) {
                        return;
                    }
                    const opt = meetingPresetSelect.options[meetingPresetSelect.selectedIndex];
                    const dayPattern = opt.dataset.dayPattern || '';
                    const startTime = opt.dataset.startTime || '';
                    const endTime = opt.dataset.endTime || '';

                    filterState.meeting_day_pattern = dayPattern || null;
                    filterState.meeting_time_start = startTime || null;
                    filterState.meeting_time_end = endTime || null;

                    if (meetingDaySelect) {
                        meetingDaySelect.value = dayPattern || '';
                    }
                    if (timeStartInput) {
                        timeStartInput.value = startTime || '';
                    }
                    if (timeEndInput) {
                        timeEndInput.value = endTime || '';
                    }
                });
            }
            if (timeStartInput) {
                timeStartInput.addEventListener('change', function() {
                    filterState.meeting_time_start = timeStartInput.value || null;
                    if (meetingPresetSelect) meetingPresetSelect.value = '';
                });
            }
            if (timeEndInput) {
                timeEndInput.addEventListener('change', function() {
                    filterState.meeting_time_end = timeEndInput.value || null;
                    if (meetingPresetSelect) meetingPresetSelect.value = '';
                });
            }

            const applyButtons = document.querySelectorAll('[data-action="apply-filters"]');
            applyButtons.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    applyFiltersAndSearch();
                });
            });

            const resetButtons = document.querySelectorAll('[data-action="reset-filters"], [data-action="reset-filters-secondary"]');
            resetButtons.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    resetAllFilters();
                });
            });

            const clearTimeButtons = document.querySelectorAll('[data-action="clear-meeting-time-filters"]');
            clearTimeButtons.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    clearMeetingTimeFilters();
                });
            });

            if (activeFiltersContainer) {
                activeFiltersContainer.addEventListener('click', function(event) {
                    const target = event.target;
                    if (!target) return;
                    const action = target.dataset.action;
                    if (action === 'clear-single-filter') {
                        const key = target.dataset.filterKey;
                        clearSingleFilter(key);
                    }
                });
            }

            if (resultsListContainer) {
                resultsListContainer.addEventListener('click', function(event) {
                    const target = event.target;
                    if (!target) return;
                    const card = target.closest('[data-action="open-group-detail"]');
                    if (card && card.dataset.groupId) {
                        const groupId = card.dataset.groupId;
                        window.location.href = 'group_detail.html?groupId=' + encodeURIComponent(groupId);
                    }
                });

                resultsListContainer.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter' || event.key === ' ') {
                        const target = event.target;
                        if (!target) return;
                        const card = target.closest('[data-action="open-group-detail"]');
                        if (card && card.dataset.groupId) {
                            event.preventDefault();
                            const groupId = card.dataset.groupId;
                            window.location.href = 'group_detail.html?groupId=' + encodeURIComponent(groupId);
                        }
                    }
                });
            }

            if (emptyErrorContainer) {
                emptyErrorContainer.addEventListener('click', function(event) {
                    const target = event.target;
                    if (!target) return;
                    if (target.dataset.action === 'retry-search') {
                        executeSearch();
                    }
                });
            }

            window.addEventListener('popstate', function() {
                filterState = parseFilterStateFromUrl();
                syncControlsFromState();
                executeSearch();
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            focusTagSelect = document.getElementById('focusTagSelect');
            languageSelect = document.getElementById('languageSelect');
            groupSizeSelect = document.getElementById('groupSizeSelect');
            meetingDaySelect = document.getElementById('meetingDaySelect');
            meetingPresetSelect = document.getElementById('meetingPresetSelect');
            timeStartInput = document.getElementById('meetingTimeStartInput');
            timeEndInput = document.getElementById('meetingTimeEndInput');
            resultsListContainer = document.querySelector('[data-component="groups-results-list"]');
            emptyErrorContainer = document.querySelector('[data-component="groups-empty-and-error-state"]');
            summaryContainer = document.querySelector('[data-component="groups-results-summary"]');
            activeFiltersContainer = document.querySelector('[data-action="active-filters-container"]');

            try {
                filterOptions = WebsiteSDK.getGroupsFilterOptions();
            } catch (e) {
                if (window.console && console.error) {
                    console.error('getGroupsFilterOptions failed', e);
                }
                filterOptions = {
                    focus_tags: [],
                    languages: [],
                    group_size_ranges: [],
                    meeting_time_presets: []
                };
            }

            filterState = parseFilterStateFromUrl();

            const populateElements = document.querySelectorAll('[data-populate]');
            populateElements.forEach(function(element) {
                const type = element.dataset.populate;
                if (type === 'focus-tags') {
                    renderFocusTagsSelect(element, filterOptions.focus_tags || [], filterState.focus_tag);
                } else if (type === 'languages') {
                    renderLanguagesSelect(element, filterOptions.languages || [], filterState.language);
                } else if (type === 'group-size-ranges') {
                    renderGroupSizeRangesSelect(element, filterOptions.group_size_ranges || [], filterState);
                } else if (type === 'meeting-time-presets') {
                    renderMeetingTimePresetsSelect(element, filterOptions.meeting_time_presets || [], filterState);
                }
            });

            syncControlsFromState();
            initEventHandlers();
            executeSearch();
        });
    })();
    </script>
</body>
</html>
