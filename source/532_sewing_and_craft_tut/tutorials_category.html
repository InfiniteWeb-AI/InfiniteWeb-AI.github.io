<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Stitch Duchess - Sewing &amp; Craft Tutorials</title>
    <link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Lora:wght@400;500;700&amp;display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='tutorials_category.css'>
</head>
<body>
    <div class='page-background'>
        <header class='site-header' role='banner'>
            <div class='site-header-inner'>
                <div class='site-title-bar'>
                    <h1 class='site-title'>
                        <a href='index.html' class='site-title-link'>Stitch Duchess</a>
                    </h1>
                </div>
                <div class='site-banner'>
                    <div class='site-banner-inner'>
                        <img src='assets/banner-placeholder.jpg' alt='Decorative sewing and craft blog banner graphic' class='site-banner-image'>
                    </div>
                </div>
            </div>
        </header>

        <nav class='primary-nav' aria-label='Primary navigation'>
            <div class='primary-nav-inner'>
                <ul class='nav-list'>
                    <li class='nav-item'>
                        <a href='index.html' title='Homepage with featured tutorials and global search' class='nav-link'>Home</a>
                    </li>
                    <li class='nav-item'>
                        <a href='tutorials_category.html?categoryId=sewing' title='Browse sewing tutorials with filters for difficulty, time, materials, and more' class='nav-link'>Sewing</a>
                    </li>
                    <li class='nav-item'>
                        <a href='tutorials_category.html?categoryId=quilting' title='Browse quilting tutorials and apply tools, difficulty, and time filters' class='nav-link'>Quilting</a>
                    </li>
                    <li class='nav-item'>
                        <a href='tutorials_category.html?categoryId=crafts' title='Browse general crafts tutorials and access subcategories like Felt Crafts' class='nav-link'>Crafts</a>
                    </li>
                    <li class='nav-item'>
                        <a href='reading_lists.html' title='View and manage tutorials saved to your reading lists' class='nav-link'>Reading Lists</a>
                    </li>
                    <li class='nav-item'>
                        <a href='collections.html' title='View and manage your tutorial collections such as project-themed sets' class='nav-link'>Collections</a>
                    </li>
                    <li class='nav-item'>
                        <a href='favorites.html' title='View tutorials you have marked as favorites' class='nav-link'>Favorites</a>
                    </li>
                    <li class='nav-item'>
                        <a href='supply_checklist.html' title='View and update your supply checklist and quantities' class='nav-link'>Supply Checklist</a>
                    </li>
                </ul>
                <form class='global-search-form' data-action='global-search-form' aria-label='Search all tutorials'>
                    <label class='visually-hidden' for='globalSearchInput'>Search all tutorials</label>
                    <input id='globalSearchInput' name='query' type='search' class='global-search-input' placeholder='Search all tutorials...'>
                    <button type='submit' class='btn btn-small'>Search</button>
                </form>
                <div class='nav-secondary-row'>
                    <ul class='nav-dynamic-list' data-populate='navigation-categories' aria-label='Browse tutorial categories'>
                        <!-- Populated via getNavigationCategories -->
                    </ul>
                    <div class='nav-utilities-summary' data-populate='user-utility-summary' aria-label='Your activity summary'>
                        <!-- Populated via getUserUtilitySummary -->
                    </div>
                </div>
            </div>
        </nav>

        <div class='page-wrapper'>
            <main id='content' class='content' role='main'>
                <section class='category-page'>
                    <header class='category-context-header' data-component='category-context-header' data-populate='category-context'>
                        <!-- Category title, description, and search/filter summary rendered via JS -->
                    </header>

                    <section class='in-category-search-section' data-component='in-category-search-form' data-populate='in-category-search'>
                        <form class='in-category-search-form' data-action='in-category-search-form'>
                            <div class='form-field'>
                                <label for='categorySearchInput' class='search-label'>
                                    Search within this category
                                </label>
                                <div class='search-row'>
                                    <input id='categorySearchInput' name='searchQuery' type='search' class='search-input' placeholder='Search tutorials in this category...'>
                                    <button type='submit' class='btn'>Search</button>
                                </div>
                            </div>
                        </form>
                    </section>

                    <div class='category-main-layout'>
                        <div class='category-main-left'>
                            <section class='applied-filters-bar' data-component='applied-filters-bar' data-populate='applied-filters'>
                                <!-- Applied filter chips rendered via JS -->
                            </section>

                            <section class='sort-and-results-toolbar' data-component='sort-and-results-toolbar' data-populate='sort-toolbar'>
                                <!-- Results count and sort controls rendered via JS -->
                            </section>

                            <section class='tutorials-section'>
                                <div class='tutorials-grid' data-component='tutorials-grid' data-populate='tutorials-grid'>
                                    <!-- Tutorial cards rendered via JS -->
                                </div>
                                <div class='empty-state' data-component='empty-state' data-populate='empty-state' hidden>
                                    <!-- Empty state rendered via JS when no tutorials -->
                                </div>
                            </section>

                            <nav class='pagination-controls' aria-label='Tutorial results pages' data-component='pagination-controls' data-populate='pagination'>
                                <!-- Pagination rendered via JS -->
                            </nav>
                        </div>

                        <aside class='filter-sidebar' data-component='filter-sidebar' data-populate='filter-sidebar' aria-label='Filter tutorials'>
                            <!-- Filter groups rendered via JS using getTutorialFilterOptions -->
                        </aside>
                    </div>
                </section>
            </main>
        </div>

        <footer class='site-footer' role='contentinfo'>
            <div class='site-footer-inner'>
                <nav class='footer-nav' aria-label='Footer navigation'>
                    <ul class='footer-nav-list'>
                        <li class='footer-nav-item'>
                            <a href='about.html' title='Learn more about the sewing and craft tutorial blog' class='footer-nav-link'>About</a>
                        </li>
                        <li class='footer-nav-item'>
                            <a href='contact.html' title='Contact page for questions, feedback, or support' class='footer-nav-link'>Contact</a>
                        </li>
                        <li class='footer-nav-item'>
                            <a href='newsletter.html' title='Subscribe to the newsletter and choose topics and frequency' class='footer-nav-link'>Newsletter</a>
                        </li>
                    </ul>
                </nav>
                <p class='footer-copy'>
                    &copy; Stitch Duchess Sewing &amp; Craft Tutorials.
                </p>
            </div>
        </footer>
    </div>

    <script src='business_logic.js'></script>
    <script>
    (function() {
        'use strict';

        var tutorialCategoryState = null;

        function createEmptyFilterOptions() {
            return {
                difficultyOptions: [],
                timeRangeOptions: [],
                materialOptions: [],
                toolOptions: [],
                ratingThresholdOptions: [],
                tagOptions: [],
                patternTypeOptions: [],
                garmentCategoryOptions: [],
                garmentSubtypeOptions: [],
                sizeOptions: [],
                publishedDateOptions: [],
                sortOptions: []
            };
        }

        function createEmptyListing() {
            return {
                category: { id: '', name: 'Tutorials', description: '' },
                tutorials: [],
                page: 1,
                pageSize: 10,
                total: 0,
                totalPages: 0,
                appliedFilters: {},
                availableSortOptions: []
            };
        }

        function parseNumericParam(params, name) {
            var raw = params.get(name);
            if (raw === null) return null;
            var num = parseFloat(raw);
            if (isNaN(num)) return null;
            return num;
        }

        function buildFiltersFromUrl(urlParams, filterOptions) {
            var filters = {};

            var difficultyStr = urlParams.get('difficulty');
            if (difficultyStr) {
                var diffs = difficultyStr.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
                if (diffs.length) {
                    filters.difficulties = diffs;
                }
            }

            var minTime = parseNumericParam(urlParams, 'minTimeMinutes');
            var maxTime = parseNumericParam(urlParams, 'maxTimeMinutes');
            if (minTime !== null) filters.minTimeMinutes = minTime;
            if (maxTime !== null) filters.maxTimeMinutes = maxTime;

            var materialIdsStr = urlParams.get('materialIds');
            if (materialIdsStr) {
                var materialIds = materialIdsStr.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
                if (materialIds.length) filters.materialIds = materialIds;
            }

            var toolIdsStr = urlParams.get('toolIds');
            if (toolIdsStr) {
                var toolIds = toolIdsStr.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
                if (toolIds.length) filters.toolIds = toolIds;
            }

            var tagIdsStr = urlParams.get('tagIds');
            if (tagIdsStr) {
                var tagIds = tagIdsStr.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v; });
                if (tagIds.length) filters.tagIds = tagIds;
            }

            var fabricType = urlParams.get('fabricType');
            if (fabricType) filters.fabricType = fabricType;

            var minFabricYards = parseNumericParam(urlParams, 'minFabricYards');
            var maxFabricYards = parseNumericParam(urlParams, 'maxFabricYards');
            if (minFabricYards !== null) filters.minFabricYards = minFabricYards;
            if (maxFabricYards !== null) filters.maxFabricYards = maxFabricYards;

            var minRating = parseNumericParam(urlParams, 'minRating');
            if (minRating !== null) filters.minRating = minRating;

            var garmentCategory = urlParams.get('garmentCategory');
            if (garmentCategory) filters.garmentCategory = garmentCategory;

            var garmentSubtype = urlParams.get('garmentSubtype');
            if (garmentSubtype) filters.garmentSubtype = garmentSubtype;

            var sizeLabel = urlParams.get('sizeLabel');
            if (sizeLabel && filterOptions && filterOptions.sizeOptions && filterOptions.sizeOptions.length) {
                var sizeOptions = filterOptions.sizeOptions;
                for (var i = 0; i < sizeOptions.length; i++) {
                    var opt = sizeOptions[i];
                    if (opt.label === sizeLabel) {
                        if (typeof opt.sizeMinNumber === 'number') filters.sizeMinNumber = opt.sizeMinNumber;
                        if (typeof opt.sizeMaxNumber === 'number') filters.sizeMaxNumber = opt.sizeMaxNumber;
                        if (opt.mainSizeCategory) filters.mainSizeCategory = opt.mainSizeCategory;
                        break;
                    }
                }
            }

            var patternType = urlParams.get('patternType');
            if (patternType) filters.patternType = patternType;

            var publishedRangeId = urlParams.get('publishedRangeId');
            if (publishedRangeId && filterOptions && filterOptions.publishedDateOptions && filterOptions.publishedDateOptions.length) {
                var dateOptions = filterOptions.publishedDateOptions;
                for (var j = 0; j < dateOptions.length; j++) {
                    var dOpt = dateOptions[j];
                    if (dOpt.id === publishedRangeId) {
                        if (dOpt.fromDate) filters.publishedFrom = dOpt.fromDate;
                        if (dOpt.toDate) filters.publishedTo = dOpt.toDate;
                        break;
                    }
                }
            }

            return filters;
        }

        function hasAnyFilters(filters) {
            if (!filters) return false;
            var keys = Object.keys(filters);
            if (!keys.length) return false;
            for (var i = 0; i < keys.length; i++) {
                var key = keys[i];
                var value = filters[key];
                if (Array.isArray(value) && value.length) return true;
                if (!Array.isArray(value) && value !== undefined && value !== null) return true;
            }
            return false;
        }

        function buildCategoryUrl(params) {
            var query = params.toString();
            return 'tutorials_category.html' + (query ? '?' + query : '');
        }

        function navigateToCategoryWithParams(params) {
            window.location.href = buildCategoryUrl(params);
        }

        function renderNavigationCategories(container, state) {
            container.innerHTML = '';
            var categories = [];
            try {
                categories = WebsiteSDK.getNavigationCategories();
            } catch (e) {
                categories = [];
            }
            if (!categories || !categories.length) {
                return;
            }
            var currentCategoryId = state.categoryId;
            for (var i = 0; i < categories.length; i++) {
                var cat = categories[i];
                var li = document.createElement('li');
                li.className = 'nav-dynamic-item';
                var a = document.createElement('a');
                a.href = 'javascript:void(0)';
                a.className = 'nav-dynamic-link';
                a.textContent = cat.name || cat.id || 'Category';
                a.setAttribute('data-action', 'nav-category-click');
                if (cat.id) a.setAttribute('data-category-id', cat.id);
                if (cat.id === currentCategoryId) {
                    a.className += ' is-active';
                }
                li.appendChild(a);
                container.appendChild(li);
            }
        }

        function renderUserUtilitySummary(container) {
            container.innerHTML = '';
            var summary;
            try {
                summary = WebsiteSDK.getUserUtilitySummary();
            } catch (e) {
                summary = null;
            }
            if (!summary) {
                return;
            }
            var textParts = [];
            if (typeof summary.totalFavorites === 'number') {
                textParts.push('Favorites: ' + summary.totalFavorites);
            }
            if (typeof summary.totalReadingLists === 'number') {
                textParts.push('Lists: ' + summary.totalReadingLists);
            }
            if (typeof summary.totalCollections === 'number') {
                textParts.push('Collections: ' + summary.totalCollections);
            }
            if (typeof summary.totalChecklistItems === 'number') {
                textParts.push('Checklist items: ' + summary.totalChecklistItems);
            }
            if (typeof summary.hasActiveNewsletterSubscription === 'boolean') {
                textParts.push('Newsletter: ' + (summary.hasActiveNewsletterSubscription ? 'Active' : 'Not subscribed'));
            }
            if (!textParts.length) return;
            var p = document.createElement('p');
            p.className = 'nav-utilities-text';
            p.textContent = textParts.join(' \u00b7 ');
            container.appendChild(p);
        }

        function renderCategoryContext(container, state) {
            container.innerHTML = '';
            var category = state.listing && state.listing.category ? state.listing.category : null;
            var titleText = category && category.name ? category.name : 'Tutorials';
            var descText = category && category.description ? category.description : '';
            if (state.subcategory) {
                titleText = titleText + ' ␀b7 ' + state.subcategory;
            }

            var headerMain = document.createElement('div');
            headerMain.className = 'category-context-main';

            var h2 = document.createElement('h2');
            h2.className = 'category-context-title';
            h2.textContent = titleText;
            headerMain.appendChild(h2);

            if (descText) {
                var pDesc = document.createElement('p');
                pDesc.className = 'category-context-description';
                pDesc.textContent = descText;
                headerMain.appendChild(pDesc);
            }

            var meta = document.createElement('div');
            meta.className = 'category-context-meta';

            var summaryTextParts = [];
            if (state.searchQuery) {
                summaryTextParts.push('Search results for "' + state.searchQuery + '"');
            }
            var total = state.listing && typeof state.listing.total === 'number' ? state.listing.total : 0;
            summaryTextParts.push(total + ' tutorial' + (total === 1 ? '' : 's'));
            if (hasAnyFilters(state.filtersFromUrl)) {
                summaryTextParts.push('filters applied');
            }
            var summaryP = document.createElement('p');
            summaryP.className = 'category-context-summary';
            summaryP.textContent = summaryTextParts.join(' ␀b7 ');
            meta.appendChild(summaryP);

            var actionsWrapper = document.createElement('div');
            actionsWrapper.className = 'category-context-actions';

            if (state.searchQuery) {
                var clearSearchBtn = document.createElement('button');
                clearSearchBtn.type = 'button';
                clearSearchBtn.className = 'link-button';
                clearSearchBtn.textContent = 'Clear search';
                clearSearchBtn.setAttribute('data-action', 'clear-search');
                actionsWrapper.appendChild(clearSearchBtn);
            }

            if (hasAnyFilters(state.filtersFromUrl)) {
                var clearFiltersBtn = document.createElement('button');
                clearFiltersBtn.type = 'button';
                clearFiltersBtn.className = 'link-button';
                clearFiltersBtn.textContent = 'Clear all filters';
                clearFiltersBtn.setAttribute('data-action', 'clear-all-filters');
                actionsWrapper.appendChild(clearFiltersBtn);
            }

            if (actionsWrapper.childNodes.length) {
                meta.appendChild(actionsWrapper);
            }

            container.appendChild(headerMain);
            container.appendChild(meta);
        }

        function renderInCategorySearch(container, state) {
            var input = container.querySelector('#categorySearchInput');
            if (input) {
                input.value = state.searchQuery || '';
            }
            var label = container.querySelector('.search-label');
            if (label && state.listing && state.listing.category && state.listing.category.name) {
                label.textContent = 'Search within ' + state.listing.category.name;
            }
        }

        function renderAppliedFilters(container, state) {
            container.innerHTML = '';
            var urlParams = state.urlParams;
            var filters = state.filtersFromUrl;
            var filterOptions = state.filterOptions || {};

            if (!hasAnyFilters(filters) && !urlParams.get('sizeLabel') && !urlParams.get('publishedRangeId')) {
                container.style.display = 'none';
                return;
            }
            container.style.display = '';

            var chipsWrapper = document.createElement('div');
            chipsWrapper.className = 'applied-filters-chips';

            function addChip(labelText, filterType, filterValue) {
                var chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'filter-chip';
                chip.setAttribute('data-action', 'remove-filter-chip');
                chip.setAttribute('data-filter-type', filterType);
                if (filterValue !== undefined && filterValue !== null) {
                    chip.setAttribute('data-filter-value', String(filterValue));
                }
                chip.textContent = labelText + ' ␀d7';
                chipsWrapper.appendChild(chip);
            }

            if (filters.difficulties && filters.difficulties.length && filterOptions.difficultyOptions && filterOptions.difficultyOptions.length) {
                var diffOpts = filterOptions.difficultyOptions;
                filters.difficulties.forEach(function(diffValue) {
                    var label = diffValue;
                    for (var i = 0; i < diffOpts.length; i++) {
                        if (diffOpts[i].value === diffValue) {
                            label = diffOpts[i].label || diffValue;
                            break;
                        }
                    }
                    addChip(label, 'difficulty', diffValue);
                });
            }

            if (typeof filters.minRating === 'number') {
                var ratingLabel = filters.minRating + ' stars & up';
                if (filterOptions.ratingThresholdOptions && filterOptions.ratingThresholdOptions.length) {
                    filterOptions.ratingThresholdOptions.forEach(function(opt) {
                        if (opt.minRating === filters.minRating && opt.label) {
                            ratingLabel = opt.label;
                        }
                    });
                }
                addChip(ratingLabel, 'minRating', 'minRating');
            }

            if (filters.minTimeMinutes !== undefined || filters.maxTimeMinutes !== undefined) {
                var timeLabel = '';
                var matchedTime = null;
                if (filterOptions.timeRangeOptions && filterOptions.timeRangeOptions.length) {
                    filterOptions.timeRangeOptions.forEach(function(opt) {
                        if (filters.minTimeMinutes === opt.minMinutes && filters.maxTimeMinutes === opt.maxMinutes) {
                            matchedTime = opt;
                        }
                    });
                }
                if (matchedTime && matchedTime.label) {
                    timeLabel = matchedTime.label;
                } else {
                    var parts = [];
                    if (filters.minTimeMinutes !== undefined) parts.push('from ' + filters.minTimeMinutes + ' min');
                    if (filters.maxTimeMinutes !== undefined) parts.push('to ' + filters.maxTimeMinutes + ' min');
                    timeLabel = parts.join(' ');
                }
                addChip(timeLabel, 'timeRange', 'timeRange');
            }

            if (filters.fabricType) {
                addChip('Fabric: ' + filters.fabricType, 'fabricType', 'fabricType');
            }

            if (filters.minFabricYards !== undefined || filters.maxFabricYards !== undefined) {
                var yardParts = [];
                if (filters.minFabricYards !== undefined) yardParts.push('from ' + filters.minFabricYards + ' yd');
                if (filters.maxFabricYards !== undefined) yardParts.push('to ' + filters.maxFabricYards + ' yd');
                addChip('Yardage ' + yardParts.join(' '), 'fabricYards', 'fabricYards');
            }

            if (filters.materialIds && filters.materialIds.length && filterOptions.materialOptions && filterOptions.materialOptions.length) {
                filters.materialIds.forEach(function(id) {
                    var name = 'Material';
                    filterOptions.materialOptions.forEach(function(mat) {
                        if (mat.id === id && mat.name) name = mat.name;
                    });
                    addChip(name, 'materialIds', id);
                });
            }

            if (filters.toolIds && filters.toolIds.length && filterOptions.toolOptions && filterOptions.toolOptions.length) {
                filters.toolIds.forEach(function(id) {
                    var name = 'Tool';
                    filterOptions.toolOptions.forEach(function(tool) {
                        if (tool.id === id && tool.name) name = tool.name;
                    });
                    addChip(name, 'toolIds', id);
                });
            }

            if (filters.tagIds && filters.tagIds.length && filterOptions.tagOptions && filterOptions.tagOptions.length) {
                filters.tagIds.forEach(function(id) {
                    var name = 'Tag';
                    filterOptions.tagOptions.forEach(function(tag) {
                        if (tag.id === id && tag.name) name = tag.name;
                    });
                    addChip(name, 'tagIds', id);
                });
            }

            if (filters.garmentCategory) {
                var gLabel = filters.garmentCategory;
                if (filterOptions.garmentCategoryOptions && filterOptions.garmentCategoryOptions.length) {
                    filterOptions.garmentCategoryOptions.forEach(function(opt) {
                        if (opt.value === filters.garmentCategory && opt.label) gLabel = opt.label;
                    });
                }
                addChip(gLabel, 'garmentCategory', 'garmentCategory');
            }

            if (filters.garmentSubtype) {
                var gsLabel = filters.garmentSubtype;
                if (filterOptions.garmentSubtypeOptions && filterOptions.garmentSubtypeOptions.length) {
                    filterOptions.garmentSubtypeOptions.forEach(function(opt) {
                        if (opt.value === filters.garmentSubtype && opt.label) gsLabel = opt.label;
                    });
                }
                addChip(gsLabel, 'garmentSubtype', 'garmentSubtype');
            }

            var sizeLabelParam = urlParams.get('sizeLabel');
            if (sizeLabelParam) {
                addChip(sizeLabelParam, 'sizeLabel', 'sizeLabel');
            }

            var publishedRangeId = urlParams.get('publishedRangeId');
            if (publishedRangeId && filterOptions.publishedDateOptions && filterOptions.publishedDateOptions.length) {
                var prLabel = publishedRangeId;
                filterOptions.publishedDateOptions.forEach(function(opt) {
                    if (opt.id === publishedRangeId && opt.label) prLabel = opt.label;
                });
                addChip(prLabel, 'publishedRangeId', 'publishedRangeId');
            }

            if (filters.patternType) {
                var pLabel = filters.patternType;
                if (filterOptions.patternTypeOptions && filterOptions.patternTypeOptions.length) {
                    filterOptions.patternTypeOptions.forEach(function(opt) {
                        if (opt.value === filters.patternType && opt.label) pLabel = opt.label;
                    });
                }
                addChip(pLabel, 'patternType', 'patternType');
            }

            if (!chipsWrapper.childNodes.length) {
                container.style.display = 'none';
                return;
            }

            container.appendChild(chipsWrapper);

            var clearAllBtn = document.createElement('button');
            clearAllBtn.type = 'button';
            clearAllBtn.className = 'link-button clear-all-filters';
            clearAllBtn.textContent = 'Clear all';
            clearAllBtn.setAttribute('data-action', 'clear-all-filters');
            container.appendChild(clearAllBtn);
        }

        function renderSortToolbar(container, state) {
            container.innerHTML = '';
            var toolbar = document.createElement('div');
            toolbar.className = 'sort-toolbar-inner';

            var total = state.listing && typeof state.listing.total === 'number' ? state.listing.total : 0;
            var page = state.page || 1;
            var pageSize = state.listing && state.listing.pageSize ? state.listing.pageSize : (state.pageSize || 10);
            var startIndex = total ? ((page - 1) * pageSize + 1) : 0;
            var endIndex = total ? Math.min(page * pageSize, total) : 0;

            var resultsInfo = document.createElement('div');
            resultsInfo.className = 'results-info';
            if (total === 0) {
                resultsInfo.textContent = 'No tutorials found';
            } else {
                resultsInfo.textContent = 'Showing ' + startIndex + '␀a0␀b7␀a0' + endIndex + ' of ' + total + ' tutorials';
            }
            toolbar.appendChild(resultsInfo);

            var sortWrapper = document.createElement('div');
            sortWrapper.className = 'sort-control-wrapper';
            var label = document.createElement('label');
            label.className = 'sort-label';
            label.textContent = 'Sort by:';
            label.setAttribute('for', 'sortSelect');
            sortWrapper.appendChild(label);

            var select = document.createElement('select');
            select.id = 'sortSelect';
            select.className = 'sort-select';
            select.setAttribute('data-action', 'sort-change');

            var sortOptions = [];
            if (state.listing && state.listing.availableSortOptions && state.listing.availableSortOptions.length) {
                sortOptions = state.listing.availableSortOptions;
            } else if (state.filterOptions && state.filterOptions.sortOptions && state.filterOptions.sortOptions.length) {
                sortOptions = state.filterOptions.sortOptions;
            }

            var defaultSortValue = state.defaultSortBy || null;
            for (var i = 0; i < sortOptions.length; i++) {
                var opt = sortOptions[i];
                var optionEl = document.createElement('option');
                optionEl.value = opt.value;
                optionEl.textContent = opt.label || opt.value;
                select.appendChild(optionEl);
                if (!defaultSortValue && opt.isDefault) {
                    defaultSortValue = opt.value;
                }
            }

            var activeSort = state.sortBy || defaultSortValue;
            if (activeSort && sortOptions.length) {

        function initPage() {
            var urlParams = new URLSearchParams(window.location.search);
            var categoryId = urlParams.get('categoryId') || 'sewing';
            var subcategory = urlParams.get('subcategory');
            var searchQuery = urlParams.get('searchQuery') || '';
            var pageRaw = urlParams.get('page');
            var page = parseInt(pageRaw || '1', 10);
            if (isNaN(page) || page < 1) page = 1;

            var context = { mode: 'category', categoryId: categoryId };
            if (searchQuery) {
                context.searchQuery = searchQuery;
            }

            var filterOptions;
            try {
                filterOptions = WebsiteSDK.getTutorialFilterOptions(context);
            } catch (e) {
                filterOptions = createEmptyFilterOptions();
            }

            var filtersFromUrl = buildFiltersFromUrl(urlParams, filterOptions);

            var sortByParam = urlParams.get('sortBy');
            var defaultSortBy = null;
            if (filterOptions && filterOptions.sortOptions && filterOptions.sortOptions.length) {
                for (var i = 0; i < filterOptions.sortOptions.length; i++) {
                    var opt = filterOptions.sortOptions[i];
                    if (opt.isDefault) {
                        defaultSortBy = opt.value;
                        break;
                    }
                }
            }
            var sortBy = sortByParam || defaultSortBy || null;

            var pageSize = 10;
            var listing;
            try {
                listing = WebsiteSDK.getCategoryTutorials(
                    categoryId,
                    subcategory || null,
                    searchQuery || null,
                    Object.keys(filtersFromUrl).length ? filtersFromUrl : null,
                    sortBy,
                    page,
                    pageSize
                );
            } catch (e) {
                listing = createEmptyListing();
            }

            if (!defaultSortBy && listing && listing.availableSortOptions && listing.availableSortOptions.length) {
                for (var j = 0; j < listing.availableSortOptions.length; j++) {
                    var sopt = listing.availableSortOptions[j];
                    if (sopt.isDefault) {
                        defaultSortBy = sopt.value;
                        break;
                    }
                }
            }

            tutorialCategoryState = {
                urlParams: urlParams,
                categoryId: categoryId,
                subcategory: subcategory,
                searchQuery: searchQuery,
                page: page,
                pageSize: pageSize,
                filtersFromUrl: filtersFromUrl,
                filterOptions: filterOptions,
                listing: listing,
                sortBy: sortBy,
                defaultSortBy: defaultSortBy
            };

            var populateElements = document.querySelectorAll('[data-populate]');
            for (var k = 0; k < populateElements.length; k++) {
                var el = populateElements[k];
                var type = el.getAttribute('data-populate');
                if (type === 'navigation-categories') {
                    renderNavigationCategories(el, tutorialCategoryState);
                } else if (type === 'user-utility-summary') {
                    renderUserUtilitySummary(el);
                } else if (type === 'category-context') {
                    renderCategoryContext(el, tutorialCategoryState);
                } else if (type === 'in-category-search') {
                    renderInCategorySearch(el, tutorialCategoryState);
                } else if (type === 'applied-filters') {
                    renderAppliedFilters(el, tutorialCategoryState);
                } else if (type === 'sort-toolbar') {
                    renderSortToolbar(el, tutorialCategoryState);
                } else if (type === 'tutorials-grid') {
                    renderTutorialsGrid(el, tutorialCategoryState);
                } else if (type === 'pagination') {
                    renderPagination(el, tutorialCategoryState);
                } else if (type === 'empty-state') {
                    renderEmptyState(el, tutorialCategoryState);
                } else if (type === 'filter-sidebar') {
                    renderFilterSidebar(el, tutorialCategoryState);
                }
            }
        }

        function handleGlobalClick(event) {
            var target = event.target;
            var actionEl = target.closest ? target.closest('[data-action]') : null;
            if (!actionEl) return;
            var action = actionEl.getAttribute('data-action');

            if (action === 'open-tutorial' || action === 'open-tutorial-card') {
                event.preventDefault();
                var tutorialId = actionEl.getAttribute('data-tutorial-id');
                if (!tutorialId) {
                    var card = actionEl.closest ? actionEl.closest('.tutorial-card') : null;
                    if (card) tutorialId = card.getAttribute('data-tutorial-id');
                }
                if (tutorialId) {
                    window.location.href = 'tutorial.html?id=' + encodeURIComponent(tutorialId);
                }
            } else if (action === 'pagination-page') {
                var pageStr = actionEl.getAttribute('data-page');
                var newPage = parseInt(pageStr || '1', 10);
                if (isNaN(newPage) || newPage < 1) return;
                var params = new URLSearchParams(window.location.search);
                params.set('page', String(newPage));
                navigateToCategoryWithParams(params);
            } else if (action === 'pagination-prev') {
                var currentPage = tutorialCategoryState && tutorialCategoryState.page ? tutorialCategoryState.page : 1;
                if (currentPage <= 1) return;
                var prevPage = currentPage - 1;
                var paramsPrev = new URLSearchParams(window.location.search);
                paramsPrev.set('page', String(prevPage));
                navigateToCategoryWithParams(paramsPrev);
            } else if (action === 'pagination-next') {
                var listing = tutorialCategoryState && tutorialCategoryState.listing;
                if (!listing || !listing.totalPages) return;
                var curPage = tutorialCategoryState.page || 1;
                if (curPage >= listing.totalPages) return;
                var nextPage = curPage + 1;
                var paramsNext = new URLSearchParams(window.location.search);
                paramsNext.set('page', String(nextPage));
                navigateToCategoryWithParams(paramsNext);
            } else if (action === 'clear-search') {
                var paramsClearSearch = new URLSearchParams(window.location.search);
                paramsClearSearch.delete('searchQuery');
                paramsClearSearch.set('page', '1');
                navigateToCategoryWithParams(paramsClearSearch);
            } else if (action === 'clear-all-filters' || action === 'empty-reset-filters') {
                var paramsClearAll = new URLSearchParams(window.location.search);
                paramsClearAll.delete('difficulty');
                paramsClearAll.delete('minTimeMinutes');
                paramsClearAll.delete('maxTimeMinutes');
                paramsClearAll.delete('materialIds');
                paramsClearAll.delete('fabricType');
                paramsClearAll.delete('minFabricYards');
                paramsClearAll.delete('maxFabricYards');
                paramsClearAll.delete('toolIds');
                paramsClearAll.delete('minRating');
                paramsClearAll.delete('tagIds');
                paramsClearAll.delete('garmentCategory');
                paramsClearAll.delete('garmentSubtype');
                paramsClearAll.delete('sizeLabel');
                paramsClearAll.delete('publishedRangeId');
                paramsClearAll.delete('patternType');
                if (action === 'empty-reset-filters') {
                    paramsClearAll.delete('searchQuery');
                }
                paramsClearAll.delete('sortBy');
                paramsClearAll.set('page', '1');
                navigateToCategoryWithParams(paramsClearAll);
            } else if (action === 'remove-filter-chip') {
                var filterType = actionEl.getAttribute('data-filter-type');
                var filterValue = actionEl.getAttribute('data-filter-value');
                var paramsChip = new URLSearchParams(window.location.search);
                if (filterType === 'difficulty') {
                    var existing = paramsChip.get('difficulty');
                    if (existing) {
                        var arr = existing.split(',').filter(function(v) { return v && v !== filterValue; });
                        if (arr.length) paramsChip.set('difficulty', arr.join(',')); else paramsChip.delete('difficulty');
                    }
                } else if (filterType === 'minRating') {
                    paramsChip.delete('minRating');
                } else if (filterType === 'timeRange') {
                    paramsChip.delete('minTimeMinutes');
                    paramsChip.delete('maxTimeMinutes');
                } else if (filterType === 'fabricType') {
                    paramsChip.delete('fabricType');
                } else if (filterType === 'fabricYards') {
                    paramsChip.delete('minFabricYards');
                    paramsChip.delete('maxFabricYards');
                } else if (filterType === 'materialIds') {
                    var matExisting = paramsChip.get('materialIds');
                    if (matExisting) {
                        var matArr = matExisting.split(',').filter(function(v) { return v && v !== filterValue; });
                        if (matArr.length) paramsChip.set('materialIds', matArr.join(',')); else paramsChip.delete('materialIds');
                    }
                } else if (filterType === 'toolIds') {
                    var toolExisting = paramsChip.get('toolIds');
                    if (toolExisting) {
                        var toolArr = toolExisting.split(',').filter(function(v) { return v && v !== filterValue; });
                        if (toolArr.length) paramsChip.set('toolIds', toolArr.join(',')); else paramsChip.delete('toolIds');
                    }
                } else if (filterType === 'tagIds') {
                    var tagExisting = paramsChip.get('tagIds');
                    if (tagExisting) {
                        var tagArr = tagExisting.split(',').filter(function(v) { return v && v !== filterValue; });
                        if (tagArr.length) paramsChip.set('tagIds', tagArr.join(',')); else paramsChip.delete('tagIds');
                    }
                } else if (filterType === 'garmentCategory') {
                    paramsChip.delete('garmentCategory');
                } else if (filterType === 'garmentSubtype') {
                    paramsChip.delete('garmentSubtype');
                } else if (filterType === 'sizeLabel') {
                    paramsChip.delete('sizeLabel');
                } else if (filterType === 'publishedRangeId') {
                    paramsChip.delete('publishedRangeId');
                } else if (filterType === 'patternType') {
                    paramsChip.delete('patternType');
                }
                paramsChip.set('page', '1');
                navigateToCategoryWithParams(paramsChip);
            } else if (action === 'empty-modify-search') {
                var input = document.getElementById('categorySearchInput');
                if (input) {
                    input.focus();
                    input.select();
                }
            } else if (action === 'nav-category-click') {
                event.preventDefault();
                var catId = actionEl.getAttribute('data-category-id');
                if (!catId) return;
                var paramsNav = new URLSearchParams();
                paramsNav.set('categoryId', catId);
                paramsNav.set('page', '1');
                navigateToCategoryWithParams(paramsNav);
            }
        }

        function handleGlobalChange(event) {
            var target = event.target;
            var filterType = target.getAttribute('data-filter-type');
            if (!filterType) return;

            var params = new URLSearchParams(window.location.search);

            if (filterType === 'difficulty' || filterType === 'materialIds' || filterType === 'toolIds' || filterType === 'tagIds') {
                var paramName = target.getAttribute('data-param-name');
                if (!paramName) return;
                var value = target.value;
                var existing = params.get(paramName);
                var arr = existing ? existing.split(',').filter(function(v) { return v; }) : [];
                if (target.checked) {
                    if (arr.indexOf(value) === -1) arr.push(value);
                } else {
                    arr = arr.filter(function(v) { return v !== value; });
                }
                if (arr.length) params.set(paramName, arr.join(',')); else params.delete(paramName);
                params.set('page', '1');
                navigateToCategoryWithParams(params);
            } else if (filterType === 'timeRange') {
                var minParamName = target.getAttribute('data-min-param-name');
                var maxParamName = target.getAttribute('data-max-param-name');
                var minMinutes = target.getAttribute('data-min-minutes');
                var maxMinutes = target.getAttribute('data-max-minutes');
                if (!minParamName || !maxParamName) return;
                if (minMinutes === '' && maxMinutes === '') {
                    params.delete(minParamName);
                    params.delete(maxParamName);
                } else {
                    if (minMinutes !== '') params.set(minParamName, minMinutes); else params.delete(minParamName);
                    if (maxMinutes !== '') params.set(maxParamName, maxMinutes); else params.delete(maxParamName);
                }
                params.set('page', '1');
                navigateToCategoryWithParams(params);
            } else if (filterType === 'minRating' || filterType === 'patternType' || filterType === 'garmentCategory' || filterType === 'garmentSubtype' || filterType === 'sizeLabel' || filterType === 'publishedRangeId') {
                var paramName2 = target.getAttribute('data-param-name');
                if (!paramName2) return;
                var value2 = target.value;
                if (value2 === '') {
                    params.delete(paramName2);
                } else {
                    params.set(paramName2, value2);
                }
                params.set('page', '1');
                navigateToCategoryWithParams(params);
            }
        }

        function handleGlobalSubmit(event) {
            var form = event.target;
            if (!form || !form.getAttribute) return;
            var action = form.getAttribute('data-action');
            if (action === 'in-category-search-form') {
                event.preventDefault();
                var input = form.querySelector('input[name="searchQuery"]');
                var term = input ? input.value.trim() : '';
                var params = new URLSearchParams();
                var catId = tutorialCategoryState && tutorialCategoryState.categoryId ? tutorialCategoryState.categoryId : 'sewing';
                params.set('categoryId', catId);
                if (tutorialCategoryState && tutorialCategoryState.subcategory) {
                    params.set('subcategory', tutorialCategoryState.subcategory);
                }
                if (term) {
                    params.set('searchQuery', term);
                }
                params.set('page', '1');
                navigateToCategoryWithParams(params);
            } else if (action === 'global-search-form') {
                event.preventDefault();
                var qInput = form.querySelector('input[name="query"]');
                var q = qInput ? qInput.value.trim() : '';
                if (!q) return;
                var searchParams = new URLSearchParams();
                searchParams.set('query', q);
                window.location.href = 'search_results.html?' + searchParams.toString();
            }
        }

        function handleGlobalSortChange(event) {
            var target = event.target;
            var action = target.getAttribute('data-action');
            if (action === 'sort-change') {
                var value = target.value;
                var params = new URLSearchParams(window.location.search);
                if (value) {
                    params.set('sortBy', value);
                } else {
                    params.delete('sortBy');
                }
                params.set('page', '1');
                navigateToCategoryWithParams(params);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            try {
                initPage();
            } catch (e) {
                // Fallback: avoid breaking UI entirely
                console.error('Error initializing tutorials category page', e);
            }

            document.addEventListener('click', handleGlobalClick);
            document.addEventListener('change', function(event) {
                handleGlobalChange(event);
                handleGlobalSortChange(event);
            });
            document.addEventListener('submit', handleGlobalSubmit);
        });
    })();
    </script>
</body>
</html>
