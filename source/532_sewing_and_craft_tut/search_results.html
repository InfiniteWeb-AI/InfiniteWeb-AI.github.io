<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Stitch Duchess - Sewing & Craft Tutorials</title>
    <link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Lora:wght@400;500;700&amp;display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='search_results.css'>
</head>
<body>
    <div class='page-background'>
        <header class='site-header' role='banner'>
            <div class='site-header-inner'>
                <div class='site-title-bar'>
                    <h1 class='site-title'>
                        <a href='index.html' class='site-title-link'>Stitch Duchess</a>
                    </h1>
                    <div class='site-utility-summary' data-component='header-utilities' data-populate='user-utilities' aria-label='Your activity summary'></div>
                </div>
                <div class='site-banner'>
                    <div class='site-banner-inner'>
                        <img src='assets/banner-placeholder.jpg' alt='Decorative sewing and craft blog banner graphic' class='site-banner-image'>
                    </div>
                </div>
                <div class='site-header-search'>
                    <form class='header-search-form' data-action='header-search-submit' role='search' aria-label='Global tutorial search'>
                        <label for='headerSearchInput' class='header-search-label'>Search tutorials</label>
                        <input id='headerSearchInput' name='query' type='search' class='header-search-input' placeholder='Search sewing, quilting, or crafts'>
                        <button type='submit' class='btn header-search-button'>Search</button>
                    </form>
                </div>
            </div>
        </header>

        <nav class='primary-nav' aria-label='Primary navigation'>
            <div class='primary-nav-inner'>
                <ul class='nav-list'>
                    <li class='nav-item'>
                        <a href='index.html' title='Homepage with featured tutorials and global search' class='nav-link'>Home</a>
                    </li>
                    <li class='nav-item'>
                        <a href='tutorials_category.html?categoryId=sewing' title='Browse sewing tutorials with filters for difficulty, time, materials, and more' class='nav-link'>Sewing</a>
                    </li>
                    <li class='nav-item'>
                        <a href='tutorials_category.html?categoryId=quilting' title='Browse quilting tutorials and apply tools, difficulty, and time filters' class='nav-link'>Quilting</a>
                    </li>
                    <li class='nav-item'>
                        <a href='tutorials_category.html?categoryId=crafts' title='Browse general crafts tutorials and access subcategories like Felt Crafts' class='nav-link'>Crafts</a>
                    </li>
                    <li class='nav-item'>
                        <a href='reading_lists.html' title='View and manage tutorials saved to your reading lists' class='nav-link'>Reading Lists</a>
                    </li>
                    <li class='nav-item'>
                        <a href='collections.html' title='View and manage your tutorial collections such as project-themed sets' class='nav-link'>Collections</a>
                    </li>
                    <li class='nav-item'>
                        <a href='favorites.html' title='View tutorials you have marked as favorites' class='nav-link'>Favorites</a>
                    </li>
                    <li class='nav-item'>
                        <a href='supply_checklist.html' title='View and update your supply checklist and quantities' class='nav-link'>Supply Checklist</a>
                    </li>
                </ul>
            </div>
        </nav>

        <div class='page-wrapper'>
            <main id='content' class='content' role='main'>
                <div class='search-page-wrapper'>
                    <div class='search-page-inner'>
                        <div class='search-layout-grid'>
                            <section class='search-main-column' aria-label='Search results'>
                                <header class='search-summary-header-block' data-component='search-summary-header' data-populate='search-summary' aria-live='polite'></header>

                                <section class='inline-search-wrapper' aria-label='Refine search query'>
                                    <div class='inline-search-bar' data-component='inline-search-bar' data-populate='inline-search'></div>
                                </section>

                                <section class='applied-filters-and-sort-row' aria-label='Applied filters and sorting controls'>
                                    <div class='applied-filters-container' data-component='applied-filters-bar' data-populate='applied-filters'></div>
                                    <div class='sort-control-container' data-component='sort-control' data-populate='sort-control'></div>
                                </section>

                                <section class='tutorial-results-section' aria-label='Tutorial search results list'>
                                    <div class='tutorial-results-grid' data-component='tutorial-results-grid' data-populate='tutorial-results'></div>
                                    <nav class='pagination-section' aria-label='Search results pagination' data-component='pagination-controls' data-populate='pagination'></nav>
                                </section>
                            </section>

                            <aside class='filter-sidebar-column' aria-label='Filter tutorials'>
                                <div class='filter-sidebar-card' data-component='filter-sidebar' data-populate='filter-sidebar'></div>
                            </aside>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <footer class='site-footer' role='contentinfo'>
            <div class='site-footer-inner'>
                <nav class='footer-nav' aria-label='Footer navigation'>
                    <ul class='footer-nav-list'>
                        <li class='footer-nav-item'>
                            <a href='about.html' title='Learn more about the sewing and craft tutorial blog' class='footer-nav-link'>About</a>
                        </li>
                        <li class='footer-nav-item'>
                            <a href='contact.html' title='Contact page for questions, feedback, or support' class='footer-nav-link'>Contact</a>
                        </li>
                        <li class='footer-nav-item'>
                            <a href='newsletter.html' title='Subscribe to the newsletter and choose topics and frequency' class='footer-nav-link'>Newsletter</a>
                        </li>
                    </ul>
                </nav>
                <p class='footer-copy'>
                    &copy; Stitch Duchess Sewing &amp; Craft Tutorials.
                </p>
            </div>
        </footer>
    </div>

    <script src='business_logic.js'></script>
    <script>
    'use strict';

    document.addEventListener('DOMContentLoaded', function() {
        var DEFAULT_PAGE_SIZE = 10;

        function getUrlParams() {
            var params = new URLSearchParams(window.location.search);
            return params;
        }

        function csvToArray(value) {
            if (!value) return [];
            return value.split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v.length > 0; });
        }

        function parseNumberParam(params, name) {
            var raw = params.get(name);
            if (raw === null || raw === '') return null;
            var n = Number(raw);
            if (Number.isNaN(n)) return null;
            return n;
        }

        function parseUrlState() {
            var params = getUrlParams();
            var state = {
                query: params.get('query') || '',
                tagIds: csvToArray(params.get('tagIds')),
                categoryId: params.get('categoryId') || '',
                difficultyValues: csvToArray(params.get('difficulty')),
                minTimeMinutes: parseNumberParam(params, 'minTimeMinutes'),
                maxTimeMinutes: parseNumberParam(params, 'maxTimeMinutes'),
                materialIds: csvToArray(params.get('materialIds')),
                toolIds: csvToArray(params.get('toolIds')),
                minRating: parseNumberParam(params, 'minRating'),
                patternType: params.get('patternType') || '',
                garmentCategory: params.get('garmentCategory') || '',
                garmentSubtype: params.get('garmentSubtype') || '',
                sizeLabel: params.get('sizeLabel') || '',
                publishedRangeId: params.get('publishedRangeId') || '',
                sortBy: params.get('sortBy') || '',
                page: parseNumberParam(params, 'page') || 1
            };
            return state;
        }

        function buildFilterContext(state) {
            var mode = 'search';
            var context = { mode: 'search' };
            if (state.categoryId && !state.query && state.tagIds.length === 0) {
                mode = 'category';
                context = { mode: 'category', categoryId: state.categoryId };
            } else if (state.tagIds.length > 0) {
                mode = 'tag';
                context = { mode: 'tag', tagIds: state.tagIds.slice() };
            } else {
                mode = 'search';
                context = { mode: 'search', searchQuery: state.query }; 
            }
            return context;
        }

        function buildSearchFilters(state, filterOptions) {
            var filters = {};

            if (state.categoryId) {
                filters.categoryId = state.categoryId;
            }

            if (state.difficultyValues && state.difficultyValues.length > 0) {
                filters.difficulties = state.difficultyValues.slice();
            }

            if (typeof state.minTimeMinutes === 'number') {
                filters.minTimeMinutes = state.minTimeMinutes;
            }
            if (typeof state.maxTimeMinutes === 'number') {
                filters.maxTimeMinutes = state.maxTimeMinutes;
            }

            if (state.materialIds && state.materialIds.length > 0) {
                filters.materialIds = state.materialIds.slice();
            }

            if (state.toolIds && state.toolIds.length > 0) {
                filters.toolIds = state.toolIds.slice();
            }

            if (typeof state.minRating === 'number') {
                filters.minRating = state.minRating;
            }

            if (state.patternType) {
                filters.patternType = state.patternType;
            }

            if (state.garmentCategory) {
                filters.garmentCategory = state.garmentCategory;
            }
            if (state.garmentSubtype) {
                filters.garmentSubtype = state.garmentSubtype;
            }

            if (state.sizeLabel && filterOptions && filterOptions.sizeOptions) {
                var sizeOption = filterOptions.sizeOptions.find(function(opt) { return opt.label === state.sizeLabel; });
                if (sizeOption) {
                    if (typeof sizeOption.sizeMinNumber === 'number') {
                        filters.sizeMinNumber = sizeOption.sizeMinNumber;
                    }
                    if (typeof sizeOption.sizeMaxNumber === 'number') {
                        filters.sizeMaxNumber = sizeOption.sizeMaxNumber;
                    }
                    if (sizeOption.mainSizeCategory) {
                        filters.mainSizeCategory = sizeOption.mainSizeCategory;
                    }
                }
            }

            if (state.publishedRangeId && filterOptions && filterOptions.publishedDateOptions) {
                var rangeOpt = filterOptions.publishedDateOptions.find(function(opt) { return opt.id === state.publishedRangeId; });
                if (rangeOpt) {
                    if (rangeOpt.fromDate) {
                        filters.publishedFrom = rangeOpt.fromDate;
                    }
                    if (rangeOpt.toDate) {
                        filters.publishedTo = rangeOpt.toDate;
                    }
                }
            }

            return filters;
        }

        function updateUrlParams(updates, options) {
            var opts = options || {};
            var resetPage = !!opts.resetPage;
            var params = getUrlParams();

            Object.keys(updates).forEach(function(key) {
                var value = updates[key];
                if (value === null || value === undefined || value === '') {
                    params.delete(key);
                } else {
                    params.set(key, String(value));
                }
            });

            if (resetPage) {
                params.set('page', '1');
            }

            var qs = params.toString();
            var target = 'search_results.html';
            if (qs) {
                target += '?' + qs;
            }
            window.location.href = target;
        }

        function renderUserUtilities(container, summary) {
            if (!container) return;
            if (!summary) {
                container.innerHTML = '';
                return;
            }
            var parts = [];
            if (typeof summary.totalFavorites === 'number') {
                parts.push(summary.totalFavorites + ' favorites');
            }
            if (typeof summary.totalReadingLists === 'number') {
                parts.push(summary.totalReadingLists + ' reading lists');
            }
            if (typeof summary.totalCollections === 'number') {
                parts.push(summary.totalCollections + ' collections');
            }
            if (typeof summary.totalChecklistItems === 'number') {
                parts.push(summary.totalChecklistItems + ' checklist items');
            }
            if (summary.hasActiveNewsletterSubscription) {
                parts.push('newsletter: active');
            }

            if (parts.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = '\n                <div class="utility-summary-label">Your activity:</div>\n                <div class="utility-summary-items">' + parts.join(' \u00b7 ') + '</div>\n            ';
        }

        function renderSearchSummary(container, state, searchResults, tagMap) {
            if (!container) return;
            var total = searchResults && typeof searchResults.total === 'number' ? searchResults.total : 0;
            var appliedQuery = searchResults && typeof searchResults.appliedSearchQuery === 'string'
                ? searchResults.appliedSearchQuery
                : (state.query || '');
            var appliedTagIds = searchResults && Array.isArray(searchResults.appliedTagIds)
                ? searchResults.appliedTagIds
                : state.tagIds;

            var pieces = [];
            if (appliedQuery) {
                pieces.push('"' + appliedQuery + '"');
            }
            if (appliedTagIds && appliedTagIds.length > 0) {
                var tagNames = appliedTagIds.map(function(id) {
                    var tag = tagMap[id];
                    return tag && tag.name ? tag.name : id;
                }).filter(function(v) { return !!v; });
                if (tagNames.length > 0) {
                    pieces.push(tagNames.join(', '));
                }
            }

            var contextText = '';
            if (pieces.length > 0) {
                contextText = ' for ' + pieces.join(' and ');
            }

            var totalLabel = total === 1 ? '1 tutorial' : (total + ' tutorials');

            container.innerHTML = '\n                <div class="search-summary-text">\n                    <strong>Showing ' + totalLabel + contextText + '</strong>\n                </div>\n            ';
        }

        function renderInlineSearch(container, state) {
            if (!container) return;
            var value = state.query || '';
            container.innerHTML = '\n                <form class="inline-search-form" data-action="inline-search-submit" role="search">\n                    <label for="inlineSearchInput" class="inline-search-label">Search within tutorials</label>\n                    <div class="inline-search-fields">\n                        <input id="inlineSearchInput" name="query" type="search" class="inline-search-input" value="' + (value ? value.replace(/"/g, '&quot;') : '') + '" placeholder="Refine your search by keywords">\n                        <button type="submit" class="btn inline-search-button">Search</button>\n                    </div>\n                </form>\n            ';
        }

        function renderFilterSidebar(container, state, filterOptions, categories) {
            if (!container) return;
            var difficultyOptions = filterOptions && Array.isArray(filterOptions.difficultyOptions) ? filterOptions.difficultyOptions : [];
            var timeRangeOptions = filterOptions && Array.isArray(filterOptions.timeRangeOptions) ? filterOptions.timeRangeOptions : [];
            var materialOptions = filterOptions && Array.isArray(filterOptions.materialOptions) ? filterOptions.materialOptions : [];
            var toolOptions = filterOptions && Array.isArray(filterOptions.toolOptions) ? filterOptions.toolOptions : [];
            var ratingOptions = filterOptions && Array.isArray(filterOptions.ratingThresholdOptions) ? filterOptions.ratingThresholdOptions : [];
            var patternTypeOptions = filterOptions && Array.isArray(filterOptions.patternTypeOptions) ? filterOptions.patternTypeOptions : [];
            var garmentCategoryOptions = filterOptions && Array.isArray(filterOptions.garmentCategoryOptions) ? filterOptions.garmentCategoryOptions : [];
            var garmentSubtypeOptions = filterOptions && Array.isArray(filterOptions.garmentSubtypeOptions) ? filterOptions.garmentSubtypeOptions : [];
            var sizeOptions = filterOptions && Array.isArray(filterOptions.sizeOptions) ? filterOptions.sizeOptions : [];
            var publishedDateOptions = filterOptions && Array.isArray(filterOptions.publishedDateOptions) ? filterOptions.publishedDateOptions : [];
            var tagOptions = filterOptions && Array.isArray(filterOptions.tagOptions) ? filterOptions.tagOptions : [];

            var selectedDiffs = state.difficultyValues || [];
            var selectedTimeMin = state.minTimeMinutes;
            var selectedTimeMax = state.maxTimeMinutes;
            var selectedMaterialIds = state.materialIds || [];
            var selectedToolIds = state.toolIds || [];
            var selectedMinRating = typeof state.minRating === 'number' ? state.minRating : null;
            var selectedPatternType = state.patternType || '';
            var selectedGarmentCategory = state.garmentCategory || '';
            var selectedGarmentSubtype = state.garmentSubtype || '';
            var selectedSizeLabel = state.sizeLabel || '';
            var selectedPublishedRangeId = state.publishedRangeId || '';
            var selectedTagIds = state.tagIds || [];
            var selectedCategoryId = state.categoryId || '';

            function renderCategorySelect() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Category</h3>' +
                    '<div class="filter-group-body">' +
                    '<select class="filter-select" name="categoryId" data-action="filter-category-change">' +
                    '<option value="">All categories</option>';
                if (Array.isArray(categories)) {
                    categories.forEach(function(cat) {
                        var sel = selectedCategoryId === cat.id ? ' selected' : '';
                        html += '<option value="' + cat.id.replace(/"/g, '&quot;') + '"' + sel + '>' + (cat.name || cat.id) + '</option>';
                    });
                }
                html += '</select></div></div>';
                return html;
            }

            function renderDifficultyGroup() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Difficulty</h3>' +
                    '<div class="filter-group-body">';
                difficultyOptions.forEach(function(opt) {
                    var checked = selectedDiffs.indexOf(opt.value) !== -1 ? ' checked' : '';
                    html += '\n                        <label class="filter-checkbox">\n                            <input type="checkbox" value="' + opt.value.replace(/"/g, '&quot;') + '" data-action="filter-difficulty-change"' + checked + '> ' + (opt.label || opt.value) + '\n                        </label>';
                });
                html += '</div></div>';
                return html;
            }

            function renderTimeGroup() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Time to complete</h3>' +
                    '<div class="filter-group-body">';
                timeRangeOptions.forEach(function(opt) {
                    var isSelected = false;
                    if (typeof selectedTimeMin === 'number' && typeof selectedTimeMax === 'number') {
                        if (opt.minMinutes === selectedTimeMin && opt.maxMinutes === selectedTimeMax) {
                            isSelected = true;
                        }
                    }
                    var checked = isSelected ? ' checked' : '';
                    html += '\n                        <label class="filter-radio">\n                            <input type="radio" name="timeRange" value="' + opt.id.replace(/"/g, '&quot;') + '" data-action="filter-time-change"' + checked + '> ' + opt.label + '\n                        </label>';
                });
                html += '\n                        <label class="filter-radio">\n                            <input type="radio" name="timeRange" value="" data-action="filter-time-clear"' + (selectedTimeMin == null && selectedTimeMax == null ? ' checked' : '') + '> Any length\n                        </label>';
                html += '</div></div>';
                return html;
            }

            function renderMaterialsGroup() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Materials</h3>' +
                    '<div class="filter-group-body">';
                materialOptions.forEach(function(mat) {
                    var checked = selectedMaterialIds.indexOf(mat.id) !== -1 ? ' checked' : '';
                    html += '\n                        <label class="filter-checkbox">\n                            <input type="checkbox" value="' + mat.id.replace(/"/g, '&quot;') + '" data-action="filter-materials-change"' + checked + '> ' + (mat.name || mat.id) + '\n                        </label>';
                });
                html += '</div></div>';
                return html;
            }

            function renderToolsGroup() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Tools</h3>' +
                    '<div class="filter-group-body">';
                toolOptions.forEach(function(tool) {
                    var checked = selectedToolIds.indexOf(tool.id) !== -1 ? ' checked' : '';
                    html += '\n                        <label class="filter-checkbox">\n                            <input type="checkbox" value="' + tool.id.replace(/"/g, '&quot;') + '" data-action="filter-tools-change"' + checked + '> ' + (tool.name || tool.id) + '\n                        </label>';
                });
                html += '</div></div>';
                return html;
            }

            function renderRatingGroup() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Rating</h3>' +
                    '<div class="filter-group-body">';
                ratingOptions.forEach(function(opt) {
                    var checked = selectedMinRating !== null && selectedMinRating !== undefined && selectedMinRating === opt.minRating ? ' checked' : '';
                    html += '\n                        <label class="filter-radio">\n                            <input type="radio" name="ratingThreshold" value="' + String(opt.minRating) + '" data-action="filter-rating-change"' + checked + '> ' + opt.label + '\n                        </label>';
                });
                html += '\n                        <label class="filter-radio">\n                            <input type="radio" name="ratingThreshold" value="" data-action="filter-rating-clear"' + (selectedMinRating === null || selectedMinRating === undefined ? ' checked' : '') + '> Any rating\n                        </label>';
                html += '</div></div>';
                return html;
            }

            function renderPatternTypeGroup() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Pattern type</h3>' +
                    '<div class="filter-group-body">';
                html += '\n                    <select class="filter-select" name="patternType" data-action="filter-pattern-type-change">\n                        <option value="">Any pattern type</option>';
                patternTypeOptions.forEach(function(opt) {
                    var sel = selectedPatternType === opt.value ? ' selected' : '';
                    html += '<option value="' + opt.value.replace(/"/g, '&quot;') + '"' + sel + '>' + opt.label + '</option>';
                });
                html += '</select></div></div>';
                return html;
            }

            function renderGarmentGroup() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Garment</h3>' +
                    '<div class="filter-group-body garment-group">';
                html += '\n                    <label class="filter-label" for="garmentCategorySelect">Category</label>\n                    <select id="garmentCategorySelect" class="filter-select" name="garmentCategory" data-action="filter-garment-category-change">\n                        <option value="">Any category</option>';
                garmentCategoryOptions.forEach(function(opt) {
                    var sel = selectedGarmentCategory === opt.value ? ' selected' : '';
                    html += '<option value="' + opt.value.replace(/"/g, '&quot;') + '"' + sel + '>' + opt.label + '</option>';
                });
                html += '</select>';

                var relevantSubtypes = garmentSubtypeOptions.filter(function(opt) {
                    return !selectedGarmentCategory || opt.parentGarmentCategory === selectedGarmentCategory;
                });

                html += '\n                    <label class="filter-label" for="garmentSubtypeSelect">Subtype</label>\n                    <select id="garmentSubtypeSelect" class="filter-select" name="garmentSubtype" data-action="filter-garment-subtype-change">\n                        <option value="">Any subtype</option>';
                relevantSubtypes.forEach(function(opt) {
                    var sel = selectedGarmentSubtype === opt.value ? ' selected' : '';
                    html += '<option value="' + opt.value.replace(/"/g, '&quot;') + '"' + sel + '>' + opt.label + '</option>';
                });

                html += '</select>'; 
                html += '</div></div>';
                return html;
            }

            function renderSizeGroup() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Size</h3>' +
                    '<div class="filter-group-body">';
                html += '\n                    <select class="filter-select" name="sizeLabel" data-action="filter-size-change">\n                        <option value="">Any size</option>';
                sizeOptions.forEach(function(opt) {
                    var sel = selectedSizeLabel === opt.label ? ' selected' : '';
                    html += '<option value="' + opt.label.replace(/"/g, '&quot;') + '"' + sel + '>' + opt.label + '</option>';
                });
                html += '</select></div></div>';
                return html;
            }

            function renderPublishedGroup() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Published</h3>' +
                    '<div class="filter-group-body">';
                html += '\n                    <select class="filter-select" name="publishedRangeId" data-action="filter-published-range-change">\n                        <option value="">Any time</option>';
                publishedDateOptions.forEach(function(opt) {
                    var sel = selectedPublishedRangeId === opt.id ? ' selected' : '';
                    html += '<option value="' + opt.id.replace(/"/g, '&quot;') + '"' + sel + '>' + opt.label + '</option>';
                });
                html += '</select></div></div>';
                return html;
            }

            function renderTagGroup() {
                var html = '<div class="filter-group">' +
                    '<h3 class="filter-group-title">Tags</h3>' +
                    '<div class="filter-group-body tag-group">';
                tagOptions.forEach(function(tag) {
                    var checked = selectedTagIds.indexOf(tag.id) !== -1 ? ' checked' : '';
                    html += '\n                        <label class="filter-checkbox tag-filter-checkbox">\n                            <input type="checkbox" value="' + tag.id.replace(/"/g, '&quot;') + '" data-action="filter-tag-change"' + checked + '> ' + (tag.name || tag.id) + '\n                        </label>';
                });
                html += '</div></div>';
                return html;
            }

            container.innerHTML = '\n                <div class="filter-sidebar-inner">\n                    <h2 class="filter-sidebar-title">Filter tutorials</h2>\n                    ' +
                    renderCategorySelect() +
                    renderDifficultyGroup() +
                    renderTimeGroup() +
                    renderMaterialsGroup() +
                    renderToolsGroup() +
                    renderRatingGroup() +
                    renderPatternTypeGroup() +
                    renderGarmentGroup() +
                    renderSizeGroup() +
                    renderPublishedGroup() +
                    renderTagGroup() +
                '\n                </div>\n            ';
        }

        function renderAppliedFilters(container, state, filterOptions, tagMap, categories) {
            if (!container) return;

            var chips = [];

            if (state.query) {
                chips.push({ type: 'query', value: state.query, label: 'Search: "' + state.query + '"' });
            }

            if (state.categoryId) {
                var catLabel = state.categoryId;
                if (Array.isArray(categories)) {
                    var cat = categories.find(function(c) { return c.id === state.categoryId; });
                    if (cat && cat.name) catLabel = cat.name;
                }
                chips.push({ type: 'categoryId', value: state.categoryId, label: 'Category: ' + catLabel });
            }

            if (Array.isArray(state.difficultyValues)) {
                state.difficultyValues.forEach(function(diff) {
                    var label = diff;
                    if (filterOptions && Array.isArray(filterOptions.difficultyOptions)) {
                        var opt = filterOptions.difficultyOptions.find(function(o) { return o.value === diff; });
                        if (opt && opt.label) label = opt.label;
                    }
                    chips.push({ type: 'difficulty', value: diff, label: 'Difficulty: ' + label });
                });
            }

            if (state.minTimeMinutes != null || state.maxTimeMinutes != null) {
                var timeLabel = '';
                if (filterOptions && Array.isArray(filterOptions.timeRangeOptions)) {
                    var timeOpt = filterOptions.timeRangeOptions.find(function(opt) {
                        return (state.minTimeMinutes != null && opt.minMinutes === state.minTimeMinutes) && (state.maxTimeMinutes != null && opt.maxMinutes === state.maxTimeMinutes);
                    });
                    if (timeOpt && timeOpt.label) {
                        timeLabel = timeOpt.label;
                    }
                }
                if (!timeLabel) {
                    var minPart = state.minTimeMinutes != null ? state.minTimeMinutes + ' min' : '';
                    var maxPart = state.maxTimeMinutes != null ? state.maxTimeMinutes + ' min' : '';
                    timeLabel = 'Time: ' + (minPart || '0') + (maxPart ? '–' + maxPart : '+');
                }
                chips.push({ type: 'time', value: 'time', label: timeLabel });
            }

            if (Array.isArray(state.materialIds)) {
                state.materialIds.forEach(function(id) {
                    var label = id;
                    if (filterOptions && Array.isArray(filterOptions.materialOptions)) {
                        var mat = filterOptions.materialOptions.find(function(m) { return m.id === id; });
                        if (mat && mat.name) label = mat.name;
                    }
                    chips.push({ type: 'materialIds', value: id, label: 'Material: ' + label });
                });
            }

            if (Array.isArray(state.toolIds)) {
                state.toolIds.forEach(function(id) {
                    var label = id;
                    if (filterOptions && Array.isArray(filterOptions.toolOptions)) {
                        var tool = filterOptions.toolOptions.find(function(t) { return t.id === id; });
                        if (tool && tool.name) label = tool.name;
                    }
                    chips.push({ type: 'toolIds', value: id, label: 'Tool: ' + label });
                });
            }

            if (state.minRating != null) {
                var ratingLabel = 'Rating: ' + state.minRating + '+ stars';
                if (filterOptions && Array.isArray(filterOptions.ratingThresholdOptions)) {
                    var rOpt = filterOptions.ratingThresholdOptions.find(function(o) { return o.minRating === state.minRating; });
                    if (rOpt && rOpt.label) ratingLabel = rOpt.label;
                }
                chips.push({ type: 'minRating', value: String(state.minRating), label: ratingLabel });
            }

            if (state.patternType) {
                var pLabel = state.patternType;
                if (filterOptions && Array.isArray(filterOptions.patternTypeOptions)) {
                    var pOpt = filterOptions.patternTypeOptions.find(function(o) { return o.value === state.patternType; });
                    if (pOpt && pOpt.label) pLabel = pOpt.label;
                }
                chips.push({ type: 'patternType', value: state.patternType, label: 'Pattern: ' + pLabel });
            }

            if (state.garmentCategory) {
                var gLabel = state.garmentCategory;
                if (filterOptions && Array.isArray(filterOptions.garmentCategoryOptions)) {
                    var gOpt = filterOptions.garmentCategoryOptions.find(function(o) { return o.value === state.garmentCategory; });
                    if (gOpt && gOpt.label) gLabel = gOpt.label;
                }
                chips.push({ type: 'garmentCategory', value: state.garmentCategory, label: 'Garment: ' + gLabel });
            }

            if (state.garmentSubtype) {
                var sLabel = state.garmentSubtype;
                if (filterOptions && Array.isArray(filterOptions.garmentSubtypeOptions)) {
                    var sOpt = filterOptions.garmentSubtypeOptions.find(function(o) { return o.value === state.garmentSubtype; });
                    if (sOpt && sOpt.label) sLabel = sOpt.label;
                }
                chips.push({ type: 'garmentSubtype', value: state.garmentSubtype, label: 'Subtype: ' + sLabel });
            }

            if (state.sizeLabel) {
                chips.push({ type: 'sizeLabel', value: state.sizeLabel, label: 'Size: ' + state.sizeLabel });
            }

            if (state.publishedRangeId) {
                var pubLabel = state.publishedRangeId;
                if (filterOptions && Array.isArray(filterOptions.publishedDateOptions)) {
                    var pr = filterOptions.publishedDateOptions.find(function(o) { return o.id === state.publishedRangeId; });
                    if (pr && pr.label) pubLabel = pr.label;
                }
                chips.push({ type: 'publishedRangeId', value: state.publishedRangeId, label: pubLabel });
            }

            if (Array.isArray(state.tagIds)) {
                state.tagIds.forEach(function(id) {
                    var tag = tagMap[id];
                    var label = tag && tag.name ? tag.name : id;
                    chips.push({ type: 'tagIds', value: id, label: label });
                });
            }

            if (chips.length === 0) {
                container.innerHTML = '\n                    <div class="applied-filters-empty">\n                        No filters applied.\n                    </div>\n                ';
                return;
            }

            var chipsHtml = chips.map(function(chip) {
                return '\n                    <button type="button" class="filter-chip" data-action="remove-filter-chip" data-chip-type="' + chip.type.replace(/"/g, '&quot;') + '" data-chip-value="' + chip.value.replace(/"/g, '&quot;') + '">\n                        <span class="filter-chip-label">' + chip.label + '</span>\n                        <span class="filter-chip-remove" aria-hidden="true">\u00d7</span>\n                        <span class="visually-hidden">Remove filter</span>\n                    </button>';
            }).join('');

            container.innerHTML = '\n                <div class="applied-filters-bar-inner">\n                    <div class="applied-filters-chips">' + chipsHtml + '\n                    </div>\n                    <button type="button" class="clear-filters-button" data-action="clear-all-filters">Clear filters</button>\n                </div>\n            ';
        }

        function renderSortControl(container, state, searchResults) {
            if (!container) return;
            var sortOptions = searchResults && Array.isArray(searchResults.availableSortOptions) ? searchResults.availableSortOptions : [];
            var activeSort = state.sortBy || '';
            if (!activeSort && sortOptions.length > 0) {
                var def = sortOptions.find(function(o) { return o.isDefault; });
                if (def) activeSort = def.value;
            }

            var optionsHtml = sortOptions.map(function(opt) {
                var sel = activeSort === opt.value ? ' selected' : '';
                return '<option value="' + opt.value.replace(/"/g, '&quot;') + '"' + sel + '>' + opt.label + '</option>';
            }).join('');

            container.innerHTML = '\n                <label class="sort-control-label" for="sortSelect">Sort by:</label>\n                <select id="sortSelect" class="sort-select" data-action="change-sort">\n                    ' + optionsHtml + '\n                </select>\n            ';
        }

        function renderTutorialResults(container, searchResults) {
            if (!container) return;
            var tutorials = searchResults && Array.isArray(searchResults.tutorials) ? searchResults.tutorials : [];

            if (!tutorials.length) {
                container.innerHTML = '\n                    <div class="no-results-message">\n                        <p>No tutorials match your current search. Try adjusting your keywords or removing some filters.</p>\n                    </div>\n                ';
                return;
            }

            var cardsHtml = tutorials.map(function(tutorial) {
                var ratingText = '';
                if (typeof tutorial.ratingAverage === 'number' && typeof tutorial.ratingCount === 'number') {
                    ratingText = tutorial.ratingAverage.toFixed(1) + ' \u2605 (' + tutorial.ratingCount + ')';
                } else if (typeof tutorial.ratingAverage === 'number') {
                    ratingText = tutorial.ratingAverage.toFixed(1) + ' \u2605';
                }

                var tagsHtml = '';
                if (Array.isArray(tutorial.tagNames) && tutorial.tagNames.length > 0) {
                    tagsHtml = '<ul class="tutorial-tag-list">' + tutorial.tagNames.map(function(name) {
                        return '<li class="tutorial-tag-item"><span class="tutorial-tag-label">' + name + '</span></li>';
                    }).join('') + '</ul>';
                }

                var metaParts = [];
                if (tutorial.categoryName) {
                    metaParts.push(tutorial.categoryName);
                }
                if (tutorial.difficultyLabel) {
                    metaParts.push(tutorial.difficultyLabel);
                }
                if (tutorial.estimatedTimeLabel) {
                    metaParts.push(tutorial.estimatedTimeLabel);
                }
                var metaLine = metaParts.join(' \u00b7 ');

                var patternBadges = '';
                if (tutorial.hasPattern) {
                    patternBadges += '<span class="tutorial-meta-badge">Pattern included</span>';
                }
                if (tutorial.isPrintViewAvailable) {
                    patternBadges += '<span class="tutorial-meta-badge">Print view</span>';
                }

                var imageHtml = '';
                if (tutorial.primaryImageUrl) {
                    imageHtml = '<div class="tutorial-card-image-wrapper"><img src="' + tutorial.primaryImageUrl.replace(/"/g, '&quot;') + '" alt="' + (tutorial.title || 'Tutorial image').replace(/"/g, '&quot;') + '" class="tutorial-card-image"></div>';
                }

                return '\n                    <article class="tutorial-card" data-tutorial-id="' + String(tutorial.id).split('&').join('&amp;').split('"').join('&quot;') + '" data-action="open-tutorial-card">\n                        ' + imageHtml + '\n                        <div class="tutorial-card-body">\n                            <h2 class="tutorial-card-title">\n                                <a href="tutorial.html?id=' + encodeURIComponent(tutorial.id) + '" class="tutorial-card-title-link" data-action="open-tutorial-title" data-tutorial-id="' + String(tutorial.id).split('&').join('&amp;').split('"').join('&quot;') + '">' + tutorial.title + '</a>\n                            </h2>\n                            <div class="tutorial-card-meta">\n                                ' + (metaLine ? '<span class="tutorial-meta-line">' + metaLine + '</span>' : '') +\n                                (ratingText ? '<span class="tutorial-meta-rating">' + ratingText + '</span>' : '') +\n                                (patternBadges ? '<span class="tutorial-meta-badges">' + patternBadges + '</span>' : '') +\n                            '</div>\n                            ' + (tutorial.summary ? '<p class="tutorial-card-summary">' + tutorial.summary + '</p>' : '') + '\n                            ' + tagsHtml + '\n                        </div>\n                    </article>';
            }).join('');

            container.innerHTML = '\n                <div class="tutorial-results-list">\n                    ' + cardsHtml + '\n                </div>\n            ';
        }

        function renderPagination(container, searchResults) {
            if (!container) return;
            var page = searchResults && typeof searchResults.page === 'number' ? searchResults.page : 1;
            var totalPages = searchResults && typeof searchResults.totalPages === 'number' ? searchResults.totalPages : 1;

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            var buttonsHtml = '';

            if (page > 1) {
                buttonsHtml += '\n                    <button type="button" class="pagination-button" data-action="page-first" data-page="1">\u00ab First</button>\n                    <button type="button" class="pagination-button" data-action="page-prev" data-page="' + (page - 1) + '">\u2039 Prev</button>';
            }

            for (var p = 1; p <= totalPages; p++) {
                var cls = 'pagination-button';
                if (p === page) {
                    cls += ' is-current';
                }
                buttonsHtml += '\n                    <button type="button" class="' + cls + '" data-action="page-jump" data-page="' + p + '">' + p + '</button>';
            }

            if (page < totalPages) {
                buttonsHtml += '\n                    <button type="button" class="pagination-button" data-action="page-next" data-page="' + (page + 1) + '">Next \u203a</button>\n                    <button type="button" class="pagination-button" data-action="page-last" data-page="' + totalPages + '">Last \u00bb</button>';
            }

            container.innerHTML = '\n                <div class="pagination-inner">\n                    ' + buttonsHtml + '\n                </div>\n            ';
        }

        var urlState = parseUrlState();
        var filterContext = buildFilterContext(urlState);
        var filterOptions = null;
        var searchResults = null;
        var tagDetailsMap = {};
        var categories = [];
        var userUtilitySummary = null;

        try {
            categories = WebsiteSDK.getNavigationCategories();
        } catch (e) {
            console.error('Error loading navigation categories:', e);
        }

        try {
            userUtilitySummary = WebsiteSDK.getUserUtilitySummary();
        } catch (e2) {
            console.error('Error loading user utility summary:', e2);
        }

        try {
            filterOptions = WebsiteSDK.getTutorialFilterOptions(filterContext);
        } catch (e3) {
            console.error('Error loading tutorial filter options:', e3);
            filterOptions = {};
        }

        var filters = buildSearchFilters(urlState, filterOptions);

        try {
            searchResults = WebsiteSDK.searchTutorials(urlState.query || '', urlState.tagIds || [], filters, urlState.sortBy || undefined, urlState.page || 1, DEFAULT_PAGE_SIZE);
        } catch (e4) {
            console.error('Error searching tutorials:', e4);
            searchResults = { tutorials: [], page: 1, totalPages: 1, total: 0, availableSortOptions: [] };
        }

        var tagIdSet = {};
        (urlState.tagIds || []).forEach(function(id) { tagIdSet[id] = true; });
        if (searchResults && Array.isArray(searchResults.appliedTagIds)) {
            searchResults.appliedTagIds.forEach(function(id) { tagIdSet[id] = true; });
        }
        Object.keys(tagIdSet).forEach(function(tagId) {
            try {
                var tagInfo = WebsiteSDK.getTagInfo(tagId);
                if (tagInfo && tagInfo.id) {
                    tagDetailsMap[tagInfo.id] = tagInfo;
                }
            } catch (e5) {
                console.error('Error loading tag info for', tagId, e5);
            }
        });

        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
            var type = element.getAttribute('data-populate');
            if (!type) return;
            if (type === 'user-utilities') {
                renderUserUtilities(element, userUtilitySummary);
            } else if (type === 'search-summary') {
                renderSearchSummary(element, urlState, searchResults, tagDetailsMap);
            } else if (type === 'inline-search') {
                renderInlineSearch(element, urlState);
            } else if (type === 'filter-sidebar') {
                renderFilterSidebar(element, urlState, filterOptions || {}, categories || []);
            } else if (type === 'applied-filters') {
                renderAppliedFilters(element, urlState, filterOptions || {}, tagDetailsMap || {}, categories || []);
            } else if (type === 'sort-control') {
                renderSortControl(element, urlState, searchResults || {});
            } else if (type === 'tutorial-results') {
                renderTutorialResults(element, searchResults || {});
            } else if (type === 'pagination') {
                renderPagination(element, searchResults || {});
            }
        });

        function handleHeaderSearchSubmit(event) {
            event.preventDefault();
            var form = event.target;
            var input = form.querySelector('input[name="query"]');
            var query = input && input.value ? input.value.trim() : '';
            var params = new URLSearchParams();
            if (query) {
                params.set('query', query);
            }
            var target = 'search_results.html';
            var qs = params.toString();
            if (qs) target += '?' + qs;
            window.location.href = target;
        }

        function handleInlineSearchSubmit(event) {
            event.preventDefault();
            var form = event.target;
            var input = form.querySelector('input[name="query"]');
            var query = input && input.value ? input.value.trim() : '';
            updateUrlParams({ query: query || null }, { resetPage: true });
        }

        function handleDifficultyChange() {
            var checkboxes = document.querySelectorAll('input[data-action="filter-difficulty-change"]');
            var values = [];
            checkboxes.forEach(function(cb) {
                if (cb.checked) values.push(cb.value);
            });
            updateUrlParams({ difficulty: values.length ? values.join(',') : null }, { resetPage: true });
        }

        function handleTimeChange(event) {
            var input = event.target;
            var timeId = input.value;
            if (!timeId) {
                updateUrlParams({ minTimeMinutes: null, maxTimeMinutes: null }, { resetPage: true });
                return;
            }
            if (!filterOptions || !Array.isArray(filterOptions.timeRangeOptions)) {
                return;
            }
            var opt = filterOptions.timeRangeOptions.find(function(o) { return o.id === timeId; });
            if (!opt) return;
            var updates = {};
            updates.minTimeMinutes = typeof opt.minMinutes === 'number' ? opt.minMinutes : null;
            updates.maxTimeMinutes = typeof opt.maxMinutes === 'number' ? opt.maxMinutes : null;
            updateUrlParams(updates, { resetPage: true });
        }

        function handleTimeClear() {
            updateUrlParams({ minTimeMinutes: null, maxTimeMinutes: null }, { resetPage: true });
        }

        function handleMaterialsChange() {
            var checkboxes = document.querySelectorAll('input[data-action="filter-materials-change"]');
            var values = [];
            checkboxes.forEach(function(cb) { if (cb.checked) values.push(cb.value); });
            updateUrlParams({ materialIds: values.length ? values.join(',') : null }, { resetPage: true });
        }

        function handleToolsChange() {
            var checkboxes = document.querySelectorAll('input[data-action="filter-tools-change"]');
            var values = [];
            checkboxes.forEach(function(cb) { if (cb.checked) values.push(cb.value); });
            updateUrlParams({ toolIds: values.length ? values.join(',') : null }, { resetPage: true });
        }

        function handleRatingChange(event) {
            var value = event.target.value;
            if (!value) {
                updateUrlParams({ minRating: null }, { resetPage: true });
                return;
            }
            var num = Number(value);
            if (Number.isNaN(num)) {
                updateUrlParams({ minRating: null }, { resetPage: true });
                return;
            }
            updateUrlParams({ minRating: num }, { resetPage: true });
        }

        function handleRatingClear() {
            updateUrlParams({ minRating: null }, { resetPage: true });
        }

        function handlePatternTypeChange(event) {
            var value = event.target.value;
            updateUrlParams({ patternType: value || null }, { resetPage: true });
        }

        function handleGarmentCategoryChange(event) {
            var value = event.target.value;
            var updates = { garmentCategory: value || null };
            updates.garmentSubtype = null;
            updateUrlParams(updates, { resetPage: true });
        }

        function handleGarmentSubtypeChange(event) {
            var value = event.target.value;
            updateUrlParams({ garmentSubtype: value || null }, { resetPage: true });
        }

        function handleSizeChange(event) {
            var value = event.target.value;
            updateUrlParams({ sizeLabel: value || null }, { resetPage: true });
        }

        function handlePublishedRangeChange(event) {
            var value = event.target.value;
            updateUrlParams({ publishedRangeId: value || null }, { resetPage: true });
        }

        function handleCategoryFilterChange(event) {
            var value = event.target.value;
            updateUrlParams({ categoryId: value || null }, { resetPage: true });
        }

        function handleTagFilterChange() {
            var checkboxes = document.querySelectorAll('input[data-action="filter-tag-change"]');
            var values = [];
            checkboxes.forEach(function(cb) { if (cb.checked) values.push(cb.value); });
            updateUrlParams({ tagIds: values.length ? values.join(',') : null }, { resetPage: true });
        }

        function handleSortChange(event) {
            var value = event.target.value;
            updateUrlParams({ sortBy: value || null }, { resetPage: true });
        }

        function handlePageChange(targetPage) {
            if (!targetPage) return;
            updateUrlParams({ page: targetPage }, { resetPage: false });
        }

        function handleRemoveFilterChip(event) {
            var btn = event.currentTarget;
            var type = btn.getAttribute('data-chip-type');
            var value = btn.getAttribute('data-chip-value');
            if (!type) return;

            var params = getUrlParams();
            if (type === 'query') {
                params.delete('query');
            } else if (type === 'categoryId') {
                params.delete('categoryId');
            } else if (type === 'difficulty') {
                var diffValues = csvToArray(params.get('difficulty'));
                var filtered = diffValues.filter(function(v) { return v !== value; });
                if (filtered.length) params.set('difficulty', filtered.join(',')); else params.delete('difficulty');
            } else if (type === 'time') {
                params.delete('minTimeMinutes');
                params.delete('maxTimeMinutes');
            } else if (type === 'materialIds') {
                var matValues = csvToArray(params.get('materialIds'));
                var matFiltered = matValues.filter(function(v) { return v !== value; });
                if (matFiltered.length) params.set('materialIds', matFiltered.join(',')); else params.delete('materialIds');
            } else if (type === 'toolIds') {
                var toolValues = csvToArray(params.get('toolIds'));
                var toolFiltered = toolValues.filter(function(v) { return v !== value; });
                if (toolFiltered.length) params.set('toolIds', toolFiltered.join(',')); else params.delete('toolIds');
            } else if (type === 'minRating') {
                params.delete('minRating');
            } else if (type === 'patternType') {
                params.delete('patternType');
            } else if (type === 'garmentCategory') {
                params.delete('garmentCategory');
                params.delete('garmentSubtype');
            } else if (type === 'garmentSubtype') {
                params.delete('garmentSubtype');
            } else if (type === 'sizeLabel') {
                params.delete('sizeLabel');
            } else if (type === 'publishedRangeId') {
                params.delete('publishedRangeId');
            } else if (type === 'tagIds') {
                var tagValues = csvToArray(params.get('tagIds'));
                var tagFiltered = tagValues.filter(function(v) { return v !== value; });
                if (tagFiltered.length) params.set('tagIds', tagFiltered.join(',')); else params.delete('tagIds');
            }

            params.delete('page');
            var target = 'search_results.html';
            var qs = params.toString();
            if (qs) target += '?' + qs;
            window.location.href = target;
        }

        function handleClearAllFilters() {
            var params = getUrlParams();
            params.delete('categoryId');
            params.delete('difficulty');
            params.delete('minTimeMinutes');
            params.delete('maxTimeMinutes');
            params.delete('materialIds');
            params.delete('toolIds');
            params.delete('minRating');
            params.delete('patternType');
            params.delete('garmentCategory');
            params.delete('garmentSubtype');
            params.delete('sizeLabel');
            params.delete('publishedRangeId');
            params.delete('page');
            var target = 'search_results.html';
            var qs = params.toString();
            if (qs) target += '?' + qs;
            window.location.href = target;
        }

        function handleOpenTutorialCard(event) {
            var card = event.currentTarget;
            var id = card.getAttribute('data-tutorial-id');
            if (!id) return;
            window.location.href = 'tutorial.html?id=' + encodeURIComponent(id);
        }

        var actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(element) {
            var action = element.getAttribute('data-action');
            if (!action) return;

            if (action === 'header-search-submit') {
                element.addEventListener('submit', handleHeaderSearchSubmit);
            } else if (action === 'inline-search-submit') {
                element.addEventListener('submit', handleInlineSearchSubmit);
            } else if (action === 'filter-difficulty-change') {
                element.addEventListener('change', handleDifficultyChange);
            } else if (action === 'filter-time-change') {
                element.addEventListener('change', handleTimeChange);
            } else if (action === 'filter-time-clear') {
                element.addEventListener('change', handleTimeClear);
            } else if (action === 'filter-materials-change') {
                element.addEventListener('change', handleMaterialsChange);
            } else if (action === 'filter-tools-change') {
                element.addEventListener('change', handleToolsChange);
            } else if (action === 'filter-rating-change') {
                element.addEventListener('change', handleRatingChange);
            } else if (action === 'filter-rating-clear') {
                element.addEventListener('change', handleRatingClear);
            } else if (action === 'filter-pattern-type-change') {
                element.addEventListener('change', handlePatternTypeChange);
            } else if (action === 'filter-garment-category-change') {
                element.addEventListener('change', handleGarmentCategoryChange);
            } else if (action === 'filter-garment-subtype-change') {
                element.addEventListener('change', handleGarmentSubtypeChange);
            } else if (action === 'filter-size-change') {
                element.addEventListener('change', handleSizeChange);
            } else if (action === 'filter-published-range-change') {
                element.addEventListener('change', handlePublishedRangeChange);
            } else if (action === 'filter-category-change') {
                element.addEventListener('change', handleCategoryFilterChange);
            } else if (action === 'filter-tag-change') {
                element.addEventListener('change', handleTagFilterChange);
            } else if (action === 'change-sort') {
                element.addEventListener('change', handleSortChange);
            } else if (action === 'page-first' || action === 'page-prev' || action === 'page-next' || action === 'page-last' || action === 'page-jump') {
                element.addEventListener('click', function(ev) {
                    var btn = ev.currentTarget;
                    var pageVal = btn.getAttribute('data-page');
                    if (!pageVal) return;
                    handlePageChange(pageVal);
                });
            } else if (action === 'remove-filter-chip') {
                element.addEventListener('click', handleRemoveFilterChip);
            } else if (action === 'clear-all-filters') {
                element.addEventListener('click', handleClearAllFilters);
            } else if (action === 'open-tutorial-card') {
                element.addEventListener('click', handleOpenTutorialCard);
            } else if (action === 'open-tutorial-title') {
                element.addEventListener('click', function(ev) {
                    var id = element.getAttribute('data-tutorial-id');
                    if (!id) return;
                    if (ev.ctrlKey || ev.metaKey || ev.button === 1) {
                        return;
                    }
                    ev.preventDefault();
                    window.location.href = 'tutorial.html?id=' + encodeURIComponent(id);
                });
            }
        });
    });
    </script>
</body>
</html>
