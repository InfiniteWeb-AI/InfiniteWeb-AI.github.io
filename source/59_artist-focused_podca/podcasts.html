<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artist Podcast &amp; Blog</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="podcasts.css" />
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="site-branding">
                <a href="index.html" class="site-title">Gajos Del Oficio</a>
                <p class="site-tagline">Artist-focused podcasts &amp; stories</p>
            </div>
            <nav class="primary-navigation" aria-label="Primary">
                <ul class="nav-row nav-row-top">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link" title="Homepage with personalized artist-focused feed">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="podcasts.html" class="nav-link" title="Browse and filter all podcast episodes">Podcasts</a>
                    </li>
                    <li class="nav-item">
                        <a href="blog.html" class="nav-link" title="Browse and search all blog articles">Blog</a>
                    </li>
                    <li class="nav-item">
                        <a href="series.html" class="nav-link" title="Directory of podcast series and shows">Series</a>
                    </li>
                    <li class="nav-item">
                        <a href="tags.html" class="nav-link" title="Browse topics and open tag-specific content pages">Tags</a>
                    </li>
                </ul>
                <ul class="nav-row nav-row-bottom">
                    <li class="nav-item">
                        <a href="playlists.html" class="nav-link" title="View and manage podcast playlists">Playlists</a>
                    </li>
                    <li class="nav-item">
                        <a href="reading_list.html" class="nav-link" title="View bookmarks and named reading lists">Reading List</a>
                    </li>
                    <li class="nav-item nav-item-highlight">
                        <a href="queue.html" class="nav-link nav-link-highlight" title="View and manage the current listening queue">Queue</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-content" role="main">
        <div class="content-inner">
            <section class="podcasts-page" data-component="initialization-controller">
                <div class="podcasts-grid">
                    <div class="podcasts-main">
                        <section class="podcasts-controls" aria-label="Filter and sort episodes">
                            <div class="podcasts-filter-sort-row">
                                <div class="podcasts-filter-bar" data-component="podcast-filter-bar" data-populate="podcast-filter-options">
                                    <!-- Filters populated via JavaScript -->
                                </div>
                                <div class="podcasts-sort-control" data-component="podcast-sort-control" data-populate="podcast-sort-options">
                                    <!-- Sort options populated via JavaScript -->
                                </div>
                            </div>
                        </section>

                        <section class="podcasts-results" aria-label="Podcast episodes" aria-live="polite">
                            <header class="podcasts-results-header">
                                <p class="results-summary" data-populate="episode-results-summary"></p>
                            </header>

                            <ul class="episode-list" data-component="episode-results-list" data-populate="podcast-episodes">
                                <!-- Episode cards rendered via JavaScript -->
                            </ul>

                            <nav class="pagination" data-component="pagination-controls" data-populate="podcast-pagination" aria-label="Episodes pagination">
                                <!-- Pagination controls rendered via JavaScript -->
                            </nav>
                        </section>
                    </div>

                    <aside class="podcasts-sidebar">
                        <aside class="widget widget-search" data-component="podcast-search-form">
                            <h2 class="widget-title">Search episodes</h2>
                            <div class="widget-content">
                                <form class="search-form" data-action="search-form" role="search" aria-label="Search podcast episodes">
                                    <div class="form-group">
                                        <label for="podcastSearchInput">Keyword</label>
                                        <input type="search" id="podcastSearchInput" name="query" placeholder="Search by guest, topic, or episode" />
                                    </div>
                                    <div class="form-group">
                                        <button type="submit" class="button button-primary">Search</button>
                                    </div>
                                </form>
                            </div>
                        </aside>
                    </aside>
                </div>

                <!-- Add to Playlist Dialog -->
                <div class="modal-backdrop is-hidden" data-component="add-to-playlist-dialog" data-action="playlist-dialog-backdrop">
                    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="addToPlaylistTitle">
                        <button type="button" class="modal-close" aria-label="Close dialog" data-action="close-add-to-playlist">&times;</button>
                        <h2 id="addToPlaylistTitle">Add to playlist</h2>
                        <form class="playlist-dialog-form" novalidate>
                            <div class="form-group">
                                <label for="existingPlaylistSelect">Choose existing playlist</label>
                                <select id="existingPlaylistSelect" name="playlistId">
                                    <option value="">Select a playlist</option>
                                    <!-- Options populated from localStorage via JavaScript -->
                                </select>
                            </div>
                            <div class="form-group">
                                <button type="button" class="button" data-action="confirm-add-to-playlist">Add to selected playlist</button>
                            </div>
                            <hr />
                            <div class="form-group">
                                <label for="newPlaylistName">Or create new playlist</label>
                                <input type="text" id="newPlaylistName" name="name" placeholder="New playlist name" />
                            </div>
                            <div class="form-group">
                                <label for="newPlaylistDescription">Description (optional)</label>
                                <textarea id="newPlaylistDescription" name="description" rows="3"></textarea>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="button button-primary" data-action="create-new-playlist">Create playlist</button>
                                <button type="button" class="button" data-action="cancel-add-to-playlist">Cancel</button>
                            </div>
                        </form>
                        <div class="playlist-dialog-feedback" data-populate="playlist-dialog-feedback" aria-live="polite"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <nav class="footer-navigation" aria-label="Footer">
                <ul class="footer-menu">
                    <li class="footer-item">
                        <a href="about.html" class="footer-link" title="Learn more about this artist-focused podcast and blog">About</a>
                    </li>
                    <li class="footer-item">
                        <a href="contact.html" class="footer-link" title="Send feedback or questions to the site owner">Contact</a>
                    </li>
                    <li class="footer-item">
                        <a href="help.html" class="footer-link" title="Get help using playlists, bookmarks, comments and other features">Help / FAQ</a>
                    </li>
                    <li class="footer-item">
                        <a href="feed_settings.html" class="footer-link" title="Adjust homepage topics and content type preferences">Customize Feed</a>
                    </li>
                </ul>
            </nav>
            <p class="footer-copy">&copy; <span class="footer-year">2024</span> Gajos Del Oficio. All rights reserved.</p>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- Helpers ---
        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDate(value) {
            if (!value) return '';
            var date = new Date(value);
            if (isNaN(date.getTime())) return '';
            return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function readUrlState(filterOptions) {
            var params = new URLSearchParams(window.location.search);
            var state = {
                query: params.get('query') || '',
                tag_id: params.get('tag_id') || '',
                duration_preset: params.get('duration_preset') || '',
                year: params.get('year') || '',
                sort: params.get('sort') || '',
                page: parseInt(params.get('page') || '1', 10),
                page_size: parseInt(params.get('page_size') || '20', 10)
            };

            if (!state.page || state.page < 1) state.page = 1;
            if (!state.page_size || state.page_size < 1) state.page_size = 20;

            if (filterOptions) {
                // Validate tag
                if (state.tag_id) {
                    var tagValid = (filterOptions.tags || []).some(function(t) { return t.id === state.tag_id; });
                    if (!tagValid) state.tag_id = '';
                }
                // Validate duration preset
                if (state.duration_preset) {
                    var presetValid = (filterOptions.duration_presets || []).some(function(p) { return p.key === state.duration_preset; });
                    if (!presetValid) state.duration_preset = '';
                }
                // Validate year
                if (state.year) {
                    var yearNum = parseInt(state.year, 10);
                    var yearValid = (filterOptions.year_options || []).some(function(y) { return y === yearNum; });
                    if (!yearValid) {
                        state.year = '';
                    } else {
                        state.year = String(yearNum);
                    }
                }
                // Validate sort, or derive default from sort_options
                var sortValid = (filterOptions.sort_options || []).some(function(s) { return s.value === state.sort; });
                if (!sortValid) {
                    if (filterOptions.sort_options && filterOptions.sort_options.length > 0) {
                        state.sort = filterOptions.sort_options[0].value;
                    } else {
                        state.sort = 'release_date_newest';
                    }
                }
            }

            return state;
        }

        function buildUrlFromState(state) {
            var params = new URLSearchParams();
            if (state.query) params.set('query', state.query);
            if (state.tag_id) params.set('tag_id', state.tag_id);
            if (state.duration_preset) params.set('duration_preset', state.duration_preset);
            if (state.year) params.set('year', state.year);
            if (state.sort) params.set('sort', state.sort);
            if (state.page && state.page !== 1) params.set('page', String(state.page));
            if (state.page_size && state.page_size !== 20) params.set('page_size', String(state.page_size));
            var qs = params.toString();
            return window.location.pathname + (qs ? '?' + qs : '');
        }

        function updateUrlState(partial, options) {
            options = options || {};
            var current = readUrlState(filterOptionsCache);
            Object.keys(partial).forEach(function(key) {
                current[key] = partial[key];
            });
            if (options.resetPage) {
                current.page = 1;
            }
            var newUrl = buildUrlFromState(current);
            window.history.pushState(null, '', newUrl);
            applyStateFromUrl(false);
        }

        function loadPlaylistsFromStorage() {
            var raw = window.localStorage.getItem('playlists') || '[]';
            try {
                playlistsState = JSON.parse(raw);
                if (!Array.isArray(playlistsState)) playlistsState = [];
            } catch (e) {
                playlistsState = [];
            }
        }

        function savePlaylistsToStorage() {
            try {
                window.localStorage.setItem('playlists', JSON.stringify(playlistsState));
            } catch (e) {
                // ignore storage errors
            }
        }

        // --- Rendering ---
        function renderFilterBar(container, filterOptions, state) {
            if (!container) return;
            var tags = filterOptions.tags || [];
            var presets = filterOptions.duration_presets || [];
            var years = filterOptions.year_options || [];

            var tagOptionsHtml = ['<option value="">All topics</option>'];
            tags.forEach(function(tag) {
                var selected = tag.id === state.tag_id ? ' selected' : '';
                tagOptionsHtml.push('<option value="' + escapeHtml(tag.id) + '"' + selected + '>' + escapeHtml(tag.name) + '</option>');
            });

            var presetOptionsHtml = ['<option value="">Any length</option>'];
            presets.forEach(function(preset) {
                var selectedPreset = preset.key === state.duration_preset ? ' selected' : '';
                presetOptionsHtml.push('<option value="' + escapeHtml(preset.key) + '"' + selectedPreset + '>' + escapeHtml(preset.label) + '</option>');
            });

            var yearOptionsHtml = ['<option value="">Any year</option>'];
            years.slice().sort(function(a, b) { return b - a; }).forEach(function(year) {
                var selectedYear = String(year) === state.year ? ' selected' : '';
                yearOptionsHtml.push('<option value="' + year + '"' + selectedYear + '>' + year + '</option>');
            });

            container.innerHTML = '\n                <div class="filter-group">\n                    <label for="filterTagSelect">Topic</label>\n                    <select id="filterTagSelect" data-action="filter-tag">\n                        ' + tagOptionsHtml.join('') + '\n                    </select>\n                </div>\n                <div class="filter-group">\n                    <label for="filterDurationSelect">Duration</label>\n                    <select id="filterDurationSelect" data-action="filter-duration">\n                        ' + presetOptionsHtml.join('') + '\n                    </select>\n                </div>\n                <div class="filter-group">\n                    <label for="filterYearSelect">Year</label>\n                    <select id="filterYearSelect" data-action="filter-year">\n                        ' + yearOptionsHtml.join('') + '\n                    </select>\n                </div>\n            ';
        }

        function renderSortControl(container, filterOptions, state) {
            if (!container) return;
            var sortOptions = filterOptions.sort_options || [];
            var optionsHtml = sortOptions.map(function(opt) {
                var selected = opt.value === state.sort ? ' selected' : '';
                return '<option value="' + escapeHtml(opt.value) + '"' + selected + '>' + escapeHtml(opt.label) + '</option>';
            }).join('');

            container.innerHTML = '\n                <label for="sortSelect">Sort by</label>\n                <select id="sortSelect" data-action="sort-change">\n                    ' + optionsHtml + '\n                </select>\n            ';
        }

        function renderResultsSummary(container, result, state) {
            if (!container) return;
            if (!result || typeof result.total !== 'number') {
                container.textContent = '';
                return;
            }
            var total = result.total;
            var page = result.page || state.page || 1;
            var pageSize = result.page_size || state.page_size || 20;
            var start = total === 0 ? 0 : (page - 1) * pageSize + 1;
            var end = Math.min(page * pageSize, total);
            if (total === 0) {
                container.textContent = 'No episodes found.';
            } else {
                container.textContent = 'Showing ' + start + '–' + end + ' of ' + total + ' episodes';
            }
        }

        function renderEpisodesList(container, result) {
            if (!container) return;
            container.innerHTML = '';
            if (!result || !Array.isArray(result.episodes) || result.episodes.length === 0) {
                var emptyItem = document.createElement('li');
                emptyItem.className = 'episode-list-empty';
                emptyItem.textContent = 'No episodes match your current search. Try adjusting filters or keywords.';
                container.appendChild(emptyItem);
                return;
            }

            var frag = document.createDocumentFragment();
            result.episodes.forEach(function(item) {
                var ep = item.episode;
                var li = document.createElement('li');
                li.className = 'episode-card';
                li.setAttribute('data-episode-id', ep.id);

                var ratingHtml = '';
                if (typeof ep.rating === 'number') {
                    ratingHtml = '<span class="episode-rating">' + ep.rating.toFixed(1) + ' ★</span>';
                }

                var tagNames = item.tag_names || [];
                var tagsHtml = '';
                if (tagNames.length > 0) {
                    tagsHtml = '<ul class="episode-tags">' + tagNames.map(function(name) {
                        return '<li class="episode-tag">' + escapeHtml(name) + '</li>';
                    }).join('') + '</ul>';
                }

                var favoriteClass = ep.is_favorite ? ' is-active' : '';
                var favoriteTitle = ep.is_favorite ? 'Remove from favorites' : 'Add to favorites';
                var favoritePressed = ep.is_favorite ? 'true' : 'false';

                li.innerHTML = '\n                    <article class="episode">\n                        <header class="episode-header">\n                            <div class="episode-header-main">\n                                <h3 class="episode-title">\n                                    <a href="javascript:void(0)" data-action="episode-title" data-episode-id="' + escapeHtml(ep.id) + '">' + escapeHtml(ep.title) + '</a>\n                                </h3>\n                                <div class="episode-series">\n                                    <a href="javascript:void(0)" data-action="series-title" data-series-id="' + escapeHtml(item.series_id) + '">' + escapeHtml(item.series_title) + '</a>\n                                </div>\n                            </div>\n                            <div class="episode-header-actions">\n                                <button type="button" class="icon-button favorite-toggle' + favoriteClass + '" data-component="favorite-toggle-button" data-action="toggle-favorite" data-episode-id="' + escapeHtml(ep.id) + '" aria-pressed="' + favoritePressed + '" title="' + escapeHtml(favoriteTitle) + '">\n                                    <span class="favorite-icon" aria-hidden="true">★</span>\n                                    <span class="sr-only">Toggle favorite</span>\n                                </button>\n                            </div>\n                        </header>\n                        <div class="episode-body">\n                            <div class="episode-meta-block">\n                                ' + tagsHtml + '\n                                <div class="episode-meta">\n                                    <span class="episode-duration">' + escapeHtml(ep.duration_minutes) + ' min</span>\n                                    <span class="episode-release-date">' + escapeHtml(formatDate(ep.release_date)) + '</span>\n                                    ' + ratingHtml + '\n                                </div>\n                            </div>\n                            <div class="episode-actions" data-component="episode-list-item-actions">\n                                <button type="button" class="button button-ghost" data-action="open-add-to-playlist" data-episode-id="' + escapeHtml(ep.id) + '">Add to playlist</button>\n                                <button type="button" class="button button-ghost" data-action="add-to-queue" data-play-now="false" data-episode-id="' + escapeHtml(ep.id) + '">Add to queue</button>\n                                <button type="button" class="button button-ghost" data-action="add-to-queue" data-play-now="true" data-episode-id="' + escapeHtml(ep.id) + '">Play now</button>\n                            </div>\n                            <div class="queue-feedback-placeholder" data-component="queue-action-feedback" aria-live="polite"></div>\n                        </div>\n                    </article>\n                ';

                frag.appendChild(li);
            });

            container.appendChild(frag);
        }

        function renderPagination(container, result, state) {
            if (!container) return;
            container.innerHTML = '';
            if (!result || typeof result.total !== 'number') return;

            var total = result.total;
            var page = result.page || state.page || 1;
            var pageSize = result.page_size || state.page_size || 20;
            var totalPages = Math.max(1, Math.ceil(total / pageSize));
            if (totalPages <= 1) return;

            var frag = document.createDocumentFragment();

            var prevBtn = document.createElement('button');
            prevBtn.type = 'button';
            prevBtn.className = 'pagination-prev';
            prevBtn.textContent = 'Previous';
            prevBtn.disabled = page <= 1;
            prevBtn.setAttribute('data-action', 'page-prev');
            frag.appendChild(prevBtn);

            var maxButtons = 7;
            var start = Math.max(1, page - 3);
            var end = Math.min(totalPages, start + maxButtons - 1);
            if (end - start < maxButtons - 1) {
                start = Math.max(1, end - maxButtons + 1);
            }

            for (var p = start; p <= end; p++) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'pagination-page';
                if (p === page) btn.classList.add('is-active');
                btn.textContent = String(p);
                btn.setAttribute('data-action', 'page-change');
                btn.setAttribute('data-page', String(p));
                frag.appendChild(btn);
            }

            var nextBtn = document.createElement('button');
            nextBtn.type = 'button';
            nextBtn.className = 'pagination-next';
            nextBtn.textContent = 'Next';
            nextBtn.disabled = page >= totalPages;
            nextBtn.setAttribute('data-action', 'page-next');
            frag.appendChild(nextBtn);

            container.appendChild(frag);
        }

        function renderSearchFormValue(state) {
            var input = document.getElementById('podcastSearchInput');
            if (input) {
                input.value = state.query || '';
            }
        }

        function renderPlaylistsInDialog() {
            var select = document.getElementById('existingPlaylistSelect');
            if (!select) return;
            var currentValue = select.value;
            select.innerHTML = '<option value="">Select a playlist</option>';
            playlistsState.forEach(function(pl) {
                var opt = document.createElement('option');
                opt.value = pl.id;
                opt.textContent = pl.name;
                if (pl.id === currentValue) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function showPlaylistDialogFeedback(message, isError) {
            var box = document.querySelector('.playlist-dialog-feedback');
            if (!box) return;
            box.textContent = message || '';
            box.classList.toggle('is-error', !!isError);
        }

        function openAddToPlaylistDialog(episodeId) {
            selectedEpisodeId = episodeId;
            var backdrop = document.querySelector('[data-component="add-to-playlist-dialog"]');
            if (backdrop) {
                backdrop.classList.remove('is-hidden');
            }
            var nameInput = document.getElementById('newPlaylistName');
            var descInput = document.getElementById('newPlaylistDescription');
            if (nameInput) nameInput.value = '';
            if (descInput) descInput.value = '';
            renderPlaylistsInDialog();
            showPlaylistDialogFeedback('', false);
        }

        function closeAddToPlaylistDialog() {
            selectedEpisodeId = null;
            var backdrop = document.querySelector('[data-component="add-to-playlist-dialog"]');
            if (backdrop) {
                backdrop.classList.add('is-hidden');
            }
        }

        function showQueueFeedback(episodeId, message) {
            var selector = 'li.episode-card[data-episode-id="' + episodeId + '"] .queue-feedback-placeholder';
            var placeholder = document.querySelector(selector);
            if (!placeholder) return;
            placeholder.innerHTML = '\n                <div class="queue-feedback">\n                    <span class="queue-feedback-message">' + escapeHtml(message || 'Added to queue') + '</span>\n                    <button type="button" class="button-link" data-action="view-queue">View queue</button>\n                    <button type="button" class="button-link" data-action="dismiss-queue-feedback">Dismiss</button>\n                </div>\n            ';
        }

        // --- State / caches ---
        var filterOptionsCache = null;
        var currentResult = null;
        var currentState = null;
        var playlistsState = [];
        var selectedEpisodeId = null;
        var queueState = { queue: null, items: [] };

        var filterBarContainer = document.querySelector('[data-component="podcast-filter-bar"]');
        var sortControlContainer = document.querySelector('[data-component="podcast-sort-control"]');
        var resultsSummaryContainer = document.querySelector('[data-populate="episode-results-summary"]');
        var episodesListContainer = document.querySelector('[data-component="episode-results-list"]');
        var paginationContainer = document.querySelector('[data-component="pagination-controls"]');

        function runSearchWithState(state) {
            var filtersObj = {};
            if (state.tag_id) {
                filtersObj.tag_ids = [state.tag_id];
            }
            if (state.duration_preset && filterOptionsCache && Array.isArray(filterOptionsCache.duration_presets)) {
                var preset = filterOptionsCache.duration_presets.find(function(p) { return p.key === state.duration_preset; });
                if (preset) {
                    if (typeof preset.min_minutes === 'number') {
                        filtersObj.min_duration_minutes = preset.min_minutes;
                    }
                    if (typeof preset.max_minutes === 'number') {
                        filtersObj.max_duration_minutes = preset.max_minutes;
                    }
                }
            }
            if (state.year) {
                var yearNum = parseInt(state.year, 10);
                if (!isNaN(yearNum)) {
                    filtersObj.release_year = yearNum;
                }
            }

            var filtersArg = Object.keys(filtersObj).length ? filtersObj : undefined;

            try {
                currentResult = WebsiteSDK.searchPodcastEpisodes(state.query || undefined, filtersArg, state.sort || undefined, state.page, state.page_size);
            } catch (e) {
                currentResult = { total: 0, page: state.page, page_size: state.page_size, episodes: [] };
            }

            renderResultsSummary(resultsSummaryContainer, currentResult, state);
            renderEpisodesList(episodesListContainer, currentResult);
            renderPagination(paginationContainer, currentResult, state);
        }

        function applyStateFromUrl(initial) {
            if (!filterOptionsCache) {
                try {
                    filterOptionsCache = WebsiteSDK.getPodcastEpisodeFilterOptions();
                } catch (e) {
                    filterOptionsCache = { tags: [], duration_presets: [], year_options: [], sort_options: [] };
                }
            }
            currentState = readUrlState(filterOptionsCache);

            renderFilterBar(filterBarContainer, filterOptionsCache, currentState);
            renderSortControl(sortControlContainer, filterOptionsCache, currentState);
            renderSearchFormValue(currentState);
            runSearchWithState(currentState);
        }

        // --- Event bindings ---
        var searchForm = document.querySelector('[data-action="search-form"]');
        if (searchForm) {
            searchForm.addEventListener('submit', function(event) {
                event.preventDefault();
                var input = document.getElementById('podcastSearchInput');
                var value = input ? input.value.trim() : '';
                updateUrlState({ query: value, page: 1 }, { resetPage: true });
            });
        }

        document.addEventListener('change', function(event) {
            var target = event.target;
            if (!target || !target.dataset) return;
            var action = target.dataset.action;
            if (!action) return;

            if (action === 'filter-tag') {
                var tagId = target.value || '';
                updateUrlState({ tag_id: tagId }, { resetPage: true });
            } else if (action === 'filter-duration') {
                var presetKey = target.value || '';
                updateUrlState({ duration_preset: presetKey }, { resetPage: true });
            } else if (action === 'filter-year') {
                var yearVal = target.value || '';
                updateUrlState({ year: yearVal }, { resetPage: true });
            } else if (action === 'sort-change') {
                var sortVal = target.value || '';
                updateUrlState({ sort: sortVal }, { resetPage: true });
            }
        });

        document.addEventListener('click', function(event) {
            var el = event.target.closest('[data-action]');
            if (!el) return;
            var action = el.dataset.action;

            if (action === 'episode-title') {
                var episodeId = el.dataset.episodeId;
                if (episodeId) {
                    window.location.href = 'podcast_episode.html?id=' + encodeURIComponent(episodeId);
                }
            } else if (action === 'series-title') {
                var seriesId = el.dataset.seriesId;
                if (seriesId) {
                    window.location.href = 'series_detail.html?id=' + encodeURIComponent(seriesId);
                }
            } else if (action === 'toggle-favorite') {
                var favEpisodeId = el.dataset.episodeId;
                if (!favEpisodeId) return;
                var listItem = currentResult && Array.isArray(currentResult.episodes) ? currentResult.episodes.find(function(it) { return it.episode.id === favEpisodeId; }) : null;
                if (!listItem) return;
                var newVal = !listItem.episode.is_favorite;
                try {
                    var updated = WebsiteSDK.setEpisodeFavorite(favEpisodeId, newVal);
                    listItem.episode = updated;
                    // Update button state in-place
                    var buttons = document.querySelectorAll('button[data-action="toggle-favorite"]');
                    buttons.forEach(function(btn) {
                        if (btn.dataset.episodeId === favEpisodeId) {
                            btn.classList.toggle('is-active', updated.is_favorite);
                            btn.setAttribute('aria-pressed', updated.is_favorite ? 'true' : 'false');
                            btn.setAttribute('title', updated.is_favorite ? 'Remove from favorites' : 'Add to favorites');
                        }
                    });
                } catch (e) {
                    window.alert('Unable to update favorite right now. Please try again.');
                }
            } else if (action === 'open-add-to-playlist') {
                var epIdForPlaylist = el.dataset.episodeId;
                if (epIdForPlaylist) {
                    openAddToPlaylistDialog(epIdForPlaylist);
                }
            } else if (action === 'close-add-to-playlist' || action === 'cancel-add-to-playlist') {
                closeAddToPlaylistDialog();
            } else if (action === 'playlist-dialog-backdrop') {
                if (event.target === el) {
                    closeAddToPlaylistDialog();
                }
            } else if (action === 'confirm-add-to-playlist') {
                if (!selectedEpisodeId) {
                    showPlaylistDialogFeedback('No episode selected.', true);
                    return;
                }
                var selectEl = document.getElementById('existingPlaylistSelect');
                if (!selectEl || !selectEl.value) {
                    showPlaylistDialogFeedback('Please choose a playlist first.', true);
                    return;
                }
                var playlistId = selectEl.value;
                try {
                    var updatedPlaylist = WebsiteSDK.addEpisodeToPlaylist(selectedEpisodeId, playlistId);
                    var existing = playlistsState.find(function(pl) { return pl.id === updatedPlaylist.id; });
                    if (existing) {
                        Object.keys(updatedPlaylist).forEach(function(k) { existing[k] = updatedPlaylist[k]; });
                    } else {
                        playlistsState.push(updatedPlaylist);
                    }
                    savePlaylistsToStorage();
                    renderPlaylistsInDialog();
                    showPlaylistDialogFeedback('Episode added to playlist.', false);
                } catch (e) {
                    showPlaylistDialogFeedback('Could not add to playlist. Please try again.', true);
                }
            } else if (action === 'create-new-playlist') {
                if (!selectedEpisodeId) {
                    showPlaylistDialogFeedback('No episode selected.', true);
                    return;
                }
                var nameInput = document.getElementById('newPlaylistName');
                var descInput = document.getElementById('newPlaylistDescription');
                var nameVal = nameInput ? nameInput.value.trim() : '';
                var descVal = descInput ? descInput.value.trim() : '';
                if (!nameVal) {
                    showPlaylistDialogFeedback('Please enter a playlist name.', true);
                    return;
                }
                try {
                    var newPlaylist = WebsiteSDK.createPlaylist(nameVal, descVal || undefined, [selectedEpisodeId]);
                    playlistsState.push(newPlaylist);
                    savePlaylistsToStorage();
                    renderPlaylistsInDialog();
                    showPlaylistDialogFeedback('Playlist created. You can now view it.', false);
                    // Offer view playlist button
                    var box = document.querySelector('.playlist-dialog-feedback');
                    if (box) {
                        box.innerHTML = '\n                            <span>Playlist created.</span>\n                            <button type="button" class="button-link" data-action="view-created-playlist" data-playlist-id="' + escapeHtml(newPlaylist.id) + '">View playlist</button>\n                        ';
                    }
                } catch (e) {
                    showPlaylistDialogFeedback('Could not create playlist. Please try again.', true);
                }
            } else if (action === 'view-created-playlist') {
                var plId = el.dataset.playlistId;
                if (plId) {
                    window.location.href = 'playlist.html?id=' + encodeURIComponent(plId);
                }
            } else if (action === 'add-to-queue') {
                var queueEpisodeId = el.dataset.episodeId;
                if (!queueEpisodeId) return;
                var playNow = el.dataset.playNow === 'true';
                try {
                    var queueResponse = WebsiteSDK.addEpisodeToListeningQueue(queueEpisodeId, playNow);
                    queueState.queue = queueResponse.queue;
                    queueState.items = queueResponse.items || [];
                    showQueueFeedback(queueEpisodeId, playNow ? 'Episode is now playing from your queue.' : 'Episode added to your queue.');
                } catch (e) {
                    window.alert('Could not update your listening queue. Please try again.');
                }
            } else if (action === 'view-queue') {
                window.location.href = 'queue.html';
            } else if (action === 'dismiss-queue-feedback') {
                var feedback = el.closest('.queue-feedback');
                if (feedback && feedback.parentNode) {
                    feedback.parentNode.innerHTML = '';
                }
            } else if (action === 'page-change') {
                var pageAttr = el.getAttribute('data-page');
                var targetPage = parseInt(pageAttr || '1', 10);
                if (!isNaN(targetPage) && targetPage >= 1) {
                    updateUrlState({ page: targetPage }, { resetPage: false });
                }
            } else if (action === 'page-prev') {
                var prevPage = (currentState && currentState.page ? currentState.page : 1) - 1;
                if (prevPage >= 1) {
                    updateUrlState({ page: prevPage }, { resetPage: false });
                }
            } else if (action === 'page-next') {
                var nextPage = (currentState && currentState.page ? currentState.page : 1) + 1;
                updateUrlState({ page: nextPage }, { resetPage: false });
            }
        });

        window.addEventListener('popstate', function() {
            applyStateFromUrl(false);
        });

        // --- Initialization ---
        loadPlaylistsFromStorage();
        applyStateFromUrl(true);
    });
    </script>
</body>
</html>
