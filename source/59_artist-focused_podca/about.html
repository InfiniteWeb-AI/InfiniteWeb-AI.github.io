<!DOCTYPE html>

<head>

    <link rel='stylesheet' href='about.css' />

<body>

            </div>

                    </li>
                    <li class='nav-item'>
                        <a href='podcasts.html' class='nav-link' title='Browse and filter all podcast episodes'>Podcasts</a>
                    </li>
                    <li class='nav-item'>
                        <a href='blog.html' class='nav-link' title='Browse and search all blog articles'>Blog</a>
                    </li>
                    <li class='nav-item'>
                        <a href='series.html' class='nav-link' title='Directory of podcast series and shows'>Series</a>
                    </li>
                    <li class='nav-item'>
                        <a href='tags.html' class='nav-link' title='Browse topics and open tag-specific content pages'>Tags</a>
                    </li>

                <ul class='nav-row nav-row-bottom'>
                    <li class='nav-item'>
                        <a href='playlists.html' class='nav-link' title='View and manage podcast playlists'>Playlists</a>
                    </li>
                    <li class='nav-item'>
                        <a href='reading_list.html' class='nav-link' title='View bookmarks and named reading lists'>Reading List</a>
                    </li>

                    </li>

        </div>

    <main id='content' class='site-content' role='main'>
        <div class='content-inner'>
            <section class='about-hero' aria-labelledby='about-page-heading'>
                <div class='about-hero-inner'>
                    <h1 id='about-page-heading' class='about-hero-title' data-populate='about-title'></h1>
                </div>
            </section>

            <section class='about-layout'>
                <div class='about-layout-inner'>
                    <div class='about-main-column'>
                        <div class='about-status-error' data-component='about-error-display' role='alert' hidden>
                            <div class='about-status-error-inner'>
                                <p class='about-status-message'>Content could not be loaded.</p>
                                <button type='button' class='about-status-retry' data-action='about-retry'>Retry</button>
                            </div>
                        </div>

                        <header class='about-main-header'>
                            <div class='about-main-header-inner'>
                                <div class='about-main-header-title-spacer' aria-hidden='true'></div>
                                <div class='about-view-toggle' data-component='about-view-toggle' role='group' aria-label='Content view mode'>
                                    <button type='button' class='about-view-toggle-button is-active' data-action='about-set-view' data-view-mode='summary'>Summary</button>
                                    <button type='button' class='about-view-toggle-button' data-action='about-set-view' data-view-mode='full'>Full</button>
                                </div>
                            </div>
                        </header>

                        <article class='about-body-wrapper' data-component='about-content-display'>
                            <div class='about-loader-overlay' data-component='about-content-loader' aria-live='polite' aria-busy='true' hidden>
                                <div class='about-loader-inner'>
                                    <div class='about-loader-spinner' aria-hidden='true'></div>
                                    <p class='about-loader-text'>Loading</p>
                                </div>
                            </div>
                            <div class='about-body' data-populate='about-body'></div>
                        </article>
                    </div>

                    <aside class='about-sidebar-column' aria-label='Page sections'>
                        <div class='about-toc-card' data-component='about-toc-navigation'>
                            <h2 class='about-toc-title'>Sections</h2>
                            <nav class='about-toc-nav' aria-label='About page sections'>
                                <ul class='about-toc-list' data-populate='about-toc'>
                                    <!-- TOC items injected via JavaScript -->
                                </ul>
                            </nav>
                        </div>
                        <div data-component='about-url-state-manager' hidden></div>
                    </aside>
                </div>
            </section>
        </div>
    </main>

    <footer class='site-footer'>
        <div class='footer-inner'>
            <nav class='footer-navigation' aria-label='Footer'>
                <ul class='footer-menu'>
                    <li class='footer-item'>
                        <a href='about.html' class='footer-link' title='Learn more about this artist-focused podcast and blog'>About</a>
                    </li>
                    <li class='footer-item'>
                        <a href='contact.html' class='footer-link' title='Send feedback or questions to the site owner'>Contact</a>
                    </li>
                    <li class='footer-item'>
                        <a href='help.html' class='footer-link' title='Get help using playlists, bookmarks, comments and other features'>Help / FAQ</a>
                    </li>
                    <li class='footer-item'>
                        <a href='feed_settings.html' class='footer-link' title='Adjust homepage topics and content type preferences'>Customize Feed</a>
                    </li>
                </ul>
            </nav>
            <p class='footer-copy'>&copy; <span class='footer-year'>2024</span> Gajos Del Oficio. All rights reserved.</p>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var aboutContent = null;
        var fullBodyHtml = null;
        var currentUrlState = readUrlState();
        var currentViewMode = normalizeViewMode(currentUrlState.view);
        var hasLoadedOnce = false;

        var populateElements = document.querySelectorAll('[data-populate]');
        var populateMap = {};
        for (var i = 0; i < populateElements.length; i++) {
            var el = populateElements[i];
            var key = el.dataset.populate;
            if (!populateMap[key]) {
                populateMap[key] = [];
            }
            populateMap[key].push(el);
        }

        var loaderElements = document.querySelectorAll('[data-component="about-content-loader"]');
        var errorElements = document.querySelectorAll('[data-component="about-error-display"]');
        var viewToggleElement = document.querySelector('[data-component="about-view-toggle"]');
        var bodyContainer = populateMap['about-body'] && populateMap['about-body'][0] ? populateMap['about-body'][0] : null;
        var tocContainer = populateMap['about-toc'] && populateMap['about-toc'][0] ? populateMap['about-toc'][0] : null;

        function readUrlState() {
            var params = new URLSearchParams(window.location.search);
            var view = params.get('view') || 'full';
            var section = params.get('section') || null;
            return {
                view: view,
                section: section
            };
        }

        function normalizeViewMode(mode) {
            if (mode === 'summary') {
                return 'summary';
            }
            return 'full';
        }

        function setLoadStatus(status) {
            for (var i = 0; i < loaderElements.length; i++) {
                loaderElements[i].hidden = !(status === 'loading');
            }
            for (var j = 0; j < errorElements.length; j++) {
                errorElements[j].hidden = !(status === 'error');
            }
        }

        function renderTitle(container, title) {
            container.textContent = title || '';
        }

        function markdownToHtml(markdown) {
            var lines = markdown.split(/\r?\n/);
            var htmlParts = [];
            var buffer = [];

            function flushParagraph() {
                if (buffer.length > 0) {
                    var text = buffer.join(' ').trim();
                    if (text.length > 0) {
                        htmlParts.push('<p>' + escapeHtml(text) + '</p>');
                    }
                    buffer = [];
                }
            }

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                var trimmed = line.trim();
                if (trimmed.length === 0) {
                    flushParagraph();
                    continue;
                }

                if (trimmed.indexOf('# ') === 0) {
                    flushParagraph();
                    htmlParts.push('<h1>' + escapeHtml(trimmed.substring(2).trim()) + '</h1>');
                } else if (trimmed.indexOf('## ') === 0) {
                    flushParagraph();
                    htmlParts.push('<h2>' + escapeHtml(trimmed.substring(3).trim()) + '</h2>');
                } else if (trimmed.indexOf('### ') === 0) {
                    flushParagraph();
                    htmlParts.push('<h3>' + escapeHtml(trimmed.substring(4).trim()) + '</h3>');
                } else if (trimmed.indexOf('#### ') === 0) {
                    flushParagraph();
                    htmlParts.push('<h4>' + escapeHtml(trimmed.substring(5).trim()) + '</h4>');
                } else if (trimmed.indexOf('##### ') === 0) {
                    flushParagraph();
                    htmlParts.push('<h5>' + escapeHtml(trimmed.substring(6).trim()) + '</h5>');
                } else if (trimmed.indexOf('###### ') === 0) {
                    flushParagraph();
                    htmlParts.push('<h6>' + escapeHtml(trimmed.substring(7).trim()) + '</h6>');
                } else {
                    buffer.push(trimmed);
                }
            }

            flushParagraph();
            return htmlParts.join('\n');
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function convertBodyToHtml(body) {
            var trimmed = body ? body.trim() : '';
            if (!trimmed) {
                return '';
            }
            if (trimmed.indexOf('<') === 0) {
                return trimmed;
            }
            return markdownToHtml(trimmed);
        }

        function getHtmlForView(fullHtml, viewMode) {
            if (!fullHtml) {
                return '';
            }
            if (viewMode === 'summary') {
                var temp = document.createElement('div');
                temp.innerHTML = fullHtml;
                var summaryContainer = document.createElement('div');
                var nodes = Array.prototype.slice.call(temp.childNodes);
                var charCount = 0;
                var maxChars = 800;
                for (var i = 0; i < nodes.length; i++) {
                    var node = nodes[i];
                    var clone = node.cloneNode(true);
                    summaryContainer.appendChild(clone);
                    charCount += (node.textContent || '').length;
                    if (charCount >= maxChars) {
                        break;
                    }
                }
                return summaryContainer.innerHTML;
            }
            return fullHtml;
        }

        function renderBody(container, bodySource, viewMode) {
            if (!container) {
                return;
            }
            if (!bodySource) {
                container.innerHTML = '';
                return;
            }
            if (!fullBodyHtml) {
                fullBodyHtml = convertBodyToHtml(bodySource);
            }
            var htmlForView = getHtmlForView(fullBodyHtml, viewMode);
            container.innerHTML = htmlForView;
        }

        function slugifyHeading(text) {
            var base = (text || '').toLowerCase().trim();
            base = base.replace(/[^a-z0-9]+/g, '-');
            base = base.replace(/^-+|-+$/g, '');
            if (!base) {
                base = 'section';
            }
            var unique = base;
            var index = 1;
            while (document.getElementById(unique)) {
                unique = base + '-' + index;
                index++;
            }
            return unique;
        }

        function buildToc(container) {
            if (!container || !bodyContainer) {
                return;
            }
            container.innerHTML = '';
            var headings = bodyContainer.querySelectorAll('h1, h2, h3, h4, h5, h6');
            if (!headings.length) {
                return;
            }
            for (var i = 0; i < headings.length; i++) {
                var heading = headings[i];
                var text = heading.textContent || heading.innerText || '';
                if (!text.trim()) {
                    continue;
                }
                if (!heading.id) {
                    heading.id = slugifyHeading(text);
                }
                var level = parseInt(heading.tagName.substring(1), 10);
                var li = document.createElement('li');
                li.className = 'about-toc-item about-toc-item-level-' + level;
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'about-toc-link';
                btn.textContent = text;
                btn.setAttribute('data-action', 'about-section-nav');
                btn.setAttribute('data-section-id', heading.id);
                li.appendChild(btn);
                container.appendChild(li);
            }
        }

        function scrollToSection(sectionId) {
            if (!sectionId) {
                return;
            }
            var target = document.getElementById(sectionId);
            if (!target) {
                return;
            }
            try {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (e) {
                target.scrollIntoView(true);
            }
        }

        function updateUrlState(view, section, usePushState) {
            var params = new URLSearchParams(window.location.search);
            if (view) {
                params.set('view', view);
            } else {
                params.delete('view');
            }
            if (section) {
                params.set('section', section);
            } else {
                params.delete('section');
            }
            var newUrl = window.location.pathname;
            var queryString = params.toString();
            if (queryString) {
                newUrl += '?' + queryString;
            }
            var state = {
                view: view,
                section: section
            };
            if (usePushState) {
                window.history.pushState(state, '', newUrl);
            } else {
                window.history.replaceState(state, '', newUrl);
            }
            currentUrlState.view = view;
            currentUrlState.section = section;
        }

        function updateViewToggleUI() {
            if (!viewToggleElement) {
                return;
            }
            var buttons = viewToggleElement.querySelectorAll('[data-view-mode]');
            for (var i = 0; i < buttons.length; i++) {
                var btn = buttons[i];
                var mode = btn.getAttribute('data-view-mode');
                if (mode === currentViewMode) {
                    btn.classList.add('is-active');
                    btn.setAttribute('aria-pressed', 'true');
                } else {
                    btn.classList.remove('is-active');
                    btn.setAttribute('aria-pressed', 'false');
                }
            }
        }

        function applyViewMode(viewMode, updateUrl) {
            currentViewMode = normalizeViewMode(viewMode);
            if (aboutContent && bodyContainer) {
                renderBody(bodyContainer, aboutContent.body, currentViewMode);
                buildToc(tocContainer);
                if (currentUrlState.section) {
                    scrollToSection(currentUrlState.section);
                }
            }
            updateViewToggleUI();
            if (updateUrl) {
                updateUrlState(currentViewMode, currentUrlState.section, true);
            }
        }

        function initializeViewToggle() {
            if (!viewToggleElement) {
                return;
            }
            viewToggleElement.addEventListener('click', function(event) {
                var target = event.target;
                var btn = target.closest('[data-view-mode]');
                if (!btn) {
                    return;
                }
                var mode = btn.getAttribute('data-view-mode');
                if (!mode || mode === currentViewMode) {
                    return;
                }
                applyViewMode(mode, true);
            });

            viewToggleElement.addEventListener('keydown', function(event) {
                if (event.key !== 'Enter' && event.key !== ' ') {
                    return;
                }
                var target = event.target;
                var btn = target.closest('[data-view-mode]');
                if (!btn) {
                    return;
                }
                event.preventDefault();
                var mode = btn.getAttribute('data-view-mode');
                if (!mode || mode === currentViewMode) {
                    return;
                }
                applyViewMode(mode, true);
            });
        }

        function initializeTocNavigation() {
            if (!tocContainer) {
                return;
            }
            tocContainer.addEventListener('click', function(event) {
                var target = event.target;
                var btn = target.closest('[data-action="about-section-nav"]');
                if (!btn) {
                    return;
                }
                var sectionId = btn.getAttribute('data-section-id');
                if (!sectionId) {
                    return;
                }
                currentUrlState.section = sectionId;
                updateUrlState(currentViewMode, sectionId, true);
                scrollToSection(sectionId);
            });
        }

        function initializeRetryHandler() {
            for (var i = 0; i < errorElements.length; i++) {
                var errorEl = errorElements[i];
                var retryBtn = errorEl.querySelector('[data-action="about-retry"]');
                if (retryBtn) {
                    retryBtn.addEventListener('click', function() {
                        loadAboutContent();
                    });
                }
            }
        }

        function renderAll() {
            if (!aboutContent) {
                return;
            }
            if (populateMap['about-title']) {
                for (var i = 0; i < populateMap['about-title'].length; i++) {
                    renderTitle(populateMap['about-title'][i], aboutContent.title);
                }
            }
            if (bodyContainer) {
                renderBody(bodyContainer, aboutContent.body, currentViewMode);
            }
            if (tocContainer) {
                buildToc(tocContainer);
            }
            updateViewToggleUI();
            if (currentUrlState.section) {
                scrollToSection(currentUrlState.section);
            }
        }

        function loadAboutContent() {
            setLoadStatus('loading');
            try {
                var data = WebsiteSDK.getAboutPageContent();
                if (!data || typeof data.title !== 'string' || typeof data.body !== 'string') {
                    throw new Error('Invalid About page content');
                }
                aboutContent = data;
                fullBodyHtml = null;
                hasLoadedOnce = true;
                setLoadStatus('');
                renderAll();
            } catch (e) {
                console.error(e);
                setLoadStatus('error');
            }
        }

        window.addEventListener('popstate', function() {
            var state = readUrlState();
            currentUrlState.view = state.view;
            currentUrlState.section = state.section;
            currentViewMode = normalizeViewMode(state.view);
            if (hasLoadedOnce && aboutContent && bodyContainer) {
                renderBody(bodyContainer, aboutContent.body, currentViewMode);
                if (tocContainer) {
                    buildToc(tocContainer);
                }
                updateViewToggleUI();
                if (currentUrlState.section) {
                    scrollToSection(currentUrlState.section);
                }
            }
        });

        initializeViewToggle();
        initializeTocNavigation();
        initializeRetryHandler();
        loadAboutContent();
    });
    </script>
</body>
</html>
