<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>Artist Podcast &amp; Blog</title>
    <link rel='stylesheet' href='styles.css' />
    <link rel='stylesheet' href='help.css' />
</head>
<body>
    <header class='site-header'>
        <div class='header-inner'>
            <div class='site-branding'>
                <a href='index.html' class='site-title'>Gajos Del Oficio</a>
                <p class='site-tagline'>Artist-focused podcasts &amp; stories</p>
            </div>
            <nav class='primary-navigation' aria-label='Primary'>
                <ul class='nav-row nav-row-top'>
                    <li class='nav-item'>
                        <a href='index.html' class='nav-link' title='Homepage with personalized artist-focused feed'>Home</a>
                    </li>
                    <li class='nav-item'>
                        <a href='podcasts.html' class='nav-link' title='Browse and filter all podcast episodes'>Podcasts</a>
                    </li>
                    <li class='nav-item'>
                        <a href='blog.html' class='nav-link' title='Browse and search all blog articles'>Blog</a>
                    </li>
                    <li class='nav-item'>
                        <a href='series.html' class='nav-link' title='Directory of podcast series and shows'>Series</a>
                    </li>
                    <li class='nav-item'>
                        <a href='tags.html' class='nav-link' title='Browse topics and open tag-specific content pages'>Tags</a>
                    </li>
                </ul>
                <ul class='nav-row nav-row-bottom'>
                    <li class='nav-item'>
                        <a href='playlists.html' class='nav-link' title='View and manage podcast playlists'>Playlists</a>
                    </li>
                    <li class='nav-item'>
                        <a href='reading_list.html' class='nav-link' title='View bookmarks and named reading lists'>Reading List</a>
                    </li>
                    <li class='nav-item nav-item-highlight'>
                        <a href='queue.html' class='nav-link nav-link-highlight' title='View and manage the current listening queue'>Queue</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id='content' class='site-content' role='main'>
        <div class='content-inner'>
            <div class='help-faq-page' data-component='help-faq-page-container' data-populate='help-faq-content'>
                <div class='help-faq-grid'>
                    <!-- Main column -->
                    <section class='help-faq-main' aria-label='Help and frequently asked questions'>
                        <!-- Search form -->
                        <section class='faq-search-card' data-component='faq-search-form'>
                            <form class='faq-search-form' role='search' aria-label='Search help topics'>
                                <div class='form-group'>
                                    <label for='helpSearchInput' class='form-label'>Search Help / FAQ</label>
                                    <div class='faq-search-input-row'>
                                        <input
                                            id='helpSearchInput'
                                            name='q'
                                            type='search'
                                            class='faq-search-input'
                                            placeholder='Search topics like playlists, queue, comments, feed preferences...'
                                            autocomplete='off'
                                        />
                                        <button type='submit' class='faq-search-submit' data-action='submit-search'>
                                            Search
                                        </button>
                                        <button type='button' class='faq-search-clear' data-action='clear-search' aria-label='Clear search'>
                                            Clear
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </section>

                        <!-- Loader / error state -->
                        <div
                            class='help-faq-loader-state'
                            data-component='help-faq-loader-state'
                            aria-live='polite'
                        ></div>

                        <!-- Accordion list & empty state -->
                        <div class='faq-main-content'>
                            <div class='faq-accordion-list' data-component='faq-accordion-list' aria-live='polite'></div>
                            <div class='faq-empty-state' data-component='faq-empty-or-no-results-state'></div>
                        </div>
                    </section>

                    <!-- Sidebar navigation -->
                    <aside class='help-faq-sidebar' aria-label='Help sections navigation'>
                        <div class='widget faq-section-navigation-widget' data-component='faq-section-navigation'>
                            <h2 class='widget-title'>Browse by section</h2>
                            <div class='widget-content'>
                                <ul class='faq-section-nav-list'>
                                    <!-- Section navigation items rendered via JS -->
                                </ul>
                            </div>
                        </div>
                    </aside>
                </div>
            </div>
        </div>
    </main>

    <footer class='site-footer'>
        <div class='footer-inner'>
            <nav class='footer-navigation' aria-label='Footer'>
                <ul class='footer-menu'>
                    <li class='footer-item'>
                        <a href='about.html' class='footer-link' title='Learn more about this artist-focused podcast and blog'>About</a>
                    </li>
                    <li class='footer-item'>
                        <a href='contact.html' class='footer-link' title='Send feedback or questions to the site owner'>Contact</a>
                    </li>
                    <li class='footer-item'>
                        <a href='help.html' class='footer-link' title='Get help using playlists, bookmarks, comments and other features'>Help / FAQ</a>
                    </li>
                    <li class='footer-item'>
                        <a href='feed_settings.html' class='footer-link' title='Adjust homepage topics and content type preferences'>Customize Feed</a>
                    </li>
                </ul>
            </nav>
            <p class='footer-copy'>&copy; <span class='footer-year'>2024</span> Gajos Del Oficio. All rights reserved.</p>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function (element) {
            var dataType = element.dataset.populate;
            if (dataType === 'help-faq-content') {
                initHelpFaqPage(element);
            }
        });

        function initHelpFaqPage(root) {
            // State
            var urlParams = new URLSearchParams(window.location.search);
            var state = {
                query: urlParams.get('q') || '',
                sectionId: urlParams.get('section') || '',
                questionId: urlParams.get('question') || '',
                expandMode: urlParams.get('expand') || 'single',
                sections: [],
                sectionsWithIds: [],
                openQuestionIds: new Set(),
                activeQuestionId: '',
                isLoading: false,
                isError: false,
                errorMessage: ''
            };

            // Elements inside root
            var loaderEl = root.querySelector('[data-component="help-faq-loader-state"]');
            var searchFormWrapper = root.querySelector('[data-component="faq-search-form"]');
            var accordionEl = root.querySelector('[data-component="faq-accordion-list"]');
            var emptyStateEl = root.querySelector('[data-component="faq-empty-or-no-results-state"]');
            var sectionNavWidget = root.querySelector('[data-component="faq-section-navigation"]');

            // Helpers
            function slugify(text) {
                if (!text) return '';
                return text
                    .toString()
                    .toLowerCase()
                    .replace(/[^a-z0-9]+/g, '-')
                    .replace(/^-+|-+$/g, '');
            }

            function updateUrlFromState(options) {
                var opts = options || {};
                var params = new URLSearchParams(window.location.search);

                if (state.query) {
                    params.set('q', state.query);
                } else {
                    params.delete('q');
                }

                if (state.sectionId) {
                    params.set('section', state.sectionId);
                } else {
                    params.delete('section');
                }

                if (state.questionId) {
                    params.set('question', state.questionId);
                } else {
                    params.delete('question');
                }

                if (state.expandMode && state.expandMode !== 'single') {
                    params.set('expand', state.expandMode);
                } else {
                    params.delete('expand');
                }

                var queryString = params.toString();
                var newUrl = window.location.pathname + (queryString ? '?' + queryString : '');

                if (opts.replace) {
                    window.history.replaceState(null, '', newUrl);
                } else {
                    window.history.pushState(null, '', newUrl);
                }
            }

            function resolveDeepLinkFromUrl() {
                var params = new URLSearchParams(window.location.search);
                state.query = params.get('q') || '';
                state.sectionId = params.get('section') || '';
                state.questionId = params.get('question') || '';
                var expand = params.get('expand');
                if (expand === 'all' || expand === 'single') {
                    state.expandMode = expand;
                } else if (!state.expandMode) {
                    state.expandMode = 'single';
                }

                var sections = state.sectionsWithIds || [];
                if (!sections.length) {
                    return;
                }

                // If question is specified, find its section
                if (state.questionId) {
                    var resolvedSectionId = '';
                    sections.forEach(function (sec) {
                        var match = sec.faqs && sec.faqs.find(function (f) { return f.id === state.questionId; });
                        if (match && !resolvedSectionId) {
                            resolvedSectionId = sec.id;
                        }
                    });
                    if (resolvedSectionId) {
                        state.sectionId = resolvedSectionId;
                        state.activeQuestionId = state.questionId;
                    } else {
                        state.questionId = '';
                        state.activeQuestionId = '';
                    }
                }

                // Validate / default section
                if (state.sectionId) {
                    var exists = sections.some(function (sec) { return sec.id === state.sectionId; });
                    if (!exists) {
                        state.sectionId = sections.length ? sections[0].id : '';
                    }
                } else if (sections.length) {
                    state.sectionId = sections[0].id;
                }

                // Configure open questions
                state.openQuestionIds = new Set();
                if (state.expandMode === 'all') {
                    var activeSec = sections.find(function (s) { return s.id === state.sectionId; });
                    if (activeSec && activeSec.faqs) {
                        activeSec.faqs.forEach(function (f) { state.openQuestionIds.add(f.id); });
                    }
                } else {
                    if (state.activeQuestionId) {
                        state.openQuestionIds.add(state.activeQuestionId);
                    }
                }
            }

            function getFilteredSections() {
                var sections = state.sectionsWithIds || [];
                var filtered = sections.slice();

                if (state.sectionId) {
                    filtered = filtered.filter(function (sec) { return sec.id === state.sectionId; });
                }

                if (state.query) {
                    var qLower = state.query.toLowerCase();
                    var mapped = [];
                    filtered.forEach(function (sec) {
                        var faqs = (sec.faqs || []).filter(function (faq) {
                            var qText = (faq.question || '').toLowerCase();
                            var aText = (faq.answer || '').toLowerCase();
                            return qText.indexOf(qLower) !== -1 || aText.indexOf(qLower) !== -1;
                        });
                        if (faqs.length) {
                            mapped.push({
                                id: sec.id,
                                section_title: sec.section_title,
                                faqs: faqs
                            });
                        }
                    });
                    filtered = mapped;
                }

                return filtered;
            }

            // Rendering
            function renderLoaderState() {
                if (!loaderEl) return;
                loaderEl.innerHTML = '';

                if (state.isLoading) {
                    loaderEl.removeAttribute('hidden');
                    loaderEl.innerHTML = "<div class='faq-loader'><div class='faq-loader-spinner' aria-hidden='true'></div><p class='faq-loader-text'>Loading help content...</p></div>";
                    return;
                }

                if (state.isError) {
                    loaderEl.removeAttribute('hidden');
                    var messageHtml = "<div class='faq-error'><p class='faq-error-title'>We couldn't load the Help / FAQ content.</p><p class='faq-error-body'>Please check your internet connection and try again. If the problem persists, you can refresh the page or come back later.</p><button type='button' class='faq-retry-button' data-action='retry-load'>Retry loading help</button></div>";
                    loaderEl.innerHTML = messageHtml;
                    return;
                }

                loaderEl.setAttribute('hidden', 'hidden');
            }

            function renderSectionNavigation() {
                if (!sectionNavWidget) return;
                var list = sectionNavWidget.querySelector('.faq-section-nav-list');
                if (!list) return;

                list.innerHTML = '';
                var sections = state.sectionsWithIds || [];

                if (!sections.length) {
                    var liEmpty = document.createElement('li');
                    liEmpty.className = 'faq-section-nav-empty';
                    liEmpty.textContent = 'Help sections will appear here once loaded.';
                    list.appendChild(liEmpty);
                    return;
                }

                sections.forEach(function (sec) {
                    var li = document.createElement('li');
                    li.className = 'faq-section-nav-item';
                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'faq-section-nav-link';
                    if (sec.id === state.sectionId) {
                        btn.classList.add('is-active');
                        btn.setAttribute('aria-current', 'true');
                    }
                    btn.dataset.action = 'select-section';
                    btn.dataset.sectionId = sec.id;
                    btn.textContent = sec.section_title || 'Untitled section';
                    li.appendChild(btn);
                    list.appendChild(li);
                });
            }

            function renderAccordion() {
                if (!accordionEl) return;
                accordionEl.innerHTML = '';

                if (state.isLoading || state.isError) {
                    return;
                }

                var filteredSections = getFilteredSections();

                if (!filteredSections.length) {
                    return;
                }

                filteredSections.forEach(function (sec) {
                    var sectionEl = document.createElement('section');
                    sectionEl.className = 'faq-section';
                    sectionEl.dataset.sectionId = sec.id;

                    var heading = document.createElement('h2');
                    heading.className = 'faq-section-title';
                    heading.id = 'faq-section-' + sec.id;
                    heading.textContent = sec.section_title || 'Section';
                    sectionEl.appendChild(heading);

                    var list = document.createElement('ul');
                    list.className = 'faq-list';

                    (sec.faqs || []).forEach(function (faq) {
                        var item = document.createElement('li');
                        item.className = 'faq-item';
                        item.dataset.questionId = faq.id;

                        var isOpen = state.openQuestionIds.has(faq.id);

                        var button = document.createElement('button');
                        button.type = 'button';
                        button.className = 'faq-question';
                        button.dataset.action = 'toggle-question';
                        button.dataset.sectionId = sec.id;
                        button.dataset.questionId = faq.id;
                        button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
                        var answerId = 'faq-answer-' + faq.id;
                        button.setAttribute('aria-controls', answerId);
                        button.textContent = faq.question || '';

                        var answerWrapper = document.createElement('div');
                        answerWrapper.className = 'faq-answer';
                        answerWrapper.id = answerId;
                        if (!isOpen) {
                            answerWrapper.setAttribute('hidden', 'hidden');
                        }

                        var answerInner = document.createElement('div');
                        answerInner.className = 'faq-answer-body';
                        answerInner.dataset.component = 'faq-answer-renderer';

                        var answerContent = faq.answer || '';
                        answerInner.innerHTML = answerContent;

                        answerWrapper.appendChild(answerInner);

                        item.appendChild(button);
                        item.appendChild(answerWrapper);
                        list.appendChild(item);
                    });

                    sectionEl.appendChild(list);
                    accordionEl.appendChild(sectionEl);
                });
            }

            function renderEmptyState() {
                if (!emptyStateEl) return;
                emptyStateEl.innerHTML = '';

                if (state.isLoading || state.isError) {
                    emptyStateEl.setAttribute('hidden', 'hidden');
                    return;
                }

                var filteredSections = getFilteredSections();
                if (filteredSections.length) {
                    emptyStateEl.setAttribute('hidden', 'hidden');
                    return;
                }

                emptyStateEl.removeAttribute('hidden');
                var hasFilters = !!(state.query || state.sectionId);
                var message = hasFilters
                    ? 'No help topics match your search or section filter.'
                    : 'No help topics are available yet.';

                var html = "<div class='faq-empty-inner'><p class='faq-empty-title'>" + message + "</p>";
                if (hasFilters) {
                    html += "<p class='faq-empty-body'>You can adjust your search terms or clear all filters to see every Help / FAQ topic.</p><button type='button' class='faq-clear-filters-button' data-action='clear-filters'>Clear all filters</button>";
                }
                html += '</div>';
                emptyStateEl.innerHTML = html;
            }

            function renderAll() {
                renderLoaderState();
                renderSectionNavigation();
                renderAccordion();
                renderEmptyState();
                syncSearchInputWithState();
            }

            // Data loading
            function loadFaqContent() {
                state.isLoading = true;
                state.isError = false;
                state.errorMessage = '';
                renderLoaderState();

                try {
                    var data = WebsiteSDK.getHelpFaqContent();
                    var sections = (data && Array.isArray(data.sections)) ? data.sections : [];
                    state.sections = sections;

                    var withIds = [];
                    sections.forEach(function (sec) {
                        var secId = slugify(sec.section_title || 'section');
                        var faqsWithIds = [];
                        (sec.faqs || []).forEach(function (faq) {
                            faqsWithIds.push({
                                id: slugify(faq.question || 'question'),
                                question: faq.question || '',
                                answer: faq.answer || ''
                            });
                        });
                        withIds.push({
                            id: secId,
                            section_title: sec.section_title || '',
                            faqs: faqsWithIds
                        });
                    });

                    state.sectionsWithIds = withIds;
                    state.isLoading = false;

                    resolveDeepLinkFromUrl();
                    renderAll();
                } catch (err) {
                    state.isLoading = false;
                    state.isError = true;
                    state.errorMessage = 'Failed to load help content.';
                    renderAll();
                }
            }

            // Search form interactions
            function syncSearchInputWithState() {
                if (!searchFormWrapper) return;
                var input = searchFormWrapper.querySelector('#helpSearchInput');
                if (!input) return;
                if (input.value !== state.query) {
                    input.value = state.query;
                }
            }

            function handleSearchSubmit(value) {
                var newQuery = (value || '').trim();
                state.query = newQuery;
                updateUrlFromState({ replace: false });
                renderAll();
            }

            function handleSearchClear() {
                state.query = '';
                state.questionId = '';
                state.activeQuestionId = '';
                state.openQuestionIds = new Set();
                updateUrlFromState({ replace: false });
                renderAll();
            }

            if (searchFormWrapper) {
                var form = searchFormWrapper.querySelector('form.faq-search-form');
                var inputEl = searchFormWrapper.querySelector('#helpSearchInput');
                var clearBtn = searchFormWrapper.querySelector('[data-action="clear-search"]');

                if (inputEl) {
                    inputEl.value = state.query;
                }

                if (form && inputEl) {
                    form.addEventListener('submit', function (e) {
                        e.preventDefault();
                        handleSearchSubmit(inputEl.value);
                    });

                    inputEl.addEventListener('change', function () {
                        handleSearchSubmit(inputEl.value);
                    });
                }

                if (clearBtn && inputEl) {
                    clearBtn.addEventListener('click', function () {
                        inputEl.value = '';
                        handleSearchClear();
                    });
                }
            }

            // Section navigation interactions
            if (sectionNavWidget) {
                sectionNavWidget.addEventListener('click', function (event) {
                    var target = event.target;
                    if (!target || !target.dataset) return;
                    if (target.dataset.action === 'select-section') {
                        var secId = target.dataset.sectionId || '';
                        if (!secId || secId === state.sectionId) {
                            return;
                        }
                        state.sectionId = secId;
                        state.questionId = '';
                        state.activeQuestionId = '';
                        state.openQuestionIds = new Set();
                        updateUrlFromState({ replace: false });
                        renderAll();

                        // Optional scroll into view
                        var sectionInAccordion = accordionEl
                            ? accordionEl.querySelector(".faq-section[data-section-id='" + secId + "']")
                            : null;
                        if (sectionInAccordion && typeof sectionInAccordion.scrollIntoView === 'function') {
                            sectionInAccordion.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }
                });
            }

            // Accordion interactions
            if (accordionEl) {
                accordionEl.addEventListener('click', function (event) {
                    var target = event.target;
                    if (!target || !target.dataset) return;
                    if (target.dataset.action === 'toggle-question') {
                        var qId = target.dataset.questionId;
                        var secId = target.dataset.sectionId;
                        if (!qId) return;

                        var isCurrentlyOpen = state.openQuestionIds.has(qId);

                        if (state.expandMode === 'single') {
                            state.openQuestionIds = new Set();
                            if (!isCurrentlyOpen) {
                                state.openQuestionIds.add(qId);
                                state.activeQuestionId = qId;
                                state.questionId = qId;
                            } else {
                                state.activeQuestionId = '';
                                state.questionId = '';
                            }
                        } else {
                            if (isCurrentlyOpen) {
                                state.openQuestionIds.delete(qId);
                            } else {
                                state.openQuestionIds.add(qId);
                            }
                            state.questionId = qId;
                            state.activeQuestionId = qId;
                        }

                        if (secId) {
                            state.sectionId = secId;
                        }

                        updateUrlFromState({ replace: false });
                        renderAccordion();

                        var answerId = 'faq-answer-' + qId;
                        var answerEl = document.getElementById(answerId);
                        if (answerEl && !answerEl.hasAttribute('hidden') && typeof answerEl.scrollIntoView === 'function') {
                            answerEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }
                });

                // Internal links inside answers
                accordionEl.addEventListener('click', function (event) {
                    var target = event.target;
                    if (!target || target.tagName !== 'A') return;
                    var href = target.getAttribute('href') || '';
                    if (!href) return;

                    var allowedTargets = ['playlists.html', 'reading_list.html', 'feed_settings.html'];
                    var match = allowedTargets.find(function (path) { return href.indexOf(path) !== -1; });
                    if (match) {
                        event.preventDefault();
                        window.location.href = match;
                    }
                });
            }

            // Loader retry and empty clear-filters interactions
            if (loaderEl) {
                loaderEl.addEventListener('click', function (event) {
                    var target = event.target;
                    if (!target || !target.dataset) return;
                    if (target.dataset.action === 'retry-load') {
                        loadFaqContent();
                    }
                });
            }

            if (emptyStateEl) {
                emptyStateEl.addEventListener('click', function (event) {
                    var target = event.target;
                    if (!target || !target.dataset) return;
                    if (target.dataset.action === 'clear-filters') {
                        state.query = '';
                        state.sectionId = '';
                        state.questionId = '';
                        state.activeQuestionId = '';
                        state.openQuestionIds = new Set();
                        updateUrlFromState({ replace: false });
                        resolveDeepLinkFromUrl();
                        renderAll();
                    }
                });
            }

            // Sync on browser navigation (back/forward)
            window.addEventListener('popstate', function () {
                resolveDeepLinkFromUrl();
                renderAll();
            });

            // Initial load
            loadFaqContent();
        }
    });
    </script>
</body>
</html>
