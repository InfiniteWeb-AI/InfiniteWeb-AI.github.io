<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Mobile Apps Website</title>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='app_detail.css'>
  <script src='business_logic.js'></script>
</head>
<body>
  <header class='site-header'>
    <nav class='top-nav' aria-label='Main navigation'>
      <ul class='nav-list'>
        <li class='nav-item'><a href='index.html'>Home</a></li>
        <li class='nav-item'><a href='apps.html'>Apps</a></li>
        <li class='nav-item'><a href='pricing.html'>Pricing</a></li>
        <li class='nav-item'><a href='resources.html'>Resources</a></li>
        <li class='nav-item'><a href='support.html'>Support</a></li>
      </ul>
    </nav>
  </header>

  <main id='content'>
    <div class='content-inner app-detail-page'>
      <!-- Site preference selector (utility band) -->
      <section class='site-preference-band' data-component='site-preference-selector' data-populate='site-preference'>
        <!-- Filled by JS -->
      </section>

      <!-- Loader state -->
      <section class='app-detail-loader' data-component='app-detail-loader' id='appDetailLoader'>
        <p>Loading app details&hellip;</p>
      </section>

      <!-- Error state -->
      <section class='app-error-state' data-component='app-error-state' id='appErrorState' hidden>
        <h1 class='error-title'>Unable to load app details</h1>
        <p class='error-message'></p>
        <p class='error-actions'>
          <a href='javascript:void(0)' data-action='retry-load'>Try again</a>
          <span class='footer-separator'>|</span>
          <a href='javascript:void(0)' data-action='back-to-apps'>Back to Apps catalog</a>
        </p>
      </section>

      <!-- Main app header -->
      <section class='app-detail-header' data-component='app-detail-header' data-populate='app-detail-header' id='appDetailHeader' hidden>
        <!-- Filled by JS: category, name, short description, rating -->
      </section>

      <!-- Feature tags under header -->
      <div class='app-feature-tags' data-component='app-feature-tags-list' data-populate='app-feature-tags' id='appFeatureTags' hidden>
        <!-- Filled by JS -->
      </div>

      <!-- Main two-row, three-column layout -->
      <div class='app-main-rows' id='appMainRows' hidden>
        <!-- First row: screenshot | description + store links | support -->
        <div class='app-row app-row-primary'>
          <section class='app-column app-column-left' data-component='app-screenshot-gallery' data-populate='app-screenshot-gallery'>
            <!-- Filled by JS -->
          </section>

          <section class='app-column app-column-center'>
            <section class='app-description-section' data-component='app-description-section' data-populate='app-description'>
              <!-- Filled by JS -->
            </section>

            <section class='app-store-cta-list' data-component='app-store-cta-list' data-populate='app-store-ctas'>
              <!-- Filled by JS -->
            </section>
          </section>

          <aside class='app-column app-column-right' data-component='app-support-links' data-populate='app-support-links'>
            <!-- Filled by JS -->
          </aside>
        </div>

        <!-- Second row: compatibility | pricing | acquisition CTAs -->
        <div class='app-row app-row-secondary'>
          <section class='app-column app-column-left' data-component='app-compatibility-section' data-populate='app-compatibility'>
            <!-- Filled by JS -->
          </section>

          <section class='app-column app-column-center' data-component='app-pricing-block' data-populate='app-pricing'>
            <!-- Filled by JS -->
          </section>

          <aside class='app-column app-column-right' data-component='app-acquisition-cta-panel' data-populate='app-acquisition-ctas'>
            <!-- Filled by JS -->
          </aside>
        </div>
      </div>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner'>
      <div class='footer-links'>
        <a href='about.html'>About</a>
        <span class='footer-separator'>|</span>
        <a href='apps.html'>Apps Catalog</a>
        <span class='footer-separator'>|</span>
        <a href='pricing.html'>Pricing &amp; Plans</a>
        <span class='footer-separator'>|</span>
        <a href='faq_list.html'>FAQs / Help Center</a>
        <span class='footer-separator'>|</span>
        <a href='contact_support.html'>Contact Support</a>
        <span class='footer-separator'>|</span>
        <a href='resources.html'>Guides &amp; Tutorials</a>
        <span class='footer-separator'>|</span>
        <a href='privacy.html'>Privacy Policy</a>
        <span class='footer-separator'>|</span>
        <a href='terms.html'>Terms of Use</a>
      </div>
      <p class='footer-copy'>&copy; 2026 Your Company Name</p>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const state = {
        appId: null,
        sitePreference: null,
        appDetail: null,
        screenshotIndex: 0,
        selectedBillingFrequency: 'monthly'
      };

      const urlParams = new URLSearchParams(window.location.search);
      state.appId = urlParams.get('id');

      function escapeHtml(str) {
        if (str === null || str === undefined) {
          return '';
        }
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatCurrency(amount, currencyCode) {
        if (amount === null || amount === undefined || isNaN(amount)) {
          return '';
        }
        const upper = (currencyCode || '').toUpperCase();
        let symbol = '';
        if (upper === 'USD') {
          symbol = '$';
        } else if (upper === 'EUR') {
          symbol = '&#8364;';
        }
        return symbol + amount.toFixed(2) + (symbol ? '' : ' ' + upper);
      }

      function platformLabel(platform) {
        if (!platform) {
          return '';
        }
        if (platform === 'android') {
          return 'Android';
        }
        if (platform === 'ios') {
          return 'iOS';
        }
        if (platform === 'ipad') {
          return 'iPad';
        }
        return platform;
      }

      function showLoader() {
        const loader = document.getElementById('appDetailLoader');
        if (loader) {
          loader.hidden = false;
        }
      }

      function hideLoader() {
        const loader = document.getElementById('appDetailLoader');
        if (loader) {
          loader.hidden = true;
        }
      }

      function hideMainContent() {
        const header = document.getElementById('appDetailHeader');
        const tags = document.getElementById('appFeatureTags');
        const rows = document.getElementById('appMainRows');
        if (header) {
          header.hidden = true;
        }
        if (tags) {
          tags.hidden = true;
        }
        if (rows) {
          rows.hidden = true;
        }
      }

      function showMainContent() {
        const header = document.getElementById('appDetailHeader');
        const tags = document.getElementById('appFeatureTags');
        const rows = document.getElementById('appMainRows');
        if (header) {
          header.hidden = false;
        }
        if (tags) {
          tags.hidden = false;
        }
        if (rows) {
          rows.hidden = false;
        }
      }

      function clearError() {
        const errorSection = document.getElementById('appErrorState');
        if (errorSection) {
          errorSection.hidden = true;
          const msgEl = errorSection.querySelector('.error-message');
          if (msgEl) {
            msgEl.textContent = '';
          }
        }
      }

      function showError(message) {
        hideLoader();
        hideMainContent();
        const errorSection = document.getElementById('appErrorState');
        if (errorSection) {
          const msgEl = errorSection.querySelector('.error-message');
          if (msgEl) {
            msgEl.textContent = message || 'Something went wrong while loading this app.';
          }
          errorSection.hidden = false;
        }
      }

      function renderSitePreference(container) {
        const pref = state.sitePreference || {};
        const currency = pref.currency || 'usd';
        const region = pref.region || '';
        let html = '';
        html += '<form class="site-preference-form" data-action="site-preference-form">';
        html += '<label for="currencySelect">Currency:</label> ';
        html += '<select id="currencySelect" name="currency">';
        html += '<option value="usd"' + (currency === 'usd' ? ' selected' : '') + '>USD</option>';
        html += '<option value="eur"' + (currency === 'eur' ? ' selected' : '') + '>EUR</option>';
        html += '</select> ';
        html += '<label for="regionInput">Region:</label> ';
        html += '<input type="text" id="regionInput" name="region" size="12" value="' + escapeHtml(region) + '"> ';
        html += '<button type="submit">Apply</button> ';
        html += '<span class="site-preference-message"></span>';
        html += '</form>';
        container.innerHTML = html;
      }

      function renderAppHeader(container) {
        const app = state.appDetail;
        if (!app) {
          container.innerHTML = '';
          return;
        }
        const categoryName = app.category && app.category.name ? app.category.name : '';
        const short = app.shortDescription || '';
        const ratingVal = app.rating;
        const ratingCount = app.ratingCount;
        let ratingText = '';
        if (typeof ratingVal === 'number' && typeof ratingCount === 'number' && ratingCount > 0) {
          ratingText = escapeHtml(ratingVal.toFixed(1)) + ' stars (' + escapeHtml(ratingCount) + ' ratings)';
        } else {
          ratingText = 'Not yet rated';
        }
        let html = '';
        if (categoryName) {
          html += '<p class="app-category">' + escapeHtml(categoryName) + '</p>';
        }
        html += '<h1 class="app-name">' + escapeHtml(app.name || '') + '</h1>';
        if (short) {
          html += '<p class="app-short-description">' + escapeHtml(short) + '</p>';
        }
        html += '<p class="app-rating-line">' + ratingText + '</p>';
        container.innerHTML = html;
      }

      function renderFeatureTags(container) {
        const app = state.appDetail;
        if (!app || !app.featureTags || !app.featureTags.length) {
          container.innerHTML = '';
          return;
        }
        let html = '';
        for (let i = 0; i < app.featureTags.length; i += 1) {
          const tag = app.featureTags[i];
          html += '<button type="button" class="feature-tag" data-action="feature-tag" data-tag="' + escapeHtml(tag) + '">';
          html += escapeHtml(tag);
          html += '</button> ';
        }
        container.innerHTML = html;
      }

      function renderDescription(container) {
        const app = state.appDetail;
        if (!app) {
          container.innerHTML = '';
          return;
        }
        const desc = app.description || '';
        const parts = desc.split(/\n{2,}/);
        let html = '';
        html += '<h2>Description</h2>';
        if (parts.length === 0 || (parts.length === 1 && parts[0].trim() === '')) {
          html += '<p>No detailed description is available for this app.</p>';
        } else {
          for (let i = 0; i < parts.length; i += 1) {
            const text = parts[i].trim();
            if (text) {
              html += '<p>' + escapeHtml(text) + '</p>';
            }
          }
        }
        container.innerHTML = html;
      }

      function renderScreenshotGallery(container) {
        const app = state.appDetail;
        const screenshots = app && app.screenshots ? app.screenshots : [];
        if (!screenshots.length) {
          container.innerHTML = '<p>No screenshots available.</p>';
          return;
        }
        if (state.screenshotIndex < 0 || state.screenshotIndex >= screenshots.length) {
          state.screenshotIndex = 0;
        }
        let html = '';
        const activeIndex = state.screenshotIndex;
        const activeShot = screenshots[activeIndex];
        const altBase = app && app.name ? app.name + ' screenshot' : 'App screenshot';
        html += '<figure class="screenshot-main">';
        html += '<img src="' + escapeHtml(activeShot.url) + '" alt="' + escapeHtml(activeShot.altText || altBase) + '">';
        html += '</figure>';
        if (screenshots.length > 1) {
          html += '<div class="screenshot-thumbnails">';
          for (let i = 0; i < screenshots.length; i += 1) {
            const shot = screenshots[i];
            html += '<button type="button" class="screenshot-thumb' + (i === activeIndex ? ' is-active' : '') + '" data-action="screenshot-thumb" data-screenshot-index="' + i + '">';
            html += '<img src="' + escapeHtml(shot.url) + '" alt="' + escapeHtml(shot.altText || altBase) + '">';
            html += '</button>';
          }
          html += '</div>';
          html += '<div class="screenshot-controls">';
          html += '<a href="javascript:void(0)" data-action="screenshot-prev">Previous</a> | ';
          html += '<a href="javascript:void(0)" data-action="screenshot-next">Next</a>';
          html += '</div>';
        }
        container.innerHTML = html;
      }

      function renderStoreCtas(container) {
        const app = state.appDetail;
        if (!app || !app.ctas || !app.ctas.length) {
          container.innerHTML = '';
          return;
        }
        const storeCtas = [];
        for (let i = 0; i < app.ctas.length; i += 1) {
          const cta = app.ctas[i];
          if (cta && cta.platform) {
            storeCtas.push(cta);
          }
        }
        if (!storeCtas.length) {
          container.innerHTML = '';
          return;
        }
        let html = '';
        html += '<h2>Get the app</h2>';
        html += '<p class="store-cta-message"></p>';
        html += '<p>';
        for (let i = 0; i < storeCtas.length; i += 1) {
          const cta = storeCtas[i];
          const platform = cta.platform;
          html += '<a href="javascript:void(0)" data-action="store-cta" data-platform="' + escapeHtml(platform) + '">';
          html += escapeHtml(cta.label || platformLabel(platform));
          html += '</a>';
          if (i < storeCtas.length - 1) {
            html += ' | ';
          }
        }
        html += '</p>';
        container.innerHTML = html;
      }

      function renderSupportLinks(container) {
        let html = '';
        html += '<div class="support-inner">';
        html += '<p><strong>Need help with this app?</strong></p>';
        html += '<p><a href="javascript:void(0)" data-action="open-resources">Guides &amp; Tutorials for this app</a></p>';
        html += '<p><a href="javascript:void(0)" data-action="back-to-apps">Browse all apps</a></p>';
        html += '</div>';
        container.innerHTML = html;
      }

      function renderCompatibility(container) {
        const app = state.appDetail;
        if (!app) {
          container.innerHTML = '';
          return;
        }
        const summary = app.compatibilitySummary || '';
        const platforms = app.platforms || [];
        let html = '';
        html += '<h2>Compatibility</h2>';
        if (summary) {
          html += '<p>' + escapeHtml(summary) + '</p>';
        }
        if (platforms.length) {
          html += '<p><a href="javascript:void(0)" data-action="toggle-compatibility">Show detailed platform list</a></p>';
          html += '<div class="compatibility-details" data-expanded="false" style="display:none;">';
          html += '<ul>';
          for (let i = 0; i < platforms.length; i += 1) {
            const p = platforms[i];
            const label = platformLabel(p.platform);
            const supportedText = p.isSupported ? 'Supported' : 'Not supported';
            const minOs = p.minOsVersion ? ' &ndash; requires OS ' + escapeHtml(p.minOsVersion) : '';
            const notes = p.notes ? ' (' + escapeHtml(p.notes) + ')' : '';
            html += '<li data-platform="' + escapeHtml(p.platform) + '">';
            html += escapeHtml(label) + ': ' + supportedText + minOs + notes;
            html += '</li>';
          }
          html += '</ul>';
          html += '</div>';
        } else {
          html += '<p>Platform compatibility information is not available.</p>';
        }
        container.innerHTML = html;
      }

      function renderPricing(container) {
        const app = state.appDetail;
        if (!app) {
          container.innerHTML = '';
          return;
        }
        const pref = state.sitePreference || {};
        const pricingModel = app.pricingModel || '';
        const hasTrial = !!app.hasFreeTrial;
        const trialDays = app.freeTrialDays;
        let title = 'Pricing';
        let mainLine = '';
        let extraLine = '';
        if (pricingModel === 'free') {
          mainLine = 'Free app.';
        } else if (pricingModel === 'freemium') {
          mainLine = 'Free download with optional in-app purchases.';
        } else if (pricingModel === 'subscription') {
          if (app.displayPrice) {
            mainLine = app.displayPrice;
          } else if (app.monthlyPrice !== null && app.monthlyPrice !== undefined) {
            mainLine = formatCurrency(app.monthlyPrice, app.baseCurrency || pref.currency) + ' per month';
          } else {
            mainLine = 'Subscription pricing available.';
          }
        } else if (pricingModel === 'one_time_purchase') {
          if (app.displayPrice) {
            mainLine = app.displayPrice;
          } else if (app.oneTimePrice !== null && app.oneTimePrice !== undefined) {
            mainLine = formatCurrency(app.oneTimePrice, app.baseCurrency || pref.currency) + ' one-time purchase';
          } else {
            mainLine = 'One-time purchase pricing available.';
          }
        } else {
          mainLine = app.displayPrice || 'Pricing information not available.';
        }
        const baseCur = (app.baseCurrency || '').toLowerCase();
        const siteCur = (pref.currency || '').toLowerCase();
        if (siteCur && baseCur && siteCur !== baseCur) {
          extraLine = 'Displayed in ' + siteCur.toUpperCase() + '; billed in ' + baseCur.toUpperCase() + '.';
        }
        let html = '';
        html += '<h2>' + escapeHtml(title) + '</h2>';
        html += '<p>' + escapeHtml(mainLine) + '</p>';
        if (hasTrial && trialDays) {
          html += '<p>Includes a ' + escapeHtml(trialDays) + '-day free trial for new customers.</p>';
        } else if (hasTrial) {
          html += '<p>Includes a free trial for new customers.</p>';
        }
        if (extraLine) {
          html += '<p>' + escapeHtml(extraLine) + '</p>';
        }
        container.innerHTML = html;
      }

      function renderAcquisitionCtas(container) {
        const app = state.appDetail;
        if (!app || !app.ctas || !app.ctas.length) {
          container.innerHTML = '';
          return;
        }
        const acquisitionCtas = [];
        for (let i = 0; i < app.ctas.length; i += 1) {
          const cta = app.ctas[i];
          if (cta && !cta.platform) {
            acquisitionCtas.push(cta);
          }
        }
        if (!acquisitionCtas.length) {
          container.innerHTML = '';
          return;
        }
        let html = '';
        html += '<div class="acquisition-inner">';
        html += '<h2>Get started</h2>';
        if (app.pricingModel === 'subscription') {
          html += '<div class="billing-frequency-selector">';
          html += '<p>Select billing frequency:</p>';
          html += '<label><input type="radio" name="billingFrequency" value="monthly"' + (state.selectedBillingFrequency === 'monthly' ? ' checked' : '') + '> Monthly</label><br>';
          html += '<label><input type="radio" name="billingFrequency" value="yearly"' + (state.selectedBillingFrequency === 'yearly' ? ' checked' : '') + '> Yearly</label>';
          html += '</div>';
        }
        html += '<ul class="acquisition-cta-list">';
        for (let i = 0; i < acquisitionCtas.length; i += 1) {
          const cta = acquisitionCtas[i];
          const actionType = cta.actionType || '';
          const label = cta.label || actionType;
          html += '<li>';
          html += '<a href="javascript:void(0)" data-action="acquisition-cta" data-action-type="' + escapeHtml(actionType) + '">';
          html += escapeHtml(label);
          html += '</a>';
          html += '</li>';
        }
        html += '</ul>';
        html += '<p class="acquisition-message"></p>';
        html += '</div>';
        container.innerHTML = html;
      }

      function renderAll() {
        const populateElements = document.querySelectorAll('[data-populate]');
        for (let i = 0; i < populateElements.length; i += 1) {
          const element = populateElements[i];
          const key = element.getAttribute('data-populate');
          if (key === 'site-preference') {
            renderSitePreference(element);
          } else if (key === 'app-detail-header') {
            renderAppHeader(element);
          } else if (key === 'app-feature-tags') {
            renderFeatureTags(element);
          } else if (key === 'app-description') {
            renderDescription(element);
          } else if (key === 'app-screenshot-gallery') {
            renderScreenshotGallery(element);
          } else if (key === 'app-store-ctas') {
            renderStoreCtas(element);
          } else if (key === 'app-support-links') {
            renderSupportLinks(element);
          } else if (key === 'app-compatibility') {
            renderCompatibility(element);
          } else if (key === 'app-pricing') {
            renderPricing(element);
          } else if (key === 'app-acquisition-ctas') {
            renderAcquisitionCtas(element);
          }
        }
      }

      function updateUrlWithPreference() {
        if (!state.appId) {
          return;
        }
        const pref = state.sitePreference || {};
        const url = new URL(window.location.href);
        url.searchParams.set('id', state.appId);
        if (pref.currency) {
          url.searchParams.set('currency', pref.currency);
        }
        if (pref.region) {
          url.searchParams.set('region', pref.region);
        }
        window.history.replaceState(null, '', url.toString());
      }

      function navigateToApps() {
        window.location.href = 'apps.html';
      }

      function navigateToResources() {
        if (state.appId) {
          window.location.href = 'resources.html?appId=' + encodeURIComponent(state.appId);
        } else {
          window.location.href = 'resources.html';
        }
      }

      function loadData() {
        hideMainContent();
        clearError();
        if (!state.appId) {
          showError('No app selected. Use the Apps catalog to choose an app.');
          return;
        }
        showLoader();
        try {
          state.sitePreference = WebsiteSDK.getSitePreference();
        } catch (e) {
          showError('Unable to load site preferences. Please try again.');
          return;
        }
        try {
          state.appDetail = WebsiteSDK.getAppDetail(state.appId);
        } catch (e2) {
          showError('Unable to load app details. Please try again.');
          return;
        }
        if (!state.appDetail || !state.appDetail.id) {
          showError('The requested app could not be found. It may have been removed.');
          return;
        }
        if (state.appDetail.isActive === false) {
          showError('This app is not currently available in the catalog.');
          return;
        }
        state.screenshotIndex = 0;
        renderAll();
        hideLoader();
        showMainContent();
      }

      document.body.addEventListener('click', function(event) {
        const actionEl = event.target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        const action = actionEl.getAttribute('data-action');
        if (action === 'back-to-apps') {
          event.preventDefault();
          navigateToApps();
        } else if (action === 'open-resources') {
          event.preventDefault();
          navigateToResources();
        } else if (action === 'retry-load') {
          event.preventDefault();
          loadData();
        } else if (action === 'store-cta') {
          event.preventDefault();
          const platform = actionEl.getAttribute('data-platform');
          const app = state.appDetail;
          if (!app || !app.platforms || !app.platforms.length) {
            return;
          }
          let match = null;
          for (let i = 0; i < app.platforms.length; i += 1) {
            const p = app.platforms[i];
            if (p.platform === platform) {
              match = p;
              break;
            }
          }
          let message = '';
          if (!match || !match.isSupported || !match.storeUrl) {
            message = 'This platform is currently unavailable for install.';
          } else {
            window.location.href = match.storeUrl;
            return;
          }
          const storeContainer = document.querySelector('[data-component="app-store-cta-list"]');
          if (storeContainer) {
            const msgEl = storeContainer.querySelector('.store-cta-message');
            if (msgEl) {
              msgEl.textContent = message;
            }
          }
        } else if (action === 'acquisition-cta') {
          event.preventDefault();
          const app = state.appDetail;
          if (!app || !state.appId) {
            return;
          }
          const actionType = actionEl.getAttribute('data-action-type') || '';
          let billingFrequency = undefined;
          if (actionType === 'subscribe' || app.pricingModel === 'subscription') {
            const selected = document.querySelector('input[name="billingFrequency"]:checked');
            billingFrequency = selected ? selected.value : state.selectedBillingFrequency || 'monthly';
          } else if (actionType === 'buy_now') {
            billingFrequency = 'one_time';
          }
          let response;
          try {
            if (billingFrequency !== undefined) {
              response = WebsiteSDK.initiateAppAcquisition(state.appId, actionType, billingFrequency);
            } else {
              response = WebsiteSDK.initiateAppAcquisition(state.appId, actionType);
            }
          } catch (e) {
            response = { success: false, message: 'Unable to start this action. Please try again.' };
          }
          const panel = document.querySelector('[data-component="app-acquisition-cta-panel"]');
          if (panel) {
            const msgEl = panel.querySelector('.acquisition-message');
            if (msgEl) {
              msgEl.textContent = response && response.message ? response.message : '';
            }
          }
          if (response && response.success && response.redirectTo === 'checkout') {
            window.location.href = 'checkout.html';
          }
        } else if (action === 'toggle-compatibility') {
          event.preventDefault();
          const compContainer = document.querySelector('[data-component="app-compatibility-section"]');
          if (!compContainer) {
            return;
          }
          const details = compContainer.querySelector('.compatibility-details');
          if (!details) {
            return;
          }
          const expanded = details.getAttribute('data-expanded') === 'true';
          if (expanded) {
            details.style.display = 'none';
            details.setAttribute('data-expanded', 'false');
            actionEl.textContent = 'Show detailed platform list';
          } else {
            details.style.display = 'block';
            details.setAttribute('data-expanded', 'true');
            actionEl.textContent = 'Hide detailed platform list';
          }
        } else if (action === 'feature-tag') {
          event.preventDefault();
          const allTags = document.querySelectorAll('.feature-tag');
          for (let i = 0; i < allTags.length; i += 1) {
            allTags[i].classList.remove('is-active');
          }
          actionEl.classList.add('is-active');
          const descSection = document.querySelector('.app-description-section');
          if (descSection && typeof descSection.scrollIntoView === 'function') {
            descSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        } else if (action === 'screenshot-thumb') {
          event.preventDefault();
          const indexStr = actionEl.getAttribute('data-screenshot-index');
          const index = parseInt(indexStr, 10);
          if (!isNaN(index)) {
            state.screenshotIndex = index;
            const gallery = document.querySelector('[data-component="app-screenshot-gallery"]');
            if (gallery) {
              renderScreenshotGallery(gallery);
            }
          }
        } else if (action === 'screenshot-prev') {
          event.preventDefault();
          const app = state.appDetail;
          const shots = app && app.screenshots ? app.screenshots : [];
          if (!shots.length) {
            return;
          }
          state.screenshotIndex -= 1;
          if (state.screenshotIndex < 0) {
            state.screenshotIndex = shots.length - 1;
          }
          const galleryPrev = document.querySelector('[data-component="app-screenshot-gallery"]');
          if (galleryPrev) {
            renderScreenshotGallery(galleryPrev);
          }
        } else if (action === 'screenshot-next') {
          event.preventDefault();
          const app = state.appDetail;
          const shots = app && app.screenshots ? app.screenshots : [];
          if (!shots.length) {
            return;
          }
          state.screenshotIndex += 1;
          if (state.screenshotIndex >= shots.length) {
            state.screenshotIndex = 0;
          }
          const galleryNext = document.querySelector('[data-component="app-screenshot-gallery"]');
          if (galleryNext) {
            renderScreenshotGallery(galleryNext);
          }
        }
      });

      document.addEventListener('submit', function(event) {
        const form = event.target;
        if (!form || form.getAttribute('data-action') !== 'site-preference-form') {
          return;
        }
        event.preventDefault();
        const currencySelect = form.querySelector('#currencySelect');
        const regionInput = form.querySelector('#regionInput');
        const messageSpan = form.querySelector('.site-preference-message');
        const currency = currencySelect ? currencySelect.value : 'usd';
        const regionRaw = regionInput ? regionInput.value : '';
        const region = regionRaw && regionRaw.trim ? regionRaw.trim() : regionRaw;
        let response;
        try {
          response = WebsiteSDK.updateSitePreference(currency, region);
        } catch (e) {
          if (messageSpan) {
            messageSpan.textContent = 'Unable to update preferences. Please try again.';
          }
          return;
        }
        if (!response || !response.success || !response.preference) {
          if (messageSpan) {
            const msg = response && response.message ? response.message : 'Unable to update preferences.';
            messageSpan.textContent = msg;
          }
          return;
        }
        state.sitePreference = response.preference;
        updateUrlWithPreference();
        try {
          state.appDetail = WebsiteSDK.getAppDetail(state.appId);
        } catch (e2) {
          if (messageSpan) {
            messageSpan.textContent = 'Preferences updated, but app details could not be refreshed.';
          }
          renderAll();
          return;
        }
        renderAll();
        showMainContent();
        if (messageSpan) {
          messageSpan.textContent = 'Preferences updated.';
        }
      });

      document.addEventListener('change', function(event) {
        const target = event.target;
        if (target && target.name === 'billingFrequency') {
          state.selectedBillingFrequency = target.value;
        }
      });

      loadData();
    });
  </script>
</body>
</html>
