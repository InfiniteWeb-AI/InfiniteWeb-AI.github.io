",\"PDF export\"],\"hasFreeTrial\":true,\"freeTrialDays\":7,\"isActive\":true,\"createdAt\":\"2024-01-22T14:05:00Z\",\"updatedAt\":\"2025-09-09T19:00:00Z\"},{\"id\":\"syncvault_backup\",\"name\":\"SyncVault Backup\",\"slug\":\"syncvault-backup\",\"categoryId\":\"utilities\",\"shortDescription\":\"Automatic photo and file backup with offline restore.\",\"description\":\"SyncVault Backup protects your photos and important files with automatic, encrypted backups. Restore your content even when offline, and let the app reconcile changes when you reconnect.\",\"pricingModel\":\"subscription\",\"monthlyPrice\":7.99,\"oneTimePrice\":0,\"baseCurrency\":\"usd\",\"rating\":4.1,\"ratingCount\":6533,\"featureTags\":[\"Cloud sync\",\"Offline access\",\"Backup & restore\"],\"hasFreeTrial\":true,\"freeTrialDays\":30,\"isActive\":true,\"createdAt\":\"2023-04-03T06:50:00Z\",\"updatedAt\":\"2025-05-17T09:35:00Z\"}]");
            localStorage.setItem("faq_articles", "[{\"id\":\"cancel_ios_subscription_7_days\",\"categoryId\":\"subscriptions\",\"title\":\"Cancel your iOS subscription within 7 days\",\"slug\":\"cancel-ios-subscription-within-7-days\",\"excerpt\":\"Learn how to cancel your iOS subscription within 7 days of purchase and when you may be eligible for a refund.\",\"body\":\"## Overview\\n\\nYou can cancel your iOS subscription at any time from your iPhone or iPad. If you cancel within 7 days of your initial purchase or renewal, you may be eligible for a refund depending on your region and the applicable store policies.\\n\\n## How to cancel your iOS subscription\\n\\n1. Open the **Settings** app on your iPhone or iPad.\\n2. Tap your name at the top, then tap **Subscriptions**.\\n3. Locate the app subscription (for example, *NoteMaster* or *TaskFlow*).\\n4. Tap the subscription, then tap **Cancel Subscription** and confirm.\\n\\nYour subscription will remain active until the end of the current billing period, unless Apple confirms an immediate cancellation and refund.\\n\\n## Within 7 days of purchase\\n\\nIf you cancel **within 7 days** of your purchase or renewal date, you can request a refund review. Apple processes payments for iOS subscriptions, but our team can help you understand your options.\\n\\nWhen contacting us, include:\\n- The Apple ID used for the purchase\\n- The app name (for example, *NoteMaster* or *HabitHero*)\\n- The approximate purchase date\\n- A short description mentioning that you cancelled within 7 days\\n\\n## Refunds\\n\\nRefund decisions for iOS purchases are ultimately handled by Apple. However, we can provide documentation and confirm your subscription status on our side.\\n\\nTo start the process, first submit a refund request through Apple:\\n\\n1. Visit **reportaproblem.apple.com** and sign in with your Apple ID.\\n2. Select the subscription you wish to request a refund for.\\n3. Choose a reason and submit the request.\\n\\nAfter submitting the request to Apple, you can also reach out to our support team so we can review your account in parallel.\\n\\nAt the bottom of this article, use the **Contact support about refunds** button to send us your details. A support specialist will follow up with you by email.\",\"keywords\":[\"cancel subscription\",\"iOS\",\"refund\",\"7 days\",\"cancel iOS subscription\",\"Apple billing\"],\"isPopular\":true,\"createdAt\":\"2024-04-05T09:00:00Z\",\"updatedAt\":\"2025-12-15T11:30:00Z\"},{\"id\":\"manage_android_subscriptions\",\"categoryId\":\"subscriptions\",\"title\":\"Manage your Android subscriptions\",\"slug\":\"manage-android-subscriptions\",\"excerpt\":\"Find, change, or cancel app subscriptions purchased through Google Play.\",\"body\":\"## Where to find your Android subscriptions\\n\\nMost Android subscriptions for our apps, including HabitHero and TaskFlow, are managed directly through **Google Play**.\\n\\nTo view them:\\n1. Open the **Google Play Store** app.\\n2. Tap your profile picture > **Payments & subscriptions**.\\n3. Tap **Subscriptions**.\\n\\n## Change plans or cancel\\n\\nFrom the subscription screen you can:\\n- Upgrade or downgrade between available plans\\n- Update your payment method\\n- Cancel your subscription\\n\\nChanges usually take effect at the next billing date.\\n\\n## After cancellation\\n\\nAfter you cancel, your subscription will stay active until the end of the paid period. You can resubscribe at any time from the same screen.\",\"keywords\":[\"Android\",\"Google Play\",\"manage subscription\",\"cancel subscription\",\"TaskFlow\",\"HabitHero\"],\"isPopular\":true,\"createdAt\":\"2023-12-10T10:15:00Z\",\"updatedAt\":\"2025-07-22T08:45:00Z\"},{\"id\":\"billing_double_charge\",\"categoryId\":\"billing_payments\",\"title\":\"Why was I charged twice for my subscription?\",\"slug\":\"double-charged-for-subscription\",\"excerpt\":\"Understand common reasons for seeing two charges and how to fix a double charge on your account.\",\"body\":\"## Overview\\n\\nIf you believe you were **double-charged for your monthly subscription**, there are a few common explanations and steps you can take to resolve the issue.\\n\\n## Common reasons for two charges\\n\\n1. **Overlapping subscriptions** on different platforms (for example, one via Google Play and one via the App Store).\\n2. **Multiple accounts** using the same payment method.\\n3. **Pending authorizations** that appear as duplicate charges but disappear after a few days.\\n\\n## What to check first\\n\\n- Confirm which store (Google Play, App Store, or our website) each charge came from.\\n- Make sure you are signed in with the correct Google or Apple account.\\n- Review your email receipts for duplicate purchases.\\n\\n## Getting help\\n\\nIf you still see two settled charges for the same period, contact us with:\\n- A brief description including the phrase “double-charged for my monthly subscription”\\n- Screenshots of both charges\\n- The email addresses or IDs associated with each store account\\n\\nOur billing team will investigate and help you secure a refund where appropriate.\",\"keywords\":[\"double-charged\",\"billing issue\",\"payments\",\"refund\",\"monthly subscription\"],\"isPopular\":true,\"createdAt\":\"2023-11-02T13:30:00Z\",\"updatedAt\":\"2025-09-03T16:00:00Z\"},{\"id\":\"update_payment_method\",\"categoryId\":\"billing_payments\",\"title\":\"Update your payment method\",\"slug\":\"update-payment-method\",\"excerpt\":\"How to update your card or payment details for subscriptions.\",\"body\":\"## Where you pay determines how you update\\n\\nThe steps to update your payment method depend on where you started your subscription:\\n\\n- **Google Play** (Android)\\n- **App Store** (iOS / iPadOS)\\n- **Website checkout** (credit card or PayPal)\\n\\n## Google Play\\n\\n1. Open **Google Play Store**.\\n2. Tap your profile icon > **Payments & subscriptions** > **Payment methods**.\\n3. Add or edit your card details.\\n\\n## App Store (iOS)\\n\\n1. Open **Settings** on your device.\\n2. Tap your name > **Payment & Shipping**.\\n3. Add or update your card information.\\n\\n## Website purchases\\n\\nIf you subscribed directly on our website (for example to use NoteMaster across iOS + Android), you can update your card from the **Billing** section in your account dashboard.\",\"keywords\":[\"update payment method\",\"billing\",\"credit card\",\"Google Play\",\"App Store\"],\"isPopular\":false,\"createdAt\":\"2024-01-15T09:10:00Z\",\"updatedAt\":\"2025-02-27T12:20:00Z\"},{\"id\":\"refund_policy_general\",\"categoryId\":\"billing_payments\",\"title\":\"Refund policy for subscriptions and one-time purchases\",\"slug\":\"refund-policy\",\"excerpt\":\"Learn when you can request a refund for subscriptions, one-time purchases, and in-app upgrades.\",\"body\":\"## Subscriptions\\n\\nFor subscriptions like HabitHero, TaskFlow, or SecureChat+, refunds are generally offered when:\\n- There is a verified technical issue we cannot resolve.\\n- You were charged after cancelling on time.\\n\\nFor iOS subscriptions, Apple typically processes refunds directly. For Android and web subscriptions, our billing team can assist you.\\n\\n## One-time purchases\\n\\nFor one-time apps such as PhotoCraft Pro, we may offer a refund within a limited period (usually 14 days) if you experience unresolved technical issues and have not heavily used the product (for example, exporting dozens of projects).\\n\\n## How to request a refund\\n\\n1. Gather your purchase receipt.\\n2. Note the app name and platform.\\n3. Contact support from the **Contact Support** page and select **Billing & Payments** as the issue type.\\n\\nInclude as much detail as possible so our team can review your case quickly.\",\"keywords\":[\"refund policy\",\"one-time purchase\",\"subscription\",\"PhotoCraft Pro\"],\"isPopular\":true,\"createdAt\":\"2023-10-20T08:40:00Z\",\"updatedAt\":\"2025-06-09T15:35:00Z\"},{\"id\":\"sync_across_devices_troubleshooting\",\"categoryId\":\"technical_issues\",\"title\":\"Fix sync issues across devices\",\"slug\":\"fix-sync-issues-across-devices\",\"excerpt\":\"Troubleshoot common sync problems for apps like NoteMaster, CloudLists, and BudgetWise.\",\"body\":\"## Check your connection\\n\\nFirst, make sure each device has a stable internet connection. Many of our apps, including NoteMaster and CloudLists, support offline access and Cloud sync. Changes made offline should sync automatically once your device reconnects.\\n\\n## Make sure you are signed in to the same account\\n\\nConfirm that you’re using the same email or account ID on all devices. If the accounts differ, your data will not sync.\\n\\n## Force a manual sync\\n\\nMost apps have a **Sync now** option in Settings. Use this to trigger a sync if automatic sync appears delayed.\\n\\n## Reinstalling the app\\n\\nAs a last resort, sign out, reinstall the app, and sign back in. This will force a full sync from the server, but may take a few minutes depending on your data size.\",\"keywords\":[\"Cloud sync\",\"sync across devices\",\"NoteMaster\",\"offline access\",\"troubleshooting\"],\"isPopular\":true,\"createdAt\":\"2024-03-02T11:25:00Z\",\"updatedAt\":\"2025-05-18T10:05:00Z\"},{\"id\":\"offline_access_explained\",\"categoryId\":\"general\",\"title\":\"How offline access works in our apps\",\"slug\":\"offline-access-explained\",\"excerpt\":\"Understand what you can do without an internet connection and how data syncs later.\",\"body\":\"## What you can do offline\\n\\nApps like HabitHero, NoteMaster, CloudLists, BudgetWise, and PhotoCraft Pro support offline access. You can:\\n- View and edit existing data\\n- Create new notes, tasks, or projects\\n- Capture photos and scans\\n\\n## When does Cloud sync happen?\\n\\nChanges made offline are saved locally and automatically pushed to the Cloud when you next connect to the internet. You don't need to press a button, but some apps also offer a **Sync now** action.\\n\\n## Conflict resolution\\n\\nIf you change the same item on two devices while offline, the most recent edit usually wins. When possible, the app will show a conflict dialog so you can choose which version to keep.\",\"keywords\":[\"offline access\",\"Cloud sync\",\"HabitHero\",\"NoteMaster\",\"CloudLists\"],\"isPopular\":false,\"createdAt\":\"2023-09-12T07:55:00Z\",\"updatedAt\":\"2024-11-30T09:45:00Z\"},{\"id\":\"security_encryption_overview\",\"categoryId\":\"general\",\"title\":\"Security and encryption in SecureChat+ and WhisperLine\",\"slug\":\"security-encryption-securechat-whisperline\",\"excerpt\":\"Learn how End-to-end encryption protects your messages in our communication apps.\",\"body\":\"## End-to-end encryption\\n\\nBoth SecureChat+ and WhisperLine use End-to-end encryption for private and group chats. This means messages are encrypted on your device and can only be decrypted on the recipient’s devices.\\n\\n## Supported platforms\\n\\n- Android 8.0 or later\\n- iOS 13 or later\\n\\n## Backups and Cloud sync\\n\\nEven when messages are synced across devices, they remain encrypted. Some metadata (such as last-seen status) may be stored without End-to-end encryption, but message contents and attachments are fully protected.\",\"keywords\":[\"End-to-end encryption\",\"SecureChat+\",\"WhisperLine\",\"security\",\"Android 8.0\",\"iOS 13\"],\"isPopular\":true,\"createdAt\":\"2024-02-08T12:00:00Z\",\"updatedAt\":\"2025-01-19T13:10:00Z\"},{\"id\":\"create_account\",\"categoryId\":\"account\",\"title\":\"Create an account and sign in\",\"slug\":\"create-account-and-sign-in\",\"excerpt\":\"Set up your account to sync data across devices and access subscriptions.\",\"body\":\"## Why create an account?\\n\\nAn account lets you sync data between devices, manage subscriptions in one place, and contact support more easily.\\n\\n## Creating an account\\n\\n1. Open any supported app, such as NoteMaster or CloudLists.\\n2. Go to **Settings > Account**.\\n3. Tap **Create account** and follow the prompts.\\n\\n## Signing in on another device\\n\\nInstall the same app on your second device and sign in with the same email address. Your data will appear after it finishes syncing.\",\"keywords\":[\"account\",\"sign in\",\"create account\",\"sync\",\"NoteMaster\"],\"isPopular\":false,\"createdAt\":\"2023-07-18T09:05:00Z\",\"updatedAt\":\"2024-08-22T16:40:00Z\"},{\"id\":\"reset_password\",\"categoryId\":\"account\",\"title\":\"Reset your password\",\"slug\":\"reset-password\",\"excerpt\":\"Follow these steps if you forgot your password or need to reset it.\",\"body\":\"## Reset from the app\\n\\n1. On the sign-in screen, tap **Forgot password?**.\\n2. Enter the email address associated with your account.\\n3. Check your inbox for a password reset email and follow the link.\\n\\n## Reset from the website\\n\\nYou can also start a reset from the **Sign In** page on our website. Use the same email you use in the apps.\\n\\nIf you no longer have access to your email, contact support and be prepared to verify your identity.\",\"keywords\":[\"reset password\",\"forgot password\",\"account\",\"sign in\"],\"isPopular\":false,\"createdAt\":\"2023-05-09T10:30:00Z\",\"updatedAt\":\"2024-10-01T13:55:00Z\"},{\"id\":\"contact_support_options\",\"categoryId\":\"general\",\"title\":\"How to contact support\",\"slug\":\"how-to-contact-support\",\"excerpt\":\"Learn the best ways to reach our support team for technical, billing, or account issues.\",\"body\":\"## Contact form\\n\\nThe quickest way to reach us is through the **Contact Support** form on our website. Choose the app (for example, TaskFlow or NoteMaster), pick an issue type like **Billing & Payments**, set a priority, and describe your issue.\\n\\n## Email\\n\\nYou can also reply directly to any email you've received from our support team to continue an existing conversation.\\n\\n## Response times\\n\\nWe aim to respond to high-priority billing issues within 4 business hours and other issues within 1 business day.\",\"keywords\":[\"contact support\",\"billing\",\"technical issues\",\"TaskFlow\",\"NoteMaster\"],\"isPopular\":true,\"createdAt\":\"2023-08-01T14:20:00Z\",\"updatedAt\":\"2025-01-07T09:15:00Z\"}]");

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const url = new URL(window.location.href);
      const urlParams = url.searchParams;
      const newsletterStatusFromUrl = urlParams.get('newsletter_status');

      let sitePreference = { currency: 'usd', region: '' };
      let currentBillingView = 'monthly';

      function updateQueryParam(key, value) {
        const currentUrl = new URL(window.location.href);
        if (value === null || value === undefined || value === '') {
          currentUrl.searchParams.delete(key);
        } else {
          currentUrl.searchParams.set(key, value);
        }
        window.history.replaceState(null, '', currentUrl.toString());
      }

      function initializeSitePreference() {
        const currencyParam = urlParams.get('currency');
        const regionParam = urlParams.get('region');

        try {
          if (currencyParam || regionParam) {
            let basePreference = null;
            try {
              basePreference = WebsiteSDK.getSitePreference();
            } catch (e) {
              console.error('Error getting base site preference:', e);
            }

            const currencyToUse = currencyParam || (basePreference && basePreference.currency) || 'usd';
            const regionToUse = regionParam || (basePreference && basePreference.region) || undefined;

            const response = WebsiteSDK.updateSitePreference(currencyToUse, regionToUse);
            if (response && response.success && response.preference) {
              sitePreference = {
                currency: response.preference.currency || 'usd',
                region: response.preference.region || ''
              };
            } else if (basePreference && basePreference.currency) {
              sitePreference = {
                currency: basePreference.currency,
                region: basePreference.region || ''
              };
            } else {
              sitePreference = {
                currency: currencyToUse,
                region: regionToUse || ''
              };
            }
          } else {
            const pref = WebsiteSDK.getSitePreference();
            if (pref && pref.currency) {
              sitePreference = {
                currency: pref.currency,
                region: pref.region || ''
              };
            } else {
              sitePreference = { currency: 'usd', region: '' };
            }
          }
        } catch (e) {
          console.error('Error initializing site preference:', e);
          sitePreference = { currency: 'usd', region: '' };
        }

        renderPreferenceControls(sitePreference);
      }

      function renderPreferenceControls(preference) {
        const currencySelect = document.querySelector('[data-action="change-currency"]');
        const regionSelect = document.querySelector('[data-action="change-region"]');

        if (currencySelect) {
          currencySelect.innerHTML = '';
          const currencies = ['usd', 'eur'];
          currencies.forEach((cur) => {
            const option = document.createElement('option');
            option.value = cur;
            option.textContent = cur.toUpperCase();
            currencySelect.appendChild(option);
          });
          if (preference.currency) {
            currencySelect.value = preference.currency;
          }
        }

        if (regionSelect) {
          if (!regionSelect.options.length) {
            const regions = [
              { value: '', label: 'Select region (optional)' },
              { value: 'United States', label: 'United States' },
              { value: 'Canada', label: 'Canada' },
              { value: 'Germany', label: 'Germany' },
              { value: 'United Kingdom', label: 'United Kingdom' },
              { value: 'Other', label: 'Other' }
            ];
            regions.forEach((region) => {
              const option = document.createElement('option');
              option.value = region.value;
              option.textContent = region.label;
              regionSelect.appendChild(option);
            });
          }
          regionSelect.value = preference.region || '';
        }
      }

      function renderHomeHero(container, hero) {
        container.innerHTML = '';

        const titleText = hero && typeof hero.title === 'string' && hero.title.trim() ? hero.title : '';
        const subtitleText = hero && typeof hero.subtitle === 'string' && hero.subtitle.trim() ? hero.subtitle : '';

        if (titleText) {
          const h1 = document.createElement('h1');
          h1.className = 'page-title';
          h1.textContent = titleText;
          container.appendChild(h1);
        }

        if (subtitleText) {
          const p = document.createElement('p');
          p.className = 'page-intro';
          p.textContent = subtitleText;
          container.appendChild(p);
        }

        if (hero && Array.isArray(hero.highlightPoints) && hero.highlightPoints.length) {
          const list = document.createElement('ul');
          list.className = 'hero-highlight-list';
          hero.highlightPoints.forEach((point) => {
            if (typeof point === 'string' && point.trim()) {
              const li = document.createElement('li');
              li.textContent = point;
              list.appendChild(li);
            }
          });
          if (list.childElementCount > 0) {
            container.appendChild(list);
          }
        }
      }

      function createAppCard(app) {
        const row = document.createElement('div');
        row.className = 'featured-app-row';
        row.setAttribute('data-component', 'featured-app-card');

        const leftCol = document.createElement('div');
        leftCol.className = 'app-col app-image-col';
        const imagePlaceholder = document.createElement('div');
        imagePlaceholder.className = 'app-image-placeholder';
        imagePlaceholder.setAttribute('aria-hidden', 'true');
        leftCol.appendChild(imagePlaceholder);

        const centerCol = document.createElement('div');
        centerCol.className = 'app-col app-main-col';

        const title = document.createElement('h3');
        title.className = 'app-name';
        const titleLink = document.createElement('a');
        titleLink.href = 'javascript:void(0)';
        titleLink.textContent = app.name || 'View app';
        titleLink.setAttribute('data-action', 'view-app-detail');
        titleLink.setAttribute('data-app-id', app.id || '');
        title.appendChild(titleLink);
        centerCol.appendChild(title);

        if (app.shortDescription) {
          const desc = document.createElement('p');
          desc.className = 'app-short-description';
          desc.textContent = app.shortDescription;
          centerCol.appendChild(desc);
        }

        const pricing = document.createElement('p');
        pricing.className = 'app-pricing';
        const pricingLabel = document.createElement('span');
        pricingLabel.className = 'app-pricing-label';
        pricingLabel.textContent = 'Pricing: ';
        const pricingValue = document.createElement('span');
        pricingValue.className = 'app-pricing-value';
        pricingValue.textContent = app.displayPrice || '';
        pricing.appendChild(pricingLabel);
        pricing.appendChild(pricingValue);
        centerCol.appendChild(pricing);

        if (typeof app.rating === 'number' && typeof app.ratingCount === 'number') {
          const rating = document.createElement('p');
          rating.className = 'app-rating';
          rating.textContent = `Rating: ${app.rating.toFixed(1)} (${app.ratingCount} reviews)`;
          centerCol.appendChild(rating);
        }

        if (Array.isArray(app.featureTags) && app.featureTags.length) {
          const tagsWrapper = document.createElement('p');
          tagsWrapper.className = 'app-tags';
          app.featureTags.forEach((tag) => {
            if (typeof tag === 'string' && tag.trim()) {
              const tagSpan = document.createElement('span');
              tagSpan.className = 'app-tag';
              tagSpan.textContent = tag;
              tagsWrapper.appendChild(tagSpan);
            }
          });
          if (tagsWrapper.childElementCount > 0) {
            centerCol.appendChild(tagsWrapper);
          }
        }

        if (app.hasFreeTrial && typeof app.freeTrialDays === 'number') {
          const trial = document.createElement('p');
          trial.className = 'app-free-trial';
          trial.textContent = `Free trial available: ${app.freeTrialDays}-day trial`;
          centerCol.appendChild(trial);
        }

        if (Array.isArray(app.platforms) && app.platforms.length) {
          const platforms = document.createElement('p');
          platforms.className = 'app-platforms';
          const label = document.createElement('span');
          label.textContent = 'Available on: ';
          platforms.appendChild(label);
          let first = true;
          app.platforms.forEach((platformInfo) => {
            if (!platformInfo || platformInfo.isSupported === false) {
              return;
            }
            const platformName = platformInfo.platform || '';
            if (!platformName) {
              return;
            }
            const span = document.createElement('span');
            span.className = 'app-platform';
            span.textContent = first ? platformName : `, ${platformName}`;
            platforms.appendChild(span);
            first = false;
          });
          centerCol.appendChild(platforms);
        }

        if (app.categoryId && app.categoryName) {
          const categoryP = document.createElement('p');
          categoryP.className = 'app-category-cta';
          const link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.textContent = `Explore ${app.categoryName} apps`;
          link.setAttribute('data-action', 'view-app-category');
          link.setAttribute('data-category-id', app.categoryId);
          link.setAttribute('data-category-name', app.categoryName);
          categoryP.appendChild(link);
          centerCol.appendChild(categoryP);
        }

        const rightCol = document.createElement('div');
        rightCol.className = 'app-col app-support-col';
        const supportInner = document.createElement('div');
        supportInner.className = 'app-support-inner';
        const supportIcon = document.createElement('div');
        supportIcon.className = 'support-icon-placeholder';
        supportIcon.setAttribute('aria-hidden', 'true');
        const supportText = document.createElement('p');
        supportText.className = 'support-text';
        supportText.textContent = 'Need help with this app?';
        const supportLink = document.createElement('a');
        supportLink.href = 'support.html';
        supportLink.className = 'support-link';
        supportLink.textContent = 'Visit Support';
        supportInner.appendChild(supportIcon);
        supportInner.appendChild(supportText);
        supportInner.appendChild(supportLink);
        rightCol.appendChild(supportInner);

        row.appendChild(leftCol);
        row.appendChild(centerCol);
        row.appendChild(rightCol);

        return row;
      }

      function createPlanCard(plan) {
        const card = document.createElement('div');
        card.className = 'plan-card';
        card.setAttribute('data-component', 'featured-plan-card');

        const metaEl = document.createElement('p');
        metaEl.className = 'plan-meta';

          parts.push(`Up to ${plan.deviceLimit} devices`);

        if (Array.isArray(plan.includedPlatforms) && plan.includedPlatforms.length) {
          parts.push(`Platforms: ${plan.includedPlatforms.join(', ')}`);

        card.appendChild(priceWrapper);

        const ctaWrapper = document.createElement('p');
        ctaWrapper.className = 'plan-cta';
        const ctaLink = document.createElement('a');
        ctaLink.href = 'javascript:void(0)';
        ctaLink.textContent = 'View plan details';
        ctaLink.setAttribute('data-action', 'view-plan-detail');
        ctaLink.setAttribute('data-plan-id', plan.id || '');
        ctaWrapper.appendChild(ctaLink);
        card.appendChild(ctaWrapper);

        if (plan.isPopular) {
          const popularTag = document.createElement('div');
          popularTag.className = 'plan-popular';
          popularTag.textContent = 'Popular';

        const yearlyLabel = document.createElement('label');

        yearlyInput.type = 'radio';

        plansSection.appendChild(plansGrid);

      function updatePlansBillingView(view) {
        currentBillingView = view === 'yearly' ? 'yearly' : 'monthly';
        const priceElements = document.querySelectorAll('[data-plan-price-billing]');
        priceElements.forEach((el) => {
          if (el.getAttribute('data-plan-price-billing') === currentBillingView) {
            el.classList.remove('is-hidden');
          } else {
            el.classList.add('is-hidden');
          }
        });
      }

      function renderNewsletterForm(container, options, statusFromUrl) {
        container.innerHTML = '';

        const heading = document.createElement('h2');

        container.appendChild(heading);

        intro.textContent = 'Subscribe for updates about apps, plans, and tips.';
        container.appendChild(intro);

        const form = document.createElement('form');

        emailGroup.className = 'form-group';
        const emailLabel = document.createElement('label');
        emailLabel.setAttribute('for', 'newsletterEmail');
        emailLabel.textContent = 'Email address';

        emailInput.type = 'email';
        emailInput.id = 'newsletterEmail';
        emailInput.name = 'email';
        emailInput.required = true;

            checkbox.type = 'checkbox';

          statusMessage.textContent = 'There was a problem with your last subscription attempt.';
          statusMessage.classList.add('status-error');
        }

        container.appendChild(form);
      }

      function handleActionEvent(event, element, action) {
        if (action === 'change-currency') {
          event.preventDefault();
          const newCurrency = element.value;
          if (!newCurrency) {
            return;
          }
          try {
            const response = WebsiteSDK.updateSitePreference(newCurrency, sitePreference.region || undefined);
            if (response && response.success && response.preference) {
              sitePreference = {
                currency: response.preference.currency || 'usd',
                region: response.preference.region || ''
              };
              renderPreferenceControls(sitePreference);
              updateQueryParam('currency', sitePreference.currency);
              if (sitePreference.region) {
                updateQueryParam('region', sitePreference.region);
              }
              reloadFeaturedContent();
            } else {
              const message = response && response.message ? response.message : 'Unable to update currency preference.';
              alert(message);
            }
          } catch (e) {
            console.error('Error updating currency:', e);
            alert('Unable to update currency preference.');
          }
        } else if (action === 'change-region') {
          event.preventDefault();
          const newRegion = element.value || '';
          try {
            const response = WebsiteSDK.updateSitePreference(sitePreference.currency || 'usd', newRegion || undefined);
            if (response && response.success && response.preference) {
              sitePreference = {
                currency: response.preference.currency || 'usd',
                region: response.preference.region || ''
              };
              renderPreferenceControls(sitePreference);
              if (sitePreference.region) {
                updateQueryParam('region', sitePreference.region);
              } else {
                updateQueryParam('region', null);
              }
              reloadFeaturedContent();
            } else {
              const message = response && response.message ? response.message : 'Unable to update region preference.';
              alert(message);
            }
          } catch (e) {
            console.error('Error updating region:', e);
            alert('Unable to update region preference.');
          }
        } else if (action === 'view-app-detail') {
          event.preventDefault();
          const appId = element.getAttribute('data-app-id');
          if (appId) {
            window.location.href = `app_detail.html?id=${encodeURIComponent(appId)}`;
          }
        } else if (action === 'view-app-category') {
          event.preventDefault();
          const categoryId = element.getAttribute('data-category-id');
          if (categoryId) {
            window.location.href = `apps.html?categoryId=${encodeURIComponent(categoryId)}`;
          } else {
            window.location.href = 'apps.html';
          }
        } else if (action === 'browse-all-apps') {
          event.preventDefault();
          window.location.href = 'apps.html';
        } else if (action === 'view-plan-detail') {
          event.preventDefault();
          const planId = element.getAttribute('data-plan-id');
          if (planId) {
            window.location.href = `pricing.html?planId=${encodeURIComponent(planId)}`;
          }
        } else if (action === 'billing-toggle') {
          const selectedView = element.value === 'yearly' ? 'yearly' : 'monthly';
          updatePlansBillingView(selectedView);
        } else if (action === 'submit-newsletter') {
          event.preventDefault();
          const form = element;
          const statusMessage = form.querySelector('.newsletter-status');
          if (statusMessage) {
            statusMessage.textContent = '';
            statusMessage.classList.remove('status-success', 'status-error');
          }

          const emailInput = form.querySelector('input[name="email"]');
          const countrySelect = form.querySelector('select[name="country"]');
          const topicInputs = form.querySelectorAll('input[name="topics"]:checked');
          const frequencySelect = form.querySelector('select[name="frequency"]');
          const platformInputs = form.querySelectorAll('input[name="platforms"]:checked');

          const email = emailInput ? emailInput.value.trim() : '';
          const country = countrySelect ? (countrySelect.value || '') : '';
          const topics = [];
          topicInputs.forEach((input) => {
            if (input.value) {
              topics.push(input.value);
            }
          });
          const frequency = frequencySelect ? frequencySelect.value : '';
          const platforms = [];
          platformInputs.forEach((input) => {
            if (input.value) {
              platforms.push(input.value);
            }
          });

          const errors = [];
          if (!email) {
            errors.push('Email is required.');
          }
          if (!topics.length) {
            errors.push('Select at least one topic.');
          }
          if (!frequency) {
            errors.push('Select a frequency.');
          }

          if (errors.length) {
            if (statusMessage) {
              statusMessage.textContent = errors.join(' ');
              statusMessage.classList.add('status-error');
            } else {
              alert(errors.join(' '));
            }
            updateQueryParam('newsletter_status', 'error');
            return;
          }

          try {
            const response = WebsiteSDK.subscribeToNewsletter(
              email,
              country || undefined,
              topics,
              frequency,
              platforms.length ? platforms : undefined
            );
            if (response && response.success) {
              if (statusMessage) {
                const messageText = response.message || 'Subscription saved.';
                statusMessage.textContent = messageText;
                statusMessage.classList.add('status-success');
              }
              form.reset();
              updateQueryParam('newsletter_status', 'success');
            } else {
              const messageText = response && response.message ? response.message : 'Unable to subscribe to the newsletter.';
              if (statusMessage) {
                statusMessage.textContent = messageText;
                statusMessage.classList.add('status-error');
              } else {
                alert(messageText);
              }
              updateQueryParam('newsletter_status', 'error');
            }
          } catch (e) {
            console.error('Error subscribing to newsletter:', e);
            if (statusMessage) {
              statusMessage.textContent = 'Unable to subscribe to the newsletter.';
              statusMessage.classList.add('status-error');
            } else {
              alert('Unable to subscribe to the newsletter.');
            }
            updateQueryParam('newsletter_status', 'error');
          }
        }
      }

      function bindActionHandlers(root) {
        const scope = root || document;
        const elements = scope.querySelectorAll('[data-action]');
        elements.forEach((el) => {
          if (el.dataset.bound === 'true') {
            return;
          }
          const action = el.getAttribute('data-action');
          let eventType = 'click';
          if (el.tagName === 'FORM') {
            eventType = 'submit';
          } else if (
            el.tagName === 'SELECT' ||
            (el.tagName === 'INPUT' && (el.type === 'radio' || el.type === 'checkbox'))
          ) {
            eventType = 'change';
          }
          el.addEventListener(eventType, (evt) => {
            handleActionEvent(evt, el, action);
          });
          el.dataset.bound = 'true';
        });
      }

      function reloadFeaturedContent() {
        const container = document.querySelector('[data-populate="featured-apps-and-plans"]');
        if (!container) {
          return;
        }
        try {
          const data = WebsiteSDK.getHomeFeaturedAppsAndPlans();
          renderFeaturedAppsAndPlans(container, data);
          bindActionHandlers(container);
        } catch (e) {
          console.error('Error reloading featured apps and plans:', e);
        }
      }

      initializeSitePreference();

      const populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach((element) => {
        const dataType = element.getAttribute('data-populate');
        try {
          if (dataType === 'home-hero') {
            const heroContent = WebsiteSDK.getHomeHeroContent();
            renderHomeHero(element, heroContent);
          } else if (dataType === 'featured-apps-and-plans') {
            const data = WebsiteSDK.getHomeFeaturedAppsAndPlans();
            renderFeaturedAppsAndPlans(element, data);
          } else if (dataType === 'newsletter-form') {
            const options = WebsiteSDK.getNewsletterFormOptions();
            renderNewsletterForm(element, options, newsletterStatusFromUrl);
          }
        } catch (e) {
          console.error('Error populating data for', dataType, e);
        }
      });

      bindActionHandlers(document);
    });
  </script>
</body>
</html>
