<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beauty &amp; Lifestyle Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="category.css" />
</head>
<body>
  <header class="site-header">
    <div class="masthead">
      <a href="index.html" class="brand" aria-label="Go to homepage">
        <span class="brand-title">Chic Glow</span>
        <span class="brand-tagline">A beauty &amp; lifestyle blog</span>
      </a>
    </div>

    <div class="primary-nav-wrapper">
      <nav class="primary-nav" aria-label="Primary">
        <div class="nav-inner">
          <ul class="nav-list">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="category.html?categoryId=skincare" class="nav-link">Skincare</a></li>
            <li class="nav-item"><a href="category.html?categoryId=hair" class="nav-link">Hair</a></li>
            <li class="nav-item"><a href="category.html?categoryId=makeup" class="nav-link">Makeup</a></li>
            <li class="nav-item"><a href="category.html?categoryId=wellness" class="nav-link">Wellness</a></li>
            <li class="nav-item"><a href="category.html?categoryId=style" class="nav-link">Style</a></li>
            <li class="nav-item"><a href="category.html?categoryId=food" class="nav-link">Food &amp; Recipes</a></li>
            <li class="nav-item"><a href="shop.html" class="nav-link">Shop</a></li>
            <li class="nav-item"><a href="saved.html?section=collections" class="nav-link">Collections</a></li>
          </ul>

          <div class="nav-search-wrapper">
            <span class="nav-divider" aria-hidden="true"></span>
            <a href="search.html" class="nav-search-link" aria-label="Search">
              <span class="sr-only">Search</span>
              <span class="search-icon">&#128269;</span>
            </a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main id="content" role="main">
    <div class="category-page" data-component="category-page">
      <div class="category-container">
        <!-- Controller / breadcrumb row -->
        <div class="category-controller-row" data-component="category-page-controller">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="index.html" class="breadcrumb-link">Home</a>
            <span class="breadcrumb-separator" aria-hidden="true">/</span>
            <span class="breadcrumb-current" data-populate="category-name"></span>
          </nav>
        </div>

        <!-- Category heading -->
        <header class="category-heading" data-component="category-heading">
          <h1 class="category-title" data-populate="category-title"></h1>
          <p class="category-subtitle" data-populate="category-description"></p>
        </header>

        <!-- Search + Sort control band -->
        <section class="category-controls" aria-label="Search and sort controls">
          <form class="category-search-form" data-component="category-search-form" data-action="category-search">
            <label class="sr-only" for="categorySearchInput">Search within this category</label>
            <div class="search-input-wrapper">
              <input
                type="search"
                id="categorySearchInput"
                name="query"
                class="search-input"
                placeholder="Search in this category"
                autocomplete="off"
              />
              <button type="submit" class="btn btn-ghost search-submit">
                <span class="search-icon" aria-hidden="true">&#128269;</span>
                <span class="sr-only">Search</span>
              </button>
            </div>
          </form>

          <div class="category-sort-control" data-component="category-sort-control">
            <label for="sortSelect" class="sort-label">Sort by</label>
            <select id="sortSelect" class="sort-select" data-action="change-sort">
              <!-- Options populated via JS -->
            </select>
          </div>
        </section>

        <!-- Results summary -->
        <section class="category-results-summary" data-component="category-results-summary">
          <p class="results-summary-text" data-populate="results-summary"></p>
        </section>

        <!-- Main two-column layout: filters + content list -->
        <section class="category-main-layout" aria-label="Category results layout">
          <!-- Filter sidebar -->
          <aside
            class="category-filter-panel"
            data-component="category-filter-panel"
            aria-label="Refine results"
          >
            <button
              type="button"
              class="filter-toggle"
              data-action="toggle-filters"
              aria-expanded="false"
              aria-controls="filterGroups"
            >
              Filters
            </button>

            <div class="filter-groups" id="filterGroups" data-populate="filters">
              <!-- Filter groups populated via JS -->
            </div>
          </aside>

          <!-- Content list -->
          <section class="category-content-list" data-component="category-content-list" aria-label="Category content">
            <div class="content-grid" data-populate="content-items">
              <!-- Content cards populated via JS -->
            </div>
          </section>
        </section>

        <!-- Pagination -->
        <nav
          class="category-pagination"
          data-component="category-pagination"
          aria-label="Pagination"
        >
          <div class="pagination-inner" data-populate="pagination">
            <!-- Pagination controls populated via JS -->
          </div>
        </nav>

        <!-- Highlight tools -->
        <section
          class="category-highlight-tools"
          data-component="category-highlight-tools"
        >
          <header class="tools-header">
            <h2 class="tools-title">Explore tools for this category</h2>
          </header>
          <div class="tools-grid" data-populate="highlight-tools">
            <!-- Highlight tools populated via JS -->
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <nav class="footer-nav" aria-label="Footer">
        <ul class="footer-links">
          <li class="footer-item"><a href="about.html">About</a></li>
          <li class="footer-item"><a href="contact.html">Contact</a></li>
          <li class="footer-item"><a href="newsletter.html">Newsletter</a></li>
          <li class="footer-item"><a href="privacy.html">Privacy Policy</a></li>
        </ul>
      </nav>
      <p class="footer-meta">&copy; 2026 Chic Glow. All rights reserved.</p>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var allowedCategoryIds = ['skincare', 'hair', 'makeup', 'wellness', 'style', 'food'];

      function getUrlParams() {
        return new URLSearchParams(window.location.search);
      }

      function resolveCategoryId(urlParams, categories) {
        var fromUrl = urlParams.get('categoryId');
        if (fromUrl && allowedCategoryIds.indexOf(fromUrl) !== -1) {
          return fromUrl;
        }
        if (categories && categories.length) {
          for (var i = 0; i < categories.length; i += 1) {
            if (allowedCategoryIds.indexOf(categories[i].id) !== -1) {
              return categories[i].id;
            }
          }
        }
        return 'skincare';
      }

      function setParamsAndNavigate(changes) {
        var url = new URL(window.location.href);
        var params = url.searchParams;

        for (var key in changes) {
          if (Object.prototype.hasOwnProperty.call(changes, key)) {
            var value = changes[key];
            if (value === null || value === undefined || value === '') {
              params.delete(key);
            } else {
              params.set(key, String(value));
            }
          }
        }

        var newQuery = params.toString();
        var target = url.pathname + (newQuery ? '?' + newQuery : '');
        window.location.href = target;
      }

      function prettifyLabel(value) {
        if (!value) {
          return '';
        }
        var str = String(value).replace(/_/g, ' ');
        return str.charAt(0).toUpperCase() + str.slice(1);
      }

      function buildFiltersFromUrl(urlParams, filterOptions) {
        var filters = {};

        var skinTypeParam = urlParams.get('skinType') || '';
        var routineTimeOfDayParam = urlParams.get('routineTimeOfDay') || '';
        var hairTypeParam = urlParams.get('hairType') || '';
        var mealTypeParam = urlParams.get('mealType') || '';
        var dietaryParam = urlParams.get('dietary') || '';
        var caloriesMaxParam = urlParams.get('caloriesMax') || '';
        var tutorialTypeParam = urlParams.get('tutorialType') || '';
        var eyeColorParam = urlParams.get('eyeColor') || '';

        if (filterOptions.skin_type_options && filterOptions.skin_type_options.length && skinTypeParam) {
          var skinTypes = skinTypeParam
            .split(',')
            .map(function (v) { return v.trim(); })
            .filter(function (v) { return v && filterOptions.skin_type_options.indexOf(v) !== -1; });
          if (skinTypes.length) {
            filters.skin_type_tags = skinTypes;
          }
        }

        if (filterOptions.routine_time_of_day_options && filterOptions.routine_time_of_day_options.length && routineTimeOfDayParam && filterOptions.routine_time_of_day_options.indexOf(routineTimeOfDayParam) !== -1) {
          filters.routine_time_of_day = routineTimeOfDayParam;
        }

        if (filterOptions.hair_type_options && filterOptions.hair_type_options.length && hairTypeParam) {
          var hairTypes = hairTypeParam
            .split(',')
            .map(function (v) { return v.trim(); })
            .filter(function (v) { return v && filterOptions.hair_type_options.indexOf(v) !== -1; });
          if (hairTypes.length) {
            filters.hair_type_tags = hairTypes;
          }
        }

        if (filterOptions.meal_type_options && filterOptions.meal_type_options.length && mealTypeParam && filterOptions.meal_type_options.indexOf(mealTypeParam) !== -1) {
          filters.meal_type = mealTypeParam;
        }

        if (filterOptions.dietary_preferences_options && filterOptions.dietary_preferences_options.length && dietaryParam) {
          var dietary = dietaryParam
            .split(',')
            .map(function (v) { return v.trim(); })
            .filter(function (v) { return v && filterOptions.dietary_preferences_options.indexOf(v) !== -1; });
          if (dietary.length) {
            filters.dietary_preferences = dietary;
          }
        }

        if (filterOptions.calories_range && caloriesMaxParam) {
          var maxCal = parseInt(caloriesMaxParam, 10);
          if (!isNaN(maxCal)) {
            filters.max_calories_per_serving = maxCal;
          }
        }

        if (filterOptions.tutorial_type_options && filterOptions.tutorial_type_options.length && tutorialTypeParam && filterOptions.tutorial_type_options.indexOf(tutorialTypeParam) !== -1) {
          filters.tutorial_type = tutorialTypeParam;
        }

        if (filterOptions.eye_color_options && filterOptions.eye_color_options.length && eyeColorParam) {
          var eyeColors = eyeColorParam
            .split(',')
            .map(function (v) { return v.trim(); })
            .filter(function (v) { return v && filterOptions.eye_color_options.indexOf(v) !== -1; });
          if (eyeColors.length) {
            filters.eye_color_targets = eyeColors;
          }
        }

        return {
          filters: filters,
          urlFilterState: {
            skinType: skinTypeParam,
            routineTimeOfDay: routineTimeOfDayParam,
            hairType: hairTypeParam,
            mealType: mealTypeParam,
            dietary: dietaryParam,
            caloriesMax: caloriesMaxParam,
            tutorialType: tutorialTypeParam,
            eyeColor: eyeColorParam
          }
        };
      }

      function renderCategoryText(name, descriptionText) {
        var breadcrumbNameEl = document.querySelector('[data-populate="category-name"]');
        var titleEl = document.querySelector('[data-populate="category-title"]');
        var descEl = document.querySelector('[data-populate="category-description"]');

        if (breadcrumbNameEl) {
          breadcrumbNameEl.textContent = name || '';
        }
        if (titleEl) {
          titleEl.textContent = name || '';
        }
        if (descEl) {
          if (descriptionText) {
            descEl.textContent = descriptionText;
            descEl.style.display = '';
          } else {
            descEl.textContent = '';
            descEl.style.display = 'none';
          }
        }
      }

      function renderResultsSummary(container, listing) {
        if (!container) {
          return;
        }
        var total = listing && typeof listing.total_items === 'number' ? listing.total_items : 0;
        if (!total) {
          container.textContent = 'No results found. Try adjusting your filters.';
          return;
        }
        var page = listing && listing.page ? listing.page : 1;
        var pageSize = listing && listing.page_size ? listing.page_size : total;
        var start = (page - 1) * pageSize + 1;
        var end = page * pageSize;
        if (end > total) {
          end = total;
        }
        var label = listing && listing.category_name ? listing.category_name.toLowerCase() : 'items';
        container.textContent = 'Showing ' + start + '8' + end + ' of ' + total + ' ' + label;
      }

      function renderSortOptions(selectEl, filterOptions, sortByParam) {
        if (!selectEl || !filterOptions || !filterOptions.sort_options) {
          return;
        }
        selectEl.innerHTML = '';

        var placeholderOption = document.createElement('option');
        placeholderOption.value = '';
        placeholderOption.textContent = 'Default';
        selectEl.appendChild(placeholderOption);

        for (var i = 0; i < filterOptions.sort_options.length; i += 1) {
          var opt = filterOptions.sort_options[i];
          var optionEl = document.createElement('option');
          optionEl.value = opt.value;
          optionEl.textContent = opt.label;
          selectEl.appendChild(optionEl);
        }

        if (sortByParam) {
          selectEl.value = sortByParam;
        } else {
          selectEl.value = '';
        }
      }

      function renderFilters(container, filterOptions, urlFilterState) {
        if (!container || !filterOptions) {
          return;
        }
        container.innerHTML = '';

        function createCheckboxGroup(options, groupLabel, paramName, selectedCsv) {
          if (!options || !options.length) {
            return;
          }
          var fieldset = document.createElement('fieldset');
          fieldset.className = 'filter-group';
          var legend = document.createElement('legend');
          legend.className = 'filter-group-title';
          legend.textContent = groupLabel;
          fieldset.appendChild(legend);

          var selectedValues = [];
          if (selectedCsv) {
            selectedValues = selectedCsv.split(',').map(function (v) { return v.trim(); }).filter(function (v) { return v; });
          }

          for (var i = 0; i < options.length; i += 1) {
            var value = options[i];
            var optionWrapper = document.createElement('div');
            optionWrapper.className = 'filter-option';

            var inputId = 'filter-' + paramName + '-' + value;
            var input = document.createElement('input');
            input.type = 'checkbox';
            input.id = inputId;
            input.name = paramName;
            input.value = value;
            input.className = 'filter-input';
            input.setAttribute('data-action', 'change-filter');
            input.setAttribute('data-filter-param', paramName);
            input.setAttribute('data-filter-mode', 'multi');
            if (selectedValues.indexOf(value) !== -1) {
              input.checked = true;
            }

            var label = document.createElement('label');
            label.className = 'filter-label';
            label.htmlFor = inputId;
            label.textContent = prettifyLabel(value);

            optionWrapper.appendChild(input);
            optionWrapper.appendChild(label);
            fieldset.appendChild(optionWrapper);
          }

          container.appendChild(fieldset);
        }

        function createRadioGroup(options, groupLabel, paramName, selectedValue, includeAllOption, allLabel) {
          if (!options || !options.length) {
            return;
          }
          var fieldset = document.createElement('fieldset');
          fieldset.className = 'filter-group';
          var legend = document.createElement('legend');
          legend.className = 'filter-group-title';
          legend.textContent = groupLabel;
          fieldset.appendChild(legend);

          if (includeAllOption) {
            var wrapperAll = document.createElement('div');
            wrapperAll.className = 'filter-option';

            var allId = 'filter-' + paramName + '-all';
            var inputAll = document.createElement('input');
            inputAll.type = 'radio';
            inputAll.id = allId;
            inputAll.name = paramName;
            inputAll.value = '';
            inputAll.className = 'filter-input';
            inputAll.setAttribute('data-action', 'change-filter');
            inputAll.setAttribute('data-filter-param', paramName);
            inputAll.setAttribute('data-filter-mode', 'single');
            if (!selectedValue) {
              inputAll.checked = true;
            }

            var labelAll = document.createElement('label');
            labelAll.className = 'filter-label';
            labelAll.htmlFor = allId;
            labelAll.textContent = allLabel;

            wrapperAll.appendChild(inputAll);
            wrapperAll.appendChild(labelAll);
            fieldset.appendChild(wrapperAll);
          }

          for (var i = 0; i < options.length; i += 1) {
            var value = options[i];
            var wrapper = document.createElement('div');
            wrapper.className = 'filter-option';

            var inputId = 'filter-' + paramName + '-' + value;
            var input = document.createElement('input');
            input.type = 'radio';
            input.id = inputId;
            input.name = paramName;
            input.value = value;
            input.className = 'filter-input';
            input.setAttribute('data-action', 'change-filter');
            input.setAttribute('data-filter-param', paramName);
            input.setAttribute('data-filter-mode', 'single');
            if (selectedValue && selectedValue === value) {
              input.checked = true;
            }

            var label = document.createElement('label');
            label.className = 'filter-label';
            label.htmlFor = inputId;
            label.textContent = prettifyLabel(value);

            wrapper.appendChild(input);
            wrapper.appendChild(label);
            fieldset.appendChild(wrapper);
          }

          container.appendChild(fieldset);
        }

        function createSelectGroup(options, groupLabel, paramName, selectedValue, placeholderLabel) {
          if (!options || !options.length) {
            return;
          }
          var fieldset = document.createElement('fieldset');
          fieldset.className = 'filter-group';
          var legend = document.createElement('legend');
          legend.className = 'filter-group-title';
          legend.textContent = groupLabel;
          fieldset.appendChild(legend);

          var select = document.createElement('select');
          select.className = 'filter-select';
          select.name = paramName;
          select.setAttribute('data-action', 'change-filter');
          select.setAttribute('data-filter-param', paramName);
          select.setAttribute('data-filter-mode', 'single');

          var placeholderOpt = document.createElement('option');
          placeholderOpt.value = '';
          placeholderOpt.textContent = placeholderLabel;
          select.appendChild(placeholderOpt);

          for (var i = 0; i < options.length; i += 1) {
            var value = options[i];
            var optionEl = document.createElement('option');
            optionEl.value = value;
            optionEl.textContent = prettifyLabel(value);
            select.appendChild(optionEl);
          }

          if (selectedValue) {
            select.value = selectedValue;
          } else {
            select.value = '';
          }

          fieldset.appendChild(select);
          container.appendChild(fieldset);
        }

        function createNumericGroup(range, groupLabel, paramName, selectedValue) {
          if (!range) {
            return;
          }
          var fieldset = document.createElement('fieldset');
          fieldset.className = 'filter-group';
          var legend = document.createElement('legend');
          legend.className = 'filter-group-title';
          legend.textContent = groupLabel;
          fieldset.appendChild(legend);

          var wrapper = document.createElement('div');
          wrapper.className = 'filter-option filter-option--numeric';

          var label = document.createElement('label');
          label.className = 'filter-label';
          label.htmlFor = 'filter-' + paramName;
          label.textContent = 'Up to (per serving)';

          var input = document.createElement('input');
          input.type = 'number';
          input.id = 'filter-' + paramName;
          input.name = paramName;
          input.className = 'filter-input filter-input--number';
          if (typeof range.min === 'number') {
            input.min = String(range.min);
          }
          if (typeof range.max === 'number') {
            input.max = String(range.max);
          }
          input.placeholder = range.max ? String(range.max) : '';
          input.setAttribute('data-action', 'change-filter');
          input.setAttribute('data-filter-param', paramName);
          input.setAttribute('data-filter-mode', 'numeric');
          if (selectedValue) {
            input.value = selectedValue;
          }

          var unitSpan = document.createElement('span');
          unitSpan.className = 'filter-unit';
          unitSpan.textContent = 'cal';

          wrapper.appendChild(label);
          wrapper.appendChild(input);
          wrapper.appendChild(unitSpan);
          fieldset.appendChild(wrapper);

          container.appendChild(fieldset);
        }

        createCheckboxGroup(
          filterOptions.skin_type_options,
          'Skin type',
          'skinType',
          urlFilterState.skinType
        );

        createRadioGroup(
          filterOptions.routine_time_of_day_options,
          'Routine time of day',
          'routineTimeOfDay',
          urlFilterState.routineTimeOfDay,
          true,
          'Any time'
        );

        createCheckboxGroup(
          filterOptions.hair_type_options,
          'Hair type',
          'hairType',
          urlFilterState.hairType
        );

        createSelectGroup(
          filterOptions.meal_type_options,
          'Meal type',
          'mealType',
          urlFilterState.mealType,
          'All meal types'
        );

        createCheckboxGroup(
          filterOptions.dietary_preferences_options,
          'Dietary preferences',
          'dietary',
          urlFilterState.dietary
        );

        createNumericGroup(
          filterOptions.calories_range,
          'Maximum calories',
          'caloriesMax',
          urlFilterState.caloriesMax
        );

        createSelectGroup(
          filterOptions.tutorial_type_options,
          'Tutorial type',
          'tutorialType',
          urlFilterState.tutorialType,
          'All tutorial types'
        );

        createSelectGroup(
          filterOptions.eye_color_options,
          'Eye color',
          'eyeColor',
          urlFilterState.eyeColor,
          'All eye colors'
        );
      }

      function renderContentItems(container, listing) {
        if (!container) {
          return;
        }
        container.innerHTML = '';

        var items = listing && listing.items ? listing.items : [];
        if (!items.length) {
          var empty = document.createElement('p');
          empty.className = 'content-empty-state';
          empty.textContent = 'No articles match your selection yet.';
          container.appendChild(empty);
          return;
        }

        for (var i = 0; i < items.length; i += 1) {
          var item = items[i];

          var card = document.createElement('article');
          card.className = 'post-card';
          card.setAttribute('data-content-id', item.id);

          var link = document.createElement('a');
          link.className = 'post-card-link';
          link.href = 'article.html?id=' + encodeURIComponent(item.id);
          link.setAttribute('data-action', 'open-content');
          link.setAttribute('data-content-id', item.id);

          if (item.hero_image_url) {
            var figure = document.createElement('figure');
            figure.className = 'post-card-image-wrapper';
            var img = document.createElement('img');
            img.className = 'post-card-image';
            img.src = item.hero_image_url;
            img.alt = item.title || '';
            figure.appendChild(img);
            link.appendChild(figure);
          }

          var body = document.createElement('div');
          body.className = 'post-card-body';

          var titleEl = document.createElement('h2');
          titleEl.className = 'post-card-title';
          titleEl.textContent = item.title || '';
          body.appendChild(titleEl);

          var metaParts = [];
          if (item.publish_date) {
            var date = new Date(item.publish_date);
            if (!isNaN(date.getTime())) {
              var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
              var formattedDate = monthNames[date.getMonth()] + ' ' + date.getDate() + ', ' + date.getFullYear();
              metaParts.push(formattedDate);
            }
          }
          if (item.reading_time_minutes) {
            metaParts.push(item.reading_time_minutes + ' min read');
          }

          if (metaParts.length) {
            var metaEl = document.createElement('p');
            metaEl.className = 'post-card-meta';
            metaEl.textContent = metaParts.join(' 3 ');
            body.appendChild(metaEl);
          }

          if (item.description) {
            var descEl = document.createElement('p');
            descEl.className = 'post-card-excerpt';
            descEl.textContent = item.description;
            body.appendChild(descEl);
          }

          link.appendChild(body);
          card.appendChild(link);
          container.appendChild(card);
        }
      }

      function renderPagination(container, listing) {
        if (!container || !listing) {
          return;
        }
        container.innerHTML = '';

        var total = typeof listing.total_items === 'number' ? listing.total_items : 0;
        var page = listing.page || 1;
        var pageSize = listing.page_size || total || 1;
        var totalPages = total ? Math.ceil(total / pageSize) : 1;

        if (totalPages <= 1) {
          return;
        }

        var prevButton = document.createElement('button');
        prevButton.type = 'button';
        prevButton.className = 'pagination-button pagination-prev';
        prevButton.textContent = 'Previous';
        prevButton.setAttribute('data-action', 'pagination-prev');
        if (page <= 1) {
          prevButton.disabled = true;
        }
        container.appendChild(prevButton);

        var maxVisible = 7;
        var startPage = 1;
        var endPage = totalPages;

        if (totalPages > maxVisible) {
          startPage = Math.max(1, page - 2);
          endPage = Math.min(totalPages, page + 2);

          if (startPage <= 2) {
            startPage = 1;
            endPage = 5;
          } else if (endPage >= totalPages - 1) {
            startPage = totalPages - 4;
            endPage = totalPages;
          }
        }

        if (startPage > 1) {
          var firstBtn = document.createElement('button');
          firstBtn.type = 'button';
          firstBtn.className = 'pagination-button';
          firstBtn.textContent = '1';
          firstBtn.setAttribute('data-action', 'pagination-page');
          firstBtn.setAttribute('data-page', '1');
          container.appendChild(firstBtn);

          if (startPage > 2) {
            var ellipsisStart = document.createElement('span');
            ellipsisStart.className = 'pagination-ellipsis';
            ellipsisStart.textContent = '777';
            container.appendChild(ellipsisStart);
          }
        }

        for (var p = startPage; p <= endPage; p += 1) {
          var pageBtn = document.createElement('button');
          pageBtn.type = 'button';
          pageBtn.className = 'pagination-button';
          pageBtn.textContent = String(p);
          pageBtn.setAttribute('data-action', 'pagination-page');
          pageBtn.setAttribute('data-page', String(p));
          if (p === page) {
            pageBtn.className += ' is-active';
            pageBtn.disabled = true;
          }
          container.appendChild(pageBtn);
        }

        if (endPage < totalPages) {
          if (endPage < totalPages - 1) {
            var ellipsisEnd = document.createElement('span');
            ellipsisEnd.className = 'pagination-ellipsis';
            ellipsisEnd.textContent = '777';
            container.appendChild(ellipsisEnd);
          }

          var lastBtn = document.createElement('button');
          lastBtn.type = 'button';
          lastBtn.className = 'pagination-button';
          lastBtn.textContent = String(totalPages);
          lastBtn.setAttribute('data-action', 'pagination-page');
          lastBtn.setAttribute('data-page', String(totalPages));
          container.appendChild(lastBtn);
        }

        var nextButton = document.createElement('button');
        nextButton.type = 'button';
        nextButton.className = 'pagination-button pagination-next';
        nextButton.textContent = 'Next';
        nextButton.setAttribute('data-action', 'pagination-next');
        if (page >= totalPages) {
          nextButton.disabled = true;
        }
        container.appendChild(nextButton);
      }

      function renderHighlightTools(container, toolsData) {
        if (!container) {
          return;
        }
        container.innerHTML = '';

        var tools = toolsData && toolsData.tools ? toolsData.tools : [];
        var section = document.querySelector('[data-component="category-highlight-tools"]');
        if (!tools.length) {
          if (section) {
            section.style.display = 'none';
          }
          return;
        }
        if (section) {
          section.style.display = '';
        }

        for (var i = 0; i < tools.length; i += 1) {
          var tool = tools[i];
          var card = document.createElement('article');
          card.className = 'tool-card';

          var titleEl = document.createElement('h3');
          titleEl.className = 'tool-card-title';
          titleEl.textContent = tool.title || '';
          card.appendChild(titleEl);

          if (tool.description) {
            var descEl = document.createElement('p');
            descEl.className = 'tool-card-description';
            descEl.textContent = tool.description;
            card.appendChild(descEl);
          }

          var ctaLabel = tool.cta_label || 'Open';
          var cta = document.createElement('button');
          cta.type = 'button';
          cta.className = 'btn tool-card-cta';
          cta.textContent = ctaLabel;
          cta.setAttribute('data-action', 'open-tool');
          cta.setAttribute('data-tool-key', tool.tool_key || '');
          card.appendChild(cta);

          container.appendChild(card);
        }
      }

      var TOOL_ROUTE_MAP = {
        wellness: {
          self_care_planner: {
            target: 'wellness_planner.html',
            paramKey: 'planId',
            paramValue: ''
          }
        },
        style: {
          find_your_wardrobe_style: {
            target: 'style_quiz.html',
            paramKey: 'quizSlug',
            paramValue: 'find-your-wardrobe-style'
          }
        }
      };

      function setupEventHandlers(categoryId) {
        var filterToggle = document.querySelector('[data-action="toggle-filters"]');
        if (filterToggle) {
          filterToggle.addEventListener('click', function () {
            var targetId = filterToggle.getAttribute('aria-controls');
            var groups = document.getElementById(targetId);
            if (!groups) {
              return;
            }
            var expanded = filterToggle.getAttribute('aria-expanded') === 'true';
            filterToggle.setAttribute('aria-expanded', expanded ? 'false' : 'true');
            if (expanded) {
              groups.classList.remove('is-open');
            } else {
              groups.classList.add('is-open');
            }
          });
        }

        var sortSelect = document.querySelector('[data-action="change-sort"]');
        if (sortSelect) {
          sortSelect.addEventListener('change', function (event) {
            var value = event.target.value;
            var changes = { page: 1 };
            if (value) {
              changes.sortBy = value;
            } else {
              changes.sortBy = null;
            }
            setParamsAndNavigate(changes);
          });
        }

        var searchForms = document.querySelectorAll('[data-action="category-search"]');
        for (var i = 0; i < searchForms.length; i += 1) {
          searchForms[i].addEventListener('submit', function (event) {
            event.preventDefault();
            var input = this.querySelector('input[name="query"]');
            var query = input && input.value ? input.value.trim() : '';
            if (!query) {
              return;
            }
            var targetUrl = 'search.html?query=' + encodeURIComponent(query);
            window.location.href = targetUrl;
          });
        }

        var filterInputs = document.querySelectorAll('[data-action="change-filter"]');
        for (var j = 0; j < filterInputs.length; j += 1) {
          filterInputs[j].addEventListener('change', function (event) {
            var target = event.target;
            var param = target.getAttribute('data-filter-param');
            var mode = target.getAttribute('data-filter-mode') || 'single';
            var changes = { page: 1 };

            if (!param) {
              return;
            }

            if (mode === 'multi') {
              var selector = '[data-filter-param="' + param + '"][data-filter-mode="multi"]';
              var all = document.querySelectorAll(selector);
              var selectedValues = [];
              for (var k = 0; k < all.length; k += 1) {
                var input = all[k];
                if (input.checked) {
                  selectedValues.push(input.value);
                }
              }
              if (selectedValues.length) {
                changes[param] = selectedValues.join(',');
              } else {
                changes[param] = null;
              }
            } else if (mode === 'numeric') {
              var raw = target.value;
              if (!raw) {
                changes[param] = null;
              } else {
                var num = parseInt(raw, 10);
                if (isNaN(num)) {
                  changes[param] = null;
                } else {
                  changes[param] = num;
                }
              }
            } else {
              var value;
              if (target.type === 'checkbox' || target.type === 'radio') {
                value = target.checked ? target.value : '';
              } else {
                value = target.value;
              }
              if (value) {
                changes[param] = value;
              } else {
                changes[param] = null;
              }
            }

            setParamsAndNavigate(changes);
          });
        }

        var paginationContainer = document.querySelector('[data-populate="pagination"]');
        if (paginationContainer) {
          paginationContainer.addEventListener('click', function (event) {
            var target = event.target;
            var action = target.getAttribute('data-action');
            if (!action) {
              return;
            }
            if (action === 'pagination-page') {
              var pageStr = target.getAttribute('data-page');
              var pageNum = parseInt(pageStr, 10);
              if (!isNaN(pageNum)) {
                setParamsAndNavigate({ page: pageNum });
              }
            } else if (action === 'pagination-prev') {
              var urlParams = getUrlParams();
              var currentPage = parseInt(urlParams.get('page') || '1', 10);
              if (isNaN(currentPage) || currentPage <= 1) {
                return;
              }
              setParamsAndNavigate({ page: currentPage - 1 });
            } else if (action === 'pagination-next') {
              var urlParamsNext = getUrlParams();
              var currentPageNext = parseInt(urlParamsNext.get('page') || '1', 10);
              if (isNaN(currentPageNext)) {
                currentPageNext = 1;
              }
              setParamsAndNavigate({ page: currentPageNext + 1 });
            }
          });
        }

        var toolButtons = document.querySelectorAll('[data-action="open-tool"]');
        for (var t = 0; t < toolButtons.length; t += 1) {
          toolButtons[t].addEventListener('click', function () {
            var toolKey = this.getAttribute('data-tool-key');
            if (!toolKey) {
              return;
            }
            var categoryConfig = TOOL_ROUTE_MAP[categoryId];
            if (!categoryConfig) {
              return;
            }
            var config = categoryConfig[toolKey];
            if (!config) {
              return;
            }
            var targetUrl = config.target;
            if (config.paramKey) {
              var paramValue = config.paramValue || '';
              var query = encodeURIComponent(config.paramKey) + '=' + encodeURIComponent(paramValue);
              targetUrl = targetUrl + '?' + query;
            }
            window.location.href = targetUrl;
          });
        }
      }

      try {
        var urlParams = getUrlParams();
        var categories = WebsiteSDK.getContentCategories();
        var resolvedCategoryId = resolveCategoryId(urlParams, categories);

        if (!urlParams.get('categoryId')) {
          setParamsAndNavigate({ categoryId: resolvedCategoryId });
          return;
        }

        var categoryId = urlParams.get('categoryId');
        if (allowedCategoryIds.indexOf(categoryId) === -1) {
          categoryId = resolvedCategoryId;
          setParamsAndNavigate({ categoryId: categoryId });
          return;
        }

        var filterOptions = WebsiteSDK.getCategoryFilterOptions(categoryId);

        var rawPage = urlParams.get('page');
        var pageNumber = parseInt(rawPage || '1', 10);
        if (isNaN(pageNumber) || pageNumber < 1) {
          pageNumber = 1;
        }

        var sortByParam = urlParams.get('sortBy');
        var filtersResult = buildFiltersFromUrl(urlParams, filterOptions);
        var filtersForApi = filtersResult.filters;
        var urlFilterState = filtersResult.urlFilterState;

        var pageSize = 12;
        var listing = WebsiteSDK.getCategoryContentListing(
          categoryId,
          pageNumber,
          pageSize,
          filtersForApi,
          sortByParam || undefined
        );

        var highlightTools = WebsiteSDK.getCategoryHighlightTools(categoryId);

        var categoryMeta = null;
        if (categories && categories.length) {
          for (var c = 0; c < categories.length; c += 1) {
            if (categories[c].id === categoryId) {
              categoryMeta = categories[c];
              break;
            }
          }
        }

        var categoryNameText = (listing && listing.category_name) || (filterOptions && filterOptions.category_name) || (categoryMeta && categoryMeta.name) || '';
        var categoryDescriptionText = categoryMeta && categoryMeta.description ? categoryMeta.description : '';
        renderCategoryText(categoryNameText, categoryDescriptionText);

        var summaryEl = document.querySelector('[data-populate="results-summary"]');
        renderResultsSummary(summaryEl, listing);

        var sortSelectEl = document.getElementById('sortSelect');
        renderSortOptions(sortSelectEl, filterOptions, sortByParam);

        var filtersContainer = document.querySelector('[data-populate="filters"]');
        renderFilters(filtersContainer, filterOptions, urlFilterState);

        var contentContainer = document.querySelector('[data-populate="content-items"]');
        renderContentItems(contentContainer, listing);

        var paginationContainer = document.querySelector('[data-populate="pagination"]');
        renderPagination(paginationContainer, listing);

        var toolsContainer = document.querySelector('[data-populate="highlight-tools"]');
        renderHighlightTools(toolsContainer, highlightTools);

        setupEventHandlers(categoryId);
      } catch (error) {
        var summaryElFallback = document.querySelector('[data-populate="results-summary"]');
        if (summaryElFallback) {
          summaryElFallback.textContent = 'We could not load this category right now. Please try again later.';
        }
        // Optional: log error for debugging
        // console.error('Error initializing category page', error);
      }
    });
  </script>
</body>
