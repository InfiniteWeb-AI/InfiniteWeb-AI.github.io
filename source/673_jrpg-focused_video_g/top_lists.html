<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Top Lists | JRPG Content Blog</title>
  <meta name='description' content='Browse JRPG top list articles with keyword search, year filters, sorting, and pagination, and open individual top list articles for full details.'>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='framework.css'>
  <link rel='stylesheet' href='top_lists.css'>
  <script src='business_logic.js'></script>
</head>
<body>
  <header class='site-header'>
    <div class='header-bar container'>
      <nav class='primary-nav' aria-label='Main site navigation'>
        <ul class='nav-list'>
          <li class='nav-item'><a href='index.html' title='Homepage with featured JRPG content and global navigation'>Home</a></li>
          <li class='nav-item'><a href='recommendations.html' title='Browse filtered JRPG recommendations and reviews'>Game Recommendations</a></li>
          <li class='nav-item'><a href='news.html' title='JRPG news and release-date updates'>News</a></li>
          <li class='nav-item'><a href='features.html' title='Long-form JRPG features and narrative analysis'>Features</a></li>
          <li class='nav-item'><a href='guides.html' title='Gameplay, beginner, and trophy guides for JRPGs'>Guides</a></li>
          <li class='nav-item'><a href='top_lists.html' title='Ranked lists such as Top 10 classic JRPGs'>Top Lists</a></li>
          <li class='nav-item'><a href='game_finder.html' title='Interactive JRPG recommendation tool'>Game Finder</a></li>
          <li class='nav-item'><a href='library.html' title='View and manage your reading list, wishlist, bookmarks, collections, and followed releases'>My Library</a></li>
        </ul>
      </nav>
      <div class='header-tools' aria-hidden='true'>
        <span class='nav-search-icon' role='img'></span>
      </div>
    </div>
  </header>

  <main id='content' class='content-area'>
    <section class='toplists-hero' data-component='toplists-page-controller'>
      <div class='toplists-hero-backdrop'>
        <div class='container toplists-hero-inner'>
          <header class='toplists-hero-header'>
            <h1 class='toplists-title'>Top Lists</h1>
            <p class='toplists-subtitle'>Ranked JRPG lists curated by theme, era, and platform.</p>
          </header>
          <form class='toplists-search-form' data-component='toplists-search-form' data-action='search-form' role='search' aria-label='Search top lists by title keywords'>
            <label class='visually-hidden' for='toplistsSearchInput'>Search top lists</label>
            <div class='toplists-search-input-wrapper'>
              <input type='search'
                     id='toplistsSearchInput'
                     name='titleQuery'
                     class='toplists-search-input'
                     placeholder="Search by list title, e.g. 'Top 10 PS5 JRPGs'"
                     autocomplete='off'>
              <button type='submit' class='btn btn-primary toplists-search-button'>Search</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <section class='toplists-toolbar-wrapper'>
      <div class='container toplists-toolbar toplists-toolbar--sticky'>
        <div class='toplists-toolbar-left' data-component='toplists-year-filter'>
          <div class='toplists-filter-group'>
            <label for='minPublishedYearSelect' class='toplists-filter-label'>From year</label>
            <select id='minPublishedYearSelect'
                    name='minPublishedYear'
                    class='toplists-filter-select'
                    data-action='filter-min-year'>
              <option value=''>Any</option>
            </select>
          </div>
          <div class='toplists-filter-group'>
            <label for='maxPublishedYearSelect' class='toplists-filter-label'>To year</label>
            <select id='maxPublishedYearSelect'
                    name='maxPublishedYear'
                    class='toplists-filter-select'
                    data-action='filter-max-year'>
              <option value=''>Any</option>
            </select>
          </div>
          <button type='button'
                  class='btn btn-ghost toplists-filter-clear'
                  data-action='filter-clear-years'>
            Clear
          </button>
        </div>
        <div class='toplists-toolbar-right' data-component='toplists-sort-control'>
          <label for='sortBySelect' class='toplists-sort-label'>Sort by</label>
          <select id='sortBySelect'
                  name='sortBy'
                  class='toplists-sort-select'
                  data-action='sort-change'>
            <!-- Sort options populated via JS -->
          </select>
        </div>
      </div>
      <div class='container toplists-results-summary-wrapper'>
        <p class='toplists-results-summary'
           data-component='toplists-results-summary'
           data-populate='toplists-results-summary'></p>
      </div>
    </section>

    <section class='toplists-results' aria-live='polite'>
      <div class='container'>
        <div class='toplists-empty-state'
             data-component='toplists-empty-state'
             data-populate='toplists-empty-state'
             style='display:none;'></div>

        <div class='toplists-article-list'
             data-component='toplists-article-list'
             data-populate='toplists-articles'></div>

        <nav class='toplists-pagination'
             data-component='toplists-pagination'
             data-populate='toplists-pagination'
             aria-label='Top lists pagination'></nav>
      </div>
    </section>

    <div data-component='toplists-url-state-sync' aria-hidden='true'></div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-links'>
          <li class='footer-item'><a href='about.html' title='Learn more about the site and its mission'>About</a></li>
          <li class='footer-item'><a href='contact.html' title='Get in touch with the site maintainers'>Contact</a></li>
          <li class='footer-item'><a href='newsletter.html' title='Sign up for the JRPG newsletter and set your preferences'>Newsletter</a></li>
          <li class='footer-item'><a href='privacy.html' title='Read about how your data and preferences are handled'>Privacy Policy</a></li>
          <li class='footer-item'><a href='terms.html' title='Review the terms and conditions for using the site'>Terms of Use</a></li>
        </ul>
      </nav>
      <div class='footer-meta'>
        <p class='footer-copy'>&copy; <span class='footer-year'>2026</span> JRPG Content Blog. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script>
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof WebsiteSDK === 'undefined') {
      console.error('WebsiteSDK is not available. Ensure business_logic.js is loaded.');
      return;
    }

    var PAGE_SIZE = 10;

    var searchFormEl = document.querySelector('[data-component="toplists-search-form"]');
    var searchInputEl = searchFormEl ? searchFormEl.querySelector('input[name="titleQuery"]') : null;

    var yearFilterEl = document.querySelector('[data-component="toplists-year-filter"]');
    var minYearSelectEl = yearFilterEl ? yearFilterEl.querySelector('select[name="minPublishedYear"]') : null;
    var maxYearSelectEl = yearFilterEl ? yearFilterEl.querySelector('select[name="maxPublishedYear"]') : null;
    var clearYearBtnEl = yearFilterEl ? yearFilterEl.querySelector('[data-action="filter-clear-years"]') : null;

    var sortControlEl = document.querySelector('[data-component="toplists-sort-control"]');
    var sortSelectEl = sortControlEl ? sortControlEl.querySelector('select[name="sortBy"]') : null;

    var resultsSummaryEl = document.querySelector('[data-component="toplists-results-summary"]');
    var articleListEl = document.querySelector('[data-component="toplists-article-list"]');
    var paginationEl = document.querySelector('[data-component="toplists-pagination"]');
    var emptyStateEl = document.querySelector('[data-component="toplists-empty-state"]');

    var filterOptions = { publishedYears: [], sortOptions: [] };
    var currentState = null;

    function parseStateFromUrl() {
      var params = new URLSearchParams(window.location.search);
      var state = {};

      var titleQuery = params.get('titleQuery');
      state.titleQuery = titleQuery !== null ? titleQuery : '';

      var minYearParam = params.get('minPublishedYear');
      var maxYearParam = params.get('maxPublishedYear');
      var sortByParam = params.get('sortBy');
      var pageParam = params.get('page');

      var minYear = parseInt(minYearParam, 10);
      var maxYear = parseInt(maxYearParam, 10);
      var page = parseInt(pageParam, 10);

      state.minPublishedYear = Number.isFinite(minYear) ? minYear : undefined;
      state.maxPublishedYear = Number.isFinite(maxYear) ? maxYear : undefined;
      state.sortBy = sortByParam || '';

      if (!Number.isFinite(page) || page < 1) {
        page = 1;
      }
      state.page = page;

      return state;
    }

    function buildSearchParamsFromState(state) {
      var params = new URLSearchParams();

      if (state.titleQuery && state.titleQuery.trim() !== '') {
        params.set('titleQuery', state.titleQuery.trim());
      }
      if (Number.isFinite(state.minPublishedYear)) {
        params.set('minPublishedYear', String(state.minPublishedYear));
      }
      if (Number.isFinite(state.maxPublishedYear)) {
        params.set('maxPublishedYear', String(state.maxPublishedYear));
      }
      if (state.sortBy && state.sortBy !== '') {
        params.set('sortBy', state.sortBy);
      }
      if (Number.isFinite(state.page) && state.page > 0) {
        params.set('page', String(state.page));
      }

      return params;
    }

    function updateUrlState(partialState, options) {
      var replace = options && options.replace === true;
      var baseState = currentState || parseStateFromUrl();
      var nextState = Object.assign({}, baseState, partialState || {});

      if (!nextState.titleQuery || nextState.titleQuery.trim() === '') {
        nextState.titleQuery = '';
      }

      if (!Number.isFinite(nextState.minPublishedYear)) {
        nextState.minPublishedYear = undefined;
      }
      if (!Number.isFinite(nextState.maxPublishedYear)) {
        nextState.maxPublishedYear = undefined;
      }
      if (!Number.isFinite(nextState.page) || nextState.page < 1) {
        nextState.page = 1;
      }

      var params = buildSearchParamsFromState(nextState);
      var newUrl = params.toString() ? (window.location.pathname + '?' + params.toString()) : window.location.pathname;

      if (replace) {
        window.history.replaceState(null, '', newUrl);
      } else {
        window.history.pushState(null, '', newUrl);
      }

      currentState = nextState;
      return nextState;
    }

    function renderYearOptions(selectEl, years, selectedYear) {
      if (!selectEl) {
        return;
      }
      selectEl.innerHTML = '';

      var anyOption = document.createElement('option');
      anyOption.value = '';
      anyOption.textContent = 'Any';
      selectEl.appendChild(anyOption);

      if (!Array.isArray(years)) {
        return;
      }

      var selectedIsNumber = Number.isFinite(selectedYear);
      years.forEach(function (entry) {
        if (!entry || typeof entry.year !== 'number') {
          return;
        }
        var option = document.createElement('option');
        option.value = String(entry.year);
        option.textContent = entry.label || String(entry.year);
        if (selectedIsNumber && entry.year === selectedYear) {
          option.selected = true;
        }
        selectEl.appendChild(option);
      });
    }

    function renderSortOptions(selectEl, sortOptions, activeSortValue) {
      if (!selectEl) {
        return;
      }
      selectEl.innerHTML = '';

      if (!Array.isArray(sortOptions) || sortOptions.length === 0) {
        var placeholderOption = document.createElement('option');
        placeholderOption.value = '';
        placeholderOption.textContent = 'Default order';
        selectEl.appendChild(placeholderOption);
        return;
      }

      sortOptions.forEach(function (optionDef, index) {
        if (!optionDef) {
          return;
        }
        var option = document.createElement('option');
        option.value = optionDef.value;
        option.textContent = optionDef.label || optionDef.value;
        if (activeSortValue) {
          if (optionDef.value === activeSortValue) {
            option.selected = true;
          }
        } else if (index === 0) {
          option.selected = true;
        }
        selectEl.appendChild(option);
      });
    }

    function applyStateToControls(state) {
      if (searchInputEl) {
        searchInputEl.value = state.titleQuery || '';
      }

      if (minYearSelectEl) {
        renderYearOptions(minYearSelectEl, filterOptions.publishedYears, state.minPublishedYear);
      }
      if (maxYearSelectEl) {
        renderYearOptions(maxYearSelectEl, filterOptions.publishedYears, state.maxPublishedYear);
      }

      var effectiveSort = state.sortBy || '';
      var availableSorts = Array.isArray(filterOptions.sortOptions) ? filterOptions.sortOptions : [];
      if (availableSorts.length > 0) {
        var exists = availableSorts.some(function (opt) {
          return opt && opt.value === state.sortBy;
        });
        if (!exists) {
          effectiveSort = availableSorts[0].value;
        }
      }

      if (sortSelectEl) {
        renderSortOptions(sortSelectEl, availableSorts, effectiveSort);
      }

      state.sortBy = effectiveSort;
      currentState = state;
    }

    function renderResultsSummary(container, response, state) {
      if (!container) {
        return;
      }
      if (!response || typeof response.totalCount !== 'number') {
        container.textContent = '';
        return;
      }

      var total = response.totalCount;
      if (total === 0) {
        container.textContent = 'No top lists found.';
        return;
      }

      var page = response.page || state.page || 1;
      var pageSize = response.pageSize || PAGE_SIZE;
      var startIndex = (page - 1) * pageSize + 1;
      var visibleCount = Array.isArray(response.articles) ? response.articles.length : 0;
      var endIndex = startIndex + visibleCount - 1;

      var baseText;
      if (total === 1) {
        baseText = 'Showing 1 top list';
      } else {
        baseText = 'Showing ' + startIndex + '–' + endIndex + ' of ' + total + ' top lists';
      }

      var filterParts = [];
      if (state.titleQuery && state.titleQuery.trim() !== '') {
        filterParts.push('matching "' + state.titleQuery.trim() + '"');
      }
      if (Number.isFinite(state.minPublishedYear) && Number.isFinite(state.maxPublishedYear)) {
        filterParts.push('published between ' + state.minPublishedYear + ' and ' + state.maxPublishedYear);
      } else if (Number.isFinite(state.minPublishedYear)) {
        filterParts.push('published from ' + state.minPublishedYear + ' onward');
      } else if (Number.isFinite(state.maxPublishedYear)) {
        filterParts.push('published up to ' + state.maxPublishedYear);
      }

      if (filterParts.length > 0) {
        baseText += ' ' + filterParts.join(' and ');
      }

      container.textContent = baseText + '.';
    }

    function renderArticleList(container, articles) {
      if (!container) {
        return;
      }
      container.innerHTML = '';

      if (!Array.isArray(articles) || articles.length === 0) {
        return;
      }

      articles.forEach(function (article) {
        if (!article || !article.id) {
          return;
        }

        var card = document.createElement('article');
        card.className = 'toplist-card';

        var link = document.createElement('a');
        link.href = 'javascript:void(0)';
        link.className = 'toplist-card-link';
        link.dataset.action = 'open-article';
        link.dataset.articleId = article.id;

        var header = document.createElement('header');
        header.className = 'toplist-card-header';

        var titleEl = document.createElement('h2');
        titleEl.className = 'toplist-card-title';
        titleEl.textContent = article.title || 'Untitled top list';

        var metaEl = document.createElement('div');
        metaEl.className = 'toplist-card-meta';

        var yearSpan = document.createElement('span');
        yearSpan.className = 'toplist-card-meta-item toplist-card-year';
        if (typeof article.publishedYear === 'number') {
          yearSpan.textContent = String(article.publishedYear);
        } else if (article.publishedAt) {
          try {
            yearSpan.textContent = String(new Date(article.publishedAt).getFullYear());
          } catch (e) {
            yearSpan.textContent = '';
          }
        }

        var countSpan = document.createElement('span');
        countSpan.className = 'toplist-card-meta-item toplist-card-count';
        if (typeof article.topListCount === 'number' && article.topListCount > 0) {
          countSpan.textContent = article.topListCount + ' games';
        }

        var commentsSpan = document.createElement('span');
        commentsSpan.className = 'toplist-card-meta-item toplist-card-comments';
        if (typeof article.commentCount === 'number' && article.commentCount > 0) {
          commentsSpan.textContent = article.commentCount + ' comments';
        }

        [yearSpan, countSpan, commentsSpan].forEach(function (span) {
          if (span.textContent && span.textContent.trim() !== '') {
            metaEl.appendChild(span);
          }
        });

        header.appendChild(titleEl);
        if (metaEl.childNodes.length > 0) {
          header.appendChild(metaEl);
        }

        var summaryEl = document.createElement('p');
        summaryEl.className = 'toplist-card-summary';
        if (article.helpfulSnippet && article.helpfulSnippet.trim() !== '') {
          summaryEl.textContent = article.helpfulSnippet.trim();
        } else if (article.summary && article.summary.trim() !== '') {
          summaryEl.textContent = article.summary.trim();
        }

        link.appendChild(header);
        if (summaryEl.textContent && summaryEl.textContent.trim() !== '') {
          link.appendChild(summaryEl);
        }

        card.appendChild(link);
        container.appendChild(card);
      });
    }

    function renderPagination(container, totalCount, page, pageSize) {
      if (!container) {
        return;
      }
      container.innerHTML = '';

      if (typeof totalCount !== 'number' || totalCount <= 0) {
        container.style.display = 'none';
        return;
      }

      var totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
      if (totalPages <= 1) {
        container.style.display = 'none';
        return;
      }

      container.style.display = '';

      var prevButton = document.createElement('button');
      prevButton.type = 'button';
      prevButton.className = 'pagination-btn pagination-prev';
      prevButton.textContent = 'Previous';
      prevButton.dataset.action = 'page-prev';
      prevButton.dataset.page = String(Math.max(1, page - 1));
      if (page <= 1) {
        prevButton.disabled = true;
      }
      container.appendChild(prevButton);

      for (var i = 1; i <= totalPages; i += 1) {
        var pageButton = document.createElement('button');
        pageButton.type = 'button';
        pageButton.className = 'pagination-btn pagination-page';
        if (i === page) {
          pageButton.className += ' is-active';
          pageButton.setAttribute('aria-current', 'page');
        }
        pageButton.textContent = String(i);
        pageButton.dataset.action = 'page-goto';
        pageButton.dataset.page = String(i);
        container.appendChild(pageButton);
      }

      var nextButton = document.createElement('button');
      nextButton.type = 'button';
      nextButton.className = 'pagination-btn pagination-next';
      nextButton.textContent = 'Next';
      nextButton.dataset.action = 'page-next';
      nextButton.dataset.page = String(Math.min(totalPages, page + 1));
      if (page >= totalPages) {
        nextButton.disabled = true;
      }
      container.appendChild(nextButton);
    }

    function renderEmptyState(container, state) {
      if (!container) {
        return;
      }
      container.innerHTML = '';

      var panel = document.createElement('div');
      panel.className = 'toplists-empty-state-panel';

      var titleEl = document.createElement('h2');
      titleEl.className = 'toplists-empty-state-title';
      titleEl.textContent = 'No top lists found';

      var messageEl = document.createElement('p');
      messageEl.className = 'toplists-empty-state-message';

      var hasQuery = state.titleQuery && state.titleQuery.trim() !== '';
      var hasYearFilter = Number.isFinite(state.minPublishedYear) || Number.isFinite(state.maxPublishedYear);

      if (!hasQuery && !hasYearFilter) {
        messageEl.textContent = 'Try adjusting your search terms or filters to see JRPG top lists.';
      } else {
        var fragment = document.createDocumentFragment();
        fragment.appendChild(document.createTextNode('We couldn\'t find any JRPG top lists '));
        if (hasQuery) {
          fragment.appendChild(document.createTextNode('matching "'));
          var querySpan = document.createElement('span');
          querySpan.className = 'empty-state-query';
          querySpan.textContent = state.titleQuery.trim();
          fragment.appendChild(querySpan);
          fragment.appendChild(document.createTextNode('"'));
        }
        if (hasYearFilter) {
          if (Number.isFinite(state.minPublishedYear) && Number.isFinite(state.maxPublishedYear)) {
            fragment.appendChild(document.createTextNode(' between ' + state.minPublishedYear + ' and ' + state.maxPublishedYear + '.'));
          } else if (Number.isFinite(state.minPublishedYear)) {
            fragment.appendChild(document.createTextNode(' from ' + state.minPublishedYear + ' onward.'));
          } else if (Number.isFinite(state.maxPublishedYear)) {
            fragment.appendChild(document.createTextNode(' up to ' + state.maxPublishedYear + '.'));
          } else {
            fragment.appendChild(document.createTextNode('.'));
          }
        } else {
          fragment.appendChild(document.createTextNode('.'));
        }
        messageEl.appendChild(fragment);
      }

      var hintEl = document.createElement('p');
      hintEl.className = 'toplists-empty-state-hint';
      hintEl.textContent = 'You can clear the year filters or search with a broader title to discover more lists.';

      panel.appendChild(titleEl);
      panel.appendChild(messageEl);
      panel.appendChild(hintEl);

      container.appendChild(panel);
    }

    function fetchAndRender(state) {
      if (!articleListEl || !resultsSummaryEl || !paginationEl || !emptyStateEl) {
        return;
      }

      var availableSorts = Array.isArray(filterOptions.sortOptions) ? filterOptions.sortOptions : [];
      var effectiveSort = state.sortBy || '';
      if (availableSorts.length > 0) {
        var exists = availableSorts.some(function (opt) {
          return opt && opt.value === state.sortBy;
        });
        if (!exists) {
          effectiveSort = availableSorts[0].value;
        }
      }
      state.sortBy = effectiveSort;
      if (sortSelectEl && effectiveSort && sortSelectEl.value !== effectiveSort) {
        sortSelectEl.value = effectiveSort;
      }

      var maxYearArg;
      var minYearArg;
      if (Number.isFinite(state.maxPublishedYear)) {
        maxYearArg = state.maxPublishedYear;
      }
      if (Number.isFinite(state.minPublishedYear)) {
        minYearArg = state.minPublishedYear;
      }

      var response;
      try {
        response = WebsiteSDK.getTopListArticles(
          maxYearArg,
          minYearArg,
          state.titleQuery && state.titleQuery.trim() !== '' ? state.titleQuery.trim() : undefined,
          effectiveSort || undefined,
          state.page || 1,
          PAGE_SIZE
        );
      } catch (error) {
        console.error('Error fetching top list articles:', error);
        articleListEl.innerHTML = '';
        paginationEl.innerHTML = '';
        if (emptyStateEl) {
          emptyStateEl.style.display = '';
          renderEmptyState(emptyStateEl, state);
        }
        if (resultsSummaryEl) {
          resultsSummaryEl.textContent = 'There was a problem loading top lists. Please try again.';
        }
        return;
      }

      if (!response) {
        return;
      }

      if (response.totalCount === 0) {
        articleListEl.innerHTML = '';
        paginationEl.innerHTML = '';
        if (emptyStateEl) {
          emptyStateEl.style.display = '';
          renderEmptyState(emptyStateEl, state);
        }
      } else {
        if (emptyStateEl) {
          emptyStateEl.style.display = 'none';
          emptyStateEl.innerHTML = '';
        }
        renderArticleList(articleListEl, response.articles || []);
        renderPagination(
          paginationEl,
          response.totalCount,
          response.page || state.page || 1,
          response.pageSize || PAGE_SIZE
        );
      }

      renderResultsSummary(resultsSummaryEl, response, state);
    }

    function handleSearchSubmit(event) {
      event.preventDefault();
      if (!searchInputEl) {
        return;
      }
      var value = searchInputEl.value ? searchInputEl.value.trim() : '';
      var newState = updateUrlState(
        {
          titleQuery: value,
          page: 1
        },
        { replace: false }
      );
      applyStateToControls(newState);
      fetchAndRender(newState);
    }

    function handleYearFilterChange() {
      var minValue = minYearSelectEl && minYearSelectEl.value !== '' ? parseInt(minYearSelectEl.value, 10) : undefined;
      var maxValue = maxYearSelectEl && maxYearSelectEl.value !== '' ? parseInt(maxYearSelectEl.value, 10) : undefined;

      var partial = {
        minPublishedYear: Number.isFinite(minValue) ? minValue : undefined,
        maxPublishedYear: Number.isFinite(maxValue) ? maxValue : undefined,
        page: 1
      };

      var newState = updateUrlState(partial, { replace: false });
      applyStateToControls(newState);
      fetchAndRender(newState);
    }

    function handleClearYearFilters() {
      if (minYearSelectEl) {
        minYearSelectEl.value = '';
      }
      if (maxYearSelectEl) {
        maxYearSelectEl.value = '';
      }

      var newState = updateUrlState(
        {
          minPublishedYear: undefined,
          maxPublishedYear: undefined,
          page: 1
        },
        { replace: false }
      );
      applyStateToControls(newState);
      fetchAndRender(newState);
    }

    function handleSortChange() {
      if (!sortSelectEl) {
        return;
      }
      var selectedSort = sortSelectEl.value || '';
      var newState = updateUrlState(
        {
          sortBy: selectedSort,
          page: 1
        },
        { replace: false }
      );
      applyStateToControls(newState);
      fetchAndRender(newState);
    }

    function handlePaginationClick(event) {
      var target = event.target;
      if (!target) {
        return;
      }
      var button = target.closest('[data-action]');
      if (!button) {
        return;
      }
      var action = button.dataset.action;
      if (!action) {
        return;
      }

      var newPage = currentState ? currentState.page : 1;

      if (action === 'page-goto' || action === 'page-prev' || action === 'page-next') {
        var pageAttr = button.dataset.page;
        var parsed = parseInt(pageAttr, 10);
        if (Number.isFinite(parsed) && parsed > 0) {
          newPage = parsed;
        }
      } else {
        return;
      }

      if (newPage === (currentState ? currentState.page : 1)) {
        return;
      }

      var newState = updateUrlState({ page: newPage }, { replace: false });
      applyStateToControls(newState);
      fetchAndRender(newState);
    }

    function handleArticleClick(event) {
      var target = event.target;
      if (!target) {
        return;
      }
      var actionEl = target.closest('[data-action="open-article"]');
      if (!actionEl) {
        return;
      }
      var articleId = actionEl.dataset.articleId;
      if (!articleId) {
        return;
      }
      var url = 'article.html?id=' + encodeURIComponent(articleId) + '&source=top_lists';
      window.location.href = url;
    }

    function handlePopState() {
      var stateFromUrl = parseStateFromUrl();
      currentState = stateFromUrl;
      applyStateToControls(stateFromUrl);
      fetchAndRender(stateFromUrl);
    }

    function init() {
      try {
        var options = WebsiteSDK.getTopListFilterOptions();
        if (options) {
          filterOptions = {
            publishedYears: Array.isArray(options.publishedYears) ? options.publishedYears : [],
            sortOptions: Array.isArray(options.sortOptions) ? options.sortOptions : []
          };
        }
      } catch (error) {
        console.error('Error loading top list filter options:', error);
        filterOptions = { publishedYears: [], sortOptions: [] };
      }

      var rawState = parseStateFromUrl();
      var initialState = Object.assign({}, rawState);

      var availableSorts = Array.isArray(filterOptions.sortOptions) ? filterOptions.sortOptions : [];
      if (availableSorts.length > 0) {
        var exists = availableSorts.some(function (opt) {
          return opt && opt.value === initialState.sortBy;
        });
        if (!exists) {
          var defaultSortValue = availableSorts[0].value;
          initialState.sortBy = defaultSortValue;
          updateUrlState({ sortBy: defaultSortValue }, { replace: true });
        }
      }

      currentState = initialState;
      applyStateToControls(initialState);
      fetchAndRender(initialState);

      if (searchFormEl) {
        searchFormEl.addEventListener('submit', handleSearchSubmit);
      }
      if (minYearSelectEl) {
        minYearSelectEl.addEventListener('change', handleYearFilterChange);
      }
      if (maxYearSelectEl) {
        maxYearSelectEl.addEventListener('change', handleYearFilterChange);
      }
      if (clearYearBtnEl) {
        clearYearBtnEl.addEventListener('click', handleClearYearFilters);
      }
      if (sortSelectEl) {
        sortSelectEl.addEventListener('change', handleSortChange);
      }
      if (paginationEl) {
        paginationEl.addEventListener('click', handlePaginationClick);
      }
      if (articleListEl) {
        articleListEl.addEventListener('click', handleArticleClick);
      }

      window.addEventListener('popstate', handlePopState);
    }

    init();
  });
  </script>
</body>
</html>
