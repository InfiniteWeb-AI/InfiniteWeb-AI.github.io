<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Contact | JRPG Content Blog</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='framework.css'>
  <link rel='stylesheet' href='contact.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-bar container'>
      <nav class='primary-nav' aria-label='Main site navigation'>
        <ul class='nav-list'>
          <li class='nav-item'><a href='index.html' title='Homepage with featured JRPG content and global navigation'>Home</a></li>
          <li class='nav-item'><a href='recommendations.html' title='Browse filtered JRPG recommendations and reviews'>Game Recommendations</a></li>
          <li class='nav-item'><a href='news.html' title='JRPG news and release-date updates'>News</a></li>
          <li class='nav-item'><a href='features.html' title='Long-form JRPG features and narrative analysis'>Features</a></li>
          <li class='nav-item'><a href='guides.html' title='Gameplay, beginner, and trophy guides for JRPGs'>Guides</a></li>
          <li class='nav-item'><a href='top_lists.html' title='Ranked lists such as Top 10 classic JRPGs'>Top Lists</a></li>
          <li class='nav-item'><a href='game_finder.html' title='Interactive JRPG recommendation tool'>Game Finder</a></li>
          <li class='nav-item'><a href='library.html' title='View and manage your reading list, wishlist, bookmarks, collections, and followed releases'>My Library</a></li>
        </ul>
      </nav>
      <div class='header-tools' aria-hidden='true'>
        <span class='nav-search-icon' role='img'></span>
      </div>
    </div>
  </header>

  <main id='content' class='content-area'>
    <!-- Non-visual URL state handler marker -->
    <div data-component='contact-url-state-handler' hidden></div>

    <!-- Hero / static content loader -->
    <section class='contact-hero' data-component='contact-page-content-loader'>
      <div class='container contact-hero-inner'>
        <div class='contact-hero-text'>
          <h1 class='page-title' data-populate='contact-title'>Contact</h1>
          <p class='page-intro' data-populate='contact-intro'></p>
          <p class='page-meta'>
            <span class='last-updated-label' data-populate='contact-last-updated'></span>
          </p>
        </div>
      </div>
    </section>

    <!-- Main contact content: form + alternate contact info -->
    <section class='contact-main'>
      <div class='container contact-main-inner'>
        <div class='contact-layout-grid'>
          <!-- Contact form card -->
          <section class='contact-form-card' data-component='contact-form'>
            <!-- Status banner, visually attached to top of form card -->
            <div class='contact-status-banner' data-component='contact-status-banner' aria-live='polite' hidden>
              <div class='status-inner'>
                <p class='status-message' data-status-message></p>
                <button type='button' class='status-close' data-action='dismiss-status-banner' aria-label='Dismiss notification'>
                  ×
                </button>
              </div>
            </div>

            <form class='contact-form' novalidate>
              <fieldset class='form-fieldset'>
                <legend class='form-legend'>Send us a message</legend>

                <div class='form-group'>
                  <label for='contactName'>
                    Name
                    <span class='field-required' aria-hidden='true'>*</span>
                  </label>
                  <input id='contactName' name='name' type='text' autocomplete='name' required>
                  <p class='field-error' data-field-error-for='name' aria-live='polite'></p>
                </div>

                <div class='form-group'>
                  <label for='contactEmail'>
                    Email
                    <span class='field-required' aria-hidden='true'>*</span>
                  </label>
                  <input id='contactEmail' name='email' type='email' inputmode='email' autocomplete='email' required>
                  <p class='field-error' data-field-error-for='email' aria-live='polite'></p>
                </div>

                <div class='form-group'>
                  <label for='contactSubject'>
                    Subject
                    <span class='field-required' aria-hidden='true'>*</span>
                  </label>
                  <input id='contactSubject' name='subject' type='text' required>
                  <p class='field-error' data-field-error-for='subject' aria-live='polite'></p>
                </div>

                <div class='form-group'>
                  <label for='contactMessage'>
                    Message
                    <span class='field-required' aria-hidden='true'>*</span>
                  </label>
                  <textarea id='contactMessage' name='message' rows='6' required></textarea>
                  <p class='field-error' data-field-error-for='message' aria-live='polite'></p>
                </div>

                <div class='form-actions'>
                  <button type='submit' class='btn btn-primary'>Send message</button>
                  <button type='button' class='btn btn-secondary' data-action='reset-contact-form'>Clear</button>
                </div>
              </fieldset>
            </form>
          </section>

          <!-- Alternate contact information / static body content -->
          <aside class='alternate-contact-card' data-component='alternate-contact-info'>
            <h2 class='alt-contact-title'>Other ways to reach the team</h2>
            <div class='alt-contact-body' data-populate='contact-body'></div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-links'>
          <li class='footer-item'><a href='about.html' title='Learn more about the site and its mission'>About</a></li>
          <li class='footer-item'><a href='contact.html' title='Get in touch with the site maintainers'>Contact</a></li>
          <li class='footer-item'><a href='newsletter.html' title='Sign up for the JRPG newsletter and set your preferences'>Newsletter</a></li>
          <li class='footer-item'><a href='privacy.html' title='Read about how your data and preferences are handled'>Privacy Policy</a></li>
          <li class='footer-item'><a href='terms.html' title='Review the terms and conditions for using the site'>Terms of Use</a></li>
        </ul>
      </nav>
      <div class='footer-meta'>
        <p class='footer-copy'>&copy; <span class='footer-year'>2026</span> JRPG Content Blog. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // URL state handler: parse incoming parameters
      var urlParams = new URLSearchParams(window.location.search);

      var initialFormState = {
        name: urlParams.get('name') || '',
        email: urlParams.get('email') || '',
        subject: urlParams.get('subject') || '',
        message: urlParams.get('message') || ''
      };
      var initialStatus = urlParams.get('status'); // 'sent' | 'error' | null

      // Static page content loader
      var staticContent = null;
      var staticContentError = false;
      try {
        staticContent = WebsiteSDK.getStaticPageContent('contact');
      } catch (err) {
        staticContentError = true;
        console.error('Failed to load contact page content', err);
      }

      // Populate static content-driven elements
      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(el) {
        var key = el.dataset.populate;

        if (key === 'contact-title') {
          if (staticContent && staticContent.title) {
            el.textContent = staticContent.title;
          } else {
            el.textContent = 'Contact';
          }
        } else if (key === 'contact-intro') {
          if (staticContent && staticContent.body) {
            var temp = document.createElement('div');
            temp.innerHTML = staticContent.body;
            var text = temp.textContent || temp.innerText || '';
            text = text.trim();
            if (text.length > 220) {
              text = text.slice(0, 220).trim() + '…';
            }
            el.textContent = text || 'Questions about JRPG recommendations, guides, or site feedback? Use the form below.';
          } else {
            el.textContent = 'Questions about JRPG recommendations, guides, or site feedback? Use the form below.';
          }
        } else if (key === 'contact-last-updated') {
          if (staticContent && staticContent.lastUpdatedAt) {
            el.textContent = 'Last updated: ' + staticContent.lastUpdatedAt;
          } else {
            el.textContent = '';
          }
        } else if (key === 'contact-body') {
          if (staticContent && staticContent.body) {
            el.innerHTML = staticContent.body;
          } else if (staticContentError) {
            el.textContent = 'Alternative contact details are temporarily unavailable. You can still reach out using the form on this page.';
          } else {
            el.textContent = 'Use the form to get in touch about JRPG coverage, feedback, or collaboration ideas.';
          }
        }
      });

      // Contact form setup
      var formWrapper = document.querySelector('[data-component="contact-form"]');
      if (!formWrapper) {
        return;
      }
      var form = formWrapper.querySelector('form');
      if (!form) {
        return;
      }

      var nameInput = document.getElementById('contactName');
      var emailInput = document.getElementById('contactEmail');
      var subjectInput = document.getElementById('contactSubject');
      var messageInput = document.getElementById('contactMessage');
      var submitButton = form.querySelector('[type="submit"]');
      var resetButton = form.querySelector('[data-action="reset-contact-form"]');

      if (nameInput) nameInput.value = initialFormState.name;
      if (emailInput) emailInput.value = initialFormState.email;
      if (subjectInput) subjectInput.value = initialFormState.subject;
      if (messageInput) messageInput.value = initialFormState.message;

      // Field error elements
      var fieldErrorEls = {};
      document.querySelectorAll('[data-field-error-for]').forEach(function(el) {
        fieldErrorEls[el.dataset.fieldErrorFor] = el;
      });

      function setFieldError(fieldName, message) {
        var errorEl = fieldErrorEls[fieldName];
        if (errorEl) {
          errorEl.textContent = message || '';
        }
      }

      function clearFieldErrors() {
        Object.keys(fieldErrorEls).forEach(function(key) {
          fieldErrorEls[key].textContent = '';
        });
      }

      function validateForm() {
        clearFieldErrors();

        var hasError = false;
        var nameVal = nameInput.value.trim();
        var emailVal = emailInput.value.trim();
        var subjectVal = subjectInput.value.trim();
        var messageVal = messageInput.value.trim();

        if (!nameVal) {
          hasError = true;
          setFieldError('name', 'Please enter your name.');
        }

        if (!emailVal) {
          hasError = true;
          setFieldError('email', 'Please enter your email address.');
        } else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(emailVal)) {
          hasError = true;
          setFieldError('email', 'Please enter a valid email address.');
        }

        if (!subjectVal) {
          hasError = true;
          setFieldError('subject', 'Please enter a subject.');
        }

        if (!messageVal) {
          hasError = true;
          setFieldError('message', 'Please enter a message.');
        }

        return {
          hasError: hasError,
          values: {
            name: nameVal,
            email: emailVal,
            subject: subjectVal,
            message: messageVal
          }
        };
      }

      // Status banner component
      var statusBanner = document.querySelector('[data-component="contact-status-banner"]');
      var statusMessageEl = statusBanner ? statusBanner.querySelector('[data-status-message]') : null;

      function updateUrlStatus(statusValue) {
        try {
          var params = new URLSearchParams(window.location.search);
          if (!statusValue) {
            params.delete('status');
          } else {
            params.set('status', statusValue);
          }
          var newUrl = window.location.pathname;
          var queryString = params.toString();
          if (queryString) {
            newUrl += '?' + queryString;
          }
          window.history.replaceState(null, '', newUrl);
        } catch (err) {
          console.error('Failed to update status parameter in URL', err);
        }
      }

      function clearStatus() {
        if (statusBanner) {
          statusBanner.hidden = true;
          statusBanner.classList.remove('status-success', 'status-error');
        }
        if (statusMessageEl) {
          statusMessageEl.textContent = '';
        }
      }

      function showStatus(type, message) {
        if (!statusBanner || !statusMessageEl) return;
        statusBanner.hidden = false;
        statusBanner.classList.remove('status-success', 'status-error');
        if (type === 'success') {
          statusBanner.classList.add('status-success');
        } else if (type === 'error') {
          statusBanner.classList.add('status-error');
        }
        statusMessageEl.textContent = message || '';
      }

      // Initialize status banner from URL param
      if (initialStatus === 'sent') {
        showStatus('success', 'Your message has already been sent. Thanks for reaching out!');
      } else if (initialStatus === 'error') {
        showStatus('error', 'Your last message may not have gone through. You can try sending it again below.');
      }

      // Status banner dismissal
      document.querySelectorAll('[data-action="dismiss-status-banner"]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          clearStatus();
          updateUrlStatus(null);
        });
      });

      var isSubmitting = false;

      // Form submission handler
      form.addEventListener('submit', function(event) {
        event.preventDefault();
        if (isSubmitting) {
          return; // Prevent duplicate submissions
        }

        clearStatus();

        var validation = validateForm();
        if (validation.hasError) {
          return;
        }

        isSubmitting = true;
        if (submitButton) {
          submitButton.disabled = true;
        }

        var values = validation.values;
        var response = null;
        var hadError = false;

        try {
          response = WebsiteSDK.sendContactMessage(values.name, values.email, values.subject, values.message);
        } catch (err) {
          console.error('sendContactMessage failed', err);
          hadError = true;
        }

        if (!hadError && response && response.success) {
          showStatus('success', response.message || 'Your message has been sent successfully.');

          // Clear form fields after successful submission
          nameInput.value = '';
          emailInput.value = '';
          subjectInput.value = '';
          messageInput.value = '';

          updateUrlStatus('sent');
        } else {
          var errorMessage = (response && typeof response.message === 'string' && response.message) || 'We could not send your message. Please try again in a moment.';
          showStatus('error', errorMessage);
          updateUrlStatus('error');
        }

        isSubmitting = false;
        if (submitButton) {
          submitButton.disabled = false;
        }
      });

      // Optional reset handler
      if (resetButton) {
        resetButton.addEventListener('click', function() {
          nameInput.value = '';
          emailInput.value = '';
          subjectInput.value = '';
          messageInput.value = '';
          clearFieldErrors();
          clearStatus();
          updateUrlStatus(null);
        });
      }

      // Clear individual field errors on input
      [
        { input: nameInput, key: 'name' },
        { input: emailInput, key: 'email' },
        { input: subjectInput, key: 'subject' },
        { input: messageInput, key: 'message' }
      ].forEach(function(item) {
        if (item.input) {
          item.input.addEventListener('input', function() {
            setFieldError(item.key, '');
          });
        }
      });
    });
  </script>
</body>
</html>
