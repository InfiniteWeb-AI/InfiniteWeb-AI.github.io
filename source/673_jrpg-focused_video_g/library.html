<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>My Library | JRPG Content Blog</title>
  <meta name='description' content='Single-user hub for viewing and managing saved JRPG-related articles, including reading list, wishlist, bookmarks, followed releases, and user-created collections.'>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='framework.css'>
  <link rel='stylesheet' href='library.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-bar container'>
      <nav class='primary-nav' aria-label='Main site navigation'>
        <ul class='nav-list'>
          <li class='nav-item'><a href='index.html' title='Homepage with featured JRPG content and global navigation'>Home</a></li>
          <li class='nav-item'><a href='recommendations.html' title='Browse filtered JRPG recommendations and reviews'>Game Recommendations</a></li>
          <li class='nav-item'><a href='news.html' title='JRPG news and release-date updates'>News</a></li>
          <li class='nav-item'><a href='features.html' title='Long-form JRPG features and narrative analysis'>Features</a></li>
          <li class='nav-item'><a href='guides.html' title='Gameplay, beginner, and trophy guides for JRPGs'>Guides</a></li>
          <li class='nav-item'><a href='top_lists.html' title='Ranked lists such as Top 10 classic JRPGs'>Top Lists</a></li>
          <li class='nav-item'><a href='game_finder.html' title='Interactive JRPG recommendation tool'>Game Finder</a></li>
          <li class='nav-item'><a href='library.html' title='View and manage your reading list, wishlist, bookmarks, collections, and followed releases'>My Library</a></li>
        </ul>
      </nav>
      <div class='header-tools' aria-hidden='true'>
        <span class='nav-search-icon' role='img'></span>
      </div>
    </div>
  </header>

  <main id='content' class='content-area'>
    <section class='library-hero' data-component='library-page-init' data-populate='library-hero' aria-label='My Library overview'>
      <!-- Filled via JS from getMyLibraryOverview & getUserCollections -->
    </section>

    <nav class='library-tabs' data-component='section-navigation' data-populate='section-tabs' aria-label='My Library sections'>
      <!-- Tabs rendered via JS -->
    </nav>

    <div class='library-layout container' data-layout='library-grid'>
      <div class='library-main-column'>
        <section class='library-section' data-component='reading-list-section' data-section-key='reading_list' data-populate='reading-list'>
          <!-- Reading List content rendered via JS -->
        </section>

        <section class='library-section' data-component='wishlist-section' data-section-key='wishlist' data-populate='wishlist'>
          <!-- Wishlist content rendered via JS -->
        </section>

        <section class='library-section' data-component='bookmarks-section' data-section-key='bookmarks' data-populate='bookmarks'>
          <!-- Bookmarks content rendered via JS -->
        </section>

        <section class='library-section' data-component='followed-releases-section' data-section-key='followed_releases' data-populate='followed-releases'>
          <!-- Followed Releases content rendered via JS -->
        </section>

        <section class='library-section' data-component='collections-section' data-section-key='collections' data-populate='collections'>
          <!-- Collections content rendered via JS -->
        </section>
      </div>

      <aside class='library-side-column' data-component='collections-overview-panel' data-populate='collections-overview' aria-label='Collections overview'>
        <!-- Collections overview rendered via JS -->
      </aside>
    </div>

    <div class='library-toast-stack' data-component='library-mutation-feedback' aria-live='polite' aria-atomic='true'>
      <!-- Toast messages inserted via JS -->
    </div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-links'>
          <li class='footer-item'><a href='about.html' title='Learn more about the site and its mission'>About</a></li>
          <li class='footer-item'><a href='contact.html' title='Get in touch with the site maintainers'>Contact</a></li>
          <li class='footer-item'><a href='newsletter.html' title='Sign up for the JRPG newsletter and set your preferences'>Newsletter</a></li>
          <li class='footer-item'><a href='privacy.html' title='Read about how your data and preferences are handled'>Privacy Policy</a></li>
          <li class='footer-item'><a href='terms.html' title='Review the terms and conditions for using the site'>Terms of Use</a></li>
        </ul>
      </nav>
      <div class='footer-meta'>
        <p class='footer-copy'>&copy; <span class='footer-year'>2026</span> JRPG Content Blog. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    (function() {
      const libraryState = {
        overview: null,
        collectionsSummary: [],
        activeSection: 'reading_list',
        activeCollectionId: null,
        initialCollectionScrollDone: false
      };

      const VALID_SECTIONS = ['reading_list', 'wishlist', 'bookmarks', 'followed_releases', 'collections'];

      document.addEventListener('DOMContentLoaded', function() {
        initLibraryPage();
      });

      function initLibraryPage() {
        readStateFromUrl();
        normalizeUrl(false);

        try {
          const overview = WebsiteSDK.getMyLibraryOverview();
          const collectionsSummary = WebsiteSDK.getUserCollections();
          libraryState.overview = overview || {};
          libraryState.collectionsSummary = Array.isArray(collectionsSummary) ? collectionsSummary : [];
        } catch (err) {
          console.error('Error loading library overview:', err);
          showToast('Failed to load your library. Please refresh to try again.', 'error');
        }

        renderFromState();

        if (libraryState.activeSection === 'collections' && libraryState.activeCollectionId) {
          setTimeout(function() {
            scrollToCollection(libraryState.activeCollectionId);
            libraryState.initialCollectionScrollDone = true;
          }, 0);
        }

        setupEventHandlers();
      }

      function readStateFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const sectionParam = params.get('section');
        const collectionIdParam = params.get('collectionId');

        let activeSection = VALID_SECTIONS.indexOf(sectionParam) !== -1 ? sectionParam : 'reading_list';
        let activeCollectionId = collectionIdParam || null;

        if (activeCollectionId && activeSection !== 'collections') {
          activeSection = 'collections';
        }

        libraryState.activeSection = activeSection;
        libraryState.activeCollectionId = activeCollectionId;
      }

      function normalizeUrl(pushNewState) {
        const params = new URLSearchParams(window.location.search);
        params.set('section', libraryState.activeSection);

        if (libraryState.activeSection === 'collections' && libraryState.activeCollectionId) {
          params.set('collectionId', libraryState.activeCollectionId);
        } else {
          params.delete('collectionId');
        }

        const newUrl = window.location.pathname + '?' + params.toString();
        const state = {
          section: libraryState.activeSection,
          collectionId: libraryState.activeCollectionId
        };

        if (pushNewState) {
          window.history.pushState(state, '', newUrl);
        } else {
          window.history.replaceState(state, '', newUrl);
        }
      }

      function setupEventHandlers() {
        document.addEventListener('click', function(event) {
          const target = event.target.closest('[data-action]');
          if (!target) {
            return;
          }

          const action = target.dataset.action;
          if (!action) {
            return;
          }

          if (action !== 'open-article') {
            event.preventDefault();
          }

          switch (action) {
            case 'switch-section':
              handleSwitchSection(target);
              break;
            case 'open-article':
              handleOpenArticle(target, event);
              break;
            case 'remove-reading-list':
              handleRemoveFromReadingList(target);
              break;
            case 'remove-wishlist':
              handleRemoveFromWishlist(target);
              break;
            case 'remove-bookmark':
              handleRemoveBookmark(target);
              break;
            case 'unfollow-release':
              handleUnfollowRelease(target);
              break;
            case 'remove-from-collection':
              handleRemoveFromCollection(target);
              break;
            case 'jump-to-collection':
              handleJumpToCollection(target);
              break;
            default:
              break;
          }
        });

        document.addEventListener('keydown', function(event) {
          if (event.key !== 'Enter' && event.key !== ' ') {
            return;
          }
          const target = event.target.closest('[data-action="open-article"]');
          if (!target) {
            return;
          }
          event.preventDefault();
          handleOpenArticle(target, event);
        });

        window.addEventListener('popstate', function() {
          readStateFromUrl();
          renderFromState();
          if (libraryState.activeSection === 'collections' && libraryState.activeCollectionId) {
            scrollToCollection(libraryState.activeCollectionId);
          }
        });
      }

      function renderFromState() {
        const overview = libraryState.overview;
        if (!overview) {
          return;
        }

        const populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          const type = element.dataset.populate;
          switch (type) {
            case 'library-hero':
              renderLibraryHero(element, overview, libraryState.collectionsSummary);
              break;
            case 'section-tabs':
              renderSectionTabs(element, overview, libraryState.activeSection);
              break;
            case 'reading-list':
              renderReadingListSection(element, overview.readingList || [], libraryState.activeSection);
              break;
            case 'wishlist':
              renderWishlistSection(element, overview.wishlist || [], libraryState.activeSection);
              break;
            case 'bookmarks':
              renderBookmarksSection(element, overview.bookmarks || [], libraryState.activeSection);
              break;
            case 'followed-releases':
              renderFollowedReleasesSection(element, overview.followedReleases || [], libraryState.activeSection);
              break;
            case 'collections-overview':
              renderCollectionsOverviewPanel(element, libraryState.collectionsSummary, libraryState.activeSection, libraryState.activeCollectionId);
              break;
            case 'collections':
              renderCollectionsSection(element, overview.collections || [], libraryState.activeSection, libraryState.activeCollectionId);
              break;
            default:
              break;
          }
        });

        toggleSideColumnVisibility();
      }

      function renderLibraryHero(container, overview, collectionsSummary) {
        const readingCount = (overview.readingList || []).length;
        const wishlistCount = (overview.wishlist || []).length;
        const bookmarkCount = (overview.bookmarks || []).length;
        const followedCount = (overview.followedReleases || []).length;
        const collectionsCount = (overview.collections || []).length;

        const totalSaved = readingCount + wishlistCount + bookmarkCount + followedCount;

        container.innerHTML = '';

        const inner = document.createElement('div');
        inner.className = 'library-hero-inner';

        const title = document.createElement('h1');
        title.className = 'library-hero-title';
        title.textContent = 'My Library';

        const subtitle = document.createElement('p');
        subtitle.className = 'library-hero-subtitle';
        subtitle.textContent = 'Manage your saved JRPG reviews, guides, news, and collections.';

        const statsRow = document.createElement('div');
        statsRow.className = 'library-hero-stats';

        const statList = document.createElement('ul');
        statList.className = 'library-hero-stat-list';

        const stats = [
          { label: 'Saved items', value: totalSaved },
          { label: 'Reading list', value: readingCount },
          { label: 'Wishlist', value: wishlistCount },
          { label: 'Bookmarks', value: bookmarkCount },
          { label: 'Followed releases', value: followedCount },
          { label: 'Collections', value: collectionsCount }
        ];

        stats.forEach(function(stat) {
          const li = document.createElement('li');
          li.className = 'library-hero-stat';

          const valueEl = document.createElement('span');
          valueEl.className = 'library-hero-stat-value';
          valueEl.textContent = String(stat.value);

          const labelEl = document.createElement('span');
          labelEl.className = 'library-hero-stat-label';
          labelEl.textContent = stat.label;

          li.appendChild(valueEl);
          li.appendChild(labelEl);
          statList.appendChild(li);
        });

        statsRow.appendChild(statList);
        inner.appendChild(title);
        inner.appendChild(subtitle);
        inner.appendChild(statsRow);
        container.appendChild(inner);
      }

      function renderSectionTabs(container, overview, activeSection) {
        container.innerHTML = '';

        const readingCount = (overview.readingList || []).length;
        const wishlistCount = (overview.wishlist || []).length;
        const bookmarkCount = (overview.bookmarks || []).length;
        const followedCount = (overview.followedReleases || []).length;
        const collectionsCount = (overview.collections || []).length;

        const tabsConfig = [
          { key: 'reading_list', label: 'Reading List', count: readingCount },
          { key: 'wishlist', label: 'Wishlist', count: wishlistCount },
          { key: 'bookmarks', label: 'Bookmarks', count: bookmarkCount },
          { key: 'followed_releases', label: 'Followed Releases', count: followedCount },
          { key: 'collections', label: 'Collections', count: collectionsCount }
        ];

        const list = document.createElement('ul');
        list.className = 'library-tab-list';

        tabsConfig.forEach(function(tab) {
          const li = document.createElement('li');
          li.className = 'library-tab-item';

          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'library-tab-button';
          if (tab.key === activeSection) {
            button.classList.add('is-active');
            button.setAttribute('aria-current', 'page');
          }
          button.dataset.action = 'switch-section';
          button.dataset.section = tab.key;

          const labelSpan = document.createElement('span');
          labelSpan.className = 'library-tab-label';
          labelSpan.textContent = tab.label;

          const countSpan = document.createElement('span');
          countSpan.className = 'library-tab-count';
          countSpan.textContent = String(tab.count);

          button.appendChild(labelSpan);
          button.appendChild(countSpan);
          li.appendChild(button);
          list.appendChild(li);
        });

        container.appendChild(list);
      }

      function renderReadingListSection(container, readingList, activeSection) {
        if (activeSection !== 'reading_list') {
          container.innerHTML = '';
          container.setAttribute('hidden', 'hidden');
          container.classList.remove('is-active');
          return;
        }

        container.removeAttribute('hidden');
        container.classList.add('is-active');
        container.innerHTML = '';

        const heading = document.createElement('h2');
        heading.className = 'library-section-title';
        heading.textContent = 'Reading List';

        container.appendChild(heading);

        if (!readingList || readingList.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'library-section-empty';
          empty.textContent = 'Your reading list is empty. Save reviews or features to keep track of what you want to read next.';
          container.appendChild(empty);
          return;
        }

        const list = document.createElement('ul');
        list.className = 'library-item-list';

        readingList.forEach(function(entry) {
          const listItem = document.createElement('li');
          listItem.className = 'library-item-list-entry';

          const articleCard = document.createElement('article');
          articleCard.className = 'library-item-card';
          articleCard.dataset.action = 'open-article';
          articleCard.dataset.articleId = entry.article && entry.article.id ? entry.article.id : '';
          articleCard.tabIndex = 0;
          articleCard.setAttribute('role', 'button');

          const header = document.createElement('header');
          header.className = 'library-item-header';

          const title = document.createElement('h3');
          title.className = 'library-item-title';
          title.textContent = entry.article && entry.article.title ? entry.article.title : 'Untitled article';

          const typeChip = document.createElement('span');
          typeChip.className = 'library-item-type-chip';
          typeChip.textContent = entry.article && entry.article.type ? formatArticleType(entry.article.type) : '';

          header.appendChild(title);
          header.appendChild(typeChip);

          const meta = document.createElement('div');
          meta.className = 'library-item-meta';

          const addedAt = document.createElement('span');
          addedAt.className = 'library-item-meta-entry';
          if (entry.item && entry.item.addedAt) {
            const date = new Date(entry.item.addedAt);
            addedAt.textContent = 'Added ' + date.toLocaleDateString();
          }

          const published = document.createElement('span');
          published.className = 'library-item-meta-entry';
          if (entry.article && entry.article.publishedAt) {
            const date = new Date(entry.article.publishedAt);
            published.textContent = 'Published ' + date.toLocaleDateString();
          }

          if (addedAt.textContent) meta.appendChild(addedAt);
          if (published.textContent) meta.appendChild(published);

          const actions = document.createElement('div');
          actions.className = 'library-item-actions';

          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'btn btn-ghost library-item-action';
          removeBtn.dataset.action = 'remove-reading-list';
          removeBtn.dataset.articleId = entry.article && entry.article.id ? entry.article.id : '';
          removeBtn.textContent = 'Remove';

          actions.appendChild(removeBtn);

          const summary = document.createElement('p');
          summary.className = 'library-item-summary';
          if (entry.article && entry.article.summary) {
            summary.textContent = entry.article.summary;
          }

          articleCard.appendChild(header);
          articleCard.appendChild(meta);
          if (summary.textContent) {
            articleCard.appendChild(summary);
          }
          articleCard.appendChild(actions);

          listItem.appendChild(articleCard);
          list.appendChild(listItem);
        });

        container.appendChild(list);
      }

      function renderWishlistSection(container, wishlist, activeSection) {
        if (activeSection !== 'wishlist') {
          container.innerHTML = '';
          container.setAttribute('hidden', 'hidden');
          container.classList.remove('is-active');
          return;
        }

        container.removeAttribute('hidden');
        container.classList.add('is-active');
        container.innerHTML = '';

        const heading = document.createElement('h2');
        heading.className = 'library-section-title';
        heading.textContent = 'Wishlist';
        container.appendChild(heading);

        if (!wishlist || wishlist.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'library-section-empty';
          empty.textContent = 'Your wishlist is empty. Add reviews for games you want to follow.';
          container.appendChild(empty);
          return;
        }

        const list = document.createElement('ul');
        list.className = 'library-item-list';

        wishlist.forEach(function(entry) {
          const listItem = document.createElement('li');
          listItem.className = 'library-item-list-entry';

          const articleCard = document.createElement('article');
          articleCard.className = 'library-item-card';
          articleCard.dataset.action = 'open-article';
          articleCard.dataset.articleId = entry.article && entry.article.id ? entry.article.id : '';
          articleCard.tabIndex = 0;
          articleCard.setAttribute('role', 'button');

          const header = document.createElement('header');
          header.className = 'library-item-header';

          const title = document.createElement('h3');
          title.className = 'library-item-title';
          title.textContent = entry.article && entry.article.title ? entry.article.title : 'Untitled review';

          const badges = document.createElement('div');
          badges.className = 'library-item-badges';

          const typeChip = document.createElement('span');
          typeChip.className = 'library-item-type-chip';
          typeChip.textContent = 'Review';
          badges.appendChild(typeChip);

          if (entry.game && entry.game.title) {
            const gameChip = document.createElement('span');
            gameChip.className = 'library-item-game-chip';
            gameChip.textContent = entry.game.title;
            badges.appendChild(gameChip);
          }

          header.appendChild(title);
          header.appendChild(badges);

          const meta = document.createElement('div');
          meta.className = 'library-item-meta';

          const addedAt = document.createElement('span');
          addedAt.className = 'library-item-meta-entry';
          if (entry.item && entry.item.addedAt) {
            const date = new Date(entry.item.addedAt);
            addedAt.textContent = 'Added ' + date.toLocaleDateString();
          }

          if (entry.article && entry.article.primaryPlatform) {
            const platform = document.createElement('span');
            platform.className = 'library-item-meta-entry';
            platform.textContent = formatPlatform(entry.article.primaryPlatform);
            meta.appendChild(platform);
          }

          if (addedAt.textContent) meta.appendChild(addedAt);

          const actions = document.createElement('div');
          actions.className = 'library-item-actions';

          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'btn btn-ghost library-item-action';
          removeBtn.dataset.action = 'remove-wishlist';
          removeBtn.dataset.articleId = entry.article && entry.article.id ? entry.article.id : '';
          removeBtn.textContent = 'Remove';

          actions.appendChild(removeBtn);

          const summary = document.createElement('p');
          summary.className = 'library-item-summary';
          if (entry.article && entry.article.summary) {
            summary.textContent = entry.article.summary;
          }

          articleCard.appendChild(header);
          articleCard.appendChild(meta);
          if (summary.textContent) {
            articleCard.appendChild(summary);
          }
          articleCard.appendChild(actions);

          listItem.appendChild(articleCard);
          list.appendChild(listItem);
        });

        container.appendChild(list);
      }

      function renderBookmarksSection(container, bookmarks, activeSection) {
        if (activeSection !== 'bookmarks') {
          container.innerHTML = '';
          container.setAttribute('hidden', 'hidden');
          container.classList.remove('is-active');
          return;
        }

        container.removeAttribute('hidden');
        container.classList.add('is-active');
        container.innerHTML = '';

        const heading = document.createElement('h2');
        heading.className = 'library-section-title';
        heading.textContent = 'Bookmarks';
        container.appendChild(heading);

        if (!bookmarks || bookmarks.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'library-section-empty';
          empty.textContent = 'You have no bookmarked guides yet. Bookmark trophy, beginner, or walkthrough guides to return to them quickly.';
          container.appendChild(empty);
          return;
        }

        const list = document.createElement('ul');
        list.className = 'library-item-list';

        bookmarks.forEach(function(entry) {
          const listItem = document.createElement('li');
          listItem.className = 'library-item-list-entry';

          const articleCard = document.createElement('article');
          articleCard.className = 'library-item-card';
          articleCard.dataset.action = 'open-article';
          articleCard.dataset.articleId = entry.article && entry.article.id ? entry.article.id : '';
          articleCard.tabIndex = 0;
          articleCard.setAttribute('role', 'button');

          const header = document.createElement('header');
          header.className = 'library-item-header';

          const title = document.createElement('h3');
          title.className = 'library-item-title';
          title.textContent = entry.article && entry.article.title ? entry.article.title : 'Untitled guide';

          const typeChip = document.createElement('span');
          typeChip.className = 'library-item-type-chip';
          typeChip.textContent = 'Guide';

          header.appendChild(title);
          header.appendChild(typeChip);

          const meta = document.createElement('div');
          meta.className = 'library-item-meta';

          if (entry.article && entry.article.guideType) {
            const guideType = document.createElement('span');
            guideType.className = 'library-item-meta-entry';
            guideType.textContent = formatGuideType(entry.article.guideType);
            meta.appendChild(guideType);
          }

          if (entry.item && entry.item.addedAt) {
            const addedAt = document.createElement('span');
            addedAt.className = 'library-item-meta-entry';
            const date = new Date(entry.item.addedAt);
            addedAt.textContent = 'Bookmarked ' + date.toLocaleDateString();
            meta.appendChild(addedAt);
          }

          const actions = document.createElement('div');
          actions.className = 'library-item-actions';

          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'btn btn-ghost library-item-action';
          removeBtn.dataset.action = 'remove-bookmark';
          removeBtn.dataset.articleId = entry.article && entry.article.id ? entry.article.id : '';
          removeBtn.textContent = 'Remove';

          actions.appendChild(removeBtn);

          const summary = document.createElement('p');
          summary.className = 'library-item-summary';
          if (entry.article && entry.article.summary) {
            summary.textContent = entry.article.summary;
          }

          articleCard.appendChild(header);
          articleCard.appendChild(meta);
          if (summary.textContent) {
            articleCard.appendChild(summary);
          }
          articleCard.appendChild(actions);

          listItem.appendChild(articleCard);
          list.appendChild(listItem);
        });

        container.appendChild(list);
      }

      function renderFollowedReleasesSection(container, followedReleases, activeSection) {
        if (activeSection !== 'followed_releases') {
          container.innerHTML = '';
          container.setAttribute('hidden', 'hidden');
          container.classList.remove('is-active');
          return;
        }

        container.removeAttribute('hidden');
        container.classList.add('is-active');
        container.innerHTML = '';

        const heading = document.createElement('h2');
        heading.className = 'library-section-title';
        heading.textContent = 'Followed Releases';
        container.appendChild(heading);

        if (!followedReleases || followedReleases.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'library-section-empty';
          empty.textContent = 'You are not following any release-date news articles yet.';
          container.appendChild(empty);
          return;
        }

        const list = document.createElement('ul');
        list.className = 'library-item-list';

        followedReleases.forEach(function(entry) {
          const listItem = document.createElement('li');
          listItem.className = 'library-item-list-entry';

          const articleCard = document.createElement('article');
          articleCard.className = 'library-item-card';
          articleCard.dataset.action = 'open-article';
          articleCard.dataset.articleId = entry.article && entry.article.id ? entry.article.id : '';
          articleCard.tabIndex = 0;
          articleCard.setAttribute('role', 'button');

          const header = document.createElement('header');
          header.className = 'library-item-header';

          const title = document.createElement('h3');
          title.className = 'library-item-title';
          title.textContent = entry.article && entry.article.title ? entry.article.title : 'Untitled news';

          const badges = document.createElement('div');
          badges.className = 'library-item-badges';

          const newsChip = document.createElement('span');
          newsChip.className = 'library-item-type-chip';
          newsChip.textContent = 'Release News';
          badges.appendChild(newsChip);

          if (entry.item && typeof entry.item.isActive === 'boolean') {
            const statusChip = document.createElement('span');
            statusChip.className = 'library-item-status-chip';
            statusChip.textContent = entry.item.isActive ? 'Active' : 'Inactive';
            badges.appendChild(statusChip);
          }

          header.appendChild(title);
          header.appendChild(badges);

          const meta = document.createElement('div');
          meta.className = 'library-item-meta';

          if (entry.article && (entry.article.releaseYear || entry.article.releaseWindow)) {
            const releaseInfo = document.createElement('span');
            releaseInfo.className = 'library-item-meta-entry';
            const year = entry.article.releaseYear ? String(entry.article.releaseYear) : '';
            const windowText = entry.article.releaseWindow || '';
            releaseInfo.textContent = 'Release ' + [windowText, year].filter(Boolean).join(' ');
            meta.appendChild(releaseInfo);
          }

          if (entry.item && entry.item.addedAt) {
            const addedAt = document.createElement('span');
            addedAt.className = 'library-item-meta-entry';
            const date = new Date(entry.item.addedAt);
            addedAt.textContent = 'Following since ' + date.toLocaleDateString();
            meta.appendChild(addedAt);
          }

          const actions = document.createElement('div');
          actions.className = 'library-item-actions';

          const unfollowBtn = document.createElement('button');
          unfollowBtn.type = 'button';
          unfollowBtn.className = 'btn btn-ghost library-item-action';
          unfollowBtn.dataset.action = 'unfollow-release';
          unfollowBtn.dataset.articleId = entry.article && entry.article.id ? entry.article.id : '';
          unfollowBtn.textContent = 'Unfollow';

          actions.appendChild(unfollowBtn);

          const summary = document.createElement('p');
          summary.className = 'library-item-summary';
          if (entry.item && entry.item.notes) {
            summary.textContent = entry.item.notes;
          } else if (entry.article && entry.article.summary) {
            summary.textContent = entry.article.summary;
          }

          articleCard.appendChild(header);
          articleCard.appendChild(meta);
          if (summary.textContent) {
            articleCard.appendChild(summary);
          }
          articleCard.appendChild(actions);

          listItem.appendChild(articleCard);
          list.appendChild(listItem);
        });

        container.appendChild(list);
      }

      function renderCollectionsOverviewPanel(container, collectionsSummary, activeSection, activeCollectionId) {
        container.innerHTML = '';

        const wrapper = document.createElement('div');
        wrapper.className = 'collections-overview-card';

        const heading = document.createElement('h2');
        heading.className = 'collections-overview-title';
        heading.textContent = 'Collections Overview';

        wrapper.appendChild(heading);

        if (!collectionsSummary || collectionsSummary.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'collections-overview-empty';
          empty.textContent = 'No collections yet. Create collections from article pages to organize your reading.';
          wrapper.appendChild(empty);
          container.appendChild(wrapper);
          return;
        }

        const totalItems = collectionsSummary.reduce(function(sum, entry) {
          return sum + (entry.articleCount || 0);
        }, 0);

        const stats = document.createElement('div');
        stats.className = 'collections-overview-stats';

        const statCollections = document.createElement('span');
        statCollections.className = 'collections-overview-stat';
        statCollections.textContent = String(collectionsSummary.length) + ' collections';

        const statItems = document.createElement('span');
        statItems.className = 'collections-overview-stat';
        statItems.textContent = String(totalItems) + ' items';

        stats.appendChild(statCollections);
        stats.appendChild(statItems);

        wrapper.appendChild(stats);

        const list = document.createElement('ul');
        list.className = 'collections-overview-list';

        collectionsSummary.forEach(function(entry) {
          const li = document.createElement('li');
          li.className = 'collections-overview-item';

          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'collections-overview-button';
          button.dataset.action = 'jump-to-collection';
          button.dataset.collectionId = entry.collection && entry.collection.id ? entry.collection.id : '';

          if (activeSection === 'collections' && activeCollectionId && entry.collection && entry.collection.id === activeCollectionId) {
            button.classList.add('is-active');
          }

          const nameSpan = document.createElement('span');
          nameSpan.className = 'collections-overview-name';
          nameSpan.textContent = entry.collection && entry.collection.name ? entry.collection.name : 'Untitled collection';

          const countSpan = document.createElement('span');
          countSpan.className = 'collections-overview-count';
          countSpan.textContent = String(entry.articleCount || 0);

          button.appendChild(nameSpan);
          button.appendChild(countSpan);
          li.appendChild(button);
          list.appendChild(li);
        });

        wrapper.appendChild(list);
        container.appendChild(wrapper);
      }

      function renderCollectionsSection(container, collections, activeSection, activeCollectionId) {
        if (activeSection !== 'collections') {
          container.innerHTML = '';
          container.setAttribute('hidden', 'hidden');
          container.classList.remove('is-active');
          return;
        }

        container.removeAttribute('hidden');
        container.classList.add('is-active');
        container.innerHTML = '';

        const headingRow = document.createElement('div');
        headingRow.className = 'library-section-heading-row';

        const heading = document.createElement('h2');
        heading.className = 'library-section-title';
        heading.textContent = 'Collections';

        headingRow.appendChild(heading);
        container.appendChild(headingRow);

        if (!collections || collections.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'library-section-empty';
          empty.textContent = 'You have no collections yet. Add articles to collections from their detail pages.';
          container.appendChild(empty);
          return;
        }

        const listWrapper = document.createElement('div');
        listWrapper.className = 'collections-list-wrapper';

        collections.forEach(function(entry) {
          const collection = entry.collection;
          const items = entry.items || [];

          const section = document.createElement('section');
          section.className = 'collection-card';
          if (collection && collection.id) {
            section.id = 'collection-' + collection.id;
            section.dataset.collectionId = collection.id;
          }

          if (activeCollectionId && collection && collection.id === activeCollectionId) {
            section.classList.add('is-targeted');
          }

          const header = document.createElement('header');
          header.className = 'collection-card-header';

          const title = document.createElement('h3');
          title.className = 'collection-card-title';
          title.textContent = collection && collection.name ? collection.name : 'Untitled collection';

          const meta = document.createElement('div');
          meta.className = 'collection-card-meta';

          if (collection && collection.createdAt) {
            const created = document.createElement('span');
            created.className = 'collection-card-meta-entry';
            const date = new Date(collection.createdAt);
            created.textContent = 'Created ' + date.toLocaleDateString();
            meta.appendChild(created);
          }

          const count = document.createElement('span');
          count.className = 'collection-card-meta-entry';
          count.textContent = String(items.length) + (items.length === 1 ? ' item' : ' items');
          meta.appendChild(count);

          header.appendChild(title);
          header.appendChild(meta);
          section.appendChild(header);

          if (collection && collection.description) {
            const desc = document.createElement('p');
            desc.className = 'collection-card-description';
            desc.textContent = collection.description;
            section.appendChild(desc);
          }

          if (!items || items.length === 0) {
            const empty = document.createElement('p');
            empty.className = 'collection-card-empty';
            empty.textContent = 'No articles in this collection yet.';
            section.appendChild(empty);
          } else {
            const ul = document.createElement('ul');
            ul.className = 'collection-items-list';

            items.forEach(function(itemEntry) {
              const li = document.createElement('li');
              li.className = 'collection-items-entry';

              const itemCard = document.createElement('article');
              itemCard.className = 'collection-item-card';
              itemCard.dataset.action = 'open-article';
              itemCard.dataset.articleId = itemEntry.article && itemEntry.article.id ? itemEntry.article.id : '';
              itemCard.tabIndex = 0;
              itemCard.setAttribute('role', 'button');

              const itemHeader = document.createElement('header');
              itemHeader.className = 'collection-item-header';

              const itemTitle = document.createElement('h4');
              itemTitle.className = 'collection-item-title';
              itemTitle.textContent = itemEntry.article && itemEntry.article.title ? itemEntry.article.title : 'Untitled article';

              const typeChip = document.createElement('span');
              typeChip.className = 'collection-item-type-chip';
              if (itemEntry.article && itemEntry.article.type) {
                typeChip.textContent = formatArticleType(itemEntry.article.type);
              }

              itemHeader.appendChild(itemTitle);
              itemHeader.appendChild(typeChip);

              const itemMeta = document.createElement('div');
              itemMeta.className = 'collection-item-meta';

              if (itemEntry.collectionItem && itemEntry.collectionItem.addedAt) {
                const added = document.createElement('span');
                added.className = 'collection-item-meta-entry';
                const date = new Date(itemEntry.collectionItem.addedAt);
                added.textContent = 'Added ' + date.toLocaleDateString();
                itemMeta.appendChild(added);
              }

              const actions = document.createElement('div');
              actions.className = 'collection-item-actions';

              const removeBtn = document.createElement('button');
              removeBtn.type = 'button';
              removeBtn.className = 'btn btn-ghost collection-item-action';
              removeBtn.dataset.action = 'remove-from-collection';
              removeBtn.dataset.collectionId = collection && collection.id ? collection.id : '';
              removeBtn.dataset.articleId = itemEntry.article && itemEntry.article.id ? itemEntry.article.id : '';
              removeBtn.textContent = 'Remove';

              actions.appendChild(removeBtn);

              itemCard.appendChild(itemHeader);
              itemCard.appendChild(itemMeta);
              itemCard.appendChild(actions);

              li.appendChild(itemCard);
              ul.appendChild(li);
            });

            section.appendChild(ul);
          }

          listWrapper.appendChild(section);
        });

        container.appendChild(listWrapper);

        if (!libraryState.initialCollectionScrollDone && activeCollectionId) {
          scrollToCollection(activeCollectionId);
          libraryState.initialCollectionScrollDone = true;
        }
      }

      function toggleSideColumnVisibility() {
        const sideColumn = document.querySelector('[data-component="collections-overview-panel"]');
        if (!sideColumn) {
          return;
        }
        if (libraryState.activeSection === 'collections') {
          sideColumn.classList.add('is-secondary');
        } else {
          sideColumn.classList.remove('is-secondary');
        }
      }

      function handleSwitchSection(target) {
        const sectionKey = target.dataset.section;
        if (!sectionKey || VALID_SECTIONS.indexOf(sectionKey) === -1) {
          return;
        }
        if (sectionKey === libraryState.activeSection) {
          return;
        }
        libraryState.activeSection = sectionKey;
        if (sectionKey !== 'collections') {
          libraryState.activeCollectionId = null;
        }
        normalizeUrl(true);
        renderFromState();

        const tabs = document.querySelector('.library-tabs');
        if (tabs) {
          const offsetTop = tabs.getBoundingClientRect().top + window.scrollY;
          window.scrollTo({ top: offsetTop, behavior: 'smooth' });
        }
      }

      function handleOpenArticle(target, event) {
        const articleId = target.dataset.articleId;
        if (!articleId) {
          return;
        }
        const url = 'article.html?id=' + encodeURIComponent(articleId) + '&source=library';
        window.location.href = url;
      }

      function handleRemoveFromReadingList(target) {
        const articleId = target.dataset.articleId;
        if (!articleId) {
          return;
        }
        try {
          const result = WebsiteSDK.removeFromReadingList(articleId);
          if (result && result.success) {
            showToast(result.message || 'Removed from reading list.', 'success');
            refreshLibraryData();
          } else {
            showToast((result && result.message) || 'Could not remove from reading list.', 'error');
          }
        } catch (err) {
          console.error('removeFromReadingList error', err);
          showToast('An error occurred while removing from your reading list.', 'error');
        }
      }

      function handleRemoveFromWishlist(target) {
        const articleId = target.dataset.articleId;
        if (!articleId) {
          return;
        }
        try {
          const result = WebsiteSDK.removeFromWishlist(articleId);
          if (result && result.success) {
            showToast(result.message || 'Removed from wishlist.', 'success');
            refreshLibraryData();
          } else {
            showToast((result && result.message) || 'Could not remove from wishlist.', 'error');
          }
        } catch (err) {
          console.error('removeFromWishlist error', err);
          showToast('An error occurred while removing from your wishlist.', 'error');
        }
      }

      function handleRemoveBookmark(target) {
        const articleId = target.dataset.articleId;
        if (!articleId) {
          return;
        }
        try {
          const result = WebsiteSDK.removeBookmark(articleId);
          if (result && result.success) {
            showToast(result.message || 'Bookmark removed.', 'success');
            refreshLibraryData();
          } else {
            showToast((result && result.message) || 'Could not remove bookmark.', 'error');
          }
        } catch (err) {
          console.error('removeBookmark error', err);
          showToast('An error occurred while removing your bookmark.', 'error');
        }
      }

      function handleUnfollowRelease(target) {
        const articleId = target.dataset.articleId;
        if (!articleId) {
          return;
        }
        try {
          const result = WebsiteSDK.unfollowRelease(articleId);
          if (result && result.success) {
            showToast(result.message || 'Stopped following release.', 'success');
            refreshLibraryData();
          } else {
            showToast((result && result.message) || 'Could not unfollow release.', 'error');
          }
        } catch (err) {
          console.error('unfollowRelease error', err);
          showToast('An error occurred while updating followed releases.', 'error');
        }
      }

      function handleRemoveFromCollection(target) {
        const collectionId = target.dataset.collectionId;
        const articleId = target.dataset.articleId;
        if (!collectionId || !articleId) {
          return;
        }
        try {
          const result = WebsiteSDK.removeArticleFromCollection(collectionId, articleId);
          if (result && result.success) {
            showToast(result.message || 'Removed from collection.', 'success');
            libraryState.activeSection = 'collections';
            libraryState.activeCollectionId = collectionId;
            normalizeUrl(true);
            refreshLibraryData();
          } else {
            showToast((result && result.message) || 'Could not remove from collection.', 'error');
          }
        } catch (err) {
          console.error('removeArticleFromCollection error', err);
          showToast('An error occurred while removing the article from the collection.', 'error');
        }
      }

      function handleJumpToCollection(target) {
        const collectionId = target.dataset.collectionId;
        if (!collectionId) {
          return;
        }
        libraryState.activeSection = 'collections';
        libraryState.activeCollectionId = collectionId;
        normalizeUrl(true);
        renderFromState();
        scrollToCollection(collectionId);
      }

      function refreshLibraryData() {
        try {
          const overview = WebsiteSDK.getMyLibraryOverview();
          const collectionsSummary = WebsiteSDK.getUserCollections();
          libraryState.overview = overview || {};
          libraryState.collectionsSummary = Array.isArray(collectionsSummary) ? collectionsSummary : [];
          renderFromState();
        } catch (err) {
          console.error('Error refreshing library data:', err);
          showToast('Failed to refresh your library. Please reload the page.', 'error');
        }
      }

      function scrollToCollection(collectionId) {
        if (!collectionId) {
          return;
        }
        const element = document.getElementById('collection-' + collectionId);
        if (!element) {
          return;
        }
        element.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function showToast(message, type) {
        const container = document.querySelector('[data-component="library-mutation-feedback"]');
        if (!container) {
          return;
        }

        const toast = document.createElement('div');
        toast.className = 'library-toast';
        if (type === 'success') {
          toast.classList.add('library-toast-success');
        } else if (type === 'error') {
          toast.classList.add('library-toast-error');
        }

        const text = document.createElement('span');
        text.className = 'library-toast-text';
        text.textContent = message;

        toast.appendChild(text);
        container.appendChild(toast);

        setTimeout(function() {
          toast.classList.add('is-exiting');
          setTimeout(function() {
            if (toast.parentNode === container) {
              container.removeChild(toast);
            }
          }, 250);
        }, 3000);
      }

      function formatArticleType(type) {
        if (!type) {
          return '';
        }
        switch (type) {
          case 'review':
            return 'Review';
          case 'guide':
            return 'Guide';
          case 'news':
            return 'News';
          case 'feature':
            return 'Feature';
          case 'top_list':
            return 'Top List';
          default:
            return type;
        }
      }

      function formatPlatform(platform) {
        if (!platform) {
          return '';
        }
        switch (platform) {
          case 'nintendo_switch':
            return 'Nintendo Switch';
          case 'ps5':
            return 'PS5';
          case 'ps4':
            return 'PS4';
          case 'pc':
            return 'PC';
          case 'xbox_series_x':
            return 'Xbox Series X';
          case 'xbox_one':
            return 'Xbox One';
          default:
            return platform;
        }
      }

      function formatGuideType(guideType) {
        if (!guideType) {
          return '';
        }
        switch (guideType) {
          case 'beginner_guide':
            return 'Beginner Guide';
          case 'trophy_guide':
            return 'Trophy Guide';
          case 'achievement_guide':
            return 'Achievement Guide';
          case 'walkthrough':
            return 'Walkthrough';
          case 'other':
            return 'Guide';
          default:
            return guideType;
        }
      }
    })();
  </script>
</body>
</html>
