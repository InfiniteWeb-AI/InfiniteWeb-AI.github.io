          var homepageData = WebsiteSDK.getHomepageContent();
          renderHomepage(root, homepageData);
        } catch (error) {
          root.innerHTML = '<section class=\'container content-section\'><p class=\'error-message\'>Unable to load homepage content right now. Please try again in a moment.</p></section>';
          if (typeof console !== 'undefined' && console.error) {
            console.error('Error loading homepage content', error);
          }
        }
      });

      setupActionHandlers();
      setupSearchForms();
      updateFooterYear();
    });

    function renderHomepage(container, data) {
      data = data || {};
      var featuredReviews = Array.isArray(data.featuredReviews) ? data.featuredReviews : [];
      var latestReviews = Array.isArray(data.latestReviews) ? data.latestReviews : [];
      var latestGuides = Array.isArray(data.latestGuides) ? data.latestGuides : [];
      var latestNews = Array.isArray(data.latestNews) ? data.latestNews : [];
      var latestFeatures = Array.isArray(data.latestFeatures) ? data.latestFeatures : [];
      var latestTopLists = Array.isArray(data.latestTopLists) ? data.latestTopLists : [];
      var gameFinderPromo = data.gameFinderPromo || {};
      var newsletterPromo = data.newsletterPromo || {};

      function escapeHtml(text) {
        if (!text && text !== 0) return '';
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function buildArticleCard(article) {
        if (!article || !article.id) return '';
        var title = escapeHtml(article.title || 'Untitled');
        var summary = article.summary ? escapeHtml(article.summary) : '';
        var typeLabel = article.type ? escapeHtml(article.type) : '';
        var platform = article.primaryPlatform ? escapeHtml(article.primaryPlatform) : '';
        var rating = typeof article.ratingStars === 'number' ? article.ratingStars : null;
        var metaParts = [];
        if (typeLabel) metaParts.push(typeLabel);
        if (platform) metaParts.push(platform);
        if (rating !== null) metaParts.push(rating.toFixed(1) + '★');
        var meta = metaParts.join(' · ');

        return (
          '<article class=\'post-card\' data-component=\'article-card\' data-article-id=\'' + escapeHtml(article.id) + '\'>' +
            '<a href=\'javascript:void(0)\' class=\'post-card-link\' data-action=\'open-article\' data-article-id=\'' + escapeHtml(article.id) + '\'>' +
              '<figure class=\'post-card-media\' aria-hidden=\'true\'></figure>' +
              '<div class=\'post-card-body\'>' +
                '<h3 class=\'post-card-title\'>' + title + '</h3>' +
                (meta ? '<p class=\'post-card-meta\'>' + meta + '</p>' : '') +
                (summary ? '<p class=\'post-card-summary\'>' + summary + '</p>' : '') +
              '</div>' +
            '</a>' +
          '</article>'
        );
      }

      function buildArticleSection(sectionId, heading, items, viewAllAction) {
        if (!items || !items.length) return '';
        var sectionAttr = escapeHtml(sectionId);
        var html = '';
        html += '<section class=\'content-section\' data-component=\'' + sectionAttr + '\'>';
        html += '<div class=\'container section-inner\'>';
        html += '<div class=\'section-header-row\'>';
        html += '<h2 class=\'section-title\'>' + escapeHtml(heading) + '</h2>';
        if (viewAllAction) {
          html += '<a href=\'javascript:void(0)\' class=\'section-view-all\' data-action=\'' + escapeHtml(viewAllAction) + '\'>View all</a>';
        }
        html += '</div>';
        html += '<div class=\'article-grid\'>';
        for (var i = 0; i < items.length; i++) {
          html += buildArticleCard(items[i]);
        }
        html += '</div>';
        html += '</div>';
        html += '</section>';
        return html;
      }

      var heroSlidesHtml = '';
      if (featuredReviews.length) {
        for (var i = 0; i < featuredReviews.length; i++) {
          var article = featuredReviews[i];
          if (!article || !article.id) continue;
          var isActive = i === 0 ? ' is-active' : '';
          var title = escapeHtml(article.title || 'Untitled');
          var summary = article.summary ? escapeHtml(article.summary) : '';
          var typeLabel = article.type ? escapeHtml(article.type) : '';
          heroSlidesHtml += (
            '<article class=\'hero-slide' + isActive + '\' data-component=\'article-card\' data-article-id=\'' + escapeHtml(article.id) + '\'>' +
              '<a href=\'javascript:void(0)\' class=\'hero-slide-link\' data-action=\'open-article\' data-article-id=\'' + escapeHtml(article.id) + '\'>' +
                '<div class=\'hero-slide-media\' aria-hidden=\'true\'></div>' +
                '<div class=\'hero-slide-content\'>' +
                  (typeLabel ? '<p class=\'post-type-label\'>' + typeLabel + '</p>' : '') +
                  '<h2 class=\'hero-slide-title\'>' + title + '</h2>' +
                  (summary ? '<p class=\'hero-slide-summary\'>' + summary + '</p>' : '') +
                '</div>' +
              '</a>' +
            '</article>'
          );
        }
      } else {
        heroSlidesHtml = '<div class=\'hero-empty\'><p>No featured reviews available yet. Check the latest reviews below.</p></div>';
      }

      var heroIndicatorsHtml = '';
      if (featuredReviews.length > 1) {
        for (var j = 0; j < featuredReviews.length; j++) {
          var cls = j === 0 ? 'hero-indicator is-active' : 'hero-indicator';
          heroIndicatorsHtml += '<button type=\'button\' class=\'' + cls + '\' data-action=\'hero-go-to\' data-slide-index=\'' + j + '\' aria-label=\'Show featured item ' + (j + 1) + '\'></button>';
        }
      }

      var gameFinderTitle = gameFinderPromo.title ? escapeHtml(gameFinderPromo.title) : 'Find your next JRPG';
      var gameFinderSubtitle = gameFinderPromo.subtitle ? escapeHtml(gameFinderPromo.subtitle) : 'Game Finder';
      var gameFinderDescription = gameFinderPromo.description ? escapeHtml(gameFinderPromo.description) : 'Use filters for platform, length, and vibe to discover a new JRPG to dive into.';

      var newsletterTitle = newsletterPromo.title ? escapeHtml(newsletterPromo.title) : 'Stay on top of every JRPG release';
      var newsletterDescription = newsletterPromo.description ? escapeHtml(newsletterPromo.description) : 'Get a weekly digest of new reviews, guides, and release-date news straight to your inbox.';

      var htmlOut = '';

      htmlOut += '<section class=\'hero-band\' data-component=\'featured-reviews-section\'>';
      htmlOut += '  <div class=\'hero-inner container\'>';
      htmlOut += '    <div class=\'hero-heading-row\'>';
      htmlOut += '      <div class=\'hero-branding\'>';
      htmlOut += '        <p class=\'hero-kicker\'>JRPG hub</p>';
      htmlOut += '        <h1 class=\'hero-title\'>Search reviews, guides, and news</h1>';
      htmlOut += '      </div>';
      htmlOut += '      <form class=\'global-search-form hero-search-form\' data-component=\'global-search-form\' data-action=\'search-global\' role=\'search\'>';
      htmlOut += '        <label class=\'visually-hidden\' for=\'heroSearchInput\'>Search JRPG articles</label>';
      htmlOut += '        <div class=\'search-field\'>';
      htmlOut += '          <input id=\'heroSearchInput\' name=\'query\' type=\'search\' placeholder=\'Search JRPG reviews, guides, news\' autocomplete=\'off\'>';
      htmlOut += '          <button type=\'submit\' class=\'btn btn-search\'>Search</button>';
      htmlOut += '        </div>';
      htmlOut += '      </form>';
      htmlOut += '    </div>';
      htmlOut += '    <div class=\'hero-carousel-wrapper\'>';
      var hasMultipleFeatured = featuredReviews.length > 1;
      var prevDisabledAttr = hasMultipleFeatured ? '' : ' disabled';
      var nextDisabledAttr = hasMultipleFeatured ? '' : ' disabled';
      htmlOut += '      <button type=\'button\' class=\'hero-nav hero-nav-prev\' data-action=\'hero-prev\' aria-label=\'Previous featured review\'' + prevDisabledAttr + '><span class=\'hero-nav-icon\'>&lsaquo;</span></button>';
      htmlOut += '      <div class=\'hero-carousel\' data-current-index=\'0\'>' + heroSlidesHtml + '</div>';
      htmlOut += '      <button type=\'button\' class=\'hero-nav hero-nav-next\' data-action=\'hero-next\' aria-label=\'Next featured review\'' + nextDisabledAttr + '><span class=\'hero-nav-icon\'>&rsaquo;</span></button>';
      htmlOut += '    </div>';
      if (heroIndicatorsHtml) {
        htmlOut += '    <div class=\'hero-indicators\' aria-hidden=\'true\'>' + heroIndicatorsHtml + '</div>';
      }
      htmlOut += '  </div>';
      htmlOut += '</section>';

      if (latestReviews.length) {
        htmlOut += buildArticleSection('latest-reviews-section', 'Latest Reviews', latestReviews, null);
      }

      htmlOut += '<section class=\'promo-section game-finder-promo\' data-component=\'game-finder-promo-block\'>';
      htmlOut += '  <div class=\'container promo-inner\'>';
      htmlOut += '    <div class=\'promo-copy\'>';
      htmlOut += '      <p class=\'promo-kicker\'>' + gameFinderSubtitle + '</p>';
      htmlOut += '      <h2 class=\'promo-title\'>' + gameFinderTitle + '</h2>';
      htmlOut += '      <p class=\'promo-description\'>' + gameFinderDescription + '</p>';
      htmlOut += '      <a href=\'javascript:void(0)\' class=\'btn btn-primary\' data-action=\'open-game-finder\'>Open Game Finder</a>';
      htmlOut += '    </div>';
      htmlOut += '    <div class=\'promo-visual\' aria-hidden=\'true\'>';
      htmlOut += '      <div class=\'promo-console-frame\'></div>';
      htmlOut += '    </div>';
      htmlOut += '  </div>';
      htmlOut += '</section>';

      if (latestGuides.length) {
        htmlOut += buildArticleSection('latest-guides-section', 'Latest Guides', latestGuides, 'view-all-guides');
      }

      if (latestNews.length) {
        htmlOut += buildArticleSection('latest-news-section', 'Latest News', latestNews, 'view-all-news');
      }

      if (latestFeatures.length) {
        htmlOut += buildArticleSection('latest-features-section', 'Latest Features', latestFeatures, 'view-all-features');
      }

      if (latestTopLists.length) {
        htmlOut += buildArticleSection('latest-top-lists-section', 'Latest Top Lists', latestTopLists, 'view-all-top-lists');
      }

      htmlOut += '<section class=\'promo-section newsletter-promo\' data-component=\'newsletter-promo-block\'>';
      htmlOut += '  <div class=\'container promo-inner newsletter-inner\'>';
      htmlOut += '    <div class=\'newsletter-copy\'>';
      htmlOut += '      <h2 class=\'promo-title\'>' + newsletterTitle + '</h2>';
      htmlOut += '      <p class=\'promo-description\'>' + newsletterDescription + '</p>';
      htmlOut += '    </div>';
      htmlOut += '    <div class=\'newsletter-cta\'>';
      htmlOut += '      <a href=\'javascript:void(0)\' class=\'btn btn-secondary\' data-action=\'open-newsletter\'>Sign up</a>';
      htmlOut += '    </div>';
      htmlOut += '  </div>';
      htmlOut += '</section>';

      container.innerHTML = htmlOut;
    }

    function setupSearchForms() {
      var searchForms = document.querySelectorAll('[data-action="search-global"]');
      searchForms.forEach(function(form) {
        if (form._searchHandlerBound) return;
        form._searchHandlerBound = true;
        form.addEventListener('submit', function(event) {
          event.preventDefault();
          var input = form.querySelector('input[name="query"]');
          if (!input) return;
          var rawQuery = input.value || '';
          var query = rawQuery.trim();
          if (!query) {
            input.focus();
            return;
          }
          var url = 'search_results.html?query=' + encodeURIComponent(query) + '&page=1';
          window.location.href = url;
        });
      });
    }

    function setupActionHandlers() {
      var actionElements = document.querySelectorAll('[data-action]');
      actionElements.forEach(function(el) {
        var action = el.dataset.action;
        if (!action) return;

        if (action === 'open-article') {
          if (el._openArticleBound) return;
          el._openArticleBound = true;
          el.addEventListener('click', handleOpenArticleClick);
        } else if (action === 'view-all-guides') {
          if (el._viewAllGuidesBound) return;
          el._viewAllGuidesBound = true;
          el.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'guides.html';
          });
        } else if (action === 'view-all-news') {
          if (el._viewAllNewsBound) return;
          el._viewAllNewsBound = true;
          el.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'news.html';
          });
        } else if (action === 'view-all-features') {
          if (el._viewAllFeaturesBound) return;
          el._viewAllFeaturesBound = true;
          el.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'features.html';
          });
        } else if (action === 'view-all-top-lists') {
          if (el._viewAllTopListsBound) return;
          el._viewAllTopListsBound = true;
          el.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'top_lists.html';
          });
        } else if (action === 'open-game-finder') {
          if (el._openGameFinderBound) return;
          el._openGameFinderBound = true;
          el.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'game_finder.html';
          });
        } else if (action === 'open-newsletter') {
          if (el._openNewsletterBound) return;
          el._openNewsletterBound = true;
          el.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'newsletter.html';
          });
        } else if (action === 'hero-prev') {
          if (el._heroPrevBound) return;
          el._heroPrevBound = true;
          el.addEventListener('click', function(event) {
            event.preventDefault();
            moveHeroSlide(event.currentTarget, -1);
          });
        } else if (action === 'hero-next') {
          if (el._heroNextBound) return;
          el._heroNextBound = true;
          el.addEventListener('click', function(event) {
            event.preventDefault();
            moveHeroSlide(event.currentTarget, 1);
          });
        } else if (action === 'hero-go-to') {
          if (el._heroGoToBound) return;
          el._heroGoToBound = true;
          el.addEventListener('click', function(event) {
            event.preventDefault();
            var indexStr = event.currentTarget.dataset.slideIndex;
            if (typeof indexStr === 'undefined') return;
            var index = parseInt(indexStr, 10);
            if (isNaN(index)) return;
            goToHeroSlide(event.currentTarget, index);
          });
        }
      });
    }

    function handleOpenArticleClick(event) {
      event.preventDefault();
      var target = event.currentTarget;
      var articleId = target.dataset.articleId;
      if (!articleId) return;
      var url = 'article.html?id=' + encodeURIComponent(articleId) + '&source=home';
      window.location.href = url;
    }

    function findClosestHeroCarouselElement(elem) {
      var current = elem;
      while (current && current !== document.body) {
        if (current.classList && current.classList.contains('hero-band')) {
          var carousel = current.querySelector('.hero-carousel');
          var indicators = current.querySelectorAll('.hero-indicator');
          return { carousel: carousel, indicators: indicators };
        }
        current = current.parentNode;
      }
      return { carousel: null, indicators: null };
    }

    function moveHeroSlide(controlElement, direction) {
      var refs = findClosestHeroCarouselElement(controlElement);
      var carousel = refs.carousel;
      if (!carousel) return;
      var slides = carousel.querySelectorAll('.hero-slide');
      if (!slides.length) return;
      var currentIndex = parseInt(carousel.dataset.currentIndex || '0', 10);
      if (isNaN(currentIndex)) currentIndex = 0;
      var count = slides.length;
      var newIndex = currentIndex + (direction > 0 ? 1 : -1);
      if (newIndex < 0) newIndex = count - 1;
      if (newIndex >= count) newIndex = 0;
      updateHeroSlides(carousel, refs.indicators, newIndex);
    }

    function goToHeroSlide(controlElement, index) {
      var refs = findClosestHeroCarouselElement(controlElement);
      var carousel = refs.carousel;
      if (!carousel) return;
      var slides = carousel.querySelectorAll('.hero-slide');
      if (!slides.length) return;
      var count = slides.length;
      if (index < 0 || index >= count) return;
      updateHeroSlides(carousel, refs.indicators, index);
    }

    function updateHeroSlides(carousel, indicators, newIndex) {
      var slides = carousel.querySelectorAll('.hero-slide');
      for (var i = 0; i < slides.length; i++) {
        if (i === newIndex) {
          slides[i].classList.add('is-active');
        } else {
          slides[i].classList.remove('is-active');
        }
      }
      carousel.dataset.currentIndex = String(newIndex);
      if (indicators && indicators.length) {
        for (var j = 0; j < indicators.length; j++) {
          if (j === newIndex) {
            indicators[j].classList.add('is-active');
          } else {
            indicators[j].classList.remove('is-active');
          }
        }
      }
    }

    function updateFooterYear() {
      var yearSpan = document.querySelector('.footer-year');
      if (!yearSpan) return;
      var now = new Date();
      var year = now.getFullYear();
      yearSpan.textContent = String(year);
    }
  </script>
</body>
</html>
