<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Feature Flag Platform - Terms of Use</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="framework.css" />
  <link rel="stylesheet" href="terms.css" />
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="brand" aria-label="Feature flag dashboard home">
          <div class="brand-mark">U</div>
          <div class="brand-text">
            <span class="brand-name">unleash</span>
            <span class="brand-tagline">Feature flags platform</span>
          </div>
        </a>
        <nav class="primary-nav" aria-label="Main navigation">
          <ul>
            <li>
              <a href="index.html" class="nav-link" title="Overview of projects, flags, and upcoming changes">Dashboard</a>
            </li>
            <li>
              <a href="projects.html" class="nav-link" title="View and select projects">Projects</a>
            </li>
            <li>
              <a href="audit_log.html" class="nav-link" title="View the audit trail of changes">Audit Log</a>
            </li>
            <li>
              <a href="access_control.html" class="nav-link" title="Manage members, roles, and access control">Settings</a>
            </li>
            <li>
              <a href="help.html" class="nav-link" title="Help and documentation">Help</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="content" class="site-main" role="main">
      <div class="static-page static-page--terms">
        <div data-component="terms-static-content-loader" aria-hidden="true" hidden></div>

        <div class="static-page-card card terms-card">
          <header class="terms-header" data-component="terms-header">
            <h1 class="terms-title" data-populate="terms-title">Terms of Use</h1>
            <p class="terms-meta">
              <span class="terms-updated-label">Last updated</span>
              <time class="terms-updated-value" data-populate="terms-last-updated" datetime=""></time>
              <span class="terms-active-section" data-populate="terms-active-section-label" aria-live="polite"></span>
            </p>
            <button type="button" class="link-button terms-back-to-top" data-action="back-to-top">Back to top</button>
          </header>

          <div data-component="terms-url-state-sync" aria-hidden="true" hidden></div>

          <nav class="terms-toc" data-component="terms-toc-navigation" aria-label="On this page">
            <div class="terms-toc-label">On this page</div>
            <ul class="terms-toc-list" data-populate="terms-toc"></ul>
          </nav>

          <article class="terms-body" data-component="terms-body-viewer">
            <div class="terms-body-loading" data-populate="terms-loading-state">Loading Terms of Use</div>
            <div class="terms-body-content" data-populate="terms-body"></div>
          </article>

          <footer class="terms-footer-links">
            <p class="terms-footer-text">
              <a href="javascript:void(0)" class="terms-footer-link" data-component="terms-privacy-navigation-link" data-action="go-privacy">Privacy</a>
              <span class="terms-footer-separator">b7</span>
              <a href="javascript:void(0)" class="terms-footer-link" data-component="terms-support-navigation-link" data-action="go-support">Contact support about terms</a>
            </p>
          </footer>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-branding">a9 2026 Feature flag management platform</p>
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="about.html" class="footer-link" title="About this feature flag platform">About</a>
          <a href="privacy.html" class="footer-link" title="Privacy policy">Privacy</a>
          <a href="terms.html" class="footer-link" title="Terms of use">Terms</a>
          <a href="help.html" class="footer-link" title="Support options and additional help resources">Contact support</a>
        </nav>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var currentUrl = new URL(window.location.href);
      var searchParams = currentUrl.searchParams;

      var urlState = {
        section: searchParams.get('section') || null,
        mode: searchParams.get('mode') || null,
        source: searchParams.get('source') || null
      };

      var titleEl = document.querySelector('[data-populate="terms-title"]');
      var lastUpdatedEl = document.querySelector('[data-populate="terms-last-updated"]');
      var activeSectionLabelEl = document.querySelector('[data-populate="terms-active-section-label"]');
      var bodyContainer = document.querySelector('[data-populate="terms-body"]');
      var loadingStateEl = document.querySelector('[data-populate="terms-loading-state"]');
      var tocListEl = document.querySelector('[data-populate="terms-toc"]');
      var tocNavEl = document.querySelector('[data-component="terms-toc-navigation"]');
      var cardEl = document.querySelector('.terms-card');

      if (urlState.mode === 'compact' && cardEl) {
        cardEl.classList.add('is-compact');
        if (tocNavEl) {
          tocNavEl.setAttribute('hidden', 'hidden');
          tocNavEl.setAttribute('aria-hidden', 'true');
        }
      }

      var headingsMeta = [];
      var headingIdToMeta = {};

      function showErrorMessage(message) {
        var text = message || 'Unable to load Terms of Use. Please try again later.';
        if (loadingStateEl) {
          loadingStateEl.textContent = text;
        } else if (bodyContainer) {
          bodyContainer.textContent = text;
        }
      }

      function slugify(text) {
        if (!text) {
          return '';
        }
        var slug = text.toString().toLowerCase();
        slug = slug.trim();
        slug = slug.replace(/[^a-z0-9\s-_]/g, '');
        slug = slug.replace(/[\s-_]+/g, '-');
        if (!slug) {
          slug = 'section';
        }
        return slug;
      }

      function escapeIdForSelector(id) {
        if (window.CSS && typeof window.CSS.escape === 'function') {
          return window.CSS.escape(id);
        }
        return id.replace(/[^a-zA-Z0-9\-_:.]/g, '_');
      }

      function formatLastUpdated(isoString) {
        if (!isoString) {
          return '';
        }
        var date = new Date(isoString);
        if (isNaN(date.getTime())) {
          return isoString;
        }
        var options = { year: 'numeric', month: 'long', day: 'numeric' };
        return date.toLocaleDateString(undefined, options);
      }

      function renderMarkdownIntoContainer(container, markdownText, activeSectionId) {
        var localHeadings = [];
        headingIdToMeta = {};
        if (!container) {
          return localHeadings;
        }
        container.innerHTML = '';
        if (!markdownText) {
          return localHeadings;
        }

        var lines = markdownText.split('\n');
        var paragraphLines = [];
        var listElement = null;

        function flushParagraph() {
          if (paragraphLines.length === 0) {
            return;
          }
          var p = document.createElement('p');
          p.textContent = paragraphLines.join(' ').trim();
          container.appendChild(p);
          paragraphLines = [];
        }

        function flushList() {
          if (!listElement) {
            return;
          }
          container.appendChild(listElement);
          listElement = null;
        }

        for (var i = 0; i < lines.length; i += 1) {
          var line = lines[i];
          var trimmed = line.trim();

          if (trimmed.length === 0) {
            flushParagraph();
            flushList();
            continue;
          }

          var headingMatch = trimmed.match(/^(#{1,6})\s+(.*)$/);
          if (headingMatch) {
            flushParagraph();
            flushList();
            var hashes = headingMatch[1];
            var level = hashes.length;
            var rawText = headingMatch[2].trim();
            var slugBase = slugify(rawText);
            var uniqueId = slugBase;
            var counter = 1;
            while (headingIdToMeta[uniqueId]) {
              counter += 1;
              uniqueId = slugBase + '-' + counter;
            }

            var headingTag = 'h' + String(Math.min(6, Math.max(1, level)));
            var h = document.createElement(headingTag);
            h.id = uniqueId;
            h.className = 'terms-section-heading';

            var textSpan = document.createElement('span');
            textSpan.textContent = rawText;
            h.appendChild(textSpan);

            var anchor = document.createElement('a');
            anchor.href = 'javascript:void(0)';
            anchor.className = 'terms-heading-anchor';
            anchor.setAttribute('data-action', 'section-link');
            anchor.setAttribute('data-section-id', uniqueId);
            anchor.setAttribute('aria-label', 'Link to section ' + rawText);
            anchor.textContent = '#';
            h.appendChild(anchor);

            if (activeSectionId && activeSectionId === uniqueId) {
              h.classList.add('is-active');
            }

            container.appendChild(h);

            var meta = { id: uniqueId, text: rawText, level: level };
            localHeadings.push(meta);
            headingIdToMeta[uniqueId] = meta;
            continue;
          }

          var listMatch = trimmed.match(/^[-*]\s+(.*)$/);
          if (listMatch) {
            flushParagraph();
            if (!listElement) {
              listElement = document.createElement('ul');
            }
            var li = document.createElement('li');
            li.textContent = listMatch[1].trim();
            listElement.appendChild(li);
            continue;
          }

          paragraphLines.push(trimmed);
        }

        flushParagraph();
        flushList();
        return localHeadings;
      }

      function buildToc(container, headings) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!headings || headings.length === 0) {
          return;
        }
        for (var i = 0; i < headings.length; i += 1) {
          var meta = headings[i];
          var li = document.createElement('li');
          li.className = 'terms-toc-item terms-toc-item-level-' + String(meta.level);

          var link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.className = 'terms-toc-link';
          link.textContent = meta.text;
          link.setAttribute('data-action', 'toc-item');
          link.setAttribute('data-section-id', meta.id);

          li.appendChild(link);
          container.appendChild(li);
        }
      }

      function scrollToSection(sectionId, scrollOptions) {
        if (!sectionId) {
          return;
        }
        var selectorId = escapeIdForSelector(sectionId);
        var target = document.getElementById(sectionId);
        if (!target) {
          target = document.querySelector('#' + selectorId);
        }
        if (!target) {
          return;
        }
        var options = scrollOptions || { behavior: 'smooth', block: 'start' };
        try {
          target.scrollIntoView(options);
        } catch (e) {
          var rect = target.getBoundingClientRect();
          window.scrollTo(0, window.pageYOffset + rect.top);
        }
      }

      function updateActiveSectionIndicator(sectionId) {
        if (!activeSectionLabelEl) {
          return;
        }
        if (!sectionId || !headingIdToMeta[sectionId]) {
          activeSectionLabelEl.textContent = '';
          return;
        }
        var meta = headingIdToMeta[sectionId];
        activeSectionLabelEl.textContent = 'Currently viewing: ' + meta.text;
      }

      function highlightActiveSectionInView(sectionId) {
        var headings = document.querySelectorAll('.terms-section-heading');
        for (var i = 0; i < headings.length; i += 1) {
          var h = headings[i];
          if (h.id && sectionId && h.id === sectionId) {
            h.classList.add('is-active');
          } else {
            h.classList.remove('is-active');
          }
        }
        if (!tocListEl) {
          return;
        }
        var tocLinks = tocListEl.querySelectorAll('.terms-toc-link');
        for (var j = 0; j < tocLinks.length; j += 1) {
          var link = tocLinks[j];
          var linkSectionId = link.getAttribute('data-section-id');
          if (sectionId && linkSectionId === sectionId) {
            link.classList.add('is-active');
          } else {
            link.classList.remove('is-active');
          }
        }
      }

      function updateUrlState(partialState, options) {
        if (!partialState) {
          return;
        }
        if (Object.prototype.hasOwnProperty.call(partialState, 'section')) {
          urlState.section = partialState.section;
        }
        if (Object.prototype.hasOwnProperty.call(partialState, 'mode')) {
          urlState.mode = partialState.mode;
        }
        if (Object.prototype.hasOwnProperty.call(partialState, 'source')) {
          urlState.source = partialState.source;
        }

        var url = new URL(window.location.href);
        var params = url.searchParams;

        params.delete('section');
        params.delete('mode');
        params.delete('source');

        if (urlState.section) {
          params.set('section', urlState.section);
        }
        if (urlState.mode) {
          params.set('mode', urlState.mode);
        }
        if (urlState.source) {
          params.set('source', urlState.source);
        }

        url.search = params.toString();
        var useReplace = options && options.replace === true;
        if (useReplace) {
          window.history.replaceState(null, '', url.toString());
        } else {
          window.history.pushState(null, '', url.toString());
        }
      }

      function setActiveSection(sectionId, options) {
        if (!sectionId) {
          return;
        }
        if (urlState.section === sectionId && (!options || !options.force)) {
          return;
        }
        updateActiveSectionIndicator(sectionId);
        highlightActiveSectionInView(sectionId);
        updateUrlState({ section: sectionId }, options);
      }

      function setupIntersectionObserver() {
        if (!('IntersectionObserver' in window)) {
          return;
        }
        var headings = document.querySelectorAll('.terms-section-heading');
        if (!headings || headings.length === 0) {
          return;
        }
        var observerOptions = {
          root: null,
          rootMargin: '0px 0px -60% 0px',
          threshold: 0
        };
        var observer = new IntersectionObserver(function(entries) {
          var bestEntry = null;
          for (var i = 0; i < entries.length; i += 1) {
            var entry = entries[i];
            if (!entry.isIntersecting) {
              continue;
            }
            if (!bestEntry || entry.intersectionRatio > bestEntry.intersectionRatio) {
              bestEntry = entry;
            }
          }
          if (bestEntry && bestEntry.target && bestEntry.target.id) {
            var newSectionId = bestEntry.target.id;
            if (newSectionId !== urlState.section) {
              setActiveSection(newSectionId, { replace: true });
            }
          }
        }, observerOptions);

        for (var j = 0; j < headings.length; j += 1) {
          observer.observe(headings[j]);
        }
      }

      function handleActionClick(event, actionElement) {
        var action = actionElement.getAttribute('data-action');
        if (!action) {
          return;
        }
        if (action === 'back-to-top') {
          event.preventDefault();
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }
        if (action === 'toc-item' || action === 'section-link') {
          event.preventDefault();
          var sectionId = actionElement.getAttribute('data-section-id');
          if (!sectionId) {
            return;
          }
          scrollToSection(sectionId, { behavior: 'smooth', block: 'start' });
          setActiveSection(sectionId, { replace: false });
          return;
        }
        if (action === 'go-privacy') {
          event.preventDefault();
          var params = new URLSearchParams();
          params.set('fromPage', 'terms');
          if (urlState.section) {
            params.set('fromSection', urlState.section);
          }
          if (urlState.source) {
            params.set('source', urlState.source);
          }
          window.location.href = 'privacy.html?' + params.toString();
          return;
        }
        if (action === 'go-support') {
          event.preventDefault();
          var sParams = new URLSearchParams();
          sParams.set('topic', 'terms');
          sParams.set('fromPage', 'terms');
          if (urlState.section) {
            sParams.set('fromSection', urlState.section);
          }
          if (urlState.source) {
            sParams.set('source', urlState.source);
          }
          window.location.href = 'help.html?' + sParams.toString();
          return;
        }
      }

      document.body.addEventListener('click', function(event) {
        var target = event.target;
        if (!target) {
          return;
        }
        var actionElement = target.closest('[data-action]');
        if (!actionElement) {
          return;
        }
        handleActionClick(event, actionElement);
      });

      var staticContent = null;
      try {
        staticContent = WebsiteSDK.getStaticPageContent('terms_of_use');
      } catch (e) {
        showErrorMessage();
        return;
      }

      if (!staticContent) {
        showErrorMessage();
        return;
      }

      if (titleEl) {
        if (staticContent.title) {
          titleEl.textContent = staticContent.title;
        } else {
          titleEl.textContent = 'Terms of Use';
        }
      }

      if (lastUpdatedEl) {
        var formatted = formatLastUpdated(staticContent.lastUpdatedAt);
        lastUpdatedEl.textContent = formatted;
        if (staticContent.lastUpdatedAt) {
          lastUpdatedEl.setAttribute('datetime', staticContent.lastUpdatedAt);
        }
      }

      if (loadingStateEl) {
        loadingStateEl.textContent = '';
      }

      headingsMeta = renderMarkdownIntoContainer(bodyContainer, staticContent.bodyMarkdown || '', urlState.section);
      buildToc(tocListEl, headingsMeta);

      if (urlState.section) {
        scrollToSection(urlState.section, { behavior: 'auto', block: 'start' });
        updateActiveSectionIndicator(urlState.section);
        highlightActiveSectionInView(urlState.section);
      } else {
        window.scrollTo(0, 0);
      }

      setupIntersectionObserver();

      window.addEventListener('popstate', function() {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        urlState.section = params.get('section') || null;
        urlState.mode = params.get('mode') || null;
        urlState.source = params.get('source') || null;

        if (urlState.section) {
          scrollToSection(urlState.section, { behavior: 'auto', block: 'start' });
          updateActiveSectionIndicator(urlState.section);
          highlightActiveSectionInView(urlState.section);
        } else {
          updateActiveSectionIndicator(null);
          highlightActiveSectionInView(null);
        }
      });
    });
  </script>
</body>
</html>
