<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <title>Feature Flag Platform</title>
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet' />
  <link rel='stylesheet' href='framework.css' />
  <link rel='stylesheet' href='feature_flags.css' />
</head>
<body>
  <div class='app-shell'>
    <header class='site-header'>
      <div class='header-inner'>
        <a href='index.html' class='brand' aria-label='Feature flag dashboard home'>
          <div class='brand-mark'>U</div>
          <div class='brand-text'>
            <span class='brand-name'>unleash</span>
            <span class='brand-tagline'>Feature flags platform</span>
          </div>
        </a>
        <nav class='primary-nav' aria-label='Main navigation'>
          <ul>
            <li>
              <a href='index.html' class='nav-link' title='Overview of projects, flags, and upcoming changes'>Dashboard</a>
            </li>
            <li>
              <a href='projects.html' class='nav-link' title='View and select projects'>Projects</a>
            </li>
            <li>
              <a href='audit_log.html' class='nav-link' title='View the audit trail of changes'>Audit Log</a>
            </li>
            <li>
              <a href='access_control.html' class='nav-link' title='Manage members, roles, and access control'>Settings</a>
            </li>
            <li>
              <a href='help.html' class='nav-link' title='Help and documentation'>Help</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='page-layout page-layout--centered-feature-flags'>
        <div class='page-card' data-component='feature-flags-data-controller'>
          <header class='page-card-header' data-component='project-breadcrumb-header'>
            <nav class='breadcrumb' aria-label='Breadcrumb'>
              <button type='button' class='breadcrumb-back link-button' data-action='back-to-project'>
                <span class='breadcrumb-back-icon' aria-hidden='true'>&larr;</span>
                <span class='breadcrumb-back-label'>Back to project</span>
              </button>
            </nav>
            <div class='project-context'>
              <h1 class='page-title'>Feature Flags</h1>
              <p class='page-subtitle'>View and manage feature flags for this project.</p>
              <div class='project-meta'>
                <span class='project-name-label'>Project:</span>
                <span class='project-name-value' data-populate='project-name'>Loading...</span>
                <span class='project-key-value' data-populate='project-key'></span>
              </div>
            </div>
          </header>

          <section class='page-card-filters' data-component='flags-filters-bar'>
            <div class='filters-row'>
              <form class='filters-search form' data-action='flags-search'>
                <label class='field-label' for='flagSearchInput'>Search</label>
                <div class='field-control input-with-icon'>
                  <span class='input-icon input-icon--search' aria-hidden='true'></span>
                  <input
                    id='flagSearchInput'
                    name='searchQuery'
                    type='search'
                    class='input input--text'
                    placeholder='Search by flag name or key'
                    autocomplete='off'
                  />
                  <button type='button' class='link-button link-button--muted' data-action='clear-search'>Clear</button>
                </div>
              </form>

              <div class='filters-right'>
                <div class='filters-control' data-component='tag-filter-control' data-populate='project-tags'>
                  <!-- Tag filter will be rendered here by JS -->
                </div>

                <div class='filters-control' data-component='sort-dropdown-control'>
                  <label class='field-label' for='sortBySelect'>Sort</label>
                  <div class='field-control'>
                    <select
                      id='sortBySelect'
                      name='sortBy'
                      class='input input--select'
                      data-action='sort-change'
                    >
                      <option value='last_modified_newest_first'>Last modified (newest first)</option>
                      <option value='last_modified_oldest_first'>Last modified (oldest first)</option>
                      <option value='name_asc'>Name A - Z</option>
                      <option value='name_desc'>Name Z - A</option>
                    </select>
                  </div>
                </div>

                <div class='filters-primary-action'>
                  <button type='button' class='btn btn-primary btn-with-icon' data-action='create-flag'>
                    <span class='btn-label'>Create flag</span>
                    <span class='btn-icon' aria-hidden='true'></span>
                  </button>
                </div>
              </div>
            </div>

            <div class='filters-footer-row'>
              <button type='button' class='link-button link-button--muted small' data-action='clear-all-filters'>Clear all filters</button>
            </div>
          </section>

          <hr class='section-divider' />

          <section
            class='page-card-body'
            data-component='feature-flags-table-region'
            data-populate='project-feature-flags'
          >
            <!-- Feature flags table / loading / error / empty states rendered here -->
          </section>

          <div data-component='url-sync-listener' hidden></div>
        </div>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <p class='footer-branding'>a9 2026 Feature flag management platform</p>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <a href='about.html' class='footer-link' title='About this feature flag platform'>About</a>
          <a href='privacy.html' class='footer-link' title='Privacy policy'>Privacy</a>
          <a href='terms.html' class='footer-link' title='Terms of use'>Terms</a>
          <a href='help.html' class='footer-link' title='Support options and additional help resources'>Contact support</a>
        </nav>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var pageState = {
        currentProject: null
      };

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/'/g, '&#39;');
      }

      function formatDateTime(value) {
        if (!value) {
          return '';
        }
        var date = new Date(value);
        if (isNaN(date.getTime())) {
          return escapeHtml(value);
        }
        return escapeHtml(date.toLocaleString());
      }

      function readUrlState() {
        var params = new URLSearchParams(window.location.search);
        var projectId = params.get('projectId') || '';
        var searchQuery = params.get('searchQuery');
        var tagIdsParam = params.get('tagIds');
        var sortByParam = params.get('sortBy');

        var tagIds = [];
        if (tagIdsParam) {
          tagIds = tagIdsParam.split(',').map(function (t) { return t.trim(); }).filter(function (t) { return t.length > 0; });
        }

        var sortBy = sortByParam || null;

        return {
          projectId: projectId,
          searchQuery: searchQuery,
          tagIds: tagIds,
          sortBy: sortBy
        };
      }

      function updateUrlParams(updates, options) {
        var params = new URLSearchParams(window.location.search);
        for (var key in updates) {
          if (!Object.prototype.hasOwnProperty.call(updates, key)) continue;
          var value = updates[key];
          if (value === null || value === undefined || value === '') {
            params.delete(key);
          } else if (Array.isArray(value)) {
            if (value.length === 0) {
              params.delete(key);
            } else {
              params.set(key, value.join(','));
            }
          } else {
            params.set(key, value);
          }
        }
        var newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        var method = options && options.replace ? 'replaceState' : 'pushState';
        window.history[method]({}, '', newUrl);
        handleUrlStateChange();
      }

      function syncControlsWithState(urlState) {
        var searchInput = document.getElementById('flagSearchInput');
        if (searchInput) {
          searchInput.value = urlState.searchQuery || '';
        }
        var sortSelect = document.getElementById('sortBySelect');
        if (sortSelect) {
          var effectiveSort = urlState.sortBy || 'last_modified_newest_first';
          sortSelect.value = effectiveSort;
        }
      }

      function updateHeader(urlState) {
        var header = document.querySelector('[data-component="project-breadcrumb-header"]');
        if (!header) return;
        var projectNameEl = header.querySelector('[data-populate="project-name"]');
        var projectKeyEl = header.querySelector('[data-populate="project-key"]');
        var project = pageState.currentProject;
        var projectId = urlState.projectId;

        var projectName = 'Project';
        var projectKeyText = '';

        if (project && project.name) {
          projectName = project.name;
        } else if (projectId) {
          projectName = 'Project ' + projectId;
        }

        if (project && project.key) {
          projectKeyText = 'Key: ' + project.key;
        } else if (projectId) {
          projectKeyText = '';
        }

        if (projectNameEl) {
          projectNameEl.textContent = projectName;
        }
        if (projectKeyEl) {
          projectKeyEl.textContent = projectKeyText;
        }
      }

      function renderMissingProjectFlags(container) {
        container.innerHTML = '' +
          '<div class="state-block state-block--error" data-component="loading-and-error-state">' +
          '  <h2 class="state-title">Project required</h2>' +
          '  <p class="state-message-text">A projectId URL parameter is required to view feature flags. Go back to the dashboard or project list and open a project.</p>' +
          '</div>';
      }

      function renderTagsMissingProject(container) {
        container.innerHTML = '' +
          '<label class="field-label">Tags</label>' +
          '<div class="field-control">' +
          '  <span class="text-muted">Select a project to filter by tags.</span>' +
          '</div>';
      }

      function renderTagsError(container) {
        container.innerHTML = '' +
          '<label class="field-label">Tags</label>' +
          '<div class="field-control state-message state-message--inline-error">' +
          '  <span class="state-message-text">Unable to load tags.</span>' +
          '  <button type="button" class="btn btn-ghost btn-ghost--small" data-action="retry-load-tags">Retry</button>' +
          '</div>';
      }

      function renderTagFilter(container, tags, urlState) {
        var selectedIds = urlState.tagIds || [];
        var hasSelection = selectedIds.length > 0;
        var optionsHtml = tags.map(function (tag) {
          var isSelected = selectedIds.indexOf(tag.id) !== -1;
          return '<option value="' + escapeHtml(tag.id) + '"' + (isSelected ? ' selected' : '') + '>' + escapeHtml(tag.name || '') + '</option>';
        }).join('');

        container.innerHTML = '' +
          '<label class="field-label" for="tagFilterSelect">Tags</label>' +
          '<div class="field-control field-control--inline">' +
          '  <select id="tagFilterSelect" name="tagIds" class="input input--select-multi" multiple size="4" data-action="tag-filter-change">' +
               optionsHtml +
          '  </select>' +
          '  <button type="button" class="link-button link-button--muted small" data-action="clear-tag-filter"' + (hasSelection ? '' : ' disabled') + '>Clear</button>' +
          '</div>';
      }

      function renderTagsForContainer(container, urlState) {
        container.innerHTML = '' +
          '<label class="field-label" for="tagFilterSelect">Tags</label>' +
          '<div class="field-control">' +
          '  <span class="text-muted">Loading tags...</span>' +
          '</div>';
        try {
          var tags = WebsiteSDK.getProjectTags(urlState.projectId) || [];
          renderTagFilter(container, tags, urlState);
        } catch (e) {
          renderTagsError(container);
        }
      }

      function renderFlagsLoading(container) {
        container.innerHTML = '' +
          '<div class="state-block state-block--loading" data-component="loading-and-error-state">' +
          '  <div class="spinner" aria-hidden="true"></div>' +
          '  <p class="state-message-text">Loading feature flags...</p>' +
          '</div>';
      }

      function renderFlagsError(container) {
        container.innerHTML = '' +
          '<div class="state-block state-block--error" data-component="loading-and-error-state">' +
          '  <h2 class="state-title">Unable to load feature flags</h2>' +
          '  <p class="state-message-text">There was a problem loading feature flags for this project. You can retry without changing your filters.</p>' +
          '  <button type="button" class="btn btn-primary" data-action="retry-load-flags">Retry</button>' +
          '</div>';
      }

      function renderFlagsEmpty(container, urlState) {
        var hasFilters = (urlState.searchQuery && urlState.searchQuery.length > 0) || (urlState.tagIds && urlState.tagIds.length > 0) || (urlState.sortBy && urlState.sortBy !== 'last_modified_newest_first');
        container.innerHTML = '' +
          '<div class="state-block state-block--empty" data-component="empty-flags-state">' +
          '  <div class="empty-icon" aria-hidden="true"></div>' +
          '  <h2 class="state-title">No feature flags found</h2>' +
          '  <p class="state-message-text">' + (hasFilters ? 'No flags match your current filters.' : 'This project does not have any feature flags yet.') + '</p>' +
          '  <div class="state-actions">' +
          (hasFilters
            ? '    <button type="button" class="btn btn-secondary" data-action="clear-filters-empty">Clear filters</button>'
            : '') +
          '    <button type="button" class="btn btn-primary" data-action="create-flag-empty">Create flag</button>' +
          '  </div>' +
          '</div>';
      }

      function renderFlagsTable(container, items) {
        var rowsHtml = items.map(function (item) {
          var flag = item.flag || {};
          var tags = item.tags || [];
          var lastModifiedAt = item.lastModifiedAt;
          var typeLabel = flag.type ? escapeHtml(flag.type) : '';
          var statusLabel = flag.status ? escapeHtml(flag.status) : '';
          var tagsHtml = tags.map(function (tag) {
            return '<span class="tag-pill">' + escapeHtml(tag.name || '') + '</span>';
          }).join('');

          return '' +
            '<tr class="flags-table-row" data-action="open-flag" data-flag-id="' + escapeHtml(flag.id) + '">' +
            '  <td class="col-name">' +
            '    <div class="cell-primary">' + escapeHtml(flag.name || '') + '</div>' +
            '    <div class="cell-secondary">' + escapeHtml(flag.key || '') + '</div>' +
            '  </td>' +
            '  <td class="col-type">' + typeLabel + '</td>' +
            '  <td class="col-status">' + statusLabel + '</td>' +
            '  <td class="col-tags">' + tagsHtml + '</td>' +
            '  <td class="col-last-modified">' + formatDateTime(lastModifiedAt) + '</td>' +
            '</tr>';
        }).join('');

        container.innerHTML = '' +
          '<div class="table-wrapper" data-component="feature-flags-table">' +
          '  <table class="flags-table" aria-label="Feature flags list">' +
          '    <thead>' +
          '      <tr>' +
          '        <th scope="col" class="col-name">Name</th>' +
          '        <th scope="col" class="col-type">Type</th>' +
          '        <th scope="col" class="col-status">Status</th>' +
          '        <th scope="col" class="col-tags">Tags</th>' +
          '        <th scope="col" class="col-last-modified">Last modified</th>' +
          '      </tr>' +
          '    </thead>' +
          '    <tbody>' + rowsHtml + '</tbody>' +
          '  </table>' +
          '</div>';
      }

      function renderFlagsForContainer(container, urlState) {
        renderFlagsLoading(container);
        try {
          var effectiveSort = urlState.sortBy || 'last_modified_newest_first';
          var tagIdsArg = urlState.tagIds && urlState.tagIds.length ? urlState.tagIds : undefined;
          var searchArg = urlState.searchQuery && urlState.searchQuery.length ? urlState.searchQuery : undefined;

          var items = WebsiteSDK.getProjectFeatureFlags(
            urlState.projectId,
            searchArg,
            tagIdsArg,
            effectiveSort
          ) || [];

          if (items.length > 0 && items[0].project) {
            pageState.currentProject = items[0].project;
          }

          if (items.length === 0) {
            renderFlagsEmpty(container, urlState);
          } else {
            renderFlagsTable(container, items);
          }

          updateHeader(urlState);
        } catch (e) {
          renderFlagsError(container);
        }
      }

      function handleUrlStateChange() {
        var urlState = readUrlState();
        syncControlsWithState(urlState);

        var tagsContainer = document.querySelector('[data-populate="project-tags"]');
        var flagsContainer = document.querySelector('[data-populate="project-feature-flags"]');

        if (!urlState.projectId) {
          if (tagsContainer) {
            renderTagsMissingProject(tagsContainer);
          }
          if (flagsContainer) {
            renderMissingProjectFlags(flagsContainer);
          }
          pageState.currentProject = null;
          updateHeader(urlState);
          return;
        }

        if (tagsContainer) {
          renderTagsForContainer(tagsContainer, urlState);
        }
        if (flagsContainer) {
          renderFlagsForContainer(flagsContainer, urlState);
        }
      }

      function handleClick(event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');

        if (action === 'back-to-project') {
          event.preventDefault();
          var state = readUrlState();
          if (!state.projectId) return;
          window.location.href = 'project_overview.html?projectId=' + encodeURIComponent(state.projectId);
        } else if (action === 'create-flag' || action === 'create-flag-empty') {
          event.preventDefault();
          var stateCreate = readUrlState();
          if (!stateCreate.projectId) return;
          window.location.href = 'flag_detail.html?projectId=' + encodeURIComponent(stateCreate.projectId) + '&mode=create';
        } else if (action === 'open-flag') {
          event.preventDefault();
          var flagId = actionEl.getAttribute('data-flag-id');
          if (!flagId) return;
          window.location.href = 'flag_detail.html?flagId=' + encodeURIComponent(flagId);
        } else if (action === 'clear-search') {
          event.preventDefault();
          updateUrlParams({ searchQuery: null });
        } else if (action === 'clear-all-filters' || action === 'clear-filters-empty') {
          event.preventDefault();
          updateUrlParams({ searchQuery: null, tagIds: null, sortBy: null });
        } else if (action === 'retry-load-flags') {
          event.preventDefault();
          handleUrlStateChange();
        } else if (action === 'retry-load-tags') {
          event.preventDefault();
          var stateTags = readUrlState();
          if (!stateTags.projectId) return;
          var tagsContainer = document.querySelector('[data-populate="project-tags"]');
          if (tagsContainer) {
            renderTagsForContainer(tagsContainer, stateTags);
          }
        } else if (action === 'clear-tag-filter') {
          event.preventDefault();
          updateUrlParams({ tagIds: null });
        }
      }

      function handleChange(event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');

        if (action === 'tag-filter-change') {
          var select = actionEl;
          var selected = [];
          for (var i = 0; i < select.options.length; i++) {
            var opt = select.options[i];
            if (opt.selected && opt.value) {
              selected.push(opt.value);
            }
          }
          updateUrlParams({ tagIds: selected.length ? selected : null });
        } else if (action === 'sort-change') {
          var value = actionEl.value;
          updateUrlParams({ sortBy: value || null });
        }
      }

      function handleSubmit(event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');

        if (action === 'flags-search') {
          event.preventDefault();
          var input = actionEl.querySelector('input[name="searchQuery"]');
          var query = input ? input.value.trim() : '';
          updateUrlParams({ searchQuery: query || null });
        }
      }

      window.addEventListener('popstate', function () {
        handleUrlStateChange();
      });

      document.addEventListener('click', handleClick);
      document.addEventListener('change', handleChange);
      document.addEventListener('submit', handleSubmit);

      handleUrlStateChange();
    });
  </script>
</body>
</html>
