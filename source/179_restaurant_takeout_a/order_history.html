<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Restaurant Takeout &amp; Delivery</title>

    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="order_history.css">
</head>
<body>
    <header class="site-header" role="banner">
        <div class="header-top">
            <div class="container header-top-inner">
                <a href="index.html" class="site-logo" title="Go to homepage">
                    <span class="logo-mark">S</span>
                    <span class="logo-text">
                        <span class="logo-main">Sushi Takeout</span>
                        <span class="logo-sub">Tea &amp; Roll Cafe</span>
                    </span>
                </a>

                <nav class="primary-nav" aria-label="Primary navigation">
                    <ul class="primary-nav-list">
                        <li class="primary-nav-item">
                            <a href="index.html" title="Homepage to start pickup or delivery orders and see featured options">Home</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="index.html#pickup" title="Jump to the pickup section on the homepage to start a pickup order">Order Pickup</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="index.html#delivery" title="Jump to the delivery section on the homepage to set a delivery location">Delivery</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="restaurants.html" title="View and filter all available restaurants (e.g., Thai, Sushi) before ordering">Browse Restaurants</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="order_history.html" title="View past orders and quickly reorder previous meals">Order History</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="help.html" title="Access help and frequently asked questions about ordering">Help</a>
                        </li>
                    </ul>
                </nav>

                <div class="header-utilities" aria-hidden="true">
                    <div class="header-search">
                        <span class="search-placeholder">Search</span>
                    </div>
                    <span class="header-login">Login</span>
                    <span class="header-cart">Cart (0)</span>
                </div>
            </div>
        </div>
    </header>

    <main id="content" class="page-content" role="main">
        <div class="container">
            <!-- Filter bar / page header -->
            <section class="order-history-filter-bar" data-component="order-history-filter-bar" aria-label="Order history filters">
                <div class="order-history-filter-bar-inner">
                    <div class="order-history-filter-bar-left">
                        <h1 class="page-title">Order History</h1>
                    </div>
                    <div class="order-history-filter-bar-right">
                        <form class="order-history-filters" novalidate>
                            <div class="filter-group">
                                <label for="fulfillmentFilter">Fulfillment</label>
                                <select id="fulfillmentFilter" name="fulfillment" data-action="filter-fulfillment">
                                    <option value="">All</option>
                                    <option value="pickup">Pickup</option>
                                    <option value="delivery">Delivery</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label for="statusFilter">Status</label>
                                <select id="statusFilter" name="status" data-action="filter-status">
                                    <option value="">All</option>
                                    <option value="pending">Pending</option>
                                    <option value="confirmed">Confirmed</option>
                                    <option value="in_progress">In progress</option>
                                    <option value="completed">Completed</option>
                                    <option value="cancelled">Cancelled</option>
                                </select>
                            </div>
                            <div class="filter-group filter-group--date-range">
                                <label for="startDateFilter">From</label>
                                <input type="date" id="startDateFilter" name="startDate" data-action="filter-start-date">
                            </div>
                            <div class="filter-group filter-group--date-range">
                                <label for="endDateFilter">To</label>
                                <input type="date" id="endDateFilter" name="endDate" data-action="filter-end-date">
                            </div>
                            <div class="filter-group filter-group--search">
                                <label for="searchFilter">Search</label>
                                <input type="search" id="searchFilter" name="search" placeholder="Restaurant or items" data-action="filter-search">
                            </div>
                            <div class="filter-group filter-group--sort">
                                <label for="sortFilter">Sort</label>
                                <select id="sortFilter" name="sort" data-action="filter-sort">
                                    <option value="placed_at_desc">Newest first</option>
                                    <option value="placed_at_asc">Oldest first</option>
                                    <option value="total_desc">Total: high to low</option>
                                    <option value="total_asc">Total: low to high</option>
                                    <option value="status_asc">Status</option>
                                </select>
                            </div>
                        </form>
                    </div>
                </div>
            </section>

            <!-- Data loader overlay -->
            <div class="order-history-loader-overlay" data-component="order-history-data-loader" aria-live="polite" aria-busy="true" hidden>
                <div class="order-history-loader-inner">
                    <div class="loader-spinner" aria-hidden="true"></div>
                    <p>Loading your orders</p>
                </div>
            </div>

            <!-- Main two-column layout -->
            <section class="order-history-main" aria-label="Past orders">
                <div class="order-history-layout">
                    <!-- Left column: list & pagination -->
                    <div class="order-history-list-column">
                        <div class="order-history-list-summary" aria-live="polite">
                            <span class="order-count" data-populate="order-history"></span>
                        </div>
                        <div class="order-history-list" data-component="order-history-list"></div>
                        <div class="order-history-empty" data-component="order-history-empty-state" hidden></div>
                        <nav class="order-history-pagination" data-component="order-history-pagination" aria-label="Order history pages"></nav>
                    </div>

                    <!-- Right column: detail sidebar -->
                    <aside class="order-history-detail-column" aria-label="Selected order details">
                        <div class="order-detail-card" data-component="order-detail-view"></div>
                    </aside>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container footer-inner">
            <div class="footer-links">
                <a href="about.html" title="Learn more about the brand and ordering platform">About</a>
                <a href="contact.html" title="Contact customer support or send feedback">Contact</a>
                <a href="help.html" title="Help center with frequently asked questions">Help &amp; FAQ</a>
                <a href="policies.html" title="Read terms of use, privacy policy, and service policies">Terms &amp; Privacy</a>
            </div>
            <div class="footer-meta">
                <p class="footer-copy">&copy; 2026 Restaurant Takeout &amp; Delivery Platform</p>
            </div>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    (function() {
        const state = {
            orders: [],
            ordersLoaded: false,
            ordersError: null,
            orderDetails: {},
            orderDetailsError: {},
            reorderState: {}, // { [orderId]: { loading, error, result } }
            activeOrderId: null,
            pageSize: 10,
            loadingOrders: false
        };

        let searchDebounceTimer = null;

        // DOM references (initialized on DOMContentLoaded)
        let loaderOverlay;
        let listContainer;
        let detailContainer;
        let paginationContainer;
        let emptyStateContainer;
        let orderCountElement;
        let fulfillmentSelect;
        let statusSelect;
        let startDateInput;
        let endDateInput;
        let searchInput;
        let sortSelect;

        function formatDate(isoString) {
            if (!isoString) return '';
            const d = new Date(isoString);
            if (Number.isNaN(d.getTime())) return '';
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const d = new Date(isoString);
            if (Number.isNaN(d.getTime())) return '';
            return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
        }

        function formatDateTime(isoString) {
            if (!isoString) return '';
            const d = new Date(isoString);
            if (Number.isNaN(d.getTime())) return '';
            return d.toLocaleString(undefined, {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        function formatCurrency(amount) {
            if (typeof amount !== 'number') return '';
            try {
                return amount.toLocaleString(undefined, { style: 'currency', currency: 'USD' });
            } catch (e) {
                return '$' + amount.toFixed(2);
            }
        }

        function mapStatusLabel(status) {
            const map = {
                pending: 'Pending',
                confirmed: 'Confirmed',
                in_progress: 'In progress',
                completed: 'Completed',
                cancelled: 'Cancelled'
            };
            return map[status] || status || '';
        }

        function mapFulfillmentLabel(fulfillment) {
            const map = {
                pickup: 'Pickup',
                delivery: 'Delivery'
            };
            return map[fulfillment] || fulfillment || '';
        }

        function mapPaymentLabel(method) {
            const map = {
                card: 'Card',
                cash_on_delivery: 'Cash on delivery'
            };
            return map[method] || method || '';
        }

        function readViewStateFromUrl() {
            const params = new URLSearchParams(window.location.search);

            const fulfillmentRaw = params.get('fulfillment');
            const fulfillment = (fulfillmentRaw === 'pickup' || fulfillmentRaw === 'delivery') ? fulfillmentRaw : null;

            const statusRaw = params.get('status');
            const allowedStatuses = ['pending', 'confirmed', 'in_progress', 'completed', 'cancelled'];
            const status = allowedStatuses.indexOf(statusRaw || '') !== -1 ? statusRaw : null;

            const startDate = params.get('startDate') || null;
            const endDate = params.get('endDate') || null;
            const search = params.get('search') || '';

            const sortRaw = params.get('sort');
            const allowedSorts = ['placed_at_desc', 'placed_at_asc', 'total_desc', 'total_asc', 'status_asc'];
            const sort = allowedSorts.indexOf(sortRaw || '') !== -1 ? sortRaw : 'placed_at_desc';

            let page = parseInt(params.get('page'), 10);
            if (Number.isNaN(page) || page < 1) {
                page = 1;
            }

            const orderId = params.get('orderId');

            return {
                fulfillment: fulfillment,
                status: status,
                startDate: startDate,
                endDate: endDate,
                search: search,
                sort: sort,
                page: page,
                orderId: orderId
            };
        }

        function updateUrlParams(newParams, replace) {
            const url = new URL(window.location.href);
            Object.keys(newParams).forEach(function(key) {
                const value = newParams[key];
                if (value === null || value === undefined || value === '') {
                    url.searchParams.delete(key);
                } else {
                    url.searchParams.set(key, String(value));
                }
            });
            const search = url.searchParams.toString();
            const newUrl = url.pathname + (search ? '?' + search : '') + url.hash;
            if (replace) {
                window.history.replaceState({}, '', newUrl);
            } else {
                window.history.pushState({}, '', newUrl);
            }
        }

        function applyFiltersAndSort(orders, view) {
            let result = orders.slice();

            if (view.fulfillment) {
                result = result.filter(function(order) {
                    return order.fulfillment_type === view.fulfillment;
                });
            }

            if (view.status) {
                result = result.filter(function(order) {
                    return order.status === view.status;
                });
            }

            if (view.startDate) {
                const start = new Date(view.startDate);
                if (!Number.isNaN(start.getTime())) {
                    result = result.filter(function(order) {
                        const placed = new Date(order.placed_at);
                        return !Number.isNaN(placed.getTime()) && placed >= start;
                    });
                }
            }

            if (view.endDate) {
                const end = new Date(view.endDate);
                if (!Number.isNaN(end.getTime())) {
                    // Make end inclusive by adding one day
                    const inclusiveEnd = new Date(end.getTime());
                    inclusiveEnd.setDate(inclusiveEnd.getDate() + 1);
                    result = result.filter(function(order) {
                        const placed = new Date(order.placed_at);
                        return !Number.isNaN(placed.getTime()) && placed < inclusiveEnd;
                    });
                }
            }

            const trimmedSearch = (view.search || '').trim().toLowerCase();
            if (trimmedSearch) {
                result = result.filter(function(order) {
                    const restaurant = (order.restaurant_name || '').toLowerCase();
                    const summary = (order.items_summary || '').toLowerCase();
                    return restaurant.indexOf(trimmedSearch) !== -1 || summary.indexOf(trimmedSearch) !== -1;
                });
            }

            const sort = view.sort || 'placed_at_desc';
            result.sort(function(a, b) {
                if (sort === 'placed_at_desc') {
                    return new Date(b.placed_at) - new Date(a.placed_at);
                }
                if (sort === 'placed_at_asc') {
                    return new Date(a.placed_at) - new Date(b.placed_at);
                }
                if (sort === 'total_desc') {
                    return (b.total || 0) - (a.total || 0);
                }
                if (sort === 'total_asc') {
                    return (a.total || 0) - (b.total || 0);
                }
                if (sort === 'status_asc') {
                    const sa = (a.status || '').toString();
                    const sb = (b.status || '').toString();
                    if (sa < sb) return -1;
                    if (sa > sb) return 1;
                    return 0;
                }
                return new Date(b.placed_at) - new Date(a.placed_at);
            });

            return result;
        }

        function updateFilterControls(view) {
            if (fulfillmentSelect) {
                fulfillmentSelect.value = view.fulfillment || '';
            }
            if (statusSelect) {
                statusSelect.value = view.status || '';
            }
            if (startDateInput) {
                startDateInput.value = view.startDate || '';
            }
            if (endDateInput) {
                endDateInput.value = view.endDate || '';
            }
            if (searchInput) {
                searchInput.value = view.search || '';
            }
            if (sortSelect) {
                sortSelect.value = view.sort || 'placed_at_desc';
            }
        }

        function renderErrorEmptyState(container, message) {
            if (!container) return;
            container.hidden = false;
            container.innerHTML = '';

            const panel = document.createElement('div');
            panel.className = 'empty-state-panel is-error';

            const title = document.createElement('h2');
            title.textContent = 'Unable to load orders';
            panel.appendChild(title);

            const p = document.createElement('p');
            p.textContent = message || 'We could not load your order history. Please try again.';
            panel.appendChild(p);

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn-primary';
            btn.dataset.action = 'retry-load-orders';
            btn.textContent = 'Try again';
            panel.appendChild(btn);

            container.appendChild(panel);
        }

        function renderNoOrdersEmptyState(container) {
            if (!container) return;
            container.hidden = false;
            container.innerHTML = '';

            const panel = document.createElement('div');
            panel.className = 'empty-state-panel';

            const title = document.createElement('h2');
            title.textContent = 'No orders yet';
            panel.appendChild(title);

            const p = document.createElement('p');
            p.textContent = 'When you place an order, it will appear here so you can review and reorder it quickly.';
            panel.appendChild(p);

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn-primary';
            btn.dataset.action = 'go-home';
            btn.textContent = 'Start an order';
            panel.appendChild(btn);

            container.appendChild(panel);
        }

        function renderFilteredEmptyState(container) {
            if (!container) return;
            container.hidden = false;
            container.innerHTML = '';

            const panel = document.createElement('div');
            panel.className = 'empty-state-panel';

            const title = document.createElement('h2');
            title.textContent = 'No orders match these filters';
            panel.appendChild(title);

            const p = document.createElement('p');
            p.textContent = 'Try adjusting your filters or clearing them to see more orders.';
            panel.appendChild(p);

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn-secondary';
            btn.dataset.action = 'clear-filters';
            btn.textContent = 'Clear filters';
            panel.appendChild(btn);

            container.appendChild(panel);
        }

        function renderOrderList(container, orders, activeOrderId) {
            if (!container) return;
            container.innerHTML = '';

            const list = document.createElement('ul');
            list.className = 'order-history-list-items';

            orders.forEach(function(order) {
                const li = document.createElement('li');
                li.className = 'order-history-list-item card';
                li.setAttribute('data-component', 'order-history-list-item');
                li.dataset.orderId = order.order_id || '';
                if (activeOrderId && order.order_id === activeOrderId) {
                    li.classList.add('is-active');
                }

                const mainRow = document.createElement('div');
                mainRow.className = 'order-row-main';

                const left = document.createElement('div');
                left.className = 'order-row-section order-row-section--left';
                const dateEl = document.createElement('div');
                dateEl.className = 'order-row-date';
                dateEl.textContent = formatDate(order.placed_at) + ' b7 ' + formatTime(order.placed_at);
                left.appendChild(dateEl);
                const idEl = document.createElement('div');
                idEl.className = 'order-row-id';
                idEl.textContent = 'Order #' + (order.order_id || '');
                left.appendChild(idEl);

                const center = document.createElement('div');
                center.className = 'order-row-section order-row-section--center';

                const restaurantLine = document.createElement('div');
                restaurantLine.className = 'order-row-restaurant-line';

                const restaurantNameEl = document.createElement('button');
                restaurantNameEl.type = 'button';
                restaurantNameEl.className = 'order-row-restaurant-name btn-link';
                restaurantNameEl.textContent = order.restaurant_name || '';
                if (order.restaurant_id) {
                    restaurantNameEl.dataset.action = 'view-restaurant';
                    restaurantNameEl.dataset.restaurantId = order.restaurant_id;
                } else {
                    restaurantNameEl.disabled = true;
                    restaurantNameEl.classList.add('is-disabled');
                }
                restaurantLine.appendChild(restaurantNameEl);

                const fulfillmentBadge = document.createElement('span');
                fulfillmentBadge.className = 'pill pill-fulfillment pill-fulfillment--' + (order.fulfillment_type || '');
                fulfillmentBadge.textContent = mapFulfillmentLabel(order.fulfillment_type);
                restaurantLine.appendChild(fulfillmentBadge);

                const statusBadge = document.createElement('span');
                statusBadge.className = 'pill pill-status pill-status--' + (order.status || '');
                statusBadge.textContent = mapStatusLabel(order.status);
                restaurantLine.appendChild(statusBadge);

                if (order.was_reorder) {
                    const reorderTag = document.createElement('span');
                    reorderTag.className = 'pill pill-meta';
                    reorderTag.textContent = 'Reorder';
                    restaurantLine.appendChild(reorderTag);
                }

                center.appendChild(restaurantLine);

                const summaryLine = document.createElement('div');
                summaryLine.className = 'order-row-summary';
                summaryLine.textContent = order.items_summary || '';
                center.appendChild(summaryLine);

                const right = document.createElement('div');
                right.className = 'order-row-section order-row-section--right';

                const totalEl = document.createElement('div');
                totalEl.className = 'order-row-total';
                totalEl.textContent = formatCurrency(order.total || order.items_subtotal || 0);
                right.appendChild(totalEl);

                const actionsEl = document.createElement('div');
                actionsEl.className = 'order-row-actions';

                const detailsBtn = document.createElement('button');
                detailsBtn.type = 'button';
                detailsBtn.className = 'btn-link order-row-details-btn';
                detailsBtn.dataset.action = 'toggle-details';
                detailsBtn.dataset.orderId = order.order_id || '';
                detailsBtn.textContent = (activeOrderId && order.order_id === activeOrderId) ? 'Hide details' : 'View details';
                actionsEl.appendChild(detailsBtn);

                const reorderBtn = document.createElement('button');
                reorderBtn.type = 'button';
                reorderBtn.className = 'btn-secondary order-row-reorder-btn';
                reorderBtn.dataset.action = 'reorder-from-list';
                reorderBtn.dataset.orderId = order.order_id || '';

                const reorderInfo = state.reorderState[order.order_id || ''];
                if (reorderInfo && reorderInfo.loading) {
                    reorderBtn.disabled = true;
                    reorderBtn.textContent = 'Reordering85';
                } else {
                    reorderBtn.textContent = 'Reorder';
                }
                actionsEl.appendChild(reorderBtn);

                if (reorderInfo && reorderInfo.error) {
                    const errorText = document.createElement('div');
                    errorText.className = 'inline-error';
                    errorText.textContent = reorderInfo.error;
                    actionsEl.appendChild(errorText);
                }

                if (reorderInfo && reorderInfo.result && reorderInfo.result.success) {
                    const successText = document.createElement('div');
                    successText.className = 'inline-success';
                    const itemsCount = (reorderInfo.result.cart && reorderInfo.result.cart.items_count) || 0;
                    const summarySpan = document.createElement('span');
                    summarySpan.textContent = 'Added ' + itemsCount + ' item' + (itemsCount === 1 ? '' : 's') + ' to your cart from this order.';
                    successText.appendChild(summarySpan);

                    const goCartLink = document.createElement('button');
                    goCartLink.type = 'button';
                    goCartLink.className = 'btn-link inline-success-link';
                    goCartLink.dataset.action = 'go-to-cart';
                    goCartLink.textContent = 'Go to cart';
                    successText.appendChild(goCartLink);

                    actionsEl.appendChild(successText);
                }

                right.appendChild(actionsEl);

                mainRow.appendChild(left);
                mainRow.appendChild(center);
                mainRow.appendChild(right);

                li.appendChild(mainRow);
                list.appendChild(li);
            });

            container.appendChild(list);
        }

        function renderPagination(container, currentPage, totalPages) {
            if (!container) return;
            container.innerHTML = '';

            if (!totalPages || totalPages <= 1) {
                container.hidden = true;
                return;
            }

            container.hidden = false;

            const wrapper = document.createElement('div');
            wrapper.className = 'pagination-inner';

            const prevBtn = document.createElement('button');
            prevBtn.type = 'button';
            prevBtn.className = 'pagination-btn pagination-prev';
            prevBtn.textContent = 'Previous';
            prevBtn.dataset.action = 'change-page';
            if (currentPage > 1) {
                prevBtn.dataset.page = String(currentPage - 1);
            } else {
                prevBtn.disabled = true;
            }
            wrapper.appendChild(prevBtn);

            for (let p = 1; p <= totalPages; p += 1) {
                const pageBtn = document.createElement('button');
                pageBtn.type = 'button';
                pageBtn.className = 'pagination-btn';
                if (p === currentPage) {
                    pageBtn.classList.add('is-active');
                }
                pageBtn.textContent = String(p);
                pageBtn.dataset.action = 'change-page';
                pageBtn.dataset.page = String(p);
                wrapper.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.type = 'button';
            nextBtn.className = 'pagination-btn pagination-next';
            nextBtn.textContent = 'Next';
            nextBtn.dataset.action = 'change-page';
            if (currentPage < totalPages) {
                nextBtn.dataset.page = String(currentPage + 1);
            } else {
                nextBtn.disabled = true;
            }
            wrapper.appendChild(nextBtn);

            container.appendChild(wrapper);
        }

        function renderDetailPlaceholder(container, hasOrders) {
            if (!container) return;
            container.innerHTML = '';

            const wrapper = document.createElement('div');
            wrapper.className = 'order-detail-placeholder';

            const title = document.createElement('h2');
            title.textContent = hasOrders ? 'Select an order' : 'No order selected';
            wrapper.appendChild(title);

            const p = document.createElement('p');
            if (hasOrders) {
                p.textContent = 'Choose an order on the left to see full details and reorder it.';
            } else {
                p.textContent = 'Once you have orders, you can view their full details here.';
            }
            wrapper.appendChild(p);

            container.appendChild(wrapper);
        }

        function ensureOrderDetailLoaded(orderId) {
            if (!orderId) return null;
            if (state.orderDetails[orderId]) {
                return state.orderDetails[orderId];
            }
            try {
                const detail = WebsiteSDK.getOrderDetails(orderId);
                state.orderDetails[orderId] = detail || null;
                state.orderDetailsError[orderId] = null;
                return detail;
            } catch (e) {
                state.orderDetailsError[orderId] = 'We could not load details for this order. Please try again.';
                return null;
            }
        }

        function renderDetail(container, activeOrderId) {
            if (!container) return;
            container.innerHTML = '';

            if (!activeOrderId) {
                renderDetailPlaceholder(container, state.orders && state.orders.length > 0);
                return;
            }

            const detailError = state.orderDetailsError[activeOrderId];
            const detail = detailError ? null : ensureOrderDetailLoaded(activeOrderId);

            if (state.orderDetailsError[activeOrderId]) {
                const wrapper = document.createElement('div');
                wrapper.className = 'order-detail-error';

                const title = document.createElement('h2');
                title.textContent = 'Order details unavailable';
                wrapper.appendChild(title);

                const p = document.createElement('p');
                p.textContent = state.orderDetailsError[activeOrderId];
                wrapper.appendChild(p);

                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn-secondary';
                btn.dataset.action = 'retry-order-detail';
                btn.dataset.orderId = activeOrderId;
                btn.textContent = 'Retry';
                wrapper.appendChild(btn);

                container.appendChild(wrapper);
                return;
            }

            if (!detail) {
                renderDetailPlaceholder(container, state.orders && state.orders.length > 0);
                return;
            }

            const summaryOrder = state.orders.find(function(o) { return o.order_id === activeOrderId; }) || {};

            const wrapper = document.createElement('div');
            wrapper.className = 'order-detail-inner';

            const header = document.createElement('header');
            header.className = 'order-detail-header';

            const title = document.createElement('h2');
            title.textContent = detail.restaurant_name || 'Order details';
            header.appendChild(title);

            const metaRow = document.createElement('div');
            metaRow.className = 'order-detail-meta-row';

            const idAndDate = document.createElement('div');
            idAndDate.className = 'order-detail-id-date';

            const idSpan = document.createElement('span');
            idSpan.className = 'order-detail-id';
            idSpan.textContent = 'Order #' + activeOrderId;
            idAndDate.appendChild(idSpan);

            const dot = document.createElement('span');
            dot.className = 'meta-separator';
            dot.textContent = 'b7';
            idAndDate.appendChild(dot);

            const placedSpan = document.createElement('span');
            placedSpan.className = 'order-detail-placed';
            placedSpan.textContent = formatDateTime(detail.placed_at || summaryOrder.placed_at);
            idAndDate.appendChild(placedSpan);

            metaRow.appendChild(idAndDate);

            const statusGroup = document.createElement('div');
            statusGroup.className = 'order-detail-status-group';

            const statusPill = document.createElement('span');
            statusPill.className = 'pill pill-status pill-status--' + (detail.status || summaryOrder.status || '');
            statusPill.textContent = mapStatusLabel(detail.status || summaryOrder.status);
            statusGroup.appendChild(statusPill);

            if (summaryOrder.was_reorder) {
                const reorderPill = document.createElement('span');
                reorderPill.className = 'pill pill-meta';
                reorderPill.textContent = 'Reorder';
                statusGroup.appendChild(reorderPill);
            }

            const closeBtn = document.createElement('button');
            closeBtn.type = 'button';
            closeBtn.className = 'btn-link order-detail-close';
            closeBtn.dataset.action = 'clear-active-order';
            closeBtn.textContent = 'Hide details';
            statusGroup.appendChild(closeBtn);

            metaRow.appendChild(statusGroup);
            header.appendChild(metaRow);
            wrapper.appendChild(header);

            const summaryBlock = document.createElement('section');
            summaryBlock.className = 'order-detail-summary-block';

            const fulfillmentLine = document.createElement('div');
            fulfillmentLine.className = 'order-detail-fulfillment';
            const fulfillmentLabel = mapFulfillmentLabel(detail.fulfillment_type || summaryOrder.fulfillment_type);
            const fulfillmentSpan = document.createElement('span');
            fulfillmentSpan.className = 'order-detail-fulfillment-label';
            fulfillmentSpan.textContent = fulfillmentLabel;
            fulfillmentLine.appendChild(fulfillmentSpan);

            if (detail.fulfillment_type === 'delivery' || summaryOrder.fulfillment_type === 'delivery') {
                const addr = document.createElement('div');
                addr.className = 'order-detail-address';
                addr.textContent = detail.delivery_address_snapshot || 'Delivery address provided at checkout.';
                fulfillmentLine.appendChild(addr);
            } else if (detail.fulfillment_type === 'pickup' || summaryOrder.fulfillment_type === 'pickup') {
                const loc = document.createElement('div');
                loc.className = 'order-detail-pickup-location';
                loc.textContent = detail.pickup_location_label || summaryOrder.pickup_location_label || 'Pickup location provided at checkout.';
                fulfillmentLine.appendChild(loc);
            }
            summaryBlock.appendChild(fulfillmentLine);

            if (detail.scheduled_type) {
                const scheduleLine = document.createElement('div');
                scheduleLine.className = 'order-detail-schedule';
                if (detail.scheduled_type === 'asap') {
                    scheduleLine.textContent = 'Timing: ASAP';
                } else if (detail.scheduled_type === 'scheduled' && detail.scheduled_datetime) {
                    scheduleLine.textContent = 'Scheduled for ' + formatDateTime(detail.scheduled_datetime);
                }
                summaryBlock.appendChild(scheduleLine);
            }

            const paymentLine = document.createElement('div');
            paymentLine.className = 'order-detail-payment';
            paymentLine.textContent = 'Payment: ' + mapPaymentLabel(detail.payment_method);
            summaryBlock.appendChild(paymentLine);

            wrapper.appendChild(summaryBlock);

            const reorderControls = document.createElement('section');
            reorderControls.className = 'order-detail-reorder-block';

            const reorderBtn = document.createElement('button');
            reorderBtn.type = 'button';
            reorderBtn.className = 'btn-primary order-detail-reorder-btn';
            reorderBtn.dataset.action = 'reorder-from-detail';
            reorderBtn.dataset.orderId = activeOrderId;

            const reorderInfo = state.reorderState[activeOrderId] || {};
            if (reorderInfo.loading) {
                reorderBtn.disabled = true;
                reorderBtn.textContent = 'Reordering85';
            } else {
                reorderBtn.textContent = 'Reorder this order';
            }
            reorderControls.appendChild(reorderBtn);

            if (reorderInfo.error) {
                const errorText = document.createElement('div');
                errorText.className = 'inline-error';
                errorText.textContent = reorderInfo.error;
                reorderControls.appendChild(errorText);
            }

            if (reorderInfo.result && reorderInfo.result.success) {
                const successPanel = document.createElement('div');
                successPanel.className = 'reorder-success-panel';

                const itemsCount = (reorderInfo.result.cart && reorderInfo.result.cart.items_count) || 0;
                const subtotal = (reorderInfo.result.cart && reorderInfo.result.cart.items_subtotal) || 0;

                const msg = document.createElement('p');
                msg.textContent = 'Added ' + itemsCount + ' item' + (itemsCount === 1 ? '' : 's') + ' to your cart. Items subtotal: ' + formatCurrency(subtotal) + '.';
                successPanel.appendChild(msg);

                if (Array.isArray(reorderInfo.result.unavailable_items) && reorderInfo.result.unavailable_items.length > 0) {
                    const warn = document.createElement('div');
                    warn.className = 'reorder-warning';
                    const warnTitle = document.createElement('strong');
                    warnTitle.textContent = 'Some items are no longer available:';
                    warn.appendChild(warnTitle);
                    const list = document.createElement('ul');
                    reorderInfo.result.unavailable_items.forEach(function(name) {
                        const li = document.createElement('li');
                        li.textContent = name;
                        list.appendChild(li);
                    });
                    warn.appendChild(list);
                    successPanel.appendChild(warn);
                }

                const actionsRow = document.createElement('div');
                actionsRow.className = 'reorder-success-actions';

                const goCartBtn = document.createElement('button');
                goCartBtn.type = 'button';
                goCartBtn.className = 'btn-primary';
                goCartBtn.dataset.action = 'go-to-cart';
                goCartBtn.textContent = 'Go to cart';
                actionsRow.appendChild(goCartBtn);

                const dismissBtn = document.createElement('button');
                dismissBtn.type = 'button';
                dismissBtn.className = 'btn-link';
                dismissBtn.dataset.action = 'dismiss-reorder-message';
                dismissBtn.dataset.orderId = activeOrderId;
                dismissBtn.textContent = 'Dismiss';
                actionsRow.appendChild(dismissBtn);

                successPanel.appendChild(actionsRow);
                reorderControls.appendChild(successPanel);
            }

            wrapper.appendChild(reorderControls);

            const itemsSection = document.createElement('section');
            itemsSection.className = 'order-detail-items-section';

            const itemsTitle = document.createElement('h3');
            itemsTitle.textContent = 'Items';
            itemsSection.appendChild(itemsTitle);

            const itemsList = document.createElement('ul');
            itemsList.className = 'order-detail-items-list';

            (detail.items || []).forEach(function(item) {
                const li = document.createElement('li');
                li.className = 'order-detail-item';

                const mainRow = document.createElement('div');
                mainRow.className = 'order-detail-item-main';

                const left = document.createElement('div');
                left.className = 'order-detail-item-left';

                const nameLine = document.createElement('div');
                nameLine.className = 'order-detail-item-name';
                nameLine.textContent = (item.quantity || 1) + ' d7 ' + (item.menu_item_name || '');
                left.appendChild(nameLine);

                if (Array.isArray(item.options_summary) && item.options_summary.length > 0) {
                    const optionsLine = document.createElement('div');
                    optionsLine.className = 'order-detail-item-options';
                    optionsLine.textContent = item.options_summary.join(', ');
                    left.appendChild(optionsLine);
                }

                if (item.special_instructions) {
                    const instr = document.createElement('div');
                    instr.className = 'order-detail-item-instructions';
                    instr.textContent = 'Notes: ' + item.special_instructions;
                    left.appendChild(instr);
                }

                mainRow.appendChild(left);

                const right = document.createElement('div');
                right.className = 'order-detail-item-right';
                const priceEl = document.createElement('div');
                priceEl.className = 'order-detail-item-price';
                priceEl.textContent = formatCurrency(item.line_subtotal || 0);
                right.appendChild(priceEl);
                mainRow.appendChild(right);

                li.appendChild(mainRow);
                itemsList.appendChild(li);
            });

            itemsSection.appendChild(itemsList);
            wrapper.appendChild(itemsSection);

            const totalsSection = document.createElement('section');
            totalsSection.className = 'order-detail-totals-section';

            const totalsTitle = document.createElement('h3');
            totalsTitle.textContent = 'Totals';
            totalsSection.appendChild(totalsTitle);

            const totalsList = document.createElement('dl');
            totalsList.className = 'order-detail-totals-list';

            function addTotalRow(label, value, modifierClass) {
                const row = document.createElement('div');
                row.className = 'order-detail-total-row';
                if (modifierClass) row.classList.add(modifierClass);
                const dt = document.createElement('dt');
                dt.textContent = label;
                const dd = document.createElement('dd');
                dd.textContent = value;
                row.appendChild(dt);
                row.appendChild(dd);
                totalsList.appendChild(row);
            }

            addTotalRow('Items subtotal', formatCurrency(detail.items_subtotal || 0));

            if (detail.discount_total && detail.discount_total !== 0) {
                addTotalRow('Discounts', '-' + formatCurrency(Math.abs(detail.discount_total)), 'is-discount');
            }

            if (detail.delivery_fee && detail.delivery_fee !== 0) {
                addTotalRow('Delivery fee', formatCurrency(detail.delivery_fee));
            }

            if (detail.tax_total && detail.tax_total !== 0) {
                addTotalRow('Tax', formatCurrency(detail.tax_total));
            }

            if (detail.promo_code_code) {
                const label = 'Promo code (' + detail.promo_code_code + ')';
                const amount = detail.promo_discount_value ? '-' + formatCurrency(Math.abs(detail.promo_discount_value)) : ''; 
                addTotalRow(label, amount, 'is-discount');
            }

            addTotalRow('Total', formatCurrency(detail.total || 0), 'is-total');

            totalsSection.appendChild(totalsList);
            wrapper.appendChild(totalsSection);

            container.appendChild(wrapper);
        }

        function loadOrderHistory() {
            if (state.ordersLoaded || state.loadingOrders) {
                return;
            }
            state.loadingOrders = true;
            if (loaderOverlay) {
                loaderOverlay.hidden = false;
            }
            try {
                const orders = WebsiteSDK.getOrderHistory();
                state.orders = Array.isArray(orders) ? orders.slice() : [];
                state.ordersLoaded = true;
                state.ordersError = null;
            } catch (e) {
                state.ordersError = 'We could not load your order history. Please try again.';
            }
            state.loadingOrders = false;
            if (loaderOverlay) {
                loaderOverlay.hidden = true;
            }
        }

        function applyViewState() {
            if (!listContainer || !detailContainer || !emptyStateContainer || !paginationContainer) {
                return;
            }

            const view = readViewStateFromUrl();
            updateFilterControls(view);

            if (!state.ordersLoaded && !state.ordersError) {
                // If orders have not been loaded yet, attempt loading synchronously
                loadOrderHistory();
            }

            if (state.ordersError) {
                listContainer.innerHTML = '';
                paginationContainer.innerHTML = '';
                renderDetailPlaceholder(detailContainer, false);
                renderErrorEmptyState(emptyStateContainer, state.ordersError);
                if (orderCountElement) {
                    orderCountElement.textContent = '';
                }
                return;
            }

            if (!state.orders || state.orders.length === 0) {
                listContainer.innerHTML = '';
                paginationContainer.innerHTML = '';
                renderDetailPlaceholder(detailContainer, false);
                renderNoOrdersEmptyState(emptyStateContainer);
                if (orderCountElement) {
                    orderCountElement.textContent = 'You have no past orders yet.';
                }
                return;
            }

            const filteredAndSorted = applyFiltersAndSort(state.orders, view);
            const totalFiltered = filteredAndSorted.length;

            if (orderCountElement) {
                if (totalFiltered === state.orders.length) {
                    orderCountElement.textContent = totalFiltered + ' order' + (totalFiltered === 1 ? '' : 's') + ' found';
                } else {
                    orderCountElement.textContent = totalFiltered + ' of ' + state.orders.length + ' orders shown';
                }
            }

            if (totalFiltered === 0) {
                listContainer.innerHTML = '';
                paginationContainer.innerHTML = '';
                renderDetailPlaceholder(detailContainer, true);
                renderFilteredEmptyState(emptyStateContainer);
                return;
            }

            emptyStateContainer.hidden = true;

            const totalPages = Math.max(1, Math.ceil(totalFiltered / state.pageSize));
            let currentPage = view.page || 1;
            if (currentPage > totalPages) {
                currentPage = totalPages;
                updateUrlParams({ page: currentPage }, true);
            }

            let activeOrderId = view.orderId || null;
            if (activeOrderId) {
                const index = filteredAndSorted.findIndex(function(o) { return o.order_id === activeOrderId; });
                if (index === -1) {
                    activeOrderId = null;
                    updateUrlParams({ orderId: null }, true);
                } else {
                    const pageIndex = Math.floor(index / state.pageSize) + 1;
                    if (pageIndex !== currentPage) {
                        currentPage = pageIndex;
                        updateUrlParams({ page: currentPage }, true);
                    }
                }
            }
            state.activeOrderId = activeOrderId;

            const start = (currentPage - 1) * state.pageSize;
            const visibleOrders = filteredAndSorted.slice(start, start + state.pageSize);

            renderOrderList(listContainer, visibleOrders, activeOrderId);
            renderPagination(paginationContainer, currentPage, totalPages);
            renderDetail(detailContainer, activeOrderId);
        }

        function handleReorder(orderId) {
            if (!orderId) return;
            if (!state.reorderState[orderId]) {
                state.reorderState[orderId] = {};
            }
            const entry = state.reorderState[orderId];
            entry.loading = true;
            entry.error = null;
            entry.result = null;
            applyViewState();

            try {
                const result = WebsiteSDK.reorderOrder(orderId);
                if (!result || result.success !== true) {
                    entry.error = 'We could not reorder this order. Please try again.';
                } else {
                    entry.result = result;
                }
            } catch (e) {
                entry.error = 'We could not reorder this order. Please try again.';
            }
            entry.loading = false;
            applyViewState();
        }

        function clearReorderMessage(orderId) {
            if (!orderId) return;
            if (!state.reorderState[orderId]) return;
            state.reorderState[orderId].result = null;
            state.reorderState[orderId].error = null;
            applyViewState();
        }

        function initEventListeners() {
            if (fulfillmentSelect) {
                fulfillmentSelect.addEventListener('change', function() {
                    const value = fulfillmentSelect.value || null;
                    updateUrlParams({ fulfillment: value, page: 1 });
                    applyViewState();
                });
            }

            if (statusSelect) {
                statusSelect.addEventListener('change', function() {
                    const value = statusSelect.value || null;
                    updateUrlParams({ status: value, page: 1 });
                    applyViewState();
                });
            }

            if (startDateInput) {
                startDateInput.addEventListener('change', function() {
                    const value = startDateInput.value || null;
                    updateUrlParams({ startDate: value, page: 1 });
                    applyViewState();
                });
            }

            if (endDateInput) {
                endDateInput.addEventListener('change', function() {
                    const value = endDateInput.value || null;
                    updateUrlParams({ endDate: value, page: 1 });
                    applyViewState();
                });
            }

            if (sortSelect) {
                sortSelect.addEventListener('change', function() {
                    const value = sortSelect.value || null;
                    updateUrlParams({ sort: value, page: 1 });
                    applyViewState();
                });
            }

            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    const value = (searchInput.value || '').trim();
                    if (searchDebounceTimer) {
                        window.clearTimeout(searchDebounceTimer);
                    }
                    searchDebounceTimer = window.setTimeout(function() {
                        updateUrlParams({ search: value || null, page: 1 });
                        applyViewState();
                    }, 300);
                });
            }

            document.addEventListener('click', function(event) {
                const target = event.target.closest('[data-action]');
                if (!target) return;
                const action = target.dataset.action;

                if (action === 'toggle-details') {
                    const orderId = target.dataset.orderId || '';
                    const currentView = readViewStateFromUrl();
                    const newOrderId = currentView.orderId === orderId ? null : orderId;
                    updateUrlParams({ orderId: newOrderId });
                    applyViewState();
                } else if (action === 'clear-active-order') {
                    updateUrlParams({ orderId: null });
                    applyViewState();
                } else if (action === 'reorder-from-list' || action === 'reorder-from-detail') {
                    const orderId = target.dataset.orderId || '';
                    handleReorder(orderId);
                } else if (action === 'go-to-cart') {
                    window.location.href = 'cart.html';
                } else if (action === 'dismiss-reorder-message') {
                    const orderId = target.dataset.orderId || state.activeOrderId || '';
                    clearReorderMessage(orderId);
                } else if (action === 'view-restaurant') {
                    const restaurantId = target.dataset.restaurantId || '';
                    if (restaurantId) {
                        window.location.href = 'restaurant.html?restaurantId=' + encodeURIComponent(restaurantId);
                    }
                } else if (action === 'retry-load-orders') {
                    state.ordersLoaded = false;
                    state.ordersError = null;
                    loadOrderHistory();
                    applyViewState();
                } else if (action === 'retry-order-detail') {
                    const orderId = target.dataset.orderId || '';
                    if (orderId) {
                        state.orderDetails[orderId] = null;
                        state.orderDetailsError[orderId] = null;
                        renderDetail(detailContainer, orderId);
                    }
                } else if (action === 'go-home') {
                    window.location.href = 'index.html';
                } else if (action === 'clear-filters') {
                    updateUrlParams({ fulfillment: null, status: null, startDate: null, endDate: null, search: null, sort: null, page: 1 });
                    applyViewState();
                } else if (action === 'change-page') {
                    const pageStr = target.dataset.page;
                    const page = parseInt(pageStr, 10);
                    if (!Number.isNaN(page) && page >= 1) {
                        updateUrlParams({ page: page });
                        applyViewState();
                    }
                }
            });

            window.addEventListener('popstate', function() {
                applyViewState();
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            loaderOverlay = document.querySelector('[data-component="order-history-data-loader"]');
            listContainer = document.querySelector('[data-component="order-history-list"]');
            detailContainer = document.querySelector('[data-component="order-detail-view"]');
            paginationContainer = document.querySelector('[data-component="order-history-pagination"]');
            emptyStateContainer = document.querySelector('[data-component="order-history-empty-state"]');
            orderCountElement = document.querySelector('[data-populate="order-history"]');

            fulfillmentSelect = document.querySelector('[data-action="filter-fulfillment"]');
            statusSelect = document.querySelector('[data-action="filter-status"]');
            startDateInput = document.querySelector('[data-action="filter-start-date"]');
            endDateInput = document.querySelector('[data-action="filter-end-date"]');
            searchInput = document.querySelector('[data-action="filter-search"]');
            sortSelect = document.querySelector('[data-action="filter-sort"]');

            initEventListeners();

            const populateElements = document.querySelectorAll('[data-populate]');
            populateElements.forEach(function(el) {
                const dataType = el.dataset.populate;
                if (dataType === 'order-history') {
                    loadOrderHistory();
                }
            });

            if (!state.ordersLoaded && !state.ordersError) {
                loadOrderHistory();
            }

            applyViewState();
        });
    })();
    </script>
</body>
</html>
