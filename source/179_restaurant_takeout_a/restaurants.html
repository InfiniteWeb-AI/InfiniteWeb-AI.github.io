<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Takeout &amp; Delivery</title>

    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="restaurants.css">
</head>
<body>
    <header class="site-header" role="banner">
        <div class="header-top">
            <div class="container header-top-inner">
                <a href="index.html" class="site-logo" title="Go to homepage">
                    <span class="logo-mark">S</span>
                    <span class="logo-text">
                        <span class="logo-main">Sushi Takeout</span>
                        <span class="logo-sub">Tea &amp; Roll Cafe</span>
                    </span>
                </a>

                <nav class="primary-nav" aria-label="Primary navigation">
                    <ul class="primary-nav-list">
                        <li class="primary-nav-item">
                            <a href="index.html" title="Homepage to start pickup or delivery orders and see featured options">Home</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="index.html#pickup" title="Jump to the pickup section on the homepage to start a pickup order">Order Pickup</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="index.html#delivery" title="Jump to the delivery section on the homepage to set a delivery location">Delivery</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="restaurants.html" title="View and filter all available restaurants (e.g., Thai, Sushi) before ordering">Browse Restaurants</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="order_history.html" title="View past orders and quickly reorder previous meals">Order History</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="help.html" title="Access help and frequently asked questions about ordering">Help</a>
                        </li>
                    </ul>
                </nav>

                <div class="header-utilities" aria-hidden="true">
                    <div class="header-search">
                        <span class="search-placeholder">Search</span>
                    </div>
                    <span class="header-login">Login</span>
                    <span class="header-cart">Cart (0)</span>
                </div>
            </div>
        </div>
    </header>

    <main id="content" class="page-content" role="main">
        <div class="container">
            <section id="restaurants-page" class="restaurants-page" aria-labelledby="restaurants-page-title">
                <div class="filters-toolbar" data-component="restaurant-filters-toolbar">
                    <div class="filters-toolbar-inner">
                        <div class="filters-primary-row">
                            <div class="filters-title-group">
                                <h1 id="restaurants-page-title" class="page-title">Restaurants</h1>
                            </div>
                            <div class="filters-actions-group">
                                <button type="button" class="btn btn-link clear-filters-btn" data-action="clear-filters">Clear all</button>
                            </div>
                        </div>

                        <div class="filters-controls-row">
                            <div class="filter-group filter-cuisine">
                                <label for="filterCuisine">Cuisine</label>
                                <select id="filterCuisine" name="cuisine" data-action="filter-cuisine">
                                    <option value="">All cuisines</option>
                                </select>
                            </div>

                            <div class="filter-group filter-rating">
                                <label for="filterRating">Minimum rating</label>
                                <select id="filterRating" name="min_rating" data-action="filter-rating">
                                    <option value="">Any rating</option>
                                </select>
                            </div>

                            <div class="filter-group filter-price">
                                <label for="filterPrice">Price level</label>
                                <select id="filterPrice" name="price_level" data-action="filter-price-level">
                                    <option value="">Any price</option>
                                </select>
                            </div>

                            <div class="filter-group filter-delivery-fee">
                                <label for="filterDeliveryFee">Delivery fee</label>
                                <select id="filterDeliveryFee" name="max_delivery_fee" data-action="filter-delivery-fee">
                                    <option value="">Any delivery fee</option>
                                </select>
                            </div>

                            <div class="filter-group filter-sort">
                                <label for="sortBy">Sort by</label>
                                <select id="sortBy" name="sort_by" data-action="sort-change">
                                    <option value="">Recommended</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <section class="restaurants-results" aria-labelledby="restaurants-page-title">
                    <div class="status-message" data-component="loading-and-error-state-handler" aria-live="polite"></div>

                    <div class="restaurants-list" data-component="restaurants-list" data-populate="restaurants" aria-live="polite" aria-busy="false"></div>

                    <nav class="pagination-controls" data-component="pagination-controls" aria-label="Restaurants pagination"></nav>
                </section>
            </section>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container footer-inner">
            <div class="footer-links">
                <a href="about.html" title="Learn more about the brand and ordering platform">About</a>
                <a href="contact.html" title="Contact customer support or send feedback">Contact</a>
                <a href="help.html" title="Help center with frequently asked questions">Help &amp; FAQ</a>
                <a href="policies.html" title="Read terms of use, privacy policy, and service policies">Terms &amp; Privacy</a>
            </div>
            <div class="footer-meta">
                <p class="footer-copy">&copy; 2026 Restaurant Takeout &amp; Delivery Platform</p>
            </div>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        var restaurantsListContainer = document.querySelector('[data-populate="restaurants"]');
        var statusContainer = document.querySelector('[data-component="loading-and-error-state-handler"]');
        var paginationContainer = document.querySelector('[data-component="pagination-controls"]');
        var filterOptionsData = null;
        var lastPageInfo = { page: 1, totalPages: 1 };

        function parseUrlState() {
            var params = new URLSearchParams(window.location.search);
            var state = {};

            var cuisine = params.get('cuisine');
            if (cuisine) {
                state.cuisine = cuisine;
            }

            var minRatingParam = params.get('min_rating');
            if (minRatingParam !== null && minRatingParam !== '') {
                var minRating = parseFloat(minRatingParam);
                if (!Number.isNaN(minRating)) {
                    state.min_rating = minRating;
                }
            }

            var maxDeliveryFeeParam = params.get('max_delivery_fee');
            if (maxDeliveryFeeParam !== null && maxDeliveryFeeParam !== '') {
                var maxFee = parseFloat(maxDeliveryFeeParam);
                if (!Number.isNaN(maxFee)) {
                    state.max_delivery_fee = maxFee;
                }
            }

            var priceLevel = params.get('price_level');
            if (priceLevel) {
                state.price_level = priceLevel;
            }

            var sortBy = params.get('sort_by');
            if (sortBy) {
                state.sort_by = sortBy;
            }

            var pageParam = params.get('page');
            var page = parseInt(pageParam, 10);
            if (!Number.isNaN(page) && page > 0) {
                state.page = page;
            } else {
                state.page = 1;
            }

            return state;
        }

        function updateUrlParams(modifier) {
            var url = new URL(window.location.href);
            var params = url.searchParams;
            modifier(params);
            var newQuery = params.toString();
            var newUrl = url.pathname + (newQuery ? '?' + newQuery : '');
            window.history.pushState({}, '', newUrl);
        }

        function buildFiltersFromState(state) {
            var filters = {};
            if (state.cuisine) {
                filters.primary_cuisine = state.cuisine;
            }
            if (typeof state.min_rating === 'number') {
                filters.min_rating = state.min_rating;
            }
            if (typeof state.max_delivery_fee === 'number') {
                filters.max_delivery_fee = state.max_delivery_fee;
            }
            if (state.price_level) {
                filters.price_level = state.price_level;
            }
            return filters;
        }

        function formatLabel(raw) {
            if (!raw) {
                return '';
            }
            var str = String(raw).replace(/_/g, ' ');
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function formatPriceLevel(level) {
            if (!level) {
                return '';
            }
            var map = {
                cheap: '$',
                moderate: '$$',
                expensive: '$$$',
                premium: '$$$$'
            };
            if (map[level]) {
                return map[level];
            }
            return formatLabel(level);
        }

        function setLoadingStatus(isLoading) {
            if (!statusContainer) {
                return;
            }
            if (isLoading) {
                statusContainer.innerHTML = '<div class="status status-loading">Loading restaurants...</div>';
                if (restaurantsListContainer) {
                    restaurantsListContainer.setAttribute('aria-busy', 'true');
                }
            } else {
                statusContainer.innerHTML = '';
                if (restaurantsListContainer) {
                    restaurantsListContainer.setAttribute('aria-busy', 'false');
                }
            }
        }

        function renderErrorStatus(container, message) {
            if (!container) {
                return;
            }
            container.innerHTML = '<div class="status status-error">' +
                '<p>' + message + '</p>' +
                '<button type="button" class="btn btn-secondary" data-action="retry-restaurants">Retry</button>' +
                '</div>';
        }

        function renderRestaurantsList(container, restaurants) {
            if (!container) {
                return;
            }
            container.innerHTML = '';

            if (!restaurants || restaurants.length === 0) {
                container.innerHTML = '<p class="empty-state">No restaurants match your filters. Try adjusting your selections.</p>';
                return;
            }

            for (var i = 0; i < restaurants.length; i += 1) {
                var rest = restaurants[i];

                var card = document.createElement('article');
                card.className = 'restaurant-card';
                card.setAttribute('tabindex', '0');
                card.dataset.action = 'open-restaurant';
                if (rest.restaurant_id) {
                    card.dataset.restaurantId = rest.restaurant_id;
                }

                var wrapper = document.createElement('div');
                wrapper.className = 'restaurant-card-inner';
                card.appendChild(wrapper);

                var nameEl = document.createElement('h2');
                nameEl.className = 'restaurant-name';
                nameEl.textContent = rest.full_display_name || rest.name || 'Restaurant';
                wrapper.appendChild(nameEl);

                var metaRow = document.createElement('div');
                metaRow.className = 'restaurant-meta';
                wrapper.appendChild(metaRow);

                if (typeof rest.rating === 'number' && rest.rating > 0) {
                    var ratingSpan = document.createElement('span');
                    ratingSpan.className = 'restaurant-rating';
                    var ratingCount = typeof rest.rating_count === 'number' ? rest.rating_count : 0;
                    ratingSpan.textContent = rest.rating.toFixed(1) + ' (' + ratingCount + ')';
                    metaRow.appendChild(ratingSpan);
                }

                if (rest.price_level) {
                    var priceSpan = document.createElement('span');
                    priceSpan.className = 'restaurant-price-level';
                    priceSpan.textContent = formatPriceLevel(rest.price_level);
                    metaRow.appendChild(priceSpan);
                }

                var cuisineRow = document.createElement('div');
                cuisineRow.className = 'restaurant-cuisines';
                var cuisines = [];
                if (rest.display_cuisines && rest.display_cuisines.length) {
                    cuisines = rest.display_cuisines;
                } else if (rest.primary_cuisine) {
                    cuisines = [rest.primary_cuisine];
                }
                if (cuisines.length) {
                    cuisineRow.textContent = cuisines.join(', ');
                    wrapper.appendChild(cuisineRow);
                }

                var infoRow = document.createElement('div');
                infoRow.className = 'restaurant-info-row';

                var timeInfo = '';
                if (typeof rest.min_delivery_time_minutes === 'number' && typeof rest.max_delivery_time_minutes === 'number') {
                    timeInfo = rest.min_delivery_time_minutes + '-' + rest.max_delivery_time_minutes + ' min delivery';
                } else if (typeof rest.min_delivery_time_minutes === 'number') {
                    timeInfo = rest.min_delivery_time_minutes + ' min delivery';
                }
                if (!timeInfo && typeof rest.pickup_estimate_minutes === 'number') {
                    timeInfo = rest.pickup_estimate_minutes + ' min pickup';
                }
                if (timeInfo) {
                    var timeSpan = document.createElement('span');
                    timeSpan.className = 'restaurant-time';
                    timeSpan.textContent = timeInfo;
                    infoRow.appendChild(timeSpan);
                }

                if (typeof rest.delivery_fee === 'number') {
                    var feeSpan = document.createElement('span');
                    feeSpan.className = 'restaurant-delivery-fee';
                    feeSpan.textContent = 'Delivery ' + '$' + rest.delivery_fee.toFixed(2);
                    infoRow.appendChild(feeSpan);
                }

                if (infoRow.childNodes.length > 0) {
                    wrapper.appendChild(infoRow);
                }

                var statusRow = document.createElement('div');
                statusRow.className = 'restaurant-status-row';

                if (typeof rest.is_open === 'boolean') {
                    var openSpan = document.createElement('span');
                    openSpan.className = rest.is_open ? 'badge badge-open' : 'badge badge-closed';
                    openSpan.textContent = rest.is_open ? 'Open now' : 'Closed';
                    statusRow.appendChild(openSpan);
                }

                if (rest.supports_delivery) {
                    var deliveryBadge = document.createElement('span');
                    deliveryBadge.className = 'badge badge-fulfillment';
                    deliveryBadge.textContent = 'Delivery';
                    statusRow.appendChild(deliveryBadge);
                }

                if (rest.supports_pickup) {
                    var pickupBadge = document.createElement('span');
                    pickupBadge.className = 'badge badge-fulfillment';
                    pickupBadge.textContent = 'Pickup';
                    statusRow.appendChild(pickupBadge);
                }

                if (statusRow.childNodes.length > 0) {
                    wrapper.appendChild(statusRow);
                }

                var ctaRow = document.createElement('div');
                ctaRow.className = 'restaurant-cta-row';
                var ctaBtn = document.createElement('button');
                ctaBtn.type = 'button';
                ctaBtn.className = 'btn btn-primary view-menu-btn';
                ctaBtn.dataset.action = 'open-restaurant';
                if (rest.restaurant_id) {
                    ctaBtn.dataset.restaurantId = rest.restaurant_id;
                }
                ctaBtn.textContent = 'View menu';
                ctaRow.appendChild(ctaBtn);
                wrapper.appendChild(ctaRow);

                container.appendChild(card);
            }
        }

        function updatePagination(currentPage, totalPages) {
            if (!paginationContainer) {
                return;
            }
            if (!totalPages || totalPages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            var fragment = document.createDocumentFragment();

            var prevBtn = document.createElement('button');
            prevBtn.type = 'button';
            prevBtn.className = 'pagination-btn pagination-prev';
            prevBtn.dataset.action = 'page-prev';
            prevBtn.textContent = 'Previous';
            if (currentPage <= 1) {
                prevBtn.disabled = true;
            }
            fragment.appendChild(prevBtn);

            for (var p = 1; p <= totalPages; p += 1) {
                var pageBtn = document.createElement('button');
                pageBtn.type = 'button';
                pageBtn.className = 'pagination-btn pagination-page';
                if (p === currentPage) {
                    pageBtn.className += ' is-active';
                }
                pageBtn.dataset.action = 'page-goto';
                pageBtn.dataset.page = String(p);
                pageBtn.textContent = String(p);
                fragment.appendChild(pageBtn);
            }

            var nextBtn = document.createElement('button');
            nextBtn.type = 'button';
            nextBtn.className = 'pagination-btn pagination-next';
            nextBtn.dataset.action = 'page-next';
            nextBtn.textContent = 'Next';
            if (currentPage >= totalPages) {
                nextBtn.disabled = true;
            }
            fragment.appendChild(nextBtn);

            paginationContainer.innerHTML = '';
            paginationContainer.appendChild(fragment);
        }

        function reloadRestaurantsFromUrl() {
            if (!restaurantsListContainer) {
                return;
            }

            var state = parseUrlState();
            var filters = buildFiltersFromState(state);
            var sortBy = state.sort_by || undefined;
            var page = state.page || 1;

            setLoadingStatus(true);

            try {
                var response = WebsiteSDK.getRestaurants(filters, sortBy, page);
                setLoadingStatus(false);

                var restaurants = response && response.restaurants ? response.restaurants : [];
                renderRestaurantsList(restaurantsListContainer, restaurants);

                var currentPage = response && typeof response.page === 'number' ? response.page : page;
                var totalPages = response && typeof response.total_pages === 'number' ? response.total_pages : 1;
                lastPageInfo.page = currentPage;
                lastPageInfo.totalPages = totalPages;
                updatePagination(currentPage, totalPages);
            } catch (error) {
                setLoadingStatus(false);
                if (statusContainer) {
                    renderErrorStatus(statusContainer, 'We could not load restaurants. Please try again.');
                }
                if (restaurantsListContainer) {
                    restaurantsListContainer.innerHTML = '';
                }
                if (paginationContainer) {
                    paginationContainer.innerHTML = '';
                }
            }
        }

        function applyStateToFilterControls(state) {
            var cuisineSelect = document.getElementById('filterCuisine');
            if (cuisineSelect) {
                cuisineSelect.value = state.cuisine || '';
            }

            var ratingSelect = document.getElementById('filterRating');
            if (ratingSelect) {
                if (typeof state.min_rating === 'number') {
                    ratingSelect.value = String(state.min_rating);
                } else {
                    ratingSelect.value = '';
                }
            }

            var priceSelect = document.getElementById('filterPrice');
            if (priceSelect) {
                priceSelect.value = state.price_level || '';
            }

            var feeSelect = document.getElementById('filterDeliveryFee');
            if (feeSelect) {
                if (typeof state.max_delivery_fee === 'number') {
                    feeSelect.value = String(state.max_delivery_fee);
                } else {
                    feeSelect.value = '';
                }
            }

            var sortSelect = document.getElementById('sortBy');
            if (sortSelect) {
                sortSelect.value = state.sort_by || '';
            }
        }

        function populateFilterControls() {
            if (!filterOptionsData) {
                return;
            }

            var cuisines = filterOptionsData.cuisines || [];
            var priceLevels = filterOptionsData.price_levels || [];
            var ratingThresholds = filterOptionsData.rating_thresholds || [];
            var deliveryRanges = filterOptionsData.delivery_fee_ranges || [];
            var sortOptions = filterOptionsData.sort_options || [];

            var cuisineSelect = document.getElementById('filterCuisine');
            if (cuisineSelect) {
                cuisineSelect.innerHTML = '';
                var allCuisineOpt = document.createElement('option');
                allCuisineOpt.value = '';
                allCuisineOpt.textContent = 'All cuisines';
                cuisineSelect.appendChild(allCuisineOpt);
                for (var i = 0; i < cuisines.length; i += 1) {
                    var c = cuisines[i];
                    var opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = formatLabel(c);
                    cuisineSelect.appendChild(opt);
                }
            }

            var ratingSelect = document.getElementById('filterRating');
            if (ratingSelect) {
                ratingSelect.innerHTML = '';
                var anyRatingOpt = document.createElement('option');
                anyRatingOpt.value = '';
                anyRatingOpt.textContent = 'Any rating';
                ratingSelect.appendChild(anyRatingOpt);
                ratingThresholds.sort(function (a, b) { return a - b; });
                for (var j = 0; j < ratingThresholds.length; j += 1) {
                    var r = ratingThresholds[j];
                    var ratingOpt = document.createElement('option');
                    ratingOpt.value = String(r);
                    ratingOpt.textContent = '\u2265 ' + r.toFixed(1);
                    ratingSelect.appendChild(ratingOpt);
                }
            }

            var priceSelect = document.getElementById('filterPrice');
            if (priceSelect) {
                priceSelect.innerHTML = '';
                var anyPriceOpt = document.createElement('option');
                anyPriceOpt.value = '';
                anyPriceOpt.textContent = 'Any price';
                priceSelect.appendChild(anyPriceOpt);
                for (var k = 0; k < priceLevels.length; k += 1) {
                    var level = priceLevels[k];
                    var priceOpt = document.createElement('option');
                    priceOpt.value = level;
                    priceOpt.textContent = formatPriceLevel(level);
                    priceSelect.appendChild(priceOpt);
                }
            }

            var feeSelect = document.getElementById('filterDeliveryFee');
            if (feeSelect) {
                feeSelect.innerHTML = '';
                var anyFeeOpt = document.createElement('option');
                anyFeeOpt.value = '';
                anyFeeOpt.textContent = 'Any delivery fee';
                feeSelect.appendChild(anyFeeOpt);
                for (var m = 0; m < deliveryRanges.length; m += 1) {
                    var range = deliveryRanges[m];
                    var feeOpt = document.createElement('option');
                    var maxFee = typeof range.max_fee === 'number' ? range.max_fee : null;
                    feeOpt.value = maxFee !== null ? String(maxFee) : '';
                    if (range.label) {
                        feeOpt.textContent = range.label;
                    } else if (maxFee !== null) {
                        feeOpt.textContent = 'Up to $' + maxFee.toFixed(2);
                    } else {
                        feeOpt.textContent = 'Any delivery fee';
                    }
                    feeSelect.appendChild(feeOpt);
                }
            }

            var sortSelect = document.getElementById('sortBy');
            if (sortSelect) {
                sortSelect.innerHTML = '';
                var defaultSortOpt = document.createElement('option');
                defaultSortOpt.value = '';
                defaultSortOpt.textContent = 'Recommended';
                sortSelect.appendChild(defaultSortOpt);
                for (var n = 0; n < sortOptions.length; n += 1) {
                    var so = sortOptions[n];
                    var sortOpt = document.createElement('option');
                    sortOpt.value = so.value;
                    sortOpt.textContent = so.label || formatLabel(so.value);
                    sortSelect.appendChild(sortOpt);
                }
            }
        }

        function applyFilterParam(paramName, rawValue) {
            updateUrlParams(function (params) {
                if (rawValue === null || rawValue === undefined || rawValue === '') {
                    params.delete(paramName);
                } else {
                    params.set(paramName, String(rawValue));
                }
                params.delete('page');
            });
            var state = parseUrlState();
            applyStateToFilterControls(state);
            reloadRestaurantsFromUrl();
        }

        function changePage(newPage) {
            var safePage = newPage < 1 ? 1 : newPage;
            updateUrlParams(function (params) {
                params.set('page', String(safePage));
            });
            reloadRestaurantsFromUrl();
        }

        function handleOpenRestaurant(element) {
            var restaurantId = element.dataset.restaurantId;
            if (!restaurantId && element.closest) {
                var withId = element.closest('[data-restaurant-id]');
                if (withId) {
                    restaurantId = withId.dataset.restaurantId;
                }
            }
            if (!restaurantId) {
                return;
            }
            window.location.href = 'restaurant.html?restaurantId=' + encodeURIComponent(restaurantId);
        }

        function handleAction(action, element, event) {
            if (!action) {
                return;
            }
            switch (action) {
                case 'filter-cuisine': {
                    var cuisineValue = element.value || '';
                    applyFilterParam('cuisine', cuisineValue || null);
                    break;
                }
                case 'filter-rating': {
                    var ratingVal = element.value;
                    if (ratingVal === '') {
                        applyFilterParam('min_rating', null);
                    } else {
                        var ratingNum = parseFloat(ratingVal);
                        if (!Number.isNaN(ratingNum)) {
                            applyFilterParam('min_rating', ratingNum);
                        }
                    }
                    break;
                }
                case 'filter-price-level': {
                    var priceVal = element.value || '';
                    applyFilterParam('price_level', priceVal || null);
                    break;
                }
                case 'filter-delivery-fee': {
                    var feeVal = element.value;
                    if (feeVal === '') {
                        applyFilterParam('max_delivery_fee', null);
                    } else {
                        var feeNum = parseFloat(feeVal);
                        if (!Number.isNaN(feeNum)) {
                            applyFilterParam('max_delivery_fee', feeNum);
                        }
                    }
                    break;
                }
                case 'sort-change': {
                    var sortVal = element.value || '';
                    applyFilterParam('sort_by', sortVal || null);
                    break;
                }
                case 'clear-filters': {
                    updateUrlParams(function (params) {
                        params.delete('cuisine');
                        params.delete('min_rating');
                        params.delete('max_delivery_fee');
                        params.delete('price_level');
                        params.delete('sort_by');
                        params.delete('page');
                    });
                    var stateAfterClear = parseUrlState();
                    applyStateToFilterControls(stateAfterClear);
                    reloadRestaurantsFromUrl();
                    break;
                }
                case 'page-goto': {
                    var targetPage = parseInt(element.dataset.page, 10);
                    if (!targetPage || targetPage === lastPageInfo.page) {
                        return;
                    }
                    changePage(targetPage);
                    break;
                }
                case 'page-prev': {
                    var prevPage = lastPageInfo.page - 1;
                    if (prevPage >= 1) {
                        changePage(prevPage);
                    }
                    break;
                }
                case 'page-next': {
                    var nextPage = lastPageInfo.page + 1;
                    if (!lastPageInfo.totalPages || nextPage <= lastPageInfo.totalPages) {
                        changePage(nextPage);
                    }
                    break;
                }
                case 'retry-restaurants': {
                    reloadRestaurantsFromUrl();
                    break;
                }
                case 'open-restaurant': {
                    event.preventDefault();
                    handleOpenRestaurant(element);
                    break;
                }
                default:
                    break;
            }
        }

        function initHeaderNavigation() {
            var cartEl = document.querySelector('.header-cart');
            if (cartEl) {
                cartEl.addEventListener('click', function () {
                    window.location.href = 'cart.html';
                });
            }
        }

        function initFilterControls() {
            try {
                filterOptionsData = WebsiteSDK.getRestaurantFilterOptions();
            } catch (error) {
                if (statusContainer) {
                    renderErrorStatus(statusContainer, 'Unable to load filter options. You can still try reloading restaurants.');
                }
                return;
            }
            populateFilterControls();
            var state = parseUrlState();
            applyStateToFilterControls(state);
        }

        document.addEventListener('click', function (event) {
            var target = event.target.closest('[data-action]');
            if (!target) {
                return;
            }
            if (target.tagName === 'SELECT') {
                return;
            }
            var action = target.dataset.action;
            handleAction(action, target, event);
        });

        document.addEventListener('change', function (event) {
            var target = event.target.closest('[data-action]');
            if (!target) {
                return;
            }
            var action = target.dataset.action;
            handleAction(action, target, event);
        });

        document.addEventListener('keydown', function (event) {
            if (event.key !== 'Enter' && event.key !== ' ') {
                return;
            }
            var target = event.target.closest('[data-action="open-restaurant"]');
            if (!target) {
                return;
            }
            event.preventDefault();
            handleAction('open-restaurant', target, event);
        });

        window.addEventListener('popstate', function () {
            var state = parseUrlState();
            applyStateToFilterControls(state);
            reloadRestaurantsFromUrl();
        });

        initHeaderNavigation();
        initFilterControls();
        reloadRestaurantsFromUrl();
    });
    </script>
</body>
</html>
