<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Restaurant Takeout &amp; Delivery</title>

    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <header class="site-header" role="banner">
        <div class="header-top">
            <div class="container header-top-inner">
                <a href="index.html" class="site-logo" title="Go to homepage">
                    <span class="logo-mark">S</span>
                    <span class="logo-text">
                        <span class="logo-main">Sushi Takeout</span>
                        <span class="logo-sub">Tea &amp; Roll Cafe</span>
                    </span>
                </a>

                <nav class="primary-nav" aria-label="Primary navigation">
                    <ul class="primary-nav-list">
                        <li class="primary-nav-item">
                            <a href="index.html" title="Homepage to start pickup or delivery orders and see featured options">Home</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="index.html#pickup" title="Jump to the pickup section on the homepage to start a pickup order">Order Pickup</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="index.html#delivery" title="Jump to the delivery section on the homepage to set a delivery location">Delivery</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="restaurants.html" title="View and filter all available restaurants (e.g., Thai, Sushi) before ordering">Browse Restaurants</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="order_history.html" title="View past orders and quickly reorder previous meals">Order History</a>
                        </li>
                        <li class="primary-nav-item">
                            <a href="help.html" title="Access help and frequently asked questions about ordering">Help</a>
                        </li>
                    </ul>
                </nav>

                <div class="header-utilities" aria-hidden="true">
                    <div class="header-search">
                        <span class="search-placeholder">Search</span>
                    </div>
                    <span class="header-login">Login</span>
                    <span class="header-cart">Cart (0)</span>
                </div>
            </div>
        </div>
    </header>

    <main id="content" class="page-content" role="main">
        <div class="container">
            <div class="cart-page" data-component="cart-page">
                <div class="cart-error-bar" aria-live="polite" hidden></div>

                <div class="cart-loader-overlay is-hidden" data-component="cart-init-loader" aria-hidden="true">
                    <div class="cart-loader-panel">
                        <div class="cart-loader-spinner" aria-hidden="true"></div>
                        <p class="cart-loader-text">Loading your cart…</p>
                    </div>
                </div>

                <div class="cart-layout" aria-live="polite">
                    <div class="cart-layout-left">
                        <section class="cart-header-summary card" data-component="cart-header-summary" data-populate="cart-header-summary" aria-label="Cart context">
                            <!-- Populated via JavaScript -->
                        </section>

                        <section class="cart-budget-helper is-hidden" data-component="cart-budget-helper" data-populate="cart-budget-helper" aria-label="Budget guidance" aria-live="polite">
                            <!-- Populated via JavaScript -->
                        </section>

                        <section class="cart-item-list card" data-component="cart-item-list" data-populate="cart-item-list" aria-label="Cart items">
                            <!-- Populated via JavaScript -->
                        </section>

                        <section class="cart-cutlery card" data-component="cart-cutlery-selector" data-populate="cart-cutlery-selector" aria-label="Cutlery and utensils">
                            <!-- Populated via JavaScript -->
                        </section>
                    </div>

                    <aside class="cart-layout-right" aria-label="Order summary and actions">
                        <section class="cart-totals card" data-component="cart-totals-summary" data-populate="cart-totals-summary">
                            <!-- Populated via JavaScript -->
                        </section>

                        <section class="cart-primary-actions" data-component="cart-primary-actions-bar" data-populate="cart-primary-actions-bar">
                            <!-- Populated via JavaScript -->
                        </section>
                    </aside>
                </div>

                <section class="cart-empty-state card is-hidden" data-component="cart-empty-state" data-populate="cart-empty-state" aria-label="Empty cart" aria-live="polite">
                    <!-- Populated via JavaScript -->
                </section>
            </div>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container footer-inner">
            <div class="footer-links">
                <a href="about.html" title="Learn more about the brand and ordering platform">About</a>
                <a href="contact.html" title="Contact customer support or send feedback">Contact</a>
                <a href="help.html" title="Help center with frequently asked questions">Help &amp; FAQ</a>
                <a href="policies.html" title="Read terms of use, privacy policy, and service policies">Terms &amp; Privacy</a>
            </div>
            <div class="footer-meta">
                <p class="footer-copy">&copy; 2026 Restaurant Takeout &amp; Delivery Platform</p>
            </div>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);

        var viewState = {
            budgetMin: null,
            budgetMax: null,
            budgetMode: 'advisory',
            lastBudgetState: null,
            lastCart: null
        };

        var budgetMinParam = urlParams.get('budgetMin');
        if (budgetMinParam !== null && budgetMinParam !== '') {
            var minVal = parseFloat(budgetMinParam);
            if (!isNaN(minVal)) {
                viewState.budgetMin = minVal;
            }
        }

        var budgetMaxParam = urlParams.get('budgetMax');
        if (budgetMaxParam !== null && budgetMaxParam !== '') {
            var maxVal = parseFloat(budgetMaxParam);
            if (!isNaN(maxVal)) {
                viewState.budgetMax = maxVal;
            }
        }

        var budgetModeParam = urlParams.get('budgetMode');
        if (budgetModeParam) {
            viewState.budgetMode = String(budgetModeParam).toLowerCase();
        }

        var currentCart = null;

        function escapeHtml(str) {
            if (str === null || str === undefined) {
                return '';
            }
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatMoney(value) {
            var num = typeof value === 'number' && !isNaN(value) ? value : 0;
            return '$' + num.toFixed(2);
        }

        function showCartError(message) {
            var bar = document.querySelector('.cart-error-bar');
            if (!bar) {
                return;
            }
            bar.textContent = message || 'Something went wrong. Please try again.';
            bar.hidden = false;
        }

        function clearCartError() {
            var bar = document.querySelector('.cart-error-bar');
            if (!bar) {
                return;
            }
            bar.textContent = '';
            bar.hidden = true;
        }

        function computeBudgetState(cart, state) {
            var min = state.budgetMin;
            var max = state.budgetMax;
            var mode = state.budgetMode;
            var subtotal = typeof cart.items_subtotal === 'number' ? cart.items_subtotal : 0;
            var hasBudget = typeof min === 'number' || typeof max === 'number';

            var result = {
                hasBudget: hasBudget,
                min: min,
                max: max,
                subtotal: subtotal,
                mode: mode,
                isUnderBudget: false,
                isOverBudget: false,
                isWithinBudget: true,
                enforced: mode === 'required',
                toneClass: 'budget-state--neutral',
                statusLabel: '',
                message: ''
            };

            if (!hasBudget) {
                return result;
            }

            if (typeof min === 'number' && subtotal < min) {
                result.isUnderBudget = true;
            }
            if (typeof max === 'number' && subtotal > max) {
                result.isOverBudget = true;
            }
            result.isWithinBudget = !result.isUnderBudget && !result.isOverBudget;

            var statusLabel = 'On target';
            var message = '';

            if (result.isUnderBudget) {
                statusLabel = 'Below budget';
                if (typeof max === 'number') {
                    message = 'Your items subtotal is ' + formatMoney(subtotal) + '. Aim for at least ' + formatMoney(min) + ' (up to ' + formatMoney(max) + ').';
                } else {
                    message = 'Your items subtotal is ' + formatMoney(subtotal) + '. Aim for at least ' + formatMoney(min) + '.';
                }
            } else if (result.isOverBudget) {
                statusLabel = 'Above budget';
                if (typeof min === 'number') {
                    message = 'Your items subtotal is ' + formatMoney(subtotal) + '. Try to stay at or below ' + formatMoney(max) + ' (minimum ' + formatMoney(min) + ').';
                } else {
                    message = 'Your items subtotal is ' + formatMoney(subtotal) + '. Try to stay at or below ' + formatMoney(max) + '.';
                }
            } else {
                statusLabel = 'Within budget';
                if (typeof min === 'number' && typeof max === 'number') {
                    message = 'Your items subtotal is ' + formatMoney(subtotal) + ', within the target range of ' + formatMoney(min) + '–' + formatMoney(max) + '.';
                } else if (typeof min === 'number') {
                    message = 'Your items subtotal is ' + formatMoney(subtotal) + ', at or above the target minimum of ' + formatMoney(min) + '.';
                } else if (typeof max === 'number') {
                    message = 'Your items subtotal is ' + formatMoney(subtotal) + ', at or below the target maximum of ' + formatMoney(max) + '.';
                }
            }

            result.statusLabel = statusLabel;
            result.message = message;
            result.toneClass = result.isWithinBudget ? 'budget-state--ok' : (result.isUnderBudget ? 'budget-state--under' : 'budget-state--over');

            return result;
        }

        function renderCartHeaderSummary(container, cart, state) {
            var restaurant = cart.restaurant || {};
            var fullName = restaurant.full_display_name || 'Selected restaurant';
            var fulfillmentType = cart.fulfillment_type === 'pickup' ? 'pickup' : 'delivery';
            var fulfillmentLabel = fulfillmentType === 'pickup' ? 'Pickup order' : 'Delivery order';
            var locationLabel = '';

            if (fulfillmentType === 'pickup') {
                locationLabel = restaurant.pickup_location_label || restaurant.address_line1 || '';
            } else {
                if (cart.delivery_postal_code) {
                    locationLabel = cart.delivery_postal_code;
                } else if (restaurant.postal_code) {
                    locationLabel = restaurant.postal_code;
                }
            }

            container.innerHTML = '' +
                '<div class="cart-header-text">' +
                    '<h1 class="cart-title">Your order</h1>' +
                    '<p class="cart-restaurant-name">' + escapeHtml(fullName) + '</p>' +
                    '<div class="cart-header-meta">' +
                        '<span class="cart-fulfillment-type">' + escapeHtml(fulfillmentLabel) + '</span>' +
                        (locationLabel ? '<span class="cart-location">' + escapeHtml(locationLabel) + '</span>' : '') +
                    '</div>' +
                '</div>' +
                '<div class="cart-header-actions">' +
                    '<button type="button" class="link-button cart-back-to-menu" data-action="back-to-menu">Back to menu</button>' +
                '</div>';
        }

        function renderCartBudgetHelper(container, cart, state) {
            var budgetState = computeBudgetState(cart, state);
            state.lastBudgetState = budgetState;

            container.classList.remove('budget-state--ok', 'budget-state--under', 'budget-state--over');

            if (!budgetState.hasBudget) {
                container.innerHTML = '';
                container.classList.add('is-hidden');
                return;
            }

            container.classList.remove('is-hidden');
            container.classList.add(budgetState.toneClass);

            var enforcedMessage = '';
            if (budgetState.enforced && !budgetState.isWithinBudget) {
                enforcedMessage = '<span class="budget-helper-enforced">You must adjust your order before continuing.</span>';
            }

            container.innerHTML = '' +
                '<div class="budget-helper-inner">' +
                    '<span class="budget-helper-status">' + escapeHtml(budgetState.statusLabel) + '</span>' +
                    '<span class="budget-helper-message">' + escapeHtml(budgetState.message) + '</span>' +
                    enforcedMessage +
                '</div>';
        }

        function renderCartItemList(container, cart) {
            var items = Array.isArray(cart.items) ? cart.items : [];

            if (!items.length) {
                container.innerHTML = '<p class="cart-items-empty">No items in your cart yet.</p>';
                return;
            }

            var html = '';

            items.forEach(function(item) {
                var options = Array.isArray(item.options) ? item.options : [];
                var optionsHtml = '';

                if (options.length) {
                    var optsHtml = options.map(function(opt) {
                        var priceDelta = typeof opt.price_delta === 'number' && opt.price_delta !== 0 ? opt.price_delta : 0;
                        var priceHtml = '';
                        if (priceDelta) {
                            var sign = priceDelta >= 0 ? '+' : '-';
                            priceHtml = ' <span class="option-price">(' + sign + formatMoney(Math.abs(priceDelta)) + ')</span>';
                        }
                        return '' +
                            '<li class="cart-item-option">' +
                                (opt.group_name ? '<span class="option-group">' + escapeHtml(opt.group_name) + ': </span>' : '') +
                                '<span class="option-name">' + escapeHtml(opt.name) + '</span>' +
                                priceHtml +
                            '</li>';
                    }).join('');

                    optionsHtml = '<ul class="cart-item-options">' + optsHtml + '</ul>';
                }

                var dietary = [];
                if (item.is_vegetarian) {
                    dietary.push('Vegetarian');
                }
                if (item.is_vegan) {
                    dietary.push('Vegan');
                }
                if (item.is_gluten_free) {
                    dietary.push('Gluten-free');
                }
                if (item.contains_nuts) {
                    dietary.push('Contains nuts');
                }

                var dietaryHtml = '';
                if (dietary.length) {
                    dietaryHtml = '<div class="cart-item-dietary">' + dietary.map(function(label) {
                        return '<span class="dietary-pill">' + escapeHtml(label) + '</span>';
                    }).join('') + '</div>';
                }

                var sizeLabel = item.selected_size ? '<span class="cart-item-size">' + escapeHtml(item.selected_size) + '</span>' : '';
                var caloriesLabel = typeof item.calories === 'number' && item.calories > 0 ? '<span class="cart-item-calories">' + item.calories + ' cal</span>' : '';
                var notesHtml = item.special_instructions ? '<div class="cart-item-notes">Notes: ' + escapeHtml(item.special_instructions) + '</div>' : '';

                var unitPrice = typeof item.unit_price === 'number' ? item.unit_price : 0;
                var lineSubtotal = typeof item.line_subtotal === 'number' ? item.line_subtotal : unitPrice * (item.quantity || 1);

                html += '' +
                    '<article class="cart-item-row" data-component="cart-item-row" data-cart-item-id="' + escapeHtml(item.cart_item_id) + '">' +
                        '<div class="cart-item-main">' +
                            '<h2 class="cart-item-name">' + escapeHtml(item.menu_item_name) + '</h2>' +
                            '<div class="cart-item-meta">' +
                                sizeLabel +
                                (sizeLabel && caloriesLabel ? ' · ' : '') +
                                caloriesLabel +
                            '</div>' +
                            optionsHtml +
                            dietaryHtml +
                            notesHtml +
                            '<button type="button" class="link-button cart-item-replace" data-action="replace-item">Replace item</button>' +
                        '</div>' +
                        '<div class="cart-item-side">' +
                            '<div class="cart-item-pricing">' +
                                '<span class="cart-item-unit-price">' + formatMoney(unitPrice) + ' each</span>' +
                                '<span class="cart-item-line-subtotal">' + formatMoney(lineSubtotal) + '</span>' +
                            '</div>' +
                            '<div class="cart-item-controls">' +
                                '<div class="quantity-control" data-component="cart-quantity-control">' +
                                    '<button type="button" class="quantity-btn quantity-decrease" data-action="decrease-quantity" aria-label="Decrease quantity">-</button>' +
                                    '<input type="number" min="0" step="1" class="quantity-input" data-action="quantity-input" value="' + (item.quantity || 1) + '" aria-label="Quantity">' +
                                    '<button type="button" class="quantity-btn quantity-increase" data-action="increase-quantity" aria-label="Increase quantity">+</button>' +
                                '</div>' +
                                '<button type="button" class="link-button cart-item-remove" data-action="remove-item">Remove</button>' +
                            '</div>' +
                        '</div>' +
                    '</article>';
            });

            container.innerHTML = html;
        }

        function renderCartCutlerySelector(container, cart) {
            var current = typeof cart.cutlery_sets === 'number' && !isNaN(cart.cutlery_sets) ? cart.cutlery_sets : 0;

            container.innerHTML = '' +
                '<div class="cutlery-header">' +
                    '<h2 class="cutlery-title">Cutlery &amp; utensils</h2>' +
                    '<p class="cutlery-help">Tell us how many sets of cutlery you need for this order.</p>' +
                '</div>' +
                '<div class="cutlery-control" data-component="cart-cutlery-selector">' +
                    '<button type="button" class="quantity-btn cutlery-decrease" data-action="decrease-cutlery" aria-label="Decrease cutlery sets">-</button>' +
                    '<input type="number" min="0" step="1" class="quantity-input cutlery-input" data-action="cutlery-input" value="' + current + '" aria-label="Number of cutlery sets">' +
                    '<button type="button" class="quantity-btn cutlery-increase" data-action="increase-cutlery" aria-label="Increase cutlery sets">+</button>' +
                    '<span class="cutlery-label">sets</span>' +
                '</div>';
        }

        function renderCartTotalsSummary(container, cart) {
            var subtotal = typeof cart.items_subtotal === 'number' ? cart.items_subtotal : 0;
            var discount = typeof cart.discount_total === 'number' ? cart.discount_total : 0;
            var deliveryFee = typeof cart.delivery_fee === 'number' ? cart.delivery_fee : 0;
            var taxTotal = typeof cart.tax_total === 'number' ? cart.tax_total : 0;
            var total = typeof cart.total === 'number' ? cart.total : 0;
            var promo = cart.promo_code || null;

            var hasDiscount = discount > 0;
            var hasDeliveryFee = deliveryFee > 0;
            var hasPromo = promo && promo.code;

            container.innerHTML = '' +
                '<h2 class="totals-title">Order summary</h2>' +
                '<dl class="totals-list">' +
                    '<div class="totals-row">' +
                        '<dt>Items subtotal</dt>' +
                        '<dd>' + formatMoney(subtotal) + '</dd>' +
                    '</div>' +
                    (hasDiscount ? (
                        '<div class="totals-row totals-row-discount">' +
                            '<dt>Discounts</dt>' +
                            '<dd>- ' + formatMoney(discount) + '</dd>' +
                        '</div>'
                    ) : '') +
                    '<div class="totals-row">' +
                        '<dt>Delivery fee</dt>' +
                        '<dd>' + (hasDeliveryFee ? formatMoney(deliveryFee) : 'Free') + '</dd>' +
                    '</div>' +
                    '<div class="totals-row">' +
                        '<dt>Tax</dt>' +
                        '<dd>' + formatMoney(taxTotal) + '</dd>' +
                    '</div>' +
                    '<div class="totals-row totals-row-total">' +
                        '<dt>Total</dt>' +
                        '<dd>' + formatMoney(total) + '</dd>' +
                    '</div>' +
                '</dl>' +
                (hasPromo ? (
                    '<div class="totals-promo">' +
                        '<span class="promo-label">Promo code:</span>' +
                        '<span class="promo-code">' + escapeHtml(promo.code) + '</span>' +
                        (promo.description ? '<span class="promo-description">' + escapeHtml(promo.description) + '</span>' : '') +
                    '</div>'
                ) : '');
        }

        function renderCartPrimaryActions(container, cart, state) {
            var items = Array.isArray(cart.items) ? cart.items : [];

            if (!items.length) {
                container.innerHTML = '';
                container.classList.add('is-hidden');
                return;
            }

            container.classList.remove('is-hidden');

            var fulfillmentType = cart.fulfillment_type === 'pickup' ? 'pickup' : 'delivery';
            var primaryLabel = fulfillmentType === 'pickup' ? 'Continue to pickup time' : 'Proceed to checkout';
            var budgetState = state.lastBudgetState || computeBudgetState(cart, state);
            var enforceBlocked = budgetState.enforced && !budgetState.isWithinBudget;

            var advisoryMessage = '';
            if (budgetState.hasBudget && !budgetState.enforced && !budgetState.isWithinBudget) {
                advisoryMessage = 'You are currently outside your target budget, but you can continue.';
            }

            var requiredMessage = '';
            if (enforceBlocked) {
                requiredMessage = 'Adjust quantities or items to meet the budget range before continuing.';
            }

            container.innerHTML = '' +
                '<button type="button" class="btn btn-primary cart-primary-button" data-action="primary-continue"' + (enforceBlocked ? ' disabled' : '') + '>' +
                    escapeHtml(primaryLabel) +
                '</button>' +
                '<div class="cart-primary-secondary">' +
                    '<button type="button" class="link-button" data-action="back-to-menu">Continue shopping</button>' +
                '</div>' +
                '<div class="cart-primary-messages">' +
                    (requiredMessage ? '<p class="validation-message validation-error">' + escapeHtml(requiredMessage) + '</p>' : '') +
                    (advisoryMessage ? '<p class="validation-message validation-advisory">' + escapeHtml(advisoryMessage) + '</p>' : '') +
                '</div>';
        }

        function renderCartEmptyState(container, cart, state) {
            var items = Array.isArray(cart.items) ? cart.items : [];
            var layout = document.querySelector('.cart-layout');

            if (items.length) {
                container.innerHTML = '';
                container.classList.add('is-hidden');
                if (layout) {
                    layout.classList.remove('is-hidden');
                }
                return;
            }

            if (layout) {
                layout.classList.add('is-hidden');
            }

            container.classList.remove('is-hidden');

            var restaurant = cart.restaurant || null;
            var hasRestaurant = restaurant && restaurant.restaurant_id;
            var primaryActionLabel = hasRestaurant ? 'Browse menu' : 'Back to home';
            var primaryActionData = hasRestaurant ? 'empty-continue-menu' : 'empty-go-home';

            container.innerHTML = '' +
                '<div class="cart-empty-inner">' +
                    '<h1 class="cart-empty-title">Your cart is empty</h1>' +
                    '<p class="cart-empty-text">Add some items from the menu to start an order.</p>' +
                    '<button type="button" class="btn btn-primary" data-action="' + primaryActionData + '">' + escapeHtml(primaryActionLabel) + '</button>' +
                '</div>';
        }

        function updateHeaderCartSummary(cart) {
            var headerCart = document.querySelector('.header-cart');
            if (!headerCart) {
                return;
            }
            var items = Array.isArray(cart.items) ? cart.items : [];
            var count = items.reduce(function(sum, item) {
                var qty = typeof item.quantity === 'number' ? item.quantity : 0;
                return sum + qty;
            }, 0);
            headerCart.textContent = 'Cart (' + count + ')';
        }

        function refreshCart() {
            clearCartError();
            var loader = document.querySelector('[data-component="cart-init-loader"]');
            if (loader) {
                loader.classList.remove('is-hidden');
            }

            var cart = null;

            try {
                cart = WebsiteSDK.getCart();
            } catch (error) {
                showCartError('We could not load your cart. Please try again.');
            }

            if (!cart) {
                cart = {
                    items: [],
                    items_subtotal: 0,
                    discount_total: 0,
                    delivery_fee: 0,
                    tax_total: 0,
                    total: 0
                };
            }

            currentCart = cart;
            viewState.lastCart = cart;
            viewState.lastBudgetState = computeBudgetState(cart, viewState);

            var headerContainers = document.querySelectorAll('[data-populate="cart-header-summary"]');
            headerContainers.forEach(function(el) {
                renderCartHeaderSummary(el, cart, viewState);
            });

            var budgetContainers = document.querySelectorAll('[data-populate="cart-budget-helper"]');
            budgetContainers.forEach(function(el) {
                renderCartBudgetHelper(el, cart, viewState);
            });

            var itemListContainers = document.querySelectorAll('[data-populate="cart-item-list"]');
            itemListContainers.forEach(function(el) {
                renderCartItemList(el, cart);
            });

            var cutleryContainers = document.querySelectorAll('[data-populate="cart-cutlery-selector"]');
            cutleryContainers.forEach(function(el) {
                renderCartCutlerySelector(el, cart);
            });

            var totalsContainers = document.querySelectorAll('[data-populate="cart-totals-summary"]');
            totalsContainers.forEach(function(el) {
                renderCartTotalsSummary(el, cart);
            });

            var primaryActionContainers = document.querySelectorAll('[data-populate="cart-primary-actions-bar"]');
            primaryActionContainers.forEach(function(el) {
                renderCartPrimaryActions(el, cart, viewState);
            });

            var emptyStateContainers = document.querySelectorAll('[data-populate="cart-empty-state"]');
            emptyStateContainers.forEach(function(el) {
                renderCartEmptyState(el, cart, viewState);
            });

            updateHeaderCartSummary(cart);

            if (loader) {
                loader.classList.add('is-hidden');
            }
        }

        function findCartItemIdFromElement(element) {
            var row = element.closest('.cart-item-row');
            if (!row) {
                return null;
            }
            return row.getAttribute('data-cart-item-id');
        }

        function handleUpdateQuantity(cartItemId, quantity) {
            if (!cartItemId) {
                return;
            }
            var newQty = parseInt(quantity, 10);
            if (isNaN(newQty)) {
                return;
            }
            if (newQty <= 0) {
                handleRemoveItem(cartItemId, false);
                return;
            }
            try {
                var response = WebsiteSDK.updateCartItemQuantity(cartItemId, newQty);
                if (response && response.success) {
                    refreshCart();
                } else {
                    showCartError('Could not update quantity. Please try again.');
                }
            } catch (error) {
                showCartError('Could not update quantity. Please try again.');
            }
        }

        function handleRemoveItem(cartItemId, askConfirm) {
            if (!cartItemId) {
                return;
            }
            var shouldConfirm = askConfirm !== false;
            if (shouldConfirm) {
                var ok = window.confirm('Remove this item from your order?');
                if (!ok) {
                    return;
                }
            }
            try {
                var response = WebsiteSDK.removeCartItem(cartItemId);
                if (response && response.success) {
                    refreshCart();
                } else {
                    showCartError('Could not remove item. Please try again.');
                }
            } catch (error) {
                showCartError('Could not remove item. Please try again.');
            }
        }

        function handleCutleryChange(newValue) {
            var value = parseInt(newValue, 10);
            if (isNaN(value) || value < 0) {
                value = 0;
            }
            try {
                var response = WebsiteSDK.updateCartCutlerySets(value);
                if (response && response.success) {
                    refreshCart();
                } else {
                    showCartError('Could not update cutlery sets. Please try again.');
                }
            } catch (error) {
                showCartError('Could not update cutlery sets. Please try again.');
            }
        }

        function handleNavigateToRestaurant() {
            if (!currentCart || !currentCart.restaurant || !currentCart.restaurant.restaurant_id) {
                window.location.href = 'index.html';
                return;
            }
            var restaurantId = currentCart.restaurant.restaurant_id;
            var target = 'restaurant.html?restaurantId=' + encodeURIComponent(restaurantId);
            window.location.href = target;
        }

        function handleReplaceItem(element) {
            if (!currentCart || !currentCart.restaurant || !currentCart.restaurant.restaurant_id) {
                return;
            }
            var cartItemId = findCartItemIdFromElement(element);
            if (!cartItemId) {
                return;
            }
            var restaurantId = currentCart.restaurant.restaurant_id;
            var target = 'restaurant.html?restaurantId=' + encodeURIComponent(restaurantId) + '&replaceCartItemId=' + encodeURIComponent(cartItemId);
            window.location.href = target;
        }

        function handlePrimaryContinue() {
            if (!currentCart) {
                return;
            }
            var budgetState = viewState.lastBudgetState || computeBudgetState(currentCart, viewState);
            if (budgetState.enforced && !budgetState.isWithinBudget) {
                refreshCart();
                return;
            }
            var fulfillmentType = currentCart.fulfillment_type === 'pickup' ? 'pickup' : 'delivery';
            var base = fulfillmentType === 'pickup' ? 'pickup_time.html' : 'checkout.html';
            var paramsString = urlParams.toString();
            var href = paramsString ? (base + '?' + paramsString) : base;
            window.location.href = href;
        }

        document.addEventListener('click', function(event) {
            var actionEl = event.target.closest('[data-action]');
            if (!actionEl) {
                return;
            }
            var action = actionEl.getAttribute('data-action');

            switch (action) {
                case 'back-to-menu':
                    handleNavigateToRestaurant();
                    break;
                case 'empty-continue-menu':
                    handleNavigateToRestaurant();
                    break;
                case 'empty-go-home':
                    window.location.href = 'index.html';
                    break;
                case 'increase-quantity': {
                    var rowInc = actionEl.closest('.cart-item-row');
                    if (!rowInc) {
                        return;
                    }
                    var inputInc = rowInc.querySelector('.quantity-input[data-action="quantity-input"]');
                    var cartItemIdInc = findCartItemIdFromElement(actionEl);
                    var currentVal = inputInc ? parseInt(inputInc.value, 10) : 0;
                    if (isNaN(currentVal)) {
                        currentVal = 0;
                    }
                    handleUpdateQuantity(cartItemIdInc, currentVal + 1);
                    break;
                }
                case 'decrease-quantity': {
                    var rowDec = actionEl.closest('.cart-item-row');
                    if (!rowDec) {
                        return;
                    }
                    var inputDec = rowDec.querySelector('.quantity-input[data-action="quantity-input"]');
                    var cartItemIdDec = findCartItemIdFromElement(actionEl);
                    var currentValDec = inputDec ? parseInt(inputDec.value, 10) : 0;
                    if (isNaN(currentValDec)) {
                        currentValDec = 0;
                    }
                    var newQty = currentValDec - 1;
                    handleUpdateQuantity(cartItemIdDec, newQty);
                    break;
                }
                case 'remove-item': {
                    var cartItemIdRem = findCartItemIdFromElement(actionEl);
                    handleRemoveItem(cartItemIdRem, true);
                    break;
                }
                case 'replace-item':
                    handleReplaceItem(actionEl);
                    break;
                case 'increase-cutlery': {
                    var cutleryRootInc = actionEl.closest('.cart-cutlery');
                    var cutleryInputInc = cutleryRootInc ? cutleryRootInc.querySelector('.cutlery-input[data-action="cutlery-input"]') : document.querySelector('.cutlery-input[data-action="cutlery-input"]');
                    var currentCutleryInc = cutleryInputInc ? parseInt(cutleryInputInc.value, 10) : 0;
                    if (isNaN(currentCutleryInc)) {
                        currentCutleryInc = 0;
                    }
                    handleCutleryChange(currentCutleryInc + 1);
                    break;
                }
                case 'decrease-cutlery': {
                    var cutleryRootDec = actionEl.closest('.cart-cutlery');
                    var cutleryInputDec = cutleryRootDec ? cutleryRootDec.querySelector('.cutlery-input[data-action="cutlery-input"]') : document.querySelector('.cutlery-input[data-action="cutlery-input"]');
                    var currentCutleryDec = cutleryInputDec ? parseInt(cutleryInputDec.value, 10) : 0;
                    if (isNaN(currentCutleryDec)) {
                        currentCutleryDec = 0;
                    }
                    handleCutleryChange(currentCutleryDec - 1);
                    break;
                }
                case 'primary-continue':
                    handlePrimaryContinue();
                    break;
                default:
                    break;
            }
        });

        document.addEventListener('change', function(event) {
            var target = event.target;
            if (!target || !target.getAttribute) {
                return;
            }
            var action = target.getAttribute('data-action');

            if (action === 'quantity-input') {
                var cartItemId = findCartItemIdFromElement(target);
                handleUpdateQuantity(cartItemId, target.value);
            } else if (action === 'cutlery-input') {
                handleCutleryChange(target.value);
            }
        });

        refreshCart();
    });
    </script>
</body>
</html>
