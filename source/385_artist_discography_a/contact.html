<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Contact - Artist Discography</title>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='contact.css'>
  <script src='business_logic.js'></script>
</head>
<body>
  <div class='page-background'>
    <div class='page-container'>
      <header class='site-header'>
        <h1 class='site-title'>Artist Discography</h1>
        <nav class='site-nav' aria-label='Primary'>
          <ul>
            <li><a href='index.html'>Home</a></li>
            <li><a href='genres.html'>Browse Genres</a></li>
            <li><a href='library.html'>Library</a></li>
            <li><a href='playlists.html'>Playlists</a></li>
            <li><a href='favorites.html'>Favorites</a></li>
            <li><a href='queue.html'>Queue</a></li>
          </ul>
        </nav>
      </header>

      <main id='content' class='site-main' role='main'>
        <section class='contact-page-panel' data-component='contact-page-controller'>
          <h1 class='page-title'>Contact</h1>

          <div data-component='contact-info-panel' data-populate='contact-info'></div>

          <div data-component='submission-status-banner' aria-live='polite' role='status' hidden></div>

          <section class='contact-form-section' aria-labelledby='contact-form-heading'>
            <h2 id='contact-form-heading'>Send a message</h2>
            <form data-component='contact-form' novalidate>
              <div class='form-field'>
                <label for='contact-name'>Name</label>
                <input type='text' id='contact-name' name='name' required>
                <div class='field-error' data-error-for='name' aria-live='polite'></div>
              </div>

              <div class='form-field'>
                <label for='contact-email'>Email</label>
                <input type='email' id='contact-email' name='email' required>
                <div class='field-error' data-error-for='email' aria-live='polite'></div>
              </div>

              <div class='form-field'>
                <label for='contact-subject'>Subject</label>
                <input type='text' id='contact-subject' name='subject' required>
                <div class='field-error' data-error-for='subject' aria-live='polite'></div>
              </div>

              <div class='form-field'>
                <label for='contact-message'>Message</label>
                <textarea id='contact-message' name='message' rows='6' required></textarea>
                <div class='field-error' data-error-for='message' aria-live='polite'></div>
              </div>

              <div class='form-actions'>
                <button type='submit' data-action='submit-contact-form'>Send message</button>
                <button type='button' data-action='reset-contact-form'>Reset</button>
              </div>
            </form>
          </section>

          <hr>
          <p><a href='javascript:void(0)' data-action='back-to-discography'>Back to discography</a></p>
        </section>
      </main>

      <footer class='site-footer'>
        <hr class='footer-divider'>
        <nav class='footer-nav' aria-label='Footer'>
          <ul>
            <li><a href='about.html'>About</a></li>
            <li><a href='help.html'>Help / FAQ</a></li>
            <li><a href='contact.html'>Contact</a></li>
            <li><a href='bookmarks.html'>Bookmarks</a></li>
            <li><a href='lists.html'>Lists</a></li>
          </ul>
        </nav>
        <p class='footer-meta'>&copy; Artist Discography</p>
      </footer>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var contactInfoContainer = document.querySelector('[data-populate=contact-info]');
      var bannerContainer = document.querySelector('[data-component=submission-status-banner]');
      var formEl = document.querySelector('[data-component=contact-form]');

      var initialUrlState = getUrlStateFromLocation();

      // Load dynamic contact info
      if (contactInfoContainer) {
        try {
          var info = WebsiteSDK.getContactInfo();
          renderContactInfo(contactInfoContainer, info);
        } catch (e) {
          contactInfoContainer.textContent = 'Contact information is currently unavailable.';
        }
      }

      // Initialize form and status banner from URL
      applyStateToUi(initialUrlState);

      // Form submission handler
      if (formEl) {
        formEl.addEventListener('submit', function(event) {
          event.preventDefault();
          handleFormSubmit(formEl);
        });
      }

      // Generic data-action handlers
      setupDataActionHandlers();

      // Handle back/forward navigation (URL changes on this page)
      window.addEventListener('popstate', function() {
        var state = getUrlStateFromLocation();
        applyStateToUi(state);
      });

      function getUrlStateFromLocation() {
        var params = new URLSearchParams(window.location.search);
        return {
          name: params.get('name') || '',
          email: params.get('email') || '',
          subject: params.get('subject') || '',
          message: params.get('message') || '',
          submission_status: params.get('submission_status') || ''
        };
      }

      function applyStateToUi(urlState) {
        if (formEl && urlState) {
          var nameInput = formEl.querySelector('#contact-name');
          var emailInput = formEl.querySelector('#contact-email');
          var subjectInput = formEl.querySelector('#contact-subject');
          var messageInput = formEl.querySelector('#contact-message');

          if (nameInput) nameInput.value = urlState.name || '';
          if (emailInput) emailInput.value = urlState.email || '';
          if (subjectInput) subjectInput.value = urlState.subject || '';
          if (messageInput) messageInput.value = urlState.message || '';
        }

        if (bannerContainer) {
          var bannerMessage = '';
          if (urlState && urlState.submission_status === 'success') {
            bannerMessage = 'Your message was submitted successfully.';
          } else if (urlState && urlState.submission_status === 'error') {
            bannerMessage = 'There was a problem submitting your message. You can edit the form and try again.';
          }
          renderStatusBanner(bannerContainer, urlState.submission_status, bannerMessage);
        }
      }

      function renderContactInfo(container, info) {
        if (!info) {
          container.textContent = 'Contact information is currently unavailable.';
          return;
        }
        var supportEmail = info.support_email || '';
        var supportUrl = info.support_url || '';
        var message = info.message || '';

        container.innerHTML = `
<p>${escapeHtml(message)}</p>
<p>Email: <a href='mailto:${escapeAttribute(supportEmail)}' data-action='contact-email-link'>${escapeHtml(supportEmail)}</a></p>
<p>Support site: <a href='${escapeAttribute(supportUrl)}' target='_blank' rel='noopener' data-action='contact-support-link'>${escapeHtml(supportUrl)}</a></p>
`;
      }

      function renderStatusBanner(container, status, message) {
        if (!container) return;
        if (!status) {
          container.innerHTML = '';
          container.hidden = true;
          return;
        }
        var label = status === 'success' ? 'Success' : 'Error';
        var text = message || (status === 'success'
          ? 'Your message was submitted successfully.'
          : 'There was a problem submitting your message. You can try again.'
        );
        container.innerHTML = `
<p><strong>${label}:</strong> ${escapeHtml(text)} <button type='button' data-action='dismiss-status-banner'>Dismiss</button></p>
`;
        container.hidden = false;
      }

      function handleFormSubmit(form) {
        if (!form) return;

        clearValidationErrors(form);

        var nameInput = form.querySelector('#contact-name');
        var emailInput = form.querySelector('#contact-email');
        var subjectInput = form.querySelector('#contact-subject');
        var messageInput = form.querySelector('#contact-message');

        var name = nameInput ? nameInput.value.trim() : '';
        var email = emailInput ? emailInput.value.trim() : '';
        var subject = subjectInput ? subjectInput.value.trim() : '';
        var message = messageInput ? messageInput.value.trim() : '';

        var errors = {};

        if (!name) errors.name = 'Name is required.';
        if (!email) errors.email = 'Email is required.';
        else if (!isValidEmail(email)) errors.email = 'Please enter a valid email address.';
        if (!subject) errors.subject = 'Subject is required.';
        if (!message) errors.message = 'Message is required.';

        if (Object.keys(errors).length > 0) {
          showValidationErrors(form, errors);
          return;
        }

        setFormSubmittingState(form, true);

        var response;
        var status = 'error';
        var bannerMessage = '';

        try {
          response = WebsiteSDK.submitContactMessage(name, email, subject, message);
          if (response && response.submitted) {
            status = 'success';
            bannerMessage = response.message || 'Your message was submitted successfully.';
          } else {
            status = 'error';
            bannerMessage = response && response.message
              ? response.message
              : 'Your message could not be submitted. Please try again.';
          }
        } catch (e) {
          status = 'error';
          bannerMessage = 'An unexpected error occurred while submitting your message.';
        }

        setFormSubmittingState(form, false);

        if (bannerContainer) {
          renderStatusBanner(bannerContainer, status, bannerMessage);
        }

        updateUrlWithFormState({
          name: name,
          email: email,
          subject: subject,
          message: message
        }, status);
      }

      function clearValidationErrors(form) {
        var errorEls = form.querySelectorAll('.field-error');
        errorEls.forEach(function(el) {
          el.textContent = '';
        });
      }

      function showValidationErrors(form, errors) {
        var firstInvalidInput = null;
        Object.keys(errors).forEach(function(field) {
          var errorText = errors[field];
          var errorEl = form.querySelector('.field-error[data-error-for=' + field + ']');
          if (errorEl) {
            errorEl.textContent = errorText;
          }
          var inputEl = null;
          if (field === 'name') inputEl = form.querySelector('#contact-name');
          else if (field === 'email') inputEl = form.querySelector('#contact-email');
          else if (field === 'subject') inputEl = form.querySelector('#contact-subject');
          else if (field === 'message') inputEl = form.querySelector('#contact-message');

          if (!firstInvalidInput && inputEl) firstInvalidInput = inputEl;
        });
        if (firstInvalidInput) {
          firstInvalidInput.focus();
        }
      }

      function isValidEmail(value) {
        var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailPattern.test(value);
      }

      function setFormSubmittingState(form, isSubmitting) {
        if (!form) return;
        form.dataset.submitting = isSubmitting ? 'true' : 'false';
        var submitButton = form.querySelector('[data-action=submit-contact-form]');
        if (submitButton) {
          submitButton.disabled = isSubmitting;
          submitButton.textContent = isSubmitting ? 'Sending…' : 'Send message';
        }
      }

      function updateUrlWithFormState(formValues, status) {
        var params = new URLSearchParams(window.location.search);

        if (formValues) {
          params.set('name', formValues.name || '');
          params.set('email', formValues.email || '');
          params.set('subject', formValues.subject || '');
          params.set('message', formValues.message || '');
        }

        if (status) {
          params.set('submission_status', status);
        } else {
          params.delete('submission_status');
        }

        var newQuery = params.toString();
        var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '') + window.location.hash;
        window.history.replaceState(null, '', newUrl);
      }

      function setupDataActionHandlers() {
        var actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(element) {
          var action = element.getAttribute('data-action');

          if (action === 'dismiss-status-banner') {
            element.addEventListener('click', function(ev) {
              ev.preventDefault();
              if (bannerContainer) {
                renderStatusBanner(bannerContainer, '', '');
              }
              var params = new URLSearchParams(window.location.search);
              params.delete('submission_status');
              var newQuery = params.toString();
              var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '') + window.location.hash;
              window.history.replaceState(null, '', newUrl);
            });
          } else if (action === 'reset-contact-form') {
            element.addEventListener('click', function(ev) {
              ev.preventDefault();
              applyStateToUi(initialUrlState);
              if (formEl) {
                clearValidationErrors(formEl);
              }
            });
          } else if (action === 'back-to-discography') {
            element.addEventListener('click', function(ev) {
              ev.preventDefault();
              // No additional internal navigation configured here per outgoing_connections.
            });
          }
        });
      }

      function escapeHtml(value) {
        if (value == null) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\x22/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeAttribute(value) {
        if (value == null) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/\x22/g, '&quot;')
          .replace(/'/g, '&#39;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }
    });
  </script>
</body>
</html>
