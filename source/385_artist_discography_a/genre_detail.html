<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genre Albums - Artist Discography</title>
  
  <link rel="stylesheet" href="genre_detail.css">
</head>
<body>
  <div class="page-background">
    <div class="page-container">
      <header class="site-header">
        <h1 class="site-title">Artist Discography</h1>
        <nav class="site-nav" aria-label="Primary">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="genres.html">Browse Genres</a></li>
            <li><a href="library.html">Library</a></li>
            <li><a href="playlists.html">Playlists</a></li>
            <li><a href="favorites.html">Favorites</a></li>
            <li><a href="queue.html">Queue</a></li>
          </ul>
        </nav>
      </header>

      <main id="content" class="site-main" role="main">
        <section id="genre-page" class="genre-page-panel" data-populate="genre-context">
          <div id="loading-message" data-component="genre-context-loader" aria-live="polite">Loading
</div>

          <div id="genre-page-content" hidden>
            <div id="feedback-messages" data-component="feedback-messages" aria-live="polite"></div>

            <header data-component="genre-header" class="genre-header">
              <h2 id="genre-title" data-populate="genre-name">Genre Albums</h2>
              <p id="genre-count" data-populate="genre-count"></p>
            </header>

            <section class="genre-controls">
              <form id="genre-filter-form" data-component="album-filter-toolbar">
                <fieldset>
                  <legend>Filters</legend>
                  <label for="filter-year-min">Year from
                    <input type="number" id="filter-year-min" name="year_min" min="1900" max="2100" />
                  </label>
                  <label for="filter-year-max">to
                    <input type="number" id="filter-year-max" name="year_max" min="1900" max="2100" />
                  </label>
                  <label for="filter-rating-min">Min rating
                    <input type="number" id="filter-rating-min" name="rating_min" step="0.1" min="0" max="5" />
                  </label>
                  <label for="filter-track-count-min">Min tracks
                    <input type="number" id="filter-track-count-min" name="track_count_min" min="1" />
                  </label>
                  <label for="filter-duration-max">Max duration (minutes)
                    <input type="number" id="filter-duration-max" name="duration_max" min="1" />
                  </label>
                  <label for="filter-type">Album type
                    <select id="filter-type" name="type">
                      <option value="">Any</option>
                      <option value="studio">Studio</option>
                      <option value="live">Live</option>
                      <option value="ep">EP</option>
                      <option value="compilation">Compilation</option>
                      <option value="single">Single</option>
                      <option value="soundtrack">Soundtrack</option>
                      <option value="greatest_hits">Greatest hits</option>
                      <option value="other">Other</option>
                    </select>
                  </label>
                  <button type="submit" data-action="apply-filters">Apply filters</button>
                </fieldset>
              </form>

              <div class="genre-sort" data-component="album-sort-control">
                <label for="sort-select">Sort by
                  <select id="sort-select" name="sortBy">
                    <option value="popularity_desc">Popularity (high to low)</option>
                    <option value="rating_desc">Rating (high to low)</option>
                    <option value="release_year_desc">Release year (newest first)</option>
                  </select>
                </label>
              </div>
            </section>

            <section id="album-grid" data-component="album-grid" aria-live="polite"></section>

            <hr class="album-list-divider">

            <nav id="pagination-controls" data-component="pagination-controls" aria-label="Album pagination"></nav>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <hr class="footer-divider">
        <nav class="footer-nav" aria-label="Footer">
          <ul>
            <li><a href="about.html">About</a></li>
            <li><a href="help.html">Help / FAQ</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="bookmarks.html">Bookmarks</a></li>
            <li><a href="lists.html">Lists</a></li>
          </ul>
        </nav>
        <p class="footer-meta">&copy; Artist Discography</p>
      </footer>
    </div>
  </div>

  <script src="business_logic.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const PAGE_SIZE = 25;

    const state = {
      albums: [],
      totalCount: 0,
      albumStates: {}
    };

    const mainContainer = document.getElementById('genre-page');
    const loadingMessageEl = document.getElementById('loading-message');
    const contentEl = document.getElementById('genre-page-content');
    const feedbackEl = document.getElementById('feedback-messages');
    const genreTitleEl = document.getElementById('genre-title');
    const genreCountEl = document.getElementById('genre-count');
    const albumGridEl = document.getElementById('album-grid');
    const paginationEl = document.getElementById('pagination-controls');
    const filterForm = document.getElementById('genre-filter-form');
    const sortSelect = document.getElementById('sort-select');

    if (!mainContainer) return;

    function getUrlParams() {
      return new URLSearchParams(window.location.search);
    }

    function parseNumberParam(params, key) {
      const val = params.get(key);
      if (val === null || val === '') return null;
      const num = Number(val);
      return Number.isNaN(num) ? null : num;
    }

    function showFeedbackMessage(text, type) {
      if (!feedbackEl) return;
      if (!text) {
        feedbackEl.textContent = '';
        feedbackEl.className = '';
        return;
      }
      feedbackEl.textContent = text;
      feedbackEl.className = type ? 'feedback-' + type : '';
      if (type !== 'error') {
        setTimeout(function() {
          if (feedbackEl.textContent === text) {
            feedbackEl.textContent = '';
            feedbackEl.className = '';
          }
        }, 4000);
      }
    }

    function showLoading() {
      if (loadingMessageEl) {
        loadingMessageEl.style.display = '';
        loadingMessageEl.textContent = 'Loading';
      }
      if (contentEl) {
        contentEl.hidden = true;
      }
    }

    function hideLoading() {
      if (loadingMessageEl) {
        loadingMessageEl.style.display = 'none';
      }
      if (contentEl) {
        contentEl.hidden = false;
      }
    }

    function buildFiltersFromParams(params) {
      const filters = {};
      const yearMin = parseNumberParam(params, 'year_min');
      const yearMax = parseNumberParam(params, 'year_max');
      const ratingMin = parseNumberParam(params, 'rating_min');
      const trackCountMin = parseNumberParam(params, 'track_count_min');
      const durationMaxMinutes = parseNumberParam(params, 'duration_max');
      const type = params.get('type');

      if (yearMin !== null) filters.minYear = yearMin;
      if (yearMax !== null) filters.maxYear = yearMax;
      if (ratingMin !== null) filters.minRating = ratingMin;
      if (trackCountMin !== null) filters.minTrackCount = trackCountMin;
      if (durationMaxMinutes !== null) {
        filters.maxDurationSeconds = durationMaxMinutes * 60;
      }
      if (type) {
        filters.albumTypes = [type];
      }

      return filters;
    }

    function syncControlsWithUrl(params) {
      if (!filterForm) return;

      const yearMinInput = filterForm.querySelector('[name="year_min"]');
      const yearMaxInput = filterForm.querySelector('[name="year_max"]');
      const ratingMinInput = filterForm.querySelector('[name="rating_min"]');
      const trackCountMinInput = filterForm.querySelector('[name="track_count_min"]');
      const durationMaxInput = filterForm.querySelector('[name="duration_max"]');
      const typeSelect = filterForm.querySelector('[name="type"]');

      if (yearMinInput) yearMinInput.value = params.get('year_min') || '';
      if (yearMaxInput) yearMaxInput.value = params.get('year_max') || '';
      if (ratingMinInput) ratingMinInput.value = params.get('rating_min') || '';
      if (trackCountMinInput) trackCountMinInput.value = params.get('track_count_min') || '';
      if (durationMaxInput) durationMaxInput.value = params.get('duration_max') || '';
      if (typeSelect) typeSelect.value = params.get('type') || '';

      if (sortSelect) {
        const sortByParam = params.get('sortBy') || 'popularity_desc';
        sortSelect.value = sortByParam;
      }
    }

    function renderGenreHeader(genreName, totalCount) {
      if (genreTitleEl) {
        genreTitleEl.textContent = genreName || 'Genre Albums';
      }
      if (genreCountEl) {
        if (typeof totalCount === 'number') {
          genreCountEl.textContent = totalCount === 1 ? '1 album' : totalCount + ' albums';
        } else {
          genreCountEl.textContent = '';
        }
      }
    }

    function renderAlbumGrid(albums) {
      if (!albumGridEl) return;
      albumGridEl.innerHTML = '';

      if (!albums || albums.length === 0) {
        const p = document.createElement('p');
        p.textContent = 'No albums found for the selected filters.';
        albumGridEl.appendChild(p);
        return;
      }

      albums.forEach(function(album) {
        const albumId = album.album_id;
        if (!state.albumStates[albumId]) {
          state.albumStates[albumId] = {
            is_in_library: !!album.is_in_library,
            is_bookmarked: !!album.is_bookmarked,
            is_favorited: false,
            favorite_item_id: null
          };
        }
        const albumState = state.albumStates[albumId];

        const article = document.createElement('article');
        article.className = 'album-card';
        article.dataset.albumId = albumId;

        const h3 = document.createElement('h3');
        const albumLink = document.createElement('a');
        albumLink.href = 'javascript:void(0)';
        albumLink.dataset.action = 'album-open';
        albumLink.dataset.albumId = albumId;
        albumLink.textContent = album.title || '(Untitled album)';
        h3.appendChild(albumLink);
        article.appendChild(h3);

        const artistP = document.createElement('p');
        artistP.appendChild(document.createTextNode('By '));
        const artistLink = document.createElement('a');
        artistLink.href = 'javascript:void(0)';
        artistLink.dataset.action = 'artist-open';
        artistLink.dataset.artistId = album.primary_artist_id || '';
        artistLink.textContent = album.primary_artist_name || 'Unknown artist';
        artistP.appendChild(artistLink);
        article.appendChild(artistP);

        const metaLine1 = document.createElement('p');
        const parts1 = [];
        if (album.album_type) parts1.push('Type: ' + album.album_type);
        if (album.release_year) parts1.push('Release year: ' + album.release_year);
        if (typeof album.rating === 'number') parts1.push('Rating: ' + album.rating.toFixed(1));
        if (typeof album.popularity === 'number') parts1.push('Popularity: ' + album.popularity);
        metaLine1.textContent = parts1.join(' | ');
        article.appendChild(metaLine1);

        const metaLine2 = document.createElement('p');
        const parts2 = [];
        if (typeof album.track_count === 'number') parts2.push('Tracks: ' + album.track_count);
        if (album.formatted_duration) parts2.push('Duration: ' + album.formatted_duration);
        metaLine2.textContent = parts2.join(' | ');
        article.appendChild(metaLine2);

        const actionsP = document.createElement('p');

        const libraryLink = document.createElement('a');
        libraryLink.href = 'javascript:void(0)';
        libraryLink.dataset.action = 'toggle-library';
        libraryLink.dataset.albumId = albumId;
        libraryLink.textContent = albumState.is_in_library ? 'In Library' : 'Add to Library';
        actionsP.appendChild(libraryLink);

        actionsP.appendChild(document.createTextNode(' b7 '));

        const bookmarkLink = document.createElement('a');
        bookmarkLink.href = 'javascript:void(0)';
        bookmarkLink.dataset.albumId = albumId;
        if (albumState.is_bookmarked) {
          bookmarkLink.textContent = 'Bookmarked';
        } else {
          bookmarkLink.dataset.action = 'bookmark-album';
          bookmarkLink.textContent = 'Bookmark';
        }
        actionsP.appendChild(bookmarkLink);

        actionsP.appendChild(document.createTextNode(' b7 '));

        const favoriteLink = document.createElement('a');
        favoriteLink.href = 'javascript:void(0)';
        favoriteLink.dataset.action = 'toggle-favorite';
        favoriteLink.dataset.albumId = albumId;
        favoriteLink.textContent = albumState.is_favorited ? 'Unfavorite' : 'Mark favorite';
        actionsP.appendChild(favoriteLink);

        actionsP.appendChild(document.createTextNode(' b7 '));

        const queueLink = document.createElement('a');
        queueLink.href = 'javascript:void(0)';
        queueLink.dataset.action = 'add-to-queue';
        queueLink.dataset.albumId = albumId;
        queueLink.dataset.playNext = 'false';
        queueLink.textContent = 'Add to Queue';
        actionsP.appendChild(queueLink);

        actionsP.appendChild(document.createTextNode(' b7 '));

        const playNextLink = document.createElement('a');
        playNextLink.href = 'javascript:void(0)';
        playNextLink.dataset.action = 'add-to-queue';
        playNextLink.dataset.albumId = albumId;
        playNextLink.dataset.playNext = 'true';
        playNextLink.textContent = 'Play Next';
        actionsP.appendChild(playNextLink);

        article.appendChild(actionsP);

        const hr = document.createElement('hr');
        hr.className = 'album-divider';
        article.appendChild(hr);

        albumGridEl.appendChild(article);
      });
    }

    function renderPagination(totalCount, offset) {
      if (!paginationEl) return;
      paginationEl.innerHTML = '';

      if (!totalCount || totalCount <= PAGE_SIZE) {
        return;
      }

      const totalPages = Math.ceil(totalCount / PAGE_SIZE);
      const currentPage = Math.floor(offset / PAGE_SIZE) + 1;

      const container = document.createElement('p');

      const prevLink = document.createElement('a');
      prevLink.href = 'javascript:void(0)';
      prevLink.dataset.action = 'page-prev';
      prevLink.textContent = 'Previous';
      if (currentPage === 1) {
        prevLink.className = 'disabled';
      }
      container.appendChild(prevLink);

      container.appendChild(document.createTextNode(' '));

      for (let i = 1; i <= totalPages; i++) {
        if (i > 1) {
          container.appendChild(document.createTextNode(' '));
        }
        const pageLink = document.createElement('a');
        pageLink.href = 'javascript:void(0)';
        pageLink.dataset.action = 'page-select';
        pageLink.dataset.page = String(i);
        pageLink.textContent = String(i);
        if (i === currentPage) {
          pageLink.className = 'current';
        }
        container.appendChild(pageLink);
      }

      container.appendChild(document.createTextNode(' '));

      const nextLink = document.createElement('a');
      nextLink.href = 'javascript:void(0)';
      nextLink.dataset.action = 'page-next';
      nextLink.textContent = 'Next';
      if (currentPage === totalPages) {
        nextLink.className = 'disabled';
      }
      container.appendChild(nextLink);

      paginationEl.appendChild(container);
    }

    function loadGenreAlbumsFromUrl() {
      const params = getUrlParams();
      const genreSlug = params.get('genre');

      if (!genreSlug) {
        if (loadingMessageEl) {
          loadingMessageEl.style.display = '';
          loadingMessageEl.textContent = 'No genre selected. Use the Browse Genres link above to choose a genre.';
        }
        if (contentEl) {
          contentEl.hidden = true;
        }
        showFeedbackMessage('', null);
        return;
      }

      showLoading();
      showFeedbackMessage('', null);

      const filters = buildFiltersFromParams(params);
      const sortByParam = params.get('sortBy');
      const sortBy = sortByParam || 'popularity_desc';
      const offsetParam = parseNumberParam(params, 'offset');
      const offset = offsetParam !== null && offsetParam >= 0 ? offsetParam : 0;

      syncControlsWithUrl(params);

      let filtersArg = filters;
      if (Object.keys(filters).length === 0) {
        filtersArg = undefined;
      }

      try {
        const result = WebsiteSDK.getGenreAlbums(genreSlug, filtersArg, sortBy, PAGE_SIZE, offset);
        state.albums = Array.isArray(result.albums) ? result.albums : [];
        state.totalCount = typeof result.total_count === 'number' ? result.total_count : 0;

        renderGenreHeader(result.genre_name || genreSlug, state.totalCount);
        renderAlbumGrid(state.albums);
        renderPagination(state.totalCount, offset);

        hideLoading();
      } catch (err) {
        hideLoading();
        renderGenreHeader(genreSlug, null);
        if (albumGridEl) {
          albumGridEl.innerHTML = '';
        }
        if (paginationEl) {
          paginationEl.innerHTML = '';
        }
        showFeedbackMessage('There was a problem loading albums for this genre.', 'error');
        console.error(err);
      }
    }

    if (filterForm) {
      filterForm.addEventListener('submit', function(event) {
        event.preventDefault();
        const params = getUrlParams();
        const formData = new FormData(filterForm);

        const updateParamFromForm = function(name) {
          const value = (formData.get(name) || '').toString().trim();
          if (value) {
            params.set(name, value);
          } else {
            params.delete(name);
          }
        };

        updateParamFromForm('year_min');
        updateParamFromForm('year_max');
        updateParamFromForm('rating_min');
        updateParamFromForm('track_count_min');
        updateParamFromForm('duration_max');
        updateParamFromForm('type');

        params.set('offset', '0');

        history.pushState({}, '', '?' + params.toString());
        loadGenreAlbumsFromUrl();
      });
    }

    if (sortSelect) {
      sortSelect.addEventListener('change', function() {
        const params = getUrlParams();
        const value = sortSelect.value;
        if (value) {
          params.set('sortBy', value);
        } else {
          params.delete('sortBy');
        }
        params.set('offset', '0');
        history.pushState({}, '', '?' + params.toString());
        loadGenreAlbumsFromUrl();
      });
    }

    document.body.addEventListener('click', function(event) {
      const target = event.target;
      if (!(target instanceof Element)) return;
      const actionEl = target.closest('[data-action]');
      if (!actionEl) return;
      const action = actionEl.dataset.action;

      if (action === 'album-open') {
        const albumId = actionEl.dataset.albumId;
        if (albumId) {
          window.location.href = 'album.html?albumId=' + encodeURIComponent(albumId);
        }
      } else if (action === 'artist-open') {
        const artistId = actionEl.dataset.artistId;
        if (artistId) {
          const url = 'artist.html?artistId=' + encodeURIComponent(artistId) + '&tab=overview';
          window.location.href = url;
        }
      } else if (action === 'toggle-library') {
        const albumId = actionEl.dataset.albumId;
        if (!albumId) return;
        try {
          const response = WebsiteSDK.addAlbumToLibrary(albumId);
          const albumState = state.albumStates[albumId] || {};
          albumState.is_in_library = !!response.is_in_library;
          state.albumStates[albumId] = albumState;
          actionEl.textContent = albumState.is_in_library ? 'In Library' : 'Add to Library';
          showFeedbackMessage(response.message || 'Library updated.', 'success');
        } catch (err) {
          showFeedbackMessage('Could not update library for this album.', 'error');
          console.error(err);
        }
      } else if (action === 'bookmark-album') {
        const albumId = actionEl.dataset.albumId;
        if (!albumId) return;
        try {
          const response = WebsiteSDK.bookmarkAlbum(albumId);
          const albumState = state.albumStates[albumId] || {};
          albumState.is_bookmarked = !!response.is_bookmarked;
          state.albumStates[albumId] = albumState;
          actionEl.textContent = albumState.is_bookmarked ? 'Bookmarked' : 'Bookmark';
          if (albumState.is_bookmarked) {
            actionEl.removeAttribute('data-action');
          }
          showFeedbackMessage(response.message || 'Album bookmarked.', 'success');
        } catch (err) {
          showFeedbackMessage('Could not bookmark this album.', 'error');
          console.error(err);
        }
      } else if (action === 'toggle-favorite') {
        const albumId = actionEl.dataset.albumId;
        if (!albumId) return;
        const current = state.albumStates[albumId] && state.albumStates[albumId].is_favorited;
        const desired = !current;
        try {
          const response = WebsiteSDK.setFavoriteStatus('album', albumId, desired);
          const isFavorited = !!response.is_favorited;
          const albumState = state.albumStates[albumId] || {};
          albumState.is_favorited = isFavorited;
          albumState.favorite_item_id = response.favorite_item_id || null;
          state.albumStates[albumId] = albumState;
          actionEl.textContent = isFavorited ? 'Unfavorite' : 'Mark favorite';
          showFeedbackMessage(response.message || (isFavorited ? 'Album marked as favorite.' : 'Album removed from favorites.'), 'success');
        } catch (err) {
          showFeedbackMessage('Could not update favorite status.', 'error');
          console.error(err);
        }
      } else if (action === 'add-to-queue') {
        const albumId = actionEl.dataset.albumId;
        if (!albumId) return;
        const playNext = actionEl.dataset.playNext === 'true';
        try {
          const response = WebsiteSDK.addAlbumToQueue(albumId, playNext);
          showFeedbackMessage(response.message || 'Album added to queue.', 'success');
        } catch (err) {
          showFeedbackMessage('Could not add album to queue.', 'error');
          console.error(err);
        }
      } else if (action === 'page-prev' || action === 'page-next' || action === 'page-select') {
        const params = getUrlParams();
        const total = state.totalCount || 0;
        const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
        const offsetParam = parseNumberParam(params, 'offset');
        const currentPage = (offsetParam !== null && offsetParam >= 0 ? Math.floor(offsetParam / PAGE_SIZE) + 1 : 1);

        let newPage = currentPage;

        if (action === 'page-prev') {
          event.preventDefault();
          if (currentPage > 1) newPage = currentPage - 1;
        } else if (action === 'page-next') {
          event.preventDefault();
          if (currentPage < totalPages) newPage = currentPage + 1;
        } else if (action === 'page-select') {
          event.preventDefault();
          const pageStr = actionEl.dataset.page;
          const pageNum = pageStr ? parseInt(pageStr, 10) : NaN;
          if (!Number.isNaN(pageNum)) {
            newPage = pageNum;
          }
        }

        if (newPage !== currentPage) {
          const newOffset = (newPage - 1) * PAGE_SIZE;
          params.set('offset', String(newOffset));
          history.pushState({}, '', '?' + params.toString());
          loadGenreAlbumsFromUrl();
        }
      }
    });

    window.addEventListener('popstate', function() {
      loadGenreAlbumsFromUrl();
    });

    loadGenreAlbumsFromUrl();
  });
  </script>
</body>
</html>
