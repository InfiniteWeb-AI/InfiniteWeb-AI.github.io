    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Shared home page state
        var homeState = {
            loading: false,
            error: null,
            overview: null,
            // Ownership flag: can be provided by embedding code or localStorage
            isOwner: Boolean(window.IS_PROFILE_OWNER || (typeof localStorage !== 'undefined' && localStorage.getItem('isProfileOwner') === 'true'))
        };

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            var str = String(value);
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatCount(n) {
            if (typeof n !== 'number' || isNaN(n)) {
                return '0';
            }
            try {
                return n.toLocaleString();
            } catch (e) {
                return String(n);
            }
        }

        function truncateText(text, maxLength) {
            if (!text) {
                return '';
            }
            if (text.length <= maxLength) {
                return text;
            }
            return text.slice(0, maxLength - 1) + '…';
        }

        function formatPublicationType(type) {
            if (!type) {
                return '';
            }
            if (type === 'journal_article') { return 'Journal article'; }
            if (type === 'conference_paper') { return 'Conference paper'; }
            if (type === 'book_chapter') { return 'Book chapter'; }
            if (type === 'workshop_paper') { return 'Workshop paper'; }
            if (type === 'preprint') { return 'Preprint'; }
            if (type === 'thesis') { return 'Thesis'; }
            if (type === 'report') { return 'Report'; }
            return type;
        }

        function formatProjectStatus(status) {
            if (!status) {
                return '';
            }
            if (status === 'planned') { return 'Planned'; }
            if (status === 'active') { return 'Active'; }
            if (status === 'completed') { return 'Completed'; }
            if (status === 'paused') { return 'Paused'; }
            return status;
        }

        function formatLocationType(locationType) {
            if (!locationType) {
                return '';
            }
            if (locationType === 'online') { return 'Online'; }
            if (locationType === 'in_person') { return 'In person'; }
            if (locationType === 'hybrid') { return 'Hybrid'; }
            return locationType;
        }

        function formatAccessType(accessType) {
            if (!accessType) {
                return '';
            }
            if (accessType === 'public') { return 'Public'; }
            if (accessType === 'private') { return 'Private'; }
            if (accessType === 'invitation_only') { return 'Invitation only'; }
            return accessType;
        }

        function formatDateTime(value) {
            if (!value) {
                return '';
            }
            try {
                var date = new Date(value);
                if (isNaN(date.getTime())) {
                    return '';
                }
                return date.toLocaleString(undefined, {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (e) {
                return '';
            }
        }

        // Rendering functions per component (must use the passed container directly)

        function renderProfileOverview(container) {
            container.innerHTML = '';

            if (homeState.loading) {
                // While loading, keep this minimal; status line covers main feedback
                return;
            }

            if (homeState.error || !homeState.overview) {
                // On error, show nothing here (status line communicates the problem)
                return;
            }

            var tagline = homeState.overview.tagline;
            var keywordsRaw = homeState.overview.primaryResearchKeywords;
            var keywords = Array.isArray(keywordsRaw) ? keywordsRaw.filter(function(k) { return k; }) : [];

            if (!tagline && keywords.length === 0) {
                // Nothing configured yet
                return;
            }

            var parts = [];
            if (tagline) {
                parts.push(
                    "<p class='home-tagline'>" + escapeHtml(tagline) + "</p>"
                );
            }

            if (keywords.length) {
                var keywordsHtml = keywords.map(function(k) {
                    return "<span class='home-keyword-pill'>" + escapeHtml(k) + "</span>";
                }).join(' ');

                parts.push(
                    "<p class='home-keywords' aria-label='Primary research keywords'>" + keywordsHtml + "</p>"
                );
            }

            container.innerHTML = parts.join('');
        }

        function renderOverviewStatus(container) {
            container.innerHTML = '';

            if (homeState.loading) {
                container.innerHTML = "\n                    <p class='status-line status-line--loading'>Loading overview...</p>\n                ";
                return;
            }

            if (homeState.error) {
                container.innerHTML = "\n                    <p class='status-line status-line--error'>" + escapeHtml(homeState.error) + "</p>\n                ";
                return;
            }

            // No loading or error: status line collapses
        }

        function renderSummaryMetrics(container) {
            container.innerHTML = '';

            if (homeState.loading) {
                container.innerHTML = "\n                    <p class='home-metrics-line home-metrics-line--loading'>Loading summary metrics...</p>\n                ";
                return;
            }

            if (homeState.error || !homeState.overview || !homeState.overview.summaryCounts) {
                container.innerHTML = "\n                    <p class='home-metrics-line home-metrics-line--empty'>Summary metrics are currently unavailable.</p>\n                ";
                return;
            }

            var counts = homeState.overview.summaryCounts || {};
            var pubs = formatCount(counts.publicationsCount);
            var projects = formatCount(counts.projectsCount);
            var courses = formatCount(counts.coursesCount);
            var events = formatCount(counts.upcomingEventsCount);

            container.innerHTML = "\n                <p class='home-metrics-line'>\n                    <span class='home-metric'><strong>" + escapeHtml(pubs) + "</strong> publications</span>\n                    <span class='home-metric'><strong>" + escapeHtml(projects) + "</strong> projects</span>\n                    <span class='home-metric'><strong>" + escapeHtml(courses) + "</strong> courses</span>\n                    <span class='home-metric'><strong>" + escapeHtml(events) + "</strong> upcoming events</span>\n                </p>\n            ";
        }

        function renderSectionShortcuts(container) {
            container.innerHTML = '';

            var counts = null;
            if (homeState.overview && homeState.overview.summaryCounts) {
                counts = homeState.overview.summaryCounts;
            } else {
                counts = {};
            }

            var pubsLabel = 'Publications' + (typeof counts.publicationsCount === 'number' ? ' (' + formatCount(counts.publicationsCount) + ')' : '');
            var projectsLabel = 'Projects' + (typeof counts.projectsCount === 'number' ? ' (' + formatCount(counts.projectsCount) + ')' : '');
            var coursesLabel = 'Courses' + (typeof counts.coursesCount === 'number' ? ' (' + formatCount(counts.coursesCount) + ')' : '');
            var talksLabel = 'Talks & events' + (typeof counts.upcomingEventsCount === 'number' ? ' (' + formatCount(counts.upcomingEventsCount) + ')' : '');

            container.innerHTML = "\n                <ul class='home-shortcuts-list'>\n                    <li class='home-shortcuts-item'>\n                        <a href='javascript:void(0)' class='home-shortcut-link' data-action='view-all-publications'>" + escapeHtml(pubsLabel) + "</a>\n                    </li>\n                    <li class='home-shortcuts-item'>\n                        <a href='javascript:void(0)' class='home-shortcut-link' data-action='view-all-projects'>" + escapeHtml(projectsLabel) + "</a>\n                    </li>\n                    <li class='home-shortcuts-item'>\n                        <a href='javascript:void(0)' class='home-shortcut-link' data-action='view-all-courses'>" + escapeHtml(coursesLabel) + "</a>\n                    </li>\n                    <li class='home-shortcuts-item'>\n                        <a href='javascript:void(0)' class='home-shortcut-link' data-action='view-all-talks'>" + escapeHtml(talksLabel) + "</a>\n                    </li>\n                </ul>\n            ";
        }

        function renderFeaturedPublication(container) {
            container.innerHTML = '';

            if (homeState.loading) {
                container.innerHTML = "\n                    <div class='card card--placeholder'>\n                        <h2 class='card-title'>Featured publication</h2>\n                        <p class='card-body-text'>Loading featured publication...</p>\n                    </div>\n                ";
                return;
            }

            if (homeState.error || !homeState.overview || !homeState.overview.featuredPublication || !homeState.overview.featuredPublication.publication) {
                // Neutral empty state
                container.innerHTML = "\n                    <div class='card card--empty'>\n                        <h2 class='card-title'>Featured publication</h2>\n                        <p class='card-body-text'>No featured publication is currently highlighted.</p>\n                    </div>\n                ";
                return;
            }

            var wrapper = homeState.overview.featuredPublication;
            var publication = wrapper.publication;
            var isExplicit = Boolean(wrapper.isExplicitlyFeatured);

            var title = publication && publication.title ? publication.title : '';
            var year = publication && typeof publication.year === 'number' ? publication.year : '';
            var venue = publication && publication.venueName ? publication.venueName : '';
            var pubType = publication && publication.publicationType ? formatPublicationType(publication.publicationType) : '';
            var citationCount = publication && typeof publication.citationCount === 'number' ? publication.citationCount : null;
            var authors = publication && Array.isArray(publication.authors) ? publication.authors : [];
            var abstractText = publication && publication.abstract ? truncateText(publication.abstract, 320) : '';

            var metaParts = [];
            if (authors.length) {
                metaParts.push(escapeHtml(authors.join(', ')));
            }
            if (venue) {
                metaParts.push(escapeHtml(venue));
            }
            if (year) {
                metaParts.push(String(year));
            }
            if (pubType) {
                metaParts.push(escapeHtml(pubType));
            }
            if (citationCount !== null) {
                metaParts.push(formatCount(citationCount) + ' citations');
            }
            var metaLine = metaParts.join(' · ');

            var badge = isExplicit ? 'Selected by profile owner' : 'Highlighted automatically';

            container.innerHTML = "\n                <div class='card card--interactive'>\n                    <div class='card-header-row'>\n                        <h2 class='card-title'>Featured publication</h2>\n                        <span class='card-badge'>" + escapeHtml(badge) + "</span>\n                    </div>\n                    <button type='button' class='card-link-surface' data-action='open-featured-publication'>\n                        <h3 class='card-item-title'>" + escapeHtml(title) + "</h3>\n                        " + (metaLine ? "<p class='card-meta'>" + metaLine + "</p>" : '') + "\n                        " + (abstractText ? "<p class='card-body-text'>" + escapeHtml(abstractText) + "</p>" : '') + "\n                    </button>\n                </div>\n            ";
        }

        function renderFeaturedProject(container) {
            container.innerHTML = '';

            if (homeState.loading) {
                container.innerHTML = "\n                    <div class='card card--placeholder'>\n                        <h2 class='card-title'>Featured project</h2>\n                        <p class='card-body-text'>Loading featured project...</p>\n                    </div>\n                ";
                return;
            }

            if (homeState.error || !homeState.overview || !homeState.overview.featuredProject) {
                container.innerHTML = "\n                    <div class='card card--empty'>\n                        <h2 class='card-title'>Featured project</h2>\n                        <p class='card-body-text'>No featured project is currently highlighted.</p>\n                    </div>\n                ";
                return;
            }

            var project = homeState.overview.featuredProject;
            var title = project.title ? project.title : '';
            var shortTitle = project.shortTitle ? project.shortTitle : '';
            var description = project.description ? truncateText(project.description, 320) : '';
            var status = project.status ? formatProjectStatus(project.status) : '';
            var fundingAmount = typeof project.fundingAmount === 'number' ? project.fundingAmount : null;
            var fundingCurrency = project.fundingCurrency ? project.fundingCurrency : '';
            var start = project.startDate ? new Date(project.startDate) : null;
            var end = project.endDate ? new Date(project.endDate) : null;

            var metaParts = [];
            if (status) {
                metaParts.push(status + ' project');
            }
            if (start && !isNaN(start.getTime())) {
                var startYear = start.getFullYear();
                if (end && !isNaN(end.getTime())) {
                    var endYear = end.getFullYear();
                    metaParts.push(startYear + '–' + endYear);
                } else {
                    metaParts.push('Since ' + startYear);
                }
            }
            if (fundingAmount !== null) {
                var amountString;
                try {
                    amountString = fundingAmount.toLocaleString();
                } catch (e) {
                    amountString = String(fundingAmount);
                }
                var currencyPrefix = fundingCurrency ? fundingCurrency + ' ' : '';
                metaParts.push(currencyPrefix + amountString + ' funding');
            }
            var metaLine = metaParts.join(' · ');

            var displayTitle = shortTitle || title;

            container.innerHTML = "\n                <div class='card card--interactive'>\n                    <h2 class='card-title'>Featured project</h2>\n                    <button type='button' class='card-link-surface' data-action='open-featured-project'>\n                        <h3 class='card-item-title'>" + escapeHtml(displayTitle) + "</h3>\n                        " + (metaLine ? "<p class='card-meta'>" + escapeHtml(metaLine) + "</p>" : '') + "\n                        " + (description ? "<p class='card-body-text'>" + escapeHtml(description) + "</p>" : '') + "\n                    </button>\n                </div>\n            ";
        }

        function buildEventLocation(event) {
            if (!event) {
                return '';
            }
            var parts = [];
            if (event.locationName) {
                parts.push(event.locationName);
            }
            var cityCountry = [];
            if (event.locationCity) {
                cityCountry.push(event.locationCity);
            }
            if (event.locationCountry) {
                cityCountry.push(event.locationCountry);
            }
            if (cityCountry.length) {
                parts.push(cityCountry.join(', '));
            }
            return parts.join(' · ');
        }

        function renderUpcomingEvent(container) {
            container.innerHTML = '';

            if (homeState.loading) {
                container.innerHTML = "\n                    <div class='card card--placeholder'>\n                        <h2 class='card-title'>Next upcoming event</h2>\n                        <p class='card-body-text'>Loading upcoming event...</p>\n                    </div>\n                ";
                return;
            }

            if (homeState.error || !homeState.overview || !homeState.overview.nextUpcomingEvent) {
                container.innerHTML = "\n                    <div class='card card--empty'>\n                        <h2 class='card-title'>Next upcoming event</h2>\n                        <p class='card-body-text'>There are currently no upcoming public events scheduled.</p>\n                    </div>\n                ";
                return;
            }

            var event = homeState.overview.nextUpcomingEvent;
            var title = event.title ? event.title : '';
            var start = formatDateTime(event.startDateTime);
            var end = formatDateTime(event.endDateTime);
            var location = buildEventLocation(event);
            var locationType = event.locationType ? formatLocationType(event.locationType) : '';
            var accessType = event.accessType ? formatAccessType(event.accessType) : '';
            var description = event.description ? truncateText(event.description, 260) : (event.abstract ? truncateText(event.abstract, 260) : '');
            var isCanceled = Boolean(event.isCanceled);

            var metaParts = [];
            if (start) {
                if (end) {
                    metaParts.push(start + ' – ' + end);
                } else {
                    metaParts.push(start);
                }
            }
            if (location) {
                metaParts.push(location);
            }
            if (locationType) {
                metaParts.push(locationType);
            }
            if (accessType) {
                metaParts.push(accessType);
            }
            var metaLine = metaParts.join(' · ');

            var statusBadge = '';
            if (isCanceled) {
                statusBadge = "<span class='card-badge card-badge--alert'>Canceled</span>";
            }

            container.innerHTML = "\n                <div class='card card--interactive'>\n                    <div class='card-header-row'>\n                        <h2 class='card-title'>Next upcoming event</h2>\n                        " + statusBadge + "\n                    </div>\n                    <button type='button' class='card-link-surface' data-action='open-upcoming-event'>\n                        <h3 class='card-item-title'>" + escapeHtml(title) + "</h3>\n                        " + (metaLine ? "<p class='card-meta'>" + escapeHtml(metaLine) + "</p>" : '') + "\n                        " + (description ? "<p class='card-body-text'>" + escapeHtml(description) + "</p>" : '') + "\n                    </button>\n                </div>\n            ";
        }

        function renderContactCta(container) {
            container.innerHTML = "\n                <div class='contact-cta-inner'>\n                    <h2 class='contact-cta-title'>Contact / Supervision</h2>\n                    <p class='contact-cta-text'>For prospective students, collaborators, and media inquiries, please use the contact &amp; supervision page to get in touch.</p>\n                    <a href='javascript:void(0)' class='contact-cta-link' data-action='go-contact'>Open contact &amp; supervision page</a>\n                </div>\n            ";
        }

        function renderOwnerTools(container) {
            container.innerHTML = '';

            if (!homeState.isOwner) {
                container.style.display = 'none';
                return;
            }

            container.style.display = '';
            container.innerHTML = "\n                <div class='owner-tools-inner'>\n                    <p class='owner-tools-text'>Owner tools: <a href='javascript:void(0)' class='owner-tools-link' data-action='open-profile-settings'>Edit profile settings</a></p>\n                </div>\n            ";
        }

        function renderComponent(container) {
            var componentName = container.getAttribute('data-component');
            if (!componentName) {
                return;
            }

            if (componentName === 'profile-overview-strip') {
                renderProfileOverview(container);
            } else if (componentName === 'overview-loading-and-error-state') {
                renderOverviewStatus(container);
            } else if (componentName === 'summary-metrics-strip') {
                renderSummaryMetrics(container);
            } else if (componentName === 'section-shortcuts') {
                renderSectionShortcuts(container);
            } else if (componentName === 'featured-publication-card') {
                renderFeaturedPublication(container);
            } else if (componentName === 'featured-project-card') {
                renderFeaturedProject(container);
            } else if (componentName === 'upcoming-event-card') {
                renderUpcomingEvent(container);
            } else if (componentName === 'contact-cta-block') {
                renderContactCta(container);
            } else if (componentName === 'owner-tools-strip') {
                renderOwnerTools(container);
            }
        }

        function renderAllComponents() {
            var components = document.querySelectorAll('[data-component]');
            for (var i = 0; i < components.length; i++) {
                renderComponent(components[i]);
            }

            // Conditionally show/hide header Profile settings link based on ownership
            var navProfileLink = document.querySelector(".primary-nav a[href='profile_settings.html']");
            if (navProfileLink && navProfileLink.parentNode) {
                navProfileLink.parentNode.style.display = homeState.isOwner ? '' : 'none';
            }

            setupActionHandlers();
        }

        // Navigation handlers based on data-action attributes
        function setupActionHandlers() {
            var actionElements = document.querySelectorAll('[data-action]');
            for (var i = 0; i < actionElements.length; i++) {
                var el = actionElements[i];
                if (el.getAttribute('data-bound') === 'true') {
                    continue;
                }
                var action = el.getAttribute('data-action');

                if (action === 'view-all-publications') {
                    el.addEventListener('click', function() {
                        window.location.href = 'publications.html';
                    });
                } else if (action === 'view-all-projects') {
                    el.addEventListener('click', function() {
                        window.location.href = 'projects.html';
                    });
                } else if (action === 'view-all-courses') {
                    el.addEventListener('click', function() {
                        window.location.href = 'courses.html';
                    });
                } else if (action === 'view-all-talks') {
                    el.addEventListener('click', function() {
                        window.location.href = 'talks.html';
                    });
                } else if (action === 'open-featured-publication') {
                    el.addEventListener('click', function() {
                        if (!homeState.overview || !homeState.overview.featuredPublication || !homeState.overview.featuredPublication.publication) {
                            return;
                        }
                        var pubId = homeState.overview.featuredPublication.publication.id;
                        if (!pubId) {
                            return;
                        }
                        window.location.href = 'publication_detail.html?id=' + encodeURIComponent(pubId);
                    });
                } else if (action === 'open-featured-project') {
                    el.addEventListener('click', function() {
                        if (!homeState.overview || !homeState.overview.featuredProject) {
                            return;
                        }
                        var projectId = homeState.overview.featuredProject.id;
                        if (!projectId) {
                            return;
                        }
                        window.location.href = 'project_detail.html?id=' + encodeURIComponent(projectId);
                    });
                } else if (action === 'open-upcoming-event') {
                    el.addEventListener('click', function() {
                        if (!homeState.overview || !homeState.overview.nextUpcomingEvent) {
                            return;
                        }
                        var eventId = homeState.overview.nextUpcomingEvent.id;
                        if (!eventId) {
                            return;
                        }
                        window.location.href = 'talk_detail.html?id=' + encodeURIComponent(eventId);
                    });
                } else if (action === 'go-contact') {
                    el.addEventListener('click', function() {
                        window.location.href = 'contact.html';
                    });
                } else if (action === 'open-profile-settings') {
                    el.addEventListener('click', function() {
                        if (!homeState.isOwner) {
                            return;
                        }
                        window.location.href = 'profile_settings.html';
                    });
                }

                el.setAttribute('data-bound', 'true');
            }
        }

        function loadHomeOverview() {
            homeState.loading = true;
            homeState.error = null;
            renderAllComponents();

            try {
                // Central data loader: calls getHomePageOverview once
                var overview = WebsiteSDK.getHomePageOverview();
                homeState.overview = overview || null;
            } catch (e) {
                console.error('Error loading home page overview:', e);
                homeState.overview = null;
                homeState.error = 'Unable to load overview data at this time.';
            }

            homeState.loading = false;
            renderAllComponents();
        }

        // Home page does not consume incoming URL parameters;
        // it always renders based on getHomePageOverview and ownership context.

        loadHomeOverview();
    });
    </script>
</body>
</html>
