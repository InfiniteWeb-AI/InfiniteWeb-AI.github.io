<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Movie Catalog</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='about.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-inner'>
      <a href='index.html' class='brand'>Movie Catalog</a>
      <nav class='main-nav' aria-label='Primary navigation'>
        <ul>
          <li><a href='index.html'>Home</a></li>
          <li><a href='genre.html?genreId=all'>Genres</a></li>
          <li><a href='genre.html?genreId=action'>Action</a></li>
          <li><a href='genre.html?genreId=comedy'>Comedy</a></li>
          <li><a href='genre.html?genreId=family'>Family</a></li>
          <li><a href='watchlist.html'>Watchlist</a></li>
          <li><a href='lists.html'>Lists</a></li>
          <li><a href='settings.html'>Settings</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-content' tabindex='-1'>
    <article class='about-page-root' data-component='about-page-root'>
      <header class='about-header' data-component='about-header'>
        <h1 class='about-title' data-populate='StaticPageContent.title'>About</h1>
        <p class='about-subtitle'>What this catalog does and how to use it.</p>
        <p class='about-meta'>
          <span class='about-meta-label'>Last updated</span>
          <time class='about-meta-value' data-populate='StaticPageContent.lastUpdatedAt' datetime=''>
            
          </time>
        </p>
      </header>

      <section class='about-main two-column-layout' aria-label='About this site'>
        <div class='static-content-loader is-loading' data-component='static-content-loader' aria-hidden='false'>
          <div class='static-loader-column'>
            <div class='loader-section'>
              <div class='loader-heading-line'></div>
              <div class='loader-meta-line'></div>
              <div class='loader-divider-line'></div>
              <div class='loader-body-line'></div>
              <div class='loader-body-line'></div>
              <div class='loader-body-line short'></div>
            </div>
            <div class='loader-section'>
              <div class='loader-heading-line'></div>
              <div class='loader-meta-line'></div>
              <div class='loader-divider-line'></div>
              <div class='loader-body-line'></div>
              <div class='loader-body-line'></div>
              <div class='loader-body-line'></div>
            </div>
          </div>
          <div class='static-loader-column'>
            <div class='loader-section'>
              <div class='loader-heading-line'></div>
              <div class='loader-meta-line'></div>
              <div class='loader-divider-line'></div>
              <div class='loader-body-line'></div>
              <div class='loader-body-line'></div>
              <div class='loader-body-line short'></div>
            </div>
            <div class='loader-section'>
              <div class='loader-heading-line'></div>
              <div class='loader-meta-line'></div>
              <div class='loader-divider-line'></div>
              <div class='loader-body-line'></div>
              <div class='loader-body-line'></div>
            </div>
          </div>
        </div>

        <div class='about-content-wrapper' data-component='about-inline-link-handler'>
          <div class='about-content-renderer' data-component='about-content-renderer' data-populate='StaticPageContent.bodyHtml' aria-live='polite' hidden>
            <!-- bodyHtml from getStaticPageContent(pageCode) will be injected here -->
          </div>
        </div>
      </section>

      <button type='button'
              class='fab-scroll-top'
              data-component='scroll-to-top'
              data-action='scroll-to-top'
              aria-label='Scroll back to top'>
        <span aria-hidden='true'>&uarr;</span>
      </button>
    </article>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner'>
      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul>
          <li><a href='about.html'>About</a></li>
          <li><a href='help.html'>Help</a></li>
          <li><a href='contact.html'>Contact</a></li>
          <li><a href='privacy.html'>Privacy Policy</a></li>
          <li><a href='terms.html'>Terms of Service</a></li>
        </ul>
      </nav>
      <p class='footer-meta'>&copy; 2026 Movie Catalog. All rights reserved.</p>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    (function() {
      'use strict';

      document.addEventListener('DOMContentLoaded', function() {
        var root = document.querySelector('[data-component="about-page-root"]');
        if (!root) {
          return;
        }

        var titleEl = root.querySelector('[data-populate="StaticPageContent.title"]');
        var lastUpdatedEl = root.querySelector('[data-populate="StaticPageContent.lastUpdatedAt"]');
        var bodyEl = root.querySelector('[data-populate="StaticPageContent.bodyHtml"]');
        var staticLoaderEl = root.querySelector('[data-component="static-content-loader"]');
        var scrollTopBtn = root.querySelector('[data-action="scroll-to-top"]');

        var currentPageCode = null;
        var currentLang = null;
        var currentSectionId = null;
        var currentTargetSectionEl = null;

        function parseLocation() {
          var search = window.location.search || '';
          var params = new URLSearchParams(search);
          var lang = params.get('lang') || null;
          var sectionFromQuery = params.get('section');
          var hash = window.location.hash || '';
          var sectionFromHash = hash ? hash.substring(1) : null;

          return {
            lang: lang,
            section: sectionFromQuery || sectionFromHash || null
          };
        }

        function buildPageCode(lang) {
          var base = 'about';
          if (!lang) {
            return base;
          }
          return base + '_' + String(lang).toLowerCase();
        }

        function setLoading(isLoading) {
          if (!staticLoaderEl || !bodyEl) {
            return;
          }
          if (isLoading) {
            staticLoaderEl.classList.add('is-loading');
            staticLoaderEl.setAttribute('aria-hidden', 'false');
            bodyEl.hidden = true;
          } else {
            staticLoaderEl.classList.remove('is-loading');
            staticLoaderEl.setAttribute('aria-hidden', 'true');
            bodyEl.hidden = false;
          }
        }

        function renderTitle(container, title) {
          if (!container) {
            return;
          }
          var finalTitle = title || 'About';
          container.textContent = finalTitle;
          try {
            document.title = finalTitle + ' · Movie Catalog';
          } catch (e) {
            // Ignore document.title errors
          }
        }

        function renderLastUpdated(container, lastUpdatedAt) {
          if (!container) {
            return;
          }
          if (!lastUpdatedAt) {
            container.textContent = '';
            container.removeAttribute('datetime');
            return;
          }
          var date = new Date(lastUpdatedAt);
          if (!isNaN(date.getTime())) {
            container.textContent = date.toLocaleDateString();
            container.setAttribute('datetime', date.toISOString());
          } else {
            container.textContent = lastUpdatedAt;
            container.removeAttribute('datetime');
          }
        }

        function renderBodyHtml(container, bodyHtml) {
          if (!container) {
            return;
          }
          container.innerHTML = bodyHtml || '';
        }

        function clearSectionHighlight() {
          if (!currentTargetSectionEl) {
            return;
          }
          currentTargetSectionEl.classList.remove('about-section-target');
          if (currentTargetSectionEl.hasAttribute('data-temp-tabindex')) {
            currentTargetSectionEl.removeAttribute('tabindex');
            currentTargetSectionEl.removeAttribute('data-temp-tabindex');
          }
          currentTargetSectionEl = null;
        }

        function applySectionTarget(sectionId) {
          if (!bodyEl) {
            return;
          }

          clearSectionHighlight();

          if (!sectionId) {
            return;
          }

          var sectionEl = null;
          try {
            if (typeof CSS !== 'undefined' && typeof CSS.escape === 'function') {
              sectionEl = bodyEl.querySelector('#' + CSS.escape(sectionId));
            }
          } catch (e) {
            sectionEl = null;
          }

          if (!sectionEl) {
            sectionEl = bodyEl.querySelector('#' + sectionId);
          }
          if (!sectionEl) {
            sectionEl = bodyEl.querySelector('[data-section-id="' + sectionId + '"]') ||
                        bodyEl.querySelector('[data-section="' + sectionId + '"]');
          }
          if (!sectionEl) {
            return;
          }

          currentTargetSectionEl = sectionEl;
          sectionEl.classList.add('about-section-target');

          if (!sectionEl.hasAttribute('tabindex')) {
            sectionEl.setAttribute('tabindex', '-1');
            sectionEl.setAttribute('data-temp-tabindex', 'true');
          }

          try {
            sectionEl.scrollIntoView({ block: 'start', behavior: 'smooth' });
          } catch (eScroll) {
            sectionEl.scrollIntoView(true);
          }

          try {
            sectionEl.focus({ preventScroll: true });
          } catch (eFocus) {
            try {
              sectionEl.focus();
            } catch (eFocus2) {
              // ignore
            }
          }
        }

        function renderError(message) {
          setLoading(false);
          if (bodyEl) {
            var msg = message && message.message ? message.message : 'We couldn\'t load this information right now. Please try again later.';
            bodyEl.innerHTML = '';
            var p = document.createElement('p');
            p.className = 'about-error';
            p.setAttribute('role', 'alert');
            p.textContent = msg;
            bodyEl.appendChild(p);
          }
        }

        function loadPageContent(pageCode, sectionId) {
          setLoading(true);
          var content;
          try {
            if (typeof WebsiteSDK === 'undefined' || typeof WebsiteSDK.getStaticPageContent !== 'function') {
              throw new Error('Content service is temporarily unavailable.');
            }
            content = WebsiteSDK.getStaticPageContent(pageCode);
          } catch (err) {
            renderError(err);
            return;
          }

          setLoading(false);

          var title = content && content.title ? content.title : 'About';
          var bodyHtml = content && content.bodyHtml ? content.bodyHtml : '';
          var lastUpdatedAt = content && content.lastUpdatedAt ? content.lastUpdatedAt : '';

          renderTitle(titleEl, title);
          renderLastUpdated(lastUpdatedEl, lastUpdatedAt);
          renderBodyHtml(bodyEl, bodyHtml);

          applySectionTarget(sectionId || currentSectionId);
        }

        function handleLocationChange() {
          var state = parseLocation();
          var newLang = state.lang;
          var newSectionId = state.section;
          var newPageCode = buildPageCode(newLang);

          var pageCodeChanged = newPageCode !== currentPageCode;
          var sectionChanged = newSectionId !== currentSectionId;

          currentLang = newLang;
          currentSectionId = newSectionId;

          if (pageCodeChanged) {
            currentPageCode = newPageCode;
            loadPageContent(currentPageCode, currentSectionId);
          } else if (sectionChanged) {
            applySectionTarget(currentSectionId);
          }
        }

        if (bodyEl) {
          bodyEl.addEventListener('click', function(event) {
            var anchor = event.target.closest ? event.target.closest('a') : null;
            if (!anchor) {
              return;
            }

            var href = anchor.getAttribute('href');
            if (!href || href === '#' || href === 'javascript:void(0)') {
              return;
            }

            var targetUrl;
            try {
              targetUrl = new URL(href, window.location.href);
            } catch (e) {
              return;
            }

            var pathname = targetUrl.pathname || '';

            if (pathname.toLowerCase().endsWith('about.html')) {
              event.preventDefault();
              var newUrl = pathname + (targetUrl.search || '') + (targetUrl.hash || '');
              window.history.pushState({}, '', newUrl);
              handleLocationChange();
              return;
            }

            if ((!pathname || pathname === window.location.pathname) && targetUrl.hash) {
              event.preventDefault();
              var mergedUrl = window.location.pathname + window.location.search + targetUrl.hash;
              window.history.pushState({}, '', mergedUrl);
              handleLocationChange();
              return;
            }

            // Links to help.html or contact.html fall through to normal navigation
          });
        }

        if (scrollTopBtn) {
          scrollTopBtn.addEventListener('click', function() {
            try {
              window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) {
              window.scrollTo(0, 0);
            }
            try {
              var main = document.getElementById('content');
              if (main) {
                main.focus();
              }
            } catch (eFocus) {
              // ignore
            }
          });
        }

        window.addEventListener('popstate', function() {
          handleLocationChange();
        });

        window.addEventListener('hashchange', function() {
          handleLocationChange();
        });

        handleLocationChange();
      });
    })();
  </script>
</body>
</html>
