<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Hosting Service</title>
    
    <link rel="stylesheet" href="privacy.css">
    <script src="business_logic.js"></script>
</head>
<body>
    <header class="site-header">
        <nav class="main-nav" aria-label="Main navigation">
            <ul class="main-nav__list">
                <li class="main-nav__item"><a href="index.html">Dashboard</a></li>
                <li class="main-nav__item"><a href="explore.html">Explore</a></li>
                <li class="main-nav__item"><a href="collections.html">Collections</a></li>
                <li class="main-nav__item"><a href="download_queue.html">Download Queue</a></li>
                <li class="main-nav__item"><a href="settings.html">Settings</a></li>
            </ul>
        </nav>
    </header>

    <main id="content" class="site-content" role="main">
        <section data-component="privacy-policy-header">
            <h1>Privacy Policy</h1>
            <p>
                Last updated:
                <span data-populate="privacy-last-updated"></span>
            </p>
        </section>

        <div data-component="privacy-policy-error" role="alert" aria-live="polite"></div>

        <nav data-component="privacy-policy-toc" aria-label="Privacy policy table of contents">
            <h2>Contents</h2>
            <ul data-populate="privacy-toc"></ul>
        </nav>

        <section data-component="privacy-policy-section-list" data-populate="privacy-sections"></section>

        <div data-component="privacy-policy-loader" hidden></div>
        <div data-component="privacy-policy-state-sync" hidden></div>
    </main>

    <footer class="site-footer">
        <p class="site-footer__copy">
            &copy; 2010&ndash;2026 Example File Hosting Service
        </p>
        <nav class="footer-nav" aria-label="Footer navigation">
            <ul class="footer-nav__list">
                <li class="footer-nav__item"><a href="about.html">About</a></li>
                <li class="footer-nav__item"><a href="help.html">Help &amp; Support</a></li>
                <li class="footer-nav__item"><a href="terms.html">Terms of Service</a></li>
                <li class="footer-nav__item"><a href="privacy.html">Privacy Policy</a></li>
            </ul>
        </nav>
    </footer>

    <script>
    (function() {
        'use strict';

        var privacyState = {
            lastUpdated: '',
            sections: [],
            activeSectionId: null
        };

        function showError(message) {
            var container = document.querySelector('[data-component="privacy-policy-error"]');
            if (!container) {
                return;
            }
            container.textContent = message || 'An unexpected error occurred while loading the privacy policy.';
        }

        function clearError() {
            var container = document.querySelector('[data-component="privacy-policy-error"]');
            if (!container) {
                return;
            }
            container.textContent = '';
        }

        function renderLastUpdated(container, lastUpdated) {
            container.textContent = lastUpdated || 'Not available';
        }

        function renderToc(container, sections, activeSectionId) {
            container.innerHTML = '';
            if (!sections || !sections.length) {
                return;
            }
            for (var i = 0; i < sections.length; i++) {
                var sec = sections[i];
                var li = document.createElement('li');
                li.setAttribute('data-section-id', sec.id);
                if (sec.id === activeSectionId) {
                    li.setAttribute('data-active', 'true');
                }
                var link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.textContent = sec.title || sec.id || '';
                link.setAttribute('data-action', 'toc-section-link');
                link.setAttribute('data-section-id', sec.id);
                li.appendChild(link);
                container.appendChild(li);
            }
        }

        function renderSections(container, sections, activeSectionId) {
            container.innerHTML = '';
            if (!sections || !sections.length) {
                var p = document.createElement('p');
                p.textContent = 'No privacy policy content is available.';
                container.appendChild(p);
                return;
            }
            for (var i = 0; i < sections.length; i++) {
                var sec = sections[i];
                var article = document.createElement('article');
                article.setAttribute('data-component', 'privacy-policy-section-item');
                article.setAttribute('data-section-id', sec.id);
                article.id = 'privacy-section-' + sec.id;
                if (sec.id === activeSectionId) {
                    article.setAttribute('data-active', 'true');
                }

                var heading = document.createElement('h2');
                heading.textContent = sec.title || '';
                article.appendChild(heading);

                var body = document.createElement('div');
                body.innerHTML = sec.body || '';
                article.appendChild(body);

                var shareLink = document.createElement('a');
                shareLink.href = 'javascript:void(0)';
                shareLink.textContent = 'Copy link to this section';
                shareLink.setAttribute('data-action', 'copy-section-link');
                shareLink.setAttribute('data-section-id', sec.id);
                article.appendChild(shareLink);

                container.appendChild(article);
            }
        }

        function updateActiveSectionUI(activeSectionId) {
            privacyState.activeSectionId = activeSectionId || null;

            var sectionItems = document.querySelectorAll('[data-component="privacy-policy-section-item"]');
            for (var i = 0; i < sectionItems.length; i++) {
                var item = sectionItems[i];
                if (activeSectionId && item.getAttribute('data-section-id') === activeSectionId) {
                    item.setAttribute('data-active', 'true');
                } else {
                    item.removeAttribute('data-active');
                }
            }

            var tocItems = document.querySelectorAll('[data-component="privacy-policy-toc"] li[data-section-id]');
            for (var j = 0; j < tocItems.length; j++) {
                var li = tocItems[j];
                if (activeSectionId && li.getAttribute('data-section-id') === activeSectionId) {
                    li.setAttribute('data-active', 'true');
                } else {
                    li.removeAttribute('data-active');
                }
            }
        }

        function scrollToSection(sectionId) {
            if (!sectionId) {
                return;
            }
            var selector = '[data-component="privacy-policy-section-item"][data-section-id="' + sectionId + '"]';
            var el = document.querySelector(selector);
            if (!el) {
                return;
            }
            try {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (e) {
                el.scrollIntoView();
            }
        }

        function getSectionIdFromUrl() {
            var params = new URLSearchParams(window.location.search);
            var sectionId = params.get('section');
            return sectionId || null;
        }

        function setSectionInUrl(sectionId, push) {
            var url = new URL(window.location.href);
            if (sectionId) {
                url.searchParams.set('section', sectionId);
            } else {
                url.searchParams.delete('section');
            }
            if (push) {
                window.history.pushState({}, '', url.toString());
            } else {
                window.history.replaceState({}, '', url.toString());
            }
        }

        function syncActiveSectionFromUrl(options) {
            if (!privacyState.sections || !privacyState.sections.length) {
                return;
            }
            var opts = options || {};
            var sectionId = getSectionIdFromUrl();
            var exists = false;
            if (sectionId) {
                for (var i = 0; i < privacyState.sections.length; i++) {
                    if (privacyState.sections[i].id === sectionId) {
                        exists = true;
                        break;
                    }
                }
            }

            if (exists) {
                updateActiveSectionUI(sectionId);
                if (opts.scroll) {
                    scrollToSection(sectionId);
                }
            } else {
                updateActiveSectionUI(null);
                if (opts.scroll && !sectionId) {
                    try {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } catch (e) {
                        window.scrollTo(0, 0);
                    }
                }
            }
        }

        function copyTextToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text);
            }
            return new Promise(function(resolve, reject) {
                var textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                try {
                    var successful = document.execCommand('copy');
                    document.body.removeChild(textarea);
                    if (successful) {
                        resolve();
                    } else {
                        reject(new Error('Copy command was unsuccessful'));
                    }
                } catch (err) {
                    document.body.removeChild(textarea);
                    reject(err);
                }
            });
        }

        function handleTocClick(target) {
            var sectionId = target.getAttribute('data-section-id');
            if (!sectionId) {
                return;
            }
            setSectionInUrl(sectionId, true);
            updateActiveSectionUI(sectionId);
            scrollToSection(sectionId);
        }

        function handleCopySectionLinkClick(target) {
            var sectionId = target.getAttribute('data-section-id');
            if (!sectionId) {
                return;
            }
            setSectionInUrl(sectionId, true);
            updateActiveSectionUI(sectionId);
            var url = new URL(window.location.href);
            url.searchParams.set('section', sectionId);
            var fullUrl = url.toString();
            copyTextToClipboard(fullUrl).catch(function() {
                showError('Unable to copy the section link to the clipboard.');
            });
        }

        function bindActionHandlers() {
            document.addEventListener('click', function(event) {
                var target = event.target;
                if (!target || !target.getAttribute) {
                    return;
                }
                var action = target.getAttribute('data-action');
                if (!action) {
                    return;
                }
                if (action === 'toc-section-link') {
                    event.preventDefault();
                    handleTocClick(target);
                } else if (action === 'copy-section-link') {
                    event.preventDefault();
                    handleCopySectionLinkClick(target);
                }
            });
        }

        function initializeData() {
            var data;
            try {
                data = WebsiteSDK.getPrivacyPolicyContent();
            } catch (e) {
                showError('Failed to load the privacy policy content.');
                return;
            }

            if (!data || !data.sections || !Array.isArray(data.sections)) {
                showError('Privacy policy content is not available.');
                return;
            }

            clearError();
            privacyState.lastUpdated = data.lastUpdated || '';
            privacyState.sections = data.sections;

            var populateElements = document.querySelectorAll('[data-populate]');
            for (var i = 0; i < populateElements.length; i++) {
                var element = populateElements[i];
                var dataType = element.getAttribute('data-populate');
                if (dataType === 'privacy-last-updated') {
                    renderLastUpdated(element, privacyState.lastUpdated);
                } else if (dataType === 'privacy-toc') {
                    renderToc(element, privacyState.sections, privacyState.activeSectionId);
                } else if (dataType === 'privacy-sections') {
                    renderSections(element, privacyState.sections, privacyState.activeSectionId);
                }
            }

            syncActiveSectionFromUrl({ scroll: true });
        }

        function initializeStateSync() {
            window.addEventListener('popstate', function() {
                if (!privacyState.sections || !privacyState.sections.length) {
                    return;
                }
                syncActiveSectionFromUrl({ scroll: true });
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initializeData();
            bindActionHandlers();
            initializeStateSync();
        });
    })();
    </script>
</body>
</html>
