<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Hosting Service</title>
    
    <link rel="stylesheet" href="about.css">
</head>
<body>
    <header class="site-header">
        <nav class="main-nav" aria-label="Main navigation">
            <ul class="main-nav__list">
                <li class="main-nav__item"><a href="index.html">Dashboard</a></li>
                <li class="main-nav__item"><a href="explore.html">Explore</a></li>
                <li class="main-nav__item"><a href="collections.html">Collections</a></li>
                <li class="main-nav__item"><a href="download_queue.html">Download Queue</a></li>
                <li class="main-nav__item"><a href="settings.html">Settings</a></li>
            </ul>
        </nav>
    </header>

    <main id="content" class="site-content" role="main">
        <div data-component="about-content-fetcher">
            <p id="about-loading" aria-live="polite">Loading...</p>
            <p id="about-error" role="alert" hidden></p>
        </div>

        <h1 id="about-title" data-component="about-title-header" data-populate="about-title"></h1>

        <nav aria-label="About sections" data-component="about-section-toc">
            <ul id="about-toc-list" data-populate="about-toc">
                <!-- Section links will be populated here -->
            </ul>
        </nav>

        <section id="about-sections" data-component="about-section-list" data-populate="about-sections">
            <!-- About sections will be rendered here -->
        </section>

        <div data-component="about-internal-link-handler" hidden></div>
        <div data-component="about-url-state-sync" hidden></div>
    </main>

    <footer class="site-footer">
        <p class="site-footer__copy">
            &copy; 2010&ndash;2026 Example File Hosting Service
        </p>
        <nav class="footer-nav" aria-label="Footer navigation">
            <ul class="footer-nav__list">
                <li class="footer-nav__item"><a href="about.html">About</a></li>
                <li class="footer-nav__item"><a href="help.html">Help &amp; Support</a></li>
                <li class="footer-nav__item"><a href="terms.html">Terms of Service</a></li>
                <li class="footer-nav__item"><a href="privacy.html">Privacy Policy</a></li>
            </ul>
        </nav>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        let activeSectionId = urlParams.get('section') || null;

        const loadingContainer = document.getElementById('about-loading');
        const errorContainer = document.getElementById('about-error');
        const sectionsContainer = document.getElementById('about-sections');
        const tocListContainer = document.getElementById('about-toc-list');

        function setDocumentTitle(title) {
            if (typeof title === 'string' && title.trim().length > 0) {
                document.title = title;
            }
        }

        function updateUrlSection(sectionId, replace) {
            let newUrl;
            try {
                const url = new URL(window.location.href);
                if (sectionId) {
                    url.searchParams.set('section', sectionId);
                } else {
                    url.searchParams.delete('section');
                }
                newUrl = url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : '') + url.hash;
            } catch (e) {
                // Fallback: basic query manipulation
                const base = window.location.pathname;
                const params = new URLSearchParams(window.location.search);
                if (sectionId) {
                    params.set('section', sectionId);
                } else {
                    params.delete('section');
                }
                const query = params.toString();
                newUrl = base + (query ? '?' + query : '');
            }

            activeSectionId = sectionId || null;

            if (window.history && typeof window.history.pushState === 'function') {
                if (replace && typeof window.history.replaceState === 'function') {
                    window.history.replaceState({ section: sectionId }, '', newUrl);
                } else {
                    window.history.pushState({ section: sectionId }, '', newUrl);
                }
            } else {
                window.location.href = newUrl;
            }
        }

        function activateSection(sectionId, options) {
            const opts = Object.assign({ scroll: true, updateUrl: false, replaceUrl: false }, options || {});
            if (!sectionsContainer || !sectionId) {
                return;
            }

            const targetSection = sectionsContainer.querySelector('[data-section-id="' + sectionId + '"]');
            if (!targetSection) {
                return;
            }

            const allSections = sectionsContainer.querySelectorAll('[data-section-id]');
            allSections.forEach(function(el) {
                el.removeAttribute('data-active-section');
            });
            targetSection.setAttribute('data-active-section', 'true');

            if (opts.scroll) {
                try {
                    targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } catch (e) {
                    targetSection.scrollIntoView(true);
                }
            }

            if (opts.updateUrl) {
                updateUrlSection(sectionId, opts.replaceUrl);
            } else {
                activeSectionId = sectionId;
            }

            if (tocListContainer) {
                const tocLinks = tocListContainer.querySelectorAll('a[data-section-target]');
                tocLinks.forEach(function(link) {
                    if (link.dataset.sectionTarget === sectionId) {
                        link.setAttribute('data-active-section-link', 'true');
                    } else {
                        link.removeAttribute('data-active-section-link');
                    }
                });
            }
        }

        function renderTitle(container, title) {
            const text = (typeof title === 'string' && title.trim().length > 0) ? title : 'About This Service';
            container.textContent = text;
            setDocumentTitle(text);
        }

        function renderToc(container, sections) {
            container.innerHTML = '';
            if (!Array.isArray(sections)) {
                return;
            }
            sections.forEach(function(section) {
                const li = document.createElement('li');
                const link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.textContent = section && section.heading ? section.heading : (section && section.id ? section.id : 'Section');
                link.dataset.action = 'navigate-section';
                if (section && section.id) {
                    link.dataset.sectionTarget = section.id;
                }
                li.appendChild(link);
                container.appendChild(li);
            });
        }

        function renderSections(container, sections) {
            container.innerHTML = '';
            if (!Array.isArray(sections)) {
                return;
            }
            sections.forEach(function(section) {
                const wrapper = document.createElement('section');
                if (section && section.id) {
                    wrapper.id = 'about-section-' + section.id;
                    wrapper.dataset.sectionId = section.id;
                }

                const h2 = document.createElement('h2');
                h2.textContent = section && section.heading ? section.heading : '';
                wrapper.appendChild(h2);

                const bodyContainer = document.createElement('div');
                bodyContainer.dataset.component = 'about-section-body';
                if (section && typeof section.body === 'string') {
                    bodyContainer.innerHTML = section.body;
                }
                wrapper.appendChild(bodyContainer);

                container.appendChild(wrapper);
            });
        }

        function bindSectionNavClicks(root) {
            const navElements = root.querySelectorAll('[data-action="navigate-section"]');
            navElements.forEach(function(element) {
                element.addEventListener('click', function(event) {
                    event.preventDefault();
                    const targetId = element.dataset.sectionTarget;
                    if (targetId) {
                        activateSection(targetId, { scroll: true, updateUrl: true, replaceUrl: false });
                    }
                });
            });
        }

        function bindInternalLinks(root) {
            if (!root) {
                return;
            }
            root.addEventListener('click', function(event) {
                const anchor = event.target && event.target.closest ? event.target.closest('a') : null;
                if (!anchor) {
                    return;
                }

                const role = anchor.dataset.aboutLink || anchor.getAttribute('data-about-link');
                const href = (anchor.getAttribute('href') || '').trim();

                const isGetStarted = role === 'get-started' || href === 'help.html' || href.endsWith('help.html');

                if (isGetStarted) {
                    event.preventDefault();
                    window.location.href = 'help.html';
                }
            });
        }

        function handlePopState(event) {
            let sectionFromState = null;
            if (event && event.state && event.state.section) {
                sectionFromState = event.state.section;
            } else {
                const params = new URLSearchParams(window.location.search);
                sectionFromState = params.get('section');
            }
            if (sectionFromState) {
                activateSection(sectionFromState, { scroll: true, updateUrl: false, replaceUrl: false });
            }
        }

        function init() {
            if (loadingContainer) {
                loadingContainer.hidden = false;
            }
            if (errorContainer) {
                errorContainer.hidden = true;
                errorContainer.textContent = '';
            }

            let response;
            try {
                response = WebsiteSDK.getAboutContent();
            } catch (e) {
                if (loadingContainer) {
                    loadingContainer.hidden = true;
                }
                if (errorContainer) {
                    errorContainer.hidden = false;
                    errorContainer.textContent = 'Unable to load About information.';
                }
                return;
            }

            const normalized = {
                title: (response && typeof response.title === 'string') ? response.title : 'About This Service',
                sections: Array.isArray(response && response.sections) ? response.sections : []
            };

            if (loadingContainer) {
                loadingContainer.hidden = true;
            }

            const populateHandlers = {
                'about-title': function(container, data) {
                    renderTitle(container, data.title);
                },
                'about-toc': function(container, data) {
                    renderToc(container, data.sections);
                },
                'about-sections': function(container, data) {
                    renderSections(container, data.sections);
                }
            };

            const populateElements = document.querySelectorAll('[data-populate]');
            populateElements.forEach(function(element) {
                const key = element.dataset.populate;
                const handler = populateHandlers[key];
                if (typeof handler === 'function') {
                    handler(element, normalized);
                }
            });

            bindSectionNavClicks(document);
            bindInternalLinks(sectionsContainer);

            const sectionIds = normalized.sections.map(function(section) { return section.id; }).filter(function(id) { return !!id; });

            let initialSectionId = null;
            if (activeSectionId && sectionIds.indexOf(activeSectionId) !== -1) {
                initialSectionId = activeSectionId;
            } else if (sectionIds.length > 0) {
                initialSectionId = sectionIds[0];
            }

            if (initialSectionId) {
                const currentParams = new URLSearchParams(window.location.search);
                const currentParamValue = currentParams.get('section');
                const shouldReplace = currentParamValue !== initialSectionId;
                const shouldScroll = !!activeSectionId;
                activateSection(initialSectionId, { scroll: shouldScroll, updateUrl: true, replaceUrl: shouldReplace });
            }
        }

        if (window.history && typeof window.history.replaceState === 'function') {
            window.history.replaceState({ section: activeSectionId }, '', window.location.href);
        }

        window.addEventListener('popstate', handlePopState);

        init();
    });
    </script>
</body>
</html>
