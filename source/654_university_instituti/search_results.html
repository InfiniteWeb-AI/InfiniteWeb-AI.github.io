<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>University Research Repository</title>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <link rel='stylesheet' href='framework.css'>
  <link rel='stylesheet' href='search_results.css'>
  <script src='business_logic.js'></script>
</head>
<body>
  <div class='page-wrapper'>
    <header class='site-header'>
      <div class='branding-row'>
        <div class='branding-inner'>
          <a href='index.html' class='site-logo'>
            <img src='logo.svg' alt='University logo'>
          </a>
        </div>
      </div>

      <nav class='primary-nav' aria-label='Main navigation'>
        <div class='primary-nav-inner'>
          <ul class='primary-nav-list'>
            <li class='nav-item'>
              <a href='index.html' title='Repository homepage with global search and quick links.'>Home</a>
            </li>
            <li class='nav-item'>
              <a href='search_results.html' title='Search interface with basic and advanced options.'>Search</a>
            </li>
            <li class='nav-item'>
              <a href='departments.html' title='Browse and select departments and faculties.'>Departments</a>
            </li>
            <li class='nav-item'>
              <a href='authors.html' title='Browse and search for researcher profiles.'>Authors</a>
            </li>
            <li class='nav-item'>
              <a href='analytics.html' title='Analytics dashboard for publications and usage statistics.'>Analytics</a>
            </li>
            <li class='nav-item'>
              <a href='lists.html' title='View and manage reading lists and favorites.'>Lists</a>
            </li>
          </ul>
        </div>
      </nav>

      <div class='utility-bar'>
        <div class='utility-inner'>
          <div class='utility-left'>
            <a href='profile.html' class='utility-link' title='User profile with followed departments and alerts.'>Profile</a>
          </div>
          <div class='utility-right'>
            <form class='header-search' action='search_results.html' method='get' role='search'>
              <label class='visually-hidden' for='site-search'>Search repository</label>
              <input type='text' id='site-search' name='q' class='search-input'>
              <button type='submit' class='search-button'>Search</button>
            </form>
          </div>
        </div>
      </div>
    </header>

    <div class='content-wrapper'>
      <main id='content' class='site-main' role='main'>
        <div class='search-results-page' data-component='search-state-manager'>
          <div class='search-results-inner'>
            <!-- Results summary and sorting -->
            <section class='results-summary-row' data-component='results-summary-and-sorting' data-populate='results-summary'>
              <!-- Populated by JS -->
            </section>

            <!-- Main search query bar -->
            <section class='search-query-bar-section' data-component='search-query-bar'>
              <form class='search-query-form' data-action='search-form' role='search'>
                <div class='search-query-bar-card'>
                  <label class='visually-hidden' for='main-search-query'>Search repository outputs</label>
                  <input type='text' id='main-search-query' name='query' class='search-query-input' placeholder='Search outputs by keyword'>
                  <button type='submit' class='button button-primary'>Search</button>
                  <button type='button' class='button button-link clear-search-button' data-action='clear-main-search'>Clear</button>
                </div>
              </form>
            </section>

            <!-- Advanced search panel -->
            <section class='advanced-search-section' data-component='advanced-search-panel'>
              <div class='advanced-search-card'>
                <div class='advanced-toggle-row'>
                  <button type='button' class='advanced-toggle-button' data-action='toggle-advanced'>Show advanced filters</button>
                </div>
                <div class='advanced-fields-container' data-populate='advanced-filters'>
                  <!-- Advanced filters form populated by JS -->
                </div>
              </div>
            </section>

            <!-- Status / feedback messages -->
            <div class='status-message' data-populate='status-message' aria-live='polite'>
              <!-- Messages populated by JS -->
            </div>

            <!-- Selection / batch actions toolbar -->
            <section class='selection-toolbar-section' data-component='selection-toolbar' data-populate='selection-toolbar'>
              <!-- Populated by JS when items selected -->
            </section>

            <!-- Results list -->
            <section class='results-list-section' data-component='results-list'>
              <ul class='results-list' data-populate='results-list'>
                <!-- Result cards populated by JS -->
              </ul>
            </section>

            <!-- Pagination controls -->
            <nav class='pagination-section' data-component='pagination-controls' aria-label='Search results pages'>
              <div class='pagination-inner' data-populate='pagination'>
                <!-- Pagination links populated by JS -->
              </div>
            </nav>
          </div>

          <!-- Add to list modal overlay -->
          <div class='modal-overlay' data-component='add-to-list-modal' data-populate='add-to-list-modal' hidden>
            <!-- Modal content populated by JS -->
          </div>
        </div>
      </main>
    </div>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' title='Information about the repository and institution.'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' title='Help and FAQ for using the repository.'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='policies.html' title='Open access, reuse, and privacy policies.'>Policies</a>
            </li>
          </ul>
        </nav>
        <p class='footer-copy'>&copy; <span class='footer-year'>2024</span> University Research Repository</p>
      </div>
    </footer>
  </div>

  <script>
    'use strict';

    document.addEventListener('DOMContentLoaded', function () {
      var state = {
        query: '',
        advancedOpen: false,
        documentType: '',
        departmentIds: [],
        facultyIds: [],
        accessStatus: '',
        yearFrom: '',
        yearTo: '',
        grantCode: '',
        grantId: '',
        sortBy: 'relevance',
        sortDirection: 'desc',
        page: 1,
        pageSize: 20,
        totalResults: 0,
        availableSortOptions: [],
        selectedOutputIds: [],
        maxSelection: 10,
        exportFormat: 'ris',
        grantSuggestions: [],
        grantSearchEnabled: true,
        modalOutputId: null,
        statusMessage: ''
      };

      var filterOptions = {
        documentTypes: [],
        departments: [],
        faculties: [],
        accessStatuses: [],
        yearRange: {},
        grantSearchEnabled: true
      };

      var grantSearchDebounceId = null;

      function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function parseUrlIntoState() {
        var params = new URLSearchParams(window.location.search);

        state.query = params.get('query') || params.get('q') || '';

        var advancedParam = (params.get('advanced') || '').toLowerCase();
        state.advancedOpen = advancedParam === '1' || advancedParam === 'true' || advancedParam === 'yes';

        state.documentType = params.get('documentType') || '';

        var deptParam = params.get('departmentIds') || '';
        state.departmentIds = deptParam ? deptParam.split(',').filter(function (id) { return id; }) : [];

        var facultyParam = params.get('facultyIds') || '';
        state.facultyIds = facultyParam ? facultyParam.split(',').filter(function (id) { return id; }) : [];

        state.accessStatus = params.get('accessStatus') || '';

        state.yearFrom = params.get('yearFrom') || '';
        state.yearTo = params.get('yearTo') || '';

        state.grantCode = params.get('grantCode') || '';
        state.grantId = '';

        state.sortBy = params.get('sortBy') || 'relevance';
        state.sortDirection = params.get('sortDirection') || 'desc';

        var pageParam = parseInt(params.get('page') || '1', 10);
        if (isNaN(pageParam) || pageParam < 1) {
          pageParam = 1;
        }
        state.page = pageParam;
      }

      function updateUrlFromState(options) {
        var resetPage = options && options.resetPage;
        if (resetPage) {
          state.page = 1;
        }

        var params = new URLSearchParams();

        if (state.query) {
          params.set('query', state.query);
        }

        if (state.advancedOpen) {
          params.set('advanced', '1');
        }

        if (state.documentType) {
          params.set('documentType', state.documentType);
        }

        if (state.departmentIds && state.departmentIds.length) {
          params.set('departmentIds', state.departmentIds.join(','));
        }

        if (state.facultyIds && state.facultyIds.length) {
          params.set('facultyIds', state.facultyIds.join(','));
        }

        if (state.accessStatus) {
          params.set('accessStatus', state.accessStatus);
        }

        if (state.yearFrom) {
          params.set('yearFrom', String(state.yearFrom));
        }

        if (state.yearTo) {
          params.set('yearTo', String(state.yearTo));
        }

        if (state.grantCode) {
          params.set('grantCode', state.grantCode);
        }

        if (state.sortBy) {
          params.set('sortBy', state.sortBy);
        }
        if (state.sortDirection) {
          params.set('sortDirection', state.sortDirection);
        }

        params.set('page', String(state.page));

        var newUrl = window.location.pathname + '?' + params.toString();
        if (options && options.replace) {
          window.history.replaceState(null, '', newUrl);
        } else {
          window.history.pushState(null, '', newUrl);
        }
      }

      function buildFiltersFromState() {
        var filters = {};

        if (state.documentType) {
          filters.documentTypes = [state.documentType];
        }
        if (state.departmentIds && state.departmentIds.length) {
          filters.departmentIds = state.departmentIds.slice();
        }
        if (state.facultyIds && state.facultyIds.length) {
          filters.facultyIds = state.facultyIds.slice();
        }
        if (state.yearFrom) {
          var yf = parseInt(state.yearFrom, 10);
          if (!isNaN(yf)) {
            filters.yearFrom = yf;
          }
        }
        if (state.yearTo) {
          var yt = parseInt(state.yearTo, 10);
          if (!isNaN(yt)) {
            filters.yearTo = yt;
          }
        }
        if (state.accessStatus) {
          filters.accessStatuses = [state.accessStatus];
          if (state.accessStatus === 'open_access') {
            filters.openAccessOnly = true;
          }
        }
        if (state.grantId) {
          filters.grantId = state.grantId;
        }

        return filters;
      }

      function setStatusMessage(message) {
        state.statusMessage = message || '';
        var container = document.querySelector('[data-populate="status-message"]');
        if (!container) return;
        if (!state.statusMessage) {
          container.innerHTML = '';
        } else {
          container.innerHTML = '<p>' + escapeHtml(state.statusMessage) + '</p>';
        }
      }

      function renderResultsSummary(container) {
        var headingText = 'Search results';
        if (state.query) {
          headingText = 'Results for ' + '\'' + escapeHtml(state.query) + '\'';
        }

        var countText = state.totalResults === 1 ? '1 record found' : state.totalResults + ' records found';

        var sortOptions = [
          { value: 'relevance:desc', label: 'Relevance' },
          { value: 'date:desc', label: 'Date - Newest first' },
          { value: 'date:asc', label: 'Date - Oldest first' },
          { value: 'citations:desc', label: 'Citations - High to low' },
          { value: 'citations:asc', label: 'Citations - Low to low' },
          { value: 'downloads:desc', label: 'Downloads - High to low' },
          { value: 'downloads:asc', label: 'Downloads - Low to high' }
        ];

        var currentSortValue = state.sortBy + ':' + state.sortDirection;

        var sortOptionsHtml = sortOptions.map(function (opt) {
          var selected = opt.value === currentSortValue ? ' selected' : '';
          return '<option value=\'' + escapeHtml(opt.value) + '\'' + selected + '>' + escapeHtml(opt.label) + '</option>';
        }).join('');

        var openAccessChecked = state.accessStatus === 'open_access' ? ' checked' : '';

        container.innerHTML = (
          '<div class=\'results-summary-inner\'>' +
            '<div class=\'results-summary-left\'>' +
              '<h1 class=\'results-heading\'>' + escapeHtml(headingText) + '</h1>' +
              '<p class=\'results-count\'>' + escapeHtml(countText) + '</p>' +
            '</div>' +
            '<div class=\'results-summary-right\'>' +
              '<div class=\'quick-filter\'>' +
                '<label>' +
                  '<input type=\'checkbox\' data-action=\'toggle-open-access\'' + openAccessChecked + '> ' +
                  'Open access only' +
                '</label>' +
              '</div>' +
              '<div class=\'sorting-control\'>' +
                '<label for=\'sort-select\'>Sort by: </label>' +
                '<select id=\'sort-select\' data-action=\'change-sort\'>' +
                  sortOptionsHtml +
                '</select>' +
              '</div>' +
            '</div>' +
          '</div>'
        );
      }

      function renderResultsList(container, results) {
        if (!results || !results.length) {
          container.innerHTML = '<li class=\'result-empty\'>No outputs found. Try adjusting your search terms or filters.</li>';
          return;
        }

        var itemsHtml = results.map(function (item) {
          var authorsText = (item.authorNames && item.authorNames.length) ? item.authorNames.join(', ') : 'Unknown author';
          var yearText = item.publicationYear ? String(item.publicationYear) : 'No year';
          var typeText = item.documentType || '';
          var accessLabel = item.accessBadgeLabel || item.accessStatus || '';
          var accessClass = item.isOpenAccess ? 'access-badge open-access' : 'access-badge';
          var departmentsText = (item.departmentNames && item.departmentNames.length) ? item.departmentNames.join(' - ') : '';
          var facultiesText = (item.facultyNames && item.facultyNames.length) ? item.facultyNames.join(' - ') : '';
          var grantsText = (item.grantCodes && item.grantCodes.length) ? item.grantCodes.join(', ') : '';
          var listMembershipText = '';
          if (item.listMembership && item.listMembership.inAnyList && item.listMembership.listNames && item.listMembership.listNames.length) {
            listMembershipText = 'In lists: ' + item.listMembership.listNames.join(', ');
          }
          var selected = state.selectedOutputIds.indexOf(item.outputId) !== -1;
          var checkedAttr = selected ? ' checked' : '';

          return (
            '<li class=\'result-card\' data-output-id=\'' + escapeHtml(item.outputId) + '\'>' +
              '<div class=\'result-card-inner\'>' +
                '<div class=\'result-card-header\'>' +
                  '<div class=\'result-select\'>' +
                    '<input type=\'checkbox\' class=\'result-select-checkbox\' data-action=\'toggle-select-output\' data-output-id=\'' + escapeHtml(item.outputId) + '\'' + checkedAttr + '>' +
                  '</div>' +
                  '<div class=\'result-title-block\'>' +
                    '<h2 class=\'result-title\'>' +
                      '<a href=\'javascript:void(0)\' data-action=\'open-output-detail\' data-output-id=\'' + escapeHtml(item.outputId) + '\'>' + escapeHtml(item.title || '') + '</a>' +
                    '</h2>' +
                    (item.subtitle ? '<p class=\'result-subtitle\'>' + escapeHtml(item.subtitle) + '</p>' : '') +
                  '</div>' +
                  (accessLabel ? '<div class=\'' + accessClass + '\'>' + escapeHtml(accessLabel) + '</div>' : '') +
                '</div>' +
                '<div class=\'result-metadata\'>' +
                  '<p class=\'result-authors\'>' + escapeHtml(authorsText) + '</p>' +
                  '<p class=\'result-type-year\'>' + escapeHtml(typeText) + (typeText && yearText ? ' - ' : '') + escapeHtml(yearText) + '</p>' +
                  (departmentsText ? '<p class=\'result-departments\'>Departments: ' + escapeHtml(departmentsText) + '</p>' : '') +
                  (facultiesText ? '<p class=\'result-faculties\'>Faculties: ' + escapeHtml(facultiesText) + '</p>' : '') +
                  (grantsText ? '<p class=\'result-grants\'>Grants: ' + escapeHtml(grantsText) + '</p>' : '') +
                  '<p class=\'result-metrics\'>' +
                    'Citations: ' + escapeHtml(item.citationCount != null ? String(item.citationCount) : '0') +
                    ' - Downloads: ' + escapeHtml(item.downloadCount != null ? String(item.downloadCount) : '0') +
                  '</p>' +
                  (listMembershipText ? '<p class=\'result-lists\'>' + escapeHtml(listMembershipText) + '</p>' : '') +
                '</div>' +
                '<div class=\'result-actions\'>' +
                  '<button type=\'button\' class=\'button button-secondary\' data-action=\'open-add-to-list\' data-output-id=\'' + escapeHtml(item.outputId) + '\'>Add to list</button>' +
                '</div>' +
              '</div>' +
            '</li>'
          );
        }).join('');

        container.innerHTML = itemsHtml;
      }

      function renderPagination(container) {
        if (!state.totalResults || state.totalResults <= 0) {
          container.innerHTML = '';
          return;
        }

        var totalPages = Math.ceil(state.totalResults / state.pageSize);
        if (totalPages <= 1) {
          container.innerHTML = '';
          return;
        }

        var current = state.page;

        var pagesToShow = [];
        var maxPages = 7;
        var start = Math.max(1, current - 3);
        var end = Math.min(totalPages, start + maxPages - 1);
        start = Math.max(1, end - maxPages + 1);
        for (var p = start; p <= end; p += 1) {
          pagesToShow.push(p);
        }

        var prevDisabled = current <= 1 ? ' disabled' : '';
        var nextDisabled = current >= totalPages ? ' disabled' : '';

        var pagesHtml = pagesToShow.map(function (pNum) {
          var isCurrent = pNum === current;
          var cls = 'page-link';
          if (isCurrent) {
            cls += ' current';
          }
          var aria = isCurrent ? ' aria-current=\'page\'' : '';
          return '<button type=\'button\' class=\'' + cls + '\' data-action=\'go-to-page\' data-page=\'' + pNum + '\'' + aria + '>' + pNum + '</button>';
        }).join('');

        container.innerHTML = (
          '<div class=\'pagination-controls-inner\'>' +
            '<button type=\'button\' class=\'page-link prev\' data-action=\'go-to-page\' data-page=\'' + (current - 1) + '\'' + prevDisabled + '>Previous</button>' +
            pagesHtml +
            '<button type=\'button\' class=\'page-link next\' data-action=\'go-to-page\' data-page=\'' + (current + 1) + '\'' + nextDisabled + '>Next</button>' +
          '</div>'
        );
      }

      function renderSelectionToolbar(container) {
        if (!state.selectedOutputIds || !state.selectedOutputIds.length) {
          container.innerHTML = '';
          return;
        }
        var count = state.selectedOutputIds.length;
        var countText = count === 1 ? '1 item selected' : count + ' items selected';

        container.innerHTML = (
          '<div class=\'selection-toolbar-card\'>' +
            '<div class=\'selection-toolbar-left\'>' + escapeHtml(countText) + '</div>' +
            '<div class=\'selection-toolbar-right\'>' +
              '<label for=\'export-format-select\'>Export format:</label>' +
              '<select id=\'export-format-select\' data-action=\'change-export-format\'>' +
                '<option value=\'ris\'' + (state.exportFormat === 'ris' ? ' selected' : '') + '>RIS</option>' +
                '<option value=\'bibtex\'' + (state.exportFormat === 'bibtex' ? ' selected' : '') + '>BibTeX</option>' +
                '<option value=\'csv\'' + (state.exportFormat === 'csv' ? ' selected' : '') + '>CSV</option>' +
                '<option value=\'json\'' + (state.exportFormat === 'json' ? ' selected' : '') + '>JSON</option>' +
                '<option value=\'xml\'' + (state.exportFormat === 'xml' ? ' selected' : '') + '>XML</option>' +
                '<option value=\'apa_text\'' + (state.exportFormat === 'apa_text' ? ' selected' : '') + '>APA text</option>' +
              '</select>' +
              '<button type=\'button\' class=\'button button-primary\' data-action=\'export-selected\'>Export</button>' +
              '<button type=\'button\' class=\'button button-link\' data-action=\'clear-selection\'>Clear selection</button>' +
            '</div>' +
          '</div>'
        );
      }

      function renderAdvancedFilters(container) {
        if (!container) return;

        var docOptionsHtml = ['<option value=\'\'>Any document type</option>'];
        filterOptions.documentTypes.forEach(function (opt) {
          var selected = state.documentType === opt.value ? ' selected' : '';
          docOptionsHtml.push('<option value=\'' + escapeHtml(opt.value) + '\'' + selected + '>' + escapeHtml(opt.label) + '</option>');
        });

        var deptOptionsHtml = [];
        filterOptions.departments.forEach(function (opt) {
          var selected = state.departmentIds.indexOf(opt.id) !== -1 ? ' selected' : '';
          var labelParts = [opt.name];
          if (opt.facultyName) {
            labelParts.push('(' + opt.facultyName + ')');
          }
          deptOptionsHtml.push('<option value=\'' + escapeHtml(opt.id) + '\'' + selected + '>' + escapeHtml(labelParts.join(' ')) + '</option>');
        });

        var facultyOptionsHtml = [];
        filterOptions.faculties.forEach(function (opt) {
          var selected = state.facultyIds.indexOf(opt.id) !== -1 ? ' selected' : '';
          facultyOptionsHtml.push('<option value=\'' + escapeHtml(opt.id) + '\'' + selected + '>' + escapeHtml(opt.name) + '</option>');
        });

        var accessOptionsHtml = ['<option value=\'\'>Any access status</option>'];
        filterOptions.accessStatuses.forEach(function (opt) {
          var selected = state.accessStatus === opt.value ? ' selected' : '';
          accessOptionsHtml.push('<option value=\'' + escapeHtml(opt.value) + '\'' + selected + '>' + escapeHtml(opt.label) + '</option>');
        });

        var yearFromVal = state.yearFrom ? escapeHtml(state.yearFrom) : '';
        var yearToVal = state.yearTo ? escapeHtml(state.yearTo) : '';
        var minYear = filterOptions.yearRange && filterOptions.yearRange.minYear ? String(filterOptions.yearRange.minYear) : '';
        var maxYear = filterOptions.yearRange && filterOptions.yearRange.maxYear ? String(filterOptions.yearRange.maxYear) : '';

        state.grantSearchEnabled = !!filterOptions.grantSearchEnabled;

        var grantFieldHtml = '';
        if (state.grantSearchEnabled) {
          grantFieldHtml = (
            '<div class=\'advanced-field\'>' +
              '<label for=\'grant-input\'>Funding / Grant</label>' +
              '<input type=\'text\' id=\'grant-input\' name=\'grantCode\' value=\'' + escapeHtml(state.grantCode) + '\' ' +
                'placeholder=\'Search grant code or title\' data-action=\'grant-input\' autocomplete=\'off\'>' +
              '<div class=\'grant-autocomplete-dropdown\' data-component=\'grant-autocomplete-dropdown\' data-populate=\'grant-suggestions\'></div>' +
            '</div>'
          );
        } else {
          grantFieldHtml = (
            '<div class=\'advanced-field\'>' +
              '<label>Funding / Grant</label>' +
              '<p class=\'field-help\'>Grant search is currently unavailable.</p>' +
            '</div>'
          );
        }

        var collapsedClass = state.advancedOpen ? '' : ' is-collapsed';
        var toggleText = state.advancedOpen ? 'Hide advanced filters' : 'Show advanced filters';
        var toggleButton = document.querySelector('.advanced-toggle-button');
        if (toggleButton) {
          toggleButton.textContent = toggleText;
        }

        container.innerHTML = (
          '<div class=\'advanced-fields' + collapsedClass + '\'>' +
            '<form class=\'advanced-filters-form\' data-action=\'advanced-filters-form\'>' +
              '<div class=\'advanced-fields-grid\'>' +
                '<div class=\'advanced-field\'>' +
                  '<label for=\'document-type-select\'>Document type</label>' +
                  '<select id=\'document-type-select\' name=\'documentType\'>' + docOptionsHtml.join('') + '</select>' +
                '</div>' +
                '<div class=\'advanced-field\'>' +
                  '<label for=\'department-select\'>Departments</label>' +
                  '<select id=\'department-select\' name=\'departmentIds\' multiple>' + deptOptionsHtml.join('') + '</select>' +
                  '<p class=\'field-help\'>Hold Ctrl (Windows) or Command (Mac) to select multiple.</p>' +
                '</div>' +
                '<div class=\'advanced-field\'>' +
                  '<label for=\'faculty-select\'>Faculties</label>' +
                  '<select id=\'faculty-select\' name=\'facultyIds\' multiple>' + facultyOptionsHtml.join('') + '</select>' +
                '</div>' +
                '<div class=\'advanced-field\'>' +
                  '<label for=\'access-status-select\'>Access status</label>' +
                  '<select id=\'access-status-select\' name=\'accessStatus\'>' + accessOptionsHtml.join('') + '</select>' +
                '</div>' +
                '<div class=\'advanced-field advanced-field-range\'>' +
                  '<label>Publication year range</label>' +
                  '<div class=\'year-range-inputs\'>' +
                    '<input type=\'number\' name=\'yearFrom\' placeholder=\'From\' value=\'' + yearFromVal + '\'' + (minYear ? ' min=\'' + escapeHtml(minYear) + '\'' : '') + (maxYear ? ' max=\'' + escapeHtml(maxYear) + '\'' : '') + '>' +
                    '<span class=\'range-separator\'></span>' +
                    '<input type=\'number\' name=\'yearTo\' placeholder=\'To\' value=\'' + yearToVal + '\'' + (minYear ? ' min=\'' + escapeHtml(minYear) + '\'' : '') + (maxYear ? ' max=\'' + escapeHtml(maxYear) + '\'' : '') + '>' +
                  '</div>' +
                '</div>' +
                grantFieldHtml +
              '</div>' +
              '<div class=\'advanced-actions-row\'>' +
                '<button type=\'submit\' class=\'button button-primary\' data-action=\'apply-advanced-filters\'>Apply filters</button>' +
                '<button type=\'button\' class=\'button button-secondary\' data-action=\'reset-advanced-filters\'>Reset filters</button>' +
              '</div>' +
            '</form>' +
          '</div>'
        );
      }

      function renderGrantSuggestions(container, suggestions) {
        if (!container) return;
        if (!suggestions || !suggestions.length) {
          container.innerHTML = '';
          return;
        }
        var itemsHtml = suggestions.map(function (g) {
          var labelParts = [g.code];
          if (g.title) {
            labelParts.push(g.title);
          }
          if (g.funderName) {
            labelParts.push('[' + g.funderName + ']');
          }
          var label = labelParts.join(' - ');
          var info = g.totalFundedOutputs != null ? ' (' + g.totalFundedOutputs + ' outputs)' : '';
          return (
            '<button type=\'button\' class=\'grant-suggestion-item\' data-action=\'select-grant-suggestion\' ' +
              'data-grant-id=\'' + escapeHtml(g.grantId) + '\' data-grant-code=\'' + escapeHtml(g.code) + '\'>' +
              escapeHtml(label + info) +
            '</button>'
          );
        }).join('');

        container.innerHTML = '<div class=\'grant-suggestions-list\'>' + itemsHtml + '</div>';
      }

      function renderAddToListModal(container) {
        if (!container) return;

        var listsJson = localStorage.getItem('lists') || '[]';
        var existingLists;
        try {
          existingLists = JSON.parse(listsJson);
        } catch (e) {
          existingLists = [];
        }

        var optionsHtml = ['<option value=\'\'>Select a list</option>'];
        if (Array.isArray(existingLists)) {
          existingLists.forEach(function (list) {
            optionsHtml.push('<option value=\'' + escapeHtml(list.id) + '\'>' + escapeHtml(list.name) + '</option>');
          });
        }

        container.innerHTML = (
          '<div class=\'modal-backdrop\'>' +
            '<div class=\'modal-dialog\' role=\'dialog\' aria-modal=\'true\' aria-labelledby=\'add-to-list-title\'>' +
              '<div class=\'modal-header\'>' +
                '<h2 id=\'add-to-list-title\'>Add to list</h2>' +
              '</div>' +
              '<div class=\'modal-body\'>' +
                '<form class=\'add-to-list-form\' data-action=\'add-to-list-form\'>' +
                  '<div class=\'form-field\'>' +
                    '<label for=\'existing-list-select\'>Existing list</label>' +
                    '<select id=\'existing-list-select\' name=\'existingListId\' data-action=\'list-selection\'>' + optionsHtml.join('') + '</select>' +
                  '</div>' +
                  '<div class=\'form-field\'>' +
                    '<label for=\'new-list-name\'>Or create new list</label>' +
                    '<input type=\'text\' id=\'new-list-name\' name=\'newListName\' data-action=\'list-name-input\' placeholder=\'List name\'>' +
                  '</div>' +
                  '<div class=\'form-field\'>' +
                    '<label for=\'new-list-type\'>New list type</label>' +
                    '<select id=\'new-list-type\' name=\'newListType\' data-action=\'list-type-change\'>' +
                      '<option value=\'favorites\'>Favorites</option>' +
                      '<option value=\'reading_list\'>Reading list</option>' +
                      '<option value=\'generic\' selected>Generic</option>' +
                    '</select>' +
                  '</div>' +
                  '<div class=\'form-actions\'>' +
                    '<button type=\'submit\' class=\'button button-primary\'>Save to list</button>' +
                    '<button type=\'button\' class=\'button button-secondary\' data-action=\'close-add-to-list-modal\'>Cancel</button>' +
                  '</div>' +
                '</form>' +
              '</div>' +
            '</div>' +
          '</div>'
        );
      }

      function syncSearchFormWithState() {
        var input = document.getElementById('main-search-query');
        if (input) {
          input.value = state.query || '';
        }
      }

      function syncAdvancedPanel() {
        var container = document.querySelector('[data-populate="advanced-filters"]');
        renderAdvancedFilters(container);
      }

      function ensureGrantIdFromCode() {
        if (!state.grantCode) {
          state.grantId = '';
          return;
        }
        try {
          var results = WebsiteSDK.searchGrants(state.grantCode, 1);
          if (Array.isArray(results) && results.length) {
            state.grantId = results[0].grantId;
          } else {
            state.grantId = '';
          }
        } catch (e) {
          state.grantId = '';
        }
      }

      function performSearch() {
        var resultsContainer = document.querySelector('[data-populate="results-list"]');
        var summaryContainer = document.querySelector('[data-populate="results-summary"]');
        var paginationContainer = document.querySelector('[data-populate="pagination"]');
        var selectionContainer = document.querySelector('[data-populate="selection-toolbar"]');

        try {
          var filters = buildFiltersFromState();
          var response = WebsiteSDK.searchOutputs(
            state.query || '',
            'all_fields',
            filters,
            state.sortBy,
            state.sortDirection,
            state.page,
            state.pageSize
          );

          var results = response && Array.isArray(response.results) ? response.results : [];
          state.totalResults = typeof response.totalResults === 'number' ? response.totalResults : 0;
          if (typeof response.page === 'number') {
            state.page = response.page;
          }
          if (typeof response.pageSize === 'number') {
            state.pageSize = response.pageSize;
          }
          state.availableSortOptions = Array.isArray(response.availableSortOptions) ? response.availableSortOptions : [];

          state.selectedOutputIds = [];

          if (resultsContainer) {
            renderResultsList(resultsContainer, results);
          }
          if (summaryContainer) {
            renderResultsSummary(summaryContainer);
          }
          if (paginationContainer) {
            renderPagination(paginationContainer);
          }
          if (selectionContainer) {
            renderSelectionToolbar(selectionContainer);
          }

          setStatusMessage('');
        } catch (e) {
          if (resultsContainer) {
            resultsContainer.innerHTML = '<li class=\'result-empty\'>An error occurred while loading results.</li>';
          }
          if (summaryContainer) {
            summaryContainer.innerHTML = '<div class=\'results-summary-inner\'><h1 class=\'results-heading\'>Search results</h1></div>';
          }
          if (paginationContainer) {
            paginationContainer.innerHTML = '';
          }
          if (selectionContainer) {
            selectionContainer.innerHTML = '';
          }
          setStatusMessage('An error occurred while loading results. Please try again.');
        }
      }

      function loadFilterOptions() {
        try {
          var response = WebsiteSDK.getSearchFilterOptions();
          filterOptions.documentTypes = Array.isArray(response.documentTypeOptions) ? response.documentTypeOptions : [];
          filterOptions.departments = Array.isArray(response.departmentOptions) ? response.departmentOptions : [];
          filterOptions.faculties = Array.isArray(response.facultyOptions) ? response.facultyOptions : [];
          filterOptions.accessStatuses = Array.isArray(response.accessStatusOptions) ? response.accessStatusOptions : [];
          filterOptions.yearRange = response.yearRange || {};
          filterOptions.grantSearchEnabled = !!response.grantSearchEnabled;
        } catch (e) {
          filterOptions.documentTypes = [];
          filterOptions.departments = [];
          filterOptions.faculties = [];
          filterOptions.accessStatuses = [];
          filterOptions.yearRange = {};
          filterOptions.grantSearchEnabled = false;
        }
      }

      function handleSearchFormSubmit(form) {
        var input = form.querySelector('input[name="query"]');
        var value = input ? input.value.trim() : '';
        state.query = value;
        state.page = 1;
        updateUrlFromState({ resetPage: true });
        ensureGrantIdFromCode();
        performSearch();
      }

      function handleClearMainSearch() {
        state.query = '';
        state.page = 1;
        syncSearchFormWithState();
        updateUrlFromState({ resetPage: true });
        ensureGrantIdFromCode();
        performSearch();
      }

      function handleAdvancedApply(form) {
        var formData = new FormData(form);

        state.documentType = formData.get('documentType') || '';

        var deptSelect = form.querySelector('select[name="departmentIds"]');
        if (deptSelect) {
          var deptSelected = Array.prototype.slice.call(deptSelect.selectedOptions).map(function (opt) { return opt.value; }).filter(function (v) { return v; });
          state.departmentIds = deptSelected;
        }

        var facultySelect = form.querySelector('select[name="facultyIds"]');
        if (facultySelect) {
          var facultySelected = Array.prototype.slice.call(facultySelect.selectedOptions).map(function (opt) { return opt.value; }).filter(function (v) { return v; });
          state.facultyIds = facultySelected;
        }

        state.accessStatus = formData.get('accessStatus') || '';

        var yearFromVal = formData.get('yearFrom') || '';
        var yearToVal = formData.get('yearTo') || '';
        state.yearFrom = yearFromVal;
        state.yearTo = yearToVal;

        var grantInput = form.querySelector('input[name="grantCode"]');
        if (grantInput) {
          state.grantCode = grantInput.value.trim();
        }
        ensureGrantIdFromCode();

        state.page = 1;
        updateUrlFromState({ resetPage: true });
        performSearch();
      }

      function handleAdvancedReset() {
        state.documentType = '';
        state.departmentIds = [];
        state.facultyIds = [];
        state.accessStatus = '';
        state.yearFrom = '';
        state.yearTo = '';
        state.grantCode = '';
        state.grantId = '';
        state.page = 1;

        syncAdvancedPanel();
        updateUrlFromState({ resetPage: true });
        performSearch();
      }

      function handleSortChange(select) {
        var value = select.value || '';
        var parts = value.split(':');
        state.sortBy = parts[0] || 'relevance';
        state.sortDirection = parts[1] || 'desc';
        state.page = 1;
        updateUrlFromState({ resetPage: true });
        performSearch();
      }

      function handleOpenAccessToggle(checkbox) {
        state.accessStatus = checkbox.checked ? 'open_access' : '';
        state.page = 1;
        updateUrlFromState({ resetPage: true });
        performSearch();
      }

      function handlePageChange(newPage) {
        if (newPage < 1) return;
        state.page = newPage;
        updateUrlFromState({ resetPage: false });
        performSearch();
      }

      function handleToggleSelection(checkbox) {
        var outputId = checkbox.getAttribute('data-output-id');
        if (!outputId) return;
        var idx = state.selectedOutputIds.indexOf(outputId);

        if (checkbox.checked) {
          if (idx === -1) {
            if (state.selectedOutputIds.length >= state.maxSelection) {
              checkbox.checked = false;
              setStatusMessage('You can select up to ' + state.maxSelection + ' outputs at a time.');
              return;
            }
            state.selectedOutputIds.push(outputId);
          }
        } else {
          if (idx !== -1) {
            state.selectedOutputIds.splice(idx, 1);
          }
        }

        var selectionContainer = document.querySelector('[data-populate="selection-toolbar"]');
        if (selectionContainer) {
          renderSelectionToolbar(selectionContainer);
        }
        if (!state.selectedOutputIds.length) {
          setStatusMessage('');
        }
      }

      function handleExportFormatChange(select) {
        state.exportFormat = select.value || 'ris';
      }

      function handleExportSelected() {
        if (!state.selectedOutputIds || !state.selectedOutputIds.length) {
          setStatusMessage('Select at least one output to export.');
          return;
        }
        if (state.selectedOutputIds.length > state.maxSelection) {
          setStatusMessage('You can export up to ' + state.maxSelection + ' outputs at a time.');
          return;
        }
        try {
          var response = WebsiteSDK.exportSelectedOutputs(state.selectedOutputIds, state.exportFormat || 'ris', 'search_results');
          if (response && response.status === 'completed' && response.fileUrl) {
            setStatusMessage(response.message || 'Export ready. Your download should begin shortly.');
            window.location.href = response.fileUrl;
            state.selectedOutputIds = [];
            var selectionContainer = document.querySelector('[data-populate="selection-toolbar"]');
            if (selectionContainer) {
              renderSelectionToolbar(selectionContainer);
            }
          } else {
            setStatusMessage((response && response.message) || 'Export did not complete. Please try again.');
          }
        } catch (e) {
          setStatusMessage('An error occurred while exporting. Please try again.');
        }
      }

      function handleGrantInputChange(input) {
        var text = input.value.trim();
        state.grantCode = text;
        state.grantId = '';

        var dropdown = document.querySelector('[data-populate="grant-suggestions"]');
        if (!dropdown) return;

        if (!text || text.length < 2 || !state.grantSearchEnabled) {
          state.grantSuggestions = [];
          renderGrantSuggestions(dropdown, []);
          return;
        }

        if (grantSearchDebounceId) {
          clearTimeout(grantSearchDebounceId);
        }
        grantSearchDebounceId = setTimeout(function () {
          grantSearchDebounceId = null;
          try {
            var suggestions = WebsiteSDK.searchGrants(text, 10);
            state.grantSuggestions = Array.isArray(suggestions) ? suggestions : [];
            renderGrantSuggestions(dropdown, state.grantSuggestions);
          } catch (e) {
            state.grantSuggestions = [];
            renderGrantSuggestions(dropdown, []);
          }
        }, 250);
      }

      function handleGrantSuggestionSelect(button) {
        var grantId = button.getAttribute('data-grant-id');
        var grantCode = button.getAttribute('data-grant-code') || '';
        state.grantId = grantId || '';
        state.grantCode = grantCode || '';

        var input = document.getElementById('grant-input');
        if (input) {
          input.value = state.grantCode;
        }

        var dropdown = document.querySelector('[data-populate="grant-suggestions"]');
        if (dropdown) {
          renderGrantSuggestions(dropdown, []);
        }
      }

      function openAddToListModal(outputId) {
        if (!outputId) return;
        state.modalOutputId = outputId;
        var container = document.querySelector('[data-populate="add-to-list-modal"]');
        if (container && !container.innerHTML) {
          renderAddToListModal(container);
        }
        var overlay = document.querySelector('[data-component="add-to-list-modal"]');
        if (overlay) {
          overlay.hidden = false;
        }
      }

      function closeAddToListModal() {
        state.modalOutputId = null;
        var overlay = document.querySelector('[data-component="add-to-list-modal"]');
        if (overlay) {
          overlay.hidden = true;
        }
      }

      function handleAddToListFormSubmit(form) {
        if (!state.modalOutputId) {
          closeAddToListModal();
          return;
        }
        var formData = new FormData(form);
        var existingListId = formData.get('existingListId') || '';
        var newListName = (formData.get('newListName') || '').trim();
        var newListType = formData.get('newListType') || '';

        var listId = existingListId || null;
        var listName = null;
        var listType = null;

        if (!listId) {
          if (!newListName) {
            setStatusMessage('Select an existing list or enter a name for a new list.');
            return;
          }
          listName = newListName;
          listType = newListType || 'generic';
        }

        try {
          var response = WebsiteSDK.addOutputToList(state.modalOutputId, listId, listName, listType);
          if (response) {
            try {
              var listsJson = localStorage.getItem('lists') || '[]';
              var listsArr = JSON.parse(listsJson);
              if (!Array.isArray(listsArr)) {
                listsArr = [];
              }
              if (response.createdNewList && response.listId && response.listName) {
                listsArr.push({
                  id: response.listId,
                  name: response.listName,
                  listType: response.listType || 'generic',
                  createdAt: new Date().toISOString()
                });
                localStorage.setItem('lists', JSON.stringify(listsArr));
              }
            } catch (e) {
            }

            setStatusMessage('Output added to list ' + '\'' + escapeHtml(response.listName || '') + '\'.');
            closeAddToListModal();
            performSearch();
          } else {
            setStatusMessage('Could not add output to list. Please try again.');
          }
        } catch (e) {
          setStatusMessage('An error occurred while adding to list. Please try again.');
        }
      }

      function handleGlobalClick(event) {
        var target = event.target;
        var actionEl = target.closest('[data-action]');
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');

        if (action === 'toggle-advanced') {
          event.preventDefault();
          state.advancedOpen = !state.advancedOpen;
          syncAdvancedPanel();
          updateUrlFromState({ resetPage: false });
          return;
        }

        if (action === 'open-output-detail') {
          event.preventDefault();
          var outputId = actionEl.getAttribute('data-output-id');
          if (outputId) {
            window.location.href = 'output_detail.html?id=' + encodeURIComponent(outputId);
          }
          return;
        }

        if (action === 'clear-main-search') {
          event.preventDefault();
          handleClearMainSearch();
          return;
        }

        if (action === 'reset-advanced-filters') {
          event.preventDefault();
          handleAdvancedReset();
          return;
        }

        if (action === 'export-selected') {
          event.preventDefault();
          handleExportSelected();
          return;
        }

        if (action === 'clear-selection') {
          event.preventDefault();
          state.selectedOutputIds = [];
          var selectionContainer = document.querySelector('[data-populate="selection-toolbar"]');
          if (selectionContainer) {
            renderSelectionToolbar(selectionContainer);
          }
          var checkboxes = document.querySelectorAll('input[data-action="toggle-select-output"]');
          checkboxes.forEach(function (cb) {
            cb.checked = false;
          });
          setStatusMessage('');
          return;
        }

        if (action === 'go-to-page') {
          event.preventDefault();
          var pageStr = actionEl.getAttribute('data-page');
          var pageNum = parseInt(pageStr || '1', 10);
          if (!isNaN(pageNum)) {
            handlePageChange(pageNum);
          }
          return;
        }

        if (action === 'select-grant-suggestion') {
          event.preventDefault();
          handleGrantSuggestionSelect(actionEl);
          return;
        }

        if (action === 'open-add-to-list') {
          event.preventDefault();
          var oid = actionEl.getAttribute('data-output-id');
          openAddToListModal(oid);
          return;
        }

        if (action === 'close-add-to-list-modal') {
          event.preventDefault();
          closeAddToListModal();
          return;
        }
      }

      function handleGlobalChange(event) {
        var target = event.target;
        var action = target.getAttribute('data-action');
        if (!action) return;

        if (action === 'toggle-select-output') {
          handleToggleSelection(target);
          return;
        }

        if (action === 'change-sort') {
          handleSortChange(target);
          return;
        }

        if (action === 'change-export-format') {
          handleExportFormatChange(target);
          return;
        }

        if (action === 'toggle-open-access') {
          handleOpenAccessToggle(target);
          return;
        }
      }

      function handleGlobalInput(event) {
        var target = event.target;
        var action = target.getAttribute('data-action');
        if (!action) return;

        if (action === 'grant-input') {
          handleGrantInputChange(target);
          return;
        }
      }

      function handleGlobalSubmit(event) {
        var form = event.target;
        var action = form.getAttribute('data-action');
        if (!action) return;

        event.preventDefault();

        if (action === 'search-form') {
          handleSearchFormSubmit(form);
          return;
        }

        if (action === 'advanced-filters-form') {
          handleAdvancedApply(form);
          return;
        }

        if (action === 'add-to-list-form') {
          handleAddToListFormSubmit(form);
          return;
        }
      }

      window.addEventListener('popstate', function () {
        parseUrlIntoState();
        syncSearchFormWithState();
        loadFilterOptions();
        syncAdvancedPanel();
        ensureGrantIdFromCode();
        performSearch();
      });

      function init() {
        parseUrlIntoState();
        syncSearchFormWithState();
        loadFilterOptions();
        syncAdvancedPanel();
        if (state.grantCode) {
          ensureGrantIdFromCode();
        }

        var modalContainer = document.querySelector('[data-populate="add-to-list-modal"]');
        if (modalContainer) {
          renderAddToListModal(modalContainer);
        }

        performSearch();

        document.addEventListener('click', handleGlobalClick);
        document.addEventListener('change', handleGlobalChange);
        document.addEventListener('input', handleGlobalInput);
        document.addEventListener('submit', handleGlobalSubmit, true);
      }

      init();
    });
  </script>
</body>
</html>
