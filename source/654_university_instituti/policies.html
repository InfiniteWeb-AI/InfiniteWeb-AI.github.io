<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>University Research Repository</title>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <link rel='stylesheet' href='framework.css'>
  <link rel='stylesheet' href='policies.css'>
</head>
<body>
  <div class='page-wrapper'>
    <header class='site-header'>
      <div class='branding-row'>
        <div class='branding-inner'>
          <a href='index.html' class='site-logo'>
            <img src='https://exlibrisgroup.com/wp-content/uploads/Esploro-Research-Discovery-Portal-1.jpg' alt='University logo'>
          </a>
        </div>
      </div>

      <nav class='primary-nav' aria-label='Main navigation'>
        <div class='primary-nav-inner'>
          <ul class='primary-nav-list'>
            <li class='nav-item'>
              <a href='index.html' title='Repository homepage with global search and quick links.'>Home</a>
            </li>
            <li class='nav-item'>
              <a href='search_results.html' title='Search interface with basic and advanced options.'>Search</a>
            </li>
            <li class='nav-item'>
              <a href='departments.html' title='Browse and select departments and faculties.'>Departments</a>
            </li>
            <li class='nav-item'>
              <a href='authors.html' title='Browse and search for researcher profiles.'>Authors</a>
            </li>
            <li class='nav-item'>
              <a href='analytics.html' title='Analytics dashboard for publications and usage statistics.'>Analytics</a>
            </li>
            <li class='nav-item'>
              <a href='lists.html' title='View and manage reading lists and favorites.'>Lists</a>
            </li>
          </ul>
        </div>
      </nav>

      <div class='utility-bar'>
        <div class='utility-inner'>
          <div class='utility-left'>
            <a href='profile.html' class='utility-link' title='User profile with followed departments and alerts.'>Profile</a>
          </div>
          <div class='utility-right'>
            <form class='header-search' action='search_results.html' method='get' role='search'>
              <label class='visually-hidden' for='site-search'>Search repository</label>
              <input type='text' id='site-search' name='q' class='search-input'>
              <button type='submit' class='search-button'>Search</button>
            </form>
          </div>
        </div>
      </div>
    </header>

    <div class='content-wrapper'>
      <main id='content' class='site-main' role='main'>
        <div class='policies-page' data-component='policies-page-controller' data-mode='default'>
          <div class='policies-inner'>
            <h1 class='page-title' data-populate='policies-title'>Policies</h1>

            <div class='policies-meta-row'>
              <div class='policies-last-updated' data-component='policies-last-updated-indicator' data-populate='policies-last-updated'></div>
              <div class='policies-mode-switcher' data-component='policies-mode-switcher' aria-label='Display mode'>
                <button type='button' class='mode-button is-active-mode' data-action='set-mode' data-mode='default'>Standard view</button>
                <button type='button' class='mode-button' data-action='set-mode' data-mode='print'>Print view</button>
              </div>
            </div>

            <div class='policies-loader' data-component='policies-content-loader'>
              <p class='loading-message'>Loading policies	





</p>
            </div>

            <div class='policies-error' data-component='policies-error-message' hidden>
              <div class='policies-error-card'>
                <p class='policies-error-text' data-populate='policies-error-text'>We could not load repository policies at this time.</p>
                <button type='button' class='retry-button' data-action='retry-load-policies'>Retry loading policies</button>
              </div>
            </div>

            <section class='policies-toc-section' data-component='policies-section-toc' data-populate='policies-toc'></section>

            <section class='policies-section-list-section' data-component='policies-section-list' data-populate='policies-sections'></section>
          </div>
        </div>
      </main>
    </div>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' title='Information about the repository and institution.'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' title='Help and FAQ for using the repository.'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='policies.html' title='Open access, reuse, and privacy policies.'>Policies</a>
            </li>
          </ul>
        </nav>
        <p class='footer-copy'>&copy; <span class='footer-year'>2024</span> University Research Repository</p>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      var pageRoot = document.querySelector('[data-component="policies-page-controller"]');
      if (!pageRoot) {
        return;
      }

      var state = {
        content: null,
        isLoading: false,
        error: null,
        mode: 'default',
        activeSectionSlug: null,
        sectionDescriptors: null,
        slugToDescriptor: null
      };

      function escapeHtml(text) {
        if (typeof text !== 'string') {
          return '';
        }
        return text.replace(/[&<>']/g, function(ch) {
          switch (ch) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '\'': return '&#39;';
            default: return ch;
          }
        });
      }

      function isPlainLeftClick(evt) {
        return evt.button === 0 && !evt.metaKey && !evt.ctrlKey && !evt.shiftKey && !evt.altKey;
      }

      function parseUrlParams() {
        var search = window.location.search || '';
        var urlParams = new URLSearchParams(search);
        var sectionParam = urlParams.get('section');
        var modeParam = urlParams.get('mode');
        return {
          sectionParam: sectionParam,
          modeParam: modeParam
        };
      }

      function slugify(heading) {
        if (!heading || typeof heading !== 'string') {
          return 'section';
        }
        var slug = heading.toLowerCase();
        slug = slug.replace(/[^a-z0-9]+/g, '-');
        slug = slug.replace(/^-+|-+$/g, '');
        if (!slug) {
          slug = 'section';
        }
        return slug;
      }

      function buildSectionDescriptors() {
        if (!state.content || !Array.isArray(state.content.sections)) {
          state.sectionDescriptors = [];
          state.slugToDescriptor = {};
          return;
        }
        var usedSlugs = {};
        var descriptors = [];
        var slugToDescriptor = {};
        state.content.sections.forEach(function(section, index) {
          var baseHeading = section && typeof section.heading === 'string' && section.heading.trim() ? section.heading.trim() : 'Section ' + (index + 1);
          var baseSlug = slugify(baseHeading);
          var slug = baseSlug;
          var counter = 2;
          while (usedSlugs[slug]) {
            slug = baseSlug + '-' + counter;
            counter += 1;
          }
          usedSlugs[slug] = true;
          var domId = 'policies-section-' + slug;
          var descriptor = {
            index: index,
            slug: slug,
            domId: domId
          };
          descriptors.push(descriptor);
          slugToDescriptor[slug] = descriptor;
        });
        state.sectionDescriptors = descriptors;
        state.slugToDescriptor = slugToDescriptor;
      }

      function resolveActiveSectionFromParam(sectionParam) {
        if (!sectionParam || !state.sectionDescriptors || state.sectionDescriptors.length === 0) {
          return null;
        }
        if (state.slugToDescriptor && state.slugToDescriptor[sectionParam]) {
          return state.slugToDescriptor[sectionParam].slug;
        }
        var index = parseInt(sectionParam, 10);
        if (!isNaN(index) && index >= 0 && index < state.sectionDescriptors.length) {
          return state.sectionDescriptors[index].slug;
        }
        return null;
      }

      function updateModeUi() {
        pageRoot.setAttribute('data-mode', state.mode);
        var buttons = pageRoot.querySelectorAll('[data-action="set-mode"]');
        buttons.forEach(function(btn) {
          var btnMode = btn.getAttribute('data-mode') || 'default';
          if (btnMode === state.mode) {
            btn.classList.add('is-active-mode');
          } else {
            btn.classList.remove('is-active-mode');
          }
        });
      }

      function updateUrl(sectionSlug, mode, replace) {
        var currentUrl = new URL(window.location.href);
        var params = currentUrl.searchParams;
        if (sectionSlug) {
          params.set('section', sectionSlug);
        } else {
          params.delete('section');
        }
        if (mode === 'print') {
          params.set('mode', 'print');
        } else {
          params.delete('mode');
        }
        var searchString = params.toString();
        var path = currentUrl.pathname;
        var fileName = path.substring(path.lastIndexOf('/') + 1) || 'policies.html';
        var newRelativeUrl = fileName + (searchString ? '?' + searchString : '') + currentUrl.hash;
        if (replace) {
          window.history.replaceState({}, '', newRelativeUrl);
        } else {
          window.history.pushState({}, '', newRelativeUrl);
        }
      }

      function scrollToSectionBySlug(slug, smooth) {
        if (!slug || !state.slugToDescriptor) {
          return;
        }
        var descriptor = state.slugToDescriptor[slug];
        if (!descriptor) {
          return;
        }
        var target = document.getElementById(descriptor.domId);
        if (!target) {
          return;
        }
        try {
          target.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'start' });
        } catch (e) {
          target.scrollIntoView();
        }
      }

      function renderTitle(container) {
        var title = state.content && typeof state.content.title === 'string' && state.content.title.trim() ? state.content.title : 'Policies';
        container.textContent = title;
      }

      function renderLastUpdated(container) {
        container.textContent = '';
        if (!state.content || !state.content.lastUpdated) {
          return;
        }
        var text = 'Last updated: ' + state.content.lastUpdated;
        container.textContent = text;
      }

      function renderTOC(container) {
        if (!state.content || !state.sectionDescriptors || state.sectionDescriptors.length === 0 || state.error || state.mode === 'print') {
          container.innerHTML = '';
          container.setAttribute('hidden', 'hidden');
          return;
        }
        container.removeAttribute('hidden');
        var listItems = '';
        state.sectionDescriptors.forEach(function(desc) {
          var section = state.content.sections[desc.index];
          var heading = section && section.heading ? section.heading : 'Section ' + (desc.index + 1);
          var isActive = desc.slug === state.activeSectionSlug;
          var safeHeading = escapeHtml(heading);
          var href = 'policies.html?section=' + encodeURIComponent(desc.slug);
          if (state.mode === 'print') {
            href += '&mode=print';
          }
          listItems += `
      <li class='policies-toc-item${isActive ? ' is-active-toc-item' : ''}'>
        <a href='${href}' class='policies-toc-link' data-action='policies-toc-link' data-section-slug='${desc.slug}'>
          ${safeHeading}
        </a>
      </li>`;
        });
        var panelHtml = `
      <div class='policies-card policies-toc-card'>
        <h2 class='policies-toc-heading'>On this page</h2>
        <ul class='policies-toc-list'>
          ${listItems}
        </ul>
      </div>`;
        container.innerHTML = panelHtml;
      }

      function renderSections(container) {
        if (!state.content || !state.sectionDescriptors || state.sectionDescriptors.length === 0 || state.error) {
          container.innerHTML = '';
          return;
        }
        var html = '';
        state.sectionDescriptors.forEach(function(desc) {
          var section = state.content.sections[desc.index] || {};
          var heading = section.heading || 'Section ' + (desc.index + 1);
          var safeHeading = escapeHtml(heading);
          var isActive = desc.slug === state.activeSectionSlug;
          var activeClass = isActive ? ' is-active-section' : '';
          html += `
      <article id='${desc.domId}' class='policies-card policies-section-card${activeClass}' data-section-slug='${desc.slug}'>
        <h2 class='policies-section-heading'>${safeHeading}</h2>
        <div class='policies-section-body'>
          ${section.bodyHtml || ''}
        </div>
      </article>`;
        });
        container.innerHTML = html;
      }

      function renderErrorText(container) {
        if (state.error) {
          container.textContent = state.error;
        } else {
          container.textContent = '';
        }
      }

      function renderBasedOnState() {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(container) {
          var type = container.getAttribute('data-populate');
          if (type === 'policies-title') {
            renderTitle(container);
          } else if (type === 'policies-last-updated') {
            renderLastUpdated(container);
          } else if (type === 'policies-toc') {
            renderTOC(container);
          } else if (type === 'policies-sections') {
            renderSections(container);
          } else if (type === 'policies-error-text') {
            renderErrorText(container);
          }
        });

        var loader = document.querySelector('[data-component="policies-content-loader"]');
        var errorContainer = document.querySelector('[data-component="policies-error-message"]');

        if (loader) {
          loader.style.display = state.isLoading ? '' : 'none';
        }

        if (errorContainer) {
          if (state.error) {
            errorContainer.removeAttribute('hidden');
            var errorTextEl = errorContainer.querySelector('[data-populate="policies-error-text"]');
            if (errorTextEl) {
              errorTextEl.textContent = state.error;
            }
          } else {
            errorContainer.setAttribute('hidden', 'hidden');
          }
        }

        updateModeUi();
      }

      function loadPoliciesContent(initialSectionParam) {
        state.isLoading = true;
        state.error = null;
        renderBasedOnState();

        var content;
        try {
          content = WebsiteSDK.getInformationalPageContent('policies');
        } catch (err) {
          state.isLoading = false;
          state.error = 'We could not load repository policies at this time. Please try again.';
          renderBasedOnState();
          return;
        }

        if (!content || !Array.isArray(content.sections)) {
          state.isLoading = false;
          state.error = 'Policies content is temporarily unavailable. Please try again later.';
          renderBasedOnState();
          return;
        }

        state.content = content;
        buildSectionDescriptors();

        var slugFromParam = resolveActiveSectionFromParam(initialSectionParam);
        state.activeSectionSlug = slugFromParam;

        state.isLoading = false;
        renderBasedOnState();

        if (slugFromParam && initialSectionParam && initialSectionParam !== slugFromParam) {
          updateUrl(slugFromParam, state.mode, true);
        }
        if (slugFromParam) {
          scrollToSectionBySlug(slugFromParam, true);
        }
      }

      function setMode(mode, options) {
        var normalized = mode === 'print' ? 'print' : 'default';
        if (state.mode === normalized && !(options && options.force)) {
          return;
        }
        state.mode = normalized;
        renderBasedOnState();
        var slug = state.activeSectionSlug;
        updateUrl(slug, state.mode, !!(options && options.replace));
      }

      function setActiveSectionBySlug(slug, options) {
        if (!slug || !state.sectionDescriptors || !state.slugToDescriptor || !state.slugToDescriptor[slug]) {
          return;
        }
        state.activeSectionSlug = slug;
        renderBasedOnState();
        if (!options || options.scroll !== false) {
          scrollToSectionBySlug(slug, true);
        }
        var shouldUpdateUrl = !options || options.updateUrl !== false;
        if (shouldUpdateUrl) {
          updateUrl(slug, state.mode, false);
        }
      }

      function handlePopState() {
        var params = parseUrlParams();
        state.mode = params.modeParam === 'print' ? 'print' : 'default';
        if (!state.content) {
          updateModeUi();
          loadPoliciesContent(params.sectionParam);
          return;
        }
        var newSlug = resolveActiveSectionFromParam(params.sectionParam);
        state.activeSectionSlug = newSlug;
        renderBasedOnState();
        if (newSlug) {
          scrollToSectionBySlug(newSlug, true);
        }
      }

      function attachEventHandlers() {
        pageRoot.addEventListener('click', function(event) {
          var actionElement = event.target.closest('[data-action]');
          if (!actionElement) {
            return;
          }
          var action = actionElement.getAttribute('data-action');
          if (!action) {
            return;
          }
          if (action === 'set-mode') {
            if (!isPlainLeftClick(event)) {
              return;
            }
            event.preventDefault();
            var mode = actionElement.getAttribute('data-mode') || 'default';
            setMode(mode, { fromUser: true });
          } else if (action === 'retry-load-policies') {
            if (!isPlainLeftClick(event)) {
              return;
            }
            event.preventDefault();
            var params = parseUrlParams();
            loadPoliciesContent(params.sectionParam);
          } else if (action === 'policies-toc-link') {
            if (!isPlainLeftClick(event)) {
              return;
            }
            event.preventDefault();
            var slug = actionElement.getAttribute('data-section-slug');
            if (slug) {
              setActiveSectionBySlug(slug, { updateUrl: true, scroll: true });
            }
          }
        });

        var sectionListWrapper = document.querySelector('[data-component="policies-section-list"]');
        if (sectionListWrapper) {
          sectionListWrapper.addEventListener('click', function(event) {
            var anchor = event.target.closest('a[href]');
            if (!anchor) {
              return;
            }
            var href = anchor.getAttribute('href');
            if (!href) {
              return;
            }
            var targetUrl;
            try {
              targetUrl = new URL(href, window.location.href);
            } catch (e) {
              return;
            }
            var currentUrl = new URL(window.location.href);
            if (targetUrl.origin !== currentUrl.origin) {
              return;
            }
            var targetPath = targetUrl.pathname;
            var currentPath = currentUrl.pathname;
            var targetFile = targetPath.substring(targetPath.lastIndexOf('/') + 1);
            var currentFile = currentPath.substring(currentPath.lastIndexOf('/') + 1);
            if (targetFile.toLowerCase() !== currentFile.toLowerCase()) {
              return;
            }
            var targetSectionParam = targetUrl.searchParams.get('section');
            if (!targetSectionParam) {
              return;
            }
            if (!isPlainLeftClick(event)) {
              return;
            }
            event.preventDefault();
            var slug = resolveActiveSectionFromParam(targetSectionParam) || targetSectionParam;
            setActiveSectionBySlug(slug, { updateUrl: true, scroll: true });
          });
        }

        window.addEventListener('popstate', handlePopState);
      }

      function initialize() {
        var params = parseUrlParams();
        state.mode = params.modeParam === 'print' ? 'print' : 'default';
        updateModeUi();
        state.isLoading = true;
        renderBasedOnState();
        attachEventHandlers();
        loadPoliciesContent(params.sectionParam);
      }

      initialize();
    });
  </script>
</body>
</html>
