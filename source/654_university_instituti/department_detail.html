<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>University Research Repository</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="department_detail.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="branding-row">
        <div class="branding-inner">
          <a href="index.html" class="site-logo">
            <img src="logo.svg" alt="University logo">
          </a>
        </div>
      </div>

      <nav class="primary-nav" aria-label="Main navigation">
        <div class="primary-nav-inner">
          <ul class="primary-nav-list">
            <li class="nav-item">
              <a href="index.html" title="Repository homepage with global search and quick links.">Home</a>
            </li>
            <li class="nav-item">
              <a href="search_results.html" title="Search interface with basic and advanced options.">Search</a>
            </li>
            <li class="nav-item">
              <a href="departments.html" title="Browse and select departments and faculties.">Departments</a>
            </li>
            <li class="nav-item">
              <a href="authors.html" title="Browse and search for researcher profiles.">Authors</a>
            </li>
            <li class="nav-item">
              <a href="analytics.html" title="Analytics dashboard for publications and usage statistics.">Analytics</a>
            </li>
            <li class="nav-item">
              <a href="lists.html" title="View and manage reading lists and favorites.">Lists</a>
            </li>
          </ul>
        </div>
      </nav>

      <div class="utility-bar">
        <div class="utility-inner">
          <div class="utility-left">
            <a href="profile.html" class="utility-link" title="User profile with followed departments and alerts.">Profile</a>
          </div>
          <div class="utility-right">
            <form class="header-search" action="search_results.html" method="get" role="search">
              <label class="visually-hidden" for="site-search">Search repository</label>
              <input type="text" id="site-search" name="q" class="search-input">
              <button type="submit" class="search-button">Search</button>
            </form>
          </div>
        </div>
      </div>
    </header>

    <div class="content-wrapper">
      <main id="content" class="site-main" role="main">
        <div class="department-page-container">
          <!-- Loading overlay -->
          <div class="department-loader-overlay" data-component="department-page-loader" hidden>
            <div class="department-loader-inner">
              <span class="department-loader-spinner" aria-hidden="true"></span>
              <span class="department-loader-text">Loading department...</span>
            </div>
          </div>

          <!-- Department header -->
          <section class="department-header-section" data-component="department-header">
            <div class="department-header-inner" data-populate="department-header"></div>
          </section>

          <!-- Notification bar for follow/alert feedback -->
          <div class="follow-status-notification" data-component="follow-status-feedback" role="status" aria-live="polite" hidden></div>

          <!-- Error / global state panel -->
          <section class="department-error-section" data-component="department-error-state" hidden>
            <div class="department-error-inner" data-populate="department-error"></div>
          </section>

          <!-- Publication summary card -->
          <section class="publication-summary-section pill-card" data-component="publication-summary-panel">
            <div class="publication-summary-inner" data-populate="publication-summary"></div>
          </section>

          <!-- Recent outputs card -->
          <section class="recent-outputs-section pill-card" data-component="recent-outputs-list">
            <div class="recent-outputs-inner" data-populate="recent-outputs"></div>
          </section>

          <!-- Filters and sort controls -->
          <section class="outputs-controls-section">
            <div class="outputs-filter-bar" data-component="outputs-filter-bar">
              <form class="outputs-filter-form" onsubmit="return false;">
                <div class="filter-row">
                  <div class="filter-group">
                    <span class="filter-label">Filter outputs by:</span>

                    <label class="filter-control">
                      <span class="filter-control-label">Document type</span>
                      <select name="filterDocumentType" data-filter="document-type" data-action="change-document-type">
                        <option value="">All types</option>
                        <option value="journal_article">Journal article</option>
                        <option value="doctoral_thesis">Doctoral thesis</option>
                        <option value="conference_paper">Conference paper</option>
                        <option value="dataset">Dataset</option>
                        <option value="other">Other</option>
                      </select>
                    </label>

                    <label class="filter-control filter-control-inline">
                      <input type="checkbox" data-filter="open-access-only" data-action="toggle-open-access-only">
                      <span class="filter-control-label-inline">Open access only</span>
                    </label>

                    <label class="filter-control">
                      <span class="filter-control-label">Access status</span>
                      <select name="filterAccessStatus" data-filter="access-status" data-action="change-access-status">
                        <option value="">All statuses</option>
                        <option value="open_access">Open access</option>
                        <option value="embargoed">Embargoed</option>
                        <option value="restricted">Restricted</option>
                        <option value="closed">Closed</option>
                        <option value="metadata_only">Metadata only</option>
                      </select>
                    </label>

                    <div class="filter-control filter-year-range">
                      <span class="filter-control-label">Publication year</span>
                      <div class="filter-year-inputs">
                        <label>
                          <span class="visually-hidden">Year from</span>
                          <input type="number" inputmode="numeric" min="1900" max="2100" placeholder="From" data-filter="year-from" data-action="change-year-range">
                        </label>
                        <span class="filter-year-separator">–</span>
                        <label>
                          <span class="visually-hidden">Year to</span>
                          <input type="number" inputmode="numeric" min="1900" max="2100" placeholder="To" data-filter="year-to" data-action="change-year-range">
                        </label>
                      </div>
                    </div>

                    <label class="filter-control">
                      <span class="filter-control-label">Minimum citations</span>
                      <input type="number" inputmode="numeric" min="0" step="1" placeholder="Any" data-filter="min-citations" data-action="change-min-citations">
                    </label>
                  </div>
                </div>
              </form>
            </div>

            <div class="outputs-sort-control" data-component="outputs-sort-control">
              <div class="sort-row">
                <div class="sort-spacer"></div>
                <div class="sort-controls">
                  <label class="sort-control">
                    <span class="sort-label">Sort by:</span>
                    <select data-sort="sort-by" data-action="change-sort-by">
                      <option value="date">Publication year</option>
                      <option value="citations">Citations</option>
                      <option value="downloads">Downloads</option>
                    </select>
                  </label>
                  <label class="sort-control">
                    <span class="sort-label">Direction:</span>
                    <select data-sort="sort-direction" data-action="change-sort-direction">
                      <option value="desc">Newest / highest first</option>
                      <option value="asc">Oldest / lowest first</option>
                    </select>
                  </label>
                </div>
              </div>
            </div>
          </section>

          <!-- Outputs table -->
          <section class="outputs-table-section" data-component="outputs-table">
            <div class="outputs-table-inner" data-populate="outputs-table"></div>
          </section>

          <!-- Pagination -->
          <nav class="outputs-pagination" data-component="outputs-pagination" aria-label="Outputs pagination">
            <div class="outputs-pagination-inner" data-populate="outputs-pagination"></div>
          </nav>

          <!-- Alert configuration modal -->
          <div class="alert-modal-backdrop" data-component="alert-config-modal" hidden>
            <div class="alert-modal" role="dialog" aria-modal="true" aria-labelledby="alert-config-title">
              <div class="alert-modal-header">
                <h2 id="alert-config-title">Create alert for department</h2>
              </div>
              <div class="alert-modal-body">
                <form class="alert-config-form" data-action="submit-alert-form">
                  <div class="form-row">
                    <label class="form-label">Department</label>
                    <div class="form-static-value" data-role="alert-department-name"></div>
                  </div>

                  <div class="form-row">
                    <label class="form-label" for="alert-name-input">Alert name (optional)</label>
                    <input id="alert-name-input" name="alertName" type="text" class="form-input" maxlength="200">
                  </div>

                  <div class="form-row">
                    <label class="form-label" for="alert-keyword-input">Keyword or phrase<span class="required-indicator">*</span></label>
                    <input id="alert-keyword-input" name="keyword" type="text" class="form-input" required maxlength="200">
                  </div>

                  <div class="form-row">
                    <label class="form-label" for="alert-scope-select">Search field<span class="required-indicator">*</span></label>
                    <select id="alert-scope-select" name="searchScope" class="form-select" required>
                      <option value="title">Title</option>
                      <option value="abstract">Abstract</option>
                      <option value="keywords">Keywords</option>
                      <option value="full_text">Full text</option>
                    </select>
                  </div>

                  <div class="form-row">
                    <label class="form-label" for="alert-frequency-select">Frequency<span class="required-indicator">*</span></label>
                    <select id="alert-frequency-select" name="frequency" class="form-select" required>
                      <option value="daily">Daily</option>
                      <option value="weekly">Weekly</option>
                      <option value="monthly">Monthly</option>
                      <option value="immediate">Immediate</option>
                    </select>
                  </div>

                  <div class="form-row">
                    <label class="form-label" for="alert-delivery-select">Delivery method<span class="required-indicator">*</span></label>
                    <select id="alert-delivery-select" name="deliveryMethod" class="form-select" required>
                      <option value="on_site">On-site</option>
                      <option value="email">Email</option>
                    </select>
                  </div>

                  <input type="hidden" name="departmentId" data-role="alert-department-id">

                  <div class="form-row form-row-error" data-role="alert-form-error" aria-live="polite"></div>

                  <div class="alert-modal-footer">
                    <button type="button" class="btn-secondary" data-action="close-alert-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save alert</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <footer class="site-footer">
      <div class="footer-inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-nav-list">
            <li class="footer-nav-item">
              <a href="about.html" title="Information about the repository and institution.">About</a>
            </li>
            <li class="footer-nav-item">
              <a href="help.html" title="Help and FAQ for using the repository.">Help</a>
            </li>
            <li class="footer-nav-item">
              <a href="policies.html" title="Open access, reuse, and privacy policies.">Policies</a>
            </li>
          </ul>
        </nav>
        <p class="footer-copy">&copy; <span class="footer-year">2024</span> University Research Repository</p>
      </div>
    </footer>
  </div>

  <script src="business_logic.js"></script>
  <script>
  (function() {
    'use strict';

    let currentDepartmentId = null;
    let departmentDetail = null;
    let outputsData = null;
    let isMissingDepartmentId = false;
    let isDepartmentDetailError = false;
    let isOutputsError = false;
    let isLoadingDetail = false;
    let isLoadingOutputs = false;
    let notificationTimeoutId = null;

    function getUrlState() {
      const params = new URLSearchParams(window.location.search);
      const state = {};

      state.departmentId = params.get('departmentId') || null;

      const pageParam = parseInt(params.get('page'), 10);
      state.page = !isNaN(pageParam) && pageParam > 0 ? pageParam : 1;

      const pageSizeParam = parseInt(params.get('pageSize'), 10);
      state.pageSize = !isNaN(pageSizeParam) && pageSizeParam > 0 ? pageSizeParam : 20;

      const sortByParam = params.get('sortBy') || 'date';
      state.sortBy = ['date', 'citations', 'downloads'].indexOf(sortByParam) !== -1 ? sortByParam : 'date';

      const sortDirectionParam = params.get('sortDirection') || 'desc';
      state.sortDirection = ['asc', 'desc'].indexOf(sortDirectionParam) !== -1 ? sortDirectionParam : 'desc';

      state.filterDocumentType = params.get('filterDocumentType') || '';
      state.filterOpenAccessOnly = params.get('filterOpenAccessOnly') === 'true';
      state.filterAccessStatus = params.get('filterAccessStatus') || '';

      const yearFromParam = params.get('filterYearFrom');
      state.filterYearFrom = yearFromParam ? parseInt(yearFromParam, 10) : null;
      if (isNaN(state.filterYearFrom)) {
        state.filterYearFrom = null;
      }

      const yearToParam = params.get('filterYearTo');
      state.filterYearTo = yearToParam ? parseInt(yearToParam, 10) : null;
      if (isNaN(state.filterYearTo)) {
        state.filterYearTo = null;
      }

      const minCitParam = params.get('filterMinCitations');
      state.filterMinCitations = minCitParam ? parseInt(minCitParam, 10) : null;
      if (isNaN(state.filterMinCitations)) {
        state.filterMinCitations = null;
      }

      return state;
    }

    function buildFiltersFromState(state) {
      const filters = {};

      if (state.filterDocumentType) {
        filters.documentTypes = [state.filterDocumentType];
      }

      filters.openAccessOnly = !!state.filterOpenAccessOnly;

      if (state.filterYearFrom) {
        filters.yearFrom = state.filterYearFrom;
      }

      if (state.filterYearTo) {
        filters.yearTo = state.filterYearTo;
      }

      if (state.filterMinCitations !== null && state.filterMinCitations !== undefined) {
        filters.minCitationCount = state.filterMinCitations;
      }

      if (state.filterAccessStatus) {
        filters.accessStatus = state.filterAccessStatus;
      }

      return filters;
    }

    function setLoadingOverlayVisible(visible) {
      const loader = document.querySelector('[data-component="department-page-loader"]');
      if (!loader) {
        return;
      }
      loader.hidden = !visible;
    }

    function updateLoadingState() {
      setLoadingOverlayVisible(isLoadingDetail || isLoadingOutputs);
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) {
        return '';
      }
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function clearNotification() {
      const bar = document.querySelector('[data-component="follow-status-feedback"]');
      if (!bar) {
        return;
      }
      bar.hidden = true;
      bar.innerHTML = '';
      if (notificationTimeoutId) {
        window.clearTimeout(notificationTimeoutId);
        notificationTimeoutId = null;
      }
    }

    function showNotification(message, type) {
      const bar = document.querySelector('[data-component="follow-status-feedback"]');
      if (!bar) {
        return;
      }

      bar.innerHTML = '';
      const wrapper = document.createElement('div');
      wrapper.className = 'notification-bar notification-' + (type === 'error' ? 'error' : 'success');
      wrapper.innerHTML = `
        <span class="notification-message">${escapeHtml(message)}</span>
        <button type="button" class="notification-close" aria-label="Dismiss notification" data-action="dismiss-notification">×</button>
      `;
      bar.appendChild(wrapper);
      bar.hidden = false;

      if (notificationTimeoutId) {
        window.clearTimeout(notificationTimeoutId);
      }
      notificationTimeoutId = window.setTimeout(function() {
        clearNotification();
      }, 5000);
    }

    function renderDepartmentHeader(container) {
      const section = container.closest('[data-component]');
      if (!section) {
        return;
      }

      if (isMissingDepartmentId || isDepartmentDetailError || !departmentDetail) {
        section.hidden = true;
        container.innerHTML = '';
        return;
      }

      section.hidden = false;
      const statusText = departmentDetail.isActive ? 'Active department' : 'Inactive department';
      const statusClass = departmentDetail.isActive ? 'status-active' : 'status-inactive';
      const isFollowed = !!departmentDetail.isFollowed;

      container.innerHTML = `
        <div class="department-header-content">
          <div class="department-header-text">
            <h1 class="department-title">${escapeHtml(departmentDetail.name || '')}</h1>
            <div class="department-meta">
              ${departmentDetail.facultyName ? `<span class="department-faculty">${escapeHtml(departmentDetail.facultyName)}</span>` : ''}
              ${departmentDetail.code ? `<span class="department-code">Code: ${escapeHtml(departmentDetail.code)}</span>` : ''}
              <span class="department-status ${statusClass}">${escapeHtml(statusText)}</span>
            </div>
            ${departmentDetail.description ? `<p class="department-description">${escapeHtml(departmentDetail.description)}</p>` : ''}
            ${departmentDetail.homepageUrl ? `<p class="department-homepage"><a href="${escapeHtml(departmentDetail.homepageUrl)}" target="_blank" rel="noopener noreferrer">Department homepage</a></p>` : ''}
          </div>
          <div class="department-header-actions">
            <button type="button" class="btn-primary" data-action="toggle-follow" data-following="${isFollowed ? 'true' : 'false'}">
              ${isFollowed ? 'Unfollow department' : 'Follow department'}
            </button>
            <button type="button" class="btn-secondary" data-action="open-alert-modal">Create alert</button>
          </div>
        </div>
      `;
    }

    function renderPublicationSummary(container) {
      const section = container.closest('[data-component]');
      if (!section) {
        return;
      }

      if (isMissingDepartmentId || isDepartmentDetailError || !departmentDetail) {
        section.hidden = true;
        container.innerHTML = '';
        return;
      }

      section.hidden = false;
      const summary = Array.isArray(departmentDetail.publicationSummaryByYear) ? departmentDetail.publicationSummaryByYear.slice() : [];

      if (!summary.length) {
        container.innerHTML = `
          <h2 class="card-title-link">Publication summary</h2>
          <p class="card-text">No publication summary is available for this department.</p>
        `;
        return;
      }

      summary.sort(function(a, b) {
        return (a.year || 0) - (b.year || 0);
      });

      let rowsHtml = '';
      summary.forEach(function(item) {
        const year = item.year || '';
        const totalOutputs = typeof item.totalOutputs === 'number' ? item.totalOutputs : '';
        const openAccessOutputs = typeof item.openAccessOutputs === 'number' ? item.openAccessOutputs : '';
        rowsHtml += `
          <tr>
            <td>
              <button type="button" class="link-button year-link" data-action="filter-year-from-summary" data-year="${escapeHtml(year)}">${escapeHtml(year)}</button>
            </td>
            <td>${escapeHtml(totalOutputs)}</td>
            <td>${escapeHtml(openAccessOutputs)}</td>
          </tr>
        `;
      });

      container.innerHTML = `
        <h2 class="card-title-link">Publication summary</h2>
        <p class="card-text">Outputs and open access outputs by year for this department.</p>
        <div class="summary-table-wrapper">
          <table class="summary-table">
            <thead>
              <tr>
                <th scope="col">Year</th>
                <th scope="col">Total outputs</th>
                <th scope="col">Open access outputs</th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderRecentOutputs(container) {
      const section = container.closest('[data-component]');
      if (!section) {
        return;
      }

      if (isMissingDepartmentId || isDepartmentDetailError || !departmentDetail) {
        section.hidden = true;
        container.innerHTML = '';
        return;
      }

      section.hidden = false;
      const recentOutputs = Array.isArray(departmentDetail.recentOutputs) ? departmentDetail.recentOutputs : [];

      if (!recentOutputs.length) {
        container.innerHTML = `
          <h2 class="card-title-link">Recent outputs</h2>
          <p class="card-text">No recent outputs are available for this department.</p>
        `;
        return;
      }

      let listItems = '';
      recentOutputs.forEach(function(output) {
        const title = output.title || 'Untitled output';
        const year = output.publicationYear ? String(output.publicationYear) : '';
        const docType = output.documentType || '';
        const citations = typeof output.citationCount === 'number' ? output.citationCount : null;
        const downloads = typeof output.downloadCount === 'number' ? output.downloadCount : null;
        const isOpenAccess = !!output.isOpenAccess;

        const metaParts = [];
        if (year) {
          metaParts.push(year);
        }
        if (docType) {
          metaParts.push(docType.replace(/_/g, ' '));
        }
        if (citations !== null) {
          metaParts.push(citations + ' citations');
        }
        if (downloads !== null) {
          metaParts.push(downloads + ' downloads');
        }
        if (isOpenAccess) {
          metaParts.push('Open access');
        }

        listItems += `
          <li class="recent-output-item">
            <a href="javascript:void(0)" class="recent-output-title" data-action="open-output-detail" data-output-id="${escapeHtml(output.outputId || '')}">
              ${escapeHtml(title)}
            </a>
            ${metaParts.length ? `<div class="recent-output-meta">${escapeHtml(metaParts.join(' · '))}</div>` : ''}
          </li>
        `;
      });

      container.innerHTML = `
        <h2 class="card-title-link">Recent outputs</h2>
        <ul class="recent-outputs-list">
          ${listItems}
        </ul>
        <div class="card-footer-link">
          <a href="javascript:void(0)" data-action="view-all-in-search-results">View all outputs from this department</a>
        </div>
      `;
    }

    function renderOutputsTable(container) {
      const section = container.closest('[data-component]');
      if (!section) {
        return;
      }

      if (isMissingDepartmentId || isDepartmentDetailError) {
        section.hidden = true;
        container.innerHTML = '';
        return;
      }

      if (isOutputsError) {
        section.hidden = true;
        container.innerHTML = '';
        return;
      }

      if (!outputsData) {
        section.hidden = false;
        container.innerHTML = '<p class="outputs-placeholder">Outputs will appear here once loaded.</p>';
        return;
      }

      section.hidden = false;
      const results = Array.isArray(outputsData.results) ? outputsData.results : [];
      const totalResults = typeof outputsData.totalResults === 'number' ? outputsData.totalResults : 0;
      const page = typeof outputsData.page === 'number' ? outputsData.page : 1;
      const pageSize = typeof outputsData.pageSize === 'number' ? outputsData.pageSize : results.length;

      if (!results.length) {
        container.innerHTML = `
          <p class="outputs-count">No outputs found for the current filters.</p>
        `;
        return;
      }

      const startIndex = (page - 1) * pageSize + 1;
      const endIndex = Math.min(startIndex + results.length - 1, totalResults);

      let rowsHtml = '';
      results.forEach(function(output) {
        const title = output.title || 'Untitled output';
        const year = output.publicationYear ? String(output.publicationYear) : '';
        const docType = output.documentType || '';
        const citations = typeof output.citationCount === 'number' ? output.citationCount : '';
        const downloads = typeof output.downloadCount === 'number' ? output.downloadCount : '';
        const isOpenAccess = !!output.isOpenAccess;

        rowsHtml += `
          <tr class="outputs-row">
            <td class="outputs-cell outputs-title-cell">
              <a href="javascript:void(0)" class="output-title-link" data-action="open-output-detail" data-output-id="${escapeHtml(output.outputId || '')}">
                ${escapeHtml(title)}
              </a>
            </td>
            <td class="outputs-cell">${escapeHtml(year)}</td>
            <td class="outputs-cell">${escapeHtml(docType.replace(/_/g, ' '))}</td>
            <td class="outputs-cell">${escapeHtml(citations)}</td>
            <td class="outputs-cell">${escapeHtml(downloads)}</td>
            <td class="outputs-cell outputs-oa-cell">${isOpenAccess ? 'Open access' : ''}</td>
          </tr>
        `;
      });

      container.innerHTML = `
        <div class="outputs-count">Showing ${escapeHtml(startIndex)}–${escapeHtml(endIndex)} of ${escapeHtml(totalResults)}</div>
        <div class="outputs-table-wrapper">
          <table class="outputs-table">
            <thead>
              <tr>
                <th scope="col">Title</th>
                <th scope="col">Year</th>
                <th scope="col">Type</th>
                <th scope="col">Citations</th>
                <th scope="col">Downloads</th>
                <th scope="col">Access</th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderPagination(container) {
      const component = container.closest('[data-component]');
      if (!component) {
        return;
      }

      if (isMissingDepartmentId || isDepartmentDetailError || isOutputsError || !outputsData) {
        component.hidden = true;
        container.innerHTML = '';
        return;
      }

      const totalResults = typeof outputsData.totalResults === 'number' ? outputsData.totalResults : 0;
      const page = typeof outputsData.page === 'number' ? outputsData.page : 1;
      const pageSize = typeof outputsData.pageSize === 'number' ? outputsData.pageSize : 20;

      if (!totalResults || totalResults <= 0) {
        component.hidden = true;
        container.innerHTML = '';
        return;
      }

      const totalPages = Math.max(1, Math.ceil(totalResults / pageSize));

      if (totalPages <= 1) {
        component.hidden = true;
        container.innerHTML = '';
        return;
      }

      component.hidden = false;

      const canPrev = page > 1;
      const canNext = page < totalPages;

      let pagesHtml = '';
      const maxPagesToShow = 7;
      let startPage = Math.max(1, page - 3);
      let endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);
      if (endPage - startPage + 1 < maxPagesToShow) {
        startPage = Math.max(1, endPage - maxPagesToShow + 1);
      }

      for (let p = startPage; p <= endPage; p += 1) {
        pagesHtml += `
          <button type="button" class="page-link ${p === page ? 'is-current' : ''}" data-action="change-page" data-page="${p}">${p}</button>
        `;
      }

      container.innerHTML = `
        <div class="pagination-row">
          <div class="pagination-page-size">
            <label>
              <span class="pagination-label">Results per page:</span>
              <select data-action="change-page-size" data-pagination="page-size">
                <option value="10" ${pageSize === 10 ? 'selected' : ''}>10</option>
                <option value="20" ${pageSize === 20 ? 'selected' : ''}>20</option>
                <option value="50" ${pageSize === 50 ? 'selected' : ''}>50</option>
              </select>
            </label>
          </div>
          <div class="pagination-controls">
            <button type="button" class="page-link prev-link" data-action="change-page" data-page="${page - 1}" ${canPrev ? '' : 'disabled'}>Previous</button>
            ${pagesHtml}
            <button type="button" class="page-link next-link" data-action="change-page" data-page="${page + 1}" ${canNext ? '' : 'disabled'}>Next</button>
          </div>
          <div class="pagination-summary">Page ${escapeHtml(page)} of ${escapeHtml(totalPages)}</div>
        </div>
      `;
    }

    function renderDepartmentError(container) {
      const section = container.closest('[data-component]');
      if (!section) {
        return;
      }

      if (!isMissingDepartmentId && !isDepartmentDetailError && !isOutputsError) {
        section.hidden = true;
        container.innerHTML = '';
        return;
      }

      let title = '';
      let message = '';
      let showRetryDetail = false;
      let showRetryOutputs = false;

      if (isMissingDepartmentId) {
        title = 'Department not specified';
        message = 'This page requires a departmentId in the URL. Use the Departments or Search pages to select a department and try again.';
      } else if (isDepartmentDetailError) {
        title = 'Department not available';
        message = 'We could not load this department at the moment. You can retry loading it below.';
        showRetryDetail = true;
      } else if (isOutputsError) {
        title = 'Outputs not available';
        message = 'We could not load the outputs for this department. You can retry loading them below.';
        showRetryOutputs = true;
      }

      section.hidden = false;
      container.innerHTML = `
        <div class="pill-card error-card">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(message)}</p>
          <div class="error-actions">
            ${showRetryDetail ? '<button type="button" class="btn-secondary" data-action="retry-department-detail">Retry loading department</button>' : ''}
            ${showRetryOutputs ? '<button type="button" class="btn-secondary" data-action="retry-outputs-load">Retry loading outputs</button>' : ''}
          </div>
        </div>
      `;
    }

    function renderAll() {
      const populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        const type = element.getAttribute('data-populate');
        if (!type) {
          return;
        }
        if (type === 'department-header') {
          renderDepartmentHeader(element);
        } else if (type === 'publication-summary') {
          renderPublicationSummary(element);
        } else if (type === 'recent-outputs') {
          renderRecentOutputs(element);
        } else if (type === 'outputs-table') {
          renderOutputsTable(element);
        } else if (type === 'outputs-pagination') {
          renderPagination(element);
        } else if (type === 'department-error') {
          renderDepartmentError(element);
        }
      });
    }

    function syncFilterControls(state) {
      const docTypeSelect = document.querySelector('[data-filter="document-type"]');
      if (docTypeSelect) {
        docTypeSelect.value = state.filterDocumentType || '';
      }

      const oaCheckbox = document.querySelector('[data-filter="open-access-only"]');
      if (oaCheckbox) {
        oaCheckbox.checked = !!state.filterOpenAccessOnly;
      }

      const accessStatusSelect = document.querySelector('[data-filter="access-status"]');
      if (accessStatusSelect) {
        accessStatusSelect.value = state.filterAccessStatus || '';
      }

      const yearFromInput = document.querySelector('[data-filter="year-from"]');
      if (yearFromInput) {
        yearFromInput.value = state.filterYearFrom || '';
      }

      const yearToInput = document.querySelector('[data-filter="year-to"]');
      if (yearToInput) {
        yearToInput.value = state.filterYearTo || '';
      }

      const minCitInput = document.querySelector('[data-filter="min-citations"]');
      if (minCitInput) {
        minCitInput.value = state.filterMinCitations != null ? state.filterMinCitations : '';
      }
    }

    function syncSortControls(state) {
      const sortBySelect = document.querySelector('[data-sort="sort-by"]');
      if (sortBySelect) {
        sortBySelect.value = state.sortBy || 'date';
      }

      const sortDirSelect = document.querySelector('[data-sort="sort-direction"]');
      if (sortDirSelect) {
        sortDirSelect.value = state.sortDirection || 'desc';
      }
    }

    function fetchDepartmentDetail() {
      if (!currentDepartmentId) {
        return;
      }
      isLoadingDetail = true;
      isDepartmentDetailError = false;
      updateLoadingState();

      try {
        departmentDetail = WebsiteSDK.getDepartmentDetail(currentDepartmentId);
      } catch (e) {
        console.error('Error loading department detail', e);
        isDepartmentDetailError = true;
        departmentDetail = null;
      }

      isLoadingDetail = false;
      updateLoadingState();
      renderAll();
    }

    function fetchDepartmentOutputs(state) {
      if (!currentDepartmentId) {
        return;
      }

      isLoadingOutputs = true;
      isOutputsError = false;
      updateLoadingState();

      const filters = buildFiltersFromState(state);

      try {
        outputsData = WebsiteSDK.getDepartmentOutputs(currentDepartmentId, filters, state.sortBy, state.sortDirection, state.page, state.pageSize);
      } catch (e) {
        console.error('Error loading department outputs', e);
        isOutputsError = true;
        outputsData = null;
      }

      isLoadingOutputs = false;
      updateLoadingState();
      renderAll();
    }

    function updateUrlParams(changes) {
      const params = new URLSearchParams(window.location.search);

      Object.keys(changes).forEach(function(key) {
        const value = changes[key];
        if (value === null || value === undefined || value === '') {
          params.delete(key);
        } else {
          params.set(key, String(value));
        }
      });

      const newUrl = window.location.pathname + '?' + params.toString();
      window.history.pushState(null, '', newUrl);

      const state = getUrlState();
      currentDepartmentId = state.departmentId;

      if (!currentDepartmentId) {
        isMissingDepartmentId = true;
        departmentDetail = null;
        outputsData = null;
        renderAll();
        return;
      }

      isMissingDepartmentId = false;
      fetchDepartmentOutputs(state);
      syncFilterControls(state);
      syncSortControls(state);
    }

    function handleToggleFollow(button) {
      if (!currentDepartmentId || !departmentDetail) {
        return;
      }
      const isCurrentlyFollowing = button.getAttribute('data-following') === 'true';

      if (!isCurrentlyFollowing) {
        try {
          WebsiteSDK.followDepartment(currentDepartmentId);
          departmentDetail.isFollowed = true;
          showNotification('You are now following this department.', 'success');
        } catch (e) {
          console.error('Error following department', e);
          showNotification('Unable to follow this department. Please try again.', 'error');
        }
      } else {
        try {
          const result = WebsiteSDK.unfollowDepartment(currentDepartmentId);
          if (result && result.success === false) {
            showNotification(result.message || 'Unable to unfollow this department.', 'error');
          } else {
            departmentDetail.isFollowed = false;
            showNotification('You have unfollowed this department.', 'success');
          }
        } catch (e) {
          console.error('Error unfollowing department', e);
          showNotification('Unable to unfollow this department. Please try again.', 'error');
        }
      }

      renderAll();
    }

    function openAlertModal() {
      if (!departmentDetail || !currentDepartmentId) {
        return;
      }
      const backdrop = document.querySelector('[data-component="alert-config-modal"]');
      if (!backdrop) {
        return;
      }

      const deptNameContainer = backdrop.querySelector('[data-role="alert-department-name"]');
      const deptIdInput = backdrop.querySelector('[data-role="alert-department-id"]');
      const nameInput = backdrop.querySelector('#alert-name-input');
      const keywordInput = backdrop.querySelector('#alert-keyword-input');
      const scopeSelect = backdrop.querySelector('#alert-scope-select');
      const frequencySelect = backdrop.querySelector('#alert-frequency-select');
      const deliverySelect = backdrop.querySelector('#alert-delivery-select');
      const errorRow = backdrop.querySelector('[data-role="alert-form-error"]');

      if (deptNameContainer) {
        deptNameContainer.textContent = departmentDetail.name || '';
      }
      if (deptIdInput) {
        deptIdInput.value = currentDepartmentId;
      }
      if (nameInput) {
        nameInput.value = '';
      }
      if (keywordInput) {
        keywordInput.value = '';
      }
      if (scopeSelect) {
        scopeSelect.value = 'title';
      }
      if (frequencySelect) {
        frequencySelect.value = 'weekly';
      }
      if (deliverySelect) {
        deliverySelect.value = 'on_site';
      }
      if (errorRow) {
        errorRow.textContent = '';
      }

      backdrop.hidden = false;
    }

    function closeAlertModal() {
      const backdrop = document.querySelector('[data-component="alert-config-modal"]');
      if (!backdrop) {
        return;
      }
      backdrop.hidden = true;
    }

    function handleAlertFormSubmit(form) {
      if (!currentDepartmentId) {
        return;
      }
      const backdrop = document.querySelector('[data-component="alert-config-modal"]');
      const errorRow = backdrop ? backdrop.querySelector('[data-role="alert-form-error"]') : null;
      if (errorRow) {
        errorRow.textContent = '';
      }

      const keywordInput = form.querySelector('#alert-keyword-input');
      const scopeSelect = form.querySelector('#alert-scope-select');
      const frequencySelect = form.querySelector('#alert-frequency-select');
      const deliverySelect = form.querySelector('#alert-delivery-select');
      const nameInput = form.querySelector('#alert-name-input');

      const keyword = keywordInput ? keywordInput.value.trim() : '';
      const searchScope = scopeSelect ? scopeSelect.value : 'title';
      const frequency = frequencySelect ? frequencySelect.value : 'weekly';
      const deliveryMethod = deliverySelect ? deliverySelect.value : 'on_site';
      const name = nameInput ? nameInput.value.trim() : '';

      if (!keyword) {
        if (errorRow) {
          errorRow.textContent = 'Please enter a keyword or phrase for the alert.';
        }
        if (keywordInput) {
          keywordInput.focus();
        }
        return;
      }

      try {
        WebsiteSDK.createAlert(currentDepartmentId, keyword, searchScope, frequency, deliveryMethod, name || undefined);
        closeAlertModal();
        showNotification('Alert created for this department.', 'success');
      } catch (e) {
        console.error('Error creating alert', e);
        if (errorRow) {
          errorRow.textContent = 'Unable to create alert. Please try again.';
        }
        showNotification('Unable to create alert. Please try again.', 'error');
      }
    }

    function navigateToSearchResults() {
      if (!currentDepartmentId) {
        return;
      }
      const url = 'search_results.html?departmentIds=' + encodeURIComponent(currentDepartmentId) + '&page=1';
      window.location.href = url;
    }

    function openOutputDetail(outputId) {
      if (!outputId) {
        return;
      }
      const url = 'output_detail.html?id=' + encodeURIComponent(outputId);
      window.location.href = url;
    }

    function handleActionClick(event, element, action) {
      if (!action) {
        return;
      }

      if (action === 'toggle-follow') {
        handleToggleFollow(element);
      } else if (action === 'open-alert-modal') {
        openAlertModal();
      } else if (action === 'dismiss-notification') {
        clearNotification();
      } else if (action === 'view-all-in-search-results') {
        navigateToSearchResults();
      } else if (action === 'open-output-detail') {
        const outputId = element.getAttribute('data-output-id');
        openOutputDetail(outputId);
      } else if (action === 'change-page') {
        const pageStr = element.getAttribute('data-page');
        const page = parseInt(pageStr, 10);
        if (!isNaN(page) && page > 0) {
          updateUrlParams({ page: page });
        }
      } else if (action === 'retry-department-detail') {
        fetchDepartmentDetail();
      } else if (action === 'retry-outputs-load') {
        const state = getUrlState();
        fetchDepartmentOutputs(state);
      } else if (action === 'close-alert-modal') {
        closeAlertModal();
      } else if (action === 'filter-year-from-summary') {
        const yearStr = element.getAttribute('data-year');
        const year = parseInt(yearStr, 10);
        if (!isNaN(year)) {
          updateUrlParams({ filterYearFrom: year, filterYearTo: year, page: 1 });
        }
      }
    }

    function handleActionChange(event, element, action) {
      if (!action) {
        return;
      }

      if (action === 'change-document-type') {
        const value = element.value || '';
        updateUrlParams({ filterDocumentType: value || null, page: 1 });
      } else if (action === 'toggle-open-access-only') {
        const checked = element.checked;
        updateUrlParams({ filterOpenAccessOnly: checked ? 'true' : null, page: 1 });
      } else if (action === 'change-access-status') {
        const value = element.value || '';
        updateUrlParams({ filterAccessStatus: value || null, page: 1 });
      } else if (action === 'change-year-range') {
        const yearFromInput = document.querySelector('[data-filter="year-from"]');
        const yearToInput = document.querySelector('[data-filter="year-to"]');
        const yearFromVal = yearFromInput ? yearFromInput.value.trim() : '';
        const yearToVal = yearToInput ? yearToInput.value.trim() : '';
        const yearFrom = yearFromVal ? parseInt(yearFromVal, 10) : null;
        const yearTo = yearToVal ? parseInt(yearToVal, 10) : null;
        const changes = { page: 1 };
        if (!isNaN(yearFrom) && yearFrom !== null) {
          changes.filterYearFrom = yearFrom;
        } else {
          changes.filterYearFrom = null;
        }
        if (!isNaN(yearTo) && yearTo !== null) {
          changes.filterYearTo = yearTo;
        } else {
          changes.filterYearTo = null;
        }
        updateUrlParams(changes);
      } else if (action === 'change-min-citations') {
        const val = element.value.trim();
        const parsed = val ? parseInt(val, 10) : null;
        const changes = { page: 1 };
        if (!isNaN(parsed) && parsed !== null) {
          changes.filterMinCitations = parsed;
        } else {
          changes.filterMinCitations = null;
        }
        updateUrlParams(changes);
      } else if (action === 'change-sort-by') {
        const value = element.value || 'date';
        updateUrlParams({ sortBy: value, page: 1 });
      } else if (action === 'change-sort-direction') {
        const value = element.value || 'desc';
        updateUrlParams({ sortDirection: value, page: 1 });
      } else if (action === 'change-page-size') {
        const val = element.value;
        const parsed = parseInt(val, 10);
        if (!isNaN(parsed) && parsed > 0) {
          updateUrlParams({ pageSize: parsed, page: 1 });
        }
      }
    }

    function handlePopState() {
      const state = getUrlState();
      currentDepartmentId = state.departmentId;

      if (!currentDepartmentId) {
        isMissingDepartmentId = true;
        departmentDetail = null;
        outputsData = null;
        renderAll();
        return;
      }

      isMissingDepartmentId = false;

      if (!departmentDetail || (departmentDetail && departmentDetail.departmentId !== currentDepartmentId)) {
        fetchDepartmentDetail();
      }
      fetchDepartmentOutputs(state);
      syncFilterControls(state);
      syncSortControls(state);
    }

    function initEventHandlers() {
      document.addEventListener('click', function(event) {
        const target = event.target;
        const actionElement = target.closest('[data-action]');
        if (!actionElement) {
          return;
        }
        const action = actionElement.getAttribute('data-action');
        handleActionClick(event, actionElement, action);
      });

      document.addEventListener('change', function(event) {
        const target = event.target;
        const actionElement = target.closest('[data-action]');
        if (!actionElement) {
          return;
        }
        const action = actionElement.getAttribute('data-action');
        handleActionChange(event, actionElement, action);
      });

      document.addEventListener('submit', function(event) {
        const form = event.target.closest('form[data-action]');
        if (!form) {
          return;
        }
        const action = form.getAttribute('data-action');
        if (action === 'submit-alert-form') {
          event.preventDefault();
          handleAlertFormSubmit(form);
        }
      });

      window.addEventListener('popstate', function() {
        handlePopState();
      });
    }

    function initPage() {
      const state = getUrlState();
      currentDepartmentId = state.departmentId;

      if (!currentDepartmentId) {
        isMissingDepartmentId = true;
        renderAll();
        return;
      }

      isMissingDepartmentId = false;
      fetchDepartmentDetail();
      fetchDepartmentOutputs(state);
      syncFilterControls(state);
      syncSortControls(state);
    }

    document.addEventListener('DOMContentLoaded', function() {
      initEventHandlers();
      initPage();
    });
  })();
  </script>
</body>
</html>
