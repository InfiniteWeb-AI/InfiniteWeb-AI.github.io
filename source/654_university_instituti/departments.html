<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>University Research Repository</title>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <link rel='stylesheet' href='framework.css'>
  <link rel='stylesheet' href='departments.css'>
</head>
<body>
  <div class='page-wrapper'>
    <header class='site-header'>
      <div class='branding-row'>
        <div class='branding-inner'>
          <a href='index.html' class='site-logo'>
            <img src='logo.svg' alt='University logo'>
          </a>
        </div>
      </div>

      <nav class='primary-nav' aria-label='Main navigation'>
        <div class='primary-nav-inner'>
          <ul class='primary-nav-list'>
            <li class='nav-item'>
              <a href='index.html' title='Repository homepage with global search and quick links.'>Home</a>
            </li>
            <li class='nav-item'>
              <a href='search_results.html' title='Search interface with basic and advanced options.'>Search</a>
            </li>
            <li class='nav-item'>
              <a href='departments.html' title='Browse and select departments and faculties.'>Departments</a>
            </li>
            <li class='nav-item'>
              <a href='authors.html' title='Browse and search for researcher profiles.'>Authors</a>
            </li>
            <li class='nav-item'>
              <a href='analytics.html' title='Analytics dashboard for publications and usage statistics.'>Analytics</a>
            </li>
            <li class='nav-item'>
              <a href='lists.html' title='View and manage reading lists and favorites.'>Lists</a>
            </li>
          </ul>
        </div>
      </nav>

      <div class='utility-bar'>
        <div class='utility-inner'>
          <div class='utility-left'>
            <a href='profile.html' class='utility-link' title='User profile with followed departments and alerts.'>Profile</a>
          </div>
          <div class='utility-right'>
            <form class='header-search' action='search_results.html' method='get' role='search'>
              <label class='visually-hidden' for='site-search'>Search repository</label>
              <input type='text' id='site-search' name='q' class='search-input'>
              <button type='submit' class='search-button'>Search</button>
            </form>
          </div>
        </div>
      </div>
    </header>

    <div class='content-wrapper'>
      <main id='content' class='site-main' role='main'>
        <section class='content-column' data-component='departments-page-controller'>
          <div class='content-inner'>
            <header class='page-title-row'>
              <h1 class='page-title'>Departments</h1>
              <div class='page-title-utilities'>
                <a href='javascript:void(0)' class='rss-link' aria-label='Subscribe to departments feed'>RSS</a>
              </div>
            </header>

            <section class='department-search-panel' data-component='department-search-form'>
              <form class='department-search-form' action='departments.html' method='get' role='search'>
                <div class='form-row'>
                  <label for='department-search-input' class='department-search-label'>Search departments</label>
                  <div class='department-search-controls'>
                    <input
                      type='text'
                      id='department-search-input'
                      name='query'
                      class='department-search-input'
                      autocomplete='off'
                    >
                    <button
                      type='submit'
                      class='button button-primary department-search-button'
                      data-action='submit-department-search'
                    >
                      Search
                    </button>
                    <button
                      type='button'
                      class='button button-secondary department-clear-button'
                      data-action='clear-search'
                    >
                      Clear
                    </button>
                  </div>
                </div>
              </form>
            </section>

            <section class='department-toolbar-row' data-component='department-list-toolbar'>
              <div class='toolbar-left'>
                <label class='toolbar-control'>
                  <input
                    type='checkbox'
                    class='toolbar-checkbox'
                    data-action='toggle-active-filter'
                  >
                  <span>Show active departments only</span>
                </label>
                <label class='toolbar-control'>
                  <input
                    type='checkbox'
                    class='toolbar-checkbox'
                    data-action='toggle-group-by-faculty'
                  >
                  <span>Group by faculty</span>
                </label>
              </div>
              <div class='toolbar-right'>
                <label for='department-sort-select' class='toolbar-sort-label'>Sort by</label>
                <select
                  id='department-sort-select'
                  class='toolbar-select'
                  data-action='change-sort-order'
                >
                  <option value='name_asc'>Name A–Z</option>
                  <option value='name_desc'>Name Z–A</option>
                </select>
                <span class='toolbar-result-count' data-component='department-result-count'></span>
              </div>
            </section>

            <section class='department-list-section'>
              <div
                class='departments-empty-state'
                data-component='departments-empty-state'
                hidden
              ></div>

              <div
                class='department-list'
                data-component='department-list'
                data-populate='departments-list'
                aria-live='polite'
              ></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' title='Information about the repository and institution.'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' title='Help and FAQ for using the repository.'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='policies.html' title='Open access, reuse, and privacy policies.'>Policies</a>
            </li>
          </ul>
        </nav>
        <p class='footer-copy'>&copy; <span class='footer-year'>2024</span> University Research Repository</p>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var queryParam = urlParams.get('query') || '';

      initializeDepartmentSearchForm(queryParam);

      var listContainer = document.querySelector('[data-populate="departments-list"]');
      if (!listContainer) {
        return;
      }

      var state = {
        fullDepartments: [],
        viewDepartments: [],
        showActiveOnly: false,
        sortOrder: 'name_asc',
        groupByFaculty: false,
        resultCountElement: null
      };

      try {
        var queryForSdk = queryParam && queryParam.trim() !== '' ? queryParam : undefined;
        var rawDepartments = WebsiteSDK.getDepartmentsList(queryForSdk) || [];
        if (Array.isArray(rawDepartments)) {
          state.fullDepartments = rawDepartments.slice();
        } else {
          state.fullDepartments = [];
        }
      } catch (error) {
        console.error('Error loading departments list:', error);
        renderLoadError(listContainer);
        return;
      }

      initializeDepartmentToolbar(state, listContainer, queryParam);
      applyFiltersAndRender(state, listContainer, queryParam);

      bindGlobalActions();
    });

    function initializeDepartmentSearchForm(queryParam) {
      var searchFormComponent = document.querySelector('[data-component="department-search-form"]');
      if (!searchFormComponent) {
        return;
      }

      var searchForm = searchFormComponent.querySelector('form');
      if (!searchForm) {
        return;
      }

      var input = searchForm.querySelector('input[name="query"]');
      if (input && typeof queryParam === 'string') {
        input.value = queryParam;
      }

      searchForm.addEventListener('submit', function(event) {
        event.preventDefault();
        var value = input ? input.value.trim() : '';
        if (value) {
          window.location.href = 'departments.html?query=' + encodeURIComponent(value);
        } else {
          window.location.href = 'departments.html';
        }
      });

      var clearButton = searchForm.querySelector('[data-action="clear-search"]');
      if (clearButton) {
        clearButton.addEventListener('click', function() {
          window.location.href = 'departments.html';
        });
      }
    }

    function initializeDepartmentToolbar(state, listContainer, queryParam) {
      var toolbar = document.querySelector('[data-component="department-list-toolbar"]');
      if (!toolbar) {
        return;
      }

      var activeCheckbox = toolbar.querySelector('[data-action="toggle-active-filter"]');
      var sortSelect = toolbar.querySelector('[data-action="change-sort-order"]');
      var groupCheckbox = toolbar.querySelector('[data-action="toggle-group-by-faculty"]');
      var resultCountElement = toolbar.querySelector('[data-component="department-result-count"]');

      state.resultCountElement = resultCountElement || null;

      if (sortSelect) {
        state.sortOrder = sortSelect.value || 'name_asc';
        sortSelect.addEventListener('change', function() {
          state.sortOrder = sortSelect.value || 'name_asc';
          applyFiltersAndRender(state, listContainer, queryParam);
        });
      }

      if (activeCheckbox) {
        activeCheckbox.checked = false;
        activeCheckbox.addEventListener('change', function() {
          state.showActiveOnly = !!activeCheckbox.checked;
          applyFiltersAndRender(state, listContainer, queryParam);
        });
      }

      if (groupCheckbox) {
        groupCheckbox.checked = false;
        groupCheckbox.addEventListener('change', function() {
          state.groupByFaculty = !!groupCheckbox.checked;
          applyFiltersAndRender(state, listContainer, queryParam);
        });
      }
    }

    function applyFiltersAndRender(state, listContainer, queryParam) {
      if (!Array.isArray(state.fullDepartments)) {
        state.fullDepartments = [];
      }

      var working = state.fullDepartments.slice();

      if (state.showActiveOnly) {
        working = working.filter(function(item) {
          return item && item.isActive;
        });
      }

      var order = state.sortOrder || 'name_asc';
      if (order === 'name_asc' || order === 'name_desc') {
        var multiplier = order === 'name_asc' ? 1 : -1;
        working.sort(function(a, b) {
          var nameA = (a && a.name ? a.name : '').toLowerCase();
          var nameB = (b && b.name ? b.name : '').toLowerCase();
          if (nameA < nameB) {
            return -1 * multiplier;
          }
          if (nameA > nameB) {
            return 1 * multiplier;
          }
          return 0;
        });
      }

      state.viewDepartments = working;

      var emptyStateContainer = document.querySelector('[data-component="departments-empty-state"]');

      if (!working.length) {
        listContainer.innerHTML = '';
        if (emptyStateContainer) {
          emptyStateContainer.hidden = false;
          updateEmptyState(emptyStateContainer, queryParam);
        }
      } else {
        if (emptyStateContainer) {
          emptyStateContainer.hidden = true;
          emptyStateContainer.innerHTML = '';
        }
        renderDepartmentList(listContainer, working, state);
      }

      if (state.resultCountElement) {
        var total = state.fullDepartments.length;
        var shown = working.length;
        if (total === 0) {
          state.resultCountElement.textContent = 'No departments to display';
        } else if (shown === total) {
          state.resultCountElement.textContent = 'Showing ' + shown + ' departments';
        } else {
          state.resultCountElement.textContent = 'Showing ' + shown + ' of ' + total + ' departments';
        }
      }
    }

    function renderDepartmentList(container, departments, state) {
      container.innerHTML = '';

      if (!departments || !departments.length) {
        return;
      }

      if (state.groupByFaculty) {
        var groupsMap = new Map();
        departments.forEach(function(item) {
          var facultyName = item && item.facultyName ? item.facultyName : 'Other faculty';
          if (!groupsMap.has(facultyName)) {
            groupsMap.set(facultyName, []);
          }
          groupsMap.get(facultyName).push(item);
        });

        Array.from(groupsMap.entries())
          .sort(function(a, b) {
            var fa = a[0].toLowerCase();
            var fb = b[0].toLowerCase();
            if (fa < fb) {
              return -1;
            }
            if (fa > fb) {
              return 1;
            }
            return 0;
          })
          .forEach(function(entry) {
            var facultyLabel = entry[0];
            var items = entry[1];

            var groupSection = document.createElement('section');
            groupSection.className = 'faculty-group';

            var groupHeader = document.createElement('h2');
            groupHeader.className = 'faculty-group-title';
            groupHeader.textContent = facultyLabel;
            groupSection.appendChild(groupHeader);

            var groupListWrapper = document.createElement('div');
            groupListWrapper.className = 'faculty-group-list';

            items.forEach(function(dept) {
              var card = createDepartmentCard(dept);
              groupListWrapper.appendChild(card);
            });

            groupSection.appendChild(groupListWrapper);
            container.appendChild(groupSection);
          });
      } else {
        departments.forEach(function(dept) {
          var card = createDepartmentCard(dept);
          container.appendChild(card);
        });
      }
    }

    function createDepartmentCard(dept) {
      var card = document.createElement('article');
      card.className = 'department-card';
      card.setAttribute('data-component', 'department-list-item');
      if (dept && dept.departmentId) {
        card.setAttribute('data-department-id', dept.departmentId);
      }

      var title = document.createElement('h2');
      title.className = 'department-card-title';

      var link = document.createElement('a');
      link.href = 'javascript:void(0)';
      link.className = 'department-card-link';
      link.textContent = dept && dept.name ? dept.name : 'Unnamed department';
      link.setAttribute('data-action', 'open-department');
      if (dept && dept.departmentId) {
        link.setAttribute('data-department-id', dept.departmentId);
      }
      link.title = 'View department details';

      title.appendChild(link);
      card.appendChild(title);

      var meta = document.createElement('p');
      meta.className = 'department-card-meta';

      var facultySpan = document.createElement('span');
      facultySpan.className = 'department-card-faculty';
      facultySpan.textContent = dept && dept.facultyName ? 'Faculty: ' + dept.facultyName : 'Faculty: Not specified';
      meta.appendChild(facultySpan);

      var separator = document.createTextNode(' ␀b7 ');
      meta.appendChild(separator);

      var statusSpan = document.createElement('span');
      var isActive = !!(dept && dept.isActive);
      statusSpan.className = isActive ? 'department-status department-status-active' : 'department-status department-status-inactive';
      statusSpan.textContent = isActive ? 'Active' : 'Inactive';
      meta.appendChild(statusSpan);

      card.appendChild(meta);

      return card;
    }

    function updateEmptyState(container, queryParam) {
      var queryText = queryParam && queryParam.trim() !== '' ? queryParam.trim() : '';
      var querySuffix = queryText ? ' for ' + queryText : '';

      container.innerHTML = `
        <div class='empty-state-card'>
          <h2 class='empty-state-title'>No departments found${querySuffix}.</h2>
          <p class='empty-state-body'>Try adjusting your search term or clearing the filters to see more departments.</p>
          <div class='empty-state-actions'>
            <button type='button' class='button button-primary' data-action='empty-clear-search'>Clear search</button>
            <button type='button' class='button button-secondary' data-action='empty-retry'>Retry</button>
          </div>
        </div>
      `;

      var clearButton = container.querySelector('[data-action="empty-clear-search"]');
      if (clearButton) {
        clearButton.addEventListener('click', function() {
          window.location.href = 'departments.html';
        });
      }

      var retryButton = container.querySelector('[data-action="empty-retry"]');
      if (retryButton) {
        retryButton.addEventListener('click', function() {
          window.location.reload();
        });
      }
    }

    function renderLoadError(container) {
      var emptyStateContainer = document.querySelector('[data-component="departments-empty-state"]');
      if (emptyStateContainer) {
        emptyStateContainer.hidden = false;
        emptyStateContainer.innerHTML = `
          <div class='empty-state-card'>
            <h2 class='empty-state-title'>Unable to load departments.</h2>
            <p class='empty-state-body'>There was a problem loading the department list. Please try again.</p>
            <div class='empty-state-actions'>
              <button type='button' class='button button-primary' data-action='empty-retry'>Retry</button>
            </div>
          </div>
        `;

        var retryButton = emptyStateContainer.querySelector('[data-action="empty-retry"]');
        if (retryButton) {
          retryButton.addEventListener('click', function() {
            window.location.reload();
          });
        }
      } else if (container) {
        container.innerHTML = '<p class="load-error-message">Unable to load departments. Please refresh the page.</p>';
      }
    }

    function bindGlobalActions() {
      document.addEventListener('click', function(event) {
        var target = event.target;
        if (!target) {
          return;
        }

        var departmentLink = target.closest('[data-action="open-department"]');
        if (departmentLink) {
          event.preventDefault();
          var departmentId = departmentLink.getAttribute('data-department-id');
          if (departmentId) {
            navigateToDepartmentDetail(departmentId);
          }
          return;
        }
      });
    }

    function navigateToDepartmentDetail(departmentId) {
      var id = departmentId || '';
      if (!id) {
        return;
      }
      window.location.href = 'department_detail.html?departmentId=' + encodeURIComponent(id);
    }
  </script>
</body>
</html>
