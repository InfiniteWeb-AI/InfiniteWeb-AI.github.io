<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Analytics Dashboard - University Research Repository</title>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta name='description' content='Interactive dashboard to explore repository metrics by department and year, including publications, downloads, and citations, with sortable views and navigation to department details.'>
  <link rel='stylesheet' href='framework.css'>
  <link rel='stylesheet' href='analytics.css'>
</head>
<body>
  <div class='page-wrapper'>
    <header class='site-header'>
      <div class='branding-row'>
        <div class='branding-inner'>
          <a href='index.html' class='site-logo'>
            <img src='logo.svg' alt='University logo'>
          </a>
        </div>
      </div>

      <nav class='primary-nav' aria-label='Main navigation'>
        <div class='primary-nav-inner'>
          <ul class='primary-nav-list'>
            <li class='nav-item'>
              <a href='index.html' title='Repository homepage with global search and quick links.'>Home</a>
            </li>
            <li class='nav-item'>
              <a href='search_results.html' title='Search interface with basic and advanced options.'>Search</a>
            </li>
            <li class='nav-item'>
              <a href='departments.html' title='Browse and select departments and faculties.'>Departments</a>
            </li>
            <li class='nav-item'>
              <a href='authors.html' title='Browse and search for researcher profiles.'>Authors</a>
            </li>
            <li class='nav-item'>
              <a href='analytics.html' title='Analytics dashboard for publications and usage statistics.'>Analytics</a>
            </li>
            <li class='nav-item'>
              <a href='lists.html' title='View and manage reading lists and favorites.'>Lists</a>
            </li>
          </ul>
        </div>
      </nav>

      <div class='utility-bar'>
        <div class='utility-inner'>
          <div class='utility-left'>
            <a href='profile.html' class='utility-link' title='User profile with followed departments and alerts.'>Profile</a>
          </div>
          <div class='utility-right'>
            <form class='header-search' action='search_results.html' method='get' role='search'>
              <label class='visually-hidden' for='site-search'>Search repository</label>
              <input type='text' id='site-search' name='q' class='search-input'>
              <button type='submit' class='search-button'>Search</button>
            </form>
          </div>
        </div>
      </div>
    </header>

    <div class='content-wrapper'>
      <main id='content' class='site-main' role='main'>
        <div class='analytics-page'>
          <div data-component='analytics-url-state-manager' aria-hidden='true'></div>

          <div class='analytics-content-inner'>
            <div class='analytics-title-row'>
              <h1 class='page-title'>Analytics Dashboard</h1>
              <div class='analytics-status-indicator' data-component='analytics-status-indicator' data-populate='analytics-status' aria-live='polite'></div>
            </div>

            <section class='analytics-panel analytics-filters-panel' data-component='analytics-filters-bar' aria-label='Analytics filters'>
              <form class='filters-form'>
                <div class='filters-group'>
                  <label for='analytics-year-select'>Year</label>
                  <select id='analytics-year-select' name='year' data-action='change-year' data-populate='analytics-year-options'>
                    <option value=''>Loading years...</option>
                  </select>
                </div>
                <div class='filters-group'>
                  <label for='analytics-metric-select'>Metric</label>
                  <select id='analytics-metric-select' name='metricType' data-action='change-metric'>
                    <option value='publications'>Publications</option>
                    <option value='downloads'>Downloads</option>
                    <option value='citations'>Citations</option>
                  </select>
                </div>
                <div class='filters-actions'>
                  <button type='button' class='button-secondary' data-action='reset-sorting'>Reset sorting</button>
                </div>
              </form>
            </section>

            <section class='analytics-panel analytics-visualization-panel' data-component='metrics-visualization' aria-label='Department metrics visualization'>
              <h2 class='panel-title'>Repository Metrics Overview</h2>
              <div class='visualization-caption' data-populate='visualization-caption'></div>
              <div class='visualization-body' data-populate='department-metrics-visualization'></div>
            </section>

            <section class='analytics-panel analytics-table-panel' data-component='department-metrics-table' aria-label='Department metrics table'>
              <h2 class='panel-title'>Department Breakdown</h2>
              <div class='table-wrapper'>
                <table class='metrics-table'>
                  <thead>
                    <tr>
                      <th scope='col'>
                        <button type='button' class='sortable-header' data-action='sort' data-sort-by='department_name'>
                          Department
                          <span class='sort-indicator' data-populate='sort-indicator-department'></span>
                        </button>
                      </th>
                      <th scope='col'>
                        <button type='button' class='sortable-header' data-action='sort' data-sort-by='value'>
                          Metric value
                          <span class='sort-indicator' data-populate='sort-indicator-value'></span>
                        </button>
                      </th>
                      <th scope='col'>Faculty</th>
                      <th scope='col'>Rank</th>
                    </tr>
                  </thead>
                  <tbody data-populate='department-metrics-table-rows'></tbody>
                </table>
              </div>
            </section>

            <section class='analytics-panel analytics-empty-state-panel' data-component='analytics-empty-state' data-populate='analytics-empty-state' aria-live='polite' hidden></section>

            <div class='analytics-error-panel' data-populate='analytics-error' hidden></div>
          </div>
        </div>
      </main>
    </div>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' title='Information about the repository and institution.'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' title='Help and FAQ for using the repository.'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='policies.html' title='Open access, reuse, and privacy policies.'>Policies</a>
            </li>
          </ul>
        </nav>
        <p class='footer-copy'>&copy; <span class='footer-year'>2024</span> University Research Repository</p>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var allowedMetricTypes = ['publications', 'downloads', 'citations'];
      var defaultMetricType = 'publications';
      var allowedSortBy = ['value', 'department_name'];
      var defaultSortBy = 'value';
      var allowedSortDirection = ['asc', 'desc'];
      var defaultSortDirection = 'desc';

      var analyticsYearOptions = [];
      var analyticsCurrentParams = null;
      var analyticsCurrentMetrics = [];
      var isLoading = false;
      var lastError = null;
      var isEmpty = false;
      var lastRequest = null;

      var yearSelect = document.querySelector('[data-populate="analytics-year-options"]');
      var metricSelect = document.querySelector('[data-action="change-metric"]');
      var statusContainer = document.querySelector('[data-populate="analytics-status"]');
      var vizContainer = document.querySelector('[data-populate="department-metrics-visualization"]');
      var vizCaptionContainer = document.querySelector('[data-populate="visualization-caption"]');
      var tableBody = document.querySelector('[data-populate="department-metrics-table-rows"]');
      var emptyStateContainer = document.querySelector('[data-populate="analytics-empty-state"]');
      var errorContainer = document.querySelector('[data-populate="analytics-error"]');
      var sortIndicatorDepartment = document.querySelector('[data-populate="sort-indicator-department"]');
      var sortIndicatorValue = document.querySelector('[data-populate="sort-indicator-value"]');

      function metricTypeToLabel(metricType) {
        if (metricType === 'downloads') {
          return 'Downloads';
        }
        if (metricType === 'citations') {
          return 'Citations';
        }
        return 'Publications';
      }

      function escapeHtml(text) {
        if (text === null || text === undefined) {
          return '';
        }
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function renderStatus(container) {
        if (!container) {
          return;
        }
        var text = '';
        if (isLoading) {
          text = 'Loading analytics data...';
        } else if (lastError) {
          text = 'Error loading analytics data.';
        } else if (isEmpty) {
          text = 'No data for selected filters.';
        } else if (analyticsCurrentParams) {
          text = 'Showing ' + metricTypeToLabel(analyticsCurrentParams.metricType) + ' by department for ' + analyticsCurrentParams.year + '.';
        }
        container.textContent = text;
      }

      function renderError(container) {
        if (!container) {
          return;
        }
        if (!lastError) {
          container.hidden = true;
          container.innerHTML = '';
          return;
        }
        var sourceLabel = lastError.source === 'yearOptions' ? 'analytics years' : 'department metrics';
        var message = lastError.message || 'An unexpected error occurred.';
        container.hidden = false;
        container.innerHTML = `
          <div class='analytics-error-message'>
            <p>There was a problem loading ${sourceLabel}.</p>
            <p>${escapeHtml(message)}</p>
            <button type='button' class='button-primary' data-action='retry'>Retry</button>
          </div>
        `;
      }

      function populateYearSelect(selectEl, years, selectedYear) {
        if (!selectEl) {
          return;
        }
        selectEl.innerHTML = '';
        var sortedYears = years.slice().sort(function(a, b) { return b - a; });
        sortedYears.forEach(function(year) {
          var option = document.createElement('option');
          option.value = String(year);
          option.textContent = String(year);
          if (selectedYear === year) {
            option.selected = true;
          }
          selectEl.appendChild(option);
        });
      }

      function renderSortIndicators(deptEl, valueEl, params) {
        if (deptEl) {
          if (params.sortBy === 'department_name') {
            deptEl.textContent = params.sortDirection === 'asc' ? '▲' : '▼';
          } else {
            deptEl.textContent = '';
          }
        }
        if (valueEl) {
          if (params.sortBy === 'value') {
            valueEl.textContent = params.sortDirection === 'asc' ? '▲' : '▼';
          } else {
            valueEl.textContent = '';
          }
        }
      }

      function renderVisualization(container, metrics, params) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!metrics || metrics.length === 0) {
          return;
        }
        var maxValue = metrics.reduce(function(max, item) {
          var value = typeof item.value === 'number' ? item.value : 0;
          return value > max ? value : max;
        }, 0);

        var list = document.createElement('ul');
        list.className = 'metrics-visualization-list';

        metrics.forEach(function(item) {
          var li = document.createElement('li');
          li.className = 'metrics-visualization-item';
          li.setAttribute('data-department-id', item.departmentId);
          li.setAttribute('data-action', 'view-department');
          var tooltip = item.departmentName + '  ' + metricTypeToLabel(item.metricType) + ': ' + item.value + ' (' + item.year + ')';
          li.setAttribute('title', tooltip);

          var labelSpan = document.createElement('span');
          labelSpan.className = 'metrics-visualization-label';
          labelSpan.textContent = item.departmentName;

          var barWrapper = document.createElement('span');
          barWrapper.className = 'metrics-visualization-bar-wrapper';

          var bar = document.createElement('span');
          bar.className = 'metrics-visualization-bar';
          var percent = maxValue > 0 ? Math.round((item.value / maxValue) * 100) : 0;
          bar.style.width = percent + '%';

          var valueSpan = document.createElement('span');
          valueSpan.className = 'metrics-visualization-value';
          valueSpan.textContent = typeof item.value === 'number' ? item.value.toLocaleString() : '';

          barWrapper.appendChild(bar);
          barWrapper.appendChild(valueSpan);

          li.appendChild(labelSpan);
          li.appendChild(barWrapper);
          list.appendChild(li);
        });

        container.appendChild(list);
      }

      function renderTableRows(container, metrics) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!metrics || metrics.length === 0) {
          return;
        }
        metrics.forEach(function(item) {
          var tr = document.createElement('tr');

          var deptTd = document.createElement('td');
          var deptButton = document.createElement('button');
          deptButton.type = 'button';
          deptButton.className = 'link-button department-link';
          deptButton.setAttribute('data-action', 'view-department');
          deptButton.setAttribute('data-department-id', item.departmentId);
          deptButton.textContent = item.departmentName;
          deptTd.appendChild(deptButton);

          var valueTd = document.createElement('td');
          valueTd.textContent = typeof item.value === 'number' ? item.value.toLocaleString() : '';

          var facultyTd = document.createElement('td');
          facultyTd.textContent = item.facultyName || '';

          var rankTd = document.createElement('td');
          rankTd.textContent = typeof item.rank === 'number' ? String(item.rank) : '';

          tr.appendChild(deptTd);
          tr.appendChild(valueTd);
          tr.appendChild(facultyTd);
          tr.appendChild(rankTd);

          container.appendChild(tr);
        });
      }

      function renderEmptyState(container, params) {
        if (!container) {
          return;
        }
        var yearText = params && params.year ? params.year : 'the selected year';
        var metricLabel = params && params.metricType ? metricTypeToLabel(params.metricType).toLowerCase() : 'metrics';
        container.innerHTML = `
          <div class='empty-state-content'>
            <h2 class='panel-title'>No metrics available</h2>
            <p>No ${metricLabel} are available for ${yearText}.</p>
            <p>Try choosing a different year or metric using the filters above.</p>
            <button type='button' class='button-primary' data-action='focus-filters'>Adjust filters</button>
          </div>
        `;
      }

      function ensureYearOptions(force) {
        if (!force && analyticsYearOptions.length > 0) {
          return true;
        }
        try {
          isLoading = true;
          lastError = null;
          lastRequest = { type: 'yearOptions' };
          renderStatus(statusContainer);
          renderError(errorContainer);

          analyticsYearOptions = WebsiteSDK.getAnalyticsYearOptions();

          if (!Array.isArray(analyticsYearOptions) || analyticsYearOptions.length === 0) {
            isLoading = false;
            lastError = {
              source: 'yearOptions',
              message: 'No analytics years are available.'
            };
            renderStatus(statusContainer);
            renderError(errorContainer);
            return false;
          }

          isLoading = false;
          renderStatus(statusContainer);
          renderError(errorContainer);
          return true;
        } catch (err) {
          isLoading = false;
          lastError = {
            source: 'yearOptions',
            message: err && err.message ? err.message : 'Unable to load analytics years.'
          };
          renderStatus(statusContainer);
          renderError(errorContainer);
          return false;
        }
      }

      function getUrlParams() {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        var yearStr = params.get('year');
        var metricType = params.get('metricType');
        var sortBy = params.get('sortBy');
        var sortDirection = params.get('sortDirection');
        return {
          year: yearStr ? parseInt(yearStr, 10) : null,
          metricType: metricType,
          sortBy: sortBy,
          sortDirection: sortDirection
        };
      }

      function normalizeParams(raw) {
        var year = raw.year;
        if (!year || Number.isNaN(year) || analyticsYearOptions.indexOf(year) === -1) {
          year = analyticsYearOptions.length > 0 ? Math.max.apply(null, analyticsYearOptions) : null;
        }

        var metricType = raw.metricType;
        if (allowedMetricTypes.indexOf(metricType) === -1) {
          metricType = defaultMetricType;
        }

        var sortBy = raw.sortBy;
        if (allowedSortBy.indexOf(sortBy) === -1) {
          sortBy = defaultSortBy;
        }

        var sortDirection = raw.sortDirection;
        if (allowedSortDirection.indexOf(sortDirection) === -1) {
          sortDirection = defaultSortDirection;
        }

        return {
          year: year,
          metricType: metricType,
          sortBy: sortBy,
          sortDirection: sortDirection
        };
      }

      function ensureCanonicalUrl(params) {
        var url = new URL(window.location.href);
        var searchParams = url.searchParams;
        var changed = false;

        if (params.year != null) {
          var yearStr = String(params.year);
          if (searchParams.get('year') !== yearStr) {
            searchParams.set('year', yearStr);
            changed = true;
          }
        }

        if (searchParams.get('metricType') !== params.metricType) {
          searchParams.set('metricType', params.metricType);
          changed = true;
        }

        if (searchParams.get('sortBy') !== params.sortBy) {
          searchParams.set('sortBy', params.sortBy);
          changed = true;
        }

        if (searchParams.get('sortDirection') !== params.sortDirection) {
          searchParams.set('sortDirection', params.sortDirection);
          changed = true;
        }

        if (changed) {
          url.search = searchParams.toString();
          history.replaceState({ analytics: true }, '', url.toString());
        }
      }

      function renderAll(params) {
        renderStatus(statusContainer);
        renderError(errorContainer);
        if (params) {
          renderSortIndicators(sortIndicatorDepartment, sortIndicatorValue, params);
        }

        if (lastError) {
          if (vizContainer) {
            vizContainer.innerHTML = '';
          }
          if (tableBody) {
            tableBody.innerHTML = '';
          }
          if (vizCaptionContainer) {
            vizCaptionContainer.innerHTML = '';
          }
          if (emptyStateContainer) {
            emptyStateContainer.hidden = true;
            emptyStateContainer.innerHTML = '';
          }
          return;
        }

        if (isEmpty) {
          if (vizContainer) {
            vizContainer.innerHTML = '';
          }
          if (tableBody) {
            tableBody.innerHTML = '';
          }
          if (vizCaptionContainer) {
            vizCaptionContainer.innerHTML = '';
          }
          if (emptyStateContainer) {
            emptyStateContainer.hidden = false;
            renderEmptyState(emptyStateContainer, params);
          }
          return;
        }

        if (emptyStateContainer) {
          emptyStateContainer.hidden = true;
          emptyStateContainer.innerHTML = '';
        }

        if (vizCaptionContainer && params) {
          var label = metricTypeToLabel(params.metricType);
          vizCaptionContainer.innerHTML = `<p>Showing ${label.toLowerCase()} by department for ${params.year}.</p>`;
        }

        if (vizContainer) {
          renderVisualization(vizContainer, analyticsCurrentMetrics, params);
        }
        if (tableBody) {
          renderTableRows(tableBody, analyticsCurrentMetrics);
        }
      }

      function fetchMetrics(params) {
        isLoading = true;
        lastError = null;
        isEmpty = false;
        lastRequest = {
          type: 'metrics',
          params: {
            year: params.year,
            metricType: params.metricType,
            sortBy: params.sortBy,
            sortDirection: params.sortDirection
          }
        };
        renderStatus(statusContainer);
        renderError(errorContainer);

        try {
          var metrics = WebsiteSDK.getDepartmentMetrics(
            params.year,
            params.metricType,
            params.sortBy,
            params.sortDirection
          );
          analyticsCurrentMetrics = Array.isArray(metrics) ? metrics : [];
          isLoading = false;
          isEmpty = analyticsCurrentMetrics.length === 0;
          renderAll(params);
        } catch (err) {
          analyticsCurrentMetrics = [];
          isLoading = false;
          isEmpty = false;
          lastError = {
            source: 'metrics',
            message: err && err.message ? err.message : 'Unable to load department metrics.'
          };
          renderAll(params);
        }
      }

      function handleUrlChange() {
        var yearOk = ensureYearOptions(false);
        if (!yearOk) {
          analyticsCurrentParams = null;
          analyticsCurrentMetrics = [];
          isEmpty = false;
          if (yearSelect && analyticsYearOptions.length === 0) {
            populateYearSelect(yearSelect, [], null);
          }
          if (vizContainer) {
            vizContainer.innerHTML = '';
          }
          if (tableBody) {
            tableBody.innerHTML = '';
          }
          if (vizCaptionContainer) {
            vizCaptionContainer.innerHTML = '';
          }
          if (emptyStateContainer) {
            emptyStateContainer.hidden = true;
            emptyStateContainer.innerHTML = '';
          }
          renderStatus(statusContainer);
          renderError(errorContainer);
          return;
        }

        var raw = getUrlParams();
        var normalized = normalizeParams(raw);
        analyticsCurrentParams = normalized;
        ensureCanonicalUrl(normalized);

        if (yearSelect) {
          populateYearSelect(yearSelect, analyticsYearOptions, normalized.year);
        }
        if (metricSelect) {
          metricSelect.value = normalized.metricType;
        }

        fetchMetrics(normalized);
      }

      function pushUrlState(changes) {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        Object.keys(changes).forEach(function(key) {
          var value = changes[key];
          if (value === null || value === undefined || value === '') {
            params.delete(key);
          } else {
            params.set(key, String(value));
          }
        });
        url.search = params.toString();
        history.pushState({ analytics: true }, '', url.toString());
        handleUrlChange();
      }

      document.addEventListener('change', function(event) {
        var target = event.target;
        var action = target.dataset.action;
        if (!action) {
          return;
        }
        if (action === 'change-year') {
          var value = target.value;
          if (value) {
            pushUrlState({ year: value });
          }
        } else if (action === 'change-metric') {
          var metricValue = target.value;
          if (metricValue) {
            pushUrlState({ metricType: metricValue });
          }
        }
      });

      document.addEventListener('click', function(event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.dataset.action;
        if (action === 'sort') {
          var sortBy = actionEl.getAttribute('data-sort-by');
          if (!sortBy) {
            return;
          }
          var current = analyticsCurrentParams || getUrlParams();
          var newDirection;
          if (current && current.sortBy === sortBy) {
            newDirection = current.sortDirection === 'asc' ? 'desc' : 'asc';
          } else if (sortBy === 'value') {
            newDirection = 'desc';
          } else {
            newDirection = 'asc';
          }
          pushUrlState({
            sortBy: sortBy,
            sortDirection: newDirection
          });
        } else if (action === 'view-department') {
          var departmentId = actionEl.getAttribute('data-department-id');
          if (departmentId) {
            window.location.href = 'department_detail.html?departmentId=' + encodeURIComponent(departmentId);
          }
        } else if (action === 'reset-sorting') {
          pushUrlState({
            sortBy: defaultSortBy,
            sortDirection: defaultSortDirection
          });
        } else if (action === 'focus-filters') {
          var filters = document.querySelector('[data-component="analytics-filters-bar"]');
          if (filters) {
            if (filters.scrollIntoView) {
              filters.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            if (yearSelect) {
              yearSelect.focus();
            }
          }
        } else if (action === 'retry') {
          if (!lastRequest || !lastRequest.type) {
            handleUrlChange();
            return;
          }
          if (lastRequest.type === 'yearOptions') {
            ensureYearOptions(true);
            handleUrlChange();
          } else if (lastRequest.type === 'metrics') {
            if (analyticsCurrentParams) {
              fetchMetrics(analyticsCurrentParams);
            } else {
              handleUrlChange();
            }
          }
        }
      });

      window.addEventListener('popstate', function() {
        handleUrlChange();
      });

      handleUrlChange();
    });
  </script>
</body>
</html>
