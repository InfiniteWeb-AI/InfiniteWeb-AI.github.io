    <link rel='stylesheet' href='about.css'>

<body>
    <header class='site-header'>

            <div class='container navbar-inner'>
                <div class='navbar-brand'>
                    <a href='index.html' class='brand-link'>admiralbookmarks</a>
                </div>
                <nav class='navbar-nav' aria-label='Main navigation'>
                    <ul class='nav-list'>
                        <li class='nav-item is-active'><a href='index.html'>Home</a></li>
                        <li class='nav-item'><a href='explore.html'>Explore</a></li>
                        <li class='nav-item'><a href='results.html?categoryId=web_development'>Web Development</a></li>
                        <li class='nav-item'><a href='results.html?categoryId=security'>Security</a></li>
                        <li class='nav-item'><a href='my_bookmarks.html'>My Bookmarks</a></li>
                        <li class='nav-item'><a href='collections.html'>Collections</a></li>
                        <li class='nav-item'><a href='community.html'>Community</a></li>
                    </ul>
                </nav>
            </div>
        </div>

        <div class='breadcrumb-bar'>
            <div class='container'>
                <nav aria-label='Breadcrumb'>
                    <ol class='breadcrumb'>
                        <li class='breadcrumb-item'><a href='index.html'>Home</a></li>
                        <li class='breadcrumb-item is-current' aria-current='page'>About</li>
                    </ol>
                </nav>
            </div>
        </div>
    </header>

    <div class='page'>
        <div class='container'>
            <div class='layout'>
                <main id='content' class='content' role='main'>
                    <section class='page-section about-page' data-component='about-page-controller'>
                        <header class='page-header-simple'>
                            <h1 class='page-title' data-populate='about-title'>About</h1>
                        </header>

                        <div class='about-section-list-wrapper'>
                            <div class='about-section-list' data-component='about-section-list' data-populate='about-sections' aria-live='polite'>
                                <!-- About sections will be rendered here -->
                            </div>
                        </div>
                    </section>
                </main>
                <aside class='sidebar' aria-label='Sidebar'>
                    <div class='panel panel-default about-toc-panel' data-component='about-section-navigation'>
                        <div class='panel-heading'>
                            <h2 class='panel-title'>On this page</h2>
                        </div>
                        <div class='panel-body'>
                            <ul class='nav nav-pills nav-stacked about-toc-list' data-populate='about-toc' aria-label='About sections navigation'>
                                <!-- Section navigation items will be rendered here -->
                            </ul>
                        </div>
                    </div>

                    <div class='panel panel-default about-help-panel' data-component='about-help-link'>
                        <div class='panel-body'>
                            <p class='help-title'>Need more help?</p>
                            <a href='javascript:void(0)' class='btn btn-link about-help-link' data-action='about-help-link'>View Help &amp; FAQs</a>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <footer class='site-footer'>
        <div class='container'>
            <div class='footer-inner'>
                <p class='footer-copy'>&copy; 2024 admiralbookmarks</p>
                <nav class='footer-nav' aria-label='Footer navigation'>
                    <ul class='footer-list'>
                        <li class='footer-item'><a href='about.html'>About</a></li>
                        <li class='footer-item'><a href='help.html'>Help &amp; FAQs</a></li>
                        <li class='footer-item'><a href='privacy.html'>Privacy Policy</a></li>
                        <li class='footer-item'><a href='terms.html'>Terms of Use</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var aboutData = null;
        var state = {
            sectionIds: [],
            activeSectionId: null,
            initialSectionParam: urlParams.get('section'),
            initialSectionMatched: false
        };

        function slugifyHeading(heading) {
            if (!heading || typeof heading !== 'string') {
                return '';
            }
            var slug = heading.toLowerCase().trim();
            slug = slug.replace(/[^a-z0-9]+/g, '-');
            slug = slug.replace(/^-+|-+$/g, '');
            return slug;
        }

        function computeSectionIdentifiers(sections) {
            var used = {};
            state.sectionIds = [];
            for (var i = 0; i < sections.length; i++) {
                var base = slugifyHeading(sections[i].heading);
                if (!base) {
                    base = 'section-' + (i + 1);
                }
                var candidate = base;
                var counter = 2;
                while (used[candidate]) {
                    candidate = base + '-' + counter;
                    counter++;
                }
                used[candidate] = true;
                sections[i]._identifier = candidate;
                state.sectionIds.push(candidate);
            }
        }

        function ensureAboutData() {
            if (aboutData) {
                return aboutData;
            }
            try {
                aboutData = WebsiteSDK.getAboutContent() || {};
            } catch (e) {
                console.error('Failed to load About content', e);
                aboutData = {};
            }
            if (!aboutData || typeof aboutData !== 'object') {
                aboutData = {};
            }
            if (!Array.isArray(aboutData.contentSections)) {
                aboutData.contentSections = [];
            }
            if (!aboutData.title) {
                aboutData.title = 'About';
            }

            if (aboutData.contentSections.length > 0) {
                computeSectionIdentifiers(aboutData.contentSections);
                var initialId = null;
                var matched = false;
                if (state.initialSectionParam && state.sectionIds.indexOf(state.initialSectionParam) !== -1) {
                    initialId = state.initialSectionParam;
                    matched = true;
                } else {
                    initialId = state.sectionIds[0];
                }
                state.activeSectionId = initialId;
                state.initialSectionMatched = matched;
            } else {
                state.activeSectionId = null;
                state.initialSectionMatched = false;
            }

            document.title = 'Admiral Bookmarks - ' + aboutData.title;
            return aboutData;
        }

        function renderAboutTitle(container, data) {
            container.textContent = data.title || 'About';
        }

        function renderAboutSections(container, sections) {
            container.innerHTML = '';
            if (!sections || !sections.length) {
                container.innerHTML = "<div class='panel panel-default empty-state'><div class='panel-body'><p>About information is not available right now. Please try again later.</p></div></div>";
                return;
            }
            for (var i = 0; i < sections.length; i++) {
                var section = sections[i];
                var identifier = section._identifier;

                var article = document.createElement('article');
                article.className = 'about-section panel panel-default';
                article.setAttribute('data-section-id', identifier);
                article.id = identifier;

                var headingEl = document.createElement('h2');
                headingEl.className = 'about-section-heading';
                headingEl.textContent = section.heading || '';
                headingEl.setAttribute('tabindex', '0');
                headingEl.setAttribute('data-action', 'section-heading');
                headingEl.setAttribute('data-section-id', identifier);

                var bodyEl = document.createElement('div');
                bodyEl.className = 'about-section-body';
                try {
                    bodyEl.innerHTML = section.bodyHtml || '';
                } catch (e) {
                    console.error('Failed to inject About section bodyHtml', e);
                    bodyEl.textContent = ''; 
                }

                article.appendChild(headingEl);
                article.appendChild(bodyEl);
                container.appendChild(article);
            }
        }

        function renderAboutToc(container, sections) {
            container.innerHTML = '';
            if (!sections || !sections.length) {
                var panel = container.closest('.panel');
                if (panel) {
                    panel.style.display = 'none';
                }
                return;
            }
            for (var i = 0; i < sections.length; i++) {
                var section = sections[i];
                var identifier = section._identifier;

                var li = document.createElement('li');
                li.className = 'about-toc-item';
                li.setAttribute('data-section-id', identifier);

                var link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.textContent = section.heading || ('Section ' + (i + 1));
                link.setAttribute('data-action', 'toc-item');
                link.setAttribute('data-section-id', identifier);

                li.appendChild(link);
                container.appendChild(li);
            }
        }

        function scrollToSection(sectionId) {
            if (!sectionId) {
                return;
            }
            var target = document.querySelector(".about-section[data-section-id='" + sectionId + "']");
            if (!target) {
                return;
            }
            var header = document.querySelector('.site-header');
            var headerHeight = header ? header.offsetHeight : 0;
            var rect = target.getBoundingClientRect();
            var absoluteTop = rect.top + window.pageYOffset;
            var offset = absoluteTop - headerHeight - 16;
            window.scrollTo({ top: offset, behavior: 'smooth' });
        }

        function syncUrlToSection(sectionId, replaceState) {
            if (!sectionId) {
                return;
            }
            var url = new URL(window.location.href);
            url.searchParams.set('section', sectionId);
            if (replaceState) {
                history.replaceState({ section: sectionId }, '', url.toString());
            } else {
                history.pushState({ section: sectionId }, '', url.toString());
            }
        }

        function updateActiveSection(sectionId, options) {
            options = options || {};
            if (!sectionId) {
                return;
            }
            state.activeSectionId = sectionId;

            var sectionEls = document.querySelectorAll('.about-section');
            for (var i = 0; i < sectionEls.length; i++) {
                var el = sectionEls[i];
                if (el.getAttribute('data-section-id') === sectionId) {
                    el.classList.add('is-active');
                } else {
                    el.classList.remove('is-active');
                }
            }

            var tocItems = document.querySelectorAll('.about-toc-list .about-toc-item');
            for (var j = 0; j < tocItems.length; j++) {
                var item = tocItems[j];
                if (item.getAttribute('data-section-id') === sectionId) {
                    item.classList.add('is-active');
                } else {
                    item.classList.remove('is-active');
                }
            }

            if (options.updateUrl) {
                syncUrlToSection(sectionId, !!options.replaceState);
            }
            if (options.scroll) {
                scrollToSection(sectionId);
            }
        }

        function getActiveSectionIdentifier() {
            return state.activeSectionId || null;
        }

        function navigateToHelp() {
            var activeId = getActiveSectionIdentifier();
            var params = new URLSearchParams();
            params.set('from', 'about');
            if (activeId) {
                params.set('aboutSection', activeId);
            }
            var destUrl = 'help.html?' + params.toString();
            window.location.href = destUrl;
        }

        function handlePopState() {
            if (!aboutData) {
                return;
            }
            var params = new URLSearchParams(window.location.search);
            var sectionParam = params.get('section');
            if (sectionParam && state.sectionIds.indexOf(sectionParam) !== -1) {
                updateActiveSection(sectionParam, { updateUrl: false, scroll: true });
            } else if (!sectionParam && state.sectionIds.length > 0) {
                updateActiveSection(state.sectionIds[0], { updateUrl: false, scroll: false });
            }
        }

        ensureAboutData();

        var populateElements = document.querySelectorAll('[data-populate]');
        for (var i = 0; i < populateElements.length; i++) {
            var element = populateElements[i];
            var dataType = element.getAttribute('data-populate');
            if (dataType === 'about-title') {
                var dataTitle = ensureAboutData();
                renderAboutTitle(element, dataTitle);
            } else if (dataType === 'about-sections') {
                var dataSections = ensureAboutData();
                renderAboutSections(element, dataSections.contentSections || []);
            } else if (dataType === 'about-toc') {
                var dataToc = ensureAboutData();
                renderAboutToc(element, dataToc.contentSections || []);
            }
        }

        if (state.activeSectionId) {
            var shouldScroll = !!state.initialSectionParam && state.initialSectionMatched;
            updateActiveSection(state.activeSectionId, { updateUrl: false, scroll: shouldScroll });
        }

        document.addEventListener('click', function(event) {
            var actionTarget = event.target.closest('[data-action]');
            if (!actionTarget) {
                return;
            }
            var action = actionTarget.getAttribute('data-action');
            if (action === 'toc-item') {
                event.preventDefault();
                var sectionId = actionTarget.getAttribute('data-section-id');
                if (sectionId) {
                    updateActiveSection(sectionId, { updateUrl: true, scroll: true });
                }
            } else if (action === 'section-heading') {
                event.preventDefault();
                var sectionIdHeading = actionTarget.getAttribute('data-section-id');
                if (sectionIdHeading) {
                    updateActiveSection(sectionIdHeading, { updateUrl: true, scroll: true });
                }
            } else if (action === 'about-help-link') {
                event.preventDefault();
                navigateToHelp();
            }
        });

        var aboutContentContainer = document.querySelector('[data-component="about-section-list"]');
        if (aboutContentContainer) {
            aboutContentContainer.addEventListener('click', function(event) {
                var link = event.target.closest('a');
                if (!link) {
                    return;
                }
                var href = link.getAttribute('href') || '';

                if (/help\.html(\?|#|$)/.test(href) || link.getAttribute('data-destination') === 'help') {
                    event.preventDefault();
                    navigateToHelp();
                    return;
                }

                if (href.charAt(0) === '#') {
                    var targetId = decodeURIComponent(href.slice(1));
                    if (state.sectionIds.indexOf(targetId) !== -1) {
                        event.preventDefault();
                        updateActiveSection(targetId, { updateUrl: true, scroll: true });
                    }
                }
            });
        }

        window.addEventListener('popstate', handlePopState);
    });
    </script>
</body>
</html>
