<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pregnancy &amp; Baby Care – Products</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="framework.css" />
    <link rel="stylesheet" href="products.css" />
</head>
<body>
    <header class="site-header">
        <div class="brand-bar">
            <div class="brand-bar__inner container">
                <a href="index.html" class="site-logo" aria-label="Pregnancy Must home">
                    <span class="site-logo__primary">Pregnancy</span>
                    <span class="site-logo__secondary">Must</span>
                </a>

                <nav class="primary-nav" aria-label="Primary">
                    <ul class="primary-nav__list">
                        <li class="primary-nav__item">
                            <a href="index.html" class="primary-nav__link">Home</a>
                        </li>
                        <li class="primary-nav__item primary-nav__item--has-caret">
                            <a href="articles.html?categoryId=pregnancy" class="primary-nav__link">Pregnancy</a>
                        </li>
                        <li class="primary-nav__item primary-nav__item--has-caret">
                            <a href="articles.html?categoryId=baby" class="primary-nav__link">Baby</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="products.html?categoryId=all_products" class="primary-nav__link">Products</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="tools.html" class="primary-nav__link">Tools</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="community.html" class="primary-nav__link">Community</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="newsletter.html" class="primary-nav__link">Newsletter</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="reading_list.html" class="primary-nav__link">Reading list</a>
                        </li>
                    </ul>
                </nav>

                <div class="header-utilities">
                    <div class="header-follow" aria-hidden="true">
                        <span class="header-follow__label">Follow Us</span>
                        <span class="header-follow__caret">&#9662;</span>
                    </div>
                    <span class="header-search-icon" role="img" aria-label="Search icon">&#128269;</span>
                </div>
            </div>
        </div>
    </header>

    <main id="content" class="site-main container" role="main">
        <!-- Non-visual state components -->
        <div data-component="listing-state-initializer" aria-hidden="true" style="display:none"></div>
        <div data-component="comparison-state-loader" aria-hidden="true" style="display:none"></div>
        <div data-component="comparison-toggle-handler" aria-hidden="true" style="display:none"></div>

        <div class="product-list-page">
            <!-- Top control band: result summary, sort bar, active filters -->
            <section class="product-list-header">
                <div class="result-summary" data-component="result-summary" data-populate="result-summary">
                    <p class="result-summary__text">Loading products&hellip;</p>
                </div>

                <div class="sort-bar" data-component="sort-bar" data-populate="sort-bar" aria-label="Sort products">
                    <!-- Populated via JS -->
                </div>

                <div class="active-filters" data-component="active-filters-display" data-populate="active-filters">
                    <!-- Populated via JS -->
                </div>
            </section>

            <!-- Main two-column layout: filters sidebar + product grid -->
            <section class="product-list-layout" aria-label="Product results with filters">
                <aside class="product-list-layout__sidebar" data-component="filter-sidebar" data-populate="filter-sidebar">
                    <!-- Filter form populated via JS -->
                </aside>

                <section class="product-list-layout__grid" aria-label="Product grid">
                    <div class="product-grid" data-component="product-grid" data-populate="product-grid">
                        <!-- Product cards populated via JS -->
                    </div>

                    <nav class="pagination" data-component="pagination-controls" data-populate="pagination-controls" aria-label="Product results pages">
                        <!-- Pagination controls populated via JS -->
                    </nav>
                </section>
            </section>
        </div>

        <!-- Sticky comparison bar -->
        <div class="comparison-bar" data-component="comparison-bar" data-populate="comparison-bar" aria-label="Product comparison summary">
            <!-- Populated via JS -->
        </div>
    </main>

    <footer class="site-footer">
        <div class="site-footer__inner container">
            <nav class="footer-nav" aria-label="Footer">
                <a href="about.html" class="footer-nav__link">About</a>
                <a href="community.html" class="footer-nav__link">Community</a>
                <a href="newsletter.html" class="footer-nav__link">Newsletter signup</a>
                <a href="privacy.html" class="footer-nav__link">Privacy &amp; policies</a>
            </nav>
            <div class="site-footer__meta">
                <p class="site-footer__copyright">&copy; <span data-year></span> Pregnancy Must. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Footer year
        var yearSpan = document.querySelector('[data-year]');
        if (yearSpan) {
            yearSpan.textContent = String(new Date().getFullYear());
        }

        // Helper: HTML escaping
        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value).replace(/[&<>\"']/g, function(ch) {
                switch (ch) {
                    case '&': return '&amp;';
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '"': return '&quot;';
                    case "'": return '&#39;';
                    default: return ch;
                }
            });
        }

        function parseNumberParam(params, key) {
            var raw = params.get(key);
            if (raw === null || raw === '') {
                return null;
            }
            var num = Number(raw);
            if (Number.isNaN(num)) {
                return null;
            }
            return num;
        }

        function buildAndNavigate(changes, options) {
            var params = new URLSearchParams(window.location.search);

            if (changes) {
                for (var key in changes) {
                    if (Object.prototype.hasOwnProperty.call(changes, key)) {
                        var value = changes[key];
                        if (value === null || value === undefined || value === '') {
                            params.delete(key);
                        } else {
                            params.set(key, String(value));
                        }
                    }
                }
            }

            if (options && Array.isArray(options.removeKeys)) {
                options.removeKeys.forEach(function(k) { params.delete(k); });
            }

            if (options && options.resetPage) {
                params.set('page', '1');
            }

            var newQuery = params.toString();
            window.location.search = newQuery ? '?' + newQuery : '';
        }

        function formatPrice(price, currency) {
            if (price === null || price === undefined) {
                return '';
            }
            var symbol = '$';
            if (currency && currency.toLowerCase() !== 'usd') {
                symbol = currency.toUpperCase() + ' ';
            }
            var fixed = Number(price).toFixed(2);
            return symbol + fixed;
        }

        // Parse URL parameters for listing state
        var urlParams = new URLSearchParams(window.location.search);
        var listingState = {
            categoryId: urlParams.get('categoryId'),
            departmentCode: urlParams.get('departmentCode') || '',
            productType: urlParams.get('productType') || '',
            maxPrice: parseNumberParam(urlParams, 'maxPrice'),
            minRating: parseNumberParam(urlParams, 'minRating'),
            sortBy: urlParams.get('sortBy') || '',
            page: parseNumberParam(urlParams, 'page') || 1
        };
        if (!listingState.page || listingState.page < 1) {
            listingState.page = 1;
        }

        // Build filters object for getProductList
        var listFilters = {};
        if (listingState.departmentCode) {
            listFilters.department_code = listingState.departmentCode;
        }
        if (listingState.productType) {
            listFilters.product_type = listingState.productType;
        }
        if (listingState.maxPrice !== null) {
            listFilters.max_price = listingState.maxPrice;
        }
        if (listingState.minRating !== null) {
            listFilters.min_rating = listingState.minRating;
        }
        // Only show available products by default
        listFilters.only_available = true;

        // Data containers
        var filterOptions = {
            departments: [],
            product_types: [],
            price_filter_presets: [],
            rating_threshold_options: [],
            sort_options: []
        };
        var productList = {
            total_results: 0,
            page: listingState.page,
            page_size: 20,
            products: []
        };
        var comparisonData = {
            comparison_set: null,
            items: [],
            products: []
        };

        // Load data from SDK (synchronously, as per spec)
        try {
            filterOptions = WebsiteSDK.getProductFilterOptions();
        } catch (err) {
            console.error('Error loading product filter options', err);
        }

        try {
            if (listingState.sortBy) {
                productList = WebsiteSDK.getProductList(listFilters, listingState.sortBy, listingState.page, undefined);
            } else {
                // Omit sort_by to allow backend defaults
                productList = WebsiteSDK.getProductList(listFilters, undefined, listingState.page, undefined);
            }
        } catch (err2) {
            console.error('Error loading product list', err2);
        }

        // Handle out-of-range pages: if there are total_results but no products on this page
        if (productList && productList.total_results > 0 && Array.isArray(productList.products) && productList.products.length === 0) {
            var pageSize = productList.page_size || 20;
            var totalPages = Math.ceil(productList.total_results / pageSize);
            if (listingState.page > totalPages && totalPages > 0) {
                var corrected = new URLSearchParams(window.location.search);
                corrected.set('page', String(totalPages));
                window.location.search = '?' + corrected.toString();
                return;
            }
        }

        try {
            comparisonData = WebsiteSDK.getActiveProductComparison();
        } catch (err3) {
            console.error('Error loading active product comparison', err3);
        }

        // Build quick lookup maps for filter options
        var departmentByCode = {};
        if (Array.isArray(filterOptions.departments)) {
            filterOptions.departments.forEach(function(dept) {
                if (dept && dept.code) {
                    departmentByCode[dept.code] = dept;
                }
            });
        }
        var productTypeByValue = {};
        if (Array.isArray(filterOptions.product_types)) {
            filterOptions.product_types.forEach(function(pt) {
                if (pt && pt.value) {
                    productTypeByValue[pt.value] = pt;
                }
            });
        }
        var ratingOptionByValue = {};
        if (Array.isArray(filterOptions.rating_threshold_options)) {
            filterOptions.rating_threshold_options.forEach(function(rt) {
                if (rt && rt.min_rating !== undefined && rt.min_rating !== null) {
                    ratingOptionByValue[String(rt.min_rating)] = rt;
                }
            });
        }

        // Comparison state utilities
        var comparisonState = {
            productIdsSet: new Set(),
            productsById: {}
        };

        function recomputeComparisonState() {
            comparisonState.productIdsSet = new Set();
            comparisonState.productsById = {};
            if (!comparisonData || !Array.isArray(comparisonData.products)) {
                return;
            }
            comparisonData.products.forEach(function(prod) {
                if (prod && prod.id) {
                    comparisonState.productIdsSet.add(prod.id);
                    comparisonState.productsById[prod.id] = prod;
                }
            });
        }
        recomputeComparisonState();

        var pageData = {
            listingState: listingState,
            listFilters: listFilters,
            filterOptions: filterOptions,
            productList: productList,
            comparisonData: comparisonData,
            comparisonState: comparisonState,
            filterLabelMaps: {
                departmentByCode: departmentByCode,
                productTypeByValue: productTypeByValue,
                ratingOptionByValue: ratingOptionByValue
            }
        };

        // Renderer functions
        function renderResultSummary(container, data) {
            container.innerHTML = '';
            var pl = data.productList || { total_results: 0, page: 1, page_size: 20 };
            var total = pl.total_results || 0;
            var page = pl.page || data.listingState.page || 1;
            var pageSize = pl.page_size || 20;
            var p = document.createElement('p');
            p.className = 'result-summary__text';

            if (!total) {
                p.textContent = 'No products found. Try adjusting your filters.';
            } else {
                var start = (page - 1) * pageSize + 1;
                var end = Math.min(page * pageSize, total);
                var text = 'Showing ' + String(start) + '–' + String(end) + ' of ' + String(total) + ' products';
                if (data.listingState.departmentCode && data.filterLabelMaps.departmentByCode[data.listingState.departmentCode]) {
                    var deptName = data.filterLabelMaps.departmentByCode[data.listingState.departmentCode].name;
                    if (deptName) {
                        text += ' in ' + deptName;
                    }
                }
                p.textContent = text;
            }
            container.appendChild(p);
        }

        function renderSortBar(container, data) {
            container.innerHTML = '';
            var wrapper = document.createElement('div');
            wrapper.className = 'sort-bar__inner';

            var labelDiv = document.createElement('div');
            labelDiv.className = 'sort-bar__label';
            labelDiv.textContent = 'Sort by';

            var controlDiv = document.createElement('div');
            controlDiv.className = 'sort-bar__control';

            var select = document.createElement('select');
            select.name = 'sortBy';
            select.id = 'sortBySelect';
            select.className = 'sort-bar__select';
            select.setAttribute('data-action', 'change-sort');

            // Placeholder representing backend default
            var placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = 'Recommended';
            if (!data.listingState.sortBy) {
                placeholder.selected = true;
            }
            select.appendChild(placeholder);

            if (Array.isArray(data.filterOptions.sort_options)) {
                data.filterOptions.sort_options.forEach(function(opt) {
                    if (!opt || !opt.value) { return; }
                    var optionEl = document.createElement('option');
                    optionEl.value = opt.value;
                    optionEl.textContent = opt.label || opt.value;
                    if (data.listingState.sortBy && data.listingState.sortBy === opt.value) {
                        optionEl.selected = true;
                    }
                    select.appendChild(optionEl);
                });
            }

            controlDiv.appendChild(select);
            wrapper.appendChild(labelDiv);
            wrapper.appendChild(controlDiv);
            container.appendChild(wrapper);
        }

        function getFilterLabel(key, value, data) {
            if (value === null || value === undefined || value === '') {
                return '';
            }
            if (key === 'departmentCode') {
                var dept = data.filterLabelMaps.departmentByCode[value];
                return dept && dept.name ? dept.name : value;
            }
            if (key === 'productType') {
                var pt = data.filterLabelMaps.productTypeByValue[value];
                return pt && pt.label ? pt.label : value;
            }
            if (key === 'maxPrice') {
                return 'Up to ' + formatPrice(value, 'usd');
            }
            if (key === 'minRating') {
                var ratingOpt = data.filterLabelMaps.ratingOptionByValue[String(value)];
                if (ratingOpt && ratingOpt.label) {
                    return ratingOpt.label;
                }
                return 'Min ' + String(value) + ' ★';
            }
            return String(value);
        }

        function renderActiveFilters(container, data) {
            container.innerHTML = '';
            var wrapper = document.createElement('div');
            wrapper.className = 'active-filters__inner';

            var pillsContainer = document.createElement('div');
            pillsContainer.className = 'active-filters__pills';

            var hasAny = false;
            var keys = ['departmentCode', 'productType', 'maxPrice', 'minRating'];
            keys.forEach(function(key) {
                var value = data.listingState[key];
                if (value === null || value === undefined || value === '') {
                    return;
                }
                // If department cleared, product type becomes invalid; show productType only if department is set or value is present alone
                if (key === 'productType' && !data.listingState.departmentCode && !value) {
                    return;
                }
                var label = getFilterLabel(key, value, data);
                if (!label) { return; }
                hasAny = true;
                var pill = document.createElement('button');
                pill.type = 'button';
                pill.className = 'active-filters__pill';
                pill.setAttribute('data-action', 'clear-single-filter');
                pill.setAttribute('data-filter-key', key);
                pill.innerHTML = '<span class="active-filters__pill-label">' + escapeHtml(label) + '</span><span class="active-filters__pill-close" aria-hidden="true">&times;</span>';
                pillsContainer.appendChild(pill);
            });

            wrapper.appendChild(pillsContainer);

            var actionsDiv = document.createElement('div');
            actionsDiv.className = 'active-filters__actions';

            var clearAllButton = document.createElement('button');
            clearAllButton.type = 'button';
            clearAllButton.className = 'active-filters__clear-all';
            clearAllButton.setAttribute('data-action', 'clear-all-filters');
            clearAllButton.textContent = 'Clear all';
            if (!hasAny) {
                clearAllButton.disabled = true;
            }
            actionsDiv.appendChild(clearAllButton);

            wrapper.appendChild(actionsDiv);
            container.appendChild(wrapper);
        }

        function renderFilterSidebar(container, data) {
            container.innerHTML = '';

            var form = document.createElement('form');
            form.className = 'filter-sidebar card';
            form.method = 'get';
            form.action = 'products.html';
            form.setAttribute('data-action', 'filter-submit');

            var heading = document.createElement('h2');
            heading.className = 'filter-sidebar__title';
            heading.textContent = 'Filter products';
            form.appendChild(heading);

            // Hidden inputs to preserve categoryId and sortBy, and reset page to 1 on submit
            var hiddenCategory = document.createElement('input');
            hiddenCategory.type = 'hidden';
            hiddenCategory.name = 'categoryId';
            hiddenCategory.value = data.listingState.categoryId || 'all_products';
            form.appendChild(hiddenCategory);

            var hiddenSort = document.createElement('input');
            hiddenSort.type = 'hidden';
            hiddenSort.name = 'sortBy';
            hiddenSort.value = data.listingState.sortBy || '';
            form.appendChild(hiddenSort);

            var hiddenPage = document.createElement('input');
            hiddenPage.type = 'hidden';
            hiddenPage.name = 'page';
            hiddenPage.value = '1';
            form.appendChild(hiddenPage);

            // Department selector
            var deptGroup = document.createElement('div');
            deptGroup.className = 'filter-group';
            var deptLabel = document.createElement('label');
            deptLabel.className = 'filter-group__label';
            deptLabel.setAttribute('for', 'departmentSelect');
            deptLabel.textContent = 'Department';
            var deptSelect = document.createElement('select');
            deptSelect.id = 'departmentSelect';
            deptSelect.name = 'departmentCode';
            deptSelect.className = 'filter-group__select';

            var deptAny = document.createElement('option');
            deptAny.value = '';
            deptAny.textContent = 'All departments';
            if (!data.listingState.departmentCode) {
                deptAny.selected = true;
            }
            deptSelect.appendChild(deptAny);

            if (Array.isArray(data.filterOptions.departments)) {
                data.filterOptions.departments.forEach(function(dept) {
                    if (!dept || !dept.code) { return; }
                    var opt = document.createElement('option');
                    opt.value = dept.code;
                    opt.textContent = dept.name || dept.code;
                    if (data.listingState.departmentCode && data.listingState.departmentCode === dept.code) {
                        opt.selected = true;
                    }
                    deptSelect.appendChild(opt);
                });
            }

            deptGroup.appendChild(deptLabel);
            deptGroup.appendChild(deptSelect);
            form.appendChild(deptGroup);

            // Product type selector
            var typeGroup = document.createElement('div');
            typeGroup.className = 'filter-group';
            var typeLabel = document.createElement('label');
            typeLabel.className = 'filter-group__label';
            typeLabel.setAttribute('for', 'productTypeSelect');
            typeLabel.textContent = 'Product type';
            var typeSelect = document.createElement('select');
            typeSelect.id = 'productTypeSelect';
            typeSelect.name = 'productType';
            typeSelect.className = 'filter-group__select';

            var typeAny = document.createElement('option');
            typeAny.value = '';
            typeAny.textContent = 'All product types';
            if (!data.listingState.productType) {
                typeAny.selected = true;
            }
            typeSelect.appendChild(typeAny);

            var filteredTypes = [];
            if (Array.isArray(data.filterOptions.product_types)) {
                data.filterOptions.product_types.forEach(function(pt) {
                    if (!pt || !pt.value) { return; }
                    if (data.listingState.departmentCode) {
                        if (pt.department_code === data.listingState.departmentCode) {
                            filteredTypes.push(pt);
                        }
                    } else {
                        filteredTypes.push(pt);
                    }
                });
            }

            filteredTypes.forEach(function(pt) {
                var opt = document.createElement('option');
                opt.value = pt.value;
                opt.textContent = pt.label || pt.value;
                if (data.listingState.productType && data.listingState.productType === pt.value) {
                    opt.selected = true;
                }
                typeSelect.appendChild(opt);
            });

            typeGroup.appendChild(typeLabel);
            typeGroup.appendChild(typeSelect);
            form.appendChild(typeGroup);

            // Price filter
            var priceGroup = document.createElement('fieldset');
            priceGroup.className = 'filter-group';
            var priceLegend = document.createElement('legend');
            priceLegend.className = 'filter-group__label';
            priceLegend.textContent = 'Maximum price';
            priceGroup.appendChild(priceLegend);

            var pricePresetsContainer = document.createElement('div');
            pricePresetsContainer.className = 'filter-group__preset-list';

            if (Array.isArray(data.filterOptions.price_filter_presets) && data.filterOptions.price_filter_presets.length) {
                data.filterOptions.price_filter_presets.forEach(function(preset, index) {
                    if (!preset || preset.max_price === undefined || preset.max_price === null) { return; }
                    var presetId = 'pricePreset_' + String(index);
                    var row = document.createElement('div');
                    row.className = 'filter-group__preset-row';
                    var radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'pricePreset';
                    radio.id = presetId;
                    radio.value = String(preset.max_price);
                    if (data.listingState.maxPrice !== null && data.listingState.maxPrice === preset.max_price) {
                        radio.checked = true;
                    }
                    var label = document.createElement('label');
                    label.setAttribute('for', presetId);
                    label.textContent = preset.label || ('Up to ' + formatPrice(preset.max_price, 'usd'));
                    row.appendChild(radio);
                    row.appendChild(label);
                    pricePresetsContainer.appendChild(row);
                });
            }

            priceGroup.appendChild(pricePresetsContainer);

            var customPriceRow = document.createElement('div');
            customPriceRow.className = 'filter-group__field';
            var customPriceLabel = document.createElement('label');
            customPriceLabel.setAttribute('for', 'maxPriceInput');
            customPriceLabel.textContent = 'Or enter a custom max price';
            var customPriceInput = document.createElement('input');
            customPriceInput.type = 'number';
            customPriceInput.id = 'maxPriceInput';
            customPriceInput.name = 'maxPrice';
            customPriceInput.className = 'filter-group__input';
            customPriceInput.min = '0';
            customPriceInput.step = '1';
            if (data.listingState.maxPrice !== null) {
                customPriceInput.value = String(data.listingState.maxPrice);
            }

            // When user focuses or types in custom price, clear radio selection
            customPriceInput.addEventListener('input', function() {
                var radios = pricePresetsContainer.querySelectorAll('input[type="radio"][name="pricePreset"]');
                radios.forEach(function(r) { r.checked = false; });
            });

            // When user selects a preset, sync custom maxPrice input
            pricePresetsContainer.addEventListener('change', function(event) {
                var target = event.target;
                if (target && target.name === 'pricePreset') {
                    customPriceInput.value = target.value || '';
                }
            });

            customPriceRow.appendChild(customPriceLabel);
            customPriceRow.appendChild(customPriceInput);
            priceGroup.appendChild(customPriceRow);

            form.appendChild(priceGroup);

            // Rating filter
            var ratingGroup = document.createElement('div');
            ratingGroup.className = 'filter-group';
            var ratingLabel = document.createElement('label');
            ratingLabel.className = 'filter-group__label';
            ratingLabel.setAttribute('for', 'minRatingSelect');
            ratingLabel.textContent = 'Minimum rating';
            var ratingSelect = document.createElement('select');
            ratingSelect.id = 'minRatingSelect';
            ratingSelect.name = 'minRating';
            ratingSelect.className = 'filter-group__select';

            var ratingAny = document.createElement('option');
            ratingAny.value = '';
            ratingAny.textContent = 'Any rating';
            if (data.listingState.minRating === null) {
                ratingAny.selected = true;
            }
            ratingSelect.appendChild(ratingAny);

            if (Array.isArray(data.filterOptions.rating_threshold_options)) {
                data.filterOptions.rating_threshold_options.forEach(function(rt) {
                    if (!rt || rt.min_rating === undefined || rt.min_rating === null) { return; }
                    var opt = document.createElement('option');
                    opt.value = String(rt.min_rating);
                    opt.textContent = rt.label || ('At least ' + String(rt.min_rating) + ' ★');
                    if (data.listingState.minRating !== null && data.listingState.minRating === rt.min_rating) {
                        opt.selected = true;
                    }
                    ratingSelect.appendChild(opt);
                });
            }

            ratingGroup.appendChild(ratingLabel);
            ratingGroup.appendChild(ratingSelect);
            form.appendChild(ratingGroup);

            // Submit button
            var actions = document.createElement('div');
            actions.className = 'filter-sidebar__actions';
            var submitBtn = document.createElement('button');
            submitBtn.type = 'submit';
            submitBtn.className = 'btn btn-primary';
            var labelSpan = document.createElement('span');
            labelSpan.className = 'btn-label';
            labelSpan.textContent = 'Apply filters';
            var iconSpan = document.createElement('span');
            iconSpan.className = 'btn-icon';
            iconSpan.innerHTML = '&#8594;';
            submitBtn.appendChild(labelSpan);
            submitBtn.appendChild(iconSpan);
            actions.appendChild(submitBtn);
            form.appendChild(actions);

            container.appendChild(form);
        }

        function renderProductGrid(container, data) {
            container.innerHTML = '';
            var pl = data.productList || { total_results: 0, products: [] };
            var products = Array.isArray(pl.products) ? pl.products : [];

            if (!products.length) {
                var emptyDiv = document.createElement('div');
                emptyDiv.className = 'product-grid__empty';
                emptyDiv.textContent = 'No products match these filters yet.';
                container.appendChild(emptyDiv);
                return;
            }

            var grid = document.createElement('div');
            grid.className = 'product-grid__items';

            products.forEach(function(prod) {
                if (!prod || !prod.id) { return; }
                var card = document.createElement('article');
                card.className = 'product-card card';

                var imageWrapper = document.createElement('div');
                imageWrapper.className = 'product-card__image-wrapper';
                if (prod.image_url) {
                    var img = document.createElement('img');
                    img.className = 'product-card__image';
                    img.src = prod.image_url;
                    img.alt = prod.name ? prod.name : 'Product image';
                    imageWrapper.appendChild(img);
                } else {
                    var placeholder = document.createElement('div');
                    placeholder.className = 'product-card__image-placeholder';
                    placeholder.textContent = 'No image';
                    imageWrapper.appendChild(placeholder);
                }
                card.appendChild(imageWrapper);

                var body = document.createElement('div');
                body.className = 'product-card__body';

                var title = document.createElement('h3');
                title.className = 'product-card__title';
                var titleLink = document.createElement('a');
                titleLink.href = 'javascript:void(0)';
                titleLink.setAttribute('data-action', 'open-product');
                titleLink.setAttribute('data-product-id', prod.id);
                titleLink.textContent = prod.name || 'View product';
                title.appendChild(titleLink);
                body.appendChild(title);

                var meta = document.createElement('div');
                meta.className = 'product-card__meta';

                var priceSpan = document.createElement('span');
                priceSpan.className = 'product-card__price';
                priceSpan.textContent = formatPrice(prod.price, prod.currency || 'usd');
                meta.appendChild(priceSpan);

                if (prod.rating !== null && prod.rating !== undefined) {
                    var ratingSpan = document.createElement('span');
                    ratingSpan.className = 'product-card__rating';
                    var ratingText = String(Number(prod.rating).toFixed(1)) + ' ★';
                    if (prod.rating_count !== null && prod.rating_count !== undefined) {
                        ratingText += ' (' + String(prod.rating_count) + ')';
                    }
                    ratingSpan.textContent = ratingText;
                    meta.appendChild(ratingSpan);
                }

                var availability = document.createElement('span');
                availability.className = 'product-card__availability';
                if (prod.is_available) {
                    availability.textContent = 'In stock';
                    availability.setAttribute('data-availability', 'in_stock');
                } else {
                    availability.textContent = 'Out of stock';
                    availability.setAttribute('data-availability', 'out_of_stock');
                }
                meta.appendChild(availability);

                body.appendChild(meta);

                var actions = document.createElement('div');
                actions.className = 'product-card__actions';
                var compareBtn = document.createElement('button');
                compareBtn.type = 'button';
                compareBtn.className = 'product-card__compare-toggle';
                compareBtn.setAttribute('data-action', 'toggle-compare');
                compareBtn.setAttribute('data-product-id', prod.id);

                var isSelected = data.comparisonState.productIdsSet.has(prod.id);
                if (isSelected) {
                    compareBtn.classList.add('product-card__compare-toggle--active');
                    compareBtn.setAttribute('aria-pressed', 'true');
                    compareBtn.textContent = 'Remove from comparison';
                } else {
                    compareBtn.setAttribute('aria-pressed', 'false');
                    compareBtn.textContent = 'Add to comparison';
                }

                actions.appendChild(compareBtn);
                body.appendChild(actions);

                // Make entire card clickable except explicit controls
                card.setAttribute('data-action', 'open-product');
                card.setAttribute('data-product-id', prod.id);

                card.appendChild(body);
                grid.appendChild(card);
            });

            container.appendChild(grid);
        }

        function renderPagination(container, data) {
            container.innerHTML = '';
            var pl = data.productList || { total_results: 0, page: 1, page_size: 20 };
            var total = pl.total_results || 0;
            var pageSize = pl.page_size || 20;
            if (!total || total <= pageSize) {
                container.style.display = 'none';
                return;
            }
            container.style.display = '';

            var totalPages = Math.ceil(total / pageSize);
            var current = pl.page || 1;

            var list = document.createElement('ul');
            list.className = 'pagination__list';

            function createPageButton(label, pageNumber, disabled, isCurrent) {
                var li = document.createElement('li');
                li.className = 'pagination__item';
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'pagination__button';
                btn.textContent = label;
                if (disabled) {
                    btn.disabled = true;
                    btn.classList.add('pagination__button--disabled');
                } else {
                    btn.setAttribute('data-action', 'change-page');
                    btn.setAttribute('data-page', String(pageNumber));
                }
                if (isCurrent) {
                    btn.classList.add('pagination__button--current');
                    btn.setAttribute('aria-current', 'page');
                }
                li.appendChild(btn);
                return li;
            }

            // Previous
            list.appendChild(createPageButton('Previous', current - 1, current <= 1, false));

            var start = Math.max(1, current - 2);
            var end = Math.min(totalPages, current + 2);
            if (start > 1) {
                list.appendChild(createPageButton('1', 1, false, current === 1));
                if (start > 2) {
                    var ellipsisLi = document.createElement('li');
                    ellipsisLi.className = 'pagination__item pagination__item--ellipsis';
                    ellipsisLi.textContent = '...';
                    list.appendChild(ellipsisLi);
                }
            }

            for (var i = start; i <= end; i += 1) {
                list.appendChild(createPageButton(String(i), i, false, i === current));
            }

            if (end < totalPages) {
                if (end < totalPages - 1) {
                    var ellipsisLi2 = document.createElement('li');
                    ellipsisLi2.className = 'pagination__item pagination__item--ellipsis';
                    ellipsisLi2.textContent = '...';
                    list.appendChild(ellipsisLi2);
                }
                list.appendChild(createPageButton(String(totalPages), totalPages, false, current === totalPages));
            }

            // Next
            list.appendChild(createPageButton('Next', current + 1, current >= totalPages, false));

            container.appendChild(list);
        }

        function renderComparisonBar(container, data) {
            container.innerHTML = '';
            var comparison = data.comparisonData || { items: [], products: [] };
            var items = Array.isArray(comparison.items) ? comparison.items : [];
            var productsById = data.comparisonState.productsById || {};
            var count = items.length;

            var inner = document.createElement('div');
            inner.className = 'comparison-bar__inner container';

            var left = document.createElement('div');
            left.className = 'comparison-bar__section comparison-bar__section--left';
            var label = document.createElement('div');
            label.className = 'comparison-bar__label';
            label.textContent = 'Product comparison';
            left.appendChild(label);

            var center = document.createElement('div');
            center.className = 'comparison-bar__section comparison-bar__section--center';
            var summary = document.createElement('div');
            summary.className = 'comparison-bar__summary';
            if (!count) {
                summary.textContent = 'Select products to compare details side by side.';
            } else if (count === 1) {
                summary.textContent = '1 product selected for comparison.';
            } else {
                summary.textContent = String(count) + ' products selected for comparison.';
            }
            center.appendChild(summary);

            if (count) {
                var chips = document.createElement('div');
                chips.className = 'comparison-bar__chips';
                items.slice(0, 4).forEach(function(item) {
                    if (!item || !item.product_id) { return; }
                    var prod = productsById[item.product_id];
                    var chipLabel = prod && prod.name ? prod.name : item.product_id;
                    var chip = document.createElement('button');
                    chip.type = 'button';
                    chip.className = 'comparison-bar__chip';
                    chip.setAttribute('data-action', 'remove-from-comparison');
                    chip.setAttribute('data-product-id', item.product_id);
                    chip.innerHTML = '<span class="comparison-bar__chip-label">' + escapeHtml(chipLabel) + '</span><span class="comparison-bar__chip-close" aria-hidden="true">&times;</span>';
                    chips.appendChild(chip);
                });
                if (count > 4) {
                    var more = document.createElement('span');
                    more.className = 'comparison-bar__more';
                    more.textContent = '+' + String(count - 4) + ' more';
                    chips.appendChild(more);
                }
                center.appendChild(chips);
            }

            var right = document.createElement('div');
            right.className = 'comparison-bar__section comparison-bar__section--right';
            var cta = document.createElement('button');
            cta.type = 'button';
            cta.className = 'btn btn-primary comparison-bar__button';
            cta.setAttribute('data-action', 'view-comparison');
            if (!count) {
                cta.disabled = true;
            }
            var ctaLabel = document.createElement('span');
            ctaLabel.className = 'btn-label';
            ctaLabel.textContent = 'View comparison';
            var ctaIcon = document.createElement('span');
            ctaIcon.className = 'btn-icon';
            ctaIcon.innerHTML = '&#8594;';
            cta.appendChild(ctaLabel);
            cta.appendChild(ctaIcon);
            right.appendChild(cta);

            inner.appendChild(left);
            inner.appendChild(center);
            inner.appendChild(right);
            container.appendChild(inner);
        }

        // Map of renderer functions by data-populate key
        var renderers = {
            'result-summary': renderResultSummary,
            'sort-bar': renderSortBar,
            'active-filters': renderActiveFilters,
            'filter-sidebar': renderFilterSidebar,
            'product-grid': renderProductGrid,
            'pagination-controls': renderPagination,
            'comparison-bar': renderComparisonBar
        };

        var componentsByPopulateKey = {};
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(el) {
            var key = el.getAttribute('data-populate');
            if (!key) { return; }
            componentsByPopulateKey[key] = el;
            var renderer = renderers[key];
            if (typeof renderer === 'function') {
                renderer(el, pageData);
            }
        });

        // Comparison state refresh helper
        function refreshComparisonStateFromBackend() {
            try {
                comparisonData = WebsiteSDK.getActiveProductComparison();
            } catch (err4) {
                console.error('Error refreshing comparison state', err4);
                return;
            }
            pageData.comparisonData = comparisonData;
            recomputeComparisonState();
            pageData.comparisonState = comparisonState;

            // Re-render product grid and comparison bar to reflect new state
            var gridEl = componentsByPopulateKey['product-grid'];
            if (gridEl) {
                renderProductGrid(gridEl, pageData);
            }
            var barEl = componentsByPopulateKey['comparison-bar'];
            if (barEl) {
                renderComparisonBar(barEl, pageData);
            }
        }

        // Event handlers bound via data-action
        function handleSortChange(event) {
            var select = event.currentTarget;
            var value = select.value || '';
            var changes = { sortBy: value || null };
            buildAndNavigate(changes, { resetPage: true });
        }

        function handleClearSingleFilter(event) {
            var btn = event.currentTarget;
            var filterKey = btn.getAttribute('data-filter-key');
            if (!filterKey) { return; }
            var changes = {};
            changes[filterKey] = null;
            var removeKeys = [];
            if (filterKey === 'departmentCode') {
                removeKeys.push('productType');
            }
            buildAndNavigate(changes, { resetPage: true, removeKeys: removeKeys });
        }

        function handleClearAllFilters() {
            var changes = {
                departmentCode: null,
                productType: null,
                maxPrice: null,
                minRating: null,
                sortBy: null
            };
            buildAndNavigate(changes, { resetPage: true });
        }

        function handleChangePage(event) {
            var btn = event.currentTarget;
            var pageStr = btn.getAttribute('data-page');
            var pageNum = Number(pageStr);
            if (!pageNum || pageNum < 1) { return; }
            if (pageNum === pageData.productList.page) { return; }
            buildAndNavigate({ page: pageNum }, { resetPage: false });
        }

        function handleOpenProduct(event) {
            // Avoid triggering when clicking compare buttons or chips
            var target = event.currentTarget;
            var productId = target.getAttribute('data-product-id');
            if (!productId) { return; }
            window.location.href = 'product.html?id=' + encodeURIComponent(productId);
        }

        function handleToggleCompare(event) {
            event.preventDefault();
            event.stopPropagation();
            var btn = event.currentTarget;
            var productId = btn.getAttribute('data-product-id');
            if (!productId) { return; }
            var isSelected = comparisonState.productIdsSet.has(productId);
            try {
                if (!isSelected) {
                    WebsiteSDK.addProductToComparison(productId);
                } else {
                    WebsiteSDK.removeProductFromComparison(productId);
                }
            } catch (err5) {
                console.error('Error updating comparison set', err5);
                return;
            }
            refreshComparisonStateFromBackend();
        }

        function handleViewComparison() {
            if (!pageData.comparisonState.productIdsSet || pageData.comparisonState.productIdsSet.size === 0) {
                return;
            }
            window.location.href = 'product_compare.html';
        }

        function handleRemoveFromComparison(event) {
            event.preventDefault();
            var btn = event.currentTarget;
            var productId = btn.getAttribute('data-product-id');
            if (!productId) { return; }
            try {
                WebsiteSDK.removeProductFromComparison(productId);
            } catch (err6) {
                console.error('Error removing product from comparison', err6);
                return;
            }
            refreshComparisonStateFromBackend();
        }

        // Bind events based on data-action attributes
        var actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(el) {
            var action = el.getAttribute('data-action');
            if (!action) { return; }
            if (action === 'change-sort') {
                el.addEventListener('change', handleSortChange);
            } else if (action === 'clear-single-filter') {
                el.addEventListener('click', handleClearSingleFilter);
            } else if (action === 'clear-all-filters') {
                el.addEventListener('click', handleClearAllFilters);
            } else if (action === 'change-page') {
                el.addEventListener('click', handleChangePage);
            } else if (action === 'open-product') {
                el.addEventListener('click', handleOpenProduct);
            } else if (action === 'toggle-compare') {
                el.addEventListener('click', handleToggleCompare);
            } else if (action === 'view-comparison') {
                el.addEventListener('click', handleViewComparison);
            } else if (action === 'remove-from-comparison') {
                el.addEventListener('click', handleRemoveFromComparison);
            }
        });
    });
    </script>
</body>
</html>
