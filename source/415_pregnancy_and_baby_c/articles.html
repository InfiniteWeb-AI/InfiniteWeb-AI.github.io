<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1' />
    <title>Articles – Pregnancy &amp; Baby Care</title>

    <!-- Typography -->
    <link rel='preconnect' href='https://fonts.googleapis.com' />
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
    <link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet' />

    <link rel='stylesheet' href='framework.css' />
    <link rel='stylesheet' href='articles.css' />
</head>
<body>
    <header class='site-header'>
        <div class='brand-bar'>
            <div class='brand-bar__inner container'>
                <a href='index.html' class='site-logo' aria-label='Pregnancy Must home'>
                    <span class='site-logo__primary'>Pregnancy</span>
                    <span class='site-logo__secondary'>Must</span>
                </a>

                <nav class='primary-nav' aria-label='Primary'>
                    <ul class='primary-nav__list'>
                        <li class='primary-nav__item'>
                            <a href='index.html' class='primary-nav__link'>Home</a>
                        </li>
                        <li class='primary-nav__item primary-nav__item--has-caret'>
                            <a href='articles.html?categoryId=pregnancy' class='primary-nav__link'>Pregnancy</a>
                        </li>
                        <li class='primary-nav__item primary-nav__item--has-caret'>
                            <a href='articles.html?categoryId=baby' class='primary-nav__link'>Baby</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='products.html?categoryId=all_products' class='primary-nav__link'>Products</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='tools.html' class='primary-nav__link'>Tools</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='community.html' class='primary-nav__link'>Community</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='newsletter.html' class='primary-nav__link'>Newsletter</a>
                        </li>
                        <li class='primary-nav__item'>
                            <a href='reading_list.html' class='primary-nav__link'>Reading list</a>
                        </li>
                    </ul>
                </nav>

                <div class='header-utilities'>
                    <div class='header-follow' aria-hidden='true'>
                        <span class='header-follow__label'>Follow Us</span>
                        <span class='header-follow__caret'>&#9662;</span>
                    </div>
                    <span class='header-search-icon' role='img' aria-label='Search icon'>&#128269;</span>
                </div>
            </div>
        </div>
    </header>

    <main id='content' class='site-main container' role='main'>
        <div class='articles-page' data-component='articles-page'>
            <!-- Non-visual data loader / state components -->
            <div data-component='filter-options-loader' data-populate='filter-options' hidden></div>

            <!-- Search form -->
            <section class='articles-search card' data-component='article-search-form'>
                <form id='articleSearchForm' class='articles-search__form' data-action='submit-search' role='search' aria-label='Search articles'>
                    <label for='articleSearchInput' class='form-label'>Search articles</label>
                    <div class='articles-search__field-row'>
                        <input
                            type='search'
                            id='articleSearchInput'
                            name='query'
                            class='form-input articles-search__input'
                            placeholder='Search pregnancy and baby care articles'
                            autocomplete='off'
                        />
                        <button type='submit' class='btn btn-primary articles-search__submit'>
                            <span class='btn-label'>Search</span>
                            <span class='btn-icon'>&#8594;</span>
                        </button>
                    </div>
                </form>
            </section>

            <!-- Category / subcategory toolbar -->
            <section
                class='filter-toolbar filter-toolbar--category'
                data-component='category-subcategory-selector'
                aria-label='Filter by category and topic'
            >
                <div class='filter-toolbar__inner'>
                    <div class='filter-toolbar__group'>
                        <span class='filter-toolbar__label'>Browse by</span>
                        <div class='filter-toolbar__controls'>
                            <div class='form-group'>
                                <label for='categorySelect' class='form-label'>Category</label>
                                <select
                                    id='categorySelect'
                                    class='form-select'
                                    data-action='change-category'
                                >
                                    <option value=''>All</option>
                                </select>
                            </div>
                            <div class='form-group'>
                                <label for='subcategorySelect' class='form-label'>Topic</label>
                                <select
                                    id='subcategorySelect'
                                    class='form-select'
                                    data-action='change-subcategory'
                                    disabled
                                >
                                    <option value=''>All topics</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Trimester / baby age / rating filters -->
            <section
                class='filter-toolbar filter-toolbar--details'
                data-component='pregnancy-baby-filters'
                aria-label='Filter by trimester, baby age, and rating'
            >
                <div class='filter-toolbar__inner'>
                    <div class='filter-toolbar__controls'>
                        <div class='form-group'>
                            <label for='trimesterSelect' class='form-label'>Trimester</label>
                            <select
                                id='trimesterSelect'
                                class='form-select'
                                data-action='change-trimester'
                            >
                                <option value=''>Any</option>
                            </select>
                        </div>
                        <div class='form-group'>
                            <label for='babyAgeRangeSelect' class='form-label'>Baby age</label>
                            <select
                                id='babyAgeRangeSelect'
                                class='form-select'
                                data-action='change-baby-age-range'
                            >
                                <option value=''>Any</option>
                            </select>
                        </div>
                        <div class='form-group'>
                            <label for='ratingMinSelect' class='form-label'>Minimum rating</label>
                            <select
                                id='ratingMinSelect'
                                class='form-select'
                                data-action='change-rating-min'
                            >
                                <option value=''>Any</option>
                            </select>
                        </div>
                    </div>
                    <div class='filter-toolbar__actions'>
                        <button
                            type='button'
                            class='btn btn-ghost filter-toolbar__clear'
                            data-action='clear-pregnancy-baby-filters'
                        >
                            Clear these filters
                        </button>
                    </div>
                </div>
            </section>

            <!-- Active filters + sort band -->
            <section class='articles-control-band' aria-label='Active filters and sorting'>
                <div class='articles-control-band__inner'>
                    <div
                        class='active-filters'
                        data-component='active-filters-summary'
                        data-populate='active-filters'
                    >
                        <!-- Active filter chips rendered via JS -->
                    </div>
                    <div class='sort-control' data-component='sort-control'>
                        <label for='sortSelect' class='sort-control__label'>Sort by</label>
                        <select
                            id='sortSelect'
                            class='form-select sort-control__select'
                            data-action='change-sort'
                            data-populate='sort-options'
                        >
                            <!-- Sort options rendered via JS -->
                        </select>
                    </div>
                </div>
            </section>

            <!-- Results list -->
            <section
                class='article-results'
                data-component='article-results-list'
                data-populate='article-results'
                aria-label='Article results list'
            >
                <!-- Article cards rendered via JS -->
            </section>

            <!-- Pagination -->
            <nav
                class='pagination'
                data-component='pagination-control'
                data-populate='pagination'
                aria-label='Article pagination'
            >
                <!-- Pagination controls rendered via JS -->
            </nav>
        </div>
    </main>

    <footer class='site-footer'>
        <div class='site-footer__inner container'>
            <nav class='footer-nav' aria-label='Footer'>
                <a href='about.html' class='footer-nav__link'>About</a>
                <a href='community.html' class='footer-nav__link'>Community</a>
                <a href='newsletter.html' class='footer-nav__link'>Newsletter signup</a>
                <a href='privacy.html' class='footer-nav__link'>Privacy &amp; policies</a>
            </nav>
            <div class='site-footer__meta'>
                <p class='site-footer__copyright'>&copy; <span data-year></span> Pregnancy Must. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var PAGE_SIZE = 10;
        var filterOptions = null;
        var lastSearchResult = null;

        var resultsContainer = document.querySelector('[data-populate="article-results"]');
        var paginationContainer = document.querySelector('[data-populate="pagination"]');
        var activeFiltersContainer = document.querySelector('[data-populate="active-filters"]');
        var sortSelect = document.querySelector('[data-action="change-sort"]');
        var searchForm = document.querySelector('[data-action="submit-search"]');
        var searchInput = document.getElementById('articleSearchInput');
        var categorySelect = document.getElementById('categorySelect');
        var subcategorySelect = document.getElementById('subcategorySelect');
        var trimesterSelect = document.getElementById('trimesterSelect');
        var babyAgeRangeSelect = document.getElementById('babyAgeRangeSelect');
        var ratingMinSelect = document.getElementById('ratingMinSelect');
        var clearPregnancyFiltersButton = document.querySelector('[data-action="clear-pregnancy-baby-filters"]');

        function readUrlParams() {
            var urlParams = new URLSearchParams(window.location.search);
            var pageRaw = urlParams.get('page');
            var pageNum = parseInt(pageRaw, 10);
            if (!pageNum || pageNum < 1) {
                pageNum = 1;
            }
            return {
                categoryId: urlParams.get('categoryId') || '',
                subcategory: urlParams.get('subcategory') || '',
                query: urlParams.get('query') || '',
                trimester: urlParams.get('trimester') || '',
                babyAgeRange: urlParams.get('babyAgeRange') || '',
                ratingMin: urlParams.get('ratingMin') || '',
                sortBy: urlParams.get('sortBy') || '',
                page: pageNum
            };
        }

        function buildFiltersFromParams(params) {
            var filters = {};
            if (params.categoryId) {
                filters.category = params.categoryId;
            }
            if (params.subcategory) {
                filters.subcategory = params.subcategory;
            }
            if (params.trimester) {
                filters.trimester = params.trimester;
            }
            if (params.babyAgeRange) {
                filters.baby_age_range = params.babyAgeRange;
            }
            if (params.ratingMin) {
                var ratingNumber = parseFloat(params.ratingMin);
                if (!isNaN(ratingNumber)) {
                    filters.min_rating = ratingNumber;
                }
            }
            return filters;
        }

        function getValidSortValue(requestedSort) {
            var defaultSort = '';
            if (filterOptions && filterOptions.sort_options && filterOptions.sort_options.length > 0) {
                defaultSort = filterOptions.sort_options[0].value || '';
            }
            if (!requestedSort) {
                return defaultSort;
            }
            if (!filterOptions || !filterOptions.sort_options) {
                return requestedSort;
            }
            for (var i = 0; i < filterOptions.sort_options.length; i++) {
                if (filterOptions.sort_options[i].value === requestedSort) {
                    return requestedSort;
                }
            }
            return defaultSort;
        }

        function populateCategoryOptions() {
            if (!categorySelect) {
                return;
            }
            while (categorySelect.options.length > 1) {
                categorySelect.remove(1);
            }
            if (!filterOptions || !filterOptions.categories) {
                return;
            }
            for (var i = 0; i < filterOptions.categories.length; i++) {
                var cat = filterOptions.categories[i];
                var opt = document.createElement('option');
                opt.value = cat.value || '';
                opt.textContent = cat.label || cat.value || '';
                categorySelect.appendChild(opt);
            }
        }

        function populateSubcategoryOptions(categoryValue, selectedValue) {
            if (!subcategorySelect) {
                return;
            }
            subcategorySelect.innerHTML = '';
            var placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = 'All topics';
            subcategorySelect.appendChild(placeholder);
            if (!filterOptions || !filterOptions.subcategories || !categoryValue) {
                subcategorySelect.disabled = !categoryValue;
                return;
            }
            for (var i = 0; i < filterOptions.subcategories.length; i++) {
                var sub = filterOptions.subcategories[i];
                if (sub.category_value === categoryValue) {
                    var opt = document.createElement('option');
                    opt.value = sub.value || '';
                    opt.textContent = sub.label || sub.value || '';
                    subcategorySelect.appendChild(opt);
                }
            }
            subcategorySelect.disabled = false;
            if (selectedValue) {
                subcategorySelect.value = selectedValue;
            }
        }

        function populateTrimesterOptions() {
            if (!trimesterSelect) {
                return;
            }
            while (trimesterSelect.options.length > 1) {
                trimesterSelect.remove(1);
            }
            if (!filterOptions || !filterOptions.trimester_options) {
                return;
            }
            for (var i = 0; i < filterOptions.trimester_options.length; i++) {
                var tr = filterOptions.trimester_options[i];
                var opt = document.createElement('option');
                opt.value = tr.value || '';
                opt.textContent = tr.label || tr.value || '';
                trimesterSelect.appendChild(opt);
            }
        }

        function populateBabyAgeRangeOptions() {
            if (!babyAgeRangeSelect) {
                return;
            }
            while (babyAgeRangeSelect.options.length > 1) {
                babyAgeRangeSelect.remove(1);
            }
            if (!filterOptions || !filterOptions.baby_age_range_options) {
                return;
            }
            for (var i = 0; i < filterOptions.baby_age_range_options.length; i++) {
                var optData = filterOptions.baby_age_range_options[i];
                var opt = document.createElement('option');
                opt.value = optData.value || '';
                opt.textContent = optData.label || optData.value || '';
                babyAgeRangeSelect.appendChild(opt);
            }
        }

        function populateRatingThresholdOptions() {
            if (!ratingMinSelect) {
                return;
            }
            while (ratingMinSelect.options.length > 1) {
                ratingMinSelect.remove(1);
            }
            if (!filterOptions || !filterOptions.rating_threshold_options) {
                return;
            }
            for (var i = 0; i < filterOptions.rating_threshold_options.length; i++) {
                var rt = filterOptions.rating_threshold_options[i];
                var opt = document.createElement('option');
                if (typeof rt.min_rating === 'number') {
                    opt.value = String(rt.min_rating);
                } else {
                    opt.value = '';
                }
                opt.textContent = rt.label || (typeof rt.min_rating === 'number' ? String(rt.min_rating) : '');
                ratingMinSelect.appendChild(opt);
            }
        }

        function populateSortOptions(selectedSort) {
            if (!sortSelect) {
                return;
            }
            sortSelect.innerHTML = '';
            if (!filterOptions || !filterOptions.sort_options || filterOptions.sort_options.length === 0) {
                var defOpt = document.createElement('option');
                defOpt.value = '';
                defOpt.textContent = 'Default';
                sortSelect.appendChild(defOpt);
                sortSelect.value = '';
                return;
            }
            for (var i = 0; i < filterOptions.sort_options.length; i++) {
                var s = filterOptions.sort_options[i];
                var opt = document.createElement('option');
                opt.value = s.value || '';
                opt.textContent = s.label || s.value || '';
                sortSelect.appendChild(opt);
            }
            if (selectedSort) {
                sortSelect.value = selectedSort;
            } else {
                sortSelect.value = filterOptions.sort_options[0].value || '';
            }
        }

        function getCategoryLabel(value) {
            if (!filterOptions || !filterOptions.categories) {
                return value;
            }
            for (var i = 0; i < filterOptions.categories.length; i++) {
                var cat = filterOptions.categories[i];
                if (cat.value === value) {
                    return cat.label || value;
                }
            }
            return value;
        }

        function getSubcategoryLabel(value) {
            if (!filterOptions || !filterOptions.subcategories) {
                return value;
            }
            for (var i = 0; i < filterOptions.subcategories.length; i++) {
                var sub = filterOptions.subcategories[i];
                if (sub.value === value) {
                    return sub.label || value;
                }
            }
            return value;
        }

        function getTrimesterLabel(value) {
            if (!filterOptions || !filterOptions.trimester_options) {
                return value;
            }
            for (var i = 0; i < filterOptions.trimester_options.length; i++) {
                var tr = filterOptions.trimester_options[i];
                if (tr.value === value) {
                    return tr.label || value;
                }
            }
            return value;
        }

        function getBabyAgeRangeLabel(value) {
            if (!filterOptions || !filterOptions.baby_age_range_options) {
                return value;
            }
            for (var i = 0; i < filterOptions.baby_age_range_options.length; i++) {
                var optData = filterOptions.baby_age_range_options[i];
                if (optData.value === value) {
                    return optData.label || value;
                }
            }
            return value;
        }

        function getRatingThresholdLabel(minRatingString) {
            if (!minRatingString) {
                return '';
            }
            var minRating = parseFloat(minRatingString);
            if (!filterOptions || !filterOptions.rating_threshold_options) {
                if (isNaN(minRating)) {
                    return '';
                }
                return 'Rating ' + minRatingString + '+';
            }
            for (var i = 0; i < filterOptions.rating_threshold_options.length; i++) {
                var rt = filterOptions.rating_threshold_options[i];
                if (typeof rt.min_rating === 'number' && !isNaN(minRating) && rt.min_rating === minRating) {
                    return rt.label || ('Rating ' + minRatingString + '+');
                }
            }
            if (isNaN(minRating)) {
                return '';
            }
            return 'Rating ' + minRatingString + '+';
        }

        function updateControlsFromParams(params, sortBy) {
            if (searchInput) {
                searchInput.value = params.query || '';
            }
            if (categorySelect) {
                categorySelect.value = params.categoryId || '';
            }
            populateSubcategoryOptions(params.categoryId || '', params.subcategory || '');
            if (trimesterSelect) {
                trimesterSelect.value = params.trimester || '';
            }
            if (babyAgeRangeSelect) {
                babyAgeRangeSelect.value = params.babyAgeRange || '';
            }
            if (ratingMinSelect) {
                ratingMinSelect.value = params.ratingMin || '';
            }
            if (sortSelect && typeof sortBy !== 'undefined') {
                sortSelect.value = sortBy || '';
            }
        }

        function renderArticleResults(container, searchResult) {
            container.innerHTML = '';
            if (!searchResult || !searchResult.results || searchResult.results.length === 0) {
                var empty = document.createElement('p');
                empty.className = 'article-results__empty';
                empty.textContent = 'No articles found. Try adjusting your search or filters.';
                container.appendChild(empty);
                return;
            }
            for (var i = 0; i < searchResult.results.length; i++) {
                var article = searchResult.results[i];
                var card = document.createElement('article');
                card.className = 'article-card';
                if (article.id) {
                    card.setAttribute('data-article-id', article.id);
                }

                var titleEl = document.createElement('h2');
                titleEl.className = 'article-card__title';
                var titleButton = document.createElement('button');
                titleButton.type = 'button';
                titleButton.className = 'article-card__title-button';
                titleButton.setAttribute('data-action', 'open-article');
                if (article.id) {
                    titleButton.setAttribute('data-article-id', article.id);
                }
                titleButton.textContent = article.title || '';
                titleEl.appendChild(titleButton);
                card.appendChild(titleEl);

                if (article.summary) {
                    var summaryEl = document.createElement('p');
                    summaryEl.className = 'article-card__summary';
                    summaryEl.textContent = article.summary;
                    card.appendChild(summaryEl);
                }

                var metaEl = document.createElement('div');
                metaEl.className = 'article-card__meta';
                var metaParts = [];
                if (article.category) {
                    if (article.category === 'pregnancy') {
                        metaParts.push('Pregnancy');
                    } else if (article.category === 'baby') {
                        metaParts.push('Baby');
                    } else {
                        metaParts.push(article.category);
                    }
                }
                if (article.trimester) {
                    var trLabel = getTrimesterLabel(article.trimester);
                    if (trLabel) {
                        metaParts.push(trLabel);
                    }
                }
                if (article.baby_age_range) {
                    var ageLabel = getBabyAgeRangeLabel(article.baby_age_range);
                    if (ageLabel) {
                        metaParts.push(ageLabel);
                    }
                }
                if (typeof article.rating === 'number') {
                    var ratingText = article.rating.toFixed(1);
                    if (typeof article.rating_count === 'number') {
                        ratingText += ' (' + article.rating_count + ' reviews)';
                    } else {
                        ratingText += ' rating';
                    }
                    metaParts.push(ratingText);
                }
                metaEl.textContent = metaParts.join(' · ');
                card.appendChild(metaEl);

                container.appendChild(card);
            }
        }

        function renderPagination(container, searchResult) {
            container.innerHTML = '';
            if (!searchResult || !searchResult.total_results || searchResult.total_results <= searchResult.page_size) {
                return;
            }
            var totalPages = Math.ceil(searchResult.total_results / searchResult.page_size);
            var currentPage = searchResult.page || 1;
            if (totalPages <= 1) {
                return;
            }
            var wrapper = document.createElement('div');
            wrapper.className = 'pagination__inner';

            var prevButton = document.createElement('button');
            prevButton.type = 'button';
            prevButton.className = 'pagination__button pagination__button--prev';
            prevButton.textContent = 'Previous';
            prevButton.setAttribute('data-action', 'change-page');
            prevButton.setAttribute('data-page', String(Math.max(1, currentPage - 1)));
            if (currentPage <= 1) {
                prevButton.disabled = true;
            }
            wrapper.appendChild(prevButton);

            var maxButtons = 5;
            var startPage = Math.max(1, currentPage - 2);
            var endPage = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage < maxButtons - 1) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }
            for (var p = startPage; p <= endPage; p++) {
                var pageBtn = document.createElement('button');
                pageBtn.type = 'button';
                pageBtn.className = 'pagination__button pagination__button--page';
                if (p === currentPage) {
                    pageBtn.className += ' pagination__button--current';
                }
                pageBtn.textContent = String(p);
                pageBtn.setAttribute('data-action', 'change-page');
                pageBtn.setAttribute('data-page', String(p));
                wrapper.appendChild(pageBtn);
            }

            var nextButton = document.createElement('button');
            nextButton.type = 'button';
            nextButton.className = 'pagination__button pagination__button--next';
            nextButton.textContent = 'Next';
            nextButton.setAttribute('data-action', 'change-page');
            nextButton.setAttribute('data-page', String(Math.min(totalPages, currentPage + 1)));
            if (currentPage >= totalPages) {
                nextButton.disabled = true;
            }
            wrapper.appendChild(nextButton);

            container.appendChild(wrapper);
        }

        function renderActiveFilters(container, params) {
            container.innerHTML = '';
            var hasAny = false;
            var chipsWrapper = document.createElement('div');
            chipsWrapper.className = 'active-filters__chips';

            function addChip(label, key) {
                if (!label) {
                    return;
                }
                var chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'filter-chip';
                chip.setAttribute('data-action', 'remove-filter');
                chip.setAttribute('data-filter-key', key);
                chip.textContent = label + ' ␀d7';
                chipsWrapper.appendChild(chip);
                hasAny = true;
            }

            if (params.query) {
                addChip('Search: ' + '"' + params.query + '"', 'query');
            }
            if (params.categoryId) {
                addChip(getCategoryLabel(params.categoryId), 'categoryId');
            }
            if (params.subcategory) {
                addChip(getSubcategoryLabel(params.subcategory), 'subcategory');
            }
            if (params.trimester) {
                addChip(getTrimesterLabel(params.trimester), 'trimester');
            }
            if (params.babyAgeRange) {
                addChip(getBabyAgeRangeLabel(params.babyAgeRange), 'babyAgeRange');
            }
            if (params.ratingMin) {
                addChip(getRatingThresholdLabel(params.ratingMin), 'ratingMin');
            }

            if (!hasAny) {
                var none = document.createElement('p');
                none.className = 'active-filters__none';
                none.textContent = 'No filters applied.';
                container.appendChild(none);
                return;
            }

            container.appendChild(chipsWrapper);

            var clearAll = document.createElement('button');
            clearAll.type = 'button';
            clearAll.className = 'active-filters__clear-all';
            clearAll.setAttribute('data-action', 'clear-all-filters');
            clearAll.textContent = 'Clear all';
            container.appendChild(clearAll);
        }

        function updateUrlParams(updates, options) {
            var url = new URL(window.location.href);
            var params = url.searchParams;
            for (var key in updates) {
                if (!Object.prototype.hasOwnProperty.call(updates, key)) {
                    continue;
                }
                var value = updates[key];
                if (value === null || typeof value === 'undefined' || value === '') {
                    params.delete(key);
                } else {
                    params.set(key, String(value));
                }
            }
            url.search = params.toString();
            if (options && options.replace) {
                window.history.replaceState({}, '', url.toString());
            } else {
                window.history.pushState({}, '', url.toString());
            }
            syncStateAndSearch();
        }

        function syncStateAndSearch() {
            var params = readUrlParams();

            if (!filterOptions) {
                try {
                    filterOptions = WebsiteSDK.getArticleFilterOptions();
                } catch (err) {
                    console.error('Failed to load article filter options', err);
                    if (resultsContainer) {
                        resultsContainer.innerHTML = '<p class="article-results__error">There was a problem loading articles. Please try again.</p>';
                    }
                    return;
                }
                populateCategoryOptions();
                populateTrimesterOptions();
                populateBabyAgeRangeOptions();
                populateRatingThresholdOptions();
                var initialSort = getValidSortValue(params.sortBy);
                populateSortOptions(initialSort);
            }

            if (!params.categoryId && params.subcategory && filterOptions && filterOptions.subcategories) {
                var inferred = null;
                for (var i = 0; i < filterOptions.subcategories.length; i++) {
                    var sub = filterOptions.subcategories[i];
                    if (sub.value === params.subcategory && sub.category_value) {
                        inferred = sub.category_value;
                        break;
                    }
                }
                if (inferred) {
                    var url = new URL(window.location.href);
                    url.searchParams.set('categoryId', inferred);
                    window.history.replaceState({}, '', url.toString());
                    params.categoryId = inferred;
                }
            }

            var sortBy = getValidSortValue(params.sortBy);
            updateControlsFromParams(params, sortBy);

            var filters = buildFiltersFromParams(params);
            var filtersArg = filters;
            if (!filtersArg || Object.keys(filtersArg).length === 0) {
                filtersArg = undefined;
            }

            var query = params.query || '';

            if (resultsContainer) {
                resultsContainer.innerHTML = '<p class="article-results__loading">Loading articles...</p>';
            }

            var searchResult;
            try {
                searchResult = WebsiteSDK.searchArticles(query, filtersArg, sortBy, params.page, PAGE_SIZE);
                lastSearchResult = searchResult;
            } catch (err2) {
                console.error('Failed to load articles', err2);
                if (resultsContainer) {
                    resultsContainer.innerHTML = '<p class="article-results__error">There was a problem loading articles. Please try again.</p>';
                }
                if (paginationContainer) {
                    paginationContainer.innerHTML = '';
                }
                return;
            }

            if (activeFiltersContainer) {
                renderActiveFilters(activeFiltersContainer, params);
            }
            if (resultsContainer) {
                renderArticleResults(resultsContainer, searchResult);
            }
            if (paginationContainer) {
                renderPagination(paginationContainer, searchResult);
            }
        }

        function setupEventHandlers() {
            if (searchForm && searchInput) {
                searchForm.addEventListener('submit', function(event) {
                    event.preventDefault();
                    var value = searchInput.value ? searchInput.value.trim() : '';
                    updateUrlParams({ query: value || null, page: 1 });
                });
            }

            if (categorySelect) {
                categorySelect.addEventListener('change', function() {
                    var newCategory = categorySelect.value;
                    populateSubcategoryOptions(newCategory, '');
                    updateUrlParams({ categoryId: newCategory || null, subcategory: null, page: 1 });
                });
            }

            if (subcategorySelect) {
                subcategorySelect.addEventListener('change', function() {
                    var sub = subcategorySelect.value;
                    updateUrlParams({ subcategory: sub || null, page: 1 });
                });
            }

            if (trimesterSelect) {
                trimesterSelect.addEventListener('change', function() {
                    var value = trimesterSelect.value;
                    updateUrlParams({ trimester: value || null, page: 1 });
                });
            }

            if (babyAgeRangeSelect) {
                babyAgeRangeSelect.addEventListener('change', function() {
                    var value = babyAgeRangeSelect.value;
                    updateUrlParams({ babyAgeRange: value || null, page: 1 });
                });
            }

            if (ratingMinSelect) {
                ratingMinSelect.addEventListener('change', function() {
                    var value = ratingMinSelect.value;
                    updateUrlParams({ ratingMin: value || null, page: 1 });
                });
            }

            if (clearPregnancyFiltersButton) {
                clearPregnancyFiltersButton.addEventListener('click', function() {
                    if (trimesterSelect) {
                        trimesterSelect.value = '';
                    }
                    if (babyAgeRangeSelect) {
                        babyAgeRangeSelect.value = '';
                    }
                    if (ratingMinSelect) {
                        ratingMinSelect.value = '';
                    }
                    updateUrlParams({ trimester: null, babyAgeRange: null, ratingMin: null, page: 1 });
                });
            }

            if (sortSelect) {
                sortSelect.addEventListener('change', function() {
                    var sortBy = sortSelect.value;
                    updateUrlParams({ sortBy: sortBy || null, page: 1 });
                });
            }

            if (resultsContainer) {
                resultsContainer.addEventListener('click', function(event) {
                    var target = event.target;
                    if (!target) {
                        return;
                    }
                    var action = target.getAttribute('data-action');
                    if (action === 'open-article') {
                        var articleId = target.getAttribute('data-article-id');
                        if (articleId) {
                            window.location.href = 'article.html?id=' + encodeURIComponent(articleId);
                        }
                    }
                });
            }

            if (activeFiltersContainer) {
                activeFiltersContainer.addEventListener('click', function(event) {
                    var target = event.target;
                    if (!target) {
                        return;
                    }
                    var action = target.getAttribute('data-action');
                    if (action === 'remove-filter') {
                        var key = target.getAttribute('data-filter-key');
                        if (key) {
                            var updates = { page: 1 };
                            updates[key] = null;
                            updateUrlParams(updates);
                        }
                    } else if (action === 'clear-all-filters') {
                        updateUrlParams({
                            query: null,
                            categoryId: null,
                            subcategory: null,
                            trimester: null,
                            babyAgeRange: null,
                            ratingMin: null,
                            sortBy: null,
                            page: 1
                        });
                    }
                });
            }

            if (paginationContainer) {
                paginationContainer.addEventListener('click', function(event) {
                    var target = event.target;
                    if (!target) {
                        return;
                    }
                    var action = target.getAttribute('data-action');
                    if (action === 'change-page') {
                        var pageStr = target.getAttribute('data-page');
                        var page = parseInt(pageStr, 10);
                        if (!isNaN(page) && page > 0) {
                            updateUrlParams({ page: page });
                        }
                    }
                });
            }
        }

        try {
            filterOptions = WebsiteSDK.getArticleFilterOptions();
        } catch (errInit) {
            console.error('Failed to load article filter options', errInit);
            filterOptions = {
                categories: [],
                subcategories: [],
                trimester_options: [],
                baby_age_range_options: [],
                rating_threshold_options: [],
                sort_options: []
            };
        }

        populateCategoryOptions();
        populateTrimesterOptions();
        populateBabyAgeRangeOptions();
        populateRatingThresholdOptions();
        var initialParams = readUrlParams();
        var initialSort = getValidSortValue(initialParams.sortBy);
        populateSortOptions(initialSort);

        setupEventHandlers();
        syncStateAndSearch();

        window.addEventListener('popstate', function() {
            syncStateAndSearch();
        });

        var yearSpan = document.querySelector('[data-year]');
        if (yearSpan) {
            yearSpan.textContent = String(new Date().getFullYear());
        }
    });
    </script>
</body>
</html>
