<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product Comparison – Pregnancy Must</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="framework.css" />
    <link rel="stylesheet" href="product_compare.css" />
</head>
<body>
    <header class="site-header">
        <div class="brand-bar">
            <div class="brand-bar__inner container">
                <a href="index.html" class="site-logo" aria-label="Pregnancy Must home">
                    <span class="site-logo__primary">Pregnancy</span>
                    <span class="site-logo__secondary">Must</span>
                </a>

                <nav class="primary-nav" aria-label="Primary">
                    <ul class="primary-nav__list">
                        <li class="primary-nav__item">
                            <a href="index.html" class="primary-nav__link">Home</a>
                        </li>
                        <li class="primary-nav__item primary-nav__item--has-caret">
                            <a href="articles.html?categoryId=pregnancy" class="primary-nav__link">Pregnancy</a>
                        </li>
                        <li class="primary-nav__item primary-nav__item--has-caret">
                            <a href="articles.html?categoryId=baby" class="primary-nav__link">Baby</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="products.html?categoryId=all_products" class="primary-nav__link">Products</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="tools.html" class="primary-nav__link">Tools</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="community.html" class="primary-nav__link">Community</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="newsletter.html" class="primary-nav__link">Newsletter</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="reading_list.html" class="primary-nav__link">Reading list</a>
                        </li>
                    </ul>
                </nav>

                <div class="header-utilities">
                    <div class="header-follow" aria-hidden="true">
                        <span class="header-follow__label">Follow Us</span>
                        <span class="header-follow__caret">&#9662;</span>
                    </div>
                    <span class="header-search-icon" role="img" aria-label="Search icon">&#128269;</span>
                </div>
            </div>
        </div>
    </header>

    <main id="content" class="site-main container" role="main">
        <section class="product-compare-page" data-component="comparison-page-controller">
            <!-- Back to products link -->
            <a href="javascript:void(0)" class="back-link" data-component="back-to-products-link" data-action="back-to-products">
                <span class="back-link__icon" aria-hidden="true">&#8592;</span>
                <span class="back-link__label">Back to products</span>
            </a>

            <!-- Header + controls card -->
            <section class="comparison-card card">
                <div class="comparison-card__header" data-component="comparison-header" data-populate="comparison-header" aria-live="polite">
                    <!-- Filled by JS -->
                </div>
                <div class="comparison-card__controls" data-component="comparison-controls" data-populate="comparison-controls">
                    <!-- Filled by JS -->
                </div>
            </section>

            <!-- Main comparison body -->
            <section class="comparison-body">
                <div class="comparison-table-wrapper" data-component="comparison-table" data-populate="comparison-table" aria-live="polite">
                    <!-- Table rendered by JS -->
                </div>

                <div class="comparison-empty-state" data-component="empty-comparison-state" data-populate="empty-comparison-state" hidden>
                    <!-- Empty state rendered by JS -->
                </div>
            </section>
        </section>
    </main>

    <footer class="site-footer">
        <div class="site-footer__inner container">
            <nav class="footer-nav" aria-label="Footer">
                <a href="about.html" class="footer-nav__link">About</a>
                <a href="community.html" class="footer-nav__link">Community</a>
                <a href="newsletter.html" class="footer-nav__link">Newsletter signup</a>
                <a href="privacy.html" class="footer-nav__link">Privacy &amp; policies</a>
            </nav>
            <div class="site-footer__meta">
                <p class="site-footer__copyright">&copy; <span data-year></span> Pregnancy Must. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Footer year
        var yearSpan = document.querySelector('[data-year]');
        if (yearSpan) {
            yearSpan.textContent = String(new Date().getFullYear());
        }

        // URL parameters
        var url = new URL(window.location.href);
        var urlParams = url.searchParams;
        var returnTo = urlParams.get('returnTo');
        var showDiffOnlyParam = urlParams.get('showDiffOnly');
        var focusProductId = urlParams.get('focusProductId');

        var state = {
            comparisonSet: null,
            items: [],
            products: [],
            orderedProducts: [],
            showDiffOnly: showDiffOnlyParam === '1',
            focusProductId: focusProductId || null,
            returnTo: returnTo || null
        };

        function navigateBackToProducts() {
            if (state.returnTo) {
                window.location.href = state.returnTo;
            } else {
                window.location.href = 'products.html';
            }
        }

        function formatCurrencyUSD(value) {
            if (typeof value !== 'number') return '—';
            try {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0 }).format(value);
            } catch (e) {
                return '$' + value.toFixed(2);
            }
        }

        function buildAttributeRows(products) {
            var rows = [];
            if (!Array.isArray(products) || products.length === 0) {
                return rows;
            }

            function allSame(values) {
                if (!values.length) return true;
                var first = values[0];
                for (var i = 1; i < values.length; i++) {
                    if (values[i] !== first) return false;
                }
                return true;
            }

            // Overview group
            // Price
            var priceValues = products.map(function(p) {
                return typeof p.price === 'number' ? p.price : null;
            });
            rows.push({
                key: 'price',
                label: 'Price',
                group: 'Overview',
                values: priceValues.map(formatCurrencyUSD),
                allSame: allSame(priceValues.map(function(v) { return v === null ? 'n/a' : String(v); }))
            });

            // Rating
            var ratingValuesRaw = products.map(function(p) { return typeof p.rating === 'number' ? p.rating : null; });
            var ratingValuesDisplay = ratingValuesRaw.map(function(r) {
                if (r === null) return 'Not yet rated';
                return r.toFixed(1) + ' / 5';
            });
            rows.push({
                key: 'rating',
                label: 'Average rating',
                group: 'Overview',
                values: ratingValuesDisplay,
                allSame: allSame(ratingValuesRaw.map(function(v) { return v === null ? 'n/a' : String(v.toFixed(1)); }))
            });

            // Rating count
            var ratingCountRaw = products.map(function(p) { return typeof p.rating_count === 'number' ? p.rating_count : 0; });
            var ratingCountDisplay = ratingCountRaw.map(function(c) {
                if (!c) return 'No reviews';
                if (c === 1) return '1 review';
                return String(c) + ' reviews';
            });
            rows.push({
                key: 'rating_count',
                label: 'Reviews',
                group: 'Overview',
                values: ratingCountDisplay,
                allSame: allSame(ratingCountRaw.map(function(v) { return String(v); }))
            });

            // Availability
            var availabilityRaw = products.map(function(p) { return !!p.is_available; });
            var availabilityDisplay = availabilityRaw.map(function(v) { return v ? 'In stock' : 'Out of stock'; });
            rows.push({
                key: 'is_available',
                label: 'Availability',
                group: 'Overview',
                values: availabilityDisplay,
                allSame: allSame(availabilityRaw.map(function(v) { return v ? '1' : '0'; }))
            });

            // Product type
            var typeRaw = products.map(function(p) { return p.product_type || ''; });
            var typeDisplay = typeRaw.map(function(v) {
                if (!v) return '—';
                return v.replace(/_/g, ' ');
            });
            rows.push({
                key: 'product_type',
                label: 'Product type',
                group: 'Overview',
                values: typeDisplay,
                allSame: allSame(typeRaw)
            });

            // Features group
            var featureSet = [];
            var featureLookup = {};
            products.forEach(function(p) {
                if (Array.isArray(p.features)) {
                    p.features.forEach(function(f) {
                        if (typeof f !== 'string') return;
                        var trimmed = f.trim();
                        if (!trimmed) return;
                        if (!featureLookup[trimmed]) {
                            featureLookup[trimmed] = true;
                            featureSet.push(trimmed);
                        }
                    });
                }
            });

            featureSet.sort(function(a, b) { return a.localeCompare(b); });

            featureSet.forEach(function(featureLabel) {
                var featureValuesRaw = products.map(function(p) {
                    if (!Array.isArray(p.features)) return false;
                    return p.features.indexOf(featureLabel) !== -1;
                });
                var featureValuesDisplay = featureValuesRaw.map(function(has) { return has ? 'Included' : 'Not included'; });
                rows.push({
                    key: 'feature_' + featureLabel,
                    label: featureLabel,
                    group: 'Features',
                    values: featureValuesDisplay,
                    allSame: allSame(featureValuesRaw.map(function(v) { return v ? '1' : '0'; }))
                });
            });

            return rows;
        }

        function renderComparisonHeader(container, stateObj) {
            if (!container) return;
            var count = Array.isArray(stateObj.orderedProducts) ? stateObj.orderedProducts.length : 0;
            var titleText = 'Product comparison';
            var summaryText = '';

            if (count === 0) {
                summaryText = 'No products are currently selected for comparison.';
            } else if (count === 1) {
                summaryText = 'Comparing 1 product. Add more from the product list to see differences side by side.';
            } else {
                summaryText = 'Comparing ' + String(count) + ' products side by side.';
            }

            container.innerHTML = '' +
                '<div class="comparison-header__content">' +
                    '<div class="comparison-header__titles">' +
                        '<h1 id="comparison-title" class="comparison-header__title">' + titleText + '</h1>' +
                        '<p class="comparison-header__summary">' + summaryText + '</p>' +
                    '</div>' +
                    '<div class="comparison-header__meta">' +
                        '<p class="comparison-header__count">' + String(count) + ' product' + (count === 1 ? '' : 's') + ' selected</p>' +
                    '</div>' +
                '</div>';
        }

        function renderComparisonControls(container, stateObj) {
            if (!container) return;
            var checkedAttr = stateObj.showDiffOnly ? ' checked' : '';

            container.innerHTML = '' +
                '<div class="comparison-controls__inner">' +
                    '<label class="comparison-controls__toggle">' +
                        '<input type="checkbox" class="comparison-controls__checkbox" data-action="toggle-show-diff"' + checkedAttr + ' />' +
                        '<span class="comparison-controls__label">Show only differences</span>' +
                    '</label>' +
                    '<div class="comparison-controls__hint">' +
                        '<span class="comparison-controls__hint-text">Hide rows where all products share the same value.</span>' +
                    '</div>' +
                '</div>';

            var checkbox = container.querySelector('[data-action="toggle-show-diff"]');
            if (checkbox) {
                checkbox.addEventListener('change', function(event) {
                    state.showDiffOnly = !!event.target.checked;
                    var currentUrl = new URL(window.location.href);
                    currentUrl.searchParams.set('showDiffOnly', state.showDiffOnly ? '1' : '0');
                    window.history.replaceState(null, '', currentUrl.toString());
                    renderComparisonControls(container, state);
                    var tableContainer = document.querySelector('[data-populate="comparison-table"]');
                    renderComparisonTable(tableContainer, state);
                });
            }
        }

        function renderEmptyState(container, stateObj) {
            if (!container) return;
            var hasProducts = Array.isArray(stateObj.orderedProducts) && stateObj.orderedProducts.length > 0;
            if (hasProducts) {
                container.hidden = true;
                container.innerHTML = '';
                return;
            }

            container.hidden = false;
            container.innerHTML = '' +
                '<div class="empty-state-card card">' +
                    '<h2 class="empty-state-card__title">No products to compare yet</h2>' +
                    '<p class="empty-state-card__body">Select products from the list and use the comparison feature to see price, ratings, availability, and key features side by side.</p>' +
                    '<a href="javascript:void(0)" class="btn btn-primary empty-state-card__cta" data-action="back-to-products-empty">' +
                        '<span class="btn-label">Browse products</span>' +
                        '<span class="btn-icon" aria-hidden="true">&#8594;</span>' +
                    '</a>' +
                '</div>';

            var backEmpty = container.querySelector('[data-action="back-to-products-empty"]');
            if (backEmpty) {
                backEmpty.addEventListener('click', function() {
                    navigateBackToProducts();
                });
            }
        }

        function renderComparisonTable(container, stateObj) {
            if (!container) return;
            var products = Array.isArray(stateObj.orderedProducts) ? stateObj.orderedProducts : [];
            if (!products.length) {
                container.hidden = true;
                container.innerHTML = '';
                var emptyContainer = document.querySelector('[data-populate="empty-comparison-state"]');
                renderEmptyState(emptyContainer, stateObj);
                return;
            }

            container.hidden = false;
            var emptyContainerVisible = document.querySelector('[data-populate="empty-comparison-state"]');
            if (emptyContainerVisible) {
                emptyContainerVisible.hidden = true;
            }

            var rows = buildAttributeRows(products);

            var html = '';
            html += '<div class="comparison-table" role="table" aria-describedby="comparison-title">';

            // Header row
            html += '<div class="comparison-table__row comparison-table__row--header" role="row">';
            html += '<div class="comparison-table__cell comparison-table__cell--attribute" role="columnheader"></div>';

            products.forEach(function(product) {
                var isFocused = stateObj.focusProductId && String(stateObj.focusProductId) === String(product.id);
                var columnClasses = 'comparison-product-column';
                if (isFocused) {
                    columnClasses += ' comparison-product-column--focused';
                }
                var imageHtml = '';
                if (product.image_url) {
                    imageHtml = '<img src="' + product.image_url + '" alt="' + product.name.replace(/"/g, '&quot;') + '" class="comparison-product-column__image" />';
                } else {
                    imageHtml = '<div class="comparison-product-column__image comparison-product-column__image--placeholder" aria-hidden="true"></div>';
                }
                var productDetailHref = 'product.html?id=' + encodeURIComponent(product.id);

                html += '<div class="comparison-table__cell comparison-table__cell--product" role="columnheader">';
                html += '  <div class="' + columnClasses + '" data-product-id="' + String(product.id) + '">';
                html += '    <button type="button" class="comparison-product-column__remove" data-action="remove-product" data-product-id="' + String(product.id) + '" aria-label="Remove ' + product.name.replace(/"/g, '&quot;') + ' from comparison">&times;</button>';
                html += '    <a href="' + productDetailHref + '" class="comparison-product-column__image-link">' + imageHtml + '</a>';
                html += '    <a href="' + productDetailHref + '" class="comparison-product-column__name">' + product.name + '</a>';
                html += '    <div class="comparison-product-column__meta">';
                html += '      <span class="comparison-product-column__price">' + formatCurrencyUSD(product.price) + '</span>';
                if (typeof product.rating === 'number') {
                    html += '      <span class="comparison-product-column__rating">' + product.rating.toFixed(1) + ' / 5</span>';
                } else {
                    html += '      <span class="comparison-product-column__rating comparison-product-column__rating--muted">Not yet rated</span>';
                }
                html += '    </div>';
                html += '  </div>';
                html += '</div>';
            });

            html += '</div>'; // end header row

            // Attribute rows
            var currentGroup = null;
            rows.forEach(function(row) {
                var hideRow = stateObj.showDiffOnly && row.allSame;
                var rowClasses = 'comparison-table__row comparison-table__row--body';
                if (row.allSame) {
                    rowClasses += ' comparison-table__row--all-same';
                } else {
                    rowClasses += ' comparison-table__row--different';
                }

                if (row.group && row.group !== currentGroup) {
                    currentGroup = row.group;
                    html += '<div class="comparison-table__group-heading" role="rowgroup">' +
                            '<div class="comparison-table__group-label">' + currentGroup + '</div>' +
                        '</div>';
                }

                if (hideRow) {
                    return;
                }

                html += '<div class="' + rowClasses + '" role="row">';
                html += '  <div class="comparison-table__cell comparison-table__cell--attribute" role="rowheader">' + row.label + '</div>';
                row.values.forEach(function(value) {
                    html += '  <div class="comparison-table__cell comparison-table__cell--value" role="cell">' + value + '</div>';
                });
                html += '</div>';
            });

            html += '</div>'; // end comparison-table

            container.innerHTML = html;

            // Bind remove-product actions
            var removeButtons = container.querySelectorAll('[data-action="remove-product"]');
            removeButtons.forEach(function(btn) {
                btn.addEventListener('click', function(event) {
                    var productId = event.currentTarget.getAttribute('data-product-id');
                    if (!productId) return;
                    try {
                        var result = WebsiteSDK.removeProductFromComparison(productId);
                        if (result && result.success) {
                            var refreshed = WebsiteSDK.getActiveProductComparison();
                            if (refreshed) {
                                state.comparisonSet = refreshed.comparison_set || null;
                                state.items = Array.isArray(refreshed.items) ? refreshed.items : [];
                                state.products = Array.isArray(refreshed.products) ? refreshed.products : [];

                                var productMap = {};
                                state.products.forEach(function(p) { productMap[p.id] = p; });
                                state.orderedProducts = state.items.map(function(item) { return productMap[item.product_id]; }).filter(function(p) { return !!p; });

                                var headerContainer = document.querySelector('[data-populate="comparison-header"]');
                                renderComparisonHeader(headerContainer, state);
                                var controlsContainer = document.querySelector('[data-populate="comparison-controls"]');
                                renderComparisonControls(controlsContainer, state);
                                var tableContainer = document.querySelector('[data-populate="comparison-table"]');
                                renderComparisonTable(tableContainer, state);
                                var emptyContainer = document.querySelector('[data-populate="empty-comparison-state"]');
                                renderEmptyState(emptyContainer, state);
                            }
                        } else {
                            window.alert(result && result.message ? result.message : 'Could not remove product from comparison. Please try again.');
                        }
                    } catch (e) {
                        console.error('removeProductFromComparison error', e);
                        window.alert('Something went wrong while updating your comparison. Please try again.');
                    }
                });
            });

            // Scroll focused column into view if applicable
            if (stateObj.focusProductId) {
                var focusedEl = container.querySelector('.comparison-product-column--focused');
                if (focusedEl && typeof focusedEl.scrollIntoView === 'function') {
                    focusedEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }
        }

        function initializeBackLinks() {
            var backLink = document.querySelector('[data-action="back-to-products"]');
            if (backLink) {
                backLink.addEventListener('click', function(event) {
                    event.preventDefault();
                    navigateBackToProducts();
                });
            }
        }

        function initializeComparisonPage() {
            initializeBackLinks();

            var result;
            try {
                result = WebsiteSDK.getActiveProductComparison();
            } catch (e) {
                console.error('getActiveProductComparison error', e);
                result = null;
            }

            if (result) {
                state.comparisonSet = result.comparison_set || null;
                state.items = Array.isArray(result.items) ? result.items : [];
                state.products = Array.isArray(result.products) ? result.products : [];

                var productMap = {};
                state.products.forEach(function(p) { productMap[p.id] = p; });
                state.orderedProducts = state.items.map(function(item) { return productMap[item.product_id]; }).filter(function(p) { return !!p; });
            } else {
                state.comparisonSet = null;
                state.items = [];
                state.products = [];
                state.orderedProducts = [];
            }

            var headerContainer = document.querySelector('[data-populate="comparison-header"]');
            renderComparisonHeader(headerContainer, state);

            var controlsContainer = document.querySelector('[data-populate="comparison-controls"]');
            renderComparisonControls(controlsContainer, state);

            var tableContainer = document.querySelector('[data-populate="comparison-table"]');
            renderComparisonTable(tableContainer, state);

            var emptyContainer = document.querySelector('[data-populate="empty-comparison-state"]');
            renderEmptyState(emptyContainer, state);
        }

        initializeComparisonPage();
    });
    </script>
</body>
</html>
