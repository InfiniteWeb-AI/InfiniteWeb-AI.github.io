<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pregnancy &amp; Baby Care – Site Framework</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="framework.css" />
    <link rel="stylesheet" href="about.css" />
</head>
<body>
    <header class="site-header">
        <div class="brand-bar">
            <div class="brand-bar__inner container">
                <a href="index.html" class="site-logo" aria-label="Pregnancy Must home">
                    <span class="site-logo__primary">Pregnancy</span>
                    <span class="site-logo__secondary">Must</span>
                </a>

                <nav class="primary-nav" aria-label="Primary">
                    <ul class="primary-nav__list">
                        <li class="primary-nav__item">
                            <a href="index.html" class="primary-nav__link">Home</a>
                        </li>
                        <li class="primary-nav__item primary-nav__item--has-caret">
                            <a href="articles.html?categoryId=pregnancy" class="primary-nav__link">Pregnancy</a>
                        </li>
                        <li class="primary-nav__item primary-nav__item--has-caret">
                            <a href="articles.html?categoryId=baby" class="primary-nav__link">Baby</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="products.html?categoryId=all_products" class="primary-nav__link">Products</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="tools.html" class="primary-nav__link">Tools</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="community.html" class="primary-nav__link">Community</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="newsletter.html" class="primary-nav__link">Newsletter</a>
                        </li>
                        <li class="primary-nav__item">
                            <a href="reading_list.html" class="primary-nav__link">Reading list</a>
                        </li>
                    </ul>
                </nav>

                <div class="header-utilities">
                    <div class="header-follow" aria-hidden="true">
                        <span class="header-follow__label">Follow Us</span>
                        <span class="header-follow__caret">&#9662;</span>
                    </div>
                    <span class="header-search-icon" role="img" aria-label="Search icon">&#128269;</span>
                </div>
            </div>
        </div>
    </header>

    <main id="content" class="site-main container" role="main">
        <section class="about-page" data-page="about">
            <div class="about-page__inner">
                <!-- In-page section navigation card -->
                <section class="about-section-nav card" data-component="in-page-section-nav" aria-label="On this page">
                    <div class="card-header">
                        <h2 class="section-nav__title" data-populate="config.sectionNavTitle"></h2>
                    </div>
                    <div class="card-body">
                        <div class="section-nav__list">
                            <!-- Section navigation items will be injected here -->
                        </div>
                    </div>
                </section>

                <!-- Loader / Error / Content stack -->
                <div class="about-main">
                    <!-- Loader state -->
                    <section class="about-loader card" data-component="informational-page-loader" aria-live="polite">
                        <div class="about-loader__inner">
                            <div class="about-loader__spinner" aria-hidden="true"></div>
                            <p class="about-loader__text">Loading About informationf23</p>
                        </div>
                    </section>

                    <!-- Error state -->
                    <section class="about-error card" data-component="error-state-display" hidden>
                        <div class="about-error__inner">
                            <h2 class="about-error__title">Unable to load this page</h2>
                            <p class="about-error__message" data-populate="config.errorMessage"></p>
                            <button type="button" class="btn btn-primary about-error__retry" data-action="retry-load">
                                <span class="btn-label" data-populate="config.retryLabel"></span>
                                <span class="btn-icon" aria-hidden="true">3b</span>
                            </button>
                        </div>
                    </section>

                    <!-- About content -->
                    <article class="about-article" data-component="about-content-viewer" hidden>
                        <header class="about-article__header">
                            <h1 class="about-article__title" data-populate="informational.title"></h1>
                            <div class="about-article__meta">
                                <!-- Last updated indicator -->
                                <div class="about-last-updated" data-component="last-updated-indicator">
                                    <span class="about-last-updated__label">Last updated</span>
                                    <time class="about-last-updated__value" data-populate="informational.last_updated"></time>
                                </div>

                                <!-- View mode controller -->
                                <div class="about-view-mode" data-component="view-mode-controller" aria-label="View options">
                                    <div class="view-mode-toggle-group" role="radiogroup" aria-label="View mode">
                                        <button type="button" class="view-mode-toggle view-mode-toggle--default" data-action="toggle-view" data-view-mode="default" aria-pressed="true">
                                            Standard view
                                        </button>
                                        <button type="button" class="view-mode-toggle view-mode-toggle--print" data-action="toggle-view" data-view-mode="print" aria-pressed="false">
                                            Print view
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </header>

                        <section class="about-article__body" data-populate="informational.body_html">
                            <!-- Rich About content HTML from getInformationalPage.body_html will be injected here -->
                        </section>
                    </article>

                    <!-- Privacy link at bottom -->
                    <div class="about-privacy-link" data-component="privacy-link">
                        <a href="privacy.html" class="about-privacy-link__anchor" data-populate="config.privacyLinkLabel"></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="site-footer__inner container">
            <nav class="footer-nav" aria-label="Footer">
                <a href="about.html" class="footer-nav__link">About</a>
                <a href="community.html" class="footer-nav__link">Community</a>
                <a href="newsletter.html" class="footer-nav__link">Newsletter signup</a>
                <a href="privacy.html" class="footer-nav__link">Privacy &amp; policies</a>
            </nav>
            <div class="site-footer__meta">
                <p class="site-footer__copyright">&copy; <span data-year></span> Pregnancy Must. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- URL parameter handling ---
        let urlParams = new URLSearchParams(window.location.search);
        let currentSectionParam = urlParams.get('section') || null;
        let currentViewParam = urlParams.get('view') || 'default';

        // --- App-level configuration ---
        const AppConfig = {
            pageCode: 'about',
            errorMessage: 'We\'re sorry, something went wrong while loading this page. Please try again.',
            retryLabel: 'Retry',
            sectionNavTitle: 'Explore this page',
            privacyLinkLabel: 'Privacy &amp; policies'
        };

        // --- Core DOM references ---
        const aboutPageEl = document.querySelector('.about-page');
        const loaderEl = document.querySelector('[data-component="informational-page-loader"]');
        const errorEl = document.querySelector('[data-component="error-state-display"]');
        const articleEl = document.querySelector('[data-component="about-content-viewer"]');
        const sectionNavEl = document.querySelector('[data-component="in-page-section-nav"]');
        const bodyContainerEl = document.querySelector('[data-populate="informational.body_html"]');
        const lastUpdatedEl = document.querySelector('[data-populate="informational.last_updated"]');
        const titleEl = document.querySelector('[data-populate="informational.title"]');

        // --- Helper: populate config-driven text ---
        const configPopulateEls = document.querySelectorAll('[data-populate^="config."]');
        configPopulateEls.forEach(function(el) {
            const key = el.dataset.populate.split('.')[1];
            if (!key) return;
            if (Object.prototype.hasOwnProperty.call(AppConfig, key)) {
                el.innerHTML = AppConfig[key];
            }
        });

        // --- View mode handling ---
        function applyViewModeClass(view) {
            if (!aboutPageEl) return;
            if (view === 'print') {
                aboutPageEl.classList.add('about-page--print');
            } else {
                aboutPageEl.classList.remove('about-page--print');
            }
        }

        function updateViewModeButtons(view) {
            const buttons = document.querySelectorAll('[data-action="toggle-view"]');
            buttons.forEach(function(btn) {
                const mode = btn.dataset.viewMode || 'default';
                const isActive = mode === view;
                btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
            });
        }

        function setViewMode(view) {
            const nextView = view === 'print' ? 'print' : 'default';
            currentViewParam = nextView;

            // Update URL without reloading
            const params = new URLSearchParams(window.location.search);
            if (nextView === 'default') {
                params.delete('view');
            } else {
                params.set('view', nextView);
            }
            const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
            window.history.replaceState({}, '', newUrl);

            applyViewModeClass(nextView);
            updateViewModeButtons(nextView);
        }

        // Apply initial view mode from URL
        setViewMode(currentViewParam);

        // --- Loading state helpers ---
        function setLoadingState() {
            if (loaderEl) loaderEl.hidden = false;
            if (errorEl) errorEl.hidden = true;
            if (articleEl) articleEl.hidden = true;
        }

        function setErrorState() {
            if (loaderEl) loaderEl.hidden = true;
            if (errorEl) errorEl.hidden = false;
            if (articleEl) articleEl.hidden = true;
        }

        function setSuccessState() {
            if (loaderEl) loaderEl.hidden = true;
            if (errorEl) errorEl.hidden = true;
            if (articleEl) articleEl.hidden = false;
        }

        // --- Last updated formatting ---
        function formatLastUpdated(value) {
            if (!value) return '';
            // Try to parse ISO date; fall back to raw string if parsing fails
            const date = new Date(value);
            if (!isNaN(date.getTime())) {
                return date.toLocaleDateString(undefined, {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }
            return String(value);
        }

        // --- Section navigation ---
        function scrollToSectionIfNeeded(sectionId) {
            if (!sectionId || !bodyContainerEl) return;
            let target = null;
            try {
                target = bodyContainerEl.querySelector('#' + CSS.escape(sectionId) + ', a[name="' + sectionId + '"]');
            } catch (e) {
                // If CSS.escape is not supported, fall back to id-only lookup
                target = bodyContainerEl.querySelector('#' + sectionId + ', a[name="' + sectionId + '"]');
            }
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                if (typeof target.focus === 'function') {
                    try {
                        target.focus({ preventScroll: true });
                    } catch (e) {
                        // ignore focus errors
                    }
                }
            }
        }

        function updateSectionParam(sectionId) {
            currentSectionParam = sectionId || null;
            const params = new URLSearchParams(window.location.search);
            if (currentSectionParam) {
                params.set('section', currentSectionParam);
            } else {
                params.delete('section');
            }
            const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
            window.history.replaceState({}, '', newUrl);
            scrollToSectionIfNeeded(currentSectionParam);
        }

        function buildSectionNav(navContainer, bodyContainer) {
            if (!navContainer || !bodyContainer) return;
            const titleElNav = navContainer.querySelector('.section-nav__title');
            const listEl = navContainer.querySelector('.section-nav__list');
            if (titleElNav) {
                titleElNav.textContent = AppConfig.sectionNavTitle;
            }
            if (!listEl) return;
            listEl.innerHTML = '';

            const headings = bodyContainer.querySelectorAll('h2[id], h3[id]');
            if (!headings.length) {
                navContainer.classList.add('section-nav--empty');
                return;
            }
            navContainer.classList.remove('section-nav--empty');

            headings.forEach(function(heading) {
                const id = heading.id;
                if (!id) return;
                const labelText = heading.textContent ? heading.textContent.trim() : '';
                if (!labelText) return;
                const itemBtn = document.createElement('button');
                itemBtn.type = 'button';
                itemBtn.className = 'section-nav__item';
                itemBtn.dataset.action = 'navigate-section';
                itemBtn.dataset.sectionId = id;
                itemBtn.innerHTML = '\n                    <span class="section-nav__label">' + labelText + '</span>\n                    <span class="section-nav__icon" aria-hidden="true">&rsaquo;</span>\n                ';
                listEl.appendChild(itemBtn);
            });
        }

        // --- Data loading via SDK ---
        function loadInformationalPage() {
            setLoadingState();
            let data = null;
            try {
                data = WebsiteSDK.getInformationalPage(AppConfig.pageCode);
            } catch (e) {
                console.error('Failed to load informational page', e);
                setErrorState();
                return;
            }

            if (!data) {
                setErrorState();
                return;
            }

            // Populate informational.* fields
            const infoPopulateEls = document.querySelectorAll('[data-populate^="informational."]');
            infoPopulateEls.forEach(function(el) {
                const key = el.dataset.populate.split('.')[1];
                if (!key) return;
                if (key === 'body_html') {
                    el.innerHTML = data.body_html || '';
                } else if (key === 'title') {
                    el.textContent = data.title || '';
                } else if (key === 'last_updated') {
                    el.textContent = formatLastUpdated(data.last_updated);
                }
            });

            // Build section navigation based on rendered body_html
            if (sectionNavEl && bodyContainerEl) {
                buildSectionNav(sectionNavEl, bodyContainerEl);
            }

            setSuccessState();

            // After content is rendered, scroll to section if section param present
            if (currentSectionParam) {
                scrollToSectionIfNeeded(currentSectionParam);
            }
        }

        // Initial load
        loadInformationalPage();

        // --- Global click handler for data-action elements ---
        document.addEventListener('click', function(event) {
            const actionEl = event.target.closest('[data-action]');
            if (!actionEl) return;
            const action = actionEl.dataset.action;

            if (action === 'retry-load') {
                event.preventDefault();
                loadInformationalPage();
                return;
            }

            if (action === 'toggle-view') {
                event.preventDefault();
                const viewMode = actionEl.dataset.viewMode || 'default';
                setViewMode(viewMode);
                return;
            }

            if (action === 'navigate-section') {
                event.preventDefault();
                const sectionId = actionEl.dataset.sectionId || null;
                updateSectionParam(sectionId);
                return;
            }
        });

        // --- Footer year helper (non-critical) ---
        const yearEl = document.querySelector('.site-footer [data-year]');
        if (yearEl) {
            yearEl.textContent = String(new Date().getFullYear());
        }
    });
    </script>
</body>
</html>
