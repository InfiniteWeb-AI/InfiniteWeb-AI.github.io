<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>Fishing Tackle Shop - Blog</title>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='blog.css'>
</head>
<body class='site'>
    <header class='site-header' id='top'>
        <div class='header-inner container'>
            <a href='index.html' class='brand'>
                <img src='logo.svg' alt='Fishing tackle shop logo' class='brand-logo'>
            </a>
        </div>
    </header>

    <nav class='primary-nav' aria-label='Primary'>
        <div class='nav-inner container'>
            <ul class='nav-menu'>
                <li><a href='index.html'>Home</a></li>
                <li><a href='category.html?categoryId=rods'>Rods</a></li>
                <li><a href='category.html?categoryId=reels'>Reels</a></li>
                <li><a href='category.html?categoryId=lures'>Lures</a></li>
                <li><a href='category.html?categoryId=line'>Line</a></li>
                <li><a href='category.html?categoryId=apparel'>Apparel</a></li>
                <li><a href='category.html?categoryId=saltwater'>Saltwater</a></li>
                <li><a href='category.html?categoryId=deals'>Deals</a></li>
                <li><a href='blog.html'>Blog</a></li>
                <li><a href='wishlist.html'>Wishlist</a></li>
                <li><a href='cart.html'>Cart</a></li>
            </ul>
            <form class='nav-search' action='search.html' method='get'>
                <label class='visually-hidden' for='nav-search-input'>Search the site</label>
                <input id='nav-search-input' type='search' name='q' placeholder='Search...'>
                <button type='submit'>Search</button>
            </form>
        </div>
    </nav>

    <div class='page-wrap container'>
        <aside class='sidebar' aria-label='Site sidebar'>
            <section class='widget widget-recent-posts' data-component='sidebar-recent-posts'>
                <h2 class='widget-title'>Recent Posts</h2>
                <ul class='recent-posts-list' data-populate='recent-posts'>
                    <!-- Recent posts populated via JS -->
                </ul>
            </section>
        </aside>

        <main id='content' class='content-area' role='main'>
            <h1 class='page-title'>Blog</h1>

            <div class='blog-controls-row'>
                <form class='blog-search-form' data-component='blog-search-form' data-action='blog-search-form'>
                    <label class='visually-hidden' for='blog-search-input'>Search blog posts</label>
                    <input id='blog-search-input' name='searchQuery' type='search' placeholder='Search blog posts...'>
                    <button type='submit' class='btn btn-search'>Search</button>
                    <button type='button' class='btn btn-link btn-clear-search' data-action='clear-search'>Clear</button>
                </form>

                <div class='blog-state-controller' data-component='blog-state-controller'>
                    <label for='blog-sort-select' class='sort-label'>Sort by:</label>
                    <select id='blog-sort-select' name='sortBy' class='sort-select' data-action='change-sort'>
                        <option value='newest'>Newest</option>
                        <option value='oldest'>Oldest</option>
                        <option value='most_popular'>Most popular</option>
                    </select>
                </div>
            </div>

            <div class='blog-filter-bar' data-component='blog-filter-bar'>
                <div class='filter-group'>
                    <label for='blog-category-filter'>Category</label>
                    <select id='blog-category-filter' name='blogCategoryId' data-action='change-category'>
                        <option value=''>All categories</option>
                        <!-- Options populated from getBlogCategoriesAndTags -->
                    </select>
                </div>
                <div class='filter-group'>
                    <label for='blog-tag-filter'>Tag</label>
                    <select id='blog-tag-filter' name='tag' data-action='change-tag'>
                        <option value=''>All tags</option>
                        <!-- Options populated from getBlogCategoriesAndTags -->
                    </select>
                </div>
                <div class='filter-group filter-group-date'>
                    <label for='blog-year-filter'>Year</label>
                    <select id='blog-year-filter' name='year' data-action='change-year'>
                        <option value=''>Any year</option>
                        <!-- Year options populated via JS -->
                    </select>
                </div>
                <div class='filter-group filter-group-date'>
                    <label for='blog-month-filter'>Month</label>
                    <select id='blog-month-filter' name='month' data-action='change-month'>
                        <option value=''>Any month</option>
                        <option value='1'>January</option>
                        <option value='2'>February</option>
                        <option value='3'>March</option>
                        <option value='4'>April</option>
                        <option value='5'>May</option>
                        <option value='6'>June</option>
                        <option value='7'>July</option>
                        <option value='8'>August</option>
                        <option value='9'>September</option>
                        <option value='10'>October</option>
                        <option value='11'>November</option>
                        <option value='12'>December</option>
                    </select>
                </div>
                <div class='filter-group filter-group-clear'>
                    <button type='button' class='btn btn-link filter-clear-button' data-action='clear-filters'>Clear filters</button>
                </div>
            </div>

            <div class='blog-filter-summary-bar' data-component='blog-filter-summary-bar'>
                <div class='filter-summary-chips' data-populate='filter-summary'>
                    <!-- Active filter chips rendered via JS -->
                </div>
            </div>

            <section class='blog-listing' aria-label='Blog posts'>
                <div class='blog-list-header'>
                    <p class='blog-results-info' data-populate='blog-list-status'></p>
                </div>
                <div class='blog-post-list' data-component='blog-post-list' data-populate='blog-post-list'>
                    <!-- Blog posts rendered via JS -->
                </div>
                <nav class='blog-pagination-controls' data-component='blog-pagination-controls' aria-label='Blog pagination'>
                    <ul class='pagination-list' data-populate='blog-pagination'>
                        <!-- Pagination controls rendered via JS -->
                    </ul>
                </nav>
            </section>
        </main>
    </div>

    <footer class='site-footer' role='contentinfo'>
        <div class='footer-inner container'>
            <div class='footer-column'>
                <h2 class='footer-heading'>Information</h2>
                <ul class='footer-menu'>
                    <li><a href='about.html'>About Us</a></li>
                    <li><a href='contact.html'>Contact</a></li>
                    <li><a href='size_guide.html'>Size Guide</a></li>
                </ul>
            </div>
            <div class='footer-column'>
                <h2 class='footer-heading'>Support &amp; More</h2>
                <ul class='footer-menu'>
                    <li><a href='help.html'>Help &amp; Policies</a></li>
                    <li><a href='blog.html'>Blog</a></li>
                    <li><a href='category.html?categoryId=deals'>Deals</a></li>
                </ul>
            </div>
        </div>
        <div class='footer-bottom'>
            <div class='container'>
                <p class='footer-copy'>&copy; <span class='current-year'>2024</span> Fishing Tackle Shop. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src='business_logic.js'></script>
    <script>
    (function() {
        var blogCategoriesCache = null;
        var blogTagsCache = null;
        var blogPaginationMeta = null;

        function parseStateFromUrl() {
            var params = new URLSearchParams(window.location.search);
            var state = {};

            var searchQuery = params.get('searchQuery');
            state.searchQuery = searchQuery && searchQuery.trim().length > 0 ? searchQuery.trim() : undefined;

            var blogCategoryId = params.get('blogCategoryId');
            state.blogCategoryId = blogCategoryId && blogCategoryId.trim().length > 0 ? blogCategoryId.trim() : undefined;

            var tag = params.get('tag');
            state.tag = tag && tag.trim().length > 0 ? tag.trim() : undefined;

            var yearParam = params.get('year');
            var yearNum = yearParam ? parseInt(yearParam, 10) : NaN;
            state.year = !isNaN(yearNum) && yearNum > 0 ? yearNum : undefined;

            var monthParam = params.get('month');
            var monthNum = monthParam ? parseInt(monthParam, 10) : NaN;
            state.month = !isNaN(monthNum) && monthNum >= 1 && monthNum <= 12 ? monthNum : undefined;

            var sortBy = params.get('sortBy');
            if (!sortBy || sortBy.trim().length === 0) {
                sortBy = 'newest';
            }
            state.sortBy = sortBy;

            var pageParam = params.get('page');
            var pageNum = pageParam ? parseInt(pageParam, 10) : 1;
            if (isNaN(pageNum) || pageNum < 1) {
                pageNum = 1;
            }
            state.page = pageNum;

            return state;
        }

        function mapSortToApiSort(sortBy) {
            if (sortBy === 'oldest') {
                return 'publish_date_asc';
            }
            if (sortBy === 'most_popular') {
                return 'most_popular';
            }
            return 'publish_date_desc';
        }

        function updateUrlAndState(changes, options) {
            var url = new URL(window.location.href);
            var params = url.searchParams;

            for (var key in changes) {
                if (!Object.prototype.hasOwnProperty.call(changes, key)) {
                    continue;
                }
                var value = changes[key];
                if (value === null || value === undefined || value === '') {
                    params.delete(key);
                } else {
                    params.set(key, String(value));
                }
            }

            url.search = params.toString();
            var newUrl = url.pathname + (url.search ? '?' + url.searchParams.toString() : '') + url.hash;

            if (options && options.replace) {
                window.history.replaceState({}, '', newUrl);
            } else {
                window.history.pushState({}, '', newUrl);
            }

            applyStateFromUrl();
        }

        function hydrateNavCategories() {
            try {
                if (typeof WebsiteSDK === 'undefined') {
                    return;
                }
                var navList = document.querySelector('.nav-menu');
                if (!navList) {
                    return;
                }
                var categories = WebsiteSDK.getProductCategoriesForNav();
                if (!categories || !Array.isArray(categories)) {
                    return;
                }
                for (var i = 0; i < categories.length; i++) {
                    var cat = categories[i];
                    var selector = 'a[href="category.html?categoryId=' + cat.id + '"]';
                    var link = navList.querySelector(selector);
                    if (link && cat.name) {
                        link.textContent = cat.name;
                    }
                }
            } catch (e) {
                console.error('Error hydrating navigation categories', e);
            }
        }

        function initYearFilterOptions() {
            var yearSelect = document.getElementById('blog-year-filter');
            if (!yearSelect) {
                return;
            }
            var currentYear = new Date().getFullYear();
            var earliestYear = currentYear - 5;
            for (var year = currentYear; year >= earliestYear; year--) {
                var opt = document.createElement('option');
                opt.value = String(year);
                opt.textContent = String(year);
                yearSelect.appendChild(opt);
            }
        }

        function renderRecentPosts(container, posts) {
            container.innerHTML = '';
            if (!posts || posts.length === 0) {
                var liEmpty = document.createElement('li');
                liEmpty.className = 'recent-post-empty';
                liEmpty.textContent = 'No recent posts available.';
                container.appendChild(liEmpty);
                return;
            }
            for (var i = 0; i < posts.length; i++) {
                var post = posts[i];
                var li = document.createElement('li');
                li.className = 'recent-post-item';

                var link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.textContent = post.title || 'Untitled post';
                link.dataset.action = 'open-recent-post';
                link.dataset.slug = post.slug;

                li.appendChild(link);

                if (post.publish_date) {
                    var time = document.createElement('time');
                    time.className = 'recent-post-date';
                    try {
                        var date = new Date(post.publish_date);
                        time.dateTime = date.toISOString();
                        time.textContent = date.toLocaleDateString();
                    } catch (e) {
                        time.textContent = '';
                    }
                    li.appendChild(time);
                }

                container.appendChild(li);
            }
        }

        function ensureBlogCategoriesAndTagsLoaded(callback) {
            if (blogCategoriesCache && blogTagsCache) {
                if (callback) {
                    callback(blogCategoriesCache, blogTagsCache);
                }
                return;
            }
            try {
                if (typeof WebsiteSDK === 'undefined') {
                    if (callback) {
                        callback([], []);
                    }
                    return;
                }
                var result = WebsiteSDK.getBlogCategoriesAndTags();
                blogCategoriesCache = result && result.categories ? result.categories : [];
                blogTagsCache = result && result.tags ? result.tags : [];
                if (callback) {
                    callback(blogCategoriesCache, blogTagsCache);
                }
            } catch (e) {
                console.error('Error loading blog categories and tags', e);
                blogCategoriesCache = [];
                blogTagsCache = [];
                if (callback) {
                    callback(blogCategoriesCache, blogTagsCache);
                }
            }
        }

        function populateCategoryAndTagFilters(state) {
            ensureBlogCategoriesAndTagsLoaded(function(categories, tags) {
                var categorySelect = document.getElementById('blog-category-filter');
                if (categorySelect) {
                    var selectedCategoryId = state && state.blogCategoryId ? state.blogCategoryId : '';
                    var existingOptions = categorySelect.querySelectorAll('option');
                    for (var i = existingOptions.length - 1; i >= 0; i--) {
                        var opt = existingOptions[i];
                        if (opt.value !== '') {
                            categorySelect.removeChild(opt);
                        }
                    }
                    for (var j = 0; j < categories.length; j++) {
                        var cat = categories[j];
                        var option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.name || cat.id;
                        if (selectedCategoryId && selectedCategoryId === cat.id) {
                            option.selected = true;
                        }
                        categorySelect.appendChild(option);
                    }
                    if (!selectedCategoryId) {
                        categorySelect.value = '';
                    }
                }

                var tagSelect = document.getElementById('blog-tag-filter');
                if (tagSelect) {
                    var selectedTagSlug = state && state.tag ? state.tag : '';
                    var existingTagOptions = tagSelect.querySelectorAll('option');
                    for (var k = existingTagOptions.length - 1; k >= 0; k--) {
                        var optTag = existingTagOptions[k];
                        if (optTag.value !== '') {
                            tagSelect.removeChild(optTag);
                        }
                    }
                    for (var t = 0; t < tags.length; t++) {
                        var tagSlug = tags[t];
                        var tagOption = document.createElement('option');
                        tagOption.value = tagSlug;
                        tagOption.textContent = tagSlug;
                        if (selectedTagSlug && selectedTagSlug === tagSlug) {
                            tagOption.selected = true;
                        }
                        tagSelect.appendChild(tagOption);
                    }
                    if (!selectedTagSlug) {
                        tagSelect.value = '';
                    }
                }
            });
        }

        function renderBlogPosts(container, posts) {
            container.innerHTML = '';
            if (!posts || posts.length === 0) {
                var emptyDiv = document.createElement('div');
                emptyDiv.className = 'blog-post-empty';
                emptyDiv.textContent = 'No posts found for the selected filters.';
                container.appendChild(emptyDiv);
                return;
            }

            for (var i = 0; i < posts.length; i++) {
                var post = posts[i];
                var article = document.createElement('article');
                article.className = 'blog-post-card';

                var header = document.createElement('header');
                header.className = 'blog-post-header';

                var time = document.createElement('time');
                time.className = 'blog-post-date';
                if (post.publish_date) {
                    try {
                        var date = new Date(post.publish_date);
                        time.dateTime = date.toISOString();
                        time.textContent = date.toLocaleDateString();
                    } catch (e) {
                        time.textContent = '';
                    }
                }
                header.appendChild(time);

                var titleEl = document.createElement('h2');
                titleEl.className = 'blog-post-title';

                var titleLink = document.createElement('a');
                titleLink.href = 'javascript:void(0)';
                titleLink.textContent = post.title || 'Untitled post';
                titleLink.dataset.action = 'open-post';
                titleLink.dataset.slug = post.slug;

                titleEl.appendChild(titleLink);
                header.appendChild(titleEl);

                article.appendChild(header);

                var body = document.createElement('div');
                body.className = 'blog-post-body';

                var excerptDiv = document.createElement('div');
                excerptDiv.className = 'blog-post-excerpt';
                var excerptText = post.excerpt && post.excerpt.length > 0 ? post.excerpt : '';
                if (!excerptText && post.content_html) {
                    var temp = document.createElement('div');
                    temp.innerHTML = post.content_html;
                    excerptText = temp.textContent || temp.innerText || '';
                    if (excerptText.length > 220) {
                        excerptText = excerptText.slice(0, 220) + '...';
                    }
                }
                excerptDiv.textContent = excerptText;
                body.appendChild(excerptDiv);

                var readMore = document.createElement('button');
                readMore.type = 'button';
                readMore.className = 'btn btn-read-more';
                readMore.textContent = 'Read more';
                readMore.dataset.action = 'open-post';
                readMore.dataset.slug = post.slug;
                body.appendChild(readMore);

                article.appendChild(body);

                if (post.tags && Array.isArray(post.tags) && post.tags.length > 0) {
                    var tagsContainer = document.createElement('div');
                    tagsContainer.className = 'blog-post-tags';
                    for (var j = 0; j < post.tags.length; j++) {
                        var tagSlug = post.tags[j];
                        var tagBtn = document.createElement('button');
                        tagBtn.type = 'button';
                        tagBtn.className = 'tag-badge';
                        tagBtn.textContent = tagSlug;
                        tagBtn.dataset.action = 'select-tag-from-post';
                        tagBtn.dataset.tag = tagSlug;
                        tagsContainer.appendChild(tagBtn);
                    }
                    article.appendChild(tagsContainer);
                }

                container.appendChild(article);
            }
        }

        function renderBlogListStatus(container, meta, state) {
            if (!container) {
                return;
            }
            if (!meta || meta.totalItems === 0) {
                container.textContent = 'No posts to display.';
                return;
            }
            var startIndex = (meta.page - 1) * meta.pageSize + 1;
            var endIndex = startIndex + meta.itemsOnPage - 1;
            if (endIndex > meta.totalItems) {
                endIndex = meta.totalItems;
            }
            var parts = [];
            parts.push('Showing ' + startIndex + '–' + endIndex + ' of ' + meta.totalItems + ' posts');
            if (state && state.searchQuery) {
                parts.push('for search "' + state.searchQuery + '"');
            }
            container.textContent = parts.join(' ');
        }

        function renderPagination(container, meta) {
            container.innerHTML = '';
            if (!meta || !meta.totalPages || meta.totalPages <= 1) {
                return;
            }

            var currentPage = meta.page;
            var totalPages = meta.totalPages;

            var prevLi = document.createElement('li');
            var prevBtn = document.createElement('button');
            prevBtn.type = 'button';
            prevBtn.className = 'pagination-prev';
            prevBtn.textContent = 'Previous';
            prevBtn.dataset.action = 'go-prev-page';
            prevBtn.dataset.page = currentPage > 1 ? String(currentPage - 1) : String(currentPage);
            if (currentPage === 1) {
                prevBtn.disabled = true;
            }
            prevLi.appendChild(prevBtn);
            container.appendChild(prevLi);

            for (var p = 1; p <= totalPages; p++) {
                var pageLi = document.createElement('li');
                var pageBtn = document.createElement('button');
                pageBtn.type = 'button';
                pageBtn.className = 'pagination-page';
                if (p === currentPage) {
                    pageBtn.className += ' is-active';
                }
                pageBtn.textContent = String(p);
                pageBtn.dataset.action = 'go-page';
                pageBtn.dataset.page = String(p);
                pageLi.appendChild(pageBtn);
                container.appendChild(pageLi);
            }

            var nextLi = document.createElement('li');
            var nextBtn = document.createElement('button');
            nextBtn.type = 'button';
            nextBtn.className = 'pagination-next';
            nextBtn.textContent = 'Next';
            nextBtn.dataset.action = 'go-next-page';
            nextBtn.dataset.page = currentPage < totalPages ? String(currentPage + 1) : String(currentPage);
            if (currentPage === totalPages) {
                nextBtn.disabled = true;
            }
            nextLi.appendChild(nextBtn);
            container.appendChild(nextLi);
        }

        function monthLabel(month) {
            var labels = {
                1: 'January',
                2: 'February',
                3: 'March',
                4: 'April',
                5: 'May',
                6: 'June',
                7: 'July',
                8: 'August',
                9: 'September',
                10: 'October',
                11: 'November',
                12: 'December'
            };
            return labels[month] || String(month);
        }

        function renderFilterSummary(container, state) {
            container.innerHTML = '';
            if (!state) {
                return;
            }

            var hasAny = false;

            if (state.searchQuery) {
                hasAny = true;
                var searchChip = document.createElement('button');
                searchChip.type = 'button';
                searchChip.className = 'filter-chip';
                searchChip.dataset.action = 'remove-search-filter';
                searchChip.textContent = 'Search: ' + state.searchQuery + ' ␀d7';
                container.appendChild(searchChip);
            }

            if (state.blogCategoryId) {
                hasAny = true;
                var categoryName = state.blogCategoryId;
                if (blogCategoriesCache && Array.isArray(blogCategoriesCache)) {
                    for (var i = 0; i < blogCategoriesCache.length; i++) {
                        if (blogCategoriesCache[i].id === state.blogCategoryId) {
                            categoryName = blogCategoriesCache[i].name || blogCategoriesCache[i].id;
                            break;
                        }
                    }
                }
                var catChip = document.createElement('button');
                catChip.type = 'button';
                catChip.className = 'filter-chip';
                catChip.dataset.action = 'remove-category-filter';
                catChip.textContent = 'Category: ' + categoryName + ' ␀d7';
                container.appendChild(catChip);
            }

            if (state.tag) {
                hasAny = true;
                var tagChip = document.createElement('button');
                tagChip.type = 'button';
                tagChip.className = 'filter-chip';
                tagChip.dataset.action = 'remove-tag-filter';
                tagChip.textContent = 'Tag: ' + state.tag + ' ␀d7';
                container.appendChild(tagChip);
            }

            if (state.year) {
                hasAny = true;
                var label = '';
                if (state.month) {
                    label = monthLabel(state.month) + ' ' + state.year;
                } else {
                    label = String(state.year);
                }
                var dateChip = document.createElement('button');
                dateChip.type = 'button';
                dateChip.className = 'filter-chip';
                dateChip.dataset.action = 'remove-date-filter';
                dateChip.textContent = 'Date: ' + label + ' ␀d7';
                container.appendChild(dateChip);
            }

            if (state.sortBy && state.sortBy !== 'newest') {
                hasAny = true;
                var sortLabel = 'Sort: ' + state.sortBy.replace('_', ' ');
                var sortChip = document.createElement('button');
                sortChip.type = 'button';
                sortChip.className = 'filter-chip';
                sortChip.dataset.action = 'remove-sort-filter';
                sortChip.textContent = sortLabel + ' ␀d7';
                container.appendChild(sortChip);
            }

            if (hasAny) {
                var clearAll = document.createElement('button');
                clearAll.type = 'button';
                clearAll.className = 'filter-chip filter-chip-clear-all';
                clearAll.dataset.action = 'clear-all-filters';
                clearAll.textContent = 'Clear all';
                container.appendChild(clearAll);
            }
        }

        function syncControlsWithState(state) {
            var searchInput = document.getElementById('blog-search-input');
            if (searchInput) {
                searchInput.value = state.searchQuery || '';
            }

            var sortSelect = document.getElementById('blog-sort-select');
            if (sortSelect) {
                sortSelect.value = state.sortBy || 'newest';
            }

            var yearSelect = document.getElementById('blog-year-filter');
            if (yearSelect) {
                yearSelect.value = state.year ? String(state.year) : '';
            }

            var monthSelect = document.getElementById('blog-month-filter');
            if (monthSelect) {
                monthSelect.value = state.month ? String(state.month) : '';
            }

            populateCategoryAndTagFilters(state);

            var summaryContainer = document.querySelector('[data-populate="filter-summary"]');
            if (summaryContainer) {
                renderFilterSummary(summaryContainer, state);
            }
        }

        function fetchAndRenderBlogList(state) {
            try {
                if (typeof WebsiteSDK === 'undefined') {
                    return;
                }

                var apiSort = mapSortToApiSort(state.sortBy);
                var tagSlugs = state.tag ? [state.tag] : undefined;
                var pageNum = state.page || 1;
                if (pageNum < 1) {
                    pageNum = 1;
                }

                var result = WebsiteSDK.listBlogPosts(
                    state.searchQuery,
                    state.blogCategoryId,
                    tagSlugs,
                    state.year,
                    state.month,
                    apiSort,
                    pageNum,
                    undefined
                );

                if (result && typeof result.totalPages === 'number' && result.totalPages > 0 && pageNum > result.totalPages) {
                    updateUrlAndState({ page: result.totalPages }, { replace: true });
                    return;
                }

                var items = result && Array.isArray(result.items) ? result.items : [];
                var postsContainer = document.querySelector('[data-populate="blog-post-list"]');
                if (postsContainer) {
                    renderBlogPosts(postsContainer, items);
                }

                var statusContainer = document.querySelector('[data-populate="blog-list-status"]');
                var meta = null;
                if (result) {
                    meta = {
                        page: result.page || pageNum,
                        pageSize: result.pageSize || (items ? items.length : 0),
                        totalItems: typeof result.totalItems === 'number' ? result.totalItems : (items ? items.length : 0),
                        totalPages: result.totalPages || 1,
                        itemsOnPage: items ? items.length : 0
                    };
                    blogPaginationMeta = meta;
                }
                if (statusContainer) {
                    renderBlogListStatus(statusContainer, meta, state);
                }

                var paginationContainer = document.querySelector('[data-populate="blog-pagination"]');
                if (paginationContainer) {
                    renderPagination(paginationContainer, meta);
                }
            } catch (e) {
                console.error('Error listing blog posts', e);
                var statusContainerError = document.querySelector('[data-populate="blog-list-status"]');
                if (statusContainerError) {
                    statusContainerError.textContent = 'There was a problem loading blog posts. Please try again later.';
                }
            }
        }

        function applyStateFromUrl() {
            var state = parseStateFromUrl();
            syncControlsWithState(state);
            fetchAndRenderBlogList(state);
        }

        function handleActionClick(event) {
            var target = event.target;
            if (!target || !target.dataset) {
                return;
            }
            var action = target.dataset.action;
            if (!action) {
                return;
            }

            var state;

            if (action === 'open-post') {
                var slug = target.dataset.slug;
                if (slug) {
                    window.location.href = 'article.html?slug=' + encodeURIComponent(slug);
                }
                return;
            }

            if (action === 'open-recent-post') {
                var rslug = target.dataset.slug;
                if (rslug) {
                    window.location.href = 'article.html?slug=' + encodeURIComponent(rslug);
                }
                return;
            }

            if (action === 'select-tag-from-post') {
                var tagSlug = target.dataset.tag;
                state = parseStateFromUrl();
                var changes = { tag: tagSlug || null, page: 1 };
                updateUrlAndState(changes, {});
                return;
            }

            if (action === 'remove-category-filter') {
                updateUrlAndState({ blogCategoryId: null, page: 1 }, {});
                return;
            }

            if (action === 'remove-tag-filter') {
                updateUrlAndState({ tag: null, page: 1 }, {});
                return;
            }

            if (action === 'remove-date-filter') {
                updateUrlAndState({ year: null, month: null, page: 1 }, {});
                return;
            }

            if (action === 'remove-search-filter') {
                updateUrlAndState({ searchQuery: null, page: 1 }, {});
                return;
            }

            if (action === 'remove-sort-filter') {
                updateUrlAndState({ sortBy: null, page: 1 }, {});
                return;
            }

            if (action === 'clear-all-filters') {
                updateUrlAndState({ searchQuery: null, blogCategoryId: null, tag: null, year: null, month: null, sortBy: null, page: 1 }, {});
                return;
            }

            if (action === 'go-page' || action === 'go-prev-page' || action === 'go-next-page') {
                var pageStr = target.dataset.page;
                var newPage = pageStr ? parseInt(pageStr, 10) : NaN;
                if (isNaN(newPage) || newPage < 1) {
                    return;
                }
                state = parseStateFromUrl();
                if (blogPaginationMeta && blogPaginationMeta.totalPages && newPage > blogPaginationMeta.totalPages) {
                    newPage = blogPaginationMeta.totalPages;
                }
                if (newPage === state.page) {
                    return;
                }
                updateUrlAndState({ page: newPage }, {});
                return;
            }
        }

        function setupGlobalClickHandler() {
            document.addEventListener('click', function(event) {
                handleActionClick(event);
            });
        }

        function setupFormAndFilterHandlers() {
            var searchForm = document.querySelector('[data-action="blog-search-form"]');
            if (searchForm) {
                searchForm.addEventListener('submit', function(event) {
                    event.preventDefault();
                    var input = document.getElementById('blog-search-input');
                    var value = input ? input.value.trim() : '';
                    var changes = { searchQuery: value || null, page: 1 };
                    updateUrlAndState(changes, {});
                });
            }

            var clearSearchBtn = document.querySelector('[data-action="clear-search"]');
            if (clearSearchBtn) {
                clearSearchBtn.addEventListener('click', function() {
                    var input = document.getElementById('blog-search-input');
                    if (input) {
                        input.value = '';
                    }
                    updateUrlAndState({ searchQuery: null, page: 1 }, {});
                });
            }

            var categorySelect = document.getElementById('blog-category-filter');
            if (categorySelect) {
                categorySelect.addEventListener('change', function() {
                    var value = categorySelect.value;
                    updateUrlAndState({ blogCategoryId: value || null, page: 1 }, {});
                });
            }

            var tagSelect = document.getElementById('blog-tag-filter');
            if (tagSelect) {
                tagSelect.addEventListener('change', function() {
                    var value = tagSelect.value;
                    updateUrlAndState({ tag: value || null, page: 1 }, {});
                });
            }

            var yearSelect = document.getElementById('blog-year-filter');
            if (yearSelect) {
                yearSelect.addEventListener('change', function() {
                    var value = yearSelect.value;
                    var changes = { year: value || null, page: 1 };
                    if (!value) {
                        changes.month = null;
                    }
                    updateUrlAndState(changes, {});
                });
            }

            var monthSelect = document.getElementById('blog-month-filter');
            if (monthSelect) {
                monthSelect.addEventListener('change', function() {
                    var value = monthSelect.value;
                    var state = parseStateFromUrl();
                    var changes = { month: value || null, page: 1 };
                    if (value && !state.year) {
                        changes.year = new Date().getFullYear();
                    }
                    updateUrlAndState(changes, {});
                });
            }

            var sortSelect = document.getElementById('blog-sort-select');
            if (sortSelect) {
                sortSelect.addEventListener('change', function() {
                    var value = sortSelect.value;
                    updateUrlAndState({ sortBy: value || null, page: 1 }, {});
                });
            }

            var clearFiltersBtn = document.querySelector('[data-action="clear-filters"]');
            if (clearFiltersBtn) {
                clearFiltersBtn.addEventListener('click', function() {
                    updateUrlAndState({ blogCategoryId: null, tag: null, year: null, month: null, sortBy: null, page: 1 }, {});
                });
            }
        }

        function initRecentPostsSidebar() {
            try {
                if (typeof WebsiteSDK === 'undefined') {
                    return;
                }
                var container = document.querySelector('[data-populate="recent-posts"]');
                if (!container) {
                    return;
                }
                var posts = WebsiteSDK.getRecentBlogPosts(5);
                renderRecentPosts(container, posts);
            } catch (e) {
                console.error('Error loading recent blog posts', e);
            }
        }

        function initFooterYear() {
            var spanYear = document.querySelector('.current-year');
            if (spanYear) {
                spanYear.textContent = String(new Date().getFullYear());
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            hydrateNavCategories();
            initFooterYear();
            initYearFilterOptions();
            setupGlobalClickHandler();
            setupFormAndFilterHandlers();
            initRecentPostsSidebar();
            ensureBlogCategoriesAndTagsLoaded(function() {
                applyStateFromUrl();
            });
        });

        window.addEventListener('popstate', function() {
            applyStateFromUrl();
        });
    })();
    </script>
</body>
</html>
