<body>

              <span class='brand-mark-dot brand-mark-dot--small'></span>

            </span>

              <span class='brand-name'>COZWEAT</span>
              <span class='brand-tagline'>ROWING</span>

        </div>

        <nav class='header-center' aria-label='Primary'>
          <ul class='nav-pill'>
            <li class='nav-item'>
              <a href='index.html' class='nav-link is-active'>Home</a>

            <li class='nav-item'>
              <a href='workouts.html' class='nav-link'>Workouts</a>
            </li>
            <li class='nav-item'>
              <a href='live_classes.html' class='nav-link'>Live Classes</a>

            <li class='nav-item'>
              <a href='pricing.html' class='nav-link'>Pricing</a>
            </li>
            <li class='nav-item'>
              <a href='my_plans.html' class='nav-link'>My Plans</a>

            <li class='nav-item'>

            </li>
            <li class='nav-item'>

            </li>
          </ul>

        <div class='header-right' aria-hidden='true'>
          <div class='header-icon header-icon--grid'></div>
          <div class='header-icon header-icon--slider'>
            <span></span><span></span><span></span><span></span>
          </div>
          <div class='header-icon header-icon--menu'>
            <span></span><span></span><span></span>
          </div>
        </div>

    </header>

    <main id='content' role='main'>
      <section id='contact-page' class='contact-page' data-component='contact-page-root'>
        <div class='contact-hero'>
          <div class='contact-hero-bg' aria-hidden='true'></div>
          <div class='contact-hero-overlay-left' aria-hidden='true'></div>

          <div class='contact-hero-inner'>
            <div class='contact-hero-column'>
              <section class='contact-details-panel' data-component='contact-details-panel' data-populate='contact-page-content'>
                <!-- Filled via JavaScript using getContactPageContent -->
              </section>

              <section class='contact-form-section'>
                <form class='contact-form' data-component='contact-form' data-action='submit-contact-form' novalidate>
                  <div class='form-field'>
                    <label for='contact-name' class='form-label'>Name</label>
                    <input id='contact-name' name='name' type='text' required class='form-input' autocomplete='name' />
                  </div>

                  <div class='form-field'>
                    <label for='contact-email' class='form-label'>Email</label>
                    <input id='contact-email' name='email' type='email' required class='form-input' autocomplete='email' />
                  </div>

                  <div class='form-field'>
                    <label for='contact-topic' class='form-label'>Topic</label>
                    <select id='contact-topic' name='topic' class='form-select' data-action='topic-change' data-default-topic=''>
                      <option value='general'>General</option>
                      <option value='billing'>Billing</option>
                      <option value='technical'>Technical</option>
                      <option value='feedback'>Feedback</option>
                    </select>
                  </div>

                  <div class='form-field'>
                    <label for='contact-message' class='form-label'>Message</label>
                    <textarea id='contact-message' name='message' rows='4' required class='form-textarea'></textarea>
                  </div>

                  <div class='form-actions'>
                    <button type='submit' class='btn btn-primary'>
                      <span class='btn-label'>Send message</span>
                    </button>
                  </div>

                  <div class='form-feedback' data-role='form-feedback' aria-live='polite'></div>
                </form>

                <div class='contact-faq-link-wrapper'>
                  <button type='button' class='faq-link' data-component='faq-navigation-link' data-action='view-faq'>
                    <span class='faq-link-label'>View FAQ</span>
                    <span class='faq-link-icon' aria-hidden='true'>&rarr;</span>
                  </button>
                </div>
              </section>
            </div>
          </div>

          <div class='page-state-overlay is-hidden' data-component='page-state-manager' aria-hidden='true' aria-live='polite'>
            <div class='page-state-overlay-backdrop'></div>
            <div class='page-state-overlay-card'>
              <p class='page-state-message' data-role='page-state-message'></p>
              <button type='button' class='btn btn-secondary' data-action='dismiss-state-overlay'>Close</button>
            </div>
          </div>
        </div>
      </section>
    </main>

              <span class='brand-mark-dot brand-mark-dot--smaller'></span>
            </span>

              <span class='brand-name'>COZWEAT</span>
              <span class='brand-tagline'>ROWING</span>
            </span>
          </div>
          <nav class='footer-nav' aria-label='Footer'>
            <ul class='footer-links'>
              <li class='footer-item'>
                <a href='about.html' class='footer-link'>About</a>

              </li>

              </li>
            </ul>
          </nav>
        </div>
        <div class='footer-bottom'>
          <p class='footer-meta'>&copy; 2026 Cozweat. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var initialTopicParam = urlParams.get('topic') || '';

      var pageState = {
        topic: null,
        submission: {
          status: 'idle',
          success: null,
          ticketId: null,
          message: ''
        }
      };

      var contactForm = document.querySelector('[data-component="contact-form"]');
      var pageStateManagerEl = document.querySelector('[data-component="page-state-manager"]');

      // Data population
      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        var dataType = element.dataset.populate;
        if (dataType === 'contact-page-content') {
          try {
            var content = WebsiteSDK.getContactPageContent();
            renderContactDetails(element, content);
          } catch (error) {
            element.setAttribute('data-state', 'error');
          }
        }
      });

      // Initialize contact form and topic state
      initContactForm(contactForm, pageState, initialTopicParam);

      // Bind actions based on data-action
      var actionElements = document.querySelectorAll('[data-action]');
      actionElements.forEach(function(element) {
        var action = element.dataset.action;
        if (action === 'submit-contact-form') {
          element.addEventListener('submit', function(event) {
            onContactFormSubmit(event, pageState, pageStateManagerEl);
          });
        } else if (action === 'topic-change') {
          element.addEventListener('change', function(event) {
            onTopicChange(event, pageState);
          });
        } else if (action === 'view-faq') {
          element.addEventListener('click', function() {
            onViewFaqClick();
          });
        } else if (action === 'dismiss-state-overlay') {
          element.addEventListener('click', function() {
            hideStateOverlay(pageStateManagerEl);
          });
        }
      });

      function renderContactDetails(container, content) {
        var supportEmail = typeof content.supportEmail === 'string' ? content.supportEmail : '';
        var businessAddress = typeof content.businessAddress === 'string' ? content.businessAddress : '';
        var phoneNumber = typeof content.phoneNumber === 'string' ? content.phoneNumber : '';
        var socialLinks = Array.isArray(content.socialLinks) ? content.socialLinks : [];

        var escapedEmail = escapeHtml(supportEmail);
        var escapedAddress = escapeHtml(businessAddress);
        var escapedPhone = escapeHtml(phoneNumber);

        var socialListHtml = '';
        socialLinks.forEach(function(link) {
          if (!link || typeof link.url !== 'string') {
            return;
          }
          var platformLabel = typeof link.platform === 'string' ? link.platform : link.url;
          var safePlatform = escapeHtml(platformLabel);
          var safeUrl = encodeURI(link.url);
          socialListHtml += '\n              <li class=\'contact-social-item\'>\n                <a href=\'' + safeUrl + '\' class=\'contact-social-link\' target=\'_blank\' rel=\'noopener noreferrer\' data-action=\'onClickSocialLink\'>' + safePlatform + '</a>\n              </li>';
        });

        container.innerHTML = '\n          <header class=\'contact-details-header\'>\n            <h1 class=\'contact-title\'>Contact</h1>\n            <p class=\'contact-subtitle\'>Use the form below or reach out directly using these details.</p>\n          </header>\n          <div class=\'contact-details-body\'>\n            <div class=\'contact-detail-row\'>\n              <div class=\'contact-detail-label\'>Email</div>\n              <a class=\'contact-detail-value contact-detail-link\' href=\'mailto:' + escapedEmail + '\' data-action=\'onClickEmailLink\'>' + escapedEmail + '</a>\n            </div>\n            <div class=\'contact-detail-row\'>\n              <div class=\'contact-detail-label\'>Phone</div>\n              <a class=\'contact-detail-value contact-detail-link\' href=\'tel:' + escapedPhone + '\' data-action=\'onClickPhoneLink\'>' + escapedPhone + '</a>\n            </div>\n            <div class=\'contact-detail-row\'>\n              <div class=\'contact-detail-label\'>Address</div>\n              <div class=\'contact-detail-value\'>' + escapedAddress + '</div>\n            </div>\n            <div class=\'contact-detail-row contact-detail-row--social\'>\n              <div class=\'contact-detail-label\'>Social</div>\n              <ul class=\'contact-social-list\'>' + socialListHtml + '\n              </ul>\n            </div>\n          </div>\n        ';
      }

      function initContactForm(formEl, pageState, initialTopicParam) {
        if (!formEl) {
          return;
        }
        var topicSelect = formEl.querySelector('select[name="topic"]');
        if (!topicSelect) {
          pageState.topic = '';
          return;
        }

        var allowedTopics = Array.prototype.slice.call(topicSelect.options)
          .map(function(opt) { return opt.value; })
          .filter(function(value) { return !!value; });

        var initialTopic = null;
        if (initialTopicParam && allowedTopics.indexOf(initialTopicParam) !== -1) {
          initialTopic = initialTopicParam;
        } else {
          var configuredDefault = topicSelect.dataset.defaultTopic || '';
          if (configuredDefault && allowedTopics.indexOf(configuredDefault) !== -1) {
            initialTopic = configuredDefault;
          } else if (allowedTopics.length > 0) {
            initialTopic = allowedTopics[0];
          }
        }

        if (initialTopic) {
          topicSelect.value = initialTopic;
        }
        pageState.topic = initialTopic || '';
      }

      function onTopicChange(event, pageState) {
        var newTopic = event.target.value || '';
        pageState.topic = newTopic;
        syncTopicUrl(newTopic);
      }

      function syncTopicUrl(newTopic) {
        try {
          var currentUrl = window.location.href;
          var url = new URL(currentUrl);
          if (newTopic) {
            url.searchParams.set('topic', newTopic);
          } else {
            url.searchParams.delete('topic');
          }
          window.history.replaceState({}, '', url.toString());
        } catch (e) {
          // Ignore URL update errors in unsupported environments
        }
      }

      function onContactFormSubmit(event, pageState, pageStateManagerEl) {
        event.preventDefault();
        var formEl = event.currentTarget;

        if (!formEl.checkValidity()) {
          formEl.reportValidity();
          pageState.submission = {
            status: 'validation_error',
            success: false,
            ticketId: null,
            message: ''
          };
          updateSubmissionFeedback(formEl, pageState.submission);
          return;
        }

        var nameInput = formEl.querySelector('input[name="name"]');
        var emailInput = formEl.querySelector('input[name="email"]');
        var topicSelect = formEl.querySelector('select[name="topic"]');
        var messageInput = formEl.querySelector('textarea[name="message"]');

        var name = nameInput ? nameInput.value.trim() : '';
        var email = emailInput ? emailInput.value.trim() : '';
        var topic = topicSelect ? (topicSelect.value || '').trim() : '';
        var message = messageInput ? messageInput.value.trim() : '';

        var response;
        try {
          response = WebsiteSDK.submitContactForm(name, email, topic, message);
        } catch (error) {
          pageState.submission = {
            status: 'api_error',
            success: false,
            ticketId: null,
            message: ''
          };
          updateSubmissionFeedback(formEl, pageState.submission);
          return;
        }

        var successFlag = !!(response && response.success);
        pageState.submission = {
          status: 'submitted',
          success: successFlag,
          ticketId: response && typeof response.ticketId === 'string' ? response.ticketId : '',
          message: response && typeof response.message === 'string' ? response.message : ''
        };

        updateSubmissionFeedback(formEl, pageState.submission);

        if (successFlag) {
          showStateOverlay(pageStateManagerEl, pageState.submission.message, true);
        }
      }

      function updateSubmissionFeedback(formEl, submission) {
        var feedbackEl = formEl.querySelector('[data-role="form-feedback"]');
        if (!feedbackEl) {
          return;
        }

        var baseMessage = submission && typeof submission.message === 'string' ? submission.message : '';
        var composed = baseMessage;
        if (submission && submission.ticketId) {
          composed = baseMessage ? baseMessage + ' ' + submission.ticketId : submission.ticketId;
        }

        if (!composed) {
          feedbackEl.textContent = '';
          feedbackEl.classList.remove('is-success');
          feedbackEl.classList.remove('is-error');
          return;
        }

        feedbackEl.textContent = composed;
        feedbackEl.classList.remove('is-success');
        feedbackEl.classList.remove('is-error');
        if (submission.success) {
          feedbackEl.classList.add('is-success');
        } else {
          feedbackEl.classList.add('is-error');
        }
      }

      function showStateOverlay(pageStateManagerEl, message, isSuccess) {
        if (!pageStateManagerEl) {
          return;
        }
        var msgEl = pageStateManagerEl.querySelector('[data-role="page-state-message"]');
        if (msgEl) {
          msgEl.textContent = message || '';
        }
        pageStateManagerEl.classList.remove('is-hidden');
        pageStateManagerEl.classList.add('is-active');
        pageStateManagerEl.setAttribute('aria-hidden', 'false');
      }

      function hideStateOverlay(pageStateManagerEl) {
        if (!pageStateManagerEl) {
          return;
        }
        pageStateManagerEl.classList.remove('is-active');
        pageStateManagerEl.classList.add('is-hidden');
        pageStateManagerEl.setAttribute('aria-hidden', 'true');
      }

      function onViewFaqClick() {
        if (!contactForm) {
          window.location.href = 'faq.html';
          return;
        }
        var topicSelect = contactForm.querySelector('select[name="topic"]');
        var messageInput = contactForm.querySelector('textarea[name="message"]');

        var initialTerm = '';
        var rawMessage = messageInput && messageInput.value ? messageInput.value.trim() : '';
        if (rawMessage) {
          initialTerm = sanitizeSearchTerm(rawMessage);
        } else if (topicSelect) {
          var selectedOption = topicSelect.options[topicSelect.selectedIndex];
          if (selectedOption && selectedOption.textContent) {
            initialTerm = sanitizeSearchTerm(selectedOption.textContent);
          }
        }

        var target = 'faq.html';
        if (initialTerm) {
          target += '?q=' + encodeURIComponent(initialTerm);
        }
        window.location.href = target;
      }

      function escapeHtml(str) {
        if (str === null || str === undefined) {
          return '';
        }
        return String(str).replace(/[&<>"']/g, function(ch) {
          if (ch === '&') return '&amp;';
          if (ch === '<') return '&lt;';
          if (ch === '>') return '&gt;';
          if (ch === '"') return '&quot;';
          if (ch === '\'') return '&#39;';
          return ch;
        });
      }

      function sanitizeSearchTerm(str) {
        if (!str) {
          return '';
        }
        var singleLine = str.replace(/\s+/g, ' ').trim();
        if (singleLine.length <= 80) {
          return singleLine;
        }
        return singleLine.slice(0, 80).trim();
      }
    });
  </script>
</body>
