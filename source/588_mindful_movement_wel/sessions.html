<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Celf – Mindful Movement</title>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500&amp;display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='sessions.css'>
</head>
<body>
    <div class='app-shell'>
        <aside class='sidebar' role='banner'>
            <header class='site-header'>
                <div class='logo' aria-label='Celf logo'>celf</div>
                <nav class='site-nav' aria-label='Primary navigation'>
                    <a href='index.html' class='nav-btn nav-btn-secondary'>Home</a>
                    <a href='sessions.html' class='nav-btn nav-btn-primary is-active'>Sessions</a>
                    <a href='routine_builder.html' class='nav-btn nav-btn-secondary'>Build Routine</a>
                    <a href='instructors.html' class='nav-btn nav-btn-secondary'>Instructors</a>
                    <a href='resources.html' class='nav-btn nav-btn-secondary'>Resources</a>
                    <a href='pricing.html' class='nav-btn nav-btn-secondary'>Pricing</a>
                    <a href='workplace_wellness.html' class='nav-btn nav-btn-secondary'>For Teams</a>
                </nav>
            </header>

            <footer class='site-footer'>
                <div class='footer-meta'>
                    <p class='footer-brand'>Mindful movement, made simple.</p>
                    <p class='footer-copy'>&copy; <span class='footer-year'>2024</span> Celf. All rights reserved.</p>
                </div>
                <nav class='footer-nav' aria-label='Footer navigation'>
                    <a href='about.html'>About</a>
                    <a href='resources.html'>Resources</a>
                    <a href='reading_list.html'>Reading List</a>
                    <a href='reminders_demo.html'>Reminders Demo</a>
                    <a href='workplace_wellness.html'>Workplace Wellness</a>
                    <a href='corporate_inquiry.html'>Corporate Inquiry</a>
                    <a href='pricing.html'>Pricing</a>
                    <a href='terms.html'>Terms of Use</a>
                    <a href='privacy.html'>Privacy Policy</a>
                </nav>
            </footer>
        </aside>

        <div class='hero-shell'>
            <section class='hero' aria-label='Page hero'>
                <div class='hero-accent-line'></div>
                <div class='hero-floating-card'></div>
                <main id='content' class='hero-content' role='main'>
                    <div class='sessions-layout' data-component='sessions-page' data-populate='sessions-page'>
                        <!-- Left sidebar: initializer + filters -->
                        <aside class='sessions-sidebar-card' data-component='sessions-filter-sidebar' aria-label='Session filters'>
                            <header class='sessions-header' data-component='sessions-page-initializer'>
                                <!-- Populated via JS with title and result summary -->
                            </header>

                            <div class='sessions-filters-body'>
                                <section class='filter-group filter-group-level'>
                                    <h2 class='filter-group-title'>Level</h2>
                                    <div class='filter-options filter-options-levels' aria-label='Filter by level'>
                                        <!-- Level options injected here -->
                                    </div>
                                </section>

                                <section class='filter-group filter-group-duration'>
                                    <h2 class='filter-group-title'>Duration</h2>
                                    <div class='filter-options filter-options-duration-ranges' aria-label='Filter by duration range'>
                                        <!-- Duration range options injected here -->
                                    </div>
                                    <div class='filter-custom-duration'>
                                        <div class='filter-custom-duration-row'>
                                            <label for='customDurationMin' class='filter-label'>Min (min)</label>
                                            <input id='customDurationMin' type='number' min='1' step='1' inputmode='numeric' class='filter-input filter-input-number' placeholder='Any' data-action='filter-duration-min'>
                                        </div>
                                        <div class='filter-custom-duration-row'>
                                            <label for='customDurationMax' class='filter-label'>Max (min)</label>
                                            <input id='customDurationMax' type='number' min='1' step='1' inputmode='numeric' class='filter-input filter-input-number' placeholder='Any' data-action='filter-duration-max'>
                                        </div>
                                    </div>
                                </section>

                                <section class='filter-group filter-group-focus'>
                                    <h2 class='filter-group-title'>Focus areas</h2>
                                    <div class='filter-options filter-options-focus' aria-label='Filter by focus areas'>
                                        <!-- Focus options injected here -->
                                    </div>
                                </section>

                                <section class='filter-group filter-group-tags'>
                                    <h2 class='filter-group-title'>Tags</h2>
                                    <div class='filter-options filter-options-tags' aria-label='Filter by tags'>
                                        <!-- Tag options injected here -->
                                    </div>
                                </section>
                            </div>

                            <footer class='sessions-filters-footer'>
                                <button type='button' class='btn btn-ghost btn-clear-filters' data-action='clear-all-filters'>Clear all filters</button>
                            </footer>
                        </aside>

                        <!-- Right column: search, active filters, list, pagination -->
                        <section class='sessions-main-column' aria-label='Sessions results'>
                            <div class='sessions-top-row'>
                                <div class='sessions-search' data-component='sessions-search-form'>
                                    <!-- Search form injected via JS -->
                                </div>
                                <div class='sessions-sort' data-component='sessions-sort-control'>
                                    <!-- Sort control injected via JS -->
                                </div>
                            </div>

                            <div class='sessions-active-filters-bar' data-component='sessions-active-filters' aria-label='Active filters'>
                                <!-- Active filter chips injected via JS -->
                            </div>

                            <section class='sessions-results-section'>
                                <div class='sessions-grid' data-component='sessions-list' aria-live='polite'>
                                    <!-- Session cards injected via JS -->
                                </div>
                                <div class='sessions-empty-state' data-component='sessions-empty-state' hidden>
                                    <!-- Empty state injected via JS when no results -->
                                </div>
                            </section>

                            <nav class='sessions-pagination' data-component='sessions-pagination' aria-label='Sessions pagination'>
                                <!-- Pagination controls injected via JS -->
                            </nav>
                        </section>
                    </div>
                </main>
            </section>
        </div>
    </div>

    <script src='business_logic.js'></script>
    <script>
    (function() {
        'use strict';

        const DEFAULT_PAGE_SIZE = 12;
        let filterOptions = null;
        let lastSearchResponse = null;

        function escapeHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getFilterOptions() {
            if (filterOptions) return filterOptions;
            try {
                filterOptions = WebsiteSDK.getSessionsFilterOptions();
            } catch (err) {
                console.error('Error loading session filter options', err);
                filterOptions = {
                    levels: [],
                    duration_ranges: [],
                    focus_areas: [],
                    tags: [],
                    sort_options: [],
                    default_sort: 'most_popular'
                };
            }
            return filterOptions;
        }

        function parseUrlState() {
            const url = new URL(window.location.href);
            const params = url.searchParams;

            const level = params.get('level') || '';
            const durationMin = params.get('duration_min');
            const durationMax = params.get('duration_max');
            const tagParam = params.get('tag') || '';
            const focusParam = params.get('focus') || '';
            const sortBy = params.get('sortBy') || '';
            const q = params.get('q') || '';
            const pageRaw = params.get('page');
            const page = pageRaw ? Math.max(1, parseInt(pageRaw, 10) || 1) : 1;

            const tags = tagParam
                .split(',')
                .map(function(t) { return t.trim(); })
                .filter(function(t) { return t.length > 0; });

            const focusAreas = focusParam
                .split(',')
                .map(function(f) { return f.trim(); })
                .filter(function(f) { return f.length > 0; });

            return {
                level: level,
                durationMin: durationMin ? parseInt(durationMin, 10) : null,
                durationMax: durationMax ? parseInt(durationMax, 10) : null,
                tags: tags,
                focusAreas: focusAreas,
                sortBy: sortBy,
                q: q,
                page: page
            };
        }

        function buildFiltersFromState(state) {
            const filters = {};

            if (state.level) {
                filters.levels = [state.level];
            }
            if (typeof state.durationMin === 'number' && !isNaN(state.durationMin)) {
                filters.minDurationMinutes = state.durationMin;
            }
            if (typeof state.durationMax === 'number' && !isNaN(state.durationMax)) {
                filters.maxDurationMinutes = state.durationMax;
            }
            if (state.focusAreas && state.focusAreas.length > 0) {
                filters.focusAreas = state.focusAreas.slice();
            }
            if (state.tags && state.tags.length > 0) {
                filters.tags = state.tags.slice();
            }

            return filters;
        }

        function resolveSortBy(requestedSortBy) {
            const opts = getFilterOptions();
            var sortValue = opts.default_sort || 'most_popular';

            if (requestedSortBy) {
                var available = (opts.sort_options || []).some(function(o) { return o.value === requestedSortBy; });
                if (available) {
                    sortValue = requestedSortBy;
                }
            }
            return sortValue;
        }

        function applyUrlMutation(mutator) {
            const url = new URL(window.location.href);
            const params = url.searchParams;
            mutator(params);
            url.search = params.toString();
            window.history.pushState({}, '', url.toString());
            handleUrlChange();
        }

        function getLevelLabel(levelValue) {
            const opts = getFilterOptions();
            const match = (opts.levels || []).find(function(l) { return l.value === levelValue; });
            return match ? match.label : (levelValue || 'All levels');
        }

        function getDurationRangeByBounds(min, max) {
            const opts = getFilterOptions();
            var ranges = opts.duration_ranges || [];
            for (var i = 0; i < ranges.length; i++) {
                var r = ranges[i];
                var rMin = typeof r.min_minutes === 'number' ? r.min_minutes : null;
                var rMax = typeof r.max_minutes === 'number' ? r.max_minutes : null;
                if (rMin === min && rMax === max) {
                    return r;
                }
            }
            return null;
        }

        function getFocusLabel(value) {
            const opts = getFilterOptions();
            const match = (opts.focus_areas || []).find(function(f) { return f.value === value; });
            return match ? match.label : value;
        }

        function getTagLabel(value) {
            const opts = getFilterOptions();
            const match = (opts.tags || []).find(function(t) { return t.value === value; });
            return match ? match.label : value;
        }

        function renderPageInitializer(container, state, searchResponse) {
            var total = searchResponse && typeof searchResponse.total === 'number' ? searchResponse.total : 0;
            var q = state.q || '';
            var summaryLabel;

            if (total === 0) {
                summaryLabel = 'No sessions match the current view';
            } else if (total === 1) {
                summaryLabel = '1 session matches the current view';
            } else {
                summaryLabel = total + ' sessions match the current view';
            }

            var queryLabel = q ? (' for \'' + escapeHtml(q) + '\'') : '';

            container.innerHTML = `
                <div class="sessions-header-text">
                    <p class="sessions-header-kicker">Browse</p>
                    <h1 class="sessions-header-title">Sessions</h1>
                    <p class="sessions-header-subtitle">Explore mindful movement sessions by level, time, and focus.</p>
                </div>
                <div class="sessions-header-meta" aria-live="polite">
                    <p class="sessions-header-count">${escapeHtml(summaryLabel)}${escapeHtml(queryLabel)}</p>
                </div>
            `;
        }

        function renderFilterSidebar(container, state) {
            const opts = getFilterOptions();

            var levelsHtml = (opts.levels || []).map(function(levelOpt) {
                var checked = state.level === levelOpt.value ? ' checked' : '';
                return `
                    <label class="filter-pill">
                        <input type="radio" name="level" value="${escapeHtml(levelOpt.value)}" data-action="filter-level"${checked}>
                        <span>${escapeHtml(levelOpt.label)}</span>
                    </label>
                `;
            }).join('');

            var selectedRange = getDurationRangeByBounds(
                typeof state.durationMin === 'number' ? state.durationMin : null,
                typeof state.durationMax === 'number' ? state.durationMax : null
            );
            var selectedRangeId = selectedRange ? selectedRange.id : null;

            var durationRangesHtml = (opts.duration_ranges || []).map(function(range) {
                var isChecked = selectedRangeId && range.id === selectedRangeId;
                var checked = isChecked ? ' checked' : '';
                var minAttr = typeof range.min_minutes === 'number' ? ' data-min="' + range.min_minutes + '"' : ' data-min=""';
                var maxAttr = typeof range.max_minutes === 'number' ? ' data-max="' + range.max_minutes + '"' : ' data-max=""';
                return `
                    <label class="filter-pill">
                        <input type="radio" name="duration_range" value="${escapeHtml(range.id)}" data-action="filter-duration-range"${minAttr}${maxAttr}${checked}>
                        <span>${escapeHtml(range.label)}</span>
                    </label>
                `;
            }).join('');

            var focusHtml = (opts.focus_areas || []).map(function(focus) {
                var checked = state.focusAreas.indexOf(focus.value) !== -1 ? ' checked' : '';
                return `
                    <label class="filter-checkbox">
                        <input type="checkbox" value="${escapeHtml(focus.value)}" data-action="filter-focus"${checked}>
                        <span>${escapeHtml(focus.label)}</span>
                    </label>
               `;
            }).join('');

            var tagsHtml = (opts.tags || []).map(function(tag) {
                var checked = state.tags.indexOf(tag.value) !== -1 ? ' checked' : '';
                return `
                    <label class="filter-checkbox">
                        <input type="checkbox" value="${escapeHtml(tag.value)}" data-action="filter-tag"${checked}>
                        <span>${escapeHtml(tag.label)}</span>
                    </label>
                `;
            }).join('');

            var durationMinVal = typeof state.durationMin === 'number' && !isNaN(state.durationMin) ? String(state.durationMin) : '';
            var durationMaxVal = typeof state.durationMax === 'number' && !isNaN(state.durationMax) ? String(state.durationMax) : '';

            var bodyHtml = container.innerHTML;
            var tempWrapper = document.createElement('div');
            tempWrapper.innerHTML = bodyHtml;

            var levelsContainer = tempWrapper.querySelector('.filter-options-levels');
            var durationRangesContainer = tempWrapper.querySelector('.filter-options-duration-ranges');
            var focusContainer = tempWrapper.querySelector('.filter-options-focus');
            var tagsContainer = tempWrapper.querySelector('.filter-options-tags');

            if (!levelsContainer || !durationRangesContainer || !focusContainer || !tagsContainer) {
                // If structure not yet in place (first render), reconstruct body fully
                container.innerHTML = `
                    <div class="sessions-filters-body">
                        <section class="filter-group filter-group-level">
                            <h2 class="filter-group-title">Level</h2>
                            <div class="filter-options filter-options-levels" aria-label="Filter by level">' + levelsHtml + '</div>
                        </section>
                        <section class="filter-group filter-group-duration">
                            <h2 class="filter-group-title">Duration</h2>
                            <div class="filter-options filter-options-duration-ranges" aria-label="Filter by duration range">' + durationRangesHtml + '</div>
                            <div class="filter-custom-duration">
                                <div class="filter-custom-duration-row">
                                    <label for="customDurationMin" class="filter-label">Min (min)</label>
                                    <input id="customDurationMin" type="number" min="1" step="1" inputmode="numeric" class="filter-input filter-input-number" placeholder="Any" data-action="filter-duration-min" value="' + escapeHtml(durationMinVal) + '">
                                </div>
                                <div class="filter-custom-duration-row">
                                    <label for="customDurationMax" class="filter-label">Max (min)</label>
                                    <input id="customDurationMax" type="number" min="1" step="1" inputmode="numeric" class="filter-input filter-input-number" placeholder="Any" data-action="filter-duration-max" value="' + escapeHtml(durationMaxVal) + '">
                                </div>
                            </div>
                        </section>
                        <section class="filter-group filter-group-focus">
                            <h2 class="filter-group-title">Focus areas</h2>
                            <div class="filter-options filter-options-focus" aria-label="Filter by focus areas">' + focusHtml + '</div>
                        </section>
                        <section class="filter-group filter-group-tags">
                            <h2 class="filter-group-title">Tags</h2>
                            <div class="filter-options filter-options-tags" aria-label="Filter by tags">' + tagsHtml + '</div>
                        </section>
                    </div>
               `;
            } else {
                levelsContainer.innerHTML = levelsHtml;
                durationRangesContainer.innerHTML = durationRangesHtml;
                focusContainer.innerHTML = focusHtml;
                tagsContainer.innerHTML = tagsHtml;

                var minInput = container.querySelector('#customDurationMin');
                var maxInput = container.querySelector('#customDurationMax');
                if (minInput) minInput.value = durationMinVal;
                if (maxInput) maxInput.value = durationMaxVal;
            }
        }

        function renderSearchForm(container, state) {
            var q = state.q || '';
            container.innerHTML = `
                <form class="sessions-search-form" data-action="search-form" role="search" aria-label="Search sessions">
                    <label class="visually-hidden" for="sessionsSearchInput">Search sessions</label>
                    <input id="sessionsSearchInput" name="q" type="search" class="sessions-search-input" placeholder="Search by focus, level, or instructor" value="' + escapeHtml(q) + '">
                    <div class="sessions-search-actions">
                        <button type="submit" class="btn btn-primary">Search</button>
                        ' + (q ? '<button type="button" class="btn btn-ghost" data-action="clear-search">Clear</button>' : '') + '
                    </div>
                </form>
           `;
        }

        function renderSortControl(container, state, searchResponse) {
            const opts = getFilterOptions();
            const appliedSort = (searchResponse && searchResponse.applied_sort) ? searchResponse.applied_sort : resolveSortBy(state.sortBy);
            var optionsHtml = (opts.sort_options || []).map(function(opt) {
                var selected = opt.value === appliedSort ? ' selected' : '';
                return '<option value="' + escapeHtml(opt.value) + '"' + selected + '>' + escapeHtml(opt.label) + '</option>';
            }).join('');

            container.innerHTML = `
                <label class="sessions-sort-label" for="sessionsSortSelect">Sort</label>
                <select id="sessionsSortSelect" class="sessions-sort-select" data-action="sort-change">
                    ' + optionsHtml + '
                </select>
           `;
        }

        function renderActiveFilters(container, state) {
            var hasAnyFilter = !!(state.level || state.durationMin || state.durationMax || (state.tags && state.tags.length) || (state.focusAreas && state.focusAreas.length));
            var chips = [];

            if (state.level) {
                chips.push({
                    key: 'level',
                    value: state.level,
                    label: 'Level: ' + getLevelLabel(state.level)
                });
            }

            if (state.durationMin || state.durationMax) {
                var label;
                var rangeMatch = null;
                if (typeof state.durationMin === 'number' || typeof state.durationMax === 'number') {
                    rangeMatch = getDurationRangeByBounds(
                        typeof state.durationMin === 'number' ? state.durationMin : null,
                        typeof state.durationMax === 'number' ? state.durationMax : null
                    );
                }
                if (rangeMatch) {
                    label = 'Duration: ' + rangeMatch.label;
                } else {
                    var parts = [];
                    if (state.durationMin) parts.push('min ' + state.durationMin + ' min');
                    if (state.durationMax) parts.push('max ' + state.durationMax + ' min');
                    label = 'Duration: ' + parts.join(', ');
                }
                chips.push({
                    key: 'duration',
                    value: 'custom',
                    label: label
                });
            }

            (state.focusAreas || []).forEach(function(focus) {
                chips.push({
                    key: 'focus',
                    value: focus,
                    label: getFocusLabel(focus)
                });
            });

            (state.tags || []).forEach(function(tag) {
                chips.push({
                    key: 'tag',
                    value: tag,
                    label: getTagLabel(tag)
                });
            });

            if (!hasAnyFilter) {
                container.innerHTML = '<p class="active-filters-empty">Filters: none</p>';
                return;
            }

            var chipsHtml = chips.map(function(chip) {
                return `
                    <button type="button" class="active-filter-chip" data-action="remove-filter" data-filter-key="' + escapeHtml(chip.key) + '" data-filter-value="' + escapeHtml(chip.value) + '">
                        <span class="active-filter-label">' + escapeHtml(chip.label) + '</span>
                        <span class="active-filter-remove" aria-hidden="true">×</span>
                        <span class="visually-hidden">Remove filter ' + escapeHtml(chip.label) + '</span>
                    </button>
               `;
            }).join('');

            container.innerHTML = `
                <div class="active-filters-inner">
                    <div class="active-filters-chips">' + chipsHtml + '</div>
                    <button type="button" class="btn btn-ghost btn-clear-filters" data-action="clear-all-filters">Clear all</button>
                </div>
           `;
        }

        function renderSessionsOrEmpty(listContainer, emptyContainer, state, searchResponse) {
            if (!searchResponse) {
                listContainer.innerHTML = '';
                emptyContainer.innerHTML = '';
                emptyContainer.hidden = false;
                return;
            }

            var total = typeof searchResponse.total === 'number' ? searchResponse.total : 0;
            var sessions = Array.isArray(searchResponse.sessions) ? searchResponse.sessions : [];

            if (total === 0 || sessions.length === 0) {
                listContainer.innerHTML = '';
                listContainer.hidden = true;
                renderEmptyState(emptyContainer, state);
                emptyContainer.hidden = false;
                return;
            }

            emptyContainer.hidden = true;
            emptyContainer.innerHTML = '';
            listContainer.hidden = false;

            var cardsHtml = sessions.map(function(session) {
                var levelLabel = getLevelLabel(session.level);
                var durationLabel = session.duration_minutes ? (session.duration_minutes + ' min') : '';
                var focusLabels = (session.focus_areas || []).map(getFocusLabel).join(' • ');
                var tagLabels = (session.tags || []).map(getTagLabel).join(', ');
                var ratingText = '';
                if (typeof session.rating === 'number') {
                    ratingText = session.rating.toFixed(1);
                    if (typeof session.rating_count === 'number' && session.rating_count > 0) {
                        ratingText += ' · ' + session.rating_count + ' ratings';
                    }
                }

                var downloadLabel = session.is_downloadable_offline ? 'Offline ready' : '';

                return `
                    <article class="session-card" data-action="open-session" data-session-id="${escapeHtml(session.session_id)}" tabindex="0">
                        <div class="session-card-media">
                            ${session.thumbnail_image_url ? '<img src="' + escapeHtml(session.thumbnail_image_url) + '" alt="" loading="lazy" class="session-card-thumbnail">' : '<div class="session-card-thumbnail session-card-thumbnail-placeholder"></div>'}
                        </div>
                        <div class="session-card-body">
                            <header class="session-card-header">
                                <h3 class="session-card-title">${escapeHtml(session.title)}</h3>
                                ${session.subtitle ? '<p class="session-card-subtitle">' + escapeHtml(session.subtitle) + '</p>' : ''}
                            </header>
                            <div class="session-card-meta">
                                <span class="session-meta-item">${escapeHtml(levelLabel)}</span>
                                ${durationLabel ? '<span class="session-meta-separator">•</span><span class="session-meta-item">' + escapeHtml(durationLabel) + '</span>' : ''}
                                ${session.instructor_name ? '<span class="session-meta-separator">•</span><span class="session-meta-item">' + escapeHtml(session.instructor_name) + '</span>' : ''}
                            </div>
                            ${focusLabels ? '<p class="session-card-focus">' + escapeHtml(focusLabels) + '</p>' : ''}
                            ${tagLabels ? '<p class="session-card-tags">' + escapeHtml(tagLabels) + '</p>' : ''}
                            <div class="session-card-footer">
                                ${ratingText ? '<span class="session-card-rating">' + escapeHtml(ratingText) + '</span>' : '<span class="session-card-rating session-card-rating-unrated">Not yet rated</span>'}
                                ${downloadLabel ? '<span class="session-card-downloadable">' + escapeHtml(downloadLabel) + '</span>' : ''}
                            </div>
                        </div>
                    </article>
               `;
            }).join('');

            listContainer.innerHTML = cardsHtml;
        }

        function renderEmptyState(container, state) {
            var q = state.q || '';
            var hasFilters = !!(state.level || state.durationMin || state.durationMax || (state.tags && state.tags.length) || (state.focusAreas && state.focusAreas.length));

            var title = 'No sessions found';
            var descriptionParts = [];
            if (q) {
                descriptionParts.push('We couldn\'t find any sessions matching your search for \'' + escapeHtml(q) + '\'.');
            }
            if (hasFilters) {
                descriptionParts.push('Try clearing one or more filters to widen your view.');
            } else if (!q) {
                descriptionParts.push('Try adjusting your search or check back soon for new sessions.');
            }

            container.innerHTML = `
                <div class="empty-state-card">
                    <div class="empty-state-icon" aria-hidden="true"></div>
                    <h2 class="empty-state-title">' + title + '</h2>
                    <p class="empty-state-body">' + descriptionParts.join(' ') + '</p>
                    <div class="empty-state-actions">
                        ' + (hasFilters ? '<button type="button" class="btn btn-primary" data-action="empty-clear-filters">Clear all filters</button>' : '') + '
                        <button type="button" class="btn btn-ghost" data-action="empty-modify-search">Adjust search</button>
                    </div>
                </div>
           `;
        }

        function renderPagination(container, state, searchResponse) {
            container.innerHTML = '';
            if (!searchResponse) return;

            var total = typeof searchResponse.total === 'number' ? searchResponse.total : 0;
            var pageSize = typeof searchResponse.page_size === 'number' && searchResponse.page_size > 0 ? searchResponse.page_size : DEFAULT_PAGE_SIZE;
            var currentPage = typeof searchResponse.page === 'number' && searchResponse.page > 0 ? searchResponse.page : state.page || 1;

            if (total <= pageSize) {
                return;
            }

            var totalPages = Math.max(1, Math.ceil(total / pageSize));
            if (currentPage > totalPages) currentPage = totalPages;

            var buttonsHtml = '';

            var prevDisabled = currentPage <= 1 ? ' disabled' : '';
            buttonsHtml += '<button type="button" class="pagination-btn" data-action="prev-page"' + prevDisabled + '>Previous</button>';

            for (var i = 1; i <= totalPages; i++) {
                var isActive = i === currentPage;
                buttonsHtml += '<button type="button" class="pagination-btn' + (isActive ? ' is-active' : '') + '" data-action="page-change" data-page="' + i + '">' + i + '</button>';
            }

            var nextDisabled = currentPage >= totalPages || !searchResponse.has_more ? ' disabled' : '';
            buttonsHtml += '<button type="button" class="pagination-btn" data-action="next-page"' + nextDisabled + '>Next</button>';

            container.innerHTML = '<div class="pagination-inner">' + buttonsHtml + '</div>';
        }

        function renderSessionsPage(root, state, searchResponse) {
            var sidebar = root.querySelector('[data-component="sessions-filter-sidebar"]');
            var initializer = root.querySelector('[data-component="sessions-page-initializer"]');
            var searchFormContainer = root.querySelector('[data-component="sessions-search-form"]');
            var sortControlContainer = root.querySelector('[data-component="sessions-sort-control"]');
            var activeFiltersContainer = root.querySelector('[data-component="sessions-active-filters"]');
            var listContainer = root.querySelector('[data-component="sessions-list"]');
            var emptyStateContainer = root.querySelector('[data-component="sessions-empty-state"]');
            var paginationContainer = root.querySelector('[data-component="sessions-pagination"]');

            if (initializer) renderPageInitializer(initializer, state, searchResponse);
            if (sidebar) renderFilterSidebar(sidebar, state);
            if (searchFormContainer) renderSearchForm(searchFormContainer, state);
            if (sortControlContainer) renderSortControl(sortControlContainer, state, searchResponse);
            if (activeFiltersContainer) renderActiveFilters(activeFiltersContainer, state);
            if (listContainer && emptyStateContainer) renderSessionsOrEmpty(listContainer, emptyStateContainer, state, searchResponse);
            if (paginationContainer) renderPagination(paginationContainer, state, searchResponse);
        }

        function performSearchAndRender() {
            const root = document.querySelector('[data-component="sessions-page"]');
            if (!root) return;

            const state = parseUrlState();
            const sortBy = resolveSortBy(state.sortBy);
            const filters = buildFiltersFromState(state);

            var response;
            try {
                response = WebsiteSDK.searchSessions(state.q || '', filters, sortBy, state.page || 1, DEFAULT_PAGE_SIZE);
            } catch (err) {
                console.error('Error searching sessions', err);
                response = {
                    sessions: [],
                    total: 0,
                    page: state.page || 1,
                    page_size: DEFAULT_PAGE_SIZE,
                    has_more: false,
                    applied_sort: sortBy
                };
            }

            lastSearchResponse = response;
            renderSessionsPage(root, state, response);
        }

        function handleUrlChange() {
            getFilterOptions();
            performSearchAndRender();
        }

        function setupEventHandlers(root) {
            root.addEventListener('submit', function(event) {
                var form = event.target;
                if (!form || form.dataset.action !== 'search-form') return;
                event.preventDefault();
                var formData = new FormData(form);
                var q = (formData.get('q') || '').toString().trim();

                applyUrlMutation(function(params) {
                    if (q) {
                        params.set('q', q);
                    } else {
                        params.delete('q');
                    }
                    params.delete('page');
                });
            });

            root.addEventListener('change', function(event) {
                var target = event.target;
                var action = target && target.dataset ? target.dataset.action : null;
                if (!action) return;

                if (action === 'filter-level') {
                    var value = target.value;
                    applyUrlMutation(function(params) {
                        if (value) {
                            params.set('level', value);
                        } else {
                            params.delete('level');
                        }
                        params.delete('page');
                    });
                } else if (action === 'filter-duration-range') {
                    var minAttr = target.getAttribute('data-min');
                    var maxAttr = target.getAttribute('data-max');
                    applyUrlMutation(function(params) {
                        if (minAttr && minAttr !== '') {
                            params.set('duration_min', minAttr);
                        } else {
                            params.delete('duration_min');
                        }
                        if (maxAttr && maxAttr !== '') {
                            params.set('duration_max', maxAttr);
                        } else {
                            params.delete('duration_max');
                        }
                        params.delete('page');
                    });
                } else if (action === 'filter-duration-min' || action === 'filter-duration-max') {
                    applyUrlMutation(function(params) {
                        var minInput = root.querySelector('input[data-action="filter-duration-min"]');
                        var maxInput = root.querySelector('input[data-action="filter-duration-max"]');
                        var minVal = minInput && minInput.value ? parseInt(minInput.value, 10) : NaN;
                        var maxVal = maxInput && maxInput.value ? parseInt(maxInput.value, 10) : NaN;

                        if (!isNaN(minVal)) {
                            params.set('duration_min', String(minVal));
                        } else {
                            params.delete('duration_min');
                        }

                        if (!isNaN(maxVal)) {
                            params.set('duration_max', String(maxVal));
                        } else {
                            params.delete('duration_max');
                        }

                        params.delete('page');
                    });
                } else if (action === 'filter-focus') {
                    applyUrlMutation(function(params) {
                        var value = target.value;
                        var existing = (params.get('focus') || '').split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v.length > 0; });
                        if (target.checked) {
                            if (existing.indexOf(value) === -1) existing.push(value);
                        } else {
                            existing = existing.filter(function(v) { return v !== value; });
                        }
                        if (existing.length) {
                            params.set('focus', existing.join(','));
                        } else {
                            params.delete('focus');
                        }
                        params.delete('page');
                    });
                } else if (action === 'filter-tag') {
                    applyUrlMutation(function(params) {
                        var value = target.value;
                        var existing = (params.get('tag') || '').split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v.length > 0; });
                        if (target.checked) {
                            if (existing.indexOf(value) === -1) existing.push(value);
                        } else {
                            existing = existing.filter(function(v) { return v !== value; });
                        }
                        if (existing.length) {
                            params.set('tag', existing.join(','));
                        } else {
                            params.delete('tag');
                        }
                        params.delete('page');
                    });
                } else if (action === 'sort-change') {
                    var sortValue = target.value;
                    applyUrlMutation(function(params) {
                        if (sortValue) {
                            params.set('sortBy', sortValue);
                        } else {
                            params.delete('sortBy');
                        }
                        params.delete('page');
                    });
                }
            });

            root.addEventListener('click', function(event) {
                var target = event.target.closest('[data-action]');
                if (!target) return;
                var action = target.dataset.action;

                if (action === 'clear-search') {
                    event.preventDefault();
                    applyUrlMutation(function(params) {
                        params.delete('q');
                        params.delete('page');
                    });
                } else if (action === 'clear-all-filters' || action === 'empty-clear-filters') {
                    event.preventDefault();
                    applyUrlMutation(function(params) {
                        params.delete('level');
                        params.delete('duration_min');
                        params.delete('duration_max');
                        params.delete('tag');
                        params.delete('focus');
                        params.delete('page');
                    });
                } else if (action === 'remove-filter') {
                    event.preventDefault();
                    var key = target.dataset.filterKey;
                    var value = target.dataset.filterValue;
                    applyUrlMutation(function(params) {
                        if (key === 'focus' || key === 'tag') {
                            var current = (params.get(key) || '').split(',').map(function(v) { return v.trim(); }).filter(function(v) { return v.length > 0; });
                            current = current.filter(function(v) { return v !== value; });
                            if (current.length) {
                                params.set(key, current.join(','));
                            } else {
                                params.delete(key);
                            }
                        } else if (key === 'duration') {
                            params.delete('duration_min');
                            params.delete('duration_max');
                        } else if (key === 'level') {
                            params.delete('level');
                        }
                        params.delete('page');
                    });
                } else if (action === 'page-change') {
                    event.preventDefault();
                    var page = parseInt(target.dataset.page, 10) || 1;
                    applyUrlMutation(function(params) {
                        params.set('page', String(page));
                    });
                } else if (action === 'prev-page') {
                    event.preventDefault();
                    applyUrlMutation(function(params) {
                        var current = parseInt(params.get('page') || '1', 10) || 1;
                        var next = Math.max(1, current - 1);
                        params.set('page', String(next));
                    });
                } else if (action === 'next-page') {
                    event.preventDefault();
                    applyUrlMutation(function(params) {
                        var current = parseInt(params.get('page') || '1', 10) || 1;
                        var totalPages = 1;
                        if (lastSearchResponse && typeof lastSearchResponse.total === 'number') {
                            var ps = typeof lastSearchResponse.page_size === 'number' && lastSearchResponse.page_size > 0 ? lastSearchResponse.page_size : DEFAULT_PAGE_SIZE;
                            totalPages = Math.max(1, Math.ceil(lastSearchResponse.total / ps));
                        }
                        var next = Math.min(totalPages, current + 1);
                        params.set('page', String(next));
                    });
                } else if (action === 'open-session') {
                    event.preventDefault();
                    var sessionId = target.dataset.sessionId;
                    if (sessionId) {
                        window.location.href = 'session_detail.html?sessionId=' + encodeURIComponent(sessionId);
                    }
                } else if (action === 'empty-modify-search') {
                    event.preventDefault();
                    var searchInput = root.querySelector('#sessionsSearchInput');
                    if (searchInput) {
                        searchInput.focus();
                        searchInput.select();
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const root = document.querySelector('[data-component="sessions-page"]');
            if (!root) return;

            getFilterOptions();
            setupEventHandlers(root);
            handleUrlChange();

            window.addEventListener('popstate', function() {
                handleUrlChange();
            });
        });
    })();
    </script>
</body>
</html>
