<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Biomarker Browser - Digital Pathology Image Analysis Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="analytics_biomarker_browser.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="site-branding">
                <span class="site-title">Digital Pathology Image Analysis</span>
            </div>
            <nav class="site-nav" aria-label="Primary navigation">
                <ul>
                    <li><a href="index.html">Dashboard</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="slide_library.html">Slide Library</a></li>
                    <li><a href="analytics_biomarker_browser.html">Analytics</a></li>
                    <li><a href="collections.html">Collections</a></li>
                    <li><a href="cohorts.html">Cohorts</a></li>
                    <li><a href="algorithms.html">Algorithms</a></li>
                    <li><a href="qc_dashboard.html">QC</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-content" role="main">
        <div class="biomarker-page">
            <section class="filter-toolbar" data-component="biomarker-filter-toolbar">
                <h1>Biomarker Browser</h1>
                <form id="biomarkerFilterForm">
                    <div class="filter-row">
                        <label for="diseaseFilter">Disease</label>
                        <select id="diseaseFilter" name="disease" data-populate="disease-options">
                            <option value="">Any</option>
                        </select>
                    </div>
                    <div class="filter-row">
                        <label for="stainFilter">Stain</label>
                        <select id="stainFilter" name="stain" data-populate="stain-options">
                            <option value="">Any</option>
                        </select>
                    </div>
                    <div class="filter-row">
                        <label for="biomarkerFilter">Biomarker</label>
                        <select id="biomarkerFilter" name="biomarker" data-populate="biomarker-options">
                            <option value="">Any</option>
                        </select>
                    </div>
                    <div class="filter-row">
                        <label for="minPercentageInput">Min %</label>
                        <input type="number" id="minPercentageInput" name="minPercentage" min="0" max="100" step="0.1">
                    </div>
                    <div class="filter-row">
                        <label for="maxPercentageInput">Max %</label>
                        <input type="number" id="maxPercentageInput" name="maxPercentage" min="0" max="100" step="0.1">
                    </div>
                    <div class="filter-actions">
                        <button type="submit" data-action="apply-filters">Apply filters</button>
                        <button type="button" data-action="reset-filters">Reset filters</button>
                    </div>
                </form>
            </section>

            <section class="results-summary-section" data-component="biomarker-results-summary">
                <div id="resultsSummary" data-populate="results-summary"></div>
            </section>

            <section class="results-table-section" data-component="biomarker-results-table">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th scope="col">
                                <input type="checkbox" data-action="select-all-on-page" aria-label="Select all slides on this page">
                            </th>
                            <th scope="col">Thumbnail</th>
                            <th scope="col">
                                <button type="button" data-action="sort" data-sort-field="case_id">Case ID</button>
                            </th>
                            <th scope="col">Organ</th>
                            <th scope="col">Disease</th>
                            <th scope="col">Diagnosis</th>
                            <th scope="col">
                                <button type="button" data-action="sort" data-sort-field="pd_l1_percentage">PD-L1 %</button>
                            </th>
                            <th scope="col">Stain</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody" data-populate="results-table">
                    </tbody>
                </table>
            </section>

            <section class="pagination-section" data-component="biomarker-pagination-controls">
                <div id="paginationControls" data-populate="pagination-controls"></div>
            </section>

            <section class="selection-summary-section" data-component="biomarker-selection-manager">
                <div id="selectionSummary" data-populate="selection-summary"></div>
            </section>

            <section class="collection-actions-section" data-component="biomarker-collection-actions-panel">
                <div id="collectionActions" data-populate="collection-actions"></div>
            </section>

            <div id="collectionDialogOverlay" data-component="biomarker-collection-dialog" hidden>
                <div class="collection-dialog-backdrop" data-action="close-collection-dialog"></div>
                <div class="collection-dialog" role="dialog" aria-modal="true" aria-labelledby="collectionDialogTitle">
                    <h2 id="collectionDialogTitle">Add to collection</h2>
                    <div class="collection-dialog-body">
                        <p id="collectionDialogMessage"></p>
                        <p id="collectionDialogError" class="collection-dialog-error" aria-live="polite"></p>

                        <div id="collectionDialogCreateFields">
                            <label for="newCollectionName">Collection name</label>
                            <input type="text" id="newCollectionName" name="newCollectionName">
                            <label for="newCollectionDescription">Description (optional)</label>
                            <textarea id="newCollectionDescription" name="newCollectionDescription" rows="3"></textarea>
                        </div>

                        <div id="collectionDialogExistingFields">
                            <label for="existingCollectionSelect">Existing collection</label>
                            <select id="existingCollectionSelect" name="collectionId">
                                <option value="">Select collection</option>
                            </select>
                        </div>

                        <div id="collectionDialogSuccess" hidden></div>
                    </div>
                    <div class="collection-dialog-actions">
                        <button type="button" data-action="collection-dialog-submit">Confirm</button>
                        <button type="button" data-action="collection-dialog-cancel">Cancel</button>
                        <button type="button" data-action="collection-dialog-view-collection" hidden>View collection</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul>
                    <li><a href="about.html">About</a></li>
                    <li><a href="help.html">Help &amp; User Guide</a></li>
                </ul>
            </nav>
            <p class="footer-meta">Digital pathology image analysis platform</p>
        </div>
    </footer>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var biomarkerFilterOptions = null;
        var currentResults = { items: [], totalCount: 0 };
        var selectedSlideIds = new Set();
        var lastCollectionResult = null;
        var defaultPageSize = 50;

        function parseSortParam(value) {
            if (!value) {
                return null;
            }
            var parts = value.split('_');
            if (parts.length < 2) {
                return null;
            }
            var direction = parts.pop();
            var field = parts.join('_');
            if (direction !== 'asc' && direction !== 'desc') {
                return null;
            }
            return { field: field, direction: direction };
        }

        function encodeSortParam(sort) {
            if (!sort || !sort.field || !sort.direction) {
                return '';
            }
            return sort.field + '_' + sort.direction;
        }

        function parseUrlState() {
            var params = new URLSearchParams(window.location.search);
            var filters = {};

            var disease = params.get('disease') || '';
            if (disease) {
                filters.disease = disease;
            }
            var stain = params.get('stain') || '';
            if (stain) {
                filters.stain = stain;
            }
            var biomarker = params.get('biomarker') || '';
            if (biomarker) {
                filters.biomarker = biomarker;
            }
            var minPercentageStr = params.get('minPercentage');
            if (minPercentageStr !== null && minPercentageStr !== '') {
                var minVal = parseFloat(minPercentageStr);
                if (!isNaN(minVal)) {
                    filters.minPercentage = minVal;
                }
            }
            var maxPercentageStr = params.get('maxPercentage');
            if (maxPercentageStr !== null && maxPercentageStr !== '') {
                var maxVal = parseFloat(maxPercentageStr);
                if (!isNaN(maxVal)) {
                    filters.maxPercentage = maxVal;
                }
            }

            var page = parseInt(params.get('page'), 10);
            if (!page || page < 1) {
                page = 1;
            }
            var pageSize = parseInt(params.get('pageSize'), 10);
            if (!pageSize || pageSize < 1) {
                pageSize = defaultPageSize;
            }

            var sortParam = params.get('sort');
            var sort = parseSortParam(sortParam);

            return {
                filters: filters,
                page: page,
                pageSize: pageSize,
                sort: sort,
                params: params
            };
        }

        function updateUrlParams(changes, replace) {
            var url = new URL(window.location.href);
            var params = url.searchParams;
            Object.keys(changes).forEach(function(key) {
                var value = changes[key];
                if (value === null || value === undefined || value === '') {
                    params.delete(key);
                } else {
                    params.set(key, String(value));
                }
            });
            url.search = params.toString();
            if (replace) {
                window.history.replaceState({}, '', url.toString());
            } else {
                window.history.pushState({}, '', url.toString());
            }
        }

        function populateSelectOptions(selectElement, options) {
            if (!selectElement || !options || !Array.isArray(options)) {
                return;
            }
            var firstOption = null;
            if (selectElement.options.length > 0) {
                firstOption = selectElement.options[0].cloneNode(true);
            }
            while (selectElement.firstChild) {
                selectElement.removeChild(selectElement.firstChild);
            }
            if (firstOption) {
                selectElement.appendChild(firstOption);
            }
            options.forEach(function(opt) {
                var optionEl = document.createElement('option');
                optionEl.value = opt;
                optionEl.textContent = opt;
                selectElement.appendChild(optionEl);
            });
        }

        function syncFilterControlsFromState(state) {
            var filters = state.filters || {};

            var diseaseSelect = document.getElementById('diseaseFilter');
            var stainSelect = document.getElementById('stainFilter');
            var biomarkerSelect = document.getElementById('biomarkerFilter');
            var minInput = document.getElementById('minPercentageInput');
            var maxInput = document.getElementById('maxPercentageInput');

            if (diseaseSelect) {
                var diseaseValue = filters.disease || '';
                if (biomarkerFilterOptions && Array.isArray(biomarkerFilterOptions.diseases) && biomarkerFilterOptions.diseases.indexOf(diseaseValue) === -1) {
                    diseaseValue = '';
                }
                diseaseSelect.value = diseaseValue;
            }
            if (stainSelect) {
                var stainValue = filters.stain || '';
                if (biomarkerFilterOptions && Array.isArray(biomarkerFilterOptions.stains) && biomarkerFilterOptions.stains.indexOf(stainValue) === -1) {
                    stainValue = '';
                }
                stainSelect.value = stainValue;
            }
            if (biomarkerSelect) {
                var biomarkerValue = filters.biomarker || '';
                if (biomarkerFilterOptions && Array.isArray(biomarkerFilterOptions.biomarkers) && biomarkerFilterOptions.biomarkers.indexOf(biomarkerValue) === -1) {
                    biomarkerValue = '';
                }
                biomarkerSelect.value = biomarkerValue;
            }
            if (minInput) {
                if (typeof filters.minPercentage === 'number') {
                    minInput.value = String(filters.minPercentage);
                } else {
                    minInput.value = '';
                }
            }
            if (maxInput) {
                if (typeof filters.maxPercentage === 'number') {
                    maxInput.value = String(filters.maxPercentage);
                } else {
                    maxInput.value = '';
                }
            }
        }

        function renderResultsSummary(container, state, result, errorText) {
            container.innerHTML = '';
            var filters = state.filters || {};
            var totalCount = result && typeof result.totalCount === 'number' ? result.totalCount : 0;

            var summaryText = document.createElement('p');
            if (errorText) {
                summaryText.textContent = errorText;
                container.appendChild(summaryText);
                return;
            }

            summaryText.textContent = 'Showing ' + totalCount + ' slide' + (totalCount === 1 ? '' : 's');
            container.appendChild(summaryText);

            var hasFilters = false;
            var chipsWrapper = document.createElement('div');

            function addChip(field, label, value) {
                if (value === null || value === undefined || value === '') {
                    return;
                }
                hasFilters = true;
                var chipButton = document.createElement('button');
                chipButton.type = 'button';
                chipButton.dataset.action = 'remove-filter-chip';
                chipButton.dataset.filterField = field;
                chipButton.textContent = label + ': ' + value + ' ␀d7';
                chipsWrapper.appendChild(chipButton);
            }

            addChip('disease', 'Disease', filters.disease || '');
            addChip('stain', 'Stain', filters.stain || '');
            addChip('biomarker', 'Biomarker', filters.biomarker || '');
            if (typeof filters.minPercentage === 'number') {
                addChip('minPercentage', 'Min %', filters.minPercentage);
            }
            if (typeof filters.maxPercentage === 'number') {
                addChip('maxPercentage', 'Max %', filters.maxPercentage);
            }

            if (hasFilters) {
                var filtersLabel = document.createElement('p');
                filtersLabel.textContent = 'Active filters:';
                container.appendChild(filtersLabel);
                container.appendChild(chipsWrapper);
            } else {
                var noFiltersText = document.createElement('p');
                noFiltersText.textContent = 'No filters applied.';
                container.appendChild(noFiltersText);
            }
        }

        function renderResultsTable(container, items) {
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }
            if (!items || !Array.isArray(items) || items.length === 0) {
                var emptyRow = document.createElement('tr');
                var emptyCell = document.createElement('td');
                emptyCell.colSpan = 8;
                emptyCell.textContent = 'No slides found for the current filters.';
                emptyRow.appendChild(emptyCell);
                container.appendChild(emptyRow);
                return;
            }

            items.forEach(function(item) {
                var tr = document.createElement('tr');

                var selectCell = document.createElement('td');
                var checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.dataset.action = 'row-select';
                checkbox.dataset.slideId = item.slideId || '';
                if (selectedSlideIds.has(item.slideId)) {
                    checkbox.checked = true;
                }
                selectCell.appendChild(checkbox);
                tr.appendChild(selectCell);

                var thumbCell = document.createElement('td');
                if (item.thumbnailUrl) {
                    var thumbLink = document.createElement('a');
                    thumbLink.href = 'javascript:void(0)';
                    thumbLink.dataset.action = 'open-slide-viewer';
                    thumbLink.dataset.slideId = item.slideId || '';
                    var img = document.createElement('img');
                    img.src = item.thumbnailUrl;
                    img.alt = 'Slide thumbnail';
                    img.className = 'slide-thumbnail';
                    thumbLink.appendChild(img);
                    thumbCell.appendChild(thumbLink);
                }
                tr.appendChild(thumbCell);

                var caseCell = document.createElement('td');
                var caseLink = document.createElement('a');
                caseLink.href = 'javascript:void(0)';
                caseLink.dataset.action = 'open-slide-viewer';
                caseLink.dataset.slideId = item.slideId || '';
                caseLink.textContent = item.caseIdentifier || '';
                caseCell.appendChild(caseLink);
                tr.appendChild(caseCell);

                var organCell = document.createElement('td');
                organCell.textContent = item.organ || '';
                tr.appendChild(organCell);

                var diseaseCell = document.createElement('td');
                diseaseCell.textContent = item.disease || '';
                tr.appendChild(diseaseCell);

                var diagnosisCell = document.createElement('td');
                diagnosisCell.textContent = item.diagnosis || '';
                tr.appendChild(diagnosisCell);

                var pdL1Cell = document.createElement('td');
                if (typeof item.pdL1Percentage === 'number') {
                    pdL1Cell.textContent = String(item.pdL1Percentage);
                } else {
                    pdL1Cell.textContent = '';
                }
                tr.appendChild(pdL1Cell);

                var stainCell = document.createElement('td');
                stainCell.textContent = item.stain || '';
                tr.appendChild(stainCell);

                container.appendChild(tr);
            });
        }

        function renderPagination(container, state, totalCount) {
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }

            var page = state.page;
            var pageSize = state.pageSize;
            var totalPages = totalCount > 0 ? Math.ceil(totalCount / pageSize) : 1;

            var infoSpan = document.createElement('span');
            if (totalCount === 0) {
                infoSpan.textContent = 'Page 1 of 1';
            } else {
                infoSpan.textContent = 'Page ' + page + ' of ' + totalPages;
            }
            container.appendChild(infoSpan);

            var prevButton = document.createElement('button');
            prevButton.type = 'button';
            prevButton.dataset.action = 'page-prev';
            prevButton.textContent = 'Previous';
            if (page <= 1 || totalCount === 0) {
                prevButton.disabled = true;
            }
            container.appendChild(prevButton);

            var nextButton = document.createElement('button');
            nextButton.type = 'button';
            nextButton.dataset.action = 'page-next';
            nextButton.textContent = 'Next';
            if (totalCount === 0 || page >= totalPages) {
                nextButton.disabled = true;
            }
            container.appendChild(nextButton);

            var pageSizeLabel = document.createElement('label');
            pageSizeLabel.textContent = ' Rows per page';
            var pageSizeSelect = document.createElement('select');
            pageSizeSelect.dataset.action = 'page-size';
            [25, 50, 100].forEach(function(size) {
                var opt = document.createElement('option');
                opt.value = String(size);
                opt.textContent = String(size);
                if (size === pageSize) {
                    opt.selected = true;
                }
                pageSizeSelect.appendChild(opt);
            });
            pageSizeLabel.appendChild(pageSizeSelect);
            container.appendChild(pageSizeLabel);
        }

        function renderSelectionSummary(container, count) {
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }
            var textSpan = document.createElement('span');
            textSpan.textContent = String(count) + ' slide' + (count === 1 ? '' : 's') + ' selected';
            container.appendChild(textSpan);

            var clearButton = document.createElement('button');
            clearButton.type = 'button';
            clearButton.dataset.action = 'clear-selection';
            clearButton.textContent = 'Clear selection';
            if (count === 0) {
                clearButton.disabled = true;
            }
            container.appendChild(clearButton);
        }

        function renderCollectionActions(container, selectionCount, collectionResult) {
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }

            var createButton = document.createElement('button');
            createButton.type = 'button';
            createButton.dataset.action = 'open-create-collection-dialog';
            createButton.textContent = 'Create new collection from selection';
            if (!selectionCount) {
                createButton.disabled = true;
            }
            container.appendChild(createButton);

            var addButton = document.createElement('button');
            addButton.type = 'button';
            addButton.dataset.action = 'open-add-collection-dialog';
            addButton.textContent = 'Add selection to existing collection';
            if (!selectionCount) {
                addButton.disabled = true;
            }
            container.appendChild(addButton);

            if (collectionResult && collectionResult.collection && collectionResult.addedCount !== undefined) {
                var info = document.createElement('p');
                info.textContent = 'Last collection update: ' + collectionResult.addedCount + ' slide' + (collectionResult.addedCount === 1 ? '' : 's') + ' in \'' + collectionResult.collection.name + '\'.';
                container.appendChild(info);

                var viewButton = document.createElement('button');
                viewButton.type = 'button';
                viewButton.dataset.action = 'view-last-collection';
                viewButton.textContent = 'View collection';
                container.appendChild(viewButton);
            }
        }

        function updateSortIndicators(sort) {
            var sortButtons = document.querySelectorAll('button[data-action="sort"]');
            sortButtons.forEach(function(btn) {
                var field = btn.dataset.sortField;
                var baseText = btn.textContent.replace(/[\s\u2191\u2193]+$/, '');
                btn.textContent = baseText;
                if (sort && sort.field === field) {
                    var suffix = sort.direction === 'asc' ? ' \u2191' : ' \u2193';
                    btn.textContent = baseText + suffix;
                }
            });
        }

        function updateHeaderSelectAllCheckbox() {
            var headerCheckbox = document.querySelector('input[data-action="select-all-on-page"]');
            if (!headerCheckbox) {
                return;
            }
            var items = currentResults.items || [];
            if (!items.length || selectedSlideIds.size === 0) {
                headerCheckbox.checked = false;
                headerCheckbox.indeterminate = false;
                return;
            }
            var selectedOnPage = 0;
            items.forEach(function(item) {
                if (selectedSlideIds.has(item.slideId)) {
                    selectedOnPage += 1;
                }
            });
            if (selectedOnPage === 0) {
                headerCheckbox.checked = false;
                headerCheckbox.indeterminate = false;
            } else if (selectedOnPage === items.length) {
                headerCheckbox.checked = true;
                headerCheckbox.indeterminate = false;
            } else {
                headerCheckbox.checked = false;
                headerCheckbox.indeterminate = true;
            }
        }

        function updateSelectionUI() {
            var selectionSummaryEl = document.querySelector('[data-populate="selection-summary"]');
            if (selectionSummaryEl) {
                renderSelectionSummary(selectionSummaryEl, selectedSlideIds.size);
            }
            var collectionActionsEl = document.querySelector('[data-populate="collection-actions"]');
            if (collectionActionsEl) {
                renderCollectionActions(collectionActionsEl, selectedSlideIds.size, lastCollectionResult);
            }
            updateHeaderSelectAllCheckbox();
        }

        function runSearchFromUrl() {
            var state = parseUrlState();
            syncFilterControlsFromState(state);

            var summaryEl = document.querySelector('[data-populate="results-summary"]');
            var tableBodyEl = document.querySelector('[data-populate="results-table"]');
            var paginationEl = document.querySelector('[data-populate="pagination-controls"]');

            var searchResult = null;
            var errorText = '';
            try {
                searchResult = WebsiteSDK.searchBiomarkerSlides(state.filters, state.page, state.pageSize, state.sort || undefined);
            } catch (e) {
                errorText = 'Unable to load biomarker results.';
                searchResult = { items: [], totalCount: 0 };
            }

            if (!searchResult || !Array.isArray(searchResult.items)) {
                searchResult = { items: [], totalCount: 0 };
            }

            currentResults = searchResult;
            selectedSlideIds = new Set();

            if (summaryEl) {
                renderResultsSummary(summaryEl, state, searchResult, errorText || null);
            }
            if (tableBodyEl) {
                renderResultsTable(tableBodyEl, searchResult.items);
            }
            if (paginationEl) {
                renderPagination(paginationEl, state, searchResult.totalCount || 0);
            }
            updateSelectionUI();
            updateSortIndicators(state.sort);
        }

        function handleFilterFormSubmit(event) {
            event.preventDefault();
            var state = parseUrlState();
            var diseaseSelect = document.getElementById('diseaseFilter');
            var stainSelect = document.getElementById('stainFilter');
            var biomarkerSelect = document.getElementById('biomarkerFilter');
            var minInput = document.getElementById('minPercentageInput');
            var maxInput = document.getElementById('maxPercentageInput');

            var updates = { page: 1 };

            var disease = diseaseSelect ? diseaseSelect.value : '';
            updates.disease = disease || null;

            var stain = stainSelect ? stainSelect.value : '';
            updates.stain = stain || null;

            var biomarker = biomarkerSelect ? biomarkerSelect.value : '';
            updates.biomarker = biomarker || null;

            if (minInput && minInput.value !== '') {
                var minVal = parseFloat(minInput.value);
                updates.minPercentage = !isNaN(minVal) ? minVal : null;
            } else {
                updates.minPercentage = null;
            }

            if (maxInput && maxInput.value !== '') {
                var maxVal = parseFloat(maxInput.value);
                updates.maxPercentage = !isNaN(maxVal) ? maxVal : null;
            } else {
                updates.maxPercentage = null;
            }

            updateUrlParams(updates, false);
            runSearchFromUrl();
        }

        function handleResetFilters() {
            var updates = {
                disease: null,
                stain: null,
                biomarker: null,
                minPercentage: null,
                maxPercentage: null,
                page: 1,
                sort: null
            };
            updateUrlParams(updates, false);
            runSearchFromUrl();
        }

        function openSlideViewer(slideId) {
            if (!slideId) {
                return;
            }
            var targetUrl = 'slide_viewer.html?slideId=' + encodeURIComponent(slideId);
            window.location.href = targetUrl;
        }

        function openCollectionDetail(collectionId) {
            if (!collectionId) {
                return;
            }
            var url = 'collection_detail.html?collectionId=' + encodeURIComponent(collectionId);
            window.location.href = url;
        }

        function showCollectionDialog(mode) {
            var overlay = document.getElementById('collectionDialogOverlay');
            if (!overlay) {
                return;
            }
            overlay.dataset.mode = mode;
            overlay.hidden = false;

            var createFields = document.getElementById('collectionDialogCreateFields');
            var existingFields = document.getElementById('collectionDialogExistingFields');
            var titleEl = document.getElementById('collectionDialogTitle');
            var messageEl = document.getElementById('collectionDialogMessage');
            var errorEl = document.getElementById('collectionDialogError');
            var successEl = document.getElementById('collectionDialogSuccess');
            var viewButton = document.querySelector('[data-action="collection-dialog-view-collection"]');
            var submitButton = document.querySelector('[data-action="collection-dialog-submit"]');

            if (errorEl) {
                errorEl.textContent = '';
            }
            if (successEl) {
                successEl.hidden = true;
                successEl.textContent = '';
            }
            if (viewButton) {
                viewButton.hidden = true;
            }

            var count = selectedSlideIds.size;
            if (messageEl) {
                messageEl.textContent = 'Selected ' + count + ' slide' + (count === 1 ? '' : 's') + '.';
            }

            var nameInput = document.getElementById('newCollectionName');
            var descInput = document.getElementById('newCollectionDescription');
            var existingSelect = document.getElementById('existingCollectionSelect');
            if (nameInput) {
                nameInput.value = '';
            }
            if (descInput) {
                descInput.value = '';
            }
            if (existingSelect) {
                existingSelect.value = '';
            }

            if (mode === 'create') {
                if (titleEl) {
                    titleEl.textContent = 'Create new collection';
                }
                if (submitButton) {
                    submitButton.textContent = 'Create collection';
                }
                if (createFields) {
                    createFields.style.display = '';
                }
                if (existingFields) {
                    existingFields.style.display = 'none';
                }
            } else {
                if (titleEl) {
                    titleEl.textContent = 'Add to existing collection';
                }
                if (submitButton) {
                    submitButton.textContent = 'Add to collection';
                }
                if (createFields) {
                    createFields.style.display = 'none';
                }
                if (existingFields) {
                    existingFields.style.display = '';
                }
                var collectionsRaw = localStorage.getItem('collections') || '[]';
                var collections = [];
                try {
                    collections = JSON.parse(collectionsRaw);
                } catch (e) {
                    collections = [];
                }
                if (existingSelect) {
                    while (existingSelect.firstChild) {
                        existingSelect.removeChild(existingSelect.firstChild);
                    }
                    var placeholder = document.createElement('option');
                    placeholder.value = '';
                    placeholder.textContent = 'Select collection';
                    existingSelect.appendChild(placeholder);
                    collections.forEach(function(col) {
                        if (!col || !col.id) {
                            return;
                        }
                        var opt = document.createElement('option');
                        opt.value = col.id;
                        opt.textContent = col.name || col.id;
                        existingSelect.appendChild(opt);
                    });
                }
            }
        }

        function closeCollectionDialog() {
            var overlay = document.getElementById('collectionDialogOverlay');
            if (overlay) {
                overlay.hidden = true;
            }
        }

        function handleCollectionDialogSubmit() {
            var overlay = document.getElementById('collectionDialogOverlay');
            if (!overlay || overlay.hidden) {
                return;
            }
            var mode = overlay.dataset.mode || 'create';
            var errorEl = document.getElementById('collectionDialogError');
            var successEl = document.getElementById('collectionDialogSuccess');
            var viewButton = document.querySelector('[data-action="collection-dialog-view-collection"]');

            if (errorEl) {
                errorEl.textContent = '';
            }
            if (successEl) {
                successEl.hidden = true;
                successEl.textContent = '';
            }
            if (viewButton) {
                viewButton.hidden = true;
            }

            if (!selectedSlideIds.size) {
                if (errorEl) {
                    errorEl.textContent = 'Select at least one slide before creating or updating a collection.';
                }
                return;
            }

            var result = null;
            if (mode === 'create') {
                var nameInput = document.getElementById('newCollectionName');
                var descriptionInput = document.getElementById('newCollectionDescription');
                var name = nameInput ? nameInput.value.trim() : '';
                var description = descriptionInput ? descriptionInput.value.trim() : '';
                if (!name) {
                    if (errorEl) {
                        errorEl.textContent = 'Collection name is required.';
                    }
                    return;
                }
                var slideIdsArray = Array.from(selectedSlideIds);
                try {
                    result = WebsiteSDK.createCollectionFromSlides(name, 'biomarker_browser', slideIdsArray);
                } catch (e) {
                    if (errorEl) {
                        errorEl.textContent = 'Unable to create collection.';
                    }
                    return;
                }
                if (!result || !result.success) {
                    if (errorEl) {
                        errorEl.textContent = 'Unable to create collection.';
                    }
                    return;
                }
                lastCollectionResult = result;
                if (successEl) {
                    successEl.hidden = false;
                    successEl.textContent = 'Created collection \'' + result.collection.name + '\' with ' + result.addedCount + ' slide' + (result.addedCount === 1 ? '' : 's') + '.';
                }
            } else {
                var existingSelect = document.getElementById('existingCollectionSelect');
                var collectionId = existingSelect ? existingSelect.value : '';
                if (!collectionId) {
                    if (errorEl) {
                        errorEl.textContent = 'Select a collection to add slides to.';
                    }
                    return;
                }
                var slideIdsArrayAdd = Array.from(selectedSlideIds);
                try {
                    result = WebsiteSDK.addSlidesToCollection(collectionId, slideIdsArrayAdd);
                } catch (e2) {
                    if (errorEl) {
                        errorEl.textContent = 'Unable to add slides to collection.';
                    }
                    return;
                }
                if (!result || !result.success) {
                    if (errorEl) {
                        errorEl.textContent = 'Unable to add slides to collection.';
                    }
                    return;
                }
                lastCollectionResult = result;
                if (successEl) {
                    successEl.hidden = false;
                    successEl.textContent = 'Added ' + result.addedCount + ' slide' + (result.addedCount === 1 ? '' : 's') + ' to collection \'' + result.collection.name + '\'.';
                }
            }

            if (viewButton && lastCollectionResult && lastCollectionResult.collection && lastCollectionResult.collection.id) {
                viewButton.hidden = false;
            }
            updateSelectionUI();
        }

        function initializeFilterOptions() {
            try {
                biomarkerFilterOptions = WebsiteSDK.getBiomarkerFilterOptions();
            } catch (e) {
                biomarkerFilterOptions = { diseases: [], stains: [], biomarkers: [] };
            }
            var diseaseSelect = document.getElementById('diseaseFilter');
            var stainSelect = document.getElementById('stainFilter');
            var biomarkerSelect = document.getElementById('biomarkerFilter');
            if (diseaseSelect) {
                populateSelectOptions(diseaseSelect, biomarkerFilterOptions.diseases || []);
            }
            if (stainSelect) {
                populateSelectOptions(stainSelect, biomarkerFilterOptions.stains || []);
            }
            if (biomarkerSelect) {
                populateSelectOptions(biomarkerSelect, biomarkerFilterOptions.biomarkers || []);
            }
        }

        var filterForm = document.getElementById('biomarkerFilterForm');
        if (filterForm) {
            filterForm.addEventListener('submit', handleFilterFormSubmit);
        }

        document.addEventListener('click', function(event) {
            var target = event.target;
            if (!target) {
                return;
            }
            var actionElement = target.closest('[data-action]');
            if (!actionElement) {
                return;
            }
            var action = actionElement.dataset.action;

            if (action === 'reset-filters') {
                event.preventDefault();
                handleResetFilters();
            } else if (action === 'remove-filter-chip') {
                event.preventDefault();
                var field = actionElement.dataset.filterField;
                var updates = { page: 1 };
                updates[field] = null;
                updateUrlParams(updates, false);
                runSearchFromUrl();
            } else if (action === 'sort') {
                event.preventDefault();
                var sortField = actionElement.dataset.sortField;
                var state = parseUrlState();
                var currentSort = state.sort;
                var newDirection = 'asc';
                if (currentSort && currentSort.field === sortField && currentSort.direction === 'asc') {
                    newDirection = 'desc';
                }
                var newSort = { field: sortField, direction: newDirection };
                updateUrlParams({ sort: encodeSortParam(newSort), page: 1 }, false);
                runSearchFromUrl();
            } else if (action === 'page-prev') {
                event.preventDefault();
                var statePrev = parseUrlState();
                var newPagePrev = statePrev.page - 1;
                if (newPagePrev < 1) {
                    newPagePrev = 1;
                }
                updateUrlParams({ page: newPagePrev }, false);
                runSearchFromUrl();
            } else if (action === 'page-next') {
                event.preventDefault();
                var stateNext = parseUrlState();
                var totalCountNext = currentResults.totalCount || 0;
                var totalPagesNext = totalCountNext > 0 ? Math.ceil(totalCountNext / stateNext.pageSize) : 1;
                var newPageNext = stateNext.page + 1;
                if (newPageNext > totalPagesNext) {
                    newPageNext = totalPagesNext;
                }
                updateUrlParams({ page: newPageNext }, false);
                runSearchFromUrl();
            } else if (action === 'clear-selection') {
                event.preventDefault();
                selectedSlideIds.clear();
                var checkboxes = document.querySelectorAll('input[data-action="row-select"]');
                checkboxes.forEach(function(cb) {
                    cb.checked = false;
                });
                updateSelectionUI();
            } else if (action === 'row-select') {
                var slideId = actionElement.dataset.slideId;
                if (!slideId) {
                    return;
                }
                if (actionElement.checked) {
                    selectedSlideIds.add(slideId);
                } else {
                    selectedSlideIds.delete(slideId);
                }
                updateSelectionUI();
            } else if (action === 'select-all-on-page') {
                var items = currentResults.items || [];
                var headerCheckbox = actionElement;
                if (headerCheckbox.checked) {
                    items.forEach(function(item) {
                        if (!item.slideId) {
                            return;
                        }
                        selectedSlideIds.add(item.slideId);
                    });
                    var pageCheckboxes = document.querySelectorAll('input[data-action="row-select"]');
                    pageCheckboxes.forEach(function(cb) {
                        cb.checked = true;
                    });
                } else {
                    items.forEach(function(item) {
                        if (!item.slideId) {
                            return;
                        }
                        selectedSlideIds.delete(item.slideId);
                    });
                    var pageCheckboxesClear = document.querySelectorAll('input[data-action="row-select"]');
                    pageCheckboxesClear.forEach(function(cb) {
                        cb.checked = false;
                    });
                }
                updateSelectionUI();
            } else if (action === 'open-slide-viewer') {
                event.preventDefault();
                var slideIdOpen = actionElement.dataset.slideId;
                openSlideViewer(slideIdOpen);
            } else if (action === 'open-create-collection-dialog') {
                event.preventDefault();
                if (!selectedSlideIds.size) {
                    return;
                }
                showCollectionDialog('create');
            } else if (action === 'open-add-collection-dialog') {
                event.preventDefault();
                if (!selectedSlideIds.size) {
                    return;
                }
                showCollectionDialog('add');
            } else if (action === 'close-collection-dialog') {
                event.preventDefault();
                closeCollectionDialog();
            } else if (action === 'collection-dialog-cancel') {
                event.preventDefault();
                closeCollectionDialog();
            } else if (action === 'collection-dialog-submit') {
                event.preventDefault();
                handleCollectionDialogSubmit();
            } else if (action === 'collection-dialog-view-collection') {
                event.preventDefault();
                if (lastCollectionResult && lastCollectionResult.collection && lastCollectionResult.collection.id) {
                    openCollectionDetail(lastCollectionResult.collection.id);
                }
            } else if (action === 'view-last-collection') {
                event.preventDefault();
                if (lastCollectionResult && lastCollectionResult.collection && lastCollectionResult.collection.id) {
                    openCollectionDetail(lastCollectionResult.collection.id);
                }
            }
        });

        document.addEventListener('change', function(event) {
            var target = event.target;
            if (!target) {
                return;
            }
            var action = target.dataset.action;
            if (action === 'page-size') {
                var state = parseUrlState();
                var newSize = parseInt(target.value, 10);
                if (!newSize || newSize < 1) {
                    newSize = state.pageSize;
                }
                updateUrlParams({ pageSize: newSize, page: 1 }, false);
                runSearchFromUrl();
            }
        });

        window.addEventListener('popstate', function() {
            runSearchFromUrl();
        });

        initializeFilterOptions();
        runSearchFromUrl();
    });
    </script>
</body>
</html>
