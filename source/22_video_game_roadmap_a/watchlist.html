<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Watchlist - Game Roadmap &amp; Community</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&amp;family=Cormorant+Garamond:wght@400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>

  <!-- Site styles -->
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='watchlist.css'>
</head>
<body class='site'>
  <header class='site-header'>
    <div class='header-inner container'>
      <nav class='primary-nav' aria-label='Main navigation'>
        <ul class='nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='roadmap.html' class='nav-link'>Roadmap</a>
          </li>
          <li class='nav-item'>
            <a href='community.html' class='nav-link'>Community</a>
          </li>
          <li class='nav-item'>
            <a href='updates.html' class='nav-link'>Updates</a>
          </li>
          <li class='nav-item'>
            <a href='watchlist.html' class='nav-link'>Watchlist</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-content container' tabindex='-1'>
    <div class='watchlist-page' data-component='watchlist-page-controller'>
      <header class='watchlist-header'>
        <h1 class='watchlist-title'>WATCHLIST</h1>
        <div class='watchlist-title-underline' aria-hidden='true'>
          <span class='underline-line'></span>
          <span class='underline-ornament'></span>
          <span class='underline-line'></span>
        </div>
      </header>

      <section class='watchlist-error-banner' data-component='watchlist-error-banner' data-populate='watchlist-error' aria-live='polite' hidden></section>

      <section class='watchlist-summary-bar' data-component='watchlist-summary-bar' data-populate='watchlist-summary' aria-live='polite'>
        <!-- Summary content populated via JS -->
      </section>

      <section class='watchlist-controls'>
        <form class='watchlist-filter-form' data-component='watchlist-filter-form'>
          <fieldset class='watchlist-filter-group watchlist-filter-group--status'>
            <legend class='watchlist-filter-legend'>Status</legend>
            <div class='watchlist-filter-pill-row'>
              <label class='filter-pill'>
                <input type='checkbox' name='status' value='under_review'>
                <span>Under Review</span>
              </label>
              <label class='filter-pill'>
                <input type='checkbox' name='status' value='planned'>
                <span>Planned</span>
              </label>
              <label class='filter-pill'>
                <input type='checkbox' name='status' value='in_progress'>
                <span>In Progress</span>
              </label>
              <label class='filter-pill'>
                <input type='checkbox' name='status' value='released'>
                <span>Released</span>
              </label>
              <label class='filter-pill'>
                <input type='checkbox' name='status' value='backlog'>
                <span>Backlog</span>
              </label>
              <label class='filter-pill'>
                <input type='checkbox' name='status' value='cancelled'>
                <span>Cancelled</span>
              </label>
            </div>
          </fieldset>

          <fieldset class='watchlist-filter-group watchlist-filter-group--platforms'>
            <legend class='watchlist-filter-legend'>Platforms</legend>
            <div class='watchlist-filter-pill-row'>
              <label class='filter-pill'>
                <input type='checkbox' name='platforms' value='pc'>
                <span>PC</span>
              </label>
              <label class='filter-pill'>
                <input type='checkbox' name='platforms' value='ps5'>
                <span>PS5</span>
              </label>
              <label class='filter-pill'>
                <input type='checkbox' name='platforms' value='xbox_series_xs'>
                <span>Xbox Series X|S</span>
              </label>
              <label class='filter-pill'>
                <input type='checkbox' name='platforms' value='xbox_one'>
                <span>Xbox One</span>
              </label>
              <label class='filter-pill'>
                <input type='checkbox' name='platforms' value='switch'>
                <span>Switch</span>
              </label>
              <label class='filter-pill'>
                <input type='checkbox' name='platforms' value='other'>
                <span>Other</span>
              </label>
            </div>
          </fieldset>

          <fieldset class='watchlist-filter-group watchlist-filter-group--dates'>
            <legend class='watchlist-filter-legend'>Release Date</legend>
            <div class='watchlist-date-range'>
              <label class='watchlist-date-field'>
                <span class='watchlist-date-label'>From</span>
                <input type='date' name='release_date_from'>
              </label>
              <span class='watchlist-date-separator' aria-hidden='true'>
                <span class='underline-line'></span>
              </span>
              <label class='watchlist-date-field'>
                <span class='watchlist-date-label'>To</span>
                <input type='date' name='release_date_to'>
              </label>
            </div>
          </fieldset>

          <div class='watchlist-filter-actions'>
            <button type='submit' class='pill-button' data-action='submit-filters'>Apply filters</button>
            <button type='button' class='link-button' data-action='clear-filters'>Clear filters</button>
          </div>
        </form>

        <div class='watchlist-sort-control' data-component='watchlist-sort-control'>
          <label for='watchlistSortSelect' class='watchlist-sort-label'>
            Sort
            <select id='watchlistSortSelect' class='watchlist-sort-select' data-action='change-sort'>
              <option value='release_date_soonest_first'>Release date: Soonest first</option>
              <option value='release_date_latest_first'>Release date: Latest first</option>
              <option value='status_az'>Status: A to Z</option>
              <option value='platform_az'>Platform: A to Z</option>
            </select>
          </label>
        </div>
      </section>

      <section class='watchlist-list-wrapper'>
        <div class='watchlist-loading-overlay' data-component='watchlist-loading-indicator' data-populate='watchlist-loading' aria-live='polite' hidden></div>

        <section class='watchlist-empty-state' data-component='watchlist-empty-state' data-populate='watchlist-empty' aria-live='polite' hidden></section>

        <section class='watchlist-grid' data-component='watchlist-list' data-populate='watchlist-items' aria-label='Watchlisted features'>
          <!-- Watchlist cards populated via JS -->
        </section>
      </section>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <div class='footer-divider' aria-hidden='true'>
        <span class='footer-divider-line'></span>
        <span class='footer-divider-ornament'></span>
        <span class='footer-divider-line'></span>
      </div>

      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='about.html' class='footer-link'>About</a>
          </li>
          <li class='footer-nav-item'>
            <a href='help.html' class='footer-link'>Help / FAQ</a>
          </li>
          <li class='footer-nav-item'>
            <a href='policies.html' class='footer-link'>Policies &amp; Guidelines</a>
          </li>
          <li class='footer-nav-item'>
            <a href='updates.html' class='footer-link'>Dev Updates</a>
          </li>
          <li class='footer-nav-item'>
            <a href='reading_list.html' class='footer-link'>Reading List</a>
          </li>
        </ul>
      </nav>

      <p class='footer-meta'>&copy; 2026 Frontier Game Studio. All rights reserved.</p>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var pageController = document.querySelector('[data-component="watchlist-page-controller"]');
      if (!pageController) {
        return;
      }

      var state = {
        items: [],
        totalCount: 0,
        loadingItems: false,
        removing: false,
        error: null,
        removeError: null,
        filters: {
          status: [],
          platforms: [],
          release_date_from: '',
          release_date_to: '',
          sort: 'release_date_soonest_first'
        }
      };

      var populateElements = {};
      document.querySelectorAll('[data-populate]').forEach(function(el) {
        var key = el.dataset.populate;
        if (!populateElements[key]) {
          populateElements[key] = [];
        }
        populateElements[key].push(el);
      });

      var filterForm = document.querySelector('[data-component="watchlist-filter-form"]');
      var sortSelect = document.querySelector('[data-action="change-sort"]');

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function parseFiltersFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var statusParam = params.get('status');
        var platformsParam = params.get('platforms');
        var releaseFrom = params.get('release_date_from') || '';
        var releaseTo = params.get('release_date_to') || '';
        var sort = params.get('sort') || 'release_date_soonest_first';

        return {
          status: statusParam ? statusParam.split(',').filter(function(s) { return s; }) : [],
          platforms: platformsParam ? platformsParam.split(',').filter(function(p) { return p; }) : [],
          release_date_from: releaseFrom,
          release_date_to: releaseTo,
          sort: sort
        };
      }

      function syncControlsWithState() {
        if (filterForm) {
          var statusValues = state.filters.status;
          var platformValues = state.filters.platforms;

          filterForm.querySelectorAll('input[name="status"]').forEach(function(input) {
            input.checked = statusValues.indexOf(input.value) !== -1;
          });

          filterForm.querySelectorAll('input[name="platforms"]').forEach(function(input) {
            input.checked = platformValues.indexOf(input.value) !== -1;
          });

          var fromInput = filterForm.querySelector('input[name="release_date_from"]');
          var toInput = filterForm.querySelector('input[name="release_date_to"]');
          if (fromInput) {
            fromInput.value = state.filters.release_date_from || '';
          }
          if (toInput) {
            toInput.value = state.filters.release_date_to || '';
          }
        }

        if (sortSelect) {
          sortSelect.value = state.filters.sort || 'release_date_soonest_first';
        }
      }

      function renderForPopulateKey(key, renderFn) {
        var containers = populateElements[key] || [];
        containers.forEach(function(container) {
          renderFn(container);
        });
      }

      function renderSummary(container) {
        var count = state.totalCount || 0;
        var parts = [];
        if (state.filters.status && state.filters.status.length) {
          parts.push(state.filters.status.length + ' status filter' + (state.filters.status.length > 1 ? 's' : ''));
        }
        if (state.filters.platforms && state.filters.platforms.length) {
          parts.push(state.filters.platforms.length + ' platform filter' + (state.filters.platforms.length > 1 ? 's' : ''));
        }
        if (state.filters.release_date_from || state.filters.release_date_to) {
          parts.push('a release date range');
        }
        var filterSummary = parts.length ? ' with ' + parts.join(', ') : '';

        container.innerHTML = "" +
          "<div class='watchlist-summary-bar-inner'>" +
          "  <p class='watchlist-summary-text'>You're watching " +
          "    <span class='watchlist-summary-count'>" + count + "</span> " +
          "    feature" + (count === 1 ? '' : 's') + filterSummary + "." +
          "  </p>" +
          "</div>";
      }

      function renderList(container) {
        var items = state.items || [];
        container.innerHTML = '';

        if (!items.length) {
          container.classList.add('watchlist-grid--empty');
          return;
        }

        container.classList.remove('watchlist-grid--empty');

        items.forEach(function(item) {
          var card = document.createElement('article');
          card.className = 'watchlist-card';
          card.setAttribute('data-component', 'watchlist-item-row');
          card.setAttribute('data-roadmap-feature-id', item.id);

          var title = item.title || 'Untitled feature';
          var shortSummary = item.short_summary || '';
          var rawStatus = item.status || '';
          var rawFeatureType = item.feature_type || '';
          var statusLabel = rawStatus ? rawStatus.replace(/_/g, ' ') : '';
          var featureTypeLabel = rawFeatureType ? rawFeatureType.replace(/_/g, ' ') : '';

          var platformsLabel = '';
          if (Array.isArray(item.platforms) && item.platforms.length) {
            platformsLabel = item.platforms.join(', ');
          }

          var tagsLabel = '';
          if (Array.isArray(item.tags) && item.tags.length) {
            tagsLabel = item.tags.join(', ');
          }

          var releaseDateText = 'TBD';
          if (item.release_date) {
            try {
              var date = new Date(item.release_date);
              if (!isNaN(date.getTime())) {
                releaseDateText = date.toLocaleDateString();
              }
            } catch (e) {
              releaseDateText = 'TBD';
            }
          } else if (item.release_year) {
            releaseDateText = String(item.release_year);
          }

          var upvotes = typeof item.upvote_count === 'number' ? item.upvote_count : 0;
          var comments = typeof item.comment_count === 'number' ? item.comment_count : 0;
          var imageUrl = item.image_url || '';
          var idParam = encodeURIComponent(item.id);

          var titleEscaped = escapeHtml(title);
          var summaryEscaped = escapeHtml(shortSummary);
          var platformsEscaped = escapeHtml(platformsLabel);
          var tagsEscaped = escapeHtml(tagsLabel);
          var releaseEscaped = escapeHtml(releaseDateText);
          var statusLabelEscaped = escapeHtml(statusLabel);
          var featureTypeLabelEscaped = escapeHtml(featureTypeLabel);

          var imageHtml = '';
          if (imageUrl) {
            imageHtml = "<img src='" + escapeHtml(imageUrl) + "' alt='Artwork for " + titleEscaped + "' class='watchlist-card-image'>";
          } else {
            imageHtml = "<div class='watchlist-card-image watchlist-card-image--placeholder'>" +
              "<span class='watchlist-card-placeholder-title'>" + titleEscaped + "</span>" +
              "</div>";
          }

          card.innerHTML = "" +
            "<a href='roadmap_feature.html?id=" + idParam + "' class='watchlist-card-image-link' data-action='navigate-feature'>" +
            imageHtml +
            "</a>" +
            "<div class='watchlist-card-caption'>" +
            "  <div class='watchlist-card-caption-main'>" +
            "    <h2 class='watchlist-card-title'>" +
            "      <a href='roadmap_feature.html?id=" + idParam + "' class='watchlist-card-title-link' data-action='navigate-feature-title'>" + titleEscaped + "</a>" +
            "    </h2>" +
            (shortSummary ? "    <p class='watchlist-card-summary'>" + summaryEscaped + "</p>" : '') +
            "  </div>" +
            "  <div class='watchlist-card-meta'>" +
            "    <div class='watchlist-card-meta-primary'>" +
            (statusLabel ? "      <span class='watchlist-status watchlist-status--" + rawStatus + "'>" + statusLabelEscaped + "</span>" : '') +
            (featureTypeLabel ? "      <span class='watchlist-feature-type'>" + featureTypeLabelEscaped + "</span>" : '') +
            "    </div>" +
            "    <div class='watchlist-card-meta-secondary'>" +
            (platformsLabel ? "      <span class='watchlist-platforms'>" + platformsEscaped + "</span>" : '') +
            (tagsLabel ? "      <span class='watchlist-tags'>" + tagsEscaped + "</span>" : '') +
            "      <span class='watchlist-release-date'>" + releaseEscaped + "</span>" +
            "      <span class='watchlist-counts'>" +
            "        <span class='watchlist-upvotes' aria-label='" + upvotes + " upvotes'>Upvotes: " + upvotes + "</span>" +
            "        <span class='watchlist-comments' aria-label='" + comments + " comments'>Comments: " + comments + "</span>" +
            "      </span>" +
            "    </div>" +
            "  </div>" +
            "  <div class='watchlist-card-actions'>" +
            "    <button type='button' class='watchlist-remove-button' data-action='remove-from-watchlist' data-roadmap-feature-id='" + escapeHtml(item.id) + "'>Remove</button>" +
            "  </div>" +
            "</div>";

          container.appendChild(card);
        });
      }

      function renderEmpty(container) {
        var hasItems = state.items && state.items.length > 0;
        if (hasItems) {
          container.hidden = true;
          container.innerHTML = '';
          return;
        }

        container.hidden = false;
        var hasFilters = (state.filters.status && state.filters.status.length) ||
          (state.filters.platforms && state.filters.platforms.length) ||
          state.filters.release_date_from ||
          state.filters.release_date_to;

        var titleText = hasFilters ? 'No watchlisted features match these filters' : 'Your watchlist is empty';
        var bodyText = hasFilters
          ? 'Try adjusting or clearing your filters to see more roadmap features you follow.'
          : 'Browse the roadmap and add features to your watchlist to track their progress here.';

        container.innerHTML = "" +
          "<div class='watchlist-empty-panel'>" +
          "  <h2 class='watchlist-empty-title'>" + escapeHtml(titleText) + "</h2>" +
          "  <p class='watchlist-empty-body'>" + escapeHtml(bodyText) + "</p>" +
          "  <div class='watchlist-empty-actions'>" +
          (hasFilters
            ? "    <button type='button' class='pill-button' data-action='clear-filters-empty-state'>Clear filters</button>"
            : "    <a href='roadmap.html' class='pill-button'>View roadmap</a>") +
          "  </div>" +
          "</div>";
      }

      function renderLoading(container) {
        var isLoading = !!(state.loadingItems || state.removing);
        if (!isLoading) {
          container.hidden = true;
          container.innerHTML = '';
          return;
        }
        container.hidden = false;
        container.innerHTML = "" +
          "<div class='watchlist-loading-inner'>" +
          "  <div class='watchlist-spinner' aria-hidden='true'></div>" +
          "  <p class='watchlist-loading-text'>Loading your watchlist...</p>" +
          "</div>";
      }

      function renderError(container) {
        var message = state.error || state.removeError;
        if (!message) {
          container.hidden = true;
          container.innerHTML = '';
          return;
        }
        container.hidden = false;
        container.innerHTML = "" +
          "<div class='watchlist-error-banner-inner'>" +
          "  <p class='watchlist-error-message'>" + escapeHtml(message) + "</p>" +
          "  <button type='button' class='watchlist-error-retry-button pill-button' data-action='retry-load'>Retry</button>" +
          "</div>";
      }

      function renderAll() {
        renderForPopulateKey('watchlist-summary', renderSummary);
        renderForPopulateKey('watchlist-items', renderList);
        renderForPopulateKey('watchlist-empty', renderEmpty);
        renderForPopulateKey('watchlist-loading', renderLoading);
        renderForPopulateKey('watchlist-error', renderError);
      }

      function loadWatchlist() {
        state.loadingItems = true;
        state.error = null;
        renderForPopulateKey('watchlist-loading', renderLoading);
        renderForPopulateKey('watchlist-error', renderError);

        try {
          var statusParam = state.filters.status && state.filters.status.length ? state.filters.status.join(',') : undefined;
          var platformsParam = state.filters.platforms && state.filters.platforms.length ? state.filters.platforms.slice() : undefined;
          var releaseFromParam = state.filters.release_date_from || undefined;
          var releaseToParam = state.filters.release_date_to || undefined;
          var sortParam = state.filters.sort || undefined;

          var response = WebsiteSDK.getWatchlistItems(statusParam, platformsParam, releaseFromParam, releaseToParam, sortParam);
          var items = response && Array.isArray(response.items) ? response.items : [];
          var total = response && typeof response.total_count === 'number' ? response.total_count : items.length;
          state.items = items;
          state.totalCount = total;
        } catch (err) {
          state.error = 'Unable to load your watchlist. Please try again.';
        }

        state.loadingItems = false;
        renderAll();
      }

      function handleUrlChange() {
        state.filters = parseFiltersFromUrl();
        syncControlsWithState();
        loadWatchlist();
      }

      function applyFiltersFromForm() {
        if (!filterForm) {
          return;
        }
        var params = new URLSearchParams(window.location.search);

        var selectedStatuses = [];
        filterForm.querySelectorAll('input[name="status"]:checked').forEach(function(input) {
          selectedStatuses.push(input.value);
        });
        if (selectedStatuses.length) {
          params.set('status', selectedStatuses.join(','));
        } else {
          params.delete('status');
        }

        var selectedPlatforms = [];
        filterForm.querySelectorAll('input[name="platforms"]:checked').forEach(function(input) {
          selectedPlatforms.push(input.value);
        });
        if (selectedPlatforms.length) {
          params.set('platforms', selectedPlatforms.join(','));
        } else {
          params.delete('platforms');
        }

        var fromInput = filterForm.querySelector('input[name="release_date_from"]');
        var toInput = filterForm.querySelector('input[name="release_date_to"]');

        if (fromInput && fromInput.value) {
          params.set('release_date_from', fromInput.value);
        } else {
          params.delete('release_date_from');
        }
        if (toInput && toInput.value) {
          params.set('release_date_to', toInput.value);
        } else {
          params.delete('release_date_to');
        }

        if (state.filters.sort) {
          params.set('sort', state.filters.sort);
        } else {
          params.delete('sort');
        }

        var newSearch = params.toString();
        var newUrl = newSearch ? window.location.pathname + '?' + newSearch : window.location.pathname;
        window.history.pushState({}, '', newUrl);
        handleUrlChange();
      }

      function clearFiltersAndUpdateUrl() {
        var params = new URLSearchParams(window.location.search);
        params.delete('status');
        params.delete('platforms');
        params.delete('release_date_from');
        params.delete('release_date_to');
        var newSearch = params.toString();
        var newUrl = newSearch ? window.location.pathname + '?' + newSearch : window.location.pathname;
        window.history.pushState({}, '', newUrl);
        handleUrlChange();
      }

      function handleRemoveFromWatchlist(button, featureId) {
        if (!featureId) {
          return;
        }
        var confirmed = window.confirm('Remove this feature from your watchlist?');
        if (!confirmed) {
          return;
        }

        var originalDisabled = button.disabled;
        var originalLabel = button.textContent;
        button.disabled = true;
        button.textContent = 'Removing...';
        state.removing = true;
        renderForPopulateKey('watchlist-loading', renderLoading);

        try {
          var response = WebsiteSDK.removeRoadmapFeatureFromWatchlist(featureId);
          if (!response || response.success !== true) {
            state.removeError = response && response.message ? response.message : 'Unable to remove from watchlist. Please try again.';
          } else {
            state.removeError = null;
            state.items = (state.items || []).filter(function(item) {
              return item.id !== featureId;
            });
            if (typeof response.watchlist_count === 'number') {
              state.totalCount = response.watchlist_count;
            } else if (state.totalCount > 0) {
              state.totalCount = state.totalCount - 1;
            }
          }
        } catch (err) {
          state.removeError = 'Unable to remove from watchlist. Please try again.';
        }

        state.removing = false;
        button.disabled = originalDisabled;
        button.textContent = originalLabel;
        renderAll();
      }

      if (filterForm) {
        filterForm.addEventListener('submit', function(event) {
          event.preventDefault();
          applyFiltersFromForm();
        });
      }

      if (sortSelect) {
        sortSelect.addEventListener('change', function(event) {
          var value = event.target.value;
          state.filters.sort = value || 'release_date_soonest_first';
          var params = new URLSearchParams(window.location.search);
          if (value) {
            params.set('sort', value);
          } else {
            params.delete('sort');
          }
          var newSearch = params.toString();
          var newUrl = newSearch ? window.location.pathname + '?' + newSearch : window.location.pathname;
          window.history.pushState({}, '', newUrl);
          handleUrlChange();
        });
      }

      pageController.addEventListener('click', function(event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.dataset.action;

        if (action === 'clear-filters' || action === 'clear-filters-empty-state') {
          event.preventDefault();
          clearFiltersAndUpdateUrl();
        } else if (action === 'retry-load') {
          event.preventDefault();
          loadWatchlist();
        } else if (action === 'remove-from-watchlist') {
          event.preventDefault();
          var featureId = actionEl.getAttribute('data-roadmap-feature-id');
          handleRemoveFromWatchlist(actionEl, featureId);
        }
      });

      window.addEventListener('popstate', function() {
        handleUrlChange();
      });

      handleUrlChange();
    });
  </script>
</body>
</html>
