<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Game Roadmap &amp; Community</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&amp;family=Cormorant+Garamond:wght@400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>

  <!-- Site styles -->
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='help.css'>
</head>
<body class='site'>
  <header class='site-header'>
    <div class='header-inner container'>
      <nav class='primary-nav' aria-label='Main navigation'>
        <ul class='nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='roadmap.html' class='nav-link'>Roadmap</a>
          </li>
          <li class='nav-item'>
            <a href='community.html' class='nav-link'>Community</a>
          </li>
          <li class='nav-item'>
            <a href='updates.html' class='nav-link'>Updates</a>
          </li>
          <li class='nav-item'>
            <a href='watchlist.html' class='nav-link'>Watchlist</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-content container' tabindex='-1'>
    <section class='help-faq-page' aria-labelledby='helpFaqHeading'>
      <header class='help-faq-header'>
        <h1 id='helpFaqHeading' class='help-faq-title'>Help &amp; FAQ</h1>
        <div class='help-faq-title-underline' aria-hidden='true'></div>
      </header>

      <section class='help-faq-content' data-populate='getHelpFaqContent' data-component='faq-data-loader'>
        <!-- FAQ content and loader are rendered via JavaScript -->
      </section>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <div class='footer-divider' aria-hidden='true'>
        <span class='footer-divider-line'></span>
        <span class='footer-divider-ornament'></span>
        <span class='footer-divider-line'></span>
      </div>

      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='about.html' class='footer-link'>About</a>
          </li>
          <li class='footer-nav-item'>
            <a href='help.html' class='footer-link'>Help / FAQ</a>
          </li>
          <li class='footer-nav-item'>
            <a href='policies.html' class='footer-link'>Policies &amp; Guidelines</a>
          </li>
          <li class='footer-nav-item'>
            <a href='updates.html' class='footer-link'>Dev Updates</a>
          </li>
          <li class='footer-nav-item'>
            <a href='reading_list.html' class='footer-link'>Reading List</a>
          </li>
        </ul>
      </nav>

      <p class='footer-meta'>&copy; 2026 Frontier Game Studio. All rights reserved.</p>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var urlParams = new URLSearchParams(window.location.search);
    var pendingActiveSectionId = urlParams.get('section_id');
    var faqSections = [];
    var contactInfoHtml = '';
    var keyword = '';
    var activeSectionId = null;
    var expandedItems = new Set();

    var dynamicContainer = document.querySelector('[data-populate=\'getHelpFaqContent\']');
    if (!dynamicContainer) {
      return;
    }

    function escapeHtml(str) {
      if (!str) {
        return '';
      }
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/'/g, '&#39;');
    }

    function showLoader() {
      dynamicContainer.innerHTML = '';
      var loader = document.createElement('div');
      loader.className = 'faq-loader';
      loader.setAttribute('data-component', 'faq-data-loader');
      loader.setAttribute('role', 'status');
      loader.setAttribute('aria-live', 'polite');

      var spinner = document.createElement('div');
      spinner.className = 'faq-loader-spinner';

      var text = document.createElement('p');
      text.className = 'faq-loader-text';
      text.textContent = 'Loading help content\u2026';

      loader.appendChild(spinner);
      loader.appendChild(text);
      dynamicContainer.appendChild(loader);
    }

    function showError(message) {
      dynamicContainer.innerHTML = '';
      var errorBox = document.createElement('div');
      errorBox.className = 'faq-error';
      var p = document.createElement('p');
      p.textContent = message;
      errorBox.appendChild(p);
      dynamicContainer.appendChild(errorBox);
    }

    var navListContainer = null;
    var sectionListContainer = null;
    var contactBodyContainer = null;
    var searchInputEl = null;
    var searchFormEl = null;
    var searchClearBtn = null;

    function buildLayout() {
      dynamicContainer.innerHTML = '';

      var outer = document.createElement('div');
      outer.className = 'help-faq-inner';

      var controlsSection = document.createElement('section');
      controlsSection.className = 'help-faq-controls';

      searchFormEl = document.createElement('form');
      searchFormEl.className = 'faq-search-form';
      searchFormEl.setAttribute('role', 'search');
      searchFormEl.setAttribute('data-component', 'faq-keyword-filter');

      var label = document.createElement('label');
      label.className = 'faq-search-label';
      label.setAttribute('for', 'faqSearchInput');
      label.textContent = 'Search FAQs';

      var searchInputWrap = document.createElement('div');
      searchInputWrap.className = 'faq-search-input-wrap';

      searchInputEl = document.createElement('input');
      searchInputEl.className = 'faq-search-input';
      searchInputEl.type = 'search';
      searchInputEl.id = 'faqSearchInput';
      searchInputEl.name = 'keyword';
      searchInputEl.placeholder = 'Type a keyword (e.g., roadmap, watchlist, bug reports)';
      searchInputEl.setAttribute('autocomplete', 'off');
      searchInputEl.setAttribute('data-action', 'faq-keyword-input');

      var submitBtn = document.createElement('button');
      submitBtn.type = 'submit';
      submitBtn.className = 'faq-search-submit';
      submitBtn.setAttribute('data-action', 'faq-keyword-submit');
      submitBtn.textContent = 'Search';

      searchClearBtn = document.createElement('button');
      searchClearBtn.type = 'button';
      searchClearBtn.className = 'faq-search-clear';
      searchClearBtn.setAttribute('data-action', 'faq-keyword-clear');
      searchClearBtn.textContent = 'Clear';

      searchInputWrap.appendChild(searchInputEl);
      searchInputWrap.appendChild(submitBtn);
      searchInputWrap.appendChild(searchClearBtn);

      searchFormEl.appendChild(label);
      searchFormEl.appendChild(searchInputWrap);

      var nav = document.createElement('nav');
      nav.className = 'faq-inpage-nav';
      nav.setAttribute('aria-label', 'FAQ sections');
      nav.setAttribute('data-component', 'faq-in-page-nav');

      navListContainer = document.createElement('ul');
      navListContainer.className = 'faq-inpage-nav-list';
      nav.appendChild(navListContainer);

      controlsSection.appendChild(searchFormEl);
      controlsSection.appendChild(nav);

      var mainSection = document.createElement('section');
      mainSection.className = 'faq-main-body';

      sectionListContainer = document.createElement('div');
      sectionListContainer.className = 'faq-section-list';
      sectionListContainer.setAttribute('data-component', 'faq-section-list');

      var contactSection = document.createElement('section');
      contactSection.className = 'faq-contact';
      contactSection.setAttribute('data-component', 'faq-contact-info');

      var contactHeading = document.createElement('h2');
      contactHeading.className = 'faq-contact-heading';
      contactHeading.textContent = 'Still need help?';

      contactBodyContainer = document.createElement('div');
      contactBodyContainer.className = 'faq-contact-body';

      contactSection.appendChild(contactHeading);
      contactSection.appendChild(contactBodyContainer);

      mainSection.appendChild(sectionListContainer);
      mainSection.appendChild(contactSection);

      outer.appendChild(controlsSection);
      outer.appendChild(mainSection);
      dynamicContainer.appendChild(outer);

      attachEventHandlers();
    }

    function renderNavPills(container) {
      container.innerHTML = '';
      for (var i = 0; i < faqSections.length; i++) {
        var section = faqSections[i];
        var li = document.createElement('li');
        li.className = 'faq-inpage-nav-item';

        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'faq-inpage-nav-button';
        btn.setAttribute('data-action', 'faq-nav-click');
        if (section && typeof section.id !== 'undefined') {
          btn.setAttribute('data-section-id', String(section.id));
        }
        if (section && section.id === activeSectionId) {
          btn.classList.add('is-active');
        }
        btn.textContent = section && section.title ? section.title : 'Section';

        li.appendChild(btn);
        container.appendChild(li);
      }
    }

    function renderSections(container) {
      container.innerHTML = '';
      var trimmed = keyword ? String(keyword).trim().toLowerCase() : '';
      var anySectionRendered = false;
      var sectionCounter = 0;

      for (var s = 0; s < faqSections.length; s++) {
        var section = faqSections[s];
        if (!section || !Array.isArray(section.items)) {
          continue;
        }

        var matchedIndices = [];
        for (var j = 0; j < section.items.length; j++) {
          var item = section.items[j];
          if (!item) {
            continue;
          }
          if (!trimmed) {
            matchedIndices.push(j);
          } else {
            var questionText = item.question ? String(item.question).toLowerCase() : '';
            var answerText = item.answer_html ? String(item.answer_html).toLowerCase() : '';
            if (questionText.indexOf(trimmed) !== -1 || answerText.indexOf(trimmed) !== -1) {
              matchedIndices.push(j);
            }
          }
        }

        if (matchedIndices.length === 0) {
          continue;
        }

        anySectionRendered = true;
        var sectionIndex = sectionCounter;

        var sectionEl = document.createElement('section');
        sectionEl.className = 'faq-section-card';
        sectionEl.setAttribute('data-component', 'faq-section');
        if (section && typeof section.id !== 'undefined') {
          sectionEl.setAttribute('data-section-id', String(section.id));
        }
        sectionEl.setAttribute('data-section-index', String(sectionIndex));
        if (section && section.id === activeSectionId) {
          sectionEl.classList.add('is-active');
        }

        var header = document.createElement('header');
        header.className = 'faq-section-header';

        var headerBtn = document.createElement('button');
        headerBtn.type = 'button';
        headerBtn.className = 'faq-section-header-button';
        headerBtn.setAttribute('data-action', 'faq-section-header');
        headerBtn.textContent = section && section.title ? section.title : 'Section';

        header.appendChild(headerBtn);
        sectionEl.appendChild(header);

        var itemsContainer = document.createElement('div');
        itemsContainer.className = 'faq-items';

        for (var m = 0; m < matchedIndices.length; m++) {
          var itemIndex = matchedIndices[m];
          var itemToRender = section.items[itemIndex];
          var itemEl = renderFaqItem(section, sectionIndex, itemToRender, itemIndex);
          itemsContainer.appendChild(itemEl);
        }

        sectionEl.appendChild(itemsContainer);
        container.appendChild(sectionEl);

        sectionCounter += 1;
      }

      if (!anySectionRendered) {
        var empty = document.createElement('p');
        empty.className = 'faq-empty';
        empty.textContent = 'No questions match your search. Try a different keyword.';
        container.appendChild(empty);
      }
    }

    function renderFaqItem(section, sectionIndex, item, itemIndex) {
      var itemEl = document.createElement('article');
      itemEl.className = 'faq-item';
      if (section && typeof section.id !== 'undefined') {
        itemEl.setAttribute('data-section-id', String(section.id));
      }
      itemEl.setAttribute('data-section-index', String(sectionIndex));
      itemEl.setAttribute('data-item-index', String(itemIndex));

      var sectionIdForKey = section && typeof section.id !== 'undefined' ? String(section.id) : String(sectionIndex);
      var itemKey = sectionIdForKey + '::' + String(itemIndex);
      var autoExpand = section && section.id === activeSectionId && itemIndex === 0 && !keyword;
      var isExpanded = expandedItems.has(itemKey) || autoExpand;

      var questionBtn = document.createElement('button');
      questionBtn.type = 'button';
      questionBtn.className = 'faq-item-question';
      questionBtn.setAttribute('data-action', 'faq-item-toggle');
      questionBtn.setAttribute('data-section-index', String(sectionIndex));
      questionBtn.setAttribute('data-item-index', String(itemIndex));
      if (section && typeof section.id !== 'undefined') {
        questionBtn.setAttribute('data-section-id', String(section.id));
      }
      questionBtn.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');

      var questionTextSpan = document.createElement('span');
      questionTextSpan.className = 'faq-item-question-text';
      questionTextSpan.textContent = item && item.question ? item.question : '';

      var iconSpan = document.createElement('span');
      iconSpan.className = 'faq-item-question-icon';
      iconSpan.setAttribute('aria-hidden', 'true');

      questionBtn.appendChild(questionTextSpan);
      questionBtn.appendChild(iconSpan);

      var answerDiv = document.createElement('div');
      var answerId = 'faq-answer-sec' + String(sectionIndex) + '-item' + String(itemIndex);
      answerDiv.className = 'faq-item-answer';
      answerDiv.id = answerId;
      if (!isExpanded) {
        answerDiv.hidden = true;
      }
      questionBtn.setAttribute('aria-controls', answerId);
      answerDiv.innerHTML = item && item.answer_html ? item.answer_html : '';

      itemEl.appendChild(questionBtn);
      itemEl.appendChild(answerDiv);

      if (isExpanded) {
        expandedItems.add(itemKey);
      }

      return itemEl;
    }

    function renderContact(container) {
      container.innerHTML = '';
      if (contactInfoHtml) {
        container.innerHTML = contactInfoHtml;
      } else {
        var p = document.createElement('p');
        p.textContent = 'For additional support, please reach out via the in-game support menu or our official community channels.';
        container.appendChild(p);
      }
    }

    function updateUrlSectionParam(sectionId, replace) {
      var url = new URL(window.location.href);
      if (sectionId) {
        url.searchParams.set('section_id', sectionId);
      } else {
        url.searchParams.delete('section_id');
      }
      if (replace) {
        window.history.replaceState(window.history.state, '', url.toString());
      } else {
        window.history.pushState(window.history.state, '', url.toString());
      }
    }

    function scrollToSection(sectionId, smooth) {
      if (!sectionListContainer || !sectionId) {
        return;
      }
      var sections = sectionListContainer.querySelectorAll('[data-section-id]');
      var target = null;
      for (var i = 0; i < sections.length; i++) {
        var sec = sections[i];
        if (sec.getAttribute('data-section-id') === String(sectionId)) {
          target = sec;
          break;
        }
      }
      if (!target) {
        return;
      }
      var behavior = smooth ? 'smooth' : 'auto';
      target.scrollIntoView({ behavior: behavior, block: 'start' });
    }

    function handleSearchSubmit(event) {
      event.preventDefault();
      keyword = searchInputEl && searchInputEl.value ? searchInputEl.value.toLowerCase() : '';
      renderSections(sectionListContainer);
    }

    function handleSearchInput() {
      keyword = searchInputEl && searchInputEl.value ? searchInputEl.value.toLowerCase() : '';
      renderSections(sectionListContainer);
    }

    function handleSearchClear() {
      if (searchInputEl) {
        searchInputEl.value = '';
      }
      keyword = '';
      renderSections(sectionListContainer);
    }

    function handleNavClick(event) {
      var btn = event.target.closest('[data-action="faq-nav-click"]');
      if (!btn) {
        return;
      }
      var sectionId = btn.getAttribute('data-section-id');
      if (!sectionId) {
        return;
      }
      activeSectionId = sectionId;
      renderNavPills(navListContainer);
      renderSections(sectionListContainer);
      updateUrlSectionParam(sectionId, false);
      scrollToSection(sectionId, true);
    }

    function handleSectionListClick(event) {
      var toggleBtn = event.target.closest('[data-action="faq-item-toggle"]');
      if (toggleBtn) {
        var sectionIdAttr = toggleBtn.getAttribute('data-section-id');
        var sectionIndexAttr = toggleBtn.getAttribute('data-section-index');
        var itemIndexAttr = toggleBtn.getAttribute('data-item-index');
        if (sectionIndexAttr == null || itemIndexAttr == null) {
          return;
        }
        var sectionIndex = sectionIndexAttr;
        var itemIndex = itemIndexAttr;
        var sectionIdForKey = sectionIdAttr ? sectionIdAttr : sectionIndex;
        var key = String(sectionIdForKey) + '::' + String(itemIndex);
        var answerId = 'faq-answer-sec' + String(sectionIndex) + '-item' + String(itemIndex);
        var answerEl = document.getElementById(answerId);
        var currentlyExpanded = expandedItems.has(key);

        if (currentlyExpanded) {
          expandedItems.delete(key);
          toggleBtn.setAttribute('aria-expanded', 'false');
          if (answerEl) {
            answerEl.hidden = true;
          }
        } else {
          expandedItems.add(key);
          toggleBtn.setAttribute('aria-expanded', 'true');
          if (answerEl) {
            answerEl.hidden = false;
          }
        }
        return;
      }

      var headerBtn = event.target.closest('[data-action="faq-section-header"]');
      if (headerBtn) {
        var parentSection = headerBtn.closest('[data-section-id]');
        if (!parentSection) {
          return;
        }
        var sectionIdHeader = parentSection.getAttribute('data-section-id');
        if (!sectionIdHeader) {
          return;
        }
        activeSectionId = sectionIdHeader;
        renderNavPills(navListContainer);
        renderSections(sectionListContainer);
        updateUrlSectionParam(sectionIdHeader, false);
        scrollToSection(sectionIdHeader, true);
      }
    }

    function attachEventHandlers() {
      if (searchFormEl) {
        searchFormEl.addEventListener('submit', handleSearchSubmit);
      }
      if (searchInputEl) {
        searchInputEl.addEventListener('input', handleSearchInput);
      }
      if (searchClearBtn) {
        searchClearBtn.addEventListener('click', handleSearchClear);
      }
      if (navListContainer) {
        navListContainer.addEventListener('click', handleNavClick);
      }
      if (sectionListContainer) {
        sectionListContainer.addEventListener('click', handleSectionListClick);
      }

      window.addEventListener('popstate', function() {
        var params = new URLSearchParams(window.location.search);
        var sectionIdFromUrl = params.get('section_id');
        pendingActiveSectionId = sectionIdFromUrl;
        if (!faqSections || faqSections.length === 0) {
          return;
        }
        if (sectionIdFromUrl && faqSections.some(function(sec) { return sec && sec.id === sectionIdFromUrl; })) {
          activeSectionId = sectionIdFromUrl;
        } else if (faqSections[0] && typeof faqSections[0].id !== 'undefined') {
          activeSectionId = String(faqSections[0].id);
        } else {
          activeSectionId = null;
        }
        renderNavPills(navListContainer);
        renderSections(sectionListContainer);
        if (activeSectionId) {
          scrollToSection(activeSectionId, true);
        }
      });
    }

    function initializeFromData(data) {
      faqSections = Array.isArray(data && data.faq_sections) ? data.faq_sections : [];
      contactInfoHtml = data && data.contact_info_html ? data.contact_info_html : '';

      if (pendingActiveSectionId && faqSections.some(function(sec) { return sec && sec.id === pendingActiveSectionId; })) {
        activeSectionId = pendingActiveSectionId;
      } else if (faqSections[0] && typeof faqSections[0].id !== 'undefined') {
        activeSectionId = String(faqSections[0].id);
        updateUrlSectionParam(activeSectionId, true);
      }

      buildLayout();
      renderNavPills(navListContainer);
      renderSections(sectionListContainer);
      renderContact(contactBodyContainer);

      if (activeSectionId) {
        scrollToSection(activeSectionId, false);
      }
    }

    try {
      showLoader();
      var data = WebsiteSDK.getHelpFaqContent();
      initializeFromData(data);
    } catch (error) {
      showError('Unable to load help content right now. Please try again later.');
    }
  });
  </script>
</body>
</html>
