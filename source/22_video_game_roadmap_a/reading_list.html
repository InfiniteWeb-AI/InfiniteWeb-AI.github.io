<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Reading List - Game Roadmap &amp; Community</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&amp;family=Cormorant+Garamond:wght@400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>

  <!-- Site styles -->
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='reading_list.css'>
</head>
<body class='site'>
  <header class='site-header'>
    <div class='header-inner container'>
      <nav class='primary-nav' aria-label='Main navigation'>
        <ul class='nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='roadmap.html' class='nav-link'>Roadmap</a>
          </li>
          <li class='nav-item'>
            <a href='community.html' class='nav-link'>Community</a>
          </li>
          <li class='nav-item'>
            <a href='updates.html' class='nav-link'>Updates</a>
          </li>
          <li class='nav-item'>
            <a href='watchlist.html' class='nav-link'>Watchlist</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-content container reading-list-page' tabindex='-1' data-component='reading-list-page-controller'>
    <section class='reading-list-header' aria-labelledby='reading-list-title'>
      <div class='reading-list-title-block'>
        <h1 id='reading-list-title' class='page-title deco-heading'>Reading List</h1>
        <div class='page-title-ornament' aria-hidden='true'>
          <span class='ornament-line'></span>
          <span class='ornament-glyph'></span>
          <span class='ornament-line'></span>
        </div>
      </div>

      <div class='reading-list-controls'>
        <form class='reading-list-search-form' data-component='reading-list-search-form' data-action='search-form'>
          <label class='visually-hidden' for='reading-list-search-input'>Search saved dev updates</label>
          <div class='search-input-pill'>
            <input id='reading-list-search-input' name='search_query' type='search' autocomplete='off' placeholder='Search your saved dev updates'>
            <button type='submit' class='pill-button pill-button-primary'>Search</button>
          </div>
        </form>

        <div class='reading-list-control-cluster'>
          <form class='date-filter-form' data-component='reading-list-date-filter' data-action='date-filter-form'>
            <div class='date-filter-fields'>
              <div class='date-filter-field'>
                <label for='date-from-input'>From</label>
                <input id='date-from-input' name='date_from' type='date'>
              </div>
              <div class='date-filter-field'>
                <label for='date-to-input'>To</label>
                <input id='date-to-input' name='date_to' type='date'>
              </div>
            </div>
            <div class='date-filter-actions'>
              <button type='button' class='pill-button pill-button-ghost' data-action='apply-date-filter'>Apply</button>
              <button type='button' class='link-button' data-action='clear-date-filter'>Clear</button>
            </div>
          </form>

          <div class='sort-page-size-wrap'>
            <div class='sort-control pill-control' data-component='reading-list-sort-control'>
              <label class='visually-hidden' for='sort-select'>Sort reading list</label>
              <select id='sort-select' name='sort' data-action='change-sort'>
                <option value='most_recent_added'>Most recently saved</option>
                <option value='oldest_added'>Oldest saved</option>
                <option value='published_newest_first'>Published - newest first</option>
              </select>
            </div>
            <div class='page-size-control pill-control' data-component='reading-list-page-size-control'>
              <label class='visually-hidden' for='page-size-select'>Items per page</label>
              <select id='page-size-select' name='page_size' data-action='change-page-size'>
                <option value='10'>10 / page</option>
                <option value='20'>20 / page</option>
                <option value='50'>50 / page</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class='reading-list-applied-filters' data-component='reading-list-applied-filters-bar' aria-live='polite'></div>
    </section>

    <section class='reading-list-results-section'>
      <div class='reading-list-status' aria-live='polite'>
        <span class='status-message' data-populate='status-message'></span>
      </div>

      <div class='reading-list-results' data-component='reading-list-results' data-populate='reading-list-items'></div>

      <div class='reading-list-empty-state-container' data-component='reading-list-empty-state' hidden></div>

      <nav class='reading-list-pagination' data-component='reading-list-pagination' aria-label='Reading list pages'></nav>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <div class='footer-divider' aria-hidden='true'>
        <span class='footer-divider-line'></span>
        <span class='footer-divider-ornament'></span>
        <span class='footer-divider-line'></span>
      </div>

      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='about.html' class='footer-link'>About</a>
          </li>
          <li class='footer-nav-item'>
            <a href='help.html' class='footer-link'>Help / FAQ</a>
          </li>
          <li class='footer-nav-item'>
            <a href='policies.html' class='footer-link'>Policies &amp; Guidelines</a>
          </li>
          <li class='footer-nav-item'>
            <a href='updates.html' class='footer-link'>Dev Updates</a>
          </li>
          <li class='footer-nav-item'>
            <a href='reading_list.html' class='footer-link'>Reading List</a>
          </li>
        </ul>
      </nav>

      <p class='footer-meta'>&copy; 2026 Frontier Game Studio. All rights reserved.</p>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var state = {
        items: [],
        totalCount: 0,
        isLoading: false,
        lastError: null
      };

      var resultsContainer = document.querySelector('[data-component="reading-list-results"]');
      var emptyStateContainer = document.querySelector('[data-component="reading-list-empty-state"]');
      var paginationContainer = document.querySelector('[data-component="reading-list-pagination"]');
      var appliedFiltersBar = document.querySelector('[data-component="reading-list-applied-filters-bar"]');
      var searchForm = document.querySelector('[data-component="reading-list-search-form"]');
      var searchInput = document.getElementById('reading-list-search-input');
      var dateFilterForm = document.querySelector('[data-component="reading-list-date-filter"]');
      var dateFromInput = document.getElementById('date-from-input');
      var dateToInput = document.getElementById('date-to-input');
      var sortSelect = document.getElementById('sort-select');
      var pageSizeSelect = document.getElementById('page-size-select');

      function parseUrlParams() {
        var urlParams = new URLSearchParams(window.location.search);
        var params = {
          search_query: '',
          date_from: null,
          date_to: null,
          sort: 'most_recent_added',
          page: 1,
          page_size: 20
        };

        var search = urlParams.get('search_query');
        if (search && search.trim() !== '') {
          params.search_query = search.trim();
        }

        var df = urlParams.get('date_from');
        if (df && df.trim() !== '') {
          params.date_from = df.trim();
        }

        var dt = urlParams.get('date_to');
        if (dt && dt.trim() !== '') {
          params.date_to = dt.trim();
        }

        var sort = urlParams.get('sort');
        if (sort === 'most_recent_added' || sort === 'oldest_added' || sort === 'published_newest_first') {
          params.sort = sort;
        }

        var pageRaw = parseInt(urlParams.get('page'), 10);
        if (!isNaN(pageRaw) && pageRaw > 0) {
          params.page = pageRaw;
        }

        var pageSizeRaw = parseInt(urlParams.get('page_size'), 10);
        if (!isNaN(pageSizeRaw) && pageSizeRaw > 0) {
          params.page_size = pageSizeRaw;
        }

        return params;
      }

      function syncControlsFromParams(params) {
        if (searchInput) {
          searchInput.value = params.search_query || '';
        }
        if (dateFromInput) {
          dateFromInput.value = params.date_from || '';
        }
        if (dateToInput) {
          dateToInput.value = params.date_to || '';
        }
        if (sortSelect) {
          sortSelect.value = params.sort;
        }
        if (pageSizeSelect) {
          pageSizeSelect.value = String(params.page_size);
        }
      }

      function updateUrlParams(updates) {
        var urlParams = new URLSearchParams(window.location.search);
        Object.keys(updates).forEach(function(key) {
          var value = updates[key];
          if (value === null || value === undefined || value === '') {
            urlParams.delete(key);
          } else {
            urlParams.set(key, String(value));
          }
        });
        var newUrl = window.location.pathname;
        var queryString = urlParams.toString();
        if (queryString) {
          newUrl += '?' + queryString;
        }
        window.history.pushState(null, '', newUrl);
      }

      function hasActiveFilters(params) {
        if (params.search_query && params.search_query !== '') {
          return true;
        }
        if (params.date_from || params.date_to) {
          return true;
        }
        if (params.sort && params.sort !== 'most_recent_added') {
          return true;
        }
        return false;
      }

      function renderAppliedFilters(container, params) {
        container.innerHTML = '';
        var active = hasActiveFilters(params);
        if (!active) {
          container.classList.add('is-empty');
          return;
        }
        container.classList.remove('is-empty');

        var wrapper = document.createElement('div');
        wrapper.className = 'applied-filters-inner';

        var label = document.createElement('span');
        label.className = 'applied-filters-label';
        label.textContent = 'Active filters';
        wrapper.appendChild(label);

        var chips = document.createElement('div');
        chips.className = 'applied-filters-chips';

        if (params.search_query) {
          var searchChip = document.createElement('button');
          searchChip.type = 'button';
          searchChip.className = 'filter-chip';
          searchChip.dataset.action = 'clear-search-filter';
          searchChip.textContent = 'Search: ' + params.search_query + ' ␀d7';
          chips.appendChild(searchChip);
        }

        if (params.date_from || params.date_to) {
          var rangeLabel = '';
          if (params.date_from && params.date_to) {
            rangeLabel = params.date_from + ' ␀b7 ' + params.date_to;
          } else if (params.date_from) {
            rangeLabel = 'From ' + params.date_from;
          } else if (params.date_to) {
            rangeLabel = 'Until ' + params.date_to;
          }
          var dateChip = document.createElement('button');
          dateChip.type = 'button';
          dateChip.className = 'filter-chip';
          dateChip.dataset.action = 'clear-date-range-filter';
          dateChip.textContent = 'Date: ' + rangeLabel + ' ␀d7';
          chips.appendChild(dateChip);
        }

        if (params.sort && params.sort !== 'most_recent_added') {
          var sortLabel = 'Sort: ' + (params.sort === 'oldest_added' ? 'Oldest saved' : 'Published - newest first');
          var sortChip = document.createElement('span');
          sortChip.className = 'filter-chip filter-chip-static';
          sortChip.textContent = sortLabel;
          chips.appendChild(sortChip);
        }

        wrapper.appendChild(chips);

        var clearAll = document.createElement('button');
        clearAll.type = 'button';
        clearAll.className = 'link-button clear-all-filters-button';
        clearAll.dataset.action = 'clear-all-filters';
        clearAll.textContent = 'Clear all';
        wrapper.appendChild(clearAll);

        container.appendChild(wrapper);
      }

      function renderResults(container, items, params) {
        container.removeAttribute('data-loading');
        container.innerHTML = '';
        if (!items || items.length === 0) {
          return;
        }

        var stack = document.createElement('div');
        stack.className = 'reading-list-items-stack';

        items.forEach(function(update) {
          var article = document.createElement('article');
          article.className = 'reading-list-item';
          article.dataset.component = 'reading-list-item-row';
          article.dataset.devUpdateId = update.id;

          var inner = document.createElement('div');
          inner.className = 'reading-list-item-inner';

          var main = document.createElement('div');
          main.className = 'reading-list-item-main';
          main.dataset.action = 'open-item';
          main.setAttribute('role', 'button');
          main.setAttribute('tabindex', '0');

          var thumb = document.createElement('div');
          thumb.className = 'reading-list-item-thumbnail';

          var badge = document.createElement('div');
          badge.className = 'reading-list-item-date-badge';

          var publishedDate = new Date(update.published_at);
          var day = publishedDate.getDate();
          var month = publishedDate.toLocaleString(undefined, { month: 'short' });
          var year = publishedDate.getFullYear();

          var daySpan = document.createElement('span');
          daySpan.className = 'badge-day';
          daySpan.textContent = String(day);
          var monthSpan = document.createElement('span');
          monthSpan.className = 'badge-month';
          monthSpan.textContent = month.toUpperCase();
          var yearSpan = document.createElement('span');
          yearSpan.className = 'badge-year';
          yearSpan.textContent = String(year);

          badge.appendChild(daySpan);
          badge.appendChild(monthSpan);
          badge.appendChild(yearSpan);
          thumb.appendChild(badge);

          var body = document.createElement('div');
          body.className = 'reading-list-item-body';

          var title = document.createElement('h2');
          title.className = 'reading-list-item-title';
          title.textContent = update.title;

          var summary = document.createElement('p');
          summary.className = 'reading-list-item-summary';
          summary.textContent = update.summary || '';

          var meta = document.createElement('div');
          meta.className = 'reading-list-item-meta';

          var published = document.createElement('time');
          published.className = 'item-meta-published';
          published.dateTime = update.published_at;
          published.textContent = 'Published ' + publishedDate.toLocaleDateString();

          var tagsSpan = document.createElement('span');
          tagsSpan.className = 'item-meta-tags';
          if (update.tags && update.tags.length) {
            tagsSpan.textContent = update.tags.join(' ␀b7 ');
          }

          meta.appendChild(published);
          if (tagsSpan.textContent) {
            var sep = document.createElement('span');
            sep.className = 'item-meta-separator';
            sep.textContent = '␀b7';
            meta.appendChild(sep);
            meta.appendChild(tagsSpan);
          }

          body.appendChild(title);
          if (summary.textContent) {
            body.appendChild(summary);
          }
          body.appendChild(meta);

          main.appendChild(thumb);
          main.appendChild(body);

          var controls = document.createElement('div');
          controls.className = 'reading-list-item-controls';

          var openButton = document.createElement('button');
          openButton.type = 'button';
          openButton.className = 'pill-button pill-button-ghost';
          openButton.dataset.action = 'open-item';
          openButton.textContent = 'Open';

          var removeButton = document.createElement('button');
          removeButton.type = 'button';
          removeButton.className = 'pill-button pill-button-secondary';
          removeButton.dataset.action = 'remove-item';
          removeButton.textContent = 'Remove';

          controls.appendChild(openButton);
          controls.appendChild(removeButton);

          inner.appendChild(main);
          inner.appendChild(controls);
          article.appendChild(inner);

          stack.appendChild(article);
        });

        container.appendChild(stack);
      }

      function renderPagination(container, params, totalCount) {
        container.innerHTML = '';
        var pageSize = params.page_size || 1;
        var totalPages = pageSize > 0 ? Math.ceil(totalCount / pageSize) : 0;

        if (!totalPages || totalPages <= 1) {
          container.classList.add('is-hidden');
          return;
        }
        container.classList.remove('is-hidden');

        var wrapper = document.createElement('div');
        wrapper.className = 'pagination-inner';

        var prevButton = document.createElement('button');
        prevButton.type = 'button';
        prevButton.className = 'pagination-button pagination-prev pill-button pill-button-ghost';
        prevButton.dataset.action = 'page-prev';
        prevButton.textContent = 'Previous';
        if (params.page <= 1) {
          prevButton.disabled = true;
        }

        wrapper.appendChild(prevButton);

        var pagesList = document.createElement('div');
        pagesList.className = 'pagination-pages';

        var maxButtons = 7;
        var start = Math.max(1, params.page - 3);
        var end = Math.min(totalPages, start + maxButtons - 1);
        if (end - start < maxButtons - 1) {
          start = Math.max(1, end - maxButtons + 1);
        }

        for (var p = start; p <= end; p += 1) {
          var pageButton = document.createElement('button');
          pageButton.type = 'button';
          pageButton.className = 'pagination-button pagination-page pill-button pill-button-ghost';
          pageButton.dataset.action = 'page-change';
          pageButton.dataset.page = String(p);
          pageButton.textContent = String(p);
          if (p === params.page) {
            pageButton.classList.add('is-current');
            pageButton.disabled = true;
          }
          pagesList.appendChild(pageButton);
        }

        wrapper.appendChild(pagesList);

        var nextButton = document.createElement('button');
        nextButton.type = 'button';
        nextButton.className = 'pagination-button pagination-next pill-button pill-button-ghost';
        nextButton.dataset.action = 'page-next';
        nextButton.textContent = 'Next';
        if (params.page >= totalPages) {
          nextButton.disabled = true;
        }

        wrapper.appendChild(nextButton);

        container.appendChild(wrapper);
      }

      function renderEmptyState(container, params, totalCount) {
        container.innerHTML = '';
        if (totalCount && totalCount > 0) {
          container.hidden = true;
          return;
        }
        container.hidden = false;

        var card = document.createElement('div');
        card.className = 'empty-state-card';

        var title = document.createElement('h2');
        title.className = 'empty-state-title';

        var body = document.createElement('p');
        body.className = 'empty-state-body';

        var filtersActive = hasActiveFilters(params);
        if (filtersActive) {
          title.textContent = 'No saved updates match these filters';
          body.textContent = 'Try adjusting your search or clearing the date filters to see more saved dev updates.';
        } else {
          title.textContent = 'No saved updates yet';
          body.textContent = 'When you save dev updates to your reading list, they will appear here for quick access.';
        }

        var actions = document.createElement('div');
        actions.className = 'empty-state-actions';

        if (filtersActive) {
          var clearButton = document.createElement('button');
          clearButton.type = 'button';
          clearButton.className = 'pill-button pill-button-primary';
          clearButton.dataset.action = 'clear-filters';
          clearButton.textContent = 'Clear filters';
          actions.appendChild(clearButton);
        }

        var backButton = document.createElement('button');
        backButton.type = 'button';
        backButton.className = 'pill-button pill-button-ghost';
        backButton.dataset.action = 'back-to-updates';
        backButton.textContent = 'Browse dev updates';
        actions.appendChild(backButton);

        card.appendChild(title);
        card.appendChild(body);
        card.appendChild(actions);

        container.appendChild(card);
      }

      function renderErrorState(container) {
        container.innerHTML = '';
        var card = document.createElement('div');
        card.className = 'reading-list-error-card';

        var title = document.createElement('h2');
        title.className = 'error-title';
        title.textContent = 'Unable to load your reading list';

        var body = document.createElement('p');
        body.className = 'error-body';
        body.textContent = 'Something went wrong while fetching your saved updates. Please try again.';

        var retryButton = document.createElement('button');
        retryButton.type = 'button';
        retryButton.className = 'pill-button pill-button-primary';
        retryButton.dataset.action = 'retry-load';
        retryButton.textContent = 'Retry';

        card.appendChild(title);
        card.appendChild(body);
        card.appendChild(retryButton);

        container.appendChild(card);
      }

      function loadReadingList(options) {
        var params = parseUrlParams();
        syncControlsFromParams(params);

        state.isLoading = true;
        state.lastError = null;

        if (resultsContainer) {
          resultsContainer.setAttribute('data-loading', 'true');
          resultsContainer.innerHTML = '';
          var loading = document.createElement('div');
          loading.className = 'reading-list-loading';
          loading.textContent = 'Loading your saved updates...';
          resultsContainer.appendChild(loading);
        }

        try {
          var response = WebsiteSDK.getReadingListItems(
            params.search_query || '',
            params.date_from || '',
            params.date_to || '',
            params.sort,
            params.page,
            params.page_size
          );

          var items = response && response.items ? response.items : [];
          var total = response && typeof response.total_count === 'number' ? response.total_count : 0;

          var totalPages = params.page_size > 0 ? Math.ceil(total / params.page_size) : 0;
          if (totalPages > 0 && params.page > totalPages) {
            if (!options || !options.alreadyAdjusted) {
              updateUrlParams({ page: totalPages });
              loadReadingList({ alreadyAdjusted: true });
              return;
            }
          }

          state.items = items;
          state.totalCount = total;
          state.isLoading = false;

          if (resultsContainer) {
            renderResults(resultsContainer, items, params);
          }
          if (appliedFiltersBar) {
            renderAppliedFilters(appliedFiltersBar, params);
          }
          if (paginationContainer) {
            renderPagination(paginationContainer, params, total);
          }
          if (emptyStateContainer) {
            renderEmptyState(emptyStateContainer, params, total);
          }
        } catch (err) {
          state.isLoading = false;
          state.lastError = err;
          if (resultsContainer) {
            renderErrorState(resultsContainer);
          }
        }
      }

      function handleSearchSubmit(event) {
        event.preventDefault();
        var value = searchInput ? searchInput.value.trim() : '';
        var updates = { search_query: value, page: 1 };
        if (!value) {
          updates.search_query = '';
        }
        updateUrlParams(updates);
        loadReadingList();
      }

      function handleApplyDateFilter() {
        var fromValue = dateFromInput ? dateFromInput.value : '';
        var toValue = dateToInput ? dateToInput.value : '';

        if (fromValue && toValue && fromValue > toValue) {
          alert('Start date must be before end date.');
          return;
        }

        var updates = { page: 1 };
        updates.date_from = fromValue || '';
        updates.date_to = toValue || '';
        updateUrlParams(updates);
        loadReadingList();
      }

      function handleClearDateFilter() {
        if (dateFromInput) {
          dateFromInput.value = '';
        }
        if (dateToInput) {
          dateToInput.value = '';
        }
        updateUrlParams({ date_from: '', date_to: '', page: 1 });
        loadReadingList();
      }

      function handleSortChange() {
        if (!sortSelect) {
          return;
        }
        var sort = sortSelect.value;
        updateUrlParams({ sort: sort, page: 1 });
        loadReadingList();
      }

      function handlePageSizeChange() {
        if (!pageSizeSelect) {
          return;
        }
        var value = parseInt(pageSizeSelect.value, 10);
        if (isNaN(value) || value <= 0) {
          return;
        }
        updateUrlParams({ page_size: value, page: 1 });
        loadReadingList();
      }

      function handlePaginationClick(event) {
        var target = event.target;
        var actionEl = target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.dataset.action;
        var params = parseUrlParams();
        var pageSize = params.page_size || 1;
        var totalPages = pageSize > 0 ? Math.ceil(state.totalCount / pageSize) : 0;

        if (action === 'page-prev') {
          if (params.page > 1) {
            updateUrlParams({ page: params.page - 1 });
            loadReadingList();
          }
        } else if (action === 'page-next') {
          if (params.page < totalPages) {
            updateUrlParams({ page: params.page + 1 });
            loadReadingList();
          }
        } else if (action === 'page-change') {
          var pageValue = parseInt(actionEl.dataset.page, 10);
          if (!isNaN(pageValue) && pageValue >= 1 && (!totalPages || pageValue <= totalPages)) {
            updateUrlParams({ page: pageValue });
            loadReadingList();
          }
        }
      }

      function handleResultsClick(event) {
        var target = event.target;
        var actionEl = target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.dataset.action;
        if (action === 'open-item') {
          var row = actionEl.closest('[data-component="reading-list-item-row"]');
          if (!row) {
            return;
          }
          var devId = row.dataset.devUpdateId;
          if (!devId) {
            return;
          }
          var url = 'update_detail.html?id=' + encodeURIComponent(devId);
          window.location.href = url;
        } else if (action === 'remove-item') {
          var rowToRemove = actionEl.closest('[data-component="reading-list-item-row"]');
          if (!rowToRemove) {
            return;
          }
          var removeId = rowToRemove.dataset.devUpdateId;
          if (!removeId) {
            return;
          }

          var newItems = [];
          for (var i = 0; i < state.items.length; i += 1) {
            var item = state.items[i];
            if (item.id !== removeId) {
              newItems.push(item);
            }
          }
          state.items = newItems;
          if (state.totalCount > 0) {
            state.totalCount -= 1;
          }

          var params = parseUrlParams();
          if (newItems.length === 0 && state.totalCount > 0 && params.page > 1) {
            updateUrlParams({ page: params.page - 1 });
            loadReadingList();
            return;
          }

          if (resultsContainer) {
            renderResults(resultsContainer, state.items, params);
          }
          if (paginationContainer) {
            renderPagination(paginationContainer, params, state.totalCount);
          }
          if (emptyStateContainer) {
            renderEmptyState(emptyStateContainer, params, state.totalCount);
          }
        } else if (action === 'retry-load') {
          loadReadingList();
        }
      }

      function handleAppliedFiltersClick(event) {
        var target = event.target;
        var actionEl = target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.dataset.action;
        if (action === 'clear-search-filter') {
          if (searchInput) {
            searchInput.value = '';
          }
          updateUrlParams({ search_query: '', page: 1 });
          loadReadingList();
        } else if (action === 'clear-date-range-filter') {
          if (dateFromInput) {
            dateFromInput.value = '';
          }
          if (dateToInput) {
            dateToInput.value = '';
          }
          updateUrlParams({ date_from: '', date_to: '', page: 1 });
          loadReadingList();
        } else if (action === 'clear-all-filters') {
          if (searchInput) {
            searchInput.value = '';
          }
          if (dateFromInput) {
            dateFromInput.value = '';
          }
          if (dateToInput) {
            dateToInput.value = '';
          }
          if (sortSelect) {
            sortSelect.value = 'most_recent_added';
          }
          var params = parseUrlParams();
          var updates = {
            search_query: '',
            date_from: '',
            date_to: '',
            sort: 'most_recent_added',
            page: 1
          };
          updates.page_size = params.page_size;
          updateUrlParams(updates);
          loadReadingList();
        }
      }

      function handleEmptyStateClick(event) {
        var target = event.target;
        var actionEl = target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.dataset.action;
        if (action === 'clear-filters') {
          if (searchInput) {
            searchInput.value = '';
          }
          if (dateFromInput) {
            dateFromInput.value = '';
          }
          if (dateToInput) {
            dateToInput.value = '';
          }
          if (sortSelect) {
            sortSelect.value = 'most_recent_added';
          }
          var params = parseUrlParams();
          var updates = {
            search_query: '',
            date_from: '',
            date_to: '',
            sort: 'most_recent_added',
            page: 1
          };
          updates.page_size = params.page_size;
          updateUrlParams(updates);
          loadReadingList();
        } else if (action === 'back-to-updates') {
          // Navigation target not specified in outgoing connections; no-op placeholder.
        }
      }

      if (searchForm) {
        searchForm.addEventListener('submit', handleSearchSubmit);
      }

      if (dateFilterForm) {
        var applyButton = dateFilterForm.querySelector('[data-action="apply-date-filter"]');
        var clearButton = dateFilterForm.querySelector('[data-action="clear-date-filter"]');
        if (applyButton) {
          applyButton.addEventListener('click', handleApplyDateFilter);
        }
        if (clearButton) {
          clearButton.addEventListener('click', handleClearDateFilter);
        }
      }

      if (sortSelect) {
        sortSelect.addEventListener('change', handleSortChange);
      }

      if (pageSizeSelect) {
        pageSizeSelect.addEventListener('change', handlePageSizeChange);
      }

      if (paginationContainer) {
        paginationContainer.addEventListener('click', handlePaginationClick);
      }

      if (resultsContainer) {
        resultsContainer.addEventListener('click', handleResultsClick);
      }

      if (appliedFiltersBar) {
        appliedFiltersBar.addEventListener('click', handleAppliedFiltersClick);
      }

      if (emptyStateContainer) {
        emptyStateContainer.addEventListener('click', handleEmptyStateClick);
      }

      window.addEventListener('popstate', function() {
        loadReadingList();
      });

      loadReadingList();
    });
  </script>
</body>
</html>
