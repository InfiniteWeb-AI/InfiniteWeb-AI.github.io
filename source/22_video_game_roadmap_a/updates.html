<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Game Roadmap &amp; Community</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&amp;family=Cormorant+Garamond:wght@400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>

  <!-- Site styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Dev Updates page styles -->
  <link rel='stylesheet' href='updates.css'>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>
</head>
<body class='site'>
  <header class='site-header'>
    <div class='header-inner container'>
      <nav class='primary-nav' aria-label='Main navigation'>
        <ul class='nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='roadmap.html' class='nav-link'>Roadmap</a>
          </li>
          <li class='nav-item'>
            <a href='community.html' class='nav-link'>Community</a>
          </li>
          <li class='nav-item'>
            <a href='updates.html' class='nav-link'>Updates</a>
          </li>
          <li class='nav-item'>
            <a href='watchlist.html' class='nav-link'>Watchlist</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-content container' tabindex='-1'>
    <section class='dev-updates-page' data-component='dev-updates-page'>
      <header class='dev-updates-header'>
        <h1 class='dev-updates-title'>Dev Updates</h1>
        <div class='dev-updates-title-underline' aria-hidden='true'>
          <span class='underline-line underline-line-left'></span>
          <span class='underline-ornament'></span>
          <span class='underline-line underline-line-right'></span>
        </div>
      </header>

      <!-- Control band: search, filters, sort -->
      <section class='dev-updates-controls' aria-label='Update filters and sorting'>
        <div class='dev-updates-controls-inner'>
          <!-- Search form -->
          <form class='dev-updates-search-form control-pill' data-component='dev-updates-search-form'>
            <label class='visually-hidden' for='dev-updates-search-input'>Search dev updates</label>
            <div class='search-input-wrapper'>
              <input
                id='dev-updates-search-input'
                class='search-input'
                type='search'
                name='search_query'
                placeholder='Search updates by keyword'
                autocomplete='off'
              >
            </div>
            <div class='search-actions'>
              <button class='pill-button pill-button-primary' type='submit' data-action='submit-search'>
                <span>Search</span>
              </button>
              <button class='pill-button pill-button-ghost' type='button' data-action='clear-search'>
                <span>Clear</span>
              </button>
            </div>
          </form>

          <!-- Filter bar: tags + date range -->
          <section class='dev-updates-filter-bar control-pill' data-component='dev-updates-filter-bar' aria-label='Filter updates'>
            <div class='filter-bar-inner'>
              <div class='filter-tags'>
                <div class='filter-label'>Tags</div>
                <div class='filter-tags-selected' data-element='tag-list' aria-live='polite'></div>
                <div class='filter-tags-input-row'>
                  <label class='visually-hidden' for='dev-updates-tag-input'>Add tag filter</label>
                  <input
                    id='dev-updates-tag-input'
                    class='filter-tag-input'
                    type='text'
                    data-element='tag-input'
                    placeholder='Add tag and press Enter'
                    autocomplete='off'
                  >
                  <button class='pill-button pill-button-ghost filter-tag-add-button' type='button' data-action='add-tag-filter'>
                    <span>Add</span>
                  </button>
                </div>
              </div>

              <div class='filter-dates'>
                <div class='filter-label'>Date range</div>
                <div class='filter-dates-row'>
                  <div class='filter-date-field'>
                    <label for='dev-updates-date-from'>From</label>
                    <input
                      id='dev-updates-date-from'
                      class='filter-date-input'
                      type='date'
                      data-element='date-from'
                    >
                  </div>
                  <div class='filter-date-field'>
                    <label for='dev-updates-date-to'>To</label>
                    <input
                      id='dev-updates-date-to'
                      class='filter-date-input'
                      type='date'
                      data-element='date-to'
                    >
                  </div>
                  <div class='filter-date-actions'>
                    <button class='pill-button pill-button-primary filter-apply-button' type='button' data-action='apply-filters'>
                      <span>Apply</span>
                    </button>
                    <button class='pill-button pill-button-ghost filter-clear-dates-button' type='button' data-action='clear-date-filters'>
                      <span>Clear dates</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- Sort control -->
          <section class='dev-updates-sort control-pill' data-component='dev-updates-sort-control'>
            <label class='sort-label' for='dev-updates-sort-select'>Sort</label>
            <div class='sort-select-wrapper'>
              <select id='dev-updates-sort-select' class='sort-select'>
                <option value='newest_first'>Newest first</option>
                <option value='oldest_first'>Oldest first</option>
              </select>
            </div>
          </section>
        </div>
      </section>

      <!-- Results area -->
      <section
        class='dev-updates-results'
        data-component='dev-updates-results'
        data-populate='dev-updates'
        aria-label='Developer updates results'
      >
        <!-- Results summary -->
        <div class='dev-updates-results-summary' data-component='dev-updates-results-summary' aria-live='polite'></div>

        <div class='dev-updates-results-body'>
          <!-- Loading indicator -->
          <div class='dev-updates-loading' data-component='dev-updates-loading-indicator' hidden>
            <div class='loading-spinner-ornate' aria-hidden='true'></div>
            <p class='loading-text'>Loading developer updates - please wait...</p>
          </div>

          <!-- Empty state -->
          <div class='dev-updates-empty' data-component='dev-updates-empty-state' hidden></div>

          <!-- Updates list -->
          <div class='dev-updates-list' data-component='dev-updates-list' aria-live='polite'></div>
        </div>

        <!-- Pagination -->
        <nav
          class='dev-updates-pagination'
          data-component='dev-updates-pagination'
          aria-label='Dev updates pages'
        ></nav>
      </section>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <div class='footer-divider' aria-hidden='true'>
        <span class='footer-divider-line'></span>
        <span class='footer-divider-ornament'></span>
        <span class='footer-divider-line'></span>
      </div>

      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='about.html' class='footer-link'>About</a>
          </li>
          <li class='footer-nav-item'>
            <a href='help.html' class='footer-link'>Help / FAQ</a>
          </li>
          <li class='footer-nav-item'>
            <a href='policies.html' class='footer-link'>Policies &amp; Guidelines</a>
          </li>
          <li class='footer-nav-item'>
            <a href='updates.html' class='footer-link'>Dev Updates</a>
          </li>
          <li class='footer-nav-item'>
            <a href='reading_list.html' class='footer-link'>Reading List</a>
          </li>
        </ul>
      </nav>

      <p class='footer-meta'>&copy; 2026 Frontier Game Studio. All rights reserved.</p>
    </div>
  </footer>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var DEFAULT_SORT = 'newest_first';
    var DEFAULT_PAGE = 1;
    var DEFAULT_PAGE_SIZE = 9;

    var root = document.querySelector('[data-component="dev-updates-results"]');
    if (!root) {
      return;
    }

    var summaryEl = root.querySelector('[data-component="dev-updates-results-summary"]');
    var listEl = root.querySelector('[data-component="dev-updates-list"]');
    var emptyEl = root.querySelector('[data-component="dev-updates-empty-state"]');
    var loadingEl = root.querySelector('[data-component="dev-updates-loading-indicator"]');
    var paginationEl = root.querySelector('[data-component="dev-updates-pagination"]');

    var searchForm = document.querySelector('[data-component="dev-updates-search-form"]');
    var searchInput = searchForm ? searchForm.querySelector('input[name="search_query"]') : null;

    var filterBar = document.querySelector('[data-component="dev-updates-filter-bar"]');
    var tagListEl = filterBar ? filterBar.querySelector('[data-element="tag-list"]') : null;
    var tagInputEl = filterBar ? filterBar.querySelector('[data-element="tag-input"]') : null;
    var dateFromInput = filterBar ? filterBar.querySelector('[data-element="date-from"]') : null;
    var dateToInput = filterBar ? filterBar.querySelector('[data-element="date-to"]') : null;

    var sortControl = document.querySelector('[data-component="dev-updates-sort-control"]');
    var sortSelectEl = sortControl ? sortControl.querySelector('select') : null;

    var currentState = parseUrlState();

    // Ensure URL reflects effective defaults on initial load
    syncUrlState(currentState, { replace: true });
    updateControlsFromState(currentState);
    runSearch(currentState);

    // Handle browser back/forward to restore state from URL
    window.addEventListener('popstate', function() {
      var state = parseUrlState();
      currentState = state;
      updateControlsFromState(state);
      runSearch(state);
    });

    // Search form submit
    if (searchForm) {
      searchForm.addEventListener('submit', function(event) {
        event.preventDefault();
        var value = searchInput ? searchInput.value.trim() : '';
        var newState = cloneState(currentState);
        newState.search_query = value || undefined;
        newState.page = DEFAULT_PAGE;
        syncUrlState(newState);
        currentState = newState;
        updateControlsFromState(newState);
        runSearch(newState);
      });
    }

    // Sort change
    if (sortSelectEl) {
      sortSelectEl.addEventListener('change', function(event) {
        var value = event.target.value || DEFAULT_SORT;
        var newState = cloneState(currentState);
        newState.sort = value;
        newState.page = DEFAULT_PAGE;
        syncUrlState(newState);
        currentState = newState;
        updateControlsFromState(newState);
        runSearch(newState);
      });
    }

    // Global click handler for data-action elements
    document.addEventListener('click', function(event) {
      var target = event.target;
      if (!target || !target.dataset) {
        return;
      }
      var action = target.dataset.action;
      if (!action) {
        return;
      }

      if (action === 'clear-search') {
        if (searchInput) {
          searchInput.value = '';
        }
        var newStateCs = cloneState(currentState);
        newStateCs.search_query = undefined;
        newStateCs.page = DEFAULT_PAGE;
        syncUrlState(newStateCs);
        currentState = newStateCs;
        updateControlsFromState(newStateCs);
        runSearch(newStateCs);
      } else if (action === 'add-tag-filter') {
        if (!tagInputEl) {
          return;
        }
        var rawTag = tagInputEl.value.trim();
        if (!rawTag) {
          return;
        }
        var newStateAt = cloneState(currentState);
        var tagsAt = (newStateAt.tags || []).slice();
        if (tagsAt.indexOf(rawTag) === -1) {
          tagsAt.push(rawTag);
        }
        newStateAt.tags = tagsAt;
        newStateAt.page = DEFAULT_PAGE;
        tagInputEl.value = '';
        syncUrlState(newStateAt);
        currentState = newStateAt;
        updateControlsFromState(newStateAt);
        runSearch(newStateAt);
      } else if (action === 'remove-tag-filter') {
        var tagToRemove = target.dataset.tag;
        if (!tagToRemove) {
          return;
        }
        var newStateRt = cloneState(currentState);
        var tagsRt = (newStateRt.tags || []).filter(function(t) { return t !== tagToRemove; });
        newStateRt.tags = tagsRt;
        newStateRt.page = DEFAULT_PAGE;
        syncUrlState(newStateRt);
        currentState = newStateRt;
        updateControlsFromState(newStateRt);
        runSearch(newStateRt);
      } else if (action === 'apply-filters') {
        var newStateAf = cloneState(currentState);
        var fromValue = dateFromInput ? dateFromInput.value : '';
        var toValue = dateToInput ? dateToInput.value : '';
        if (fromValue && !isValidIsoDate(fromValue)) {
          alert('Please enter a valid "From" date in YYYY-MM-DD format.');
          return;
        }
        if (toValue && !isValidIsoDate(toValue)) {
          alert('Please enter a valid "To" date in YYYY-MM-DD format.');
          return;
        }
        if (fromValue && toValue && fromValue > toValue) {
          alert('The "From" date cannot be later than the "To" date.');
          return;
        }
        newStateAf.date_from = fromValue || undefined;
        newStateAf.date_to = toValue || undefined;
        newStateAf.page = DEFAULT_PAGE;
        syncUrlState(newStateAf);
        currentState = newStateAf;
        updateControlsFromState(newStateAf);
        runSearch(newStateAf);
      } else if (action === 'clear-date-filters') {
        if (dateFromInput) {
          dateFromInput.value = '';
        }
        if (dateToInput) {
          dateToInput.value = '';
        }
        var newStateCd = cloneState(currentState);
        newStateCd.date_from = undefined;
        newStateCd.date_to = undefined;
        newStateCd.page = DEFAULT_PAGE;
        syncUrlState(newStateCd);
        currentState = newStateCd;
        updateControlsFromState(newStateCd);
        runSearch(newStateCd);
      } else if (action === 'clear-all-filters') {
        var newStateCa = {
          search_query: undefined,
          tags: [],
          date_from: undefined,
          date_to: undefined,
          sort: DEFAULT_SORT,
          page: DEFAULT_PAGE,
          page_size: currentState.page_size || DEFAULT_PAGE_SIZE
        };
        syncUrlState(newStateCa);
        currentState = newStateCa;
        updateControlsFromState(newStateCa);
        runSearch(newStateCa);
      } else if (action === 'open-update-detail') {
        var updateId = target.dataset.updateId;
        if (!updateId) {
          return;
        }
        navigateToDetail(updateId);
      } else if (action === 'change-page') {
        var pageStr = target.dataset.page;
        var pageNum = parseInt(pageStr, 10);
        if (!pageNum || pageNum === currentState.page) {
          return;
        }
        var newStatePg = cloneState(currentState);
        newStatePg.page = pageNum;
        syncUrlState(newStatePg);
        currentState = newStatePg;
        updateControlsFromState(newStatePg);
        runSearch(newStatePg);
      }
    });

    // Global change handler for page size select
    document.addEventListener('change', function(event) {
      var target = event.target;
      if (!target || !target.dataset) {
        return;
      }
      var action = target.dataset.action;
      if (action === 'change-page-size') {
        var sizeVal = parseInt(target.value, 10);
        if (!sizeVal || sizeVal === currentState.page_size) {
          return;
        }
        var newStatePs = cloneState(currentState);
        newStatePs.page_size = sizeVal;
        newStatePs.page = DEFAULT_PAGE;
        syncUrlState(newStatePs);
        currentState = newStatePs;
        updateControlsFromState(newStatePs);
        runSearch(newStatePs);
      }
    });

    // When user presses Enter in tag input, treat as add-tag
    if (tagInputEl) {
      tagInputEl.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
          event.preventDefault();
          var fakeButton = { dataset: { action: 'add-tag-filter' } };
          var customEvent = { target: fakeButton };
          document.dispatchEvent(new CustomEvent('click', { detail: customEvent }));
          // Fallback: trigger the click handler directly if dispatch pattern is not desired
          var rawTag = tagInputEl.value.trim();
          if (!rawTag) {
            return;
          }
          var newStateAt2 = cloneState(currentState);
          var tagsAt2 = (newStateAt2.tags || []).slice();
          if (tagsAt2.indexOf(rawTag) === -1) {
            tagsAt2.push(rawTag);
          }
          newStateAt2.tags = tagsAt2;
          newStateAt2.page = DEFAULT_PAGE;
          tagInputEl.value = '';
          syncUrlState(newStateAt2);
          currentState = newStateAt2;
          updateControlsFromState(newStateAt2);
          runSearch(newStateAt2);
        }
      });
    }

    // Helpers
    function parseUrlState() {
      var params = new URLSearchParams(window.location.search);
      var state = {
        search_query: undefined,
        tags: [],
        date_from: undefined,
        date_to: undefined,
        sort: DEFAULT_SORT,
        page: DEFAULT_PAGE,
        page_size: DEFAULT_PAGE_SIZE
      };

      var searchQuery = params.get('search_query');
      if (searchQuery && searchQuery.trim().length) {
        state.search_query = searchQuery.trim();
      }

      var tagsParam = params.get('tags');
      if (tagsParam) {
        state.tags = tagsParam.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t.length > 0; });
      } else {
        state.tags = [];
      }

      var dateFrom = params.get('date_from');
      if (dateFrom) {
        state.date_from = dateFrom;
      }
      var dateTo = params.get('date_to');
      if (dateTo) {
        state.date_to = dateTo;
      }

      var sortParam = params.get('sort');
      if (sortParam) {
        state.sort = sortParam;
      }

      var pageParam = params.get('page');
      var pageNum = parseInt(pageParam || '', 10);
      if (!isNaN(pageNum) && pageNum > 0) {
        state.page = pageNum;
      }

      var pageSizeParam = params.get('page_size');
      var pageSizeNum = parseInt(pageSizeParam || '', 10);
      if (!isNaN(pageSizeNum) && pageSizeNum > 0) {
        state.page_size = pageSizeNum;
      }

      return state;
    }

    function cloneState(source) {
      return {
        search_query: source.search_query,
        tags: Array.isArray(source.tags) ? source.tags.slice() : [],
        date_from: source.date_from,
        date_to: source.date_to,
        sort: source.sort,
        page: source.page,
        page_size: source.page_size
      };
    }

    function syncUrlState(state, options) {
      var params = new URLSearchParams();
      if (state.search_query && state.search_query.trim().length) {
        params.set('search_query', state.search_query.trim());
      }
      if (state.tags && state.tags.length) {
        params.set('tags', state.tags.join(','));
      }
      if (state.date_from) {
        params.set('date_from', state.date_from);
      }
      if (state.date_to) {
        params.set('date_to', state.date_to);
      }
      params.set('sort', state.sort || DEFAULT_SORT);
      params.set('page', String(state.page || DEFAULT_PAGE));
      params.set('page_size', String(state.page_size || DEFAULT_PAGE_SIZE));

      var queryString = params.toString();
      var newUrl = window.location.pathname + (queryString ? '?' + queryString : '');
      var useReplace = options && options.replace;
      if (useReplace) {
        window.history.replaceState(null, '', newUrl);
      } else {
        window.history.pushState(null, '', newUrl);
      }
    }

    function updateControlsFromState(state) {
      if (searchInput) {
        searchInput.value = state.search_query || '';
      }
      if (sortSelectEl) {
        sortSelectEl.value = state.sort || DEFAULT_SORT;
      }
      if (dateFromInput) {
        dateFromInput.value = state.date_from || '';
      }
      if (dateToInput) {
        dateToInput.value = state.date_to || '';
      }
      if (tagListEl) {
        renderTagChips(tagListEl, state.tags || []);
      }
    }

    function isValidIsoDate(value) {
      // Basic YYYY-MM-DD validation
      if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) {
        return false;
      }
      var date = new Date(value);
      return !isNaN(date.getTime());
    }

    function runSearch(state) {
      if (!loadingEl || !listEl || !emptyEl || !summaryEl || !paginationEl) {
        return;
      }

      loadingEl.hidden = false;
      listEl.hidden = true;
      emptyEl.hidden = true;
      paginationEl.hidden = true;
      summaryEl.innerHTML = '';

      var apiTags = state.tags && state.tags.length ? state.tags : undefined;
      var result;
      try {
        result = WebsiteSDK.searchDevUpdates(
          state.search_query || undefined,
          apiTags,
          state.date_from || undefined,
          state.date_to || undefined,
          state.sort || DEFAULT_SORT,
          state.page,
          state.page_size
        );
      } catch (error) {
        console.error('searchDevUpdates failed', error);
        loadingEl.hidden = true;
        emptyEl.hidden = false;
        renderEmptyState(emptyEl, state, 'error');
        return;
      }

      loadingEl.hidden = true;

      var items = result && Array.isArray(result.items) ? result.items : [];
      var totalCount = result && typeof result.total_count === 'number' ? result.total_count : items.length;
      var readingListIds = result && Array.isArray(result.reading_list_update_ids) ? result.reading_list_update_ids : [];

      renderResultsSummary(summaryEl, state, totalCount);

      if (!items.length) {
        listEl.hidden = true;
        emptyEl.hidden = false;
        renderEmptyState(emptyEl, state, 'empty');
        paginationEl.hidden = true;
      } else {
        emptyEl.hidden = true;
        listEl.hidden = false;
        renderUpdatesList(listEl, state, items, readingListIds);
        renderPagination(paginationEl, state, totalCount);
      }
    }

    function renderTagChips(container, tags) {
      container.innerHTML = '';
      if (!tags || !tags.length) {
        var placeholder = document.createElement('span');
        placeholder.className = 'filter-tags-placeholder';
        placeholder.textContent = 'No tag filters applied';
        container.appendChild(placeholder);
        return;
      }
      tags.forEach(function(tag) {
        var chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'filter-tag-chip';
        chip.dataset.action = 'remove-tag-filter';
        chip.dataset.tag = tag;
        chip.textContent = tag + ' d7';
        container.appendChild(chip);
      });
    }

    function renderResultsSummary(container, state, totalCount) {
      container.innerHTML = '';
      var parts = [];
      var countText = totalCount === 1 ? '1 update' : totalCount + ' updates';
      parts.push(countText);

      var filters = [];
      if (state.search_query) {
        filters.push('matching \'' + state.search_query + '\'');
      }
      if (state.tags && state.tags.length) {
        filters.push('tagged ' + state.tags.join(', '));
      }
      if (state.date_from || state.date_to) {
        var dateLabel;
        if (state.date_from && state.date_to) {
          dateLabel = 'from ' + state.date_from + ' to ' + state.date_to;
        } else if (state.date_from) {
          dateLabel = 'since ' + state.date_from;
        } else {
          dateLabel = 'up to ' + state.date_to;
        }
        filters.push(dateLabel);
      }

      if (filters.length) {
        parts.push(filters.join(' '));
      }

      var span = document.createElement('span');
      span.className = 'results-summary-text';
      span.textContent = parts.join(' ');
      container.appendChild(span);
    }

    function renderUpdatesList(container, state, items, readingListIds) {
      container.innerHTML = '';
      var grid = document.createElement('div');
      grid.className = 'dev-updates-grid';

      var readingSet = new Set(readingListIds || []);

      items.forEach(function(item) {
        var card = document.createElement('article');
        card.className = 'dev-update-card';
        card.dataset.updateId = item.id;

        var visual = document.createElement('div');
        visual.className = 'dev-update-card-visual';
        visual.setAttribute('aria-hidden', 'true');

        var meta = document.createElement('div');
        meta.className = 'dev-update-card-meta';

        var titleRow = document.createElement('div');
        titleRow.className = 'dev-update-card-title-row';

        var titleHeading = document.createElement('h2');
        titleHeading.className = 'dev-update-card-title';

        var titleButton = document.createElement('button');
        titleButton.type = 'button';
        titleButton.className = 'dev-update-card-title-button';
        titleButton.dataset.action = 'open-update-detail';
        titleButton.dataset.updateId = item.id;
        titleButton.textContent = item.title;
        titleHeading.appendChild(titleButton);
        titleRow.appendChild(titleHeading);

        if (readingSet.has(item.id)) {
          var badge = document.createElement('span');
          badge.className = 'reading-list-indicator';
          badge.textContent = 'In reading list';
          titleRow.appendChild(badge);
        }

        var metaRow = document.createElement('div');
        metaRow.className = 'dev-update-card-meta-row';

        var dateEl = document.createElement('time');
        dateEl.className = 'dev-update-card-date';
        if (item.published_at) {
          dateEl.dateTime = item.published_at;
          var d = new Date(item.published_at);
          if (!isNaN(d.getTime())) {
            dateEl.textContent = d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
          } else {
            dateEl.textContent = item.published_at;
          }
        }
        metaRow.appendChild(dateEl);

        meta.appendChild(titleRow);
        meta.appendChild(metaRow);

        if (item.summary) {
          var summaryEl = document.createElement('p');
          summaryEl.className = 'dev-update-card-summary';
          summaryEl.textContent = item.summary;
          meta.appendChild(summaryEl);
        }

        if (Array.isArray(item.tags) && item.tags.length) {
          var tagsRow = document.createElement('div');
          tagsRow.className = 'dev-update-card-tags';
          item.tags.forEach(function(tag) {
            var tagEl = document.createElement('span');
            tagEl.className = 'dev-update-card-tag';
            tagEl.textContent = tag;
            tagsRow.appendChild(tagEl);
          });
          meta.appendChild(tagsRow);
        }

        card.appendChild(visual);
        card.appendChild(meta);
        grid.appendChild(card);
      });

      container.appendChild(grid);
    }

    function renderEmptyState(container, state, mode) {
      container.innerHTML = '';
      var panel = document.createElement('div');
      panel.className = 'empty-state-panel';

      var title = document.createElement('h2');
      title.className = 'empty-state-title';
      var message = document.createElement('p');
      message.className = 'empty-state-text';

      if (mode === 'error') {
        title.textContent = 'Unable to load updates';
        message.textContent = 'Something went wrong while fetching developer updates. Please try again.';
      } else {
        title.textContent = 'No updates match your filters';
        var hints = [];
        if (state.search_query) {
          hints.push('search term');
        }
        if (state.tags && state.tags.length) {
          hints.push('tags');
        }
        if (state.date_from || state.date_to) {
          hints.push('date range');
        }
        if (hints.length) {
          message.textContent = 'Try adjusting your ' + hints.join(', ') + ' or clearing filters.';
        } else {
          message.textContent = 'Try changing the page size or check back later for new developer updates.';
        }
      }

      panel.appendChild(title);
      panel.appendChild(message);

      var clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.className = 'pill-button empty-state-clear';
      clearBtn.dataset.action = 'clear-all-filters';
      clearBtn.textContent = 'Clear all filters';
      panel.appendChild(clearBtn);

      container.appendChild(panel);
    }

    function renderPagination(container, state, totalCount) {
      container.innerHTML = '';
      if (!totalCount || totalCount <= state.page_size) {
        container.hidden = true;
        return;
      }
      container.hidden = false;

      var totalPages = Math.max(1, Math.ceil(totalCount / state.page_size));
      var wrapper = document.createElement('div');
      wrapper.className = 'pagination-inner';

      // Page size selector
      var pageSizeWrapper = document.createElement('div');
      pageSizeWrapper.className = 'pagination-page-size';

      var pageSizeLabel = document.createElement('label');
      pageSizeLabel.setAttribute('for', 'dev-updates-page-size');
      pageSizeLabel.textContent = 'Per page';
      pageSizeWrapper.appendChild(pageSizeLabel);

      var pageSizeSelect = document.createElement('select');
      pageSizeSelect.id = 'dev-updates-page-size';
      pageSizeSelect.dataset.action = 'change-page-size';
      [9, 18, 27].forEach(function(size) {
        var opt = document.createElement('option');
        opt.value = String(size);
        opt.textContent = String(size);
        if (state.page_size === size) {
          opt.selected = true;
        }
        pageSizeSelect.appendChild(opt);
      });
      pageSizeWrapper.appendChild(pageSizeSelect);
      wrapper.appendChild(pageSizeWrapper);

      // Page buttons
      var pagesWrapper = document.createElement('div');
      pagesWrapper.className = 'pagination-pages';

      function addPageButton(label, page, isCurrent, ariaLabel) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pagination-page-button';
        btn.dataset.action = 'change-page';
        btn.dataset.page = String(page);
        btn.textContent = label;
        if (isCurrent) {
          btn.disabled = true;
          btn.className += ' is-current';
        }
        if (ariaLabel) {
          btn.setAttribute('aria-label', ariaLabel);
        }
        pagesWrapper.appendChild(btn);
      }

      if (state.page > 1) {
        addPageButton('ab', state.page - 1, false, 'Previous page');
      }

      for (var p = 1; p <= totalPages; p += 1) {
        addPageButton(String(p), p, p === state.page, null);
      }

      if (state.page < totalPages) {
        addPageButton('bb', state.page + 1, false, 'Next page');
      }

      wrapper.appendChild(pagesWrapper);
      container.appendChild(wrapper);
    }

    function navigateToDetail(updateId) {
      var params = new URLSearchParams();
      params.set('id', updateId);
      if (currentState.search_query) {
        params.set('search_query', currentState.search_query);
      }
      if (currentState.tags && currentState.tags.length) {
        params.set('tags', currentState.tags.join(','));
      }
      if (currentState.date_from) {
        params.set('date_from', currentState.date_from);
      }
      if (currentState.date_to) {
        params.set('date_to', currentState.date_to);
      }
      if (currentState.sort) {
        params.set('sort', currentState.sort);
      }
      if (currentState.page) {
        params.set('page', String(currentState.page));
      }
      if (currentState.page_size) {
        params.set('page_size', String(currentState.page_size));
      }
      var url = 'update_detail.html?' + params.toString();
      window.location.href = url;
    }
  });
  </script>
</body>
</html>
