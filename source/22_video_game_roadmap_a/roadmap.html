<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Game Roadmap &amp; Community</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&amp;family=Cormorant+Garamond:wght@400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>

  <!-- Site styles -->
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='roadmap.css'>
</head>
<body class='site'>
  <header class='site-header'>
    <div class='header-inner container'>
      <nav class='primary-nav' aria-label='Main navigation'>
        <ul class='nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='roadmap.html' class='nav-link'>Roadmap</a>
          </li>
          <li class='nav-item'>
            <a href='community.html' class='nav-link'>Community</a>
          </li>
          <li class='nav-item'>
            <a href='updates.html' class='nav-link'>Updates</a>
          </li>
          <li class='nav-item'>
            <a href='watchlist.html' class='nav-link'>Watchlist</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-content container' tabindex='-1'>
    <section class='roadmap-page' data-component='roadmap-page'>
      <header class='roadmap-header-block'>
        <h1 class='roadmap-title'>Roadmap</h1>
        <div class='roadmap-title-underline' aria-hidden='true'>
          <span class='roadmap-title-line'></span>
          <span class='roadmap-title-ornament'></span>
          <span class='roadmap-title-line'></span>
        </div>
      </header>

      <section class='roadmap-controls-band'>
        <div class='roadmap-filter-bar' data-component='roadmap-filter-bar' data-populate='roadmap-filter-options'>
          <!-- Filter controls are injected by JavaScript using getRoadmapFilterOptions -->
        </div>

        <div class='roadmap-sort-toolbar' data-component='roadmap-sort-and-view-toolbar'>
          <!-- Sort and view controls are injected by JavaScript using getRoadmapFilterOptions.sort_options -->
        </div>
      </section>

      <section class='roadmap-feedback-region' data-component='roadmap-loading-error-state' aria-live='polite'>
        <div class='roadmap-loading' data-state='loading' hidden>
          <div class='roadmap-spinner' aria-hidden='true'></div>
          <p class='roadmap-loading-text'>Loading roadmap...</p>
        </div>
        <div class='roadmap-error' data-state='error' hidden>
          <p class='roadmap-error-text'></p>
          <div class='roadmap-error-actions'>
            <button type='button' class='button-pill roadmap-error-retry' data-action='retry-features'>Retry</button>
            <button type='button' class='button-link roadmap-error-dismiss' data-action='dismiss-error'>Dismiss</button>
          </div>
        </div>
      </section>

      <section class='roadmap-feature-list-section'>
        <div class='roadmap-feature-list' data-component='roadmap-feature-list' data-populate='roadmap-features' aria-live='polite' aria-busy='false'>
          <!-- Roadmap feature cards are rendered here via getRoadmapFeatures -->
        </div>
      </section>

      <nav class='roadmap-pagination' data-component='roadmap-pagination-controls' aria-label='Roadmap pagination'>
        <!-- Pagination controls are rendered here based on getRoadmapFeatures.total_count -->
      </nav>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <div class='footer-divider' aria-hidden='true'>
        <span class='footer-divider-line'></span>
        <span class='footer-divider-ornament'></span>
        <span class='footer-divider-line'></span>
      </div>

      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='about.html' class='footer-link'>About</a>
          </li>
          <li class='footer-nav-item'>
            <a href='help.html' class='footer-link'>Help / FAQ</a>
          </li>
          <li class='footer-nav-item'>
            <a href='policies.html' class='footer-link'>Policies &amp; Guidelines</a>
          </li>
          <li class='footer-nav-item'>
            <a href='updates.html' class='footer-link'>Dev Updates</a>
          </li>
          <li class='footer-nav-item'>
            <a href='reading_list.html' class='footer-link'>Reading List</a>
          </li>
        </ul>
      </nav>

      <p class='footer-meta'>&copy; 2026 Frontier Game Studio. All rights reserved.</p>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var filterOptions = null;
      var currentState = null;
      var totalPages = 1;

      var statusLabelByValue = {};
      var platformLabelByValue = {};
      var featureTypeLabelByValue = {};

      var filterBarContainer = document.querySelector('[data-component="roadmap-filter-bar"]') || document.querySelector('[data-component=roadmap-filter-bar]');
      var sortToolbarContainer = document.querySelector('[data-component="roadmap-sort-and-view-toolbar"]') || document.querySelector('[data-component=roadmap-sort-and-view-toolbar]');
      var featureListContainer = document.querySelector('[data-component="roadmap-feature-list"]') || document.querySelector('[data-component=roadmap-feature-list]');
      var paginationContainer = document.querySelector('[data-component="roadmap-pagination-controls"]') || document.querySelector('[data-component=roadmap-pagination-controls]');
      var feedbackContainer = document.querySelector('[data-component="roadmap-loading-error-state"]') || document.querySelector('[data-component=roadmap-loading-error-state]');
      var loadingEl = feedbackContainer ? feedbackContainer.querySelector('[data-state="loading"]') : null;
      var errorEl = feedbackContainer ? feedbackContainer.querySelector('[data-state="error"]') : null;

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/'/g, '&#39;');
      }

      function parseStateFromUrl(search) {
        var params = new URLSearchParams(search || window.location.search);
        var state = {
          status: [],
          platforms: [],
          feature_types: [],
          tags: [],
          release_year: undefined,
          release_date_from: undefined,
          release_date_to: undefined,
          release_window_preset: undefined,
          sort: undefined,
          page: 1,
          page_size: 9
        };

        var statusParam = params.get('status');
        if (statusParam) {
          state.status = statusParam.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
        }

        var platformsParam = params.get('platforms');
        if (platformsParam) {
          state.platforms = platformsParam.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
        }

        var featureTypesParam = params.get('feature_types');
        if (featureTypesParam) {
          state.feature_types = featureTypesParam.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
        }

        var tagsParam = params.get('tags');
        if (tagsParam) {
          state.tags = tagsParam.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
        }

        var yearParam = params.get('release_year');
        if (yearParam && !isNaN(parseInt(yearParam, 10))) {
          state.release_year = parseInt(yearParam, 10);
        }

        var fromParam = params.get('release_date_from');
        if (fromParam) {
          state.release_date_from = fromParam;
        }

        var toParam = params.get('release_date_to');
        if (toParam) {
          state.release_date_to = toParam;
        }

        var presetParam = params.get('release_window_preset');
        if (presetParam) {
          state.release_window_preset = presetParam;
        }

        var sortParam = params.get('sort');
        if (sortParam) {
          state.sort = sortParam;
        }

        var pageParam = params.get('page');
        if (pageParam && !isNaN(parseInt(pageParam, 10))) {
          var p = parseInt(pageParam, 10);
          if (p >= 1) {
            state.page = p;
          }
        }

        var pageSizeParam = params.get('page_size');
        if (pageSizeParam && !isNaN(parseInt(pageSizeParam, 10))) {
          var ps = parseInt(pageSizeParam, 10);
          if (ps > 0) {
            state.page_size = ps;
          }
        }

        return state;
      }

      function buildUrlFromState(state) {
        var params = new URLSearchParams();

        if (state.status && state.status.length) {
          params.set('status', state.status.join(','));
        }
        if (state.platforms && state.platforms.length) {
          params.set('platforms', state.platforms.join(','));
        }
        if (state.feature_types && state.feature_types.length) {
          params.set('feature_types', state.feature_types.join(','));
        }
        if (state.tags && state.tags.length) {
          params.set('tags', state.tags.join(','));
        }
        if (typeof state.release_year === 'number' && !isNaN(state.release_year)) {
          params.set('release_year', String(state.release_year));
        }
        if (state.release_date_from) {
          params.set('release_date_from', state.release_date_from);
        }
        if (state.release_date_to) {
          params.set('release_date_to', state.release_date_to);
        }
        if (state.release_window_preset) {
          params.set('release_window_preset', state.release_window_preset);
        }
        if (state.sort) {
          params.set('sort', state.sort);
        }
        if (state.page && state.page >= 1) {
          params.set('page', String(state.page));
        }
        if (state.page_size && state.page_size > 0) {
          params.set('page_size', String(state.page_size));
        }

        var query = params.toString();
        var path = window.location.pathname || 'roadmap.html';
        if (query) {
          return path + '?' + query;
        }
        return path;
      }

      function updateUrlFromState() {
        var newUrl = buildUrlFromState(currentState);
        window.history.pushState(currentState, '', newUrl);
      }

      function setLoading(isLoading) {
        if (!featureListContainer) {
          return;
        }
        if (isLoading) {
          featureListContainer.setAttribute('aria-busy', 'true');
          if (loadingEl) {
            loadingEl.hidden = false;
          }
        } else {
          featureListContainer.setAttribute('aria-busy', 'false');
          if (loadingEl) {
            loadingEl.hidden = true;
          }
        }
      }

      function showError(message) {
        if (!errorEl) {
          return;
        }
        var textEl = errorEl.querySelector('.roadmap-error-text');
        if (textEl) {
          textEl.textContent = message || 'Something went wrong. Please try again.';
        }
        errorEl.hidden = false;
      }

      function clearError() {
        if (errorEl) {
          errorEl.hidden = true;
        }
      }

      function buildFilterBar(container, options) {
        if (!container) {
          return;
        }

        var statusPillsHtml = '';
        statusPillsHtml += "<button type='button' class='filter-pill filter-pill--status' data-action='toggle-status-filter' data-status-value='all' aria-pressed='true'><span>All</span></button>";

        if (options.statuses && options.statuses.length) {
          options.statuses.forEach(function(status) {
            statusLabelByValue[status.value] = status.label;
            statusPillsHtml += "<button type='button' class='filter-pill filter-pill--status' data-action='toggle-status-filter' data-status-value='" + escapeHtml(status.value) + "' aria-pressed='false'><span>" + escapeHtml(status.label) + "</span></button>";
          });
        }

        var platformPillsHtml = '';
        if (options.platforms && options.platforms.length) {
          options.platforms.forEach(function(plat) {
            platformLabelByValue[plat.value] = plat.label;
            platformPillsHtml += "<button type='button' class='filter-pill filter-pill--platform' data-action='toggle-platform-filter' data-platform-value='" + escapeHtml(plat.value) + "' aria-pressed='false'><span>" + escapeHtml(plat.label) + "</span></button>";
          });
        }

        var featureTypePillsHtml = '';
        if (options.feature_types && options.feature_types.length) {
          options.feature_types.forEach(function(ft) {
            featureTypeLabelByValue[ft.value] = ft.label;
            featureTypePillsHtml += "<button type='button' class='filter-pill filter-pill--feature-type' data-action='toggle-feature-type-filter' data-feature-type-value='" + escapeHtml(ft.value) + "' aria-pressed='false'><span>" + escapeHtml(ft.label) + "</span></button>";
          });
        }

        var years = options.release_years && options.release_years.slice ? options.release_years.slice() : [];
        years.sort(function(a, b) { return a - b; });
        var yearOptionsHtml = "<option value=''>Any year</option>";
        years.forEach(function(year) {
          yearOptionsHtml += "<option value='" + String(year) + "'>" + String(year) + "</option>";
        });

        var presetOptionsHtml = "<option value=''>Any window</option>";
        if (options.release_window_presets && options.release_window_presets.length) {
          options.release_window_presets.forEach(function(preset) {
            presetOptionsHtml += "<option value='" + escapeHtml(preset.id) + "'>" + escapeHtml(preset.label) + "</option>";
          });
        }

        var tagSuggestionOptions = '';
        if (options.tag_suggestions && options.tag_suggestions.length) {
          options.tag_suggestions.forEach(function(tag) {
            tagSuggestionOptions += "<option value='" + escapeHtml(tag) + "'></option>";
          });
        }

        container.innerHTML = `
          <form class='roadmap-filter-form' novalidate>
            <div class='roadmap-filter-row roadmap-filter-row--primary' aria-label='Filter by status'>
              ${statusPillsHtml}
            </div>

            <div class='roadmap-filter-row roadmap-filter-row--secondary'>
              <div class='roadmap-filter-group roadmap-filter-group--platforms'>
                <div class='roadmap-filter-label'>Platforms</div>
                <div class='roadmap-filter-pills' role='group' aria-label='Filter by platform'>
                  ${platformPillsHtml}
                </div>
              </div>

              <div class='roadmap-filter-group roadmap-filter-group--feature-types'>
                <div class='roadmap-filter-label'>Feature Types</div>
                <div class='roadmap-filter-pills' role='group' aria-label='Filter by feature type'>
                  ${featureTypePillsHtml}
                </div>
              </div>

              <div class='roadmap-filter-group roadmap-filter-group--tags'>
                <label class='roadmap-filter-label' for='roadmap-tags-input'>Tags</label>
                <input id='roadmap-tags-input' class='roadmap-input roadmap-input--tags' type='text' placeholder='e.g. co-op, weapons' list='roadmap-tag-suggestions' data-action='change-tags'>
                <datalist id='roadmap-tag-suggestions'>
                  ${tagSuggestionOptions}
                </datalist>
              </div>
            </div>

            <div class='roadmap-filter-row roadmap-filter-row--tertiary'>
              <div class='roadmap-filter-group roadmap-filter-group--release-year'>
                <label class='roadmap-filter-label' for='roadmap-release-year'>Release Year</label>
                <select id='roadmap-release-year' class='roadmap-select' data-action='change-release-year'>
                  ${yearOptionsHtml}
                </select>
              </div>

              <div class='roadmap-filter-group roadmap-filter-group--release-preset'>
                <label class='roadmap-filter-label' for='roadmap-release-window'>Release Window</label>
                <select id='roadmap-release-window' class='roadmap-select' data-action='change-release-window-preset'>
                  ${presetOptionsHtml}
                </select>
              </div>

              <div class='roadmap-filter-group roadmap-filter-group--release-range'>
                <div class='roadmap-filter-label'>Custom Date Range</div>
                <div class='roadmap-date-range'>
                  <label class='roadmap-date-field'>
                    <span>From</span>
                    <input type='date' class='roadmap-input roadmap-input--date' data-action='change-date-from'>
                  </label>
                  <label class='roadmap-date-field'>
                    <span>To</span>
                    <input type='date' class='roadmap-input roadmap-input--date' data-action='change-date-to'>
                  </label>
                </div>
              </div>

              <div class='roadmap-filter-group roadmap-filter-group--reset'>
                <button type='button' class='button-pill roadmap-filter-reset' data-action='reset-filters'>Reset Filters</button>
              </div>
            </div>
          </form>
        `;
      }

      function buildSortToolbar(container, options) {
        if (!container) {
          return;
        }

        var sortOptionsHtml = '';
        if (options.sort_options && options.sort_options.length) {
          options.sort_options.forEach(function(opt) {
            sortOptionsHtml += "<option value='" + escapeHtml(opt.value) + "'>" + escapeHtml(opt.label) + "</option>";
          });
        }

        container.innerHTML = `
          <div class='roadmap-toolbar' data-component='roadmap-sort-and-view-toolbar'>
            <div class='roadmap-toolbar-group roadmap-toolbar-group--sort'>
              <label class='roadmap-toolbar-label'>
                <span class='roadmap-toolbar-label-text'>Sort by</span>
                <select class='roadmap-select roadmap-sort-select' data-action='change-sort'>
                  ${sortOptionsHtml}
                </select>
              </label>
            </div>

            <div class='roadmap-toolbar-group roadmap-toolbar-group--view'>
              <div class='roadmap-toolbar-label'>
                <span class='roadmap-toolbar-label-text'>View</span>
                <div class='roadmap-view-toggle' role='group' aria-label='View mode'>
                  <button type='button' class='button-pill button-pill--ghost roadmap-view-toggle-btn' data-action='view-mode' data-view-mode='grid' aria-pressed='true'>Grid</button>
                  <button type='button' class='button-pill button-pill--ghost roadmap-view-toggle-btn' data-action='view-mode' data-view-mode='list' aria-pressed='false'>List</button>
                </div>
              </div>
            </div>

            <div class='roadmap-toolbar-group roadmap-toolbar-group--page-size'>
              <label class='roadmap-toolbar-label'>
                <span class='roadmap-toolbar-label-text'>Per page</span>
                <select class='roadmap-select roadmap-page-size-select' data-action='change-page-size'>
                  <option value='9'>9</option>
                  <option value='18'>18</option>
                  <option value='27'>27</option>
                </select>
              </label>
            </div>
          </div>
        `;
      }

      function applyStateToAllControls() {
        if (!currentState) {
          return;
        }

        var statusButtons = document.querySelectorAll('[data-action="toggle-status-filter"]');
        statusButtons.forEach(function(btn) {
          var value = btn.getAttribute('data-status-value');
          var isAll = !value || value === 'all';
          var isActive = false;
          if (isAll) {
            isActive = !currentState.status || currentState.status.length === 0;
          } else {
            isActive = currentState.status && currentState.status.indexOf(value) !== -1;
          }
          btn.classList.toggle('filter-pill--active', isActive);
          btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });

        var platformButtons = document.querySelectorAll('[data-action="toggle-platform-filter"]');
        platformButtons.forEach(function(btn) {
          var value = btn.getAttribute('data-platform-value');
          var isActive = currentState.platforms && currentState.platforms.indexOf(value) !== -1;
          btn.classList.toggle('filter-pill--active', isActive);
          btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });

        var featureTypeButtons = document.querySelectorAll('[data-action="toggle-feature-type-filter"]');
        featureTypeButtons.forEach(function(btn) {
          var value = btn.getAttribute('data-feature-type-value');
          var isActive = currentState.feature_types && currentState.feature_types.indexOf(value) !== -1;
          btn.classList.toggle('filter-pill--active', isActive);
          btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });

        var tagsInput = document.querySelector('.roadmap-input--tags');
        if (tagsInput) {
          tagsInput.value = currentState.tags && currentState.tags.length ? currentState.tags.join(', ') : '';
        }

        var yearSelect = document.querySelector('#roadmap-release-year');
        if (yearSelect) {
          yearSelect.value = typeof currentState.release_year === 'number' && !isNaN(currentState.release_year) ? String(currentState.release_year) : '';
        }

        var presetSelect = document.querySelector('#roadmap-release-window');
        if (presetSelect) {
          presetSelect.value = currentState.release_window_preset || '';
        }

        var dateInputs = document.querySelectorAll('.roadmap-input--date');
        if (dateInputs && dateInputs.length >= 2) {
          var fromInput = dateInputs[0];
          var toInput = dateInputs[1];
          fromInput.value = currentState.release_date_from || '';
          toInput.value = currentState.release_date_to || '';
        }

        var sortSelect = document.querySelector('.roadmap-sort-select');
        if (sortSelect) {
          sortSelect.value = currentState.sort || '';
        }

        var pageSizeSelect = document.querySelector('.roadmap-page-size-select');
        if (pageSizeSelect) {
          pageSizeSelect.value = currentState.page_size ? String(currentState.page_size) : '9';
        }
      }

      function lookupStatusLabel(value) {
        if (!value) {
          return '';
        }
        return statusLabelByValue[value] || value;
      }

      function lookupPlatformLabel(value) {
        if (!value) {
          return '';
        }
        return platformLabelByValue[value] || value;
      }

      function lookupFeatureTypeLabel(value) {
        if (!value) {
          return '';
        }
        return featureTypeLabelByValue[value] || value;
      }

      function formatReleaseInfo(feature) {
        if (feature.release_date) {
          var date = new Date(feature.release_date);
          if (!isNaN(date.getTime())) {
            try {
              return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
            } catch (e) {
              return date.toISOString().slice(0, 10);
            }
          }
        }
        if (feature.release_year) {
          return String(feature.release_year);
        }
        return 'TBD';
      }

      function buildFeatureDetailUrl(featureId) {
        var params = new URLSearchParams();
        params.set('id', featureId);

        if (currentState.status && currentState.status.length) {
          params.set('status', currentState.status.join(','));
        }
        if (currentState.platforms && currentState.platforms.length) {
          params.set('platforms', currentState.platforms.join(','));
        }
        if (currentState.feature_types && currentState.feature_types.length) {
          params.set('feature_types', currentState.feature_types.join(','));
        }
        if (currentState.tags && currentState.tags.length) {
          params.set('tags', currentState.tags.join(','));
        }
        if (typeof currentState.release_year === 'number' && !isNaN(currentState.release_year)) {
          params.set('release_year', String(currentState.release_year));
        }
        if (currentState.release_date_from) {
          params.set('release_date_from', currentState.release_date_from);
        }
        if (currentState.release_date_to) {
          params.set('release_date_to', currentState.release_date_to);
        }
        if (currentState.release_window_preset) {
          params.set('release_window_preset', currentState.release_window_preset);
        }
        if (currentState.sort) {
          params.set('sort', currentState.sort);
        }
        if (currentState.page && currentState.page >= 1) {
          params.set('page', String(currentState.page));
        }
        if (currentState.page_size && currentState.page_size > 0) {
          params.set('page_size', String(currentState.page_size));
        }

        var query = params.toString();
        return 'roadmap_feature.html' + (query ? '?' + query : '');
      }

      function renderFeatureList(container, items, watchlistIds) {
        if (!container) {
          return;
        }

        if (!items || !items.length) {
          container.innerHTML = `
            <div class='roadmap-empty-state'>
              <p class='roadmap-empty-text'>No features match these filters yet. Try adjusting the filters above.</p>
            </div>
          `;
          return;
        }

        var watchSet = new Set(watchlistIds || []);

        var cardsHtml = items.map(function(feature) {
          var isWatched = watchSet.has(feature.id);
          var upvoteActiveClass = feature.user_has_upvoted ? ' roadmap-card-action--active' : '';
          var watchActiveClass = isWatched ? ' roadmap-card-action--active' : '';
          var statusLabel = lookupStatusLabel(feature.status);
          var featureTypeLabel = lookupFeatureTypeLabel(feature.feature_type);
          var platformLabels = (feature.platforms || []).map(function(p) { return lookupPlatformLabel(p); }).join(', ');
          var tagsHtml = '';
          if (feature.tags && feature.tags.length) {
            tagsHtml = feature.tags.map(function(tag) {
              return "<span class='roadmap-tag-pill'>" + escapeHtml(tag) + "</span>";
            }).join('');
          }
          var releaseInfo = formatReleaseInfo(feature);
          var detailUrl = buildFeatureDetailUrl(feature.id);

          var imageHtml = '';
          if (feature.image_url) {
            imageHtml = "<img class='roadmap-card-image' src='" + escapeHtml(feature.image_url) + "' alt=''>";
          } else {
            imageHtml = "<div class='roadmap-card-image roadmap-card-image--placeholder'></div>`";
          }

          return `
            <article class='roadmap-card' data-feature-id='${escapeHtml(feature.id)}'>
              <div class='roadmap-card-image-wrap'>
                ${imageHtml}
                <div class='roadmap-card-status-badge roadmap-card-status-badge--${escapeHtml(feature.status)}'>
                  <span>${escapeHtml(statusLabel)}</span>
                </div>
              </div>
              <div class='roadmap-card-caption'>
                <div class='roadmap-card-caption-main'>
                  <h2 class='roadmap-card-title'>
                    <a href='${detailUrl}' data-action='feature-title-click'>${escapeHtml(feature.title)}</a>
                  </h2>
                  ${feature.short_summary ? `<p class='roadmap-card-summary'>${escapeHtml(feature.short_summary)}</p>` : ''}
                </div>
                <dl class='roadmap-card-meta'>
                  <div class='roadmap-card-meta-item'>
                    <dt>Status</dt>
                    <dd>${escapeHtml(statusLabel)}</dd>
                  </div>
                  <div class='roadmap-card-meta-item'>
                    <dt>Type</dt>
                    <dd>${escapeHtml(featureTypeLabel)}</dd>
                  </div>
                  <div class='roadmap-card-meta-item'>
                    <dt>Platforms</dt>
                    <dd>${escapeHtml(platformLabels)}</dd>
                  </div>
                  <div class='roadmap-card-meta-item'>
                    <dt>Release</dt>
                    <dd>${escapeHtml(releaseInfo)}</dd>
                  </div>
                  <div class='roadmap-card-meta-item'>
                    <dt>Comments</dt>
                    <dd>${feature.comment_count}</dd>
                  </div>
                </dl>
                <div class='roadmap-card-tags'>
                  ${tagsHtml}
                </div>
                <div class='roadmap-card-actions' data-component='roadmap-feature-card-actions'>
                  <button type='button' class='roadmap-card-action roadmap-card-action--upvote${upvoteActiveClass}' data-action='toggle-upvote' data-feature-id='${escapeHtml(feature.id)}' aria-pressed='${feature.user_has_upvoted ? 'true' : 'false'}'>
                    <span class='roadmap-card-action-label'>Upvote</span>
                    <span class='roadmap-card-action-count' data-role='upvote-count'>${feature.upvote_count}</span>
                  </button>
                  <button type='button' class='roadmap-card-action roadmap-card-action--watch${watchActiveClass}' data-action='toggle-watchlist' data-feature-id='${escapeHtml(feature.id)}' aria-pressed='${isWatched ? 'true' : 'false'}'>
                    <span class='roadmap-card-action-label'>Watch</span>
                  </button>
                </div>
              </div>
            </article>
          `;
        }).join('');

        container.innerHTML = `
          <div class='roadmap-feature-grid'>
            ${cardsHtml}
          </div>
        `;
      }

      function renderPagination(container, totalCount, page, pageSize) {
        if (!container) {
          return;
        }

        if (!totalCount || totalCount <= 0) {
          container.innerHTML = '';
          totalPages = 1;
          return;
        }

        var pages = Math.max(1, Math.ceil(totalCount / pageSize));
        totalPages = pages;

        var pageButtonsHtml = '';
        for (var i = 1; i <= pages; i += 1) {
          var isCurrent = i === page;
          pageButtonsHtml += `
            <button type='button' class='roadmap-page-btn${isCurrent ? ' roadmap-page-btn--current' : ''}' data-action='go-to-page' data-page='${i}' aria-current='${isCurrent ? 'page' : 'false'}'>${i}</button>
          `;
        }

        container.innerHTML = `
          <div class='roadmap-pagination-inner'>
            <button type='button' class='roadmap-page-btn roadmap-page-btn--nav' data-action='previous-page' ${page <= 1 ? 'disabled' : ''}>Previous</button>
            <div class='roadmap-pagination-pages'>
              ${pageButtonsHtml}
            </div>
            <button type='button' class='roadmap-page-btn roadmap-page-btn--nav' data-action='next-page' ${page >= pages ? 'disabled' : ''}>Next</button>
          </div>
          <div class='roadmap-pagination-summary'>
            Page ${page} of ${pages}
          </div>
        `;
      }

      function fetchAndRenderFeatures() {
        if (!currentState) {
          return;
        }
        clearError();
        setLoading(true);

        try {
          var statusParam = currentState.status && currentState.status.length ? currentState.status.join(',') : undefined;

          var response = WebsiteSDK.getRoadmapFeatures(
            statusParam,
            currentState.platforms,
            currentState.feature_types,
            currentState.tags,
            currentState.release_year,
            currentState.release_date_from,
            currentState.release_date_to,
            currentState.release_window_preset,
            currentState.sort,
            currentState.page,
            currentState.page_size
          );

          var items = response.items || [];
          var totalCount = typeof response.total_count === 'number' ? response.total_count : items.length;
          var watchlistIds = response.watchlist_feature_ids || [];

          renderFeatureList(featureListContainer, items, watchlistIds);
          renderPagination(paginationContainer, totalCount, currentState.page, currentState.page_size);
        } catch (err) {
          showError('Unable to load roadmap features. Please try again.');
        } finally {
          setLoading(false);
        }
      }

      function handleStatusToggle(button) {
        var value = button.getAttribute('data-status-value');
        if (!currentState.status) {
          currentState.status = [];
        }
        if (!value || value === 'all') {
          currentState.status = [];
        } else {
          var idx = currentState.status.indexOf(value);
          if (idx === -1) {
            currentState.status.push(value);
          } else {
            currentState.status.splice(idx, 1);
          }
        }
        currentState.page = 1;
        updateUrlFromState();
        applyStateToAllControls();
        fetchAndRenderFeatures();
      }

      function handlePlatformToggle(button) {
        var value = button.getAttribute('data-platform-value');
        if (!value) {
          return;
        }
        if (!currentState.platforms) {
          currentState.platforms = [];
        }
        var idx = currentState.platforms.indexOf(value);
        if (idx === -1) {
          currentState.platforms.push(value);
        } else {
          currentState.platforms.splice(idx, 1);
        }
        currentState.page = 1;
        updateUrlFromState();
        applyStateToAllControls();
        fetchAndRenderFeatures();
      }

      function handleFeatureTypeToggle(button) {
        var value = button.getAttribute('data-feature-type-value');
        if (!value) {
          return;
        }
        if (!currentState.feature_types) {
          currentState.feature_types = [];
        }
        var idx = currentState.feature_types.indexOf(value);
        if (idx === -1) {
          currentState.feature_types.push(value);
        } else {
          currentState.feature_types.splice(idx, 1);
        }
        currentState.page = 1;
        updateUrlFromState();
        applyStateToAllControls();
        fetchAndRenderFeatures();
      }

      function resetFilters() {
        currentState.status = [];
        currentState.platforms = [];
        currentState.feature_types = [];
        currentState.tags = [];
        currentState.release_year = undefined;
        currentState.release_date_from = undefined;
        currentState.release_date_to = undefined;
        currentState.release_window_preset = undefined;
        currentState.page = 1;
        updateUrlFromState();
        applyStateToAllControls();
        fetchAndRenderFeatures();
      }

      function handleViewModeToggle(button) {
        var mode = button.getAttribute('data-view-mode') || 'grid';
        var buttons = document.querySelectorAll('[data-action="view-mode"]');
        buttons.forEach(function(btn) {
          var isActive = btn === button;
          btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
          btn.classList.toggle('button-pill--active', isActive);
        });
        if (featureListContainer) {
          featureListContainer.setAttribute('data-view-mode', mode);
        }
      }

      function handleUpvoteToggle(button) {
        var featureId = button.getAttribute('data-feature-id');
        if (!featureId) {
          return;
        }
        button.disabled = true;
        try {
          var result = WebsiteSDK.toggleRoadmapFeatureUpvote(featureId);
          if (!result || result.success === false) {
            var msg = result && result.message ? result.message : 'Unable to update upvote. Please try again.';
            showError(msg);
            return;
          }
          var hasUpvoted = !!result.user_has_upvoted;
          button.setAttribute('aria-pressed', hasUpvoted ? 'true' : 'false');
          button.classList.toggle('roadmap-card-action--active', hasUpvoted);
          var countEl = button.querySelector('[data-role="upvote-count"]');
          if (countEl && typeof result.upvote_count === 'number') {
            countEl.textContent = String(result.upvote_count);
          }
        } catch (err) {
          showError('Unable to update upvote. Please try again.');
        } finally {
          button.disabled = false;
        }
      }

      function handleWatchlistToggle(button) {
        var featureId = button.getAttribute('data-feature-id');
        if (!featureId) {
          return;
        }
        var currentlyWatched = button.getAttribute('aria-pressed') === 'true';
        button.disabled = true;
        try {
          var result;
          if (currentlyWatched) {
            result = WebsiteSDK.removeRoadmapFeatureFromWatchlist(featureId);
          } else {
            result = WebsiteSDK.addRoadmapFeatureToWatchlist(featureId);
          }
          if (!result || result.success === false) {
            var msg = result && result.message ? result.message : 'Unable to update watchlist. Please try again.';
            showError(msg);
            return;
          }
          var nowWatched = !currentlyWatched;
          button.setAttribute('aria-pressed', nowWatched ? 'true' : 'false');
          button.classList.toggle('roadmap-card-action--active', nowWatched);
        } catch (err) {
          showError('Unable to update watchlist. Please try again.');
        } finally {
          button.disabled = false;
        }
      }

      function scrollToFeatureListTop() {
        if (!featureListContainer) {
          return;
        }
        try {
          featureListContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (e) {
          featureListContainer.scrollIntoView(true);
        }
      }

      function handleClick(event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');
        if (!action) {
          return;
        }

        if (action === 'toggle-status-filter') {
          event.preventDefault();
          handleStatusToggle(target);
        } else if (action === 'toggle-platform-filter') {
          event.preventDefault();
          handlePlatformToggle(target);
        } else if (action === 'toggle-feature-type-filter') {
          event.preventDefault();
          handleFeatureTypeToggle(target);
        } else if (action === 'reset-filters') {
          event.preventDefault();
          resetFilters();
        } else if (action === 'toggle-upvote') {
          event.preventDefault();
          handleUpvoteToggle(target);
        } else if (action === 'toggle-watchlist') {
          event.preventDefault();
          handleWatchlistToggle(target);
        } else if (action === 'go-to-page') {
          event.preventDefault();
          var pageStr = target.getAttribute('data-page');
          var pageNum = parseInt(pageStr, 10);
          if (!isNaN(pageNum) && pageNum >= 1 && pageNum !== currentState.page) {
            currentState.page = pageNum;
            updateUrlFromState();
            fetchAndRenderFeatures();
            scrollToFeatureListTop();
          }
        } else if (action === 'next-page') {
          event.preventDefault();
          if (currentState.page < totalPages) {
            currentState.page += 1;
            updateUrlFromState();
            fetchAndRenderFeatures();
            scrollToFeatureListTop();
          }
        } else if (action === 'previous-page') {
          event.preventDefault();
          if (currentState.page > 1) {
            currentState.page -= 1;
            updateUrlFromState();
            fetchAndRenderFeatures();
            scrollToFeatureListTop();
          }
        } else if (action === 'retry-features') {
          event.preventDefault();
          clearError();
          fetchAndRenderFeatures();
        } else if (action === 'dismiss-error') {
          event.preventDefault();
          clearError();
        } else if (action === 'view-mode') {
          event.preventDefault();
          handleViewModeToggle(target);
        }
      }

      function handleChange(event) {
        var target = event.target;
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');
        if (!action) {
          return;
        }

        if (action === 'change-sort') {
          var sortVal = target.value || '';
          currentState.sort = sortVal || undefined;
          currentState.page = 1;
          updateUrlFromState();
          fetchAndRenderFeatures();
        } else if (action === 'change-page-size') {
          var sizeVal = parseInt(target.value, 10);
          if (!isNaN(sizeVal) && sizeVal > 0) {
            currentState.page_size = sizeVal;
            currentState.page = 1;
            updateUrlFromState();
            fetchAndRenderFeatures();
          }
        } else if (action === 'change-release-year') {
          var yearVal = target.value;
          if (yearVal && !isNaN(parseInt(yearVal, 10))) {
            currentState.release_year = parseInt(yearVal, 10);
          } else {
            currentState.release_year = undefined;
          }
          currentState.page = 1;
          updateUrlFromState();
          fetchAndRenderFeatures();
        } else if (action === 'change-release-window-preset') {
          var presetVal = target.value;
          currentState.release_window_preset = presetVal || undefined;
          // When a preset is selected, rely solely on it and clear custom dates
          if (presetVal) {
            currentState.release_date_from = undefined;
            currentState.release_date_to = undefined;
          }
          currentState.page = 1;
          updateUrlFromState();
          applyStateToAllControls();
          fetchAndRenderFeatures();
        } else if (action === 'change-date-from') {
          var fromVal = target.value || undefined;
          currentState.release_date_from = fromVal;
          if (fromVal) {
            currentState.release_window_preset = undefined;
          }
          currentState.page = 1;
          updateUrlFromState();
          applyStateToAllControls();
          fetchAndRenderFeatures();
        } else if (action === 'change-date-to') {
          var toVal = target.value || undefined;
          currentState.release_date_to = toVal;
          if (toVal) {
            currentState.release_window_preset = undefined;
          }
          currentState.page = 1;
          updateUrlFromState();
          applyStateToAllControls();
          fetchAndRenderFeatures();
        } else if (action === 'change-tags') {
          var tagsStr = target.value || '';
          currentState.tags = tagsStr.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
          currentState.page = 1;
          updateUrlFromState();
          fetchAndRenderFeatures();
        }
      }

      function init() {
        currentState = parseStateFromUrl(window.location.search);

        try {
          filterOptions = WebsiteSDK.getRoadmapFilterOptions();
        } catch (err) {
          showError('Unable to load roadmap filters. Please refresh.');
          return;
        }

        if (!currentState.sort && filterOptions.sort_options && filterOptions.sort_options.length) {
          currentState.sort = filterOptions.sort_options[0].value;
        }

        buildFilterBar(filterBarContainer, filterOptions);
        buildSortToolbar(sortToolbarContainer, filterOptions);
        applyStateToAllControls();

        // Data-populate elements are driven by URL state; this call initializes roadmap-features
        fetchAndRenderFeatures();
      }

      document.addEventListener('click', handleClick);
      document.addEventListener('change', handleChange);

      window.addEventListener('popstate', function() {
        if (!filterOptions) {
          return;
        }
        currentState = parseStateFromUrl(window.location.search);
        applyStateToAllControls();
        fetchAndRenderFeatures();
      });

      init();
    });
  </script>
</body>
</html>
