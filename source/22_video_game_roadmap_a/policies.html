<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Policies &amp; Guidelines - Game Roadmap &amp; Community</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&amp;family=Cormorant+Garamond:wght@400;500;600&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>

  <!-- Site styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page styles -->
  <link rel='stylesheet' href='policies.css'>
</head>
<body class='site'>
  <header class='site-header'>
    <div class='header-inner container'>
      <nav class='primary-nav' aria-label='Main navigation'>
        <ul class='nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='roadmap.html' class='nav-link'>Roadmap</a>
          </li>
          <li class='nav-item'>
            <a href='community.html' class='nav-link'>Community</a>
          </li>
          <li class='nav-item'>
            <a href='updates.html' class='nav-link'>Updates</a>
          </li>
          <li class='nav-item'>
            <a href='watchlist.html' class='nav-link'>Watchlist</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-content container' tabindex='-1'>
    <section class='policies-page' aria-labelledby='policies-page-title' data-component='policies-data-loader-root'>
      <header class='policies-header-block'>
        <h1 id='policies-page-title' class='policies-title'>Policies &amp; Guidelines</h1>
        <div class='policies-title-underline' aria-hidden='true'>
          <span class='underline-line'></span>
          <span class='underline-ornament'></span>
          <span class='underline-line'></span>
        </div>
      </header>

      <nav class='policies-inpage-nav' aria-label='Policy sections'>
        <div class='pill-nav-scroller'>
          <ul class='pill-nav-list' data-component='policies-inpage-navigation' data-populate='policies'>
            <!-- In-page pill navigation items rendered via JS -->
          </ul>
        </div>
      </nav>

      <section class='policies-card-grid-section' aria-label='Policy categories'>
        <div class='policies-card-grid' data-component='policies-section-link-control' data-populate='policies'>
          <!-- Policy-category cards rendered via JS -->
        </div>
      </section>

      <section class='policies-loading-wrapper' aria-live='polite'>
        <div class='policies-loading-state' data-component='policies-loading-and-error-state'>
          <!-- Loading / error state rendered via JS -->
        </div>
      </section>

      <section class='policies-sections-section' aria-label='Policy details'>
        <div class='policies-section-list' data-component='policies-section-list' data-populate='policies'>
          <!-- Long-form policy sections rendered via JS -->
        </div>
      </section>

      <section class='policies-related-links-section' aria-label='Related information'>
        <div class='policies-related-links' data-component='policies-related-links' data-populate='policies'>
          <!-- Related informational links rendered via JS -->
        </div>
      </section>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <div class='footer-divider' aria-hidden='true'>
        <span class='footer-divider-line'></span>
        <span class='footer-divider-ornament'></span>
        <span class='footer-divider-line'></span>
      </div>

      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='about.html' class='footer-link'>About</a>
          </li>
          <li class='footer-nav-item'>
            <a href='help.html' class='footer-link'>Help / FAQ</a>
          </li>
          <li class='footer-nav-item'>
            <a href='policies.html' class='footer-link'>Policies &amp; Guidelines</a>
          </li>
          <li class='footer-nav-item'>
            <a href='updates.html' class='footer-link'>Dev Updates</a>
          </li>
          <li class='footer-nav-item'>
            <a href='reading_list.html' class='footer-link'>Reading List</a>
          </li>
        </ul>
      </nav>

      <p class='footer-meta'>&copy; 2026 Frontier Game Studio. All rights reserved.</p>
    </div>
  </footer>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page UI logic -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      let initialSectionId = urlParams.get('section_id');

      const state = {
        sections: [],
        relatedLinks: [],
        activeSectionId: null,
        loading: true,
        error: null
      };

      const loaderContainer = document.querySelector("[data-component='policies-loading-and-error-state']");
      const tocContainer = document.querySelector("[data-component='policies-inpage-navigation']");
      const cardGridContainer = document.querySelector("[data-component='policies-section-link-control']");
      const sectionsListContainer = document.querySelector("[data-component='policies-section-list']");
      const relatedLinksContainer = document.querySelector("[data-component='policies-related-links']");

      let scrollObserver = null;

      function cssEscapeSafe(value) {
        if (window.CSS && typeof window.CSS.escape === 'function') {
          return window.CSS.escape(value);
        }
        return String(value || '').replace(/[^a-zA-Z0-9_\-]/g, '_');
      }

      function renderLoading(container) {
        if (!container) return;
        container.innerHTML = `
          <div class='policies-loader-overlay'>
            <div class='policies-loader-spinner' aria-hidden='true'></div>
            <p class='policies-loader-text'>Loading policies &amp; guidelines...</p>
          </div>
        `;
      }

      function renderError(container, message) {
        if (!container) return;
        const safeMessage = message || 'Unable to load policies right now.';
        container.innerHTML = `
          <div class='policies-error-panel' role='alert'>
            <h2 class='policies-error-title'>Something went wrong</h2>
            <p class='policies-error-message'>${safeMessage}</p>
            <button type='button' class='policies-error-retry pill-button' data-action='retry-load'>
              <span>Retry loading</span>
            </button>
          </div>
        `;
      }

      function renderTocNav(container, sections) {
        if (!container) return;
        container.innerHTML = '';
        if (!sections || !sections.length) {
          return;
        }
        sections.forEach(function(section) {
          const li = document.createElement('li');
          li.className = 'pill-nav-item';

          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'pill-nav-button';
          button.textContent = section.title || '';
          button.setAttribute('data-action', 'jump-to-section');
          button.setAttribute('data-section-id', section.id);

          li.appendChild(button);
          container.appendChild(li);
        });
      }

      function renderCardGrid(container, sections) {
        if (!container) return;
        container.innerHTML = '';
        if (!sections || !sections.length) {
          return;
        }
        sections.forEach(function(section) {
          const card = document.createElement('article');
          card.className = 'policy-card';
          card.setAttribute('data-section-id', section.id);

          const cardButton = document.createElement('button');
          cardButton.type = 'button';
          cardButton.className = 'policy-card-inner';
          cardButton.setAttribute('data-action', 'jump-to-section');
          cardButton.setAttribute('data-section-id', section.id);

          const illustration = document.createElement('div');
          illustration.className = 'policy-card-illustration';
          illustration.setAttribute('aria-hidden', 'true');

          const caption = document.createElement('div');
          caption.className = 'policy-card-caption';
          caption.textContent = section.title || '';

          cardButton.appendChild(illustration);
          cardButton.appendChild(caption);
          card.appendChild(cardButton);
          container.appendChild(card);
        });
      }

      function renderSectionsList(container, sections) {
        if (!container) return;
        container.innerHTML = '';
        if (!sections || !sections.length) {
          const empty = document.createElement('p');
          empty.className = 'policies-empty-state';
          empty.textContent = 'No policies are available yet.';
          container.appendChild(empty);
          return;
        }

        sections.forEach(function(section) {
          const article = document.createElement('article');
          article.className = 'policy-section-panel';
          article.setAttribute('data-policy-section-id', section.id);

          const header = document.createElement('header');
          header.className = 'policy-section-header';

          const titleEl = document.createElement('h2');
          titleEl.className = 'policy-section-title';
          titleEl.textContent = section.title || '';

          const tools = document.createElement('div');
          tools.className = 'policy-section-tools';

          const linkButton = document.createElement('button');
          linkButton.type = 'button';
          linkButton.className = 'policy-section-link-button';
          linkButton.setAttribute('data-action', 'section-link');
          linkButton.setAttribute('data-section-id', section.id);
          linkButton.title = 'Update the URL to link directly to this section';

          const linkLabel = document.createElement('span');
          linkLabel.className = 'policy-section-link-label';
          linkLabel.textContent = 'Section link';

          linkButton.appendChild(linkLabel);
          tools.appendChild(linkButton);

          header.appendChild(titleEl);
          header.appendChild(tools);

          const body = document.createElement('div');
          body.className = 'policy-section-body';
          body.innerHTML = section.body_html || '';

          article.appendChild(header);
          article.appendChild(body);
          container.appendChild(article);
        });
      }

      function renderRelatedLinks(container, relatedLinks) {
        if (!container) return;
        container.innerHTML = '';

        if (!relatedLinks || !relatedLinks.length) {
          return;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'policies-related-links-inner';

        const heading = document.createElement('h2');
        heading.className = 'policies-related-links-title';
        heading.textContent = 'Related information';

        const list = document.createElement('div');
        list.className = 'policies-related-links-list';

        relatedLinks.forEach(function(link) {
          const pageId = link.page || '';
          if (!pageId) return;

          const itemButton = document.createElement('button');
          itemButton.type = 'button';
          itemButton.className = 'policies-related-link pill-button';
          itemButton.setAttribute('data-action', 'navigate-related');
          itemButton.setAttribute('data-target-page', pageId);
          itemButton.textContent = link.label || '';

          list.appendChild(itemButton);
        });

        if (!list.children.length) {
          return;
        }

        wrapper.appendChild(heading);
        wrapper.appendChild(list);
        container.appendChild(wrapper);
      }

      function updateActiveStates() {
        const activeId = state.activeSectionId;

        const pillButtons = document.querySelectorAll(".pill-nav-button[data-section-id]");
        pillButtons.forEach(function(btn) {
          if (activeId && btn.getAttribute('data-section-id') === activeId) {
            btn.classList.add('is-active');
          } else {
            btn.classList.remove('is-active');
          }
        });

        const cards = document.querySelectorAll(".policy-card[data-section-id]");
        cards.forEach(function(card) {
          if (activeId && card.getAttribute('data-section-id') === activeId) {
            card.classList.add('is-active');
          } else {
            card.classList.remove('is-active');
          }
        });

        const sections = document.querySelectorAll("[data-policy-section-id]");
        sections.forEach(function(sectionEl) {
          if (activeId && sectionEl.getAttribute('data-policy-section-id') === activeId) {
            sectionEl.classList.add('is-active');
          } else {
            sectionEl.classList.remove('is-active');
          }
        });
      }

      function scrollToSection(sectionId) {
        if (!sectionId) return;
        const selector = "[data-policy-section-id='" + cssEscapeSafe(sectionId) + "']";
        const sectionEl = document.querySelector(selector);
        if (!sectionEl) return;

        try {
          sectionEl.scrollIntoView({ behavior: 'smooth', block: 'start', inline: 'nearest' });
        } catch (e) {
          sectionEl.scrollIntoView(true);
        }
      }

      function setActiveSection(sectionId, options) {
        const opts = options || {};
        const scroll = Boolean(opts.scroll);
        const pushHistory = opts.pushHistory !== false;

        let resolvedId = sectionId;
        if (resolvedId && !state.sections.some(function(s) { return s.id === resolvedId; })) {
          resolvedId = null;
        }

        state.activeSectionId = resolvedId;
        updateActiveStates();

        if (resolvedId && scroll) {
          scrollToSection(resolvedId);
        }

        const url = new URL(window.location.href);
        if (resolvedId) {
          url.searchParams.set('section_id', resolvedId);
        } else {
          url.searchParams.delete('section_id');
        }

        if (pushHistory) {
          window.history.pushState({ section_id: resolvedId }, '', url.toString());
        } else {
          window.history.replaceState({ section_id: resolvedId }, '', url.toString());
        }
      }

      function setupScrollObserver() {
        if (!sectionsListContainer) return;
        const sectionEls = sectionsListContainer.querySelectorAll('[data-policy-section-id]');
        if (!sectionEls.length) return;
        if (!('IntersectionObserver' in window)) return;

        if (scrollObserver) {
          scrollObserver.disconnect();
        }

        scrollObserver = new IntersectionObserver(function(entries) {
          let bestEntry = null;
          entries.forEach(function(entry) {
            if (!entry.isIntersecting) return;
            if (!bestEntry || entry.intersectionRatio > bestEntry.intersectionRatio) {
              bestEntry = entry;
            }
          });

          if (!bestEntry) return;
          const sectionEl = bestEntry.target;
          const sectionId = sectionEl.getAttribute('data-policy-section-id');
          if (!sectionId || sectionId === state.activeSectionId) return;

          setActiveSection(sectionId, { scroll: false, pushHistory: false });
        }, {
          root: null,
          rootMargin: '0px 0px -65% 0px',
          threshold: [0.25, 0.5, 0.75]
        });

        sectionEls.forEach(function(el) { scrollObserver.observe(el); });
      }

      function resolveRelatedTargetUrl(pageId) {
        if (pageId === 'about') return 'about.html';
        if (pageId === 'help_faq') return 'help.html';
        return null;
      }

      function bindActionHandlers() {
        const actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(el) {
          if (el.dataset.actionBound === 'true') return;
          const action = el.dataset.action;
          if (!action) return;

          if (action === 'jump-to-section' || action === 'section-link' || action === 'navigate-related' || action === 'retry-load') {
            el.addEventListener('click', handleActionClick);
            el.dataset.actionBound = 'true';
          }
        });
      }

      function handleActionClick(event) {
        const target = event.currentTarget;
        const action = target.dataset.action;
        if (!action) return;

        if (action === 'jump-to-section') {
          event.preventDefault();
          const sectionId = target.getAttribute('data-section-id');
          if (sectionId) {
            setActiveSection(sectionId, { scroll: true, pushHistory: true });
          }
        } else if (action === 'section-link') {
          event.preventDefault();
          const sectionId = target.getAttribute('data-section-id');
          if (sectionId) {
            setActiveSection(sectionId, { scroll: false, pushHistory: true });
          }
        } else if (action === 'navigate-related') {
          event.preventDefault();
          const pageId = target.getAttribute('data-target-page');
          const url = resolveRelatedTargetUrl(pageId);
          if (url) {
            window.location.href = url;
          }
        } else if (action === 'retry-load') {
          event.preventDefault();
          loadPoliciesContent(true);
        }
      }

      function loadPoliciesContent(isRetry) {
        state.loading = true;
        state.error = null;
        if (loaderContainer) {
          renderLoading(loaderContainer);
        }

        try {
          const data = WebsiteSDK.getPoliciesGuidelinesContent();
          const sections = Array.isArray(data && data.sections) ? data.sections : [];
          const relatedLinks = Array.isArray(data && data.related_links) ? data.related_links : [];

          state.sections = sections;
          state.relatedLinks = relatedLinks;
          state.loading = false;
          state.error = null;

          if (loaderContainer) {
            loaderContainer.innerHTML = '';
          }

          renderTocNav(tocContainer, state.sections);
          renderCardGrid(cardGridContainer, state.sections);
          renderSectionsList(sectionsListContainer, state.sections);
          renderRelatedLinks(relatedLinksContainer, state.relatedLinks);

          bindActionHandlers();
          setupScrollObserver();

          if (initialSectionId && state.sections.some(function(s) { return s.id === initialSectionId; })) {
            setActiveSection(initialSectionId, { scroll: true, pushHistory: false });
          } else {
            state.activeSectionId = null;
            updateActiveStates();
          }
        } catch (err) {
          state.loading = false;
          state.error = err;
          if (loaderContainer) {
            renderError(loaderContainer, 'Unable to load policies right now. Please check your connection and try again.');
            bindActionHandlers();
          }
        }
      }

      window.addEventListener('popstate', function() {
        if (!state.sections || !state.sections.length) return;
        const params = new URLSearchParams(window.location.search);
        const sectionId = params.get('section_id');
        if (sectionId && state.sections.some(function(s) { return s.id === sectionId; })) {
          setActiveSection(sectionId, { scroll: true, pushHistory: false });
        } else {
          setActiveSection(null, { scroll: false, pushHistory: false });
        }
      });

      loadPoliciesContent(false);
    });
  </script>
</body>
</html>
