<!DOCTYPE html>

<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>

  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>

  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific styles -->
  <link rel='stylesheet' href='about.css'>
</head>
<body class='site'>
  <header class='site-header'>
    <div class='header-inner container'>
      <nav class='primary-nav' aria-label='Main navigation'>
        <ul class='nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='roadmap.html' class='nav-link'>Roadmap</a>
          </li>
          <li class='nav-item'>
            <a href='community.html' class='nav-link'>Community</a>
          </li>
          <li class='nav-item'>
            <a href='updates.html' class='nav-link'>Updates</a>
          </li>
          <li class='nav-item'>
            <a href='watchlist.html' class='nav-link'>Watchlist</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-content container' tabindex='-1'>
    <header class='about-page-header' aria-labelledby='about-page-title'>
      <div class='about-title-block'>
        <span class='about-title-ornament about-title-ornament-left' aria-hidden='true'></span>
        <h1 id='about-page-title' class='about-page-title'>About</h1>
        <span class='about-title-ornament about-title-ornament-right' aria-hidden='true'></span>
      </div>
      <p class='about-page-subtitle'>How the game, roadmap, and community features fit together.</p>
    </header>

    <nav class='about-toc-row' aria-label='About sections'>
      <div class='about-toc-inner' data-component='about-toc' data-populate='about-page-content-toc'>
        <!-- TOC pills populated via JavaScript -->
      </div>
    </nav>

    <div class='about-loader' data-component='about-content-loader' aria-live='polite'>
      <div class='about-loader-card'></div>
      <div class='about-loader-card'></div>
      <div class='about-loader-card'></div>
    </div>

    <div class='about-error-message' data-component='about-error' role='alert' aria-live='assertive' hidden></div>

    <section class='about-sections' data-component='about-section-list' data-populate='about-page-content-sections'>
      <!-- About sections rendered here -->
    </section>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner container'>
      <div class='footer-divider' aria-hidden='true'>
        <span class='footer-divider-line'></span>
        <span class='footer-divider-ornament'></span>
        <span class='footer-divider-line'></span>
      </div>

      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='about.html' class='footer-link'>About</a>
          </li>
          <li class='footer-nav-item'>
            <a href='help.html' class='footer-link'>Help / FAQ</a>
          </li>
          <li class='footer-nav-item'>
            <a href='policies.html' class='footer-link'>Policies &amp; Guidelines</a>
          </li>
          <li class='footer-nav-item'>
            <a href='updates.html' class='footer-link'>Dev Updates</a>
          </li>
          <li class='footer-nav-item'>
            <a href='reading_list.html' class='footer-link'>Reading List</a>
          </li>
        </ul>
      </nav>

      <p class='footer-meta'>&copy; 2026 Frontier Game Studio. All rights reserved.</p>
    </div>
  </footer>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page-specific UI logic -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const pageState = {
        sections: [],
        activeSectionId: null,
        initialSectionId: null,
        observer: null
      };

      const urlParams = new URLSearchParams(window.location.search);
      pageState.initialSectionId = urlParams.get('section');

      const tocContainer = document.querySelector('[data-component="about-toc"]');
      const sectionsContainer = document.querySelector('[data-component="about-section-list"]');
      const loaderContainer = document.querySelector('[data-component="about-content-loader"]');
      const errorContainer = document.querySelector('[data-component="about-error"]');

      function showError(message) {
        if (!errorContainer) return;
        errorContainer.innerHTML = '';
        errorContainer.innerHTML = `\n          <p class='about-error-text'>${message}</p>\n        `;
        errorContainer.hidden = false;
      }

      function hideLoader() {
        if (loaderContainer) {
          loaderContainer.classList.add('is-hidden');
        }
      }

      function renderAboutToc(container, sections) {
        container.innerHTML = '';

        if (!sections || !sections.length) {
          container.innerHTML = `\n            <span class='about-toc-empty'>About information will appear here soon.</span>\n          `;
          return;
        }

        const row = document.createElement('div');
        row.className = 'about-toc-pills';

        sections.forEach(function(section) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'about-toc-pill';
          button.dataset.action = 'toc-item';
          button.dataset.sectionId = section.id;
          button.textContent = section.title;
          row.appendChild(button);
        });

        container.appendChild(row);
      }

      function renderAboutSections(container, sections) {
        container.innerHTML = '';

        if (!sections || !sections.length) {
          container.innerHTML = `\n            <article class='about-section-card about-section-card--empty'>\n              <header class='about-section-header'>\n                <h2 class='about-section-title'>About information</h2>\n              </header>\n              <div class='about-section-body'>\n                <p>Details about the game, the team, and how the roadmap works are not available yet. Please check back soon.</p>\n              </div>\n            </article>\n          `;
          return;
        }

        sections.forEach(function(section) {
          const article = document.createElement('article');
          article.className = 'about-section-card';
          article.id = 'about-section-' + section.id;
          article.dataset.sectionId = section.id;

          const header = document.createElement('header');
          header.className = 'about-section-header';

          const h2 = document.createElement('h2');
          h2.className = 'about-section-title';
          h2.textContent = section.title;
          header.appendChild(h2);

          const body = document.createElement('div');
          body.className = 'about-section-body';
          if (section.body_html) {
            body.innerHTML = section.body_html;
          }

          article.appendChild(header);
          article.appendChild(body);
          container.appendChild(article);
        });
      }

      function updateUrlForSection(sectionId, method) {
        const currentUrl = new URL(window.location.href);
        const params = new URLSearchParams(currentUrl.search);

        if (sectionId) {
          params.set('section', sectionId);
        } else {
          params.delete('section');
        }

        const pathParts = currentUrl.pathname.split('/');
        const fileName = pathParts[pathParts.length - 1] || 'about.html';
        const search = params.toString();
        const relativeUrl = fileName + (search ? '?' + search : '') + currentUrl.hash;

        if (method === 'push') {
          window.history.pushState({ section: sectionId }, '', relativeUrl);
        } else {
          window.history.replaceState({ section: sectionId }, '', relativeUrl);
        }
      }

      function setActiveSection(sectionId) {
        pageState.activeSectionId = sectionId || null;

        const tocItems = document.querySelectorAll('[data-action="toc-item"]');
        tocItems.forEach(function(item) {
          const id = item.dataset.sectionId;
          if (sectionId && id === sectionId) {
            item.classList.add('is-active');
          } else {
            item.classList.remove('is-active');
          }
        });

        if (sectionsContainer) {
          const cards = sectionsContainer.querySelectorAll('[data-section-id]');
          cards.forEach(function(card) {
            const id = card.dataset.sectionId;
            if (sectionId && id === sectionId) {
              card.classList.add('is-active');
            } else {
              card.classList.remove('is-active');
            }
          });
        }
      }

      function getScrollOffset() {
        const header = document.querySelector('.site-header');
        const tocRow = document.querySelector('.about-toc-row');
        let offset = 0;
        if (header) {
          offset += header.getBoundingClientRect().height;
        }
        if (tocRow) {
          offset += tocRow.getBoundingClientRect().height;
        }
        if (offset === 0) {
          offset = 120;
        }
        return offset + 16;
      }

      function scrollToSection(sectionId, options) {
        if (!sectionId || !sectionsContainer) return;
        const target = sectionsContainer.querySelector('[data-section-id="' + sectionId + '"]');
        if (!target) return;

        const rect = target.getBoundingClientRect();
        const absoluteTop = window.scrollY + rect.top;
        const offset = getScrollOffset();
        const top = absoluteTop - offset;
        const behavior = options && options.behavior ? options.behavior : 'smooth';

        window.scrollTo({ top: top, behavior: behavior });
      }

      function applyInitialSection() {
        const initialId = pageState.initialSectionId;
        if (!initialId) return;

        const exists = pageState.sections.some(function(s) { return s.id === initialId; });
        if (!exists) return;

        setActiveSection(initialId);
        scrollToSection(initialId, { behavior: 'auto' });
        updateUrlForSection(initialId, 'replace');
      }

      function setupScrollSpy() {
        if (!sectionsContainer) return;
        const cards = sectionsContainer.querySelectorAll('[data-section-id]');
        if (!cards.length) return;

        if ('IntersectionObserver' in window) {
          const visibleSections = new Map();
          const observerOptions = {
            root: null,
            rootMargin: '-40% 0px -50% 0px',
            threshold: [0, 0.25, 0.5, 0.75, 1]
          };

          const observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
              const id = entry.target.dataset.sectionId;
              if (!id) return;
              if (entry.isIntersecting) {
                visibleSections.set(id, entry.intersectionRatio);
              } else {
                visibleSections.delete(id);
              }
            });

            if (!visibleSections.size) return;

            let bestId = null;
            let bestRatio = 0;
            visibleSections.forEach(function(ratio, id) {
              if (ratio > bestRatio) {
                bestRatio = ratio;
                bestId = id;
              }
            });

            if (bestId && bestId !== pageState.activeSectionId) {
              setActiveSection(bestId);
              updateUrlForSection(bestId, 'replace');
            }
          }, observerOptions);

          cards.forEach(function(card) { observer.observe(card); });
          pageState.observer = observer;
        } else {
          window.addEventListener('scroll', function() {
            const cardsFallback = sectionsContainer.querySelectorAll('[data-section-id]');
            if (!cardsFallback.length) return;

            const viewportTop = window.scrollY + getScrollOffset();
            let closestId = null;
            let smallestDelta = Infinity;

            cardsFallback.forEach(function(card) {
              const rect = card.getBoundingClientRect();
              const top = window.scrollY + rect.top;
              const delta = Math.abs(top - viewportTop);
              const id = card.dataset.sectionId;
              if (delta < smallestDelta) {
                smallestDelta = delta;
                closestId = id;
              }
            });

            if (closestId && closestId !== pageState.activeSectionId) {
              setActiveSection(closestId);
              updateUrlForSection(closestId, 'replace');
            }
          });
        }
      }

      function bindActionHandlers() {
        const actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(element) {
          const action = element.dataset.action;
          if (action === 'toc-item') {
            element.addEventListener('click', function(event) {
              const sectionId = event.currentTarget.dataset.sectionId;
              if (!sectionId) return;
              setActiveSection(sectionId);
              scrollToSection(sectionId, { behavior: 'smooth' });
              updateUrlForSection(sectionId, 'push');
            });
          }
        });

        if (sectionsContainer) {
          sectionsContainer.addEventListener('click', function(event) {
            const anchor = event.target.closest('a');
            if (!anchor) return;

            const href = anchor.getAttribute('href');
            if (!href || href === '#' || href.indexOf('javascript:') === 0) return;

            let parsedUrl;
            try {
              parsedUrl = new URL(anchor.href, window.location.origin);
            } catch (e) {
              return;
            }

            const path = parsedUrl.pathname || '';
            const isHelp = path.endsWith('help.html');
            const isPolicies = path.endsWith('policies.html');
            const isAbout = path.endsWith('about.html') || path.endsWith('about');

            if (isHelp || isPolicies) {
              return;
            }

            if (isAbout) {
              const sectionId = parsedUrl.searchParams.get('section');
              if (sectionId) {
                event.preventDefault();
                setActiveSection(sectionId);
                scrollToSection(sectionId, { behavior: 'smooth' });
                updateUrlForSection(sectionId, 'push');
                return;
              }
            }

            if (href.charAt(0) === '#') {
              const hashId = href.slice(1);
              const card = sectionsContainer.querySelector('[data-section-id="' + hashId + '"]');
              if (card && card.dataset.sectionId) {
                event.preventDefault();
                const sectionId = card.dataset.sectionId;
                setActiveSection(sectionId);
                scrollToSection(sectionId, { behavior: 'smooth' });
                updateUrlForSection(sectionId, 'push');
              }
            }
          });
        }

        window.addEventListener('popstate', function() {
          const params = new URLSearchParams(window.location.search);
          const sectionId = params.get('section');
          if (sectionId) {
            setActiveSection(sectionId);
            scrollToSection(sectionId, { behavior: 'smooth' });
          } else {
            setActiveSection(null);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        });
      }

      function initializePage() {
        if (!window.WebsiteSDK || typeof window.WebsiteSDK.getAboutPageContent !== 'function') {
          hideLoader();
          showError('Unable to load About content. SDK is not available.');
          return;
        }

        let response;
        try {
          response = window.WebsiteSDK.getAboutPageContent();
        } catch (e) {
          console.error('Error calling getAboutPageContent:', e);
          hideLoader();
          showError('There was a problem loading the About information. Please try again later.');
          return;
        }

        const sections = response && Array.isArray(response.sections) ? response.sections : [];
        pageState.sections = sections;

        hideLoader();

        if (tocContainer) {
          renderAboutToc(tocContainer, sections);
        }

        if (sectionsContainer) {
          renderAboutSections(sectionsContainer, sections);
        }

        bindActionHandlers();
        setupScrollSpy();
        applyInitialSection();
      }

      initializePage();
    });
  </script>
</body>
</html>
