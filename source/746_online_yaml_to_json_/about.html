<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>YAML to JSON Converter</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='about.css'>
</head>
<body>
  <div class='page'>
    <header class='site-header'>
      <div class='shell header-inner'>
        <a href='index.html' class='brand' aria-label='YAML to JSON Converter Home'>
          <span class='brand-mark' aria-hidden='true'></span>
          <span class='brand-text'>Lumotools</span>
        </a>
        <nav class='primary-nav' aria-label='Primary'>
          <ul class='nav-list'>
            <li class='nav-item'>
              <a href='index.html' class='nav-link' title='Main YAML to JSON converter homepage'>Home</a>
            </li>
            <li class='nav-item'>
              <a href='examples.html' class='nav-link' title='Browse YAML examples like shopping lists, profiles, and server configs'>Examples</a>
            </li>
            <li class='nav-item'>
              <a href='history.html' class='nav-link' title='View and reopen past YAML to JSON conversions'>History</a>
            </li>
            <li class='nav-item'>
              <a href='settings.html' class='nav-link' title='Configure formatting, behavior, and theme for conversions'>Settings</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id='content' class='site-main shell' role='main'>
      <div class='about-page' data-component='about-page-container'>
        <section class='about-hero' aria-labelledby='about-page-title'>
          <h1 id='about-page-title' class='about-hero-title' data-populate='about-title'></h1>
          <p class='about-hero-subtitle' data-populate='about-subtitle'></p>
          <ul class='about-hero-highlights' data-populate='about-highlights' aria-label='Key highlights'></ul>
        </section>

        <section class='about-main-layout'>
          <div class='about-main-column'>
            <article class='about-body-card' data-component='about-body-renderer'>
              <div
                class='about-body-content'
                data-populate='about-body-html'
                data-error-message='Unable to load this page right now. Please try again.'
              ></div>
            </article>
          </div>

          <aside class='about-sidebar-column' aria-label='About sections' data-component='about-section-navigator'>
            <div class='about-sidebar-card'>
              <div class='about-sidebar-header'>
                <h2 class='about-sidebar-title'>On this page</h2>
              </div>
              <nav class='about-sidebar-nav' aria-label='In-page About navigation'>
                <ul class='about-sidebar-section-list' data-populate='about-section-nav'></ul>
              </nav>
            </div>
          </aside>
        </section>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='shell footer-inner'>
        <div class='footer-left'>
          <span class='footer-brand'>Lumotools</span>
          <span class='footer-meta'>&copy; 2024 All rights reserved.</span>
        </div>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-link' title='How-to guides and documentation for using the converter'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-link' title='Information about the YAML to JSON converter tool'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-link' title='Privacy policy for data and content handling'>Privacy</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-link' title='Terms of use for the YAML to JSON converter'>Terms</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var pageContainer = document.querySelector('[data-component="about-page-container"]');
      var bodyContainer = document.querySelector('[data-populate="about-body-html"]');
      var titleContainer = document.querySelector('[data-populate="about-title"]');
      var subtitleContainer = document.querySelector('[data-populate="about-subtitle"]');
      var highlightsContainer = document.querySelector('[data-populate="about-highlights"]');
      var sectionNavContainer = document.querySelector('[data-populate="about-section-nav"]');

      if (!pageContainer || !bodyContainer || !titleContainer || !sectionNavContainer) {
        return;
      }

      var sectionObserver = null;
      var navItemBySectionId = {};
      var currentActiveSectionId = null;

      function getCurrentSectionFromUrl() {
        var url;
        try {
          url = new URL(window.location.href);
        } catch (e) {
          return null;
        }
        var fromQuery = url.searchParams.get('section');
        if (fromQuery) {
          return fromQuery;
        }
        var hash = url.hash ? url.hash.replace(/^#/, '') : '';
        return hash || null;
      }

      function updateUrlSection(sectionId, options) {
        var opts = options || {};
        var url;
        try {
          url = new URL(window.location.href);
        } catch (e) {
          return;
        }
        if (sectionId) {
          url.searchParams.set('section', sectionId);
          url.hash = '';
        } else {
          url.searchParams.delete('section');
        }
        if (opts.replace) {
          window.history.replaceState({}, '', url.toString());
        } else {
          window.history.pushState({}, '', url.toString());
        }
      }

      function renderTitle(container, title) {
        var safeTitle = title && String(title).trim() ? String(title).trim() : 'About';
        container.textContent = safeTitle;
        document.title = safeTitle;
      }

      function renderBody(container, bodyHtml) {
        container.innerHTML = '';
        if (bodyHtml && typeof bodyHtml === 'string') {
          container.innerHTML = bodyHtml;
        }
      }

      function renderStaticHero(subtitleEl, highlightsEl) {
        if (subtitleEl) {
          subtitleEl.textContent = 'Background, design decisions, and how this YAML to JSON converter fits into your workflow.';
        }
        if (highlightsEl) {
          var items = [
            'No accounts or sign-up required',
            'Respects your indentation and quote style',
            'Built for quick copy-paste conversions'
          ];
          highlightsEl.innerHTML = '';
          items.forEach(function(label) {
            var li = document.createElement('li');
            li.className = 'hero-highlight-item';

            var iconSpan = document.createElement('span');
            iconSpan.className = 'hero-highlight-icon';
            iconSpan.setAttribute('aria-hidden', 'true');

            var textSpan = document.createElement('span');
            textSpan.className = 'hero-highlight-text';
            textSpan.textContent = label;

            li.appendChild(iconSpan);
            li.appendChild(textSpan);
            highlightsEl.appendChild(li);
          });
        }
      }

      function setActiveSection(sectionId, options) {
        var opts = options || {};
        if (!sectionId || currentActiveSectionId === sectionId) {
          return;
        }
        currentActiveSectionId = sectionId;
        Object.keys(navItemBySectionId).forEach(function(key) {
          var btn = navItemBySectionId[key];
          if (!btn) {
            return;
          }
          if (key === sectionId) {
            btn.classList.add('is-active');
            btn.setAttribute('aria-current', 'page');
          } else {
            btn.classList.remove('is-active');
            btn.removeAttribute('aria-current');
          }
        });
        if (opts.updateUrl) {
          updateUrlSection(sectionId, { replace: !!opts.replaceUrl });
        }
      }

      function navigateToSection(sectionId, options) {
        var opts = options || {};
        if (!sectionId) {
          return;
        }
        var candidates = Array.prototype.slice.call(bodyContainer.querySelectorAll('[id], a[name]'));
        var target = null;
        for (var i = 0; i < candidates.length; i += 1) {
          var el = candidates[i];
          if (el.id === sectionId || el.name === sectionId) {
            target = el;
            break;
          }
        }
        if (!target) {
          return;
        }
        var behavior = opts.behavior || 'smooth';
        try {
          target.scrollIntoView({ behavior: behavior, block: 'start' });
        } catch (e) {
          target.scrollIntoView(true);
        }
        if (opts.updateUrl) {
          updateUrlSection(sectionId, { replace: !!opts.replaceUrl });
        }
        setActiveSection(sectionId, { updateUrl: false });
        target.classList.add('about-section-focus');
        window.setTimeout(function() {
          target.classList.remove('about-section-focus');
        }, 1000);
      }

      function buildSectionNavigator(navContainer, bodyRoot) {
        navContainer.innerHTML = '';
        Object.keys(navItemBySectionId).forEach(function(key) {
          delete navItemBySectionId[key];
        });

        var headings = bodyRoot.querySelectorAll('h2[id], h3[id]');
        if (!headings.length) {
          if (navContainer.parentElement) {
            navContainer.parentElement.style.display = 'none';
          }
          return null;
        }
        if (navContainer.parentElement) {
          navContainer.parentElement.style.display = '';
        }

        var firstSectionId = null;
        headings.forEach(function(heading) {
          var sectionId = heading.id;
          if (!sectionId) {
            return;
          }
          if (!firstSectionId) {
            firstSectionId = sectionId;
          }
          var li = document.createElement('li');
          li.className = 'sidebar-section-item';

          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'sidebar-section-button';
          button.textContent = heading.textContent || sectionId;
          button.setAttribute('data-action', 'navigate-section');
          button.setAttribute('data-section-id', sectionId);

          li.appendChild(button);
          navContainer.appendChild(li);

          navItemBySectionId[sectionId] = button;
        });

        return firstSectionId;
      }

      function setupSectionObserver(bodyRoot) {
        if (typeof window.IntersectionObserver === 'undefined') {
          return;
        }
        if (sectionObserver) {
          sectionObserver.disconnect();
        }
        var headings = bodyRoot.querySelectorAll('h2[id], h3[id]');
        if (!headings.length) {
          return;
        }
        sectionObserver = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              var id = entry.target.id;
              if (id) {
                setActiveSection(id, { updateUrl: false });
              }
            }
          });
        }, {
          root: null,
          rootMargin: '-40% 0px -55% 0px',
          threshold: 0.1
        });

        headings.forEach(function(heading) {
          sectionObserver.observe(heading);
        });
      }

      function handleBodyLinkClicks(event) {
        var anchor = event.target.closest('a');
        if (!anchor || !bodyContainer.contains(anchor)) {
          return;
        }
        var href = anchor.getAttribute('href') || '';
        if (!href || href === 'javascript:void(0)') {
          return;
        }

        // Hash-only internal anchors
        if (href.charAt(0) === '#') {
          var sectionId = href.slice(1);
          if (sectionId) {
            event.preventDefault();
            navigateToSection(sectionId, { behavior: 'smooth', updateUrl: true });
          }
          return;
        }

        var resolvedUrl;
        try {
          resolvedUrl = new URL(href, window.location.href);
        } catch (e) {
          return;
        }

        var pathName = resolvedUrl.pathname || '';
        var fileName = pathName.split('/').pop();

        // Internal deep-link back to about.html with ?section=...
        if (fileName === 'about.html') {
          var sectionParam = resolvedUrl.searchParams.get('section');
          if (sectionParam) {
            event.preventDefault();
            navigateToSection(sectionParam, { behavior: 'smooth', updateUrl: true });
          }
          return;
        }

        // Outgoing connections: privacy.html and terms.html (append source=about)
        if (fileName === 'privacy.html' || fileName === 'terms.html') {
          event.preventDefault();
          if (!resolvedUrl.searchParams.get('source')) {
            resolvedUrl.searchParams.set('source', 'about');
          }
          var relativeTarget = fileName + (resolvedUrl.search ? resolvedUrl.search : '');
          window.location.href = relativeTarget;
          return;
        }
      }

      function handleSectionNavClicks(event) {
        var button = event.target.closest('[data-action="navigate-section"]');
        if (!button || !sectionNavContainer.contains(button)) {
          return;
        }
        var sectionId = button.getAttribute('data-section-id');
        if (!sectionId) {
          return;
        }
        event.preventDefault();
        navigateToSection(sectionId, { behavior: 'smooth', updateUrl: true });
      }

      function handlePopState() {
        var sectionId = getCurrentSectionFromUrl();
        if (sectionId) {
          navigateToSection(sectionId, { behavior: 'auto', updateUrl: false, replaceUrl: true });
        }
      }

      function handleError(error) {
        if (pageContainer) {
          pageContainer.setAttribute('data-state', 'error');
        }
        if (bodyContainer) {
          var message = bodyContainer.getAttribute('data-error-message') || '';
          bodyContainer.innerHTML = '';
          if (message) {
            var p = document.createElement('p');
            p.className = 'about-error-message';
            p.textContent = message;
            bodyContainer.appendChild(p);
          }
        }
        if (window && window.console && typeof window.console.error === 'function') {
          window.console.error(error);
        }
      }

      function init() {
        renderStaticHero(subtitleContainer, highlightsContainer);

        window.addEventListener('popstate', handlePopState);
        bodyContainer.addEventListener('click', handleBodyLinkClicks);
        sectionNavContainer.addEventListener('click', handleSectionNavClicks);

        try {
          var response = WebsiteSDK.getAboutPageContent();
          if (!response) {
            throw new Error('No response from getAboutPageContent');
          }

          renderTitle(titleContainer, response.title);
          renderBody(bodyContainer, response.body_html);

          if (pageContainer) {
            pageContainer.setAttribute('data-state', 'ready');
          }

          var firstSectionId = buildSectionNavigator(sectionNavContainer, bodyContainer);
          setupSectionObserver(bodyContainer);

          var targetSectionFromUrl = getCurrentSectionFromUrl();
          if (targetSectionFromUrl) {
            navigateToSection(targetSectionFromUrl, { behavior: 'auto', updateUrl: false, replaceUrl: true });
          } else if (firstSectionId) {
            setActiveSection(firstSectionId, { updateUrl: false });
          }
        } catch (e) {
          handleError(e);
        }
      }

      init();
    });
  </script>
</body>
</html>
