<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Basic KitchenTools - About</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='about.css'>
</head>
<body>
  <!-- Top utility/contact bar -->
  <div class='utility-bar'>
    <div class='container utility-bar-inner'>
      <span class='utility-text'>Phone: 877-873-3162 | Email: support@basickitchentools.com</span>
    </div>
  </div>

  <!-- Site header with logo, main navigation, and cart/wishlist -->
  <header class='site-header'>
    <div class='container header-main'>
      <a href='index.html' class='logo' aria-label='Basic KitchenTools home'>
        <span class='logo-icon' aria-hidden='true'></span>
        <span class='logo-text'>
          <span class='logo-primary'>Basic</span>
          <span class='logo-secondary'>KitchenTools</span>
        </span>
      </a>

      <div class='header-actions'>
        <a href='wishlist.html' class='wishlist-button' aria-label='View items in your wishlist'>
          <span class='wishlist-icon' aria-hidden='true'></span>
          <span class='wishlist-badge' data-populate='wishlist_item_count'>0</span>
        </a>
        <a href='cart.html' class='cart-button' aria-label='View and edit items in the shopping cart'>
          <span class='cart-badge' data-populate='cart_item_count'>0</span>
        </a>
      </div>
    </div>

    <nav class='main-nav' aria-label='Primary'>
      <div class='container'>
        <ul class='nav-list' data-populate='navigation_categories' data-component='navigation-menu'>
          <!-- Navigation categories populated via WebsiteSDK.getCategoriesForNavigation() -->
        </ul>
      </div>
    </nav>
  </header>

  <!-- Main content wrapper; About page content -->
  <main id='content' class='site-content'>
    <div class='container'>
      <section class='about-page' aria-label='About Basic KitchenTools'>
        <div class='about-page-inner' data-populate='about_content'>
          <!-- About content populated via WebsiteSDK.getAboutPageContent() -->
        </div>
      </section>
    </div>
  </main>

  <!-- Site footer -->
  <footer class='site-footer'>
    <div class='container footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-list'>
          <li class='footer-item'>
            <a href='about.html' class='footer-link'>About</a>
          </li>
          <li class='footer-item'>
            <a href='contact.html' class='footer-link'>Contact</a>
          </li>
          <li class='footer-item'>
            <a href='shipping_returns.html' class='footer-link'>Shipping &amp; Returns</a>
          </li>
          <li class='footer-item'>
            <a href='faq.html' class='footer-link'>FAQ</a>
          </li>
          <li class='footer-item'>
            <a href='privacy.html' class='footer-link'>Privacy Policy</a>
          </li>
          <li class='footer-item'>
            <a href='terms.html' class='footer-link'>Terms &amp; Conditions</a>
          </li>
        </ul>
      </nav>
      <p class='footer-copy'>&copy; <span class='footer-year'>2024</span> Basic KitchenTools. All rights reserved.</p>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    (function() {
      'use strict';

      var dataCache = {
        headerState: null,
        navigationCategories: null,
        aboutContent: null
      };

      var currentSectionKey = null;
      var highlightTimeoutId = null;

      function getDataForPopulate(type) {
        if (type === 'cart_item_count' || type === 'wishlist_item_count' || type === 'cart_subtotal') {
          if (!dataCache.headerState) {
            dataCache.headerState = WebsiteSDK.getHeaderState();
          }
          return dataCache.headerState;
        }

        if (type === 'navigation_categories') {
          if (!dataCache.navigationCategories) {
            dataCache.navigationCategories = WebsiteSDK.getCategoriesForNavigation();
          }
          return dataCache.navigationCategories;
        }

        if (type === 'about_content') {
          if (!dataCache.aboutContent) {
            dataCache.aboutContent = WebsiteSDK.getAboutPageContent();
          }
          return dataCache.aboutContent;
        }

        return null;
      }

      function renderPopulate(container, type, data) {
        if (type === 'cart_item_count') {
          var cartCount = data && typeof data.cart_item_count === 'number' ? data.cart_item_count : 0;
          container.textContent = String(cartCount);
          return;
        }

        if (type === 'wishlist_item_count') {
          var wishlistCount = data && typeof data.wishlist_item_count === 'number' ? data.wishlist_item_count : 0;
          container.textContent = String(wishlistCount);
          return;
        }

        if (type === 'cart_subtotal') {
          var subtotal = data && typeof data.cart_subtotal === 'number' ? data.cart_subtotal : 0;
          container.textContent = '$' + subtotal.toFixed(2);
          return;
        }

        if (type === 'navigation_categories') {
          renderNavigationCategories(container, data || []);
          return;
        }

        if (type === 'about_content') {
          renderAboutContent(container, data || {});
          return;
        }
      }

      function renderNavigationCategories(container, categories) {
        container.innerHTML = '';

        if (!categories || !categories.length) {
          return;
        }

        categories
          .slice()
          .sort(function(a, b) {
            var ao = typeof a.sort_order === 'number' ? a.sort_order : 0;
            var bo = typeof b.sort_order === 'number' ? b.sort_order : 0;
            return ao - bo;
          })
          .forEach(function(cat) {
            var li = document.createElement('li');
            li.className = 'nav-item';

            var link = document.createElement('a');
            link.href = 'javascript:void(0)';
            link.className = 'nav-link';
            link.textContent = cat && cat.name ? cat.name : '';
            link.setAttribute('data-action', 'navigate-category');
            if (cat && cat.key) {
              link.setAttribute('data-category-key', cat.key);
            }

            li.appendChild(link);
            container.appendChild(li);
          });
      }

      function renderAboutContent(container, about) {
        var title = about && about.title ? about.title : 'About Basic KitchenTools';
        var mission = about && about.mission ? about.mission : '';
        var valueText = about && about.value_proposition ? about.value_proposition : '';
        var body = about && about.body ? about.body : '';
        var quality = about && about.quality_and_returns_summary ? about.quality_and_returns_summary : '';

        container.innerHTML = "" +
          "<section class='about-content-section' data-component='about-content-section'>" +
            "<div class='about-hero' aria-hidden='true'>" +
              "<div class='about-hero-media'></div>" +
            "</div>" +

            "<div class='about-text-shell'>" +
              "<header class='about-header-block'>" +
                "<h1 id='about-page-title' class='about-title'>" + title + "</h1>" +
              "</header>" +

              "<nav class='about-section-router' data-component='about-section-router' aria-label='About sections'>" +
                "<button type='button' class='about-section-tab' data-action='about-section-link' data-section='mission'>Mission</button>" +
                "<button type='button' class='about-section-tab' data-action='about-section-link' data-section='value'>Value</button>" +
                "<button type='button' class='about-section-tab' data-action='about-section-link' data-section='story'>Our story</button>" +
                "<button type='button' class='about-section-tab' data-action='about-section-link' data-section='quality'>Quality &amp; returns</button>" +
              "</nav>" +

              "<div class='about-sections'>" +
                "<section id='about-mission' class='about-subsection' aria-labelledby='about-mission-heading'>" +
                  "<h2 id='about-mission-heading' class='about-subheading'>Our mission</h2>" +
                  (mission ? "<p>" + mission + "</p>" : '') +
                "</section>" +

                "<section id='about-value' class='about-subsection' aria-labelledby='about-value-heading'>" +
                  "<h2 id='about-value-heading' class='about-subheading'>What we value</h2>" +
                  (valueText ? "<p>" + valueText + "</p>" : '') +
                "</section>" +

                "<section id='about-story' class='about-subsection' aria-labelledby='about-story-heading'>" +
                  "<h2 id='about-story-heading' class='about-subheading'>Our story</h2>" +
                  (body ? "<p>" + body + "</p>" : '') +
                  "<p class='about-help-inline'>Need help choosing the right tools or have a question about an order? " +
                    "<a href='javascript:void(0)' class='inline-help-link' data-action='contact-link'>Contact us</a>." +
                  "</p>" +
                "</section>" +

                "<section id='about-quality' class='about-subsection about-subsection--quality' aria-labelledby='about-quality-heading'>" +
                  "<h2 id='about-quality-heading' class='about-subheading'>Quality, shipping &amp; returns</h2>" +
                  (quality ? "<p>" + quality + "</p>" : '') +

                  "<div class='inline-help-links' data-component='inline-help-links' aria-label='More help'>" +
                    "<a href='javascript:void(0)' class='inline-help-link' data-action='contact-link'>Contact us</a>" +
                    "<span class='inline-help-separator' aria-hidden='true'>|</span>" +
                    "<a href='javascript:void(0)' class='inline-help-link' data-action='shipping-returns-link'>Learn more about shipping &amp; returns</a>" +
                    "<span class='inline-help-separator' aria-hidden='true'>|</span>" +
                    "<a href='javascript:void(0)' class='inline-help-link' data-action='faq-link'>View FAQs</a>" +
                  "</div>" +
                "</section>" +
              "</div>" +
            "</div>" +
          "</section>";
      }

      function updateActiveSectionTab(sectionKey) {
        var tabs = document.querySelectorAll('[data-action="about-section-link"]');
        for (var i = 0; i < tabs.length; i++) {
          var tab = tabs[i];
          var tabSection = tab.getAttribute('data-section');
          if (sectionKey && tabSection === sectionKey) {
            tab.classList.add('about-section-tab--active');
            tab.setAttribute('aria-current', 'true');
          } else {
            tab.classList.remove('about-section-tab--active');
            tab.removeAttribute('aria-current');
          }
        }
      }

      function scrollToSection(sectionKey, options) {
        if (!sectionKey) {
          return;
        }
        var targetId = 'about-' + sectionKey;
        var sectionEl = document.getElementById(targetId);
        if (!sectionEl) {
          return;
        }

        var behavior = options && options.instant ? 'auto' : 'smooth';
        try {
          sectionEl.scrollIntoView({ behavior: behavior, block: 'start' });
        } catch (e) {
          sectionEl.scrollIntoView();
        }

        if (options && options.highlight) {
          sectionEl.classList.add('about-subsection--highlight');
          if (highlightTimeoutId) {
            clearTimeout(highlightTimeoutId);
          }
          highlightTimeoutId = window.setTimeout(function() {
            sectionEl.classList.remove('about-subsection--highlight');
          }, 2000);
        }
      }

      function applySectionFromUrl() {
        var params = new URLSearchParams(window.location.search || '');
        var section = params.get('section');
        var from = params.get('from');
        var context = params.get('context');
        var known = { mission: true, value: true, story: true, quality: true };

        if (!section) {
          if (from === 'checkout' || context === 'shipping' || context === 'returns' || context === 'about_quality') {
            section = 'quality';
          }
        }

        if (section && !known[section]) {
          section = null;
        }

        currentSectionKey = section;
        updateActiveSectionTab(section);

        if (section) {
          scrollToSection(section, { highlight: true, instant: false });
        }
      }

      function handleSectionTabClick(event) {
        event.preventDefault();
        var target = event.currentTarget;
        var sectionKey = target.getAttribute('data-section');
        if (!sectionKey) {
          return;
        }

        currentSectionKey = sectionKey;
        updateActiveSectionTab(sectionKey);
        scrollToSection(sectionKey, { highlight: true, instant: false });

        var url = new URL(window.location.href);
        url.searchParams.set('section', sectionKey);
        var relative = url.pathname + '?' + url.searchParams.toString();
        window.history.pushState({}, '', relative);
      }

      function navigateToCategory(linkEl) {
        var key = linkEl.getAttribute('data-category-key');
        if (!key) {
          return;
        }
        var href = 'category.html?categoryId=' + encodeURIComponent(key);
        window.location.href = href;
      }

      function navigateToContact() {
        var sectionParam = currentSectionKey || '';
        var href = 'contact.html?from=about';
        if (sectionParam) {
          href += '&section=' + encodeURIComponent(sectionParam);
        }
        window.location.href = href;
      }

      function navigateToShippingReturns() {
        var href = 'shipping_returns.html?from=about&context=about_quality&section=quality';
        window.location.href = href;
      }

      function navigateToFaq() {
        var sectionParam = currentSectionKey || '';
        var href = 'faq.html?from=about';
        if (sectionParam) {
          href += '&section=' + encodeURIComponent(sectionParam);
        }
        window.location.href = href;
      }

      function setupActions() {
        var actionElements = document.querySelectorAll('[data-action]');
        for (var i = 0; i < actionElements.length; i++) {
          var el = actionElements[i];
          var action = el.getAttribute('data-action');

          if (action === 'about-section-link') {
            el.addEventListener('click', handleSectionTabClick);
          } else if (action === 'navigate-category') {
            el.addEventListener('click', function(evt) {
              evt.preventDefault();
              navigateToCategory(evt.currentTarget);
            });
          } else if (action === 'contact-link') {
            el.addEventListener('click', function(evt) {
              evt.preventDefault();
              navigateToContact();
            });
          } else if (action === 'shipping-returns-link') {
            el.addEventListener('click', function(evt) {
              evt.preventDefault();
              navigateToShippingReturns();
            });
          } else if (action === 'faq-link') {
            el.addEventListener('click', function(evt) {
              evt.preventDefault();
              navigateToFaq();
            });
          }
        }
      }

      function initializePage() {
        var urlParams = new URLSearchParams(window.location.search || '');
        var fromParam = urlParams.get('from');
        var contextParam = urlParams.get('context');
        void fromParam;
        void contextParam;

        var populateElements = document.querySelectorAll('[data-populate]');
        for (var i = 0; i < populateElements.length; i++) {
          var el = populateElements[i];
          var type = el.getAttribute('data-populate');
          try {
            var data = getDataForPopulate(type);
            renderPopulate(el, type, data);
          } catch (e) {
            if (type === 'about_content') {
              el.innerHTML = "<p class='error-message'>We couldn't load our About information right now. Please refresh the page or try again later.</p>";
            }
          }
        }

        setupActions();
        applySectionFromUrl();

        window.addEventListener('popstate', function() {
          applySectionFromUrl();
        });

        var yearEl = document.querySelector('.footer-year');
        if (yearEl) {
          yearEl.textContent = String(new Date().getFullYear());
        }
      }

      document.addEventListener('DOMContentLoaded', initializePage);
    })();
  </script>
</body>
</html>
