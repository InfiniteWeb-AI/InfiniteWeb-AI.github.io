          <li class='primary-nav-item'>

          <li class='primary-nav-item'>
            <a href='map.html' class='primary-nav-link' data-description='Interactive map for exploring Indigenous communities by region.'>World Cultures Map</a>
          </li>
          <li class='primary-nav-item'>
            <a href='educator_resources.html' class='primary-nav-link' data-description='Classroom activities and teaching materials on Indigenous topics.'>Educator Resources</a>
          </li>
          <li class='primary-nav-item'>
            <a href='timelines.html' class='primary-nav-link' data-description='Historical and thematic timelines related to Indigenous histories.'>Timelines</a>
          </li>
          <li class='primary-nav-item'>
            <a href='media_library.html' class='primary-nav-link' data-description='Browse audio, video, and other media about Indigenous cultures.'>Media Library</a>
          </li>
          <li class='primary-nav-item'>
            <a href='glossary.html' class='primary-nav-link' data-description='Definitions of key Indigenous studies terms and concepts.'>Glossary</a>
          </li>
          <li class='primary-nav-item'>
            <a href='events.html' class='primary-nav-link' data-description='Calendar and listings for Indigenous-related events and programs.'>Events</a>
          </li>

          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-main' role='main'>
    <section class='events-page' aria-labelledby='events-page-title'>
      <div class='events-page-inner'>
        <header class='events-page-header'>
          <h1 id='events-page-title' class='events-page-title'>Events &amp; Calendar</h1>
        </header>

        <!-- URL state manager marker (non-visual) -->
        <div data-component='events-url-state-manager' aria-hidden='true'></div>

        <!-- My Events summary strip -->
        <section class='my-events-summary' data-component='my-events-summary' data-populate='my-events-summary' aria-label='My saved events summary'>
          <!-- Populated via JavaScript -->
        </section>

        <!-- Filters and view toggle band -->
        <section class='events-controls-band' aria-label='Event filters and view options'>
          <div class='events-controls-inner'>
            <div class='events-filters-row' data-component='events-filter-bar'>
              <div class='filter-field'>
                <label for='filter-category' class='filter-label'>Category</label>
                <select id='filter-category' class='filter-select' data-component='filter-category' data-populate='filter-category-options' data-action='change-filter' data-filter-key='category'>
                  <option value=''>All categories</option>
                </select>
              </div>

              <div class='filter-field'>
                <label for='filter-event-type' class='filter-label'>Event type</label>
                <select id='filter-event-type' class='filter-select' data-component='filter-event-type' data-populate='filter-event-type-options' data-action='change-filter' data-filter-key='eventType'>
                  <option value=''>All formats</option>
                </select>
              </div>

              <div class='filter-field'>
                <label for='filter-region' class='filter-label'>Region</label>
                <select id='filter-region' class='filter-select' data-component='filter-region' data-populate='filter-region-options' data-action='change-filter' data-filter-key='region'>
                  <option value=''>All regions</option>
                </select>
              </div>

              <div class='filter-field filter-field-month'>
                <label for='filter-month' class='filter-label'>Month</label>
                <input id='filter-month' class='filter-input-month' type='month' data-component='filter-month' data-action='change-month'>
              </div>

              <div class='filter-field filter-field-days'>
                <fieldset class='filter-days-fieldset'>
                  <legend class='filter-label'>Days of week</legend>
                  <div class='filter-days-options' data-component='filter-days-of-week' data-populate='filter-days-of-week-options'>
                    <!-- Day-of-week checkboxes populated via JavaScript -->
                  </div>
                </fieldset>
              </div>

              <div class='filter-field filter-field-clear'>
                <button type='button' class='filter-clear-button' data-action='clear-filters'>Clear filters</button>
              </div>
            </div>

            <div class='events-view-toggle-wrapper'>
              <div class='events-view-toggle' data-component='events-view-toggle' role='radiogroup' aria-label='Select events view'>
                <button type='button' class='view-toggle-button view-toggle-button-list' data-action='set-view' data-view='list' aria-pressed='false'>List</button>
                <button type='button' class='view-toggle-button view-toggle-button-calendar' data-action='set-view' data-view='calendar' aria-pressed='false'>Calendar</button>
              </div>
            </div>
          </div>
        </section>

        <!-- Loader overlay for events area -->
        <div class='events-loader' data-component='events-loader' aria-hidden='true' hidden>
          <div class='events-loader-inner'>Loading events…</div>
        </div>

        <!-- Main events area: list and calendar are mutually exclusive in visibility -->
        <section class='events-main' aria-label='Events results'>
          <section class='events-list-view' data-component='events-list' data-populate='events-list' aria-label='Event list'>
            <!-- Event list populated via JavaScript -->
          </section>

          <section class='events-calendar-view' data-component='events-calendar' data-populate='events-calendar' aria-label='Event calendar' hidden>
            <!-- Calendar view populated via JavaScript -->
          </section>
        </section>

        <!-- Pagination controls (list view only) -->
        <nav class='events-pagination' data-component='events-pagination' data-populate='events-pagination' aria-label='Events pagination'>
          <!-- Pagination populated via JavaScript -->
        </nav>
      </div>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='site-footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='index.html' class='footer-nav-link' data-description='Return to the homepage.'>Home</a>
          </li>
          <li class='footer-nav-item'>
            <a href='educator_resources.html' class='footer-nav-link' data-description='Access teaching resources and classroom activities.'>Educator Resources</a>
          </li>
          <li class='footer-nav-item'>
            <a href='media_library.html' class='footer-nav-link' data-description='Explore audio and video collections.'>Media Library</a>
          </li>
          <li class='footer-nav-item'>
            <a href='timelines.html' class='footer-nav-link' data-description='View historical timelines.'>Timelines</a>
          </li>
          <li class='footer-nav-item'>
            <a href='glossary.html' class='footer-nav-link' data-description='Look up key terms and concepts.'>Glossary</a>
          </li>
        </ul>
      </nav>
      <p class='site-footer-meta'>&copy; <span class='site-footer-year'>2026</span> Indigenous Cultures Information Site.</p>
    </div>
  </footer>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page UI logic -->
  <script>
    (function() {
      const PAGE_SIZE = 10;

      let state = {
        month: null,
        category: '',
        eventType: '',
        region: '',
        dayOfWeek: [],
        view: 'list',
        page: 1
      };

      let filterOptions = null;
      let myEventsDetail = null;
      let savedEventIds = new Set();
      let eventsResult = {
        events: [],
        totalResults: 0,
        page: 1,
        pageSize: PAGE_SIZE
      };

      const populateRegistry = {};

      const labelMaps = {
        category: {},
        eventType: {},
        region: {},
        dayOfWeek: {}
      };

      function registerPopulateElements() {
        const populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(el) {
          const key = el.dataset.populate;
          if (!populateRegistry[key]) {
            populateRegistry[key] = [];
          }
          populateRegistry[key].push(el);
        });
      }

      function parseUrlState() {
        const params = new URLSearchParams(window.location.search);
        const month = params.get('month');
        const category = params.get('category') || '';
        const eventType = params.get('eventType') || '';
        const region = params.get('region') || '';
        const viewParam = params.get('view');
        const pageParam = params.get('page');
        const dayParam = params.get('dayOfWeek');

        let pageNum = parseInt(pageParam || '1', 10);
        if (isNaN(pageNum) || pageNum < 1) {
          pageNum = 1;
        }

        const allowedViews = ['list', 'calendar'];
        const view = allowedViews.indexOf(viewParam || '') !== -1 ? viewParam : 'list';

        let dayOfWeek = [];
        if (dayParam) {
          dayOfWeek = dayParam.split(',').map(function(d) { return d.trim().toLowerCase(); }).filter(function(d) { return d; });
        }

        return {
          month: month || null,
          category: category,
          eventType: eventType,
          region: region,
          dayOfWeek: dayOfWeek,
          view: view,
          page: pageNum
        };
      }

      function buildUrlFromState() {
        const params = new URLSearchParams();

        if (state.month) {
          params.set('month', state.month);
        }
        if (state.category) {
          params.set('category', state.category);
        }
        if (state.eventType) {
          params.set('eventType', state.eventType);
        }
        if (state.region) {
          params.set('region', state.region);
        }
        if (state.dayOfWeek && state.dayOfWeek.length) {
          params.set('dayOfWeek', state.dayOfWeek.join(','));
        }
        if (state.view) {
          params.set('view', state.view);
        }
        if (state.view === 'list' && state.page && state.page > 1) {
          params.set('page', String(state.page));
        } else if (state.view === 'list' && state.page === 1) {
          params.delete('page');
        } else if (state.view === 'calendar') {
          params.delete('page');
        }

        const query = params.toString();
        const base = window.location.pathname;
        return query ? base + '?' + query : base;
      }

      function updateUrl(replace) {
        const url = buildUrlFromState();
        if (replace) {
          window.history.replaceState(state, '', url);
        } else {
          window.history.pushState(state, '', url);
        }
      }

      function getCurrentMonthString() {
        const now = new Date();
        const year = now.getFullYear();
        const monthIndex = now.getMonth() + 1;
        const monthStr = monthIndex < 10 ? '0' + monthIndex : String(monthIndex);
        return year + '-' + monthStr;
      }

      function monthStringToDateRange(monthStr) {
        const parts = monthStr.split('-');
        if (parts.length !== 2) {
          return { startDate: null, endDate: null };
        }
        const year = parseInt(parts[0], 10);
        const monthIndex = parseInt(parts[1], 10) - 1;
        if (isNaN(year) || isNaN(monthIndex)) {
          return { startDate: null, endDate: null };
        }
        const start = new Date(year, monthIndex, 1);
        const end = new Date(year, monthIndex + 1, 0);
        const startIso = start.toISOString().split('T')[0];
        const endIso = end.toISOString().split('T')[0];
        return { startDate: startIso, endDate: endIso };
      }

      function ensureCalendarMonthIfNeeded(options) {
        const opts = options || {};
        if (state.view === 'calendar' && !state.month) {
          state.month = getCurrentMonthString();
          updateUrl(true);
          if (opts.syncMonthInput) {
            syncFilterControlsToState();
          }
        }
      }

      function applyStatePatch(patch, options) {
        const opts = options || {};
        const prevView = state.view;

        Object.keys(patch).forEach(function(key) {
          state[key] = patch[key];
        });

        if (patch.hasOwnProperty('category') || patch.hasOwnProperty('eventType') || patch.hasOwnProperty('region') || patch.hasOwnProperty('month') || patch.hasOwnProperty('dayOfWeek')) {
          state.page = 1;
        }

        if (prevView !== state.view && state.view === 'calendar') {
          ensureCalendarMonthIfNeeded({ syncMonthInput: true });
        }

        updateUrl(!!opts.replace);
        syncFilterControlsToState();
        updateViewVisibility();
        reloadEvents();
      }

      function showLoader(show) {
        const loader = document.querySelector('[data-component="events-loader"]');
        if (!loader) {
          return;
        }
        if (show) {
          loader.hidden = false;
          loader.setAttribute('aria-hidden', 'false');
        } else {
          loader.hidden = true;
          loader.setAttribute('aria-hidden', 'true');
        }
      }

      function safeToLocaleDateString(value) {
        if (!value) {
          return '';
        }
        const date = new Date(value);
        if (isNaN(date.getTime())) {
          return '';
        }
        return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      }

      function safeToLocaleTimeString(value) {
        if (!value) {
          return '';
        }
        const date = new Date(value);
        if (isNaN(date.getTime())) {
          return '';
        }
        return date.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
      }

      function reloadEvents() {
        const filters = {};

        if (state.category) {
          filters.category = state.category;
        }
        if (state.eventType) {
          filters.eventType = state.eventType;
        }
        if (state.region) {
          filters.region = state.region;
        }
        if (state.dayOfWeek && state.dayOfWeek.length) {
          filters.daysOfWeek = state.dayOfWeek.slice();
        }

        if (state.month) {
          const range = monthStringToDateRange(state.month);
          if (range.startDate && range.endDate) {
            filters.startDate = range.startDate;
            filters.endDate = range.endDate;
          }
        } else if (state.view === 'calendar') {
          ensureCalendarMonthIfNeeded({ syncMonthInput: true });
          const range = monthStringToDateRange(state.month);
          if (range.startDate && range.endDate) {
            filters.startDate = range.startDate;
            filters.endDate = range.endDate;
          }
        }

        showLoader(true);
        try {
          const result = WebsiteSDK.listEvents(filters, state.view === 'list' ? state.page : 1, PAGE_SIZE);
          eventsResult = {
            events: Array.isArray(result.events) ? result.events : [],
            totalResults: typeof result.totalResults === 'number' ? result.totalResults : 0,
            page: typeof result.page === 'number' ? result.page : 1,
            pageSize: typeof result.pageSize === 'number' ? result.pageSize : PAGE_SIZE
          };

          if (populateRegistry['events-list']) {
            populateRegistry['events-list'].forEach(function(container) {
              renderEventsList(container, eventsResult.events, savedEventIds, state.view === 'list');
            });
          }
          if (populateRegistry['events-calendar']) {
            populateRegistry['events-calendar'].forEach(function(container) {
              renderEventsCalendar(container, eventsResult.events, savedEventIds, state.view === 'calendar', state.month || getCurrentMonthString());
            });
          }
          if (populateRegistry['events-pagination']) {
            populateRegistry['events-pagination'].forEach(function(container) {
              renderEventsPagination(container, eventsResult.totalResults, eventsResult.page, eventsResult.pageSize, state.view === 'list');
            });
          }
        } catch (err) {
          console.error('Error loading events', err);
          if (populateRegistry['events-list']) {
            populateRegistry['events-list'].forEach(function(container) {
              container.innerHTML = '<p class="events-error">Unable to load events right now. Please try again later.</p>';
            });
          }
          if (populateRegistry['events-calendar']) {
            populateRegistry['events-calendar'].forEach(function(container) {
              container.innerHTML = '<p class="events-error">Unable to load events right now. Please try again later.</p>';
            });
          }
        } finally {
          showLoader(false);
        }
      }

      function renderMyEventsSummary(container, detail) {
        container.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.className = 'my-events-summary-inner';

        const title = document.createElement('div');
        title.className = 'my-events-summary-title';

        const listMeta = detail && detail.myEvents ? detail.myEvents : null;
        const items = detail && Array.isArray(detail.items) ? detail.items : [];
        const count = items.length;

        if (listMeta && listMeta.name) {
          title.textContent = listMeta.name;
        } else {
          title.textContent = 'My Events';
        }

        const info = document.createElement('div');
        info.className = 'my-events-summary-info';

        if (count > 0) {
          const summaryText = document.createElement('p');
          summaryText.className = 'my-events-summary-text';
          summaryText.textContent = 'You have ' + count + ' saved ' + (count === 1 ? 'event' : 'events') + ' in My Events.';
          info.appendChild(summaryText);

          const list = document.createElement('ul');
          list.className = 'my-events-summary-list';

          const maxItems = Math.min(count, 3);
          for (let i = 0; i < maxItems; i += 1) {
            const item = items[i];
            const li = document.createElement('li');
            li.className = 'my-events-summary-list-item';

            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'my-events-summary-link';
            button.dataset.action = 'open-event';
            if (item && item.event && item.event.id) {
              button.dataset.eventId = item.event.id;
            }
            const dateLabel = item && item.event ? safeToLocaleDateString(item.event.start_datetime) : '';
            const labelParts = [];
            if (item && item.event && item.event.title) {
              labelParts.push(item.event.title);
            }
            if (dateLabel) {
              labelParts.push(dateLabel);
            }
            button.textContent = labelParts.join(' · ');

            li.appendChild(button);
            list.appendChild(li);
          }

          info.appendChild(list);
        } else {
          const summaryText = document.createElement('p');
          summaryText.className = 'my-events-summary-text';
          summaryText.textContent = 'You do not have any saved events yet. Events you save will appear here.';
          info.appendChild(summaryText);
        }

        wrapper.appendChild(title);
        wrapper.appendChild(info);
        container.appendChild(wrapper);
      }

      function renderCategoryOptions(container, categories, selectedValue) {
        container.innerHTML = '';
        const defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = 'All categories';
        container.appendChild(defaultOption);

        categories.forEach(function(cat) {
          if (cat && cat.value) {
            const opt = document.createElement('option');
            opt.value = cat.value;
            opt.textContent = cat.label || cat.value;
            if (selectedValue && selectedValue === cat.value) {
              opt.selected = true;
            }
            container.appendChild(opt);
            labelMaps.category[cat.value] = cat.label || cat.value;
          }
        });
      }

      function renderEventTypeOptions(container, eventTypes, selectedValue) {
        container.innerHTML = '';
        const defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = 'All formats';
        container.appendChild(defaultOption);

        eventTypes.forEach(function(type) {
          if (type && type.value) {
            const opt = document.createElement('option');
            opt.value = type.value;
            opt.textContent = type.label || type.value;
            if (selectedValue && selectedValue === type.value) {
              opt.selected = true;
            }
            container.appendChild(opt);
            labelMaps.eventType[type.value] = type.label || type.value;
          }
        });
      }

      function renderRegionOptions(container, regions, selectedValue) {
        container.innerHTML = '';
        const defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = 'All regions';
        container.appendChild(defaultOption);

        regions.forEach(function(region) {
          if (region && region.value) {
            const opt = document.createElement('option');
            opt.value = region.value;
            opt.textContent = region.label || region.value;
            if (selectedValue && selectedValue === region.value) {
              opt.selected = true;
            }
            container.appendChild(opt);
            labelMaps.region[region.value] = region.label || region.value;
          }
        });
      }

      function renderDaysOfWeekOptions(container, daysOfWeek, selectedValues) {
        container.innerHTML = '';
        const selectedSet = new Set(selectedValues || []);

        daysOfWeek.forEach(function(day) {
          if (!day || !day.value) {
            return;
          }
          labelMaps.dayOfWeek[day.value] = day.label || day.value;
          const wrapper = document.createElement('label');
          wrapper.className = 'filter-day-option';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'filter-day-checkbox';
          checkbox.value = day.value;
          checkbox.dataset.action = 'toggle-day-of-week';
          if (selectedSet.has(day.value)) {
            checkbox.checked = true;
          }

          const span = document.createElement('span');
          span.className = 'filter-day-label';
          span.textContent = day.label || day.value;

          wrapper.appendChild(checkbox);
          wrapper.appendChild(span);
          container.appendChild(wrapper);
        });
      }

      function renderEventsList(container, events, savedIds, isActiveView) {
        container.innerHTML = '';
        const activeClass = isActiveView ? ' events-list-view-active' : '';
        if (container.className.indexOf('events-list-view-active') !== -1 && !isActiveView) {
          container.className = container.className.replace(' events-list-view-active', '');
        } else if (isActiveView && container.className.indexOf('events-list-view-active') === -1) {
          container.className += activeClass;
        }

        if (!events || !events.length) {
          const empty = document.createElement('p');
          empty.className = 'events-empty-state';
          empty.textContent = 'No events match the current filters.';
          container.appendChild(empty);
          return;
        }

        const list = document.createElement('div');
        list.className = 'events-list-cards';

        events.forEach(function(ev) {
          const card = document.createElement('article');
          card.className = 'event-card';
          card.dataset.action = 'open-event';
          if (ev && ev.id) {
            card.dataset.eventId = ev.id;
          }

          const header = document.createElement('header');
          header.className = 'event-card-header';

          const title = document.createElement('h2');
          title.className = 'event-card-title';
          title.textContent = ev && ev.title ? ev.title : 'Untitled event';
          header.appendChild(title);

          const meta = document.createElement('p');
          meta.className = 'event-card-meta';
          const datePart = safeToLocaleDateString(ev && ev.start_datetime);
          const timePart = safeToLocaleTimeString(ev && ev.start_datetime);
          const parts = [];
          if (datePart) {
            parts.push(datePart);
          }
          if (timePart) {
            parts.push(timePart);
          }
          if (ev && ev.category) {
            const label = labelMaps.category[ev.category] || ev.category;
            parts.push(label);
          }
          if (ev && ev.event_type) {
            const typeLabel = labelMaps.eventType[ev.event_type] || ev.event_type;
            parts.push(typeLabel);
          }
          if (ev && ev.region) {
            const regionLabel = labelMaps.region[ev.region] || ev.region;
            parts.push(regionLabel);
          }
          meta.textContent = parts.join(' · ');
          header.appendChild(meta);

          const body = document.createElement('div');
          body.className = 'event-card-body';
          if (ev && ev.description) {
            const desc = document.createElement('p');
            desc.className = 'event-card-description';
            desc.textContent = ev.description;
            body.appendChild(desc);
          }

          const footer = document.createElement('div');
          footer.className = 'event-card-footer';

          if (ev && (ev.location || ev.virtual_access_details)) {
            const location = document.createElement('span');
            location.className = 'event-card-location';
            if (ev.location && ev.virtual_access_details) {
              location.textContent = ev.location + ' · ' + ev.virtual_access_details;
            } else if (ev.location) {
              location.textContent = ev.location;
            } else {
              location.textContent = ev.virtual_access_details;
            }
            footer.appendChild(location);
          }

          const actions = document.createElement('div');
          actions.className = 'event-card-actions';

          const detailsButton = document.createElement('button');
          detailsButton.type = 'button';
          detailsButton.className = 'event-card-details-button';
          detailsButton.dataset.action = 'open-event';
          if (ev && ev.id) {
            detailsButton.dataset.eventId = ev.id;
          }
          detailsButton.textContent = 'View details';
          actions.appendChild(detailsButton);

          if (ev && ev.id && savedIds && savedIds.has(ev.id)) {
            const savedBadge = document.createElement('span');
            savedBadge.className = 'event-card-saved-badge';
            savedBadge.textContent = 'Saved';
            savedBadge.setAttribute('aria-label', 'Saved to My Events');
            actions.appendChild(savedBadge);
          }

          footer.appendChild(actions);

          card.appendChild(header);
          card.appendChild(body);
          card.appendChild(footer);

          list.appendChild(card);
        });

        container.appendChild(list);
      }

      function renderEventsCalendar(container, events, savedIds, isActiveView, monthStr) {
        container.innerHTML = '';
        if (isActiveView) {
          container.hidden = false;
        } else {
          container.hidden = true;
        }

        const header = document.createElement('div');
        header.className = 'calendar-header';

        const title = document.createElement('h2');
        title.className = 'calendar-title';

        const parts = monthStr.split('-');
        let year = null;
        let monthIndex = null;
        if (parts.length === 2) {
          year = parseInt(parts[0], 10);
          monthIndex = parseInt(parts[1], 10) - 1;
        }
        let monthLabel = '';
        if (!isNaN(year) && !isNaN(monthIndex)) {
          const tmp = new Date(year, monthIndex, 1);
          monthLabel = tmp.toLocaleDateString(undefined, { year: 'numeric', month: 'long' });
        } else {
          monthLabel = 'Calendar';
        }
        title.textContent = monthLabel;
        header.appendChild(title);
        container.appendChild(header);

        const dateToEvents = {};
        if (events && events.length) {
          events.forEach(function(ev) {
            if (!ev || !ev.start_datetime) {
              return;
            }
            const d = new Date(ev.start_datetime);
            if (isNaN(d.getTime())) {
              return;
            }
            const key = d.toISOString().split('T')[0];
            if (!dateToEvents[key]) {
              dateToEvents[key] = [];
            }
            dateToEvents[key].push(ev);
          });
        }

        const grid = document.createElement('div');
        grid.className = 'calendar-grid';
        grid.setAttribute('role', 'grid');

        const dayNamesRow = document.createElement('div');
        dayNamesRow.className = 'calendar-row calendar-row-header';
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        dayNames.forEach(function(name) {
          const cell = document.createElement('div');
          cell.className = 'calendar-cell calendar-cell-header';
          cell.textContent = name;
          dayNamesRow.appendChild(cell);
        });
        grid.appendChild(dayNamesRow);

        let baseYear = year;
        let baseMonthIndex = monthIndex;
        if (isNaN(baseYear) || isNaN(baseMonthIndex)) {
          const now = new Date();
          baseYear = now.getFullYear();
          baseMonthIndex = now.getMonth();
        }

        const firstOfMonth = new Date(baseYear, baseMonthIndex, 1);
        const startDay = firstOfMonth.getDay();
        const startOfGrid = new Date(baseYear, baseMonthIndex, 1 - startDay);

        const dayFilterSet = new Set(state.dayOfWeek || []);

        for (let week = 0; week < 6; week += 1) {
          const row = document.createElement('div');
          row.className = 'calendar-row';
          for (let day = 0; day < 7; day += 1) {
            const cellDate = new Date(startOfGrid.getTime());
            cellDate.setDate(startOfGrid.getDate() + week * 7 + day);
            const cellKey = cellDate.toISOString().split('T')[0];
            const inMonth = cellDate.getMonth() === baseMonthIndex;
            const cellDayOfWeek = cellDate.getDay();
            const dowStrings = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
            const dowString = dowStrings[cellDayOfWeek];
            const isSelectedDay = !dayFilterSet.size || dayFilterSet.has(dowString);

            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            if (!inMonth) {
              cell.className += ' calendar-cell-outside-month';
            }
            if (isSelectedDay && inMonth && dayFilterSet.size) {
              cell.className += ' calendar-cell-highlighted-day';
            }

            const dateLabel = document.createElement('div');
            dateLabel.className = 'calendar-cell-date';
            dateLabel.textContent = String(cellDate.getDate());
            cell.appendChild(dateLabel);

            const eventsWrapper = document.createElement('div');
            eventsWrapper.className = 'calendar-cell-events';

            const cellEvents = dateToEvents[cellKey] || [];
            if (cellEvents.length) {
              cellEvents.forEach(function(ev) {
                const eventItem = document.createElement('button');
                eventItem.type = 'button';
                eventItem.className = 'calendar-event-item';
                eventItem.dataset.action = 'open-event';
                if (ev && ev.id) {
                  eventItem.dataset.eventId = ev.id;
                }

                const titleSpan = document.createElement('span');
                titleSpan.className = 'calendar-event-title';
                titleSpan.textContent = ev && ev.title ? ev.title : 'Untitled';
                eventItem.appendChild(titleSpan);

                const metaSpan = document.createElement('span');
                metaSpan.className = 'calendar-event-meta';
                const timeLabel = safeToLocaleTimeString(ev && ev.start_datetime);
                const metaParts = [];
                if (timeLabel) {
                  metaParts.push(timeLabel);
                }
                if (ev && ev.event_type) {
                  const typeLabel = labelMaps.eventType[ev.event_type] || ev.event_type;
                  metaParts.push(typeLabel);
                }
                metaSpan.textContent = metaParts.join(' · ');
                eventItem.appendChild(metaSpan);

                if (ev && ev.id && savedIds && savedIds.has(ev.id)) {
                  const savedSpan = document.createElement('span');
                  savedSpan.className = 'calendar-event-saved';
                  savedSpan.textContent = 'Saved';
                  eventItem.appendChild(savedSpan);
                }

                if (dayFilterSet.size && !dayFilterSet.has(dowString)) {
                  eventItem.className += ' calendar-event-muted';
                }

                eventsWrapper.appendChild(eventItem);
              });
            }

            cell.appendChild(eventsWrapper);
            row.appendChild(cell);
          }
          grid.appendChild(row);
        }

        container.appendChild(grid);
      }

      function renderEventsPagination(container, totalResults, page, pageSize, isListView) {
        container.innerHTML = '';
        if (!isListView) {
          container.className = container.className.replace(' events-pagination-visible', '');
          return;
        }

        if (totalResults <= pageSize) {
          container.className = container.className.replace(' events-pagination-visible', '');
          return;
        }

        if (container.className.indexOf('events-pagination-visible') === -1) {
          container.className += ' events-pagination-visible';
        }

        const totalPages = Math.max(1, Math.ceil(totalResults / pageSize));

        const wrapper = document.createElement('div');
        wrapper.className = 'pagination-inner';

        const prevButton = document.createElement('button');
        prevButton.type = 'button';
        prevButton.className = 'pagination-button pagination-prev';
        prevButton.textContent = 'Previous';
        prevButton.dataset.action = 'prev-page';
        prevButton.disabled = page <= 1;
        wrapper.appendChild(prevButton);

        const pagesContainer = document.createElement('div');
        pagesContainer.className = 'pagination-pages';

        const maxButtons = 7;
        let startPage = Math.max(1, page - 3);
        let endPage = Math.min(totalPages, startPage + maxButtons - 1);
        if (endPage - startPage + 1 < maxButtons) {
          startPage = Math.max(1, endPage - maxButtons + 1);
        }

        for (let p = startPage; p <= endPage; p += 1) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'pagination-button pagination-page';
          if (p === page) {
            btn.className += ' pagination-page-current';
            btn.setAttribute('aria-current', 'page');
          }
          btn.textContent = String(p);
          btn.dataset.action = 'go-to-page';
          btn.dataset.page = String(p);
          pagesContainer.appendChild(btn);
        }

        wrapper.appendChild(pagesContainer);

        const nextButton = document.createElement('button');
        nextButton.type = 'button';
        nextButton.className = 'pagination-button pagination-next';
        nextButton.textContent = 'Next';
        nextButton.dataset.action = 'next-page';
        nextButton.disabled = page >= totalPages;
        wrapper.appendChild(nextButton);

        container.appendChild(wrapper);
      }

      function syncFilterControlsToState() {
        const categorySelect = document.querySelector('[data-component="filter-category"]');
        const eventTypeSelect = document.querySelector('[data-component="filter-event-type"]');
        const regionSelect = document.querySelector('[data-component="filter-region"]');
        const monthInput = document.querySelector('[data-component="filter-month"]');

        if (categorySelect) {
          categorySelect.value = state.category || '';
        }
        if (eventTypeSelect) {
          eventTypeSelect.value = state.eventType || '';
        }
        if (regionSelect) {
          regionSelect.value = state.region || '';
        }
        if (monthInput) {
          monthInput.value = state.month || '';
        }

        const viewToggle = document.querySelector('[data-component="events-view-toggle"]');
        if (viewToggle) {
          const listBtn = viewToggle.querySelector('[data-view="list"]');
          const calBtn = viewToggle.querySelector('[data-view="calendar"]');
          if (listBtn) {
            const isList = state.view === 'list';
            listBtn.setAttribute('aria-pressed', isList ? 'true' : 'false');
            if (isList) {
              listBtn.classList.add('view-toggle-button-active');
            } else {
              listBtn.classList.remove('view-toggle-button-active');
            }
          }
          if (calBtn) {
            const isCal = state.view === 'calendar';
            calBtn.setAttribute('aria-pressed', isCal ? 'true' : 'false');
            if (isCal) {
              calBtn.classList.add('view-toggle-button-active');
            } else {
              calBtn.classList.remove('view-toggle-button-active');
            }
          }
        }

        const daysContainerList = populateRegistry['filter-days-of-week-options'] || [];
        daysContainerList.forEach(function(container) {
          const checkboxes = container.querySelectorAll('input[type="checkbox"]');
          const selectedSet = new Set(state.dayOfWeek || []);
          checkboxes.forEach(function(cb) {
            if (cb && cb.value) {
              cb.checked = selectedSet.has(cb.value);
            }
          });
        });
      }

      function updateViewVisibility() {
        const listContainers = populateRegistry['events-list'] || [];
        const calendarContainers = populateRegistry['events-calendar'] || [];

        const isList = state.view === 'list';
        const isCal = state.view === 'calendar';

        listContainers.forEach(function(container) {
          container.hidden = !isList;
        });
        calendarContainers.forEach(function(container) {
          container.hidden = !isCal;
        });
      }

      function handleClickAction(target) {
        const action = target.dataset.action;
        if (!action) {
          return;
        }

        if (action === 'set-view') {
          const view = target.dataset.view === 'calendar' ? 'calendar' : 'list';
          applyStatePatch({ view: view });
          return;
        }

        if (action === 'clear-filters') {
          applyStatePatch({
            month: null,
            category: '',
            eventType: '',
            region: '',
            dayOfWeek: []
          });
          return;
        }

        if (action === 'open-event') {
          const eventId = target.dataset.eventId || (target.closest('[data-event-id]') ? target.closest('[data-event-id"]').dataset.eventId : null);
          if (eventId) {
            window.location.href = 'event.html?eventId=' + encodeURIComponent(eventId);
          }
          return;
        }

        if (action === 'go-to-page') {
          const pageStr = target.dataset.page;
          const pageNum = parseInt(pageStr || '1', 10);
          if (!isNaN(pageNum) && pageNum >= 1) {
            applyStatePatch({ page: pageNum });
          }
          return;
        }

        if (action === 'next-page') {
          const totalPages = Math.max(1, Math.ceil(eventsResult.totalResults / eventsResult.pageSize));
          const nextPage = Math.min(totalPages, state.page + 1);
          if (nextPage !== state.page) {
            applyStatePatch({ page: nextPage });
          }
          return;
        }

        if (action === 'prev-page') {
          const prevPage = Math.max(1, state.page - 1);
          if (prevPage !== state.page) {
            applyStatePatch({ page: prevPage });
          }
          return;
        }
      }

      function handleChangeAction(target) {
        const action = target.dataset.action;
        if (!action) {
          return;
        }

        if (action === 'change-filter') {
          const key = target.dataset.filterKey;
          const value = target.value || '';
          if (key === 'category') {
            applyStatePatch({ category: value });
          } else if (key === 'eventType') {
            applyStatePatch({ eventType: value });
          } else if (key === 'region') {
            applyStatePatch({ region: value });
          }
          return;
        }

        if (action === 'change-month') {
          const value = target.value || '';
          applyStatePatch({ month: value || null });
          return;
        }

        if (action === 'toggle-day-of-week') {
          const container = target.closest('[data-component="filter-days-of-week"]') || target.parentElement;
          if (!container) {
            return;
          }
          const checkboxes = container.querySelectorAll('input[type="checkbox"]');
          const selected = [];
          checkboxes.forEach(function(cb) {
            if (cb.checked && cb.value) {
              selected.push(cb.value);
            }
          });
          applyStatePatch({ dayOfWeek: selected });
          return;
        }
      }

      function initEventDelegation() {
        document.addEventListener('click', function(evt) {
          const target = evt.target.closest('[data-action]');
          if (!target) {
            return;
          }
          handleClickAction(target);
        });

        document.addEventListener('change', function(evt) {
          const target = evt.target;
          if (!target || !target.dataset || !target.dataset.action) {
            return;
          }
          handleChangeAction(target);
        });
      }

      document.addEventListener('DOMContentLoaded', function() {
        registerPopulateElements();

        state = parseUrlState();
        ensureCalendarMonthIfNeeded({ syncMonthInput: false });
        updateUrl(true);

        try {
          filterOptions = WebsiteSDK.getEventFilterOptions();
        } catch (err) {
          console.error('Error loading event filter options', err);
          filterOptions = { categories: [], eventTypes: [], regions: [], daysOfWeek: [] };
        }

        if (filterOptions) {
          const categories = Array.isArray(filterOptions.categories) ? filterOptions.categories : [];
          const eventTypes = Array.isArray(filterOptions.eventTypes) ? filterOptions.eventTypes : [];
          const regions = Array.isArray(filterOptions.regions) ? filterOptions.regions : [];
          const daysOfWeek = Array.isArray(filterOptions.daysOfWeek) ? filterOptions.daysOfWeek : [];

          if (populateRegistry['filter-category-options']) {
            populateRegistry['filter-category-options'].forEach(function(container) {
              renderCategoryOptions(container, categories, state.category);
            });
          }
          if (populateRegistry['filter-event-type-options']) {
            populateRegistry['filter-event-type-options'].forEach(function(container) {
              renderEventTypeOptions(container, eventTypes, state.eventType);
            });
          }
          if (populateRegistry['filter-region-options']) {
            populateRegistry['filter-region-options'].forEach(function(container) {
              renderRegionOptions(container, regions, state.region);
            });
          }
          if (populateRegistry['filter-days-of-week-options']) {
            populateRegistry['filter-days-of-week-options'].forEach(function(container) {
              renderDaysOfWeekOptions(container, daysOfWeek, state.dayOfWeek);
            });
          }
        }

        syncFilterControlsToState();
        updateViewVisibility();

        try {
          myEventsDetail = WebsiteSDK.getMyEventsDetail();
        } catch (err) {
          console.error('Error loading My Events detail', err);
          myEventsDetail = { myEvents: null, items: [] };
        }

        const items = myEventsDetail && Array.isArray(myEventsDetail.items) ? myEventsDetail.items : [];
        savedEventIds = new Set();
        items.forEach(function(item) {
          if (item && item.myEventItem && item.myEventItem.event_id) {
            savedEventIds.add(item.myEventItem.event_id);
          } else if (item && item.event && item.event.id) {
            savedEventIds.add(item.event.id);
          }
        });

        if (populateRegistry['my-events-summary']) {
          populateRegistry['my-events-summary'].forEach(function(container) {
            renderMyEventsSummary(container, myEventsDetail);
          });
        }

        reloadEvents();
        initEventDelegation();

        window.addEventListener('popstate', function() {
          state = parseUrlState();
          ensureCalendarMonthIfNeeded({ syncMonthInput: true });
          syncFilterControlsToState();
          updateViewVisibility();
          reloadEvents();
        });
      });
    })();
  </script>
