  <script src='business_logic.js'></script>
  <script>
    (function() {
      'use strict';

      function parseUrlState() {
        var params = new URLSearchParams(window.location.search);
        var contentType = params.get('contentType') || null;
        var topic = params.get('topic') || null;
        var region = params.get('region') || null;
        var minYearStr = params.get('minYear');
        var minYear = null;
        if (minYearStr) {
          var parsedMin = parseInt(minYearStr, 10);
          if (!isNaN(parsedMin)) {
            minYear = parsedMin;
          }
        }
        var sortBy = params.get('sortBy') || null;
        var pageStr = params.get('page');
        var page = parseInt(pageStr || '1', 10);
        if (isNaN(page) || page < 1) {
          page = 1;
        }
        return {
          contentType: contentType,
          topic: topic,
          region: region,
          minYear: minYear,
          sortBy: sortBy,
          page: page
        };
      }

      function buildFiltersFromState(state) {
        var filters = {};
        if (state.contentType) {
          filters.contentType = state.contentType;
        }
        if (state.topic) {
          filters.topic = state.topic;
        }
        if (state.region) {
          filters.region = state.region;
        }
        if (state.minYear) {
          filters.minYearRecorded = state.minYear;
        }
        return filters;
      }

      function getLabelFromOptions(options, value) {
        if (!options || !value) {
          return value;
        }
        for (var i = 0; i < options.length; i++) {
          if (options[i].value === value) {
            return options[i].label;
          }
        }
        return value;
      }

      function formatDuration(seconds) {
        if (seconds === null || seconds === undefined || isNaN(seconds)) {
          return '';
        }
        var totalSeconds = Math.max(0, Math.round(seconds));
        var minutes = Math.floor(totalSeconds / 60);
        var remainingSeconds = totalSeconds % 60;
        if (minutes === 0) {
          return totalSeconds + 's';
        }
        if (minutes < 60) {
          if (remainingSeconds === 0) {
            return minutes + ' min';
          }
          return minutes + ' min ' + remainingSeconds + ' s';
        }
        var hours = Math.floor(minutes / 60);
        var remainingMinutes = minutes % 60;
        if (remainingMinutes === 0) {
          return hours + ' hr';
        }
        return hours + ' hr ' + remainingMinutes + ' min';
      }

      function getYearFromMediaItem(item) {
        if (item.year_recorded) {
          return item.year_recorded;
        }
        if (item.date_recorded) {
          var d = new Date(item.date_recorded);
          if (!isNaN(d.getTime())) {
            return d.getFullYear();
          }
        }
        return null;
      }

      function showError(container, message) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        var errorDiv = document.createElement('div');
        errorDiv.className = 'media-library-error';
        errorDiv.setAttribute('role', 'alert');
        errorDiv.textContent = message;
        container.appendChild(errorDiv);
      }

      function renderFiltersAndSort(container, filterOptions, urlState) {
        container.innerHTML = '';

        var wrapper = document.createElement('div');
        wrapper.className = 'media-filter-toolbar-inner';

        var form = document.createElement('form');
        form.className = 'media-filter-form';
        form.setAttribute('novalidate', 'novalidate');
        form.setAttribute('role', 'group');
        form.setAttribute('aria-label', 'Filter and sort media items');

        var contentTypeField = document.createElement('div');
        contentTypeField.className = 'form-field form-field--content-type';
        var contentTypeLabel = document.createElement('label');
        contentTypeLabel.setAttribute('for', 'filter-content-type');
        contentTypeLabel.textContent = 'Content type';
        var contentTypeSelect = document.createElement('select');
        contentTypeSelect.id = 'filter-content-type';
        contentTypeSelect.name = 'contentType';
        var ctDefaultOpt = document.createElement('option');
        ctDefaultOpt.value = '';
        ctDefaultOpt.textContent = 'All types';
        contentTypeSelect.appendChild(ctDefaultOpt);
        if (filterOptions && filterOptions.contentTypes) {
          for (var i = 0; i < filterOptions.contentTypes.length; i++) {
            var ct = filterOptions.contentTypes[i];
            var opt = document.createElement('option');
            opt.value = ct.value;
            opt.textContent = ct.label;
            if (urlState.contentType && urlState.contentType === ct.value) {
              opt.selected = true;
            }
            contentTypeSelect.appendChild(opt);
          }
        }
        contentTypeField.appendChild(contentTypeLabel);
        contentTypeField.appendChild(contentTypeSelect);

        var topicField = document.createElement('div');
        topicField.className = 'form-field form-field--topic';
        var topicLabel = document.createElement('label');
        topicLabel.setAttribute('for', 'filter-topic');
        topicLabel.textContent = 'Topic';
        var topicSelect = document.createElement('select');
        topicSelect.id = 'filter-topic';
        topicSelect.name = 'topic';
        var topicDefaultOpt = document.createElement('option');
        topicDefaultOpt.value = '';
        topicDefaultOpt.textContent = 'All topics';
        topicSelect.appendChild(topicDefaultOpt);
        if (filterOptions && filterOptions.topics) {
          for (var j = 0; j < filterOptions.topics.length; j++) {
            var t = filterOptions.topics[j];
            var topt = document.createElement('option');
            topt.value = t.value;
            topt.textContent = t.label;
            if (urlState.topic && urlState.topic === t.value) {
              topt.selected = true;
            }
            topicSelect.appendChild(topt);
          }
        }
        topicField.appendChild(topicLabel);
        topicField.appendChild(topicSelect);

        var regionField = document.createElement('div');
        regionField.className = 'form-field form-field--region';
        var regionLabel = document.createElement('label');
        regionLabel.setAttribute('for', 'filter-region');
        regionLabel.textContent = 'Region';
        var regionSelect = document.createElement('select');
        regionSelect.id = 'filter-region';
        regionSelect.name = 'region';
        var regionDefaultOpt = document.createElement('option');
        regionDefaultOpt.value = '';
        regionDefaultOpt.textContent = 'All regions';
        regionSelect.appendChild(regionDefaultOpt);
        if (filterOptions && filterOptions.regions) {
          for (var r = 0; r < filterOptions.regions.length; r++) {
            var reg = filterOptions.regions[r];
            var ropt = document.createElement('option');
            ropt.value = reg.value;
            ropt.textContent = reg.label;
            if (urlState.region && urlState.region === reg.value) {
              ropt.selected = true;
            }
            regionSelect.appendChild(ropt);
          }
        }
        regionField.appendChild(regionLabel);
        regionField.appendChild(regionSelect);

        var yearField = document.createElement('div');
        yearField.className = 'form-field form-field--min-year';
        var yearLabel = document.createElement('label');
        yearLabel.setAttribute('for', 'filter-min-year');
        yearLabel.textContent = 'From year';
        var yearInput = document.createElement('input');
        yearInput.id = 'filter-min-year';
        yearInput.name = 'minYear';
        yearInput.type = 'number';
        yearInput.inputMode = 'numeric';
        yearInput.placeholder = 'Any';
        if (urlState.minYear) {
          yearInput.value = String(urlState.minYear);
        }
        yearField.appendChild(yearLabel);
        yearField.appendChild(yearInput);

        var sortField = document.createElement('div');
        sortField.className = 'form-field form-field--sort';
        var sortLabel = document.createElement('label');
        sortLabel.setAttribute('for', 'sort-by');
        sortLabel.textContent = 'Sort by';
        var sortSelect = document.createElement('select');
        sortSelect.id = 'sort-by';
        sortSelect.name = 'sortBy';
        if (filterOptions && filterOptions.sortOptions) {
          for (var s = 0; s < filterOptions.sortOptions.length; s++) {
            var so = filterOptions.sortOptions[s];
            var sopt = document.createElement('option');
            sopt.value = so.value;
            sopt.textContent = so.label;
            if (urlState.sortBy && urlState.sortBy === so.value) {
              sopt.selected = true;
            }
            sortSelect.appendChild(sopt);
          }
        } else {
          var defaultSortOpt = document.createElement('option');
          defaultSortOpt.value = '';
          defaultSortOpt.textContent = 'Default';
          sortSelect.appendChild(defaultSortOpt);
        }
        sortField.appendChild(sortLabel);
        sortField.appendChild(sortSelect);

        var actionsField = document.createElement('div');
        actionsField.className = 'form-field form-field--actions';
        var clearButton = document.createElement('button');
        clearButton.type = 'button';
        clearButton.className = 'link-button clear-filters-button';
        clearButton.setAttribute('data-action', 'clearAllFilters');
        clearButton.textContent = 'Clear all filters';
        actionsField.appendChild(clearButton);

        form.appendChild(contentTypeField);
        form.appendChild(topicField);
        form.appendChild(regionField);
        form.appendChild(yearField);
        form.appendChild(sortField);
        form.appendChild(actionsField);

        wrapper.appendChild(form);
        container.appendChild(wrapper);
      }

      function renderActiveFilterChips(container, filterOptions, urlState) {
        container.innerHTML = '';

        var hasAny = false;
        var chipsWrapper = document.createElement('div');
        chipsWrapper.className = 'active-filters-chips-inner';

        var chipsList = document.createElement('div');
        chipsList.className = 'chips-list';

        if (urlState.contentType) {
          hasAny = true;
          var ctChip = document.createElement('button');
          ctChip.type = 'button';
          ctChip.className = 'chip';
          ctChip.setAttribute('data-action', 'removeFilterChip');
          ctChip.setAttribute('data-filter-key', 'contentType');
          var ctLabel = getLabelFromOptions(filterOptions && filterOptions.contentTypes, urlState.contentType) || urlState.contentType;
          ctChip.textContent = 'Content type: ' + ctLabel + ' d7';
          chipsList.appendChild(ctChip);
        }

        if (urlState.topic) {
          hasAny = true;
          var topicChip = document.createElement('button');
          topicChip.type = 'button';
          topicChip.className = 'chip';
          topicChip.setAttribute('data-action', 'removeFilterChip');
          topicChip.setAttribute('data-filter-key', 'topic');
          var tLabel = getLabelFromOptions(filterOptions && filterOptions.topics, urlState.topic) || urlState.topic;
          topicChip.textContent = 'Topic: ' + tLabel + ' d7';
          chipsList.appendChild(topicChip);
        }

        if (urlState.region) {
          hasAny = true;
          var regionChip = document.createElement('button');
          regionChip.type = 'button';
          regionChip.className = 'chip';
          regionChip.setAttribute('data-action', 'removeFilterChip');
          regionChip.setAttribute('data-filter-key', 'region');
          var rLabel = getLabelFromOptions(filterOptions && filterOptions.regions, urlState.region) || urlState.region;
          regionChip.textContent = 'Region: ' + rLabel + ' d7';
          chipsList.appendChild(regionChip);
        }

        if (urlState.minYear) {
          hasAny = true;
          var yearChip = document.createElement('button');
          yearChip.type = 'button';
          yearChip.className = 'chip';
          yearChip.setAttribute('data-action', 'removeFilterChip');
          yearChip.setAttribute('data-filter-key', 'minYear');
          yearChip.textContent = 'From year: ' + urlState.minYear + ' d7';
          chipsList.appendChild(yearChip);
        }

        if (!hasAny) {
          container.appendChild(chipsWrapper);
          return;
        }

        chipsWrapper.appendChild(chipsList);

        var clearAll = document.createElement('button');
        clearAll.type = 'button';
        clearAll.className = 'chips-clear-all link-button';
        clearAll.setAttribute('data-action', 'clearAllFilters');
        clearAll.textContent = 'Clear all';
        chipsWrapper.appendChild(clearAll);

        container.appendChild(chipsWrapper);
      }

      function renderResultsSummary(container, mediaResponse, urlState, filterOptions) {
        container.innerHTML = '';

        var totalResults = mediaResponse && mediaResponse.totalResults ? mediaResponse.totalResults : 0;
        var page = mediaResponse && mediaResponse.page ? mediaResponse.page : 1;
        var pageSize = mediaResponse && mediaResponse.pageSize ? mediaResponse.pageSize : 20;

        var start = totalResults === 0 ? 0 : (page - 1) * pageSize + 1;
        var end = Math.min(page * pageSize, totalResults);

        var summaryText = document.createElement('p');
        summaryText.className = 'results-summary-text';

        var baseText = '';
        if (totalResults === 0) {
          baseText = 'No media items found.';
        } else {
          baseText = 'Showing ' + start + 'a0d7 ' + end + ' of ' + totalResults + ' media items';
        }

        var sortLabelText = '';
        if (urlState.sortBy && filterOptions && filterOptions.sortOptions) {
          var sortLabel = getLabelFromOptions(filterOptions.sortOptions, urlState.sortBy);
          if (sortLabel) {
            sortLabelText = ' b7 Sorted by ' + sortLabel;
          }
        }

        summaryText.textContent = baseText + sortLabelText;
        container.appendChild(summaryText);
      }

      function renderMediaResults(container, mediaItems, filterOptions) {
        container.innerHTML = '';

        if (!mediaItems || mediaItems.length === 0) {
          var emptyDiv = document.createElement('div');
          emptyDiv.className = 'media-results-empty';
          emptyDiv.textContent = 'No media items match your current filters. Try changing or clearing the filters above.';
          container.appendChild(emptyDiv);
          return;
        }

        var grid = document.createElement('div');
        grid.className = 'media-results-grid';

        for (var i = 0; i < mediaItems.length; i++) {
          var item = mediaItems[i];
          var card = document.createElement('article');
          card.className = 'media-card';
          card.setAttribute('tabindex', '0');
          card.setAttribute('role', 'button');
          card.setAttribute('data-action', 'openMediaItem');
          card.setAttribute('data-media-id', item.id);

          if (item.thumbnail_image) {
            var thumbWrapper = document.createElement('div');
            thumbWrapper.className = 'media-card-thumb';
            var img = document.createElement('img');
            img.src = item.thumbnail_image;
            img.alt = item.title || 'Media thumbnail';
            thumbWrapper.appendChild(img);
            card.appendChild(thumbWrapper);
          }

          var body = document.createElement('div');
          body.className = 'media-card-body';

          var titleEl = document.createElement('h2');
          titleEl.className = 'media-card-title';
          titleEl.textContent = item.title || 'Untitled media item';
          body.appendChild(titleEl);

          var metaLine = document.createElement('p');
          metaLine.className = 'media-card-meta';

          var parts = [];
          if (item.content_type) {
            var ctLabel = getLabelFromOptions(filterOptions && filterOptions.contentTypes, item.content_type) || item.content_type;
            parts.push(ctLabel);
          }
          if (item.topic) {
            var topicLabel = getLabelFromOptions(filterOptions && filterOptions.topics, item.topic) || item.topic;
            parts.push(topicLabel);
          }
          if (item.region) {
            var regionLabel = getLabelFromOptions(filterOptions && filterOptions.regions, item.region) || item.region;
            parts.push(regionLabel);
          }

          var durationText = formatDuration(item.length_seconds);
          if (durationText) {
            parts.push(durationText);
          }
          var year = getYearFromMediaItem(item);
          if (year) {
            parts.push(String(year));
          }

          metaLine.textContent = parts.join(' b7 ');
          body.appendChild(metaLine);

          if (item.description) {
            var desc = document.createElement('p');
            desc.className = 'media-card-description';
            var text = String(item.description);
            if (text.length > 220) {
              text = text.slice(0, 217) + '...';
            }
            desc.textContent = text;
            body.appendChild(desc);
          }

          card.appendChild(body);
          grid.appendChild(card);
        }

        container.appendChild(grid);
      }

      function renderPagination(container, totalResults, page, pageSize) {
        container.innerHTML = '';

        if (!totalResults || totalResults <= pageSize) {
          container.removeAttribute('data-total-pages');
          return;
        }

        var totalPages = Math.ceil(totalResults / pageSize);
        container.setAttribute('data-total-pages', String(totalPages));

        var nav = document.createElement('nav');
        nav.className = 'pagination-nav';
        nav.setAttribute('aria-label', 'Media library pages');

        var prevButton = document.createElement('button');
        prevButton.type = 'button';
        prevButton.className = 'pagination-button pagination-prev';
        prevButton.setAttribute('data-action', 'prevPage');
        prevButton.textContent = 'Previous';
        if (page <= 1) {
          prevButton.disabled = true;
        }
        nav.appendChild(prevButton);

        var pagesList = document.createElement('ol');
        pagesList.className = 'pagination-pages';

        var maxPagesToShow = 7;
        var startPage = Math.max(1, page - 3);
        var endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);
        if (endPage - startPage + 1 < maxPagesToShow) {
          startPage = Math.max(1, endPage - maxPagesToShow + 1);
        }

        for (var p = startPage; p <= endPage; p++) {
          var li = document.createElement('li');
          li.className = 'pagination-page-item';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'pagination-button pagination-page';
          btn.setAttribute('data-action', 'gotoPage');
          btn.setAttribute('data-page', String(p));
          btn.textContent = String(p);
          if (p === page) {
            btn.className += ' is-current';
            btn.setAttribute('aria-current', 'page');
          }
          li.appendChild(btn);
          pagesList.appendChild(li);
        }

        nav.appendChild(pagesList);

        var nextButton = document.createElement('button');
        nextButton.type = 'button';
        nextButton.className = 'pagination-button pagination-next';
        nextButton.setAttribute('data-action', 'nextPage');
        nextButton.textContent = 'Next';
        if (page >= totalPages) {
          nextButton.disabled = true;
        }
        nav.appendChild(nextButton);

        container.appendChild(nav);
      }

      function createMediaLibraryStateManager() {
        var PAGE_SIZE = 20;
        var filterOptions = null;

        function updateUrlState(partial) {
          var url = new URL(window.location.href);
          var params = url.searchParams;

          for (var key in partial) {
            if (Object.prototype.hasOwnProperty.call(partial, key)) {
              var value = partial[key];
              if (value === null || value === undefined || value === '') {
                params.delete(key);
              } else {
                params.set(key, String(value));
              }
            }
          }

          if (partial.contentType !== undefined || partial.topic !== undefined || partial.region !== undefined || partial.minYear !== undefined || partial.sortBy !== undefined) {
            params.set('page', '1');
          }

          var newUrl = url.pathname + (params.toString() ? '?' + params.toString() : '');
          window.history.pushState({}, '', newUrl);

          var rootContainer = document.querySelector('[data-populate="media-library"]');
          if (rootContainer) {
            handleUrlChange(rootContainer);
          }
        }

        function fetchMedia(state) {
          var filters = buildFiltersFromState(state);
          var response = WebsiteSDK.listMediaItems(filters, state.sortBy || undefined, state.page || 1, PAGE_SIZE);
          return response;
        }

        function renderAll(rootContainer) {
          var state = parseUrlState();
          var mediaResponse;
          try {
            mediaResponse = fetchMedia(state);
          } catch (e) {
            showError(rootContainer, 'We were unable to load media items. Please try again later.');
            return;
          }

          var toolbar = rootContainer.querySelector('[data-component="filters-and-sort-toolbar"]');
          if (toolbar) {
            renderFiltersAndSort(toolbar, filterOptions, state);
          }

          var chips = rootContainer.querySelector('[data-component="active-filters-chips"]');
          if (chips) {
            renderActiveFilterChips(chips, filterOptions, state);
          }

          var summary = rootContainer.querySelector('[data-component="results-summary-bar"]');
          if (summary) {
            renderResultsSummary(summary, mediaResponse, state, filterOptions);
          }

          var list = rootContainer.querySelector('[data-component="media-results-list"]');
          if (list) {
            renderMediaResults(list, mediaResponse.mediaItems || [], filterOptions);
          }

          var pagination = rootContainer.querySelector('[data-component="pagination-controls"]');
          if (pagination) {
            renderPagination(pagination, mediaResponse.totalResults || 0, mediaResponse.page || 1, mediaResponse.pageSize || PAGE_SIZE);
          }
        }

        function handleUrlChange(rootContainer) {
          renderAll(rootContainer);
        }

        function setupEventHandlers(rootContainer) {
          window.addEventListener('popstate', function() {
            var container = document.querySelector('[data-populate="media-library"]');
            if (container) {
              handleUrlChange(container);
            }
          });

          var toolbar = rootContainer.querySelector('[data-component="filters-and-sort-toolbar"]');
          if (toolbar) {
            toolbar.addEventListener('change', function(event) {
              var target = event.target;
              if (!target || !target.name) {
                return;
              }
              if (target.name === 'contentType') {
                updateUrlState({ contentType: target.value || null });
              } else if (target.name === 'topic') {
                updateUrlState({ topic: target.value || null });
              } else if (target.name === 'region') {
                updateUrlState({ region: target.value || null });
              } else if (target.name === 'minYear') {
                var val = target.value.trim();
                if (!val) {
                  updateUrlState({ minYear: null });
                } else {
                  var parsed = parseInt(val, 10);
                  if (!isNaN(parsed)) {
                    updateUrlState({ minYear: parsed });
                  }
                }
              } else if (target.name === 'sortBy') {
                updateUrlState({ sortBy: target.value || null });
              }
            });

            toolbar.addEventListener('click', function(event) {
              var button = event.target.closest('[data-action]');
              if (!button) {
                return;
              }
              var action = button.getAttribute('data-action');
              if (action === 'clearAllFilters') {
                updateUrlState({
                  contentType: null,
                  topic: null,
                  region: null,
                  minYear: null,
                  sortBy: null
                });
              }
            });
          }

          var chips = rootContainer.querySelector('[data-component="active-filters-chips"]');
          if (chips) {
            chips.addEventListener('click', function(event) {
              var button = event.target.closest('[data-action]');
              if (!button) {
                return;
              }
              var action = button.getAttribute('data-action');
              if (action === 'removeFilterChip') {
                var key = button.getAttribute('data-filter-key');
                if (key === 'contentType') {
                  updateUrlState({ contentType: null });
                } else if (key === 'topic') {
                  updateUrlState({ topic: null });
                } else if (key === 'region') {
                  updateUrlState({ region: null });
                } else if (key === 'minYear') {
                  updateUrlState({ minYear: null });
                }
              } else if (action === 'clearAllFilters') {
                updateUrlState({
                  contentType: null,
                  topic: null,
                  region: null,
                  minYear: null,
                  sortBy: null
                });
              }
            });
          }

          var pagination = rootContainer.querySelector('[data-component="pagination-controls"]');
          if (pagination) {
            pagination.addEventListener('click', function(event) {
              var button = event.target.closest('[data-action]');
              if (!button) {
                return;
              }
              var action = button.getAttribute('data-action');
              var state = parseUrlState();
              var currentPage = state.page || 1;
              if (action === 'prevPage') {
                if (currentPage > 1) {
                  updateUrlState({ page: currentPage - 1 });
                }
              } else if (action === 'nextPage') {
                var totalPagesStr = pagination.getAttribute('data-total-pages') || '1';
                var totalPages = parseInt(totalPagesStr, 10);
                if (isNaN(totalPages) || totalPages < 1) {
                  totalPages = 1;
                }
                if (currentPage < totalPages) {
                  updateUrlState({ page: currentPage + 1 });
                }
              } else if (action === 'gotoPage') {
                var pageStr = button.getAttribute('data-page');
                var pageNum = parseInt(pageStr || '1', 10);
                if (!isNaN(pageNum) && pageNum !== currentPage) {
                  updateUrlState({ page: pageNum });
                }
              }
            });
          }

          var resultsList = rootContainer.querySelector('[data-component="media-results-list"]');
          if (resultsList) {
            resultsList.addEventListener('click', function(event) {
              var target = event.target.closest('[data-action="openMediaItem"]');
              if (!target) {
                return;
              }
              var id = target.getAttribute('data-media-id');
              if (!id) {
                return;
              }
              window.location.href = 'media_item.html?mediaItemId=' + encodeURIComponent(id);
            });

            resultsList.addEventListener('keydown', function(event) {
              if (event.key !== 'Enter' && event.key !== ' ') {
                return;
              }
              var target = event.target.closest('[data-action="openMediaItem"]');
              if (!target) {
                return;
              }
              var id = target.getAttribute('data-media-id');
              if (!id) {
                return;
              }
              event.preventDefault();
              window.location.href = 'media_item.html?mediaItemId=' + encodeURIComponent(id);
            });
          }
        }

        function init(rootContainer) {
          try {
            filterOptions = WebsiteSDK.getMediaFilterOptions();
          } catch (e) {
            showError(rootContainer, 'We were unable to load media filters. Please try again later.');
            return;
          }

          renderAll(rootContainer);
          setupEventHandlers(rootContainer);
        }

        return {
          init: init
        };
      }

      document.addEventListener('DOMContentLoaded', function() {
        var populateElements = document.querySelectorAll('[data-populate]');
        Array.prototype.forEach.call(populateElements, function(element) {
          var dataType = element.getAttribute('data-populate');
          if (dataType === 'media-library') {
            var manager = createMediaLibraryStateManager();
            manager.init(element);
          }
        });
      });
    })();
  </script>
</body>
</html>
