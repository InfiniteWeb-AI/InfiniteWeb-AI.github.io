<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Indigenous Cultures – Site Framework</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500&amp;display=swap' rel='stylesheet'>

  <!-- Main stylesheet -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Event detail page stylesheet -->
  <link rel='stylesheet' href='event.css'>
</head>
<body>
  <header class='site-header' role='banner'>
    <div class='site-header-inner'>
      <nav class='primary-nav' aria-label='Primary'>
        <ul class='primary-nav-list'>
          <li class='primary-nav-item'>
            <a href='index.html' class='primary-nav-link' data-description='Homepage with featured Indigenous content and global search.'>Home</a>
          </li>
          <li class='primary-nav-item'>
            <a href='map.html' class='primary-nav-link' data-description='Interactive map for exploring Indigenous communities by region.'>World Cultures Map</a>
          </li>
          <li class='primary-nav-item'>
            <a href='educator_resources.html' class='primary-nav-link' data-description='Classroom activities and teaching materials on Indigenous topics.'>Educator Resources</a>
          </li>
          <li class='primary-nav-item'>
            <a href='timelines.html' class='primary-nav-link' data-description='Historical and thematic timelines related to Indigenous histories.'>Timelines</a>
          </li>
          <li class='primary-nav-item'>
            <a href='media_library.html' class='primary-nav-link' data-description='Browse audio, video, and other media about Indigenous cultures.'>Media Library</a>
          </li>
          <li class='primary-nav-item'>
            <a href='glossary.html' class='primary-nav-link' data-description='Definitions of key Indigenous studies terms and concepts.'>Glossary</a>
          </li>
          <li class='primary-nav-item'>
            <a href='events.html' class='primary-nav-link' data-description='Calendar and listings for Indigenous-related events and programs.'>Events</a>
          </li>
          <li class='primary-nav-item'>
            <a href='quizzes.html' class='primary-nav-link' data-description='Learning quizzes and assessments on Indigenous topics.'>Quizzes</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-main' role='main'>
    <div class='event-detail-page'>
      <div class='event-detail-page-inner'>
        <!-- Breadcrumb navigation -->
        <nav class='breadcrumb-nav' aria-label='Breadcrumb' data-component='event-breadcrumb-navigation'>
          <div class='breadcrumb-inner' data-populate='event-breadcrumb'></div>
        </nav>

        <!-- Loader / skeleton -->
        <div class='event-detail-loader' data-component='event-detail-data-loader' aria-live='polite' aria-busy='true' hidden>
          <div class='loader-skeleton loader-title'></div>
          <div class='loader-skeleton loader-meta'></div>
          <div class='loader-skeleton loader-paragraph'></div>
        </div>

        <!-- Error & empty state -->
        <section class='event-error-state' data-component='event-error-and-empty-state' hidden>
          <div class='event-error-inner'>
            <h1 class='event-error-title'>Event details unavailable</h1>
            <div class='event-error-message' data-populate='event-error-message'></div>
            <div class='event-error-actions'>
              <button type='button' class='button-secondary' data-action='retry-load-event'>Retry</button>
              <button type='button' class='button-primary' data-action='back-to-events-from-error'>Back to Events</button>
            </div>
          </div>
        </section>

        <!-- Event summary header (title + meta + save control) -->
        <section class='event-summary-header-section' data-component='event-summary-header'>
          <div class='event-summary-header-inner' data-populate='event-summary'></div>
        </section>

        <!-- Schedule & access information -->
        <section class='event-schedule-section' data-component='event-schedule-and-access'>
          <div class='event-schedule-inner' data-populate='event-schedule'></div>
        </section>

        <!-- Description / body -->
        <section class='event-description-section' data-component='event-description-section'>
          <header class='section-header'>
            <h2 class='section-title'>Description</h2>
          </header>
          <div class='event-description-body' data-populate='event-description'></div>
        </section>

        <!-- My Events context summary -->
        <section class='my-events-context-section' data-component='my-events-context-summary'>
          <div class='my-events-context-inner' data-populate='my-events-summary'></div>
        </section>

        <!-- Related navigation (back to events, more in category/region) -->
        <section class='event-related-navigation-section' data-component='event-related-navigation'>
          <div class='event-related-navigation-inner' data-populate='event-related-nav'></div>
        </section>
      </div>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='site-footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='index.html' class='footer-nav-link' data-description='Return to the homepage.'>Home</a>
          </li>
          <li class='footer-nav-item'>
            <a href='educator_resources.html' class='footer-nav-link' data-description='Access teaching resources and classroom activities.'>Educator Resources</a>
          </li>
          <li class='footer-nav-item'>
            <a href='media_library.html' class='footer-nav-link' data-description='Explore audio and video collections.'>Media Library</a>
          </li>
          <li class='footer-nav-item'>
            <a href='timelines.html' class='footer-nav-link' data-description='View historical timelines.'>Timelines</a>
          </li>
          <li class='footer-nav-item'>
            <a href='glossary.html' class='footer-nav-link' data-description='Look up key terms and concepts.'>Glossary</a>
          </li>
        </ul>
      </nav>
      <p class='site-footer-meta'>&copy; <span class='site-footer-year'>2026</span> Indigenous Cultures Information Site.</p>
    </div>
  </footer>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>
  <script>
    (function() {
      'use strict';

      function escapeHtml(str) {
        if (!str && str !== 0) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatRegion(region) {
        if (!region) return '';
        var parts = String(region).split('_');
        for (var i = 0; i < parts.length; i++) {
          if (!parts[i]) continue;
          parts[i] = parts[i].charAt(0).toUpperCase() + parts[i].slice(1);
        }
        return parts.join(' ');
      }

      function deriveMonthToken(isoString) {
        if (!isoString) return null;
        var date = new Date(isoString);
        if (isNaN(date.getTime())) return null;
        var year = date.getUTCFullYear();
        var month = String(date.getUTCMonth() + 1).padStart(2, '0');
        return year + '-' + month; // e.g., 2026-03
      }

      function buildEventsUrl(options) {
        var params = new URLSearchParams();
        if (options && options.month) {
          params.set('month', options.month);
        }
        if (options && options.category) {
          params.set('category', options.category);
        }
        if (options && options.region) {
          params.set('region', options.region);
        }
        var qs = params.toString();
        return qs ? ('events.html?' + qs) : 'events.html';
      }

      document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var eventId = urlParams.get('eventId');
        var initialMonth = urlParams.get('month');
        var initialCategory = urlParams.get('category');

        var state = {
          urlParams: {
            eventId: eventId || null,
            month: initialMonth || null,
            category: initialCategory || null
          },
          eventDetail: null, // { event, categoryLabel, eventTypeLabel, dateDisplay, timeDisplay, isInMyEvents }
          isInMyEvents: false,
          loadingEvent: false,
          eventError: null, // 'missing_id' | 'not_found' | 'load_failed'
          loadingMyEvents: false,
          myEventsContext: null, // { myEvents, items: [ { myEventItem, event } ] }
          myEventsError: null // null | 'load_failed' | 'empty_or_missing'
        };

        var loaderEl = document.querySelector('[data-component="event-detail-data-loader"]');
        var errorSectionEl = document.querySelector('[data-component="event-error-and-empty-state"]');
        var errorMessageContainer = document.querySelector('[data-populate="event-error-message"]');
        var breadcrumbContainer = document.querySelector('[data-populate="event-breadcrumb"]');
        var summaryContainer = document.querySelector('[data-populate="event-summary"]');
        var scheduleContainer = document.querySelector('[data-populate="event-schedule"]');
        var descriptionContainer = document.querySelector('[data-populate="event-description"]');
        var myEventsSummaryContainer = document.querySelector('[data-populate="my-events-summary"]');
        var relatedNavContainer = document.querySelector('[data-populate="event-related-nav"]');

        var breadcrumbSection = document.querySelector('[data-component="event-breadcrumb-navigation"]');
        var summarySection = document.querySelector('[data-component="event-summary-header"]');
        var scheduleSection = document.querySelector('[data-component="event-schedule-and-access"]');
        var descriptionSection = document.querySelector('[data-component="event-description-section"]');
        var myEventsSection = document.querySelector('[data-component="my-events-context-summary"]');
        var relatedNavSection = document.querySelector('[data-component="event-related-navigation"]');

        function setSectionsVisibility(showContent) {
          if (breadcrumbSection) breadcrumbSection.hidden = !showContent;
          if (summarySection) summarySection.hidden = !showContent;
          if (scheduleSection) scheduleSection.hidden = !showContent;
          if (descriptionSection) descriptionSection.hidden = !showContent;
          if (myEventsSection) myEventsSection.hidden = !showContent;
          if (relatedNavSection) relatedNavSection.hidden = !showContent;
        }

        function renderLoader() {
          if (!loaderEl) return;
          if (state.loadingEvent) {
            loaderEl.hidden = false;
            loaderEl.setAttribute('aria-busy', 'true');
          } else {
            loaderEl.hidden = true;
            loaderEl.setAttribute('aria-busy', 'false');
          }
        }

        function renderError() {
          if (!errorSectionEl || !errorMessageContainer) return;

          if (!state.eventError) {
            errorSectionEl.hidden = true;
            errorMessageContainer.innerHTML = '';
            return;
          }

          var message = '';
          if (state.eventError === 'missing_id') {
            message = 'We could not determine which event to display because an event identifier was not provided.';
          } else if (state.eventError === 'not_found') {
            message = 'The event you tried to view could not be found. It may have been removed or is temporarily unavailable.';
          } else {
            message = 'We were unable to load this event right now. Please check your connection and try again.';
          }

          errorMessageContainer.innerHTML = '<p>' + escapeHtml(message) + '</p>';
          errorSectionEl.hidden = false;
        }

        function renderBreadcrumb(container) {
          if (!container) return;
          if (!state.eventDetail || state.eventError) {
            container.innerHTML = '';
            return;
          }
          var eventObj = state.eventDetail.event || {};
          var title = escapeHtml(eventObj.title || 'Event');
          container.innerHTML = '' +
            '<ol class="breadcrumb-list">' +
              '<li class="breadcrumb-item">' +
                '<a href="javascript:void(0)" data-action="breadcrumb-events">Events &amp; Calendar</a>' +
              '</li>' +
              '<li class="breadcrumb-item">' +
                '<span aria-current="page">' + title + '</span>' +
              '</li>' +
            '</ol>';
        }

        function renderEventSummary(container) {
          if (!container) return;
          if (!state.eventDetail || state.eventError) {
            container.innerHTML = '';
            return;
          }
          var detail = state.eventDetail;
          var eventObj = detail.event || {};
          var title = escapeHtml(eventObj.title || 'Event');
          var categoryLabel = escapeHtml(detail.categoryLabel || '');
          var eventTypeLabel = escapeHtml(detail.eventTypeLabel || '');
          var regionLabel = formatRegion(eventObj.region);
          var metaPieces = [];
          if (categoryLabel) metaPieces.push(categoryLabel);
          if (eventTypeLabel) metaPieces.push(eventTypeLabel);
          if (regionLabel) metaPieces.push(regionLabel);
          var metaLine = metaPieces.join(' b7 ');

          var buttonLabel;
          var buttonClass;
          var buttonAttributes = '';

          if (state.isInMyEvents || detail.isInMyEvents) {
            buttonLabel = 'Saved in My Events';
            buttonClass = 'button-secondary button-saved';
            buttonAttributes = ' aria-pressed="true" disabled';
          } else {
            buttonLabel = 'Save to My Events';
            buttonClass = 'button-primary';
            buttonAttributes = '';
          }

          var dateSnippet = '';
          if (detail.dateDisplay) {
            dateSnippet += '<span class="event-summary-date">' + escapeHtml(detail.dateDisplay) + '</span>';
          }
          if (detail.timeDisplay) {
            if (dateSnippet) dateSnippet += ' b7 ';
            dateSnippet += '<span class="event-summary-time">' + escapeHtml(detail.timeDisplay) + '</span>';
          }

          container.innerHTML = '' +
            '<div class="event-summary-layout">' +
              '<div class="event-summary-text">' +
                (metaLine ? '<p class="event-summary-meta">' + metaLine + '</p>' : '') +
                '<h1 class="event-title">' + title + '</h1>' +
                (dateSnippet ? '<p class="event-summary-datetime">' + dateSnippet + '</p>' : '') +
              '</div>' +
              '<div class="event-save-control" data-component="event-save-control">' +
                '<button type="button" class="' + buttonClass + '" data-action="save-event"' + buttonAttributes + '>' + escapeHtml(buttonLabel) + '</button>' +
              '</div>' +
            '</div>';
        }

        function renderSchedule(container) {
          if (!container) return;
          if (!state.eventDetail || state.eventError) {
            container.innerHTML = '';
            return;
          }
          var detail = state.eventDetail;
          var eventObj = detail.event || {};

          var dateLine = '';
          if (detail.dateDisplay) {
            dateLine += '<div class="schedule-row"><span class="schedule-label">Date</span><span class="schedule-value">' + escapeHtml(detail.dateDisplay) + '</span></div>';
          }
          if (detail.timeDisplay) {
            var timeValue = escapeHtml(detail.timeDisplay);
            if (eventObj.timezone) {
              timeValue += ' <span class="schedule-timezone">(' + escapeHtml(eventObj.timezone) + ')</span>';
            }
            dateLine += '<div class="schedule-row"><span class="schedule-label">Time</span><span class="schedule-value">' + timeValue + '</span></div>';
          }

          var locationBlock = '';
          if (eventObj.location && (eventObj.event_type === 'in_person' || eventObj.event_type === 'hybrid')) {
            locationBlock += '<div class="schedule-row"><span class="schedule-label">Location</span><span class="schedule-value">' + escapeHtml(eventObj.location) + '</span></div>';
          }

          var virtualBlock = '';
          if ((eventObj.event_type === 'virtual_online' || eventObj.event_type === 'hybrid') && eventObj.virtual_access_details) {
            virtualBlock += '' +
              '<div class="schedule-row virtual-access" data-event-type="' + escapeHtml(eventObj.event_type) + '">' +
                '<span class="schedule-label">Online access</span>' +
                '<span class="schedule-value">' +
                  '<button type="button" class="text-button" data-action="toggle-virtual-access" aria-expanded="false">Show access details</button>' +
                  '<div class="virtual-access-details" hidden>' +
                    '<p>' + escapeHtml(eventObj.virtual_access_details) + '</p>' +
                  '</div>' +
                '</span>' +
              '</div>';
          }

          var regionLine = '';
          var regionLabel = formatRegion(eventObj.region);
          if (regionLabel) {
            regionLine = '<div class="schedule-row"><span class="schedule-label">Region</span><span class="schedule-value">' + escapeHtml(regionLabel) + '</span></div>';
          }

          container.innerHTML = '' +
            '<div class="event-schedule-layout">' +
              '<div class="schedule-column schedule-column-left">' +
                (dateLine || '') +
              '</div>' +
              '<div class="schedule-column schedule-column-right">' +
                (locationBlock || '') +
                virtualBlock +
                regionLine +
              '</div>' +
            '</div>';
        }

        function renderDescription(container) {
          if (!container) return;
          if (!state.eventDetail || state.eventError) {
            container.innerHTML = '<p>This event description will appear here once the event details are available.</p>';
            return;
          }
          var eventObj = state.eventDetail.event || {};
          var description = eventObj.description;
          if (!description) {
            container.innerHTML = '<p>No additional description has been provided for this event.</p>';
            return;
          }
          container.innerHTML = '<p>' + escapeHtml(description) + '</p>';
        }

        function renderMyEventsSummary(container) {
          if (!container) return;

          if (state.eventError) {
            container.innerHTML = '';
            return;
          }

          var loadingNote = '';
          if (state.loadingMyEvents) {
            loadingNote = '<p class="my-events-loading">Checking your saved eventsbf</p>';
          }

          if (state.myEventsError === 'load_failed') {
            container.innerHTML = '' +
              (loadingNote || '') +
              '<div class="my-events-message my-events-error">' +
                '<p>We could not load your My Events list right now.</p>' +
                '<button type="button" class="text-button" data-action="retry-load-my-events">Retry loading My Events</button>' +
              '</div>';
            return;
          }

          var items = (state.myEventsContext && state.myEventsContext.items) ? state.myEventsContext.items : [];
          var count = items.length;
          var eventIsSaved = false;
          var currentEventId = state.urlParams.eventId;

          if (currentEventId && items && items.length) {
            for (var i = 0; i < items.length; i++) {
              var it = items[i];
              if (!it) continue;
              if (it.event && it.event.id === currentEventId) {
                eventIsSaved = true;
                break;
              }
              if (it.myEventItem && it.myEventItem.event_id === currentEventId) {
                eventIsSaved = true;
                break;
              }
            }
          }

          if (!state.myEventsContext) {
            var msg = '' +
              '<div class="my-events-message">' +
                '<p>You have not started a My Events list yet. When you save events, they will appear in your personal list in this browser.</p>' +
              '</div>';
            container.innerHTML = loadingNote ? (loadingNote + msg) : msg;
            return;
          }

          var summaryText = '';
          if (count === 0) {
            summaryText = 'You do not have any events saved in My Events yet.';
          } else if (count === 1) {
            summaryText = 'You have 1 event saved in My Events.';
          } else {
            summaryText = 'You have ' + count + ' events saved in My Events.';
          }

          var inclusionText = '';
          if (currentEventId) {
            if (eventIsSaved || state.isInMyEvents || (state.eventDetail && state.eventDetail.isInMyEvents)) {
              inclusionText = 'This event is included in your saved list.';
            } else if (count > 0) {
              inclusionText = 'This event is not yet in your saved list.';
            }
          }

          var html = '' +
            (loadingNote || '') +
            '<div class="my-events-message">' +
              '<p>' + escapeHtml(summaryText) + '</p>' +
              (inclusionText ? '<p>' + escapeHtml(inclusionText) + '</p>' : '') +
            '</div>';

          container.innerHTML = html;
        }

        function renderRelatedNavigation(container) {
          if (!container) return;
          if (!state.eventDetail || state.eventError) {
            container.innerHTML = '';
            return;
          }
          var detail = state.eventDetail;
          var eventObj = detail.event || {};
          var categoryLabel = detail.categoryLabel || '';
          var regionLabel = formatRegion(eventObj.region);

          var moreCategoryLabel = categoryLabel ? ('More events in ' + categoryLabel) : 'More events in this category';
          var moreRegionLabel = regionLabel ? ('More events in ' + regionLabel) : 'More events in this region';

          var html = '' +
            '<div class="event-related-nav-layout">' +
              '<h2 class="section-title">Explore more events</h2>' +
              '<div class="event-related-links">' +
                '<a href="javascript:void(0)" class="link-primary" data-action="back-to-events">Back to Events &amp; Calendar</a>' +
                (categoryLabel ? '<a href="javascript:void(0)" class="link-secondary" data-action="more-in-category">' + escapeHtml(moreCategoryLabel) + '</a>' : '') +
                (regionLabel ? '<a href="javascript:void(0)" class="link-secondary" data-action="more-in-region">' + escapeHtml(moreRegionLabel) + '</a>' : '') +
              '</div>' +
            '</div>';

          container.innerHTML = html;
        }

        function renderAll() {
          renderLoader();

          if (state.eventError) {
            setSectionsVisibility(false);
            renderError();
            return;
          }

          if (errorSectionEl) {
            errorSectionEl.hidden = true;
          }

          setSectionsVisibility(true);
          renderBreadcrumb(breadcrumbContainer);
          renderEventSummary(summaryContainer);
          renderSchedule(scheduleContainer);
          renderDescription(descriptionContainer);
          renderMyEventsSummary(myEventsSummaryContainer);
          renderRelatedNavigation(relatedNavContainer);
        }

        function loadEventDetail() {
          if (!state.urlParams.eventId) {
            state.eventError = 'missing_id';
            state.eventDetail = null;
            state.isInMyEvents = false;
            state.loadingEvent = false;
            renderAll();
            return;
          }

          state.loadingEvent = true;
          state.eventError = null;
          renderAll();

          try {
            var result = WebsiteSDK.getEventDetail(state.urlParams.eventId);
            if (!result || !result.event) {
              state.eventError = 'not_found';
              state.eventDetail = null;
              state.isInMyEvents = false;
            } else {
              state.eventDetail = result;
              state.isInMyEvents = !!result.isInMyEvents;
              state.eventError = null;
            }
          } catch (e) {
            console.error('Error loading event detail:', e);
            state.eventError = 'load_failed';
            state.eventDetail = null;
            state.isInMyEvents = false;
          } finally {
            state.loadingEvent = false;
            renderAll();
            if (!state.eventError) {
              loadMyEventsDetail();
            }
          }
        }

        function loadMyEventsDetail() {
          state.loadingMyEvents = true;
          state.myEventsError = null;
          renderMyEventsSummary(myEventsSummaryContainer);
          try {
            var result = WebsiteSDK.getMyEventsDetail();
            if (result && result.myEvents) {
              state.myEventsContext = result;
              state.myEventsError = null;
            } else {
              state.myEventsContext = null;
              state.myEventsError = 'empty_or_missing';
            }
          } catch (e) {
            console.error('Error loading My Events detail:', e);
            state.myEventsContext = null;
            state.myEventsError = 'load_failed';
          } finally {
            state.loadingMyEvents = false;
            renderMyEventsSummary(myEventsSummaryContainer);
          }
        }

        function navigateBackToEvents() {
          var month = state.urlParams.month;
          var category = state.urlParams.category;

          if (!month || !category) {
            if (state.eventDetail && state.eventDetail.event) {
              var eventObj = state.eventDetail.event;
              if (!month) {
                month = deriveMonthToken(eventObj.start_datetime);
              }
              if (!category && eventObj.category) {
                category = eventObj.category; // enum value
              }
            }
          }

          var url = buildEventsUrl({ month: month, category: category });
          window.location.href = url;
        }

        function navigateMoreInCategory() {
          if (!state.eventDetail || !state.eventDetail.event) return;
          var eventObj = state.eventDetail.event;
          var month = state.urlParams.month || deriveMonthToken(eventObj.start_datetime);
          var category = eventObj.category || state.urlParams.category || null;
          var url = buildEventsUrl({ month: month, category: category });
          window.location.href = url;
        }

        function navigateMoreInRegion() {
          if (!state.eventDetail || !state.eventDetail.event) return;
          var eventObj = state.eventDetail.event;
          var month = state.urlParams.month || deriveMonthToken(eventObj.start_datetime);
          var category = state.urlParams.category || eventObj.category || null;
          var region = eventObj.region || null;
          var url = buildEventsUrl({ month: month, category: category, region: region });
          window.location.href = url;
        }

        function handleSaveEvent() {
          if (!state.urlParams.eventId) return;
          if (state.isInMyEvents || (state.eventDetail && state.eventDetail.isInMyEvents)) {
            return;
          }
          try {
            var result = WebsiteSDK.saveEventToMyEvents(state.urlParams.eventId);
            if (result) {
              state.isInMyEvents = true;
              if (state.eventDetail) {
                state.eventDetail.isInMyEvents = true;
              }
              renderEventSummary(summaryContainer);
              loadMyEventsDetail();
            }
          } catch (e) {
            console.error('Error saving event to My Events:', e);
            alert('We were not able to save this event to My Events. Please try again.');
          }
        }

        function handleToggleVirtualAccess(buttonEl) {
          if (!buttonEl) return;
          var row = buttonEl.closest('.virtual-access');
          if (!row) return;
          var details = row.querySelector('.virtual-access-details');
          if (!details) return;
          var isHidden = details.hasAttribute('hidden');
          if (isHidden) {
            details.removeAttribute('hidden');
            buttonEl.setAttribute('aria-expanded', 'true');
            buttonEl.textContent = 'Hide access details';
          } else {
            details.setAttribute('hidden', '');
            buttonEl.setAttribute('aria-expanded', 'false');
            buttonEl.textContent = 'Show access details';
          }
        }

        document.addEventListener('click', function(evt) {
          var target = evt.target;
          if (!target) return;
          var actionEl = target.closest('[data-action]');
          if (!actionEl) return;

          var action = actionEl.getAttribute('data-action');
          if (!action) return;

          if (action === 'breadcrumb-events') {
            evt.preventDefault();
            navigateBackToEvents();
          } else if (action === 'back-to-events' || action === 'back-to-events-from-error') {
            evt.preventDefault();
            navigateBackToEvents();
          } else if (action === 'more-in-category') {
            evt.preventDefault();
            navigateMoreInCategory();
          } else if (action === 'more-in-region') {
            evt.preventDefault();
            navigateMoreInRegion();
          } else if (action === 'save-event') {
            evt.preventDefault();
            handleSaveEvent();
          } else if (action === 'retry-load-event') {
            evt.preventDefault();
            state.eventError = null;
            loadEventDetail();
          } else if (action === 'retry-load-my-events') {
            evt.preventDefault();
            state.myEventsError = null;
            loadMyEventsDetail();
          } else if (action === 'toggle-virtual-access') {
            evt.preventDefault();
            handleToggleVirtualAccess(actionEl);
          }
        });

        // Initial load
        loadEventDetail();
      });
    })();
  </script>
</body>
</html>
