<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Indigenous Cultures – Timelines</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <meta name='description' content='Browse and filter historical and cultural timelines related to Indigenous histories.'>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Source+Code+Pro:wght@400;500&amp;display=swap' rel='stylesheet'>

  <!-- Main stylesheet -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Timelines page stylesheet -->
  <link rel='stylesheet' href='timelines.css'>
</head>
<body>
  <header class='site-header' role='banner'>
    <div class='site-header-inner'>
      <nav class='primary-nav' aria-label='Primary'>
        <ul class='primary-nav-list'>
          <li class='primary-nav-item'>
            <a href='index.html' class='primary-nav-link' data-description='Homepage with featured Indigenous content and global search.'>Home</a>
          </li>
          <li class='primary-nav-item'>
            <a href='map.html' class='primary-nav-link' data-description='Interactive map for exploring Indigenous communities by region.'>World Cultures Map</a>
          </li>
          <li class='primary-nav-item'>
            <a href='educator_resources.html' class='primary-nav-link' data-description='Classroom activities and teaching materials on Indigenous topics.'>Educator Resources</a>
          </li>
          <li class='primary-nav-item'>
            <a href='timelines.html' class='primary-nav-link' data-description='Historical and thematic timelines related to Indigenous histories.'>Timelines</a>
          </li>
          <li class='primary-nav-item'>
            <a href='media_library.html' class='primary-nav-link' data-description='Browse audio, video, and other media about Indigenous cultures.'>Media Library</a>
          </li>
          <li class='primary-nav-item'>
            <a href='glossary.html' class='primary-nav-link' data-description='Definitions of key Indigenous studies terms and concepts.'>Glossary</a>
          </li>
          <li class='primary-nav-item'>
            <a href='events.html' class='primary-nav-link' data-description='Calendar and listings for Indigenous-related events and programs.'>Events</a>
          </li>
          <li class='primary-nav-item'>
            <a href='quizzes.html' class='primary-nav-link' data-description='Learning quizzes and assessments on Indigenous topics.'>Quizzes</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-main' role='main'>
    <section class='timelines-page' aria-labelledby='timelines-heading'>
      <!-- Non-visual infrastructure components -->
      <div data-component='timelines-url-state-manager' hidden aria-hidden='true'></div>
      <div data-component='timelines-data-loader' hidden aria-hidden='true'></div>

      <div class='timelines-inner'>
        <header class='timelines-header'>
          <h1 id='timelines-heading' class='timelines-title'>Timelines</h1>
        </header>

        <!-- Filters toolbar -->
        <section class='timelines-filters-section' aria-label='Timeline filters'>
          <div class='timelines-filters-toolbar' data-component='timeline-filters-toolbar' data-populate='timeline-filters'>
            <!-- Populated by JavaScript using getTimelineFilterOptions -->
          </div>

          <!-- Error notification (inline banner) -->
          <div class='timelines-error-banner' data-component='timelines-error-notification' role='alert' hidden>
            <span class='timelines-error-text' data-role='error-message'></span>
            <button type='button' class='timelines-error-retry' data-action='retry-load'>Retry</button>
          </div>

          <!-- Result summary -->
          <p class='timelines-result-summary' data-component='timelines-result-summary' aria-live='polite'></p>
        </section>

        <!-- Loading indicator -->
        <div class='timelines-loading-indicator' data-component='timelines-loading-indicator' aria-live='polite' hidden>
          <div class='timelines-loading-spinner' aria-hidden='true'></div>
          <p class='timelines-loading-text'>Loading timelines…</p>
        </div>

        <!-- Main results area: list, empty state, pagination -->
        <section class='timelines-results-section' aria-label='Timeline results'>
          <!-- Timeline list -->
          <ul class='timeline-list' data-component='timeline-list' data-populate='timeline-list' aria-live='polite' aria-busy='false'>
            <!-- Timeline cards rendered here -->
          </ul>

          <!-- Empty state -->
          <div class='timelines-empty-state' data-component='timelines-empty-state' hidden>
            <!-- Empty-state content rendered by JavaScript -->
          </div>

          <!-- Pagination controls -->
          <nav class='timelines-pagination' data-component='timelines-pagination-controls' aria-label='Timelines pages'>
            <!-- Pagination buttons rendered here -->
          </nav>
        </section>
      </div>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='site-footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='index.html' class='footer-nav-link' data-description='Return to the homepage.'>Home</a>
          </li>
          <li class='footer-nav-item'>
            <a href='educator_resources.html' class='footer-nav-link' data-description='Access teaching resources and classroom activities.'>Educator Resources</a>
          </li>
          <li class='footer-nav-item'>
            <a href='media_library.html' class='footer-nav-link' data-description='Explore audio and video collections.'>Media Library</a>
          </li>
          <li class='footer-nav-item'>
            <a href='timelines.html' class='footer-nav-link' data-description='View historical timelines.'>Timelines</a>
          </li>
          <li class='footer-nav-item'>
            <a href='glossary.html' class='footer-nav-link' data-description='Look up key terms and concepts.'>Glossary</a>
          </li>
        </ul>
      </nav>
      <p class='site-footer-meta'>&copy; <span class='site-footer-year'>2026</span> Indigenous Cultures Information Site.</p>
    </div>
  </footer>

  <!-- SDK with WebsiteSDK object -->
  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      var PAGE_SIZE = 20;
      var filterOptions = { themes: [], regions: [] };
      var currentState = { theme: null, region: null, page: 1 };
      var lastResult = null;

      // Core DOM references
      var filtersToolbarContainer = document.querySelector('[data-component="timeline-filters-toolbar"]'.replace(/"/g, '\"'));
      var resultSummaryContainer = document.querySelector('[data-component="timelines-result-summary"]'.replace(/"/g, '\"'));
      var listContainer = document.querySelector('[data-component="timeline-list"]'.replace(/"/g, '\"'));
      var paginationContainer = document.querySelector('[data-component="timelines-pagination-controls"]'.replace(/"/g, '\"'));
      var loadingIndicatorContainer = document.querySelector('[data-component="timelines-loading-indicator"]'.replace(/"/g, '\"'));
      var errorNotificationContainer = document.querySelector('[data-component="timelines-error-notification"]'.replace(/"/g, '\"'));
      var emptyStateContainer = document.querySelector('[data-component="timelines-empty-state"]'.replace(/"/g, '\"'));

      function parsePositiveInt(value, defaultValue) {
        var n = parseInt(value, 10);
        if (isNaN(n) || n < 1) {
          return defaultValue;
        }
        return n;
      }

      function getThemeLabel(value) {
        if (!value || !filterOptions || !Array.isArray(filterOptions.themes)) {
          return '';
        }
        for (var i = 0; i < filterOptions.themes.length; i++) {
          if (filterOptions.themes[i].value === value) {
            return filterOptions.themes[i].label || value;
          }
        }
        return value;
      }

      function getRegionLabel(value) {
        if (!value || !filterOptions || !Array.isArray(filterOptions.regions)) {
          return '';
        }
        for (var i = 0; i < filterOptions.regions.length; i++) {
          if (filterOptions.regions[i].value === value) {
            return filterOptions.regions[i].label || value;
          }
        }
        return value;
      }

      function readStateFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var rawTheme = params.get('theme');
        var rawRegion = params.get('region');
        var rawPage = params.get('page');

        var validThemes = {};
        if (filterOptions && Array.isArray(filterOptions.themes)) {
          filterOptions.themes.forEach(function(opt) {
            if (opt && typeof opt.value === 'string') {
              validThemes[opt.value] = true;
            }
          });
        }

        var validRegions = {};
        if (filterOptions && Array.isArray(filterOptions.regions)) {
          filterOptions.regions.forEach(function(opt) {
            if (opt && typeof opt.value === 'string') {
              validRegions[opt.value] = true;
            }
          });
        }

        var theme = rawTheme && validThemes[rawTheme] ? rawTheme : null;
        var region = rawRegion && validRegions[rawRegion] ? rawRegion : null;
        var page = parsePositiveInt(rawPage, 1);

        return { theme: theme, region: region, page: page };
      }

      function updateUrlFromState(replace) {
        var params = new URLSearchParams(window.location.search);

        if (currentState.theme) {
          params.set('theme', currentState.theme);
        } else {
          params.delete('theme');
        }

        if (currentState.region) {
          params.set('region', currentState.region);
        } else {
          params.delete('region');
        }

        if (currentState.page && currentState.page > 1) {
          params.set('page', String(currentState.page));
        } else {
          params.delete('page');
        }

        var newQuery = params.toString();
        var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');

        if (replace) {
          window.history.replaceState({}, '', newUrl);
        } else {
          window.history.pushState({}, '', newUrl);
        }
      }

      function setLoading(isLoading) {
        if (loadingIndicatorContainer) {
          loadingIndicatorContainer.hidden = !isLoading;
        }
        if (listContainer) {
          listContainer.setAttribute('aria-busy', isLoading ? 'true' : 'false');
        }
      }

      function setError(message) {
        if (!errorNotificationContainer) {
          return;
        }
        var textNode = errorNotificationContainer.querySelector('[data-role="error-message"]'.replace(/"/g, '\"'));
        if (message) {
          if (textNode) {
            textNode.textContent = message;
          }
          errorNotificationContainer.hidden = false;
        } else {
          if (textNode) {
            textNode.textContent = '';
          }
          errorNotificationContainer.hidden = true;
        }
      }

      function renderFiltersToolbar(container) {
        if (!container) {
          return;
        }
        container.innerHTML = '';

        var form = document.createElement('form');
        form.className = 'timelines-filters-form';
        form.setAttribute('aria-label', 'Filter timelines by theme and region');
        form.addEventListener('submit', function(event) {
          event.preventDefault();
        });

        // Theme filter
        var themeGroup = document.createElement('div');
        themeGroup.className = 'timelines-filter-group';

        var themeLabel = document.createElement('label');
        themeLabel.className = 'timelines-filter-label';
        themeLabel.textContent = 'Theme';
        themeLabel.setAttribute('for', 'timeline-filter-theme');

        var themeSelect = document.createElement('select');
        themeSelect.id = 'timeline-filter-theme';
        themeSelect.name = 'theme';
        themeSelect.className = 'timelines-filter-select';
        themeSelect.dataset.action = 'theme-select';

        var themeAnyOption = document.createElement('option');
        themeAnyOption.value = '';
        themeAnyOption.textContent = 'All themes';
        themeSelect.appendChild(themeAnyOption);

        if (filterOptions && Array.isArray(filterOptions.themes)) {
          filterOptions.themes.forEach(function(opt) {
            if (!opt || typeof opt.value !== 'string') {
              return;
            }
            var optionEl = document.createElement('option');
            optionEl.value = opt.value;
            optionEl.textContent = opt.label || opt.value;
            themeSelect.appendChild(optionEl);
          });
        }

        themeGroup.appendChild(themeLabel);
        themeGroup.appendChild(themeSelect);

        // Region filter
        var regionGroup = document.createElement('div');
        regionGroup.className = 'timelines-filter-group';

        var regionLabel = document.createElement('label');
        regionLabel.className = 'timelines-filter-label';
        regionLabel.textContent = 'Region';
        regionLabel.setAttribute('for', 'timeline-filter-region');

        var regionSelect = document.createElement('select');
        regionSelect.id = 'timeline-filter-region';
        regionSelect.name = 'region';
        regionSelect.className = 'timelines-filter-select';
        regionSelect.dataset.action = 'region-select';

        var regionAnyOption = document.createElement('option');
        regionAnyOption.value = '';
        regionAnyOption.textContent = 'All regions';
        regionSelect.appendChild(regionAnyOption);

        if (filterOptions && Array.isArray(filterOptions.regions)) {
          filterOptions.regions.forEach(function(opt) {
            if (!opt || typeof opt.value !== 'string') {
              return;
            }
            var optionEl2 = document.createElement('option');
            optionEl2.value = opt.value;
            optionEl2.textContent = opt.label || opt.value;
            regionSelect.appendChild(optionEl2);
          });
        }

        regionGroup.appendChild(regionLabel);
        regionGroup.appendChild(regionSelect);

        // Clear filters button
        var actionsGroup = document.createElement('div');
        actionsGroup.className = 'timelines-filter-actions';

        var clearButton = document.createElement('button');
        clearButton.type = 'button';
        clearButton.className = 'timelines-filter-clear';
        clearButton.dataset.action = 'clear-all-filters';
        clearButton.textContent = 'Clear filters';

        actionsGroup.appendChild(clearButton);

        form.appendChild(themeGroup);
        form.appendChild(regionGroup);
        form.appendChild(actionsGroup);

        container.appendChild(form);

        // Initialize selections from current state
        if (currentState.theme && themeSelect) {
          themeSelect.value = currentState.theme;
        }
        if (!currentState.theme && themeSelect) {
          themeSelect.value = '';
        }
        if (currentState.region && regionSelect) {
          regionSelect.value = currentState.region;
        }
        if (!currentState.region && regionSelect) {
          regionSelect.value = '';
        }
      }

      function renderResultSummary(container, response) {
        if (!container) {
          return;
        }
        var total = response && typeof response.totalResults === 'number' ? response.totalResults : 0;
        var page = response && typeof response.page === 'number' ? response.page : 1;
        var pageSize = response && typeof response.pageSize === 'number' ? response.pageSize : PAGE_SIZE;

        if (total === 0) {
          if (currentState.theme || currentState.region) {
            container.textContent = 'No timelines match the selected filters.';
          } else {
            container.textContent = 'No timelines are currently available.';
          }
          return;
        }

        var startIndex = (page - 1) * pageSize + 1;
        var endIndex = Math.min(page * pageSize, total);

        var parts = [];
        parts.push('Showing ' + startIndex + '–' + endIndex + ' of ' + total + ' timelines');

        var filterParts = [];
        if (currentState.theme) {
          filterParts.push('theme ' + getThemeLabel(currentState.theme));
        }
        if (currentState.region) {
          filterParts.push('region ' + getRegionLabel(currentState.region));
        }
        if (filterParts.length > 0) {
          parts.push('for ' + filterParts.join(' and '));
        }

        container.textContent = parts.join(' ');
      }

      function renderTimelineList(container, timelines) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!timelines || timelines.length === 0) {
          return;
        }

        timelines.forEach(function(tl) {
          if (!tl || typeof tl.id !== 'string') {
            return;
          }

          var item = document.createElement('li');
          item.className = 'timeline-card';
          item.dataset.timelineId = tl.id;

          var titleButton = document.createElement('button');
          titleButton.type = 'button';
          titleButton.className = 'timeline-card-title';
          titleButton.dataset.action = 'open-timeline';
          titleButton.dataset.timelineId = tl.id;
          titleButton.textContent = tl.title || 'Untitled timeline';

          var summary = document.createElement('p');
          summary.className = 'timeline-card-summary';
          if (tl.summary) {
            summary.textContent = tl.summary;
          } else {
            summary.textContent = 'No summary is available for this timeline yet.';
          }

          var meta = document.createElement('div');
          meta.className = 'timeline-card-meta';

          var metaParts = [];
          if (tl.theme) {
            metaParts.push(getThemeLabel(tl.theme));
          }
          if (tl.region) {
            metaParts.push(getRegionLabel(tl.region));
          }
          if (typeof tl.start_year === 'number' && typeof tl.end_year === 'number') {
            metaParts.push(tl.start_year + '–' + tl.end_year);
          } else if (typeof tl.start_year === 'number') {
            metaParts.push('from ' + tl.start_year);
          }

          if (metaParts.length > 0) {
            var metaText = document.createElement('span');
            metaText.className = 'timeline-card-meta-primary';
            metaText.textContent = metaParts.join(' · ');
            meta.appendChild(metaText);
          }

          if (tl.created_at) {
            var created = document.createElement('span');
            created.className = 'timeline-card-meta-secondary';
            var createdLabel = 'Added';
            try {
              var createdDate = new Date(tl.created_at);
              if (!isNaN(createdDate.getTime())) {
                created.textContent = createdLabel + ' ' + createdDate.toLocaleDateString();
              } else {
                created.textContent = createdLabel;
              }
            } catch (e) {
              created.textContent = createdLabel;
            }
            meta.appendChild(created);
          }

          item.appendChild(titleButton);
          item.appendChild(summary);
          if (meta.childNodes.length > 0) {
            item.appendChild(meta);
          }

          container.appendChild(item);
        });
      }

      function renderPagination(container, totalResults, page, pageSize) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        var total = typeof totalResults === 'number' ? totalResults : 0;
        var pageNum = typeof page === 'number' ? page : 1;
        var size = typeof pageSize === 'number' ? pageSize : PAGE_SIZE;

        if (total <= size) {
          container.hidden = true;
          return;
        }

        var totalPages = Math.ceil(total / size);
        if (totalPages <= 1) {
          container.hidden = true;
          return;
        }

        container.hidden = false;

        var list = document.createElement('ul');
        list.className = 'pagination-list';

        // Previous
        var prevLi = document.createElement('li');
        var prevBtn = document.createElement('button');
        prevBtn.type = 'button';
        prevBtn.className = 'pagination-button pagination-prev';
        prevBtn.dataset.action = 'page-prev';
        prevBtn.textContent = 'Previous';
        if (pageNum <= 1) {
          prevBtn.disabled = true;
        }
        prevLi.appendChild(prevBtn);
        list.appendChild(prevLi);

        // Page numbers
        for (var p = 1; p <= totalPages; p++) {
          var li = document.createElement('li');
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'pagination-button pagination-page';
          btn.dataset.action = 'page-select';
          btn.dataset.page = String(p);
          btn.textContent = String(p);
          if (p === pageNum) {
            btn.setAttribute('aria-current', 'page');
          }
          li.appendChild(btn);
          list.appendChild(li);
        }

        // Next
        var nextLi = document.createElement('li');
        var nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.className = 'pagination-button pagination-next';
        nextBtn.dataset.action = 'page-next';
        nextBtn.textContent = 'Next';
        if (pageNum >= totalPages) {
          nextBtn.disabled = true;
        }
        nextLi.appendChild(nextBtn);
        list.appendChild(nextLi);

        container.appendChild(list);
      }

      function renderEmptyState(container) {
        if (!container) {
          return;
        }
        container.innerHTML = '';

        var wrapper = document.createElement('div');
        wrapper.className = 'timelines-empty-state-inner';

        var heading = document.createElement('h2');
        heading.className = 'timelines-empty-state-title';

        var description = document.createElement('p');
        description.className = 'timelines-empty-state-text';

        var hasFilters = !!(currentState.theme || currentState.region);

        if (hasFilters) {
          heading.textContent = 'No timelines match your filters.';
          description.textContent = 'Try adjusting the theme or region, or clear all filters to see all available timelines.';
        } else {
          heading.textContent = 'No timelines are available right now.';
          description.textContent = 'Timelines will appear here as they are added. Please check back soon.';
        }

        wrapper.appendChild(heading);
        wrapper.appendChild(description);

        if (hasFilters) {
          var clearButton = document.createElement('button');
          clearButton.type = 'button';
          clearButton.className = 'timelines-empty-clear-button';
          clearButton.dataset.action = 'empty-clear-filters';
          clearButton.textContent = 'Clear all filters';
          wrapper.appendChild(clearButton);
        }

        container.appendChild(wrapper);
      }

      function loadTimelines() {
        if (!listContainer) {
          return;
        }

        setError(null);
        setLoading(true);

        var filters = {};
        if (currentState.theme) {
          filters.theme = currentState.theme;
        }
        if (currentState.region) {
          filters.region = currentState.region;
        }

        var response = null;
        try {
          response = WebsiteSDK.listTimelines(filters, currentState.page, PAGE_SIZE);
        } catch (err) {
          setLoading(false);
          if (window && window.console && typeof window.console.error === 'function') {
            window.console.error('Error loading timelines:', err);
          }
          setError('We were unable to load timelines. Please try again.');
          if (listContainer) {
            listContainer.innerHTML = '';
          }
          if (paginationContainer) {
            paginationContainer.hidden = true;
          }
          if (emptyStateContainer) {
            emptyStateContainer.hidden = true;
          }
          return;
        }

        setLoading(false);
        lastResult = response;

        var total = response && typeof response.totalResults === 'number' ? response.totalResults : 0;

        renderResultSummary(resultSummaryContainer, response);

        if (total === 0) {
          if (listContainer) {
            listContainer.innerHTML = '';
          }
          if (paginationContainer) {
            paginationContainer.hidden = true;
          }
          if (emptyStateContainer) {
            renderEmptyState(emptyStateContainer);
            emptyStateContainer.hidden = false;
          }
          return;
        }

        if (emptyStateContainer) {
          emptyStateContainer.hidden = true;
        }

        renderTimelineList(listContainer, response.timelines || []);
        renderPagination(paginationContainer, total, response.page || currentState.page, response.pageSize || PAGE_SIZE);
      }

      function handleFilterChange(newTheme, newRegion) {
        var themeValue = newTheme || null;
        var regionValue = newRegion || null;

        var changed = false;
        if ((currentState.theme || null) !== themeValue) {
          changed = true;
        }
        if ((currentState.region || null) !== regionValue) {
          changed = true;
        }

        if (!changed) {
          return;
        }

        currentState.theme = themeValue;
        currentState.region = regionValue;
        currentState.page = 1;

        updateUrlFromState(false);
        loadTimelines();
      }

      function handleClearAllFilters() {
        if (!currentState.theme && !currentState.region) {
          return;
        }
        currentState.theme = null;
        currentState.region = null;
        currentState.page = 1;

        updateUrlFromState(false);
        loadTimelines();

        if (filtersToolbarContainer) {
          var themeSelect = filtersToolbarContainer.querySelector('select[name="theme"]'.replace(/"/g, '\"'));
          var regionSelect = filtersToolbarContainer.querySelector('select[name="region"]'.replace(/"/g, '\"'));
          if (themeSelect) {
            themeSelect.value = '';
          }
          if (regionSelect) {
            regionSelect.value = '';
          }
        }
      }

      function handleOpenTimeline(timelineId) {
        if (!timelineId) {
          return;
        }
        var url = 'timeline.html?timelineId=' + encodeURIComponent(timelineId);
        window.location.href = url;
      }

      function handleRetry() {
        loadTimelines();
      }

      function handlePageSelect(targetPage) {
        var pageNumber = parsePositiveInt(targetPage, currentState.page || 1);
        if (pageNumber === currentState.page) {
          return;
        }

        // Respect total pages if we have a lastResult
        if (lastResult && typeof lastResult.totalResults === 'number') {
          var totalPages = Math.ceil(lastResult.totalResults / (lastResult.pageSize || PAGE_SIZE));
          if (pageNumber < 1) {
            pageNumber = 1;
          }
          if (pageNumber > totalPages) {
            pageNumber = totalPages;
          }
        }

        currentState.page = pageNumber;
        updateUrlFromState(false);
        loadTimelines();
      }

      function handlePagePrev() {
        var newPage = (currentState.page || 1) - 1;
        if (newPage < 1) {
          return;
        }
        handlePageSelect(newPage);
      }

      function handlePageNext() {
        var newPage = (currentState.page || 1) + 1;
        if (lastResult && typeof lastResult.totalResults === 'number') {
          var totalPages = Math.ceil(lastResult.totalResults / (lastResult.pageSize || PAGE_SIZE));
          if (newPage > totalPages) {
            return;
          }
        }
        handlePageSelect(newPage);
      }

      // Global event delegation for click-based actions
      document.addEventListener('click', function(event) {
        var el = event.target.closest('[data-action]');
        if (!el) {
          return;
        }
        var action = el.dataset.action;

        if (action === 'clear-all-filters' || action === 'empty-clear-filters') {
          event.preventDefault();
          handleClearAllFilters();
        } else if (action === 'open-timeline') {
          event.preventDefault();
          var timelineId = el.dataset.timelineId;
          handleOpenTimeline(timelineId);
        } else if (action === 'retry-load') {
          event.preventDefault();
          handleRetry();
        } else if (action === 'page-select') {
          event.preventDefault();
          var pageValue = el.dataset.page;
          handlePageSelect(pageValue);
        } else if (action === 'page-prev') {
          event.preventDefault();
          handlePagePrev();
        } else if (action === 'page-next') {
          event.preventDefault();
          handlePageNext();
        }
      });

      // Global event delegation for change-based actions (selects)
      document.addEventListener('change', function(event) {
        var el = event.target.closest('[data-action]');
        if (!el) {
          return;
        }
        var action = el.dataset.action;

        if (action === 'theme-select') {
          var newTheme = el.value || null;
          var newRegion = currentState.region || null;
          handleFilterChange(newTheme, newRegion);
        } else if (action === 'region-select') {
          var newRegion2 = el.value || null;
          var newTheme2 = currentState.theme || null;
          handleFilterChange(newTheme2, newRegion2);
        }
      });

      // React to browser navigation (back/forward)
      window.addEventListener('popstate', function() {
        if (!filterOptions) {
          return;
        }
        currentState = readStateFromUrl();

        if (filtersToolbarContainer) {
          var themeSelect = filtersToolbarContainer.querySelector('select[name="theme"]'.replace(/"/g, '\"'));
          var regionSelect = filtersToolbarContainer.querySelector('select[name="region"]'.replace(/"/g, '\"'));
          if (themeSelect) {
            themeSelect.value = currentState.theme || '';
          }
          if (regionSelect) {
            regionSelect.value = currentState.region || '';
          }
        }

        loadTimelines();
      });

      // Initial load: fetch filter options, normalize URL state, render UI
      try {
        filterOptions = WebsiteSDK.getTimelineFilterOptions();
      } catch (e) {
        filterOptions = { themes: [], regions: [] };
        if (window && window.console && typeof window.console.error === 'function') {
          window.console.error('Error loading timeline filter options:', e);
        }
      }

      if (!filterOptions || !Array.isArray(filterOptions.themes)) {
        filterOptions.themes = [];
      }
      if (!filterOptions || !Array.isArray(filterOptions.regions)) {
        filterOptions.regions = [];
      }

      currentState = readStateFromUrl();
      updateUrlFromState(true);

      if (filtersToolbarContainer) {
        renderFiltersToolbar(filtersToolbarContainer);
      }

      // Generic data-populate handling (hooks are already wired above)
      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        var type = element.dataset.populate;
        if (type === 'timeline-filters') {
          // Already rendered via renderFiltersToolbar
        } else if (type === 'timeline-list') {
          // Populated via loadTimelines using current URL-driven state
        }
      });

      loadTimelines();
    });
  </script>
</body>
</html>
