<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Community Cultural Events - Contact</title>
    <meta name="description" content="Contact the Community Cultural Events team for questions about events, workshops, volunteering, festival passes, privacy, and organizational matters.">

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">

    <!-- Site stylesheet -->
    
    <!-- Contact page stylesheet -->
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <a href="#content" class="skip-link">Skip to main content</a>

    <header class="site-header">
        <div class="site-header-shell">
            <div class="site-header-inner">
                <a href="index.html" class="brand" aria-label="Community Cultural Events home">
                    <div class="brand-mark">
                        <span class="brand-text brand-text-primary">Community</span>
                        <span class="brand-text brand-text-secondary">Connect</span>
                    </div>
                </a>

                <nav class="primary-nav" aria-label="Primary navigation">
                    <ul class="primary-nav-list">
                        <li class="primary-nav-item"><a href="index.html">Home</a></li>
                        <li class="primary-nav-item"><a href="events.html">Events</a></li>
                        <li class="primary-nav-item"><a href="workshops.html">Workshops</a></li>
                        <li class="primary-nav-item"><a href="calendar.html">Calendar</a></li>
                        <li class="primary-nav-item"><a href="festival_pass_builder.html">Festival Pass</a></li>
                        <li class="primary-nav-item"><a href="volunteer.html">Volunteer</a></li>
                        <li class="primary-nav-item"><a href="schedule.html">My Schedule</a></li>
                    </ul>
                </nav>

                <div class="header-cta">
                    <a href="contact.html" class="btn btn-pill btn-ghost-light">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <main id="content" class="site-main" tabindex="-1" role="main">
        <section class="page-shell contact-page" data-component="contact-page-controller">
            <div class="page-shell-inner">
                <header class="page-header contact-page-header">
                    <h1 class="page-title contact-page-title">Contact</h1>
                </header>

                <!-- Topic router: pill-shaped chips -->
                <section class="contact-topic-router" data-component="contact-topic-router" aria-label="Contact topics">
                    <div class="contact-topic-chips" role="list">
                        <button type="button" class="chip chip-outline contact-topic-chip" role="listitem" data-action="changeTopic" data-topic="general" aria-pressed="false">General</button>
                        <button type="button" class="chip chip-outline contact-topic-chip" role="listitem" data-action="changeTopic" data-topic="events" aria-pressed="false">Events</button>
                        <button type="button" class="chip chip-outline contact-topic-chip" role="listitem" data-action="changeTopic" data-topic="workshops" aria-pressed="false">Workshops</button>
                        <button type="button" class="chip chip-outline contact-topic-chip" role="listitem" data-action="changeTopic" data-topic="volunteering" aria-pressed="false">Volunteering</button>
                        <button type="button" class="chip chip-outline contact-topic-chip" role="listitem" data-action="changeTopic" data-topic="passes" aria-pressed="false">Festival passes</button>
                        <button type="button" class="chip chip-outline contact-topic-chip" role="listitem" data-action="changeTopic" data-topic="privacy" aria-pressed="false">Privacy</button>
                        <button type="button" class="chip chip-outline contact-topic-chip" role="listitem" data-action="changeTopic" data-topic="terms" aria-pressed="false">Terms</button>
                    </div>
                </section>

                <!-- Compact contact info panel -->
                <section class="contact-info-panel" data-component="contact-info-panel" data-populate="contactInfo" aria-label="General contact information">
                    <!-- Populated via WebsiteSDK.getContactInfo() -->
                </section>

                <!-- Status banner (submission success/error) -->
                <section class="contact-form-status status-banner" data-component="contact-form-status" aria-live="polite" hidden>
                    <!-- Updated via JavaScript after form submission -->
                </section>

                <!-- Main contact form card -->
                <section class="contact-form-section" data-component="contact-form">
                    <div class="contact-form-card">
                        <form id="contactForm" class="contact-form" novalidate>
                            <div class="form-group">
                                <label for="contactName">Name</label>
                                <input type="text" id="contactName" name="name" autocomplete="name" required>
                                <p class="field-error" data-field-error="name" aria-live="polite"></p>
                            </div>

                            <div class="form-group">
                                <label for="contactEmail">Email</label>
                                <input type="email" id="contactEmail" name="email" autocomplete="email" required>
                                <p class="field-error" data-field-error="email" aria-live="polite"></p>
                            </div>

                            <div class="form-group">
                                <label for="contactTopicSelect">Topic</label>
                                <select id="contactTopicSelect" name="topic" required>
                                    <option value="">Select a topic</option>
                                    <option value="general_question" data-url-topic="general">General question</option>
                                    <option value="event_feedback" data-url-topic="events">Events &amp; performances</option>
                                    <option value="workshop_feedback" data-url-topic="workshops">Workshops &amp; classes</option>
                                    <option value="volunteer" data-url-topic="volunteering">Volunteering</option>
                                    <option value="general_question" data-url-topic="passes">Festival passes &amp; tickets</option>
                                    <option value="other" data-url-topic="privacy">Privacy &amp; data</option>
                                    <option value="other" data-url-topic="terms">Terms &amp; policies</option>
                                    <option value="accessibility" data-url-topic="accessibility">Accessibility &amp; inclusion</option>
                                    <option value="other" data-url-topic="other">Something else</option>
                                </select>
                                <p class="field-error" data-field-error="topic" aria-live="polite"></p>
                            </div>

                            <div class="form-group">
                                <label for="contactMessage">Message</label>
                                <textarea id="contactMessage" name="message" rows="6" required></textarea>
                                <p class="field-error" data-field-error="message" aria-live="polite"></p>
                            </div>

                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary btn-pill" data-action="submitContactForm">Send message</button>
                            </div>
                        </form>
                    </div>
                </section>

                <!-- Post-submit navigation actions -->
                <section class="contact-post-submit-actions" data-component="contact-post-submit-actions" aria-label="After submission" hidden>
                    <div class="post-submit-actions-inner">
                        <button type="button" class="btn btn-pill btn-secondary" data-action="backToHome">Back to Home</button>
                    </div>
                </section>

                <!-- Related links at bottom -->
                <section class="contact-related-links" data-component="contact-related-links" data-populate="contactRelatedLinks" aria-label="Related pages and resources">
                    <!-- Populated from getContactInfo.related_links and static CTAs -->
                </section>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <div class="footer-links" aria-label="Footer navigation">
                <a href="about.html" class="footer-link">About</a>
                <a href="contact.html" class="footer-link">Contact</a>
                <a href="newsletter.html" class="footer-link">Newsletter Signup</a>
                <a href="privacy.html" class="footer-link">Privacy Policy</a>
                <a href="terms.html" class="footer-link">Terms &amp; Conditions</a>
            </div>
            <div class="footer-meta">
                <p class="footer-meta-text">&copy; <span class="current-year">2024</span> Community Cultural Events. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        (function () {
            var yearEl = document.querySelector('.current-year');
            if (yearEl) {
                yearEl.textContent = new Date().getFullYear();
            }
        })();
    </script>

    <!-- SDK with WebsiteSDK.getContactInfo and WebsiteSDK.submitContactForm -->
    <script src="business_logic.js"></script>

    <script>
    (function() {
        document.addEventListener('DOMContentLoaded', function() {
            var state = {
                currentTopicSlug: null,
                submissionStatus: 'idle',
                lastSubmission: null,
                hasInitialTopicFocus: false,
                contactInfo: null
            };

            // Parse incoming URL parameters
            var url = new URL(window.location.href);
            var params = url.searchParams;
            var initialTopic = (params.get('topic') || '').toLowerCase();
            var allowedUrlTopics = ['events', 'workshops', 'volunteering', 'passes', 'privacy', 'terms', 'general', 'accessibility', 'other'];
            if (initialTopic && allowedUrlTopics.indexOf(initialTopic) !== -1) {
                state.currentTopicSlug = initialTopic;
            }

            // Fetch contact info once
            try {
                state.contactInfo = WebsiteSDK.getContactInfo();
            } catch (err) {
                console.error('Error fetching contact info', err);
                state.contactInfo = null;
            }

            // Populate data-driven components
            var populateElements = document.querySelectorAll('[data-populate]');
            populateElements.forEach(function(element) {
                var type = element.getAttribute('data-populate');
                if (type === 'contactInfo') {
                    renderContactInfoPanel(element, state.contactInfo);
                } else if (type === 'contactRelatedLinks') {
                    renderContactRelatedLinks(element, state.contactInfo);
                }
            });

            initTopicRouterState(state);
            initContactForm(state);
            initPostSubmitActions(state);
            initActionHandlers(state);
        });

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeHtmlAttr(value) {
            return escapeHtml(value);
        }

        // Render contact info panel
        function renderContactInfoPanel(container, info) {
            if (!container) return;

            if (!info) {
                container.innerHTML = `
                    <div class="contact-info-card">
                        <p class="contact-info-text">Contact details are temporarily unavailable. You can still use the form below to reach us.</p>
                    </div>
                `;
                return;
            }

            var address = info.address || {};
            var addressLines = [];
            if (address.address_line1) {
                addressLines.push(escapeHtml(address.address_line1));
            }
            if (address.address_line2) {
                addressLines.push(escapeHtml(address.address_line2));
            }
            var cityParts = [];
            if (address.city) {
                cityParts.push(escapeHtml(address.city));
            }
            if (address.state_province) {
                cityParts.push(escapeHtml(address.state_province));
            }
            if (address.postal_code) {
                cityParts.push(escapeHtml(address.postal_code));
            }
            if (address.country) {
                cityParts.push(escapeHtml(address.country));
            }
            var cityLine = cityParts.join(', ');

            container.innerHTML = `
                <div class="contact-info-card">
                    <ul class="contact-info-list">
                        ${info.email ? `
                            <li class="contact-info-item">
                                <span class="contact-info-label">Email</span>
                                <a href="mailto:${escapeHtmlAttr(info.email)}" class="contact-info-value contact-link">${escapeHtml(info.email)}</a>
                            </li>
                        ` : ''}
                        ${info.phone ? `
                            <li class="contact-info-item">
                                <span class="contact-info-label">Phone</span>
                                <a href="tel:${escapeHtmlAttr(info.phone)}" class="contact-info-value contact-link">${escapeHtml(info.phone)}</a>
                            </li>
                        ` : ''}
                        ${(addressLines.length || cityLine) ? `
                            <li class="contact-info-item">
                                <span class="contact-info-label">Office</span>
                                <div class="contact-info-value contact-address">
                                    ${addressLines.length ? `<span>${addressLines.join('<br>')}</span>` : ''}
                                    ${cityLine ? `<span>${cityLine}</span>` : ''}
                                </div>
                            </li>
                        ` : ''}
                        ${info.office_hours ? `
                            <li class="contact-info-item">
                                <span class="contact-info-label">Hours</span>
                                <span class="contact-info-value contact-hours">${escapeHtml(info.office_hours)}</span>
                            </li>
                        ` : ''}
                    </ul>
                </div>
            `;
        }

        // Render related links and static CTAs
        function renderContactRelatedLinks(container, info) {
            if (!container) return;

            var related = [];
            if (info && Array.isArray(info.related_links)) {
                related = info.related_links;
            }

            var itemsHtml = '';
            related.forEach(function(link) {
                if (!link || !link.label) return;
                var targetPage = (link.target_page || '').toString().toLowerCase();
                var label = escapeHtml(link.label);
                itemsHtml += `
                    <li class="related-links-item">
                        <button type="button" class="link-button" data-action="relatedLink" data-target-page="${escapeHtmlAttr(targetPage)}">${label}</button>
                    </li>
                `;
            });

            container.innerHTML = `
                <div class="related-links-inner">
                    <h2 class="section-title">Related information</h2>
                    <div class="related-links-actions">
                        <button type="button" class="btn btn-pill btn-secondary" data-action="goVolunteer">Explore volunteer opportunities</button>
                        <button type="button" class="btn btn-pill btn-ghost" data-action="goAbout">Learn more about the organization</button>
                    </div>
                    ${itemsHtml ? `<ul class="related-links-list">${itemsHtml}</ul>` : `<p class="related-links-empty">More related links will appear here as they become available.</p>`}
                </div>
            `;
        }

        // Initialize topic router state from URL
        function initTopicRouterState(state) {
            if (state.currentTopicSlug) {
                setCurrentTopicSlug(state, state.currentTopicSlug, { fromUrl: true, updateUrl: false });
            } else {
                updateTopicChips(null);
                updateTopicSelectFromSlug(null);
            }

            var topicSelect = document.getElementById('contactTopicSelect');
            if (topicSelect) {
                topicSelect.addEventListener('change', function() {
                    var selectedIndex = topicSelect.selectedIndex;
                    var selectedOption = selectedIndex >= 0 ? topicSelect.options[selectedIndex] : null;
                    var slug = '';
                    if (selectedOption) {
                        slug = (selectedOption.getAttribute('data-url-topic') || '').toLowerCase();
                    }
                    setCurrentTopicSlug(state, slug || null, { source: 'select' });
                });
            }
        }

        function setCurrentTopicSlug(state, slug, options) {
            var normalized = slug ? slug.toLowerCase() : null;
            state.currentTopicSlug = normalized;

            updateTopicChips(normalized);
            updateTopicSelectFromSlug(normalized);

            var shouldUpdateUrl = true;
            if (options && Object.prototype.hasOwnProperty.call(options, 'updateUrl')) {
                shouldUpdateUrl = !!options.updateUrl;
            }
            if (shouldUpdateUrl) {
                syncTopicToUrl(normalized);
            }

            if (options && options.fromUrl) {
                maybeFocusMessageFromInitialTopic(state);
            }
        }

        function updateTopicChips(activeSlug) {
            var chips = document.querySelectorAll('[data-component="contact-topic-router"] [data-action="changeTopic"]');
            chips.forEach(function(chip) {
                var chipSlug = (chip.getAttribute('data-topic') || '').toLowerCase();
                var isActive = !!activeSlug && chipSlug === activeSlug;
                chip.setAttribute('aria-pressed', isActive ? 'true' : 'false');
                if (isActive) {
                    chip.classList.add('chip-active');
                } else {
                    chip.classList.remove('chip-active');
                }
            });
        }

        function updateTopicSelectFromSlug(slug) {
            var topicSelect = document.getElementById('contactTopicSelect');
            if (!topicSelect) return;

            if (!slug) {
                topicSelect.value = '';
                return;
            }

            var foundIndex = -1;
            var i;
            for (i = 0; i < topicSelect.options.length; i += 1) {
                var opt = topicSelect.options[i];
                var optSlug = (opt.getAttribute('data-url-topic') || '').toLowerCase();
                if (optSlug && optSlug === slug) {
                    foundIndex = i;
                    break;
                }
            }

            if (foundIndex >= 0) {
                topicSelect.selectedIndex = foundIndex;
            } else {
                topicSelect.value = '';
            }
        }

        function syncTopicToUrl(slug) {
            try {
                var currentUrl = new URL(window.location.href);
                if (slug) {
                    currentUrl.searchParams.set('topic', slug);
                } else {
                    currentUrl.searchParams.delete('topic');
                }
                window.history.replaceState({}, '', currentUrl.toString());
            } catch (err) {
                console.error('Unable to sync topic to URL', err);
            }
        }

        function maybeFocusMessageFromInitialTopic(state) {
            if (state.hasInitialTopicFocus) return;
            if (!state.currentTopicSlug) return;
            var messageEl = document.getElementById('contactMessage');
            if (messageEl && typeof messageEl.focus === 'function') {
                messageEl.focus();
                state.hasInitialTopicFocus = true;
            }
        }

        // Contact form logic
        function initContactForm(state) {
            var formEl = document.getElementById('contactForm');
            if (!formEl) return;

            formEl.addEventListener('submit', function(event) {
                event.preventDefault();

                clearFieldErrors(formEl);

                var formData = new FormData(formEl);
                var name = (formData.get('name') || '').toString().trim();
                var email = (formData.get('email') || '').toString().trim();
                var topic = (formData.get('topic') || '').toString();
                var message = (formData.get('message') || '').toString().trim();

                var errors = {};
                if (!name) {
                    errors.name = 'Please enter your name.';
                }
                if (!email) {
                    errors.email = 'Please enter your email address.';
                } else if (!isValidEmail(email)) {
                    errors.email = 'Please enter a valid email address.';
                }
                if (!topic) {
                    errors.topic = 'Please choose a topic.';
                }
                if (!message) {
                    errors.message = 'Please enter your message.';
                }

                if (Object.keys(errors).length > 0) {
                    displayFieldErrors(formEl, errors);
                    var firstFieldName = Object.keys(errors)[0];
                    var firstField = formEl.querySelector('[name="' + firstFieldName + '"]');
                    if (firstField && typeof firstField.focus === 'function') {
                        firstField.focus();
                    }
                    return;
                }

                var submitButton = formEl.querySelector('[data-action="submitContactForm"]');
                if (submitButton) {
                    submitButton.disabled = true;
                    submitButton.setAttribute('aria-disabled', 'true');
                    submitButton.textContent = 'Sending...';
                }

                var response;
                try {
                    response = WebsiteSDK.submitContactForm(name, email, topic, message);
                } catch (err) {
                    console.error('Error submitting contact form', err);
                    response = {
                        success: false,
                        message: 'Unable to send your message right now. Please try again soon.',
                        reference_id: ''
                    };
                }

                state.submissionStatus = response && response.success ? 'success' : 'error';
                state.lastSubmission = {
                    success: !!(response && response.success),
                    message: response && response.message ? response.message : '',
                    referenceId: response && response.reference_id ? response.reference_id : ''
                };

                updateStatusBanner(state);

                if (submitButton) {
                    submitButton.disabled = false;
                    submitButton.removeAttribute('aria-disabled');
                    submitButton.textContent = 'Send message';
                }

                if (state.submissionStatus === 'success') {
                    formEl.reset();
                    if (state.currentTopicSlug) {
                        updateTopicSelectFromSlug(state.currentTopicSlug);
                    }
                    showPostSubmitActions();
                    scrollStatusIntoView();
                } else {
                    hidePostSubmitActions();
                    scrollStatusIntoView();
                }
            });
        }

        function clearFieldErrors(formEl) {
            var errorEls = formEl.querySelectorAll('.field-error');
            errorEls.forEach(function(el) {
                el.textContent = '';
            });
            var groups = formEl.querySelectorAll('.form-group');
            groups.forEach(function(group) {
                group.classList.remove('has-error');
            });
        }

        function displayFieldErrors(formEl, errors) {
            Object.keys(errors).forEach(function(fieldName) {
                var message = errors[fieldName];
                var errorEl = formEl.querySelector('[data-field-error="' + fieldName + '"]');
                if (errorEl) {
                    errorEl.textContent = message;
                }
                var field = formEl.querySelector('[name="' + fieldName + '"]');
                if (field && field.parentElement && field.parentElement.classList) {
                    field.parentElement.classList.add('has-error');
                }
            });
        }

        function isValidEmail(value) {
            if (!value) return false;
            var trimmed = value.trim();
            var atIndex = trimmed.indexOf('@');
            if (atIndex <= 0 || atIndex === trimmed.length - 1) {
                return false;
            }
            var dotIndex = trimmed.lastIndexOf('.');
            if (dotIndex <= atIndex + 1 || dotIndex === trimmed.length - 1) {
                return false;
            }
            return true;
        }

        function updateStatusBanner(state) {
            var statusEl = document.querySelector('[data-component="contact-form-status"]');
            if (!statusEl) return;

            var submission = state.lastSubmission;
            if (!submission) {
                statusEl.hidden = true;
                statusEl.innerHTML = '';
                return;
            }

            var isSuccess = !!submission.success;
            var heading = isSuccess ? 'Message sent' : 'Message not sent';
            var body = submission.message || (isSuccess ? 'Thank you for contacting us. We will get back to you soon.' : 'Something went wrong while sending your message. Please try again.');
            var refText = submission.referenceId ? 'Reference ID: ' + escapeHtml(submission.referenceId) : '';

            statusEl.className = 'contact-form-status status-banner ' + (isSuccess ? 'status-banner--success' : 'status-banner--error');
            statusEl.hidden = false;
            statusEl.innerHTML = `
                <div class="status-banner-inner">
                    <p class="status-banner-heading">${escapeHtml(heading)}</p>
                    <p class="status-banner-body">${escapeHtml(body)}${refText ? ` <span class="status-banner-ref">${refText}</span>` : ''}</p>
                </div>
            `;
        }

        function scrollStatusIntoView() {
            var statusEl = document.querySelector('[data-component="contact-form-status"]');
            if (!statusEl || statusEl.hidden) return;
            if (typeof statusEl.scrollIntoView === 'function') {
                statusEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Post-submit actions
        function initPostSubmitActions(state) {
            hidePostSubmitActions();
        }

        function showPostSubmitActions() {
            var container = document.querySelector('[data-component="contact-post-submit-actions"]');
            if (!container) return;
            container.hidden = false;
        }

        function hidePostSubmitActions() {
            var container = document.querySelector('[data-component="contact-post-submit-actions"]');
            if (!container) return;
            container.hidden = true;
        }

        // Generic action handlers based on data-action
        function initActionHandlers(state) {
            var elements = document.querySelectorAll('[data-action]');
            elements.forEach(function(element) {
                var action = element.getAttribute('data-action');
                if (!action) return;

                if (action === 'changeTopic') {
                    element.addEventListener('click', function() {
                        var slug = (element.getAttribute('data-topic') || '').toLowerCase();
                        setCurrentTopicSlug(state, slug || null, { source: 'chip' });
                    });
                } else if (action === 'goVolunteer') {
                    element.addEventListener('click', function() {
                        window.location.href = 'volunteer.html?datePreset=upcoming_saturdays';
                    });
                } else if (action === 'goAbout') {
                    element.addEventListener('click', function() {
                        window.location.href = 'about.html';
                    });
                } else if (action === 'backToHome') {
                    element.addEventListener('click', function() {
                        window.location.href = 'index.html?focus=contact_thanks';
                    });
                } else if (action === 'relatedLink') {
                    element.addEventListener('click', function() {
                        var targetPage = (element.getAttribute('data-target-page') || '').toLowerCase();
                        if (targetPage === 'volunteer') {
                            window.location.href = 'volunteer.html?datePreset=upcoming_saturdays';
                        } else if (targetPage === 'about') {
                            window.location.href = 'about.html';
                        } else {
                            // For pages not specified in outgoing connections, do nothing.
                            return;
                        }
                    });
                }
            });
        }

    })();
    </script>
</body>
</html>
