                <a href="index.html" class="brand" aria-label="Community Cultural Events home">
                    <div class="brand-mark">
                        <span class="brand-text brand-text-primary">Community</span>
                        <span class="brand-text brand-text-secondary">Connect</span>
                    </div>

                <nav class="primary-nav" aria-label="Primary navigation">
                    <ul class="primary-nav-list">
                        <li class="primary-nav-item"><a href="index.html">Home</a></li>
                        <li class="primary-nav-item"><a href="events.html">Events</a></li>
                        <li class="primary-nav-item"><a href="workshops.html">Workshops</a></li>
                        <li class="primary-nav-item"><a href="calendar.html">Calendar</a></li>
                        <li class="primary-nav-item"><a href="festival_pass_builder.html">Festival Pass</a></li>
                        <li class="primary-nav-item"><a href="volunteer.html">Volunteer</a></li>
                        <li class="primary-nav-item"><a href="schedule.html">My Schedule</a></li>
                    </ul>
                </nav>

                    <a href="contact.html" class="btn btn-pill btn-ghost-light">Contact</a>

    <main id="content" class="site-main" tabindex="-1" role="main">
        <div class="events-page">
            <div class="events-page-inner">
                <!-- Search controller & active filters -->
                <section class="events-search-section" aria-label="Search and filters">
                    <div class="events-search-shell">
                        <header class="events-page-header">
                            <h1 class="page-title" id="events-page-title">Events</h1>
                        </header>

                        <!-- Search controller -->
                        <div class="events-search-controller" data-component="events-search-controller">
                            <div data-populate="events-search-controller"></div>
                        </div>

                        <!-- Active filters summary -->
                        <div class="events-active-filters" data-component="events-active-filters-summary">
                            <div data-populate="events-active-filters-summary"></div>
                        </div>

                        <!-- Festival pass CTA strip -->
                        <section class="events-festival-pass-section" aria-label="Festival pass">
                            <div class="events-festival-pass-cta" data-component="events-festival-pass-cta-strip" data-populate="events-festival-pass-cta-strip"></div>
                        </section>
                    </div>
                </section>

                <!-- Results + sidebar layout -->
                <section class="events-results-section" aria-label="Event results">
                    <div class="events-layout">
                        <!-- Filter sidebar -->
                        <aside class="events-filter-column" data-component="events-filter-sidebar">
                            <button type="button" class="btn btn-pill btn-outline events-filter-toggle" data-action="toggle-filters-panel">
                                Filters
                            </button>
                            <div class="events-filter-sidebar-panel" data-populate="events-filter-sidebar"></div>
                        </aside>

                        <!-- Results column -->
                        <div class="events-results-column">
                            <!-- Context indicators -->
                            <div class="events-context-row">
                                <div class="events-context-indicators">
                                    <div class="events-context-indicator" data-component="events-venue-context-indicator" data-populate="events-venue-context-indicator"></div>
                                    <div class="events-context-indicator" data-component="events-low-cost-indicator" data-populate="events-low-cost-indicator"></div>
                                </div>
                            </div>

                            <!-- Meta + sort/view row -->
                            <div class="events-results-meta-row">
                                <div class="events-results-meta" data-component="events-results-meta" data-populate="events-results-meta"></div>
                                <div class="events-sort-view-controls" data-component="events-sort-and-view-controls" data-populate="events-sort-and-view-controls"></div>
                            </div>

                            <!-- Results list / empty state -->
                            <div class="events-results-main" aria-live="polite">
                                <div class="events-results-list-wrapper" data-component="events-results-list" data-populate="events-results-list"></div>
                                <div class="events-no-results-wrapper" data-component="events-no-results-state" data-populate="events-no-results-state"></div>
                            </div>

                            <!-- Pagination -->
                            <nav class="events-pagination" aria-label="Events pagination" data-component="events-pagination-controls" data-populate="events-pagination-controls"></nav>
                        </div>
                    </div>

                    <!-- Loading overlay -->
                    <div class="events-loading-overlay" data-component="events-filter-options-loader" hidden>
                        <div class="events-loading-backdrop"></div>
                        <div class="events-loading-indicator" role="status" aria-live="polite">
                            <span class="events-loading-spinner"></span>
                            <span class="events-loading-text">Loading events</span>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

                <a href="newsletter.html" class="footer-link">Newsletter Signup</a>
                <a href="privacy.html" class="footer-link">Privacy Policy</a>
                <a href="terms.html" class="footer-link">Terms &amp; Conditions</a>
            </div>

            </div>
        </div>

    <!-- SDK with WebsiteSDK.getEventFilterOptions and WebsiteSDK.searchEvents -->
    <script src="business_logic.js"></script>

    <!-- Events page UI logic -->
    <script>
    (function() {
        'use strict';

        var filterOptions = null;
        var currentState = null;
        var currentResults = null;

        var loaderEl = null;

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDateTimeRange(startStr, endStr, timeOfDayLabel) {
            if (!startStr) {
                return '';
            }
            try {
                var start = new Date(startStr);
                var end = endStr ? new Date(endStr) : null;
                var dateOptions = { weekday: 'short', month: 'short', day: 'numeric' };
                var timeOptions = { hour: 'numeric', minute: '2-digit' };
                var datePart = start.toLocaleDateString(undefined, dateOptions);
                var timePart = start.toLocaleTimeString(undefined, timeOptions);
                var result = datePart + ' \u00b7 ' + timePart;
                if (end && endStr !== startStr) {
                    var endTimePart = end.toLocaleTimeString(undefined, timeOptions);
                    result += ' - ' + endTimePart;
                }
                if (timeOfDayLabel) {
                    result += ' \u00b7 ' + timeOfDayLabel;
                }
                return result;
            } catch (e) {
                return startStr;
            }
        }

        function parseStateFromParams(urlParams, options) {
            var filters = {};
            var ui = {};

            var category = urlParams.get('category');
            if (category) {
                filters.category = category;
            }

            var audience = urlParams.get('audience');
            if (audience) {
                filters.audience = audience;
            }

            var date = urlParams.get('date');
            if (date) {
                filters.date = date;
            }

            var timeOfDay = urlParams.get('timeOfDay');
            if (timeOfDay) {
                filters.time_of_day = timeOfDay;
            }

            var maxPriceStr = urlParams.get('maxPrice');
            if (maxPriceStr) {
                var maxPriceNum = Number(maxPriceStr);
                if (!isNaN(maxPriceNum)) {
                    filters.max_price = maxPriceNum;
                    ui.maxPrice = maxPriceStr;
                }
            }

            var isFree = urlParams.get('isFree');
            if (isFree === 'true') {
                filters.is_free = true;
                ui.isFree = true;
            }

            var venueId = urlParams.get('venueId');
            if (venueId) {
                filters.venueId = venueId;
            }

            var locationType = urlParams.get('locationType');
            if (locationType) {
                filters.location_type = locationType;
            }

            var accessibility = urlParams.get('accessibility');
            if (accessibility) {
                ui.accessibility = accessibility;
                if (accessibility === 'wheelchair_accessible') {
                    filters.wheelchair_accessible = true;
                }
            }

            var ratingMinStr = urlParams.get('ratingMin');
            if (ratingMinStr) {
                var ratingMinNum = Number(ratingMinStr);
                if (!isNaN(ratingMinNum)) {
                    filters.rating_min = ratingMinNum;
                    ui.ratingMin = ratingMinStr;
                }
            }

            var priceRangeId = urlParams.get('priceRange');
            ui.priceRangeId = priceRangeId || '';
            if (priceRangeId && options && options.price_ranges && options.price_ranges.length) {
                for (var i = 0; i < options.price_ranges.length; i++) {
                    var pr = options.price_ranges[i];
                    if (pr.id === priceRangeId) {
                        if (typeof pr.min === 'number') {
                            if (typeof filters.max_price === 'number') {
                                filters.min_price = pr.min;
                            } else {
                                filters.min_price = pr.min;
                            }
                        }
                        if (typeof pr.max === 'number') {
                            filters.max_price = typeof filters.max_price === 'number' ? Math.min(filters.max_price, pr.max) : pr.max;
                        }
                        break;
                    }
                }
            }

            var q = urlParams.get('q');
            if (q) {
                ui.q = q;
                filters.q = q; // may be ignored by backend if unsupported
            }

            var sort = urlParams.get('sort') || 'date_ascending';

            var pageStr = urlParams.get('page');
            var page = parseInt(pageStr || '1', 10);
            if (!page || page < 1) {
                page = 1;
            }

            var pageSizeStr = urlParams.get('pageSize');
            var pageSize = parseInt(pageSizeStr || '20', 10);
            if (!pageSize || pageSize < 1) {
                pageSize = 20;
            }

            var viewParam = urlParams.get('view');
            var view = viewParam === 'list' ? 'list' : 'cards';

            return {
                filters: filters,
                sort: sort,
                pagination: {
                    page: page,
                    page_size: pageSize
                },
                view: view,
                ui: ui
            };
        }

        function renderSearchController(container, state) {
            var q = state && state.ui && state.ui.q ? state.ui.q : '';
            container.innerHTML = `
<form class="events-search-form" data-action="search-form" role="search" aria-label="Search events">
    <label class="visually-hidden" for="events-search-input">Search events</label>
    <input id="events-search-input" name="q" type="search" class="events-search-input" placeholder="Search by name, venue, or keyword" value="${escapeHtml(q)}">
    <button type="submit" class="btn btn-pill btn-primary events-search-submit">Search</button>
</form>`;
        }

        function renderFilterSidebar(container, options, state) {
            if (!options || !state) {
                container.innerHTML = '';
                return;
            }

            var filters = state.filters || {};
            var ui = state.ui || {};

            var categories = options.categories || [];
            var audiences = options.audiences || [];
            var times = options.time_of_day_options || [];
            var priceRanges = options.price_ranges || [];
            var venues = options.venues || [];
            var locationTypes = options.location_types || [];
            var accessibilityOptions = options.accessibility_options || [];

            var categoryOptionsHtml = categories.map(function(cat) {
                var selected = filters.category === cat.value ? ' selected' : '';
                return `<option value="${escapeHtml(cat.value)}"${selected}>${escapeHtml(cat.label)}</option>`;
            }).join('');

            var audienceOptionsHtml = audiences.map(function(aud) {
                var selected = filters.audience === aud.value ? ' selected' : '';
                return `<option value="${escapeHtml(aud.value)}"${selected}>${escapeHtml(aud.label)}</option>`;
            }).join('');

            var timeOptionsHtml = times.map(function(opt) {
                var selected = filters.time_of_day === opt.value ? ' selected' : '';
                return `<option value="${escapeHtml(opt.value)}"${selected}>${escapeHtml(opt.label)}</option>`;
            }).join('');

            var priceRangeOptionsHtml = priceRanges.map(function(pr) {
                var selected = state.ui && state.ui.priceRangeId === pr.id ? ' selected' : '';
                return `<option value="${escapeHtml(pr.id)}"${selected}>${escapeHtml(pr.label)}</option>`;
            }).join('');

            var venueOptionsHtml = venues.map(function(venue) {
                var selected = filters.venueId === venue.venue_id ? ' selected' : '';
                var name = venue.name || '';
                var city = venue.city ? ' b ' + venue.city : '';
                var neighborhood = venue.neighborhood ? ' b ' + venue.neighborhood : '';
                return `<option value="${escapeHtml(venue.venue_id)}"${selected}>${escapeHtml(name + city + neighborhood)}</option>`;
            }).join('');

            var locationTypeOptionsHtml = locationTypes.map(function(lt) {
                var selected = filters.location_type === lt.value ? ' selected' : '';
                return `<option value="${escapeHtml(lt.value)}"${selected}>${escapeHtml(lt.label)}</option>`;
            }).join('');

            var accessibilityOptionsHtml = accessibilityOptions.map(function(acc) {
                var selected = state.ui && state.ui.accessibility === acc.key ? ' selected' : '';
                return `<option value="${escapeHtml(acc.key)}"${selected}>${escapeHtml(acc.label)}</option>`;
            }).join('');

            var maxPriceValue = ui.maxPrice ? ui.maxPrice : '';

            var ratingMinValue = ui.ratingMin ? ui.ratingMin : '';

            var isFreeChecked = ui.isFree ? ' checked' : '';

            container.innerHTML = `
<form class="events-filter-form" aria-label="Filter events">
    <div class="filter-group">
        <h2 class="filter-group-title">Date &amp; time</h2>
        <label class="filter-field">
            <span class="filter-label">On date</span>
            <input type="date" value="${filters.date ? escapeHtml(filters.date) : ''}" data-action="filter-change" data-filter-param="date">
        </label>
        <label class="filter-field">
            <span class="filter-label">Time of day</span>
            <select data-action="filter-change" data-filter-param="timeOfDay">
                <option value="">Any time</option>
                ${timeOptionsHtml}
            </select>
        </label>
    </div>

    <div class="filter-group">
        <h2 class="filter-group-title">Category &amp; audience</h2>
        <label class="filter-field">
            <span class="filter-label">Category</span>
            <select data-action="filter-change" data-filter-param="category">
                <option value="">All categories</option>
                ${categoryOptionsHtml}
            </select>
        </label>
        <label class="filter-field">
            <span class="filter-label">Audience</span>
            <select data-action="filter-change" data-filter-param="audience">
                <option value="">All audiences</option>
                ${audienceOptionsHtml}
            </select>
        </label>
    </div>

    <div class="filter-group">
        <h2 class="filter-group-title">Price</h2>
        <label class="filter-field">
            <span class="filter-label">Price range</span>
            <select data-action="filter-change" data-filter-param="priceRange">
                <option value="">Any price</option>
                ${priceRangeOptionsHtml}
            </select>
        </label>
        <label class="filter-field">
            <span class="filter-label">Max price</span>
            <input type="number" min="0" step="1" value="${escapeHtml(maxPriceValue)}" placeholder="No max" data-action="filter-change" data-filter-param="maxPrice">
        </label>
        <label class="filter-checkbox">
            <input type="checkbox" data-action="filter-change" data-filter-param="isFree" value="true"${isFreeChecked}>
            <span>Free only</span>
        </label>
    </div>

    <div class="filter-group">
        <h2 class="filter-group-title">Location</h2>
        <label class="filter-field">
            <span class="filter-label">Venue</span>
            <select data-action="filter-change" data-filter-param="venueId">
                <option value="">All venues</option>
                ${venueOptionsHtml}
            </select>
        </label>
        <label class="filter-field">
            <span class="filter-label">Location type</span>
            <select data-action="filter-change" data-filter-param="locationType">
                <option value="">Any type</option>
                ${locationTypeOptionsHtml}
            </select>
        </label>
    </div>

    <div class="filter-group">
        <h2 class="filter-group-title">Accessibility &amp; rating</h2>
        <label class="filter-field">
            <span class="filter-label">Accessibility</span>
            <select data-action="filter-change" data-filter-param="accessibility">
                <option value="">Any</option>
                ${accessibilityOptionsHtml}
            </select>
        </label>
        <label class="filter-field">
            <span class="filter-label">Minimum rating</span>
            <select data-action="filter-change" data-filter-param="ratingMin">
                <option value="">Any rating</option>
                <option value="4"${ratingMinValue === '4' ? ' selected' : ''}>4.0+</option>
                <option value="3"${ratingMinValue === '3' ? ' selected' : ''}>3.0+</option>
            </select>
        </label>
    </div>

    <div class="filter-actions">
        <button type="button" class="btn btn-pill btn-ghost" data-action="clear-all-filters">Clear all filters</button>
    </div>
</form>`;
        }

        function renderActiveFiltersSummary(container, options, state) {
            if (!state) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }

            var filters = state.filters || {};
            var ui = state.ui || {};
            var chips = [];

            if (filters.category) {
                var categoryLabel = filters.category;
                if (options && options.categories) {
                    for (var i = 0; i < options.categories.length; i++) {
                        if (options.categories[i].value === filters.category) {
                            categoryLabel = options.categories[i].label;
                            break;
                        }
                    }
                }
                chips.push({ param: 'category', label: 'Category: ' + categoryLabel });
            }

            if (filters.audience) {
                var audienceLabel = filters.audience;
                if (options && options.audiences) {
                    for (var j = 0; j < options.audiences.length; j++) {
                        if (options.audiences[j].value === filters.audience) {
                            audienceLabel = options.audiences[j].label;
                            break;
                        }
                    }
                }
                chips.push({ param: 'audience', label: 'Audience: ' + audienceLabel });
            }

            if (filters.date) {
                chips.push({ param: 'date', label: 'Date: ' + filters.date });
            }

            if (filters.time_of_day) {
                var timeLabel = filters.time_of_day;
                if (options && options.time_of_day_options) {
                    for (var k = 0; k < options.time_of_day_options.length; k++) {
                        if (options.time_of_day_options[k].value === filters.time_of_day) {
                            timeLabel = options.time_of_day_options[k].label;
                            break;
                        }
                    }
                }
                chips.push({ param: 'timeOfDay', label: 'Time: ' + timeLabel });
            }

            if (ui.priceRangeId && options && options.price_ranges) {
                for (var prIndex = 0; prIndex < options.price_ranges.length; prIndex++) {
                    var pr = options.price_ranges[prIndex];
                    if (pr.id === ui.priceRangeId) {
                        chips.push({ param: 'priceRange', label: 'Price: ' + pr.label });
                        break;
                    }
                }
            }

            if (ui.maxPrice) {
                chips.push({ param: 'maxPrice', label: 'Max price: $' + ui.maxPrice });
            }

            if (ui.isFree) {
                chips.push({ param: 'isFree', label: 'Free events only' });
            }

            if (filters.venueId) {
                var venueLabel = 'Selected venue';
                if (options && options.venues) {
                    for (var v = 0; v < options.venues.length; v++) {
                        if (options.venues[v].venue_id === filters.venueId) {
                            venueLabel = options.venues[v].name;
                            break;
                        }
                    }
                }
                chips.push({ param: 'venueId', label: 'Venue: ' + venueLabel });
            }

            if (filters.location_type) {
                var ltLabel = filters.location_type;
                if (options && options.location_types) {
                    for (var lt = 0; lt < options.location_types.length; lt++) {
                        if (options.location_types[lt].value === filters.location_type) {
                            ltLabel = options.location_types[lt].label;
                            break;
                        }
                    }
                }
                chips.push({ param: 'locationType', label: 'Location: ' + ltLabel });
            }

            if (ui.accessibility) {
                var accLabel = ui.accessibility;
                if (options && options.accessibility_options) {
                    for (var a = 0; a < options.accessibility_options.length; a++) {
                        if (options.accessibility_options[a].key === ui.accessibility) {
                            accLabel = options.accessibility_options[a].label;
                            break;
                        }
                    }
                }
                chips.push({ param: 'accessibility', label: 'Accessibility: ' + accLabel });
            }

            if (ui.ratingMin) {
                chips.push({ param: 'ratingMin', label: 'Rating: ' + ui.ratingMin + '+ stars' });
            }

            if (ui.q) {
                chips.push({ param: 'q', label: 'Search: "' + ui.q + '"' });
            }

            if (!chips.length) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }

            var chipsHtml = chips.map(function(chip) {
                return `
<button type="button" class="chip chip-filter" data-action="remove-filter" data-filter-param="${escapeHtml(chip.param)}">
    <span class="chip-label">${escapeHtml(chip.label)}</span>
    <span class="chip-remove" aria-hidden="true">&times;</span>
    <span class="visually-hidden">Remove filter ${escapeHtml(chip.label)}</span>
</button>`;
            }).join('');

            container.removeAttribute('hidden');
            container.innerHTML = `
<div class="active-filters-inner">
    <div class="active-filters-header">
        <span class="active-filters-label">Active filters</span>
        <button type="button" class="btn-link clear-filters-link" data-action="clear-all-filters">Clear all</button>
    </div>
    <div class="active-filters-chips-row">
        ${chipsHtml}
    </div>
</div>`;
        }

        function renderResultsMeta(container, results, state) {
            if (!results || !state) {
                container.innerHTML = '';
                return;
            }
            var total = results.total_count || 0;
            var page = results.page || state.pagination.page || 1;
            var pageSize = results.page_size || state.pagination.page_size || 20;
            var start = total === 0 ? 0 : (page - 1) * pageSize + 1;
            var end = Math.min(total, page * pageSize);
            var text;
            if (!total) {
                text = '0 events found';
            } else {
                text = total + ' events \u00b7 Showing ' + start + '-' + end;
            }
            container.innerHTML = `<p class="results-meta-text">${escapeHtml(text)}</p>`;
        }

        function renderSortAndViewControls(container, options, state) {
            if (!options || !state) {
                container.innerHTML = '';
                return;
            }
            var sortOptions = options.sort_options || [];
            var currentSort = state.sort || 'date_ascending';
            var view = state.view || 'cards';

            var sortOptionsHtml = sortOptions.map(function(opt) {
                var selected = opt.value === currentSort ? ' selected' : '';
                return `<option value="${escapeHtml(opt.value)}"${selected}>${escapeHtml(opt.label)}</option>`;
            }).join('');

            var cardsActive = view === 'cards' ? ' is-active' : '';
            var listActive = view === 'list' ? ' is-active' : '';

            container.innerHTML = `
<div class="sort-view-controls">
    <label class="sort-control">
        <span class="filter-label">Sort by</span>
        <select data-action="sort-change">
            ${sortOptionsHtml}
        </select>
    </label>
    <div class="view-toggle" role="radiogroup" aria-label="View mode">
        <button type="button" class="view-toggle-btn${cardsActive}" data-action="change-view" data-view="cards" aria-pressed="${view === 'cards' ? 'true' : 'false'}">Cards</button>
        <button type="button" class="view-toggle-btn${listActive}" data-action="change-view" data-view="list" aria-pressed="${view === 'list' ? 'true' : 'false'}">List</button>
    </div>
</div>`;
        }

        function renderVenueContextIndicator(container, options, state) {
            if (!state || !state.filters || !state.filters.venueId) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }
            var venueName = 'Selected venue';
            if (options && options.venues) {
                for (var i = 0; i < options.venues.length; i++) {
                    if (options.venues[i].venue_id === state.filters.venueId) {
                        venueName = options.venues[i].name;
                        break;
                    }
                }
            }
            container.removeAttribute('hidden');
            container.innerHTML = `
<div class="context-pill">
    <span class="context-pill-label">At ${escapeHtml(venueName)}</span>
    <button type="button" class="context-pill-action" data-action="clear-venue-filter">Clear</button>
</div>`;
        }

        function renderLowCostIndicator(container, options, state) {
            if (!state) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }
            var ui = state.ui || {};
            var hasMax = !!ui.maxPrice;
            var hasRange = !!ui.priceRangeId;
            if (!hasMax && !hasRange) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }

            var label = 'Low-cost focus';
            if (hasRange && options && options.price_ranges) {
                for (var i = 0; i < options.price_ranges.length; i++) {
                    if (options.price_ranges[i].id === ui.priceRangeId) {
                        label = options.price_ranges[i].label;
                        break;
                    }
                }
            } else if (hasMax) {
                label = 'Up to $' + ui.maxPrice;
            }

            container.removeAttribute('hidden');
            container.innerHTML = `
<div class="context-pill">
    <span class="context-pill-label">${escapeHtml(label)}</span>
    <button type="button" class="context-pill-action" data-action="adjust-max-price">Adjust</button>
    <button type="button" class="context-pill-action" data-action="clear-max-price">Clear</button>
</div>`;
        }

        function renderFestivalPassCtaStrip(container, options, results, state) {
            if (!state || !state.filters || !state.filters.category || !results || !results.total_count) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }

            var categoryValue = state.filters.category;
            var categoryLabel = categoryValue;
            if (options && options.categories) {
                for (var i = 0; i < options.categories.length; i++) {
                    if (options.categories[i].value === categoryValue) {
                        categoryLabel = options.categories[i].label;
                        break;
                    }
                }
            }

            container.removeAttribute('hidden');
            container.innerHTML = `
<div class="festival-pass-cta-strip">
    <div class="festival-pass-cta-content">
        <p class="festival-pass-cta-text">Planning a few ${escapeHtml(categoryLabel.toLowerCase ? categoryLabel.toLowerCase() : categoryLabel)} events? Build a 3-event festival pass.</p>
        <button type="button" class="btn btn-pill btn-light festival-pass-cta-button" data-action="festival-pass-cta">Add similar events to a festival pass</button>
    </div>
</div>`;
        }

        function renderResultsList(container, results, state) {
            if (!results || !state) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }
            var items = results.results || [];
            if (!items.length) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }
            var view = state.view || 'cards';

            var cardsHtml = items.map(function(item) {
                var priceText;
                if (item.is_free) {
                    priceText = 'Free';
                } else if (typeof item.price === 'number') {
                    var currencyPrefix = item.currency ? item.currency + ' ' : '$';
                    priceText = currencyPrefix + item.price.toFixed(2);
                } else {
                    priceText = 'See details';
                }

                var ratingHtml = '';
                if (typeof item.rating === 'number' && typeof item.rating_count === 'number' && item.rating_count > 0) {
                    ratingHtml = `
<div class="event-rating" aria-label="Rated ${escapeHtml(item.rating.toFixed(1))} out of 5 from ${escapeHtml(item.rating_count)} reviews">
    <span class="event-rating-score">${escapeHtml(item.rating.toFixed(1))}</span>
    <span class="event-rating-count">(${escapeHtml(item.rating_count)})</span>
</div>`;
                }

                var scheduleBadge = item.is_in_schedule ? '<span class="event-badge">In your schedule</span>' : '';
                var favoriteBadge = item.is_in_favorites ? '<span class="event-badge">In favorites</span>' : '';

                var datetimeText = formatDateTimeRange(item.start_datetime, item.end_datetime, item.time_of_day_label);

                var categoryChip = item.category_label ? `<span class="chip chip-outline chip-small">${escapeHtml(item.category_label)}</span>` : '';
                var audienceChip = item.audience_label ? `<span class="chip chip-outline chip-small">${escapeHtml(item.audience_label)}</span>` : '';
                var locationChip = item.location_type_label ? `<span class="chip chip-outline chip-small">${escapeHtml(item.location_type_label)}</span>` : '';
                var accessibilityChip = item.wheelchair_accessible ? '<span class="chip chip-outline chip-small">Wheelchair accessible</span>' : '';

                var imageHtml = '';
                if (item.image_url) {
                    imageHtml = `
<div class="event-card-media">
    <img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.short_title || item.title || 'Event image')}">
</div>`;
                }

                return `
<article class="event-card event-card--${escapeHtml(view)}" data-event-id="${escapeHtml(item.event_id || '')}" data-action="open-event">
    ${imageHtml}
    <div class="event-card-body">
        <header class="event-card-header">
            <p class="event-card-datetime">${escapeHtml(datetimeText)}</p>
            <h2 class="event-card-title">
                <a href="javascript:void(0)" class="event-card-title-link" data-action="open-event" data-event-id="${escapeHtml(item.event_id || '')}">
                    ${escapeHtml(item.title || '')}
                </a>
            </h2>
            <div class="event-card-tags">
                ${categoryChip}
                ${audienceChip}
                ${locationChip}
                ${accessibilityChip}
            </div>
        </header>
        <p class="event-card-description">${escapeHtml(item.description_snippet || '')}</p>
        <div class="event-card-footer">
            <div class="event-card-venue-price">
                ${item.venue_name ? `<button type="button" class="link-button event-card-venue" data-action="open-venue" data-venue-id="${escapeHtml(item.venue_id || '')}">${escapeHtml(item.venue_name)}</button>` : ''}
                <span class="event-card-price">${escapeHtml(priceText)}</span>
            </div>
            <div class="event-card-meta">
                ${ratingHtml}
                ${scheduleBadge}
                ${favoriteBadge}
            </div>
        </div>
    </div>
</article>`;
            }).join('');

            container.removeAttribute('hidden');
            container.innerHTML = `<div class="event-card-list event-card-list--${escapeHtml(view)}">${cardsHtml}</div>`;
        }

        function renderPaginationControls(container, results, state) {
            if (!results || !state || !results.total_count) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }
            var total = results.total_count || 0;
            var pageSize = results.page_size || state.pagination.page_size || 20;
            var currentPage = results.page || state.pagination.page || 1;
            var totalPages = Math.ceil(total / pageSize);

            if (totalPages <= 1) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }

            var buttons = [];

            if (currentPage > 1) {
                buttons.push(`<button type="button" class="pagination-btn pagination-prev" data-action="change-page" data-page="${currentPage - 1}">Previous</button>`);
            }

            var maxButtons = 7;
            var startPage = Math.max(1, currentPage - 2);
            var endPage = Math.min(totalPages, currentPage + 2);
            if (totalPages > maxButtons) {
                if (currentPage <= 3) {
                    startPage = 1;
                    endPage = 5;
                } else if (currentPage >= totalPages - 2) {
                    startPage = totalPages - 4;
                    endPage = totalPages;
                }
            } else {
                startPage = 1;
                endPage = totalPages;
            }

            if (startPage > 1) {
                buttons.push(`<button type="button" class="pagination-btn" data-action="change-page" data-page="1">1</button>`);
                if (startPage > 2) {
                    buttons.push('<span class="pagination-ellipsis">&hellip;</span>');
                }
            }

            for (var p = startPage; p <= endPage; p++) {
                if (p === currentPage) {
                    buttons.push(`<button type="button" class="pagination-btn is-active" aria-current="page" data-action="change-page" data-page="${p}">${p}</button>`);
                } else {
                    buttons.push(`<button type="button" class="pagination-btn" data-action="change-page" data-page="${p}">${p}</button>`);
                }
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    buttons.push('<span class="pagination-ellipsis">&hellip;</span>');
                }
                buttons.push(`<button type="button" class="pagination-btn" data-action="change-page" data-page="${totalPages}">${totalPages}</button>`);
            }

            if (currentPage < totalPages) {
                buttons.push(`<button type="button" class="pagination-btn pagination-next" data-action="change-page" data-page="${currentPage + 1}">Next</button>`);
            }

            container.removeAttribute('hidden');
            container.innerHTML = `<div class="pagination-inner">${buttons.join('')}</div>`;
        }

        function renderNoResultsState(container, results, state) {
            if (!results || (results.total_count && results.total_count > 0)) {
                container.innerHTML = '';
                container.setAttribute('hidden', 'hidden');
                return;
            }
            container.removeAttribute('hidden');
            container.innerHTML = `
<div class="no-results">
    <h2 class="no-results-title">No events match your filters</h2>
    <p class="no-results-text">Try clearing or adjusting your filters to discover more events.</p>
    <div class="no-results-actions">
        <button type="button" class="btn btn-pill btn-primary" data-action="clear-all-filters">Clear all filters</button>
        <button type="button" class="btn btn-pill btn-outline" data-action="adjust-filters-empty-state">Adjust filters</button>
    </div>
</div>`;
        }

        function renderAll() {
            var populateElements = document.querySelectorAll('[data-populate]');
            for (var i = 0; i < populateElements.length; i++) {
                var el = populateElements[i];
                var type = el.getAttribute('data-populate');
                if (!type) {
                    continue;
                }
                if (type === 'events-search-controller') {
                    renderSearchController(el, currentState);
                } else if (type === 'events-filter-sidebar') {
                    renderFilterSidebar(el, filterOptions, currentState);
                } else if (type === 'events-active-filters-summary') {
                    renderActiveFiltersSummary(el, filterOptions, currentState);
                } else if (type === 'events-results-meta') {
                    renderResultsMeta(el, currentResults, currentState);
                } else if (type === 'events-sort-and-view-controls') {
                    renderSortAndViewControls(el, filterOptions, currentState);
                } else if (type === 'events-venue-context-indicator') {
                    renderVenueContextIndicator(el, filterOptions, currentState);
                } else if (type === 'events-low-cost-indicator') {
                    renderLowCostIndicator(el, filterOptions, currentState);
                } else if (type === 'events-festival-pass-cta-strip') {
                    renderFestivalPassCtaStrip(el, filterOptions, currentResults, currentState);
                } else if (type === 'events-results-list') {
                    renderResultsList(el, currentResults, currentState);
                } else if (type === 'events-pagination-controls') {
                    renderPaginationControls(el, currentResults, currentState);
                } else if (type === 'events-no-results-state') {
                    renderNoResultsState(el, currentResults, currentState);
                }
            }
        }

        function showLoader() {
            if (!loaderEl) {
                loaderEl = document.querySelector('[data-component="events-filter-options-loader"]');
            }
            if (loaderEl) {
                loaderEl.removeAttribute('hidden');
            }
        }

        function hideLoader() {
            if (loaderEl) {
                loaderEl.setAttribute('hidden', 'hidden');
            }
        }

        function applyStateFromUrl(shouldSearch) {
            if (shouldSearch === undefined) {
                shouldSearch = true;
            }
            if (!filterOptions) {
                return;
            }
            var urlParams = new URLSearchParams(window.location.search);
            currentState = parseStateFromParams(urlParams, filterOptions);

            if (!shouldSearch) {
                renderAll();
                return;
            }

            showLoader();
            try {
                currentResults = WebsiteSDK.searchEvents(currentState.filters, currentState.sort, currentState.pagination);
            } catch (e) {
                console.error('Error searching events', e);
                currentResults = {
                    results: [],
                    total_count: 0,
                    page: currentState.pagination.page,
                    page_size: currentState.pagination.page_size
                };
            }
            hideLoader();
            renderAll();
        }

        function updateUrlAndSearch(modifyParamsFn) {
            var url = new URL(window.location.href);
            var params = url.searchParams;
            modifyParamsFn(params);
            url.search = params.toString();
            window.history.pushState({}, '', url.toString());
            applyStateFromUrl(true);
        }

        function handleFilterChange(target) {
            var param = target.getAttribute('data-filter-param');
            if (!param) {
                return;
            }
            updateUrlAndSearch(function(params) {
                var value;
                if (target.type === 'checkbox') {
                    value = target.checked ? (target.value || 'true') : '';
                } else {
                    value = (target.value || '').trim();
                }

                if (param === 'isFree') {
                    if (target.checked) {
                        params.set('isFree', 'true');
                    } else {
                        params.delete('isFree');
                    }
                } else if (param === 'maxPrice') {
                    if (value) {
                        params.set('maxPrice', value);
                    } else {
                        params.delete('maxPrice');
                    }
                } else if (param === 'ratingMin') {
                    if (value) {
                        params.set('ratingMin', value);
                    } else {
                        params.delete('ratingMin');
                    }
                } else if (param === 'priceRange') {
                    if (value) {
                        params.set('priceRange', value);
                    } else {
                        params.delete('priceRange');
                    }
                } else {
                    if (value) {
                        params.set(param, value);
                    } else {
                        params.delete(param);
                    }
                }
                params.delete('page');
            });
        }

        function handleRemoveFilter(target) {
            var param = target.getAttribute('data-filter-param');
            if (!param) {
                return;
            }
            updateUrlAndSearch(function(params) {
                params.delete(param);
                if (param === 'priceRange') {
                    // removing price range only clears that param; maxPrice handled separately
                }
                params.delete('page');
            });
        }

        function handleClearAllFilters() {
            var filterKeys = ['category', 'audience', 'date', 'timeOfDay', 'maxPrice', 'venueId', 'locationType', 'accessibility', 'priceRange', 'q', 'isFree', 'ratingMin'];
            updateUrlAndSearch(function(params) {
                for (var i = 0; i < filterKeys.length; i++) {
                    params.delete(filterKeys[i]);
                }
                params.delete('page');
            });
        }

        function handleChangePage(target) {
            var pageStr = target.getAttribute('data-page');
            var page = parseInt(pageStr || '1', 10);
            if (!page || page < 1) {
                return;
            }
            updateUrlAndSearch(function(params) {
                params.set('page', String(page));
            });
        }

        function handleSortChange(target) {
            var value = (target.value || '').trim();
            updateUrlAndSearch(function(params) {
                if (value) {
                    params.set('sort', value);
                } else {
                    params.delete('sort');
                }
                params.delete('page');
            });
        }

        function handleChangeView(target) {
            if (!currentState) {
                return;
            }
            var view = target.getAttribute('data-view') || 'cards';
            if (view !== 'cards' && view !== 'list') {
                view = 'cards';
            }
            if (currentState.view === view) {
                return;
            }
            currentState.view = view;
            var url = new URL(window.location.href);
            var params = url.searchParams;
            params.set('view', view);
            url.search = params.toString();
            window.history.pushState({}, '', url.toString());
            renderAll();
        }

        function handleOpenEvent(target) {
            var eventId = target.getAttribute('data-event-id');
            if (!eventId) {
                var parentId = target.getAttribute('data-event-id');
                eventId = parentId;
            }
            if (!eventId) {
                return;
            }
            var url = 'event_detail.html?eventId=' + encodeURIComponent(eventId) + '&from=events';
            window.location.href = url;
        }

        function handleOpenVenue(target) {
            var venueId = target.getAttribute('data-venue-id');
            if (!venueId) {
                return;
            }
            var url = 'venue_detail.html?venueId=' + encodeURIComponent(venueId);
            window.location.href = url;
        }

        function handleClearVenueFilter() {
            updateUrlAndSearch(function(params) {
                params.delete('venueId');
                params.delete('page');
            });
        }

        function handleClearMaxPrice() {
            updateUrlAndSearch(function(params) {
                params.delete('maxPrice');
                params.delete('priceRange');
                params.delete('page');
            });
        }

        function handleAdjustMaxPrice() {
            var maxPriceInput = document.querySelector('[data-filter-param="maxPrice"]');
            if (maxPriceInput) {
                maxPriceInput.focus();
            }
            var sidebar = document.querySelector('[data-component="events-filter-sidebar"]');
            if (sidebar) {
                sidebar.classList.add('is-open');
            }
        }

        function handleAdjustFiltersEmptyState() {
            var sidebar = document.querySelector('[data-component="events-filter-sidebar"]');
            if (sidebar) {
                sidebar.scrollIntoView({ behavior: 'smooth', block: 'start' });
                sidebar.classList.add('is-open');
            }
        }

        function handleToggleFiltersPanel(target) {
            var sidebar = target.closest('[data-component="events-filter-sidebar"]');
            if (sidebar) {
                if (sidebar.classList.contains('is-open')) {
                    sidebar.classList.remove('is-open');
                } else {
                    sidebar.classList.add('is-open');
                }
            }
        }

        function handleFestivalPassCta() {
            if (!currentState || !currentState.filters || !currentState.filters.category) {
                return;
            }
            var category = currentState.filters.category;
            var url = 'festival_pass_builder.html?passType=create_your_own_3_event_pass&preselectCategory=' + encodeURIComponent(category);
            window.location.href = url;
        }

        function handleSearchSubmit(form) {
            var input = form.querySelector('input[name="q"]');
            var value = input ? input.value.trim() : '';
            updateUrlAndSearch(function(params) {
                if (value) {
                    params.set('q', value);
                } else {
                    params.delete('q');
                }
                params.delete('page');
            });
        }

        function onDocumentClick(event) {
            var target = event.target.closest('[data-action]');
            if (!target) {
                return;
            }
            var action = target.getAttribute('data-action');
            if (!action) {
                return;
            }

            if (action === 'remove-filter') {
                event.preventDefault();
                handleRemoveFilter(target);
            } else if (action === 'clear-all-filters') {
                event.preventDefault();
                handleClearAllFilters();
            } else if (action === 'change-page') {
                event.preventDefault();
                handleChangePage(target);
            } else if (action === 'change-view') {
                event.preventDefault();
                handleChangeView(target);
            } else if (action === 'open-event') {
                event.preventDefault();
                handleOpenEvent(target);
            } else if (action === 'open-venue') {
                event.preventDefault();
                handleOpenVenue(target);
            } else if (action === 'clear-venue-filter') {
                event.preventDefault();
                handleClearVenueFilter();
            } else if (action === 'clear-max-price') {
                event.preventDefault();
                handleClearMaxPrice();
            } else if (action === 'adjust-max-price') {
                event.preventDefault();
                handleAdjustMaxPrice();
            } else if (action === 'adjust-filters-empty-state') {
                event.preventDefault();
                handleAdjustFiltersEmptyState();
            } else if (action === 'toggle-filters-panel') {
                event.preventDefault();
                handleToggleFiltersPanel(target);
            } else if (action === 'festival-pass-cta') {
                event.preventDefault();
                handleFestivalPassCta();
            }
        }

        function onDocumentChange(event) {
            var target = event.target;
            var action = target.getAttribute('data-action');
            if (!action) {
                return;
            }
            if (action === 'filter-change') {
                handleFilterChange(target);
            } else if (action === 'sort-change') {
                handleSortChange(target);
            }
        }

        function onDocumentSubmit(event) {
            var form = event.target;
            if (!form || form.getAttribute('data-action') !== 'search-form') {
                return;
            }
            event.preventDefault();
            handleSearchSubmit(form);
        }

        function init() {
            loaderEl = document.querySelector('[data-component="events-filter-options-loader"]');
            try {
                filterOptions = WebsiteSDK.getEventFilterOptions();
            } catch (e) {
                console.error('Error loading event filter options', e);
                filterOptions = {};
            }
            applyStateFromUrl(true);

            document.addEventListener('click', onDocumentClick);
            document.addEventListener('change', onDocumentChange);
            document.addEventListener('submit', onDocumentSubmit);

            window.addEventListener('popstate', function() {
                applyStateFromUrl(true);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>

    <script>
        (function () {
            var yearEl = document.querySelector('.current-year');
            if (yearEl) {
                yearEl.textContent = new Date().getFullYear();
            }
        })();
    </script>
</body>
</html>
