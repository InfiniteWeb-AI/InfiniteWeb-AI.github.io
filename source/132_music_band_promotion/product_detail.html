<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Band Name — Product Detail</title>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='product_detail.css'>
  <script src='business_logic.js'></script>
</head>
<body>
  <header class='site-header'>
    <div class='container header-inner'>
      <button class='nav-toggle' type='button' aria-label='Toggle navigation'>
        <span class='nav-toggle-line'></span>
        <span class='nav-toggle-line'></span>
        <span class='nav-toggle-line'></span>
      </button>

      <nav class='primary-nav' aria-label='Main'>
        <ul class='primary-nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link is-active' title='Homepage'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='tour.html' class='nav-link' title='Upcoming shows and ticket listings'>Tour</a>
          </li>
          <li class='nav-item'>
            <a href='discography.html' class='nav-link' title='Albums and song library'>Music</a>
          </li>
          <li class='nav-item'>
            <a href='store.html' class='nav-link' title='Merchandise store and categories'>Store</a>
          </li>
          <li class='nav-item'>
            <a href='fan_club.html' class='nav-link' title='Membership plans and signup'>Fan Club</a>
          </li>
          <li class='nav-item'>
            <a href='lyrics.html' class='nav-link' title='Search and browse song lyrics'>Lyrics</a>
          </li>
          <li class='nav-item'>
            <a href='contact_booking.html' class='nav-link' title='General contact and event booking requests'>Contact / Booking</a>
          </li>
        </ul>
      </nav>

      <a href='fan_club.html' class='header-cta' title='Join the fan club'>Join Fan Club</a>
    </div>
  </header>

  <main id='content' class='site-main' role='main'>
    <section class='product-detail-page' data-component='product-detail-page-controller'>
      <div class='product-detail-page-inner container'>
        <!-- Top controller bar with mini cart -->
        <div class='product-detail-topbar'>
          <div class='product-detail-topbar-left'>
            <p class='product-detail-crumb'>
              <span class='crumb-label'>Store</span>
              <span class='crumb-separator'>/</span>
              <span class='crumb-current'>Product Detail</span>
            </p>
          </div>
          <div class='product-detail-topbar-right'>
            <button type='button' class='cart-summary-indicator btn-pill' data-component='cart-summary-indicator' data-action='view-cart' aria-label='View cart'>
              <span class='cart-summary-text'>Cart</span>
              <span class='cart-summary-meta'>· 0 items — 0.00</span>
            </button>
          </div>
        </div>

        <!-- Loading state for main content -->
        <div class='product-loading-state' data-state-element='loading'>
          <p class='loading-text'>Loading product details…</p>
        </div>

        <!-- Main product info block -->
        <section class='product-main-info-block' data-component='product-main-info' data-populate='product-details' aria-live='polite'>
          <!-- Filled via JavaScript -->
        </section>

        <!-- Configuration band: variants, bundle options, quantity, add-to-cart -->
        <section class='product-config-band'>
          <div class='product-variant-selector-block' data-component='product-variant-selector' aria-live='polite'>
            <!-- Variant selector rendered via JavaScript -->
          </div>

          <div class='bundle-options-panel' data-component='bundle-options-panel' hidden aria-live='polite'>
            <!-- Bundle included items and any bundle-specific notes rendered via JavaScript -->
          </div>

          <div class='product-purchase-row'>
            <div class='quantity-selector-block' data-component='quantity-selector'>
              <!-- Quantity selector rendered via JavaScript -->
            </div>
            <div class='add-to-cart-form-block' data-component='add-to-cart-form'>
              <!-- Add-to-cart form rendered via JavaScript -->
            </div>
          </div>

          <div class='feedback-and-error-region'>
            <div class='add-to-cart-feedback-panel' data-component='add-to-cart-feedback' hidden aria-live='polite'>
              <!-- Success / failure feedback rendered via JavaScript -->
            </div>
            <div class='error-state-display-panel' data-component='error-state-display' hidden aria-live='polite'>
              <!-- Error messages (load, validation, API) rendered via JavaScript -->
            </div>
          </div>
        </section>

        <!-- Product imagery / gallery -->
        <section class='product-image-gallery-block' data-component='product-image-gallery'>
          <!-- Image gallery rendered via JavaScript -->
        </section>
      </div>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='container footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'><a href='about.html' class='footer-link' title='About the band'>About</a></li>
          <li class='footer-nav-item'><a href='faq.html' class='footer-link' title='Frequently asked questions'>FAQ</a></li>
          <li class='footer-nav-item'><a href='newsletter.html' class='footer-link' title='Subscribe to email updates'>Newsletter</a></li>
          <li class='footer-nav-item'><a href='tour.html' class='footer-link' title='Upcoming concerts and tickets'>Tour Dates</a></li>
          <li class='footer-nav-item'><a href='store.html' class='footer-link' title='Band merchandise store'>Store</a></li>
          <li class='footer-nav-item'><a href='fan_club.html' class='footer-link' title='Join the fan club'>Fan Club</a></li>
          <li class='footer-nav-item'><a href='contact_booking.html' class='footer-link' title='Contact the band or submit booking requests'>Contact / Booking</a></li>
          <li class='footer-nav-item'><a href='policies.html' class='footer-link' title='Terms of use and privacy policy'>Policies</a></li>
        </ul>
      </nav>

      <div class='footer-meta'>
        <p class='footer-copy'>&copy; <span class='footer-brand'>Band Name</span> <span class='footer-year'>2026</span>. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script>
  'use strict';

  document.addEventListener('DOMContentLoaded', function () {
    // Page-level state
    const state = {
      productId: null,
      product: null,
      variants: [],
      isLoading: false,
      loadError: null,
      selectedColor: null,
      selectedSize: null,
      selectedVariant: null,
      configurationUnavailable: false,
      quantity: 1,
      quantityError: null,
      addToCartLoading: false,
      addToCartResult: null,
      addToCartError: null,
      cartSummary: null,
      urlSelections: { color: null, size: null }
    };

    // Cache components
    const mainInfoEl = document.querySelector('[data-component="product-main-info"]');
    const variantSelectorEl = document.querySelector('[data-component="product-variant-selector"]');
    const bundleOptionsEl = document.querySelector('[data-component="bundle-options-panel"]');
    const quantitySelectorEl = document.querySelector('[data-component="quantity-selector"]');
    const addToCartFormEl = document.querySelector('[data-component="add-to-cart-form"]');
    const addToCartFeedbackEl = document.querySelector('[data-component="add-to-cart-feedback"]');
    const errorDisplayEl = document.querySelector('[data-component="error-state-display"]');
    const galleryEl = document.querySelector('[data-component="product-image-gallery"]');
    const cartSummaryIndicatorEl = document.querySelector('[data-component="cart-summary-indicator"]');
    const loadingStateEl = document.querySelector('[data-state-element="loading"]');

    // URL params
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('product_id');
    const urlColor = urlParams.get('color');
    const urlSize = urlParams.get('size');

    state.productId = productId;
    state.urlSelections.color = urlColor;
    state.urlSelections.size = urlSize;

    // Generic helper: price formatting
    function formatPrice(amount, currency) {
      if (typeof amount !== 'number' || isNaN(amount)) {
        return '';
      }
      const cur = currency || 'USD';
      try {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: cur }).format(amount);
      } catch (e) {
        return amount.toFixed(2) + ' ' + cur;
      }
    }

    // Simple HTML escaping for interpolations
    function escapeHtml(value) {
      if (value === null || value === undefined) return '';
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function humanizeProductType(type) {
      switch (type) {
        case 't_shirt': return 'T-Shirt';
        case 'hoodie': return 'Hoodie';
        case 'poster': return 'Poster';
        case 'bundle': return 'Bundle';
        case 'music': return 'Music';
        case 'accessory': return 'Accessory';
        default: return 'Product';
      }
    }

    // Variant resolution helpers
    function isVariantInStock(variant) {
      if (!variant) return false;
      if (typeof variant.stock_quantity !== 'number') return true; // treat missing as in stock
      return variant.stock_quantity > 0;
    }

    function findVariantByAttributes(color, size) {
      if (!state.variants || state.variants.length === 0) return null;
      let match = null;
      state.variants.forEach(function (variant) {
        const colorMatches = color ? variant.color === color : true;
        const sizeMatches = size ? variant.size === size : true;
        if (colorMatches && sizeMatches) {
          if (!match) {
            match = variant;
          }
        }
      });
      return match;
    }

    function pickDefaultVariant() {
      if (!state.variants || state.variants.length === 0) return null;
      // Prefer explicit default and in stock
      let defaultVariant = null;
      state.variants.forEach(function (variant) {
        if (variant.is_default) {
          if (!defaultVariant || isVariantInStock(variant)) {
            defaultVariant = variant;
          }
        }
      });
      if (defaultVariant && isVariantInStock(defaultVariant)) {
        return defaultVariant;
      }
      // First in-stock
      for (let i = 0; i < state.variants.length; i += 1) {
        if (isVariantInStock(state.variants[i])) {
          return state.variants[i];
        }
      }
      // Fallback: first variant even if out of stock
      return state.variants[0];
    }

    function clampQuantity(value) {
      let q = parseInt(value, 10);
      if (!q || q < 1) q = 1;
      let max = Infinity;
      if (state.selectedVariant && typeof state.selectedVariant.stock_quantity === 'number') {
        if (state.selectedVariant.stock_quantity > 0) {
          max = state.selectedVariant.stock_quantity;
        } else {
          max = 0;
        }
      }
      if (max === 0) {
        q = 0;
      } else if (q > max) {
        q = max;
      }
      return q;
    }

    function computeTotalPrice() {
      const unitPrice = state.selectedVariant ? state.selectedVariant.price : (state.product ? state.product.base_price : 0);
      if (!unitPrice || !state.quantity || state.quantity <= 0) return 0;
      return unitPrice * state.quantity;
    }

    // Rendering functions (each takes its container directly)
    function renderLoadingState() {
      if (!loadingStateEl) return;
      if (state.isLoading) {
        loadingStateEl.style.display = '';
      } else {
        loadingStateEl.style.display = 'none';
      }
    }

    function renderProductMainInfo(container, s) {
      if (!container) return;
      if (s.loadError && !s.product) {
        container.innerHTML = '';
        return;
      }
      if (s.isLoading && !s.product) {
        container.innerHTML = '';
        return;
      }
      if (!s.product) {
        container.innerHTML = '';
        return;
      }
      const p = s.product;
      const title = escapeHtml(p.name || '');
      const description = escapeHtml(p.description || '');
      const typeLabel = humanizeProductType(p.product_type);
      const category = p.category_name ? escapeHtml(p.category_name) : '';
      const basePriceLabel = formatPrice(p.base_price, p.currency);

      container.innerHTML = `
        <div class='product-main-info'>
          <div class='product-main-info-text'>
            <h1 class='product-title'>${title}</h1>
            <div class='product-meta-row'>
              ${category ? `<span class='product-meta product-category'>${category}</span>` : ''}
              <span class='product-meta product-type'>${escapeHtml(typeLabel)}</span>
            </div>
            <p class='product-base-price'>Base price: <span class='price-value'>${basePriceLabel}</span></p>
            ${description ? `<p class='product-description'>${description}</p>` : ''}
          </div>
        </div>
      `;
    }

    function renderVariantSelector(container, s) {
      if (!container) return;
      if (!s.product || !s.variants || s.variants.length === 0 || s.loadError) {
        container.innerHTML = '';
        return;
      }

      const colors = Array.isArray(s.product.available_colors) ? s.product.available_colors : [];
      const sizes = Array.isArray(s.product.available_sizes) ? s.product.available_sizes : [];
      const hasColors = colors.length > 0;
      const hasSizes = sizes.length > 0;

      const selectedVariant = s.selectedVariant;
      const hasSelectedVariant = !!selectedVariant;
      const unitPrice = hasSelectedVariant ? selectedVariant.price : s.product.base_price;
      const unitPriceLabel = formatPrice(unitPrice, s.product.currency);

      let stockLabel = '';
      let stockClass = '';
      if (!hasSelectedVariant || s.configurationUnavailable) {
        stockLabel = 'This configuration is unavailable.';
        stockClass = 'stock-unavailable';
      } else if (!isVariantInStock(selectedVariant)) {
        stockLabel = 'Out of stock for this configuration.';
        stockClass = 'stock-unavailable';
      } else if (typeof selectedVariant.stock_quantity === 'number') {
        if (selectedVariant.stock_quantity <= 3) {
          stockLabel = 'Only ' + selectedVariant.stock_quantity + ' left in stock.';
          stockClass = 'stock-low';
        } else {
          stockLabel = 'In stock (' + selectedVariant.stock_quantity + ' available).';
          stockClass = 'stock-available';
        }
      } else {
        stockLabel = 'In stock.';
        stockClass = 'stock-available';
      }

      const colorChipsHtml = hasColors
        ? colors.map(function (color) {
            let chipClass = 'option-chip';
            if (color === s.selectedColor) {
              chipClass += ' is-active';
            }
            // Determine if any variant exists for this color with current size
            const variantForColor = findVariantByAttributes(color, s.selectedSize);
            if (!variantForColor) {
              chipClass += ' is-disabled';
            } else if (!isVariantInStock(variantForColor)) {
              chipClass += ' is-out-of-stock';
            }
            return `
              <button type='button'
                      class='${chipClass}'
                      data-action='select-color'
                      data-color='${escapeHtml(color)}'>
                <span class='option-label'>${escapeHtml(color)}</span>
              </button>
            `;
          }).join('')
        : '';

      const sizeChipsHtml = hasSizes
        ? sizes.map(function (size) {
            let chipClass = 'option-chip';
            if (size === s.selectedSize) {
              chipClass += ' is-active';
            }
            const variantForSize = findVariantByAttributes(s.selectedColor, size);
            if (!variantForSize) {
              chipClass += ' is-disabled';
            } else if (!isVariantInStock(variantForSize)) {
              chipClass += ' is-out-of-stock';
            }
            return `
              <button type='button'
                      class='${chipClass}'
                      data-action='select-size'
                      data-size='${escapeHtml(size)}'>
                <span class='option-label'>${escapeHtml(size.toUpperCase ? size.toUpperCase() : size)}</span>
              </button>
            `;
          }).join('')
        : '';

      container.innerHTML = `
        <div class='variant-selector'>
          <h2 class='config-heading'>Select options</h2>
          ${hasColors ? `
            <div class='variant-group variant-group-colors'>
              <div class='variant-group-label'>Color</div>
              <div class='variant-group-options'>
                ${colorChipsHtml}
              </div>
            </div>
          ` : ''}
          ${hasSizes ? `
            <div class='variant-group variant-group-sizes'>
              <div class='variant-group-label'>Size</div>
              <div class='variant-group-options'>
                ${sizeChipsHtml}
              </div>
            </div>
          ` : ''}
          <div class='variant-summary'>
            <div class='variant-price-row'>
              <span class='variant-summary-label'>Unit price</span>
              <span class='variant-summary-value'>${unitPriceLabel}</span>
            </div>
            <div class='variant-stock-row ${stockClass}'>
              <span class='variant-stock-text'>${escapeHtml(stockLabel)}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderBundleOptions(container, s) {
      if (!container) return;
      if (!s.product || !s.product.is_bundle) {
        container.hidden = true;
        container.innerHTML = '';
        return;
      }
      const included = Array.isArray(s.product.included_items) ? s.product.included_items : [];
      const hasIncluded = included.length > 0;
      const currentSize = s.selectedSize ? escapeHtml(s.selectedSize.toUpperCase ? s.selectedSize.toUpperCase() : s.selectedSize) : 'Not selected';
      const currentColor = s.selectedColor ? escapeHtml(s.selectedColor) : 'Not selected';

      const includedListHtml = hasIncluded
        ? included.map(function (item) {
            return `<li class='bundle-item'>${escapeHtml(item)}</li>`;
          }).join('')
        : '<li class="bundle-item">No included items listed.</li>';

      container.hidden = false;
      container.innerHTML = `
        <div class='bundle-options'>
          <h3 class='bundle-heading'>Bundle configuration</h3>
          <div class='bundle-summary-line'>
            <span class='bundle-summary-label'>Selected apparel options</span>
            <span class='bundle-summary-value'>Color: ${currentColor} · Size: ${currentSize}</span>
          </div>
          <div class='bundle-included-section'>
            <div class='bundle-included-label'>Included items</div>
            <ul class='bundle-included-list'>
              ${includedListHtml}
            </ul>
          </div>
          <p class='bundle-note'>
            Apparel sizes and colors for items in this bundle follow the selections above.
          </p>
        </div>
      `;
    }

    function renderQuantitySelector(container, s) {
      if (!container) return;
      if (!s.product || s.loadError) {
        container.innerHTML = '';
        return;
      }

      let disabled = false;
      if (!s.selectedVariant || s.configurationUnavailable || !isVariantInStock(s.selectedVariant)) {
        disabled = true;
      }

      const clampedQuantity = s.quantity <= 0 ? 1 : s.quantity;
      const totalPrice = computeTotalPrice();
      const totalPriceLabel = formatPrice(totalPrice, s.product.currency);

      const qtyErrorText = s.quantityError ? `<p class='field-error'>${escapeHtml(s.quantityError)}</p>` : '';

      container.innerHTML = `
        <div class='quantity-selector'>
          <label class='quantity-label' for='quantity-input'>Qty</label>
          <div class='quantity-input-row'>
            <button type='button' class='quantity-btn quantity-btn-decrement' data-action='decrement-qty' ${disabled ? 'disabled' : ''} aria-label='Decrease quantity'>−</button>
            <input id='quantity-input'
                   class='quantity-input-field'
                   type='number'
                   min='1'
                   step='1'
                   value='${clampedQuantity}'
                   ${disabled ? 'disabled' : ''}
                   data-action='quantity-input' />
            <button type='button' class='quantity-btn quantity-btn-increment' data-action='increment-qty' ${disabled ? 'disabled' : ''} aria-label='Increase quantity'>+</button>
          </div>
          ${qtyErrorText}
          <p class='quantity-total-line'>
            <span class='quantity-total-label'>Total</span>
            <span class='quantity-total-value'>${totalPriceLabel}</span>
          </p>
        </div>
      `;
    }

    function renderAddToCartForm(container, s) {
      if (!container) return;
      if (!s.product || s.loadError) {
        container.innerHTML = '';
        return;
      }

      const hasVariant = !!s.selectedVariant && !s.configurationUnavailable && isVariantInStock(s.selectedVariant);
      const disabled = !hasVariant || s.addToCartLoading || !s.quantity || s.quantity <= 0;
      const buttonLabel = s.addToCartLoading ? 'Adding…' : 'Add to cart';

      const unitPrice = s.selectedVariant ? s.selectedVariant.price : s.product.base_price;
      const unitPriceLabel = formatPrice(unitPrice, s.product.currency);
      const totalPrice = computeTotalPrice();
      const totalPriceLabel = formatPrice(totalPrice, s.product.currency);

      container.innerHTML = `
        <form class='add-to-cart-form' novalidate>
          <div class='add-to-cart-button-row'>
            <button type='button'
                    class='btn-primary add-to-cart-btn'
                    data-action='submit-add-to-cart'
                    ${disabled ? 'disabled' : ''}>
              ${escapeHtml(buttonLabel.toUpperCase())}
            </button>
          </div>
          <div class='add-to-cart-price-row'>
            <span class='price-row-label'>Unit</span>
            <span class='price-row-value'>${unitPriceLabel}</span>
          </div>
          <div class='add-to-cart-price-row add-to-cart-price-row-total'>
            <span class='price-row-label'>Total</span>
            <span class='price-row-value'>${totalPriceLabel}</span>
          </div>
        </form>
      `;
    }

    function renderAddToCartFeedback(container, s) {
      if (!container) return;
      if (!s.addToCartResult) {
        container.hidden = true;
        container.innerHTML = '';
        return;
      }
      const res = s.addToCartResult;
      if (!res.success) {
        container.hidden = true;
        container.innerHTML = '';
        return;
      }
      const item = res.cart_item || {};
      const summary = res.cart_summary || {};
      const unitPriceLabel = typeof item.unit_price === 'number' ? formatPrice(item.unit_price, summary.currency || s.product.currency) : '';
      const totalPriceLabel = typeof item.total_price === 'number' ? formatPrice(item.total_price, summary.currency || s.product.currency) : '';

      const itemName = escapeHtml(item.name || (s.product ? s.product.name : ''));
      const msg = escapeHtml(res.message || 'Added to cart.');

      container.hidden = false;
      container.innerHTML = `
        <div class='feedback-panel feedback-panel-success'>
          <div class='feedback-header'>
            <p class='feedback-message'>${msg}</p>
            <button type='button' class='feedback-dismiss-btn' data-action='dismiss-feedback' aria-label='Dismiss'>×</button>
          </div>
          <div class='feedback-body'>
            <div class='feedback-item-main'>
              <div class='feedback-item-name'>${itemName}</div>
              <div class='feedback-item-meta'>
                ${item.selected_color ? `<span class='feedback-tag'>Color: ${escapeHtml(item.selected_color)}</span>` : ''}
                ${item.selected_size ? `<span class='feedback-tag'>Size: ${escapeHtml(item.selected_size)}</span>` : ''}
              </div>
            </div>
            <div class='feedback-item-pricing'>
              <div class='feedback-line'>
                <span class='feedback-label'>Unit</span>
                <span class='feedback-value'>${unitPriceLabel}</span>
              </div>
              <div class='feedback-line'>
                <span class='feedback-label'>Qty</span>
                <span class='feedback-value'>${item.quantity}</span>
              </div>
              <div class='feedback-line feedback-line-total'>
                <span class='feedback-label'>Total</span>
                <span class='feedback-value'>${totalPriceLabel}</span>
              </div>
            </div>
          </div>
          <div class='feedback-footer'>
            <button type='button' class='btn-secondary feedback-view-cart-btn' data-action='view-cart'>View cart</button>
          </div>
        </div>
      `;
    }

    function renderErrorDisplay(container, s) {
      if (!container) return;
      const messages = [];
      if (s.loadError) messages.push(s.loadError);
      if (s.configurationUnavailable) messages.push('This combination of color and size is not available.');
      if (s.quantityError) messages.push(s.quantityError);
      if (s.addToCartError) messages.push(s.addToCartError);

      if (messages.length === 0) {
        container.hidden = true;
        container.innerHTML = '';
        return;
      }

      const listHtml = messages.map(function (msg) {
        return `<li class='error-item'>${escapeHtml(msg)}</li>`;
      }).join('');

      const showRetry = !!state.productId || !!state.loadError;

      container.hidden = false;
      container.innerHTML = `
        <div class='error-panel'>
          <ul class='error-list'>
            ${listHtml}
          </ul>
          ${showRetry ? `<div class='error-actions'>
            <button type='button' class='btn-secondary error-retry-btn' data-action='retry-load'>Retry</button>
          </div>` : ''}
        </div>
      `;
    }

    function renderImageGallery(container, s) {
      if (!container) return;
      if (!s.product || s.loadError) {
        container.innerHTML = '';
        return;
      }
      const imageUrl = s.product.image_url || '';
      if (!imageUrl) {
        container.innerHTML = '';
        return;
      }
      const altText = s.product.name ? 'Product image for ' + s.product.name : 'Product image';

      container.innerHTML = `
        <div class='product-gallery'>
          <h2 class='gallery-heading'>Detail images</h2>
          <div class='gallery-main-image'>
            <img src='${escapeHtml(imageUrl)}' alt='${escapeHtml(altText)}' class='gallery-image-primary'>
          </div>
        </div>
      `;
    }

    function renderCartSummaryIndicator(container, s) {
      if (!container) return;
      const summary = s.cartSummary;
      if (!summary) {
        container.innerHTML = `
          <span class='cart-summary-text'>Cart</span>
          <span class='cart-summary-meta'>· 0 items — 0.00</span>
        `;
        return;
      }
      const count = typeof summary.item_count === 'number' ? summary.item_count : 0;
      const subtotalLabel = typeof summary.subtotal === 'number' ? formatPrice(summary.subtotal, summary.currency) : '0.00';
      container.innerHTML = `
        <span class='cart-summary-text'>Cart</span>
        <span class='cart-summary-meta'>· ${count} item${count === 1 ? '' : 's'} — ${subtotalLabel}</span>
      `;
    }

    function renderAll() {
      renderLoadingState();
      renderProductMainInfo(mainInfoEl, state);
      renderVariantSelector(variantSelectorEl, state);
      renderBundleOptions(bundleOptionsEl, state);
      renderQuantitySelector(quantitySelectorEl, state);
      renderAddToCartForm(addToCartFormEl, state);
      renderAddToCartFeedback(addToCartFeedbackEl, state);
      renderErrorDisplay(errorDisplayEl, state);
      renderImageGallery(galleryEl, state);
      renderCartSummaryIndicator(cartSummaryIndicatorEl, state);
    }

    // Data loading
    function loadProductDetails() {
      if (!state.productId) {
        state.loadError = 'Product not found. The link is missing a product_id parameter.';
        state.isLoading = false;
        renderAll();
        return;
      }
      state.isLoading = true;
      state.loadError = null;
      renderAll();

      let productData = null;
      try {
        productData = WebsiteSDK.getProductDetails(state.productId);
      } catch (e) {
        state.loadError = 'Unable to load product details. Please try again.';
        state.isLoading = false;
        renderAll();
        return;
      }

      if (!productData || !productData.product_id) {
        state.loadError = 'This product could not be found. It may be unavailable.';
        state.isLoading = false;
        renderAll();
        return;
      }

      state.product = productData;
      state.variants = Array.isArray(productData.variants) ? productData.variants : [];

      // Determine initial variant selection
      let selectedVariant = null;
      let selectedColor = null;
      let selectedSize = null;

      if (state.urlSelections.color || state.urlSelections.size) {
        selectedVariant = findVariantByAttributes(state.urlSelections.color, state.urlSelections.size);
        if (selectedVariant && !isVariantInStock(selectedVariant)) {
          selectedVariant = null;
        }
        if (selectedVariant) {
          selectedColor = selectedVariant.color || state.urlSelections.color;
          selectedSize = selectedVariant.size || state.urlSelections.size;
        }
      }

      if (!selectedVariant) {
        selectedVariant = pickDefaultVariant();
        if (selectedVariant) {
          selectedColor = selectedVariant.color || null;
          selectedSize = selectedVariant.size || null;
        }
      }

      state.selectedVariant = selectedVariant;
      state.selectedColor = selectedColor;
      state.selectedSize = selectedSize;
      state.configurationUnavailable = !selectedVariant && (state.variants && state.variants.length > 0);

      // Reset quantity
      state.quantity = clampQuantity(1);
      state.quantityError = null;

      state.isLoading = false;
      renderAll();
    }

    // Event handling via delegation
    function handleClick(event) {
      const actionEl = event.target.closest('[data-action]');
      if (!actionEl) return;
      const action = actionEl.getAttribute('data-action');
      if (!action) return;

      if (action === 'select-color') {
        event.preventDefault();
        const color = actionEl.getAttribute('data-color');
        if (!color || !state.product) return;
        state.selectedColor = color;
        const variant = findVariantByAttributes(state.selectedColor, state.selectedSize);
        state.selectedVariant = variant;
        state.configurationUnavailable = !variant;
        state.quantity = clampQuantity(state.quantity || 1);
        state.quantityError = null;
        state.addToCartError = null;
        state.addToCartResult = null;
        renderAll();
        return;
      }

      if (action === 'select-size') {
        event.preventDefault();
        const size = actionEl.getAttribute('data-size');
        if (!size || !state.product) return;
        state.selectedSize = size;
        const variant = findVariantByAttributes(state.selectedColor, state.selectedSize);
        state.selectedVariant = variant;
        state.configurationUnavailable = !variant;
        state.quantity = clampQuantity(state.quantity || 1);
        state.quantityError = null;
        state.addToCartError = null;
        state.addToCartResult = null;
        renderAll();
        return;
      }

      if (action === 'increment-qty') {
        event.preventDefault();
        if (!state.product) return;
        const next = clampQuantity((state.quantity || 1) + 1);
        state.quantity = next;
        state.quantityError = null;
        state.addToCartResult = null;
        renderAll();
        return;
      }

      if (action === 'decrement-qty') {
        event.preventDefault();
        if (!state.product) return;
        const next = clampQuantity((state.quantity || 1) - 1);
        state.quantity = next < 1 ? 1 : next;
        state.quantityError = null;
        state.addToCartResult = null;
        renderAll();
        return;
      }

      if (action === 'submit-add-to-cart') {
        event.preventDefault();
        if (!state.product) return;
        state.addToCartError = null;
        state.addToCartResult = null;

        if (!state.selectedVariant) {
          state.addToCartError = 'Please choose an available color and size before adding to cart.';
          renderAll();
          return;
        }
        if (state.configurationUnavailable) {
          state.addToCartError = 'This configuration is not available. Please select a different option.';
          renderAll();
          return;
        }
        if (!isVariantInStock(state.selectedVariant)) {
          state.addToCartError = 'This configuration is currently out of stock.';
          renderAll();
          return;
        }
        const quantity = clampQuantity(state.quantity || 1);
        if (!quantity || quantity < 1) {
          state.addToCartError = 'Please enter a valid quantity.';
          renderAll();
          return;
        }
        if (typeof state.selectedVariant.stock_quantity === 'number' && quantity > state.selectedVariant.stock_quantity) {
          state.addToCartError = 'Quantity exceeds available stock for this variant.';
          renderAll();
          return;
        }

        state.quantity = quantity;
        state.addToCartLoading = true;
        renderAll();

        let result = null;
        try {
          result = WebsiteSDK.addProductVariantToCart(state.selectedVariant.product_variant_id, quantity);
        } catch (e) {
          state.addToCartError = 'Unable to add this item to your cart. Please try again.';
          state.addToCartLoading = false;
          renderAll();
          return;
        }

        state.addToCartLoading = false;
        if (!result || result.success === false) {
          state.addToCartError = (result && result.message) ? result.message : 'Unable to add this item to your cart. Please try again.';
          renderAll();
          return;
        }

        state.addToCartResult = result;
        state.cartSummary = result.cart_summary || state.cartSummary;
        renderAll();
        return;
      }

      if (action === 'dismiss-feedback') {
        event.preventDefault();
        state.addToCartResult = null;
        renderAll();
        return;
      }

      if (action === 'retry-load') {
        event.preventDefault();
        state.addToCartError = null;
        state.loadError = null;
        loadProductDetails();
        return;
      }

      if (action === 'view-cart') {
        event.preventDefault();
        // Navigate to cart.html (no extra API calls)
        window.location.href = 'cart.html';
        return;
      }
    }

    function handleInput(event) {
      const target = event.target;
      if (!target || target.getAttribute('data-action') !== 'quantity-input') return;
      if (!state.product) return;
      const raw = target.value;
      const clamped = clampQuantity(raw);
      if (clamped === 0 && (!state.selectedVariant || !isVariantInStock(state.selectedVariant))) {
        state.quantity = 0;
      } else {
        state.quantity = clamped || 1;
      }
      state.quantityError = null;
      state.addToCartResult = null;
      renderAll();
    }

    function handleBlur(event) {
      const target = event.target;
      if (!target || target.getAttribute('data-action') !== 'quantity-input') return;
      if (!state.product) return;
      const clamped = clampQuantity(target.value);
      if (!clamped || clamped < 1) {
        state.quantity = 1;
        state.quantityError = 'Quantity has been adjusted to the minimum of 1.';
      } else {
        state.quantity = clamped;
        state.quantityError = null;
      }
      state.addToCartResult = null;
      renderAll();
    }

    document.body.addEventListener('click', handleClick);
    document.body.addEventListener('input', handleInput);
    document.body.addEventListener('blur', handleBlur, true);

    // Initialize populate-elements hook (single entry point for data)
    const populateElements = document.querySelectorAll('[data-populate]');
    populateElements.forEach(function (el) {
      const type = el.getAttribute('data-populate');
      if (type === 'product-details') {
        // Actual loading is driven by the controller below
      }
    });

    // Initial load
    if (!state.productId) {
      state.loadError = 'Product not found. The link is missing a product_id parameter.';
      state.isLoading = false;
      renderAll();
    } else {
      loadProductDetails();
    }
  });
  </script>
</body>
</html>
