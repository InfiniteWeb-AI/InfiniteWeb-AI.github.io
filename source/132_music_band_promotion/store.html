<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Band Name — Store</title>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='store.css'>
</head>
<body>
  <header class='site-header'>
    <div class='container header-inner'>
      <button class='nav-toggle' type='button' aria-label='Toggle navigation'>
        <span class='nav-toggle-line'></span>
        <span class='nav-toggle-line'></span>
        <span class='nav-toggle-line'></span>
      </button>

      <nav class='primary-nav' aria-label='Main'>
        <ul class='primary-nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link' title='Homepage'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='tour.html' class='nav-link' title='Upcoming shows and ticket listings'>Tour</a>
          </li>
          <li class='nav-item'>
            <a href='discography.html' class='nav-link' title='Albums and song library'>Music</a>
          </li>
          <li class='nav-item'>
            <a href='store.html' class='nav-link is-active' title='Merchandise store and categories'>Store</a>
          </li>
          <li class='nav-item'>
            <a href='fan_club.html' class='nav-link' title='Membership plans and signup'>Fan Club</a>
          </li>
          <li class='nav-item'>
            <a href='lyrics.html' class='nav-link' title='Search and browse song lyrics'>Lyrics</a>
          </li>
          <li class='nav-item'>
            <a href='contact_booking.html' class='nav-link' title='General contact and event booking requests'>Contact / Booking</a>
          </li>
        </ul>
      </nav>

      <a href='fan_club.html' class='header-cta' title='Join the fan club'>Join Fan Club</a>
    </div>
  </header>

  <main id='content' class='site-main' role='main'>
    <div class='store-page'>
      <!-- Thin controller strip -->
      <div class='store-page-controller-row'>
        <div class='container' data-component='store-page-controller'>
          <p class='store-controller-label'>Merch Store Overview</p>
        </div>
      </div>

      <!-- Page heading + overview status -->
      <section class='store-header-block'>
        <div class='container'>
          <h1 class='page-title store-title'>STORE</h1>
          <div class='store-overview-status' data-component='store-overview-status' data-populate='store-overview-status' aria-live='polite'></div>
        </div>
      </section>

      <!-- Search form + category chips band -->
      <section class='store-controls-block'>
        <div class='container'>
          <div class='store-search-form-wrapper' data-component='store-search-form'>
            <form class='store-search-form' data-action='submit-search' role='search' aria-label='Search merchandise'>
              <label class='visually-hidden' for='storeSearchInput'>Search all merch</label>
              <input
                id='storeSearchInput'
                class='store-search-input'
                type='search'
                name='query'
                placeholder='Search all merch'
                autocomplete='off'
              >
              <button type='submit' class='btn btn-pill btn-primary'>Search</button>
              <button type='button' class='btn btn-pill btn-ghost' data-action='clear-search'>Clear</button>
            </form>
          </div>

          <div class='store-category-grid-wrapper'>
            <section
              class='store-category-grid'
              data-component='store-category-grid'
              data-populate='store-categories'
              aria-label='Store categories'
            ></section>
          </div>
        </div>
      </section>

      <!-- Main content: search results (when active) and featured products -->
      <section class='store-main-content'>
        <div class='container'>
          <section
            class='store-search-results-section'
            data-component='store-search-results'
            data-populate='search-results'
            aria-live='polite'
          ></section>

          <section
            class='featured-product-grid-section'
            data-component='featured-product-grid'
            data-populate='featured-products'
          ></section>
        </div>
      </section>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='container footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'><a href='about.html' class='footer-link' title='About the band'>About</a></li>
          <li class='footer-nav-item'><a href='faq.html' class='footer-link' title='Frequently asked questions'>FAQ</a></li>
          <li class='footer-nav-item'><a href='newsletter.html' class='footer-link' title='Subscribe to email updates'>Newsletter</a></li>
          <li class='footer-nav-item'><a href='tour.html' class='footer-link' title='Upcoming concerts and tickets'>Tour Dates</a></li>
          <li class='footer-nav-item'><a href='store.html' class='footer-link' title='Band merchandise store'>Store</a></li>
          <li class='footer-nav-item'><a href='fan_club.html' class='footer-link' title='Join the fan club'>Fan Club</a></li>
          <li class='footer-nav-item'><a href='contact_booking.html' class='footer-link' title='Contact the band or submit booking requests'>Contact / Booking</a></li>
          <li class='footer-nav-item'><a href='policies.html' class='footer-link' title='Terms of use and privacy policy'>Policies</a></li>
        </ul>
      </nav>

      <div class='footer-meta'>
        <p class='footer-copy'>&copy; <span class='footer-brand'>Band Name</span> <span class='footer-year'>2026</span>. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    'use strict';

    // ---- URL state ----
    var urlParams = new URLSearchParams(window.location.search);
    var rawCategoryId = urlParams.get('category_id');
    var rawQuery = urlParams.get('query') || '';
    var initialQuery = rawQuery.trim();

    var state = {
      selectedCategoryId: rawCategoryId && rawCategoryId.length ? rawCategoryId : null,
      currentSearchQuery: initialQuery,
      searchTerm: initialQuery,
      overview: null,
      overviewError: null,
      isOverviewLoading: false,
      searchResults: [],
      searchError: null,
      isSearchLoading: false
    };

    // ---- Load overview ----
    state.isOverviewLoading = true;
    try {
      state.overview = WebsiteSDK.getStoreOverview();
    } catch (err) {
      console.error('Error loading store overview', err);
      state.overviewError = 'Unable to load store overview right now.';
    } finally {
      state.isOverviewLoading = false;
    }

    // ---- Run search if query present ----
    if (state.currentSearchQuery && state.currentSearchQuery.length > 0) {
      state.isSearchLoading = true;
      try {
        state.searchResults = WebsiteSDK.searchStoreProducts(state.currentSearchQuery);
      } catch (err2) {
        console.error('Error searching store products', err2);
        state.searchError = 'There was a problem running your search.';
      } finally {
        state.isSearchLoading = false;
      }
    }

    // ---- Render all data-populate components ----
    var populateElements = document.querySelectorAll('[data-populate]');
    populateElements.forEach(function(container) {
      var populateType = container.dataset.populate;
      if (populateType === 'store-overview-status') {
        renderStoreOverviewStatus(container, state);
      } else if (populateType === 'store-categories') {
        renderStoreCategories(container, state);
      } else if (populateType === 'featured-products') {
        renderFeaturedProducts(container, state);
      } else if (populateType === 'search-results') {
        renderSearchResults(container, state);
      }
    });

    // ---- Initialize search form ----
    initializeSearchForm(state);

    // ---- Bind direct action handlers for existing elements ----
    var actionElements = document.querySelectorAll('[data-action]');
    actionElements.forEach(function(element) {
      var action = element.dataset.action;
      if (action === 'submit-search' && element.tagName === 'FORM') {
        element.addEventListener('submit', function(event) {
          handleSearchSubmit(event, state);
        });
      } else if (action === 'clear-search') {
        element.addEventListener('click', function(event) {
          handleClearSearchClick(event, state);
        });
      }
    });

    // ---- Global delegated click handler for dynamic elements ----
    document.addEventListener('click', function(event) {
      var actionElement = event.target.closest('[data-action]');
      if (!actionElement) {
        return;
      }
      var action = actionElement.dataset.action;
      if (action === 'open-category') {
        var categoryId = actionElement.dataset.categoryId;
        if (categoryId) {
          window.location.href = 'store_category.html?category_id=' + encodeURIComponent(categoryId);
        }
      } else if (action === 'open-product') {
        var productId = actionElement.dataset.productId;
        if (productId) {
          window.location.href = 'product_detail.html?product_id=' + encodeURIComponent(productId);
        }
      }
    });

    // ===== Functions =====

    function initializeSearchForm(stateObj) {
      var formWrapper = document.querySelector('[data-component="store-search-form"]');
      if (!formWrapper) {
        return;
      }
      var input = formWrapper.querySelector('input[name="query"]');
      if (input) {
        input.value = stateObj.currentSearchQuery || '';
        input.addEventListener('input', function(event) {
          stateObj.searchTerm = event.target.value;
        });
      }
    }

    function handleSearchSubmit(event, stateObj) {
      event.preventDefault();
      var form = event.currentTarget;
      var input = form.querySelector('input[name="query"]');
      var term = '';
      if (input && typeof input.value === 'string') {
        term = input.value;
      } else if (typeof stateObj.searchTerm === 'string') {
        term = stateObj.searchTerm;
      }
      term = term.trim();

      var params = new URLSearchParams(window.location.search);
      if (term) {
        params.set('query', term);
      } else {
        params.delete('query');
      }
      var newUrlParams = params.toString();
      var newUrl = 'store.html' + (newUrlParams ? '?' + newUrlParams : '');
      window.location.href = newUrl;
    }

    function handleClearSearchClick(event, stateObj) {
      event.preventDefault();
      var formWrapper = document.querySelector('[data-component="store-search-form"]');
      if (formWrapper) {
        var input = formWrapper.querySelector('input[name="query"]');
        if (input) {
          input.value = '';
        }
      }
      stateObj.searchTerm = '';
      var params = new URLSearchParams(window.location.search);
      params.delete('query');
      var newUrlParams = params.toString();
      var newUrl = 'store.html' + (newUrlParams ? '?' + newUrlParams : '');
      window.location.href = newUrl;
    }

    function renderStoreOverviewStatus(container, stateObj) {
      if (stateObj.isOverviewLoading) {
        container.textContent = 'Loading store...';
        return;
      }
      if (stateObj.overviewError) {
        container.textContent = stateObj.overviewError;
        return;
      }
      if (!stateObj.overview) {
        container.textContent = '';
        return;
      }
      var categories = Array.isArray(stateObj.overview.categories) ? stateObj.overview.categories : [];
      var featured = Array.isArray(stateObj.overview.featured_products) ? stateObj.overview.featured_products : [];
      var parts = [];
      if (categories.length > 0) {
        parts.push(categories.length + ' categories');
      }
      if (featured.length > 0) {
        parts.push(featured.length + ' featured items');
      }
      var text = parts.join(' · ');
      if (!text) {
        text = 'Store overview';
      }
      if (stateObj.currentSearchQuery && stateObj.currentSearchQuery.length > 0) {
        text += ' · Showing results for "' + stateObj.currentSearchQuery + '"';
      }
      container.textContent = text;
    }

    function renderStoreCategories(container, stateObj) {
      container.innerHTML = '';
      container.classList.add('store-category-grid');

      if (stateObj.overviewError) {
        var errorP = document.createElement('p');
        errorP.className = 'store-error';
        errorP.textContent = 'Categories are unavailable right now.';
        container.appendChild(errorP);
        return;
      }

      if (!stateObj.overview || !Array.isArray(stateObj.overview.categories) || stateObj.overview.categories.length === 0) {
        var emptyP = document.createElement('p');
        emptyP.className = 'store-empty';
        emptyP.textContent = 'No categories available.';
        container.appendChild(emptyP);
        return;
      }

      var list = document.createElement('ul');
      list.className = 'category-chip-list';
      var selectedButton = null;

      stateObj.overview.categories
        .slice()
        .sort(function(a, b) {
          var ao = typeof a.sort_order === 'number' ? a.sort_order : 0;
          var bo = typeof b.sort_order === 'number' ? b.sort_order : 0;
          return ao - bo;
        })
        .forEach(function(category) {
          var li = document.createElement('li');
          li.className = 'category-chip-item';

          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'chip chip-category';
          button.textContent = category.name || 'Category';
          button.dataset.action = 'open-category';
          if (category.category_id) {
            button.dataset.categoryId = category.category_id;
          }

          if (stateObj.selectedCategoryId && category.category_id === stateObj.selectedCategoryId) {
            button.classList.add('is-selected');
            selectedButton = button;
          }

          li.appendChild(button);
          list.appendChild(li);
        });

      container.appendChild(list);

      if (selectedButton && typeof selectedButton.scrollIntoView === 'function') {
        try {
          selectedButton.scrollIntoView({ block: 'center', behavior: 'smooth' });
        } catch (e) {
          selectedButton.scrollIntoView();
        }
      }
    }

    function renderFeaturedProducts(container, stateObj) {
      container.innerHTML = '';
      container.classList.add('featured-product-grid-section');

      if (stateObj.overviewError) {
        var errorP = document.createElement('p');
        errorP.className = 'store-error';
        errorP.textContent = 'Featured products are unavailable right now.';
        container.appendChild(errorP);
        return;
      }

      if (!stateObj.overview || !Array.isArray(stateObj.overview.featured_products) || stateObj.overview.featured_products.length === 0) {
        var emptyP = document.createElement('p');
        emptyP.className = 'store-empty';
        emptyP.textContent = 'No featured products are available yet.';
        container.appendChild(emptyP);
        return;
      }

      var title = document.createElement('h2');
      title.className = 'section-title';
      title.textContent = 'Featured merch';
      container.appendChild(title);

      var grid = document.createElement('div');
      grid.className = 'product-grid';

      stateObj.overview.featured_products.forEach(function(product) {
        var card = document.createElement('article');
        card.className = 'product-card';

        var link = document.createElement('a');
        link.href = 'javascript:void(0)';
        link.className = 'product-card-link';
        link.dataset.action = 'open-product';
        if (product.product_id) {
          link.dataset.productId = product.product_id;
        }

        var figure = document.createElement('figure');
        figure.className = 'product-card-figure';

        if (product.image_url) {
          var img = document.createElement('img');
          img.className = 'product-card-image';
          img.src = product.image_url;
          img.alt = product.name || 'Featured product';
          figure.appendChild(img);
        } else {
          var placeholder = document.createElement('div');
          placeholder.className = 'product-card-image placeholder';
          placeholder.textContent = 'No image';
          figure.appendChild(placeholder);
        }

        var figcaption = document.createElement('figcaption');
        figcaption.className = 'product-card-caption';

        var nameEl = document.createElement('h3');
        nameEl.className = 'product-card-title';
        nameEl.textContent = product.name || 'Product';
        figcaption.appendChild(nameEl);

        var meta = document.createElement('p');
        meta.className = 'product-card-meta';
        var parts = [];
        if (product.category_name) {
          parts.push(product.category_name);
        }
        if (typeof product.price_from === 'number') {
          var currency = product.currency || '';
          var priceText = (currency ? currency + ' ' : '') + product.price_from.toFixed(2);
          parts.push('from ' + priceText);
        }
        if (product.is_bundle) {
          parts.push('bundle');
        }
        meta.textContent = parts.join(' · ');
        figcaption.appendChild(meta);

        figure.appendChild(figcaption);
        link.appendChild(figure);
        card.appendChild(link);
        grid.appendChild(card);
      });

      container.appendChild(grid);
    }

    function renderSearchResults(container, stateObj) {
      container.innerHTML = '';
      container.classList.add('store-search-results-section');

      if (!stateObj.currentSearchQuery || stateObj.currentSearchQuery.length === 0) {
        container.hidden = true;
        return;
      }

      container.hidden = false;

      var header = document.createElement('header');
      header.className = 'store-search-results-header';

      var title = document.createElement('h2');
      title.className = 'section-title';
      title.textContent = 'Search results';
      header.appendChild(title);

      var summary = document.createElement('p');
      summary.className = 'store-results-summary';

      if (stateObj.isSearchLoading) {
        summary.textContent = 'Searching for "' + stateObj.currentSearchQuery + '"...';
      } else if (stateObj.searchError) {
        summary.textContent = stateObj.searchError;
      } else {
        var count = Array.isArray(stateObj.searchResults) ? stateObj.searchResults.length : 0;
        if (count > 0) {
          summary.textContent = count + ' result' + (count !== 1 ? 's' : '') + ' for "' + stateObj.currentSearchQuery + '"';
        } else {
          summary.textContent = 'No results for "' + stateObj.currentSearchQuery + '"';
        }
      }

      header.appendChild(summary);
      container.appendChild(header);

      if (stateObj.searchError || !Array.isArray(stateObj.searchResults) || stateObj.searchResults.length === 0) {
        return;
      }

      var grid = document.createElement('div');
      grid.className = 'product-grid search-results-grid';

      stateObj.searchResults.forEach(function(product) {
        var card = document.createElement('article');
        card.className = 'product-card';

        var link = document.createElement('a');
        link.href = 'javascript:void(0)';
        link.className = 'product-card-link';
        link.dataset.action = 'open-product';
        if (product.product_id) {
          link.dataset.productId = product.product_id;
        }

        var figure = document.createElement('figure');
        figure.className = 'product-card-figure';

        if (product.image_url) {
          var img = document.createElement('img');
          img.className = 'product-card-image';
          img.src = product.image_url;
          img.alt = product.name || 'Product';
          figure.appendChild(img);
        } else {
          var placeholder = document.createElement('div');
          placeholder.className = 'product-card-image placeholder';
          placeholder.textContent = 'No image';
          figure.appendChild(placeholder);
        }

        var figcaption = document.createElement('figcaption');
        figcaption.className = 'product-card-caption';

        var nameEl = document.createElement('h3');
        nameEl.className = 'product-card-title';
        nameEl.textContent = product.name || 'Product';
        figcaption.appendChild(nameEl);

        var meta = document.createElement('p');
        meta.className = 'product-card-meta';
        var parts = [];
        if (product.category_name) {
          parts.push(product.category_name);
        }
        if (typeof product.base_price === 'number') {
          var currency = product.currency || '';
          var priceText = (currency ? currency + ' ' : '') + product.base_price.toFixed(2);
          parts.push(priceText);
        }
        if (product.is_bundle) {
          parts.push('bundle');
        }
        meta.textContent = parts.join(' · ');
        figcaption.appendChild(meta);

        figure.appendChild(figcaption);
        link.appendChild(figure);
        card.appendChild(link);
        grid.appendChild(card);
      });

      container.appendChild(grid);
    }
  });
  </script>
</body>
</html>
