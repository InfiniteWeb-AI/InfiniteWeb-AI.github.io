<html lang='en'>

<body>

      </button>

      <nav class='primary-nav' aria-label='Main'>
        <ul class='primary-nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link is-active' title='Homepage'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='tour.html' class='nav-link' title='Upcoming shows and ticket listings'>Tour</a>
          </li>
          <li class='nav-item'>
            <a href='discography.html' class='nav-link' title='Albums and song library'>Music</a>
          </li>
          <li class='nav-item'>
            <a href='store.html' class='nav-link' title='Merchandise store and categories'>Store</a>
          </li>
          <li class='nav-item'>
            <a href='fan_club.html' class='nav-link' title='Membership plans and signup'>Fan Club</a>
          </li>
          <li class='nav-item'>
            <a href='lyrics.html' class='nav-link' title='Search and browse song lyrics'>Lyrics</a>
          </li>

      <a href='fan_club.html' class='header-cta' title='Join the fan club'>Join Fan Club</a>
    </div>
  </header>

  <main id='content' class='site-main' role='main'>
    <section class='policies-page' data-component='policy-content-viewer' aria-labelledby='policies-page-title'>
      <div class='policies-loader-overlay' data-component='policies-data-loader' aria-hidden='true'>
        <div class='policies-loader-inner' role='status' aria-live='polite'>
          <div class='policies-spinner' aria-hidden='true'></div>
          <p class='policies-loader-text'>Loading policies…</p>
        </div>
      </div>

      <header class='policies-page-header'>
        <div class='container'>
          <h1 id='policies-page-title' class='page-title'>Policies</h1>
        </div>
      </header>

      <div class='policies-main'>
        <div class='container'>
          <div class='policies-nav-band'>
            <nav class='policy-section-navigation' data-component='policy-section-navigation' aria-label='Policy sections'>
              <!-- Section navigation pills will be injected here by JavaScript -->
            </nav>

            <div class='policies-status is-hidden' data-component='policies-load-state-indicator' aria-live='polite'>
              <p class='policies-status-message' data-status-message></p>
              <button type='button' class='policies-retry-btn' data-action='policies-retry'>Retry loading policies</button>
            </div>
          </div>

          <div class='policies-content-wrapper'>
            <div class='policies-content' data-populate='policies-content'>
              <!-- Policy sections will be rendered here by JavaScript -->
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='container footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'><a href='about.html' class='footer-link' title='About the band'>About</a></li>
          <li class='footer-nav-item'><a href='faq.html' class='footer-link' title='Frequently asked questions'>FAQ</a></li>
          <li class='footer-nav-item'><a href='newsletter.html' class='footer-link' title='Subscribe to email updates'>Newsletter</a></li>
          <li class='footer-nav-item'><a href='tour.html' class='footer-link' title='Upcoming concerts and tickets'>Tour Dates</a></li>
          <li class='footer-nav-item'><a href='store.html' class='footer-link' title='Band merchandise store'>Store</a></li>
          <li class='footer-nav-item'><a href='fan_club.html' class='footer-link' title='Join the fan club'>Fan Club</a></li>
          <li class='footer-nav-item'><a href='contact_booking.html' class='footer-link' title='Contact the band or submit booking requests'>Contact / Booking</a></li>
          <li class='footer-nav-item'><a href='policies.html' class='footer-link' title='Terms of use and privacy policy'>Policies</a></li>
        </ul>
      </nav>

      <div class='footer-meta'>
        <p class='footer-copy'>&copy; <span class='footer-brand'>Band Name</span> <span class='footer-year'>2026</span>. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // URL parameter handling
      function getRequestedSectionIdFromUrl() {
        var params = new URLSearchParams(window.location.search);
        var value = params.get('section');
        return value || null;
      }

      function updateUrlSectionParam(sectionId, options) {
        var opts = options || {};
        var replace = !!opts.replace;
        var url = new URL(window.location.href);
        if (sectionId) {
          url.searchParams.set('section', sectionId);
        } else {
          url.searchParams.delete('section');
        }
        var newUrl = url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : '');
        var state = {};
        if (replace) {
          window.history.replaceState(state, '', newUrl);
        } else {
          window.history.pushState(state, '', newUrl);
        }
      }

      // Component elements
      var loaderOverlay = document.querySelector('[data-component="policies-data-loader"]');
      var navContainer = document.querySelector('[data-component="policy-section-navigation"]');
      var statusContainer = document.querySelector('[data-component="policies-load-state-indicator"]');
      var statusMessageEl = statusContainer ? statusContainer.querySelector('[data-status-message]') : null;
      var retryButton = statusContainer ? statusContainer.querySelector('[data-action="policies-retry"]') : null;

      var populateElements = document.querySelectorAll('[data-populate]');
      var contentContainer = null;
      populateElements.forEach(function(element) {
        if (element.dataset.populate === 'policies-content') {
          contentContainer = element;
        }
      });

      // State
      var POLICY_SECTIONS = [
        { id: 'terms-of-use', contentField: 'terms_of_use', label: 'Terms of Use' },
        { id: 'ticket-terms', contentField: 'ticket_terms', label: 'Ticket Terms', shortLabel: 'Tickets' },
        { id: 'merch-terms', contentField: 'merch_terms', label: 'Merch Terms', shortLabel: 'Merch' },
        { id: 'privacy', contentField: 'privacy_policy', label: 'Privacy Policy' }
      ];

      var policiesData = null;
      var availableSections = [];
      var activeSectionId = null;
      var requestedSectionId = getRequestedSectionIdFromUrl();

      // Helpers for UI state
      function setOverlayVisible(isVisible) {
        if (!loaderOverlay) return;
        if (isVisible) {
          loaderOverlay.classList.add('is-visible');
          loaderOverlay.setAttribute('aria-hidden', 'false');
        } else {
          loaderOverlay.classList.remove('is-visible');
          loaderOverlay.setAttribute('aria-hidden', 'true');
        }
      }

      function setStatus(options) {
        if (!statusContainer) return;
        var message = options && options.message ? options.message : '';
        var showRetry = !!(options && options.showRetry);

        if (message) {
          statusContainer.classList.remove('is-hidden');
          if (statusMessageEl) {
            statusMessageEl.textContent = message;
          }
        } else {
          statusContainer.classList.add('is-hidden');
          if (statusMessageEl) {
            statusMessageEl.textContent = '';
          }
        }

        if (retryButton) {
          retryButton.style.display = showRetry ? '' : 'none';
        }
      }

      // Rendering
      function renderPoliciesNavigation() {
        if (!navContainer) return;
        navContainer.innerHTML = '';

        var navList = document.createElement('ul');
        navList.className = 'policy-section-nav-list';
        navList.setAttribute('role', 'tablist');

        availableSections.forEach(function(section) {
          var li = document.createElement('li');
          li.className = 'policy-section-nav-item';

          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'policy-section-nav-btn';
          if (section.id === activeSectionId) {
            button.classList.add('is-active');
          }
          button.dataset.action = 'switch-policy-section';
          button.dataset.sectionId = section.id;
          button.setAttribute('role', 'tab');
          button.setAttribute('aria-selected', section.id === activeSectionId ? 'true' : 'false');
          button.setAttribute('aria-controls', 'policy-' + section.id);

          var label = section.label || section.id;
          button.textContent = label.toUpperCase();

          li.appendChild(button);
          navList.appendChild(li);
        });

        navContainer.appendChild(navList);
      }

      function renderPoliciesContent(container) {
        if (!container) return;
        container.innerHTML = '';

        if (!availableSections.length) {
          var emptyState = document.createElement('p');
          emptyState.className = 'policies-empty-state';
          emptyState.textContent = 'Policies are not available at the moment.';
          container.appendChild(emptyState);
          return;
        }

        var sectionsWrapper = document.createElement('div');
        sectionsWrapper.className = 'policies-sections-wrapper';

        availableSections.forEach(function(section) {
          var sectionEl = document.createElement('section');
          sectionEl.className = 'policy-section';
          if (section.id === activeSectionId) {
            sectionEl.classList.add('is-active');
          }
          sectionEl.id = 'policy-' + section.id;
          sectionEl.dataset.policySection = section.id;
          sectionEl.setAttribute('tabindex', '-1');

          var titleEl = document.createElement('h2');
          titleEl.className = 'policy-section-title';
          titleEl.textContent = section.label;
          sectionEl.appendChild(titleEl);

          var bodyEl = document.createElement('div');
          bodyEl.className = 'policy-section-body';
          var rawContent = policiesData && policiesData[section.contentField] ? String(policiesData[section.contentField]) : '';
          bodyEl.innerHTML = rawContent;
          sectionEl.appendChild(bodyEl);

          var contactWrapper = document.createElement('div');
          contactWrapper.className = 'policy-section-contact';

          var contactLink = document.createElement('a');
          contactLink.href = 'javascript:void(0)';
          contactLink.className = 'policy-section-contact-link';
          contactLink.dataset.action = 'contact-policy';
          contactLink.dataset.policySection = section.id;
          contactLink.setAttribute('aria-label', 'Contact us about the ' + section.label + ' policy');
          contactLink.textContent = 'Contact Us About This Policy';
          contactWrapper.appendChild(contactLink);

          if (policiesData && typeof policiesData.policy_contact_info === 'string' && policiesData.policy_contact_info.trim() !== '') {
            var info = document.createElement('p');
            info.className = 'policy-contact-info';
            info.textContent = policiesData.policy_contact_info;
            contactWrapper.appendChild(info);
          }

          sectionEl.appendChild(contactWrapper);
          sectionsWrapper.appendChild(sectionEl);
        });

        container.appendChild(sectionsWrapper);
      }

      function scrollToActiveSection(options) {
        var opts = options || {};
        var smooth = !!opts.smooth;
        var activeSectionEl = document.querySelector('.policy-section.is-active');
        if (!activeSectionEl) return;
        try {
          activeSectionEl.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'start' });
        } catch (e) {
          activeSectionEl.scrollIntoView(true);
        }
      }

      function setActiveSection(newSectionId, options) {
        var opts = options || {};
        var scroll = typeof opts.scroll === 'boolean' ? opts.scroll : true;
        var updateUrl = typeof opts.updateUrl === 'boolean' ? opts.updateUrl : true;
        var smooth = typeof opts.smooth === 'boolean' ? opts.smooth : true;

        if (!availableSections.length) return;
        var isValid = availableSections.some(function(sec) { return sec.id === newSectionId; });
        if (!isValid) return;

        if (newSectionId === activeSectionId) {
          if (scroll) {
            scrollToActiveSection({ smooth: smooth });
          }
          return;
        }

        activeSectionId = newSectionId;

        // Update navigation buttons
        var buttons = document.querySelectorAll('[data-action="switch-policy-section"]');
        buttons.forEach(function(button) {
          var isActive = button.dataset.sectionId === activeSectionId;
          if (isActive) {
            button.classList.add('is-active');
          } else {
            button.classList.remove('is-active');
          }
          button.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });

        // Update section highlighting
        var sectionEls = document.querySelectorAll('.policy-section');
        sectionEls.forEach(function(sectionEl) {
          var isActiveSection = sectionEl.dataset.policySection === activeSectionId;
          if (isActiveSection) {
            sectionEl.classList.add('is-active');
          } else {
            sectionEl.classList.remove('is-active');
          }
        });

        if (updateUrl) {
          updateUrlSectionParam(activeSectionId, { replace: false });
        }

        if (scroll) {
          scrollToActiveSection({ smooth: smooth });
        }
      }

      // Initialization after data load
      function initializeSectionsFromData() {
        if (!policiesData) return;

        availableSections = POLICY_SECTIONS.filter(function(section) {
          var value = policiesData[section.contentField];
          return typeof value === 'string' && value.trim() !== '';
        });

        if (!availableSections.length) {
          renderPoliciesNavigation();
          if (contentContainer) {
            renderPoliciesContent(contentContainer);
          }
          return;
        }

        var defaultSection = availableSections[0];
        var resolvedSectionId = null;

        if (requestedSectionId) {
          var match = availableSections.find(function(section) { return section.id === requestedSectionId; });
          if (match) {
            resolvedSectionId = match.id;
          }
        }

        if (!resolvedSectionId) {
          resolvedSectionId = defaultSection.id;
        }

        activeSectionId = resolvedSectionId;

        // Normalize URL parameter when missing or invalid
        var shouldReplace = !requestedSectionId || !availableSections.some(function(section) { return section.id === requestedSectionId; });
        updateUrlSectionParam(activeSectionId, { replace: shouldReplace });

        renderPoliciesNavigation();
        if (contentContainer) {
          renderPoliciesContent(contentContainer);
        }

        scrollToActiveSection({ smooth: false });
      }

      // Data loading
      function loadPolicies(options) {
        var opts = options || {};
        var isRetry = !!opts.isRetry;

        setOverlayVisible(true);
        setStatus({ message: isRetry ? 'Retrying…' : 'Loading policies…', showRetry: false });

        var data;
        try {
          data = WebsiteSDK.getPoliciesContent();
        } catch (error) {
          console.error('Error loading policies:', error);
          setOverlayVisible(false);
          setStatus({
            message: 'We were unable to load the policies. Please check your connection and try again.',
            showRetry: true
          });
          return;
        }

        policiesData = data || {};
        setOverlayVisible(false);
        setStatus({ message: '', showRetry: false });

        initializeSectionsFromData();
      }

      // Global click handler for data-action elements
      document.body.addEventListener('click', function(event) {
        var target = event.target;
        if (!target || !target.dataset) return;
        var action = target.dataset.action;
        if (!action) return;

        if (action === 'switch-policy-section') {
          var sectionId = target.dataset.sectionId;
          if (!sectionId) return;
          event.preventDefault();
          setActiveSection(sectionId, { scroll: true, updateUrl: true, smooth: true });
        } else if (action === 'contact-policy') {
          var policySectionId = target.dataset.policySection || activeSectionId;
          if (!policySectionId) return;
          event.preventDefault();
          var params = new URLSearchParams();
          params.set('topic', 'policy');
          params.set('policySection', policySectionId);
          window.location.href = 'contact_booking.html?' + params.toString();
        } else if (action === 'policies-retry') {
          event.preventDefault();
          loadPolicies({ isRetry: true });
        }
      });

      // Handle browser navigation (back/forward) for section parameter
      window.addEventListener('popstate', function() {
        requestedSectionId = getRequestedSectionIdFromUrl();
        if (!availableSections.length) return;
        if (!requestedSectionId) return;
        var match = availableSections.find(function(section) { return section.id === requestedSectionId; });
        if (match) {
          setActiveSection(match.id, { scroll: true, updateUrl: false, smooth: false });
        }
      });

      // Initial load
      loadPolicies({ isRetry: false });
    });
  </script>
</body>
</html>
