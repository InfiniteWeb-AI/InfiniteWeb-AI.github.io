      </button>

      <nav class='primary-nav' aria-label='Main'>
        <ul class='primary-nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link' title='Homepage'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='tour.html' class='nav-link' title='Upcoming shows and ticket listings'>Tour</a>
          </li>
          <li class='nav-item'>
            <a href='discography.html' class='nav-link' title='Albums and song library'>Music</a>
          </li>
          <li class='nav-item'>
            <a href='store.html' class='nav-link' title='Merchandise store and categories'>Store</a>
          </li>
          <li class='nav-item'>
            <a href='fan_club.html' class='nav-link' title='Membership plans and signup'>Fan Club</a>

          <li class='nav-item'>
            <a href='lyrics.html' class='nav-link is-active' title='Search and browse song lyrics'>Lyrics</a>
          </li>

            <a href='contact_booking.html' class='nav-link' title='General contact and event booking requests'>Contact / Booking</a>

      </nav>

    </div>
  </header>

  <main id='content' class='site-main' role='main'>
    <section class='lyrics-page' data-component='lyrics-page-controller'>
      <div class='container lyrics-page-inner'>
        <header class='lyrics-page-header'>
          <h1 class='page-title'>Lyrics</h1>
        </header>

        <section class='lyrics-search-section'>
          <form class='lyrics-search-form' data-component='lyrics-search-form' data-action='lyrics-search-form'>
            <label class='field-label' for='lyricsSearchInput'>Search lyrics or song titles</label>
            <div class='lyrics-search-input-wrapper'>
              <input
                id='lyricsSearchInput'
                name='query'
                type='search'
                class='lyrics-search-input'
                placeholder='Type a word or song title'
                autocomplete='off'
              >
              <button type='submit' class='btn-pill btn-primary'>Search</button>
            </div>
            <button type='button' class='btn-ghost btn-clear-search' data-action='lyrics-search-clear'>Clear</button>
          </form>
        </section>

        <section class='lyrics-sort-section'>
          <div class='lyrics-sort-control' data-component='lyrics-sort-control'>
            <label class='field-label' for='lyricsSortSelect'>Sort results</label>
            <select id='lyricsSortSelect' name='sort' class='lyrics-sort-select' data-action='lyrics-sort-change'>
              <option value='release_date_newest_first'>Newest release</option>
              <option value='release_date_oldest_first'>Oldest release</option>
              <option value='title_a_to_z'>Title A–Z</option>
              <option value='title_z_to_a'>Title Z–A</option>
            </select>
          </div>
        </section>

        <section class='lyrics-results-section' data-component='lyrics-results-container'>
          <div class='lyrics-results-status' aria-live='polite' aria-atomic='true'></div>
          <div class='lyrics-results-body' data-populate='lyrics-results'></div>
        </section>
      </div>
    </section>
  </main>

    <div class='container footer-inner'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'><a href='about.html' class='footer-link' title='About the band'>About</a></li>
          <li class='footer-nav-item'><a href='faq.html' class='footer-link' title='Frequently asked questions'>FAQ</a></li>
          <li class='footer-nav-item'><a href='newsletter.html' class='footer-link' title='Subscribe to email updates'>Newsletter</a></li>
          <li class='footer-nav-item'><a href='tour.html' class='footer-link' title='Upcoming concerts and tickets'>Tour Dates</a></li>
          <li class='footer-nav-item'><a href='store.html' class='footer-link' title='Band merchandise store'>Store</a></li>
          <li class='footer-nav-item'><a href='fan_club.html' class='footer-link' title='Join the fan club'>Fan Club</a></li>
          <li class='footer-nav-item'><a href='contact_booking.html' class='footer-link' title='Contact the band or submit booking requests'>Contact / Booking</a></li>
          <li class='footer-nav-item'><a href='policies.html' class='footer-link' title='Terms of use and privacy policy'>Policies</a></li>
        </ul>
      </nav>

      <div class='footer-meta'>
        <p class='footer-copy'>&copy; <span class='footer-brand'>Band Name</span> <span class='footer-year'>2026</span>. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var pageControllerEl = document.querySelector('[data-component="lyrics-page-controller"]');
    var searchFormEl = document.querySelector('[data-component="lyrics-search-form"]');
    var searchInputEl = document.getElementById('lyricsSearchInput');
    var clearButtonEl = searchFormEl ? searchFormEl.querySelector('[data-action="lyrics-search-clear"]') : null;
    var sortSelectEl = document.getElementById('lyricsSortSelect');
    var resultsContainerSection = document.querySelector('[data-component="lyrics-results-container"]');
    var statusEl = resultsContainerSection ? resultsContainerSection.querySelector('.lyrics-results-status') : null;

    var resultsBodyEl = null;
    var populateElements = document.querySelectorAll('[data-populate]');
    populateElements.forEach(function(element) {
      var dataType = element.dataset.populate;
      if (dataType === 'lyrics-results') {
        resultsBodyEl = element;
      }
    });

    var state = {
      query: '',
      sort: 'release_date_newest_first',
      loading: false,
      error: null,
      results: null
    };

    function readUrlParams() {
      var params = new URLSearchParams(window.location.search);
      var query = (params.get('query') || '').trim();
      var sort = (params.get('sort') || 'release_date_newest_first').trim() || 'release_date_newest_first';
      return { query: query, sort: sort };
    }

    function writeUrlParams(newQuery, newSort, replace) {
      var params = new URLSearchParams(window.location.search);
      if (newQuery && newQuery.trim() !== '') {
        params.set('query', newQuery.trim());
      } else {
        params.delete('query');
      }
      if (newSort && newSort.trim() !== '') {
        params.set('sort', newSort.trim());
      } else {
        params.delete('sort');
      }
      var newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
      if (replace) {
        window.history.replaceState({}, '', newUrl);
      } else {
        window.history.pushState({}, '', newUrl);
      }
    }

    function setState(partial) {
      state = Object.assign({}, state, partial);
      renderInto(resultsBodyEl);
    }

    function renderInto(container) {
      if (!container || !statusEl) {
        return;
      }

      // sync controls with state
      if (searchInputEl) {
        searchInputEl.value = state.query;
      }
      if (sortSelectEl) {
        sortSelectEl.value = state.sort || 'release_date_newest_first';
      }

      container.innerHTML = '';
      statusEl.textContent = '';

      if (!state.query) {
        var placeholder = document.createElement('p');
        placeholder.className = 'lyrics-placeholder';
        placeholder.textContent = 'Search for lyrics or song titles using the field above.';
        container.appendChild(placeholder);
        return;
      }

      if (state.loading) {
        var loadingWrapper = document.createElement('div');
        loadingWrapper.className = 'lyrics-loading-indicator';
        loadingWrapper.setAttribute('data-component', 'lyrics-loading-indicator');
        loadingWrapper.innerHTML = "\n        <div class='spinner' aria-hidden='true'></div>\n        <p class='loading-label'>Searching lyrics…</p>\n      ";
        container.appendChild(loadingWrapper);
        statusEl.textContent = 'Searching lyrics.';
        return;
      }

      if (state.error) {
        var errorWrapper = document.createElement('div');
        errorWrapper.className = 'lyrics-error-message';
        errorWrapper.setAttribute('data-component', 'lyrics-error-message');
        errorWrapper.innerHTML = "\n        <h2 class='error-title'>Unable to load lyrics</h2>\n        <p class='error-body'>Something went wrong while searching. Please try again.</p>\n        <button type='button' class='btn-pill btn-retry' data-action='lyrics-retry'>Retry search</button>\n      ";
        container.appendChild(errorWrapper);
        statusEl.textContent = 'Error loading lyrics results.';

        var retryBtn = container.querySelector('[data-action="lyrics-retry"]');
        if (retryBtn) {
          retryBtn.addEventListener('click', function() {
            handleRetry();
          });
        }
        return;
      }

      if (Array.isArray(state.results) && state.results.length === 0) {
        var emptyWrapper = document.createElement('div');
        emptyWrapper.className = 'lyrics-empty-state';
        emptyWrapper.setAttribute('data-component', 'lyrics-empty-state');
        emptyWrapper.innerHTML = "\n        <h2 class='empty-title'>No songs found</h2>\n        <p class='empty-body'>No lyrics match &ldquo;" + escapeHtml(state.query) + "&rdquo;. Try a different word or check your spelling.</p>\n      ";
        container.appendChild(emptyWrapper);
        statusEl.textContent = 'No lyrics results found.';
        return;
      }

      if (Array.isArray(state.results) && state.results.length > 0) {
        var list = document.createElement('ul');
        list.className = 'lyrics-results-list';
        list.setAttribute('data-component', 'lyrics-results-list');

        state.results.forEach(function(item) {
          var li = document.createElement('li');
          li.className = 'lyrics-result-item';
          li.setAttribute('data-component', 'lyrics-result-item');
          li.setAttribute('data-song-id', item.song_id || '');

          var hasLyrics = item.has_lyrics !== false;
          var dateText = formatReleaseDate(item.release_date);
          var noLyricsLabel = hasLyrics ? '' : "<span class='lyrics-availability-indicator'>Lyrics unavailable</span>";

          li.innerHTML = "\n          <article class='lyrics-result-card'>\n            <h3 class='lyrics-result-title'>\n              <a href='javascript:void(0)' class='lyrics-result-link' data-action='open-lyrics-detail'>" + escapeHtml(item.title || '') + "</a>\n            </h3>\n            <div class='lyrics-result-meta'>\n              " + (item.album_title ? "<span class='lyrics-result-album'>" + escapeHtml(item.album_title) + "</span>" : '') + "\n              " + (dateText ? "<span class='lyrics-result-date'>" + escapeHtml(dateText) + "</span>" : '') + "\n              " + noLyricsLabel + "\n            </div>\n            " + (item.snippet ? "<p class='lyrics-result-snippet'>" + escapeHtml(item.snippet) + "</p>" : '') + "\n          </article>\n        ";

          list.appendChild(li);
        });

        container.appendChild(list);
        statusEl.textContent = 'Lyrics search results updated.';

        var detailLinks = list.querySelectorAll('[data-action="open-lyrics-detail"]');
        detailLinks.forEach(function(link) {
          link.addEventListener('click', function(event) {
            event.preventDefault();
            var parentItem = event.currentTarget.closest('[data-song-id]');
            if (!parentItem) {
              return;
            }
            var songId = parentItem.getAttribute('data-song-id');
            if (!songId) {
              return;
            }
            window.location.href = 'lyrics_detail.html?song_id=' + encodeURIComponent(songId);
          });
        });
        return;
      }

      if (state.query && state.results === null) {
        var neutral = document.createElement('p');
        neutral.className = 'lyrics-placeholder';
        neutral.textContent = 'Search for lyrics or song titles using the field above.';
        container.appendChild(neutral);
      }
    }

    function escapeHtml(str) {
      if (typeof str !== 'string') {
        return '';
      }
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatReleaseDate(dateStr) {
      if (!dateStr) {
        return '';
      }
      var date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) {
        return '';
      }
      var options = { year: 'numeric', month: 'short', day: 'numeric' };
      try {
        return date.toLocaleDateString(undefined, options);
      } catch (e) {
        return dateStr;
      }
    }

    function performSearch(query, sort, options) {
      var opts = options || {};
      if (!query) {
        setState({ query: '', results: null, loading: false, error: null });
        return;
      }

      setState({ query: query, sort: sort, loading: true, error: null });

      try {
        var results = WebsiteSDK.searchLyricsSongs(query, sort);
        setState({ results: Array.isArray(results) ? results : [], loading: false, error: null });
      } catch (e) {
        console.error('searchLyricsSongs failed', e);
        setState({ results: [], loading: false, error: true });
      }
    }

    function handleInitialLoad() {
      var params = readUrlParams();
      state.query = params.query;
      state.sort = params.sort || 'release_date_newest_first';

      var validSortValues = [
        'release_date_newest_first',
        'release_date_oldest_first',
        'title_a_to_z',
        'title_z_to_a'
      ];
      if (validSortValues.indexOf(state.sort) === -1) {
        state.sort = 'release_date_newest_first';
        writeUrlParams(state.query, state.sort, true);
      }

      renderInto(resultsBodyEl);

      if (state.query) {
        performSearch(state.query, state.sort, { fromInit: true });
      } else {
        writeUrlParams('', state.sort, true);
      }
    }

    function handleSearchSubmit(event) {
      if (event) {
        event.preventDefault();
      }
      if (!searchInputEl) {
        return;
      }
      var rawQuery = searchInputEl.value || '';
      var trimmedQuery = rawQuery.trim();

      if (!trimmedQuery) {
        writeUrlParams('', state.sort, false);
        setState({ query: '', results: null, error: null, loading: false });
        return;
      }

      var sort = state.sort || 'release_date_newest_first';
      writeUrlParams(trimmedQuery, sort, false);
      performSearch(trimmedQuery, sort);
    }

    function handleSortChange(event) {
      var value = event && event.target ? event.target.value : (sortSelectEl ? sortSelectEl.value : '');
      var newSort = value || 'release_date_newest_first';

      writeUrlParams(state.query, newSort, false);
      state.sort = newSort;

      if (state.query) {
        performSearch(state.query, newSort);
      } else {
        setState({ sort: newSort });
      }
    }

    function handleClearClick() {
      if (searchInputEl) {
        searchInputEl.value = '';
        searchInputEl.focus();
      }
    }

    function handleRetry() {
      var params = readUrlParams();
      var query = params.query || state.query;
      var sort = params.sort || state.sort || 'release_date_newest_first';
      if (!query) {
        setState({ error: null, results: null, loading: false });
        return;
      }
      performSearch(query, sort);
    }

    if (searchFormEl) {
      searchFormEl.addEventListener('submit', handleSearchSubmit);
    }
    if (clearButtonEl) {
      clearButtonEl.addEventListener('click', handleClearClick);
    }
    if (sortSelectEl) {
      sortSelectEl.addEventListener('change', handleSortChange);
    }

    window.addEventListener('popstate', function() {
      var params = readUrlParams();
      var query = params.query;
      var sort = params.sort || 'release_date_newest_first';
      state.query = query;
      state.sort = sort;
      if (query) {
        performSearch(query, sort);
      } else {
        setState({ query: '', sort: sort, results: null, error: null, loading: false });
      }
    });

    handleInitialLoad();
  });
  </script>
</body>
