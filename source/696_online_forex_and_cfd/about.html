<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="about.css" />
</head>
<body>
    <div class="page-shell">
        <!-- Header -->
        <header class="site-header">
            <div class="header-inner">
                <a href="index.html" class="brand" aria-label="Trading platform home">
                    <span class="brand-mark" aria-hidden="true">
                        <span class="brand-bar brand-bar-1"></span>
                        <span class="brand-bar brand-bar-2"></span>
                        <span class="brand-bar brand-bar-3"></span>
                        <span class="brand-bar brand-bar-4"></span>
                    </span>
                    <span class="brand-text">
                        <span class="brand-main"><span class="brand-main-primary">Blue</span><span class="brand-main-secondary">Suisse</span></span>
                        <span class="brand-sub">global</span>
                    </span>
                </a>

                <nav class="primary-nav" aria-label="Main navigation">
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a href="index.html" class="nav-link" title="Main trading dashboard with overview of markets and positions">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a href="markets.html?categoryId=forex" class="nav-link" title="Forex and currency pairs market list">Forex</a>
                        </li>
                        <li class="nav-item">
                            <a href="markets.html?categoryId=indices" class="nav-link" title="Index CFDs market list">Indices</a>
                        </li>
                        <li class="nav-item">
                            <a href="markets.html?categoryId=all_markets" class="nav-link" title="All tradable instruments across categories">All Markets</a>
                        </li>
                        <li class="nav-item">
                            <a href="watchlists.html" class="nav-link" title="Favorites and custom watchlists management">Watchlists</a>
                        </li>
                        <li class="nav-item">
                            <a href="portfolio.html" class="nav-link" title="Open positions and portfolio management">Portfolio</a>
                        </li>
                        <li class="nav-item">
                            <a href="history.html" class="nav-link" title="Trade history, reports, and performance by day">History</a>
                        </li>
                        <li class="nav-item">
                            <a href="calendar.html" class="nav-link" title="Economic calendar of upcoming macro events">Calendar</a>
                        </li>
                        <li class="nav-item">
                            <a href="help.html" class="nav-link" title="Help center and platform usage guides">Help</a>
                        </li>
                    </ul>
                </nav>

                <div class="header-actions">
                    <a href="register.html" class="btn btn-outline-primary" title="Create a new trading account">Register</a>
                    <a href="login.html" class="header-login" title="Log in to your trading account">LOGIN</a>
                </div>
            </div>
        </header>

        <!-- Main content shell -->
        <main id="content" class="layout-main" role="main">
            <section class="about-page" data-component="about-content-loader">
                <div class="about-page-inner max-width-container">
                    <!-- Loading indicator -->
                    <section class="about-loading" data-component="about-loading-indicator" aria-live="polite">
                        <div class="loading-indicator loading-indicator--centered">
                            <span class="loading-spinner" aria-hidden="true"></span>
                        </div>
                    </section>

                    <!-- Error state -->
                    <section class="about-error" data-component="about-error-state" hidden aria-live="polite">
                        <div class="about-error-inner">
                            <div class="about-error-icon" aria-hidden="true"></div>
                            <div class="about-error-text">
                                <p class="about-error-message" data-populate="about-error-message"></p>
                            </div>
                            <button type="button" class="btn btn-outline-primary" data-action="about-retry"></button>
                        </div>
                    </section>

                    <!-- Main about content -->
                    <section class="about-main" data-component="about-main-content" hidden>
                        <!-- Hero -->
                        <header class="about-hero">
                            <div class="about-hero-mark" aria-hidden="true">
                                <span class="hero-bar hero-bar-1"></span>
                                <span class="hero-bar hero-bar-2"></span>
                                <span class="hero-bar hero-bar-3"></span>
                                <span class="hero-bar hero-bar-4"></span>
                            </div>
                            <h1 class="about-hero-title" data-populate="about-headline"></h1>
                            <p class="about-hero-subtitle" data-populate="about-subtitle"></p>
                        </header>

                        <!-- Section navigation -->
                        <nav class="about-section-nav" data-component="about-section-navigation" aria-label="About sections">
                            <ul class="about-section-nav-list" data-populate="about-section-nav">
                                <!-- Items rendered dynamically -->
                            </ul>
                        </nav>

                        <!-- Extended content & regulatory info -->
                        <div class="about-body">
                            <!-- Dynamic sections -->
                            <section class="about-sections" data-populate="about-sections" aria-label="About content sections">
                                <!-- Sections rendered dynamically -->
                            </section>

                            <!-- Regulatory list -->
                            <section class="about-regulatory" data-component="about-regulatory-list" aria-label="Regulatory information">
                                <div class="about-regulatory-inner">
                                    <div class="about-regulatory-list" data-populate="about-regulatory">
                                        <!-- Regulatory entries rendered dynamically -->
                                    </div>
                                    <div class="about-regulatory-actions">
                                        <button type="button" class="link-button" data-action="about-view-legal"></button>
                                    </div>
                                </div>
                            </section>
                        </div>

                        <!-- CTA panel -->
                        <section class="about-cta-panel" data-component="about-cta-panel">
                            <div class="about-cta-inner">
                                <h2 class="about-cta-title" data-populate="about-cta-title"></h2>
                                <p class="about-cta-text" data-populate="about-cta-text"></p>
                                <div class="about-cta-actions">
                                    <button type="button" class="btn btn-outline-primary" data-action="about-contact-cta"></button>
                                    <button type="button" class="btn btn-secondary" data-action="about-education-cta"></button>
                                </div>
                            </div>
                        </section>
                    </section>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="site-footer">
            <div class="footer-inner">
                <nav class="footer-nav" aria-label="Footer navigation">
                    <ul class="footer-list">
                        <li class="footer-item"><a href="about.html" class="footer-link" title="About the platform and company">About</a></li>
                        <li class="footer-item"><a href="contact.html" class="footer-link" title="Contact and support information">Contact</a></li>
                        <li class="footer-item"><a href="fees.html" class="footer-link" title="Information on spreads, commissions, and trading costs">Spreads &amp; Fees</a></li>
                        <li class="footer-item"><a href="education.html" class="footer-link" title="Educational resources for forex and CFD trading">Education</a></li>
                        <li class="footer-item"><a href="legal.html" class="footer-link" title="Terms of use, risk disclosure, and privacy policy">Legal &amp; Policies</a></li>
                        <li class="footer-item"><a href="alerts.html" class="footer-link" title="Manage all price alerts across instruments">Alerts</a></li>
                        <li class="footer-item"><a href="settings.html" class="footer-link" title="Platform preferences and default order settings">Settings</a></li>
                    </ul>
                </nav>
                <div class="footer-meta">
                    <span class="footer-copy">&copy; <span id="current-year">2024</span> BlueSuisse Global. All rights reserved.</span>
                </div>
            </div>
        </footer>
    </div>

    <script src="business_logic.js"></script>
    <script>
        (function() {
            'use strict';

            const LOCALIZED_STRINGS = {
                en: {
                    errorDescription: 'We could not load this information. Please try again.',
                    retry: 'Retry',
                    contactCta: 'Contact us',
                    educationCta: 'Learn more about trading',
                    legalCta: 'View legal documentation'
                }
            };

            const aboutState = {
                loading: false,
                error: false,
                data: null,
                sectionsWithSlugs: [],
                regulatoryInfo: [],
                activeSectionSlug: null,
                initialSectionParam: null,
                dom: {}
            };

            function slugify(value) {
                if (!value) return '';
                return String(value)
                    .toLowerCase()
                    .trim()
                    .replace(/[^a-z0-9]+/g, '-')
                    .replace(/^-+|-+$/g, '');
            }

            function setLoading(isLoading) {
                aboutState.loading = isLoading;
                if (aboutState.dom.loadingIndicator) {
                    aboutState.dom.loadingIndicator.hidden = !isLoading;
                }
                if (aboutState.dom.mainContent) {
                    aboutState.dom.mainContent.hidden = isLoading || aboutState.error;
                }
                if (aboutState.dom.errorState) {
                    // Do not change here; error visibility handled in setError
                }
            }

            function setError(hasError) {
                aboutState.error = hasError;
                if (aboutState.dom.errorState) {
                    aboutState.dom.errorState.hidden = !hasError;
                }
                if (aboutState.dom.mainContent) {
                    aboutState.dom.mainContent.hidden = hasError || aboutState.loading;
                }
                if (aboutState.dom.loadingIndicator && hasError) {
                    aboutState.dom.loadingIndicator.hidden = true;
                }
            }

            function syncUrlSectionParam(slug, replace) {
                try {
                    const url = new URL(window.location.href);
                    if (slug) {
                        url.searchParams.set('section', slug);
                    } else {
                        url.searchParams.delete('section');
                    }
                    const newUrl = `${url.pathname}${url.search}${url.hash}`;
                    const state = { section: slug };
                    if (replace) {
                        history.replaceState(state, '', newUrl);
                    } else {
                        history.pushState(state, '', newUrl);
                    }
                } catch (e) {
                    // Fallback: ignore URL sync errors
                }
            }

            function updateNavActiveState() {
                if (!aboutState.dom.sectionNavList) return;
                const buttons = aboutState.dom.sectionNavList.querySelectorAll('[data-action="about-goto-section"]');
                buttons.forEach(function(btn) {
                    const slug = btn.getAttribute('data-section-slug');
                    if (slug === aboutState.activeSectionSlug) {
                        btn.classList.add('is-active');
                    } else {
                        btn.classList.remove('is-active');
                    }
                });
            }

            function scrollToActiveSection() {
                const slug = aboutState.activeSectionSlug;
                if (!slug) return;

                let target = null;
                if (aboutState.dom.sectionsContainer) {
                    const selector = `[data-section-slug="${slug}"]`;
                    target = aboutState.dom.sectionsContainer.querySelector(selector);
                }

                if (!target && aboutState.dom.regulatoryComponent) {
                    // If requested slug does not match a section, fall back to regulatory block
                    target = aboutState.dom.regulatoryComponent;
                }

                if (target && typeof target.scrollIntoView === 'function') {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }

            function renderAboutPage() {
                const data = aboutState.data || {};

                // Headline
                if (aboutState.dom.headline) {
                    if (typeof data.headline === 'string') {
                        aboutState.dom.headline.textContent = data.headline;
                    } else {
                        aboutState.dom.headline.textContent = '';
                    }
                }

                // Hero subtitle: derive from first section body if present
                if (aboutState.dom.subtitle) {
                    const firstSection = aboutState.sectionsWithSlugs.length > 0 ? aboutState.sectionsWithSlugs[0] : null;
                    if (firstSection && firstSection.body) {
                        aboutState.dom.subtitle.textContent = firstSection.body;
                        aboutState.dom.subtitle.style.display = '';
                    } else {
                        aboutState.dom.subtitle.textContent = '';
                        aboutState.dom.subtitle.style.display = 'none';
                    }
                }

                // Section navigation
                if (aboutState.dom.sectionNavList) {
                    const listEl = aboutState.dom.sectionNavList;
                    listEl.innerHTML = '';

                    aboutState.sectionsWithSlugs.forEach(function(sec) {
                        const li = document.createElement('li');
                        li.className = 'about-section-nav-item-wrapper';

                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'about-section-nav-item';
                        btn.setAttribute('data-action', 'about-goto-section');
                        btn.setAttribute('data-section-slug', sec.slug);
                        btn.textContent = sec.title || '';
                        if (sec.slug === aboutState.activeSectionSlug) {
                            btn.classList.add('is-active');
                        }

                        li.appendChild(btn);
                        listEl.appendChild(li);
                    });

                    if (aboutState.sectionsWithSlugs.length === 0) {
                        if (listEl.parentElement) {
                            listEl.parentElement.style.display = 'none';
                        }
                    } else if (listEl.parentElement) {
                        listEl.parentElement.style.display = '';
                    }
                }

                // Sections content
                if (aboutState.dom.sectionsContainer) {
                    const container = aboutState.dom.sectionsContainer;
                    container.innerHTML = '';

                    aboutState.sectionsWithSlugs.forEach(function(sec) {
                        const sectionEl = document.createElement('section');
                        sectionEl.className = 'about-section-block';
                        if (sec.slug) {
                            sectionEl.setAttribute('data-section-slug', sec.slug);
                            sectionEl.id = `about-section-${sec.slug}`;
                        }

                        const titleEl = document.createElement('h2');
                        titleEl.className = 'about-section-title';
                        titleEl.textContent = sec.title || '';

                        const bodyEl = document.createElement('p');
                        bodyEl.className = 'about-section-body';
                        bodyEl.textContent = sec.body || '';

                        sectionEl.appendChild(titleEl);
                        sectionEl.appendChild(bodyEl);
                        container.appendChild(sectionEl);
                    });
                }

                // Regulatory list
                if (aboutState.dom.regulatoryComponent && aboutState.dom.regulatoryContainer) {
                    const container = aboutState.dom.regulatoryContainer;
                    if (!aboutState.regulatoryInfo || aboutState.regulatoryInfo.length === 0) {
                        aboutState.dom.regulatoryComponent.hidden = true;
                        container.innerHTML = '';
                    } else {
                        aboutState.dom.regulatoryComponent.hidden = false;
                        container.innerHTML = '';

                        aboutState.regulatoryInfo.forEach(function(entry, index) {
                            const itemEl = document.createElement('div');
                            itemEl.className = 'about-regulatory-item';
                            itemEl.setAttribute('data-regulatory-index', String(index));

                            Object.keys(entry || {}).forEach(function(key) {
                                const value = entry[key];
                                if (value === undefined || value === null || value === '') return;

                                const fieldEl = document.createElement('div');
                                fieldEl.className = 'about-regulatory-field';

                                const labelEl = document.createElement('span');
                                labelEl.className = 'about-regulatory-field-label';
                                labelEl.textContent = key.replace(/_/g, ' ');

                                const valueEl = document.createElement('span');
                                valueEl.className = 'about-regulatory-field-value';
                                valueEl.textContent = value;

                                fieldEl.appendChild(labelEl);
                                fieldEl.appendChild(valueEl);
                                itemEl.appendChild(fieldEl);
                            });

                            container.appendChild(itemEl);
                        });
                    }
                }

                // CTA panel (derive context from sections)
                if (aboutState.dom.ctaPanel && aboutState.dom.ctaTitle && aboutState.dom.ctaText) {
                    let ctaSection = null;
                    if (aboutState.sectionsWithSlugs && aboutState.sectionsWithSlugs.length > 0) {
                        ctaSection = aboutState.sectionsWithSlugs.find(function(sec) {
                            return /education|learn/i.test(sec.title || '');
                        }) || aboutState.sectionsWithSlugs.find(function(sec) {
                            return /contact|support/i.test(sec.title || '');
                        }) || aboutState.sectionsWithSlugs[aboutState.sectionsWithSlugs.length - 1];
                    }

                    if (ctaSection) {
                        aboutState.dom.ctaPanel.hidden = false;
                        aboutState.dom.ctaTitle.textContent = ctaSection.title || '';
                        aboutState.dom.ctaText.textContent = ctaSection.body || '';
                    } else {
                        aboutState.dom.ctaPanel.hidden = true;
                        aboutState.dom.ctaTitle.textContent = '';
                        aboutState.dom.ctaText.textContent = '';
                    }
                }

                if (aboutState.dom.mainContent && !aboutState.loading && !aboutState.error) {
                    aboutState.dom.mainContent.hidden = false;
                }

                updateNavActiveState();
            }

            function loadAboutContent() {
                setLoading(true);
                setError(false);

                try {
                    const response = WebsiteSDK.getAboutPageContent();
                    aboutState.data = response || {};

                    const sectionsArr = Array.isArray(aboutState.data.sections) ? aboutState.data.sections : [];
                    aboutState.sectionsWithSlugs = sectionsArr.map(function(sec) {
                        const title = sec && typeof sec.title === 'string' ? sec.title : '';
                        const body = sec && typeof sec.body === 'string' ? sec.body : '';
                        return {
                            title: title,
                            body: body,
                            slug: slugify(title)
                        };
                    });

                    aboutState.regulatoryInfo = Array.isArray(aboutState.data.regulatory_info)
                        ? aboutState.data.regulatory_info
                        : [];

                    let desiredSlug = aboutState.initialSectionParam;
                    if (desiredSlug) {
                        const match = aboutState.sectionsWithSlugs.find(function(sec) {
                            return sec.slug === desiredSlug;
                        });
                        if (match) {
                            aboutState.activeSectionSlug = match.slug;
                        }
                    }

                    if (!aboutState.activeSectionSlug && aboutState.sectionsWithSlugs.length > 0) {
                        aboutState.activeSectionSlug = aboutState.sectionsWithSlugs[0].slug;
                        syncUrlSectionParam(aboutState.activeSectionSlug, true);
                    }

                    renderAboutPage();
                    setLoading(false);
                    scrollToActiveSection();
                } catch (err) {
                    console.error(err);
                    setLoading(false);
                    setError(true);
                }
            }

            function handleSectionNavClick(slug) {
                if (!slug || slug === aboutState.activeSectionSlug) return;
                aboutState.activeSectionSlug = slug;
                updateNavActiveState();
                syncUrlSectionParam(slug, false);
                scrollToActiveSection();
            }

            function handlePopState() {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const sectionSlug = params.get('section');
                    if (sectionSlug && sectionSlug !== aboutState.activeSectionSlug) {
                        aboutState.activeSectionSlug = sectionSlug;
                        updateNavActiveState();
                        scrollToActiveSection();
                    }
                } catch (e) {
                    // Ignore popstate parsing errors
                }
            }

            function handleContactClick() {
                const params = new URLSearchParams();
                params.set('ref', 'about');

                let topicSource = aboutState.activeSectionSlug;
                if (!topicSource && aboutState.data && typeof aboutState.data.headline === 'string') {
                    topicSource = slugify(aboutState.data.headline);
                }
                if (topicSource) {
                    params.set('topic', topicSource);
                }

                window.location.href = `contact.html?${params.toString()}`;
            }

            function handleEducationClick() {
                const params = new URLSearchParams();
                params.set('ref', 'about');
                if (aboutState.activeSectionSlug) {
                    params.set('source_section', aboutState.activeSectionSlug);
                }
                window.location.href = `education.html?${params.toString()}`;
            }

            function handleLegalClick() {
                const params = new URLSearchParams();
                params.set('ref', 'about');
                // Context derived generically from regulatory block identifier
                params.set('context', 'regulatory_information');
                window.location.href = `legal.html?${params.toString()}`;
            }

            document.addEventListener('DOMContentLoaded', function() {
                const loaderComponent = document.querySelector('[data-component="about-content-loader"]');
                if (!loaderComponent) return;

                const urlParams = new URLSearchParams(window.location.search);
                aboutState.initialSectionParam = urlParams.get('section');

                aboutState.dom.loaderComponent = loaderComponent;
                aboutState.dom.loadingIndicator = loaderComponent.querySelector('[data-component="about-loading-indicator"]');
                aboutState.dom.errorState = loaderComponent.querySelector('[data-component="about-error-state"]');
                aboutState.dom.mainContent = loaderComponent.querySelector('[data-component="about-main-content"]');

                aboutState.dom.errorMessage = loaderComponent.querySelector('[data-populate="about-error-message"]');
                aboutState.dom.errorRetryButton = loaderComponent.querySelector('[data-action="about-retry"]');

                aboutState.dom.headline = loaderComponent.querySelector('[data-populate="about-headline"]');
                aboutState.dom.subtitle = loaderComponent.querySelector('[data-populate="about-subtitle"]');
                aboutState.dom.sectionNavList = loaderComponent.querySelector('[data-populate="about-section-nav"]');
                aboutState.dom.sectionsContainer = loaderComponent.querySelector('[data-populate="about-sections"]');

                aboutState.dom.regulatoryComponent = loaderComponent.querySelector('[data-component="about-regulatory-list"]');
                aboutState.dom.regulatoryContainer = loaderComponent.querySelector('[data-populate="about-regulatory"]');
                aboutState.dom.regulatoryLegalButton = loaderComponent.querySelector('[data-action="about-view-legal"]');

                aboutState.dom.ctaPanel = loaderComponent.querySelector('[data-component="about-cta-panel"]');
                aboutState.dom.ctaTitle = loaderComponent.querySelector('[data-populate="about-cta-title"]');
                aboutState.dom.ctaText = loaderComponent.querySelector('[data-populate="about-cta-text"]');
                aboutState.dom.ctaContactButton = loaderComponent.querySelector('[data-action="about-contact-cta"]');
                aboutState.dom.ctaEducationButton = loaderComponent.querySelector('[data-action="about-education-cta"]');

                // Initialize localized static labels
                if (aboutState.dom.errorMessage) {
                    aboutState.dom.errorMessage.textContent = LOCALIZED_STRINGS.en.errorDescription;
                }
                if (aboutState.dom.errorRetryButton) {
                    aboutState.dom.errorRetryButton.textContent = LOCALIZED_STRINGS.en.retry;
                }
                if (aboutState.dom.regulatoryLegalButton) {
                    aboutState.dom.regulatoryLegalButton.textContent = LOCALIZED_STRINGS.en.legalCta;
                }
                if (aboutState.dom.ctaContactButton) {
                    aboutState.dom.ctaContactButton.textContent = LOCALIZED_STRINGS.en.contactCta;
                }
                if (aboutState.dom.ctaEducationButton) {
                    aboutState.dom.ctaEducationButton.textContent = LOCALIZED_STRINGS.en.educationCta;
                }

                // Bind actions
                if (aboutState.dom.errorRetryButton) {
                    aboutState.dom.errorRetryButton.addEventListener('click', function() {
                        loadAboutContent();
                    });
                }
                if (aboutState.dom.ctaContactButton) {
                    aboutState.dom.ctaContactButton.addEventListener('click', function() {
                        handleContactClick();
                    });
                }
                if (aboutState.dom.ctaEducationButton) {
                    aboutState.dom.ctaEducationButton.addEventListener('click', function() {
                        handleEducationClick();
                    });
                }
                if (aboutState.dom.regulatoryLegalButton) {
                    aboutState.dom.regulatoryLegalButton.addEventListener('click', function() {
                        handleLegalClick();
                    });
                }

                if (aboutState.dom.sectionNavList) {
                    aboutState.dom.sectionNavList.addEventListener('click', function(event) {
                        const target = event.target.closest('[data-action="about-goto-section"]');
                        if (!target) return;
                        const slug = target.getAttribute('data-section-slug');
                        if (slug) {
                            handleSectionNavClick(slug);
                        }
                    });
                }

                window.addEventListener('popstate', function() {
                    handlePopState();
                });

                // Initial load
                loadAboutContent();
            });
        })();
    </script>
</body>
</html>
