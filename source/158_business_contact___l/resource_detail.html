<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Primadance - Business Site</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'>

  <!-- Site styles -->
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='resource_detail.css'>
</head>
<body>
  <div class='page'>
    <!-- Background diagonals -->
    <div class='bg-diagonals' aria-hidden='true'>
      <div class='bg-diagonal bg-diagonal-left'></div>
      <div class='bg-diagonal bg-diagonal-right'></div>
    </div>

    <header class='site-header'>
      <div class='shell'>
        <div class='header-inner'>
          <a class='brand' href='index.html'>
            <span class='brand-title'>PRIMADANCE.COM</span>
            <span class='brand-tagline'>Contact-driven business solutions</span>
          </a>

          <nav class='primary-nav' aria-label='Primary navigation'>
            <ul class='nav-list'>
              <li class='nav-item'><a class='nav-link' href='index.html'>Home</a></li>
              <li class='nav-item'><a class='nav-link' href='pricing.html'>Pricing</a></li>
              <li class='nav-item'><a class='nav-link' href='resources.html'>Resources</a></li>
              <li class='nav-item'><a class='nav-link' href='partnerships.html'>Partners</a></li>
              <li class='nav-item'><a class='nav-link' href='contact.html'>Contact</a></li>
              <li class='nav-item'><a class='nav-link nav-link-cta' href='demo.html'>Book a Demo</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <section class='resource-detail' aria-label='Resource detail' data-component='resource-detail-page'>
        <div class='shell'>
          <div class='resource-detail-inner'>
            <div id='resource-status-region' class='resource-status-region' aria-live='polite'>
              <div id='resource-loading' data-component='loading-indicator'></div>
              <div id='resource-error' data-component='resource-error-state'></div>
            </div>

            <div id='resource-layout' data-populate='resource-detail'></div>
          </div>
        </div>
      </section>

      <div id='chat-widget-root' data-populate='chat-widget'></div>
    </main>

    <footer class='site-footer'>
      <div class='shell'>
        <div class='footer-inner'>
          <div class='footer-brand-block'>
            <div class='footer-brand'>PRIMADANCE.COM</div>
            <div class='footer-meta'>© 2024 Primadance. All rights reserved.</div>
          </div>

          <nav class='footer-nav' aria-label='Footer navigation'>
            <ul class='footer-links'>
              <li class='footer-item'><a href='about.html'>About</a></li>
              <li class='footer-item'><a href='pricing.html'>Pricing</a></li>
              <li class='footer-item'><a href='resources.html'>Resources</a></li>
              <li class='footer-item'><a href='partnerships.html'>Partners</a></li>
              <li class='footer-item'><a href='contact.html'>Contact</a></li>
              <li class='footer-item'><a href='contact.html?tab=support'>Support</a></li>
              <li class='footer-item'><a href='privacy.html'>Privacy Policy</a></li>
              <li class='footer-item'><a href='terms.html'>Terms of Use</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      'use strict';

      var state = {
        resourceId: null,
        resource: null,
        valueHighlights: [],
        downloadCtaLabel: '',
        isLeadFormOpen: false,
        hasDownloaded: false,
        leadFormOptions: {
          industryOptions: [],
          companySizeOptions: [],
          implementationTimelineOptions: [],
          optInRelatedResearchLabel: ''
        },
        leadFormValues: {
          fullName: '',
          workEmail: '',
          industry: '',
          companySize: '',
          implementationTimeline: '',
          optInRelatedResearch: false
        },
        leadSubmitResponse: null,
        chatConfig: {
          welcomeMessage: '',
          topics: [],
          followupPreferences: []
        },
        chatFormValues: {
          topic: '',
          name: '',
          email: '',
          summary: '',
          followupPreference: ''
        },
        chatSubmitResponse: null,
        chatWidgetOpen: false,
        loading: {
          resource: false,
          leadFormOptions: false,
          submittingLead: false,
          chatConfig: false,
          submittingChat: false
        },
        errors: {
          resourceLoad: '',
          leadFormOptions: '',
          leadSubmit: '',
          chatConfig: '',
          chatSubmit: ''
        }
      };

      var urlParams = new URLSearchParams(window.location.search);
      state.resourceId = urlParams.get('id');
      state.isLeadFormOpen = urlParams.get('form') === 'open';
      if (urlParams.get('downloaded') === '1') {
        state.hasDownloaded = true;
      }

      var resourceLayoutContainer = document.querySelector('[data-populate=resource-detail]');
      var loadingContainer = document.getElementById('resource-loading');
      var errorContainer = document.getElementById('resource-error');
      var chatWidgetContainer = document.querySelector('[data-populate=chat-widget]');

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value).replace(/[&<>"']/g, function (ch) {
          if (ch === '&') return '&amp;';
          if (ch === '<') return '&lt;';
          if (ch === '>') return '&gt;';
          if (ch === '"') return '&quot;';
          if (ch === '\'') return '&#39;';
          return ch;
        });
      }

      function escapeAttribute(value) {
        return escapeHtml(value);
      }

      function formatContentType(value) {
        if (!value) return '';
        var withSpaces = String(value).replace(/_/g, ' ');
        return withSpaces.charAt(0).toUpperCase() + withSpaces.slice(1);
      }

      function renderLoading(container) {
        if (!container) return;
        if (state.loading.resource) {
          container.innerHTML = "<div class='loading-indicator-inner'><div class='spinner'></div><p>Loading resource...</p></div>";
        } else {
          container.innerHTML = '';
        }
      }

      function renderResourceError(container) {
        if (!container) return;
        var code = state.errors.resourceLoad;
        if (!code) {
          container.innerHTML = '';
          return;
        }
        var message = '';
        if (code === 'missing-id') {
          message = 'We could not determine which resource to show.';
        } else if (code === 'not-found') {
          message = 'The requested resource could not be found.';
        } else {
          message = 'There was a problem loading this resource.';
        }
        container.innerHTML = "\n          <div class='resource-error-card'>\n            <div class='resource-error-card-inner'>\n              <h1 class='resource-error-title'>Resource unavailable</h1>\n              <p class='resource-error-message'>" + escapeHtml(message) + "</p>\n              <button type='button' class='link-button' data-action='back-to-resources'>Back to Resources</button>\n            </div>\n          </div>\n        ";
      }

      function renderLeadConfirmationBody() {
        var resp = state.leadSubmitResponse || {};
        var messageHtml = resp.message ? "<p class='confirmation-message'>" + escapeHtml(resp.message) + "</p>" : '';
        var resourceTitle = resp.resourceTitle || (state.resource ? state.resource.title : '');
        var downloadUrl = resp.downloadUrl || '';
        var downloadLinkHtml = '';
        if (downloadUrl) {
          downloadLinkHtml = "<a class='btn btn-primary' href='" + escapeAttribute(downloadUrl) + "' data-action='download-after-lead'>" + escapeHtml(state.downloadCtaLabel || 'Download') + "</a>";
        }
        return "\n          <div class='download-confirmation' data-component='resource-download-confirmation-panel'>\n            <h3 class='confirmation-title'>" + escapeHtml(resourceTitle || 'Your download is ready') + "</h3>\n            " + messageHtml + "\n            <div class='confirmation-actions'>" + downloadLinkHtml + "</div>\n          </div>\n        ";
      }

      function renderUngatedCardBody() {
        var resource = state.resource;
        if (!resource) return '';
        var downloadUrl = resource.downloadUrl || '';
        if (!downloadUrl) {
          return "<div class='download-panel'><p>This resource is currently unavailable for download.</p></div>";
        }
        return "\n          <div class='download-panel' data-component='resource-download-confirmation-panel'>\n            <p class='download-panel-text'>Use the button below to download this resource directly. No form required.</p>\n            <a class='btn btn-primary' href='" + escapeAttribute(downloadUrl) + "' data-action='download-direct'>" + escapeHtml(state.downloadCtaLabel || 'Download') + "</a>\n          </div>\n        ";
      }

      function renderLeadFormBody() {
        var options = state.leadFormOptions || {};
        var industryOptions = Array.isArray(options.industryOptions) ? options.industryOptions : [];
        var companySizeOptions = Array.isArray(options.companySizeOptions) ? options.companySizeOptions : [];
        var implementationTimelineOptions = Array.isArray(options.implementationTimelineOptions) ? options.implementationTimelineOptions : [];
        var values = state.leadFormValues || {};

        var industryOptionsHtml = "<option value=''>Select your industry</option>";
        industryOptions.forEach(function (opt) {
          var value = opt && opt.value ? opt.value : '';
          var label = opt && opt.label ? opt.label : value;
          var selected = values.industry === value ? ' selected' : '';
          industryOptionsHtml += "<option value='" + escapeAttribute(value) + "'" + selected + ">" + escapeHtml(label) + "</option>";
        });

        var companySizeOptionsHtml = "<option value=''>Company size</option>";
        companySizeOptions.forEach(function (opt) {
          var value = opt && opt.value ? opt.value : '';
          var label = opt && opt.label ? opt.label : value;
          var selected = values.companySize === value ? ' selected' : '';
          companySizeOptionsHtml += "<option value='" + escapeAttribute(value) + "'" + selected + ">" + escapeHtml(label) + "</option>";
        });

        var implementationTimelineOptionsHtml = "<option value=''>Implementation timeline</option>";
        implementationTimelineOptions.forEach(function (opt) {
          var value = opt && opt.value ? opt.value : '';
          var label = opt && opt.label ? opt.label : value;
          var selected = values.implementationTimeline === value ? ' selected' : '';
          implementationTimelineOptionsHtml += "<option value='" + escapeAttribute(value) + "'" + selected + ">" + escapeHtml(label) + "</option>";
        });

        var optInLabel = options.optInRelatedResearchLabel || 'I would like to receive related research.';

        return "\n          <form class='lead-form' data-component='resource-download-lead-form' data-action='submit-lead-form' novalidate>\n            <div class='form-row form-row-split'>\n              <div class='form-group'>\n                <label for='lead-full-name'>Full name</label>\n                <input id='lead-full-name' name='fullName' type='text' autocomplete='name' value='" + escapeAttribute(values.fullName || '') + "'>\n              </div>\n              <div class='form-group'>\n                <label for='lead-work-email'>Work email</label>\n                <input id='lead-work-email' name='workEmail' type='email' autocomplete='email' value='" + escapeAttribute(values.workEmail || '') + "'>\n              </div>\n            </div>\n\n            <div class='form-row'>\n              <div class='form-group'>\n                <label for='lead-industry'>Industry</label>\n                <select id='lead-industry' name='industry'>" + industryOptionsHtml + "</select>\n              </div>\n            </div>\n\n            <div class='form-row form-row-split'>\n              <div class='form-group'>\n                <label for='lead-company-size'>Company size</label>\n                <select id='lead-company-size' name='companySize'>" + companySizeOptionsHtml + "</select>\n              </div>\n              <div class='form-group'>\n                <label for='lead-implementation-timeline'>Implementation timeline</label>\n                <select id='lead-implementation-timeline' name='implementationTimeline'>" + implementationTimelineOptionsHtml + "</select>\n              </div>\n            </div>\n\n            <div class='form-row'>\n              <label class='checkbox-label'>\n                <input type='checkbox' name='optInRelatedResearch' " + (values.optInRelatedResearch ? 'checked' : '') + ">\n                <span>" + escapeHtml(optInLabel) + "</span>\n              </label>\n            </div>\n\n            <div class='card-divider'></div>\n\n            <div class='form-row form-row-footer'>\n              <div class='form-verification-placeholder'>\n                <span class='verification-label'>Human verification</span>\n              </div>\n              <div class='form-actions'>\n                <button type='submit' class='btn btn-primary'>" + escapeHtml(state.downloadCtaLabel || 'Download') + "</button>\n              </div>\n            </div>\n          </form>\n        ";
      }

      function renderResourceCardBody() {
        var resource = state.resource;
        if (!resource) return '';

        if (!resource.isGated) {
          return renderUngatedCardBody();
        }

        if (state.leadSubmitResponse && state.leadSubmitResponse.success) {
          return renderLeadConfirmationBody();
        }

        if (state.loading.leadFormOptions || state.loading.submittingLead) {
          return "\n            <div class='card-loading' data-component='loading-indicator'>\n              <div class='spinner'></div>\n              <p>Preparing your form...</p>\n            </div>\n          ";
        }

        if (state.errors.leadFormOptions) {
          return "\n            <div class='card-error'>\n              <p>" + escapeHtml(state.errors.leadFormOptions) + "</p>\n              <button type='button' class='btn btn-secondary' data-action='retry-lead-form-options'>Retry</button>\n            </div>\n          ";
        }

        if (!state.isLeadFormOpen) {
          return "\n            <div class='card-placeholder'>\n              <p>Use the download button on the left to open the access form.</p>\n            </div>\n          ";
        }

        return renderLeadFormBody();
      }

      function renderResourceLayout(container) {
        if (!container) return;
        if (!state.resource || state.errors.resourceLoad) {
          container.innerHTML = '';
          return;
        }
        var resource = state.resource;
        var highlights = state.valueHighlights || [];

        var highlightsHtml = '';
        if (highlights.length) {
          var items = '';
          highlights.forEach(function (item) {
            items += "<li class='resource-highlight-item'>" + escapeHtml(item) + "</li>";
          });
          highlightsHtml = "<ul class='resource-highlights'>" + items + "</ul>";
        }

        var metaPieces = [];
        if (resource.contentType) {
          metaPieces.push(formatContentType(resource.contentType));
        }
        if (resource.primaryTopic) {
          metaPieces.push(resource.primaryTopic);
        }
        var metaLine = '';
        if (metaPieces.length) {
          var joined = '';
          metaPieces.forEach(function (p, index) {
            if (index > 0) {
              joined += "<span class='resource-meta-separator'>•</span>";
            }
            joined += "<span class='resource-meta-item'>" + escapeHtml(p) + "</span>";
          });
          metaLine = "<div class='resource-meta-line'>" + joined + "</div>";
        }

        var gatedCtaHtml;
        if (resource.isGated) {
          gatedCtaHtml = "<button type='button' class='btn btn-secondary' data-component='gated-download-cta' data-action='open-lead-form'>" + escapeHtml(state.downloadCtaLabel || 'Download') + "</button>";
        } else {
          gatedCtaHtml = "<button type='button' class='btn btn-secondary' data-component='gated-download-cta' data-action='download-direct'>" + escapeHtml(state.downloadCtaLabel || 'Download') + "</button>";
        }

        var leadErrorBanner = '';
        if (state.errors.leadSubmit && resource.isGated && !(state.leadSubmitResponse && state.leadSubmitResponse.success)) {
          leadErrorBanner = "<div class='card-error-banner'>" + escapeHtml(state.errors.leadSubmit) + "</div>";
        }

        var cardBodyHtml = renderResourceCardBody();

        var cardHtml = "\n          <section class='resource-card-column'>\n            <div class='card resource-card' data-component='resource-download-card'>\n              <div class='card-header'>\n                <h2 class='card-title'>Access this resource</h2>\n              </div>\n              <div class='card-body'>\n                " + leadErrorBanner + "\n                " + cardBodyHtml + "\n              </div>\n            </div>\n          </section>\n        "

        var descriptionHtml = resource.description ? "<p class='resource-description'>" + escapeHtml(resource.description) + "</p>" : '';

        var html = "\n          <div class='resource-layout-grid'>\n            <section class='resource-metadata-column' data-component='resource-metadata-panel'>\n              <button type='button' class='link-back' data-action='back-to-resources'>&larr; Back to Resources</button>\n              " + metaLine + "\n              <h1 id='resource-title' class='resource-title'>" + escapeHtml(resource.title || '') + "</h1>\n              " + descriptionHtml + "\n              " + highlightsHtml + "\n              <div class='resource-cta-row'>\n                " + gatedCtaHtml + "\n              </div>\n            </section>\n            " + cardHtml + "\n          </div>\n        ";

        container.innerHTML = html;
      }

      function ensureLeadFormOptionsLoaded() {
        if (!state.resource || !state.resource.isGated) return;
        var options = state.leadFormOptions || {};
        if (Array.isArray(options.industryOptions) && options.industryOptions.length) {
          return;
        }
        state.loading.leadFormOptions = true;
        renderResourceLayout(resourceLayoutContainer);
        try {
          var response = WebsiteSDK.getResourceDownloadLeadFormOptions();
          state.leadFormOptions = response || {};
          state.errors.leadFormOptions = '';
        } catch (e) {
          state.errors.leadFormOptions = 'We could not load the form options. Please try again.';
        }
        state.loading.leadFormOptions = false;
        renderResourceLayout(resourceLayoutContainer);
      }

      function initResource() {
        if (!loadingContainer || !resourceLayoutContainer || !errorContainer) return;
        if (!state.resourceId) {
          state.errors.resourceLoad = 'missing-id';
          renderLoading(loadingContainer);
          renderResourceError(errorContainer);
          renderResourceLayout(resourceLayoutContainer);
          return;
        }
        state.loading.resource = true;
        renderLoading(loadingContainer);
        try {
          var detail = WebsiteSDK.getResourceDetail(state.resourceId);
          if (!detail || !detail.resource || !detail.resource.id) {
            state.errors.resourceLoad = 'not-found';
          } else {
            state.resource = detail.resource;
            state.valueHighlights = Array.isArray(detail.valueHighlights) ? detail.valueHighlights : [];
            state.downloadCtaLabel = detail.downloadCtaLabel || '';
            state.errors.resourceLoad = '';
          }
        } catch (e) {
          state.errors.resourceLoad = 'load-failed';
        }
        state.loading.resource = false;
        renderLoading(loadingContainer);
        renderResourceError(errorContainer);
        renderResourceLayout(resourceLayoutContainer);

        if (state.resource && state.resource.isGated && state.isLeadFormOpen) {
          ensureLeadFormOptionsLoaded();
        }
      }

      function handleOpenLeadForm() {
        if (!state.resource) return;
        if (!state.resource.isGated) {
          handleDirectDownload();
          return;
        }
        state.isLeadFormOpen = !state.isLeadFormOpen;
        if (state.isLeadFormOpen) {
          var url = new URL(window.location.href);
          url.searchParams.set('form', 'open');
          window.history.replaceState(null, '', url.toString());
          ensureLeadFormOptionsLoaded();
        } else {
          var urlClose = new URL(window.location.href);
          urlClose.searchParams.delete('form');
          window.history.replaceState(null, '', urlClose.toString());
          renderResourceLayout(resourceLayoutContainer);
        }
      }

      function handleDirectDownload() {
        if (!state.resource) return;
        var downloadUrl = state.resource.downloadUrl || '';
        if (!downloadUrl) return;
        state.hasDownloaded = true;
        var url = new URL(window.location.href);
        url.searchParams.set('downloaded', '1');
        window.history.replaceState(null, '', url.toString());
        window.location.href = downloadUrl;
      }

      function handleLeadFormSubmit(form) {
        if (!state.resource) return;
        var formData = new FormData(form);
        var fullName = (formData.get('fullName') || '').toString().trim();
        var workEmail = (formData.get('workEmail') || '').toString().trim();
        var industry = (formData.get('industry') || '').toString();
        var companySize = (formData.get('companySize') || '').toString();
        var implementationTimeline = (formData.get('implementationTimeline') || '').toString();
        var optInRelatedResearch = !!formData.get('optInRelatedResearch');

        state.leadFormValues = {
          fullName: fullName,
          workEmail: workEmail,
          industry: industry,
          companySize: companySize,
          implementationTimeline: implementationTimeline,
          optInRelatedResearch: optInRelatedResearch
        };

        var errors = [];
        if (!fullName) {
          errors.push('Please enter your full name.');
        }
        if (!workEmail) {
          errors.push('Please enter your work email.');
        } else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(workEmail)) {
          errors.push('Please enter a valid email address.');
        }
        if (!industry) {
          errors.push('Please select your industry.');
        }
        if (!companySize) {
          errors.push('Please select your company size.');
        }
        if (!implementationTimeline) {
          errors.push('Please select an implementation timeline.');
        }

        if (errors.length) {
          state.errors.leadSubmit = errors.join(' ');
          renderResourceLayout(resourceLayoutContainer);
          return;
        }

        state.errors.leadSubmit = '';
        state.loading.submittingLead = true;
        renderResourceLayout(resourceLayoutContainer);

        var response = null;
        try {
          response = WebsiteSDK.submitResourceDownloadLead(
            state.resource.id,
            fullName,
            workEmail,
            industry,
            companySize,
            implementationTimeline,
            optInRelatedResearch
          );
        } catch (e) {
          state.loading.submittingLead = false;
          state.errors.leadSubmit = 'There was a problem submitting the form. Please try again.';
          renderResourceLayout(resourceLayoutContainer);
          return;
        }

        state.loading.submittingLead = false;
        if (!response || !response.success) {
          state.errors.leadSubmit = response && response.message ? response.message : 'There was a problem submitting the form. Please try again.';
          renderResourceLayout(resourceLayoutContainer);
          return;
        }

        state.leadSubmitResponse = response;
        state.hasDownloaded = true;
        var url = new URL(window.location.href);
        url.searchParams.set('downloaded', '1');
        window.history.replaceState(null, '', url.toString());
        renderResourceLayout(resourceLayoutContainer);
      }

      function initChat() {
        if (!chatWidgetContainer) return;
        state.loading.chatConfig = true;
        renderChatWidget(chatWidgetContainer);
        try {
          var config = WebsiteSDK.getChatWidgetConfig();
          state.chatConfig = {
            welcomeMessage: config && config.welcomeMessage ? config.welcomeMessage : '',
            topics: config && Array.isArray(config.topics) ? config.topics : [],
            followupPreferences: config && Array.isArray(config.followupPreferences) ? config.followupPreferences : []
          };
          state.errors.chatConfig = '';
        } catch (e) {
          state.errors.chatConfig = 'Chat is temporarily unavailable.';
        }
        state.loading.chatConfig = false;
        renderChatWidget(chatWidgetContainer);
      }

      function renderChatWidget(container) {
        if (!container) return;
        if (state.errors.chatConfig) {
          container.innerHTML = '';
          return;
        }

        var isOpen = state.chatWidgetOpen;
        var config = state.chatConfig || {};
        var welcomeMessage = config.welcomeMessage || '';
        var topics = Array.isArray(config.topics) ? config.topics : [];
        var followups = Array.isArray(config.followupPreferences) ? config.followupPreferences : [];

        var bodyHtml = '';

        if (state.chatSubmitResponse && state.chatSubmitResponse.success) {
          var msg = state.chatSubmitResponse.message || 'Thank you, we will follow up soon.';
          bodyHtml = "\n            <div class='chat-confirmation'>\n              <p class='chat-confirmation-message'>" + escapeHtml(msg) + "</p>\n              <button type='button' class='btn btn-secondary chat-close-button' data-action='close-chat'>Close</button>\n            </div>\n          ";
        } else if (state.loading.submittingChat) {
          bodyHtml = "\n            <div class='chat-loading' data-component='loading-indicator'>\n              <div class='spinner'></div>\n              <p>Sending your message...</p>\n            </div>\n          ";
        } else {
          var errorsHtml = state.errors.chatSubmit ? "<div class='chat-error'>" + escapeHtml(state.errors.chatSubmit) + "</div>" : '';

          var values = state.chatFormValues || {};

          var topicOptionsHtml = "<option value=''>Select a topic</option>";
          topics.forEach(function (opt) {
            var value = opt && opt.value ? opt.value : '';
            var label = opt && opt.label ? opt.label : value;
            var selected = values.topic === value ? ' selected' : '';
            topicOptionsHtml += "<option value='" + escapeAttribute(value) + "'" + selected + ">" + escapeHtml(label) + "</option>";
          });

          var followupOptionsHtml = "<option value=''>Follow-up preference</option>";
          followups.forEach(function (opt) {
            var value = opt && opt.value ? opt.value : '';
            var label = opt && opt.label ? opt.label : value;
            var selected = values.followupPreference === value ? ' selected' : '';
            followupOptionsHtml += "<option value='" + escapeAttribute(value) + "'" + selected + ">" + escapeHtml(label) + "</option>";
          });

          bodyHtml = "\n            " + errorsHtml + "\n            <form class='chat-form' data-component='chat-form' data-action='submit-chat-form' novalidate>\n              <div class='chat-form-group'>\n                <label for='chat-topic'>Topic</label>\n                <select id='chat-topic' name='topic'>" + topicOptionsHtml + "</select>\n              </div>\n              <div class='chat-form-group'>\n                <label for='chat-name'>Name</label>\n                <input id='chat-name' name='name' type='text' autocomplete='name' value='" + escapeAttribute(values.name || '') + "'>\n              </div>\n              <div class='chat-form-group'>\n                <label for='chat-email'>Email</label>\n                <input id='chat-email' name='email' type='email' autocomplete='email' value='" + escapeAttribute(values.email || '') + "'>\n              </div>\n              <div class='chat-form-group'>\n                <label for='chat-summary'>How can we help?</label>\n                <textarea id='chat-summary' name='summary' rows='3'>" + escapeHtml(values.summary || '') + "</textarea>\n              </div>\n              <div class='chat-form-group'>\n                <label for='chat-followup'>Follow-up preference</label>\n                <select id='chat-followup' name='followupPreference'>" + followupOptionsHtml + "</select>\n              </div>\n              <div class='chat-form-actions'>\n                <button type='submit' class='btn btn-primary'>Send</button>\n              </div>\n            </form>\n          ";
        }

        var panelClass = 'chat-panel' + (isOpen ? ' chat-panel-open' : '');
        var ariaHidden = isOpen ? 'false' : 'true';
        var ariaExpanded = isOpen ? 'true' : 'false';

        var html = "\n          <div class='chat-widget' data-component='chat-widget'>\n            <button type='button' class='chat-toggle' data-action='chat-toggle' aria-expanded='" + ariaExpanded + "'>Chat</button>\n            <div class='" + panelClass + "' aria-hidden='" + ariaHidden + "'>\n              <div class='chat-header'>\n                <div class='chat-welcome'>" + escapeHtml(welcomeMessage || 'How can we help?') + "</div>\n              </div>\n              <div class='chat-body'>\n                " + bodyHtml + "\n              </div>\n            </div>\n          </div>\n        ";

        container.innerHTML = html;
      }

      function handleChatFormSubmit(form) {
        var formData = new FormData(form);
        var topic = (formData.get('topic') || '').toString();
        var name = (formData.get('name') || '').toString().trim();
        var email = (formData.get('email') || '').toString().trim();
        var summary = (formData.get('summary') || '').toString().trim();
        var followupPreference = (formData.get('followupPreference') || '').toString();

        state.chatFormValues = {
          topic: topic,
          name: name,
          email: email,
          summary: summary,
          followupPreference: followupPreference
        };

        var errors = [];
        if (!topic) errors.push('Please choose a topic.');
        if (!name) errors.push('Please enter your name.');
        if (!email) {
          errors.push('Please enter your email.');
        } else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
          errors.push('Please enter a valid email address.');
        }
        if (!summary) errors.push('Please enter a brief summary.');
        if (!followupPreference) errors.push('Please choose how we should follow up.');

        if (errors.length) {
          state.errors.chatSubmit = errors.join(' ');
          renderChatWidget(chatWidgetContainer);
          return;
        }

        state.errors.chatSubmit = '';
        state.loading.submittingChat = true;
        renderChatWidget(chatWidgetContainer);

        var response = null;
        try {
          response = WebsiteSDK.submitChatLead(
            topic,
            name,
            email,
            summary,
            followupPreference
          );
        } catch (e) {
          state.loading.submittingChat = false;
          state.errors.chatSubmit = 'There was a problem starting the chat. Please try again.';
          renderChatWidget(chatWidgetContainer);
          return;
        }

        state.loading.submittingChat = false;
        if (!response || !response.success) {
          state.errors.chatSubmit = response && response.message ? response.message : 'There was a problem starting the chat. Please try again.';
          renderChatWidget(chatWidgetContainer);
          return;
        }

        state.chatSubmitResponse = response;
        state.chatFormValues = {
          topic: '',
          name: '',
          email: '',
          summary: '',
          followupPreference: ''
        };
        renderChatWidget(chatWidgetContainer);
      }

      function handleToggleChat() {
        state.chatWidgetOpen = !state.chatWidgetOpen;
        renderChatWidget(chatWidgetContainer);
      }

      function handleCloseChat() {
        state.chatWidgetOpen = false;
        renderChatWidget(chatWidgetContainer);
      }

      function setupHeaderNav() {
        var homeLink = document.querySelector('.primary-nav .nav-link[href=index.html]');
        if (homeLink) {
          homeLink.addEventListener('click', function (event) {
            if (!state.hasDownloaded) {
              return;
            }
            event.preventDefault();
            window.location.href = 'index.html?ref=resource_download';
          });
        }
      }

      document.addEventListener('click', function (event) {
        var actionElement = event.target.closest('[data-action]');
        if (!actionElement) return;
        var action = actionElement.getAttribute('data-action');
        if (!action) return;

        if (action === 'back-to-resources') {
          event.preventDefault();
          window.location.href = 'resources.html?contentType=whitepaper';
        } else if (action === 'open-lead-form') {
          event.preventDefault();
          handleOpenLeadForm();
        } else if (action === 'retry-lead-form-options') {
          event.preventDefault();
          ensureLeadFormOptionsLoaded();
        } else if (action === 'download-direct') {
          event.preventDefault();
          handleDirectDownload();
        } else if (action === 'download-after-lead') {
          state.hasDownloaded = true;
        } else if (action === 'chat-toggle') {
          event.preventDefault();
          handleToggleChat();
        } else if (action === 'close-chat') {
          event.preventDefault();
          handleCloseChat();
        }
      });

      document.addEventListener('submit', function (event) {
        var form = event.target;
        if (!form || !form.dataset) return;
        var action = form.dataset.action;
        if (!action) return;
        if (action === 'submit-lead-form') {
          event.preventDefault();
          handleLeadFormSubmit(form);
        } else if (action === 'submit-chat-form') {
          event.preventDefault();
          handleChatFormSubmit(form);
        }
      }, true);

      setupHeaderNav();
      initResource();
      initChat();
    });
  </script>
</body>
</html>
