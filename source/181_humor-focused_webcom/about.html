<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Pun It Square - Webcomic Framework</title>

    <!-- Typography -->
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&amp;family=Karla:wght@400;500;600&amp;display=swap' rel='stylesheet'>

    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='about.css'>
</head>
<body>
    <div class='page-shell'>
        <header class='site-header'>
            <div class='header-inner'>
                <a href='index.html' class='site-logo-bubble'>
                    <span class='site-title-text'>PUN IT SQUARE</span>
                </a>

                <div class='header-right'>
                    <div class='archive-block'>
                        <label for='global-archive-select' class='archive-label'>Comic Archive</label>
                        <select id='global-archive-select' name='archive' class='archive-select'>
                            <option value=''>Jump To</option>
                        </select>
                    </div>

                    <div class='avatar-menu' tabindex='0'>
                        <a href='library.html' class='avatar-link' aria-label='Open user menu and go to My Library'>
                            <span class='avatar-initials'>U</span>
                        </a>
                        <ul class='avatar-dropdown' aria-label='User menu'>
                            <li><a href='playlists.html'>Playlists</a></li>
                            <li><a href='library.html'>My Library</a></li>
                            <li><a href='settings.html'>Settings</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <nav class='primary-nav' aria-label='Primary'>
                <ul class='primary-nav-list'>
                    <li><a href='index.html' title='Homepage with featured comics and series'>Home</a></li>
                    <li><a href='comics_browse.html?mode=trending&amp;time_range=today' title="Today's trending comics view">Trending</a></li>
                    <li><a href='tags.html' title='Browse comics by topic and tag'>Tags</a></li>
                    <li><a href='comic_detail.html?mode=random' title='Jump to a random comic for a quick laugh'>Random Laugh</a></li>
                    <li><a href='store.html' title='Store for books, collections, and merch'>Shop</a></li>
                    <li><a href='playlists.html' title='View and manage humor playlists and reading lists'>Playlists</a></li>
                    <li><a href='library.html' title='Access your digital comic collections'>Library</a></li>
                </ul>
            </nav>
        </header>

        <main id='content' class='site-main' role='main'>
            <section class='about-page-shell' data-component='about-page-controller'>
                <div class='about-header-zone'>
                    <div class='about-header-bubble' data-populate='about-header'>
                        <!-- Header title populated from About content -->
                    </div>
                </div>

                <div class='about-body-layout'>
                    <div class='about-main-column'>
                        <div class='about-sections-wrapper' data-component='about-section-list'>
                            <ol class='about-section-list' data-populate='about-sections' aria-label='About information sections'>
                                <!-- Dynamic About sections will be rendered here -->
                            </ol>
                        </div>

                        <div class='about-help-area' data-component='about-help-link-handler'>
                            <!-- Help & FAQ link handling is attached via JavaScript to any help.html links in the content -->
                        </div>
                    </div>

                    <aside class='about-sidebar-column'>
                        <nav class='about-section-nav' aria-label='About sections navigation' data-component='about-section-navigation'>
                            <ol class='about-section-nav-list' data-populate='about-nav'>
                                <!-- In-page section navigation items rendered here -->
                            </ol>
                        </nav>
                    </aside>
                </div>
            </section>
        </main>

        <footer class='site-footer'>
            <nav class='footer-nav' aria-label='Footer'>
                <ul class='footer-nav-list'>
                    <li><a href='about.html' title='Learn more about the site and creators'>About</a></li>
                    <li><a href='help.html' title='Get help using the site and features'>Help &amp; FAQ</a></li>
                    <li><a href='settings.html' title='Adjust appearance and content preferences'>Settings</a></li>
                    <li><a href='store.html' title='Visit the store for books and collections'>Shop</a></li>
                    <li><a href='tags.html' title='Explore comics by tag and topic'>Browse Tags</a></li>
                </ul>
            </nav>
            <p class='footer-note'>
                &copy; <span class='footer-site-name'>Pun It Square</span>
            </p>
        </footer>
    </div>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var initialSectionParam = urlParams.get('section');

        var aboutState = {
            sections: [],
            sectionMap: new Map(),
            selectedSectionId: null,
            observer: null,
            headerContainer: document.querySelector('[data-populate="about-header"]'),
            sectionsContainer: document.querySelector('[data-populate="about-sections"]'),
            navContainer: document.querySelector('[data-populate="about-nav"]')
        };

        function createIdentifierFromTitle(title, index, usedIds) {
            var base = '';
            if (title && typeof title === 'string') {
                base = title.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
            }
            if (!base) {
                base = 'section-' + (index + 1);
            }
            var finalId = base;
            if (Object.prototype.hasOwnProperty.call(usedIds, finalId)) {
                var suffix = usedIds[finalId] + 1;
                var candidate = finalId + '-' + suffix;
                while (Object.prototype.hasOwnProperty.call(usedIds, candidate)) {
                    suffix += 1;
                    candidate = finalId + '-' + suffix;
                }
                finalId = candidate;
                usedIds[base] = suffix;
                usedIds[finalId] = 1;
            } else {
                usedIds[finalId] = 1;
            }
            return finalId;
        }

        function hydrateSections(rawSections) {
            var usedIds = {};
            aboutState.sections = [];
            aboutState.sectionMap = new Map();

            if (!Array.isArray(rawSections)) {
                return;
            }

            rawSections.forEach(function(section, index) {
                var title = section && section.title ? String(section.title) : '';
                var body = section && section.body ? String(section.body) : '';
                var identifier = createIdentifierFromTitle(title, index, usedIds);
                var enriched = {
                    identifier: identifier,
                    title: title,
                    body: body
                };
                aboutState.sections.push(enriched);
                aboutState.sectionMap.set(identifier, enriched);
            });
        }

        function renderHeader(container, sections) {
            if (!container) {
                return;
            }
            container.innerHTML = '';
            var heading = document.createElement('h1');
            heading.className = 'about-title';
            if (sections.length && sections[0].title) {
                heading.textContent = sections[0].title;
            } else {
                heading.textContent = 'About';
            }
            container.appendChild(heading);
        }

        function renderSections(container, sections) {
            if (!container) {
                return;
            }
            container.innerHTML = '';

            if (!sections.length) {
                var emptyItem = document.createElement('li');
                emptyItem.className = 'about-section-list-item about-section-list-item--empty';
                emptyItem.innerHTML = '<div class="about-empty">More information about this site will appear here soon.</div>';
                container.appendChild(emptyItem);
                return;
            }

            sections.forEach(function(section) {
                var li = document.createElement('li');
                li.className = 'about-section-list-item';

                var sectionEl = document.createElement('section');
                sectionEl.className = 'about-section';
                sectionEl.id = 'about-' + section.identifier;
                sectionEl.dataset.sectionId = section.identifier;

                var heading = document.createElement('h2');
                heading.className = 'about-section-title';
                heading.textContent = section.title || '';
                sectionEl.appendChild(heading);

                var body = document.createElement('div');
                body.className = 'about-section-body';
                var bodyHtml = section.body || '';
                body.innerHTML = bodyHtml;
                sectionEl.appendChild(body);

                li.appendChild(sectionEl);
                container.appendChild(li);
            });
        }

        function renderNav(container, sections) {
            if (!container) {
                return;
            }
            container.innerHTML = '';

            if (!sections.length) {
                return;
            }

            sections.forEach(function(section) {
                var li = document.createElement('li');
                li.className = 'about-section-nav-item';

                var link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.className = 'about-section-nav-link';
                link.dataset.sectionId = section.identifier;
                link.dataset.action = 'navigate-section';
                link.textContent = section.title || '';

                li.appendChild(link);
                container.appendChild(li);
            });

            container.addEventListener('click', function(event) {
                var target = event.target.closest('[data-action="navigate-section"]');
                if (!target) {
                    return;
                }
                event.preventDefault();
                var sectionId = target.dataset.sectionId;
                if (!sectionId) {
                    return;
                }
                selectSection(sectionId, {
                    updateHistory: true,
                    scrollIntoView: true,
                    replaceHistory: false,
                    source: 'nav'
                });
            });
        }

        function updateNavHighlight(sectionId) {
            var navContainer = aboutState.navContainer;
            if (!navContainer) {
                return;
            }
            var links = navContainer.querySelectorAll('[data-action="navigate-section"]');
            links.forEach(function(link) {
                if (sectionId && link.dataset.sectionId === sectionId) {
                    link.classList.add('is-active');
                } else {
                    link.classList.remove('is-active');
                }
            });
        }

        function updateSectionHighlight(sectionId) {
            var sectionsContainer = aboutState.sectionsContainer;
            if (!sectionsContainer) {
                return;
            }
            var sectionEls = sectionsContainer.querySelectorAll('.about-section');
            sectionEls.forEach(function(el) {
                if (sectionId && el.dataset.sectionId === sectionId) {
                    el.classList.add('is-active');
                } else {
                    el.classList.remove('is-active');
                }
            });
        }

        function updateActiveStates(sectionId) {
            updateNavHighlight(sectionId);
            updateSectionHighlight(sectionId);
        }

        function scrollToSection(sectionId) {
            var sectionsContainer = aboutState.sectionsContainer;
            if (!sectionsContainer) {
                return;
            }
            var target = sectionsContainer.querySelector('[data-section-id="' + sectionId + '"]');
            if (!target) {
                return;
            }
            try {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (e) {
                target.scrollIntoView(true);
            }
        }

        function updateUrlForSection(sectionId, replaceHistory) {
            try {
                var currentUrl = new URL(window.location.href);
                if (sectionId) {
                    currentUrl.searchParams.set('section', sectionId);
                } else {
                    currentUrl.searchParams.delete('section');
                }
                var stateObj = { section: sectionId };
                if (replaceHistory) {
                    window.history.replaceState(stateObj, '', currentUrl.toString());
                } else {
                    window.history.pushState(stateObj, '', currentUrl.toString());
                }
            } catch (e) {
                // If URL API is not available, gracefully skip updating the URL
            }
        }

        function selectSection(sectionId, options) {
            if (!sectionId || !aboutState.sectionMap.has(sectionId)) {
                return;
            }
            var opts = options || {};
            var shouldUpdateHistory = opts.updateHistory === true;
            var shouldScroll = opts.scrollIntoView !== false;
            var replaceHistory = opts.replaceHistory === true;

            aboutState.selectedSectionId = sectionId;
            updateActiveStates(sectionId);

            if (shouldScroll) {
                scrollToSection(sectionId);
            }

            if (shouldUpdateHistory) {
                updateUrlForSection(sectionId, replaceHistory);
            }
        }

        function setupSectionObserver() {
            if (!('IntersectionObserver' in window)) {
                return;
            }
            var sectionsContainer = aboutState.sectionsContainer;
            if (!sectionsContainer) {
                return;
            }
            var sectionEls = sectionsContainer.querySelectorAll('.about-section');
            if (!sectionEls.length) {
                return;
            }

            var observer = new IntersectionObserver(function(entries) {
                var bestEntry = null;
                entries.forEach(function(entry) {
                    if (!entry.isIntersecting) {
                        return;
                    }
                    if (!bestEntry || entry.intersectionRatio > bestEntry.intersectionRatio) {
                        bestEntry = entry;
                    }
                });

                if (!bestEntry || !bestEntry.target) {
                    return;
                }
                var sectionId = bestEntry.target.dataset.sectionId;
                if (!sectionId || sectionId === aboutState.selectedSectionId) {
                    return;
                }

                aboutState.selectedSectionId = sectionId;
                updateActiveStates(sectionId);
                updateUrlForSection(sectionId, true);
            }, {
                root: null,
                threshold: 0.5
            });

            sectionEls.forEach(function(el) {
                observer.observe(el);
            });

            aboutState.observer = observer;
        }

        function attachHelpLinkHandler() {
            var sectionsWrapper = document.querySelector('[data-component="about-section-list"]');
            if (!sectionsWrapper) {
                return;
            }
            sectionsWrapper.addEventListener('click', function(event) {
                var anchor = event.target.closest('a[href$="help.html"]');
                if (!anchor) {
                    return;
                }
                // Allow default navigation to help.html; no extra logic required here
            });
        }

        function applyInitialSelection() {
            if (!initialSectionParam) {
                return;
            }
            if (!aboutState.sectionMap.has(initialSectionParam)) {
                return;
            }
            selectSection(initialSectionParam, {
                updateHistory: false,
                scrollIntoView: true,
                replaceHistory: false,
                source: 'initial-url'
            });
        }

        function handlePopState() {
            var params = new URLSearchParams(window.location.search);
            var sectionFromUrl = params.get('section');
            if (!sectionFromUrl) {
                aboutState.selectedSectionId = null;
                updateActiveStates(null);
                return;
            }
            if (!aboutState.sectionMap.has(sectionFromUrl)) {
                return;
            }
            if (sectionFromUrl === aboutState.selectedSectionId) {
                return;
            }
            selectSection(sectionFromUrl, {
                updateHistory: false,
                scrollIntoView: true,
                replaceHistory: false,
                source: 'popstate'
            });
        }

        function initAboutPage() {
            var response;
            try {
                response = WebsiteSDK.getAboutContent();
            } catch (e) {
                if (aboutState.sectionsContainer) {
                    aboutState.sectionsContainer.innerHTML = '<li class="about-section-list-item"><div class="about-error">There was a problem loading the About page. Please try reloading.</div></li>';
                }
                return;
            }

            var rawSections = response && Array.isArray(response.sections) ? response.sections : [];
            hydrateSections(rawSections);

            var populateElements = document.querySelectorAll('[data-populate]');
            populateElements.forEach(function(element) {
                var populateType = element.dataset.populate;
                if (populateType === 'about-header') {
                    renderHeader(element, aboutState.sections);
                } else if (populateType === 'about-sections') {
                    renderSections(element, aboutState.sections);
                } else if (populateType === 'about-nav') {
                    renderNav(element, aboutState.sections);
                }
            });

            // Refresh cached containers in case DOM structure changed during render
            aboutState.sectionsContainer = document.querySelector('[data-populate="about-sections"]');
            aboutState.navContainer = document.querySelector('[data-populate="about-nav"]');

            setupSectionObserver();
            attachHelpLinkHandler();
            applyInitialSelection();

            window.addEventListener('popstate', handlePopState);
        }

        initAboutPage();
    });
    </script>
</body>
</html>
