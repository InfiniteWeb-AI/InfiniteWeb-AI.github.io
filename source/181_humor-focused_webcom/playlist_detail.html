<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Pun It Square - Webcomic Framework</title>

    <!-- Typography -->
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&amp;family=Karla:wght@400;500;600&amp;display=swap' rel='stylesheet'>

    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='playlist_detail.css'>
</head>
<body>
    <div class='page-shell'>
        <header class='site-header'>
            <div class='header-inner'>
                <a href='index.html' class='site-logo-bubble'>
                    <span class='site-title-text'>PUN IT SQUARE</span>
                </a>

                <div class='header-right'>
                    <div class='archive-block'>
                        <label for='global-archive-select' class='archive-label'>Comic Archive</label>
                        <select id='global-archive-select' name='archive' class='archive-select'>
                            <option value=''>Jump To</option>
                        </select>
                    </div>

                    <div class='avatar-menu' tabindex='0'>
                        <a href='library.html' class='avatar-link' aria-label='Open user menu and go to My Library'>
                            <span class='avatar-initials'>U</span>
                        </a>
                        <ul class='avatar-dropdown' aria-label='User menu'>
                            <li><a href='playlists.html'>Playlists</a></li>
                            <li><a href='library.html'>My Library</a></li>
                            <li><a href='settings.html'>Settings</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <nav class='primary-nav' aria-label='Primary'>
                <ul class='primary-nav-list'>
                    <li><a href='index.html' title='Homepage with featured comics and series'>Home</a></li>
                    <li><a href='comics_browse.html?mode=trending&amp;time_range=today' title="Today's trending comics view">Trending</a></li>
                    <li><a href='tags.html' title='Browse comics by topic and tag'>Tags</a></li>
                    <li><a href='comic_detail.html?mode=random' title='Jump to a random comic for a quick laugh'>Random Laugh</a></li>
                    <li><a href='store.html' title='Store for books, collections, and merch'>Shop</a></li>
                    <li><a href='playlists.html' title='View and manage humor playlists and reading lists'>Playlists</a></li>
                    <li><a href='library.html' title='Access your digital comic collections'>Library</a></li>
                </ul>
            </nav>
        </header>

        <main id='content' class='site-main' role='main'>
            <div class='playlist-detail-page' data-page='playlist-detail'>
                <!-- Header bubble -->
                <section class='playlist-header-bubble' data-component='playlist-header-bar'>
                    <!-- Filled by JS -->
                </section>

                <div class='playlist-layout'>
                    <div class='playlist-main-column'>
                        <!-- Error banner -->
                        <section class='playlist-error-banner' data-component='playlist-error-banner' aria-live='polite' hidden>
                            <!-- Filled by JS -->
                        </section>

                        <!-- Reorder toolbar -->
                        <section class='playlist-reorder-toolbar' data-component='playlist-reorder-toolbar' aria-label='Reorder playlist items'>
                            <!-- Filled by JS -->
                        </section>

                        <!-- Items / empty state -->
                        <section class='playlist-items-section' aria-label='Playlist items'>
                            <ol class='playlist-items-list' data-component='playlist-items-list'>
                                <!-- Items rendered by JS -->
                            </ol>
                            <div class='playlist-empty-state' data-component='playlist-empty-state' hidden>
                                <!-- Filled by JS -->
                            </div>
                        </section>
                    </div>

                    <aside class='playlist-utility-column'>
                        <!-- Meta summary -->
                        <section class='playlist-meta-summary' data-component='playlist-meta-summary' aria-label='Playlist summary'>
                            <!-- Filled by JS -->
                        </section>

                        <!-- Reading controls -->
                        <section class='playlist-reading-controls' data-component='playlist-reading-controls' aria-label='Reading controls'>
                            <!-- Filled by JS -->
                        </section>
                    </aside>
                </div>

                <!-- Loader overlay -->
                <div class='playlist-detail-loader-overlay' data-component='playlist-detail-loader' hidden>
                    <div class='loader-inner'>
                        <p>Loading playlist…</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class='site-footer'>
            <nav class='footer-nav' aria-label='Footer'>
                <ul class='footer-nav-list'>
                    <li><a href='about.html' title='Learn more about the site and creators'>About</a></li>
                    <li><a href='help.html' title='Get help using the site and features'>Help &amp; FAQ</a></li>
                    <li><a href='settings.html' title='Adjust appearance and content preferences'>Settings</a></li>
                    <li><a href='store.html' title='Visit the store for books and collections'>Shop</a></li>
                    <li><a href='tags.html' title='Explore comics by tag and topic'>Browse Tags</a></li>
                </ul>
            </nav>
            <p class='footer-note'>
                &copy; <span class='footer-site-name'>Pun It Square</span>
            </p>
        </footer>
    </div>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const state = {
            playlistId: null,
            playlist: null,
            items: [], // last saved order from backend
            workingItems: [], // local working order
            savedOrderIds: [],
            totalItems: 0,
            estimatedMinutes: 0,
            unsavedChanges: false,
            isReorderMode: false,
            isSavingOrder: false,
            removingItems: {},
            loadError: null,
            actionError: null
        };

        // Cache component roots
        const headerEl = document.querySelector("[data-component='playlist-header-bar']");
        const errorBannerEl = document.querySelector("[data-component='playlist-error-banner']");
        const reorderToolbarEl = document.querySelector("[data-component='playlist-reorder-toolbar']");
        const itemsListEl = document.querySelector("[data-component='playlist-items-list']");
        const emptyStateEl = document.querySelector("[data-component='playlist-empty-state']");
        const metaSummaryEl = document.querySelector("[data-component='playlist-meta-summary']");
        const readingControlsEl = document.querySelector("[data-component='playlist-reading-controls']");
        const loaderEl = document.querySelector("[data-component='playlist-detail-loader']");

        // Helpers
        function formatDate(value) {
            if (!value) {
                return '–';
            }
            const d = new Date(value);
            if (isNaN(d.getTime())) {
                return '–';
            }
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function escapeHtml(text) {
            if (text == null) {
                return '';
            }
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getPlaylistTypeLabel(type) {
            if (type === 'comic_playlist') return 'Comic playlist';
            if (type === 'episode_reading_list') return 'Episode reading list';
            if (type === 'mixed') return 'Mixed playlist';
            if (type === 'queue_snapshot') return 'Queue snapshot';
            return '';
        }

        function showLoader(show) {
            if (!loaderEl) return;
            loaderEl.hidden = !show;
        }

        function recomputeUnsavedChanges() {
            const currentIds = [];
            let i;
            for (i = 0; i < state.workingItems.length; i += 1) {
                currentIds.push(state.workingItems[i].playlistItem.id);
            }
            if (currentIds.length !== state.savedOrderIds.length) {
                state.unsavedChanges = true;
                return;
            }
            for (i = 0; i < currentIds.length; i += 1) {
                if (currentIds[i] !== state.savedOrderIds[i]) {
                    state.unsavedChanges = true;
                    return;
                }
            }
            state.unsavedChanges = false;
        }

        function setLoadError(message) {
            state.loadError = message;
        }

        function setActionError(message) {
            state.actionError = message;
        }

        // Data loading
        function loadPlaylist() {
            if (!state.playlistId) {
                setLoadError('No playlist selected. Try opening this page from your Playlists or reading queue.');
                state.playlist = null;
                state.items = [];
                state.workingItems = [];
                state.totalItems = 0;
                state.estimatedMinutes = 0;
                renderAll();
                return;
            }

            showLoader(true);
            state.loadError = null;
            state.actionError = null;

            try {
                const result = WebsiteSDK.getPlaylistDetail(state.playlistId);
                if (!result || !result.playlist) {
                    setLoadError('We could not find that playlist. It may have been removed.');
                    state.playlist = null;
                    state.items = [];
                    state.workingItems = [];
                    state.totalItems = 0;
                    state.estimatedMinutes = 0;
                } else {
                    state.playlist = result.playlist;
                    state.items = (result.items && result.items.slice()) || [];
                    state.workingItems = state.items.slice();
                    state.totalItems = typeof result.totalItems === 'number' ? result.totalItems : state.items.length;
                    state.estimatedMinutes = typeof result.estimatedReadingMinutes === 'number' ? result.estimatedReadingMinutes : 0;
                    state.savedOrderIds = [];
                    for (let i = 0; i < state.items.length; i += 1) {
                        state.savedOrderIds.push(state.items[i].playlistItem.id);
                    }
                    state.unsavedChanges = false;
                }
            } catch (e) {
                console.error(e);
                setLoadError('Something went wrong while loading this playlist.');
                state.playlist = null;
                state.items = [];
                state.workingItems = [];
                state.totalItems = 0;
                state.estimatedMinutes = 0;
            }

            showLoader(false);
            renderAll();
        }

        // Rendering
        function renderHeader(container) {
            if (!container) return;
            if (state.loadError || !state.playlist) {
                container.innerHTML = "" +
                    "<div class='playlist-header-inner'>" +
                    "  <h1 class='playlist-title'>Playlist</h1>" +
                    "  <p class='playlist-subtitle'>Queue up some laughs in one handy place.</p>" +
                    "</div>";
                return;
            }

            const title = escapeHtml(state.playlist.name || 'Playlist');
            const typeLabel = getPlaylistTypeLabel(state.playlist.type);
            const subtitleParts = [];
            if (state.totalItems) {
                subtitleParts.push(state.totalItems + (state.totalItems === 1 ? ' item' : ' items'));
            }
            if (state.estimatedMinutes) {
                subtitleParts.push(state.estimatedMinutes + ' min read');
            }
            const subtitleText = subtitleParts.join(' b7 ');

            container.innerHTML = "" +
                "<div class='playlist-header-inner'>" +
                "  <h1 class='playlist-title'>" + title + "</h1>" +
                (typeLabel ? "  <p class='playlist-type-label'>" + escapeHtml(typeLabel) + "</p>" : '') +
                (subtitleText ? "  <p class='playlist-subtitle'>" + escapeHtml(subtitleText) + "</p>" : '') +
                "</div>";
        }

        function renderErrorBanner(container) {
            if (!container) return;
            const message = state.loadError || state.actionError;
            if (!message) {
                container.hidden = true;
                container.innerHTML = '';
                return;
            }

            const isLoad = !!state.loadError;
            container.hidden = false;
            container.innerHTML = "" +
                "<div class='error-banner-inner" + (isLoad ? " error-critical" : '') + "'>" +
                "  <span class='error-message'>" + escapeHtml(message) + "</span>" +
                "  <button type='button' class='error-dismiss-btn' data-action='dismiss-error'>Dismiss</button>" +
                "</div>";
        }

        function renderReorderToolbar(container) {
            if (!container) return;

            if (state.loadError || !state.playlist) {
                container.hidden = true;
                container.innerHTML = '';
                return;
            }

            const hasItems = state.workingItems.length > 0;
            const reorderLabel = state.isReorderMode ? 'Done reordering' : 'Reorder items';
            const reorderAction = state.isReorderMode ? 'exit-reorder-mode' : 'enter-reorder-mode';
            const hint = hasItems
                ? (state.isReorderMode
                    ? 'Drag rows or use the arrows to rearrange. Click \'Done reordering\' when finished.'
                    : 'Click \'Reorder items\' to rearrange this playlist.')
                : 'Add some comics or episodes to start building this playlist.';

            const saveDisabled = !state.unsavedChanges || !hasItems || state.isSavingOrder;

            container.hidden = false;
            container.innerHTML = "" +
                "<div class='toolbar-inner'>" +
                "  <div class='toolbar-left'>" +
                "    <button type='button' class='reorder-toggle-btn' data-action='" + reorderAction + "'" + (hasItems ? '' : ' disabled') + ">" + escapeHtml(reorderLabel) + "</button>" +
                "    <span class='reorder-hint'>" + escapeHtml(hint) + "</span>" +
                "  </div>" +
                "  <div class='toolbar-right'>" +
                "    <span class='unsaved-indicator" + (state.unsavedChanges ? '' : ' is-hidden') + "' data-populate='unsaved-indicator'>Order not saved</span>" +
                "    <button type='button' class='save-order-btn' data-action='save-order'" + (saveDisabled ? ' disabled' : '') + ">" + (state.isSavingOrder ? 'Saving…' : 'Save order') + "</button>" +
                "  </div>" +
                "</div>";
        }

        function renderEmptyState(container) {
            if (!container) return;

            if (state.loadError || !state.playlist || state.workingItems.length > 0) {
                container.hidden = true;
                container.innerHTML = '';
                return;
            }

            container.hidden = false;
            container.innerHTML = "" +
                "<div class='empty-state-inner'>" +
                "  <p>This playlist is looking a little empty.</p>" +
                "  <p>Add some comics or episodes from around the site to start your binge.</p>" +
                "</div>";
        }

        function attachDragHandlersToRow(li) {
            li.addEventListener('dragstart', function(event) {
                if (!state.isReorderMode) {
                    event.preventDefault();
                    return;
                }
                li.classList.add('is-dragging');
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', li.getAttribute('data-index'));
            });

            li.addEventListener('dragend', function() {
                li.classList.remove('is-dragging');
            });

            li.addEventListener('dragover', function(event) {
                if (!state.isReorderMode) {
                    return;
                }
                event.preventDefault();
                event.dataTransfer.dropEffect = 'move';
            });

            li.addEventListener('drop', function(event) {
                if (!state.isReorderMode) {
                    return;
                }
                event.preventDefault();
                const fromIndexStr = event.dataTransfer.getData('text/plain');
                const toIndexStr = li.getAttribute('data-index');
                const fromIndex = parseInt(fromIndexStr, 10);
                const toIndex = parseInt(toIndexStr, 10);
                if (isNaN(fromIndex) || isNaN(toIndex) || fromIndex === toIndex) {
                    return;
                }
                moveItemToIndex(fromIndex, toIndex);
            });
        }

        function renderItemsList(container) {
            if (!container) return;

            container.innerHTML = '';

            if (state.loadError || !state.playlist || state.workingItems.length === 0) {
                container.hidden = true;
                return;
            }

            container.hidden = false;

            for (let i = 0; i < state.workingItems.length; i += 1) {
                const wrapper = state.workingItems[i];
                const playlistItem = wrapper.playlistItem;
                const comic = wrapper.comic || null;
                const episode = wrapper.episode || null;
                const position = i + 1;
                const id = playlistItem.id;
                const contentType = playlistItem.contentType;

                let titleText = '';
                let detailText = '';
                if (contentType === 'comic') {
                    titleText = comic && comic.title ? comic.title : 'Comic';
                    const panels = comic && typeof comic.panelCount === 'number' ? comic.panelCount : null;
                    detailText = 'Comic' + (panels ? ' b7 ' + panels + (panels === 1 ? ' panel' : ' panels') : '');
                } else if (contentType === 'episode') {
                    const epNum = episode && typeof episode.episodeNumber === 'number' ? episode.episodeNumber : null;
                    const epTitle = episode && episode.title ? episode.title : 'Episode';
                    titleText = epTitle;
                    detailText = 'Episode' + (epNum != null ? ' ' + epNum : '');
                } else {
                    titleText = 'Item';
                    detailText = '';
                }

                const li = document.createElement('li');
                li.className = 'playlist-item-row' + (state.isReorderMode ? ' is-reorder-mode' : '');
                li.setAttribute('data-component', 'playlist-item-row');
                li.setAttribute('data-playlist-item-id', id);
                li.setAttribute('data-content-type', contentType);
                li.setAttribute('data-index', String(i));
                li.draggable = state.isReorderMode;

                const isRemoving = !!state.removingItems[id];

                li.innerHTML = "" +
                    "<div class='playlist-item-inner'>" +
                    "  <div class='item-left'>" +
                    "    <span class='item-position'>" + position + ".</span>" +
                    "    <button type='button' class='item-main-btn' data-action='open-item'>" +
                    "      <span class='item-title'>" + escapeHtml(titleText) + "</span>" +
                    (detailText ? "      <span class='item-meta'>" + escapeHtml(detailText) + "</span>" : '') +
                    "    </button>" +
                    "  </div>" +
                    "  <div class='item-right'>" +
                    "    <button type='button' class='item-move-btn move-up' data-action='move-up'" + (state.isReorderMode && i > 0 ? '' : ' disabled') + ">▲</button>" +
                    "    <button type='button' class='item-move-btn move-down' data-action='move-down'" + (state.isReorderMode && i < state.workingItems.length - 1 ? '' : ' disabled') + ">▼</button>" +
                    "    <button type='button' class='item-remove-btn' data-action='remove-item'" + (isRemoving ? ' disabled' : '') + ">" + (isRemoving ? 'Removing…' : 'Remove') + "</button>" +
                    "    <span class='item-drag-handle' aria-hidden='true'>" + (state.isReorderMode ? '⠿' : '') + "</span>" +
                    "  </div>" +
                    "</div>";

                container.appendChild(li);
                if (state.isReorderMode) {
                    attachDragHandlersToRow(li);
                }
            }
        }

        function renderMetaSummary(container) {
            if (!container) return;

            if (state.loadError || !state.playlist) {
                container.hidden = true;
                container.innerHTML = '';
                return;
            }

            const description = state.playlist.description || '';
            const created = formatDate(state.playlist.createdAt);
            const updated = formatDate(state.playlist.updatedAt);

            container.hidden = false;
            container.innerHTML = "" +
                "<h2 class='visually-hidden'>Playlist summary</h2>" +
                (description ? "<p class='playlist-description'>" + escapeHtml(description) + "</p>" : '') +
                "<dl class='playlist-meta-list'>" +
                "  <div class='meta-row'>" +
                "    <dt>Total items</dt>" +
                "    <dd>" + state.totalItems + "</dd>" +
                "  </div>" +
                "  <div class='meta-row'>" +
                "    <dt>Estimated reading</dt>" +
                "    <dd>" + (state.estimatedMinutes || 0) + " min</dd>" +
                "  </div>" +
                "  <div class='meta-row'>" +
                "    <dt>Created</dt>" +
                "    <dd>" + escapeHtml(created) + "</dd>" +
                "  </div>" +
                "  <div class='meta-row'>" +
                "    <dt>Last updated</dt>" +
                "    <dd>" + escapeHtml(updated) + "</dd>" +
                "  </div>" +
                "</dl>";
        }

        function renderReadingControls(container) {
            if (!container) return;

            if (state.loadError || !state.playlist) {
                container.hidden = true;
                container.innerHTML = '';
                return;
            }

            const hasItems = state.workingItems.length > 0;

            container.hidden = false;
            container.innerHTML = "" +
                "<h2 class='visually-hidden'>Reading controls</h2>" +
                "<button type='button' class='start-reading-btn' data-action='start-reading'" + (hasItems ? '' : ' disabled') + ">Start reading</button>" +
                (hasItems ? "<p class='start-reading-hint'>We\'ll start from the first item in this playlist.</p>" : "<p class='start-reading-hint'>Add items to enable reading.</p>");
        }

        function renderAll() {
            renderHeader(headerEl);
            renderErrorBanner(errorBannerEl);
            renderReorderToolbar(reorderToolbarEl);
            renderItemsList(itemsListEl);
            renderEmptyState(emptyStateEl);
            renderMetaSummary(metaSummaryEl);
            renderReadingControls(readingControlsEl);
        }

        // Reorder operations
        function moveItemToIndex(fromIndex, toIndex) {
            if (fromIndex < 0 || fromIndex >= state.workingItems.length || toIndex < 0 || toIndex >= state.workingItems.length) {
                return;
            }
            const arr = state.workingItems;
            const [moved] = arr.splice(fromIndex, 1);
            arr.splice(toIndex, 0, moved);
            recomputeUnsavedChanges();
            renderAll();
        }

        function handleMoveUp(li) {
            const indexStr = li.getAttribute('data-index');
            const index = parseInt(indexStr, 10);
            if (isNaN(index) || index <= 0) return;
            moveItemToIndex(index, index - 1);
        }

        function handleMoveDown(li) {
            const indexStr = li.getAttribute('data-index');
            const index = parseInt(indexStr, 10);
            if (isNaN(index) || index >= state.workingItems.length - 1) return;
            moveItemToIndex(index, index + 1);
        }

        // Actions
        function handleStartReading() {
            if (!state.workingItems || state.workingItems.length === 0) {
                return;
            }
            const first = state.workingItems[0];
            if (!first || !first.playlistItem) return;
            const contentType = first.playlistItem.contentType;
            const contentId = first.playlistItem.contentId;
            if (!contentType || !contentId) return;

            if (contentType === 'comic') {
                window.location.href = 'comic_detail.html?id=' + encodeURIComponent(contentId);
            } else if (contentType === 'episode') {
                window.location.href = 'episode.html?id=' + encodeURIComponent(contentId);
            }
        }

        function handleOpenItem(target) {
            const row = target.closest("[data-component='playlist-item-row']");
            if (!row) return;
            const contentType = row.getAttribute('data-content-type');
            const playlistItemId = row.getAttribute('data-playlist-item-id');
            if (!contentType || !playlistItemId) return;

            let contentId = null;
            for (let i = 0; i < state.workingItems.length; i += 1) {
                if (state.workingItems[i].playlistItem.id === playlistItemId) {
                    contentId = state.workingItems[i].playlistItem.contentId;
                    break;
                }
            }
            if (!contentId) return;

            if (contentType === 'comic') {
                window.location.href = 'comic_detail.html?id=' + encodeURIComponent(contentId);
            } else if (contentType === 'episode') {
                window.location.href = 'episode.html?id=' + encodeURIComponent(contentId);
            }
        }

        function handleRemoveItem(target) {
            const row = target.closest("[data-component='playlist-item-row']");
            if (!row) return;
            const playlistItemId = row.getAttribute('data-playlist-item-id');
            if (!playlistItemId || state.removingItems[playlistItemId]) return;

            state.removingItems[playlistItemId] = true;
            renderAll();

            try {
                const result = WebsiteSDK.removePlaylistItem(playlistItemId);
                if (result && result.success) {
                    // Refresh from backend to get updated totals and positions
                    loadPlaylist();
                    return;
                }
                setActionError('Unable to remove that item from the playlist.');
            } catch (e) {
                console.error(e);
                setActionError('Something went wrong while removing that item.');
            }

            delete state.removingItems[playlistItemId];
            renderAll();
        }

        function handleSaveOrder() {
            if (!state.playlist || !state.unsavedChanges || state.isSavingOrder) {
                return;
            }

            const orderedIds = [];
            for (let i = 0; i < state.workingItems.length; i += 1) {
                orderedIds.push(state.workingItems[i].playlistItem.id);
            }

            state.isSavingOrder = true;
            renderAll();

            try {
                const result = WebsiteSDK.reorderPlaylistItems(state.playlistId, orderedIds);
                if (result && result.success) {
                    state.savedOrderIds = orderedIds.slice();
                    state.unsavedChanges = false;
                    state.isSavingOrder = false;
                    // Optional: refresh for consistency
                    loadPlaylist();
                    return;
                }
                setActionError('Could not save the new order. Your playlist has been restored.');
                // Revert to saved order
                const idToItem = {};
                for (let i = 0; i < state.items.length; i += 1) {
                    idToItem[state.items[i].playlistItem.id] = state.items[i];
                }
                const reverted = [];
                for (let j = 0; j < state.savedOrderIds.length; j += 1) {
                    const itemId = state.savedOrderIds[j];
                    if (idToItem[itemId]) {
                        reverted.push(idToItem[itemId]);
                    }
                }
                state.workingItems = reverted;
            } catch (e) {
                console.error(e);
                setActionError('Something went wrong while saving the new order. Your playlist has been restored.');
                // Revert to saved order
                const idToItem = {};
                for (let i = 0; i < state.items.length; i += 1) {
                    idToItem[state.items[i].playlistItem.id] = state.items[i];
                }
                const reverted = [];
                for (let j = 0; j < state.savedOrderIds.length; j += 1) {
                    const itemId = state.savedOrderIds[j];
                    if (idToItem[itemId]) {
                        reverted.push(idToItem[itemId]);
                    }
                }
                state.workingItems = reverted;
            }

            state.isSavingOrder = false;
            recomputeUnsavedChanges();
            renderAll();
        }

        function handleEnterReorderMode() {
            if (!state.playlist || state.workingItems.length === 0) return;
            state.isReorderMode = true;
            renderAll();
        }

        function handleExitReorderMode() {
            state.isReorderMode = false;
            renderAll();
        }

        function handleDismissError() {
            if (state.loadError) {
                state.loadError = null;
            }
            if (state.actionError) {
                state.actionError = null;
            }
            renderAll();
        }

        // Global click handler for data-action
        document.addEventListener('click', function(event) {
            const actionEl = event.target.closest('[data-action]');
            if (!actionEl) return;
            const action = actionEl.getAttribute('data-action');

            if (action === 'start-reading') {
                event.preventDefault();
                handleStartReading();
            } else if (action === 'open-item') {
                event.preventDefault();
                handleOpenItem(actionEl);
            } else if (action === 'remove-item') {
                event.preventDefault();
                handleRemoveItem(actionEl);
            } else if (action === 'save-order') {
                event.preventDefault();
                handleSaveOrder();
            } else if (action === 'enter-reorder-mode') {
                event.preventDefault();
                handleEnterReorderMode();
            } else if (action === 'exit-reorder-mode') {
                event.preventDefault();
                handleExitReorderMode();
            } else if (action === 'move-up') {
                event.preventDefault();
                const row = actionEl.closest("[data-component='playlist-item-row']");
                if (row) {
                    handleMoveUp(row);
                }
            } else if (action === 'move-down') {
                event.preventDefault();
                const row = actionEl.closest("[data-component='playlist-item-row']");
                if (row) {
                    handleMoveDown(row);
                }
            } else if (action === 'dismiss-error') {
                event.preventDefault();
                handleDismissError();
            }
        });

        // Initialize from URL
        const urlParams = new URLSearchParams(window.location.search);
        const playlistId = urlParams.get('id');
        state.playlistId = playlistId;

        loadPlaylist();
    });
    </script>
</body>
</html>
