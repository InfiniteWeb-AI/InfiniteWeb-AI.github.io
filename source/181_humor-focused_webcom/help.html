<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Pun It Square - Help &amp; FAQ</title>

    <!-- Typography -->
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&amp;family=Karla:wght@400;500;600&amp;display=swap' rel='stylesheet'>

    <link rel='stylesheet' href='styles.css'>
    <link rel='stylesheet' href='help.css'>
</head>
<body>
    <div class='page-shell'>
        <header class='site-header'>
            <div class='header-inner'>
                <a href='index.html' class='site-logo-bubble'>
                    <span class='site-title-text'>PUN IT SQUARE</span>
                </a>

                <div class='header-right'>
                    <div class='archive-block'>
                        <label for='global-archive-select' class='archive-label'>Comic Archive</label>
                        <select id='global-archive-select' name='archive' class='archive-select'>
                            <option value=''>Jump To</option>
                        </select>
                    </div>

                    <div class='avatar-menu' tabindex='0'>
                        <a href='library.html' class='avatar-link' aria-label='Open user menu and go to My Library'>
                            <span class='avatar-initials'>U</span>
                        </a>
                        <ul class='avatar-dropdown' aria-label='User menu'>
                            <li><a href='playlists.html'>Playlists</a></li>
                            <li><a href='library.html'>My Library</a></li>
                            <li><a href='settings.html'>Settings</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <nav class='primary-nav' aria-label='Primary'>
                <ul class='primary-nav-list'>
                    <li><a href='index.html' title='Homepage with featured comics and series'>Home</a></li>
                    <li><a href='comics_browse.html?mode=trending&amp;time_range=today' title="Today's trending comics view">Trending</a></li>
                    <li><a href='tags.html' title='Browse comics by topic and tag'>Tags</a></li>
                    <li><a href='comic_detail.html?mode=random' title='Jump to a random comic for a quick laugh'>Random Laugh</a></li>
                    <li><a href='store.html' title='Store for books, collections, and merch'>Shop</a></li>
                    <li><a href='playlists.html' title='View and manage humor playlists and reading lists'>Playlists</a></li>
                    <li><a href='library.html' title='Access your digital comic collections'>Library</a></li>
                </ul>
            </nav>
        </header>

        <main id='content' class='site-main' role='main'>
            <section class='page-title-bubble page-title-bubble--help'>
                <h1 id='help-title' class='page-title-text'>Help &amp; FAQ</h1>
            </section>

            <section class='help-page' data-populate='help-faq' aria-labelledby='help-title'>
                <!-- Help layout will be rendered here by JavaScript -->
            </section>
        </main>

        <footer class='site-footer'>
            <nav class='footer-nav' aria-label='Footer'>
                <ul class='footer-nav-list'>
                    <li><a href='about.html' title='Learn more about the site and creators'>About</a></li>
                    <li><a href='help.html' title='Get help using the site and features'>Help &amp; FAQ</a></li>
                    <li><a href='settings.html' title='Adjust appearance and content preferences'>Settings</a></li>
                    <li><a href='store.html' title='Visit the store for books and collections'>Shop</a></li>
                    <li><a href='tags.html' title='Explore comics by tag and topic'>Browse Tags</a></li>
                </ul>
            </nav>
            <p class='footer-note'>
                &copy; <span class='footer-site-name'>Pun It Square</span>
            </p>
        </footer>
    </div>

    <script src='business_logic.js'></script>
    <script>
    (function() {
        'use strict';

        document.addEventListener('DOMContentLoaded', function() {
            var faqContainer = document.querySelector('[data-populate="help-faq"]');
            if (!faqContainer) {
                return;
            }
            initHelpFaq(faqContainer);
        });

        function initHelpFaq(container) {
            var state = {
                categories: [],
                selectedCategoryId: null,
                searchTerm: '',
                expandedQuestionId: null,
                isLoading: false,
                loadError: null
            };

            var dom = {
                container: container,
                layout: null,
                mainColumn: null,
                contextColumn: null,
                loader: null,
                categoryNav: null,
                searchForm: null,
                searchInput: null,
                searchClearButton: null,
                questionList: null,
                moreSupport: null
            };

            var searchDebounceTimer = null;
            var popstateAttached = false;

            function slugify(value) {
                return String(value || '')
                    .toLowerCase()
                    .trim()
                    .replace(/[^a-z0-9]+/g, '-')
                    .replace(/^-+|-+$/g, '') || 'category';
            }

            function normalizeCategories(rawCategories) {
                var output = [];
                if (!Array.isArray(rawCategories)) {
                    return output;
                }
                rawCategories.forEach(function(rawCat, catIndex) {
                    var name = rawCat && typeof rawCat.name === 'string' && rawCat.name.trim() !== '' ? rawCat.name.trim() : 'Category ' + (catIndex + 1);
                    var id = slugify(name);
                    var questionsRaw = rawCat && Array.isArray(rawCat.questions) ? rawCat.questions : [];
                    var questions = [];
                    questionsRaw.forEach(function(rawQuestion, index) {
                        var questionText = rawQuestion && typeof rawQuestion.question === 'string' ? rawQuestion.question : '';
                        var answerText = rawQuestion && typeof rawQuestion.answer === 'string' ? rawQuestion.answer : '';
                        var qId = id + '__q' + index;
                        questions.push({
                            id: qId,
                            categoryId: id,
                            question: questionText,
                            answer: answerText
                        });
                    });
                    output.push({
                        id: id,
                        name: name,
                        questions: questions
                    });
                });
                return output;
            }

            function buildBaseLayout() {
                dom.container.innerHTML = '';

                var layout = document.createElement('div');
                layout.className = 'help-layout';

                var mainCol = document.createElement('div');
                mainCol.className = 'help-main-column';

                var loader = document.createElement('div');
                loader.className = 'help-loader';
                loader.setAttribute('data-component', 'help-faq-loader');
                loader.setAttribute('aria-live', 'polite');

                var categoryNav = document.createElement('nav');
                categoryNav.className = 'faq-category-nav';
                categoryNav.setAttribute('data-component', 'faq-category-nav');
                categoryNav.setAttribute('aria-label', 'Help topic categories');

                var searchForm = document.createElement('form');
                searchForm.className = 'faq-search-form';
                searchForm.setAttribute('data-component', 'faq-search-form');
                searchForm.setAttribute('role', 'search');

                var searchLabel = document.createElement('label');
                searchLabel.setAttribute('for', 'faq-search-input');
                searchLabel.textContent = 'Search FAQs';

                var searchRow = document.createElement('div');
                searchRow.className = 'faq-search-row';

                var searchInput = document.createElement('input');
                searchInput.type = 'search';
                searchInput.id = 'faq-search-input';
                searchInput.name = 'q';
                searchInput.autocomplete = 'off';
                searchInput.placeholder = 'Search how-tos, playlists, store, settings...';
                searchInput.setAttribute('data-action', 'faq-search-input');

                var searchSubmit = document.createElement('button');
                searchSubmit.type = 'submit';
                searchSubmit.textContent = 'Search';
                searchSubmit.setAttribute('data-action', 'faq-search-submit');

                var searchClear = document.createElement('button');
                searchClear.type = 'button';
                searchClear.textContent = 'Clear';
                searchClear.setAttribute('data-action', 'faq-search-clear');

                searchRow.appendChild(searchInput);
                searchRow.appendChild(searchSubmit);
                searchRow.appendChild(searchClear);

                searchForm.appendChild(searchLabel);
                searchForm.appendChild(searchRow);

                var questionList = document.createElement('section');
                questionList.className = 'faq-question-list';
                questionList.setAttribute('data-component', 'faq-question-list');
                questionList.setAttribute('aria-label', 'Help questions');

                mainCol.appendChild(loader);
                mainCol.appendChild(categoryNav);
                mainCol.appendChild(searchForm);
                mainCol.appendChild(questionList);

                var contextColumn = document.createElement('aside');
                contextColumn.className = 'help-context-column';
                contextColumn.setAttribute('data-component', 'help-context-links-panel');
                contextColumn.setAttribute('aria-label', 'Related help links');

                layout.appendChild(mainCol);
                layout.appendChild(contextColumn);

                var moreSupport = document.createElement('section');
                moreSupport.className = 'help-more-support';
                moreSupport.setAttribute('data-component', 'help-more-support');
                moreSupport.setAttribute('aria-label', 'More support options');

                dom.container.appendChild(layout);
                dom.container.appendChild(moreSupport);

                dom.layout = layout;
                dom.mainColumn = mainCol;
                dom.loader = loader;
                dom.categoryNav = categoryNav;
                dom.searchForm = searchForm;
                dom.searchInput = searchInput;
                dom.searchClearButton = searchClear;
                dom.questionList = questionList;
                dom.contextColumn = contextColumn;
                dom.moreSupport = moreSupport;

                attachEventListeners();
            }

            function attachEventListeners() {
                if (dom.searchForm) {
                    dom.searchForm.addEventListener('submit', function(event) {
                        event.preventDefault();
                        commitSearchTerm(dom.searchInput ? dom.searchInput.value : '', { replace: false });
                    });
                }

                if (dom.searchInput) {
                    dom.searchInput.addEventListener('input', function() {
                        if (searchDebounceTimer) {
                            window.clearTimeout(searchDebounceTimer);
                        }
                        var newValue = dom.searchInput.value || '';
                        searchDebounceTimer = window.setTimeout(function() {
                            commitSearchTerm(newValue, { replace: true });
                        }, 250);
                    });
                }

                if (dom.searchClearButton) {
                    dom.searchClearButton.addEventListener('click', function() {
                        if (dom.searchInput) {
                            dom.searchInput.value = '';
                        }
                        commitSearchTerm('', { replace: true });
                    });
                }

                if (dom.categoryNav) {
                    dom.categoryNav.addEventListener('click', function(event) {
                        var button = event.target.closest('button[data-action="select-category"]');
                        if (!button) {
                            return;
                        }
                        var catId = button.getAttribute('data-category-id');
                        if (!catId || catId === state.selectedCategoryId) {
                            return;
                        }
                        handleCategoryChange(catId);
                    });
                }

                if (dom.questionList) {
                    dom.questionList.addEventListener('click', function(event) {
                        var actionButton = event.target.closest('button[data-action]');
                        if (actionButton) {
                            var action = actionButton.getAttribute('data-action');
                            if (action === 'toggle-question') {
                                var questionId = actionButton.getAttribute('data-question-id');
                                if (questionId) {
                                    handleQuestionToggle(questionId);
                                }
                            }
                            return;
                        }

                        var link = event.target.closest('a');
                        if (link) {
                            handleAnswerLinkClick(event, link);
                        }
                    });
                }

                if (dom.contextColumn) {
                    dom.contextColumn.addEventListener('click', function(event) {
                        var link = event.target.closest('a');
                        if (link) {
                            handleAnswerLinkClick(event, link);
                        }
                    });
                }
            }

            function startLoading() {
                state.isLoading = true;
                state.loadError = null;
                if (!dom.layout) {
                    buildBaseLayout();
                }
                updateLoader();
            }

            function updateLoader() {
                if (!dom.loader) {
                    return;
                }
                dom.loader.innerHTML = '';
                if (state.isLoading) {
                    var pLoading = document.createElement('p');
                    pLoading.textContent = 'Loading help topics…';
                    dom.loader.appendChild(pLoading);
                    return;
                }
                if (state.loadError) {
                    var pError = document.createElement('p');
                    pError.textContent = state.loadError;
                    var retryButton = document.createElement('button');
                    retryButton.type = 'button';
                    retryButton.textContent = 'Retry';
                    retryButton.setAttribute('data-action', 'help-retry-load');
                    retryButton.addEventListener('click', function() {
                        loadFaqData(true);
                    });
                    dom.loader.appendChild(pError);
                    dom.loader.appendChild(retryButton);
                }
            }

            function loadFaqData(isRetry) {
                startLoading();
                var result;
                try {
                    result = WebsiteSDK.getHelpFaqContent();
                } catch (error) {
                    state.isLoading = false;
                    state.loadError = 'Sorry, we could not load the help topics. Please try again.';
                    updateLoader();
                    return;
                }

                var rawCategories = result && Array.isArray(result.faqCategories) ? result.faqCategories : [];
                state.categories = normalizeCategories(rawCategories);

                state.isLoading = false;
                state.loadError = null;
                updateLoader();

                applyInitialUrlState(isRetry);
                renderAll();
                ensurePopStateListener();
            }

            function applyInitialUrlState(isRetry) {
                var params = new URLSearchParams(window.location.search);
                var qParam = params.get('q') || '';
                var categoryParam = params.get('category');
                var questionParam = params.get('question');

                state.searchTerm = qParam;

                var question = questionParam ? findQuestionById(questionParam) : null;
                if (question) {
                    state.expandedQuestionId = question.id;
                    state.selectedCategoryId = question.categoryId;
                } else {
                    state.expandedQuestionId = null;
                    var categoryExists = categoryParam && state.categories.some(function(cat) { return cat.id === categoryParam; });
                    if (categoryExists) {
                        state.selectedCategoryId = categoryParam;
                    } else if (!state.selectedCategoryId || isRetry) {
                        state.selectedCategoryId = state.categories.length > 0 ? state.categories[0].id : null;
                    }
                }

                if (dom.searchInput) {
                    dom.searchInput.value = state.searchTerm;
                }
            }

            function ensurePopStateListener() {
                if (popstateAttached) {
                    return;
                }
                window.addEventListener('popstate', handlePopState);
                popstateAttached = true;
            }

            function handlePopState() {
                if (!state.categories || state.categories.length === 0) {
                    return;
                }
                var params = new URLSearchParams(window.location.search);
                var qParam = params.get('q') || '';
                var categoryParam = params.get('category');
                var questionParam = params.get('question');

                state.searchTerm = qParam;

                var question = questionParam ? findQuestionById(questionParam) : null;
                if (question) {
                    state.expandedQuestionId = question.id;
                    state.selectedCategoryId = question.categoryId;
                } else {
                    state.expandedQuestionId = null;
                    var categoryExists = categoryParam && state.categories.some(function(cat) { return cat.id === categoryParam; });
                    if (categoryExists) {
                        state.selectedCategoryId = categoryParam;
                    } else {
                        state.selectedCategoryId = state.categories.length > 0 ? state.categories[0].id : null;
                    }
                }

                if (dom.searchInput) {
                    dom.searchInput.value = state.searchTerm;
                }

                renderAll();

                if (state.expandedQuestionId) {
                    scrollQuestionIntoView(state.expandedQuestionId, false);
                }
            }

            function findCategoryById(categoryId) {
                if (!categoryId) {
                    return null;
                }
                for (var i = 0; i < state.categories.length; i += 1) {
                    if (state.categories[i].id === categoryId) {
                        return state.categories[i];
                    }
                }
                return null;
            }

            function findQuestionById(questionId) {
                if (!questionId) {
                    return null;
                }
                for (var i = 0; i < state.categories.length; i += 1) {
                    var cat = state.categories[i];
                    if (!cat.questions) {
                        continue;
                    }
                    for (var j = 0; j < cat.questions.length; j += 1) {
                        var q = cat.questions[j];
                        if (q.id === questionId) {
                            return q;
                        }
                    }
                }
                return null;
            }

            function renderAll() {
                renderCategories(dom.categoryNav, state);
                renderQuestions(dom.questionList, state);
                renderContextLinks(dom.contextColumn, state);
                renderMoreSupport(dom.moreSupport);
            }

            function renderCategories(navEl, currentState) {
                if (!navEl) {
                    return;
                }
                navEl.innerHTML = '';

                if (!currentState.categories || currentState.categories.length === 0) {
                    var p = document.createElement('p');
                    p.textContent = 'No help topics are available yet.';
                    navEl.appendChild(p);
                    return;
                }

                var list = document.createElement('ul');
                list.className = 'faq-category-list';

                currentState.categories.forEach(function(cat) {
                    var listItem = document.createElement('li');
                    listItem.className = 'faq-category-item';

                    var button = document.createElement('button');
                    button.type = 'button';
                    button.textContent = cat.name;
                    button.className = 'faq-category-button';
                    button.setAttribute('data-action', 'select-category');
                    button.setAttribute('data-category-id', cat.id);
                    if (cat.id === currentState.selectedCategoryId) {
                        button.classList.add('is-active');
                        button.setAttribute('aria-current', 'page');
                    }

                    listItem.appendChild(button);
                    list.appendChild(listItem);
                });

                navEl.appendChild(list);
            }

            function questionMatchesSearch(question, searchTerm) {
                if (!searchTerm) {
                    return true;
                }
                var term = searchTerm.toLowerCase();
                var qText = (question.question || '').toLowerCase();
                var aText = (question.answer || '').toLowerCase();
                return qText.indexOf(term) !== -1 || aText.indexOf(term) !== -1;
            }

            function filterQuestionsForCategory(category, searchTerm) {
                if (!category || !Array.isArray(category.questions)) {
                    return [];
                }
                if (!searchTerm) {
                    return category.questions.slice();
                }
                return category.questions.filter(function(question) {
                    return questionMatchesSearch(question, searchTerm);
                });
            }

            function renderQuestions(listEl, currentState) {
                if (!listEl) {
                    return;
                }
                listEl.innerHTML = '';

                var category = findCategoryById(currentState.selectedCategoryId);
                if (!category) {
                    var pNoCat = document.createElement('p');
                    pNoCat.textContent = 'No questions found for this topic.';
                    listEl.appendChild(pNoCat);
                    return;
                }

                var filteredQuestions = filterQuestionsForCategory(category, currentState.searchTerm);

                if (filteredQuestions.length === 0) {
                    var pEmpty = document.createElement('p');
                    pEmpty.textContent = currentState.searchTerm ?
                        'No questions matched your search in this category.' :
                        'No questions are available in this category yet.';
                    listEl.appendChild(pEmpty);
                    return;
                }

                filteredQuestions.forEach(function(question) {
                    var isExpanded = currentState.expandedQuestionId === question.id;

                    var item = document.createElement('article');
                    item.className = 'faq-item';
                    item.setAttribute('data-question-id', question.id);

                    var headerButton = document.createElement('button');
                    headerButton.type = 'button';
                    headerButton.className = 'faq-question-button';
                    headerButton.setAttribute('data-action', 'toggle-question');
                    headerButton.setAttribute('data-question-id', question.id);
                    headerButton.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');

                    var headingText = document.createElement('span');
                    headingText.className = 'faq-question-text';
                    headingText.textContent = question.question || '';

                    headerButton.appendChild(headingText);

                    var answerId = 'faq-answer-' + question.id;

                    var answerPanel = document.createElement('div');
                    answerPanel.className = 'faq-answer';
                    answerPanel.id = answerId;
                    answerPanel.setAttribute('role', 'region');
                    headerButton.id = 'faq-question-' + question.id;
                    headerButton.setAttribute('aria-controls', answerId);
                    answerPanel.setAttribute('aria-labelledby', headerButton.id);
                    if (!isExpanded) {
                        answerPanel.hidden = true;
                    }

                    var answerInner = document.createElement('div');
                    answerInner.className = 'faq-answer-inner';

                    var answerHtml = question.answer || '';
                    if (answerHtml) {
                        answerInner.innerHTML = answerHtml;
                    } else {
                        var pAnswer = document.createElement('p');
                        pAnswer.textContent = 'No answer has been added for this question yet.';
                        answerInner.appendChild(pAnswer);
                    }

                    answerPanel.appendChild(answerInner);

                    item.appendChild(headerButton);
                    item.appendChild(answerPanel);

                    listEl.appendChild(item);
                });
            }

            function renderMoreSupport(moreSupportEl) {
                if (!moreSupportEl) {
                    return;
                }
                moreSupportEl.innerHTML = '';

                var heading = document.createElement('h2');
                heading.className = 'help-more-support-heading';
                heading.textContent = 'Need more help?';

                var description = document.createElement('p');
                description.className = 'help-more-support-text';

                var externalConfig = window.externalSupportConfig;
                if (externalConfig && typeof externalConfig === 'object' && Array.isArray(externalConfig.links) && externalConfig.links.length > 0) {
                    description.textContent = externalConfig.description || 'If you did not find what you were looking for above, try one of these support options:';

                    var list = document.createElement('ul');
                    list.className = 'help-more-support-list';

                    externalConfig.links.forEach(function(linkConfig) {
                        var li = document.createElement('li');
                        var anchor = document.createElement('a');
                        anchor.textContent = linkConfig.label || linkConfig.href || 'Support link';
                        if (linkConfig.href) {
                            anchor.href = linkConfig.href;
                        } else {
                            anchor.href = 'javascript:void(0)';
                        }
                        if (linkConfig.newTab) {
                            anchor.target = '_blank';
                            anchor.rel = 'noopener noreferrer';
                        }
                        li.appendChild(anchor);
                        list.appendChild(li);
                    });

                    moreSupportEl.appendChild(heading);
                    moreSupportEl.appendChild(description);
                    moreSupportEl.appendChild(list);
                } else {
                    description.textContent = 'If you cannot find an answer here, look for a contact or feedback link in the site footer or store.';
                    moreSupportEl.appendChild(heading);
                    moreSupportEl.appendChild(description);
                }
            }

            function renderContextLinks(contextEl, currentState) {
                if (!contextEl) {
                    return;
                }
                contextEl.innerHTML = '';

                var config = window.helpContextLinksConfig;
                if (!config || typeof config !== 'object') {
                    return;
                }

                var links = [];
                var byQuestion = config.byQuestion || {};
                var byCategory = config.byCategory || {};

                if (currentState.expandedQuestionId && byQuestion[currentState.expandedQuestionId]) {
                    links = byQuestion[currentState.expandedQuestionId];
                } else if (currentState.selectedCategoryId && byCategory[currentState.selectedCategoryId]) {
                    links = byCategory[currentState.selectedCategoryId];
                }

                if (!Array.isArray(links) || links.length === 0) {
                    return;
                }

                var heading = document.createElement('h2');
                heading.className = 'help-context-heading';
                heading.textContent = 'Shortcuts';

                var list = document.createElement('ul');
                list.className = 'help-context-links-list';

                links.forEach(function(linkConfig) {
                    var li = document.createElement('li');
                    li.className = 'help-context-links-item';

                    var anchor = document.createElement('a');
                    anchor.textContent = linkConfig.label || linkConfig.href || 'Link';

                    if (linkConfig.href) {
                        anchor.href = linkConfig.href;
                    } else {
                        anchor.href = 'javascript:void(0)';
                    }

                    if (linkConfig.topic) {
                        anchor.setAttribute('data-topic', linkConfig.topic);
                    }

                    if (linkConfig.newTab) {
                        anchor.target = '_blank';
                        anchor.rel = 'noopener noreferrer';
                    }

                    li.appendChild(anchor);
                    list.appendChild(li);
                });

                contextEl.appendChild(heading);
                contextEl.appendChild(list);
            }

            function handleCategoryChange(categoryId) {
                var category = findCategoryById(categoryId);
                if (!category) {
                    return;
                }

                if (state.expandedQuestionId) {
                    var expandedQuestion = findQuestionById(state.expandedQuestionId);
                    if (!expandedQuestion || expandedQuestion.categoryId !== categoryId) {
                        state.expandedQuestionId = null;
                    }
                }

                state.selectedCategoryId = categoryId;

                renderCategories(dom.categoryNav, state);
                renderQuestions(dom.questionList, state);
                renderContextLinks(dom.contextColumn, state);

                syncUrl({ replace: false });
            }

            function commitSearchTerm(newTermRaw, options) {
                var newTerm = (newTermRaw || '').trim();
                state.searchTerm = newTerm;

                if (dom.searchInput && dom.searchInput.value !== newTerm) {
                    dom.searchInput.value = newTerm;
                }

                if (state.expandedQuestionId) {
                    var expandedQuestion = findQuestionById(state.expandedQuestionId);
                    if (!expandedQuestion || !questionMatchesSearch(expandedQuestion, newTerm)) {
                        state.expandedQuestionId = null;
                    }
                }

                renderQuestions(dom.questionList, state);
                renderContextLinks(dom.contextColumn, state);

                var useReplace = options && options.replace;
                syncUrl({ replace: useReplace });
            }

            function handleQuestionToggle(questionId) {
                if (state.expandedQuestionId === questionId) {
                    state.expandedQuestionId = null;
                } else {
                    var question = findQuestionById(questionId);
                    if (!question) {
                        return;
                    }
                    state.expandedQuestionId = question.id;
                    if (state.selectedCategoryId !== question.categoryId) {
                        state.selectedCategoryId = question.categoryId;
                    }
                }

                renderCategories(dom.categoryNav, state);
                renderQuestions(dom.questionList, state);
                renderContextLinks(dom.contextColumn, state);

                syncUrl({ replace: false });

                if (state.expandedQuestionId) {
                    scrollQuestionIntoView(state.expandedQuestionId, true);
                }
            }

            function scrollQuestionIntoView(questionId, smooth) {
                if (!dom.questionList) {
                    return;
                }
                var selector = '[data-question-id="' + questionId.replace(/"/g, '\\"') + '"]';
                var item = dom.questionList.querySelector(selector);
                if (!item) {
                    return;
                }
                var rect = item.getBoundingClientRect();
                var absoluteTop = window.pageYOffset + rect.top;
                var offset = 80;
                window.scrollTo({
                    top: absoluteTop - offset,
                    behavior: smooth ? 'smooth' : 'auto'
                });
            }

            function syncUrl(options) {
                var params = new URLSearchParams(window.location.search);

                if (state.selectedCategoryId) {
                    params.set('category', state.selectedCategoryId);
                } else {
                    params.delete('category');
                }

                if (state.searchTerm) {
                    params.set('q', state.searchTerm);
                } else {
                    params.delete('q');
                }

                if (state.expandedQuestionId) {
                    params.set('question', state.expandedQuestionId);
                } else {
                    params.delete('question');
                }

                var newSearch = params.toString();
                var newUrl = window.location.pathname + (newSearch ? '?' + newSearch : '');
                var useReplace = options && options.replace;
                if (useReplace) {
                    window.history.replaceState({}, '', newUrl);
                } else {
                    window.history.pushState({}, '', newUrl);
                }
            }

            function deriveTopicFromFilename(filename) {
                if (filename === 'settings.html') {
                    return 'appearance';
                }
                if (filename === 'playlists.html') {
                    return 'playlists';
                }
                if (filename === 'store.html') {
                    return 'store';
                }
                return 'help';
            }

            function handleAnswerLinkClick(event, link) {
                if (!link || !link.getAttribute) {
                    return;
                }
                var href = link.getAttribute('href') || '';
                if (!href || href.indexOf('javascript:') === 0 || href.indexOf('#') === 0) {
                    return;
                }

                var url;
                try {
                    url = new URL(href, window.location.origin);
                } catch (e) {
                    return;
                }

                var pathSegments = url.pathname.split('/');
                var filename = pathSegments[pathSegments.length - 1];

                if (filename === 'settings.html' || filename === 'playlists.html' || filename === 'store.html') {
                    event.preventDefault();

                    var params = new URLSearchParams(url.search);
                    if (!params.get('from')) {
                        params.set('from', 'help');
                    }
                    if (!params.get('topic')) {
                        var explicitTopic = link.getAttribute('data-topic');
                        if (explicitTopic) {
                            params.set('topic', explicitTopic);
                        } else {
                            params.set('topic', deriveTopicFromFilename(filename));
                        }
                    }

                    var finalSearch = params.toString();
                    var targetUrl = filename + (finalSearch ? '?' + finalSearch : '');
                    window.location.href = targetUrl;
                }
            }

            loadFaqData(false);
        }
    })();
    </script>
</body>
