<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewing page...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: arial, sans-serif; background: #fff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    /* --- Navigation bar --- */
    .viewer-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 42px;
      padding: 0 12px;
      background: #f1f3f4;
      border-bottom: 1px solid #dadce0;
      font-size: 14px;
      color: #3c4043;
      flex-shrink: 0;
    }

    .viewer-back {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none; background: none; cursor: pointer;
      color: #5f6368;
      flex-shrink: 0;
    }
    .viewer-back:hover { background: #dadce0; }

    .viewer-site-name {
      font-weight: 500;
      color: #202124;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .viewer-divider {
      width: 1px; height: 20px; background: #dadce0; flex-shrink: 0;
    }

    .viewer-url {
      color: #5f6368;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }

    .viewer-open-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid #dadce0;
      background: #fff;
      color: #1a73e8;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .viewer-open-btn:hover { background: #f8f9fa; }

    /* --- Task bar --- */
    .task-bar {
      display: none;
      align-items: stretch;
      background: #1a73e8;
      color: #fff;
      flex-shrink: 0;
      min-height: 40px;
    }
    .task-bar.visible { display: flex; }

    .task-nav-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px;
      border: none; background: none; cursor: pointer;
      color: rgba(255,255,255,0.8);
      flex-shrink: 0;
    }
    .task-nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .task-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .task-nav-btn:disabled:hover { background: none; }

    .task-content {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      min-width: 0;
    }

    .task-badge {
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }

    .task-instruction {
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .task-toggle-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px;
      border: none; background: none; cursor: pointer;
      color: rgba(255,255,255,0.8);
      flex-shrink: 0;
    }
    .task-toggle-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* Expanded state: show full text */
    .task-bar.expanded .task-instruction {
      -webkit-line-clamp: unset;
    }

    /* --- Content area --- */
    .viewer-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .viewer-frame {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      inset: 0;
    }

    .viewer-loading {
      display: flex; align-items: center; justify-content: center;
      position: absolute;
      inset: 0;
      background: #fff;
      color: #70757a;
      font-size: 14px;
      z-index: 5;
    }
    .viewer-loading.hidden { display: none; }
  </style>
</head>
<body>
  <!-- Navigation bar -->
  <div class="viewer-bar">
    <button class="viewer-back" id="back-btn" title="Back to search results">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg>
    </button>
    <span class="viewer-site-name" id="site-name"></span>
    <span class="viewer-divider"></span>
    <span class="viewer-url" id="page-url"></span>
    <button class="viewer-open-btn" id="open-btn" title="Open in new tab">
      <svg width="14" height="14" viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z" fill="currentColor"/></svg>
      Open
    </button>
  </div>

  <!-- Task bar -->
  <div class="task-bar" id="task-bar">
    <button class="task-nav-btn" id="task-prev" title="Previous task">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/></svg>
    </button>
    <div class="task-content">
      <span class="task-badge" id="task-badge">TASK 1/1</span>
      <span class="task-instruction" id="task-text"></span>
    </div>
    <button class="task-toggle-btn" id="task-expand" title="Expand/collapse">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z" fill="currentColor"/></svg>
    </button>
    <button class="task-nav-btn" id="task-next" title="Next task">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" fill="currentColor"/></svg>
    </button>
  </div>

  <!-- Content -->
  <div class="viewer-content">
    <div class="viewer-loading" id="loading-msg">Loading page...</div>
    <iframe class="viewer-frame" id="viewer-frame"></iframe>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var targetUrl = params.get('url') || '';
    var siteName = params.get('site') || '';
    var searchQuery = params.get('q') || '';

    var siteNameEl = document.getElementById('site-name');
    var pageUrlEl = document.getElementById('page-url');
    var backBtn = document.getElementById('back-btn');
    var openBtn = document.getElementById('open-btn');
    var frame = document.getElementById('viewer-frame');
    var loadingMsg = document.getElementById('loading-msg');

    // Task elements
    var taskBar = document.getElementById('task-bar');
    var taskBadge = document.getElementById('task-badge');
    var taskText = document.getElementById('task-text');
    var taskPrev = document.getElementById('task-prev');
    var taskNext = document.getElementById('task-next');
    var taskExpand = document.getElementById('task-expand');

    var tasks = [];
    var currentTaskIdx = 0;

    siteNameEl.textContent = siteName;
    pageUrlEl.textContent = targetUrl;
    document.title = siteName ? siteName + ' - InfiniteWeb' : 'InfiniteWeb Viewer';

    // --- Navigation ---
    backBtn.addEventListener('click', function() {
      if (searchQuery) {
        window.location.href = 'search.html?q=' + encodeURIComponent(searchQuery);
      } else {
        window.location.href = 'search.html';
      }
    });

    openBtn.addEventListener('click', function() {
      if (targetUrl) window.open(targetUrl, '_blank');
    });

    // --- Tasks ---
    function renderTask() {
      if (tasks.length === 0) return;
      var t = tasks[currentTaskIdx];
      taskBadge.textContent = 'TASK ' + (currentTaskIdx + 1) + '/' + tasks.length;
      taskText.textContent = t.instruction || t.description || t.name || '';
      taskPrev.disabled = currentTaskIdx === 0;
      taskNext.disabled = currentTaskIdx === tasks.length - 1;
    }

    taskPrev.addEventListener('click', function() {
      if (currentTaskIdx > 0) { currentTaskIdx--; renderTask(); }
    });

    taskNext.addEventListener('click', function() {
      if (currentTaskIdx < tasks.length - 1) { currentTaskIdx++; renderTask(); }
    });

    taskExpand.addEventListener('click', function() {
      taskBar.classList.toggle('expanded');
    });

    function loadTasks() {
      // Derive rewritten_tasks.json path from the URL
      // URL format: source/SITE_ID/page.html
      var match = targetUrl.match(/^(source\/[^/]+\/)/);
      if (!match) return;
      var tasksUrl = match[1] + 'rewritten_tasks.json';

      fetch(tasksUrl)
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (!data || !data.tasks || data.tasks.length === 0) return;
          tasks = data.tasks;
          currentTaskIdx = 0;
          renderTask();
          taskBar.classList.add('visible');
        })
        .catch(function() { /* no tasks, that's fine */ });
    }

    // --- Frame loading ---
    function showFrame() {
      loadingMsg.classList.add('hidden');
    }

    if (targetUrl) {
      try { localStorage.clear(); } catch(e) {}

      frame.src = targetUrl;
      frame.addEventListener('load', function() {
        showFrame();
        try {
          var iframeTitle = frame.contentDocument && frame.contentDocument.title;
          if (iframeTitle) document.title = iframeTitle + ' - InfiniteWeb';
        } catch(e) {}
      });

      setTimeout(showFrame, 3000);
      loadTasks();
    } else {
      loadingMsg.textContent = 'No URL specified.';
    }
  </script>
</body>
</html>
