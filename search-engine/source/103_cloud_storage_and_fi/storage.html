<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Cloud Storage Service</title>
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&amp;family=Space+Grotesk:wght@400;500;600&amp;display=swap' rel='stylesheet' />
  <link rel='stylesheet' href='styles.css' />
  <link rel='stylesheet' href='storage.css' />
</head>
<body>
  <header class='site-header' role='banner'>
    <div class='site-header-inner'>
      <div class='site-branding'>
        <span class='site-logo-text'>Cloud Storage</span>
      </div>
      <nav class='primary-nav' aria-label='Primary'>
        <ul>
          <li><a href='index.html'>My Files</a></li>
          <li><a href='recent.html'>Recent</a></li>
          <li><a href='shared.html'>Shared with me</a></li>
          <li><a href='storage.html'>Storage</a></li>
          <li><a href='trash.html'>Trash</a></li>
          <li><a href='help.html'>Help</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' role='main'>
    <div class='storage-page' data-component='storage-api-bootstrapper'>
      <aside class='storage-sidebar-drawer' data-component='sidebar-navigation' data-populate='sidebar-overview' aria-label='Storage navigation' hidden>
        <button type='button' class='sidebar-close-btn' data-action='close-sidebar'>Close</button>
        <div class='sidebar-section-list' data-populate='sidebar-sections'></div>
        <div class='sidebar-storage-summary' data-populate='sidebar-storage-summary'></div>

      </aside>
    </div>
  </main>
