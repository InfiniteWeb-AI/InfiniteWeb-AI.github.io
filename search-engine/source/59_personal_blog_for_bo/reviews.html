<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Advance the Plot &mdash; Book &amp; Movie Reviews</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Lora:wght@400;500;600&amp;family=Great+Vibes&amp;family=Source+Code+Pro:wght@400;600&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='reviews.css'>
</head>
<body>
  <header class='site-header' role='banner'>
    <div class='site-header-inner'>
      <div class='site-branding'>
        <a href='index.html' class='site-title'>Advance the Plot</a>
      </div>
      <nav class='primary-nav' aria-label='Main navigation'>
        <ul class='primary-nav-list'>
          <li class='primary-nav-item'><a href='index.html' class='nav-link'>Home</a></li>
          <li class='primary-nav-item'><a href='reviews.html?content_type=books' class='nav-link'>Books</a></li>
          <li class='primary-nav-item'><a href='reviews.html?content_type=movies' class='nav-link'>Movies</a></li>
          <li class='primary-nav-item'><a href='reading_lists.html' class='nav-link'>Reading Lists</a></li>
          <li class='primary-nav-item'><a href='account.html' class='nav-link'>Sign Up</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class='site-main'>
    <div class='site-main-inner'>
      <main id='content' class='content-main' role='main' data-component='reviews-page-init-controller'>
        <div class='reviews-page'>
          <div class='breadcrumb-search-row'>
            <nav class='breadcrumb-nav' aria-label='Breadcrumb'>
              <div class='breadcrumb-inner' data-component='breadcrumb-nav' data-populate='breadcrumb'></div>
            </nav>
            <form class='global-search-form' role='search' data-component='global-search-form' data-action='global-search'>
              <label for='globalSearchInput' class='visually-hidden'>Search reviews</label>
              <input id='globalSearchInput' name='query' type='search' class='global-search-input' placeholder='Search books and movies'>
              <button type='submit' class='button button-primary'>Search</button>
            </form>
          </div>

          <section class='reviews-main-column'>
            <div class='content-type-toggle' data-component='content-type-toggle' role='tablist' aria-label='Content type'>
              <button type='button' class='content-type-pill' data-action='change-content-type' data-content-type='books' aria-selected='false'>Books</button>
              <button type='button' class='content-type-pill' data-action='change-content-type' data-content-type='movies' aria-selected='false'>Movies</button>
            </div>

            <section class='applied-filters-bar' data-component='applied-filters-bar' data-populate='applied-filters' aria-label='Applied filters'>
              <!-- Applied filters chips will be rendered here -->
            </section>

            <div class='results-sort-row'>
              <div class='results-summary' data-component='results-summary' data-populate='results-summary'></div>
              <div class='sort-control' data-component='sort-control' data-populate='sort-control'></div>
            </div>

            <section class='reviews-list' data-component='reviews-list' data-populate='reviews-list' aria-label='Reviews listing'>
              <!-- Reviews will be rendered here -->
            </section>

            <nav class='pagination-nav' aria-label='Pagination'>
              <div class='pagination-controls' data-component='pagination-controls' data-populate='pagination-controls'></div>
            </nav>
          </section>
        </div>
      </main>

      <aside id='sidebar' class='content-sidebar' aria-label='Sidebar'>
        <div class='filters-sidebar' data-component='filters-sidebar' data-populate='filters-sidebar'>
          <!-- Filter controls will be rendered here -->
        </div>
      </aside>
    </div>
  </div>

  <footer class='site-footer' role='contentinfo'>
    <div class='site-footer-inner'>
      <div class='footer-left'>
        <p class='footer-meta'>&copy; 2024 Advance the Plot. All rights reserved.</p>
      </div>
      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'><a href='about.html'>About</a></li>
          <li class='footer-nav-item'><a href='contact.html'>Contact</a></li>
          <li class='footer-nav-item'><a href='newsletter.html'>Newsletter</a></li>
        </ul>
      </nav>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    'use strict';

    // ----- URL / state helpers -----
    function getUrlParams() {
      return new URLSearchParams(window.location.search);
    }

    function getInitialState() {
      var params = getUrlParams();
      var rawContentType = params.get('content_type');
      var contentType = rawContentType === 'movies' ? 'movies' : 'books';

      var page = parseInt(params.get('page'), 10);
      if (!page || page < 1) page = 1;

      var pageSize = parseInt(params.get('pageSize'), 10);
      if (!pageSize || pageSize <= 0) pageSize = 10;

      var sortByParam = params.get('sortBy') || 'newest_first';

      function parseNumberParam(name) {
        var v = params.get(name);
        if (v === null || v === '') return null;
        var n = parseFloat(v);
        return isNaN(n) ? null : n;
      }

      function parseIntParam(name) {
        var v = params.get(name);
        if (v === null || v === '') return null;
        var n = parseInt(v, 10);
        return isNaN(n) ? null : n;
      }

      return {
        contentType: contentType,
        genre: params.get('genre') || '',
        datePreset: params.get('date_preset') || '',
        minRating: parseNumberParam('min_rating'),
        maxRating: parseNumberParam('max_rating'),
        minPublicationYear: parseIntParam('min_publication_year'),
        minReleaseYear: parseIntParam('min_release_year'),
        minRuntime: parseIntParam('min_runtime'),
        maxRuntime: parseIntParam('max_runtime'),
        sortByParam: sortByParam,
        page: page,
        pageSize: pageSize
      };
    }

    function mapSortParamToApi(sortParam, contentType) {
      switch (sortParam) {
        case 'rating_desc':
          return 'rating_high_to_low';
        case 'rating_asc':
          return 'rating_low_to_high';
        case 'most_popular':
          return 'most_popular';
        case 'release_year_asc':
          return 'release_year_oldest_first';
        case 'release_year_desc':
          return 'release_year_newest_first';
        case 'newest_first':
        default:
          return 'newest_first';
      }
    }

    function mapApiSortToParam(apiSort, contentType) {
      switch (apiSort) {
        case 'rating_high_to_low':
          return 'rating_desc';
        case 'rating_low_to_high':
          return 'rating_asc';
        case 'most_popular':
          return 'most_popular';
        case 'release_year_oldest_first':
          return 'release_year_asc';
        case 'release_year_newest_first':
          return 'release_year_desc';
        case 'newest_first':
        default:
          return 'newest_first';
      }
    }

    function navigateWithParams(updates, options) {
      var opts = options || {};
      var url = new URL(window.location.href);
      var search = url.searchParams;

      if (opts.clearFilters) {
        var filterKeys = [
          'genre',
          'date_preset',
          'min_rating',
          'max_rating',
          'min_publication_year',
          'min_release_year',
          'min_runtime',
          'max_runtime',
          'page',
          'pageSize',
          'sortBy'
        ];
        for (var i = 0; i < filterKeys.length; i++) {
          search.delete(filterKeys[i]);
        }
      }

      var keys = Object.keys(updates || {});
      for (var j = 0; j < keys.length; j++) {
        var key = keys[j];
        var value = updates[key];
        if (value === undefined || value === null || value === '') {
          search.delete(key);
        } else {
          search.set(key, String(value));
        }
      }

      url.search = search.toString();
      window.location.href = url.pathname + url.search;
    }

    // ----- Rendering helpers -----

    function renderBreadcrumb(container, state, listing) {
      container.innerHTML = '';
      var ol = document.createElement('ol');
      ol.className = 'breadcrumb-list';

      var liRoot = document.createElement('li');
      liRoot.className = 'breadcrumb-item';
      var spanRoot = document.createElement('span');
      spanRoot.className = 'breadcrumb-label';
      spanRoot.textContent = 'Reviews';
      liRoot.appendChild(spanRoot);
      ol.appendChild(liRoot);

      var liType = document.createElement('li');
      liType.className = 'breadcrumb-item';
      var aType = document.createElement('a');
      aType.href = 'javascript:void(0)';
      aType.dataset.action = 'breadcrumb-content-type';
      aType.dataset.contentType = state.contentType;
      aType.className = 'breadcrumb-link';
      aType.textContent = state.contentType === 'movies' ? 'Movies' : 'Books';
      liType.appendChild(document.createTextNode(' / '));
      liType.appendChild(aType);
      ol.appendChild(liType);

      if (state.genre) {
        var liGenre = document.createElement('li');
        liGenre.className = 'breadcrumb-item';
        var spanSep = document.createTextNode(' / ');
        var spanGenre = document.createElement('span');
        spanGenre.className = 'breadcrumb-current';
        spanGenre.textContent = state.genre;
        liGenre.appendChild(spanSep);
        liGenre.appendChild(spanGenre);
        ol.appendChild(liGenre);
      }

      container.appendChild(ol);
    }

    function renderAppliedFilters(container, listing, state, filterOptions) {
      container.innerHTML = '';
      var applied = listing && listing.appliedFilters ? listing.appliedFilters : {};
      var chips = [];

      if (applied.genre) {
        chips.push({ key: 'genre', label: 'Genre: ' + applied.genre });
      }

      if (applied.dateRangePreset) {
        var dateId = applied.dateRangePreset;
        var dateLabel = dateId;
        if (filterOptions && Array.isArray(filterOptions.datePresets)) {
          for (var i = 0; i < filterOptions.datePresets.length; i++) {
            if (filterOptions.datePresets[i].id === dateId) {
              dateLabel = filterOptions.datePresets[i].label || dateId;
              break;
            }
          }
        }
        chips.push({ key: 'date_preset', label: 'Date: ' + dateLabel });
      }

      if (applied.minRating !== undefined && applied.minRating !== null) {
        chips.push({ key: 'min_rating', label: 'Rating ≥ ' + applied.minRating });
      }
      if (applied.maxRating !== undefined && applied.maxRating !== null) {
        chips.push({ key: 'max_rating', label: 'Rating ≤ ' + applied.maxRating });
      }

      if (applied.minPublicationYear) {
        chips.push({ key: 'min_publication_year', label: 'Published ≥ ' + applied.minPublicationYear });
      }
      if (applied.minReleaseYear) {
        chips.push({ key: 'min_release_year', label: 'Released ≥ ' + applied.minReleaseYear });
      }

      if (applied.minRuntimeMinutes) {
        chips.push({ key: 'min_runtime', label: 'Runtime ≥ ' + applied.minRuntimeMinutes + ' min' });
      }
      if (applied.maxRuntimeMinutes) {
        chips.push({ key: 'max_runtime', label: 'Runtime ≤ ' + applied.maxRuntimeMinutes + ' min' });
      }

      if (!chips.length) {
        var empty = document.createElement('p');
        empty.className = 'applied-filters-empty';
        empty.textContent = 'No filters applied.';
        container.appendChild(empty);
        return;
      }

      var list = document.createElement('div');
      list.className = 'applied-filters-chips';

      for (var c = 0; c < chips.length; c++) {
        var chip = chips[c];
        var chipEl = document.createElement('span');
        chipEl.className = 'filter-chip';
        chipEl.textContent = chip.label;

        var removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'filter-chip-remove';
        removeBtn.dataset.action = 'remove-filter';
        removeBtn.dataset.filterKey = chip.key;
        removeBtn.setAttribute('aria-label', 'Remove filter ' + chip.label);
        removeBtn.textContent = 'd7';

        chipEl.appendChild(removeBtn);
        list.appendChild(chipEl);
      }

      container.appendChild(list);

      var clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.className = 'clear-all-filters';
      clearBtn.dataset.action = 'clear-all-filters';
      clearBtn.textContent = 'Clear all filters';
      container.appendChild(clearBtn);
    }

    function renderResultsSummary(container, listing) {
      container.innerHTML = '';
      if (!listing) {
        container.textContent = 'Unable to load results.';
        return;
      }
      var total = listing.totalCount || 0;
      if (!total) {
        container.textContent = 'No reviews match your filters.';
        return;
      }
      var page = listing.page || 1;
      var pageSize = listing.pageSize || 10;
      var start = (page - 1) * pageSize + 1;
      var end = Math.min(total, page * pageSize);
      container.textContent = 'Showing ' + start + 'a0b7a0' + end + ' of ' + total + ' reviews';
    }

    function renderSortControl(container, state, listing) {
      container.innerHTML = '';
      var currentParam = state.sortByParam;
      if (listing && listing.sortBy && !currentParam) {
        currentParam = mapApiSortToParam(listing.sortBy, state.contentType);
      }

      var label = document.createElement('label');
      label.className = 'sort-label';
      label.setAttribute('for', 'sortBySelect');
      label.textContent = 'Sort by';

      var select = document.createElement('select');
      select.id = 'sortBySelect';
      select.className = 'sort-select';
      select.dataset.action = 'sort-change';

      function addOption(value, text) {
        var opt = document.createElement('option');
        opt.value = value;
        opt.textContent = text;
        if (value === currentParam) {
          opt.selected = true;
        }
        select.appendChild(opt);
      }

      addOption('newest_first', 'Newest first');
      addOption('rating_desc', 'Rating: high to low');
      addOption('rating_asc', 'Rating: low to high');
      addOption('most_popular', 'Most popular');
      if (state.contentType === 'movies') {
        addOption('release_year_desc', 'Release year: newest');
        addOption('release_year_asc', 'Release year: oldest');
      }

      container.appendChild(label);
      container.appendChild(select);
    }

    function renderReviewsList(container, listing, state) {
      container.innerHTML = '';
      if (!listing) {
        var err = document.createElement('p');
        err.textContent = 'Unable to load reviews.';
        container.appendChild(err);
        return;
      }

      if (!listing.items || !listing.items.length) {
        var empty = document.createElement('p');
        empty.textContent = 'No reviews found. Try adjusting your filters.';
        container.appendChild(empty);
        return;
      }

      for (var i = 0; i < listing.items.length; i++) {
        var item = listing.items[i];
        var article = document.createElement('article');
        article.className = 'review-item';

        var inner = document.createElement('div');
        inner.className = 'review-item-inner';

        if (item.thumbnailUrl) {
          var thumbWrap = document.createElement('div');
          thumbWrap.className = 'review-thumbnail';
          var img = document.createElement('img');
          img.src = item.thumbnailUrl;
          img.alt = '';
          thumbWrap.appendChild(img);
          inner.appendChild(thumbWrap);
        }

        var contentWrap = document.createElement('div');
        contentWrap.className = 'review-content';

        var h2 = document.createElement('h2');
        h2.className = 'review-title';
        var link = document.createElement('a');
        link.href = 'javascript:void(0)';
        link.dataset.action = 'open-review';
        link.dataset.reviewId = item.reviewId;
        link.textContent = item.title || 'Untitled review';
        h2.appendChild(link);
        contentWrap.appendChild(h2);

        var meta = document.createElement('div');
        meta.className = 'review-meta';

        var pieces = [];
        if (item.rating !== undefined && item.rating !== null) {
          pieces.push('Rating ' + item.rating.toFixed(1));
        }
        if (item.genre) {
          pieces.push(item.genre);
        }
        if (state.contentType === 'books' && item.publicationYear) {
          pieces.push('Published ' + item.publicationYear);
        }
        if (state.contentType === 'movies' && item.releaseYear) {
          pieces.push('Released ' + item.releaseYear);
        }
        if (state.contentType === 'movies' && item.runtimeMinutes) {
          pieces.push(item.runtimeMinutes + ' min');
        }
        if (item.authorName) {
          pieces.push('by ' + item.authorName);
        }
        if (item.publishedAt) {
          pieces.push('Reviewed ' + item.publishedAt.substring(0, 10));
        }

        meta.textContent = pieces.join(' b7 ');
        contentWrap.appendChild(meta);

        if (item.tags && item.tags.length) {
          var tagsWrap = document.createElement('div');
          tagsWrap.className = 'review-tags';
          for (var t = 0; t < item.tags.length; t++) {
            var tag = item.tags[t];
            var tagSpan = document.createElement('span');
            tagSpan.className = 'review-tag';
            tagSpan.textContent = tag.name || tag.slug || '';
            tagsWrap.appendChild(tagSpan);
          }
          contentWrap.appendChild(tagsWrap);
        }

        var interactions = document.createElement('div');
        interactions.className = 'review-interactions';
        var bits = [];
        if (item.likeCount) {
          bits.push('Likes ' + item.likeCount);
        }
        if (item.commentCount) {
          bits.push(item.commentCount + ' comments');
        }
        if (item.isSavedForLater) {
          bits.push('Saved for later');
        }
        if (item.isRead) {
          bits.push('Read');
        }
        interactions.textContent = bits.join(' b7 ');
        contentWrap.appendChild(interactions);

        inner.appendChild(contentWrap);
        article.appendChild(inner);
        container.appendChild(article);
      }
    }

    function renderPagination(container, listing) {
      container.innerHTML = '';
      if (!listing) {
        return;
      }
      var total = listing.totalCount || 0;
      var page = listing.page || 1;
      var pageSize = listing.pageSize || 10;
      if (!total || total <= pageSize) {
        return;
      }

      var totalPages = Math.ceil(total / pageSize);

      var wrap = document.createElement('div');
      wrap.className = 'pagination-inner';

      var prevBtn = document.createElement('button');
      prevBtn.type = 'button';
      prevBtn.className = 'page-btn prev-page';
      prevBtn.dataset.action = 'page-change';
      prevBtn.dataset.page = String(Math.max(1, page - 1));
      prevBtn.textContent = 'Previous';
      if (page <= 1) {
        prevBtn.disabled = true;
      }
      wrap.appendChild(prevBtn);

      for (var p = 1; p <= totalPages; p++) {
        if (totalPages > 7) {
          if (p === 2 && page > 4) {
            var ellipsis1 = document.createElement('span');
            ellipsis1.className = 'page-ellipsis';
            ellipsis1.textContent = 'b7b7b7';
            wrap.appendChild(ellipsis1);
            p = page - 2;
            continue;
          }
          if (p === page + 2 && page + 3 < totalPages) {
            var ellipsis2 = document.createElement('span');
            ellipsis2.className = 'page-ellipsis';
            ellipsis2.textContent = 'b7b7b7';
            wrap.appendChild(ellipsis2);
            p = totalPages - 1;
            continue;
          }
        }
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'page-btn';
        if (p === page) {
          btn.className += ' is-active';
          btn.disabled = true;
        }
        btn.dataset.action = 'page-change';
        btn.dataset.page = String(p);
        btn.textContent = String(p);
        wrap.appendChild(btn);
      }

      var nextBtn = document.createElement('button');
      nextBtn.type = 'button';
      nextBtn.className = 'page-btn next-page';
      nextBtn.dataset.action = 'page-change';
      nextBtn.dataset.page = String(Math.min(totalPages, page + 1));
      nextBtn.textContent = 'Next';
      if (page >= totalPages) {
        nextBtn.disabled = true;
      }
      wrap.appendChild(nextBtn);

      var pageSizeWrap = document.createElement('div');
      pageSizeWrap.className = 'page-size-wrap';
      var label = document.createElement('label');
      label.setAttribute('for', 'pageSizeSelect');
      label.textContent = 'Per page';
      var select = document.createElement('select');
      select.id = 'pageSizeSelect';
      select.className = 'page-size-select';
      select.dataset.action = 'page-size-change';
      var sizes = [5, 10, 20, 50];
      for (var s = 0; s < sizes.length; s++) {
        var opt = document.createElement('option');
        opt.value = String(sizes[s]);
        opt.textContent = String(sizes[s]);
        if (sizes[s] === pageSize) {
          opt.selected = true;
        }
        select.appendChild(opt);
      }
      pageSizeWrap.appendChild(label);
      pageSizeWrap.appendChild(select);
      wrap.appendChild(pageSizeWrap);

      container.appendChild(wrap);
    }

    function renderFiltersSidebar(container, filterOptions, state) {
      container.innerHTML = '';
      if (!filterOptions) {
        var err = document.createElement('p');
        err.textContent = 'Unable to load filters.';
        container.appendChild(err);
        return;
      }

      // Genre
      var genreSection = document.createElement('section');
      genreSection.className = 'filter-group filter-genre';
      var genreHeading = document.createElement('h2');
      genreHeading.className = 'filter-heading';
      genreHeading.textContent = 'Genre';
      genreSection.appendChild(genreHeading);

      var genreList = document.createElement('div');
      genreList.className = 'filter-options';
      if (Array.isArray(filterOptions.genres) && filterOptions.genres.length) {
        var allBtn = document.createElement('button');
        allBtn.type = 'button';
        allBtn.className = 'filter-pill';
        if (!state.genre) {
          allBtn.className += ' is-active';
        }
        allBtn.textContent = 'All genres';
        allBtn.dataset.action = 'genre-filter';
        allBtn.dataset.genreName = '';
        genreList.appendChild(allBtn);

        for (var g = 0; g < filterOptions.genres.length; g++) {
          var genre = filterOptions.genres[g];
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'filter-pill';
          if (state.genre && state.genre === genre.name) {
            btn.className += ' is-active';
          }
          btn.dataset.action = 'genre-filter';
          btn.dataset.genreName = genre.name;
          var label = genre.name;
          if (typeof genre.count === 'number') {
            label += ' (' + genre.count + ')';
          }
          btn.textContent = label;
          genreList.appendChild(btn);
        }
      } else {
        var noGenres = document.createElement('p');
        noGenres.textContent = 'No genre filters available.';
        genreList.appendChild(noGenres);
      }
      genreSection.appendChild(genreList);
      container.appendChild(genreSection);

      // Date preset
      var dateSection = document.createElement('section');
      dateSection.className = 'filter-group filter-date';
      var dateHeading = document.createElement('h2');
      dateHeading.className = 'filter-heading';
      dateHeading.textContent = 'Date';
      dateSection.appendChild(dateHeading);

      var dateSelect = document.createElement('select');
      dateSelect.className = 'filter-select';
      dateSelect.dataset.action = 'date-preset-filter';

      var optAny = document.createElement('option');
      optAny.value = '';
      optAny.textContent = 'Any time';
      if (!state.datePreset) {
        optAny.selected = true;
      }
      dateSelect.appendChild(optAny);

      if (Array.isArray(filterOptions.datePresets)) {
        for (var d = 0; d < filterOptions.datePresets.length; d++) {
          var preset = filterOptions.datePresets[d];
          var opt = document.createElement('option');
          opt.value = preset.id;
          opt.textContent = preset.label;
          if (state.datePreset && state.datePreset === preset.id) {
            opt.selected = true;
          }
          dateSelect.appendChild(opt);
        }
      }
      dateSection.appendChild(dateSelect);
      container.appendChild(dateSection);

      // Rating
      var ratingSection = document.createElement('section');
      ratingSection.className = 'filter-group filter-rating';
      var ratingHeading = document.createElement('h2');
      ratingHeading.className = 'filter-heading';
      ratingHeading.textContent = 'Rating';
      ratingSection.appendChild(ratingHeading);

      var ratingList = document.createElement('div');
      ratingList.className = 'filter-options';
      if (Array.isArray(filterOptions.ratingBuckets) && filterOptions.ratingBuckets.length) {
        for (var r = 0; r < filterOptions.ratingBuckets.length; r++) {
          var bucket = filterOptions.ratingBuckets[r];
          var rBtn = document.createElement('button');
          rBtn.type = 'button';
          rBtn.className = 'filter-pill';
          rBtn.dataset.action = 'rating-bucket';
          if (bucket.minRating !== undefined && bucket.minRating !== null) {
            rBtn.dataset.minRating = String(bucket.minRating);
          }
          if (bucket.maxRating !== undefined && bucket.maxRating !== null) {
            rBtn.dataset.maxRating = String(bucket.maxRating);
          }
          var rLabel = bucket.label || '';
          if (typeof bucket.count === 'number') {
            rLabel += ' (' + bucket.count + ')';
          }
          rBtn.textContent = rLabel;
          ratingList.appendChild(rBtn);
        }
      }
      ratingSection.appendChild(ratingList);
      container.appendChild(ratingSection);

      // Year
      var yearSection = document.createElement('section');
      yearSection.className = 'filter-group filter-year';
      var yearHeading = document.createElement('h2');
      yearHeading.className = 'filter-heading';
      yearHeading.textContent = state.contentType === 'movies' ? 'Release year' : 'Publication year';
      yearSection.appendChild(yearHeading);

      var yearWrap = document.createElement('div');
      yearWrap.className = 'filter-field-inline';
      var yearLabel = document.createElement('label');
      yearLabel.className = 'filter-label-inline';
      yearLabel.setAttribute('for', 'yearMinInput');
      yearLabel.textContent = 'From';
      var yearInput = document.createElement('input');
      yearInput.id = 'yearMinInput';
      yearInput.type = 'number';
      yearInput.className = 'filter-input-number';
      yearInput.dataset.action = 'year-filter';
      if (state.contentType === 'movies') {
        yearInput.dataset.yearField = 'min_release_year';
        if (filterOptions.releaseYearsRange) {
          if (filterOptions.releaseYearsRange.minYear) yearInput.min = String(filterOptions.releaseYearsRange.minYear);
          if (filterOptions.releaseYearsRange.maxYear) yearInput.max = String(filterOptions.releaseYearsRange.maxYear);
        }
        if (state.minReleaseYear) {
          yearInput.value = String(state.minReleaseYear);
        }
      } else {
        yearInput.dataset.yearField = 'min_publication_year';
        if (filterOptions.publicationYearsRange) {
          if (filterOptions.publicationYearsRange.minYear) yearInput.min = String(filterOptions.publicationYearsRange.minYear);
          if (filterOptions.publicationYearsRange.maxYear) yearInput.max = String(filterOptions.publicationYearsRange.maxYear);
        }
        if (state.minPublicationYear) {
          yearInput.value = String(state.minPublicationYear);
        }
      }
      yearWrap.appendChild(yearLabel);
      yearWrap.appendChild(yearInput);
      yearSection.appendChild(yearWrap);
      container.appendChild(yearSection);

      // Runtime (movies only)
      if (state.contentType === 'movies') {
        var runtimeSection = document.createElement('section');
        runtimeSection.className = 'filter-group filter-runtime';
        var runtimeHeading = document.createElement('h2');
        runtimeHeading.className = 'filter-heading';
        runtimeHeading.textContent = 'Runtime (minutes)';
        runtimeSection.appendChild(runtimeHeading);

        var runtimeMinWrap = document.createElement('div');
        runtimeMinWrap.className = 'filter-field-inline';
        var runtimeMinLabel = document.createElement('label');
        runtimeMinLabel.className = 'filter-label-inline';
        runtimeMinLabel.setAttribute('for', 'runtimeMinInput');
        runtimeMinLabel.textContent = 'From';
        var runtimeMinInput = document.createElement('input');
        runtimeMinInput.id = 'runtimeMinInput';
        runtimeMinInput.type = 'number';
        runtimeMinInput.className = 'filter-input-number';
        runtimeMinInput.dataset.action = 'runtime-filter';
        runtimeMinInput.dataset.runtimeField = 'min_runtime';
        if (filterOptions.runtimeRange) {
          if (filterOptions.runtimeRange.minMinutes) runtimeMinInput.min = String(filterOptions.runtimeRange.minMinutes);
          if (filterOptions.runtimeRange.maxMinutes) runtimeMinInput.max = String(filterOptions.runtimeRange.maxMinutes);
        }
        if (state.minRuntime !== null && state.minRuntime !== undefined) {
          runtimeMinInput.value = String(state.minRuntime);
        }
        runtimeMinWrap.appendChild(runtimeMinLabel);
        runtimeMinWrap.appendChild(runtimeMinInput);
        runtimeSection.appendChild(runtimeMinWrap);

        var runtimeMaxWrap = document.createElement('div');
        runtimeMaxWrap.className = 'filter-field-inline';
        var runtimeMaxLabel = document.createElement('label');
        runtimeMaxLabel.className = 'filter-label-inline';
        runtimeMaxLabel.setAttribute('for', 'runtimeMaxInput');
        runtimeMaxLabel.textContent = 'To';
        var runtimeMaxInput = document.createElement('input');
        runtimeMaxInput.id = 'runtimeMaxInput';
        runtimeMaxInput.type = 'number';
        runtimeMaxInput.className = 'filter-input-number';
        runtimeMaxInput.dataset.action = 'runtime-filter';
        runtimeMaxInput.dataset.runtimeField = 'max_runtime';
        if (filterOptions.runtimeRange) {
          if (filterOptions.runtimeRange.minMinutes) runtimeMaxInput.min = String(filterOptions.runtimeRange.minMinutes);
          if (filterOptions.runtimeRange.maxMinutes) runtimeMaxInput.max = String(filterOptions.runtimeRange.maxMinutes);
        }
        if (state.maxRuntime !== null && state.maxRuntime !== undefined) {
          runtimeMaxInput.value = String(state.maxRuntime);
        }
        runtimeMaxWrap.appendChild(runtimeMaxLabel);
        runtimeMaxWrap.appendChild(runtimeMaxInput);
        runtimeSection.appendChild(runtimeMaxWrap);

        container.appendChild(runtimeSection);
      }
    }

    function renderContentTypeToggle(state) {
      var toggle = document.querySelector('[data-component="content-type-toggle"]');
      if (!toggle) return;
      var pills = toggle.querySelectorAll('.content-type-pill');
      for (var i = 0; i < pills.length; i++) {
        var pill = pills[i];
        var type = pill.dataset.contentType;
        var isActive = type === state.contentType;
        pill.classList.toggle('is-active', isActive);
        pill.setAttribute('aria-selected', isActive ? 'true' : 'false');
      }
    }

    // ----- Fetch data and render -----

    var state = getInitialState();
    var context = state.contentType === 'movies' ? 'movies_listing' : 'books_listing';

    var filterOptions = null;
    try {
      filterOptions = WebsiteSDK.getReviewFilterOptions(context, state.contentType);
    } catch (err) {
      console.error('Error loading filter options', err);
    }

    var filtersForApi = {};
    if (state.genre) filtersForApi.genre = state.genre;
    if (state.datePreset) filtersForApi.dateRangePreset = state.datePreset;
    if (state.minRating !== null) filtersForApi.minRating = state.minRating;
    if (state.maxRating !== null) filtersForApi.maxRating = state.maxRating;
    if (state.minPublicationYear !== null) filtersForApi.minPublicationYear = state.minPublicationYear;
    if (state.minReleaseYear !== null) filtersForApi.minReleaseYear = state.minReleaseYear;
    if (state.minRuntime !== null) filtersForApi.minRuntimeMinutes = state.minRuntime;
    if (state.maxRuntime !== null) filtersForApi.maxRuntimeMinutes = state.maxRuntime;

    var sortByApi = mapSortParamToApi(state.sortByParam, state.contentType);

    var listing = null;
    try {
      listing = WebsiteSDK.getReviewsListing(state.contentType, filtersForApi, sortByApi, state.page, state.pageSize);
    } catch (err2) {
      console.error('Error loading reviews listing', err2);
    }

    var breadcrumbContainer = document.querySelector('[data-populate="breadcrumb"]');
    if (breadcrumbContainer) {
      renderBreadcrumb(breadcrumbContainer, state, listing);
    }

    var appliedFiltersContainer = document.querySelector('[data-populate="applied-filters"]');
    if (appliedFiltersContainer) {
      renderAppliedFilters(appliedFiltersContainer, listing, state, filterOptions || {});
    }

    var resultsSummaryContainer = document.querySelector('[data-populate="results-summary"]');
    if (resultsSummaryContainer) {
      renderResultsSummary(resultsSummaryContainer, listing);
    }

    var sortControlContainer = document.querySelector('[data-populate="sort-control"]');
    if (sortControlContainer) {
      renderSortControl(sortControlContainer, state, listing);
    }

    var reviewsListContainer = document.querySelector('[data-populate="reviews-list"]');
    if (reviewsListContainer) {
      renderReviewsList(reviewsListContainer, listing, state);
    }

    var paginationContainer = document.querySelector('[data-populate="pagination-controls"]');
    if (paginationContainer) {
      renderPagination(paginationContainer, listing);
    }

    var filtersSidebarContainer = document.querySelector('[data-populate="filters-sidebar"]');
    if (filtersSidebarContainer) {
      renderFiltersSidebar(filtersSidebarContainer, filterOptions, state);
    }

    renderContentTypeToggle(state);

    // ----- Global event handlers (delegated) -----

    document.body.addEventListener('click', function(event) {
      var target = event.target.closest('[data-action]');
      if (!target) return;
      var action = target.dataset.action;

      if (action === 'change-content-type') {
        event.preventDefault();
        var newType = target.dataset.contentType === 'movies' ? 'movies' : 'books';
        navigateWithParams({ content_type: newType, page: 1 }, { clearFilters: true });
      }

      if (action === 'genre-filter') {
        event.preventDefault();
        var genreName = target.dataset.genreName || '';
        var updates = { genre: genreName, page: 1 };
        navigateWithParams(updates, {});
      }

      if (action === 'rating-bucket') {
        event.preventDefault();
        var minR = target.dataset.minRating || '';
        var maxR = target.dataset.maxRating || '';
        var updatesRb = { page: 1 };
        if (minR) updatesRb.min_rating = minR; else updatesRb.min_rating = null;
        if (maxR) updatesRb.max_rating = maxR; else updatesRb.max_rating = null;
        navigateWithParams(updatesRb, {});
      }

      if (action === 'clear-all-filters') {
        event.preventDefault();
        navigateWithParams({ page: 1 }, { clearFilters: true });
      }

      if (action === 'remove-filter') {
        event.preventDefault();
        var key = target.dataset.filterKey;
        if (!key) return;
        var updatesRm = { page: 1 };
        updatesRm[key] = null;
        navigateWithParams(updatesRm, {});
      }

      if (action === 'page-change') {
        event.preventDefault();
        var pageStr = target.dataset.page;
        var pageNum = parseInt(pageStr, 10);
        if (!pageNum || pageNum < 1) return;
        navigateWithParams({ page: pageNum }, {});
      }

      if (action === 'open-review') {
        event.preventDefault();
        var reviewId = target.dataset.reviewId;
        if (!reviewId) return;
        var currentUrl = window.location.pathname + window.location.search;
        var detailUrl = 'review_detail.html?id=' + encodeURIComponent(reviewId) + '&from=listing&returnUrl=' + encodeURIComponent(currentUrl);
        window.location.href = detailUrl;
      }

      if (action === 'breadcrumb-content-type') {
        event.preventDefault();
        var ct = target.dataset.contentType === 'movies' ? 'movies' : 'books';
        navigateWithParams({ content_type: ct, page: 1, genre: null }, { clearFilters: true });
      }
    });

    document.body.addEventListener('change', function(event) {
      var target = event.target.closest('[data-action]');
      if (!target) return;
      var action = target.dataset.action;

      if (action === 'date-preset-filter') {
        var val = target.value || '';
        var updates = { page: 1 };
        if (val) updates.date_preset = val; else updates.date_preset = null;
        navigateWithParams(updates, {});
      }

      if (action === 'year-filter') {
        var yearField = target.dataset.yearField;
        if (!yearField) return;
        var raw = target.value;
        var updatesY = { page: 1 };
        updatesY[yearField] = raw ? raw : null;
        navigateWithParams(updatesY, {});
      }

      if (action === 'runtime-filter') {
        var runtimeField = target.dataset.runtimeField;
        if (!runtimeField) return;
        var rawRt = target.value;
        var updatesRt = { page: 1 };
        updatesRt[runtimeField] = rawRt ? rawRt : null;
        navigateWithParams(updatesRt, {});
      }

      if (action === 'sort-change') {
        var sortVal = target.value || 'newest_first';
        navigateWithParams({ sortBy: sortVal, page: 1 }, {});
      }

      if (action === 'page-size-change') {
        var sizeVal = parseInt(target.value, 10);
        if (!sizeVal || sizeVal <= 0) return;
        navigateWithParams({ pageSize: sizeVal, page: 1 }, {});
      }
    });

    document.body.addEventListener('submit', function(event) {
      var form = event.target;
      if (!form.dataset || form.dataset.action !== 'global-search') return;
      event.preventDefault();
      var input = form.querySelector('input[name="query"]');
      var q = input ? input.value.trim() : '';
      if (!q) return;
      window.location.href = 'search.html?query=' + encodeURIComponent(q);
    });
  });
  </script>
</body>
</html>
