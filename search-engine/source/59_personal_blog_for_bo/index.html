  <script src="business_logic.js"></script>
  <script>
    (function() {
      'use strict';

      // --- Utility helpers ---

      function getHomeUrlState() {
        var url = new URL(window.location.href);
        var params = url.searchParams;

        var sortBy = params.get('sortBy') || 'newest_first';

        var pageRaw = params.get('page');
        var page = parseInt(pageRaw, 10);
        if (isNaN(page) || page < 1) {
          page = 1;
        }

        var pageSizeRaw = params.get('pageSize');
        var pageSize = parseInt(pageSizeRaw, 10);
        if (isNaN(pageSize) || pageSize <= 0) {
          pageSize = 10;
        }

        return {
          sortBy: sortBy,
          page: page,
          pageSize: pageSize
        };
      }

      function ensureHomeUrlDefaults() {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        var changed = false;

        if (!params.get('sortBy')) {
          params.set('sortBy', 'newest_first');
          changed = true;
        }

        if (!params.get('page')) {
          params.set('page', '1');
          changed = true;
        }

        if (!params.get('pageSize')) {
          params.set('pageSize', '10');
          changed = true;
        }

        if (changed) {
          window.history.replaceState({}, '', url.toString());
        }
      }

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value).replace(/[&<>\"']/g, function(ch) {
          switch (ch) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            case '\'': return '&#39;';
            default: return ch;
          }
        });
      }

      function buildPagination(totalCount, page, pageSize) {
        var totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
        if (totalPages <= 1) {
          return '';
        }

        var html = '';
        html += '<nav class="pagination" data-component="home-pagination-control" aria-label="Feed pagination">';
        html += '<div class="pagination-inner">';

        // Previous
        if (page > 1) {
          html += '<button type="button" class="pagination-link pagination-prev" data-action="go-prev-page" data-page="' + String(page - 1) + '">Previous</button>';
        } else {
          html += '<span class="pagination-link pagination-prev pagination-disabled" aria-disabled="true">Previous</span>';
        }

        var start = Math.max(1, page - 2);
        var end = Math.min(totalPages, page + 2);

        for (var p = start; p <= end; p++) {
          if (p === page) {
            html += '<span class="pagination-link pagination-current" aria-current="page">' + String(p) + '</span>';
          } else {
            html += '<button type="button" class="pagination-link" data-action="go-page" data-page="' + String(p) + '">' + String(p) + '</button>';
          }
        }

        // Next
        if (page < totalPages) {
          html += '<button type="button" class="pagination-link pagination-next" data-action="go-next-page" data-page="' + String(page + 1) + '">Next</button>';
        } else {
          html += '<span class="pagination-link pagination-next pagination-disabled" aria-disabled="true">Next</span>';
        }

        html += '</div>';
        html += '</nav>';
        return html;
      }

      function buildReviewCard(item) {
        var reviewId = escapeHtml(item.reviewId);
        var title = escapeHtml(item.title);
        var excerpt = escapeHtml(item.excerpt || '');
        var contentType = item.contentType === 'movies' ? 'movies' : 'books';
        var typeLabel = contentType === 'books' ? 'Book' : 'Movie';
        var genre = item.genre ? escapeHtml(item.genre) : '';
        var rating = typeof item.rating === 'number' ? item.rating.toFixed(1) : '';
        var ratingLabel = rating ? rating + ' / 5' : '';
        var publishedAt = item.publishedAt ? new Date(item.publishedAt) : null;
        var publishedLabel = publishedAt && !isNaN(publishedAt.getTime()) ? publishedAt.toLocaleDateString() : '';
        var authorName = item.authorName ? escapeHtml(item.authorName) : '';
        var likeCount = typeof item.likeCount === 'number' ? String(item.likeCount) : '0';
        var commentCount = typeof item.commentCount === 'number' ? String(item.commentCount) : '0';
        var publicationYear = item.publicationYear ? String(item.publicationYear) : '';
        var releaseYear = item.releaseYear ? String(item.releaseYear) : '';
        var runtimeMinutes = item.runtimeMinutes ? String(item.runtimeMinutes) : '';
        var thumbnailUrl = item.thumbnailUrl ? escapeHtml(item.thumbnailUrl) : '';

        var isRead = !!item.isRead;
        var isSavedForLater = !!item.isSavedForLater;

        var metaDetail = '';
        if (contentType === 'books' && publicationYear) {
          metaDetail = publicationYear + ' ␀b7 ' + typeLabel;
        } else if (contentType === 'movies') {
          if (releaseYear && runtimeMinutes) {
            metaDetail = releaseYear + ' ␀b7 ' + runtimeMinutes + ' min';
          } else if (releaseYear) {
            metaDetail = releaseYear + ' ␀b7 ' + typeLabel;
          } else if (runtimeMinutes) {
            metaDetail = runtimeMinutes + ' min ␀b7 ' + typeLabel;
          } else {
            metaDetail = typeLabel;
          }
        } else {
          metaDetail = typeLabel;
        }

        var readLabel = isRead ? 'Read' : 'Mark as read';
        var readDisabledAttr = isRead ? ' disabled' : '';
        var readStateClass = isRead ? ' review-card-read' : '';

        var saveLabel = isSavedForLater ? 'Saved' : 'Save for later';
        var saveDisabledAttr = isSavedForLater ? ' disabled' : '';

        var html = '';
        html += '<article class="review-card' + readStateClass + '" data-component="review-card-item" data-review-id="' + reviewId + '" data-content-type="' + contentType + '">';
        html += '<header class="review-card-header">';
        html += '<h2 class="review-card-title">';
        html += '<button type="button" class="review-card-title-link" data-action="open-review" data-review-id="' + reviewId + '">' + title + '</button>';
        html += '</h2>';
        html += '<div class="review-card-meta-row">';
        html += '<div class="review-card-meta-left">';
        if (genre) {
          html += '<span class="review-card-meta-genre">' + genre + '</span>';
          html += '<span class="review-card-meta-divider">&middot;</span>';
        }
        if (ratingLabel) {
          html += '<span class="review-card-meta-rating">' + ratingLabel + '</span>';
          html += '<span class="review-card-meta-divider">&middot;</span>';
        }
        if (publishedLabel) {
          html += '<span class="review-card-meta-date">' + publishedLabel + '</span>';
          html += '<span class="review-card-meta-divider">&middot;</span>';
        }
        html += '<span class="review-card-meta-type">' + metaDetail + '</span>';
        if (authorName) {
          html += '<span class="review-card-meta-divider">&middot;</span>';
          html += '<span class="review-card-meta-author">' + authorName + '</span>';
        }
        html += '</div>';
        html += '<div class="review-card-meta-actions">';
        html += '<button type="button" class="review-quick-action review-quick-action-read" data-action="mark-as-read" data-review-id="' + reviewId + '"' + readDisabledAttr + '>' + readLabel + '</button>';
        html += '<button type="button" class="review-quick-action review-quick-action-save" data-action="save-for-later" data-review-id="' + reviewId + '"' + saveDisabledAttr + '>' + saveLabel + '</button>';
        html += '</div>';
        html += '</div>';
        html += '</header>';

        html += '<div class="review-card-body">';
        if (thumbnailUrl) {
          html += '<div class="review-card-thumbnail">';
          html += '<button type="button" class="review-card-thumbnail-button" data-action="open-review" data-review-id="' + reviewId + '">';
          html += '<img src="' + thumbnailUrl + '" alt="Cover art for ' + title + '" loading="lazy" class="review-card-thumbnail-image">';
          html += '</button>';
          html += '</div>';
        }
        html += '<div class="review-card-excerpt">';
        if (excerpt) {
          html += '<p class="review-card-excerpt-text">' + excerpt + '</p>';
        }
        html += '<div class="review-card-footer-row">';
        html += '<button type="button" class="review-card-read-more" data-action="open-review" data-review-id="' + reviewId + '">View full review</button>';
        html += '<div class="review-card-social-meta">';
        html += '<span class="review-card-social-item">' + likeCount + ' likes</span>';
        html += '<span class="review-card-social-divider">&middot;</span>';
        html += '<span class="review-card-social-item">' + commentCount + ' comments</span>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
        html += '</div>';

        html += '</article>';
        return html;
      }

      function renderHomeFeed(container, feed) {
        var items = feed && feed.items ? feed.items : [];
        var sortBy = feed && feed.sortBy ? feed.sortBy : getHomeUrlState().sortBy;
        var page = feed && typeof feed.page === 'number' ? feed.page : getHomeUrlState().page;
        var pageSize = feed && typeof feed.pageSize === 'number' ? feed.pageSize : getHomeUrlState().pageSize;
        var totalCount = feed && typeof feed.totalCount === 'number' ? feed.totalCount : 0;

        var hasItems = items && items.length > 0;

        var html = '';
        html += '<div class="home-feed-inner">';

        // Sort control
        html += '<div class="home-sort-bar" data-component="home-sort-control">';
        html += '<div class="home-sort-bar-inner">';
        html += '<label class="home-sort-label" for="home-sort-select">Sort by</label>';
        html += '<select id="home-sort-select" class="home-sort-select" data-action="change-sort">';
        html += '<option value="newest_first"' + (sortBy === 'newest_first' ? ' selected' : '') + '>Newest first</option>';
        html += '<option value="most_popular"' + (sortBy === 'most_popular' ? ' selected' : '') + '>Most popular</option>';
        html += '</select>';
        html += '</div>';
        html += '</div>';

        if (!hasItems && totalCount === 0) {
          // Empty state
          html += '<section class="home-feed-empty" data-component="home-feed-empty-state">';
          html += '<div class="home-feed-empty-inner">';
          html += '<h2 class="home-feed-empty-title">No reviews to show</h2>';
          html += '<p class="home-feed-empty-text">There are no book or movie reviews for the current feed settings.</p>';
          html += '<div class="home-feed-empty-actions">';
          html += '<button type="button" class="primary-button" data-action="reset-filters">Reset to defaults</button>';
          html += '<button type="button" class="secondary-button" data-action="retry-load">Retry</button>';
          html += '</div>';
          html += '</div>';
          html += '</section>';
        } else if (hasItems) {
          // List
          html += '<div class="review-card-list" data-component="review-card-list">';
          for (var i = 0; i < items.length; i++) {
            html += buildReviewCard(items[i]);
          }
          html += '</div>';

          // Pagination
          html += buildPagination(totalCount, page, pageSize);
        }

        html += '</div>';

        container.innerHTML = html;
      }

      function renderHomeFeedError(container, message) {
        var safeMessage = escapeHtml(message || 'Something went wrong while loading the home feed.');
        var html = '';
        html += '<div class="home-feed-inner">';
        html += '<section class="home-feed-error" data-component="home-feed-error-state">';
        html += '<div class="home-feed-error-inner">';
        html += '<h2 class="home-feed-error-title">Unable to load reviews</h2>';
        html += '<p class="home-feed-error-text">' + safeMessage + '</p>';
        html += '<button type="button" class="primary-button" data-action="retry-load">Retry</button>';
        html += '</div>';
        html += '</section>';
        html += '</div>';
        container.innerHTML = html;
      }

      var currentHomeFeedResponse = null;

      function loadAndRenderHomeFeed(container) {
        var state = getHomeUrlState();
        try {
          var response = WebsiteSDK.getHomeFeed(state.sortBy, state.page, state.pageSize);
          currentHomeFeedResponse = response;
          renderHomeFeed(container, response);
          attachHomeFeedEvents(container);
        } catch (e) {
          currentHomeFeedResponse = null;
          renderHomeFeedError(container, 'Please try again in a moment.');
          attachHomeFeedEvents(container);
        }
      }

      // --- Event wiring ---

      function updateUrlAndReload(newParams) {
        var url = new URL(window.location.href);
        var params = url.searchParams;
        if (newParams.sortBy) {
          params.set('sortBy', newParams.sortBy);
        }
        if (typeof newParams.page !== 'undefined') {
          params.set('page', String(newParams.page));
        }
        if (typeof newParams.pageSize !== 'undefined') {
          params.set('pageSize', String(newParams.pageSize));
        }
        window.history.pushState({}, '', url.toString());
        var container = document.querySelector('[data-populate="home-feed"]');
        if (container) {
          loadAndRenderHomeFeed(container);
        }
      }

      function attachHomeFeedEvents(container) {
        // Sort control
        var sortSelect = container.querySelector('[data-action="change-sort"]');
        if (sortSelect) {
          sortSelect.addEventListener('change', function(event) {
            var newSort = event.target.value || 'newest_first';
            updateUrlAndReload({ sortBy: newSort, page: 1 });
          });
        }

        // Retry load (error or empty state)
        var retryButtons = container.querySelectorAll('[data-action="retry-load"]');
        retryButtons.forEach(function(btn) {
          btn.addEventListener('click', function() {
            var state = getHomeUrlState();
            var url = new URL(window.location.href);
            url.searchParams.set('sortBy', state.sortBy);
            url.searchParams.set('page', String(state.page));
            url.searchParams.set('pageSize', String(state.pageSize));
            window.history.replaceState({}, '', url.toString());
            loadAndRenderHomeFeed(container);
          });
        });

        // Reset filters (empty state)
        var resetButtons = container.querySelectorAll('[data-action="reset-filters"]');
        resetButtons.forEach(function(btn) {
          btn.addEventListener('click', function() {
            updateUrlAndReload({ sortBy: 'newest_first', page: 1, pageSize: 10 });
          });
        });

        // Pagination
        var pageButtons = container.querySelectorAll('[data-action="go-page"]');
        pageButtons.forEach(function(btn) {
          btn.addEventListener('click', function(event) {
            var targetPage = parseInt(event.currentTarget.getAttribute('data-page'), 10);
            if (!isNaN(targetPage) && targetPage > 0) {
              updateUrlAndReload({ page: targetPage });
            }
          });
        });

        var prevButtons = container.querySelectorAll('[data-action="go-prev-page"]');
        prevButtons.forEach(function(btn) {
          btn.addEventListener('click', function(event) {
            var targetPage = parseInt(event.currentTarget.getAttribute('data-page'), 10);
            if (!isNaN(targetPage) && targetPage > 0) {
              updateUrlAndReload({ page: targetPage });
            }
          });
        });

        var nextButtons = container.querySelectorAll('[data-action="go-next-page"]');
        nextButtons.forEach(function(btn) {
          btn.addEventListener('click', function(event) {
            var targetPage = parseInt(event.currentTarget.getAttribute('data-page'), 10);
            if (!isNaN(targetPage) && targetPage > 0) {
              updateUrlAndReload({ page: targetPage });
            }
          });
        });

        // Open review detail
        var openReviewButtons = container.querySelectorAll('[data-action="open-review"]');
        openReviewButtons.forEach(function(btn) {
          btn.addEventListener('click', function(event) {
            var reviewId = event.currentTarget.getAttribute('data-review-id');
            if (!reviewId) return;
            var currentUrl = window.location.href;
            var target = 'review_detail.html?id=' + encodeURIComponent(reviewId) + '&from=home&returnUrl=' + encodeURIComponent(currentUrl);
            window.location.href = target;
          });
        });

        // Mark as read
        var markReadButtons = container.querySelectorAll('[data-action="mark-as-read"]');
        markReadButtons.forEach(function(btn) {
          btn.addEventListener('click', function(event) {
            var button = event.currentTarget;
            var reviewId = button.getAttribute('data-review-id');
            if (!reviewId) return;
            if (button.disabled) return;
            button.disabled = true;
            try {
              var response = WebsiteSDK.markReviewAsRead(reviewId);
              if (response && response.success && response.isRead) {
                button.textContent = 'Read';
                var card = button.closest('.review-card');
                if (card) {
                  card.classList.add('review-card-read');
                }
                // update local state if available
                if (currentHomeFeedResponse && currentHomeFeedResponse.items) {
                  currentHomeFeedResponse.items.forEach(function(item) {
                    if (item.reviewId === reviewId) {
                      item.isRead = true;
                    }
                  });
                }
              } else {
                var message = response && response.message ? response.message : 'Unable to mark this review as read.';
                window.alert(message);
                button.disabled = false;
              }
            } catch (e) {
              window.alert('Unable to mark this review as read. Please try again.');
              button.disabled = false;
            }
          });
        });

        // Save for later
        var saveButtons = container.querySelectorAll('[data-action="save-for-later"]');
        saveButtons.forEach(function(btn) {
          btn.addEventListener('click', function(event) {
            var button = event.currentTarget;
            var reviewId = button.getAttribute('data-review-id');
            if (!reviewId) return;
            if (button.disabled) return;
            try {
              var response = WebsiteSDK.addReviewToDefaultList('save_for_later', reviewId);
              if (response && response.success) {
                button.textContent = 'Saved';
                button.disabled = true;
                if (response.alreadyInList) {
                  if (response.message) {
                    window.alert(response.message);
                  }
                }
                if (currentHomeFeedResponse && currentHomeFeedResponse.items) {
                  currentHomeFeedResponse.items.forEach(function(item) {
                    if (item.reviewId === reviewId) {
                      item.isSavedForLater = true;
                    }
                  });
                }
              } else {
                var message2 = response && response.message ? response.message : 'Unable to save this review for later.';
                window.alert(message2);
              }
            } catch (e) {
              window.alert('Unable to save this review for later. Please try again.');
            }
          });
        });
      }

      function initGlobalSearch() {
        var form = document.getElementById('global-search-form');
        if (!form) return;
        form.addEventListener('submit', function(event) {
          event.preventDefault();
          var input = document.getElementById('global-search-input');
          if (!input) return;
          var query = input.value ? input.value.trim() : '';
          if (!query) return;
          var target = 'search.html?query=' + encodeURIComponent(query);
          window.location.href = target;
        });
      }

      document.addEventListener('DOMContentLoaded', function() {
        ensureHomeUrlDefaults();

        initGlobalSearch();

        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          var dataType = element.getAttribute('data-populate');
          if (dataType === 'home-feed') {
            loadAndRenderHomeFeed(element);
          }
        });

        window.addEventListener('popstate', function() {
          var container = document.querySelector('[data-populate="home-feed"]');
          if (container) {
            loadAndRenderHomeFeed(container);
          }
        });
      });
    })();
  </script>
</body>
</html>
