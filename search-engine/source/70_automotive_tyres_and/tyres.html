<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Tyres UAE - Automotive Tyres & Services</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet'>

  <!-- Global styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific styles -->
  <link rel='stylesheet' href='tyres.css'>
</head>
<body>
  <div class='site'>
    <!-- Header / Top Navigation -->
    <header class='site-header'>
      <div class='header-inner'>
        <a href='index.html' class='logo' aria-label='Tyres UAE home'>
          <span class='logo-mark'>Tyres</span><span class='logo-accent'>UAE</span>
        </a>

        <nav class='main-nav' aria-label='Primary'>
          <ul class='nav-list'>
            <li class='nav-item'>
              <a href='index.html' class='nav-link nav-link--active'>Home</a>
            </li>
            <li class='nav-item'>
              <a href='tyres.html' class='nav-link'>Tyres</a>
            </li>
            <li class='nav-item'>
              <a href='services.html' class='nav-link'>Services</a>
            </li>
            <li class='nav-item'>
              <a href='services.html?categoryId=service_packages' class='nav-link'>Service Packages</a>
            </li>
            <li class='nav-item nav-item--cart'>
              <a href='cart.html' class='nav-link nav-link--cart'>Cart</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Main content wrapper for all pages -->
    <main id='content' class='site-content' role='main'>
      <div class='tyres-page' data-component='page-initializer'>
        <!-- Hero / Tyre size selector -->
        <section class='tyre-hero' data-component='tyre-size-selector' data-populate='tyre-size-selector' aria-label='Search tyres by size'>
          <!-- Populated by JavaScript -->
        </section>

        <!-- Controls row: results summary, filter toggle, sort control -->
        <section class='tyre-controls' aria-label='Tyre results summary and sorting'>
          <div class='tyre-controls-inner'>
            <div class='tyre-results-summary' data-component='tyre-results-summary' data-populate='tyre-results-summary'>
              <!-- Populated by JavaScript -->
            </div>
            <div class='tyre-controls-actions'>
              <button type='button' class='btn-pill btn-filters-toggle' data-action='toggle-filters' aria-expanded='false' aria-controls='tyre-filter-panel'>
                Filters
              </button>
              <div class='tyre-sort-control' data-component='tyre-sort-control' data-populate='tyre-sort-control'>
                <!-- Populated by JavaScript -->
              </div>
            </div>
          </div>
        </section>

        <!-- Slide-in filter panel -->
        <aside id='tyre-filter-panel' class='tyre-filter-panel' data-component='tyre-filter-panel' data-populate='tyre-filter-panel' aria-label='Filter tyres' hidden>
          <!-- Populated by JavaScript -->
        </aside>

        <!-- Product listing & pagination -->
        <section class='tyre-listing' aria-label='Tyre search results'>
          <div class='tyre-product-grid' data-component='tyre-product-grid' data-populate='tyre-product-grid'>
            <!-- Populated by JavaScript -->
          </div>
          <div class='tyre-pagination' data-component='pagination-control' data-populate='tyre-pagination'>
            <!-- Populated by JavaScript -->
          </div>
        </section>

        <!-- Floating comparison bar -->
        <section class='comparison-bar' data-component='comparison-bar' data-populate='comparison-bar' aria-label='Selected tyres for comparison' hidden>
          <!-- Populated by JavaScript -->
        </section>
      </div>
    </main>

    <!-- Footer -->
    <footer class='site-footer'>
      <div class='footer-inner'>
        <div class='footer-brand'>
          <a href='index.html' class='footer-logo'>
            <span class='logo-mark'>Tyres</span><span class='logo-accent'>UAE</span>
          </a>
          <p class='footer-tagline'>Premium tyres and complete car care under one roof.</p>
        </div>

        <div class='footer-links'>
          <h2 class='footer-heading'>Navigation</h2>
          <ul class='footer-nav'>
            <li class='footer-nav-item'>
              <a href='tyres.html' class='footer-link'>Tyres</a>
            </li>
            <li class='footer-nav-item'>
              <a href='services.html' class='footer-link'>Services</a>
            </li>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-link'>About Us</a>
            </li>
            <li class='footer-nav-item'>
              <a href='contact.html' class='footer-link'>Contact Us</a>
            </li>
            <li class='footer-nav-item'>
              <a href='faq.html' class='footer-link'>FAQs</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-link'>Terms &amp; Conditions</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-link'>Privacy Policy</a>
            </li>
          </ul>
        </div>
      </div>

      <div class='footer-bottom'>
        <p class='footer-copy'>&copy; 2026 Tyres UAE. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <!-- SDK script -->
  <script src='business_logic.js'></script>

  <!-- Page UI logic -->
  <script>
    (function() {
      'use strict';

      const PAGE_SIZE = 12;
      let pageState = null;
      let filterOptions = null;
      let searchResult = null;
      let selectedTyreIds = [];

      function parseUrlState() {
        const params = new URLSearchParams(window.location.search);
        const getNumber = function(key) {
          const v = params.get(key);
          if (v === null || v === '') return null;
          const n = Number(v);
          return Number.isNaN(n) ? null : n;
        };

        const width = getNumber('width');
        const profile = getNumber('profile');
        const rim = getNumber('rim');
        const season = params.get('season') || null;
        const performanceCategory = params.get('performance') || null;
        const brandTier = params.get('brand_tier') || null;
        const hasFreeFittingParam = params.get('has_free_fitting');
        let hasFreeFitting = null;
        if (hasFreeFittingParam === '1') hasFreeFitting = true;
        else if (hasFreeFittingParam === '0') hasFreeFitting = false;
        const minRating = getNumber('min_rating');
        const maxPrice = getNumber('max_price');
        const sort = params.get('sort') || null;
        let page = getNumber('page');
        if (!page || page < 1) page = 1;

        return {
          width: width,
          profile: profile,
          rim_diameter: rim,
          season: season,
          performance_category: performanceCategory,
          brand_tier: brandTier,
          has_free_fitting: hasFreeFitting,
          min_customer_rating: minRating,
          max_price: maxPrice,
          sort: sort,
          page: page
        };
      }

      function buildFiltersFromState(state) {
        const filters = {};
        filters.only_available = true;
        if (state.season) filters.season = state.season;
        if (state.performance_category) filters.performance_category = state.performance_category;
        if (state.brand_tier) filters.brand_tier = state.brand_tier;
        if (state.has_free_fitting !== null) filters.has_free_fitting = state.has_free_fitting;
        if (typeof state.max_price === 'number') filters.max_price = state.max_price;
        if (typeof state.min_customer_rating === 'number') filters.min_customer_rating = state.min_customer_rating;
        return filters;
      }

      function hasCompleteSize(state) {
        return !!(state.width && state.profile && state.rim_diameter);
      }

      function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function buildUrlWithState(update) {
        const params = new URLSearchParams(window.location.search);

        const setOrDelete = function(param, value) {
          if (value === null || value === undefined || value === '') {
            params.delete(param);
          } else {
            params.set(param, String(value));
          }
        };

        if (Object.prototype.hasOwnProperty.call(update, 'width')) setOrDelete('width', update.width);
        if (Object.prototype.hasOwnProperty.call(update, 'profile')) setOrDelete('profile', update.profile);
        if (Object.prototype.hasOwnProperty.call(update, 'rim_diameter')) setOrDelete('rim', update.rim_diameter);

        if (Object.prototype.hasOwnProperty.call(update, 'season')) setOrDelete('season', update.season);
        if (Object.prototype.hasOwnProperty.call(update, 'performance_category')) setOrDelete('performance', update.performance_category);
        if (Object.prototype.hasOwnProperty.call(update, 'brand_tier')) setOrDelete('brand_tier', update.brand_tier);
        if (Object.prototype.hasOwnProperty.call(update, 'has_free_fitting')) {
          if (update.has_free_fitting === null) {
            params.delete('has_free_fitting');
          } else {
            setOrDelete('has_free_fitting', update.has_free_fitting ? '1' : '0');
          }
        }
        if (Object.prototype.hasOwnProperty.call(update, 'min_customer_rating')) setOrDelete('min_rating', update.min_customer_rating);
        if (Object.prototype.hasOwnProperty.call(update, 'max_price')) setOrDelete('max_price', update.max_price);
        if (Object.prototype.hasOwnProperty.call(update, 'sort')) setOrDelete('sort', update.sort);
        if (Object.prototype.hasOwnProperty.call(update, 'page')) setOrDelete('page', update.page);

        const qs = params.toString();
        return 'tyres.html' + (qs ? '?' + qs : '');
      }

      function navigateWithState(update) {
        const url = buildUrlWithState(update);
        window.location.href = url;
      }

      function renderSizeSelector(container, sizeOptions, state) {
        if (!container) return;
        const widthOptions = (sizeOptions && sizeOptions.widths ? sizeOptions.widths : []).map(function(w) {
          const selected = state.width === w ? ' selected' : '';
          return '<option value=' + escapeHtml(w) + selected + '>' + escapeHtml(w) + '</option>';
        }).join('');

        const profileOptions = (sizeOptions && sizeOptions.profiles ? sizeOptions.profiles : []).map(function(p) {
          const selected = state.profile === p ? ' selected' : '';
          return '<option value=' + escapeHtml(p) + selected + '>' + escapeHtml(p) + '</option>';
        }).join('');

        const rimOptions = (sizeOptions && sizeOptions.rim_diameters ? sizeOptions.rim_diameters : []).map(function(r) {
          const selected = state.rim_diameter === r ? ' selected' : '';
          return '<option value=' + escapeHtml(r) + selected + '>' + escapeHtml(r) + '</option>';
        }).join('');

        const sizeLabel = hasCompleteSize(state)
          ? escapeHtml(state.width + '/' + state.profile + ' R' + state.rim_diameter)
          : 'Choose your tyre size';

        container.innerHTML = (
          '<div class=\'tyre-hero-inner\'>' +
            '<div class=\'tyre-hero-main\'>' +
              '<div class=\'tyre-hero-copy\'>' +
                '<h1 class=\'tyre-hero-title\'>Tyre listing &amp; search</h1>' +
                '<p class=\'tyre-hero-subtitle\'>Select your tyre size to see available options.</p>' +
              '</div>' +
              '<form class=\'tyre-size-form\' data-action=\'submit-size-selection\'>' +
                '<div class=\'tyre-size-form-row\'>' +
                  '<div class=\'field-group\'>' +
                    '<label for=\'tyre-width-input\'>Width</label>' +
                    '<select id=\'tyre-width-input\' name=\'width\' required>' +
                      '<option value=\'' + (state.width ? '' : '') + '\'>Select</option>' +
                      widthOptions +
                    '</select>' +
                  '</div>' +
                  '<div class=\'field-group\'>' +
                    '<label for=\'tyre-profile-input\'>Profile</label>' +
                    '<select id=\'tyre-profile-input\' name=\'profile\' required>' +
                      '<option value=\'' + (state.profile ? '' : '') + '\'>Select</option>' +
                      profileOptions +
                    '</select>' +
                  '</div>' +
                  '<div class=\'field-group\'>' +
                    '<label for=\'tyre-rim-input\'>Rim</label>' +
                    '<select id=\'tyre-rim-input\' name=\'rim_diameter\' required>' +
                      '<option value=\'' + (state.rim_diameter ? '' : '') + '\'>Select</option>' +
                      rimOptions +
                    '</select>' +
                  '</div>' +
                '</div>' +
                '<div class=\'tyre-size-form-actions\'>' +
                  '<button type=\'submit\' class=\'btn btn-primary-pill\'>Search tyres</button>' +
                  '<div class=\'tyre-size-selected-label\'>' + sizeLabel + '</div>' +
                '</div>' +
              '</form>' +
            '</div>' +
            '<div class=\'tyre-hero-media\' aria-hidden=\'true\'>' +
              '<div class=\'tyre-hero-car-graphic\'></div>' +
              '<div class=\'tyre-hero-badges\'>' +
                '<div class=\'hero-badge hero-badge--primary\'>Top brands</div>' +
                '<div class=\'hero-badge hero-badge--accent\'>Free fitting deals</div>' +
              '</div>' +
            '</div>' +
            '<div class=\'tyre-hero-footer\'>' +
              '<ul class=\'hero-benefits\'>' +
                '<li>Fitting included at selected centres</li>' +
                '<li>Fast delivery across UAE</li>' +
                '<li>Expert installation &amp; support</li>' +
              '</ul>' +
            '</div>' +
          '</div>'
        );
      }

      function renderSortControl(container, options, state, appliedSort) {
        if (!container) return;
        const sortOptions = options || [];
        const currentSort = appliedSort || state.sort || '';
        if (!sortOptions.length) {
          container.innerHTML = (
            '<div class=\'sort-control sort-control--disabled\'>' +
              '<label class=\'sort-label\'>Sort by</label>' +
              '<select disabled>' +
                '<option>No sorting available</option>' +
              '</select>' +
            '</div>'
          );
          return;
        }
        const optsHtml = ['<option value=\'\'>Recommended</option>'].concat(sortOptions.map(function(opt) {
          const selected = opt.code === currentSort ? ' selected' : '';
          return '<option value=\'' + escapeHtml(opt.code) + '\'' + selected + '>' + escapeHtml(opt.label) + '</option>';
        })).join('');
        container.innerHTML = (
          '<div class=\'sort-control\'>' +
            '<label class=\'sort-label\' for=\'sort-select\'>Sort by</label>' +
            '<select id=\'sort-select\' data-action=\'change-sort\'>' +
              optsHtml +
            '</select>' +
          '</div>'
        );
      }

      function renderResultsSummary(container, state, result) {
        if (!container) return;
        const sizeComplete = hasCompleteSize(state);
        if (!sizeComplete) {
          container.innerHTML = (
            '<div class=\'results-summary results-summary--inactive\'>' +
              '<span class=\'results-summary-label\'>Select your tyre size to view matching tyres.</span>' +
            '</div>'
          );
          return;
        }

        const total = result ? result.total_results || 0 : 0;
        const sizeLabel = escapeHtml(state.width + '/' + state.profile + ' R' + state.rim_diameter);
        const applied = result && result.applied_filters ? result.applied_filters : {};
        const tags = [];
        if (applied.season) tags.push(escapeHtml(applied.season.replace(/_/g, ' ')) + ' tyres');
        if (applied.performance_category) tags.push(escapeHtml(applied.performance_category.replace(/_/g, ' ')));
        if (applied.brand_tier) tags.push(escapeHtml(applied.brand_tier.replace(/_/g, ' ')) + ' brands');
        if (applied.has_free_fitting) tags.push('Free fitting');
        if (typeof applied.min_customer_rating === 'number') tags.push('Rating ' + escapeHtml(applied.min_customer_rating) + '+');
        if (typeof applied.max_price === 'number') tags.push('Up to $' + escapeHtml(applied.max_price));
        const hasFilterTags = tags.length > 0;

        const tagsHtml = hasFilterTags
          ? ('<ul class=\'results-tags\'>' + tags.map(function(t) {
              return '<li class=\'results-tag\'>' + t + '</li>';
            }).join('') + '</ul>')
          : '';

        const clearHtml = hasFilterTags
          ? '<button type=\'button\' class=\'link-button clear-filters-link\' data-action=\'clear-all-filters\'>Clear filters</button>'
          : '';

        container.innerHTML = (
          '<div class=\'results-summary\'>' +
            '<div class=\'results-summary-main\'>' +
              '<span class=\'results-count\'>' + escapeHtml(total) + ' tyres</span>' +
              '<span class=\'results-size-label\'>for ' + sizeLabel + '</span>' +
            '</div>' +
            '<div class=\'results-summary-meta\'>' +
              tagsHtml +
              clearHtml +
            '</div>' +
          '</div>'
        );
      }

      function renderFilterPanel(container, options, state, applied) {
        if (!container) return;
        if (!hasCompleteSize(state)) {
          container.innerHTML = (
            '<div class=\'tyre-filter-panel-inner\'>' +
              '<div class=\'tyre-filter-panel-header\'>' +
                '<h2>Filters</h2>' +
                '<button type=\'button\' class=\'filter-close-btn\' data-action=\'close-filters\'>Close</button>' +
              '</div>' +
              '<div class=\'tyre-filter-panel-body\'>' +
                '<p class=\'filters-disabled-message\'>Select a full tyre size first to apply filters.</p>' +
              '</div>' +
            '</div>'
          );
          return;
        }

        const seasons = options && options.seasons ? options.seasons : [];
        const performanceCategories = options && options.performance_categories ? options.performance_categories : [];
        const brandTiers = options && options.brand_tiers ? options.brand_tiers : [];
        const benefits = options && options.benefits ? options.benefits : [];
        const ratingThresholds = options && options.customer_rating_thresholds ? options.customer_rating_thresholds : [];
        const priceSuggestion = options && options.price_range_suggestion ? options.price_range_suggestion : null;

        const effective = applied || {};
        const selectedSeason = effective.season || state.season || '';
        const selectedPerf = effective.performance_category || state.performance_category || '';
        const selectedTier = effective.brand_tier || state.brand_tier || '';
        const selectedHasFree = (typeof effective.has_free_fitting === 'boolean') ? effective.has_free_fitting : (state.has_free_fitting === true);
        const selectedMinRating = (typeof effective.min_customer_rating === 'number') ? effective.min_customer_rating : (state.min_customer_rating || '');
        const selectedMaxPrice = (typeof effective.max_price === 'number') ? effective.max_price : (typeof state.max_price === 'number' ? state.max_price : '');

        const seasonOptionsHtml = ['<option value=\'\'>Any season</option>'].concat(seasons.map(function(s) {
          const selected = s === selectedSeason ? ' selected' : '';
          const label = s.replace(/_/g, ' ');
          return '<option value=\'' + escapeHtml(s) + '\'' + selected + '>' + escapeHtml(label) + '</option>';
        })).join('');

        const perfOptionsHtml = ['<option value=\'\'>Any use</option>'].concat(performanceCategories.map(function(p) {
          const selected = p === selectedPerf ? ' selected' : '';
          const label = p.replace(/_/g, ' ');
          return '<option value=\'' + escapeHtml(p) + '\'' + selected + '>' + escapeHtml(label) + '</option>';
        })).join('');

        const tierOptionsHtml = ['<option value=\'\'>All tiers</option>'].concat(brandTiers.map(function(t) {
          const selected = t === selectedTier ? ' selected' : '';
          const label = t.replace(/_/g, ' ');
          return '<option value=\'' + escapeHtml(t) + '\'' + selected + '>' + escapeHtml(label) + '</option>';
        })).join('');

        const hasFreeFittingBenefit = benefits.some(function(b) { return b.code === 'free_fitting'; });

        const ratingOptionsHtml = ['<option value=\'\'>Any rating</option>'].concat(ratingThresholds.map(function(r) {
          const selected = Number(selectedMinRating) === Number(r) ? ' selected' : '';
          return '<option value=\'' + escapeHtml(r) + '\'' + selected + '>' + escapeHtml(r) + '+</option>';
        })).join('');

        let priceHint = '';
        if (priceSuggestion && (priceSuggestion.min_price || priceSuggestion.max_price)) {
          const minP = priceSuggestion.min_price;
          const maxP = priceSuggestion.max_price;
          if (minP && maxP) priceHint = 'Typical range $' + escapeHtml(minP) + ' - $' + escapeHtml(maxP) + ' per tyre';
          else if (maxP) priceHint = 'Up to $' + escapeHtml(maxP) + ' per tyre';
        }

        const maxPriceValue = selectedMaxPrice !== '' && selectedMaxPrice !== null ? escapeHtml(selectedMaxPrice) : '';

        container.innerHTML = (
          '<div class=\'tyre-filter-panel-inner\'>' +
            '<div class=\'tyre-filter-panel-header\'>' +
              '<h2>Filters</h2>' +
              '<button type=\'button\' class=\'filter-close-btn\' data-action=\'close-filters\'>Close</button>' +
            '</div>' +
            '<form class=\'tyre-filter-form\' data-action=\'apply-filters\'>' +
              '<div class=\'filter-group\'>' +
                '<label for=\'filter-season\'>Season</label>' +
                '<select id=\'filter-season\' name=\'season\'>' + seasonOptionsHtml + '</select>' +
              '</div>' +
              '<div class=\'filter-group\'>' +
                '<label for=\'filter-performance\'>Performance / usage</label>' +
                '<select id=\'filter-performance\' name=\'performance_category\'>' + perfOptionsHtml + '</select>' +
              '</div>' +
              '<div class=\'filter-group\'>' +
                '<label for=\'filter-brand-tier\'>Brand tier</label>' +
                '<select id=\'filter-brand-tier\' name=\'brand_tier\'>' + tierOptionsHtml + '</select>' +
              '</div>' +
              (hasFreeFittingBenefit
                ? '<div class=\'filter-group filter-group--inline\'>' +
                    '<label class=\'checkbox-inline\'>' +
                      '<input type=\'checkbox\' name=\'has_free_fitting\' value=\'1\'' + (selectedHasFree ? ' checked' : '') + ' />' +
                      '<span>Only show tyres with free fitting</span>' +
                    '</label>' +
                  '</div>'
                : '') +
              '<div class=\'filter-group\'>' +
                '<label for=\'filter-rating\'>Minimum customer rating</label>' +
                '<select id=\'filter-rating\' name=\'min_customer_rating\'>' + ratingOptionsHtml + '</select>' +
              '</div>' +
              '<div class=\'filter-group\'>' +
                '<label for=\'filter-max-price\'>Maximum price per tyre</label>' +
                '<input id=\'filter-max-price\' name=\'max_price\' type=\'number\' min=\'0\' step=\'1\' value=\'' + maxPriceValue + '\' />' +
                (priceHint ? '<p class=\'filter-hint\'>' + priceHint + '</p>' : '') +
              '</div>' +
              '<div class=\'filter-actions\'>' +
                '<button type=\'button\' class=\'btn btn-ghost\' data-action=\'clear-filters\'>Clear filters</button>' +
                '<button type=\'submit\' class=\'btn btn-primary-pill\'>Apply filters</button>' +
              '</div>' +
            '</form>' +
          '</div>'
        );
      }

      function renderProductGrid(container, result) {
        if (!container) return;
        if (!result || !hasCompleteSize(pageState)) {
          container.innerHTML = '';
          return;
        }
        const tyres = result.tyres || [];
        const brands = result.brands || [];
        const brandMap = {};
        brands.forEach(function(b) { brandMap[b.id] = b; });

        if (!tyres.length) {
          container.innerHTML = (
            '<div class=\'no-results\'>' +
              '<p>No tyres match your current filters.</p>' +
              '<button type=\'button\' class=\'btn btn-primary-pill\' data-action=\'clear-all-filters\'>Clear filters</button>' +
            '</div>'
          );
          return;
        }

        const cardsHtml = tyres.map(function(t) {
          const brand = brandMap[t.brand_id];
          const brandName = brand ? brand.name : '';
          const sizeLabel = t.size_label || (t.width + '/' + t.profile + ' R' + t.rim_diameter);
          const price = typeof t.price_per_tyre === 'number' ? '$' + t.price_per_tyre.toFixed(2) : '';
          const rating = typeof t.customer_rating === 'number' ? t.customer_rating.toFixed(1) : null;
          const ratingCount = typeof t.customer_rating_count === 'number' ? t.customer_rating_count : null;
          const seasonLabel = t.season ? t.season.replace(/_/g, ' ') : '';
          const perfLabel = t.performance_category ? t.performance_category.replace(/_/g, ' ') : '';
          const freeFitting = !!t.has_free_fitting;
          const fuel = t.fuel_efficiency_rating ? t.fuel_efficiency_rating.toUpperCase() : null;
          const wet = t.wet_grip_rating ? t.wet_grip_rating.toUpperCase() : null;
          const noise = typeof t.noise_db === 'number' ? t.noise_db : null;
          const selected = selectedTyreIds.indexOf(t.id) !== -1;

          const ratingHtml = rating !== null
            ? ('<div class=\'tyre-card-rating\'>' +
                 '<span class=\'rating-value\'>' + escapeHtml(rating) + '</span>' +
                 (ratingCount !== null ? '<span class=\'rating-count\'>(' + escapeHtml(ratingCount) + ')</span>' : '') +
               '</div>')
            : '';

          const efficiencyHtml = (fuel || wet || noise !== null)
            ? ('<dl class=\'tyre-card-efficiency\'>' +
                 (fuel ? '<div><dt>Fuel</dt><dd>' + escapeHtml(fuel) + '</dd></div>' : '') +
                 (wet ? '<div><dt>Wet grip</dt><dd>' + escapeHtml(wet) + '</dd></div>' : '') +
                 (noise !== null ? '<div><dt>Noise</dt><dd>' + escapeHtml(noise) + ' dB</dd></div>' : '') +
               '</dl>')
            : '';

          const freeFittingBadge = freeFitting
            ? '<span class=\'tyre-card-badge tyre-card-badge--accent\'>Free fitting</span>'
            : '';

          return (
            '<article class=\'tyre-card\' data-tyre-id=\'' + escapeHtml(t.id) + '\' data-action=\'view-tyre-details\' tabindex=\'0\'>' +
              '<div class=\'tyre-card-header\'>' +
                '<div class=\'tyre-card-brand\'>' + escapeHtml(brandName) + '</div>' +
                '<h3 class=\'tyre-card-name\'>' + escapeHtml(t.name) + '</h3>' +
                '<div class=\'tyre-card-size\'>' + escapeHtml(sizeLabel) + '</div>' +
              '</div>' +
              '<div class=\'tyre-card-body\'>' +
                '<div class=\'tyre-card-meta\'>' +
                  (seasonLabel ? '<span class=\'tyre-card-chip\'>' + escapeHtml(seasonLabel) + '</span>' : '') +
                  (perfLabel ? '<span class=\'tyre-card-chip\'>' + escapeHtml(perfLabel) + '</span>' : '') +
                  freeFittingBadge +
                '</div>' +
                ratingHtml +
                efficiencyHtml +
              '</div>' +
              '<div class=\'tyre-card-footer\'>' +
                '<div class=\'tyre-card-price-block\'>' +
                  (price ? '<div class=\'tyre-card-price\'>' + price + ' <span class=\'price-unit\'>per tyre</span></div>' : '') +
                  (t.is_available ? '<div class=\'tyre-card-availability\'>In stock</div>' : '<div class=\'tyre-card-availability tyre-card-availability--unavailable\'>Out of stock</div>') +
                '</div>' +
                '<div class=\'tyre-card-actions\'>' +
                  '<button type=\'button\' class=\'btn btn-ghost\'>View details</button>' +
                  '<label class=\'comparison-toggle\'>' +
                    '<input type=\'checkbox\' data-action=\'toggle-comparison\' data-tyre-id=\'' + escapeHtml(t.id) + '\'' + (selected ? ' checked' : '') + ' />' +
                    '<span>Compare</span>' +
                  '</label>' +
                '</div>' +
              '</div>' +
            '</article>'
          );
        }).join('');

        container.innerHTML = cardsHtml;
      }

      function renderPagination(container, state, result) {
        if (!container || !result || !hasCompleteSize(state)) {
          if (container) container.innerHTML = '';
          return;
        }
        const total = result.total_results || 0;
        const page = result.page || state.page || 1;
        const pageSize = result.page_size || PAGE_SIZE;
        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        if (totalPages <= 1) {
          container.innerHTML = '';
          return;
        }

        const makePageButton = function(p) {
          const current = p === page;
          return '<button type=\'button\' class=\'page-btn' + (current ? ' page-btn--active' : '') + '\' data-action=\'go-to-page\' data-page=\'' + escapeHtml(p) + '\'>' + escapeHtml(p) + '</button>';
        };

        const pages = [];
        const maxButtons = 7;
        let start = Math.max(1, page - 3);
        let end = Math.min(totalPages, start + maxButtons - 1);
        if (end - start < maxButtons - 1) {
          start = Math.max(1, end - maxButtons + 1);
        }
        for (let p = start; p <= end; p++) {
          pages.push(makePageButton(p));
        }

        const prevDisabled = page <= 1 ? ' disabled' : '';
        const nextDisabled = page >= totalPages ? ' disabled' : '';

        container.innerHTML = (
          '<nav class=\'pagination\' aria-label=\'Tyre pages\'>' +
            '<button type=\'button\' class=\'page-nav page-nav--prev\'' + prevDisabled + ' data-action=\'prev-page\'>&laquo; Prev</button>' +
            '<div class=\'page-list\'>' + pages.join('') + '</div>' +
            '<button type=\'button\' class=\'page-nav page-nav--next\'' + nextDisabled + ' data-action=\'next-page\'>Next &raquo;</button>' +
          '</nav>'
        );
      }

      function renderComparisonBar(container) {
        if (!container) return;
        if (!selectedTyreIds.length) {
          container.innerHTML = '';
          container.hidden = true;
          return;
        }

        const tyres = searchResult && searchResult.tyres ? searchResult.tyres : [];
        const chipsHtml = selectedTyreIds.map(function(id) {
          const tyre = tyres.find(function(t) { return t.id === id; });
          const label = tyre ? (tyre.name || id) : id;
          return (
            '<button type=\'button\' class=\'comparison-chip\' data-action=\'remove-from-comparison\' data-tyre-id=\'' + escapeHtml(id) + '\'>' +
              '<span class=\'comparison-chip-label\'>' + escapeHtml(label) + '</span>' +
              '<span class=\'comparison-chip-remove\' aria-hidden=\'true\'>&times;</span>' +
            '</button>'
          );
        }).join('');

        const disabled = selectedTyreIds.length < 2 ? ' disabled' : '';

        container.innerHTML = (
          '<div class=\'comparison-bar-inner\'>' +
            '<div class=\'comparison-bar-list\'>' +
              '<span class=\'comparison-bar-title\'>Compare tyres</span>' +
              '<div class=\'comparison-chip-list\'>' + chipsHtml + '</div>' +
            '</div>' +
            '<div class=\'comparison-bar-actions\'>' +
              '<button type=\'button\' class=\'btn btn-ghost\' data-action=\'clear-comparison\'>Clear</button>' +
              '<button type=\'button\' class=\'btn btn-primary-pill\' data-action=\'compare-selected\'' + disabled + '>Compare (' + escapeHtml(selectedTyreIds.length) + ')</button>' +
            '</div>' +
          '</div>'
        );
        container.hidden = false;
      }

      function initPage() {
        pageState = parseUrlState();

        const populateElements = document.querySelectorAll('[data-populate]');
        const containers = {};
        populateElements.forEach(function(el) {
          containers[el.dataset.populate] = el;
        });

        let sizeOptions;
        try {
          sizeOptions = WebsiteSDK.getTyreSizeOptions();
        } catch (e) {
          sizeOptions = { widths: [], profiles: [], rim_diameters: [] };
        }

        renderSizeSelector(containers['tyre-size-selector'], sizeOptions, pageState);

        if (hasCompleteSize(pageState)) {
          try {
            filterOptions = WebsiteSDK.getTyreFilterOptions(pageState.width, pageState.profile, pageState.rim_diameter);
          } catch (e) {
            filterOptions = null;
          }

          let filters = buildFiltersFromState(pageState);
          try {
            searchResult = WebsiteSDK.searchTyresBySizeAndFilters(
              pageState.width,
              pageState.profile,
              pageState.rim_diameter,
              filters,
              pageState.sort || undefined,
              pageState.page || 1,
              PAGE_SIZE
            );
          } catch (e) {
            searchResult = { tyres: [], brands: [], total_results: 0, page: 1, page_size: PAGE_SIZE, applied_filters: {} };
          }
        } else {
          filterOptions = filterOptions || null;
          searchResult = null;
        }

        const appliedFilters = searchResult && searchResult.applied_filters ? searchResult.applied_filters : {};

        renderResultsSummary(containers['tyre-results-summary'], pageState, searchResult);
        renderSortControl(
          containers['tyre-sort-control'],
          filterOptions && filterOptions.sort_options ? filterOptions.sort_options : [],
          pageState,
          appliedFilters.sort
        );
        renderFilterPanel(containers['tyre-filter-panel'], filterOptions || {}, pageState, appliedFilters);
        renderProductGrid(containers['tyre-product-grid'], searchResult);
        renderPagination(containers['tyre-pagination'], pageState, searchResult);
        renderComparisonBar(containers['comparison-bar']);

        const filtersToggle = document.querySelector('.btn-filters-toggle');
        const filterPanel = containers['tyre-filter-panel'];
        if (filtersToggle && filterPanel) {
          filtersToggle.setAttribute('aria-expanded', filterPanel.hidden ? 'false' : 'true');
        }
      }

      function onSubmit(event) {
        const target = event.target;
        if (!target || !target.dataset) return;
        const action = target.dataset.action;
        if (!action) return;

        if (action === 'submit-size-selection') {
          event.preventDefault();
          const width = target.querySelector('select[name="width"]') ? target.querySelector('select[name="width"]').value : '';
          const profile = target.querySelector('select[name="profile"]') ? target.querySelector('select[name="profile"]').value : '';
          const rim = target.querySelector('select[name="rim_diameter"]') ? target.querySelector('select[name="rim_diameter"]').value : '';

          if (!width || !profile || !rim) {
            target.reportValidity && target.reportValidity();
            return;
          }

          const newState = {
            width: Number(width),
            profile: Number(profile),
            rim_diameter: Number(rim),
            page: 1
          };
          const url = buildUrlWithState(newState);
          window.location.href = url;
        }

        if (action === 'apply-filters') {
          event.preventDefault();
          const form = target;
          const seasonEl = form.querySelector('#filter-season');
          const performanceEl = form.querySelector('#filter-performance');
          const tierEl = form.querySelector('#filter-brand-tier');
          const freeEl = form.querySelector('input[name="has_free_fitting"]');
          const ratingEl = form.querySelector('#filter-rating');
          const maxPriceEl = form.querySelector('#filter-max-price');

          const season = seasonEl ? seasonEl.value || null : null;
          const performance = performanceEl ? performanceEl.value || null : null;
          const brandTier = tierEl ? tierEl.value || null : null;

          let hasFreeFitting = null;
          if (freeEl) {
            hasFreeFitting = freeEl.checked ? true : null;
          }

          const minRatingVal = ratingEl ? ratingEl.value : '';
          const maxPriceVal = maxPriceEl ? maxPriceEl.value : '';

          const update = {
            season: season,
            performance_category: performance,
            brand_tier: brandTier,
            has_free_fitting: hasFreeFitting,
            min_customer_rating: minRatingVal ? Number(minRatingVal) : null,
            max_price: maxPriceVal ? Number(maxPriceVal) : null,
            page: 1
          };

          const url = buildUrlWithState(update);
          window.location.href = url;
        }
      }

      function onClick(event) {
        const target = event.target.closest('[data-action]');
        if (!target) return;
        const action = target.dataset.action;

        if (action === 'toggle-filters') {
          const panel = document.querySelector('[data-populate="tyre-filter-panel"]');
          if (!panel) return;
          const nowHidden = !panel.hidden;
          panel.hidden = nowHidden;
          const toggle = target;
          toggle.setAttribute('aria-expanded', panel.hidden ? 'false' : 'true');
          return;
        }

        if (action === 'close-filters') {
          const panel = document.querySelector('[data-populate="tyre-filter-panel"]');
          if (!panel) return;
          panel.hidden = true;
          const toggle = document.querySelector('.btn-filters-toggle');
          if (toggle) toggle.setAttribute('aria-expanded', 'false');
          return;
        }

        if (action === 'clear-filters' || action === 'clear-all-filters') {
          const update = {
            season: null,
            performance_category: null,
            brand_tier: null,
            has_free_fitting: null,
            min_customer_rating: null,
            max_price: null,
            page: 1
          };
          const url = buildUrlWithState(update);
          window.location.href = url;
          return;
        }

        if (action === 'view-tyre-details') {
          const tyreId = target.dataset.tyreId;
          if (!tyreId) return;
          window.location.href = 'tyre_detail.html?id=' + encodeURIComponent(tyreId);
          return;
        }

        if (action === 'go-to-page') {
          const pageAttr = target.dataset.page;
          const pageNum = pageAttr ? Number(pageAttr) : 1;
          if (!pageNum || pageNum === pageState.page) return;
          navigateWithState({ page: pageNum });
          return;
        }

        if (action === 'prev-page') {
          const current = pageState.page || 1;
          if (current <= 1) return;
          navigateWithState({ page: current - 1 });
          return;
        }

        if (action === 'next-page') {
          const current = pageState.page || 1;
          const total = searchResult ? searchResult.total_results || 0 : 0;
          const pageSize = searchResult ? searchResult.page_size || PAGE_SIZE : PAGE_SIZE;
          const totalPages = Math.max(1, Math.ceil(total / pageSize));
          if (current >= totalPages) return;
          navigateWithState({ page: current + 1 });
          return;
        }

        if (action === 'toggle-comparison') {
          event.stopPropagation();
          const checkbox = target;
          const tyreId = checkbox.dataset.tyreId;
          if (!tyreId) return;
          const idx = selectedTyreIds.indexOf(tyreId);
          if (checkbox.checked) {
            if (idx === -1) selectedTyreIds.push(tyreId);
          } else if (idx !== -1) {
            selectedTyreIds.splice(idx, 1);
          }
          const comparisonContainer = document.querySelector('[data-populate="comparison-bar"]');
          renderComparisonBar(comparisonContainer);
          return;
        }

        if (action === 'remove-from-comparison') {
          const tyreId = target.dataset.tyreId;
          if (!tyreId) return;
          const idx = selectedTyreIds.indexOf(tyreId);
          if (idx !== -1) selectedTyreIds.splice(idx, 1);
          const checkbox = document.querySelector('input[data-action="toggle-comparison"][data-tyre-id="' + tyreId.replace(/"/g, '\\"') + '"]');
          if (checkbox) checkbox.checked = false;
          const comparisonContainer = document.querySelector('[data-populate="comparison-bar"]');
          renderComparisonBar(comparisonContainer);
          return;
        }

        if (action === 'clear-comparison') {
          selectedTyreIds = [];
          const checkboxes = document.querySelectorAll('input[data-action="toggle-comparison"]');
          checkboxes.forEach(function(cb) { cb.checked = false; });
          const comparisonContainer = document.querySelector('[data-populate="comparison-bar"]');
          renderComparisonBar(comparisonContainer);
          return;
        }

        if (action === 'compare-selected') {
          if (selectedTyreIds.length < 2) {
            return;
          }
          try {
            const result = WebsiteSDK.createTyreComparisonSet(selectedTyreIds);
            if (result && result.comparison_set && result.comparison_set.id) {
              const id = result.comparison_set.id;
              window.location.href = 'tyre_compare.html?comparisonSetId=' + encodeURIComponent(id);
            }
          } catch (e) {
            console.error('Failed to create comparison set', e);
          }
          return;
        }
      }

      function onChange(event) {
        const target = event.target;
        if (!target || !target.dataset) return;
        const action = target.dataset.action;
        if (action === 'change-sort') {
          const sortCode = target.value || null;
          const update = {
            sort: sortCode,
            page: 1
          };
          const url = buildUrlWithState(update);
          window.location.href = url;
        }
        if (action === 'toggle-comparison') {
          // handled in click as well; ensure no duplicate logic here
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        initPage();
        document.addEventListener('submit', onSubmit);
        document.addEventListener('click', onClick);
        document.addEventListener('change', onChange);
      });
    })();
  </script>
</body>
</html>
