<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <title>Terms of Use | Jack Hacks</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <meta name='description' content='Displays the dynamically managed Terms of Use for the cybersecurity blog, including acceptable use rules and liability information, loaded via a static content API.'>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Fira+Code:wght@400;500&amp;display=swap' rel='stylesheet'>

  <!-- Site styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific styles -->
  <link rel='stylesheet' href='terms.css'>
</head>
<body>
  <header class='site-header'>
    <!-- Top navigation bar -->
    <div class='top-nav'>
      <div class='container nav-container'>
        <a href='index.html' class='brand'>Jack Hacks</a>
        <nav class='primary-nav' aria-label='Primary'>
          <ul>
            <li><a href='index.html'>Home</a></li>
            <li><a href='category.html?categoryId=beginner'>Beginner</a></li>
            <li><a href='category.html?categoryId=threats'>Threats</a></li>
            <li><a href='category.html?categoryId=tools'>Tools</a></li>
            <li><a href='category.html?categoryId=ctf_practice'>CTF &amp; Practice</a></li>
            <li><a href='series.html'>Series</a></li>
          </ul>
        </nav>
      </div>
    </div>

    <!-- Hero banner (dark, moody cybersecurity feel) -->
    <div class='hero'>
      <div class='container hero-content'>
        <h1 class='hero-title' data-component='terms-title-display' data-populate='terms-title'>Terms of Use</h1>
        <p class='hero-subtitle'>A personal cybersecurity and hacking blog</p>
      </div>
    </div>
  </header>

  <main id='content' class='main-content' role='main'>
    <div class='container'>
      <!-- Terms of Use layout root -->
      <div class='terms-layout' data-component='terms-page-controller'>
        <div class='terms-grid'>
          <!-- Visual buffer / implied sidebar column -->
          <aside class='terms-sidebar' aria-hidden='true'></aside>

          <!-- Main terms column -->
          <section class='terms-main-column'>
            <!-- Loader / status area -->
            <div class='terms-status' data-component='terms-status' aria-live='polite' aria-atomic='true'></div>

            <!-- Last updated metadata bar -->
            <section class='terms-meta' data-component='terms-last-updated-bar'>
              <p class='terms-last-updated'>
                <span class='terms-last-updated-label'>Last updated</span>
                <time class='terms-last-updated-value' data-populate='terms-last-updated'></time>
              </p>
            </section>

            <!-- Terms content body -->
            <section class='terms-body'>
              <article id='terms-article'
                       class='terms-article'
                       data-component='terms-content-renderer'
                       data-populate='terms-content'
                       aria-label='Terms of Use'>
                <!-- Static content HTML for Terms of Use will be injected here by JavaScript -->
              </article>
            </section>
          </section>
        </div>
      </div>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='container footer-container'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul>
          <li><a href='about.html'>About</a></li>
          <li><a href='contact.html'>Contact</a></li>
          <li><a href='privacy.html'>Privacy Policy</a></li>
          <li><a href='terms.html'>Terms of Use</a></li>
          <li><a href='reading_list.html'>Reading List</a></li>
          <li><a href='settings.html'>Settings</a></li>
        </ul>
      </nav>
      <p class='footer-meta'>&copy; <span data-year='2024'>Jack Hacks</span>. All rights reserved.</p>
    </div>
  </footer>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page controller / UI wiring -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // In-memory page state
      var pageState = {
        pageCode: null,
        section: null,
        view: null,
        staticPageContent: null,
        loadedPageCode: null
      };

      var rootEl = document.querySelector('[data-component="terms-page-controller"]');
      var statusEl = document.querySelector('[data-component="terms-status"]');

      function parseStateFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return {
          pageCode: params.get('pageCode') || 'terms_of_use',
          section: params.get('section'),
          view: params.get('view') || 'default'
        };
      }

      function setStatus(message, isError) {
        if (!statusEl) return;
        statusEl.textContent = message || '';
        if (message) {
          statusEl.classList.add('is-visible');
        } else {
          statusEl.classList.remove('is-visible');
        }
        if (isError) {
          statusEl.classList.add('is-error');
        } else {
          statusEl.classList.remove('is-error');
        }
      }

      function applyViewMode(view) {
        if (!rootEl) return;
        rootEl.classList.remove('terms-view-default', 'terms-view-print', 'terms-view-focused');
        var className = 'terms-view-default';
        if (view === 'print') {
          className = 'terms-view-print';
        } else if (view === 'focused') {
          className = 'terms-view-focused';
        }
        rootEl.classList.add(className);
      }

      function formatLastUpdated(raw) {
        if (!raw) return '';
        var d = new Date(raw);
        if (!isNaN(d.getTime())) {
          try {
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
          } catch (e) {
            return d.toISOString().slice(0, 10);
          }
        }
        return raw;
      }

      function setupInlineLinkHandler(container) {
        if (!container) return;
        container.addEventListener('click', function(event) {
          var link = event.target.closest('a');
          if (!link) return;
          var href = link.getAttribute('href');
          if (!href) return;

          // Allow navigation to privacy.html as-is (outgoing connection)
          if (href === 'privacy.html' || href.indexOf('privacy.html?') === 0) {
            return;
          }

          // Handle in-page section anchors without full reload
          if (href.charAt(0) === '#') {
            event.preventDefault();
            var sectionId = href.slice(1);
            var params = new URLSearchParams(window.location.search);
            if (sectionId) {
              params.set('section', sectionId);
            } else {
              params.delete('section');
            }
            var newUrl = window.location.pathname;
            var queryString = params.toString();
            if (queryString) {
              newUrl += '?' + queryString;
            }
            window.history.pushState({}, '', newUrl);
            focusSection(sectionId);
          }
        });
      }

      function renderStaticContent(content) {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          var dataType = element.dataset.populate;

          if (dataType === 'terms-title') {
            element.textContent = content && content.title ? content.title : 'Terms of Use';
          } else if (dataType === 'terms-last-updated') {
            var text = formatLastUpdated(content && content.lastUpdated ? content.lastUpdated : '');
            element.textContent = text;
            if (element.tagName && element.tagName.toLowerCase() === 'time' && content && content.lastUpdated) {
              element.setAttribute('datetime', content.lastUpdated);
            }
          } else if (dataType === 'terms-content') {
            element.innerHTML = content && content.contentHtml ? content.contentHtml : '';
            setupInlineLinkHandler(element);
          }
        });
      }

      function focusSection(sectionId) {
        if (!sectionId) return;
        var contentContainer = document.querySelector('[data-component="terms-content-renderer"]');
        if (!contentContainer) return;

        var target = document.getElementById(sectionId);
        if (!target && contentContainer.querySelector) {
          try {
            target = contentContainer.querySelector('[name="' + sectionId + '"]');
          } catch (e) {
            target = null;
          }
        }
        if (!target) return;

        try {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (e) {
          target.scrollIntoView(true);
        }

        if (typeof target.focus === 'function') {
          target.setAttribute('tabindex', '-1');
          try {
            target.focus({ preventScroll: true });
          } catch (e) {
            target.focus();
          }
        }
      }

      function loadStaticContentForState(newState, options) {
        var force = options && options.force === true;
        if (!force && pageState.loadedPageCode === newState.pageCode && pageState.staticPageContent) {
          return;
        }

        setStatus('Loading terms...', false);

        var content;
        try {
          content = WebsiteSDK.getStaticPageContent(newState.pageCode);
        } catch (err) {
          console.error('Error loading static page content:', err);
          setStatus('Unable to load Terms of Use right now. Please try again later.', true);
          return;
        }

        if (!content || typeof content !== 'object') {
          setStatus('Unexpected response while loading Terms of Use.', true);
          return;
        }

        pageState.staticPageContent = content;
        pageState.loadedPageCode = newState.pageCode;

        setStatus('', false);
        renderStaticContent(content);

        if (newState.section) {
          // Delay slightly to ensure layout is ready for scroll
          window.setTimeout(function() {
            focusSection(newState.section);
          }, 50);
        }
      }

      // React to history navigation / manual URL changes via back/forward
      window.addEventListener('popstate', function() {
        var newState = parseStateFromUrl();
        pageState.pageCode = newState.pageCode;
        pageState.section = newState.section;
        pageState.view = newState.view;

        applyViewMode(pageState.view);

        if (pageState.loadedPageCode !== pageState.pageCode) {
          loadStaticContentForState(pageState, { force: true });
        } else if (pageState.section) {
          focusSection(pageState.section);
        }
      });

      // Initial load
      var initial = parseStateFromUrl();
      pageState.pageCode = initial.pageCode;
      pageState.section = initial.section;
      pageState.view = initial.view;

      applyViewMode(pageState.view);
      loadStaticContentForState(pageState, { force: true });
    });
  </script>
</body>
</html>
