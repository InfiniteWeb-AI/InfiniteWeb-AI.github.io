<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <title>Category Listing - Jack Hacks</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;family=Fira+Code:wght@400;500&amp;display=swap' rel='stylesheet'>

  <!-- Site styles -->
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='category.css'>
</head>
<body>
  <header class='site-header'>
    <!-- Top navigation bar -->
    <div class='top-nav'>
      <div class='container nav-container'>
        <a href='index.html' class='brand'>Jack Hacks</a>
        <nav class='primary-nav' aria-label='Primary'>
          <ul>
            <li><a href='index.html'>Home</a></li>
            <li><a href='category.html?categoryId=beginner'>Beginner</a></li>
            <li><a href='category.html?categoryId=threats'>Threats</a></li>
            <li><a href='category.html?categoryId=tools'>Tools</a></li>
            <li><a href='category.html?categoryId=ctf_practice'>CTF &amp; Practice</a></li>
            <li><a href='series.html'>Series</a></li>
          </ul>
        </nav>
        <!-- Global search in header -->
        <form class='header-search-form' role='search' data-component='header-search-form' data-action='header-search-form'>
          <label for='headerSearchInput' class='visually-hidden'>Search articles</label>
          <input id='headerSearchInput' name='query' type='search' placeholder='Search blog...' autocomplete='off'>
        </form>
      </div>
    </div>

    <!-- Hero banner (dark, moody cybersecurity feel) -->
    <div class='hero'>
      <div class='container hero-content' data-component='category-header-summary'>
        <h1 class='hero-title' data-populate='category-title'>Category</h1>
        <p class='hero-subtitle' data-populate='category-subtitle'>A personal cybersecurity and hacking blog</p>
        <p class='hero-meta' data-populate='category-filter-summary'></p>
      </div>
    </div>
  </header>

  <main id='content' class='main-content' role='main'>
    <div class='container category-page' data-component='category-page-controller'>
      <div class='category-layout'>
        <!-- Filter sidebar -->
        <aside class='filter-sidebar-column'>
          <form class='filter-sidebar card filter-form'
                data-component='filter-sidebar'
                data-populate='category-filters'
                data-action='filters-form'>
            <!-- Filters will be rendered via JS -->
          </form>
        </aside>

        <!-- Main listing column -->
        <section class='category-main-column'>
          <!-- Sort and active filters bar -->
          <section class='listing-controls'
                   data-component='sort-and-active-filters-bar'
                   data-populate='sort-and-filters'>
            <!-- Sort dropdown and active filter chips rendered via JS -->
          </section>

          <!-- Article list -->
          <section class='article-list-section'>
            <div class='article-list'
                 data-component='article-list'
                 data-populate='article-list'>
              <p class='muted'>Loading articles...</p>
            </div>

            <!-- Pagination controls -->
            <nav class='pagination-controls'
                 data-component='pagination-controls'
                 data-populate='pagination-controls'
                 aria-label='Pagination'>
            </nav>
          </section>
        </section>
      </div>
    </div>

    <!-- Bookmark feedback toast -->
    <div class='bookmark-feedback-toast'
         data-component='bookmark-feedback-toast'
         aria-live='polite'
         aria-atomic='true'>
      <!-- Toast content rendered via JS -->
    </div>
  </main>

  <footer class='site-footer'>
    <div class='container footer-container'>
      <nav class='footer-nav' aria-label='Footer'>
        <ul>
          <li><a href='about.html'>About</a></li>
          <li><a href='contact.html'>Contact</a></li>
          <li><a href='privacy.html'>Privacy Policy</a></li>
          <li><a href='terms.html'>Terms of Use</a></li>
          <li><a href='reading_list.html'>Reading List</a></li>
          <li><a href='settings.html'>Settings</a></li>
        </ul>
      </nav>
      <p class='footer-meta'>&copy; <span data-year='2024'>Jack Hacks</span>. All rights reserved.</p>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
  'use strict';

  document.addEventListener('DOMContentLoaded', function() {
    var PAGE_SIZE = 10; // application-level page size

    var state = parseCategoryStateFromUrl();
    var filterOptions = null;
    var articlesResult = null;

    try {
      filterOptions = WebsiteSDK.getCategoryFilterOptions(state.categoryId);
    } catch (err) {
      console.error('Error loading category filter options', err);
    }

    try {
      articlesResult = WebsiteSDK.getCategoryArticles(
        state.categoryId,
        state.tagSlugs && state.tagSlugs.length ? state.tagSlugs : undefined,
        state.dateFrom || undefined,
        state.dateTo || undefined,
        state.readingTimeMax !== null ? state.readingTimeMax : undefined,
        state.difficulty || undefined,
        state.minUpvotes !== null ? state.minUpvotes : undefined,
        state.challengeYearFrom !== null ? state.challengeYearFrom : undefined,
        state.challengeYearTo !== null ? state.challengeYearTo : undefined,
        state.sort || undefined,
        state.page,
        PAGE_SIZE
      );
    } catch (err2) {
      console.error('Error loading category articles', err2);
    }

    // Render hero/category header summary
    var heroContainer = document.querySelector('[data-component="category-header-summary"]');
    if (heroContainer && articlesResult) {
      renderCategoryHeaderSummary(heroContainer, state, articlesResult);
    }

    // Render filter sidebar
    var filterForm = document.querySelector('[data-populate="category-filters"]');
    if (filterForm && filterOptions) {
      renderFilterSidebar(filterForm, filterOptions, state);
    }

    // Render sort bar and active filters
    var sortBar = document.querySelector('[data-populate="sort-and-filters"]');
    if (sortBar && filterOptions && articlesResult) {
      renderSortAndActiveFilters(sortBar, filterOptions, state, articlesResult);
    }

    // Render article list
    var articleListContainer = document.querySelector('[data-populate="article-list"]');
    if (articleListContainer && articlesResult) {
      renderArticleList(articleListContainer, articlesResult, state);
    }

    // Render pagination controls
    var paginationContainer = document.querySelector('[data-populate="pagination-controls"]');
    if (paginationContainer && articlesResult) {
      renderPagination(paginationContainer, articlesResult, state);
    }

    // Update footer year
    var yearSpan = document.querySelector('.footer-meta [data-year]');
    if (yearSpan) {
      yearSpan.textContent = String(new Date().getFullYear());
    }

    // Set up event handlers
    setupGlobalHandlers(state, filterOptions);
  });

  function parseCategoryStateFromUrl() {
    var params = new URLSearchParams(window.location.search);
    var categoryId = params.get('categoryId') || 'beginner';
    var validCategories = ['beginner', 'threats', 'tools', 'ctf_practice'];
    if (validCategories.indexOf(categoryId) === -1) {
      categoryId = 'beginner';
    }

    var tagParam = params.get('tag');
    var tagSlugs = [];
    if (tagParam) {
      tagSlugs = tagParam.split(',').map(function(part) { return part.trim(); }).filter(function(part) { return part.length > 0; });
    }

    var dateFrom = params.get('dateFrom') || '';
    var dateTo = params.get('dateTo') || '';

    var readingTimeMaxParam = params.get('readingTimeMax');
    var readingTimeMax = null;
    if (readingTimeMaxParam !== null && readingTimeMaxParam !== '') {
      var rt = Number(readingTimeMaxParam);
      readingTimeMax = isNaN(rt) ? null : rt;
    }

    var difficulty = params.get('difficulty') || '';

    var minUpvotesParam = params.get('minUpvotes');
    var minUpvotes = null;
    if (minUpvotesParam !== null && minUpvotesParam !== '') {
      var mu = Number(minUpvotesParam);
      minUpvotes = isNaN(mu) ? null : mu;
    }

    var challengeYearFromParam = params.get('challengeYearFrom');
    var challengeYearFrom = null;
    if (challengeYearFromParam !== null && challengeYearFromParam !== '') {
      var cyf = Number(challengeYearFromParam);
      challengeYearFrom = isNaN(cyf) ? null : cyf;
    }

    var challengeYearToParam = params.get('challengeYearTo');
    var challengeYearTo = null;
    if (challengeYearToParam !== null && challengeYearToParam !== '') {
      var cyt = Number(challengeYearToParam);
      challengeYearTo = isNaN(cyt) ? null : cyt;
    }

    var sort = params.get('sort') || '';

    var pageParam = params.get('page');
    var page = pageParam ? parseInt(pageParam, 10) : 1;
    if (!page || page < 1) {
      page = 1;
    }

    return {
      categoryId: categoryId,
      tagSlugs: tagSlugs,
      dateFrom: dateFrom,
      dateTo: dateTo,
      readingTimeMax: readingTimeMax,
      difficulty: difficulty,
      minUpvotes: minUpvotes,
      challengeYearFrom: challengeYearFrom,
      challengeYearTo: challengeYearTo,
      sort: sort,
      page: page
    };
  }

  function escapeHtml(value) {
    if (value === null || value === undefined) {
      return '';
    }
    return String(value).replace(/[&<>'"]/g, function(ch) {
      switch (ch) {
        case '&': return '&amp;';
        case '<': return '&lt;';
        case '>': return '&gt;';
        case '"': return '&quot;';
        case '\'': return '&#39;';
        default: return ch;
      }
    });
  }

  function getCategoryDisplayName(categoryId) {
    if (categoryId === 'beginner') return 'Beginner';
    if (categoryId === 'threats') return 'Threats';
    if (categoryId === 'tools') return 'Tools';
    if (categoryId === 'ctf_practice') return 'CTF & Practice';
    return 'Category';
  }

  function formatDifficultyLabel(difficulty) {
    if (!difficulty) return '';
    if (difficulty === 'beginner') return 'Beginner';
    if (difficulty === 'intermediate') return 'Intermediate';
    if (difficulty === 'advanced') return 'Advanced';
    if (difficulty === 'unspecified') return 'Unspecified';
    return difficulty;
  }

  function formatReadingStatusLabel(status) {
    if (!status) return '';
    if (status === 'not_started') return 'Not started';
    if (status === 'in_progress') return 'In progress';
    if (status === 'completed') return 'Completed';
    return status;
  }

  function getTagDisplayName(slug, filterOptions) {
    if (!filterOptions || !filterOptions.availableTags) return '';
    for (var i = 0; i < filterOptions.availableTags.length; i++) {
      var tag = filterOptions.availableTags[i];
      if (tag.slug === slug) {
        return tag.name;
      }
    }
    return '';
  }

  function renderCategoryHeaderSummary(container, state, articlesResult) {
    var categoryName = getCategoryDisplayName(state.categoryId);
    var total = typeof articlesResult.totalCount === 'number' ? articlesResult.totalCount : (articlesResult.articles ? articlesResult.articles.length : 0);
    var subtitle = 'Articles in ' + categoryName;

    var filtersSummaryParts = [];
    if (state.tagSlugs && state.tagSlugs.length) {
      filtersSummaryParts.push('Tag: ' + state.tagSlugs.join(', '));
    }
    if (state.dateFrom || state.dateTo) {
      var datePart = 'Date';
      if (state.dateFrom && state.dateTo) {
        datePart += ' ' + state.dateFrom + ' to ' + state.dateTo;
      } else if (state.dateFrom) {
        datePart += ' from ' + state.dateFrom;
      } else if (state.dateTo) {
        datePart += ' up to ' + state.dateTo;
      }
      filtersSummaryParts.push(datePart);
    }
    if (state.readingTimeMax !== null) {
      filtersSummaryParts.push('Reading time  ' + state.readingTimeMax + ' min');
    }
    if (state.difficulty) {
      filtersSummaryParts.push('Difficulty: ' + formatDifficultyLabel(state.difficulty));
    }
    if (state.minUpvotes !== null) {
      filtersSummaryParts.push('Min upvotes: ' + state.minUpvotes);
    }
    if (state.challengeYearFrom || state.challengeYearTo) {
      var yearPart = 'Challenge year';
      if (state.challengeYearFrom && state.challengeYearTo) {
        yearPart += ' ' + state.challengeYearFrom + '-' + state.challengeYearTo;
      } else if (state.challengeYearFrom) {
        yearPart += ' from ' + state.challengeYearFrom;
      } else if (state.challengeYearTo) {
        yearPart += ' up to ' + state.challengeYearTo;
      }
      filtersSummaryParts.push(yearPart);
    }

    var summaryText = filtersSummaryParts.length ? filtersSummaryParts.join(' · ') : 'No filters applied';
    var totalText = total + ' article' + (total === 1 ? '' : 's');

    container.innerHTML = `
      <h1 class='hero-title'>${escapeHtml(categoryName)}</h1>
      <p class='hero-subtitle'>${escapeHtml(subtitle)} · ${escapeHtml(totalText)}</p>
      <p class='hero-meta'>${escapeHtml(summaryText)}</p>
    `;
  }

  function renderFilterSidebar(formElement, filterOptions, state) {
    var tagsHtml = '';
    if (filterOptions.availableTags && filterOptions.availableTags.length) {
      tagsHtml = filterOptions.availableTags.map(function(tag) {
        var checked = state.tagSlugs.indexOf(tag.slug) !== -1 ? ' checked' : '';
        return `
          <label class='tag-checkbox'>
            <input type='checkbox' name='tag' value='${escapeHtml(tag.slug)}'${checked}>
            <span>${escapeHtml(tag.name)}</span>
          </label>
        `;
      }).join('');
    } else {
      tagsHtml = "<p class='muted'>No tags available for this category.</p>";
    }

    var readingTimeRange = filterOptions.readingTimeRange || {};
    var readingTimeMin = typeof readingTimeRange.minMinutes === 'number' ? readingTimeRange.minMinutes : '';
    var readingTimeMax = typeof readingTimeRange.maxMinutes === 'number' ? readingTimeRange.maxMinutes : '';
    var readingTimeValue = state.readingTimeMax !== null && state.readingTimeMax !== undefined && !isNaN(state.readingTimeMax)
      ? state.readingTimeMax
      : (readingTimeMax || '');

    var upvoteRange = filterOptions.upvoteRange || {};
    var upvotesMin = typeof upvoteRange.minUpvotes === 'number' ? upvoteRange.minUpvotes : '';
    var upvotesMax = typeof upvoteRange.maxUpvotes === 'number' ? upvoteRange.maxUpvotes : '';
    var minUpvotesValue = state.minUpvotes !== null && state.minUpvotes !== undefined && !isNaN(state.minUpvotes)
      ? state.minUpvotes
      : '';

    var difficultyOptions = filterOptions.difficultyOptions || [];
    var difficultyOptionsHtml = difficultyOptions.map(function(d) {
      var selected = state.difficulty === d ? ' selected' : '';
      return `<option value='${escapeHtml(d)}'${selected}>${escapeHtml(formatDifficultyLabel(d))}</option>`;
    }).join('');

    formElement.innerHTML = `
      <h2 class='filter-sidebar-title'>Filter articles</h2>

      <section class='filter-group'>
        <h3 class='filter-group-title'>Tags</h3>
        <div class='filter-tags-list'>
          ${tagsHtml}
        </div>
      </section>

      <section class='filter-group'>
        <h3 class='filter-group-title'>Published date</h3>
        <div class='filter-row filter-row-dates'>
          <label>
            <span>From</span>
            <input type='date' name='dateFrom' value='${escapeHtml(state.dateFrom || '')}'>
          </label>
          <label>
            <span>To</span>
            <input type='date' name='dateTo' value='${escapeHtml(state.dateTo || '')}'>
          </label>
        </div>
      </section>

      <section class='filter-group'>
        <h3 class='filter-group-title'>Max reading time (minutes)</h3>
        <div class='filter-row'>
          <input type='number' name='readingTimeMax' min='${escapeHtml(readingTimeMin)}' max='${escapeHtml(readingTimeMax)}' value='${escapeHtml(readingTimeValue)}' placeholder='${escapeHtml(readingTimeMax || '')}'>
          <small class='form-text muted'>Leave empty for any length.</small>
        </div>
      </section>

      <section class='filter-group'>
        <h3 class='filter-group-title'>Difficulty</h3>
        <div class='filter-row'>
          <select name='difficulty'>
            <option value=''>Any difficulty</option>
            ${difficultyOptionsHtml}
          </select>
        </div>
      </section>

      <section class='filter-group'>
        <h3 class='filter-group-title'>Minimum upvotes</h3>
        <div class='filter-row'>
          <input type='number' name='minUpvotes' min='${escapeHtml(upvotesMin)}' max='${escapeHtml(upvotesMax)}' value='${escapeHtml(minUpvotesValue)}' placeholder='${escapeHtml(upvotesMin || '')}'>
        </div>
      </section>

      <section class='filter-group'>
        <h3 class='filter-group-title'>CTF challenge year</h3>
        <div class='filter-row filter-row-years'>
          <label>
            <span>From</span>
            <input type='number' name='challengeYearFrom' value='${escapeHtml(state.challengeYearFrom !== null && state.challengeYearFrom !== undefined ? state.challengeYearFrom : '')}' placeholder='e.g. 2022'>
          </label>
          <label>
            <span>To</span>
            <input type='number' name='challengeYearTo' value='${escapeHtml(state.challengeYearTo !== null && state.challengeYearTo !== undefined ? state.challengeYearTo : '')}' placeholder='e.g. 2024'>
          </label>
        </div>
      </section>

      <div class='filter-actions'>
        <button type='submit' class='btn btn-primary'>Apply filters</button>
      </div>
    `;
  }

  function buildActiveFiltersChips(state, filterOptions) {
    var chips = [];

    if (state.tagSlugs && state.tagSlugs.length) {
      state.tagSlugs.forEach(function(slug) {
        var name = getTagDisplayName(slug, filterOptions) || slug;
        var label = 'Tag: ' + name;
        chips.push(`
          <button type='button' class='filter-chip' data-action='remove-filter' data-filter-key='tag' data-filter-value='${escapeHtml(slug)}'>
            ${escapeHtml(label)}<span aria-hidden='true'> ×</span>
          </button>
        `);
      });
    }

    if (state.dateFrom || state.dateTo) {
      var dateLabel = 'Date';
      if (state.dateFrom && state.dateTo) {
        dateLabel += ' ' + state.dateFrom + ' to ' + state.dateTo;
      } else if (state.dateFrom) {
        dateLabel += ' from ' + state.dateFrom;
      } else if (state.dateTo) {
        dateLabel += ' up to ' + state.dateTo;
      }
      chips.push(`
        <button type='button' class='filter-chip' data-action='remove-filter' data-filter-key='dateRange'>
          ${escapeHtml(dateLabel)}<span aria-hidden='true'> ×</span>
        </button>
      `);
    }

    if (state.readingTimeMax !== null && state.readingTimeMax !== undefined && !isNaN(state.readingTimeMax)) {
      var rtLabel = 'Reading time ≤ ' + state.readingTimeMax + ' min';
      chips.push(`
        <button type='button' class='filter-chip' data-action='remove-filter' data-filter-key='readingTimeMax'>
          ${escapeHtml(rtLabel)}<span aria-hidden='true'> ×</span>
        </button>
      `);
    }

    if (state.difficulty) {
      var diffLabel = 'Difficulty: ' + formatDifficultyLabel(state.difficulty);
      chips.push(`
        <button type='button' class='filter-chip' data-action='remove-filter' data-filter-key='difficulty'>
          ${escapeHtml(diffLabel)}<span aria-hidden='true'> ×</span>
        </button>
      `);
    }

    if (state.minUpvotes !== null && state.minUpvotes !== undefined && !isNaN(state.minUpvotes)) {
      var muLabel = 'Min upvotes: ' + state.minUpvotes;
      chips.push(`
        <button type='button' class='filter-chip' data-action='remove-filter' data-filter-key='minUpvotes'>
          ${escapeHtml(muLabel)}<span aria-hidden='true'> ×</span>
        </button>
      `);
    }

    if (state.challengeYearFrom || state.challengeYearTo) {
      var yearLabel = 'Challenge year';
      if (state.challengeYearFrom && state.challengeYearTo) {
        yearLabel += ' ' + state.challengeYearFrom + '-' + state.challengeYearTo;
      } else if (state.challengeYearFrom) {
        yearLabel += ' from ' + state.challengeYearFrom;
      } else if (state.challengeYearTo) {
        yearLabel += ' up to ' + state.challengeYearTo;
      }
      chips.push(`
        <button type='button' class='filter-chip' data-action='remove-filter' data-filter-key='challengeYearRange'>
          ${escapeHtml(yearLabel)}<span aria-hidden='true'> ×</span>
        </button>
      `);
    }

    if (!chips.length) {
      return '';
    }

    return `
      <div class='active-filters'>
        <span class='active-filters-label'>Active filters:</span>
        ${chips.join('')}
        <button type='button' class='filter-chip clear-all' data-action='clear-all-filters'>Clear all</button>
      </div>
    `;
  }

  function renderSortAndActiveFilters(container, filterOptions, state, articlesResult) {
    var total = typeof articlesResult.totalCount === 'number' ? articlesResult.totalCount : (articlesResult.articles ? articlesResult.articles.length : 0);
    var totalText = total + ' article' + (total === 1 ? '' : 's');

    var sortOptions = filterOptions.availableSortOptions || [];
    var sortOptionsHtml = sortOptions.map(function(opt, index) {
      var selected = state.sort ? (state.sort === opt.value ? ' selected' : '') : (index === 0 ? ' selected' : '');
      return `<option value='${escapeHtml(opt.value)}'${selected}>${escapeHtml(opt.label)}</option>`;
    }).join('');

    var chipsHtml = buildActiveFiltersChips(state, filterOptions);

    container.innerHTML = `
      <div class='listing-controls-header'>
        <div class='listing-heading'>
          <span class='section-label'>Articles</span>
          <span class='article-count'>${escapeHtml(totalText)}</span>
        </div>
        <div class='sort-control'>
          <label for='sortSelect'>Sort by</label>
          <select id='sortSelect' name='sort' data-action='change-sort'>
            ${sortOptionsHtml}
          </select>
        </div>
      </div>
      ${chipsHtml}
    `;
  }

  function renderArticleList(container, articlesResult, state) {
    var total = typeof articlesResult.totalCount === 'number' ? articlesResult.totalCount : 0;
    if (!total || !articlesResult.articles || !articlesResult.articles.length) {
      container.innerHTML = `
        <div class='empty-state'>
          <h2>No articles match your filters</h2>
          <p>Try adjusting or clearing some filters like tags, date range, reading time, or minimum upvotes.</p>
        </div>
      `;
      return;
    }

    var cardsHtml = articlesResult.articles.map(function(article) {
      return renderArticleCardHtml(article);
    }).join('');

    container.innerHTML = cardsHtml;
  }

  function renderArticleCardHtml(article) {
    var publishedDate = '';
    if (article.publishedAt) {
      try {
        var d = new Date(article.publishedAt);
        if (!isNaN(d.getTime())) {
          publishedDate = d.toLocaleDateString();
        }
      } catch (e) {
        publishedDate = article.publishedAt;
      }
    }

    var tagsHtml = '';
    if (article.tags && article.tags.length) {
      tagsHtml = `
        <div class='article-tags'>
          ${article.tags.map(function(tag) {
            return `<button type='button' class='tag-chip' data-action='tag-from-card' data-tag-slug='${escapeHtml(tag.slug)}'>${escapeHtml(tag.name)}</button>`;
          }).join('')}
        </div>
      `;
    }

    var difficultyLabel = article.difficulty ? formatDifficultyLabel(article.difficulty) : '';
    var readingStatusLabel = formatReadingStatusLabel(article.readingStatus);

    var bookmarkClass = article.isBookmarkedInReadingList ? 'bookmark-btn is-bookmarked' : 'bookmark-btn';
    var bookmarkLabel = article.isBookmarkedInReadingList ? 'Saved' : 'Save';

    var ratingText = '';
    if (article.averageRating !== null && article.averageRating !== undefined && !isNaN(article.averageRating)) {
      ratingText = 'Rating: ' + article.averageRating.toFixed(1) + ' / 5';
    }

    var challengeYearText = '';
    if (article.challengeYear) {
      challengeYearText = 'Challenge ' + article.challengeYear;
    }

    return `
      <article class='article-card' data-article-id='${escapeHtml(article.articleId)}' data-component='article-card'>
        <header class='article-card-header'>
          <h2 class='article-title'>
            <a href='javascript:void(0)' data-action='open-article' data-article-id='${escapeHtml(article.articleId)}'>${escapeHtml(article.title)}</a>
          </h2>
          <button type='button'
                  class='${bookmarkClass}'
                  data-action='toggle-bookmark'
                  data-article-id='${escapeHtml(article.articleId)}'
                  aria-pressed='${article.isBookmarkedInReadingList ? 'true' : 'false'}'>
            ${escapeHtml(bookmarkLabel)}
          </button>
        </header>
        <p class='article-summary'>${escapeHtml(article.summary || '')}</p>
        <div class='article-meta'>
          <span>${escapeHtml(publishedDate)}</span>
          <span>· ${escapeHtml(article.readingTimeMinutes)} min read</span>
          <span>· ${escapeHtml(article.upvotes)} upvotes</span>
          <span>· ${escapeHtml(article.commentCount)} comments</span>
          ${ratingText ? `<span>· ${escapeHtml(ratingText)}</span>` : ''}
        </div>
        <div class='article-meta-secondary'>
          ${difficultyLabel ? `<span>Difficulty: ${escapeHtml(difficultyLabel)}</span>` : ''}
          ${challengeYearText ? `<span>${escapeHtml(challengeYearText)}</span>` : ''}
          ${readingStatusLabel ? `<span>Status: ${escapeHtml(readingStatusLabel)}</span>` : ''}
        </div>
        ${tagsHtml}
      </article>
    `;
  }

  function renderPagination(container, articlesResult, state) {
    var totalCount = typeof articlesResult.totalCount === 'number' ? articlesResult.totalCount : 0;
    var pageSize = typeof articlesResult.pageSize === 'number' ? articlesResult.pageSize : 10;
    var currentPage = typeof articlesResult.page === 'number' ? articlesResult.page : state.page;

    if (!totalCount || totalCount <= pageSize) {
      container.innerHTML = '';
      return;
    }

    var totalPages = Math.ceil(totalCount / pageSize);
    if (totalPages < 1) totalPages = 1;

    var pagesHtml = '';
    for (var p = 1; p <= totalPages; p++) {
      var isCurrent = p === currentPage;
      pagesHtml += `
        <button type='button'
                class='page-link${isCurrent ? ' is-current' : ''}'
                data-action='change-page'
                data-page='${p}'
                ${isCurrent ? "aria-current='page'" : ''}>
          ${p}
        </button>
      `;
    }

    var prevDisabled = currentPage === 1 ? ' disabled' : '';
    var nextDisabled = currentPage === totalPages ? ' disabled' : '';

    container.innerHTML = `
      <div class='pagination-inner'>
        <button type='button' class='page-nav prev' data-action='change-page' data-page='${currentPage - 1}'${prevDisabled}>Previous</button>
        ${pagesHtml}
        <button type='button' class='page-nav next' data-action='change-page' data-page='${currentPage + 1}'${nextDisabled}>Next</button>
      </div>
    `;
  }

  function buildCategoryUrlFromState(state) {
    var params = new URLSearchParams();
    params.set('categoryId', state.categoryId);

    if (state.tagSlugs && state.tagSlugs.length) {
      params.set('tag', state.tagSlugs.join(','));
    }
    if (state.dateFrom) {
      params.set('dateFrom', state.dateFrom);
    }
    if (state.dateTo) {
      params.set('dateTo', state.dateTo);
    }
    if (state.readingTimeMax !== null && state.readingTimeMax !== undefined && !isNaN(state.readingTimeMax)) {
      params.set('readingTimeMax', String(state.readingTimeMax));
    }
    if (state.difficulty) {
      params.set('difficulty', state.difficulty);
    }
    if (state.minUpvotes !== null && state.minUpvotes !== undefined && !isNaN(state.minUpvotes)) {
      params.set('minUpvotes', String(state.minUpvotes));
    }
    if (state.challengeYearFrom !== null && state.challengeYearFrom !== undefined && !isNaN(state.challengeYearFrom)) {
      params.set('challengeYearFrom', String(state.challengeYearFrom));
    }
    if (state.challengeYearTo !== null && state.challengeYearTo !== undefined && !isNaN(state.challengeYearTo)) {
      params.set('challengeYearTo', String(state.challengeYearTo));
    }
    if (state.sort) {
      params.set('sort', state.sort);
    }

    var page = state.page && state.page > 0 ? state.page : 1;
    params.set('page', String(page));

    var qs = params.toString();
    return 'category.html' + (qs ? '?' + qs : '');
  }

  function navigateToCategoryWithTag(categoryId, tagSlug, currentState) {
    var newState = {
      categoryId: categoryId,
      tagSlugs: [tagSlug],
      dateFrom: currentState.dateFrom,
      dateTo: currentState.dateTo,
      readingTimeMax: currentState.readingTimeMax,
      difficulty: currentState.difficulty,
      minUpvotes: currentState.minUpvotes,
      challengeYearFrom: currentState.challengeYearFrom,
      challengeYearTo: currentState.challengeYearTo,
      sort: currentState.sort,
      page: 1
    };
    var url = buildCategoryUrlFromState(newState);
    window.location.href = url;
  }

  function handleFiltersSubmit(form, state) {
    var formData = new FormData(form);

    var tagSlugs = formData.getAll('tag').map(function(value) { return String(value); });

    var dateFrom = (formData.get('dateFrom') || '').trim();
    var dateTo = (formData.get('dateTo') || '').trim();

    var readingTimeMaxVal = (formData.get('readingTimeMax') || '').trim();
    var readingTimeMax = null;
    if (readingTimeMaxVal !== '') {
      var rt = Number(readingTimeMaxVal);
      readingTimeMax = isNaN(rt) ? null : rt;
    }

    var difficulty = (formData.get('difficulty') || '').trim();

    var minUpvotesVal = (formData.get('minUpvotes') || '').trim();
    var minUpvotes = null;
    if (minUpvotesVal !== '') {
      var mu = Number(minUpvotesVal);
      minUpvotes = isNaN(mu) ? null : mu;
    }

    var challengeYearFromVal = (formData.get('challengeYearFrom') || '').trim();
    var challengeYearFrom = null;
    if (challengeYearFromVal !== '') {
      var cyf = Number(challengeYearFromVal);
      challengeYearFrom = isNaN(cyf) ? null : cyf;
    }

    var challengeYearToVal = (formData.get('challengeYearTo') || '').trim();
    var challengeYearTo = null;
    if (challengeYearToVal !== '') {
      var cyt = Number(challengeYearToVal);
      challengeYearTo = isNaN(cyt) ? null : cyt;
    }

    var newState = {
      categoryId: state.categoryId,
      tagSlugs: tagSlugs,
      dateFrom: dateFrom,
      dateTo: dateTo,
      readingTimeMax: readingTimeMax,
      difficulty: difficulty,
      minUpvotes: minUpvotes,
      challengeYearFrom: challengeYearFrom,
      challengeYearTo: challengeYearTo,
      sort: state.sort,
      page: 1
    };

    var url = buildCategoryUrlFromState(newState);
    window.location.href = url;
  }

  function handleSortChange(selectElement, state) {
    var newSort = (selectElement.value || '').trim();
    var newState = {
      categoryId: state.categoryId,
      tagSlugs: state.tagSlugs.slice(),
      dateFrom: state.dateFrom,
      dateTo: state.dateTo,
      readingTimeMax: state.readingTimeMax,
      difficulty: state.difficulty,
      minUpvotes: state.minUpvotes,
      challengeYearFrom: state.challengeYearFrom,
      challengeYearTo: state.challengeYearTo,
      sort: newSort,
      page: 1
    };
    var url = buildCategoryUrlFromState(newState);
    window.location.href = url;
  }

  function handleRemoveFilterChip(target, state) {
    var key = target.getAttribute('data-filter-key');
    var value = target.getAttribute('data-filter-value') || '';

    var newState = {
      categoryId: state.categoryId,
      tagSlugs: state.tagSlugs.slice(),
      dateFrom: state.dateFrom,
      dateTo: state.dateTo,
      readingTimeMax: state.readingTimeMax,
      difficulty: state.difficulty,
      minUpvotes: state.minUpvotes,
      challengeYearFrom: state.challengeYearFrom,
      challengeYearTo: state.challengeYearTo,
      sort: state.sort,
      page: 1
    };

    if (key === 'tag') {
      newState.tagSlugs = newState.tagSlugs.filter(function(slug) { return slug !== value; });
    } else if (key === 'dateRange') {
      newState.dateFrom = '';
      newState.dateTo = '';
    } else if (key === 'readingTimeMax') {
      newState.readingTimeMax = null;
    } else if (key === 'difficulty') {
      newState.difficulty = '';
    } else if (key === 'minUpvotes') {
      newState.minUpvotes = null;
    } else if (key === 'challengeYearRange') {
      newState.challengeYearFrom = null;
      newState.challengeYearTo = null;
    }

    var url = buildCategoryUrlFromState(newState);
    window.location.href = url;
  }

  function handleClearAllFilters(state) {
    var newState = {
      categoryId: state.categoryId,
      tagSlugs: [],
      dateFrom: '',
      dateTo: '',
      readingTimeMax: null,
      difficulty: '',
      minUpvotes: null,
      challengeYearFrom: null,
      challengeYearTo: null,
      sort: state.sort,
      page: 1
    };
    var url = buildCategoryUrlFromState(newState);
    window.location.href = url;
  }

  function handleToggleBookmark(buttonElement, articleId) {
    try {
      var result = WebsiteSDK.toggleBookmarkDefaultReadingList(articleId);
      if (!result || !result.success) {
        var errMessage = result && result.message ? result.message : 'Could not update bookmark.';
        showBookmarkToast(errMessage, false, result);
        return;
      }

      var isBookmarked = !!result.isBookmarked;
      buttonElement.classList.toggle('is-bookmarked', isBookmarked);
      buttonElement.setAttribute('aria-pressed', isBookmarked ? 'true' : 'false');
      buttonElement.textContent = isBookmarked ? 'Saved' : 'Save';

      var message = result.message || (isBookmarked ? 'Added to Reading List.' : 'Removed from Reading List.');
      showBookmarkToast(message, true, result);
    } catch (err) {
      console.error('Error toggling bookmark', err);
      showBookmarkToast('Could not update bookmark.', false, null);
    }
  }

  function showBookmarkToast(message, success, sdkResult) {
    var toast = document.querySelector('[data-component="bookmark-feedback-toast"]');
    if (!toast) return;

    var detail = '';
    if (sdkResult && typeof sdkResult.totalItemsInCollection === 'number') {
      var count = sdkResult.totalItemsInCollection;
      detail = 'Reading List · ' + count + ' article' + (count === 1 ? '' : 's');
    }

    var statusClass = success ? 'toast-success' : 'toast-error';

    toast.innerHTML = `
      <div class='toast-inner ${statusClass}'>
        <div class='toast-body'>
          <span class='toast-message'>${escapeHtml(message)}</span>
          ${detail ? `<span class='toast-detail'>${escapeHtml(detail)}</span>` : ''}
        </div>
        <button type='button' class='toast-close' data-action='dismiss-toast' aria-label='Dismiss notification'>×</button>
      </div>
    `;

    toast.classList.add('is-visible');

    if (window.__bookmarkToastTimeout) {
      window.clearTimeout(window.__bookmarkToastTimeout);
    }
    window.__bookmarkToastTimeout = window.setTimeout(function() {
      hideBookmarkToast();
    }, 4000);
  }

  function hideBookmarkToast() {
    var toast = document.querySelector('[data-component="bookmark-feedback-toast"]');
    if (!toast) return;
    toast.classList.remove('is-visible');
  }

  function setupGlobalHandlers(state, filterOptions) {
    // Filter form submission
    var filterForm = document.querySelector('[data-component="filter-sidebar"]');
    if (filterForm) {
      filterForm.addEventListener('submit', function(event) {
        event.preventDefault();
        handleFiltersSubmit(filterForm, state);
      });
    }

    // Sort & active filters bar
    var listingControls = document.querySelector('[data-component="sort-and-active-filters-bar"]');
    if (listingControls) {
      listingControls.addEventListener('change', function(event) {
        var target = event.target;
        if (target && target.getAttribute('data-action') === 'change-sort') {
          handleSortChange(target, state);
        }
      });

      listingControls.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) return;
        var action = target.getAttribute('data-action');
        if (action === 'remove-filter') {
          handleRemoveFilterChip(target, state);
        } else if (action === 'clear-all-filters') {
          handleClearAllFilters(state);
        }
      });
    }

    // Article list interactions (title click, tag click, bookmark)
    var articleList = document.querySelector('[data-component="article-list"]');
    if (articleList) {
      articleList.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) return;
        var action = target.getAttribute('data-action');

        if (action === 'open-article') {
          var articleId = target.getAttribute('data-article-id');
          if (articleId) {
            window.location.href = 'article.html?articleId=' + encodeURIComponent(articleId);
          }
        } else if (action === 'tag-from-card') {
          var slug = target.getAttribute('data-tag-slug');
          if (slug) {
            navigateToCategoryWithTag(state.categoryId, slug, state);
          }
        } else if (action === 'toggle-bookmark') {
          var articleId2 = target.getAttribute('data-article-id');
          if (articleId2) {
            handleToggleBookmark(target, articleId2);
          }
        }
      });
    }

    // Pagination controls
    var paginationContainer = document.querySelector('[data-component="pagination-controls"]');
    if (paginationContainer) {
      paginationContainer.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action="change-page"]');
        if (!target || target.hasAttribute('disabled')) return;
        var pageStr = target.getAttribute('data-page');
        var page = parseInt(pageStr, 10);
        if (!page || page === state.page) return;
        var newState = {
          categoryId: state.categoryId,
          tagSlugs: state.tagSlugs.slice(),
          dateFrom: state.dateFrom,
          dateTo: state.dateTo,
          readingTimeMax: state.readingTimeMax,
          difficulty: state.difficulty,
          minUpvotes: state.minUpvotes,
          challengeYearFrom: state.challengeYearFrom,
          challengeYearTo: state.challengeYearTo,
          sort: state.sort,
          page: page
        };
        var url = buildCategoryUrlFromState(newState);
        window.location.href = url;
      });
    }

    // Header search form
    var headerSearchForm = document.querySelector('[data-action="header-search-form"]');
    if (headerSearchForm) {
      headerSearchForm.addEventListener('submit', function(event) {
        event.preventDefault();
        var input = headerSearchForm.querySelector('input[name="query"]');
        var query = input && input.value ? input.value.trim() : '';
        if (!query) return;
        var url = 'search.html?query=' + encodeURIComponent(query);
        window.location.href = url;
      });
    }

    // Toast dismiss
    var toast = document.querySelector('[data-component="bookmark-feedback-toast"]');
    if (toast) {
      toast.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action="dismiss-toast"]');
        if (!target) return;
        hideBookmarkToast();
      });
    }
  }
  </script>
</body>
