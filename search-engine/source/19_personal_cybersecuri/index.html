            localStorage.setItem("articles", "[{\"id\":\"art_wifi_home_lockdown\",\"title\":\"Lock Down Your Home Wi‑Fi in 10 Minutes (Beginner Guide)\",\"slug\":\"lock-down-home-wifi-10-minutes-beginner\",\"category_id\":\"beginner\",\"content_type\":\"guides_how_tos\",\"summary\":\"Step-by-step checklist to secure your home router, change default passwords, and enable strong Wi‑Fi encryption in under 10 minutes.\",\"content_html\":\"# Lock Down Your Home Wi‑Fi in 10 Minutes\\n\\nSecuring your home Wi‑Fi is one of the highest‑impact things you can do as a beginner.\\n\\n## Steps\\n\\n1. **Change the default admin password** on your router.\\n2. **Enable WPA2 or WPA3** and disable WEP.\\n3. **Update router firmware** to the latest version.\\n4. **Turn off WPS** if you don't need it.\\n\\n## Next steps\\n\\nIf you want to go deeper, check out the follow‑up guides linked at the end of this article.\",\"published_at\":\"2025-06-01T10:00:00Z\",\"updated_at\":\"2025-06-01T10:00:00Z\",\"reading_time_minutes\":7,\"upvotes\":34,\"difficulty\":\"beginner\",\"reading_status\":\"not_started\",\"comment_count\":0,\"rating_count\":0,\"average_rating\":null},{\"id\":\"art_wifi_public_checklist\",\"title\":\"Beginner’s Checklist for Staying Safe on Public Wi‑Fi\",\"slug\":\"beginners-checklist-safe-public-wifi\",\"category_id\":\"beginner\",\"content_type\":\"articles\",\"summary\":\"A beginner-friendly checklist to keep your accounts and data safe when using coffee shop and airport Wi‑Fi networks.\",\"content_html\":\"# Beginner’s Checklist for Staying Safe on Public Wi‑Fi\\n\\nPublic Wi‑Fi is convenient, but it comes with real risks.\\n\\n## Key rules\\n\\n- Avoid logging into sensitive accounts.\\n- Prefer **HTTPS** sites.\\n- Use a **VPN** if you have one.\\n\\n## Quick actions\\n\\nRun through this checklist before you connect to any open network.\",\"published_at\":\"2024-11-02T09:30:00Z\",\"updated_at\":\"2024-11-02T09:30:00Z\",\"reading_time_minutes\":5,\"upvotes\":27,\"difficulty\":\"beginner\",\"reading_status\":\"not_started\",\"comment_count\":0,\"rating_count\":0,\"average_rating\":null},{\"id\":\"art_wifi_quick_wins\",\"title\":\"5 Quick Wins to Upgrade Your Wi‑Fi Security Today\",\"slug\":\"5-quick-wins-upgrade-wifi-security\",\"category_id\":\"beginner\",\"content_type\":\"articles\",\"summary\":\"Five simple Wi‑Fi security tweaks any beginner can apply in under an hour, with screenshots and clear explanations.\",\"content_html\":\"# 5 Quick Wins to Upgrade Your Wi‑Fi Security Today\\n\\nYou don’t need to be a hacker to make your Wi‑Fi harder to attack.\\n\\n## Quick wins\\n\\n1. Rename your SSID to something non‑identifying.\\n2. Use a **unique, strong Wi‑Fi password**.\\n3. Separate guest devices onto a guest network.\\n4. Disable remote administration.\\n5. Schedule regular firmware checks.\",\"published_at\":\"2023-08-15T15:45:00Z\",\"updated_at\":\"2023-08-15T15:45:00Z\",\"reading_time_minutes\":6,\"upvotes\":19,\"difficulty\":\"beginner\",\"reading_status\":\"not_started\",\"comment_count\":0,\"rating_count\":0,\"average_rating\":null},{\"id\":\"art_vpn_setup_beginners\",\"title\":\"VPN Setup for Absolute Beginners (Desktop & Mobile)\",\"slug\":\"vpn-setup-absolute-beginners-desktop-mobile\",\"category_id\":\"beginner\",\"content_type\":\"guides_how_tos\",\"summary\":\"A friendly VPN setup guide that walks beginners through installing and configuring a VPN on Windows, macOS, Android, and iOS.\",\"content_html\":\"# VPN Setup for Absolute Beginners\\n\\nIn this guide we’ll install a VPN client, connect to a server, and verify your traffic is actually encrypted.\\n\\n## What you’ll learn\\n\\n- How a VPN protects you on public Wi‑Fi.\\n- How to install a VPN app on desktop and mobile.\\n- How to confirm your IP address really changed.\\n\\n## Step 1: Choose a provider\\n\\nPick any reputable VPN provider that supports your devices. The specific brand doesn’t matter for this tutorial.\",\"published_at\":\"2024-04-12T12:10:00Z\",\"updated_at\":\"2024-04-12T12:10:00Z\",\"reading_time_minutes\":12,\"upvotes\":41,\"difficulty\":\"beginner\",\"reading_status\":\"not_started\",\"comment_count\":5,\"rating_count\":0,\"average_rating\":null},{\"id\":\"art_vpn_setup_routers\",\"title\":\"Advanced VPN Setup: Run Your VPN on the Home Router\",\"slug\":\"advanced-vpn-setup-home-router\",\"category_id\":\"tools\",\"content_type\":\"guides_how_tos\",\"summary\":\"How to terminate your VPN tunnel on the router so every device in your home automatically uses the VPN.\",\"content_html\":\"# Advanced VPN Setup on Your Home Router\\n\\nRunning your VPN on the router centralizes privacy for the whole house.\\n\\n## Prerequisites\\n\\n- A router that supports OpenVPN or WireGuard.\\n- Configuration files from your VPN provider.\\n\\n## High-level steps\\n\\n1. Backup your router config.\\n2. Enable the VPN client in the router UI or flash a custom firmware.\\n3. Import the VPN config and test DNS leaks.\",\"published_at\":\"2023-09-20T18:00:00Z\",\"updated_at\":\"2023-09-20T18:00:00Z\",\"reading_time_minutes\":18,\"upvotes\":33,\"difficulty\":\"intermediate\",\"reading_status\":\"not_started\",\"comment_count\":8,\"rating_count\":0,\"average_rating\":null},{\"id\":\"art_pwmanagers_best_2025\",\"title\":\"The 5 Best Password Managers for 2025 (Hands‑On Review)\",\"slug\":\"5-best-password-managers-2025-review\",\"category_id\":\"tools\",\"content_type\":\"reviews\",\"summary\":\"A practical, hands‑on review of the top 5 password managers in 2025, with threat‑model‑aware recommendations.\",\"content_html\":\"# The 5 Best Password Managers for 2025\\n\\nPassword managers are still the easiest way to upgrade your account security.\\n\\n## Recommended tools\\n\\nWe spent weeks testing popular options and narrowed them down to a shortlist.\\n\\n- Bitwarden\\n- 1Password\\n- KeePassXC\\n- Proton Pass\\n- Dashlane\\n\\nWe’ll compare UX, security model, and export options so you can choose safely.\",\"published_a :00Z\",\"updated_at\":\"2023-12-18T08:40:00Z\",\"reading_time_minutes\":9,\"upvotes\":38,\"difficulty\":\"beginner\",\"recommended_tools\":[\"KeePass\",\"KeePassXC\",\"KeeWeb\",\"Enpass\"],\"reading_status\":\"not_started\",\"comment_count\":0,\"rating_count\":0,\"average_rating\":null},{\"id\":\"art_phishing_5_minutes\",\"title\":\"Spot Phishing Emails in 5 Minutes: A Visual Guide\",\"slug\":\"spot-phishing-emails-5-minutes-visual-guide\",\"category_id\":\"threats\",\"content_type\":\"articles\",\"summary\":\"Short, visual guide to spotting phishing emails using real redacted examples, ideal for quick training.\",\"content_html\":\"# Spot Phishing Emails in 5 Minutes\\n\\nThis article walks through real‑world phishing emails and highlights the red flags.\\n\\n## Common red flags\\n\\n- Mismatched sender display name vs. address\\n- Urgent language combined with login links\\n- Attachments you didn’t ask for\\n\\nUse this as a pre‑meeting warm‑up or a quick refresher.\",\"published_at\":\"2024-03-10T07:50:00Z\",\"updated_at\":\"2024-03-10T07:50:00Z\",\"reading_time_minutes\":6,\"upvotes\":22,\"difficulty\":\"beginner\",\"reading_status\":\"not_started\",\"comment_count\":3,\"rating_count\":0,\"average_rating\":null},{\"id\":\"art_phishing_red_flags\",\"title\":\"11 Red Flags That Scream Phishing\",\"slug\":\"11-red-flags-that-scream-phishing\",\"category_id\":\"threats\",\"content_type\":\"articles\",\"summary\":\"A quick reference list of 11 phishing red flags you can teach to non‑technical friends and family.\",\"content_html\":\"# 11 Red Flags That Scream Phishing\\n\\nEven if you never touch a packet sniffer, you can spot most phishing with simple checks.\\n\\nWe’ll walk through 11 red flags and show how they appear in real messages.\",\"published_at\":\"2023-05-22T16:05:00Z\",\"updated_at\":\"2023-05-22T16:05:00Z\",\"reading_time_minutes\":4,\"upvotes\":8,\"difficulty\":\"beginner\",\"reading_status\":\"not_started\",\"comment_count\":0,\"rating_count\":0,\"ave     document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);

      const state = {
        homePageContent: null,
        isAuthenticated: false,
        username: ''
      };

      function getHomePageContentCached() {
        if (!state.homePageContent) {
          try {
            state.homePageContent = WebsiteSDK.getHomePageContent();
          } catch (err) {
            console.error('Error loading home page content', err);
            state.homePageContent = { featuredArticles: [], latestArticles: [] };
          }
        }
        return state.homePageContent;
      }

      // ---------- Rendering helpers ----------

      function renderNavCategories(container) {
        container.innerHTML = '';

        const homeLi = document.createElement('li');
        const homeLink = document.createElement('a');
        homeLink.href = 'index.html';
        homeLink.textContent = 'Home';
        homeLi.appendChild(homeLink);
        container.appendChild(homeLi);

        let categories = [];
        try {
          categories = WebsiteSDK.getCategoriesForNavigation() || [];
        } catch (err) {
          console.error('Error loading navigation categories', err);
        }

        if (Array.isArray(categories) && categories.length) {
          categories
            .slice()
            .sort(function(a, b) {
              const ao = typeof a.sort_order === 'number' ? a.sort_order : 0;
              const bo = typeof b.sort_order === 'number' ? b.sort_order : 0;
              return ao - bo;
            })
            .forEach(function(cat) {
              const li = document.createElement('li');
              const link = document.createElement('a');
              link.href = 'category.html?categoryId=' + encodeURIComponent(cat.id);
              link.textContent = cat.name || cat.id;
              li.appendChild(link);
              container.appendChild(li);
            });
        }

        // Series link
        const seriesLi = document.createElement('li');
        const seriesLink = document.createElement('a');
        seriesLink.href = 'series.html';
        seriesLink.textContent = 'Series';
        seriesLi.appendChild(seriesLink);
        container.appendChild(seriesLi);

        // Login control

        loginButton.dataset.action = 'open-login-panel';
        loginButton.textContent = 'Login';
        loginLi.appendChild(loginButton);
        container.appendChild(loginLi);
      }

      function formatDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return '';
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      }

      function readingStatusLabel(status) {
        switch (status) {
          case 'not_started':
            return 'Not started';
          case 'in_progress':
            return 'In progress';
          case 'completed':
            return 'Completed';
          default:
            return '';
        }
      }

      function difficultyLabel(diff) {
        switch (diff) {
          case 'beginner':
            return 'Beginner';
          case 'intermediate':
            return 'Intermediate';
          case 'advanced':
            return 'Advanced';
          case 'unspecified':
          default:
            return '';
        }
      }

          diffSpan.className = 'meta-item meta-item-difficulty';
          diffSpan.textContent = diffText;
          metaEl.appendChild(diffSpan);
        }

        card.appendChild(metaEl);

        // Summary
        if (article.summary) {
          var summaryEl = document.createElement('p');
          summaryEl.className = 'post-card-summary';
          summaryEl.textContent = article.summary;
          card.appendChild(summaryEl);
        }

        // Tags
        if (Array.isArray(article.tags) && article.tags.length) {
          var tagsList = document.createElement('ul');
          tagsList.className = 'tag-list';
          article.tags.forEach(function(tag) {
            var li = document.createElement('li');
            li.className = 'tag-item';
            li.textContent = tag.name || tag.slug || '';
            tagsList.appendChild(li);
          });
          card.appendChild(tagsList);
        }

        // Footer meta: upvotes, rating, comments, bookmark, reading status
        var footerMeta = document.createElement('div');
        footerMeta.className = 'post-card-footer';

        var metrics = document.createElement('div');
        metrics.className = 'post-card-metrics';

        if (typeof article.upvotes === 'number') {
          var upv = document.createElement('span');
          upv.className = 'metric-item metric-upvotes';
          upv.textContent = article.upvotes + ' upvotes';
          metrics.appendChild(upv);
        }

        if (typeof article.averageRating === 'number') {
          var rating = document.createElement('span');
          rating.className = 'metric-item metric-rating';
          rating.textContent = article.averageRating.toFixed(1) + ' rating';
          metrics.appendChild(rating);
        }

        if (typeof article.commentCount === 'number') {
          var comments = document.createElement('span');
          comments.className = 'metric-item metric-comments';
          comments.textContent = article.commentCount + ' comments';
          metrics.appendChild(comments);
        }

        footerMeta.appendChild(metrics);

        var readingState = document.createElement('div');
        readingState.className = 'post-card-state';

        var bookmark = document.createElement('span');
        bookmark.className = 'bookmark-indicator';
        if (article.isBookmarkedInReadingList) {
          bookmark.classList.add('is-bookmarked');
          bookmark.textContent = 'In reading list';
        } else {
          bookmark.textContent = 'Not saved';
        }
        readingState.appendChild(bookmark);

        var rsLabel = readingStatusLabel(article.readingStatus);
        if (rsLabel) {
          var rs = document.createElement('span');
          rs.className = 'reading-status-indicator';
          rs.textContent = rsLabel;
          readingState.appendChild(rs);
        }

        footerMeta.appendChild(readingState);
        card.appendChild(footerMeta);

        return card;
      }

      function renderArticleList(container, articles) {
        container.innerHTML = '';
        if (!Array.isArray(articles) || !articles.length) {
          var empty = document.createElement('p');
          empty.className = 'empty-state';
          empty.textContent = 'No articles available yet.';
          container.appendChild(empty);
          return;
        }
        articles.forEach(function(article) {
          var card = createArticleCard(article);
          container.appendChild(card);
        });
      }

      function renderFeaturedArticles(container) {
        var content = getHomePageContentCached();
        var articles = (content && content.featuredArticles) || [];
        renderArticleList(container, articles);
      }

      function renderLatestArticles(container) {
        var content = getHomePageContentCached();
        var articles = (content && content.latestArticles) || [];
        renderArticleList(container, articles);
      }

      function renderPopularSeries(container) {
        container.innerHTML = '';
        var seriesList = [];
        try {
          seriesList = WebsiteSDK.getPopularSeriesForHome() || [];
        } catch (err) {
          console.error('Error loading popular series', err);
        }
        if (!Array.isArray(seriesList) || !seriesList.length) {
          var empty = document.createElement('p');
          empty.className = 'empty-state';
          empty.textContent = 'No popular series to show yet.';
          container.appendChild(empty);
          return;
        }

        seriesList.forEach(function(series) {
          var pill = document.createElement('button');
          pill.type = 'button';
          pill.className = 'series-pill';
          pill.dataset.action = 'open-series';
          pill.dataset.seriesId = series.id;

          var title = document.createElement('span');
          title.className = 'series-pill-title';
          title.textContent = series.title || '';
          pill.appendChild(title);

          var meta = document.createElement('span');
          meta.className = 'series-pill-meta';
          var partsText = typeof series.total_parts === 'number' ? series.total_parts + ' parts' : '';
          var timeText = typeof series.estimated_total_time_minutes === 'number' ? Math.round(series.estimated_total_time_minutes / 10) * 10 + ' min' : '';
          var pieces = [];
          if (partsText) pieces.push(partsText);
          if (timeText) pieces.push(timeText);
          meta.textContent = pieces.join(' b7 ');
          pill.appendChild(meta);

          container.appendChild(pill);
        });
      }

      // ---------- Navigation helpers ----------

      function navigateToCategory(categoryId) {
        if (!categoryId) return;
        window.location.href = 'category.html?categoryId=' + encodeURIComponent(categoryId);
      }

      function navigateToArticle(articleId) {
        if (!articleId) return;
        window.location.href = 'article.html?articleId=' + encodeURIComponent(articleId);
      }

      function navigateToSeries(seriesId) {
        if (!seriesId) return;
        window.location.href = 'series_detail.html?seriesId=' + encodeURIComponent(seriesId);
      }

      function navigateToSearch(query) {
        window.location.href = 'search.html?query=' + encodeURIComponent(query);
      }

      // ---------- Action handlers ----------

      function handleGlobalSearchSubmit(event) {
        event.preventDefault();
        var form = event.currentTarget;
        var input = form.querySelector('input[name="query"]');
        var messageEl = form.querySelector('.form-message');
        if (messageEl) {
          messageEl.textContent = '';
          messageEl.classList.remove('form-message--error');
        }
        var term = input ? input.value.trim() : '';
        if (!term) {
          if (messageEl) {
            messageEl.textContent = 'Enter a search term to begin.';
            messageEl.classList.add('form-message--error');
          }
          if (input) input.focus();
          return;
        }
        navigateToSearch(term);
      }

      function handleOpenLoginPanel() {
        var panel = document.querySelector('[data-component="login-panel"]');
        if (!panel) return;
        panel.classList.add('login-panel--visible');
        var form = panel.querySelector('.login-form');
        var success = panel.querySelector('.login-success-state');
        if (state.isAuthenticated && success && form) {
          form.hidden = true;
          success.hidden = false;
        }
        var usernameInput = panel.querySelector('input[name="username"]');
        if (usernameInput) {
          usernameInput.focus();
        }
      }

      function handleCloseLoginPanel() {
        var panel = document.querySelector('[data-component="login-panel"]');
        if (!panel) return;
        panel.classList.remove('login-panel--visible');
      }

      function handleLoginSubmit(event) {
        event.preventDefault();
        var form = event.currentTarget;
        var usernameInput = form.querySelector('input[name="username"]');
        var passwordInput = form.querySelector('input[name="password"]');
        var messageEl = form.querySelector('.form-message');
        var submitButton = form.querySelector('.login-submit-button');
        if (messageEl) {
          messageEl.textContent = '';
          messageEl.classList.remove('form-message--error');
        }
        var username = usernameInput ? usernameInput.value.trim() : '';
        var password = passwordInput ? passwordInput.value : '';
        if (!username || !password) {
          if (messageEl) {
            messageEl.textContent = 'Enter both username and password.';
            messageEl.classList.add('form-message--error');
          }
          return;
        }
        if (submitButton) submitButton.disabled = true;
        try {
          var result = WebsiteSDK.login(username, password);
          if (result && result.success && result.isAuthenticated) {
            state.isAuthenticated = true;
            state.username = username;
            if (messageEl) {
              messageEl.textContent = result.message || 'Login successful.';
              messageEl.classList.remove('form-message--error');
            }
            var successState = form.parentElement.querySelector('.login-success-state');
            if (successState) {
              form.hidden = true;
              successState.hidden = false;
              var statusText = successState.querySelector('.login-status-text');
              if (statusText && username) {
                statusText.textContent = 'Signed in as ' + username + '.';
              }
            }
          } else {
            if (messageEl) {
              messageEl.textContent = (result && result.message) || 'Login failed. Please try again.';
              messageEl.classList.add('form-message--error');
            }
          }
        } catch (err) {
          console.error('Login error', err);
          if (messageEl) {
            messageEl.textContent = 'An unexpected error occurred while logging in.';
            messageEl.classList.add('form-message--error');
          }
        } finally {
          if (submitButton) submitButton.disabled = false;
        }
      }

      function handleOpenArticle(event) {
        var target = event.currentTarget;
        var articleId = target.dataset.articleId;
        navigateToArticle(articleId);
      }

      function handleOpenCategory(event) {
        event.stopPropagation();
        var target = event.currentTarget;
        var categoryId = target.dataset.categoryId;
        navigateToCategory(categoryId);
      }

      function handleOpenSeries(event) {
        var target = event.currentTarget;
        var seriesId = target.dataset.seriesId;
        navigateToSeries(seriesId);
      }

      // ---------- Initialization ----------

      function initializeDataPopulation() {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          var dataType = element.dataset.populate;
          switch (dataType) {
            case 'nav-categories':
              renderNavCategories(element);
              break;
            case 'featured-articles':
              renderFeaturedArticles(element);
              break;
            case 'latest-articles':
              renderLatestArticles(element);
              break;
            case 'popular-series':
              renderPopularSeries(element);
              break;
            default:
              break;
          }
        });
      }

      function bindActions() {
        var actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function(element) {
          var action = element.dataset.action;
          switch (action) {
            case 'global-search-submit':
              element.addEventListener('submit', handleGlobalSearchSubmit);
              break;
            case 'open-login-panel':
              element.addEventListener('click', handleOpenLoginPanel);
              break;
            case 'close-login-panel':
              element.addEventListener('click', handleCloseLoginPanel);
              break;
            case 'login-submit':
              element.addEventListener('submit', handleLoginSubmit);
              break;
            case 'open-article':
              element.addEventListener('click', handleOpenArticle);
              element.addEventListener('keydown', function(evt) {
                if (evt.key === 'Enter' || evt.key === ' ') {
                  evt.preventDefault();
                  handleOpenArticle(evt);
                }
              });
              break;
            case 'open-category':
              element.addEventListener('click', handleOpenCategory);
              break;
            case 'open-series':
              element.addEventListener('click', handleOpenSeries);
              break;
            default:
              break;
          }
        });
      }

      initializeDataPopulation();
      bindActions();
    });
  </script>
</body>
</html>
