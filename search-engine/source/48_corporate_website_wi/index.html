  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      // No incoming params are required for the Home page, but urlParams is
      // available if needed for future enhancements.

      var homeState = {
        navData: null,
        featuredData: null,
        searchTerm: ''
      };

      function resolveCategoryUrl(category) {
        if (!category) {
          return null;
        }
        if (category.url && category.url.trim() !== '') {
          return category.url;
        }
        if (category.category_code) {
          return 'category.html?categoryId=' + encodeURIComponent(category.category_code);
        }
        return null;
      }

      function resolveSearchUrl(query) {
        var trimmed = (query || '').trim();
        if (!trimmed) {
          return null;
        }
        return 'search.html?query=' + encodeURIComponent(trimmed);
      }

      function renderHeaderMainNavigation(container, data) {
        container.innerHTML = '';
        var frag = document.createDocumentFragment();

        function createNavLink(label, options) {
          var li = document.createElement('li');
          li.className = 'primary-nav-item';

          var a = document.createElement('a');
          a.href = 'javascript:void(0)';
          a.textContent = label;

          if (options && options.action) {
            a.dataset.action = options.action;
          }
          if (options && options.categoryId) {
            a.dataset.categoryId = options.categoryId;
          }
          if (options && options.categoryRole) {
            a.dataset.categoryRole = options.categoryRole;
          }

          li.appendChild(a);
          frag.appendChild(li);
        }

        // Home link
        createNavLink('Home', { action: 'nav-home' });

        // Top-level categories
        if (data && Array.isArray(data.top_level_categories)) {
          data.top_level_categories.forEach(function(cat) {
            createNavLink(cat.name, {
              action: 'nav-top-category',
              categoryId: cat.id,
              categoryRole: 'top_level'
            });
          });
        }

        // Featured subcategory shortcuts in header
        if (data && Array.isArray(data.featured_subcategories) && data.featured_subcategories.length) {
          var dividerLi = document.createElement('li');
          dividerLi.className = 'primary-nav-item primary-nav-item--divider';
          dividerLi.setAttribute('aria-hidden', 'true');
          dividerLi.textContent = '|';
          frag.appendChild(dividerLi);

          data.featured_subcategories.forEach(function(cat) {
            createNavLink(cat.name, {
              action: 'nav-featured-subcategory',
              categoryId: cat.id,
              categoryRole: 'featured_header'
            });
          });
        }

        // Static quick access links
        var staticItems = [
          { label: 'Quick Order', action: 'quick-order' },
          { label: 'Saved Items', action: 'saved-items' },
          { label: 'Support', action: 'support' },
          { label: 'Cart', action: 'cart' }
        ];

        staticItems.forEach(function(item) {
          createNavLink(item.label, { action: item.action });
        });

        container.appendChild(frag);
      }

      function renderHomepageFeaturedGrid(container, data) {
        container.innerHTML = '';
        var frag = document.createDocumentFragment();

        var categories = (data && Array.isArray(data.featured_categories)) ? data.featured_categories : [];
        var subcategories = (data && Array.isArray(data.featured_subcategories)) ? data.featured_subcategories : [];

        if (!categories.length && !subcategories.length) {
          var empty = document.createElement('p');
          empty.className = 'empty-state';
          empty.textContent = 'Featured categories are not available at the moment.';
          container.appendChild(empty);
          return;
        }

        function createTile(category, role) {
          var article = document.createElement('article');
          article.className = 'category-tile';
          article.tabIndex = 0;
          article.dataset.action = role === 'subcategory' ? 'featured-subcategory-tile' : 'featured-category-tile';
          article.dataset.categoryId = category.id;
          article.dataset.categoryRole = role;

          var title = document.createElement('h3');
          title.className = 'category-tile-title';
          title.textContent = category.name;
          article.appendChild(title);

          if (category.description) {
            var desc = document.createElement('p');
            desc.className = 'category-tile-description';
            desc.textContent = category.description;
            article.appendChild(desc);
          }

          frag.appendChild(article);
        }

        categories.forEach(function(cat) {
          createTile(cat, 'featured_category');
        });

        subcategories.forEach(function(cat) {
          createTile(cat, 'subcategory');
        });

        container.appendChild(frag);
      }

      // Data population driven by data-populate attributes
      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        var dataType = element.dataset.populate;
        try {
          if (dataType === 'mainNavigationCategories') {
            var navData = WebsiteSDK.getMainNavigationCategories();
            homeState.navData = navData;
            renderHeaderMainNavigation(element, navData);
          } else if (dataType === 'homepageFeaturedCategories') {
            var featuredData = WebsiteSDK.getHomepageFeaturedCategories();
            homeState.featuredData = featuredData;
            renderHomepageFeaturedGrid(element, featuredData);
          }
        } catch (err) {
          if (dataType === 'mainNavigationCategories') {
            element.innerHTML = '';
          } else if (dataType === 'homepageFeaturedCategories') {
            element.innerHTML = '';
            var errorMsg = document.createElement('p');
            errorMsg.className = 'error-state';
            errorMsg.textContent = 'We were unable to load featured categories. Please try again later.';
            element.appendChild(errorMsg);
          }
        }
      });

      // Helper to resolve Category navigation from any component
      function handleNavigationForCategory(target) {
        var categoryId = target.dataset.categoryId;
        if (!categoryId) {
          return;
        }

        var source = null;

        if (homeState.navData) {
          var combinedNav = []
            .concat(homeState.navData.top_level_categories || [])
            .concat(homeState.navData.featured_subcategories || []);

          combinedNav.some(function(cat) {
            if (cat.id === categoryId) {
              source = cat;
              return true;
            }
            return false;
          });
        }

        if (!source && homeState.featuredData) {
          var combinedFeat = []
            .concat(homeState.featuredData.featured_categories || [])
            .concat(homeState.featuredData.featured_subcategories || []);

          combinedFeat.some(function(cat) {
            if (cat.id === categoryId) {
              source = cat;
              return true;
            }
            return false;
          });
        }

        if (!source) {
          return;
        }

        var url = resolveCategoryUrl(source);
        if (url) {
          window.location.href = url;
        }
      }

      // Global delegated event handlers based on data-action attributes
      document.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }

        var action = target.dataset.action;

        if (action === 'nav-home') {
          event.preventDefault();
          window.location.href = 'index.html';
        } else if (
          action === 'nav-top-category' ||
          action === 'nav-featured-subcategory' ||
          action === 'featured-category-tile' ||
          action === 'featured-subcategory-tile'
        ) {
          event.preventDefault();
          handleNavigationForCategory(target);
        } else if (action === 'quick-order') {
          event.preventDefault();
          window.location.href = 'quick_order.html';
        } else if (action === 'saved-items') {
          event.preventDefault();
          window.location.href = 'saved_items.html';
        } else if (action === 'cart') {
          event.preventDefault();
          window.location.href = 'cart.html';
        } else if (action === 'support') {
          event.preventDefault();
          window.location.href = 'support.html';
        } else if (action === 'search-submit') {
          event.preventDefault();
          var url = resolveSearchUrl(homeState.searchTerm);
          if (url) {
            window.location.href = url;
          }
        }
      });

      document.addEventListener('input', function(event) {
        var target = event.target;
        if (target.matches('[data-action="search-input"]')) {
          homeState.searchTerm = target.value || '';
        }
      });

      document.addEventListener('submit', function(event) {
        var target = event.target;
        if (target.matches('[data-action="global-search-form"]')) {
          event.preventDefault();
          var input = target.querySelector('[data-action="search-input"]');
          var value = input ? input.value : homeState.searchTerm;
          var url = resolveSearchUrl(value);
          if (url) {
            window.location.href = url;
          }
        }
      });

      document.addEventListener('keydown', function(event) {
        var target = event.target;

        if (target.matches('[data-action="search-input"]') && event.key === 'Enter') {
          event.preventDefault();
          var url = resolveSearchUrl(target.value);
          if (url) {
            window.location.href = url;
          }
        } else if (
          target.dataset &&
          (target.dataset.action === 'featured-category-tile' || target.dataset.action === 'featured-subcategory-tile') &&
          (event.key === 'Enter' || event.key === ' ')
        ) {
          event.preventDefault();
          handleNavigationForCategory(target);
        }
      });
    });
  </script>
