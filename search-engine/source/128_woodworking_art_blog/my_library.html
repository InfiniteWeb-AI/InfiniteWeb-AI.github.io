<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Invenio Wood &amp; Art – Woodworking Art Blog &amp; Community</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

  <!-- Global styles for the woodworking art blog framework -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Page-specific styles for My Library -->
  <link rel="stylesheet" href="my_library.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <div class="header-left" aria-hidden="true"></div>

      <div class="header-center">
        <a href="index.html" class="brand">
          <span class="brand-avatar" aria-hidden="true"></span>
          <span class="brand-text">
            <span class="brand-title">Invenio Wood &amp; Art</span>
            <span class="brand-tagline">Woodworking Art Blog &amp; Community</span>
          </span>
        </a>

        <nav class="primary-nav" aria-label="Primary">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="community.html">Community</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="artists_directory.html">Artists</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="my_library.html">My Library</a></li>
          </ul>
        </nav>
      </div>

      <div class="header-right">
        <a href="community.html" class="btn btn-primary">Subscribe</a>
        <a href="index.html" class="icon-button" aria-label="Search">
          <span class="icon" aria-hidden="true">&#128269;</span>
        </a>
        <a href="my_library.html" class="icon-button" aria-label="My Library">
          <span class="icon" aria-hidden="true">&#128100;</span>
        </a>
        <a href="shop.html" class="icon-button" aria-label="Shop">
          <span class="icon" aria-hidden="true">&#128722;</span>
        </a>
      </div>
    </div>
  </header>

  <main id="content" class="site-main container" role="main">
    <section class="my-library-page" data-component="my-library-page-shell">
      <div data-component="my-library-url-state" aria-hidden="true" hidden></div>

      <div class="my-library-inner">
        <a href="javascript:void(0)" class="my-library-back-link" data-action="navigate-back">&lt; Back</a>

        <section class="my-library-overview" data-component="my-library-overview-summary">
          <h1 class="my-library-title">My Library &amp; Lists</h1>
          <p class="my-library-overview-meta" data-populate="library-overview" aria-live="polite"></p>
        </section>

        <div class="my-library-page-message" data-populate="page-message" aria-live="polite"></div>

        <nav class="my-library-tabs" data-component="my-library-tab-strip" aria-label="My Library sections">
          <button
            type="button"
            id="tab-project_collections"
            class="my-library-tab-link"
            data-action="change-tab"
            data-tab="project_collections"
            aria-controls="panel-project_collections"
          >
            Project Collections
          </button>
          <button
            type="button"
            id="tab-reading_lists"
            class="my-library-tab-link"
            data-action="change-tab"
            data-tab="reading_lists"
            aria-controls="panel-reading_lists"
          >
            Reading Lists
          </button>
          <button
            type="button"
            id="tab-wishlists"
            class="my-library-tab-link"
            data-action="change-tab"
            data-tab="wishlists"
            aria-controls="panel-wishlists"
          >
            Wishlists
          </button>
          <button
            type="button"
            id="tab-materials_lists"
            class="my-library-tab-link"
            data-action="change-tab"
            data-tab="materials_lists"
            aria-controls="panel-materials_lists"
          >
            Materials Lists
          </button>
          <button
            type="button"
            id="tab-followed_artists"
            class="my-library-tab-link"
            data-action="change-tab"
            data-tab="followed_artists"
            aria-controls="panel-followed_artists"
          >
            Followed Artists
          </button>
        </nav>

        <div class="my-library-tab-panels" aria-live="polite">
          <!-- Project Collections Tab -->
          <section
            id="panel-project_collections"
            class="my-library-tab-panel"
            data-component="project-collections-tab"
            data-tab-panel="project_collections"
            role="tabpanel"
            aria-labelledby="tab-project_collections"
          >
            <div class="my-library-panel-list" data-populate="project-collections-list"></div>

            <section
              class="my-library-detail my-library-detail-collection"
              data-component="project-collection-detail-loader"
              data-populate="project-collection-detail"
            ></section>
          </section>

          <!-- Reading Lists Tab -->
          <section
            id="panel-reading_lists"
            class="my-library-tab-panel"
            data-component="reading-lists-tab"
            data-tab-panel="reading_lists"
            role="tabpanel"
            aria-labelledby="tab-reading_lists"
            hidden
            aria-hidden="true"
          >
            <div class="my-library-panel-list" data-populate="reading-lists-list"></div>

            <section
              class="my-library-detail my-library-detail-reading-list"
              data-component="reading-list-detail-loader"
              data-populate="reading-list-detail"
            ></section>
          </section>

          <!-- Wishlists Tab -->
          <section
            id="panel-wishlists"
            class="my-library-tab-panel"
            data-component="wishlists-tab"
            data-tab-panel="wishlists"
            role="tabpanel"
            aria-labelledby="tab-wishlists"
            hidden
            aria-hidden="true"
          >
            <div class="my-library-panel-list" data-populate="wishlists-list"></div>

            <section
              class="my-library-detail my-library-detail-wishlist"
              data-component="wishlist-detail-loader"
              data-populate="wishlist-detail"
            ></section>
          </section>

          <!-- Materials Lists Tab -->
          <section
            id="panel-materials_lists"
            class="my-library-tab-panel"
            data-component="materials-lists-tab"
            data-tab-panel="materials_lists"
            role="tabpanel"
            aria-labelledby="tab-materials_lists"
            hidden
            aria-hidden="true"
          >
            <div class="my-library-panel-list" data-populate="materials-lists-list"></div>

            <section
              class="my-library-detail my-library-detail-materials-list"
              data-component="materials-list-detail-loader"
              data-populate="materials-list-detail"
            ></section>
          </section>

          <!-- Followed Artists Tab -->
          <section
            id="panel-followed_artists"
            class="my-library-tab-panel"
            data-component="followed-artists-tab"
            data-tab-panel="followed_artists"
            role="tabpanel"
            aria-labelledby="tab-followed_artists"
            hidden
            aria-hidden="true"
          >
            <div class="my-library-panel-list" data-populate="followed-artists-list"></div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <nav class="footer-nav" aria-label="Footer">
        <ul>
          <li><a href="about.html">About</a></li>
          <li><a href="help.html">Help &amp; Contact</a></li>
          <li><a href="help.html#community-guidelines">Community Guidelines</a></li>
        </ul>
      </nav>
      <p class="footer-meta">&copy; 2025 Invenio Wood &amp; Art. All rights reserved.</p>
    </div>
  </footer>

  <!-- SDK / business logic -->
  <script src="business_logic.js"></script>
  <script>
  'use strict';

  document.addEventListener('DOMContentLoaded', function() {
    const allowedTabs = ['project_collections', 'reading_lists', 'wishlists', 'materials_lists', 'followed_artists'];
    const defaultTab = 'project_collections';

    let state = parseUrlStateFromLocation();
    let overviewData = null;
    let followedArtistsData = null;

    const projectCollectionDetailsCache = {};
    const readingListDetailsCache = {};
    const wishlistDetailsCache = {};
    const materialsListDetailsCache = {};

    const populateElements = document.querySelectorAll('[data-populate]');

    function escapeHtml(value) {
      if (value === null || value === undefined) {
        return '';
      }
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function pluralize(count, singular, plural) {
      return count === 1 ? singular : plural;
    }

    function parseUrlStateFromLocation() {
      const url = new URL(window.location.href);
      const urlParams = url.searchParams;
      let tab = urlParams.get('tab');
      if (!allowedTabs.includes(tab)) {
        tab = defaultTab;
      }

      let collectionId = null;
      let readingListId = null;
      let wishlistId = null;
      let materialsListId = null;

      if (tab === 'project_collections') {
        collectionId = urlParams.get('collectionId');
      } else if (tab === 'reading_lists') {
        readingListId = urlParams.get('readingListId');
      } else if (tab === 'wishlists') {
        wishlistId = urlParams.get('wishlistId');
      } else if (tab === 'materials_lists') {
        materialsListId = urlParams.get('materialsListId');
      }

      return {
        activeTab: tab,
        collectionId: collectionId || null,
        readingListId: readingListId || null,
        wishlistId: wishlistId || null,
        materialsListId: materialsListId || null
      };
    }

    function updateUrlForState(push) {
      const url = new URL(window.location.href);
      const params = url.searchParams;

      if (state.activeTab) {
        params.set('tab', state.activeTab);
      } else {
        params.delete('tab');
      }

      if (state.activeTab === 'project_collections' && state.collectionId) {
        params.set('collectionId', state.collectionId);
      } else {
        params.delete('collectionId');
      }

      if (state.activeTab === 'reading_lists' && state.readingListId) {
        params.set('readingListId', state.readingListId);
      } else {
        params.delete('readingListId');
      }

      if (state.activeTab === 'wishlists' && state.wishlistId) {
        params.set('wishlistId', state.wishlistId);
      } else {
        params.delete('wishlistId');
      }

      if (state.activeTab === 'materials_lists' && state.materialsListId) {
        params.set('materialsListId', state.materialsListId);
      } else {
        params.delete('materialsListId');
      }

      const newUrl = url.toString();
      if (push) {
        window.history.pushState(null, '', newUrl);
      } else {
        window.history.replaceState(null, '', newUrl);
      }
    }

    function setActiveTab(newTab, options) {
      const opts = options || {};
      if (!allowedTabs.includes(newTab)) {
        newTab = defaultTab;
      }
      if (state.activeTab === newTab && !opts.force) {
        return;
      }

      state.activeTab = newTab;

      if (newTab !== 'project_collections') {
        state.collectionId = null;
      }
      if (newTab !== 'reading_lists') {
        state.readingListId = null;
      }
      if (newTab !== 'wishlists') {
        state.wishlistId = null;
      }
      if (newTab !== 'materials_lists') {
        state.materialsListId = null;
      }

      updateUrlForState(!opts.fromPopState);
      renderTabStrip();
      renderActiveTabContent();
    }

    function renderTabStrip() {
      const tabButtons = document.querySelectorAll('[data-component="my-library-tab-strip"] [data-action="change-tab"]');
      tabButtons.forEach(function(button) {
        const tab = button.dataset.tab;
        if (tab === state.activeTab) {
          button.classList.add('is-active');
          button.setAttribute('aria-selected', 'true');
          button.setAttribute('tabindex', '0');
        } else {
          button.classList.remove('is-active');
          button.setAttribute('aria-selected', 'false');
          button.setAttribute('tabindex', '-1');
        }
      });

      const panels = document.querySelectorAll('[data-tab-panel]');
      panels.forEach(function(panel) {
        const tabName = panel.dataset.tabPanel;
        if (tabName === state.activeTab) {
          panel.hidden = false;
          panel.setAttribute('aria-hidden', 'false');
        } else {
          panel.hidden = true;
          panel.setAttribute('aria-hidden', 'true');
        }
      });
    }

    function formatOverviewCounts(data) {
      if (!data) {
        return '';
      }
      const pcCount = Array.isArray(data.projectCollections) ? data.projectCollections.length : 0;
      const rlCount = Array.isArray(data.readingLists) ? data.readingLists.length : 0;
      const wlCount = Array.isArray(data.wishlists) ? data.wishlists.length : 0;
      const mlCount = Array.isArray(data.materialsLists) ? data.materialsLists.length : 0;
      const faCount = Array.isArray(data.followedArtists) ? data.followedArtists.length : 0;

      const parts = [];
      parts.push(pcCount + ' ' + pluralize(pcCount, 'project collection', 'project collections'));
      parts.push(rlCount + ' ' + pluralize(rlCount, 'reading list', 'reading lists'));
      parts.push(wlCount + ' ' + pluralize(wlCount, 'wishlist', 'wishlists'));
      parts.push(mlCount + ' ' + pluralize(mlCount, 'materials list', 'materials lists'));
      parts.push(faCount + ' ' + pluralize(faCount, 'followed artist', 'followed artists'));

      return 'You have ' + parts.join(' · ') + '.';
    }

    function renderOverviewSummary(container) {
      if (!container) {
        return;
      }
      if (!overviewData) {
        container.textContent = '';
        return;
      }
      container.textContent = formatOverviewCounts(overviewData);
    }

    function renderPageMessage(container, message, isError) {
      if (!container) {
        return;
      }
      if (!message) {
        container.textContent = '';
        container.classList.remove('is-error');
        return;
      }
      container.textContent = message;
      if (isError) {
        container.classList.add('is-error');
      } else {
        container.classList.remove('is-error');
      }
    }

    function renderProjectCollectionsList(container) {
      if (!container) {
        return;
      }
      const items = overviewData && Array.isArray(overviewData.projectCollections) ? overviewData.projectCollections : [];
      if (!items.length) {
        container.innerHTML = '<p class="my-library-empty-state">No project collections yet. Save projects into a collection from any project page.</p>';
        return;
      }

      let html = '<ul class="my-library-card-list">';
      for (let i = 0; i < items.length; i += 1) {
        const entry = items[i];
        const collection = entry.collection;
        const count = entry.itemCount || 0;
        const isSelected = state.collectionId === collection.id && state.activeTab === 'project_collections';
        html += `
<li class="my-library-card-row${isSelected ? ' is-selected' : ''}">
  <button type="button" class="my-library-card-row-button" data-action="select-collection" data-collection-id="${escapeHtml(collection.id)}">
    <div class="my-library-card-row-main">
      <div class="my-library-card-row-text">
        <div class="my-library-card-row-title">${escapeHtml(collection.name)}</div>
        ${collection.description ? `<div class="my-library-card-row-subtitle">${escapeHtml(collection.description)}</div>` : ''}
      </div>
      <div class="my-library-card-row-meta">
        <span class="my-library-count-pill">${count} ${pluralize(count, 'project', 'projects')}</span>
      </div>
    </div>
  </button>
</li>`;
      }
      html += '</ul>';
      container.innerHTML = html;
    }

    function renderProjectCollectionDetail(container, detailData) {
      if (!container) {
        return;
      }
      if (!detailData || !detailData.collection) {
        container.innerHTML = '<div class="my-library-detail-placeholder">Select a collection to view its projects.</div>';
        return;
      }

      const collection = detailData.collection;
      const items = Array.isArray(detailData.items) ? detailData.items : [];

      let body = '';
      if (!items.length) {
        body = '<p class="my-library-empty-state">This collection has no projects yet.</p>';
      } else {
        body = '<ul class="my-library-detail-list">';
        for (let i = 0; i < items.length; i += 1) {
          const pair = items[i];
          const collectionItem = pair.collectionItem;
          const project = pair.project || {};
          const projectTitle = project.title || 'Untitled project';
          const difficulty = project.difficulty ? escapeHtml(project.difficulty) : '';
          const timeMinutes = project.estimatedBuildTimeMinutes;

          let metaParts = [];
          if (difficulty) {
            metaParts.push('Difficulty: ' + difficulty);
          }
          if (typeof timeMinutes === 'number' && !Number.isNaN(timeMinutes) && timeMinutes > 0) {
            metaParts.push('~' + timeMinutes + ' min');
          }
          const metaText = metaParts.join(' · ');

          body += `
<li class="my-library-detail-item">
  <div class="my-library-detail-item-main">
    <button type="button" class="my-library-link-button" data-action="open-project" data-project-id="${escapeHtml(project.id || '')}">
      <div class="my-library-detail-item-title">${escapeHtml(projectTitle)}</div>
      ${metaText ? `<div class="my-library-detail-item-meta">${escapeHtml(metaText)}</div>` : ''}
    </button>
  </div>
  <div class="my-library-detail-item-actions">
    <button
      type="button"
      class="my-library-text-button my-library-remove-button"
      data-action="remove-project"
      data-collection-item-id="${escapeHtml(collectionItem.id)}"
      data-collection-id="${escapeHtml(collection.id)}"
    >
      Remove
    </button>
  </div>
</li>`;
        }
        body += '</ul>';
      }

      const headerHtml = `
<div class="my-library-detail-header">
  <h2 class="my-library-detail-title">${escapeHtml(collection.name)}</h2>
  ${collection.description ? `<p class="my-library-detail-description">${escapeHtml(collection.description)}</p>` : ''}
</div>`;

      container.innerHTML = `<article class="my-library-detail-card">${headerHtml}${body}</article>`;
    }

    function loadProjectCollectionDetail(container, collectionId) {
      if (!container) {
        return;
      }
      if (!collectionId) {
        renderProjectCollectionDetail(container, null);
        return;
      }

      container.innerHTML = '<div class="my-library-detail-loading">Loading collection…</div>';
      try {
        let detailData = projectCollectionDetailsCache[collectionId];
        if (!detailData) {
          detailData = WebsiteSDK.getProjectCollectionDetails(collectionId);
          projectCollectionDetailsCache[collectionId] = detailData;
        }
        renderProjectCollectionDetail(container, detailData);
      } catch (error) {
        console.error(error);
        container.innerHTML = '<div class="my-library-detail-error">Unable to load this collection right now.</div>';
      }
    }

    function renderReadingListsList(container) {
      if (!container) {
        return;
      }
      const items = overviewData && Array.isArray(overviewData.readingLists) ? overviewData.readingLists : [];
      if (!items.length) {
        container.innerHTML = '<p class="my-library-empty-state">No reading lists yet. Save tutorials and articles into a list from any article page.</p>';
        return;
      }

      let html = '<ul class="my-library-card-list">';
      for (let i = 0; i < items.length; i += 1) {
        const entry = items[i];
        const list = entry.readingList;
        const count = entry.itemCount || 0;
        const isSelected = state.readingListId === list.id && state.activeTab === 'reading_lists';
        html += `
<li class="my-library-card-row${isSelected ? ' is-selected' : ''}">
  <button type="button" class="my-library-card-row-button" data-action="select-reading-list" data-reading-list-id="${escapeHtml(list.id)}">
    <div class="my-library-card-row-main">
      <div class="my-library-card-row-text">
        <div class="my-library-card-row-title">${escapeHtml(list.name)}</div>
        ${list.description ? `<div class="my-library-card-row-subtitle">${escapeHtml(list.description)}</div>` : ''}
      </div>
      <div class="my-library-card-row-meta">
        <span class="my-library-count-pill">${count} ${pluralize(count, 'article', 'articles')}</span>
      </div>
    </div>
  </button>
</li>`;
      }
      html += '</ul>';
      container.innerHTML = html;
    }

    function renderReadingListDetail(container, detailData) {
      if (!container) {
        return;
      }
      if (!detailData || !detailData.readingList) {
        container.innerHTML = '<div class="my-library-detail-placeholder">Select a reading list to view its articles.</div>';
        return;
      }

      const list = detailData.readingList;
      const items = Array.isArray(detailData.items) ? detailData.items : [];

      let body = '';
      if (!items.length) {
        body = '<p class="my-library-empty-state">This reading list has no articles yet.</p>';
      } else {
        body = '<ul class="my-library-detail-list">';
        for (let i = 0; i < items.length; i += 1) {
          const pair = items[i];
          const readingListItem = pair.readingListItem;
          const article = pair.article || {};
          const title = article.title || 'Untitled article';
          const difficulty = article.difficulty ? escapeHtml(article.difficulty) : '';
          const readingTime = article.estimatedReadingTimeMinutes;

          const metaParts = [];
          if (article.contentType) {
            metaParts.push(escapeHtml(article.contentType));
          }
          if (difficulty) {
            metaParts.push('Difficulty: ' + difficulty);
          }
          if (typeof readingTime === 'number' && !Number.isNaN(readingTime) && readingTime > 0) {
            metaParts.push('~' + readingTime + ' min');
          }
          const metaText = metaParts.join(' · ');

          body += `
<li class="my-library-detail-item">
  <div class="my-library-detail-item-main">
    <button type="button" class="my-library-link-button" data-action="open-article" data-article-id="${escapeHtml(article.id || '')}">
      <div class="my-library-detail-item-title">${escapeHtml(title)}</div>
      ${metaText ? `<div class="my-library-detail-item-meta">${escapeHtml(metaText)}</div>` : ''}
    </button>
  </div>
  <div class="my-library-detail-item-actions">
    <button
      type="button"
      class="my-library-text-button my-library-remove-button"
      data-action="remove-article"
      data-reading-list-item-id="${escapeHtml(readingListItem.id)}"
      data-reading-list-id="${escapeHtml(list.id)}"
    >
      Remove
    </button>
  </div>
</li>`;
        }
        body += '</ul>';
      }

      const headerHtml = `
<div class="my-library-detail-header">
  <h2 class="my-library-detail-title">${escapeHtml(list.name)}</h2>
  ${list.description ? `<p class="my-library-detail-description">${escapeHtml(list.description)}</p>` : ''}
</div>`;

      container.innerHTML = `<article class="my-library-detail-card">${headerHtml}${body}</article>`;
    }

    function loadReadingListDetail(container, readingListId) {
      if (!container) {
        return;
      }
      if (!readingListId) {
        renderReadingListDetail(container, null);
        return;
      }

      container.innerHTML = '<div class="my-library-detail-loading">Loading reading list…</div>';
      try {
        let detailData = readingListDetailsCache[readingListId];
        if (!detailData) {
          detailData = WebsiteSDK.getReadingListDetails(readingListId);
          readingListDetailsCache[readingListId] = detailData;
        }
        renderReadingListDetail(container, detailData);
      } catch (error) {
        console.error(error);
        container.innerHTML = '<div class="my-library-detail-error">Unable to load this reading list right now.</div>';
      }
    }

    function renderWishlistsList(container) {
      if (!container) {
        return;
      }
      const items = overviewData && Array.isArray(overviewData.wishlists) ? overviewData.wishlists : [];
      if (!items.length) {
        container.innerHTML = '<p class="my-library-empty-state">No wishlists yet. Save products into a wishlist from any product page.</p>';
        return;
      }

      let html = '<ul class="my-library-card-list">';
      for (let i = 0; i < items.length; i += 1) {
        const entry = items[i];
        const list = entry.wishlist;
        const count = entry.itemCount || 0;
        const isSelected = state.wishlistId === list.id && state.activeTab === 'wishlists';

      if (!collectionItemId || !collectionId) {

        if (!result || result.success === false) {
          window.alert(result && result.message ? result.message : 'Could not remove project from collection.');
          return;
        }
      } catch (error) {
        console.error(error);
        window.alert('Could not remove project from collection.');
        return;
      }

      const detailData = projectCollectionDetailsCache[collectionId];
      if (detailData && Array.isArray(detailData.items)) {
        detailData.items = detailData.items.filter(function(pair) {
          return pair.collectionItem && pair.collectionItem.id !== collectionItemId;
        });
      }

      if (overviewData && Array.isArray(overviewData.projectCollections)) {
        for (let i = 0; i < overviewData.projectCollections.length; i += 1) {
          const entry = overviewData.projectCollections[i];
          if (entry.collection && entry.collection.id === collectionId) {
            if (typeof entry.itemCount === 'number' && !Number.isNaN(entry.itemCount) && entry.itemCount > 0) {
              entry.itemCount -= 1;
            }
            break;

        }

      ensureFollowedArtistsData();

        return;

      const projectsCheckbox = row.querySelector('input[data-action="toggle-notify-projects"]');
      const postsCheckbox = row.querySelector('input[data-action="toggle-notify-posts"]');
      const newNotifyProjects = projectsCheckbox ? !!projectsCheckbox.checked : false;
      const newNotifyPosts = postsCheckbox ? !!postsCheckbox.checked : false;

      inputEl.disabled = true;
      try {
        const result = WebsiteSDK.updateArtistNotificationSettings(artistId, newNotifyProjects, newNotifyPosts);
        if (result && result.artistFollow) {
          for (let i = 0; i < followedArtistsData.length; i += 1) {

              entry.follow = result.artistFollow;

          const listContainer = document.querySelector('[data-populate="followed-artists-list"]');
          renderFollowedArtistsList(listContainer);

    function navigateTo(url) {

      overviewData = WebsiteSDK.getMyLibraryOverview();

        projectCollections: [],
        readingLists: [],
        wishlists: [],
        materialsLists: [],

    document.addEventListener('click', function(event) {
      const actionEl = event.target.closest('[data-action]');
      if (!actionEl) {
        return;
      }
      const action = actionEl.dataset.action;

      if (action === 'navigate-back') {
        event.preventDefault();
        if (window.history.length > 1) {
          window.history.back();
        } else {
          navigateTo('index.html');
        }
      } else if (action === 'change-tab') {
        event.preventDefault();
        const tab = actionEl.dataset.tab;
        setActiveTab(tab, { fromPopState: false });
      } else if (action === 'select-collection') {
        event.preventDefault();
        const collectionId = actionEl.dataset.collectionId || null;
        state.activeTab = 'project_collections';
        state.collectionId = collectionId;
        state.readingListId = null;
        state.wishlistId = null;
        state.materialsListId = null;
        updateUrlForState(true);
        renderTabStrip();
        const listContainer = document.querySelector('[data-populate="project-collections-list"]');
        const detailContainer = document.querySelector('[data-populate="project-collection-detail"]');
        renderProjectCollectionsList(listContainer);
        loadProjectCollectionDetail(detailContainer, collectionId);
      } else if (action === 'open-project') {
        event.preventDefault();
        const projectId = actionEl.dataset.projectId;
        if (projectId) {
          navigateTo('project_detail.html?id=' + encodeURIComponent(projectId));
        }
      } else if (action === 'remove-project') {
        event.preventDefault();
        const collectionItemId = actionEl.dataset.collectionItemId;
        const collectionId = actionEl.dataset.collectionId;
        handleRemoveProject(collectionItemId, collectionId);
      } else if (action === 'select-reading-list') {
        event.preventDefault();
        const readingListId = actionEl.dataset.readingListId || null;
        state.activeTab = 'reading_lists';
        state.readingListId = readingListId;
        state.collectionId = null;
        state.wishlistId = null;
        state.materialsListId = null;
        updateUrlForState(true);
        renderTabStrip();
        const listContainer = document.querySelector('[data-populate="reading-lists-list"]');
        const detailContainer = document.querySelector('[data-populate="reading-list-detail"]');
        renderReadingListsList(listContainer);
        loadReadingListDetail(detailContainer, readingListId);
      } else if (action === 'open-article') {
        event.preventDefault();
        const articleId = actionEl.dataset.articleId;
        if (articleId) {
          navigateTo('article_detail.html?id=' + encodeURIComponent(articleId));
        }
      } else if (action === 'remove-article') {
        event.preventDefault();
        const readingListItemId = actionEl.dataset.readingListItemId;
        const readingListId = actionEl.dataset.readingListId;
        handleRemoveArticle(readingListItemId, readingListId);
      } else if (action === 'select-wishlist') {
        event.preventDefault();
        const wishlistId = actionEl.dataset.wishlistId || null;
        state.activeTab = 'wishlists';
        state.wishlistId = wishlistId;
        state.collectionId = null;
        state.readingListId = null;
        state.materialsListId = null;
        updateUrlForState(true);
        renderTabStrip();
        const listContainer = document.querySelector('[data-populate="wishlists-list"]');
        const detailContainer = document.querySelector('[data-populate="wishlist-detail"]');
        renderWishlistsList(listContainer);
        loadWishlistDetail(detailContainer, wishlistId);
      } else if (action === 'open-product') {
        event.preventDefault();
        const productId = actionEl.dataset.productId;
        if (productId) {
          navigateTo('product_detail.html?id=' + encodeURIComponent(productId));
        }
      } else if (action === 'remove-product') {
        event.preventDefault();
        const wishlistItemId = actionEl.dataset.wishlistItemId;
        const wishlistId = actionEl.dataset.wishlistId;
        handleRemoveProduct(wishlistItemId, wishlistId);
      } else if (action === 'select-materials-list') {
        event.preventDefault();
        const materialsListId = actionEl.dataset.materialsListId || null;
        state.activeTab = 'materials_lists';
        state.materialsListId = materialsListId;
        state.collectionId = null;
        state.readingListId = null;
        state.wishlistId = null;
        updateUrlForState(true);
        renderTabStrip();
        const listContainer = document.querySelector('[data-populate="materials-lists-list"]');
        const detailContainer = document.querySelector('[data-populate="materials-list-detail"]');
        renderMaterialsListsList(listContainer);
        loadMaterialsListDetail(detailContainer, materialsListId);
      } else if (action === 'remove-materials-item') {
        event.preventDefault();
        const materialsItemId = actionEl.dataset.materialsItemId;
        const materialsListId = actionEl.dataset.materialsListId;
        handleRemoveMaterialsItem(materialsItemId, materialsListId);
      } else if (action === 'open-artist') {
        event.preventDefault();
        const artistId = actionEl.dataset.artistId;
        if (artistId) {
          navigateTo('artist_profile.html?id=' + encodeURIComponent(artistId));
        }
      } else if (action === 'toggle-notify-projects') {
        const artistId = actionEl.dataset.artistId;
        handleArtistNotificationToggle(artistId, 'projects', actionEl);
      } else if (action === 'toggle-notify-posts') {
        const artistId = actionEl.dataset.artistId;
        handleArtistNotificationToggle(artistId, 'posts', actionEl);
      }
    });

    window.addEventListener('popstate', function() {
      state = parseUrlStateFromLocation();
      renderTabStrip();
      renderActiveTabContent();
    });
  });
  </script>
</body>
</html>
