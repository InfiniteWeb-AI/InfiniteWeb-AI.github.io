<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Invenio Wood &amp; Art – Woodworking Art Blog &amp; Community</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

  <!-- Global styles for the woodworking art blog framework -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Page-specific styles -->
  <link rel="stylesheet" href="blog.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <div class="header-left" aria-hidden="true"></div>

      <div class="header-center">
        <a href="index.html" class="brand">
          <span class="brand-avatar" aria-hidden="true"></span>
          <span class="brand-text">
            <span class="brand-title">Invenio Wood &amp; Art</span>
            <span class="brand-tagline">Woodworking Art Blog &amp; Community</span>
          </span>
        </a>

        <nav class="primary-nav" aria-label="Primary">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="community.html">Community</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="artists_directory.html">Artists</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="my_library.html">My Library</a></li>
          </ul>
        </nav>
      </div>

      <div class="header-right">
        <a href="community.html" class="btn btn-primary">Subscribe</a>
        <a href="index.html" class="icon-button" aria-label="Search">
          <span class="icon" aria-hidden="true">&#128269;</span>
        </a>
        <a href="my_library.html" class="icon-button" aria-label="My Library">
          <span class="icon" aria-hidden="true">&#128100;</span>
        </a>
        <a href="shop.html" class="icon-button" aria-label="Shop">
          <span class="icon" aria-hidden="true">&#128722;</span>
        </a>
      </div>
    </div>
  </header>

  <main id="content" class="site-main container" role="main">
    <section class="blog-index" aria-labelledby="blog-page-title" data-component="blog-url-state-manager">
      <header class="blog-index-header">
        <h1 id="blog-page-title" class="page-title">Blog &amp; Tutorials</h1>
        <p class="results-summary" data-component="results-summary" data-populate="results-summary" aria-live="polite">
          <!-- Summary populated by JS -->
        </p>
      </header>

      <section class="filter-sort-bar" aria-label="Filter and sort articles">
        <div class="filters-left" data-component="article-filter-bar" data-populate="article-filters">
          <div class="filter-group">
            <label for="filterCategory">Category</label>
            <select id="filterCategory" name="category" data-action="change-category">
              <option value="">All topics</option>
              <!-- Categories populated by JS -->
            </select>
          </div>

          <div class="filter-group">
            <label for="difficultySelect">Difficulty</label>
            <select id="difficultySelect" name="difficulty" data-action="change-difficulty">
              <option value="">Any level</option>
              <!-- Difficulties populated by JS -->
            </select>
          </div>

          <div class="filter-group">
            <label for="readingTimeSelect">Reading time</label>
            <select id="readingTimeSelect" name="readingTimeMax" data-action="change-reading-time">
              <option value="">Any length</option>
              <!-- Reading time presets populated by JS -->
            </select>
          </div>

          <div class="filter-group">
            <label for="contentTypeSelect">Content type</label>
            <select id="contentTypeSelect" name="contentType" data-action="change-content-type">
              <option value="">All content</option>
              <option value="article">Articles only</option>
              <option value="tutorial">Tutorials only</option>
            </select>
          </div>

          <div class="filter-group filter-tags">
            <span class="filter-label">Tags</span>
            <div class="tag-list" data-populate="tag-options" aria-label="Filter by tags">
              <!-- Tag chips populated by JS -->
            </div>
          </div>

          <button type="button" class="btn-clear-filters" data-action="clear-filters">Clear filters</button>
        </div>

        <div class="sort-right" data-component="article-sort-control">
          <label for="sortSelect">Sort by</label>
          <select id="sortSelect" name="sort" data-action="change-sort" data-populate="sort-options">
            <!-- Sort options populated by JS -->
          </select>
        </div>
      </section>

      <section class="article-list-region">
        <div class="status-overlay" data-component="loading-and-error-state" data-populate="loading-state" aria-live="polite">
          <!-- Loading / error / empty states populated by JS -->
        </div>

        <div class="article-list" data-component="article-list" data-populate="article-list">
          <!-- Article cards populated by JS -->
        </div>
      </section>

      <nav class="pagination" data-component="pagination-controls" data-populate="pagination" aria-label="Pagination">
        <!-- Pagination populated by JS -->
      </nav>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <nav class="footer-nav" aria-label="Footer">
        <ul>
          <li><a href="about.html">About</a></li>
          <li><a href="help.html">Help &amp; Contact</a></li>
          <li><a href="help.html#community-guidelines">Community Guidelines</a></li>
        </ul>
      </nav>
      <p class="footer-meta">&copy; 2025 Invenio Wood &amp; Art. All rights reserved.</p>
    </div>
  </footer>

  <!-- SDK / business logic -->
  <script src="business_logic.js"></script>

  <!-- Page UI logic -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var populateRegistry = {};
      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(el) {
        var key = el.dataset.populate;
        if (!populateRegistry[key]) {
          populateRegistry[key] = [];
        }
        populateRegistry[key].push(el);
      });

      var state = {
        filters: {
          category: null,
          difficulty: null,
          maxReadingTimeMinutes: null,
          contentType: null,
          tags: []
        },
        sortBy: null,
        defaultSort: null,
        page: 1,
        pageSize: 10,
        totalCount: 0,
        articles: [],
        filterOptions: null,
        isLoadingFilters: false,
        isLoadingArticles: false,
        errorFilters: null,
        errorArticles: null
      };

      var resultsSummaryEls = populateRegistry['results-summary'] || [];
      var articleListEls = populateRegistry['article-list'] || [];
      var paginationEls = populateRegistry['pagination'] || [];
      var loadingEls = populateRegistry['loading-state'] || [];
      var tagOptionEls = populateRegistry['tag-options'] || [];

      var categorySelect = document.getElementById('filterCategory');
      var difficultySelect = document.getElementById('difficultySelect');
      var readingTimeSelect = document.getElementById('readingTimeSelect');
      var contentTypeSelect = document.getElementById('contentTypeSelect');
      var sortSelect = document.getElementById('sortSelect');

      function syncStateFromUrl() {
        var params = new URLSearchParams(window.location.search);

        state.filters.category = params.get('category') || null;
        state.filters.difficulty = params.get('difficulty') || null;

        var readingTimeStr = params.get('readingTimeMax');
        var readingTimeVal = readingTimeStr ? parseInt(readingTimeStr, 10) : NaN;
        state.filters.maxReadingTimeMinutes = Number.isNaN(readingTimeVal) ? null : readingTimeVal;

        state.filters.contentType = params.get('contentType') || null;

        var sortParam = params.get('sort');
        if (sortParam) {
          state.sortBy = sortParam;
        }

        var pageStr = params.get('page');
        var pageVal = pageStr ? parseInt(pageStr, 10) : NaN;
        state.page = !Number.isNaN(pageVal) && pageVal > 0 ? pageVal : 1;
      }

      function updateUrlFromState(mode) {
        var params = new URLSearchParams(window.location.search);

        if (state.filters.category) {
          params.set('category', state.filters.category);
        } else {
          params.delete('category');
        }

        if (state.filters.difficulty) {
          params.set('difficulty', state.filters.difficulty);
        } else {
          params.delete('difficulty');
        }

        if (state.filters.maxReadingTimeMinutes) {
          params.set('readingTimeMax', String(state.filters.maxReadingTimeMinutes));
        } else {
          params.delete('readingTimeMax');
        }

        if (state.filters.contentType) {
          params.set('contentType', state.filters.contentType);
        } else {
          params.delete('contentType');
        }

        if (state.sortBy) {
          params.set('sort', state.sortBy);
        } else {
          params.delete('sort');
        }

        if (state.page && state.page > 1) {
          params.set('page', String(state.page));
        } else {
          params.delete('page');
        }

        var newSearch = params.toString();
        var newUrl = newSearch ? window.location.pathname + '?' + newSearch : window.location.pathname;

        if (mode === 'replace') {
          window.history.replaceState(null, '', newUrl);
        } else {
          window.history.pushState(null, '', newUrl);
        }
      }

      function capitalizeFirst(str) {
        if (!str) return '';
        return str.charAt(0).toUpperCase() + str.slice(1);
      }

      function renderResultsSummary(container) {
        var total = state.totalCount || 0;
        var page = state.page || 1;
        var pageSize = state.pageSize || 10;
        var start = total === 0 ? 0 : (page - 1) * pageSize + 1;
        var end = total === 0 ? 0 : Math.min(total, page * pageSize);

        var parts = [];
        parts.push(total + (total === 1 ? ' article' : ' articles'));
        if (total > 0) {
          parts.push('Showing ' + start + '–' + end);
        }

        var filterParts = [];
        if (state.filters.category) {
          filterParts.push('Category: ' + state.filters.category);
        } else {
          filterParts.push('All topics');
        }
        if (state.filters.difficulty) {
          filterParts.push('Difficulty: ' + capitalizeFirst(state.filters.difficulty));
        }
        if (state.filters.maxReadingTimeMinutes) {
          filterParts.push('Max ' + state.filters.maxReadingTimeMinutes + ' min');
        }
        if (state.filters.contentType) {
          if (state.filters.contentType === 'tutorial') {
            filterParts.push('Tutorials only');
          } else if (state.filters.contentType === 'article') {
            filterParts.push('Articles only');
          }
        }
        if (state.filters.tags && state.filters.tags.length > 0) {
          filterParts.push('Tags: ' + state.filters.tags.join(', '));
        }

        if (filterParts.length > 0) {
          parts.push('Filter: ' + filterParts.join(' b7 '));
        }

        container.textContent = parts.join(' b7 ');
      }

      function renderCategoryOptions(selectEl, categories, selectedValue) {
        if (!selectEl) return;
        selectEl.innerHTML = '';
        var allOpt = document.createElement('option');
        allOpt.value = '';
        allOpt.textContent = 'All topics';
        selectEl.appendChild(allOpt);
        if (Array.isArray(categories)) {
          categories.forEach(function(cat) {
            var opt = document.createElement('option');
            opt.value = cat.value;
            opt.textContent = cat.label || cat.value;
            if (selectedValue && selectedValue === cat.value) {
              opt.selected = true;
            }
            selectEl.appendChild(opt);
          });
        }
      }

      function renderDifficultyOptions(selectEl, difficulties, selectedValue) {
        if (!selectEl) return;
        selectEl.innerHTML = '';
        var anyOpt = document.createElement('option');
        anyOpt.value = '';
        anyOpt.textContent = 'Any level';
        selectEl.appendChild(anyOpt);
        if (Array.isArray(difficulties)) {
          difficulties.forEach(function(diff) {
            var opt = document.createElement('option');
            opt.value = diff.value;
            opt.textContent = diff.label || capitalizeFirst(diff.value);
            if (selectedValue && selectedValue === diff.value) {
              opt.selected = true;
            }
            selectEl.appendChild(opt);
          });
        }
      }

      function renderReadingTimeOptions(selectEl, presets, selectedValue) {
        if (!selectEl) return;
        selectEl.innerHTML = '';
        var anyOpt = document.createElement('option');
        anyOpt.value = '';
        anyOpt.textContent = 'Any length';
        selectEl.appendChild(anyOpt);
        if (Array.isArray(presets)) {
          presets.forEach(function(preset) {
            var opt = document.createElement('option');
            opt.value = String(preset.maxMinutes);
            opt.textContent = preset.label || ('Up to ' + preset.maxMinutes + ' min');
            if (selectedValue && String(selectedValue) === String(preset.maxMinutes)) {
              opt.selected = true;
            }
            selectEl.appendChild(opt);
          });
        }
      }

      function renderSortOptions(selectEl, sortOptions, selectedValue) {
        if (!selectEl) return;
        selectEl.innerHTML = '';
        if (Array.isArray(sortOptions)) {
          sortOptions.forEach(function(optDef) {
            var opt = document.createElement('option');
            opt.value = optDef.value;
            opt.textContent = optDef.label || optDef.value;
            if (selectedValue && selectedValue === optDef.value) {
              opt.selected = true;
            }
            selectEl.appendChild(opt);
          });
        }
      }

      function renderTagOptions(container, tags, selectedTags) {
        if (!container) return;
        container.innerHTML = '';
        if (!Array.isArray(tags) || tags.length === 0) {
          var span = document.createElement('span');
          span.className = 'tag-empty';
          span.textContent = 'No tags available';
          container.appendChild(span);
          return;
        }
        var selectedSet = new Set(selectedTags || []);
        tags.forEach(function(tag) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'tag-chip';
          if (selectedSet.has(tag.value)) {
            btn.classList.add('is-active');
          }
          btn.dataset.action = 'toggle-tag';
          btn.dataset.tagValue = tag.value;
          btn.textContent = tag.label || tag.value;
          container.appendChild(btn);
        });
      }

      function renderLoadingAndError(container) {
        if (!container) return;
        container.innerHTML = '';
        container.classList.remove('is-visible');

        if (state.isLoadingFilters || state.isLoadingArticles) {
          container.classList.add('is-visible');
          var wrap = document.createElement('div');
          wrap.className = 'loading-message';
          wrap.innerHTML = '<span class="spinner" aria-hidden="true"></span><span>Loading articles...</span>';
          container.appendChild(wrap);
          return;
        }

        if (state.errorFilters) {
          container.classList.add('is-visible');
          var ef = document.createElement('div');
          ef.className = 'error-message';
          var p1 = document.createElement('p');
          p1.textContent = state.errorFilters;
          var btn1 = document.createElement('button');
          btn1.type = 'button';
          btn1.className = 'btn btn-primary';
          btn1.dataset.action = 'retry-fetch-filters';
          btn1.textContent = 'Retry loading filters';
          ef.appendChild(p1);
          ef.appendChild(btn1);
          container.appendChild(ef);
          return;
        }

        if (state.errorArticles) {
          container.classList.add('is-visible');
          var ea = document.createElement('div');
          ea.className = 'error-message';
          var p2 = document.createElement('p');
          p2.textContent = state.errorArticles;
          var btn2 = document.createElement('button');
          btn2.type = 'button';
          btn2.className = 'btn btn-primary';
          btn2.dataset.action = 'retry-fetch-articles';
          btn2.textContent = 'Retry loading articles';
          ea.appendChild(p2);
          ea.appendChild(btn2);
          container.appendChild(ea);
          return;
        }

        if (!state.isLoadingArticles && !state.errorArticles && Array.isArray(state.articles) && state.articles.length === 0) {
          container.classList.add('is-visible');
          var empty = document.createElement('div');
          empty.className = 'empty-message';
          var p3 = document.createElement('p');
          p3.textContent = 'No articles match your filters. Try adjusting them.';
          empty.appendChild(p3);
          container.appendChild(empty);
        }
      }

      function renderLoadingAndErrorAll() {
        loadingEls.forEach(function(el) {
          renderLoadingAndError(el);
        });
      }

      function renderArticleList(container, articles) {
        if (!container) return;
        container.innerHTML = '';
        if (!Array.isArray(articles) || articles.length === 0) {
          return;
        }
        articles.forEach(function(article) {
          var card = document.createElement('article');
          card.className = 'article-card';

          var link = document.createElement('a');
          link.href = 'javascript:void(0)';
          link.className = 'article-card-link';
          link.dataset.action = 'open-article';
          link.dataset.articleId = article.id;

          if (article.mainImage) {
            var figure = document.createElement('figure');
            figure.className = 'article-card-figure';
            var img = document.createElement('img');
            img.src = article.mainImage;
            img.alt = article.title || 'Article image';
            figure.appendChild(img);
            link.appendChild(figure);
          }

          var body = document.createElement('div');
          body.className = 'article-card-body';

          var metaParts = [];
          if (article.category) {
            metaParts.push(article.category);
          }
          if (article.difficulty) {
            metaParts.push(capitalizeFirst(article.difficulty));
          }
          if (article.estimatedReadingTimeMinutes) {
            metaParts.push(article.estimatedReadingTimeMinutes + ' min read');
          }
          if (article.contentType) {
            metaParts.push(capitalizeFirst(article.contentType));
          }
          var metaLine = document.createElement('p');
          metaLine.className = 'article-meta';
          metaLine.textContent = metaParts.join(' b7 ');
          body.appendChild(metaLine);

          var titleEl = document.createElement('h2');
          titleEl.className = 'article-title';
          titleEl.textContent = article.title || 'Untitled article';
          body.appendChild(titleEl);

          if (Array.isArray(article.tags) && article.tags.length > 0) {
            var tagsEl = document.createElement('p');
            tagsEl.className = 'article-tags';
            tagsEl.textContent = article.tags.map(function(t) { return '#' + t; }).join(' ');
            body.appendChild(tagsEl);
          }

          if (typeof article.averageRating === 'number' && typeof article.ratingCount === 'number' && article.ratingCount > 0) {
            var ratingEl = document.createElement('p');
            ratingEl.className = 'article-rating';
            ratingEl.textContent = 'Rating ' + article.averageRating.toFixed(1) + ' (' + article.ratingCount + ' votes)';
            body.appendChild(ratingEl);
          }

          link.appendChild(body);
          card.appendChild(link);
          container.appendChild(card);
        });
      }

      function renderPagination(container, totalCount) {
        if (!container) return;
        container.innerHTML = '';
        var total = typeof totalCount === 'number' ? totalCount : 0;
        var pageSize = state.pageSize || 10;
        if (total <= pageSize) {
          container.classList.add('is-hidden');
          return;
        }
        container.classList.remove('is-hidden');

        var totalPages = Math.max(1, Math.ceil(total / pageSize));
        var currentPage = state.page || 1;

        var prevBtn = document.createElement('button');
        prevBtn.type = 'button';
        prevBtn.className = 'page-btn prev-page';
        prevBtn.textContent = 'Previous';
        prevBtn.dataset.action = 'change-page';
        prevBtn.dataset.page = String(Math.max(1, currentPage - 1));
        if (currentPage === 1) {
          prevBtn.disabled = true;
        }
        container.appendChild(prevBtn);

        for (var i = 1; i <= totalPages; i++) {
          var pageBtn = document.createElement('button');
          pageBtn.type = 'button';
          pageBtn.className = 'page-btn page-number';
          pageBtn.textContent = String(i);
          pageBtn.dataset.action = 'change-page';
          pageBtn.dataset.page = String(i);
          if (i === currentPage) {
            pageBtn.classList.add('is-current');
            pageBtn.disabled = true;
          }
          container.appendChild(pageBtn);
        }

        var nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.className = 'page-btn next-page';
        nextBtn.textContent = 'Next';
        nextBtn.dataset.action = 'change-page';
        nextBtn.dataset.page = String(Math.min(totalPages, currentPage + 1));
        if (currentPage === totalPages) {
          nextBtn.disabled = true;
        }
        container.appendChild(nextBtn);
      }

      function renderAllResultsSummary() {
        resultsSummaryEls.forEach(function(el) {
          renderResultsSummary(el);
        });
      }

      function renderAllArticleLists() {
        articleListEls.forEach(function(el) {
          renderArticleList(el, state.articles);
        });
      }

      function renderAllPagination() {
        paginationEls.forEach(function(el) {
          renderPagination(el, state.totalCount);
        });
      }

      function updateFilterInputsFromState() {
        if (categorySelect) {
          categorySelect.value = state.filters.category || '';
        }
        if (difficultySelect) {
          difficultySelect.value = state.filters.difficulty || '';
        }
        if (readingTimeSelect) {
          readingTimeSelect.value = state.filters.maxReadingTimeMinutes ? String(state.filters.maxReadingTimeMinutes) : '';
        }
        if (contentTypeSelect) {
          contentTypeSelect.value = state.filters.contentType || '';
        }
        if (sortSelect && state.sortBy) {
          sortSelect.value = state.sortBy;
        }
        if (tagOptionEls.length > 0 && state.filterOptions && Array.isArray(state.filterOptions.tags)) {
          tagOptionEls.forEach(function(el) {
            renderTagOptions(el, state.filterOptions.tags, state.filters.tags);
          });
        }
      }

      function loadArticles() {
        state.isLoadingArticles = true;
        state.errorArticles = null;
        state.articles = [];
        state.totalCount = 0;
        renderAllArticleLists();
        renderLoadingAndErrorAll();

        try {
          var filtersParam = {};
          if (state.filters.category) {
            filtersParam.category = state.filters.category;
          }
          if (state.filters.difficulty) {
            filtersParam.difficulty = state.filters.difficulty;
          }
          if (state.filters.maxReadingTimeMinutes) {
            filtersParam.maxReadingTimeMinutes = state.filters.maxReadingTimeMinutes;
          }
          if (state.filters.contentType) {
            filtersParam.contentType = state.filters.contentType;
          }
          if (state.filters.tags && state.filters.tags.length > 0) {
            filtersParam.tags = state.filters.tags.slice();
          }

          var result = WebsiteSDK.listArticles(filtersParam, state.sortBy, state.page, state.pageSize);
          state.articles = Array.isArray(result.articles) ? result.articles : [];
          state.totalCount = typeof result.totalCount === 'number' ? result.totalCount : state.articles.length;
          state.isLoadingArticles = false;

          renderLoadingAndErrorAll();
          renderAllArticleLists();
          renderAllPagination();
          renderAllResultsSummary();
        } catch (err) {
          state.isLoadingArticles = false;
          state.errorArticles = 'Unable to load articles. Please try again.';
          renderLoadingAndErrorAll();
        }
      }

      function loadFilterOptions() {
        state.isLoadingFilters = true;
        state.errorFilters = null;
        renderLoadingAndErrorAll();
        try {
          var options = WebsiteSDK.getArticleFilterOptions();
          state.filterOptions = options;
          state.isLoadingFilters = false;

          var defaultSort = null;
          if (options && Array.isArray(options.sortOptions) && options.sortOptions.length > 0) {
            defaultSort = options.sortOptions[0].value;
          }
          state.defaultSort = defaultSort;

          var urlNeedsUpdate = false;

          if (!state.sortBy) {
            state.sortBy = defaultSort;
            urlNeedsUpdate = true;
          } else if (options.sortOptions && !options.sortOptions.some(function(opt) { return opt.value === state.sortBy; })) {
            state.sortBy = defaultSort;
            urlNeedsUpdate = true;
          }

          if (state.filters.category && (!options.categories || !options.categories.some(function(cat) { return cat.value === state.filters.category; }))) {
            state.filters.category = null;
            urlNeedsUpdate = true;
          }

          if (state.filters.difficulty && (!options.difficulties || !options.difficulties.some(function(diff) { return diff.value === state.filters.difficulty; }))) {
            state.filters.difficulty = null;
            urlNeedsUpdate = true;
          }

          if (urlNeedsUpdate) {
            updateUrlFromState('replace');
          }

          if (categorySelect) {
            renderCategoryOptions(categorySelect, options.categories || [], state.filters.category);
          }
          if (difficultySelect) {
            renderDifficultyOptions(difficultySelect, options.difficulties || [], state.filters.difficulty);
          }
          if (readingTimeSelect) {
            renderReadingTimeOptions(readingTimeSelect, options.readingTimePresets || [], state.filters.maxReadingTimeMinutes);
          }
          if (sortSelect) {
            renderSortOptions(sortSelect, options.sortOptions || [], state.sortBy);
          }
          if (tagOptionEls.length > 0) {
            tagOptionEls.forEach(function(el) {
              renderTagOptions(el, options.tags || [], state.filters.tags);
            });
          }

          renderAllResultsSummary();
          loadArticles();
        } catch (err) {
          state.isLoadingFilters = false;
          state.errorFilters = 'Unable to load filters. Please try again.';
          renderLoadingAndErrorAll();
        }
      }

      function handleCategoryChange(value) {
        state.filters.category = value || null;
        state.page = 1;
        updateUrlFromState('push');
        loadArticles();
      }

      function handleDifficultyChange(value) {
        state.filters.difficulty = value || null;
        state.page = 1;
        updateUrlFromState('push');
        loadArticles();
      }

      function handleReadingTimeChange(value) {
        var val = value ? parseInt(value, 10) : NaN;
        state.filters.maxReadingTimeMinutes = Number.isNaN(val) ? null : val;
        state.page = 1;
        updateUrlFromState('push');
        loadArticles();
      }

      function handleContentTypeChange(value) {
        state.filters.contentType = value || null;
        state.page = 1;
        updateUrlFromState('push');
        loadArticles();
      }

      function handleSortChange(value) {
        if (!value) {
          state.sortBy = state.defaultSort;
        } else {
          state.sortBy = value;
        }
        state.page = 1;
        updateUrlFromState('push');
        loadArticles();
      }

      function handleToggleTag(value) {
        if (!value) return;
        var idx = state.filters.tags.indexOf(value);
        if (idx === -1) {
          state.filters.tags.push(value);
        } else {
          state.filters.tags.splice(idx, 1);
        }
        state.page = 1;
        if (state.filterOptions && Array.isArray(state.filterOptions.tags)) {
          tagOptionEls.forEach(function(el) {
            renderTagOptions(el, state.filterOptions.tags, state.filters.tags);
          });
        }
        loadArticles();
      }

      function handleClearFilters() {
        state.filters.category = null;
        state.filters.difficulty = null;
        state.filters.maxReadingTimeMinutes = null;
        state.filters.contentType = null;
        state.filters.tags = [];
        state.sortBy = state.defaultSort;
        state.page = 1;

        updateFilterInputsFromState();
        updateUrlFromState('push');
        loadArticles();
      }

      function handleChangePage(pageStr) {
        var pageVal = pageStr ? parseInt(pageStr, 10) : NaN;
        if (Number.isNaN(pageVal) || pageVal < 1 || pageVal === state.page) {
          return;
        }
        state.page = pageVal;
        updateUrlFromState('push');
        loadArticles();
      }

      function handleOpenArticle(articleId) {
        if (!articleId) return;
        var url = 'article_detail.html?id=' + encodeURIComponent(articleId);
        window.location.href = url;
      }

      document.addEventListener('change', function(event) {
        var target = event.target;
        if (!target || !target.dataset) return;
        var action = target.dataset.action;
        if (!action) return;
        if (action === 'change-category') {
          handleCategoryChange(target.value);
        } else if (action === 'change-difficulty') {
          handleDifficultyChange(target.value);
        } else if (action === 'change-reading-time') {
          handleReadingTimeChange(target.value);
        } else if (action === 'change-content-type') {
          handleContentTypeChange(target.value);
        } else if (action === 'change-sort') {
          handleSortChange(target.value);
        }
      });

      document.addEventListener('click', function(event) {
        var target = event.target.closest('[data-action]');
        if (!target) return;
        var action = target.dataset.action;
        if (!action) return;

        if (action === 'clear-filters') {
          event.preventDefault();
          handleClearFilters();
        } else if (action === 'toggle-tag') {
          event.preventDefault();
          handleToggleTag(target.dataset.tagValue || '');
        } else if (action === 'change-page') {
          event.preventDefault();
          handleChangePage(target.dataset.page || '');
        } else if (action === 'open-article') {
          event.preventDefault();
          handleOpenArticle(target.dataset.articleId || '');
        } else if (action === 'retry-fetch-filters') {
          event.preventDefault();
          loadFilterOptions();
        } else if (action === 'retry-fetch-articles') {
          event.preventDefault();
          loadArticles();
        }
      });

      window.addEventListener('popstate', function() {
        syncStateFromUrl();
        updateFilterInputsFromState();
        renderAllResultsSummary();
        loadArticles();
      });

      syncStateFromUrl();
      loadFilterOptions();
    });
  </script>
</body>
</html>
