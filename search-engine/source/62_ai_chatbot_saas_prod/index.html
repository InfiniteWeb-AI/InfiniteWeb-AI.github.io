      <nav class="footer-nav" aria-label="Footer navigation">

  <!-- SDK / business logic -->
  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // -----------------------------
      // URL + State helpers (home-page-init, deep-link-state-controller)
      // -----------------------------
      function getUrlState() {
        var search = window.location.search || '';
        var urlParams = new URLSearchParams(search);

        var pageKey = urlParams.get('pageKey');
        if (!pageKey) {
          // Default to the canonical home marketing configuration when not provided
          pageKey = 'home';
        }

        var sectionId = urlParams.get('sectionId');
        var cta = urlParams.get('cta');

        return {
          urlParams: urlParams,
          pageKey: pageKey,
          sectionId: sectionId,
          cta: cta
        };
      }

      // -----------------------------
      // cta-routing-adapter
      // -----------------------------
      function resolveTargetUrl(targetPageKey, overrides, baseParams) {
        if (!targetPageKey) {
          return null;
        }

        // Only allow navigation to the explicitly supported pages
        var allowedTargets = {
          pricing: 'pricing.html',
          features: 'features.html',
          dashboard: 'dashboard.html'
        };

        if (!Object.prototype.hasOwnProperty.call(allowedTargets, targetPageKey)) {
          console.warn('Navigation blocked for unsupported target_page_key:', targetPageKey);
          return null;
        }

        var params = new URLSearchParams(baseParams ? baseParams.toString() : '');

        if (overrides) {
          for (var key in overrides) {
            if (Object.prototype.hasOwnProperty.call(overrides, key)) {
              var value = overrides[key];
              if (value === null || value === undefined || value === '') {
                params.delete(key);
              } else {
                params.set(key, String(value));
              }
            }
          }
        }

        var targetPath = allowedTargets[targetPageKey];
        var qs = params.toString();
        return qs ? targetPath + '?' + qs : targetPath;
      }

      // -----------------------------
      // Rendering helpers
      // -----------------------------
      function renderMarketingHeader(container, marketingData) {
        container.innerHTML = '';

        if (!marketingData) {
          var errorText = document.createElement('p');
          errorText.className = 'hero-error';
          errorText.textContent = 'Unable to load page content.';
          container.appendChild(errorText);
          return;
        }

        var title = document.createElement('h1');
        title.id = 'hero-title';
        title.className = 'hero-title';
        title.textContent = marketingData.title || '';

        var subtitle = document.createElement('p');
        subtitle.className = 'hero-subtitle';
        subtitle.textContent = marketingData.subtitle || '';

        container.appendChild(title);
        container.appendChild(subtitle);
      }

      function renderMarketingSections(container, sections) {
        container.innerHTML = '';

        if (!sections || !sections.length) {
          var empty = document.createElement('p');
          empty.className = 'sections-empty';
          empty.textContent = 'Content will appear here when configured.';
          container.appendChild(empty);
          return;
        }

        sections.forEach(function(section) {
          var article = document.createElement('article');
          article.className = 'section-item';
          article.setAttribute('data-component', 'section-item');
          if (section.id) {
            article.setAttribute('data-section-id', section.id);
          }

          if (section.highlight) {
            article.classList.add('section-item--featured');
          }

          var heading = document.createElement('h2');
          heading.className = 'section-item__heading';
          heading.textContent = section.heading || '';
          article.appendChild(heading);

          if (section.body) {
            var body = document.createElement('p');
            body.className = 'section-item__body';
            body.textContent = section.body;
            article.appendChild(body);
          }

          if (section.bullets && section.bullets.length) {
            var list = document.createElement('ul');
            list.className = 'section-item__bullets';
            section.bullets.forEach(function(bulletText) {
              var li = document.createElement('li');
              li.className = 'section-item__bullet';
              li.textContent = bulletText;
              list.appendChild(li);
            });
            article.appendChild(list);
          }

          var actions = document.createElement('div');
          actions.className = 'section-item__actions';

          var learnMoreBtn = document.createElement('button');
          learnMoreBtn.type = 'button';
          learnMoreBtn.className = 'link-button section-item__learn-more';
          learnMoreBtn.setAttribute('data-action', 'section-learn-more');
          if (section.id) {
            learnMoreBtn.setAttribute('data-section-id', section.id);
          }
          learnMoreBtn.textContent = 'Learn more';

          actions.appendChild(learnMoreBtn);
          article.appendChild(actions);

          container.appendChild(article);
        });
      }

      function renderPrimaryCta(container, primaryCta) {
        if (!primaryCta || !primaryCta.label) {
          container.style.display = 'none';
          container.textContent = '';
          container.removeAttribute('data-target-page-key');
          return;
        }

        container.style.display = '';
        container.textContent = primaryCta.label;
        if (primaryCta.target_page_key) {
          container.setAttribute('data-target-page-key', primaryCta.target_page_key);
          container.disabled = false;
        } else {
          container.removeAttribute('data-target-page-key');
          container.disabled = true;
        }
      }

      function renderSecondaryCta(container, secondaryCta) {
        if (!secondaryCta || !secondaryCta.label) {
          container.style.display = 'none';
          container.textContent = '';
          container.removeAttribute('data-target-page-key');
          return;
        }

        container.style.display = '';
        container.textContent = secondaryCta.label;
        if (secondaryCta.target_page_key) {
          container.setAttribute('data-target-page-key', secondaryCta.target_page_key);
          container.disabled = false;
        } else {
          container.removeAttribute('data-target-page-key');
          container.disabled = true;
        }
      }

      // -----------------------------
      // deep-link-state-controller
      // -----------------------------
      function applyDeepLinkState(state) {
        if (state && state.sectionId) {
          var sectionSelector = '[data-section-id="' + state.sectionId + '"]';
          var targetSection = document.querySelector(sectionSelector);
          if (targetSection) {
            targetSection.classList.add('section-item--highlighted');
            try {
              targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (e) {
              targetSection.scrollIntoView(true);
            }
            setTimeout(function() {
              targetSection.classList.remove('section-item--highlighted');
            }, 2000);
          }
        }

        if (state && state.cta) {
          var targetCta = null;
          if (state.cta === 'primary') {
            targetCta = document.querySelector('[data-component="primary-cta-button"]');
          } else if (state.cta === 'secondary') {
            targetCta = document.querySelector('[data-component="secondary-cta-button"]');
          }
          if (targetCta) {
            targetCta.focus();
          }
        }
      }

      // -----------------------------
      // Event wiring (CTA + nav routing)
      // -----------------------------
      function setupActionHandlers(urlParams) {
        var baseParams = urlParams;
        var actionElements = document.querySelectorAll('[data-action]');

        actionElements.forEach(function(element) {
          var action = element.getAttribute('data-action');

          if (action === 'primary-cta') {
            element.addEventListener('click', function(event) {
              var btn = event.currentTarget;
              var targetPageKey = btn.getAttribute('data-target-page-key');
              var url = resolveTargetUrl(targetPageKey, { source: 'home_primary', cta: 'primary' }, baseParams);
              if (url) {
                window.location.href = url;
              }
            });
          } else if (action === 'secondary-cta') {
            element.addEventListener('click', function(event) {
              var btn = event.currentTarget;
              var targetPageKey = btn.getAttribute('data-target-page-key');
              var url = resolveTargetUrl(targetPageKey, { source: 'home_secondary', cta: 'secondary' }, baseParams);
              if (url) {
                window.location.href = url;
              }
            });
          } else if (action === 'go-dashboard') {
            element.addEventListener('click', function() {
              var url = resolveTargetUrl('dashboard', { source: 'home_dashboard' }, baseParams);
              if (url) {
                window.location.href = url;
              }
            });
          } else if (action === 'section-learn-more') {
            element.addEventListener('click', function(event) {
              var btn = event.currentTarget;
              var sectionId = btn.getAttribute('data-section-id') || '';
              var overrides = { source: 'home_section' };
              if (sectionId) {
                overrides.sectionId = sectionId;
              }
              var url = resolveTargetUrl('features', overrides, baseParams);
              if (url) {
                window.location.href = url;
              }
            });
          } else if (action === 'nav-features') {
            element.addEventListener('click', function(event) {
              event.preventDefault();
              var url = resolveTargetUrl('features', { source: 'home_nav_features' }, baseParams);
              if (url) {
                window.location.href = url;
              }
            });
          } else if (action === 'nav-pricing') {
            element.addEventListener('click', function(event) {
              event.preventDefault();
              var url = resolveTargetUrl('pricing', { source: 'home_nav_pricing' }, baseParams);
              if (url) {
                window.location.href = url;
              }
            });
          } else if (action === 'nav-dashboard') {
            element.addEventListener('click', function(event) {
              event.preventDefault();
              var url = resolveTargetUrl('dashboard', { source: 'home_nav_dashboard' }, baseParams);
              if (url) {
                window.location.href = url;
              }
            });
          }
        });
      }

      // -----------------------------
      // Page init (home-page-init)
      // -----------------------------
      var state = getUrlState();
      var marketingData = null;

      try {
        marketingData = WebsiteSDK.getMarketingPageContent(state.pageKey);
      } catch (err) {
        console.error('Failed to load marketing content for pageKey:', state.pageKey, err);
        var headerContainer = document.querySelector('[data-populate="marketing-header"]');
        if (headerContainer) {
          headerContainer.innerHTML = '';
          var errorMessage = document.createElement('p');
          errorMessage.className = 'hero-error';
          errorMessage.textContent = 'Unable to load page content.';
          headerContainer.appendChild(errorMessage);
        }
        return;
      }

      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(element) {
        var dataType = element.getAttribute('data-populate');
        if (dataType === 'marketing-header') {
          renderMarketingHeader(element, marketingData);
        } else if (dataType === 'marketing-sections') {
          var sections = marketingData && marketingData.sections ? marketingData.sections : [];
          renderMarketingSections(element, sections);
        } else if (dataType === 'primary-cta') {
          var primaryCta = marketingData ? marketingData.primary_cta : null;
          renderPrimaryCta(element, primaryCta);
        } else if (dataType === 'secondary-cta') {
          var secondaryCta = marketingData ? marketingData.secondary_cta : null;
          renderSecondaryCta(element, secondaryCta);
        }
      });

      // Apply deep link focus/highlight after content is ready
      applyDeepLinkState({ sectionId: state.sectionId, cta: state.cta });

      // Wire up interactions (CTAs, section learn more, nav)
      setupActionHandlers(state.urlParams);
    });
  </script>
</body>
