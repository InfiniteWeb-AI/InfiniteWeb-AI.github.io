<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Chatbot SaaS</title>

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

  <!-- Global Styles -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Page-specific Styles -->
  <link rel="stylesheet" href="features.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand" aria-label="Nerdanne AI Website Chatbot">
        <div class="brand-avatar" aria-hidden="true"></div>
        <div class="brand-text">
          <div class="brand-name">NERDANNE</div>
          <div class="brand-tagline">Website Chatbot</div>
        </div>
      </div>

      <nav class="main-nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="index.html" class="nav-link">Home</a>
          </li>
          <li class="nav-item">
            <a href="features.html" class="nav-link nav-link--active">Product</a>
          </li>
          <li class="nav-item">
            <a href="pricing.html" class="nav-link">Pricing</a>
          </li>
          <li class="nav-item">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
          </li>
          <li class="nav-item">
            <a href="help.html" class="nav-link">Help</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="content" class="site-main" role="main">
    <div class="features-page" data-component="marketing-content-root" data-populate="marketing-page">
      <div class="features-hero-shell">
        <div class="features-hero-blob features-hero-blob--left" aria-hidden="true"></div>
        <div class="features-hero-blob features-hero-blob--right" aria-hidden="true"></div>
        <section class="features-header container" data-component="page-header-summary" aria-label="Product features summary">
          <!-- Title and subtitle populated via JS -->
        </section>
      </div>

      <div class="features-main container">
        <section class="features-nav-wrapper">
          <nav class="feature-nav" aria-label="Feature sections navigation">
            <ul class="feature-nav-list" data-component="feature-section-navigation" data-populate="sections-nav">
              <!-- Section navigation items populated via JS -->
            </ul>
          </nav>
        </section>

        <section class="features-controls" aria-label="Feature filters and view options">
          <div class="features-controls-row">
            <div class="features-controls-col features-controls-col--left" data-component="use-case-selector" data-populate="use-cases">
              <!-- Use case selector populated via JS -->
            </div>
            <div class="features-controls-col features-controls-col--right" data-component="view-mode-toggle">
              <!-- View mode toggle populated via JS -->
            </div>
          </div>
        </section>

        <div class="features-content-layout">
          <section class="features-section-list" data-component="feature-section-list" data-populate="sections-list">
            <!-- Feature sections populated via JS -->
          </section>

          <aside class="features-doc-links" data-component="feature-documentation-link-list" data-populate="documentation-links" aria-label="Feature documentation links">
            <!-- Documentation links populated via JS -->
          </aside>
        </div>

        <section class="features-limitations" data-component="limitations-and-plan-differences-summary" data-populate="limitations-summary">
          <!-- Limitations & plan differences summary populated via JS -->
        </section>

        <section class="features-plan-cta" data-component="plan-comparison-cta-panel" data-populate="cta-panel" aria-label="Plan comparison actions">
          <!-- Plan comparison CTA panel populated via JS -->
        </section>
      </div>

      <div class="marketing-loader" data-component="marketing-content-loader" aria-live="polite" aria-busy="true">
        <!-- Loading / error state populated via JS -->
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <div class="footer-avatar" aria-hidden="true"></div>
        <div class="footer-brand-text">
          <div class="footer-brand-name">NERDANNE</div>
          <div class="footer-brand-tagline">AI Chatbot Platform</div>
        </div>
      </div>

      <nav class="footer-nav" aria-label="Footer navigation">
        <ul class="footer-links">
          <li class="footer-item">
            <a href="about.html" class="footer-link">About</a>
          </li>
          <li class="footer-item">
            <a href="contact.html" class="footer-link">Contact</a>
          </li>
          <li class="footer-item">
            <a href="pricing.html" class="footer-link">Pricing</a>
          </li>
          <li class="footer-item">
            <a href="privacy.html" class="footer-link">Privacy Policy</a>
          </li>
          <li class="footer-item">
            <a href="terms.html" class="footer-link">Terms of Service</a>
          </li>
        </ul>
      </nav>
    </div>

    <div class="footer-bottom">
      <div class="container footer-bottom-inner">
        <p class="footer-copy">&copy; 2026 Nerdanne AI. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    (function() {
      const DEFAULT_PAGE_KEY = 'product_features';
      const VALID_VIEWS = ['summary', 'details'];

      const appState = {
        pageKey: null,
        content: null,
        currentSectionId: null,
        baseTitle: document.title
      };

      function getUrlState() {
        const params = new URLSearchParams(window.location.search);
        const pageKey = params.get('pageKey') || DEFAULT_PAGE_KEY;
        const viewParam = params.get('view');
        const view = VALID_VIEWS.indexOf(viewParam) !== -1 ? viewParam : 'details';
        const sectionId = params.get('sectionId') || null;
        const useCase = params.get('useCase') || null;
        const fromPage = params.get('fromPage') || null;
        return { pageKey, view, sectionId, useCase, fromPage };
      }

      function setUrlState(partial, options) {
        const opts = options || { replace: false };
        const current = getUrlState();
        const next = Object.assign({}, current, partial);
        const params = new URLSearchParams();

        if (next.pageKey && next.pageKey !== DEFAULT_PAGE_KEY) {
          params.set('pageKey', next.pageKey);
        }
        if (next.sectionId) {
          params.set('sectionId', next.sectionId);
        }
        if (next.view && next.view !== 'details') {
          params.set('view', next.view);
        }
        if (next.useCase) {
          params.set('useCase', next.useCase);
        }
        if (next.fromPage) {
          params.set('fromPage', next.fromPage);
        }

        const query = params.toString();
        const newUrl = window.location.pathname + (query ? '?' + query : '');

        if (opts.replace) {
          window.history.replaceState(null, '', newUrl);
        } else {
          window.history.pushState(null, '', newUrl);
        }
      }

      function normalizeMarketingContent(content) {
        const safe = content || {};
        const sections = Array.isArray(safe.sections) ? safe.sections : [];
        safe.sections = sections.map(function(sec) {
          return {
            id: sec && sec.id ? String(sec.id) : '',
            heading: sec && sec.heading ? String(sec.heading) : '',
            body: sec && sec.body ? String(sec.body) : '',
            bullets: Array.isArray(sec && sec.bullets) ? sec.bullets.slice() : [],
            highlight: Boolean(sec && sec.highlight)
          };
        }).filter(function(sec) { return !!sec.id; });
        return safe;
      }

      function getLoaderElement() {
        return document.querySelector('[data-component="marketing-content-loader"]');
      }

      function showLoaderState(state, message) {
        const loader = getLoaderElement();
        if (!loader) return;
        loader.dataset.state = state;
        loader.innerHTML = '';
        if (state === 'hidden') {
          loader.setAttribute('hidden', 'hidden');
          loader.setAttribute('aria-busy', 'false');
          return;
        }

        loader.removeAttribute('hidden');
        loader.setAttribute('aria-busy', state === 'loading' ? 'true' : 'false');

        const inner = document.createElement('div');
        inner.className = 'marketing-loader-inner';
        const text = document.createElement('p');
        text.className = 'marketing-loader-text';
        text.textContent = message || (state === 'loading' ? 'Loading contenta0a0a0' : 'Content could not be loaded. Please refresh the page.');
        inner.appendChild(text);
        loader.appendChild(inner);
      }

      function ensureValidSectionId(sections, currentSectionId) {
        if (!sections || !sections.length) return null;
        if (currentSectionId && sections.some(function(sec) { return sec.id === currentSectionId; })) {
          return currentSectionId;
        }
        return sections[0].id;
      }

      function renderHeader(container, content) {
        if (!container) return;
        container.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.className = 'features-header-inner';

        const titleText = content && content.title ? content.title : 'Product features';
        const subtitleText = content && content.subtitle ? content.subtitle : '';

        const h1 = document.createElement('h1');
        h1.id = 'features-title';
        h1.className = 'features-title';
        h1.textContent = titleText;

        wrapper.appendChild(h1);

        if (subtitleText) {
          const p = document.createElement('p');
          p.className = 'features-subtitle';
          p.textContent = subtitleText;
          wrapper.appendChild(p);
        }

        container.appendChild(wrapper);
      }

      function renderFeatureNav(container, content, urlState) {
        if (!container) return;
        container.innerHTML = '';
        const sections = (content && content.sections) || [];

        sections.forEach(function(sec) {
          if (!sec.id) return;
          const li = document.createElement('li');
          li.className = 'feature-nav-item';
          if (urlState.sectionId === sec.id) {
            li.classList.add('feature-nav-item--active');
          }

          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'feature-nav-link';
          button.textContent = sec.heading || 'Untitled section';
          button.dataset.action = 'navigate-section';
          button.dataset.sectionId = sec.id;

          li.appendChild(button);
          container.appendChild(li);
        });
      }

      function renderUseCaseSelector(container, content, urlState) {
        if (!container) return;
        container.innerHTML = '';
        const sections = (content && content.sections) || [];
        if (!sections.length) return;

        const wrapper = document.createElement('div');
        wrapper.className = 'use-case-selector-inner';

        const label = document.createElement('span');
        label.className = 'use-case-label';
        label.textContent = 'Use case';
        wrapper.appendChild(label);

        const chips = document.createElement('div');
        chips.className = 'use-case-chips';

        const highlighted = sections.filter(function(sec) { return sec.highlight && !!sec.id; });
        const baseOptions = highlighted.length ? highlighted : sections;
        const options = [];
        baseOptions.forEach(function(sec) {
          if (!sec.id) return;
          options.push({ id: sec.id, label: sec.heading || sec.id });
        });

        const allChip = document.createElement('button');
        allChip.type = 'button';
        allChip.className = 'use-case-chip';
        if (!urlState.useCase) {
          allChip.classList.add('use-case-chip--active');
        }
        allChip.textContent = 'All';
        allChip.dataset.action = 'select-use-case';
        allChip.dataset.useCaseId = '';
        chips.appendChild(allChip);

        const seenIds = Object.create(null);
        options.forEach(function(opt) {
          if (!opt.id || seenIds[opt.id]) return;
          seenIds[opt.id] = true;
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'use-case-chip';
          if (urlState.useCase === opt.id) {
            chip.classList.add('use-case-chip--active');
          }
          chip.textContent = opt.label;
          chip.dataset.action = 'select-use-case';
          chip.dataset.useCaseId = opt.id;
          chips.appendChild(chip);
        });

        wrapper.appendChild(chips);
        container.appendChild(wrapper);
      }

      function renderViewToggle(container, urlState) {
        if (!container) return;
        container.innerHTML = '';

        const wrapper = document.createElement('div');
        wrapper.className = 'view-toggle';

        const summaryBtn = document.createElement('button');
        summaryBtn.type = 'button';
        summaryBtn.className = 'view-toggle-btn';
        summaryBtn.textContent = 'Summary';
        summaryBtn.dataset.action = 'change-view';
        summaryBtn.dataset.viewMode = 'summary';
        if (urlState.view === 'summary') {
          summaryBtn.classList.add('view-toggle-btn--active');
        }

        const detailsBtn = document.createElement('button');
        detailsBtn.type = 'button';
        detailsBtn.className = 'view-toggle-btn';
        detailsBtn.textContent = 'Details';
        detailsBtn.dataset.action = 'change-view';
        detailsBtn.dataset.viewMode = 'details';
        if (urlState.view === 'details') {
          detailsBtn.classList.add('view-toggle-btn--active');
        }

        wrapper.appendChild(summaryBtn);
        wrapper.appendChild(detailsBtn);
        container.appendChild(wrapper);
      }

      function renderFeatureList(container, content, urlState) {
        if (!container) return;
        container.innerHTML = '';
        const sections = (content && content.sections) || [];
        const view = urlState.view;
        const currentSectionId = urlState.sectionId;
        const useCaseFilter = urlState.useCase;

        sections.forEach(function(sec) {
          if (!sec.id) return;
          const isActive = sec.id === currentSectionId;
          const isEmphasized = !useCaseFilter || useCaseFilter === sec.id;

          const sectionEl = document.createElement('article');
          sectionEl.className = 'feature-section';
          sectionEl.id = 'feature-section-' + sec.id;
          if (isActive) {
            sectionEl.classList.add('feature-section--active');
          }
          if (isEmphasized) {
            sectionEl.classList.add('feature-section--emphasized');
          }

          const headerButton = document.createElement('button');
          headerButton.type = 'button';
          headerButton.className = 'feature-section-header';
          headerButton.dataset.action = 'navigate-section';
          headerButton.dataset.sectionId = sec.id;

          const h2 = document.createElement('h2');
          h2.className = 'feature-section-title';
          h2.textContent = sec.heading || 'Untitled section';
          headerButton.appendChild(h2);
          sectionEl.appendChild(headerButton);

          const contentWrapper = document.createElement('div');
          contentWrapper.className = 'feature-section-body';

          const bodyText = sec.body || '';
          const bullets = Array.isArray(sec.bullets) ? sec.bullets : [];
          const paragraphs = bodyText ? bodyText.split(/\n+/).filter(function(t) { return !!t; }) : [];

          if (view === 'summary') {
            const excerpt = bodyText ? bodyText.slice(0, 200) + (bodyText.length > 200 ? '…' : '') : '';
            if (excerpt) {
              const p = document.createElement('p');
              p.className = 'feature-section-excerpt';
              p.textContent = excerpt;
              contentWrapper.appendChild(p);
            }
          } else {
            if (isActive) {
              paragraphs.forEach(function(text) {
                const p = document.createElement('p');
                p.className = 'feature-section-paragraph';
                p.textContent = text;
                contentWrapper.appendChild(p);
              });
              if (bullets.length) {
                const ul = document.createElement('ul');
                ul.className = 'feature-section-bullets';
                bullets.forEach(function(item) {
                  const li = document.createElement('li');
                  li.className = 'feature-section-bullet';
                  li.textContent = item;
                  ul.appendChild(li);
                });
                contentWrapper.appendChild(ul);
              }
            } else {
              const excerptDetails = bodyText ? bodyText.slice(0, 160) + (bodyText.length > 160 ? '…' : '') : '';
              if (excerptDetails) {
                const p = document.createElement('p');
                p.className = 'feature-section-excerpt';
                p.textContent = excerptDetails;
                contentWrapper.appendChild(p);
              }
            }
          }

          const docLink = document.createElement('button');
          docLink.type = 'button';
          docLink.className = 'feature-section-doc-link';
          docLink.textContent = 'View documentation';
          docLink.dataset.action = 'open-doc';
          docLink.dataset.topicId = sec.id;
          contentWrapper.appendChild(docLink);

          sectionEl.appendChild(contentWrapper);
          container.appendChild(sectionEl);
        });
      }

      function renderDocumentationLinks(container, content, urlState) {
        if (!container) return;
        container.innerHTML = '';
        const sections = (content && content.sections) || [];
        if (!sections.length) return;

        const wrapper = document.createElement('div');
        wrapper.className = 'doc-links-inner';

        const heading = document.createElement('h2');
        heading.className = 'doc-links-title';
        heading.textContent = 'Documentation';
        wrapper.appendChild(heading);

        const list = document.createElement('ul');
        list.className = 'doc-links-list';

        sections.forEach(function(sec) {
          if (!sec.id) return;
          const li = document.createElement('li');
          li.className = 'doc-links-item';
          if (urlState.sectionId === sec.id) {
            li.classList.add('doc-links-item--active');
          }
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'doc-links-link';
          button.textContent = sec.heading || 'Feature';
          button.dataset.action = 'open-doc';
          button.dataset.topicId = sec.id;
          li.appendChild(button);
          list.appendChild(li);
        });

        wrapper.appendChild(list);
        container.appendChild(wrapper);
      }

      function isLimitationOrPlanSection(sec) {
        const heading = (sec && sec.heading ? sec.heading : '').toLowerCase();
        if (!heading) return false;
        const patterns = ['limit', 'limitation', 'quota', 'plan', 'pricing', 'usage', 'tier'];
        return patterns.some(function(keyword) { return heading.indexOf(keyword) !== -1; });
      }

      function renderLimitationsSummary(container, content) {
        if (!container) return;
        container.innerHTML = '';
        const sections = (content && content.sections) || [];
        const relevant = sections.filter(isLimitationOrPlanSection);

        if (!relevant.length) {
          container.setAttribute('hidden', 'hidden');
          return;
        }
        container.removeAttribute('hidden');

        const wrapper = document.createElement('div');
        wrapper.className = 'limitations-inner';

        const title = document.createElement('h2');
        title.className = 'limitations-title';
        title.textContent = 'Limitations & plan differences';
        wrapper.appendChild(title);

        const desc = document.createElement('p');
        desc.className = 'limitations-description';
        desc.textContent = 'Use this high-level overview to understand how capabilities vary by plan and where key limits apply. Refer to pricing for full details.';
        wrapper.appendChild(desc);

        const list = document.createElement('ul');
        list.className = 'limitations-list';

        relevant.forEach(function(sec) {
          const item = document.createElement('li');
          item.className = 'limitations-item';

          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'limitations-link';
          button.dataset.action = 'navigate-section';
          button.dataset.sectionId = sec.id;
          button.textContent = sec.heading || 'Details';
          item.appendChild(button);

          const body = sec.body || '';
          if (body) {
            const p = document.createElement('p');
            p.className = 'limitations-excerpt';
            const excerpt = body.length > 220 ? body.slice(0, 220) + '…' : body;
            p.textContent = excerpt;
            item.appendChild(p);
          }

          list.appendChild(item);
        });

        wrapper.appendChild(list);
        container.appendChild(wrapper);
      }

      function renderCtaPanel(container, content) {
        if (!container) return;
        container.innerHTML = '';

        const primary = content && content.primary_cta ? content.primary_cta : {};
        const secondary = content && content.secondary_cta ? content.secondary_cta : {};

        if (!primary.label && !secondary.label) {
          container.setAttribute('hidden', 'hidden');
          return;
        }
        container.removeAttribute('hidden');

        const wrapper = document.createElement('div');
        wrapper.className = 'plan-cta-inner';

        const heading = document.createElement('h2');
        heading.className = 'plan-cta-title';
        heading.textContent = primary.label ? ('Next: ' + primary.label) : 'Next steps';
        wrapper.appendChild(heading);

        const copy = document.createElement('p');
        copy.className = 'plan-cta-text';
        copy.textContent = 'Carry your current feature context into pricing and documentation to continue your evaluation.';
        wrapper.appendChild(copy);

        const actions = document.createElement('div');
        actions.className = 'plan-cta-actions';

        if (primary.label) {
          const primaryBtn = document.createElement('button');
          primaryBtn.type = 'button';
          primaryBtn.className = 'btn btn-outline-pill plan-cta-primary';
          primaryBtn.textContent = primary.label;
          primaryBtn.dataset.action = 'primary-cta';
          if (primary.target_page_key) {
            primaryBtn.dataset.targetPageKey = primary.target_page_key;
          }
          actions.appendChild(primaryBtn);
        }

        if (secondary.label) {
          const secondaryBtn = document.createElement('button');
          secondaryBtn.type = 'button';
          secondaryBtn.className = 'plan-cta-secondary';
          secondaryBtn.textContent = secondary.label;
          secondaryBtn.dataset.action = 'secondary-cta';
          if (secondary.target_page_key) {
            secondaryBtn.dataset.targetPageKey = secondary.target_page_key;
          }
          actions.appendChild(secondaryBtn);
        }

        wrapper.appendChild(actions);
        container.appendChild(wrapper);
      }

      function scrollToSection(sectionId) {
        if (!sectionId) return;
        const el = document.getElementById('feature-section-' + sectionId);
        if (!el) return;
        try {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (e) {
          el.scrollIntoView();
        }
      }

      function renderAll(scrollToActiveSection) {
        if (!appState.content) return;
        const urlState = getUrlState();

        const headerContainer = document.querySelector('[data-component="page-header-summary"]');
        renderHeader(headerContainer, appState.content);

        const navList = document.querySelector('[data-component="feature-section-navigation"]');
        renderFeatureNav(navList, appState.content, urlState);

        const useCaseContainer = document.querySelector('[data-component="use-case-selector"]');
        renderUseCaseSelector(useCaseContainer, appState.content, urlState);

        const viewToggleContainer = document.querySelector('[data-component="view-mode-toggle"]');
        renderViewToggle(viewToggleContainer, urlState);

        const featureListContainer = document.querySelector('[data-component="feature-section-list"]');
        renderFeatureList(featureListContainer, appState.content, urlState);

        const docLinksContainer = document.querySelector('[data-component="feature-documentation-link-list"]');
        renderDocumentationLinks(docLinksContainer, appState.content, urlState);

        const limitationsContainer = document.querySelector('[data-component="limitations-and-plan-differences-summary"]');
        renderLimitationsSummary(limitationsContainer, appState.content);

        const ctaContainer = document.querySelector('[data-component="plan-comparison-cta-panel"]');
        renderCtaPanel(ctaContainer, appState.content);

        if (scrollToActiveSection && urlState.sectionId && appState.currentSectionId !== urlState.sectionId) {
          scrollToSection(urlState.sectionId);
        }
        appState.currentSectionId = urlState.sectionId;
      }

      function handleCtaNavigation(type, targetPageKey) {
        const urlState = getUrlState();
        const context = urlState;

        if (targetPageKey === 'pricing') {
          const params = new URLSearchParams();
          params.set('fromPage', 'features');
          if (context.sectionId) params.set('sectionId', context.sectionId);
          if (context.useCase) params.set('useCase', context.useCase);
          if (context.view) params.set('view', context.view);
          const query = params.toString();
          window.location.href = 'pricing.html' + (query ? '?' + query : '');
        } else if (targetPageKey === 'help' || targetPageKey === 'help_center') {
          const params = new URLSearchParams();
          params.set('fromPage', 'features');
          if (context.sectionId) params.set('topic', context.sectionId);
          if (context.useCase) params.set('useCase', context.useCase);
          const query = params.toString();
          window.location.href = 'help.html' + (query ? '?' + query : '');
        } else {
          return;
        }
      }

      function openDocumentation(topicId) {
        const urlState = getUrlState();
        const params = new URLSearchParams();
        params.set('fromPage', 'features');
        if (topicId) params.set('topic', topicId);
        if (urlState.useCase) params.set('useCase', urlState.useCase);
        const query = params.toString();
        window.location.href = 'help.html' + (query ? '?' + query : '');
      }

      function loadMarketingContent(pageKey) {
        showLoaderState('loading', 'Loading contenta0a0a0');
        try {
          const raw = WebsiteSDK.getMarketingPageContent(pageKey);
          const content = normalizeMarketingContent(raw);

          appState.pageKey = pageKey;
          appState.content = content;

          if (content && content.title) {
            document.title = content.title + ' | ' + 'Nerdanne AI';
          } else {
            document.title = appState.baseTitle;
          }

          const urlState = getUrlState();
          const ensuredSectionId = ensureValidSectionId(content.sections || [], urlState.sectionId);
          if (ensuredSectionId && ensuredSectionId !== urlState.sectionId) {
            setUrlState({ sectionId: ensuredSectionId }, { replace: !urlState.sectionId });
          }

          showLoaderState('hidden');
          renderAll(true);
        } catch (err) {
          console.error('Failed to load marketing content', err);
          showLoaderState('error', 'Content could not be loaded. Please refresh the page.');
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        const initial = getUrlState();
        loadMarketingContent(initial.pageKey);
      });

      window.addEventListener('popstate', function() {
        const state = getUrlState();
        if (state.pageKey !== appState.pageKey) {
          loadMarketingContent(state.pageKey);
        } else {
          renderAll(true);
        }
      });

      document.body.addEventListener('click', function(event) {
        const target = event.target.closest('[data-action]');
        if (!target) return;
        const action = target.dataset.action;
        if (!action) return;

        switch (action) {
          case 'navigate-section': {
            event.preventDefault();
            const sectionId = target.dataset.sectionId || null;
            if (!sectionId) return;
            setUrlState({ sectionId: sectionId }, { replace: false });
            renderAll(true);
            break;
          }
          case 'change-view': {
            event.preventDefault();
            const viewMode = target.dataset.viewMode || '';
            if (VALID_VIEWS.indexOf(viewMode) === -1) return;
            const urlState = getUrlState();
            if (urlState.view === viewMode) return;
            setUrlState({ view: viewMode }, { replace: false });
            renderAll(false);
            break;
          }
          case 'select-use-case': {
            event.preventDefault();
            const useCaseId = target.dataset.useCaseId || null;
            const normalized = useCaseId || null;
            const urlState = getUrlState();
            if ((urlState.useCase || null) === normalized) return;
            setUrlState({ useCase: normalized }, { replace: false });
            renderAll(false);
            break;
          }
          case 'primary-cta': {
            event.preventDefault();
            const key = target.dataset.targetPageKey || '';
            handleCtaNavigation('primary', key);
            break;
          }
          case 'secondary-cta': {
            event.preventDefault();
            const key = target.dataset.targetPageKey || '';
            handleCtaNavigation('secondary', key);
            break;
          }
          case 'open-doc': {
            event.preventDefault();
            const topicId = target.dataset.topicId || '';
            openDocumentation(topicId);
            break;
          }
          default:
            break;
        }
      });
    })();
  </script>
</body>
</html>
