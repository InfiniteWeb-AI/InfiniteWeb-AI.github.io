<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Help Center | Nerdanne AI Chatbot</title>
  <meta name="description" content="Searchable support and documentation page for finding help articles about the AI chatbot platform and escalating to support when needed." />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

  <!-- Global Styles -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Help Center Page Styles -->
  <link rel="stylesheet" href="help.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand" aria-label="Nerdanne AI Website Chatbot">
        <div class="brand-avatar" aria-hidden="true"></div>
        <div class="brand-text">
          <div class="brand-name">NERDANNE</div>
          <div class="brand-tagline">Website Chatbot</div>
        </div>
      </div>

      <nav class="main-nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="index.html" class="nav-link">Home</a>
          </li>
          <li class="nav-item">
            <a href="features.html" class="nav-link">Product</a>
          </li>
          <li class="nav-item">
            <a href="pricing.html" class="nav-link">Pricing</a>
          </li>
          <li class="nav-item">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
          </li>
          <li class="nav-item">
            <a href="help.html" class="nav-link nav-link--active">Help</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="content" class="site-main" role="main">
    <div class="help-center-root" id="help-center-root" data-component="help-center-root">
      <div class="help-url-state-manager" data-component="help-url-state-manager" aria-hidden="true"></div>

      <div class="help-hero">
        <div class="container help-hero-inner">
          <header class="help-header" data-component="help-content-header" data-populate="help-header"></header>

          <section class="help-search-section" data-component="help-search-form" aria-label="Search help articles">
            <form class="help-search-form" data-action="help-search-form">
              <div class="help-search-field">
                <label class="form-label" for="helpSearchInput">Search the Help Center</label>
                <div class="help-search-input-row">
                  <input id="helpSearchInput" name="query" type="search" class="input help-search-input" autocomplete="off" placeholder="Search by topic, feature, or error message" />
                  <button type="submit" class="btn btn-outline-pill help-search-submit">Search</button>
                  <button type="button" class="help-search-clear" data-action="clear-search">Clear</button>
                </div>
              </div>
            </form>
          </section>

          <nav class="help-category-filter" data-component="help-category-filter" aria-label="Filter by help topic">
            <ul class="help-category-list" data-populate="help-categories"></ul>
          </nav>
        </div>
      </div>

      <section class="help-results-section">
        <div class="container help-results-inner">
          <div class="help-results-meta" aria-live="polite">
            <p class="help-results-summary" data-populate="help-results-summary"></p>
          </div>

          <div class="help-articles-or-empty">
            <div class="help-articles-list" data-component="help-articles-list" data-populate="help-articles"></div>
            <section class="help-empty-state" data-component="help-empty-state" data-populate="help-empty-state" hidden></section>
          </div>

          <nav class="help-pagination" data-component="help-pagination" data-populate="help-pagination" aria-label="Help Center pages"></nav>
        </div>
      </section>

      <section class="help-support-cta-section">
        <div class="container help-support-cta-inner" data-component="help-support-cta" data-populate="help-support-cta"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <div class="footer-avatar" aria-hidden="true"></div>
        <div class="footer-brand-text">
          <div class="footer-brand-name">NERDANNE</div>
          <div class="footer-brand-tagline">AI Chatbot Platform</div>
        </div>
      </div>

      <nav class="footer-nav" aria-label="Footer navigation">
        <ul class="footer-links">
          <li class="footer-item">
            <a href="about.html" class="footer-link">About</a>
          </li>
          <li class="footer-item">
            <a href="contact.html" class="footer-link">Contact</a>
          </li>
          <li class="footer-item">
            <a href="pricing.html" class="footer-link">Pricing</a>
          </li>
          <li class="footer-item">
            <a href="privacy.html" class="footer-link">Privacy Policy</a>
          </li>
          <li class="footer-item">
            <a href="terms.html" class="footer-link">Terms of Service</a>
          </li>
        </ul>
      </nav>
    </div>

    <div class="footer-bottom">
      <div class="container footer-bottom-inner">
        <p class="footer-copy">&copy; 2026 Nerdanne AI. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var marketingContent;
      var helpCategories;
      var lastSearchResponse = null;

      try {
        marketingContent = WebsiteSDK.getMarketingPageContent('help_center');
      } catch (error) {
        console.error('Error loading marketing content for Help Center:', error);
        marketingContent = {
          title: 'Help Center',
          subtitle: '',
          sections: [],
          primary_cta: null,
          secondary_cta: null
        };
      }

      try {
        helpCategories = WebsiteSDK.getHelpCenterCategories();
      } catch (error) {
        console.error('Error loading Help Center categories:', error);
        helpCategories = [];
      }

      function getUrlState() {
        var searchParams = new URLSearchParams(window.location.search);
        var query = searchParams.get('query') || '';
        var category = searchParams.get('category') || '';
        var pageParam = parseInt(searchParams.get('page') || '1', 10);
        if (isNaN(pageParam) || pageParam < 1) {
          pageParam = 1;
        }
        return {
          query: query,
          category: category,
          page: pageParam
        };
      }

      function setUrlState(partialState) {
        var current = getUrlState();
        var next = {
          query: partialState.query !== undefined ? partialState.query : current.query,
          category: partialState.category !== undefined ? partialState.category : current.category,
          page: partialState.page !== undefined ? partialState.page : current.page
        };

        var url = new URL(window.location.href);
        var params = url.searchParams;

        if (next.query && next.query.trim() !== '') {
          params.set('query', next.query.trim());
        } else {
          params.delete('query');
          next.query = '';
        }

        if (next.category && next.category.trim() !== '') {
          params.set('category', next.category.trim());
        } else {
          params.delete('category');
          next.category = '';
        }

        if (next.page && next.page > 1) {
          params.set('page', String(next.page));
        } else {
          params.delete('page');
          next.page = 1;
        }

        var newUrl = url.toString();
        if (newUrl !== window.location.href) {
          window.history.pushState(null, '', newUrl);
        }

        refreshFromUrl();
      }

      function refreshFromUrl() {
        var state = getUrlState();
        try {
          var queryArg = state.query && state.query.trim() !== '' ? state.query.trim() : undefined;
          var categoryArg = state.category && state.category.trim() !== '' ? state.category.trim() : undefined;
          lastSearchResponse = WebsiteSDK.searchHelpCenterArticles(queryArg, categoryArg, state.page);
        } catch (error) {
          console.error('Error searching Help Center articles:', error);
          lastSearchResponse = {
            results: [],
            total: 0,
            page: state.page,
            page_size: 10
          };
        }
        renderAll(state);
      }

      function renderAll(state) {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
          var type = element.dataset.populate;
          if (type === 'help-header') {
            renderHelpHeader(element, marketingContent);
          } else if (type === 'help-categories') {
            renderCategories(element, helpCategories, state);
          } else if (type === 'help-articles') {
            renderArticles(element, lastSearchResponse, state);
          } else if (type === 'help-pagination') {
            renderPagination(element, lastSearchResponse, state);
          } else if (type === 'help-empty-state') {
            renderEmptyState(element, lastSearchResponse, marketingContent, state);
          } else if (type === 'help-support-cta') {
            renderSupportCta(element, marketingContent);
          } else if (type === 'help-results-summary') {
            renderResultsSummary(element, lastSearchResponse, state);
          }
        });

        var searchInput = document.getElementById('helpSearchInput');
        if (searchInput) {
          searchInput.value = state.query || '';
        }
      }

      function renderHelpHeader(container, content) {
        var title = content && content.title ? content.title : 'Help Center';
        var subtitle = content && content.subtitle ? content.subtitle : '';
        container.innerHTML = '';
        var h1 = document.createElement('h1');
        h1.className = 'help-title';
        h1.textContent = title;
        container.appendChild(h1);
        if (subtitle) {
          var p = document.createElement('p');
          p.className = 'help-subtitle';
          p.textContent = subtitle;
          container.appendChild(p);
        }
      }

      function renderCategories(container, categories, state) {
        container.innerHTML = '';
        var list = container;
        var currentCategory = state.category || '';

        var allItem = document.createElement('li');
        allItem.className = 'help-category-item';
        var allButton = document.createElement('button');
        allButton.type = 'button';
        allButton.className = 'help-category-chip' + (currentCategory === '' ? ' help-category-chip--active' : '');
        allButton.dataset.action = 'select-category';
        allButton.dataset.categorySlug = '';
        allButton.textContent = 'All topics';
        allItem.appendChild(allButton);
        list.appendChild(allItem);

        if (Array.isArray(categories)) {
          categories.forEach(function(cat) {
            var li = document.createElement('li');
            li.className = 'help-category-item';
            var button = document.createElement('button');
            button.type = 'button';
            button.className = 'help-category-chip' + (cat.slug === currentCategory ? ' help-category-chip--active' : '');
            button.dataset.action = 'select-category';
            button.dataset.categorySlug = cat.slug || '';
            button.textContent = cat.name || '';
            li.appendChild(button);
            list.appendChild(li);
          });
        }
      }

      function renderArticles(container, searchData, state) {
        container.innerHTML = '';
        var results = searchData && Array.isArray(searchData.results) ? searchData.results : [];
        if (results.length === 0) {
          container.hidden = true;
          return;
        }
        container.hidden = false;

        results.forEach(function(article) {
          var articleEl = document.createElement('article');
          articleEl.className = 'help-article';

          var titleButton = document.createElement('button');
          titleButton.type = 'button';
          titleButton.className = 'help-article-title';
          titleButton.dataset.action = 'open-article';
          if (article.id) {
            titleButton.dataset.articleId = article.id;
          }
          if (article.slug) {
            titleButton.dataset.articleSlug = article.slug;
          }
          titleButton.textContent = article.title || 'Untitled article';

          var meta = document.createElement('div');
          meta.className = 'help-article-meta';
          if (article.category_name) {
            var categorySpan = document.createElement('span');
            categorySpan.className = 'help-article-category';
            categorySpan.textContent = article.category_name;
            meta.appendChild(categorySpan);
          }

          var excerpt = document.createElement('p');
          excerpt.className = 'help-article-excerpt';
          excerpt.textContent = article.excerpt || '';

          articleEl.appendChild(titleButton);
          articleEl.appendChild(meta);
          articleEl.appendChild(excerpt);

          container.appendChild(articleEl);
        });
      }

      function renderPagination(container, searchData, state) {
        container.innerHTML = '';
        var total = searchData && typeof searchData.total === 'number' ? searchData.total : 0;
        var pageSize = searchData && typeof searchData.page_size === 'number' && searchData.page_size > 0 ? searchData.page_size : 10;
        var currentPage = searchData && typeof searchData.page === 'number' ? searchData.page : state.page;
        var totalPages = Math.max(1, Math.ceil(total / pageSize));
        if (totalPages <= 1) {
          container.hidden = true;
          return;
        }
        container.hidden = false;

        var paginationList = document.createElement('ul');
        paginationList.className = 'help-pagination-list';

        var createPageButton = function(label, targetPage, isCurrent, disabled, rel) {
          var li = document.createElement('li');
          li.className = 'help-pagination-item';
          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'help-pagination-button';
          if (isCurrent) {
            button.className += ' help-pagination-button--active';
            button.disabled = true;
            button.setAttribute('aria-current', 'page');
          } else if (disabled) {
            button.disabled = true;
          }
          button.textContent = label;
          button.dataset.action = 'change-page';
          button.dataset.page = String(targetPage);
          if (rel) {
            button.dataset.rel = rel;
          }
          li.appendChild(button);
          return li;
        };

        paginationList.appendChild(
          createPageButton('Previous', Math.max(1, currentPage - 1), false, currentPage <= 1, 'prev')
        );

        for (var i = 1; i <= totalPages; i += 1) {
          paginationList.appendChild(
            createPageButton(String(i), i, i === currentPage, false, '')
          );
        }

        paginationList.appendChild(
          createPageButton('Next', Math.min(totalPages, currentPage + 1), false, currentPage >= totalPages, 'next')
        );

        container.appendChild(paginationList);
      }

      function renderEmptyState(container, searchData, marketing, state) {
        var results = searchData && Array.isArray(searchData.results) ? searchData.results : [];
        if (results.length > 0) {
          container.hidden = true;
          container.innerHTML = '';
          return;
        }
        container.hidden = false;
        container.innerHTML = '';

        var heading = document.createElement('h2');
        heading.className = 'help-empty-title';
        heading.textContent = 'No articles found';

        var message = document.createElement('p');
        message.className = 'help-empty-message';

        var hasQuery = state.query && state.query.trim() !== '';
        var hasCategory = state.category && state.category.trim() !== '';
        if (hasQuery || hasCategory) {
          var parts = [];
          if (hasQuery) {
            parts.push('matching "' + state.query.trim() + '"');
          }
          if (hasCategory) {
            parts.push('in the selected category');
          }
          message.textContent = 'We could not find any articles ' + parts.join(' ') + '.';
        } else {
          message.textContent = 'We could not find any articles to show right now.';
        }

        var suggestion = document.createElement('p');
        suggestion.className = 'help-empty-suggestion';
        suggestion.textContent = 'Try adjusting your search terms, clearing filters, or contacting support.';

        var actionsRow = document.createElement('div');
        actionsRow.className = 'help-empty-actions';

        var clearButton = document.createElement('button');
        clearButton.type = 'button';
        clearButton.className = 'help-empty-clear';
        clearButton.dataset.action = 'clear-filters';
        clearButton.textContent = 'Clear search and filters';

        var contactButton = document.createElement('button');
        contactButton.type = 'button';
        contactButton.className = 'btn btn-outline-pill help-empty-contact';
        contactButton.dataset.action = 'contact-support';
        var contactLabel;
        if (marketing && marketing.primary_cta && marketing.primary_cta.label) {
          contactLabel = marketing.primary_cta.label;
        } else {
          contactLabel = 'Contact support';
        }
        contactButton.textContent = contactLabel;

        actionsRow.appendChild(clearButton);
        actionsRow.appendChild(contactButton);

        container.appendChild(heading);
        container.appendChild(message);
        container.appendChild(suggestion);
        container.appendChild(actionsRow);
      }

      function renderSupportCta(container, marketing) {
        container.innerHTML = '';

        var heading = document.createElement('h2');
        heading.className = 'help-support-title';
        heading.textContent = 'Need more help?';

        var message = document.createElement('p');
        message.className = 'help-support-text';
        message.textContent = 'If you cannot find the answer you are looking for, our team is here to help.';

        var ctaLabel = 'Contact support';
        if (marketing && marketing.secondary_cta && marketing.secondary_cta.label) {
          ctaLabel = marketing.secondary_cta.label;
        } else if (marketing && marketing.primary_cta && marketing.primary_cta.label) {
          ctaLabel = marketing.primary_cta.label;
        }

        var button = document.createElement('button');
        button.type = 'button';
        button.className = 'btn btn-outline-pill help-support-button';
        button.dataset.action = 'contact-support';
        button.textContent = ctaLabel;

        container.appendChild(heading);
        container.appendChild(message);
        container.appendChild(button);
      }

      function renderResultsSummary(container, searchData, state) {
        var total = searchData && typeof searchData.total === 'number' ? searchData.total : 0;
        var hasQuery = state.query && state.query.trim() !== '';
        var hasCategory = state.category && state.category.trim() !== '';
        var parts = [];
        if (hasQuery) {
          parts.push('"' + state.query.trim() + '"');
        }
        if (hasCategory) {
          parts.push('selected category');
        }
        var contextText = '';
        if (parts.length > 0) {
          contextText = ' for ' + parts.join(' in ');
        }
        container.textContent = total + ' article' + (total === 1 ? '' : 's') + ' found' + contextText + '.';
      }

      function bindEvents() {
        var searchForm = document.querySelector('[data-action="help-search-form"]');
        if (searchForm) {
          searchForm.addEventListener('submit', function(event) {
            event.preventDefault();
            var input = document.getElementById('helpSearchInput');
            var searchTerm = input ? input.value || '' : '';
            var current = getUrlState();
            setUrlState({
              query: searchTerm,
              category: current.category,
              page: 1
            });
          });
        }

        document.addEventListener('click', function(event) {
          var target = event.target;
          if (!(target instanceof HTMLElement)) {
            return;
          }
          var action = target.dataset.action;
          if (!action) {
            return;
          }

          if (action === 'clear-search') {
            event.preventDefault();
            var current = getUrlState();
            setUrlState({
              query: '',
              category: current.category,
              page: 1
            });
          } else if (action === 'select-category') {
            event.preventDefault();
            var slug = target.dataset.categorySlug || '';
            var currentState = getUrlState();
            setUrlState({
              category: slug,
              query: currentState.query,
              page: 1
            });
          } else if (action === 'change-page') {
            event.preventDefault();
            var targetPage = parseInt(target.dataset.page || '1', 10);
            if (isNaN(targetPage) || targetPage < 1) {
              return;
            }
            setUrlState({
              page: targetPage
            });
          } else if (action === 'contact-support') {
            event.preventDefault();
            window.location.href = 'contact.html?topic=support&requestType=support';
          } else if (action === 'clear-filters') {
            event.preventDefault();
            setUrlState({
              query: '',
              category: '',
              page: 1
            });
          } else if (action === 'open-article') {
            event.preventDefault();
            console.warn('Article detail navigation is not implemented on this page.');
          }
        });
      }

      function init() {
        var initialState = getUrlState();
        try {
          var queryArg = initialState.query && initialState.query.trim() !== '' ? initialState.query.trim() : undefined;
          var categoryArg = initialState.category && initialState.category.trim() !== '' ? initialState.category.trim() : undefined;
          lastSearchResponse = WebsiteSDK.searchHelpCenterArticles(queryArg, categoryArg, initialState.page);
        } catch (error) {
          console.error('Error searching Help Center articles:', error);
          lastSearchResponse = {
            results: [],
            total: 0,
            page: initialState.page,
            page_size: 10
          };
        }

        renderAll(initialState);
        bindEvents();
      }

      window.addEventListener('popstate', function() {
        refreshFromUrl();
      });

      init();
    });
  </script>
</body>
</html>
