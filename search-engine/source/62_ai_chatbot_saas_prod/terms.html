<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>AI Chatbot SaaS</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet' />

  <!-- Global Styles -->
  <link rel='stylesheet' href='styles.css' />
  <!-- Page Styles -->
  <link rel='stylesheet' href='terms.css' />
</head>
<body>
  <header class='site-header'>
    <div class='container header-inner'>
      <div class='brand' aria-label='Nerdanne AI Website Chatbot'>
        <div class='brand-avatar' aria-hidden='true'></div>
        <div class='brand-text'>
          <div class='brand-name'>NERDANNE</div>
          <div class='brand-tagline'>Website Chatbot</div>
        </div>
      </div>

      <nav class='main-nav' aria-label='Main navigation'>
        <ul class='nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link nav-link--active'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='features.html' class='nav-link'>Product</a>
          </li>
          <li class='nav-item'>
            <a href='pricing.html' class='nav-link'>Pricing</a>
          </li>
          <li class='nav-item'>
            <a href='dashboard.html' class='nav-link'>Dashboard</a>
          </li>
          <li class='nav-item'>
            <a href='help.html' class='nav-link'>Help</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-main' role='main' data-page-key='terms_of_service'>
    <section class='terms-page' data-component='terms-content-loader'>
      <div class='terms-background-gradients' aria-hidden='true'>
        <div class='terms-gradient terms-gradient--left'></div>
        <div class='terms-gradient terms-gradient--right'></div>
      </div>

      <div class='container terms-hero-layout'>
        <div class='terms-main-column'>
          <header class='terms-header' data-component='terms-header'>
            <h1 class='terms-title' data-populate='terms-title'></h1>
            <p class='terms-subtitle' data-populate='terms-subtitle'></p>
            <div class='terms-hero-actions' data-component='legal-contact-navigation'>
              <button type='button' class='btn btn-outline-pill terms-legal-button' data-action='open-legal-contact' data-populate='legal-contact-label'></button>
            </div>
          </header>
        </div>

        <aside class='terms-toc-outer' data-component='terms-table-of-contents'>
          <div class='terms-toc-card'>
            <h2 class='terms-toc-title'>On this page</h2>
            <nav class='terms-toc-nav' aria-label='Terms of Service sections'>
              <ul class='terms-toc-list' data-populate='terms-toc'></ul>
            </nav>
          </div>
        </aside>
      </div>

      <div class='container terms-body-layout' data-component='terms-url-state-sync'>
        <div class='terms-main-column'>
          <section class='terms-section-wrapper' aria-label='Terms of Service' data-component='terms-section-list'>
            <div class='terms-loading' data-state='loading'>
              <div class='terms-loading-heading'></div>
              <div class='terms-loading-line'></div>
              <div class='terms-loading-line terms-loading-line--short'></div>
            </div>
            <div class='terms-section-list' data-populate='terms-sections'></div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='container footer-inner'>
      <div class='footer-brand'>
        <div class='footer-avatar' aria-hidden='true'></div>
        <div class='footer-brand-text'>
          <div class='footer-brand-name'>NERDANNE</div>
          <div class='footer-brand-tagline'>AI Chatbot Platform</div>
        </div>
      </div>

      <nav class='footer-nav' aria-label='Footer navigation'>
        <ul class='footer-links'>
          <li class='footer-item'>
            <a href='about.html' class='footer-link'>About</a>
          </li>
          <li class='footer-item'>
            <a href='contact.html' class='footer-link'>Contact</a>
          </li>
          <li class='footer-item'>
            <a href='pricing.html' class='footer-link'>Pricing</a>
          </li>
          <li class='footer-item'>
            <a href='privacy.html' class='footer-link'>Privacy Policy</a>
          </li>
          <li class='footer-item'>
            <a href='terms.html' class='footer-link'>Terms of Service</a>
          </li>
        </ul>
      </nav>
    </div>

    <div class='footer-bottom'>
      <div class='container footer-bottom-inner'>
        <p class='footer-copy'>&copy; 2026 Nerdanne AI. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var mainEl = document.getElementById('content');
      var pageKey = mainEl && mainEl.dataset.pageKey ? mainEl.dataset.pageKey : 'terms_of_service';

      var urlParams = new URLSearchParams(window.location.search);
      var initialSectionFromUrl = urlParams.get('section');

      var termsContent = null;
      var sectionsIndexById = new Map();
      var tocItemsBySectionId = {};
      var activeSectionId = null;
      var isProgrammaticScroll = false;
      var intersectionObserver = null;

      var titleEl = document.querySelector('[data-populate=terms-title]');
      var subtitleEl = document.querySelector('[data-populate=terms-subtitle]');
      var sectionsContainer = document.querySelector('[data-populate=terms-sections]');
      var tocListEl = document.querySelector('[data-populate=terms-toc]');
      var legalButtonEl = document.querySelector('[data-action=open-legal-contact]');
      var loadingEl = document.querySelector('.terms-loading');

      function init() {
        loadContent();
        window.addEventListener('popstate', handlePopState);
      }

      function loadContent() {
        try {
          termsContent = WebsiteSDK.getMarketingPageContent(pageKey);
          renderContent();
          bindActionHandlers();
        } catch (error) {
          console.error('Error loading Terms of Service content', error);
          if (loadingEl) {
            loadingEl.setAttribute('data-state', 'error');
            loadingEl.textContent = 'We were unable to load the Terms of Service. Please refresh or try again later.';
          }
        }
      }

      function renderContent() {
        if (!termsContent) {
          return;
        }

        if (titleEl) {
          titleEl.textContent = termsContent.title || 'Terms of Service';
        }

        if (subtitleEl) {
          subtitleEl.textContent = termsContent.subtitle || '';
        }

        if (legalButtonEl) {
          var label = '';
          if (termsContent.primary_cta && typeof termsContent.primary_cta.label === 'string' && termsContent.primary_cta.label.trim()) {
            label = termsContent.primary_cta.label;
          } else if (termsContent.secondary_cta && typeof termsContent.secondary_cta.label === 'string' && termsContent.secondary_cta.label.trim()) {
            label = termsContent.secondary_cta.label;
          } else {
            label = 'Contact us about these terms';
          }
          legalButtonEl.textContent = label;
        }

        var sections = Array.isArray(termsContent.sections) ? termsContent.sections : [];
        renderSections(sectionsContainer, sections);
        renderTOC(tocListEl, sections);
        setupIntersectionObserver();

        if (initialSectionFromUrl && sectionsIndexById.has(initialSectionFromUrl)) {
          setActiveSection(initialSectionFromUrl, { scroll: true, replaceUrl: false });
        }
      }

      function renderSections(container, sections) {
        if (!container) {
          return;
        }

        container.innerHTML = '';
        sectionsIndexById.clear();

        for (var i = 0; i < sections.length; i++) {
          var section = sections[i];
          if (!section || !section.id) {
            continue;
          }

          var article = document.createElement('article');
          article.className = 'terms-section';
          article.dataset.sectionId = section.id;
          article.id = 'terms-section-' + section.id;

          if (section.highlight) {
            article.classList.add('terms-section--highlight');
          }

          var header = document.createElement('header');
          header.className = 'terms-section-header';

          var heading = document.createElement('h2');
          heading.className = 'terms-section-heading';
          heading.textContent = section.heading || '';
          header.appendChild(heading);

          var anchorBtn = document.createElement('button');
          anchorBtn.type = 'button';
          anchorBtn.className = 'terms-section-anchor';
          anchorBtn.dataset.action = 'jump-to-section';
          anchorBtn.dataset.sectionId = section.id;
          anchorBtn.setAttribute('aria-label', 'Link to this section');
          anchorBtn.textContent = '#';
          header.appendChild(anchorBtn);

          article.appendChild(header);

          if (section.body) {
            var bodyDiv = document.createElement('div');
            bodyDiv.className = 'terms-section-body';

            var paragraphs = String(section.body).split(/\n{2,}/);
            for (var j = 0; j < paragraphs.length; j++) {
              var text = paragraphs[j].trim();
              if (!text) {
                continue;
              }
              var p = document.createElement('p');
              p.textContent = text;
              bodyDiv.appendChild(p);
            }

            article.appendChild(bodyDiv);
          }

          if (Array.isArray(section.bullets) && section.bullets.length > 0) {
            var ul = document.createElement('ul');
            ul.className = 'terms-section-bullets';
            for (var k = 0; k < section.bullets.length; k++) {
              var bulletText = section.bullets[k];
              var li = document.createElement('li');
              li.textContent = bulletText;
              ul.appendChild(li);
            }
            article.appendChild(ul);
          }

          container.appendChild(article);
          sectionsIndexById.set(section.id, article);
        }

        if (loadingEl) {
          loadingEl.style.display = 'none';
        }
      }

      function renderTOC(container, sections) {
        if (!container) {
          return;
        }

        container.innerHTML = '';
        tocItemsBySectionId = {};

        for (var i = 0; i < sections.length; i++) {
          var section = sections[i];
          if (!section || !section.id) {
            continue;
          }

          var li = document.createElement('li');
          li.className = 'terms-toc-item';
          li.dataset.sectionId = section.id;

          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'terms-toc-link';
          button.dataset.action = 'toc-jump';
          button.dataset.sectionId = section.id;
          button.textContent = section.heading || '';

          li.appendChild(button);
          container.appendChild(li);

          tocItemsBySectionId[section.id] = li;
        }
      }

      function setupIntersectionObserver() {
        if (!sectionsIndexById.size) {
          return;
        }

        if (!('IntersectionObserver' in window)) {
          window.addEventListener('scroll', handleScrollFallback);
          return;
        }

        var options = {
          root: null,
          rootMargin: '-50% 0px -50% 0px',
          threshold: 0
        };

        intersectionObserver = new IntersectionObserver(function (entries) {
          if (isProgrammaticScroll) {
            return;
          }

          var candidateSectionId = null;
          var minTop = null;

          for (var i = 0; i < entries.length; i++) {
            var entry = entries[i];
            if (!entry.isIntersecting) {
              continue;
            }
            var rectTop = entry.boundingClientRect.top;
            if (minTop === null || rectTop < minTop) {
              minTop = rectTop;
              candidateSectionId = entry.target.dataset.sectionId;
            }
          }

          if (candidateSectionId && candidateSectionId !== activeSectionId) {
            setActiveSection(candidateSectionId, { scroll: false, replaceUrl: true });
          }
        }, options);

        sectionsIndexById.forEach(function (el) {
          intersectionObserver.observe(el);
        });
      }

      function handleScrollFallback() {
        if (isProgrammaticScroll) {
          return;
        }
        var bestId = null;
        var bestOffset = null;
        sectionsIndexById.forEach(function (sectionEl, id) {
          var rect = sectionEl.getBoundingClientRect();
          var offset = Math.abs(rect.top);
          if (bestOffset === null || offset < bestOffset) {
            bestOffset = offset;
            bestId = id;
          }
        });
        if (bestId && bestId !== activeSectionId) {
          setActiveSection(bestId, { scroll: false, replaceUrl: true });
        }
      }

      function setActiveSection(sectionId, options) {
        var opts = options || {};
        var sectionEl = sectionsIndexById.get(sectionId);
        if (!sectionEl) {
          return;
        }

        if (activeSectionId && sectionsIndexById.has(activeSectionId)) {
          sectionsIndexById.get(activeSectionId).classList.remove('terms-section--active');
        }
        sectionEl.classList.add('terms-section--active');
        activeSectionId = sectionId;

        for (var id in tocItemsBySectionId) {
          if (!Object.prototype.hasOwnProperty.call(tocItemsBySectionId, id)) {
            continue;
          }
          var li = tocItemsBySectionId[id];
          if (!li) {
            continue;
          }
          if (id === sectionId) {
            li.classList.add('terms-toc-item--active');
          } else {
            li.classList.remove('terms-toc-item--active');
          }
        }

        if (opts.pushUrl) {
          updateSectionInUrl(sectionId, 'push');
        } else if (opts.replaceUrl) {
          updateSectionInUrl(sectionId, 'replace');
        }

        if (opts.scroll) {
          isProgrammaticScroll = true;
          sectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
          window.setTimeout(function () {
            isProgrammaticScroll = false;
          }, 400);
        }
      }

      function updateSectionInUrl(sectionId, mode) {
        var url = new URL(window.location.href);
        var params = url.searchParams;

        if (sectionId) {
          params.set('section', sectionId);
        } else {
          params.delete('section');
        }

        var searchString = params.toString();
        var newUrl = url.pathname + (searchString ? '?' + searchString : '') + url.hash;

        if (mode === 'push') {
          window.history.pushState({ section: sectionId }, '', newUrl);
        } else {
          window.history.replaceState({ section: sectionId }, '', newUrl);
        }
      }

      function handlePopState() {
        var params = new URLSearchParams(window.location.search);
        var sectionId = params.get('section');
        if (sectionId && sectionsIndexById.has(sectionId)) {
          setActiveSection(sectionId, { scroll: true });
        }
      }

      function bindActionHandlers() {
        var actionElements = document.querySelectorAll('[data-action]');
        for (var i = 0; i < actionElements.length; i++) {
          var el = actionElements[i];
          var action = el.dataset.action;
          if (action === 'open-legal-contact') {
            el.addEventListener('click', handleOpenLegalContact);
          } else if (action === 'toc-jump' || action === 'jump-to-section') {
            el.addEventListener('click', handleSectionJump);
          }
        }
      }

      function handleSectionJump(event) {
        var target = event.currentTarget;
        var sectionId = target && target.dataset.sectionId ? target.dataset.sectionId : null;
        if (!sectionId || !sectionsIndexById.has(sectionId)) {
          return;
        }
        setActiveSection(sectionId, { scroll: true, pushUrl: true });
      }

      function buildLegalContactUrl() {
        var basePath = 'contact.html';
        var currentUrl = new URL(window.location.href);
        var currentParams = currentUrl.searchParams;
        var newParams = new URLSearchParams();

        newParams.set('topic', 'legal');

        if (activeSectionId) {
          newParams.set('section', activeSectionId);
        }

        currentParams.forEach(function (value, key) {
          if (key === 'topic' || key === 'section') {
            return;
          }
          newParams.set(key, value);
        });

        newParams.set('from', window.location.href);

        var query = newParams.toString();
        return basePath + (query ? '?' + query : '');
      }

      function handleOpenLegalContact() {
        var targetUrl = buildLegalContactUrl();
        window.location.href = targetUrl;
      }

      init();
    });
  </script>
</body>
</html>
