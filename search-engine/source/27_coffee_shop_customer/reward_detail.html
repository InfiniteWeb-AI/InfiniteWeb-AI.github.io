<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Le Cafe - Customer Portal</title>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='reward_detail.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-inner'>
      <a href='index.html' class='brand'>
        <div class='brand-logo' aria-hidden='true'></div>
        <span class='brand-name'>Le Cafe</span>
      </a>
      <nav class='main-nav' aria-label='Primary navigation'>
        <ul>
          <li><a href='index.html'>Home</a></li>
          <li><a href='menu.html'>Order Pickup</a></li>
          <li><a href='stores.html'>Stores</a></li>
          <li><a href='rewards.html'>Rewards</a></li>
          <li><a href='account_dashboard.html'>Account</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='page-content' role='main'>
    <div class='reward-detail-page' data-component='reward-detail-page-shell'>
      <!-- Top account header strip -->
      <section class='account-header-strip' data-component='account-header-strip'>
        <div class='account-header-inner'>
          <div class='account-header-left'>
            <button type='button' class='back-link' data-component='back-to-rewards-link' data-action='back-to-rewards'>
              <span aria-hidden='true' class='back-chevron'>&lsaquo;</span>
              <span class='back-label'>Back to rewards</span>
            </button>
          </div>
          <div class='account-header-center'>
            <span class='section-label'>Reward detail</span>
          </div>
          <div class='account-header-right'>
            <div class='account-status'>
              <span class='account-name' data-populate='account-name'></span>
              <span class='account-points' data-populate='account-points'></span>
              <button type='button' class='link-button account-logout' data-action='logout' hidden>Sign out</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Central content column -->
      <section class='reward-detail-main'>
        <div class='reward-detail-column'>

          <!-- Reward header and basic info -->
          <header class='reward-detail-header' data-component='reward-detail-header'>
            <div class='status-panel error' data-component='reward-detail-error-state'>
              <p class='status-text' data-populate='reward-error-state' role='status'></p>
            </div>
            <h1 class='reward-title' data-populate='reward-name'></h1>
            <p class='reward-category' data-populate='reward-category'></p>
            <p class='reward-description' data-populate='reward-description'></p>
            <div class='reward-meta'>
              <span class='reward-price' data-populate='reward-price'></span>
              <span class='reward-rating' data-populate='reward-rating'></span>
              <span class='reward-availability' data-populate='reward-availability'></span>
            </div>
          </header>

          <!-- Eligibility and points info -->
          <section class='reward-eligibility-and-actions' data-component='reward-eligibility-and-actions'>
            <div class='eligibility-rows'>
              <div class='points-row'>
                <span class='label'>Points required</span>
                <span class='value' data-populate='reward-points-required'></span>
              </div>
              <div class='points-row'>
                <span class='label'>Your points</span>
                <span class='value' data-populate='current-points-balance'></span>
              </div>
            </div>
            <p class='eligibility-message' data-populate='redeem-eligibility-message'></p>
          </section>

          <!-- Redeem controller -->
          <section class='reward-redeem-controller' data-component='reward-redeem-controller'>
            <button type='button' class='primary-button redeem-button' data-action='redeem-reward' data-populate='redeem-button-label' disabled></button>
            <p class='form-message error' data-populate='redeem-error-message'></p>
          </section>

          <!-- Redemption confirmation and add-to-order actions -->
          <section class='reward-redemption-confirmation-panel' data-component='reward-redemption-confirmation-panel' hidden>
            <p class='confirmation-text' data-populate='redemption-confirmation-text'></p>
            <p class='confirmation-points' data-populate='redemption-updated-points'></p>
            <div class='confirmation-actions'>
              <button type='button' class='secondary-button add-to-order-button' data-action='add-to-order'>Add to order</button>
              <button type='button' class='link-button' data-action='view-order-from-confirmation'>View order</button>
              <button type='button' class='link-button' data-action='done-after-redemption'>Done</button>
            </div>
            <p class='form-message error' data-populate='add-to-order-error-message'></p>
          </section>

          <!-- Inline authentication panel (login / sign-up) -->
          <section class='auth-inline-panel' data-component='auth-inline-panel'>
            <div class='auth-header'>
              <p class='auth-intro'>Sign in or create an account to redeem this reward.</p>
            </div>
            <div class='auth-tabs'>
              <button type='button' class='auth-tab auth-tab-login is-active' data-action='auth-toggle-login'>Sign in</button>
              <button type='button' class='auth-tab auth-tab-signup' data-action='auth-toggle-signup'>Create account</button>
            </div>
            <div class='auth-forms'>
              <form class='auth-form auth-form-login' data-action='auth-login-submit' novalidate>
                <div class='form-field'>
                  <label for='loginEmail'>Email</label>
                  <input type='email' id='loginEmail' name='email' autocomplete='email' required>
                </div>
                <div class='form-field'>
                  <label for='loginPassword'>Password</label>
                  <input type='password' id='loginPassword' name='password' autocomplete='current-password' required>
                </div>
                <button type='submit' class='primary-button'>Sign in to redeem</button>
              </form>

              <form class='auth-form auth-form-signup is-hidden' data-action='auth-signup-submit' novalidate>
                <div class='form-field'>
                  <label for='signupFullName'>Full name</label>
                  <input type='text' id='signupFullName' name='fullName' required>
                </div>
                <div class='form-field'>
                  <label for='signupEmail'>Email</label>
                  <input type='email' id='signupEmail' name='email' autocomplete='email' required>
                </div>
                <div class='form-field'>
                  <label for='signupPassword'>Password</label>
                  <input type='password' id='signupPassword' name='password' autocomplete='new-password' required>
                </div>
                <div class='form-field'>
                  <label for='signupConfirmPassword'>Confirm password</label>
                  <input type='password' id='signupConfirmPassword' name='confirmPassword' autocomplete='new-password' required>
                </div>
                <div class='form-field checkbox-field'>
                  <input type='checkbox' id='signupTerms' name='acceptTerms' required>
                  <label for='signupTerms'>I agree to the Terms of Use and Privacy Policy.</label>
                </div>
                <button type='submit' class='primary-button'>Create account and redeem</button>
              </form>
            </div>
            <p class='form-message' data-populate='auth-message'></p>
          </section>

        </div>
      </section>

      <!-- Bottom current order summary bar -->
      <aside class='current-order-summary-bar' data-component='current-order-summary-bar'>
        <div class='order-summary-inner'>
          <div class='order-summary-main'>
            <span class='order-summary-status' data-populate='order-summary-status'></span>
            <span class='order-summary-detail' data-populate='order-summary-detail'></span>
          </div>
          <button type='button' class='secondary-button order-summary-view-button' data-action='view-order-from-summary' disabled>View order</button>
        </div>
      </aside>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner'>
      <div class='footer-links'>
        <div class='footer-column'>
          <a href='about.html'>About</a>
          <a href='contact.html'>Contact</a>
          <a href='help.html'>Help &amp; FAQ</a>
          <a href='stores.html'>Stores</a>
        </div>
        <div class='footer-column'>
          <a href='account_orders.html'>Order History</a>
          <a href='account_payments.html'>Payment Methods</a>
          <a href='terms.html'>Terms of Use</a>
          <a href='privacy.html'>Privacy Policy</a>
        </div>
      </div>
      <div class='footer-meta'>
        <span class='footer-copy'>&copy; 2026 Le Cafe. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    (function() {
      'use strict';

      var state = {
        rewardId: null,
        fromCategory: '',
        rewardDetail: null,
        rewardLoadError: null,
        rewardNotFound: false,
        account: null,
        rewardRedemption: null,
        lastAddedRewardItemId: null,
        orderSummary: null,
        orderSummaryError: false,
        isRedeeming: false,
        isAddingToOrder: false,
        redeemError: null,
        addToOrderError: null,
        authMessage: '',
        fatalError: false
      };

      var populateHandlers = {
        'account-name': function(el) {
          if (state.account && state.account.fullName) {
            el.textContent = state.account.fullName;
          } else {
            el.textContent = 'Guest';
          }
        },
        'account-points': function(el) {
          var points = null;
          if (state.account && typeof state.account.loyaltyPointsBalance === 'number') {
            points = state.account.loyaltyPointsBalance;
          } else if (state.rewardDetail && typeof state.rewardDetail.currentPointsBalance === 'number') {
            points = state.rewardDetail.currentPointsBalance;
          }
          el.textContent = points != null ? points + ' pts' : '';
        },
        'reward-error-state': function(el) {
          var message = '';
          if (!state.rewardId) {
            message = 'This reward could not be loaded because an id parameter is missing.';
          } else if (state.rewardNotFound) {
            message = state.rewardLoadError || 'We could not find this reward. It may have been removed.';
          } else if (state.rewardLoadError) {
            message = state.rewardLoadError;
          } else if (state.rewardDetail && state.rewardDetail.reasonNotRedeemable && !state.rewardDetail.canRedeem) {
            message = state.rewardDetail.reasonNotRedeemable;
          }

          if (message) {
            el.textContent = message;
            el.parentElement.style.display = '';
          } else {
            el.textContent = '';
            el.parentElement.style.display = 'none';
          }
        },
        'reward-name': function(el) {
          if (state.rewardDetail && state.rewardDetail.reward) {
            el.textContent = state.rewardDetail.reward.name || '';
          } else if (state.fatalError) {
            el.textContent = 'Reward not available';
          } else {
            el.textContent = '';
          }
        },
        'reward-category': function(el) {
          if (!(state.rewardDetail && state.rewardDetail.reward)) {
            el.textContent = '';
            return;
          }
          var cat = state.rewardDetail.reward.category;
          var label = '';
          if (cat === 'bakery') {
            label = 'Bakery';
          } else if (cat === 'drink') {
            label = 'Drink';
          } else if (cat === 'other') {
            label = 'Other';
          }
          el.textContent = label ? 'Category: ' + label : '';
        },
        'reward-description': function(el) {
          if (state.rewardDetail && state.rewardDetail.reward && state.rewardDetail.reward.description) {
            el.textContent = state.rewardDetail.reward.description;
          } else {
            el.textContent = '';
          }
        },
        'reward-price': function(el) {
          if (state.rewardDetail && state.rewardDetail.reward && typeof state.rewardDetail.reward.price === 'number') {
            var price = state.rewardDetail.reward.price.toFixed(2);
            el.textContent = 'Value: $' + price;
          } else {
            el.textContent = '';
          }
        },
        'reward-rating': function(el) {
          if (state.rewardDetail && state.rewardDetail.reward && typeof state.rewardDetail.reward.rating === 'number') {
            var rating = state.rewardDetail.reward.rating.toFixed(1);
            var count = state.rewardDetail.reward.ratingCount || 0;
            el.textContent = rating + ' (' + count + ' ratings)';
          } else {
            el.textContent = '';
          }
        },
        'reward-availability': function(el) {
          if (!(state.rewardDetail && state.rewardDetail.reward)) {
            el.textContent = '';
            return;
          }
          el.textContent = state.rewardDetail.reward.isAvailable ? 'Available today' : 'Currently unavailable';
        },
        'reward-points-required': function(el) {
          if (state.rewardDetail && state.rewardDetail.reward) {
            el.textContent = state.rewardDetail.reward.pointsRequired + ' pts';
          } else {
            el.textContent = '';
          }
        },
        'current-points-balance': function(el) {
          var points = null;
          if (state.rewardDetail && typeof state.rewardDetail.currentPointsBalance === 'number') {
            points = state.rewardDetail.currentPointsBalance;
          } else if (state.account && typeof state.account.loyaltyPointsBalance === 'number') {
            points = state.account.loyaltyPointsBalance;
          }
          el.textContent = points != null ? points + ' pts' : 'Sign in to view';
        },
        'redeem-eligibility-message': function(el) {
          if (state.fatalError) {
            el.textContent = '';
            return;
          }
          if (!(state.rewardDetail && state.rewardDetail.reward)) {
            el.textContent = '';
            return;
          }
          if (!state.rewardDetail.reward.isAvailable) {
            el.textContent = 'This reward is not currently available.';
            return;
          }
          if (state.rewardDetail.canRedeem) {
            el.textContent = 'You can redeem this reward now.';
          } else if (state.rewardDetail.reasonNotRedeemable) {
            el.textContent = state.rewardDetail.reasonNotRedeemable;
          } else {
            el.textContent = '';
          }
        },
        'redeem-button-label': function(el) {
          if (!(state.rewardDetail && state.rewardDetail.reward)) {
            el.textContent = 'Redeem';
            return;
          }
          var pts = state.rewardDetail.reward.pointsRequired;
          el.textContent = 'Redeem for ' + pts + ' pts';
          if (state.isRedeeming) {
            el.textContent = 'Redeeming...';
          } else if (state.rewardRedemption) {
            el.textContent = 'Redeemed';
          }
        },
        'redeem-error-message': function(el) {
          el.textContent = state.redeemError || '';
        },
        'redemption-confirmation-text': function(el) {
          if (state.rewardRedemption && state.rewardDetail && state.rewardDetail.reward) {
            el.textContent = 'You redeemed 1 ␀d7 ' + state.rewardDetail.reward.name + '.';
          } else {
            el.textContent = '';
          }
        },
        'redemption-updated-points': function(el) {
          var pts = null;
          if (state.rewardDetail && typeof state.rewardDetail.currentPointsBalance === 'number') {
            pts = state.rewardDetail.currentPointsBalance;
          } else if (state.account && typeof state.account.loyaltyPointsBalance === 'number') {
            pts = state.account.loyaltyPointsBalance;
          }
          if (state.rewardRedemption && pts != null) {
            el.textContent = 'Points remaining: ' + pts + ' pts';
          } else {
            el.textContent = '';
          }
        },
        'add-to-order-error-message': function(el) {
          el.textContent = state.addToOrderError || '';
        },
        'auth-message': function(el) {
          el.textContent = state.authMessage || '';
        },
        'order-summary-status': function(el) {
          if (state.orderSummaryError) {
            el.textContent = 'Order summary unavailable.';
            return;
          }
          if (state.orderSummary && state.orderSummary.hasActiveOrder) {
            el.textContent = 'Pickup order in progress';
          } else {
            el.textContent = 'No active pickup order';
          }
        },
        'order-summary-detail': function(el) {
          if (!(state.orderSummary && state.orderSummary.hasActiveOrder)) {
            el.textContent = '';
            return;
          }
          var parts = [];
          if (typeof state.orderSummary.itemCount === 'number') {
            parts.push(state.orderSummary.itemCount + (state.orderSummary.itemCount === 1 ? ' item' : ' items'));
          }
          if (typeof state.orderSummary.totalAmount === 'number') {
            parts.push('$' + state.orderSummary.totalAmount.toFixed(2) + ' total');
          }
          if (state.orderSummary.pickupStore && state.orderSummary.pickupStore.name) {
            parts.push('Pickup at ' + state.orderSummary.pickupStore.name);
          }
          el.textContent = parts.join(' ␀b7 ');
        }
      };

      function renderAll() {
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(el) {
          var key = el.dataset.populate;
          if (populateHandlers[key]) {
            populateHandlers[key](el);
          }
        });
        updateSectionVisibility();
        updateActionStates();
      }

      function updateSectionVisibility() {
        var authPanel = document.querySelector('[data-component="auth-inline-panel"]');
        var redeemSection = document.querySelector('[data-component="reward-redeem-controller"]');
        var eligibilitySection = document.querySelector('[data-component="reward-eligibility-and-actions"]');
        var confirmationPanel = document.querySelector('[data-component="reward-redemption-confirmation-panel"]');

        var fatal = state.fatalError;

        if (eligibilitySection) {
          eligibilitySection.hidden = fatal;
        }
        if (redeemSection) {
          redeemSection.hidden = fatal;
        }

        if (authPanel) {
          if (fatal) {
            authPanel.hidden = true;
          } else if (state.account) {
            authPanel.hidden = true;
          } else {
            authPanel.hidden = false;
          }
        }

        if (confirmationPanel) {
          confirmationPanel.hidden = !state.rewardRedemption || fatal;
        }
      }

      function updateActionStates() {
        var logoutBtn = document.querySelector('[data-action="logout"]');
        if (logoutBtn) {
          if (state.account) {
            logoutBtn.hidden = false;
          } else {
            logoutBtn.hidden = true;
          }
        }

        var redeemBtn = document.querySelector('[data-action="redeem-reward"]');
        if (redeemBtn) {
          var canEnable = false;
          if (!state.fatalError && state.rewardDetail && state.rewardDetail.reward && state.rewardDetail.reward.isAvailable && state.rewardDetail.canRedeem && !state.isRedeeming && !state.rewardRedemption) {
            canEnable = true;
          }
          redeemBtn.disabled = !canEnable;
        }

        var addBtn = document.querySelector('[data-action="add-to-order"]');
        if (addBtn) {
          var canAdd = !!(state.rewardRedemption && !state.isAddingToOrder && !state.lastAddedRewardItemId && !state.fatalError);
          addBtn.disabled = !canAdd;
          if (state.isAddingToOrder) {
            addBtn.textContent = 'Adding...';
          } else if (state.lastAddedRewardItemId) {
            addBtn.textContent = 'Added to order';
          } else {
            addBtn.textContent = 'Add to order';
          }
        }

        var viewOrderConfirmBtn = document.querySelector('[data-action="view-order-from-confirmation"]');
        if (viewOrderConfirmBtn) {
          viewOrderConfirmBtn.disabled = !state.lastAddedRewardItemId;
        }

        var viewOrderSummaryBtn = document.querySelector('[data-action="view-order-from-summary"]');
        if (viewOrderSummaryBtn) {
          var enableView = !!(state.orderSummary && state.orderSummary.hasActiveOrder);
          viewOrderSummaryBtn.disabled = !enableView;
        }
      }

      function loadRewardDetail() {
        if (!state.rewardId) {
          state.rewardDetail = null;
          state.rewardLoadError = null;
          state.rewardNotFound = true;
          state.fatalError = true;
          renderAll();
          return;
        }
        try {
          var detail = WebsiteSDK.getRewardDetail(state.rewardId);
          if (!detail || !detail.reward) {
            state.rewardDetail = null;
            state.rewardLoadError = 'We could not load this reward. It may no longer be available.';
            state.rewardNotFound = true;
            state.fatalError = true;
          } else {
            state.rewardDetail = detail;
            state.rewardLoadError = null;
            state.rewardNotFound = false;
            state.fatalError = false;
            if (state.account && typeof detail.currentPointsBalance === 'number') {
              state.account.loyaltyPointsBalance = detail.currentPointsBalance;
            }
          }
        } catch (e) {
          state.rewardDetail = null;
          state.rewardLoadError = 'Something went wrong while loading this reward. Please try again.';
          state.rewardNotFound = true;
          state.fatalError = true;
        }
        renderAll();
      }

      function refreshOrderSummary() {
        try {
          var summary = WebsiteSDK.getCurrentOrderSummary();
          state.orderSummary = summary || null;
          state.orderSummaryError = false;
        } catch (e) {
          state.orderSummary = null;
          state.orderSummaryError = true;
        }
        renderAll();
      }

      function handleBackToRewards() {
        var target = 'rewards.html';
        if (state.fromCategory) {
          target += '?category=' + encodeURIComponent(state.fromCategory);
        }
        window.location.href = target;
      }

      function handleLogout() {
        try {
          var resp = WebsiteSDK.logoutCurrentAccount();
          if (resp && resp.success) {
            state.account = null;
            state.rewardRedemption = null;
            state.lastAddedRewardItemId = null;
            if (state.rewardId) {
              loadRewardDetail();
            } else {
              renderAll();
            }
          } else {
            state.authMessage = resp && resp.message ? resp.message : 'Unable to log out right now.';
            renderAll();
          }
        } catch (e) {
          state.authMessage = 'Unable to log out right now.';
          renderAll();
        }
      }

      function handleRedeemReward() {
        if (state.isRedeeming || state.fatalError) {
          return;
        }
        if (!state.rewardId || !(state.rewardDetail && state.rewardDetail.reward) || !state.rewardDetail.reward.isAvailable || !state.rewardDetail.canRedeem) {
          return;
        }
        state.isRedeeming = true;
        state.redeemError = null;
        renderAll();
        try {
          var resp = WebsiteSDK.redeemReward(state.rewardId, 1);
          if (!resp || !resp.success) {
            state.redeemError = resp && resp.message ? resp.message : 'Unable to redeem this reward right now.';
            state.isRedeeming = false;
            try {
              if (state.rewardId) {
                loadRewardDetail();
                return;
              }
            } catch (e2) {}
            renderAll();
            return;
          }
          state.rewardRedemption = resp.redemption || null;
          if (typeof resp.updatedPointsBalance === 'number') {
            if (!state.rewardDetail) {
              state.rewardDetail = { reward: null };
            }
            state.rewardDetail.currentPointsBalance = resp.updatedPointsBalance;
            if (state.account) {
              state.account.loyaltyPointsBalance = resp.updatedPointsBalance;
            }
          }
          state.isRedeeming = false;
          renderAll();
        } catch (e) {
          state.redeemError = 'Unable to redeem this reward right now.';
          state.isRedeeming = false;
          renderAll();
        }
      }

      function handleAddToOrder() {
        if (!state.rewardRedemption || state.isAddingToOrder || state.lastAddedRewardItemId || state.fatalError) {
          return;
        }
        state.isAddingToOrder = true;
        state.addToOrderError = null;
        renderAll();
        try {
          var resp = WebsiteSDK.addRewardRedemptionToCurrentOrder(state.rewardRedemption.id);
          if (!resp || !resp.success) {
            state.addToOrderError = resp && resp.message ? resp.message : 'Unable to add redeemed item to your order.';
            state.isAddingToOrder = false;
            renderAll();
            return;
          }
          if (resp.orderItem && resp.orderItem.id) {
            state.lastAddedRewardItemId = resp.orderItem.id;
          }
          state.isAddingToOrder = false;
          refreshOrderSummary();
        } catch (e) {
          state.addToOrderError = 'Unable to add redeemed item to your order.';
          state.isAddingToOrder = false;
          renderAll();
        }
      }

      function navigateToOrder() {
        var target = 'order.html';
        if (state.lastAddedRewardItemId) {
          target += '?highlightItemId=' + encodeURIComponent(state.lastAddedRewardItemId);
        }
        window.location.href = target;
      }

      function setupAuthTabs() {
        var loginTab = document.querySelector('[data-action="auth-toggle-login"]');
        var signupTab = document.querySelector('[data-action="auth-toggle-signup"]');
        var loginForm = document.querySelector('.auth-form-login');
        var signupForm = document.querySelector('.auth-form-signup');

        function showLogin() {
          if (loginTab) {
            loginTab.classList.add('is-active');
          }
          if (signupTab) {
            signupTab.classList.remove('is-active');
          }
          if (loginForm) {
            loginForm.classList.remove('is-hidden');
          }
          if (signupForm) {
            signupForm.classList.add('is-hidden');
          }
        }

        function showSignup() {
          if (signupTab) {
            signupTab.classList.add('is-active');
          }
          if (loginTab) {
            loginTab.classList.remove('is-active');
          }
          if (signupForm) {
            signupForm.classList.remove('is-hidden');
          }
          if (loginForm) {
            loginForm.classList.add('is-hidden');
          }
        }

        if (loginTab) {
          loginTab.addEventListener('click', function() {
            showLogin();
          });
        }
        if (signupTab) {
          signupTab.addEventListener('click', function() {
            showSignup();
          });
        }
      }

      function setupAuthForms() {
        var loginForm = document.querySelector('[data-action="auth-login-submit"]');
        var signupForm = document.querySelector('[data-action="auth-signup-submit"]');

        if (loginForm) {
          loginForm.addEventListener('submit', function(event) {
            event.preventDefault();
            var emailInput = loginForm.querySelector('input[name="email"]');
            var passwordInput = loginForm.querySelector('input[name="password"]');
            var email = emailInput ? emailInput.value.trim() : '';
            var password = passwordInput ? passwordInput.value : '';
            state.authMessage = '';
            renderAll();
            try {
              var resp = WebsiteSDK.loginWithEmailPassword(email, password);
              if (!resp || !resp.success || !resp.isLoggedIn || !resp.account) {
                state.authMessage = resp && resp.message ? resp.message : 'Sign-in failed. Please check your email and password.';
                renderAll();
                return;
              }
              state.account = {
                fullName: resp.account.fullName,
                email: resp.account.email,
                loyaltyPointsBalance: resp.account.loyaltyPointsBalance,
                loyaltyTier: resp.account.loyaltyTier,
                favoriteStore: resp.account.favoriteStore
              };
              state.authMessage = '';
              if (state.rewardId) {
                loadRewardDetail();
              } else {
                renderAll();
              }
            } catch (e) {
              state.authMessage = 'Unable to sign in right now. Please try again.';
              renderAll();
            }
          });
        }

        if (signupForm) {
          signupForm.addEventListener('submit', function(event) {
            event.preventDefault();
            var fullNameInput = signupForm.querySelector('input[name="fullName"]');
            var emailInput = signupForm.querySelector('input[name="email"]');
            var passwordInput = signupForm.querySelector('input[name="password"]');
            var confirmInput = signupForm.querySelector('input[name="confirmPassword"]');
            var termsInput = signupForm.querySelector('input[name="acceptTerms"]');

            var fullName = fullNameInput ? fullNameInput.value.trim() : '';
            var email = emailInput ? emailInput.value.trim() : '';
            var password = passwordInput ? passwordInput.value : '';
            var confirmPassword = confirmInput ? confirmInput.value : '';
            var acceptTerms = !!(termsInput && termsInput.checked);

            if (password && confirmPassword && password !== confirmPassword) {
              state.authMessage = 'Passwords do not match.';
              renderAll();
              return;
            }
            if (!acceptTerms) {
              state.authMessage = 'You must accept the terms to create an account.';
              renderAll();
              return;
            }

            state.authMessage = '';
            renderAll();
            try {
              var resp = WebsiteSDK.signupAccount(fullName, email, password, confirmPassword, acceptTerms);
              if (!resp || !resp.success || !resp.accountDashboard) {
                state.authMessage = resp && resp.message ? resp.message : 'Account creation failed. Please try again.';
                renderAll();
                return;
              }
              var acc = resp.accountDashboard;
              state.account = {
                fullName: acc.fullName,
                email: acc.email,
                loyaltyPointsBalance: acc.loyaltyPointsBalance,
                loyaltyTier: acc.loyaltyTier,
                favoriteStore: acc.favoriteStore
              };
              state.authMessage = '';
              if (state.rewardId) {
                loadRewardDetail();
              } else {
                renderAll();
              }
            } catch (e) {
              state.authMessage = 'Account creation failed. Please try again.';
              renderAll();
            }
          });
        }
      }

      function setupEventHandlers() {
        var backBtn = document.querySelector('[data-action="back-to-rewards"]');
        if (backBtn) {
          backBtn.addEventListener('click', function() {
            handleBackToRewards();
          });
        }

        var logoutBtn = document.querySelector('[data-action="logout"]');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', function() {
            handleLogout();
          });
        }

        var redeemBtn = document.querySelector('[data-action="redeem-reward"]');
        if (redeemBtn) {
          redeemBtn.addEventListener('click', function() {
            handleRedeemReward();
          });
        }

        var addBtn = document.querySelector('[data-action="add-to-order"]');
        if (addBtn) {
          addBtn.addEventListener('click', function() {
            handleAddToOrder();
          });
        }

        var viewOrderFromConfirmBtn = document.querySelector('[data-action="view-order-from-confirmation"]');
        if (viewOrderFromConfirmBtn) {
          viewOrderFromConfirmBtn.addEventListener('click', function() {
            if (state.lastAddedRewardItemId) {
              navigateToOrder();
            }
          });
        }

        var viewOrderFromSummaryBtn = document.querySelector('[data-action="view-order-from-summary"]');
        if (viewOrderFromSummaryBtn) {
          viewOrderFromSummaryBtn.addEventListener('click', function() {
            if (state.orderSummary && state.orderSummary.hasActiveOrder) {
              navigateToOrder();
            }
          });
        }

        var doneAfterRedemptionBtn = document.querySelector('[data-action="done-after-redemption"]');
        if (doneAfterRedemptionBtn) {
          doneAfterRedemptionBtn.addEventListener('click', function() {
            handleBackToRewards();
          });
        }

        setupAuthTabs();
        setupAuthForms();
      }

      function init() {
        var params = new URLSearchParams(window.location.search);
        state.rewardId = params.get('id');
        state.fromCategory = params.get('fromCategory') || '';

        state.fatalError = !state.rewardId;

        setupEventHandlers();

        if (state.rewardId) {
          loadRewardDetail();
        } else {
          state.rewardDetail = null;
          state.rewardLoadError = null;
          state.rewardNotFound = true;
          renderAll();
        }

        refreshOrderSummary();
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
