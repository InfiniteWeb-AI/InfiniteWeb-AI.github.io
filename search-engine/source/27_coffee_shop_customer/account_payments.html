<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Le Cafe - Customer Portal</title>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='account_payments.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-inner'>
      <a href='index.html' class='brand'>
        <div class='brand-logo' aria-hidden='true'></div>
        <span class='brand-name'>Le Cafe</span>
      </a>
      <nav class='main-nav' aria-label='Primary navigation'>
        <ul>
          <li><a href='index.html'>Home</a></li>
          <li><a href='menu.html'>Order Pickup</a></li>
          <li><a href='stores.html'>Stores</a></li>
          <li><a href='rewards.html'>Rewards</a></li>
          <li><a href='account_dashboard.html'>Account</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='page-content' role='main'>
    <div class='payments-page' data-component='payment-page-controller'>
      <div class='payments-page-inner'>
        <nav class='breadcrumbs' aria-label='Breadcrumb' data-component='payments-breadcrumbs-nav'>
          <!-- Populated via JS -->
        </nav>

        <section class='account-auth-panel card' data-component='account-auth-panel'>
          <div class='account-auth-header'>
            <h1 class='page-title'>Payment Methods</h1>
          </div>

          <div class='account-summary' data-state='logged-in' hidden>
            <p class='account-summary-text'>
              <span class='account-summary-prefix'>Signed in</span>
              <span class='account-summary-name' data-populate='account-name'></span>
              <span class='account-summary-email' data-populate='account-email'></span>
            </p>
            <button type='button' class='link-button' data-action='logout'>Log out</button>
          </div>

          <div class='auth-forms' data-state='logged-out'>
            <div class='auth-tabs' role='tablist' aria-label='Authentication'>
              <button type='button' class='auth-tab is-active' role='tab' aria-selected='true' data-action='switch-auth-tab' data-auth-tab='login'>Log in</button>
              <button type='button' class='auth-tab' role='tab' aria-selected='false' data-action='switch-auth-tab' data-auth-tab='signup'>Sign up</button>
            </div>
            <div class='auth-panels'>
              <form class='auth-form auth-form-login' data-action='login-form' data-auth-panel='login' autocomplete='on'>
                <div class='form-field'>
                  <label for='loginEmailInput'>Email</label>
                  <input id='loginEmailInput' name='loginEmail' type='email' autocomplete='email' required>
                </div>
                <div class='form-field'>
                  <label for='loginPasswordInput'>Password</label>
                  <input id='loginPasswordInput' name='loginPassword' type='password' autocomplete='current-password' required>
                </div>
                <div class='form-actions'>
                  <button type='submit' class='primary-button'>Log in</button>
                </div>
              </form>

              <form class='auth-form auth-form-signup' data-action='signup-form' data-auth-panel='signup' autocomplete='on' hidden>
                <div class='form-field'>
                  <label for='signupFullNameInput'>Full name</label>
                  <input id='signupFullNameInput' name='signupFullName' type='text' autocomplete='name' required>
                </div>
                <div class='form-field'>
                  <label for='signupEmailInput'>Email</label>
                  <input id='signupEmailInput' name='signupEmail' type='email' autocomplete='email' required>
                </div>
                <div class='form-field'>
                  <label for='signupPasswordInput'>Password</label>
                  <input id='signupPasswordInput' name='signupPassword' type='password' autocomplete='new-password' required>
                </div>
                <div class='form-field'>
                  <label for='signupConfirmPasswordInput'>Confirm password</label>
                  <input id='signupConfirmPasswordInput' name='signupConfirmPassword' type='password' autocomplete='new-password' required>
                </div>
                <div class='form-field form-field-inline'>
                  <label>
                    <input id='signupAcceptTermsInput' name='signupAcceptTerms' type='checkbox' required>
                    <span>I agree to the Terms of Use and Privacy Policy.</span>
                  </label>
                </div>
                <div class='form-actions'>
                  <button type='submit' class='primary-button'>Create account</button>
                </div>
              </form>
            </div>
          </div>
        </section>

        <section class='feedback-messages' data-component='feedback-messages-center' aria-live='polite'>
          <!-- Feedback messages rendered here -->
        </section>

        <section class='current-order-mini' data-component='current-order-mini-summary'>
          <div data-populate='current-order-summary'></div>
        </section>

        <section class='payment-methods-section' data-component='payment-methods-list'>
          <header class='section-header'>
            <h2 class='section-title'>Saved cards</h2>
          </header>
          <div class='payment-methods-body' data-populate='payment-methods'>
            <!-- Payment methods list rendered here -->
          </div>
        </section>

        <section class='payment-card-add-section card' data-component='payment-card-add-form'>
          <header class='section-header'>
            <h2 class='section-title'>Add a new card</h2>
          </header>
          <form class='payment-card-add-form'>
            <div class='form-field'>
              <label for='cardNumberInput'>Card number</label>
              <input id='cardNumberInput' name='cardNumber' type='text' inputmode='numeric' autocomplete='cc-number' required>
            </div>
            <div class='form-field form-field-inline'>
              <div class='form-field-half'>
                <label for='expMonthInput'>Exp. month</label>
                <input id='expMonthInput' name='expMonth' type='number' inputmode='numeric' min='1' max='12' autocomplete='cc-exp-month' required>
              </div>
              <div class='form-field-half'>
                <label for='expYearInput'>Exp. year</label>
                <input id='expYearInput' name='expYear' type='number' inputmode='numeric' min='0' autocomplete='cc-exp-year' required>
              </div>
            </div>
            <div class='form-field'>
              <label for='cvvInput'>CVV</label>
              <input id='cvvInput' name='cvv' type='password' inputmode='numeric' autocomplete='cc-csc' required>
            </div>
            <div class='form-field'>
              <label for='cardholderNameInput'>Name on card</label>
              <input id='cardholderNameInput' name='cardholderName' type='text' autocomplete='cc-name' required>
            </div>
            <div class='form-field'>
              <label for='billingZipInput'>Billing ZIP (optional)</label>
              <input id='billingZipInput' name='billingZip' type='text' inputmode='numeric' autocomplete='postal-code'>
            </div>
            <div class='form-field'>
              <label for='labelInput'>Label (optional)</label>
              <input id='labelInput' name='label' type='text' placeholder='e.g., Personal card'>
            </div>
            <div class='form-actions'>
              <button type='submit' class='primary-button'>Add card</button>
            </div>
          </form>
        </section>

        <section class='payments-footer-nav' data-component='payments-page-footer-nav'>
          <!-- Footer navigation populated via JS -->
        </section>
      </div>
    </div>
  </main>

  <footer class='site-footer'>
    <div class='footer-inner'>
      <div class='footer-links'>
        <div class='footer-column'>
          <a href='about.html'>About</a>
          <a href='contact.html'>Contact</a>
          <a href='help.html'>Help &amp; FAQ</a>
          <a href='stores.html'>Stores</a>
        </div>
        <div class='footer-column'>
          <a href='account_orders.html'>Order History</a>
          <a href='account_payments.html'>Payment Methods</a>
          <a href='terms.html'>Terms of Use</a>
          <a href='privacy.html'>Privacy Policy</a>
        </div>
      </div>
      <div class='footer-meta'>
        <span class='footer-copy'>&copy; 2026 Le Cafe. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var pageState = {
        isAuthenticated: false,
        returnTo: null,
        account: null,
        paymentMethods: {
          cards: [],
          defaultPaymentCardId: null
        },
        orderSummary: null,
        feedbackMessages: [],
        feedbackCounter: 0,
        loading: {
          paymentMethods: false,
          addCard: false,
          login: false,
          signup: false,
          logout: false,
          orderSummary: false,
          setDefaultCard: false,
          deactivateCard: false
        }
      };

      var paymentsPageEl = document.querySelector('[data-component="payment-page-controller"]');
      var breadcrumbsNavEl = document.querySelector('[data-component="payments-breadcrumbs-nav"]');
      var authPanelEl = document.querySelector('[data-component="account-auth-panel"]');
      var feedbackEl = document.querySelector('[data-component="feedback-messages-center"]');
      var currentOrderContainer = document.querySelector('[data-populate="current-order-summary"]');
      var paymentMethodsContainer = document.querySelector('[data-populate="payment-methods"]');
      var addCardFormEl = document.querySelector('[data-component="payment-card-add-form"] form');
      var footerNavEl = document.querySelector('[data-component="payments-page-footer-nav"]');

      var urlParams = new URLSearchParams(window.location.search);
      var returnToParam = urlParams.get('returnTo');
      if (returnToParam === 'order.html' || returnToParam === 'account_dashboard.html') {
        pageState.returnTo = returnToParam;
      } else {
        pageState.returnTo = 'account_dashboard.html';
      }

      setupBreadcrumbs();
      setupFooterNav();
      setupAuthTabSwitching();
      setupEventHandlers();

      loadPaymentMethods(paymentMethodsContainer);

      function setupBreadcrumbs() {
        if (!breadcrumbsNavEl) return;
        var label = pageState.returnTo === 'order.html' ? 'Back to checkout' : 'Back to Account';
        breadcrumbsNavEl.innerHTML = "\n          <a href='javascript:void(0)' class='breadcrumb-back' data-action='nav-back'>" + label + "</a>\n          <span class='breadcrumb-separator'>/</span>\n          <span class='breadcrumb-current'>Payment Methods</span>\n        ";
      }

      function navigateBack() {
        var target = pageState.returnTo === 'order.html' ? 'order.html' : 'account_dashboard.html';
        window.location.href = target;
      }

      function setupFooterNav() {
        if (!footerNavEl) return;
        var text = pageState.returnTo === 'order.html' ? 'Finished updating your cards?' : 'Done here?';
        var linkLabel = pageState.returnTo === 'order.html' ? 'Return to checkout' : 'Back to Account dashboard';
        footerNavEl.innerHTML = "\n          <p class='payments-footer-text'>\n            " + text + "\n            <a href='javascript:void(0)' data-action='nav-back-footer'>" + linkLabel + "</a>\n          </p>\n        ";
      }

      function setupAuthTabSwitching() {
        if (!authPanelEl) return;
        var tabButtons = authPanelEl.querySelectorAll('[data-action="switch-auth-tab"]');
        Array.prototype.forEach.call(tabButtons, function(btn) {
          btn.addEventListener('click', function() {
            var targetTab = btn.dataset.authTab;
            switchAuthTab(targetTab);
          });
        });
      }

      function switchAuthTab(tab) {
        if (!authPanelEl) return;
        var tabButtons = authPanelEl.querySelectorAll('[data-action="switch-auth-tab"]');
        var panels = authPanelEl.querySelectorAll('[data-auth-panel]');
        Array.prototype.forEach.call(tabButtons, function(btn) {
          if (btn.dataset.authTab === tab) {
            btn.classList.add('is-active');
            btn.setAttribute('aria-selected', 'true');
          } else {
            btn.classList.remove('is-active');
            btn.setAttribute('aria-selected', 'false');
          }
        });
        Array.prototype.forEach.call(panels, function(panel) {
          panel.hidden = panel.dataset.authPanel !== tab;
        });
      }

      function setupEventHandlers() {
        if (paymentsPageEl) {
          paymentsPageEl.addEventListener('click', function(event) {
            var actionEl = event.target.closest('[data-action]');
            if (!actionEl) return;
            var action = actionEl.dataset.action;
            if (action === 'nav-back') {
              event.preventDefault();
              navigateBack();
            } else if (action === 'nav-back-footer') {
              event.preventDefault();
              navigateBack();
            } else if (action === 'view-order') {
              event.preventDefault();
              window.location.href = 'order.html';
            } else if (action === 'set-default-card') {
              event.preventDefault();
              var cardId = actionEl.dataset.cardId;
              if (cardId) {
                handleSetDefaultCard(cardId, paymentMethodsContainer);
              }
            } else if (action === 'deactivate-card') {
              event.preventDefault();
              var deactivateCardId = actionEl.dataset.cardId;
              if (deactivateCardId) {
                handleDeactivateCard(deactivateCardId, paymentMethodsContainer);
              }
            } else if (action === 'logout') {
              event.preventDefault();
              handleLogout();
            } else if (action === 'dismiss-feedback') {
              event.preventDefault();
              var id = actionEl.dataset.messageId;
              dismissFeedback(id);
            }
          });
        }

        if (authPanelEl) {
          var loginForm = authPanelEl.querySelector('form[data-action="login-form"]');
          if (loginForm) {
            loginForm.addEventListener('submit', function(e) {
              e.preventDefault();
              handleLogin(loginForm, paymentMethodsContainer);
            });
          }
          var signupForm = authPanelEl.querySelector('form[data-action="signup-form"]');
          if (signupForm) {
            signupForm.addEventListener('submit', function(e) {
              e.preventDefault();
              handleSignup(signupForm, paymentMethodsContainer);
            });
          }
        }

        if (addCardFormEl) {
          addCardFormEl.addEventListener('submit', function(e) {
            e.preventDefault();
            handleAddCard(addCardFormEl, paymentMethodsContainer);
          });
        }
      }

      function addFeedback(type, text) {
        if (!text) return;
        pageState.feedbackCounter += 1;
        var id = String(pageState.feedbackCounter);
        pageState.feedbackMessages.push({ id: id, type: type, text: text });
        renderFeedback(feedbackEl);
      }

      function dismissFeedback(id) {
        pageState.feedbackMessages = pageState.feedbackMessages.filter(function(msg) { return msg.id !== id; });
        renderFeedback(feedbackEl);
      }

      function renderFeedback(container) {
        if (!container) return;
        var messages = pageState.feedbackMessages;
        if (!messages.length) {
          container.innerHTML = '';
          container.classList.add('is-empty');
          return;
        }
        container.classList.remove('is-empty');
        var itemsHtml = messages.map(function(msg) {
          var typeClass = msg.type === 'error' ? 'feedback-item--error' : (msg.type === 'success' ? 'feedback-item--success' : 'feedback-item--info');
          return "\n            <div class='feedback-item " + typeClass + "'>\n              <span class='feedback-text'>" + escapeHtml(msg.text) + "</span>\n              <button type='button' class='feedback-close' data-action='dismiss-feedback' data-message-id='" + msg.id + "' aria-label='Dismiss message'>&times;</button>\n            </div>\n          ";
        }).join('');
        container.innerHTML = "\n          <div class='feedback-list' role='status' aria-live='polite'>\n            " + itemsHtml + "\n          </div>\n        ";
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderAuthPanel() {
        if (!authPanelEl) return;
        var loggedInSection = authPanelEl.querySelector('[data-state="logged-in"]');
        var loggedOutSection = authPanelEl.querySelector('[data-state="logged-out"]');
        if (pageState.isAuthenticated) {
          if (loggedInSection) {
            var emailSpan = loggedInSection.querySelector('[data-populate="account-email"]');
            var nameSpan = loggedInSection.querySelector('[data-populate="account-name"]');
            if (emailSpan) {
              emailSpan.textContent = pageState.account && pageState.account.email ? pageState.account.email : '';
            }
            if (nameSpan) {
              nameSpan.textContent = pageState.account && pageState.account.fullName ? pageState.account.fullName : '';
            }
            loggedInSection.hidden = false;
          }
          if (loggedOutSection) {
            loggedOutSection.hidden = true;
          }
        } else {
          if (loggedInSection) {
            loggedInSection.hidden = true;
          }
          if (loggedOutSection) {
            loggedOutSection.hidden = false;
          }
        }
      }

      function handleLogin(form, container) {
        if (pageState.loading.login) return;
        var emailInput = form.querySelector('input[name="loginEmail"]');
        var passwordInput = form.querySelector('input[name="loginPassword"]');
        var email = emailInput ? emailInput.value.trim() : '';
        var password = passwordInput ? passwordInput.value : '';
        if (!email || !password) {
          addFeedback('error', 'Please enter your email and password.');
          return;
        }
        pageState.loading.login = true;
        setFormDisabled(form, true);
        var response;
        try {
          response = WebsiteSDK.loginWithEmailPassword(email, password);
        } catch (e) {
          pageState.loading.login = false;
          setFormDisabled(form, false);
          addFeedback('error', 'Unable to log in right now. Please try again.');
          return;
        }
        pageState.loading.login = false;
        setFormDisabled(form, false);
        if (!response || response.success === false || response.isLoggedIn === false) {
          var message = response && response.message ? response.message : 'Login failed.';
          addFeedback('error', message);
          return;
        }
        pageState.isAuthenticated = !!response.isLoggedIn;
        if (response.account) {
          pageState.account = {
            fullName: response.account.fullName || '',
            email: response.account.email || ''
          };
        }
        addFeedback('success', response.message || 'You are now signed in.');
        renderAuthPanel();
        loadPaymentMethods(container);
      }

      function handleSignup(form, container) {
        if (pageState.loading.signup) return;
        var fullNameInput = form.querySelector('input[name="signupFullName"]');
        var emailInput = form.querySelector('input[name="signupEmail"]');
        var passwordInput = form.querySelector('input[name="signupPassword"]');
        var confirmInput = form.querySelector('input[name="signupConfirmPassword"]');
        var termsInput = form.querySelector('input[name="signupAcceptTerms"]');
        var fullName = fullNameInput ? fullNameInput.value.trim() : '';
        var email = emailInput ? emailInput.value.trim() : '';
        var password = passwordInput ? passwordInput.value : '';
        var confirmPassword = confirmInput ? confirmInput.value : '';
        var acceptTerms = termsInput ? termsInput.checked : false;
        if (!fullName || !email || !password || !confirmPassword) {
          addFeedback('error', 'Please fill in all fields.');
          return;
        }
        if (password !== confirmPassword) {
          addFeedback('error', 'Passwords do not match.');
          return;
        }
        if (!acceptTerms) {
          addFeedback('error', 'You must accept the terms to create an account.');
          return;
        }
        pageState.loading.signup = true;
        setFormDisabled(form, true);
        var response;
        try {
          response = WebsiteSDK.signupAccount(fullName, email, password, confirmPassword, acceptTerms);
        } catch (e) {
          pageState.loading.signup = false;
          setFormDisabled(form, false);
          addFeedback('error', 'Unable to sign up right now. Please try again.');
          return;
        }
        pageState.loading.signup = false;
        setFormDisabled(form, false);
        if (!response || response.success === false) {
          var message = response && response.message ? response.message : 'Sign up failed.';
          addFeedback('error', message);
          return;
        }
        var dashboard = response.accountDashboard || {};
        pageState.isAuthenticated = true;
        pageState.account = {
          fullName: dashboard.fullName || '',
          email: dashboard.email || ''
        };
        addFeedback('success', response.message || 'Account created and signed in.');
        renderAuthPanel();
        loadPaymentMethods(container);
      }

      function handleLogout() {
        if (pageState.loading.logout) return;
        pageState.loading.logout = true;
        var response;
        try {
          response = WebsiteSDK.logoutCurrentAccount();
        } catch (e) {
          pageState.loading.logout = false;
          addFeedback('error', 'Unable to log out right now. Please try again.');
          return;
        }
        pageState.loading.logout = false;
        if (!response || response.success === false) {
          var message = response && response.message ? response.message : 'Logout failed.';
          addFeedback('error', message);
          return;
        }
        pageState.isAuthenticated = false;
        pageState.account = null;
        pageState.paymentMethods = { cards: [], defaultPaymentCardId: null };
        pageState.orderSummary = null;
        addFeedback('success', response.message || 'You have been logged out.');
        renderAuthPanel();
        renderPaymentMethods(paymentMethodsContainer);
        renderOrderSummary(currentOrderContainer);
      }

      function setFormDisabled(form, disabled) {
        if (!form) return;
        var elements = form.querySelectorAll('input, button, select, textarea');
        Array.prototype.forEach.call(elements, function(el) {
          el.disabled = disabled;
        });
      }

      function loadPaymentMethods(container) {
        if (!container) return;
        pageState.loading.paymentMethods = true;
        var summary;
        try {
          summary = WebsiteSDK.getPaymentMethodsSummary();
        } catch (e) {
          pageState.loading.paymentMethods = false;
          pageState.isAuthenticated = false;
          pageState.paymentMethods.cards = [];
          pageState.paymentMethods.defaultPaymentCardId = null;
          renderAuthPanel();
          renderPaymentMethods(container);
          renderOrderSummary(currentOrderContainer);
          return;
        }
        pageState.loading.paymentMethods = false;
        if (summary && Array.isArray(summary.cards)) {
          pageState.isAuthenticated = true;
          pageState.paymentMethods.cards = summary.cards || [];
          pageState.paymentMethods.defaultPaymentCardId = summary.defaultPaymentCardId || null;
          renderAuthPanel();
          renderPaymentMethods(container);
          loadCurrentOrderSummary(currentOrderContainer);
        } else {
          pageState.isAuthenticated = false;
          pageState.paymentMethods.cards = [];
          pageState.paymentMethods.defaultPaymentCardId = null;
          renderAuthPanel();
          renderPaymentMethods(container);
          renderOrderSummary(currentOrderContainer);
        }
      }

      function renderPaymentMethods(container) {
        if (!container) return;
        if (!pageState.isAuthenticated) {
          container.innerHTML = "\n            <p class='payment-methods-locked'>\n              Sign in to view and manage your saved payment methods.\n            </p>\n          ";
          return;
        }
        var cards = pageState.paymentMethods.cards || [];
        if (pageState.loading.paymentMethods) {
          container.innerHTML = "\n            <p class='payment-methods-loading'>Loading payment methods...</p>\n          ";
          return;
        }
        if (!cards.length) {
          container.innerHTML = "\n            <p class='payment-methods-empty'>\n              You have no saved cards yet. Add a card below to use it for pickup orders.\n            </p>\n          ";
          return;
        }
        var defaultId = pageState.paymentMethods.defaultPaymentCardId || null;
        function cardBrandLabel(brand) {
          if (brand === 'visa') return 'Visa';
          if (brand === 'mastercard') return 'Mastercard';
          if (brand === 'amex') return 'American Express';
          if (brand === 'discover') return 'Discover';
          return 'Card';
        }
        var itemsHtml = cards.filter(function(card) { return card && card.isActive !== false; }).map(function(card) {
          var isDefault = card.isDefault === true || (defaultId && card.id === defaultId);
          var labelText = card.label && card.label.trim().length ? escapeHtml(card.label) : (cardBrandLabel(card.cardBrand) + ' ending in ' + escapeHtml(card.last4));
          var expires = card.expMonth && card.expYear ? (String(card.expMonth).padStart(2, '0') + '/' + String(card.expYear).slice(-2)) : '';
          var canDeactivate = !isDefault && card.isActive !== false;
          var canSetDefault = !isDefault && card.isActive !== false;
          return "\n            <article class='payment-card-row' data-card-id='" + card.id + "'>\n              <div class='payment-card-main'>\n                <div class='payment-card-details'>\n                  <div class='payment-card-label'>\n                    <span class='payment-card-primary'>" + labelText + "</span>\n                    <span class='payment-card-brand'>" + cardBrandLabel(card.cardBrand) + "</span>\n                  </div>\n                  <div class='payment-card-meta'>\n                    " + (card.last4 ? "<span class='payment-card-last4'>&bull;&bull;&bull;&bull; " + escapeHtml(card.last4) + '</span>' : '') + "\n                    " + (expires ? "<span class='payment-card-expiry'>Exp " + expires + '</span>' : '') + "\n                    " + (card.cardholderName ? "<span class='payment-card-holder'>" + escapeHtml(card.cardholderName) + '</span>' : '') + "\n                    " + (card.billingZip ? "<span class='payment-card-zip'>" + escapeHtml(card.billingZip) + '</span>' : '') + "\n                  </div>\n                </div>\n                <div class='payment-card-actions'>\n                  " + (isDefault ? "<span class='default-card-indicator' data-component='default-card-indicator'>Default</span>" : (canSetDefault ? "<button type='button' class='link-button' data-action='set-default-card' data-card-id='" + card.id + "'>Set as default</button>" : '')) + "\n                </div>\n              </div>\n              <div class='payment-card-secondary-actions'>\n                " + (canDeactivate ? "<button type='button' class='link-button link-button--danger' data-action='deactivate-card' data-card-id='" + card.id + "'>Deactivate</button>" : '') + "\n              </div>\n            </article>\n          ";
        }).join('');
        container.innerHTML = "\n          <div class='payment-cards-list'>\n            " + itemsHtml + "\n          </div>\n        ";
      }

      function handleSetDefaultCard(cardId, container) {
        if (!pageState.isAuthenticated || pageState.loading.setDefaultCard) return;
        pageState.loading.setDefaultCard = true;
        var response;
        try {
          response = WebsiteSDK.setDefaultPaymentCard(cardId);
        } catch (e) {
          pageState.loading.setDefaultCard = false;
          addFeedback('error', 'Unable to update default card right now. Please try again.');
          return;
        }
        pageState.loading.setDefaultCard = false;
        if (!response || response.success === false) {
          var message = response && response.message ? response.message : 'Could not set default card.';
          addFeedback('error', message);
          return;
        }
        if (response.defaultPaymentCardId) {
          pageState.paymentMethods.defaultPaymentCardId = response.defaultPaymentCardId;
        }
        pageState.paymentMethods.cards = (pageState.paymentMethods.cards || []).map(function(card) {
          if (!card) return card;
          var isDefault = card.id === pageState.paymentMethods.defaultPaymentCardId;
          var updated = {};
          for (var key in card) {
            if (Object.prototype.hasOwnProperty.call(card, key)) {
              updated[key] = card[key];
            }
          }
          updated.isDefault = isDefault;
          return updated;
        });
        renderPaymentMethods(container);
        addFeedback('success', 'Default card updated.');
      }

      function handleDeactivateCard(cardId, container) {
        if (!pageState.isAuthenticated || pageState.loading.deactivateCard) return;
        var confirmed = window.confirm('Deactivate this card? It will no longer be available for new orders.');
        if (!confirmed) return;
        pageState.loading.deactivateCard = true;
        var response;
        try {
          response = WebsiteSDK.deactivatePaymentCard(cardId);
        } catch (e) {
          pageState.loading.deactivateCard = false;
          addFeedback('error', 'Unable to deactivate this card right now. Please try again.');
          return;
        }
        pageState.loading.deactivateCard = false;
        if (!response || response.success === false) {
          var message = response && response.message ? response.message : 'Could not deactivate card.';
          addFeedback('error', message);
          return;
        }
        pageState.paymentMethods.cards = (pageState.paymentMethods.cards || []).filter(function(card) { return card && card.id !== cardId; });
        if (pageState.paymentMethods.defaultPaymentCardId === cardId) {
          pageState.paymentMethods.defaultPaymentCardId = null;
        }
        renderPaymentMethods(container);
        addFeedback('success', 'Card deactivated.');
      }

      function handleAddCard(form, container) {
        if (!pageState.isAuthenticated) {
          addFeedback('error', 'Sign in before adding a card.');
          return;
        }
        if (pageState.loading.addCard) return;
        var cardNumberInput = form.querySelector('input[name="cardNumber"]');
        var expMonthInput = form.querySelector('input[name="expMonth"]');
        var expYearInput = form.querySelector('input[name="expYear"]');
        var cvvInput = form.querySelector('input[name="cvv"]');
        var holderInput = form.querySelector('input[name="cardholderName"]');
        var zipInput = form.querySelector('input[name="billingZip"]');
        var labelInput = form.querySelector('input[name="label"]');
        var cardNumber = cardNumberInput ? cardNumberInput.value.replace(/\s+/g, '') : '';
        var expMonthStr = expMonthInput ? expMonthInput.value.trim() : '';
        var expYearStr = expYearInput ? expYearInput.value.trim() : '';
        var cvv = cvvInput ? cvvInput.value.trim() : '';
        var cardholderName = holderInput ? holderInput.value.trim() : '';
        var billingZip = zipInput ? zipInput.value.trim() : '';
        var label = labelInput ? labelInput.value.trim() : '';
        var expMonth = parseInt(expMonthStr, 10);
        var expYear = parseInt(expYearStr, 10);
        var errors = [];
        if (!cardNumber) {
          errors.push('Enter a card number.');
        } else if (cardNumber.length < 12 || cardNumber.length > 19) {
          errors.push('Enter a valid card number.');
        }
        if (!expMonth || expMonth < 1 || expMonth > 12) {
          errors.push('Enter a valid expiration month.');
        }
        if (!expYear) {
          errors.push('Enter a valid expiration year.');
        }
        if (!cvv) {
          errors.push('Enter the CVV security code.');
        }
        if (!cardholderName) {
          errors.push('Enter the name on the card.');
        }
        if (errors.length) {
          errors.forEach(function(msg) { addFeedback('error', msg); });
          return;
        }
        pageState.loading.addCard = true;
        setFormDisabled(form, true);
        var response;
        try {
          response = WebsiteSDK.addPaymentCard(cardNumber, expMonth, expYear, cvv, cardholderName, billingZip || undefined, label || undefined);
        } catch (e) {
          pageState.loading.addCard = false;
          setFormDisabled(form, false);
          addFeedback('error', 'Unable to add this card right now. Please try again.');
          return;
        }
        pageState.loading.addCard = false;
        setFormDisabled(form, false);
        if (!response || response.success === false) {
          var message = response && response.message ? response.message : 'Could not add card.';
          addFeedback('error', message);
          return;
        }
        if (response.card) {
          if (!pageState.paymentMethods.cards) {
            pageState.paymentMethods.cards = [];
          }
          pageState.paymentMethods.cards.push(response.card);
          if (response.card.isDefault) {
            pageState.paymentMethods.defaultPaymentCardId = response.card.id;
          }
          renderPaymentMethods(container);
        } else {
          loadPaymentMethods(container);
        }
        form.reset();
        addFeedback('success', response.message || 'Card added to your wallet.');
      }

      function loadCurrentOrderSummary(container) {
        if (!container) return;
        if (!pageState.isAuthenticated) {
          pageState.orderSummary = null;
          renderOrderSummary(container);
          return;
        }
        pageState.loading.orderSummary = true;
        var summary;
        try {
          summary = WebsiteSDK.getCurrentOrderSummary();
        } catch (e) {
          pageState.loading.orderSummary = false;
          pageState.orderSummary = null;
          renderOrderSummary(container);
          return;
        }
        pageState.loading.orderSummary = false;
        if (summary && summary.hasActiveOrder) {
          pageState.orderSummary = summary;
        } else {
          pageState.orderSummary = null;
        }
        renderOrderSummary(container);
      }

      function renderOrderSummary(container) {
        if (!container) return;
        if (!pageState.isAuthenticated) {
          container.innerHTML = '';
          container.classList.add('is-empty');
          return;
        }
        container.classList.remove('is-empty');
        if (pageState.loading.orderSummary) {
          container.innerHTML = "\n            <div class='card order-summary-card'>\n              <p class='order-summary-loading'>Checking for an active order...</p>\n            </div>\n          ";
          return;
        }
        var summary = pageState.orderSummary;
        if (!summary) {
          container.innerHTML = '';
          return;
        }
        var pickupLabel = summary.pickupStore && summary.pickupStore.name ? summary.pickupStore.name : 'Pickup store';
        var itemCountText = typeof summary.itemCount === 'number' ? (summary.itemCount + ' item' + (summary.itemCount === 1 ? '' : 's')) : '';
        var subtotalText = typeof summary.subtotalAmount === 'number' ? ('$' + summary.subtotalAmount.toFixed(2)) : '';
        var totalText = typeof summary.totalAmount === 'number' ? ('$' + summary.totalAmount.toFixed(2)) : '';
        var pickupTimeText = summary.pickupDateTime ? escapeHtml(summary.pickupDateTime) : '';
        var contextLabel = pageState.returnTo === 'order.html' ? 'You are updating cards for this order.' : 'Active pickup order.';
        container.innerHTML = "\n          <article class='card order-summary-card'>\n            <header class='order-summary-header'>\n              <h2 class='order-summary-title'>Current pickup order</h2>\n              <p class='order-summary-context'>" + contextLabel + "</p>\n            </header>\n            <div class='order-summary-body'>\n              <div class='order-summary-row'>\n                " + (itemCountText ? "<span class='order-summary-items'>" + itemCountText + '</span>' : '') + "\n                " + (subtotalText ? "<span class='order-summary-subtotal'>Subtotal " + subtotalText + '</span>' : '') + "\n                " + (totalText ? "<span class='order-summary-total'>Total " + totalText + '</span>' : '') + "\n              </div>\n              <div class='order-summary-row'>\n                <span class='order-summary-store'>" + escapeHtml(pickupLabel) + "</span>\n                " + (pickupTimeText ? "<span class='order-summary-time'>" + pickupTimeText + '</span>' : '') + "\n              </div>\n            </div>\n            <footer class='order-summary-footer'>\n              <button type='button' class='link-button' data-action='view-order'>Return to order</button>\n            </footer>\n          </article>\n        ";
      }

      renderAuthPanel();
    });
  </script>
</body>
</html>
