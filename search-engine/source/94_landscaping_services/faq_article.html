<!DOCTYPE html>
<link rel='stylesheet' href='faq_article.css'>

<div class='faq-article-page'>
  <!-- Non-visual state controllers -->
  <div data-component='url-state-manager' aria-hidden='true' hidden></div>
  <div data-component='faq-article-loader' aria-hidden='true' hidden></div>

  <!-- Hero / header -->
  <section class='faq-article-hero' aria-labelledby='faqArticleTitle'>
    <div class='faq-article-hero-overlay'>
      <div class='container faq-article-hero-inner'>
        <div class='faq-article-status-wrapper'>
          <div class='faq-article-status-banner' data-component='faq-article-status-banner' data-populate='article-status-banner' role='status' aria-live='polite'></div>
        </div>

        <header class='faq-article-header' data-component='faq-article-header'>
          <div class='faq-article-hero-grid'>
            <div class='faq-article-hero-text'>
              <div class='faq-article-hero-accent'></div>
              <div class='faq-article-hero-text-inner'>
                <p class='faq-article-label' data-populate='article-label'>Help Center</p>
                <h1 id='faqArticleTitle' class='faq-article-title' data-populate='article-title'>FAQ Article</h1>
                <p class='faq-article-subtitle' data-populate='article-subtitle'>Detailed help for Lifelong Landscaping services.</p>
                <p class='faq-article-meta' data-populate='article-meta'></p>
              </div>
            </div>
            <div class='faq-article-hero-actions'>
              <a href='javascript:void(0)' class='faq-back-link' data-action='back-to-faqs'>
                Back to all FAQs
              </a>
            </div>
          </div>
        </header>
      </div>
    </div>
  </section>

  <!-- Article content -->
  <section class='faq-article-body-section'>
    <div class='container faq-article-body-container'>
      <article class='faq-article-body' data-component='faq-article-content' aria-label='FAQ article content'>
        <div class='faq-article-body-inner' data-populate='article-content'>
          <p>Loading article...</p>
        </div>
      </article>
    </div>
  </section>

  <!-- Footer actions -->
  <section class='faq-article-footer-actions-section' data-component='faq-article-footer-actions' aria-label='FAQ navigation and contact options'>
    <div class='container faq-article-footer-inner'>
      <div class='faq-footer-actions-left'>
        <a href='javascript:void(0)' class='faq-back-link footer-back-link' data-action='back-to-faqs'>
          Back to all FAQs
        </a>
      </div>
      <div class='faq-footer-actions-right'>
        <a href='javascript:void(0)' class='btn btn-secondary faq-footer-service-cta' data-action='contact-service-availability' data-populate='article-footer-service-cta' style='display:none;'>
          Contact us about your service area
        </a>
        <a href='javascript:void(0)' class='btn btn-primary faq-footer-contact-support' data-action='contact-support' data-populate='article-footer-contact-support'>
          Still need help? Contact support
        </a>
      </div>
    </div>
  </section>
</div>

<script src='business_logic.js'></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const state = {
    currentArticleId: null,
    currentArticle: null,
    loading: false,
    error: null // 'missingParameter' | 'articleNotFound' | 'fetchFailed' | null
  };

  function readArticleIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('articleId');
    return id && id.trim() !== '' ? id.trim() : null;
  }

  function loadArticleForCurrentUrl() {
    const articleId = readArticleIdFromUrl();
    state.currentArticleId = articleId;
    state.currentArticle = null;
    state.error = null;

    if (!articleId) {
      state.loading = false;
      state.error = 'missingParameter';
      renderAll();
      return;
    }

    state.loading = true;
    renderAll();

    let response;
    try {
      response = WebsiteSDK.getFAQArticle(articleId);
    } catch (e) {
      state.loading = false;
      state.error = 'fetchFailed';
      renderAll();
      return;
    }

    state.loading = false;
    const article = response && response.article ? response.article : null;
    if (!article) {
      state.error = 'articleNotFound';
      state.currentArticle = null;
    } else {
      state.currentArticle = article;
      state.error = null;
    }

    renderAll();
  }

  function renderAll() {
    const populateElements = document.querySelectorAll('[data-populate]');
    populateElements.forEach(function(element) {
      const type = element.dataset.populate;
      renderPopulateElement(element, type);
    });
  }

  function renderPopulateElement(container, type) {
    if (type === 'article-status-banner') {
      renderStatusBanner(container);
      return;
    }
    if (type === 'article-label') {
      renderArticleLabel(container);
      return;
    }
    if (type === 'article-title') {
      renderArticleTitle(container);
      return;
    }
    if (type === 'article-subtitle') {
      renderArticleSubtitle(container);
      return;
    }
    if (type === 'article-meta') {
      renderArticleMeta(container);
      return;
    }
    if (type === 'article-content') {
      renderArticleContent(container);
      return;
    }
    if (type === 'article-footer-service-cta') {
      renderFooterServiceCta(container);
      return;
    }
    if (type === 'article-footer-contact-support') {
      renderFooterContactSupport(container);
      return;
    }
  }

  function renderStatusBanner(container) {
    container.innerHTML = '';

    if (state.loading) {
      container.style.display = '';
      container.innerHTML = `
        <div class='status-banner status-banner-loading'>
          <span class='status-text'>Loading article...</span>
        </div>
      `;
      return;
    }

    if (!state.error) {
      container.style.display = 'none';
      return;
    }

    let message = 'This article is unavailable.';
    if (state.error === 'missingParameter') {
      message = 'No article was specified. Please return to the FAQ list or contact support.';
    } else if (state.error === 'articleNotFound') {
      message = 'The requested article could not be found. It may have been moved or removed.';
    } else if (state.error === 'fetchFailed') {
      message = 'We were unable to load this article due to a technical issue.';
    }

    container.style.display = '';
    container.innerHTML = `
      <div class='status-banner status-banner-error'>
        <span class='status-text'>${message}</span>
        <button type='button' class='status-back-button' data-action='status-banner-back'>
          Back to FAQs
        </button>
      </div>
    `;

    const backButton = container.querySelector('[data-action="status-banner-back"]');
    if (backButton) {
      backButton.addEventListener('click', function() {
        window.location.href = 'faq.html';
      });
    }
  }

  function renderArticleLabel(container) {
    if (state.currentArticle && state.currentArticle.category) {
      container.textContent = state.currentArticle.category;
      return;
    }
    container.textContent = 'Help Center';
  }

  function renderArticleTitle(container) {
    if (state.loading) {
      container.textContent = 'Loading article...';
      return;
    }
    if (state.currentArticle && state.currentArticle.title) {
      container.textContent = state.currentArticle.title;
      return;
    }
    if (state.error) {
      container.textContent = 'Article unavailable';
      return;
    }
    container.textContent = 'FAQ Article';
  }

  function renderArticleSubtitle(container) {
    if (state.loading) {
      container.textContent = 'Please wait while we load the details for this help topic.';
      return;
    }
    if (state.error) {
      container.textContent = 'Use the options below to return to the FAQ list or contact our team with your question.';
      return;
    }
    if (state.currentArticle && state.currentArticle.articleId === 'service_areas') {
      container.textContent = 'See where we currently offer landscaping and lawn care service, and ask about your address.';
      return;
    }
    if (state.currentArticle && state.currentArticle.articleId === 'cancellation_policy') {
      container.textContent = 'Learn how to reschedule or cancel your landscaping visits.';
      return;
    }
    container.textContent = 'Find detailed answers to common questions about our landscaping services.';
  }

  function renderArticleMeta(container) {
    if (!state.currentArticle || !state.currentArticle.updatedAt) {
      container.textContent = '';
      return;
    }
    const updated = new Date(state.currentArticle.updatedAt);
    if (isNaN(updated.getTime())) {
      container.textContent = '';
      return;
    }
    container.textContent = 'Last updated: ' + updated.toLocaleDateString();
  }

  function renderArticleContent(container) {
    if (state.loading) {
      container.innerHTML = `
        <p class='article-loading-message'>Loading article content...</p>
      `;
      return;
    }

    if (state.error) {
      let message = 'This article could not be loaded.';
      if (state.error === 'missingParameter') {
        message = 'No article was specified. Please go back to the FAQ list or contact support with your question.';
      } else if (state.error === 'articleNotFound') {
        message = 'We could not find the article you requested. It may have been moved or removed.';
      } else if (state.error === 'fetchFailed') {
        message = 'We ran into a technical issue while loading this article. You can try again or contact support directly.';
      }
      container.innerHTML = `
        <div class='article-error-message'>
          <p>${message}</p>
        </div>
      `;
      return;
    }

    if (state.currentArticle && state.currentArticle.content) {
      container.innerHTML = state.currentArticle.content;
      return;
    }

    container.innerHTML = `
      <div class='article-error-message'>
        <p>Content for this article is currently unavailable.</p>
      </div>
    `;
  }

  function renderFooterServiceCta(container) {
    if (state.currentArticle && state.currentArticle.articleId === 'service_areas' && !state.error) {
      container.style.display = '';
      container.textContent = 'Contact us about your service area';
    } else {
      container.style.display = 'none';
    }
  }

  function renderFooterContactSupport(container) {
    container.textContent = 'Still need help? Contact support';
  }

  function setupActionHandlers() {
    const actionElements = document.querySelectorAll('[data-action]');
    actionElements.forEach(function(element) {
      const action = element.dataset.action;
      if (action === 'back-to-faqs') {
        element.addEventListener('click', function(event) {
          event.preventDefault();
          window.location.href = 'faq.html';
        });
      } else if (action === 'contact-support') {
        element.addEventListener('click', function(event) {
          event.preventDefault();
          window.location.href = 'contact.html?subject=general_question';
        });
      } else if (action === 'contact-service-availability') {
        element.addEventListener('click', function(event) {
          event.preventDefault();
          window.location.href = 'contact.html?subject=service_availability';
        });
      }
    });
  }

  window.addEventListener('popstate', function() {
    loadArticleForCurrentUrl();
  });

  setupActionHandlers();
  loadArticleForCurrentUrl();
});
</script>
