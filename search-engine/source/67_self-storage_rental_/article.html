<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kent Storage - Help Article</title>

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

  <!-- Site styles -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="article.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="site-branding">
        <a href="index.html" class="site-logo">Kent Storage</a>
      </div>

      <nav class="primary-nav" aria-label="Primary">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="index.html" class="nav-link nav-link--active">Home</a>
          </li>
          <li class="nav-item">
            <a href="units_search.html" class="nav-link">Find Storage</a>
          </li>
          <li class="nav-item">
            <a href="locations.html" class="nav-link">Locations</a>
          </li>
          <li class="nav-item">
            <a href="size_guide.html" class="nav-link">Size Guide</a>
          </li>
          <li class="nav-item">
            <a href="supplies.html" class="nav-link">Moving Supplies</a>
          </li>
          <li class="nav-item">
            <a href="help.html" class="nav-link">Help</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="content" class="site-main">
    <!-- Page-level dark title bar, text is intended to be customized per page -->
    <section class="page-header-bar" aria-label="Page heading">
      <div class="container">
        <h1 class="page-title">Help Center</h1>
      </div>
    </section>

    <div class="container main-content">
      <!-- Article data provider wrapper -->
      <div class="help-article-layout" data-component="article-data-provider">
        <!-- Loading state -->
        <div class="help-article-loading is-hidden" data-component="article-loading-state" aria-live="polite">
          <div class="loading-card">
            <div class="loading-spinner" aria-hidden="true"></div>
            <p class="loading-text">Loading article&hellip;</p>
          </div>
        </div>

        <!-- Error state (content injected via JS) -->
        <div class="help-article-error is-hidden" data-component="article-error-state" aria-live="assertive"></div>

        <!-- Main two-column layout -->
        <div class="help-article-columns">
          <!-- Left: article content -->
          <div class="help-article-main">
            <div class="article-breadcrumb" data-component="article-breadcrumb-navigation" data-populate="article-breadcrumb">
              <!-- Breadcrumb rendered via JavaScript -->
            </div>

            <header class="article-header" data-component="article-header" data-populate="article-header">
              <!-- Article header rendered via JavaScript -->
            </header>

            <article class="article-content" data-component="article-content-body" data-populate="article-content">
              <!-- Article body rendered via JavaScript -->
            </article>

            <div class="back-to-help-wrapper">
              <button type="button" class="back-to-help-link" data-component="back-to-help-link" data-action="back-to-help">
                &larr; Back to Help Center
              </button>
            </div>
          </div>

          <!-- Right: utilities -->
          <aside class="help-article-sidebar">
            <div class="contact-support-container" data-component="contact-support-cta" data-populate="contact-support">
              <!-- Contact support CTA rendered via JavaScript -->
            </div>

            <div class="related-articles-container" data-component="related-articles-list" data-populate="related-articles">
              <!-- Related articles rendered via JavaScript -->
            </div>
          </aside>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="footer-branding">
        <span class="footer-logo">Kent Storage</span>
      </div>

      <nav class="footer-nav" aria-label="Footer">
        <ul class="footer-nav-list">
          <li class="footer-nav-item">
            <a href="about.html" class="footer-nav-link">About &amp; Policies</a>
          </li>
          <li class="footer-nav-item">
            <a href="contact.html" class="footer-nav-link">Contact us</a>
          </li>
          <li class="footer-nav-item">
            <a href="help.html" class="footer-nav-link">Help &amp; FAQ</a>
          </li>
          <li class="footer-nav-item">
            <a href="size_guide.html" class="footer-nav-link">Size guide</a>
          </li>
          <li class="footer-nav-item">
            <a href="supplies.html" class="footer-nav-link">Moving supplies</a>
          </li>
        </ul>
      </nav>

      <div class="footer-meta">
        <p class="footer-copy">
          &copy; <span class="footer-year">2024</span> Kent Storage. All rights reserved.
        </p>
      </div>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      // URL parameters
      var urlParams = new URLSearchParams(window.location.search);
      var initialArticleId = urlParams.get('articleId');
      var initialRelatedLocationName = urlParams.get('relatedLocationName') || '';

      // Core elements
      var dataProviderEl = document.querySelector('[data-component="article-data-provider"]');
      var loadingEl = document.querySelector('[data-component="article-loading-state"]');
      var errorEl = document.querySelector('[data-component="article-error-state"]');
      var columnsEl = dataProviderEl ? dataProviderEl.querySelector('.help-article-columns') : null;

      // Map of populate targets
      var populateElements = document.querySelectorAll('[data-populate]');
      var populateMap = {};
      populateElements.forEach(function(el) {
        populateMap[el.dataset.populate] = el;
      });

      var breadcrumbEl = populateMap['article-breadcrumb'];
      var headerEl = populateMap['article-header'];
      var contentEl = populateMap['article-content'];
      var contactEl = populateMap['contact-support'];
      var relatedEl = populateMap['related-articles'];

      var CATEGORY_LABELS = {
        reservations: 'Reservations',
        access_hours: 'Access hours',
        billing: 'Billing & payments',
        security: 'Security',
        vehicle_storage: 'Vehicle storage',
        general: 'General questions'
      };

      var CONTACT_TOPIC_LABELS = {
        access_hours_and_security: 'access and security',
        reservations: 'reservations',
        billing: 'billing and payments',
        website_technical_issue: 'website issues',
        general_question: 'general questions'
      };

      var currentArticle = null;
      var currentTopicForContact = 'general_question';
      var currentRelatedLocationName = initialRelatedLocationName;

      function escapeHtml(str) {
        if (str === undefined || str === null) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeAttr(str) {
        return escapeHtml(str);
      }

      function setDocumentTitle(article) {
        if (!article || !article.title) return;
        document.title = 'Kent Storage - ' + article.title;
      }

      function setLoadingState(isLoading) {
        if (!loadingEl || !columnsEl || !errorEl) return;
        if (isLoading) {
          loadingEl.classList.remove('is-hidden');
          columnsEl.classList.add('is-hidden');
          errorEl.classList.add('is-hidden');
        } else {
          loadingEl.classList.add('is-hidden');
        }
      }

      function showError(type) {
        if (!errorEl || !columnsEl || !loadingEl) return;
        columnsEl.classList.add('is-hidden');
        loadingEl.classList.add('is-hidden');

        var title = 'We couldn\'t load this article';
        var message = 'Something went wrong while loading this help article. Please try again or return to the Help Center.';
        var showRetry = true;

        if (type === 'missing') {
          title = 'Article not found';
          message = 'We couldn\'t find the help article you requested. It may have been moved or removed. You can return to the Help Center to browse all topics.';
          showRetry = false;
        } else if (type === 'not_found') {
          title = 'Article not found';
          message = 'The help article you requested could not be found. It may have been moved or removed. You can return to the Help Center to browse all topics.';
          showRetry = false;
        }

        var retryButtonHtml = showRetry ? '\n          <button type="button" class="button button--primary" data-action="retry-load">Retry</button>\n        ' : '';

        errorEl.innerHTML = '\n          <div class="error-card">\n            <h2 class="error-title">' + escapeHtml(title) + '</h2>\n            <p class="error-message">' + escapeHtml(message) + '</p>\n            <div class="error-actions">\n              ' + retryButtonHtml + '\n              <button type="button" class="button button--ghost" data-action="back-to-help">Go to Help Center</button>\n            </div>\n          </div>\n        ';

        errorEl.classList.remove('is-hidden');
      }

      function hideError() {
        if (!errorEl) return;
        errorEl.classList.add('is-hidden');
        errorEl.innerHTML = '';
      }

      function mapCategoryToTopic(category) {
        if (!category) return 'general_question';
        if (category === 'access_hours' || category === 'security' || category === 'vehicle_storage') {
          return 'access_hours_and_security';
        }
        if (category === 'reservations') return 'reservations';
        if (category === 'billing') return 'billing';
        return 'general_question';
      }

      function renderBreadcrumb(container, article) {
        if (!container || !article) return;
        var category = article.category || 'general';
        var categoryLabel = CATEGORY_LABELS[category] || 'Help';

        container.innerHTML = '\n          <nav class="breadcrumb" aria-label="Breadcrumb">\n            <ol class="breadcrumb-list">\n              <li class="breadcrumb-item">\n                <a href="javascript:void(0)" class="breadcrumb-link" data-action="breadcrumb-help">Help Center</a>\n              </li>\n              <li class="breadcrumb-item">\n                <button type="button" class="breadcrumb-link breadcrumb-link--category" data-action="breadcrumb-category" data-category="' + escapeAttr(category) + '">\n                  ' + escapeHtml(categoryLabel) + '\n                </button>\n              </li>\n              <li class="breadcrumb-item breadcrumb-item--current" aria-current="page">\n                <span>' + escapeHtml(article.title || '') + '</span>\n              </li>\n            </ol>\n          </nav>\n        ';
      }

      function renderArticleHeader(container, article) {
        if (!container || !article) return;
        var category = article.category || 'general';
        var categoryLabel = CATEGORY_LABELS[category] || 'Help';
        var summaryHtml = '';
        if (article.summary) {
          summaryHtml = '\n            <p class="article-summary">' + escapeHtml(article.summary) + '</p>\n          ';
        }

        container.innerHTML = '\n          <div class="article-header-inner">\n            <p class="article-category-label">\n              <button type="button" class="category-label-button" data-action="breadcrumb-category" data-category="' + escapeAttr(category) + '">\n                ' + escapeHtml(categoryLabel) + '\n              </button>\n            </p>\n            <h2 class="article-title">' + escapeHtml(article.title || '') + '</h2>\n            ' + summaryHtml + '\n          </div>\n        ';
      }

      function renderArticleContent(container, article) {
        if (!container) return;
        container.innerHTML = '';
        var bodyDiv = document.createElement('div');
        bodyDiv.className = 'article-body';
        bodyDiv.innerHTML = article && article.content ? article.content : '';
        container.appendChild(bodyDiv);
      }

      function renderRelatedArticles(container, article) {
        if (!container) return;
        var related = article && Array.isArray(article.related_articles) ? article.related_articles : [];
        if (!related.length) {
          container.innerHTML = '\n            <section class="related-articles card">\n              <h3 class="related-articles-title">Related articles</h3>\n              <p class="related-articles-empty">No related articles are available for this topic.</p>\n            </section>\n          ';
          return;
        }

        var itemsHtml = related.map(function(item) {
          var id = item.article_id || '';
          var title = item.title || '';
          return '\n              <li class="related-article-item">\n                <button type="button" class="related-article-link" data-action="related-article" data-article-id="' + escapeAttr(id) + '">\n                  ' + escapeHtml(title) + '\n                </button>\n              </li>';
        }).join('');

        container.innerHTML = '\n          <section class="related-articles card">\n            <h3 class="related-articles-title">Related articles</h3>\n            <ul class="related-articles-list">' + itemsHtml + '\n            </ul>\n          </section>\n        ';
      }

      function renderContactSupport(container, article) {
        if (!container) return;
        var category = article && article.category ? article.category : 'general';
        var topic = mapCategoryToTopic(category);
        currentTopicForContact = topic;
        var topicLabel = CONTACT_TOPIC_LABELS[topic] || CONTACT_TOPIC_LABELS.general_question;

        container.innerHTML = '\n          <section class="contact-support card">\n            <h3 class="contact-support-title">Still need help?</h3>\n            <p class="contact-support-text">\n              Our team can help with ' + escapeHtml(topicLabel) + ' questions and more.\n            </p>\n            <button type="button" class="contact-support-button" data-action="contact-support">\n              Contact us\n            </button>\n            <p class="contact-support-note">\n              You\'ll be redirected to a short contact form.\n            </p>\n          </section>\n        ';
      }

      function renderAll(article) {
        if (breadcrumbEl) renderBreadcrumb(breadcrumbEl, article);
        if (headerEl) renderArticleHeader(headerEl, article);
        if (contentEl) renderArticleContent(contentEl, article);
        if (relatedEl) renderRelatedArticles(relatedEl, article);
        if (contactEl) renderContactSupport(contactEl, article);
      }

      function loadArticleById(articleId) {
        if (!dataProviderEl) return;
        if (!articleId) {
          setLoadingState(false);
          currentArticle = null;
          renderAll({});
          showError('missing');
          return;
        }

        setLoadingState(true);
        hideError();

        try {
          var article = WebsiteSDK.getHelpArticleDetails(articleId);
          if (!article || !article.article_id) {
            currentArticle = null;
            renderAll({});
            showError('not_found');
            return;
          }

          currentArticle = article;
          setDocumentTitle(article);
          renderAll(article);
          if (columnsEl) {
            columnsEl.classList.remove('is-hidden');
          }
        } catch (e) {
          console.error(e);
          currentArticle = null;
          renderAll({});
          showError('load_failed');
        } finally {
          setLoadingState(false);
        }
      }

      function navigateToHelp(category) {
        if (category) {
          window.location.href = 'help.html?category=' + encodeURIComponent(category);
        } else {
          window.location.href = 'help.html';
        }
      }

      function navigateToHelpCategory(category) {
        if (category) {
          window.location.href = 'help.html?category=' + encodeURIComponent(category);
        } else {
          window.location.href = 'help.html';
        }
      }

      function navigateToArticle(articleId) {
        if (!articleId) return;
        var params = new URLSearchParams(window.location.search);
        params.set('articleId', articleId);
        var newUrl = window.location.pathname + '?' + params.toString();
        window.history.pushState({ articleId: articleId }, '', newUrl);
        loadArticleById(articleId);
      }

      function handleContactSupport() {
        var topic = currentTopicForContact || 'general_question';
        var relatedName = currentRelatedLocationName || '';
        var url = 'contact.html?topic=' + encodeURIComponent(topic) + '&relatedLocationName=' + encodeURIComponent(relatedName);
        window.location.href = url;
      }

      function handleRetryLoad() {
        var params = new URLSearchParams(window.location.search);
        var id = params.get('articleId');
        loadArticleById(id);
      }

      // Initial load
      loadArticleById(initialArticleId);

      // Handle back/forward navigation
      window.addEventListener('popstate', function() {
        var params = new URLSearchParams(window.location.search);
        var id = params.get('articleId');
        loadArticleById(id);
      });

      // Global click handler driven by data-action attributes
      document.addEventListener('click', function(event) {
        var actionEl = event.target.closest('[data-action]');
        if (actionEl) {
          var action = actionEl.dataset.action;
          if (!action) return;

          if (action === 'back-to-help' || action === 'breadcrumb-help') {
            event.preventDefault();
            var cat = currentArticle && currentArticle.category ? currentArticle.category : '';
            navigateToHelp(cat);
          } else if (action === 'breadcrumb-category') {
            event.preventDefault();
            var category = actionEl.dataset.category || (currentArticle && currentArticle.category) || '';
            navigateToHelpCategory(category);
          } else if (action === 'contact-support') {
            event.preventDefault();
            handleContactSupport();
          } else if (action === 'retry-load') {
            event.preventDefault();
            handleRetryLoad();
          } else if (action === 'related-article') {
            event.preventDefault();
            var id = actionEl.dataset.articleId;
            if (id) {
              navigateToArticle(id);
            }
          }

          return;
        }

        // Handle internal links inside article content that point to other help articles
        var linkEl = event.target.closest('.article-body a[href]');
        if (linkEl) {
          var href = linkEl.getAttribute('href') || '';
          var match = href.match(/article\.html\?([^#]+)/);
          if (match) {
            event.preventDefault();
            var linkParams = new URLSearchParams(match[1]);
            var linkedId = linkParams.get('articleId');
            if (linkedId) {
              navigateToArticle(linkedId);
            }
          }
        }
      });
    });
  </script>
</body>
</html>
