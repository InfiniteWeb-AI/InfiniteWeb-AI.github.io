<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>Kent Storage - Moving Supplies Category</title>

  <!-- Typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com' />
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
  <link href='https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap' rel='stylesheet' />

  <!-- Site styles -->
  <link rel='stylesheet' href='styles.css' />
  <link rel='stylesheet' href='supplies_category.css' />
</head>
<body>
  <header class='site-header'>
    <div class='container header-inner'>
      <div class='site-branding'>
        <a href='index.html' class='site-logo'>Kent Storage</a>
      </div>

      <nav class='primary-nav' aria-label='Primary'>
        <ul class='nav-list'>
          <li class='nav-item'>
            <a href='index.html' class='nav-link'>Home</a>
          </li>
          <li class='nav-item'>
            <a href='units_search.html' class='nav-link'>Find Storage</a>
          </li>
          <li class='nav-item'>
            <a href='locations.html' class='nav-link'>Locations</a>
          </li>
          <li class='nav-item'>
            <a href='size_guide.html' class='nav-link'>Size Guide</a>
          </li>
          <li class='nav-item'>
            <a href='supplies.html' class='nav-link nav-link--active'>Moving Supplies</a>
          </li>
          <li class='nav-item'>
            <a href='help.html' class='nav-link'>Help</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main id='content' class='site-main'>
    <!-- Page-level dark title bar, text is intended to be customized per page -->
    <section class='page-header-bar' aria-label='Page heading'>
      <div class='container'>
        <h1 class='page-title'>Moving Supplies</h1>
      </div>
    </section>

    <div class='container main-content'>
      <div class='supplies-category-page' data-component='category-page-controller'>
        <div class='supplies-layout'>
          <!-- Left column: category header, controls, products -->
          <section class='supplies-main-column'>
            <header class='supplies-category-header' data-component='category-header' data-populate='category-header' aria-live='polite'>
              <!-- Filled by JS: category name/description or default message -->
            </header>

            <section class='supplies-controls' data-component='sort-and-filter-bar'>
              <div class='supplies-controls-inner'>
                <div class='supplies-controls-left'>
                  <div class='supplies-sort'>
                    <label for='sortBySelect' class='supplies-sort-label'>Sort by</label>
                    <select id='sortBySelect' name='sortBy' class='supplies-sort-select' data-action='change-sort'>
                      <option value=''>Recommended</option>
                      <option value='price_low_to_high'>Price: low to high</option>
                      <option value='price_high_to_low'>Price: high to low</option>
                      <option value='popularity'>Most popular</option>
                    </select>
                  </div>
                  <div class='supplies-item-count'>
                    <span class='supplies-item-count-text' data-populate='product-count'>0 items</span>
                  </div>
                </div>

                <div class='supplies-controls-right'>
                  <form class='supplies-filter-form' data-action='apply-filters'>
                    <div class='supplies-filter-field'>
                      <label for='productTypeSelect' class='supplies-filter-label'>Type</label>
                      <select id='productTypeSelect' name='productType' class='supplies-filter-select' data-action='change-product-type'>
                        <option value=''>All types</option>
                        <option value='box_single'>Single boxes</option>
                        <option value='box_bundle_small'>Box bundle - small</option>
                        <option value='box_bundle_medium'>Box bundle - medium</option>
                        <option value='box_bundle_large'>Box bundle - large</option>
                        <option value='bubble_wrap'>Bubble wrap</option>
                        <option value='packing_paper'>Packing paper</option>
                        <option value='disk_lock'>Disk locks</option>
                        <option value='cylinder_lock'>Cylinder locks</option>
                        <option value='padlock'>Padlocks</option>
                        <option value='tape'>Tape</option>
                        <option value='other'>Other</option>
                      </select>
                    </div>

                    <div class='supplies-filter-field supplies-filter-field--price'>
                      <label for='maxPriceInput' class='supplies-filter-label'>Max price</label>
                      <div class='supplies-price-input-wrapper'>
                        <span class='supplies-price-prefix'>$</span>
                        <input id='maxPriceInput' name='maxPrice' type='number' min='0' step='0.01' class='supplies-price-input' placeholder='No limit' />
                      </div>
                    </div>

                    <div class='supplies-filter-actions'>
                      <button type='submit' class='btn btn--primary supplies-filter-apply'>Apply</button>
                      <button type='button' class='btn btn--ghost supplies-filter-clear' data-action='clear-filters'>Clear</button>
                    </div>
                  </form>
                </div>
              </div>
            </section>

            <section class='supplies-feedback' data-component='empty-or-error-state' data-populate='feedback' aria-live='polite'>
              <!-- Empty/error messages go here -->
            </section>

            <section class='supplies-product-grid' data-component='product-grid' data-populate='product-grid' aria-label='Products'>
              <!-- Product cards injected here -->
            </section>
          </section>

          <!-- Right column: cart summary -->
          <aside class='supplies-cart-column'>
            <div class='cart-summary-card' data-component='cart-summary-header' data-populate='cart-summary' data-action='view-cart' role='button' tabindex='0' aria-label='View cart and checkout'>
              <!-- Cart summary populated by JS -->
            </div>
          </aside>
        </div>
      </div>
    </div>
  </main>

  <footer class='site-footer' role='contentinfo'>
    <div class='container footer-inner'>
      <div class='footer-branding'>
        <span class='footer-logo'>Kent Storage</span>
      </div>

      <nav class='footer-nav' aria-label='Footer'>
        <ul class='footer-nav-list'>
          <li class='footer-nav-item'>
            <a href='about.html' class='footer-nav-link'>About &amp; Policies</a>
          </li>
          <li class='footer-nav-item'>
            <a href='contact.html' class='footer-nav-link'>Contact us</a>
          </li>
          <li class='footer-nav-item'>
            <a href='help.html' class='footer-nav-link'>Help &amp; FAQ</a>
          </li>
          <li class='footer-nav-item'>
            <a href='size_guide.html' class='footer-nav-link'>Size guide</a>
          </li>
          <li class='footer-nav-item'>
            <a href='supplies.html' class='footer-nav-link'>Moving supplies</a>
          </li>
        </ul>
      </nav>

      <div class='footer-meta'>
        <p class='footer-copy'>
          &copy; <span class='footer-year'>2024</span> Kent Storage. All rights reserved.
        </p>
      </div>
    </div>
  </footer>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var state = getUrlState();

      var categoryHeaderContainer = document.querySelector('[data-populate="category-header"]');
      var cartSummaryContainer = document.querySelector('[data-populate="cart-summary"]');
      var productGridContainer = document.querySelector('[data-populate="product-grid"]');
      var feedbackContainer = document.querySelector('[data-populate="feedback"]');
      var itemCountEl = document.querySelector('[data-populate="product-count"]');

      var sortSelect = document.querySelector('[data-action="change-sort"]');
      var productTypeSelect = document.querySelector('[data-action="change-product-type"]');
      var maxPriceInput = document.getElementById('maxPriceInput');
      var filterForm = document.querySelector('.supplies-filter-form');
      var clearFiltersBtn = document.querySelector('[data-action="clear-filters"]');

      updateControlsFromState(state);
      loadFromState();
      loadCartSummary();

      if (sortSelect) {
        sortSelect.addEventListener('change', function(e) {
          var newSort = e.target.value || '';
          pushStateAndReload({ sortBy: newSort });
        });
      }

      if (productTypeSelect) {
        productTypeSelect.addEventListener('change', function(e) {
          var newType = e.target.value || '';
          pushStateAndReload({ productType: newType });
        });
      }

      if (filterForm) {
        filterForm.addEventListener('submit', function(e) {
          e.preventDefault();
          var rawMax = maxPriceInput ? maxPriceInput.value.trim() : '';
          var maxPrice = null;
          if (rawMax !== '') {
            var parsed = Number(rawMax);
            if (!isNaN(parsed) && parsed >= 0) {
              maxPrice = parsed;
            }
          }
          pushStateAndReload({ maxPrice: maxPrice });
        });
      }

      if (clearFiltersBtn) {
        clearFiltersBtn.addEventListener('click', function() {
          pushStateAndReload({ maxPrice: null, productType: '' });
        });
      }

      if (productGridContainer) {
        productGridContainer.addEventListener('click', function(e) {
          var target = e.target.closest('[data-action="view-product"]');
          if (!target) return;
          var productId = target.getAttribute('data-product-id');
          if (productId) {
            window.location.href = 'product_detail.html?productId=' + encodeURIComponent(productId);
          }
        });
      }

      if (cartSummaryContainer) {
        cartSummaryContainer.addEventListener('click', function() {
          window.location.href = 'cart.html';
        });
        cartSummaryContainer.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            window.location.href = 'cart.html';
          }
        });
      }

      window.addEventListener('popstate', function() {
        state = getUrlState();
        updateControlsFromState(state);
        loadFromState();
        loadCartSummary();
      });

      function getUrlState() {
        var params = new URLSearchParams(window.location.search);
        var categoryId = params.get('categoryId');
        var sortBy = params.get('sortBy') || '';
        var maxPriceStr = params.get('maxPrice');
        var productType = params.get('productType') || '';

        var maxPrice = null;
        if (maxPriceStr !== null && maxPriceStr !== '') {
          var parsed = Number(maxPriceStr);
          if (!isNaN(parsed) && parsed >= 0) {
            maxPrice = parsed;
          }
        }

        return {
          categoryId: categoryId,
          sortBy: sortBy,
          maxPrice: maxPrice,
          productType: productType
        };
      }

      function pushStateAndReload(updates) {
        state = Object.assign({}, state, updates || {});
        var params = new URLSearchParams();
        if (state.categoryId) {
          params.set('categoryId', state.categoryId);
        }
        if (state.sortBy) {
          params.set('sortBy', state.sortBy);
        }
        if (typeof state.maxPrice === 'number' && !isNaN(state.maxPrice)) {
          params.set('maxPrice', String(state.maxPrice));
        }
        if (state.productType) {
          params.set('productType', state.productType);
        }
        var newQuery = params.toString();
        var newUrl = window.location.pathname + (newQuery ? '?' + newQuery : '');
        window.history.pushState({}, '', newUrl);
        updateControlsFromState(state);
        loadFromState();
      }

      function updateControlsFromState(current) {
        if (sortSelect) {
          sortSelect.value = current.sortBy || '';
        }
        if (productTypeSelect) {
          productTypeSelect.value = current.productType || '';
        }
        if (maxPriceInput) {
          if (typeof current.maxPrice === 'number' && !isNaN(current.maxPrice)) {
            maxPriceInput.value = String(current.maxPrice);
          } else {
            maxPriceInput.value = '';
          }
        }
      }

      function loadFromState() {
        if (!state.categoryId) {
          renderCategoryHeader(categoryHeaderContainer, null, false);
          renderFeedback(feedbackContainer, 'info', 'Select a moving supplies category to view available products.');
          if (productGridContainer) {
            productGridContainer.innerHTML = '';
          }
          if (itemCountEl) {
            itemCountEl.textContent = '0 items';
          }
          return;
        }

        if (feedbackContainer) {
          renderFeedback(feedbackContainer, 'none', '');
        }

        if (categoryHeaderContainer) {
          categoryHeaderContainer.textContent = 'Loading categorya0dots';
        }
        if (productGridContainer) {
          productGridContainer.textContent = 'Loading productsa0dots';
        }

        var categoryData = null;
        try {
          categoryData = WebsiteSDK.getSuppliesCategoryDetails(state.categoryId);
          renderCategoryHeader(categoryHeaderContainer, categoryData, true);
        } catch (err) {
          renderCategoryHeader(categoryHeaderContainer, null, true);
          renderFeedback(feedbackContainer, 'error', 'We could not load this category right now. Please try again.');
        }

        var filters = {};
        if (typeof state.maxPrice === 'number' && !isNaN(state.maxPrice)) {
          filters.maxPrice = state.maxPrice;
        }
        if (state.productType) {
          filters.productTypes = [state.productType];
        }

        try {
          var sortArg = state.sortBy || undefined;
          var productsResponse = WebsiteSDK.getSuppliesProducts(state.categoryId, filters, sortArg);
          var products = (productsResponse && productsResponse.products) ? productsResponse.products : [];
          renderProductGrid(productGridContainer, products);
          if (itemCountEl) {
            var countLabel = products.length + (products.length === 1 ? ' item' : ' items');
            itemCountEl.textContent = countLabel;
          }
          if (!products || products.length === 0) {
            renderFeedback(feedbackContainer, 'empty', 'No supplies match your current filters. Try adjusting the type or price.');
          } else {
            renderFeedback(feedbackContainer, 'none', '');
          }
        } catch (err2) {
          if (productGridContainer) {
            productGridContainer.innerHTML = '';
          }
          if (itemCountEl) {
            itemCountEl.textContent = '0 items';
          }
          renderFeedback(feedbackContainer, 'error', 'We could not load products for this category. Please try again.');
        }
      }

      function loadCartSummary() {
        if (!cartSummaryContainer) return;
        cartSummaryContainer.innerHTML = '<div class="cart-summary-loading">Loading carta0dots</div>';
        try {
          var summary = WebsiteSDK.getCartSummary();
          renderCartSummary(cartSummaryContainer, summary, null);
        } catch (err) {
          renderCartSummary(cartSummaryContainer, null, 'We could not load your cart right now.');
        }
      }

      function renderCategoryHeader(container, category, hasCategoryId) {
        if (!container) return;
        container.innerHTML = '';

        var label = document.createElement('p');
        label.className = 'supplies-category-label';
        label.textContent = 'Moving supplies category';
        container.appendChild(label);

        var title = document.createElement('h2');
        title.className = 'supplies-category-title';

        var description = document.createElement('p');
        description.className = 'supplies-category-description';

        if (!hasCategoryId) {
          title.textContent = 'Browse moving supplies';
          description.textContent = 'Select a moving supplies category to view available boxes, packing materials, and locks.';
        } else if (!category) {
          title.textContent = 'Moving supplies';
          description.textContent = 'We could not load details for this category right now.';
        } else {
          title.textContent = category.name || 'Moving supplies';
          if (category.description) {
            description.textContent = category.description;
          } else {
            description.textContent = '';
          }
        }

        container.appendChild(title);
        if (description.textContent) {
          container.appendChild(description);
        }
      }

      function renderCartSummary(container, summary, errorMessage) {
        if (!container) return;
        container.innerHTML = '';

        var heading = document.createElement('h2');
        heading.className = 'cart-summary-title';
        heading.textContent = 'Your cart';
        container.appendChild(heading);

        var body = document.createElement('div');
        body.className = 'cart-summary-body';

        if (errorMessage) {
          var errorEl = document.createElement('p');
          errorEl.className = 'cart-summary-error';
          errorEl.textContent = errorMessage;
          body.appendChild(errorEl);
        } else if (!summary || !summary.cart_id) {
          var emptyMsg = document.createElement('p');
          emptyMsg.className = 'cart-summary-empty';
          emptyMsg.textContent = 'No items in your cart yet.';
          body.appendChild(emptyMsg);
        } else {
          var count = document.createElement('p');
          count.className = 'cart-summary-count';
          var itemLabel = summary.item_count === 1 ? 'item' : 'items';
          count.textContent = summary.item_count + ' ' + itemLabel;

          var subtotal = document.createElement('p');
          subtotal.className = 'cart-summary-subtotal';
          subtotal.textContent = 'Subtotal: ' + formatCurrency(summary.subtotal || 0);

          body.appendChild(count);
          body.appendChild(subtotal);
        }

        var cta = document.createElement('p');
        cta.className = 'cart-summary-cta';
        cta.textContent = 'View cart & checkout';

        container.appendChild(body);
        container.appendChild(cta);
      }

      function renderProductGrid(container, products) {
        if (!container) return;
        container.innerHTML = '';

        if (!products || products.length === 0) {
          return;
        }

        products.forEach(function(product) {
          var card = document.createElement('article');
          card.className = 'product-card';
          card.setAttribute('data-component', 'product-card');

          var imageLink = document.createElement('a');
          imageLink.href = 'javascript:void(0)';
          imageLink.className = 'product-card-image-link';
          imageLink.setAttribute('data-action', 'view-product');
          imageLink.setAttribute('data-product-id', product.product_id);

          var imageWrapper = document.createElement('div');
          imageWrapper.className = 'product-card-image-wrapper';

          if (product.image_url) {
            var img = document.createElement('img');
            img.className = 'product-card-image';
            img.src = product.image_url;
            img.alt = product.name || 'Moving supplies product';
            imageWrapper.appendChild(img);
          } else {
            var placeholder = document.createElement('div');
            placeholder.className = 'product-card-image-placeholder';
            placeholder.textContent = 'Image not available';
            imageWrapper.appendChild(placeholder);
          }

          imageLink.appendChild(imageWrapper);
          card.appendChild(imageLink);

          var body = document.createElement('div');
          body.className = 'product-card-body';

          var titleLink = document.createElement('a');
          titleLink.href = 'javascript:void(0)';
          titleLink.className = 'product-card-title';
          titleLink.setAttribute('data-action', 'view-product');
          titleLink.setAttribute('data-product-id', product.product_id);
          titleLink.textContent = product.name || 'Product';
          body.appendChild(titleLink);

          var meta = document.createElement('div');
          meta.className = 'product-card-meta';

          if (product.is_bundle && product.bundle_size) {
            var bundle = document.createElement('p');
            bundle.className = 'product-card-bundle';
            bundle.textContent = 'Bundle of ' + product.bundle_size;
            meta.appendChild(bundle);
          }

          if (product.dimensions) {
            var dims = document.createElement('p');
            dims.className = 'product-card-dimensions';
            dims.textContent = 'Size: ' + product.dimensions;
            meta.appendChild(dims);
          }

          if (product.product_type) {
            var type = document.createElement('p');
            type.className = 'product-card-type';
            type.textContent = formatProductType(product.product_type);
            meta.appendChild(type);
          }

          if (meta.childNodes.length > 0) {
            body.appendChild(meta);
          }

          var pricing = document.createElement('div');
          pricing.className = 'product-card-pricing';

          if (product.original_price && product.original_price > product.price) {
            var original = document.createElement('span');
            original.className = 'product-card-original-price';
            original.textContent = formatCurrency(product.original_price);
            pricing.appendChild(original);
          }

          var current = document.createElement('span');
          current.className = 'product-card-price';
          current.textContent = formatCurrency(product.price || 0);
          pricing.appendChild(current);

          body.appendChild(pricing);

          var cta = document.createElement('a');
          cta.href = 'javascript:void(0)';
          cta.className = 'product-card-cta';
          cta.setAttribute('data-action', 'view-product');
          cta.setAttribute('data-product-id', product.product_id);
          cta.textContent = 'View details';
          body.appendChild(cta);

          card.appendChild(body);
          container.appendChild(card);
        });
      }

      function renderFeedback(container, type, message) {
        if (!container) return;
        if (type === 'none') {
          container.innerHTML = '';
          container.style.display = 'none';
          return;
        }
        container.style.display = '';
        container.innerHTML = '';
        var box = document.createElement('div');
        box.className = 'supplies-feedback-box supplies-feedback-box--' + type;
        var text = document.createElement('p');
        text.className = 'supplies-feedback-text';
        text.textContent = message;
        box.appendChild(text);
        container.appendChild(box);
      }

      function formatCurrency(amount) {
        var value = Number(amount);
        if (isNaN(value)) value = 0;
        return '$' + value.toFixed(2);
      }

      function formatProductType(type) {
        var map = {
          box_single: 'Single box',
          box_bundle_small: 'Box bundle - small',
          box_bundle_medium: 'Box bundle - medium',
          box_bundle_large: 'Box bundle - large',
          bubble_wrap: 'Bubble wrap',
          packing_paper: 'Packing paper',
          disk_lock: 'Disk lock',
          cylinder_lock: 'Cylinder lock',
          padlock: 'Padlock',
          tape: 'Tape',
          other: 'Other'
        };
        return map[type] || 'Other';
      }
    });
  </script>
</body>
</html>
