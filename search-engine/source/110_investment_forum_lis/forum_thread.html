<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYIP Programs Forum</title>
    
    <link rel="stylesheet" href="forum_thread.css">
</head>
<body>
    <div id="page">
        <header class="site-header">
            <div class="site-header__title-row">
                <h1 class="site-title">Full version: <a href="index.html">Hyip'S</a></h1>
            </div>

            <nav class="site-header__nav-bar" aria-label="Main navigation">
                <ul class="main-nav">
                    <li class="main-nav__item"><a href="index.html">Home</a></li>
                    <li class="main-nav__item"><a href="programs.html?view=all_programs">HYIP Listings</a></li>
                    <li class="main-nav__item"><a href="programs.html?view=problematic_programs">Problematic Programs</a></li>
                    <li class="main-nav__item"><a href="forum.html">Forum</a></li>
                    <li class="main-nav__item"><a href="dashboard.html">Dashboard</a></li>
                    <li class="main-nav__item"><a href="saved_programs.html">Saved Programs</a></li>
                    <li class="main-nav__item"><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
        </header>

        <main id="content" class="site-content" role="main">
            <div class="content-box">
                <div class="thread-page">
                    <!-- Thread header row: title on left, global search on right -->
                    <div class="thread-header-row" data-component="thread-header">
                        <div class="thread-header-row__title">
                            <h2 class="thread-title" data-populate="thread-title">Forum Thread</h2>
                            <div class="thread-meta" data-populate="thread-meta"></div>
                        </div>
                        <form class="global-search-form" data-component="global-search-form" data-action="submit-search">
                            <label for="globalSearchInput">Search:</label>
                            <input type="text" id="globalSearchInput" name="query" size="24">
                            <select id="globalSearchType" name="type_filter">
                                <option value="all">All</option>
                                <option value="programs">Programs</option>
                                <option value="forum">Forum</option>
                            </select>
                            <button type="submit">Go</button>
                        </form>
                    </div>

                    <div class="thread-error" data-populate="thread-error" aria-live="polite"></div>

                    <!-- Breadcrumb navigation -->
                    <nav class="breadcrumb-nav" aria-label="Breadcrumb" data-component="breadcrumb-nav">
                        <span><a href="forum.html">Forum</a></span>
                        <span> &gt; </span>
                        <span class="breadcrumb-category">
                            <a href="javascript:void(0)" data-action="go-category" data-populate="breadcrumb-category"></a>
                        </span>
                        <span> &gt; </span>
                        <span class="breadcrumb-thread-title" data-populate="breadcrumb-thread-title"></span>
                    </nav>

                    <!-- Main thread container (bordered card) -->
                    <section class="thread-container" data-component="thread-data-loader">
                        <!-- Actions bar: sort, reply, subscribe + subscription status -->
                        <div class="thread-actions-bar" data-component="thread-actions-bar">
                            <div class="thread-actions-bar__left">
                                <label for="postSortSelect">Sort:</label>
                                <select id="postSortSelect" data-action="change-sort">
                                    <option value="asc">Oldest first</option>
                                    <option value="desc">Newest first</option>
                                </select>
                                <button type="button" data-action="scroll-to-reply">Reply to Thread</button>
                                <button type="button" data-action="toggle-subscription" disabled>Subscribe</button>
                            </div>
                            <div class="thread-actions-bar__right">
                                <span data-component="subscription-status-indicator" data-populate="subscription-status"></span>
                            </div>
                        </div>

                        <!-- Top pagination strip -->
                        <div class="thread-pagination thread-pagination--top" data-component="pagination-controls" data-position="top" data-populate="pagination"></div>

                        <!-- Post list -->
                        <div class="post-list" data-component="post-list" data-populate="posts"></div>

                        <!-- Bottom pagination strip -->
                        <div class="thread-pagination thread-pagination--bottom" data-component="pagination-controls" data-position="bottom" data-populate="pagination"></div>

                        <!-- Reply form -->
                        <section class="reply-section" data-component="reply-form">
                            <h3 class="reply-section__title">Quick Reply</h3>
                            <form data-action="submit-reply">
                                <div class="reply-section__field">
                                    <label for="replyBody">Message:</label><br>
                                    <textarea id="replyBody" name="body" rows="6" cols="80"></textarea>
                                </div>
                                <div class="reply-section__controls">
                                    <button type="submit">Post Reply</button>
                                    <span class="reply-section__status" data-populate="reply-status" aria-live="polite"></span>
                                </div>
                            </form>
                        </section>
                    </section>
                </div>
            </div>
        </main>

        <footer class="site-footer">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav__list">
                    <li class="footer-nav__item"><a href="about.html">About</a></li>
                    <li class="footer-nav__item"><a href="help.html">Help / FAQ</a></li>
                    <li class="footer-nav__item"><a href="contact.html">Contact</a></li>
                    <li class="footer-nav__item"><a href="terms.html">Terms of Use</a></li>
                    <li class="footer-nav__item"><a href="privacy.html">Privacy Policy</a></li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span class="footer-year">2026</span> HYIP Programs Forum.</p>
        </footer>
    </div>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var pageState = {
            threadId: null,
            page: 1,
            pageSize: 20,
            sortDirection: 'asc',
            thread: null,
            posts: [],
            pagination: null
        };

        function getUrlParams() {
            var params = new URLSearchParams(window.location.search);
            var threadId = params.get('threadId');
            var page = parseInt(params.get('page'), 10);
            if (!page || page < 1) {
                page = 1;
            }
            var pageSize = parseInt(params.get('page_size'), 10);
            if (!pageSize || pageSize < 1) {
                pageSize = 20;
            }
            var sortDirection = params.get('sort_direction');
            if (sortDirection !== 'asc' && sortDirection !== 'desc') {
                sortDirection = 'asc';
            }
            return {
                threadId: threadId,
                page: page,
                pageSize: pageSize,
                sortDirection: sortDirection,
                hasSortParam: params.has('sort_direction'),
                hasPageSizeParam: params.has('page_size')
            };
        }

        function updateUrlParams(updates) {
            var params = new URLSearchParams(window.location.search);
            Object.keys(updates).forEach(function(key) {
                var value = updates[key];
                if (value === null || typeof value === 'undefined') {
                    params.delete(key);
                } else {
                    params.set(key, String(value));
                }
            });
            var newUrl = window.location.pathname + '?' + params.toString();
            window.history.replaceState(null, '', newUrl);
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) {
                return '';
            }
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDateTime(value) {
            if (!value) {
                return '';
            }
            try {
                var d = new Date(value);
                if (isNaN(d.getTime())) {
                    return String(value);
                }
                return d.toLocaleString();
            } catch (e) {
                return String(value);
            }
        }

        function renderThreadTitle(container, thread) {
            container.textContent = thread && thread.title ? thread.title : 'Forum Thread';
        }

        function renderThreadMeta(container, thread) {
            if (!thread) {
                container.textContent = '';
                return;
            }
            var parts = [];
            if (thread.author_username) {
                if (thread.author_profile_id) {
                    var authorLink = document.createElement('a');
                    authorLink.href = 'javascript:void(0)';
                    authorLink.textContent = thread.author_username;
                    authorLink.setAttribute('data-action', 'open-profile');
                    authorLink.setAttribute('data-profile-id', thread.author_profile_id);
                    container.innerHTML = '';
                    container.appendChild(document.createTextNode('Started by '));
                    container.appendChild(authorLink);
                } else {
                    parts.push('Started by ' + thread.author_username);
                }
            }
            if (thread.created_at) {
                parts.push('on ' + formatDateTime(thread.created_at));
            }
            if (typeof thread.reply_count === 'number') {
                parts.push('Replies: ' + thread.reply_count);
            }
            if (thread.is_locked) {
                parts.push('Status: Locked');
            } else {
                parts.push('Status: Open');
            }
            if (thread.last_post_at) {
                parts.push('Last post: ' + formatDateTime(thread.last_post_at));
            }
            if (parts.length) {
                if (container.innerHTML === '') {
                    container.textContent = parts.join(' | ');
                } else {
                    container.appendChild(document.createTextNode(' | ' + parts.join(' | ')));
                }
            }
        }

        function renderBreadcrumbs(categoryLinkEl, threadTitleEl, thread) {
            if (!thread) {
                threadTitleEl.textContent = '';
                categoryLinkEl.textContent = 'Unknown category';
                categoryLinkEl.removeAttribute('data-category-id');
                return;
            }
            threadTitleEl.textContent = thread.title || '';
            categoryLinkEl.textContent = 'Category';
            if (thread.category_id) {
                categoryLinkEl.setAttribute('data-category-id', thread.category_id);
            } else {
                categoryLinkEl.removeAttribute('data-category-id');
            }
        }

        function updateSubscriptionUI(message) {
            var indicator = document.querySelector('[data-component="subscription-status-indicator"]');
            var button = document.querySelector('[data-action="toggle-subscription"]');
            var baseText = '';
            if (pageState.thread && pageState.thread.is_subscribed) {
                baseText = 'Subscribed to this thread.';
            } else {
                baseText = 'Not subscribed to this thread.';
            }
            if (message) {
                baseText = baseText + ' ' + message;
            }
            if (indicator) {
                indicator.textContent = baseText;
            }
            if (button) {
                button.disabled = false;
                button.textContent = pageState.thread && pageState.thread.is_subscribed ? 'Unsubscribe' : 'Subscribe';
            }
        }

        function renderPostList(container, posts) {
            container.innerHTML = '';
            if (!posts || !posts.length) {
                var empty = document.createElement('p');
                empty.textContent = 'No posts in this thread yet.';
                container.appendChild(empty);
                return;
            }
            for (var i = 0; i < posts.length; i++) {
                var post = posts[i];
                var postWrapper = document.createElement('div');
                postWrapper.className = 'post';
                if (post.id) {
                    postWrapper.id = 'post-' + post.id;
                }

                var header = document.createElement('div');
                header.className = 'post-header';

                var numberSpan = document.createElement('span');
                numberSpan.className = 'post-number';
                numberSpan.textContent = '#' + (pageState.pagination && pageState.pagination.page_size ? ((pageState.pagination.page - 1) * pageState.pagination.page_size + i + 1) : (i + 1));
                header.appendChild(numberSpan);

                var authorSpan = document.createElement('span');
                authorSpan.className = 'post-author';
                authorSpan.appendChild(document.createTextNode(' '));
                if (post.author_profile_id) {
                    var authorLink = document.createElement('a');
                    authorLink.href = 'javascript:void(0)';
                    authorLink.textContent = post.author_username || 'Unknown';
                    authorLink.setAttribute('data-action', 'open-profile');
                    authorLink.setAttribute('data-profile-id', post.author_profile_id);
                    authorSpan.appendChild(authorLink);
                } else {
                    authorSpan.appendChild(document.createTextNode(post.author_username || 'Unknown'));
                }
                header.appendChild(authorSpan);

                var timeSpan = document.createElement('span');
                timeSpan.className = 'post-time';
                timeSpan.appendChild(document.createTextNode(' - '));
                var timeLink = document.createElement('a');
                timeLink.href = 'javascript:void(0)';
                timeLink.setAttribute('data-action', 'post-time');
                if (post.id) {
                    timeLink.setAttribute('data-post-id', post.id);
                }
                var timeText = formatDateTime(post.created_at);
                timeLink.textContent = timeText;
                timeSpan.appendChild(timeLink);
                header.appendChild(timeSpan);

                postWrapper.appendChild(header);

                var bodyDiv = document.createElement('div');
                bodyDiv.className = 'post-body';
                var safeBody = escapeHtml(post.body || '');
                safeBody = safeBody.replace(/\n/g, '<br>');
                bodyDiv.innerHTML = safeBody;
                postWrapper.appendChild(bodyDiv);

                var actionsDiv = document.createElement('div');
                actionsDiv.className = 'post-actions';
                var quoteLink = document.createElement('a');
                quoteLink.href = 'javascript:void(0)';
                quoteLink.textContent = 'Quote';
                quoteLink.setAttribute('data-action', 'quote-post');
                if (post.id) {
                    quoteLink.setAttribute('data-post-id', post.id);
                }
                actionsDiv.appendChild(quoteLink);
                postWrapper.appendChild(actionsDiv);

                container.appendChild(postWrapper);
            }
        }

        function renderPagination(container, pagination) {
            container.innerHTML = '';
            if (!pagination) {
                return;
            }
            var page = pagination.page || 1;
            var totalPages = pagination.total_pages || 1;

            var labelSpan = document.createElement('span');
            labelSpan.textContent = 'Page: ';
            container.appendChild(labelSpan);

            var prevSpan = document.createElement('span');
            if (page > 1) {
                var prevLink = document.createElement('a');
                prevLink.href = 'javascript:void(0)';
                prevLink.textContent = 'Previous';
                prevLink.setAttribute('data-action', 'go-page');
                prevLink.setAttribute('data-page', String(page - 1));
                prevSpan.appendChild(prevLink);
            } else {
                prevSpan.textContent = 'Previous';
            }
            container.appendChild(prevSpan);

            var space1 = document.createTextNode(' ');
            container.appendChild(space1);

            var maxPagesToShow = 20;
            var startPage = 1;
            var endPage = totalPages;
            if (totalPages > maxPagesToShow) {
                startPage = Math.max(1, page - 5);
                endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);
            }

            for (var p = startPage; p <= endPage; p++) {
                var pageSpan = document.createElement('span');
                if (p === page) {
                    pageSpan.textContent = ' ' + p + ' ';
                } else {
                    var pageLink = document.createElement('a');
                    pageLink.href = 'javascript:void(0)';
                    pageLink.textContent = String(p);
                    pageLink.setAttribute('data-action', 'go-page');
                    pageLink.setAttribute('data-page', String(p));
                    pageSpan.appendChild(document.createTextNode(' '));
                    pageSpan.appendChild(pageLink);
                    pageSpan.appendChild(document.createTextNode(' '));
                }
                container.appendChild(pageSpan);
            }

            var space2 = document.createTextNode(' ');
            container.appendChild(space2);

            var nextSpan = document.createElement('span');
            if (page < totalPages) {
                var nextLink = document.createElement('a');
                nextLink.href = 'javascript:void(0)';
                nextLink.textContent = 'Next';
                nextLink.setAttribute('data-action', 'go-page');
                nextLink.setAttribute('data-page', String(page + 1));
                nextSpan.appendChild(nextLink);
            } else {
                nextSpan.textContent = 'Next';
            }
            container.appendChild(nextSpan);

            var pageSizeLabel = document.createElement('span');
            pageSizeLabel.textContent = '  |  Posts per page:';
            container.appendChild(pageSizeLabel);

            var select = document.createElement('select');
            select.setAttribute('data-action', 'change-page-size');
            var sizes = [10, 20, 50];
            for (var i = 0; i < sizes.length; i++) {
                var opt = document.createElement('option');
                opt.value = String(sizes[i]);
                opt.textContent = String(sizes[i]);
                if (pagination.page_size === sizes[i]) {
                    opt.selected = true;
                }
                select.appendChild(opt);
            }
            container.appendChild(select);
        }

        function updateReplyFormLockState() {
            var section = document.querySelector('[data-component="reply-form"]');
            if (!section) {
                return;
            }
            var form = section.querySelector('form[data-action="submit-reply"]');
            var textarea = section.querySelector('textarea[name="body"]');
            var button = section.querySelector('button[type="submit"]');
            var statusSpan = section.querySelector('[data-populate="reply-status"]');
            if (!form || !textarea || !button || !statusSpan) {
                return;
            }
            if (pageState.thread && pageState.thread.is_locked) {
                textarea.disabled = true;
                button.disabled = true;
                statusSpan.textContent = 'Thread is locked. You cannot reply.';
            } else {
                textarea.disabled = false;
                button.disabled = false;
                statusSpan.textContent = '';
            }
        }

        function loadThreadView() {
            var errorContainer = document.querySelector('[data-populate="thread-error"]');
            var loaderSection = document.querySelector('[data-component="thread-data-loader"]');
            if (!pageState.threadId) {
                if (errorContainer) {
                    errorContainer.textContent = 'Missing threadId parameter. Unable to load thread.';
                }
                if (loaderSection) {
                    loaderSection.style.display = 'none';
                }
                return;
            }
            if (loaderSection) {
                loaderSection.style.display = '';
            }
            if (errorContainer) {
                errorContainer.textContent = '';
            }
            try {
                var result = WebsiteSDK.getForumThreadView(pageState.threadId, pageState.page, pageState.pageSize, pageState.sortDirection);
                if (!result || !result.thread) {
                    if (errorContainer) {
                        errorContainer.textContent = 'Thread could not be found or failed to load.';
                    }
                    if (loaderSection) {
                        loaderSection.style.display = 'none';
                    }
                    return;
                }
                pageState.thread = result.thread;
                pageState.posts = result.posts || [];
                pageState.pagination = result.pagination || { page: pageState.page, page_size: pageState.pageSize, total_items: 0, total_pages: 1 };

                var titleEl = document.querySelector('[data-populate="thread-title"]');
                var metaEl = document.querySelector('[data-populate="thread-meta"]');
                if (titleEl) {
                    renderThreadTitle(titleEl, pageState.thread);
                }
                if (metaEl) {
                    metaEl.innerHTML = '';
                    renderThreadMeta(metaEl, pageState.thread);
                }

                var breadcrumbCategoryLink = document.querySelector('[data-populate="breadcrumb-category"]');
                var breadcrumbThreadTitle = document.querySelector('[data-populate="breadcrumb-thread-title"]');
                if (breadcrumbCategoryLink && breadcrumbThreadTitle) {
                    renderBreadcrumbs(breadcrumbCategoryLink, breadcrumbThreadTitle, pageState.thread);
                }

                updateSubscriptionUI('');

                var sortSelect = document.getElementById('postSortSelect');
                if (sortSelect) {
                    sortSelect.value = pageState.sortDirection;
                }

                var postListContainer = document.querySelector('[data-populate="posts"][data-component="post-list"]');
                if (postListContainer) {
                    renderPostList(postListContainer, pageState.posts);
                }

                var paginationContainers = document.querySelectorAll('[data-component="pagination-controls"][data-populate="pagination"]');
                paginationContainers.forEach(function(el) {
                    renderPagination(el, pageState.pagination);
                });

                updateReplyFormLockState();
            } catch (e) {
                if (errorContainer) {
                    errorContainer.textContent = 'An error occurred while loading the thread.';
                }
                if (loaderSection) {
                    loaderSection.style.display = 'none';
                }
            }
        }

        function handleSearchSubmit(event) {
            event.preventDefault();
            var form = event.target;
            var queryInput = form.querySelector('input[name="query"]');
            var typeSelect = form.querySelector('select[name="type_filter"]');
            var query = queryInput && queryInput.value ? queryInput.value.trim() : '';
            if (!query) {
                return;
            }
            var typeFilter = typeSelect && typeSelect.value ? typeSelect.value : 'all';
            try {
                WebsiteSDK.searchSite(query, typeFilter, 1, 20);
            } catch (e) {
            }
            var url = 'search_results.html?query=' + encodeURIComponent(query) + '&type_filter=' + encodeURIComponent(typeFilter) + '&page=1&page_size=20';
            window.location.href = url;
        }

        function handleReplySubmit(event) {
            event.preventDefault();
            var form = event.target;
            var textarea = form.querySelector('textarea[name="body"]');
            var statusSpan = document.querySelector('[data-populate="reply-status"]');
            if (!textarea) {
                return;
            }
            if (!pageState.thread || pageState.thread.is_locked) {
                if (statusSpan) {
                    statusSpan.textContent = 'Thread is locked. You cannot reply.';
                }
                return;
            }
            var body = textarea.value.trim();
            if (!body) {
                if (statusSpan) {
                    statusSpan.textContent = 'Message body is required.';
                }
                return;
            }
            try {
                var response = WebsiteSDK.replyToForumThread(pageState.threadId, body);
                if (!response || !response.success) {
                    if (statusSpan) {
                        statusSpan.textContent = (response && response.message) ? response.message : 'Failed to post reply.';
                    }
                    return;
                }
                textarea.value = '';
                if (statusSpan) {
                    statusSpan.textContent = 'Reply posted.';
                }
                loadThreadView();
            } catch (e) {
                if (statusSpan) {
                    statusSpan.textContent = 'An error occurred while posting your reply.';
                }
            }
        }

        function handleClickAction(event) {
            var target = event.target;
            var actionEl = target.closest('[data-action]');
            if (!actionEl) {
                return;
            }
            var action = actionEl.getAttribute('data-action');
            if (!action) {
                return;
            }
            if (action === 'toggle-subscription') {
                event.preventDefault();
                if (!pageState.thread) {
                    return;
                }
                var desired = !pageState.thread.is_subscribed;
                try {
                    var res = WebsiteSDK.toggleThreadSubscription(pageState.threadId, desired);
                    if (res && res.success) {
                        pageState.thread.is_subscribed = !!res.is_subscribed;
                        updateSubscriptionUI(res.message || '');
                    } else {
                        updateSubscriptionUI(res && res.message ? res.message : 'Subscription change failed.');
                    }
                } catch (e) {
                    updateSubscriptionUI('An error occurred while updating subscription.');
                }
            } else if (action === 'scroll-to-reply') {
                event.preventDefault();
                var replySection = document.querySelector('[data-component="reply-form"]');
                if (replySection) {
                    replySection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    var textarea = replySection.querySelector('textarea[name="body"]');
                    if (textarea && !textarea.disabled) {
                        textarea.focus();
                    }
                }
            } else if (action === 'go-category') {
                event.preventDefault();
                var categoryId = actionEl.getAttribute('data-category-id');
                if (!categoryId && pageState.thread && pageState.thread.category_id) {
                    categoryId = pageState.thread.category_id;
                }
                if (categoryId) {
                    window.location.href = 'forum_category.html?categoryId=' + encodeURIComponent(categoryId);
                }
            } else if (action === 'open-profile') {
                event.preventDefault();
                var profileId = actionEl.getAttribute('data-profile-id');
                if (profileId) {
                    window.location.href = 'user_profile.html?profileId=' + encodeURIComponent(profileId);
                }
            } else if (action === 'go-page') {
                event.preventDefault();
                var pageAttr = actionEl.getAttribute('data-page');
                var targetPage = parseInt(pageAttr, 10);
                if (!targetPage || targetPage < 1) {
                    return;
                }
                if (pageState.pagination && pageState.pagination.total_pages && targetPage > pageState.pagination.total_pages) {
                    targetPage = pageState.pagination.total_pages;
                }
                pageState.page = targetPage;
                updateUrlParams({ page: targetPage });
                loadThreadView();
            } else if (action === 'quote-post') {
                event.preventDefault();
                var postId = actionEl.getAttribute('data-post-id');
                if (!postId) {
                    return;
                }
                var post = null;
                for (var i = 0; i < pageState.posts.length; i++) {
                    if (String(pageState.posts[i].id) === String(postId)) {
                        post = pageState.posts[i];
                        break;
                    }
                }
                if (!post) {
                    return;
                }
                var replySection2 = document.querySelector('[data-component="reply-form"]');
                if (!replySection2) {
                    return;
                }
                var textarea2 = replySection2.querySelector('textarea[name="body"]');
                if (!textarea2 || textarea2.disabled) {
                    return;
                }
                var quoted = '[quote=' + (post.author_username || 'user') + ']\n' + (post.body || '') + '\n[/quote]\n\n';
                if (textarea2.value && textarea2.value.trim().length > 0) {
                    textarea2.value = textarea2.value + '\n' + quoted;
                } else {
                    textarea2.value = quoted;
                }
                replySection2.scrollIntoView({ behavior: 'smooth', block: 'start' });
                textarea2.focus();
            } else if (action === 'post-time') {
                event.preventDefault();
                var postId2 = actionEl.getAttribute('data-post-id');
                if (postId2) {
                    window.location.hash = 'post-' + postId2;
                }
            }
        }

        function handleChangeAction(event) {
            var target = event.target;
            var actionEl = target.closest('[data-action]');
            if (!actionEl) {
                return;
            }
            var action = actionEl.getAttribute('data-action');
            if (!action) {
                return;
            }
            if (action === 'change-sort') {
                var newSort = actionEl.value === 'desc' ? 'desc' : 'asc';
                if (newSort === pageState.sortDirection) {
                    return;
                }
                pageState.sortDirection = newSort;
                pageState.page = 1;
                updateUrlParams({ sort_direction: newSort, page: 1 });
                loadThreadView();
            } else if (action === 'change-page-size') {
                var newSize = parseInt(actionEl.value, 10);
                if (!newSize || newSize < 1) {
                    return;
                }
                pageState.pageSize = newSize;
                pageState.page = 1;
                updateUrlParams({ page_size: newSize, page: 1 });
                loadThreadView();
            }
        }

        var searchForm = document.querySelector('form[data-action="submit-reply"]');
        var globalSearchForm = document.querySelector('form[data-action="submit-search"]');

        if (globalSearchForm) {
            globalSearchForm.addEventListener('submit', handleSearchSubmit);
        }
        if (searchForm) {
            searchForm.addEventListener('submit', handleReplySubmit);
        }

        document.addEventListener('click', handleClickAction);
        document.addEventListener('change', handleChangeAction);

        var initial = getUrlParams();
        pageState.threadId = initial.threadId;
        pageState.page = initial.page;
        pageState.pageSize = initial.pageSize;
        pageState.sortDirection = initial.sortDirection;

        loadThreadView();
    });
    </script>
</body>
</html>
