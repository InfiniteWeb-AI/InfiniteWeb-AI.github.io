<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYIP Programs Forum - HYIP Listings</title>
    
    <link rel="stylesheet" href="programs.css">
</head>
<body>
    <div id="page">
        <header class="site-header">
            <div class="site-header__title-row">
                <h1 class="site-title">Full version: <a href="index.html">Hyip'S</a></h1>
            </div>

            <nav class="site-header__nav-bar" aria-label="Main navigation">
                <ul class="main-nav">
                    <li class="main-nav__item"><a href="index.html">Home</a></li>
                    <li class="main-nav__item"><a href="programs.html?view=all_programs">HYIP Listings</a></li>
                    <li class="main-nav__item"><a href="programs.html?view=problematic_programs">Problematic Programs</a></li>
                    <li class="main-nav__item"><a href="forum.html">Forum</a></li>
                    <li class="main-nav__item"><a href="dashboard.html">Dashboard</a></li>
                    <li class="main-nav__item"><a href="saved_programs.html">Saved Programs</a></li>
                    <li class="main-nav__item"><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
        </header>

        <main id="content" class="site-content" role="main">
            <div class="content-box">
                <div class="listing-page" data-component="page-init-controller" data-populate="programs-page">
                    <form class="global-search-bar" data-component="global-search-bar" data-action="submit-search">
                        <label for="globalSearchInput">Search:</label>
                        <input type="text" id="globalSearchInput" name="query" size="40">
                        <input type="submit" value="Search">
                    </form>

                    <div class="scam-alerts-banner" data-component="scam-alerts-banner"></div>

                    <nav class="breadcrumb-nav" aria-label="Breadcrumb" data-component="breadcrumb-nav">
                        <span><a href="index.html" data-action="breadcrumb-home">Home</a> &gt; HYIP Listings</span>
                    </nav>

                    <div class="view-toggle-tabs" data-component="view-toggle-tabs">
                        <!-- Tabs will be rendered via JS -->
                    </div>

                    <div class="filter-summary-bar" data-component="filter-summary-bar" data-populate="filter-summary">
                        <!-- Active filters summary -->
                    </div>

                    <div class="filter-sidebar" data-component="filter-sidebar" data-populate="filter-sidebar">
                        <!-- Filter controls -->
                    </div>

                    <div class="sort-and-pagination-bar sort-and-pagination-bar--top" data-component="sort-and-pagination-bar" data-populate="sort-and-pagination-top">
                        <!-- Top sort + pagination -->
                    </div>

                    <div class="programs-list" data-component="programs-list" data-populate="programs-list">
                        <!-- Programs list with saved-status-summary -->
                    </div>

                    <div class="sort-and-pagination-bar sort-and-pagination-bar--bottom" data-component="sort-and-pagination-bar" data-populate="sort-and-pagination-bottom">
                        <!-- Bottom sort + pagination -->
                    </div>
                </div>
            </div>
        </main>

        <footer class="site-footer">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav__list">
                    <li class="footer-nav__item"><a href="about.html">About</a></li>
                    <li class="footer-nav__item"><a href="help.html">Help / FAQ</a></li>
                    <li class="footer-nav__item"><a href="contact.html">Contact</a></li>
                    <li class="footer-nav__item"><a href="terms.html">Terms of Use</a></li>
                    <li class="footer-nav__item"><a href="privacy.html">Privacy Policy</a></li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span class="footer-year">2026</span> HYIP Programs Forum.</p>
        </footer>
    </div>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var root = document.querySelector('[data-populate="programs-page"]');
        if (!root || typeof WebsiteSDK === 'undefined') {
            return;
        }

        var programsPageState = null;

        function escapeHtml(value) {
            if (value === null || value === undefined) {
                return '';
            }
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseUrlState(params) {
            var view = params.get('view');
            if (view !== 'all_programs' && view !== 'problematic_programs') {
                view = 'all_programs';
            }

            var sortBy = params.get('sort_by');
            var allowedSort = ['rating_desc', 'rating_asc', 'roi_desc', 'roi_asc', 'start_date_newest', 'start_date_oldest', 'running_days_asc', 'running_days_desc'];
            if (!sortBy || allowedSort.indexOf(sortBy) === -1) {
                sortBy = 'rating_desc';
            }

            var page = parseInt(params.get('page'), 10);
            if (isNaN(page) || page < 1) {
                page = 1;
            }

            return {
                view: view,
                sortBy: sortBy,
                page: page
            };
        }

        function getNumberParam(params, name) {
            var raw = params.get(name);
            if (raw === null || raw === '') {
                return undefined;
            }
            var num = parseFloat(raw);
            if (isNaN(num)) {
                return undefined;
            }
            return num;
        }

        function buildFiltersFromParams(params) {
            var filters = {};

            var statusStr = params.get('status');
            if (statusStr) {
                var statusArr = statusStr.split(',').filter(function(v) { return v; });
                if (statusArr.length) {
                    filters.status_filter = statusArr;
                }
            }

            var paymentStr = params.get('payment_methods');
            if (paymentStr) {
                var payArr = paymentStr.split(',').filter(function(v) { return v; });
                if (payArr.length) {
                    filters.payment_method_filter = payArr;
                }
            }

            var minRoi = getNumberParam(params, 'min_daily_roi_percent');
            if (typeof minRoi === 'number') {
                filters.min_daily_roi_percent = minRoi;
            }
            var maxRoi = getNumberParam(params, 'max_daily_roi_percent');
            if (typeof maxRoi === 'number') {
                filters.max_daily_roi_percent = maxRoi;
            }

            var minDep = getNumberParam(params, 'min_min_deposit_usd');
            if (typeof minDep === 'number') {
                filters.min_min_deposit_usd = minDep;
            }
            var maxDep = getNumberParam(params, 'max_min_deposit_usd');
            if (typeof maxDep === 'number') {
                filters.max_min_deposit_usd = maxDep;
            }

            var minRun = getNumberParam(params, 'min_running_days');
            if (typeof minRun === 'number') {
                filters.min_running_days = minRun;
            }
            var maxRun = getNumberParam(params, 'max_running_days');
            if (typeof maxRun === 'number') {
                filters.max_running_days = maxRun;
            }

            var startFrom = params.get('start_date_from');
            if (startFrom) {
                filters.start_date_from = startFrom;
            }
            var startTo = params.get('start_date_to');
            if (startTo) {
                filters.start_date_to = startTo;
            }

            var minPayout = getNumberParam(params, 'min_payout_rating_value');
            if (typeof minPayout === 'number') {
                filters.min_payout_rating_value = minPayout;
            }

            return filters;
        }

        function renderViewTabs(container, view) {
            if (!container) {
                return;
            }
            var allActive = view === 'all_programs';
            var probActive = view === 'problematic_programs';
            var html = '';
            html += '<span>';
            if (allActive) {
                html += '<strong>All Programs</strong>';
            } else {
                html += '<a href="javascript:void(0)" data-action="change-view" data-view="all_programs">All Programs</a>';
            }
            html += ' | ';
            if (probActive) {
                html += '<strong>Problematic Programs</strong>';
            } else {
                html += '<a href="javascript:void(0)" data-action="change-view" data-view="problematic_programs">Problematic Programs</a>';
            }
            html += '</span>';
            container.innerHTML = html;
        }

        function renderScamAlertsBanner(container, view, subscribed, message) {
            if (!container) {
                return;
            }
            if (view !== 'problematic_programs') {
                container.innerHTML = '';
                return;
            }
            var isSubscribed = !!subscribed;
            var html = '';
            html += '<div class="scam-alerts-banner__inner">';
            html += 'Scam alerts for problematic programs: ';
            if (isSubscribed) {
                html += '<button type="button" data-action="toggle-scam-alerts" data-subscribe="false">Unsubscribe from in-site scam alerts</button>';
            } else {
                html += '<button type="button" data-action="toggle-scam-alerts" data-subscribe="true">Subscribe to in-site scam alerts</button>';
            }
            if (message) {
                html += ' <span class="scam-alerts-banner__message">' + escapeHtml(message) + '</span>';
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function renderFilterSidebar(container, filterOptions, filtersApplied, view) {
            if (!container) {
                return;
            }
            var fs = filtersApplied || {};
            var statusApplied = fs.status_filter || [];
            var paymentApplied = fs.payment_method_filter || [];

            var minDailyRoi = (fs.min_daily_roi_percent !== undefined && fs.min_daily_roi_percent !== null) ? fs.min_daily_roi_percent : '';
            var maxDailyRoi = (fs.max_daily_roi_percent !== undefined && fs.max_daily_roi_percent !== null) ? fs.max_daily_roi_percent : '';

            var minDep = (fs.min_min_deposit_usd !== undefined && fs.min_min_deposit_usd !== null) ? fs.min_min_deposit_usd : '';
            var maxDep = (fs.max_min_deposit_usd !== undefined && fs.max_min_deposit_usd !== null) ? fs.max_min_deposit_usd : '';

            var minRun = (fs.min_running_days !== undefined && fs.min_running_days !== null) ? fs.min_running_days : '';
            var maxRun = (fs.max_running_days !== undefined && fs.max_running_days !== null) ? fs.max_running_days : '';

            var startFrom = fs.start_date_from ? fs.start_date_from : '';
            var startTo = fs.start_date_to ? fs.start_date_to : '';

            var minPayout = (fs.min_payout_rating_value !== undefined && fs.min_payout_rating_value !== null) ? fs.min_payout_rating_value : '';

            var statusOptions = (filterOptions && filterOptions.status_options) ? filterOptions.status_options : [];
            var paymentOptions = (filterOptions && filterOptions.payment_method_options) ? filterOptions.payment_method_options : [];

            var html = '';
            html += '<div class="filter-sidebar__inner">';
            html += '<div class="filter-sidebar__header"><strong>Filters</strong></div>';

            html += '<div class="filter-row">';
            html += '<span class="filter-label">Status:</span>';
            html += '<span class="filter-inputs">';
            for (var i = 0; i < statusOptions.length; i++) {
                var so = statusOptions[i];
                var checked = statusApplied.indexOf(so.value) !== -1;
                html += '<label><input type="checkbox" data-filter-group="status" value="' + escapeHtml(so.value) + '"' + (checked ? ' checked' : '') + '> ' + escapeHtml(so.label || so.value) + '</label> ';
            }
            html += '<button type="button" data-action="clear-filter" data-filter-key="status">Clear</button>';
            html += '</span>';
            html += '</div>';

            html += '<div class="filter-row">';
            html += '<span class="filter-label">Payment methods:</span>';
            html += '<span class="filter-inputs">';
            for (var j = 0; j < paymentOptions.length; j++) {
                var po = paymentOptions[j];
                var pChecked = paymentApplied.indexOf(po.value) !== -1;
                html += '<label><input type="checkbox" data-filter-group="payment_methods" value="' + escapeHtml(po.value) + '"' + (pChecked ? ' checked' : '') + '> ' + escapeHtml(po.label || po.value) + '</label> ';
            }
            html += '<button type="button" data-action="clear-filter" data-filter-key="payment_methods">Clear</button>';
            html += '</span>';
            html += '</div>';

            html += '<div class="filter-row">';
            html += '<span class="filter-label">Daily ROI %:</span>';
            html += '<span class="filter-inputs">';
            html += 'from <input type="number" step="0.01" size="6" data-filter-param="min_daily_roi_percent" value="' + escapeHtml(minDailyRoi) + '"> ';
            html += 'to <input type="number" step="0.01" size="6" data-filter-param="max_daily_roi_percent" value="' + escapeHtml(maxDailyRoi) + '"> ';
            html += '<button type="button" data-action="clear-filter" data-filter-key="daily_roi">Clear</button>';
            html += '</span>';
            html += '</div>';

            html += '<div class="filter-row">';
            html += '<span class="filter-label">Min deposit (USD):</span>';
            html += '<span class="filter-inputs">';
            html += 'from <input type="number" step="1" size="6" data-filter-param="min_min_deposit_usd" value="' + escapeHtml(minDep) + '"> ';
            html += 'to <input type="number" step="1" size="6" data-filter-param="max_min_deposit_usd" value="' + escapeHtml(maxDep) + '"> ';
            html += '<button type="button" data-action="clear-filter" data-filter-key="min_deposit">Clear</button>';
            html += '</span>';
            html += '</div>';

            html += '<div class="filter-row">';
            html += '<span class="filter-label">Running days:</span>';
            html += '<span class="filter-inputs">';
            html += 'from <input type="number" step="1" size="6" data-filter-param="min_running_days" value="' + escapeHtml(minRun) + '"> ';
            html += 'to <input type="number" step="1" size="6" data-filter-param="max_running_days" value="' + escapeHtml(maxRun) + '"> ';
            html += '<button type="button" data-action="clear-filter" data-filter-key="running_days">Clear</button>';
            html += '</span>';
            html += '</div>';

            html += '<div class="filter-row">';
            html += '<span class="filter-label">Start date:</span>';
            html += '<span class="filter-inputs">';
            html += 'from <input type="date" data-filter-param="start_date_from" value="' + escapeHtml(startFrom) + '"> ';
            html += 'to <input type="date" data-filter-param="start_date_to" value="' + escapeHtml(startTo) + '"> ';
            html += '<button type="button" data-action="clear-filter" data-filter-key="start_date">Clear</button>';
            html += '</span>';
            html += '</div>';

            html += '<div class="filter-row">';
            html += '<span class="filter-label">Min payout rating:</span>';
            html += '<span class="filter-inputs">';
            html += '<input type="number" step="0.1" size="4" data-filter-param="min_payout_rating_value" value="' + escapeHtml(minPayout) + '"> ';
            html += '<button type="button" data-action="clear-filter" data-filter-key="min_payout_rating_value">Clear</button>';
            html += '</span>';
            html += '</div>';

            html += '<div class="filter-row">';
            html += '<span class="filter-label"></span>';
            html += '<span class="filter-inputs">';
            html += '<button type="button" data-action="clear-all-filters">Clear all filters</button>';
            html += '</span>';
            html += '</div>';

            html += '</div>';
            container.innerHTML = html;
        }

        function renderFilterSummary(container, filtersApplied, view) {
            if (!container) {
                return;
            }
            var fs = filtersApplied || {};
            var parts = [];

            if (fs.status_filter && fs.status_filter.length) {
                parts.push({
                    label: 'Status: ' + fs.status_filter.join(', '),
                    key: 'status'
                });
            }
            if (fs.payment_method_filter && fs.payment_method_filter.length) {
                parts.push({
                    label: 'Payment: ' + fs.payment_method_filter.join(', '),
                    key: 'payment_methods'
                });
            }
            if (fs.min_daily_roi_percent !== undefined || fs.max_daily_roi_percent !== undefined) {
                var roiText = 'Daily ROI:';
                if (fs.min_daily_roi_percent !== undefined && fs.max_daily_roi_percent !== undefined) {
                    roiText += ' ' + fs.min_daily_roi_percent + '% - ' + fs.max_daily_roi_percent + '%';
                } else if (fs.min_daily_roi_percent !== undefined) {
                    roiText += ' from ' + fs.min_daily_roi_percent + '%';
                } else if (fs.max_daily_roi_percent !== undefined) {
                    roiText += ' up to ' + fs.max_daily_roi_percent + '%';
                }
                parts.push({
                    label: roiText,
                    key: 'daily_roi'
                });
            }
            if (fs.min_min_deposit_usd !== undefined || fs.max_min_deposit_usd !== undefined) {
                var depText = 'Min deposit (USD):';
                if (fs.min_min_deposit_usd !== undefined && fs.max_min_deposit_usd !== undefined) {
                    depText += ' ' + fs.min_min_deposit_usd + ' - ' + fs.max_min_deposit_usd;
                } else if (fs.min_min_deposit_usd !== undefined) {
                    depText += ' from ' + fs.min_min_deposit_usd;
                } else if (fs.max_min_deposit_usd !== undefined) {
                    depText += ' up to ' + fs.max_min_deposit_usd;
                }
                parts.push({
                    label: depText,
                    key: 'min_deposit'
                });
            }
            if (fs.min_running_days !== undefined || fs.max_running_days !== undefined) {
                var runText = 'Running days:';
                if (fs.min_running_days !== undefined && fs.max_running_days !== undefined) {
                    runText += ' ' + fs.min_running_days + ' - ' + fs.max_running_days;
                } else if (fs.min_running_days !== undefined) {
                    runText += ' from ' + fs.min_running_days;
                } else if (fs.max_running_days !== undefined) {
                    runText += ' up to ' + fs.max_running_days;
                }
                parts.push({
                    label: runText,
                    key: 'running_days'
                });
            }
            if (fs.start_date_from || fs.start_date_to) {
                var dateText = 'Start date:';
                if (fs.start_date_from && fs.start_date_to) {
                    dateText += ' ' + fs.start_date_from + ' - ' + fs.start_date_to;
                } else if (fs.start_date_from) {
                    dateText += ' from ' + fs.start_date_from;
                } else if (fs.start_date_to) {
                    dateText += ' up to ' + fs.start_date_to;
                }
                parts.push({
                    label: dateText,
                    key: 'start_date'
                });
            }
            if (fs.min_payout_rating_value !== undefined && fs.min_payout_rating_value !== null) {
                parts.push({
                    label: 'Min payout rating: ' + fs.min_payout_rating_value,
                    key: 'min_payout_rating_value'
                });
            }

            var html = '';
            if (!parts.length) {
                html += '<span>No active filters.</span>';
            } else {
                html += '<span>Active filters: ';
                for (var i = 0; i < parts.length; i++) {
                    var part = parts[i];
                    html += '<span class="filter-chip">' + escapeHtml(part.label) + ' <button type="button" data-action="clear-filter" data-filter-key="' + escapeHtml(part.key) + '">x</button></span>';
                    if (i !== parts.length - 1) {
                        html += ' ';
                    }
                }
                html += ' <button type="button" data-action="clear-all-filters">Clear all</button>';
                html += '</span>';
            }
            container.innerHTML = html;
        }

        function renderSortAndPagination(container, filterOptions, pagination, sortBy) {
            if (!container) {
                return;
            }
            var sortOptions = (filterOptions && filterOptions.sort_options) ? filterOptions.sort_options : [];
            var page = pagination && pagination.page ? pagination.page : 1;
            var totalPages = pagination && pagination.total_pages ? pagination.total_pages : 1;

            var html = '';
            html += '<div class="sort-pagination">';
            html += '<span class="sort-controls">Sort by: ';
            html += '<select data-action="change-sort-by">';
            for (var i = 0; i < sortOptions.length; i++) {
                var so = sortOptions[i];
                var selected = so.value === sortBy ? ' selected' : '';
                html += '<option value="' + escapeHtml(so.value) + '"' + selected + '>' + escapeHtml(so.label || so.value) + '</option>';
            }
            html += '</select>';
            html += '</span>';

            html += '<span class="pagination-controls">';
            if (totalPages > 1) {
                if (page > 1) {
                    html += '<a href="javascript:void(0)" data-action="change-page" data-page="' + (page - 1) + '">Prev</a> ';
                } else {
                    html += '<span>Prev</span> ';
                }

                var startPage = page - 4;
                if (startPage < 1) {
                    startPage = 1;
                }
                var endPage = page + 5;
                if (endPage > totalPages) {
                    endPage = totalPages;
                }
                for (var p = startPage; p <= endPage; p++) {
                    if (p === page) {
                        html += '<strong>' + p + '</strong> ';
                    } else {
                        html += '<a href="javascript:void(0)" data-action="change-page" data-page="' + p + '">' + p + '</a> ';
                    }
                }

                if (page < totalPages) {
                    html += '<a href="javascript:void(0)" data-action="change-page" data-page="' + (page + 1) + '">Next</a>';
                } else {
                    html += '<span>Next</span>';
                }
            }
            html += '</span>';

            html += '</div>';
            container.innerHTML = html;
        }

        function renderProgramsList(container, listing) {
            if (!container) {
                return;
            }
            var items = (listing && listing.items) ? listing.items : [];
            var html = '';

            var watchCount = 0;
            var bookmarkCount = 0;
            var blacklistCount = 0;
            for (var i = 0; i < items.length; i++) {
                var it = items[i];
                if (it.is_saved_watchlist) {
                    watchCount++;
                }
                if (it.is_saved_bookmark) {
                    bookmarkCount++;
                }
                if (it.is_saved_blacklist) {
                    blacklistCount++;
                }
            }

            html += '<div class="saved-status-summary" data-component="saved-status-summary">';
            if (items.length === 0) {
                html += '<span>No programs in this list.</span>';
            } else {
                html += '<span class="saved-status-summary__text">Saved on this page: watchlist ' + watchCount + ', bookmarks ' + bookmarkCount + ', blacklist ' + blacklistCount + '. ';
                html += '<a href="saved_programs.html" data-action="view-saved-programs">View Saved Programs</a></span>';
            }
            html += '</div>';

            if (!items.length) {
                html += '<p>No programs found for current view and filters.</p>';
                container.innerHTML = html;
                return;
            }

            html += '<ol class="programs-list__items">';
            for (var idx = 0; idx < items.length; idx++) {
                var row = items[idx];
                var program = row.program;
                var statusLabel = row.status_label || program.status || '';
                var roiDisplay = row.daily_roi_display || (program.daily_roi_percent !== undefined ? (program.daily_roi_percent + '% daily') : '');
                var minDepDisplay = row.min_deposit_display || (program.min_deposit_usd !== undefined ? ('$' + program.min_deposit_usd) : '');
                var payoutDisplay = row.payout_rating_display || (program.payout_rating_value !== undefined ? (program.payout_rating_value + '/5') : 'n/a');
                var runningDays = program.running_days !== undefined ? program.running_days : '';
                var commentCount = program.comment_count !== undefined ? program.comment_count : 0;

                var savedLabels = [];
                if (row.is_saved_watchlist) {
                    savedLabels.push('watchlist');
                }
                if (row.is_saved_bookmark) {
                    savedLabels.push('bookmark');
                }
                if (row.is_saved_blacklist) {
                    savedLabels.push('blacklist');
                }

                html += '<li class="program-card" data-component="program-card" data-program-id="' + escapeHtml(program.id) + '">';
                html += '<a href="program_detail.html?id=' + encodeURIComponent(program.id) + '" data-action="open-program-detail">' + escapeHtml(program.name) + '</a>';
                html += ' - ' + escapeHtml(statusLabel);
                if (roiDisplay) {
                    html += ' - ROI: ' + escapeHtml(roiDisplay);
                }
                if (minDepDisplay) {
                    html += ' - Min deposit: ' + escapeHtml(minDepDisplay);
                }
                if (payoutDisplay) {
                    html += ' - Payout: ' + escapeHtml(payoutDisplay);
                }
                if (runningDays !== '') {
                    html += ' <span class="program-meta">(Running: ' + escapeHtml(runningDays) + ' days, Comments: ' + escapeHtml(commentCount) + ')</span>';
                }

                if (savedLabels.length) {
                    html += ' <span class="program-saved-tags">[' + escapeHtml(savedLabels.join(', ')) + ']</span>';
                }

                html += ' <span class="program-save-controls">';
                html += '<a href="javascript:void(0)" data-action="save-program" data-save-type="watchlist" data-program-id="' + escapeHtml(program.id) + '">Watchlist</a> ';
                html += '<a href="javascript:void(0)" data-action="save-program" data-save-type="bookmark" data-program-id="' + escapeHtml(program.id) + '">Bookmark</a> ';
                html += '<a href="javascript:void(0)" data-action="save-program" data-save-type="blacklist" data-program-id="' + escapeHtml(program.id) + '">Blacklist</a> ';
                if (savedLabels.length) {
                    html += '<a href="javascript:void(0)" data-action="unsave-program" data-program-id="' + escapeHtml(program.id) + '">Unsave</a>';
                }
                html += '</span>';

                html += '</li>';
            }
            html += '</ol>';

            container.innerHTML = html;
        }

        function loadProgramsPage() {
            var params = new URLSearchParams(window.location.search);
            var stateFromUrl = parseUrlState(params);
            var filterOptions = WebsiteSDK.getProgramListingFilterOptions();
            var filters = buildFiltersFromParams(params);
            var listing = WebsiteSDK.getProgramsList(stateFromUrl.view, filters, stateFromUrl.sortBy, stateFromUrl.page, 20);

            var pagination = listing.pagination || { page: stateFromUrl.page, total_pages: 1, total_items: 0, page_size: 20 };

            programsPageState = {
                root: root,
                filterOptions: filterOptions,
                view: listing.view || stateFromUrl.view,
                sortBy: stateFromUrl.sortBy,
                page: pagination.page,
                pagination: pagination,
                filters: filters,
                filtersApplied: listing.filters_applied || {},
                listing: listing,
                scamAlertsSubscribed: (programsPageState && typeof programsPageState.scamAlertsSubscribed === 'boolean') ? programsPageState.scamAlertsSubscribed : null,
                scamAlertsMessage: programsPageState ? (programsPageState.scamAlertsMessage || '') : ''
            };

            var viewTabsContainer = root.querySelector('[data-component="view-toggle-tabs"]');
            renderViewTabs(viewTabsContainer, programsPageState.view);

            var scamBannerContainer = root.querySelector('[data-component="scam-alerts-banner"]');
            renderScamAlertsBanner(scamBannerContainer, programsPageState.view, programsPageState.scamAlertsSubscribed, programsPageState.scamAlertsMessage);

            var filterSummaryContainer = root.querySelector('[data-populate="filter-summary"]');
            renderFilterSummary(filterSummaryContainer, programsPageState.filtersApplied, programsPageState.view);

            var filterSidebarContainer = root.querySelector('[data-populate="filter-sidebar"]');
            renderFilterSidebar(filterSidebarContainer, programsPageState.filterOptions, programsPageState.filtersApplied, programsPageState.view);

            var sortTopContainer = root.querySelector('[data-populate="sort-and-pagination-top"]');
            var sortBottomContainer = root.querySelector('[data-populate="sort-and-pagination-bottom"]');
            renderSortAndPagination(sortTopContainer, programsPageState.filterOptions, programsPageState.pagination, programsPageState.sortBy);
            renderSortAndPagination(sortBottomContainer, programsPageState.filterOptions, programsPageState.pagination, programsPageState.sortBy);

            var programsListContainer = root.querySelector('[data-populate="programs-list"]');
            renderProgramsList(programsListContainer, programsPageState.listing);
        }

        function updateUrlAndReload(updater) {
            var params = new URLSearchParams(window.location.search);
            updater(params);
            params.set('page', '1');
            window.location.search = params.toString();
        }

        document.addEventListener('click', function(event) {
            var target = event.target;
            var actionElement = target.closest('[data-action]');
            if (!actionElement) {
                return;
            }
            var action = actionElement.getAttribute('data-action');

            if (action === 'change-view') {
                event.preventDefault();
                var view = actionElement.getAttribute('data-view');
                if (view === 'all_programs' || view === 'problematic_programs') {
                    updateUrlAndReload(function(params) {
                        params.set('view', view);
                    });
                }
            } else if (action === 'clear-filter') {
                event.preventDefault();
                var key = actionElement.getAttribute('data-filter-key');
                updateUrlAndReload(function(params) {
                    if (key === 'status') {
                        params.delete('status');
                    } else if (key === 'payment_methods') {
                        params.delete('payment_methods');
                    } else if (key === 'daily_roi') {
                        params.delete('min_daily_roi_percent');
                        params.delete('max_daily_roi_percent');
                    } else if (key === 'min_deposit') {
                        params.delete('min_min_deposit_usd');
                        params.delete('max_min_deposit_usd');
                    } else if (key === 'running_days') {
                        params.delete('min_running_days');
                        params.delete('max_running_days');
                    } else if (key === 'start_date') {
                        params.delete('start_date_from');
                        params.delete('start_date_to');
                    } else if (key === 'min_payout_rating_value') {
                        params.delete('min_payout_rating_value');
                    }
                });
            } else if (action === 'clear-all-filters') {
                event.preventDefault();
                updateUrlAndReload(function(params) {
                    params.delete('status');
                    params.delete('payment_methods');
                    params.delete('min_daily_roi_percent');
                    params.delete('max_daily_roi_percent');
                    params.delete('min_min_deposit_usd');
                    params.delete('max_min_deposit_usd');
                    params.delete('min_running_days');
                    params.delete('max_running_days');
                    params.delete('start_date_from');
                    params.delete('start_date_to');
                    params.delete('min_payout_rating_value');
                });
            } else if (action === 'change-page') {
                event.preventDefault();
                var pageStr = actionElement.getAttribute('data-page');
                var page = parseInt(pageStr, 10);
                if (!isNaN(page) && page > 0) {
                    var params = new URLSearchParams(window.location.search);
                    params.set('page', String(page));
                    window.location.search = params.toString();
                }
            } else if (action === 'save-program') {
                event.preventDefault();
                var programId = actionElement.getAttribute('data-program-id');
                var saveType = actionElement.getAttribute('data-save-type');
                if (programId && (saveType === 'watchlist' || saveType === 'bookmark' || saveType === 'blacklist')) {
                    var result = WebsiteSDK.saveProgram(programId, saveType, '');
                    if (result && result.success) {
                        loadProgramsPage();
                    }
                }
            } else if (action === 'unsave-program') {
                event.preventDefault();
                var pId = actionElement.getAttribute('data-program-id');
                if (pId) {
                    var r = WebsiteSDK.removeSavedProgram(pId);
                    if (r && r.success) {
                        loadProgramsPage();
                    }
                }
            } else if (action === 'view-saved-programs') {
                // let the normal link navigate (saved_programs.html)
            } else if (action === 'toggle-scam-alerts') {
                event.preventDefault();
                var subscribeAttr = actionElement.getAttribute('data-subscribe');
                var subscribe = subscribeAttr === 'true';
                var resp = WebsiteSDK.toggleScamAlertsSubscription(subscribe);
                if (resp && resp.success) {
                    if (!programsPageState) {
                        programsPageState = {};
                    }
                    programsPageState.scamAlertsSubscribed = !!resp.notifications_scam_alerts_in_site;
                    programsPageState.scamAlertsMessage = resp.message || '';
                    var scamBannerContainer = root.querySelector('[data-component="scam-alerts-banner"]');
                    renderScamAlertsBanner(scamBannerContainer, programsPageState.view || 'problematic_programs', programsPageState.scamAlertsSubscribed, programsPageState.scamAlertsMessage);
                }
            }
        });

        document.addEventListener('change', function(event) {
            var target = event.target;
            if (!target) {
                return;
            }

            var action = target.getAttribute('data-action');
            if (action === 'change-sort-by') {
                var newSort = target.value;
                var params = new URLSearchParams(window.location.search);
                if (newSort) {
                    params.set('sort_by', newSort);
                } else {
                    params.delete('sort_by');
                }
                params.set('page', '1');
                window.location.search = params.toString();
                return;
            }

            var filterGroup = target.getAttribute('data-filter-group');
            if (filterGroup === 'status' || filterGroup === 'payment_methods') {
                var params = new URLSearchParams(window.location.search);
                var selector = 'input[data-filter-group="' + filterGroup + '"]:checked';
                var checked = root.querySelectorAll(selector);
                var values = [];
                for (var i = 0; i < checked.length; i++) {
                    values.push(checked[i].value);
                }
                if (filterGroup === 'status') {
                    if (values.length) {
                        params.set('status', values.join(','));
                    } else {
                        params.delete('status');
                    }
                } else if (filterGroup === 'payment_methods') {
                    if (values.length) {
                        params.set('payment_methods', values.join(','));
                    } else {
                        params.delete('payment_methods');
                    }
                }
                params.set('page', '1');
                window.location.search = params.toString();
                return;
            }

            var filterParam = target.getAttribute('data-filter-param');
            if (filterParam) {
                var params2 = new URLSearchParams(window.location.search);
                var val = target.value;
                if (val === null || val === '') {
                    params2.delete(filterParam);
                } else {
                    params2.set(filterParam, val);
                }
                params2.set('page', '1');
                window.location.search = params2.toString();
            }
        });

        document.addEventListener('submit', function(event) {
            var form = event.target;
            if (!form || !form.getAttribute) {
                return;
            }
            var action = form.getAttribute('data-action');
            if (action === 'submit-search') {
                event.preventDefault();
                var input = form.querySelector('input[name="query"]');
                var query = input ? input.value : '';
                if (query && query.trim() !== '') {
                    WebsiteSDK.searchSite(query.trim(), 'all', 1, 20);
                }
            }
        });

        loadProgramsPage();
    });
    </script>
</body>
</html>
