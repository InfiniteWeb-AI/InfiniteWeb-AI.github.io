<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYIP Programs Forum - Contact</title>
    
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div id="page">
        <header class="site-header">
            <div class="site-header__title-row">
                <h1 class="site-title">Full version: <a href="index.html">Hyip'S</a></h1>
            </div>

            <nav class="site-header__nav-bar" aria-label="Main navigation">
                <ul class="main-nav">
                    <li class="main-nav__item"><a href="index.html">Home</a></li>
                    <li class="main-nav__item"><a href="programs.html?view=all_programs">HYIP Listings</a></li>
                    <li class="main-nav__item"><a href="programs.html?view=problematic_programs">Problematic Programs</a></li>
                    <li class="main-nav__item"><a href="forum.html">Forum</a></li>
                    <li class="main-nav__item"><a href="dashboard.html">Dashboard</a></li>
                    <li class="main-nav__item"><a href="saved_programs.html">Saved Programs</a></li>
                    <li class="main-nav__item"><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
        </header>

        <main id="content" class="site-content" role="main">
            <div class="content-box">
                <div class="utility-header" style="margin: 0 16px 8px 16px; display: flex; align-items: center; justify-content: space-between;">
                    <div class="utility-header__left">
                        <h2 class="page-title" style="margin: 0; font-size: 1.2em; font-weight: bold;">Contact</h2>
                    </div>
                    <div class="utility-header__right">
                        <form class="header-search-form" action="javascript:void(0)" method="get" data-component="header-search-autocomplete" style="white-space: nowrap; position: relative;">
                            <label for="headerSearchInput" class="visually-hidden">Search site</label>
                            <input type="text" id="headerSearchInput" name="q" size="24" autocomplete="off" data-action="search-query-change">
                            <input type="submit" value="Search" data-action="header-search-submit">
                            <div class="header-search-suggestions" data-populate="header-search-suggestions" hidden style="position: absolute; top: 100%; left: 0; right: 0; border: 1px solid #C0C0C0; background: #FFFFFF; z-index: 10; max-height: 220px; overflow-y: auto;"></div>
                        </form>
                    </div>
                </div>

                <nav class="breadcrumb" aria-label="Breadcrumb" style="margin: 0 16px 12px 16px; font-size: 0.9em;">
                    <span><a href="index.html">Home</a> &gt; Contact</span>
                </nav>

                <section class="contact-main" aria-labelledby="contact-section-title" style="margin: 0 16px 16px 16px;">
                    <div class="contact-main-box" style="border: 1px solid #C0C0C0; padding: 10px;">
                        <div id="contact-section-title" class="visually-hidden">Contact support</div>

                        <div class="contact-static" data-component="contact-static-content" data-populate="static-contact-content" style="margin-bottom: 8px;">
                            <!-- Static contact content will be injected here -->
                        </div>

                        <form id="contactForm" class="contact-form" data-component="contact-form" novalidate>
                            <div class="form-feedback" aria-live="polite" style="margin-bottom: 8px; font-size: 0.9em;"></div>
                            <table class="contact-form-table" role="presentation" style="width: 100%; border-collapse: collapse;">
                                <tbody>
                                    <tr>
                                        <td style="width: 28%; padding: 2px 4px; text-align: right; vertical-align: top;">
                                            <label for="contactName">Name:</label>
                                        </td>
                                        <td style="width: 72%; padding: 2px 4px;">
                                            <input type="text" id="contactName" name="name" required style="width: 98%;" data-action="contact-field-change">
                                            <div class="field-error" data-field-error="name" style="color: #b00000; font-size: 0.85em;"></div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td style="padding: 2px 4px; text-align: right; vertical-align: top;">
                                            <label for="contactEmail">Email:</label>
                                        </td>
                                        <td style="padding: 2px 4px;">
                                            <input type="email" id="contactEmail" name="email" required style="width: 98%;" data-action="contact-field-change">
                                            <div class="field-error" data-field-error="email" style="color: #b00000; font-size: 0.85em;"></div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td style="padding: 2px 4px; text-align: right; vertical-align: top;">
                                            <label for="contactSubject">Subject:</label>
                                        </td>
                                        <td style="padding: 2px 4px;">
                                            <input type="text" id="contactSubject" name="subject" required style="width: 98%;" data-action="contact-field-change">
                                            <div class="field-error" data-field-error="subject" style="color: #b00000; font-size: 0.85em;"></div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td style="padding: 2px 4px; text-align: right; vertical-align: top;">
                                            <label for="contactMessage">Message:</label>
                                        </td>
                                        <td style="padding: 2px 4px;">
                                            <textarea id="contactMessage" name="message" rows="6" required style="width: 98%;" data-action="contact-field-change"></textarea>
                                            <div class="field-error" data-field-error="message" style="color: #b00000; font-size: 0.85em;"></div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td style="padding: 4px 4px;">&nbsp;</td>
                                        <td style="padding: 4px 4px;">
                                            <input type="submit" value="Send Message" data-action="contact-form-submit">
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </form>
                    </div>
                </section>
            </div>
        </main>

        <footer class="site-footer">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav__list">
                    <li class="footer-nav__item"><a href="about.html">About</a></li>
                    <li class="footer-nav__item"><a href="help.html">Help / FAQ</a></li>
                    <li class="footer-nav__item"><a href="contact.html">Contact</a></li>
                    <li class="footer-nav__item"><a href="terms.html">Terms of Use</a></li>
                    <li class="footer-nav__item"><a href="privacy.html">Privacy Policy</a></li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span class="footer-year">2026</span> HYIP Programs Forum.</p>
        </footer>
    </div>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var presetSubject = urlParams.get('subject') || '';

        // Populate static content components
        var populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function(element) {
            var dataType = element.dataset.populate;
            if (dataType === 'static-contact-content') {
                initStaticContactContent(element);
            } else if (dataType === 'header-search-suggestions') {
                element.innerHTML = '';
                element.hidden = true;
            }
        });

        initContactForm(presetSubject);
        initHeaderSearch();
    });

    function initStaticContactContent(container) {
        try {
            var content = WebsiteSDK.getStaticPageContent('contact');
            var titleText = content && content.title ? content.title : 'Contact support';
            var bodyHtml = content && content.body_html ? content.body_html : '<p>Use this form to contact the site administrators.</p>';

            container.innerHTML = '';
            var heading = document.createElement('h3');
            heading.textContent = titleText;
            container.appendChild(heading);

            var bodyDiv = document.createElement('div');
            bodyDiv.className = 'contact-static__body';
            bodyDiv.innerHTML = bodyHtml;
            container.appendChild(bodyDiv);
        } catch (e) {
            container.innerHTML = '';
            var errorP = document.createElement('p');
            errorP.textContent = 'Unable to load contact information. Please try again later.';
            container.appendChild(errorP);
        }
    }

    function initContactForm(presetSubject) {
        var form = document.querySelector('form[data-component="contact-form"]');
        if (!form) {
            return;
        }

        var nameInput = form.querySelector('#contactName');
        var emailInput = form.querySelector('#contactEmail');
        var subjectInput = form.querySelector('#contactSubject');
        var messageInput = form.querySelector('#contactMessage');
        var feedbackEl = form.querySelector('.form-feedback');

        if (presetSubject && subjectInput && !subjectInput.value) {
            subjectInput.value = presetSubject;
        }

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            if (!nameInput || !emailInput || !subjectInput || !messageInput) {
                return;
            }

            clearFieldError(form, 'name');
            clearFieldError(form, 'email');
            clearFieldError(form, 'subject');
            clearFieldError(form, 'message');

            var hasError = false;
            var name = nameInput.value.trim();
            var email = emailInput.value.trim();
            var subject = subjectInput.value.trim();
            var message = messageInput.value.trim();

            if (!name) {
                setFieldError(form, 'name', 'Name is required.');
                hasError = true;
            }

            if (!email) {
                setFieldError(form, 'email', 'Email is required.');
                hasError = true;
            } else if (!isValidEmail(email)) {
                setFieldError(form, 'email', 'Please enter a valid email address.');
                hasError = true;
            }

            if (!subject) {
                setFieldError(form, 'subject', 'Subject is required.');
                hasError = true;
            }

            if (!message) {
                setFieldError(form, 'message', 'Message is required.');
                hasError = true;
            }

            if (hasError) {
                if (feedbackEl) {
                    feedbackEl.textContent = 'Please correct the highlighted fields.';
                    feedbackEl.className = 'form-feedback form-feedback--error';
                }
                return;
            }

            var submitButton = form.querySelector('input[type="submit"], button[type="submit"]');
            if (submitButton) {
                submitButton.disabled = true;
            }

            var response;
            try {
                response = WebsiteSDK.submitContactForm(name, email, subject, message);
            } catch (e) {
                if (feedbackEl) {
                    feedbackEl.textContent = 'An unexpected error occurred. Please try again later.';
                    feedbackEl.className = 'form-feedback form-feedback--error';
                }
                if (submitButton) {
                    submitButton.disabled = false;
                }
                return;
            }

            if (response && response.success) {
                if (feedbackEl) {
                    feedbackEl.textContent = response.message || 'Your message has been sent.';
                    feedbackEl.className = 'form-feedback form-feedback--success';
                }
                form.reset();
                if (presetSubject && subjectInput) {
                    subjectInput.value = presetSubject;
                }
            } else {
                if (feedbackEl) {
                    var messageText = response && response.message ? response.message : 'Could not send message. Please try again.';
                    feedbackEl.textContent = messageText;
                    feedbackEl.className = 'form-feedback form-feedback--error';
                }
            }

            if (submitButton) {
                submitButton.disabled = false;
            }
        });

        form.addEventListener('input', function(event) {
            var target = event.target;
            if (target && target.name) {
                clearFieldError(form, target.name);
            }
        });
    }

    function setFieldError(form, fieldName, message) {
        var errorEl = form.querySelector('[data-field-error="' + fieldName + '"]');
        if (errorEl) {
            errorEl.textContent = message;
        }
        var input = form.querySelector('[name="' + fieldName + '"]');
        if (input) {
            input.classList.add('input-error');
        }
    }

    function clearFieldError(form, fieldName) {
        var errorEl = form.querySelector('[data-field-error="' + fieldName + '"]');
        if (errorEl) {
            errorEl.textContent = '';
        }
        var input = form.querySelector('[name="' + fieldName + '"]');
        if (input) {
            input.classList.remove('input-error');
        }
    }

    function isValidEmail(email) {
        var pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return pattern.test(email);
    }

    function initHeaderSearch() {
        var form = document.querySelector('form[data-component="header-search-autocomplete"]');
        if (!form) {
            return;
        }

        var input = form.querySelector('[data-action="search-query-change"]');
        var suggestionsContainer = form.querySelector('[data-populate="header-search-suggestions"]');

        if (!input || !suggestionsContainer) {
            return;
        }

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            var query = input.value.trim();
            if (!query) {
                return;
            }
            window.location.href = 'search.html?q=' + encodeURIComponent(query);
        });

        input.addEventListener('input', function(event) {
            onSearchQueryChange(event, suggestionsContainer);
        });

        suggestionsContainer.addEventListener('click', function(event) {
            var target = event.target;
            if (!target) {
                return;
            }
            if (target.matches('[data-action="search-suggestion-click"]') || target.closest('[data-action="search-suggestion-click"]')) {
                var button = target.matches('[data-action="search-suggestion-click"]') ? target : target.closest('[data-action="search-suggestion-click"]');
                onSearchSuggestionClick(button);
            }
        });
    }

    function onSearchQueryChange(event, suggestionsContainer) {
        var input = event.target;
        var query = input.value.trim();

        if (!suggestionsContainer) {
            return;
        }

        if (query.length < 2) {
            suggestionsContainer.innerHTML = '';
            suggestionsContainer.hidden = true;
            return;
        }

        var result;
        try {
            result = WebsiteSDK.searchSite(query, 'all', 1, 5);
        } catch (e) {
            suggestionsContainer.innerHTML = '<div class="search-error">Error while searching. Please try again.</div>';
            suggestionsContainer.hidden = false;
            return;
        }

        renderSearchSuggestions(suggestionsContainer, result);
    }

    function renderSearchSuggestions(container, searchResult) {
        container.innerHTML = '';

        var hasAny = false;
        var list = document.createElement('ul');
        list.style.listStyleType = 'none';
        list.style.margin = '0';
        list.style.padding = '2px';

        if (searchResult && Array.isArray(searchResult.program_results)) {
            searchResult.program_results.forEach(function(program, index) {
                if (index >= 3) {
                    return;
                }
                hasAny = true;
                var item = document.createElement('li');
                item.style.margin = '2px 0';

                var button = document.createElement('button');
                button.type = 'button';
                button.textContent = '[Program] ' + program.name;
                button.setAttribute('data-action', 'search-suggestion-click');
                button.dataset.suggestionType = 'program';
                button.dataset.programId = program.id;
                button.style.width = '100%';
                button.style.textAlign = 'left';

                item.appendChild(button);
                list.appendChild(item);
            });
        }

        if (searchResult && Array.isArray(searchResult.forum_thread_results)) {
            searchResult.forum_thread_results.forEach(function(thread, index) {
                if (index >= 3) {
                    return;
                }
                hasAny = true;
                var item = document.createElement('li');
                item.style.margin = '2px 0';

                var button = document.createElement('button');
                button.type = 'button';
                button.textContent = '[Thread] ' + thread.title;
                button.setAttribute('data-action', 'search-suggestion-click');
                button.dataset.suggestionType = 'forum_thread';
                button.dataset.threadId = thread.id;
                button.style.width = '100%';
                button.style.textAlign = 'left';

                item.appendChild(button);
                list.appendChild(item);
            });
        }

        if (!hasAny) {
            var noItem = document.createElement('div');
            noItem.textContent = 'No quick matches. Press Enter for full search.';
            noItem.className = 'search-no-results';
            container.appendChild(noItem);
        } else {
            container.appendChild(list);
        }

        container.hidden = false;
    }

    function onSearchSuggestionClick(button) {
        if (!button) {
            return;
        }
        var suggestionType = button.dataset.suggestionType;
        if (suggestionType === 'program') {
            var programId = button.dataset.programId;
            if (programId) {
                window.location.href = 'program.html?id=' + encodeURIComponent(programId);
            }
        } else if (suggestionType === 'forum_thread') {
            var threadId = button.dataset.threadId;
            if (threadId) {
                window.location.href = 'thread.html?id=' + encodeURIComponent(threadId);
            }
        }
    }
    </script>
</body>
</html>
