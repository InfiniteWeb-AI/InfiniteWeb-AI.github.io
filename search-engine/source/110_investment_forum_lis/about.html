<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYIP Programs Forum</title>
    
    <link rel="stylesheet" href="about.css">
    <script src="business_logic.js"></script>
</head>
<body>
    <div id="page">
        <header class="site-header">
            <div class="site-header__title-row">
                <h1 class="site-title">Full version: <a href="index.html">Hyip'S</a></h1>
            </div>

            <nav class="site-header__nav-bar" aria-label="Main navigation">
                <ul class="main-nav">
                    <li class="main-nav__item"><a href="index.html">Home</a></li>
                    <li class="main-nav__item"><a href="programs.html?view=all_programs">HYIP Listings</a></li>
                    <li class="main-nav__item"><a href="programs.html?view=problematic_programs">Problematic Programs</a></li>
                    <li class="main-nav__item"><a href="forum.html">Forum</a></li>
                    <li class="main-nav__item"><a href="dashboard.html">Dashboard</a></li>
                    <li class="main-nav__item"><a href="saved_programs.html">Saved Programs</a></li>
                    <li class="main-nav__item"><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
        </header>

        <main id="content" class="site-content" role="main">
            <div class="content-box" data-component="about-page-shell">
                <h2 class="page-heading" data-populate="static-page-title"></h2>

                <form class="about-search-form" data-component="about-search-form">
                    <label for="about-search-input">Search:</label>
                    <input id="about-search-input" name="q" type="text" size="40" />
                    <label for="about-search-type">in</label>
                    <select id="about-search-type" name="type">
                        <option value="all">Programs &amp; forum</option>
                        <option value="programs">Programs only</option>
                        <option value="forum">Forum threads only</option>
                    </select>
                    <input type="submit" value="Search" />
                    <button type="button" data-action="clear-search">Clear</button>
                </form>

                <div class="about-section-nav" data-component="about-section-navigation" data-populate="section-navigation"></div>

                <div class="about-main-card">
                    <div class="about-static-content" data-component="static-page-loader" data-populate="static-page-content"></div>

                    <hr />

                    <section class="about-search-results" data-component="about-search-results-preview" data-populate="search-results"></section>
                </div>
            </div>
        </main>

        <footer class="site-footer">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav__list">
                    <li class="footer-nav__item"><a href="about.html">About</a></li>
                    <li class="footer-nav__item"><a href="help.html">Help / FAQ</a></li>
                    <li class="footer-nav__item"><a href="contact.html">Contact</a></li>
                    <li class="footer-nav__item"><a href="terms.html">Terms of Use</a></li>
                    <li class="footer-nav__item"><a href="privacy.html">Privacy Policy</a></li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span class="footer-year">2026</span> HYIP Programs Forum.</p>
        </footer>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const state = {
            slug: null,
            staticPageData: null,
            sections: [],
            staticContentContainer: null
        };

        function deriveSlugFromPath() {
            const path = window.location.pathname || '';
            const parts = path.split('/').filter(Boolean);
            const last = parts.length ? parts[parts.length - 1] : 'about.html';
            const slug = last.replace(/\.html?$/i, '');
            return slug || 'about';
        }

        function getUrlParams() {
            return new URLSearchParams(window.location.search);
        }

        function applyUrlParams(params) {
            const query = params.toString();
            const newUrl = window.location.pathname + (query ? '?' + query : '') + window.location.hash;
            window.history.pushState({}, '', newUrl);
            handleUrlChange();
        }

        function renderStaticTitle(container, pageData) {
            const title = pageData && pageData.title ? pageData.title : 'About';
            container.textContent = title;
        }

        function renderStaticBody(container, pageData) {
            const bodyHtml = pageData && pageData.body_html ? pageData.body_html : '<p>About content is not available.</p>';
            container.innerHTML = bodyHtml;
        }

        function extractSectionsFromContent(container) {
            const headings = container.querySelectorAll('h2, h3');
            const sections = [];
            const usedIds = {};
            headings.forEach(function(heading, index) {
                let id = heading.getAttribute('id');
                if (!id) {
                    const base = (heading.textContent || '')
                        .toLowerCase()
                        .trim()
                        .replace(/[^a-z0-9]+/g, '-')
                        .replace(/^-+|-+$/g, '') || ('section-' + (index + 1));
                    id = base;
                    if (usedIds[id]) {
                        let suffix = 2;
                        while (usedIds[id + '-' + suffix]) {
                            suffix++;
                        }
                        id = id + '-' + suffix;
                    }
                    heading.id = id;
                }
                usedIds[id] = true;
                sections.push({ id: id, label: (heading.textContent || '').trim() });
            });
            return sections;
        }

        function renderSectionNavigation(container, sections, activeId) {
            container.innerHTML = '';
            if (!sections || !sections.length) {
                return;
            }
            const prefix = document.createTextNode('Sections: ');
            container.appendChild(prefix);
            sections.forEach(function(section, index) {
                if (index > 0) {
                    container.appendChild(document.createTextNode(' | '));
                }
                if (activeId && section.id === activeId) {
                    const strong = document.createElement('strong');
                    strong.textContent = section.label;
                    container.appendChild(strong);
                } else {
                    const link = document.createElement('a');
                    link.href = 'javascript:void(0)';
                    link.dataset.action = 'about-section-link';
                    link.dataset.sectionId = section.id;
                    link.textContent = section.label;
                    container.appendChild(link);
                }
            });
        }

        function scrollToSection(container, sectionId) {
            if (!container || !sectionId) {
                return;
            }
            try {
                const target = container.querySelector('#' + CSS.escape(sectionId));
                if (target) {
                    target.scrollIntoView({ block: 'start', behavior: 'smooth' });
                }
            } catch (e) {
                const targetFallback = container.querySelector('#' + sectionId);
                if (targetFallback) {
                    targetFallback.scrollIntoView({ block: 'start', behavior: 'smooth' });
                }
            }
        }

        function initStaticPage(params) {
            const slug = deriveSlugFromPath();
            if (state.slug === slug && state.staticPageData) {
                return;
            }
            state.slug = slug;
            let pageData = null;
            try {
                pageData = WebsiteSDK.getStaticPageContent(slug);
            } catch (e) {
                console.error('Error loading static page content:', e);
            }
            if (!pageData) {
                pageData = { page_slug: slug, title: 'About', body_html: '<p>Unable to load About content.</p>' };
            }
            state.staticPageData = pageData;

            const titleEl = document.querySelector('[data-populate="static-page-title"]');
            if (titleEl) {
                renderStaticTitle(titleEl, pageData);
            }

            const bodyEl = document.querySelector('[data-populate="static-page-content"]');
            if (bodyEl) {
                state.staticContentContainer = bodyEl;
                renderStaticBody(bodyEl, pageData);
                state.sections = extractSectionsFromContent(bodyEl);
            }

            const navEl = document.querySelector('[data-populate="section-navigation"]');
            if (navEl) {
                const sectionId = params.get('section');
                renderSectionNavigation(navEl, state.sections, sectionId);
            }
        }

        function updateSectionFromParams(params) {
            const sectionId = params.get('section');
            const navEl = document.querySelector('[data-populate="section-navigation"]');
            if (navEl) {
                renderSectionNavigation(navEl, state.sections, sectionId);
            }
            if (sectionId && state.staticContentContainer) {
                scrollToSection(state.staticContentContainer, sectionId);
            }
        }

        function syncSearchForm(params) {
            const searchForm = document.querySelector('form[data-component="about-search-form"]');
            if (!searchForm) {
                return;
            }
            const input = searchForm.querySelector('input[name="q"]');
            const typeSelect = searchForm.querySelector('select[name="type"]');
            const qParam = params.get('q') || '';
            const typeParam = params.get('type') || 'all';
            if (input) {
                input.value = qParam;
            }
            if (typeSelect) {
                const options = Array.prototype.slice.call(typeSelect.options || []);
                const hasMatch = options.some(function(opt) { return opt.value === typeParam; });
                typeSelect.value = hasMatch ? typeParam : 'all';
            }
        }

        function renderSearchResults(container, searchResponse, meta) {
            container.innerHTML = '';

            if (!meta || !meta.query) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';

            const heading = document.createElement('h3');
            heading.textContent = 'Search results preview';
            container.appendChild(heading);

            const summary = document.createElement('p');
            summary.className = 'search-results__summary';
            summary.textContent = 'Showing results for "' + meta.query + '" (page ' + meta.page + ')';
            container.appendChild(summary);

            const programResults = searchResponse && Array.isArray(searchResponse.program_results)
                ? searchResponse.program_results
                : [];
            const forumResults = searchResponse && Array.isArray(searchResponse.forum_thread_results)
                ? searchResponse.forum_thread_results
                : [];

            if (!programResults.length && !forumResults.length) {
                const empty = document.createElement('p');
                empty.textContent = 'No results found.';
                container.appendChild(empty);
                return;
            }

            if (programResults.length) {
                const progHeading = document.createElement('h4');
                progHeading.textContent = 'Programs';
                container.appendChild(progHeading);

                const ol = document.createElement('ol');
                programResults.forEach(function(program) {
                    const li = document.createElement('li');

                    const link = document.createElement('a');
                    link.href = 'javascript:void(0)';
                    link.dataset.action = 'open-program';
                    if (program && typeof program.id === 'string') {
                        link.dataset.programId = program.id;
                    }
                    if (program && typeof program.slug === 'string' && program.slug) {
                        link.dataset.programSlug = program.slug;
                    }
                    link.textContent = program && program.name ? program.name : 'Unnamed program';
                    li.appendChild(link);

                    const metaSpan = document.createElement('span');
                    metaSpan.className = 'result-meta';
                    const status = program && program.status ? program.status : 'unknown';
                    const roi = program && typeof program.daily_roi_percent === 'number'
                        ? program.daily_roi_percent.toFixed(2) + '%'
                        : 'n/a';
                    const comments = program && typeof program.comment_count === 'number'
                        ? program.comment_count
                        : 0;
                    metaSpan.textContent = ' (status: ' + status + ', daily ROI: ' + roi + ', comments: ' + comments + ')';
                    li.appendChild(document.createTextNode(' '));
                    li.appendChild(metaSpan);

                    ol.appendChild(li);
                });
                container.appendChild(ol);
            }

            if (forumResults.length) {
                const forumHeading = document.createElement('h4');
                forumHeading.textContent = 'Forum threads';
                container.appendChild(forumHeading);

                const ol = document.createElement('ol');
                forumResults.forEach(function(thread) {
                    const li = document.createElement('li');

                    const prefix = thread && thread.prefix && thread.prefix !== 'none'
                        ? '[' + thread.prefix + '] '
                        : '';

                    const link = document.createElement('a');
                    link.href = 'javascript:void(0)';
                    link.dataset.action = 'open-thread';
                    if (thread && typeof thread.id === 'string') {
                        link.dataset.threadId = thread.id;
                    }
                    link.textContent = prefix + (thread && thread.title ? thread.title : 'Untitled thread');
                    li.appendChild(link);

                    const metaSpan = document.createElement('span');
                    metaSpan.className = 'result-meta';
                    const replies = thread && typeof thread.reply_count === 'number'
                        ? thread.reply_count
                        : 0;
                    let lastUpdatedText = 'n/a';
                    if (thread && thread.last_post_at) {
                        try {
                            const d = new Date(thread.last_post_at);
                            if (!isNaN(d.getTime())) {
                                lastUpdatedText = d.toLocaleDateString();
                            }
                        } catch (e) {
                            lastUpdatedText = 'n/a';
                        }
                    }
                    metaSpan.textContent = ' (replies: ' + replies + ', last updated: ' + lastUpdatedText + ')';
                    li.appendChild(document.createTextNode(' '));
                    li.appendChild(metaSpan);

                    ol.appendChild(li);
                });
                container.appendChild(ol);
            }

            const totals = meta.totals || { totalProgramResults: 0, totalForumResults: 0 };
            const totalPrograms = typeof totals.totalProgramResults === 'number' ? totals.totalProgramResults : 0;
            const totalForum = typeof totals.totalForumResults === 'number' ? totals.totalForumResults : 0;

            let combinedTotal;
            if (meta.typeFilter === 'programs') {
                combinedTotal = totalPrograms;
            } else if (meta.typeFilter === 'forum') {
                combinedTotal = totalForum;
            } else {
                combinedTotal = totalPrograms + totalForum;
            }

            if (!combinedTotal || !meta.pageSize) {
                return;
            }

            const totalPages = Math.max(1, Math.ceil(combinedTotal / meta.pageSize));
            if (totalPages <= 1) {
                return;
            }

            const pagination = document.createElement('div');
            pagination.className = 'search-results__pagination';

            const pageLabel = document.createElement('span');
            pageLabel.textContent = 'Page: ';
            pagination.appendChild(pageLabel);

            if (meta.page > 1) {
                const prev = document.createElement('a');
                prev.href = 'javascript:void(0)';
                prev.dataset.action = 'change-search-page';
                prev.dataset.page = String(meta.page - 1);
                prev.textContent = '< Prev';
                pagination.appendChild(prev);
                pagination.appendChild(document.createTextNode(' '));
            }

            for (let p = 1; p <= totalPages && p <= 5; p++) {
                if (p > 1) {
                    pagination.appendChild(document.createTextNode(' '));
                }
                if (p === meta.page) {
                    const strong = document.createElement('strong');
                    strong.textContent = String(p);
                    pagination.appendChild(strong);
                } else {
                    const link = document.createElement('a');
                    link.href = 'javascript:void(0)';
                    link.dataset.action = 'change-search-page';
                    link.dataset.page = String(p);
                    link.textContent = String(p);
                    pagination.appendChild(link);
                }
            }

            if (meta.page < totalPages) {
                pagination.appendChild(document.createTextNode(' '));
                const next = document.createElement('a');
                next.href = 'javascript:void(0)';
                next.dataset.action = 'change-search-page';
                next.dataset.page = String(meta.page + 1);
                next.textContent = 'Next >';
                pagination.appendChild(next);
            }

            container.appendChild(pagination);
        }

        function syncSearchResults(params) {
            const container = document.querySelector('[data-populate="search-results"]');
            if (!container) {
                return;
            }
            const q = (params.get('q') || '').trim();
            const type = params.get('type') || 'all';
            const page = parseInt(params.get('page') || '1', 10) || 1;
            const pageSize = parseInt(params.get('page_size') || '10', 10) || 10;

            if (!q) {
                renderSearchResults(container, null, { query: '', typeFilter: type, page: 1, pageSize: pageSize, totals: null });
                return;
            }

            let response = null;
            try {
                response = WebsiteSDK.searchSite(q, type, page, pageSize);
            } catch (e) {
                console.error('Error running searchSite:', e);
                const meta = { query: q, typeFilter: type, page: page, pageSize: pageSize, totals: null };
                container.innerHTML = '';
                container.style.display = 'block';
                const heading = document.createElement('h3');
                heading.textContent = 'Search results preview';
                container.appendChild(heading);
                const err = document.createElement('p');
                err.textContent = 'Error loading search results.';
                container.appendChild(err);
                return;
            }

            const totals = {
                totalProgramResults: response && typeof response.total_program_results === 'number' ? response.total_program_results : 0,
                totalForumResults: response && typeof response.total_forum_thread_results === 'number' ? response.total_forum_thread_results : 0
            };
            const meta = { query: q, typeFilter: type, page: page, pageSize: pageSize, totals: totals };
            renderSearchResults(container, response, meta);
        }

        function handleUrlChange() {
            const params = getUrlParams();
            initStaticPage(params);
            updateSectionFromParams(params);
            syncSearchForm(params);
            syncSearchResults(params);
        }

        function initSearchFormHandlers() {
            const searchForm = document.querySelector('form[data-component="about-search-form"]');
            if (!searchForm) {
                return;
            }

            searchForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(searchForm);
                const q = (formData.get('q') || '').toString().trim();
                const type = (formData.get('type') || 'all').toString();
                const params = getUrlParams();

                if (!q) {
                    params.delete('q');
                    params.delete('type');
                    params.delete('page');
                    params.delete('page_size');
                } else {
                    params.set('q', q);
                    params.set('type', type);
                    params.set('page', '1');
                    if (!params.get('page_size')) {
                        params.set('page_size', '10');
                    }
                }

                applyUrlParams(params);
            });

            const typeSelect = searchForm.querySelector('select[name="type"]');
            if (typeSelect) {
                typeSelect.addEventListener('change', function() {
                    const params = getUrlParams();
                    const newType = typeSelect.value || 'all';
                    params.set('type', newType);
                    params.set('page', '1');
                    applyUrlParams(params);
                });
            }

            const clearBtn = searchForm.querySelector('[data-action="clear-search"]');
            if (clearBtn) {
                clearBtn.addEventListener('click', function() {
                    const params = getUrlParams();
                    params.delete('q');
                    params.delete('type');
                    params.delete('page');
                    params.delete('page_size');
                    applyUrlParams(params);
                });
            }
        }

        document.addEventListener('click', function(event) {
            const target = event.target;
            if (!target) {
                return;
            }

            const sectionLink = target.closest('[data-action="about-section-link"]');
            if (sectionLink) {
                event.preventDefault();
                const sectionId = sectionLink.dataset.sectionId || '';
                const params = getUrlParams();
                if (sectionId) {
                    params.set('section', sectionId);
                } else {
                    params.delete('section');
                }
                applyUrlParams(params);
                return;
            }

            const programLink = target.closest('[data-action="open-program"]');
            if (programLink) {
                event.preventDefault();
                const programId = programLink.dataset.programId || '';
                const programSlug = programLink.dataset.programSlug || '';
                let href = 'program.html';
                const navParams = [];
                if (programId) {
                    navParams.push('id=' + encodeURIComponent(programId));
                }
                if (programSlug) {
                    navParams.push('slug=' + encodeURIComponent(programSlug));
                }
                if (navParams.length) {
                    href += '?' + navParams.join('&');
                }
                window.location.href = href;
                return;
            }

            const threadLink = target.closest('[data-action="open-thread"]');
            if (threadLink) {
                event.preventDefault();
                const threadId = threadLink.dataset.threadId || '';
                let href = 'thread.html';
                if (threadId) {
                    href += '?id=' + encodeURIComponent(threadId);
                }
                window.location.href = href;
                return;
            }

            const pageLink = target.closest('[data-action="change-search-page"]');
            if (pageLink) {
                event.preventDefault();
                const pageValue = pageLink.dataset.page;
                if (!pageValue) {
                    return;
                }
                const params = getUrlParams();
                params.set('page', String(pageValue));
                applyUrlParams(params);
            }
        });

        window.addEventListener('popstate', function() {
            handleUrlChange();
        });

        initSearchFormHandlers();
        handleUrlChange();
    });
    </script>
</body>
</html>
