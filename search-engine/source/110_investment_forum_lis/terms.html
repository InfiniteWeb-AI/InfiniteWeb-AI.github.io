<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYIP Programs Forum</title>
    
    <link rel="stylesheet" href="terms.css">
</head>
<body>
    <div id="page">
        <header class="site-header">
            <div class="site-header__title-row">
                <h1 class="site-title">Full version: <a href="index.html">Hyip'S</a></h1>
            </div>

            <nav class="site-header__nav-bar" aria-label="Main navigation">
                <ul class="main-nav">
                    <li class="main-nav__item"><a href="index.html">Home</a></li>
                    <li class="main-nav__item"><a href="programs.html?view=all_programs">HYIP Listings</a></li>
                    <li class="main-nav__item"><a href="programs.html?view=problematic_programs">Problematic Programs</a></li>
                    <li class="main-nav__item"><a href="forum.html">Forum</a></li>
                    <li class="main-nav__item"><a href="dashboard.html">Dashboard</a></li>
                    <li class="main-nav__item"><a href="saved_programs.html">Saved Programs</a></li>
                    <li class="main-nav__item"><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
        </header>

        <main id="content" class="site-content" role="main">
            <div class="content-box">
                <div class="terms-page">
                    <div class="terms-page__header-row">
                        <h2 id="terms-page-heading" class="terms-page__title">Terms of Use</h2>
                        <form id="terms-search-form" class="terms-page__search-form" data-component="header-search-form" data-action="header-search-form">
                            <label for="terms-search-input">Search:</label>
                            <input type="text" id="terms-search-input" name="q" size="25">
                            <label for="terms-search-scope">in</label>
                            <select id="terms-search-scope" name="type_filter">
                                <option value="all">All</option>
                                <option value="programs">Programs</option>
                                <option value="forum">Forum</option>
                            </select>
                            <button type="submit">Go</button>
                            <button type="button" data-action="clear-search">Clear</button>
                        </form>
                    </div>

                    <nav class="terms-toc" data-component="terms-toc" aria-label="Terms sections">
                        <span class="terms-toc__label">Sections:</span>
                        <span class="terms-toc__links"></span>
                    </nav>

                    <div class="terms-main-box">
                        <div class="terms-main-box__inner">
                            <div class="terms-content" data-component="terms-static-content" data-populate="terms-static-content">
                                <!-- Terms static content will be injected here -->
                            </div>

                            <section class="terms-inline-search" data-component="inline-search-results" data-populate="inline-search-results" aria-label="Inline search results">
                                <!-- Inline search results will be injected here when active -->
                            </section>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="site-footer">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav__list">
                    <li class="footer-nav__item"><a href="about.html">About</a></li>
                    <li class="footer-nav__item"><a href="help.html">Help / FAQ</a></li>
                    <li class="footer-nav__item"><a href="contact.html">Contact</a></li>
                    <li class="footer-nav__item"><a href="terms.html">Terms of Use</a></li>
                    <li class="footer-nav__item"><a href="privacy.html">Privacy Policy</a></li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span class="footer-year">2026</span> HYIP Programs Forum.</p>
        </footer>
    </div>

    <script src="business_logic.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const DEFAULT_TERMS_SLUG = 'terms_of_use';

        const termsContentContainer = document.querySelector('[data-populate="terms-static-content"]');
        const inlineSearchContainer = document.querySelector('[data-populate="inline-search-results"]');
        const tocLinksContainer = document.querySelector('.terms-toc__links');
        const pageHeading = document.getElementById('terms-page-heading');

        let staticPageData = null;

        initializePage();

        function initializePage() {
            const urlParams = getUrlParams();
            const effectiveSlug = resolvePageSlug(urlParams);

            try {
                staticPageData = WebsiteSDK.getStaticPageContent(effectiveSlug);
            } catch (err) {
                if (termsContentContainer) {
                    renderStaticError(termsContentContainer, 'Unable to load Terms of Use content. Please try again later.');
                }
            }

            if (staticPageData && termsContentContainer) {
                if (pageHeading && staticPageData.title) {
                    pageHeading.textContent = staticPageData.title;
                }
                renderStaticPageContent(termsContentContainer, staticPageData.body_html || '');
                buildTableOfContents(termsContentContainer, tocLinksContainer);
            }

            initSearchFormFromUrl();
            runInlineSearchFromUrl();
            focusSectionFromUrl();

            setupActionHandlers();
            window.addEventListener('popstate', onUrlChange);
        }

        function getUrlParams() {
            return new URLSearchParams(window.location.search);
        }

        function resolvePageSlug(urlParams) {
            const slugParam = urlParams.get('page_slug');
            if (slugParam && slugParam.trim()) {
                return slugParam.trim();
            }
            return DEFAULT_TERMS_SLUG;
        }

        function renderStaticPageContent(container, bodyHtml) {
            if (!container) return;
            container.innerHTML = bodyHtml || '';
        }

        function renderStaticError(container, message) {
            container.innerHTML = `<p>${escapeHtml(message)}</p>`;
        }

        function buildTableOfContents(contentContainer, tocContainer) {
            if (!contentContainer || !tocContainer) return;

            tocContainer.innerHTML = '';

            const headings = contentContainer.querySelectorAll('h1, h2, h3');
            if (!headings.length) {
                return;
            }

            const currentSectionId = getCurrentSectionId();

            headings.forEach((heading, index) => {
                let id = heading.id;
                if (!id) {
                    id = generateSectionId(heading.textContent || `section-${index + 1}`);
                    if (document.getElementById(id)) {
                        let suffix = 2;
                        while (document.getElementById(`${id}-${suffix}`)) {
                            suffix += 1;
                        }
                        id = `${id}-${suffix}`;
                    }
                    heading.id = id;
                }

                const link = document.createElement('a');
                link.href = 'javascript:void(0)';
                link.textContent = heading.textContent || `Section ${index + 1}`;
                link.dataset.action = 'toc-jump';
                link.dataset.sectionId = id;
                link.className = 'terms-toc__link';
                if (currentSectionId && currentSectionId === id) {
                    link.classList.add('terms-toc__link--active');
                }
                tocContainer.appendChild(link);

                if (index < headings.length - 1) {
                    const sep = document.createTextNode(' | ');
                    tocContainer.appendChild(sep);
                }
            });

            setupActionHandlers();
        }

        function generateSectionId(text) {
            const base = text.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'section';
            return base;
        }

        function getCurrentSectionId() {
            const params = getUrlParams();
            const sectionParam = params.get('section');
            if (sectionParam && sectionParam.trim()) {
                return sectionParam.trim();
            }
            if (window.location.hash && window.location.hash.length > 1) {
                return window.location.hash.substring(1);
            }
            return null;
        }

        function focusSectionFromUrl() {
            const sectionId = getCurrentSectionId();
            if (!sectionId) return;
            scrollToSection(sectionId);
            highlightActiveToc(sectionId);
        }

        function scrollToSection(sectionId) {
            if (!sectionId) return;
            let target = document.getElementById(sectionId);
            if (!target && termsContentContainer) {
                target = termsContentContainer.querySelector(`[name="${CSS.escape(sectionId)}"]`);
            }
            if (target) {
                try {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } catch (e) {
                    target.scrollIntoView(true);
                }
            }
        }

        function highlightActiveToc(sectionId) {
            const links = document.querySelectorAll('.terms-toc__link');
            links.forEach(link => {
                if (link.dataset.sectionId === sectionId) {
                    link.classList.add('terms-toc__link--active');
                } else {
                    link.classList.remove('terms-toc__link--active');
                }
            });
        }

        function initSearchFormFromUrl() {
            const params = getUrlParams();
            const q = params.get('q') || '';
            const typeFilter = params.get('type_filter') || 'all';

            const form = document.getElementById('terms-search-form');
            const input = document.getElementById('terms-search-input');
            const scope = document.getElementById('terms-search-scope');

            if (input) input.value = q;
            if (scope) scope.value = typeFilter;
            if (form && !form.dataset.handlerBound) {
                form.dataset.handlerBound = '1';
            }
        }

        function syncSearchFormWithUrl() {
            initSearchFormFromUrl();
        }

        function getSearchStateFromUrl() {
            const params = getUrlParams();
            const query = params.get('q') || '';
            const typeFilter = params.get('type_filter') || 'all';
            const pageRaw = params.get('search_page') || '1';
            const pageSizeRaw = params.get('search_page_size') || '20';

            let page = parseInt(pageRaw, 10);
            if (!page || page < 1) page = 1;
            let pageSize = parseInt(pageSizeRaw, 10);
            if (!pageSize || pageSize < 1) pageSize = 20;

            return { query, typeFilter, page, pageSize };
        }

        function runInlineSearchFromUrl() {
            if (!inlineSearchContainer) return;

            const state = getSearchStateFromUrl();
            const query = state.query.trim();

            if (!query) {
                inlineSearchContainer.innerHTML = '';
                inlineSearchContainer.style.display = 'none';
                return;
            }

            let result;
            try {
                result = WebsiteSDK.searchSite(query, state.typeFilter, state.page, state.pageSize);
            } catch (err) {
                inlineSearchContainer.innerHTML = `<p>${escapeHtml('Unable to load search results. Please try again later.')}</p>`;
                inlineSearchContainer.style.display = '';
                return;
            }

            renderInlineSearchResults(inlineSearchContainer, result, state);
            setupActionHandlers();
        }

        function renderInlineSearchResults(container, searchResult, state) {
            container.style.display = '';
            container.innerHTML = '';

            const header = document.createElement('strong');
            header.textContent = 'Search results:';
            container.appendChild(header);

            const summary = document.createElement('p');
            summary.textContent = ` Query "${searchResult.query || state.query}"`;
            container.appendChild(summary);

            const programResults = searchResult.program_results || [];
            const forumResults = searchResult.forum_thread_results || [];
            const totalPrograms = typeof searchResult.total_program_results === 'number' ? searchResult.total_program_results : programResults.length;
            const totalForum = typeof searchResult.total_forum_thread_results === 'number' ? searchResult.total_forum_thread_results : forumResults.length;

            if (!programResults.length && !forumResults.length) {
                const empty = document.createElement('p');
                empty.textContent = 'No results found.';
                container.appendChild(empty);
                return;
            }

            if (programResults.length) {
                const progHeader = document.createElement('p');
                progHeader.innerHTML = '<strong>Programs:</strong>';
                container.appendChild(progHeader);

                const list = document.createElement('ul');
                list.className = 'terms-search-results-programs';
                programResults.forEach(program => {
                    const li = document.createElement('li');

                    const link = document.createElement('a');
                    link.href = 'javascript:void(0)';
                    link.textContent = program.name || 'Program';
                    link.dataset.action = 'open-program-result';
                    link.dataset.programId = program.id;

                    li.appendChild(link);

                    if (program.status) {
                        const meta = document.createElement('span');
                        meta.textContent = ` [${program.status}]`;
                        li.appendChild(meta);
                    }

                    list.appendChild(li);
                });
                container.appendChild(list);

                const progPages = Math.max(1, Math.ceil(totalPrograms / state.pageSize));
                if (progPages > 1) {
                    const pagination = document.createElement('div');
                    pagination.className = 'terms-search-pagination terms-search-pagination--programs';
                    const label = document.createElement('span');
                    label.textContent = 'Programs pages: ';
                    pagination.appendChild(label);

                    for (let p = 1; p <= progPages; p += 1) {
                        if (p === state.page) {
                            const current = document.createElement('span');
                            current.textContent = ` ${p} `;
                            pagination.appendChild(current);
                        } else {
                            const btn = document.createElement('button');
                            btn.type = 'button';
                            btn.textContent = p.toString();
                            btn.dataset.action = 'paginate-programs';
                            btn.dataset.page = p.toString();
                            pagination.appendChild(btn);
                        }
                    }
                    container.appendChild(pagination);
                }
            }

            if (forumResults.length) {
                const forumHeader = document.createElement('p');
                forumHeader.innerHTML = '<strong>Forum threads:</strong>';
                container.appendChild(forumHeader);

                const list = document.createElement('ul');
                list.className = 'terms-search-results-threads';
                forumResults.forEach(thread => {
                    const li = document.createElement('li');

                    const link = document.createElement('a');
                    link.href = 'javascript:void(0)';
                    link.textContent = thread.title || 'Thread';
                    link.dataset.action = 'open-thread-result';
                    link.dataset.threadId = thread.id;

                    li.appendChild(link);

                    if (thread.prefix && thread.prefix !== 'none') {
                        const prefixSpan = document.createElement('span');
                        prefixSpan.textContent = ` [${thread.prefix}]`;
                        li.appendChild(prefixSpan);
                    }

                    list.appendChild(li);
                });
                container.appendChild(list);

                const forumPages = Math.max(1, Math.ceil(totalForum / state.pageSize));
                if (forumPages > 1) {
                    const pagination = document.createElement('div');
                    pagination.className = 'terms-search-pagination terms-search-pagination--threads';
                    const label = document.createElement('span');
                    label.textContent = 'Threads pages: ';
                    pagination.appendChild(label);

                    for (let p = 1; p <= forumPages; p += 1) {
                        if (p === state.page) {
                            const current = document.createElement('span');
                            current.textContent = ` ${p} `;
                            pagination.appendChild(current);
                        } else {
                            const btn = document.createElement('button');
                            btn.type = 'button';
                            btn.textContent = p.toString();
                            btn.dataset.action = 'paginate-threads';
                            btn.dataset.page = p.toString();
                            pagination.appendChild(btn);
                        }
                    }
                    container.appendChild(pagination);
                }
            }
        }

        function setupActionHandlers() {
            const actionElements = document.querySelectorAll('[data-action]');
            actionElements.forEach(element => {
                const action = element.dataset.action;
                if (!action || element.dataset.handlerBound === '1') {
                    return;
                }

                if (action === 'header-search-form') {
                    element.addEventListener('submit', onSearchSubmit);
                } else if (action === 'clear-search') {
                    element.addEventListener('click', onClearSearchClick);
                } else if (action === 'toc-jump') {
                    element.addEventListener('click', onTocItemClick);
                } else if (action === 'open-program-result') {
                    element.addEventListener('click', onProgramResultClick);
                } else if (action === 'open-thread-result') {
                    element.addEventListener('click', onThreadResultClick);
                } else if (action === 'paginate-programs') {
                    element.addEventListener('click', onPaginateProgramsClick);
                } else if (action === 'paginate-threads') {
                    element.addEventListener('click', onPaginateThreadsClick);
                }

                element.dataset.handlerBound = '1';
            });
        }

        function onSearchSubmit(event) {
            event.preventDefault();
            const form = event.target;
            const input = form.querySelector('#terms-search-input');
            const scope = form.querySelector('#terms-search-scope');

            const query = (input && input.value ? input.value : '').trim();
            const typeFilter = scope && scope.value ? scope.value : 'all';

            const updates = {};
            if (query) {
                updates.q = query;
                if (typeFilter && typeFilter !== 'all') {
                    updates.type_filter = typeFilter;
                } else {
                    updates.type_filter = null;
                }
                updates.search_page = '1';
            } else {
                updates.q = null;
                updates.type_filter = null;
                updates.search_page = null;
                updates.search_page_size = null;
            }

            updateUrlParams(updates, false);
        }

        function onClearSearchClick(event) {
            event.preventDefault();
            const updates = {
                q: null,
                type_filter: null,
                search_page: null,
                search_page_size: null
            };
            updateUrlParams(updates, false);
        }

        function onTocItemClick(event) {
            event.preventDefault();
            const sectionId = event.currentTarget.dataset.sectionId;
            if (!sectionId) return;

            const updates = { section: sectionId };
            updateUrlParams(updates, false);
        }

        function onProgramResultClick(event) {
            event.preventDefault();
            const programId = event.currentTarget.dataset.programId;
            if (!programId) return;
            window.location.href = `program.html?id=${encodeURIComponent(programId)}`;
        }

        function onThreadResultClick(event) {
            event.preventDefault();
            const threadId = event.currentTarget.dataset.threadId;
            if (!threadId) return;
            window.location.href = `thread.html?id=${encodeURIComponent(threadId)}`;
        }

        function onPaginateProgramsClick(event) {
            event.preventDefault();
            const page = event.currentTarget.dataset.page;
            if (!page) return;
            const updates = { search_page: page };
            updateUrlParams(updates, false);
        }

        function onPaginateThreadsClick(event) {
            event.preventDefault();
            const page = event.currentTarget.dataset.page;
            if (!page) return;
            const updates = { search_page: page };
            updateUrlParams(updates, false);
        }

        function updateUrlParams(updates, replace) {
            const url = new URL(window.location.href);
            const params = url.searchParams;

            Object.keys(updates).forEach(key => {
                const value = updates[key];
                if (value === null || value === undefined || value === '') {
                    params.delete(key);
                } else {
                    params.set(key, String(value));
                }
            });

            url.search = params.toString();
            const newUrl = url.pathname + (url.search ? `?${url.searchParams.toString()}` : '') + url.hash;

            if (replace) {
                window.history.replaceState({}, '', newUrl);
            } else {
                window.history.pushState({}, '', newUrl);
            }

            onUrlChange();
        }

        function onUrlChange() {
            syncSearchFormWithUrl();
            runInlineSearchFromUrl();
            focusSectionFromUrl();
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    });
    </script>
</body>
</html>
