<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>HYIP Programs Forum - Compose Message</title>
    <link rel='stylesheet' href='framework.css'>
    <link rel='stylesheet' href='message_compose.css'>
</head>
<body>
    <div id='page'>
        <header class='site-header'>
            <div class='site-header__title-row'>
                <h1 class='site-title'>Full version: <a href='index.html'>Hyip'S</a></h1>
            </div>

            <nav class='site-header__nav-bar' aria-label='Main navigation'>
                <ul class='main-nav'>
                    <li class='main-nav__item'><a href='index.html'>Home</a></li>
                    <li class='main-nav__item'><a href='programs.html?view=all_programs'>HYIP Listings</a></li>
                    <li class='main-nav__item'><a href='programs.html?view=problematic_programs'>Problematic Programs</a></li>
                    <li class='main-nav__item'><a href='forum.html'>Forum</a></li>
                    <li class='main-nav__item'><a href='dashboard.html'>Dashboard</a></li>
                    <li class='main-nav__item'><a href='saved_programs.html'>Saved Programs</a></li>
                    <li class='main-nav__item'><a href='settings.html'>Settings</a></li>
                </ul>
            </nav>
        </header>

        <main id='content' class='site-content' role='main'>
            <div class='content-box'>
                <h2 class='page-title'>Compose Message</h2>

                <section class='global-search-bar' data-component='global-search-bar'>
                    <form class='global-search-bar__form' data-action='global-search'>
                        <label for='globalSearchInput'>Search:</label>
                        <input type='text' id='globalSearchInput' name='query' size='30'>
                        <select id='globalSearchType' name='type_filter'>
                            <option value='all'>All</option>
                            <option value='programs'>Programs</option>
                            <option value='forum'>Forum</option>
                        </select>
                        <button type='submit'>Search</button>
                    </form>
                    <div class='global-search-bar__results' data-component='search-results' data-populate='search-results'></div>
                </section>

                <section class='compose-message-box' data-component='private-message-compose-form'>
                    <form id='privateMessageForm' data-action='submit-message'>
                        <div class='compose-message-box__recipient' data-component='recipient-info-panel' data-populate='recipient-info' data-username=''>
                            <!-- Recipient info will be rendered by JS -->
                        </div>

                        <div class='compose-message-box__context' data-component='message-context-panel' data-populate='message-context' data-program-name='' data-program-id='' data-comment-excerpt=''>
                            <!-- Context info will be rendered by JS -->
                        </div>

                        <div class='compose-message-box__validation' data-component='form-validation-messages' aria-live='polite'>
                            <!-- Validation messages rendered by JS -->
                        </div>

                        <div class='compose-message-box__field'>
                            <label for='subjectInput'>Subject:</label>
                            <input type='text' id='subjectInput' name='subject' maxlength='200' required>
                        </div>

                        <div class='compose-message-box__field'>
                            <label for='bodyInput'>Message:</label><br>
                            <textarea id='bodyInput' name='body' rows='12' required></textarea>
                        </div>

                        <input type='hidden' id='recipientProfileIdInput' name='recipientProfileId'>
                        <input type='hidden' id='relatedProgramIdInput' name='relatedProgramId'>
                        <input type='hidden' id='relatedCommentIdInput' name='relatedCommentId'>

                        <div class='compose-message-box__actions'>
                            <button type='submit' data-action='send-message'>Send</button>
                            <button type='button' data-action='reset-form'>Cancel</button>
                        </div>

                        <div class='compose-message-box__status' data-component='send-status-panel' aria-live='polite'>
                            <!-- Send status rendered by JS -->
                        </div>
                    </form>
                </section>
            </div>
        </main>

        <footer class='site-footer'>
            <nav class='footer-nav' aria-label='Footer navigation'>
                <ul class='footer-nav__list'>
                    <li class='footer-nav__item'><a href='about.html'>About</a></li>
                    <li class='footer-nav__item'><a href='help.html'>Help / FAQ</a></li>
                    <li class='footer-nav__item'><a href='contact.html'>Contact</a></li>
                    <li class='footer-nav__item'><a href='terms.html'>Terms of Use</a></li>
                    <li class='footer-nav__item'><a href='privacy.html'>Privacy Policy</a></li>
                </ul>
            </nav>
            <p class='footer-meta'>&copy; <span class='footer-year'>2026</span> HYIP Programs Forum.</p>
        </footer>
    </div>

    <script src='business_logic.js'></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const urlParams = new URLSearchParams(window.location.search);
        const pageState = {
            recipientProfileId: urlParams.get('recipientProfileId') || '',
            relatedProgramId: urlParams.get('relatedProgramId') || '',
            relatedCommentId: urlParams.get('relatedCommentId') || '',
            isSending: false,
            lastSendResult: null
        };

        // Initialize hidden inputs with URL params
        const recipientInput = document.getElementById('recipientProfileIdInput');
        const programInput = document.getElementById('relatedProgramIdInput');
        const commentInput = document.getElementById('relatedCommentIdInput');

        if (recipientInput) {
            recipientInput.value = pageState.recipientProfileId;
        }
        if (programInput) {
            programInput.value = pageState.relatedProgramId;
        }
        if (commentInput) {
            commentInput.value = pageState.relatedCommentId;
        }

        const subjectInput = document.getElementById('subjectInput');
        const bodyInput = document.getElementById('bodyInput');
        const composeForm = document.getElementById('privateMessageForm');
        const validationContainer = document.querySelector('[data-component="form-validation-messages"]');
        const statusContainer = document.querySelector('[data-component="send-status-panel"]');

        function escapeHtml(str) {
            if (typeof str !== 'string') return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function renderRecipientInfo(container, state) {
            if (!container) return;
            const usernameFromData = container.dataset.username || '';
            if (!state.recipientProfileId) {
                container.innerHTML = '<strong>To:</strong> <span>Unknown recipient</span>';
                return;
            }
            const safeUsername = escapeHtml(usernameFromData || 'Recipient');
            const profileUrl = 'user_profile.html?profileId=' + encodeURIComponent(state.recipientProfileId);
            container.innerHTML = '<strong>To:</strong> ' +
                '<a href=' + '\'' + profileUrl + '\'' + '>' + safeUsername + '</a>';
        }

        function renderMessageContext(container, state) {
            if (!container) return;

            if (!state.relatedProgramId && !state.relatedCommentId) {
                container.style.display = 'none';
                container.innerHTML = '';
                return;
            }

            const programName = container.dataset.programName || 'related program';
            const commentExcerpt = container.dataset.commentExcerpt || '';
            const parts = [];

            if (state.relatedProgramId) {
                parts.push('Regarding: ' + escapeHtml(programName));
            }

            if (state.relatedCommentId && commentExcerpt) {
                parts.push('(comment: "' + escapeHtml(commentExcerpt) + '")');
            }

            container.style.display = 'block';
            container.innerHTML = '<span>' + parts.join(' ') + '</span>';
        }

        function renderValidationMessages(container, messages) {
            if (!container) return;
            container.innerHTML = '';
            if (!messages || !messages.length) {
                return;
            }
            const list = document.createElement('div');
            messages.forEach(function (msg) {
                const line = document.createElement('div');
                line.className = 'validation-message';
                line.textContent = msg;
                list.appendChild(line);
            });
            container.appendChild(list);
        }

        function renderSendStatus(container, result) {
            if (!container) return;
            container.innerHTML = '';
            if (!result) return;

            if (result.success) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'send-status send-status--success';
                const textSpan = document.createElement('span');
                textSpan.textContent = 'Message sent successfully.';
                msgDiv.appendChild(textSpan);

                if (pageState.recipientProfileId) {
                    const space = document.createTextNode(' ');
                    msgDiv.appendChild(space);
                    const linkButton = document.createElement('button');
                    linkButton.type = 'button';
                    linkButton.textContent = 'Go to recipient profile';
                    linkButton.setAttribute('data-action', 'go-to-recipient-profile');
                    msgDiv.appendChild(linkButton);
                }

                container.appendChild(msgDiv);
            } else {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'send-status send-status--error';
                const textSpan = document.createElement('span');
                textSpan.textContent = result.message || 'Failed to send message.';
                errorDiv.appendChild(textSpan);
                container.appendChild(errorDiv);
            }
        }

        function validateForm(subject, body) {
            const errors = [];
            const trimmedSubject = subject.trim();
            const trimmedBody = body.trim();

            if (!trimmedSubject) {
                errors.push('Subject is required.');
            } else if (trimmedSubject.length < 3) {
                errors.push('Subject must be at least 3 characters.');
            }

            if (!trimmedBody) {
                errors.push('Message body is required.');
            } else if (trimmedBody.length < 10) {
                errors.push('Message body must be at least 10 characters.');
            }

            if (!pageState.recipientProfileId) {
                errors.push('Cannot send message: recipient is missing or invalid.');
            }

            return errors;
        }

        function setFormDisabled(disabled) {
            if (subjectInput) subjectInput.disabled = disabled;
            if (bodyInput) bodyInput.disabled = disabled;
            const buttons = document.querySelectorAll('.compose-message-box__actions button');
            buttons.forEach(function (btn) {
                btn.disabled = disabled;
            });
        }

        // Initial state if recipient is missing
        if (!pageState.recipientProfileId) {
            setFormDisabled(true);
            renderValidationMessages(validationContainer, ['Cannot compose message because no recipient was specified.']);
        }

        // Populate components based on data-populate attributes
        const populateElements = document.querySelectorAll('[data-populate]');
        populateElements.forEach(function (element) {
            const type = element.dataset.populate;
            if (type === 'recipient-info') {
                renderRecipientInfo(element, pageState);
            } else if (type === 'message-context') {
                renderMessageContext(element, pageState);
            } else if (type === 'search-results') {
                // No initial population for search results
                element.innerHTML = '';
            }
        });

        // Handle form submission for sending private message
        function handleFormSubmit(event) {
            event.preventDefault();
            if (pageState.isSending) return;

            const subjectValue = subjectInput ? subjectInput.value || '' : '';
            const bodyValue = bodyInput ? bodyInput.value || '' : '';

            const errors = validateForm(subjectValue, bodyValue);
            renderValidationMessages(validationContainer, errors);
            if (errors.length) return;

            pageState.isSending = true;
            setFormDisabled(true);
            if (statusContainer) {
                statusContainer.innerHTML = '';
            }

            try {
                const result = WebsiteSDK.sendPrivateMessage(
                    pageState.recipientProfileId,
                    subjectValue,
                    bodyValue,
                    pageState.relatedProgramId || undefined,
                    pageState.relatedCommentId || undefined
                );
                pageState.lastSendResult = result;
                renderSendStatus(statusContainer, result);

                if (!result || !result.success) {
                    // Re-enable form on error so user can correct and retry
                    setFormDisabled(false);
                }
            } catch (e) {
                pageState.lastSendResult = { success: false, message: 'Unexpected error while sending message.' };
                renderSendStatus(statusContainer, pageState.lastSendResult);
                setFormDisabled(false);
            } finally {
                pageState.isSending = false;
            }
        }

        if (composeForm) {
            composeForm.addEventListener('submit', handleFormSubmit);
        }

        // Reset form (Cancel button) - clears subject and body but keeps context
        function handleFormReset(event) {
            event.preventDefault();
            if (subjectInput) subjectInput.value = '';
            if (bodyInput) bodyInput.value = '';
            renderValidationMessages(validationContainer, []);
            if (statusContainer) {
                statusContainer.innerHTML = '';
            }
        }

        // Global search handling
        function handleGlobalSearch(event) {
            event.preventDefault();
            const queryInput = document.getElementById('globalSearchInput');
            const typeSelect = document.getElementById('globalSearchType');
            const resultsContainer = document.querySelector('[data-component="search-results"]');

            if (!queryInput || !resultsContainer) return;

            const query = (queryInput.value || '').trim();
            const typeFilter = typeSelect ? (typeSelect.value || 'all') : 'all';

            if (!query) {
                renderSearchResults(resultsContainer, null, 'Please enter search keywords.');
                return;
            }

            try {
                const result = WebsiteSDK.searchSite(query, typeFilter, 1, 20);
                renderSearchResults(resultsContainer, result, null);
            } catch (e) {
                renderSearchResults(resultsContainer, null, 'Search failed. Please try again.');
            }
        }

        function renderSearchResults(container, result, errorMessage) {
            if (!container) return;
            container.innerHTML = '';

            if (errorMessage) {
                const errDiv = document.createElement('div');
                errDiv.className = 'search-results__error';
                errDiv.textContent = errorMessage;
                container.appendChild(errDiv);
                return;
            }

            if (!result) {
                return;
            }

            const programResults = Array.isArray(result.program_results) ? result.program_results : [];
            const threadResults = Array.isArray(result.forum_thread_results) ? result.forum_thread_results : [];

            if (!programResults.length && !threadResults.length) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'search-results__empty';
                emptyDiv.textContent = 'No results found.';
                container.appendChild(emptyDiv);
                return;
            }

            if (programResults.length) {
                const progSection = document.createElement('div');
                const progTitle = document.createElement('div');
                progTitle.className = 'search-results__section-title';
                progTitle.textContent = 'Programs';
                progSection.appendChild(progTitle);

                const progList = document.createElement('ol');
                programResults.forEach(function (prog) {
                    const li = document.createElement('li');
                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = prog.name || 'Program';
                    li.appendChild(nameSpan);
                    progList.appendChild(li);
                });

                progSection.appendChild(progList);
                container.appendChild(progSection);
            }

            if (threadResults.length) {
                const threadSection = document.createElement('div');
                const threadTitle = document.createElement('div');
                threadTitle.className = 'search-results__section-title';
                threadTitle.textContent = 'Forum threads';
                threadSection.appendChild(threadTitle);

                const threadList = document.createElement('ol');
                threadResults.forEach(function (thread) {
                    const li = document.createElement('li');
                    const titleSpan = document.createElement('span');
                    titleSpan.textContent = thread.title || 'Thread';
                    li.appendChild(titleSpan);
                    threadList.appendChild(li);
                });

                threadSection.appendChild(threadList);
                container.appendChild(threadSection);
            }
        }

        // Bind data-action handlers
        const actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function (element) {
            const action = element.dataset.action;
            if (action === 'global-search') {
                element.addEventListener('submit', handleGlobalSearch);
            } else if (action === 'reset-form') {
                element.addEventListener('click', handleFormReset);
            }
        });

        // Delegate click for 'Go to recipient profile' button in send status panel
        if (statusContainer) {
            statusContainer.addEventListener('click', function (event) {
                const target = event.target;
                if (target && target.dataset && target.dataset.action === 'go-to-recipient-profile') {
                    if (pageState.recipientProfileId) {
                        const url = 'user_profile.html?profileId=' + encodeURIComponent(pageState.recipientProfileId);
                        window.location.href = url;
                    }
                }
            });
        }

        // Clear validation messages on input
        if (subjectInput) {
            subjectInput.addEventListener('input', function () {
                renderValidationMessages(validationContainer, []);
            });
        }
        if (bodyInput) {
            bodyInput.addEventListener('input', function () {
                renderValidationMessages(validationContainer, []);
            });
        }
    });
    </script>
</body>
</html>
