        </nav>

        <section class='policies-section-list is-hidden' data-component='policies-section-list' data-populate='policies-list' aria-label='Policy details'>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var initialPolicyType = urlParams.get('policyType');

      var state = {
        policies: [],
        activePolicyType: initialPolicyType,
        loadingStatus: 'idle',
        errorDetails: null
      };

      var ui = {
        populateMap: {},
        navWrapper: document.querySelector('[data-component=policy-inline-nav]'),
        sectionsWrapper: document.querySelector('[data-component=policies-section-list]')
      };

      var populateElements = document.querySelectorAll('[data-populate]');
      for (var i = 0; i < populateElements.length; i++) {
        var el = populateElements[i];
        ui.populateMap[el.dataset.populate] = el;
      }

      function renderLoadingState() {
        var loadingContainer = ui.populateMap['policies-loading'];
        if (!loadingContainer) {
          return;
        }

        if (state.loadingStatus === 'loading') {
          loadingContainer.innerHTML = `
            <div class='policies-status'>
              <div class='policies-spinner' aria-hidden='true'></div>
              <p class='policies-status-text'>Loading policies&hellip;</p>
            </div>
          `;
          if (ui.navWrapper) {
            ui.navWrapper.classList.add('is-hidden');
          }
          if (ui.sectionsWrapper) {
            ui.sectionsWrapper.classList.add('is-hidden');
          }
        } else if (state.loadingStatus === 'error') {
          var message = 'We are having trouble loading our policies right now.';
          loadingContainer.innerHTML = `
            <div class='policies-status policies-status--error' role='alert'>
              <p class='policies-status-text'>${message}</p>
              <button type='button' class='button button-secondary policies-retry-button' data-action='retry-policies-load'>
                Retry
              </button>
            </div>
          `;
          if (ui.navWrapper) {
            ui.navWrapper.classList.add('is-hidden');
          }
          if (ui.sectionsWrapper) {
            ui.sectionsWrapper.classList.add('is-hidden');
          }
        } else if (state.loadingStatus === 'loaded') {
          loadingContainer.innerHTML = '';
          if (ui.navWrapper) {
            ui.navWrapper.classList.remove('is-hidden');
          }
          if (ui.sectionsWrapper) {
            ui.sectionsWrapper.classList.remove('is-hidden');
          }
        }
      }

      function renderPolicyNav() {
        var navListContainer = ui.populateMap['policy-inline-nav'];
        if (!navListContainer) {
          return;
        }
        navListContainer.innerHTML = '';
        if (!state.policies || !state.policies.length) {
          return;
        }
        for (var i = 0; i < state.policies.length; i++) {
          var policy = state.policies[i];
          var li = document.createElement('li');
          li.className = 'policy-inline-nav-item';

          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'policy-inline-nav-link';
          button.textContent = policy.title || policy.policy_type;
          button.setAttribute('data-action', 'policy-nav-select');
          button.setAttribute('data-policy-type', policy.policy_type);

          li.appendChild(button);
          navListContainer.appendChild(li);
        }
        updateActivePolicyHighlight();
      }

      function renderPoliciesList() {
        var sectionsContainer = ui.populateMap['policies-list'];
        if (!sectionsContainer) {
          return;
        }
        sectionsContainer.innerHTML = '';
        if (!state.policies || !state.policies.length) {
          return;
        }
        for (var i = 0; i < state.policies.length; i++) {
          var policy = state.policies[i];

          var article = document.createElement('article');
          article.className = 'policy-section';
          article.setAttribute('data-component', 'policy-section');
          article.setAttribute('data-policy-type', policy.policy_type);

          var header = document.createElement('header');
          header.className = 'policy-section-header';

          var titleEl = document.createElement('h2');
          titleEl.className = 'policy-section-title';
          titleEl.textContent = policy.title || policy.policy_type;

          header.appendChild(titleEl);

          var body = document.createElement('div');
          body.className = 'policy-section-body';
          body.innerHTML = policy.content || '';

          var actions = document.createElement('div');
          actions.className = 'policy-section-actions';

          var contactLink = document.createElement('button');
          contactLink.type = 'button';
          contactLink.className = 'button button-secondary policy-section-contact-link';
          contactLink.setAttribute('data-action', 'contact-policy');
          contactLink.setAttribute('data-policy-type', policy.policy_type);
          contactLink.textContent = 'Contact us about this policy';

          actions.appendChild(contactLink);

          article.appendChild(header);
          article.appendChild(body);
          article.appendChild(actions);

          sectionsContainer.appendChild(article);
        }
        updateActivePolicyHighlight();
      }

      function updateActivePolicyHighlight() {
        var navListContainer = ui.populateMap['policy-inline-nav'];
        if (navListContainer) {
          var buttons = navListContainer.querySelectorAll('[data-action=policy-nav-select]');
          for (var i = 0; i < buttons.length; i++) {
            var btn = buttons[i];
            var isActive = state.activePolicyType && btn.dataset.policyType === state.activePolicyType;
            if (isActive) {
              btn.classList.add('is-active');
            } else {
              btn.classList.remove('is-active');
            }
          }
        }
        var sectionsContainer = ui.populateMap['policies-list'];
        if (sectionsContainer) {
          var sections = sectionsContainer.querySelectorAll('[data-component=policy-section]');
          for (var j = 0; j < sections.length; j++) {
            var section = sections[j];
            var sectionIsActive = state.activePolicyType && section.dataset.policyType === state.activePolicyType;
            if (sectionIsActive) {
              section.classList.add('is-active');
            } else {
              section.classList.remove('is-active');
            }
          }
        }
      }

      function scrollToPolicySection(policyType, smooth) {
        if (!policyType || !ui.sectionsWrapper) {
          return;
        }
        var sections = ui.sectionsWrapper.querySelectorAll('[data-component=policy-section]');
        var target = null;
        for (var i = 0; i < sections.length; i++) {
          if (sections[i].dataset.policyType === policyType) {
            target = sections[i];
            break;
          }
        }
        if (target && typeof target.scrollIntoView === 'function') {
          try {
            target.scrollIntoView({
              behavior: smooth ? 'smooth' : 'auto',
              block: 'start'
            });
          } catch (e) {
            target.scrollIntoView(true);
          }
        }
      }

      function updateUrlPolicyType(policyType) {
        var searchParams = new URLSearchParams(window.location.search);
        if (policyType) {
          searchParams.set('policyType', policyType);
        } else {
          searchParams.delete('policyType');
        }
        var queryString = searchParams.toString();
        var newRelativeUrl = window.location.pathname + (queryString ? '?' + queryString : '');
        history.pushState({}, '', newRelativeUrl);
      }

      function getCurrentPolicyTypeFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('policyType');
      }

      function loadPolicies(policyType) {
        state.loadingStatus = 'loading';
        state.errorDetails = null;
        renderLoadingState();
        try {
          var effectiveType = policyType || undefined;
          state.policies = WebsiteSDK.getPoliciesContent(effectiveType) || [];
          state.loadingStatus = 'loaded';

          if (state.activePolicyType) {
            var exists = false;
            for (var i = 0; i < state.policies.length; i++) {
              if (state.policies[i].policy_type === state.activePolicyType) {
                exists = true;
                break;
              }
            }
            if (!exists) {
              state.activePolicyType = null;
            }
          }

          renderLoadingState();
          renderPolicyNav();
          renderPoliciesList();

          if (state.activePolicyType) {
            scrollToPolicySection(state.activePolicyType, true);
          }
        } catch (err) {
          state.loadingStatus = 'error';
          state.errorDetails = err;
          state.policies = [];
          renderLoadingState();

          var navListContainer = ui.populateMap['policy-inline-nav'];
          if (navListContainer) {
            navListContainer.innerHTML = '';
          }
          var sectionsContainer = ui.populateMap['policies-list'];
          if (sectionsContainer) {
            sectionsContainer.innerHTML = '';
          }
        }
      }

      function handleActionClick(event) {
        var target = event.target;
        if (!target) {
          return;
        }
        var actionEl = target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.dataset.action;
        if (!action) {
          return;
        }

        if (action === 'policy-nav-select') {
          var policyType = actionEl.dataset.policyType;
          if (!policyType) {
            return;
          }
          state.activePolicyType = policyType;
          updateUrlPolicyType(policyType);
          updateActivePolicyHighlight();
          scrollToPolicySection(policyType, true);
        } else if (action === 'retry-policies-load') {
          var currentPolicyType = getCurrentPolicyTypeFromUrl();
          state.activePolicyType = currentPolicyType;
          loadPolicies(currentPolicyType);
        } else if (action === 'contact-policy') {
          var policyTypeForContact = actionEl.dataset.policyType;
          var params = new URLSearchParams();
          params.set('subject', 'Policy question');
          if (policyTypeForContact) {
            params.set('policyType', policyTypeForContact);
          }
          var queryString = params.toString();
          window.location.href = 'contact.html' + (queryString ? '?' + queryString : '');
        }
      }

      function handlePopState() {
        if (!state.policies || !state.policies.length) {
          return;
        }
        var policyTypeFromUrl = getCurrentPolicyTypeFromUrl();
        state.activePolicyType = policyTypeFromUrl;
        updateActivePolicyHighlight();
        if (policyTypeFromUrl) {
          scrollToPolicySection(policyTypeFromUrl, true);
        }
      }

      document.body.addEventListener('click', handleActionClick);
      window.addEventListener('popstate', handlePopState);

      loadPolicies(initialPolicyType);
    });
  </script>
