            localStorage.setItem("knowledge_base_articles", "[{\"id\":\"kb_pricing_plans_overview\",\"knowledge_base_id\":\"main_kb\",\"title\":\"Pricing and plans overview\",\"slug\":\"pricing-and-plans-overview\",\"content\":\"This article explains our pricing and plans overview for the AI customer communications platform. We offer several pricing tiers, including Starter, Team AI, Growth AI, and Scale AI. Each plan’s pricing is shown as an equivalent price per month, with discounts for annual billing. Higher tiers unlock more advanced AI automation and additional seats.\",\"visibility\":\"public\",\"keywords\":[\"pricing\",\"plans\",\"billing\"],\"status\":\"published\",\"created_at\":\"2024-10-10T09:00:00Z\",\"updated_at\":\"2025-08-01T10:15:00Z\"},{\"id\":\"kb_how_to_start_free_trial\",\"knowledge_base_id\":\"main_kb\",\"title\":\"How to start a free trial\",\"slug\":\"how-to-start-a-free-trial\",\"content\":\"To start a free trial, visit the Pricing page and choose the plan you want to test. Click the \\\"Start trial\\\" button under the selected plan, complete the signup form, and confirm your email. Your trial will begin immediately, giving you full access to AI assistant features where included. During the trial period you can switch plans or cancel at any time. This process applies whether you select a monthly option or an annual plan with a trial.\",\"visibility\":\"public\",\"keywords\":[\"trial\",\"getting_started\",\"signup\"],\"status\":\"published\",\"created_at\":\"2024-10-11T11:30:00Z\",\"updated_at\":\"2025-01-20T14:00:00Z\"},{\"id\":\"kb_support_hours_response_times\",\"knowledge_base_id\":\"main_kb\",\"title\":\"Our support hours and response times\",\"slug\":\"our-support-hours-and-response-times\",\"content\":\"Our standard support hours are Monday to Friday, 08:00–18:00 in the America/New_York timezone. During these support hours, we aim to respond to urgent issues within 1 hour and to normal-priority tickets within one business day. Outside of support hours, you can still contact us using the website chatbot or email; we’ll follow up as soon as our team is back online.\",\"visibility\":\"public\",\"keywords\":[\"support hours\",\"response_times\",\"sla\"],\"status\":\"published\",\"created_at\":\"2024-10-12T08:45:00Z\",\"updated_at\":\"2025-03-05T09:10:00Z\"},{\"id\":\"kb_bot_lead_routing\",\"knowledge_base_id\":\"main_kb\",\"title\":\"How lead routing works for website chatbots\",\"slug\":\"how-lead-routing-works-for-website-chatbots\",\"content\":\"Website chatbots can route leads to different inboxes based on conditions such as estimated budget, location, or selected product interest. For example, you can configure a step that asks for an estimated monthly budget and routes leads over a certain amount to the Sales inbox while sending others to a General inbox. The routing configuration is managed in the bot’s conversation flow builder.\",\"visibility\":\"public\",\"keywords\":[\"routing\",\"bots\",\"sales\",\"lead_qualification\"],\"status\":\"published\",\"created_at\":\"2025-02-01T10:00:00Z\",\"updated_at\":\"2025-02-10T10:30:00Z\"},{\"id\":\"kb_urgent_ticket_handling\",\"knowledge_base_id\":\"main_kb\",\"title\":\"How urgent support tickets are handled\",\"slug\":\"how-urgent-support-tickets-are-handled\",\"content\":\"Tickets tagged as \\\"urgent\\\" are prioritized in the Support inbox. Automations can send an immediate acknowledgement via email and notify on-call agents. We recommend configuring an AI-generated urgent acknowledgement that references the customer’s ticket ID and assures them that the team is already investigating the issue.\",\"visibility\":\"public\",\"keywords\":[\"urgent\",\"support\",\"automation\"],\"status\":\"published\",\"created_at\":\"2025-01-05T09:15:00Z\",\"updated_at\":\"2025-01-18T11:45:00Z\"},{\"id\":\"kb_ai_resolution_analytics\",\"knowledge_base_id\":\"main_kb\",\"title\":\"Understanding AI resolution rate analytics\",\"slug\":\"understanding-ai-resolution-rate-analytics\",\"content\":\"The AI resolution rate shows the percentage of conversations resolved primarily by AI, based on the proportion of AI messages in the thread. You can filter analytics by channel, date range, and AI coverage percentage to see how effectively bots and automations are handling customer conversations.\",\"visibility\":\"public\",\"keywords\":[\"analytics\",\"ai_resolution_rate\",\"reporting\"],\"status\":\"published\",\"created_at\":\"2025-02-20T13:20:00Z\",\"updated_at\":\"2025-02-22T09:55:00Z\"},{\"id\":\"kb_internal_escalation_runbook\",\"knowledge_base_id\":\"internal_kb\",\"title\":\"Internal escalation runbook for critical incidents\",\"slug\":\"internal-escalation-runbook-for-critical-incidents\",\"content\":\"This internal runbook defines how to escalate critical incidents, including outages and data loss. When a conversation mentions a potential security breach or widespread outage, agents must immediately tag it as \\\"urgent\\\" and follow the on-call escalation path documented here.\",\"visibility\":\"internal\",\"keywords\":[\"internal\",\"escalation\",\"on_call\"],\"status\":\"published\",\"created_at\":\"2024-11-02T10:10:00Z\",\"updated_at\":\"2025-01-01T12:00:00Z\"},{\"id\":\"kb_internal_sales_playbook\",\"knowledge_base_id\":\"internal_kb\",\"title\":\"Sales playbook for pricing and discount requests\",\"slug\":\"sales-playbook-for-pricing-and-discount-requests\",\"content\":\"This internal article helps sales agents respond consistently to pricing and discount questions. It outlines standard discounts allowed on each plan, how to position AI assistant features, and when to involve management for custom enterprise quotes.\",\"visibility\":\"internal\",\"keywords\":[\"pricing\",\"discounts\",\"sales_playbook\"],\"status\":\"published\",\"created_at\":\"2024-11-10T15:00:00Z\",\"updated_at\":\"2025-02-15T16:30:00Z\"}]");

  <script>
    (function () {
      'use strict';

      document.addEventListener('DOMContentLoaded', function () {
        var homeContainer = document.querySelector('[data-populate="home_overview"]');
        var loaderEl = document.querySelector('[data-component="home-data-loader"]');
        var overviewCache = null;

        if (!homeContainer) {
          return;
        }

        function getUrlState() {
          var params = new URLSearchParams(window.location.search || '');
          var section = params.get('section');
          var selectedStepId = params.get('selectedStepId');
          return {
            section: section || null,
            selectedStepId: selectedStepId || null
          };
        }

        function writeUrlState(updates) {
          var params = new URLSearchParams(window.location.search || '');
          Object.keys(updates || {}).forEach(function (key) {
            var value = updates[key];
            if (value === null || value === undefined || value === '') {
              params["delete"](key);
            } else {
              params.set(key, value);
            }
          });
          var newQuery = params.toString();
          var newUrl = window.location.pathname + (newQuery ? ('?' + newQuery) : '') + window.location.hash;
          if (window.history && typeof window.history.pushState === 'function') {
            window.history.pushState(null, '', newUrl);
          } else {
            window.location.search = newQuery;
          }
        }

        function showLoader(isError, message) {
          if (!loaderEl) return;
          loaderEl.removeAttribute('hidden');
          loaderEl.setAttribute('aria-hidden', 'false');

          var msgEl = loaderEl.querySelector('[data-loader-message]');
          if (msgEl && typeof message === 'string') {
            msgEl.textContent = message;
          }

          var retryBtn = loaderEl.querySelector('[data-action="reload-home-overview"]');
          if (retryBtn) {
            if (isError) {
              retryBtn.removeAttribute('hidden');
            } else {
              retryBtn.setAttribute('hidden', 'hidden');
            }
          }
        }

        function hideLoader() {
          if (!loaderEl) return;
          loaderEl.setAttribute('hidden', 'hidden');
          loaderEl.setAttribute('aria-hidden', 'true');
        }

        function renderHomeOverview(container, overview, urlState) {
          var sectionFromUrl = (urlState && urlState.section) || null;
          var validSections = { stats: true, links: true, nextSteps: true };
          var activeSection = validSections[sectionFromUrl || ''] ? sectionFromUrl : 'stats';
          var isStatsActive = activeSection === 'stats';
          var isLinksActive = activeSection === 'links';
          var isNextStepsActive = activeSection === 'nextSteps';
          var selectedStepId = (urlState && urlState.selectedStepId) || null;

          var stats = (overview && overview.keyStats) || {};
          var quickLinks = Array.isArray(overview && overview.quickLinks) ? overview.quickLinks : [];
          var steps = Array.isArray(overview && overview.suggestedNextSteps) ? overview.suggestedNextSteps : [];

          function esc(value) {
            if (value === null || value === undefined) return '';
            return String(value)
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&#39;');
          }

          var quickLinksHtml;
          if (quickLinks.length) {
            quickLinksHtml = quickLinks.map(function (link) {
              var label = esc(link && link.label ? link.label : '');
              var page = esc(link && link.page ? link.page : '');
              return (
                '\n            <li class="quick-link-item">\n              <button type="button" class="quick-link-button" data-action="quick-link" data-page="' + page + '">\n                <span class="quick-link-label">' + label + '</span>\n                <span class="quick-link-chevron" aria-hidden="true">\u203a</span>\n              </button>\n            </li>'
              );
            }).join('');
          } else {
            quickLinksHtml = '\n          <li class="quick-link-item is-empty">No quick links are available yet.</li>';
          }

          var stepsHtml;
          if (steps.length) {
            stepsHtml = steps.map(function (step) {
              var rawStepId = step && step.stepId ? step.stepId : '';
              var expanded = selectedStepId && rawStepId === selectedStepId;
              var stepIdAttr = esc(rawStepId);
              var title = esc(step && step.title ? step.title : '');
              var description = esc(step && step.description ? step.description : '');
              var relatedTaskId = esc(step && step.relatedTaskId ? step.relatedTaskId : '');

              return (
                '\n            <li class="next-step-item' + (expanded ? ' is-expanded' : '') + '" data-step-id="' + stepIdAttr + '">\n              <button type="button" class="next-step-header" data-action="select-step" data-step-id="' + stepIdAttr + '" aria-expanded="' + (expanded ? 'true' : 'false') + '">\n                <span class="next-step-title">' + title + '</span>\n                <span class="next-step-toggle-icon" aria-hidden="true">' + (expanded ? '\u2212' : '+') + '</span>\n              </button>\n              <div class="next-step-body"' + (expanded ? '' : ' hidden') + '>\n                <p class="next-step-description">' + description + '</p>' +
                (relatedTaskId
                  ? '\n                <button type="button" class="btn btn-primary next-step-action" data-action="step-primary-action" data-step-id="' + stepIdAttr + '" data-task-id="' + relatedTaskId + '">Go to configuration</button>'
                  : '') +
                '\n              </div>\n            </li>'
              );
            }).join('');
          } else {
            stepsHtml = '\n          <li class="next-step-item is-empty">No suggested next steps are available right now.</li>';
          }

          var headline = esc(overview && overview.headline ? overview.headline : '');
          var subheadline = esc(overview && overview.subheadline ? overview.subheadline : '');
          var activeBotsCount = stats && typeof stats.activeBotsCount === 'number' ? stats.activeBotsCount : 0;
          var activeAutomationsCount = stats && typeof stats.activeAutomationsCount === 'number' ? stats.activeAutomationsCount : 0;
          var activeRoutingRulesCount = stats && typeof stats.activeRoutingRulesCount === 'number' ? stats.activeRoutingRulesCount : 0;
          var connectedIntegrationsCount = stats && typeof stats.connectedIntegrationsCount === 'number' ? stats.connectedIntegrationsCount : 0;

          container.innerHTML = (
            '<div class="home-layout container" data-component="home-shell">\n' +
            '  <section class="home-hero" aria-labelledby="home-overview-heading">\n' +
            '    <div class="home-hero-inner">\n' +
            '      <div class="home-hero-left overview-header" data-component="overview-header">\n' +
            '        <header class="overview-header-content">\n' +
            '          <p class="overview-status-pill">AI customer communications overview</p>\n' +
            '          <h1 id="home-overview-heading" class="overview-heading">' + headline + '</h1>\n' +
            '          <p class="overview-subheading">' + subheadline + '</p>\n' +
            '          <div class="overview-section-tabs" role="tablist" aria-label="Home sections">\n' +
            '            <button type="button" class="section-tab' + (isStatsActive ? ' is-active' : '') + '" role="tab" aria-selected="' + (isStatsActive ? 'true' : 'false') + '" data-section-key="stats" data-action="switch-section">\n' +
            '              Setup stats\n' +
            '            </button>\n' +
            '            <button type="button" class="section-tab' + (isLinksActive ? ' is-active' : '') + '" role="tab" aria-selected="' + (isLinksActive ? 'true' : 'false') + '" data-section-key="links" data-action="switch-section">\n' +
            '              Quick links\n' +
            '            </button>\n' +
            '            <button type="button" class="section-tab' + (isNextStepsActive ? ' is-active' : '') + '" role="tab" aria-selected="' + (isNextStepsActive ? 'true' : 'false') + '" data-section-key="nextSteps" data-action="switch-section">\n' +
            '              Next steps\n' +
            '            </button>\n' +
            '          </div>\n' +
            '        </header>\n' +
            '      </div>\n' +
            '      <aside class="home-hero-right key-stats" data-component="key-stats-summary" data-section-id="stats" tabindex="-1" aria-label="Key setup statistics">\n' +
            '        <div class="card stats-card">\n' +
            '          <h2 class="section-title">Key setup stats</h2>\n' +
            '          <div class="stats-grid">\n' +
            '            <button type="button" class="stat-tile" data-action="stat-tile" data-stat-type="bots">\n' +
            '              <span class="stat-label">Active bots</span>\n' +
            '              <span class="stat-value">' + esc(activeBotsCount) + '</span>\n' +
            '            </button>\n' +
            '            <button type="button" class="stat-tile" data-action="stat-tile" data-stat-type="automations">\n' +
            '              <span class="stat-label">Active automations</span>\n' +
            '              <span class="stat-value">' + esc(activeAutomationsCount) + '</span>\n' +
            '            </button>\n' +
            '            <button type="button" class="stat-tile" data-action="stat-tile" data-stat-type="routing_rules">\n' +
            '              <span class="stat-label">Active routing rules</span>\n' +
            '              <span class="stat-value">' + esc(activeRoutingRulesCount) + '</span>\n' +
            '            </button>\n' +
            '            <button type="button" class="stat-tile" data-action="stat-tile" data-stat-type="integrations">\n' +
            '              <span class="stat-label">Connected integrations</span>\n' +
            '              <span class="stat-value">' + esc(connectedIntegrationsCount) + '</span>\n' +
            '            </button>\n' +
            '          </div>\n' +
            '          <p class="stats-helper-text">Click a tile to manage its configuration.</p>\n' +
            '        </div>\n' +
            '      </aside>\n' +
            '    </div>\n' +
            '  </section>\n' +
            '  <section class="home-secondary" aria-label="Quick links and guided setup">\n' +
            '    <div class="home-secondary-inner">\n' +
            '      <section class="quick-links" data-component="quick-links-list" data-section-id="links" tabindex="-1">\n' +
            '        <div class="card quick-links-card">\n' +
            '          <header class="section-header">\n' +
            '            <h2 class="section-title">Quick links</h2>\n' +
            '            <p class="section-description">Jump directly into frequently used configuration areas.</p>\n' +
            '          </header>\n' +
            '          <ul class="quick-links-list" aria-label="Quick configuration links">' + quickLinksHtml + '\n          </ul>\n' +
            '        </div>\n' +
            '      </section>\n' +
            '      <section class="next-steps" data-component="suggested-next-steps-list" data-section-id="nextSteps" tabindex="-1">\n' +
            '        <div class="card next-steps-card">\n' +
            '          <header class="section-header">\n' +
            '            <h2 class="section-title">Suggested next steps</h2>\n' +
            '            <p class="section-description">Follow these steps to complete your AI communications setup.</p>\n' +
            '          </header>\n' +
            '          <ol class="next-steps-list" aria-label="Suggested next steps">' + stepsHtml + '\n          </ol>\n' +
            '        </div>\n' +
            '      </section>\n' +
            '    </div>\n' +
            '  </section>\n' +
            '</div>'
          );
        }

        function applySectionState(container, activeSectionKey) {
          var sections = container.querySelectorAll('[data-section-id]');
          sections.forEach(function (sec) {
            var key = sec.getAttribute('data-section-id');
            if (key === activeSectionKey) {
              sec.classList.add('is-primary-section');
            } else {
              sec.classList.remove('is-primary-section');
            }
          });

          var tabs = container.querySelectorAll('[data-action="switch-section"]');
          tabs.forEach(function (tab) {
            var key = tab.getAttribute('data-section-key');
            var isActive = key === activeSectionKey;
            tab.classList.toggle('is-active', isActive);
            tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
          });

          var primarySection = container.querySelector('[data-section-id="' + activeSectionKey + '"]');
          if (primarySection && typeof primarySection.scrollIntoView === 'function') {
            primarySection.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }

        function bindHomeEvents(container, overview) {
          // Section switching
          var sectionTabs = container.querySelectorAll('[data-action="switch-section"]');
          sectionTabs.forEach(function (tab) {
            tab.addEventListener('click', function (event) {
              event.preventDefault();
              var key = tab.getAttribute('data-section-key');
              if (!key) return;
              var currentState = getUrlState();
              if (currentState.section === key) return;
              writeUrlState({ section: key });
              var newState = {
                section: key,
                selectedStepId: currentState.selectedStepId
              };
              if (overviewCache) {
                renderAndBind(overviewCache, newState);
              }
            });
          });

          // Stat tiles
          var statTiles = container.querySelectorAll('[data-action="stat-tile"]');
          statTiles.forEach(function (tile) {
            tile.addEventListener('click', function (event) {
              event.preventDefault();
              var statType = tile.getAttribute('data-stat-type');
              var targetUrl = null;
              if (statType === 'bots') {
                targetUrl = 'bots.html?from=home_stats';
              } else if (statType === 'automations') {
                targetUrl = 'automations.html?from=home_stats';
              } else if (statType === 'routing_rules') {
                targetUrl = 'routing.html?from=home_stats';
              } else if (statType === 'integrations') {
                targetUrl = 'integrations.html?from=home_stats';
              }
              if (targetUrl) {
                window.location.href = targetUrl;
              }
            });
          });

          // Quick links
          var quickLinkButtons = container.querySelectorAll('[data-action="quick-link"]');
          quickLinkButtons.forEach(function (btn) {
            btn.addEventListener('click', function (event) {
              event.preventDefault();
              var page = btn.getAttribute('data-page');
              var targetUrl = null;
              if (page === 'bots') {
                targetUrl = 'bots.html?from=home_quick_links';
              } else if (page === 'automations') {
                targetUrl = 'automations.html?from=home_quick_links';
              } else if (page === 'routing_rules') {
                targetUrl = 'routing.html?from=home_quick_links';
              } else if (page === 'analytics') {
                targetUrl = 'analytics_dashboard.html?from=home_quick_links';
              } else if (page === 'integrations') {
                targetUrl = 'integrations.html?from=home_quick_links';
              } else if (page === 'knowledge_base') {
                targetUrl = 'knowledge_base.html?from=home_quick_links';
              } else if (page === 'settings') {
                targetUrl = 'settings.html?from=home_quick_links';
              } else if (page === 'pricing') {
                targetUrl = 'pricing.html?billing=annual&from=home_quick_links';
              }
              if (targetUrl) {
                window.location.href = targetUrl;
              }
            });
          });

          // Suggested next step selection
          var stepHeaders = container.querySelectorAll('[data-action="select-step"]');
          stepHeaders.forEach(function (header) {
            header.addEventListener('click', function (event) {
              event.preventDefault();
              var stepId = header.getAttribute('data-step-id');
              if (!stepId) return;
              var currentState = getUrlState();
              var newSelectedStepId = currentState.selectedStepId === stepId ? null : stepId;
              writeUrlState({ selectedStepId: newSelectedStepId });
              var newState = {
                section: currentState.section,
                selectedStepId: newSelectedStepId
              };
              if (overviewCache) {
                renderAndBind(overviewCache, newState);
              }
            });
          });

          // Suggested next step primary action
          var stepActionButtons = container.querySelectorAll('[data-action="step-primary-action"]');
          stepActionButtons.forEach(function (button) {
            button.addEventListener('click', function (event) {
              event.preventDefault();
              var taskId = button.getAttribute('data-task-id');
              if (!taskId) return;
              var prefix = taskId.split(':')[0];
              var encodedTaskId = encodeURIComponent(taskId);
              var targetUrl = null;

              if (prefix === 'bot') {
                targetUrl = 'bots.html?from=home_next_step&taskId=' + encodedTaskId;
              } else if (prefix === 'automation') {
                targetUrl = 'automations.html?from=home_next_step&taskId=' + encodedTaskId;
              } else if (prefix === 'routing') {
                targetUrl = 'routing.html?from=home_next_step&taskId=' + encodedTaskId;
              } else if (prefix === 'analytics') {
                targetUrl = 'analytics_dashboard.html?from=home_next_step&taskId=' + encodedTaskId;
              } else if (prefix === 'integration') {
                targetUrl = 'integrations.html?from=home_next_step&taskId=' + encodedTaskId;
              } else if (prefix === 'knowledge_base') {
                targetUrl = 'knowledge_base.html?from=home_next_step&taskId=' + encodedTaskId;
              } else if (prefix === 'pricing') {
                targetUrl = 'pricing.html?billing=annual&from=home_next_step&taskId=' + encodedTaskId;
              }

              if (targetUrl) {
                window.location.href = targetUrl;
              }
            });
          });
        }

        function renderAndBind(overview, urlState) {
          renderHomeOverview(homeContainer, overview, urlState);
          bindHomeEvents(homeContainer, overview);
          var sectionKey = urlState && urlState.section ? urlState.section : 'stats';
          applySectionState(homeContainer, sectionKey);
        }

        function loadOverview(options) {
          var opts = options || {};
          var urlState = getUrlState();

          if (!opts.forceReload && overviewCache) {
            renderAndBind(overviewCache, urlState);
            return;
          }

          showLoader(false, 'Loading your AI communications overview85');
          try {
            var overview = WebsiteSDK.getHomeOverview();
            overviewCache = overview;
            hideLoader();
            renderAndBind(overview, urlState);
          } catch (error) {
            console.error('Failed to load home overview', error);
            showLoader(true, 'We could not load your overview. Please retry.');
          }
        }

        if (loaderEl) {
          var retryBtn = loaderEl.querySelector('[data-action="reload-home-overview"]');
          if (retryBtn) {
            retryBtn.addEventListener('click', function (event) {
              event.preventDefault();
              loadOverview({ forceReload: true });
            });
          }
        }

        window.addEventListener('popstate', function () {
          var urlState = getUrlState();
          if (overviewCache) {
            renderAndBind(overviewCache, urlState);
          } else {
            loadOverview({ forceReload: true });
          }
        });

        loadOverview({ forceReload: true });
      });
    })();
  </script>
  <script>
    (function () {
      var yearEl = document.querySelector('[data-year]');
      if (yearEl) {
        yearEl.textContent = new Date().getFullYear();
      }
    })();
  </script>
</body>
</html>
