<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Today's Practice | Wellness &amp; Spirituality Blog</title>
  <meta name="description" content="Displays the daily practice plan for a selected date, showing all scheduled practices with options to reorder, mark as completed, remove items, and navigate to practice details or add more practices." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="todays_practice.css" />
</head>
<body>

      <a href="index.html" class="logo" aria-label="Go to homepage">

      </a>
      <nav class="primary-nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li class="nav-item"><a href="index.html" class="nav-link" title="Homepage">Home</a></li>
          <li class="nav-item"><a href="articles.html" class="nav-link" title="Browse articles and guides">Articles</a></li>
          <li class="nav-item"><a href="meditations.html" class="nav-link" title="Meditation and audio library">Meditations</a></li>
          <li class="nav-item"><a href="quizzes.html" class="nav-link" title="Self-assessment quizzes and check-ins">Quizzes</a></li>
          <li class="nav-item"><a href="journal.html" class="nav-link" title="Personal journaling space">Journal</a></li>
          <li class="nav-item"><a href="events.html" class="nav-link" title="Events and workshops">Events</a></li>
          <li class="nav-item"><a href="affirmations.html" class="nav-link" title="Daily affirmations library">Affirmations</a></li>
          <li class="nav-item"><a href="challenges.html" class="nav-link" title="Multi-day challenges and programs">Challenges</a></li>
          <li class="nav-item"><a href="practices.html" class="nav-link" title="Yoga and other guided practices">Practices</a></li>
          <li class="nav-item"><a href="todays_practice.html" class="nav-link is-current" title="Summary of today&#39;s planned practice">Today&#39;s Practice</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="content" class="site-main" tabindex="-1">
    <div class="todays-practice-page">
      <div class="container todays-practice-container">
        <header class="page-header">
          <h1 class="page-title">Today&#39;s Practice</h1>
        </header>

        <section class="date-selector-toolbar" data-component="date-selector-toolbar">
          <div class="date-selector-inner">
            <button type="button" class="date-nav-button date-nav-button--prev" data-action="previous-date" aria-label="Previous day">&larr;</button>
            <label class="date-selector-label">
              <span class="visually-hidden">Selected date</span>
              <input type="date" class="date-input" data-action="change-date" />
            </label>
            <button type="button" class="date-nav-button date-nav-button--next" data-action="next-date" aria-label="Next day">&rarr;</button>
          </div>
        </section>

        <section class="plan-wrapper" data-component="plan-loader-and-error-boundary" data-populate="todays-practice-plan">
          <!-- JS will render the summary panel, practice list, loading, and error states here. -->
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <div class="footer-left">
        <p class="footer-copy">&copy; 2024 Wellness &amp; Spirituality Blog. All rights reserved.</p>
      </div>
      <div class="footer-right">
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-nav-list">
            <li class="footer-nav-item"><a href="about.html" class="footer-nav-link" title="About this wellness and spirituality blog">About</a></li>
            <li class="footer-nav-item"><a href="contact.html" class="footer-nav-link" title="Contact the site owner">Contact</a></li>
            <li class="footer-nav-item"><a href="privacy_terms.html" class="footer-nav-link" title="Privacy policy and terms of use">Privacy &amp; Terms</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </footer>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var state = {
        currentDate: null,
        plan: null,
        items: [],
        totalDurationMinutes: 0,
        loading: false,
        loadError: null,
        draggingItemId: null
      };

      var planContainer = document.querySelector('[data-populate="todays-practice-plan"]');
      var dateInput = document.querySelector('.date-input');

      if (!planContainer) {
        return;
      }

      function getTodayIsoDate() {
        var now = new Date();
        var year = now.getFullYear();
        var month = String(now.getMonth() + 1).padStart(2, '0');
        var day = String(now.getDate()).padStart(2, '0');
        return year + '-' + month + '-' + day;
      }

      function isValidIsoDate(value) {
        if (typeof value !== 'string') return false;
        if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
        var parts = value.split('-');
        var year = parseInt(parts[0], 10);
        var month = parseInt(parts[1], 10) - 1;
        var day = parseInt(parts[2], 10);
        var date = new Date(year, month, day);
        return date.getFullYear() === year && date.getMonth() === month && date.getDate() === day;
      }

      function toIsoDate(dateObj) {
        var year = dateObj.getFullYear();
        var month = String(dateObj.getMonth() + 1).padStart(2, '0');
        var day = String(dateObj.getDate()).padStart(2, '0');
        return year + '-' + month + '-' + day;
      }

      function formatDisplayDate(isoDate) {
        if (!isoDate || !isValidIsoDate(isoDate)) return '';
        var parts = isoDate.split('-');
        var year = parseInt(parts[0], 10);
        var month = parseInt(parts[1], 10) - 1;
        var day = parseInt(parts[2], 10);
        var date = new Date(year, month, day);
        return date.toLocaleDateString(undefined, {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });
      }

      function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatEnumLabel(value) {
        if (!value) return '';
        return value.split('_').map(function(part) {
          if (!part) return '';
          return part.charAt(0).toUpperCase() + part.slice(1);
        }).join(' ');
      }

      function setDateInputValue(isoDate) {
        if (dateInput && isoDate && isValidIsoDate(isoDate)) {
          dateInput.value = isoDate;
        }
      }

      function resolveInitialDate() {
        var url = new URL(window.location.href);
        var param = url.searchParams.get('date');
        if (param && isValidIsoDate(param)) {
          return param;
        }
        var today = getTodayIsoDate();
        url.searchParams.set('date', today);
        window.history.replaceState({}, '', url);
        return today;
      }

      function renderPlanArea(container) {
        if (!container) return;

        if (state.loading) {
          container.innerHTML = `
            <div class="plan-loading" role="status" aria-live="polite">
              <p>Loading today&#39;s practice...</p>
            </div>
          `;
          return;
        }

        if (state.loadError) {
          container.innerHTML = `
            <div class="plan-error">
              <p>${escapeHtml(state.loadError)}</p>
              <button type="button" class="primary-button" data-action="retry-load">Try again</button>
            </div>
          `;
          return;
        }

        var totalPractices = state.items.length;
        var completedCount = 0;
        for (var i = 0; i < state.items.length; i++) {
          var item = state.items[i];
          if (item && item.practice_item && item.practice_item.is_completed) {
            completedCount++;
          }
        }
        var totalDuration = state.totalDurationMinutes || 0;
        var dateDisplay = formatDisplayDate(state.currentDate);
        var progressPercent = totalPractices === 0 ? 0 : Math.round((completedCount / totalPractices) * 100);

        var listContent = '';
        if (totalPractices === 0) {
          listContent = `
            <div class="empty-plan-state" data-component="empty-plan-state">
              <h2 class="empty-plan-title">No practices scheduled for this day</h2>
              <p class="empty-plan-text">Create a gentle rhythm for your day by adding one or two supportive practices.</p>
              <button type="button" class="primary-button" data-action="add-practices">Add practices</button>
            </div>
          `;
        } else {
          var itemsHtml = state.items.map(function(itemObj) {
            var practiceItem = itemObj.practice_item || {};
            var practice = itemObj.practice || {};
            var isCompleted = !!practiceItem.is_completed;
            var duration = typeof practice.duration_minutes === 'number' ? practice.duration_minutes : '';
            var difficulty = practice.difficulty || '';
            var intention = practice.intention || '';
            var difficultyLabel = difficulty ? formatEnumLabel(difficulty) : '';
            var intentionLabel = intention ? formatEnumLabel(intention) : '';
            var title = practice.title || 'Untitled practice';
            var practiceItemId = practiceItem.id || '';
            var practiceId = practice.id || '';

            return `
              <li class="practice-item-row${isCompleted ? ' practice-item-row--completed' : ''}" data-practice-item-id="${escapeHtml(practiceItemId)}" data-practice-id="${escapeHtml(practiceId)}" draggable="true">
                <div class="practice-item-main">
                  <button type="button" class="practice-completion-toggle" data-action="toggle-completion" aria-pressed="${isCompleted ? 'true' : 'false'}" aria-label="${isCompleted ? 'Mark practice as not completed' : 'Mark practice as completed'}">
                    <span class="completion-indicator"></span>
                  </button>
                  <div class="practice-item-text">
                    <a href="javascript:void(0)" class="practice-title-link" data-action="navigate-practice-details" data-practice-id="${escapeHtml(practiceId)}">
                      ${escapeHtml(title)}
                    </a>
                    <div class="practice-meta">
                      ${duration !== '' ? `<span class="practice-meta-item">${duration} min</span>` : ''}
                      ${difficultyLabel ? `<span class="practice-meta-separator">&bull;</span><span class="practice-meta-item" data-difficulty="${escapeHtml(difficulty)}">${escapeHtml(difficultyLabel)}</span>` : ''}
                      ${intentionLabel ? `<span class="practice-meta-separator">&bull;</span><span class="practice-meta-item" data-intention="${escapeHtml(intention)}">${escapeHtml(intentionLabel)}</span>` : ''}
                    </div>
                  </div>
                </div>
                <div class="practice-item-controls">
                  <button type="button" class="practice-reorder-handle" data-action="reorder-handle" aria-label="Drag to reorder practice">
                    <span class="reorder-icon" aria-hidden="true">⋮⋮</span>
                  </button>
                  <button type="button" class="practice-remove-button" data-action="remove-item" aria-label="Remove practice from today&#39;s plan">
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
              </li>
            `;
          }).join('');

          listContent = `
            <div class="practice-list-wrapper">
              <h2 class="practice-list-heading">Today&#39;s practices</h2>
              <ul class="practice-list" aria-label="Practices for ${escapeHtml(dateDisplay)}">
                ${itemsHtml}
              </ul>
              <div class="practice-list-footer">
                <button type="button" class="link-button" data-action="add-practices">
                  <span class="add-practices-symbol">+</span>
                  <span>Add more practices</span>
                </button>
              </div>
            </div>
          `;
        }

        container.innerHTML = `
          <div class="plan-grid">
            <section class="plan-summary-panel" data-component="plan-summary-panel">
              <header class="plan-summary-header">
                <p class="plan-summary-kicker">Plan for</p>
                <p class="plan-summary-date">${escapeHtml(dateDisplay)}</p>
              </header>
              <dl class="plan-summary-stats">
                <div class="plan-summary-stat">
                  <dt>Total practices</dt>
                  <dd>${totalPractices}</dd>
                </div>
                <div class="plan-summary-stat">
                  <dt>Completed</dt>
                  <dd>${completedCount}</dd>
                </div>
                <div class="plan-summary-stat">
                  <dt>Total duration</dt>
                  <dd>${totalDuration} min</dd>
                </div>
              </dl>
              <div class="plan-summary-progress" aria-label="Completion progress">
                <div class="progress-bar">
                  <div class="progress-bar-fill" style="width: ${progressPercent}%;"></div>
                </div>
                <p class="progress-label">${progressPercent}% complete</p>
              </div>
              <button type="button" class="primary-button plan-summary-add-button" data-action="add-practices">
                <span class="add-practices-symbol">+</span>
                <span>Add more practices</span>
              </button>
            </section>
            <section class="plan-list-column" data-component="todays-practice-list">
              ${listContent}
            </section>
          </div>
        `;
      }

      function loadPlanForDate(isoDate) {
        state.loading = true;
        state.loadError = null;
        renderPlanArea(planContainer);
        try {
          var result = WebsiteSDK.getTodaysPracticeSummary(isoDate);
          state.plan = result && result.plan ? result.plan : null;
          var items = result && Array.isArray(result.items) ? result.items.slice() : [];
          items.sort(function(a, b) {
            var ai = a.practice_item && typeof a.practice_item.order_index === 'number' ? a.practice_item.order_index : 0;
            var bi = b.practice_item && typeof b.practice_item.order_index === 'number' ? b.practice_item.order_index : 0;
            return ai - bi;
          });
          state.items = items;
          state.totalDurationMinutes = result && typeof result.total_duration_minutes === 'number' ? result.total_duration_minutes : 0;
          state.loading = false;
          state.loadError = null;
          renderPlanArea(planContainer);
        } catch (error) {
          console.error('Failed to load today\'s practice plan', error);
          state.loading = false;
          state.loadError = 'Unable to load today\'s practice right now. Please try again.';
          renderPlanArea(planContainer);
        }
      }

      function updateUrlAndLoad(newDate, push) {
        if (!isValidIsoDate(newDate)) return;
        var current = state.currentDate;
        var url = new URL(window.location.href);
        url.searchParams.set('date', newDate);
        if (push) {
          window.history.pushState({}, '', url);
        } else {
          window.history.replaceState({}, '', url);
        }
        state.currentDate = newDate;
        setDateInputValue(newDate);
        if (current !== newDate) {
          loadPlanForDate(newDate);
        }
      }

      function adjustDateBy(days) {
        var baseDate = state.currentDate && isValidIsoDate(state.currentDate) ? state.currentDate : getTodayIsoDate();
        var parts = baseDate.split('-');
        var year = parseInt(parts[0], 10);
        var month = parseInt(parts[1], 10) - 1;
        var day = parseInt(parts[2], 10);
        var dateObj = new Date(year, month, day);
        dateObj.setDate(dateObj.getDate() + days);
        var newIso = toIsoDate(dateObj);
        updateUrlAndLoad(newIso, true);
      }

      function handleToggleCompletion(actionElement) {
        var row = actionElement.closest('.practice-item-row');
        if (!row) return;
        var practiceItemId = row.getAttribute('data-practice-item-id');
        if (!practiceItemId) return;
        var index = -1;
        for (var i = 0; i < state.items.length; i++) {
          if (state.items[i].practice_item && state.items[i].practice_item.id === practiceItemId) {
            index = i;
            break;
          }
        }
        if (index === -1) return;
        var item = state.items[index];
        var oldValue = !!item.practice_item.is_completed;
        var newValue = !oldValue;
        item.practice_item.is_completed = newValue;
        renderPlanArea(planContainer);
        try {
          var res = WebsiteSDK.updateTodaysPracticeItemCompletion(practiceItemId, newValue);
          if (!res || !res.success) {
            throw new Error('Update failed');
          }
        } catch (error) {
          console.error('Failed to update completion', error);
          item.practice_item.is_completed = oldValue;
          renderPlanArea(planContainer);
          window.alert('We could not update this practice. Please try again.');
        }
      }

      function handleRemoveItem(actionElement) {
        var row = actionElement.closest('.practice-item-row');
        if (!row) return;
        var practiceItemId = row.getAttribute('data-practice-item-id');
        if (!practiceItemId) return;
        var confirmed = window.confirm('Remove this practice from your plan?');
        if (!confirmed) return;
        var previousItems = state.items.slice();
        try {
          var res = WebsiteSDK.removeTodaysPracticeItem(practiceItemId);
          if (!res || !res.success) {
            throw new Error('Removal failed');
          }
          state.items = state.items.filter(function(item) {
            return !(item.practice_item && item.practice_item.id === practiceItemId);
          });
          renderPlanArea(planContainer);
        } catch (error) {
          console.error('Failed to remove practice', error);
          state.items = previousItems;
          renderPlanArea(planContainer);
          window.alert('We could not remove this practice. Please try again.');
        }
      }

      function handleReorder(previousIndex, nextIndex) {
        if (previousIndex === nextIndex) return;
        if (previousIndex < 0 || nextIndex < 0) return;
        if (previousIndex >= state.items.length || nextIndex >= state.items.length) return;
        var planId = state.plan && state.plan.id ? state.plan.id : null;
        if (!planId) {
          return;
        }
        var previousItems = state.items.slice();
        var items = state.items.slice();
        var moved = items.splice(previousIndex, 1)[0];
        items.splice(nextIndex, 0, moved);
        state.items = items;
        renderPlanArea(planContainer);
        try {
          var orderedIds = state.items.map(function(item) {
            return item.practice_item && item.practice_item.id ? item.practice_item.id : '';
          }).filter(function(id) { return id !== ''; });
          var res = WebsiteSDK.updateTodaysPracticeOrder(planId, orderedIds);
          if (!res || !res.success) {
            throw new Error('Reorder failed');
          }
        } catch (error) {
          console.error('Failed to update order', error);
          state.items = previousItems;
          renderPlanArea(planContainer);
          window.alert('We could not save the new order. Please try again.');
        }
      }

      function handleAddPractices() {
        var url = 'practices.html';
        if (state.currentDate && isValidIsoDate(state.currentDate)) {
          url += '?date=' + encodeURIComponent(state.currentDate);
        }
        window.location.href = url;
      }

      function handleNavigatePracticeDetails(actionElement) {
        var practiceId = actionElement.getAttribute('data-practice-id');
        if (!practiceId) return;
        var url = 'practices.html?practiceId=' + encodeURIComponent(practiceId);
        window.location.href = url;
      }

      function handleRetryLoad() {
        var dateToUse = state.currentDate || resolveInitialDate();
        updateUrlAndLoad(dateToUse, false);
      }

      // Initialize date state and first load
      state.currentDate = resolveInitialDate();
      setDateInputValue(state.currentDate);
      loadPlanForDate(state.currentDate);

      // Date input change handler
      if (dateInput) {
        dateInput.addEventListener('change', function(event) {
          var value = event.target.value;
          if (!value) {
            return;
          }
          if (!isValidIsoDate(value)) {
            window.alert('Please choose a valid date.');
            setDateInputValue(state.currentDate);
            return;
          }
          updateUrlAndLoad(value, true);
        });
      }

      // Global click handler based on data-action
      document.addEventListener('click', function(event) {
        var actionElement = event.target.closest('[data-action]');
        if (!actionElement) return;
        var action = actionElement.getAttribute('data-action');
        switch (action) {
          case 'previous-date':
            event.preventDefault();
            adjustDateBy(-1);
            break;
          case 'next-date':
            event.preventDefault();
            adjustDateBy(1);
            break;
          case 'retry-load':
            event.preventDefault();
            handleRetryLoad();
            break;
          case 'add-practices':
            event.preventDefault();
            handleAddPractices();
            break;
          case 'toggle-completion':
            event.preventDefault();
            handleToggleCompletion(actionElement);
            break;
          case 'remove-item':
            event.preventDefault();
            handleRemoveItem(actionElement);
            break;
          case 'navigate-practice-details':
            event.preventDefault();
            handleNavigatePracticeDetails(actionElement);
            break;
          default:
            break;
        }
      });

      // Drag-and-drop reordering
      planContainer.addEventListener('dragstart', function(event) {
        var row = event.target.closest('.practice-item-row');
        if (!row) return;
        state.draggingItemId = row.getAttribute('data-practice-item-id');
        row.classList.add('is-dragging');
        if (event.dataTransfer) {
          event.dataTransfer.effectAllowed = 'move';
          try {
            event.dataTransfer.setData('text/plain', state.draggingItemId || '');
          } catch (e) {
            // Some browsers may restrict setData in certain contexts
          }
        }
      });

      planContainer.addEventListener('dragend', function() {
        var draggingRow = planContainer.querySelector('.practice-item-row.is-dragging');
        if (draggingRow) {
          draggingRow.classList.remove('is-dragging');
        }
        state.draggingItemId = null;
      });

      planContainer.addEventListener('dragover', function(event) {
        var row = event.target.closest('.practice-item-row');
        if (!row) return;
        event.preventDefault();
        if (event.dataTransfer) {
          event.dataTransfer.dropEffect = 'move';
        }
      });

      planContainer.addEventListener('drop', function(event) {
        var targetRow = event.target.closest('.practice-item-row');
        if (!targetRow) return;
        event.preventDefault();
        var fromId = state.draggingItemId;
        var toId = targetRow.getAttribute('data-practice-item-id');
        if (!fromId || !toId || fromId === toId) return;
        var fromIndex = -1;
        var toIndex = -1;
        for (var i = 0; i < state.items.length; i++) {
          var item = state.items[i];
          if (item.practice_item && item.practice_item.id === fromId) {
            fromIndex = i;
          }
          if (item.practice_item && item.practice_item.id === toId) {
            toIndex = i;
          }
        }
        if (fromIndex === -1 || toIndex === -1) return;
        handleReorder(fromIndex, toIndex);
      });

      // Handle browser back/forward navigation
      window.addEventListener('popstate', function() {
        var url = new URL(window.location.href);
        var dateParam = url.searchParams.get('date');
        if (!dateParam || !isValidIsoDate(dateParam)) {
          return;
        }
        if (dateParam === state.currentDate) {
          return;
        }
        state.currentDate = dateParam;
        setDateInputValue(dateParam);
        loadPlanForDate(dateParam);
      });
    });
  </script>
</body>
</html>
