  <main id='content' class='site-main' tabindex='-1'>
    <div class='quiz-page'>
      <div class='quiz-page-inner container'>
        <section class='quiz-header-section' data-component='quiz-header' data-populate='quiz-header' aria-live='polite'>
          <!-- Quiz header will be rendered here -->
        </section>

        <section class='status-messages' data-component='status-messages' data-populate='status-messages' aria-live='polite'>
          <!-- Status messages (errors, validation, info) -->
        </section>

        <section class='quiz-main-area'>
          <section class='question-form-card' data-component='question-form' data-populate='question' aria-live='polite'>
            <!-- Active question will be rendered here -->
          </section>

          <section class='result-panel-card is-hidden' data-component='result-panel' data-populate='result' aria-live='polite'>
            <!-- Result panel will be rendered here after submission -->
          </section>

          <div class='quiz-controls-cluster'>
            <div class='quiz-navigation' data-component='navigation-controls' data-populate='navigation'>
              <!-- Navigation controls (Previous, Next, Submit) will be rendered here -->
            </div>
            <div class='answer-status-text' data-component='answer-state-manager' aria-live='polite'>
              <!-- Subtle answer state messages (e.g., Progress saved) -->
            </div>
          </div>
        </section>

        <div class='quiz-loader-overlay is-hidden' data-component='quiz-detail-loader' aria-hidden='true'>
          <div class='quiz-loader-content'>
            <div class='quiz-spinner' aria-hidden='true'></div>
            <p class='quiz-loader-message' data-populate='loader-message'>Loading your quiz...</p>

            <li class='footer-nav-item'><a href='contact.html' class='footer-nav-link' title='Contact the site owner'>Contact</a></li>

  <script src='business_logic.js'></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // Utility: simple HTML escaping for dynamic text
    function escapeHtml(value) {
      if (value == null) return '';
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    var urlParams = new URLSearchParams(window.location.search);
    var quizId = urlParams.get('quizId');
    var requestedViewParam = urlParams.get('view');

    var headerEl = document.querySelector('[data-component=quiz-header]');
    var statusEl = document.querySelector('[data-component=status-messages]');
    var questionFormEl = document.querySelector('[data-component=question-form]');
    var navEl = document.querySelector('[data-component=navigation-controls]');
    var answerStatusEl = document.querySelector('[data-component=answer-state-manager]');
    var resultPanelEl = document.querySelector('[data-component=result-panel]');
    var loaderEl = document.querySelector('[data-component=quiz-detail-loader]');

    var state = {
      quiz: null,
      questions: [], // [{ question, answer_options }]
      currentIndex: 0, // 0-based
      answers: {}, // questionId -> { selected_option_ids, numeric_value, text_response }
      quizResult: null,
      isLoadingQuiz: false,
      isSubmitting: false,
      view: 'questions' // 'questions' or 'result'
    };

    function syncUrl(updates) {
      var current = new URL(window.location.href);
      if (updates) {
        Object.keys(updates).forEach(function(key) {
          var value = updates[key];
          if (value == null || value === '') {
            current.searchParams.delete(key);
          } else {
            current.searchParams.set(key, value);
          }
        });
      }
      window.history.replaceState({}, '', current.toString());
    }

    function showLoader(message) {
      if (!loaderEl) return;
      loaderEl.classList.remove('is-hidden');
      loaderEl.setAttribute('aria-hidden', 'false');
      var msgEl = loaderEl.querySelector('.quiz-loader-message');
      if (msgEl && message) {
        msgEl.textContent = message;
      }
    }

    function hideLoader() {
      if (!loaderEl) return;
      loaderEl.classList.add('is-hidden');
      loaderEl.setAttribute('aria-hidden', 'true');
    }

    function clearStatusMessage() {
      if (!statusEl) return;
      statusEl.innerHTML = '';
    }

    function setStatusMessage(type, text, options) {
      if (!statusEl) return;
      var classes = {
        error: 'status-message status-message--error',
        info: 'status-message status-message--info',
        success: 'status-message status-message--success',
        validation: 'status-message status-message--validation'
      };
      var cls = classes[type] || classes.info;
      var extraHtml = '';
      if (options && options.includeRetry) {
        extraHtml = "<button type='button' class='btn-link status-retry-button' data-action='retry-load'>Retry</button>";
      }
      statusEl.innerHTML = "<div class='" + cls + "' role='status'><p>" + escapeHtml(text) + "</p>" + extraHtml + '</div>';
    }

    function updateAnswerStatus(text) {
      if (!answerStatusEl) return;
      answerStatusEl.textContent = text || '';
    }

    function clampQuestionIndex(index) {
      if (!state.questions.length) return 0;
      if (index < 0) return 0;
      if (index >= state.questions.length) return state.questions.length - 1;
      return index;
    }

    function renderQuizHeader(container) {
      if (!container) return;
      if (!state.quiz) {
        container.innerHTML = '';
        return;
      }
      var quiz = state.quiz;
      var total = state.questions.length || quiz.num_questions || 0;
      var progressText = '';
      if (state.view === 'result' && state.quizResult) {
        progressText = 'Completed';
      } else if (total > 0) {
        progressText = 'Question ' + (state.currentIndex + 1) + ' of ' + total;
      }

      var metaParts = [];
      if (quiz.topic) metaParts.push(quiz.topic);
      if (total) metaParts.push(total + ' question' + (total === 1 ? '' : 's'));
      if (quiz.estimated_duration_minutes) metaParts.push(quiz.estimated_duration_minutes + ' min');
      var metaText = metaParts.join(' ␀b7 ');

      container.innerHTML = [
        "<div class='quiz-header-inner'>",
        "  <div class='quiz-header-main'>",
        "    <h1 class='quiz-title'>" + escapeHtml(quiz.title) + '</h1>',
        quiz.description ? "    <p class='quiz-description'>" + escapeHtml(quiz.description) + '</p>' : '',
        '  </div>',
        "  <div class='quiz-header-meta'>",
        metaText ? "    <p class='quiz-meta'>" + escapeHtml(metaText) + '</p>' : '',
        progressText ? "    <p class='quiz-progress-label'>" + escapeHtml(progressText) + '</p>' : '',
        '  </div>',
        '</div>'
      ].join('\n');
    }

    function renderQuestion(container) {
      if (!container) return;
      if (!state.quiz || !state.questions.length || state.view !== 'questions') {
        container.innerHTML = '';
        return;
      }

      var item = state.questions[state.currentIndex];
      if (!item || !item.question) {
        container.innerHTML = '';
        return;
      }

      var q = item.question;
      var options = item.answer_options || [];
      var answer = state.answers[q.id] || {};
      var requiredLabel = q.required ? "<span class='question-required'>Required</span>" : '';
      var helpText = q.help_text ? "<p class='question-help'>" + escapeHtml(q.help_text) + '</p>' : '';

      var optionsHtml = '';
      if (q.question_type === 'single_choice') {
        optionsHtml = options.map(function(opt) {
          var selected = Array.isArray(answer.selected_option_ids) && answer.selected_option_ids.indexOf(opt.id) !== -1;
          var checkedAttr = selected ? ' checked' : '';
          return [
            "<label class='option-item'>",
            "  <input type='radio' name='q_" + escapeHtml(q.id) + "' value='" + escapeHtml(opt.id) + "'" + checkedAttr + '>',
            "  <span class='option-label-text'>" + escapeHtml(opt.text) + '</span>',
            '</label>'
          ].join('\n');
        }).join('\n');
      } else if (q.question_type === 'multiple_choice') {
        optionsHtml = options.map(function(opt) {
          var selected = Array.isArray(answer.selected_option_ids) && answer.selected_option_ids.indexOf(opt.id) !== -1;
          var checkedAttr = selected ? ' checked' : '';
          return [
            "<label class='option-item'>",
            "  <input type='checkbox' name='q_" + escapeHtml(q.id) + "' value='" + escapeHtml(opt.id) + "'" + checkedAttr + '>',
            "  <span class='option-label-text'>" + escapeHtml(opt.text) + '</span>',
            '</label>'
          ].join('\n');
        }).join('\n');
      } else if (q.question_type === 'scale') {
        optionsHtml = [
          "<div class='scale-options'>",
          options.map(function(opt) {
            var selected = Array.isArray(answer.selected_option_ids) && answer.selected_option_ids.indexOf(opt.id) !== -1;
            var checkedAttr = selected ? ' checked' : '';
            var numericVal = typeof opt.value === 'number' ? String(opt.value) : '';
            return [
              "  <label class='scale-option-item'>",
              "    <input type='radio' class='scale-option-input' name='q_" + escapeHtml(q.id) + "' value='" + escapeHtml(opt.id) + "' data-option-value='" + escapeHtml(numericVal) + "'" + checkedAttr + '>',
              "    <span class='scale-option-label'>" + escapeHtml(opt.text) + '</span>',
              '  </label>'
            ].join('\n');
          }).join('\n'),
          '</div>'
        ].join('\n');
      } else if (q.question_type === 'open_ended') {
        var textValue = typeof answer.text_response === 'string' ? answer.text_response : '';
        optionsHtml = [
          "<div class='open-ended-wrapper'>",
          "  <textarea class='open-ended-input' name='q_" + escapeHtml(q.id) + "' rows='5' placeholder='Type your response here...'>" + escapeHtml(textValue) + '</textarea>',
          '</div>'
        ].join('\n');
      }

      container.innerHTML = [
        "<article class='question-card' data-question-id='" + escapeHtml(q.id) + "' data-question-type='" + escapeHtml(q.question_type) + "'>",
        "  <header class='question-card-header'>",
        "    <p class='question-step-label'>Question " + (state.currentIndex + 1) + ' of ' + state.questions.length + '</p>',
        "    <h2 class='question-text'>" + escapeHtml(q.text) + '</h2>',
        helpText,
        requiredLabel,
        '  </header>',
        "  <div class='question-card-body'>",
        optionsHtml,
        '  </div>',
        '</article>'
      ].join('\n');
    }

    function renderNavigation(container) {
      if (!container) return;
      if (!state.quiz || !state.questions.length || state.view !== 'questions') {
        container.innerHTML = '';
        return;
      }
      var total = state.questions.length;
      var isFirst = state.currentIndex === 0;
      var isLast = state.currentIndex === total - 1;

      var prevDisabledAttr = isFirst ? " disabled aria-disabled='true'" : '';

      var prevButtonHtml = [
        "<button type='button' class='btn-link nav-prev' data-action='prev-question'" + prevDisabledAttr + '>',
        'Previous',
        '</button>'
      ].join('\n');

      var primaryButtonHtml;
      if (!isLast) {
        primaryButtonHtml = [
          "<button type='button' class='btn-primary nav-next' data-action='next-question'>",
          'Next',
          '</button>'
        ].join('\n');
      } else {
        primaryButtonHtml = [
          "<button type='button' class='btn-primary nav-submit' data-action='submit-quiz'>",
          'Submit',
          '</button>'
        ].join('\n');
      }

      container.innerHTML = [
        "<div class='quiz-navigation-inner'>",
        "  <div class='nav-left'>",
        prevButtonHtml,
        '  </div>',
        "  <div class='nav-right'>",
        primaryButtonHtml,
        '  </div>',
        '</div>'
      ].join('\n');
    }

    function renderResultPanel(container) {
      if (!container) return;
      if (!state.quizResult || !state.quiz || state.view !== 'result') {
        container.innerHTML = '';
        container.classList.add('is-hidden');
        return;
      }

      var r = state.quizResult;
      var quiz = state.quiz;

      var scoreHtml = '';
      if (typeof r.overall_score === 'number') {
        scoreHtml = "<p class='result-score'>Score: " + escapeHtml(r.overall_score) + '</p>';
      }

      var summaryHtml = '';
      if (r.summary) {
        summaryHtml = "<p class='result-summary'>" + escapeHtml(r.summary) + '</p>';
      }

      container.innerHTML = [
        "<div class='result-panel-inner'>",
        "  <header class='result-header'>",
        "    <p class='result-quiz-title'>" + escapeHtml(quiz.title) + '</p>',
        "    <h2 class='result-overall-label'>" + escapeHtml(r.overall_label) + '</h2>',
        scoreHtml,
        '  </header>',
        "  <div class='result-content'>",
        "    <div class='result-main'>",
        summaryHtml || "<p class='result-summary'>Thank you for taking a moment to check in. Your responses have been gently translated into this reflection.</p>",
        '    </div>',
        "    <aside class='result-side'>",
        "      <div class='result-callout'>",
        "        <h3 class='result-callout-title'>Reflect in your journal</h3>",
        "        <p class='result-callout-text'>Take a few minutes to write about what this result brings up for you: any emotions, surprises, or intentions you would like to set.</p>",
        "        <button type='button' class='btn-primary result-journal-btn' data-action='reflect-in-journal'>",
        'Go to Journal',
        '        </button>',
        "        <button type='button' class='btn-link result-retake-btn' data-action='retake-quiz'>",
        'Retake this quiz',
        '        </button>',
        '      </div>',
        '    </aside>',
        '  </div>',
        '</div>'
      ].join('\n');

      container.classList.remove('is-hidden');
    }

    function renderAll() {
      renderQuizHeader(headerEl);
      if (state.view === 'result' && state.quizResult) {
        if (questionFormEl) questionFormEl.classList.add('is-hidden');
        if (resultPanelEl) resultPanelEl.classList.remove('is-hidden');
        renderResultPanel(resultPanelEl);
        renderNavigation(navEl); // hides nav
      } else {
        if (questionFormEl) questionFormEl.classList.remove('is-hidden');
        if (resultPanelEl) resultPanelEl.classList.add('is-hidden');
        renderQuestion(questionFormEl);
        renderNavigation(navEl);
      }
    }

    function validateQuestion(question, answer) {
      if (!question || !question.required) return null;
      var type = question.question_type;
      if (type === 'single_choice' || type === 'multiple_choice' || type === 'scale') {
        if (!answer || !Array.isArray(answer.selected_option_ids) || !answer.selected_option_ids.length) {
          return 'Please choose at least one option to continue.';
        }
      } else if (type === 'open_ended') {
        if (!answer || typeof answer.text_response !== 'string' || !answer.text_response.trim()) {
          return 'Please share a short response before moving on.';
        }
      }
      return null;
    }

    function validateAllQuestions() {
      for (var i = 0; i < state.questions.length; i++) {
        var item = state.questions[i];
        var q = item.question;
        var ans = state.answers[q.id];
        var err = validateQuestion(q, ans);
        if (err) {
          return { index: i, message: err };
        }
      }
      return null;
    }

    function buildAnswersPayload() {
      var payload = [];
      for (var i = 0; i < state.questions.length; i++) {
        var q = state.questions[i].question;
        var stored = state.answers[q.id] || {};
        var entry = { question_id: q.id };
        if (Array.isArray(stored.selected_option_ids) && stored.selected_option_ids.length) {
          entry.selected_option_ids = stored.selected_option_ids.slice();
        }
        if (typeof stored.numeric_value === 'number') {
          entry.numeric_value = stored.numeric_value;
        }
        if (typeof stored.text_response === 'string' && stored.text_response.trim() !== '') {
          entry.text_response = stored.text_response;
        }
        payload.push(entry);
      }
      return payload;
    }

    function handlePrevious() {
      if (!state.questions.length || state.currentIndex === 0) return;
      clearStatusMessage();
      state.currentIndex = clampQuestionIndex(state.currentIndex - 1);
      state.view = 'questions';
      syncUrl({ quizId: quizId || '', q: String(state.currentIndex + 1), view: 'questions' });
      renderAll();
      updateAnswerStatus('');
    }

    function handleNext() {
      if (!state.questions.length) return;
      var item = state.questions[state.currentIndex];
      var q = item.question;
      var ans = state.answers[q.id];
      var err = validateQuestion(q, ans);
      if (err) {
        setStatusMessage('validation', err);
        return;
      }
      clearStatusMessage();
      state.currentIndex = clampQuestionIndex(state.currentIndex + 1);
      state.view = 'questions';
      syncUrl({ quizId: quizId || '', q: String(state.currentIndex + 1), view: 'questions' });
      renderAll();
      updateAnswerStatus('');
    }

    function handleSubmit() {
      if (!state.quiz || !state.questions.length || state.isSubmitting) return;
      var validation = validateAllQuestions();
      if (validation) {
        state.currentIndex = clampQuestionIndex(validation.index);
        state.view = 'questions';
        setStatusMessage('validation', validation.message);
        syncUrl({ quizId: quizId || '', q: String(state.currentIndex + 1), view: 'questions' });
        renderAll();
        return;
      }

      clearStatusMessage();
      state.isSubmitting = true;
      updateAnswerStatus('Submitting your responses...');
      showLoader('Submitting your responses...');

      try {
        var answersPayload = buildAnswersPayload();
        var response = WebsiteSDK.submitQuizAnswers(state.quiz.id, answersPayload);
        if (response && response.success && response.quiz_result) {
          state.quizResult = response.quiz_result;
          state.view = 'result';
          state.isSubmitting = false;
          hideLoader();
          setStatusMessage('success', 'Your quiz is complete. Here is your reflection.');
          syncUrl({ quizId: quizId || '', view: 'result' });
          updateAnswerStatus('');
          renderAll();
        } else {
          state.isSubmitting = false;
          hideLoader();
          var msg = response && response.message ? response.message : 'We were not able to process your responses. Please try again.';
          setStatusMessage('error', msg);
          updateAnswerStatus('');
        }
      } catch (e) {
        state.isSubmitting = false;
        hideLoader();
        setStatusMessage('error', 'Something went wrong while submitting. Please try again.');
        updateAnswerStatus('');
      }
    }

    function handleReflectInJournal() {
      window.location.href = 'journal.html';
    }

    function handleRetakeQuiz() {
      state.answers = {};
      state.quizResult = null;
      state.view = 'questions';
      state.currentIndex = 0;
      clearStatusMessage();
      updateAnswerStatus('');
      syncUrl({ quizId: quizId || '', q: '1', view: 'questions' });
      renderAll();
    }

    function handleRetryLoad() {
      if (!quizId) return;
      clearStatusMessage();
      loadQuiz();
    }

    function handleQuestionInputChange(event) {
      if (!state.questions.length) return;
      var target = event.target;
      if (!target) return;

      var card = target.closest('.question-card');
      if (!card) return;
      var questionId = card.getAttribute('data-question-id');
      var questionType = card.getAttribute('data-question-type');
      if (!questionId || !questionType) return;

      var currentAnswer = state.answers[questionId] || {};

      if (target.matches('input[type=radio]')) {
        var selectedId = target.value;
        currentAnswer = { selected_option_ids: selectedId ? [selectedId] : [] };
        if (questionType === 'scale') {
          var rawVal = target.getAttribute('data-option-value');
          var numVal = rawVal != null && rawVal !== '' ? Number(rawVal) : NaN;
          if (!isNaN(numVal)) {
            currentAnswer.numeric_value = numVal;
          }
        }
        state.answers[questionId] = currentAnswer;
        clearStatusMessage();
        updateAnswerStatus('Answer updated.');
      } else if (target.matches('input[type=checkbox]')) {
        var checkboxes = card.querySelectorAll("input[type=checkbox][name='" + target.name + "']");
        var selected = [];
        for (var i = 0; i < checkboxes.length; i++) {
          if (checkboxes[i].checked) selected.push(checkboxes[i].value);
        }
        state.answers[questionId] = { selected_option_ids: selected };
        clearStatusMessage();
        updateAnswerStatus('Answer updated.');
      } else if (target.matches('textarea')) {
        var text = target.value || '';
        state.answers[questionId] = { text_response: text };
        // Do not clear status aggressively here; just subtle feedback
        updateAnswerStatus('Answer updated.');
      }
    }

    function attachEventListeners() {
      if (questionFormEl) {
        questionFormEl.addEventListener('change', handleQuestionInputChange);
        questionFormEl.addEventListener('input', function(event) {
          if (event.target && event.target.matches('textarea')) {
            handleQuestionInputChange(event);
          }
        });
      }

      document.addEventListener('click', function(event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        var action = actionEl.getAttribute('data-action');
        if (!action) return;

        if (action === 'prev-question') {
          event.preventDefault();
          handlePrevious();
        } else if (action === 'next-question') {
          event.preventDefault();
          handleNext();
        } else if (action === 'submit-quiz') {
          event.preventDefault();
          handleSubmit();
        } else if (action === 'reflect-in-journal') {
          event.preventDefault();
          handleReflectInJournal();
        } else if (action === 'retake-quiz') {
          event.preventDefault();
          handleRetakeQuiz();
        } else if (action === 'retry-load') {
          event.preventDefault();
          handleRetryLoad();
        }
      });
    }

    function loadQuiz() {
      if (!quizId) {
        setStatusMessage('error', 'No quiz is selected. Please return to the quizzes page and choose a check-in.');
        if (questionFormEl) questionFormEl.innerHTML = '';
        if (navEl) navEl.innerHTML = '';
        return;
      }

      state.isLoadingQuiz = true;
      showLoader('Loading your quiz...');
      clearStatusMessage();

      try {
        var detail = WebsiteSDK.getQuizDetail(quizId);
        if (!detail || !detail.quiz || !Array.isArray(detail.questions) || !detail.questions.length) {
          throw new Error('Quiz not found');
        }

        // Sort questions by order_index
        state.quiz = detail.quiz;
        state.questions = detail.questions.slice().sort(function(a, b) {
          var ao = a.question && typeof a.question.order_index === 'number' ? a.question.order_index : 0;
          var bo = b.question && typeof b.question.order_index === 'number' ? b.question.order_index : 0;
          return ao - bo;
        });

        // Determine initial question index from q param
        var qParam = urlParams.get('q');
        var qIndex = parseInt(qParam || '1', 10);
        if (isNaN(qIndex) || qIndex < 1) qIndex = 1;
        if (qIndex > state.questions.length) qIndex = state.questions.length;
        state.currentIndex = clampQuestionIndex(qIndex - 1);

        // Determine initial view
        if (requestedViewParam === 'result') {
          state.view = 'questions';
          setStatusMessage('info', 'A saved result is not available in this session. Please complete the quiz again to see your insights.');
          syncUrl({ quizId: quizId || '', q: String(state.currentIndex + 1), view: 'questions' });
        } else {
          state.view = 'questions';
          syncUrl({ quizId: quizId || '', q: String(state.currentIndex + 1) });
        }

        state.isLoadingQuiz = false;
        hideLoader();
        renderAll();
      } catch (e) {
        state.isLoadingQuiz = false;
        hideLoader();
        setStatusMessage('error', 'We could not load this quiz right now. Please check your connection and try again.', { includeRetry: true });
        if (questionFormEl) questionFormEl.innerHTML = '';
        if (navEl) navEl.innerHTML = '';
      }
    }

    attachEventListeners();
    loadQuiz();
  });
  </script>
</body>
</html>
