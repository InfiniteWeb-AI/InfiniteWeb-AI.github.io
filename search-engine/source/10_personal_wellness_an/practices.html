  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      'use strict';

      // --- URL state parsing ---
      function parseNumberParam(value) {
        if (value === null || value === '') return null;
        var n = Number(value);
        return Number.isFinite(n) ? n : null;
      }

      var urlParams = new URLSearchParams(window.location.search || '');
      var rawState = {
        difficulty: urlParams.get('difficulty'),
        intention: urlParams.get('intention'),
        min_duration: parseNumberParam(urlParams.get('min_duration')),
        max_duration: parseNumberParam(urlParams.get('max_duration')),
        sort: urlParams.get('sort'),
        page: parseNumberParam(urlParams.get('page')) || 1,
        practiceId: urlParams.get('practiceId')
      };

      var filterOptions = null;
      try {
        filterOptions = WebsiteSDK.getPracticeFilterOptions();
      } catch (e) {
        console.error('Error loading practice filter options', e);
      }

      function buildEffectiveState(baseState, options) {
        var state = {
          difficulty: null,
          intention: null,
          min_duration: baseState.min_duration,
          max_duration: baseState.max_duration,
          sort: baseState.sort,
          page: baseState.page,
          practiceId: baseState.practiceId
        };

        if (options && options.difficulties && baseState.difficulty) {
          var hasDifficulty = options.difficulties.some(function (d) { return d.value === baseState.difficulty; });
          if (hasDifficulty) {
            state.difficulty = baseState.difficulty;
          }
        } else {
          state.difficulty = baseState.difficulty;
        }

        if (options && options.intentions && baseState.intention) {
          var hasIntention = options.intentions.some(function (i) { return i.value === baseState.intention; });
          if (hasIntention) {
            state.intention = baseState.intention;
          }
        } else {
          state.intention = baseState.intention;
        }

        if (options && typeof options.duration_min === 'number') {
          if (state.min_duration !== null && state.min_duration < options.duration_min) {
            state.min_duration = null;
          }
        }
        if (options && typeof options.duration_max === 'number') {
          if (state.max_duration !== null && state.max_duration > options.duration_max) {
            state.max_duration = null;
          }
        }

        var allowedSorts = ['top_rated', 'most_popular', 'duration_shortest_first', 'newest_first'];
        if (state.sort && allowedSorts.indexOf(state.sort) === -1) {
          state.sort = null;
        }

        if (!state.page || state.page < 1) {
          state.page = 1;
        }

        return state;
      }

      var effectiveState = buildEffectiveState(rawState, filterOptions);

      // --- Data fetching for practices list (cached) ---
      var practicesListResponse = null;
      var DEFAULT_PAGE_SIZE = 12;

      function getPracticesListResponse() {
        if (practicesListResponse) return practicesListResponse;

        var difficultyParam = effectiveState.difficulty || undefined;
        var intentionParam = effectiveState.intention || undefined;
        var minDurationParam = effectiveState.min_duration !== null ? effectiveState.min_duration : undefined;
        var maxDurationParam = effectiveState.max_duration !== null ? effectiveState.max_duration : undefined;
        var sortParam = effectiveState.sort || undefined;
        var pageParam = effectiveState.page || 1;
        var pageSizeParam = DEFAULT_PAGE_SIZE;

        try {
          practicesListResponse = WebsiteSDK.getPracticesList(
            difficultyParam,
            intentionParam,
            minDurationParam,
            maxDurationParam,
            sortParam,
            pageParam,
            pageSizeParam
          );
        } catch (e) {
          console.error('Error loading practices list', e);
          practicesListResponse = {
            page: pageParam,
            page_size: pageSizeParam,
            total_items: 0,
            items: [],
            error: true
          };
        }

        return practicesListResponse;
      }

      // --- Rendering helpers ---

      function renderPracticeFilterForm(container, options, state) {
        var difficulties = (options && options.difficulties) ? options.difficulties : [];
        var intentions = (options && options.intentions) ? options.intentions : [];

        var difficultyOptionsHtml = '<option value="">All levels</option>';
        difficulties.forEach(function (d) {
          var selected = (state.difficulty === d.value) ? ' selected' : '';
          difficultyOptionsHtml += '<option value="' + String(d.value) + '"' + selected + '>' + String(d.label || d.value) + '</option>';
        });

        var intentionOptionsHtml = '<option value="">Any intention</option>';
        intentions.forEach(function (i) {
          var selected = (state.intention === i.value) ? ' selected' : '';
          intentionOptionsHtml += '<option value="' + String(i.value) + '"' + selected + '>' + String(i.label || i.value) + '</option>';
        });

        var minDurationValue = state.min_duration !== null ? String(state.min_duration) : '';
        var maxDurationValue = state.max_duration !== null ? String(state.max_duration) : '';

        var sortOptions = [
          { value: '', label: 'Sort by' },
          { value: 'top_rated', label: 'Top rated' },
          { value: 'most_popular', label: 'Most popular' },
          { value: 'duration_shortest_first', label: 'Shortest first' },
          { value: 'newest_first', label: 'Newest first' }
        ];

        var sortOptionsHtml = '';
        sortOptions.forEach(function (s) {
          var selected = (state.sort === s.value) ? ' selected' : '';
          sortOptionsHtml += '<option value="' + String(s.value) + '"' + selected + '>' + String(s.label) + '</option>';
        });

        var minAttr = (options && typeof options.duration_min === 'number') ? ' min="' + String(options.duration_min) + '"' : '';
        var maxAttr = (options && typeof options.duration_max === 'number') ? ' max="' + String(options.duration_max) + '"' : '';

        container.innerHTML = `
          <form class="practice-filter-form" data-action="submit-filters">
            <div class="filter-row">
              <div class="form-group">
                <label for="filterDifficulty">Difficulty</label>
                <select id="filterDifficulty" name="difficulty" class="filter-control">
                  ${difficultyOptionsHtml}
                </select>
              </div>
              <div class="form-group">
                <label for="filterIntention">Intention</label>
                <select id="filterIntention" name="intention" class="filter-control">
                  ${intentionOptionsHtml}
                </select>
              </div>
              <div class="form-group form-group-range">
                <label>Duration (minutes)</label>
                <div class="duration-inputs">
                  <input type="number" id="filterMinDuration" name="min_duration" class="filter-control"${minAttr}${maxAttr} value="${minDurationValue}" placeholder="Min" />
                  <span class="duration-separator">–</span>
                  <input type="number" id="filterMaxDuration" name="max_duration" class="filter-control"${minAttr}${maxAttr} value="${maxDurationValue}" placeholder="Max" />
                </div>
              </div>
              <div class="form-group">
                <label for="filterSort">Sort</label>
                <select id="filterSort" name="sort" class="filter-control">
                  ${sortOptionsHtml}
                </select>
              </div>
              <div class="form-group form-group-actions">
                <button type="submit" class="btn-primary">Apply</button>
              </div>
            </div>
          </form>
        `;
      }

      function renderAppliedFiltersSummary(container, options, state) {
        var hasAnyFilter = false;
        var chipsHtml = '';

        function getLabelFromOptions(list, value) {
          if (!list || !value) return null;
          var match = null;
          list.some(function (item) {
            if (item.value === value) {
              match = item;
              return true;
            }
            return false;
          });
          return match ? (match.label || match.value) : null;
        }

        // Difficulty
        if (state.difficulty) {
          hasAnyFilter = true;
          var diffLabel = getLabelFromOptions(options && options.difficulties, state.difficulty) || state.difficulty;
          chipsHtml += '<button type="button" class="filter-chip" data-action="clear-filter" data-filter-key="difficulty">Difficulty: ' + String(diffLabel) + ' <span aria-hidden="true">×</span></button>';
        }

        // Intention
        if (state.intention) {
          hasAnyFilter = true;
          var intLabel = getLabelFromOptions(options && options.intentions, state.intention) || state.intention;
          chipsHtml += '<button type="button" class="filter-chip" data-action="clear-filter" data-filter-key="intention">Intention: ' + String(intLabel) + ' <span aria-hidden="true">×</span></button>';
        }

        // Duration
        if (state.min_duration !== null || state.max_duration !== null) {
          hasAnyFilter = true;
          var durationLabel = '';
          if (state.min_duration !== null && state.max_duration !== null) {
            durationLabel = state.min_duration + '–' + state.max_duration + ' min';
          } else if (state.min_duration !== null) {
            durationLabel = state.min_duration + '+ min';
          } else if (state.max_duration !== null) {
            durationLabel = 'Up to ' + state.max_duration + ' min';
          }
          chipsHtml += '<button type="button" class="filter-chip" data-action="clear-filter" data-filter-key="duration">Duration: ' + String(durationLabel) + ' <span aria-hidden="true">×</span></button>';
        }

        // Sort
        if (state.sort) {
          hasAnyFilter = true;
          var sortText = '';
          if (state.sort === 'top_rated') sortText = 'Top rated';
          else if (state.sort === 'most_popular') sortText = 'Most popular';
          else if (state.sort === 'duration_shortest_first') sortText = 'Shortest first';
          else if (state.sort === 'newest_first') sortText = 'Newest first';
          else sortText = state.sort;
          chipsHtml += '<button type="button" class="filter-chip" data-action="clear-filter" data-filter-key="sort">Sort: ' + String(sortText) + ' <span aria-hidden="true">×</span></button>';
        }

        if (!hasAnyFilter) {
          container.innerHTML = '<div class="applied-filters-summary-inner applied-filters-summary-inner--empty">No filters applied.</div>';
          return;
        }

        var clearAllHtml = '<button type="button" class="filter-clear-all" data-action="clear-all-filters">Clear all</button>';

        container.innerHTML = `
          <div class="applied-filters-summary-inner">
            <div class="applied-filters-chips">${chipsHtml}</div>
            <div class="applied-filters-actions">${clearAllHtml}</div>
          </div>
        `;
      }

      function renderPracticesList(container, listResponse, state) {
        if (!listResponse || listResponse.error) {
          container.innerHTML = '<p class="error-message">Unable to load practices right now. Please try again later.</p>';
          return;
        }

        var items = Array.isArray(listResponse.items) ? listResponse.items : [];
        if (!items.length) {
          container.innerHTML = '<p class="empty-message">No practices match these filters yet. Try adjusting the filters above.</p>';
          return;
        }

        function buildBaseParamsWithoutPracticeId() {
          var params = new URLSearchParams();
          if (state.difficulty) params.set('difficulty', state.difficulty);
          if (state.intention) params.set('intention', state.intention);
          if (state.min_duration !== null) params.set('min_duration', String(state.min_duration));
          if (state.max_duration !== null) params.set('max_duration', String(state.max_duration));
          if (state.sort) params.set('sort', state.sort);
          if (state.page) params.set('page', String(state.page));
          return params;
        }

        var cardsHtml = '';
        items.forEach(function (practice) {
          var params = buildBaseParamsWithoutPracticeId();
          params.set('practiceId', practice.id);
          var href = 'practices.html?' + params.toString();

          var difficultyText = practice.difficulty ? String(practice.difficulty).replace(/_/g, ' ') : '';
          var intentionText = practice.intention ? String(practice.intention).replace(/_/g, ' ') : '';

          var ratingText = '';
          if (typeof practice.rating_average === 'number') {
            ratingText = practice.rating_average.toFixed(1) + (practice.rating_count ? ' (' + practice.rating_count + ')' : '');
          } else {
            ratingText = 'Not yet rated';
          }

          cardsHtml += `
            <article class="practice-card" data-practice-id="${String(practice.id)}">
              <a href="${href}" class="practice-card-link" title="View details for ${String(practice.title)}">
                <div class="practice-card-image-placeholder" aria-hidden="true"></div>
                <div class="practice-card-content">
                  <h2 class="practice-card-title">${String(practice.title)}</h2>
                  <div class="practice-card-meta">
                    <span class="meta-item meta-item-duration">${String(practice.duration_minutes)} min</span>
                    ${difficultyText ? '<span class="meta-item meta-item-difficulty">' + difficultyText + '</span>' : ''}
                    ${intentionText ? '<span class="meta-item meta-item-intention">' + intentionText + '</span>' : ''}
                  </div>
                  <div class="practice-card-rating">${ratingText}</div>
                  ${practice.description ? '<p class="practice-card-description">' + String(practice.description) + '</p>' : ''}
                </div>
              </a>
            </article>
          `;
        });

        container.innerHTML = `<div class="practices-grid">${cardsHtml}</div>`;
      }

      function renderPracticesPagination(container, listResponse, state) {
        if (!listResponse || listResponse.error) {
          container.innerHTML = '';
          return;
        }

        var totalItems = listResponse.total_items || 0;
        var pageSize = listResponse.page_size || DEFAULT_PAGE_SIZE;
        var currentPage = listResponse.page || state.page || 1;
        var totalPages = Math.max(1, Math.ceil(totalItems / pageSize));

        if (totalPages <= 1) {
          container.innerHTML = '';
          return;
        }

        var pagesHtml = '';
        for (var p = 1; p <= totalPages; p++) {
          var isCurrent = p === currentPage;
          pagesHtml += '<button type="button" class="pagination-page' + (isCurrent ? ' is-current' : '') + '" data-action="go-to-page" data-page="' + String(p) + '" aria-current="' + (isCurrent ? 'page' : 'false') + '">' + String(p) + '</button>';
        }

        var prevDisabled = currentPage <= 1 ? ' disabled' : '';
        var nextDisabled = currentPage >= totalPages ? ' disabled' : '';

        container.innerHTML = `
          <div class="pagination-inner">
            <button type="button" class="pagination-prev" data-action="go-to-prev-page" data-page="${String(currentPage - 1)}"${prevDisabled} aria-label="Previous page">‹</button>
            <div class="pagination-pages">${pagesHtml}</div>
            <button type="button" class="pagination-next" data-action="go-to-next-page" data-page="${String(currentPage + 1)}"${nextDisabled} aria-label="Next page">›</button>
          </div>
        `;
      }

      function renderPracticeDetail(container, practiceId) {
        if (!practiceId) {
          container.innerHTML = '';
          return;
        }

        var practice = null;
        try {
          practice = WebsiteSDK.getPracticeDetail(practiceId);
        } catch (e) {
          console.error('Error loading practice detail', e);
          container.innerHTML = '<p class="error-message">Unable to load this practice right now.</p>';
          return;
        }

        if (!practice) {
          container.innerHTML = '<p class="error-message">Practice not found.</p>';
          return;
        }

        var difficultyText = practice.difficulty ? String(practice.difficulty).replace(/_/g, ' ') : '';
        var intentionText = practice.intention ? String(practice.intention).replace(/_/g, ' ') : '';

        var ratingText = '';
        if (typeof practice.rating_average === 'number') {
          ratingText = practice.rating_average.toFixed(1) + (practice.rating_count ? ' (' + practice.rating_count + ')' : '');
        } else {
          ratingText = 'Not yet rated';
        }

        var equipmentHtml = '';
        if (Array.isArray(practice.equipment) && practice.equipment.length) {
          var itemsHtml = '';
          practice.equipment.forEach(function (eq) {
            itemsHtml += '<li>' + String(eq) + '</li>';
          });
          equipmentHtml = '<section class="practice-section"><h3>Equipment</h3><ul class="practice-equipment-list">' + itemsHtml + '</ul></section>';
        }

        var stepsHtml = '';
        if (Array.isArray(practice.steps) && practice.steps.length) {
          var stepsItems = '';
          practice.steps.forEach(function (step, idx) {
            stepsItems += '<li><span class="step-index">' + String(idx + 1) + '.</span> <span class="step-text">' + String(step) + '</span></li>';
          });
          stepsHtml = '<section class="practice-section"><h3>Steps</h3><ol class="practice-steps-list">' + stepsItems + '</ol></section>';
        }

        var descriptionHtml = practice.description ? '<section class="practice-section"><h3>Overview</h3><p>' + String(practice.description) + '</p></section>' : '';

        container.innerHTML = `
          <article class="practice-detail" data-practice-id="${String(practice.id)}">
            <button type="button" class="practice-detail-close" data-action="close-detail">Close</button>

            <div class="practice-detail-hero" aria-hidden="true"></div>

            <header class="practice-detail-header">
              <h2 class="practice-detail-title">${String(practice.title)}</h2>
              <div class="practice-detail-meta">
                <span class="meta-item meta-item-duration">${String(practice.duration_minutes)} min</span>
                ${difficultyText ? '<span class="meta-item meta-item-difficulty">' + difficultyText + '</span>' : ''}
                ${intentionText ? '<span class="meta-item meta-item-intention">' + intentionText + '</span>' : ''}
                <span class="meta-item meta-item-rating">${ratingText}</span>
              </div>
              <div class="practice-detail-actions">
                <button type="button" class="btn-primary" data-action="add-to-todays-practice" data-practice-id="${String(practice.id)}">Add to Today&#39;s Practice</button>
                <a href="todays_practice.html" class="btn-secondary" data-action="view-todays-practice" style="display: none;">View Today&#39;s Practice</a>
                <p class="add-feedback" data-role="add-feedback" aria-live="polite"></p>
              </div>
            </header>

            <div class="practice-detail-body">
              ${descriptionHtml}
              ${equipmentHtml}
              ${stepsHtml}
            </div>
          </article>
        `;
      }

      // --- Initial population based on data-populate ---

      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function (el) {
        var type = el.getAttribute('data-populate');
        if (type === 'practice-filters') {
          renderPracticeFilterForm(el, filterOptions, effectiveState);
        } else if (type === 'applied-filters-summary') {
          renderAppliedFiltersSummary(el, filterOptions, effectiveState);
        } else if (type === 'practices-list') {
          var listData = getPracticesListResponse();
          renderPracticesList(el, listData, effectiveState);
        } else if (type === 'practices-pagination') {
          var listData2 = getPracticesListResponse();
          renderPracticesPagination(el, listData2, effectiveState);
        } else if (type === 'practice-detail-view') {
          if (effectiveState.practiceId) {
            renderPracticeDetail(el, effectiveState.practiceId);
          } else {
            el.innerHTML = '';
          }
        }
      });

      // --- Navigation helpers ---

      function navigateToPracticesWithParams(params) {
        var qs = params.toString();
        var url = 'practices.html' + (qs ? '?' + qs : '');
        window.location.href = url;
      }

      function handleFilterFormSubmit(form) {
        var difficulty = form.elements['difficulty'] ? form.elements['difficulty'].value : '';
        var intention = form.elements['intention'] ? form.elements['intention'].value : '';
        var minDurationRaw = form.elements['min_duration'] ? form.elements['min_duration'].value : '';
        var maxDurationRaw = form.elements['max_duration'] ? form.elements['max_duration'].value : '';
        var sort = form.elements['sort'] ? form.elements['sort'].value : '';

        var params = new URLSearchParams();
        if (difficulty) params.set('difficulty', difficulty);
        if (intention) params.set('intention', intention);
        if (minDurationRaw !== '') params.set('min_duration', String(Number(minDurationRaw)));
        if (maxDurationRaw !== '') params.set('max_duration', String(Number(maxDurationRaw)));
        if (sort) params.set('sort', sort);
        params.set('page', '1');

        // Clear any open detail view when applying filters
        navigateToPracticesWithParams(params);
      }

      function handleClearSingleFilter(filterKey) {
        var params = new URLSearchParams(window.location.search || '');
        if (filterKey === 'duration') {
          params.delete('min_duration');
          params.delete('max_duration');
        } else {
          params.delete(filterKey);
        }
        params.delete('practiceId');
        params.set('page', '1');
        navigateToPracticesWithParams(params);
      }

      function handleClearAllFilters() {
        var params = new URLSearchParams(window.location.search || '');
        params.delete('difficulty');
        params.delete('intention');
        params.delete('min_duration');
        params.delete('max_duration');
        params.delete('sort');
        params.delete('page');
        params.delete('practiceId');
        navigateToPracticesWithParams(params);
      }

      function handlePaginationClick(targetPage) {
        if (!targetPage || targetPage < 1) return;
        var params = new URLSearchParams(window.location.search || '');
        params.set('page', String(targetPage));
        navigateToPracticesWithParams(params);
      }

      function handleCloseDetail() {
        var params = new URLSearchParams(window.location.search || '');
        params.delete('practiceId');
        navigateToPracticesWithParams(params);
      }

      function handleAddToTodaysPractice(button) {
        var practiceId = button.getAttribute('data-practice-id');
        if (!practiceId) return;

        var container = button.closest('.practice-detail-actions');
        var feedback = container ? container.querySelector('[data-role="add-feedback"]') : null;
        var viewLink = container ? container.querySelector('[data-action="view-todays-practice"]') : null;

        if (feedback) {
          feedback.textContent = '';
        }

        button.disabled = true;
        var originalText = button.textContent;
        button.textContent = 'Adding...';

        try {
          var today = new Date();
          var todayStr = today.toISOString().slice(0, 10);
          var result = WebsiteSDK.addPracticeToTodaysPractice(practiceId, todayStr);

          if (result && result.success) {
            button.textContent = 'Added to Today\'s Practice';
            button.classList.add('is-added');
            if (feedback) {
              feedback.textContent = 'This practice has been added to Today\'s Practice.';
            }
            if (viewLink) {
              viewLink.style.display = 'inline-block';
            }
          } else {
            button.disabled = false;
            button.textContent = originalText;
            if (feedback) {
              feedback.textContent = 'Unable to add this practice right now. Please try again.';
            }
          }
        } catch (e) {
          console.error('Error adding practice to Today\'s Practice', e);
          button.disabled = false;
          button.textContent = originalText;
          if (feedback) {
            feedback.textContent = 'Unable to add this practice right now. Please try again.';
          }
        }
      }

      function handleViewTodaysPractice() {
        window.location.href = 'todays_practice.html';
      }

      // --- Global event delegation ---

      document.addEventListener('submit', function (event) {
        var target = event.target;
        if (!target || !target.dataset) return;
        var action = target.dataset.action;
        if (action === 'submit-filters') {
          event.preventDefault();
          handleFilterFormSubmit(target);
        }
      });

      document.addEventListener('click', function (event) {
        var el = event.target.closest('[data-action]');
        if (!el) return;
        var action = el.getAttribute('data-action');

        if (action === 'clear-filter') {
          event.preventDefault();
          var filterKey = el.getAttribute('data-filter-key');
          handleClearSingleFilter(filterKey);
        } else if (action === 'clear-all-filters') {
          event.preventDefault();
          handleClearAllFilters();
        } else if (action === 'go-to-page') {
          event.preventDefault();
          var page = parseNumberParam(el.getAttribute('data-page'));
          handlePaginationClick(page);
        } else if (action === 'go-to-prev-page') {
          event.preventDefault();
          var prevPage = parseNumberParam(el.getAttribute('data-page'));
          handlePaginationClick(prevPage);
        } else if (action === 'go-to-next-page') {
          event.preventDefault();
          var nextPage = parseNumberParam(el.getAttribute('data-page'));
          handlePaginationClick(nextPage);
        } else if (action === 'close-detail') {
          event.preventDefault();
          handleCloseDetail();
        } else if (action === 'add-to-todays-practice') {
          event.preventDefault();
          handleAddToTodaysPractice(el);
        } else if (action === 'view-todays-practice') {
          // Allow default link behavior, but ensure correct navigation
          event.preventDefault();
          handleViewTodaysPractice();
        }
      });
    });
  </script>
</body>
</html>
