<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Portfolio - Software &amp; DevOps Engineer</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <link href='https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&amp;family=Work+Sans:wght@300;400;500;600;700&amp;family=Fira+Code:wght@400;500&amp;display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='projects.css'>
</head>
<body>
  <header class='site-header'>
    <div class='header-top'>
      <div class='container header-top-inner'>
        <div class='branding'>
          <a href='index.html' class='branding-link'>
            <h1 class='site-title'>Jon Gunter</h1>
            <p class='site-tagline'>Software &amp; DevOps Engineer</p>
          </a>
        </div>
        <div class='header-meta' aria-hidden='true'>
          <!-- Reserved for future persistent header items (e.g., avatar) -->
        </div>
      </div>
    </div>

    <nav class='primary-nav' aria-label='Primary navigation'>
      <div class='container'>
        <ul class='nav-list'>
          <li class='nav-item'><a href='index.html' class='nav-link'>Home</a></li>
          <li class='nav-item'><a href='projects.html' class='nav-link is-active'>Projects</a></li>
          <li class='nav-item'><a href='skills.html' class='nav-link'>Skills</a></li>
          <li class='nav-item'><a href='blog.html' class='nav-link'>Blog</a></li>
          <li class='nav-item'><a href='reading_list.html' class='nav-link'>Reading List</a></li>
          <li class='nav-item'><a href='resume_builder.html' class='nav-link'>Resume</a></li>
          <li class='nav-item'><a href='about.html' class='nav-link'>About</a></li>
          <li class='nav-item'><a href='contact.html' class='nav-link'>Contact</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <div class='page-background'>
    <main id='content' class='site-main' role='main'>
      <div class='container'>
        <section class='content-card' aria-label='Projects listing'>
          <header class='content-card-header'>
            <h2 class='section-title'>Projects</h2>
            <hr class='section-divider'>
            <p class='section-subtitle' data-component='results-summary' data-populate='results-summary'>Loading projects...</p>
          </header>

          <section class='projects-controls' aria-label='Search and sort projects'>
            <div class='projects-controls-row'>
              <div class='projects-search-col'>
                <form class='project-search-form' role='search' aria-label='Search projects' data-component='project-search-form' data-action='search-form'>
                  <label class='field-label' for='project-search-input'>Keyword</label>
                  <div class='search-input-row'>
                    <input id='project-search-input' name='query' type='search' class='search-input' placeholder='Search projects by technology, keyword, or outcome'>
                    <button type='submit' class='btn btn-primary' data-action='search-submit'>Search</button>
                    <button type='button' class='btn btn-ghost' data-action='search-clear'>Clear</button>
                  </div>
                </form>
              </div>

              <div class='projects-sort-col' data-component='project-sort-control' data-populate='project-sort-options' aria-label='Sort projects'>
                <!-- Sort control rendered by JavaScript -->
              </div>
            </div>
          </section>

          <section class='project-filter-panel' data-component='project-filter-panel' data-populate='project-filter-options' aria-label='Filter projects'>
            <!-- Filter controls rendered by JavaScript -->
          </section>

          <section class='comparison-toolbar' data-component='comparison-toolbar' data-populate='comparison-toolbar' aria-label='Project comparison selection' hidden>
            <!-- Comparison toolbar rendered by JavaScript -->
          </section>

          <section class='project-list-section' aria-label='Project results'>
            <div class='project-list' data-component='project-list' data-populate='project-list' aria-live='polite'>
              <!-- Project cards rendered by JavaScript -->
            </div>
          </section>

          <nav class='pagination-controls' data-component='pagination-controls' data-populate='pagination' aria-label='Project pagination'>
            <!-- Pagination rendered by JavaScript -->
          </nav>
        </section>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='container footer-inner'>
        <nav class='footer-nav' aria-label='Footer navigation'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'><a href='about.html' class='footer-link'>About</a></li>
            <li class='footer-nav-item'><a href='projects.html' class='footer-link'>Projects</a></li>
            <li class='footer-nav-item'><a href='blog.html' class='footer-link'>Blog</a></li>
            <li class='footer-nav-item'><a href='reading_list.html' class='footer-link'>Reading List</a></li>
            <li class='footer-nav-item'><a href='resume_builder.html' class='footer-link'>Resume</a></li>
            <li class='footer-nav-item'><a href='newsletter.html' class='footer-link'>Newsletter</a></li>
            <li class='footer-nav-item'><a href='contact.html' class='footer-link'>Contact</a></li>
          </ul>
        </nav>
        <p class='footer-meta'>
          &copy; <span id='year'></span> Jon Gunter. All rights reserved.
        </p>
      </div>
    </footer>
  </div>

  <script>
    (function () {
      var yearEl = document.getElementById('year');
      if (yearEl) {
        yearEl.textContent = new Date().getFullYear();
      }
    })();
  </script>

  <script src='business_logic.js'></script>
  <script>
    (function () {
      var state = {
        filterOptions: null,
        projectsResult: null,
        comparison: null,
        currentUrlState: null,
        lastError: null
      };

      function parseBooleanParam(value) {
        if (value === null || value === undefined) {
          return false;
        }
        var normalized = String(value).toLowerCase();
        return normalized === '1' || normalized === 'true' || normalized === 'yes';
      }

      function parseCsvParam(value) {
        if (!value) {
          return [];
        }
        var raw = String(value).split(',');
        var result = [];
        for (var i = 0; i < raw.length; i += 1) {
          var part = raw[i].trim();
          if (part) {
            result.push(part);
          }
        }
        return result;
      }

      function parseUrlState() {
        var params = new URLSearchParams(window.location.search);
        var urlState = {
          query: params.get('query') || '',
          category: params.get('category') || '',
          technologies: parseCsvParam(params.get('technologies')),
          tags: parseCsvParam(params.get('tags')),
          languages: parseCsvParam(params.get('languages')),
          cloud: parseCsvParam(params.get('cloud')),
          environment: parseCsvParam(params.get('environment')),
          sort: params.get('sort') || null,
          page: parseInt(params.get('page'), 10) || 1,
          pageSize: parseInt(params.get('pageSize'), 10) || 20,
          booleans: {
            usesKubernetes: parseBooleanParam(params.get('usesKubernetes')),
            usesTerraform: parseBooleanParam(params.get('usesTerraform')),
            usesAws: parseBooleanParam(params.get('usesAws')),
            hasCiCd: parseBooleanParam(params.get('hasCiCd')),
            isMicroservices: parseBooleanParam(params.get('isMicroservices'))
          }
        };
        if (urlState.page < 1) {
          urlState.page = 1;
        }
        if (urlState.pageSize < 1) {
          urlState.pageSize = 20;
        }
        return urlState;
      }

      function ensureFilterOptions() {
        if (state.filterOptions) {
          return;
        }
        try {
          state.filterOptions = WebsiteSDK.getProjectFilterOptions();
        } catch (e) {
          console.error('Error loading project filter options', e);
          state.filterOptions = {
            categories: [],
            technologies: [],
            tags: [],
            languages: [],
            cloud_providers: [],
            environments: [],
            sort_options: []
          };
          state.lastError = 'Unable to load filter options.';
        }
      }

      function loadComparisonSelection() {
        try {
          state.comparison = WebsiteSDK.getProjectComparisonSelection();
        } catch (e) {
          console.error('Error loading comparison selection', e);
          state.comparison = null;
        }
      }

      function updateUrl(mutator, resetPage) {
        var params = new URLSearchParams(window.location.search);
        if (typeof mutator === 'function') {
          mutator(params);
        }
        if (resetPage) {
          params.delete('page');
        }
        var newUrl = window.location.pathname;
        var paramString = params.toString();
        if (paramString) {
          newUrl += '?' + paramString;
        }
        window.history.pushState({}, '', newUrl);
        syncUrlAndSearch();
      }

      function getSelectedComparisonIds() {
        if (!state.comparison || !state.comparison.selection || !state.comparison.selection.project_ids) {
          return [];
        }
        return state.comparison.selection.project_ids.slice();
      }

      function syncUrlAndSearch() {
        ensureFilterOptions();
        var urlState = parseUrlState();
        state.currentUrlState = urlState;

        var query = urlState.query || undefined;

        var categoryIds = undefined;
        if (urlState.category && state.filterOptions && state.filterOptions.categories) {
          var cats = state.filterOptions.categories;
          for (var i = 0; i < cats.length; i += 1) {
            if (cats[i].slug === urlState.category) {
              categoryIds = [cats[i].id];
              break;
            }
          }
        }

        var technologies = urlState.technologies.length ? urlState.technologies : undefined;
        var tags = urlState.tags.length ? urlState.tags : undefined;
        var languageKeys = urlState.languages.length ? urlState.languages : undefined;
        var cloudProviders = urlState.cloud.length ? urlState.cloud : undefined;
        var environments = urlState.environment.length ? urlState.environment : undefined;

        var usesKubernetes = urlState.booleans.usesKubernetes ? true : undefined;
        var usesTerraform = urlState.booleans.usesTerraform ? true : undefined;
        var usesAws = urlState.booleans.usesAws ? true : undefined;
        var hasCiCd = urlState.booleans.hasCiCd ? true : undefined;
        var isMicroservices = urlState.booleans.isMicroservices ? true : undefined;

        var sortBy = 'last_updated_desc';
        if (state.filterOptions && state.filterOptions.sort_options && state.filterOptions.sort_options.length) {
          var sortOptions = state.filterOptions.sort_options;
          var foundSort = false;
          if (urlState.sort) {
            for (var s = 0; s < sortOptions.length; s += 1) {
              if (sortOptions[s].key === urlState.sort) {
                sortBy = urlState.sort;
                foundSort = true;
                break;
              }
            }
          }
          if (!foundSort) {
            for (var s2 = 0; s2 < sortOptions.length; s2 += 1) {
              if (sortOptions[s2].key === 'last_updated_desc') {
                sortBy = 'last_updated_desc';
                foundSort = true;
                break;
              }
            }
            if (!foundSort) {
              sortBy = sortOptions[0].key;
            }
          }
        }

        var page = urlState.page;
        var pageSize = urlState.pageSize;

        var result = null;
        state.lastError = null;
        try {
          result = WebsiteSDK.searchProjects(
            query,
            categoryIds,
            technologies,
            tags,
            languageKeys,
            cloudProviders,
            environments,
            usesKubernetes,
            usesTerraform,
            usesAws,
            hasCiCd,
            isMicroservices,
            sortBy,
            page,
            pageSize
          );
        } catch (e) {
          console.error('Error searching projects', e);
          state.lastError = 'Unable to load projects. Please try again.';
          result = {
            projects: [],
            total_count: 0,
            page: page,
            page_size: pageSize
          };
        }

        state.projectsResult = result;
        renderAll();

        var searchInput = document.getElementById('project-search-input');
        if (searchInput) {
          searchInput.value = state.currentUrlState.query || '';
        }
      }

      function renderAll() {
        var populateElements = document.querySelectorAll('[data-populate]');
        for (var i = 0; i < populateElements.length; i += 1) {
          var el = populateElements[i];
          var type = el.getAttribute('data-populate');
          if (type === 'results-summary') {
            renderResultsSummary(el);
          } else if (type === 'project-sort-options') {
            renderSortControl(el);
          } else if (type === 'project-filter-options') {
            renderFilterPanel(el);
          } else if (type === 'project-list') {
            renderProjectList(el);
          } else if (type === 'pagination') {
            renderPagination(el);
          } else if (type === 'comparison-toolbar') {
            renderComparisonToolbar(el);
          }
        }
      }

      function renderResultsSummary(container) {
        var result = state.projectsResult;
        var urlState = state.currentUrlState;
        if (!result) {
          container.textContent = 'Loading projects...';
          return;
        }
        if (state.lastError) {
          container.textContent = state.lastError;
          return;
        }
        var total = typeof result.total_count === 'number' ? result.total_count : 0;
        var page = typeof result.page === 'number' ? result.page : 1;
        var pageSize = typeof result.page_size === 'number' ? result.page_size : (urlState ? urlState.pageSize : 20);
        if (total === 0) {
          if (urlState && urlState.query) {
            container.textContent = 'No projects found matching ' + urlState.query + '.';
          } else {
            container.textContent = 'No projects found for the current filters.';
          }
          return;
        }
        var start = (page - 1) * pageSize + 1;
        var end = start + pageSize - 1;
        if (end > total) {
          end = total;
        }
        var text = 'Showing ' + start + ' to ' + end + ' of ' + total + ' projects';
        if (urlState && urlState.query) {
          text += ' matching ' + urlState.query + '.';
        } else {
          text += '.';
        }
        container.textContent = text;
      }

      function renderSortControl(container) {
        container.innerHTML = '';
        var filterOptions = state.filterOptions || { sort_options: [] };
        var sortOptions = filterOptions.sort_options || [];
        var urlState = state.currentUrlState;

        var wrapper = document.createElement('div');
        wrapper.className = 'sort-control';

        var label = document.createElement('label');
        label.className = 'sort-label';
        label.setAttribute('for', 'projects-sort-select');
        label.textContent = 'Sort by';

        var select = document.createElement('select');
        select.id = 'projects-sort-select';
        select.className = 'sort-select';
        select.setAttribute('data-action', 'sort-change');

        var selectedKey = null;
        if (urlState && urlState.sort) {
          selectedKey = urlState.sort;
        } else if (sortOptions.length) {
          selectedKey = sortOptions[0].key;
        }

        for (var i = 0; i < sortOptions.length; i += 1) {
          var optMeta = sortOptions[i];
          var opt = document.createElement('option');
          opt.value = optMeta.key;
          opt.textContent = optMeta.label;
          if (optMeta.key === selectedKey) {
            opt.selected = true;
          }
          select.appendChild(opt);
        }

        wrapper.appendChild(label);
        wrapper.appendChild(select);
        container.appendChild(wrapper);
      }

      function renderFilterPanel(container) {
        container.innerHTML = '';
        var filterOptions = state.filterOptions || {};
        var urlState = state.currentUrlState || {
          category: '',
          technologies: [],
          tags: [],
          languages: [],
          cloud: [],
          environment: [],
          booleans: {}
        };

        var panelInner = document.createElement('div');
        panelInner.className = 'filter-panel-inner';

        var labelCol = document.createElement('div');
        labelCol.className = 'filter-panel-label';
        labelCol.textContent = 'Filter by';

        var controlsCol = document.createElement('div');
        controlsCol.className = 'filter-panel-controls';

        var groupCategory = document.createElement('div');
        groupCategory.className = 'filter-group filter-group-category';
        var catLabel = document.createElement('div');
        catLabel.className = 'filter-group-title';
        catLabel.textContent = 'Category';
        var catSelect = document.createElement('select');
        catSelect.className = 'filter-select';
        catSelect.setAttribute('data-action', 'filter-change');
        catSelect.setAttribute('data-filter-key', 'category');
        var catAnyOpt = document.createElement('option');
        catAnyOpt.value = '';
        catAnyOpt.textContent = 'All categories';
        catSelect.appendChild(catAnyOpt);
        if (filterOptions.categories && filterOptions.categories.length) {
          for (var c = 0; c < filterOptions.categories.length; c += 1) {
            var cat = filterOptions.categories[c];
            var opt = document.createElement('option');
            opt.value = cat.slug || cat.id;
            opt.textContent = cat.name;
            if (urlState.category && urlState.category === (cat.slug || cat.id)) {
              opt.selected = true;
            }
            catSelect.appendChild(opt);
          }
        }
        groupCategory.appendChild(catLabel);
        groupCategory.appendChild(catSelect);

        var groupTech = document.createElement('div');
        groupTech.className = 'filter-group filter-group-technologies';
        var techLabel = document.createElement('div');
        techLabel.className = 'filter-group-title';
        techLabel.textContent = 'Technologies';
        var techList = document.createElement('div');
        techList.className = 'filter-chips';
        var techOpts = filterOptions.technologies || [];
        for (var t = 0; t < techOpts.length; t += 1) {
          var techVal = techOpts[t];
          var techChip = document.createElement('label');
          techChip.className = 'chip chip-filter';
          var techInput = document.createElement('input');
          techInput.type = 'checkbox';
          techInput.className = 'chip-input';
          techInput.setAttribute('data-action', 'filter-change');
          techInput.setAttribute('data-filter-key', 'technologies');
          techInput.value = techVal;
          if (urlState.technologies.indexOf(techVal) !== -1) {
            techInput.checked = true;
          }
          var techText = document.createElement('span');
          techText.className = 'chip-label';
          techText.textContent = techVal;
          techChip.appendChild(techInput);
          techChip.appendChild(techText);
          techList.appendChild(techChip);
        }
        groupTech.appendChild(techLabel);
        groupTech.appendChild(techList);

        var groupTags = document.createElement('div');
        groupTags.className = 'filter-group filter-group-tags';
        var tagLabel = document.createElement('div');
        tagLabel.className = 'filter-group-title';
        tagLabel.textContent = 'Tags';
        var tagList = document.createElement('div');
        tagList.className = 'filter-chips';
        var tagOpts = filterOptions.tags || [];
        for (var g = 0; g < tagOpts.length; g += 1) {
          var tagVal = tagOpts[g];
          var tagChip = document.createElement('label');
          tagChip.className = 'chip chip-filter';
          var tagInput = document.createElement('input');
          tagInput.type = 'checkbox';
          tagInput.className = 'chip-input';
          tagInput.setAttribute('data-action', 'filter-change');
          tagInput.setAttribute('data-filter-key', 'tags');
          tagInput.value = tagVal;
          if (urlState.tags.indexOf(tagVal) !== -1) {
            tagInput.checked = true;
          }
          var tagText = document.createElement('span');
          tagText.className = 'chip-label';
          tagText.textContent = tagVal;
          tagChip.appendChild(tagInput);
          tagChip.appendChild(tagText);
          tagList.appendChild(tagChip);
        }
        groupTags.appendChild(tagLabel);
        groupTags.appendChild(tagList);

        var groupLang = document.createElement('div');
        groupLang.className = 'filter-group filter-group-languages';
        var langLabel = document.createElement('div');
        langLabel.className = 'filter-group-title';
        langLabel.textContent = 'Languages';
        var langList = document.createElement('div');
        langList.className = 'filter-chips';
        var langOpts = filterOptions.languages || [];
        for (var l = 0; l < langOpts.length; l += 1) {
          var langMeta = langOpts[l];
          var langChip = document.createElement('label');
          langChip.className = 'chip chip-filter';
          var langInput = document.createElement('input');
          langInput.type = 'checkbox';
          langInput.className = 'chip-input';
          langInput.setAttribute('data-action', 'filter-change');
          langInput.setAttribute('data-filter-key', 'languages');
          langInput.value = langMeta.key;
          if (urlState.languages.indexOf(langMeta.key) !== -1) {
            langInput.checked = true;
          }
          var langText = document.createElement('span');
          langText.className = 'chip-label';
          langText.textContent = langMeta.label;
          langChip.appendChild(langInput);
          langChip.appendChild(langText);
          langList.appendChild(langChip);
        }
        groupLang.appendChild(langLabel);
        groupLang.appendChild(langList);

        var groupCloud = document.createElement('div');
        groupCloud.className = 'filter-group filter-group-cloud';
        var cloudLabel = document.createElement('div');
        cloudLabel.className = 'filter-group-title';
        cloudLabel.textContent = 'Cloud';
        var cloudSelect = document.createElement('select');
        cloudSelect.className = 'filter-select';
        cloudSelect.setAttribute('data-action', 'filter-change');
        cloudSelect.setAttribute('data-filter-key', 'cloud');
        var cloudAnyOpt = document.createElement('option');
        cloudAnyOpt.value = '';
        cloudAnyOpt.textContent = 'Any cloud';
        cloudSelect.appendChild(cloudAnyOpt);
        var cloudOpts = filterOptions.cloud_providers || [];
        var activeCloudKey = urlState.cloud.length ? urlState.cloud[0] : '';
        for (var cp = 0; cp < cloudOpts.length; cp += 1) {
          var cloudMeta = cloudOpts[cp];
          var cloudOpt = document.createElement('option');
          cloudOpt.value = cloudMeta.key;
          cloudOpt.textContent = cloudMeta.label;
          if (activeCloudKey && activeCloudKey === cloudMeta.key) {
            cloudOpt.selected = true;
          }
          cloudSelect.appendChild(cloudOpt);
        }
        groupCloud.appendChild(cloudLabel);
        groupCloud.appendChild(cloudSelect);

        var groupEnv = document.createElement('div');
        groupEnv.className = 'filter-group filter-group-environment';
        var envLabel = document.createElement('div');
        envLabel.className = 'filter-group-title';
        envLabel.textContent = 'Environment';
        var envSelect = document.createElement('select');
        envSelect.className = 'filter-select';
        envSelect.setAttribute('data-action', 'filter-change');
        envSelect.setAttribute('data-filter-key', 'environment');
        var envAnyOpt = document.createElement('option');
        envAnyOpt.value = '';
        envAnyOpt.textContent = 'Any environment';
        envSelect.appendChild(envAnyOpt);
        var envOpts = filterOptions.environments || [];
        var activeEnvKey = urlState.environment.length ? urlState.environment[0] : '';
        for (var ev = 0; ev < envOpts.length; ev += 1) {
          var envMeta = envOpts[ev];
          var envOpt = document.createElement('option');
          envOpt.value = envMeta.key;
          envOpt.textContent = envMeta.label;
          if (activeEnvKey && activeEnvKey === envMeta.key) {
            envOpt.selected = true;
          }
          envSelect.appendChild(envOpt);
        }
        groupEnv.appendChild(envLabel);
        groupEnv.appendChild(envSelect);

        var groupFlags = document.createElement('div');
        groupFlags.className = 'filter-group filter-group-flags';
        var flagsLabel = document.createElement('div');
        flagsLabel.className = 'filter-group-title';
        flagsLabel.textContent = 'Features';
        var flagsList = document.createElement('div');
        flagsList.className = 'filter-flags';

        var boolConfigs = [
          { key: 'usesKubernetes', label: 'Kubernetes' },
          { key: 'usesTerraform', label: 'Terraform' },
          { key: 'usesAws', label: 'AWS' },
          { key: 'hasCiCd', label: 'CI/CD' },
          { key: 'isMicroservices', label: 'Microservices' }
        ];
        for (var b = 0; b < boolConfigs.length; b += 1) {
          var cfg = boolConfigs[b];
          var flagWrap = document.createElement('label');
          flagWrap.className = 'flag-toggle';
          var flagInput = document.createElement('input');
          flagInput.type = 'checkbox';
          flagInput.className = 'flag-input';
          flagInput.setAttribute('data-action', 'filter-change');
          flagInput.setAttribute('data-filter-key', cfg.key);
          if (urlState.booleans && urlState.booleans[cfg.key]) {
            flagInput.checked = true;
          }
          var flagText = document.createElement('span');
          flagText.className = 'flag-label';
          flagText.textContent = cfg.label;
          flagWrap.appendChild(flagInput);
          flagWrap.appendChild(flagText);
          flagsList.appendChild(flagWrap);
        }
        groupFlags.appendChild(flagsLabel);
        groupFlags.appendChild(flagsList);

        controlsCol.appendChild(groupCategory);
        controlsCol.appendChild(groupTech);
        controlsCol.appendChild(groupTags);
        controlsCol.appendChild(groupLang);
        controlsCol.appendChild(groupCloud);
        controlsCol.appendChild(groupEnv);
        controlsCol.appendChild(groupFlags);

        panelInner.appendChild(labelCol);
        panelInner.appendChild(controlsCol);
        container.appendChild(panelInner);
      }

      function renderProjectList(container) {
        container.innerHTML = '';
        var result = state.projectsResult;
        if (!result) {
          var loading = document.createElement('p');
          loading.className = 'projects-loading';
          loading.textContent = 'Loading projects...';
          container.appendChild(loading);
          return;
        }
        if (state.lastError) {
          var errorEl = document.createElement('p');
          errorEl.className = 'projects-error';
          errorEl.textContent = state.lastError;
          container.appendChild(errorEl);
          return;
        }
        if (!result.projects || !result.projects.length) {
          var empty = document.createElement('p');
          empty.className = 'projects-empty';
          empty.textContent = 'No projects found. Try adjusting your filters or search keywords.';
          container.appendChild(empty);
          return;
        }

        var selectedIds = getSelectedComparisonIds();
        var selectedSet = {};
        for (var i = 0; i < selectedIds.length; i += 1) {
          selectedSet[selectedIds[i]] = true;
        }

        var grid = document.createElement('div');
        grid.className = 'project-grid';

        for (var p = 0; p < result.projects.length; p += 1) {
          var item = result.projects[p];
          var project = item.project;
          var card = document.createElement('article');
          card.className = 'project-card';
          card.setAttribute('data-component', 'project-card');
          card.setAttribute('data-project-id', project.id);
          card.setAttribute('data-action', 'open-project-detail');

          var header = document.createElement('header');
          header.className = 'project-card-header';

          var title = document.createElement('h3');
          title.className = 'project-card-title';
          title.textContent = project.title;

          var metaTop = document.createElement('div');
          metaTop.className = 'project-card-meta-top';
          if (item.category_name) {
            var catSpan = document.createElement('span');
            catSpan.className = 'project-card-category';
            catSpan.textContent = item.category_name;
            metaTop.appendChild(catSpan);
          }
          if (project.role_title) {
            var roleSpan = document.createElement('span');
            roleSpan.className = 'project-card-role';
            roleSpan.textContent = project.role_title;
            metaTop.appendChild(roleSpan);
          }

          header.appendChild(title);
          header.appendChild(metaTop);

          var body = document.createElement('div');
          body.className = 'project-card-body';

          if (project.summary) {
            var summary = document.createElement('p');
            summary.className = 'project-card-summary';
            summary.textContent = project.summary;
            body.appendChild(summary);
          }

          var tagRow = document.createElement('div');
          tagRow.className = 'project-card-tags';
          var techList = project.technologies || [];
          var tagsList = project.tags || [];
          for (var ti = 0; ti < techList.length; ti += 1) {
            var techTag = document.createElement('span');
            techTag.className = 'tag tag-tech';
            techTag.textContent = techList[ti];
            tagRow.appendChild(techTag);
          }
          for (var tg = 0; tg < tagsList.length; tg += 1) {
            var tagTag = document.createElement('span');
            tagTag.className = 'tag tag-domain';
            tagTag.textContent = tagsList[tg];
            tagRow.appendChild(tagTag);
          }
          if (project.cloud_provider) {
            var cloudTag = document.createElement('span');
            cloudTag.className = 'tag tag-cloud';
            cloudTag.textContent = project.cloud_provider;
            tagRow.appendChild(cloudTag);
          }
          if (project.environment) {
            var envTag = document.createElement('span');
            envTag.className = 'tag tag-environment';
            envTag.textContent = project.environment;
            tagRow.appendChild(envTag);
          }
          body.appendChild(tagRow);

          var footer = document.createElement('footer');
          footer.className = 'project-card-footer';

          var compareBtn = document.createElement('button');
          compareBtn.type = 'button';
          compareBtn.className = 'btn btn-compare';
          compareBtn.setAttribute('data-action', 'toggle-comparison');
          compareBtn.setAttribute('data-project-id', project.id);

          var inComparison = false;
          if (item.is_in_comparison) {
            inComparison = true;
          }
          if (selectedSet[project.id]) {
            inComparison = true;
          }

          if (inComparison) {
            card.className += ' is-in-comparison';
            compareBtn.className += ' is-active';
            compareBtn.setAttribute('aria-pressed', 'true');
            compareBtn.textContent = 'Remove from comparison';
          } else {
            compareBtn.setAttribute('aria-pressed', 'false');
            compareBtn.textContent = 'Add to comparison';
          }

          var detailHint = document.createElement('span');
          detailHint.className = 'project-card-detail-hint';
          detailHint.textContent = 'Click card for details';

          footer.appendChild(detailHint);
          footer.appendChild(compareBtn);

          card.appendChild(header);
          card.appendChild(body);
          card.appendChild(footer);

          grid.appendChild(card);
        }

        container.appendChild(grid);
      }

      function renderPagination(container) {
        container.innerHTML = '';
        var result = state.projectsResult;
        if (!result || typeof result.total_count !== 'number' || typeof result.page_size !== 'number') {
          container.style.display = 'none';
          return;
        }
        var total = result.total_count;
        var pageSize = result.page_size;
        var currentPage = result.page || 1;
        var totalPages = Math.ceil(total / pageSize);
        if (totalPages <= 1) {
          container.style.display = 'none';
          return;
        }
        container.style.display = '';

        var wrapper = document.createElement('div');
        wrapper.className = 'pagination-inner';

        var prevBtn = document.createElement('button');
        prevBtn.type = 'button';
        prevBtn.className = 'btn btn-page btn-prev';
        prevBtn.textContent = 'Previous';
        prevBtn.setAttribute('data-action', 'page-change');
        prevBtn.setAttribute('data-page', String(currentPage - 1));
        if (currentPage <= 1) {
          prevBtn.disabled = true;
        }
        wrapper.appendChild(prevBtn);

        var pagesContainer = document.createElement('div');
        pagesContainer.className = 'page-numbers';

        for (var p = 1; p <= totalPages; p += 1) {
          var pageBtn = document.createElement('button');
          pageBtn.type = 'button';
          pageBtn.className = 'btn btn-page';
          if (p === currentPage) {
            pageBtn.className += ' is-active';
          }
          pageBtn.textContent = String(p);
          pageBtn.setAttribute('data-action', 'page-change');
          pageBtn.setAttribute('data-page', String(p));
          pagesContainer.appendChild(pageBtn);
        }

        var nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.className = 'btn btn-page btn-next';
        nextBtn.textContent = 'Next';
        nextBtn.setAttribute('data-action', 'page-change');
        nextBtn.setAttribute('data-page', String(currentPage + 1));
        if (currentPage >= totalPages) {
          nextBtn.disabled = true;
        }

        wrapper.appendChild(pagesContainer);
        wrapper.appendChild(nextBtn);
        container.appendChild(wrapper);
      }

      function renderComparisonToolbar(container) {
        container.innerHTML = '';
        var count = 0;
        if (state.comparison && state.comparison.selection && state.comparison.selection.project_ids) {
          count = state.comparison.selection.project_ids.length;
        }
        if (!count) {
          container.hidden = true;
          return;
        }
        container.hidden = false;

        var inner = document.createElement('div');
        inner.className = 'comparison-toolbar-inner';

        var summary = document.createElement('div');
        summary.className = 'comparison-summary';
        var countSpan = document.createElement('span');
        countSpan.className = 'comparison-count';
        countSpan.textContent = String(count);
        var labelSpan = document.createElement('span');
        labelSpan.className = 'comparison-label';
        labelSpan.textContent = 'projects selected for comparison';
        summary.appendChild(countSpan);
        summary.appendChild(labelSpan);

        var actions = document.createElement('div');
        actions.className = 'comparison-actions';
        var compareBtn = document.createElement('button');
        compareBtn.type = 'button';
        compareBtn.className = 'btn btn-primary';
        compareBtn.setAttribute('data-action', 'compare-projects');
        compareBtn.textContent = 'Compare projects';
        if (!count) {
          compareBtn.disabled = true;
        }
        var clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.className = 'btn btn-ghost';
        clearBtn.setAttribute('data-action', 'clear-comparison');
        clearBtn.textContent = 'Clear';
        actions.appendChild(compareBtn);
        actions.appendChild(clearBtn);

        inner.appendChild(summary);
        inner.appendChild(actions);
        container.appendChild(inner);
      }

      function toggleComparison(projectId) {
        if (!projectId) {
          return;
        }
        var currentIds = getSelectedComparisonIds();
        var isSelected = false;
        for (var i = 0; i < currentIds.length; i += 1) {
          if (currentIds[i] === projectId) {
            isSelected = true;
            break;
          }
        }
        try {
          var response;
          if (isSelected) {
            response = WebsiteSDK.removeProjectFromComparison(projectId);
          } else {
            response = WebsiteSDK.addProjectToComparison(projectId);
          }
          if (response && response.success) {
            state.comparison = {
              selection: response.comparison,
              selected_projects: response.selected_projects
            };
            var toolbarEl = document.querySelector('[data-populate="comparison-toolbar"]');
            if (toolbarEl) {
              renderComparisonToolbar(toolbarEl);
            }
            var listEl = document.querySelector('[data-populate="project-list"]');
            if (listEl) {
              renderProjectList(listEl);
            }
          }
        } catch (e) {
          console.error('Error updating comparison selection', e);
        }
      }

      function clearComparisonSelection() {
        var ids = getSelectedComparisonIds();
        if (!ids.length) {
          return;
        }
        for (var i = 0; i < ids.length; i += 1) {
          try {
            WebsiteSDK.removeProjectFromComparison(ids[i]);
          } catch (e) {
            console.error('Error removing project from comparison', ids[i], e);
          }
        }
        try {
          state.comparison = WebsiteSDK.getProjectComparisonSelection();
        } catch (e2) {
          console.error('Error reloading comparison selection after clear', e2);
          state.comparison = null;
        }
        var toolbarEl = document.querySelector('[data-populate="comparison-toolbar"]');
        if (toolbarEl) {
          renderComparisonToolbar(toolbarEl);
        }
        var listEl = document.querySelector('[data-populate="project-list"]');
        if (listEl) {
          renderProjectList(listEl);
        }
      }

      function handleFilterChange(controlEl) {
        if (!controlEl) {
          return;
        }
        var filterKey = controlEl.getAttribute('data-filter-key');
        if (!filterKey) {
          return;
        }
        var isCheckbox = controlEl.type === 'checkbox';
        var isSelect = controlEl.tagName === 'SELECT';

        if (filterKey === 'category' && isSelect) {
          var catValue = controlEl.value;
          updateUrl(function (params) {
            if (catValue) {
              params.set('category', catValue);
            } else {
              params.delete('category');
            }
          }, true);
          return;
        }

        if (filterKey === 'cloud' && isSelect) {
          var cloudValue = controlEl.value;
          updateUrl(function (params) {
            if (cloudValue) {
              params.set('cloud', cloudValue);
            } else {
              params.delete('cloud');
            }
          }, true);
          return;
        }

        if (filterKey === 'environment' && isSelect) {
          var envValue = controlEl.value;
          updateUrl(function (params) {
            if (envValue) {
              params.set('environment', envValue);
            } else {
              params.delete('environment');
            }
          }, true);
          return;
        }

        if (filterKey === 'technologies' || filterKey === 'tags' || filterKey === 'languages') {
          var selector = 'input[data-filter-key="' + filterKey + '"]';
          var all = document.querySelectorAll(selector);
          var values = [];
          for (var i = 0; i < all.length; i += 1) {
            var cb = all[i];
            if (cb.checked && cb.value) {
              values.push(cb.value);
            }
          }
          var paramName = filterKey;
          updateUrl(function (params) {
            if (values.length) {
              params.set(paramName, values.join(','));
            } else {
              params.delete(paramName);
            }
          }, true);
          return;
        }

        if (filterKey === 'usesKubernetes' || filterKey === 'usesTerraform' || filterKey === 'usesAws' || filterKey === 'hasCiCd' || filterKey === 'isMicroservices') {
          var checked = controlEl.checked;
          var boolParam = filterKey;
          updateUrl(function (params) {
            if (checked) {
              params.set(boolParam, 'true');
            } else {
              params.delete(boolParam);
            }
          }, true);
        }
      }

      function handleSortChange(selectEl) {
        if (!selectEl) {
          return;
        }
        var sortKey = selectEl.value;
        updateUrl(function (params) {
          if (sortKey) {
            params.set('sort', sortKey);
          } else {
            params.delete('sort');
          }
        }, true);
      }

      function handleSearchSubmit(formEl) {
        if (!formEl) {
          return;
        }
        var input = formEl.querySelector('input[name="query"]');
        var value = input ? input.value.trim() : '';
        updateUrl(function (params) {
          if (value) {
            params.set('query', value);
          } else {
            params.delete('query');
          }
        }, true);
      }

      function handleSearchClear() {
        var input = document.getElementById('project-search-input');
        if (input) {
          input.value = '';
        }
        updateUrl(function (params) {
          params.delete('query');
        }, true);
      }

      function handlePageChange(targetPage) {
        if (!targetPage || targetPage < 1) {
          targetPage = 1;
        }
        updateUrl(function (params) {
          params.set('page', String(targetPage));
        }, false);
      }

      document.addEventListener('submit', function (event) {
        var target = event.target;
        if (target && target.getAttribute('data-action') === 'search-form') {
          event.preventDefault();
          handleSearchSubmit(target);
        }
      });

      document.addEventListener('click', function (event) {
        var el = event.target.closest('[data-action]');
        if (!el) {
          return;
        }
        var action = el.getAttribute('data-action');
        if (action === 'search-clear') {
          event.preventDefault();
          handleSearchClear();
        } else if (action === 'toggle-comparison') {
          event.preventDefault();
          event.stopPropagation();
          var projectId = el.getAttribute('data-project-id');
          toggleComparison(projectId);
        } else if (action === 'open-project-detail') {
          var cardProjectId = el.getAttribute('data-project-id');
          if (cardProjectId) {
            window.location.href = 'project_detail.html?id=' + encodeURIComponent(cardProjectId);
          }
        } else if (action === 'compare-projects') {
          var ids = getSelectedComparisonIds();
          if (ids.length > 0) {
            window.location.href = 'project_comparison.html';
          }
        } else if (action === 'clear-comparison') {
          clearComparisonSelection();
        } else if (action === 'page-change') {
          var pageStr = el.getAttribute('data-page');
          var pageNum = parseInt(pageStr, 10);
          if (!pageNum || pageNum < 1) {
            pageNum = 1;
          }
          handlePageChange(pageNum);
        }
      });

      document.addEventListener('change', function (event) {
        var el = event.target.closest('[data-action]');
        if (!el) {
          return;
        }
        var action = el.getAttribute('data-action');
        if (action === 'filter-change') {
          handleFilterChange(el);
        } else if (action === 'sort-change') {
          handleSortChange(el);
        }
      });

      window.addEventListener('popstate', function () {
        syncUrlAndSearch();
      });

      document.addEventListener('DOMContentLoaded', function () {
        ensureFilterOptions();
        loadComparisonSelection();
        syncUrlAndSearch();
      });
    })();
  </script>
</body>
</html>
