<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio - Software &amp; DevOps Engineer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&amp;family=Work+Sans:wght@300;400;500;600;700&amp;family=Fira+Code:wght@400;500&amp;display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="blog_post.css">
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="container header-top-inner">
        <div class="branding">
          <a href="index.html" class="branding-link">
            <h1 class="site-title">Jon Gunter</h1>
            <p class="site-tagline">Software &amp; DevOps Engineer</p>
          </a>
        </div>
        <div class="header-meta" aria-hidden="true">
          <!-- Reserved for future persistent header items (e.g., avatar) -->
        </div>
      </div>
    </div>

    <nav class="primary-nav" aria-label="Primary navigation">
      <div class="container">
        <ul class="nav-list">
          <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="projects.html" class="nav-link">Projects</a></li>
          <li class="nav-item"><a href="skills.html" class="nav-link">Skills</a></li>
          <li class="nav-item"><a href="blog.html" class="nav-link is-active">Blog</a></li>
          <li class="nav-item"><a href="reading_list.html" class="nav-link">Reading List</a></li>
          <li class="nav-item"><a href="resume_builder.html" class="nav-link">Resume</a></li>
          <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
          <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <div class="page-background">
    <main id="content" class="site-main" role="main">
      <div class="container">
        <section class="content-card content-card--blog-post" aria-label="Blog post detail">
          <!-- Loading state -->
          <div class="blog-post-state blog-post-state--loading" data-component="post-loading-indicator">
            <div class="loading-indicator" aria-hidden="true"></div>
            <p class="loading-text">Loading post...</p>
          </div>

          <!-- Error state -->
          <div class="blog-post-state blog-post-state--error is-hidden" data-component="post-error-state">
            <div class="error-state-inner">
              <div class="error-icon" aria-hidden="true">!</div>
              <div class="error-message" data-populate="error-message"></div>
            </div>
          </div>

          <!-- Main article content -->
          <article class="blog-post-article is-hidden" data-component="post-article">
            <header class="blog-post-header" data-component="post-detail-header" data-populate="post-header"></header>

            <hr class="blog-post-divider" aria-hidden="true">

            <div class="blog-post-body" data-component="post-content-viewer" data-populate="post-content"></div>

            <section class="blog-post-tags" aria-label="Post tags" data-component="post-tag-chip-list" data-populate="post-tags"></section>

            <nav class="blog-post-adjacent-nav" aria-label="Previous and next posts" data-component="adjacent-post-navigation" data-populate="post-adjacent-nav"></nav>
          </article>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-nav-list">
            <li class="footer-nav-item"><a href="about.html" class="footer-link">About</a></li>
            <li class="footer-nav-item"><a href="projects.html" class="footer-link">Projects</a></li>
            <li class="footer-nav-item"><a href="blog.html" class="footer-link">Blog</a></li>
            <li class="footer-nav-item"><a href="reading_list.html" class="footer-link">Reading List</a></li>
            <li class="footer-nav-item"><a href="resume_builder.html" class="footer-link">Resume</a></li>
            <li class="footer-nav-item"><a href="newsletter.html" class="footer-link">Newsletter</a></li>
            <li class="footer-nav-item"><a href="contact.html" class="footer-link">Contact</a></li>
          </ul>
        </nav>
        <p class="footer-meta">
          &copy; <span id="year"></span> Jon Gunter. All rights reserved.
        </p>
      </div>
    </footer>
  </div>

  <script>
    // Simple dynamic year in footer
    (function () {
      var yearEl = document.getElementById('year');
      if (yearEl) {
        yearEl.textContent = new Date().getFullYear();
      }
    })();
  </script>

  <script src="business_logic.js"></script>
  <script>
    (function () {
      'use strict';

      var currentPost = null;
      var isInReadingList = false;
      var readingListMutationInFlight = false;
      var populateTargetsByKey = {};

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeAttribute(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function formatDate(value) {
        if (!value) {
          return '';
        }
        var date = new Date(value);
        if (isNaN(date.getTime())) {
          return '';
        }
        return date.toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      }

      function showState(state) {
        var loadingEl = document.querySelector('[data-component="post-loading-indicator"]');
        var errorEl = document.querySelector('[data-component="post-error-state"]');
        var articleEl = document.querySelector('[data-component="post-article"]');

        if (loadingEl) {
          loadingEl.classList.toggle('is-hidden', state !== 'loading');
        }
        if (errorEl) {
          errorEl.classList.toggle('is-hidden', state !== 'error');
        }
        if (articleEl) {
          articleEl.classList.toggle('is-hidden', state !== 'content');
        }
      }

      function renderPostHeader(container, details) {
        var post = details && details.post ? details.post : null;
        if (!post) {
          container.innerHTML = '';
          return;
        }

        var tags = details && details.tags ? details.tags : [];
        var primaryTagSlug = post.primary_tag_slug || (post.tag_slugs && post.tag_slugs.length ? post.tag_slugs[0] : null);
        var primaryTagName = '';
        if (primaryTagSlug && tags && tags.length) {
          for (var i = 0; i < tags.length; i += 1) {
            if (tags[i] && tags[i].slug === primaryTagSlug) {
              primaryTagName = tags[i].name || '';
              break;
            }
          }
        }

        var minutes = post.reading_time_minutes || 0;
        var readingCategory = '';
        if (minutes <= 7) {
          readingCategory = 'Short read';
        } else if (minutes >= 12) {
          readingCategory = 'Long read';
        } else {
          readingCategory = 'Medium read';
        }

        var publishedLabel = formatDate(post.published_at);
        var updatedLabel = post.updated_at ? formatDate(post.updated_at) : '';
        var readingTimeLabel = (minutes || minutes === 0 ? minutes : '') + ' min read';

        var inList = !!details.is_in_reading_list;
        var readingButtonClass = inList ? 'btn-reading-toggle is-active' : 'btn-reading-toggle';
        var readingButtonLabel = inList ? 'Remove from reading list' : 'Add to reading list';
        var readingButtonPressed = inList ? 'true' : 'false';

        container.innerHTML = "" +
          "<div class=\"blog-post-header-inner\">" +
          "  <div class=\"blog-post-header-top\">" +
          "    <a href=\"javascript:void(0)\" class=\"link-back\" data-action=\"back-to-blog\">&larr; Back to blog</a>" +
          "  </div>" +
          "  <h1 class=\"blog-post-title\">" + escapeHtml(post.title || '') + "</h1>" +
          (post.summary ? "  <p class=\"blog-post-summary\">" + escapeHtml(post.summary) + "</p>" : '') +
          "  <div class=\"blog-post-meta-row\">" +
          "    <div class=\"blog-post-meta-left\">" +
          (publishedLabel ? "      <span class=\"meta-item meta-date\" aria-label=\"Published date\">" + escapeHtml(publishedLabel) + "</span>" : '') +
          (publishedLabel && updatedLabel ? "      <span class=\"meta-separator\">&bull;</span>" : '') +
          (updatedLabel ? "      <span class=\"meta-item meta-updated\" aria-label=\"Last updated\">Updated " + escapeHtml(updatedLabel) + "</span>" : '') +
          (publishedLabel || updatedLabel ? "      <span class=\"meta-separator\">&bull;</span>" : '') +
          "      <span class=\"meta-item meta-reading-time\" data-component=\"post-reading-time-indicator\" aria-label=\"Estimated reading time\">" +
          "        " + escapeHtml(readingTimeLabel) + " <span class=\"meta-reading-category\">(" + escapeHtml(readingCategory) + ")</span>" +
          "      </span>" +
          (primaryTagName ? "      <span class=\"meta-separator\">&bull;</span><span class=\"meta-item meta-primary-tag\">Topic: " + escapeHtml(primaryTagName) + "</span>" : '') +
          "    </div>" +
          "    <div class=\"blog-post-meta-right\">" +
          "      <button type=\"button\"" +
          "              class=\"" + readingButtonClass + "\"" +
          "              data-component=\"reading-list-toggle\"" +
          "              data-action=\"toggle-reading-list\"" +
          "              aria-pressed=\"" + readingButtonPressed + "\">" +
          "        <span class=\"btn-reading-toggle-label\">" + escapeHtml(readingButtonLabel) + "</span>" +
          "      </button>" +
          "    </div>" +
          "  </div>" +
          "</div>";
      }

      function renderPostContent(container, post) {
        if (!post) {
          container.innerHTML = '';
          return;
        }
        var heroHtml = '';
        if (post.hero_image_url) {
          heroHtml = "<figure class=\"blog-post-hero\">" +
            "<img src=\"" + escapeAttribute(post.hero_image_url) + "\" alt=\"\">" +
            "</figure>";
        }
        var contentHtml = post.content || '';
        container.innerHTML = "" +
          heroHtml +
          "<div class=\"blog-post-content-body\">" +
          contentHtml +
          "</div>";
      }

      function renderPostTags(container, tags) {
        if (!tags || !tags.length) {
          container.innerHTML = '';
          container.classList.add('is-empty');
          return;
        }
        var chipsHtmlParts = [];
        for (var i = 0; i < tags.length; i += 1) {
          var tag = tags[i];
          if (!tag) {
            continue;
          }
          chipsHtmlParts.push(
            "<li class=\"tag-chip-item\">" +
            "  <a href=\"javascript:void(0)\"" +
            "     class=\"tag-chip\"" +
            "     data-action=\"filter-by-tag\"" +
            "     data-tag-slug=\"" + escapeAttribute(tag.slug) + "\">" +
            escapeHtml(tag.name) +
            "  </a>" +
            "</li>"
          );
        }
        container.innerHTML = "" +
          "<h2 class=\"blog-post-tags-heading\">Tags</h2>" +
          "<ul class=\"tag-chip-list\">" +
          chipsHtmlParts.join('') +
          "</ul>";
      }

      function renderAdjacentNav(container, previousPost, nextPost) {
        var hasPrev = !!(previousPost && previousPost.id);
        var hasNext = !!(nextPost && nextPost.id);
        if (!hasPrev && !hasNext) {
          container.innerHTML = '';
          container.classList.add('is-empty');
          return;
        }

        var prevHtml = '';
        if (hasPrev) {
          prevHtml = "<a href=\"javascript:void(0)\"" +
            "   class=\"adjacent-link adjacent-link--prev\"" +
            "   data-action=\"previous-post\"" +
            "   data-post-id=\"" + escapeAttribute(previousPost.id) + "\">" +
            "  &larr; Previous: " + escapeHtml(previousPost.title || '') +
            "</a>";
        } else {
          prevHtml = "<span class=\"adjacent-link-placeholder\"></span>";
        }

        var nextHtml = '';
        if (hasNext) {
          nextHtml = "<a href=\"javascript:void(0)\"" +
            "   class=\"adjacent-link adjacent-link--next\"" +
            "   data-action=\"next-post\"" +
            "   data-post-id=\"" + escapeAttribute(nextPost.id) + "\">" +
            "  Next: " + escapeHtml(nextPost.title || '') + " &rarr;" +
            "</a>";
        } else {
          nextHtml = "<span class=\"adjacent-link-placeholder\"></span>";
        }

        container.innerHTML = "" +
          "<div class=\"adjacent-nav-inner\">" +
          "  <div class=\"adjacent-nav-item adjacent-nav-item--prev\">" + prevHtml + "</div>" +
          "  <div class=\"adjacent-nav-item adjacent-nav-item--next\">" + nextHtml + "</div>" +
          "</div>";
      }

      function renderError(container, message) {
        var safeMessage = message || 'The requested post could not be found.';
        container.innerHTML = "" +
          "<h2 class=\"error-title\">Post not available</h2>" +
          "<p class=\"error-description\">" + escapeHtml(safeMessage) + "</p>" +
          "<button type=\"button\" class=\"btn-primary error-back-button\" data-action=\"back-to-blog-from-error\">" +
          "  Back to blog" +
          "</button>";
      }

      function updateReadingListButtonUI(button, active) {
        if (!button) {
          return;
        }
        button.classList.toggle('is-active', !!active);
        button.setAttribute('aria-pressed', active ? 'true' : 'false');
        var labelEl = button.querySelector('.btn-reading-toggle-label');
        if (labelEl) {
          labelEl.textContent = active ? 'Remove from reading list' : 'Add to reading list';
        }
      }

      function showReadingListError(message) {
        var fallbackMessage = message || 'Unable to update the reading list. Please try again.';
        window.alert(fallbackMessage);
      }

      function bindActionHandlers() {
        var actionElements = document.querySelectorAll('[data-action]');
        for (var i = 0; i < actionElements.length; i += 1) {
          var el = actionElements[i];
          if (!el || el.dataset.actionBound === 'true') {
            continue;
          }
          var action = el.dataset.action;

          if (action === 'back-to-blog' || action === 'back-to-blog-from-error') {
            el.addEventListener('click', function (event) {
              event.preventDefault();
              window.location.href = 'blog.html';
            });
          } else if (action === 'toggle-reading-list') {
            el.addEventListener('click', function (event) {
              event.preventDefault();
              if (!currentPost || readingListMutationInFlight) {
                return;
              }
              var button = event.currentTarget;
              readingListMutationInFlight = true;
              button.disabled = true;
              try {
                if (!isInReadingList) {
                  var addResult = WebsiteSDK.addBlogPostToReadingList(currentPost.id);
                  if (addResult && addResult.success) {
                    isInReadingList = true;
                    updateReadingListButtonUI(button, true);
                  } else {
                    showReadingListError(addResult && addResult.message ? addResult.message : 'Could not add to reading list.');
                  }
                } else {
                  var removeResult = WebsiteSDK.removeBlogPostFromReadingList(currentPost.id);
                  if (removeResult && removeResult.success) {
                    isInReadingList = false;
                    updateReadingListButtonUI(button, false);
                  } else {
                    showReadingListError(removeResult && removeResult.message ? removeResult.message : 'Could not remove from reading list.');
                  }
                }
              } catch (err) {
                showReadingListError('Something went wrong while updating the reading list.');
              }
              readingListMutationInFlight = false;
              button.disabled = false;
            });
          } else if (action === 'filter-by-tag') {
            el.addEventListener('click', function (event) {
              event.preventDefault();
              var target = event.currentTarget;
              var slug = target.dataset.tagSlug;
              if (!slug) {
                return;
              }
              window.location.href = 'blog.html?tag=' + encodeURIComponent(slug);
            });
          } else if (action === 'next-post') {
            el.addEventListener('click', function (event) {
              event.preventDefault();
              var target = event.currentTarget;
              var postId = target.dataset.postId;
              if (!postId) {
                return;
              }
              window.location.href = 'blog_post.html?id=' + encodeURIComponent(postId);
            });
          } else if (action === 'previous-post') {
            el.addEventListener('click', function (event) {
              event.preventDefault();
              var target = event.currentTarget;
              var postId = target.dataset.postId;
              if (!postId) {
                return;
              }
              window.location.href = 'blog_post.html?id=' + encodeURIComponent(postId);
            });
          }

          el.dataset.actionBound = 'true';
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        var populateElements = document.querySelectorAll('[data-populate]');
        for (var i = 0; i < populateElements.length; i += 1) {
          var el = populateElements[i];
          var key = el.dataset.populate;
          if (!key) {
            continue;
          }
          if (!populateTargetsByKey[key]) {
            populateTargetsByKey[key] = [];
          }
          populateTargetsByKey[key].push(el);
        }

        var urlParams = new URLSearchParams(window.location.search);
        var postId = urlParams.get('id');

        if (!postId) {
          showState('error');
          var errorTargets = populateTargetsByKey['error-message'] || [];
          for (var ei = 0; ei < errorTargets.length; ei += 1) {
            renderError(errorTargets[ei], 'Post ID is missing from the URL.');
          }
          bindActionHandlers();
          return;
        }

        showState('loading');

        try {
          var details = WebsiteSDK.getBlogPostDetails(postId);
          if (!details || !details.post) {
            showState('error');
            var errorTargets2 = populateTargetsByKey['error-message'] || [];
            for (var ej = 0; ej < errorTargets2.length; ej += 1) {
              renderError(errorTargets2[ej], 'Post not found for the given ID.');
            }
            bindActionHandlers();
            return;
          }

          currentPost = details.post;
          isInReadingList = !!details.is_in_reading_list;

          var headerTargets = populateTargetsByKey['post-header'] || [];
          for (var hi = 0; hi < headerTargets.length; hi += 1) {
            renderPostHeader(headerTargets[hi], details);
          }

          var contentTargets = populateTargetsByKey['post-content'] || [];
          for (var ci = 0; ci < contentTargets.length; ci += 1) {
            renderPostContent(contentTargets[ci], details.post);
          }

          var tagTargets = populateTargetsByKey['post-tags'] || [];
          for (var ti = 0; ti < tagTargets.length; ti += 1) {
            renderPostTags(tagTargets[ti], details.tags || []);
          }

          var navTargets = populateTargetsByKey['post-adjacent-nav'] || [];
          for (var ni = 0; ni < navTargets.length; ni += 1) {
            renderAdjacentNav(navTargets[ni], details.previous_post || null, details.next_post || null);
          }

          showState('content');
          bindActionHandlers();
        } catch (err) {
          showState('error');
          var errorTargets3 = populateTargetsByKey['error-message'] || [];
          for (var ek = 0; ek < errorTargets3.length; ek += 1) {
            renderError(errorTargets3[ek], 'An error occurred while loading the post.');
          }
          bindActionHandlers();
        }
      });
    })();
  </script>
</body>
</html>
