<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio - Software &amp; DevOps Engineer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&amp;family=Work+Sans:wght@300;400;500;600;700&amp;family=Fira+Code:wght@400;500&amp;display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="project_comparison.css">
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="container header-top-inner">
        <div class="branding">
          <a href="index.html" class="branding-link">
            <h1 class="site-title">Jon Gunter</h1>
            <p class="site-tagline">Software &amp; DevOps Engineer</p>
          </a>
        </div>
        <div class="header-meta" aria-hidden="true">
          <!-- Reserved for future persistent header items (e.g., avatar) -->
        </div>
      </div>
    </div>

    <nav class="primary-nav" aria-label="Primary navigation">
      <div class="container">
        <ul class="nav-list">
          <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="projects.html" class="nav-link is-active">Projects</a></li>
          <li class="nav-item"><a href="skills.html" class="nav-link">Skills</a></li>
          <li class="nav-item"><a href="blog.html" class="nav-link">Blog</a></li>
          <li class="nav-item"><a href="reading_list.html" class="nav-link">Reading List</a></li>
          <li class="nav-item"><a href="resume_builder.html" class="nav-link">Resume</a></li>
          <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
          <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <div class="page-background">
    <main id="content" class="site-main" role="main">
      <div class="container">
        <section class="content-card comparison-card" aria-label="Project comparison" data-component="comparison-page-controller">
          <header class="comparison-header" data-component="comparison-header-bar" aria-live="polite">
            <!-- Populated by JS -->
          </header>

          <hr class="comparison-divider" aria-hidden="true">

          <section class="comparison-selection-summary" data-component="comparison-selection-summary" aria-label="Selected projects summary">
            <!-- Populated by JS -->
          </section>

          <section class="comparison-main" aria-label="Project comparison details">
            <div class="comparison-empty-state" data-component="comparison-empty-state-handler" hidden>
              <!-- Populated by JS when needed -->
            </div>

            <div class="comparison-table-wrapper" data-component="project-comparison-table" aria-live="polite">
              <!-- Populated by JS -->
            </div>
          </section>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <nav class="footer-nav" aria-label="Footer navigation">
          <ul class="footer-nav-list">
            <li class="footer-nav-item"><a href="about.html" class="footer-link">About</a></li>
            <li class="footer-nav-item"><a href="projects.html" class="footer-link">Projects</a></li>
            <li class="footer-nav-item"><a href="blog.html" class="footer-link">Blog</a></li>
            <li class="footer-nav-item"><a href="reading_list.html" class="footer-link">Reading List</a></li>
            <li class="footer-nav-item"><a href="resume_builder.html" class="footer-link">Resume</a></li>
            <li class="footer-nav-item"><a href="newsletter.html" class="footer-link">Newsletter</a></li>
            <li class="footer-nav-item"><a href="contact.html" class="footer-link">Contact</a></li>
          </ul>
        </nav>
        <p class="footer-meta">
          &copy; <span id="year"></span> Jon Gunter. All rights reserved.
        </p>
      </div>
    </footer>
  </div>

  <script>
    // Simple dynamic year in footer
    (function () {
      var yearEl = document.getElementById('year');
      if (yearEl) {
        yearEl.textContent = new Date().getFullYear();
      }
    })();
  </script>

  <script src="business_logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var state = {
        selection: null,
        selectedProjects: [],
        view: null,
        sortParam: null,
        sortBy: null,
        singleProjectMode: false
      };

      var urlParams = new URLSearchParams(window.location.search);
      state.sortParam = urlParams.get('sort');

      var elements = {
        pageController: document.querySelector('[data-component="comparison-page-controller"]'),
        headerBar: document.querySelector('[data-component="comparison-header-bar"]'),
        selectionSummary: document.querySelector('[data-component="comparison-selection-summary"]'),
        comparisonTable: document.querySelector('[data-component="project-comparison-table"]'),
        emptyState: document.querySelector('[data-component="comparison-empty-state-handler"]')
      };

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatSortLabel(sortBy) {
        if (!sortBy) {
          return 'Default order';
        }
        switch (sortBy) {
          case 'start_date_desc':
            return 'Start date (newest first)';
          case 'start_date_asc':
            return 'Start date (oldest first)';
          case 'last_updated_desc':
            return 'Last updated (newest first)';
          case 'last_updated_asc':
            return 'Last updated (oldest first)';
          default:
            return sortBy;
        }
      }

      function formatBooleanFlag(flag) {
        if (flag === true) {
          return 'Yes';
        }
        if (flag === false) {
          return 'No';
        }
        return '';
      }

      function formatDate(value) {
        if (!value) {
          return '';
        }
        try {
          var date = new Date(value);
          if (isNaN(date.getTime())) {
            return escapeHtml(value);
          }
          return date.toLocaleDateString(undefined, {
            year: 'numeric',
            month: 'short'
          });
        } catch (e) {
          return escapeHtml(value);
        }
      }

      function renderError(error) {
        if (!elements.pageController) {
          return;
        }
        var message = (error && error.message) ? error.message : 'An unexpected error occurred.';
        elements.pageController.innerHTML = (
          '<div class="comparison-error">' +
            '<h2 class="comparison-error-title">Unable to load comparison</h2>' +
            '<p class="comparison-error-message">' + escapeHtml(message) + '</p>' +
            '<button type="button" class="btn-primary" data-action="back-to-projects">Back to projects</button>' +
          '</div>'
        );
      }

      function renderHeader(container, currentState) {
        if (!container) {
          return;
        }
        var projects = (currentState.view && Array.isArray(currentState.view.projects)) ? currentState.view.projects : [];
        var count = projects.length;
        var sortLabel = formatSortLabel(currentState.sortBy);
        var sortMismatch = currentState.sortParam && currentState.sortBy && currentState.sortParam !== currentState.sortBy;

        container.innerHTML = (
          '<div class="comparison-header-inner">' +
            '<div class="comparison-header-left">' +
              '<h1 class="comparison-title">Project Comparison</h1>' +
              '<p class="comparison-subtitle">Terraform-on-AWS production focus</p>' +
            '</div>' +
            '<div class="comparison-header-right">' +
              '<div class="comparison-meta">' +
                '<span class="comparison-count">' +
                  '<span class="comparison-count-number">' + count + '</span> project' + (count === 1 ? '' : 's') + ' in comparison' +
                '</span>' +
                '<span class="comparison-sort">' +
                  'Sorted by <span class="comparison-sort-value">' + escapeHtml(sortLabel) + '</span>' +
                '</span>' +
                (sortMismatch ? (
                  '<span class="comparison-sort-note">' +
                    'Requested sort \'"' + escapeHtml(currentState.sortParam) + '\"\u00a0adjusted to active order.' +
                  '</span>'
                ) : '') +
              '</div>' +
              '<a href="javascript:void(0)" class="link-back-projects" data-action="back-to-projects">Back to projects</a>' +
            '</div>' +
          '</div>'
        );
      }

      function renderSelectionSummary(container, currentState) {
        if (!container) {
          return;
        }
        var projects = (currentState.view && Array.isArray(currentState.view.projects)) ? currentState.view.projects : [];
        var count = projects.length;
        var hint = currentState.singleProjectMode
          ? 'Add at least one more project from the Projects page for a more useful side-by-side comparison.'
          : '';

        var tagsHtml = projects.map(function (item) {
          var project = item.project || {};
          var title = project.title ? escapeHtml(project.title) : 'Untitled project';
          return '<span class="selection-project-tag" title="' + title + '">' + title + '</span>';
        }).join('');

        if (!tagsHtml) {
          tagsHtml = '<span class="selection-none">No projects selected.</span>';
        }

        container.innerHTML = (
          '<div class="selection-summary-inner">' +
            '<div class="selection-summary-left">' +
              '<span class="selection-label">Comparing</span>' +
              '<span class="selection-count">' + count + ' project' + (count === 1 ? '' : 's') + '</span>' +
            '</div>' +
            '<div class="selection-summary-center" aria-label="Selected project titles">' +
              tagsHtml +
            '</div>' +
            '<div class="selection-summary-right">' +
              (hint ? '<p class="selection-hint">' + escapeHtml(hint) + '</p>' : '') +
            '</div>' +
          '</div>'
        );
      }

      function buildComparisonTableHtml(projects, singleProjectMode) {
        var headerCellsHtml = '';

        projects.forEach(function (item) {
          var project = item.project || {};
          var projectId = project.id ? String(project.id) : '';
          var title = project.title ? escapeHtml(project.title) : 'Untitled project';
          var organization = project.organization ? escapeHtml(project.organization) : '';
          var roleTitle = project.role_title ? escapeHtml(project.role_title) : '';
          var isTerraformOnAwsProduction = item.is_terraform_on_aws_production === true;

          headerCellsHtml += (
            '<th scope="col" class="col-project' + (isTerraformOnAwsProduction ? ' tf-aws-production-col' : '') + '">' +
              '<div class="project-header-block" tabindex="0" aria-label="Project: ' + title + '">' +
                '<div class="project-header-main">' +
                  '<button type="button" class="project-title-link" data-action="view-details" data-project-id="' + escapeHtml(projectId) + '">' +
                    title +
                  '</button>' +
                  (organization ? '<div class="project-organization">' + organization + '</div>' : '') +
                  (roleTitle ? '<div class="project-role">' + roleTitle + '</div>' : '') +
                '</div>' +
                '<div class="project-header-meta">' +
                  '<div class="terraform-indicator" data-component="terraform-aws-production-indicator">' +
                    (isTerraformOnAwsProduction
                      ? '<span class="tf-aws-badge" title="Terraform on AWS production project">TF ON AWS PROD</span>'
                      : '<span class="tf-aws-badge tf-aws-badge--inactive" title="Not a Terraform-on-AWS production project">Not TF on AWS prod</span>'
                    ) +
                  '</div>' +
                  '<div class="project-column-actions" data-component="project-column-actions">' +
                    '<button type="button" class="link-inline" data-action="view-details" data-project-id="' + escapeHtml(projectId) + '">View details</button>' +
                    '<button type="button" class="link-inline link-danger" data-action="remove-from-comparison" data-project-id="' + escapeHtml(projectId) + '">Remove from comparison</button>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</th>'
          );
        });

        var rowsConfig = [
          {
            id: 'role_title',
            label: 'Role',
            getCellHtml: function (item) {
              var project = item.project || {};
              return escapeHtml(project.role_title || '');
            }
          },
          {
            id: 'organization',
            label: 'Organization',
            getCellHtml: function (item) {
              var project = item.project || {};
              return escapeHtml(project.organization || '');
            }
          },
          {
            id: 'project_type',
            label: 'Project type',
            getCellHtml: function (item) {
              var project = item.project || {};
              return escapeHtml(project.project_type || '');
            }
          },
          {
            id: 'environment_label',
            label: 'Environment',
            getCellHtml: function (item) {
              return escapeHtml(item.environment_label || '');
            }
          },
          {
            id: 'cloud_provider_label',
            label: 'Cloud provider',
            getCellHtml: function (item) {
              return escapeHtml(item.cloud_provider_label || '');
            }
          },
          {
            id: 'technologies',
            label: 'Technologies',
            getCellHtml: function (item) {
              var techs = [];
              if (Array.isArray(item.technologies) && item.technologies.length) {
                techs = item.technologies;
              } else if (item.project && Array.isArray(item.project.technologies) && item.project.technologies.length) {
                techs = item.project.technologies;
              }
              return techs.map(function (t) { return '<span class="tech-pill">' + escapeHtml(t) + '</span>'; }).join('');
            }
          },
          {
            id: 'ci_cd',
            label: 'CI/CD',
            getCellHtml: function (item) {
              var project = item.project || {};
              return formatBooleanFlag(project.has_ci_cd);
            }
          },
          {
            id: 'uses_terraform',
            label: 'Terraform',
            getCellHtml: function (item) {
              var project = item.project || {};
              return formatBooleanFlag(project.uses_terraform);
            }
          },
          {
            id: 'uses_aws',
            label: 'AWS',
            getCellHtml: function (item) {
              var project = item.project || {};
              return formatBooleanFlag(project.uses_aws);
            }
          },
          {
            id: 'uses_kubernetes',
            label: 'Kubernetes',
            getCellHtml: function (item) {
              var project = item.project || {};
              return formatBooleanFlag(project.uses_kubernetes);
            }
          },
          {
            id: 'is_microservices',
            label: 'Microservices',
            getCellHtml: function (item) {
              var project = item.project || {};
              return formatBooleanFlag(project.is_microservices);
            }
          },
          {
            id: 'start_date',
            label: 'Start date',
            getCellHtml: function (item) {
              var project = item.project || {};
              return formatDate(project.start_date);
            }
          },
          {
            id: 'end_date',
            label: 'End date',
            getCellHtml: function (item) {
              var project = item.project || {};
              var label = formatDate(project.end_date);
              if (!project.end_date) {
                label = 'Ongoing';
              }
              return label;
            }
          },
          {
            id: 'responsibilities',
            label: 'Key responsibilities',
            getCellHtml: function (item) {
              var project = item.project || {};
              var resps = Array.isArray(project.responsibilities) ? project.responsibilities : [];
              if (!resps.length) {
                return '';
              }
              var listItems = resps.map(function (r) {
                return '<li>' + escapeHtml(r) + '</li>';
              }).join('');
              return '<ul class="cell-list">' + listItems + '</ul>';
            }
          },
          {
            id: 'outcomes',
            label: 'Outcomes / impact',
            getCellHtml: function (item) {
              var project = item.project || {};
              var outcomes = Array.isArray(project.outcomes) ? project.outcomes : [];
              if (!outcomes.length) {
                return '';
              }
              var listItems = outcomes.map(function (o) {
                return '<li>' + escapeHtml(o) + '</li>';
              }).join('');
              return '<ul class="cell-list">' + listItems + '</ul>';
            }
          }
        ];

        var bodyRowsHtml = rowsConfig.map(function (row) {
          var cellsHtml = '';
          projects.forEach(function (item) {
            var isTerraformOnAwsProduction = item.is_terraform_on_aws_production === true;
            var cellContent = row.getCellHtml(item) || '';
            cellsHtml += (
              '<td class="cell-project' + (isTerraformOnAwsProduction ? ' tf-aws-production-cell' : '') + '">' +
                cellContent +
              '</td>'
            );
          });

          return (
            '<tr class="comparison-row comparison-row-' + row.id + '">' +
              '<th scope="row" class="cell-attribute">' + row.label + '</th>' +
              cellsHtml +
            '</tr>'
          );
        }).join('');

        var singleModeNotice = singleProjectMode
          ? '<caption class="comparison-caption">Showing a single project. Add at least one more project on the Projects page to compare side-by-side.</caption>'
          : '';

        var tableHtml = (
          '<div class="comparison-table-scroll" role="region" aria-label="Side-by-side project comparison table">' +
            '<table class="comparison-table">' +
              singleModeNotice +
              '<thead>' +
                '<tr>' +
                  '<th scope="col" class="col-attribute">Attribute</th>' +
                  headerCellsHtml +
                '</tr>' +
              '</thead>' +
              '<tbody>' +
                bodyRowsHtml +
              '</tbody>' +
            '</table>' +
          '</div>'
        );

        return tableHtml;
      }

      function renderComparisonMain(tableContainer, emptyContainer, currentState) {
        if (!tableContainer) {
          return;
        }
        var projects = (currentState.view && Array.isArray(currentState.view.projects)) ? currentState.view.projects : [];

        if (!projects.length) {
          if (emptyContainer) {
            emptyContainer.hidden = false;
            emptyContainer.innerHTML = (
              '<div class="empty-state-inner">' +
                '<div class="empty-state-icon" aria-hidden="true"></div>' +
                '<h2 class="empty-state-title">No projects selected</h2>' +
                '<p class="empty-state-body">There are no projects in your comparison set. Go back to the projects list to choose some Terraform-on-AWS work to review side-by-side.</p>' +
                '<button type="button" class="btn-primary" data-action="back-to-projects">Browse projects</button>' +
              '</div>'
            );
          }
          tableContainer.innerHTML = '';
          return;
        }

        if (emptyContainer) {
          emptyContainer.hidden = true;
          emptyContainer.innerHTML = '';
        }

        tableContainer.innerHTML = buildComparisonTableHtml(projects, currentState.singleProjectMode);
      }

      function onNavigateToProjects() {
        window.location.href = 'projects.html';
      }

      function onNavigateToProjectDetail(projectId) {
        if (!projectId) {
          return;
        }
        window.location.href = 'project_detail.html?id=' + encodeURIComponent(projectId);
      }

      function loadComparisonData() {
        var selectionResult;
        var viewResult;

        try {
          selectionResult = WebsiteSDK.getProjectComparisonSelection();
          viewResult = WebsiteSDK.getProjectComparisonView();
        } catch (err) {
          renderError(err);
          return;
        }

        state.selection = selectionResult && selectionResult.selection ? selectionResult.selection : null;
        state.selectedProjects = selectionResult && Array.isArray(selectionResult.selected_projects)
          ? selectionResult.selected_projects
          : [];
        state.view = viewResult || null;
        state.sortBy = viewResult && viewResult.sort_by ? viewResult.sort_by : null;

        var projects = (viewResult && Array.isArray(viewResult.projects)) ? viewResult.projects : [];
        var projectCount = projects.length;

        if (projectCount === 0 || state.selectedProjects.length === 0) {
          onNavigateToProjects();
          return;
        }

        state.singleProjectMode = projectCount === 1;

        renderHeader(elements.headerBar, state);
        renderSelectionSummary(elements.selectionSummary, state);
        renderComparisonMain(elements.comparisonTable, elements.emptyState, state);
      }

      function onProjectRemoved(projectId) {
        if (!projectId) {
          return;
        }
        var result;
        try {
          result = WebsiteSDK.removeProjectFromComparison(projectId);
        } catch (err) {
          alert('Unable to update comparison right now. Please try again.');
          return;
        }

        if (!result || result.success !== true) {
          var message = result && result.message ? result.message : 'Unable to remove project from comparison.';
          alert(message);
          return;
        }

        loadComparisonData();
      }

      document.addEventListener('click', function (event) {
        var actionEl = event.target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.getAttribute('data-action');
        if (!action) {
          return;
        }

        if (action === 'back-to-projects') {
          event.preventDefault();
          onNavigateToProjects();
          return;
        }

        if (action === 'view-details') {
          event.preventDefault();
          var projectId = actionEl.getAttribute('data-project-id');
          onNavigateToProjectDetail(projectId);
          return;
        }

        if (action === 'remove-from-comparison') {
          event.preventDefault();
          var removeId = actionEl.getAttribute('data-project-id');
          onProjectRemoved(removeId);
        }
      });

      loadComparisonData();
    });
  </script>
</body>
</html>
