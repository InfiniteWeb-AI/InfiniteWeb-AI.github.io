            localStorage.setItem("blog_posts", "[{\"id\":\"post_gitops_kubernetes_argo_cd_github_actions\",\"title\":\"Practical Kubernetes GitOps with Argo CD and GitHub Actions\",\"slug\":\"practical-kubernetes-gitops-argo-cd-github-actions\",\"summary\":\"A step-by-step walkthrough of implementing GitOps on Kubernetes using Argo CD and GitHub Actions for reliable continuous delivery.\",\"content\":\"In this post, we build a complete GitOps workflow for a multi-service application on Kubernetes. We start by defining the desired state in a dedicated Git repository, then wire up GitHub Actions to build images and update Helm charts. Argo CD continuously reconciles the cluster against Git, providing a clear audit trail and easy rollbacks. We'll cover directory structure, promotion between environments, handling secrets, and common pitfalls when teams adopt GitOps at scale.\",\"tag_slugs\":[\"devops\",\"kubernetes\"],\"primary_tag_slug\":\"devops\",\"published_at\":\"2025-11-10T09:00:00Z\",\"updated_at\":\"2025-12-01T10:30:00Z\",\"reading_time_minutes\":14,\"hero_image_url\":\"https://images.unsplash.com/photo-1518770660439-4636190af475?w=800&h=600&fit=crop&auto=format&q=80\",\"is_published\":true},{\"id\":\"post_cicd_antipatterns_microservices\",\"title\":\"Seven CI/CD Anti-Patterns in Microservices Teams\",\"slug\":\"seven-cicd-anti-patterns-in-microservices-teams\",\"summary\":\"Common CI/CD pitfalls that slow down microservices teams and how to fix them with clearer contracts and better pipelines.\",\"content\":\"Microservices promise independent deployability, but many teams recreate monolithic deployment bottlenecks in their CI/CD pipelines. In this article, we look at seven recurring anti-patterns: giant shared pipelines, environment-specific scripting, long-lived feature branches, hidden manual approvals, test suites that don't map to risk, and more. For each anti-pattern, we propose concrete changes to pipeline design, repository layout, and team responsibilities that help restore confidence and speed.\",\"tag_slugs\":[\"devops\",\"microservices\"],\"primary_tag_slug\":\"devops\",\"published_at\":\"2024-09-15T14:00:00Z\",\"updated_at\":\"2024-09-20T09:45:00Z\",\"reading_time_minutes\":10,\"hero_image_url\":\"https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=800&h=600&fit=crop&auto=format&q=80\",\"is_published\":true},{\"id\":\"post_observability_stack_aws\",\"title\":\"Building a Production-Ready Observability Stack on AWS\",\"slug\":\"building-observability-stack-aws\",\"summary\":\"How to design and operate a metrics, logs, and traces stack on AWS that scales with your teams.\",\"content\":\"A good observability stack balances signal quality, cost, and ease of adoption. In this post we design a reference architecture using managed Prometheus, OpenSearch, and AWS X-Ray/OpenTelemetry collectors. We discuss cardinality budgets, log sampling strategies, and how to standardize telemetry across microservices. We also cover how to integrate dashboards into on-call workflows, and how to define SLOs using the collected data.\",\"tag_slugs\":[\"devops\",\"aws\",\"monitoring\"],\"primary_tag_slug\":\"devops\",\"published_at\":\"2024-06-05T10:30:00Z\",\"updated_at\":\"2024-06-10T08:15:00Z\",\"reading_time_minutes\":13,\"hero_image_url\":\"https://www.solodev.com/_/images/aws-map.jpg\",\"is_published\":true},{\"id\":\"post_k8s_requests_limits\",\"title\":\"Kubernetes Resource Requests and Limits: A Hands-On Guide\",\"slug\":\"kubernetes-resource-requests-and-limits-hands-on\",\"summary\":\"Practical techniques for configuring requests and limits so your workloads stay stable and your cluster stays efficient.\",\"content\":\"Requests and limits are the foundation of Kubernetes scheduling, but they are often misunderstood or ignored. This guide walks through real CPU and memory profiles, shows how to derive sane defaults, and demonstrates how misconfigured limits lead to throttling and OOMKills. We explore Vertical Pod Autoscaler, ResourceQuotas, and how to introduce guardrails in multi-tenant clusters.\",\"tag_slugs\":[\"kubernetes\"],\"primary_tag_slug\":\"kubernetes\",\"published_at\":\"2023-11-20T09:15:00Z\",\"updated_at\":\"2023-11-22T07:50:00Z\",\"reading_time_minutes\":8,\"hero_image_url\":\"https://kubevious.io/static/blog/differences-running-kubernetes-in-production-vs-kubernetes-in-development/header.jpg\",\"is_published\":true},{\"id\":\"post_monitoring_101\",\"title\":\"Monitoring 101: From Dashboards to Distributed Tracing\",\"slug\":\"monitoring-101-dashboards-to-distributed-tracing\",\"summary\":\"An opinionated primer on metrics, logs, and traces and how to introduce them incrementally in an existing system.\",\"content\":\"Most teams start with dashboards and alerts, but quickly run into blind spots. We discuss how to layer metrics, logs, and traces in a way that supports debugging and capacity planning. You’ll learn how to define service-level indicators, pick useful logs, and roll out tracing without pausing feature work. The post finishes with a simple rollout plan you can execute in a few sprints.\",\"tag_slugs\":[\"monitoring\"],\"primary_tag_slug\":\"monitoring\",\"published_at\":\"2023-05-18T12:00:00Z\",\"updated_at\":\"2023-05-20T09:00:00Z\",\"reading_time_minutes\":9,\"hero_image_url\":\"https://pd12m.s3.us-west-2.amazonaws.com/images/ae2044e1-d4b8-56b0-b9df-e2977e55a381.png\",\"is_published\":true},{\"id\":\"post_sre_story_slos\",\"title\":\"From On-Call Anxiety to SLOs: An SRE Story\",\"slug\":\"from-on-call-anxiety-to-slos-an-sre-story\",\"summary\":\"How one team reduced pager fatigue by introducing SLOs, error budgets, and better alerting practices.\",\"content\":\"In this narrative case study, I describe how we inherited an on-call rotation with constant low-value alerts and how we turned it around. We started by cataloging existing alerts, measuring noise, and mapping alerts to real user-impacting symptoms. Then we defined SLOs that reflected what customers actually cared about. Over a few months, we replaced infrastructure-level alerts with SLO-based conditions and error budgets, dramatically improving focus and reducing stress.\",\"tag_slugs\":[\"devops\",\"career\"],\"primary_tag_slug\":\"devops\",\"published_at\":\"2024-03-12T08:30:00Z\",\"updated_at\":\"2024-03-15T11:45:00Z\",\"reading_time_minutes\":7,\"hero_image_url\":\"https://mnnews.today/media/2858475/is-sre-calling-you.jpg?anchor=center&mode=crop&width=860&height=450&rnd=132391201970000000\",\"is_published\":true},{\"id\":\"post_terraform_modules_multi_account_aws\",\"title\":\"Terraform Modules for Multi-Account AWS Architectures\",\"slug\":\"terraform-modules-for-multi-account-aws-architectures\",\"summary\":\"Designing reusable Terraform modules to manage AWS organizations, accounts, and shared infrastructure at scale.\",\"content\":\"As organizations grow, a single AWS account becomes too risky and inflexible. In this post, we walk through a multi-account AWS setup, using Terraform modules to encode best practices. We cover account vending, centralized logging, shared VPCs, and how to structure state. Code snippets show how to compose modules without creating a tangled dependency graph.\",\"tag_slugs\":[\"devops\",\"terraform\",\"aws\"],\"primary_tag_slug\":\"devops\",\"published_at\":\"2023-03-22T13:00:00Z\",\"updated_at\":\"2023-03-25T09:20:00Z\",\"reading_time_minutes\":11,\"hero_image_url\":\"https://images.unsplash.com/photo-1518770660439-4636190af475?w=800&h=600&fit=crop&auto=format&q=80\",\"is_published\":true},{\"id\":\"post_cost_effective_k8s_monitoring\",\"title\":\"Cost-Effective Kubernetes Monitoring on a Startup Budget\",\"slug\":\"cost-effective-kubernetes-monitoring-startup-budget\",\"summary\":\"A minimal but powerful monitoring setup for Kubernetes clusters when you can’t afford an expensive SaaS tool.\",\"content\":\"Monitoring can become surprisingly expensive, especially for startups. Here we design a lean stack based on Prometheus, Grafana, and Loki, with a focus on keeping storage and cardinality under control. We look at scrape strategies, metrics relabeling, and log retention policies that give you enough visibility without breaking the bank.\",\"tag_slugs\":[\"kubernetes\",\"monitoring\",\"devops\"],\"primary_tag_slug\":\"monitoring\",\"published_at\":\"2023-08-05T10:00:00Z\",\"updated_at\":\"2023-08-07T16:30:00Z\",\"reading_time_minutes\":6,\"hero_image_url\":\"https://pd12m.s3.us-west-2.amazonaws.com/images/bf0ca7e7-2a9b-57b3-b72a-aef6c26e45eb.webp\",\"is_published\":true},{\"id\":\"post_migrating_monolith_to_go_microservices\",\"title\":\"Migrating a Legacy Monolith to Go Microservices\",\"slug\":\"migrating-legacy-monolith-to-go-microservices\",\"summary\":\"Lessons learned from carving a payments monolith into independent Go microservices with minimal downtime.\",\"content\":\"Breaking up a monolith is as much about organizational change as code. We discuss how we identified seams in a legacy system, introduced a strangler pattern, and used a combination of feature flags and shadow traffic to de-risk the rollout. We also cover observability and deployment strategies that helped us maintain stability throughout the migration.\",\"tag_slugs\":[\"microservices\"],\"primary_tag_slug\":\"microservices\",\"published_at\":\"2023-10-01T09:30:00Z\",\"updated_at\":\"2023-10-03T11:10:00Z\",\"reading_time_minutes\":12,\"hero_image_url\":\"https://images.unsplash.com/photo-1518770660439-4636190af475?w=800&h=600&fit=crop&auto=format&q=80\",\"is_published\":true},{\"id\":\"post_continuous_delivery_terraform_kubernetes\",\"title\":\"Continuous Delivery Strategies for Terraform and Kubernetes\",\"slug\":\"continuous-delivery-strategies-terraform-kubernetes\",\"summary\":\"How to design safe delivery pipelines when both your infrastructure and applications live as code.\",\"content\":\"Many teams maintain separate pipelines for Terraform and Kubernetes manifests, leading to drift and surprises. This article explores integrated strategies that keep infra and app changes in sync. We compare GitOps, pipeline-based orchestration, and environment promotion models, with concrete examples using GitHub Actions, Argo CD, and Terraform Cloud.\",\"tag_slugs\":[\"devops\",\"terraform\",\"kubernetes\"],\"primary_tag_slug\":\"devops\",\"published_at\":\"2024-01-18T15:00:00Z\",\"updated_at\":\"2024-01-20T10:00:00Z\",\"reading_time_minutes\":15,\"hero_image_url\":\"https://www.giantswarm.io/hubfs/31%20Continuous%20Deployment%20of%20On-Prem%20Kubernetes%20Infrastructure.jpg\",\"is_published\":true},{\"id\":\"post_aws_networking_for_devops\",\"title\":\"AWS Networking Basics for DevOps Engineers\",\"slug\":\"aws-networking-basics-for-devops-engineers\",\"summary\":\"A practical introduction to VPCs, subnets, routing, and security groups for DevOps practitioners.\",\"content\":\"You don’t have to be a network engineer to reason about AWS networking, but you do need a few core concepts. We demystify CIDR blocks, public vs private subnets, NAT gateways, and common routing patterns. Simple diagrams illustrate typical layouts for multi-tier applications and EKS clusters, along with tips for avoiding common pitfalls.\",\"tag_slugs\":[\"aws\",\"devops\"],\"primary_tag_slug\":\"devops\",\"published_at\":\"2023-01-25T09:00:00Z\",\"updated_at\":\"2023-01-28T10:30:00Z\",\"reading_time_minutes\":9,\"hero_image_url\":\"https://pd12m.s3.us-west-2.amazonaws.com/images/215093b1-07c3-5ade-8e99-fd09816928a9.jpeg\",\"is_published\":true},{\"id\":\"post_designing_incident_dashboards\",\"title\":\"Designing Incident Dashboards That Actually Help\",\"slug\":\"designing-incident-dashboards-that-actually-help\",\"summary\":\"How to create dashboards that support fast incident response instead of overwhelming on-call engineers.\",\"content\":\"Most dashboards are built once and then forgotten. In this article we treat dashboards as products: we identify user journeys during incidents, define must-have panels, and remove noisy widgets. We share a dashboard template that has worked well for multiple teams and show how to keep it aligned with changing architecture.\",\"tag_slugs\":[\"monitoring\",\"devops\"],\"primary_tag_slug\":\"monitoring\",\"published_at\":\"2023-08-20T11:00:00Z\",\"updated_at\":\"2023-08-21T09:15:00Z\",\"reading_time_minutes\":5,\"hero_image_url\":\"https://pd12m.s3.us-west-2.amazonaws.com/images/ae2044e1-d4b8-56b0-b9df-e2977e55a381.png\",\"is_published\":true},{\"id\":\"post_docker_for_local_development\",\"title\":\"Getting Started with Docker for Local Development\",\"slug\":\"getting-started-docker-local-development\",\"summary\":\"A gentle introduction to using Docker to standardize local environments for your team.\",\"content\":\"We cover the basics of images, containers, and Docker Compose, focusing on workflows that make local development predictable. Examples show how to containerize a simple web app and database, and how to share the setup with the rest of your team.\",\"tag_slugs\":[\"devops\"],\"primary_tag_slug\":\"devops\",\"published_at\":\"2022-05-10T10:00:00Z\",\"updated_at\":\"2022-05-11T09:00:00Z\",\"reading_time_minutes\":8,\"hero_image_url\":\"https://cdn0.tnwcdn.com/wp-content/blogs.dir/1/files/2015/08/docker-1200x601.jpg\",\"is_published\":true},{\"id\":\"post_stateful_workloads_on_kubernetes\",\"title\":\"Running Stateful Workloads on Kubernetes\",\"slug\":\"running-stateful-workloads-on-kubernetes\",\"summary\":\"Patterns and tools for running databases and other stateful systems on Kubernetes safely.\",\"content\":\"While stateless workloads are the norm on Kubernetes, many teams eventually consider running databases and queues on the cluster. We explore StatefulSets, PersistentVolumes, StorageClasses, and operators. We also discuss trade-offs, backup strategies, and when you might still prefer managed services instead.\",\"tag_slugs\":[\"kubernetes\",\"devops\"],\"primary_tag_slug\":\"kubernetes\",\"published_at\":\"2023-12-02T13:45:00Z\",\"updated_at\":\"2023-12-04T09:10:00Z\",\"reading_time_minutes\":12,\"hero_image_url\":\"https://cdn.haproxy.com/wp-content/uploads/2021/06/External-Ingress-Blog-1000x500.png\",\"is_published\":true}]");

            localStorage.setItem("projects", "[{\"id\":\"proj_gitops_k8s_platform\",\"title\":\"GitOps Kubernetes Platform for Multi-Region SaaS\",\"slug\":\"gitops-kubernetes-platform-multi-region-saas\",\"category_id\":\"devops\",\"summary\":\"Designed and operated a GitOps-driven Kubernetes platform on AWS for a multi-region SaaS product.\",\"description\":\"Led the design and implementation of a Kubernetes platform running in multiple AWS regions. We adopted GitOps with Argo CD and GitHub Actions, enabling teams to manage application and configuration changes through pull requests. The platform standardized observability, security policies, and deployment workflows across more than 40 microservices.\",\"role_title\":\"Senior DevOps Engineer\",\"organization\":\"Acme Cloud Systems\",\"project_type\":\"Client\",\"technologies\":[\"Kubernetes\",\"Argo CD\",\"GitHub Actions\",\"Helm\",\"AWS\",\"Prometheus\",\"Grafana\"],\"tags\":[\"DevOps\",\"GitOps\",\"CI/CD\",\"Kubernetes\",\"AWS\"],\"primary_backend_language\":\"go\",\"languages\":[\"go\"],\"cloud_provider\":\"aws\",\"environment\":\"production\",\"is_microservices\":true,\"has_ci_cd\":true,\"uses_kubernetes\":true,\"uses_terraform\":false,\"uses_aws\":true,\"responsibilities\":[\"Architected GitOps workflows using Argo CD and GitHub Actions.\",\"Defined Kubernetes multi-tenant cluster standards and base Helm charts.\",\"Implemented progressive delivery with canary and blue/green releases.\",\"Collaborated with SREs to embed SLOs and alerting in the platform.\"],\"outcomes\":[\"Reduced mean time to deploy from 2 hours to under 15 minutes.\",\"Enabled independent deployments for 12 product teams.\",\"Improved change failure rate by 40% through standardized rollout strategies.\"],\"start_date\":\"2024-02-01T00:00:00Z\",\"end_date\":null,\"last_updated\":\"2026-02-20T09:00:00Z\",\"repo_url\":\"\",\"live_url\":\"https://acme-cloud-saas.example.com\",\"is_featured\":true,\"created_at\":\"2024-01-15T10:00:00Z\"},{\"id\":\"proj_k8s_ci_cd_modernization\",\"title\":\"Kubernetes CI/CD Modernization for Legacy Services\",\"slug\":\"kubernetes-ci-cd-modernization-legacy-services\",\"category_id\":\"devops\",\"summary\":\"Migrated legacy services from manual deployments to automated Kubernetes CI/CD pipelines.\",\"description\":\"Worked with a payments team to move legacy Java and Node.js services from manual VM-based deployments to Kubernetes. Introduced a standardized CI/CD pipeline using GitLab CI and Helm, integrating automated tests, security scans, and deployment approvals where required.\",\"role_title\":\"DevOps Engineer\",\"organization\":\"StartupX Labs\",\"project_type\":\"Client\",\"technologies\":[\"Kubernetes\",\"GitLab CI\",\"Helm\",\"Docker\",\"AWS\",\"SonarQube\"],\"tags\":[\"DevOps\",\"CI/CD\",\"Kubernetes\",\"Modernization\"],\"primary_backend_language\":\"node_js\",\"languages\":[\"node_js\",\"java\"],\"cloud_provider\":\"aws\",\"environment\":\"production\",\"is_microservices\":false,\"has_ci_cd\":true,\"uses_kubernetes\":true,\"uses_terraform\":false,\"uses_aws\":true,\"responsibilities\":[\"Designed GitLab CI templates for building, testing, and deploying services to Kubernetes.\",\"Implemented environment-specific Helm values and secrets management.\",\"Coached developers on writing pipeline-friendly tests and checks.\"],\"outcomes\":[\"Cut manual deployment work by 90%.\",\"Increased deployment frequency from monthly to multiple times per week.\",\"Improved rollback time from hours to minutes via Helm releases.\"],\"start_date\":\"2023-01-10T00:00:00Z\",\"end_date\":\"2023-12-15T00:00:00Z\",\"last_updated\":\"2025-06-01T10:00:00Z\",\"repo_url\":\"\",\"live_url\":\"\",\"is_featured\":false,\"created_at\":\"2023-01-05T09:00:00Z\"},{\"id\":\"proj_eks_terraform_argocd\",\"title\":\"AWS EKS Platform with Terraform and Argo CD\",\"slug\":\"aws-eks-platform-terraform-argo-cd\",\"category_id\":\"devops\",\"summary\":\"Built a production-grade AWS EKS platform using Terraform for infrastructure and Argo CD for GitOps deployments.\",\"description\":\"Implemented a new EKS-based platform for a greenfield product. Terraform was used to provision VPCs, EKS clusters, node groups, and supporting AWS services. Argo CD handled application deployments from a GitOps repository, enabling self-service onboarding for development teams.\",\"role_title\":\"Cloud DevOps Engineer\",\"organization\":\"MegaRetail Group\",\"project_type\":\"Client\",\"technologies\":[\"AWS\",\"EKS\",\"Terraform\",\"Argo CD\",\"GitHub Actions\",\"Prometheus\",\"Grafana\"],\"tags\":[\"DevOps\",\"AWS\",\"Terraform\",\"Kubernetes\",\"GitOps\"],\"primary_backend_language\":\"other\",\"languages\":[\"other\"],\"cloud_provider\":\"aws\",\"environment\":\"production\",\"is_microservices\":true,\"has_ci_cd\":true,\"uses_kubernetes\":true,\"uses_terraform\":true,\"uses_aws\":true,\"responsibilities\":[\"Developed reusable Terraform modules for EKS clusters and networking.\",\"Integrated Argo CD with GitHub Actions for automated image updates.\",\"Implemented cluster-level observability and logging patterns.\"],\"outcomes\":[\"Provisioned new compliant EKS environments in under one hour.\",\"Standardized deployment workflows across 6 product teams.\",\"Reduced infrastructure drift incidents to near zero via GitOps.\"],\"start_date\":\"2025-04-01T00:00:00Z\",\"end_date\":null,\"last_updated\":\"2025-12-01T12:00:00Z\",\"repo_url\":\"\",\"live_url\":\"\",\"is_featured\":true,\"created_at\":\"2025-03-10T08:30:00Z\"},{\"id\":\"proj_aws_landing_zone_terraform\",\"title\":\"AWS Landing Zone with Terraform\",\"slug\":\"aws-landing-zone-with-terraform\",\"category_id\":\"devops\",\"summary\":\"Created a multi-account AWS landing zone managed entirely with Terraform.\",\"description\":\"Delivered a secure AWS landing zone for a fast-growing company, using Terraform to manage AWS Organizations, accounts, networking, and shared security services. The design emphasized separation of duties, \",\"EKS\",\"Jenkins\",\"Docker\",\"Helm\"],\"tags\":[\"DevOps\",\"AWS\",\"Terraform\",\"Kubernetes\",\"E-commerce\"],\"primary_backend_language\":\"java\",\"languages\":[\"java\"],\"cloud_provider\":\"aws\",\"environment\":\"production\",\"is_microservices\":true,\"has_ci_cd\":true,\"uses_kubernetes\":true,\"uses_terraform\":true,\"uses_aws\":true,\"responsibilities\":[\"Created Terraform modules for VPCs, EKS clusters, and RDS databases.\",\"Implemented Jenkins pipelines for Terraform and Helm deployments.\",\"Defined disaster recovery processes and backup strategies.\"],\"outcomes\":[\"Reduced provisioning time for new environments from weeks to days.\",\"Improved checkout service availability during peak retail events.\",\"Enabled safe blue/green deployments for critical services.\"],\"start_date\":\"2023-03-10T00:00:00Z\",\"end_date\":\"2023-12-31T00:00:00Z\",\"last_updated\":\"2024-02-05T11:00:00Z\",\"repo_url\":\"\",\"live_url\":\"\",\"is_featured\":false,\"created_at\":\"2023-02-20T09:00:00Z\"},{\"id\":\"proj_go_microservices_aws\",\"title\":\"Event-Driven Go Microservices on AWS\",\"slug\":\"event-driven-go-microservices-on-aws\",\"category_id\":\"software_engineering\",\"summary\":\"Designed and implemented a Go-based event-driven microservices architecture on AWS.\",\"description\":\"Built a set of Go microservices handling payments, invoicing, and notifications. Services communicated via Kafka and exposed gRPC APIs to internal consumers. The platform ran on EKS, with infrastructure provisioned via Terraform and CI/CD implemented in GitHub Actions.\",\"role_title\":\"Senior Software Engineer\",\"organization\":\"FinTech Flow\",\"project_type\":\"Client\",\"technologies\":[\"Go\",\"Kafka\",\"gRPC\",\"Kubernetes\",\"AWS\",\"Terraform\",\"GitHub Actions\"],\"tags\":[\"Microservices\",\"Payments\",\"DevOps\",\"CI/CD\"],\"primary_backend_language\":\"go\",\"languages\":[\"go\"],\"cloud_provider\":\"aws\",\"environment\":\"production\",\"is_microservices\":true,\"has_ci_cd\":true,\"uses_kubernetes\":true,\"uses_terraform\":true,\"uses_aws\":true,\"responsibilities\":[\"Designed service boundaries and data contracts between microservices.\",\"Implemented Go services with comprehensive unit and integration tests.\",\"Set up GitHub Actions pipelines for build, test, and deployment.\"],\"outcomes\":[\"Enabled independent deployments for core payment capabilities.\",\"Improved transaction processing latency by 30%.\",\"Achieved >99.95% availability for the payments API.\"],\"start_date\":\"2022-04-01T00:00:00Z\",\"end_date\":\"2023-09-30T00:00:00Z\",\"last_updated\":\"2025-09-01T08:00:00Z\",\"repo_url\":\"\",\"live_url\":\"\",\"is_featured\":true,\"created_at\":\"2022-03-15T09:00:00Z\"},{\"id\":\"proj_node_payments_microservices\",\"title\":\"Node.js Payments Microservices Platform\",\"slug\":\"nodejs-payments-microservices-platform\",\"category_id\":\"software_engineering\",\"summary\":\"Implemented a Node.js microservices platform for payment processing with end-to-end observability.\",\"description\":\"Created a suite of Node.js microservices for handling card payments, refunds, and reconciliation. Used a combination of REST and asynchronous events. The services ran on Kubernetes with CI/CD pipelines in GitLab CI and comprehensive monitoring via Prometheus and Grafana.\",\"role_title\":\"Senior Software Engineer\",\"organization\":\"GlobalSaaS Inc.\",\"project_type\":\"Client\",\"technologies\":[\"Node.js\",\"Kubernetes\",\"GitLab CI\",\"Docker\",\"PostgreSQL\",\"Prometheus\",\"Grafana\"],\"tags\":[\"Microservices\",\"Node.js\",\"Payments\",\"CI/CD\"],\"primary_backend_language\":\"node_js\",\"languages\":[\"node_js\"],\"cloud_provider\":\"multi_cloud\",\"environment\":\"production\",\"is_microservices\":true,\"has_ci_cd\":true,\"uses_kubernetes\":true,\"uses_terraform\":false,\"uses_aws\":false,\"responsibilities\":[\"Designed and implemented Node.js services with clear domain boundaries.\",\"Built GitLab CI pipelines with   <script>
    document.addEventListener('DOMContentLoaded', function () {
      var urlParams = new URLSearchParams(window.location.search);
      var sectionParam = urlParams.get('section') || '';

      var loadingEl = document.getElementById('home-loading-state');
      var errorEl = document.getElementById('home-error-state');

      var homeOverviewData = null;

      function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        var str = String(value);
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeHtmlAttr(value) {
        return escapeHtml(value);
      }

      function fetchHomeOverview() {
        if (homeOverviewData) {
          return homeOverviewData;
        }
        try {
          if (loadingEl) {
            loadingEl.textContent = 'Loading overview';
          }
          homeOverviewData = WebsiteSDK.getHomeOverview();
          if (loadingEl) {
            loadingEl.textContent = '';
          }
          return homeOverviewData;
        } catch (err) {
          console.error('Error loading home overview', err);
          if (loadingEl) {
            loadingEl.textContent = '';
          }
          if (errorEl) {
            errorEl.textContent = 'Unable to load home overview. Please try again later.';
          }
          return null;
        }
      }

      function renderProfileSummary(container, overview) {
        var profile = overview && overview.profile ? overview.profile : {};
        var valueProp = overview && overview.value_proposition ? overview.value_proposition : '';

        var locationParts = [];
        if (profile.current_role_title) {
          locationParts.push(profile.current_role_title);
        }
        if (profile.current_location) {
          locationParts.push(profile.current_location);
        }
        var locationLine = locationParts.join(' b7 ');

        var contactItems = [];

        if (profile.email) {
          var mailHref = 'mailto:' + profile.email;
          contactItems.push(
            '<li class="profile-contact-item">' +
              '<span class="profile-contact-label">Email</span>' +
              '<a class="profile-contact-value" href="' + escapeHtmlAttr(mailHref) + '">' + escapeHtml(profile.email) + '</a>' +
            '</li>'
          );
        }

        if (profile.website_url) {
          contactItems.push(
            '<li class="profile-contact-item">' +
              '<span class="profile-contact-label">Website</span>' +
              '<a class="profile-contact-value" href="' + escapeHtmlAttr(profile.website_url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(profile.website_url) + '</a>' +
            '</li>'
          );
        }

        if (profile.github_url) {
          contactItems.push(
            '<li class="profile-contact-item">' +
              '<span class="profile-contact-label">GitHub</span>' +
              '<a class="profile-contact-value" href="' + escapeHtmlAttr(profile.github_url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(profile.github_url) + '</a>' +
            '</li>'
          );
        }

        if (profile.linkedin_url) {
          contactItems.push(
            '<li class="profile-contact-item">' +
              '<span class="profile-contact-label">LinkedIn</span>' +
              '<a class="profile-contact-value" href="' + escapeHtmlAttr(profile.linkedin_url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(profile.linkedin_url) + '</a>' +
            '</li>'
          );
        }

        var contactListHtml = '';
        if (contactItems.length > 0) {
          contactListHtml = '<ul class="profile-contact-list">' + contactItems.join('') + '</ul>';
        }

        var summaryText = profile.summary ? '<p class="profile-summary-text">' + escapeHtml(profile.summary) + '</p>' : '';
        var valuePropText = valueProp ? '<p class="profile-value-prop">' + escapeHtml(valueProp) + '</p>' : '';
        var headlineText = profile.headline ? '<p class="profile-headline">' + escapeHtml(profile.headline) + '</p>' : '';
        var locationHtml = locationLine ? '<p class="profile-location">' + escapeHtml(locationLine) + '</p>' : '';

        container.innerHTML = (
          '<header class="home-section-header">' +
            '<h2 id="profile-summary-heading" class="section-title">Profile</h2>' +
            valuePropText +
          '</header>' +
          '<div class="profile-layout">' +
            '<div class="profile-main">' +
              '<h3 class="profile-name">' + escapeHtml(profile.full_name || '') + '</h3>' +
              headlineText +
              locationHtml +
              summaryText +
            '</div>' +
            '<aside class="profile-side">' +
              contactListHtml +
              '<div class="profile-cta-group">' +
                '<button type="button" class="btn btn-primary" data-action="navigate-resume-builder">Generate tailored resume</button>' +
                '<button type="button" class="btn btn-ghost" data-action="navigate-about">Learn more about me</button>' +
              '</div>' +
            '</aside>' +
          '</div>'
        );
      }

      function renderPrimarySpecializations(container, overview) {
        var specs = (overview && overview.primary_specializations && Array.isArray(overview.primary_specializations)) ? overview.primary_specializations : [];

        if (!specs.length) {
          container.innerHTML = (
            '<header class="home-section-header">' +
              '<h2 id="primary-specializations-heading" class="section-title">Primary specializations</h2>' +
            '</header>' +
            '<p class="section-empty">Primary specializations will appear here once configured.</p>'
          );
          return;
        }

        var itemsHtml = specs.map(function (label) {
          return (
            '<li class="media-item specialization-item">' +
              '<div class="media-icon specialization-icon" aria-hidden="true"></div>' +
              '<div class="media-body">' +
                '<h3 class="media-title specialization-title">' + escapeHtml(label) + '</h3>' +
                '<p class="media-text specialization-text">Core focus area</p>' +
              '</div>' +
            '</li>'
          );
        }).join('');

        container.innerHTML = (
          '<header class="home-section-header">' +
            '<h2 id="primary-specializations-heading" class="section-title">Primary specializations</h2>' +
          '</header>' +
          '<ul class="media-list specialization-list">' +
            itemsHtml +
          '</ul>'
        );
      }

      function renderFeaturedProjects(container, overview) {
        var items = (overview && overview.featured_projects && Array.isArray(overview.featured_projects)) ? overview.featured_projects : [];

        if (!items.length) {
          container.innerHTML = (
            '<header class="home-section-header home-section-header-inline">' +
              '<h2 id="featured-projects-heading" class="section-title">Featured projects</h2>' +
              '<button type="button" class="link-button" data-action="view-all-projects">View all projects</button>' +
            '</header>' +
            '<p class="section-empty">Featured projects have not been added yet.</p>'
          );
          return;
        }

        var listHtml = items.map(function (entry) {
          var project = entry && entry.project ? entry.project : {};
          var categoryName = entry && entry.category_name ? entry.category_name : '';
          var isRecent = !!(entry && entry.is_recent);

          var techLine = '';
          if (Array.isArray(project.technologies) && project.technologies.length) {
            techLine = project.technologies.slice(0, 4).join(', ');
          } else if (Array.isArray(project.languages) && project.languages.length) {
            techLine = project.languages.slice(0, 3).join(', ');
          }

          var tagsLine = '';
          if (Array.isArray(project.tags) && project.tags.length) {
            tagsLine = project.tags.slice(0, 4).join(', ');
          }

          var metaLineParts = [];
          if (categoryName) metaLineParts.push(categoryName);
          if (project.project_type) metaLineParts.push(project.project_type);
          if (project.environment) metaLineParts.push(project.environment);
          var metaLine = metaLineParts.join(' b7 ');

          return (
            '<li class="media-item project-item">' +
              '<button type="button" class="project-card" data-action="open-project-detail" data-project-id="' + escapeHtmlAttr(project.id || '') + '">' +
                '<div class="media-icon project-icon" aria-hidden="true">' +
                  (isRecent ? '<span class="badge badge-recent">Recent</span>' : '') +
                '</div>' +
                '<div class="media-body">' +
                  '<div class="project-header-row">' +
                    '<h3 class="media-title project-title">' + escapeHtml(project.title || 'Untitled project') + '</h3>' +
                    (categoryName ? '<span class="project-category">' + escapeHtml(categoryName) + '</span>' : '') +
                  '</div>' +
                  (metaLine ? '<p class="project-meta">' + escapeHtml(metaLine) + '</p>' : '') +
                  (techLine ? '<p class="project-tech">Tech: ' + escapeHtml(techLine) + '</p>' : '') +
                  (project.summary ? '<p class="media-text project-summary">' + escapeHtml(project.summary) + '</p>' : '') +
                  (tagsLine ? '<p class="project-tags">Tags: ' + escapeHtml(tagsLine) + '</p>' : '') +
                '</div>' +
              '</button>' +
            '</li>'
          );
        }).join('');

        container.innerHTML = (
          '<header class="home-section-header home-section-header-inline">' +
            '<h2 id="featured-projects-heading" class="section-title">Featured projects</h2>' +
            '<button type="button" class="link-button" data-action="view-all-projects">View all projects</button>' +
          '</header>' +
          '<ul class="media-list project-list">' +
            listHtml +
          '</ul>'
        );
      }

      function formatDate(dateValue) {
        if (!dateValue) return '';
        try {
          var d = new Date(dateValue);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        } catch (e) {
          return '';
        }
      }

      function renderRecentPosts(container, overview) {
        var items = (overview && overview.recent_blog_posts && Array.isArray(overview.recent_blog_posts)) ? overview.recent_blog_posts : [];

        if (!items.length) {
          container.innerHTML = (
            '<header class="home-section-header home-section-header-inline">' +
              '<h2 id="recent-posts-heading" class="section-title">Recent posts</h2>' +
              '<button type="button" class="link-button" data-action="view-all-posts">View all posts</button>' +
            '</header>' +
            '<p class="section-empty">Recent blog posts will appear here once published.</p>'
          );
          return;
        }

        var listHtml = items.map(function (entry) {
          var post = entry && entry.post ? entry.post : {};
          var primaryTag = entry && entry.primary_tag_name ? entry.primary_tag_name : '';
          var tagNames = (entry && Array.isArray(entry.tag_names)) ? entry.tag_names : [];

          var dateStr = formatDate(post.published_at);
          var metaParts = [];
          if (primaryTag) metaParts.push(primaryTag);
          if (dateStr) metaParts.push(dateStr);
          if (typeof post.reading_time_minutes === 'number' && post.reading_time_minutes > 0) {
            metaParts.push(post.reading_time_minutes + ' min read');
          }
          var metaLine = metaParts.join(' b7 ');

          var tagsLine = '';
          if (tagNames.length) {
            tagsLine = tagNames.slice(0, 5).join(', ');
          }

          return (
            '<li class="media-item post-item">' +
              '<button type="button" class="post-card" data-action="open-blog-post" data-post-id="' + escapeHtmlAttr(post.id || '') + '">' +
                '<div class="media-icon post-icon" aria-hidden="true"></div>' +
                '<div class="media-body">' +
                  '<h3 class="media-title post-title">' + escapeHtml(post.title || 'Untitled post') + '</h3>' +
                  (metaLine ? '<p class="post-meta">' + escapeHtml(metaLine) + '</p>' : '') +
                  (post.summary ? '<p class="media-text post-summary">' + escapeHtml(post.summary) + '</p>' : '') +
                  (tagsLine ? '<p class="post-tags">Tags: ' + escapeHtml(tagsLine) + '</p>' : '') +
                '</div>' +
              '</button>' +
            '</li>'
          );
        }).join('');

        container.innerHTML = (
          '<header class="home-section-header home-section-header-inline">' +
            '<h2 id="recent-posts-heading" class="section-title">Recent posts</h2>' +
            '<button type="button" class="link-button" data-action="view-all-posts">View all posts</button>' +
          '</header>' +
          '<ul class="media-list post-list">' +
            listHtml +
          '</ul>'
        );
      }

      function renderHomeNavigationCtas(container) {
        container.innerHTML = (
          '<div class="home-cta-inner">' +
            '<button type="button" class="btn btn-secondary" data-action="go-to-projects">View projects</button>' +
            '<button type="button" class="btn btn-secondary" data-action="go-to-blog">Read blog</button>' +
            '<button type="button" class="btn btn-secondary" data-action="go-to-resume-builder">Generate resume</button>' +
            '<button type="button" class="btn btn-secondary" data-action="go-to-about">About</button>' +
            '<button type="button" class="btn btn-secondary" data-action="go-to-contact">Get in touch</button>' +
          '</div>'
        );
      }

      function applySectionState(sectionKey) {
        if (!sectionKey) return;
        var normalized = String(sectionKey).toLowerCase();
        var targetId = null;

        if (normalized === 'profile' || normalized === 'profile-summary') {
          targetId = 'profile-summary';
        } else if (normalized === 'specializations' || normalized === 'primary-specializations') {
          targetId = 'primary-specializations';
        } else if (normalized === 'projects' || normalized === 'featured-projects') {
          targetId = 'featured-projects';
        } else if (normalized === 'posts' || normalized === 'recent-posts' || normalized === 'blog') {
          targetId = 'recent-posts';
        } else if (normalized === 'cta' || normalized === 'actions') {
          targetId = 'home-cta-group';
        }

        if (!targetId) return;

        var sectionEl = document.getElementById(targetId);
        if (!sectionEl) return;

        try {
          sectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (e) {
          sectionEl.scrollIntoView();
        }

        var heading = sectionEl.querySelector('.section-title');
        if (heading && typeof heading.focus === 'function') {
          heading.setAttribute('tabindex', '-1');
          heading.focus();
        }
      }

      function handleActionClick(event, element, action) {
        switch (action) {
          case 'navigate-resume-builder':
          case 'go-to-resume-builder':
            event.preventDefault();
            window.location.href = 'resume_builder.html';
            break;

          case 'navigate-about':
          case 'go-to-about':
            event.preventDefault();
            window.location.href = 'about.html';
            break;

          case 'navigate-contact':
          case 'go-to-contact':
            event.preventDefault();
            window.location.href = 'contact.html';
            break;

          case 'view-all-projects':
          case 'go-to-projects':
            event.preventDefault();
            window.location.href = 'projects.html';
            break;

          case 'view-all-posts':
          case 'go-to-blog':
            event.preventDefault();
            window.location.href = 'blog.html';
            break;

          case 'open-project-detail': {
            event.preventDefault();
            var projectId = element.getAttribute('data-project-id');
            if (projectId) {
              window.location.href = 'project_detail.html?id=' + encodeURIComponent(projectId);
            }
            break;
          }

          case 'open-blog-post': {
            event.preventDefault();
            var postId = element.getAttribute('data-post-id');
            if (postId) {
              window.location.href = 'blog_post.html?id=' + encodeURIComponent(postId);
            }
            break;
          }

          default:
            break;
        }
      }

      function bindActions() {
        var actionElements = document.querySelectorAll('[data-action]');
        actionElements.forEach(function (el) {
          var action = el.getAttribute('data-action');
          if (!action) return;
          el.addEventListener('click', function (event) {
            handleActionClick(event, el, action);
          });
        });
      }

      var populateElements = document.querySelectorAll('[data-populate]');
      if (populateElements.length > 0) {
        var overview = fetchHomeOverview();
        if (overview) {
          populateElements.forEach(function (el) {
            var dataType = el.getAttribute('data-populate');
            if (!dataType) return;
            if (dataType === 'profile_summary') {
              renderProfileSummary(el, overview);
            } else if (dataType === 'primary_specializations') {
              renderPrimarySpecializations(el, overview);
            } else if (dataType === 'featured_projects') {
              renderFeaturedProjects(el, overview);
            } else if (dataType === 'recent_posts') {
              renderRecentPosts(el, overview);
            } else if (dataType === 'home_navigation_ctas') {
              renderHomeNavigationCtas(el);
            }
          });

          applySectionState(sectionParam);
          bindActions();
        }
      } else {
        bindActions();
      }
    });
  </script>
</body>
</html>
