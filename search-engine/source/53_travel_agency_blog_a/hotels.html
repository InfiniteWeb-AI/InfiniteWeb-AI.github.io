<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotels | Wayfinder Travel</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">

    <!-- Global Styles -->
    
    <!-- Hotels Page Styles -->
    <link rel="stylesheet" href="hotels.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="brand" aria-label="Return to homepage">
                <span class="brand-mark">WT</span>
                <span class="brand-text">
                    <span class="brand-name">Wayfinder Travel</span>
                    <span class="brand-tagline">Curated Journeys &amp; Stories</span>
                </span>
            </a>

            <nav class="primary-nav" aria-label="Main navigation">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link" title="Homepage with quick search and featured content">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="tours.html" class="nav-link" title="Browse and filter guided tours">Tours</a>
                    </li>
                    <li class="nav-item">
                        <a href="packages.html" class="nav-link" title="View and compare pre-built travel packages">Packages</a>
                    </li>
                    <li class="nav-item">
                        <a href="hotels.html" class="nav-link" title="Search and book hotels">Hotels</a>
                    </li>
                    <li class="nav-item">
                        <a href="bundles.html" class="nav-link" title="Search combined flight and hotel bundles">Flight + Hotel</a>
                    </li>
                    <li class="nav-item">
                        <a href="blog.html" class="nav-link" title="Read travel articles, tips, and guides">Blog</a>
                    </li>
                    <li class="nav-item">
                        <a href="trip_builder.html" class="nav-link nav-link--primary" title="Create and save custom multi-city itineraries">Custom Trip Builder</a>
                    </li>
                    <li class="nav-item">
                        <a href="insurance.html" class="nav-link" title="Compare and configure travel insurance plans">Travel Insurance</a>
                    </li>
                    <li class="nav-item">
                        <a href="wishlist.html" class="nav-link" title="View saved tours, packages, hotels, and bundles">Wishlist</a>
                    </li>
                    <li class="nav-item">
                        <a href="saved_articles.html" class="nav-link" title="Manage saved blog articles and reading lists">Reading Lists</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="content" class="site-main" tabindex="-1">
        <div class="page-width">
            <!-- Hotels search form (primary hero element) -->
            <section class="hotel-search-section" aria-label="Search hotels">
                <form id="hotelSearchForm" class="hotel-search-form-card" data-component="hotel-search-form">
                    <div class="hotel-search-form-row">
                        <div class="hotel-search-field hotel-search-field--destination">
                            <label for="searchCityInput" class="hotel-search-label">City</label>
                            <input type="text" id="searchCityInput" name="city" class="hotel-search-input" placeholder="e.g. Rome" autocomplete="off">
                        </div>
                        <div class="hotel-search-field hotel-search-field--country">
                            <label for="searchCountryInput" class="hotel-search-label">Country</label>
                            <input type="text" id="searchCountryInput" name="country" class="hotel-search-input" placeholder="Optional" autocomplete="off">
                        </div>
                        <div class="hotel-search-field hotel-search-field--date">
                            <label for="searchCheckInInput" class="hotel-search-label">Check-in</label>
                            <input type="date" id="searchCheckInInput" name="checkInDate" class="hotel-search-input">
                        </div>
                        <div class="hotel-search-field hotel-search-field--date">
                            <label for="searchCheckOutInput" class="hotel-search-label">Check-out</label>
                            <input type="date" id="searchCheckOutInput" name="checkOutDate" class="hotel-search-input">
                        </div>
                        <div class="hotel-search-field hotel-search-field--guests">
                            <label for="searchAdultsInput" class="hotel-search-label">Adults</label>
                            <input type="number" id="searchAdultsInput" name="adults" class="hotel-search-input" min="1" step="1">
                        </div>
                        <div class="hotel-search-field hotel-search-field--guests">
                            <label for="searchChildrenInput" class="hotel-search-label">Children</label>
                            <input type="number" id="searchChildrenInput" name="children" class="hotel-search-input" min="0" step="1">
                        </div>
                        <div class="hotel-search-field hotel-search-field--submit">
                            <button type="submit" class="btn btn-primary hotel-search-submit" data-action="submit-search">Search stays</button>
                        </div>
                    </div>
                    <p id="hotelSearchFormError" class="form-error-message" role="alert" aria-live="polite"></p>
                </form>
            </section>

            <!-- Filters + results two-column layout -->
            <section class="hotel-results-layout" aria-label="Hotel search results">
                <div class="hotel-layout-grid">
                    <!-- Filter sidebar -->
                    <aside class="hotel-filter-sidebar" data-component="hotel-filter-sidebar" data-populate="hotel-filter-sidebar" aria-label="Filter stays">
                        <!-- Populated by JavaScript using getHotelFilterOptions -->
                    </aside>

                    <!-- Results column -->
                    <div class="hotel-results-column">
                        <!-- Sort & summary bar -->
                        <section class="hotel-sort-summary-bar" data-component="hotel-sort-and-summary-bar" data-populate="hotel-sort-summary" aria-label="Sort and summary">
                            <!-- Populated by JavaScript -->
                        </section>

                        <!-- Results list -->
                        <section class="hotel-results-list" data-component="hotel-results-list" data-populate="hotel-results" aria-live="polite" aria-label="List of hotels">
                            <!-- Populated by JavaScript with hotel cards -->
                        </section>

                        <!-- Pagination controls -->
                        <nav class="hotel-pagination" data-component="hotel-pagination-controls" data-populate="hotel-pagination" aria-label="Hotel results pagination">
                            <!-- Populated by JavaScript -->
                        </nav>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner page-width">
            <nav class="footer-nav" aria-label="Footer navigation">
                <ul class="footer-nav-list">
                    <li class="footer-nav-item">
                        <a href="about.html" class="footer-link" title="Learn more about the travel agency">About Us</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="contact.html" class="footer-link" title="Get in touch with the agency for help or inquiries">Contact</a>
                    </li>
                    <li class="footer-nav-item">
                        <a href="newsletter.html" class="footer-link" title="Subscribe to receive travel deals and tips by email">Travel Newsletter</a>
                    </li>
                </ul>
            </nav>
            <p class="footer-meta">&copy; <span class="footer-year">2024</span> Wayfinder Travel. All rights reserved.</p>
        </div>
    </footer>

    <!-- SDK / business logic layer -->
    <script src="business_logic.js"></script>

    <!-- Hotels page UI logic -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        var PAGE_SIZE = 20;
        var canonicalState = parseStateFromUrl();
        var filterOptions = null;
        var lastSearchResponse = null;
        var wishlistedHotelIds = new Set();

        var filterSidebarEl = document.querySelector('[data-component="hotel-filter-sidebar"]');
        var sortBarEl = document.querySelector('[data-populate="hotel-sort-summary"]');
        var resultsEl = document.querySelector('[data-populate="hotel-results"]');
        var paginationEl = document.querySelector('[data-populate="hotel-pagination"]');
        var searchForm = document.getElementById('hotelSearchForm');
        var searchErrorEl = document.getElementById('hotelSearchFormError');

        try {
            filterOptions = WebsiteSDK.getHotelFilterOptions();
        } catch (e) {
            console.error('Failed to load hotel filter options', e);
            filterOptions = null;
        }

        syncFormFromState();
        runSearchAndRender(true);

        if (searchForm) {
            searchForm.addEventListener('submit', handleSearchSubmit);
        }
        if (filterSidebarEl) {
            filterSidebarEl.addEventListener('change', handleFilterChange);
        }
        if (sortBarEl) {
            sortBarEl.addEventListener('change', handleSortChange);
        }
        if (resultsEl) {
            resultsEl.addEventListener('click', handleResultsClick);
        }
        if (paginationEl) {
            paginationEl.addEventListener('click', handlePaginationClick);
        }

        window.addEventListener('popstate', function () {
            canonicalState = parseStateFromUrl();
            syncFormFromState();
            runSearchAndRender(true);
        });

        function parseStateFromUrl() {
            var params = new URLSearchParams(window.location.search);
            var city = params.get('city') || '';
            var country = params.get('country') || '';
            var checkInDate = params.get('checkInDate') || '';
            var checkOutDate = params.get('checkOutDate') || '';
            var adultsRaw = params.get('adults');
            var childrenRaw = params.get('children');
            var maxPriceRaw = params.get('maxPricePerNight');
            var minGuestRatingRaw = params.get('minGuestRating');
            var amenitiesStr = params.get('amenities') || '';
            var familyFriendlyStr = params.get('familyFriendlyOnly');
            var sortBy = params.get('sortBy') || '';
            var pageRaw = params.get('page');
            var propertyTypeStr = params.get('propertyType') || '';

            var adults = parseInt(adultsRaw, 10);
            var children = parseInt(childrenRaw, 10);
            var maxPrice = parseFloat(maxPriceRaw);
            var minGuestRating = parseFloat(minGuestRatingRaw);
            var page = parseInt(pageRaw, 10);

            return {
                city: city,
                country: country,
                checkInDate: checkInDate,
                checkOutDate: checkOutDate,
                adults: !isNaN(adults) && adults > 0 ? adults : '',
                children: !isNaN(children) && children >= 0 ? children : '',
                maxPricePerNight: !isNaN(maxPrice) ? maxPrice : '',
                minGuestRating: !isNaN(minGuestRating) ? minGuestRating : '',
                amenities: amenitiesStr ? amenitiesStr.split(',').filter(Boolean) : [],
                familyFriendlyOnly: familyFriendlyStr === 'true',
                sortBy: sortBy,
                page: !isNaN(page) && page > 0 ? page : 1,
                propertyType: propertyTypeStr ? propertyTypeStr.split(',').filter(Boolean) : []
            };
        }

        function isSearchReady(state) {
            if (!state.city || !state.checkInDate || !state.checkOutDate) {
                return false;
            }
            var start = new Date(state.checkInDate);
            var end = new Date(state.checkOutDate);
            if (isNaN(start.getTime()) || isNaN(end.getTime())) {
                return false;
            }
            return end > start;
        }

        function updateUrlFromState(replace) {
            var url = new URL(window.location.href);
            var params = url.searchParams;

            function setOrDelete(key, value) {
                if (value === null || value === undefined || value === '' || (Array.isArray(value) && value.length === 0)) {
                    params.delete(key);
                } else {
                    params.set(key, value);
                }
            }

            setOrDelete('city', canonicalState.city ? canonicalState.city.trim() : '');
            setOrDelete('country', canonicalState.country ? canonicalState.country.trim() : '');
            setOrDelete('checkInDate', canonicalState.checkInDate || '');
            setOrDelete('checkOutDate', canonicalState.checkOutDate || '');
            setOrDelete('adults', canonicalState.adults ? String(canonicalState.adults) : '');
            setOrDelete('children', canonicalState.children !== '' && canonicalState.children !== null && canonicalState.children !== undefined ? String(canonicalState.children) : '');
            setOrDelete('maxPricePerNight', canonicalState.maxPricePerNight !== '' && canonicalState.maxPricePerNight !== null && canonicalState.maxPricePerNight !== undefined ? String(canonicalState.maxPricePerNight) : '');
            setOrDelete('minGuestRating', canonicalState.minGuestRating !== '' && canonicalState.minGuestRating !== null && canonicalState.minGuestRating !== undefined ? String(canonicalState.minGuestRating) : '');
            setOrDelete('amenities', canonicalState.amenities && canonicalState.amenities.length ? canonicalState.amenities.join(',') : '');
            setOrDelete('familyFriendlyOnly', canonicalState.familyFriendlyOnly ? 'true' : '');
            setOrDelete('sortBy', canonicalState.sortBy || '');
            setOrDelete('propertyType', canonicalState.propertyType && canonicalState.propertyType.length ? canonicalState.propertyType.join(',') : '');
            setOrDelete('page', canonicalState.page && canonicalState.page !== 1 ? String(canonicalState.page) : '');

            var newUrl = url.pathname + (params.toString() ? '?' + params.toString() : '');
            if (replace) {
                window.history.replaceState(null, '', newUrl);
            } else {
                window.history.pushState(null, '', newUrl);
            }
        }

        function syncFormFromState() {
            var cityInput = document.getElementById('searchCityInput');
            var countryInput = document.getElementById('searchCountryInput');
            var checkInInput = document.getElementById('searchCheckInInput');
            var checkOutInput = document.getElementById('searchCheckOutInput');
            var adultsInput = document.getElementById('searchAdultsInput');
            var childrenInput = document.getElementById('searchChildrenInput');

            if (cityInput) {
                cityInput.value = canonicalState.city || '';
            }
            if (countryInput) {
                countryInput.value = canonicalState.country || '';
            }
            if (checkInInput) {
                checkInInput.value = canonicalState.checkInDate || '';
            }
            if (checkOutInput) {
                checkOutInput.value = canonicalState.checkOutDate || '';
            }
            if (adultsInput) {
                adultsInput.value = canonicalState.adults !== '' ? canonicalState.adults : '';
            }
            if (childrenInput) {
                childrenInput.value = canonicalState.children !== '' ? canonicalState.children : '';
            }
        }

        function runSearchAndRender(replaceUrl) {
            if (typeof replaceUrl === 'undefined') {
                replaceUrl = false;
            }
            updateUrlFromState(replaceUrl);

            if (isSearchReady(canonicalState)) {
                var amenitiesArray = canonicalState.amenities || [];
                var adults = canonicalState.adults || 1;
                var children = canonicalState.children !== '' && canonicalState.children !== null && canonicalState.children !== undefined ? canonicalState.children : 0;
                var maxPrice = canonicalState.maxPricePerNight !== '' && canonicalState.maxPricePerNight !== null && canonicalState.maxPricePerNight !== undefined ? canonicalState.maxPricePerNight : null;
                var minGuestRating = canonicalState.minGuestRating !== '' && canonicalState.minGuestRating !== null && canonicalState.minGuestRating !== undefined ? canonicalState.minGuestRating : null;
                var sortBy = canonicalState.sortBy || null;
                var page = canonicalState.page || 1;

                try {
                    lastSearchResponse = WebsiteSDK.searchHotels(
                        canonicalState.city,
                        canonicalState.country || null,
                        canonicalState.checkInDate,
                        canonicalState.checkOutDate,
                        adults,
                        children,
                        maxPrice,
                        minGuestRating,
                        amenitiesArray,
                        canonicalState.familyFriendlyOnly,
                        sortBy,
                        page,
                        PAGE_SIZE
                    );
                } catch (e) {
                    console.error('searchHotels failed', e);
                    lastSearchResponse = {
                        results: [],
                        totalResults: 0,
                        page: canonicalState.page || 1,
                        pageSize: PAGE_SIZE
                    };
                }
            } else {
                lastSearchResponse = null;
            }

            renderAll();
        }

        function renderAll() {
            renderFilterSidebar(filterSidebarEl);
            renderSortBar(sortBarEl);
            renderResults(resultsEl);
            renderPagination(paginationEl);
        }

        function handleSearchSubmit(event) {
            event.preventDefault();
            if (searchErrorEl) {
                searchErrorEl.textContent = '';
            }

            var cityInput = document.getElementById('searchCityInput');
            var countryInput = document.getElementById('searchCountryInput');
            var checkInInput = document.getElementById('searchCheckInInput');
            var checkOutInput = document.getElementById('searchCheckOutInput');
            var adultsInput = document.getElementById('searchAdultsInput');
            var childrenInput = document.getElementById('searchChildrenInput');

            var cityValue = cityInput && cityInput.value ? cityInput.value.trim() : '';
            var countryValue = countryInput && countryInput.value ? countryInput.value.trim() : '';
            var checkInValue = checkInInput ? checkInInput.value : '';
            var checkOutValue = checkOutInput ? checkOutInput.value : '';
            var adultsVal = adultsInput ? parseInt(adultsInput.value, 10) : NaN;
            var childrenVal = childrenInput ? parseInt(childrenInput.value, 10) : NaN;

            if (!cityValue) {
                if (searchErrorEl) {
                    searchErrorEl.textContent = 'Please enter a destination city.';
                }
                if (cityInput) {
                    cityInput.focus();
                }
                return;
            }
            if (!checkInValue || !checkOutValue) {
                if (searchErrorEl) {
                    searchErrorEl.textContent = 'Please select both check-in and check-out dates.';
                }
                if (!checkInValue && checkInInput) {
                    checkInInput.focus();
                } else if (checkOutInput) {
                    checkOutInput.focus();
                }
                return;
            }
            var start = new Date(checkInValue);
            var end = new Date(checkOutValue);
            if (isNaN(start.getTime()) || isNaN(end.getTime()) || end <= start) {
                if (searchErrorEl) {
                    searchErrorEl.textContent = 'Check-out date must be after check-in date.';
                }
                if (checkOutInput) {
                    checkOutInput.focus();
                }
                return;
            }

            canonicalState.city = cityValue;
            canonicalState.country = countryValue;
            canonicalState.checkInDate = checkInValue;
            canonicalState.checkOutDate = checkOutValue;
            canonicalState.adults = !isNaN(adultsVal) && adultsVal > 0 ? adultsVal : 1;
            canonicalState.children = !isNaN(childrenVal) && childrenVal >= 0 ? childrenVal : 0;
            canonicalState.page = 1;

            runSearchAndRender(false);
        }

        function handleFilterChange(event) {
            var target = event.target;
            if (!target || !target.name) {
                return;
            }

            if (target.name === 'maxPricePerNight') {
                var val = parseFloat(target.value);
                canonicalState.maxPricePerNight = !isNaN(val) ? val : '';
            } else if (target.name === 'minGuestRating') {
                var ratingVal = parseFloat(target.value);
                canonicalState.minGuestRating = !isNaN(ratingVal) ? ratingVal : '';
            } else if (target.name === 'familyFriendlyOnly') {
                canonicalState.familyFriendlyOnly = !!target.checked;
            } else if (target.name === 'amenity') {
                var amenityInputs = filterSidebarEl ? filterSidebarEl.querySelectorAll('input[name="amenity"]:checked') : [];
                var amenityValues = [];
                for (var i = 0; i < amenityInputs.length; i++) {
                    amenityValues.push(amenityInputs[i].value);
                }
                canonicalState.amenities = amenityValues;
            } else if (target.name === 'propertyType') {
                var typeInputs = filterSidebarEl ? filterSidebarEl.querySelectorAll('input[name="propertyType"]:checked') : [];
                var typeValues = [];
                for (var j = 0; j < typeInputs.length; j++) {
                    typeValues.push(typeInputs[j].value);
                }
                canonicalState.propertyType = typeValues;
            } else {
                return;
            }

            canonicalState.page = 1;
            runSearchAndRender(false);
        }

        function handleSortChange(event) {
            var target = event.target;
            if (!target || target.name !== 'sortBy') {
                return;
            }
            canonicalState.sortBy = target.value || '';
            canonicalState.page = 1;
            runSearchAndRender(false);
        }

        function handleResultsClick(event) {
            var actionEl = event.target.closest('[data-action]');
            if (!actionEl) {
                return;
            }
            var action = actionEl.getAttribute('data-action');
            if (action === 'view-hotel-details') {
                var hotelId = actionEl.getAttribute('data-hotel-id');
                navigateToHotelDetails(hotelId);
            } else if (action === 'add-to-wishlist') {
                event.preventDefault();
                addHotelToWishlist(actionEl);
            }
        }

        function handlePaginationClick(event) {
            var actionEl = event.target.closest('[data-action]');
            if (!actionEl) {
                return;
            }
            if (!lastSearchResponse) {
                return;
            }
            var action = actionEl.getAttribute('data-action');
            var currentPage = canonicalState.page || 1;
            var totalResults = lastSearchResponse.totalResults || 0;
            var pageSize = lastSearchResponse.pageSize || PAGE_SIZE;
            var totalPages = Math.max(1, Math.ceil(totalResults / pageSize));
            var newPage = currentPage;

            if (action === 'page-select') {
                var p = parseInt(actionEl.getAttribute('data-page'), 10);
                if (!isNaN(p)) {
                    newPage = p;
                }
            } else if (action === 'prev-page') {
                if (currentPage > 1) {
                    newPage = currentPage - 1;
                }
            } else if (action === 'next-page') {
                if (currentPage < totalPages) {
                    newPage = currentPage + 1;
                }
            } else {
                return;
            }

            if (newPage === currentPage) {
                return;
            }

            canonicalState.page = newPage;
            runSearchAndRender(false);
        }

        function navigateToHotelDetails(hotelId) {
            if (!hotelId) {
                return;
            }
            var params = new URLSearchParams();
            params.set('id', hotelId);
            if (canonicalState.checkInDate) {
                params.set('checkInDate', canonicalState.checkInDate);
            }
            if (canonicalState.checkOutDate) {
                params.set('checkOutDate', canonicalState.checkOutDate);
            }
            if (canonicalState.adults) {
                params.set('adults', String(canonicalState.adults));
            }
            if (canonicalState.children !== '' && canonicalState.children !== null && canonicalState.children !== undefined) {
                params.set('children', String(canonicalState.children));
            }
            window.location.href = 'hotel_detail.html?' + params.toString();
        }

        function addHotelToWishlist(buttonEl) {
            if (!buttonEl) {
                return;
            }
            var hotelId = buttonEl.getAttribute('data-hotel-id');
            if (!hotelId) {
                return;
            }
            var cardEl = buttonEl.closest('[data-component="hotel-card"]');
            var messageEl = cardEl ? cardEl.querySelector('[data-role="wishlist-message"]') : null;

            if (messageEl) {
                messageEl.textContent = '';
            }

            buttonEl.disabled = true;
            buttonEl.classList.add('is-loading');
            try {
                var response = WebsiteSDK.addItemToWishlist('hotel', hotelId, '');
                if (response && response.success) {
                    wishlistedHotelIds.add(hotelId);
                    buttonEl.classList.add('wishlist-button--active');
                    var labelSpan = buttonEl.querySelector('.wishlist-button-label');
                    if (labelSpan) {
                        labelSpan.textContent = 'Saved';
                    }
                    if (messageEl) {
                        messageEl.textContent = response.message || 'Added to wishlist.';
                    }
                } else {
                    if (messageEl) {
                        messageEl.textContent = response && response.message ? response.message : 'Could not add to wishlist.';
                    }
                }
            } catch (e) {
                console.error('addItemToWishlist failed', e);
                if (messageEl) {
                    messageEl.textContent = 'An unexpected error occurred while adding to wishlist.';
                }
            } finally {
                buttonEl.disabled = false;
                buttonEl.classList.remove('is-loading');
            }
        }

        function renderFilterSidebar(container) {
            if (!container) {
                return;
            }
            if (!filterOptions) {
                container.innerHTML = '';
                return;
            }

            var price = filterOptions.priceRangePerNight || {};
            var guestRatingOptions = filterOptions.guestRatingOptions || [];
            var amenityOptions = filterOptions.amenityOptions || [];
            var propertyTypeOptions = filterOptions.propertyTypeOptions || [];
            var searchReady = isSearchReady(canonicalState);
            var disabledAttr = searchReady ? '' : ' disabled';

            var maxPriceDisplay = canonicalState.maxPricePerNight !== '' && canonicalState.maxPricePerNight !== null && canonicalState.maxPricePerNight !== undefined ? canonicalState.maxPricePerNight : '';
            var minGuestRatingVal = canonicalState.minGuestRating !== '' && canonicalState.minGuestRating !== null && canonicalState.minGuestRating !== undefined ? canonicalState.minGuestRating : '';
            var familyChecked = canonicalState.familyFriendlyOnly ? ' checked' : '';

            var amenitiesHtml = '';
            for (var i = 0; i < amenityOptions.length; i++) {
                var amenity = amenityOptions[i];
                var code = amenity && amenity.code ? amenity.code : '';
                var label = amenity && amenity.label ? amenity.label : code;
                var checked = canonicalState.amenities.indexOf(code) !== -1 ? ' checked' : '';
                amenitiesHtml += "<label class='filter-checkbox'><input type='checkbox' name='amenity' value='" + escapeHtml(code) + "' data-action='toggle-amenity'" + checked + disabledAttr + "> <span>" + escapeHtml(label) + "</span></label>";
            }

            var propertyTypeHtml = '';
            for (var j = 0; j < propertyTypeOptions.length; j++) {
                var pt = propertyTypeOptions[j];
                var ptCode = pt && pt.code ? pt.code : '';
                var ptLabel = pt && pt.label ? pt.label : ptCode;
                var ptChecked = canonicalState.propertyType.indexOf(ptCode) !== -1 ? ' checked' : '';
                propertyTypeHtml += "<label class='filter-checkbox'><input type='checkbox' name='propertyType' value='" + escapeHtml(ptCode) + "' data-action='toggle-property-type'" + ptChecked + disabledAttr + "> <span>" + escapeHtml(ptLabel) + "</span></label>";
            }

            var ratingOptionsHtml = "<option value=''>Any</option>";
            for (var k = 0; k < guestRatingOptions.length; k++) {
                var rating = guestRatingOptions[k];
                var selected = minGuestRatingVal !== '' && Number(rating) === Number(minGuestRatingVal) ? ' selected' : '';
                ratingOptionsHtml += "<option value='" + String(rating) + "'" + selected + ">" + String(rating) + "+</option>";
            }

            var currencyLabel = price && price.currency ? price.currency.toUpperCase() : '';
            var priceMin = price && typeof price.min === 'number' ? price.min : '';
            var priceMax = price && typeof price.max === 'number' ? price.max : '';

            container.innerHTML = "" +
                "<div class='filter-panel'>" +
                "  <h2 class='filter-heading'>Filter</h2>" +
                "  <div class='filter-section filter-section--price'>" +
                "    <h3 class='filter-section-title'>Price per night" + (currencyLabel ? " (" + escapeHtml(currencyLabel) + ")" : '') + "</h3>" +
                "    <div class='filter-price-row'>" +
                "      <label class='filter-field-label' for='filterMaxPriceInput'>Up to</label>" +
                "      <input type='number' id='filterMaxPriceInput' name='maxPricePerNight' class='filter-input' min='" + (priceMin !== '' ? String(priceMin) : '') + "' max='" + (priceMax !== '' ? String(priceMax) : '') + "' step='1' value='" + (maxPriceDisplay !== '' ? String(maxPriceDisplay) : '') + "'" + disabledAttr + ">" +
                "    </div>" +
                "  </div>" +
                "  <div class='filter-section filter-section--rating'>" +
                "    <h3 class='filter-section-title'>Guest rating</h3>" +
                "    <label class='filter-field-label' for='filterMinRatingSelect'>Minimum rating</label>" +
                "    <select id='filterMinRatingSelect' name='minGuestRating' class='filter-select'" + disabledAttr + ">" + ratingOptionsHtml + "</select>" +
                "  </div>" +
                "  <div class='filter-section filter-section--family'>" +
                "    <label class='filter-checkbox filter-checkbox--inline'>" +
                "      <input type='checkbox' name='familyFriendlyOnly' data-action='toggle-family-friendly'" + familyChecked + disabledAttr + ">" +
                "      <span>Family-friendly only</span>" +
                "    </label>" +
                "  </div>" +
                "  <div class='filter-section filter-section--amenities'>" +
                "    <h3 class='filter-section-title'>Amenities</h3>" +
                "    <div class='filter-checkbox-group'>" + amenitiesHtml + "</div>" +
                "  </div>" +
                "  <div class='filter-section filter-section--property-type'>" +
                "    <h3 class='filter-section-title'>Property type</h3>" +
                "    <div class='filter-checkbox-group'>" + propertyTypeHtml + "</div>" +
                "  </div>" +
                "</div>";
        }

        function renderSortBar(container) {
            if (!container) {
                return;
            }
            if (!filterOptions) {
                container.innerHTML = '';
                return;
            }

            var sortOptions = filterOptions.sortOptions || [];
            var sortOptionsHtml = '';
            for (var i = 0; i < sortOptions.length; i++) {
                var opt = sortOptions[i];
                var value = opt && opt.value ? opt.value : '';
                var label = opt && opt.label ? opt.label : value;
                var selected = canonicalState.sortBy && canonicalState.sortBy === value ? ' selected' : '';
                sortOptionsHtml += "<option value='" + escapeHtml(value) + "'" + selected + ">" + escapeHtml(label) + "</option>";
            }

            var totalResults = lastSearchResponse && typeof lastSearchResponse.totalResults === 'number' ? lastSearchResponse.totalResults : 0;
            var hasSearch = isSearchReady(canonicalState);
            var summaryMain = '';
            var summarySub = '';

            if (!hasSearch) {
                summaryMain = 'Plan your stay';
                summarySub = 'Enter a destination and dates above to see available hotels.';
            } else if (lastSearchResponse && totalResults > 0) {
                summaryMain = String(totalResults) + ' place' + (totalResults === 1 ? '' : 's') + ' to stay';
                var cityPart = canonicalState.city ? canonicalState.city : '';
                var datePart = canonicalState.checkInDate && canonicalState.checkOutDate ? canonicalState.checkInDate + ' b7 ' + canonicalState.checkOutDate : '';
                var pieces = [];
                if (cityPart) {
                    pieces.push(cityPart);
                }
                if (datePart) {
                    pieces.push(datePart);
                }
                summarySub = pieces.join(' b7 ');
            } else {
                summaryMain = 'No hotels found';
                summarySub = 'Try adjusting your dates or filters.';
            }

            container.innerHTML = "" +
                "<div class='sort-summary-inner'>" +
                "  <div class='sort-summary-main'>" +
                "    <p class='sort-summary-title'>" + escapeHtml(summaryMain) + "</p>" +
                "    <p class='sort-summary-sub'>" + escapeHtml(summarySub) + "</p>" +
                "  </div>" +
                "  <div class='sort-summary-controls'>" +
                "    <label for='hotelSortSelect' class='sort-label'>Sort by</label>" +
                "    <select id='hotelSortSelect' name='sortBy' class='sort-select' data-action='change-sort'>" + sortOptionsHtml + "</select>" +
                "  </div>" +
                "</div>";
        }

        function applyClientSideFiltersToResults(rawResults) {
            var results = rawResults || [];
            if (!canonicalState.propertyType || !canonicalState.propertyType.length) {
                return results;
            }
            var selectedTypes = canonicalState.propertyType;
            var filtered = [];
            for (var i = 0; i < results.length; i++) {
                var hotel = results[i];
                if (!hotel) {
                    continue;
                }
                if (hotel.propertyType && selectedTypes.indexOf(hotel.propertyType) !== -1) {
                    filtered.push(hotel);
                    continue;
                }
                if (hotel.propertyTypeCode && selectedTypes.indexOf(hotel.propertyTypeCode) !== -1) {
                    filtered.push(hotel);
                    continue;
                }
                filtered.push(hotel);
            }
            return filtered;
        }

        function renderResults(container) {
            if (!container) {
                return;
            }

            if (!isSearchReady(canonicalState)) {
                container.innerHTML = "<p class='results-placeholder'>Start by searching for a city and dates above.</p>";
                return;
            }

            if (!lastSearchResponse) {
                container.innerHTML = "<p class='results-placeholder'>No results yet.</p>";
                return;
            }

            var rawResults = lastSearchResponse.results || [];
            var results = applyClientSideFiltersToResults(rawResults);

            if (!results.length) {
                container.innerHTML = "<p class='results-placeholder'>No hotels match your current filters. Try adjusting the filters on the left.</p>";
                return;
            }

            var html = '';
            for (var i = 0; i < results.length; i++) {
                html += buildHotelCardHtml(results[i]);
            }
            container.innerHTML = html;
        }

        function buildHotelCardHtml(hotel) {
            var id = hotel && hotel.id ? hotel.id : '';
            var name = hotel && hotel.name ? hotel.name : 'Hotel';
            var city = hotel && hotel.city ? hotel.city : '';
            var country = hotel && hotel.country ? hotel.country : '';
            var starRating = typeof hotel.starRating === 'number' ? hotel.starRating : null;
            var guestRating = typeof hotel.guestRating === 'number' ? hotel.guestRating : null;
            var reviewCount = typeof hotel.reviewCount === 'number' ? hotel.reviewCount : null;
            var minPrice = typeof hotel.minPricePerNight === 'number' ? hotel.minPricePerNight : null;
            var currency = hotel && hotel.currency ? hotel.currency : null;
            var description = hotel && hotel.description ? hotel.description : '';
            var address = hotel && hotel.address ? hotel.address : '';
            var imageUrl = hotel && hotel.mainImageUrl ? hotel.mainImageUrl : '';
            var isFamilyFriendly = !!(hotel && hotel.isFamilyFriendly);

            var wishlistActive = wishlistedHotelIds.has(id);
            var wishlistButtonClass = 'wishlist-button' + (wishlistActive ? ' wishlist-button--active' : '');
            var wishlistLabel = wishlistActive ? 'Saved' : 'Save';

            var ratingParts = [];
            if (starRating !== null) {
                ratingParts.push(starRating.toFixed(1) + '-star');
            }
            if (guestRating !== null) {
                var guestText = guestRating.toFixed(1) + '/5 guest rating';
                if (reviewCount !== null) {
                    guestText += ' (' + String(reviewCount) + ' review' + (reviewCount === 1 ? '' : 's') + ')';
                }
                ratingParts.push(guestText);
            }
            var ratingHtml = ratingParts.length ? "<p class='hotel-card-ratings'>" + escapeHtml(ratingParts.join(' b7 ')) + "</p>" : '';

            var priceHtml = '';
            if (minPrice !== null) {
                priceHtml = "<p class='hotel-card-price'>From " + escapeHtml(formatCurrency(currency, minPrice)) + " <span class='hotel-card-price-unit'>per night</span></p>";
            }

            var locationParts = [];
            if (city) {
                locationParts.push(city);
            }
            if (country) {
                locationParts.push(country);
            }
            var locationText = locationParts.join(', ');

            var shortDescription = description ? truncateText(description, 160) : (address ? address : 'A comfortable base for exploring the city.');

            var familyBadge = isFamilyFriendly ? "<span class='hotel-card-badge'>Family-friendly</span>" : '';

            var imageHtml = '';
            if (imageUrl) {
                imageHtml = "<img src='" + escapeHtml(imageUrl) + "' alt='" + escapeHtml(name) + (city ? " in " + escapeHtml(city) : '') + "' class='hotel-card-image'>";
            } else {
                imageHtml = "<div class='hotel-card-image hotel-card-image--placeholder'>Image coming soon</div>";
            }

            return "" +
                "<article class='hotel-card' data-component='hotel-card' data-hotel-id='" + escapeHtml(id) + "'>" +
                "  <div class='hotel-card-top'>" +
                "    <div class='hotel-card-media'>" + imageHtml + "</div>" +
                "    <div class='hotel-card-main'>" +
                "      <header class='hotel-card-header'>" +
                "        <div class='hotel-card-header-text'>" +
                "          <h2 class='hotel-card-title'>" + escapeHtml(name) + "</h2>" +
                (locationText ? "          <p class='hotel-card-location'>" + escapeHtml(locationText) + "</p>" : '') +
                (ratingHtml ? ratingHtml : '') +
                (familyBadge ? "          <div class='hotel-card-badges'>" + familyBadge + "</div>" : '') +
                "        </div>" +
                "        <button type='button' class='" + wishlistButtonClass + "' data-action='add-to-wishlist' data-hotel-id='" + escapeHtml(id) + "'>" +
                "          <span class='wishlist-button-label'>" + escapeHtml(wishlistLabel) + "</span>" +
                "        </button>" +
                "      </header>" +
                "      <p class='hotel-card-description'>" + escapeHtml(shortDescription) + "</p>" +
                "      <div class='hotel-card-bottom'>" +
                "        <a href='javascript:void(0)' class='hotel-card-details-link' data-action='view-hotel-details' data-hotel-id='" + escapeHtml(id) + "'>View details</a>" +
                (priceHtml ? priceHtml : '') +
                "      </div>" +
                "      <p class='wishlist-message' data-role='wishlist-message' aria-live='polite'></p>" +
                "    </div>" +
                "  </div>" +
                "</article>";
        }

        function renderPagination(container) {
            if (!container) {
                return;
            }
            if (!lastSearchResponse) {
                container.innerHTML = '';
                return;
            }
            var totalResults = lastSearchResponse.totalResults || 0;
            var pageSize = lastSearchResponse.pageSize || PAGE_SIZE;
            var currentPage = lastSearchResponse.page || canonicalState.page || 1;
            var totalPages = Math.max(1, Math.ceil(totalResults / pageSize));

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            var maxButtons = 7;
            var start = Math.max(1, currentPage - 3);
            var end = Math.min(totalPages, start + maxButtons - 1);
            if (end - start + 1 < maxButtons) {
                start = Math.max(1, end - maxButtons + 1);
            }

            var pagesHtml = '';
            for (var p = start; p <= end; p++) {
                var activeClass = p === currentPage ? ' is-active' : '';
                pagesHtml += "<button type='button' class='pagination-page" + activeClass + "' data-action='page-select' data-page='" + p + "'>" + p + "</button>";
            }

            var prevDisabled = currentPage <= 1 ? ' disabled' : '';
            var nextDisabled = currentPage >= totalPages ? ' disabled' : '';

            container.innerHTML = "" +
                "<div class='pagination-inner'>" +
                "  <button type='button' class='pagination-prev' data-action='prev-page'" + prevDisabled + ">Previous</button>" +
                "  <div class='pagination-pages'>" + pagesHtml + "</div>" +
                "  <button type='button' class='pagination-next' data-action='next-page'" + nextDisabled + ">Next</button>" +
                "</div>";
        }

        function escapeHtml(value) {
            if (value === undefined || value === null) {
                return '';
            }
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function truncateText(text, maxLength) {
            if (!text) {
                return '';
            }
            if (text.length <= maxLength) {
                return text;
            }
            return text.slice(0, maxLength - 1).trimEnd() + 'hellip';
        }

        function formatCurrency(currencyCode, amount) {
            var symbol = '';
            var code = currencyCode ? String(currencyCode).toLowerCase() : '';
            if (code === 'usd') {
                symbol = '$';
            } else if (code === 'eur') {
                symbol = 'ac';
            } else if (code === 'gbp') {
                symbol = 'a3';
            } else if (code === 'jpy') {
                symbol = 'a5';
            }
            var num = typeof amount === 'number' ? amount : parseFloat(amount);
            if (isNaN(num)) {
                return symbol + '';
            }
            try {
                return symbol + num.toLocaleString(undefined, { maximumFractionDigits: 0 });
            } catch (e) {
                return symbol + String(num);
            }
        }
    });
    </script>
</body>
</html>
