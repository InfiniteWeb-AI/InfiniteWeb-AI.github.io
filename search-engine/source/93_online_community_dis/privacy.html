<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Privacy Policy - Community Forum</title>
  <!--
    Design analysis summary
    - Very minimal, content-first forum layout.
    - Full-width black header bar with left-aligned navigation.
    - Off‑white page background (#F6F5F1) with white cards on a light gray border.
    - Clean sans-serif typography with clear hierarchy.
    - Large vertical whitespace between header, content sections, and cards.
    - Subtle, flat footer expected with small, low‑contrast links.
  -->

  <!-- Recommended fonts matching the design's grotesk / utilitarian feel -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Global stylesheet -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific stylesheet -->
  <link rel='stylesheet' href='privacy.css'>
</head>
<body>
  <div class='site'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='header-left'>
          <nav class='primary-nav' aria-label='Primary'>
            <ul class='primary-nav-list'>
              <li class='primary-nav-item'>
                <a href='index.html' class='primary-nav-link' title='Forum homepage with trending, popular, and recent discussions'>Home</a>
              </li>
              <li class='primary-nav-item'>
                <a href='categories.html' class='primary-nav-link' title='Browse all discussion categories such as Web Development and Product Feedback'>Categories</a>
              </li>
              <li class='primary-nav-item'>
                <a href='topics.html' class='primary-nav-link' title='Explore, search, and follow discussion topics and tags'>Topics</a>
              </li>
              <li class='primary-nav-item'>
                <a href='bookmarks.html' class='primary-nav-link' title='View and open your bookmarked or saved discussions'>Bookmarks</a>
              </li>
              <li class='primary-nav-item'>
                <a href='help.html' class='primary-nav-link' title='Read help articles and FAQs about using the forum'>Help</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class='header-right'>
          <!-- Static search icon to match the visual design (non-interactive per requirements) -->
          <span class='nav-icon nav-icon-search' aria-hidden='true'></span>

          <!-- User avatar with dropdown for special access pages -->
          <div class='user-menu'>
            <button class='user-avatar' type='button' aria-haspopup='true' aria-expanded='false'>
              <span class='visually-hidden'>Open user menu</span>
              <span class='user-avatar-initials'>U</span>
            </button>
            <ul class='user-menu-dropdown' aria-label='User menu'>
              <li class='user-menu-item'>
                <a href='messages.html' class='user-menu-link' title='Accessible via a Messages item in the signed-in user&#39;s menu'>Messages</a>
              </li>
              <li class='user-menu-item'>
                <a href='settings.html' class='user-menu-link' title='Accessible via a Settings option in the signed-in user&#39;s menu'>User Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='content-shell privacy-shell'>
        <!-- Off-white hero band with page title and section navigation -->
        <section class='page-hero privacy-hero'>
          <div class='page-hero-inner'>
            <div class='page-hero-left'>
              <h1 class='page-title' data-populate='privacy-title-static'>Privacy Policy</h1>
            </div>
            <div class='page-hero-right'>
              <nav class='section-nav' aria-label='Privacy sections' data-component='privacy-section-nav'>
                <p class='section-nav-label'>On this page</p>
                <ul class='section-nav-list' data-populate='privacy-section-nav'>
                  <!-- Populated dynamically from policy section headings -->
                </ul>
              </nav>
            </div>
          </div>
        </section>

        <!-- Main centered privacy policy card -->
        <section class='page-body privacy-body'>
          <div class='content-column'>
            <div class='card privacy-card' data-component='static-page-loader'>
              <!-- Loading state placeholder -->
              <div class='privacy-loader' data-state='loading'>
                <div class='skeleton skeleton-title'></div>
                <div class='skeleton skeleton-line'></div>
                <div class='skeleton skeleton-line'></div>
              </div>

              <!-- Error state -->
              <div class='privacy-error' data-state='error' hidden>
                <p>We couldn&#39;t load the privacy policy right now.</p>
                <button type='button' class='link-button' data-action='retry-load-privacy'>Retry</button>
              </div>

              <!-- Loaded content state -->
              <article class='privacy-content-viewer' data-component='privacy-content-viewer' hidden>
                <header class='privacy-header'>
                  <div class='privacy-header-main'>
                    <h2 class='privacy-title' data-populate='privacy-title'></h2>
                    <p class='privacy-meta' data-populate='privacy-meta'></p>
                  </div>
                  <div class='privacy-header-util'>
                    <button type='button' class='icon-button icon-more' aria-label='More options' data-action='privacy-more-options'>
                      <span aria-hidden='true'>&bull;&bull;&bull;</span>
                    </button>
                  </div>
                </header>

                <div class='privacy-body-content' data-populate='privacy-body'>
                  <!-- getStaticPageContent.body is injected here as HTML -->
                </div>

                <footer class='privacy-related'>
                  <p class='privacy-terms-link'>
                    <span class='privacy-terms-label'>See also:</span>
                    <a href='javascript:void(0)' data-component='terms-link' data-action='navigate-terms'>Terms of Service</a>
                  </p>
                </footer>
              </article>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-nav-link' title='Learn more about this community and platform'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-nav-link' title='Get help and support for using the forum'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-nav-link' title='Read the terms of service for using the site'>Terms</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html?from=footer' class='footer-nav-link' title='Review the privacy policy and data practices' data-component='footer-privacy-entrypoint'>Privacy</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic bundle -->
  <script src='business_logic.js'></script>

  <!-- Page-specific UI logic -->
  <script>
  'use strict';

  document.addEventListener('DOMContentLoaded', function() {
    // ----- Utility: URL params & state -----
    function readUrlParams() {
      var url = new URL(window.location.href);
      return {
        from: url.searchParams.get('from') || null,
        section: url.searchParams.get('section') || null,
        lang: url.searchParams.get('lang') || null,
        version: url.searchParams.get('version') || null,
        hashSection: window.location.hash ? window.location.hash.slice(1) : null
      };
    }

    var pageState = {
      loading: false,
      error: false,
      contentLoaded: false,
      activeSectionId: null,
      urlParams: readUrlParams()
    };

    // ----- DOM references -----
    var loaderCard = document.querySelector('[data-component="static-page-loader"]');
    var loaderEl = loaderCard ? loaderCard.querySelector('.privacy-loader') : null;
    var errorEl = loaderCard ? loaderCard.querySelector('.privacy-error') : null;
    var contentArticle = loaderCard ? loaderCard.querySelector('[data-component="privacy-content-viewer"]') : null;

    var titleEl = contentArticle ? contentArticle.querySelector('[data-populate="privacy-title"]') : null;
    var metaEl = contentArticle ? contentArticle.querySelector('[data-populate="privacy-meta"]') : null;
    var bodyEl = contentArticle ? contentArticle.querySelector('[data-populate="privacy-body"]') : null;

    var sectionNav = document.querySelector('[data-component="privacy-section-nav"]');
    var sectionNavList = sectionNav ? sectionNav.querySelector('.section-nav-list') : null;

    var termsLinkEl = document.querySelector('[data-component="terms-link"][data-action="navigate-terms"]');

    // ----- State helpers -----
    function setLoadingState(isLoading) {
      pageState.loading = !!isLoading;
      if (!loaderEl || !errorEl || !contentArticle) return;

      if (isLoading) {
        loaderEl.hidden = false;
        errorEl.hidden = true;
        contentArticle.hidden = true;
      } else {
        loaderEl.hidden = true;
      }
    }

    function showErrorState() {
      pageState.error = true;
      if (!loaderEl || !errorEl || !contentArticle) return;
      loaderEl.hidden = true;
      errorEl.hidden = false;
      contentArticle.hidden = true;
    }

    function showContentState() {
      pageState.error = false;
      if (!loaderEl || !errorEl || !contentArticle) return;
      loaderEl.hidden = true;
      errorEl.hidden = false; // hidden via property below
      errorEl.hidden = true;
      contentArticle.hidden = false;
    }

    // ----- Section navigation helpers -----
    function highlightActiveSection(sectionId) {
      if (!sectionNavList) return;
      var items = sectionNavList.querySelectorAll('[data-section-id]');
      Array.prototype.forEach.call(items, function(item) {
        if (item.getAttribute('data-section-id') === sectionId) {
          item.classList.add('is-active');
        } else {
          item.classList.remove('is-active');
        }
      });
    }

    function updateUrlSection(sectionId) {
      try {
        var url = new URL(window.location.href);
        if (sectionId) {
          url.searchParams.set('section', sectionId);
          url.hash = sectionId;
        } else {
          url.searchParams.delete('section');
          url.hash = '';
        }
        history.pushState({ section: sectionId }, '', url.toString());
      } catch (e) {
        // If URL/History APIs are not available, fail silently.
      }
    }

    function scrollToSection(sectionId, options) {
      if (!sectionId || !bodyEl) return;
      var opts = options || {};
      var cleanId = sectionId.charAt(0) === '#' ? sectionId.slice(1) : sectionId;
      var selectorId;
      if (typeof CSS !== 'undefined' && CSS && typeof CSS.escape === 'function') {
        selectorId = CSS.escape(cleanId);
      } else {
        selectorId = cleanId.replace(/\s/g, '-');
      }
      var target = bodyEl.querySelector('#' + selectorId);
      if (!target) return;

      try {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (e) {
        target.scrollIntoView(true);
      }

      pageState.activeSectionId = cleanId;
      highlightActiveSection(cleanId);

      if (opts.updateUrl) {
        updateUrlSection(cleanId);
      }
    }

    function buildSectionNav() {
      if (!sectionNav || !sectionNavList || !bodyEl) return;

      sectionNavList.innerHTML = '';
      var headings = bodyEl.querySelectorAll('h2[id], h3[id]');
      var usedIds = {};

      Array.prototype.forEach.call(headings, function(h) {
        var id = h.getAttribute('id');
        if (!id || usedIds[id]) return;
        usedIds[id] = true;

        var li = document.createElement('li');
        li.className = 'section-nav-item';

        var button = document.createElement('button');
        button.type = 'button';
        button.className = 'section-nav-link';
        button.textContent = h.textContent.trim();
        button.setAttribute('data-action', 'section-link');
        button.setAttribute('data-section-id', id);

        button.addEventListener('click', function() {
          scrollToSection(id, { updateUrl: true });
        });

        li.appendChild(button);
        sectionNavList.appendChild(li);
      });

      if (!sectionNavList.childElementCount) {
        sectionNav.style.display = 'none';
      } else {
        sectionNav.style.display = '';
      }
    }

    function applyInitialSectionFromUrl() {
      pageState.urlParams = readUrlParams();
      var sectionFromParam = pageState.urlParams.section;
      var sectionFromHash = pageState.urlParams.hashSection;
      var targetSection = sectionFromParam || sectionFromHash;

      if (targetSection) {
        setTimeout(function() {
          scrollToSection(targetSection, { updateUrl: false });
        }, 0);
      }
    }

    // ----- Terms navigation helper -----
    function navigateToTerms() {
      var url = new URL(window.location.href);
      var fromParam = url.searchParams.get('from');
      var langParam = url.searchParams.get('lang');
      var versionParam = url.searchParams.get('version');

      var params = new URLSearchParams();
      params.set('from', 'privacy');
      if (fromParam) {
        params.set('source', fromParam);
      }
      if (pageState.activeSectionId) {
        params.set('section', pageState.activeSectionId);
      }
      if (langParam) {
        params.set('lang', langParam);
      }
      if (versionParam) {
        params.set('version', versionParam);
      }

      var target = 'terms.html';
      var query = params.toString();
      if (query) {
        target += '?' + query;
      }
      window.location.href = target;
    }

    function wireTermsLinksInBody() {
      if (!bodyEl) return;
      var links = bodyEl.querySelectorAll('a[href]');
      Array.prototype.forEach.call(links, function(link) {
        var href = link.getAttribute('href');
        if (!href) return;
        var withoutHash = href.split('#')[0];
        var base = withoutHash.split('?')[0];
        if (base === 'terms.html') {
          link.setAttribute('href', 'javascript:void(0)');
          link.setAttribute('data-component', 'terms-link');
          link.setAttribute('data-action', 'navigate-terms');
          link.addEventListener('click', function(e) {
            e.preventDefault();
            navigateToTerms();
          });
        }
      });
    }

    // ----- Data loading (static-page-loader + privacy-content-viewer) -----
    function loadPrivacyContent() {
      if (!loaderCard || !titleEl || !bodyEl) return;

      setLoadingState(true);
      pageState.contentLoaded = false;

      try {
        // Determine pageSlug (lang/version could influence internal mapping if SDK supports it)
        var pageSlug = 'privacy_policy';
        var data = WebsiteSDK.getStaticPageContent(pageSlug);

        var title = data && typeof data.title === 'string' ? data.title : '';
        var bodyHtml = data && typeof data.body === 'string' ? data.body : '';

        titleEl.textContent = title || 'Privacy Policy';
        if (metaEl) {
          metaEl.textContent = '';
        }
        bodyEl.innerHTML = bodyHtml;

        wireTermsLinksInBody();
        buildSectionNav();

        pageState.contentLoaded = true;
        showContentState();
        applyInitialSectionFromUrl();
      } catch (err) {
        console.error('Error loading privacy policy content', err);
        showErrorState();
      } finally {
        setLoadingState(false);
      }
    }

    // ----- Event wiring -----
    var retryButtons = document.querySelectorAll('[data-action="retry-load-privacy"]');
    Array.prototype.forEach.call(retryButtons, function(btn) {
      btn.addEventListener('click', function() {
        loadPrivacyContent();
      });
    });

    if (termsLinkEl) {
      termsLinkEl.addEventListener('click', function(e) {
        e.preventDefault();
        navigateToTerms();
      });
    }

    window.addEventListener('hashchange', function() {
      if (!pageState.contentLoaded) return;
      var hash = window.location.hash ? window.location.hash.slice(1) : null;
      if (hash) {
        scrollToSection(hash, { updateUrl: false });
      }
    });

    window.addEventListener('popstate', function() {
      if (!pageState.contentLoaded) return;
      var params = readUrlParams();
      if (params.section) {
        scrollToSection(params.section, { updateUrl: false });
      } else if (params.hashSection) {
        scrollToSection(params.hashSection, { updateUrl: false });
      }
    });

    // Placeholder for any future actions (e.g., privacy-more-options)
    var actionElements = document.querySelectorAll('[data-action]');
    Array.prototype.forEach.call(actionElements, function(el) {
      var action = el.getAttribute('data-action');
      if (action === 'privacy-more-options') {
        el.addEventListener('click', function() {
          // Reserved for future utilities like print/download.
        });
      }
    });

    // ----- Initialize page (onPageInit) -----
    loadPrivacyContent();
  });
  </script>
</body>
</html>
