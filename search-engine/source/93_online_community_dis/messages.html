<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Community Forum</title>
  <!--
    Design analysis summary
    - Very minimal, content-first forum layout.
    - Full-width black header bar with left-aligned navigation.
    - Off-white page background (#F6F5F1) with white cards on a light gray border.
    - Clean sans-serif typography with clear hierarchy.
    - Large vertical whitespace between header, content sections, and cards.
    - Subtle, flat footer expected with small, low-contrast links.
  -->

  <!-- Recommended fonts matching the design's grotesk / utilitarian feel -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Global stylesheet -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific stylesheet -->
  <link rel='stylesheet' href='messages.css'>
</head>
<body>
  <div class='site'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='header-left'>
          <nav class='primary-nav' aria-label='Primary'>
            <ul class='primary-nav-list'>
              <li class='primary-nav-item'>
                <a href='index.html' class='primary-nav-link' title='Forum homepage with trending, popular, and recent discussions'>Home</a>
              </li>
              <li class='primary-nav-item'>
                <a href='categories.html' class='primary-nav-link' title='Browse all discussion categories such as Web Development and Product Feedback'>Categories</a>
              </li>
              <li class='primary-nav-item'>
                <a href='topics.html' class='primary-nav-link' title='Explore, search, and follow discussion topics and tags'>Topics</a>
              </li>
              <li class='primary-nav-item'>
                <a href='bookmarks.html' class='primary-nav-link' title='View and open your bookmarked or saved discussions'>Bookmarks</a>
              </li>
              <li class='primary-nav-item'>
                <a href='help.html' class='primary-nav-link' title='Read help articles and FAQs about using the forum'>Help</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class='header-right'>
          <!-- Static search icon to match the visual design (non-interactive per requirements) -->
          <span class='nav-icon nav-icon-search' aria-hidden='true'></span>

          <!-- User avatar with dropdown for special access pages -->
          <div class='user-menu'>
            <button class='user-avatar' type='button' aria-haspopup='true' aria-expanded='false'>
              <span class='visually-hidden'>Open user menu</span>
              <span class='user-avatar-initials'>U</span>
            </button>
            <ul class='user-menu-dropdown' aria-label='User menu'>
              <li class='user-menu-item'>
                <a href='messages.html' class='user-menu-link' title='Accessible via a Messages item in the signed-in user&#39;s menu'>Messages</a>
              </li>
              <li class='user-menu-item'>
                <a href='settings.html' class='user-menu-link' title='Accessible via a Settings option in the signed-in user&#39;s menu'>User Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='content-shell' data-component='messages-page-controller'>
        <!-- Header band -->
        <section class='page-header-band'>
          <div class='page-header-inner'>
            <div class='page-header-left'>
              <h1 class='page-title'>Messages</h1>
              <p class='page-status-text' data-component='messages-status-indicator' aria-live='polite'></p>
            </div>
            <div class='page-header-right'>
              <form class='header-search-form' data-component='header-search-form' data-action='header-search-submit' role='search'>
                <label class='visually-hidden' for='header-search-input'>Search discussions</label>
                <input id='header-search-input' class='header-search-input' type='search' name='query' placeholder='Search discussions' autocomplete='off'>
              </form>
            </div>
          </div>
        </section>

        <!-- Error boundary -->
        <section class='messages-error-boundary' data-component='messages-error-boundary' aria-live='polite' hidden>
          <article class='card error-card'>
            <h2 class='error-title'>Something went wrong</h2>
            <p class='error-message' data-populate='error-message'></p>
            <div class='error-actions'>
              <button type='button' class='btn-primary' data-action='error-retry'>Retry</button>
            </div>
          </article>
        </section>

        <!-- Main messages content (hidden when error boundary is active) -->
        <div class='messages-main' data-component='messages-main'>
          <!-- Message composer card -->
          <section class='composer-section'>
            <article class='card composer-card' data-component='message-composer-form'>
              <header class='composer-header'>
                <div class='composer-header-left'>
                  <div class='avatar-circle composer-avatar'>
                    <span class='avatar-initials'>U</span>
                  </div>
                  <div class='composer-header-meta'>
                    <div class='composer-title'>New message</div>
                    <div class='composer-subtitle'>Start a private conversation with another member</div>
                  </div>
                </div>
                <div class='composer-header-right'>
                  <span class='icon-dots-vertical' aria-hidden='true'></span>
                </div>
              </header>

              <form class='composer-form' novalidate>
                <div class='form-field'>
                  <label for='recipientSelect'>To</label>
                  <select id='recipientSelect' name='recipientProfileId' data-populate='recipient-options'>
                    <!-- Options populated via JavaScript from MemberProfile (member_profiles) -->
                  </select>
                  <p class='field-helper' data-populate='recipient-helper-text'></p>
                  <p class='field-error' data-field-error='recipient' aria-live='polite'></p>
                </div>

                <div class='form-field'>
                  <label for='messageSubject'>Subject</label>
                  <input id='messageSubject' name='subject' type='text' autocomplete='off'>
                  <p class='field-error' data-field-error='subject' aria-live='polite'></p>
                </div>

                <div class='form-field'>
                  <label for='messageBody'>Message</label>
                  <textarea id='messageBody' name='body' rows='6'></textarea>
                  <small class='field-hint'>Please avoid sharing external links for safety.</small>
                  <p class='field-error' data-field-error='body' aria-live='polite'></p>
                </div>

                <div class='form-actions'>
                  <button type='submit' class='btn-primary' data-action='send-message-submit'>Send message</button>
                  <span class='form-status' data-populate='send-status' aria-live='polite'></span>
                </div>
              </form>
            </article>
          </section>

          <!-- Sent messages list -->
          <section class='sent-messages-section' aria-label='Sent messages history'>
            <header class='section-header'>
              <h2 class='section-title'>Sent messages</h2>
            </header>

            <div class='sent-messages-status' data-populate='sent-messages-status' aria-live='polite'></div>

            <div class='sent-messages-list' data-component='sent-messages-list' data-populate='sent-messages-list'>
              <!-- Sent message rows rendered here via JavaScript -->
            </div>
          </section>

          <!-- Pagination controls -->
          <nav class='pagination-wrapper' data-component='pagination-controls' aria-label='Sent messages pagination'>
            <button type='button' class='pagination-prev' data-action='pagination-prev'>Previous</button>
            <div class='pagination-pages' data-populate='pagination-pages'>
              <!-- Page number buttons rendered here via JavaScript -->
            </div>
            <button type='button' class='pagination-next' data-action='pagination-next'>Next</button>
          </nav>
        </div>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-nav-link' title='Learn more about this community and platform'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-nav-link' title='Get help and support for using the forum'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-nav-link' title='Read the terms of service for using the site'>Terms</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-nav-link' title='Review the privacy policy and data practices'>Privacy</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic bridge -->
  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      // URL params
      const urlParams = new URLSearchParams(window.location.search);
      const recipientProfileIdParam = urlParams.get('recipientProfileId') || '';
      let currentPageFromUrl = parseInt(urlParams.get('page'), 10);
      if (!currentPageFromUrl || currentPageFromUrl < 1) {
        currentPageFromUrl = 1;
      }

      // State
      const state = {
        recipientProfileIdFromUrl: recipientProfileIdParam || null,
        currentPage: currentPageFromUrl,
        pageSize: 20,
        totalCount: 0,
        lastMessagesResult: null,
        isSending: false,
        lastError: null
      };

      // Core elements
      const statusIndicatorEl = document.querySelector('[data-component="messages-status-indicator"]');
      const errorBoundaryEl = document.querySelector('[data-component="messages-error-boundary"]');
      const messagesMainEl = document.querySelector('[data-component="messages-main"]');

      const composerCardEl = document.querySelector('[data-component="message-composer-form"]');
      const formEl = composerCardEl ? composerCardEl.querySelector('form') : null;
      const recipientSelectEl = composerCardEl ? composerCardEl.querySelector('select[name="recipientProfileId"]') : null;
      const subjectInputEl = composerCardEl ? composerCardEl.querySelector('input[name="subject"]') : null;
      const bodyTextareaEl = composerCardEl ? composerCardEl.querySelector('textarea[name="body"]') : null;
      const sendButtonEl = composerCardEl ? composerCardEl.querySelector('[data-action="send-message-submit"]') : null;

      const fieldErrorEls = {
        recipient: composerCardEl ? composerCardEl.querySelector('[data-field-error="recipient"]') : null,
        subject: composerCardEl ? composerCardEl.querySelector('[data-field-error="subject"]') : null,
        body: composerCardEl ? composerCardEl.querySelector('[data-field-error="body"]') : null
      };

      let sendStatusContainer = null;
      let sentMessagesListContainer = null;
      let sentMessagesStatusContainer = null;
      let paginationPagesContainer = null;

      const errorRetryButton = errorBoundaryEl ? errorBoundaryEl.querySelector('[data-action="error-retry"]') : null;
      const paginationPrevButton = document.querySelector('[data-action="pagination-prev"]');
      const paginationNextButton = document.querySelector('[data-action="pagination-next"]');

      // Initial status text
      if (statusIndicatorEl) {
        statusIndicatorEl.textContent = 'Compose a new private message and review your sent messages.';
      }

      // Populate / register data-populate containers
      const populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(el) {
        const key = el.dataset.populate;
        if (key === 'recipient-options') {
          renderRecipientOptions(el);
        } else if (key === 'recipient-helper-text') {
          renderRecipientHelperText(el);
        } else if (key === 'send-status') {
          sendStatusContainer = el;
        } else if (key === 'sent-messages-list') {
          sentMessagesListContainer = el;
        } else if (key === 'sent-messages-status') {
          sentMessagesStatusContainer = el;
        } else if (key === 'pagination-pages') {
          paginationPagesContainer = el;
        } else if (key === 'error-message') {
          // handled when needed
        }
      });

      // Header search form
      const headerSearchForm = document.querySelector('[data-component="header-search-form"]');
      if (headerSearchForm) {
        headerSearchForm.addEventListener('submit', handleHeaderSearchSubmit);
      }

      // Composer form events
      if (formEl) {
        formEl.addEventListener('submit', function(event) {
          event.preventDefault();
          handleSendMessage();
        });
      }

      if (sendButtonEl) {
        sendButtonEl.addEventListener('click', function(event) {
          event.preventDefault();
          handleSendMessage();
        });
      }

      if (subjectInputEl) {
        subjectInputEl.addEventListener('blur', function() {
          const value = subjectInputEl.value.trim();
          if (!value) {
            setFieldError('subject', 'Subject is required.');
          } else {
            setFieldError('subject', '');
          }
        });
      }

      if (bodyTextareaEl) {
        bodyTextareaEl.addEventListener('blur', function() {
          const value = bodyTextareaEl.value.trim();
          if (!value) {
            setFieldError('body', 'Message body is required.');
            return;
          }
          const linkPattern = /(https?:\/\/|www\.)|\b[a-z0-9.-]+\.(com|net|org|io|co)\b/i;
          if (linkPattern.test(value)) {
            setFieldError('body', 'Please remove external links from your message.');
          } else {
            setFieldError('body', '');
          }
        });
      }

      // Pagination controls
      if (paginationPrevButton) {
        paginationPrevButton.addEventListener('click', handlePaginationPrevClick);
      }
      if (paginationNextButton) {
        paginationNextButton.addEventListener('click', handlePaginationNextClick);
      }

      // Error retry
      if (errorRetryButton) {
        errorRetryButton.addEventListener('click', function(event) {
          event.preventDefault();
          loadSentMessages();
        });
      }

      // Load sent messages on init
      if (sentMessagesListContainer) {
        loadSentMessages();
      }

      // -------- Functions --------

      function renderRecipientOptions(container) {
        container.innerHTML = '';

        const placeholderOption = document.createElement('option');
        placeholderOption.value = '';
        placeholderOption.textContent = 'Select a member';
        container.appendChild(placeholderOption);

        let profiles = [];
        try {
          const raw = localStorage.getItem('member_profiles') || '[]';
          const parsed = JSON.parse(raw);
          profiles = Array.isArray(parsed) ? parsed : [];
        } catch (err) {
          profiles = [];
        }

        let hasRecipientFromUrl = false;

        profiles.forEach(function(profile) {
          if (!profile || !profile.id) {
            return;
          }
          const option = document.createElement('option');
          option.value = String(profile.id);
          option.textContent = profile.displayName || 'Member';
          if (state.recipientProfileIdFromUrl && profile.id === state.recipientProfileIdFromUrl) {
            hasRecipientFromUrl = true;
          }
          container.appendChild(option);
        });

        if (state.recipientProfileIdFromUrl && !hasRecipientFromUrl) {
          const option = document.createElement('option');
          option.value = state.recipientProfileIdFromUrl;
          option.textContent = 'Selected member';
          container.appendChild(option);
        }

        if (state.recipientProfileIdFromUrl) {
          container.value = state.recipientProfileIdFromUrl;
          container.disabled = true;
        }
      }

      function renderRecipientHelperText(container) {
        if (state.recipientProfileIdFromUrl) {
          container.textContent = 'Recipient is locked to the member you selected from their profile.';
        } else {
          container.textContent = 'Select a member to message. If you start from a member profile, they will be pre-selected here.';
        }
      }

      function loadSentMessages() {
        if (!sentMessagesListContainer) {
          return;
        }

        hideErrorBoundary();

        if (statusIndicatorEl) {
          statusIndicatorEl.textContent = 'Loading sent messages...';
        }
        if (sentMessagesStatusContainer) {
          sentMessagesStatusContainer.textContent = 'Loading sent messages...';
        }

        try {
          const result = WebsiteSDK.getSentMessages(state.currentPage, state.pageSize);
          state.lastMessagesResult = result;
          state.totalCount = typeof result.totalCount === 'number' ? result.totalCount : 0;
          const messages = Array.isArray(result.messages) ? result.messages : [];

          renderSentMessagesList(sentMessagesListContainer, messages);

          if (sentMessagesStatusContainer) {
            if (messages.length === 0) {
              sentMessagesStatusContainer.textContent = 'No sent messages found on this page.';
            } else {
              sentMessagesStatusContainer.textContent = 'Showing ' + messages.length + ' of ' + state.totalCount + ' sent messages.';
            }
          }

          if (paginationPagesContainer) {
            renderPagination(paginationPagesContainer, {
              page: result.page || state.currentPage,
              pageSize: result.pageSize || state.pageSize,
              totalCount: state.totalCount
            });
          }

          if (statusIndicatorEl) {
            const totalPages = state.totalCount && state.pageSize ? Math.max(1, Math.ceil(state.totalCount / state.pageSize)) : 1;
            statusIndicatorEl.textContent = 'Sent messages · Page ' + state.currentPage + ' of ' + totalPages;
          }
        } catch (err) {
          state.lastError = err;
          showErrorBoundary('We couldn\'t load your sent messages. Please try again.');
        }
      }

      function renderSentMessagesList(container, messages) {
        container.innerHTML = '';

        if (!messages || messages.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'empty-state';
          empty.textContent = 'You have not sent any messages yet.';
          container.appendChild(empty);
          return;
        }

        messages.forEach(function(msg) {
          const article = document.createElement('article');
          article.className = 'card sent-message-row';
          article.dataset.component = 'sent-message-row';
          article.dataset.messageId = msg.id || '';
          article.dataset.recipientProfileId = msg.recipientProfileId || '';

          const header = document.createElement('header');
          header.className = 'sent-message-row-header';

          const headerLeft = document.createElement('div');
          headerLeft.className = 'sent-message-row-header-left';

          const avatarLink = document.createElement('a');
          avatarLink.href = 'javascript:void(0)';
          avatarLink.className = 'avatar-circle recipient-avatar';
          avatarLink.dataset.action = 'recipient-profile';
          avatarLink.dataset.recipientId = msg.recipientProfileId || '';
          avatarLink.title = 'View recipient profile';
          const initials = (msg.recipientDisplayName || '?').trim().charAt(0).toUpperCase();
          avatarLink.textContent = initials;

          const meta = document.createElement('div');
          meta.className = 'sent-message-row-meta';

          const nameLink = document.createElement('a');
          nameLink.href = 'javascript:void(0)';
          nameLink.className = 'recipient-name-link';
          nameLink.dataset.action = 'recipient-profile';
          nameLink.dataset.recipientId = msg.recipientProfileId || '';
          nameLink.textContent = msg.recipientDisplayName || 'Recipient';

          const timeDiv = document.createElement('div');
          timeDiv.className = 'sent-message-row-time';
          timeDiv.textContent = formatDateTime(msg.createdAt);

          const statusSpan = document.createElement('span');
          statusSpan.className = 'message-read-indicator';
          if (msg.isRead === true) {
            statusSpan.classList.add('message-read');
            statusSpan.textContent = 'Read';
          } else {
            statusSpan.classList.add('message-unread');
            statusSpan.textContent = 'Unread';
          }

          meta.appendChild(nameLink);
          meta.appendChild(timeDiv);
          meta.appendChild(statusSpan);

          headerLeft.appendChild(avatarLink);
          headerLeft.appendChild(meta);

          const headerRight = document.createElement('div');
          headerRight.className = 'sent-message-row-header-right';
          const subjectDiv = document.createElement('div');
          subjectDiv.className = 'sent-message-row-subject';
          subjectDiv.textContent = msg.subject || '';
          headerRight.appendChild(subjectDiv);

          header.appendChild(headerLeft);
          header.appendChild(headerRight);

          const bodyDiv = document.createElement('div');
          bodyDiv.className = 'sent-message-row-body';
          bodyDiv.textContent = msg.body || '';

          article.appendChild(header);
          article.appendChild(bodyDiv);

          container.appendChild(article);

          avatarLink.addEventListener('click', handleRecipientProfileClick);
          nameLink.addEventListener('click', handleRecipientProfileClick);
        });
      }

      function renderPagination(container, info) {
        container.innerHTML = '';

        const totalPages = info.totalCount && info.pageSize ? Math.max(1, Math.ceil(info.totalCount / info.pageSize)) : 1;
        state.currentPage = info.page;
        state.pageSize = info.pageSize;

        if (totalPages <= 1) {
          container.style.display = 'none';
          if (paginationPrevButton) {
            paginationPrevButton.disabled = true;
          }
          if (paginationNextButton) {
            paginationNextButton.disabled = true;
          }
          return;
        }

        container.style.display = '';

        const maxVisible = 5;
        let start = Math.max(1, state.currentPage - 2);
        let end = Math.min(totalPages, start + maxVisible - 1);
        if (end - start < maxVisible - 1) {
          start = Math.max(1, end - maxVisible + 1);
        }

        for (let page = start; page <= end; page += 1) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'pagination-page';
          if (page === state.currentPage) {
            btn.classList.add('is-active');
            btn.setAttribute('aria-current', 'page');
          }
          btn.dataset.action = 'pagination-page';
          btn.dataset.page = String(page);
          btn.textContent = String(page);
          btn.addEventListener('click', handlePaginationPageClick);
          container.appendChild(btn);
        }

        updatePaginationButtons(totalPages);
      }

      function updatePaginationButtons(totalPagesParam) {
        const totalPages = typeof totalPagesParam === 'number'
          ? totalPagesParam
          : (state.totalCount && state.pageSize ? Math.max(1, Math.ceil(state.totalCount / state.pageSize)) : 1);

        if (paginationPrevButton) {
          paginationPrevButton.disabled = state.currentPage <= 1;
        }
        if (paginationNextButton) {
          paginationNextButton.disabled = state.currentPage >= totalPages;
        }
      }

      function handlePaginationPrevClick(event) {
        event.preventDefault();
        if (state.currentPage <= 1) {
          return;
        }
        navigateToPage(state.currentPage - 1);
      }

      function handlePaginationNextClick(event) {
        event.preventDefault();
        const totalPages = state.totalCount && state.pageSize ? Math.max(1, Math.ceil(state.totalCount / state.pageSize)) : 1;
        if (state.currentPage >= totalPages) {
          return;
        }
        navigateToPage(state.currentPage + 1);
      }

      function handlePaginationPageClick(event) {
        event.preventDefault();
        const pageAttr = event.currentTarget.dataset.page;
        const page = parseInt(pageAttr, 10);
        if (!page || page === state.currentPage) {
          return;
        }
        navigateToPage(page);
      }

      function navigateToPage(page) {
        const params = new URLSearchParams(window.location.search);
        params.set('page', String(page));
        if (state.recipientProfileIdFromUrl) {
          params.set('recipientProfileId', state.recipientProfileIdFromUrl);
        }
        const newUrl = 'messages.html?' + params.toString();
        window.location.href = newUrl;
      }

      function handleRecipientProfileClick(event) {
        event.preventDefault();
        const recipientId = event.currentTarget.dataset.recipientId;
        if (!recipientId) {
          return;
        }
        const url = 'user_profile.html?memberProfileId=' + encodeURIComponent(recipientId);
        window.location.href = url;
      }

      function handleHeaderSearchSubmit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const input = form.querySelector('input[name="query"]');
        if (!input) {
          return;
        }
        const query = input.value.trim();
        if (!query) {
          return;
        }
        const url = 'search_results.html?query=' + encodeURIComponent(query);
        window.location.href = url;
      }

      function clearFieldErrors() {
        Object.keys(fieldErrorEls).forEach(function(key) {
          const el = fieldErrorEls[key];
          if (el) {
            el.textContent = '';
          }
        });
      }

      function setFieldError(name, message) {
        const el = fieldErrorEls[name];
        if (el) {
          el.textContent = message || '';
        }
      }

      function getComposeFormValues() {
        const recipientId = recipientSelectEl ? recipientSelectEl.value.trim() : '';
        const subject = subjectInputEl ? subjectInputEl.value.trim() : '';
        const body = bodyTextareaEl ? bodyTextareaEl.value.trim() : '';
        return {
          recipientProfileId: recipientId,
          subject: subject,
          body: body
        };
      }

      function validateComposeForm() {
        clearFieldErrors();
        const values = getComposeFormValues();
        const errors = {};

        if (!values.recipientProfileId) {
          errors.recipient = 'Please select a recipient.';
        }
        if (!values.subject) {
          errors.subject = 'Subject is required.';
        }
        if (!values.body) {
          errors.body = 'Message body is required.';
        } else {
          const linkPattern = /(https?:\/\/|www\.)|\b[a-z0-9.-]+\.(com|net|org|io|co)\b/i;
          if (linkPattern.test(values.body)) {
            errors.body = 'Please remove external links from your message.';
          }
        }

        Object.keys(errors).forEach(function(key) {
          setFieldError(key, errors[key]);
        });

        return {
          isValid: Object.keys(errors).length === 0,
          values: values
        };
      }

      function handleSendMessage() {
        if (!formEl) {
          return;
        }
        if (state.isSending) {
          return;
        }

        const validation = validateComposeForm();
        if (!validation.isValid) {
          return;
        }

        const values = validation.values;
        state.isSending = true;

        if (sendButtonEl) {
          sendButtonEl.disabled = true;
        }
        if (sendStatusContainer) {
          sendStatusContainer.textContent = 'Sending...';
        }
        if (statusIndicatorEl) {
          statusIndicatorEl.textContent = 'Sending message...';
        }

        try {
          const result = WebsiteSDK.sendPrivateMessage(values.recipientProfileId, values.subject, values.body);

          state.isSending = false;
          if (sendButtonEl) {
            sendButtonEl.disabled = false;
          }

          if (subjectInputEl) {
            subjectInputEl.value = '';
          }
          if (bodyTextareaEl) {
            bodyTextareaEl.value = '';
          }

          clearFieldErrors();

          const statusMessage = result && result.statusMessage ? result.statusMessage : 'Message sent.';
          if (sendStatusContainer) {
            sendStatusContainer.textContent = statusMessage;
          }
          if (statusIndicatorEl) {
            statusIndicatorEl.textContent = statusMessage;
          }

          if (result && result.message && state.lastMessagesResult && Array.isArray(state.lastMessagesResult.messages)) {
            state.lastMessagesResult.messages.unshift(result.message);
            state.totalCount += 1;

            if (sentMessagesListContainer) {
              renderSentMessagesList(sentMessagesListContainer, state.lastMessagesResult.messages);
            }
            if (paginationPagesContainer) {
              renderPagination(paginationPagesContainer, {
                page: state.currentPage,
                pageSize: state.pageSize,
                totalCount: state.totalCount
              });
            }
          }
        } catch (err) {
          state.isSending = false;
          if (sendButtonEl) {
            sendButtonEl.disabled = false;
          }
          if (sendStatusContainer) {
            sendStatusContainer.textContent = 'We couldn\'t send your message. Please try again.';
          }
          if (statusIndicatorEl) {
            statusIndicatorEl.textContent = 'Error sending message.';
          }
        }
      }

      function showErrorBoundary(message) {
        if (!errorBoundaryEl || !messagesMainEl) {
          return;
        }
        messagesMainEl.hidden = true;
        errorBoundaryEl.hidden = false;
        const msgEl = errorBoundaryEl.querySelector('[data-populate="error-message"]');
        if (msgEl) {
          msgEl.textContent = message || 'An unexpected error occurred.';
        }
        if (statusIndicatorEl) {
          statusIndicatorEl.textContent = 'Error loading messages.';
        }
      }

      function hideErrorBoundary() {
        if (!errorBoundaryEl || !messagesMainEl) {
          return;
        }
        errorBoundaryEl.hidden = true;
        messagesMainEl.hidden = false;
      }

      function formatDateTime(value) {
        if (!value) {
          return '';
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return '';
        }
        try {
          return date.toLocaleString(undefined, {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
        } catch (err) {
          return date.toISOString();
        }
      }
    });
  </script>
</body>
</html>
