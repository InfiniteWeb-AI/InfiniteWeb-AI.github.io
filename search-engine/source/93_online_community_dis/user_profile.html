<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Community Forum</title>
  <!--
    Design analysis summary
    - Very minimal, content-first forum layout.
    - Full-width black header bar with left-aligned navigation.
    - Off‑white page background (#F6F5F1) with white cards on a light gray border.
    - Clean sans-serif typography with clear hierarchy.
    - Large vertical whitespace between header, content sections, and cards.
    - Subtle, flat footer expected with small, low‑contrast links.
  -->

  <!-- Recommended fonts matching the design's grotesk / utilitarian feel -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Link your compiled stylesheet that contains the CSS from framework_css -->
  <link rel='stylesheet' href='styles.css'>
  <link rel='stylesheet' href='user_profile.css'>
</head>
<body>
  <div class='site'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='header-left'>
          <nav class='primary-nav' aria-label='Primary'>
            <ul class='primary-nav-list'>
              <li class='primary-nav-item'>
                <a href='index.html' class='primary-nav-link' title='Forum homepage with trending, popular, and recent discussions'>Home</a>
              </li>
              <li class='primary-nav-item'>
                <a href='categories.html' class='primary-nav-link' title='Browse all discussion categories such as Web Development and Product Feedback'>Categories</a>
              </li>
              <li class='primary-nav-item'>
                <a href='topics.html' class='primary-nav-link' title='Explore, search, and follow discussion topics and tags'>Topics</a>
              </li>
              <li class='primary-nav-item'>
                <a href='bookmarks.html' class='primary-nav-link' title='View and open your bookmarked or saved discussions'>Bookmarks</a>
              </li>
              <li class='primary-nav-item'>
                <a href='help.html' class='primary-nav-link' title='Read help articles and FAQs about using the forum'>Help</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class='header-right'>
          <form class='header-search-form' data-component='header-search-form' role='search'>
            <label class='visually-hidden' for='headerSearchInput'>Search discussions</label>
            <input id='headerSearchInput' name='query' type='search' class='header-search-input' placeholder='Search' autocomplete='off'>
            <button type='submit' class='header-search-submit' aria-label='Search'>
              <span class='nav-icon nav-icon-search' aria-hidden='true'></span>
            </button>
          </form>

          <!-- User avatar with dropdown for special access pages -->
          <div class='user-menu'>
            <button class='user-avatar' type='button' aria-haspopup='true' aria-expanded='false'>
              <span class='visually-hidden'>Open user menu</span>
              <span class='user-avatar-initials'>U</span>
            </button>
            <ul class='user-menu-dropdown' aria-label='User menu'>
              <li class='user-menu-item'>
                <a href='messages.html' class='user-menu-link' title='Accessible via a Messages item in the signed-in user&#39;s menu'>Messages</a>
              </li>
              <li class='user-menu-item'>
                <a href='settings.html' class='user-menu-link' title='Accessible via a Settings option in the signed-in user&#39;s menu'>User Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='content-shell content-shell--profile'>
        <!-- Loading indicator -->
        <section class='profile-status profile-status--loading' data-component='profile-loading-indicator' aria-live='polite'>
          <p class='status-message'>Loading profile…</p>
        </section>

        <!-- Error state -->
        <section class='profile-status profile-status--error' data-component='profile-error-state' hidden>
          <article class='card card--status'>
            <h1 class='status-title'>Profile unavailable</h1>
            <p class='status-body' data-populate='profile-error-message'></p>
            <button type='button' class='status-action' data-action='retry-profile-load'>Try again</button>
          </article>
        </section>

        <!-- Main profile content -->
        <div class='profile-page' data-component='profile-page' hidden>
          <section class='profile-masthead' aria-label='Member profile'>
            <div class='profile-masthead-inner'>
              <header class='profile-header' data-component='profile-header'>
                <div class='profile-header-main'>
                  <div class='profile-avatar' data-populate='profile-avatar'></div>
                  <div class='profile-identity'>
                    <h1 class='profile-display-name' data-populate='profile-display-name'></h1>
                    <p class='profile-title' data-populate='profile-title'></p>
                    <p class='profile-meta'>
                      <span class='profile-joined' data-populate='profile-joined'></span>
                      <span class='profile-reputation-inline' data-populate='profile-reputation'></span>
                    </p>
                  </div>
                </div>
                <div class='profile-header-actions'>
                  <button type='button' class='btn btn-primary profile-message-button' data-action='start-private-message'>
                    Message
                  </button>
                </div>
              </header>

              <section class='profile-stats' data-component='profile-stats' aria-label='Profile statistics'>
                <ul class='profile-stats-list'>
                  <li class='profile-stat-item' data-populate='profile-stat-discussions'></li>
                  <li class='profile-stat-item' data-populate='profile-stat-replies'></li>
                  <li class='profile-stat-item' data-populate='profile-stat-reputation'></li>
                </ul>
              </section>

              <section class='profile-bio' data-component='profile-bio'>
                <p class='profile-bio-text' data-populate='profile-bio-text'></p>
              </section>
            </div>
          </section>

          <section class='profile-activity'>
            <article class='card activity-card' data-component='recent-discussions-list'>
              <header class='activity-card-header'>
                <h2 class='activity-card-title'>Recent discussions</h2>
              </header>
              <div class='activity-card-body'>
                <ul class='activity-list' data-populate='recent-discussions'></ul>
              </div>
            </article>

            <article class='card activity-card' data-component='recent-replies-list'>
              <header class='activity-card-header'>
                <h2 class='activity-card-title'>Recent replies</h2>
              </header>
              <div class='activity-card-body'>
                <ul class='activity-list' data-populate='recent-replies'></ul>
              </div>
            </article>
          </section>
        </div>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-nav-link' title='Learn more about this community and platform'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-nav-link' title='Get help and support for using the forum'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-nav-link' title='Read the terms of service for using the site'>Terms</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-nav-link' title='Review the privacy policy and data practices'>Privacy</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </div>

  <script src='business_logic.js'></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const state = {
        memberProfileId: null,
        profile: null,
        recentDiscussions: [],
        recentReplies: [],
        isLoading: false,
        error: null
      };

      const loadingEl = document.querySelector('[data-component="profile-loading-indicator"]');
      const errorEl = document.querySelector('[data-component="profile-error-state"]');
      const errorMessageEl = errorEl ? errorEl.querySelector('[data-populate="profile-error-message"]') : null;
      const profilePageEl = document.querySelector('[data-component="profile-page"]');

      const populateElements = Array.prototype.slice.call(document.querySelectorAll('[data-populate]'));

      const populateRenderers = {
        'profile-display-name': function(container, appState) {
          const profile = appState.profile || {};
          container.textContent = profile.displayName || '';
        },
        'profile-title': function(container, appState) {
          const profile = appState.profile || {};
          const title = profile.title;
          if (!title) {
            container.style.display = 'none';
            return;
          }
          container.style.display = '';
          container.textContent = title;
        },
        'profile-avatar': function(container, appState) {
          const profile = appState.profile || {};
          container.innerHTML = '';
          const avatarUrl = profile.avatarUrl;
          if (avatarUrl) {
            const img = document.createElement('img');
            img.src = avatarUrl;
            img.alt = (profile.displayName || '') + ' avatar';
            img.className = 'profile-avatar-image';
            container.appendChild(img);
          } else {
            const placeholder = document.createElement('span');
            placeholder.className = 'profile-avatar-placeholder';
            const name = profile.displayName || '';
            const initials = name
              .split(' ')
              .filter(Boolean)
              .slice(0, 2)
              .map(function(part) { return part.charAt(0).toUpperCase(); })
              .join('');
            placeholder.textContent = initials || '?';
            container.appendChild(placeholder);
          }
        },
        'profile-joined': function(container, appState) {
          const profile = appState.profile || {};
          if (!profile.createdAt) {
            container.style.display = 'none';
            return;
          }
          const date = new Date(profile.createdAt);
          if (Number.isNaN(date.getTime())) {
            container.style.display = 'none';
            return;
          }
          const formatter = new Intl.DateTimeFormat(undefined, { month: 'short', year: 'numeric' });
          container.style.display = '';
          container.textContent = 'Joined ' + formatter.format(date);
        },
        'profile-reputation': function(container, appState) {
          const profile = appState.profile || {};
          const rep = typeof profile.reputationScore === 'number' ? profile.reputationScore : null;
          if (rep === null) {
            container.style.display = 'none';
            return;
          }
          container.style.display = '';
          const prefix = container.textContent && container.textContent.trim() ? ' ' : ' · ';
          container.textContent = prefix + 'Reputation ' + rep;
        },
        'profile-stat-discussions': function(container, appState) {
          const profile = appState.profile || {};
          const value = typeof profile.discussionsCount === 'number' ? profile.discussionsCount : null;
          if (value === null) {
            container.remove();
            return;
          }
          container.innerHTML = '';
          const valueEl = document.createElement('span');
          valueEl.className = 'profile-stat-value';
          valueEl.textContent = String(value);
          const labelEl = document.createElement('span');
          labelEl.className = 'profile-stat-label';
          labelEl.textContent = 'Discussions';
          container.appendChild(valueEl);
          container.appendChild(labelEl);
        },
        'profile-stat-replies': function(container, appState) {
          const profile = appState.profile || {};
          const value = typeof profile.repliesCount === 'number' ? profile.repliesCount : null;
          if (value === null) {
            container.remove();
            return;
          }
          container.innerHTML = '';
          const valueEl = document.createElement('span');
          valueEl.className = 'profile-stat-value';
          valueEl.textContent = String(value);
          const labelEl = document.createElement('span');
          labelEl.className = 'profile-stat-label';
          labelEl.textContent = 'Replies';
          container.appendChild(valueEl);
          container.appendChild(labelEl);
        },
        'profile-stat-reputation': function(container, appState) {
          const profile = appState.profile || {};
          const value = typeof profile.reputationScore === 'number' ? profile.reputationScore : null;
          if (value === null) {
            container.remove();
            return;
          }
          container.innerHTML = '';
          const valueEl = document.createElement('span');
          valueEl.className = 'profile-stat-value';
          valueEl.textContent = String(value);
          const labelEl = document.createElement('span');
          labelEl.className = 'profile-stat-label';
          labelEl.textContent = 'Reputation';
          container.appendChild(valueEl);
          container.appendChild(labelEl);
        },
        'profile-bio-text': function(container, appState) {
          const profile = appState.profile || {};
          const bio = profile.bio;
          const section = container.closest('[data-component="profile-bio"]');
          if (!bio || !String(bio).trim()) {
            if (section) {
              section.style.display = 'none';
            }
            return;
          }
          if (section) {
            section.style.display = '';
          }
          container.textContent = bio;
        },
        'recent-discussions': function(container, appState) {
          const discussions = Array.isArray(appState.recentDiscussions) ? appState.recentDiscussions : [];
          container.innerHTML = '';
          if (!discussions.length) {
            const empty = document.createElement('li');
            empty.className = 'activity-empty';
            empty.textContent = 'No recent discussions.';
            container.appendChild(empty);
            return;
          }
          const formatter = new Intl.DateTimeFormat(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
          discussions.forEach(function(discussion) {
            const li = document.createElement('li');
            li.className = 'activity-item activity-item--discussion';

            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'activity-item-body';
            button.dataset.action = 'open-discussion';
            button.dataset.discussionId = discussion.id;

            const titleEl = document.createElement('h3');
            titleEl.className = 'activity-item-title';
            titleEl.textContent = discussion.title || '';

            const metaEl = document.createElement('div');
            metaEl.className = 'activity-item-meta';

            if (discussion.createdAt) {
              const createdDate = new Date(discussion.createdAt);
              if (!Number.isNaN(createdDate.getTime())) {
                const timeEl = document.createElement('time');
                timeEl.dateTime = createdDate.toISOString();
                timeEl.textContent = formatter.format(createdDate);
                metaEl.appendChild(timeEl);
              }
            }

            if (typeof discussion.replyCount === 'number') {
              const repliesEl = document.createElement('span');
              repliesEl.className = 'activity-meta-pill';
              repliesEl.textContent = discussion.replyCount + ' replies';
              metaEl.appendChild(repliesEl);
            }

            button.appendChild(titleEl);
            button.appendChild(metaEl);
            li.appendChild(button);
            container.appendChild(li);
          });
        },
        'recent-replies': function(container, appState) {
          const replies = Array.isArray(appState.recentReplies) ? appState.recentReplies : [];
          container.innerHTML = '';
          if (!replies.length) {
            const empty = document.createElement('li');
            empty.className = 'activity-empty';
            empty.textContent = 'No recent replies.';
            container.appendChild(empty);
            return;
          }
          const formatter = new Intl.DateTimeFormat(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
          replies.forEach(function(reply) {
            const li = document.createElement('li');
            li.className = 'activity-item activity-item--reply';

            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'activity-item-body';
            button.dataset.action = 'open-reply-discussion';
            button.dataset.discussionId = reply.discussionId;

            const titleEl = document.createElement('h3');
            titleEl.className = 'activity-item-title activity-item-title--reply';
            titleEl.textContent = reply.authorDisplayName ? reply.authorDisplayName + ' replied' : 'Reply';

            const excerptEl = document.createElement('p');
            excerptEl.className = 'activity-item-excerpt';
            const body = reply.body || '';
            const trimmed = body.trim();
            if (trimmed.length > 160) {
              excerptEl.textContent = trimmed.slice(0, 157) + '…';
            } else {
              excerptEl.textContent = trimmed;
            }

            const metaEl = document.createElement('div');
            metaEl.className = 'activity-item-meta';
            if (reply.createdAt) {
              const createdDate = new Date(reply.createdAt);
              if (!Number.isNaN(createdDate.getTime())) {
                const timeEl = document.createElement('time');
                timeEl.dateTime = createdDate.toISOString();
                timeEl.textContent = formatter.format(createdDate);
                metaEl.appendChild(timeEl);
              }
            }

            button.appendChild(titleEl);
            button.appendChild(excerptEl);
            button.appendChild(metaEl);
            li.appendChild(button);
            container.appendChild(li);
          });
        },
        'profile-error-message': function(container, appState) {
          if (!appState.error) {
            container.textContent = '';
            return;
          }
          if (appState.error.type === 'missingId') {
            container.textContent = 'No member was specified in the link. This profile page requires a memberProfileId parameter.';
          } else if (appState.error.type === 'notFound') {
            container.textContent = 'We could not find a member profile for that link.';
          } else if (appState.error.message) {
            container.textContent = appState.error.message;
          } else {
            container.textContent = 'Unable to load this profile at the moment.';
          }
        }
      };

      function setVisibility() {
        if (state.isLoading) {
          if (loadingEl) loadingEl.hidden = false;
          if (errorEl) errorEl.hidden = true;
          if (profilePageEl) profilePageEl.hidden = true;
        } else if (state.error) {
          if (loadingEl) loadingEl.hidden = true;
          if (errorEl) errorEl.hidden = false;
          if (profilePageEl) profilePageEl.hidden = true;
        } else {
          if (loadingEl) loadingEl.hidden = false;
          if (errorEl) errorEl.hidden = true;
          if (profilePageEl) profilePageEl.hidden = false;
        }
      }

      function renderAll() {
        if (!state.profile && !state.error) {
          return;
        }
        populateElements.forEach(function(el) {
          const key = el.getAttribute('data-populate');
          const renderer = populateRenderers[key];
          if (typeof renderer === 'function') {
            renderer(el, state);
          }
        });
      }

      function loadProfile(memberProfileId) {
        state.memberProfileId = memberProfileId;
        state.isLoading = true;
        state.error = null;
        setVisibility();

        if (!memberProfileId) {
          state.isLoading = false;
          state.error = { type: 'missingId' };
          setVisibility();
          renderAll();
          return;
        }

        try {
          const result = WebsiteSDK.getMemberProfile(memberProfileId);
          state.profile = result && result.profile ? result.profile : null;
          state.recentDiscussions = result && Array.isArray(result.recentDiscussions) ? result.recentDiscussions : [];
          state.recentReplies = result && Array.isArray(result.recentReplies) ? result.recentReplies : [];
          if (!state.profile) {
            state.error = { type: 'notFound' };
          } else {
            state.error = null;
          }
        } catch (err) {
          state.profile = null;
          state.recentDiscussions = [];
          state.recentReplies = [];
          state.error = {
            type: 'loadError',
            message: err && err.message ? err.message : ''
          };
        } finally {
          state.isLoading = false;
        }

        setVisibility();
        renderAll();
      }

      function loadFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const memberProfileId = params.get('memberProfileId');
        loadProfile(memberProfileId);
      }

      window.addEventListener('popstate', function() {
        const params = new URLSearchParams(window.location.search);
        const memberProfileId = params.get('memberProfileId');
        if (memberProfileId !== state.memberProfileId) {
          loadProfile(memberProfileId);
        }
      });

      document.addEventListener('click', function(event) {
        const actionEl = event.target.closest('[data-action]');
        if (!actionEl) return;
        const action = actionEl.getAttribute('data-action');

        if (action === 'start-private-message') {
          if (!state.memberProfileId) return;
          const targetUrl = 'messages.html?recipientProfileId=' + encodeURIComponent(state.memberProfileId);
          window.location.href = targetUrl;
        }

        if (action === 'retry-profile-load') {
          loadFromUrl();
        }

        if (action === 'open-discussion') {
          const discussionId = actionEl.getAttribute('data-discussion-id');
          if (!discussionId) return;
          const targetUrl = 'discussion.html?discussionId=' + encodeURIComponent(discussionId);
          window.location.href = targetUrl;
        }

        if (action === 'open-reply-discussion') {
          const discussionId = actionEl.getAttribute('data-discussion-id');
          if (!discussionId) return;
          const targetUrl = 'discussion.html?discussionId=' + encodeURIComponent(discussionId);
          window.location.href = targetUrl;
        }
      });

      var searchFormState = {
        searchTerm: ''
      };

      const headerSearchForm = document.querySelector('[data-component="header-search-form"]');
      if (headerSearchForm) {
        const searchInput = headerSearchForm.querySelector('input[name="query"]');
        if (searchInput) {
          searchInput.addEventListener('input', function(event) {
            searchFormState.searchTerm = event.target.value;
          });
        }
        headerSearchForm.addEventListener('submit', function(event) {
          event.preventDefault();
          const term = (searchFormState.searchTerm || (searchInput ? searchInput.value : '') || '').trim();
          if (!term) return;
          const targetUrl = 'search_results.html?query=' + encodeURIComponent(term);
          window.location.href = targetUrl;
        });
      }

      loadFromUrl();
    });
  </script>
</body>
</html>
