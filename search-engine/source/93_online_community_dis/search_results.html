<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Community Forum</title>
  <!--
    Design analysis summary
    - Very minimal, content-first forum layout.
    - Full-width black header bar with left-aligned navigation.
    - Off‑white page background (#F6F5F1) with white cards on a light gray border.
    - Clean sans-serif typography with clear hierarchy.
    - Large vertical whitespace between header, content sections, and cards.
    - Subtle, flat footer expected with small, low‑contrast links.
  -->

  <!-- Recommended fonts matching the design's grotesk / utilitarian feel -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Global styles -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific styles -->
  <link rel='stylesheet' href='search_results.css'>
</head>
<body>
  <div class='site'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='header-left'>
          <nav class='primary-nav' aria-label='Primary'>
            <ul class='primary-nav-list'>
              <li class='primary-nav-item'>
                <a href='index.html' class='primary-nav-link' title='Forum homepage with trending, popular, and recent discussions'>Home</a>
              </li>
              <li class='primary-nav-item'>
                <a href='categories.html' class='primary-nav-link' title='Browse all discussion categories such as Web Development and Product Feedback'>Categories</a>
              </li>
              <li class='primary-nav-item'>
                <a href='topics.html' class='primary-nav-link' title='Explore, search, and follow discussion topics and tags'>Topics</a>
              </li>
              <li class='primary-nav-item'>
                <a href='bookmarks.html' class='primary-nav-link' title='View and open your bookmarked or saved discussions'>Bookmarks</a>
              </li>
              <li class='primary-nav-item'>
                <a href='help.html' class='primary-nav-link' title='Read help articles and FAQs about using the forum'>Help</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class='header-right'>
          <!-- Static search icon to match the visual design (non-interactive per requirements) -->
          <span class='nav-icon nav-icon-search' aria-hidden='true'></span>

          <!-- User avatar with dropdown for special access pages -->
          <div class='user-menu'>
            <button class='user-avatar' type='button' aria-haspopup='true' aria-expanded='false'>
              <span class='visually-hidden'>Open user menu</span>
              <span class='user-avatar-initials'>U</span>
            </button>
            <ul class='user-menu-dropdown' aria-label='User menu'>
              <li class='user-menu-item'>
                <a href='messages.html' class='user-menu-link' title='Accessible via a Messages item in the signed-in user&#39;s menu'>Messages</a>
              </li>
              <li class='user-menu-item'>
                <a href='settings.html' class='user-menu-link' title='Accessible via a Settings option in the signed-in user&#39;s menu'>User Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <section class='search-results-page' data-component='search-results-page'>
        <!-- Off-white header band with search context and minimal controls -->
        <div class='search-header-band'>
          <div class='search-header-inner content-shell'>
            <div class='search-header-left'>
              <h1 class='page-title'>Search Results</h1>
              <p class='search-query-line'>
                <span class='search-query-label'>Query:</span>
                <span class='search-query-value' data-populate='current-query'></span>
              </p>
              <p class='search-results-summary' data-component='results-summary'>
                <span class='search-results-count' data-populate='total-count'></span>
                <span class='search-results-filters' data-populate='active-filters-summary'></span>
              </p>
            </div>

            <div class='search-header-right'>
              <button type='button' class='filters-toggle' data-action='toggle-filters'>
                Filters
              </button>
              <div class='sort-control'>
                <label class='sort-label' for='sortSelect'>Sort</label>
                <select id='sortSelect' class='sort-select' data-action='change-sort'>
                  <option value='relevance'>Relevance</option>
                  <option value='newest'>Newest</option>
                  <option value='oldest'>Oldest</option>
                  <option value='most_replied'>Most replied</option>
                  <option value='most_upvoted'>Most upvoted</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Slide-down/overlay-style filters panel, kept visually light -->
        <aside class='filters-panel' data-component='filters-panel' aria-label='Search filters'>
          <div class='filters-panel-inner content-shell'>
            <div class='filters-panel-header'>
              <h2 class='filters-panel-title'>Refine results</h2>
              <button type='button' class='filters-close' data-action='toggle-filters' aria-label='Close filters panel'>
                ×
              </button>
            </div>
            <div class='filters-panel-body' data-populate='filter-options'>
              <!-- Filter options populated via getSearchFilterOptions -->
            </div>
            <div class='filters-panel-footer'>
              <button type='button' class='filters-clear' data-action='clear-filters'>
                Clear filters
              </button>
            </div>
          </div>
        </aside>

        <!-- Main centered column with search result cards -->
        <section class='search-results-shell content-shell'>
          <div class='search-results-feedback' data-component='search-feedback'>
            <p class='search-results-empty-message' data-populate='empty-state'></p>
            <p class='search-results-error-message' data-populate='error-state'></p>
          </div>

          <div class='search-results-list' data-component='search-results-list' data-populate='search-results'>
            <!-- Discussion result cards rendered here -->
          </div>

          <nav class='pagination' aria-label='Search results pages' data-component='pagination' data-populate='pagination'>
            <!-- Pagination buttons rendered here -->
          </nav>
        </section>
      </section>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-nav-link' title='Learn more about this community and platform'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-nav-link' title='Get help and support for using the forum'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-nav-link' title='Read the terms of service for using the site'>Terms</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-nav-link' title='Review the privacy policy and data practices'>Privacy</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic -->
  <script src='business_logic.js'></script>

  <!-- Page UI wiring -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      var query = (urlParams.get('query') || '').trim();
      var dateRangeId = urlParams.get('dateRangeId') || '';
      var minRepliesParam = urlParams.get('minReplies');
      var sortBy = urlParams.get('sortBy') || '';
      var pageParam = urlParams.get('page');
      var parsedPage = pageParam ? parseInt(pageParam, 10) : 1;
      if (!parsedPage || parsedPage < 1) {
        parsedPage = 1;
      }
      var PAGE_SIZE = 20;

      var state = {
        query: query,
        dateRangeId: dateRangeId,
        minReplies: minRepliesParam ? parseInt(minRepliesParam, 10) : null,
        sortBy: sortBy,
        page: parsedPage,
        totalCount: 0,
        pageSize: PAGE_SIZE,
        results: [],
        filterOptions: null,
        lastError: null
      };

      function escapeHtml(value) {
        if (value === null || value === undefined) {
          return '';
        }
        var str = String(value);
        return str.replace(/[&<>'\"]/g, function(ch) {
          if (ch === '&') return '&amp;';
          if (ch === '<') return '&lt;';
          if (ch === '>') return '&gt;';
          if (ch === '\"') return '&quot;';
          if (ch === '\'') return '&#39;';
          return ch;
        });
      }

      function buildFiltersArg(currentState) {
        var hasDateRange = !!currentState.dateRangeId;
        var hasMinReplies = typeof currentState.minReplies === 'number' && !isNaN(currentState.minReplies);
        if (!hasDateRange && !hasMinReplies) {
          return undefined;
        }
        var filters = {};
        if (hasDateRange) {
          filters.dateRange = currentState.dateRangeId;
        }
        if (hasMinReplies) {
          filters.minReplies = currentState.minReplies;
        }
        return filters;
      }

      function renderCurrentQuery(container, currentState) {
        if (!currentState.query) {
          container.textContent = 'No search query yet';
        } else {
          container.textContent = '\u201c' + currentState.query + '\u201d';
        }
      }

      function renderTotalCount(container, currentState) {
        if (!currentState.query || currentState.lastError) {
          container.textContent = '';
          return;
        }
        var count = currentState.totalCount || 0;
        if (count === 0) {
          container.textContent = 'No discussions found';
        } else if (count === 1) {
          container.textContent = '1 discussion found';
        } else {
          container.textContent = count + ' discussions found';
        }
      }

      function renderActiveFiltersSummary(container, currentState) {
        var parts = [];
        var hasDateRange = !!currentState.dateRangeId;
        var hasMinReplies = typeof currentState.minReplies === 'number' && !isNaN(currentState.minReplies);
        if (!hasDateRange && !hasMinReplies) {
          container.textContent = '';
          return;
        }
        if (hasDateRange) {
          var label = currentState.dateRangeId;
          if (currentState.filterOptions && currentState.filterOptions.dateRanges) {
            for (var i = 0; i < currentState.filterOptions.dateRanges.length; i += 1) {
              var rangeOpt = currentState.filterOptions.dateRanges[i];
              if (rangeOpt && rangeOpt.id === currentState.dateRangeId) {
                label = rangeOpt.label || label;
                break;
              }
            }
          }
          parts.push('Date: ' + label);
        }
        if (hasMinReplies) {
          parts.push('Min replies: ' + currentState.minReplies);
        }
        container.textContent = parts.join(' b7 ');
      }

      function renderFilterOptions(container, currentState) {
        if (!currentState.filterOptions) {
          container.innerHTML = '<p class="filters-empty">Filters are not available right now.</p>';
          return;
        }
        var html = '';

        var hasDateRanges = currentState.filterOptions.dateRanges && currentState.filterOptions.dateRanges.length > 0;
        if (hasDateRanges) {
          html += '<section class="filter-group filter-group-date-range">';
          html += '<h3 class="filter-group-title">Posted</h3>';
          html += '<div class="filter-pill-row">';
          for (var i = 0; i < currentState.filterOptions.dateRanges.length; i += 1) {
            var range = currentState.filterOptions.dateRanges[i];
            if (!range) {
              continue;
            }
            var isActive = currentState.dateRangeId && currentState.dateRangeId === range.id;
            html += '<button type="button" class="filter-pill';
            if (isActive) {
              html += ' filter-pill--active';
            }
            html += '" data-action="set-date-range" data-date-range-id="' + escapeHtml(range.id) + '">';
            html += escapeHtml(range.label || range.id);
            html += '</button>';
          }
          html += '</div>';
          html += '</section>';
        }

        var hasReplyPresets = currentState.filterOptions.replyCountPresets && currentState.filterOptions.replyCountPresets.length > 0;
        if (hasReplyPresets) {
          html += '<section class="filter-group filter-group-min-replies">';
          html += '<h3 class="filter-group-title">Minimum replies</h3>';
          html += '<div class="filter-pill-row">';
          for (var j = 0; j < currentState.filterOptions.replyCountPresets.length; j += 1) {
            var preset = currentState.filterOptions.replyCountPresets[j];
            if (!preset) {
              continue;
            }
            var presetValue = typeof preset.minReplies === 'number' ? preset.minReplies : null;
            var isPresetActive = presetValue !== null && currentState.minReplies !== null && presetValue === currentState.minReplies;
            html += '<button type="button" class="filter-pill';
            if (isPresetActive) {
              html += ' filter-pill--active';
            }
            html += '" data-action="set-min-replies" data-min-replies="' + escapeHtml(preset.minReplies) + '">';
            html += escapeHtml(preset.label || String(preset.minReplies));
            html += '</button>';
          }
          html += '</div>';
          html += '</section>';
        }

        if (!hasDateRanges && !hasReplyPresets) {
          html = '<p class="filters-empty">No filter options configured.</p>';
        }

        container.innerHTML = html;
      }

      function renderSearchResults(container, currentState) {
        if (!currentState.query || currentState.lastError) {
          container.innerHTML = '';
          return;
        }
        if (!currentState.results || currentState.results.length === 0) {
          container.innerHTML = '';
          return;
        }
        var cardsHtml = '';
        for (var i = 0; i < currentState.results.length; i += 1) {
          var item = currentState.results[i];
          if (!item || !item.discussion) {
            continue;
          }
          var discussion = item.discussion;
          var authorName = item.originalAuthorDisplayName || 'Unknown';
          var authorInitial = authorName.trim() ? authorName.trim().charAt(0).toUpperCase() : '?';
          var categoryName = item.categoryName || '';
          var replyCount = typeof discussion.replyCount === 'number' ? discussion.replyCount : 0;
          var viewCount = typeof discussion.viewCount === 'number' ? discussion.viewCount : 0;
          var score = typeof discussion.score === 'number' ? discussion.score : 0;
          var snippetText = item.snippet || '';
          var titleText = discussion.title || '';

          cardsHtml += '<article class="post-card search-result-card" data-discussion-id="' + escapeHtml(discussion.id) + '">';
          cardsHtml += '<header class="post-card-header">';
          cardsHtml += '<div class="post-card-header-left">';
          cardsHtml += '<div class="avatar avatar--small"><span class="avatar-initials">' + escapeHtml(authorInitial) + '</span></div>';
          cardsHtml += '<div class="post-card-meta">';
          cardsHtml += '<div class="post-card-meta-line">';
          cardsHtml += '<span class="post-card-author">' + escapeHtml(authorName) + '</span>';
          if (categoryName) {
            cardsHtml += '<span class="post-card-meta-separator">&#8226;</span>';
            cardsHtml += '<span class="post-card-category">' + escapeHtml(categoryName) + '</span>';
          }
          cardsHtml += '</div>';
          cardsHtml += '<div class="post-card-meta-line">';
          cardsHtml += '<span class="post-card-meta-stat">' + replyCount + ' replies</span>';
          cardsHtml += '<span class="post-card-meta-separator">&#8226;</span>';
          cardsHtml += '<span class="post-card-meta-stat">' + viewCount + ' views</span>';
          cardsHtml += '<span class="post-card-meta-separator">&#8226;</span>';
          cardsHtml += '<span class="post-card-meta-stat">Score ' + score + '</span>';
          cardsHtml += '</div>';
          cardsHtml += '</div>'; // .post-card-meta
          cardsHtml += '</div>'; // .post-card-header-left
          cardsHtml += '<div class="post-card-header-right">';
          cardsHtml += '<button type="button" class="icon-button post-card-menu" aria-label="Thread options">';
          cardsHtml += '<span class="icon-ellipsis-vertical" aria-hidden="true"></span>';
          cardsHtml += '</button>';
          cardsHtml += '</div>';
          cardsHtml += '</header>';

          cardsHtml += '<div class="post-card-body">';
          cardsHtml += '<h2 class="post-card-title">';
          cardsHtml += '<a href="javascript:void(0)" data-action="open-discussion">' + escapeHtml(titleText) + '</a>';
          cardsHtml += '</h2>';
          if (snippetText) {
            cardsHtml += '<p class="post-card-snippet">' + escapeHtml(snippetText) + '</p>';
          }

          if (item.tagNames && item.tagNames.length) {
            cardsHtml += '<div class="post-card-tags">';
            for (var t = 0; t < item.tagNames.length; t += 1) {
              var tagName = item.tagNames[t];
              if (!tagName) {
                continue;
              }
              cardsHtml += '<span class="tag-pill">' + escapeHtml(tagName) + '</span>';
            }
            cardsHtml += '</div>';
          }

          cardsHtml += '</div>'; // .post-card-body
          cardsHtml += '</article>';
        }
        container.innerHTML = cardsHtml;
      }

      function renderPagination(container, currentState) {
        if (!currentState.query || currentState.lastError) {
          container.innerHTML = '';
          return;
        }
        if (!currentState.results || currentState.results.length === 0) {
          container.innerHTML = '';
          return;
        }
        var total = currentState.totalCount || 0;
        var size = currentState.pageSize || PAGE_SIZE;
        if (!size || size < 1) {
          size = PAGE_SIZE;
        }
        var totalPages = Math.ceil(total / size);
        if (!totalPages || totalPages <= 1) {
          container.innerHTML = '';
          return;
        }
        var currentPage = currentState.page || 1;
        if (currentPage < 1) {
          currentPage = 1;
        }
        if (currentPage > totalPages) {
          currentPage = totalPages;
        }

        var html = '';
        var prevDisabled = currentPage <= 1;
        var prevPage = prevDisabled ? 1 : currentPage - 1;
        html += '<button type="button" class="pagination-button pagination-prev';
        if (prevDisabled) {
          html += ' pagination-button--disabled';
        }
        html += '" data-action="change-page" data-page="' + prevPage + '"';
        if (prevDisabled) {
          html += ' disabled';
        }
        html += '>';
        html += 'Previous';
        html += '</button>';

        var maxButtons = 5;
        var startPage = currentPage - 2;
        if (startPage < 1) {
          startPage = 1;
        }
        var endPage = startPage + maxButtons - 1;
        if (endPage > totalPages) {
          endPage = totalPages;
          startPage = endPage - maxButtons + 1;
          if (startPage < 1) {
            startPage = 1;
          }
        }

        for (var p = startPage; p <= endPage; p += 1) {
          html += '<button type="button" class="pagination-button pagination-page';
          if (p === currentPage) {
            html += ' pagination-page--active';
          }
          html += '" data-action="change-page" data-page="' + p + '">';
          html += p;
          html += '</button>';
        }

        var nextDisabled = currentPage >= totalPages;
        var nextPage = nextDisabled ? totalPages : currentPage + 1;
        html += '<button type="button" class="pagination-button pagination-next';
        if (nextDisabled) {
          html += ' pagination-button--disabled';
        }
        html += '" data-action="change-page" data-page="' + nextPage + '"';
        if (nextDisabled) {
          html += ' disabled';
        }
        html += '>';
        html += 'Next';
        html += '</button>';

        container.innerHTML = html;
      }

      function renderEmptyState(container, currentState) {
        if (!currentState.query) {
          container.textContent = 'Enter a search term in the header search bar to search discussions.';
          return;
        }
        if (currentState.lastError) {
          container.textContent = '';
          return;
        }
        if (!currentState.results || currentState.results.length === 0) {
          container.textContent = 'No discussions matched your search. Try adjusting your filters or using different keywords.';
        } else {
          container.textContent = '';
        }
      }

      function renderErrorState(container, currentState) {
        if (currentState.lastError) {
          container.textContent = currentState.lastError;
        } else {
          container.textContent = '';
        }
      }

      function updateSortControl(currentState) {
        var sortSelect = document.getElementById('sortSelect');
        if (!sortSelect) {
          return;
        }
        var value = currentState.sortBy || 'relevance';
        sortSelect.value = value;
      }

      function updateAllPopulateElements(currentState) {
        var elements = document.querySelectorAll('[data-populate]');
        for (var i = 0; i < elements.length; i += 1) {
          var el = elements[i];
          var type = el.getAttribute('data-populate');
          if (type === 'current-query') {
            renderCurrentQuery(el, currentState);
          } else if (type === 'total-count') {
            renderTotalCount(el, currentState);
          } else if (type === 'active-filters-summary') {
            renderActiveFiltersSummary(el, currentState);
          } else if (type === 'filter-options') {
            renderFilterOptions(el, currentState);
          } else if (type === 'search-results') {
            renderSearchResults(el, currentState);
          } else if (type === 'pagination') {
            renderPagination(el, currentState);
          } else if (type === 'empty-state') {
            renderEmptyState(el, currentState);
          } else if (type === 'error-state') {
            renderErrorState(el, currentState);
          }
        }
        updateSortControl(currentState);
      }

      function toggleFiltersPanel() {
        var panel = document.querySelector('[data-component="filters-panel"]');
        if (!panel) {
          return;
        }
        if (panel.classList.contains('filters-panel--open')) {
          panel.classList.remove('filters-panel--open');
        } else {
          panel.classList.add('filters-panel--open');
        }
      }

      function handleChangeSort(event) {
        var select = event.target;
        var value = select.value || '';
        var params = new URLSearchParams(window.location.search);
        if (value) {
          params.set('sortBy', value);
        } else {
          params.delete('sortBy');
        }
        params.set('page', '1');
        var targetUrl = 'search_results.html?' + params.toString();
        window.location.href = targetUrl;
      }

      function clearFiltersAndNavigate() {
        var params = new URLSearchParams(window.location.search);
        params.delete('dateRangeId');
        params.delete('minReplies');
        params.set('page', '1');
        var targetUrl = 'search_results.html?' + params.toString();
        window.location.href = targetUrl;
      }

      function handleDelegatedClick(event) {
        var target = event.target.closest('[data-action]');
        if (!target) {
          return;
        }
        var action = target.getAttribute('data-action');
        if (action === 'set-date-range') {
          var dateId = target.getAttribute('data-date-range-id') || '';
          var params = new URLSearchParams(window.location.search);
          if (dateId) {
            params.set('dateRangeId', dateId);
          } else {
            params.delete('dateRangeId');
          }
          params.set('page', '1');
          var url = 'search_results.html?' + params.toString();
          window.location.href = url;
          return;
        }
        if (action === 'set-min-replies') {
          var minReplies = target.getAttribute('data-min-replies');
          var params2 = new URLSearchParams(window.location.search);
          if (minReplies && minReplies !== '0') {
            params2.set('minReplies', minReplies);
          } else {
            params2.delete('minReplies');
          }
          params2.set('page', '1');
          var url2 = 'search_results.html?' + params2.toString();
          window.location.href = url2;
          return;
        }
        if (action === 'change-page') {
          var pageValue = target.getAttribute('data-page');
          if (!pageValue) {
            return;
          }
          var pageNum = parseInt(pageValue, 10);
          if (!pageNum || pageNum < 1) {
            return;
          }
          var params3 = new URLSearchParams(window.location.search);
          params3.set('page', String(pageNum));
          var url3 = 'search_results.html?' + params3.toString();
          window.location.href = url3;
          return;
        }
        if (action === 'open-discussion') {
          var article = target.closest('article[data-discussion-id]');
          if (!article) {
            return;
          }
          var discussionId = article.getAttribute('data-discussion-id');
          if (!discussionId) {
            return;
          }
          var discussionUrl = 'discussion.html?discussionId=' + encodeURIComponent(discussionId);
          window.location.href = discussionUrl;
        }
      }

      var actionElements = document.querySelectorAll('[data-action]');
      for (var i = 0; i < actionElements.length; i += 1) {
        var el = actionElements[i];
        var action = el.getAttribute('data-action');
        if (action === 'toggle-filters') {
          el.addEventListener('click', toggleFiltersPanel);
        } else if (action === 'change-sort') {
          el.addEventListener('change', handleChangeSort);
        } else if (action === 'clear-filters') {
          el.addEventListener('click', function() {
            clearFiltersAndNavigate();
          });
        }
      }

      document.addEventListener('click', handleDelegatedClick);

      try {
        state.filterOptions = WebsiteSDK.getSearchFilterOptions();
      } catch (e) {
        state.lastError = 'Unable to load filter options. Please try again later.';
      }

      if (state.query) {
        try {
          var filtersArg = buildFiltersArg(state);
          var sortArg = state.sortBy ? state.sortBy : undefined;
          var response = WebsiteSDK.searchDiscussions(state.query, filtersArg, sortArg, state.page, PAGE_SIZE);
          if (response) {
            if (response.results && response.results.length) {
              state.results = response.results;
            } else {
              state.results = [];
            }
            if (typeof response.totalCount === 'number') {
              state.totalCount = response.totalCount;
            }
            if (typeof response.pageSize === 'number') {
              state.pageSize = response.pageSize;
            }
            if (typeof response.page === 'number') {
              state.page = response.page;
            }
          }
        } catch (err) {
          state.lastError = 'Something went wrong while searching. Please refresh the page.';
        }
      }

      updateAllPopulateElements(state);
    });
  </script>
</body>
