<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Community Forum</title>
  <!--
    Design analysis summary
    - Very minimal, content-first forum layout.
    - Full-width black header bar with left-aligned navigation.
    - Off‑white page background (#F6F5F1) with white cards on a light gray border.
    - Clean sans-serif typography with clear hierarchy.
    - Large vertical whitespace between header, content sections, and cards.
    - Subtle, flat footer expected with small, low‑contrast links.
  -->

  <!-- Recommended fonts matching the design's grotesk / utilitarian feel -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Global stylesheet -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific stylesheet for Terms of Service -->
  <link rel='stylesheet' href='terms.css'>
</head>
<body>
  <div class='site'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='header-left'>
          <nav class='primary-nav' aria-label='Primary'>
            <ul class='primary-nav-list'>
              <li class='primary-nav-item'>
                <a href='index.html' class='primary-nav-link' title='Forum homepage with trending, popular, and recent discussions'>Home</a>
              </li>
              <li class='primary-nav-item'>
                <a href='categories.html' class='primary-nav-link' title='Browse all discussion categories such as Web Development and Product Feedback'>Categories</a>
              </li>
              <li class='primary-nav-item'>
                <a href='topics.html' class='primary-nav-link' title='Explore, search, and follow discussion topics and tags'>Topics</a>
              </li>
              <li class='primary-nav-item'>
                <a href='bookmarks.html' class='primary-nav-link' title='View and open your bookmarked or saved discussions'>Bookmarks</a>
              </li>
              <li class='primary-nav-item'>
                <a href='help.html' class='primary-nav-link' title='Read help articles and FAQs about using the forum'>Help</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class='header-right'>
          <!-- Static search icon to match the visual design (non-interactive per requirements) -->
          <span class='nav-icon nav-icon-search' aria-hidden='true'></span>

          <!-- User avatar with dropdown for special access pages -->
          <div class='user-menu'>
            <button class='user-avatar' type='button' aria-haspopup='true' aria-expanded='false'>
              <span class='visually-hidden'>Open user menu</span>
              <span class='user-avatar-initials'>U</span>
            </button>
            <ul class='user-menu-dropdown' aria-label='User menu'>
              <li class='user-menu-item'>
                <a href='messages.html' class='user-menu-link' title='Accessible via a Messages item in the signed-in user&#39;s menu'>Messages</a>
              </li>
              <li class='user-menu-item'>
                <a href='settings.html' class='user-menu-link' title='Accessible via a Settings option in the signed-in user&#39;s menu'>User Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='content-shell content-shell--centered'>
        <section class='static-page static-page--terms' aria-labelledby='terms-page-title'>
          <article class='static-card static-card--terms' data-component='terms-static-content-loader'>
            <header class='static-card-header terms-card-header'>
              <div class='terms-header-left'>
                <h1
                  id='terms-page-title'
                  class='static-page-title'
                  data-component='terms-title-header'
                  data-populate='terms-title'
                >
                  Terms of Service
                </h1>
              </div>
              <aside class='terms-header-right'>
                <nav
                  class='terms-toc'
                  aria-label='Terms of Service sections'
                  data-component='terms-section-toc'
                  data-populate='terms-toc'
                >
                  <!-- TOC content will be injected here once the terms body has been rendered -->
                </nav>
              </aside>
            </header>

            <section
              class='static-card-body terms-body-wrapper'
              aria-label='Terms of Service content'
            >
              <div class='terms-status'>
                <div
                  class='terms-loading-state'
                  data-component='terms-loading'
                  aria-live='polite'
                >
                  Loading Terms of Service...
                </div>
                <div
                  class='terms-error-state'
                  data-component='terms-error'
                  hidden
                  aria-live='assertive'
                >
                  <p class='terms-error-message'>
                    We were unable to load the Terms of Service. Please check your connection and try again.
                  </p>
                  <button
                    type='button'
                    class='button button--text terms-retry-button'
                    data-action='terms-retry'
                  >
                    Retry loading terms
                  </button>
                </div>
              </div>

              <div
                class='terms-body-scroll'
                data-component='terms-body-renderer'
                data-populate='terms-body'
                tabindex='-1'
              >
                <!-- Terms body will be rendered here -->
              </div>
            </section>

            <footer class='static-card-footer terms-card-footer'>
              <a
                href='javascript:void(0)'
                class='terms-privacy-link'
                data-component='terms-privacy-link'
                data-action='go-privacy'
              >
                View Privacy Policy
              </a>
            </footer>
          </article>
        </section>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-nav-link' title='Learn more about this community and platform'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-nav-link' title='Get help and support for using the forum'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-nav-link' title='Read the terms of service for using the site'>Terms</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-nav-link' title='Review the privacy policy and data practices'>Privacy</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </div>

  <!-- SDK for page-specific interfaces -->
  <script src='business_logic.js'></script>

  <!-- Page-specific UI logic for Terms of Service -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var url = new URL(window.location.href);
      var searchParams = url.searchParams;
      var initialSectionId = searchParams.get('section');

      var state = {
        pageSlug: derivePageSlugFromPath(window.location.pathname),
        content: null,
        activeSectionId: initialSectionId || null,
        headings: []
      };

      var loadingEl = document.querySelector('[data-component="terms-loading"]');
      var errorEl = document.querySelector('[data-component="terms-error"]');
      var titleEl = document.querySelector('[data-component="terms-title-header"]');
      var bodyEl = document.querySelector('[data-component="terms-body-renderer"]');
      var tocEl = document.querySelector('[data-component="terms-section-toc"]');

      /**
       * Derive the static pageSlug enum from the current pathname.
       * This keeps getStaticPageContent coupled to the route rather than a hardcoded slug.
       */
      function derivePageSlugFromPath(pathname) {
        var parts = pathname.split('/');
        var file = parts[parts.length - 1] || 'index.html';
        if (file === 'about.html') {
          return 'about';
        }
        if (file === 'help.html') {
          return 'help_support';
        }
        if (file === 'privacy.html') {
          return 'privacy_policy';
        }
        // Default for this route and any unknown path is terms_of_service
        return 'terms_of_service';
      }

      function showLoading() {
        if (loadingEl) {
          loadingEl.hidden = false;
        }
        if (errorEl) {
          errorEl.hidden = true;
        }
        if (bodyEl) {
          bodyEl.hidden = true;
        }
        if (tocEl) {
          tocEl.setAttribute('aria-hidden', 'true');
        }
      }

      function hideLoading() {
        if (loadingEl) {
          loadingEl.hidden = true;
        }
        if (bodyEl && state.content && state.content.body) {
          bodyEl.hidden = false;
        }
      }

      function showError() {
        if (errorEl) {
          errorEl.hidden = false;
        }
      }

      function hideError() {
        if (errorEl) {
          errorEl.hidden = true;
        }
      }

      function renderTermsTitle(container, content) {
        if (!container) {
          return;
        }
        var fallbackTitle = 'Terms of Service';
        var title = content && typeof content.title === 'string' && content.title.trim() ? content.title : fallbackTitle;
        container.textContent = title;
        if (title && typeof document !== 'undefined') {
          document.title = title + ' b7 Community Forum';
        }
      }

      function renderTermsBody(container, content) {
        if (!container) {
          return;
        }
        var body = content && typeof content.body === 'string' ? content.body : '';
        if (body) {
          container.innerHTML = body;
        } else {
          container.innerHTML = '<p>No Terms of Service content is currently available.</p>';
        }
      }

      function slugifyText(text) {
        if (!text) {
          return '';
        }
        var slug = text
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '')
          .substring(0, 64);
        if (!slug) {
          slug = 'section';
        }
        return slug;
      }

      function prepareSectionHeadings(container) {
        if (!container) {
          return [];
        }
        var headingNodeList = container.querySelectorAll('h1, h2, h3, h4, h5, h6');
        var headings = Array.prototype.slice.call(headingNodeList);
        var usedIds = {};
        for (var i = 0; i < headings.length; i += 1) {
          var heading = headings[i];
          var existingId = heading.id;
          if (!existingId) {
            var baseId = slugifyText(heading.textContent || 'section-' + i);
            var idCandidate = baseId;
            var counter = 1;
            while (usedIds[idCandidate]) {
              idCandidate = baseId + '-' + counter;
              counter += 1;
            }
            heading.id = idCandidate;
            usedIds[idCandidate] = true;
          } else {
            usedIds[existingId] = true;
          }
        }
        return headings;
      }

      function renderTOC(container, headings, activeId) {
        if (!container) {
          return;
        }
        container.innerHTML = '';
        if (!headings || !headings.length) {
          container.setAttribute('aria-hidden', 'true');
          return;
        }
        container.removeAttribute('aria-hidden');

        var label = document.createElement('div');
        label.className = 'terms-toc-label';
        label.textContent = 'Sections';

        var list = document.createElement('ul');
        list.className = 'terms-toc-list';

        for (var i = 0; i < headings.length; i += 1) {
          var heading = headings[i];
          if (!heading.id) {
            continue;
          }
          var item = document.createElement('li');
          item.className = 'terms-toc-item';

          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'terms-toc-link';
          button.textContent = heading.textContent || '';
          button.setAttribute('data-action', 'jump-section');
          button.setAttribute('data-section-id', heading.id);
          if (activeId && heading.id === activeId) {
            button.classList.add('is-active');
          }

          item.appendChild(button);
          list.appendChild(item);
        }

        container.appendChild(label);
        container.appendChild(list);
      }

      function updateTOCHighlight(activeId) {
        var tocButtons = document.querySelectorAll('[data-action="jump-section"]');
        for (var i = 0; i < tocButtons.length; i += 1) {
          var btn = tocButtons[i];
          var btnSectionId = btn.getAttribute('data-section-id');
          if (btnSectionId === activeId) {
            btn.classList.add('is-active');
          } else {
            btn.classList.remove('is-active');
          }
        }
      }

      function scrollToSection(sectionId) {
        if (!sectionId) {
          return;
        }
        var target = document.getElementById(sectionId);
        if (!target) {
          return;
        }
        try {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (e) {
          target.scrollIntoView(true);
        }
      }

      function setActiveSection(sectionId, options) {
        var opts = options || {};
        if (sectionId) {
          state.activeSectionId = sectionId;
        } else {
          state.activeSectionId = null;
        }

        if (opts.updateUrl) {
          var currentUrl = new URL(window.location.href);
          if (sectionId) {
            currentUrl.searchParams.set('section', sectionId);
          } else {
            currentUrl.searchParams.delete('section');
          }
          window.history.pushState({ sectionId: sectionId }, '', currentUrl.toString());
        }

        if (sectionId) {
          scrollToSection(sectionId);
        }
        updateTOCHighlight(sectionId || '');
      }

      function syncSectionFromUrl() {
        var updatedUrl = new URL(window.location.href);
        var sectionId = updatedUrl.searchParams.get('section');
        if (sectionId) {
          setActiveSection(sectionId, { updateUrl: false });
        } else {
          state.activeSectionId = null;
          updateTOCHighlight('');
        }
      }

      function handleScrollSpy() {
        if (!bodyEl || !state.headings || !state.headings.length) {
          return;
        }
        var headings = state.headings;
        var bestId = null;
        var bestOffset = Infinity;
        var viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
        var threshold = viewportHeight * 0.4;

        for (var i = 0; i < headings.length; i += 1) {
          var heading = headings[i];
          if (!heading.id) {
            continue;
          }
          var rect = heading.getBoundingClientRect();
          var top = rect.top;
          if (top >= 0 && top <= threshold && top < bestOffset) {
            bestOffset = top;
            bestId = heading.id;
          }
        }

        if (bestId && bestId !== state.activeSectionId) {
          state.activeSectionId = bestId;
          updateTOCHighlight(bestId);
        }
      }

      function attachBodyInPageAnchorHandler() {
        if (!bodyEl) {
          return;
        }
        bodyEl.addEventListener('click', function (event) {
          var target = event.target;
          if (!target) {
            return;
          }
          var anchor = target.closest('a[href^="#"]');
          if (!anchor) {
            return;
          }
          var href = anchor.getAttribute('href') || '';
          var sectionId = href.replace(/^#/, '');
          if (!sectionId) {
            return;
          }
          event.preventDefault();
          setActiveSection(sectionId, { updateUrl: true });
        });
      }

      function loadStaticContent() {
        showLoading();
        hideError();
        try {
          var content = WebsiteSDK.getStaticPageContent(state.pageSlug);
          if (!content || typeof content !== 'object') {
            throw new Error('Invalid static content response');
          }
          state.content = content;

          var populateElements = document.querySelectorAll('[data-populate]');
          for (var i = 0; i < populateElements.length; i += 1) {
            var el = populateElements[i];
            var populateType = el.getAttribute('data-populate');
            if (populateType === 'terms-title') {
              renderTermsTitle(el, state.content);
            } else if (populateType === 'terms-body') {
              renderTermsBody(el, state.content);
            }
          }

          state.headings = prepareSectionHeadings(bodyEl);
          renderTOC(tocEl, state.headings, state.activeSectionId);
          attachBodyInPageAnchorHandler();

          hideLoading();

          if (state.activeSectionId) {
            setTimeout(function () {
              scrollToSection(state.activeSectionId);
              updateTOCHighlight(state.activeSectionId);
            }, 0);
          }
        } catch (error) {
          showError();
          hideLoading();
          // eslint-disable-next-line no-console
          console.error('Failed to load Terms of Service content:', error);
        }
      }

      document.addEventListener('click', function (event) {
        var target = event.target;
        if (!target) {
          return;
        }
        var actionEl = target.closest('[data-action]');
        if (!actionEl) {
          return;
        }
        var action = actionEl.getAttribute('data-action');
        if (!action) {
          return;
        }

        if (action === 'terms-retry') {
          event.preventDefault();
          loadStaticContent();
          return;
        }

        if (action === 'jump-section') {
          event.preventDefault();
          var sectionId = actionEl.getAttribute('data-section-id');
          if (sectionId) {
            setActiveSection(sectionId, { updateUrl: true });
          }
          return;
        }

        if (action === 'go-privacy') {
          event.preventDefault();
          var privacyUrl = new URL('privacy.html', window.location.href);
          privacyUrl.searchParams.set('source', 'terms');
          window.location.href = privacyUrl.toString();
        }
      });

      window.addEventListener('popstate', function () {
        syncSectionFromUrl();
      });

      window.addEventListener('scroll', function () {
        handleScrollSpy();
      }, { passive: true });

      loadStaticContent();
    });
  </script>
</body>
</html>
