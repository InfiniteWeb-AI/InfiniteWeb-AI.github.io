<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Topics &amp; Tags - Community Forum</title>
  <!--
    Design analysis summary
    - Very minimal, content-first forum layout.
    - Full-width black header bar with left-aligned navigation.
    - Off‑white page background (#F6F5F1) with white cards on a light gray border.
    - Clean sans-serif typography with clear hierarchy.
    - Large vertical whitespace between header, content sections, and cards.
    - Subtle, flat footer expected with small, low‑contrast links.
  -->

  <!-- Recommended fonts matching the design's grotesk / utilitarian feel -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap' rel='stylesheet'>

  <!-- Global stylesheet -->
  <link rel='stylesheet' href='styles.css'>
  <!-- Page-specific stylesheet -->
  <link rel='stylesheet' href='topics.css'>
</head>
<body>
  <div class='site'>
    <header class='site-header'>
      <div class='header-inner'>
        <div class='header-left'>
          <nav class='primary-nav' aria-label='Primary'>
            <ul class='primary-nav-list'>
              <li class='primary-nav-item'>
                <a href='index.html' class='primary-nav-link' title='Forum homepage with trending, popular, and recent discussions'>Home</a>
              </li>
              <li class='primary-nav-item'>
                <a href='categories.html' class='primary-nav-link' title='Browse all discussion categories such as Web Development and Product Feedback'>Categories</a>
              </li>
              <li class='primary-nav-item'>
                <a href='topics.html' class='primary-nav-link' title='Explore, search, and follow discussion topics and tags'>Topics</a>
              </li>
              <li class='primary-nav-item'>
                <a href='bookmarks.html' class='primary-nav-link' title='View and open your bookmarked or saved discussions'>Bookmarks</a>
              </li>
              <li class='primary-nav-item'>
                <a href='help.html' class='primary-nav-link' title='Read help articles and FAQs about using the forum'>Help</a>
              </li>
            </ul>
          </nav>
        </div>

        <div class='header-right'>
          <!-- Static search icon to match the visual design (non-interactive per requirements) -->
          <span class='nav-icon nav-icon-search' aria-hidden='true'></span>

          <!-- User avatar with dropdown for special access pages -->
          <div class='user-menu'>
            <button class='user-avatar' type='button' aria-haspopup='true' aria-expanded='false'>
              <span class='visually-hidden'>Open user menu</span>
              <span class='user-avatar-initials'>U</span>
            </button>
            <ul class='user-menu-dropdown' aria-label='User menu'>
              <li class='user-menu-item'>
                <a href='messages.html' class='user-menu-link' title='Accessible via a Messages item in the signed-in user&#39;s menu'>Messages</a>
              </li>
              <li class='user-menu-item'>
                <a href='settings.html' class='user-menu-link' title='Accessible via a Settings option in the signed-in user&#39;s menu'>User Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main id='content' class='site-main' role='main'>
      <div class='content-shell topics-page'>
        <!-- Hero band with centered tab switcher and right-aligned global search -->
        <section class='topics-hero-band'>
          <div class='topics-hero-inner'>
            <div class='topics-hero-center'>
              <div class='topics-tabs' data-component='topics-tab-switcher' role='tablist' aria-label='Topic views'>
                <button
                  type='button'
                  class='topics-tab is-active'
                  role='tab'
                  aria-selected='true'
                  data-action='switch-tab'
                  data-tab-value='explore'>
                  Explore
                </button>
                <button
                  type='button'
                  class='topics-tab'
                  role='tab'
                  aria-selected='false'
                  data-action='switch-tab'
                  data-tab-value='following'>
                  Following
                </button>
              </div>
            </div>
            <div class='topics-hero-right'>
              <form
                class='hero-search-form'
                role='search'
                data-component='header-search-form'
                data-action='header-search-submit'>
                <label class='visually-hidden' for='header-search-input'>Search all discussions</label>
                <input
                  type='search'
                  id='header-search-input'
                  name='headerQuery'
                  class='hero-search-input'
                  autocomplete='off'
                  placeholder='Search all discussions'>
              </form>
            </div>
          </div>
        </section>

        <!-- Main centered card with topic search and lists -->
        <section class='topics-main-section'>
          <div class='topics-main-inner'>
            <article class='card topics-card'>
              <header class='topics-card-header'>
                <h1 class='topics-heading'>Topics &amp; Tags</h1>
              </header>

              <!-- Topic search form & follower filters -->
              <form
                class='topics-search-form'
                data-component='topic-search-form'
                data-action='topic-search-submit'>
                <div class='topics-search-row'>
                  <label class='visually-hidden' for='topic-query-input'>Search topics and tags</label>
                  <input
                    type='search'
                    id='topic-query-input'
                    name='query'
                    class='topics-search-input'
                    autocomplete='off'
                    placeholder='Search topics and tags'>
                  <button type='submit' class='topics-search-submit'>Search</button>
                </div>
                <div class='topics-filter-row'>
                  <div class='topics-filter-field'>
                    <label for='topic-min-followers-input' class='topics-filter-label'>Min followers</label>
                    <input
                      type='number'
                      id='topic-min-followers-input'
                      name='minFollowers'
                      class='topics-filter-input'
                      min='0'
                      step='10'
                      placeholder='Any'
                      data-action='min-followers-change'>
                  </div>
                  <button
                    type='button'
                    class='topics-popular-toggle'
                    data-action='popular-filter-toggle'
                    data-popular-threshold='500'
                    aria-pressed='false'>
                    Popular (500+)
                  </button>
                </div>
              </form>

              <div class='topics-card-body'>
                <!-- Explore results list -->
                <div
                  class='topics-list-container topics-list-explore'
                  data-component='topic-search-results-list'
                  data-populate='explore-topics'
                  aria-live='polite'>
                  <!-- Populated via JS -->
                </div>

                <!-- Followed topics list -->
                <div
                  class='topics-list-container topics-list-following is-hidden'
                  data-component='followed-topics-list'
                  data-populate='followed-topics'
                  aria-live='polite'>
                  <!-- Populated via JS -->
                </div>

                <!-- Empty states for both tabs (swapped in when needed) -->
                <div
                  class='topics-empty-state'
                  data-component='topics-empty-state'
                  aria-live='polite'
                  hidden>
                  <!-- Populated via JS -->
                </div>
              </div>
            </article>
          </div>
        </section>
      </div>
    </main>

    <footer class='site-footer'>
      <div class='footer-inner'>
        <nav class='footer-nav' aria-label='Footer'>
          <ul class='footer-nav-list'>
            <li class='footer-nav-item'>
              <a href='about.html' class='footer-nav-link' title='Learn more about this community and platform'>About</a>
            </li>
            <li class='footer-nav-item'>
              <a href='help.html' class='footer-nav-link' title='Get help and support for using the forum'>Help</a>
            </li>
            <li class='footer-nav-item'>
              <a href='terms.html' class='footer-nav-link' title='Read the terms of service for using the site'>Terms</a>
            </li>
            <li class='footer-nav-item'>
              <a href='privacy.html' class='footer-nav-link' title='Review the privacy policy and data practices'>Privacy</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </div>

  <!-- SDK / business logic (provides WebsiteSDK.* interfaces) -->
  <script src='business_logic.js'></script>

  <!-- Page-specific UI logic for Topics &amp; Tags -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      'use strict';

      // In-memory state coordinated by URL parameters
      var state = {
        tab: 'explore',            // 'explore' | 'following'
        query: '',                 // string
        minFollowers: null,        // number | null
        exploreResults: [],        // Tag[]
        followedTopics: [],        // Tag[]
        hasLoadedFollowing: false,
        isSearchLoading: false,
        isFollowingLoading: false
      };

      // Cached DOM references
      var elements = {
        tabSwitcher: null,
        tabButtons: [],
        headerSearchForm: null,
        topicSearchForm: null,
        searchInput: null,
        minFollowersInput: null,
        popularToggle: null,
        exploreList: null,
        followedList: null,
        emptyState: null
      };

      function cacheDomReferences() {
        elements.tabSwitcher = document.querySelector('[data-component="topics-tab-switcher"]');
        elements.headerSearchForm = document.querySelector('[data-component="header-search-form"]');
        elements.topicSearchForm = document.querySelector('[data-component="topic-search-form"]');
        elements.exploreList = document.querySelector('[data-component="topic-search-results-list"]');
        elements.followedList = document.querySelector('[data-component="followed-topics-list"]');
        elements.emptyState = document.querySelector('[data-component="topics-empty-state"]');

        if (elements.tabSwitcher) {
          elements.tabButtons = elements.tabSwitcher.querySelectorAll('[data-action="switch-tab"]');
        }

        if (elements.topicSearchForm) {
          elements.searchInput = elements.topicSearchForm.querySelector('input[name="query"]');
          elements.minFollowersInput = elements.topicSearchForm.querySelector('input[name="minFollowers"]');
          elements.popularToggle = elements.topicSearchForm.querySelector('[data-action="popular-filter-toggle"]');
        }
      }

      // URL-state manager helpers
      function readUrlState() {
        var params = new URLSearchParams(window.location.search);
        var tabParam = params.get('tab');
        var queryParam = params.get('query');
        var minFollowersParam = params.get('minFollowers');

        var tab = tabParam === 'following' ? 'following' : 'explore';
        var query = queryParam ? String(queryParam) : '';
        var minFollowers = null;

        if (minFollowersParam !== null && minFollowersParam !== '') {
          var parsed = parseInt(minFollowersParam, 10);
          if (!isNaN(parsed) && parsed >= 0) {
            minFollowers = parsed;
          }
        }

        return {
          tab: tab,
          query: query,
          minFollowers: minFollowers
        };
      }

      function updateUrlState(partial, options) {
        if (options === void 0) options = {};
        var replace = options.replace === true;
        var url = new URL(window.location.href);
        var params = url.searchParams;

        if (Object.prototype.hasOwnProperty.call(partial, 'tab')) {
          if (!partial.tab || partial.tab === 'explore') {
            params.delete('tab');
          } else {
            params.set('tab', partial.tab);
          }
        }

        if (Object.prototype.hasOwnProperty.call(partial, 'query')) {
          if (!partial.query) {
            params.delete('query');
          } else {
            params.set('query', partial.query);
          }
        }

        if (Object.prototype.hasOwnProperty.call(partial, 'minFollowers')) {
          if (partial.minFollowers === null || partial.minFollowers === undefined || partial.minFollowers === '') {
            params.delete('minFollowers');
          } else {
            params.set('minFollowers', String(partial.minFollowers));
          }
        }

        url.search = params.toString();
        if (replace) {
          window.history.replaceState(null, '', url.pathname + (url.search ? '?' + url.searchParams.toString() : ''));
        } else {
          window.history.pushState(null, '', url.pathname + (url.search ? '?' + url.searchParams.toString() : ''));
        }
      }

      // UI update helpers
      function setActiveTabUi(tab) {
        state.tab = tab === 'following' ? 'following' : 'explore';

        if (elements.tabButtons && elements.tabButtons.length) {
          elements.tabButtons.forEach(function(btn) {
            var value = btn.getAttribute('data-tab-value') || 'explore';
            var isActive = value === state.tab;
            btn.classList.toggle('is-active', isActive);
            btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
            btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
          });
        }

        if (elements.exploreList) {
          elements.exploreList.classList.toggle('is-hidden', state.tab !== 'explore');
        }
        if (elements.followedList) {
          elements.followedList.classList.toggle('is-hidden', state.tab !== 'following');
        }
      }

      function updateSearchFormFromState() {
        if (elements.searchInput) {
          elements.searchInput.value = state.query || '';
        }
        if (elements.minFollowersInput) {
          if (state.minFollowers !== null && state.minFollowers !== undefined) {
            elements.minFollowersInput.value = String(state.minFollowers);
          } else {
            elements.minFollowersInput.value = '';
          }
        }
        updatePopularToggleUi();
      }

      function updatePopularToggleUi() {
        if (!elements.popularToggle) return;
        var thresholdAttr = elements.popularToggle.getAttribute('data-popular-threshold');
        var threshold = thresholdAttr ? parseInt(thresholdAttr, 10) : 500;
        if (isNaN(threshold) || threshold <= 0) threshold = 500;
        var isPopular = state.minFollowers !== null && state.minFollowers !== undefined && state.minFollowers >= threshold;
        elements.popularToggle.classList.toggle('is-active', isPopular);
        elements.popularToggle.setAttribute('aria-pressed', isPopular ? 'true' : 'false');
      }

      function formatFollowerCount(count) {
        var n = typeof count === 'number' ? count : 0;
        if (n >= 1000000) {
          return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
        }
        if (n >= 1000) {
          return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
        }
        return String(n);
      }

      function renderLoadingState(container) {
        if (!container) return;
        container.classList.remove('is-hidden-when-empty');
        container.innerHTML = '<div class="topics-loading">Loading…</div>';
      }

      function renderErrorState(container, message) {
        if (!container) return;
        container.classList.remove('is-hidden-when-empty');
        var safeMessage = message || 'Something went wrong.';
        container.innerHTML = '<div class="topics-error">' + safeMessage + '</div>';
      }

      function createTopicRow(tag) {
        var row = document.createElement('article');
        row.className = 'topic-row';
        if (tag && tag.id) {
          row.setAttribute('data-tag-id', tag.id);
        }

        var main = document.createElement('div');
        main.className = 'topic-row-main';

        var title = document.createElement('h2');
        title.className = 'topic-row-title';

        var nameButton = document.createElement('button');
        nameButton.type = 'button';
        nameButton.className = 'topic-name-link';
        nameButton.setAttribute('data-action', 'open-topic');
        if (tag && tag.id) {
          nameButton.setAttribute('data-tag-id', tag.id);
        }
        nameButton.textContent = tag && tag.name ? tag.name : 'Untitled topic';

        title.appendChild(nameButton);
        main.appendChild(title);

        if (tag && tag.description) {
          var desc = document.createElement('p');
          desc.className = 'topic-row-description';
          desc.textContent = tag.description;
          main.appendChild(desc);
        }

        var meta = document.createElement('p');
        meta.className = 'topic-row-meta';
        var followerCount = tag && typeof tag.followerCount === 'number' ? tag.followerCount : 0;
        meta.textContent = formatFollowerCount(followerCount) + ' followers';
        main.appendChild(meta);

        var actions = document.createElement('div');
        actions.className = 'topic-row-actions';

        var followBtn = document.createElement('button');
        followBtn.type = 'button';
        followBtn.className = 'topic-follow-toggle';
        followBtn.setAttribute('data-component', 'topic-follow-toggle');
        followBtn.setAttribute('data-action', 'toggle-follow');
        if (tag && tag.id) {
          followBtn.setAttribute('data-tag-id', tag.id);
        }
        var isFollowed = !!(tag && tag.isFollowed);
        followBtn.setAttribute('data-is-followed', isFollowed ? 'true' : 'false');
        followBtn.textContent = isFollowed ? 'Following' : 'Follow';

        actions.appendChild(followBtn);

        row.appendChild(main);
        row.appendChild(actions);

        return row;
      }

      function renderTopicList(container, tags) {
        if (!container) return;
        container.classList.remove('is-hidden-when-empty');
        container.innerHTML = '';

        if (!tags || !tags.length) {
          return;
        }

        var list = document.createElement('div');
        list.className = 'topics-list';

        tags.forEach(function(tag) {
          var row = createTopicRow(tag);
          list.appendChild(row);
        });

        container.appendChild(list);
      }

      function updateEmptyState() {
        if (!elements.emptyState) return;

        var isExploreTab = state.tab === 'explore';
        var hasExploreItems = state.exploreResults && state.exploreResults.length > 0;
        var hasFollowingItems = state.followedTopics && state.followedTopics.length > 0;

        var showEmpty = false;
        var title = '';
        var description = '';

        if (isExploreTab) {
          if (state.isSearchLoading) {
            elements.emptyState.hidden = true;
            return;
          }
          showEmpty = !hasExploreItems;
          if (showEmpty) {
            if (!state.query && (state.minFollowers === null || state.minFollowers === undefined)) {
              title = 'Explore topics';
              description = 'Start with a search above or use the popular filter to discover active topics.';
            } else {
              title = 'No topics match your filters';
              var parts = [];
              if (state.query) {
                parts.push('matching "' + state.query + '"');
              }
              if (state.minFollowers !== null && state.minFollowers !== undefined) {
                parts.push('with at least ' + state.minFollowers + ' followers');
              }
              if (parts.length) {
                description = 'Try adjusting your search ' + '(' + parts.join(' ') + ')' + ' or clear filters.';
              } else {
                description = 'Try adjusting your search or clearing filters.';
              }
            }
          }
        } else {
          if (state.isFollowingLoading) {
            elements.emptyState.hidden = true;
            return;
          }
          showEmpty = !hasFollowingItems;
          if (showEmpty) {
            title = 'You are not following any topics yet';
            description = 'Use the Explore tab to find topics you care about, then follow them to see them here.';
          }
        }

        if (!showEmpty) {
          elements.emptyState.hidden = true;
          if (elements.exploreList) {
            elements.exploreList.classList.remove('is-hidden-when-empty');
          }
          if (elements.followedList) {
            elements.followedList.classList.remove('is-hidden-when-empty');
          }
          return;
        }

        elements.emptyState.hidden = false;
        elements.emptyState.innerHTML = '';

        var wrapper = document.createElement('div');
        wrapper.className = 'topics-empty-inner';

        var h = document.createElement('h2');
        h.className = 'topics-empty-title';
        h.textContent = title;
        wrapper.appendChild(h);

        if (description) {
          var p = document.createElement('p');
          p.className = 'topics-empty-description';
          p.textContent = description;
          wrapper.appendChild(p);
        }

        elements.emptyState.appendChild(wrapper);

        if (isExploreTab && elements.exploreList) {
          elements.exploreList.classList.add('is-hidden-when-empty');
        } else if (!isExploreTab && elements.followedList) {
          elements.followedList.classList.add('is-hidden-when-empty');
        }
      }

      function syncExploreWithFollowed() {
        if (!state.exploreResults || !state.exploreResults.length || !state.followedTopics || !state.followedTopics.length) {
          return;
        }
        var followedById = {};
        state.followedTopics.forEach(function(tag) {
          if (tag && tag.id) {
            followedById[tag.id] = tag;
          }
        });
        state.exploreResults = state.exploreResults.map(function(tag) {
          if (!tag || !tag.id) return tag;
          var followed = followedById[tag.id];
          if (followed) {
            tag.isFollowed = true;
            if (typeof followed.followerCount === 'number') {
              tag.followerCount = followed.followerCount;
            }
          }
          return tag;
        });
      }

      // Data controller: calls SDK and wires results to renderers
      function runExploreSearch() {
        if (!elements.exploreList) return;
        state.isSearchLoading = true;
        renderLoadingState(elements.exploreList);

        var results;
        try {
          var q = state.query || '';
          if (state.minFollowers !== null && state.minFollowers !== undefined) {
            results = WebsiteSDK.searchTopics(q, state.minFollowers);
          } else {
            // Call with only required parameter
            results = WebsiteSDK.searchTopics(q);
          }
        } catch (err) {
          console.error('Error searching topics', err);
          state.isSearchLoading = false;
          renderErrorState(elements.exploreList, 'Unable to load topics right now.');
          updateEmptyState();
          return;
        }

        state.exploreResults = Array.isArray(results) ? results : [];

        // Keep explore and followed lists in sync when possible
        syncExploreWithFollowed();

        state.isSearchLoading = false;
        renderTopicList(elements.exploreList, state.exploreResults);
        updateEmptyState();
      }

      function loadFollowedTopics() {
        if (!elements.followedList) return;
        state.isFollowingLoading = true;
        renderLoadingState(elements.followedList);

        var topics;
        try {
          topics = WebsiteSDK.getFollowedTopics();
        } catch (err) {
          console.error('Error loading followed topics', err);
          state.isFollowingLoading = false;
          renderErrorState(elements.followedList, 'Unable to load followed topics right now.');
          updateEmptyState();
          return;
        }

        state.followedTopics = Array.isArray(topics) ? topics : [];
        state.hasLoadedFollowing = true;

        // Sync explore results with latest follow state
        syncExploreWithFollowed();

        state.isFollowingLoading = false;
        renderTopicList(elements.followedList, state.followedTopics);
        updateEmptyState();
      }

      function mergeUpdatedTag(updatedTag) {
        if (!updatedTag || !updatedTag.id) return;

        // Update explore results
        if (state.exploreResults && state.exploreResults.length) {
          state.exploreResults = state.exploreResults.map(function(tag) {
            if (tag && tag.id === updatedTag.id) {
              return updatedTag;
            }
            return tag;
          });
        }

        // Update followed topics only if list has been loaded in this session
        if (state.hasLoadedFollowing) {
          var foundInFollowed = false;
          var nextFollowed = [];

          if (state.followedTopics && state.followedTopics.length) {
            state.followedTopics.forEach(function(tag) {
              if (tag && tag.id === updatedTag.id) {
                if (updatedTag.isFollowed) {
                  nextFollowed.push(updatedTag);
                  foundInFollowed = true;
                }
              } else {
                nextFollowed.push(tag);
              }
            });
          }

          if (updatedTag.isFollowed && !foundInFollowed) {
            nextFollowed.push(updatedTag);
          }

          state.followedTopics = nextFollowed;
        }
      }

      // Event handlers
      function handleTabClick(event) {
        var btn = event.currentTarget;
        var tabValue = btn.getAttribute('data-tab-value') || 'explore';

        if (tabValue === state.tab) return;

        setActiveTabUi(tabValue);
        updateUrlState({ tab: state.tab }, {});

        if (state.tab === 'following') {
          loadFollowedTopics();
        } else {
          runExploreSearch();
        }
      }

      function handleHeaderSearchSubmit(event) {
        event.preventDefault();
        var form = event.currentTarget;
        var input = form.querySelector('input[name="headerQuery"]');
        var term = input && input.value ? input.value.trim() : '';
        var url = new URL('search_results.html', window.location.origin);
        if (term) {
          url.searchParams.set('query', term);
        }
        window.location.href = url.pathname + (url.search ? '?' + url.searchParams.toString() : '');
      }

      function handleTopicSearchSubmit(event) {
        event.preventDefault();
        if (!elements.topicSearchForm) return;

        var query = elements.searchInput && elements.searchInput.value ? elements.searchInput.value.trim() : '';
        var minFollowers = null;

        if (elements.minFollowersInput && elements.minFollowersInput.value !== '') {
          var parsed = parseInt(elements.minFollowersInput.value, 10);
          if (!isNaN(parsed) && parsed >= 0) {
            minFollowers = parsed;
          } else {
            elements.minFollowersInput.value = '';
          }
        }

        state.query = query;
        state.minFollowers = minFollowers;

        // Searching always activates the Explore tab
        setActiveTabUi('explore');
        updatePopularToggleUi();
        updateUrlState({ tab: state.tab, query: state.query, minFollowers: state.minFollowers }, {});
        runExploreSearch();
      }

      function handleMinFollowersChange(event) {
        var value = event.currentTarget.value;
        var minFollowers = null;
        if (value !== '') {
          var parsed = parseInt(value, 10);
          if (!isNaN(parsed) && parsed >= 0) {
            minFollowers = parsed;
          } else {
            event.currentTarget.value = '';
          }
        }

        state.minFollowers = minFollowers;
        if (elements.searchInput) {
          state.query = elements.searchInput.value ? elements.searchInput.value.trim() : '';
        }

        setActiveTabUi('explore');
        updatePopularToggleUi();
        updateUrlState({ tab: state.tab, query: state.query, minFollowers: state.minFollowers }, {});
        runExploreSearch();
      }

      function handlePopularToggleClick(event) {
        event.preventDefault();
        var btn = event.currentTarget;
        var thresholdAttr = btn.getAttribute('data-popular-threshold');
        var threshold = thresholdAttr ? parseInt(thresholdAttr, 10) : 500;
        if (isNaN(threshold) || threshold <= 0) threshold = 500;

        var currentlyPopular = state.minFollowers !== null && state.minFollowers !== undefined && state.minFollowers >= threshold;
        state.minFollowers = currentlyPopular ? null : threshold;

        if (elements.minFollowersInput) {
          elements.minFollowersInput.value = state.minFollowers !== null && state.minFollowers !== undefined ? String(state.minFollowers) : '';
        }
        if (elements.searchInput) {
          state.query = elements.searchInput.value ? elements.searchInput.value.trim() : '';
        }

        setActiveTabUi('explore');
        updatePopularToggleUi();
        updateUrlState({ tab: state.tab, query: state.query, minFollowers: state.minFollowers }, {});
        runExploreSearch();
      }

      function handleListClick(event) {
        var target = event.target;
        if (!target) return;

        // Follow/unfollow toggle
        var followBtn = target.closest('[data-action="toggle-follow"]');
        if (followBtn) {
          handleFollowToggleClick(followBtn);
          return;
        }

        // Open topic detail
        var topicBtn = target.closest('[data-action="open-topic"]');
        if (topicBtn) {
          var tagId = topicBtn.getAttribute('data-tag-id');
          if (tagId) {
            var url = new URL('topic.html', window.location.origin);
            url.searchParams.set('tagId', tagId);
            window.location.href = url.pathname + (url.search ? '?' + url.searchParams.toString() : '');
          }
          return;
        }
      }

      function handleFollowToggleClick(button) {
        var tagId = button.getAttribute('data-tag-id');
        if (!tagId) return;

        var currentlyFollowed = button.getAttribute('data-is-followed') === 'true';
        button.disabled = true;

        var result;
        try {
          if (currentlyFollowed) {
            result = WebsiteSDK.unfollowTopic(tagId);
          } else {
            result = WebsiteSDK.followTopic(tagId);
          }
        } catch (err) {
          console.error('Error updating follow state', err);
          button.disabled = false;
          return;
        }

        button.disabled = false;
        var updatedTag = result && result.tag ? result.tag : null;
        if (!updatedTag) return;

        mergeUpdatedTag(updatedTag);

        if (elements.exploreList && state.exploreResults) {
          renderTopicList(elements.exploreList, state.exploreResults);
        }
        if (elements.followedList && state.followedTopics) {
          renderTopicList(elements.followedList, state.followedTopics);
        }

        updateEmptyState();
      }

      function applyStateFromUrl() {
        var urlState = readUrlState();
        state.tab = urlState.tab;
        state.query = urlState.query;
        state.minFollowers = urlState.minFollowers;

        setActiveTabUi(state.tab);
        updateSearchFormFromState();

        if (state.tab === 'following') {
          loadFollowedTopics();
        } else {
          runExploreSearch();
        }
      }

      function handlePopState() {
        applyStateFromUrl();
      }

      // Generic binding based on data-action attributes
      function bindActionElement(el) {
        var action = el.getAttribute('data-action');
        if (!action) return;

        if (action === 'switch-tab') {
          el.addEventListener('click', handleTabClick);
        } else if (action === 'header-search-submit') {
          // Form submit
          el.addEventListener('submit', handleHeaderSearchSubmit);
        } else if (action === 'topic-search-submit') {
          el.addEventListener('submit', handleTopicSearchSubmit);
        } else if (action === 'min-followers-change') {
          el.addEventListener('change', handleMinFollowersChange);
        } else if (action === 'popular-filter-toggle') {
          el.addEventListener('click', handlePopularToggleClick);
        }
      }

      function initialPopulate() {
        var urlState = readUrlState();
        state.tab = urlState.tab;
        state.query = urlState.query;
        state.minFollowers = urlState.minFollowers;

        setActiveTabUi(state.tab);
        updateSearchFormFromState();

        if (state.tab === 'following') {
          loadFollowedTopics();
        } else {
          runExploreSearch();
        }
      }

      // Bootstrap
      cacheDomReferences();

      // Attach delegated listeners for topic lists (for dynamic rows)
      if (elements.exploreList) {
        elements.exploreList.addEventListener('click', handleListClick);
      }
      if (elements.followedList) {
        elements.followedList.addEventListener('click', handleListClick);
      }

      // Bind static elements based on data-action
      var actionElements = document.querySelectorAll('[data-action]');
      actionElements.forEach(function(el) {
        bindActionElement(el);
      });

      // Map data-populate containers (non-visual state)
      var populateElements = document.querySelectorAll('[data-populate]');
      populateElements.forEach(function(el) {
        var type = el.getAttribute('data-populate');
        if (type === 'explore-topics') {
          elements.exploreList = el;
        } else if (type === 'followed-topics') {
          elements.followedList = el;
        }
      });

      // URL-driven state on load
      initialPopulate();

      // Respond to browser navigation (back/forward)
      window.addEventListener('popstate', handlePopState);
    });
  </script>
</body>
</html>
