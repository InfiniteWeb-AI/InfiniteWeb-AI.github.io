<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulated Web Search</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <!-- HOME VIEW -->
  <div id="home-view" class="view">
    <div class="home-container">
      <div class="home-logo">
        <h1>Simulated Web</h1>
        <p class="home-subtitle">Search 126 websites, 2,062 pages</p>
      </div>
      <form id="home-search-form" class="search-form search-form--home">
        <div class="search-input-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
          <input type="text" id="home-search-input" placeholder="Search the simulated internet..." autocomplete="off" autofocus>
          <button type="submit" class="search-btn" aria-label="Search">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
          </button>
        </div>
        <div id="home-suggestions" class="suggestions-dropdown" hidden></div>
      </form>
      <div class="home-stats">
        <span id="home-stats-text"></span>
      </div>
    </div>
  </div>

  <!-- RESULTS VIEW -->
  <div id="results-view" class="view" hidden>
    <header class="results-header">
      <a href="#" id="logo-link" class="results-logo">Simulated Web</a>
      <form id="results-search-form" class="search-form search-form--results">
        <div class="search-input-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
          <input type="text" id="results-search-input" autocomplete="off">
          <button type="submit" class="search-btn" aria-label="Search">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
          </button>
        </div>
        <div id="results-suggestions" class="suggestions-dropdown" hidden></div>
      </form>
    </header>

    <div class="results-body">
      <aside class="results-sidebar" id="results-sidebar">
        <div class="sidebar-section">
          <h3>Filter by Website</h3>
          <ul id="site-filter-list" class="filter-list"></ul>
          <button id="site-filter-toggle" class="filter-toggle" hidden>Show more</button>
        </div>
      </aside>

      <main class="results-main">
        <div class="results-info" id="results-info"></div>
        <ol id="results-list" class="results-list"></ol>
        <nav id="pagination" class="pagination" aria-label="Search results pages"></nav>
      </main>
    </div>
  </div>

  <!-- LOADING OVERLAY -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>Loading search index...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/minisearch@7/dist/umd/index.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
